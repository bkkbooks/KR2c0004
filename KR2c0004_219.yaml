body:
  text: 三朝北盟會編巻二百十九宋徐夢莘撰炎興下帙起紹興二十一年九月盡紹興二十五年十月二十日乙未九月巫伋鄭藻使於金國囬巫伋鄭藻以祈請使副使於金國至金國闕下引見畢内殿奏公事惟正使巫伋得入金主問所請者何事伋首言乞修奉陵寢金主令譯者傳言自有看墳人伋第二言乞迎請靖康帝歸國又令譯者傳言不知歸後甚處頓放伋第三言本朝稱皇帝二字又令譯者傳言此是你中國事當自理會伋唯唯而退以待辭而歸遺史曰巫伋作祈請使而無祈請之辭投書而已議者謂不識字之承局可優為也上幸張俊第府官吏各轉一官十一月陳相為大金賀生辰國信使孟思恭副之陳相字相之孟思恭字彦安十二月金人遣使來賀正旦二十二年五月金人遣使來賀生辰十月孫仲鼇為大金賀正旦國信使陳靖副之陳靖字彦恭開封人李琳為大金賀生辰國信使石清副之十二月金人遣使來賀正旦紹興二十三年五月金人遣使來賀生辰十月八日癸亥施鉅為大金賀正旦國信使冀彦明副之施鉅字大任湖州人冀彦明開封人吳㮚為大金賀生辰國信使張彦收副之吳㮚字少仁建康人張彦收字安道開封人十二月金人遣使來賀正旦金人改元正元紹興二十四年五月金人遣使來賀生辰七月二日癸丑張俊薨中興遺史曰張俊享年六十九以疾終于牖下上聞其薨震悼輟視朝三日賜棺木襲衣一品禮服龍腦水銀賻絹各有差追封循王厚録其孤俊之妻秦國夫人魏氏先俊薨以其愛妾榮國夫人張氏繼室嫌其同姓改為章氏俊狀貎雄偉性深渾厚嚴重征行戍守師律整齊納亡撫降皆能得其死力如楊存中田師中趙宻軰皆出其門十四日乙丑上幸張俊第臨奠上幸張俊第臨奠為之慟哭幹辦官髙漸李革等皆右武大夫仍賜金帶八月勅塟張俊勅塟張俊于常州無錫縣命延福宮使安徳軍承宣使内侍省押班張去為䕶塟事林泉野記曰張俊字英伯泰州山陽人少為弓箭手初従瀘州兵討南蠻有功後從梁方平累攻夏國皆先登宣和五年京東河北盗争起従方平破鄆州賊李太子追至洺州大合羣盗萬人來拒又擊滅之六年破大名賊於超化寺追至内黄又破内黄賊數千七年破沂州賊三萬於沂水追至宻州又破宻賊徐靖於莒縣囬遇賊於南樓山又破之還沂州破賊張仙於闕鼓山又破濰州羣賊于方村累遷武徳郎八年濟南賊孫列整衆十萬俊従方平討之先射中賊來挑戰者因大破于鏵子山又破濰州羣黨于昌樂靖康中従种師中攻太原與大金戰榆次奪馬千匹及師中死俊潰圍走烏河川敵來追俊大呼死戰斬首五百級加武翼大夫従知信徳府楊祖統兵謁康王于大名王問楊祖諸兵官誰可使楊祖稱俊忠實可任王甚愛之明年李煜㓂東平府王命俊同苖傅討之至任城縣遇伏兵頼其將趙宻射退賊俊與傅擊煜大破之斬二千級加拱衛大夫徐州觀察使王即位除御營使司前軍統制又加帶御器械往平杜用于淮寧府又従兩浙制置使王淵招降趙萬於潤州降陳遇於杭州至婺州射殺賊何三五建炎二年秀州軍卒徐明反命俊討擒之獻俘於行在加武寧軍承宣使三年苖傅劉正彦反俊時屯兵吳江傅等矯詔加俊捧日天武四廂都指揮使俊不受與張浚泣議約諸將來勤王時韓世清軍先為金人所敗死亡略盡而不能軍俊乃以統領劉寳一軍借之至臨平撃敵將苖翊馬朶吉軍敗之以復辟功加鎮西軍節度使數日又改御前右軍都統制大金渡江上幸温州留俊軍守明州禦之大金兵至俊納隐士劉相如之計與之决戰令統制劉寳先戰不勝俊用兵横衝之而楊沂中田師中軍戰又不勝寳兵再進與之苦戰而李質率諸班直以舟師來助劉洪道又率其兵射其傍遂大敗之殺數千人四年烏珠又領兵至俊擊之于髙橋一日數合又大敗之然其心懼其益兵再來遂與質洪道俱棄明州而走烏珠聞諸軍已去復來屠其城加俊檢校少保定江昭慶軍節度使改神武右軍都統制大金攻淮南劉光世守潤州乞俊來援俊他託不行李成圍江州兵勢甚盛以俊為江淮招討使命王爕岳飛陳思恭皆聽其節制領兵五萬往討之紹興初至洪州李成將馬進來挑戰俊堅壁不出後用飛計渡江擊之於玉隆觀敗之至筠州進陳兵數十萬命飛與陳思恭騎兵擊之數合不能勝俊度其已疲復率衆兵急攻之大破賊殺數萬人臨陣降者五萬俊懼其太重且疑復反是夜皆殺之進走追至奉親縣之教子莊至江州又再敗之追至蘄州羅田山又敗之成遂殺進降于劉豫俊命飛追張用降其衆五萬知鄂州李克文恃兵䟦扈俊誘而擒送行在加太尉四年大金兵至淮東以俊為浙西江東宣撫使領兵至鎮江命統制張宗顔戰于真州六合縣敗之命其將盧師廸戰真州烏闕鎮敗之又戰于烏石山敗之五年師廸戰于龍山敗之命統制王進戰盱眙敗之其將張元戰白塔敗之進又同楊忠閔往戰於淮河敗之降其將程師囬張連壽二人又命統制髙舉戰于天長軍敗之王進髙舉盧師廸皆俊之將也加開府儀同三司以其軍為行營中䕶軍六年加崇信奉寧軍節度使進守盱眙築大城以拒大金時主管殿前司楊沂中軍泗州劉豫遣姪猊以軍三萬㓂濠州俊令張宗顔王璋㑹沂中往擊之戰定逺縣及李家灣大破之降其兵萬人俊同沂中攻壽春府不克而還加少保鎮洮崇信奉寧軍節度使七年為淮西路安撫使退軍建康府其軍多擾民不戢頗為民怨九年加少傅安民靖難功臣十年大金背盟加少師兼河南招討使封濟國公以兵救劉錡於順昌俊竟不出烏珠以退俊乃行命統制米超戰永城縣米家闕敗之統制王徳戰蘄縣敗之下宿州俊進兵戰城父縣敗之下亳州又戰于渦河敗之俊愛惜士卒賞罰明信先計後戰故未嘗敗焉十一年大金烏珠龍虎大王鎮國大將軍韓常領兵五十萬陷廬和州連詔促俊先奪和州諸軍至楊沂中亦以軍來故遣沂中同王徳戰含山縣昭闗仙踪嶺等處敗之烏珠列大陣柘臯俊時感寒疾督戰沂中輕進敗績王徳援之以騎軍横衝其兵大破之擒其帥長百餘人殺其兵萬餘俄而烏珠復以重兵圍濠俊以糧乏退軍黄連鎮及濠州已陷令沂中往收復大金伏兵圍之沂中大敗遣王徳田師中髙舉劉寳救之沂中得逸退軍建康府其軍八萬皆少壯精練之士器甲光明鋒鋭為諸軍第一世謂之鐡山軍後兵强勢重恃寵怙權上眷之厚凡所言朝廷無不従薦人為監司郡守帶職名者甚衆宰相不敢少違晩年主和與秦檜意合來朝除樞宻使賜玉帶覺朝廷欲罷其權乃乞納兵忌劉錡岳飛不赴援每譖於主相二人坐是獲罪復令飛往楚州領韓世忠軍歸于鎮江府飛罷而俊獨在鎮江府以為備加太傅廣國公大金再陷楚泗濠揚俊不出兵渡江以堅和議十二年還朝薦其將田師中往鄂州掌岳飛兵初與檜約俊主和議盡罷諸大將悉以兵權歸俊故俊力助其謀及諸將皆罷檜乃㑹侍御史張邈屢言俊罪罷為醴泉觀使復還三鎮節鉞封清河郡王改靖康寧武奉國軍節度使二十一年上幸俊第勞之拜太師官吏各遷一官以姪子盖為安徳軍節度使二十四年薨年六十九追封循王勅塟常州無錫縣以知内侍省張去為䕶䘮事自行朝至無錫縣郡將相祭之者接迹江左以為榮五子子琦子厚子顔子仁子正孫宗元其麾下將佐若楊存中田師中王徳趙宻皆為三公節鉞張宗顔劉寳王進馬立王端皆顯仕幕府若孫佑史愿詹和詹宗明郄漸英温彦多為侍従帥守後賜諡曰忠烈十月沈虚中為大金賀正旦國信使張掄副之沈虚中字太虚張棆字林甫開封人闕張士襄字贊可建康人張鋭字次傳開封人醫官公裕之子也娶吳氏乃中宫之妹十二月金人遣使來賀正旦紹興二十五年正月車駕駐蹕臨安府十月初八日壬午鄭楠為大金賀生辰國信使李大授副之王珉為大金賀正旦國信使王漢臣副之二十日甲午秦檜病篤秦檜以疾勢危篤劄子乞同男熺致仕二孫塤堪改差在外宫觀降詔不允曰丙吉有病夏侯勝預知必愈謂有隂徳者必享其樂以及子孫卿獨運廟堂再興宗社元勲偉績著在非常過吉逺矣兹㣲爽於節宣曽何傷乎氣體矧今朝廷恃以為輕重天下中外倚以為安危卿其保精神省思慮勿藥之喜中外所期納祿之陳豈朕所望所請宜不允再請許之制曰太平樂與興賢共享盈成之治王公坐而論道難親幾務之繁眷予不召之臣光輔中興之運兹覽辭榮之奏宜推從欲之人揚于大廷詔爾百辟某官秦檜閎深而肅括博厚而髙明任天下之重而靡辭其難舉天下之言而必見于用蚤堅不奪之節力振無窮之基自登冠于宰司首定盟於鄰好大䇿非凡所見咸胥動以浮言方叔克壯其猶獨秉持于素守上以遂予一人之孝養以成爾百姓之安居不矜功業之光榮復立規模之宏逺勸農桑而臻富庶興禮樂而𨗳中和國制既成天休來萃比連聞於假告已渴佇於儀刑乃命僕臣親臨甲第惟隂徳之獲報宜勿藥以有瘳何遽貢於嚢封祈上還於印綬誠請確至詔㫖莫囬其寵拜于王封用歸榮于里社云云可特授依前太師進封建康郡王二十一日乙未幸秦檜第上幸秦檜第問疾檜朝服拖紳無一語唯流涕淋浪而上亦為之墮淚就手觧紅帕賜檜拭淚既退其子熺奏請代居宰相者為誰上曰此事卿不當與宣賜本府幹辦官丁禩金帶一條已時還駕三朝北盟㑹編巻二百十九
