body:
  text: 三朝北盟㑹編卷二百三十三宋徐夢莘撰炎興下帙起紹興三十一年十月六日乙巳盡八日丁未六日乙巳四川安撫使吳璘散關㨗報至吳璘㨗報九月五日金人自鳯翔大散關入本界三十里逼黄牛堡旬餘不退十八日遣將官彭清直至寳溪渭河夜刼橋頭大寨獲㨗上曰朕與金國講好二十年未嘗有纎毫之隙不意今賀天中節使人王金上殿口陳金主之語邀我將相大臣又欲得漢以東淮以南土地一時臣僚雖不勸朕用兵朕謂和好既未解則兵釁不可開姑發信使以審其事至淮既不納既歸又求反復詭詐而為釁端意在敗盟重兵壓境託為打圍謀為深入朕不免嚴兵備且戒飭諸將務為持重以觀其變而師屬無名之舉果為敵首事之曲直寧不判然散關小㨗豈非信順之助而况弑殺君親誅戮殘忍天地所不盖載異域所不肯為神怒人怨滅亡無日令三道出師招討審彼己量虛實撫定我城邑招集我人民收復我寢廟毋焚燒毋虜掠毋殺傷以圖萬全之舉髙爵醲賞朕所不吝卿等贊朕成算協以衆謀庻幾恢復神州以雪兩朝之恥宰臣陳伯康等奏曰臣雖不習武敢不奉以周旋八月丁未金人立葛王裒于遼陽府神麓記曰亮初刷國中女真五國烏舍鐵驪渤海契丹漢兒軍自備衣甲鞍馬弓箭刀鎗軍須餱糧車牛奴婢自遥逺來沿邊道塗艱辛不肯前行皆共謀曰皇帝無道逺伐南朝未知勝負難以歸國我等豈能就作失家之鬼乎不若從此就近徑往遼陽東路東京與渤海諸豪册立留守葛王為主何如衆曰亦是太祖武元之孫有何不可于是歲十月間入東京留守衞求見謂王才徳足任萬機册即帝位詔曰熈宗乃太祖之孫受文烈遺命嗣膺神器十有五年内撫外寧近安逺至雖晚年刑戮過甚而罪不及民前歧國王亮位叨宰相不思盡忠節輒敢行簒弑自僣竊以來昏虐滋甚是用列其無道昭示多方一前來皇叔元帥曹國王自先朝以親賢當任止因簒位之初自懷恐懼無故殺害一前來太宗受太祖遺命不忘至公傳位前君諸子並當職任止因簒位初懷疑懼將太宗親子太保國王改魯中京留守和勒博阿里留守判宗朝呼嚕加宰相和碩霍王罕都鄆王實徒美蔡王烏頁八人子嗣等七十餘口並以無罪盡行殺戮一開國功臣晉國王孫領行省楚國王愛紳止因簒位之初自懐疑懼將愛紳并兄子嗣三十餘口及駙馬丞相翁鄂囉並宗室海州刺史等五十餘口以無罪盡行殺戮一左副元帥國王薩哈累建功勲止因簒位之初自懷疑懼計構雅穆以白礬書假言宫外拾得令其誣吿并其子御史大夫薩勒扎子孫三十餘口及太祖親弟遼越國王男平章博濟弟兄子一百餘口兵部尚書瑪勒弟兄子嗣二十餘口太皇太妃并子任王威赫並以無罪盡行殺戮一前來太祖長女公主烏嚕格係曹國王親姨因簒位之初無故殺害一故西京留守富勒堅為是親親自懷疑懼無故殺害一開國功臣皇叔太師長子韓王臨民親正忌其聲譽令其家人誣吿勘問不成故意殺害一應係開國功臣太祖太宗時已經封贈王爵無故行追奪一㑹寧府係太祖興王之所建宫殿無故拆毁一中都大内營造累年殫竭民財力不可勝計民力未足仍拆毁南京大内再行修盖並皆窮奢極侈土木之功前所未有一因伊小兒病死却將乳母並二醫人等盡行誅戮一宋國講和之後臣禮不闕頓違信誓欲行吞併動衆興兵逺近嗟怨醫人祚翰副陳諫不可更不循情便行誅戮并舊有軍器盡行燒毁却令改造遂致公私困竭生靈飛走無不凋弊一昨來皇叔曹國王被殺之後嬸母國妃納在宫中及親族姨妹姑姪并應命婦有容色者恣行蒸淫一亡邊豫王子嗣三十餘口天水郡王嗣一百餘口並以無罪横遭殺戮一嫡母太后曽言不可南征之事手自戕殺其大逆無道古今未聞一徳宗嫡孫節使母妻子弟并太師王兒孫婦曹國王次夫人并子及韓國夫人并兒婦孫婦等並以無罪盡行誅戮一樞密使北京西京留守因此征回並加誅族宰執亦被鞭撻其餘前故過惡不可備舉前録數條稔于聞見遂致天怒人憤衆叛親離朕方留守東京遵養時晦四方豪傑將士吏民咸懷怨苦無所控吿自逺而至者數十萬衆日來赴愬再三勸進不謀同辭咸以太祖皇帝聰明神聖應期撫運皇孫繼嗣止予一人厯數有歸不期而㑹朕推誠固讓至于再三請者益堅辭不獲已恭念太祖創業之艱難祖宗社稷之深懼特俯徇羣情勉登大寳臨御之始如履春氷宜推肆眚之恩以布維新之令大赦天下改正隆六年為大定元年十月八日昧爽以前除殺祖父母不赦外罪無論已結正未結正已發覺未發覺咸赦除之内外大小職官並與覃恩仍委尚書省條奏施行一時來簽軍著軍名其間多有貧難之人欠少官錢私債及典僱兄弟子孫妻女姊妹或父母自行典僱深可憐憫赦書到日不問新舊盡行放免一據南京等處修盖匠夫盡行放免一據契丹老和尚等昨因簽差南征遂叛反赦書到日并許附近官司投首並許原免依舊復業一據昨因契丹人等作過其間被軍人等將不在作過數内外官員百姓及著軍人等命婦妻子孫驅奴并左右鄰人一例驅奴役令來自可憐恤赦書到日仰隨處官司一一刷㑹勘驗端的發遣本處依舊團聚住坐所有正係作過人等若從與軍人鬭陣亡擄了家眷驅奴不在與放免如前來敗失在迯即自新來投首除親屬外付本國人團聚到驅奴准已收擄為定一據迯軍離背軍帥主并避役夫匠或犯罪在逃良賤人等赦書到處並限一百日内許令陳首與免本罪安坐更不懲斷内軍人分付本軍收管如限滿不首復罪如初一據亡命山澤聚為盗冦赦書到處並限一百日經所在官司陳首與免本罪分付原收管係内據頭令如能勸率徒衆出首委所在官司具姓名申覆尚書省奏聞當議别加旌賞一據自撫定以來不選如何斷訖流移在他所人等並放還鄉一據自來除名開落官吏如不犯正枉法賍并真盗並與改正量才收用一據自逃死户絶名下所著大小差發并租税限赦書到並行除放一據五岳四瀆名山大川聖帝明王忠臣烈士載在祀典者所在官司歲時致祭一據諸處暴露骨骸無收塟者並委所在官司如法埋瘞一應改正徵收追究事件並准制條施行於戲以寛而衆可御敢希堯舜之仁代虐而民允懷庻及湯王之徳尚賴文武勵翼忠良咸吿嘉猷永臻至治咨爾兆庻體予至懷赦書日行五百里敢以赦前事相吿言者以其罪罪之到日主者施行張棣正隆亊蹟曰襄乃太祖第三子潞王宗輔之子也亮之從弟襄字彦舉乙巳三月一日寅時生小字呼喇穆爾即位後改名雍又曰十月完顔裒立于東京遼陽府遣譯通事蕭察喇帶牌特赦撫定州縣燕地郡邑指揮而下及燕山權留守拒而不從來使立誅之副留守李天吿懼而拜命立遣子器之奉表稱賀中都既定山東河北河東關西傳檄而下至十一月亮死方遣人南下乃殺亮子光瑛于汴京廢亮后壬午春正月裒知天下之歸已與子允升允迪率甲騎萬人遷燕山守臣完顔宗憲率在都文武百官具天子儀迎裒于小東門裒服便衣而入焉越數日下詔以吿天下内外文武百官各推恩初参知政事嗣暉知亮死欲立亮子光瑛于汴左相張浩輩不從乃止裒遷燕山貶嗣暉為庻人遣諡亶為閔宗臣下僉曰刑餘人不可遷廟改諡武宗皇帝父宗輔為懿宗裒以父名輔非帝王稱改名曰宗堯母壽昌為欽慈皇太后封亮為海陵郡王諡曰煬改塟東昏詔朕惟燕宗孝成皇帝以武元嫡孫受文烈顧命即位十有五年偃兵息民中外乂安惟海陵郡庻人亮包藏禍心覬覦神器除煽奸黨遂成簒逆而又厚誣成帝降從王封亮既得志肆其兇殘不道之極至于殺母人怨神怒自底誅滅惟皇眷佑于我家肆予一人纘承先緒暴其悖惡貶為庻人仍出其殯于兆域之外仰惟熙宗位號宜正是以間者稽之禮文升附大寳復加美諡尊而宗之惟是塟非其所盖常慊然爰命有司卜地涓日奉還梓宫已于十月初八日備禮改塟于思陵庻幾有以安慰在天之靈播吿中外咸使聞知故兹詔示想宜知悉増將士賞典詔勅朕仰惟太祖皇帝肇造區夏萬國咸服迨歲十載而正隆失道不務持守害虐黎庻無名弄兵致爾將士軍卒遂動征從暴露風霜失仰事俯育之樂朕甚憫之自膺推戴以來再欲班師然邊釁既成未底寧息濯征之謀固非得已重念賞典不明酬庸未允而又或失于稽緩令勅有司増多舊格比之國朝累行賞典特加優異頒降空名恩命仍出内帑金幣以助錫與一並付元帥仰于軍前視功輕重書填支賜於戲報國之心人所共有爾其奮勵忠節却敵禦侮以息民永底太平豈特予一人之慶亦使爾士卒安業富貴澤及子孫豈不韙與其新定隨等軍功官賞已令尚書省頒降施行故茲詔示想宜知悉裒四子曰允恭允升允迪允修允恭為皇太子允恭死立允恭之子璟為太孫璟嘗奏表于裒曰臣聞南宋久深敵怨嘗懷覬覦南京宋之故都應有形迹惟宜燔毁如洛陽宋之丘陵何必常遣衞䕶二處廢則杜絶殘宋之望又如毎遣奉使入宋國朝校射往往不勝有損國威今後使人射不勝乞加罪决取㫖是時葛王宣示宗室大臣及百官鎮國上將軍左司郎中鈕祜禄穆雅言臣聞治國之道莫如内安百姓外和鄰敵内外既安何憂于治伏自陛下龍飛以來國富民安四方之綏静雖禹之徳無踰焉臣愚不知忌諱冒死謹言太皇太孫春秋方壯識量宏逺神機英武非臣下所能發揚潜徳正宜謹擇儒學謹厚之士副佐聰明如近來奏南宋流播江外六十餘年宵旰嘗膽伺我之隙如南京開封府殘宋故都洛陽宋之丘陵二者乃宋人寢興望想之所宜加修繕當塞宋人之望况自撫定以來彼邦遵服貢賦以時不惟財匱國貧盖亦念故巢而恐廢丘陵爾若一旦恃富强遽失宋人過望之意使其憤辭激衆歲貢失時以勞聖意慮加兵必矣費用國資軍民勞苦天下震驚國内生靈墮于塗炭豈可忽諸陛下聖功神武日月之明爰念無名之師不宜復蹈前轍安危之保未可知于今日之計莫若内安民外和好陰為坐困東南之䇿因其飢饉乗其盗賊謹修邊備養成伺釁以謀混一今後所差奉使乞降指揮選于南京考射閲習然校射片時勝負臣下希賞烏足以係國家榮辱皇太孫建功之初宜修文徳仰佐以福天下如其所請神明之志甚銳實非宗廟萬世之利奉上畔指揮所奏至忠並依所言鈕祜禄穆雅特轉一重一重乃是一官也西夏回劉錡等檄書西夏國吿檄大宋元帥劉侯侍衞招討成侯招討吳侯十二月二日承將命傳檄書一道竊以恩宣大國濫及小邦逺邇交歡中外咸慶孤聞金敵無厭敢背盟而失信强隣不道妄稱好以和親始尚懐柔漸興殘殺托禹迹山川之廣覆堯天日月之光將士銜寃神人共憤妄自尊大者三十餘載怙其勢力者七八其人皆天理之所不容亦春秋之所共貶盖枕戈袵革之衆無閲書隆禮之風惟務貪殘恣行暴虐吞侵諸國建號大金屈陵壤以稱藩率兆民而貢賦驅役生靈而恬不知恤殺伐臣庻而自謂無傷雖君子之則否未嘗怨也待文王而興作盍歸乎來當中興恢復之秋乃上帝悔禍之日九重巡幸昔聞太王之居邠大駕親征今見漢文之却敵詔頒天下撫慰民心庶幾彼弱而我强第見興王而黜霸其敢與敵而助虐將為不戰而屈人莫我敢當可謂因時而後動其或恣睢不靖抗衡王師願洗滌于兵氛庻蕩除于邊境勿令不逞重更藩滋雖貔虎之難摧亦冦讎之可伐廟堂禦侮有决勝之深謀帷幄談兵復興師而薄伐如孤者雖處要荒久䝉徳澤在李唐則曽賜姓至我宋乃又稱臣頃因强敵之憑陵遂阻輸將而納欵玉關路隔久無撫慰之來葱領山長不得貢琛而去懷歸彌篤積有歲年幸逢撥亂反正之秋乃是斬將搴旗之際顧惟雄衆來逼吾疆如長驅急騎以争先終救死扶傷而不暇使彼望風而遁敗衂而歸豈知敢犯于皇威遽辱率兵而大舉期君如管仲則國人無陷溺之憂待予若衞公使邊境有長城之倚神明賛助草木知名功勲不減于太公威望可同于尚父力同剪滅無與稱將觀彼風聲鶴唳之音當見棄甲曳兵而走孤敢不榮觀天討練習武兵瞻中原皇帝之尊望東南天子之氣八荒朝貢願同周八百國之侯王四海肅清再建漢四百年之社稷佇聞戡定當貢表箋檄至如前言不盡意三朝北盟㑹編卷二百三十三
