body:
  text: 三朝北盟㑹編卷一百四十一宋徐夢莘撰炎興下帙起建炎四年七月二十七日丁卯盡八月十日庚辰二十七日丁卯金人立劉豫於北京國號齊金人册豫文曰維天㑹八年嵗次庚戌七月辛丑朔二十七日丁卯皇帝詔曰朕公於御物不以天下為已私職在牧民乃知王者為通器威罰既已殄罪位號宜乎授能乃者有遼運屬顛危數窮塞否獲罪上帝流毒下民太祖武元皇帝仗黃鉞而拯黔黎麾白旄而誓師旅妖氛既掃區宇式寧爰有宋人來從海道願輸嵗幣誓復漢疆太祖方務善鄰即從來議豈期天方肇亂自起釁階隂結叛臣賊虐宰輔招集姦慝擾亂邉陲肆朕纘承仰循先志姑存大體式示函容乃復蔽匿逋逃夸大疆域肆其貪狠自起紛爭擾吾外屬之藩鄰取其受賜之疆土因彼告授遂與解和終莫聽從巧為辭拒爰命將帥諄諭盟言許以自新終焉不改偏師傅汴首罪奔淮嗣子哀鳴請復歡好地畫三鎮誓至萬年凡有質要悉同文約既而官軍未退夜盡衆以犯營誓墨才乾密傳檄而堅壁私結人使陰啓事端以故再遣師徒詰兹敗約纍有畫河之議復成疑戰之謀既昧神明乃昭聖鑒京城摧破鼎祚淪亡無併爾疆以示不貪之德止遷其主用彰伐罪之心建楚新封守宋舊服庶能為國當其息民不料懦夫難勝重任妄為退避反陷誅鋤重念斯民亂於無主久罹塗炭未獲昭蘇不委仁賢胡能保定咨爾具官劉豫夙擅直言之譽素懷濟世之才居於亂邦生不偶世百里雖智亦奚補於虞亡三仁至髙或顯從於周仕當奸賊擾攘之際愚氓去就之間舉郡來王奮然獨斷逮乎歷試厥勳克成用是委之安撫德化行任之尹牧獄訟理付之總戎盜賊息専之節制郡國清况有定衰救亂之謀必挾拯變扶危之策使民無事則櫜弓力穡有役則釋耒荷戈罷無名之征捐不急之務搜隱逸舉孝廉振紀綱修制度省刑罰而去煩酷發倉廩而息螽螟神人以和上下協應比下明詔詢考輿情列郡同辭一心仰在宜即始歸之地以昭建業之元是用遣西京留守髙慶裔副使禮部侍郎知制誥韓昉備禮以璽綬寶册命爾封疆並從楚舊更須安集自相攸居爾其上體天心下從人欲忠以封王室信以保邦圻惟天難諶惟命靡常厥德保位爾其勉哉勿忽朕命玉册計六十六方每方字兩行金填字豫遂僣位於北京肆赦云門下自前朝失御率土無依內離民心致蜂起㺯兵之盜外開邉隙來鷹揚問罪之師山川靡寧干戈互動耕桑廢業壠畝彌望而荆榛老幼逃生廬舍多為之灰燼原野厭於流血溝壑填于殘骸兵火連年不休亂離自古所少言之流涕念及痛心嗟赤子之無辜冀皇天之降福宣命亟頒於上國郡制特設於東州顧某何人誤承此任自念風猷寡陋家世側微昔也壯年久林泉之是樂今焉晚節豈軒冕之為心屬乞退閒竟無允命提綱五路空殫夙夜之勞歷試暮年蔑著錙銖之效雖近地稍形於康乂而逺民未免於飢荒方圖自劾而歸敢有懷他之望顯册之既屢下要在必從避辭者凡四章無所不至使命愈加於促迫軍民不容於遁逃至於屬部之州列奏樂推之牘此豈人事致爾實有天數存焉知便安難遂於已私則吉凶宜同於民患當天造之草昧念王業之艱難恭授册儀尚循墻而欲避勉應位數若負刺之不遑雖非虞舜之明揚幸無成湯之慙德已於天㑹八年九月九日即皇帝位國號大齊布告中外咸知朕意尚念世道交喪國俗益訛貪頑未革於餘風詿誤多罹於憲網力期化洽深軫哀矜宜布湛恩與之更始可大赦天下云云於戲臨深履薄何以當副缺一字之隆拯溺救焚可以慰來蘇之望公卿宣力士庶協心共贊眇沖以臻康泰以前宗正寺丞李孝揚權左丞濟南通判張柬權吏部侍郎兼右丞子麟大中大夫提領諸路兵馬知濟南府以延康殿學士前宣奉大夫前太原尹張孝純依前宣奉大夫封開國公守尚書右丞相弟益北京留守都水使者王䕫汴京留守升東平府以為東京改南京為歸德府豫生於景州守濟南節制東平僣位大名起四部强壯為雲從子弟應募者數千人四太子南伐回以李鄴李俅李儔鄭億年臣豫以儔為監察御史億年權工部侍郎節要曰先是北中僞留守髙慶裔獻議於尼堪曰吾君舉兵止欲取兩河故汴京既得而復立張邦昌既被廢逐故再有河南之役方今河南州郡自下之後亦欲循邦昌故事元帥可首建此議無以恩歸他人蓋以金人自陷山東達蘭久居濵濰劉豫以相近奉之尤喜達蘭嘗有許豫僣逆之意慶裔尼堪腹心也恐為達蘭所先遂遽建議務欲功歸尼堪尼堪從其說遣慶裔自雲中由燕山河間越舊河之南劉豫節制舊河為界首至豫所𨽻景州㑹吏民於州治諭以求賢建國之意郡人莫敢言之皆曰願聽所舉某等不知賢者慶裔徐露以屬劉豫郡人迎合輿情懼豫權勢又豫適景人也故共戴之慶裔至曰爾與朝廷帥府之意正相合爾遂令列狀舉之慶裔至德傳東平一依景州之例既至東平則分遞諸郡以取願狀歸至雲中具陳諸州郡共戴劉豫之意及持諸吏民願狀於尼堪復令慶裔馳問劉豫可否豫陽辭之又且推前知太原張孝純慶裔歸報尼堪又遣慶裔喻豫曰戴爾者河南萬姓推孝純者惟爾一人難以一人之情而阻萬姓之願爾可就位我當遣孝純輔爾豫諾之尼堪於是令右監軍烏舍馳稟於金主烏竒邁從之故豫得僣立或謂本鄧州叛臣張綱中獻策於慶裔以三班奉職酬之復以其說為己見獻於尼堪非也金人入攻山東以邦昌為名不易官制風俗者其議素已定矣不然達蘭豈敢擅許於人耶劉豫揣意求於敵慶裔懷私屬於豫其所由來漸矣非自剛中始也然剛中之罪豈勝誅哉太行義士石子明與金人漢軍萬户韓常戰於真定大敗常軍石子明與韓常戰於山西真定烟脂嶺大破常軍千户劉慶餘為炮折其頸金人以萬户比都總管之職千户比節度使百人長比刺史今燕雲諸路民兵千户百人長乃以家業或丁數定之在軍則權為千户百人長散則還為散民三十日庚午水賊崔增攻太平州崔增自癸丑冦城下攻擊不克至是退去八月一日辛未朔嶽飛除昌州觀察使通泰州鎮撫使五月嶽飛有靖安鎮之捷生獲金人三百餘人至是嶽飛獻俘於行在授昌州觀察使通泰州鎮撫使桑仲陷襄陽府京西制置使有曺端者自京城陷聚衆擾於京西號為曺火星千秋遣人招之屯於襄陽城下是時桑仲在唐州盡取强壯為兵唐州之民在桐柏者盡為董平攢集屬董平者退進無所依皆盡室願歸於仲仲之衆漸盛遂自光化軍將冦襄陽千秋遣端禦之并檄鄧州談兖為援端與仲相遇於髙車急擊之仲敗稍退引端以獲捷報千秋㑹兖遣騎兵五百來策應千秋曰談安馬軍皆精鋭當策應功耶遂率衆退於中廬南漳之間且日令馬軍破賊仲聞端已退去整衆而進與鄧州馬軍遇地勢坡坂而有低林俗呼為孛羅岡非騎兵之利鄧州大兵敗仲遂冦襄陽千秋公安親隨兵未嘗歷戰陳皆輕佻欲出戰千秋不許至於再四乃令出戰悉用行纒扎腿以青紅帶繫定著新布衫如市井間做場㺯棒人仲以馬軍數百伏路兩旁俟親隨軍才過未盡即突出盡喝令坐親隨兵皆坐以棍棒次第敲殺之方其敲也有一人奮身而起大呼曰我與你擡擔仲之黨皆大笑有失杖者千秋下統兵官正貴等諸軍皆散千秋棄城奔於中廬仲遂據襄陽千秋遣人密說王闢使圖端闢者端之禆將也遂殺端衆軍皆散或百十人或三二百人各為火伴者莫知其數唯後軍李忠塞差逺獨不散散與不散者盡戴白巾聲言為曺太尉報讐千秋不可居乃轉往金州自此入川矣七月丁丑李允文為鄂州路安撫使知鄂州靖康間李允文以教王寓舜避奉使謫閒者數年張浚為川陜宣撫使道出鄂州允文謁之浚與允文皆行至西京以為京西提刑時趙宗印屯於郢州欲隨浚入川乃以兵馬盡交與允文而吳錫初受宗印招安亦在其中至是允文為鄂州路安撫知鄂州盡以其兵行張俊為檢校少保定江昭度節度使制曰門下三軍利用莫如忠勇之兩全十乘啓行尤貴文武之兼寵朕博稽輿論優奬虎臣乃進律疏之褒用竦在廷之聽具官某性資沈鷙材力驍雄得孫吳方略之竒兼信布爪牙之勇執干戈而衛社稷心存蹇蹇之忠安邉境而立功名躬履堂堂之陳昨緣多故尤見殫誠提萬旅以趨朝扈六飛而復辟旋因東狩留駐海壖偶敵馬之長驅帥王師而鏖戰奮當大敵援枹鼓以忘身坐掃妖氛用鯨鯢而築觀兹及行朝之底定復銷羣盜之搶攘併録茂勳用加醲賞秩視三公之貴地兼兩鎮之崇載錫爰田仍加真賦增中權節制之重示上將威儀之多於戲有功見知朕既每存於大信縱敵生患汝其不替於前功惟一心同奬於朝廷斯千載永書於令甲服豫之訓時乃之休十日庚辰隆祐皇太后至自處州盧益辛企宗護衛隆祐皇太后至行在李回楊惟忠防衛六宫王􅊅軍於信州王􅊅自馬家渡失守潰散由徽州走浙東至處州為神武右軍馮宗回追及戰於天寧寺前􅊅走福建路宗回及李俸追至南劍州然􅊅乃潰兵非盜賊也朝廷命軍於信州薛慶及金人戰於揚州軍敗被殺郭仲威棄其城奔於興化烏珠自建康回軍至六合縣欲發舟船取楚州路行而趙立在楚州薛慶在髙郵軍舟船不可發故烏珠駐軍六合未得歸達蘭自夀河寨往六合見烏珠議事請益兵㑹孫村浦夀河之軍共取楚州烏珠乃分三太子兵欲攻髙郵時郭仲威為真州鎮撫使移文報髙郵薛慶慶知金人欲攻已於是率兵來揚州㑹戰庚午慶至揚州與金人遇遂進戰不勝慶引還金人追至東門外慶墮馬被殺馬尋舊路走還髙郵軍中見之曰馬空還矣薛太尉其死乎仲威棄揚州奔興化姓氏録忠義傳曰薛慶建炎三年率兵數千據髙郵軍善用大刀勇冠諸軍知樞密院事張浚往撫淮南至髙郵軍慶詐降拜馬首迎入城執之浚部下陜西兵三千多見殺逼浚令出慶軍將士官告三千道四年除楚州鎮撫使朝廷約諸州鎮撫互相應援紹興元年金人攻揚州圍鎮撫使郭仲威慶往救之殺金人兵甚衆慶力戰而死人稱其忠勇絶倫能以功掩過者唯慶能之金人陷髙郵軍措置髙郵軍事國奉卿棄城走金人三太子既敗薛慶之軍於揚州即長驅侵髙郵軍副統制王林出城迎戰不勝奔於通泰髙郵軍事國奉卿走還楚州張用中軍徒黨歸於鄂州張用不受鄂州招安曺成以馬老爹事執捉中軍人多被殺戮者用之妻一丈青奮身出招中軍人𨽻麾下中軍人皆歸之用衆二萬人皆訴無糧食一丈青曰待我措置猶未知用受鄂州招安俄有人報用已受措置司招安一丈青乃率衆趨鄂州避馬友不由漢陽取間道出漢陽之後自下流渡江復與用合趙立起趙瓊寨民兵不至先是六月趙立起趙瓊寨民兵於城中七月復放歸本寨至是金人已陷髙郵軍達蘭欲併髙郵軍人共攻楚立遣楊栁金率親隨五十人起發瓊民兵起諸寨首領共圖解圍楊栁金至吳城土豪徐宗成曰滿家良賤皆為楊栁金殺戮今乃敢來此耶遂與土豪衡進及瓊等謀殺楊栁金抽其腳筋以棗木為大枷械其頸置之井上垂其身軀而死扛出之擲尸於清河中親隨五十人唯一二人得生還時楚州已破攻急立聞之大悔咬指出血滴血寫書責已差蔣某招諸水寨無應者趙瓊贈蔣某銀衣服等使歸援兵遂絶矣李邦彥吳敏李綱皆復舊官張琪移屯於襄安鎮初張琪屯於舒城縣界李成在舒州頭子山遣人索糧草琪懼之移屯於廬江縣四月琪破礬山寨先是盧巡檢者聚衆自保既邅琪所破乃奔散渡江途中之人以為奸細遂殺之六月琪破崑山寨至是移軍屯於襄安鎮范宗尹量移王時雍徐秉哲莫儔吳幵王紹王友王及之胡思等仍薦孫覩汪藻李擢陳戬等范宗尹量移王時雍等皆不聞奏議者譏其不公翟興令其子􅀈及趙林敗金人於永安軍金人侵及陵寢翟興遣其子􅀈及統領官趙林率兵由河陽南州至鞏縣永安軍邀擊屢戰皆捷襲逐至澠池縣出界翟興加武略大夫兼閣門宣贊舍人為河南府孟汝唐州鎮撫使馬步軍都總管兼河南府事管內勸農使朝廷以分鎮之權擢翟興為鎮撫使制詞有曰果毅自奮知略有餘總合師徒賈擕劍摧鋒之勇襲逐外敵有履軍搴旗之功先是兩河陷沒興以京西為河東河北接境是時尚有忠義之人聚兵保守山寨不願順畨者興遣親信持蠟書取間道以結約之如向滵王簡王英等數十寨願聽節制興具聞於朝廷上大喜遂命興經制使王擇仁同領其事擢興節制應援河北河東兩路軍馬使興遣人作商販渡河密齎撫諭自是并汾澤潞晉絳懷衛河陽等數州山寨首領盧師迪李吉李彥隆馬夜義李遵宋德輩至河陽見興矣孔彥舟據潭州朝廷降程昌禹鼎澧州鎮撫使兼知鼎州詔告既到昌禹檄傳鼎澧間孔彥舟在鼎州仍渡江取太平村入湖南界至寧鄉縣王以寧率師拒之不勝彥舟遂入據潭州逹蘭遣使特默萬户撫諭趙瓊寨達蘭㑹髙郵金人併攻楚州慮趙瓊寨或為楚州之援也乃遣使特默萬户往撫諭之瓊已拒楚州之命不發援兵一人徐宗成等殺其來使楊栁金遂力約特默萬户至宿遷縣追瓊等諸首領聽命三朝北盟㑹編卷一百四十一
