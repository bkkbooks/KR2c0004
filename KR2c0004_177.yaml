body:
  text: 三朝北盟㑹編卷一百七十七宋徐夢莘撰炎興下帙起紹興七年正月十五日丁丑盡四月詔遣使詣建康府佛寺為太上皇祈福劉錡權主管侍衛馬軍司公事張浚屢薦錡兼文武兩器真大將才至是行在平江府㑹侍衛馬軍司解潜與沿邉制置副使王彥兩軍喧爭于行宫門前遂兩罷之并其兵付錡仍除權主管侍衛馬軍司公事二十五日丁亥何蘇奉使金國回得道君皇帝寧德皇后訃音何蘇奉使金國回得訃音降詔何蘇奉使回得大金國右副元帥書其報太上皇帝久違和豫厭世升遐寧德皇后亦已上仙禍變非常五情崩潰叩地號天無所追及凡在臣庶悉知哀慕張浚行狀曰公與趙鼎當國時議徽宗在沙漠當遣信使通問遂遣問安使何蘇等行至是年正月十五日蘇歸報徽宗與寧德皇后相繼上仙上慟哭躃踊哀不自勝公奏天子之孝與士庶别應仰思所以承宗廟奉社稷者今梓宫未返天下塗炭至讐深恥亘古所無陛下揮涕而起斂袂而趨一怒以安天下之民臣猶以為晚也數日後求奏事深陳國家禍難涕泣不能興因乞降詔諭中外上命公具草以進親書外付施行二十八日庚寅以太上皇帝訃音詔諭中外朕以不敏不明託於士民之上勉求治道思濟多艱而上帝降禍延於我有家天地崩裂諱問逺至鳴呼朕負終身之憂遂懷無窮之恨凡我臣庶尚忍聞之乎今朕所賴以宏濟大業在兵與民惟爾小大文武之臣早夜孜孜思所以治兵恤民輔朕不逮皇天后土實照臨之無或自暇不恤朕憂故兹詔諭所宜深悉張浚具奏待罪陛下時遇艱難身當險阻圗回事業寢食不遑所以思慕兩宫憂勞百姓未嘗一日忘也臣之至愚獲遭任用在諸臣先每因從容及北狩事聖情惻怛淚數不已臣感慨自期願殱讐敵十年之間親養缺然莫之思顧其意亦求遂陛下孝養之志拯生民塗炭之難則臣之事親保家庶幾得矣昊天不弔禍變忽生使陛下抱無窮之痛積罔極之思哀復何言罪將誰執載念昔者陜蜀之行陛下丁寧告戒且曰我有大隙于金刷此至恥惟臣是屬而臣終隳成功使敵無憚况以沙漠之墟食飲憂慮兩宫處此違豫固宜今日之禍端自臣所至上叨近輔實愧心顔伏願明賜罷黜亟正典刑仰以慰上皇在天之靈俯以息四海怨怒之氣上降詔起公視事賜朱辨本家官田五頃先是建炎五年王倫奉使金國軍前修武郎朱辨同被差奉使河東大金軍前通問辨今在敵拘縻已十年其妻男流落江右並無生事纍重俸薄委是狼狽欲望朝廷特賜矜恤奉聖㫖令河州摽撥官田五頃賜辨本家王倫除徽猷閣待制充奉使金國迎奉梓宫使髙宫繪轉五經大夫遙郡制刺史充副使初建炎元年王倫以修職郎上書乞入國迎請二帝乃加朝奉郎為大金通問使金人方用兵留倫不遣紹興初秦檜為宰相通書金國求好二年金人遣倫回議和至是何蘇還得道君皇帝寧德皇后訃音至是時倫為左朝奉大夫右文殿修選主管台州崇道觀乃加徽猷閣待制為迎奉梓宫使以髙公繪副之王庶方知荆南聞訃音深慮金人藉此崩問邀求乃為奏其略曰先帝至慕道真宜用鼎湖故事奉衣冠刀劍起靈廟葬之名山盡舉送終之典使海內咸知梓宫還與否不足為國重輕彼雖欲萌何自而生然後遣使倘或請之未獲則以大兵攝之問罪致討不為無名因神民痛憤之時刷宗廟存亡之恥臣知梓宫可不請而得為策之上者庶欲聞奏將發得報知遣使已定不獲上楚真陽太平州鎮江火劉豫發奸細來淮甸及淮江諸州放火楚真陽太平州鎮江府皆火劉光世軍於太平州軍須帑藏一夕而盡二十四日丙辰詔親征詔曰朕以菲德獲承大統惟靖康之初變亂既極兩宫逺狩廟社無依以眇然一身不獲已而任天下之責苦身忍恥夙夜栗栗冀以格上天之心迎還鑾輿充致大養不圖降割乃正月丁亥太上皇帝寧德皇后諱問奄至禍變非常振古無有號慟殞絶呼天不聞詩不云乎哀哀父母生我劬勞欲報之德昊天罔極孝子不獲養其親人情之至痛也朕有甚焉抱恨終身曷其窮也朕君臨天下不能逺德致兵興一紀毒流四方億萬生靈委骨草莽者非其父母則其妻子兄弟之人人愛其親一也使至於此咎由朕躬思與萬邦同致此憤丁巳詔書曰往臨江滸矧銜巨痛何敢康寧將以良日遂登戎輅咨爾中外相臣將臣卿士大夫下及三軍以至黎庶共懷忠義期濟多艱戮力一心以承朕意是日發平江府吕頥浩來朝先是以知臨安府召吕頥浩時行在平江府張浚請幸建康頥浩先赴行在欲諌止建康之行浚阻之不得見頥浩乃止嶽飛加太尉三月車駕幸建康吕頥浩加少保為行宫留守上逹建康吕頥浩見上請退駐臨安府臣僚言其罪上皆不從乃加頥浩少保為行宫留守而召孟庾回十一日癸未詔撫恤將士詔曰朕思親屬萬里用兵十年士卒久勞衣不解甲邉城晝閉馬不輟鞍冒墮指之祁寒觸流金之毒暑違離親屬暴露風埃諒寢食之非宜嗟室家之靡托所賴將帥撫恤勤勞使之忘生誓不旋踵尚慮偏禆之未諭不能悉體于朕懷或狃故常罔知存恤廬舍風雨之不息衣糧藥物之不將無均食用服之人廢挾纊投醪之義朕惟待士卒如子弟則人將尊我如父兄待士卒如腹心則人將捍我如頭目有施必報其理甚昭夫師克在和恩貴素蓄將用行師之命當明勞苦之情朕雖宅憂敢忘爾衆宜思輯睦以副朕心二十三日乙酉王彥洪州觀察使除知卲州以其兵馬𨽻馬軍司劉錡王彥為前設副軍扈蹕平江也坐小校與馬司偏禆喧爭降授雄州防禦使至是以疾乞終喪制乃復授洪州觀察使除知卲州制有曰出入纍年問望愈顯而再三自言力求避事朕嘉其冲尚之志念其懇欵之誠復廉察之崇資分符竹之重寄陛辭日上撫勞再三曰以卿兼能牧民付之便郡須疾安即召既行又遣中使賜方釘寶帶命以所部兵馬𨽻侍衛馬軍司劉錡彥聞之喜甚曰所付得人矣楊沂中回軍行在劉光世加少師依前三鎮節度使充萬夀觀使進封營國公劉光世得風痺病纍上章乞罷乃召赴行在所將慰勞而復遣之既至則所請彌確以金榖百萬上於朝廷以所𨽻軍馬宜盡充衛兵以重王室上偉其奏而許之遂特授少師依前三鎮節度使萬夀觀使進封營國公兵部侍郎吕祉節行營左護軍王德為行營左護軍都統制初吕祉知建康府常有克敵之志宰相張浚大喜之召權兵部侍郎遷給事中又以刑部侍郎為都督府參議官除兵部尚書浚以劉光世每持不戰而罷其兵謂祉知兵命往節制淮西軍馬以王德為都統制祉辟陳克為參謀遺史曰陳克字子髙有詩名欣然應其辟葉夢得與克親厚止之不從夢得曰吕安老非馭將之才子髙詩人蓋文章非國士也淮西諸軍方互有紛紛之論是行也危矣哉亦不聽命夢得贈以詩曰靜談班定逺那厭庾征西克留其家以單騎從軍後酈瓊之變幾於不免四月張浚往淮西視師先是張浚欲征劉豫㑹四大將於龜山問之曰欲大舉以取劉豫克復中原如何劉光世請守韓世忠請進兵張浚曰都督欲戰則戰欲守則守惟嶽飛獨以為不可用兵浚再三問之飛堅執不可之說浚以飛為玩寇議不協而罷至是浚往視師以淮西之軍新易大師也上張相公書闕姓氏某東吳鄙人行年三十有二未嘗輒至貴人之門取辱閽吏惟閣下自巡按以來延見賓客欲求賢者共濟乃事然而草萊之間欲願見閣下者亦多矣學短才陋識不甚明閣下膺天子之寄四海指掌日為中興之計亦甚切矣故不敢飾空聞上惑閣下之聽某嘗與畎畝中人論天下事無不歎息在口亦不能盡言于閣下也某竊觀比者金人入界輒屯兩淮意欲束葦渡江事如前日豈謂主上親御鞍馬諸軍士奮勇彼不得前一旦遁去者此皆我祖宗之靈天下之幸甚嘗論之曰敵在承楚無糧可因惟逺賴清河之運舳艫相銜適水寨之人出沒淮泗敵勢既不得前而又不敢遽遁我當一軍自廬夀一軍自滁和一軍自通泰然後遣海船入淮張聲勢間使遊艇劫之或斷橋或焚廩使敵進有天長髙郵之敗而糧不相繼退有廬夀滁和之疑而又有長淮平渡之患間使水寨探其營壘敵勢晝夜不得休息蓋不戰而自屈也某自顧人微言輕不得以進其說今閣下復領都督巡按於兹觀閣下之意非有事于中原乎嗚呼中原之不易復亦猶大江之不易保也何以言之某嘗論自金人用兵十餘年所向無不可者去嵗之來以其大軍深入無糧可因而又運漕不繼道當承楚之險皆非金人所長在我雖曰再勝在彼豈不曰非天時地利而糧不繼也孫子曰再勝在彼久則鈍兵拙鋭以我十年退保之師雖曰再勝閣下能保其無長驅乎某又觀大江之險往往自戰國以來能保者惟孫權一人而已蓋曹公赤壁之敗實因連舟不解假以風便偶成其功及在濡須孫權堅守東關使曹公不得窺伺大江而卒亦遁去南唐棄淮甸而亡今閣下不營淮南而大江可以自保乎某又嘗論自金人用師以來四海無不塗炭為怒甚矣中國之與契丹帑藏之積幾數百年至於子女玉帛未有盛於此時者也一旦并兩國所有盡歸金人又易曰天道惡盈而好謙天下豪傑之士寧不動心乎又况金人北有黑水韃靼契丹西有西夏吐蕃回鶻東有髙麗國南有大宋邉面既廣怨憤日深一旦諸國並進則南北之勢不救金人無長策矣今閣下若欲興復中原非遣間使連絡西夏尋契丹中諸國命內外夾攻使金人首尾不顧則中原不易取也閣下豈不念金人初破契丹非本朝有燕山之役何以至此昔申胥哭秦庭七日不絶卒能興楚閣下當或留意某雖愚不惜為閣下一行也閣下若欲且守大江非以一軍淮西一軍廬夀一軍蘄黃一軍安復一軍荆襄各為營田如犬牙之制使敵得窺伺大江則大江未可保也昔諸葛亮有渭南之屯司馬氏不得西向今閣下若能駐軍淮甸上連荆襄且耕且戰示以堅守如諸葛之在渭南使某起西北之師若申生之在秦也今日之事譬如泰山頽而大厦毁非一土一木之所能也茍非左右牽制使閣下攬轡於其間則某未見其策也某暗于時事草萊之間亦不乏人閣下若能舉一賢者置之募府無備員之歎某不孝在衰絰中不敢進見閣下若以當今利病事非一端豈筆舌所能既也幸察焉三朝北盟㑹編卷一百七十七
