body:
  text: 三朝北盟㑹編卷二十八宋徐夢莘撰靖康中帙起靖康元年正月六日壬辰盡七日癸酉六月壬申行營輜重次尉氏李綱獻議城守罷親征以綱為御營京城四壁守禦使詔今來團結軍兵捍禦敵馬如立到功效並當不用常例特加恩賞多出文榜曉示軍兵詔方今兵興應內外官司局所除留後苑作御前製造御前生活所應副道君太上皇帝外其餘一切依熙豐法令罷者並罷錢物並歸左藏庫送納三省樞密院條具以聞凡罷五十餘所閣門宣贊舍人吳革自關中帥師勤王入城吳革初被詔彌旬未得敷對與宰相唐恪計事恪不知兵不甚合革謂所親曰斡里雅布尼堪等易與耳朝廷如用革䇿其來也可使隻輪不返有識者壯其言革屢陳竒謀當路者不合不得專制耳太宰白時中罷相宫祠李邦彥太宰張邦昌少宰白時中制門下熙朝任相當嚴進退之規明主馭臣冝厚始終之禮惟時端揆翊我初元顧謀國之未臧肆推恩而許罷特頒顯號用亶具寮特進太宰兼門下侍郎兼神霄宫使慶國公白時中性禀中和心存愷悌蚤通經術靄貢薛韋康之聲晚被眷知居蕭曹丙魏之地方敵騎驛騷之日乃廟謨經略之時排難戎亭懦弱訖成於無斷投閒真館保全實賴於有容賜以安車俾還私第爰念上皇之元弼載憫春宫之舊寮特示眷存聿崇體貌錫隆名於祕殿畀秩任於殊庭拓衍原田陪增圭賦於戲參朱邸之佐嘗克盡於中規追赤松之遊尚永綏於夀嘏祗膺異數益體至恩可特授觀文殿大學士太乙宫使依前特進慶國公加食邑七百户實封三百户李邦彥制門下軌三光而遂萬物永資當軸之勳遜五品而填四夷尤賴秉鈞之大亟頒庭號登冠台符起復銀青光祿大夫少宰兼中書侍郎兼神霄玉清萬夀宫使李邦彥俊德明謨閎才逺器學貫天人而守以虛靜之量識窮治忽而發以忱恂之詞蚤擢倫魁旋持從槖嘉猷婉畫久翔政路之榮偉譽英聲寖亞宰司之重粵從定策彌見竭誠日月增輝方奠朝廷之勢風塵有警遽深邉鄙之虞盡忠而人絶間言制勝而慮無遺算謝安之矯情鎮物足抗符秦李靖之料敵臨機何憂突厭國威既振民志以寧是用序升宅揆之官進二納言之任文階峻陟井賦陪增以彰體貌之嚴以示倚毗之厚惟時所望非朕敢私於戲杜如晦長於斷謀坐翌隆平之運姚元崇善於應變永扶泰定之期勉紹徽聲佇觀丕績可特授起復特進太宰兼門下侍郎兼神霄宫使加食邑七百户實封三百戶張邦昌制門下股肱之起元首庸聞舜帝之歌舟楫之濟巨川備載高宗之命聿求雋望式贊鴻圖在資考以惟精顧登庸之敢後誕揚孚號明告治庭正奉大夫守中書侍郎兼充神霄宫副使張邦昌識敏而器閎才高而學博潔於行已保禮義亷耻之四維靖以立朝茂正直剛柔之三德粵登庸膴仕以亟進惟嘉猷成績之具存念天步之維艱憂民心之未定允資厭難尤賴協恭是用擢升亞揆之崇進二上臺之重仍兼官於鳳沼俾亮采於龍墀併衍爰田申加真食庸昭異數益示殊私以朕初載論相之明為爾盛年得君之寵於戲敉寧中外矯情當慕於謝安鎮撫邇遐守正冝師於裴度欽承豫訓益茂乃誠可特授少宰兼中書侍郎神宵宫使加食邑七百户實封三百户遺史曰是月渡河報沓至宰相執政官方次叙遞遷欲以應非常之變識者以為難幼老春秋曰李邦彥字士美懷州人父為銀匠喜與進士遊河東舉人入京師者至懷州必投其父後罷工為商仍量給資以送其行時人謂之結秀才緣父名浦以邦彥貴贈龍圖閣直學士諡宣簡公邦彥性俊爽同學服其敏而工然喜習閭閻鄙猥事自號為李浪子大觀二年第一人及第善事內侍故內侍多薦之纍遷中書舍人翰林學士諂事梁師成至是師成薦其才美風姿宣和三年遷尚書左丞以親喪去位及起復王黼為相與邦彥不協邦彥隂結蔡攸及諸內侍譖黼罷之七年拜少宰惟以諂侫取容略無建明喜謳善謔尤能市井鄙俚之語每以鄙俚之語綴成小詞無賴子得之喧傳里巷邦彥嘗自言賞盡天下花踢盡天下毬做盡天下官都人亦呼邦彥為浪子宰相至是除太宰王淙濋主管殿前司公事王淙濋者上母王皇后之親屬也上欲寵異母黨乃除淙濋主管殿前司公事淙濋素驕貴不能任事自高俅領殿前紀律弛壞敵國侵入遽命淙濋識者為之寒心焉七月癸酉治都城四壁守具傳信録曰先是親征行營使置司於大晟府辟參謀官書寫機冝勾當公事管勾文字准備差遣統制統領將領准備差使等擇文武官處之吏房户房兵房工房選三省人吏處之上賜絹錢各一百萬貫匹文臣自朝請大夫以下武臣自武功大夫以下及將校官告宣帖三千餘道一切許以便冝從事自聖駕御樓之後方治都城四壁守具以百步法分兵備禦每壁用正兵萬二千餘人而保甲居民廂軍之屬不預焉修敵樓挂氊幕安炮座設弩床運磚石施燎炬垂檑木備火油凡防禦之具無不畢備四壁各有從官宗室武臣為提舉司諸門皆有中貴大小使臣分地以守又團結馬步兵四萬人為前後左右軍軍八千人有統制統領將領步隊將等日𨽻習之以前軍居東門外護延豐倉有豆粟四十餘萬石其後勤王之師集城外賴之以濟以後軍居宋門占樊家岡使賊不敢近而左右中軍居城中以備緩急斡里雅布犯京師是日京城戒嚴城門晝閉令百姓上城守禦京城男婦老幼相携出東水門㳂河而走者數萬遇金人殺虜者幾半金人從城外放火燒屋宇光熖燭天連夜不止城中人皆懷恐懼幼老春秋曰京師承平已久庶冨極盛金人深入縱兵虜掠數百里內居人皆避之强民千百為羣路途邀截劫掠或詐稱金人者諸門皆閉守禦之具猶未畢集金人以大船乘便流縱放而下急攻西水門西水門之上流先已設械於汴水之中為械所拒大船不得下城上矢石俱發力禦終夜逮曉金人方退復攻酸棗門一帶渡河口以雲梯倚城尚書右丞李綱令諸班直以弓弩禦之殺死甚衆自卯及午金人稍退始議與我遣使矣初得燕山也燕人有求京師居者軍民伎藝百色有之雜居坊巷中與漢人無異金人入京師京城軍呼燕人為細作皆執送開封府無慮數百人開封府不得已該收之後亦放還自五七日治戰守之具粗畢而敵已至城下趙野除門下侍郎王孝迪除中書侍郎蔡懋除右丞唐恪除同知樞密院事吳开莫儔直學士院李鄴奉使回先是十二月中旬聞敵馬逼近遣李鄴借給事中奉使講和至是回盛言敵兵强盛曰金人之兵入水如蛟入山如虎登城如猿不可敵也朝廷速冝與和再遣鄴與李稅等行靖康前録曰鄴先賫金奉使敵入吾境且喜且懼日行不過一舍又知聖上繼明伐其始謀已有求和之意偶逢鄴於趙之境上鄴漏機知我弛備遂晝夜行一百五十里又曰李鄴歸自敵壘盛談敵强我弱以濟和議謂敵人如虎馬如龍上山如猿入水如獺其勢如泰山中國如纍卵時人號為六如給事斡里雅布下寨於牟駝岡敵馬初抵城下寨於牟駝岡牟駝岡者京城西南隅地也岡勢隱鱗如沙磧然三面據水前枕霧澤陂即孳生馬監之所芻豆山積郭藥師來朝命打毬於其間故知可以為寨地金人兵至徑趍其所斡里雅布攻城李綱禦退之傳信録曰是夕金人攻西水門以小船數十隻順汴流相繼而下余臨城捍禦募敢死士二千人列布於城下待船至即以長鈎搭就岸投石碎之又於中流安頓乂木及運蔡京家假山石疊門道間就水中斬護百餘人自夜防守至旦始保無虞入對垂拱殿方奏事間傳報敵兵攻封丘酸棗門一帶甚急上命余往督將士捍禦余慮城上兵卒不足用即告上乞禁衛班直善射者千人以從上遣御藥盧端同行傳㫖以所乞自禁中至新城酸棗門幾二十里行夾道委巷中惟恐敵之已登城也抵城門敵方渡濠以雲梯攻城余命班直乘城射之皆應絃而倒余時坐酸棗門下自門上擲人頭下至六七不已詢之云斬獲姦細俾驗認皆漢人首級也蓋擾攘中兵卒妄行殺戮捕獲數人即斬以徇因便號令如獲姦細捕人登城督領驗實准賞輒殺者斬自是乃止余與官屬數人登城督戰激勵將士人皆賈勇近者手炮檑木擊之逺者以神臂弓弩射之又逺者以床子弩座炮及之而金人有乘筏渡濠而溺者有雲梯而墜者有中矢石而踣者甚衆又募壯士數百人縋城而下燒雲梯十座斬獲敵首十餘級皆耳有金環是日敵攻陳橋封丘衛州等門而酸棗尤急敵箭集於城上如蝟士卒有中傷者皆厚賞之上遣中使勞問降詔褒諭給內庫錢酒銀碗彩絹等以給將士人皆歡呼自卯至未申間殺敵數千人敵知城中有備不可以攻乃退尚書駕部員外郎鄭望之借尚書工部侍郎充奉使大金軍前計議使髙世則充副使使斡里雅布軍前鄭望之靖康城下奉使録曰靖康元年正月七日望之任尚書駕部員外郎往太僕司選馬兵部尚書路允迪來傳語約同到都堂問子細既到都堂見官吏紛擾望之徑入太宰李邦彥閣子宰執具在亦有從官三五員少宰張邦昌正行步前執望之手曰鄭郎中在此可往時有一內官在側邦昌即令任圭奏云已差駕部員外郎鄭望之去望之白云不知何事邦昌云適有何灌奏言金人已到城北朝廷已遣使人出來勞軍恐有啇量望之又云乞見得使㫖乃行邦昌云有甚㫖賢且往軍前看他家如何俄有一內官同圭來傳宣令押奉使出門借尚書工部侍郎充奉使大金軍前計議使副使差髙世則後聞得朝廷差葉三省未到聞望之適到都堂遂差委是時倉卒更不暇往國信所關鞍馬袍帶邦昌顧小吏取公服允迪假金帶鞍轡狨坐上馬到安逺門登城見何灌人馬在城下擺布遣語音髙大者過濠望金人軍前聲言朝廷遣工部鄭侍郎往軍前奉使可遣人來打話見一紫袍人稱太師一白袍人稱防禦紫袍人係燕人吳孝民白袍人係金人吳孝民云皇子郎君到趙州路上截得今上皇帝即位赦書以手加額既是上皇禪位無可得爭却與他講和休如今來南朝只是買賣也望之問買賣之說如何孝民云要割大河為界定要犒軍金帛望之云如此則非是買賣譬如有人買絹一匹索價三貫買者酬二貫五六百文又添一二百文遂交易如此謂之買賣今既要金帛又要割地而彼無一物與我豈可謂之買賣止是強取孝民更不說話便要入城至都亭驛約四更多時才到驛上賜到御筆適知鄭望之已回不知有何語一一先奏來靖康前録曰時議遣使以平昔不能求才倉卒間無可任者及以侯栖筠為正使召至都堂逡巡間已不知所在方再訪詢間偶鄭望之來遂執之借户部侍郎使宰執袍帶衣之承命而行又求一人選為副使樞衡在列無有識者門下侍郎趙野云近有郝抃來參不知其中如何但見其人物稍得即命抃為副自承信郎借刺史以行三朝北盟㑹編卷二十八
