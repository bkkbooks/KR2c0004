body:
  text: 三朝北盟㑹編卷八十三宋徐夢莘撰靖康中帙起靖康二年二月二十一日辛巳盡三月初六日丙申二十一日辛巳大元帥宿任城縣大元帥早發中都晚宿任城是夕北兵仍懷懼敵不樂南去縱橫置椅桌於大街以限阻往來將發火謀亂張俊刺知巡寨得賊斬首以徇是夜諸營警嚴皆不敢寐金人移文催發宗室南班官金人移文宗室南班官等須管二十五日前解發盡絶不許漏落一人開封府委官使臣小火下散行搜索大街小巷無不周遍如捕盜賊每得宗室及家屬悉被拘監饑飽不問以待遣發出城二十二日壬午大元帥宿山口鎮大元帥早發任城晚宿山口鎮耿南仲汪伯彥耿延禧董耕耘髙世則方侍食有濟南府鎮趙不羣所部民兵告軍民人謀放火作亂係同火出首王密遣張俊擒捕到首謀者訊之無異號令凌遲處斬餘皆不問厚賜告人金帛犒以酒食自此作亂者方息二十三日癸未大元帥至濟州王早發山口鎮申刻至濟州京東西路提㸃刑獄李端弼髙士瞳守臣張存通判李逮及士庶出郊以迎王入城歡聲夾路中興記曰二十三日至濟州是時元帥軍濟州自黃而南分布勤王之師宗澤屯澶州以拒敵之在衛南韋城者閭丘升屯濮州以拒敵之在臨濮南華者黃潜善在曹州以拒敵之在考城者趙野范訥在南京以禦敵之在寧陵襄邑者向子諲在宿趙子嵩在野陳何志同在許皆圍京師未得進或勸約諸道同日大進兵戈鏖戰决勝負於一日或以為敵在城上外逼之則下而入有不可言者又惑於曹輔張澄之說未敢前金人取太學録黃豐楊願黃豐楊願皆舉人學録近試選每占髙等金人忽移文取之或疑謂是前所發進士三十人中有仇者言其姓名乞取赴軍前二人皆託疾竟得免行二十四日甲申金人殺禮部尚書梅執禮侍郎程振陳知質給事中安扶鞭御史胡唐老等四人遺史曰金人移文督責金銀極為峻切官司驚懼莫知所措逮晚乃追四壁提舉根括金銀官梅執禮等四人及催促金銀官黎確等四人並赴軍前尼堪震怒拂膺作色叱責已而命執提舉官四人於監軍處殺之於是執禮振知質扶皆被害復令籖首令衆棄尸於南薰門下又命執催促金銀官胡唐老胡舜陟黎確等四人各鞭背五十放還唐老遂死確等號泣過市自是人心憂懼謂殺侍從捶臺諫疑啓亂之端定在朝暮持兵器巡警者又復如初自丙寅以後金人使命入城者漸漸徑造宮闕如詣私室折花飲酒自相娛樂或乘醉插花滿頭聫韉而行旁若無人觀者無不切齒先是車駕未還百姓皇恐以為金銀不足各隨其家所有而出復得萬金納去敵求索不已須待元數滿足又令户部尚書梅執禮主東壁開封府尹程振主南壁禮部侍郎安扶主西壁工部侍郎陳知質主北壁便搜索百姓所藏金帛皆親至其家發掘凡十餘日梅執禮謂程振等曰金人講和已定但以金銀邀車駕金人若須元數銅鐡亦恐不足尼堪豈不知此事不如結罪狀申絶塞其所請於是四人共結罪狀言金銀並以搜括更無銖兩如後不同甘依軍法以申軍前軍前復索金銀官司稱己申去稱無有金人以為居民藏匿不肯盡數送納因醫官內官樂官三等人於元帥處下狀稱本家有窖藏金銀乞下開封府依歸尼堪謂三人曰只汝三人敢藏金銀三人復稱在京權貴豪富人家各有窖藏不曾獻納又內侍等有說尼堪者曰今城中百姓乏食家家急欲得米試令開場以米麥出糶許以金銀博易便可見其有無之實尼堪從之下令開封府開場糶米又以官錢髙價收買置十數場金每兩三十五貫銀每兩五貫五百文金每兩博米四斗銀每兩博米一斗時百姓固藏金銀後見金人無去意城中糧乏惟憂饑死又爭以易米麥初城破軍民詐為金人劫取金銀者至是爭持以易有貧民兵卒以十餘錠金易數石麥者尼堪等愈疑多有藏匿持以責府尹官吏曰公言無有博易何多官吏不能為之對遂殺執禮等四人又斬其首許其家以金銀收贖或云敵欲盡城中物乃因藍欣等復取金銀過軍前責執禮等以實故害之僉言曰或謂金人所殺四人者之緣由欲結兵以救二聖曽與王時雍議事不從時雍以聞金人欲正名其罪恐動衆心故以金銀事殺之若為金銀事自有四壁根括執禮為副留守非其職也宣和録曰金人搬運器物自陽武九十里黃河入北清州徑趨金國二帥左右姬侍各數百秀曼光嚴紫幘青袍金束帶為飾將亦不下十人壁中珍寶山積求取無厭內使權貴鬻爵納賂各歸於敵猶以為未足遣使督責旁午四壁以從官臺官各一人提舉催促府中差官巡門提轄四壁又添官十員措置收買仍令諸倉以米豆換之再納金七萬五千五百八十兩銀一百一十四萬五千三百兩表段四萬八千四百匹又遣使人提舉官以金帛遲延監欲勒赴軍前嘗曰京城總七百萬除無力下户寧不出金銀一錠耶明日金使來勒留守大尹提舉人供狀銀五百納足完數二十五日金使趙少監傅監軍指揮請入人提舉官赴南薰門受約束人皆重其出相謂曰吾儕倘出門必留營中不返矣或曰受朝廷文字催促才五日今三日而所納之數比前一月反倍之復何罪可留正猶預敵又遣蕭將軍促之不得已遂行既出門監軍金牙郎君者倨坐呵責不容辨梅執禮等四人皆擊死仍斬之弃其尸門下令其家以金銀贖侍御史胡舜陟殿中侍御史胡唐老監察御史姚舜明王候各杖百餘幾死乃下令曰根括官已正典刑金銀或尚不足當縱兵自索二十五日乙酉大風埃不可行以官序科金銀表段金人以金銀數少科定在京官員執政官金二百兩銀二千兩表段五百匹侍從官金一百兩銀三百兩表段一百胥以次及選人校尉盡科定數目令日下送納如遲全家押赴軍前人心恐懼二十六日丙戍夜白氣貫斗二十七日丁亥大元帥府措置印賣鹽鈔大元帥駐於濟州慮經費不給隨軍使梁揚祖建白京城圍閉鹽法不通私商公行國之利源徒成虗設乞權宜此類在京𣙜貨務法措置印造給賣東北鹽鈔許客人入納見錢買鈔引前去兩路鹽場請領鹽貨候金人退京師城開日住罷從之尋委揚祖總領措置局印造鈔引節次分給濟濮州廣濟軍興仁東平濟南府沿流州軍自是公私稱便軍須供億遂有羡餘而斂不及民金人令百官勸進張邦昌唐恪飲藥卒或云服腦子或云服大黃而死唐恪字欽叟紹聖畢漸榜登第靖康元年再拜天官除同知樞密院事進中書侍郎八月拜少宰附耿南仲排李綱敷主和議嘗建白謂金人秋髙馬肥必再來乞駕幸長安為綱所阻遂乞祠侍御史胡舜陟上疏言其奸罷相除太乙宮使至是飲藥而薨汴都記曰朝廷以唐恪為相恪俗吏昏懦無能軍民且欲擊之馮澥對曰且陛下取曹司為宰相事將奈何恪敷務交締內侍通濟為姦臨事喪機士大夫或以竒謀祕計獻於恪恪厲聲曰此時見措置士亦自沮不復言二月半間先喪其夫人恪遂服大黃作腹病以死是時金人正取之恪以前宰相恐不免故自裁朝野簽言曰金人初六日變議十三日羣集議于尚書省議推戴張邦昌金人有榜百官觀之有泣涕者恪大慟一年少郎君斥恪曰公為丞相不能為朝廷計事以至今日况朝中皆亡國之大夫也平時鬻賣官爵習蔡京不法所為猶厚顔赴議舉異姓實負國家哭之何益三十日庚寅吳幵莫儔來報云邦昌來日入城以觀人情仍令幵儔語城內人萬一有疏虞即一城盡為血池更不他擇矣於是治尚書令㕔及西府以待之三月一日辛卯朔太宰張邦昌入南薰門遺史曰金人告報城中欲遣張邦昌入城御史臺檢准故例宰相入城百姓合迓於門徑行曉諭文武百官於未時前詣南薰門迓少宰公相如期而集者凡數千人士庶往觀者又數萬人范瓊江長源諸統制官等領兵分列左右自州橋至門下森布如織申刻邦昌入門百官班迎於道城外以鐡騎護送及門而返交割與范有說諭在京諸軍民曰交割取一箇活張相公致他死後便是恁悶不肯推戴故殺了他也即入憩於幕次與從官語移時入居尚書省令㕔令從官卿監郎官十員晝夜宿直續增作五員掌管事務并使臣十五員祗應三衙門官亦同宿守敵令勸進集議於尚書省令所榜留守司今月一日元帥府津送到太宰入城已具軍民推戴文狀申軍前去訖今來合取指揮右曉示各令知悉僉言曰初邦昌在燕自正月間金人令同蕭王等至京城下方百姓推戴時邦昌皆不知也尼堪斡里雅布令王芮持推戴文字示邦昌讀前後文畢大驚曰趙氏無罪遽蒙廢滅邦昌所不敢聞必欲立邦昌請繼以死二帥令王芮召邦昌邦昌曰元與蕭王曹駙馬奉使每元帥召即三人俱行不可獨往芮強之以行至二帥前二帥說推戴意邦昌堅避如是者半日二帥知邦昌不可強乃詭言曰大金皇帝有詔令立宋之太子以公為相善為輔佐毋使敗盟請公入城邦昌入門修帽凉衫以扇障面呼喝如宰相儀徑詣尚書省下馬百官拜階下邦昌答拜金人有㫖如三日不伏推戴先戮大臣次盡殺軍民百官父老哭告拜邦昌令即權宜之計救取一城老小王時雍徐秉哲呂好問曰大金欲册立太宰三日不立將夷宗廟殺生靈邦昌謂時雍等曰諸公怕死乃掇送邦昌雖督責而歸焉可免禍身為大臣豈篡逆耶有死而已時雍等強之邦昌引刀自裁衆奪之遂議申推戴文字至金國軍前靖康小録曰邦昌初顧義且堅避久之百官有進言於邦昌相公宜從權他日相公為伊尹為王莽皆在相公邦昌乃勉從之曰邦昌以九族保此一城人又欲以刀繩自裁或曰相公城外不死今欲死塗炭一城耶遂已二日壬辰金人文字來限三日立邦昌不立下城盡行殺戮都人震恐差事務官是日差給事中馬夀隆中書舍人李熙靖左諌議大夫洪芻兵部尚書呂好問工部侍郎何昌言軍器監王紹吏部員外郎王及之禮部員外郎董逌户部員外郎李犍工部員外郎李士觀刑部員外郎呂勤倉部員外郎曾慥光祿少卿黃堂傳作郎顔博文充事務官三日癸巳金使來促勸進取推戴狀告報官員僧道百姓軍人耆老等盡赴㕔立班推戴邦昌衆人泣勸再三從之留守司遂以推戴文狀申軍前大金元帥府劄文武百官軍民僧道耆老吏部王尚書等申今來軍民等悉願推戴張太宰緣京城無主日久伏望早賜遣備禮儀施行者故今日遣翰林學士承㫖吳幵等入城蓋因此事請文武百官軍民耆老僧道吏部王尚書等照㑹施行發運判官向子諲遣李植赴大元帥府獻錢糧助軍用發運判官向子諲遣泗州進士李植賫金帛赴大元帥府以本錢糧之在濟州者悉獻帥府以助軍用王喜奏植承直郎四日甲午留守司榜今月三日吳承㫖莫內翰自軍前歸准大金元帥府台令今已差官初七日行册命之禮右仰軍民耆老僧道等各令知悉五日乙未尚書吏部榜准都省禮房帖子仰東上閣門火急告報文臣選郎以上武臣承信郎以上并致仕尋醫侍養官於受册日須管盡數要到如稍有漏落必定作施行不得住滯勘㑹今月七日受册並合赴文德殿立班須至曉示右出榜各令悉委六日丙申閣門儀制榜今月七日僧道父老於尚書省令所下立俟太宰上馬導引至右掖門先退太宰至文德殿門外下馬仍詣殿東朵殿幄次更衣文武百官諸軍將校文臣選郎武臣承信郎已上於殿下東西兩間面北併設儀仗於殿下排立皇帝望大金國闕褥位於殿下少立俟册寶入門至位皇帝降階褥位望大金國闕拜訖俟册寶至褥位讀册設寶皇帝跪受訖再拜升殿即坐文武百官等七拜訖起居稱賀五拜訖退右曉示各令知委又東上閣門榜文臣選郎以上武臣承信郎以上并致仕尋醫侍養官於受册日並合赴文德殿立班侍從官並宿令所以待行事三朝北盟㑹編卷八十三
