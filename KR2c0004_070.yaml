body:
  text: 三朝北盟會編卷七十宋徐夢莘撰靖康中帙起靖康元年閠十一月二十六日丁巳盡三十日辛酉二十六日丁巳大雪金人盡得四壁乃伐城上林木并斫取柩板作障及蔽城內炮架貔籬巴皆回之內向城外盡作慢道城內則因髙為昻橋不三四日皆備初破城敵下令縱火屠城何栗率百姓欲巷戰由是金兵不敢下乃唱為和議人心稍安十六門皆為畨兵占守吾兵無一人在城上者當日早班直及諸處軍奪萬勝門奔走者四萬許人太上皇鄭皇后內居延福宫景王及謝克家為請命使於軍前城陷上急召大臣親王侍從而至三人謝克家其首也因與徒步入閣中計議俄頃遣謝克家景王使軍中請命傳聞太上旨意極謙皆以全活生靈為主上降親扎宣羣臣孫覿辭免待制奏狀曰臣伏自去年閠月二十五日京師失守訩訩夜二更上降親扎宣召臣等聞命馳赴而門禁已不通已自城南西岡循祭河直北繇宜秋門以入通夕大雪四靣縱火煙熖屬天如晝夜衣冠士卒毁容易服纍然趣萬勝門而去門關亂兵中至東華門騎吏皆不得從獨持一笏以入有頃召見上已微服坐祥曦殿後內侍直舍人引之謁上而學士莫儔以館金使劉晏為亂兵所逐不知所在吳开偶得疾僵仆坐間故臣獨掌書詔凡遣使命自景王至鄆王及陳過庭孫傅何栗等國書多自撰述百書悉已命𣪚繕寫緘題又出守臣禦繕寫亦已闕供臣等二日不火食五日衣不解帶上憐臣寒甚賜一大袍尋為鄭建雄所竊無何二十七日雜然欲邀車駕跳幸而敵四合無所向羣噪宫庭劫請百出始排闔不得入又有斧延和殿門遂毁徹乘輿服御之器剔金玉納之懷中復攘酒數十壺羣飲大呼醉溺殿上殺內侍四五輩兵伏狼籍僵尸流血上不能禁命駕登宣德樓而羣卒爭挽御衣請行賴景王攘臂麾却之乃止退御祥曦殿詔衛士坐兩廡下太官給食上手持一劍顧臣曰敵騎下城與卿等死于此劉延慶及其子光國奪萬勝門出軍民爭附從之者約數萬人遺史曰城初陷滿城人鼎沸莫知所從閭巷間羣不逞有喧言奪城而出可以逃性命者劉延慶及其子光國斬萬勝門扉大啓于是班直及西兵百姓噪而出者數萬既出門莫知所向循城南駐于瓊林苑中有忠訓郎張永祺者嘗為愚言城陷之日身在西水門見作守禦官城陷之夜官兵猶守地分翌旦方棄城逃遁永祺下城時已聞百姓喧傳開萬勝門放人出保義郎吳琦者為南平軍兵馬監押與愚同僚亦為愚言城陷之日身為親事欲逃命奔竄無所適從次日黎明聞市人喧傳萬勝門開遂走往萬勝門扉果大啓乃隨衆而出既到瓊林苑中已見延慶父子整齊人作隊伍然則萬勝門自城破之後見啓矣孫覿辭免待制狀亦為京師失守之時夜二更宣召自宜秋門以入已見衣冠士俗毁容易服纍纍然矣萬勝門自城破之後已大啓復何疑是知延慶父子斬關出奔在城破之夜實丙辰也蓋延慶所居之第與萬勝門相近也軍民數萬爭奔至丁巳日辰巳刻之間而朝野僉言之書載其事甚明至延慶子光世統兵好事者諂奉之乃改朝野僉言曰上集衛士三千餘人環甲胄欲為避敵之計張叔夜劉延慶勸上出走上未決延慶曰先為陛下奔一門延慶父子奪萬勝門出門外候駕覩親王二人坐于明節皇帝之門台又見張海張宏率馬兵奪城不克而去蓋城陷之翌日也是時市井訩訩猶未定上登宣德門諭百姓請器甲當是之時未有播遷之意而延慶父子未嘗見上已出奔矣又一日方有蔣宣李福邀駕出奔之事實戊午也故孫覿辭免待制狀又言二十七日衛士雜然欲邀駕跳幸而敵騎四合無所向此事甚明後人覽朝野僉言者當求舊本而改本失實故不可以不詳辨四壁守伴官兵皆棄城京師城大命令不相通南壁失守而西北官兵猶在城上但夜中相驚恐未知失守端的唯傳箭者不至翌旦漸傳城已失守于是官兵皆棄城而去四壁皆空車駕御宣德門遺史曰是日黎明有旨諭百姓赴宣德門請器甲使命雜踏傳呼滿路其聲甚哀已而上御宣德門百姓喧亂不定有王倫者乘勢徑至御前上問誰倫奏曰百姓喧亂臣是王倫能壓之上急命彈壓倫曰臣未有官豈能彈壓因自薦其才上急命紙筆除批倫為吏部侍郎倫下樓已先備惡少數人在樓下令傳呼侍郎來倫字正道開封人宰相旦之後有縱橫之才少遊市井間羣小皆髙其能而伏之倫遂傳旨撫諭百姓皆定上親諭軍民上露腕憑欄大呼于衆曰事體至此軍民欲如何有謀者即此獻陳朕當聼從失守之罪一切不問仍命百姓請甲及軍器等前去各保老幼上倉皇不及覺墜帽百姓奏聞間稱你我而已士庶初慮有播遷意因泣告于樓下曰陛下一出則生靈盡遭塗炭上大呼曰寡人以宗廟之重豈敢離此士庶號泣上亦為之泣涕何栗以倫小人無功除命太峻奏繳其旨止補修職郎景王及謝克家回自金國軍前泣血録曰午漏方正景王謝克家同金人使命四人來議和克家初見尼堪斡里雅布也二帥徑出示文劄言前此未破時已降號令若城破日不許殺掠且云過陵寢亦常戒約軍中無纎毫敢犯又云若南朝破城還肯不殺人否雖有和議上猶未信别録曰皇弟景王回建黃旗題曰兩國通和景王徒行雪中來自朝陽門從者數人及麗景門門尚閉憩于城隍廟須臾啓關乃騎而朝尼堪遣李若水入城遺史泣血録皆曰李若水初同馮澥奉使留車中澥已歸而城陷館伴偕若水説景王請命書上猶有御寶料城中未甚亂國相教徽猷來欲令入城若水遂同館伴者至城破處見尼堪斡里雅布云京城已破可遽歸報皇帝自須播遷五百里內皆吾兵也且請處置內事恐防內亂又曰可令何相公來議事若水入對上見若水失聲而驚曰卿竟來也大事如何若水具對遂留宿殿中何栗使於金國軍前宰相何栗出使見尼堪尼堪問之曰汝為宰相知吾提兵將至何不投拜而乃拒戰又不能守城何也栗無以對又曰聞勸宋主與我戰者豈非汝耶曰然尼堪曰汝有何學術與我戰邪曰栗無學術為國為民當如是耳尼堪曰我欲洗城如何栗從容曰率兵洗城元帥一時之威也愛民施德元帥萬世之恩也尼堪語曰古有南即有北不可無也今之所期在割地而已栗再拜謝尼堪曰相公回奏皇帝欲請上皇出郊相見不可辭也栗無辭以對應命而還靖康遺録曰時天平明上命何栗出使軍前栗皇懼失色辭不敢行上固遣之栗遲回良久不決若水嫚罵云致國家如此皆爾輩誤事今社禝傾危爾輩萬死何足塞責不得已乃上馬而足戰不能跨左右扶上比出朱雀門所執馬鞭三墜地于是至青城見尼堪尼堪在中軍帳守衛嚴謹皆露兵刃凡經三次搜索方至帳下悉堆氊高三尺坐于上尼堪據大木案栗伏地請死尼堪厲色曰南朝拒戰誰為之謀答曰栗主戰議尼堪云趙皇堅欲拒戰決有此否栗云議皆出于栗皇帝無尼堪又云我昔遣使招汝出城爾何不來今城破來此何也答曰昔之不來為生靈尼堪默然久之曰爾亦忠臣然我須見趙皇靣約和議然後奏聞北朝皇帝栗請拜回歸二十七日戊午大雪駕御宣德門駕登宣德門有軍民數萬皆呼萬嵗號泣上亦大哭金國使人詣門見上上以手加額曰寧害朕無害城中軍民使人言兩國已通和好城中秋毫不動于是揭榜云兩國已和只候何栗等還寫誓書仰軍民知悉宣和録曰騎橋明逵皇后宅孟昌齡家神衛營藍熙家五嶽觀沿燒數千間小民過城下者敵人擲錢與之或往復得數千語人曰元帥限我輩三日破城今只一日半見效諸門先存金帛如山敵悉得之所棄者錢爾泣血録曰是日曉諭在京大金登城斂兵不下命文武百官僧道詣大金軍前致謝全活性命之恩願犒軍者聼以金帛牛酒及南薰門候大金指揮已而金使數卒傳旨云國相太子致意軍中宿食不便不煩逺到又致意僧道父老泥雨不須到軍前請看經念佛祝大金皇帝聖夀次日早百姓相率謝元帥以竿揭金帛云謝元帥全活之恩者闐咽道路靖康小録曰金人入太學劫掠金銀衣物士人幾不免敵曰秀才悶却忠孝為國不要殺他出城官吏軍民數萬在普安院遇金人潰𣪚四走劉延慶并子光國皆被殺遺史曰官吏軍民爭萬勝門出者無路可行悉循城而南聚于瓊林苑中不啻十數萬劉延慶及其子光國在焉延慶欲整行伍勸以同力協心奪路求生衆皆唯唯終夜喧呼或曰無故而呼者恐人心不固矣是日質明延慶率衆直西以進過普安院望金人鐡騎遍滿原野衆不敢行延慶曰金人不足畏我以死命當之彼自敗矣衆不應延慶曰試使我之子太尉往嘗之乃呼光國激之曰汝以五十騎往嘗敵以堅軍民之心終後奪路而去光國以五十騎直犯金人䭿騎金人皆按轡或持弓或橫鎗不動光國揮戈馳馬而去延慶曰光國五十騎尚能進况軍民數萬皆死命乎乃強率之衆不能已而趍遇金人鐡騎縱橫衝突衆皆星𣪚而潰延慶及光國皆死于亂兵中有得脫者悉走京西聚為盜賊李孝忠黨忠祝進薛廣曹端王在之徒皆是也宣和録曰劉延慶并男光國奪路萬勝門帶班直長入祗候西兵萬餘人而出皆護駕選鋒也延慶陷金明池中卒光國携王黼愛妾張氏以逃行十餘里敵追騎及之殺妾自縊林泉野記曰劉延慶其先西夏熟户世為將知名後居延安府為保安軍屢及夏人戰政和八年攻藏底河拔之宣和二年從童貫討陸州方臘遣子光世自將一軍趨衢婺破擒之定二州纍遷檢校少保節度使眷遇亞于貫六年伐燕山為都統以軍三十萬取易州屯盧溝河命郭藥師楊可世輕兵先趍燕山光世為後繼契丹蕭太后密召四軍大王兵自暗門入藥師等驚駭墜城走光世既不至諸軍失援延慶軍聞亂而潰自相蹂踐赴河死者數萬金人自是知王師不可用有輕中國心延慶坐削官久之乃復金人圍京城延慶守北壁出戰有功及何灌敗金乘勝而來延慶因其疲遣死士五百擊之及再至關延慶守北壁城陷與子光國率衆開萬勝門走百姓多從之遇敵戰被殺年五十九至其子光世之貴贈太師金歸其喪於光世葬之池州濟王及中書侍郎陳過庭出使濟王及陳過庭出使同伸懇告也開封府出榜彈壓已刻開封府揭榜云兩國已通和在京內外放火燒人劫掠財物御前已分遣將士前去殺戮仰居民安業如違處斬又令人告報兩國各已講和向來所請器甲却令送納是日放火劫掠者猶未息金人三五成羣下城劫掠或不逞之徒為之前導亦有潰兵被髮偽裝畨人者大抵后族貴戚王公大臣富商巨賈之家皆遭其害何栗回自金國前具道尼堪議和之語上意稍安又聞欲邀上皇出城上曰上皇驚憂已病不可出必不可辭朕不惜一往栗曰陛下不可不一見之乃復遣栗議軍前宣和録曰二帥堅欲上出郊親詣或太上皇皇太子亦得上初不肯出大臣有請行者上堅不從且指帶以示曰事急有此而已長星焰出東北角其長亘天四更沒蔣宣李福邀駕出奔遺史曰是日上四軍班直猶有萬餘馬亦數千及護駕人馬等皆欲奪鄭門而出指揮使蔣宣李福引衛士數百人入祥曦殿中大呼請官家速出這裏不是官家住處其勢甚遽上曰教我那裏去衆兵曰須與官家奪得一路宣控馬扶上使乘四侍斥宣無禮宣怒殺之上與大臣皆失色李福叩頭曰蔣宣非敢無禮欲救官家於禍難中畨人詭詐和議不可信宰相內侍多是細作願陛下速決上命左右開諭因趍入衆兵猶追之不已上復親撫諭之忽聼禁中喧擾衛士有乘隙於禁中盜物者何栗孫傅以宣福無禮而致亂乃令四廂指揮使左言捉作過衛士數十人送開封府是日金人漸有三三兩兩下城劫掠者並不殺人又軍兵乘亂恣行劫奪略無忌憚士庶皆奔走城東徙於城西城西徙於城東征行交互莫知所適父子夫婦不相保守至有全家自縊自殺者又有由東西角門而入舊城者汴蔡兩河遺棄老幼尸骸堆聚哀號之聲所不忍聞公卿大夫皆布袍草履混迹塵世雖貴戚之家皆泥土滿面不洗拭衣􅀈絮紙被取類丐者是夜四壁火光猶赤照耀城中靖康後録曰是日押橫門蔣宣班直惠萬年禁衛斧左掖門上急下門衛士已於上側殺中官上方入祥曦殿門蔣宣仗劍及之大呼欲護駕奪門而去乘醉以刃壞御屏風臥於殿上衛士悉取御前及閣分外庫金銀器皿等分之有頃皇弟景王返走下殿王謂宣曰我已得聖旨除汝團練使管殿前司便謝恩謝恩訖以劍揮諸軍班直皆坐於殿簾聼候聖旨俄聞談世績自軍前回報已通和宣乃率直皆𣪚秦仔賫蠟書除康王河北兵馬大元帥陳亨伯兵馬元帥宗澤汪伯彥兵馬副元帥中興日記曰是日有湯隂縣走騎報京城遣秦舍人至是時京城消息久不通一軍皆驚王遣騎迎之既到命藍圭審查得實引入乃武學進士秦仔授中翊郎閣門祗候而來曰此月二十日皇帝遣仔賫蠟彈來拆敝衣以出之王命韓公裔破蠟得黃絹方四寸許親筆細字知卿起義勤王可除卿兵馬大元帥陳亨伯元帥汪伯彥宗澤副元帥應辟官行事並從便宜後空處家中安樂無異前日賜錢五千緡王讀訖憂形於色涕繼之後一二日先後至者七人蠟彈詔旨悉如前王聞仔等曰金人圍城甚急正大雪皇帝御瑶津亭遣仔等請大王起兵入衛皇帝慮其不逹故一日同遣八人來皆縋城冒風雪犯險阻路中間逄金人次第軃避先後由間道渡河前來王喜八人皆到王出帥衢南望闕謝恩軍民大歡悅建炎録曰閠月空日大元帥劄子準忠訓郎閣門祗候秦仔賫到蠟封奉聖孝之報天地神祗所當佑助檄到日康王可充兵馬大元帥陳亨伯充兵馬元帥宗澤汪伯彥充兵馬副元帥同力協謀以濟大功二十八日己未何栗使於軍前何栗至軍前祈請上皇免出郊且言上出郊之意尼堪從之二十九日庚申雪止旦日出其色如血日色如血城中之人見者無不驚懼或以為殺虜之兆皆憂洗城始開朱雀門已刻朱雀門始大開分遣彈壓官往來四壁金人皆撅斷諸門慢道復於城外作慢道以鐡鷂子登城自城破縱火燒甕城樓櫓三夕不滅火尼堪軍前禁不可殺人故無人敢犯其恣殺戮者乃吾軍人耳髙后宅掠去婦女七十餘人左言妻被掠以金百兩贖之東北一帶殺傷頗多乃黑水人城中不逞之徒有持兵刃冒為畨人而剽掠者吏捕得之梟首通衢金人見之曰此南人治犯法者三十日辛酉駕幸敵寨靖康後録曰二帥欲脅上皇出郊詔曰大金堅欲上皇出郊朕以社禝生靈之故義當親往咨爾衆庶當體朕意切務安靜無致驚擾恐或誤事故兹詔示令知悉遺史曰是日昧爽有詔大金和議已定朕以宗廟生靈之故躬往致謝咨爾衆庶無致疑惑平旦上擁數騎將出南薰門何栗陳過庭孫輔等從曹輔張叔夜留守彈壓駕至南薰門城上皆金人城守有一人自稱統制厲聲曰奏知皇帝若得皇帝親出議和公事甚好且請安心上欲下馬城上金人皆避走云奏知皇帝不是下處遂立馬如初又云已差人覆國相元帥且立馬少時容治道凡駐駕一時久門扇乃開見步人鐡騎滿甕城中乃夾道擁衛而去至青城中途金人又奏云請徐徐行容為安排皇帝行宫又立馬一時久至齋宫門外上欲下馬金人又云奏知皇帝請裏面下馬乃入齋宫側一小位中尼堪遣人奏知皇帝二太子在劉家寺日已晚容來日相見又奏云不知曽帶被褥來否欲供進又恐寐不安是夜上宿齋宫初百姓父老見上出城爭持金銀綵帛往獻軍前自內門至南薰門不絶人迹如蟻逮曉車駕未回人情恟懼俄頃有黃旗自南薰門入云駕前傳報平安詔曰大金已許議和事未了畢朕今留宿只候事了歸內仰軍民各安業無致疑惑士庶讀詔還通夕憂慮金人令數人居都亭驛為承受劉定齎蠟書至元帥府催督入援建炎中興記曰劉定自京城賫蠟書至相州乃上親筆督兵定河北效用也頗知京師圍城事具言其危急之狀言頗切直或不悅之先是秦仔至論京城不可破至是定以為必可憂兩説不同遂遣秦仔宣説於中以安衆情而深究劉定之説與諸將識者議之三朝北盟會編卷七十
