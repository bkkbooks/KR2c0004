body:
  text: 三朝北盟㑹編卷七十七宋徐夢莘撰靖康中帙起靖康二年正月十九日己酉盡二十六日丙辰十九日己酉駕在青城開封府榜不得擅打軍噐准樞宻院劄子訪問舊城裏外諸坊巷居民等近來往往撰造言語喝説事端聚衆以防䕶為名于爐頭打造刀器慮恐引惹生事却致驚擾深屬不便劄送開封府疾速出榜曉諭約束施行右出榜朱雀門曉示并鉄爐戸自今後不得依前亂有打造如違収捉赴官重法斷遣二十日庚戍駕在青城風雨益甚開封榜云駕前傳聖㫖只候天晴打毬大㑹了便回内仰軍民知悉是日寺觀祈請許士庶焼香坊巷各請僧道作塲自諸王宗室執政侍從及寺監省部官吏在京百姓各貼黄榜自宣徳門羅列道塲僧道作縁事至南薫門不絶香滿天街潛泳洋溢忠信之士燃頂煉臂鎖口跪扵南薫門父老持香爐扵雪中拜跪哭泣者無數二十一日辛亥駕在青城榜不得生事是日駕未有回期京城流言頗洶懼諸城夜有金人下城擄掠者亦為百姓掩殺甚多榜云軍民近有以穢水代酒在城與金人博易幾至生事至今敢以諸雜博易者並行軍法二十二日壬子駕在青城御批付徐秉哲打毬畢便還金銀並限來日交納軍前盡絶開封府捕斬百姓李寳等一十七人籖首令衆四壁軍民見聖駕未回上下疑懼妄造言語傳播不一有乞請軍器以備緩急者官司不許往往結集私造復慮其生事乃捕造語言鼓衆者一十七人戮扵市李寳其首也寳善角觝都人號為小関索各以長鎗籖其首令弹壓往來四壁令衆吴革乞至軍前計議不報上在敵寨未回吴革請扵樞宻孫傳張叔夜欲因事至軍前計議叔夜問曰計安出曰革所論者三一車駕還内二金人歸國三革死遂留革劄子繳奏言革有两朝萬世乂安之策願至軍前口陳之不報二十三日癸丑駕在青城又御批付徐秉哲御批曰朕扵土床之上睡者凡二十餘日矣不敢憚勞凡有所須卿等且竭力應付四壁又置塲買銀以鉟銷秤盤折耗比元數少五十萬两欲足之也開封府榜令元開質庫者仍舊開庫官司慮細民轉易不行也乃揭榜曉示令在京開質庫者須管仍舊開庫如不開許人告賞錢五十貫自城䧟之初質庫皆閉至是亦無遵從者増置糶粟米塲賣柴炭埸圍城日乆餓死者相屬扵道監國皇太子令㫖増置糶粟米場賣柴炭場每人粟不過五升薪不過五十以市價比之少十分之一二故赴場糴買者士庶相雜集英殿修撰陜西五路經畧使知永興軍范致虛率兵勤王至陜州克潼関封氏編年曰先是范致虛在長安措置兵馬守禦丙午年和河東汾潞石隰而南皆無故致虛作守河計以河東置諸度外河西㳂流堡壘相望招幕諸色人借補官資僧道技術如趙宗印張孝慶等皆補募屬統制官者莫知其數或献守河之計且設砲棚千斤碓鹿角冐索如兒戲者甚多致虛素不曉邊方兵革事往往取献陳者利便按文施設軍民與州縣不勝其擾已撰㪚金歌效子房㪚楚歌使人刋板於金人寨旁及張掛州縣是時敵勢强盛諸將聞風而畏多逗留不進且有相率以降者敵乃驅其男婦老㓜而去歌意葢擊動北去軍民毋為敵用而望其盡力于朝廷故有北人半是南朝民食禄南朝終為君失意暫時辭漢主彷徨不忍痛思親云又以詩與運使桑景詢云參旗井鉞出西秦紏合諸侯付老臣風引斾旌趨魏闕雪晴宇宙滅天塵寒威等郤邉人懼炎運方隆廟畧神已見旄頭墜天外乞身當喜及今春宗印者汾州孝義縣人本姓趙落髪為僧作萬化長老遭亂欲避地因過河中府題詩扵佛刹曰七十勞生西復東鄉関在望念飄蓬大遼半嵗九分盡全晉一年千里空周召已亡無善政蔡童雖死有餘風華隂乞食啇山去岩谷幽尋四老翁安撫使席益見之遣人追因與語大竒之薦與致虛致虛謬不知兵見宗印談兵口舌以為竒士乃令還俗用便宜累借中㪚大夫直龍圖閣為節制叅議竒兵軍止以統制王偉萬李道峰宋戡等並聼節制宗印請築長城起潼関迄龍門雖致虛行移峻急而上下皆不以為是築城及肩應命而已宗印以僧為一軍謂之尊勝隊以行童為一軍謂之靜勝隊而河東僧行多竄名軍中亦有補官者致虛㑹五路兵欲勤王赴援京師屯軍華隂有京城東壁統制韋知幾者破城時得出奔過致虛杜常夏俶吿以京城已䧟常俶以知幾見致虛致虚謂常俶摇撼軍情乃曰京城豈有可䧟之理因問知幾知幾紿言知幾本是勤王兵不曽到京城而兵已潰但聞京城守禦如故致虛以知幾告諭扵諸軍以明京城守禦平安執杜常夏俶曰向來使杜常勤王之師應援京城遂聽潰兵虛言中途而反夏俶保䕶陵原不能守爾等二人更相倡和縱兵刼掠驅虜婦女輙敢入関脱或京城失守臣子聞之即當奔之共死爭忍觀望奔潰所過焚毁理合誅滅免爾家小遂激令二人扵帳前號令榜其所由兵將聞之莫不驚悚軍民大振有自京城奔走至者言京城已䧟軍心皆不安致虛與宗印議進兵致虛由陸路先令宗印以舟師趨西京正月致虛中軍至陜州先是金人犯京師即以兵五萬守潼関扼西兵故兵不得進諸軍日與金人接戰攻奪潼関自正月至是凡十餘戰方得潼闗士卒死傷甚衆宗印至三門進亦累獲小㨗致虚乃授宗印河東制置使節次發兵軍容整肅出潼闗唐衆家集曰先是宣和七年知永興軍帥臣范致虛提六路兵勤王留連不進公時知同州三移書責之第一書曰伏見金人侵逼都城戒嚴百五十餘日矣臣子區區憂國之心以日為嵗當食而歎中夜而起痛哭流涕無所容身憤懣之氣填塞胸次戇愚妄發不識忌諱殫千一之慮冐再三之凟誠不忍箝口結舌碌碌自同扵衆人以負國士之知且失王臣之節用是剖心而重有陳焉自改嵗以來屢因便遣使之說欲知朝廷㫖意窺測金人状據險屯以圖大計議論迂濶文字曖昧不能激𤼵機慮遂致兵家之竒計流為書生之常談某不才不敏之罪也痛其咎悔夫復何言今若懲前言之不伸視後患而不自言是負知己也是負國家也是欺天下也今日之事可為朝廷慮者三可為闗中慮者五鞏洛榛梗畿甸馹騷和議之謀既乖廹脇之勢愈甚君父宵旰之憂誰與戡難宗社磐石之基誰與圖存此可為朝廷慮者一也都城之中兵民無慮數百萬圍閉日乆廩薪日欠人既艱食誰有闘志此可為朝廷慮者二也中都以秦兵為牙爪者不足恃而所以為根本者莫能固矣此可為朝廷慮者三也十日逓場之潰方且招集十四日尹陽之北繼以奔逃誅之則不可勝誅招之則未必為用不招又恐聚而為冦此可為闗中慮者一也潼闗之險雖為可恃而禁谷亦方可軌黄河之津雖有守禦而藍田自可越闗其他諸谷已為通達此可為闗中慮者二也諸司錢粮剗刷殆盡庫藏為之一虛頻年調發殆無虛日民力為之困弊掊而取之則為國歛怨取之有限則必乏軍此可為闗中慮者三也兵之馳逐恃馬以為命兵之精鋭恃噐甲以為衞此日大軍既潰馬之失者十凡五六噐甲之失者十凡八九一旦選彍騎則馬不適士治堅甲利兵則噐不適用以此禦敵安能為雋此可為闗中慮者四也陜西五路控制西夏以扞闗中比聞夏人侵掠鄜延近界攻圍環慶諸塞為金人鷹犬之用使中國人有腹背之患此可為闗中慮者五也據山河百二之險自古號天府之國保闗中所以衞京師脫若闗中有警則所以為朝廷憂者又不可勝言也經畧左丞忠義一節勤勞百倍所以為國家計者至矣盡矣然軍中之事誰為諮謀麾下之將誰可倚仗今且竭心思苦筋骸朝夕從事扵帷幄之間恐智有所困神有所不及而變有不可勝應矣自古戡大難定大事者必有戮力之人相與扶持乃能有濟莫若合諸使者及摠管帥臣相與訂議以圖上䇿檄蜀師及川陜西路使之輸財用輦軍噐市戰馬以資闗中守禦之備合秦蜀以衛王室庻幾可圖再造之基贊中興之業孰不聞風而悅心慕義而影從者哉况夫主憂臣辱主辱臣死遭此多難乃臣子見危致命之時必有慷慨陳義以狥國家之急者要恃我公為主盟爾某辱知遇之厚屢陳瞽言比論守要害以妨不虞治後軍以張聲勢已䝉施行是終不以其愚而拒絶之也某敢不効愚衷兾經綸之萬一乎盡言以招過某不敢辭也惟善人能受盡言非公其孰能當之不宣第二書疊辱鈞誨謹當佩服河右之舉俟蒲中定日前詣次輙有愚見事闗體國冐昧言之今日勤王之師欲圖再舉已失事機和戎之議專使薦至共聞詔㫖藩臣固不當便文有司豈可抗命况親屈帝尊就見二帥有宗社再安生靈全活恩深徳厚之語其謀議已定矣若舉忿兵臨勍敵未為萬全之策深慮京師以孤城開關延敵欲二聖鸞輿不驚九廟筍􅒶不移佇俟退師再圖基業今若抗和議之使必欲鏖戰金若悔盟肆其毒心别生奸計則上害宗社下害都人其祸豈小哉鈞意若以此詔為非眞即當遣使奏禀若是詔書豈可不承前日殺包修武今殺董宣賛非獨不受命並與使者而戮之此陜之封人大誤國事不可不治也前嘗懇懇上禀乞差官管伴使命前來根問因依以辨眞實若以為疑自合奏禀以審朝廷的意因而窺測敵情不虞再三之凟疊貢千一之慮政恐傷害生人廢格詔命老師飬㓂為患滋深今一舉而戮二使則招祸甚矣自城下興師以來將帥無謀屢戰屢北誤國至此慟哭流涕不忍言之然强聒不已者非惑扵流言而為喋喋也誠恐抗詔出師結怨連祸已誤宗廟社稷之大計也為今之計以勁兵守殽函之險遣使禀朝廷之命且治殺使之罪以伐金人之謀堅壁休兵徐為之計捨此之圖其祸有不可勝言矣幕中固多英才麾下必有良將誰肯為此言者其愚戇狥國不識忌諱其言不利扵今必驗扵後大望左丞大資審聽而深思之古人有云以國士待我我以國士報之某敢行焉第三書竊惟經畧左丞先生統師入援以安社稷忠義之心天實臨之然沿路將兵臨敵潰㪚聞之痛心繼以流涕尋遣人招集逐旋發遣日夜深思恐金人乘間别肆奸計累具劄子申陳防守利便已蒙施行强聒不已齋沐裁書具呈可為朝廷慮者三為闗中慮者五欲走人贄於鈞座然心之精誠事之機宻口不能宣書不能盡繕冩鍼封未敢遣行下漏字五行所不為送白馬寺造車盖欲輦載而歸又聞四月初盡過河清扵今月十三日宵遁歸州具言事状以此參驗信其不誣但金人恃強廹脅求城下之盟必貪厚賂要重質而歸今雖有渡河之期須以勁竒殿後未審諸路之師如何盡𤼵間道入援最為上䇿前嘗具陳未審鈞斾戒行入援遂勤王否前此遣𤼵勤王兵馬及紏合入援之意須先遣人具奏庶幾朝廷知忠藎之意如洛陽使若已具禀或留或遣更乞審處其餘非紙筆所能究者託張倅靣覆此某區區欲報知己之意非敢誕謾以欺世也亦非矯激以自欺也伏乞察胸中之誠而深亮之二十四日甲寅駕在青城借資軍人月粮米大元帥府以知濵州董誼知𨽻州趙某各統本部兵屯扵單州武經大夫知濵州董誼自將二千人到襲慶府朝㪚大夫知𨽻州趙某自將二千人到東阿縣大元帥命單州駐劄二十五日乙卯駕在青城大雪極寒城中多寒識者以為隂殺之氣而然金人求索諸色人金銀求索御前祗候方脉醫人教坊樂人内侍官四十五人露䑓祗候妓女千人蔡京童貫王黼梁師成等家歌舞及宫女數百人先是權貴家舞伎内人侍上即位後皆㪚出民間令開封府勒牙婆媒人追尋又要御前後苑作文思院上下界明堂所修内司軍器監工匠廣固撘材兵三千餘人做腰帶㡌子打造金銀係筆和墨雕刻圖畵工匠三百餘家雜劇說話弄影戲小說嘌唱弄傀儡打金斗彈箏琵琶吹笙等藝人一百五十餘家令開封府押赴軍前開封府軍前爭持文牒亂取人口攘奪財物自城中赴軍前者皆先破碎其家計然後扶老携㓜竭室以行親戚故舊泣涕叙别離相送而去哭泣之聲徧於里巷如此者日日不絶二十六日丙辰駕在青城何㮚自軍前回傳話入城糴米以濟百姓何㮚自軍前回傳詔云朕見兩元帥議事事畢還内天寒民困無煩扵雪中候駕以受凍餒已令廣置糶場米賣柴以濟饑貧朕負百姓出涕無從百姓聞之無不感泣頒詔之後就相國寺定力院興國寺置四場糶米許人糶三升毎升六十二文民始蘇矣然官司措置少法强者受利而小民惠少乃榜絶軍人不得入場男女分日由是稍均金人來索什物儀仗等宣和録曰自帝䝉塵金人舘扵齋宫夜擊柝還巡二將既不許見日遣蕭慶須索城中物脇帝傳㫖取之從正月初十日以後節次取皇帝南郊法駕之屬是日尚書省奉軍前聖㫖令取五輅副輅鹵簿儀仗皇后以下車輅鹵簿儀仗皇太后諸王以下車輅鹵簿儀仗百官車輅儀仗納噐法物禮經禮圖大學軒架樂舞樂舜文二琴女媧笙孔子冠圖䜟竹簡古畵教坊樂噐樂書樂章祭噐明堂布政圖閏月體式八寳九鼎元圭鎭圭大噐合䑓渾天儀銅人刻漏古噐秘閣三舘書籍監本印板古聖賢圖像明堂辟廱圖皇城宫闕圖四京圖大宋百司并天下州府職貢令宋人文集隂陽醫之書如元白并元祐諸名人文尤愛慕諸科醫工百七十人教坊樂工四百人金玉雜役諸工如消碾染刷繡碁畫針線木漆㡌帯皮鉄之類課命卜祝司天䑓官六尚局撘材修内司廣固諸寺諸軍曹司並許以家屬行日下津搬赴南薫門朝天門交割不得住滯又取内人街坊女子弟童人及權貴戚里家細人指名要童貫蔡京家秪候凡千餘人自選端麗者府尹悉捕倡優内夫人等莫知其數押赴教坊鈐擇開封府尹四壁官主之俟採擇里巷為之一空上皇所出内人雖已嫁者亦徑取以往告報下如鵝鴨趨湯火開封府捉事小火下搜捉免一人至千緡或願入小火下之家充其婢妾者至開封府皆蓬頭垢靣不食作羸病状覬得免而開封府尹徐秉哲自置釵粉冠挿鮮衣令膏沐粉黛盛飾畢滿車送軍中父母夫妻抱持而哭觀者莫不歔欷隕涕皆内侍鄧珪之謀也初内侍承宣使鄧珪傳宣河北為金所得降之用事軍中教令呼索至是又請珪家屬及官吏士人僧道醫卜千餘人并珍寳雜色藥材等皆以萬數秘帑百司所有至此殆盡凡人間有用之物京師蓄儲取之畢足如奉使及河外守臣親屬取以往嘗須冠子一色萬餘頂他皆稱是又取書録及所藏古噐又取車輅冠冕及女童六百人教坊樂工數百人鴻臚卿康執權少卿元當可寺丞鄧肅押道釋經印板校書郎劉才卲傳宿國子監主簿葉將博士熊彦詩上官悟等五人押書印板并舘中圖籍往營中交割鴻臚寺丞趙子砥燕雲録曰金人既破京城金帛子女象馬寳貝盡為攘奪燕人乃說尼堪曰今日破國而掠取太甚天下後世所譏於是又取圖籍文書與其􅍢板偕行其所欲不在是也當時下鴻臚寺取經板一千七百片是時子砥為寺丞使之管押隨行三朝北盟㑹編卷七十七
