body:
  text: 三朝北盟會編卷一百二十二宋徐夢莘撰建炎下帙起建炎三年二月十三日壬戍盡十八日丁卯十三日壬戍車駕幸杭州上至杭州以州治為行宫以顯寧寺為尚書省然百司官吏到者十未有一二十四日癸亥汪伯彥奏札乞賜竄殛劄子曰臣聞危而不持顛而不扶焉用彼相臣實犯此有靦面顔輒瀝愚誠上干天聽伏念周旋羈紲幸會風雲備位宥密者行且再期爰立冡司亦既逾月承靖康既危之後輔建炎復績之初圖回二聖之還言念兩河之復雖政刑兩殷於當務然事力不及於前時贊襄百為未有一得練兵選將而臨事不為用遣使修睦而所欲未或從卿士啓渡大江之謀先時被患廟堂念係中原之望應變隨宜固萬邦戴后之心挫羣姦幸禍之志詔川陜之師從橫而禦侮檄東北之兵首尾以解紛備謹邉防以慮敵至終緣彼國兼用吾民陷濮與檀破青及濟所向既北乘勢而東雖世忠控要路於淮徐而范瓊頓徑兵於宿泗對壘兩軍之相拒輕兵間道以潛來臣偶以沈疴所纒不能密志而慮致鑾輿之遑遽拏舟楫以播遷持危扶顛無善可紀雖曰登庸日淺以病丐間如其捨劇理均徇名責實事失前定奚用臣為咎將誰歸死有餘責本欲居家待罪恭俟嚴誅重念駐蹕初臨政煩親攬暫兹忍耻靡敢冒居伏望知臨之大君特奮乾剛之獨斷亟選良弼共理多難録臣罪愆重賜竄殛是日左僕射潛善門下侍郎兼簽書樞密院路允迪各有札子乞黜責上曰朝廷非不措置往往大夫不知朕固知之卿等安職降詔不允敕伯彥省所札子奏理昧幾先事出倉卒致鑾輿之遑遽拏舟楫以播遷伏望録臣罪愆重賜竄殛事具悉朕以菲躬紹承大統爰自初載圖濟多難惟卿同德之臣陪輔中興之業帷幄密勿何勤如焉羈絏艱危備嘗之矣比緣鄰敵深入近畿狩於吳江以援淮甸退循眇末良用憮然既不能格天人佑助之心顧何以平華夏搶攘之亂不德之故特朕之尤豈必大臣専執其咎務恢逺畫庶保後圖毋重引愆以求去位所乞不允故兹詔示想宜知悉下責已詔詔曰朕以菲躬獲承大統萬方請命未能解塗炭之憂二聖蒙塵莫獲展晨昏之飬兵已練而力屈備雖設而用違震於朕心罔知攸濟實由涼德未究逺圖仰無以當上帝之意而禍亂遄臻俯無以得百姓之心而流亡失所比因強敵深入近境退保江津以援淮甸事出倉卒人用震驚衣冠頓踣於道途帑藏棄捐於兵火鳴呼皇天后土豈不鑒朕之至誠志士仁人豈不恤朕之懇惻倘以寡昧難彌凶穢宜降罰於朕躬以謝罪於率土尚以國家厯數之未艾祖宗德澤之在人未至淪亡必將恢復益當洗心改事雪涕輸誠悉去彌文務從簡素屏斥細務専事兵戎明告庶邦暨於列位忠言可以規朕之過失長䇿可以救國之傾危毋藴於衷悉以逹上廟堂近服宜務交修藩翰諸侯深思夾輔將帥致爪牙之用黎元保父母之邦思持顛而扶危用興仆而起壞庶資多助馴致丕平咨爾萬邦欽豫致意下避殿詔詔曰朕倉卒南渡致大夫棄其家屬禁衛五軍老幼不時渡濟頗聞逼擾尚未有達行在者雖纍次委劉光世王淵多以絹帛堆垜江口賞募日夜濟渡猶恐既渡之後徒步顛蹶道路仰康允之日下撥在岸空糧船五十隻綱稍先支一月請受選差使臣二員給劵𬋩押明立旗號前去常潤己去裝載南來之人早令至行在朕以此未敢獨享宫壼之安仰有司於後殿御閣朕當自處其中以俟衣冠兵衛士庶老小咸造行在方御寢殿其三省日下出黃榜曉示下儉約詔詔曰朕以涼昧荐歷險難深惟不德天未悔禍是有倉卒南渡駐於江浙念國勢之益削慨宗廟之僅存雖政事宜有改更在朕躬尤當省懼自今以往當變禍為福下慰人意易危為安所有應緣供奉禁省専屬朕身如儀物之飾膳羞之奉有司痛行裁省必遵菲薄其後宫除有職事掌管人不可減放外其餘悉行減放各聽從便仰三省行下體朕至誠之意十六日乙丑德音朕以眇末獲承至尊德不足以惠綏黎民武不足以戡定亂略謂言行可以動天地而朕卑辭屈禮未能交南北之情謂孝弟可以通神眀而朕焦心勞思莫能拯父兄之難比軍書之告警駭敵國之長驅尚未定約於一言敢憚避師於三舍而事出倉卒民用震驚官寮頓仆而失容老稚奔逃而係路實由菲德昧於逺圖方當走集之衝坐成控扼之勢候載書之不食即反斾以言旋惟道途次舍多供億之煩而師徒扈從有征行之苦民靡寧於農業士或後於軍期宜沛湛恩蕩宥多辟於戲同三十而卜世東都實會於諸侯漢二百而中天南陽乃興於王業惟上帝之所命豈朕躬之敢圖尚賴臣民各宣忠力庶資羣䇿協濟多艱咨爾多方欽豫至意黃潛善汪伯彥再乞罷黜臣等近已具札子乞賜竄殛伏蒙聖慈時降詔書不允臣惶懼震越若無所容陛下體堯舜之愛人法禹湯之罪已德至厚矣在臣等愈不遑安便當繼上封章不敢就職伏念臣等從陛下於軍旅之中後叨近輔中原未奠外患不寧陛下未至於安平之地則臣等未可自便前此雖勢危力􅉵而不肯遽捨陛下而求去者臣等義分非他人比也今謀國於艱難之時不能弭患而脫身於顛沛之際反獲便私則前日不勝任之罪猶云愛君而今日為自謀之情無乃私已非惟公義不貸臣等固不忍道也臣等不敢止用常札再有奏陳所有臣等誤國之罪終不可逭陛下公天下之法終不可廢今日之禍患稍寧即當再申前請必兾明正典刑以厭公議十八日丁邜御史中丞張澄論黃潛善汪伯彥乞重賜竄黜奏曰臣聞忠臣不避誅竄故能為國督姦盡言不諱以申天下之誼明主不吝廢置故能惟辟作威自奮剛斷以聳天下之望臣謹按左僕射黃潛善右僕射汪伯彥本無物望亦乏才術以嘗從陛下於艱難中因緣寵任躐持政柄而相業無聞國步日窘陛下蒙塵於外宗社危逼天下之人聞之者憤怒切齒見之者戟手唾罵且謂陛下甫次餘杭必亟正典刑以謝海內而數月以來信任如故中外怖駭未知死所臣備位言責既不能早正白簡今豈敢尚仍緘默以重誤陛下謹條列潛善伯彥大罪二十皆顯有實迹不可誣者正月三十日閻瑾申有敵騎三十人至泗洲行在之人無不願出兵抗禦及願乘輿渡江潛善等初無措置但固留陛下不早南渡至初三日探報敵騎在近始倉皇移蹕匹馬扁舟艱危甚矣致萬乘蒙塵其罪一也車駕倉惶渡江士大夫并其家屬禁衛五軍百司人吏老幼等隨從不及或遇賊或溺江或被虜慟哭之聲震於原野嗟怨之聲殆不堪聞又前此六宫渡江已久忽於正月二十一日降指揮見任寄居官不得搬家立法過嚴議者咸云天子六宫過江靜處我輩骨肉豈不是人致行在士大夫畏其指揮之嚴不敢搬家一旦多被敵人俘掠使歸怨人主其罪二也車駕駐蹕維揚淮甸之人奔走奉事亦既二年一旦遽然渡江是委一郡生靈于敵而不恤也若士夫若兵衛若民庶無不憤恨離心聞自真楚通泰于江南州縣皆碎于潰兵其禍亂之滋豈止一掦州而已哉重失人心其罪三也祖宗神主神御自合先六宫南渡潛善等無寅奉宗廟之意並不措畫一旦車駕起僅一兩卒舁致傾搖暴露行道之人酸鼻下淚人謀不臧禍及在天豈不痛哉宗廟顛沛其罪四也建炎初年自河南西京鄭州拱州遭金人殘破餘皆無恙自潛善等柄任已來西則五路京師東則澶衛京東今日殘一州明日陷一郡直至淮上所存者十無一二其罪五也士大夫既不預知南渡之期又不敢先次亟行一旦流離東西斃于道路如司農寺官黃鍔史徽范浩等並遭亂兵屠殺而從臣常有未到者職事者往往不來殆可憂疑衣冠遇害其罪六也揚州行在月給軍兵費無慮百萬本以待戰守之用一旦敵以輕騎涉境並不措置迎戰又江津渡濟不時一旦潰兵千百為羣流毒東南其害未止軍兵潰散其罪七也揚州左藏庫金銀絹帛數目甚多聞前此打角要于搬發潛善等力沮渡江之議不令裝搬三月一日敵騎已迫尚指揮且搬三分之一致出門入閘候潮種種留滯不時過江盡為敵有聞內帑有金亦搬運不及皆民之脂血何緣復得府庫耗散其罪八也敵騎既破濮州痛行殺戮幾同洗城於是聞得北京東平望風不守奪門而去雖僅脫敵禍而老小奔渡殍於道塗者不可勝計如近日自揚州而至江上壯者敵騎驅之以行老弱者殺之而去今市井行哭之人非其子弟則其親屬生靈塗炭其罪九也謝克家李擢俱曽受偽命謝克家李擢或除職得郡或復官領宫祠如李會則反分司居住更不問著公議尤所切齒蓋克家擢所惡與潛善等所惡士大夫獻言者同己則不次升擢異已則輒遭含怒至有問及禦敵事者云朝廷自有措置峻拒而力却之以至今日狼狽如此而潛善等尤護短飾非莫肯虗心以來衆善尤嫉人之有技不納衆善其罪十也潛善王黼之客伯彥曽受梁子美提挈故今日梁姓而得差遣者滿天下皆據重任割膏腴之地如楊梁祖為發運使尤為猥惡其黨更相扶助欲傾正人而李處遁尤為親戚用事士大夫無不側目畏之植黨分朋牢不可破其罪十一也言官奏疏以國危乞大詢衆庶凡再上再降出方肯施行于是職事官以上言時病者甚多潛善等以謀不自已出又身為宰相致大詢及衆內懷不平遂奏乞降付御史臺抄節申尚書省人莫不怪之其罪十二也又如曾闕論潛善無名進職事係國體潛善兄弟大怒而中書舍人黃唐付行誥詞極口稱美潛善等遽擢唐付兄唐俊為鴻臚少卿以示同已獲利之意用朝廷名爵以脅士大夫人咸笑其淺妄専行私意不勝其公其罪十三也行在百司每視事京師京師有百司月費兩處不減以巡幸而置御營使司則樞密院為虗設以巡幸而置巡舉財用則戶部為備員皆官屬人吏兵卒耗費無絲毫之補設官重復耗蠧國用其罪十四也故右丞許景衡陳渡江之議潛善等極力排斥景衡恨憤而六宮過江人皆曰雖斥景衡猶用其説也六宮過江已久行在見謀繼往乃忽下指揮見任官不得搬家人皆怪怨又如敵騎駸駸回北乃多遣使求和並不曾以一事諉使人藉口使人莫知所為政事乖謬人輒譏笑其罪十五也蔡京王黼為相日曾差衛從人兵至今論者未已潛善等一身兼御營使為廣占親兵置戰士於遊惰之地各不下數百而潛善獨占千餘人皆以為緩急之助不知名分嫌疑之辨多占兵衛不避嫌疑其罪十六也自古敵人相拒全藉斥堠潛善等計不知此東京斥堠委之郡守自京師至南京至泗州道路遙逺皆未嘗多以金帛專遣有心力行止人探刺真確止是道聼途説便指為實致車駕蒙塵狼狽如此其罪十七也金人犯東平既破其勢已作東來之計潛善等得閻瑾便宜請渡江之期乃飾非遂過尚于初二日懇留車駕少待初三日陛下出門當時若少遲留定遭衝突議者謂潛善等以渡江為下䇿曾未有中䇿可以勝之敵騎已逼尚敢挽留車駕其罪十八也同知樞密院盧益與王黼素有狎邪之舊黼用為尚書東平之政乖謬冠於一時去年自散官安置中輒乞求來揚州畢其私事其意實為進用潛善果驟引為八座未久俄聞伯彥引為樞副已而伯彥之客以朝獻讀祝文失於恭恪言者方欲論列潛善等既為伯彥荐於朝擢起居郎矣遂除集英殿修撰自來二使有罪補外未有除集撰者伯彥之黨潛善引之潛善之客伯彥荐之二人朋比專務欺君其罪十九也宰相之職無所不統水旱蝗螟則䇿免盜賦竊發干犯則免潛善等使車駕蒙塵如此尚敢出入傳呼宰相張蓋乘馬略不知亷耻之節致搢紳指目譏誚幾不容口是能為陛下立政造事保安國事乎國家殆辱恬不知耻其罪二十也臣獨以空疏蒙被親擢職在風憲實負天下之責今日陛下蒙塵臣首當赴死顧臣前此數為陛下謀渡江之事宸𠂻輒加采納但為潛善等沮遏然主憂臣辱主辱臣死固不係於言用不用潛善等之罪臣誼當彈劾伏望陛下以一已安危為不足深念而以二百年基業為可憂以一時顛躓為不足深慮而以失億兆之心為可懼若不痛革前弊力新逺圖别為經理之謀臣未見其有濟也然痛革前弊力新逺圖非盡逐潛善伯彥輩天下決未肯信服陛下之令其黃潛善汪伯彥伏望重賜竄黜以回上天之怒以收億兆之心然後改命易方稍圖興復盡斥浮濫一歸簡嚴寬恤黎元輕徭薄賦作新軍旅選將待時庶幾數年之間漸振安平之業倘陛下尚存體貌未忍棄捐則七廟神靈恐無係托之地忠義之士莫知繫屬之歸陛下孤立一身何所稅駕臣之言激切肝膺震潰唯望剛斷早賜處分汪伯彥乞罷責札子曰臣近具札子措置臣雖登揆路日淺偶在病假幾月而備員帷幄初閲二年輔贊無狀乞正典刑未蒙俞允臣恐懼震越愈不遑安然以謀國於艱難之時不能防弭而脫身於顛沛之際反獲便私不敢不體聖意已具負國之罪終不可逭陛下公天下之法終不可廢候今日之禍患稍寧乞重竄殛訖今月十八日尚書省據御史中丞張澄狀已進內札子論臣與黃潛善等致主上蒙塵宗杜危逼乞重賜黜責實當公議伏乞檢會臣初奏事理速賜施行以公天下臣更不供職以俟威斷三朝北盟會編卷一百二十二
