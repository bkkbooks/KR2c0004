body:
  text: 三朝北盟㑹編卷二百四十九宋徐夢莘撰炎興下帙起紹興三十二年正月一日戊辰盡二月二十八日乙丑紹興三十二年正月一日戊辰車駕駐蹕鎮江府二日己巳劉繹正除知泗州三日庚午車駕起發鎮江府五日壬申車駕幸建康府上自鎮江遵陸時天寒雪雨不止上乗馬以氊笠氊衣禦風雨而宰相以下多有乗轎者六日癸酉安豐軍孫顯忠收復壽州九日丙子江州駐劄戚方與轉運張某書書曰方輒有少禀上冒台聽方向者結約下淮北壽春宿亳南京忠義人首領措置事宜先招到潁壽二州巡檢髙顯并所部民兵一千餘人于十二月二十六日同差去統領孫福将官王髙邢進訓練官鄭苗達等将帶軍馬同忠義首領馬立将官黄林王徳等部押軍馬奪門入城與金人血戰死殺金兵甚多其帥敗走收復壽春府了當撫定居民除殺死外生擒到女真簽軍番馬并鐵甲三千餘副馬甲二千餘副箭十萬餘枝粟米二十萬餘石共用布袋盛貯燒毁浮橋三座糧船大小一千餘隻及招到番軍王九少保王三太保三郎君一行軍馬計三百一十五人馬三百五十八匹騾子一十四頭老小三千餘口方已差統領王徳迎接已到桐城縣訖兼廬州北地名瓦步見有金兵甚多于十二月二十七日敵馬六千餘騎前來壽春南岸看覷浮橋本軍捉住二人後便退至二十九日統制李貴王孝先部領軍馬䕶送招討歸正番官王少保一行過淮南岸倬路馬逢見金人軍馬二百餘騎隔小河子厮射兩三時辰本軍殺退敵騎前去方于正月初九日到桐城縣才候解發王少保人馬即便迤邐前進仰冀台亮十二日己夘令李顯忠撤戍還建康金人已退去李顯忠以建康駐劄兵猶戍于淮西淮西經蹂殘之後荒凉無廬舍且驚散之民猶未歸也天大寒多雪士卒暴露有凍落足趾者顯忠亦扶病往廬壽撫循諸軍上遣中使押醫官到和州顯忠未還提㸃醫藥飯食卜端孺以為和州西去無人烟且陰雪難行請止中使醫官于和州報顯忠使速歸日徃當塗買饌供中使等甚厚端孺揚言金人已出境矣軍人暴露陰雪甚寒缺未有休息之期中使亦聞其語顯忠歸端孺又請比尋常倍贐中使中使喜既還建康即以所聞端孺之言聞奏上悟即日降㫖令顯忠諸軍戍歸寨有㫖幸建康府南門以觀還軍軍中皆踴躍歡呼顯忠命整齪隊伍班師㑹大雪車駕不出召見顯忠慰勞久之以金缾御酒勸盤果木脯醢之屬皆渾金器就賜之十五日壬午趙樽敗金人于蔡州金人遁走趙樽在蔡州初金人于蔡州乗大雪突騎五百至城下樽出騎迎擊之金人退去衆請追之樽曰懼其誘我也縱之去庚辰探者報金人兵勢甚盛行且至樽唯孤軍又吳拱追踏白軍統制焦元來應援合軍不過數千人皆危之樽與諸將議分四壁守禦且以忠義相勉為死守計是日金人逼于城下先遣兵斷樽歸路黎明已列陣于城西湏臾分布四隅下馬鼔噪逼城樽激勵將士曰金人雖多而無攻具将士但堅一心無恐金人之帥首亦勵其衆曰此城庳薄汝所共知一鼓可陷矣于是以勁弓數百齊射矢著城如蝟毛守者不能立未停午從西壁坎墉而上倐忽金人登城者已溢滿樽時在壁知其不可當棄城而下跨馬率諸軍巷戰金人敗出城去方鏖戰之時有官軍旗頭與敵之旗頭戰于城下移時兩邊衆兵如山不敢動以待旗頭之勝敗竟殺敵旗頭城上百姓望而呼曰趙提舉且保明此旗頭好做官敵之旗頭既死即時散亂多墮城而死者官軍旗頭亦戰死竟不得其姓名蔡州人為哀之金人敗去樽遂復營葺守禦之備先是有燕人十七八已與蔡州人結姻親者根刷得之繫于獄中及金人攻西門急權知州李詢皆殺之光州牒蘄州正月二十日午時承中軍統制兼制置招討司提舉一行事務趙樽鄂州統制成臯沓白軍統制焦元申正月十五日以來有金兵魏都監部領和拜太光子番軍人馬五萬餘人騎前來攻擊蔡州西門至西北角靠汝河一帶約四百餘步擁并一齊上城其城壁更無敵樓乳牆乗馬可上樽等分布馬軍賈率将士與敵鬭敵盡命血戰至申時已來殺敗敵衆復擁敵兵下城以落濠塹汝河不知其數及樽等即時統率軍馬出城追趕其敵退走當陣重傷蕭總管及殺死敵兵劉千户與穆昆等餘人棄頭不斫横死滿野棄下衣甲器械不知其數及殺萬户穆昆者百餘人委是大獲勝㨗十八日乙酉引見耿京下諸軍提都領賈瑞等一十一人耿京除天平軍節度使将佐授官各有差濟南府民耿京怨金人征賦之搔擾不能聊生乃結集李鐵鎗以下得六人入東山漸次得數十人取萊蕪縣安太軍有衆百餘有蘭州貫瑞者亦有衆數十人歸京京甚喜瑞說京以其衆分為諸軍各令招人自此漸盛俄有衆數十萬是時大名府王友直亦起兵遣人通書願聽京節制京以瑞為諸軍都提領完顔亮犯淮甸京遣瑞渡江通朝廷宰相以下有所詰問恐不能對請一文人同徃京然之乃遣進士辛棄疾行凡一十一人同行到楚州見淮南轉運副使楊杭發赴行在是時上巡幸在建康乙酉瑞等入門即引見上大喜皆命以官授京天平軍節度使瑞修武郎閤門祗候皆賜金帶棄疾右儒林郎改右承務郎其餘統制官皆修武郎将官皆成忠郎凡補官者二百餘人悉命降誥令樞密院差使臣二員與瑞等詣京軍樞密院差使臣吳革李彪不敢行請在海州伺候京等到來即授吿節瑞等不得已從之至海州革彪以官告節鉞待于海州京東招討使李寳遣王世隆率十數騎與瑞等同行一録云辛巳歸朝人總轄賈瑞統制官劉震在軍副總管劉弁遊奕軍統制孫肇左軍統領官劉伯達左軍第二副将劉徳左軍正将梁宏右軍正将劉威䇿應右軍副将邢弁踏白第三副将劉聚總轄司提轄董昭賈思成天平軍掌書記辛弁疾辛巳正月十九日至建康府二十日行宫引見統制官轉修武郎統領官忠訓郎正副将成忠郎書記承務郎二十日丁亥王友直王任王革來歸友直除防禦使任革授官有差初鄆州王任以罪亡命金人重賞捕之急大名府王友直方聚衆任歸友直友直得任甚喜乃假任契丹以聚衆完顔亮攻淮南友直聚衆已數萬遂破大名府有衆數十萬亮死葛王已立乃以友直之衆並放罪令歸農為平民其衆聞之皆散去友直乃與其黨王革及任謀自山東尋路南奔比入界有衆三千餘至建康引見上喜授友直檢校少保任觀察使革武功大夫友直等皆辭不敢受且曰向若臣有衆數萬歸朝廷則受之不辭今衆不滿百而受如此之賞不可乃授友直防禦使任團練使革武翼郎兼閤門宣賛舍人二十八日乙丑趙樽棄蔡州趙樽在蔡州也吳拱以樽軍孤屢有蠟書報樽曰諸軍統制亦請棄城而樽以金人圍城方急若棄城而去遭金人追逐勢必敗亡不如且駐蔡州况蔡州糧食有餘後破此敵兵即議進兵中原乃申朝廷及申拱照驗拱怒以蠟書付諸統制令一面班師樽知蔡州不可以久駐且金人三日中退八十里矣乃㑹諸統制議退軍樽欲留焦元成皋守城元皋曰恐孤軍不能當金人之衆樽曰今金兵不逺設若我已離城而去彼探而知之縱輕騎追襲如何元請夜出李詢曰夜出恐夜黒人亂請至申刻從西門出馬軍南門出步人樽令晡時出門令華旺以馬軍自西門出擺列不動以防追襲焦元以步人自南門出先行候步人絶則馬軍殿後日向晡未曽傳令起發間元以步軍已至南門南門不啟守者不曽得傳令閉門元曰我是統制乃傳提舉之令也遂相争相詬至相擊相殺奪門啟扉未半而争門死者已填滿門道中强有力者僅能踐屍而出積屍擁門終不能開後來者不知其故雖見門有阻難之状所以愈亂不能禁軍民死者莫知其數元為衆所擁遂墜馬墮身入雪窖中移時方攀轅而出軍民争路正喧溢元無馬不能行見一羸兵控一馬尋其主曰我官人在何處元强奪其馬羸兵不從元手殺羸兵跨馬而奔行三十里見樽及諸将樽欲自東路徑歸行在且發大頭輜重已行元曰不行樽曰我是馬軍司中軍統制不歸馬司将安徃元曰提舉聽吳都統節制吳都統令提舉曰軍即無發遣歸馬司文字况蔡州立功将士正要提舉保明功賞豈可徑歸行在樽以其言為然遂由南路還京襄華旺以馬軍出西門不能殿乃先步軍而行步人與騎兵争路而趨天氣昏黒蔡州之居人隨軍而出墜坑填谷者不知其幾多也城中一空唯細民有老小之累者不能動翌日金人聞之遂復入蔡州右正言劉度劄子今日視師回寨願陛下取親臨行陣斬馘執俘者方可推恩凡賞典之行皆宜愛惜以革僥倖之門三朝北盟㑹編卷二百四十九
