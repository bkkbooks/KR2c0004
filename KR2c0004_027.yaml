body:
  text: 三朝北盟㑹編巻二十七宋徐夢莘撰靖康中帙起靖康元年正月三日己巳盡五日辛未三月己巳下詔親征詔曰朕以金國渝盟藥師叛命侵軼邉鄙刼掠吏民雖在纉承之初敢怠付託之重事非獲己師實有名已戒六師躬行天討將士銳於敵愾夣卜兆於襲祥庻寧邦國之虞克紹祖宗之烈一應親征合行事件令有司並依真宗皇帝幸澶淵故事疾速檢施行斡里雅布軍渡河是日斥堠金人已渡大河刑部尚書蔣猷率侍從官請避敵衛士束裝已備李綱力諫止之南歸録曰沈琯見國王國王曰南岸已無一人你來日須去到汴京金人尋得小船子十餘隻可載五七人浮水過者所損甚多步兵尚未至於上下流得大船遂渡驍騎至六日方渡畢其步軍始至而老弱者留濬州軍官謂琯曰南朝可謂無人矣若有一二千人吾輩豈能渡哉太上皇下亳州燒香之詔朕㳟奉道君皇帝比以憂勤感疾禱於太清誕日康復方燕處琳館靡有萬機之繁可以躬身報謝今來就正元節前擇日詣亳州太清宫燒香朕祗奉睿訓敢不欽承其令有司前期戒具供頓儲億毋或不䖍太上皇東幸亳州先是太上皇下燒香之詔太史擇初四日辰時啟行是日夜漏二皷出通津門御舟東下太上皇后及王子帝姬接續皆行童貫蔡攸朱勔䕶衛扈從車駕侍從百官往往迯遁四月庚午越王上表諌親征臣奏聖慈都城内是自家社稷之地兼倉塲在内萬不可舍去况有城壁堅固堅心守之天地祖宗必降佑䕶若人主一出都城人亂宗廟亦不可保况西北兩蕃皆有人使在驛粮草之類亦恐賊徒起而為變若堅守都城萬一不虞亦不失社稷百姓皆恐主上出外更乞親御宣徳門撫諭萬衆其新城諸門乞差得力能臣守䕶臣意逼切不避萬死募敢勇死先鋒効命小牓是日散小牓召募諸色人京城小民多有應募者又有諸路州軍幹事公人軍兵無所歸亦多應募於是戚里勢貴之家亦散牓自備錢米募戰助國蔡絛除知永興軍又改除任諒北征紀實曰時方内禪大臣瞶眊戰避之議皆未决時斡里雅布已報將至真定城中既無將又無兵獨有徤勇二萬復𤼵從梁方平扼三山大河前去人心倉猝不暇悉數而太平日乆人不知戰又不善守都城氣象繁盛異常强敵見之深為覬覦季兄翛上言昔澶淵之役敵人料天子必幸蜀因伏兵於殽澠道上適為我兵捜出此敵人已陳之芻狗也然彼方謂我獨西兵可用誠是也都邑必不可守藉守亦必破今太上既將南幸為新天子計不若行狩陜西據形勢以臨之鳩集大臣數道並進乘此銳氣以圖収復此上計也金人若犯都邑既掩空城勢必謀折氣沮我在陜鳩兵集衆以待上至若恐殽澠道險可從南陽趨武闗入長安㑹兵皷行南下此所謂從天而䧏也二十七日不得對至元日始得對於延和殿當季兄殿對時凡三人一給事中王雲一中書舍人張忞也雲方訟言大臣皆失措李士美謂邦彦已失魂矣某問着都不能答至今謀不定奈何今尚書來何處建白耶季兄即以前說及之雲曰雲今所以求對者正為此告尚書大家着力今見上大然之曰卿可帥長安為朕先去鳩兵歛賦俟朕之來也俄雲亦上後不得雲所奏之詳然後來絛在穎橋得一見雲及守城之事雲曰國家不過開元天寳事爾今却城守致大禍者某人三人皆對罷上以季兄劄子付大臣曰絛日下換資政殿大學士令知永和先去俟朕至是日晚又議遣差排頓逓官大臣因共薦舍人席益召至福寧殿天子面諭所以仍曰卿可先去大郡則諭以車駕親出可備五萬人芻糧賞賜小縣則言大臣領兵撫師爾皆預為之備卿可置司於鄧州聞朕出即復來迎又使益自辟官從南陽通金商路而益以待制安撫兩路便冝行事益又奏無兼侍乞携母氏先行天子亦可之後復改除又李丞相綱傳信録其中亦具載淵聖皇帝當時亊有云上色變降御榻泣曰卿等毋留朕朕將親往陜西起兵以復都城决不可留此亦足以證紀繆實之不任諒墓誌曰諒移帥涇原初朝廷將有事於燕山公慨然曰中國其有憂乎乃作書貽時相其畧曰師直為壯曲為老師出無名故事不成今日之兵其名安出哉然既聚四方之兵矣獨宜大兵壓境按甲不動下存亡繼絶之詔耶律一宗分散其勢使散為君長我収其名分其勢若捨此不為棄可存之契丹隣崛起之金國難易百倍恐河朔易動不可不慮也其他曲折尚千餘言不報宣和七年六月殿對首論郭藥師必反願早圗之無貽邉患上皇諭以藥師忠義必不負國公曰彼若忠義何不經營北鄙分散常勝軍使其耕織以贍燕山今乃集而不散使朝廷科夫錢遍天下此包藏禍心正欲竭中國而後動耳是年冬金人薄都城詔公守京兆時已病矣詔除吳敏等官職吳敏除知樞宻院事日下供職唐恪除吏部尚書令詔乗逓馬赴闕翁彦國知杭州王寓給事中别與差遣耿南仲免簽書李稅除同知樞宻院事日下供職劉阜民除顯謨閣直學士提舉萬壽觀李綱除兵部侍郎任諒差知京兆府盛章侯任諒到訖𤼵來赴闕御史中丞陸得先降職與郡徽猷閣待制何㮚除御史中丞國子祭酒謝克家除起居舍人唐重除左右諌議大夫王雲除給事中鄭滋除中書舍人司業孫覿除侍御史盧益知東平府宋㬇除徽猷閣待制添差發運司王時雍除户部侍郎蔡翛除資政殿大學士知鎮江府免謝星夜之任王易簡除資政兼侍讀大學正秦檜上三封事一金國興師深入河朔諸郡堅壁固守彼進有大河之隔退慮諸城躡其後師老糧匱立見勢屈乃重有要請望斷以大義所當與不宜示怯以自蹙削如燕山一路是金取契丹與之無害至於嵗幣須令彼能制契丹不為害方可竊聞仁宗與契丹結盟增添嵗幣亦是與之論夏國事乞檢㑹參酌施行一金國遣使求和又復渡兵隨至恐設計以緩我師守禦之備望一面遣兵守備黄河仍急擊渡河之兵使不得聨續以進一金國遣使所求甚大彼既動衆自不肻空歸前聞朝廷與議四鎮事百僚不得預聞審如所議坐失冨强之地彼貪心無厭得地而勢益强復不能保其不再入邉今若與之議燕山及嵗幣當集百官入議狀擇其當者載之盟書以示信服貶王黼崇信軍節度副使是日尚書張勸并衛仲達何大圭等五十人棄官而迯五日辛未尚書右丞兼知樞宻院事李綱為親征行營使主管侍衛步軍司曹曚為親征行營副使李綱傳信錄曰先是上於十二月二十三日即位有㫖詔對延和殿上迎謂曰卿頃論水旱䟽朕在東宫見之至今猶能誦憶余謝訖因奏陛下養徳東宫十有餘年恭儉日聞海内屬望太上順天意應人心為宗社計傳位陛下受禪之際有唐不足道也願致天下之養極所以崇奉者以昭聖孝今金國先聲雖若可畏然聞有内禪之事勢必遣使請和厚有所求邀於朝廷臣竊料之大概有五欲稱尊號一也欲得歸朝人二也欲增嵗幣三也欲求犒師之物四也欲割疆土五也欲稱號尊如契丹故事當法以大事小之義欲得歸朝人當盡與之以示大信欲増嵗弊當告以前約燕山雲中歸國故嵗幣增於大遼者兩倍今既背約自取則嵗幣當减我國家敦尚和好貨財所輕姑如數與之可也欲求犒師之物當量力與之至於土地祖宗所遺當以死守願陛下留心凡此數者執之宜堅勿為浮議所揺庶免後患并陳禦敵固守之策上皆嘉納是時聞宰執奏對欲奉鑾輿出守襄鄧間余竊以為不可因奏曰聞諸道宰執欲奉陛下出狩以避敵果有之宗社危矣且太上以宗社之故傳位陛下今捨之而去可乎上黙然太宰白時中曰都城豈可以守余曰天下城池豈復有如都城者且宗廟社稷百官萬民所在捨此欲將何之若能率勵將士慰安民心與之固守豈有不可語未既内侍領京城所陳良弼自内殿出奏曰京城樓櫓創修百未一二又城東樊家崗一帶濠河窄狹决難保守願陛下詳議之上顧余曰卿可同蔡𢡟良弼往觀朕於此俟卿余既被㫖同懋良弼亟詣新城東壁遍觀城濠囘奏延和殿上問如何懋對以為不可守余曰城壁且高樓櫓誠未備也然不必樓櫓亦可守濠河唯樊家門一帶以禁地不許開鑿誠為淺狹然以精兵强弩守之可以無虞上顧宰執曰策將安出宰執黙然余進曰今日之計莫若整軍揚聲出戰固結民心相與堅守以待勤王之師上曰誰可將者余曰朝廷平日以高爵厚禄蓄養大臣盖將用之有亊之日今白時中李邦彦等雖書生未必知兵然藉其位號撫馭將士折衝抗敵乃其職也時中勵聲曰李綱莫能將兵出戰乎余曰陛下不以臣為庸懦而卑之兵願以死効第人㣲官卑恐不足鎮士卒上顧執政有何闕趙野對曰有尚書右丞闕宇文粹中隨道君東幸故也上曰李綱賜尚書右丞面賜袍帶并笏余謝訖車駕興進膳賜宰執食再召對於福寧殿上意未决宰執猶以去勸上㑹有㫖命余留守以李稅副之余遂力陳所以不可去者且言唐明皇聞潼闗失守即時幸蜀宗社幾危於賊手厯數年然後復之范祖禹以為其失在於不能堅守以待勤王之師今陛下初即位中外欣戴四方之兵不日雲集敵必不能久留若捨此而去如龍脫於淵車駕朝發都城夕亂雖臣等留守將何補乎宗廟社稷且為丘墟願陛下審思之上意頗回内侍王孝傑從旁奏曰中宫國公已行陛下豈可留此上色變䧏御榻泣曰卿等無留朕將親往陜西起兵以復都城决不可留余泣拜俯伏上前以死邀之㑹燕越王至亦以固守為然上意稍定即御書可囘二字用寳俾中使追還中宫國公顧余曰卿既留朕治兵禦戎一以委卿余惶恐再拜受命與李稅同出治事是夕宿尚書省宰執宿東門司中宫國公行已逺是夕未還翌日余自尚書省趍朝道路紛紛復傳有南狩之亊太廟神主已出寓太常寺矣至祥曦殿側禁衛皆擐甲乗輿服御陳列六宫襆被皆將升車矣余遑遽無策因厲聲曰爾等願以死守宗社乎扈從巡幸乎皆呼曰願以死守余因拉殿師王淙濋等入見曰陛下昨已許臣留今復戒行何也且六軍父母妻子皆在都城豈肯捨去萬一中途逃散敵騎覘知乗輿之出以徤馬疾追何以禦之上感悟始命輟行余謂宰執曰上意已定敢有異議者斬因出祥曦殿傳㫖宣示禁衛皆拜伏呼萬嵗其聲振地復入勸上御樓以見將士上可之駕登宣徳門宰執百官將士班樓前起居上臨欄久之復降步輦勞問將士余與吳敏撰語叙金人南下欲危宗社决策固守各令勉力之意俾閤門官宣讀每讀一句將士十餘聲喏須臾六軍皆感泣流涕於是固守之議始决以是日余為親征行營使馬軍太尉曹曚副之封氏編年曰朝廷聞金人據濬州何灌梁方平俱歸勤王之師未有至者大臣建議不一或曰河北人心已動脫或渡河鋒不可當望陛下南渡大江或西奔闗中集天下衆分兵四擊或曰京城乃天下之本本既揺動何以慰天下乎今京師雄兵數十萬可以堅壁戒嚴敵人進不能攻退無所掠以俟勤王之師内外犄角李綱曰二者之論皆非所長昔契丹擁百萬之師直抵澶淵若從避幸之請堅壁之言豈得天下太平百有餘年冦萊公堅欲御駕親征鑾輿一渡敵人䘮氣遣使請和河北遂復今日之事與之同矣豈可緩也靖康前錄曰是日李綱與宰執辨於御榻前時中等謂綱所言皆書生紙上語綱云時中等不信諸生之言以至於此今日尚敢爾耶邦昌從旁立賛時中謂前此執政非不宣力綱云邦昌等素無才術雖盡力何補上欲依景德故事置親征行營使邦昌以綱不從其議皆謂綱可以任此事乃除綱右丞領行營司又曰白時中張邦昌皆勸上幸襄陽上問宗社何如時中對曰姑募英雄以圖克復是日木主已出南薫門從官臺諌知此意者皆束裝以待李綱力爭燕越二親王率宗室不騫等懇請留駕夜分猶有索輦者殿前曹曚具陳軍情謂親征願死戰巡幸即恐變生蕭墻自是方絶出幸之意親征行營使司牓招募武勇人牓曰親征行營副使司牓奉聖㫖召募有才幹方畧或有戰功與經邉任大小使臣不以犯罪已叙未叙及曽充弓馬手子弟并諸色有武勇敢戰之人並許赴親征行營副使司具告自陳三朝北盟㑹編卷二十七
