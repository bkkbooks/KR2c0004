body:
  text: 三朝北盟㑹編卷四十宋徐夢莘撰靖康中帙起靖康元年二月十八日甲寅盡二十二日戊午十八日甲寅聶山論伏闕劄子臣聞前日蔡懋李稅諭太學長貳令屏去伏闕上書陳東等諸生聞之莫不怨忿一學多士咸欲拂袖出學今日又聞稅令根治諸生并伏闕百姓欲置於法臣聞之不勝惶駭仰惟陛下睿智之資君臨萬方士民以積年不舒之怨憤乘隙相聚賊殺内侍指罵奸黨盖恃陛下仁聖必能與百姓雪去怨氣而懋税之徒恨其罵已而佐李綱驟欲除去根株又稅宣言為前日伏闕之士其間李綱故舊欲盡行誅戮臣恐大夫士心歸怨陛下自此士民思亂恐無已時盖士民上書不約而從之者数千萬人其言皆平昔公議乃陛下所急欲聞而奸人所甚惡也豈不有禀上㫖敢令開封快其私意願陛下訪聞行下速賜止絶庶幾忠義之士不怨憤奸人之手而忠言讜論日聞於九重實宗社萬世之幸也取進止奉聖㫖亟令改正靖康錄曰初士庶伏闕上書上為感動詔嘉忠義然朝廷大臣惟邦彦稍自知咎其餘如税懋時雍軰不畏公論反以士庶為敵讎觀其揚言曰彼時非紏率衆庶脅天子者乎又曰若是則政出布衣不在朝廷矣何䜛賊之深而愈不戢也使吾君聽是言則伏闕之士誠作亂耳非献忠也且朝廷輔佐得人措天下於安平四方來王萬姓和悦庶人既無得而謗議士方詠歌之不暇尚安有伏闕者今上皇播遷新君即政敵人加兵魏闕圖我宗社存亡之勢一障隔耳大臣有自私之蔽奸臣怙賣國之功羣小漏機而䘮師正人擠排而不用朝廷之大無一人為吾君言之故士庶伏闕献忠論列宰相之非求復社稷之臣期於得請乃其時爾安得此言轉播人耳故敏雖於今心膂猶敷奏縷陳多至数百言榜之通衢以明邦彦無罪亦頗出正論布衣魏孝友太學正呉若上書辨論其失敏安得無失言焉既而税懋乃論太學長貳黄哲黄唐傳令屏斥伏闕上書長貳皇恐待罪尋得㫖及看乃是忠義所激之語遂寢稅又呼時雍令根治學生伏闕百姓欲置於法戸部尚書聶山惧織羅之獄興而忠義之士死乃宻以聞上曰士民以積年不舒之怨憤承隙相位賊殺内臣詆罵奸黨盖恃陛下仁聖必能為百姓雪其怨氣而懋税時雍惡其罵已而佐綱輙欲痛鋤其根株又稅宣言曰伏闕之士其間有綱故舊必欲盡行誅戮臣恐大失士民歸怨陛下况士庶上書其言皆出於平昔之公論乃陛下所急聞而奸臣所甚惡也豈可不禀上㫖自令開封快其私忿願速止絶庶幾忠義之人不死奸臣之手忠言讜論日聞九重宗廟社稷萬世之幸諸生以故得保首領山之力也然開封三衙猶榜大學門榜曰准殿前司牒准内降御寶批朝廷方大開言路之時應文武下士庶秀才等宜以忠嘉之言讜論建陳當用納親覽於其可否一一施行然有似此伏闕上書為名者意在作亂之人仰三衙立便收捉當行軍法奉御筆付王濙宗等出榜如有似此之人斬訖奏聞適有學官呉若上書得罪長貳迎合其意乃屏陳東一學為之閧然既朝廷即與改正又命聶山傳宣俾士安於學開封三衙掲示文榜亦即褫去盛哉上以士之去就於國重輕不暫置於懐雖古明哲亦何以加然士方忻聖訓嘉奬墨尚未亁而奸臣輙欲置於法雖身不罹禍而豺狼尚在故望望然咸欲去恐不免也盖君子孤立小人朋邪號令混淆是非紛亂人君難於聽察莫甚於此時也秪於徐處仁忠亮清敏属望天下乆矣近方以處仁中書起之猶未厭士論而言章三上以嘗為蔡京門人當不可用矣京相上皇二十年今廷中諸臣孰非京引薦者若以是為嫌投置多矣朝廷用人賢者用之不賢者去之於今旁求天下如處仁之賢有幾處仁而不用誰復可用問其諫官者誰乃邦彦締交謝克家也君子小人猶氷炭之不相入信然秀水閒居錄論士民伏闕曰靖康元年正月七日金人至都城軍士於城西十餘里既稱和議十一日今上以康邸故相張邦昌副之出寓敵營右丞李綱為親征行營使聚兵欲戰二月朔遣將官姚平仲等夜刼敵營不㨗次日綱罷政五日太學生陳東率其徒数十人拜伏端門之下献書丐留綱且有人唱言道路曰綱罷敵入城矣軍民稍集至午聚萬餘人舁登聞鼔擊之中使朱拱之出宣問即殺之宰執李邦彦等自禁中歸都省衆詆罵欲毆皆奔避凡殺内臣三十餘亦刼数十家六日以綱知樞宻院事副樞耿南仲奏言率中詣闕者乃綱使令軰数人宜下御史府根治不從敵既退遣大兵十餘萬援太原以綱為宣撫使固辭不行至以告身納榻前上怒甚事叵測簽書院許翰與綱皆蔡京交黨也翰執政綱頗有力宻書杜郵二字以寄綱綱即日承命遷延乆之僅能渡河居覃懐去太原七百里遥制軍事多失機㑹大將种師中世家宿將黜其言不聽師潰种師中戰沒國兵自是不能復振矣綱竟罷去敵益無憚再舉入國二聖北狩嗚呼痛哉諫議大夫唐重論奉迎上皇劄子㳟惟太上臨御二十有六年優㳺太平海内無一塵之驚比者倉皇南幸踐渉山川冐犯霜露憂勞甚矣陛下天資仁孝於至誠拳拳思慕之心未嘗湏臾而忘今日和議已定王室無虞是宜以天下飬也欲乞遣使奉表祗迎法駕㳙日備禮導還京師上以副陛下孝治之誠下以慰在廷百辟之望取進止又論和議用兵劄子伏見金人敗盟侵逼京邑倉皇之變不測而衝突之勢難防樓櫓未免不集遣使涖盟捐金帛割土地飽其貪心以紓一時之急而徐圖萬全之䇿則前日之和議為便然予之以金帛雖竭四海不足以塞其求予之以土地雖割三鎮亦未必能彌其患谿壑之欲發乎無厭城下之盟未必可保彼憑陵近郊刼掠幾甸我以宿將勁兵勤王畢集師律素明軍聲大振則今日之用武亦便盟約雖未可保也然我敗盟則失信武備雖不可弛也然我先用兵則不祥為今日之計莫若堅守和議駐兵堅壘觀釁而動使過不先然後為善和議之說既已施行用兵之䇿必有方畧以臣愚料之不過檄三鎮使以死扞敵行反間以疑敵心合大兵以斷歸路其䇿莫過如此可用之河外而不可用之城下葢京師天子之居諸夏之本萬舉萬全庶可無虞若一不成萬有餘畏此不可不深思而熟計也如聞疆塲之吏敵兵之將至倘或合謀以攻城闕豈可决勝負於一擲耶若敵先敗盟則不得已而用兵不得已而用兵則大將者當礪兵鏖戰以敵王愾而保宗廟為大臣者不可不思所以衛宸極而䕶鑾輿唯朝廷之上叶謀而早圖之實天下之幸取進止又論大臣請御筆劄子臣近嘗論列比年以來大臣擅權宻請御筆公行奸謀致亂召禍實原於此陛下臨御之初當剗除宿弊以杜邪枉之門不可不以是為戒臣愚正謂自蔡京秉國政童貫總兵權凡二十年專請御筆行其私意上欺人主下欺同列開邉鄙之隙結中國之禍以致金人侵伐中原致亂之因實京貫之罪幸頼陛下仁聖感格金人歸心遣使和議已有退期不意交兵城下墮敵計之中乃李綱專行營之謀無經逺之畧隂結將帥擅興干戈僥倖成功旋致敗衂臣訪聞行營司官属云綱稱自有御筆指揮綱欺人以逭責自為之謀則善矣獨不為陛下計乎臣前來面奉聖訓已有御筆指揮更令申明行下臣已知陛下寢御筆之命决矣幸而金人搜獲姚平仲奏報知興兵之意不出於陛下服我信義不渝前盟且有休兵息民之期不然將臣覆軍謀臣誤國皆歸咎於陛下矣豈可復以口舌辨乎臣恐釁端一開兵禍連結自是無寧嵗矣雖食議者之肉恐不足以謝衆怨伏望陛下正綱罔上誤國之罪為貪功生事之戒庶以塞人之憤辭今後臣僚輙請御筆併乞陛下察其奸謀嚴加竄謫以為人臣不忠之戒伏望睿㫁施行毋貽後患取進止又論制置使王蕃迯遁劄子臣伏見王蕃先任戸部侍郎乞徃陜西等路募兵禦敵啟行除延康殿學士充京畿兵馬制置使朝廷謂其陳禦敵之䇿特以是命之寵至渥而任至重矣自敵廹至近郊都城戒嚴已踰両旬畿甸居民盡被刼掠蕃不扞禦以衛王室乃擁卒旅䕶妻孥避敵迯遁為自全之計臣前具來劄子面奏乞根䆒蕃所在併臺官論列聞已降指揮令疾速發来赴闕謹按蕃天資險詖公肆誕謾居䘮汚穢冐哀求仕屡辱吏議案牘具存不忠不孝其罪著聞難以殫舉今者專統制之權乃避敵逃遁以法䋲之是叛臣也正誤國之罪肆兩觀之誅尚未足以謝衆怨今赴闕之命朝廷必有以處之矣臣體訪得王蕃部領兵馬約二千餘衆過頴昌前去縱令兵徒刼奪所至搔擾甚於敵人居民奔迯正月十九日已宿唐州二十日起發不知所之蕃避敵誤國臣知其為叛臣矣若領兵越境而南臣不知蕃之奸謀將何所圖也朝廷雖有指揮令發來赴闕臣竊謂蕃之叛已不臣於陛下矣其可召而至乎伏乞陛下早加睿㫁免貽後患取進止沈琯上書李綱乞明賞罰書曰金人之强能强於符堅乎中國之弱果弱於東晉乎向使似之尚使為淝上之一戰而今者凢有要求無所不從一切惟令之取何哉欲親王則以親王與之欲都尉則以都尉與之至今欲宰相以為質則邦昌為少宰而遣主議和而其為太宰者弗去也欲樞宻以劃地界則路允廸為賫書而徃主割地而其為樞宻者弗去也何待宰相樞宻者厚而親王都尉之薄也以至一走而為大資再徃而為兩府張大金之聲勢以脅朝廷則遷給事割并三鎮之地以蹙國勢則除侍郎凡言金人之兵少與用兵之䇿者皆怒而不聽夫國之所以為國者正是非明賞罰是非不明賞罸不正其能國乎琯所以夙夜憤憤為國家慮而不復仕者此也伏望樞宻以道事君取天下之真才實能而用之進君子退小人正是非明賞罰使朝廷清明邉鄙寧静時和歲豐琯雖在耿耿中受賜多矣憤激之深言不能盡伏幸察裁琯至是日猶見瓊等尚未行自知言不能用恨用事之臣殊不為社稷宗廟逺圖遂投致仕而歸開封府出榜止絶内侍家論訴及殫壓百姓牓云契勘近有兇惡之人逓相唱舉羣衆街市毆擊内官及刼奪財物當所躬親擒捕將首惡之人處斬訖自合追財捉黨盡行依法决配幸遇聖恩務恤百姓出於無知輕犯刑憲特賜赦宥及再下手詔丁寧安恤已經赦恩之人如更有内侍陳訴本府更不受理聖㫖寛大百姓盡當體念仁厚之意相率改過自新不得復有煽惑今來尚慮頑猾之人不能深體仁聖愛民之心尚敢鼔唱羣衆務要作過仰同謀之人速赴本府陳告即時支賞錢貳百貫特與免罪其有作過之人斬訖聞奏的不容恕十九日己邜尼堪䧟威勝軍知軍詹丕逺被殺尼堪圍太原未下留数萬人守太原而分其半趋京師尼堪兵自太原而南過南北關仰而嘆曰關險如此而使我過之南朝為無人也哉至威勝軍權軍事李司録者以軍献之尼堪忻然駐兵城外而趋隆徳府都大提舉京城四壁守禦使司牓更不召募効用契勘本司近出牓召誘諸色軍人敢効用等今来金人已退更不召募湏至曉示尼堪䧟隆德府以燕人姚璠知府事尼雅滿自威勝軍趋隆徳府無備守臣張確慿城與戰敗二日而破張確同通判趙伯臻皆被殺尼堪留漢兒姚璠太師守隆徳二十二日戊午尼堪兵自隆徳府南攻澤州界聞其有備不敢逼城三朝北盟㑹編卷四十
