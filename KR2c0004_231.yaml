body:
  text: 三朝北盟㑹編卷二百三十一宋徐夢莘撰炎興下帙起紹興三十一年八月十四日甲寅盡九月二十七日丙申十四日甲寅李寶以舟船下海至東海縣僞知縣髙敞及前知縣支邦榮降劉寶為鎮江駐劄都統制李寶為遊奕軍統領官後辟為後軍統制楊存中知寶與劉寶不相協時令離軍發赴行在授不釐務路分都監百餘日除帶御器械又百餘日除知黃州未行邊報金人舉兵乃授寶左武大夫宣州觀察使沿海提督甲寅下海至東海僞知縣髙敞及前知縣支邦榮京東人也在北界以進士及第或勸之使去敞曰我本大宋之民今大宋軍馬已到將安歸遂以縣降寶載敞于海船同下海令敞之子禹挈家住淮甸十五日乙卯金國主亮殺諫議大夫韓汝嘉舉兵南下金國主亮欲舉兵韓汝嘉自盱眙歸諫亮寢兵講和亮不從曰爾與宋朝為游說耶賜汝嘉死遂起兵劉錡軍于揚州劉錡以浙西江淮制置使往揚州置司遺史曰劉錡以制置往揚州錡曰軍禮久不講人皆不知軍禮乃建大將軍旗鼓而行軍容整肅旗幟鮮明自靖康初李綱解圍太原出國門日常行此禮江浙所未見也觀者悚然惴恐時錡方病不能乘馬遂用皮穿竹為輿肩遊手人肩之鎮江城中香烟如雲霧觀者擁隘錡嘗謂諸將佐曰此舉皆令汝輩建節取重陽日到京師犒設州官于江皋送之錡舉袖揖之曰不暇茶湯且欲速行諸公有墳墓在西北者宜備行計具拜掃之禮相繼而來小人傳其語為實然遂軍于揚州十七日丁巳田師中令赴行在奏事二十三日癸亥張燾落職致仕起知建康府金人敗盟上思得重臣鎮守要路遂落張燾致仕起知建康府奉聖㫖應出戌官兵係分劈請給在家訪聞軍將積缺回易官私債負依舊尅除取索深慮贍養不給可令逐軍遵依已降指揮日下盡行除放如依前債戾重置典憲二十八日戊辰魏勝特授武經郎兼閣門宣贊舍人知海州淮東運使楊抗申到探報先是金人兵馬首擾川界而我中原忠義之士探報繼至九月上旬淮東運使楊抗據進士李坤韓先貼子報云魯校尉太倉催御米走馬人至言咸平府五月一日起東京初八日起廣寧府十三日起義綿州十五日起共五箇萬户不滿三萬人中間一箇萬户山後九州一萬一千人分作十五個千人漢軍共五萬人元起定七月二十七日大河以北請器甲今為北邊事務重未見所往待北邊上走馬人來方敢具報近北邊反了三千户是奚契丹又新僉漢軍惟北京一處二萬户來到松亭關回燕子城了一萬副甲知北邊或退方敢南行若北邊不退未敢南行坤初十日起中秋行到南京凡我指揮一一分明示來人向北非細走馬北向去人二百三十餘道未見端的一匹馬回又韓先探報來云七月三日新差右丞為元帥宣到諸路節度使并總管十五日御實十六日差除下項司徒燕人遷右丞相左丞相張浩遷太傅尚書令孫嶺北東京人冀州節度使崇進某人遷御史大夫是駙馬南京統軍金紫某人充西蜀道行營都統軍是駙馬平陽府總管金紫張彥忠排行第七關西人元是本朝人後來發過去充西蜀道行營副統軍太原府總管銀青劉某充漢南道行營副統軍女真家吏部尚書榮祿白某遷副樞密院開封府同知奉國君某遷兵部尚書嶺北東京留守同知奉國張某保州節度使户部尚書通議大夫開封府同知先是六月二十九日郎主駕郎主謂完顔亮在汝州界叛了護衛契丹軍約三百餘人往西京永安軍山內住泊差河南府駐劄千户去收又七月六日馬行街即指揮斬了南京兵馬副都某人為漢良奴婢并棄職走往燕京又七月九日差走馬四百餘匹跟刷諸路應私騾馬除左丞得留六匹及五品以上許留一匹外餘大小職官并百姓不許收養如隱漏馬該死騾馬要往滑州駝衣甲等用關西河東兩處自來元簽軍今取六月十八日起發往滕陽軍兖州就器甲限七月十五日要到後來知去向端的七月十八日回程離汴京至七月二十一日知得劫了徐州頭首某人却往梁山濼七月二十六日回程到虹縣見走馬金牌到縣得郎主指揮將叛民壯了便行殺戮及撫恤其後民户云耐辛苦一兩日搬運糧草南去傳到金人詔僞詔曰朕在位恢心坦然四鄰歸貢逾有年矣皆出于祖宗洪厚德澤也念境內羣冦越擾邊民叛逆于南宋况兩朝之民舊屬宋處自來狼子野心始自來我宋盜買戰馬後至彰露而止又以探報羣卒諸路變形或作紅巾或作商旅或兩朝奸吏妄說悠辭撰造異端而無厭怠貪婪榮身鬭作兩朝講好親睦之意朕已詳之今朕親將五百萬兵速降夏國以九月下旬回國遣使往宋以决顛末君臣父子各宜堅心謹守諸路故兹詔示敗盟記曰金亮天性異常故往往不羞大言當為王時作竹詩曰孤驛瀟瀟竹一叢不同凡卉媚春風我心正與君相似只待雲梢拂碧空又記題曰蛟龍潛溺隱滄波且與蝦蟆作渾和等待一朝頭角就尾搖霹靂震山河又過汝州詩曰門掩黃昏染碧苔那回蹤跡半塵埃空亭日暮鳥爭噪幽徑草深人未來數仭假山當户牖一池春水繞樓臺繁花不識興亡地猶倚闌千次第開此詔與詩意豈相逺哉蓋要為此詔誇耀吾人聲言五百萬兵速降夏國九月下旬回國豈不誕哉是詔乃詔七月間韓汝嘉到泗州以後作且如七月初五九月終計足九十日矣中國至西夏并數百萬衆豈九十程可回往而畢耶然則五百萬兵非吸風茹雨之士速降夏國非騰雲插翅之人可見誇飾自速死亡兆于是矣九月八日庚辰吳拱為鄂州駐劄御軍都統制吳拱玠之子也為鄂州都統制以代田師中己卯到鄂州庚辰交都統制職事漸發諸軍往襄陽癸未諸軍發絶是時左軍統郝晸為京西安撫使亦起發拱承朝廷指揮襄陽倘或有變吳拱不能自保則令退守荆渚拱具劄子申朝廷言此甚失襄人之望且荆門為吳蜀之門襄陽為荆州之藩籬屛翰上海號為重地若棄之不守是則撤其藩籬襄陽依山阻江沃壤千里設若以為巢穴如人扼其咽喉守其門户則荆州果得髙枕而卧乎朝廷必欲襄陽為一道固圉之計非三萬軍馬不可保守若欲保守荆州自合將襄陽為扞中之計當得軍馬一萬使拱可得措置則修置小寨保護禦敵營闢屯田密行間探遺史曰吳拱言襄陽形勢則盡之矣不敢以其人而廢其言若保守之方則甚為乖疏所謂修置小寨者其意在于退守萬山而棄城不守也保護禦敵者其意在于閉關自固不出兵以接戰也拱到襄陽首置萬山寨山無水無薪若屯大軍不可以息師徒勞役衆口籍籍道路駭聞劉錡自揚州進軍劉錡在揚州病上遣中使談某宣押醫官孟某赴揚州醫治錡曰錡本無事蓋緣國家邊事如此至未决用兵俟敵人侵犯然後使當之既失制敵之機何以善後後發受制于人錡憂此不忘是以病也談某具道已得上旨令制置謹察動靜不可落其奸便矍然而起具奏回報即建大將旗鼓而進兵每日進發一軍時錡實病不能食唯以羅蔔下白粥而已軍行整肅錡亦頗能得將帥之體有鄉兵統領路次迎參錡皆不顧十七日丙戌楊抗舉劉汜遺史曰淮南路轉運副使楊抗奏臣伏覩閣門宣贊舍人兩淮西路兵馬都監鎮江府駐劄御前中軍統制淮南浙西浙東西路制置使司提舉一行事務劉汜志節不茍忠義特篤好學輔以儒雅臣嘗至其軍遇汜閲試戰士號令精明進退肅然今保舉堪充將帥任使有㫖劉汜與轉武略郎依舊兼閣門宣贊舍人令三省樞密院籍記汜錫之子錡之姪也十八日丁亥吳璘遣將官彭青劫鳯翔府鳯州渭河南寶雞縣金人寨二十四日癸巳夏俊克泗州夏俊在盱眙軍幹買北物見元顔亮敗盟有侵犯之意遂謀欲占泗州有武功大夫張政者自軍中揀下作揚州指使任滿居盱眙俊與政議其事政聚衆得一百八十人知盱眙軍周宗退保在天長至是俊等謀定夜備船渡五更渡淮先占西城西城人覺知皆稱願歸順大宋人馬取泗州並不殺人各安心轉至城東下觀汴河有空船俊政等遣西城百姓有船得六十餘柂僞知泗州富察圗們率其下二三十騎棄東城遁走俊等入東城撫定遣百姓渡淮遣人報置制史劉錡到天長得報并有金人解赴軍前者錡皆不問令俊權泗州有銀一千五百錠絹五百匹錡遣其姪汜取銀絹餘不盡者俊與其衆分有之盱眙軍報九月二十三日夜二更樞密院使臣夏俊部領義兵併力殺退北軍已復占泗州西城别有措置收復東城至二十四日天曉西城老小盡皆渡過南岸續據使王文報東城安撫富察圗們同知大周仁與夏俊在城答語東城盡倒旗槍又據北稍工嚴國到軍稱東城百姓官吏皆歸順本朝有富察圗們與大周仁逃竄出城不知去向其本城老小見行載前來南岸已申中軍劉統制措置人馬過淮彈壓劉藴古特添差兩浙西路安撫司准備差遣劉藴古在北界提籃販賣叉朵者往來于壽春𣙜場與南客語則曰願歸朝言南北利害若大宋則恢復舊疆直不難耳南客漸能說姓名有好異者接引使歸朝藴古自言二弟皆在北界及第已獲兩解不得一第遂有歸正之意若取中原滅大金直易事耳至行在初授藴古右迪功郎為浙西安撫司准備差遣吳山有伍員祠在錢塘闤闠之中藴古先别置廟牌易去舊牌牌上題刻具位姓名合市人皆驚曰舊牌工緻於新牌逺甚不知何故易之有右武大夫魏仲昌者窺見其意曰他人之歸正者僥幸官爵茍圖錢帛而已若劉藴古者真奸細也或問其故仲昌曰榜其姓名于吳山廟旁蓋欲使踵來間探者知其已到耳權知光化軍張超與金人戰于光化軍城中金人退走張超鄂州駐劄御前遊奕軍將官也都統吳拱令權知光化軍將帶巡捕孔斌擺鋪周明將司曹通教頭楊輝旗頭李成引戰劉進管隊商進直頭賀忠長行曽晟李全鄧髙青融德蘇進等凡二十四人以癸巳凌晨入城方坐于㕔事交割郡事間忽報有金人鐵騎入門乃金人七百騎夜宿于三十里地超忽閉譙門令隨行人擐甲持鎗突門而出呼百姓以檯桌之屬堵巷路口超分其衆作數項攔截鏖戰之于是百姓皆出門渡漢江而城中戰猶未休金人自謂不能當乃聚衆數十人指一官軍攢箭射之官身負戰皆如蝟重傷及死者數人金人之死者亦數十人方稍退去光化之役荆襄第一戰也頗增戰士之氣奏功于朝各人得轉二官資皆給公據而已付身竟不下二十五日甲午吳璘收復秦州吳璘遣劉海等領兵掩殺敵衆退走入城尋分布官兵自九月二十五日申時攻打至二更已打破秦州除撫存軍民外捉到金兵活人金人蕭安撫髙同知千户明威將軍齊哩克將官奉信校尉寶金人大郎君二郎防判官李旺信王主簿趙通事李淮提劉天使及捉到金兵活人研到首級奪到戰馬器甲莫知其數二十六日乙未金人攻信陽軍成閔以中軍統制趙樽分兵四千屯德安甲申發鄂州庚寅至德安居五日信陽軍以金兵來告樽曰信陽雖小實為德安表裏不可失也乃留遊奕統制宋奕居德安自將所部馳赴之敵馳徑去侵光州吳璘收復隴州方山源吳璘申金都統喀齊喀貝勒張金紫追集陜西諸僞兵于隴州方山源秦州鳯翔府等處屯駐意欲分兵前侵犯尋遣差右軍等二正將彭清副將强英左軍第二副將張德等將帶軍馬去措置收復去後今據逐官申于九月二十五日到方山源差人說諭招撫其本源敵兵堅守不從于二十六日清擁官兵向前自卯攻打為中官兵分番前來戰敵約十五陳清等告誡官兵一擁齊入至已時攻破方山源其敵敗走捉獲活人當陳到首級奪到鞍馬莫知其數二十七日丙申吳璘收復洮州吳璘申遣差將官曹洑等九月二十七日收復洮州及管下冷丁堡通民堡招撫到洮州同知昭武大將軍鄂屯徹辰一行官兵老小撫定軍兵依舊安業及據將軍張德申九月三十日攻打破隴州與金兵巷戰殺死敵兵未知其數捉到活人奪下鞍馬有知州盧奉國同知劉昭武走上凉樓招撫不下遂用火燒毁及將本州倉場所裝金人糧草百萬餘盡行燒毀外有歸降兵說諭撫定了當的是獲捷三朝北盟㑹編卷二百三十一
