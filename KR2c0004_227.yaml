body:
  text: 三朝北盟㑹編卷二百二十七宋徐夢莘撰炎興下帙起紹興三十一年正月盡其月和州進士何送英上書和州進士何送英謹齊戒沐浴昧死裁書惶恐頓首拜獻于皇帝陛下臣聞欲成天下之大業必順天下之大心欲安天下之生靈必從天下之所欲坑戮儒生見秦邦之鹿逐駕馭英豪致漢室之龍興得士者昌失士者亡此古今之通論也恭聞我宋太祖帝詔曰朕應運開基持誠待物顧干戈之漸偃慮華夏之未安渴聽讜言庶臻治道又曰或聞利害朕當善聽而行無以逆鱗為懼此太祖皇帝尚賢求諌之意也恭聞太祖皇帝謂進言曰朕求正言以規已失昔禹拜昌言世稱其美今朕茍能得言豈惜拜之乎又前有草澤之士書上辭甚悖慢事涉輕罔亦恕而禮遣之此祖宗之宏規修祖宗之道則朝廷何患乎不治天下何患乎不安頃自秦檜誤國以來奸臣相繼専黨擅權無所不至鉗天下之口結天下之舌于今幾年矣國家利害人不得言言之則禍不旋踵大者殛于海隅小者斃于囹圄以致在朝則以訛言為禁捕在學則以謗訕為平罰科舉則以時忌為弃黜遂令天下之忠臣義士撫膺扼腕相視切齒髙舉逺引甘心自弃于南山之南北山之北或佯狂于閭閻或飄蓬于江海或慷慨而悲歌或如癡而似醉至于鬱鬱而病憤憤而死者多矣臣于是時進退不能自知無用不免土木其形骸水雲其心志隱于岩石泉水之下處豐草長林者三十年矣每採一枝擷一蕙耕朝雲釣夜月登山臨水瞻望天庭未嘗不謳吟感戴陛下之盛德洪恩也故嘗仰天而誓曰茍有寸謀尺計可以補國家而朝達宸聽暮竄嶺表死而無憾豈意諫書才至慈父不諱哭聲尚未止泣血尚未乾所以冒刀鋸忘鼎鑊而輒言天下之利害者是臣當死之秋也臣竊謂不入宫門者孝子之常禮不徇末節者忠臣之大權順常禮則三年之喪不可去從大權則一死之忠不可辭願陛下恢乾坤之量開日月之明少延微臣以畢愚衷誠天下之幸也臣竊謂今日之勢為陛下可憂者三可惑者三可寒心者三可痛哭者三繼之可勉者三亦可賀者乂三何謂可憂者三臣聞居安而慮危有備則無患陛下以今日之勢為安耶為危耶為有備耶若為安則天下封疆為金人所攘者十分之九而陛下所守者東南一隅耳未見其安也既知其危豈得恬然髙枕尚遲疑而未舉耶若以為有備則立功之邊臣死矣敢戰之勇士老矣將壇尚未築兵算尚未成未知其有備也既知其無備何不毅然早圖之此臣所以為陛下憂者一也臣聞文武並用長久之術也竊見前日結金人之好罷天下之兵誅大將而挫忠臣之鋭竄元戎而銷壯士之心如虎如貔如熊如羆散而之四方矣今日所招之而未來引之而未至是猶傷弓之鳥未能無疑失水之魚未有頓蘇在今日之良將不可以不早用大兵不可以不早興中原不可以不早復前恥不可以不早雪茍或良將不能用則中原不能復前恥不能雪矣此臣所以為陛下憂者二也臣聞以德報德以直報怨陛下忘陷國之深寃抑從和戎之下䇿屈天子之尊遣皇華之使冒露霜涉關河問起居賀正朔賂之以重寶待之以至禮千需萬索惟命是從粵于今年之春修立京師止罷𣙜場剩却商旅取奪財賄遂至沿江臨近之民奔走驚惶幾月未定至今兩淮之民朝憂夕慮蹙額而相告曰父子未我保鄉土未我安誠謂今秋冬必復奔逃而存亡未可知也嗚呼人心動搖有如是也國勢危銷有如是也將恐奸雄乘隙禍起蕭牆不可勝言者此臣所以為陛下憂之者三也何謂惑之者三臣聞雖有智慧不如乘勢雖有鎡基不如待時今也時已至矣勢已順矣陛下移兵北渡駐蹕淮南亦良䇿也然而理有所未至者臣竊慮之陛下且以防邊頓兵于淮南則虛張聲勢漏泄天機金人見疑必生詭計與其後時受制于人孰若順時乘勢而先動之為愈也又况三軍士卒聞舉兵則欣躍爭先萬一逆其心遏其志則三軍之情又復挫矣敵國之奸又復縱矣此臣所以為陛下惑之者一也臣聞聖人以四海為家百姓為子治則同其樂亂則同其憂陛下自和議以來偷安獨樂斯民愁嘆者于今幾年矣及其國勢已迫時事將危于是費國用造御舟于海岸欲為避敵之計天下聞之舉皆失笑以一夫夜呼再侵江浙陛下不免乘大舟入滄海以為可逃其患也設若金人發舟前逐且波濤萬里浩渺無津涯進之不能退之不得當是之時社稷委弃宗廟丘墟其禍不可勝言此臣所以為陛下惑之者二也臣聞若藥不瞑眩厥疾弗瘳故善醫者投藥于未病之前不善醫者投藥于已病之後嗚呼病已成矣藥何濟焉今日金人之病如癰之結日復一日將恐毒勢一潰流血萬里瘡痍四海矣伏覩前歲朝章所報有草萊之士因陳邊務以不合時議竄斥逺方夫為草萊之賤而敢直言則可尚矣而罪亦可赦矣振天威扼讜論復使忠臣義士鉗口結舌天下聞之孰不痛心此臣所以為陛下惑之者三也何謂寒心者三臣聞君之視臣如手足則臣視君如腹心君之視臣如土芥則臣視君如國人君之視臣如犬馬則臣視君如冦讎且陛下今日之視臣如手足乎如土芥乎如犬馬乎臣未暇詳曉姑執一二而陳之伏覩前右相張浚因西北失利䝉朝廷屏斥逺方憔悴無聊者幾年矣粵于丙子年方沐恩量移差遣意謂一新忠臣補飭前過豈期鶴髮之親遽亡邂逅之章復上朝命一出速于星火逐之再去驚怖魂飛嗚呼四十年之間離鄉關弃墳墓扶老攜幼委質為臣豈無所望哉不謂入桑榆之境斥瘴烟之鄉泣血捶心無所赴訴陛下曽憐之乎太尉劉錡以數千之兵當百萬之衆運籌决勝多多益辦初非罪名一旦奪其權職尚困鹽車未副輿議陛下曽思之乎如趙榮者雖是陷于敵廷而志在我宋持金石之心脫虎狼之口歸于朝廷如投父母反被囚鎖復送敵廷孤忠憤怨屈辱無告陛下曽知之乎如此之類不可勝計遂令天下忠義之士離心離德者正緣是耳此臣所以為陛下寒心者一也臣聞君子不黨君子亦有黨乎彼有附前日之黨者必守講和之議也謂茍非和議則太母亦未歸茍非寢兵則生民亦未安嗚呼為是說者何不通之甚也殊不知使諸將未罷則金人之滅久矣中原恢復亦久矣太母回鑾亦久矣奈何自和議之後淵聖尚未歸中原尚未復財用日耗人心日離讒諂之人熾矣忠義之士去矣中國之勢愈衰矣金人之勢愈縱而亡厭矣此臣所以為陛下寒心者二也臣聞京師者諸夏之根本也天子之所居也昔周家所以建都洛邑者以其得天地之中華也項羽所以失關中者以其失天下之衝要也嗚呼衝要之地反不為朝廷居也嘗聞居中以禦外未聞僻處一偶也夫殊方異域聖王所以居化而聲教所不及者今也欺天罔地妄自尊大輒恃盛強而僣以大號敢示猥名而諱于大朝俾中國遣送之物稱之曰貢獻屈中華之民比之以臣妾自曠古來未有受辱如朝廷也未有忍辱如陛下也此臣所以為陛下寒心者三也何謂痛哭者三臣聞父母之讎不與共戴天兄弟之讎不與共履地陛下亦念父母兄弟之讎乎當時陷敵之臣成傾國之禍敵騎臨而三軍降京城陷而萬民哭我先帝弃而播遷御舟東而北渡天愁地怨鬼哭神悲胡沙漠漠而去住何歸塞路茫茫而徘徊莫進痛念祖宗之業悲思骨肉之親追社稷以傷情悼生靈而揮涕日復一日憔悴聖顔年復一年消磨睿算遂至霞升雲舉而有終天永久之别嗚呼往者不可諫來者猶可追至如淵聖皇帝一陷敵廷三十年矣父既殁母亦歸兄弟離散宗廟丘墟伶仃一身羈縻外國春去秋來而神消魂黯水逺山遙而心馳魂飛天下聞之孰不悲咽在陛下手足之愛想亦未忘然而俟河之清人壽幾何將恐歲華荏苒鐘鳴漏盡雖欲痛之其可及乎此臣所以為陛下痛哭者一也臣聞天下者祖宗之天下社稷者祖宗之社稷陛下今日所以膺無敵之貴享無倫之富者皆祖宗之基業陛下曽念祖宗之艱難乎既曰念之且祖宗之山陵安在哉今陷金人之區矣想夫荒郊蔓野走燐飛熒神碑斷而秋草衰享殿焚而墓烟靄鐵關閉而塵積金鎖壞而埃生青龍潛白虎伏朱雀暗昧𤣥武沈縮柏露朝悲松風夜啼嗚呼以祖宗功德之隆豈期有今日之事乎以聖子神孫寧忍坐視而不救乎此臣所以為陛下痛哭者二也臣聞漢王都關中而曰游子悲故鄉是山川閭里故舊未忍忘也陛下曽念中原之民族故國之宫闈乎自祖宗積德纍功垂二百年仙源慶積金枝玉葉可謂繁衍盛大當時拱辰環極聲珮鳴珂近者則百王之宫逺者遂分南北之宅以至居京畿之內外而宦游于四方者類皆天府之神人龍宫之仙客也一切入強敵之手殺之而死者半鞭笞而為奴𨽻者半不甘其屈辱而自盡者半奔亡而不知其存者又其半也非獨是耳曽不聞宫娥妃子乎禁宇開而别羣王敵騎驅而出京國關河歲暮風雪天寒蹂踐珠翠於千軍逺涉沙塵於萬里對黑山青塜三千粉黛又豈一昭君之悲乎嗚呼三十間死者已為孤塞寒鄉之鬼矣其或存之者望故鄉帝里哀鳴天地泣度朝昏其誰知之乎此臣所以為陛下痛哭者三也何謂勉之者三臣聞投之機㑹間不容髮今日之天下危如纍卵陛下端拱以為金城湯池之固曽不知大海東北萬里如掌設若金人肆計别出竒兵多乘船舫隨其波勢沿海而上驟若風雨直至錢塘國勢兩逼無際可逃或如此為之奈何與其坐視一隅不若權都金陵壯其國勢况金陵勝槩地稱天險龍蟠虎踞關居自然咽喉控帶縈紆錯盤在今正為衝要之區也陛下早推宸斷速任舊人今日天下軍民之所欣慕敵中之所畏服者張俊劉錡是也願陛下早復其舊職早委其兵權統率三軍長驅前進如是則東免海道之不測北無金人之警憂進之則吉退之不凶若陛下果駐蹕金陵庶得親䇿將帥俯視強鄰天威不迫事貴速成此臣所以為陛下勉之者一也臣聞人之所欲天必從之夫中原之民遊泳太平衣冠禮樂沈潛聖化鑿井耕田謳歌擊壤含哺而嘻鼓腹而遊陶陶遂有生之化初不識干戈兵革之事一旦遭鯨鯢虎狼之恣父母不相見兄弟妻子離散為别世異域之民飢寒苦役無所告訴思念聖朝日夜不忘若大旱之望雲霓今果能乘勢取之簞食壺漿以迎王師矣陛下翠華駐蹕東吳幾年于兹矣凡執鞭鞠䇿而備扈從爪牙而䝉驅使者以至老將舊兵三軍士卒類皆西北之人襁負而從竭蹶而趨則關河之情勢可見也彼以情之所鍾心非木石豈不懷桑梓念墳墓懷親戚之舊今日思歸之切咸願死戰可不因其心順其勢乎此臣所以為陛下勉之者二也臣聞閫內之政任于將夫用兵之法無定形顧方略如何耳且委用良將可持一定而為膠柱鼓瑟者乎故當任之以腹心委之以便宜庶以量其戰勢運其謀算無牽制之失臣竊觀紹興十一年金人深入坐困淮南是時諸將合謀大戰而勝金人敗北弃甲曳兵而走方乘勢襲其後當強鄰喪魄之際正三軍得志之秋天下咸謂可以建中興之功雪前日之恥豈期廟堂之議在講和投鼠忌器急追將士不令前進由是諸將之志消三軍之氣索金人之勢愈炎矣天下生民愈益愁嘆矣嗚呼前車之覆後車之戒今日事當一新烏可復蹈前日之轍乎此臣所以為陛下勉之者三也何謂可賀者三臣聞鼎新而革故否極而泰來此不易之論中華之憂辱已甚矣金人之罪惡已貫盈矣天怒于上人怨于下天人共誅豈有識者不願為之今日之舉可謂上應天下順人自然乾坤輔德祖宗降靈仗大義舉大兵雲行雨施電掣風馳旌旗爛天戈矛却日厯兩淮渡大河揚天子之威問胸奴之罪三軍並進萬里橫行戰必勝攻必取此臣所以為陛下賀之者一也臣聞天時不如地利地利不如人和今天得其時地得其利人得其和所過名山大川鬼神無不佑其力所過神州赤縣人民莫不歸其仁東收遼海西復秦關自南而北直至幽燕平其巢穴絶其根株大報深寃盡雪前恥取迎淵聖收尋皇族灑掃山陵慰安宗社遷重器而歸六宫于上國詳延故老搜訪舊人招流亡振孤獨興利除害去殺勝殘頓復山河重恢社稷此臣所以為陛下賀之者二也臣聞文王一怒而安天下之民武王亦一怒而安天下之民陛下一怒非獨安天下之民又將得天心焉大抵飢者易為食渴者易為飲故德之流行速于置郵而傳命此理之必然也當時虎嘯而生風龍興而致雲此得賢之誦可作矣威加海內歸故鄉此大風之歌可舉矣勒功燕然刻石湘江分茅裂土大賞功臣繪丹青于雲臺紀勳庸于帝籍國家閒暇晏然無警柳營靜而歸馬引榆塞空而邊鴈飛玉關晝鎖戎野春耕冠帶百蠻車書萬國當是之時方為太平此臣所以為陛下賀之者三也臣所陳前䇿非一己之私謀實天下之公議陛下若欲上應天心下順民情迎穹漢之休祥消邦家之灾變除臣所請别無長䇿茍守株待兔緣木求魚則失其機㑹矣陛下若以臣言為忠則陛下熟覽臣書預為之計若以臣言為妄則斬臣之頭以令天下臣將弃人間遊地下追龍逢比干矣嗚呼一興一亡在今日者惟陛下痛思之干冒天威引首待罪謹昧死奉書以聞臣誠惶誠恐三朝北盟㑹編卷二百二十七
