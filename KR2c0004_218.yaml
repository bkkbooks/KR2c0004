body:
  text: 三朝北盟會編卷二百十八宋徐夢莘撰炎興下帙起紹興二十一年八月四日辛未盡其日孫覿撰公墓志曰建炎三年冬金人合衆數萬絶淮泝江鼓行而南將吏望風逃竄無一人敢攖其鋒者當時太師鎮南武安寧國軍節度使咸安郡王韓公以兩浙西路制置使提孤軍駐楊子之焦山募海舶百餘艘具糗糧治器械進泊金山下連艫相銜為圜陳東向邀其歸植一幟書姓名表其上金人望見大笑曰此吾機上肉耳平旦擁千舟譟而前公先命工煆鐡為長綆貫一大鈎遍授諸軍之伉健有力者比合戰分海舶為兩道出其背每縋一綆則曵一舟而入大帥立馬江上鋭欲為救熟視蹂擾莫能進一步曽不踰時掩獲數百舟遂大敗閉壁不敢復出己乃並治城西南隅鑿一大渠亘三十里欲潛師渡建康而地勢髙仰潮不應一日乘南風縱火千餘筏抗舟師破巨浪冒百死趨瓜洲渡公曰窮寇勿追縱使去於是録俘囚束之沉江中金帛盡與麾下盡遣吾人之被繫縶者書婦女州里姓氏揭諸道以訪其家然後獻捷行在後兩淮交兵十有餘年而金卒不能飲一馬于江者懼公楊子一戰之捷也公諱世忠字良臣綏德人年十八始𨽻延平府兵籍悍邁絶人不用鞭轡騎生馬駒挽強馳射勇冠軍中家貧無生産業嗜酒豪縱不治繩檢間從人貰貸纍劵十數遇出戰則躍一馬先登捕首級馳還得金幣償之率以為常嘗從統制官黨萬戰銀州方解鞍頓舍而敵騎出間道直搗其營萬狂顧不知所為公袒裼持一戈率其徒戰卻之萬兵來援殿而還又嘗遙見一帥金甲朱旗出護兵意得甚公馳一騎刺之後諜知貴將駙馬郎君烏頁也大師張深表其功狀上之朝而童貫怒不先白已黜其功不録宣和初妖人方臘起青溪不旬朝衆數萬破衢婺杭睦歙五州江淮大震徽宗詔諸將發兵捕誅時公𨽻統制王稟行次浙河别將王淵駐兵在焉公扣馬而進曰公領騎兵而戰非其地奈何淵問曰汝為誰答曰韓世忠也淵喜其言移據便地翌日縱騎搏賊公率所部突其旁賊驚奔追殺無噍類淵喜甚飲公酒會稟卒遂從淵方臘授首例補承節郎河朔山東羣盜蜂起大者攻犯城邑小者延蔓嵓谷多者萬計少者屯聚魏博則有楊天下之流青徐沂密如髙拖山等至不可勝數公方從王淵名播於兩河間而捉殺制置使梁方平又請公自副徐兖山東之盜公皆次第討平之以功纍遷武節大夫靖康末金人圍太原樞密使會諸道兵赴援而張師正統勝捷一軍號精鋭尚書李彌大素不知兵欲誅一二禆佐立威以強軍政會太原不守師正遁歸彌大殺以徇衆反側洶洶又不時撫定一夕潰去所過焚掠官軍莫能制淵聖皇帝詔公討捕晨夕兼馳至宿遷單騎扣其營大言曰我輩山西良家子好勇尚氣豈有作賊此李公謬舉使若輩求活於草間耳衆素服公勇相視慨然投戈免胄請從公歸公杖馬箠護之而還淵聖召見嘉奬面賜袍帶正授單州團練使今天子以兵馬大元帥駐軍濟州羣臣勸進公偕諸將陪扈至南京上即位進嘉州防禦使御營平寇將軍再幸維揚又負櫜鞬以從四年金山捷書至除檢挍少保改武威感德軍節度使制詞曰屯兵要害邀擊其歸大振軍聲殺傷過當強鄰震疊知國有人至今天下誦之方宣和末金人攻京師議者皆謂強鄰不量彼已昧死一來忽見天子宫闕苑囿城池之大憗憗然莫相知而五路之師日至間其疑懼壓以重兵而與之講和庶幾景德澶淵之盟足以為德無何劫寨一跌始有輕視中原之意積五六年舉國深入超邑越都通行無所纍南至潭湘東暨吳越皆罹其毒諸將按兵坐視莫與交鋒惟公自負其能獨與決戰何其壯也北方之俗壯士善騎健馬被鐡衣數重上下山坡如飛矢刃不能傷故常以騎兵取勝公在靖康搜集惡少年敢死士為一軍教以擊刺戰射之法號背嵬如古羽林佽飛射聲越騎之儔履鋒鏑蹈水火無不一以當百於是北馬牧淮楚間公至天長之大儀與之遇金帥貝勒托卜嘉擁騎奔突而前背嵬者人持一長柄巨斧堵而進上砍其胸下稍其馬足百遇百克人馬俱斃又自出新意創克敵弓斗立雄徑可洞犀象貫七札每射鐡馬一發應弦而倒金人震駭若有鬼神捕獲千萬人得鎧甲器械甚衆又轉至髙郵卒擒塔拉等具舟載俘獲獻之朝自是金人一再敗衄稍知沮畏雖時時小入窺邉無復跳梁不制之患矣進少師橫海武寧武安軍三鎮節度使公生長兵間習知戎事而天資拳勇未嘗以一毫挫于人臨敵制勝一出於意造故能以少擊衆劉豫聚兵泗上公戍山陽與之對壘屢戰破之嘗乘勝北踰淮泗並符離徑淮揚之宿遷豫亟召北軍四面而至圍之數重公按兵不動俄麾其衆曰視吾馬首所嚮奮戈一躍已潰圍而出不遺一鏃按轡而馳公曰敵易與耳乃治兵赴利進攻淮揚金帥達里貝勒者驍勇蓋衆獨出挑戰不勝而逃有馬大師亦號勇將乘兩虎相斃之勢奮迅而出亦重傷敗去退而太息曰名不得虛矣師旋斬捕首級過當封英國公會金主遣完顔烏凌阿思謀來聘請以太上皇梓宫皇太后鑾駕來歸除前事復故約上曰誠如是吾能忍垢以從使驛五反嵗行兩周而講和之議定兩地晏然解兵撤警公自山陽造朝拜樞密使貂冠赤舄入侍幃幄極人臣之選閲數月思避時柄上書解機務不許疏纍上且曰臣蒙國厚恩誓捐戰場效一死以報今以菲材承輔樞機進陪國論實懷危溢之懼所兾天慈乞解將相之官以祠官奉朝請日望清光不勝區區上不能奪加太傅鎮南武安寧國軍節度使醴泉觀使咸安郡王恩禮褒崇度越前比公受命已杜門謝客絶口不論兵時跨一驢從二三童奴負几杖操酒壺為西湖山水之遊解衣藉草命酒獨酌盡興而返平時將佐部曲皆莫見其面以二十一年八月四日薨嗚呼靖康建炎金人內訌天下多故公起行伍間忠憤感發奮不顧身以徇國家之急建陽之役手擒二憾金山之戰帥渠奔命僅以身免然後驅攘羣盜四封之內掃蕩無餘方是時也諸宿將徙屯江左公獨留戍山陽孤壘塊然旁無蚍蜉蟻子之援蔽遮江淮屹然如金城湯池之固中興之烈公為第一主上英武所以駕馭諸將雖隆名顯號極其尊榮而干戈鐡鉞亦未嘗有所私貸故嶽飛范瓊皆以跋扈賜死惟公進而許國杖一劔戡除大憝為社稷之臣退釋兵柄以功名富貴始終一品為公師持三鎮戎節纍封大國進爵稱王賜號揚武翊運功臣食邑一萬三千七百户實封五千九百户澤流子孫功書竹帛追配前哲可謂賢也公御軍嚴而有恩紀律修明不以賞罰佐喜怒藜羮糗飯與衆均之士以此樂為用摧鋒陷堅百戰不怠威名凛然天下想見其風采太母行殿歸次國門將相大臣班迎道上太母坐帷中顧左右曰韓某孰是敵中皆知其名傭舂釋擔聚觀太息上所賜詔皆親札雲章寶墨奎璧之光粲然集而録之為若干卷珠囊玉軸子孫世守之為希代之寶公病且革故時將吏問病卧內公曰吾歷事三朝大小百餘戰冒白刃中流矢未嘗退衄瘢疻尚在發衣視之舉體皆是賴天之靈得全首領卧家簀而沒諸君尚哀其死耶遺史曰韓世忠疾上飭太醫馳視問勞之使相屬于道平時將吏問疾卧內世忠曰歷事三朝大小百餘戰冒白刃中流矢未嘗退衄瘢疻尚在發衣視之舉體皆是且曰賴天之靈得全首領卧家簀而沒諸君尚哀之耶疾益侵册拜太師致仕訃聞不視朝賻有加遣中貴護喪事贈道義郡王官其親屬九人世忠字良臣綏德軍人年十八始𨽻延安府兵籍慓悍絶人不用鞭轡能騎生馬駒挽強馳射勇冠軍中家貧無生業嗜酒豪縱不能繩檢人呼為潑韓五有席三者嘗算世忠當作三公世忠以為侮已痛毆之後亦到江南依世忠世忠以錢三萬緡贈之兩子𨽻軍中皆專為橫行世忠貧賤時間從人貰貸纍劵十數遇出戰則躍一馬先登捕首級馳還得銀絹賞則償之率以為常統制官黨萬戰銀州方解鞍頓舍而敵騎出間道直搗其營萬狂顧不知所為世忠袒裼持一戈率其徒戰卻之萬兵來援之殿而還又嘗見一帥金甲朱旗出戰指麾意氣甚厲世忠馳刺殺之後諜知乃貴將駙馬郎君烏頁者大帥張深表其功狀上之朝而宣撫使童貫怒不先白已黜其功不録世忠既貴與將吏騎馬出郊喜坐於淺草中世忠語急而聲厲每言出則吐舌或以為是蛇精林泉野記曰公諱世忠字良臣延安府人少無賴𨽻赤籍焉纍遷為將嘗與張俊俱破鄆賊李太于醎河何威于洺大名賊于超化寺內黃賊于祁州徐靖於莒縣張仙于擂鼓山濰賊于方村并濟南賊公常勇冠諸軍遂定河北京東之地靖康初從王淵為統制軍趙州金人深入世忠劫其寨加頴州觀察使從淵守應天金來攻世忠楊進等纍戰敗敵相拒三月而退建炎初為御營使司左軍統制從幸維揚上甚簡眷二年率張遇陳思恭等軍于河南府世忠約翟進丁進孟世寧伐金于永興軍三衙失期陳思恭先以後軍遁世忠敗張遇援之得免收散卒數千歸行在後加承宣使帶御器械又除平寇將軍救京東戰敗亡其將張遇三年金取徐州世忠棄淮揚軍走渡江止餘兵三千亦皆潰去聞苖傅劉正彥廢立乃同張浚呂頥浩入援請為軍鋒破正彥赤心隊軍于臨平其復辟功居多加節度使苖劉走除江西福建制置使率馬彥溥趙竭忠趙竭節等追破于建州浦城縣統制孫世詢臨陳擒正彥傅微服竄村落為人所執送世忠獻俘行在上親書忠勇韓世忠五字於白旗以賜加檢校少保御前左軍統制世忠屯潤州敵渡江世忠退守江隂次年敵自明州還烏珠使請曰借我一路北歸舟中金帛盡以與汝世忠云可留下烏珠乃去以舟師戰於建康門外敵大敗斬首三千級次日再戰世忠海舟無風不能行以小舟縱火我師大敗統制孫世詢嚴永吉皆死復失所俘後改神武左軍統制紹興元年曹成馬宥劉忠亂湖南范汝為據建州除世忠江西福建荆湖宣撫副使二年復建州汝為自殺遣提舉官董􅌈往道州招降曹成馬宥將李闕殺宥以潭州降劉忠據潭州白面山有衆一萬號花面獸世忠破之忠奔劉豫為其下所殺加太尉武成感德軍節度使未幾除江南東西路宣撫使守建康三年進開府儀同三司淮南宣撫使屯鎮江後劉光世代世忠戍世忠遣人入城潛燒府庫光世訴於朝移屯於建康世忠又欲以兵襲其後上書寇恂賈復事以賜四年敵入淮南上親征世忠敗敵於大儀鎮又遣將董􅌈敗之天長解元敗之承州及六合縣許世安王權敗之真州五年來朝加少保遣將呼延通敗敵於漣水軍為行營前護軍六年改武寧安使軍節度使京東淮東宣撫處置使敗敵於宿遷圍敵淮陽軍不能克加橫海武寧安化軍節度使賜揚武翊運功臣嶽飛進軍京西命世忠為援延數月方至淮陽七年遣呼延通王勝王權襲敗敵於淮陽然與淮陽對壘終不能克每嵗才獲一二小捷而已九年宰相秦檜主和世忠伏兵洪澤欲劫金使以破和議部將郝卞以其謀密告淮東運副胡昉時韓肖胄送金使還昉以告肖胄俾由淮西路而去檜甚銜憾加少師其兄世良為龍神衛四路諸指揮使和州防禦使主管侍步軍司十年敵敗盟加太傅河南北招討使封英國公統制王勝敗周太師呼拉貝勒于淮陽又敗敵收海州擒偽王山又遣王升王權敗之蔣家莊又敗之淮陽統制解元敗之沂州潭城縣世忠敗之淮陽十一年烏珠大入淮西世忠與戰濠州敵敗而去來朝除樞密使罷兵柄世忠獻錢一百萬緡米九十萬碩及鎮江淮東諸庫於朝加兄世良奉國軍承宣使提舉醴泉觀命張俊嶽飛遷其軍於鎮江秦檜方謀去勳權纍諷臣僚言其過章上皆留不報世忠懼焉乞間乃加太傅橫海武寧安化節度使醴泉觀使罷十二年改封潭國公十三年進封咸安郡王十七年改封鎮南武安寧國軍節度使薨年六十三贈太師追封蘄王將佐若王權劉寶成閔解元咸秉節鉞登顯仕幕府若韓俅王渙陳桷張稱李易董􅌈亦皆至侍從師守三朝北盟會編卷二百十八
