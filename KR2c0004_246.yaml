body:
  text: 三朝北盟㑹編卷二百四十六宋徐夢莘撰炎興下帙起紹興三十一年十二月一日己亥盡五日癸卯十二月一日己亥朔趙樽克蔡州趙樽屯于麻城也被命依前駐軍蔡州㑹鄂州都統吳拱荆南都統李道進取中原初樽離蔡州日留李詢為知州而僞刺史蕭楙德入蔡州詢遁去樽取新息縣拱與道之信息皆不通金人游騎日相望樽謂若駐軍以待二都統甚善然曠日持久非兵家必勝之道萬一金人增兵雖欲復取蔡州必難不如長驅而入之率兵疾趨迫城下楙德聞樽至披城為寨相拒兩日不出戰己亥夜漏未盡樽將士潛師入城楙德遂遁樽既再得城與衆將議曰蔡州形勢之地敵所必爭且陷僞久無樓櫓雉堞荒榛如堤岸蕭楙德棄之去者知其不可守也今吾衆不過曰朝廷有命使守之金人必再謀攻我在我者宜有以待之於是稍加修治樽遂以復李詢依舊為知州知通州崔邦弼降官放罷知通州崔邦弼聞金人陷秦州劫掠罄盡又欲棄城遁去恐百姓不從己亥夜二更後遣人入城內外縱火三十餘處乘喧閙出城渡江往福山通判趙不悔已先期而遁料角統領官盛佺所統人隨邦弼出城因而潰去先是提舉茶鹽司得朝㫖存留海門淨海兩縣船為料角探望及搬運錢糧而邦弼不悔占留裝載宅庫兵吏家屬後為提舉王班暗發邦弼不悔各降兩官放罷時邦弼已致仕盛佺亦降兩官吳拱等收復鄧州新除湖北京西北路招討使吳拱荆南駐劄御道諸軍都統制李道主管京西南路安撫司公事郝最黃旗走報遣發將官劉革等十二月一日到鄧州新野鎮地名龍鼻劫金兵寨柵殺死金兵棄頭不砍其帥投寨退走入鄧州至十二月六日敵衆棄城逃遁收復鄧州了當革等統押軍馬㑹合忠義首領孫顯等粘蹤追襲外委是勝捷二日庚子得金國公牒報班師通好是日金國牒云大金國都督府牒南宋鎮江府正隆無道獨意起兵以致廢殞别立新主正議班師依舊通好邊上知此報御營修衛使太傅和議郡王楊存忠侍衛馬軍御前諸軍都統制成閔中書舍人督視江淮荆襄參議軍事虞允文總領淮東軍馬錢糧朱夏卿劉奉以聞既而北壘亦具亮之死狀來求和金國移牒三省樞密院大金大都督府牒宋國三省樞密院國朝自太祖皇帝創業開基奄有天下迄今四十餘年其間講信修睦兵革寢息百姓安業不意正隆失德師出無名使兩國生靈皆被塗炭今奉新天子明詔已從廢殞大臣將帥方議班師赴闕各宜戢兵以修舊好須議移牒具如前事須牒宋國之三省樞密院照驗大定元年十一月三十日牒銀青榮祿大夫左領軍督監開國公富察龍虎衛上將軍右領軍都監圖克坦右領軍監軍崇進左領軍監潘國公圗克坦儀同三司右領軍副都督亟國公銀青榮祿大夫右領軍大都督開國公太保左領軍大都督齊國公都督府回金國牒牒云今月一日承來牒照驗廢殞事除已繳奏外須議移文牒請照㑹紹興三十一年一日侍衛馬步御前諸軍都統制成閔御營宿衛使太傅和義郡王楊存忠大夫知樞密院事都督諸路軍馬葉義問朝公忞敗盟記曰是時行都府視江淮荆襄軍馬而云督視諸路者以金人稱大都督來議和故我不可示之以弱也三日辛丑督府發捷旗到行在帝曰金亮既滅餘皆南北之民驅迫而來彼復何罪令即日襲逐固可使隻輪不反然多殺何為但檄諸將迤邐進師㑹合京畿收復故疆撫定吾民足矣召虞允文赴行在允文既至入見上殿慰勞有加允文奏曰此廟社神靈陛下英斷將士用命臣何力焉上嘉賞再三有旨論功行賞張振時俊王琪盛新戴臯以功烈顯著人轉三官其將士亦以次推恩允文奏曰昨來采石事勢危急臣於振等行陳間許以重賞振等效死力戰以三官恐未足酬其勞乞回臣在身官職推賞振等上曰向江上得諸校致力其功豈可忘尋改張振等正任承宣使觀察使虞允文王繼論奏車駕進發而敵尚有在淮東西者今當督淮上之兵斷敵之歸路發鎮江建康之兵為掩襲之舉可無噍類上深然之命淮上措置而諸軍已先過江御製完顔亮畫贊金主曰亮獨夫自大弒君殺母敗盟犯寨殘虐兩國屢遷必敗皇天降罰為無道戒四日壬寅成閔收復楊州禁止州郡科斂獻納之弊臣寮上言竊以國家不得已而用兵調度費固不資陛下愛惜民力不忍一毫取之於民盡出內帑以佐國用恩至渥也昨因臣僚援卜式故事乞風州富民使得輸財以助邊困可其請而行之今州縣長吏不務體此乃科斂五等人户或以物力高下或計田畝多寡出作本州獻納以為己功是豈知朝廷之意哉此風不止為擾未已臣愚欲望聖慈特賜宥旨如諸路州軍欲助軍興者不得輒科于民若上户自獻助具以名聞當議推賞以示旌勸使富者鋭于樂輸貧者免于橫斂則天下幸甚從之邊臣賀表表曰金人背盟方恣行于兵革皇天震怒俾極就于誅夷宗社增休邇遐多慶中賀竊以朔方之患古今所同唯其空國而來必有塗炭之敗然淝水之戰才快斬于苻融而澶淵之師乃獨殱于達蘭至獨夫之遭戮實曠古之罕聞恭惟皇帝陛下德備聖神資全勇智本大國而事小國蓋自下以兼容體至仁而伐不仁果何憂於弗克豈期跋扈敢肆憑陵悉驅畨漢之民入撓江淮之地毒流南北憤激人神爰假手於羣凶用倒戈于元惡風驅電掃行淨洗于邊塵地闊天開期盡還於禹迹遂使車書之混一訖興禮樂于升平臣等猥守藩條豫聞邊事方敵尚在曷勝臣子之憂今王載寧永同天下之喜賜新復州軍赦尚書省牒刑部門下朕以涼薄之資履艱難之運披圖慨歎念未清九縣之夷瞻仰焦勞詎敢忘一食之頃然而誠不足以孚强敵德不足以保遺黎致承平之故區寖隔絶於異域列聖之境未復兩宫之狩莫回恨抱終天悲纒率土痛心疾首隕涕汗顔兹金亮之干誅幸上天之悔禍爰整濯征之旅往揚耆定之功羣豪唱義以雲從列郡聞風而嚮應扶杖而須德化率多羸老之餘簞食以迎王師復喜威儀之見遂日闢于百里曽不煩于一兵元惡就屠餘黨悉潰願賈將率之餘勇盡還祖宗之舊疆重念中原之區久淪朔方之俗墜衣冠于塗炭變禮義于淪湑頭顱莫保于淫刑閭里悉空于重斂矧用脅從之暴豈無詿誤之人宜推存宥之恩誕布惟新之令可大赦新復州軍並限赦書到日以前罪人無輕重已發覺未發覺已結正未結正常赦所不原者咸赦除之祖宗皇后陵寢自經隔絶久失展省本路招討使到日同本處官吏躬親前去朝謁如法修舉務在嚴潔以稱朕孝思追慕之意淵聖皇帝梓官及天眷尚在沙漠抱恨無窮若中原與諸國人能津致扶護來歸者賜銀絹五萬匹兩如願補授官資竟與推恩勘㑹白溝河欣代等處一帶係本朝舊界仰諸路招討使統率大軍到日不得越境於戲天開地闢允臻恢復之期雲施雨行式慰來蘇之望尚賴邇遐之衆咸懷忠義之誠共集大勳永清四海林栗上宰相札子允進軍恢復札子曰某昨日獲見敵中關牒退而深念金人於我有不戴天不反兵之仇今又渝盟稱兵踐蹂兩淮荼毒生靈暴骸滿野潛師海道視我為機上之肉憑凌顛蹶亘古未聞禍極凶殫自貽屠裂揆之常理其衆若不投身歸命便宜奔潰逃歸今乃按兵江壖議立新主從容移檄令我戢兵以愚觀之其說有二一者諸將玩兵之罪二者同乘舟遇風之勢何謂諸將玩兵之罪兩軍相持唯伺間隙設其國中內亂千里之外勢猶可乘今相距一江而彼有弒逆之釁倉惶顛沛之間縱兵掩擊殄其渠魁然後可以謝兩淮無辜之民洗國家積年之憤今淹留纍日顧望不前使之成謀復來修好是將愚弄本朝猶以故吾待我邊臣見此文書又非降欵為其受納已墮計中傳送朝廷意將何待欲辭玩兵之罪其受納已無可解何謂同舟遇風之勢亮之凶虐家怨親離欲與俱忘固非一旅然預謀弒逆不過數人覆手相殘勢當未已若去國未逺旦夕可歸縱加刑誅豈能禁遏今已深入吾地結為死仇京東河北山西陜右皆吾舊民久懷響應聞亮之死已倒戈所未下者特其帥長尚有未真之人勢亦不能久立則亮之餘衆退無所歸雖欲來降懼不免死茍相推奉以冀生全共為文移緩我師旅萬一其計得行是一亮死一亮生也死亮凶殘人所同棄生亮方急與人同居為吾之患不又多乎此則同舟遇風勢當然也詳其關牒尚有兩名不書則其中同惡亦未監定經此數日或走或降變故萬端難以預度但在朝廷所以應之如何耳辟如觀奕遇其敗勢不能進攻兩眼既成還須自救利害之形豈不相逺昔赤眉偶入長安所過殘賊鄧禹西討久不進師光武敕之曰司徒堯也亡賊桀也長安吏民遑遑無所依歸宜以進討禹猶執前意遂致挫衄帝乃敕之曰赤眉無穀當自來東吾折箠笞之非諸將憂也乃遣侯進屯新安耿弇屯宜陽敕曰賊若東走可遣宜陽兵㑹新安賊若南走可遣新安兵㑹宜陽及聞馮異澠池之捷帝乃自幸宜陽盛兵以邀其走路赤眉忽遇大軍驚震乞降曰盆子將百萬兵降陛下何以待之帝曰待汝以不死耳及降帝令縣厨賜食十餘萬人皆得飽飫而已豈復有他望哉愚謂今日待敵人計當出此宜敕諸將進軍臨之别遣重兵分出泗亳穎夀規取汴京截其歸路勿與之戰使之前無所進退無所歸然後開以生還之路示以再生之信諸軍但以受納降欵若只是通好文字不得收接仍賜敵人軍前詔曰本朝至仁兼愛南北完顔亮稱兵背約自取滅亡汝等久苦暴居不保朝夕出于迫急實行天誅令窮困無歸朕豈忍殺已敕所在軍府受汝投降詔到宜悉解甲放兵自詣軍門降首各給本貫公憑聽汝歸業若其中尚敢拒命聽相捕斬前來依格支給賞賜如係金國契丹渤海諸國人並令有司護送出境元有官資者量高下授與職任不願任者亦聽從便若更猜疑理無容貸諸軍尅日㑹合屠剿朕雖赦汝恐無及矣昔漢光武受銅馬之降親行其營以安反側朕今自往為汝涵覆勿復有疑我專為仁彼專為暴孟子有言率其子弟攻其父母未有能濟者也如此則無敵于天下無敵于天下者天吏也然而不王者未之有也今日之事又何疑焉若失此時縱其北渡是祿山薨而慶緒興思明弒而朝義立中原塗炭不知何時而已也愚者千慮不勝拳拳唯廟堂諸公埀聽而擇其中幸甚幸甚五日癸卯詔戒飭羣臣詔曰朕以逆亮渝盟侵犯王略肆頒詔㫖躬往視師久已戒嚴屬兹進發凡逺邇股肱之郡小大文武之臣宜體朕心各惕爾職毋縱奸宄毋虐善良無事征求無擾獄市內則輯寧于封部外則式遏於邉疆共濟大勳永底丕乂成閔自鎮江府渡江追襲遺史曰先是成閔在京西承金字牌令䇿應建康成閔喜於得歸兼程疾馳士卒冒大雨糧食不時多死於道路湖北轉運司以舟船載錢糧馬料差漢陽軍監酒務楊某隨軍而軍人自張家渡渡江遵陸皆不及支初閔自行在率軍馬戍京西湖北也沿路犒設之物不可勝計盡以歸已不散士卒及回至鎮江也有軍中子弟號康保義者因酒後曽顯言於市中或告閔閔遣人捕康保義至即命斬之完顔亮之死也閔大軍猶在鎮江不渡又七日乃渡駐於楊子橋之樞密行府閔遣使臣李彪探伺金人回軍動靜閔令彪速回報樞密行府曰成閔大軍在楊子橋相持來日當大戰矣彪不聽且曰必當到揚州城下探其動息方敢回閔力止之是時金人已取天長路歸閔之意欲作大戰虛張其功績耳路人喧傳金人已歸揚州空虛故閔之詐不行乃以馬軍司兵追襲李捧亦以神勇軍追襲然不敢與金人相近是時泗州已被夏侯焚燒棄城而南故金人先遣千户至泗州拆民居為三浮橋頃刻而成翌日軍到皆下馬乘橋而過馬不卸鞍皆涉淮而渡望之如雲既渡絶閔軍到盱眙排列于淮之南岸聲喏之金人笑曰傳語成太尉有勞相送金人在泗州住七日有三百人長者一人告千户曰三百人各有歸心不可彈壓奈何千户曰郎主雖死豈無王法千户之弟曰兄言失矣郎主且死兄何不只在揚州而須北歸邪彼各有父母妻子人心難留豈可以强繩之兄以為然三百人皆上馬即時馳去由是西城之兵皆上馬爭門馳出不可遏俄而夾城人亦去成閔知金人盡去也乃列兵于淮之南岸鳴金鼓教兵示耀武而還聞之者莫不大笑是時龜山沿路有金人遺棄粟米山積往往是京東河北科配民户令赴浙西州軍送納者猶有布袋盛貯者各題寫起發州縣及平江府秀州諸處送納官軍糧送不繼賴以給軍而統制將官歸已者亦多矣成閔之衆多福建江浙人不能食粟因此日有死者不下二三百人差隨軍轉運使韓彥直為京東西路河北東路淮北泗宿州招討使司隨軍轉運副使襲濤為浙東西路通泰海州沿淮制置京東東路招討使隨軍轉運使司向軍權京畿河北西路招討使司隨軍轉運判官呂擢兼京西北路招討使司隨軍轉運判官三朝北盟㑹編卷二百四十六
