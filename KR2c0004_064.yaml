body:
  text: 三朝北盟會編卷六十四宋徐夢莘撰靖康中帙起靖康元年十一月十九日庚辰盡二十五日丙戌十九日庚辰康王至相州康王發自濬州至相州尼堪遣鐵騎回自懷州來邀截奉使車騎津人告以過河纍日矣又遊騎追躡于後逢巡檢任永吉告之如津人云乃回中大夫直龍圖閣汪伯彥知相州主管真定府路安撫司公事馬步軍都總管緣金人人馬駐劄濬州衛縣之西南不百里王實經由伯彥領兵出迎護王入城宿于州治正衙相人戴盆焚香遮道相慶胥相願王留宿伯彥以相人願欲乃詣王稟曰斡里雅布已于十四日由大名府魏縣李固渡河矣恐不得追願大王暫留審議國計王曰受命前去不敢止于中道王雲耿彥禧髙世則等謂曰兼程前去渡河猶可及詰朝遂行開封府揭榜清野指揮更不施行是日也京師既已戒嚴內外驚擾近城居民流離遷徙不絶於道軍人保甲乘作亂劫掠財寶焚燒屋宇有城外搬入居民聼就寺觀居止忽有人自河陽來報稱折彥質遣兵渡河即非金人朝廷喜聞之乃令開封府揭榜示衆曰前日北來兵係折彥質潰散人兵已招安訖所有清野指揮更不施行城外居民共上書曰聞尼堪已渡河數日風傳與斥候皆得其實而廟堂諸公幸其無事堅壁清野在今日正不可緩不應輒罷仍乞以在城兵盡屯城外以待敵至使無緣遽薄城堡書降付樞密院大臣沮難不行是夜二更斥堠馬綱還報敵馬已渡猶未全信再遣使臣劉嗣將兵騎三百出封丘門逺探二十日辛巳康王至磁州康王發相州至磁州顧謂耿延禧曰陛辭日皇帝云宗澤在磁州以萬五千人披城下寨次第奏勦除爾已進修撰卿可至磁看宗澤下寨次第奏來今日可見矣至磁州城下六七里宗澤羣僚迎謁道左王問澤下寨并道上語澤云請假歸浣濯敵騎至則點集王顧左右笑知澤妄矣磁州城下望見百餘人執兵文身青紗為衣以傘遮馬繡其鞍韉如市里小兒迎鬼神之狀者王顧怪之磁人謂應王出迎康王耳應王者磁人所事崔府君加應王者頃刻馬相就有吏呼應王揖者澤請王舉鞭答之又呼曰應王請康王行馬入至府舍正寢猶未進食吏特謁入云應王參見澤已於正廳設兩位具賔主儀澤懇王曰應王靈邦人聼之如慈父母唯願大王信之勿疑王不得已戎馬而出吏揖應王就坐二廟吏緋衣其一手相持各一手平展外向若擁應王之狀既云就坐茶湯如常禮吏贊應王不肯就廳上馬澤前請應王上馬即退少頃應廟二將軍入謁如前儀王徇澤之請從之先是王雲自敵中使回過磁相謂守臣云敵人因糧若清野則困矣磁相從之邀近城居民且教運榖入城相磁人皆怨雲既而金人果以磁相清野不由是路乃由邢洺李固渡磁相人曰敵人不從此路來徒清野毁我墻屋籍我草糧雲真細作耳及是見雲侍王將入敵庭皆罵厲聲呼曰王雲細作欲以大王獻金人大王勿行不如起兵先是宗澤上章言雲往返敵中習熟恐為金人謀賣國冝勿信上以其章付雲雲至磁乃出是章示澤且言曰何故如此因責之且訐其誕云萬五千人下寨偽取修撰到此實無一事澤憾之因磁人之恐乃哄言雲果細作明日將邀親王入敵庭矣衆怒遂有殺雲意增置都大提舉守禦使邊報交馳風傳不一人心不定乃增都提舉守禦使司官並以樞密聶昌領之二十一日壬午詔罷諸司庶務専以應辦軍期軍期方急乃詔罷諸司庶務専以應辦軍期為主磁人殺王雲康王徇宗澤之請乃謁應王廟當州之北乃入邢洺之路也磁人以王遂欲北去遮馬號呼泣涕勸勿往且言金人自李固渡河矣不如起兵援京師馬不能前懼使人告諭百姓曰大王謁廟耳非北去也衆不聼王使諭澤告之乃開道謁廟澤奉珓於王王勉為一擲而得吉乃退謁二將軍訖王就小次澤贊呼本廟諸案吏參澤所使人又贊云謝到頃之王欲乘馬歸有紫衣吏二十人􅐝應王所乘轎神馬在後擁而前曰應王乞大王乘此以就館舍王顧視其轎則朱間金裝座䄎及竿蝙首施紅褥王斥之云親王奉使出都焉用此廟吏不退延禧世則同曰王乞用宗澤乘轎黑漆紫褥郡守小官得用大王何嫌以慰邦人心王登轎還即頃王雲有親信人入廟告云郡人欲殺尚書宜匿廟中勿出雲就澤懇告祈哀甚切延禧世則先出廟見百姓軍人持兵立兩旁延禧世則使人傳呼兩參議官耿舍人髙觀察磁人怒睨徐辨識云非王尚書也即退延禧世則得出下馬回視之見雲之馬已為磁人牽去雲使人陳恩以所乘馬與雲雲遽登俯據鞍人扶下之即脫雲巾幘擲空中頃之雲虀粉矣是日磁人入州治取雲行槖及所賜禮物劫掠一空執雲一行吏縛捶磁人譁不已王遣取首作亂者一人斬之梟首廟前始定雲所持國書等及肅王府家書長生遺都尉書皆失之王命收雲一行吏為王府屬內外方定王雲澤州人字子飛少魁運司解進士乙科又中詞學兼茂才第一崇寧間兩掌翰苑從使髙麗進雞林志徽宗甚喜納之擢知凖陽軍以父係元祐臣寮忠言事罷之後任祕書郎出知簡州繼領陜西曹臺公事纍使金國上令於簡州建功德寺以昭德顯忠為額作追奉之地公初被命與主上為使即傳言于家可勤祭祀祖先更不歸私第至死王事而不返可謂國爾忘家公爾忘私者也公兄諱霽任右講議司編修嘗論童貫蔡京過失坐黜海島公歲時饋問不絶後童蔡被誅淵聖皇帝復霽官補右選种師中解太原圍王師敗績而霽沒王事初公父名二子曰雲曰霽其意有在南唐霽雲死于忠義二子復皆能死于難豈其一門英風凛凛足奮百代而超千祀者歟建炎元年十二月臣寮等奏伏見故刑部尚書王雲于靖康元年冬從主上北使金人行至磁州為磁州人所害自此主上復南入相州集兵為入援之計向使無王雲之變必北去蓋天所眷遂使社稷有奉神人有依伏望朝廷察其纍次奉使之勞身死非辜枯骨不返實可憫憐特加褒贈推恩子孫以為死事之勸後十二月三省同奉聖旨令諸處尋訪王雲家屬如未曽推恩特賜觀文殿學士與八資恩澤右劄付故王勸文家汪伯彥時政紀曰建炎二年朝廷遣劉誨等奉使誨至京師退留不進汪伯彥黃善進呈催發上曰朕今日看誨等奉使稽遲如此蓋知王雲是忠義自奉命星夜出京兼程前去難得難得二十二日癸未耿南仲使于尼堪割河東聶昌使于斡里雅布割河北特書于軍前并賜河東河北兩路守臣詔書曰昨自太上皇航海遣使請求幽燕特承大金皇帝異恩委割燕雲兩路猶為不足手詔平山張覺招納叛亡由此遂致興師今春南北路皇子郎君兵馬先至城下太上皇自省前非尋禪位遣執政以下屢告為有再造之恩割以三鎮酬謝又蒙國相元帥雖撫定威勝隆德澤州髙平等處為念大義已定秋毫無犯亦便班師止以太原為界續承使人蕭仲恭趙輪等至報諭恩義被姦人誤國動兵以援太原詔所割州府堅守不從反成問罪不勝皇恐今蒙惠書兼來使楊天吉王芮察勒瑪疏問過惡皆有事實每進一語愧仄愈增今日之咎自知甚明今淮黃河為界實兩朝安便所謂蔡京身亡王黼童貫已誅馬擴不知所在吳敏涪州安置李綱夔州安置張孝純見知太原詹度湖南安置陳敦見知中山其中有係在遠不知去處便當根逐一依來命今遣門下侍郎耿南仲同知樞密院事聶昌賫送詔命令黃河東北兩路州府軍縣人民悉歸大金仍依來示一一専聼命不敢依前有違已立信誓今乞早為班師以安社稷至懇至願詔曰詔河北河東州軍敕官吏軍民等頃者有渝盟約致大金興師朕初嗣位許割三鎮以酬前恩偶緣姦臣迷誤三府不割又間大金功臣再致興師使河東河北之民父子兄弟暴骨原野夙夜以思罪在朕躬今欲息生民鋒鏑之􅍔使斯民復有太平莫若割地以求和講兩國之好是用黃河見今流行以北河東河北兩路郡邑人民屬之大金朕為民父母豈忍如此蓋不得已雖民居大金茍樂其生猶吾民也其勿懷顧望之意應黃河見今流行以北州府并仰開門歸于大金其州府官員兵人即依軍前來書許令放回南地速令依勑勿復自疑故兹示諭想宜知悉冬寒汝等各比好否遣書指不多及永興軍路經略安撫使范致虛被受聖旨總六路帥臣應援勤王致虛先遣總管杜常取間路入京又遣夏淑護諸陵原尼堪自河東入戰河東澤潞州官吏多棄城走西京王襄已被西道總管之命治兵勤王河陽燕瑛亦屯兵以守河為名皆棄其所治而走於是士庶携老提幼適汝頴襄鄧逃避者莫知其數尼堪渡河乘勝陷河陽及西京執京西南北路都轉運使時道塵使擔糧道塵辭以不能遭小番以杖擊其頭靣初道塵入出騶從呵唱三里人見其擔糧遭辱皆嗟嘆之是日午後復閉門聞奏金人已過汜水關四壁挂甲上城差提舉官東壁孫覿西壁安扶南壁李擢北壁邵溥每壁三萬人差部小使臣等七百員孫傳都提舉王宗濋都統制劉延慶范瓊統材武人分四壁金人次陳橋京師戒嚴殿前司逺探劉嗣還報金人已次陳橋且云被金人掩擊殺傷者踰百人餘衆僅得脫而歸始倉皇而計無從出矣京師戒嚴恐民居驚擾不言金人已犯王畿乃下令止以防秋為辭命保甲軍人百姓僧道等上城守禦同知樞密李回罷李回守河奔還京師遂罷康王回相州王在磁州知相州汪伯彥據探馬回報金人錢騎約有五百餘人自衛西來直北借問康王逺近虜執村人為鄉導望魏路前去敵情料康王行必過李固渡故徑往追襲伯彥亟作蠟書騎馳二人前去磁州請王回相州昨日大王既發相適磁向三更本州之西火炬連接二三里照耀不絶伯彥亟追馬騎走至黎明回報金人鐵衣五百餘騎自衛大寨西來一路訪問大王前去逺近虜執村民為鄉導望魏縣李固渡稍截大王大王儻磁州而來趍李固渡則魏縣敵寨在焉不可踰越或自磁而東北趍王俞渡則金兵輕襲其後皆不可濟孰不為大王危之此其不可追一也斡里雅布將衆已趨京城下大王衝風冒雪徒御奔波道路顛沛難以襲逐萬一追及不惟計議已失機會決又如前時質大王于軍中計無所出為之奈何大王不若夙駕回相州稍圖起義牽制金人以副二聖維城之望為䇿之上渡河而東則無䇿矣此其不可追二也區區狂瞽嘔心瀝血實為國計専差騎兵二人馳蠟書仰干王聼惟大王圖之即差發武翼大夫劉浩領兵二千人馳騎請王亦會耿延禧髙世則請王還相州以候遂飭徒御出磁州城逢劉浩人馬至護王南轅伯彥躬領親兵一千人至安陽河迎接命延禧草奏具言奉使至磁而民殺王雲又聞金兵南渡臣等回相州以候聖裁即遣一價持蠟書入奏二十三日甲申斗星不見吳革乞起陜西兵為京城援初太原陷朝廷遣閣門宣贊舍人吳革奉使金人軍中見尼堪庭揖不拜責其貪利背約氣徑詞直金人色動為追回攻威勝之兵授書而還革備得金人情狀既歸報宣撫折彥質請于朝廷備河南十月有旨召赴闕至是登對上問割地與不割利害革曰金人有吞箭之誓入攻必矣乞措置邊地起陜西兵馬為京城援不復議和遂遣革使陜西勾兵委同諸帥臣講武備二十四日乙酉河北西路提點刑獄王起之河北西路提舉常平楊淵河北西路提舉常平茶鹽公事秦百祥相州參康王初王起之楊淵秦百祥先被旨差在黃河之南防托黎陽縣駐劄濬州移置在黎陽縣起之淵百祥輒離駐劄地方相州參王王詰其擅離職事初不接見至三日乃見之起之等留相州久客倉州郡使監司人人如此緩急之際朝廷何望耶二十五日丙戌金逰騎先至京師城上保甲作亂殺辛康宗統制官辛康宗御衆過嚴是時軍政不肅兵民皆驕不能制御士卒不樂康宗之嚴誘百姓作亂於宣德門擊登聞鼓誅康宗初康宗以敵兵去城逺止兵士不得發箭恐敵拾反資敵用有一軍士無故向空射箭康宗呵叱之軍士因倡言辛太尉是童貫親戚不使城上射番人故欲番人上城百姓喧騰皆倡此言紛不可止衆各上城擊殺康宗朝廷不能禁亦不窮治自是事皆姑息而號令不行矣初百姓上城守禦既而城中多捉姦細城上百姓亦疑守禦官為細作朝廷惡其紛亂不已乃盡令百姓下城以京畿提刑秦元保甲萬人代之宣和録曰金人未渡河京城苦寒日者王俊民上言可借春以召和氣詔從之遂迎土牛且令軍中易張青旗以應木德乃自東壁始辛康宗時提舉東壁於倫輩號持重務整紀律士卒厭苦之或諷百姓康宗反矣不然何以易旗幟衆不知其情乃趍宣德門聚數千人舁登聞鼓置東華門撾擊號呼京尹及彈壓官皆不能制衛士自樓上射之衆驚走遂擒康宗殺而磔之并部將十數輩皆死至曉稍定彈壓而推其尤者一二人斬之曹輔為簽書樞密事陳過庭為中書侍郎馮澥為尚書左丞孫傳為尚書右丞置守禦使副以下官京師諸軍自數年燕山之役出戌河北河東或留邊或潰散而在京衛士上四軍效勇京東西路弓手等七萬人殿前司諸營兵萬人分作五軍左中前三軍姚友仲統之右後二軍辛永宗統之前軍屯順天門左軍中軍屯五嶽觀右軍屯上清宫後軍屯封邱門以備四壁䇿應每壁增置提舉官一員東壁辛永宗南村西壁張為北壁劉衍以孫傳為守禦使殿前指揮使王宗濋為守禦副使郭仲旬盧益為提舉守禦司幹辦公事又以劉延慶提舉四壁以劉韐副之每壁以文武陛朝官宗室一員為同提舉每門一宗室環衛官一員以司啓閉又諸門置彈壓統制者不可勝紀京師大而兵寡少倉卒之際四方兵將不至無以守禦捍城乃以武舉及城中絶倫人先輔官守禦又選在京稍習材武人數擇太學生有䇿略之士百人借官上城猶以兵寡為憂乃召募壯人效用敢勇戰之類其目不一皆分門禦幹又王健請置竒兵朝廷從之以健統領官何梟提領召募其兵又有召募忠義兵者孫傳提領之三朝北盟會編卷六十四
