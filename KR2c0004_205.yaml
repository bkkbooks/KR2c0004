body:
  text: 三朝北盟㑹編卷二百五宋徐夢莘撰炎興下帙起紹興十一年正月盡三月九日戊申十一年正月張俊來朝十五日乙卯金人攻夀春府金人陷夀春府金人侵入淮西宣撫使張俊擺流星馬斥堠於淮西令姚端主之飛書驚報交馳於道路淮甸居民不得安業而驚移矣金人陷商州金人哲爾格貝勒以步騎五萬攻商州知州邵隆知其不可守乃焚倉庫毁廬舍棄城而去金人遂入商州二十九日己巳邵隆襲金人於芍藥陂敗之又敗於鴻門生獲阿穆爾貝勒克商州邵隆棄商州也乃領兵屯於嶺間金人已入城隆間道出芍藥口繼屨釋之曰汝皆王民毋忘本朝衆感復攜幼弱來歸隆遣其子繼春率兵出啇州之北以張其勢而移軍鴻門金人以精兵五千來攻隆設三覆以待鏖戰兩時許大破之禽阿穆爾貝勒隆始屯十日糧過期士飢臠死尸嚙草木疲困日甚及戰隆親鼓之呼聲動山谷無不一當百遂獲大捷繼春亦破洛南縣金人遁去隆加右武大夫榮州防禦使二月三日壬申金人陷廬州初朝廷命劉錡守廬州錡入城巡城一匝曰城不足守也㑹報敵騎漸及州境錡棄廬州與張俊統制關師古冒大雨率衆而南金人陷廬州大縱殺戮六日己亥金人攻含山縣初五日金人到柘臯乙亥馳騎至含山縣一百二十里半日而至以五百騎探和州動靜回報無軍馬丙子以六百騎再探之回報無軍馬丁丑以八百騎往探回報南軍渡江金人即漸退去韓世忠嶽飛以兵援淮西十日己卯張俊軍統制王德渡江先入和州建康府探者回報金人已到含山縣漸及和州時張俊諸軍雖已促裝猶未起發安撫使葉夢得曰金人已過含山縣矣距和州才兩舍豈容更候探報萬一和州為金人所得長江不可保矣夢得請為證明具聞朝廷宣撫當命諸軍即令鼓行此行必勝俊遂令諸軍進發諭諸統制曰先得和州者勝王德曰王德當身先士卒為諸軍先鋒俊壯之將士皆鼓舞歡譟而行識者謂其氣鋭可以勝矣或報已失和州者德曰德請復取和州乃率所部兵渡采石約俊明旦㑹食於和州至中流聞敵勢盛衆莫敢前德驅之進櫂首先登岸俊宿於江州德率衆徑至城下馳驅先登遂占和州諸軍始得渡俊入和州㑹食如約金人猶守昭關捷奏至上親筆諭俊曰自卿提兵渡江曉夕為念得報已復和州卿謀慮精審分朕憂顧不勝歎嘉是時俊已具奏敵已在臣計中乞免聖慮决保無虞上得奏大喜十八日丁亥張俊楊沂中劉錡及金人戰於柘臯鎮大破其軍金人退軍也日行三五里或一二十里退至柘臯柘臯皆平地金人謂騎兵之利也張俊楊沂中㑹劉錡之軍皆到烏珠率鐵錡十餘萬分兩隅夾道而陳沂中輕進不利統制官傅逵被箭中目王德曰敵右隅皆徑騎吾當先破之乃麾軍濟渡奮勇先登薄其右隅敵陳動有一將被鎧躍馬指畫部隊德引弓一發敵應弦墮馬德乘勢大呼馳擊諸隊德引弓軍皆鼓譟金人以拐子馬兩翼而進衆鏖戰大敗之金人退還紫金山劉錡謂德曰昔聞公威略如神今果見之請以兄禮事公錡遂再拜焉俊有愛妾錢塘妓張穠也知書俊文字穠皆與之柘臯之役俊發家書囑穠照管家事穠有書報俊引霍去病趙雲不問家事以堅俊之意且言今日之事惟在於宣撫不當以家事為念勉思報國俊得書釋然而喜遂以其書繳奏上大喜親書奬諭以賜穠仍加封雍國夫人俊以立奇功將佐十八人奏聞上皆宣見臨軒勞問而訓練官任存曰臣生長田舍間賴陛下神聖祖宗威靈僅能破敵安敢以微勞自矜上益喜均賜金帶銀鋌而别賜金盞與存十九日戊子李顯忠軍統制崔臯敗金人於舒城縣二十日己丑張俊克廬州金人退於紫金山張俊得廬州與楊沂中劉錡之軍皆駐於廬州上親筆諭俊曰卿以身徇國雅志平敵總干以俟仗義而趨忘家室以專征冒水潦而不顧雖南仲之出車就牧葉公之受命飲氷方之於卿未足多尚又遣入內內侍省副都知陳永錫勞軍厯視戰地宣㫖褒寵甚渥知襄陽府劉錫召赴行在樞密都承㫖周聿往措畫江上三月四日癸卯金人攻濠州金人自柘臯退兵於紫金山也濠州官吏皆謂金人必以鋭兵來攻城請於知州王進使善備之進亦以為然發書告急日至再四而通判軍州事張綱以邉機事請赴行朝進許之綱遂泛舟而去一日趙榮以百數騎至城下進登城望之榮語進曰大金以精兵三十萬旦暮臨城必要濠州勢不可當公且開門縱民出城使之為避地計且淮岸舟船頗多若水路陸路從便傾城而去不三兩日可以獲安方今滿城生靈寄命在足下足下宜念之進怒曰趙榮汝不能全節於朝廷乃為北軍游說耶使徑弩射之榮大怒少退罵進良久而去州人趙榮曽僞知州事撫恤軍民秋毫不擾今所以來城下言者正為憐舊治之民耳或以從便避地之謀力請於進進不從癸卯北軍自延陵浮梁渡淮甲辰以鐵騎數萬人列於東門之外連岡被嶺相屬不斷旌旗蔽野囂埃翳天州人望之猶皆戲笑以謂冦寵受圍時城中無兵無食尚亦能支况今之食有餘而兵粗足尚何畏哉是時進有兵千餘又有宣撫司數百在城中北軍謂樓櫓皆腐爛攻之必破乃使人至城下招降而守陴者怒罵之八日丁未濠州兵馬鈐轄邵免叛降於金人金人陷濠州知軍州事王進被執大肆焚掠金人攻濠州乙巳對城立炮且治衝車雲梯而又立鐵爐鎔金汁將為攻擊者王進令以炮擊之而炮竿折者再既而炮石直上十數丈不離炮座而墜擊殺曳炮者數人識者皆以為不祥丙午金人以衝車雲梯之屬俱傅城壘數面力攻如雷霆震發城土與瓦屋皆動矢石如雨東南敵樓為飛炮擊損州人大恐時城中民兵進以為不可倚用乃令於閒慢處屯止以隨行兵及宣撫司兵守城進兵多福建人未嘗經守禦或謂民兵自數年兵火以來莫非百戰之餘也皆人可當百請以民兵守禦使官兵為四壁策應進不從由是守陴弓弩皆不發進出入以鐵扇為蔽呵喝如常人皆寒心悚懼其日夕馳望者宣撫司救兵而已丁未兵馬鈐轄邵宏擦城投拜具言城內虛實而北軍遂益兵擊東南隅焚其樓順風火烈倐忽而盡北軍遂乘勢登城衆皆奔亂城陷知鍾離縣事臧師仁者乃前知州楊圭之黨也民皆切齒怨之至是先為亂民所殺進奔馬入郡宅朝服坐於㕔事遂就拘金人縱火於城中大肆剽掠凡貴賤老幼悉驅虜出城外由是數萬之衆莫不離散而官府廨宅觀寺與居民廬舍片瓦不留皆被焚爇其所存者惟監郡廨後土地堂屋一間有全瓦數十枚木椽數根至於城面亦平毁數處其所存者惟東壁女牆數十步而已初張俊楊沂中劉錡在廬州也濠州發流星馬告急者日三四適㑹俊與沂中錡軍皆退廬州諸軍各人負十日糧米欲越過定逺縣退還江上矣俊遂越過定逺縣不得已令諸軍趨黃連埠而城已陷九日戊申楊沂中率兵襲濠州不克楊沂中聞濠州已陷欲乘其囂亂襲擊之張俊劉錡曰未可沂中不從戊申沂中率兵馳至城下寂然無所聞唯城中有烟埃未息探者曰城中一空沂中遂令士卒入城有遺棄衣物於路者士卒皆下馬拾遺物而北門外金人伏兵皆入官軍退走金人馳騎追之官軍奔周梁橋俊聞沂中兵敗出兵救之與敗兵相道而行金人漸止漸退時已近中漏矣官軍亦還翌日金人至周梁橋收北軍之尸聚而焚之仍取遺棄衣甲而去韓世忠以舟師遇金人於赤龍洲韓世忠以舟師淮東宣撫司舟船數百艘載甲卒泝淮而上欲解圍濠州金人覺之先遣人於下流赤龍洲紿曰赤龍洲水淺可涉大金已遣人伐木欲塞河抳舟船請宣撫速歸我趙榮也諸軍聞之皆以其言有理世忠亦命舟船速回而金人以鐵騎追及沿淮以良工徑弩且行且射於是矢著船如蝟毛及至赤龍洲金人已伐木漸運至淮岸未及抳淮而舟船已順流而下幾為所抳金人自此遂歸黃連埠屯駐軍亦班師張俊楊沂中韓世忠劉錡皆班師張俊楊沂中韓世忠廬州退軍也士卒人負十日糧米既至黃連埠軍皆乏糧遣捷足及馳馬往建康催糧者踵相躡也及遣提舉一行事務辛永宗親往催督永宗至宣化不渡坐於民舍呼巡檢兵士令採藤花曰我偏愛食此藤兵士為採藤花歸已移時矣坐間失其被氈行人皆掩鼻罵之曰大軍燒火待炊提舉催糧不留心如此建康軍中盡刷在寨應諸窠坐人及工匠各人負米六斗星夜渡江又留守司就近呼集上元江寧兩縣民夫相繼而行亦人負米六斗務其輕快也以縣丞管押已有到滁州者㑹諸軍班師而軍兵與民夫所負之米悉棄於路側奔而歸曰歸到家不過賠米六斗而已管押官縣丞竟不曾渡江諸軍既至滁州錡與俊沂中分路之和州俊沂中自宣和渡江軍於建康錡駐和州不渡申取朝廷指揮凡十一日得指揮渡江遂歸太平州俊沂中皆憾之是時世忠亦以舟歸楚州俊進少師河南北諸路招討使是役也嶽飛不出兵為聲援朝廷憾之淮西從軍記曰紹興九年己未歲金人歸我河南故地十年春朝廷命馬軍帥劉錡充東京副留守三月率本部軍馬赴任中途而金人敗盟四太子烏珠以大兵入京師留守孟庾投降分兵復取河南之地東南震動六月錡大破金人於順昌烏珠狼狽敗還朝廷之威遂震於是下命以韓世忠張俊嶽飛各以本路宣撫兼河南北招討使並進兵閏六月至七月世忠取海州俊取亳州又取宿州飛取蔡州又取陳州京東西皆響應既而三帥相繼班師先是飛方至陳州而俊已闕定宿亳遂還夀春引兵南渡而歸生擒金七十餘人李寶欲殺之曹洋曰不可我方欲歸朝廷何不留金人生口以為實驗寶然之已過睢陽軍知軍賈舍人乘馬率人從十數追及叩岸呼爾為誰時寶之衆皆緋襭頭巾緋襭袍為號寶應曰我曹州潑李三也欲歸朝廷耳言訖引弓一發賈舍人中矢墮馬船已行矣出清河口渡南岸而見胡探作一寨聚居民養種深乃具申宣撫使韓世忠差許世忠王權來接引而戍寶到楚州世忠犒勞甚厚寶以生口七十餘解赴世忠世忠大喜劉錡來朝三朝北盟㑹編卷二百五
