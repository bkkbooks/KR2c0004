body:
  text: 三朝北盟㑹編卷二百八宋徐夢莘撰炎興下帙起紹興十一年十二月二十九日癸巳盡十二年八月林泉野記飛相州人為韓魏公家佃户靖康末張所招討河北飛投入效用建炎初所都統制王彦以飛為將從彦與金人戰太行累立功後彦疑忌飛才乃率其衆降京城留守杜充為統制三年賊張用王善擾京師充遣飛及丁進桑仲破之充後建康叛歸金諸將扈成戚方皆反惟飛一軍屯於宜興時常州吏民避居縣中者甚衆頼飛而全四年至湖北以衆𨽻張俊薦諸朝除通泰招撫使戰敗金衆紹興初命飛聴江淮招討張俊以拒李成成將馬進來約戰飛請為軍鋒擊破進於洪州玉隆觀追至筠州蘄州頻勝飛功最又擊降張遇衆五萬授神武右軍副統制二年破曹成於道州平處州山賊數萬來朝加鎮南軍承宣使江西制置使神武後軍統制四年劉豫將李成冦京西飛復敗之郢州進復襄陽鄧隨唐等州又復潁昌遷招逺軍節度使湖北襄陽制置使豫欲攻廬州飛遣統制牛臯徐慶㑹劉錡軍擊敗豫衆五年改鎮寧軍節度使往鼎州討湖賊楊么么黨楊欽有衆數十萬拒命㑹有詔召都督張浚防秋欲侯再舉乃出一小圖指示浚攻賊出入之要請除來往之程期以八日擒賊浚從其言先是湖南統制任士安王浚郝晸等不禀王師慶命故屢至敗飛至鞭士安及孫議使先鉗賊告曰三日不能平賊皆斬初揚言岳太尉兵二十萬至矣賊見士安等衆少併兵來戰飛俟其困率大兵四面伏發賊衆殱盡奪舟入據水寨欽等窘服相率出降餘衆尚數萬飛杖欽等各一百遣回乘其被杖未及為計夜襲其營殺戮甚衆俘欽還唯夏誠一寨背山三面臨湖恃險不下飛親臨測水淺處遣善罵者三千人隔水罵賊賊争擲瓦石以擊之飛先令人伐草木投之上流瓦石遇草相積壓良乆淤塞可涉遂長驅進擒其衆湖南平止八日加檢校少保以其軍為行營右䕶軍六年加檢校少傅武勝定國軍節度使湖北京西宣撫使征劉豫充鎮汝軍商虢州西京長水縣慨然有清中原之志而諸將養冦不進飛乃退軍鄂州統制王貴敗豫軍於商州等處七年進太尉與宰相張浚議事不合乞持母服居江州廬山浚命張宗元為宣撫判官撫其衆詔飛赴行在喻遣還軍八年入朝與宰相秦檜議和不叶九年加開府儀同三司十年金敗盟飛遣統制李寳孫彦敗之曹州及宛亭縣進少保河南北路招討使寳又敗金於宛亭牛臯敗之京西又敗之河上張憲復潁昌府陳州董先姚政敗之潁昌將楊成復鄭州統制孟邦傑復永安張憲韓清敗之河南府蔣遇復河南府南城軍將梁興董榮敗之絳州曲垣縣孟州王屋縣濟源縣等處飛再破烏珠於偃城縣殺其將鄂爾多貝勒張憲敗之臨潁縣王貴姚政敗烏珠潁昌張憲傅選冦成敗之臨潁飛乘勢欲深入而秦檜議和累詔班師乃還尋失所復州縣梁興又敗之絳州翼縣趙秉淵敗之淮寧府既而金取濠州檜忌飛乃罷其兵除樞密副使未㡬同張俊往楚州䕶韓世忠軍歸鎮江時檜與俊楊沂中譖罷劉錡飛乞還其兵不允飛子雲帶御器械檜諷臣僚言飛不㧞淮西事以少保武勝定國軍節度醴泉觀使罷頃之統制張憲謀亂冀朝廷還飛而已為副統制王俊發其奸張俊亦以為言檜日譖飛令雲作書與憲下飛大理寺命御史中丞万俟禼訊鞫歸罪雲憲坐斬並賜飛死年三十九妻子遷嶺外天下寃之飛畧知書傳禮士恤民所至秋毫無犯民不知兵金人元帥第四書書曰冬深想惟動履萬福今月十一日使來伏承手劄且聞事大之勤良可嘉尚所進誓表即時津發赴闕今兹大事已定然而其間有一二未合者須至塵凂表云比又見行發遣北來三十五人止是近日因渡淮樵牧偶被掠者殊非昔年逃亡被兵火隔絶之人恐是有司姑徇人情尚為濡滯也審議使副蕭毅等在江南時已䝉定論據諸路所有北人各於逐處沿邉州城就近交割望早為應所論盡數發遣過界唐鄧二州已想差官趂此月下旬到彼已備交割外據陜西地界其間或有犬牙相攙處亦請依元約於明年正月下旬差官與本朝合干人員至鳯翔府會合以慿同去行路至日别有計議自今日以徃既盟之後固當使民各安其業已遣濠州楚州昭信旴𣅿等縣新歸附户口數千遣其家貲並復本土外有未曾發遣人數皆已盡付去人應江南商賈隔在淮以北者已指揮所屬刷㑹侯供到人數亦便發歸所有海州泗州連水軍今嵗流移在南百姓比及新正竊望發過淮北庻不廢一年耕作之計惟閣下裁之所有淮上大軍使至日諸道班還昨以呉璘竊窺闗陜以此右副元帥提兵鎮撫亦專人使之斂退恐欲聞知時寒竊冀鈞重專此布聞不宣朝廷荅書某啓季冬極寒伏惟鈞候啟居萬福整軍安民悉賴全徳特承恵白佩荷記存垂諭大事已定若非國公以生靈為念他人豈能辦此天下幸甚所取北人敢不如命今就近先次津發耶律溫等餘當節次發遣唐鄧二州已遣尚書莫將侍郎周聿於此月十一日星夜前去交割陜西地界亦已差樞密都承㫖鄭剛中同宣撫官前去趂明年正月下旬許議海州泗州連水在南百姓見今根刷發過淮北先䝉遣還濠州楚州昭信旴𣅿等縣户口又許根刷應江南商賈隔在淮北者亦便發歸卑情豈勝感激恐遣人在路遲滯今專發書計㑹泗州差走馬傳到府下伏冀向春氣候淑和竊望倍保鈞重不宣金人改皇統元年紹興十二年正月樞宻使張俊還行在張俊出視師回到行在力辭本兵章凡四上上遣近侍數留益確俊乃復視事割泗唐鄧商州入于金國和議既定畫淮河中流為界故泗州與唐鄧商州皆係割還金人之地遣工部尚書莫將刑部侍郎周聿往京西割地是時邵隆在商州始終幾十年披荆榛瓦礫以為制招徠離散皆得其心自金人敗盟之後屢與金人戰雖常暫棄其城俄即収復終不肯離舍而去至是割付金人隆常怏怏不已十六日庚戌知鎮江府劉子羽復徽猷閣待制和浹上書辨岳飛之寃編管袁州和浹字巨源汾州人知書通春秋左氏傳有識性不喜詭隨好直言岳飛以賔客待之飛死浹上書辯飛之寃事下中書秦檜怒送袁州編管袁官吏以浹取怒時相全不少假監繫甚嚴浹不堪之二月樞密行府參議官史愿加敷文閣待制史愿字仲參燕人先歸朝而來也楊沂中賜名字存中三月一日丁未鄂州駐劄御前諸軍統制王貴罷為特添差福建路馬歩軍副都總管福州駐劄侍御親軍都虞候雄武軍承宣使御前統制闗師古卒田師中加殿前都虞候為鄂州駐劄御前諸軍都統制張俊力薦田師中除殿前都虞候鄂州駐劄御前軍都統制以統岳飛之軍軍中初不服統制傅選李山郭靑輩往往乞罷去撫諭乆之稍定師中專務結托内侍以為内助故能乆其權十三日壬子工部尚書莫將刑部侍郎周聿自京西割地回朝廷與金人元帥書書曰某啓即日春和伏惟鈞候起居萬福某前日遣人付泗州上狀續次津發耶律溫今必皆達府下近據邉界申報合具咨禀鄧界上縁李驃騎將甲軍到來民方不知多有驚移陜西隴城寨將官王吉領兵馬於治坊鎮等處打刼孳畜驅擄户口殺害人民致使相近去處皆不安帖竊慮引惹生事致傷和好敢望嚴賜約束實為幸甚兼告指揮泗州今後遇有書信即為收接發納庻得情懇即達不致留滯向煖竊冀倍深鈞重不宣四月孟忠厚王次翁迎䕶梓宫奉迎皇太后金人許還徽宗皇帝寧德皇后梓宫及皇太后皇后遣孟忠厚王次翁往迎之以丁禩為提舉一行事務五月三日沈昭逺假禮部尚書為賀大金生辰國信使王公亮假保信軍承宣使副之簽書樞密院事何鑄罷提舉臨安府洞宵宫金人元帥第六書書曰少意重有奉聞今來國朝既推異恩許成江南和議大計普天率土皆欲使其安樂故其間士夫三兩人尚論列據張中孚節使及弟中彦鄭億年資政各係汴梁及陜右人民早歳朝廷皆常委以近上職任與餘人不同今逐家親族及居地物産俱在本鄉此三人者幸曽指揮并隨行家眷起發前來團聚復業兼張孝純儀同杜充儀同早年各居外臺相輔之任今張既請老而杜亦物故然二家子弟親屬皆有留河南者及宇文虚中銀青係是先朝特㫖更不遣還自後已經任使到今多嵗並去嵗濠梁之破守臣王進既已貸其生命縁世居闕州見有親族在此則其妻子亦當從之聚首已上數家并望早賜一就津發外據昨復疆時汴梁留守孟庾陳州太守李正民及有畢良使者比審議使蕭毅等回具言江南嘗詢訪此人今并委沿邉官司發遣前去所貴南北之人無不均被徳澤仰副皇上聖人使無一夫不獲其所之意諒惟洞察此懐悉為施行幸甚朝廷答書書曰啟上太傅左丞相都元帥領省鈞座即日極暑伏惟鈞候萬福區區不勝瞻仰近何鑄等回伏䝉還枉鈞翰副以甲馬厚幣豈勝珍感又承傳諭鈞意所以存撫有加及仲鑄等往回種種照恤但深感佩書中首䝉諭及疆域非不在慮皆久有望於上國者自非仁厚特留矜念何以及此論早發遣北人過界敢不承禀但中間嘗以北人畏罪之意如聞欲得上國降一赦罪文字使之釋然無疑徑即發遣免致疑難及諭唐鄧二州交割官所説原約多有不同亦不經再三持論又不告而去已追原差官根問從差官根問前去只要仔細持論今承來諭顯是原差官商量未盡今當如鈞意唯是烏凌阿尚書與鄭剛中公畫陜西地界和尚原方山原兩處依舊保守今畫圖兩本用硃紅擬畫一本納呈乞降下烏凌阿尚書照使縱有少侵劉某曽占地界去處止是欲與川路少留藩籬以安彼中人心亦乞經乆實荷大賜其一本降與鄭剛中遵用伏乞鈞照又諭發遣張中孚及其弟中彦并張孝純宇文虚中王進等家屬謹當一一依禀為各人居處逺近不同已令所在津遣候到即發去次惟杜充家口自充離江南之後其家分散乆經歳月親故絶少難根刷鄭億年雖係汴京人但億年幼自上國來時稱魯公恩造放歸今親加體問更不願前去其母亦以此中親眷不少只欲留此養老誠出懇切供到親書狀繳納想䝉情察也餘曲折已一面照應行遣暑次時唯冀倍保鈞重謹奉啟不宣六月四日乙丑鎮西軍節度副使吳璘來朝十一日壬申王庻責授嚮徳軍節度使道州安置王庻落職居於江州秦檜猶怨其異己不附和議令臣僚言其在江州占奪百姓田宅故責授嚮徳軍節度副使道州安置莫將周聿各降兩官莫將周聿主割地不親往界首各降兩官金人放東京留守孟庾知陳州李正民還朝孟庾掌東京鑰一旦失節附於金人及和議已定上以書請放庾還金人放庾及徽猷閣待制知陳州李正民皆還朝於是畢良史父子亦得歸良史字少董蔡州人畧知書傳喜學粗得晉人筆法少遊京師以買賣古器書畫之屬出入貴人之門當時謂之畢償賣遭兵火後僑寓於興國軍江西漕運蔣傑喜其辯慧資給令赴行在遂以古器書畫之説動諸内侍内侍皆喜之上方搜訪古器書畫之屬恨未有辨其真偽者得良史甚恱月給俸五十千仍令内侍延請為門客又得束修百餘千良史月得錢幾二百千而食客滿門隨有輒盡當時號為窮孟嘗有姓畢人向得文資恩澤無宗族承受良史邂逅得之補文學既得三京地即擬官就禄於新復之地留守司俾權知東明縣良史到縣及搜求京城亂後遺棄古器書畫古今骨董買而藏之㑹金人敗盟良史無用心乃從學解春秋及復得還歸遂盡載所有骨董而到行在上大喜於是以解春秋改京秩自此人號良史為畢骨董朝廷又書書曰某啟季夏極熱伏惟某官鈞候萬福何鑄還所䝉恵近已草畧修報伏䝉上國曲軫仁慈悉從所請深念恩徳實自國公特留鈞意力賜贊成區區銘感何有窮已比覩泗州闗報備坐指揮送䕶一行人使等約七月來過界聞令鼓舞舉國之幸已取八月間遣使報謝闕下敢先次奏知有新茶五百斤聊以將意便中未能多致竊幸笑留餘續上次不宣二十八日己丑翟宗卒二十九日庚寅御前統制傅選為殿前司副統制八月金人元帥第七書書曰皇統二年一日皇叔太傅尚書左丞相兼侍中監修國史都元帥領行臺尚書省事近者叠䝉恵音備悉勤意即日秋凉想惟候履安和承諭遣報謝人使已聞朝廷并唐鄧二州至亦再遣官交割去訖外昨來計議分畫陜地界縁時盡知彼處地界逺近曽言候大事議定各差官仔細檢視臨時從宜施行回辱示報凡事已遵來命差官前去仍約定至彼期限遂即令行臺刑部尚書烏凌阿贊謨守等同往交割仍丁寕戒諭據陜西諸路疆土並合交收縁照鳯成階佑四州於彼切近若行盡取或有不便其四州之地更不交割如兩界地形犬牙相侵各有合要去處仰從宜相度施行續據本官等申至彼相度得大散闗合屬本朝於闗外立為界首除將上件泗州與江南外應陜西之地並行交割便於立定界却得鄭剛中等公文稱來時只指揮檢視商量難便一面分付已具申稟别行移報又據烏凌阿贊謨申三月内鄭剛中公文坐奉指揮照吳玠劉某所管地界分畫内商州秦州不是吳玠原管地方合自逐州以南呉玠原管界至分畫其餘和尚原方山原兩處不係劉某所管地方遵依元降指揮保守為此於何鑄等回時已令達意令於大散闗西正南立為界首承今書已前據烏凌阿贊謨申鄭剛中五月中公文稱和尚原方堂堡秦州等已承指揮許交割乞差官前來分畫外商州已具申審其間却説以龍門闗為界至今承來書與前鄭剛中狀内所報亦又不同所云縱有少侵劉某曽占舊界止是欲與川路留少藩籬以安彼中人心契勘彼間地界已前布聞何煩再三别有改議若謂欲為藩籬以安人心乃是無故輒有疑惑豈原約也竊冀早為指揮所司交割施行所謂商州一處來書並不謂遷延到今尤未了當亦請依原約催促施行又近據沿邉官司申有舊係淮北人民在南方者思鄉前來縁恐其人在南地别有罪犯逃避過淮南以不行勘㑹便行一例收受曽經指揮仰問當來歴因依移文對境州軍仔細勘合却縁逐處稱别無奉到指揮不肯收接文字深詳此事已經計議並誓表盟淮北之人有願歸鄉者更不禁約盖兩國和好務在安濟生靈告以此意便行開諭使上下曉然則有司奉行自無疑難豈有不接文字之理即日到此之人雖是淮北鄉貫合得歸業縁彼處不曽明有指揮遂使逃竄於理不應請為指揮有司出榜曉諭應淮北人數願歸鄉者許其自陳及今後沿邉取㑹文字仰合屬官司依應收接契勘回報以稱通和之義及來書内有北人畏罪之説欲得朝廷赦罪文字使之釋然無疑據前此雖曽發到北人止有數十人小民其餘並作有剳禄姓名之人都未見發遣檢凖今年二月二十四日赦罪書自來亡命沒在江南人等見行理索節次發遣來到並行釋罪其官員百姓軍人等並復舊已有上件寛貸明文今將赦書内一項全備抄録前去請以此曉諭應在彼北人遍令省㑹早與發遣自可安心來歸尚何疑哉所附到鄭億年申狀尋具奏聞准奉聖㫖為已經放還只令在彼居住外有杜充家口雖曾離散其原住州縣官司并從來親屬一行人等豈應全不知得次第去處今國家大議既定欲人人咸獲其便理合使其骨肉團聚并張中孚兄弟張孝純宇文虚中王進等家屬諸處津遣今有數月計此合到應催趂亦就早令到來閣下留意既賜新茶極媿荷餘冀順加保嗇傳奉復問不宣朝廷答書書曰某啟即日秋凉伏惟某官鈞候萬福等使來辱恵問感荷契爱垂諭上國講修和好開示大信含生䝉福遐邇同之此敝邑之幸也叙謝之誠言不能盡竊聞元帥府自班師之後每嘗丁寧諸路帥守應防把兵官吏人等咸使仰體徳意謹守封疆不得生事如此處置則天下舉安深合古訓四海之内孰不欽服又聞近日諸處申達北界人馬無故侵掠及謀畫出入至於收納叛人強奪鞍馬又縱羣冦攻縣道殺官吏驅擄人畜焚毁舍屋及假裝飾以草賊為名公然犯界驚擾百姓逺煩開諭不勝駭愕雖是聴聞未及已䝉矜恕然邉吏妄作不遵約束甚不稱某畏天事大之誠意也已備録所示付四川宣撫鄭剛中刷根南來人馬依准交割與對境州軍取收管公文仍戒沿邉諸路不得令人過界刼掠收接南投人馬令出榜界上曉諭庻得疆塲安静人民樂業信義誠篤垂裕無窮少副來誨老母還歸知恩有自已就報謝使副賫書信布叙前書所論陜西地界亦已别修報書向寒竊冀倍保鈞重不宣三朝北盟㑹編卷二百八
