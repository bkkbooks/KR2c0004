body:
  text: 三朝北盟㑹編卷十六宋徐夢莘撰政宣上帙起宣和五年四月十七日庚子盡二十八日辛亥十七日庚子童貫蔡攸整軍容入燕山府撫定燕城貫攸入燕京撫定殘民羸卒捧香火迎導而行懽呼言曰契丹既滅大金歸國王師入城復見天日相慶之人家至户到燕人大悦初李嗣本提兵先入燕城其次宣撫司方來以郭藥師為先鋒嗣本軍望見之以為金人兵至外軍即遁營中大擾藥師使人往撫之方定貫攸問馬擴曰衆慮金人刼寨爾以為如何擴曰可保其不來不必慮也童貫蔡攸燕山府住十日乃還平燕錄及封氏編年王安中入燕錄曰童貫與安中等至雄州大金議猶未决貫與安中等共議言大金須索種種干求貫常憤恨朝廷雖然應副貫寔惶恐安中曰敵人貪婪自古如此又况我兵向為契丹所敗若非涿易納欵偏將來歸未易議也趙良嗣雖為朝廷不能挫彼之意必須右選中擇其辨博之士折彼泛議可也遂于軍中得姚平仲康隨王瓌等以待入燕議事童貫遂差姚平仲康隨王瓌良嗣等各帶本軍人馬起發去交割燕京平仲將家子豪邁俊爽以强詞折阿固達一夕隨定次差李嗣本統河東兵五萬為前軍以种師中楊可世擁陜西諸道兵三十萬為中部遣郭藥師領常勝軍自新城入固安安次勒兵博山貫攸建旌纛鳴鼓吹笙節以大軍次之裨將馬公直將河北京畿兵為殿良嗣至瀘溝河大金猶駐燕京而良嗣姚平仲康隨入燕京見大金國主尼堪云前約以十一日今後時何也姚平仲曰大事已定並無少疑交割燕京後時五日乃本國之禮若先是而來是屬僣越何問之有若元帥求釁妄生事端敗其懽盟皇天照鑒豈輔曲者自古反盟不克享國又况貴朝百色須求我皇帝寛仁大度曲就悉從不欲少違慮壊前約元帥又莫生事是日師中等已營料石崗可世又檄衆曰今日我軰正索一死耳乃命諸將治鞍發刄援弓以卜鏖戰督嗣本渡河阿克順等聞我軍先後左右同環亘二百里不絶乃謂良嗣平仲等曰豈敢生事只為本國已先發軍今滯數日所以即詰旦即呼所屬交割國主與阿克順等卷甲移竈退舍三十里日晡嗣本提兵入城師中可世相繼入焉先是大金盤旋燕京城幾及半年久客多欲部曲利於財貨剽掠燕京富豪比屋室如懸磬檀順景薊民始困弊而契丹又懼大金攘奪皆逃竄山谷城市邱墟狐狸穴處又將職官漢民分路遣行我朝所得空城而已北征紀寔曰王黼既專任其事因降㫖飭二帥不得動以聼約束乃使趙良嗣奉使而阿固達謂良嗣曰我聞中國大將獨仗劉延慶將十萬衆一旦不戰兵散而潰中國何足道我自入燕山今為我有中國安得之良嗣不能對乃與其使偕來作紀寔後六年始見馬茆齋自叙偹能言金人燕山事寔甚詳然獨不見書紀寔所取阿固達不許燕山之語及索山後有峻拒之語却有良嗣更易語錄之説又有謂山後幸踏地里交割牒文大抵我使人疑皆有所參商至為良嗣之奸利則一轍也是故紀寔盡述當時朝論不敢從他錄也始祖宗時遼使至待遇之禮有限不示以華侈且以河朔甫近都邑故迂其途多其里堠次第為之燕犒而後至皆防㣲杜漸意也及黼遣良嗣唯務速以擅其功與其使人限以七日自燕山至闕下凡四五往返皆然又其每至也漸加禮誘之以富盛金人因是自負邀索不已黼遂許以遼人舊嵗幣四十萬之數外每嵗更添燕山涿易順景檀薊六州代税錢一百萬緡金人既得所欲乃許我又索營平二州則曰海上脚根底元約石晉所割則屬中國契丹舊地則歸我今營平二州乃按巴堅於後唐時所陷灤州乃營平地舊已入遼即非石晉所獻之地當如元約於是我無辭又索雲中一路則曰雲中久為我有中國安得之中國亦無如之何姑欲得燕山且掩挫敗之醜以塞中外之議因割燕山府涿易檀順薊景為一路而歸其代税錢一百萬緡又議折中國貨物以補其闕於是又遣良嗣議折物凡絹三十萬絲綿稱是金人每喜南貨故雖木綿亦二萬段香犀玳瑁椀楪匙筯皆折閲倍償之至如龍腦每兩折八貫則皆良嗣其中為奸也約既定索禮數因盡還其待大遼敵國之禮唯不稱兄弟而已乃遣良嗣奉誓書而往而金人取誓書副先視之又止諸界上俾我使復回更易誓書中語然後來我又從之誓書事具于下事既畢彼亦遣使以誓書來時鄭丞相居中亦嘗白上曰禮數既重加嵗幣厚必使亦不納金人既得燕山子女加久住氣候已熱遂大病而城外諸寨日夜為燕之鄉兵刼撓因罵伊都曰汝勸我來此今外寨皆不安四面皆大兵居此羅網中如何歸乃大毁諸州及燕山城壁樓櫓要害皆平之又盡括燕山金銀錢物民庶寺院一掃皆空以遼人舊大臣及儀仗車馬玉帛輜重盡由松亭關去關在東北去其國近本欲顯州去爾全師復由居庸關之鴛鴦泊扼天祚出路以絶契丹之望乃盡以空城付之我時便有語謂中國修理三二年間却取之趙良嗣亦嘗私謂人曰只可保三年爾時黼即與二帥上下皆知之不能忠吿也二帥因以宣和五年夏入燕山大内毁一小殿吻受諸將賀駐兵十餘日遂凱還而歸金人阿固達交割燕山畢西由居庸關往白水泊過夏平燕錄曰金人用阿克順計寸金寸土裹取殆盡將燕城職官民户技術嬪嬙娼優黄冠瞿曇金帛子女等席卷而東或告燕人曰汝之東遷非金人意也南朝留常勝軍利汝田宅紿之爾燕人皆怨説尼堪不當與我全燕尼堪欲止割涿易兩州阿固達不允由雲中留白水十九日壬寅金人遣使賫御押地圖來宣撫司茆齋自叙曰十九日金人使賫御押地圖來宣言令童太師蔡相公拜受童蔡惶懼問如何處置僕往謂之曰若論御押一如本朝御押前此累有御筆何嘗使尼堪元帥以下郎君拜受此大過當金人無對遂許不拜先是李嗣本姚平仲軍交燕日運粮夫奪女真牛馬殺一女真至是來整㑹留償人命及牛馬價錢復為平之宣撫司留燕旬有二日議班師赴闕北征紀寔曰金人既據燕勢甚張方自務大乃邀索不已而朝廷堅求燕山地則指城謂使人曰此我有也必欲得之納錢若干萬則與爾雖燕山僧寺巨室之屬指一塔一殿一屋即曰此我物也當折取之汝欲為留者即納其直故或千或萬貨之而後重載而去由是朝廷償以百萬緡謂之燕山路代税阿固達方喜曰荷他趙皇千年萬嵗是多少物乃得燕山府檀順薊景六州此獨黼為之二帥寔不預宣和五年夏四月金軍吿還命我師交割二帥始以兵入之號曰交割燕山府後曰撫定燕山然所至皆空城而已人物既寡城櫓又悉毁皆所以困我仍不與我營平等扼吾之咽喉爾營平者當榆關路地平無山川之阻非若古北口居庸關之北且近女真故識者知其用心矣又燕民破散悉流移近地故職官富户來奔既無以處朝廷因分遣諸州贍之凡州縣動數千口至少猶不下五七百口及嘗為遼官者等第補之自諸州通判而下皆添差以處焉自并代河朔齊鄆襄漢之間遍矣蕩然莫有關防我之山川險易州郡虚實盡能知之州郡又往往不䘏或困於衣食其在闕下者至於揭榜通衢人物往來處稱其名氏舊官封而以乞丐執政雖睹之不問也始金人約燕地人民盡歸南朝契丹奚渤海等人民皆屬金國既議分割則常勝軍郭藥師鐡州人其下諸將髙望等又多渤海契丹人即令歸金國上下方以為撓而金人則已擄掠燕地人物職官等將携之歸方議欲對換而貫為羣下所悞謂不若以燕地富户税産多者皆與金人去却得其田宅足以贍常勝軍則不煩朝廷錢粮又得留常勝一軍為用貫然之遂亟為奏禀黼遽許焉葢朝廷輕易勿思獨以藥師常勝軍為重而已金人既大得所欲號職官富户因盡括六州之近地上户幾二三萬起發由松亭關去燕中合境為之大擾由是怨懟生矣時王安中為宣撫以撫燕既無綱領所謂富户田宅皆為常勝軍即日肆意占據畧不問官司安中坐視而已因是多侵奪民田故人益不聊生及後張覺殺金人所擄遼臣之屬已盡為常勝軍所有皆立為乞丐之人方更遭其困辱甚至於殺戮無吿所謂職官富户又悉南奔歸我我不得已而後納之且復流離困躓使我重失燕人之心仍為新交之盟痛莫大于此二十二日乙巳童貫上復燕奏宣和錄曰陜西河北河東路宣撫司童貫等言恭惟陛下神機先物前知遼主滅亡之兆自政和八年金國遣使通好約結夾攻至宣和四年遼主播遷耶律淳簒立幽燕之民久懼塗炭延頸欵闗願歸中國陛下撫順人心特詔臣等出總戎干先行招撫及遣使以禍福諭淳使納土内附淳先敗盟寇邊臣等仰遵睿畫東由雄州西由安肅廣信諸道進討自五月二十二日二十五日二十九日八月十四日二十一日二十九日九月一日九日王師屢勝燕人震懾乘勢開諭聖徳招徠逺人廣出榜文遣間賫至燕中曉諭士民先是郭藥師領常勝軍萬人駐涿州燕中最號勁兵易州守城契丹亦衆涿易之間有牛欄寨皆契丹素屯兵馬區處聲援相接涿易仍係燕山襟喉之地臣等既進兵討蕩兼用間招誘常勝軍及預行結約易州城中豪傑内應至九月二十三日郭藥師領常勝萬兵舉涿來歸二十七日遣發兵馬進取易州殺戮城内契丹殆盡當日收復易州十月四日攻破牛欄寨涿易之路遂通節次收復涿復歸義安城淶水并良鄉武清安次清化漷隂潞三河析津宛平平虜玉田等縣及景薊等州同時納土幅員數千里天險地利盡皆有之獨燕京孤城未下女主偽后蕭氏遂稱臣妾遣使納欵却而不受十月十八日大兵至良鄉縣界殺退賊衆二十三日遣竒兵徑入燕城殺戮城中契丹奚萬衆燕民鼓舞四軍賊首援兵旅拒二十五日再戰於瀘溝河賊首退保燕城十二月二日契丹悉燕中兵馬來犯永清一帶已歸順地分王師鏖擊大𫉬勝㨗横屍蔽野餘衆潰散不能再舉四軍遂與偽后棄城逃遁金國十二月五日入居庸闗與王師夾攻收復燕城了當臣等於四月十七日躬領大軍入燕山府撫定軍民布宣聖澤者全師制勝振朔部之天聲舉國來成獲燕山之都㑹罄四方而無侮垂萬世以有光廟社均休臣民胥慶臣等聞周伐玁狁僅至太原漢繫匃奴但期渭上雖招徠其種落或攘斥於封圻皆僅存開拓邊陲之名固未有混同宇宙之烈惟兹遼國昔號殊隣當五季之瓜分盜一方而穴處蕭蕭易水限風氣於山川奕奕漢津隔星辰於象緯金繒填壑者以鉅萬計士庶疾首者殆二百年藝祖肇基已恢奄有之志神皇御極載勤繼伐之謀對越在天之靈必施闢國之畧屬逋逃之逺跡復宗種之内訌竊位渝盟不誅而殞捐誠慕義莫止其來遂復興古之師爰狥叩闗之請破堅披敵首克六城獻馘執俘何啻三㨗軍聲振叠敵帥驚奔絶其唇輔之依結彼腹心之應扶老携幼還為耕鑿之民户籍提疆來入版圖之㑹市無易肆人若更生通地利於九山坤軸鎮醫閭之峻察璣衡於七政天文開析木之躔聖武既昭庶邦丕享虞帝舞干而苗格繇文徳之誕敷文王因壘而崇降自聖謨之丕顯於皇偉績更邁前修恭惟皇帝陛下大道并包沉機獨運以順為武威加六合之中惟斷乃成智出羣疑之表快烈祖未攄之憤昭寧人有指之謀膴膴周原昔裂兾州之壤茫茫禹跡今歸碣石之封方且下十行之詔以蠲苛嬈之科定三章之約以施寛大之法禮髙年而教孝弟讓有徳而訪才能文軌同混於車書朔南咸暨於政教天討陳于原野聿臻偃武之期成功吿于神明益顯無前之績臣等逺慙周輔獲禀睿謀拊循幽薊之遺黎宣布神聖之厚徳御五門而奏凱將賚及于羣元奉萬壽以稱觴當獲陪於列辟秀水閒居錄曰童貫蔡攸奏至宰相王黼率百官稱賀表中多符意云陛峻明堂既揭平朔之號軒藏石鼓仍題復古之名鍾鼎銘金則應牧野誓師之時印章篆玉則示漢將破敵之兆承九清之命而整神霄隂相之旅建三辰之旗而向太一下臨之方云又曰童貫奏中云不受蕭后納欵者先與金人有約不敢受也又云金國入居庸闗與王師夾攻者劉延慶為殘燕所敗約金人取燕城也又曰女真既破契丹駐軍于燕山之北約本朝自以兵力取燕地於是童貫蔡攸與大帥劉延慶將十五萬衆進屯瀘溝河時燕后蕭氏與四軍大王者居燕城有衆纔數千遣使人韓昉歸欵仍請罷嵗幣貫等不納延慶分兵往救為蕭幹擊還盧溝大軍聞風遂潰王黼為相因此嫉貫等且欲自以為功㑹燕都耶律淳死乃議遣使召女真取燕城厚許金幣以贖其地女真果入燕恣為刼掠以空城歸我而厚索嵗幣且知中國兵弱自此有南牧之意矣師還童貫封廣陽郡王蔡攸領樞宻院王黼加太傅總三省賜玉帶如唐裴度故事始議贖地但求石晉故疆不思營平灤三州乃劉仁恭所遺金不肯割此於三郡聚兵窺伺為内侵之計黼之疎謬如此二十七日庚戌以收復燕雲曲赦河東河北燕山府雲中路赦文曰制軍詰禁昭帝王之極功發政施仁體天地之大徳朕祗膺駿命嗣守洪圖聿臻熙洽之期克保盈成之業皇天全付所覆可忘疆理之修先王啓佑後人宜篤經營之念萬邦作乂四海咸賔惟契丹之舊隣侵我邦之名壤雖帝居赤縣有邊徼之外區而燕曰幽州與青徐為王土割賂自五季始盜據垂二百年自藝祖之肇基洎裕陵之復古聖哲垂慮謨訓具昭肆予纂承敢時怠忽顧澶淵結誓之後守其信書且河朔息戰以來重其兵舉人心久鬱神祚有開相彼昏迷罔知悛改賦歛暴刻衆懐離散之思刑罰峻深人抱怨咨之戚内親争叛强敵肆侵遣穹帳以逋逃輕前盟而背覆五都潰决諸姓駭驚用遄將相之行往䕶封圻之守殆天所與其衆自歸簞食壺漿迎王師而來保旱霓時雨慰民望以咸蘇靡勤鋭旅之攻盡復連城之聚一方黎獻初還禮義之鄉千里山河重載版圖之籍言念征徒暴露之久轉餉調發之勞并及新民曲覃慶宥於戯師直為壯既昭無敵之功道化久成斯致丕平之利咨爾有衆曉予至懐二十八日辛亥童貫蔡攸歸以詹度權帥事詹度既就權帥屏招集散民逺近駢集大金出嶺外可世平仲即分陜西河北諸道兵常勝軍守松亭古北居庸闗以閤門宣贊舍人劉逸知景州惠州團練使楊可昇知檀州忠州防禦使任宗堯知薊州悉發官吏赴上詹度作平燕詩送童貫曰長亭春色送英雄滿目江山映日紅劔㦸夜揺楊柳月旌旗曉拂杏花風行時一决安邊䇿到後須成濟世功為報燕山諸將吏太平取在笑談中三朝北盟㑹編卷十六
