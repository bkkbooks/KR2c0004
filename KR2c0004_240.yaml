body:
  text: 三朝北盟會編卷二百四十宋徐夢莘撰炎興下帙起紹興三十一年十一月十七日乙酉盡二十七日乙未十七日乙酉王彥收復華州金房開逹州駐劄都統制王彥遣統制郭堪統押軍馬前去收復華州有第七將官邢進等於十一月十七日到華州城下先鼓勇士卒自寅時攻打至已時打破華州捉到同知招武大將軍韓願將官信武將軍韓鎔并金劉括等三十二人奪到鞍馬器甲不知其數即時撫定軍民了當十八日丙戍王權貸命除名勒停瓊州編管臣僚上言劄子奏近日進對恭聞聖訓論及親征之事謂此行當大明誅賞諸將有功者不惜官爵金帛重賞之其不用命者有司誅其一二以警其餘大哉聖人之言其真得古帝王御將之要術也顧於此時將非其人至於營私背公縱敵玩冦罪惡顯著為國之辱如王權者若置之輕典是為失罰其何以示諸將乎臣謹按御前諸軍都統制王權以駔儈之資恣溪壑之欲遭時多故夤緣結託濫膺閫寄不知忠義以報國但務掊克以謀身其前後過惡未易悉數姑指其大者言之近敵敗盟朝廷命權進屯淮上為權計者義當身先士卒奮不顧身朝受命夕引道乃惑於內寵心懷顧戀與其愛姬數人泣别三日而不能行士卒聞之無不竊笑及至淮宣言欲犒軍悉出其家金寶厚載而往既至中途復傳令未用且於新河伺候實欲緩急之際易于他人之手故假犒軍之名以待之耳其謀出此夫豈存鬪志哉權至厯陽修築營壘祗為自安計所謂沿淮守禦之備初不經意及劉錡權住夀春縣即令總漕三司應辦糧糗權以威脅二司同請乞留權守和州朝廷劄下劉錡復督行權不得已三日發一軍凡二十四日才發一半止於廬州戍守故金人至淮得以繫橋從容而進如入無人之境權亦旋棄廬州回屯昭關將士雖有欲戰之心而權領親兵先遁麾衆便退終不得交鋒及敵騎至尉子橋始遣姚興一軍迎敵戮力血戰數陳告急於權權於仙宗山上以羣刀斧手自衛飲宴自若殊無應援之意自辰至申僅遣二百輩往已無及矣興勢雖窮然殺數百人生擒敵首而回不意敵假立權幟以誤之興奔而入遂與其徒俱陷所存者無一二權方走旗獻捷兾以欺罔自解自是之後不復更與敵接徑回和州城新築內外所積之糧亦贍數月權誠能效臧質之守旴𣅿抗魏師數十萬衆使登城之人殺傷與城平厯三旬而不拔卒解圍而去則亦可謂禦敵權志不在乎守言于衆謂已得金字牌棄城守江故自十一月二十一日先往采石坐于車船之上仍放火燒西門而城內所有錢糧器甲騾馬盡委于敵藉令權于是時不得已而退卻猶當潛師宵遁使敵不知或結陳而退反旗鳴鼓若將向敵使人不敢進尚可以全吾師也權不知出此為敵所覺遣兵逼逐致使軍民奔突一槩踐擁入城河與夫及江爭渡沉溺而死者又三之二將士怨怒號呼聲動天地指船詆罵皆以權不戰誤國負朝廷為言且恨不食其肉也其潰兵抱蘆席浮江而過者往往散而之他權當痛自咎悔收兵江上晝夜紏合以雪前恥乃於二十五日夜半徑發采石歸於建康城中想其心止以骨肉姬妾為念豈有意於禦敵哉權首鼠依違以至如此言之使人痛憤夫權忝冒節鉞纍年受國恩寵不為不厚邉事方興正為將者捐軀徇國之日而權之初也既不能戰又不能援及其終也既不能守又不能退乃使萬千人之命一旦無主而就死地其亦應誅久矣陛下奪其兵柄召之而來固已壯國威而肅軍政振士氣而快人心倘若赦而不誅臣恐諸將效視陛下雖有熊羆之士百萬之衆安得而用之臣聞周世宗之擊劉宗也其將樊愛能何徽引兵先遁世宗收愛能與徽及所部軍士七千餘悉斬于市自是驕將惰卒竦然知懼卒成平定之功夫以區區之世宗猶能如此陛下亦何憚而不為哉臣愚欲望陛下暴權之惡聲權之罪特賜睿斷明正典刑梟首江上使將士聞風爭先效命以赴國難則威令赫然行于萬里之外金人雖強不足平也取進止又臣僚上言仰惟陛下慎惜名器而於將士之爵祿品秩未嘗吝惜躬行節儉而於將士之賞賚惟務豐厚則其所以待遇之可謂至矣是宜感激厚恩奮不顧身以圖報國而乃於敵國侵疆之秋斂兵退避其罪大矣宜重正典刑而朝廷行遣太輕臣安敢緘默而不論乎臣謹按王權本無竒才進居大將之任坐享富貴積有日矣邉郡無警正賴以捍禦而乃専於謀身退縮避敵以自全考其用心罪宜誅戮未宜勒停臣且以大槩論之敵騎欲南來時朝廷固屢催權往沿淮一帶踏逐險隘以為守禦之備而乃恬不加意駐軍於和州為自便之計雖制置劉錡數趣之逡巡數日一半軍馬至廬州權又盡呼其兵還屯和州又聞報至尉子橋而權乃以精兵自衛止令破敵一軍禦之及姚興勢孤求援而權遣去應援之人既少又且稽緩致姚興等陷殁人皆痛之後又妄言於衆謂得金字牌令其保江遂行衆爭渡擁入江流者不知幾千人兵卒怨憤皆有為王太尉所誤而死不能得厮殺報國而死之語極其可傷痛兩淮及江上之人逐處怨罵恨不食其肉朝廷如此而不加怒焉殆恐人人相效何以使諸將之用命乎竊覩關報劉泛以瓜州之戰敗衄令按軍法有旨特貸勒停編管而權之得罪止於罷兵柄領宫祠居住於善地識者以謂同罪異罰非所以示公又况權之罪加於劉汜數等乎伏望陛下以國事為重以兩淮生靈為可憐將王權特加誅戮以慰人心天下幸甚取進止十一月十八日三省樞密院同奉聖旨王權可特貸命除名勒停永不收敘送瓊州編管月具存亡聞奏令臨安府差得力使臣二員軍兵二十人押送前去沿路不得時刻住滯具已起發申三省樞密院又臣僚上言嘗觀齊威王委政卿大夫諸侯並伐一旦赫然發憤以即墨大夫之賢而毁言日至知其不事左右以求譽也而封之以阿大夫無狀而譽言日聞知其以幣帛厚左右以求譽也而烹之齊國震懼人人不敢飾非務盡其誠遂起兵擊趙擊魏諸侯不敢加兵由是知人君誅賞一斷以公議而不牽於左右之毁譽則人心自服士氣自振而敵國自退矣臣仰惟陛下聖謨神斷髙出百世遭時多難駕馭將帥動契事宜如近者皂角林之捷即日降德音命中使進爵賜金恩賚有加則固己封即墨大夫矣如阿大夫之罪暴著公議所不容者其可不加戮哉臣按王權初無寸功久叨重寄平居則虛名上藉隳壞軍政刻削廪糧剝下自豐固己失矣一旦有疆場之虞則巧圖窟穴詭置私藏自擇便地望風退懼兵法曰將受命之日則忘其家臨陳約束則忘其親援枹鼓之急則忘其身而權之出師與妻孥泣别三日而後行士卒聞之莫不竊笑則固己當受穰苴之戮矣及尉子橋之戰身擁強兵不援姚興坐視陷沒而走旗報捷欺罔朝廷厯陽之奔士卒尚欲回戰而權麾之使退一城兵民爭船赴水死亡幾盡軍資戎器併以遺敵金人深入身為大將兵非寡弱略不交鋒以至於此罪何所逃臣竊聞建隆中晉州荆罕儒戰死藝祖斬不效命者二十九人咸平中望都之役諸將有臨陳而先遁者章聖謂近臣曰今未能偃兵若不推究將來何以為戒遂斬二十餘人此祖宗之成法也近日瓜洲之衄陛下以劉汜先退竄之逺方矣况元帥之罪重於偏禆淮西之敗甚於瓜洲則王權之誅豈可出劉泛下哉今軍衆方興征伐未艾而刑罰之行輕重未當臣恐諸將不服將來何以使人捐軀徇國乎臣願陛下鑒齊威之舉稽藝祖章聖之法速正典刑以服人心以作士氣以集非常之勳天下幸甚取進止十一月二十一日三省樞密院同奉聖旨坐前後章疏報行十九日丁亥夜雪成閔回騎至自襄陽見葉義問于建康府二十日戊子成閔到鎮江府二十三日辛卯金國亮自瓜洲臨鎮江金國主亮自采石趨揚州下寨於州之東南是日觀江旌旗列于江上其勢甚盛鎮江居人亦臨江對觀皆有懼色都統制李橫發水軍戰艦出江中以耀威金人皆凝望不動有一萬户跪于亮前曰郎主不數日下兩淮之地自古所無也今大江未可渡請駐于揚州力農訓兵徐徐圖之亮唾罵曰爾欲怠我軍心耶命決皮條五十二十五日癸巳差諸將軍都統制主管馬軍司公事成閔差兼鎮江府駐劄御前諸軍都統制淮南東路制置使京東西路河北東路淮北泗宿州招討使李顯忠為淮南西路制置使京畿河北西路淮北夀亳州招討使前建康府駐劄御前諸軍都統制吳拱為湖北京西路制置使京西北路招討使依前鄂州駐劄御前諸軍統制金人攻泰興縣金國主亮傾國來攻揚州是時泰州泰興縣知縣尤袤猶守泰興不去袤字延之嘗以淮南置山水寨擾民不能保其家屬竊悲哀之作淮民謡一篇曰東府買舟船西府買器械問儂欲何為團結山水寨寨長過我廬意氣甚雄粗青衫兩承局暮夜連勾呼勾呼且未已摧剝到雞豕供應稍不如前向受笞箠驅東復驅西棄却鋤與犁無錢買刀劍典盡渾家衣去年江南荒趂熱過江北江北不可往江南歸未得父母生我時教我學耕桑不識官府嚴安能事戎行執鎗不解刺執弓不能射團結我何為徒勞定無益流離重流離忍凍復忍飢誰謂天地寬一身無所依淮南喪亂後安集亦未久死者積如麻生者能幾口荒村日西斜破屋兩三家撫摩力不足將奈此擾何御營宿衛使楊存中遣前軍統制王剛權知泰州壬辰剛次泰興縣癸巳質明金人至泰興城下剛率衆禦之太傅和義郡王楊存中黃旗走報遣發䇿應前軍統制王剛前去泰州防托于十一月二十九日據王剛申二十六日未時以來有敵人馬軍二十餘隊前來大興縣諸門外攻城放火燒門城上用甲軍弓弩箭往即時開門遣差鎗刀斧手臨壕迎敵續差將官親隨李思濟王鑄將帶馬軍出城掩殺王剛躬親統率將佐官兵分布督戰擁殺金兵入河及殺死不知其數追趕二十餘里除殺死入河外活捉到金人渤海及奪到戰馬金鼓旗鎗器甲等二十七日乙未金人陷泰州先是知泰州孫政以邉郡不寧乞宫祠而去通判王濤權知州事九月濤以移治明州而去留州印與兵馬都監趙福洎金人侵淮甸泰州百姓詣御前營衛使司投狀乞以福為知州主管州事楊存中從之福遂權知泰州有水寨都統領胡深及其副臧圭棄水寨率鄉兵二千人至泰州以兵勢凌鑠福且具申于樞密行府葉義問義問遂以深為知州深以圭為通判以福為路分都監深聞金人欲攻泰州與圭率其衆棄城先遁圭掘斷薑堰盡泄運河水丁未金人到城下河已乾矣遂徑登其城城中軍民已亂金人縱火殺戮福死于亂兵中子女強壯盡被驅虜而去城中有人走透得出者至薑堰堰斷為水所阻盡為金人所獲初福知泰州也申衛營宿衛使司乞兵屯戍存中遣前軍統制王剛以本部兵權知泰州以福為路分都監剛到泰興遇金人而兵皆紫茸軍乃直趍泰州陷之三朝北盟會編卷二百四十
