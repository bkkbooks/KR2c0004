body:
  text: 三朝北盟㑹編卷九十宋徐夢莘撰靖康中帙起靖康二年四月四日癸亥盡五日甲子邦昌集百官赴文徳殿宣示上宋太后書書曰余世受宋恩身相前帝每欲捨生而取義唯期尊主以庇民豈圖禍變之非常以至君王之易位既重懼於網羅實難逭於刀鋸外逼大國兵火之威内拯黎元塗炭之命顧難施於面目徒自悼於夙宵杵臼之存趙孤惟初心之有在契丹之立晉祖考殊迹以自明載惟本朝開創之圖首議兩宫尊崇之禮號同母后國繫周朝兹惟臣子之至恭以示邦家之大順肆稽成憲爰舉徽章恭惟哲宗元祐皇后徽柔懿恭聰明睿智天作之合早嫓德于泰陵王假有家夙母儀于方夏端著紫庭之範且彰彤管之聲雖嘗御瑶華崇道之居亦既奉欽聖還宫之詔乆棲神於靖舘積系望於綿區今二帝以遷三川方震匪仰伸於欽奉則曷副於儀型是用端誠於心涓日之吉祗伏掖庭之次恭陳舊國之儀掲示號以正名開列宫而移御幅員時乂庶臻康濟之期京邑既安更介靈長之祉宜上尊號曰宋太后御延福宫令有司擇日奉册寳其應于典禮合行事件令禮部疾速施行天下勤王之師有至近境午刻開封府榜云范尚書趙資政領兵在南京先遣統制官王淵議事仰城中不得驚擾江淮發運判官向子諲遣將官王儀等統勤王之師到城下邦昌命范瓊以酒食等犒軍引王儀上殿面賜𫀆帶進官令諭子諲勤王第一功當有峻擢既退王時雍復以絹三十疋錢二十千犒王儀并以偽告俱詣發運司繳納右司宋齊愈吏部陳磷司勲劉定禮部胡𢡟立乞致仕不允殿中侍御史黎確古文殿修撰宋彦通差往南京當公事日下出門侍御史胡舜陟上張邦昌剳子乞正名位剳子曰臣以固陋謬當言責而又昔䝉収録受恩良厚輙効愚𠂻仰報萬一今日之言篤於愛上陛下亮臣區區必不加罪若小人自為身謀必欲置臣重辟臣亦甘受不辭臣切覩陛下正位宏逺非出本心外廹金人兵革之威内念黎元塗炭之苦良不獲已總攬權綱自踐祚以來謙虚畏抑命令起居不敢侔於至尊故自士大夫以至閭閻童僕翕然稱頌皆知陛下忠義之心堅如金石不肯朝北面而事人夕南面而臣人也此有知陛下處富貴崇髙聊以從權非固執以為已有也今大金已反其國而君臣之大義安可一日而廢陛下之髙明洞逹釋然去位宜不為難第恐姦言熒惑聰聽謂大金為可恃謂天位不可失謂自古有亡必有興此皆小人輕慮淺謀但顧目前之利四海豈有一夫不心懐趙氏者自二帝播遷人皆泣血但恨敵國势強力莫能囬所以興㓕繼絶報本反始天下正有望於陛下若奮發英㫁斥去姦言使趙氏之已亡而存此伊尹周公盛德之事名與天壤不朽慶流子孫無窮若曲狥小人之言頓失君臣之義則中原干戈相尋無已生靈屠戮何有噍類陛下不得已而登大寳豈復使之若是耶今四方勤王之師雲蒸雨集彼為趙氏而來豈宜閉門拒之有同兒戯伏望即降指揮正其名位請元祐皇后埀簾聽政於内陛下以太宰治事於外特遣大臣往迎康王明以此事播告將士孰不欣然悦服此實天下盛舉陛下卓越之殊勲萬世一時者也伏望採擇狂愚而加意焉四日癸亥門下侍郎耿南仲等上表勸進於大元帥門下侍郎耿南仲元帥汪伯彦副元帥黄潜善參議官耿延禧董耘髙世則斡辦官楊淵王起之秦伯祥隨軍轉運使梁揚祖黄潜厚都統制揚惟忠五軍統制張俊以下將士上議勸進再拜言曰金人不道邀二聖鑾輿北狩天未厭宋必將有主主宋祀者非大王而誰大王聰明英勇上皇之皇嗣少弟之介弟天命以兆人心實歸應天順人宜適機㑹天命不可以乆滯人心不可以強違萬機不可以暫曠願大王即皇帝位以定天下上以慰祖宗在天之靈次以慰二聖南望之意然後號令天下回戈㓕敵以迎還二聖為宋中興之主天下幸甚又伏地慟哭再拜進曰二聖北狩邦昌僣竊天下無主羣心皇皇大王不早為之圖後時有悔願大王以宗廟社稷為念速繼大統先正尊位乃議奉迎生靈延頸以望願大王幸聽俯狥羣情臣南仲率羣臣昧死上言俯伏再拜上避席嗚咽掩面流涕辝遜不受三軍呼萬嵗聲震天地動色日光明耀在庭之臣流涕又拜悲喜交集上𫝊㫖請退羣臣乃退㑹諸路表至南仲等再拜言曰二聖北狩大王今欲北征奉迎鑾輿此大王孝弟已足以昭假神明何舉不利天下幸甚然邦昌僣位號於京師姦雄睥睨事未歸一願少湏之先了此一叚大事然後回戈北征邦昌身為宰輔受國厚恩豈遽忘德第恐廹不得已權宜免禍而為之大王若早為之計彼必拱手反正其或後時乆假而不歸矣使邦昌乆假而不歸則羣兇如蝟毛而起矣潜善又曰只如邦昌初起敢便作宰相既得作相便胡批亂判安然為之恐遂做此不可不慮願大王催促諸頭項人馬㑹合於京城下張大軍聲彼自膽落寳玉有歸或茍逆天叛理宋德在人已深卿士大夫諸軍百姓亦不為使大王可以不煩伐鼓只消傳檄軍民一呼胥畔邦昌面縛以獻而歸璽大王大王於是北征奉璽以迎還二聖似為未晩投機之㑹間不容髪惟大王早圖之楊惟忠張俊及五軍統制將佐等亦進曰北征乃將帥事願大王即皇帝位且先理㑹張邦昌大事惟忠等身膏草野圖報大王又㑹硬探鄭安囬報金人四月初一日盡起離京城二聖六宫盡皆北駕張邦昌偽立稱大楚皇帝京城今繕治守禦以待勤王之師南仲伯彦潜善延禧耘世則以下因又啟曰南仲等所陳屢矣獨有天人相與之際朕兆已乆未嘗畧舉願畢其説葢聞自古帝王之興必有受命之符故白魚潜躍武王作周赤伏顯符光武興漢大王奉使陛辭之日皇帝賜方排玉帶有大事聖語𬒳受大元帥建府之命有賜袍异夢皇帝即位紀元曰靖康其後大王未嘗封靖也而京師之人及四方申陳或曰靖王或曰康王迨皇帝之北遷始悟曰靖字從立十二月乃皇帝立十有二月而康王建帥紀年二字實比今日飛出亭一牌有連三箭之祥太上皇萬里有即真二字詔黄河之渡則隂未凝而凍忽合濟州之瑞則紅光見而火徳符天命章章著聞周之武王漢之光武何以過之大王其可乆稽天命乎其可乆拂人情乎古人有言曰違天不祥願大王既即皇帝位上當天心下塞人望批答金人肆毒踐我土地陵我京邑遷我二帝移我神器四海㒺戴喁喁延首二三大臣暨諸將與夫諸路帥守以天下羣情交章勸進吾以父兄痛心疾首未知措身之地豈敢偃然受天下歸往之請猥當隆極勉狥衆志以答天下之休庶以奉迎二聖恢復中原此吾誠心天實臨之公等世受國恩同遭厄㑹忠貫日月精感神明實頼逺謀共濟禍福五日甲子張邦昌迎奉元祐皇后自私第入居延福宫張叔夜迎入瑶華仙師狀臣昨奉以瑶華宫仙師所居方今日夕畨人下城作過乞遷入城裏宫觀庶免不測之虞得令㫖差防䕶入延寧宫仙師即隆佑太后今月十八日瑶華宫仙師搬延寧宫臣尋差幹當官馮子耆楊大任使臣毛建管押人兵前去沿路防䕶兵甲入延寧宫訖謹具奏知别録云太后先居瑶華宫號華陽教主玉清妙靜仙師道名冲真城破迎入延寧宫二月二十八日保康門東瓦子沿燒街西延寧宫時太后急就天漢橋南遇仙店門埀簾幕以避移居觀音院西私第靖康後録曰元祐皇后居瑶華宫近二十餘年縁金人破城移入舊城延寧宫延寧宫火自東瓦子經五樓歸私第是時太后脱身都人亦不知其無恙故金人獨遺記聞曰初三日中㫖令開封府差察使人遍尋元祐皇后去處聞先在延寧宫因二月間遺火燒却本宫歸在觀音院前孟大夫家至是迎入江淮𤼵運司統制傅亮領兵到京城下傅亮率兵在陳蔡間聞金人去至京城北道總管宣撫使統制官王淵領兵至京城下先是王淵同劉韐出平定軍遼州路應援太原太原䧟淵軍趙州金人至闕淵隨北道總管趙野宣撫司范訥屯於南京金人圍京師也屢犯南京淵遣統制韓世忠及楊進戰敗之金人北歸訥及野遣淵先詣京師至是有榜云范宣撫趙資政領兵在南京先遣統制官王淵到闕議事仰城下不得驚擾既到屯於通津門外大元帥檄剳下諸處勤王人馬京城下㑹合聽候指揮不得先入甲子幕府羣僚侍王王曰邦昌廹僣位號已累日使邦昌今日不知遜避則國人皆得而誅之使邦昌知逆順第恐金人留兵取之則如之何又憂諸道兵至不知北征是圖止以討戰為名人人爭先入城屠戮吾民以邀功利為之惻怛乃命伯彦等草剳檄下副元帥宗澤宣撫使范訥趙野經制使翁彦國西道副總管孫昭逺東道副總管朱勝非南道副總管髙公純陕西制置使錢葢京兆府帥臣范致虚鄜延路帥臣張深副總管劉光世熈河路帥臣王似知淮寧府趙子崧發運判官方孟卿向子諲等仰各火急部領所統人馬前來京城下㑹合聽候大元帥王指揮進發奉迎二聖即不得擅發一人一騎先入京城以討戰為名夤緣刼掠殺戮無辜致誤國事并契勘張邦昌家屬見在淮東寄居仰向子諲行下所屬州縣嚴為防守應付所湏不得少致走透亦不得輙有虐害大元帥與諸副元帥總管宗澤趙子崧等書遺史曰書曰初夏漸熱伏惟總御師徒勤勞國事䑓候多福某去嵗使敵營中道輟行携不過千人閠月被命帥師始集東北兵民進未及畿已承再和之詔繼得樞府礬書又戒生亊且方忌器未敢輕舉但分兵近畿為逼逐之計閲日既乆刺知敵情不免督兵前進繼聞元帥領兵勘難感涕交頥即具公文當已至呈逹今聞大臣之在敵中者日乆分深承其付託而二聖二后東宫諸王北渡大河五内殞裂不如無生便欲身先士卒手刃金人身膏草野以救君父而僚屬不容謂祖宗德澤主上仁聖臣民歸戴天意未改故老近臣將帥軍民忠義有素當資衆力共成忠孝本意除已具公移外伏望鼓作士氣開曉士心奉迎君父永安社稷以成不世之勲某不任痛憤泣血懇切之情所有受敵付託之人義當征誅然聞方二聖之在郊已膺僣偽慮百官之謀或出權宜未嘗輕動徒使京城重擾生民被害故欲按甲近城容某移書問故得其情實即時闗報施行未晩今日之事非左右戮力造次在念恐不能濟伏幸孚察未瞻㑹間上兾厚為宗社所頼倍保䑓重不宣徽猷閣學士京西北路安撫使何志同等築壇同盟勤王中興記曰徽猷閣直學士知陳州趙子崧徽猷閣直學士發運使翁彦國各領兵勤王彦國駐壽春乆之聞敵騎退漸進與子崧相遇相與築壇殺牲挿血同盟彦國欲為盟主子崧以周之宗盟异姓為後二人爭長彦國曰我奉王命入衛公陳守耳推盟主未定㑹延康殿學士何志同以頴昌府將統兵至曰大元帥康王總兵濟州盍領兵趨麾下聽制何至主盟之爭乎於是志同彦國子崧共行登壇㰱血之禮趙子崧家傳曰勤王盟文徽猷閣學士通議大夫京西北路安撫使何志同徽猷閣直學士朝請知淮寧軍府事趙子崧徽猷閣直學士朝奉大夫充江淮荆淛等路置發運充經制使翁彦國奉議郎都水使者榮薿等敢告衆士金兵再至京闕侵擾暴虐人神共憤聖天子屈已議和猶未退師曠日持乆包藏禍心宗社危辱王命隔絶天下臣子感奮忠勇誓不與敵俱生今諸道之師大集於近輔凡我同盟毋狥私毋懐异毋觀釁勠力合謀共安王室以效臣莭三軍之師視死如歸千萬人惟一心進則厚賞榮於家邦退則重刑殺及妻子有渝此盟神明殛之皇天后土太祖太宗實鍳斯言趙子崧戒諭前軍榜文趙氏德澤浹於人心主上仁聖民所欣戴逆臣張邦昌比因奉使鄉導金兵再至京國屈辱君父傾危宗社皆其隂謀佯為遜言實盗神器方自以能全京師生齒為功所下偽令皆鼓惑士庶之言悖逆滔天四海所不敢赦當所義兼臣子職在總兵尤切痛憤除已遣官詣大元帥康王府告難仍節制諸道之師一意討逆有死無二應在京士庶軍民僧道等世受國恩必知逆順困於廹脇諒非本心如能捕獲逆賊張邦昌自節鉞以上至於封王皆以充賞大元帥康王布宣國威務從寛恕罪止渠魁其餘黨與必議全貸如堅於從逆敢抗王師必殺無赦戮其家族仰前軍統制分明告諭大元帥命趙子崧加寳文閣學士充兵馬大元帥府參議官東南道總管大元帥聞子崧等同盟勤王故有是命吕好問張所馳蠟書至大元帥府邦昌僣位以吕好問權門下侍郎金人既退好問及監察御史張所各遣人馳蠟書至帥府又太學生楊愿等十數軰繼踵而至上疏言圍城中士大夫趨向王悉焚而勿問命愿軰以官馬某在河北山寨與金人戰被執去嵗十一月馬奔走至西山和尚洞山寨時兩河義兵各據寨栅屯聚自保衆請推馬為首馬諭衆曰爾山寨鄉兵皆忠義豪傑今欲見推非先正上下之分則不可上下之分既正然後可以施號令嚴法律不然淆亂無序安能成事衆曰惟公所命馬即前立率衆具香案南嚮拜曰此遥望闕庭禀君父而立事且假國之威靈以圖克復拜畢馬南面衆皆拜之曰此以往一號一令有敢違者正軍法與金人相拒或一日十數戰然新集之衆兵器甲胄非良一日别寨來云今日與金人大戰願亷訪往視之馬往觀其陣隊且衆寡不敵知其必敗而其人乘鋭直前果為金人所却馬私自為計曰此曹出戰則必敗無所歸咎萬一以我自敵來為疑我何以自明莫若親與金人戰兵刃既接可以釋其疑矣一日與金人戰馬單騎横槊馳入敵陣手殺數人潰圍而還有一金帥馳馬追馬二騎戰於野敵騎重甲馬騎無甲馬被傷膓悉曵地遂仆焉馬被執送碩格副統者碩格副統復送於真定守韓太師舊識馬遂設席與馬共坐初馬在山寨唱義也河北金人即報斡里雅布就京城根刷馬家屬發至軍前斡里雅布以馬第三子亨祖及文榜送真定府使招馬至是韓太師出亨及文榜示馬且曰公母妻家屬盡在二太子軍前昨晚到來可往迎之又數日幹里雅布自京師囬軍至真定馬見斡里雅布謂之曰爾非南朝宰相又非大將何自苦如此我乆知爾忠義我國家内除兩府未可做外爾自擇好官職為之馬曰某世受國家爵禄今國家患難某寧死不願好官經數日復來説馬必不得已願求田數百𤱔耕而食之以終老母之壽斡里雅布許之於是馬遂得與家屬團聚三朝北盟㑹編卷九十
