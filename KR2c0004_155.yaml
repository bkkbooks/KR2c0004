body:
  text: 三朝北盟會編卷一百五十五宋徐夢莘撰炎興下帙起紹興三年正月盡十二月紹興三年正月范温自登州率衆歸行在先是建炎間山東兵火有滄州人李齊聚衆據沙門島宻州板橋人徐文據靈山寺范温萊州農家人聚衆據徐福島温無他長惟待人以至誠故能得其衆心呂頤浩為宰相也知海島中有李齊乃奏上取㫖遣其姪某及樞宻院凖備使換呂某董某等二人乗海船賫詔招齊使歸朝廷其勅書曰勅李齊并一行軍兵等朕惟海岱之區久被外邦之毒生靈靡極敵人無厭爾等合閭里之諸豪冐干戈而力戰其行莫遏所向有功遂摧席捲之凶頗𫉬提封之舊爰加勇爵用表軍鋒俟登井賦之輿圖其上師徒之閥閲緬聞忠烈良用歎嘉除李齊先次給告授武翼郎閤門宣賛舍人外一行軍兵俟收復到日即具功績申尚書省褒擢故兹奨諭想宜知悉春暄汝等各比好否遣書指不多及船乗風誤至徐島為温之黨所獲送于温所温以禮待呂某董某且詢問朝廷消息稍知其詳遂具陳情状差人隨船囘行在且告以李齊已順偽齊矣時紹興元年也朝廷旣得状即遣人以武翼郎閤門宣賛舍人招温温遂率其衆以二年八月到海州東海縣九月離東海縣十月到青龍鎮剳寨至是赴行在授武功大夫康州刺史依前閤門宣賛舍人忠鋭第四将改神武中軍左軍統領官其餘将佐以次授官賜范温等撫諭招收勅書勅范温等省所奏今来京東路登萊等州似此等諸頭項忠義之人不少縁未知車駕駐蹕息耗未肯前来㐲望給降海行撫諭付温等招收併力勦金人事具悉朕昨遭强敵之侵頗失中原之馭凡承平之故俗皆隔絶于殊邦按圖以思當饋而歎兹暫留于越嶠悵尤濶于齊封乃聞英豪多率徒旅堅塢壁以自守胃干戈而直前懐祖宗涵養之休恥仇敵服從之醜嘉汝能爾為之慨然爰頒惻隐之書用示綏懐之意其紏合併之力以圖興復之期趣掃强隣永固文軌故兹示諭想宜知悉秋凉汝等各比好否遣書指示不多及賜范温等奨勅書勅范温等省所奏契勘金人初渡黄河温等便道居牢山繼聞本路投順遂集忠義乗船入海據守福島山東既下北軍于登山黄縣萊州小髙濰川昌邑宻州鑒山及沿膠河兩岸深溝髙壘分屯人馬督貴州縣括刷錢糧討冦鄉村拘牧牛馬老稚離散田野荒蕪民不聊生無以赴愬温等雖尋常止岸或稍綽遊騎或攻劫營寨勦殺敵人誓竭忠節本軍凡遇金人接戰内有得功之人别有犒賞遂量功績逐意借補加轉官資伏望将已借補之人給降告剳補正官資事具悉朕惟勁敵長驅全濟不守凡妖氛之所被如滄海之横流汝志存誠耻附于逆乃前期而避鋭徑率衆以乗危隔絶朝廷薦更嵗籥偶使旜之及境附奏牘以披誠志節如斯古今誰及爰峻加于爾秩仍偏録于有功其共復于予封以卒成于汝志故兹奨諭想宜知悉秋凉汝等各比好否遣書指不多及牛臯李横董先及金人戰于朱仙鎮劉豫請援于金人烏珠以兵援豫與王師相遇于諸仙鎮王師敗績董先初從翟興擢知商州紹興二年先以豫勢盛乃附于豫屢與金州王彦戰後復歸于李横戰金人于朱仙鎮也金人陷順昌府金人攻商州知軍州事邵隆棄城走先是王彦在金州屢破大冦威聲益著于是宣撫司又以彦節制商虢陜華彦曰上雖南巡不忘西顧今商虢陜華沒于偽齊而陜郡尤宻邇河東異日恢復故疆必自此始乃遣僚屬髙士瑰部分兵将圖商虢直抵盧氏與大兵三遇皆破走之遂定商州宣撫司以邵隆為知州至是金人偽皇弟都統薩里罕大舉圖蜀自商州以入金人攻商州隆自料不可當即退軍上津金人陷金州先是宣撫使張浚召吳玠王彦及興元帥劉子羽㑹議于興元約金人若以大兵入蜀即三帥相為應援至是薩里罕盡發五路叛卒自商州侵入彦即駐軍漢隂以應梁洋金人併兵自上津疾馳不一日至洵陽境上彦飛檄召漢隂諸軍統制官郭進以兵三千先至乗流夜發逆戰于沙隈不勝明日金人以官軍寡少欲晡時步騎並進塵坌蔽天彦曰敵逺鬬飈鋭難與交鋒彼所疾馳者欲因吾糧食以入蜀耳盡焚儲積發居民趨險保聚盡督漢隂自石泉趨西鄉将與宣撫司兵馬㑹自此遂失金州㑹浚遣幹辦官甄援来督彦清野彦遂趨饒風闗㑹合二月金人陷饒風闗遂陷洋州興元府薩里罕以重兵薄饒風闗吳玠率諸軍倍道赴之使人以黄柑遺敵薩里罕曰吾公來何速耶玠率楊政田晟王俊諸軍及金戰于嶺下數戰皆勝王彦以八字軍至山下援玠玠諸軍見援兵稍弛備玠怒欲斬小校而小校走投金人告以虚實故金人知郭仲地分雖險而兵寡弱易攻乃繞出饒風闗背夜以輕兵襲取之仲果退金人以精兵夾攻王師之背王師皆退玠斬之不能止遂焚興洋儲積走興州金人遂陷洋州興元帥劉子羽焚儲積遁走軍大敗金人又陷興元四川震恐馬擴除都督府參議官牛臯奔于西京二十四日庚戌池州左軍反初葉煥代王進知池州也請不用進兵用招敢戰三千人朝廷從之故進以其兵屯饒州煥到池州招敢戰三千人分作五軍是日左軍反欲與中軍合中軍已擐甲兵馬都監華旺聞之持雙刀入中軍問何故擐甲曰欲為備耳旺曰反者左軍也你中軍不宜動乃大呼曰可皆釋甲不者斬衆皆釋甲旺存撫而去至右軍右軍亦擐甲矣旺又使釋甲右軍以諸軍不相應遂焚天王樓攻郭西門走出柯村煥移文王進使攻之進使兵至追趕過江星散不知所之王庶為川陜宣撫司參議金人陷興洋四川震恐先是宣撫使張浚以興元帥議論不合移知成都庶己行浚即至興元閲視庶平日之所營為毛舉而髮數之簿書之間得不謹奉行宣司指揮計若干件遂改庶知嘉州庶請祠浚以庶不遵奉行府命令盡奪職名而奏劾之未報至是復念非庶不可以撫緝興元乃復起庶為參謀委之巴南招撫散亡俾馳詣巴州措置梁洋一帶庶至巴急散榜梁洋境上招其軍民不數日逺近㑹巴之北境米倉山下視興元出兵之孔道于是金人不敢深入薩里罕由褒斜路退兵薩里罕既陷興洋到金牛鎮覺不安自以深入恐無歸路而王庶己在巴州散榜于興元洋州間金人死傷已過半無所掠大失所望又吳玠使舖兵傳文字皆言㑹兵馬守諸路隘口不放金人囘歸厚犒舖兵令行金人邏得之果疑遂囘取褒斜路拽軍馬而去褒斜路狹隘唯可單行故凡所擄𫉬悉棄之于路玠加檢校少保充利州階成鳳州制置使趙鼎知洪州兼江西南路安撫大使趙鼎進用呂頤浩薦之也鼎為御史中丞則彈奏頤浩之罪李迨知筠州乃頤浩之客也鼎為江西安撫迨申朝廷乞囘避朝廷以迨易知信州鼎赴洪州也取路由信州汪洋裁書謁鼎鼎大喜問秀才能與鼎同行過江西否洋曰諾鼎遂與洋同行居鼎門下有俊名後為第一人及第賜名應辰者是也劉光世韓世忠来朝張浚遣統制王浚收復興元府洋州王彦克金州金州失利也劉豫遣周貴偽為京西安撫使盗據金州至是王彦發鎮兵復自饒風闗以出漢隂貴領兵拒戰統制官許青横擊大敗之貴僅以身免是時金州新罹兵革軍食艱難宣撫張浚乃以彦兼本司參議駐兵閬中以備川蜀而留格禧以兵三千控禦金房權邦彦卒先是正月間邦彦卒邦彦為簽書樞宻亊兼權參知政事幾一年碌碌無所建明而卒野記曰邦彦字朝美崇寕四年釋褐登第靖康初宗澤知開封屯兵開德府金人来侵澤将孔彦周敗之邦彦隨澤乗勝追擊欲徑至京城解圍行及衛南戰敗走而免建炎二年代盧益知東平府遷寶文閣直學士孔彦周為鈐轄不相叶彦周叛去及金人来侵邦彦棄城遁降朝散大夫三年知江州四年為江淮制置發運使愚暗違傲人皆惡之紹興初以宰相吕頤浩薦為兵部尚書二年同知樞宻院給事中程瑀言其謬不聽時孔彦周為舒蘄鎮撫使聞邦彦得用遂叛降劉豫邦彦在位亦無所建明卒年五十四李横加右武大夫忠州觀察使神武左軍副統制三月二十七日壬午韓世忠加開府儀同三司淮南宣撫使泗州置司韓世忠為太尉武成憲德軍節度使神武左軍都統制充江南東路宣撫使加開府儀同三司制曰朕負黼扆而據域中之尊孰與慰普天之望披輿圖而懐閫外之慮其唯先推轂之求乃眷虎臣久從戎事髙勲當報兹隆開府之儀大任薦更式倚干城之畧誕揚渙號敷告治廷具官云云頃宣威令徃殄敵兵樓船南下而甌粤為清雖嘗舉褒崇之典鉄騎西馳而荆湘底定顧未酬俊偉之功屬已盛秋方當嚴戍亷頗居國詎容鄰壤之加兵李勣守邊將見敵人之逺塞少稽信賞及此移屯遂除淮南宣撫使泗州置司于是世忠軍于鎮江府四月朱勝非丁母憂朱勝非母雍國夫人楊氏感疾不安上遣國醫診視存問絡繹累月未安勝非數上章乞罷宰相不許至是楊氏薨于相府勝非解官丁憂勝非為宰相八月時方經畫淮北上倚勝非以辦勝非即上陳五説謂敵當擊一者國内外軍屯無慮二十萬衆月費二十萬緡倘無變通理必坐困逆豫力行什一法聚歛以資敵若王師不出則豫計得行今當遣兵渡淮取彼蓄積輦以實邊圉淮南既實民力自寛則江上之兵可以進屯而敵計沮矣二者逆豫招誘山寨及知名賊二十頭項彼雖得之矣必不為用我若失之則人心必去且謂官軍不敢出北兵能驟来以江南為危地淮南却為樂土今我年榖大稔兵力可用若乗此時擣其巢穴自河以南必大振擾則淮北反危江南自安且金人留鋭師與豫者不多我若一軍聲言取徐鄆實取淮揚一帶一軍聲言趨京師實取光蔡一帶海道舟師聲言入濱滄而實取青宻一帶逆豫聞之必分兵拒守然後大軍出廬壽直擣亳宋所至州縣稽首迎降彼若固守京城容有内變如曰出奔亦必成擒矣三者敵人使命旣来而我繼以出兵恐我失信或致怒敵然我師不出敵終不来茍安一隅已大失䇿况彼奸詐但計强弱敵如尚强和必不集與其使敵併力南下曷若先破豫兵去其一助兵法曰上兵伐謀其次伐交此乃交謀俱伐之也前日使行未有要約逆豫過惡足可藉口夫師討有罪進不渡河使之遄歸以待和約則我不為無辭也四者淮北之民皆吾赤子如大兵一出當明諭將帥凡州縣官金帛財物均以賞軍若不可運則稱詔以給貧民人必大喜昔藝祖伐蜀詔王全斌等府庫俱賞将士國家惟取疆土盖此意也五者王師渡淮所下州縣只以助順土豪有功者領之才出衆者擢為守将俾之隨宜措置控扼險要自為守備又况有此事力移之淮南資糧豐饒軍勢益張兵書所為以攻為守變弱為强之術也如此不過三二年中原可定書奏上皆施行之除劉光世加檢校太傅充江南東路宣撫使劉光世特授檢校太傅胡世將繳詞頭上不允光世為宣撫使置司建康府尋移池州兼淮西路宣撫使翟興贈保信軍節度使以其子琮為利州觀察使劉豫猖獗道路阻絶河南消息不通者一年餘翟興之死猶未知端的至是邊報興自去年三月為偽齊劉豫所劫力戰墜馬死矣上聞之深加嘆悼乃下制曰固藩維而外禦權莫大于敵愾之臣擐甲胄以先登義孰踰于死難之士有能兼是二者獨取名于一時宜舉䘏章以招大節翟興雅好将帥之畧亟勵忠勤之規糾合師徒鎮臨方面肅中權之威令禦外侮于封圻駭兹强敵之慿陵誓與孤軍而鏖擊竒禍既作奮勢莫囘狼曋馳師身𫉬死而無恨張巡遇害氣呑賊而有餘念爾仗節之忠興予當宁之嘆可特贈保信軍節度使仍賜三資恩澤以恤其後又有㫖授其子琮利州觀察使劉忠在偽地為部下所殺劉忠歸于劉豫也以忠為登萊沂宻都巡檢使至海州懐仁縣為其部下所殺忠昔年殺張仙于此識者以為隂報其部下藏其首来獻于行在孟庾軍鎮江府劉光世軍建康府巨師古軍揚州五月神武後軍都統制巨師古罷巨師古為神武後軍都統制軍于揚州韓世忠為淮南宣撫使令師古聽節制師古不從世忠劾奏其罪師古遂罷以郭仲荀權神武後軍都統制徐文叛附于劉豫徐文軍于明州也謀欲作亂朝廷命朱師閔徃襲之文覺而走泛海舟以附于劉豫潘致堯使金國還潘致堯使于金國歸道金人之意云金人要大臣来議和書十三日丁卯韓肖胄同簽書樞宻院事胡松年為工部尚書撫諭四川官吏軍民勅成都府潼川府利州䕫州等路官吏軍民等朕慨覽輿圖計安邦域眷于梁蜀自我祖宗寛彼政刑革異時之苛急順其風俗俾終嵗以嬉恬甲子再周干戈不試怨咨之氣弗起安樂之音相聞繄國家施德澤之深故民物極繁庶之盛豈虞他盗輒犯巖疆流毒闗中遂肆侵凌之計垂涎劍外未忘呑噬之心幸背城伸一戰之威𫉬守險為四川之障然而師徒久役備禦尚嚴轉粟兵間固多勞苦取民賦外諒數征求所期暫費而永寕夫豈好勤而惡逸夙宵在念焚灼于中惟强暴弗戢則敵當自摧惟禍亂已窮則時當自定皇天是輔佇成綏乂之圖王化復行終底和平之舊徃體至意尚堅一心六月韓肖胄為大金通問使胡松年副之使于金國韓肖胄自吏部侍郎除簽書樞宻院亊為大金國前通問使上命朱勝非擇副勝非言故事副使用武臣時方艱危不當專拘舊制遂薦胡松年為副從之肖胄松年至京師劉豫欲見之松年曰見之無礙豫之偽臣欲肖胄等以臣禮見肖胄無一語松年曰皆大宋之臣當用平交禮堅執其説偽臣不能奪既見豫松年遂與肖胄長揖叙寒温如平時豫欲以君臣之禮傲之松年曰松年與殿院比肩事主不宜如是豫問主上如何松年曰聖躬萬壽豫曰其志何在松年對曰主上之志必欲復故疆而後已豫有赧色七月朱勝非起復尚書右僕射同中書門下平章事朱勝非丁母憂執喪居廬上遣使奪哀强起之三辭不𫉬王人踵至賜詔曰念同心相與而共吾事惟二三臣其一日不可以逺朕躬如左右手又曰朕方興復是圖盖一切當用權以有濟卿安危所繫何三年不從政之可言勝非辭愈切及叙本朝典故屬同列開陳上謂匪卿疇克任者虚府以待又賜親筆詔曰卿罹私艱已踰卒哭之制朕待卿為政奚啻三秋邪盖恩以義斷情以禮奪况成命已頒輿情胥悦卿無濡滯以咈朕心勝非得詔皇恐不敢辭上命督促甚至不得已而造朝復面陳皆不許即乞歸第見賓客衣黧黒紫袍皂靴帶從之雖居外治事而還家哀瘠盡執喪之禮劉光世韓世忠交訴于朝韓世忠與光世更戍世忠至鎮江府城下遣人入城潛燒倉庫為光世所擒訴諸朝王德請于光世曰韓公之来獨與王德有隙耳當身徃迎見之其下皆不可曰身歸韓公公必有不測請勿行如不止當以騎從不聽德獨馳徃或報世忠曰王德来矣世忠不信俄頃德入謁世忠驚曰公誠烈丈夫曩者小嫌各勿介意因置酒結懽而别光世移軍建康府世忠猶以兵襲其後二将交訴于朝上遣使和解之仍書冦恂賈復事戒之宰相呂頤浩罷為鎮南軍節度使開府儀同三司提舉臨安府洞霄宮御史中丞辛炳言頤浩不恭不忠之罪頤浩遂罷宰相以使相宫祠九月吕頤浩為觀文殿大學士宮祠如故辛炳再言伏覩大廷宣制置罷吕頤浩左僕射以使相領宫祠制辭優厚無一字貶出之意臣所未諭也謹按頤浩粗率乖謬素無人望狥私强狠但有人怨兩位宰相狼籍非一不特縉紳士大夫能言之雖三省六曹百司之人猶能言之不特武夫悍卒能言之雖市井閭巷之人亦能言之祖宗以来不聞有大臣如此者頤浩安而行之欺忽陛下敗壊法度日甚一日旁若無人不知頤浩何所恃賴邪臣嘗疏頤浩不恭不忠之罪欲望悉付外庭以明是非鐫去将相崇資以正賞罰于是改觀文殿大學士宮祠如故岳飛来朝加鎮南軍承宣使江西制置使神武後軍統制先是飛駐軍于洪州也趙秉淵為江南西路兵馬鈐轄洪州駐剳飛因飲酒大醉毆擊秉淵幾死安撫使李囘奏劾之至是上戒飛飲酒飛自此不飲初有㫖任士安交軍馬與飛士安授江西總管洪州駐剳飛支犒設帶甲人五千輕騎三千不帶甲人二千士安有隱匿入已飛杖之一百士安以病瘡卒郝晸乃其統制也士安在湖南所部乃辛企宗之兵也交兵與飛而統制毛司禮反飛撫定之李囘帥江西也傅選駐剳于蘄州聽囘節制飛皆乞為統制亦乞秉淵為統制于是飛始能成軍趙鼎為沿江制置大使神武後軍及御前忠鋭十将軍馬皆撥付張俊撥軍馬付張俊乃朱勝非建議也後獨留忠鋭第五将在朝廷餘九將撥併故忠鋭第五将至今猶屬朝廷也朱勝非解官持餘服制曰人主之論一相貴德則朝廷尊大臣之表萬民制行為天下法睠予宰弼起自艱難既殫狥國之勞蘄盡慕親之志參稽古誼與解煩機亶告治朝用孚羣聽起復左宣奉大夫守尚書右僕射同中書門下平章事兼知樞宻院亊監修國史義陽郡開國公食邑三千五百户食實封一千一百户朱勝非髙明而肅乂荘重而裕和學足以貫天人之本原量足以任國家之大計蚤疇雋望首被詳延一登綱轄之嚴再秉鈞衡之重德業寖觀于久大謀謨備罄于忠嘉自陟屺以纒哀方倚廬而銜恤屬時多故圖厥老成式從變禮之權亟復經邦之任尚資逺畧共濟康功奪人子之至情顧非得已舉三年之通誼兹屢有陳朕惟篤君親之愛者所以厚人倫存進退之正者所以屬臣節重違爾請庸慰母思勉循去位之私俾遂執喪之懇於戯安危普注雖倚重于壮猷忠孝兩全庶克終于令聞益懋顯揚之美助成廣愛之風可從其請解左宣奉大夫尚書右僕射同中書門下平章事兼知樞宻院事監修國史義陽縣開國公食邑三千五百户食實封一千一百户持餘服主者施行詔移劉光世軍池州韓世忠軍建康府十月吳玠加檢校少保鎮西軍節度使陜西經畧使十八日己亥偽齊陷鄧州劉豫陷鄧州以齊安上偽知軍州事二十二日癸卯李横棄襄陽府偽齊陷襄陽府劉豫遣李成攻京西成既行至鄧州而豫之衆有来歸襄陽者鎮撫使李横以為冦至遂棄城出奔成遂入襄陽是時李道亦棄隨州豫以王嵩偽知隨州嵩本桑仲後軍統制背仲歸豫故豫用之横既棄襄陽未有所向州人趙去疾勸横以衆歸朝廷横然之横在襄陽也岳飛遣張憲招之不從至是横自黄州渡江徑徃洪州投安撫使趙鼎飛知之馳徃洪州後横一日至横已參鼎矣飛責横不相從之意横戰慄伏罪而已後鼎發遣横赴行在分其軍明年岳飛乞董先為統制官又有李進者小名號李僧兒軍中呼為入洞鬼初為桑仲統制官時俊乃李進下第三人也亦在軍中李簡棄郢州偽齊陷郢州劉豫既得襄陽進兵侵郢州知州李簡不能禦乃棄城而遁郢州遂陷豫令荆超偽知鄧州超班直也豫謂有才而用之十二月偽齊冦淮西王德靳賽以兵禦之劉相以李成知襄陽府韓肖胄胡松年奉使金國囘金人遣職方郎中王相李永壽来趙子晝館之命胡松年押宴三朝北盟會編卷一百五十五
