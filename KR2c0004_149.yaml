body:
  text: 三朝北盟㑹編卷一百四十九宋徐夢莘撰炎興下帙起紹興元年十月十三日丙寅盡十二月二十七日庚寅劉一止論時政一止字行簡湖州歸安人宣和三年第進士為越州州學教授知州翟汝文推重其為人建炎中避地姚江傅嵩卿來攝郡政一止勸嵩卿起義以赴國家之難至則稱劉琨祖逖同寢之事語甚激烈嵩卿感慨流涕會參政李丙得祠過郡留終日密薦一止人物議論宜在朝廷不使一止知也紹興元年召試館職因對䇿極言當世之故且曰天下事不克濟者患在不為不患其難聖人不畏多難昔吳王夫差既勝齊而子胥以為憂是吳命不長也未幾果滅於越吳人侵楚及郢楚人大懼而令尹子西獨喜曰乃今可為矣而楚以不亡是禍福相伏果不可不為也如其不為而以天命自回人事自正敵國自屈盜賊自平有此理哉上覽之稱善且諭近臣劉一止所對剴切知治道欲驟擢用而執政者不懌乃除祕書省校書郎至是除監察御史上疏論君子小人用否之辨以謂天下之治以君子成之不足以小人敗之有餘君子雖衆道則孤小人雖寡勢易蔓且引易五陽一隂其卦為夬而繫辭則曰小人道憂也夫以五君子臨一小人不曰道消而曰道憂蓋上下交而志同如泰之時然後小人之道不行若徒能使之憂則將為國之憂而無不至矣又朝廷行事無一定之議又上疏曰陛下憫宿蠧未除念頽綱不振政煩民困用廣財殫置司講究恩至渥也曽未聞有所施行恐以疑似之說欺陛下曰如此將失人心矣夫所謂失人心者刑政之虐賦役之多則失百姓之心好惡不公賞罰不明則失士君子之心若無則所失者小人之心耳失小人之心而得百姓士君子之心何病焉願審其利害當罷行者斷自聖衷勿二勿疑則事之委靡不振者舉矣上覽奏嘉納是時庶事草創百司法令不全類以人吏省記便為與奪見弊為甚一止上言臣愚不肖䝉誤恩擢置臺察之司伏見尚書六曹下逮百司凡所用法令無畫一之論類以人吏省記便為與奪夫法令具在奸吏猶得舞文今乃一切聽其省記故欺弊何所不有欲與則陳與例欲奪則陳奪例或與或奪在其牙頰其患可勝言哉陛下聖明灼見此弊嘗降處分令左右司郎官以其省記之文定刋頒行然左右司職事號為最煩竊恐於此不能專一無由速得成臣愚伏望聖慈時降睿㫖改送詳定一司依赦令所立限刋定鏤板頒降內吏部條法最為急務乞責近限先次施行庶幾杜絶奸吏弄法受贓之弊天下幸甚上納之李回為江西安撫大使兼知洪州李回為參知政事吕頤浩為宰相深不喜之遂出回知嚴州又知洪州為江西安撫大使辛道宗浙東路兵馬副總管計置台溫明州防遏事王世冲冦廬州鎮撫使王亨以計破之僞齊劉豫遣其黨王世冲以畨漢兵冦廬州鎮撫使王亨以計誘世冲至皆斬之大敗其衆賊兵丁順攻濠州丁順圍濠州攻擊兩月不退張德冦宏遣人間詣宣司告急宣撫司遣統制官酈瓊率本部兵攻橫澗山瓊遣人招王才才不從瓊進兵欲攻才才急乃遣人招順歸寨順將退去而謀曰城久受圍民困可知矣我一旦退去彼必欣然出城我設伏以待之乘其倉卒可奪門而入于是順使衆呼于城下曰不攻汝城矣來旦我歸矣城守者不信順夜以輕捷數百人伏于莽中未曉焚其寨煙火亘天輜重悉發喧呼而行城中皆以為順果退去少頃州人乃出城至其寨地滅煙火以拾遺良久順率而出州人亂相奔踐多為順所殺順乘勢叩城城中出徑弓以禦之相拒于釣橋未起城上囂亂不知所為宏先止其囂亂然後激使軍民盡力禦賊相持一餉間彼我皆疲賊乃稍退時出戰者無不被重傷而歸由是順以城不可拔而退去順在城下兩月城外墳墓盡遭發掘民望之皆慟哭城西八十里有宰相王冀公欽若之墓順遣人發之凡玉瓶玉杯之屬不可勝計悉取而去是時官軍與賊皆乏箭賊取城外墓中棺槨為箭簳棄露其尸骸而城中之殯有敢匿者斬凡入城與浮殯者盡移尸于牀笫間以棺木納官應沙木板及桶器之類取之悉盡由是存亡者皆遭其害矣馬友及曹成戰于潭州曹成兵敗退曹成李宏在劉陽有不相下之心遂至相併而宏往潭州歸馬友友合宏屯于湘隂縣成亦移軍攸縣故友與成用兵相攻成不勝而退去兩浙東陽縣兵馬副總管楊可輔上書盡言時政辭㫖切直罷之十九日壬午金人攻鳳翔府寶縣二十日癸未金人攻和尚原吳玠遣弟璘雷仲友及金人戰敗之追至玉女津擒英格貝勒等二十餘人丁順圍濠州兩月既退張德自以守城在冦宏下遂欲以州印與冦宏左右曰不可德曰我始告急于宏宏率衆來解遂能退賊使一城無虞在我之禮當以印與之彼感我之意必不留印且不損於實而有辭遜之名有何不可左右曰我為主彼為客客主之勢不可相敵今一旦以州卑之則彼之勢盛我之勢弱矣德不聽左右曰公其悔哉德遂牒州印與宏宏不辭而受之德怏怏不得意始自悔恨焉後朝廷授宏以修武郎知軍州事乃以真命知州初李玠權州也敵至城下玠出兵與戰用便宜借官以賞戰士凡借官文帖皆曰羣盜冦宏接戰有功至有纍借至正副使者且不下數百員至是人皆憂之宏微知其意悉以他功易之而借官仍舊於是人皆稍安二十二日乙亥王德賫黃榜招降邵青不從先是邵青攻泰州不克㑹鎮江府劉光世遣人招之青受其招安即以舟船盡行至鎮江不住而過遇海船即奪之徑入海中駐于崇門鎮朝廷遣王德討之德駐于青龍鎮親率兵往崇門鎮而隔泥港青先遣人鋪板布釘籖官軍不知爭途而過多死于泥中官軍遂回青語德曰太尉後隔潮水我若以數百人掉數舟扼于津要則太尉糧食不通而自斃矣然豈可扼人於險哉太尉可速歸也德曰邵統制你是好漢盍歸朝廷乎青曰諾然軍中不能不犯國之法太尉可乞降黃榜以安衆心應以前罪犯一切不問則與太尉同歸德許之拆箭為誓德具申朝廷乞降黃榜朝廷從之乙亥德遣使臣二人賫黃榜至崇門鎮榜文大槩言據王德申掩殺水賊邵青其勢困厄不忍廣殺乞降榜招降青見之大怒不納而單德忠之謀行矣邵青受招安初邵青以舟船入也其妻囑之曰你豈不記作賊事發禁在獄中我剪頭髮與你送飯時今既如此乃欲負朝廷耶青既不受黃榜之招其次單德忠知將士皆有歸朝廷意且謂不殺閻在必不肯受招安㑹諸將晨謁青方與閻在圍坐德忠起身缺伸即掣刀殺于坐衆皆驚德忠曰今邵統制欲歸朝廷唯閻在不從今殺在敢有不歸朝廷者依此衆默然或報邵青青使其妻出船見諸將曰統制偶然傷風不安不知何故如是德忠具言閻在凶狠失將士之心恐亂軍政請統制出相見議事青乃揮涕而不出曰單統制若害青當好好分付不須如此德忠涕泣自明然後開論道理具說不可負違朝廷宜納兵以贖罪纍數言青從之德忠即命倒旗槍通欵狀于官軍遂受招安二十四日丁丑張俊加太尉劉相置招受司于泗州吳敏為湖南二廣宣撫吳敏宣撫三路置司桂林時馬擴避地在融州野衣竹杖日吟釣于山溪之上敏即起馬宣撫司都統制兼參議官又以其故人范直方為參謀李允文伏誅神武中軍統制辛永宗罷郭偉為淮西巡使以翟興軍為忠護軍自京城失守中原散亂逆臣劉豫憑恃敵勢竊據東濟河南距僞境不數百里官軍無日不與之交鋒河南一境東連鄭圃西接關陜北臨大河皆已從僞唯翟興都守一方三面鄰敵孤軍無援糧餉不繼敵人窺伺日急興忠憤所激誓不與敵俱生每開諭將士以禍福監永一節與敵抗士卒莫不奮勵由是臣僚上言曰河南為國之西宅陵寢所在山川葱欎祖宗神靈之依兼形勢控扼河陽襟帶川陜西俯淮漢為王室夾輔天下之勢於此為重翟興于危迫僅存之地萬死一生招集散亡以忠義辛苦均有同無統率將士竭節用命保護陵寢捍禦邊陲迎敵獲捷摧破各師勸農耕桑粗立基本雖上至武功大夫下至義兵一例俱支糧二升至春時又或艱食多是無支寧忍死不敢逃亡臣欲望陛下少加恩恤特賜寵錫軍名以示乃心朝廷則河外之人亦必知國家眷顧不忘之意遂以忠護軍為名十一月四日丁酉辛永宗權馬軍副指揮使權主管馬軍司公事侍御史沈與求再言辛永宗之罪其章不行而有是除巨師古為神武後軍統制兼權神武中軍統制十五日戊申孟庾為江西荆湖福建路宣撫使韓世忠為江西荆湖福建路宣撫副使曹成馬友劉忠亂河南范汝為亂建州福建路制置使辛企宗不能討乃除孟庾宣撫使韓世忠副使命世忠提兵討之十六日己酉辛永宗權江西兵馬副統制王彥斬提舉一行事務趙橫及中軍統領門璋王彥既敗李忠也凱歌回金州大賞戰士待趙橫如初終不言豐里之敗時與兵將㑹飯語話如平常橫亦不疑至是忽往教場㸃兵官具酒飲至四行叱橫起使數其豐里不援之罪命杖之百而勇士已捽捉執縛矣橫曰受杖何至縛耶彥曰爾之罪應死顧將曰敢有起身告趙橫者與趙橫皆死諸將皆不敢動彥數之曰豐里之戰吾屢麾使汝援之汝不援何也橫曰與賈寧爭氣耳彥問其故橫曰鎮推唯用提轄官賈寧及戰乃用趙橫乎彥以其罪遂斬之又叱門璋下階數之如前璋曰璋為偏將有統制趙橫在不得自由彥曰見危不救安用將為何有統制之命并斬之再飲數杯而歸張琪伏誅張琪為靳賽所擒檻送行在伏誅權邦彥兵部尚書十七日庚戌同知樞密院富直柔罷上初欲相吕頤浩也富直柔與右司諌韓璜樞密院副都承㫖辛道宗神武中軍統制辛永宗尚書省提㸃李爰等每見上多譖短頤浩拜相侍御史沈與求言其結為朋黨沮害頤浩入朝事直柔罷永宗已授江西路統管爰除名勒停璜逺小監當二十九日壬戌曹成陷安仁縣執河南安撫使向子諲曹成侵安仁縣入其郛大肆殺掠是時河南安撫使向子諲退在安仁為成所執拘于軍中遂入道州十二月詔百辟卿士各舉所知詔曰朕之不德宗社播遷方仰贍才思雪神人之大恥不有濟濟多士置我周行則不能也且己雖賢不若薦賢之為愈故孟軻曰一薛居州獨如宋王何近得陳襄薦章起司馬光而下三十三人德行言語政事文學皆所具備審如所薦斯為甚矣後世瞻之以襄為何如人耶今宣示百辟卿士可各舉爾所知應內外侍從須得舉三人以上在外令三省鏤板行下諸監司郡國備録申牒諸寄居到限五日具名同罪保舉繳連以聞舉得其人當受上賞其或不當宜坐謬舉之罪無以先得罪于朝廷及蔡京王黼門人為嫌惟善所在而公舉之朕將親選焉八日辛未吕頤浩奏乞通京東河北商賈先是劉豫置𣙜場通南北之貨吕頤浩亦以為便乃奏通商賈方商賈未通也甘草一兩為錢一貫二百而市亦無賣如生薑陳皮之類在北方亦皆闕乏邵青受招安為樞密院水軍總制先是杜充守建康時有秉義郎趙祥者監水門金人渡江邵青聚衆而祥為青所得青受招安祥始得脫身歸乃依于內侍捆捆善小說上喜聽之捆思得新事編小說乃令祥具說青自聚衆已後蹤跡并其徒黨忠詐及强弱之本末其祥綴次序侍上則說之故上知青可用而喜單德忠之忠義十四日丁丑以彗星見及㑹稽火詔求臣庶言闕詔能還兩宫者封王詔存恤宇文虛中子孫宇文虛中建炎二年為祈請使使于金國不得如所請遂不肯還朝獨令其副楊可輔歸上思虛中忠節乃詔存恤其子孫虛中在沙漠聞劉豫任用張孝純嘗寄詩與孝純其斷句曰有人若問南冠客為道西山賦蕨薇辛企宗追三官降宣撫司統制傅嵩卿為淮南東路宣撫使傅嵩卿以宣撫使到淮南得户部尚書邙于權知泗州徐宗成獻于朝廷先是宿遷縣趙瓊寨劫金人舟船于清河口得于李棁妾之手也吳敏降授資政殿學士提舉臨安府洞霄宮路允迪致仕嶽飛為神武副軍都統制金人知海州薛安靖通判李翬巡檢使王企中領簽軍殺金人以其州來降二十二日丁亥臣僚言王師所過州縣虜掠之害二十七日庚寅吳玠除鎮西節度使吳玠除節鉞賞和尚原之功也王彥敗桑仲于馬郎嶺克均州桑仲為襄陽鎮使也反藉專政之權以資跋扈之勢南攻德安西據均州至是各以其衆分三道一攻住口關一出馬郎嶺以搗洵陽縣使李擴主之軍去金州不三十里王彥曰賊兵以我兵為寡故冦三道以離吾之勢今吾破其堅則脆者自走矣時賊之大軍在馬郎嶺北彥遣統制焦文通禦住口而彥自以親兵營馬郎嶺與之對壘者幾月矣大戰者凡六日賊大敗奔潰彥縱兵追擊擒統領將官二十七人俘獲千衆克均州三朝北盟會編卷一百四十九
