body:
  text: 三朝北盟㑹編卷六十三宋徐夢莘撰靖康中帙起靖康元年十一月九日庚午盡十八日己卯九日庚午兵部尚書吕好問奏集諸路兵劄連珠寨以衛京城防河須用宿將好問奏乞集諸路兵就糧于尉氏咸平陳留東明若敵越河以四邑之兵列寨如連珠或五十里或三十里則置一寨以護都城使敵有衆不能遽往又言防河須用宿將若外戚宰執親舊省院吏族之屬皆不用又言防河之兵暴露日久慮其困乏不能對敵令沿河設堡障宰執堅不從梅執禮建議清野從之于是下詔河北河東清野詔曰朕嗣有大統屬時艱難外侮慿陵元元被害于是捐棄金帛寶玉不可數計以救百姓于塗炭之中敵才退師痛自抑損斥去華靡日惟蔬食卑詞厚幣繼修和好賂遺之使項背相望凡有所欲悉從其請衮冕車輅稱號之美一無所愛凡以保守土地全活生靈而敵勢未已動起兵端必欲割我土地殘我人民覆我宗社使吾百姓父母妻子悉被驅虜財物積聚皆遭劫奪忠臣孝子自當體國念家人自為戰令下之日應河北河東京畿便行清野保守城邑其有聚徒結衆捍禦立功自節鉞以下皆以充賞仍仰州縣預以名聞若自能斬獲首鹵者皆倍軍功凡我赤子與其殘于敵人之手流于異域之人孰若徙危即安轉禍為福興言及此流涕無從其餘諸路有忠義之人能率衆勤王或立功河北河東者並依此推恩咨爾衆庶咸體朕意十日辛未新知鼎州邢倞除名勒停先是邢倞管伴金使信趙輪之言奏聞朝廷通書耶律金吾後為尼堪遣王芮來齎問進兵以倞始禍故黜之十二日癸酉尼堪至河陽折彥質軍潰李回奔京師尼堪陷河陽先是朝廷遣同知樞密院事李回又以宣撫使折彥質領兵十二萬共守大河尼堪自澤潞進兵由懷州至河陽與折彥質李回夾河而尼堪恐其不可渡發千餘騎來探回報曰南兵甚盛未可輕渡或欲整兵候戰有羅索大王者曰來兵雖多不足畏也與之戰則勝未可知不若加以虛聲盡取軍中戰鼓擊之達旦以觀其變衆以為然黎明不見王師乃立遣尼楚赫貝勒部三千與知威勝軍張堯佐由清河界以伺河路時河水平淺可渡而過尼楚赫貝勒乃涉水過河於彥質之兵後下寨彥質以為尼堪兵皆渡矣莫不驚潰提中軍先走三軍皆潰李回亦奔還京師于是尼堪得以治筏尋舟盡渡其衆十三日甲戌知樞密院馮澥徽猷閣學士李若水充告和使副及同王雲馬識逺詣尼堪軍前割三鎮地界書曰事馳介使遠布悃誠今春大軍俯臨郊畿尋以上皇傳位之意引過請和承皇子郎君元帥奉伯大金皇帝酌中之命特許修和尋報之國相並各班師信義之重比堅金石于是宗廟再安王靈賴慶乃割三鎮以謝恩惠既而諸州民情過執羣臣議論二三往復告求致淹嵗月蓋緣寡昧失不詳思誓約之明豈應輒易果煩大兵來結兹事中外震動不遑寧居禮義有虧追悔何及過而能改請踐斯言其三鎮之地今並依正月所立誓書交割施行惟冀兩路大軍早回使趙氏二百年社稷永寧億萬生靈全其性命仁恩之大山海難喻自此傾誠萬世不易上天實臨百神在列何敢背違自取禍殃緬惟英哲必為矜從馮澥先狀云祗承朝命恭造行臺輒犯威顔兾尋信誓赦既往之不咎許惟新之是圖二境兵戈庶有息肩之漸兩朝歡好寧無握手之期冒昧而來匍匐以請某年當逺邁位忝樞機得罪前朝幾死凶邪之手當知今聖誤叨將相之權常懷欲報之心遂備告求之役趍瞻在邇喜懼交深馮澥使尼堪是夜到中牟河潰兵作過或云已有敵騎渡河左右甚駭謀取㫖改路澥問當如何副使曰守邊防河諸隘將士聞風避遁奉使者又如此朝廷將何所賴以某處之唯有死而已今日敢有回者行軍法衆遂定自此路中日發一奏乞京城設備河東記曰余自河陽歸道逢告和使馮樞密李徽猷副使武侯不暇問姓名問余敵勢如何對云觀其事勢所舉不少又云今在甚處應曰已渡河矣若欲過河有船筏否對曰已燒盡橋可拆屋渡木筏過又問尼堪來否對曰不知又云今朝廷一一如所請能塞其求回兵否問所從何事云割三鎮對云但恐不能塞其求馮樞密問殺使人否對曰自古敵國交兵何嘗殺使人李徽猷云某所拚一死無足計較者日晚可行今與副使先上馮樞密可後來少頃乘轎趍鄭李尚書山西軍前奉使録曰十一月十三日若水等被㫖同王雲馬識逺並依舊軍前奉限十四日起發出門行次懷州遇金人大軍又見館伴使蕭慶劉思前來相見曰副使問此者緣何事來若水曰某等此者亦為和議來慶曰既是貴朝皇帝不肯交割三鎮土地人民尚何事之可和若水曰某等靣奉本朝皇帝聖㫖已差工部侍郎王雲武功大夫馬識逺前來交割三鎮地界還貴朝矣慶曰王侍郎等幾時到來若水曰某與王侍郎等同日出國門某等兼程先來計王侍郎等今方到磁相間更數日可以到此慶曰有國書無若水曰有國書慶曰副使且歇宿容慶等先為禀知國相若水等稱諾乃歸幕次少頃伴使令人傳語奉使請排辦禮物土物只就晚行國相是日申時後見談吾二官人前來云國相請使副若水等入軍門見列甲兵兩行甚嚴既國相問勞之禮亦簡若水曰某等來時面奉本朝皇帝聖㫖令某等再三伸問國相元帥各寨台候萬福國相惟恭受禮復曰副使們來時貴朝皇帝聖躬萬福若水曰某等來時本朝皇帝聖躬萬福若水曰某等來時面奉本朝皇帝聖㫖令若水再三啓白國相元帥前次若水等歸承示書翰不勝感荷所需三鎮已差工部侍郎王雲武功大夫馬識逺前來交割地界今有國書上呈若水遂搢笏出國書與國相國相曰恭領之約若水等坐開國書看曰何似早如是免令提兵到此若水曰大事已定望國相元帥早為回兵講和國相曰不知王侍郎等幾時可以到此若水曰某等與王侍郎等同日出國門某等兼程先來計王侍郎等方到磁相間更數日可以至此國相曰候割地使到來看得次第即便回軍不難公等且熟歇若水等稱諾退是晚國相令人送羊酒等數如前次日若水等再見國相叙謝訖國相曰昨已差使往汴京㑹以黃河為界三鎮事更不須議兼未知果有王侍郎等果交割地界否若水曰某等雖不才然被君命逺來議和若非誠信豈能定事又奚敢罔國相也願國相少待國相曰大軍安能久留于此方在議間㑹有人報南朝遣王侍郎一行奉使來到磁州被百姓喚作賊臣已折劈了也國相怒曰盡梢空相繼若水等又收河北李宣撫綱牒追回若水等其牒略曰河北河東路宣撫司牒大金軍前和議所契勘職近奉聖㫖前來河北河東等路㑹各諸路軍馬前去掩殺敵人所有先差兩番奉使不謂已過河界了並仰追及約回其前降和議指揮已奉聖㫖更不施行國相知有此牒益怒曰且待提兵去與李宣撫决勝負則箇遂便不與若水等相見乃以甲兵包擁若水等隨大軍南來都水監决水浸牟馳岡王機和詵等追官編管臣寮上言王機守鴈門和詵守瓦橋薛嗣昌帥太原詹度帥河間濫受賞功助成今日之患已降指揮和詵追削武功大夫王機除名勒停送髙州編管奉聖㫖詹度責授海州團練副使彬州安置薛嗣昌生前官職盡奪下哀痛之詔起福建浙江軍民勤王契勘福建江東西浙東素號出武勇人材欲四道置帥體例差發運使翁彥國充經制使令召募起發軍民二萬人須管於十二月上旬到關勤王其錢物亦許於二廣那移奉聖㫖翁彥國與復舊職依此施行十四日乙亥京畿人户入城十五日丙子詔免公私房錢得金人逼河之報慮細民不易故放免公私房錢尼堪兵自河陽渡大河初金人欲渡河唐恪何㮚等以為大河之險有大臣提重兵以守之决不可渡下令曰朝廷已命將守河為捍禦之計而京都細民往東南者甚衆搖動人心深為未便令開封府以法約束又下詔曰金師入戰已遣使議和如果能深入渡河當以王雲所持金銀五十萬幣帛三十萬以旌戰士其有獲金牌者白身與修武郎有官人轉六官獲銀牌白身與承節郎有官人轉兩官其餘將校比類施行有送金人使命者至鄭州已逢遊騎道路傳言金人渡河矣執政諸公未以為然皆自恃有李樞密將兵防河矣然邊報益急殿前司仍遣使臣綱作斥堠已而募忠義團練使臣將以備守禦計尼堪兵守潼關以扼西兵尼堪渡河乃以兵五萬守潼關以扼西兵之來其後范致虛至陜西而不敢進錢蓋兵由商虢唐鄧而兵散者皆尼堪之計也斡里雅布自大名府由魏縣李固渡過大河宣撫副使折彥質河南守燕瑛棄河南走回京師河東逢敵記曰金人陷平陽府余出平陽至懷州見折宣撫言金人遣使講和果是相欵使人未還十月初十日破汾州二十四日攻圍平陽觀攻圍平陽其勢甚張意欲大舉未易禦遏折公云何以為計對曰速申奏朝廷乞竭力應副軍兵如不可用速招募民兵如河東陜西人彼皆欲報父母兄弟妻子之讐此可用也支一百錢米二升半仍優加犒賞諸渡口速渡人河陽浮橋正是軍馬往來河東一帶驚移人户逃避之路宜速繫之敵騎次第半月間必至此折云據公看到這裏也到不得余云將次第到都城下亦未可知是日折宣撫往北陽縣城相視防河次第自初九日初十日十一日敵兵關報日急余十一日就往河陽辭折公云兩日來邊報頗急舟渡人費力余云前此并如何折公云六七日繫橋又未了余云豈有大將軍下令繫橋數日不了之理何不勾追繫橋官略與處置余棄二馬用船渡河十二日繫橋又不了勾繫橋官一鈐轄兩都監內鈐轄捶棍子三十兩都監各捶棍子五十十一月十二日午時橋成河灘中已積五六萬人軍民宅眷官員車仗兜乘擺布如蟻橋成爭渡宅眷婦人官員軍民陷于􅥐沙中不知其數須臾皆沒有婦人陷于沙中舉臂間金纒示人號呼求救莫敢向邇不移時遂沒是日晚敵騎近遂燒橋兩岸哭聲痛干雲霄宣撫司屬官約三二百員將佐居民官員等馬約一萬匹不能過河宣撫司金銀縑帛為敵馬所逼自懷州沿路拋棄至河陽灘內者約一百餘萬貫十一月十四日絶早敵騎已至河陽北岸皆黑旗黃旗白旗先自城中趕出居民在河灘內却用騎兵旋繞捲入城中令軍民於河灘中盡掘淤陷之物余見敵兵已至河陽北岸又無馬轎遂一日一夜至鞏縣計一百三十里十五日敵馬自皮垣至曲渡河殺人報到宣撫司折宣撫與河南燕尚書名瑛字仁叔各索馬逃避敵欲趍都城十六日丁丑康王為告和使奉使斡里雅布軍前是日康王被詔奉使斡里雅布詣軍前議和帥資政殿學士王雲為副中書舍人耿延禧觀察使髙世則參議官都監東頭供事官藍圭康履黎栥入內西頭供奉官楊公恕內知客修武郎韓公裔從行宣和録曰先是王雲奏李裕自真定府敵寨歸道二太子語得親王兩府奉使求和庶可解康王英武舊與二太子結歡金人畏服令取聖裁事下宰臣執政門下侍郎耿南仲曰李裕道皇子之言欲得康王之重請和蓋已報渠康王欲去皇子處不可偏重須與尼堪處相同在聖情度之只用王雲如何尼堪處莫儔如何是時尼堪在河東南只乞差王雲莫儔庶不偏重于二太子處御批云如此事不須取㫖但與少宰評議從常施行南仲又奏劄曰臣得李裕劄記文字一紙謹去進呈差康王須得聖㫖乃可但以臣觀之只令李若水王雲亦可乞降聖㫖付王雲更不差康王前去所貴不敢喋喋取進止御批云卿一靣諭王雲若兵退後親王謝不妨南仲召王雲至府第諭以德意雲不以為然即求對請必令康王奉使遂定康王劄子奏乞差文臣耿延禧武臣髙世則二員充參議官丙子康王奏事在禁中申時還府第延禧世則參見康王慨然云國家之難君主憂辱茍可以了事義不得辭然深入不測敵廷未有還期公等歸與父母妻子訣來日五更至此同行延禧世則乃歸惟王雲家屬不在京師留宿康王府第丁丑五更皆至少卿與王同上行是日南仲奏事內殿上顧問康王奏卿之子為官屬不辭而往朕甚嘉之南仲對曰臣惟此子當國家艱難豈敢辭因泣下上曰宣來奏事如何南仲曰康王既往而臣子獨宣無此理既退有御筆云耿延禧速宣回奏事南仲奏云康王為國出使臣之子不肖得奉使左右幸也若獨宣回臣何靣目遂止于是除延禧龍圖閣直學士賜金帶一條通犀帶一條綿綺等一百匹靈寶丹蘇合香圎透氷丹各一百貼茶一百斤四和香一百兩糖霜一百斤金人至汜水是日斷路諸門橋諸軍城守百官疾速上城金人兵至汜水京西憲許元許髙守汜水與士卒望風而潰京師聞之土門清野禮部侍郎梅執禮為清野使金人至汜水或傳為已渡矣城市洶洶不定乃遣清野日者王俊民上言乞借春以召和氣王俊民以謂國家大忌丙午年冬月請於冬至致祭打牛一如立春之儀以召和氣朝廷從之乃迎土牛於天祺應木德土門康王出門午後諸門土獨留東水門陳州門百姓爭之死者枕藉十七日戊寅金人到汜水縣焚㑹聖宫龍圖閣直學士河北河東路宣撫副使折彥質責授海州團練副使永州安置先是折彥質將兵守河敵騎至河陽列兵河之南岸敵據河陽望見河南官軍甚盛鳴金鼓以懼之師衆潰散而歸敵渡河至京師質與河南守燕瑛走故有是命李回自河上遁還至京師先是遣回以騎五千巡視黃河號巡按大河使敵陳舟欲渡咸驚歎回挺身單騎馳還靖康小録曰朝廷先是遣簽書院李回將金銀物帛巡河犒勞士卒回在路不能躬率將士守禦險阻聞敵輒奔南走孝義橋留將士捍敵巡山路走至頴昌府猶且與屬官宴飲隨行官吏兵級深欲刃之候騎言金兵已逼近郊京師大震于是戒嚴是日繕治樓櫓議者或謂敵乘機渡河鼓而南有易我心不若四靣十里間各屯兵二萬堅壁據要害以伐其謀别騎往來助之絶餉道清野以來芻藁且竭使不得進掠縱謀間伺敵隙時出兵攻其虛實令河北郡邑結營自守更走使以元帥拜康王集兵揚言搗燕山動其心軍渡河合四方勤王之師繞其背夾攻之敵不足亡也或謂敵兵焱鋭而我師挫衄久矣聞深入氣益不振不支敵坐傷國體不若擁駕臨狩徐議所向嬰孤城自守詎可久耶猶豫未决敵奄至朝廷茫然不知所為尼堪遣楊天吉王芮察勒瑪等十三人持書來議黃河為界等事書曰左副元帥謹致書于大宋皇帝闕下恭承宣㫖遣使問罪來意雖以委任不當為辭然未肯服罪致令重兵河北河東兩路齊進所經府州縣鎮服者撫之拒者攻之今月初六日已過澤州界不住前進及遣先鋒今月十四日已過黃河不施船筏不由渡口直涉洪水諒已洞悉載惟大宋屢變盟言若不以黃河為界終不能久故今議定還河北河東兩路先行收撫其中或有來自河外者不選甚處人民並各一例存撫然念拋鄉亦議定自外見在兩路有未下州府官員兵人並許放回請差近上官員前來交割引出俾見家人仍服罪訖先具凡所聼命不違國書回示如或不見依從稍有延遲將恐别招悔吝朝廷棄三鎮之議猶豫未决而金使王芮在館且聞金人渡河之報遂决棄三鎮唐恪奉勑何㮚大駭曰不奉三鎮之詔而從畫河之命何也㮚不肯從於是御批以金人欲割地須兩府二人令各自陳願使者陳過庭以主憂臣辱首請自行唐恪曹輔等皆依違不對耿南仲以老辭聶昌以親辭尋出御批曰過庭忠誼可嘉特免可差辭免人耿南仲使斡里雅布河北聶昌使尼堪河東日下出門宣和録曰楊天吉王芮來議事取蔡京童貫王黼吳敏李綱等九家屬詔王時雍曹曚館之時雍曚議盡三府所入悉皆增嵗幣并祖宗內府所藏珍玩歸之二帥曰河東宿歸師暴露日久欲厚犒之天吉芮頗納先取犒師絹十萬匹以行差吏部員外郎王及之充送伴官要盟録曰金人遣楊天吉王芮貝勒察勒瑪來詔吏部尚書王時雍知四方館事帶御器械王列館之吏部員外郎王及之充引伴官敵請畫河為界朝廷不得已從之遣聶昌耿南仲為告和使始稱聼命無違以畫河為界王及之擅改為黃流為界聼命無違為敵張皇其意非止畫河而已王芮來聞尼堪軍已至西京不復請三鎮直以畫河為言升對殊不遜有奸臣輔暗主之語上下洶懼十八日己卯康王渡河至濬州是時天大寒有氷蔽河而下康王臨河顧謂耿延禧髙世則曰議者謂閏年不冰今復如此豈保金人不南向哉至濬州猶未知尼堪已渡之端的尼堪陷西亰以前澤州髙世由為留守尼堪在西京引諸京人看永安諸陵入謁真宗仁宗陵至恭不謁裕熙二陵有焚毁之意禁止諸兵不得劫掠陵廟器物尼堪在西京令人廣求大臣文集墨跡書籍等又尋富鄭公文潞公司馬溫公等子孫時唯潞公第九子殿撰維申老年杖屨先奔走出城乃遺一妾一嬰兒尼堪既得撫之良久贈衣服珠玉為壓驚復令歸宅范仲熊北紀曰前知澤州髙世由金人差為西京留守仲熊遂因髙世由令其子往尼堪寨獻酒乃寄書與世由聞說與龍圖得國相指揮招集西京人還業仲熊亦是西京人令還鄉里仍諭世由以其嘗為守臣以郡迎降豈能自安不如自新以洗前過因先遣董偉滎陽以來召募義士世由即達此書于番官韓僕射云世由初至洛陽人情未安有土豪范仲熊見在鄭州收管乞令還鄉同共幹當韓僕射以書呈尼堪尼堪不樂曰范仲熊是結連背叛不順大金之人偶已貸命不欲根治今來髙世由知土豪當此之際却令還鄉有何意思令元帥府上畔依此批下髙世由得之大怒三朝北盟㑹編卷六十三
