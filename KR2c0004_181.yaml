body:
  text: 三朝北盟㑹編卷一百八十一宋徐夢莘撰炎興下帙起紹興七年九月十八日丙午盡其日十八日丙午金人廢劉豫金人既執劉麟乃馳赴京城下由梁門外登城以百騎守宣德門東華左右掖門副元帥烏珠并三路都統阿嚕伯竒五郎君三騎直突入東華門問劉齊王何在僞皇城使等錯愕失對烏珠以鞭擊之徑趨垂拱殿入後宫門問劉齊王何在僞宫人揭簾應云在講武殿閲射講武殿劉豫毁明堂以明堂建殿也三帥馳往直陛殿豫遽欲退更衣烏珠下馬執其手曰不須近有急公事同登門議於是同行至宣德門傍遽命僞侍從監門就東闕亭少立烏珠乃麾小校以小黃馬强豫乘之且曰元帥請到寨中議事豫始覺其謀撫掌大哭上馬衛從猶數十人三帥露刃夾之而行過豫僞御馬院命捨馬出梁門囚於金明池廢為蜀王年六十五豫初僣立以闕錢流傳及置交子立法七年換至是豫立七年丁未金人率僞文武百官軍民僧道耆老等拜詔于宣德門下詔曰敕行臺尚書省政朕丕席洪休光宅諸夏將俾內外悉荷升平顧自濁河之南以為鄰壤之界灼見先帝舉合大公罪則遄征固不貪其土地從而變置庶共撫其生靈建爾一邦逮今八稔尚勤吾戍安用國為寧負而君毋滋民患已降帝號别應王封罪有所歸餘皆罔治將大革於弊政庶一陶於新風勿為奪蹊田之牛其罰則甚不能為詫子之友非棄如何凡爾臣民當體至意所有餘事件已委所司逐一下元帥府去處分不盡之事亦就便計議從長施行仍告逐處咸使聞知故兹詔示想宜知悉宣詔畢二帥從素隊數十人頂數丈長柄上紫傘立于西朵樓相對西街僞丞相張昻李鄴范泰等立東朵樓相對趨前欲拜逹蘭斂身令通事傳言慰勞不須勞來者三然後昻等次第揖遜謝訖次又依前見烏珠直立或捫耳或捫面旁若無人不為禮禮畢二帥歸東以數千騎往來繞大內御街循環不絶仍使小校分行街巷揚言曰不用爾為千軍不要爾免行錢不要爾五匣錢為爾敵殺貌事人請爾舊主人來此坐教爾悶快活千軍即日皆散已起者人馬器甲徑歸東京元來營分願歸農者納馬逐便金人得豫馬四萬餘匹在京有錢九千八百七十萬緡有絹二百七十萬匹金二百二十萬兩銀二百萬兩糧九十萬石方州總數又倍之豫內庭嬪御一百七十人妊娠者九人麟婢妾一百二十人父子雖外示儉朴而內為淫泆以獻女獻妻進婢妹得差遣如髙立之宋揖者紛紛皆是如亷公謹以女奉麟以媳婦伴送麟以二人進豫豫遂以公謹為僞皇子府准備差委監理科庫有長葛令侯湜者告其入已贓近萬緡湜計窮遂飾姪女進豫冀其幸免勘官馬揖觀望從輕擬斷合除名勒停豫曰使功不如使過即命湜為帶金牌天使陜西五路傳宣撫問回就臨汝卒其用心如此在僞位八年四民凡含齒戴髮上自耆老下至齠齔至倡優無不日納官錢以內庭種菜出賣京師池塘計荷葉數目猥屑不可盡言士民凡出語言稍涉時忌者並許人告得其情告者受賞或遭誣執告者免罪由是小人得志父子不敢隱語如負擔相遇或相問曰那里去若應云南頭去便以亂道言語斬之衣著稍或鮮麗又以宋之頑民尚仍舊態斬之專務以猛濟寬不覺失於大錯劉觀復劉益皆豫之弟猊乃觀之子悉務聚斂皆乏逺圖唯益屈己下士踈財重義頗得士卒歡心講武之暇涉獵書史以儒術緣飾吏事金人亦忌之廢豫日先為所執先是邢希載毛澄之徒皆以忠言告豫令密通朝廷豫殺之既廢遷相州留錢五萬命道士修醮謝直言者豫初僣立奔附者衆識者譏之云濃磨一錠兩錠墨畫出千年萬年樹誤得百鳥盡飛來踏枝不著空飛去輕薄子撰造詩曲指為笑端不可勝記豫拘于瓊林苑常蹙額告達蘭云父子盡心竭力無負上國惟元帥哀憐之達蘭曰劉蜀王劉蜀王爾猶自不知罪過獨不見趙氏少主出京日萬姓燃頂煉臂香烟如雲霧號泣之聲聞十餘里今廢了爾後京城內無一人為爾煩惱做人猶自不知罪過朝廷還爾奴婢骨肉各與父子錢物一庫㬠好豫默然語塞劉之族人劉珏者金鎗班班直人也豫令知長安到長安日蓬蒿中得二三人珏措置招人措置屯田之類曲盡其法甚得軍民之情豫廢後金人復以珏為轉運使來長安諸處人歸之金人懼焉金國遂以詔命召珏到鄭州藥殺之右從政郎楊克弼作僞豫傳曰謹按春秋大法聖人書于經褒貶善惡彰著以昭示後世臣子之觀戒若諸侯之善如美齊桓晉文有翊輔周室之力成五霸之功則書爵以尊之卿大夫之忠賢如魯季子來歸有歸國之忠齊髙子來盟仲孫省難存恤鄰國字而賢之宋孔父正色于朝司城司馬死節之義書官以貴之褒而美之以代其賞樂道人之善也楚子爵僣稱武王其後縣大夫皆僣稱公聖人書經善則稱子惡則稱人而正凌僣也如楚人圍宋楚人滅庸貶而罪之以代其罰衛州吁齊無知弒君自立翬弒隱公宋萬弒君捷書名以賤之削去官稱除去族氏以示誅絶彰暴罪惡于萬世今豫雖廢得免萬死為幸然尚稱僞齊若不誅絶何以昭示懲戒當削去僣號貶其官除其姓氏作僞豫傳以為亂臣賊子之戒云劉豫字彥遊景州阜城人也家世為農至豫始應進士舉元符中登第纍歷縣佐郡屬政和二年遷殿中侍御史少時嘗盜同舍白金盂子紫紗衣至是方發其夙醜豫因上自明上皇赦而不問未幾上章言禮制局事上皇批云劉豫河北村叟不識禮制遂黜為兩浙察訪其謝表云孰云河朔村俗之人來領浙右亷問之事議者謂豫怨望之迹已見于此時抵儀真喪妻翟氏繼丁父憂因家焉建炎二年戊申今上幸維揚樞密院張昻與豫有河朔職司之舊力請于朝欲與一郡時濟南太守張悅遲留未行使豫起復代之除中奉大夫知濟南府豫欲換江南一郡而兩府厭其頻數不許謁見乃痛憾而去至郡惟務酷刑以報私仇而父子隱條犯者皆坐罪建炎三年己酉金人至山東州郡例多戰守豫遣子刑曹椽承務郎麟部兵出戰慮金人所圍又令郡倅張東援之金兵解去遣人啖以利俾令投拜豫與東欲議出城見金帥百姓遮道願死守不降豫因縋城詣軍前通欵是年夏金主命豫節制京東兵馬徙東平豫遣使說汴京留守上官悟叛悟焚書以斬之豫又賂悟左右二人喬思恭宋願說悟悟亦從之時金國天㑹七年建炎四年庚戌濟南有魚人得鱣者豫妄謂神物之應乃祀之夏五月附豫奸人言北京順豫門下生禾五穗同本以為豫受命之符於是齊魯之間僉㑹推戴豫亦遣子麟以重寶賂金帥達蘭左右求僣主而達蘭遂注意立豫詭辭乞立張孝純金主遂遣使至豫治所問軍民士大夫所欲立者時獨豫鄉人張浹應之曰願立豫是月戊申金主遣西京留守髙慶裔禮部侍郎知制誥韓昉備禮以璽紱立豫冊之曰册命爾為皇帝國號大齊都于大明世修子禮永貢䖍誠付爾疆封並同楚舊豫遂僣立於北京其赦文有曰雖無虞舜之明揚幸免成湯之慙德其悖逆如此以前宗政寺丞李孝揚權左丞濟南道判張柬權吏部侍郎兼左丞子麟太中大夫提領諸路兵馬知濟南府以延康殿學士前宣奉大夫前太原尹張孝純依前宣奉大夫封開國公守尚書右丞相弟益為北京留守都水使者王夔為汴京留守升東平府以為東京改南京為歸德府豫生于景州守濟南節制東平僣位大名起四部強壯為雲從子弟應募者數千人又以境內三代有官為三衛官目曰翊衛勳衛親衛分三等二年升一等六年即以試弓馬合格人出官是年乃建炎四年金帥四太子南下回以李鄴李求李儔鄭億年臣豫以儔為監察御史億年權二部侍郎冬十月甲午遣孝純等奉寶冊冊前妻翟氏為皇太后妾錢氏為皇后民間房緡以五釐納官十一月改阜昌元年李鄴留守東平鄭億年吏部侍郎馮長寧自陳州歸附請立什一稅法除户部侍郎李儔知軍州李俅楊榖縣令是年依倣金國法鄉各為寨五家為保推土豪為寨長雙丁籍為出戰單丁夜巡雙丁上教軍州縣市民亦然每月軍民縣市之民結為五軍丁軍夜巡雙丁上教月兩㸃集呈器甲試弓馬合格者補效用正軍不願者聽每調發一人即同保四人家備衣糧器甲衣服就本州送納交于駐劄處兊支錢官無一毫之費惟正軍使放用官被請給各有差滄州進士邢希載上書乞隂通朝廷結好夏國密圖金國榜于市云大國聞之與生靈為害不細斬之又有百姓失其名醉扣門嫚罵豫云劉豫儞是何人要做官家大宋何負于儞豫又斬之阜昌二年封子麟為梁國公除尚書左丞相張昻權右丞相廉門下侍郎冬十月以弟益守汴京李傳知襲慶府東宫官屬并父老史平僧録德真道録王從簡等奉表請遷都于汴京僧道賜齊史平補上州文學張東罷右丞范泰權右丞三年夏四月遷都于汴是日暴風揚斾屋瓦振動都人大恐曲赦汴京杖罪以下曉示民間今後更不肆赦不用宦官不度僧尼道士奉祖考于舊太廟尊其祖為徽祖藝文皇帝又曰衍祖睿仁皇帝親巡郊社從弟益京兆留守麟以境內僉軍為十二軍在府以參謀機宜幹當統領議事差委順習差使㫖指使上中下三等守闕上中下三等效用取士羅網人才置諸左右文武並雜用不拘限資格僞宣教郎太常博士兼直史館祝簡進大都賦又進國馬賦豫批文賦正非治天下之宜尚然自前朝之季上恬下熙人忘監牧國家創業力為生靈除禍亂致康泰以馬為急務而猶恐官吏軍民多如舊俗未知盡心于牧圉芻稼之道此賦極陳馬之為用使讀之者知此為至重而不可忽實有補于馬政祝簡可減二言磨勘以示無言不酬西京奉先指揮李英賣玉注碗豫疑非民間物勘鞫之知得之山林中遂以崇石善為河南淘沙官發掘古今山陵民庶墳墓求請康之難發棺不盡者取棺中水銀等物以吳俊為汴京淘沙官發民間埋窖及無主墳墓中物六月大雨遣子麟代謝相國寺中太乙宫張昻右丞相兼門下侍郎鄭億年開封府尹誠忠郎許清臣管主殿前司公事秋九月長星見僞太后死諡曰慈獻宋願上書言利害豫以說上官悟之故特録用之授大總管府差委冬十月李鄴權右相范恭守左丞改忠翊郎為昭果郎忠訓郎為昭毅郎李俅言什一稅法利害遷監察御史四年正月葬僞太后于東平賜狀元羅秀以下八十四人及第五月户部侍郎馮長寧監察御史許伯通刪修什一稅法條式三十二件隨法申明二十二件諸律刑統疏議阜昌敕令格式與什一法兼行文意相妨者從稅法斂九月學士院馬定國進君臣名分論其略曰或曰金師再駕攻圍汴都康王帝弟之親總元帥之任握天下重兵號稱勤王自冬徂夏遷延六月移屯濟州坐視京師之危略無進師之意及汴京失守二帝北遷康王謂天下之在己逡巡即皇帝位于睢陽自余觀之是耶定國應之曰非也文多不載豫批馬定國轉一官冬十月李節除右丞金人攻蜀敗於王師五年夏誠忠許清臣除殿前太尉拆毁景靈東西得真宗皇帝玉石像碎為二十八段豫問可作材料否清臣云已斷首矣麟于是取一段示右丞相張昻云此真宗皇帝也己卯之五月開聖尼院三日百姓縱觀九月豫下詔南侵至淮泗遇韓世忠遊兵不得前繼聞皇帝親征四太子宵遁調發盡靜始遣人語麟兼行二百四十里抵宿州少安西北大恐麟率僞臣寮上言嘗謂中原制江表其為形勢與强弱逆順之理何啻得百二之利也自古王者興起必以河朔山東之地然後為帝王之真若乃崛起及遁居吳越之地計其強者能自保一隅偶有不振則中原之兵已進而墟其國者舉是也故史冊所載如吳為晉所滅陳為隋所滅周世宗剪伐淮南諸州至宋之初以次就平是也乞下合屬去處曉示奉豫㫖依六年二月改什一法行五等稅法夏六月汴京地震秋七月毁明堂得金龍之金四萬兩大同錢三百萬暴風連日屋瓦皆震八月麟出獵陳留有義黨數百人欲劫之南奔皆法外處死于汴京以弟復知濟南劉觀知府陽軍冬十月下令民鬻子依商稅貫陌收稅知襲慶府李儔罵丞相張昻豫批云理合誅戮尚念係昨江南守臣隨軍歸府特以寬貸追五官天監七年春賜狀元邵世矩一云邵光規以下六十九人及第改明堂基為講武殿開安上門為衆安門朱雀門為明昌門景龍門為照逺門秋九月以殿前大尉許清臣為權大總管府以子麟領行臺尚書令馮長寧行臺户部侍郎行軍參謀李鄴行臺右相講議軍事發鄉軍三十萬號七十四萬分兩路南寇東路由荆山渦口犯定逺宣徽以姪劉猊統之西路侵廬州麟統之僞詔榜示指斥鑾輿尤甚于五年淮泗之役軍之始行也知臨汝軍宋䒴部夫到京子麟以後期斬之納其女子繼豫斬使臣趙倚語人曰已去趙宗矣尋進于濠夀之間東路猊所統遇楊沂中擒戮悉盡西路麟所統聞猊敗望風北遁失運車七千兩船七百隻逮歸亡歿散走者大半器甲交鈔軍須犒設等物不可勝計建炎己未王師獲捷未有如是之盛也於是猊廢為庶人免復官徙觀為東路留守以妻弟翟論為南路留守八年夏四月改保康門為清逺門是月梟鳴于苑又有梟數千鳴于南庭皆作休也之聲豫惡之命能捕獲一梟者賞五千五月無雲而雷起龍于宣德門捫滅宣德二字豫令修之秋七月聞人南回探報王師欲北征遣宣義郎楊克弼乞師大金克弼他辭改差户部員外韓元美迪功郎遊何金人不許八月望順昌府馳報喜旗至京云江南劉相公下全軍人馬并淮西兵十餘萬歸附己交收器甲接納了當九月十三日到京以歸首酈瓊為靜難軍節度使知拱州劉光時為北京大名府副總管王世忠皇子府前軍統制靳賽左軍統制餘或諸州兵馬副鈐轄其次皆授諸州准使喚緝捕盜賊劉麟府效用使臣正軍請受恣縱㫖皆不及朝廷則例皆悔恨獨酈瓊以為得策麟見王師必欲北征遣參議馮長寧使金乞併力南侵冬十月壬寅平原鎮濠寨官賁百祥見星殞不覺失聲驚曰齊帝星墜禍在百日之內同坐執之赴麟麟問可禳乎百祥曰應天以實不以文惟在修德麟聞之豫以為狂士斬之汴京閣門奏僧道見謝辭令拜豫批依十一月庚子豫以私憾殺汴京富民孟師齊于東門籍其家資豫遣人乞兵大金金示難色豫乞愈堅不得已許之俾令先調發齊兵㑹于淮上納麟議事濬滑之間麟以百騎從是月丁未至河上悉為金擒之四太子五郎君三路都統以數千騎馳赴梁門登城以守丙午四太子與三路都統以數千騎守宣德門二帥從東華門入逼豫出見達蘭以鞭指騎逼豫于闕亭以羸馬駝之而去囚于金明池廢為蜀王命百官有司皆仍舊以僞齊尚書省為金國行臺尚書省散出文榜買賣不許關門仍以小校揚言因民所欲皇惑衆聽稱齊王虐民命廢之放五釐免行錢散鄉軍敵殺報事人交儞百姓快活儞舊主人少帝官家在此民心于是稍安而百姓亦不敢擾民闕文不在此數宫嬪一百七十人任身死者九人其子麟一百二十人父子皆外示節儉之狀而內放淫泆以獻妻得官進姊妹得差遣如髙之立宋緝紛紛皆是中間尤甚者如廉公以女奉麟以子妻伴之麟併取二人葛令有已贓萬餘緡事發恐不免以女進豫謂使功不如使過升湜為金牌天使陜西五路傳宣撫問其淫汙有至于此僞位八年凡含齒戴髮上至耆老下至齠齔微至倡優無不自納官錢行偶語之禁喜掊克之酷虐鄙猥不可以一二記其數也有馬二萬四千匹在京有錢九千八百七十餘萬貫有絹二百七十萬匹有金一百二十萬兩有銀二百萬兩有糧九十萬石方州在外劉觀劉益劉豫皆復之堂弟猊為觀之子皆事掊斂無他能獨益輕財好施禮賢下士與士卒同甘苦頗有逺略故廢豫日金人亦忌之俾經略郎君以計掩捕其餘貸之苦無故觀至今恣其任便居住僞后錢氏宣和間為御侍淵聖時出宫聘使臣張保義張為賊冦錢從賊幾為賊人所殺賣身與豫為針線婢故舊在宫庭中豫皆取法于錢先是邢希載毛澄以忠言俾豫密通朝廷不納而害之至廢遷相州豫悔留錢五十萬醮之十二月甲戌自相州徙上京改封曹王在僞位八年年六十五三朝北盟㑹編卷一百八十一
