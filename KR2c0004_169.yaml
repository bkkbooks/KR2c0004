body:
  text: 三朝北盟㑹編卷一百六十九宋徐夢莘撰炎興下帙起紹興六年正月盡九月紹興六年正月車駕駐蹕臨安府張俊出視師行狀曰以金勢未衰而叛臣劉豫復招中原為謀叵測不敢寧處於朝奏請親行邊寨部分諸將以觀機㑹至即張榜聲豫僣逆之罪以是月中旬啟行公謂楚漢駐兵殽澠間則楚不敢越境而西葢大軍在前雖有他技㨗徑敵人畏我之議其後不敢越踰而深入也故太原未䧟則尼堪之兵不復濟河亦此耳議者多以前後空闕敵出他道為憂曽不議其糧食所自來師徒所自歸不然必環數千里之地盡以兵守之然後為可安乎既以此告於上又以此言於同列惟上深以公言為然至江上㑹諸帥議事令韓世忠據承楚以圖維揚劉光世屯合淝以招北軍命張俊練兵建康進宅旴𣅿命楊沂中領精兵為後翼佐俊命岳飛屯襄陽以窺中原形勢既立國威大振上遣使賜公御書裴度傳以示至意公於諸將尤稱韓世忠之勇岳飛之沉鷙可倚以大事世忠在楚州時入偽地撫叛賊上書賜公曰世忠獲㨗整軍還宅進退合冝中外忻悦毎思世忠發憤授之方略卿宜明審虚實徐為後圖或遣岳飛一窺陳蔡使賊枝梧不暇以逸待勞時飛母死扶䕶還廬山公乞御筆敦趣其行飛奉詔歸屯公又以東南形勢莫重建康實為中興根本且人主居此則北望中原常懐憤惕不敢自暇自逸臨安僻居一隅内則易生安肆外則不足號召逺近係中原之心奏請駕以秋冬臨建康撫三軍以圖恢復二月諸路安撫使兼營使折彦質僉書樞宻院事折彦質自兵部尚書除僉書樞宻院事無所建明備員而已十二日庚戌尚書左司員外郎范直方川陜宣諭并撫問吳玠一行將士並依紹興二年諸路宣諭己將指揮仍令條具數内一項勘㑹前紹興二年諸路宣諭官被奉聖㫖檢察詔令平反刑獄觀風問俗宣布徳意仍降親筆手詔及令閣門先次引見上問面受聖訓并給賜御札厯子採訪問逐路見任官亷汙能否書上厯子薦列以聞直方今來宣諭川陜撫問吳玠一行將士並無遵依逐官已得指揮并降詔書御札厯子别有施行有㫖四川監司帥臣吳玠軍前并令學士院降詔其逐路州軍仰宣諭司謄冩項下内席益吳玠别降口宣賜川陜宣撫處置使司詔朕紹興丕基遭時多難飾戎車於江左為懐經畧之圖列將鉞於闗中欲存根本之勢豈虞彊國專逞滛威敵勁弗支兵拏未解嗟蒼天之不弔宜悔禍於我家憫赤子之無辜重流毒於兹土寡徳所至悼心何言頼我股肱之臣縂䕶爪牙之任一戰克㨗諸路悉平王靈由是復加士氣於是再振然念行師累歲轉鬬一方被敵國之係累寧無淪䧟之黨思祖宗之涵養豈有背叛之心慿陵使然蹭蹬至此倘存疑阻殊咈招徠將束身而欲歸或懼刑誅之惨比復業而莫處或憂賦役之煩或立効而褒賞未加或負才而禄秩未稱疾苦無告愁恨何聊仄席以思當饋而歎於是下哀痛之詔布至意以宣言施曠蕩之恩洗無辜而収拭沿邊將士應䧟殊方非抗王師及侵掠入㓂者並不得誅戮敵騎慿陵之際䧟沒州縣官吏將士軍民皆縁畢力不能捍禦致有脅從或遭驅擄至今困居本土或旅寓逺邊實為殘破無曰背叛䧟敵人有能立功來歸者仰沿邊帥守保舉申宣撫司一面旌擢優賞其次雖未能立功而心在本朝有意懐來者各以元舊官職任使兵級弓箭手依舊職名收管民兵願歸業者聽其間才力可用特與抜擢或有以前罪犯懐疑自危一切原貸或先曽立功未曽推賞即特與推賞因䧟敵廢業失所者寛其租賦免其征役昨縁道路不通號令壅隔致逺方之民疾苦無所赴訴專委宣撫使講究措置並從寛恤遍下諸處官司施行咨爾有衆咸識朕心各堅奮勵之誠亟臻休息之效故兹詔示想宜知悉賜吳玠王彦關師古奬諭勅書朕乘厯運之中㣲屬方隅之多故兵塵數起邊候屢驚永懐秦雍之區久罹干戈之禍暴骨滿野連城為墟興言痛心引望流涕式資驍騰之將屏此寇仇庶使創殘之民脱於塗炭卿世家隴右氣禀山西攄忠憤於胸中殫威稜於塞外運竒合變並施九拒之謀鼓勇争先悉用萬全之畧潜軍一舉并騎四馳折敵勢於方驕激士心而復振兹為社稷之衛良慰鼓鼙之思然念歲月倭遲風霜侵薄勤勩雖由於爾力咎責實歸於朕躬更奮鷹揚益殱蟻衆尅復疆土撫定黎甿赤囊之㨗累傳功既存於廟祏丹書之誓永固福自及於子孫各堅乃志用副朕懐十六日甲寅岳超及金人戰於宿遷縣韓世忠欲攻淮陽軍既到宿遷縣㸃選統制岳超統將佐親隨共二百人為硬探時淮陽亦知世忠超兵金人知兵賈舍人都統額哩頁遣八十騎來宿遷硬探與超等相遇於中途衆皆以本來硬探不可迎戰當復囘超曰遇敵不戰何以空囘金人已鳴鼓超乃率衆衝入敵陣出而復入者數囘金人乃退超等亦囘有中傷者數十人然無一落陣者十七日乙夘韓世忠敗金人於宿遷縣擒其將雅格貝勒韓世忠欲進趨淮陽軍城下令呼延通攔前而世忠獨馳一騎使一把雪執信字旗隨之一把雪者其兵之曹號葢趨捷善走之人也令諸軍馬軍繼進見信旗止則止見信旗麾則俱進通行二三十里遇金人而止世忠於二三里間乘髙陂以望通軍約三里許見信旗止通馳至陣前請戰金人出猛將曰雅格貝勒呼令通解甲投拜通曰我乃呼延通也我祖呼延太保在祖宗時殺契丹立大功曽誓不與契丹俱生况爾金國小敵侵我王畧我豈與爾俱生乎即馳刺雅格貝勒與通交鋒轉戰移時不解皆失仗並馬以手相擊各抱持不相捨去陣已逺於是皆墜馬於坑坎中兩陣皆不知雅格貝勒取箆刀刺通之腋流血通搦雅格貝勒之喉氣欲絶而就擒得官軍百餘相㑹遂囘金人退去世忠大喜是時諸軍見信字旗久立不動統制皆率衆以進世忠曰吾旗未曽麾何以輕進違吾之令當行軍法諸統制曰立陣移時信旗不麾戰士氣鋭欲盡命故進違令之罪實不敢逃世忠猶决數人以示行法馬擴為沿海制置使馬擴在鎮江措置事務也正月都督府劄子發遣馬將帶吳錫一軍并所部人馬赴行在二月為沿海制置使駐軍明州十八日丙辰韓世忠圍淮南軍韓世忠既獲雅格貝勒遂率諸軍至淮揚軍城下城守甚嚴城中街衢亦陣合以防克敵弓矢淮揚軍舉烽報急是時金人有令受圍一日則舉一炬自夜至曉不滅受圍二日則舉二炬凡圍六日舉六炬第七日救兵到世忠遂囘軍李綱來劉光輔圍光州偽知州許約以城降王彦保康軍承宣京西南路安撫使兼知襄陽府王彦除京西安撫南路岳飛為京西湖北宣撫使當受飛節制彦昔為招撫使都統制新鄉之役飛受節度彦欲斬而恕之以此引嫌辭免不赴三月韓世忠加少保武寧安化軍節度使京淮東宣撫處置使軍楚州岳飛加檢校少保平静難軍節度使川陜宣撫使軍興州四月韓世忠及金人戰於淮陽軍是役也韓世忠請援於張俊俊不從故王師不克而退二十七日甲子賜韓世忠揚武翊運功臣酈瓊克劉龍城偽齊劉豫以兵城劉龍城將窺淮西劉光世遣統制官酈瓊襲破之盡俘其衆而還光世以功加保静節鉞五月己巳高世則加威德軍節度使醴泉觀使楊沂中來朝二十三日庚寅劉光世加保静武寧節度使張俊加崇信奉寧軍節度使於旴𣅿就城之詔張俊屯旴𣅿軍改授崇信奉寧軍節度使以寵其行拜命旴𣅿軍依山築城右僕射張俊建議也左僕射趙鼎深不悦之嘗覽地圖而歎曰徳逺悮矣雖不為資敵之具然當念勞人也是役也興於盛夏版築於山之頂自下運土而上者皆有日課人不堪其勞又望青採斫數十里間竹木皆盡民亦苦之斸掘新舊塚莫知其數有一塚舊傳為桑相公墳發既徹有體骸尚存長僅二尺人乃知其為桑維翰也城成無水可守亦無樵採築城之際偽齊有馬三百䧟四州之境臨淮佇觀移時而去六月楊沂中進軍泗州張俊進軍旴𣅿縣劉光世進軍廬州七月劉光世収復夀春縣八月岳飛克鎮汝軍商虢二州是役也偽汝軍薛亨素號驍勇岳飛以牛臯當之臯請生擒以獻果獲亨以歸飛大竒之岳飛復西京長水縣秦檜為行宫留守孟庾行宫副留守秦檜為行宫留守張浚薦之也初檜與孟庾皆除行宫留守而同為觀文殿學士庾以先除欲居檜之上檜曰嘗為宰相公參政知樞宻院事而已檜宜居上争之不定奏取㫖乃以庾為副王彦行營前䕶軍副都統制王彦自京南而下也至鎮江丁母憂乞解官持服詔不允起赴行在賜金帶象笏除兩浙西路淮南東路沿海制置副使措置防守海道畢除行營前䕶副軍都統制九月劉豫入㓂劉豫以偽殿前太尉開封尹許青臣權大總管府事以子麟領行臺尚書令馮長寧行臺户部侍郎行軍參議李節行臺右丞僉鄉軍等二十萬號七十萬三路南㓂東路由渦口犯定逺趨宣化以姪劉猊統之中路由夀春犯合肥子麟統之西路自洛蔡之光州㓂六安孔彦舟統之三朝北盟㑹編卷一百六十九
