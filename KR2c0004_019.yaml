body:
  text: 三朝北盟㑹編卷十九宋徐夢莘撰政宣上帙起宣和六年正月六日乙邜盡十二月十七日庚申宣和六年正月六日乙邜金人訃書至報其國主殂為輟朝五日宣和録曰皇帝為大金主卒於內東門别次成服金人遣國信大使奚人富謨古副使漢人李簡來苑齊自叙曰謝登寶位使來阿固達自燕歸國死于半塗烏竒邁嗣立故遣使來謝差張璩充大使馬擴充副使至燕山又進至薊州接見大使富謨古副使李簡謀夏録曰阿固達死烏竒邁嗣立朝廷遣使弔祭故復遣使也河間府詹度得蕭幹首獻於朝先是蕭幹敗於峰山其軍皆失其家歸怨於幹其部卒白得哥殺之傳首河間府詹度上之於朝十四日癸亥獲耶律氏寶檢金印及得古爾班首奏告宗廟社稷御紫宸殿受賀詔曰屬者遼政暴荒天用勦絶其國朕誕膺帝命克紹先猷取亂侮亡恢復疆土施大澤於燕雲之人來歸如水就下沛然莫之能禦獨僞四軍大王古爾班悖衆逆命前年首犯王師于蘆溝繼復旅拒燕城旋命偏師攻于廣陽之北敢干天之紀擅即僞位號神聖皇帝改年天嗣襲遼正統去年輒率其旅若林出冦景薊痛毒醜類矯誣神人罪不容誅爰飭六師大敗於峯山隻輪不返甲辰傳首京師惟豫克相上帝以遏亂略皇天助順宗社垂休有此駿功朕敢專享一云豈朕之武可擇日遣官奏告宗廟社稷御紫宸殿受賀古爾班首級依典禮送太社庫故茲告示想宜知悉二十九日戊寅大金賀正旦使盧州管內觀察使都貝勒髙居慶副使大中大夫守大理寺卿楊並朝於紫宸殿馬擴至燕山與王安中論燕事苑齊自叙曰僕至燕山與王安中論燕中事是時以授常勝軍田約來年夏减罷請受僕因言燕地新邊必知所以治之序首當繕籬落次招撫歸民又次當置弓箭手最後授常勝軍田也至如罷常勝軍請受尤宜欵緩待其闢田就緒乃可罷也僕初入燕諸路正兵有十五餘萬童宣撫帶還外尚有八九萬人選三萬偹戰餘尚五六萬除諸處占破外可以入役者三萬人離而為四又於諸處顧募萬人每城得二萬餘人齊舉貼築薊景檀順四州每州計雇工不過五萬緍更以五萬緍充犒設通用四十萬緍一月可以就緒邊固則土疆可守人心自然安處易於綏撫此繕籬落乃為最也燕地自女真入關軍民士庶往往逃竄山谷間宜招誘寬恤使之歸業此招撫歸民為次也燕中自罹兵火田地荒曠招置弓箭手如陜西新邊法許諸色有武勇少壯人投充每户給田二頃五十畝官給耕牛戰馬種子分官統𨽻不唯荒田得耕兼藉兵威守邊壓服新附人心此置弓箭手又其次也常勝軍見諸錢糧亦不宜遽罷使無所戀將契丹自來特留放牧牛馬閒田分授與常勝軍依倣弓箭手法官給耕牛種子俟三兩嵗耕墾有成漸次减罷請受則無侵奪民田之患外有開懇之功候塞外寧息議减戍兵此治燕至要也安中云今己授常勝軍田見患侵奪民土又天荒曠土皆為所占無復措畫如公所論何如之妙惜乎後時也三月談稹奏置義勝軍談稹初至燕山聞勝軍恣橫藥師輩不為約束稹慮生事奏朝廷乞於河東軍别創一軍分作權勢如雲朔之人以五萬為率屯於州縣要徑處號為義勝軍令李嗣本耿守忠為帥欲俾常勝軍有所畏懼朝廷從之既而嗣本守忠選歸朝人中少壯籍其姓名其月糧夜賜倍於他軍後常勝軍知其請給豐厚往往潜來投附郭藥師等猶懼其亡皆冉涅其面常勝軍大怨人人思亂矣閏三月庚辰大傅王黼奏所俘玉檢僞寶乞宣付祕書省太傅王黼奏耶律氏自按巴堅盜據北土因五季之微以強聞天下藝祖志在恢復而日不暇給纍聖紹休專以柔馭至慶厯中遂至逞已之威妄以關南縣邑為請至有輕視中原之心仁宗皇帝為特添嵗幣乃至要盟别立要約使軍車旁午來易誓文至詞盡理窮方少聽命誓書所著必欲本朝具言别納金繒之儀用代賦與之數是時中國威靈可謂屈矣仰惟陛下天錫智勇師不踰時兵不血䘐盡復燕雲境土如指諸掌古爾班傳首之後既俘石晉所上玉檢又獲其僞寶今者疆圉之臣復以慶厯誓書來上垂宗廟之休快祖宗之憤伏望宣付祕省許率百僚拜表稱賀所有慶厯誓書國書乞藏之寶文閣以示無窮從之四月斡里雅布遣使來宣撫司求所許借糧是時二太子來討張覺自軍前遣使來宣撫司所許借者粟二十萬斛稹曰二十萬斛糧豈易致耶兼自宣司未嘗有片紙隻字許糧之文來人云去年四月間南使趙直閣已許矣稹曰趙良嗣口許豈足慿終不之允遂遣使回二十一日戊申河北河東燕山府路宣撫司知燕山府王安中奏府西香山寺在府天寧壽觀昊天延壽寺甘露降奉聖㫖許拜表稱賀五月二十七日癸邜金國大使辰州管內都貝勒冨謨古副使州防禦使李簡到國門差黃潜善王宗濋充館伴馬擴充送伴前去宣撫司茆齊自叙曰僕既受命復太原見童貫貫問僕燕中事宜僕以常勝軍授田利害答王安中治燕次序之語一一白之童驚因云吾竊慮常勝軍將來為患欲與削了如何僕答如某至愚亦知常勝軍他日必為患然而自今女真顧慮未敢輒肆舉兵者蓋忌此項軍也若遽削之不唯金人窺覘兼此軍即便起變是自引惹莫若因而用之貫云其術安在僕答曰今藥師之衆止是三萬餘人多是馬軍武勇太師誠能於陕西河東河北三路選摘精鋭馬步十萬人分為三部擇有智勇器識可及藥師者三分統之一駐于燕山與藥師對營相制一駐于廣信軍或中山府一駐于雄州或河間府犬牙相臨使藥師之衆進有所托退有所忌則金人雖有他意豈易敢前貫云甚好但十萬人不易那儧我當别有措畫貫云國家挫威皆自延慶之遁當時再起种師道提許多西兵舉事却不至如此誤國家大事每竊歎恨後乃置四總管罷王安中而用蔡靖也八月金人復取蔚州殺守臣陳翊及陷飛狐零邱二縣先是金人逐天祚入夾山遂陷雲中府所有管內州郡皆來拜降及移軍燕山而朔州節度使韓正應州節度使蘇京蔚州土豪陳翊等爭叛金人納土歸大宋後尼堪斡里雅布分遣軍馬逐去蘇京孫團練取蔚州殺陳翊復取上件州郡又陷飛狐靈邱兩縣絶交割山後之意又以牒來責我招納叛人張覺拘收户口職官及不付所許糧二十萬朝廷知其非遂議罷談稹矣九月癸丑談稹落太尉罷宣撫使貶順昌軍節度副使太師徐豫國公致仕童貫落致仕領樞密院事河北燕山府路宣撫使先是談稹至山西與童貫議論不合喜事邊幅怯懦無謀金人既以張覺怨朝廷稹復用人乖刺且所許二十萬斛糧米不以給之金人愈怒欲棄盟入攻童貫落致仕復拜河北燕山府路宣撫使如太原貶稹順昌軍節度副使北征紀實曰談稹者亦巨璫也初無異能但梁師成黨貫致仕故師成黼引稹以為河東宣撫副使實代貫事俾交割山後雲中府其地則朔武應蔚諸州者直我河東路與代州對境皆多要害金人實不與我浮沈其辭加我使人二三昧利求寵使朝廷日夜益生希覬然不與我也及稹出師至太原經營山後㑹是時金主阿固達死于白水泊以喪歸國其守國之弟烏竒邁立俄尼堪亦暫歸其國初立未暇撫治山後故朔應蔚三州守臣皆通我我又招降之降日朔寧軍遣河東將李嗣本以兵戍焉又運芻糧玉帛以餉之事曽未訖是冬尼堪已歸雲中因來治此于是三州率反以歸金人金人亦以兵至嗣本大敗狼狽僅脫朔應蔚乃復歸金人稹但坐視束手徒搜珍異珠玉以自入久之事不成怯弱退敗尤玷中國威靈上悵然不樂而二師復得入言罷稹歸後乃以太原張孝純為宣撫副使焉政和間有北伐之議上遣內侍談稹銜命河東河東諸帥訪其用兵可否真定府安撫使洪中孚答稹以為不可稹遽奏以老耄罷之行下中孚令具的實利害中孚遂具奏曰顯謨閣直學士中大夫真定府路宣撫使臣洪中孚今月十二日准御筆以臣議論收復燕雲故疆與諸帥臣異同仰具的確利害聞奏臣恭依聖訓條具如後一臣前奏政和三十年可大舉者正以朝廷嵗賜幾百年皆積燕山暨山前後州糧糗頗豐編氓冨盛庶幾有玉帛糧草人民可因獲其土地之實而謀臣不於此時建策今日徒餘空城機㑹已失不可復舉諸路帥臣皆不知兵情而執燕雲不根之語云我本漢人陷于塗炭朝廷不加拯救無路自歸何啻大旱之望雲霓若興弔民偏師不獨簞食壺漿當以香花樓子界首迎接也臣久厯邊鄙知敵情此乃游手之人不能自存者覬覦南歸竊其爵祿實非大姓之言臣契勘維持契丹者自公卿翰苑州縣等官無非漢兒學誦書識字者必取富貴豈不知國家英俊如林若南歸其權貴要途燕雲數州學究安能一一遽用此士人無歸意也饘粥粗給者已連姻戚里而劉六符相遼疾且篤耶律洪基臨問遺言燕雲實大遼根本之地願深結民心無使萌南思也洪基乃詰其深結之道六符對以省徭役薄賦斂洪基深嘉納之遂减賦稅三分之一兩地供輸者皆知之以人情揆之豈肯捨姻婭而就重斂哉此大姓無南歸意也其香花樓子之語果可慿乎一積委不厚兵家所忌稽考朔部河東糧草若用武不免添屯租給半年如下山後諸州年前傾朝廷帑藏不足以支一嵗第不知獻謀者以何策贍其後一承平日久而兵驕將惰動輒糜潰而欲以己無紀律驕兵伐人之國何異緣木求魚萬舉萬敗其理必然徒自取辱國喪師而貽患於將來也一權貴以侈麗自矜而賤節義海宇匱乏小雅盡廢四維不張方且虞人乘我何暇謀人臣未見其可也伏望聖慈早回天心特降􅌖㫖內修文德外謹邊陲思患預防以偹不虞切勿輕忽以取不可測之禍重念祖宗積纍二百年太平之基以宗廟為念福庇黔黎萬民幸甚臣䝉國厚恩雖粉骨碎身未足報稱茍有聞見豈敢貪默以避黜責迎合權臣上罔陛下為茍容計以危社稷若謀臣必欲收復燕雲故疆臣雖萬死不敢恭奉詔㫖伏望陛下誅臣以謝謀臣專委經營收復庶幾他日誅誤國者以謝天下而不得幸免也臣暗昧不燭事機愚忠所激義不顧身語言抵忤上黷天威甘俟斧鑕右謹録奏聞伏候敇㫖謹奏北征紀録曰政和之間臣僚贊北伐者自薛嗣昌始倡成其事自侯益始又上嘗遣巨璫談稹銜命河北河東諸帥訪其用兵可否當是時侍從之臣往往能守正或以是被罷守正者如韓粹彥者是也上怒張杲拒董才事誤董才後賜姓名趙詡得罪改命粹彥守中山而粹彥當陛辭對上曰國家之事奄有四海安用是一彈丸土上亦不之罪被罷者若洪中孚張毣之徒是也中孚答稹以為不可又以故時內臣禮待之蔑視稹遽以老耄罷張毣為保州通判以為遼人之勢雖數為女真所挫然上下未叛其國尚立保州極邊皆偹詳之但邊帥往往迎合探報不實多裝㸃事端以誤聞聽遂得罪自餘亦罕有唱和者獨嗣昌纍帥太原河朔于諜人之辭往往潤色以希禁密意每陛對論北事輒請興師多至涕泣以刑部尚書因上殿劄子指定刑名遂被黜北師未興時已先死然嗣昌每事猶關白宰相其後侯益者一切出童貫之門但入奏內侍省造端之罪莫甚于此十八日壬戌大赦天下門下禁暴者以不殺為武本仁義以行師域民者以博愛為公兼威懷而示德朕紹承丕緒統御庶邦誕保愛民昭上帝溥將之命克篤前烈恢前人燕翼之謀興念燕雲久阻聲教故家望族盡為俘纍之臣廣谷大川阻𨽻職方之籍初侵邉境漸入封圻方藝祖肇基實軫念民之慮逮神考嗣服深惟復古之圖欲成繼伐之勳必大因時之利蠢茲裔土輒背世盟既種落之內訌復神人之切憤惟春秋以王者大一統方隆廣覆之恩而要荒知中國有聖人咸起來蘇之望整我師旅徹被土疆寒律收威見天心之助順壺奬載道知人意之樂從來閲再期悉平兩路岡蠻靡迤東踰碣石之封亭障蹇翔西軼榆溪之阻分州畫野興教厚民拯百年塗炭之餘咸躋夀域還五政衣冠之舊復睹華封一新象緯之清明丕變羣情之闓澤自今以始永綏夷夏之寧與物為春均霈遐邇之澤可大赦天下於戲兼弱攻昧闢土宇以昭章發政施仁浹海隅而丕冒咨爾有衆咸體朕懷九月十八日壬辰祕書省祕書郎賀允中充大金皇帝賀正旦國信使二十七日庚午禮部員外郎王昂充接伴大金國賀正旦人使十一月三日丙子太傅楚國公王黼致仕仍舊神霄玉清萬壽宮使御筆王黼陳乞致仕其應恩人數從朝謁禮數等一切並依蔡京例施行仍給節度使俸童貫遣保州亷訪使者馬擴兵州觀察使辛興宗入雲中見尼堪共議交割雲中事苑齊自叙曰僕將行童貫呼李宗振辛興宗企宗永孫渥姚友仲杜常蘭整洎僕十數人環列以金杯酌酒第飲貫曰山前任帥非材已生弊病今割得山後擇帥非細事爾等各舉所知宗振等自陕西六路河東北諸路武臣遍稱舉之貫皆搖首云此太平地分可作邊帥也後新邊須得一文武兼通智勇公亷識諸國人情者然後可用非吾馬宣事不可也如公鎮守雲中用幾何軍馬僕曰當用三萬人貫曰國家闕乏尚可損否僕曰至微非萬人不可若雲中屯萬人則萬人分諸處已少矣貫曰二萬人則可辦每嵗當以三百萬緡資軍凡有辟人材當一一依從如此幾年可以成就僕曰一年則費力二年即省力三年即得力矣三十日癸卯馬擴至雲中烏舍不見而回苑齊自叙曰月末抵雲中是時尼堪歸國謀南侵留烏舍權元帥遣人來令使人參拜僕辨論久之烏舍使髙慶裔來云二觀察既不肯拜不敢固必亦不敢相見山後土地切緣相國暫歸此中不敢專擅兼貴朝收了燕山逃去職官誓書所在各不得收納叛亡貴朝已先失約山後地土雖係所許難以便行交割僕答職官冨民逃歸乃張覺之罪本朝已斬覺首函送職官冨民見今搜刷遣回即非納收叛亡如貴朝言定山後更别無經略及至先交了蔚州却縱兵馬取奪本朝不敢占護恐致紛爭朝廷已責談稹再委童太師此望相照早得交割了當使兩界生靈安堵今若輕信羣下之言則兩朝和好大事何時是了慶裔曰前日人言蔚州有賊兵本朝已發軍馬去剪除却得貴朝宣撫司文牒遂且放縱教歸今來山後地土已是許了到頭翻悔不及只是貴朝敦篤誓好無相惱觸女真家純實必無相誤處前來纍有文回去將職官户民早發過來便是交割十二月馬擴自雲中還至太原府茒齊自叙曰十二月上旬還到太原府童貫詢境上所見對以金人編埒漢兒鄉兵增戍飛狐靈邱每以張覺為言邀索所失官户觀其舉措甚有藏畜願太師速營邊偹移陕右兵助郭藥師以防金人不測入寇不可忽也貫云他國內人心未附豈敢如此當親到燕山措置常勝軍及制置河北諸帥兵便他敢來時亦不失事十七日庚申盧益子久館伴大金國賀正旦人使令先次上殿三朝北盟㑹編卷十九
