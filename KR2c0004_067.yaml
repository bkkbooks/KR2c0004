body:
  text: 三朝北盟會編卷六十七宋徐夢莘撰靖康中帙起靖康元年閏十一月十四日乙巳盡十六日丁未知淮寧府趙子嵩牒繳順昌府等處勤王并備坐蠟彈報諸州又募賫蠟彈奏狀牒曰恭惟太祖皇帝創業垂統救斯民于五代塗炭之中二百餘年間恩浹骨髓今天子慈孝恭儉視民如傷夙夜謀求盡復祖宗法度將以便民近者邊境失偹金兵再至京闕尚未退師天下之所痛心兼聞敵騎所至務戮生靈劫掠財物驅虜婦女焚毁倉屋産業意欲盡使中國之人父子兄弟夫婦不能相保狼狽凍餒歸于死地以逞其無厭之心逺近之民所共憤疾况朝廷信賞必罰此正豪傑奮發上報君父下保室家之時所當身兼臣子情同休戚朝夕疚心不敢少寧須賴鄰境犄角輔車協心戮力以捍敵勢以藩王室近奉密詔許結集義兵人自為戰節鉞以下並以充賞請諸郡體國事不可緩公文到日各逞忠憤多方措置廣行招集或素著信義為衆推服或武藝絶倫謀略可用或膽勇敢死不論軍民出家子弟等務在存恤激厲使人人自奮知上尊君親下保家室圖富貴免殺戮虜劫之患轉禍為福其力甚大候見得人數開保當所以慿遣官部押使喚其立功等申奏推恩必不虛示右牒順昌夀春府蔡舒蘄黃光州信陽軍請照會協心同力毋懷異意共圖國事仍先希已如何施行公文回示又偹坐所準蠟彈指揮報諸州牒曰今月初二日準樞密院差人賫到劄子奉聖旨見今金人圍逼京城裏外軍民悉力守禦正賴諸州軍糾集軍兵及民間強壯等人速來應援平時被受國恩當危急之際坐視不救豈臣子之義今特遣人間道馳諭候道疾速率衆不限里數星夜前來直至都城下聼候指揮今來南道總督管張叔夜率先勤王才到第一日除延康二日除資政三日除樞密院僉書今諸路并州郡若能逺來勤王不拘官職尊卑亦當依此推恩仰諸路并州軍限指揮到立便遣人遍諭前路互相聞報于本路帥臣或監司或郡守應懷忠顧義能效臣節奮力為國之人即以便宜速行團結軍兵及糾集民兵等星夜前來勤王其所用糧食盤纒仰監司州縣逐急權挪應付雖于法有礙亦宜支用如官司委為闕乏即委曲説諭上户權行假借候明年與量免嵗賦之半今既團結兵衆有能糾率善部轄之人自當便借付身公據補與名目以為激勸緣所差人既獨身往即難為更賫上件文字仰諸州體認此意以便宜補授如白身人文官自迪功郎至宣教郎武官自副尉至從義郎各隨地借補候到闕急告正授若有官人亦當加借今劄付陳州準此右當所偹録聖旨在前誠已火急應依聖旨措置施行外須賴近鄰諸郡協心戮力共濟國事今牒頴昌夀春德安府蔡廬光蘄黃濠州信陽軍請火急遵依聖旨指揮施行仍請貴郡體國不可少緩以失機會公文到日各懷忠義多方措置疾速團結施行又將招集到人關報當所希已如何施行公文回示以今月二十三日開封府百姓陳貴到府稱奉差同張元賫文字至本府及蔡蘄州內張元將帶文字不見陳貴不知處分何事臣所遣統領官趙安十一月二十三日押團結軍民六千餘人去尋訪張元不見遭馬衝𣪚縣尉二員不知存亡本府自十一月二十五日後來四郊日驚劫屢至城下堅壁固守上下一心竭盡努力諸縣及順昌府蔡州縣鎮皆已殘破臣義兼臣子情同休戚日夕痛心伏乞别降密詔庶幾遵奉臣聞近臣郡敵騎多以潰卒為鄉導若朝廷那兵來京畿郡勦除攻討以斷糧道其利甚大臣聞胡直孺在黎馹杜常在頴昌范納馬忠在南京伏望聖斷責使效命毋令端坐觀釁臣見多方措置守禦謹募到百姓張澤隨陳貴前去伏乞聖察回降指揮康王同門下侍郎耿南仲起兵于相州中興日記曰康王在相州磁州衛邢洺等州百姓諸豪皆詣各門乞募民兵王以奉使出未得進不敢擅起兵且已遣價賫蠟書奏陳河北事宜及軍民之情是日門下侍郎耿南仲自衛州至相州初敵騎逼京城南仲宿城外聞康王在相州即夜馳至相不復言割地事乃詐稱面奉皇帝聖旨盡起河北諸郡兵入衛王曰兹有名矣乃牒南仲連銜出起兵馬時南仲以門下侍郎出有堂吏數人隨行故行移皆稱上意于是相人之豪俠者踵王府有李秀才者上書盛稱南平李氏羅蘭氏鶴壁田氏三富族乞召募民兵所用器甲所積錢糧乞不從官給人人自偹上令呼上書人李秀才商議南仲伯彥召到李秀才具説三族者未易致須以酒帛差官禮聘以來之若肯來願與接坐使肯出力南仲伯彥乞王從所請乃遣安陽縣巡尉齎幣以往仍以文檄勸諭巡尉既往遂招三族子弟來伯彥待以賔禮既退李秀才者復通謁且曰諸人各願聚三千人不煩官中贍給各自偹錢糧器甲每家只乞請空名補官牒三五百道仍每家子弟便乞五人名目於內差四人充管轄所貴三千人有所統攝乞差一名本村巡檢所貴各家發遣了三千人後本村有本家巡檢彈壓緩急可以驅使人户以禦盜賊伯彥稟王乞量與應付於是逐家子弟各借補進義副尉三人給帖差充部户頭各借補承信郎每人請空名官牒二百道云十五日丙午大雪駕亦登城三軍鼓舞萬勝門戴樓門縱民樵採割地使聶昌至絳州為絳人殺之宣和録曰先是十一月金人長驅駐軍懷州不行者十餘日乃遣大師王芮楊天吉持誓書來朝王芮楊天吉云兵已臨大河國城咫尺間兩國戰爭纍年生靈塗炭之久比緣小人用事起此兵端今欲休兵講好以誓書遣臣等來復兩國之歡好止求割故地以河為界上不得已從之王芮曰今蒙陛下惇信許和乃兩朝休兵之幸然未知陛下遣何人報聘上曰待擇人芮曰春時議和還師以三鎮為約陛下遣張邦昌路允迪割地皆臨時驟進銜命而往果見中沮遂有失信之事所以至今傾國而來蓋理會今春不割地失信公事也今陛下不遣左右親信大臣一往若如前舉必不取信金國芮等無固必看陛下如何耳上命唐恪等議遂以門下侍郎耿南仲同知樞密院聶昌聘焉是月二十三日受命昌入對曰陛下委臣使事臣不辭但臣短見深恐許和割地之後金人失信復來臨城臣若止傳國書實為無益且兩河之人素徑至太原守孤城經年降破而復守人人死戰蓋不負祖宗積德之靈陛下恢復之志而今也下太王遷邠之令用保生靈恐彼方之民深戀國恩不忍捨陛下以從仇敵之國則未必可號令也萬一號令不從則臣必為金人所執不能為陛下努力則臣死不瞑目矣臣若詣軍前議事不成敵兵南渡乞以便宜分遣徽猷閣直學士參議官劉岑朝奉大夫幹辦官滕牧分路催勤王之師入衛亦臣區區之願上曰甚好當降指揮昌曰降指揮必喧傳喧傳必漏泄則事不成矣只乞陛下密記淵衷遂命取黃絹御書賜昌曰聶昌議和不成敵師南渡可取晉絳路入京兆率諸路人馬入衛王室劉岑滕牧取嵐靈路催起陜西等路勤王軍依奉使法內滕牧與直除祕閣體祖宗社稷朕不敢私靖康元年十一月二十二日御押付聶昌是夜昌同官屬出宜秋門宿瓊林苑明日啓行至望京橋逢遊騎二十七日至永安軍孝義橋遇尼堪中軍約明日相見尼堪隨行立閣門明日盛甲兵之衛接見使人其閣門舍人止曰徹傘用榜子贊名引見國相昌曰國相金國何人也舍人曰宰相元帥昌曰既為宰相元帥乃金國之臣也昌以南朝大臣止當以敵國臣子客禮相見豈有南朝大臣臣禮見大金臣子乎舍人曰樞密不畏死昌曰主憂臣辱主辱臣死死不足畏節不可屈爭之移時尼堪既不能奪乃以客禮接見于氊帳中往反議論終日尼堪云我兵已南渡且到城下候樞密院割地回日方旋師蓋以南朝曽失信也昌曰皇帝仁聖未嘗失信於天下頃以童貫王黼茍利忘義失信大遼致今日國家有意外之難非國家失信於大金也且國相今春歃誓結和勒兵北渡今復背約南侵非金國失信耶尼堪曰不敢廢和議止候得地昌曰被命而來不敢輒易若國相兵不北還昌雖死地亦不敢割尼堪大怒入後帳中約退昌昌歸館不給食者一日加兵圍其舍二十八日以太師楊天吉擁千兵館伴昌往河東太師王芮以千兵館伴耿南仲往河北二十九日昌北行不得復見尼堪至閏十一月初四日至澤州昌召參議官劉岑幹辦官滕牧出臨行親御劄具説前降之語曰當與公等誓死成事是日召大金館伴太師楊天吉曰國相待昌之還方肯歸師臣子之心急于星火奈以道路遙逺莫得疾速欲分遣屬官往東路昌自行西路會于河中不二十日之間此事畢矣庶得國相早肯班師楊天吉等謹諾遂分差戍使王敵郭天信以五百兵館伴劉岑滕牧往河東楊天吉親伴昌行其議遂定明早分路而行十二日昌至絳州城下門不開郡尹逃盡唯有監倉趙子清者領州事郡人聞割地大怒出兵掩殺昌遺史曰聶昌往河東割地而劉岑為之副與金使偕行至絳州知州通判皆已棄城走城中以宗室子清權知州事昌令岑與城上語且將告以人主在圍城中憂危不安宜速割地以退金人之兵岑許之至城下問守者為誰子清曰知通皆棄城走百姓無依謂子清為國家宗族遂衆推子清權知州事公是朝廷官乃與金人同行得非欲割絳州以講和乎岑曰聖上方危而不安君能割地則割地以紓朝廷之亟如不能割地何不起河北之兵勤王保衛社稷絳人怒昌之割地而喜岑走陜西張師雄指都堂論當用厚賞重罰以激厲將士遺史曰金人連日攻城其勢危甚將士出戰者酬賞太輕故人不用命師雄因叩宰相何栗馬前大呼曰有已見破敵利便乞請都堂取稟栗馬上呼曰請赴都堂相見師雄入至都堂取稟栗乂手斂身問有何計䇿師雄曰敵人晝夜攻城不休相公以為安乎為危乎栗曰可謂危矣曰相公料京城可破乎不可破乎栗蹙額曰此不必言也師雄曰今日之事别無竒謀祕計可以退敵唯有不惜重賞傾府庫以賞將士激起其貪金帛官爵之心乃可以敵耳栗曰非不厚也師雄曰今日之賞不百倍不可謂厚因出劄子大略言方今天子坐圍城中非錙銖毫髮計功頒賞之時前日統制官髙師旦以血戰而死朝廷何惜捐黃金數百兩銀數千兩絹數百匹以賜其家并録其子息盡與師旦見任一般官爵仍賜第宅祿廪贍養其屬則統制將帥不患不戰矣又如軍兵出戰果入陳交鋒但不是怯敵退走之人則犒銀絹其有獲級者每一級别賞銀百兩絹百匹不為多也用銀一千萬兩絹一千萬匹可以獲十萬級信能行此不唯軍兵出戰爭功百姓亦不惜命而往矣其間應得官者仍第授等官彼亡歿者往往是先登效命之人亦以獲級例支銀絹賜其妻孥有竭力鏖戰以死者厚以金帛旌别之寵貴其英魂官其子孫則軍兵不患不戰矣又軍兵平日飢寒當今日用人之際以單寒之身暴露在風雪中誠為不易緩急敵人攻城欲其盡命以相拒不亦難乎請括在京質庫户每家出偹十人綿襖綿褲綿襪納襖納襪除鞋外並不得用布如敝損不堪及綿薄之類皆重作行遣一萬家可得十萬人衣服溫暖如此然後軍兵樂戰而忘死矣師雄亦開質庫願先倍于衆人出偹二十人衣裝然將士之心可利動出金銀錢絹于諸門上堆垜揭榜云犒賞出戰將士之物應受賞者日下支給此蓋狙公賦芋朝三暮四之法用得其道可以得人之赤心人心不患不勇矣且金銀錢絹在今日不足惜萬一防守踈虞雖一撮之土一勺之水一寸之草皆為敵人之所有以此思之傾府庫激厲將士誠為長䇿假是日用銀十萬兩絹十萬匹一嵗之計不三千五百四十萬匹兩耳國家府庫儲積幾二百年豈不能支數年之用又豈有積年受圍不解之城大抵有功則有賞將士有功則敵人減數必無增添之人以數計府庫未盡敵人減數滅無遺類况宗室戚里權貴與形勢富豪之家不可勝數或圍閉半年不解則人人不惜家資必盡出之以助國家賞戰士此何疑哉栗讀畢大笑曰平常之論特厚而已誰不知師雄曰天子坐圍城中憂在旦暮宗廟社稷危如綴旒不用百倍之賞激起將士之心何以退敵願相公毋忽若此䇿果行然後第二䇿可以兼行耳栗問之師雄曰厚賞既至不可無重罰以督責之如出戰不用命或見敵先郤當推戮其妻孥使其親見然後斬以徇衆則人人知慕爵賞而畏族誅雖怯懦者變而為勇鷙矣栗曰賞罰者有常典皆不宜過師雄曰今日乃非常之時不可以常法治不用不妨但恐後悔無及耳栗曰但容理會師雄曰事急矣不可待也今日國家宗廟社稷兩宫至尊后妃嬪御諸王姬及滿城數百萬生靈皆寄于守城官兵之手若進戰則俱存或退那一步則後變有不可言者相公試觀諸軍兵隨身衣裝不得溫暖外有籍在否天下國家宗廟社稷之重付之於無所籍在之人其利害輕重不同逺甚在彼者利害既輕責其宣力效死不亦難乎師雄每思至此心寒膽碎若能以厚賞激其戰心使人人皆有希覬富貴之路則彼此有所顧藉不患其不效矣願相公以兩宫至尊坐圍城為念不可以邊陳將士立定賞格為比栗曰甚好謹拜教便當即行師雄遂退上命以武功大夫空名告一道并金帶一挂于待漏院側募人能捕戮金牌將一人者給之揭示賞格自獲部長逮小畨等賞各有差姚友仲奏兵既不用金人攻城益急乞遣使議和為便先是金人初至闕下姚友仲與諸將議擊之便幸其逺來敵衆必疲方到未陳誠能選精兵六萬出四門分布乘勢而擊之出其無偹衆必潰亂有可破之理至此日復一日敵勢愈盛援兵不至士氣沮壞雖悔無及時唐恪正主和議恪不信之逮敵攻城既急罷唐恪相何栗友仲料敵有可和之理乃奏劄請和是時何栗復主用兵且料敵兵糧不繼不日就擒恪雖主和議而未嘗決栗雖主用兵亦未嘗用是以友仲丁特起之奏俱不得行要之恪謬而無斷誤于前栗剛而寡謀誤于後李擢降兩官盧襄落職宫祠時金人填塞南壁護龍河李擢不能當察降兩官初上城以松明為束懸以鐵盆然火照城外更偹守視敵渡河箭炮俱發故敵不能至及擢守南壁防偹廢弛或夜不燃燈踈暗故敵得乘間塞河遂附城劄寨攻城愈急金人攻東水門聖旨宣化門東濠河內敵兵絞筏盧襄以疾全不措置不自請罷滋長敵計可落職與宫祠李擢喬師中坐視敵兵進筏濠河中三分之二顯見守禦無方各降兩官為弛慢不職之戒十六日丁未駕幸南薰門是日雨作泥深敵于陳州門近東填壘濠池於皮洞子內負土矢石不能入詔許人輸財助國揭示賞格以田灝劉韐為南北壁提舉官初中書舍人李擢為南壁提舉官給事中安扶為北壁提舉官擢於城樓上修飭坐臥處如晏閣賓館日與僚佐飲酒烹茶或談宴或日醒醉守禦使孫傳王宗濋宰相何栗皆知而不問將士莫不扼腕者本壁統制官何慶源告擢敵人以木板壘橋渡河橋將成矣請如北壁於城下用􅀈車弩施大箭射洞屋使洞不能藏人則橋不成擢不從故濠不數日而填成是日上幸南壁見護龍河填壘已盡又知北壁亦填壘甚憂之張叔夜曰臣願率衆出城以計破之若徒守空城則天下事去矣上堅不從乃以李擢安扶全不介意罷之降擢兩官以田灝劉韐為南北壁提舉官三朝北盟會編卷六十七
