body:
  text: 三朝北盟會編卷二百宋徐夢莘撰炎興下帙起紹興十年三月盡六月六日己酉三月韓世忠張俊嶽飛來朝永興軍路經略安撫使張中孚及其弟中彥來朝張中孚中彥自陜西來赴行在也郭奕為之詩曰張中孚張中彥江南塞北都行遍教我如何做列傳人皆道之禮部侍郎蘇符使金國至京師而還四月徽猷閣直學士環慶等路經略使趙賔來朝十七日辛酉張中孚加檢校少傅充醴泉觀使張中彥加龍神衛四廂都指揮使提舉佑神觀趙彬為兵部侍郎鄜延路經略安撫使郭浩為永興軍路經略安撫使熙河路經略安撫使楊政知興元府田晟為涇原路經略安撫使知金州范綜為環慶路經略安撫使王彥權主管鄜延路經略安撫使司公事王彥字才淑潞州人好奢喜佞矯偽不情劉綱為應天府路兵馬副總兵劉綱字公舉泗州招信人位之子也劉綱知宿州先是劉綱除南京總管道由泗州闕伯路問泗州司法參軍孫守信不相干如何守信曰不然泗州者綱之鄉郡綱在南京可與泗州為斥堠且他日綱必知泗州請用平日待發運使之禮伯路然之往龜山迓綱與伯路語綱語辨博伯路大奇之綱往招信息憤有報綱知宿州至靈壁會金人敗盟再入京師綱遂回招信五月李綱贈少師諡忠定諡議曰始公自起居郎極論都城災斥為姦黨而抗直之聲震天下矣及幹里雅布來在廷茫然將從乘輿以出獨公請與執政辨語遂奪其議力守京師而敵已退怯然其請留割三鎮詔書擊金人之歸而敵兵必防其再至為同列阻之不果為用也髙宗中興首命公自輔於是張邦昌以僭逆誅夷先是河北河東路堅守者綱建議遣張所傅亮往援之乞幸襄鄧以係人心而無走東南使周望傅雱通問二聖而無踵和約時中原尚未潰也方除京黼亂政漸復祖宗舊法奏請施行數十事多中機要使稍得歲年之需則兩河不遂陷而敵不敢鼓行入內地矣而仇恥固可報也不幸又七十五日而罷去迄其後常疏外坎壈雖僅免顛沛而曽不少得其意焉自是禍難百出而南北竟以分裂此為國家惜者所以哀公之志而深悲夫相之不終士至有未嘗識公面而坐論救公以死彼豈有所願望附託而然哉善公之賢自當時市井負販莫不喜為之道説然而謗公者亦衆矣其尤甚者罪公特以計取顯位而已京師之禍公實使之嗚乎當是之時所謂謀國者豈有他道哉避走耳乞和金人而平中國耳以避走乞和金國卑中國之人而議公之得失故其自許為謀詳慮密而謂公為略而疏自以為鎮重能消弭而謂公為輕鋭而喜事其恬視君父之仇畏敵持祿甘為世所賤侮而以公之能以身徇為人望所屬者謂為朋黨要結以自營故主和者非致冦而守京師者為失策矣則公之負謗于時固理之所宜得也何足辨哉顧獨有可恨者夫是非毁譽之相蒙亦必至于久而後定論是從古以然者也公之歿五十載矣世之論公者卒未有以大異于前日也何歟孔子嘗論管仲之相桓公而稱之考公之行事而深察其志使要其功烈之所成就則豈有愧于孔子之所稱也哉悲夫謹按諡法慮國忘家曰忠安民大慮曰定請以忠定為公諡謹識庚辰詔置敷文閣官屬詔曰恭惟徽宗皇帝躬天縱之睿資輔以日就之聖學因時致治修禮樂恢學校發揮典墳緝熙治具宸章奎翰發號施令著在簡編者煥乎若三辰之星麗天垂光賁飾羣物所以貽謀立教作萬世者殆與詩書相表裏將加裒集崇建層閣以嚴寶藏用傳示於永久其閣恭以敷文為名祇遹舊章宜置學士直學士待制直閣以次列職備西清之咨訪為儒學之華寵其著于令金人敗盟烏珠率李成孔彥舟酈瓊趙榮入豫金人以還我三京河南地為非便因大悔悟遂定議背盟復侵三京河南以烏珠為帥提兵渡河先是兵部侍郎張燾詣永安朝陵回奏言敵情反覆難信乞謹備仍乞陜西早命大帥宰相秦檜不主其説俄除燾知成都府燾又奏前此之蜀者例皆舟行至荆南則舍舟遵陸臣請取道京洛由關陜以往因觀形勢利便宜得與宣撫使議事上嘉而從之燾入潼關已聞金人有敗盟之意逮至長安諜者絡繹來言敵還至已渡渭河矣蜀口舊戍兵自講和之後悉以分戍陜右燾遽行見宣撫胡世將具言蜀口關隘不可無備世將問備禦之策燾曰和尚原一帶在蜀最為要害自原以南入川路口散漫不一若失此原是無蜀也世將曰保蜀之䇿莫急于此蜀口舊戍皆精鋭最號嚴整自朝旨分戍之後關隘撤備世將雖屢申請未見行下試為籌之燾遂為草奏事勢危迫之時乞速降旨揮盡陜右所分戍兵還蜀口又請乞賜料外錢五百萬貫以備緩急朝廷皆從之故得以保全蜀卒以無虞十一日甲申金人圍京師留守孟庾叛降于金人金人背盟留守孟庾倉皇不能自處統制王滋願以兵護庾奪門而走還行在庾以金人多不能遽去遂以京師叛附于金庾當要津被眷遇甚厚一旦不能守其節人皆恥之先是劉豫僭偽有郁臻者以吏職出身獻屯田之議豫大喜行其䇿而果獲利濟豫曰前朝以虛譽用人惟尚科舉至宣和靖康間設科者進士及第之人也我則不然惟才是用不問門閥與出身乃以臻為秉義郎充閣門祇候官及金人之交還三京也召臻赴行在臻見秦檜檜􅙳衣不禮焉既而曰劉豫國祚不承者蓋由任用此輩而不用士人也臻銜之而退後復歸中原及金人背盟復據京師尋訪臻而得之喜曰南宋不用郁臻而棄之鄙其不因進士舉耶乃用為陜西轉運判官西京留守李利用棄城走初金人再有復取河南之意河外豪傑密以報河南府兵馬鈐轄李興興告留守李利用總管孫暉曰雒陽實居衝要重地西連關隘東接王畿南通巴蜀北控大河可以屏衛襄漢况國家陵寢所在不可不注意也利用與興招集忠義欲密為防禦計不數日得萬人暉大驚而懼之欲以非其罪害興會報金人渝盟已渡河利用得報即望風潛遁興初聽翟興節制屯於商州劉豫得襄漢其勢漸盛乃附于劉豫令興為鄜延路兵馬鈐轄後改為河南路兵馬鈐轄國家得三京命興為河南府兵馬鈐轄特換授武義大夫兼閣門宣贊舍人河南府路總管孫暉棄河南府金人陷河南府金人以鐵騎數千據天津橋將薄城下鈐轄李興領七騎逆擊之金人罔測遂退郤于是總管孫暉得南奔而去興自天津橋轉戰至鼎門已侵夜矣額被重傷昏仆于地半日復蘇省記舊路復走外邑聚兵是時金人已入城以李成為偽河南府十三日丙戌金人陷拱州十四日丁亥金人圍應天府南京留守路允迪出見大金人完顔裒為裒執之而去初金人以完顔裒為三路都統知歸德府退地之日朝廷赦書已到裒以輜重先發行最後裒出門即日釣橋更不放人回極為肅靜歸德府者南京應天府也裒在南京久甚得人心無秋毫之犯至是金人渝盟裒以兵數千至宋玉臺使人傳語民故吏與寄居官州縣學生告以不殺不擾之意請路留守出門相見允迪朝服坐于聽事官吏軍民迫之不動允迪曰允迪有死報朝廷耳然允迪乃應天府人衆以保全鄉郡為辭請之終日允迪不得已出城見裒于宋玉臺允迪為主裒為客衆人又請允迪過盞不得已又從之裒復過一盞即執送允迪于烏珠裒遂鼓吹入城秋毫不擾或聞允迪在京師七日不食死惜乎不死于應天府城中也十八日辛卯李寶敗金人于渤海廟李寶興仁府乘氏人也少無賴尚氣節鄉人號為潑李三京師陷偽地金以為濮州知州寶聚三十餘人謀殺知府歸南不捷脫身走濠州知州冦宏接引差人伴送往行在朝廷以方議和不用寶欲送于韓世忠軍中寶不願會嶽飛來朝寶以鄉曲之故往見飛願歸飛令寶同歸鄂州以為軍謀猶未見寶怏怏時思鄉中忠義之人遂有歸北心乃結連四十餘人各持一大杴約日就江下奪船以杴為棹濟渡前期敗露盡捉獲之唯寶言乃寶之罪衆皆不預飛奇之送繫獄拘繫三十九日有北報金人將擾邊出寶于獄問北方事寶言願歸京東會合忠義人立功飛承局李成贈銀一鋌令越偽界得忠義人發遣八百餘人走飛軍飛壯其志遂給付武翼大夫閣門宣贊舍人充河北路統領忠義軍馬依舊黃河駐劄併付空頭文牒令以次補官時紹興九年也十年金人敗盟是時寶在河上滑州境內梁興在太行山寶約興與同舉事興探得金人兵重不從金人渡沙店圍京師留守孟庾投拜既而知興仁府李師雄亦投拜寶方在龔山西山上具聞其詳乃率衆沿河掠舟順流而下漸至興仁府是時烏珠欲南侵而慮寶在河上遂復回至荆岡人馬困乏皆熟寢寶探聞荆岡之東二十里渤海廟下有金人尤不整亦熟寢乃與其次孫定王靖約夜半襲殺之遂分兩路各率衆乘舟分上下水而進寶與曹洋作一路之渤海廟見金人馬果困乏熟寢不覺乃次第以刀斧擊殺數百人定與靖亦至併殺之金人漸有覺而起者已不能整不及乘馬皆走走墮寸金淖下死者無數然遺馬甚多岸髙船低馬不能下寶令殺馬載之以行為糧食由是一馬活斫為四五斷自岸推下盡載而去蓋五月之辛卯也質明金人以精騎來援已無及積尸而焚之烏珠聚河南河北兵捉寶不獲守之半月餘乃南侵順昌有樞密院準備差使兵延世者先差在興仁府劄探以金人復取河南方圖南歸備聞寶等在荆岡擊殺金人事延世漸隱居覓路歸朝具言寶之克捷事故朝廷知寶在河上擊殺金人恨未能得寶而用也二十日癸巳知亳州王彥充叛降金人金人敗盟報到行在初得河南之地也秦檜親戚鄭億年自偽境還朝億年嘗事劉豫為偽參知政事既到朝廷言和好可久願以百口保之至是方一年已敗盟報到行在羣臣皆愀然憂之工部尚書廖剛至都堂會億年在坐剛責之曰公以百口保金人講和今已背盟有何面目尚在朝廷億年氣塞檜不喜謂剛亦譏已也乃曰尚書曉人不當如是耶頗銜之工部尚書廖剛罷廖剛字用中南劍州人崇寧登進士第紹興初纍官給事中有言其不孝之罪而罷之十年復用為工部尚書秦檜銜其在都堂譏斥鄭億年令臺諫論其罪而罷去二十五日戊戌詔論諸路大將各竭忠力以圖大事詔曰昨者金人許歸河南諸路及還梓宫母兄朕念為人子者當伸孝悌之誠為民父母者當興援救之思是以不憚屈已連遣信使奉表稱臣禮意備厚雖未盡復故疆已許每嵗銀絹至五十萬所遣信使有被拘留有遭拒却皆忍恥不問相繼再遣不謂設為詭計方接使人便復興兵今河南百姓休息未久又遭侵擾朕盡痛傷何以為懷仰諸路大帥各竭忠力以圖大計以慰遐邇不忘本朝之心以副朕委任之意金人敗盟報到行在乃降是詔賞格曰兩國罷兵南北生靈方得休息烏珠不道戕殺其叔舉兵無名首為亂階將帥軍民有能擒殺烏珠者見任節度使以上授以樞柄未至節度使以上授以使官髙者除使相見統者仍除宣撫使餘人仍賜銀絹五萬匹兩田一千頃第一區詔激勵中原忠義之士詔曰金人侵擾中原兵革不息已踰一紀天下忠臣義士雖在淪陷之中乃心不忘國家今烏珠再起兵端南北雲擾未知休息之日凡爾懷忠義鄉里豪傑之士有能殺戮者或生擒來獻者并與除節度使仍加不次任使其餘能取一路者即付以一路取一州即付以一州便令久任應付軍所有金帛併留賞給戰士其餘忠力自奮隨功大小髙爵重祿朕無所靳上聞烏珠再稱兵故有是詔給事中兼侍讀馮楫罷金人敗盟楫見秦檜曰金人欲舉兵南下公踈于用兵宜早召張浚以督諸將檜曰善公當來早上殿薦之次日楫上殿奏曰金人南來朝廷未有應之之䇿惟疾召張浚都督諸軍耳上久知張浚敗事乃曰朕雖亡國不復用張浚楫大沮乃乞宫祠遂罷去先是僧圜淨者寓居于王繼先後圃禪學甚髙馮楫嘗經謁之談禪移時繼先欣然欲見之楫不交一言先方慿恃恩寵勢焰薰灼遂大慚逐其僧而譖之劉綱知宿州劉綱知宿州以金人敗盟不能行遂知泗州仍經畫宿州劉錡軍于順昌府劉錡除東京副留守以本部兵馬行乃以舟船乘老小輜重而軍馬出陸方至順昌府承朝旨令分其兵將屯沿京州縣未及而鄜延路副總管劉光逺遁還言金人敗盟事時舟船已入潁河遂急趨順昌錡會諸將統制共議去留或以謂去則遇金人邀我歸路其敗必矣莫若堅守城徐為之計知順昌府陳規亦贊守城之策遂留順昌二十六日己亥劉錡及金人龍虎大王韓將軍翟將軍戰于順昌府敗之召沈晦赴行在二十八日辛丑吳璘將劉海曹淸敗金人于鳯翔府石壁寨六月劉光世加太保為三京等路招撫處置使李顯忠李貴步諒之軍皆𨽻之初劉光世罷軍政也王德以本部軍馬𨽻江淮宣撫使張浚浚以德之衆皆挫鋒百戰之餘其猛鷙為諸將之冠乃名為鋭盛勝德軍德為統制及光世為招撫使也復請德𨽻其軍德堅不從故浚益重之光世辟江西路副總管劉紹先為中軍統制置河池州韓世忠加太保兼河南北諸路招討使封英國公張浚加少師兼河南北諸路招討使封濟國公嶽飛加少保兼河南諸路招討使張浚軍廬州劉錡加昌州觀察使樞密副都承旨沿淮制置使劉錡及金人戰于李村敗之六日己酉金人攻鳯翔府扶風縣吳璘軍統制李永琪楊從儀尚起敗金人於扶風縣三朝北盟會編卷二百
