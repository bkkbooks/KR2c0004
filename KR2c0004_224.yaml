body:
  text: 三朝北盟㑹編卷二百二十四宋徐夢莘撰炎興下帙起紹興二十六年十月二十九日丁酉盡二十九年十二月二十九日丁酉張浚永州居住張浚行狀曰公被朝命以太夫人之喪歸蜀八月行至荆南㑹以星變上降詔求直言公慮敵數年間勢必唘釁用兵而吾方溺于晏安謂敵可信蕩然莫為之備沈該万俟卨據相位尤不饜天下望朝廷益輕顧在苫塊經歷險阻死亡無日不得為上終之懷不自安乃復奏曰臣受陛下更生大恩今至憂迫身涉險萬里常恐一旦死填溝壑終無以仰報陛下萬一思以展盡所懷瞑目無憾臣嘗病世儒牽于和戰異同之說而不知實為一事或者竊儒為姦不知經史切切然利祿是圖而以欺惑陛下之聰明也又其甚則大奸大惡挾敵懷二以自封植其家鼓衆曲說愚㺯天下敢畢陳之臣聞天地之大德曰生而天地生物之功本于秋冬蓋非嚴凝之于秋冬則無以敷榮之于春夏然則秋冬之嚴凝乃生物之基也在萃之象曰除戎器戒不虞泰之九二爻曰包荒用馮河泰萃之聖人謹于武備如此謂不如是不足以生物而行其心也况時艱難而可忽略不省唘大禍于後反謂是為得哉若夫一時之和則實聖賢生殺天下之權商湯事葛矣而終滅葛周太王避狄矣築室于岐未幾謀以却敵詩曰乃立冡土戎醜攸行文王事昆夷矣卒伐之詩曰昆夷駾矣唯其喙矣越勾踐事吳矣坐薪嘗膽竟以滅吳越語曰越十年生聚十年教養彼皆翕之乎始而張之乎終汲汲德政修立而以生殺為心未嘗持利為安自樂其身而已也漢髙祖與項羽和羽歸太公呂后割洪溝以西為漢東為楚良平進言今楚兵罷食盡釋而弗擊是養虎以遺患也漢王從之卒成大業漢文帝與胸奴和曽無間嵗之寧漢文全有天下謂可和以息民方是時百姓猶不免侵陵之苦至武帝始大征伐之其後單于來朝漢二百年用以無事唐太宗初定天下有渭上之盟未幾李靖之徒深入沙漠之地犁其庭係其酋海內始安焉兹豈非以和為權而亦得之哉若夫石晉之有天下則不然取之非其道謀之非其人桑維翰始終主和其言曰願訓農習戰養兵息民俟國無內憂民有餘力觀釁而動動無不成若有深謀者考其君臣所為名實不孚于上下朝廷之上專務姑息賞罰失章施設謬戾權移于下政私于上無名之獻莫知紀極一時用事方鎮之臣往往昏于酒色厚于賦斂果于誅戮以害于百姓朝廷莫知所以御之所謂訓農習戰養兵息民略無實事維翰所陳殆為空言姑欲其信當時必和之說以偷安竊位而已契丹窺見其心謂晉無人頻來侵侮日甚一日後嗣不勝其忿始用景延廣之議僥幸以戰不知其荒淫怠傲失德非一日天下之心已離天下之勢已去天下之財已匱延廣不學不知行聖賢之權亟思所以復其土立其勢强其國急于兵戰之爭事窮勢極數萬之師無一夫為之發矢北向者至今為天下嗤笑言君臣委靡不振服役敵國者必曰石晉云爾仰惟陛下聰明聖智孝心純一即位以來任用賢才金人聞風而畏之于是有議和之事陛下以太母為重且幸徽廟梓宮之亟還和之權也不幸用事之臣貪天之功肆意利欲乃欲剪除忠良以聽命于敵而隂蓄其邪心方國家閒暇之時怠傲是圖德政俱廢而專于异己之忌意果安在哉夫敵日夕所願欲者欲我之忠良淪沒耳欲我之盡失天下之心耳欲我之將士解體不復振其氣耳欲我之懷于晏安以甘于鴆毒耳前日用事者一切狥其所欲甚而畢為之不幾乎與敵為地歟身死之日天下舉酒相慶不約而同下至田夫野老莫不以手加額其背天逆人不忠于君而天下人皆逆惡之如此且此曽不思金之于我其愛之而和乎其有餘力而肯和乎其國中亦有掣肘之虞而和乎其圖之于後而和乎臣謂金有大讐大怨不可復合辟若一葉之分今日之和必其主帥攜離人心暌异姑為此舉以息目前而圖取江淮以去除後患之心其中未嘗一日忘也惜夫前日用事者獨欲為身謀為子孫謀而不知為陛下謀不知為天下國家謀坐失事機二十餘年誤陛下社稷大事有識之士誰不痛心且夫賢才不用政事不修形勢不立而專欲貢誠受命于金適足以招輕侮之心而正墮其計中魯仲連所謂彼將有所豫奪梁王安得晏然而已乎甚可痛惜者也敵國之人何自而畏敵國之心何自而服敵國之難何自而成遲以嵗月百姓離心將士喪氣國亦危亡而已矣臣願陛下鑒石晉之敗而發商湯周太王文王之心用越勾踐之謀考漢唐四君之事以保圖社稷深思大計復人心張國勢立政事以觀機㑹未絶其和而遣一介之使與之分别曲直逆順之理事必有成臣不孝之身親養已絶含哀忍死死其無日徒能為陛下言之而已臣又伏遇祖宗之德在天下至大至厚太平之治多歷年數三代盛時有不能及恭惟陛下稟乾剛之資輔以緝熙之學何治而不致願陛下强其志氣擴其聰明清明在躬如太虛然惟是之從以選賢才以修德政以大基業天下幸甚上付前奏三省宰執沈該万俟卨湯思退等見之大怒以為敵初未嘗有釁嵗時通問不啻如膠漆而公所奏無乃召禍在年嵗間者或笑以為狂臺諫湯鵬舉凌哲聞之章疏交上謂公方歸蜀恐搖動遠方有㫖復令永州居住候服闋日取㫖遺史曰初張浚謫永州居住秦檜既死已令逐便居住矣至是浚進書乞勿信沈該万俟卨二相宜修武備或謂浚無此書險人僞撰而進之又或以為金人令奸細詐作浚進書雖不可明然該卨大怒湯鵬舉迎合二相意乃上言謹按前特進觀文殿大學士張浚輒敢胥動浮言恣為妄發取腐儒無用之常談沮今日已定之信誓豈復能為國家長慮却顧哉徒以去國有年居閒日久朝夕之所希望者唯幾復用爾殊不思紹興初年宣撫于外飛揚跋扈歷五春秋信任匪人殺戮名將輕失五路坐困四川江淮軍民咸被其擾耗公帑而市私恩縱狂言而無良䇿已試之效如此尚可言勇哉議者謂前此權臣曽被其薦故雖洊致人言姑竄近地而已今浚身在草土名繫罪籍邀譽而論邉事不恭而違詔㫖豈知所謂以道佐人主者耶又况居憂者當以孝存心為臣者當以恭順承詔而浚以殺戮為事是不孝也以悖逆為意是不忠也乞量置典刑屏之遠方又言前宰臣張浚學術迂疏智識淺短剛果自任輕肆無謀器小任大自取敗失屢矣去冬陛下施曠蕩之恩還浚貶所復其舊職付以帥閫所以遇浚厚矣浚既銜憂去職理當闔門自省乃復倡為異議以動搖國是不惟安危之計獨狥偏私之見獲罪天下公議所不貸也浚初領兵于陜右妄行誅戮而五路至于陷失暨居宰席措置乖方淮西一軍旋致潰叛天下莫不怨之浚無所施為動必顛躋曽不追省愚愆猶肆大言欺愚惑衆冀于再用殊可駭笑况浚近得㫖揮葬于蜀儻堅異議以倡率逺方之人慮或生患又言訪聞浚之議論每及時政憑愚護短專務之异求售前日之臆說以幸將來之復用臣恐遠方遐徼民聽易惑别生事端有㫖張浚令永州居住候服闋日取㫖葛立方為大金賀生辰國信使梁份副之十二月金人遣使來賀正旦金人以李成知中山府孔彥舟知西京改元正隆元年二十七年金人遣使來賀正旦十月二十五日癸巳劉章為大金賀生辰國信使李邦禦副之孫道夫為大金賀正旦國信使鄭鵬副之十二月金人遣使來賀正旦二十八年正月車駕在臨安府五月金人遣使來賀生辰金人在館館伴副使石清因酒與使客從人有語特與外任日下出門十月沈介為大金賀正旦國信使宋直溫副之黃中為大金賀生辰國信使李鼎夏副之金人遣使賀正旦二十九年同知樞密院葉義問奉使金國回葉義問奉使金國回頗知金人有渝盟意殿中侍御史江徹奏陳慮之有素則事至而安靜慮之無素則事至而倉卒靖康之變可為龜鑑今諸將自和好以來各擁重兵髙爵厚祿坐致寵榮養成驕恣朝廷宜有以懾其心作其氣戰士以伎藝回易專于雜役而又有老弱疾病之不汰逃亡之不補宜有以搜閲之使有閗心而樂為用文武職事平居常患其多差除不行臨事要人則歎其無有當預選實才不宜泥資格觀閥閲緩急非有益矣正月二十一日乙酉復置江州都統制乙酉降㫖江州舊屯軍馬因移戍無以彈壓盜賊可置都統制一員殿前司通見屯駐人共撥三千人步軍司撥三千人馬軍司二千人令所差官更招募二千人合用錢糧令戶部科撥付湖廣總領所仰荆南府差官應副營寨委江西漕李若川措置十二月續觱知荆南府劉錡改除鎮江府駐劄都統制以續觱知荆南府觱十二月庚午視事首論荆南當置一軍即具劄子與宰相曰觱竊謂今國家之勢實在吳蜀而荆南居吳蜀之中最為重地前世六朝之成敗興衰載于方冊者亦可見矣邇者北兵列屯近寨哆然有建都雍汴之舉疆場訩訩靡然搖動幸其事暫輟邉人稍安而議者但知聚兵于東南而不知留意于西北使金人窺伺萬一遂徙雍汴則其勢不得不西資巴蜀之饒以為用而南窺江浙之漕以為食也今警蹕臨安則荆南者實江浙之右臂而巴蜀之咽喉也自中興以來三十餘年矣視荆之重如羈縻州郡故北主有移都之謀若不汲汲然長慮而早圖之良可寒心也比聞朝廷經理荆州誠中機㑹少强人意其如兵備單寡形勢削弱未有隱然不拔之固也曷若分鄂渚戍兵之半為荆南久駐之基而潜消北主雍汴之謀乎夫和金人誠國家之福也聖人屈己同人推赤心置人腹中其所以堅盟而守信者尤在于備豫而自治爾者藝祖創業夷門其征伐開拓必先取荆湖次巴蜀而後始及江左孰謂今日實鞏王室誠可易而忽之哉或謂鄂渚之兵控制江南橫邪千里不可分是不然也設使荆南有警自鄂渚援之則沂流而上殊難為功使淮南有警自荆南援之則順流而下殊難為力今分兵于荆則吳蜀萬里首尾俱應國勢自振然後屯田積穀閉關息民寬徭薄賦講信修睦而措宗社于磐石之固矣自後荆南置都統制别創一軍蓋觱唘之也以劄子與吳璘宜持重待敵劄子曰某書生不曉兵事偶緣江閣學士至朝廷俾之暫攝制閫所恃宣撫招討少師相公秉鉞專征全蜀生齒倚若長城如某無似獲竊尸素而又得職事相聞伏䝉纍示守邉良算顧深歎服忽又領此月初二日關牒金兵侵疆百有餘里焚劫關輔欲令三路蹂踐四川窺伺川口相公躬提大兵捍禦想敵素懾威名固已膽破鼠奔矣然某有少管見輒敢漫為鈞座言之庶愚者之慮或有一得耳蓋自符離德順退師雖為小阻而敵所傷斃亦自不少朝廷兼愛南北姑欲休兵息民遂捨唐鄧海泗之地以與之惟敵素無信義一旦拱手得地氣驕志得有輕我之心况彼常獲我民其中偷生負國之徒必有以吾之虛實利害而導之者故復唘其貪婪之心蠶食未巳某愚意以謂敵誠無能為也自去秋以來張大聲勢下令傳檄曰以某日取泗以某日過淮以某日侵均襄以某日圍金商直欲恐脅朝廷冀以必從其欲爾今敵秦川鳩集簽軍鳴鼓大唱殺虜人民焚燒屋廬駸駸天水長道睥眤階城西和以搖興洋此真戲爾豈謀國長慮至計哉某謂相公宜提重兵持重待敵據險守要藏鋒伺隙密遣間探明遠斥堠無分兵以自弱常處于以一擊十之地若敵勢重即將階城西和一帶所積輜重老弱牛羊稍遷近裏而以輕兵邀絶津道若兵猝至敢犯吾之堅可以必勝若彼力窮氣竭而走則吾可以躡蹤而襲此萬全之䇿也昔趙奢號為名將方其與敵戰也有一卒曰得山者勝奢遽從之遂以成功某不肖誠敢自比于此不識鈞座能采之否某以為執事之休戚係四川之安危用敢不避僣率冒昧言之伏冀垂察喋喋皇恐三朝北盟㑹編卷二百二十四
