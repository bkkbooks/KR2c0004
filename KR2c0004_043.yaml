body:
  text: 三朝北盟會編卷四十三宋徐夢莘撰靖康中帙起靖康元年三月三日己巳盡十六日壬午中書侍郎徐處仁太宰兼門下侍郎門下國猶置器安危之勢相形治若循環文質之宜迭用方更張於初載盍圖任於老成人皆曰賢政將焉往大中大夫守中書侍郎徐處仁秉心強固守道端方器博而周知輕薛宜之方略材全而藏用陋黃霸之功名尚猷黃髮之詢實慰蒼生之望朕恭承聖訓嗣守丕基思藝祖之艱難法仁皇之忠厚周封八百國當臨守於輿圖漢制二千條期盡遵於軌迹欲興聖統無踰近臣庸登左揆之崇兼列東臺之侍並增爵秩昭示寵光於戲多難以興在強勉而行道無為而治期垂拱以仰成其蹈古人之為毋負天下之譽可特授通議大夫太宰兼門下侍郎兼神霄宫使唐恪中書侍郎翰林學士何栗守尚書右丞耿南仲尚書左丞御史中丞許翰同知樞密院事梅執禮翰林院學士陳過庭御史中丞簽書樞密院事尚書右丞李棁除資政殿學士提舉南京鴻慶宫宇文虛中除資政殿大學士知青州靖康前録曰前此遣使臣追虛中本欲治脫身之罪是日晚金使入城來和議正乏人奉使乃令虛中行初至敵營與藥師相視而笑講燕中舊好故也使回欲以兩府指畫地界政府皇恐之甚虛中因此為樞密使再往談説令以次官行乃太學正秦檜借禮部侍郎往河間程瑀借戶部侍郎往真定路允迪往太原沈晦借給事中賫誓書入國虛中還朝不自引咎挾奉使之功洋洋然甚有德色尋以言出之青社當時三鎮割地之詔及晦所賫誓書其間有云虛中辭也五日辛未王安中責授朝議大夫祕書少監分司南京隨州居住臣僚上言臣聞賞罰國之大柄人君所以馭羣臣定國是立主威蓋功同賞異則賞不足以示勸罪同罰異則罰不足以示懲昔漢宣帝致中興之盛本於信賞必罰而已自古致治之君未有不由此也謹按大中大夫提舉西京崇福宫王安中性資姦回善自緣飾任數挾詐力圖進取始以小官附會梁師成而進每懷罔上之心不顧事君之節安中以輔臣當閫外之寄其任可謂重矣而安中內則締交王黼外則求合蔡攸童貫論奏者莫非諛説之言稱頌者莫非祥瑞之事至於敵情變詐朝廷所當關防軍民利病朝廷所當存撫未嘗一言及之暨安中還朝坐席未暖金兵乘勝長驅而來使近畿與河朔之民被劫掠者室廬焚蕩資財委棄父子骨肉肝腦塗地仰貽陛下宵旰之憂皆安中等公肆誕謾助成邉外之所致也其罪不在梁師成談稹之下而安中尚以從官祠宫擁厚資優遊自便使安中自為計不過如此實未厭天下公議臣欲望陛下斷自宸𠂻明正典刑投竄逺方上以慰祖宗在天之靈下以為人臣不忠之戒取進止三月四日奉聖旨王安中帥燕日久藥師結逆黨叛命並不幾察懷姦庇惡迹狀甚明罪大責輕言章未巳速將上取旨重行貶竄三月五日奉聖旨王安中責授朝議大夫祕書少監分司南京隨州居住王蕃瓊州安置孫覿妄言太學生伏闕事可别與差遣汪藻上宰執劄子乞迎太上皇還闕某嘗觀孔子陳庶人之孝曰謹身節用以養父母自庶人等而上之其位愈尊其德愈大至天子則曰愛敬盡於事親而德教刑於四海豈不以天子以天下為家顧天下安否如何耳天下安親必與焉古之言孝如舜者亦可以已矣或問孟子舜為天子臯陶為士瞽瞍殺人則如之何曰執之然則舜不禁歟曰舜烏得而禁之夫有所受之也有所受之云者言受至公之道于天以治斯人之謂也捨是吾無以為治也然則徇一切之私害天下之公欲上安君親下治天下古無是理恭惟太上皇帝以二十六年臨御之尊一旦上畏天威舉神器付之主上此堯舜用心也是宜太平之期自今以始然乘輿一出中外悵然非不知天子仁孝重違上皇之心姑順適之而議者謂廟堂諸公無一言救之於扶顛持危之計為不審矣何則以天下飬者其慮不可以不深而朝廷政令不可以不一也敵國外患何代無之致使犯闕為上皇者當痛心悔懼與吾君共守雪宗社之耻慰軍民之心為主者當迎上皇宫中朝夕定省以寬其危疑震擾之念乃使倉卒南征暴露野次越在江海五十餘日未知還期萬一先驅所至有霜露之侵是為人主能以天下飬乎方車駕之出也衣冠皇駭傾國南奔小人之有罪者皆以扈從為名未聞有請於朝而貴臣近侍受國厚恩者率奉頭鼠竄曽無數人在君側為國家守者而朝廷亦未聞呵止詰問也是為朝廷尚有政令乎且四海之師使之勤王者天子之詔也某比過泗州聞上皇之詔止勤王之師守臣皇惑莫知所從雖行宫意有所在非道路所知要之人情觀望不無疑恐既某與軍士雜行天長道中皆口語籍籍以南幸為非有不悅之言所至藩籬雞犬蕭然一空為之寒心者數日至揚州聞有奉迎之詔道路少安旋聞渡江無不失色比得鎮江報官兵日給六千餘緍而小民獻議者繕營宫室移植花竹並強買園池科須百出矣墨制紛然專易守令遷官賜服略無虛日矣唐恪翁彥國師也惑於誥命並行而莫知有朝廷矣朱勔瀵除其家率斂州縣為乘輿法物邀請臨幸者相屬於道矣昨日又聞行宫指揮頗留勤王之師以自衛傳者洶洶遂以為江津非給符不渡蘇常數州居民遷徙皆不安其居蓋天下之弊嘗極矣幸天警戒曠然大變真千載一時也謂當繼此卧薪嘗膽不容更有秋毫之失自靖康改元所謂慰人心者果何事哉民未見德而自江以南已絶惟新之望矣今敵尚未去郊此何等時而小人已無忌憚如此又何望耶以鎮江行宫日給計之月當用二十萬緍二浙之民將見塗炭而東南和糴指揮於是廢格民既愁怨加以三軍道路之言懲往時清溪之役西兵方春以疸死人人土思其勢必亂上皇豈得髙枕而卧耶某以為上皇粳粃天下褰裳去之蓋已超然萬物之上矣其中豈無所處而人不能無私憂過計者以羣小在側耳嗚呼小人居平猶無顧藉況自知惡稔天下之所不赦茍紓歲月之死亦何所不至此社稷之至計廟堂之深愛也使廟堂慮乎車駕不動之前亦無今日之患矣不惟是而已小人揣上皇享國之久平時極四海之奉方冨於春秋以龍德為隘引周穆王瑶池之事以勸其遊陳肅宗西內之戒以箝其返挾此為姦駸駸不已則豫我劍南一道之言有時而出矣不知何以答之自江以南詔令將壅不行而上皇晨昏之禮闕矣當是之時天子果得為孝乎今數小人者斫喪國家天下之大惡也上皇不歸則典刑不正典刑不正朝廷可越此而治他罪耶方國家危疑之時天子釋位而去矣首惡之臣乃恬不之問又可以令天下乎如是則所謂曠然大變者果安在哉為今之計莫若重為禮以必上皇之歸遣見任宰相為迎奉上皇使天子率百官東向臨遣於廷退而齋居蔬食清宫以待且責行宫使以必死大賞隨行將士令扈駕以歸庶幾父子之誠有所感動若小人尚敢牽制則自行宫使以下擇甚者易之彼為姦謀者既去直言日聞則上皇亦不復留矣行營既復二聖重歡雖上皇翛然不復以萬機關心然閲天下理義多矣大事應稟而後行志同於上命一於下乾坤再造國祚無疆天子之孝孰大於是失是不圖異時追悔恐無所及伏望垂覽少加意焉天下幸甚天下幸甚李梲鄭望之李鄴落職豫外宫祠李稅鄭望之李鄴落職宫祠以奉使失辭也門下侍郎趙野充太上皇行宫迎奉使傳信録曰初道君以正月初三日夜出通津門乘舟以行獨蔡攸及內侍數人扈從舟行為緩則乘肩輿又以為緩則於岸側得搬運磚瓦船乘載飢甚於舟人處得餅一枚分食之是夜行數百里抵南都始館於州宅得衣被之屬市駿騾乘之至符離始登官舟及泗上少憩宇文粹中及童貫髙俅之徒始至童貫以勝捷兵三千扈從渡淮以如維揚父老邀車駕不可渡江而道君決意南行遂如鎮江道君居揚州皇子帝姬皆流寓沿路州縣聞敵退多先歸者初恭謝行宫所以城都圍閉止絶東南遞角又止東南勤王之師又以綱運於所在卸納泗州官吏以聞朝廷不以為然道路藉藉且言有他故而太學生陳東上書乞誅六賊臣於是遣聶山為發運使密圖之山請詔書及開封府使臣數十人以行余因奏事福寧殿留身白上曰此數人罪惡固不容恕然聶山之行恐朝廷不當如此措置昔肅宗欲發李林甫墓李泌諫其如明皇何肅宗抱泌頸泣曰思不及此使山之所圖果成驚動道君此憂在陛下所圖不成為數人所覺一挾道君於東南求劍南一道陛下何以處之上感悟曰奈何余對曰罷山之行顯責童貫朱勔之屬陛下降詔蔡攸委令勸道君去此數人者早回鑾輿可以不勞而事定矣上以為然山乃不果行而童貫朱勔之屬相繼皆去太上皇將回鑾故遣趙野前去迎奉七日癸酉詣景靈東宫燒香八日甲戌詣景靈西宫燒香九日乙亥詣陽德觀凝祥池中太乙宫佑神觀相國寺燒香戎馬已退躬謝祖宗也令在京寺觀為建齋醮道場追薦陳亡將士被害人民校書郎陳公輔劄子乞擇相臣竊覩國家強鄰入侵中外震恐陛下初臨萬幾遭此擾攘深軫聖慮公卿大夫誤國至此臣不勝痛恨臣有愚見輒不避死亡之誅上干天聽伏惟陛下少留神臣聞憲宗用一裴度而平淮西武宗用一李德裕而平澤潞自古翦除冦難興復治功必至排斥衆議屏除姦邪而信任忠勇有為之才然後可責其成功也臣自聞邉人為警夙夜危懼曽詣都堂略陳守禦之䇿見任宰相大臣皆狐疑不斷牽制其事今已經月條畫措置並未就緒况此數人事上皇纍年皆阿諛順旨持祿飬交未嘗建明一事禆補聖明致有今日之患蓋平昔無事尚不足恃豈可使之當今日之變乎陛下今日復用之士論民心莫不歎息不惟不足以了今日事他日亦必誤陛下臣謂前日奮不顧身力贊陛下登此寶位必社稷臣固當知之矣胡不且專任委以軍國大事不使衆議移之羣邪沮之使盡其材力以了天下事至於朝士大夫與昔時慷慨論事不畏豪強得罪在外亦不無其人可以録用但宰相未肯為陛下言之往往引用皆其親黨臣竊惟陛下前日積德東宫謙恭謹畏退托不能乃人子之道今日統御九有撫臨萬邦乃人君之權固當奮乾之剛繼離之明興大利除大害上以承祖宗無疆之休下以慰四海生靈之望不宜拘守常之論謂不改父之臣與父之政為難能也况太上皇剛明勇決一旦改悔知為羣邪所誤痛自罪已陛下誠能慨然有為罷去昔時用事之臣而委任直言修舉治道是乃奉承太上皇之志也帝王盛德何以加此臣踈賤小臣輒敢言及朝廷大臣犯冒天威自知必死然不敢惜死願有説焉夫宰相大臣非其人諌官御史可以言之今侍御諌官宰相門人不肯言也侍從之臣可以言之今侍從顧惜名位不敢言也惟臣小官無所顧惜誠知愛國不知謀身所以為陛下言之臣更不言是陛下終不得聞宰相大臣之過也宰相大臣天子不知何足以論天下之治哉又况陛下當即位之初以論相擇人為先不可不謹此一舉願陛下斷而行之實天下幸甚書奏乃罷邦彥孝迪懋以吳敏為少宰出邦彥知鄧州孝迪以資學為醴泉觀使懋以資學為大名尹召徐處仁唐恪於外郡處仁召為中書侍郎恪宣和初為户部尚書言應奉司之害忤王黼遂落職知滁州後奉宫祠七年召為户部尚書是歲秋以延康殿學士知杭州聞京城被圍遣兵官邉順以兵勤王太學生陳東上書乞召恪及徐處仁置諸左右而邦彥亦薦恪遂召還闕除同知樞密院事十五日辛巳太上皇誥賜宋㬇誥曰豫夙心慕道託神器於嗣聖丕承天命喜無所喻然有恭謝難即燕安舟御東來重煩有司御兵僅滿三千庶事草創固可知也及邉使弛備鐵騎犯闕行宫越在淮泗而都城盡閉道路隔絶深自為念恐貽嗣聖之憂故留浙江以自衛至於止糧餉截遞角皆私憂過計恐資敵爾緣此三事姦人乘間造言緣飾形似遂致朝廷之疑每見臺劄名敕州縣而實及豫躬興言及此不覺流涕比緣嗣聖遣宋映賫書至行宫遂交通父子之情話言委曲坦然明白由是兩宫釋然胸中無有芥蒂重惟宗廟再安雖賴大臣翊贊之助至若使父子間歡然略無纎毫憂疑者㬇竭力為多也傳言求忠臣必於孝子之門若張仲在而宣王有成功信孝子錫類之效矣㬇周旋兩宫庶幾古人有足稱者因書其事以賜宋㬇十六日壬午祕書省校書郎陳公輔劄子乞擇重臣迎候道君皇帝奏曰恭惟上皇駕將還中外欣慶此陛下孝誠所感天下之幸也然議者以為上皇左右有懷姦之臣創造巧言離間陛下父子致有疑心臣竊惑之仰惟上皇臨御日久去年冬敵人侵擾因厭萬機之繁遂欲內禪而陛下天性至孝感泣退避慈諭數四方即大寶此為唐睿宗因星變而答天戒太子皇懼入請事體稍類豈比明皇帝幸蜀肅宗自即位靈武哉是宜父子歡好之情雖千萬年不復有疑矣若乃陛下改更諸事進退大臣賞善罰惡興利除害皆以宗廟社稷為念合天下公議所以奉承上皇詔旨豈有私意邪雖使姦臣離間百端而上皇慈仁陛下孝德二十餘年人無間言豈一旦能入之哉且父子天性也上皇於陛下親邪羣臣親邪臣謂上皇之親無親於陛下也臣恐臣寮未悉此意或因道路相傳之語皇惑聖聽致父子間自有所疑此大不可也况上皇聰明勇智度量豁逹不防姦邪浸以欺惑既已感悔斷然不疑以神器授之陛下方在位時已自下哀痛之詔追惟已愆引咎興嘆大革弊端蠲除宿害質諸天地不復更易雖禹湯罪已周公改過何以復加陛下今日所行皆遵上皇去年十二月詔書也臣恐趙野輩不能委曲為陛下感激陳請欲乞更擇重臣莭次往前路迎接萬一上皇聖旨少有所疑即當懇切備述陛下篤孝之誠一一開具去年詔書與今日奉行之意實無少異至於誅逐姦惡明正典刑乃深憤羣邪誤國致上皇有遜位南幸之事雪君父之耻孝莫大於此也上皇英睿剛決儻詳此意何至有疑哉然後迎奉之禮備加隆盛陛下鑾輿親出近郊后妃嬪御親王貴戚下至公卿百官士庶耆老當皆往迎禆聖意悟前日之去忽遽如彼今日之歸尊榮如此自非陛下堪任付託之重使患難稍平京師人安庶事修舉人心歡快能若是乎以此慰悅上皇之心方知此時為天子父尊之至也自還宫後凡百供奉之物陛下過為儉約上皇務極隆厚著為令式使四方具知陛下處已之薄奉親之厚以勸天下之孝仍乞於人臣中選端直之士有德行學問全忠孝大莭者輔贊上皇日侍燕問開導聖心窮天人性命之真脫然不復以天下事纍已嗇神斂明清心飬氣用保無疆之夀豈不善哉臣聞堯舜之道孝悌而已矣經曰孝悌之至通於神明光於四海無所不通陛下貴為天子唯父為尊得盡生飬之禮誠天下之樂不可有加臣愚伏願陛下躬堯舜之孝至誠盡道以事其親父子間洞然無纎芥之嫌固足以感動上皇之心而讒邪不入慈愛愈隆則天地鬼神保祐聖躬臣將見陛下全萬年人子之飬宗社增休生靈蒙福自今以始豈有窮哉臣一介微臣非有言責然區區愚衷夙夜不忘愛君憂國之心故前屢以狂言上千天誅今又不避僣越之罪妄意議及陛下父子之間臣死有餘責伏惟睿慈特賜裁處臣不勝恐懼激切之至先是門下侍郎趙野往奉迎而讒人離間兩宫公輔奏此劄子上覽奏感動遂除公輔見闕諌官詔河北三帥固守三鎮詔曰朕承太上皇付託之重即位十有四日金人之師己及都城大臣建言捐金帛割土地可以紓禍賴宗廟之靈守備弗缺久乃退師而金人屢盟終弗可保今肅王渡河北去未還尼堪兵深入南陷隆德未至三鎮先敗元約又所過殘破州縣殺掠士女朕夙夜追咎何痛如之已詔元主和議李邦彥奉使許地李棁李鄴鄭望之悉行罷黜已詔种師道姚古种師中往援三鎮祖宗之地尺寸不可與人且保塞陵寢所在誓當固守朕不忍陷與三鎮以偷頃刻之安與民同心永保疆土播告中外使知朕意遺史曰金人入京師也城下之盟割河北東三鎮以講和好金人退兵至是太原猶堅守不下而河間中山亦為國家守朝廷知三鎮人心不願割地且議者謂三鎮之地不可割遂令固守乃降是詔三朝北盟會編卷四十三
