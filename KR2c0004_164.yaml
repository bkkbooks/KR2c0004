body:
  text: 三朝北盟㑹編卷一百六十四宋徐夢莘撰炎興下帙起紹興四年九月二十七日癸酉盡十一月十四日己未九月二十九日癸酉趙鼎為尚書右僕射同中書門下平章事兼樞宻院事朝廷方除趙鼎都督川陜荆襄諸軍未行偽齊謀大舉宰相朱勝非乞持餘服罷去留鼎拜相仍降詔撫諭四川詔曰朕顧懐蜀道屢困敵兵選建樞臣徃加督䕶方選日以臨遣偶防秋而戒嚴乃命以相居中仍遥領西南軍務既總司於朝政益增重於使權遲俟来春改圖近弼綏爾衆士膺副朕懐比命屬僚就宣德意知鼎州程昌禹上廟堂書極論遣使都督川陜荆襄未便程昌禹謂除趙鼎都督川陜荆襄未便鼎雖拜宰相不行深慮别議遣使乃商𣙜其利害極論其所以未便曰昌禹嘗謂古今利害特在於名實之間責實有利無害狥名有害無利昌禹嘗深究其源非謂朝廷遣使樂於狥名亦非奉使者其才不能責實勢使然耳使命一出張官置吏不下數百員與夫屯師聚兵之費當取給於州縣州縣比年所至匱乏常賦之入曾不足以自贍矧有餘貲以供使司之用一被督責必合辨具不過重費鞭朴以取於民官吏茍非其人夤緣為奸殆有不勝其擾者至于諸路兵力初不足恃使命一出於所部軍馬又須抽摘隨行赴置司去處州縣一或有警不過告急於使司相去既逺應接毎不及以至調發人夫征取財賦行過郡邑倉庫一空應報文移日不暇給其間至有将懦兵驕稍加紀律則滋長敵勢為害一方又有未易言者如是則使命之出将以保州縣而州縣反被其擾將以撫百姓而百姓反受其弊将以治盗賊而盗賊愈長其惡可謂有害無利矣朝廷凡使事之畢亦嘗計其嵗月所費以較其利害多寡乎比者又覩遣都督川陜荆襄諸軍事得之道塗謂朝廷因獻言者以今日大計在於圖秦故特遣大臣出領使事昌禹切謂朝廷急於圖秦輟樞臣使逺方固可以膺重任而成大功然以其勢考之豈能使之責實雖負伊周不出之才恐未免狥名而有害無利也昌禹備員武陵首尾五年川陜事體粗聞其畧試言之且張宣撫入蜀之初責任非不專事力非不勝財用非不富士馬非不强當時人心又皆鼓勇樂於赴功而累年之間迄無功効徒上下怨憾以謂四川初無盗賊之擾止緣宣撫使入蜀以擾之宣撫入蜀而人被其擾亦豈為宣撫者固欲重困州縣乎盖張官置吏屯師聚兵官吏之所贍給将士之所犒勞所過所留征求調發勢有不得不然者耳况今五路陷沒四川危動民力已困財用已竭强敵垂涎且有吞蜀之意以今事勢較之張宣撫入蜀之初為何如州縣凋弊似亦極矣乃欲以大臣出使将帶官吏摘抽諸軍又入蜀地征求調發號曰圖秦切恐秦未暇圖而腹心腋肘之變先起矣昌禹所以妄意謂未易責實近於狥名而有害無利也抑嘗聞迺者富平之戰騎兵凡十五萬士馬亦可謂强矣而竟致敗衂今四川士馬不過吳玠部曲耳何所恃以圖秦乎昔曹操以百萬之衆蔽流而下吴之羣臣已為迎降之説操於圖吳勢若可必矣周瑜以謂今使北土已安果無内憂始能曠日持久来争疆塲今北土既未平定加馬超韓遂尚在闗西為操後患又今盛寒馬無藁草驅中國士卒逺涉江湖不習水土必生疾病此數者用兵之患而操冐行之擒操宜在今日其後果有赤璧之敗今都督之求圖秦也東土已安而果然無内患乎南冦已平而果無後患乎中國士衆果能習水土而不生疾病乎昌禹願朝廷鑒此審處利害而行之無令輕舉妄動近於狥名而無實也至如近復襄陽等州都督之行就當措置撥軍屯守軍勢愈分昔呂䝉為孫權論徐州曰今操逺在河北不暇東顧徃自可克然地勢陸通驍騎所騁今得徐州操後必来争雖以七八萬人守之猶當懐憂不如取闗帥全據長江形勢益張權用䇿後果擒關今朝廷復襄鄧州亦猶權之取徐州也取之為易守之為難能保强敵之不争乎孰若命大臣或大将益重兵聚貲糧守荆州以據長江之險今天下根本大勢實在長江保守長江以固根本然後可以圖秦保蜀料理襄漢經畧中原隨宜度勢以次施設今根本不固遽欲掇大臣於數千里之外以孤軍抗强敵期以復西秦殘破之區昌禹謂四川民財已竭兵力已弱人心已動而都督又将入蜀萬一强敵乗我間隙或壓以重兵或傳以偽檄則事有未易言者其所繫豈小哉昌禹初聞樞相趙公出使趙近世偉人也忠義激昻慨然有康濟四海之志然事勢如前所陳昌禹實憂其行切意樞相洞達利害已久身為大臣義當狥國不敢辭避耳今聞大拜脱或别議遣使願試以昌禹所陳更加訂論熟計利害而行之且命大臣或大将守荆州以固根本在今非上䇿豈亦易事特不得已用兵非有五萬之衆錢糧非有三年之儲且将不暇嵗月責以近效亦豈能使之勝其任也荆南前日以二萬人守之亦可今春金人取和尚原闗師古既叛階州一帶無人控扼上流勢須益兵也昌禹以事干國計不敢緘黙或謂昌禹言輕不足信伏望更加採訪自是不别遣使金州人攻承州知楚州樊序賓棄城而走是時改髙郵軍為承州金人攻承州而楚州守臣遁走也十月朱師亮軍于明州劉豫聲言遣徐文来犯海道乃命師亮以兵一千屯于明州張俊為浙江西東宣撫司軍于鎮江府邊報金人與劉豫合軍大舉欲侵淮甸遣韓世忠以兵渡江發張俊兵駐于鎮江府軍士多奪取士民舟船如被冦盗是役也烏珠屯于天長軍劉麟屯于旴𣅿軍孟庾為行宫留守蘭整邊順臨安府彈壓趙鼎建親征之議乃差留守及弹壓官是時親征之議猶未定也召張浚為資政殿大學士領萬夀觀兼侍讀召不許辭免日下起發手書賜浚曰卿去國累月未嘗弭忘考循事績簡在朕心想卿志在王室益紓籌䇿毋庸固辭便可就道夙夜造朝嘉謨嘉猷佇公入告十三日戊子韓世忠敗金人于大儀鎮十數里遇金人鐵騎二百餘世忠與通方立馬議所以待之有三四十騎直衝世忠世忠與戰不利金人有驍将獨戰世忠力疲通自後擊敵将世忠墜馬幾被執通救之世忠復得馬回顧金人百餘騎幾得世忠通據陂坂扼其路以弓箭當之世忠得還奏通之功乞優異推恩授武功大夫吉州刺史世忠繳其誥命再奏乞重賞通以勸将士遂落階官授吉州刺史解元敗金人于髙郵軍盡俘執以歸解元及在髙郵金人来侵未至三四十里元先知之逆料金人翌日食時必至城下乃伏百人于路之側又伏百人于城之東北嶽廟下自引四百人伏於路之一隅令曰金人以髙郵無兵不知我在髙郵即輕易而進俟金人過我當先出掩之伏要路者見我麾旗則立幟以待金人進無路必取嶽廟路走矣若果然則伏者出衆皆諾又宻使人伏樊良俟金人過則决河岸以阻其歸路食時金人果徑趨城下元宻數之有一百五十騎乃以伏兵出麾旗以招伏要路者伏兵皆立幟以待金人大驚躊躇無路遂向嶽廟走元率兵追之金人前遇兵無所施其技盡被擒凡得一百四十八人金牌與執亊居其半是時董皎在天長亦有功元與皎各加正任觀察使馬闕復元官除樞院副都承㫖馬在融州仙溪也張浚都督陜右不逺萬里遣人持貲幣招之書中專以同濟國亊為言且曰上之待公不輕雖縁讒毁終必保全公荷聖恩如此可不圖報乎馬以劉子羽昔年在真定有隙今在宣募不徃復書謝之紹興三年召為都督府參議官道遇疾丐祠四年奉祠居信州九月召赴川陜都督府禀議差充詳議官引見上殿奏對稱㫖乃復元官拱衛大夫利州觀察使除樞宻副使承㫖牛臯徐慶敗金人于廬州城下金人與偽齊連兵攻淮西安撫使仇悆盡發宣司戍軍一千以拒之既而敗亡無一還者即乞師於湖北岳飛飛遣腹心将徐慶牛臯為援臯慶引十三騎先至城下入城謁悆坐未定斥堠報金人五千餘騎将逼城時湖北軍馬未到悆色動不安臯曰無畏也為公退之即與慶出城迎見敵軍遥謂之曰牛臯在此爾等安敢来敵帥曰我知牛公在湖北路已赴詔命此中安得牛公臯乃免胄張旗幟敵人相視失色臯察其有懼意舞稍先登敵人奔潰臯以十三騎追襲五十里是時敵人大軍十餘萬去廬州百里而屯一夕皆遁悆駭歎且親書保明賛其威望神勇謝于岳飛飛不悦而移其功以卑慶臯亦無慊色淮西人以為恨二十三日戊戌詔幸江上撫軍金人在淮甸張俊軍鎮江府促渡江出戰有遲疑未渡之意朝野驚恐親征之議起於趙鼎見上屢請車駕早幸江上上皆有㫖肯之即退為中官阻止至是鼎至請上親征且曰軍民百姓皆望陛下親征唯中官未肯行若陛下一幸江上則諸軍皆盡力禦敵矣中官未見陛下親征之利也臣欲乞陛下發遣近上中官赴都堂臣具酒禮待之諭以禍福然後親征可决上從之遂發左右親近十數人詣都堂鼎具酒禮以宗廟社稷安危之計諭之且曰諸公見上可賛成其事俟退敵囘鑾則共享安逸之福衆諾之議遂定即命草詔詔曰天地之大義莫重於君臣堯舜之至仁無先於孝悌一自衣冠南渡北騎日侵五品弗明兩宫未返念有國有家之道必在正名盡事父事兄之誠詎宜安處将時巡於郡國以周視於軍師爾其慎守封圻嚴戒侵擾䖍共乃職謹俟朕行戒諭州縣詔朕以逆臣劉豫稱兵南向冦警既聞神人共憤朕不敢復蹈徃轍為退避自安之計而重貽江浙赤子流離屠戮之禍乃下罪已詔親總六師臨幸江濱督勵將士然興師十萬日費千金動衆勞人懼所不免此惻然疾懐尚覬監司帥臣與夫郡邑大小之臣夙夜究心體朕此意凡借貸催科有湏於衆者毋或縱吏並縁為奸凡盗賊姦宄輙生窺伺者務絶其萌毋令竊發其或乗時搶攘恣無名之歛容奸玩冦失訊察之方至使吾民横罹困苦有一于此必罰無赦候軍事稍平當遣廷臣循行郡國二十四日己亥車駕發臨安府車駕進發諸大将有獻俘于行在者戮于秀州時張守方知福州聞而上疏曰凡所獻俘使皆金人或外國借助則宜勦除俾無遺肓至於兩河山東諸路之民皆陛下赤子也劉豫驅迫以来誠非得已臣謂俘内有僉軍宜諭以恩信以示不殺貸而歸之或願留者聽其便不惟得先王脅從罔治之義而劉豫之兵可使不戰而自潰雖日殺而驅之亦不復為用矣後相繼諸将進擊金人敗衂而去二十七日壬寅幸平江府加贈陳東歐陽徹祕閣修撰與恩澤兩資賜田十頃車駕至平江府宰相奏事上因論黄潜善汪伯彦當國殺布衣陳東歐陽徹事深自悔恨曰朕至今痛恨之雖各贈五官與有服親恩澤猶未足以稱朕悔徃之意遂各贈朝奉郎祕閣修撰更與恩澤兩資撥賜田十頃雖死者不可復生追痛無已三十日乙巳仇悆克壽春府仇悆為淮西安撫使劉豫侵淮西悆遣将㑹合孫暉兵擊敗之復取壽春府十一月十三日戊午金人陷滁州金人侵入於是據滁州而居之十四日己未張浚知樞宻院事行状曰是日除樞宻院事奏曰人道所先惟忠與孝一虧于己覆載不容自昔懐奸欺君妬賢賣國當時閭巷細民莫不深怨嫉憤不食其肉者至若一心事上守正盡忠雖天下後世皆知企慕稱歎思見其人焉盖忠義人心之所同故好惡乆而自定臣以區區淺薄之才幼被家訓粗知義方平居立身以此自負偶緣遭遇寖獲使令陛下任之太專待之過厚而有怨于臣者致毁之備至有求於臣者責望之或深上賴聖智全㣲縱臣奉使無状豈不自知至於加臣以大惡之名䧟臣於不義之地隳臣子百世之節貽孀親萬里之憂言之嗚咽痛憤而已今陛下知其情偽保庇孤忠許以入侍旋擢筦在臣毁首碎身無一論報然而公議之所劾訓辭之所戒傳之天下副在史官臣復何顔取玷近列於是賜詔三朝北盟㑹編卷一百六十四
