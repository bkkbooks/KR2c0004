body:
  text: 三朝北盟㑹編卷十八宋徐夢莘撰政宣上帙起宣和五年六月五日丙戌盡十二月三日壬午五日丙戌張覺詣宣撫司納土狀曰權管營平州節度使兼諸軍都統張覺狀自女真深入北朝皇帝西狩不返諸路㓂兵充斥道途塞絶當道無所依托承天朝累遣人賫到文字招諭尋奉表款附復蒙降到勅赦并處置宣命適值女真襲下燕城逺近震懼當道地隔力弱姑務應從以緩攻侵圖安境土燕城本國舊地雖為敵有部落尚遙固無乆駐之勢况與大朝要約遂議割分敵恃甲兵之強其雲中富家巨室悉被驅擄止留空土以塞前盟大朝亦非得已旋以假道當界冤痛之聲盈於道路是用不忍與州人共議僉曰宜抗敵命以全生靈若許東遷是亦資敵即調𤼵丁壯繕甲兵鋤叛黨以活生靈區區之志必已聞之近知敵衆已過居庸大朝必措置屯守使無囬路仍念安土重遷者人之常情况萬家流離祝奠無主雖居近地猶謂出鄉使復父母之邦是成終始之義一則為大朝守圉之計二則快流民歸國之心固無他求乞修舊􅍁應西來職官百姓已分路津發過界去訖今差都統府掌書鴻臚少卿張鈞將作監參謀軍事張闕固謹詣安撫使司納土歸朝詹度得狀不敢受以聞而宻奏據覺狀當遷之人在平灤者皆欲求歸已分路遣之過界縁東遷之人田宅悉為常勝軍所有無宿食之地若坌入燕城其勢必張懼為金人之所知己語覺無遽遂以張鈞送宣撫使先是張覺叛金人用李石謀殺左企弓等放燕人歸燕聞朝廷令詹度宻諭之意又得朝廷撫納燕之報大喜遂納土來歸拜覺泰寧軍節度使世襲平州其属衛甫趙仁彦張鈞張闕固皆除徽猷閣待制史愿亡遼録曰張覺之拒金人也外則送􅍁于大宋通好于蕭幹而緩急求援内則奉天祚畫像舉事白而後行詐遣人奉迎以圖興復有燕人李安弼者翰林學士李石也有髙黨者乃三司使髙履也二人者皆先嘗被擄後縁張覺放歸恐金人來捕意欲大宋與金人變盟則雖後來取之不發纔見王安中共為游説曰平州自古形勝之地地方百餘里帶甲十餘萬張覺文武全材足以禦金人制藥師幸招致之不然則復恐西迎天祚北合蕭幹並為我患燕山豈得而安安中入其語深以為然勸朝廷納之有臣身任其責事關軍國利害大計不敢不言差官伴送李安弼等賫奏赴闕趙良嗣力爭以為不可恐必招女真之兵乞斬安弼以狥朝廷不從又有延庸殿學士提舉太一宮趙敏修遼國宰相李儼之子處能先在海島蕭太后詔令歸俗乗馹騎赴闕將復用行次平州聞金人已下燕因越境歸朝在京師賜第有母國夫人邢氏等骨肉亦自平州歸三人旦夕出入王黼蔡攸府第議事朝廷遂信其説通平州納燕人豈偶然哉良有以也九日庚子收復全燕一行官吏將士推恩宣撫使收復撫定全燕一行官吏將士等宜有優恩以酬勞効述古殿直學士宣奉大夫參謀官劉韐除延康殿學士更轉一官顯謨閣直學士勾管機宜文字蔡術已除徽猷閣待制勾管機宻文字蔡術已除陞一職外更轉一官二等大晟府典樂提舉秘書省道録院主管文字宣撫使司勾當公事馮舒與除待制更轉一官集英殿修撰參謀宇文黄中舊職係待制與遷一職直學士仍轉一官金國主阿固達殂于軍前神麓記曰女真始祖堪布出自新羅奔阿勒楚喀無所歸遂依完顔因而氏焉六十未娶是時多以强凌弱無以制度堪布劈木為剋如文契約敎人舉債生息勤于耕種者遂致巨富若遇盗竊雞豚狗馬者以桎梏拘械用桞條笞撻外賠償七倍法令嚴峻果斷不私由是逺近皆伏號為神明有隣寨部長姓圖克坦小名勝果者有室女年四十餘尚未婚遂以牛馬財用農作之具嫁之於堪布後女真衆豪結盟推為首領生烏嚕能繼其父業烏嚕生雅哈子綏赫自幼習射採生長而善騎射獵敎人燒炭煉鐵刳木為器制造舟車種植五榖建造屋宇稍有上古之風由是隣近每有不平皆諧所請遂號貝勒臣伏契丹生三子長曰烏里次曰舒嚕㓜曰實魯為貝勒生呼蘭北之五祖逈然超羣由是契丹拜為寧江軍節度使呼曰太師生五子長曰和卓尼堪之祖次噶順次和哩布次頗拉淑次英格太師和哩布生長子烏魯斯第二子阿固逹乃太祖大聖武元皇帝太祖契丹咸雍四年嵗在戊申生自遼國天慶三年甲午嵗四十七於寧江府拜天冊立改元稱帝號侍中韓企先訓名曰旻改收國三年為天輔元年共在位九年創業艱難未嘗少息至燕京入遂不懌數日出于城東柴村建寨不旬日病殂年五十五以百數十人轝歸阿勒楚喀御寨葬之後遷於墳山號曰㤗陵松漠記聞曰阿固達八子正室生勝額於次為第五又第七子乃燕京㽞守易王之父正室卒其繼室立亦生二子長曰二太子為太元帥封許王南歸至燕而卒次生第六子曰富勒呼為兖王太傅領尚書省事長子固倫力本切側室所生為太師凉王領尚書省弟曰三太子為左元師與四太子同母四太子即烏珠為越王行臺尚書令第八子曰邢王為燕京㽞守打毬墜馬死自固倫以下皆為奴婢神麓記曰太祖九子正室生第三子聖果名宗浚乃亶父第七子則費揚古名宗朝繼室生元師二太子名宗傑第六子宗雋庻長子宗幹乃亮父賢妃生元師三太子宗堯乃褒父德妃生元師四太子烏珠名宗弼第八子阿嚕第九子阿里布節要曰阿固達有子十餘人今記其八一曰阿巴二曰實格亶父三曰摩囉歡與實格同母正室所生四曰斡里雅布人呼作二太子兩攻京城者五曰鄂勒歡人呼作三太子六曰烏珠人呼作四太子七曰鄂爾和人呼作五太子號自在郎君八曰阿里布邢王金國太祖實録曰太祖生于遼咸雍四年戊申秋七月其先為完顔部人後因以為氏以遼天慶五年建國曰金以鑌鐵為國號鑌雖堅剛終有銷壞唯金一色最為真寶自今本國可號大金天輔七年八月乙未終于部堵濼在位九年享年五十有三二后三妃十有六子阿固達既殂于軍前尼堪等遥尊其弟烏竒邁為帝阿固達有親征之行也㽞親弟烏竒邁名晟權知軍國事天輔六年夏阿固達病死尼堪等遥推烏竒邁為大金國皇帝改天輔六年為天㑹元年二十一日壬寅金人欲交割我朔武蔚三州而國主告殂不及取三州而去金人軍馬來平州張覺拒退之金人棟摩國王軍二千餘騎來聞平州事作前來問罪先入營州張覺發兵拒戰棟摩以軍少不敵不交鋒退歸大書州門曰夏熱且去秋凉復來覺遂聲言戰敗金人殺傷甚衆妄申宣撫司以大㨗聞宣撫司厚以銀絹告敇賞其軍七月七日戊午慶逺軍節度使河北河東燕山府路宣撫使知燕山府王安中授檢校少保起復太尉武信軍節度使充上清寶籙宮使兼神霄玉清萬壽觀副使直睿思殿充河北燕山府路兼河北路宣撫使譚稹授起復檢校少保十日辛酉太師兼領樞宻院事陕西河北河東路宣撫使豫國公童貫致仕拜起復太尉武信軍節度使譚稹為河北燕山府路宣撫使斡里雅布圍平州張覺走所賜詔書盡為金人所得是月宣撫司賫銀絹数萬犒賞并朝廷遣李安弼并張覺弟賫詔𠡠前去覺聞之喜率官吏郊迎不意金人諜知之率千騎襲破覺覺挺身走不及入城遂間道欲如京師其弟奔燕山以其母為金人所得復擕詔徃救之而覺之母妻已為金人所戮金人得詔𠡠由是大怒而憾我矣張覺至燕山郭藥師㽞之易姓名曰趙秀才匿常勝軍中斡里雅布遂圍平州節副衛甫參謀趙仁彦張鈞弃城領數十人將帶官庫珠玉珍貨棄燕京四㪚藏匿獨闕固與軍中死守十九日庚午文武百僚太傅楚國公王黼等三奉表請上尊號曰繼天興道敷文成武􅌖明皇帝御筆批荅不允二十八日己邜陕西河東北路宣撫使童貫河東河北路宣撫使蔡攸等少保淮南節度使知燕山府王安中資政殿學士同知燕山府詹度檢校少傅武泰軍節度使同知燕山府郭藥師等據偽永安軍節度使同中書門下平章事陳國公張言中等及舉人道僧耆老百姓共五千五百一十人状乞上尊號不允八月十五日甲寅宣撫司奏大破蕭幹於峯山獲耶律德光尊號寶檢及契丹塗金印初蕭后東走也蕭幹㽞奚王府僣號大奚國神聖皇帝改元天阜時奚人飢幹以闕食六月領兵出盧龍嶺攻破景州又敗常勝軍張令徽劉舜仁於石門鎮䧟薊州冦掠燕城其鋒鋭甚有涉河犯燕京之意人情洶洶頗有謀弃燕者貫自京師移文王安中詹度郭藥師切責之已而王安中命郭藥師大破其衆乗勝窮追過盧龍嶺殺傷過半從軍之家悉為常勝軍所得招奚渤海漢軍五千餘人宣撫使奏古爾班師衆來侵八月十五日大戰峰山生擒偽阿嚕太師獲耶律德光尊號寶檢契丹塗金印王黼于是有受賀奏告之議矣宣和録曰太傅王黼等表賀宣撫司奏奚賊四軍古爾班率衆出犯景薊大兵討伐八月十五日於峯山遇王師大捷斬獲一千級生擒偽阿嚕太師俘執數千人十七日追至盧龍嶺招納二萬餘衆獲耶律德光偽尊號寶檢契丹塗金印數十輜重器甲牛馬生口不可勝計及進兵撫諭招燕州令服從金國訖九月六日乙巳御明堂集英殿大宴御手親製宮花幞頭賜太傅王黼知河間府蔡靖同知燕山府與詹度兩易其地先是六月中御筆王安中知燕山府詹度郭藥師同知藥師以節鉞欲居詹度之上度稱御筆所書有序不易藥師不從兼常勝軍横甚藥師右之度不能制屢聞朝廷恐交惡日深故有是命斡里雅布攻破平州來索張覺下軍中縊之函其首與之亡遼録曰二太子攻破平州知張覺為郭藥師所獲藏常勝軍中差人移文索取即具申禀朝廷累奉道君皇帝詔不令發遣安中與藥師再三論奏若不與則無以塞責不得已而縊殺之以水銀漬其首函送平州二太子復遣使索燕人之歸者宣撫司初荅以下郡邑浩瀚莫知所徃己指揮根括發遣終嵗之間使者四至而意在探軍數多寡倉庫虛實宻賫文字到燕中招諭遼國文武官若復歸金國者於舊上超官轉三資依格任用中亦有不得赴朝廷換官窮困者時趙公岩趙公倫趙企望越境逃走去北征紀實曰張覺者燕地之豪傑也數領營平二州方天祚竄隂山國亂無主人生向背覺取天祚像掛之聽事呼二州父老喻之曰金人吾讎也豈可從又指其像曰此非乃主乎安可背當朝相約以死焉必不得已歸中國未晩燕人尚義故皆從之然覺間遣人通中國二帥遽奏以捷隨克平燕山牌來亦曰收復營平二州其後金人入燕而覺使不至又止大率如此金人入燕山覺不得已亦遣人詣降金人亦封爵之其後金主病率軍西北出居庸關徃鴛鴦泊白水泊將經營天祚其輜重則盡由東北出松亭關歸國其道由營平其金人所擄職官富户皆哀訴覺為之主覺因乗間誘擒遼人之大臣如左企弓輩數人以國亂不能輔佐又不死反從仇賊等罪且刼徙燕人皆殺之曉示燕人一行但㽞馬外盡放令復業各歸其所至于儀物盡毁去玉帛皆有之金人無一得脫者然金主適死其喪未歸故未能治也覺既與金人結釁乃謀復降中國因亟遣遼人之大臣名李石者來既至燕山見安中為遣造詣闕下因宻奏丐免之李石者後乃李汝弼也以待制奉朝請其人頗黠實有議論後金人既寒盟獨李汝弼甚冇惧色曰朝廷須着意關防須得金人其術定是一面舉兵一靣和議使我失措如是者三四悉終滅大遼矣時將相皆已惘然不能詢訪也時徃返締宻外廷罕知其詳然識者已深為之懼矣獨趙良嗣者抗章論列國家新與女真盟况女真方強不可失其懽乞斬李石以狥上大怒而黼既專以計議自為功故指良嗣以為二帥之黨意欲壞成約也故良嗣隂亦得罪初結約甚固宻及中國見金人之不顧也謂果不能治上每曰金人必不能立國矣故結約事寝張覺既得中國助適中其所欲俄復遣李石同其弟來我乃以平州為㤗寧軍封覺節度使遣人以㤗寧軍牌及𠡠書及覺之誥命誥書與之覺大喜乃提親兵逺出拜迎不虞金人皆諜知之忽舉大兵徑以掩覺覺不克入平州因來奔燕山而我之勑書誥命皆為金人所得始覺之母妻家属皆寓營州及金人破營州先得其母妻等而覺之弟初逐覺走燕山也纔一夕聞已得其母遂急奔金人然懷中所擕上御筆金花牋手詔賜覺者用是又為金人所得故其後執以藉口者此爾金人圍平州日乆攻擊平州因奉覺之從弟及姪以守我但悚視而莫敢救也金人又移檄曰中國既盟矣我來討叛臣當餉我粮又不得已因運以給之平州既不降斡里雅布者以十萬大兵時攻時守踰半年率我餽餉平州食盡但遺數千人因潰圍而走終不降金人金人既得平營灤三州始來索覺曰我討叛臣城破今不見走在南朝當還我朝廷命安中諱之其索既急又命斬一人似覺者是時大兵尚駐未散俄又索云此非覺也實係某人覺自藏於王宣撫甲仗庫若不與我則舉兵自取之中國情既得且懼乃議斬覺矣宻㫖既下安中安中數其過逼之行刑覺語殊不遜而死因傳首金人燕之降將與常勝軍上下皆為之泣藥師顯語人曰若來要藥師且柰何遼東有顯州者遼之郡名也去金人上京所謂安扎川頗近金人初欲從國籍燕地所得臣民儀物立都於顯州而已初未嘗有意窺中原及覺邀其輜重儀物且得中原與覺詔誥等始怨謂違盟因生其大志即揚言曰中國與大遼誓好乆一旦滅之我如何哉今設盟纔罷誘張覺毁我儀物等使我立國不得要當取中國法物儀仗來立我國爾時用事者無不偹知而莫之慮可痛心云汪藻謀夏録曰張覺走至燕山匿姓名隠于郭藥師軍中金人以諜䟽我之罪而取之朝廷不得已命王安中措置方議行刑覺出言大不遜遂逼斬之函覺首以送自此張令徽亦切齒朝廷而常勝軍亦解體矣十月六日乙酉尚書省言耶律延禧偽尊號天祚内外文字不合稱呼奉聖旨令禁止十一月十八日丁邜檢校少保慶逺軍節度使河北河東燕山路安撫使知燕山府王安中授檢校少傅起復檢校少保太尉武信軍節度使充上清寶籙宮使兼神霄玉清萬壽宮副使直􅌖思殿充河北河東路燕山府宣撫使譚真起復檢校少傅檢校太傅集慶軍節度使同知燕山府郭藥師授太尉十二月三日壬午御筆趙良嗣特與支節度使俸三朝北盟㑹編卷十八
