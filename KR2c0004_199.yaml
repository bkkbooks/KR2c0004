body:
  text: 三朝北盟㑹編卷一百九十九宋徐夢莘撰炎興下帙起紹興十年正月盡二月紹興十年正月李誼為工部尚書迎奉梓宫奉迎兩宫莫將為工部侍郎以副之使于金國十日丙戌李誼落職放罷李誼既承奉使之命力辭其行親舊曰不可誼曰我不過落職放罷耳安可行乎既而果落職放罷而升莫將莫將為迎奉梓宫奉迎兩宫使韓恕副之使于金國十五日辛夘李綱薨林泉野記曰李綱字伯紀邵武軍人政和三年中進士乙科狀貌雄偉常有經綸天下之志宣和初京師大水綱為起居舍人上疏言此非小變恐有兵興國亂之禍上怒而罷之流落七年至宣徳末召為太常少卿金人入邊徽廟議遜位綱引唐睿宗始為皇帝復皇嗣居東事以賛其策淵聖即位太宰白時中勸幸江南以避敵綱力勸固守宗廟遷兵部侍郎左丞親征行營使敵夜攻雲澤門及通泰門縛筏渡濠雲梯上城綱屢擊之姚平仲刼敵寨而敗綱率兵援之亦敗初宰相李邦彦主和議忌綱主戰因此譛罷敵聞綱罷攻城愈急太學生陳東上書引數十人伏闕數邦彦罪言綱社稷臣不可罷又百姓數十萬人呼闕下請復用綱擊碎登聞院鼓不止上急召綱復其位令撫諭之斬亂者數十人乃止及敵班師种師道請以兵襲之綱是其謀而邦彦沮止綱寢不用乃常怏怏上皇自潤州將還命綱迎奉上皇撫其背曰天以卿賜國家也解玉帶賜之還知樞密院綱奏祖宗舊制兵符出于密院而不得典其兵兵衆隸于三衙而不得專其制今臣既統行營之軍又制密院之令考于舊制未見可乞以兵付制置使人以綱為得體士民多誦之者上頗忌之及敵至河東綱出為河北宣撫使李彌大解潛副之种師道送綱出師知其非將材歸而嘆曰兵可憂矣綱出城先斬統制官焦守節以解潛兵渡江一戰潜敗綱鋭氣大挫頓兵懐州不進日與鄒柄張枚論事諸將言事先禱柄枚乃得見將士怨憤金人陷太原麾下多叛去者敵乘之大敗而還罷為觀文殿學士知揚州日下出門臣僚言不可使守郡改提舉杭州洞霄宫言者不已遂落職是冬復疏綱十大罪責授安化軍節度副使建昌安置今上即位應天府召赴行在綱亦率兵而未至江寧卒周徳為亂綱招而戮之至行在除尚書右僕射建議張邦昌不可留乃賜潭州盡責偽命黨與范訥以無功亦責淄州薦許翰輩用之復請幸江右或鄧州以避敵未及還左相黄潛善汪伯彦譛綱以觀文殿學士提舉洞霄宫陳東歐陽徹上書言綱不可罷黄汪不可用請親征迎還二帝上怒斬東徹綱退居常州㑹賊趙萬陷潤州欲進冦常州綱以書招安及出家資犒享趙萬乃聽命次年臣僚言綱隂與賊通落職鄂州居住後虚傳貶綱嶺南遂單騎南去幾欲渡海既而聞不實乃還建炎末范宗尹為相復綱官職紹興二年知潭州以任士安兵一萬隸之張彦中領兵廣東不稟朝命宰相吕頤浩命綱圖之綱以書帑誘彦中至戮而併其兵頃之諫議大夫徐俯言綱倨傲以宫祠罷居福州後張浚亦責居與相善泊浚入相復綱觀文殿大學士赴闕出知洪州江南安撫制置大使以鍾世景兵三千從行旋加金紫光祿大夫方至洪乃課民修城一方興怨臣僚言罷提舉西京嵩山崇福宫復歸福州九月再除潭州力辭不可行改江州太平觀次年薨壽五十八贈少師李綱落職鄂州居住制朋姦罔上有虞必去于驩兜欺世盜名孔子首誅于正夘肆朕纂承之始昧于枚卜之宜相靡有終刑兹無赦具官某空踈而不學凶愎而寡謀志輕天下而自謂無人權震朝廷而不知有上靡顧國家之大計但營市井之虚名專殺尚威傷列聖好生之徳信狂喜妄為一時羣小之宗比再被于延登朕頗懐于虚佇而果于修怨姦以事君庇己姻親至擅刊于詔令括民財力曽罔恤于基圖念存禮貌之恩姑解鈞衡之任雖居逺外猶極優崇謂上印以投閒能闔門而訟過乃傾家積隂與賊通伊舉措之非常于聽聞而實駭宜鑴寵秩移置偏州昔漢弃京房罪本繇于不道唐誅元載惡葢在于罔悛往革乃心毋忘予戒秀水閒居錄曰李綱字伯紀閩人蔡京之子攸黨也宣和末淵聖受禪綱與呉敏以攸詭計取執政未幾貶黜或謂主用兵建炎初首拜輔相再閲月繆戾乖刺大拂衆心亟黜之以黄潜善作相殿中侍御史張浚潜善所引用力攻綱至貶海南軍車駕南渡始駐餘杭有苗劉二賊之變浚以卒兵赴難自春三月闕字卿徑執鴻樞出使陜蜀甲兵凡三十萬衆與金角一戰盡覆用其屬劉子羽謀歸罪將帥趙哲曲端並誅之將士由是怨怒俱叛浚僅以身免奔還閬陜之陷自此始至今言敗績之大者必曰富平之役追還薄譴俾居福州而綱自南還已寓是州焉先綱百計求復用富于財交結中外罔效及浚至綱謂此竒貨可居傾心結納浚自云深悔前日之言相與驩甚紹興四年冬劉齊與金合兵攻淮泗朝廷震恐宰相趙鼎常失身于偽楚初無薦者而浚獨薦於言事官鼎徳之至是乗急變召浚復秉樞機召命下綱贐行百餘奩皆珍異之物又以論時事既托之浚至即日進綱疏且降詔奬諭明年兵退鼎左相浚右相并兼都督即起綱帥豫章許其入覲綱見上盡以前朝所得書詔犀玉帶及家藏寶玩次第進獻上皆不納延留浹旬賜廄馬金帶飲饍而已綱既去殊怏怏浚以報之未至也擢其弟維及其腹心鄒柄等皆列于朝又以所屬陳公輔為諫官居頃之議者謂靖康伏闕之變乃公輔為綱謀不當在言路綱聞而懼抗章丐罷浚又思有以安之謬言江西盜息民安轉綱官為金紫光祿大夫是時䖍告盜熾旁郡亦擾欺罔如此七年鼎浚争權浚自謂卻敵之功興復之䇿當獨任國事諷侍從臺諫及其黨與攻鼎出㑹稽逐大將劉光世以吕祉代帥其軍屯於合淝捃荆襄帥岳飛過失以張宗堯監其軍謀取内外軍柄天下寒心秋七月合淝兵亂已執吕祉入齊傳執紛紜綱意浚必敗即條十五奏浚措畫之失又貽書于浚痛詆其過以副本傳示逺近欲擠浚而釣竒且示於浚不厚也浚既貶永州綱亦坐貶薄及暴横貪墨而罷鼎復相窮治浚事至今未已嗚呼勢利之交古人羞之其三相之謂歟浚蜀人字徳逺鼎閩中人字元鎮八年正月記又曰李相與張相書月日具位某再拜致書于張都督特進僕射相公閣下綱建炎初䝉上擢任宰相自以材力淺短議論迂踈不足以任天下之責丐罷機政得請宫祠既而言者交攻以罪去國是時閤下為言事官附㑹時宰以取世資但以為趨時巧宦喜富貴人耳及苗劉之變綱逺在嶺乃聞閤下奮發忠義糾合師旅取日虞淵洗光咸池回六龍以中天然後知閤下真一世之竒材因事乃見而獨恨未之識也數年前綱寓居閩中杜門不出以養衰疾適閤下自樞廷均逸彌節拜辱謙光過人惠臨衡宇因從容樽爼間奉談笑面𣢾襟抱側聽緒餘追悔昔日之非深明當世之務毎言帝徳王功伯略皆在人主心術中顧所以致之者何如耳竊自慶折以謂炎運中微天心悔禍光輔聖主恢復祖宗之業非閤下而誰未幾閤下被命來還廟廊綱亦䝉恩起廢承乏帥守踰年于此獲窺廟謨之一二以成去冬却敵之功切深嘆仰然自今春閣下專任大政以來薦進人材調護將帥措置邊防均理財用皆未聞卓然有任天下之心者聲譽損于前時規模爽于舊説中興氣象邈未有期不知何為而然也且以近日淮西敗將觀之官吏軍民二十餘萬一朝相率而北去將佐遇害甚衆閤下平日信任以為可屬大事如吕祉者被執以往剉威辱國中外震驚于誰責而可乎綱輒不自揆激于憂憤上疏指陳朝廷措置未審深可痛惜乃鑒前失以圖將來者十有五事達于冕旒之前情迫言切扺忤必多其知我者以為出言納忠婺不恤緯而憂宗周之隕其不知我者以為出言侵官汲黯之戅又復妄發知與不知是分曲直今日國家危急存亡之秋為大臣歴事三朝懐孤忠而同休戚者其可緘黙而不言乎恭惟聖上登用閤下委任之專聽信之篤古所未有往年富平之役三十萬衆一戰而潰恕而不責恕而不問去春綱入覲軒墀親聆玉音張浚自富平敗始諫軍事嗚呼雖秦穆之于孟明光武之于鄧禹馮異何以加此閤下所宜益務持重諮諏良䇿圖不世之功以葢前愆以報知遇使後世稱之視古無愧今乃以措置失當坐失二十萬人使敵得以増其氣焰此豈小失雖聖度兼容未以此為罪天下謂何閤下材識高逺自任以天下之重前無古人而事有出意外者愚謂所以致此知任而不知所以為任之道故也今人于此力足以舉百鈞而益之以萬鈞則力必不勝矣然有可勝之理者與人分之也今閤下以一人兼將相之權總中外之任而無與人共功名之心軟美者進鯁諒者疎逆耳苦口之言不聞曲突徙薪之謀不至變生所忽不足怪也栁子厚作梓人傳謂斵削尚于衆工而成功收于梓匠此最知宰相職業者時平猶如此而况艱難之際乎蕭何相高祖而腹心謀畫則有良平牙爪攻戰則有信布房杜相太宗而善諫則有王魏善戰則有英衛持衆効之若此所以成創業開基之功李林甫盧把挺亂危國其咎安在忌嫉而已綱願閣下為房杜之亞以穆天祚不願閤下為把林甫之流以私寵利天下之事庶幾可為也老子曰非此其無私助故能成其私以公滅私者忘身與家而其國與家俱安背公營私者不過為子孫計而其家與國俱危不復引古為喻請以近事明之當宣和末如王蔡之徒其所以謀為自安之計者深根固蒂可謂至矣一旦事變往往不能保守然承平無事禍故未作之時謂富貴可以長保而為此猶可恕也至靖康間禍故作矣如唐恪聶昌之徒其所為有甚于宣和之末然尚可恕者禍作而未之大也建炎之初承靖康之變禍故大矣然黄潛善蠧國欺君又甚于恪昌輩今其身其家又復安在天理昭然所以未之思者寵利誘于前而禍患藏于隠也方今國勢日蹙人心不寧强敵憑陵僣竊窺伺加以旱暵為灾財物殫竭而閤下獨幹化鈞佩天下之安危豈可使措置多失以蹈覆車之轍哉因淮西之變痛自懲創輯睦將帥博詢衆謀唯其是之從幡然改圖則未必不轉禍而為福也語曰過而不改是謂過矣雖古聖人不稱其無過而稱其改過閤下誠能知措置之多失而圖所以改之者豈惟宗社安而生靈䝉休閤下永膺多福而綱將歸山林亦有奠枕之安閤下不知其為非而無改之意豈惟宗社危而生靈吿病閤下之禍可立而待之而綱雖欲退休亦莫知税駕之所矣安危休戚與國家及閤下同之荷遇之深敢忘忠吿以朋友責善之義乎綱愚直私憂過計其言激切閤下亮而恕之非綱之幸也不然無所逃罪所以奏疏副本敢塵鈞覽惶恐無地不宣二月劉錡為東京副留守李顯忠南京副留守孟庾為東京副留守仇愈僧稱皇姪勘實決實配瓊州牢城遺史曰先單州碭山縣染户朱從因販棗往南京界劉婆家得一小兒曰遇僧以棗傳歸養之有金人之出戍于碭山見之曰此兒似趙家少帝染人不以為然稍長令學雕花板有京師販猪人張四見之曰此兒似趙家少帝遇僧心暗喜毎有影戲唱詞私記其宫禁中殿閣下龍鳳之語㑹三京路通有詔尋訪宋宗室令發遣行在遇僧乃自謂是少帝第二子以吿于從從不敢語遂吿於縣知縣請監酒石某問之石某乃石駙馬之親弟也既見而問之遇僧言少帝之第二子親坐翁翁懐中翁翁腋下有黒龎子常以手撚之又畧言宫禁中問其流落在人間之因乃曰少帝使院子張全夫妻背其出城以奔至下邑縣遇劉統領留之取其玉鈐張全夫妻遇劉統領尚在即尋訪而質之遇僧先謂劉統領曰我乃真少帝之子公之言當與我一同如或稍異我當以公累年作過事告于朝廷劉統領懼之且謂經大赦有不實猶引赦遂盡如遇僧言縣乃信之聞單州葉夏卿遂津遣赴行在單徐間諸邑富人隨而來三二十人有朱良翰朱邦翰者屢投牋啟皆稱殿下隨行為先生又有劉遇者為平日狎客相戲亦隨行至泗州有司法㕘軍孫守信者見而疑其實白于知州王伯路曰皇姪之事甚有可疑泗州者乃江南之門户若從此而南必州縣張皇矣莫若厚供而館之具奏取旨俟得旨津遣未晚也伯路然其言具事奏聞送門司及閤門諸處勘當淵聖皇帝無第二子用金字牌付轉運副使胡昉令委清疆官就泗州取勘到泗州對移守信為司理參軍委守信勘之一行人盡攝入獄市中皆喧言皇姪在獄言遇夜獄屋上有火赤色氣市人送飲饌入獄中一人饜飫仍有餘及獄中視看之守信見之情惶惑戒推司不得用綳拷恐致生事當以致推之後追到劉婆為證獄方具旨決脊杖二十刺配瓊州牢城筆針筆人執筆不敢下手既而刺字既細小杖直李浚執杖不敢決既而輕拂掠之皮亦不傷自此人呼為趙麻鬍院虞候鞏俊王俊送至滁之日偶市中遺火市人以為趙麻鬍經行有火光之異遇僧經過來安縣題詩于興國寺曰三千里地孤寒客七十年前富貴家泛海玉龍駕雪浪權藏頭角混泥沙猶自謂為真耳三朝北盟㑹編卷一百九十九
