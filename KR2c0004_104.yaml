body:
  text: 三朝北盟㑹編卷一百四宋徐夢莘撰建興下帙起建炎元年五月十六日乙巳盡六月二日庚申十六日乙巳京東轉運判官閭丘升責授濮州團練副使封州安置詔士大夫所嚴者名分朝廷所恃者紀綱倘於擾攘未定之間即為専輒自便之計國於何有意則可知爾初無他長専喜自用比以人材之乏卑之一路之權所兾興師以時赴援而躊躇四顧偃蹇不前逮吾幕府之開首戾轅門之令福威在己行止肆情凡今臺劾之所陳皆昔道塗之親見其鎸爵投卑要荒尚堅循省之心無負生全之賜顯謨閣直學士知東平府盧益落職宫觀朕惟國家有天下幾二百年所恃以安存者繫中外士大夫相與維持之力一旦事出倉卒社稷阽危而四方藩臣赴援者無幾朕甚傷之具官某初無他長早服顯仕光被纍朝之眷進登常伯之知在人臣冇見危致命之忠在方面冇振旅勤王之義而丁寧靡顧酣飲自如逮豫踐阼之初巧作謀身之計近臣如此謂疏逺何其鎸延閣之資往食真祠之祿兹為寬典無復重愆金人陷河中府知軍府事郝仲連被殺十七日丙午天章閣待制知同州唐重上書臣於今月十七日恭捧初一日皇帝登寶位赦書望闕宣讀人人感慨流涕當國步多艱之際忽聞詔音以定神器宗廟社稷不缺祭祀四海生靈不忘舊德誠千萬世之幸纍日祗誦細繹詞㫖其中有云紹祖宗垂創之基懷父兄播遷之難卒章伺候兩宫之復終圖萬世之安其言哀痛深切泣血銘心推原德意而施之惟恐奉詔不勤不敏以辜新政廢神霄朝拜罷常平給散限外印契額外撥折道僧還俗者給據啇賈興販者免稅如此等事於朝政非大安危也於國體非大利害也於人情非大休戚也陛下制詔之意欲紹祖宗垂創之基必思所以興復之䇿既懷父兄播遷之難必思所以救難之方此乃大安危也大利害也大休戚也誠天下人大計也然祖宗創垂之基以京師為根本以兩河為股肱金人再至京闕則根本搖長驅兩河則股肱病矣所以為興復之䇿者何如也陛下以太上皇為父以嗣君皇帝為兄金人一舉而邀兩宫當披髮纓冠而往救之矣為救難之方者何如也自古外敵之侵中國未有如此之酷然其吞噬之欲尚未厭也其憑陵之勢尚未已也前日致兵之因陛下嘗通知之乎今日禦兵之術陛下亦熟計之乎既不知已而又不知彼者必殆既不能强而又不能弱者必危陛下度彼己之實則知所以自治矣察强弱之理則得所以常勝矣此天下之大計也陛下所以興大計天下者固以素定非臣所得而擬議也然以今日之務有四而其利甚博大患有五而其禍不可勝言臣為陛下舉其略而試陳之定都關中據山河百二之勢以植根本之地所以杜瓜分之漸也建牧大藩重宗子維城之計以固磐石之基所以救瓦解之失也通夏國之好而守撫舊疆所以講好息民也立青唐之後而封以故地所以興滅繼絶也此四者千萬世之大利也雖千萬言而莫究豈非今日之急務乎若夫大患冇五而救患亦不可緩法令滋彰而吏緣為奸欲救此者莫先於守祖宗成憲朝綱委靡而不振故士大夫相習而誕謾欲救此者莫先於登用忠貞軍政敗壞而不舉故將兵相扇而奔潰欲救此者莫大於正刑賞國用竭而利源又失欲救此者莫先於選將漕之臣民心離矣而調發方興欲救此者莫先於擇循良之吏此五者非天下之通患乎今日之務有四而其利甚博大患有五而其禍不可勝言皆詔㫖之所及臣愚不忍緘默以茍容敢竭愚而妄有陳焉天下之人訃議不旋踵而投機之㑹間不容髮陛下獨斷而早圖之以起中興之運而成再造之功則祖宗創垂之基於此可紹而兩宫播遷之難於此可復矣此誠天下之大計也臣曩叨諌省屢陳致敵之因坐是斥逐承乏守土纍上禦鄰之略言皆有證頃者聞陛下以大元帥之節戡定國難臣嘗具劄子陳述三䇿乞移關中以符衆望臣區區之愚已陳其梗槩矣兹者恭承詔㫖許臣庶詳具利害陳述語言詆訐亦不加罪以此見陛下誠有聽言之意首開求言之路有君如此其忍負之臣戅愚狥國不識忌諱輒敢肆危言以塞明詔進退存亡之幾臣於此卜焉陛下不以臣愚不肖許赴行在得方寸地以披露肝膽庶幾或補於經綸之萬一臣之願也臣非為自謀也實為天下國家計也惟陛下裁幸二十一日庚戍資政殿學士王襄趙野並落職責授太中大夫祕書少監分司居住臣僚上言一旦金人再入唯叔夜自南陽引兵直趨京城精忠挺然胡直孺身冒矢石竭力前進雖敗被執其志可憫惟王襄趙野顧望徘徊迂路頓兵曠日持久無赴難之意襄總西道反自洛陽引兵赴鄧州却行南道野總北道反自大名引兵趨廣濟單州南京却行東道又襄起兵之日金人已逼洛陽既不能直趨京城以救君父之急又不肯駐軍洛陽以庇一方之民其領兵而南也洛陽已陷又鄧州逡巡遇敗復回其潰散被害甚廣及聞陛下嗣有神器即收拾瘦羸旋為迎鑾之計至於趙野其罪尤著所至從兵大掠至廣濟軍悉為兵擁進及單州皆被殘破又至南京每日遣兵卒討劫民財風聲四出滄濟州野皆所未到百姓夙夜惴栗惟恐野軍之來凡野所過民居唯存墻壁而已百姓怨恨皆於壁上題云趙相公殘破去處在在遍滿夫設總管本以禦盜而野居其位反以為盜此宜不赦以懲戒來者奉聖㫖王襄趙野並責授大中大夫祕書少監襄分司北京襄陽府居住野分司西京清州居住制曰忘身狥國者臣子之忠賞勉罰偷者朝廷之柄矧在艱難之際尤先總核之公具官某早被眷知與聞機政昨屬都畿之擾大分方面之權俾各自専靡從中制復列諸屯之卒乘將為內屏於京師庶值風塵即趨郊甸豈有兩君之在野略無一騎之入關故取迂途以為遁計既無以上紓國難復不能留庇居民公縱偏禆肆為敵害逮朕纂承之始務昭含貸之仁如汝等倫置而不問然人言荐至分綸靡容其分務於别都用少伸於邦憲以懲不恪以警無良尚深循省之思無重悔尤之積李孝忠陷襄陽府安撫使黃叔敖弃城走落職降兩官與監當差遣李孝忠者京師百司健兒也都城陷李孝忠隨衆奔竄出萬勝門得脫走京西沿路聚衆有義兄弟十人而姓李者皆立名連孝字孝忠為首又有孝義孝成孝信凡八人第九人乃張世也以衆冦襄陽府京西安撫使黃叔敖棄城走孝忠自南門入城肆焚劫虜子女驅擁强壯為軍遂據其城而不去議者請論叔敖弃城之罪故有是命朕惟國家分方面之權於平日臨師臣之選付千里兵民之寄嚴列城節制之威亦惟事出於非常則當效死而不去矧襄陽都㑹之域實漢晉用兵之郊方敵憑陵恃惟屏蔽豈有潢池之內侮遽捐城守以出奔坐使旄倪皆為魚肉迹其致禍安所逃誅念更肇造之恩姑置惟輕之典削奪名寵斥之冗官往思民冤痛自懲艾翁彥國以賦斂被罪翁彥國暴賦橫斂東南其黨吳昉為腹心助虐得轉運判官物論沸騰而莫敢言其惡人無聊生至有擊登聞鼓以訴者上始知而亟罷二人且降詔引咎以慰其民宰相李綱以姻黨昵彥國庇之至貼改詔書獨罪昉而不及彥國中書舍人朱勝非言舍渠魁而責支黨臣愚所未諭也於是卒正彥國罪孫𫝊張叔夜遙授觀文殿大學士李若水賜贈觀文殿學士敕故吏部侍郎李若水立身狥國知死不懼忠義之命無與比倫達乎朕聞為之流涕可特贈觀文殿學士與子恩澤五人賜銀絹五百匹兩耿南仲落觀文殿學士提舉杭州洞霄宫制曰兵家之算所貴伐謀廟廊之臣豈容誤國儻或信常談於紙上不知墮敵國之計中茍偷嵗月之安馴致國家之禍人言荐至邦法可逃具官耿南仲頃委政機適當邉警朝廷可否唯豫舊學之謀天下安危恃爾老成之重謂當决淝水之戰乃専主平凉之盟坐使中原幾同外壤朕痛夫二聖之狩考昔者羣臣之言誰致亂階汝為戎首姑鎸祕殿之秩以正具臣之誅尚省厥躬毋忘豫戒臣僚言南仲専講和之罪故有是命二十五日甲寅邵溥落職京都小郡制曰臣子事君當守險夷之一節國家多難豈容顧避之兩端具官某服在近途久更器使昨抗章而請覲既優詔以俯從聞有出疆之行乃為擇地之訃懷諼如此為爾悵然其亟解於近班用黜臨於小郡兹為寬宥毋廢省循二十八日丁巳遣使撫諭諸路上謂黃潜善汪伯彥曰金人肆伐中國生靈塗炭朕不得已而狥天下之情二聖北去繼序雪耻思所以追奉鑾輿者必思所以安人心求所以安人心者必求所以安民瘼比雖下詔多方凡經殘破州縣優加循恤若未盡也可遣使諸路撫諭及詔川陜城都京兆府京西襄鄧州荆南府江寧府揚州仰逐漕臣積聚錢糧帥守修治城壘宫室官舍以偹時巡省觀風俗仍令務從儉約勿致騷擾三省樞密院奉以施行解州民邵興據神稷山屢與金人大戰破其軍邵興字晉卿解州安邑人也靖康時金人攻晉絳興因起兵為盜人呼為邵大伯據解州神稷山屢與金人戰金人執其弟翼以招之興不顧其弟飲泣死戰大破金人之軍六月一日己未朔詔張邦昌一月兩赴都堂詔曰張邦昌知幾達變勳在社稷朕置諸論道之地寵以王爵欲與日引同朝共理萬物而瀝懇牢避雅志莫奪朕以崇德報功憫勞以事而飬民保國實賴圖回雖已斷來章宣赴都堂治事未極褒崇之典考祖宗故實惟元祐間文彥博以纍朝勳德禮絶羣臣一月兩赴都堂平章重事最為异數今邦昌已降指揮參决大政屬望尢重可依文彥博一月兩赴都堂仍不限時刻出省急速大政許宰執同就第議以稱朕優假荷賴之意初邦昌纍請退不許乃降是詔新除尚書右僕射兼中書侍郎李綱至南京行在是日李綱到南京行在有㫖宣召綱當赴內殿起居綱奏臣未到行在十里間御史中丞顔岐封示論臣章疏大意謂張邦昌為金人所喜更宜增重其禮臣為金人之所不喜宜置之閒地不當為相如臣愚蠢但知有趙氏不知有金人固宜為所惡然岐之論臣謂材不足以任宰相則可謂為金人所惡不當為相則不可臣愚不知金人與趙為仇敵其所以喜者為趙氏耶其所惡者為趙氏耶且為趙氏之臣而金人喜之此必有以得其心者而反可以為相自古賣國以與人者皆為忠臣矣今陛下斷自淵衷特達用臣而外廷之論如此臣豈敢當此任願乞身以歸田里至於陛下命相於金人所喜所惡之間更望聖慮有以審處上宣諭曰岐嘗有此言朕告之如朕之立亦非金人之所喜者岐無辭而退此不足恤遣御藥局邵成章宣押赴都堂治事二日庚申李綱進札子論十事其一議國是其二議巡幸大略謂車駕當一到京師見宗廟慰都人之心權時之宜為巡幸之計其二以天下形勢觀之關中為上襄陽次之建康又次之宜詔有司預為之偹其三議赦令大略謂祖宗登極赦令皆有常式前日赦書一切以張邦昌赦書為法如赦惡逆選人情資責降罪廢盡復官職皆泛濫不可行請改正以法祖宗其四議僣逆大略謂張邦昌為國大臣不能臨難死節而挾金人之勢易姓建號身處宫禁南面以朝其後勤王之師集迫不得已乃使奉迎朝廷崇之為三公真王參與大政非是宜正典刑垂戒萬世其五議僞命大略謂國家大變故鮮伏莭死義之士而奉敵㫖受僞官屈膝於其廷者不可勝數昔肅宗平賊而汙僞命者以六等定罪今宜倣之以勵士風其六議戰大略謂軍政失廢士氣怯惰宜一新紀律信賞必罰以作其氣其七議守大略謂敵情狡獪勢須復來宜於沿河江淮措置控禦以扼其衝其八議本政大略崇觀以來政出私門綱紀紊亂宜一歸之于中書則朝廷尊其九議久任大略謂靖康間進退大臣衆多而太速功效蔑著宜慎擇而久任之以責成功其十議修德大略以感天人之心致中興之業得㫖皆留榻上候詳觀有當施行者降出是日降出議國是巡幸赦令戰守五札子餘皆留三朝北盟㑹編卷一百四
