body:
  text: 三朝北盟㑹編卷一百四宋徐夢莘撰建興下帙起建炎元年五月十六日乙巳盡六月二日庚申十六日乙巳京東轉運判官閭丘陞責授濮州團練副使封州安置詔士大夫所嚴者名分朝廷所恃者紀綱倘於擾攘未定之間即為専輙自便之計國於何有意則可知爾初無他長専喜自用比以人材之乏卑之一路之權所兾興師以時赴援而躊躇四顧偃蹇不前逮吾幕府之開首戾轅門之令福威在己行止肆情凡今䑓劾之所陳皆昔道塗之親見其鎸爵投卑要荒尚堅循省之心無負生全之賜顯謨閣直學士知東平府盧益落職宫觀朕惟國家有天下㡬二百年所恃以安存者繫中外士大夫相與維持之力一旦事出倉卒社稷阽危而四方藩臣赴援者無㡬朕甚傷之具官某初無他長早服顯仕光被累朝之眷進登常伯之知在人臣冇見危致命之忠在方面冇振旅勤王之義而丁寧靡顧酣飲自如逮予踐阼之初巧作謀身之計近臣如此謂疏逺何其鎸延閣之資往食真祠之禄兹為寛典無復重愆金人䧟河中府知軍府事郝仲連被殺十七日丙午天章閣待制知同州唐重上書臣於今月十七日恭捧初一日皇帝登寳位赦書望闕宣讀人人感慨流涕當國步多艱之際忽聞詔音以定神器宗廟社稷不缺祭祀四海生靈不忘舊徳誠千萬世之幸累日祗誦細繹詞㫖其中有云紹祖宗垂創之基懐父兄播遷之難卒章伺候兩宫之復終圖萬世之安其言哀痛深切泣血銘心推原徳意而施之惟恐奉詔不勤不敏以辜新政廢神霄朝拜罷常平給散限外印契額外撥折道僧還俗者給據啇賈興販者免税如此等事於朝政非大安危也於國體非大利害也於人情非大休戚也陛下制詔之意欲紹祖宗垂創之基必思所以興復之䇿既懐父兄播遷之難必思所以救難之方此乃大安危也大利害也大休戚也誠天下人大計也然祖宗創垂之基以京師為根本以兩河為股肱金人再至京闕則根本揺長驅兩河則股肱病矣所以為興復之䇿者何如也陛下以太上皇為父以嗣君皇帝為兄金人一舉而邀兩宫當披髪纓冠而往救之矣為救難之方者何如也自古外敵之侵中國未有如此之酷然其吞噬之欲尚未厭也其憑陵之勢尚未已也前日致兵之因陛下甞通知之乎今日禦兵之術陛下亦熟計之乎既不知已而又不知彼者必殆既不能强而又不能弱者必危陛下度彼己之實則知所以自治矣察强弱之理則得所以常勝矣此天下之大計也陛下所以興大計天下者固以素定非臣所得而擬議也然以今日之務有四而其利甚博大患有五而其禍不可勝言臣為陛下舉其畧而試陳之定都闗中據山河百二之勢以植根本之地所以杜𤓰分之漸也建牧大藩重宗子維城之計以固磐石之基所以救瓦觧之失也通夏國之好而守撫舊疆所以講好息民也立青唐之後而封以故地所以興㓕繼絶也此四者千萬世之大利也雖千萬言而莫究豈非今日之急務乎若夫大患冇五而救患亦不可緩法令滋彰而吏縁為奸欲救此者莫先於守祖宗成憲朝綱委靡而不振故士大夫相習而誕謾欲救此者莫先於登用忠貞軍政敗壊而不舉故将兵相扇而奔潰欲救此者莫大於正刑賞國用竭而利源又失欲救此者莫先於選将漕之臣民心離矣而調發方興欲救此者莫先於擇循良之吏此五者非天下之通患乎今日之務有四而其利甚博大患有五而其禍不可勝言皆詔㫖之所及臣愚不忍緘黙以茍容敢竭愚而妄有陳焉天下之人訃議不旋踵而投機之㑹間不容髪陛下獨斷而早圖之以起中興之運而成再造之功則祖宗創垂之基於此可紹而兩宫播遷之難於此可復矣此誠天下之大計也臣曩叨諌省屢陳致敵之因坐是斥逐承乏守土累上禦隣之畧言皆有証頃者聞陛下以大元帥之節戡定國難臣甞具劄子陳述三䇿乞移闗中以符衆望臣區區之愚已陳其梗槩矣兹者恭承詔㫖許臣庻詳具利害陳述語言詆訐亦不加罪以此見陛下誠有聴言之意首開求言之路有君如此其忍負之臣戅愚狥國不識忌諱輙敢肆危言以塞明詔進退存亡之㡬臣於此卜焉陛下不以臣愚不肖許赴行在得方寸地以披露肝胆庻㡬或補於經綸之萬一臣之願也臣非為自謀也實為天下國家計也惟陛下裁幸二十一日庚戍資政殿學士王㐮趙野並落職責授太中大夫秘書少監分司居住臣僚上言一旦金人再入唯叔夜自南陽引兵直趋京城精忠挺然胡直孺身冐矢石竭力前進雖敗被執其志可憫惟王㐮趙野顧望徘徊迂路頓兵曠日持乆無赴難之意㐮總西道反自洛陽引兵赴鄧州却行南道野總北道反自大名引兵趋廣濟单州南京却行東道又㐮起兵之日金人已逼洛陽既不能直趋京城以救君父之急又不肯駐軍洛陽以庇一方之民其領兵而南也洛陽已陥又鄧州逡廵遇敗復囬其潰散被害甚廣及聞陛下嗣有神器即收拾痩羸旋為迎鑾之計至於趙野其罪尤著所至從兵大掠至廣濟軍悉為兵擁進及單州皆被殘破又至南京每日遣兵卒討刼民財風聲四出滄濟州野皆所未到百姓夙夜惴慄惟恐野軍之來凡野所過民居唯存墻壁而已百姓怨恨皆於壁上題云趙相公殘破去處在在遍滿夫設總管本以禦盗而野居其位反以為盗此宜不赦以懲戒來者奉聖㫖王㐮趙野並責授大中大夫秘書少監㐮分司北京㐮陽府居住野分司西京清州居住制曰忘身狥國者臣子之忠賞勉罰偷者朝廷之柄矧在艱難之際尤先總覈之公具官某早被眷知與聞機政昨屬都畿之擾大分方面之權俾各自専靡從中制復列諸屯之卒乘將為内屏於京師庶值風塵即趋郊甸豈有兩君之在野畧無一騎之入闗故取迂途以為遁計既無以上紓國難復不能留庇居民公縱偏禆肆為敵害逮朕纂承之始務昭含貸之仁如汝等倫置而不問然人言荐至分綸靡容其分務於别都用少伸於邦憲以懲不恪以警無良尚深循省之思無重悔尤之積李孝忠䧟㐮陽府安撫使黄叔敖弃城走落職降兩官與監當差遣李孝忠者京師百司健兒也都城陥李孝忠隨衆奔竄出萬勝門得脱走京西沿路聚衆有義兄弟十人而姓李者皆立名連孝字孝忠為首又有孝義孝成孝信凡八人第九人乃張世也以衆冦㐮陽府京西安撫使黄叔敖棄城走孝忠自南門入城肆焚刼擄子女驅擁强壮為軍遂據其城而不去議者請論叔敖弃城之罪故有是命朕惟國家分方面之權於平日臨師臣之選付千里兵民之寄嚴列城節制之威亦惟事出於非常則當効死而不去矧㐮陽都㑹之域實漢晉用兵之郊方敵憑陵恃惟屏蔽豈有潢池之内侮遽捐城守以出奔坐使旄倪皆為魚肉迹其致禍安所逃誅念更肇造之恩姑置惟輕之典削奪名寵斥之冗官往思民冤痛自懲艾翁彦國以賦歛被罪翁彦國暴賦横歛東南其黨呉昉為腹心助虐得轉運判官物論沸騰而莫敢言其惡人無聊生至有擊登聞鼔以訴者上始知而亟罷二人且降詔引咎以慰其民宰相李綱以姻黨昵彦國庇之至貼改詔書獨罪昉而不及彦國中書舎人朱勝非言舎渠魁而責支黨臣愚所未諭也於是卒正彦國罪孫𫝊張叔夜遥授觀文殿大學士李若水賜贈觀文殿學士勅故吏部侍郎李若水立身狥國知死不懼忠義之命無與比倫達乎朕聞為之流涕可特贈觀文殿學士與子恩澤五人賜銀絹五百疋兩耿南仲落觀文殿學士提舉杭州洞霄宫制曰兵家之算所貴伐謀廟廊之臣豈容誤國儻或信常談於紙上不知墮敵國之計中茍偷嵗月之安馴致國家之禍人言荐至邦法可迯具官耿南仲頃委政機適當邉警朝廷可否唯予舊學之謀天下安危恃爾老成之重謂當决淝水之戰乃専主平凉之盟坐使中原㡬同外壤朕痛夫二聖之狩考昔者羣臣之言誰致亂階汝為戎首姑鎸秘殿之秩以正具臣之誅尚省厥躬毋忘予戒臣僚言南仲専講和之罪故有是命二十五日甲寅邵溥落職京都小郡制曰臣子事君當守險夷之一節國家多難豈容顧避之兩端具官某服在近途乆更器使昨抗章而請覲既優詔以俯從聞有出疆之行乃為擇地之訃懐諼如此為爾悵然其亟觧於近班用黜臨於小郡兹為寛宥毋廢省循二十八日丁巳遣使撫諭諸路上謂黄潜善汪伯彦曰金人肆伐中國生靈塗炭朕不得已而狥天下之情二聖北去繼序雪耻思所以追奉鑾輿者必思所以安人心求所以安人心者必求所以安民瘼比雖下詔多方凡經殘破州縣優加循恤若未盡也可遣使諸路撫諭及詔川陜城都京兆府京西㐮鄧州荆南府江寧府揚州仰逐漕臣積聚錢粮帥守修治城壘宫室官舎以偹時廵省觀風俗仍令務從儉約勿致騷擾三省樞宻院奉以施行解州民邵興據神稷山屢與金人大戰破其軍邵興字晉卿解州安邑人也靖康時金人攻晉絳興因起兵為盗人呼為邵大伯據觧州神稷山屢與金人戰金人執其弟翼以招之興不顧其弟飲泣死戰大破金人之軍六月一日己未朔詔張邦昌一月兩赴都堂詔曰張邦昌知㡬達變勲在社稷朕置諸論道之地寵以王爵欲與日引同朝共理萬物而瀝懇牢避雅志莫奪朕以崇徳報功憫勞以事而飬民保國實頼圖囬雖已斷來章宣赴都堂治事未極褒崇之典考祖宗故實惟元祐間文彦博以累朝勲徳禮絶羣臣一月兩赴都堂平章重事最為异數今邦昌已降指揮參决大政屬望尢重可依文彦博一月兩赴都堂仍不限時刻出省急速大政許宰執同就第議以稱朕優假荷頼之意初邦昌累請退不許乃降是詔新除尚書右僕射兼中書侍郎李綱至南京行在是日李綱到南京行在有㫖宣召綱當赴内殿起居綱奏臣未到行在十里間御史中丞顔岐封示論臣章疏大意謂張邦昌為金人所喜更宜増重其禮臣為金人之所不喜宜置之閒地不當為相如臣愚惷但知有趙氏不知有金人固宜為所惡然岐之論臣謂材不足以任宰相則可謂為金人所惡不當為相則不可臣愚不知金人與趙為仇敵其所以喜者為趙氏耶其所惡者為趙氏耶且為趙氏之臣而金人喜之此必有以得其心者而反可以為相自古賣國以與人者皆為忠臣矣今陛下斷自淵衷特達用臣而外廷之論如此臣豈敢當此任願乞身以歸田里至於陛下命相於金人所喜所惡之間更望聖慮有以審處上宣諭曰岐嘗有此言朕告之如朕之立亦非金人之所喜者岐無辭而退此不足恤遣御藥局邵成章宣押赴都堂治事二日庚申李綱進剳子論十事其一議國是其二議廵幸大畧謂車駕當一到京師見宗廟慰都人之心權時之宜為廵幸之計其二以天下形勢觀之闗中為上襄陽次之建康又次之宜詔有司預為之偹其三議赦令大畧謂祖宗登極赦令皆有常式前日赦書一切以張邦昌赦書為法如赦惡逆選人情資責降罪廢盡復官職皆泛濫不可行請改正以法祖宗其四議僣逆大畧謂張邦昌為國大臣不能臨難死節而挾金人之勢易姓建號身處宫禁南面以朝其後勤王之師集廹不得已乃使奉迎朝廷崇之為三公真王參與大政非是宜正典刑垂戒萬世其五議偽命大畧謂國家大變故鮮伏莭死義之士而奉敵㫖受偽官屈膝於其廷者不可勝數昔肅宗平賊而汙偽命者以六等定罪今宜倣之以勵士風其六議戰大畧謂軍政失廢士氣怯惰宜一新紀律信賞必罰以作其氣其七議守大畧謂敵情狡獪勢湏復來宜於沿河江淮措置控禦以扼其衝其八議本政大畧崇觀以來政出私門綱紀紊亂宜一歸之于中書則朝廷尊其九議乆任大畧謂靖康間進退大臣衆多而太速功效蔑著宜慎擇而乆任之以責成功其十議修徳大畧以感天人之心致中興之業得㫖皆留榻上候詳觀有當施行者降出是日降出議國是廵幸赦令戰守五剳子餘皆留三朝北盟㑹編卷一百四
