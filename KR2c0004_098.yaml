body:
  text: 三朝北盟會編卷九十八宋徐夢莘撰靖康中帙石荗良避戎夜話曰金人再犯闕閏十一月二十五日午時城陷僕逃難於鄉人王升卿舍館夜論朝廷守禦之方一話一言悉莫不驗其文蕪其實直而不訐質而不文非所見聞則略而不書去年春金人至闕朝廷許以三關未幾食言故有十月之師又許大河為界河東河北悉與之金人又恐中國之反覆也凡河東河北守土臣親屬悉質于軍以俟及境訓諭又取大臣及家屬凡二十餘家如蔡京童貫王黼皆以罪譴而欲其家屬也如張孝純蔡靖李嗣本皆以降而欲其家屬甚者如李綱徐處仁吳敏陳闕劉韐折彥質折可求皆以用事而欲其家屬也朝廷惟命是聽所赴貶所已出京則以實告嘗見王升卿説莫儔作館伴使自圍城之後金人凡三遣使來始使命臣聲色甚厲云自後不復來矣後數日復來稍下其色怡其聲復云後不復來矣數日又來儔詰其復來之狀無辭以對哀鳴呻喙而已朝廷訝其數來雖許以三鎮托以他事遲遲其請未幾而城陷金人登城斂兵不下方遣使求和何栗等踈謬若此初李綱征天下兵四十萬以太原之圍師中五月之敗解潛八月之敗潰散殆盡而太原終不解至九月初三日辰時太原陷九十五日上下蒙蔽一人猶未知太原京師之屏翰也太原陷則王室孤內外無援可謂危矣朝廷怡然不顧惟主和議私植黨與自相矛盾烽燧不立斥候不遣敵兵翺翔河上已數日朝廷猶未定信十一月二十五日二太子圍城至二十七日尼堪四十大隊又到方始愴惶分五路遣使臣徵兵矣天下之兵除陜西五路外有漢王保甲施黔州兵福建路搶杖手皆可用何苦而不預徵耶至敵已圍都城雖欲求援不可復得矣天下之援兵不至京城圍月餘竟陷是誰之罪耶去年春金人至闕下寨皆在西北地名摩駝岡敵既去議者引汴水灌岡為水所壞者凡十有八村兾敵人不敢下寨也識者鄙之曰借使汴水可掩奚不俟敵兵之來然後引水灌岡則敵可淹沒今乃先放水灌岡是使敵人預備害也謀而不臧如此已而敵兵再來果赴東南大抵京西北城髙門皆甕城水門亦甚堅固可以守禦東南城低水門未暇修最為受敵緊處又有大於此者東南至襄鄧止有十三程五路徵兵來從漢上兼襄陽鄧保甲極可用亦可招而援也敵營城南則襄漢兩路不復通又京師漕運全藉東南動千萬計萬一乘輿播遷則百艘可以宵濟敵營城東絶糧道且使乘輿不復出矣議者欲使張叔夜一頭項披南城外下寨或在東門外下寨朝廷議不果反墮彼計中使人心痛不已諒汴京自有天地以來聖帝明王未嘗居此逮至五季之君因循茍簡雄霸一方擇地未暇也太祖龍興不遺鏃而天下稽首稱藩恐煩百姓眷彼大梁乃建城市營宫室然無山川之險四面受敵萬一敵人繚繞絶吾糧道膝居而已蓋恃險而不恃德者亡國也恃德而不恃險者危國也惟險與德俱恃國乃尊強僕嘗欲建議于朝果欲復都大梁莫若回汴河蔡河五丈河皆由城外而過借使輦運糧餉亦何憚而不車載斗量也三河既回于城外則無敵之水門舊城亦可築合復如新外門置樓櫓萬一外城失守則舊城復可守矣尼堪自稱用兵如孫吳孫吳豈可過也軍中稱二太子提十萬之師今年春直入中原如涉無人之境不戰而屈人兵金繒駝馬牛羊婦女虜掠無限班師返國逮不與三關立取真定復至闕下又如反掌之易尼堪師老太原九月不下縱至都城亦復後二太子期以迹較之其不逮二太子明矣二太子尚不可及況孫吳乎乘我太平之久軍兵遊墮國難未夷無一人用兵故敵得以乘隙借使上下一心內外相應朝廷有賢相守禦用名將雖有尼堪京師豈可破乎尼堪二太子優劣雖殊然皆善將兵其紀律嚴密故下皆用命頃在殿前見御寶批降到金人三生陳同命隊法令姚友仲以下各陳已見以聞凡敵人遇我師必布圍圓陳當鋒次張兩陳左右夾攻故謂之三生陳每陳一十五人以一人旗為頭二人為角三人為從四人為副五人為繳旗頭死從不生還還者並斬得勝受賞亦然故謂之同命隊諸將亦皆畫陳圖詣殿前司師獻欲以方陳迎敵次以兩橫陳夾攻其左右敵兵厚重復用兩直陳掩其旁此五行陳法也或欲分為八陳擊首則尾應擊左則右應擊中則首尾皆應此八陳法也僕笑而進曰自古陳必相其地之利便敵人之多寡或披山或背水設伏料敵應變在臨時豈可預為之若使敵人知我之情别布他陳將何以禦姚友仲以為然復問同命隊法奈何僕曰國家係五連法行之舊矣且如五人為五積五十人為隊押隊引於前擁隊驅于後全伍勝擁押隊有賞全伍負有誅如此則自然用命敵人之法不足遵也姚公友仲深以為然又嘗與僕料敵人之勢僕謂皆假借而養之初合謀而滅契丹也莫若申嚴邊備按兵不動使其自相攻擊可收卞莊兩虎之功則朝廷信義不缺敵亦無所生心乃假借其威使二百年之盟約一朝掃地遂俾蕞爾窺伺王室先則長驅而來深入重地遷延月餘蓋慮别路輻輳不得返國也進不敢攻止求金繒而已為時計莫若涉河之時俟其半渡河北之師邀其中勤王之兵襲其後使匹馬隻輪無北還勢乃擁衛姑息莫敢誰何既許三鎮又復不許使彼得以借口都不遷兵不徵飽食安坐以俟其秋髙馬肥長驅復來此曰假借而養成之也又自城破北兵每擊鼓以報平安其聲應如雷如日暮或天欲暗其時不常毛德如有詩云睡覺昏昏厭鼓聲者是也又于四壁栽種松柏不知何義詩又云城頭松柏鎖愁煙是也自古城陷未有不戰而陷者既陷之後豈其不戮一人殆有神物主之自十一月二十五日城陷至十二月正月盡皆大風雪連日不止略無少異天道竟何如哉曹勛北狩聞見録曰太上自北狩出城起行至過河旬日後宣諭勛曰我夢四日並出中原爭立之象不知中原之民尚肯推戴康王否勛曰本朝德澤至深至厚今雖暫立異姓後必思宋不肯歸邦昌幸寬聖念又曰我夢想當不妄苐記此事次日宣諭勛曰我左右惟汝後生健步又備知我行事為我持信尋康王庶知父母繫念彼及此行艱難勛曰臣仰賴天威可以伺便冒圍而出願不辱命得達聖意是晚太上出御衣三襱一領俗呼背心折領寫字于領中曰可便即真來救父母并押計九字復縫如故付某又索邢皇后得所帶金耳環子一隻雙飛小蛺蝶俗呼閗髙飛是今上在藩邸時手製以為的驗及皇太后信物令某不以方所必見大王奏之訓誥丁寧且囑且泣曰無念吾北行之苦又以拭淚白紗帕子付某曰見大王深致我血淚之痛父子未期相見惟早清中原速救父母此外吾不能多致語言氣哽吾脰故也待到燕山此信三聖人知餘皆不知皇后初取環子與沈押班令付勛曰到時轉語大王願早如此環遂得相見并見吾父幸道無恙皇太后以下皆哭太上又宣諭曰如見大王但奏可有清中原之謀悉舉行之無以我為念且保守宗廟洗雪積憤又曰藝祖有約藏於太廟誓不誅大臣言有違者不祥相襲未嘗輒易每念靖康誅罰為甚今日之禍雖不在此要當知而戒焉太上又令奏云恐吾宋之德未泯士衆推戴時宜速應天順民保守取自家宗廟若等頗記光武中興時事否又宣諭曰曽有龍德宫密賜馬價珠犀合子等物大王曽説欲決河灌渡河畨人等事以為密驗在敵寨臨行日恭承皇太后聖順令奏大王曰大王再使軍前欲出門時二后洎宫人送大王至廳有幼女名招兒見四金甲人狀貌雄偉各執弓劍擁衛王後女招示衆衆雖不見莫不畏肅皇后悟曰我事四聖香火甚虔謂京師西四聖觀必其隂助今陷北中愈當虔事自後夜深必四十拜乃止更令奏大王宜言崇奉以答天貺其扈從時皇太后未知主上即位嘗用象戲局以黃羅貼覆書康王字於上焚香祝曰今三十二子俱擲于局若康王入九宫者大王必得天位一擲其子果入九宫他子皆不近皇太后以手加額甚喜臣下拜即賀具奏太上大喜復位令皇太后瑞卜昭應殊異使可放心卿等可賀我勛等皆再拜道過堯山縣進早膳有燕人百餘人守太上所乘車語勛曰太上活燕民十餘萬我輩老幼感恩極深願識天顔因具奏聞為揭簾見之皆羅拜曰皇帝活燕人十餘萬隂德甚多即見回鑾不須憂悒太上曰汝等知當時救護之力耶吾獲謗不少今困厄反甚於汝輩無食時豈非天也燕人嗟怨再拜而去太上在路中苦渴摘道旁桑椹食之語勛曰我在藩邸時乳媪曽噉此因取數枚食美尋為媪奪去今再食而禍難至豈椹為終始耶至真定自東門太上乘馬與二太子並騎入門前有引旗書太上皇字府中兩街居人見旗皆哭金人不較也館於府園淨園莊午間請太上看打毬自二太子以下皆入毬場太上與皇后在廳上坐打毬罷行酒少頃侍中劉彥宗傳太子意云久聞上皇聖學甚髙欲覔一打毬詩其情頗甚恭太上曰自遜位以來未嘗近筆硯勉作一詩以答台意乃寫付彥宗曰錦袍駿馬曉朋分毬家語彥宗捧讀稱嘆即與太子起謝太上亦謝其恭也自過真定敵委蕭王管諸王國公及諸位房院委駙馬都尉曹晟管諸駙馬及帝姬不得拖後出入請路糧又委本朝王宗沔王闕李常為都管以糾之已上緣行故路不能書地名趙鴻臚子砥燕雲録曰靖康丙午冬金人既破京城當時下鴻臚寺取經板一千七百片時子砥實為寺丞兼是宗室使之管押隨從北行丁未五月至燕山府六月聞康王登寶位金人傳報領大兵現在南京不晚過河金人聞之驚駭膽落子砥急要潛出歸朝誓不久處北廷乃隂結燕人舊歸朝廷忠翊郎亳州兵馬監押朱國寶承信郎亳州指揮使王孝安二人至中京伺候二聖動靜恭請道君宸翰密數金人虛實揣求探報知其情狀戊申四月甲戌南遁六月甲子至闕下見留守宗澤留連幾半月與諸四方勤王之師朝夕聚議留守見子砥論敵中虛實情偽厯厯聳聽意欲使子砥領兵復過大河子砥辭云陷敵踰年天幸生還急欲奔趨行在朝見具奏二聖動靜面進道君宸翰以寬主上聖慮不數日聞宗公遽疾不起宇文虛中代守發來朝見八月己未抵行在次日丞相召赴都堂傳旨要宸翰即時供納及機密事百餘申疏於朝廷至九月十三日忽得三省同奉聖旨除鴻臚寺丞不候受告日下供職此子砥之舊職也二十八日雍陵楊之翰亦自燕山潛歸子砥在北中與之相從今遂復見維揚但備言此事與子砥皆符合據實而録焉二聖之北狩也道君由滑濬至燕山淵聖由淮揚至雲中道君丁未五月十八日到燕山離門三里太子􅌽請觀看射栁枝打毬飲食宴至暮次日入門于延夀寺駐驛貴妃親王帝姬駙馬聖眷同處日侍道君之側金人供奉甚厚六月初二日太子諸將請道君聖眷毬場晏會二太子捧巵跪勸道君鄭后維時躬親打毬迎待之禮至重至厚是時康王登寶位赦傳至燕山二太子得之封呈道君道君即召貴妃相賀喜動龍顔七月初淵聖至雲中駐驛燕山愍忠寺朱皇后太子祁至三郡王聖眷同處侍帝側金人供奉如道君之禮二聖兩寺居處七月上旬於昊天寺相見親王東序駙馬西序道君居在左面淵聖居右面皇太子次南面西酒五盞自早至午禮畢而歸七月中旬鄭后體候違和淵聖朱后同來延夀問候住及兩時九月十三日二聖同眷起發往中京南人與燕人涕泣送于東門之外日盡乃還金人不能禁止數日為之不市起發之前金人納絹萬匹為路費道君分賜百五十匹與仙露寺宗室仲理以下作冬衣領之者無不感泣燕山至中京九百五十里過石門至景州上盧龍嶺下過欒撒河至澤河過大漠至中京于相府院駐蹕相府院者契丹時宰相所居也一門五位左二位道君居之右二位淵聖居之中一位管事畨官居之中京人煙風物比之燕山蕭索太甚二聖服食器用皆需于燕山每兩月金人排辦供應道君聖眷千餘口淵聖聖眷百餘口比駐驛中京相府院去大金國尚三千里東京取去宗室嗣濮王仲理以下姨㜮命宗女等千人餘口至燕山仙露寺養贍口給米一升半月支鹽一升自嗣王與兵卒無異拘縻點看監視嚴密困於道塗苦于寂寞一嵗之間死及八分止存三百九十八人保州御莊宗室趙遵顧奉使金國亦在燕山拘縻國相尼堪近許放還本州其御莊宗室仍舊不曽起發奉使官中書侍郎陳過庭并文武官五十餘員并門下侍郎耿南仲孫元在真定丁未八月遣詣燕山崇國寺安泊至十月國相尼堪到燕山計議追呼出頭許其南歸無不歡呼方行備車促裝無復有指揮並押赴顯州自旦至暮方得行見尼堪以燭從頭至足照之令厚加養濟戊申三月間一南人貨驢肉瓦橋來買得故紙內有本朝定本赦書司馬朴枷項禁勘獄成申元帥府已而貸死杖七十依舊養濟知燕山蔡靖其子松年與眷屬同處金人養濟甚厚松年與一渤海道奴通事燕市中合開酒肆燕王嗣濮王宰臣何栗樞密張叔夜駙馬曹都尉並皆身亡其餘有從淵聖在雲中者未知存亡宗室拘縻從官養濟之宜于此知其詳也東京取醫官教坊內侍內人作匠司天官吏國主元帥人等共分驅使燕山得國主指揮更不發遣厚與養濟于諸寺院內安泊內侍內人皆為主帥所有醫官開鋪樂人作場司天行術作匠執藝各自營生衣食方足畿輔所破郡縣盡皆驅策北行何啻千萬比到燕山無論貴賤壯弱路途之遙飢餓之困死者枕藉骨肉遍野壯強者僅至燕山各便生養有力者坐營鋪無力者喝貨挾托老者乞丐於市南人以類各相嫁娶燕山有市賣人充軍兵敵得南人視人立價賣之此本朝人陷敵於此可見也金國渤海漢兒契丹等若坐知州知判知縣場務官更有元帥府亦差除即如知州知縣差兩處朝廷差官元帥府更差即是三人互相爭權乞取財物乃至料物錢共輸皆出民間有公事在官先漢兒次契丹方到公人丁未冬宰相劉彥宗差一人知燕山玉田縣國裡朝廷亦差一人來交割不得含怒而歸無何國裏朝廷拘取劉彥宗賜死續遣一使來評議彥宗各賂萬緡乃已有兵權錢穀先用金人次渤海次契丹次漢兒雖劉彥宗郭藥師亦無兵權契丹時不用渤海渤海深恨契丹金人兵興渤海先降所以金人多用渤海為要職燕山留守二人金人薩勒扎判官郭藥師薩勒扎者阿固逹之族弟也又有三司使契丹莽嘉渤海大率燕人張令言領之宣徽使契丹果格燕人韓鼎裔領之渤海李菩薩奴為統軍漢人劉昉為部領此金人族系所出設官之宜于此也丁未六月國裏朝廷指揮選南人文武八員與太子伴讀選得陷燕官前燕山孫設司録張岩等八人並換北官除北部郎中特賜金録厚支盤費令燕人歸朝官韓昉待制館伴赴御寨九月金人遣燕人直史館王樞奉使髙麗令吳鼎是南官撰册文至戊申正月劉彥宗移文河北已得州縣鎮搜索舉人二月一日已前起發赴燕山就試與免科差于竹林寺作試院與北同院異場引試二月十七日引試北人詩賦一場二十八日引試南人作南朝法試三場其試官分南北南試官張堅王文昌王庭直初軍前取太學生三十八人金人師退復令入城獨顧友臣服金人隨軍至燕山授北官校書郎是時三月二十七日開院北人四百人取六分南人六千人取五百七十一人並皆推恩劉彥宗云第一畨進士寬取誘之丁未七月初二日太子往御塞離燕山七百里到涼殿傷寒亡殁金兵皆𠢐面號泣其尸載來燕山八月初歸本國每破州郡用一金人一燕人一南人同共鎮守有投拜開門者知州官屬更不改易並依舊法此金人政事之紀于此可見也河南五十四州古契丹沙漠之地自耶律建國之故如奉聖歸化州之類遇有差發金國不甚計較著軍數目願南征者甚衆蓋利金帛子女也沙子裏在沙院西北去金國四十里廣有羊馬人藉此為生五穀惟有糜子喬麥一嵗一收地極寒而草茂冬月不凋雖枯不梗馬可卧柔如氊毯南接天德雲內北連黨項國南關口到此數程無水舊契丹有使命往還用皮毬盛水駝負之天祚有子趙王者見在金門御寨許王者乃元妃所生年十八九今在沙子天祚有弟逹實林牙已立為主稱天輔皇帝盛聞結集兵馬已及數十萬待時興舉頃年郭藥師所簽常勝軍自藥師投降復慮反覆將常勝軍盡皆放散各令歸業連嵗軍兵兩路進發折傷逃亡人數頗多令復引剗刷追呼補數燕山有倉三座並無見在每支遣職給民間錢帛庫在內中並無見積止有絹七萬匹所取本朝輅輦逍遙子在燕山延夀寺安放河東河北州縣領防守每州漢人契丹奚家渤海金人多寡不同大州不過留一千戶縣鎮百户多闕額數河北路邢磁冀莫未下皆用兵守之更不攻打舉諸國並簽南軍無慮十五餘萬人鎮守之數在內衣糧隨處掠取此金人虛實之情可於此見也御寨去燕山三千七百里乃金國主所居之營也供奉使喚南人居半銜冤負屈皆謀叛亡之心戊申正月數千人同謀山中砍柴為名盡置長柯大斧欲劫其主入山據險結集南兵迤邐南來獻于本朝復以為質無何南人告變於是根究情實殺謀首者數千人其事遂寢舊歸朝官中大夫集賢殿修撰張龔告宰相劉彥宗乞知真定府獲鹿縣其人荷國厚恩不忘忠孝自丁未冬到任結集五馬山馬政趙邦傑等及中山兵民先復真定次取燕山戊申五月有日舉事無何南人告變張龔不定以疾告歸燕山府潞縣舊南官巡檢使楊浩於丁未九月入玉田縣山中與一北僧智和禪師結集招誘南北忠義壯士謀舉大事其人於戊申三月來燕山城中子砥乃以物色而問其詳云招誘南北人士已及萬數若得三萬可以橫行敵中決報大讐繼時楊浩復入中山易州界接山有一燕人之子年十八小名劉黑忙豪勇俊邁異於常人逺近無不推服於中山聚徒黨選南北人少壯者興舉義兵邀擊金人意欲令人推為燕主與本朝結好自戊申三月金人聞之於燕山府集千人往易州山中擒捕劉黑忙其中險峻不可進其傍見用守把山路劉黑忙徒黨日盛招集愈多南北忠義之士自投者甚衆已及萬數金人未易可制此南北離潰之情於此可見也宣政以來朝議所失者逺結金人近滅契丹之過也金人既并其國我朝雖厚其賜豫重其和好必來襲我治安初金取契丹實意在我國况開其路而引之耶金人講和以用兵我國斂兵以待和邇來遣使數輩皆不得達劉彥宗曰金國只納楚使焉知復有宋也則是吾國之與金國勢不兩立其不可講和明矣往者契丹主和議金人専用兵十餘年竟滅契丹今復陷其轍譬人喂虎以肉喂之食盡終必噬人若設陷穽以待之然後可以制虎也三朝北盟會編卷九十八
