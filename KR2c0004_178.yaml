body:
  text: 三朝北盟㑹編卷一百七十八宋徐夢莘撰炎興下帙起紹興七年四月十七日戊申盡八月五日乙未十七日戊申追尊道君皇帝為聖聞仁德顯孝皇帝惠恭皇后王氏為顯恭皇后皇后鄭氏為顯肅皇后五月九日庚午張浚還行在行狀曰公自淮西歸與趙鼎在相位以招賢才為急務從列要津多一時之望執事奔走效職不敢自營人號為小元祐又以人主當務講學以為修身致治之本薦河南門人尹焞宜在講筵有指從召赴闕㑹旱灾公力求去至再四上曰秦檜何如公曰近與共事始知其奸上曰然則用趙鼎公本以檜靖康時建議立趙氏不畏死有力量可以共天下之事而一時仁賢薦檜尤力遂推引同朝始覺其顧望包藏因上問故及之嶽飛居江州乞持餘服嶽飛與張浚議事不合既回鎮即上言將相議事不合乞罷兵守餘服不候報即往江州入廬山廬墓上遣使宣諭之猶不起劉豫陷隨州六月吕祉自淮西來張宗元為湖北京西路宣撫判官以監嶽飛軍吕祉還淮西王德來朝吕祉舉止驕傲不諳軍旅統制官有兩使有正使者橫過唱喏祉頷應之有伺候終日稱歇息吃食調弄聲樂之類不得相見其下多憤怒統制酈瓊王世忠狀王德之罪于朝德密知之遂赴行在上問之德具言諸將驕暴恐别生變上愕然遂命德以本軍入衛七月張浚為淮西宣撫使楊沂中為淮西制置使吕祉無馭將治軍之才諸將皆恣橫祉密聞于朝廷議遣張浚楊沂中往分其兵乃以浚為淮西宣撫使沂中為淮西制置使八月戊辰酈瓊王世忠靳賽趙四臣王師晟叛殺喬仲福等執吕祉等附於劉豫楊沂中為淮西制置使先遣吳錫以兵往淮西察其兵中動靜酈瓊王世忠等覺之各有異志統制康元曰朝廷素輕武臣多受屈辱聞齊皇帝折節下士皆為之用衆皆不應猶相視以目先是王師晟常出戍在夀春府擕路政弟子文奴以去訴於吕祉是時將士方不安祉之政師晟還廬州乃與瓊世忠及張全等謀為叛亂瓊遣邀截祉所發遞角盡得祉所言軍官之罪瓊等大怨怒康元曰歸事中原則安矣戊辰諸統制晨謁祉方吃茶瓊袖中出遞中文字呼統制張景曰諸兵官有何罪張統制乃具許多事申朝廷祉見之大驚欲退走不及為瓊所執有祉之承局者以刀欲砍瓊大呼曰怎敢如此忽見有執鐡骨朵者瓊取以擊承局承局死于階下瓊之提轄已殺張景於聽事又殺喬仲福邢支劉永并執前安撫趙康直安撫趙不羣及先輔率前軍先驅以行軍士縱剠城市而後去途中瓊等好謂祉曰王德入朝妄奏瓊等有叛志瓊等懼朝廷見疑所以為此願尚書及安撫奏知明瓊等無叛心則瓊等駐軍淮上以待朝廷之命祉然之奏書已行瓊行至霍丘殺祉并殺康直而縱不羣歸蓋不羣方代康直為淮西安撫知廬州未旬日無怨恨於軍中也上聞之慟哭悔恨者不已劉錡吳錫至廬州以兵追之不及錡還涿州瓊等遂附於劉豫諸軍前遁不返者加官而復其軍額初張浚欲改易淮西兵政參政張守以為不可力勸止之不從守曰若必欲改易須得有紀律問望素髙能服諸兵官之心者一人方可浚曰正謂有其人故欲易之也是時祉衣服儇侈語言輕易嘗自謂若寄總一軍通明堂大禮當白拏劉豫父子來然後盡復舊疆守知浚意必欲用祉而浚往淮西視師守慮其輕改軍政乃以書戒浚持重不當容易答書言必改易之意甚堅及用祉果致敗事二十三日癸未詔求直言八月楊沂中居廬州五日乙未劉豫遣使乞兵于金國是時僞齊國中風傳朝廷將欲北伐者僞皇子劉麟奏云近者聞人屢言張浚總管烏合之衆或逼宿亳或窺陳蔡或出襄漢增修器甲趣辦軍糧此其志不小先起者制人後起者制於人欲乞從本國選差官聞於上國請發突騎諸路先入伐其奸謀豫從之遽命李鄴姪壻僞迪功郎監南軍遊河僞宣議郎皇子大總管府准偹差委楊堯緻乞兵於金國堯緻以病辭遂命僞宣教郎户部員外郎韓元英代堯緻行張浚至廬州張浚以淮西宣撫至廬州欲追酈瓊聞既渡淮矣遂還泗州朱勝非知宣州朱勝非以觀文殿大學士知宣州有都督府所增耗米勝非奏罷放宰相難之勝非即揭榜先次放免以請于上上大悅而宰臣憾焉嶽飛赴行在初嶽飛解兵往江州廬山持餘服也纍召促不肯起朝廷劄下宣撫使參議官李若虛統制王貴同去請飛依舊管軍如違若虛並行軍法若虛既至廬山東林寺見飛道朝廷之意請飛執堅不肯出若虛曰是欲反耶此非美事若堅執不從朝廷豈不疑宣撫且宣撫乃河北一農夫耳受天子之委任付以兵柄宣撫謂可與朝廷抗乎宣撫若堅執不從若虛等受刑而死何負於宣撫宣撫心豈不愧凡六日飛乃受詔赴行在張浚道上所以眷念之意且責其不候報即棄軍而廬墓飛辭窮曰却何如作主張浚曰待罪可也飛然之遂具表待罪樞密院使見飛所上表已有忿之意矣金人斬髙慶裔於㑹寧市節要曰髙慶裔尼堪用事者烏竒邁之長子宋國王宗盤欲誣尼堪故先折其羽翼以髙慶裔有贓下大理寺尼堪免官為庶人贖髙慶裔之罪金主不允慶裔臨刑尼堪哭别之慶裔謂尼堪曰我公早聽某言事豈至於今日某今死爾我公其善保之以此知慶裔嘗教尼堪之反也明矣尼堪以病殂節要曰尼堪以慶裔故絶食縱飲忿悶而死雖非捉刃所迫乎非正命也尼堪獄中上書臣聞功大則謗興德髙則毁來此言是也自振古之論以周公之聖人也當成王即政之初以言其業則未盛以言其時則未太平也以言其君則幼君也周公是時建功立事制禮作樂盡忠竭力勤勞王家公之功德編於詩書流傳于天下古今稱之無愧焉尚有四國之流言誅弟之過也况後世不及周公者乎臣今所慮孰敢辨於陛下念臣老矣臣于天㑹之初從二先帝破遼攻宋兵無五萬之衆糧無十日之儲長驅深入旄旗指處莫不請命受降遼宋二主及血屬並歸囚虜遼宋郡邑歸我版圖方今東瀕大海西徹􅀈溪南連交廣北抵漠北罔不臣妾以大金創基洪業繼治盛朝先帝所委臣之力也又扶持陛下幼冲以臨大寶南面天下臣之功也臣之忠勤過于周公之闕文賴成王之聖也今臣雖吐其言在陛下察情臣用陳前日之罪御林牙兵忽然猖獗干冒陛下用臣出師之任臣受命欲竭駑鈍之才盡淺拙之謀以狂孽指日可定不期耶律潜伏沙黨復反交攻凡三晝夜其勝負未分猶可為戰余杜充糧草已斷人馬凍死御林牙兵知我深入重地前不樵蘇後又斷糧所以王師失利又副將外家將心生反逆背負朝廷外家之欲反彼有其由也知父兄妻子並在御林牙軍中兩軍發釁其外家得將軍下數千騎自亂我軍使臣不得施此大敗之罪也非臣慢忽願陛下察臣之肝膽念臣有立國之功陛下有繼統之業可貸臣螻蟻之命嗚呼功成名遂身退天之道也臣嘗有此志貪戀陛下之聖意眷慕陛下之宗廟躊躇猶豫以至于此使臣伊吕之功反當長樂之禍願陛下釋臣縲絏之難願成五湖之逰誓竭犬馬之報下尼堪門下先王制賞罰賞所以褒有功罰所以誅有罪非溢怒也朕惟國相尼堪輔佐先帝曾立邊功逮先帝上仙朕繼承丕祚眷惟元老俾董征誅不謂已持重權陰懷異議國人皆曰可殺朕躬匪敢私殉奏對悖慢理當駢戮以彰厥過嗚呼四皓出而復興漢室二叔誅而再造周基去惡用賢其鑒如此布告中外咸使聞知自尼堪死穹廬內變嘯聚蜂起思謀每夜展轉無寐或被衣而坐或默然而歎曰可惜官人備厯艱阻以取天下而今為數小子壞之我未知其死所矣尼堪之家呼尼堪為官人思謀尼堪家人數小子者謂金主亶輩也思謀妻曹氏沐之裔也曹常語臣故得知之改官制授寧逺大將軍遷沁南軍節度使知懷州太行義士破懷州萬善鎮思謀率兵保城集父老諭之曰爾等撫諭子弟無得扇搖南軍來吾開門納王師其奸詐如此烏珠凡軍國大事皆咨問之趙鼎為醴泉觀使兼侍讀召赴行在劉道主管步軍公事楊沂中之請張浚不得已而從之酈瓊等到僞齊先是順昌府報到京師云江南劉相公副都統制酈瓊等帶劉相公全甲人馬共淮西百姓十餘萬歸附乞拘留器甲訖豫大喜命重粉飾門墻一新從衛增重儀仗以待其來遣僞户部侍郎馮長寧僞選鋒統制李帥雄為接納使副是日也瓊到京師豫御文德殿引見僞命瓊靖難軍節度使知拱州劉光時僞北京大名府路副總管趙買臣僞南京副總管王世忠僞皇子府前軍統制靳賽僞左軍統制餘或諸州兵馬鈐轄或遙授準備差使緝捕盜賊令瓊等具王師必欲北征備說江南諸軍虛實遣長寧再乞兵於金國三朝北盟㑹編卷一百七十八
