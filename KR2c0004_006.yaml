body:
  text: 三朝北盟㑹編卷六宋徐夢莘撰政宣上帙起宣和四年四月二十三日辛亥盡五月十三日庚午四月二十三日辛亥童貫駐軍高陽關宣撫司揭榜示衆榜曰幽燕一方本為吾境一旦陷沒幾二百年比者漢畨離心內外變亂舊主尚在新君篡攘哀此良民重罹塗炭當司遵奉睿㫖統率重兵已次近邊奉辭問罪務在救民不專殺戮爾等各宜奮身早圖歸計有官者復還舊次有田者復業如初若能身率豪傑别立功效即當優與官職厚賜金帛如能一州一縣來歸者即以其州縣任之如有豪傑以燕京來獻不拘軍兵百姓雖未命官便與節度使給錢十萬貫大宅一區惟存勉力同心背遼歸漢永保安榮之樂契丹諸畨歸順亦與漢人一等已戒將士不得殺戮一夫尚或昏迷不恭當議别有措置應契丹自來橫斂悉皆除去雖大兵入界凡所須糧草及車牛腳乘並不令燕人出備仍免二年稅賦使北録曰政和七年童貫建北伐之議大出禁旅告戒河北諸師皆先事而具二月中旬前軍已發三月上旬卜吉貫領中軍戒塗在廷無敢異議上意欲須賀正國信使歸以司封員外郎陶悅假太常少卿為國信使知霸州李邈副之二月二十五日入國門適貫導從出門與國信使副相值遂得傳㫖令先至府中議事翌日悅與邈至貫府第貫略問使人道塗次第遂問遼國有冦果否悅對不聞貫云何以知無冦悅云悅所行道日行一程既不留且又不改行他路以此知之貫又云何以知他處無冦悅云所至皆以物賂聽頭訪其國中事宜但云唯時女真爭戰别無他冦貫云見說人多流移悅云悅所由路皆有居人皆耕墾所過處觀者滿道不見有流移也貫又云已有人據易州悅云非悅所由路然每採訪不聞此也貫詞色甚厲又云今已圍霸州朝廷已起兵賢何不說悅云悅自雄莫來去霸甚近亦不聞此此皆貫已曽虛妄奏陳欲遂實其說爾貫云莫是初無聖㫖賢不曽探問否悅云尋常使人不待得㫖自當探問敵中事宜回日聞奏悅又白貫云有談襄者欲立九大王九大王竄入深山藏逃衆人即時捕殺談襄以此觀之彼國人心未至離異且悅到莫州得雄州探報云已差接伴人使大使耶律不得名副使姓李洎悅過界與接伴相見副使乃姓王接伴使人非機密事界河至莫數十里而探報如此乖繆若諸事如此未可輕動也貫大怒乃曰彼國待使人如此悅云以前使人禮數悅所不知但隨行人皆言前後禮數如此厚貫即云莫是賢聞得他相厚遂不說事宜否悅云悅輩士人豈以禮數稍厚遂隱敵情也貫見悅意終不相假不敢隱遂悉以所問奏知翌日道君皇帝見二府具道此說云他甚有備三省且收起文字以此推之北伐實非道君皇帝之意貫既狂妄誤國是時在廷皆無敢拒之者聖意欲俟國信使來問而後行萬一其或可緩也而悅幸能縱橫遏其說而撤其謀即日下詔抽回已發禁軍拘收已降宣頭悅聘復命忠實可嘉當是時朝廷不敢峻其褒擢詞呈不敢指其事實則貫之氣熖可知矣士大夫雖心服之而不敢昌言故其說罕傳又五年悅不幸既死貫復理前議所以成今日之禍也以今日禍變之甚則知前日悅力排其說為利可勝算邪建炎末臣僚以此上言有㫖褒贈告詞曰故承議郎陶悅朕信賞必罰以勵多士彰善疸惡以風四方率由陟降之公靡有幽明之間以爾剛毅有守直諒不回頃自曹郎出將使指陳婁欽窺敵之策排王恢首禍之謀時既息于起戈忠遂昭于寤主言非耳剽事可指陳一時誤國之奸既莫逃于明罰九泉遺忠之士豈可後于顯褒疏恩閔章陛華祕殿庶以伸久鬱之公議賁不朽之餘光尚其有知歆此茂寵可特贈祕閣修撰五月九日丙寅少保鎮海軍節度使開府儀闕十三日庚午陜西河東河北路宣撫使童貫奏乞應副軍期奏曰臣仰遵睿訓付以北事夤夕竭慮深恐不逮上辜委寄之重臣竊惟復燕大計昨正月間女真下中京伊都往雲中契丹分力枝梧女真之際我乘機㑹進兵收復諸事省力既失此便已為後時臣奉詔來北星夜倍道于四月二十三日到高陽關整促行軍之備即見河朔將兵驕惰不練陳敵軍須之用百無一有如軍糧雖曰見在粗不堪食須旋舂簸僅得其半又多在逺處將輸費力軍器甚闕雖于太原大名開德支到封樁名件不足或不適用至于得地版築之具并城戍守禦之物悉皆無備蓋河朔二百年未嘗講兵一旦倉卒責備頗難臣近聞易州軍民萬人延頸引領以獻城壘又西兵未來未敢出應到彼復疑臣雖夙夜竭力經營漸向就集然尚慮將輸及軍須守具版築之類備之稍緩更遷延旬日復失事機伏望指揮下河北漕臣中山真定高陽關路帥臣究心辦集及催已差下將兵星夜赴本司應期驅使疾速前去如少敢稽緩有誤軍期並置軍法各令知悉童貫至河間府分軍童貫至河間府分雄州廣信軍為東西路以种師道總東路兵屯白溝王禀將前軍楊惟忠將左軍种師中將右軍王坪將後軍趙明楊志將選鋒軍辛興宗總西路之衆屯范村楊可世王淵將前軍焦安節將左軍劉光國冀景將右軍曲竒王肓將後軍吳子厚劉光世將選鋒軍並聼劉延慶節制童貫次雄州議進兵童貫次雄州諸軍既集以种師道為中軍且議進兵師道曰今日之事譬如盜入鄰舍不能救又乘之而分其室且師出無名事固無成發蹤之初宜有所失貫曰今日之事上既有成算第藉公威以鎮服耳第行勉旃謀之不臧不以罪也因出御筆俾不得辭楊可世請于貫曰事起之由毫髮未嘗預一旦臨利害若倉卒失計我輩要領固不足惜恐有不虞辱國為重願熟計而後行貫未語和詵在坐曰公自謂有萬衆莫敵膽氣絶人視堂堂之師如摧拉枯朽今日觀之一懦夫耳燕薊之民真若沸羮望以蘇我儻金鼓一嗚必便比肩係頸簞食壺漿以迎王師豈有他哉公欲扇釁敗我事耶可世默然不語貫即以詵副師道以可世為前統制下令以素車壯士馳開諭招來之意無得邀功生事又令良嗣草書令歸朝官張憲趙忠諭淳禍福書曰月日太師領樞密院事充陜西河東河北路宣撫使楚國公童貫謹致書秦晉王閣下蓋聞順天者昌逆天者亡得人心者可以立國失人心者罔克守邦惟天人精祲相與之際乃禍福存亡必致之理明者未形而已悟愚者患至而猶安竊惟國王之于大遼親則叔姪也義則君臣也白水之師播越蒙塵國王不能率兵赴難使之復位乃乘隙以自立非篡而何此所謂逆天也西京危急亡在朝夕國王又不能遣兵命將拯人于塗炭哀此元元其將疇依失人之心無大于此夫逆天道失人心如此其甚國王如是自視可能久乎則是燕薊雲朔名為有主其實無主也國王春秋髙且又無子而乃驟用餘列庶出之姪擾攘顛錯以致于此燕人何辜坐待殘滅皇帝惻然念之乃命貫領衆兵百萬救燕人于水火靈旗北指漸次燕圻天地神人莫不悅喜于于而來者如水之就下沛然孰能禦之想惟國王亦已知之矣國王溫恭和裕通達古今存亡之機洞然深悉善為計者因敗以圖成轉禍以為福如能開門迎降歸朝納土使國王世世不失王爵之封燕人亦無踏斧鉞之患孟蜀南唐及兩浙錢王昔嘗納土並享王封襲傳至今子孫昌盛天下耳目衆所共知國王翻然入朝豈減錢王故事如其不然當議進兵國王勢蹙事窮天厭人離欲北走則無所歸欲南歸則安可得當此之際雖悔何追况大遼五路所𬋩州城四京已為草莽區區之燕必不能守國王平日以仁愛為心若能知昔人存亡之機救燕薊一方之命其餘隂德與世無窮若國王疑遲猶豫不斷竊恐子密竊發于便室嚴莊遽起于帳中國王之識兼人亦豈不能慮此乎若是則國王左右前後之人皆敵國也毋踏前車取笑後世貫與國王幸有一面之契不敢不以誠告惟審思而熟計之勿為庸人所誤亮此悃誠速希示報不宣宣撫司募馬闕入燕招諭茆齊自叙曰宣撫司使張憲等持書入燕燕王得書執二人斬之知游說不行於是募某借閣門宣贊舍人以往臨行以三事白童貫一乞戒將士勿使求取珍寶遞相獻遺用嚴軍律二請勿妄殺降人用安燕人之心三願審量事勢乘機舉用勿以使人為念唐儉小義古人所行某一介之微得盡忠節茍利于國死無所惜時皆偉之士卒願偕行者一十五人五月十八日晚過白溝食時至燕界新城縣差到契丹漢兒官一員引伴須臾有父老數百人填擁驛外詢使人何處來僕遂出榜讀之衆皆驚愕有漢兒劉宗吉者自後竊出相謂云使人今夕當宿涿州宗吉涿州人也見𨽻白溝軍中願得敕榜副本擕示諸人他日南師入境願先開門以獻今夕復當密至驛中遂擕二副本往晚抵涿州入小使驛祗接如國信禮夜久忽劉宗吉自壁衣下出云今燕京諸處皆無軍馬止是四軍大王有部曲三百餘騎曽厯戰陳四軍大王者奚人蕭幹小字古爾班常統契丹渤海奚漢四軍故號四軍大王其餘有馬軍六七百皆富豪兒郎不識戰鬭今白溝北岸下寨結草人相間夜飲晝睡馬亦散放若南軍乘夜劫之但聞軍聲必自潰走宗吉欲以此事往見宣撫立少功績恐南軍不察見害若得一文信庶得必達僕籌慮久之仍作一書上童貫且以貫所贈新履一隻為信使宗吉去明日燕京差到漢兒官牛稔充接伴使達燕京外復遣四方館使蕭奧禮部郎中張覺乃後來據平州者充館伴館淨垢寺次日有殿前指揮使姚璠樞密承㫖蕭䕫都管伊遜來伴食因請所持書榜云兩府官欲借看僕云宣司令見九大王親納不敢先以示人辭難久之衆持榜去既暮諸人親來云書榜中語言大段狂悖多是指斥不通商量安敢進呈今復納回僕笑而取之謂諸人曰貴朝不度德量力不審天時人事此何等時而較此閒事耶蕭䕫曰南朝禮義之國今不顧盟好輒先舉兵兵貴有名不知兵戈緣何至此僕答曰朝廷命將出師使人不能盡知但略聞北朝興兵纍年並不相報天祚皇帝播遷不發赴難之師乃篡立于燕京鄰國義均兄弟今來問天祚皇帝車駕所在又聞已削降為湘隂王事出非常興師問罪訪尋邊主存亡舉合禮經何謂無名䕫云國不可一日無主本朝緣天祚失道奔竄宗社顛危臣民推戴册立今上事與貴朝殊無干涉何在問罪况自古有之唐明皇奔蜀肅宗即位于靈武但期中興豈不與此事體一同南朝宜念鄰國久和之義假借兵力共除大難今乃乘釁攘奪民土豈所望于大國哉僕曰明皇幸蜀太子監國既即位乃册明皇為太上皇禍亂既定迎還明皇肅宗親步控馬此則君臣父子之道盡矣貴朝初非委託自立又貶削湘隂之號何可少望古人况假師求救當在志誠包胥泣秦孔明趨吳皆竭誠意豈鄰國不相應耶貴朝泥于矯飾未嘗行一信使本朝雖有哀救之心無所施設今大兵壓境止在旦夕禍福存亡貴朝君臣自裁可也諸人唯唯而退次夕云門下侍郎李處溫自外來未見書榜再借觀之次早姚璠來云已議定來日欲令宣贊朝見若對上且委曲庶易酬答迫暮數人者復集互發言云南朝徒誇兵衆不思天理不順人無鬬心昨日种師道發楊可世一軍過白溝本朝小小迎擊南朝望塵退走若非自來和好已直入雄州矣既一靣遣使又一靣進兵却容易退走是何顔靣自此已往如何可休兼宣贊受劉宗吉之約其人已陳首即探懷取所付書履作色云宣贊却如何歸得僕徐答曰某之此來非尋常禮貌之使每切畏謹唯恐為兩國生事今次乃招納使人劉宗吉獻誠欵安得不受大軍之來初得朝㫖不許殺戮一人昨日必是立旗招安為貴朝軍馬襲取萬一宣司申取朝廷降一討蕩指揮少俟西軍畢集恐非燕民之福蕭䕫愕然曰南朝遣宣贊來作死間耶不謂南朝弃士大夫之命如草芥也僕答曰某之此來本以一己之命易全燕之命悟則同生不悟則同死也又豈以徒歸為志且兵家用間最為下策水能載舟亦能覆舟或用間以成功或用間以傾敗或彼强我弱或彼我勢均固有用間以離析其勢者如目今貴朝事勢兵力自視南朝十分有一否百分有一否千萬分中有一否若非念自來鄰國契好即分兵數項整陳齊入不識貴朝何以禦之何在使人矯陳禍福為死間耶䕫等唯唯而去曰少間析津府自有行遣析津府在燕京如京師之有開封府僕因相送且笑謂之曰某此奉待行遣只不可錯了一旦使燕人盡成血肉則甚幸自是館伴者凡三日不至二十六日晚忽蕭奧張覺押贐路綿綺衣襖并從人銀絹等物來云來日發宣贊回程僕辭以未見九大王及未得回書不敢受贐奧云李門下傳聖㫖有故事支賜請留李門下者處溫也初欲靣議稱藩因白溝之衄遂已差祕書王介儒都官王仲孫賫回書同往雄州宣撫司封氏編年曰馬擴見燕王王俾譯者責馬云兩朝講好百有餘年忽爾踰盟以兵臨境曽不畏天自古違誓國祚不長馬答如見姚璠等說及上敕與檄書呈燕王令姚璠讀訖付門下省令聽敕既至庭中具香案拜褥䕫云請舍人朝拜馬云適已見畢何云朝拜是何禮也䕫云舍人無怒於是有張畫二軸一云大宋膺符稽古神功讓德文明武定章聖元孝皇帝一云大宋體天法道極功全德神文聖武睿哲明孝皇帝馬既見帝銜知是真宗仁宗御容即朝拜捻香禮畢真宗御容昔至和初北朝昭聖初令使先賫畫像來且言兩國交歡未嘗識靣因請御容朝廷許之遂使繪畫仁宗御容昔嘉祐二年秋七月北朝遣使求上御容以為後世子孫之誇議者慮有厭勝之術上曰朕待遼甚厚必無是理遣御史中丞張升送之北主具儀服迎謁見御容驚喜及退而謂左右曰仁德之主天日之表神異如此真聖人也堯之八彩舜之重瞳不過傳聞而已今得見此真容實願永堅世好所有帝銜求得中國諡號遂塗金字書於像傍䕫令譯者讀兩朝誓書曰維景德元年十二月七日章聖皇帝謹致書于弟大遼皇帝闕下有云共遵成約䖍守歡盟以風土之宜備軍旅之費每嵗以絹二十萬匹銀一十萬兩更不差使臣專任北朝令三司差人搬取雄州交割沿邊州軍各守邊界兩地人戶不得交侵或有盜賊逋逃彼此無令停匿至于隴畝稼穡南北勿縱繹騷所見兩邊城池並各依舊存守淘壕修葺一切如常不得創築城隍開拓河道誓書之外必無所求各務協心庶同悠久自此保安黎庶鎮守封陲質于天地神祗告于宗廟子孫共守傳之無窮有渝此盟不克享國昭昭天鑒其當殛之北朝紹聖皇帝答書云孤雖不才敢遵此約謹當告于天地誓之子孫有渝此盟神明是殛嗚呼此盟可改後世何述云云又讀仁宗皇帝誓書曰竊以兩朝修睦三祀于兹邊鄙用寧干戈是偃近懷先誓炳若日星今綿䙫已深通好如故關南十縣本朝傳守已久愧難依從别納金繒之儀用代賦斂之物每年贈絹一十萬匹銀一十萬兩并前銀絹搬至雄州所管白溝交割兩界塘淀除巳前開畎者並依舊外自今巳後各不得添展其見在隄堰水口逐時决泄壅塞量兵夫之便修壘踈導外非時霖潦大假漲溢並不在關報之限兩地作過逃走諸色人並依先朝誓書外更不得似日前停留容縱恭惟二聖威靈在天顧兹纂承各當遵奉共存大體無介小嫌且夫守約為信善鄰為義二者闕一罔以守國皇天厚地實聞此言其盟文藏之宗廟付在有司依景德年中兩朝誓書顧惟不德必尋是盟茍或食言有如前誓專奉書咨問不宣讀訖䕫請馬上㕔茶罷謂馬曰舍人適聞兩朝誓書豈不懷于心乎南朝君臣忍違此約馬曰前日已嘗靣問諸公朝廷雖知有此盟所以起兵者只為燕王擅行廢立兄弟之情固宜問罪所舉豈無名也䕫曰舍人之言雖稍有理然終違約請公就館燕王召李處溫等看南朝皇帝敇榜事當如何蓋天錫知天祚尚在大金方熾大宋興兵意欲歸順未敢形言故云朝敇榜事當何如然而處溫素與趙良嗣善在天祚時二人知其國將危共議欲歸南朝遂為莫逆友密于北極廟拈香瀝酒為誓後知良嗣南奔朝廷命以直閣待遇禮厚亦欲南奔值天祚奔竄乃建立燕王為天錫皇帝既有推戴之功遂已其約至是知童貫大兵壓境猶豫未决天錫既問亦未敢令天錫南歸懼衆不協從奏云此乃軍國大事臣雖太尉位長百僚不敢以管見自處即容與大臣共議此事甚大更在陛下睿知獨斷令臣等參議天錫恐天祚復來又畏大金乃召李處溫等靣議云朕以眇躬荷祖宗之靈獲承大位本與卿等求保宗廟女真人騎復據西京未聞歸國今者大宋重兵臨境與大金夾攻朕觀人事天時不敢當寶位欲稱藩南朝與卿同保血屬未審如何言畢嗚咽流涕處溫亦為之下淚於是議遣使三朝北盟㑹編卷六
