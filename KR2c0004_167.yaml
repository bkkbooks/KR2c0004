body:
  text: 三朝北盟㑹編卷一百六十七宋徐夢莘撰炎興下帙起紹興五年閏二月乙巳朔盡五月閏二月一日乙巳詔戒飭羣臣朕惟先王之時小大之臣咸懐忠良故能竭誠體國畢力公正時有舉措丕應傒志用以經理國家無往而不濟朕甚慕之間者總師前路大敵内侵此宜臣子恐懼自竭不忘夙夜而乃奉命不䖍偷情自若顧于國家若秦人視越人肥瘠委質而仕當如是乎朕念狃于舊俗乃薄其過失先訓告而後刑罰古之道也而今而後其共砥礪式悛爾心慕事主之匪躬思為臣之大戒務盡忠赤以公滅私庶天下之務靡不畢舉敢有弗共自干憲章令出惟行必罰毋悔可令刑部鏤板遍牒行下仰監司守貳縣令太守出榜於治所曉諭施行折彦質為兵部侍郎兼樞宻都承㫖楊政為涇原路安撫使楊政字直大懐徳軍人起身寒㣲貌甚陋時人號為楊尅毯初為統制官下虞候毎統制飲宴政不喫其餘食衆虞候勸之曰此物極好何不食之政曰我所請者倉米方為極好食之可常而有味安用此為此非當食之物且不可為常識者器重之既貴得其故妻相待如初公論稱美以龍神位四廂都指揮使武康軍承宣使為涇原路安撫使野史曰楊政懐徳軍人為吳玠統制官從玠敗金人于和尚原仙人闗有功累遷龍神衛四廂都指揮使武康軍承宣使五年除涇原路安撫使九年除熈河路經畧使十年除利州路安撫使知興元府金䧟陜西政走四川加侍衛親軍馬步都虞候武當軍節度使遣統制邵俊敗金人于隴州汧陽縣牧牛嶺十三年來朝加檢校少保歸鎮二十一年進太尉二十六年授開府儀同三司二十七年薨年六十程昌禹知江州江西沿海制置使程昌禹以右朝散大夫徽猷閣待制知江州江西沿江制置使王琰主管侍衛馬軍司王琰至行在主管侍衛馬軍司以其軍𨽻韓世忠未幾罷為提舉江州太平觀陳琳叛王徳追至無為軍生擒以歸陳琳者張琦之禆將也勇力過人屯于蕪湖縣刼張琦以衆奔偽齊王徳追至無為軍境上獲之以歸四月太廟神主至自温州韓世忠進軍楚州賜韓世忠詔覽奏欲依舊留屯淮甸誓與敵人决於一戰已悉朕廹於彊敵越在海隅毎慨然有恢復中原之志顧以頻年事力未振而欎欎如此自去冬敵人深入卿首挫其鋒鼓我六師逐廹其衆既致潜師引遁而卿復率兵移屯淮甸進取之師特此為甚朕甚嘉之前日恐老小或有未便委卿相度今得所奏益見忠誠雖古名將殆無以過使朕悚然興歎以謂有臣如此禍難不足平也古人有言閫外之事將軍制之今既營屯安便控制得宜卿可施置自便勿復拘執至於軍餉等事已令三省施行方此酷暑將士良勞行飭使人賫賜夏藥撫問卿並宜知之岳飛進軍鼎州張俊以都督收楊么先遣岳飛軍于鼎州吳錫軍于橋口俊即欲進兵或説俊曰不可追而勝則捕一漁人耳如有不勝則都督為諸將輕矣俊曰奈何或曰不如先張聲言諸軍人馬各已差人犒設矣唯岳制直之軍當躬入其軍中是以犒設而進也或不勝猶有説焉俊從之未幾以輔逵代吳錫俊駐潭州五月孟庾知樞宻院事朱勝非免䘮除觀文殿大學士提舉臨安府洞霄宫中書舍人胡寅上疏論當復讐不當講和胡寅為中書舍人適遇朝廷議遣何蘇等使於金國祈請和好寅謂當修政事不宜與讐講和乃上疏極論其事乞不講和好揮戈北向蹀血金廷用復讐怨曰臣竊聞遣使人云中已有定議臣愚陋蒙陛下擢寘從辨職在獻納雖小事未當猶合上聞况遣使體大縱不預初議茍心有所未安豈敢緘黙輒行論奏伏望陛下留神省察昔孔子作春秋以示萬世人君闕之術無不偹載而其大要則在父子君臣之義而已魯桓公為齊所不共戴天之讐而莊公者乃桓公之子也非特不能為父雪恥又與齊通好元年為齊主王姬四年及齊狩于禚五年㑹齊同伐衛八年及齊同圍郕九年及齊盟于蔇是年為齊殺子糾仲尼惡之備書于䇿以著其釋怨通和之罪豈非為後世永鑒乎金人者驚動陵寢戕毁宗廟刼質二帝塗炭祖宗之民乃陛下之讐也頃者誤國之臣自知其才術不足以戡定禍亂而又貪慕富貴是故譸張為幻遣使求和以茍延歲月九年于此其效何如彼之一身叨爵竊位而去曽何足道而于陛下聖徳國家大計虧䘮多矣所幸陛下智勇日躋灼然獨見於邪言久惑之後奉將天討罪狀劉豫再安國步漸圖恢復天下忠臣義士聞風興起各欲自効以佐丕烈譬如人行萬里登車出門又如枝梧厦屋初正基柱存亡治亂實係此時今乃蹈庸臣覆轍踐已失之謀犯孔子之戒循魯莊之事忘復讐之義陳自辱之辭臣竊為陛下不取也或謂不少有貶屈其如二帝何臣應之曰自建炎丁未至紹興甲寅以來卑辭厚禮以問安迎請為名而遣使者不知幾人矣知二帝所在者誰歟見二帝之面者誰歟得金人之要領者誰歟因講和而能息敵兵者誰歟臣但見丙午而後通和之使歸未息肩而黄河長淮大江相次失險矣臣但聞去年冬使者還言敵人帖服國勢奠安形于章奏傳播逺近曽未數月而劉豫稱兵犯順矣金人者知中國所重在二帝知中國所畏在刼質知中國所懼在用兵則常示欲和之意平吾所恨而中國坐受此餌既久而後悟也天下以為自是改圖必矣何為復出此謬計耶茍曰姑為是爾豈有修書稱臣厚費金帛而成就一姑為之事也茍曰以二帝之故不得不然則前效可攷矣况歲月益久敵情益驕必無可通之理也臣嘗思之陛下與金人絶則臣下無所得而人主為義舉若通和則利歸臣下而人主受其惡故凡願奉使通和者皆身謀非國計也陛下可不據孔子之論而决此䇿乎自王安石廢黜春秋天下學士不知尊向一旦亂臣賊子接迹于四海遭逢陛下為信此書孔子之志將伸于今日臣願陛下攷筆削之意斷當今之事只行一二大者則美名必輝映千古矣當今之事莫大于邉境之亂也欲紓此怨必殄此讐而不用講和之事賢方畢集民富國治揮戈北向躪金人之庭然後復讐之義得而人子之職舉臣等駑下伸眉吐氣食息世間亦預榮矣茍為不然以中國萬民之君而稱臣于讐敵則宰輔而下皆其陪臣也借使金人欣然講解以一將軍數萬衆駐兵泗水之上欲陛下面相結約㰱血而退不知陛下何以待之則又欲變置吾之大臣分部吾之兵將割吾之土地而取其租賦有一于此其能從之則無以立國不從則隳敗和好將何據而可臣實戅昧思之不通是以畧具古義凂瀆聰聽惟陛下試加採擇或合聖意即以世讐當復無可通之義明降指揮寢罷奉使之命刻印銷印俄頃之間初無害日月之明適足彰陛下之無我也免累聖徳誤國大謀不勝區區納忠之至貼黄臣契勘自金人跳梁以來天下之論或以謂必講和議或以謂必須用兵二説謬擾無一定之論伏覩自建炎元年至今前後所遣使命若宇文虚中王倫朱弁郭允廸魏可行崔縱洪皓龔璹張邵前後祈請非不切至近又遣潘致堯高公繪韓肖胄劉松年章誼孫近魏良臣王繪相繼入國竊料金人囘書必無果决之言决有信從之語殆欲欵我耳伏望聖明深賜洞察祈請十年畧無顯効議和决不可成則臣言或可以備收録取進止五月十三日三省同奉聖㫖中書舍人胡寅論事辭㫖剴切深得獻納論思之體可令學士院降詔奬諭寅具奏謝曰臣奏論使事尋蒙宰執召至都堂面傳聖諭以為論議剴切得論思獻納之體乃令學士院降詔奬諭者狂言上瀆方懼罪戾天高聽卑遽䝉開納襄勉以勸臣下臣榮耀増激愚衷中謝臣聞天下有至公之心有正直之論違正論拂公心以行其邪説雖當悟及事已敗壊世已陵遲然後悔之則無及已姑以近事明之方王安石得志託大有為之説大有為之説者孟子之言也豈不美哉當時元勲舊徳皆言祖宗舊法不可變改安石斥之為流俗而其説盛行自今觀之其所謂有為者乃所以召亂其所謂流俗者皆賢才也使祖宗灼知于司馬光辭樞宻副使之時而退王安石罷新法則尚有崇觀之亂乎及蔡京秉政託繼志述事之説繼志述事孔子之言也豈不美哉當時忠臣義士皆以新法害民當遵元祐蔡京斥之為謗訕而其説盛行自今觀之其所謂繼志述事乃所以遂其私意其所謗訕者此忠言也使上皇灼知于陳瓘論列之時而退蔡京復元祐則尚有宣靖之禍乎天下之理一是一非出於是則入非出於非則入是理不並立人無兩存此人才邪正之所由分而國家治亂之所由判自古如此豈惟今哉金人深入以來和戰兩議肇於孝慈在位之日兩議不决馴致北狩自今觀之敵人之不可與和亦易見也而和議之説不息非特通和金人又欲通和劉豫和之一字實懐二心以國與人亦不恤豈不過甚矣哉原其所本起於耿南仲昌言之正猶王安石大有為之論蔡京繼志述事之説而尊主庇民疾仇殄惡不欲和者亦猶司馬光不以王安石為然陳瓘不以蔡京為是八年於此此正論不勝監觀前事識者憂之尚頼陛下險阻備嘗灼知情偽於和議輩皆已試用了無加效此䇿不足中興斷自宸衷舍非從是嚴降詔㫖罪狀反賊聲罪致討一振國威豈於金人尚肯通使臣禀性素愚誤以文字上簡聖知擢置綸闈仍使獻納適覩何蘚之事深恐和説復行國論頃危士氣沮䘮所繫不細遂具陳奏陛下憲天聰明灼見忠志曲賜褒論以來衆言使天下忠義之士皆知陛下雪恥復仇之意用賢才修政事厲兵選將駸駸北向以為迎二帝之實大計一定邪説不行中興可期宗社之福豈獨㣲臣忝竊恩詔以為今日美談而已哉恭惟奎壁之光下照蔀屋謨訓之懿逺播寰區顧臣何人仰承大賜臣敢不益堅志罄謀猷庶殫毫髪之勞用答乾坤之施三朝北盟㑹編卷一百六十七
