body:
  text: 三朝北盟㑹編卷二百三十九宋徐夢莘撰炎興下帙起紹興三十一年十一月八日丙子盡十六日甲申甡之嘗試以允文二劄論之昔歳馬家渡之役烏珠出舟于江官軍不戰而潰金人遂䧟建康蹂踐江浙至四明而回當時議者謂方金人進舟欲渡時有能鼓率士氣竭力禦之可使金人皆塟魚鼈之腹不為難矣雖用力不甚多假令以郡王使相賞之其誰以為不當采石之役正猶是也或官軍退却一歩則敵人登岸不知肯似向時蹂踐江浙而復回乎海鰍十艘雖用力不多而金人悉死于江中若以前事為鑒雖醲厚之賞極一時富貴以酬其不退却之功可謂當矣而允文乃虛張功伐大其勞績意在於邀求厚賞以結将士之心自譽已才而冀日夕之用可謂之要君亦可謂之欺君矣允文謂午後到采石鼓聲已震地允文方與統制張振等議列馬歩軍為陣分戈船為五不亦遽乎列馬歩軍為陣頃刻間猶可辦也分戈船為五非十刻不能辦豈容擺布僅畢金人方發喊况鼓聲震地已久雖欲出舟何用發喊又謂數百舟絶江而來且楊林渡當冬月乾淺惟單舟乃能出口若欲出數百舟非二十刻不能辦豈可謂頃刻間通計官軍分戈船為五金人出數百舟當占三時自午後又占三時日已暮矣又謂七舟遽逹南岸既戰罷計岸上之屍凡二千七百餘人七舟可載二千七百餘人則一舟可載四百人矣國家水軍舟船大而壯實者無如馬船官軍毎隊五十人一馬船猶不能載八隊况金人拆人家板木旋釘為舟而能載四百人乎采石居民不啻數千家戸外有兩國之兵大戰至於敗者盡殱焉数千居民豈能安其居而寂若不聞允文謂親身往來行間再三傳諭激以大義許以醲賞至于當塗采石之人指此語為笑端允文藉此蓋有心望為宰相也丙子之奏已行丁丑又作奏允文盛稱采石之功難者曰旗頭本執持大旗麾衆當先者也臨陣鏖戰之際已斷其左臂大旗固不可操執政争命之間安得小旗而麾之耶其踈一也采石丁夫不過有數千人况踏車轉戰至夜疲怠之餘安可役使允文謂掘塹濶一丈五尺深八尺一夕之間開得數百丈又為内堤可立官軍計其工料非疲怠之卒一夕可辦者其踈二也愚嘗經由采石尋訪掘塹立堤之地采石人皆大笑之且曰采石地勢有髙下有山有水雖有連接亦有㫁頭安能掘數百丈之塹立數百丈之堤愚熟視其地利深以其言為非是是諸軍虚張報㨗者不可勝數諸軍提舉權都統制張振以拱衛大夫永州防禦使陞翊衛大夫定江軍承宣使又進中侍大夫副提舉王琪時俊統制戴臯水軍統制盛新皆轉横行官遥郡是時王權方去軍兩日議者謂權不去則為權之功故天下事有幸不幸也有菜園戸杭文貴者以民兵在海鰍船中出江口中箭透項而出遂死之允文奏其功以謂忠義奮發用命當先力戰身死得贈忠訓郎與一子進武校尉文貴無子以姪為嗣而受之總李莘者是日偶不在采石故立賞不及張振懐州河内人初兩河䧟振聚强壯得百餘人徑大行由喜兒灣流河直趍㐮漢與桑仲合時仲為鎮提使用振為諸軍統都提舉仲被害李横繼為鎮撫使待振如仲後横與振有疑隙乃走投江歸于荆南等州鎮撫使解潜潜用為中軍統制潜罷鎮撫使振随潜詣行在遂𨽻于張俊軍中俊以振為淮偹将趙遷為正将王德為都統制也紹興十六年德奏逰奕軍去𨽻侍衛馬軍司已久乞将牙兵親随親兵搭材等合一軍補遊奕之闕以振為統領後選統制自初聚衆至為承宣使皆無可書之績采石之戰邂逅成功豈不幸哉琪鞏州人德之子也新亳州人紹興十年張俊在亳州新挈家來歸既至建康俊奏授新正使兼闊職俊以建康城北水陸之田畀新或謂俊在亳州受新北珠一箧而有是報漸陞新為正将𨽻中後為水軍統制臯破敵軍統制不救姚興而率衆先奔者是也晁公忞金人敗盟記曰初八日金亮在壇上建黄綉真珠旗四靣麾擐渗金鐡甲坐麾旗下紅旗告戒諸軍有敢死之人賞以金椀一隻酌以好酒然後登船而船小者五尺許則大者可知矣皆壯健雄銳兵器俱精先登船者約三十餘人共千餘人是時西岸金兵鐵騎周廽三十餘里鳴鼓大喊以助戰艦其船開岸呼噪揮掉輙便衝過江我軍辟易又㑹北風敵船如箭有數十艘将泊南岸我師有恐色虞舍人躍馬行陣揮鞭督戰統制官張振王琪盛新時俊皆曰候其登岸一勦無遺虞舍人曰昨與公等議破敵為期今乃用命乎且敵來勢甚急若容縱放登岸而擊之倘或機㑹一失奈何與其到岸不若中流擊之為宜諸将曰諾即統帥海鰍車船衝撞往來鏖戰士氣百倍無不一以當百金兵大敗且走金亮将發戰船渡江也恃其兵衆意欲徑趨而渡故所用舟船乃山東平底前後軒昻運載粮船也一舟濟五十餘人以為大江如平常運河掉渡不難遂於船左右挿棹數枝飛棹奔突不知江流與運河之水緩猛之勢絶異又亮廹以酷刑戰士盡死不囬而我軍戰船皆艨衝巨艦士卒用命遇敵戰船即衝撞中折全舟沉沒者十六七續後繼來者見前敵溺死無餘皆反身囬掉歸岸逆亮怒其復囬悉敲殺之由是金人䘮氣兵威大沮敵既退衂遂具㨗騎置以聞李寳除静海軍節度使京東東路招討使沿海制置使李寳燒金人舟船于膠西也遣曹洋奏㨗于行在見奏海道之功上大喜厲聲言曰李寳第一功顧内侍曰今日冩旗賜李寳又問倪詢應簡如何洋奏活捉倪詢應簡二人見拘管在李寳軍中上益喜令洋取倪詢應簡親管押赴行在詢簡平江人越海投金人獻海道進兵之䇿并獻海船利害金人用之被擒是日除寳静海節度使京東東路招討使沿海制置使賜金鎗御書旗以李寳忠勇為名金合茶藥酒器金偏帶束帶各一玉皮帶一差内侍陳子常同洋押賜洋轉十官賜金偏帶賜統制官賜錢一千貫金國主亮退和州以其衆趍淮東金人以丙子江中之戰失利銳氣稍挫且聞已得揚州遂欲計置𤓰州渡江丁丑完顔亮以大軍皆行遺史曰虞允文見敵人已退又奏劄曰臣於今月八日大破敵兵已具戰守之計斬獲之數敷奏去訖次日絶早臣與将士同在江口擺布戈船分兵大敵其敵衆行列比昨日稍稀至辰以來敵凡再鼓臣等旗麾出海鰍戰船五之二分其半向北岸上流直楊林河口以其半傍南岸而行其餘仍藏港中以防不測良久敵兵益稀臣恐金帥欲遁亟令水軍統制盛新引船杜塞河口以神臂弓克敵弓齊力射敵應弦而倒者以萬数敵見船無歸路即時從下流發火自焚官軍亦於河口上流舉火盡焚其餘凡一百五十餘舟完顔亮引餘衆遁去遣一小舟令張千者持書遺王權觀其書意似與權有先約雖其䇿出于用間然亦不可不以朝廷已行遣王權之事報之以絶其觀望正遇李顯忠至臣與顯忠啇議作報遣行獲金人奴婢二人賫往已録白同金亮書真本繳進去訖其張千本是鎮江軍使臣在𤓰州戰䧟敵中臣騐得本人身上有數處重傷已即時與轉兩官發歸本貫收管聼候朝廷遣喚外所有采石至太平州一帶居民各安堵允文三奏劄皆有可議者夫敵人應弦而倒者以萬数不知用幾萬神臂弓克敵弓能如是耶况官軍以舟船杜塞楊林河口而已楊林河口不甚寛濶而又敵人擺列處在岸上乎在舟中乎若在岸上則與河口全不相干若在舟中不過有數舟相對安得應弦而倒者以萬數也允文有門下士昧于名数典禮乃拾掇三劄溢其虛美作為記事之文夸大允文之功允文蜀人也首自蜀中傳冩之衆皆和之於是蜀人家家有傳本矣愚恐萬世之後忠佞不分故不得不力辨晁公忞敗盟記曰初十日行府既得㨗報往静安渡沿江檢㸃營塞撫勞守把将士是日李顯忠至自池陽遣硬探知逆亮縁采石之敗十二日離采石十三日宿曠口十六日抵維揚與𤓰洲兵合矣虞舍人謂李顯忠曰敵懲采石之敗空壘往合𤓰洲兵矣鎮江無備某當往第恐兵少今采石愈益深塹築堤伐木為柵守禦甚固敵未可卒至鎮江邉岸分屯備禦甚多要害僅数将軍能任其責分一軍相從如何須更得百餘艦則事濟矣顯忠曰敬受令是日虞舍人徑發循慈湖馬家渡等處措處防托迤邐復還至建康洎至見元樞而知建康府事張燾造謁虞舍人問勞甚勤曰燾所謂頼公庇完顔亮約初八日來此㑹食使燾安往諸公因議可以往鎮江者皆有難色張燾謂虞舍人曰已建大功可任此責虞舍人欣然從之徑往鎮江謁劉錡疾已劇執虞舍人手曰朝廷飬兵三十年我軰一技無所施今日成大功勲乃一中書舍人也錡愧當死矣是時朝廷初得𤓰洲之報急遣御營使太傅和義郡王楊存中措置鎮江虞舍人一日與存中總領朱夏卿知鎮江府趙公偁謀曰敵已瞰江宜經畫守禦之備今車船又擺泊維繫岸下有如臨期不堪駕用奈何遂相與臨江按試以警金人時江船止有二十四隻狀如方櫃外飭粉灰内執兵刃車轉兩邉之下外無所見并李顯忠所遣船亦至虞舍人命戰士偹車船徑趍北岸𤓰洲将泊岸復囬敵兵驚惶持滿以待其船中流上下轉囬如飛敵衆皆慿壘縱觀駭愕相謂曰南軍有備如此亟遣人揚州報亮亮馳騎立至笑諸軍曰此紙船欺我也既而囬揚州因召問諸軍以必渡之䇿取十二月三日至鎮江早食有跪前曰南軍有偹未易圖也向觀所用舟楫迅駃如飛寜能當之且采石渡方此狹甚而我軍猶不能利徐為之謀以伺其隙亮大怒以為阻遏軍威遂㧞劍按膝數之曰汝罪當死我不即誅戮汝更有阻我軍謀者尚何辭軍伏地痛淚求貰者久之亮曰姑赦汝出與衆議之具百船渡江違令者斬諸軍唯唯而退李顯忠到采石王權罷建康駐劄都統命李顯忠代之顯忠被命急馳以丁丑到采石見完顔亮已退和州是日晩報㨗曰十一月九日午時到采石探見金兵于西采石一帶擺布船隻顯忠激厲水軍及諸軍統制将官先于東岸分布馬歩軍次用戰艦裝載甲士増以勁弓硬弩防遏遂遣潜師直取西岸焚燒敵船登岸進兵掩殺至晩敵兵退走和州委是報㨗李貴克順昌府李貴為江州駐劄御前右軍統制同統領張成等帶領人馬入順昌府界㑹合忠義總守孟俊等收復順昌府偽知𨽻州蕭寛退去貴等遂入城十六日甲申金人以船筏攻茨湖不克退去茨湖在漢上江與光化軍相對有鄂州副統制李勝荆南副統制張進董江鄂州統領趙振張成荆南統領張抃郎琳李清等各将兵防捍甲申金人乗船絞筏欲攻茨湖諸軍且侵襄陽㑹風勢不利不得着岸有鄂州前軍旗頭史俊麾旗渉水直登一舟呼曰前軍得功也諸軍可皆進金人初不虞敢登其舟遂大驚失措行隊不整有墜水而死者諸軍繼進俊殺其將猶收全功而囬金人乃退去被殺之將蓋其定府總管杜萬戸也京西王宣軍統制趙晟録到京西戰功曰十二月初二日敵侵茨湖以舟渡師時風盛吹過南岸旗頭史俊先登舟遂殺果勒千户奪敵船十隻殺戮及溺水死者千餘人初三日劉鄂聞金亮被殺班師歸者無行陣多失路為鄉民所殺初六日均州忠義皆朝等部領忠義軍占據鄧州都䕶鄭雄者來城入問鄧州守何在乃萬户蕭中一也中一先已携家歸順失路倒馬𨽻中被忠義人丁統領所殺宣遣崔俊尋中一只得中一妻三人長耶律氏也子號小将軍諾爾布長夀等数十人鞍馬数十匹招討司奏得㫖立廟鄧州中一之子授武義大夫十二月京西漕運姚紹來見三帥責其不親援鄧州拜别即行三帥媿之次日並起發先是差訓練官二員牛宏王彦忠将帶正軍聚集忠義約一萬餘人占據汝州並無衣甲二月敵還師西京過汝王彦忠牛宏部領忠義邀于七里河敵兵盛遂敗退走汝州金人圍之十七日城破殺盡軍士張免侯順得脫亟來鄧州吳拱遣統制周贇等八十餘人往援汝州已不及正月一日遣王宣領所部往汝州節制諸軍初七日到汝州土門敵騎已退二十八日王宣等往城北三十五里謁秦王墓二月初五日金人数萬騎薄汝州先以精騎萬数渡汝河王宣部領親随約三十餘騎先犯陣軍續至皆赴戰自已至酉鏖戰遼州萬户統軍洎男小将軍天大雨金人大敗走還西京親随無不重傷而趙晟為敵以棒敲碎其首惟親随梁臯魯順魯臯陳才戰沒葛王已立遣兵再取汝州閏二月十二日戰于汝州至晩各分散殺獲相當十三日早金人全師來攻我師敗衂士卒死者百餘将官兩員戰沒十四日兩師相拒至晩各分散十五日降㫖班師星夜發起鄧州途中接詔逓角令王宣部領親随二百餘騎前來唐州二十四日到唐州公叅招討差總管充中軍統制節制沿邊軍馬當日管犒將士招討云汝州路兵馬皆出太尉保全蔡州已為金人攻破統制趙樽等巷戰逐敵出城告急甚切専候太尉歸望太尉看朝廷面確山縣諸軍見係統領㳺臯節制逗遛不進蔡州事勢已急望太尉勉力確山自有馬歩一萬三千餘衆王宣唯唯次早起行到北陽縣二十六日鄒溝下寨去確山三十五里二十七日拂早起發擺鋪馬報金人已到確山兩陣相對約一萬精騎宣遂捨歩兵引馬軍行到陣前喚諸撥發官歩人可披城擺布又問有多少馬答云約有三千餘騎宣令馬軍分作三陣第一陣如衝賊不勝使退居第三陣之後第二陣不勝便退居第一陣之後第三陣上則三陣俱上又喚馬正將田將副将汲將令田將将所部馬軍五隊約三百南當拐子馬汲將將下五隊馬軍衝突陣心宣指陣心謂汲將曰不用弓箭人各背刀衝突汲將為敵騎所圍宣召親随馬軍崔俊等内有師逄原趙晟曹得楊肅李顯張進李度秦順赴探打散軍馬萬餘三隊俱盡追赶四十五里敵大敗三河皆滿趙晟活捉得穆昆一名次早蔡州人報敵帥左監軍走去蔡州之圍遂解師及樽兵自信陽歸安陸王宣還襄陽隆興元年王宣除荆南都統替李道参知政事汪徹督視㐮陽軍馬宣按邉經由鄧州南陽縣鵶路取魯山攻汝州破城活捉到女真千户沙呼實漢軍千户崔純并女真漢軍穆昆三十餘員并降畨漢軍五百餘人馬三千餘匹解赴参政行府有異衆竒功之人李雲趙晟楊廸郝安祖張進曹德江浩劉邦寜王德髙順趙進都統王宣保明参政行府将朝廷降到空名官誥書填推賞乾道間奉㫖割唐鄧與金人金人随即進兵統軍不撒所領畨漢兵共十萬餘衆來攻襄陽至黄渠十一月間王宣先遣趙晟師逄原王政王洵賈亮戴廷等部押馬軍八十餘匹夜刼金人大寨斬五級牽馬十餘匹活捉金人黄醜四歸寨制置韓仲通推賞十二月内與敵戰于黄渠敵衆盛我師失利退却七十餘里折兵將官一百十一人趙晟重傷推恩擢逰奕軍第二十將自此講和班師是役也吳拱多視親書之未嘗行陣者返令王宣保明趙晟者鄂副都統制軍統領官也副都統分戍荆南出軍襄京西之戰親在軍中故知其詳晟嘗被召至行在有劄子論今襄陽雖為京西要地荆南號荆楚上流然光化軍邉面一帶有小路十九處可以上至䕫門歸峽盡是坦途並無關阻若金人知之直造䕫路駐兵屯守則襄陽京南皆亦不足為用一則扼川蜀水路舟船不得而通二則據上流之勢可順流而下武昌九江皆失險矣乞行措置廟堂不為意晟軍中號曰趙大斧以能用大斧得名也三朝北盟㑹編卷二百三十九
