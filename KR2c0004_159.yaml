body:
  text: 三朝北盟㑹編卷一百五十九宋徐夢莘撰炎興下帙起紹興四年五月盡七月五月韓世忠自鎮江府來朝五日甲寅嶽飛克郢州朱勝非自再為宰相首建議遣諸大帥分屯淮南等各據要害以經略淮北荆襄又奏襄陽上流襟帶吳蜀我若得之則進可以蹴敵而退可以保境今陷于金所當先取者乃除嶽飛江西舒蘄及湖北諸州制置使俾自江趨戰又使淮西軍合勢併進以犄角之始諸將雖擁重兵而無分定路分無所責任勝非修法度嚴紀律明號令某帥當某路一定不復易皆授廟算成師以出又命司農卿沈昭逺往總軍餉師衆素飽故皆奮勇以進於是朝廷以牛臯習知漢上地利遂俾從飛飛即辟臯為唐鄧郢安撫副使兼統踏白軍臯自歸朝朝廷授以蔡唐州信陽軍鎮撫使兼知蔡州未到治所畨僞沓至戰無虛日朝廷恐臯終困僞地即詔歸行在臯見上因陳僞齊之滅亡中原可復之計有進士郭良馬驥姚時行者皆補文資至是飛得臯甚喜知大功必成改臯為神武後軍中部統領兼制置司中統制軍既發飛命不得踐民禾稼秋毫不敢犯至郢州令荆超降超不從有知長壽縣劉某者登城發言不順飛怒今軍中城破必生致劉某既得超已投崖而死生擒劉某至飛令凌遲斬之嶽飛克襄陽府僞知襄陽府李成聞已失郢州荆超投崖死乃棄城而去王師遂入襄陽又進復唐州六月太白晝見熒惑犯北斗嶽飛克隨州初嶽飛命張憲引兵攻隨州月餘不能下牛臯請行乃裹三日糧往衆皆笑之既而糧未盡而城拔悉推其功與憲且曰吾之存心者國事耳功何爭為君子多臯之不伐生執僞知州王嵩送襄陽府凌遲處斬飛取京西數州董先頗有功先以紹興三年來降飛飛用為選鋒軍統制七月劉光世來朝吳玠加檢校少保吳玠進官賞饒風關之功也御史中丞辛炳出知漳州辛炳為御史中丞屢言執政大臣之罪而黜罷之朱夢說見當時尚禽色之樂多無用之物二聖播遷而未還中原陷沒而未復萬民塗炭而不安上無良相朝乏賢臣乃貽書于炳責炳不諌炳惶恐袖夢說之書上殿奏陳上不悅時夢說為嶽飛軍幹辦公事乃諭飛罷之飛厚贐夢說而謝遣之炳亦請外補乃以顯謨閣直學士知漳州夢說字肖隱嚴州人徽宗時屢獻直言後登進士笫纍遷泰州軍事推官飛聞其賢辟為幹辦公事中興姓氏録曰朱夢說字肖隱嚴州博學有為國憂民之心政和間見宮中奢侈內侍亂政小人滿朝賢士竄盡乃於五年正月六年九月皆上書言天下事七年又上言入仕之源太濁不急之務太繁宦寺之權太重又曰天下搜採花木製置什物京師置局修造人曰諸路漕司無積年之儲需用有借支之弊又曰東南困于水潦西北擾于强鄰州縣嚴于督責良民弊于敷配又曰陛下纍層巒以為䴢鹿之苑浚汚池以為魚鱉之宅起樓觀以為禽獸之籠又曰宦官委任華重名動四方營起私第强奪民産名園甲第雄冠京師賣官鬻爵貨賂公行人莫敢言道路以目蓋位髙而不可仰勢大而不可制官人以爵而有司不敢問其賢否刑人以罪而有司不敢究其是非祿養之臣畏罪而不敢言四方之士欲言而不敢達乞斬臣頭以令於市又上言宰相力言宦官者之害願力為天子言之無恣目前之欲以階後來之禍其大略如此徽宗不悅士大夫皆傳其言後以進士及第靖康初開府儀曹孟鉞乞召夢說而用之未之召及至金人陷京師後纍遷泰州軍事推官湖北京師宣撫使嶽飛聞其賢辟為幹辦公事隨飛入朝復見當時尚禽色之荒多無用之物二聖播遷未還中原陷沒未復上無良相朝乏賢臣上書于御史中丞辛炳責其不諫炳携書奏上不悅諭飛罷之飛厚贈夢說而謝遣之朱夢說進徽宗皇帝時務䇿臣聞為武職者必欲適草莽冒矢石奮不顧身誓以革囊裹尸而後已至于攻城陷陳被堅破敵出萬死一生之誠然後能壯國威立殊勳者何哉蓋忠精之氣副之以勇敢使其有不能自已者矣為文臣者豈其不然乎當䝉父兄之教考聖賢之書必欲致身于青雲之上佐君澤民使功名垂萬世德澤流後昆而後已及其上不見知于其時豈肯甘心淒淒然為窮人與萬物同腐哉即欲立一危言效一竒節時之得失為萬乘一言倘䝉省悟則民受其賜或忤聖聰則自陷鼎鑊兹亦士之素志矣臣愚雖不能披堅執鋭效死于軍前實欲獻言進䇿膏身于斧鉞臣嘗于政和五年正月初六日及六年九月初七日以狂妄之言兩凂聖慈矣既䝉陛下赦其愚直不加誅戮而臣尚不知悛敢于觸鱗犯諱者何哉兹亦忠義之氣使臣不能自已者矣然方今平治之極臣復何言哉而臣切以為纍崇髙者難為力享安榮者易以驕陛下既臻平治如此豈易為力哉當少加畏慎而無肆怠忽可也臣觀今日之失有三太何謂三太曰入仕之源太濁不急之務太繁宦寺之權太盛臣所以持芻蕘之見冀禆聖德之萬一然臣知此言之上獻陛下見怒亦死不見怒亦死陛下見怒臣當死于輦轂之下倘䝉陛下加恤而不見怒臣不死于道路即死于囹圄何則蓋用事之臣必假手于人以他事致死而後已蓋欲杜絶後來之言也願陛下備閲而詳察之或上忤聖慈先賜誅戮使得知漢朝錯王章不死于他人之手免為唐李世良孟昭圖臣將甘心焉夫將欲任之必有以考之既能考之必知所以因之既知所以因之然後可以責之矣責之必有功效此任人之要也夫將欲出之當量所以入之必知所以節之既知所以節之然後可以用之其用必無匱此用財之道也夫將愛之必知其所以寵之既欲寵之必知所以福之既知所以福之然後可以享富貴矣其富貴必長保此馭下之制也夫任人不因其材而責之則敗將及之矣焉可以勝其任哉用財不量其入而用之則弊將及之矣烏可以給足哉或愛人而寵之不得其制則禍將及之矣烏可以保其久處哉今者入仕之源太濁豈非所謂用人責之不因其方乎不急之務太繁豈非所謂用財不究其源乎宦寺之權太盛豈非所謂愛人寵之不得其制乎臣觀陛下崇三舍養肓人才月書季考鄉舉里選蓋欲責其成才而考其素行使天下之材由學校而興不欲以請謁之弊得以萌其心奔競之弊得以逞其欲此陛下聖意髙逺非淺近者之所可及知而有司不能遵奉陛下養賢之意仕進之源既不考其言行之實又不詢其鄉曲之譽而願任之人以科舉之途逺以請托之途捷馳騁乎府寺之庭出入乎王公之第以財獲用者班班可數因賂得官者比比皆是道路之間見盛騶從而馳者其人必庸腰金而騁者其家必富何則蓋輸金買勢而致然也昔有唐張克勤開元間欲以其五品官推與其甥而裴夷直以謂壞有司法啓後來買爵之端不可許嗚呼可謂識大體矣今者以此陳乞欲與無服異姓者又不可勝數而陛下悉賜俞允致四方之人凑于京師者納賄于權門積玉于勢地皆有定值昔之賣官錢入私門者無過是也傷風敗俗自是而始陛下曽一念乎又嘗見縉紳之士競欲取媚于權門之子悉與市㕓易古器鬻畫圖得一珍異之玩即偕價而求售爭妍而乞憐倘合其意美官要職指日可得儒衣冠而為候門之償賣恬不為耻厯臺省者以親姻而獲用不問人才之賢否子姪悉居侍從英俊沉于下僚古人所謂正百官以正萬民今百官不正民奚為而克正哉又曰源清則流長今賢不肖混淆於朝廷之上則入仕之途奚為而克清哉臣嘗言之曰因襲造物收採花石而得官者非無知之豪民即放停之胥吏是等之人誠宜逺逐烏可厠之士大夫之列哉何則留之又無寸能足以備緩急之用去之又不減國家之員數徒糜爵賞而玷朝冠耳然是選也當責之於宰輔之臣何哉蓋天子職在于論相而已為宰相者宜如何哉當分任郡司統以庶職量才擢用先德後言以上副明天子仰成之德下克承鼎鼐燮調之重然則宰相之職為至重而其所責亦不輕書曰天工人其代之又曰董正治官蓋謂是也臣謂陛下當責之以其專凡立之以其法舉得其人則均受其賞或濫其選則獨被其責此唐所謂有不職在舉者正此義也則彼焉敢不崇尚名節抑去浮華為官擇人不為人擇官揚清激濁為天下公哉則源不澄而自清矣上追唐虞熙載之美下躡文王多士以寧之風豈不美歟夫不急之務者天下搜採花石四方製置什物京師局修造是也夫花石愈多什物愈工而愈巧修造愈煩而愈費此不可不知也臣竊聞蘇杭之局已罷去臣實謂天下幸甚然伏見水舟起什物牛馬般載花石道路上下交錯臣實有疑焉臣竊謂古之英斷之主勇于所欲為而為斷以所欲去而去既以彼為非此亦未為是故當一切罷去知惡不能去春秋所以譏之而又况飾宮觀叠危山簷楹繪以丹雘梁棟飾以珠玉費用不資目擊可見驅役丁匠逃竄無方科責士庶吁嗟道路耗祖宗積纍之財殫府庫厯年之蓄陛下豈不為寒心乎古云有之仍舊貫何必改作孔子取焉唐魏徴曰功成不廢即具其舊除其不急德之次也以此則去廣殿處卑宫為上德也可知矣然則堯舜之君土階三尺茅茨不剪棌椽不斫者豈好甘窮約哉蓋聖人之存心必以天下為懷兆民為念不敢先己之樂而後人之憂不惟下愛民力又將遺子孫于恭儉也雖有九年之水而民無菜色者以蓄積多而備先具耳陛下既以堯舜之道治天下須使典謨訓誥之文播于萬世為萬全之聖主烏可使纎瑕以纍聖哉臣伏聞諸路漕司無積年之儲常平有借支之弊若以今升平之久士歌于野何施而不可萬一有水旱相乘盜賊竊發陛下將須之民乎須之國乎臣又聞東南困於水潦西北撓於强鄰州縣嚴於督責良民弊於敷配如此雖名為比屋可封之俗實無安堵之民以京師觀之固為家給人足矣若以天下觀之四方之民雖不衣牛馬之衣食犬馬之食然接新之儲亦蔑如也臣又聞淮甸之間流民餓莩尸枕相屬有司畏罪而不敢聞長吏欲賑而無術致陛下仁恩惠澤不能遍及萬方良可為太息也臣雖無雄才以濟時用實敢以丹言上忤聖意而不避罪也陛下倘若輟後苑木石花竹之費下濟於民亦可以日活千萬矣水之流行災福所係前年秋水遂致泛漲漂沒廬舍河流妄行冲敗堤掃上天之意豈無致然乎尚未聞陛下有罪己之詔去年賊水復爾暴至不知所從來豈民之災運適當其時在天數有不可逃乎豈天意諄諄覺悟陛下乎尋聞李綱因言而獲罪張勸緣諫而見黜夫人君之用必貴以忠義為先倘或附下罔上則在所不赦蓋欲忠言嘉謨日陳于前縱面折庭諍尚且優容之期于日聞所未聞也臣嘗聞孟子之書至于君之視臣如犬馬則臣視君如國人孟子之意雖欲救當時之弊臣切以孟子之言為失夫君雖視臣如犬馬臣亦當竭犬馬之力以報焉可視之如國人乎臣觀李綱張勸不欲負陛下平昔眷遇之厚恩欲盡犬馬之報陛下堯舜之聖而遽負二臣乎又聞擇起樓觀以為禽戰之籠臣恐傷陛下仁民愛物之美化陛下何不任山川以遊麋鹿因江河以澤魚鱉寬宇宙以籠禽獸使聖人之德及乎幽深髙逺邁唐虞若豫之歌追成周行葦之詠豈不盛歟夫致治之要在乎澄本以正末明理以安分賞罰公錫豫當振綱紀定名位雖有巧僞不得肆其奸雖有讒佞不得恣其欲雖狂悍不得竊其威雖權貴不得逞其志如此則上無陵下之暴下無侵上之僭衆賢和百姓安協神人來休祥矣三朝北盟㑹編卷一百五十九
