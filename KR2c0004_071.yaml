body:
  text: 三朝北盟㑹編卷七十一宋徐夢莘撰靖康中帙起靖康元年十二月一日壬戌盡四日乙丑十二月一日壬戌駕在青城金人遣蕭慶來索降表宣和録并遺史曰上在敵寨宿郊宫與二帥尚未相見遣使議事索降表上命孫覿草表但言請和稱藩而已使人賫草示尼堪尼堪以為未是金人往來者數四皆不中而要四六對屬作降表覿與吳幵互相推避不下筆上曰事已至此當卑辭盡禮勿計空言促使為之于是覿幵與何㮚共草成之云一統之基遽失籓籬之守七世之廟幾為灰燼之餘既煩汗馬之勞敢緩牽羊之請又云上皇負罪以播遷微臣捐軀而聽命又云社稷不隕宇宙再安上覽訖謂孫覿曰對屬甚切非卿平居閲習安能及使人齎草示尼堪方中其意令其官吏同吳幵何􅙫數次改易尼堪抹去大金二字止稱皇帝又去大宋皇帝字止稱大金為皇帝而不書國號又改負罪為失德又指宇宙二字云大金亦宇宙也改為寰海上悉從之長入祗候王嗣在上左右不知改意何語但見上往來思慮軫動聖顔至是始定中書舍人孫覿辭免待制奏狀云三十日臣等侍輦幸青城羣臣多以無馬不及往出門遇鐡衣數萬各持一幟夾道以衛坐掖門宰執位越日淵聖靣諭臣作稱藩一表臣以非本職固辭何㮚曰更召執政待制同議羣臣莫肯對􅙫曰君父在患難而不顧諸君忍出於此耶淵聖變色臣頓首奉詔表往不合金使别持一紙書來大率言海上請盟以至交惡亹亹數百言請以此意作表臣就用本語稍加櫽括以應之又不合復令别用四六引事實為文淵聖諭臣曰朕欲亟歸爾卿勿計空言可也􅙫亦不作遂自操筆為之時有起居郎胡交修在傍知狀然使者五反而後已靖康要盟録載表曰背恩致討逺煩汗馬之勞請命求哀敢廢牽羊之禮仰所蠲貸俯切凌兢云云闕文又孫覿辭免待制狀曰不虞連值國家非常之變靖康國破淵聖表降亟欲援吾君擠陷于不測之危豈復計此身誅絶于中興之後比喧公議請置嚴科凡此誤朝誰為禍首俾二聖辱在泥塗而不問則一時失於翰墨以何尤是日大雪極寒隨駕官吏不賫衣服夜坐待旦不設榻惟上所居稍溫潔宰執以下卧地日得粟米飯少食之上在敵帳都人傍徨計無所出自拂旦官吏士庶集于南薰門以俟未刻黃旗又自南薰門入報平安詔和議已定禮數未了仰百姓各安業無致憂疑逮曉又詔大金和議已定待只候禮數了來日入城與百姓共慶兵馬大元帥開府是日兵馬大元帥開府王服緋衣玉帶乃指帶曰此上賜以寵行者先是太上皇將禪位解所服玉帶賜上王出使上乃解以贐行百姓詣南薰門迎駕是日閧傳乘輿還百姓自五鼓相率守南薰門蔽路已午間南薰門忽開莫不欣躍已乃宣取酒果申後韋夀隆入城傳詔來日方歸又出黃旗云和議已定各令知悉人益惶惑不安至夜有投宿御廊婦女小兒各用襟裾盛土填馳道以雪泥未乾不曽治道故也家家焚香禱天金人求索劉晏等四人尸以骨還之二日癸亥駕在青城奉表於金人尼堪斡里雅布相見于齊宫是早金尚欲堅要上皇出郊上再三說諭方稱皇帝仁孝乃止尼堪先遣人用青氊裹齊宫鴟尾又屏壁上有畫龍處亦蔽以幃幕然後向北設香案乃請相見二帥迎於門上以表授尼堪受之相揖而入御馬在前二帥次之遂入望香案下馬上立案前尼堪令人讀表訖北望拜者四左右皆唏噓雪大作時城中無雪獨青城示變金人亦為之蹙額繼而相賀午刻相見於齊宮講賓主之禮相遜再三上卒就主位遂各命坐二帥人材皆竒偉斡里雅布瘦而長獨尼堪應答琅琅宰相親王並列於庭酒三行首說太上次說上與金人出師之由又云城中頗有擦城出者皆背棄君親不忠不孝之人何足惜也盡已令􅒱殺訖尼堪曰天生內外自有分域中國豈無人據天人之心未厭趙氏使他豪傑四起中原亦非我有但欲以大河為界仍許宋朝用大金正朔又曰兩國既和恐四方聞京城而生變請遣使撫諭本國當遣人送出地分上許之尼堪又云三太子見在西京衛護陵寢無他虞禮畢上以金銀十六擔縑帛五十床金玉帶各二為贄又命左右出內府蹄金以賜二帥尼堪笑曰城既破一人一物皆吾有也皇帝之來所議者大事此何用如欲分賜可與臣下又云日已晚城中居民不安可早回必欲賜賚但留左右足矣駕遂與國相二太子送上馬上謙遜不遑遂巡廊送出門外上馬金人以甲馬裹送往還又遣畨官五人送入內宿于廟堂駕自敵寨回宫是日拂旦日出無光有飛雪數片官吏士庶復集於南薰門者肩摩𬒮屬尤盛于昨焚香瞻望者絡繹于道俟駕人稍回皆云必未時回申時急有使臣馳馬而來云駕回都人驚奔喜迎至晚駕入門父老夾道山呼拜于路側老幼掬土填寨雪淖不須臾御道坦然捧香前引或衝突禁衛或至爇頂燃背以迎者不可勝計駕歸才及門士庶遙認黃蓋歡呼傳報一城奔走山呼之聲震動天地皆攔馬首仰窺天表莫不惋歎感泣涕泗橫流不知其數上亦為之揮淚過州橋淚已濕帕殆不能言從駕有金人數輩見上得人心如此亦皆驚嘆左右駭愕悽咽大學士迎駕上掩靣大哭謂宰相誤我父子觀者無不泣涕至宣德門始能言嗚咽不已宣諭曰荷你百姓朕將不得與百姓相見又感泣不已士庶莫不慟哭至內前王燮鄭建雄張叔夜扣馬號泣上按轡大慟俯身頓首情至不勝百姓軍民皆大慟聲逹禁中既入內士庶乃散閭巷之間人情恍然若再生避戎夜話曰初駕幸敵也有長入祇候王嗣隨駕凡三日兩宿未嘗離左右至初二日二帥猶堅欲上皇出郊上再三說諭方稱皇帝仁孝乃免至三十日至初二日早左右並不與金人晤語閒有立談者則左右主事人搖手不令交一言至此然後交相慶賀云本是一家我出軍十二年矣不知家中父子存亡且喜兩國通和遂有解甲之期又况兩國二太子來時路中傳令期汴京必破萬一不可攻打雖二十年與更戍迭守誓不返國術者刻二十五日與初三日城破果不出二十五日也金人供送上左右寢食皆如法並喫餛飩此食乃金人御膳也進上御膳亦用餛飩并餤裹夾之數內侍爭攫拿金人以手加額爾罪過此食未曽供皇帝豈可食也又尼堪斡里雅布皆英雄自古云不在中原必在外國兵馬大元帥府差置官屬王命差耿延禧高世則參議官徽猷閣直學士河北都轉運使張慤直龍圖閣京東轉運副使黃善充大元帥府隨運應制徽猷閣知信德府梁揚祖充大元帥府隨軍運使楊淵王起之秦百祥充幹辦公事藍圭康履黎陽公恕韓公裔充主管機密文字武顯大夫陳淬充兵馬大元帥府都統制五軍兵馬修武郎趙俊等中軍統制武義大夫劉浩前軍統制武顯郎張瓊左軍統制修武郎尚功緒右軍統制果州刺史王孝忠後軍統制三日甲子駕詣龍德宫寧德宫車駕詣兩宫安慰太上及太上皇后也上御祥曦殿百官始造闕朝野僉言曰何􅙫初主議不割地既而守城中敗自謂宗社將危後聞金人講和反側意信之從車駕見二帥割兩河地中降于敵可謂主辱臣死之時也􅙫歸都堂曽無愧色見執政但喜講和而已且作㑹飲酒食肉談笑終日自古大臣愚昧無耻未有若此之甚者命文武百官僧道父老詣金國軍前致謝上降㫖命文武百官僧道父老詣大金軍前致謝衆集于南薰門伺候指揮俄有金人十餘來傳令云國相太子致意百官軍中宿食不便不煩逺至又致意僧道父老泥雨不煩逺到請看經念佛祝大金皇帝聖夀便命傳報禮意似勤人情稍安金人遣使致書請喚回康王泣血録曰書云既往不咎故無可言事至於今良可驚悸康王見在河北可遣一人同使命喚回來未審聖意如何凝寒伏惟善保夀祺具書不名但題云古倫尼伊拉齊貝勒皇子左副元帥書上先是康王出使駐於相州尼堪遣使持書來喚回朝廷乃議遣樞密曺輔行要盟録曰是時朝廷使人每出使金人必搜索蠟書上乃與曹輔衣襟用礬書詔康王曰京城將吏士卒失守幾至宗社傾危尚賴金人講和止于割地而已仰大元帥康王將天下勤王兵總領分屯近甸以伺變難無得輕動恐誤國事四方將帥亦宜詳此齎蠟書至大元帥府催發勤王兵修武郎閣門祇候侯章自京城齎蠟書催發勤王人馬甚急甲子到元帥府王問章章曰皇帝遣章等十人擦城北來趣大王領兵入援惟章一人得逹臨陛辭日皇帝宣諭云康王辟中書舍人隨行可以便宜傳諭令莫詔書盡可起河北官兵入援時夜入初更即令耿延禧華詔盡起河北諸郡官兵令臣自將草詔成已夜分矣呼集吏列燭分寫翌旦行下四日乙丑金人遣使檢視府庫拘收文籍金人欲盡取府庫故先遣使來檢視府庫拘收文籍內藏庫者太祖皇帝時封椿庫太祖不忍燕雲之地陷于契丹以每嵗用度之餘置封椿庫以貯之故俟貨財豐殖即用賞戰士以取燕雲之地有詔誓子孫不得别用後為內藏庫真宗皇帝有御制詩詩曰五季失圖玁狁孔熾藝祖造邦基化士每䖍惕驅妄意尊詔業子孫不務兹何以成戎捷龍虎興昌運山河鎮國都龜疇延寶祚鳯德顯靈符道盛堯啓嶽功高禹㑹塗九重方執象萬里定寰區凡七十四字每一字榜為一庫之號皆王章所書金銀錦綺寶貨積纍一百七十年皆充滿盈溢金人遣使來檢視吳幵莫儔相引入庫中使人唯看逐庫字號方至五季失圖玁狁孔熾即止遽索馬歸又二日别遣使人來封閉諸庫遂使燕人李縣丞坐庫中監搬運提舉官內侍王若冲同官吏役禁軍搬三日不絶靖康遺録曰尼堪遣蕭慶入城檢視府庫帑藏皆封識既封府庫即居尚書省朝堂朝廷動靜悉皆關白大元帥府傳檄諸邦起兵勤王大元帥府檢㑹已行詔書僅至傳檄諸郡仰逐州依詔書守臣自將外載惟金人衝突再至京城攻圍未退君父憂辱臣子之心義當效死衛上矧凡在職世受國恩當此艱危豈應坐視冝勉忠義戮力勤王仰逐守臣如指揮到日依已降詔㫖不移時刻措置起兵除量留本處召募到土豪分擺地分守禦外盡數剗刻官兵精鋭趫健招集彊勇強家子弟堪充出戰人逐色團結仍不得夾帶老弱病患人充數備辦犀利器甲鎗刀弓弩箭鏃隨帶附隊差得力人如官兵以將佐部隊將押隊內選差如民兵以知縣丞簿巡尉內選差逐州守臣更切措置糧斛輕齎以防㳂路次舍艱食隨人供億仍差官隨軍管押署文厯分明收支及軍兵起程日借請外優與犒設無致失所兼本府已選十二月十四日提兵起發相州前去過大河入大名府駐劄仰逐州守臣隨里路逺近計程限於十二月二十日以後正月三十日以前節次到大名府㑹合聽指揮審度前進右劄付知中山府陳延康知河間府黃待制潛善知深州姚直閣鵬知磁州宗修撰澤知德州滑大夫彥齡知棣州趙大夫知慱孫振知慶逺府裴刺史汝明知保州葛刺史逄知霸州辛刺史彥宗知保定軍高刺史公翰知廣信軍張刺史㬇知濱州董大夫誼知安肅軍王大夫徹知恩州知滄州知漠州知永靖軍知清州忘記職位姓名皆闕之等准此上件劄子並蠟封先差下使臣兵級翌日遣行計里地自逺及近優給路費起間以行乙丑詔書行丙寅檄書行自此每隔一畨繼遣凡遣六畨每行王親拊恤曰逐處回申來更轉一官資人人欣喜冒雪以行悉逹唯中山慶源二府被圍不得通大元帥府招安到軍賊楊青常景先是相州屬邑林慮縣天平山深僻險阻磁相間豪族數十家避地有軍賊常景有衆號四千人圍劫天平山殺戮殆盡掠取子女玉帛占據天平山又有軍賊楊青嘯聚號二萬人自衛濬直趍天平山破景衆攘取所有仍占天平山為巢穴下瞰相州景州奔潰稍集于縣郊王遣秉義郎曹端仁齎金字牌以禍福曉青以武翼大夫閣門宣贊舍人劄子招青俾率衆勤王又遣修武郎陳恂齎金字牌以忠翊郎劄子招景二賊聞命屈膝效順是日青以一萬人景以二萬人各來歸以親信百人自衛庭參王不設儀衛呼而前慰撫諭戒以金杯酒賜之青以杯載酒股栗汗下于是知王有將將之度矣三朝北盟㑹編卷七十一
