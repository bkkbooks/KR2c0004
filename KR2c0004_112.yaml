body:
  text: 三朝北盟會編卷一百十二宋徐夢莘撰炎興下帙超建炎元年七月十六日甲辰盡八月十四日辛未元祐太后發京師元祐太后進發以孟忠厚為提舉一行事務都人初望車駕還內而聞太后有南京之行莫不垂泣初上遣張俊迎太后至是俊奉騩馭至行在除俊帶御器械十七日乙巳李綱乞巡幸李綱時政記曰劄子大略謂巡幸之策關中為上襄鄧次之建康為下今縱未能行上䇿猶當幸襄鄧以係天下之心夫襄鄧西鄰關陜可以召兵北近京畿可以遣援南通巴蜀可取貨財東達江淮可運穀粟山川險固民物淳厚此誠天設以待臨幸願為今冬駐蹕之計得指揮議巡幸南陽十八日丙午差巡幸官屬户部侍郎黃潜善為巡幸提舉一行事務繕部員外陳堯幹辦頓遞行宫一行官吏將佐軍兵安泊去處虞部員外郎李儔幹辦相視橋道渡船并樁辦糧料草發運使李祐為隨軍轉運使十九日丁未計置迎奉神主是日委兵部員外并太常寺各一員候巡幸之日限三日計置合用舟船車乘等迎奉神主赴行在及據合用人數就太廟親事擡捭令殿前司差撥禁軍三百人防護仍專委內侍官二員充同共都大王管其合行事件並仰條具申尚書省二十七日乙邜戒諭士大夫詔朕觀古之為士者何其分義之明而忠厚之至也承平之時縻好爵享豐亨相與同安榮多事之際不擇地不茍免相與同患難故人之好我至於示我周行王事靡鹽至於不遑啓處而鹿鳴四牡之詩作先王之澤可謂盛矣祖宗涵養士類垂二百年教以禮樂風以詩書班爵以貴之制祿以富之與士無負而士之所以圖報國家者不能無愧於古人日者二聖播遷宗社幾至於顛覆而仗節死難者罕有所聞其故何哉肆朕纂承慨然思羣材相與協濟修政事厲兵馬以奉迎鑾輿而士大夫奉公者少營私者多狥國者希謀身者衆乞去則必以東南為請召赴則以疾病為辭沿流以自便者相望於道途避兵而去官者日形於奏牘甚者至假親疾不候告下挈家而遠遁夫禮義廉耻正所以責士大夫也所守如此朕何望焉豈朕初嗣大位所以誡告者未至與將士大夫狃於故習而未能遽革與已詔甚失節者置之極典其次投之遠方為多士萬世之戒其自今以往各盡乃職一乃心助豫一人克復大業底綏四方以匹休於隆古敢有弗率弗迪尚蹈前轍在內委御史臺在外委監司彈劾以聞邦有常刑朕不敢赦故兹詔示想宜知悉八月一日戊午貶竄余大均陳冲洪芻張卿材李彛王及之周懿文胡思夏承等奉聖㫖訪聞昨來京城圍閉王府主第宗室及戚里勳畹之家以至民庶根括金銀等官周懿文王及之以余大均胡思陳冲等因緣為姦隱匿財物萬數聚斂歌樂靡所不為士大夫負國至此難一照例寬貸可差殿中侍御史黎確馬伸就臺根治具案聞奏根勘得夏承洪芻張卿材各有相犯續奉聖㫖洪芻罷諫議大夫張卿材罷刑部郎中胡思王及之余大均周懿文陳冲並先次放罷今勘到具撮白刑名下項降授朝散郎前太僕寺少卿陳冲差懿親宅抄劄將王府果子吃用摘花歸家與內人同坐喫酒令內人唱曲子將牙簡等隱匿公然受犒賞拜錢將出剩金銀等隱匿入已令人將掌未曽收計絹六百一十五匹除輕罪外准條係監守自盜合較刑贓罪處死除名該大赦原免緣五月十八日奉聖㫖難以一例寬貸根治聞奏朝散大夫前大理寺卿周懿文抄劄缺字王府密煎等將摩候羅士女孩兒等歸家受犒設酒及吃宫人酒果受贓計絹六匹六尺除輕罪外准條行下合杖六十公罪减外笞五十不曽計到摩候羅贓如不滿百文係城內竊盜杖八十如滿百文杖一百贓罪定斷議减外杖九十罰銅九斤入官放犯在大赦前合原緣五月十八日奉聖㫖難以一例寬貸根治聞奏朝議大夫前刑部郎中張卿材差起發懿親宅金銀吃內人酒果聞與內人邊氏離三四步坐吃酒將抄劄扇兒摩兒等歸家受估贓訃絹八匹七尺除輕罪外准條與所部接坐合二年私罪官减等徒一年半合罰銅三十斤入官放犯在大赦前合原朝散大夫前左諫議大夫洪芻差抄劄見景王祗候人曹三馬後囑託大均放出將來本家宿雇作祗候準條係監守內犯姦合流三十里私罪議减外徒三年追一官罰銅二十斤除名勒停犯在赦前合原朝散郎開封府少尹夏承根括到鄭仲宅坤儀酒擅支作犒收受不覺察王及之擅易銀受酒估計絹二十六匹除輕罪外准條係財物不應入而私入合徒一年半贓罪為徒官减外杖一百罰銅十斤入官犯在赦前合原朝請郎前吏部員外郎王及之抄劄金銀見官屬將寧德皇后親妹追捉苦辱並不施行及吃沂王府媫妤位酒不鈐束覺察人吏與鄭紳家使女劉嬌奴等私通及輒受犒賞設酒根括金銀抵換入已計贓二十五鋌除輕罪外准條係私物貿易物例以盜論合加役流贓罪追六官除名勒停該犯在赦前合原五月十八日奉聖㫖難一例寬貸根治聞奏朝散大夫前司農卿胡思推澤張邦昌表內添改諂奉及抄劄棣華宅有祖宗實録者并罷館伴不合破馬有太僕寺少卿差到馬是大王府公然乘騎㸃數不見實録十册是親事官等失去除輕罪外准條係不應為合重杖八十議減等杖七十罰銅七斤犯在赦前合原緣五月十八日奉聖㫖難以一例寬宥根治聞奏二人追捉未獲先次據於照人說出逐人罪犯朝請郎前添差開封府少尹余大均往景王府喬貴妃位抄劄金銀與內人念馬並坐飲酒唱曲子以告首金為由放喬念馬歸家收飬作祗候隱截根括籠子一隻寄在金銀庫內取出麝香三十臍餘被府尹納了除輕罪外據案不曽估到所盜麝香錢如滿十貫係監主自盜合加役流贓罪追三官除名勒停如滿三十五匹合絞刑贓罪除名犯在赦前合原緣五月十八日奉聖㫖難以一例寬貸根治聞奏朝奉郎主客員外郎李彛差往景王府抄劄與內人曹氏等飲會及與內人喬念馬並坐飲酒知余大均洪芻欲雇買曹氏等放令逐便及請洪芻曹氏等筵會令曹氏使女唱曲子除輕罪外准條不應出謁合徒二年私罪追兩官勒停犯在赦前合原案候收坐髙伸身死外龍神衛四廂都指揮使溫州觀察使范瓊因根括金銀時告求王及之減免所根括髙伸家金銀數係不應為重杖八十減外杖七十私罪合罰銅七斤入官放該赦原武經郎閣門宣贊舍人陳思恭因括金銀時告求王及之印押虛抄免納金人係不應為重杖八十減外杖七十係私罪合罰銅七斤入官放該赦原三省樞密院進呈法寺議曰棄市上曰王及之等犯由當戮有司之法如此但朕新政重於殺士大夫伯彥對曰好生聖人之大德祖宗以來未嘗殺一士大夫上顧曰潜善如何潜善皆奏曰臣聞天地之大德曰生陛下誠能體天地以當生殺之際生民受賜上稱善奉聖㫖余大均陳冲洪芻情犯深重並當誅戮各特貸命除名勒停長流沙門島永不放還至登州交割張卿材責授文州别駕雷州安置李彛責授茂州别駕新州安置王及之責授隨州别駕南恩州安置周懿文責授隴州别駕連州安置餘並依斷內余大均陳冲洪芻張卿材李彛王及之周懿文胡思令吏部各差使臣一員步軍司各差兵級一人將校一名防送前去候到貶所取逐州交管文狀繳申尚書省周懿文等責詞曰昔季文子有言見無禮於君者猶鷹鸇之逐鳥雀也故春秋不誅其人而誅其人之意豈無說哉爾服采在庭官榮厚祿國家平日何負汝曹方君親危急之時雖婺不恤其緯乃乘時幸變乾沒自私以為無復朝廷之治矣嗚呼亦士也何為而至於此極哉念本無知誅之奚益俾全首領投卑遐荒尚保餘生毋志豫德幼老春秋曰周懿文余大均等不死難從貶竄君子是以知李綱與汪黃諸公不能輔佐恢復河東河北之境土也曰失其刑矣二日己未綱乞置水軍時政記曰劄子謂生於陵者安於陵生於水者安於水南方之人習水而善沒其操舟若神而北人有懼舟楫而不敢登者水戰之利正南人所宜應沿河淮江帥府要郡宜令造戰船募水軍凡習水而能操舟者皆籍記姓名使平時許其自便有故則紏集而用之逐時教閲量行激賞必得其力有㫖令諸路招置水軍以樓船凌波為號差御用司幹辦官楊觀復齎空名告江浙募人造船餘路委提刑司措置總領三日庚申楊惟忠建武軍節度使時政記曰先是楊惟忠大元帥府都統制擁扈有功故有是命野記曰楊惟忠驍勇善騎射少為將靖康初為髙陽關路軍馬副總管康王開大元帥府惟忠來歸授都統制及黃潜善汪伯彥兵至皆以屬惟忠王即位加殿前都指揮平盧節度使後進檢校少保以兵一萬衛隆祐皇太后往洪州聞金人渡江軍皆潰部將司全傅選等去為盜太后適處州惟忠走萬安縣山谷間數日乃還再聚兵數千司全傅選等復降賊陳辛圍處州惟忠登陴力戰賴故友至敗辛後屯軍洪州李成將馬進來攻吕頥浩率惟忠拒戰進解去改江西副總管軍於吉時賊楊勍屯吉惟忠與勍敘同姓之好邀勍飲誅其首領而併其兵卒年六十六以其軍𨽻嶽飛五日壬戌內降白麻李綱尚書左僕射兼門下侍郎御營使黃潜善兼尚書右僕射兼中書侍郎御營副使李綱制曰門下朕博觀羣書歷考往古將啓中興之昌運必資希世之偉人俾丕修於政經以大慰於民望爰登碩輔敷告朝路正奉大夫守尚書右僕射李綱志大而德剛器閎而慮遠自任以天下之重皆謂有王佐之才粵繇髙華每著名節螭蚴造膝識者想聞其風聲奉常建言公議共推其雅望超躋丞轄進長樞庭風采聳於邇遐聞譽溢於中外尚稽魁柄殊欎師瞻肆朕纂臨之初首圖召用之亟遂升次輔以率羣工民情惟嘉國是以定念中華狃承平而弛備致强鄰伺間隙以肆侵惟民懷舊德而靡亡惟士傒新政而甚切當今朝有內修外攘之治汝其比迹於樊候朕欲民臻仰事俯育之安汝其希蹤於裴度使任大事以爾為棟梁使斷大疑以爾為龜筮是用延登上相秉幹鴻鈞特尊佐揆之崇兼二東臺之峻仍具公爵陟以文階增衍爰田陪其㫖賦洊朌殊渥昭示顯庸於戲得賢邦家之基汝能追配於前哲論相人主之職朕則無愧於古人益遠乃猷以對朕命可特授銀青光祿大夫守尚書左僕射黃潜善制曰門下巨川之待舟楫用宏濟於多艱元首之賴股肱以共成於具體惟時王佐實秉國均相須而成闕一不可兹延登於次輔以同闡於大猷式朌渙號之孚爰聳治聰之聽太中大夫守門下侍郎黃潜善學造聖賢之藴識窮事物之微氣粹而慮深誠篤而忠切表儀禁路著望實於朝端鎮撫巨藩憺威稜於閫寄勤勞一節中外百為朕開帥府以臨戎爾與籌帷而贊化靜密無二險夷不渝納言而合嘉謨揆事而無遺䇿肆朕纂承之始尤徴翼戴之恭建明愈偉聞譽彌崇念中夏玩於燕安致鄰國肆其侵侮雖國勢之猶弱賴民懷之益深朕欲耆定武功汝其紹蕭曹之烈朕欲緝熙治具汝其追丙魏之蹤是用超登右相之隆兼二兩臺之峻乃進公爵仍陟文階陪兹井賦之多加衍圭田之厚併頒茂渥丕觀具寮於戲朕心惟乃功其增修於遠業嘉猷告爾后尚胥及於丕平諒體至懷奚俟多訓可特授正議大夫尚書右僕射先是詔李綱到行在拜正議大夫尚書右僕射上即位左右揆皆虛位首以綱為右揆至是特授銀青光祿大夫守尚書左僕射同中書門下平章事并命中書侍郎黃潜善為尚書右僕射同中書門下平章事綱兼御營使潜善御營副使自是宰相始有親兵十四日辛未傅亮罷制置使發赴行在內降御筆傅亮兵少不可渡河罷制置副使發赴行在以臣僚論久在京師逗遛不行可也李綱時政記曰權知大名府張益謙奏言招撫司騷擾河北盜賊多不若罷之綱奏曰張所今尚留京師未行不知益謙何以知其搔擾朝廷以金人攻圍河北民無所歸聚為盜賊故置司招撫因其力而行之以解河北之急豈緣置司乃有盜賊方時艱危朝廷欲有所經略益謙小臣乃敢沮抑必有使之者遂令分其室八月十二日進呈河東路經制使司奏狀元降畫一聖㫖指揮許令陜府置司候措置招集軍民齊集日渡河續奉聖㫖令聽宗澤節制於陽武伏乞明降指揮以慿遵守綱奏曰河東經制司所得兵不多自陽武渡河濬衛懷三州盡係金人所守便為生界難得糧餉萬一潰散即朝廷别有一項軍馬可以措置河東不若令依元降畫一指揮且於陜府置司招集軍馬事體為便黃潜善謂逗遛不進致失機會綱奏曰河東經制司受命啓行才方數日猶尚在京師恐難謂之逗遛今日事勢亦未見機會可乘不若盡將帥之力可以責成效用其言而績用弗成朝廷自有典憲議久不决八月十四日內降批傅亮兵少不可渡河罷經制副使發赴行在三朝北盟會編卷一百十二
