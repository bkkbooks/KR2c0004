body:
  text: 三朝北盟㑹編卷一百八十五宋徐夢莘撰炎興下帙起紹興八年十一月二日甲申盡二十日壬寅十一月二日甲申張戒奏論金人遣使詔諭江南事金人遣張通古為江南詔諭使蕭哲為明威將軍以副之朝廷遣起居舍人范同為接伴使且入境甲申張戒以臺官本職上殿因進劄子云臣昨疏十二事陛下雖嘉納朝廷未嘗施行示弱招侮理在必然王倫遽回邀金使有江南詔諭使及明威將軍之號不云國而直云江南是以我太祖待李氏晚年之禮也曾不得為孫權乎一則明威此二者何意敵云詔諭臣不知所諭者何事敵若果欲和則當以議和之名來而何詔諭之有臣觀金使今日之事與前日大異禮必不屈事必不從臣為朝廷計上策莫如峻辭拒之其次且勿遽渡江先問其官名何意詔諭何事禮節事目議定得其實而後進退之尚可又曰臣自乙卯嵗論戰必敗去秋凡三年而後驗臣今又謂和無成豈唯無成終必致侮亦願陛下訃之是日午漏戒再具奏曰臣昨十七日面奏臣觀今日朝廷措置太后雖有可歸之機未必有得歸之理䝉聖問何故臣奏乞候王倫回日為陛下謀之又云主戰主和政如醫者喜用大寒大熱藥夫寒熱豈可專用一物用藥貴對病議論貴中理臣謂今日和戰二議雖不可盡廢要不可專主獨有嚴兵謹守此議可專主耳三日乙酉張戒奏論和議利害乙酉張戒再奏大臣謀國只當自勉不可僥幸偷安果得偷安猶可但恐屈辱已甚而偷安亦不得耳講和而是則可以息兵非則適以招敵也禮部侍郎曾開奏論不當講和有報金人遣張通古持詔而來禮部侍郎曽開以謂不當忘仇讐而講和好乃具劄奏曰臣聞越王勾踐因夫椒之敗棲于㑹稽切齒忿惋不忘報復雖卑辭厚禮臣妾于吳奉幣貸粟外示衰弱然勞身焦思坐卧仰膽折節下士陰為兵備者二十有二年乘吳之隙一舉而滅之㑹諸侯而致貢于周橫行江淮號稱霸主此無他堅大志而謀先定故也楚地方千里帶甲百萬戰勝攻取嘗雄于諸侯而惑於張儀之言貪歸商於之地東絶强齊之好西受暴秦之欺懷王入關而不歸頃王逃歸而不恥甘心侵侮日益顛錯土地蹙削國祚衰微終至併吞取笑後世此無他貪近利而忘逺圖故也今金人之于國有秦人欺我之意而我之待彼也無越人報吳之心信其詭謀僥幸講和稽之前古為可憂考之今事為難信而朝廷不思有以伐其謀方且忘大辱甘臣妾貶稱號損金帛以難得之時為無益之事可不為慟哭流涕哉書曰不作無益害有益又曰朕志先定詢謀僉同鬼神其依龜筮協從今欲鞏固宗社保守疆圉安輯黎元經畫國事若陛下不先定志不去無益其何以成功乎夫敵人之言不可信也自用兵以來信使方至兵輒隨之皆已然甚明之驗不待考諸古而可知况今金人之在京師者方見建鎮南之號增屯戍之守置戰艦備糗糧簡雙丁無非為入攻之計而我乃日夕冀望和議之成豈不惑耶恭惟陛下仁孝誠至哀慕深切則迎奉梓宫之使不得不遣今既再往矣梓宫之來杳然無期而託以議和虛費時月使彼可決何必紛紛為他說乎竊聞金使方責我以招降之事是求瑕釁隙豈非自取哉伏望陛下以越為心以楚為戒無忘大恥無惑和議堅心定志一於自治使政事修于內兵將强于外則雖不求而自和矣貼黃云臣竊見金使之來所繫甚大內外臣僚章疏劄子論及此事者願陛下悉以降付三省樞密院使輔國大臣集侍從官預加熟議使應酬之間不至失誤庶無後悔十九日辛丑令侍從臺諌詳思講和利害條奏金國使張通古蕭哲入境上欲屈己就和已與秦檜議定更令侍從臺諫詳思條奏乃降㫖曰有大金遣使至境朕以梓宫未還母后在逺陵寢宫闕久稽汛掃兄弟宗族未得㑹聚南北軍民十餘年間不得休息欲屈己就和在廷侍從臺諫之臣其詳思所宜條奏來上限一日進入禮部侍郎曽開奏不當講和右臣伏奉今月二十日詔㫖云云臣䝉器使叨冒侍從待罪禮司欲進一言特建一論則臣有僣越之罪今臣幸䝉詔訓條具利便以聞臣不避斧鉞之誅醢葅之罪極言切論之且金人之論議必不出此策欲窮我國欲慢我勢欲弱我兵講和而用事釋怨以興師臣恐此羈縻之道當思雪憤之恥臣伏見陛下三遣王倫迎梓宫費耗巨億終無梓宫之還臣子莫不聽信金國豈有講和之意是故嵗中兩遣使者來臨欲議割地之禮今朝廷信此之言倫故傾心待之今陛下降睿㫖條具來云欲使陛下委質于彼者且魏祖欲并孫吳諸將欲迎之魯肅建策于孫權曰肅可迎操將軍未可且肅迎之操當以肅還鄉黨品其名位不失作下曹執事將軍迎之將安歸乎且一孫權尚思一戰終峙吳國况陛下承藝祖撥亂戡定之區列聖秉成守文之業豈不揆此恥也今敵建議增嵗幣之語又是奸詐也是故敵嵗中多來此觀我釁而不操我策豈不竭我力而慢我兵哉臣未喻其言也且嵗幣乃邦賦之餘則可以供之昔章聖不欲竭我力而付之敵富弼乃議榷場之貨年有五十萬所收乃其地所入章聖故出聖斷今遽得之故疆費用幾何陛下竭民之膏血而緝理之京師乃諸夏之本也陛下豈不欲都以正人君之號立宗社而清宫室修園寢而迎淵聖蕭條之餘供此不資之費幾年而得安何年而得臻定國用稍有不前則劉豫是其規模也臣願陛下睿斷挫其來使豈不幸哉臣為陛下策之今我兵革利堅有憤威之勇效死之力嘗膽思奮是故敵有和之議陛下戒諭諸軍將增修武備牢固邉陲揚征討之令豈不人人願死于敵場既我增修武事以觀其釁乘機進兵則都邑非敵敢有也即使和議可成陛下不去尊稱但據古禮以待之則亦不可廢兵而專俟命於彼也皇天臨照此心事無不濟矣若屈志于敵臣願刎頸以謝衆議願陛下察之臣具此數言未盡愚心續當面謝進呈以聞謹奏禮部侍郎曽開罷為寶文閣待制宫祠曽開奏論不當講和與彼國共事不報開見秦檜具言不可通和之狀檜不答開引石晉奉契丹之禍以證折之檜怒曰侍郎知故事檜獨不知耶開以言不從乞即罷去遂除寶文閣待制宫祠尹焞除禮部侍郎兼侍講制曰得遺賢而萬邦寧舉逸民而天下服自季次原憲與遊俠以爭先而蔣詡薛方亦稱述之未廣流風既逺此道寖衰我得其人躋諸近列具官尹焞口泉百氏腹笥九經先王遺言聞諸師訓君子所養得自躬行蓋動靜之有度闕文申公已老屢辭加璧之招裴秀居申時赴追鋒之召奏篇迭上聖道益明顧兹槖鑰之中謀我佚賢之地擢居宗伯仍侍金華往其欽哉服我休命尹燉以太常少卿兼崇政殿說書燉方以疾告在都中禮部侍郎曽開以待制宫祠罷去遂除焞為禮部侍郎除張絢為太常少卿焞即以太常少卿職事交代與絢力辭免乃以待制提舉萬夀觀二十日壬寅兵部侍郎兼權吏部尚書張燾條奏屈己就和利害兵部侍郎張燾奏准都省送到劄子一道云云臣竊惟金使之來欲議和好將歸我梓宫歸我淵聖歸我母后歸我宗族歸我土地人民其意甚善其言甚甘以為信然竊考其說蓋以謂彼非畏我甲兵之盛也憚我土地形勢之强也而遽有此議其敵人之心未易測也論者謂中原之地彼自知決不能有也故有此議又謂彼因廢豫人心遂疑懼我乘間恢復土地故有此議又謂契丹林牙漸有興復之勢彼既與我為深仇非施大恩於我無以結無窮之援也故有此議又謂彼國土厭兵為日久矣始務休息故有此議又謂金主已死新主之立懼不敢當推避再四與國人約必盡歸我父母宗族國人許之然後敢立故有此議凡是數者言皆有理敵計果出于此可謂善自為謀矣此陛下所必信無疑欲屈己而聽之也然兹事體至大振古所無豈敵能為實關天意臣請一為陛下推原之傳曰天將興之誰能廢之又曰天之所壞不可支也然則自古有天下國家者其治亂興廢曷嘗不本于天我祖宗受命光有天下奕世載德百數十年不幸至宣和間天下之亂極矣天用降禍于我國家以致靖康之變二帝播遷九族轉徙宗廟隳廢陵寢丘墟土地陷沒天下板蕩是豈人力能為哉上天假手於敵而已矣今敵一旦盡欲以歸于我亦豈人力之所能為哉髙髙在上必有監此者矣由是言之今日之議使天未悔禍則未見其可使天既悔禍則無所不可豈彼國所能輕哉臣請考人事以驗天意陛下龍飛濟州天所命也敵騎屢薄行闕卒以無慮天所保也嵗在甲寅一戰而敗金師天所贊也是蓋陛下躬履艱難側身修行布德立政上當天意而天祐之所致也臣以是知上天悔禍蓋有日矣中興之期亦不逺矣伏願陛下姑少忍之益務自修益務自治益務自强以享天心以聽天命以俟天時時之既至吉無不利則何戰不勝何攻不克何為不成何功不立梓宫何患乎不還淵聖何患乎不返母后何患乎不復宗廟陵寢何患乎不能繕修南北之民何患乎不能混一今此宣議姑惟聽之而無必信之可也彼使既已及境勢固難拒使其果有願和之意如前所陳如我所欲是必天誘其衷使之悔禍必不復强我以難行之禮而在我者之事則亦無患乎不成若其初無此心二三之說責我必不可行之禮而要我必不可從之事其包藏何所不有安知非上天堅我復仇之志便當命將起而應之此臣區區之過見也其他利害羣臣數能言之臣不復陳願陛下斷自淵衷毋取必于敵而取必于天也若乃略國家之大恥置宗社之深仇躬率臣民屈膝於彼北面而臣事之以是而覬和議之必成非臣所敢知也上覽奏曰朕非不知此第興兵以來殆將一紀無辜之民肝腦塗地朕兼愛南北實所不忍故不憚屈身以成和卿第思之燾退遂有再上章之意吏部侍郎魏矼條奏屈己就和利害吏部侍郎魏矼奏臣准樞密院劄子聖㫖以大金遣使至境意欲屈己就和令侍從一詳議思所宜條奏來上臣捧讀再四不覺涕泗之橫臆也仰惟陛下悼梓宫之未還念母后之在逺傷陵寢宫闕之久稽汛掃思兄弟宗族之未得㑹聚痛南北兵民之未得休息意欲屈已就和誠有不得已者然臣聞天下大戒二事親惟孝事君惟忠所宜奉以周旋不可失墜者也陛下為親而屈孝誠至矣羣臣事陛下其得不盡忠乎臣素不熟敵情不知使人所需者何禮陛下所謂屈己者何事聞諸道路之言謂金人頃立僞齊使之屈膝令受北面之禮靡所不至嵗時之貢靡所不取金需于我謂必盡然以事料之其間必有不可從者如屈膝受令則大不可從者也賊豫本匹夫爾為金人所立恩莫大焉北面拜舞禮亦宜之陛下承一祖七宗基業海內愛戴一紀于兹天命有歸何藉于金國乎傳聞奉使之歸謂金人悉從我所欲不復有所需其誠然耶必無難行之禮以重困我陛下何用過為卑辱以取輕侮乎如或故為不可從之事先有所要則其詭詐之情固可見矣倘或輕易從之屈膝受令他時反為所制號令廢置將出其手一有不從便生兵隙豫奪在彼非計之得也雖使還我空地如之何而可保雖欲寢兵如之何而可寢雖欲息民如之何而可息是又衷甲劫盟之智前史載之詳矣庸得不慮乎且禮經復仇之義臣未暇論也姑以人主之孝論之孔子稱明王之孝治則曰天下和平灾害不生禍亂不作故以一人有慶兆民賴之為天子之孝方今宗廟社稷惟陛下是依天下生靈惟陛下是賴陛下既欲為親少屈更欲審思宗社安危之機與夫天下治亂之所繫考之古誼酌之羣情擇其情可久行者行之其不可從者以國人之意拒之庶幾軍民之心不至懷憤且無噬臍之悔也宗社安而國家可保此非天子之孝乎紹興三年金使遽至朝廷數遣官報聘明年使人方且交馳而金兵侵淮甸矣天啓陛下之心六師鱗次江上力為戰守之具其冬魏良臣等以使事回金人約再遣使大為誹謗之語陛下悟其用計使不復遣敵遂引去臣是時以居言路屢陳自治之䇿前後數千言不過內修政事外備强鄰章疏具在可考而知今陛下因金使之來博詢在廷愚初不知和議曲折顧將何辭以對抑聞孟子云左右皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之如此然後可以為民父母所謂國人者不過萬民與三軍耳縉紳與民一體將與三軍一體今陛下詢于搢紳民情大可見矣惟三軍之心未知所向和戰國之大事豈可不訪之兵將乎欲望聖慈速召大將各帶所部近上統制官數人同來以屈己之事廣加訪問以塞他日意外之憂彼或以為不可亦能鼓作其氣益堅守禦之備也帝堯稽于衆捨己從人以成帝業苻堅不從舉國之言終致淝水之敗利害較然明甚固知陛下孝思之切力能就和而臣所言如此誠以陛下之深知不敢有隱以為己私也孟子曰君如彼何哉强為善而已矣惟陛下留神幸察三朝北盟㑹編卷一百八十五
