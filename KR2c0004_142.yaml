body:
  text: 三朝北盟會編卷一百四十二宋徐夢莘撰炎興下帙起建炎四年九月一日庚子盡十月一日庚午九月一日庚子吕頥浩駐軍於饒州吕頥浩為建康府路安撫大使兼知池州張道王渙顔孝恭巨師古楊惟中王􅊅六軍皆聽節制李成冦江州頥浩乃駐軍於饒州四望山三日壬寅知德安府陳規以王命招馬友降馬友擾於京西湖北也以其衆冦德安府圍城數月不退知府陳規守禦甚嚴友不能近規乃與友約通買賣鹽一斤為錢二十千八月有使往四川回者以路不通行留使府中規乃與奉使謀令以王命招友受降友許諾計成而奉使行友乃以文字報前路不得邀掠奉使至孝感縣尉告之以前途難行奉使遂止而友復猖獗矣時曺成屯於三龍河也四日癸卯通泰州鎮撫使嶽飛入泰州七月嶽飛除通泰州鎮撫使至是以本部兵入泰州飛治軍嚴整將士畏之禁止軍中不得騷擾百姓尤得民情馬進入興國軍馬進自黃州渡江由大冶縣冦興國軍知軍李儀及軍縣官皆在城中遂開門納之進入城買賣不殺掠入官軍馬趙延夀冦德安府趙延夀號趙不忙以衆犯德安府陳規禦退之二十日己未金均房州安撫使王彥及桑仲戰於平麗縣長沙平仲敗走追至竹山縣而還平仲退據房州王彥在金州時中原盜賊蜂起大者據縣鑄印章擅生殺更相吞噬以圖非望而飢饉荐臻無所資給惟四川號為全富金州適當蜀之門户彥撫民治軍寬猛得宜軍民皆信嚮之巨冦桑仲以陷襄陽進攻均房知州李倫清韋知幾脫身奔竄仲勢益張有窺四川之意擁衆號三十萬直犯金州白土關彥以官軍保長沙平衆者彥之舊部曲也以申狀懇請於彥曰仲於公無敢犯願假道入蜀以就食耳彥子將佐曰吾素知桑仲之為人善馭士卒輕財善鬭然勇而無謀決為諸公破之乃遣統領官門立為先鋒立血戰不勝馬陷於淖中其子璋馳馬適過立呼之使救璋不顧而去立遂被執為賊碎其尸立罵不絶口而死人心震恐且糧食不繼或請避賊鋒彥曰方今金人在陜右桑仲在安康則四川腹背受敵奈天下何吾荷國家厚恩誓不與賊俱生以母老託其友遂同統制王宗尹相為掎角時官軍才二十人彥謂諸將曰大丈夫要當以忠義死節豈可效鼠輩偷生負國敢有言避賊者斬人皆奮勵願爭先致死己未賊張步騎六道並進其勢甚盛彥執旗大呼麾士士先悉力死鬭自辰及酉大敗追襲二百餘里賊陳永還據房陵張浚以陜西五路軍於富平為羅索所襲諸軍不戰皆潰先是張浚以川陜宣撫之職後生氣鋭欲聚兵深入削平禍亂初至漢中㑹諸將問大舉之策前軍統制王彥獨以為不可曰陜西兵將上下之情皆未相通若少有不利則五路俱失不若且屯兵利閬興洋以固根本設若敵人犯境則檄諸路將帥互為應援以禦敵若不捷亦未至為大失也時浚之幕客皆輕浚其氣亦鋭見兵馬已集謂大功可成要當疾進聞彥之言皆相視而笑曰提兵數萬乃畏怯如此何日可成大功彥以計不行即請為利州路鈐轄而去後浚駐於秦州金人敗吳玠於彭店原復還河東浚欲大舉因問威武大將軍曲端有何計策端謂承平之久人不經戰金人新造之勢難與爭鋒且宜訓兵秣馬保疆而已俟十年方可議浚不喜乃曰將軍持不戰之說豈可以當大將端曰唯遂納威武大將印用端為參謀時王庶亦為參謀謀論不協端因辭遂以為都轉運使隨軍而已端與彥之言不用由是浚與幕官劉子羽輩専為攻戰之謀常會諸幕客中有言兵馬一集可以掃金人盡者浚大喜之幹辦公事郭奕應聲曰不知是怎麼地一掃用條帚掃唯復用掃帚掃一坐皆驚愕浚亦默然是時大舉之議已定三尺之童皆知其不可幕客與兵將皆心知其非而口不敢言唯諾相應和者十八九間有反復論難者又持之不堅獨楊晟極言其非浚不從兵事既舉晟乃求行邉不隨幕府浚乃竭全陜六路事力舉於富平金錢銀帛糧食如山積浚以熙河路帥劉錫為都統制浚以九月發秦亭親督戰六路兵二十萬馬七萬約以更相策援浚見兵馬俱集大喜謂當自此便可以徑入幽燕問曲端如何端曰必敗浚曰若不敗如何端曰若宣撫之兵不敗端伏劍而死浚曰可責狀否端即索紙筆責令狀曰如不敗甘伏軍法浚曰浚若不勝復當以頭與將軍遂大不協金人屯於大封縣相去八十里而婁室貝勒方在綏德軍衆請擊之浚曰不可夫戰者當投戰書約日會戰乃遣使投書金人不報書凡數往浚大書於榜曰有能生致羅索貝勒者雖白衣亦授節度使賞銀絹皆萬計羅索貝勒自綏德軍來移軍與官軍對壘其榜軍曰有能生致張浚者賞驢一頭布一匹羅索貝勒率數十騎登山以望浚軍曰人雖多營壁不同千忩萬孔極易破耳浚猶遣使約戰金人許之至期輒不出兵以為常浚以羅索為怯且曰吾破敵必矣幕客有請以婦人巾幗之服遺羅索諸路鄉民運糧草錙重者絡繹於道路至軍則繞寨安泊每州縣自為小寨以車馬為衛十十五五相連不斷先是知鳯翔府兼權永興軍路經略安撫司公事吳玠謂地勢不利宜據髙阜衆曰我師數倍又前臨葦澤非騎兵所宜不聽是日也羅索貝勒選三千騎蓐食令哲爾格貝勒率之囊土逾淖徑赴鄉民小寨鄉民奔亂不止踐寨而入諸軍驚亂浚乘騎急奔諸軍皆潰唯環慶路經略使趙哲牌旗不及捲衆呼曰環慶路經略趙郡丞先走至汾州乃稍定金人得勝不追所獲珍寶錢帛如山嶽不可計郭奕為詞曰羅索天王傳語張老謝得送到糧㪷稱不留一件怎生見得多少浚自愧輕舉無功乃歸罪趙哲矣或有以諸葛孔眀比浚者幕客或以為譏而怒之彼曰非敢譏也孔明應變將略非其所長是以似之二十五日甲子金人陷楚州金人用降人衡進言專攻北壁四十餘日晝夜不怠炮著敵樓飛石中趙立股骨折而死徐州人臧進埋其尸立死之六日而城陷立一妻一妹一女年十二嵗一男方總角或遭虜掠或被殺害皆盡後有人見其男在敵寨中猶言我爹爹死後便有此事聞之者為之墮淚立在楚州也視金人如仇讐每言及金人必嚼齒而怒常戒約士卒惟以殺金人為言且曰若不幸城陷則當備巷戰每一巷口皆以磚壘合隔三五巷為一間道出兵以殺金人則金人可以盡殺每戰皆履陳行為旗頭見士卒有回顧或退移一步者定行軍法故人人用命不敢有退怯心君子謂向使立以陷城巷戰而死其忠義之節必髙於張巡許逺之上惜乎死於炮下餘威不得見之哀哉加贈奉國軍節度使諡忠烈立廟楚州與十人恩澤皆無承受者初兵入楚州也有徐軍民老小僅數千强壯唯二千又有楚州將兵約二千四縣民約五千淮陰縣首領嚴宗義兵亦不滿萬人受圍既久徐州人漸有歸鄉而去者圍城初有野麥野豆可以為糧後皆無生物有鳬茈蘆根男女無貴賤斸掘之後為水所沒城中絶糧食至草本有屑榆皮而食者親戚互相啖至城陷而心不變城陷之始四縣民兵爭門而出往往有得生者民兵首領萬五石琦蔚亨號為千人敵皆得出唯左彬不忍棄其妻彬乘馬坐妻於馬後以繩維之手提大刀爭門而出手殺數十人力困而死紹興五年徐州將校出立尸改葬自頂至足無一指脫落者唯左股為炮所傷骨折不續人皆竒之中興姓氏忠義傳曰趙立徐州人也少為軍卒建炎三年領兵數千與金人苦戰徐州互有勝負以衆寡不敵率兵走楚州尚有八百時無守即命立為泗楚州鎮撫使金人以重兵圍之一年盡其攻擊之術立以死拒破之城中居民有小過即誅斬一家使無遺類威勇振一方前後殺金人數萬多以其尸懸之城上金人每欲渡江以立止梗淮東故不敢渡劉光世以兵五萬聚潤州畏大金不敢進朝廷命以兵救立不敢來詔加觀察使後拒大金於城上中炮而死年三十七大金聞立死爭以雲梯登城中死戰又大敗之殺其數千人然城中無主將恃勝弛備大金探知之遂爭登城城陷皆屠之朝廷嘉立之忠贈開府儀同三司後賜廟宇楚州號顯忠追薦楚泗等州鎮撫使趙立并陷沒官吏軍民黃籙道場青詞伏以比者北敵慿陵羣方振擾塗炭既彌於淮甸襟喉適在於山陽惟時帥臣為國守城提孤軍而力奮冒强敵以直前拿兵幾滿於三時叩壘殆逾於百戰貫精忠於日月塞英氣於乾坤雖云壯志之莫成固以策名之不朽念元身之遽沒極恩數以難酬輒整丹誠仰干洪造按科議而載袚冀仙聖之來臨仰祈垂照之明俯録盡忠之魄嘉其節死處以仙科坐起萬化之塗永脫九幽之籍不淪為物以勸事君追薦趙立等道場罷散朱耒解紛排難嘗力蹈於危機福善禍淫固莫逃鑒惟干城之故將實當世之竒材既忠勇以忘身宜神明之護祐至誠而動天地固異常倫忠死而作神仙况存眀訓前御史中丞秦檜將家屬自敵寨逃歸至璉水軍丁䙫水寨御史中丞秦檜初以不願立張邦昌邅尼堪拘執北去并其妻王氏同行隨行有小奴硯童小婢興兒御史街司翁順而已至金國見金主文烈帝髙其不附立異姓之節以賜其弟達蘭而任用任用者執事也達蘭亦髙其節甚相親信金人許隨遷徙南官之人各逐便硯童興兒翁順皆不欲捨檜去乃共約同生死遂不相離金人欲用逹蘭提兵而南也命檜以任用偕行檜與其妻王氏為計至燕山府留王氏而已獨行王氏故為喧爭曰我家翁父使我嫁汝時有資貨二十萬貫欲使我與汝同甘苦盡此平生今大金國以汝為任用而乃棄我於塗中耶喧爭不息達蘭與檜之居鄰比聲相聞達蘭妻一車婆聞之詣王氏問其故王氏具以告一車婆曰不須慮也大金國法令許以家屬同行今皇帝為監軍亦帶家屬在軍中秦任用何故留家屬在此而不同行也白之達蘭達蘭遂令王氏同行由是硯童興兒翁順亦偕行檜為任用又隨行參謀軍事又為隨軍轉運使在孫村浦寨中楚州陷孫村浦寨金人紛紛爭趨入楚州檜常以梢工孫靜為可與語遂密約靜於淮岸乘紛紛不定作催淮陽軍海州錢糧為名同妻王氏硯童興兒翁順及親信髙益恭等數人登小舟令靜掛席而去至漣水軍界為丁䙫水寨邏者所得將執縛而殺之檜知水寨尚為國家守乃告之曰我御史中丞秦檜也寨者皆村民不曉其說且謂執到姦細凌辱之檜曰此中有秀才否當知我姓名或謂有賣酒王秀才當令一看之王秀才安道字伯路素不識檜乃佯為識檜以紿其衆且欲存檜也遂一見而長揖之曰中丞安樂勞苦不易衆皆以為王秀才既識之即不可殺遂以禮待之硯童興兒翁順髙益恭等一行皆得全生王闢以其衆降於王彥王闢曺端自襄陽潰散屯於中廬也闢殺端而往秭歸不知地利為思州田祐恭族蠻兵以木弩射退之乃復取興山縣路退於房州是時桑仲方攻金州而未敗也闢為仲聲援及闢敗仲不敢進彥遣人以逆順諭闢使闢以忠義歸朝廷與附叛逆榮辱利害相去甚逺闢大悟請降彥欲詣闢壘衆謂闢雖願請降然心反覆未可知彥曰我以至誠待闢闢雖詐何能為遂肩輿至闢營闢大驚迎迓甚恭彥具飯與闢對食開諭禍福闢之黨皆俯伏聽命遂遣詣宣撫使司將佐皆不更易於是人人願為之用闢後腰斬於興元府二十七日丙寅趙延夀焚郢州金人攻李彥先於淮河先被殺李彥先者韓世忠後軍管隊使臣也先是有李進彥犯罪配逺惡過江州遇一道人曰汝異日當富貴指其口曰能容拳則為公侯令進彥以拳內口中才容半許道人曰惜哉雖富貴所得者苦不多耳臨去語進彥曰汝不可自發心逃遁候有人教爾去去即無害進彥曰諾至衡山防送者曰嗟呼生為兵士傳送罪人何時已乎叱進彥曰汝自去我亦亡矣進彥謝之而去後投韓世忠軍中𨽻彥先隊下世忠潰於沭陽也彥先與本隊四十三人得二舟下海聚衆數千先進彥分統之趙立在楚州受圍彥先以舟船往來策應與立刺臂為義兄弟城陷之日彥先舟船猶在北神鎮淮河中前後扼於金人進退未得至是金人以舟船併力攻彥先彥先所乘舟下碇石急收不應為金人舟船簇擁彥先全家皆死於淮河時進彥舟船在東海縣招集彥先餘家遂為首後於許浦受劉光世招安韓世清駐劄宣州韓世清屯於徽州也六月令世清池州駐劄八月劉洪道以吕頥浩參謀來知池州隨行有王渙李貴崔邦弼等兵共數千是時世清有衆余洪道以池州錢糧闕乏令世清宣州駐劄世清遂駐劄於宣州十月一日庚午朔張浚斬環慶路經略使趙哲富平之敗張浚欲斬大將以藉口浚在邠州㑹諸將帥議事浚立堂上諸將帥立堂下浚問誤國大事誰當任其咎者衆皆言環慶兵先走浚即令擁環慶經略使趙哲斬之不伏且言有復辟功提轄官以骨朵擊其口血流不能作聲斬於堠下不厭公議衆語喧譁浚遂以黃榜赦諸將罪以安其心張浚放散五路勤王兵趙哲已死諸路帥聽令張浚令各歸本路歇泊令方出口諸路之兵已行俄頃兵盡張浚以孫恂權環慶路經略使張浚既斬趙哲環慶路闕帥乃以便宜命轉運判官孫恂權環慶路經略使慕洧以環州叛附於西夏趙哲被誅或語諸將曰汝等戰勇而帥獨坐誅天下寧有是事孫恂既權帥事也劉子羽語恂令陰圖環慶諸將恂納其言斬統領官喬澤張忠而統制官慕洧覺之懼遂以州叛張浚遣涇原統制官李彥琪救環州洧附於夏國三朝北盟㑹編卷一百四十二
