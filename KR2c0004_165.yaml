body:
  text: 三朝北盟會編卷一百六十五宋徐夢莘撰炎興下帙起紹興四年十一月十四日乙未盡十二月三十日癸卯詔用張浚榜朝堂行狀曰是日上親書詔曰張浚愛君憂國出於誠心頃屢多艱首倡大義固有功於王室仍雅志於中原謂關中據天下之上遊未有捨此而能興者乘敵百勝之後慨然請行究所施為無愧人臣之義論其成敗是亦兵家之常矧權重一方愛憎易致逺在千里疑似難明然則道路怨謗之言與夫臺諫風聞之誤蓋無足怪比復召某置之宥密而觀其恐懼怵惕如不自安尚慮中外或有所未察夫使盡忠竭節之臣懷明哲保身之戒朕甚懼焉可令學士降院詔出榜朝堂劉光世退軍建康府韓世忠退軍鎮江府張俊退軍常州府濠州鎮撫使冦宏棄城走丁成魏進叛附于金人金人以重兵臨濠州四面攻擊知濠州寇宏禦之時城中兵少大率人當三女墻軍民與僧道相參每十人為一甲皆被甲持槍不得內顧每一踏道二人以長刀監守無故上下者殺之宏唯著布袍軟纒晝夜步行巡視四壁未嘗乘馬呵喝由是守陴者嚴肅不敢懈一日宏在衆中望見守陴者三人擦城而去宏徑至上呼其同甲者餘七人皆斬之人人悚栗北軍以兵甲數萬與衝車雲梯皆傳于城宏作鐵鎚上插狼牙釘謂之破金鎚有沿雲梯而上者以鎚擊之頭鍪與胸骨皆碎尸積于城下數千而北軍來者猶不止又以鼓數萬聚于東門之外一時俱鳴其聲震天謂協城鼓而城之東北壁女牆震而摧者二三十步北軍以精卒利兵併力齊射飛矢如雨州人駭愕宏乃張布幕以禦箭令人運炭瓦别修女墻指顧之間女墻如舊矣金人又如舊河口敵樓下併力攻城城上金汁灰瓦與矢石亂發金人死者雖多而相繼來者亦不少既而摧城之半而守陴者亦不驚懼盡力禦郤力擊者凡七晝夜不休宏以城必不可當乃開北門棄妻子持母與寡嫂棄城而去從之者十餘人通判國奉卿初在清河口同趙瓊率民兵劫金人舟船得李棁之妾俾生兩子棄濠州也聲言登舟欲以計破金人奉卿信之既而乃知欲為遁走計已登舟不可復入城矣奉卿曰何不明言於我使我携一妾兩子而乃棄之死地邪宏以奉卿為怨已遂殺之宏既去權兵馬鈐轄統制軍馬成自南門投拜兵馬都監副統制魏進自東門投拜時金人主帥屯于近郊問宏之家屬所在成謂宏與同去矣既而聞匿于成家遂斬成于市乃取宏與奉卿家屬焉金人以賈舍人偽知軍州事數日以趙榮代之十二月張俊往沿江勞軍行狀曰時大帥烏珠擁兵十萬于維揚朝廷遣魏良臣王繪奉使軍前還夜與公遇于中途公問以金事及大帥問答良臣繪謂金有天長之衆且喻良臣曰當以建州以南王爾家為小國索銀絹犒軍其數千萬又約韓世忠尅日過江決戰公密奏使人為金恐怵朝廷切不可以其言而動及不可令更往軍前恐我之虛實反為金得上然之公遂疾驅臨江召大帥韓世忠張俊劉光世與議且勞其軍將士見公來勇氣十倍公既部分諸將留鎮江節度之令韓世忠移書烏珠為言張樞密已在鎮江初敵牒報公得罪逺貶故悉力來攻至是烏珠問世忠所遣麾下王愈吾聞張樞密貶嶺外何得已在此愈出公所下文書烏珠見公書押色動即強言約日當戰公再遣愈以世忠書往問戰期愈回一日而適宵遁士馬乏食狼狽死者相屬遣將追擊所獲甚衆太隂犯昴丙戌夜太隂犯昴按晉天文志五年滅敵有司奏以為滅敵之象上因與大臣論及之胡松年曰天象如此中興可期上曰范蠡有言天應至矣人事未也更在朝廷措置如何趙鼎曰當修人事以應之馬闕為江西沿江制置副使車駕幸平江府差馬闕兼行宫留守司參議官被旨發赴平江府扈從車駕至是差江西沿江制置副使依前樞密副使承旨駐軍武昌奬將士詔朕分遣將帥列屯江淮比命相臣親行按視還朝之日具一奏陳乃聞身率戎行日加訓練騎射慣習杖擊精間戎政益修士氣彌振既以嚴飾於武備是將圖建於茂勳深察用心之忠尤嘉報國之義朕惟無德以攘逺未能解甲以休兵煩爾師徒久從征役暴露寒暑擁持干戈軫念于心惻怛忘寐惟爾懷撫養生全之恩德憤僭偽侵陵之凶殘宜勉事於艱難終共成於逸樂誓當有濟用副至懷故兹撫諭想宜知悉十三日丙戌招從偽大夫詔朕惟靖康兵革之難神器幾墜天命有在屬於眇躬夙夜兢兢罔敢自逸期與爾士大夫共雪大恥還我兩宫保有黎元永庇中土而強敵侵軼迫朕一隅叛臣乘時盜據京邑使我縉紳淪陷塗炭繇朕不德以至於斯北望傷心收涕無所亦惟爾士大夫蒙祖宗休澤朕在周行其有失身偽廷事非其主顧驅協使然有不得已者朕甚痛之故若張孝純李鄴李儔等內外親族不廢祿仕每飭有司常加存恤朕之於爾厚矣爾尚忍忘之耶其能洗心易慮束身以歸當復其爵秩待遇如初或為竒謀祕畫立功自效仍盼異賞不限前愆嗚呼順逆之理禍福之機昭然甚明要知所擇朕方布大信以示天下言不爾欺有如皎日咸務自省體朕至懷冦宏知濠州冦宏棄濠州至平江府會車駕駐驆平江宏匿閭巷間不敢出視事八廂以聞上乃召見宏宏大驚懼至則把見把見之禮衛士驅捽之宏益驚上問淮南事宏戰栗不能對命宏仍舊知濠州疾速前去宏遂退二十日癸巳張宗顔及金人戰於六合縣金人瀕江攻宣化鎮出沒者逾月張俊遣張宗顔潛渡至六合縣出金人之背與戰不勝詐為捷書以聞折彥質為樞密都承旨詔撥崔邦弼吳錫兩軍付馬詔河南安撫司撥崔邦弼吳錫兩軍付馬安撫使席益不奉詔上怒落其職汪伯彥落職放罷汪伯彥先於紹興三年被旨編進大元帥府事迹於是年編成上建炎日厯表曰臣伯彥言今年三月十二日準尚書省劄子節又備奉紹興三年十月二十三日聖旨命臣以大元帥府事迹首尾省記編録進御先御乙夜覽付之史官篡述成一代之典傳信後世者有王者起必先授命之符為天下君宜首表年之事蓋春秋之作探一元之意而皇帝以來紀五德之傳振古如斯于今稽若臣伯彥誠惶誠懼頓首切以藝祖創艱難之業列聖守盈成之文萬邦惟懷四方來享垂令聞于不已昭偉迹之無前緣朝姦變亂於舊章而王政淪廢乎小雅屬大運百六之厄會加小遊泰一之臨方二帝蒙北燕之塵一張僣南楚之號賴二百年龎洪之澤得億兆人嚮往之心戴宋厥惟舊哉歸啓孰能禦也恭惟皇帝陛下天地合德孝悌通神奉使北庭而漢天子以尊建府朔方而晉元帥稱伯黃河合凍發光武滹沱之祥紅氣流光呈周室大烏之瑞休嘉應於一德謳歌來於萬方就日望雲北面勸進者乃至五六反袂拭目西向退託者不止再三末如之何迫不得已建議定䇿二三子何力之有焉應天順人大一統自今以始矣必有不刋之典庶為罔極之傳臣職昧幾先學唯荒落鞭弭盡周旋之力帷幄無裨補之功學六龍之御天首四蛇之入宇受恩莫大負罪良多流落江湖莫收魂魄俯仰宇宙回想風雲會逄明詔之頒俾紀當時之實舐筆和墨難摹日月之明拭目揚眉莫覩乾坤之大惟是云為德業與夫日月時年畢索始終粗悉首尾唐虞二典垂成盛代之書遊夏一辭或補闕文之史雖慚潤色弗近汙誣祖述憲章俟聖人之筆削鋪張揚厲唯國史之發揮以編類成書名曰建炎中興日厯謹用繕寫分為五卷隨奏上進以聞臣伯彥誠惶誠懼頓首頓首謹言紹興四年四月二十二日觀文殿學士左參議大夫提舉西京嵩山崇福宮臣汪伯彥上表又建炎中興日厯序臣恭被聖旨省記大元帥府事迹至陛下即寶位本末編為成書進御以塵乙覽將付之史館臣精白以承休德不知鼓舞仰惟皇帝陛下盛德之舉豈徒紀事而已哉聖意殆有所在臣聞伊尹告太甲曰今王嗣有令緒而戒之以慎終於始蓋保位莫如慎始也始之不慎其克終者鮮矣慎終莫重乎始故君子大正始焉陛下以天錫智勇之姿當陽九非常之厄運再造王室起於艱難思厥艱難大正厥始以圖克終紀事之意於是乎在天下幸甚臣仰遵聖訓謹紀陛下自康邸奉淵聖皇帝詔出使敵廷改命建府以兵馬大元帥起義河朔由相及魏及鄆及濟憂勞百為遭神器中移以天下之推戴續已斷之大統即祚于應天臣往者首尾待罪今得以奉詔畢慮省記三以斷編而以事繫之日以日繫之月以月繫之時以時繫之年起自靖康元年冬十有一月十五日至于建炎元年夏五月十日採事托實編次成書分為五卷名曰建炎中興日厯或庶仰副陛下大正始之意焉爾紹興四年四月二十二日觀文殿學士左正議大夫提舉西京嵩山崇福宫臣汪伯彥謹上三十日癸卯金人退滁州金人據滁州四十七日至是乃退去王進薄金人于淮執其帥程師回張建壽金人自合淝而歸也張俊命王進曰敵騎無留必徑渡淮而去可速進兵而及其未濟擊之進往敵且渡遂薄諸淮大敗之獲其帥首程師回張建壽皆名將也師回言劉豫説金人云劉光世韓世忠失權江南可取故金信之而來趙鼎具以師回之言聞奏上乃以賈復冦恂事訓飭二將金主烏竒邁以病殂節要曰四年冬金主烏竒邁以病薨傳位于安班貝勒都元帥完顔亶金人自來以安班貝勒為儲嗣故得預之時以大兵相拒江上不敢發喪至軍回於五年之春方告諸路諸郡邑立烏竒邁之靈拋盞燒飯金俗也吏民挂服及禁音樂一月而罷鄂勒歡逹蘭烏珠自江上回至燕山各赴烏竒邁之喪金主完顔亶進諡曰太宗文烈皇帝神麓記曰烏竒邁先患中風病手足無力半身不遂約及一年至天會十三年乙卯嵗正旦近侍扶掖而行早見佛自東方隨日出而現從者皆視而瞻禮間烏竒邁問汝等見甚皆云見佛像在日傍雲間言未訖烏竒邁昏困再病中風僵仆殂於明德宫時年六十一宗幹宗維傳大行皇帝有旨急詔安班貝勒赫嚕即帝位於柩前諡曰太宗文烈皇帝葬之墳山號曰豫陵趙子砥燕雲録曰金國置庫收積財貨誓約惟發兵用之至是國主烏竒邁私用過度諳班告於尼堪請國主違誓約之罪于是羣臣扶下殿庭杖二十畢羣臣復扶上殿諳班尼堪以下謝罪繼時過盞三朝北盟會編卷一百六十五
