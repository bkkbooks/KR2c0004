body:
  text: 三朝北盟會編卷一百十六宋徐夢莘撰炎興下帙起建炎二年三月七日辛邜盡五月二日乙酉三月七日辛邜金人䧟中山府金人䧟中山府城中絶糧人皆羸困不能執兵城䧟金人見人皆瘦瘠而憐之取使臣効用軍兵千餘人令出城外聽指揮皆無力行歩扶杖而往至則有金人傳令曰汝皆合死大金念汝忠特貸命不殺將汝等選擇千人置立千人一軍皆無力拜謝十九日癸邜河東置制使趙宗印屯於郢州趙宗印在㐮陽時中書舍人席益知郢州乃遣人致書招宗印宗印遂以兵屯於郢州益亦具舉留宗印狀申朝廷翟興翟進敗金人於福昌三鄉又敗之於龍門收復西京翟興翟進與權京西北路置制使苖捜遇金人於福昌及三鄉間苦戰終日金人敗北獲金人司天梁寺丞者興進弟兄取龍門路收復洛城金人擁鐡騎數千相拒於龍門石道中興進麾將士力戰破之金人退保洛城官軍乗勝轉戰奪長夏門以入與金人巷戰遂克復洛城時金人益出精兵自河陽南城至白司馬坡營壘相望距洛不遠十數里復窺伺興遣麾下斷河橋自是金人稍去遠二十六日庚戍金人䧟洺州初金人圍洺州以知州王麟是童貫舊屬官遂於城下呼為王姑丈間其民心軍民信之殺麟全家有韓一者為統制名一字定志主城中軍事金人自京師回經由洺州境内洺州軍民刼之得南班宗室士遂留為知州金人築外城圍洺州截鹿角掘壕塹固甚密内外不相通欲持久困之洺州終不投拜西山有李宗作山寨自守有百姓晁進者懐蠟書凡三次出金圍金人侵西京陜右也河朔兵虗守者稍怠洺州以糧食盡不可守於是强壯軍民議棄城投拜乃擁出城皆走自白家灘渡大河往大名府金人遂入城羅索至秦州西河偏將劉惟輔殺其帥哈芬大王羅索遁走羅索殘長安鼓行而西跨鳳翔府汧隴不浹旬降秦州熈河隴右大震熈帥張深遣偏將軍劉惟輔總統兵三千禦敵金人前車踰鞏州惟輔留軍熟羊城以精騎千八百人夜逾深居敵恃勝不禦黎明軍墜伏中惟輔騰矟刺其帥哈芬大王洞胷屠馬足下羅索失勢遁走劉光烈擊金人於同州戰敗金人畧秦雍所過城邑輙下未嘗有迎戰者金人至鞏以深入有後憂又熈河將劉惟輔遇敵於熟羊城天未曉短兵接殺傷相當而敵失大帥哈芬大王遂復東還惟輔亦走敵去而惟輔覺鄜延帥王庶令統制劉光烈邀擊金人遂遇於同州光烈戰敗自此官軍見金人則退怯矣張嚴及羅索戰於五里坡兵敗被殺金人自鞏東還也熈河已遣劉惟輔追逐又遣大將張嚴踵至嚴鋭意追賊惟輔不欲聽嚴節制乃出别道由吳山出寶雞掠敵遊騎而嚴擁大兵擊敵於五里坡嚴初發也約涇原兵會合擊敵嚴既下隴闗涇原統制官曲端應報相會於岐隴闗嚴信之既直前而涇原兵不出據青谿山以自保金人反軍擊嚴嚴兵敗死之節要曰羅索䧟長安斷攻鳳翔秦鳳等路後為張嚴所敗羅索自秦鳳回張嚴襲之羅索伏兵於五里坡嚴至伏發嚴戰不利死之呉玠敗金人於青溪嶺張嚴兵敗金人勢愈張謀趨涇州涇原將曲端拒守麻務鎮命第十二副將吳玠為先鋒玠進據青溪嶺逆擊破之尼堪焚西京陜西以援羅索尼堪知羅索為張嚴所襲西來又聞韓世忠大軍所至盡焚西京廬舍西京漢上之民北留烏舍伊都屯河陽以待世忠親之陜右以俟金人信王遣馬擴赴行在乞兵續自敘曰初信王與馬政倡義起兵也欲遣使詣行在請禀朝廷之命時兵戈方熾道路梗塞雖已兩𤼵使人慮其不達乃遣予赴行在臨行信王以兩首詩送予曰全趙收燕至太平朔方寸土比千金氛祲一掃鑾輿返若個將軍肯用心又曰遣公直往面天顔一奏臨朝莫避難多少焦苖待霖雨雨霖只在月旬間因親送予至山下握手仰天欷嘘流涕曰惟公至忠無以家屬為念予率麾下五百人沿路轉河朔皆大盗據要險馬毎至輙单騎詣其寨諭以信王請兵之意且與結約同効忠義盗賊皆踴躍忻從時兵間無紙筆予所至裂衣襟記其姓名次第云俟到朝廷即先命爾軰以官渡黄河時皆盗魁自操舟相送以濟既至東京見留守宗澤出信王劄子託澤早津送赴行在并以信王二詩示之澤曰児子方欲赴行在不若先以詩進呈如何予從之遂行至維揚所從之士不滿百人矣既見上因奏言臣䧟敵日適遇太上皇帝車駕北狩時因問内使張恭有何臣僚在此恭以臣在遂令恭密傳聖㫖令歸到南地見官家時可令用兵金人無信兵勝則我可歸奏至此上揮淚曰朕稔聞卿忠義即加褒諭下殿拜謝欲出間見宰執環而前不聞奏論何事但遥聆玉音甚厲且信王是太上皇帝之子朕之親弟豈不認得書迹何疑之有連曰何疑之有即條制除信王河外兵馬都元帥制曰頃強敵之内侵屬都城之失守偕宫闈而遠適厯險阻以備嘗肆𦕈躬之績承濟多難而恢復還襲之兵繼遣祈請之使屢馳撫時序以既周悵初心之未遂忽覽章疏之近奏始聞行役之獨留盍既言歸竚寛遐念乃陳手足之助願効忠孝之誠慨然壯圖副朕本㫖宜就顓於臨制庶盡總於營屯以迎二聖六宫之還以慰兩河諸鎮之望特授擴拱衛大夫利州觀察使樞密副都承㫖為河外兵馬都元帥府馬歩軍都總管節度應援軍馬使但將兵應援擴具四事奏呈其一曰臣聞秦武王遣甘茂攻宜陽樗里子公孫衍疾其行茂患之引曽子母投機之事以諷武王曰寡人不聼也請與子盟於是盟於息壌以遣茂行攻宜陽三月不㧞樗里公孫果爭於前武王不聽益𤼵兵以佐茂遂㧞宜陽今臣疏逺小人捧皇弟信王之奏仗孤忠請兵於朝陛下斷以不疑付臣閫外之任臣當拊循戰士播宣王威以圖報稱願陛下存武王之心念甘茂之事鑒前代之成敗明當世之嫌疑俾臣得効愚忠畢意攻取惟陛下矜察其二曰王師大舉機會神速軍期文字不可少緩若依常制下都堂然後以逹天聽則事渉疑似或規避者定逡巡藏匿不以進呈伏望睿㫖令皇弟信王都元帥府専置一司凡軍期急速文字不限寅夜晝時通奏庶免誤事其三曰大將軍受命專征自唐以來用中貴人監軍奪權掣肘毎至敗事今二聖遠狩中原未靖皇弟信王慨然有請於朝陛下嘉其意大發王師以付之旦夕舉興必期迎鑾輿靖河朔然後已伏望聖斷罷差中貴監軍不惟今日易於成功庶幾後世取以為法其四曰王師大舉金鼓器仗全不任用切觀馬隆募勇士三千武庫給以朽杖隆以為匪任臣滅敵意遂給其三千軍資聽其自入武庫選利器隆於是通凉州解天子西顧之憂今興師北道迎二聖定兩河責望成功伏望特降睿㫖所給器仗盡選犀利者以給大軍之用又為文以誓衆曰金人渝盟連年侵掠刼遷二聖邀致皇族殺我人民擄我子弟掠我財帛焚我廬舍怙勢恃強天人共怒皇帝孝悌之至通於神明追念父母痛如骨髓兹者錫信王元帥之命舉六軍問罪之師委某出征渡河助勝爾等將士素懐忠義當報國恩恊力同心掃蕩邊氛迎還二聖平定兩河奮主辱臣死之忠副簟食壺漿之望爾有功必加厚禄有罪必加顯誅信賞明罰皎如白日今大軍一舉秋毫不得輙有所犯迨其度越燕山深入敵境金帛財寶各有所得盡以付爾安危苦樂與爾同受此言不易各務遵承時汪伯彦黄潜善為相既疑且忌遂選數項烏合之兵付馬以行又有洺州棄城軍兵民兵到泗州者有㫖撥五百人隨擴往河北應援信王密受朝廷詔㫖反相防閑十羊九牧左忌右疑未至大河詔㫖絡繹令一人一騎不得渡河聽諸路帥臣節制擴知其掣肘謂不可以成事矣遂屯於大名以俟之金人遷天眷於通塞州金人遷天眷於通塞州去燕山府一千五百里給地十五頃令種蒔以自養淵聖自離都城北狩至沙漠未嘗有舊臣候問起居惟至代州遇鄧荗實効臣節迎謁茂實以工部侍郎副路允廸奉使尼堪拘於雲中後取允廸還京師而留茂實居代州茂實聞淵聖將至代乃作哀詞又篆送工部侍郎滕茂實募九字取奉使旗裹之以付友之董鋭翌日淵聖及郊茂實其冠幘迎謁拜伏號泣見者墮涙金人使譯諭之曰國破主遷所以留公盖將大用茂實抗辭不屈且請侍舊主俱行金人重之四月韓世忠還行在韓世忠軍於京師與丁進不和軍士相擊無虗日世忠慮有變遂還行在東京留守宗澤劄請亟還宫闕凡奏十餘劄言詞激切至是又奏劄其畧曰今之士大夫志氣毎下議論卑陋上者不過持禄保寵下者不過便文自營曽不能留心惻怛為陛下思承祖宗二百年大一統基業為可惜又不曽為陛下思父母兄弟與至親骨肉蒙塵沙漠徯望天兵救㧞之意又不曽為陛下思祖宗西京園陵寢廟為金人所占今年寒食節有被焚撅之憂又不曽為陛下思京師天下根本宗廟朝廷百官倉庫儼然如舊又不曽為陛下思河北河東京之東西陜右淮甸百億萬生靈之衆罹屠刼殘掠之害但朝廷浮言計較泛舟冐大風險南幸湖外此奸邪之謀耳臣思之是一欲為金人為方便之計二為奸邪皆先已津置南方嗟乎為臣不忠不義乃至此孔孟所謂茍患失之無所不至正在是也夙夜疚心泣血瀝誠竭忠盡力為陛下保䕶京城自去年秋冬今春又已三月矣農務是時陛下不早回九重則天下靡有定止又遣少允范世等遥詣行在奏札子臣聞孟子言術不可不慎也矢人惟恐不傷人函人惟恐傷人巫匠亦然臣因其語始知人心所存之邪正與所作之是非若以道槩之了然區分如辨白黒何則夫忠義之人動容周旋無非忠義而不忠義之心無自入焉故其於上下愛戴保䕶不啻如函人之惟恐傷人也彼不忠義之人動容周旋亦無非不忠不義而忠義之道無自入焉故其於上下毁裂捐棄不啻如矢人之惟恐不傷人也恭惟國家曩縁金人内逼殘破州縣圍閉京城刼掠邀求靡有紀極以致强迎二聖后妃親王與諸眷屬蒙塵北去凡忠義之士莫不痛心疾首泣血奮憤佐佑陛下張王六師震耀神武總領貔貅之士一戰而勝迎奉二聖來歸京師俾中原生靈還定安集罔或流散愛戴其上保䕶其下夙夜念念猶如函人焉惟恐其或傷之也其不忠不義者但知持禄保寵動為身謀謂我祖宗二百年大一統基業不足惜謂我京城宗廟朝廷府藏不足戀謂二聖后妃親王大小之屬不足救謂諸帝后山陵園寢不足䕶謂周室中興不足紹謂晉惠覆轍不足羞謂巡狩之名為可效謂偏地之伯為可述儲金帛以為敵資樁器械以為敵用禁帥守之招募慮敢進之敗敵也掊保甲以助軍慮流移之安業也欺罔天聽凌蔑下民凡誤國之事無不為之猶矢人焉惟恐其或不傷之也臣願陛下騐已試之路以道槩之則人心所存之邪正與所作之是非自然區分無足數矣臣衰老孱懦誤國陛下察臣斷斷孤忠憐臣悄悄見愠體天地之大徳覆䕶日月之大明照臨臣此身與臣血屬當膏砍斧虀粉萬狀矣尚安能為陛下保釐尹正使京城市井里巷安居樂業熙熙皥皥如我祖宗太平之時乎臣之至此豈止謗書之盈篋而已即臣伏望陛下六龍萬乗賜歸大内下慰四海生靈瀝血懇切之至此實悃誠痛切憤悶所以不避奸邪詆誣不避犯冐誅戮臣願陛下如臣此言榜之朝廷俾應在朝臣僚封章疏指謫臣言如臣之言渉狂妄乞正典刑名臣罪惡如臣言符忠義乞降詔勅明告囬鑾之期庶安天下之聽此事甚大恭俟睿慈洞察勿二勿疑至是降詔㫖言發輜重入京師朕將還闕恭謁宗廟百姓大喜澤在京師俟六龍之至而日復一日不聞鸞輅進𤼵又進劄其略者迺曰親降詔書即將還闕恭詣宗廟延見父老中外聞之莫不鼓舞相慶以為陛下英斷此何事不立何功不就何浮言之可惑何敵人之足慮太平基業正在兹舉下詔之後日復一日尚未聞千乗萬騎蠲日啓行民心不能無疑焉臣愚切意陛下乾綱不撓離明並照洞見安危之機必不肯失信於天下是必有奸臣誤陛下負失信之謗也臣伏見邇者河陽水漲斷絶河梁有姓馬人妻王氏者率衆討敵敵勢窮窘不知所為此天亡敵人之時也夫天與不取反受其咎臣欲因此時閭勍王彦各統大兵乗其孤危大振軍聲盡平敵壘伏願陛下亟還官闕以繫天下之心則孰不用命且投機之會間不容髪願陛下無惑於奸臣之言斷自淵衷臣自謂兹舉可保萬全無可疑者也或奸謀蔽欺天聽未即還闕伏願陛下從臣措畫母使謀臣沮抑以誤社稷大計陳師鞠旅與之决戰掃盡氛塵廓清之日臣䝉陛下眷注誓効死節區區愚忠不能自己伏望聖慈特賜睿斷天下幸甚三朝北盟㑹編卷一百十六
