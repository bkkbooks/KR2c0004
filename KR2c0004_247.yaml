body:
  text: 三朝北盟㑹編卷二百四十七宋徐夢莘撰炎興下帙起紹興三十一年十二月五日癸卯盡十六日丁巳車駕將進發先約束巡幸經由州縣癸卯巳降詔戒飭羣臣又降㫖曰巡幸視師用今月十日進發已降㫖揮應經由去處排辦程頓修治道路等事不得過有華飾非理科斂竊慮奉行不䖍重勞民力除合行隨運錢糧批支驛募外應貢獻果木飲食之類悉宜禁止可行下逐路監司約束如敢違戾仰御史臺彈劾重置典憲招撫司以賈和仲知揚州招撫司以拱衛大夫和州防禦使賈和仲知揚州和仲單騎入城皆未有官吏漸次主管機宜文字向子亷及兵職官公吏軍民有到州者和仲揭榜使人首錢窖一半給賞由是告者無虛日官司發掘不暇㑹金字牌委和仲以經總錢收買金人遺棄器甲和仲揭榜收買有以紫茸穿者有以皮條穿者鐵葉柔軟而堅兩面皆明兵將見之以為朝廷器甲不如也頃之朝廷買器甲淮東總領朱夏卿以書托揚州親戚通判葉模模者夢得之子模遂請于和仲以買器甲與夏卿和仲不可曰和仲承金字牌備奉聖㫖日買此器甲豈敢作人情與總領也模怨其不從譖于夏卿夏卿遂譖於葉義問義問以和仲不職放罷朝廷遂以向子固知揚州於是有修城之意破錢二十萬緡矣七日乙巳李顯忠知和州知建康府張燾說諭都統制李顯忠曰車駕將發巡幸到此金人尚據雞籠山得無慮乎顯忠以大軍濟江去和州三十里與敵相持金人知鄧州録事高通以鄧州來歸初金人以劉萼為都統攻京西敗于光化軍及茨湖也回軍至鄧州駐于城北七八里間僞鄧州節度使蕭中一亦挈家屬出城駐于萼軍之南一二里間僞同知節副亦皆以家屬去中一留州事委兼倉王直是夜北門有火即滅中一與十千户三十穆昆言曰今日之事如何鄧州屯駐之兵皆為都統劉相公帶去而城中之兵皆是土人萬一為南宋之兵內應如何衆皆知中一有順南之意謾唯唯而已坐中忽不見白千户者中一疑其走告于萼矣乃率其奴婢將家屬奔走中夜屢遭鄉村土豪驚散中一被殺家屬幸得免翌日金人皆北去録事高通聞萼之兵已退乃集官吏軍兵而謀曰今蕭節使及同知莭副皆已去城中生靈如何衆皆言唯録事指揮是時禁軍已擐甲皆有作亂意通又問至於再三皆不應通曰今南兵已近若此時不決則城中之人皆不可保衆請通決之通見衆人亦有順南意乃曰今諸軍無將欲請軍中最長者一人為將如何衆曰諾通即舉四人皆軍中職名最高者衆皆聽命通謂軍中已有所主者又四人皆舊部曲得其心遂以中一之命令王直權管州事衆復以通權節副通始敢言曰欲與一城生靈求一生路以決今日之計如何衆皆諾於是通乃言鄧州本是大宋所有金國已棄我官吏軍民矣欲與諸公同歸大宋如何衆皆從之議遂定命吏人作文字未畢忽報城下有十餘騎通令倒旗鎗而問之乃曰吳招討下問其主將則曰咱統領咱統領者鄧州弓手咱朝也聚衆在山中投軍州武巨為忠義人知金人已退故先至城下通令放旗鎗于地面報其軍俄有三百餘人至城下中軍兵復立旗鎗似欲與為相應作過者蓋已有約故也通見其勢逼即令開門以沮其計衆遂入門登城縱掠不傷人遣人尋中一知其已死得其家屬後歸江南朝廷命其子穎為武翼大夫鄂州總管九日丁未武巨收復河南府新除果州團練使知均州兼管內安撫使節制忠義軍武巨申昨遣鄉總兵轄杜隱前去㑹合盧氏縣鄉軍收復州縣今月十四日據本官申收復了嵩州及長水永寧福昌三縣撫定了當委是勝捷又報作遣杜隱等將帶人兵及盧氏縣高州等處忠義人前去收復河南府去後今據盧氏縣差人前來走報於十二月九日收復河南府了當十日戊申車駕自臨安府進發巡幸江上誅倪詢應簡於平江府車駕到平江㑹曹洋自李寶軍中取倪詢應簡回令洋就御舟引見上慰勞良厚因曰少頃令曹洋管押罪人在行宫門外聽㫖上入平江府治洋以兵衛夾道防護詢簡候于門下俄頃有㫖倪詢應簡並凌遲處斬又有活執到金人等盡斬之倪詢平江府常熟縣人應簡通州人十二日庚戌成閔收復旴𣅿軍泗州淮東等路制置招討使成閔黃旗走報統率軍馬於十二月十二日收復旴𣅿軍了當其泗州淮河岸下擺泊舟船數千隻金兵數萬人隔河與官軍相拒閔遂將奪下軍敵燒不盡橋腳小船二十餘隻併工修整及於龜山以來搶奪到敵船十餘隻并分遣統制官吳超楊欽部押人船于水路邀擊敵船又差統制官劉鋭陳敏王公迷張師顔於十二月十五日夜於泗州東城之東潛師渡淮有敵騎數千於城東擺列前來與官軍相拒閔又分遣遣統領官左士淵張青魏全部押官兵攻奪泗州南門入城占據閔再率官軍戮力掩殺敵兵敗走收復泗州了當奪到粟米三萬餘石被虜老小數萬口放令渡淮歸業委是獲捷吳拱收復汝州十五日丙辰車駕至常州無錫縣是日邊報奉淮東金人已遁去淮西尚餘三萬衆保和州陳康伯等依㫖撰到招安旗榜非惟諸國之人雖金人一概與補官內萬户許以節鉞其餘視爵秩高下更起等換授白身特令官奴婢優與賞賚示之生路庶使束手來歸上曰彼雖敵國亦人也比引見之所招到金人朕亦悉與貸命送諸軍下投使蓋首惡完顔亮一人耳若槩殺之則不勝其多朕不忍為也行宫宿衛使楊存中檄完顔亮一行將吏等書行宫宿衛使楊存中檄書檄告完顔亮等一行官兵將吏等蓋聞順德者昌逆德者亡故為臣者當知逆順之理師直為壯曲為老故用兵者宜明曲直之情以順而討逆則何功不成以直而攻曲則何敵而不勝惟完顔亮天性不仁怙恃凶强肆行暴虐弒君殺母蔑亂人倫棄約背盟迷逆天道挾彼邉陲之衆蹂我淮甸之邦罪惡貫盈神人共憤當職恭承帝命肅行天討念不順從當思後悔東區巨海西扼長淮南限大江之虞北有重兵之阻雖釡魚之暫息顧蟻穴以何逃況葛王既立於爾邦而大兵已興於中國路途敻隔軍馬何歸盍執暴君往投新主保其名節一洗汚俗之羞樂而妻孥無作異鄉之鬼或挺身而抱義亟率衆以來降庶幾全逆順曲直之宜不失享富貴安榮之利故兹檄示各宜究知成閔收復陳州成閔申十二月十五日據本司中軍統制官趙樽申先准指揮催督結約到陳州忠義人陳享祖乘勢收復陳州十一月十七日據陳享祖申於十一月五日將帶忠義人兵已收復陳州了當捉到同知完顔耶曽等九人陳享祖以陳州來歸陳享祖陳州大豪也聞趙樽已得蔡州即領民兵據其城縛其僞官屬送蔡州乞歸朝廷樽具奏聞朝廷嘉其忠特授武義郎兼閣門宣贊舍人十六日丁巳李顯忠收復和州行宫留守據建康府駐札御前諸軍都統制李顯忠黃旗走報并申契勘金兵三萬户占據和州於城外連珠札立硬寨當職親率諸軍十二月六日自慈湖濟渡先占北岸石跋觜依山下寨與金兵對壘雖敵時遣騎兵沿江窺伺口岸肆為殺掠當職措置分遣軍馬不時晝夜邀擊殺獲甚多致敵不得休息至十六日進兵酉時直抵和州敵寨敵兵畏懼至三更金人拔寨北遁奪得被敵虜鄉民老小三千餘人即時撫恤各令逐便歸業奪到騾馬收復和州了當賜楊泰真楚滁和濠廬光州旴𣅿高郵光化無為安豐信楊軍德音尚書省牒刑部門下朕撫運中興遭時多故崇七德而經武務先禁暴而戢兵收五利以和親靡憚卑辭而屈已將使流離之衆永離塗炭之烖由涼德不足以懷柔致逆亮輒渝于盟誓怙其戎馬之足驅厥不逞之羣既俶優於中原遂䖍劉於吾國苐欲兵連而禍結豈知衆叛以親離宜神聖之莫容致人心之爭奮竒兵鏖擊盡灰赤壁之舟元惡就屠迄授藁街之首餘黨奔潰四境澄清慨念疆場之民荐被兵戈之苦妻孥蕩析肝腦糜捐室廬成煨燼之餘田野喪耕鋤之具禍貽爾衆罪在朕躬幸已靖于邉塵喜再成于樂土欲撫瘡痍之俗爰推曠蕩之恩楊泰真滁和濠廬光州旴𣅿高郵光化無為安豐信陽軍管內限德音已前見監罪人除犯劫殺鬬殺並為已殺人者并十惡罪至死僞造符印放火官員犯入已贓將校軍人公人犯枉法監主自盜贓并依法內枉法自盜罪至死情理輕者奏取指揮鬬殺罪至死情理輕者減一等刺面配千里外州軍牢城斷訖録案聞奏其餘罪無輕重並行放免於戲歌鴻鴈之詩務遺黎之安業法雷雨之解與庶彚以昭蘇尚其小大之臣共體隆寬之德輔成極治永息多虞成閔以劉繹為修武郎閣門祗侯權知泗州先是劉錡在淮隂也員琦劉汜在旴𣅿錡令琦汜差人往臨淮縣體探是時招信縣橫山劉繹與土豪張揖共有民兵數百人敵適在旴𣅿琦汜遣繹揖往繹揖至新店㑹金人亦遣二三騎往泗州探事繹揖等退歸泗州出南門見旴𣅿隔岸無兵馬知琦汜等皆去岸下無船可渡遂駐衆于榷場中俄頃金人探馬數百騎入泗州揖請擊之繹懼不從揖曰金人若知我衆不多守其要便而撓於我雖一人不可生還遂率衆入南門金人見南門有兵突入不知多寡即爭門出循汴河路以奔時露重有微雨汴河路皆青石石滑馬不能行有墜馬者揖急追之繹以繼往金人往往下馬而去遂獲馬僅百匹而回泗州不可往漸循淮河而上見夏俊在南岸以奪馬事告之俊喜令尋小舟濟渡馬數匹而行餘馬繹與揖兩分之於是各裝載家屬取天長路欲渡江揖在前行未到天長遇金人盡失其馬繹聞之乃還橫山至是成閔到旴𣅿繹遂獻其馬言其殺伐之功閔大喜書填修武郎閣門祗候告身授繹仍令權知泗州三朝北盟㑹編卷二百四十七
