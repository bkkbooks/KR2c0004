body:
  text: 三朝北盟㑹編卷十五宋徐夢莘撰政宣上帙起宣和五年三月一日甲寅盡十四日丁酉三月一日甲寅朔金人尼楚赫等至館五日入見于崇政殿燕雲奉使録曰五日尼楚赫等上殿上遣黃珦傳㫖卿等離軍前日大金皇帝安樂否纍年計議事一切了絶信誓已定共享太平乃是永逺莫是尼楚赫奏言來時本國皇帝令奏知大宋皇帝計議底公事已了也不要别做則好上復令珦諭㫖朝廷大信既定豈有變更令依例詣宰臣王黼賜第計議出國書并誓書草讀示至西京地界事黼諭尼楚赫此非務廣土地本為邊州及天德雲內地分若不屯守防托夏人定來出沒要當以河為界尼楚赫辭以不知又讀至所示誓草云五字尼楚赫等乞不用又云已許了西京要緑􅈨二千栲栳又言士卒取西京勞甚乞一箇賞賜黼皆許之又言今後通好不知或為弟兄或為叔姪或為知友黼諭以敵國往來只可用知友之禮上以尼楚赫屢乞花宴詔特頒春宴上屢遣黃珦問勞詔尼楚赫就辭於集英殿尼楚赫等辭訖跪奏設賞金帛物數上遣黃珦諭以二十萬尼楚赫猶以為數少再三乞增加上不許遂行茆齊自叙曰三月五日朝見使人上殿奏事上問金人何故要添許多嵗物及起燕京人民良嗣對以敵兵甚殘暴唯利是從他不恤也僕奏本朝兵威不立故也武仲云賴陛下聖德阿固達心服不爾邊患豈易量耶上云敵兵强盛殘破民物亦自來之所少也豈能久耶然彼既入關先據燕朕恐為後患故不惜嵗增百萬緡以啖之且解目前之變今既同山後許還亦是見其歸意斯亦卿等之力良嗣曰計議山後馬擴力最多上云聞馬擴頗知書良嗣曰馬擴係武舉僕奏臣係嘉王榜塵添久被陛下教育上云若非知書安能專對是晚奉御筆馬擴特除武翼大夫忠州刺史兼閣門宣贊舍人詔吏部侍郎盧益假工部尚書及趙良嗣為奉使大金國信使持誓書著誓并議交燕山雲中月日茆齊自叙曰是時再遣使燕往議交割燕山雲中月日未行往見樞密鄭居中鄭問守山後之道僕曰朝廷欲如何為守鄭云見諸公議欲用彼土豪傑使世守之僕答山後自漢築雲中朔武等郡以弱丐奴孝文時任魏尚守之丐奴不敢犯邊今與山前山後為表裏乃邊防要害之地倘土民有力猶不可使之自守况金人蹂藉之後燒掠殆盡富豪散亡茍延殘喘契丹至則順契丹金人至則順金人王師至則順王師但營免殺戮而已豈能守耶鄭云如此當用多少軍馬則可僕曰唯多益善茍恐費大亦須三萬人屯雲中餘分屯要害之地擇賢能將帥委之朝廷損浮費之資移以應付三五年人心樂業則邊防就緒矣鄭又問雲中帥張孝純僕曰孝純久帥太原通曉山後血脉更以二統兵官輔之則可矣鄭皆然之朝廷國書云三月日大宋皇帝致書于大金皇帝闕下華緘荐至契好增勤爰馳預政之臣共著約神之誓惟兩朝弔民伐罪之舉振古所無而萬世講信修睦之誠自今伊始用堅盟載永洽鄰歡來書云燕城候各立盟誓然後交割今立誓草付國信使副到請依著誓至日當議復盟銀絹請似前來與契丹物色一般者交送並如來諭順履融和茂迎祉福今差中大夫試工部尚書盧益龍圖閣直學士大中大夫趙良嗣充國信使閣門宣贊舍人馬擴充國信副使有少禮物具諸别幅專奉書陳謝不宣謹白十八日辛未趙良嗣等至燕山金人遣碩哈郎君髙慶裔來問難摘指誓書字畫邀取逃去職官户口等事燕雲奉使録曰趙良嗣至涿州碩哈郎君及髙慶裔來傳金主言意指摘誓草云五字不當用及常年二字及除去後面叠道五句便令退換誓書更為所取人口未足未許過界良嗣等以其意附遞奏聞復于遞中付下御前降下改定誓書并誓草進至燕差李靖劉嗣卿充館伴至寨門執笏捧國書入至國主帳前面北立閣門官傳國書入引至帳內跪奏問大金皇帝聖躬及謝差使拜起復跪問南朝皇帝聖躬萬福奏訖拜起復位引出帳南面西立有閣門官贊喝云大宋國信使試工部尚書盧益等朝見又一閣門官引某等面北立先五拜搢笏舞蹈不離位奏聖躬萬福又兩拜閣門官引益少進躬身致詞復位又五拜舞蹈如前遣使問某官等逺來不易又五拜舞蹈如前遂引所賫禮物金器等自西而東於國王面前過却引出第二重門外面北立閣門官稱有制令先兩拜起再云賜卿等對衣金帶跪受訖拜起閣門官引復入依前面北立閣門官云謝恩又五拜舞蹈閣門官引趍帳西浮幕下少立一衣紫繫犀帶者認是漢兒宰相左企弓國主前拜跪進酒倣學士壽儀國主飲訖令在位者皆拜遂各就座閣門官又引起稱傳宣勸酒令搢笏飲至盡又兩拜就坐自此每盞並係漢兒宰相及左右親近郎君跪進又將國主自食者飲食分賜至第四盞宣勸如前五盞訖樂官以下共賜絹四百二十匹再引帳前面北立閣門官云謝宴又五拜舞蹈引出上馬同館伴還安下處三節人從各七事衣銀十兩訖傳問誓書中常年每年重叠及催取户口對以誓書並係昨來將去誓草改定即無增減所有合要户口宣撫司見行根捉才獲時即發遣過來楊璞髙慶裔來傳尼堪指揮斥字畫惹筆提拔不謹對以自來國書止有司分人修寫拘於體例自無惹筆今係主上親御翰墨是尊崇大國之意慶裔云誓書有不提空并惹筆須著換對以此誓書元在闕下為使人陳乞已換了兩次到涿州又換一次敵國往來豈有此理慶裔云誓書要傳萬世親寫故知是厚意兩國相重書狀往還寫得真楷是厚意唯復寫得惹筆是厚意又云誓書字札且休如誓書中所載兩界逃人彼此無令停止今來所取户口只推道不見不肯發來豈不是違誓許大天猶自不怕更要誓書則甚且如近有燕京職官趙溫信李處能王碩儒韓昉越境來南張軫帶了本朝銀牌走過南界須先以見還是數人皆契丹所指名故金人必索之良嗣欲諭宣撫司遣行盧益馬擴不可曰諸人聞已達京師若悉還之不唯失燕人之心且彼必見御盡告吾國虛實所繫非細况今已四月料亦難留何慮不交奈何隨所索即與之彼得一進十何時已耶然終以人口未足移文往來事辨論久之未决盧益力爭不可烏舍云兩朝誓書中不納叛亡今貴朝已違誓矣益答曰且勿言諸人未嘗有至南朝者借使有之在立誓後耶立誓前耶五六年計議大事已定本朝所有並已依從應付如些小人口豈有吝惜只是有變更姓名或在逺地或聞得根取因而逃竄或藏匿山谷或走過山西如此之類如何决要取足烏舍云且如逺者盡是契丹奴婢且道不知姓名道尋不見如知名人郭藥師董龎兒兩箇莫道不見只將此二人來折當馬擴答以郭藥師董龎兒係是契丹時投降過來却干貴朝甚事若如此說即數十年前事豈可套在誓書中有甚涯際及交燕月日烏舍云只為所取户口未足即無交割月日良嗣對以本朝自來每事相就無不曲盡至誠然貴朝每一番來一事未了又生一事此當以大事為念不可以細故相妨兩朝所係利害甚重况兩日只是理㑹誓書一事若今且把復盟了當些小人口足可商量且如向日自海外計議雖未立誓天地神明實已臨察宜各存信義本朝並無事未盡兩朝敵國義均一體更宜思之烏舍與楊璞等起立云有諭㫖若户口不盡發來便請勾回涿易人馬朕欲將軍馬前去巡邊恐兩軍相見不測生事便令使副朝辭往宣撫司取人良嗣云未議之事有五一回答誓書二交燕日分三符家口立界四山西進軍日時五西京西北軍未定兼賞軍銀絹二十萬在涿州未交安得便辭所有寧邊州至天德雲內一帶是舊漢地兼有黃河限隔不知貴朝欲待自守唯復待與夏國若自守時與貴朝為鄰甚無害若是夏國時恐西人出沒常為邊患兼符家口係屬南界有新倉永濟兩鹽場在內朝廷嵗增百萬貫正為此鹽場在其中莫須改正烏舍云我以山西全境與汝豈不能易此尺寸之地耶良嗣不能答楊璞來云適來三相公謂尼堪再奏已差察勒瑪楊天壽同龍圖去不須尚書宣贊行良嗣遂行四月二日乙酉金國遣察勒瑪楊天壽同趙良嗣赴宣撫司取未足人口宣撫司以趙溫訊與之良嗣同察勒瑪等往雄州取户口途次察勒瑪等曰兩國議如許大事已十八九成止為人口毫末良嗣云若張軫趙溫訊韓昉等果到本朝良嗣必知之今實不聞奈何楊璞暗以微意見喻若只得一兩箇緊要人來便了得良嗣既到宣撫司亦以璞言之故自以謂若得一二緊要人如溫訊之徒可以必了然宣撫司頗難之蓋恐已送溫訊愈更滋蔓終未得結絶臣思度金國如得溫訊乃可以畢事再三言宣撫司乞差人去取趙溫訊初五日趙溫訊來長跪求見良嗣諭溫訊云本朝固不欲諫議過去謂溫訊然金國必欲因此尋兵大丈夫死生皆有道生亦為民死亦為民借諫議一身以解兩國之兵為利亦不淺相顧感泣遂以溫訊付之茆齊自叙曰貝勒先歸僕與益等留涿州十日候宣撫司發到賞軍銀絹三十萬匹兩方發至燕京烏舍楊璞云計議事已定但日近有燕京界職官趙溫訊李處能王碩儒韓昉等逃去南界請先遣回然後可議交割月日差察勒瑪同趙良嗣往雄州宣撫司取人經七日縛趙溫訊回尼堪釋縛赦罪復以溫言撫之七日庚寅金人既得趙溫訊遂交賞軍銀絹并定交割燕山日再遣使持書來借糧米十萬石并誓書來烏舍遣人將到稱一連云舊例交割銀五十兩五分者皆不曽受分謂錢直到五十一兩方受今來此稱係五十一兩貴朝稱却只五十兩莫如别作一連五十兩五分稱將五分作錢耗五分作潤官如何某等對以凡度量權衡皆係朝廷所定頒之四方豈敢私造况此銀絹係朝廷奬賞貴朝軍兵非嵗賜之物莫且依平交割朝辭國主云卿等歸去傳語皇帝時熱善保聖體如今軍兵兩處屯劄討伐古爾班併天祚與你家勾當疆土欲借米糧十萬石搬送至檀州歸化兩處且不要疑慮早些教來已專差使人對以今夏道路難行國主云此一遭方始是往來禮足兼誓書事大要結千萬年交好禮數專遣使去因問交割燕京日分却云十一日先令交割底官員過來其軍兵只於瀘溝河南下寨更待等幾日得我指揮便發過河來又諭某等好去候到闕日傳語大宋皇帝立誓已定各守信約永保萬世常如今日甚好遂行十一日甲午盧益趙良嗣引伴金國使人楊璞持誓書來金人國書云纍交禮聘永講世和復紆使傳之華克示載書之信指以萬世昭然一言兹見講好息民之心而得親仁善鄰之美義欲存於堅久事更宜於宣陳據燕疆界至只依兩朝差去人員同行檢視分割為定所云交西京邊界夾攻契丹事皇帝已遣近上官員押領大軍勒於今月十一日於彼應㑹仍報宣撫司凡關夾攻事件須令與差去官員計議從長施行其邊界亦依割定領受仍已諭使人却合有回謝禮數并報復文字送付差去軍下官員前次議取被掠并逃去人户雖領宣撫司交付却只推言不肯早行發遣致是一未結絶必若邊官邀功違約展轉如上不切禀從實關引惹紊亂有失將來久結歡好若是再取如此人口亦仰所司宜疾速發遣又以契丹國皇帝在隂山古爾班在奚部山谷已兩處闕當今取嶺北鴛鴦濼坐夏相度所謀雖同如或不泯後患地理咫尺特關貴朝自餘分遣别路兵馬須是當朝供給只據收捕古爾班契丹皇帝兩路兵馬糧食合銷米一拾萬石宜早分取月日於檀州歸化州兩縣處分路般送到即候回報歊炎在候保嗇是期有少禮物具别幅專奉書陳達不宣謹白金人誓書維天輔七年嵗次癸卯四月甲申朔八日辛卯大金皇帝致書于大宋皇帝闕下惟信與義取天下之大器也以通神明之心以除天地之害昨以契丹國主失道民墜塗炭肆用興師事在誅弔貴國遣使航海計議將來并有遼國願還幽燕故地當時曽有依允乃者親領兵至全燕一方不攻自下尚念姑欲修好以燕京涿易檀順景薊并屬縣及所管户民與之如約今承來書緣為遼國尚為大金所有以自來與契丹銀二十萬兩絹三十萬匹并燕所出稅利五六分中只算一分計錢一百萬貫文合直物色常平搬送南京界首交割色數已載前後往復議定國書每年并支緑􅈨二千栲栳兩界側近人户不交侵盜賊逃人彼此無令停止亦不得密切間牒誘擾邊人若盜賊并贓捉敗各依本朝法令科罪訖贓罰賊雖不獲踪跡到處便勒留償若有暴盜或因别故合舉兵衆須得關報沿邊官司兩國疆界各令防守兩朝界地內如舊不得遮堵道路至如將來殊方異域人使往復無得禁阻所貴久通欣好庶保萬世茍違此約天地鑒察神明速殃子孫不紹社稷傾危如變渝在彼一准誓約不以所與為定專具披述不宣謹白茆齊自叙曰十一日辭朝阿固達坐所得契丹巴納行帳前列契丹舊教坊樂工作花宴宰執左企弓以次搢笏捧觴為壽是時阿固達形神已病矣顧益等云南朝許大事你幾箇使人商量了功績不小來日好去復差楊璞為聘使報許四月十四日交割燕山及山後幸踏地里交割南歸十三日達雄州宣撫司摘留僕隨遂入燕十四日丁酉宣撫司差統制官姚平仲康隨前去交割地界姚平仲至金人要依元約將松亭榆關外民户歸國數內索取常勝軍郭藥師等八千餘户元係遼東人也宣撫司以常勝軍先自歸朝有功升官難以發遣㸃檢文字李宗振畫䇿或謂參謀宇文虛中畫䇿曰若與燕人代之則不唯常勝軍得為我軍又復燕民田産自可供養不煩國家應辦錢糧此一舉而兩得之申奏朝廷遂從其議請以燕人代之金人亦從之因而根括燕山府所管州縣百五十貫已上家業者得三萬餘户盡數起發合境不勝殘擾獨涿易二州之民安業者良以先歸大宋也是時燕人重於遷徙有憚其行者說與尼堪曰燕山疆土本非大宋彼不能取而我取之桑麻果實所在形勢之地豈可與人金國方强盛天下莫不畏服尼堪以為然遂白於阿固達請以與涿易為界阿固達曰我與大宋海上信誓已定不可失也待我死後由汝輩終如約交割宣撫司差李嗣本提兵馬入燕先是宣撫司差姚平仲康隨分疆域立𤇺燧回至是再差李嗣本入燕三朝北盟㑹編卷十五
