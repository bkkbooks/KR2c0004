body:
  text: 三朝北盟㑹編卷二十九宋徐夢莘撰靖康中帙起靖康元年八日甲戌盡十日丙子八日甲戌鄭望之與金人吳孝民來上御崇政殿引見差知樞宻院事李稅借工部侍郎鄭望之為計議副使再使於幹里雅布軍前鄭望之奉使録曰八日同二使人到崇政殿門外幕次上御延和殿望之先引見具奏孝民所說及折他之語孝民似不恱今引見孝民等若有所說乞未可遽答上行過崇政殿方引班孝民引陞殿跪奏王子郎君截得赦書之意今來議和皇子郎君要一大臣過去上即云李稅與鄭望之過去班退引孝民却到廊下幕次孝民便要催促出門望之云雖是李樞宻同過去縁未曽得使㫖且到都城驛同太師等早食罷與李樞宻再對了方可出門尋同稅再對上云若及割地即為許嵗幣三五百萬不妨望之奏云三五百萬不為不多然國家常賦外只茶䀋錢嵗収二千五百萬若無他費辦集有餘次論及犒軍金銀可許銀三五百萬乂命稅押賜金一萬兩及酒果與斡里雅布孝民屢催逼出城縁伺候賜金酒果所以逗遛多時比至孳生監已更餘見斡里雅布但訝國家違盟如受歸朝官及賜平州張覺伐金人之詔如此三五事都不及和議乃云夜晚俟來日相見稅云有皇帝賜到金一萬兩及酒果乃云令吳孝民割來上件斡里雅布語俱是譯出後問得是王汭是夜宿孶生監纔到幕次蕭三寶努耶律忠張愿恭三人又過來說及張覺等亊縁金國舉兵入界聞上皇禪位聖主登極皇子郎君意便囘只訝南朝不遣使來求和望之云朝廷已遣給事中李鄴去不知甚處逢大金人馬更不曾得消息鄴係上皇未襌位前遣去三寶努云李給事却是上皇遣來皇子郎君道不知他今上㫖意如何望之云主上即位十餘日上皇南幸朝廷倉卒未及遣使而人馬已及城下自後若能以禮義與中國通好豈不為美若一向恃强務欲并吞但恐天理不能如此三寶努云皇子郎君意亦如此但南朝多失信須一親王往大金為質古亦有此事望之云古人有之如燕太子丹質於秦是也然太師豈不知周鄭交質卒至交惡果為大計質亦何恤若將親王過去萬一感風露之疾以人情言之在貴朝亦不得不悔更要一親王去也無益於貴朝恐不須啇量三寳努微笑云北朝以人馬到處為界望之云朝廷自來秪倚道與金國講好以燕山為藩籬内郡及都城不為戰守備不意燕山失守主上嗣位未旬日間正是做手脚不及亦非事力單弱若皇子郎君能以中國為重結為鄰好足以光輝史册必欲以河為界此乃恃强有所邀求耳且南朝得北朝地守不得朝廷守燕山是也歸朝官往往先叛北朝得南朝地亦恐難守不若多増嵗幣此事還可啇量三寶努云北人得南朝地豈守不得古人有守得者望之云耶律徳光到汴京不及一月如何為之守得三寶努云有守得底望之云北邉種落得中原地無如拓䟦南侵改為元魏百有餘年當時所立君長猶中國之人也用中國之禮樂中國之法度中國之衣服故中國之人亦安之今大金豈可以拓䟦魏為比又微笑云舊日三闗也屬北朝望之云國家財賦各有轉運使總領獨河北糴便司盖河北縁邉州郡多是唐濼地無出故朝廷支䧏錢本糴便司和糴斛斗以給諸邉太師若論三闗地政是唐濼所在不若問朝廷多增嵗幣又無水旱之虞豈不永逺太師更熟慮之三寶努云樞宻侍郎瞞心各自盡忠為國家說得好但許多人馬來不成則恁空去也大金人馬不似南朝徤兒逐月有請受望之云若是講和却存舊好金軍朝廷須用犒勞不知有多少軍三寶努云河東國相二十萬皇子郎君一頭項三十萬如今講和便遣人至河東軍去此事朝廷不要遲疑早早講和便益許多若住久是壊你家人民田種望之云昨日面得處分若說犒軍可許銀三五百萬兩此數亦不易出也三寶努云金人去家有六七千里動經一二年須是逐人得兩錠銀一錠金方得望之云太師開許大口又是以河為界好難啇量張愿恭云說道東京人家富庻家家便設一錠金今來須官中民間盡底將來贖取性命望之云此非是講和直是强取物耳請太師問歸朝官按月請受尚有拖延支不出時那裏得許多金銀若謂民間富庻縁京師四方客旅買賣多遂號富庻人家有錢本多是停塌解質舟船往來興販豈肯閒着錢買金在家頓放三寳努等意不悦乃云來日皇子郎君相見時樞宻侍郎莫要如此底死争恐壊他兩朝和好事也傳信録曰是日孝民陞殿跪奏所以舉兵入中國之由栺陳太上之失路上得赦書之意今來議和乞遣大臣一人過去軍前議所以和者上顧宰執未有對李綱前曰臣請行上不許曰卿方治兵不可李稅奉使鄭望之高世則副之李綱請所以不遣之㫖上曰卿性剛不可以往綱對曰今敵氣方銳吾大兵未集固不可以不和然必所以和者得䇿則中國之勢可安不然患禍未已宗社安危在此一舉臣懼李稅柔懦誤事也因為上反覆具道所以不可割地及過許金帛之說以金兵貪婪無厭又有燕人狡獪以為之謀必且張大聲勢過於邀求以窺中國朝廷不為之動彼當戢歛而退若少震懼所求一切與之彼知中國無人益肆覬覦憂未已也願陛下審之上以為然斡里雅布移寨過萬勝門移牒朝廷牒云昔我大聖皇帝以契丹之主納叛人阿古齊大王不行交還又多無道應天順民起兵弔伐自後不忍覆滅欲與通好終不聽從直至亡國方始投降尚猶釋罪特加王爵又燕京留守秦晉王耶律紀遼陽渤海髙永昌奚肅良等各賜本部土地仍以世爵例俱執迷竟取滅亡夏國王李乾順達靼摩古津並助亡遼犯我行陣未皷而破為能改過各復舊居分列契丹邉土以濟其地趙宋前帝航海遣使請復幽燕舊疆當此之時分日約誓同力収取爾來竟無接應形迹一旦天兵倐至不血一刃舉土向風盖自契丹二百餘年逺近無敢囘顧爰念從初結好姑務懽和即時割與恩義非輕著定誓書多納迯人子孫不紹社稷傾危曾未踰月棄德背恩手詔逆賊張覺害我四執政大臣邀我百官更易姓名公然任使嵗交金帛並不如期及正旦使賀允中御前奏達傳語二字指越舊例深淺輕易其於本國窮奢極侈上下相䝉閹寺擅權尅取民間財玩至有室如懸磬人不聊生種種弊源莫可罄言今我皇帝上符天心爰赫斯怒大舉天師數路並進禮當問罪面奉聖㫖如趙王能悔過再乞懽盟仰就便施行當司領大軍取幽燕一路自入貴境以為必遣使來賫御筆改責前非不至深入豈期直至邯鄲纔有人使李鄴等却只將到三省樞宻院所奉聖㫖文牒又言歸罪朝廷全無當理洎求的意方言前主自省愆尤不敢枝負大變已至傳禪兩項歸責全是不同難為准言縁來人使不能騎馬事致淹流兼恐途中别有錯失廼摘從軍先令貝勒呉孝民持白劄子専去聞奏路次及城門首遮堵早不放入今及城下猶未遣還今上少年因亂登極社稷禍福未能裁酌新任大臣又不賢明人子之罪莫大於此今可追悔往咎乞申舊好於義猶可今執政臣屬果為主上憂辱親詣軍前重求通好不但㧞出生靈抑宗廟血食所永頼茍或不然反令海内肝腦塗地鬼神乏主窃恐悔之已晚且貴朝兵將與亡遼士馬優劣可見亡遼與本朝士馬勝負明知其本國大軍未足稱數即當司一路除所經州軍并餘路軍兵約定於汴京㑹集節次前來雖不欲一一分白貴朝亦必詳悉又自來邉方守備兵衆不能捍禦寖及國門諒能免斯難否貴朝因太平日乆習尚奢侈人民懦脆夫以不知兵之衆而拒我能熟練之師欲求可濟自昔無聞今大金皇帝正統天下髙視諸邦其惟有宋不可無主然摧滅大權已入握内又為元奉㫖諭丁寧屢遣人使遂與安和惟求轉禍為福勿有疑惑請准前文字别遣大臣早圖萬世之利若大禍已成自取滅亡勿以為悔大軍逺來難以停滯却請執定疾速見示九日乙亥李稅等見斡里雅布議事賫和議犒師割地等事目囘來是日李稅同鄭望之至軍中斡里雅布嚴兵以待之見二太子二太子藉地南向坐稅與望之北面再拜膝行而前恐怖䘮膽其所言良乆遣王汭譯云京城破在傾刻所以歛兵不攻者徒以上故所以存趙氏宗社恩莫大也今議和并犒師之物須金五百萬兩銀五千萬兩絹綵各一千萬疋駝騾驢之屬以萬計尊其國主為伯父凢燕雲之人在漢者悉以歸之割太原中山河間三鎮之地又以親王宰相為質乃退師出事目一紙付稅等達朝廷稅唯唯不能措一辭而還金人笑之曰此乃一婦人女子耳自是有輕朝廷之意鄭望之奉使録曰是日早有韓宣徽過位相揖云皇子郎君遣人去打城也望之云既是講和何言打城韓笑曰且要揮兵早食後斡里雅布請相見云我遣軍去打城適已勾囘望之云既是講和打城是甚意思斡里雅布顧左右笑是日打囘城中門任珪早間攻打城北少時而退灌死之又云講和事此自遣使人去朝廷理㑹兼自有書望之求見其書又云不須盖是夜來三寳努等已說子細知使人難其事故更不說及三寶努耶律忠王汭於斡里雅布處受書又出一幅不封乃是所須金銀牛馬表叚等彼中以帛為表叚金五百萬兩銀五千萬兩牛馬萬疋表段百萬疋望之即語三寶努云必欲如此數目是無意講和國家幅員雖廣然出産不過五七處嵗貢有定額間有不登其數既有嵗貢即有嵗用如何有許多積蓄且如馬國家下川陜兩路以茶綵博買西南夷及西畨馬嵗不過一二千匹其間又有倒死病疲前郭藥師守燕山要馬朝廷下川陜馬司應副試問藥師其馬堪與不堪元抛數足與不足即見得城内有馬不多耕牛盡在城外民間城中所有多是宗室國戚人家養三兩頭牽駕座車子藥師在旁云侍郎不須如此說且送得七八分來望之云少保雖是力屈而降上皇恩徳亦何可忘皇子郎君以主上聖徳務要講和實宗廟社稷之福今若許了七八分不足又是失信豈不害事藥師向西退身斡里雅布又顧三寶努等畨語少頃催使人囘及出玉束帶玉箆刀子及馬一疋付三寶努獻上連催使人上馬即與三寶努耶律忠王汭前來秀水閒居録曰宣和間經營燕地金將郭藥師首來歸附既得燕山授以節鉞專付兵柄繼加檢校師傅官賜第都城寵異無比藥師喜飲酒上醖絶品曰小槽真珠紅者日賜一罇置驛傳送嘗至京師召赴禁中凢寢殿奥宻稱竒之物悉令縱觀眷待優異如此金人南侵藥師率大將張令徽劉舜仁叛歸之合從犯闕既議和解金師須索犒軍金帛數千萬雖竭極不能克足金使云藥師嘗至宣和殿見庫中金一塊數千兩者何謂不足朝廷答移牒書曰契勘太上皇與大聖皇帝浮海結約嵗月已深遂割燕雲恩義至逺質諸天神共著誓書使聘交馳懽盟無間止縁奸臣誤國容納叛亡嵗幣愆期物貨粗惡遂令誓盟殆成空文鄰國興師軄由於此重念大聖皇帝從初講好欲卜萬年事至於今雖悔何及太上皇深自刻責乃付神噐纉服之始不遑康寧夙夜以思冝申舊好果承使介逺達信誠結納之詞悉以面諭自今日始傳之無窮共芘生靈永同金石緬惟英鑒必諒兹懐事目具如别幅想加照悉事目云投拜軄官人口盡行發遣大金國人馬抽囘議定更不以黄河為界只將土地稅賦所出改添嵗幣七百萬貫今來河北河東人馬抽囘賞軍銀五百萬兩絹五百萬疋金五百萬兩十日丙子李稅等與金人所遣計議使高永張愿㳟蕭三寶努復命當日引見三寶努上殿進呈書斡里雅布復書書云承計議使李稅等賫御寶文字深悔前非再求盟好傳之無窮永同金石仰諗至誠實為大利雖有報役之心載惟元從大聖皇帝結好暨我今皇帝㫖諭丁寧徳義寛大拯救生靈塗炭冝舒舊憤以示新恩當開誠心與修和睦若可依從請王弟鄆王并少太宰科一員祗候交撥定疆界亦便放還合還賞軍物帛書五監金五百萬兩銀五千萬兩雜色表叚絹一百萬疋馬牛騾各一萬頭匹駝一千頭鄭望之奉使録曰十日引見三寶努就殿上進呈書上顧敏如何敏對曰事無可奈何待更啇量出到殿門宰執閣子内三寶努等入使人幕次方見所進書乃知所邀三鎮及要親王一員候軍囘日送到河要宰臣一員同往交割地界中興遺史曰李稅等歸併燕山府路提舉常平沈琯與稅等偕來稅等具奏斡里雅布要宰執親王為質并須索金帛犒軍李綱以金人之技盡於攻西水門與酸棗矣破之甚易以死戰使匹馬不還䇿之上也稅望之謂金人勢雄盛未易可當莫若許之不可緩也李邦彦勸不如許之上亦欲務令持重以保宗社生靈遂悉如所請詔括官司士庻金帛三朝北盟㑹編卷二十九
