body:
  text: 三朝北盟㑹編巻三十四宋徐夢莘撰靖康中帙起靖康元年二月五日辛丑盡其日五日辛丑太學生陳東伏闕上書乞罷李邦彦用李綱种師道書曰臣等聞任賢勿貳去邪勿疑者社稷之主也奮不顧身死生以之者社稷之臣也妬賢嫉善妨功害能者社稷之賊也恭惟皇帝陛下聪明英睿獨智旁燭賢邪之分宸衷黙判天下之重者李綱是也所謂社稷之臣也其庸謬不才忌嫉賢能動為身謀不恤國計者李邦彦白時中張邦昌趙野王孝廸蔡懋李稅之徒是也所謂社稷之賊也陛下斷然不疑㧞綱于卿監之中不一二日任為執政中外相慶知陛下之能任賢矣斥時中而不用知陛下之能去邪矣然綱任而未専時中斥而未去復相邦彦復相邦昌其餘又皆擢用何陛下任賢猶未能勿貳去邪猶未能勿疑乎今又聞復罷李綱職事臣等驚疑莫知所以此必為邦彦等擠䧟蓋綱起自庶官獨任大事邦彦等疾如仇讎恐其成功臣等聞綱比日用兵偶然小有不利邦彦等遂乗間投隙歸罪于綱然一勝一負兵家之常小勝固未足為喜而小挫亦未足為辱况示怯示弱竒謀秘計豈可遽以此傾動任事之臣臣竊聞邦彦時中等盡勸陛下他幸兹豈誠為陛下之計蓋時中邦彦初見事有驚各以差除親黨旋領外任遣家屬隨之逺去豈有身為大臣不能一家死社稷之難其意正欲于倉卒之際各有逃遁以保妻孥自諸大臣一鼓而倡之百官有司羣起而和之遂令京城之人閧然騷動弗安其居至聞羣臣勸陛下他幸則中外恟恟不敢自保當時若非綱為陛下建言則乗輿播越在外宗廟社稷已為丘墟生靈已遭魚肉陛下将有棄宗廟社稷之名何從復有天下頼陛下聰明不惑羣議斷自聖志特從綱請中外聞之雖愚夫愚婦等無不舉手加額仰嘆聖徳之盛綱之力豈曰小補之哉是宜邦彦等譛謗忌嫉無所不至臣等伏見邦彦等事太上皇帝享髙爵厚禄為日最久坐視天下之弊未嘗肯發一言以圖補報至如王黼童貫蔡攸共興北師天下皆知其不可上皇决之雖唯鄭居中力争以為不可輕舉而安中者之力賛王黼以遂其役邦彦等軰非不與聞此議而畧不可否于其間其寔亦皆隂助王黼以貽今日之禍使上皇痛自罪抑避位而去陛下新即寳位遽有變亂之虞慄慄危懼不遑宵旰邦彦等並當引已歸咎自求貶放以謝君父而廼當此危急之際尚敢偃蹇自若持禄固位坐妨賢路又復忌嫉賢能害國家之大計蓋邦彦首倡講和之議又許割地挫辱國勢今欲必逺前非以逋罪咎幸綱小失因縁沮敗陛下若聴其言斥綱不用則宗社存亡特未可知若謂金人真欲請和則既和之後尚敢攻我京城縱兵四掠屠我畿内敵人之謀急則請和緩則欲戰乍喜乍怒變詐百出竊知今日困弊不可支梧聞陛下促任李綱自知志不得逞請和之意必更激切而邦彦乃得藉口以沮成謀遂致李綱罷廢罷命一傳士大夫失色兵民騷動至于流涕相弔咸謂不日為敵擒矣則是罷廢李綱非特堕邦彦等計中又堕敵計中也聞邦彦又欲増與騾馬等物無乃假冦兵而資盗粮乎又聞邦彦等尚執前議必欲割地與之曽不知祖宗土地得之甚難又况河北寔朝廷之根本而三闗四鎮是河北之根本若棄三闗四鎮是棄河北則朝廷能復都大梁乎能都洛陽乎且如太原一郡凢經藝祖太宗兩朝親征僅乃得之祖宗所以必取者蓋以其控扼二隣下瞰長安纔數百里今棄太原則長安京城千里已在其睥睨中朝廷又安能往都乎此祖宗所以特重兩河之地自真宗仁宗朝以來北敵蓋有割地之請矣朝廷寧屈已増幣以塞其欲至于土地一寸不肯與之聖聖相守咸念祖宗艱難之功惜國家要害之地不忍棄也今陛下即政之初邦彦等便欲棄祖宗之境土不知待陛下作何等主也不知割與太原中山河間以北十有餘郡之後邦彦等能使金人不復敗盟否切恐口血未乾已引兵南嚮矣自大梁至長安既不可都必將遷而之金陵則自江以北非朝廷有况金陵正慮童貫蔡攸朱勔等往生變亂欲遷而都焉又不可得陛下將于何地而奠宗社邪又况保州乃祖宗陵寢所在一旦䧟于强敵必遭暴露國祚長短所繫非輕邦彦等忍棄之邪其意不過欲紓目前之急不為國家長久之計又不過欲沮李綱成謀以快私憤亦恐李綱功成之後自知前議之失罪有所歸故併力沮之期于必勝想邦彦等日在陛下左右每一言及李綱用兵之事必欲作驚怖之状争為危急之言以恐陛下聴其計以害李綱自綱遭遇不次㧞擢邦彦等自知必不能安身朝廷之上乃薦引私黨以塞陛下進用李綱之路而王孝廸者又是邦彦姻家必為羣姦力排李綱以助邦彦而在臺諌者亦多邦彦等黨與前日邦彦等請召國子監長貳相見乃聞祭酒謝克家除諫臣司業孫覿除御史臣等在學備見此事衆心不平豈有天子欲用耳目之官而宰相大臣前期召見以收私恩其意安在臺諌之中鮮為陛下發一言以明李綱之無辜者若綱可謂孤立無助臣等竊謂今日朝廷之上非特綱為孤立而邦彦等自為身謀不肯以腹心事陛下恐陛下亦成孤立矣可勝寒心天下共知李綱可以大用臣等請為陛下言其一二頃嵗京師大水自宰執大臣下及百官争占舟船或結木栰為避水計是時邦彦皆在朝廷曽不聞一人為君父計者亦不聞一人言及災異者獨綱慷慨為上言之至為姦臣譛逐數年不用前者邉報初至宰相骨肉盡皆出京獨剛妻孥未嘗遷徙陛下當此方深北顧之憂而左右無一人為陛下請行者獨綱奮然以身任之綱之用心可以見矣陛下何忍信朋邪之計而斥正人端士乎若以綱用兵小挫遂當廢罷則童貫創開邉隙以貽今日之禍近又引兵數十萬以事雲中之役幾于匹馬隻輪無還者朝廷曾不議貫之罪何李綱小挫而加罪乎若以敵請和遂欲罪綱以謝敵無乃中其反間之術乎若曰邦彦等譛謗之故遽廢斥之無乃遭愚弄乎一進一退在綱為甚輕在朝廷為甚重葢今日宗社安危在此一舉幸陛下即反前命復綱舊職以安中外之心無終為異議所沮昔魏文矦令樂羊將而攻中山當時異議沮之至有謗書一篋及羊功成而返文矦出其書示之羊乃再拜稽首曰此非臣之功主君任賢之力也唐憲宗討蔡數不利羣臣爭請罷兵憲宗曰一勝一負兵家常事若師常勝則古何憚用兵邪但論帥臣勇怯兵力疆弱處置如何耳渠一敗便沮成計乎於是左右不能容其間而裴度請身督戰卒破蔡賊史臣有言非度破賊之難任度之為難也故韓愈頌憲宗之功曰凡此蔡功惟斷乃成憲宗號中興之主正在于此惜其弗自克終也臣等竊願陛下逺鍳前代已然之事坐照今日異議之臣奮發英斷復用李綱以成大功宗社幸甚臣等為陛下今日計莫若斥邦彦等援綱而相之想吳敏耿南仲必與綱共事更願速降詔㫖召徐處仁唐恪等置諸左右而閫外之事盡付种師道使專之内外將相之臣必肯悉心恊助陛下大有為于天下矣臣等學校書生素與綱無半面之雅與邦彦亦昧平生所以必勸陛下進綱而退邦彦等豈有他故哉蓋生靈之命與宗社存亡在陛下用綱與不用去邦彦與不去之間天下公論如此臣等豈敢嘿嘿陛下若以臣等之言為未足取信試御樓呼召耆老一問之呼軍兵一問之呼行道商旅一問之試咨百官君子使言之必皆曰綱可用而邦彦等可斥也陛下用舍之際不可不謹臣等以布衣之賤論及宰相大臣罪當萬死干冐天威不勝俯伏待罪之至李綱种師道既罷李邦彦堅主割地之議遣使議和陳東發憤伏闕上書太學生具欄鞹㑹于宣徳門下者數百人同日軍民數萬㑹于宣徳門同太學生伏闕乞用李綱是日㑹敵復攻城軍民數十萬不期而㑹于宣徳門下擊登聞鼓遇内侍朱拱之撕擘死骨血無餘又邦彦適過軍民罵曰李邦彦汝是浪子豈能做宰相拾瓦礫擊之邦彦躍馬奔入朝堂乃免由是内侍官撕臂殺之張道濟而下死者二百餘人淵聖登宣徳門傳㫖撫諭開封尹王時雍以兵士數十人簇定東又命劊子數人不離左右主管殿前司王宗濋亦殿前兵來往巡視東挺身于斧鑕之間時雍宣言曰太學生以布衣敢刼天子當行誅戮而淵聖命中使宣諭故東得免死百姓皆言金人攻城急乞召李綱捍賊兵淵聖從之乃召綱復用為尚書右丞盡兼舊職仍兼提舉城壁守禦便促登西壁百姓見綱皆呼曰右丞且與百姓為主綱亦言曰綱已在此即登城矣百姓不足憂促歸照管老小是日斬首亂者十餘人移時方定邦彦等譛東以布衣脅天子不可赦淵聖不從邦彦惶恐乃乞致仕傳信録曰初太學生陳東與諸生千餘人是日詣闕上書明余及師道之無罪不當罷軍民聞之不期而集者數千萬人填塞馳道街巷呼聲震地􅐝登聞鼓于東華門擊碎之上遣吳敏耿南仲慰諭諸生俾之退反為軍民所壅不得行必欲見余及師道乃去不得報則殺傷内侍二十餘人皆臠割之雖毛骨無存者又訴罵宰執李邦彦蔡懋王孝廸趙野等毆擊之皆走散藏匿于是上遣中使召余及師道入内對余聞命惶惧固辭不敢行而宣詔者絡繹而至中使迫促不得已上馬出浴室院由宋門街抵馳道趍東華門軍民山積幾不可進召中使朱拱之復為衆所殺蓋怒其傳㫖之緩也見上于福寧殿閣子中余泣拜請死上亦泣有㫖復尚書右丞充京師四壁守禦使余固辭上不乆俾出東華門至右掖門一帶安撫軍民余禀上㫖宣諭乃稍散去再對于福寧殿上命復節制勤王之師先放遣民兵蓋不復有用兵意朱邦基靖康録曰初五日㑹太學生陳東千餘人伏闕上書訴邦彦孝廸野稅懋等懷姦明綱無罪而罷社稷其危乎請復之國中軍民聞以為義不約而㑹者㡬數十萬人且乞復种師道盖師道之罷諭士猶未知也書奏上遣腹心臣門下侍郎吳敏諭以德意樞宻耿南仲且訪求民情焉又遣内宣傳云才候金人退師復綱舊職諸生謝恩師退而軍民固留不可圍之百匝以至老父泣涕懇切言曰爭鸞輿不出固守乗城以活我國人者李右丞也進逼敵營衛我國人使金人不敢剽掠者种樞宻也危社稷棄國人罷我右丞樞宻以資冦者李邦彦李稅蔡懋也諌官御史無一言及之頼諸公義不愛其軀危言扶傾持顛衛我國人期于得請而後已與其死于敵人之手何若觸逆鱗而死于君父之手乎人之有欲天必從之幸諸公遲少頃俟宣李右丞种師道即去未晩伏闕自卯至午山呼震響聞數十里以致取登聞鼔而擊之破以助號愬之聲使九重聞之乆而不報軍民痛憤宰執誤國致冦指罵以為國賊衆口一音毆殺内侍御樂承宣二十餘人皆以為蔽塞君上聰明懷姦召亂願以死為國家除蕭墻禍根人人踴躍開封尹王時雍雖以軍法彈壓不能禁也上繼天聰明乃宣綱師道入還舊職軍民咸以手加額為得請而去綱即登城復嚴守禦而金人薄城者奄忽遁無一人所謂獨脚皂旗與夫紅燈籠者初得之未恠也是夜望金人軍俄有舉紅燈二炬者乃知召内應者以此物為驗皂旗亦金人之所建軍民覺而揣其奸詐殘害之至有自投城而斃知其必不免者皆中人也明日方平等悉罷坐視者送之獄羣姦遂戢内侍祖宗時位不供奉進子寄禄皆有常格自蔡京怙寵固位交迎近倖而尊寵之内外政事無小大未有不闗内侍省或建節旄或領師傅又有領三舘者有封侯王者天子呼而不名侍而不立宰相往往其門生執政大臣順意者榮華逆㫖者枯槁上新即政英明素憤将欲鋤去未有以發適于是時軍民殘而食其肉者偶中魁傑遂破其黨與茲寔天啓佑我宋假手軍民不勞而誅之也乃下詔曰童貫等妄興邉事懷奸蠧國並往東南在京如梁師成譚稹李邦彦已下逺竄所存者百餘皆小官踈逺之人並非從來被童貫任使享禄者令寄禄進子恩數一遵祖宗舊制中外悅服宣和録曰初种師道為宣撫使李綱為親征行營使姚平仲謀刼寨數日行路皆知之敵先為偹一日出師以為功在頃刻矣行營司屬官方㑹封丘門草露布忽報失利上震驚于是罷綱權并解其職俾待命浴室院師道亦罷宣撫使以右丞蔡懋代之復議講和命守城卒放弓弛砲無得輒傷敵初五日大學生陳東率數百人伏宣徳門下上書集軍民數萬人相謂曰非見李右丞种宣撫復用無得歸㑹百官退朝自東華門出至闗前衆指宰相李邦彦數其罪嫚罵欲毆之邦彦疾驅而免領開封府事聶山舉鞭揖東等曰諸公為此可謂忠義矣邏者以聞上命閣門索所上書頃之中人傳㫖令諸生上書朕已親覧備悉忠義當放行其中有欲散者衆閧然曰安知非偽耶須見李右丞种宣撫復用而退于是知樞宻院吳敏傳宣曰李綱用兵失利不得已罷之俟金師稍退即令復職猶不退時日旰矣百姓乃輿登聞院鼓置東華門外撾而壞之山呼震地樞宻耿南仲至諸生曰先生前日為天子傳宣言無不行軍民之意堅欲復用李右丞种宣撫幸先生言之南仲曰當便求對以諸生之意奏上衆慮南仲詐擁其馬不得歸南仲亦徑入朝繼而開封府尹王時雍來謂諸生曰脅天子可乎胡不退諸生應之曰以忠義脅天子不愈于姦倿脅之乎復欲前毆之時雍逸去殿帥王宗濋謂上曰事已爾無可柰何當黾勉從之不然且生變遂遣南仲號于衆曰已得㫖宣李綱矣百姓數千人詣浴室院迎之帝益恐于是相繼而宣者絡繹不絶内侍朱拱之先得㫖宣綱未到而後發之使先至衆取拱之臠而磔之即矯制曰殺内臣無罪又取十餘軰殺之皆裂其屍碎其肺腸揭之竿首號于衆曰此逆賊也綱既對即詣行營司而師道亦歸其宇士庶知其復用也遂散是晩天子下詔曰士庶伏闕上書願見李綱种師道朕已親覧深諒爾等忠義令綱師道傳宣撫諭若更乗時恃衆亂行毆打令綱師道以軍法從事是夜復聚衆殺内侍而殺其家者數十人靖康前録曰初五日太學生陳東率諸生上書伏闕訴李邦彦王孝廸懷姦明綱等無罪而罷社稷甚危乞請復之以慰人望既至闕下軍民不約而㑹數十萬書至日旰未逹學生不過三百人軍民擁之雖欲去而有不可衛士為之說者此去禁中逺不如往東華門撾鼓于是衆詣登聞鼓院推鼓滚之于前數萬人挾東等撾鼓于東華門外至擊破之以助號呼聲徹九重上急遣中使宣种師道李綱入復還舊職初患不逹既已追入久之不聞宣命快行行謂民衆曰朱御藥受宣劄下不肯去移刻一中使出或者曰此是朱御藥時衆方憤疾即拽下馬絲裂其屍其餘同時被毆者張太尉等三十七人百姓争臠之須臾而盡諌官唐重師驥臺官鄭滋等相繼而去兵民以种師道李綱未入挽其袖使入諌是日交直种師道李綱被㫖而來復令處置守營司等事士民歡呼以手加額及二公入内被詔諭出再四慰勞軍民長揖而退三朝北盟㑹編巻三十四
