body:
  text: 三朝北盟會編卷二百四十二宋徐夢莘撰炎興下帙起紹興三十一年十一月二十八日丙申盡其日國史院編修官員興宗采石戰勝録曰完顔亮及其國兵前來南牧其身先出汝州京西道示欲出襄漢上流缺朝廷果從三司發精兵五萬人合荆鄂之兵凡三十二萬缺先是虞侯作天官屬上殿先論敵欲南牧之計必五道為出蜀口欲出荆襄止以兵相持淮東之計沮汝非用騎之地他日正兵必出淮西竒兵出海道庚辰耳木子是是年冬奉使又明年一月回其年敵必南牧蓋已授甲造船必為南渡之計申言前論疏之語上曰記得卿此言極是是年五月十九日金使上殿有奏言欲得兩淮之地欲得將相大臣朝廷駭愕議所以發兵是時金主以兵駐汝陽汝州以避暑為名詐示渡漢江從上流以窺吳會朝廷發成閔領近衛五萬人來戍襄漢上出金使悖語令宰相就都堂命侍從台諫論所以備敵之䇿時宰相宣上語云今日更不問和與守直問戰當如何廟論欲遣成閔往遣禁衛兵禦襄漢上流虞侯云不須得發兵如此之多敵必從上流下恐發禁衛想兵益少朝廷內虛異時無兵可為兩淮之用兵行未幾旬日得報金主回汴虞侯曰金主已去留五千人殿後兵五萬衆約止江池之間欲留此為用若上流兵勝日江鄂間應援淮西是時無人為之助其説卒不用至九月間敵以五萬衆兵出淮東劉錡拒之於楚州青江口金主自提重兵號五十萬精甲自壽春夀州渡淮王權拒之二將不敢戰望風奔遁敵才與南兵相接王權退自安豐屬廬州至合淝又退至拓臯而中軍已退至濡須和州入江口虞侯見事急知二將必退回遂率四五侍從又同白宰相説王權退師已臨江口必敗國是諸公云非敢退所以導敵深入當其衝令邵宏淵出其右李顯忠出其左夾攻之虞侯率四五侍從辨其不然此權必為走計時朱楊猶不以為然倬椿明日得報權果渡江朝廷震駭十七日白宰相十八日王權申十九日上命葉樞密義問督視江淮軍馬同命虞侯參謀軍事二十一日陛辭上慰勞甚渥云卿本詞臣不當遣以卿諳軍事故也二十二日出臨安是日得報劉錡兵走至瓜洲盡棄淮東之地敵追馳至皂莢林瓜洲之前錡之副將員琦小捷乃託病過江十一月初四日錡兵大敗於瓜洲劉汜之役江淮之間民皆奔走是時金主以重兵臨采石已數日知建康張燾屢遣官來催督府措置虞侯與葉樞密六日到建康是夜被旨罷王權以李顯忠代之督府詐以檄召權來議事夜遣侯持檄池州喚李顯忠分付人馬令會於采石蓋權兵來采石未定初七日發建康初八日早去采石餘路十五里聞鼓聲振野問道傍人云是金主臨江昨刑白黑馬各一祭天取今日過江虞侯見道傍茶房酒店官軍間坐虞侯呼之其説與道傍人言合虞侯又問云既是金主過江因甚却在這里衆軍皆言王權使在淮西每日只打鑼未嘗得接戰我輩皆是馬軍却使我棄馬步走過江如今已無馬我輩不會走厮殺隨行官吏多欲回虞侯云須要去江上看兵勢蓋上遣我來當進不當退有進言者云事敗至此舍人與一擔擔何也虞侯不聽虞侯至采石諸將皆無戰意公方會合諸將士詰之曰我聞王節使淮西每日打鑼不打鼓終日如此虞侯慰勞曰權不戰教汝輩不成事今汝輩半死半活至此不易衆皆唯唯然王權已罷兵權管你輩不得我是朝廷官家差我擔銀犒設你門今日節度觀察至副校尉官皆擔來你輩食官祿官飬汝輩三十年不知能戮力一戰否衆曰我們也要戰但無人主此事虞侯與説我今日只辦兩眼隨你們成得功大與你填大底官誥立得功小填小底官誥若死於此則當同死於此若你們走我亦隨你去你們道走去任去我便去見官人説某人統制以下某人肯殺某人不肯殺諸軍大歡曰今日有分付大家去厮殺於是方布陳擺戈船是時江北敵兵甚衆極目四望上下流二三十里不絶鼓聲振地虞侯即馬至岸口見北岸一高臺臺上有大紅繡旗黃旗各二左右中立有大紅蓋有一人服金甲披大床上坐其上衆云此金主也兵號四十萬馬數倍之虞侯遂與諸將議與統制官張振王琪戴臯時俊盛新列馬軍步軍為陳靜以待之分戈船為五以其二傍東西岸行東護岸西裏敵船其一駐中流載精兵待戰其二藏小港中以待不測擺布僅畢忽聞敵中發喊金帥親執小紅旗麾數百舟絶江而來頃刻間有十數舟近南岸渡敵登岸與官軍戰公往來行間公令時俊先登軍皆死閗斬敵過半岸上之敵皆投拜戰於江中死以百萬數天色晦亮猶未退會官軍在淮西有潰散三百人自光州路轉江而至虞侯拊勞之授以旗鼓設為疑兵敵果以為援兵至鼓聲乃已却打梆子聲敵引餘舟遁去或欲引水軍掩其前斷其歸路虞侯以為不可所謂歸師勿遏是也恐或官軍一傷我軍少何以己之敵萬里入戰如此之勢不止今日一戰若官軍少則明日何以為敵但以強弩襲其後追射之敵兵多傷至夜師旋計岸上之死三千七百餘人射死萬户一人生獲千户五千女真三百餘人餘皆正軍健者星夜遁去即夜具奏舊將去新將未至決不敢引去是日椎牛張酒以勞軍有説舍人宣贊者及見樞密院人吏在虞侯前甚恭問之云乃中書舍人非武臣舍人也將軍乃盡禮致恭至夜半仍令布陳在於將士待敵敗兵已稍希敵至辰以來凡再鼓公舉旗揮出海船五分之二其半向北岸上流直楊林河口諸將或問公何故遂説與諸將當時只合將船守楊林口不合放敵令出命統制盛新引船直楊河口只於江心下泊船敵箭所不到處戒之曰若敵船至楊林河出即齊向射之必爭於死無令一船行出岸如河口未有船出即用克敵神臂弓射北軍於是盛新受令於江心住船齊力射敵應弦而倒者萬數敵見船無歸路即時從下放火自焚官軍亦於河口上流以火焚船其餘舟凡一百八十餘隻亮陸遁去至午間遣一小舟令張千持書至書意似與王權有約其䇿似於用間亟以已發遣王權之事報之以絶其意遣探馬渡江至暮歸初九夜説金主焚龍鳯車官人所乘斬船作頭二人責船致敗鞭梁大使一百名求來采石引亮者連夜往瓜洲與金主書意合虞侯謂顯忠曰敵懲采石之敗控大兵往合瓜洲之兵鎮江無戰備我當往措畫之患兵少今采石敵既慌手腳必不敢窺伺又兼江長岸分屯防禦甚多其實緊要不過數處都統能任責輟一處兵馬應副如何又須得百餘船戰艦方可集事顯忠略無難色欣然一一應副至建康見葉樞知府尚書張傑聞虞侯至步行來問勞苦甚勤曰真謂賴公庇昨完顔亮要初十日來此會飯不知覺傑却去那裏諸公會議遣官往鎮江措置張目向虞公曰馮員仲二公參帷幄之謀不行虞侯已建大功可任此責虞侯笑曰去不妨然記得一小話人得一鱉欲以計殺而食之熾火使釡水百沸橫竹稍於其上與鱉誓曰能渡此活汝鱉知主人計以殺之勉力爬沙竟渡主人曰汝能此渡河甚好更為我渡一遭我欲觀之僕之此行無乃類是諸公大笑是日泰州以急告虞侯至鎮江謁劉信叔劉病已革虞侯問之劉執虞侯手曰朝廷飬兵二十年我輩一技無所施今日成大功乃出於朝廷一中書舍人我輩愧當死矣先遣一將救泰州連日大風未能行侯與楊存中成閔謀曰敵已瞰江經畫守禦之備不可緩今舟船久繫岸萬一臨時或有不堪駕用悮事率臨按試是時江船既止有戰艦二十四隻相計李顯忠商量今移時俊軍於馬家渡輟李拴一全軍一萬六千人又分戈船百艘來會京口十日五日三十日習水戰耀兵命戰士踏戈船上下流如飛北岸帥長皆慿壘縱觀駭愕皆曰南軍有備急遣人揚州報亮亮跨馬即至列坐諸帥長會議為必渡之舉有帥長前曰南軍有備未可輕舉向覩所來舟楫迅駃如飛此寧能當之且采石江靣方此為狹甚而我軍猶不利不如徐為之謀以俟其隙亮震怒拔劍數之曰汝罪當死者數矣我即不謀汝今沮吾軍事尚可恕乎帥伏地涕泣交流哀告久之亮曰我且赦汝汝與諸帥議來旦各要船百隻即渡江違令者斬之諸帥退曰南軍如此豈宜輕舉輕則送死亮狠不容吾等説明日必殺我不如先下手為強也遂定謀殺亮夜即其居帳中連發三箭射中了又欲射亮已而問曰你是江南人是自家人萬户答曰自家人金主曰我自去年煞是無道理事今日饒我也由你輩殺我也由你輩不若早早跪下萬户一人直入即其帳中殺之并其帳中妃侍五人併殺梁大使郭副留藥師之子馬海古勒馬欽李恭正通四人皆為謀來南者盡焚其尸是日初二日虢州簽軍雷正來告虞侯即日同楊存中成閔渡江至瓜洲措置後日金之大將以檄來請和公是日往行在奏事兩淮之民自鎮至平江見公船過焚香拜投鳴指初六日奏事畢初十日車駕幸建康明年二月十八日還臨安歸正官張棣正隆事迹記完顔亮自己巳冬十二月殺兄亶而自立守舊都於會寧越明年誅夷稍定下求言詔敕中外公卿大夫至於黎庶之賤皆得以書進於闕庭是時上封事者多言陳以會寧僻在一隅官難於轉輸民艱於赴訴宜徙居燕山以應天地中亮深然之即日使官左相張浩右相張通古役天下夫匠百萬肖京師之髣佛營都於燕山迄三年而成至壬申夏駕始幸之遂以渤海遼陽府為東京山西大同府為西中兩京大定府為北京東京曰開封府為南京燕山為中都府曰大興改元以之赦告天下亮以漸染中國之風頗有意於書一日讀晉書至苻堅傳廢卷失聲而嘆曰雄偉如此秉史筆者不以正統本紀歸之列傳而已悲夫又一日與翰林丞旨云顔宗秀左參知政事蔡松年語朕每遐稽前史博考廢興見開創之君雄材大略兼弱攻昧混一區宇躬膺大寶慨焉慕之覺漢髙輩去人不逺二子皆以唯唯而對至正丁丑春二月御武德殿吏部尚書李通刑部尚書胡勵翰林直學士蕭兼賜坐而語朕昨夕夜已三鼓夢二青衣持牒稱上帝宣朕遂䇿小將軍乃亮小烏騅馬也腰弓矢隨彼前而既行之次但入踏空轉時到一門青夜指之曰天門朕隨入馬行數里之地宫極嚴栗朕欲從馬而入前有二金甲謂之曰非人間下馬可步趨及殿垂簾如有待一朱衣曰下拜而就跪朕皆隨之但聞殿上語如嬰兒令青衣持宣授朕曰天䇿上將令征某國朕謝而出復上馬見兵如鬼者左右前後杳無邊際發一矢射之出衆以大喏而應之朕亦喏之故驚愕而覺然而大喏之聲猶在於耳朕立遣人於馬廄視所䇿小將軍但身汗如水收箭袋而數之亦失其一朕大異之豈非天假手於我令取江南也然而君父臣子之語毋泄於外衆稱賀戊寅夏五月亮御薰風殿宣吏部尚書李通翰林丞旨翟永固宣徽使敬嗣暉翰林直學士韓汝加四人及庭者問吏部尚書李通朕欲遷都汴京將宫室重修加兵江右使海內一統卿意如何通以阿諛面從惟佞是務對以正合天時人事不可失也亮深悅之徐問翰林丞宣翟永固永固對以燕都始成未數載帑藏之匱乏未補百姓之瘡痍未痊豈可再營汴都而重勞民力况江南乃繼好之邦以厚幣禮陛下豈可無名出師而重勞征伐在臣謂二事俱不可亮曰非老奴婢所知復問宣徽使嗣暉對以臣與李通所奏同問翰林直學士韓汝加汝加對以臣與翟永固所奏同亮怒永固汝加之咈意遂退及門復宣殿側聽旨二子以為重則刀鋸輕則鞭笞必不能免繼宣翰林待制綦戬汙使亮怒霽消赦而釋之明日謝李通為右丞暉為恭知政事永固知亮之罪已懼而乞辭解官己邜春三月遣左相張浩右參政嗣暉起天下軍民夫匠民夫限五丁役三工匠限三丁役兩統計二百萬運天下林木花石營都於汴將舊營宫室臺榭雖尺柱之不存片瓦之不存更而新之至於丹楹刻桷雕墻峻宇壁泥以金柱石以玉華麗之極不可勝計是年冬遣翰林士講學一生入朝覲本隱畫工於中間節寫臨安之城邑市井及吳山之秀立其圖以進亮亮遣人於坐間軟屏而圖寫之城邑間兵火殘毁於吳山絶頂寫以䇿馬而立焉徐令翰林修撰蔡圭作詩書其上曰萬里車書已混同江南豈有大江封提兵百萬西湖側立馬吳山第一峯亮詭曰御製亮每與左補闕馬海古勒面坐圖窮拾迹指畫其處所白其勝槩亮乃奮髯箕踞不勝其志之鋭明年庚申春正月再役天下軍民匠不限丁而盡起之委右丞李通提控軍造器於燕山之西北隅遣工部尚書蘇保衡侍郎韓錫郎中張參預造戰船於通州潞河是月二十三日翰林乙藥祁使奉封事諫亮其略曰臣聞民惟邦本本固邦寧今則北有造軍器之煩勞南有修大內之重役百姓以久苦轉輸不勝瘦斃臣願陛下權罷其一俟一成而再計之兼來歲害氣在進不利行師伏望陛下以天下為念社稷為心曲隨臣請亮怒令擒而殺之祁使神色自如而再請曰臣年七十死固足矣惟恐陛下將來不及臣更欲語已為左右刀刺其頰以杖穿之執縛而去祁使以朝章受刑辭色終不改刃行之次烈風大作砂石鼓舞人面不可觀者逮三日而止是年秋八月委户部尚書梁球先計女真契丹奚家三色之軍不限丁而盡役之修長者為正軍矮弱者為伊勒希共得二十四萬以一伊勒希副一正軍兩為一里為一十二萬餘計中原漢家渤海之地一十七路於內除燕山中都路造軍器南京開封路大內俱免差焉餘十五路每路簽漢軍一萬人遂委吏部侍郎高懷正兵部郎中蕭彥良户部主事王修翰林修撰鄭之𥅆登文檢院使王淑曰右司郎中王僉東平轉運使王肅翰林修撰楊伯仁翰林待制劉仲淵修起居注劉元旨都史徐之萬太府少監李天吉翰林應奉李希顔殿中侍御史高公挺户部員外郎曹節等分路帶銀牌而出曰焉目差簽軍使冬至十月簽差始會定女真契丹奚家三色之軍通計為二十七萬取有唐治分為二十七軍其所授正副户各有差遂以五十户為富勒琿百户為穆昆千户為明安萬户為都統至十一月委正番明安所簽定女真契丹奚家軍內拾其精鋭者十取一二至都統所復三取一及燕山亮自試其果能射者得五千人目曰硬軍其甲各以五色絨線穿之亮自每日自負曰所簽者數十萬但可張其勢取江南者此五千足矣辛巳二月亮率文武并百官駕幸洛汝百姓以父行而子留泣號盈城三日不絶夏四月駐蹕北邙自改曰太平五月復臨於汝以取牛馬水草之便至秋七月始臨汴百官具法駕陳九節儀迎亮於南勳門亮入門暴雨大作儀制樂音皆不能舉至內承天門雷風迅作拔去一忩門未及開關柝擊三守門吏死入門復霽秋八月皇太后諫亮不可親征亮怒令護御將軍持嘉彥忠殺母於太后宫越數日亮后圗克坦氏及太子光瑛再諫怒亦欲誅后與子懼隱於宫中三日亮赦而出自母諫死百官鈐口結舌無更言者秋九月亮御正隆殿宣諸大臣問曰衆多宰職不能朕為一路統軍右丞劉諤率爾而對曰臣願請之亮喜即拜為果勝軍萬户都統越日拜特進張彥忠為步軍都統以孟州防禦使王彥章副之將兵十道出陜右擊劍外拜工部尚書蘇衡為水軍都統昭武大將軍完顔鎮嘉副之將兵七萬輜重隨焉自海州飛棹而下擬錢塘江而出期以三旬迎亮於大江之南是月起天下簽軍分路請甲而從征焉西則河中京兆南則大名相州東則濟南東平三軍請甲之次同日反回者一十二萬步軍都統張彥忠止將兵三萬出海道右丞劉諤止將萬人出漢上餘則並會於黃河之南亮領焉冬十月王友起於大名耿京起於濟南陳俊起於太行乘時而嘯聚者處處有之亮首知大名之亂拊髀而嘆曰朕兵未行輒撓其後雖匹夫匹婦不可留即遣都舍音將兵萬人於大名多與少盡洗之大名之衆聞風而自潰焉舍音殺居民三十萬口滅族者一千七百餘家是月上旬拜右丞李通為大都督兵部尚書郭安國為先鋒將兵十餘萬親征淮上是日亮衣橘紅袍馬以金甲從新家門而出亮后圗克坦氏及太子光瑛拜送亮為之掩泣者久之俗有語曰天使之不自由矣中旬渡江淮見項羽廟下馬入謁呵責久之未旬兵臨于江上是日因遼陽府簽軍萬人叛歸策立葛王褒於東京改元大定是時中原之民知褒雖立尚在沙漠度亮雖存駐軍淮上中原無主皇皇如也其間豪傑輩不待本朝之命改金正朔為本朝正朔至亮死於淮甸褒徙於燕山方撫定焉是月金相張浩知褒撫定黃河迤北之地使人筆録褒赦具以報敵亮得之於路以鞭擊而嘆曰是子福過我也朕平昔有意俟江南平定之後取武成一戎衣而有天下大定朕欲改之此子為我先矣徐令人取一册亮果預書久之敕南京樞密院遣先鋒郭安國納丹珠將兵數千自黃河北州縣無少長而盡洗之此相州聞亮死方止至十一月亮以內亂所擾知軍意之二三戰船之不至大江之不可渡或有雞肋之意然未形於牙齒間又恐貽笑萬世遂築渡江臺於江之岸北欲渡萬人於大江之南然後作還軍計是日宣威勝軍萬户耶律勸農語曰爾將軍兵俟來日朕欲自救其部族茍失其數當從軍法耶律自度所統軍已不及半懼亮之必誅與子寢殿宿直將軍穆爾謀穆爾格請以計弒亮上下皆從之明日乘亮未起軍突於帳前集箭射之亮疑本朝掩襲令取視之愕然曰軍變矣披衣而前已為穆昆呼沙呼射亮仆地衆執而縊之都督李通亦為亂軍所殺三軍遂四散而歸三朝北盟會編卷二百四十二
