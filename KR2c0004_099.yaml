body:
  text: 三朝北盟㑹編卷九十九宋徐夢莘撰靖康中帙汴都記曰十二月初邊報知藥師以常勝軍叛斡里雅布扺燕京左右近臣倉皇失色未及修備而斡里雅布已渡河直至城下金兵如入無人之境朝廷知敵鋒逼近乃連遣使來求和中外由是恟恟但持和議敵退朝廷茫然未有竒䇿士庶咸望徐處仁入輔中興既召為相吳敏耿南仲李綱議論不叶但各務汲引門人而已南仲官雷觀等以植講和之黨邊事一切不問建計議司舉辟寮屬一時躁進之人乘勢附之不知所議何利害也四月初上皇皇后還闕上親出郊迎迓蔡攸至國門不得入時蔡京在洛詔諸子悉置湖外取王黼首級至闕下童貫送嶺表又遣臺官張澄取首級梟於都下梁方以不守河津遂戮之羣凶就刑都人大快人皆以伊呂望處仁然功名减於治郡竟以碌碌敗事敏亦尸祿為姦天下之士言利害者日數百略不省覽惟是自相矛盾王雲奉使歸奏曰二太子亦通說話尼堪倔强不可近也約雲以七月復到至期不至則舉兵而南金既舉兵由兩路南進議者或曰敵若渡河一鼓而南我决失措置當於京城四面十里間各屯兵數萬築高塹開深溝據要害之利以堅守别馳騎以援之又清野以斷糧秣使敵進不敢攻伺其隙以兵擊之令河北之民各營請以自守走使以報康王為元帥集其兵衆揚聲搗燕山以斷敵歸路使之動心却潛軍渡河㑹勤王之師繞其背夾攻之尚可也或曰敵兵甚鋭而吾軍銼衄之久聞敵深入氣益喪不若擁駕臨狩徐議所向嬰孤城以自守恐非長䇿也大臣未以為然敵忽掩至朝廷罔知所措何㮚曰上城提舉召募人兵號曰何相公竒兵其應募者悉缺食羸憊之人市中黃斾縱橫統制滿道㮚狂率書生豈曉兵機往來城壁談笑自若得傳者云㮚日食飲醇酒半酣一謳大可駭也尼堪自居青城未嘗離寨凡有所議惟召斡里雅布至帳中軍事皆出尼堪帝自行在所批付徐秉哲取衣服并牛羊千口五色線皂角之屬末云奉上皇指揮取趙才人元妃帝䝉塵以來京師無君者四十餘日無監國并三省者半月內外帖然市廛如故蓋人心久困則思生故也家家毁器皿屋宇充薪日辦備及敝衣隨新主遷徙初金人欲行未行之間邦昌為左右小人疑惑有異初心先冊太后引周太后事赦文中止勤王之師知范訥等兵在近搜索各人親識遣之公然肆赦以示即位士論頗有異辭明達墓為敵所發掘露取棺板以為營柵初男女北遷者五百人為一隊敵以數十騎驅之如驅羊豕京師人不能徒走逺涉稍不前即敲殺遺骸蔽野孫𫝊得車一乘載骨肉自以匹馬隨之背小行李取前日府中宣備負荷初上皇之子韓國公尚在嬰孩前日事變因隨養娘遁民間金人亦探知限秉哲一日要見不然便要大尹到軍前金人取人其急如此范致虛全家在敵處一子寅敷作少卿亦徑取以往金人到陳州南京屢敗二城竟徐處仁幾不免二子被殺陳遘在山中為軍人所殺趙野元知大名府為軍民所逐朝廷遂以運使張慤除直學士知大名元帥府用事者耿氏父子黃潛善宗澤汪伯彥等耳大學內人元有六百人圍閉以來患腳氣者二百餘人至今尚有殖者半為鬼録去冬詔許試七書義并䇿以求才略之士太學中守舊圖逺大者皆不肯試惟輕狂躁進者欣然就試後皆補校尉發赴張叔夜軍前聽候差使比肩卒伍及城破死者甚衆退師後有存者往山東見康王上書言事者此曹何所不至國家顛危尚欲覬覦良可憫笑城破時如劉延慶男光國秦元康澤民諸人叩門斬關夜遁並無脫者唯有兵者且戰且引可以潰走如傅臨政郭京是也副元帥宗澤榜京城述康王指揮分遣將兵餘一百萬迎二帝已引兵渡河北諸郡十不下一二以為應援夏熱在近金人必不能來李綱榜湖南安撫使郭三益引土軍及溪洞兵十萬前來救援知京兆范致虛榜收復南京擒僞留守高世由統制張思勝榜收復襄陽府擒郭京前來二十五日在京應官司一半官吏詣南京迎駕是日邦昌時雍等率官吏出門范仲熊北記曰辛丑壬寅年朝廷新定燕山調河北河東京東京西之民轉菽粟金帛器甲往燕山絡繹於道縣吏部押來者皆言燕山初定盜賊不可勝數剽劫行李商旅遂絶部押官住在雄州而燕雲兩路官吏散處中國其嘯聚之民並引處內地中國之民日夜疑之而官吏亦不復以禮待遇兩相忿恨數至喧爭至乙巳歲秋平陽府就糧義勝軍劉嗣初反轉至懷州城下守臣霍安國禦退之丙午歲十一月尼堪陷懷州殺霍安國范仲熊貸命令往鄭州養濟途中與燕人同行因問此中來者是幾國人共有多少兵馬其畨人答言此中隨國相來者有達靼家有奚家有黑水家有小博囉家有契丹家有党項家有黠戛斯家有火石家有回鶻家有室韋家有漢兒家共不得見數目其從河北隨棟摩國主者兵馬更多為拘占數國路大金正軍不過十萬㬠有生金人喚做掃地軍便是也以仲熊所親見尼堪寨有兵馬萬人羅孛貝勒寨有兵萬人皆槍為前行號曰硬軍人馬皆全副甲腰垂八稜棍棒一條或刀一口槍長一丈二尺刀如中國屠刀此皆驍衛之兵也弓矢在後設而不發弓力不過七斗箭多者不滿百隻自大金兵外其他國兵皆不帶甲弓矢或有或無皆旋砍道傍木執之為兵大帥至步卒皆粟米粥或燒猪肉别無異品番人主中國事者高尚書孫左司也高尤親要兼充尼堪軍前通事謂吏人曰本司皆插筆於腰文字極簡與人論談言皆成文而檄書文字簡古幾不可讀凡番官平居惟著上領褐衫無上下之辨富者著褐色毛衫以羊裘狼皮等為帽𫝊聞尼堪二子太子初入中國時止著褐布衫既拔京城其下無不衣錦繡至月旦及視事則幞頭公服靴笏皆如中國之制仲熊每見尼堪著青貂裘半袖時復露頂而坐金人差其下薩爾拉為鄭州道士趙之才在鄭州賣相能揮四十五斤鐵簡心膽可使仲熊因謂之曰上皇為了無限道士沒一箇報恩之才曰只是不用著之才豈是不能如今之才肯為趙官家便死也不悔仲熊因與之謀殺薩爾拉不果四月四日尼堪回軍至鄭州教一人番兵引去見少帝其人引仲熊到清德太平庫前中有內侍及婦人數人中一人身甚瘦人指云此少帝也仲熊拜訖云臣受國恩才薄位卑無所展效致陛下及此死有餘責他不言金人已叱仲熊令退有番官梁慶裔來呌仲熊曰國相有台㫖有國書送你歸書題曰書到於南朝皇帝闕下固倫尼伊拉齊貝勒左副元帥不寫姓名只用一元帥府印下云謹封書云天㑹五年四月日固倫尼伊拉齊貝勒左副元帥謹致書於南朝皇帝闕下卑者攻下懷州內有鄉貫係河南人以不係朝廷措置州縣人民隨軍將帶前來比至汴京了畢權令鄭州就糧養濟除情願歸降已發過河北外內有不願歸降人從事郎懷州河內縣丞范仲熊遣令還鄉仰兾英聰俯為亮悉專奉書陳達不宣謹白慶裔遣馬軍一人至京師投下仲熊遂歸靖康皇族陷敵記一少帝位下太子諶小大王訓見居五國城鄭才人生大公主二公主各年幼狄才人無出一見在親王景王濟王莘王徐王安康郡王相國王溫國王廣平郡王儀國公頑使狄才人韓州生鐵使閻婉容五國生一見在公主純福公主尚缺醫官王宗沔男昌逺小公主尚藥乙官成男良御名復榮德公主嫁實古納王已死見在大金皇后後位居洵德公主嫁錫默郎京君見在上寧福公主嫁陳王已死其子見在冷山住居惠福公主嫁開封相公希卜蘇國相見男在上京居住一見在貴妃崔貴妃王婉容大王婕妤小王婕妤狄才人喬婕妤一見在駙馬都尉宋邦光向子房向子扆一見在諸王男女成文鄆王男成規肅王男成範郤王男成之莘王男成式濟王男相國公儀國公下各一男年幼相國公溫國公下各女一安康郡王康王郡王各一女故和王女嫁王遵道男安令已到行在故信王女四人一見在棣華宅親王等和議郡王有奕寧郡王有恭燕五節使有章越五節使有忠燕五節使有忠燕五觀察有亮越五觀察有德一親賢宅宗子故晉康郡王孝鶱男安規等士稱公繪一殁故親王燕王趙州越王韓州鄆王韓州肅王五國祁王五國沂王五國住信王五國建安郡王青城嘉國王五國瀛國公五國昌國公五國一殁故公主加德嫁宋國王上京殁令福華福安德順德顯德柔福一殁故貴妃王貴妃閻婉容一殁故駙馬曾寅曹晟蔡鞗劉文房田丕一金國北京坐諸宮院見在宗室仲慕仲瑥等并宗女姨㜮兵士等僅五百餘人去來上京告朝廷艱難賜錢三萬貫牛三百頭為養濟一奉使洪皓見在燕京等處住金國已降赦已令換官往往不肯祇受一應被虜宗室女見在北人家作奴婢者金國已降赦官中二人換一名出令作百姓自在居住一應扈二帝親屬四百餘人為遷二帝往五國留在遼東落後養濟焉淵聖滑州驛血指書襟詔曰宋德不興禍生莫測朕嗣位以來莫知寒暑寢食惟保汝赤子以衛我社稷庶幾共享太平不幸用非其人兵未扺京謀已先潰使我道君而降全族為虜百官偷生勢不獲已所不忍聞者京師之民捨命不顧棄金帛寶玉欲以贖朕此最可傷恨不得與斯民同生同死後之社稷恐非我族興言及此涕淚橫流衛士潜歸嚙指書襟敷告中外宗族忠臣義士奮起一心為朕雪北顧之恥毋忘毋忘雜考私書曰四月二十日兄某書致元章解元弟自去冬徐處仁吳敏李綱輩相繼登廟堂誤國謀身全無措置却欲背約唐恪何㮚又凡庸輕脫河北河東委而不問自种師中以深入敗績李伯紀以寡謀喪師士氣益不振冬初大金引兵入北京聲言問罪且邀三鎮朝廷尚守誤國之謀謂祖宗之地尺寸不可割堅守不與遂破真定迤邐南來無一卒與戰及議和也而何㮚孫𫝊必欲戰以遂前非且迎合上意不思力之不敵也時復閉門自守城中兵及保甲與募兵雖及二十萬分守城上及以拽炮之餘兵屯五嶽觀城外無一卒一騎金人近城公然填濠倒戈置炮坐鵝車為攻城具而劉延慶以下位高金多不肯出戰時擦城下數百人以啖之敵氣益張閏月十八日十九日間金人遣使欲親王宰相出議乃留使不遣何相自領山東弓手及募召到義兵號竒兵登城門自指揮進退敵札寨由南郊直扺門外就河北作橋已成不知兵虛實多寡之數竒兵近濠敵以數十騎突之遂大奔潰爭入門門已閉自相排迮二千殲焉金人益無忌憚二十四日遂攻城燒敵樓自已至未佯退二十五日寂然不攻我軍亦不備食後以鵝車向城只三四人上來由昨日燒處為不曾蓋棚空闊二三丈矢石如雨不可立有鎗手二百餘立兩傍至三四金人上時四畔先走相次城上城下棄甲擲兵爭先遁逃將士無一存者金人既登城畏城中人不敢下乃分布城上下窺城中早晚擊鼓驚動聲言洗城者纍矣至上出講和割兩河復墮其計蓋欲困之也十二月初十始求金帛金要百萬鋌銀五百萬鋌緞一千萬匹正月十間上念人困不能敷此數且敵邀上出大臣寡謀不能任事乃使車駕再犯不測初以金帛不足留上在外城罄所有不足以塞所請又取索帑藏所有應禮樂之具服用之物占天之璇璣𫝊國之寶玉上自珍異下及粗惡悉取之工匠人口醫官樂工妓女內侍以至後苑八作綾文思院及民工悉取之約十萬口父子夫婦生相别離及提老攜幼係纍而去哭聲動天地至二月初六日上已為敵所廢而城中不知也初七日來邀上皇鄭后十一日來取太子後宮以鐵騎逼脅最後取宗室欲絶趙氏議所立已請張相張相以死辭三月一日遣使臣入七日金人入持玉寶冊傘蓋以大金命立為大楚皇帝凡百須皆應付辦少不如意即令軍法甚危四月初八日師退勤王兵方來無追襲者聞在外作援康王即大位中原可定矣祕書少監趙暘與太守書曰某奉親幸如常惟是遭此大難國破君廢墳墓殘毁親戚破亡殆無生意台斾出都之後廟論日益背馳九月又失太原十月初失真定而觀望之徒猶持不與三鎮之說至於集百官廷議事勢如此乃妄為不使一騎得還之言熒惑上聽十月下旬金人忽遣王芮來使議畫河為界仍聞鐵騎已欲渡河芮頗不遜大臣無如之何乃遣耿南仲聶昌朝悉從其請正忙中唐恪乞罷復相何㮚處置尤乖疏耿聶方北渡而敵騎已南來幹里雅布自魏縣濟師尼堪自盟津涉河尋得一石庇裏皆乘馬浮河而過廟堂更無措置但自十一月十四日遂閉城門猶初旬開一兩門放人樵採至下旬敵騎大至更不復開旋為守城之計斡里雅布館於城東北劉家寺尼堪設郊於南郊齊宮閏月初即下手攻城且遣使來欲得宰相親王議事當國者不肯行至東水門屢危斡里雅布復專遣使見告云事急矣親王宰相不出必破城也又不肯兼遲留使人每日不使對使人於都堂驛㕔上盤旋不能定但云是好公事却如此說當國者但告上云彼二帥懸軍逺來是送死之時彼乏糧故急欲講和不知金人自於近京五七里分兵驅掠自家百姓牛羊運糧山積也至二十三日陳州東屬人放火炮燒樓子三座亦有金人一二千上城幸得殺退已大危斡里雅布復遣使來告曰宰相親王下城便罷攻擊竟以為虛僞而㮚與孫𫝊皆親宿城下時守禦之至二十五日午未間金人於燒了樓子處走上城守卒遂潰俄頃敵大至是日風雪異常城上人亦不能立是夜金人縱火燒樓櫓而大風如扇平生所未見火光下照幽室中亦如白晝雖平日說雄話者皆恐懼膽落也一城之下但知候曉就戮矣至五鼓初𤾉與舍弟輩扶老兒行於深雪中得一委曲巷詰曲可藏避處并幼纍皆潜其間至申未以來忽有人來報敵已講和不復下城然稍近窵居者不論貴賤皆被虜却如御街近南一帶并西岡等處士大夫妻子已不可勝計囊槖皆掃地矣二十九日上出至軍前三日始得還自此之後劫掠稍空然諸門皆金人自開閉城上盡是金人日夜聞鼓聲不絶其為恐懼殆不可言上在軍中不得已乃上表於金主奉尊號為大金皇帝至十二月二十三日急遣使來云得本國指揮要金銀犒設金一百萬鋌銀五百萬鋌每鋌五十兩衆論以為此數太多雖竭京師公私所有必不能辦也不如遣使從曾至軍前者往懇用事之人痛乞减數仍乞作年限看其所答如何㮚堅拒之云且與他盡力括看所得如何方報去暘亦三次論之其餘侍從臺諫言者極多終不見從至正月初五日忽再遣使催督云斂金銀十日並無報應不知果有此數否始方說與要數太多似不能足意已怒云何不早說也蓋臘月中間已曾遣用事人來遍視府庫見內藏庫有絹千萬匹已就已整數千匹矣意以謂金銀必可足見說不能足乃不喜至初九日晚復遣使來請車駕出城議上大金帝號事時已昏夜忽𫝊指揮來早駕出從官皆不及知詰朝遂至軍前自此日候乘輿之歸寂無所聞但每有軍來傳詔語曰只候議事了便歸也而金人在四門交割物色者皆來買並用左藏庫錢而府庫所有物無不來搬四門皆有交納官皆公然云要皇帝歸須候納足金銀也自後上日有批語云急根括金銀然後可歸也讀之者無不掩泣是時侍從百官皆分頭根括𤾉亦在此抄札事十六日已根括金共十九餘萬兩銀一百七十餘萬兩乃自留守孫傳以下皆供軍令狀云已根括盡得每日催督稍緩只云煩請皇帝看打毬畢即歸至二月五日遂打毬畢必便歸自上出百官日至南薰門下等候初五日官吏士庶駢填不知其數前此有燒香煉頂願及至晚門閉方散次日拂旦人又聚集等候又至晚散雖快行家亦無一人自軍前來者暘來見孫伯野云上曾有語不遣人來否伯野曰每日須有人至不似今日無人來也乃大憂悶而歸是夜二更遣吳正仲幵莫壽朋儔賫廢立文字至禁中留守處黎明始見羣臣皆撫膺大慟伯野復來祕書孫伯野傳作留守復以禁中衆官難於出入仍暫作祕書省置局遂三四次作狀申軍前具述皇帝恭儉無失德又已稱臣於大金乞依舊令聖上臨御懇禱備至不從但云係本國指揮不敢改易繼又請乞立皇太子并皇叔燕越二王與親王之賢皆不從又持上親札來請上皇及親王皇后帝姬皇太子出城少頃不出即入禁中搜求矣上皇亦慮轉更驚恐乃初七日未申間鄭皇后與皇太子每日復來迫脅轉急其使皆自乘馬至宮中不可禦但深痛憤而已𤾉自此至今三月間鬚髮皆白豈謂生太平無事之時乃目見禍亂如此初七日祕書省欲自裁忍死偷生至二月二十三日軍前令張邦昌要百官狀請本官權攝軍國事子能在軍中屢求死使人晝夜監視之至此又再索金銀尤急其實欲以迫脅京人無異議至二十五日急來請促刮金銀官梅和勝執禮户部尚書陳幹質工部侍郎程伯玉振開封尹安次公扶禮部侍郎及侍御以下與臺官於南薰門外議事先將南塌已下四人盡去衣各遣壯士執五體併令合面就地以溼柳棒自肩背至腰打百五棒背瘡更不可言只如手臂皆拽脫並不省事擡歸次將梅陳等四從官先皆去巾帶反縛跪膝後用大棒敲死仍割去頭其酷如此痛苦何言至三月初一日晚送張子能來是時張不食已五日恐其遂死及送入仍令鐵騎皆衣甲挾兵刃臨門云城中有異論即屠城張館於尚書令㕔至初五日父子皆大號泣升令㕔云金人已欲屠城且告相公拯救一城人命張不得已號泣揮衆使退金人遣人使作漢裝於令㕔人衆中探伺知衆心如此乃於初七日賫冊寶來封張為楚帝國號大楚都於金陵因請免百姓金銀及請見在軍前衆官始肯令馮左丞長源曹樞密載德路樞密談世績孫覿汪藻等還從行而北者何㮚孫傳張叔夜司馬朴秦檜等然都城已破敝城中凍餓死者不可計米麥至二十四貫一斛肉一斤兩貫三百菜數莖三四百文今城已開門外殘破並無居人收割勤王之師已有劫掠計赦恩之後漸次寧息金人近在濬州酸棗或陽武過渡至都城不滿百里豈安於此耶今則帑藏皆空禁中供御乘輿之物悉為金人搬盡至於祕書圖籍國子監鴻臚館職文思染院官吏皆取去今幸有放歸者宗姓近上人悉皆並家屬取去日日勾收諸國人如捕盜賊初從行時親族相别牽挽於道路號呼不可聞不謂盛時一至於此三朝北盟㑹編卷九十九
