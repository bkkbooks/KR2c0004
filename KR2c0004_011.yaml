body:
  text: 三朝北盟會編卷十一宋徐夢莘撰政宣上帙起宣和四年十月二十三日戊申盡十一月二十七日壬午二十三日戊申宣撫司檄進兵劉延慶議入燕之策郭藥師獻謀搗虛取之是日蕭幹營於十里外以控我軍由是逗留未得進宣司檄曰大軍至良鄉連日不進可出奇以取勝况我軍擬敵倍萬以彼較此利害皎然仰疾速趨燕京是日延慶命請將共議入燕之策郭藥師獻謀曰四軍者以全師抗我則燕山可以搗虛而入可選輕騎由固安渡瀘水至安次徑赴燕城漢民知王師至必內為應燕城可得延慶即遣郭藥師押常勝軍千人為鄉導命趙鶴壽髙世宣楊可世可弼統兵六千可世等夜半渡河銜枚倍道至三家店憩軍二十四日己酉郭藥師等入燕山軍敗而還是日質明郭藥師遣甄五臣領常勝軍五千人雜郊民奪迎春門以入殺守閽者數十人大軍繼至陳於憫忠寺分遣七將官把燕城七門各差將二人騎二百守之內外帖然不知兵至咸謂有神時有燕人馬賢良者獻詩云破敵將軍曉入燕滿城和氣接堯天油然靉靆三千里洗盡塵氛二百年可世傳令云漢人皆登雉堞指摘契丹奚等家誅戮萬計通衢流血申宣撫司告捷我軍用事者不過四千蕭后登宣和門親施箭鏃以拒王師郭藥師遣人諭蕭后大兵入城釋甲拜降可也蕭后聞諸軍與燕人內應所在巷陌齊殺契丹劫掠財物頗狐疑未決契丹諸軍皆效死戰而我軍無紀律已而飲酒攘奪財物紛然恣淫后既知密遣人召蕭幹等回幹亦知我師入燕晝夜來援或告藥師曰城外塵起必有援兵至諸將皆謂延慶遣兵來助一望則燕王塜上立四軍旗幟矣方錯愕瞪視而四軍人馬自南暗門入內諸門啓鐡騎突出戰於三市人皆殊死戮力迎敵而藥師失馬可世拒追者藥師獲免我軍少却遂至雙門樓下令騎皆下馬且戰且行至憫忠寺前可世謂藥師曰今日如何不若且至東門以待援兵而燕城漢人皆曰汝等令我指摘契丹相助殺戮將軍若出我輩如何今已斷了諸門弔橋幸無遂出以決死耳再戰又敗我軍三晝夜不寢食又自早殱契丹競功人飢馬疲而四軍林牙兵勢方鋭可世等戰不勝藥師復回戰又不利皆棄馬登城敵益熾將窮摶藥師先下城可世謂世宣曰吾將家豈能效兒女態惜微軀也指呼戰士拒戰身中毒矢不顧或報藥師出矣弟可弼因其間進曰趙鶴壽後軍不來都統亦不遣援兵今日之事黑白自明倘含糊就死百世之下兄不失為罪人矣願偕去是非昭著請誅於朝不其偉歟可世然之遂縋焉而髙世宣王奇李嶢石洵美王端臣等皆碎敵手可世等既出賴契丹收棄甲捕殺殘軍不復追襲遂得脫去尸之填壕者可籍而過初選精兵六千至是者數百騎而已契丹獲馬五千甲四千先藥師與可世謀留鶴壽兵為援其實藥師忌功焉鶴壽亦憾之不至先是鶴壽見宣撫藥師疑其有所授而不以其實告故也藥師可世等夜入安次縣招集將士得潰兵四百餘人入涿州北征紀實曰藥師獻謀于二帥曰四軍者以全師抗延慶則燕山可以徑騎搗虛而入也於是二帥命藥師擇常勝軍千人為鄉導又命延慶選將乃以楊可世髙一箭各千人一夕渡瀘溝河直往燕山之東每旦有草車無數入門可伺其開門因車入而襲之果然既入則每門命驍勇使臣二人分兵守把藥師乃下令曰燕人令盡降契丹諸人令盡殺然不意燕山城中契丹奚兵尚衆而我師虜掠故蕭后者在內但閉其內門是以遼燕因巷戰殺傷相當自旦至晚不解而蕭后乃呼四軍自其內後暗門而入恐大啓內門生兵出擊我師為退敗藥師知其不敵因墜城先遁楊可世亦得脫髙世宣號髙一箭者及諸名將鋭卒無一得生還二十五日庚戌蕭幹出兵與劉延慶對壘於瀘溝河南是日蕭幹陳於河南出示藥師隨行主管文字官趙端甫并藥師可世全裝甲馬令延慶見之言已將諸將殺戮人騎皆降仍渡河挑戰延慶軍洶洶以為藥師全軍沒諸將殺可世降契丹延慶遣人涿州取藥師手書以安衆心二十六日辛亥趙良嗣等同使人烏舍髙慶裔到大金軍前燕雲奉使録曰二十一日過界金國遣甲馬及接伴使副迎勞是日宿於應州侍中莊二十二日見元帥尼堪具言今來所計議事節與自家上京時説底話晒别也對以大信既定本無異同之意尼堪曰候到日皇帝不錯食罷遣其副帥烏舍接伴往奉聖州二十五日遂至于前軍二十六日見其國王阿固達捧書傳達如儀二十七日壬子郭藥師留甄五臣張思政守涿州領兵趨雄州宣撫司恐涿州危差張令徽領二千騎戍之二十八日癸丑劉延慶申宣撫司乞回軍紀實曰時劉延慶申二帥乞那回軍馬二帥以小竹紙親札報之曰仰相度事勢若可以那回量可那回不管有誤軍事延慶得之一夕中軍先自焚輜重不告諸將而退衆軍罔測遂大潰編年曰劉延慶以可世行三日方進兵又兩日至瀘溝河距燕城二十里下營是時偏師雖入燕城大軍屯瀘溝未動蕭幹兵才數千幹得漢軍兩人蔽其目留帳中兩人不知也夜半偽相語言聞兵十萬壓吾境吾師且三倍敵之有餘當分左右翼以精兵衝其中舉火為應殱之無遺縱一人歸報其人又曰昨日在敵營見戰具甚廣㨂人選將乘夜來搗營寨延慶聞燕城復失又琉璃河護糧將王淵亦陷於敵氣已喪矣旋得此説心動求自全之計盡召諸將密諭以糧餉不繼去漢界逺中道多事不即引還久恐生變諸將皆唯唯獨曲奇力爭不可延慶怒叱去之二十九日甲寅劉延慶燒營及輜重奔還王師大潰是日晚瀘溝河北四野火發延慶與光國光世以為敵至燒營而奔五軍雜還擾攘散走自相踐蹂奔墮崖澗者莫知其數捐棄一切軍須之計相繼百餘里將曉敵覺徑尾吾後轉戰至白溝河與常勝軍髙望接戰又大敗自熙豐以來所畜軍實盡矣燕人作歌及賦以誚延慶傳笑燕中蕭幹陷清城失守將路宗迪十一月一日丙辰朔阿固達見趙良嗣許燕京薊景檀順涿易六州二十四縣每嵗要以契丹銀絹遣李靖持書來燕雲奉使録曰是日阿固達令趙良嗣與普結努議事普結努云去年本國專遣使臣理會恁大國情公事屯著人馬專專地等候回使相約打滅契丹却留我使人一住半年滯了軍期更不遣回使只將空書領軍人送過海來已是斷絶之意此段休説更説一段且如夾攻本國兵馬從今年正月已到中京因甚不便來夾攻本國自去年十一月出兵今年正月到中京三月到西京已是半年受了千辛萬苦貴朝才於五月出兵慢慢地占穩占姦更説甚夾攻此一段亦休説皇帝有指揮去年不遣使乃是失信今年雖出兵亦不如約便畫斷休説而今特將已收下西京一路州縣與南朝請先交割外為契丹昏主猶領殘兵不先了了燕京不唯為金國之患亦恐去南朝作過皇帝已定親去收燕京候收燕京了却來商量或與不與在臨時前遣元帥就近代州縣議事便是此意已與王瓌處仔細道來更不可改良嗣度其意欲以西京交割為名更改許燕之議乃云本朝與貴國通好五六年自貴國兵馬未到上京時已有要約今來却恁地翻變説話是甚理義據良嗣等所奉御筆處分先夾攻燕京了日然後夾攻西京須是先得燕京然後交割西京固自有次第普結努云今先與西京其意已厚汝家旦夕守燕不能取候吾得之取決臨時有何不可良嗣云大國所行必指天為言前年皇帝與良嗣握手曰吾已許南朝燕京便吾得之亦然指天為誓料皇帝守信肯違天耶普結努復傳阿固達之意曰初以南朝失信斷絶無疑緣南朝皇帝委曲御筆親書今更不論元約特與燕京六州二十四縣漢地漢民其係官錢物等及奚契丹渤海西京平灤州並不在許與之數南朝自得燕京亦借路平灤以歸如南朝未得吾兵取之悉如前約更不論夾攻六州謂薊景檀順涿易也良嗣答以元約山前山後十七州今止言燕京六州二十四縣昨日言西京今又不及何也平灤本燕地以限榆關則平灤州已在燕京之內矣兼御筆事目如貴朝兵馬因追襲乘勢更不煩兵馬過關今言本朝定燕京借路平灤本朝果得燕必分兵戍守大國人馬經由豈敢專輒普結努烏舍勃然怒曰汝家未下燕已拒吾如此是不欲通和耳况汝兵近為燕人擊敗若旬日未下豈不仰吾力耶又云皇帝更不説元約只特許燕京六州二十四縣每嵗要依契丹銀絹之數却微笑云有一事説與使人莫道是與了南朝燕京管下六州二十四縣如吾取了燕京都不與南朝怎生不依契丹一般與吾銀絹良嗣等對似此只是自強底話如不夾攻契丹以應于舊漢地歸本朝何名可得銀絹等郎君等未可一向自強一槩輕易漢人且如契丹昏主七八年前煞有輕易貴國之意如今契丹之強却在何處諸郎君不要誤皇帝當以信義為勝不可以力為強郎君等只見契丹之弱乃自以為強本朝大國不可容易不要錯了復來出文字三封一封係知易州何灌牒大金統領內備宣撫司劄子令報知大金國稱已收下涿易不得侵越生事一牒靈邱飛狐兩縣招誘歸欵一封係趙許上太傅相公內言女真恣為殺戮枉害良民諭令歸漢不可歸心于女真也令良嗣讀訖却云理會得否且如飛狐靈邱乃山後地方未商量定便來招誘是何義理假如要一兩箇小縣何不將文字來評會良嗣等答以此必何觀察為何觀不知界至地里便發文字料必如此却云此事且休論趙許元是董龎兒我與你有甚冤讐道本國殺害良民如賊一般相待普結努曰此大國之意也如使副不許借路過關趙許不使漢人歸女真其意一同若不是祗重貴朝皇帝御筆親寫來更無好説話也恰來皇帝有朝旨如使人隔闌恐已下燕不令過關又趙許文字詆毁雖已寫國書待改變來却為大信已定更不改也且汝只知阻我過關不道汝國人馬又敗便揖良嗣朝辭令其國相普結努言云到南朝日再三附奏乞善保聖體好理國家所有燕京等事已專遣人賫國書計議且望教速來回早了大事至庭下有前立兩人指示良嗣曰此燕京國妃遣來請降如不許稱藩止乞燕京隻力拒南朝及言契丹軍雖寡弱若止當南軍有餘只恐大金來即不支也對良嗣等面諭二人云吾已許南朝燕京汝到日説與汝國妃古爾班勿與南朝交鬭戮及齊民二人唯唯良嗣等辭訖留馬闕遣良嗣及使人同來茆齋自敘曰十月抵代州過界時尼堪烏舍皆在應州南傍山作營某與良嗣既送烏舍慶裔至彼見尼堪因略論大槩次日尼堪遂以鐵騎二百令烏舍權充接伴良嗣與某各携一從人餘悉留於尼堪軍遇夜行五程抵奉聖州見阿固逹路經蔚州縣邑悉無人煙人皆逃避既見阿固逹受國書御筆次日令皇叔普結努詳衮并二太子斡里雅布者就一氊帳中約説話皆令人通譯云前次遣赫嚕大迪烏議割還燕地貴朝不遣聘使乃是斷絶今來難舉海上之約但皇帝知趙王誠心不忍絶好燕京候平定了日與或不與臨時商量今西京謂雲中府却已平定奉還貴朝可差軍馬交割當時緣郭藥師已降劉延慶已逼燕故有雲中之意良嗣錯愕失詞答云元議割還燕地若燕京不得即西京亦不要斡里雅布云燕京為未了且言臨時商量西京是已了割與貴朝却言不要不成剛強與得次日復召議事詳衮云皇帝有旨昨日所論西京事更休理會海上之約亦是貴朝自斷絶且看趙王靣特許與燕京六州二十四縣如貴朝軍馬先入燕則本朝軍馬借路歸國仍要在燕係官錢物若貴朝不能入燕待本朝打了與去是時金人聞楊可世髙一箭郭藥師已入燕故有此語以為他時紛競之端良嗣云錢物則不較但借路事恐難從詳衮云待遣人同去南朝商量遂起良嗣歸有喜色作詩云朔風吹雪下雞山燭暗穹廬夜色寒聞道燕山好消息曉來驛騎報平安某顧良嗣曰小器不知安危繼詩和云未見燕銘勒故山耳聞殊議骨毛寒願君共事烹身語易取皇家萬世安次日欲朝辭詳衮云已差李靖充大使王永昌充副使察勒瑪充計議却於二國信使中留一員隨軍恐貴朝軍馬入燕地把定關隘本朝借路時要得分辨良嗣汗流不能對某附耳云龍圖燕人不為女真所畏若不能免某請為留宜安方寸良嗣徐對曰自來無例摘留使人詳衮云此皇帝意近晚阿固達召辭云二使人誰留良嗣復答以無例阿固達云行軍非引例處某應曰若必欲留願令大使歸報某請留遂辭次日良嗣與李靖等行持書詣闕金人國書書云適慿使傳特示音題然已露於深悰斯未洽於舊約載惟大信理有所陳爰念前言義當可許昨遣趙良嗣計燕京依與契丹銀絹數目嵗交尋許燕京并所營州縣及所轄漢民如或不為夾攻不能依得已許後來馬政至更議收復西京回書只請就便計處如難果意兾為報示又得書示候聞舉兵到西京的期以慿夾攻不言自行計度或難果意只云並如初議及絶使軺以謂非是通好之意遂止夾攻許與之辭以故昨來遣兵及平定契丹畢未嘗報論夾攻自來燕京國王上表稱臣永修貢道薨逝後屬以其妻國妃虔誠表請縱不許為籓輔亦無他望良嗣等始方來到且馬政元賫事録所約應期夾攻最為大事須是大金兵馬到西京大宋兵馬便自來燕京并應朔等州入去也如此則方是夾攻若將來不到西京便是失約也貴朝若依前書實欲夾攻圖謀理須當期本朝兵馬到西京已來合於所約道路進兵相應若謂不知又云燕南已屯重兵兼貴朝士馬發於代州比本朝逺至西京地里勞逸灼然可知直至克定未曽依應今承芳翰再締新歡極邊屯相應之軍立議復幽雲之地皆非元約者也其於信義未合許焉蓋念前書至如契丹將來虔誠請和聽命無違必不允應方是大信故許燕京并六州屬縣及所管漢兒外餘應關係官錢穀金帛諸物之類并女真勃海契丹奚及别處移散到彼漢民雜色人户兼併平灤營州縣縱貴朝克復亦不在許與之限當須本朝占據如或廣務於侵求請慮難終於信義所有信誓分立界至并舊來輸納契丹嵗幣數目多少交割等事候到燕京續議畫定式當嚴律善保殊休今差貝勒察勒瑪李靖貝勒王都哷充國信使副有少禮物具諸别幅專奉書陳達不宣謹白二十一日丙子金人國信使副李靖王都哷察勒瑪等來議每嵗銀絹二十五日庚辰李靖等入見於崇政殿燕雲奉使録曰是日引李靖等上殿上令黃珦傳旨兩朝計議五六年大事已定些小事各相説了却甚好西京及平灤三州地土不多可一就議定四軍蕭幹闕兩朝無禮如捉得執縳送來以見通歡之意趙良嗣回許定燕京更不論夾攻如自取得亦與本朝甚荷厚意可依例赴王黼處計議尋引詣王黼賜第議事出御前文字讀示所有幽薊平灤自合依約察勒瑪與靖相看曰却是和西京平灤都要靖等來時只聽得特許燕京六州二十四縣地與南朝今來却和西京平灤都要怎生了得黼曰自趙龍圖涉海北從貴國未到上京已如此商議本只為五代已後所陷漢地更無二三察勒瑪曰若是和燕京西京平灤州都要後方許契丹舊日銀絹之數如此則空費往來和合不得黼曰某天性爽快士大夫所共知今來商議國事須要説盡已得聖旨便將西京畫斷别做一項此亦順貴國之意只以燕京平灤三州盡許契丹舊日銀絹之數此乃是本朝一一相就之意如燕京係官錢物漢户人口西京畫斷一一相就貴國只有平灤一事自可相從都哷曰此亦傾盡覆知且如本國以九年來方盡得契丹舊地好處唯有一個燕京已許與貴朝平灤等州本國要做關口李靖曰兩國來往唯務誠實據靖所見先將燕京六州二十四縣為定嵗交契丹銀絹之數其平灤等州别作一頭項再覔去或肯時亦不可知若一槩言之徒苦往來黼曰此已是委曲相就若更分平灤豈有是理各上馬歸二十七日壬午遼人四軍蕭幹復攻涿州安次固安兩縣陷之守將胡德章被俘金人進兵趨燕馬擴既留尼堪自廣州趨奉聖州與阿固達定議尼堪遂下軍馬於南暗口阿固達趨居庸關達蘭趨古北口分三路進軍忽燕京國妃遣使詣阿固達請和云十月十九日南兵楊可世郭藥師襲入燕城國妃據內城南師驕勝不戢士卒掠取財物國妃密遣人至瀘溝河呼四軍大王自內南暗門入與郭藥師抗戰南師氣奪悉皆奔竄諸將僅以身免為四軍奪馬數千匹次日耀兵於瀘溝河劉延慶望之喪膽乃焚營夜遁為契丹追殺至雄州阿固達執各不應允之約不從進兵趨燕初童貫行上遣內侍李嘗微服於貫軍中探其去就燕京既失州縣復陷嘗密奏之上以手札責貫曰今不復信汝矣貫既被責大懼遂遣王瓌取易州飛狐路赴大金軍前約以夾攻王瓌至大金軍前見其國主奏言大宋宣撫童樞密令臣見陛下問嘗有國使交通兩朝已議夾攻今來童宣撫大兵已近去燕京未敢擅入遣瓌等來請起兵夾攻月日貴得相應不失元約金國遣烏舍館之定議尅十二月一日起居初五日度居庸關六日到燕京城下先令瓌歸三朝北盟會編卷十一
