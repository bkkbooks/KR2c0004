body:
  text: 三朝北盟㑹編卷六十二宋徐夢莘撰靖康中帙起靖康元年十一月七日戊辰盡八日己巳七日戊辰車駕詣种師道宅澆奠中書舍人孫覿上殿劄子乞棄三鎮臣蒙恩召還不勝區區憂國之心以謂新宰相當國北方邊事必有一定之論起居郎胡交修為臣言金使王苪奏事殿上請割三關之地時交修侍立親聞其語苪曰今得三關明日旋師去矣如朝廷不許則國相自河東來屯兵南郊圍城之西南皇子郎君自河北來屯兵北郊圍城之東北未論攻城由京畿五百里外燔燒盡使鳥獸不能過也苪退上問宰相唐恪三關何如恪曰不豫則必來子之臣不能保其必不來三問三對如此上赫怒曰卿是宰相何不决此議恪對如初臣太息言曰方彊敵怙衆昧死一來仰見中國之甚大四方勤王之師日至將相持重嚴兵固壘斷虜掠之路不出一技示以形勢憚莫吾測而與之講可以萬全矣何行營大臣狂謬算出於劫寨一敗塗地傳笑四方而後强敵輕視朝廷使欲割三關以要吾君宰相既知其必來矣來則何以待之臣聞戰國時韓魏共攻秦於函谷關求出楚懷王秦王謂樓緩曰三國之兵深矣寡人欲割河東而講緩曰河東大費也免於國患大利也此父兄之任也王乃召公子池而問焉對曰講亦悔不講亦悔王割河東而講必曰惜矣三國且去吾失三城此講之悔也王不講三國入函谷咸陽必危王又曰惜矣吾愛三城而不與又不講之悔也王曰均吾悔也寧失三城而悔無寧危咸陽而悔也遂與魏封陵與韓武遂以和夫秦居戰國最號彊雄尚割河東以舒一時之急其後席纍世之富選將擇士白起蒙恬王翦之徒起而用事遂併吞六國而有天下所謂易敗為功轉禍為福其權固有此也今之三關河朔重地舉而棄之則京師藩籬之衛陛下不得一日髙枕而臥矣狂生劫塞誤國至此豈不痛哉今京師無大嶽三塗崤函之固獨恃一河耳防河將吏望見敵兵獸駭鳥驚不知所在大臣依違畏棄地之責將帥駑下無干城禦敵之功萬一彊敵舉國而來頓兵城下有如王苪之說臣恐社稷之憂不止三關而已也敵益深矣陛下當權禍福輕重獨斷而行之寧失三城無使咸陽危而悔也臣承乏侍御史首論諸生伏闕鼓倡羣小以脅君父又論大將劫寨激怒彊敵以誤朝廷計拙言强得罪去國今䝉陛下召歸西省俾贊書命不勝區區憂國之心又建割棄三關之議上咈聖心下違衆論可謂不知量矣秦王議割三城樓緩不肯對公子池以操講之說使王自擇如臣螻蟻之命直言無所阿隱其為狂愚死有餘責矣先是孫覿任侍御史日見太學生伏闕入劄子乞屏逐又于斡里雅布退師後入劄子乞和敵又論蔡京罪惡乞竄殛時吳敏當國大怒以妄論伏闕事奏罷侍御史責守和州吳敏罷去復召為中書舍人初上殿有此劄乞棄三鎮其論伏闕劄子曰臣伏見北庭大將擁萬騎入朔方跨大河直逼京闕忽覩神州隩區金城湯池之髙且大也斂兵不動遣使議和將相大臣合量彼已之勢勿亟勿徐示以閒暇使之疑懼有虎口之虞壓以衆兵不戰而威之使去之百全之上計也忽傳李綱劫寨之敗上驚朝聼下駭羣情為之奈何綱本書生素不知戰力小圖大妄發兵禍以帷幄之臣恃穿窬之謀以王者之師為攻劫之計藉令出于敵人不意偶獲小利猶為怒敵以誤朝廷而狂率無謀漏言有旬日之先提舉數千兵以入空寨敵軍四合盡驅而納諸綱中無一有脫者九重帝居宗廟社稷所在而僥幸于一擲滔天之罪車裂以狥死有餘誅方從薄罰而太學諸生陳東等聚衆伏闕鼓倡羣小妄謂宰相結連强鄰開闕延敵欲起李綱復還兵柄俄頃間嘯聚數萬撾登聞鼓呼聲動地呼擲瓦礫狙擊大臣屠裂中貴人流血滿道天子震驚與之召還李綱然後解去自古衰亂板蕩法紀大壞書傳所載未有如此之甚者也唐德宗時除國子司業陽城為道州刺史太學諸生詣闕請留夫城者道德文行一世標表嘗率諌官合論裴延齡不得為宰相名震天下諸生請留以為師範朝廷所當從而卒不從從之是衆為政也太學者賢士之關禮義之所自出也朝廷衆建師儒營宫室豐餼廪以飬士祭酒司業以率其屬博士掌訓導正録掌規矩恩禮深厚教法明具士當愓心易慮以承上之休德陳東等乃幸天下有大變蔑視官師不告而出鼓衆興訛厚誣朝廷朋比之罪人迫脅君父肆行毆戮遂至大􅀈而李綱不知羞愧尚帶其靣立于朝端陳東安罪學宫洋洋自若失今不治他日必有握兵之臣劫制天子武夫悍卒戕害將帥縣殺其令丞郡殺其守倅以衆暴寡必自兹始矣臣承乏國子司業時童貫修建武學落成矣陳東為教諭議率同列獻書童貫請車駕臨幸其中有不從者遂至歡譁臣問之曰武學落成何預太學有云頃者乘輿幸太學而武學生例被恩賜此東所以建獻書之議蓋東狂生不守分義其志止欲國盡付之柄猖狂不已以至稱亂今雖未即典刑當具申學法棄之逺方終身不齒為多士之戒無令覆出為惡以階禍亂天下幸甚其論和戎劄子曰臣聞人主之行異布衣布衣者飾小行競小亷自託于鄉里人主維天下安社稷固否耳陛下即大位坐席未暖而强敵深入長驅萬里所過州縣無一人攖其鋒者中外之憤孰不欲一戰驅之為快然兹事甚大陛下當飭將相大臣深思熟慮為萬全之計差之毫釐便有莫大之悔遺社稷之憂不可忽也臣竊讀國史見寶元康定間趙元昊為嫚書邀大名以怒朝廷規欲譴絶以激使其衆舉朝忿然皆曰發兵坑小醜耳時吳育為諌官奏言成平日久將不知兵士不知戰民不知勞若驟用之必有喪師蹶將之憂兵連民疲必有盜賊意外之患且當慎而撫之使未有以發得歲月之頃以其間選將擇士堅城鋭器為不可勝以待之雖元昊終于必叛而吾戰守之具立矣疏入宰相張士遜見之大笑曰人言吳舍人患心風果然于是决意用兵所向輒敗一方騷然大將劉平石元孫任福相繼戰沒大盜王倫轉掠江淮間契丹聚兵境上邀請三關之地中國耗虛邊民疲敝天子厭兵賜元昊夏國主如育初議今金人崛起為北方大國非元昊小醜之比舉國大入直抵京師又非元昊犯寨擾邊之盜天子之郊宗廟社稷太上皇兩宫在焉亦非戰地至于將率不才士卒驕惰軍政墮壞器械朽鈍財用空竭法度廢缺又非仁宗皇帝之時臣熟思之莫如和敵為上䇿强敵乘勝頓兵觀闕之下彼見天子宫室城池苑囿之大而西兵日至正疑懼不測之時陛下戒諸將堅壁固守不施一鏃不交一刃使野無所虜掠然後與之議和使彼竦然聼命卷甲而歸足以德矣其暇日搜擇名將選練將士謹蓄積修法度誠中國安强之勢所謂屈於一時信于萬世之下者也陛下受太上皇投艱之托至大至重豈若匹夫之勇小不忍遂較勝負于一擲之間耶伏望聖慈以趙元昊較北主之强弱以寶元康定較今日之盛衰臣一人雖不能勝衆論而憂國之言或有合于吳育特賜採納不勝幸甚又第二劄子曰臣聞道有經有權事有常有變知道之權者能摧剛而為柔適事之變者亦轉禍而為福今者强敵乘百戰百勝之威合諸衆控弦之士超邑赴都鼓行而至直抵京室以為中國有人乎此臣區區之愚力排羣議進和敵之䇿庶幾甘言重幣足以厭敵人求索之心紓一旦倉猝非常之變而後徐圖天下國家善後之計其權固在於此也昔漢髙帝仗一劒誅秦滅楚足定天下而冒頓亦崛起于北方呂太后稱制冒頓遺嫚書出惡言虐戲醜詆可謂甚矣當是謀臣猛將如陳平周勃灌嬰之徒固無恙而上將軍樊噲請以十萬衆橫行胸奴中豈不壯哉獨季布以謂外人不必與較得好言不足喜惡言不足怒第當自計利害何足與論是非吕侯翻然稱善詔大謁張澤持書幣奉車馬報謝遂結和親吕氏雅故本推轂髙帝就天下而季布為任俠以勇名關中一言從容消弭兵端貸兩國數萬生靈肝腦之禍非所謂大勇者乎豈若小丈夫悻悻然拊劍疾視斬頭穴胄以報睚眦之怨者哉臣又嘗讀國史澶淵之役敵懼請和諸將爭欲以兵㑹界河邀其歸可勦殺無噍類也真宗皇帝曰如何殺得盡祗結怨為邊患耳詔按兵勿戰縱使歸國自是諸將歡言秋髙馬肥復入攻矣或曰未也邊儲稍實復為盜糧矣真宗顧近臣曰將帥之臣平居無事瞋目抵掌欲赴功名臨時便誤事卿等豈不知此輩情狀乃相與和附信其說耶陛下觀今日之勢為何如大將劉延慶屯重兵於燕山一夕無故拔寨而遁人馬相籍躙蹄踵交道委棄金帛谷粟如山積金人長驅萬里無所阻隔職此之由也伏望聖慈監觀炎漢之興受命而帝羣臣佐命百姓歸仁之初真宗皇帝駕幸澶淵殺其驍將達蘭兵威大震之時尚不忍計校一時小利摧剛為柔以為萬世無疆之福固不俟臣言淆亂聖聼而豫奪之計已默定于聖心矣詔集文武百官議存棄三關地詔曰朕屈意議和無所不至雖衮冕車輅名號之類猶無所惜蓋欲保守祖宗之地土而金人必欲得三鎮今欲與之其利害如何欲不與之其利害如何朕當從衆而行之不敢自任可令御史臺告報百官初八日於尚書省集議以聞宰執親戚不預觀望令百官庭議係宗社安危各要見得實利害若割三鎮或不割各如何保無後患割之而來不割之而來各如何偹禦不得鹵莾朕無固必只從衆議是者行之王雲既還具說金人之意且聞尼堪臨河乃集文武百官於崇政殿共議存棄三關之地王雲唱和議誘說之習使為棄地之䇿建議大夫范宗尹以已願棄地之䇿示百官曰今日三鎮焉可不棄其言多引太王避狄去邠不以飬人者害人為言繇是許割三鎮者不勝其多宗尹其首也稱不可與者才三十人何㮚其首也持兩可之說又十數人與者之言曰三鎮朝廷既常許之今不與是我國失信于彼矣不若姑且與之縱復背約則天怒人怨師出有名可不戰而屈也不與者之言曰國家更三聖始得河東陵寢在焉河北天下之四支四支茍去無以為人人民賦貢乃其小爾况天下者太祖太宗之天下非陛下之天下敬瑭之事豈可遵乎耿南仲吳幵欲棄地而和喻汝礪梅執禮宋齊愈秦檜何㮚曹輔陳揚庭馮獬孫傳李若水等欲戰朝廷大臣優柔不斷集百官議于延和殿八日己巳集百官議三鎮于延英殿是日各給筆扎分列廊廡范宗尹乞豫之以紓禍至伏地流涕以請已而黃門持宗尹章疏示衆曰朝廷已有定議不得異論頃之宣問金人必欲得三鎮割與不割利害如何金人已與王雲約日割與不割金人之來如何守禦唯梅執禮孫傳吕好問洪芻秦檜陳國材等三十六人以為不可割餘皆從宗尹議中書舍人孫覿劄子曰臣聞蝮蠚手則斬手蠚足則斬足何也為惜於身也今外患迭至中原久安無偹傾國而至當順而撫之以幸無事而劫寨之臣猖狂妄作挑發兵禍以遺國家手足之害陛下當亟去之不果而腹心之患必矣方敵騎南下經河朔二千餘里所過州縣無一人一騎北向發一矢以抗其鋒者設欲據大河為界孰能禦之其欲得三關者猶以故地為名耳然紹聖用事者讐復元祐諸臣以棄地之罪削除名籍投竄嶺海禁錮子孫纍赦不宥可為酷矣今自大臣侍從與縉紳士大夫之衆非不知三關之地不得不豫也非不知豫三關之地可以緩兵紓禍也而元祐覆轍在前孰肯為國家安危之慮以蹈異日之悔莫如卷舌不言自為計耳臣何人首唱此議蓋區區之慮為割地之後金人退聼兩國休兵得嵗月之頃扶顛持危以彊國勢選將勵兵以固無虞興衰撥亂可以復古建中興之烈未為失也倘以失三鎮為悔追責首議之臣輸為城旦投之窮裔臣實甘之不敢辭也臣又聞擇禍莫若輕擇福莫若重今日之事有禍無福河北陵寢與河南孰重三鎮之地與京師孰重陛下之所輕重判然不疑則當亟去手足之患無重腹心之纍矣先是金人遣王雲約十五日以前告和割地書到不然以十五日渡河至是何㮚謂唐恪曰三鎮之地割之則傷河外之情不割則太原真定已失守矣不若任之但飭守偹待之恪曰唯是日河東金人已至澤潞斡里雅布在慶源城下朝廷從衆議割地以舒難乃以康王王雲復持禮物請和割地北去後數日上親閲不棄地之䇿方略優長大學博士万俟虛監察御史朝貫之等八人令執政審察其材而召對之虛貫之見少宰唐恪曰三鎮乃祖宗之地豈可棄之金人之志不在于割地實欲侵軼中原故藉三鎮以為基公為宰輔宜召天下之兵與之力爭也唐恪言曰出軍屢衄召兵無益徒費芻糧擾百姓而已守信割地誠為上䇿且上欲以耿南仲王尚書定議而遣康王矣諸公召對不宜髙論恐上愈惑虛貫之被㫖上殿二人咸曰河北三關契丹乘晋開運之難而盜有之周世宗御河親征始歸其地河東太原劉旻父子據有數世周世宗一征太祖太宗再征而後定積二十年之功殘數萬人之命方始一統而中國有三鎮得之誠難也且無太原則不能控制西北無瀛定州則不能保衛王室三鎮于中國如人四支也一支有病思欲去之既不全人從而喪身有矣况三國之民皆陛下赤子割地則棄民為民父母而棄其子孫豈為萬全之道乎冒頓一匹夫也寧棄金帛妻妾而不忍棄地故終能威敵而保有疆土今陛下富有四海為中原主奈何反棄土為匹夫所恥哉大臣為朝廷以此圖國是忘萬世之業而茍圖目前之安由其計議踈拙致基本傾危誠可痛惜東漢鄧隲欲棄凉州虞詡謂疽食浸唾將無限極南唐鍾謨願棄江淮宋齊邱謂賣國窺利徒傾社稷然則為人臣而願棄國之地豈忠于主哉上曰然則奈何虛貫之曰金人率衆脅地此將深入邦畿為今之計當召四道兵二十萬與衛兵還列城寨以衛王室然後以羽檄召天下勤王兵分屯近甸絶其所掠使深入之冦不能持久待其困弊然後擊之誠萬全之計于是上感悟不然棄地務為督兵羅索陷翼城縣先是知縣向淙棄城東走入曹公山民居以城降敵三朝北盟㑹編卷六十二
