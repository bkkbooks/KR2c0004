body:
  text: 三朝北盟㑹編卷七十五宋徐夢莘撰靖康中帙起靖康二年正月十六日丙午盡其日十六日丙午駕在青城進士叚光逺致書於金人乞囘車駕大宋進士叚光逺謹齋沐裁書獻於大金元帥軍前僕嘗讀左氏春秋傳有曰親仁善鄰國之寳也又嘗讀禮記聘義有曰輕財重禮則民作遜矣讀至斯言掩卷長嘆竊謂非賢人之儔誰如此仰而思之在昔太上皇帝膺天明命以揖遜受禪奄有神器為天下君創業垂統重熈累洽垂二百年東漸西被南洽北暢薄海内外悉為郡縣殊方絶域皆為鄰國聘問交通絡繹道路其間義重禮隆㤙德深厚方之他國惟大金皇帝為然比年以來本朝不幸姦臣用事宦官撓權不知陳善閉邪而格其非心罔有獻可替否而引之當道欺君罔上蠧國害民靡所不至姦臣可誅士民可弔事一至此則弔民問罪之師有不得已而舉也恭惟大金皇帝舉問罪之師施好生之德念今聖之有道憫斯民之無辜宗社再安生靈復全深厚之德若海涵而春育生成之賜若天覆而地載兩國永和萬民悦服夫如是則親仁善鄰曷以加於此哉先時枉駕鑾輿為民請命重䝉金諾與國通和常謂髪膚亦所不惜况於金帛豈復辭哉宵旰焦勞不遑寢食官吏根括急於星火竭帑蔵之所積罄貧下之所有甘心獻納莫或敢違雖曠蕩之恩難以論報而有限之財恐或不敷久留聖駕痛切民心夙夜匪懈而事君之禮發於朝號泣呼天而痛君之民滿於道仰望㤙慈再垂軫念冀聖駕之早還慰下民之痛切夫如是則輕財重禮曷以加於此哉伏念光逺草茆寒士沐浴膏澤涵養聖涯隂受其賜于兹有年才䟽命蹇薄德無階今兹聖駕䝉塵於外儻雖至愚噫嗚泣涕疾首痛心甚於庻民尚幸仰賴元帥再生之㤙若天地之無不覆載於人無所不容僕是以敢申忠義激動之誠干冒威嚴仰期垂聽俯賜矜憐無任哀懇不宣金人逼劉韐受官韐死之劉子羽言父死節曰亡考自宣撫使被召十一月十五日到闕十六日引對時已報金人渡河即有㫖除提舉京城四壁守禦繼而金人兩路兵薄城下盛陳攻具為必取計亡考遍歴京城知城大難守兵懦不可恃四方未有援師力於上前奏事勢危急須於金人未攻城前遣使議和一靣除康王兵馬元帥檄天下入援上深以為然十一月十八日聶昌出使除亾考都大京城四壁守禦繼而金人兩路兵薄城下盛陳攻具為必取計繼而唐恪宫祠㮚拜相力主戰議以亡考極言不可輕戰降㫖謂亡考誤國搖民落職更降五官宫祠閠十一月十五日何㮚出兵并遣郭京領兵自陳州門出戰失利金人乗勝遂陷南壁二十八日召亡考至内東門宣諭亡考謂不從卿言乃有今日何㮚誤朕二十九日從駕出都至南薫門十二月初二日郊外歸初三日有快行家親事官來宣亡考至内東門云已有㫖差往軍前充割地官初五日早出門後知金人以亡考知真定府有聲來取到軍前在夀聖院安下差僕射韓正管伴云國相久知資政名今欲任用亡考但力辭正月十三日韓正取亡考去相見云主上再出郊軍中已議廢滅宗社别立異姓并取太上皇國相已說與資政為代兼說亡考以立異姓之後兵連禍結不若此去取富貴亡考歸呼使臣陳瓘等說主上已出金欲滅我宗社乃欲用我當國手冩一批字付陳瓘曰大金不以予為罪而以予為可用夫貞女不侍兩夫忠臣不事兩君况主憂臣辱主辱臣死以順為正妾婦之道所謂大丈夫富貴不能滛威武不能屈予今日所以有死也令持歸正月十六日沐浴更衣以衣縧自縊敵人無不興歎泣曰劉相公忠臣於寨中尋之親隨使臣陳瓘等共􅀈聖夀院西南岡山仍遍於壁柱間大題劉資政􅀈處三月二十九日陳瓘自軍前逃歸四月初四日金人北歸初六日具棺衾故將王缺名以兵防䕶出城大殮在淺土凢百日顔色如生當日扶䕶入城大敵入郊旋致入郛之禍外鄰背約敢生邀主之謀海隅震驚神明悲憤念守國守疆之力無荷戈衛上之勤舉首籲天歸命叩佛六龍返正願叶視履之宜九廟再安益介靈長之祉靖康小録曰公諱韐金人既敗誓約擁師而南公帥真定盛設備以待之敵知而不攻暨議和北歸公建䇿請速援太原勝負之本也遂召公為制置使既而遷宣撫副使駐軍遼州與諸路援兵犄角而進九月大原失守諸屯之兵皆望風潰而公一軍獨全於是天子命公歸援河朔師至信德府而真定已陷有詔移軍大名敵既濟河復取公入覲命公為提舉京城四壁守禦公日夜親臨衆不敢懈敵蟻附而前力攻東壁公親乗城以死拒敵閏十一月以言章罷守禦授以宫祠未㡬復命專領北壁守禦二十五日敵自南壁登城二十六日敵循城而北公親持鎗督衆力戰至夕諸軍稍稍遁去公遂奔趨禁中以衛乘輿金既偽和且索公出敵雅知公真定之政時金之樞宻使韓政年高尼堪欲以公代之公力辭焉遂館公於樞宻院屢欲用公而公以病告終不肯受金亦未之廹也上䝉塵軍中正月二十六日敵因遣韓政說公曰帝不復歸矣公冝受命尚何望乎公為謝覬少緩之自書家信其畧曰忠臣不事二君貞女不事二夫此吾今日所以有死也付隨行使臣陳瓘劉玠使乘間入城付公之子子羽因闔戸自經而死金將大怒户之於塗曰是不從大國之命者久之事稍緩瓘等夜竊公尸瘞之於蔬圃因相與逃入城中敵人既去之後公子子羽同瓘等出城棺殮時㡬百日而公容貎不壞今上登極贈公特進資政殿大學士嗚呼貪生而惡死喜富貴而羞貧賤人人不易之情也矧世已顛覆莫能扶持士大夫皆欲全一介之命其倒行逆施深慮巧畫無所不至而况敵欽其名欲寵異之而乃甘心於死乎節義之著無愧古人其可無述也詩曰有赫劉公心在王室氣呑强敵忠貫日月九鼎既淪四溟蕩潏公如山嶽萬仞屹屹富貴莫誘威武莫屈仗節而死無愧委質中興姓氏録曰劉韐建州人也元祐元年登進士第宣和初知越州方臘反來攻城韐極力偹禦戰破之靖康中太原府已陷乃擢韐資政殿大學士河東宣撫副使張俊苗傳皆𨽻麾下韐與大金戰河東敗則留俊傳軍信德府而走京師降八官落職罷之及大金攻京城上登城見䕶龍河填疊已定李擢安扶守禦不盡心罷之復以韐與田灝為提舉官及城陷韐自縊而死年六十贈謚忠顯衆哀其忠宇文虚中撰宋故資政殿學士銀青光禄大夫贈特進資政大學士贈開封府儀同三司謚忠顯劉公神道碑曰宋興百七十載祖宗以仁厚忠恕亷耻待士大夫自一命以上無復前世之戮辱亦有致位通顯終身安榮率為子孫數世之利固冝人人自重知所報本一旦禍生隣釁京師失守公卿吏郎交首北庭往往為之領䄂耳目至誑迫君父致之敵營之下天地凄慘神人憤泣獨二人以死節聞曰資政殿學士劉公韐曰兵部侍郎李公若水當擾攘變故之際議者不敢昌言其忠金人尚高劉公之節至為小殮瘞覆掲示其處平昔無事時公凢使於外未嘗陪鳴玉之間一入朝言者隨而擊之至在圍城中上書不為時相所容一日死難毅然在他人之前乃知忠義之士固自有守方難之興劉公為真定安撫使率軍民固守金人攻城不下則分兵綴之引大軍而南上初即位羽檄召天下兵未集乃屈已捐大幣為城下之盟許割以和敵僅退師旬日之間援兵大集用事者乘士民之憤奏遣數大帥分總而北期于北懾燕薊西解太原之圍其言憤厲明决若可以漏刻制勝獨劉公憂之屢言亟戰怒敵為非是金兵以暑度陘㑹山西之師于雲中所留兵皆分就畜牧覘者以散將歸告於朝大臣責讓遣使督戰項背相望大將种師中感憤泣下帥衆以泣出遇敵死之而朝廷所遣别將姚古解潛折可求相繼奔敗中外震恐上知公可用乃以為宣撫使使集散兵扼邢洺既太原卒陷真定亦為金人所據事益急乃驛召公赴闕久之敵合兩路大軍皆至京城下公又申前議以謂大城難守兵危難戰惟有遣使欵師緩其攻城之謀開元帥府以節制天下使之入援宰相折公於御榻前曰大抵臣僚自北來皆張大敵勢以戰為非今韐亦然欵師非䇿惟有戰耳公曰今日事勢已至此乃遣使欵師固為非䇿然不於此日引月長以待援兵之至恐無他計若必欲戰則前事有鑒非臣所敢與知也宰相怒以公為沮國搖民即黜之及城陷召公入見上雪泣執公手曰不用卿言至此金人知公名請上書詔召至軍前宰相猶紿公為割地使公至敵軍中踰月乃使舘伴韓政諭以用公之意因言南朝已擇立他姓自是兵連禍結卒未平定冝與家屬北去自保富貴公慨然曰有是哉歸而沐浴易服取幅紙書曰金人不以我為有罪而以我為可用但貞女不事二夫忠臣不事兩君况主憂臣危主辱臣死以順為正者妾婦之道所當大丈夫富貴不能滛威武不能屈此予所以有死也書畢飲杯酒以衣縧自縊而卒嗚呼古語有之謀人之邦國危則亡之公之始議欲以計欵敵而以戰激怒為戒顓謀者與公相違卒以致禍顓謀者不能即死而公乃先死此尤為忠臣義士之所難也初金人起自海上屢敗契丹遼東人避亂有浮海之登萊者或言因耶律氏之衰可以復取燕薊太上皇念信誓之重詔大臣集議皆唯唯兩可唯鄭居中鄧洵武以為不然時相乃欲因此固位與童貫相表裏遂遣使持貫書從海道覘其虚實使與金人來約我舉兵以夾攻契丹太上重其事依違未决㑹近臣有窺覬相位者乘間進䇿且以言動朝廷曰彼約我以夾攻我若不從彼心反憾起異時兵端悔之何及遂復使通國書許以如約因以燕地為請及宣和壬寅邊臣奏契丹主僖敗於白水其叔父淳僣立燕人來請師師到可不戰而下貫自江浙歸遽奏引兵而出太上以公叅其軍謀公自越州乘傳至瀛鄚間而种師道之軍已潰於白溝貫憂懼不知所出公至雄州乃自請詣軍前就師道議歸而語貫曰燕人固守未可輕進且祖宗有誓冝且班師㑹蔡攸來出所得太上親札曰祖宗信誓指天誓日又曰燕人説則取之不說則勿取之貫以公言契合遂劾奏髙陽帥侯益知雄州不和先誣妄誤國乃分屯以歸未幾耶律淳死無嗣其妃攝政議者以乘隙為易貫攸復欲進兵中使自京師來出御札督戰且諭將佐寮屬曰朝廷與金人約夾攻契丹久矣我若罷兵彼將滅遼與我為隣得無責言乎若使異時生釁誰任其責公曰與敵人共事非計也貫怒曰此出上意公以為非計耶公曰自古與敵人共事鮮無後患事不成則㤙威俱廢四隣解體事成則敵恃功必有邀索唐以囘紇破安禄山納侮召亂百年不已况金人氣燄非囘紇之比乎凢争議踰旬未能奪㑹郭藥師以涿州降我師遂出劉延慶為大將時當軸大臣乃昔年窺覬相位者欲沮宣撫司乃自京歸遣使厚許嵗幣求燕地與金人欲以不戰而得地自以為功仍遣人宻戒延慶以毋輕進時有㫖先下涿易功賞三省故緩其事凢軍前奏請率多譴却於是大軍日行十里駐涿州良鄉縣踰月不前將士暴露困怠鋭氣銷阻而潰卒不能再舉金人自居庸入燕以歸我嵗増幣鉅億萬金人始益驕傲下視中國矣自出師取燕山以至靖康城守皆叅預議謀毎與用事者相戾乃繼之以死以明君臣之義與夫危人之國敗人之師而殺身以謝之者固有間矣嗟乎前日廷議之臣不處彼已之勢不量可否之宜引道聽塗説小民喧嘩之言以斷天下安危大計既相與敗國矣則又歸過君父滅弃臣子之禮茍可逢迎敵意求容於敵國者無所不至也故上北狩所留詔札之㫖無不動人逮盛德嗣興宗社復寧誤國從偽者皆幸得生存而公乃先死不獲復見天日嗚呼天人之際善惡之報其果非耶不然則幸而生與不幸而死固自有數而不可致詰耶夫天以高名全節畀忠義之人不待留身而後顯則公所以捐其所輕輙取其所重盖所謂求仁而得仁者是豈可以幸不幸為言哉公歸葬建州之崇安其子以虗中與公契舊目見謀議本末乃以表墓之文見委因而論著大節事係天下之所以安危者掲示道左且以辨明取燕之失不在上皇仍繫之以詞以槩舉公平生之事是區區之夙願也其詞曰劉號著姓始家咸秦逮公六世乃遷甌閩曽祖文廣甘於隠淪祖父太素以儒學振顓授魯史其徒千人皇考民先益衍斯文遂繇㤙舉側於縉紳悉以公貴㤙封荐臻朝議正舉賁於幽窀英英厥配宜其累姻咸寧感義秩為小君公生而異幼耽經史來試有司䇿名上第重慶在堂撫公以喜板輿從養時其甘㫖豐城一尉活彼饑民令於隴城調發惟均王師度隴以公從軍驟列朝籍聲稱藹聞時方開邊轉餉是急公㧾平貨歲登萬億斥羡于敵以易兵食公無弃財物無勤力帝用錫祉授以中秘郇瑕之寶邊計仰給故籍弗存利源湮塞命公㧾領制置之職刋燬之餘是捃是緝迄於有成纔期嵗力祕殿論著集英為首或繇材選或以功授八遷至此褒訓每厚遂㧾輸轉使於闗右鄜延謀帥以公守之兵衂湼中聲揺西陲公列將卒乘虗出竒踰月卒解震武之圍隐如長城名動羗陲夏人欵邊自狀其罪願附章聞矜此恫悔僉曰彼羗反覆未改冝益鏖兵勿恃其紿公曰不然彼累戰敗以我全盛尚虞後害相彼小邦寧無懲艾遂以便冝列言于朝帝有㤙言和此天驕東暨麟豊西踰臨洮蔚其稼穡更休戌揺自公一言致彼旅獒西清次對用旌厥勞公厭乘邊東越剖符越乃澤國湖水是瀦下流灌溉舄鹵膏膄誰俾涸此利其歲租飯豆羹芋困不重輸藉在水衡好用事須孰敢弗督以速刑書公為喟然䟽入以時當宁慨嘆恨不夙知盡捐所賦活此憊羸桐溪囘穴有盗竊發既蹂餘杭七州幅裂官吏曹奔官軍氣奪或請公避公顧而言為上郡首其可弃捐乃治闉閽乃礪戈鋋畜牧牧野什伍比聨敵來瞰城公親披堅揮兵出閗空拳争先一戰而勝肩體盈川温台暨明賴公以全越氏德公郊墟市㕓飯食必祝願公永年帝聞民情謡譽籍籍予有忠臣功映皎日超陞秘殿命書赫奕寶帶名馬終朝三錫公方應召邊吏請師命公便道往賛樞機幕中杭議人為公危常山請帥未至而移汾陽強敵以衆來歸公上論䇿不可挽覊曷以厚廪縻之京師章上報聞後患終遺帝念久勤俾榮故鄉爰自建安易麾福唐式寵其行進職延康過家上塜三祖熒煌里民喜來牛酒相望乃揮錫金儲為義莊燕及功緦時其奉嘗公頃過都見辭留連造請臺省故例則然或者中公以逢貴權謂於中司有所謫言退領祠宫曽未踰年擢守荆渚復來建安盡還故職以榮使旃盗起河朔再帥常山公之來斯羣盗方熾單騎入境覘者􅌓眙其首柴宏世服耘耔不勝誅求乘憤而起公還其植歸安田里宏感誠言矢死無二洌彼潢池畀以榮利不飭吏士直造戎壘開諭禍福不施笞箠帝用嘉之永錫爾祉煌煌命服重逾粲麗副以名駒繡韉瑶轡降人調馬莫敢抗阻詔俾内郡悉空牧圉公以便冝格詔弗與有奸根株窺伺廪庾雜以糠覈貪如雀䑕亷車之姻誰其敢忤公命劾治趣告獄具營捄衆至卒竄他所藉其家資以餉禁旅兵鈐趙繹中貴人子取賂于軍以免戰士公得其實叱下械繋貴人憤恨泣訴宸扆上慮佚罰建治廷尉自是姦贜望風披靡惟時敵人因此造釁筦樞暗事專兵以逞尚欲受地開雲中郡公列其寔逢彼之愠文移未復敵軍壓境憬彼渠魁挾我叛師驅馬南牧蠭集都畿帝用屈已要盟乃歸哀取金帛所過無遺大臣特詔廹公以威既竭府庫又取我私公不為應郤之有辭敵憤未泄環城欲攻負彼衆戰舞于梯衝公命蹶張潰其狂鋒久乃逸去全此危墉進職資政寵渥彌豐敵之再來公䕶諸將敗亡之餘師殱氣䘮公以忠義激于悲壯手執大麾視我所向有詔來覲閉於重圍獻議不合煩言乘之公斥未久迄至阽危公之畫謀無非先計又以死明君臣之義雖古烈士視公有愧天子震悼褒卹相繼還畀舊秩贈大學士易名忠顯惟以節恵公娶李氏進封康樂繼室曰呂敏於婦德安康名郡承其㤙渥公子三人詒訓清忠長曰子羽綽有父風入奉朝請執鴈以從進直芸閣亦以似公子翼子翬八品仕初將命東浙帝以詔除管記幕府從公辟書有女出適曰祝可乆通藉於朝在君之右二孫珙瑺嶷嶷並秀公仕三紀屢經郊宥䝯彼㤙秩叔父之後故以常延尚遺二幼公生丁未治平二禩迨其捐軀嵗亦丁未拱辰之麓新阡載起掲此銘詩亶告來裔三朝北盟㑹編卷七十五
