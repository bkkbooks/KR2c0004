body:
  text: 三朝北盟㑹編卷二百二十八宋徐夢莘撰炎興下帙起紹興三十一年五月十九日辛卯盡二十八日庚子五月十九日辛卯金人使虎衞上將軍殿前都㸃檢髙景山通議大夫刑部侍郎王全來賀生辰奏言淵聖皇帝升遐等事晁公忞金人敗盟記曰紹興辛巳三十一年五月十九日依年例如常議駕坐紫宸殿引金人賀生辰使副虎衛上將軍殿前都㸃檢髙景山通議大夫刑部侍郎王全奉捧國書陞殿内侍知省接授左僕射次三省樞密院同進呈訖却授知省畢各依位立内王全東壁面北厲聲奏曰皇帝特有聖㫖昨自東昏王時兩國講和朕當時雖尚年少未任宰執亦備知自朕即位後一二年間帝曽差祈請使巫及等來言及宗屬及増加帝號等事朕以即位之初未暇及此當時不允許其所言親屬中今則為天水郡公昨以風疾身故外所請後因熟慮似亦可從今歲貢銀絹數多江南出産不甚豐厚須是取民間想必難備朕亦别有思度兼為江水為界私渡甚多其間往來越境者雖嚴戒亦難杜絶及江之北漢水之東雖有界至而南北叛亡之人想常互有適足引慝邊事不知故梁王當時何由如此分畫來朕到南京方知欲遣人于帝處備諭此意近有司奏吿帝以朕行幸南京欲遣使賀灼知帝意甚勤厚就因此使欲便諭及若只常使前來縁事稍重恐不能盡達兼南京宫闕初秋工畢朕以河南府龍門以南地氣稍凉兼牧放水草亦甚寛廣于此過夏擬于八月初旬到南京當于左僕射湯思退右僕射陳康伯及同王綸知樞院事此人内有可差一員兼殿前太尉楊存中最是舊人練知事務江已北山川地里備曽經厯可以言事亦當遣來及如鄭藻輩及内臣中選擇旁近委信者一名共四人同使前來不過八月十五日以前到南京朕當宣諭此事可從朕縁淮南地里朕昔在軍前頗曽行厯土田往往荒瘠人民不多應有户田盡與江南朕所言者唯土田而已務欲兩國界至分明不生邊事至如此意稍有所難朕亦必從來使回日已後朕以前來止曽經由泗壽州地方外陳蔡唐鄧邊面不曽行厯及到彼處圍塲頗多約于九月末旬前去巡獵十一月十二日却到南京帝于差來正旦使處當備道來朕知端的于次年二月三月亦未曽知欲因幸温湯經由河東路分却還中都去奏訖降殿朝見畢次三節人從朝見訖駕興是日禮房報奉聖㫖使人朝見訖垂拱殿茶酒為臟腑不調可移驛中排辦仍令執政押賜差㕘知政事楊椿押宴初王全奏陳事因人莫得而知既而詔王全曰適來奏事因可具奏狀以聞故得知者一二焉是時左僕射陳康伯右僕射朱倬知樞密院事葉義問㕘知政事楊椿同知樞密院事周麟之既知金人有渝盟之端又報孝慈淵聖皇帝訃音是日宰執入當聚議講究討論凶制典故調發軍馬扞禦江淮之䇿趙甡之中興遺史曰王全髙景山來賀生辰也自入境有凶悍之狀過平江秀州舟中以弓矢射夾岸居人官司莫敢誰何但告報居人闔户而已既到行在命何溥館之引見之日接國書畢王全奉事稱語訥不能敷奏乞令副使髙景山代奏事許之全招景山景山欲升殿侍衞及閤門官止之上招令升殿景山乃升殿狀貌不恭景山直言淵聖升遐事言語鄙俗上號慟歸禁中景山曰我來理㑹者兩國事譊譊不已帶御器械李横約景山下殿曰不得無禮有事朝廷理㑹使人猶在殿中班皆未退帶御器械劉炎告宰相陳康伯曰使人在廷未退有茶酒之禮宜奏聞免之康伯曰公自奏聞炎遂轉屏風而入見上哭泣炎奏其事淵聖皇帝訃音忽覺聖躬不安閤門賜茶酒宜免使人且退班遂退朝廷乃行下諸軍及諸監司帥臣曰契勘大金意在敗盟恐致興兵仰措置無落奸便河北進士梁勲夜行晝伏歸朝廷上書言北事極詳且言金人必舉兵秦檜怒嗔决之押赴恵州編管檜死朝廷欲用勲已死至是人皆思勲之忠義而切齒檜之不容忠臣二十日壬辰宰執内殿奏事宰執内殿奏事禮房報奉聖㫖為臟腑不調二十一日上壽并二十日習上壽儀並免二十一日癸巳免聖節上壽天申節已降㫖揮免上壽宰執並赴臨安府明慶寺滿散聖節道塲同知樞密院周麟之赴都亭押伴御宴二十二日甲午宰執内殿奏事禮房報孝慈淵聖皇帝升遐丁未録欽宗實録孝慈淵聖皇帝道君太上皇帝長子母曰恭恵皇后王氏以元符三年四月十三日生于坤寧殿九月賜名亶授檢校太尉山南東道節度使韓國公建中靖國元年六月遷開府儀同三司興徳軍節度使進封京兆郡王崇寧元年二月改賜名烜八月又改賜今名大觀元年十一月詔曰朕荷天眷佑景命有僕承家之慶是生多男年近幼學未親師友因嚴以教宜及其時京兆郡王桓髙密郡王楷可于來年春擇日出就外學其輔導講讀之官宜以端亮鯁直有文學政事人舉選以稱朕意記室翊善可如王友例令王答拜于是以祕書監蔡崇為翊善左司員外郎沈錫為侍講國子司業江澥為記室安徳軍觀察留後知入内内侍省楊震提舉管勾本位大觀二年正月遷司空武昌軍節度進封定王八月以國子祭酒江澥為翊善起居郎翟汝文為侍講起居舍人俞㮚為記室俞㮚遷起居郎石公弼代之㑹恵恭皇后崩至政和元年二月始詔太史擇日以三月己丑出就資善堂聽講讀以光禄少卿李詩為翊善辟雍司業耿南仲為侍講司門員外郎蘇修為記室甲寅詔宰臣執政官許就資善堂見定王桓嘉王楷王迎揖于門升堂就坐王西向宰臣執政官東向送亦如之二年九月侍講王居中因奏事講筵乞講讀官至資善堂見二王許之四月蘇修卒以左司員外郎張叔夜為記室叔夜罷以符寳郎陳鍔代之三年正月改官制授少保四年二月甲戌行冠禮于文徳殿或云福寧殿先是御制冠禮降議禮局載五禮新儀之首至是始舉行焉三月辛卯詔曰若昔明王誕受厥命建立儲貳以係天下之心朕嗣無疆大厯荷天之休誕育元良是居冡嫡長子桓年建志學冠于治朝百辟具瞻主器之長子永為宗廟之重父子之恩考循舊章正位東宫明兩作離為國大本可以來春出閣立為皇太子其建宫室設官屬與儀物制度宜令有司討論前禮前期辨具以聞邦家之慶與四海共之十一月己亥詔皇太子㑹慶上壽押百僚班又詔皇太子謁廟特許宗室陪禮五年二月乙巳制曰昔先王必建儲貳以隆萬世之統以係四海之心朕撫世承平念國大本遹追來孝垂裕後昆永為承宗之艱莫如主器之長咨爾萬方衆聽予一人之吿猷皇太長子少保武昌軍節度使定王孝友得于天資温良成于日就出學外傅率履無違既冠阼階其儀可象方景命有僕介壽考之萬年而明兩作離兆本支之百世蔽自朕志格于天心孚告大廷申錫顯册夫慎乃徳惟忠惟孝欽汝止惟幾惟康用克相于我家以對揚于休命可立為皇太子仍令所司擇日備禮册命丁未出閣詔改其閣為府甲寅有司備法駕儀仗列于大慶殿文武百官各服朝服立班于廷百執事官入就位皇帝服通天冠絳紗袍御殿皇太子冠逺遊冠衣朱明衣執躬圭以入受册于廷以翰林學士承㫖强淵明為禮儀使翰林學士王黼撰册文册文或云係劉正夫撰審如是則禮儀使亦當用執政宣和殿學士蔡攸書册殿中監髙仲書寳禮畢太師魯國公蔡京率百官稱賀賀訖又詣東宫賀皇太子如故事以户部尚書劉炳翰林學士承㫖强淵明為賓客中書舍人蔡靖陳邦光并為詹事秘書監李詩為顯謨閣待制左庻子兼侍讀宗正少卿耿南仲為徽猷閣待制右庻子兼侍讀秘書少監蘇烜改名煇為左諭德太常少卿葛次衆為右諭徳國子司業曽懋殿中侍御史華實並為舍人知入内内侍有楊震董慤提舉左右春坊事内侍楊客機黎景年全淵張彦卿周珣王若冲王珂管勾左右春坊事劉淵為家令皇甫僅為承受丁巳備法駕謁太廟奏免乗金輅及用鹵薄止依常儀乗馬至太廟易朝服行禮又奏訖免宫僚稱臣並從之戊午奏臣竊見自昔東宫建司設局張官置吏往往竊有所擬無所不備考其職事實無毫末顯是慕為虚名徒費廪食書曰慎乃儉徳惟懷永圖臣立身之始敢不念茲伏望聖慈詳察應東宫官吏不必具備諸司庻局頗令兼攝至于閒徒冗卒舊例有者亦可捐除務從儉約如此則不惟臣少安私分仍得清心省事專精問學仰副君父教育之意又奏臣昨資善堂講讀尋須候邇英經筵已開方取㫖定日恭惟聖學髙妙羣臣莫敢及躬御經筵但取遵用祖宗故事非待儒臣講說修輔聖明如臣之愚正當力學不可曠日豈應擬視經筵兼臣問安視膳之外遇還府第綽有餘暇况不同往日深在禁嚴出入不敢自便今欲乞聖慈許令毎日不拘早晚但稍有間隙即請學官赴聽講讀所貴文學日益有以副聖慈眷遇之意並從之三月乙酉詔皇太子遇天寧節赴垂拱殿上壽于親王前别列為一班家令劉淵罷以梁平代之六年四月以禮部尚書白時中刑部尚書慕容彦逢為賓客吏部侍郎劉煥給事中方㑹為詹事太常寺少卿賈安宅為舍人内符寶郎馮楊為家令六月乙亥詔納故少傅恩平郡王朱伯才女孺人朱氏為妃令所司備禮册命是月癸未親迎癸丑詔自今車駕行幸皇太子免起居從駕七年十月生子為嫡皇孫封秩比皇子以起居郎李彌大起居舍人趙野為舍人彌大野辭以太卿少卿髙樂為古文殿修撰國子司業魏憲直龍圖閣専其事八年劉煥方㑹罷以左庻子李詩右庶子耿南仲為詹事宣和元年以秘書少監曽懋秘書監王易簡為舍人懋遷以國子司業程振代之七年李詩卒以禮部侍郎王易簡為顯謨閣直學士充詹事兼侍讀上聰明仁孝好學而善文自以地偪而望崇每懐兢畏講讀之暇惟以髹器貯魚而觀之他事一不關懷人莫能測也宣和七年十二月皇太子除開封牧二十一日差内侍梁邦彦黄僅押賜皇太子碾玉龍束帶一條不許辭免二十二日閣分大内娘子用小轎十餘乘入東宫府議事二十三日申時候入内侍讀官黄僅等傳聖㫖宣押皇太子入殿内續有親從官十餘人催上馬入殿至夜不出至五更太上皇帝徑出殿徃龍徳宫寧徳皇后出往擷景園改充寧徳宫是日皇太子登寳位先是太上皇帝御玉華閣先召宰執事及給事中吳敏等日晡内禪之意已决擢吳敏為門下侍郎草傳位詔召百官班垂拱殿下宣手詔㫖是夕夜皇太子入居禁中覆以御袍皇太子俯伏感涕力辭因得疾召東宫耿南仲視醫藥至夜半少蘇翌日又固辭不從因即大位御垂拱殿見宰執百官大赦天下宣和七年十二月二十三日庚申皇帝即位改元靖康元年冬尼堪斡里雅布攻京師閏十一月城破四月北狩在敵地三十五年至是報升遐焉蔡絛國史後補曰皇太子者上嫡長子也册曰惠恭皇后王氏元符三年夏四月十有三日丑時生于坤寧殿其夕恵恭皇后夢宣徳正門大啟有兩紅旗各一吉字以入而太子生焉頃哲廟以無子致紛紜及上即位不數月便有元良之慶中外聞而大喜遂赦天下後累封至定王太子生而岐㠜顧視不凡上甚愛之及冠講冠禮于文徳正衙上意先以示羣下取詩誦為武志也當廷命字曰伯志方大廷樂作百官衞士仰首繽紛閣門臺吏約束班列端笏立聲喧屬不能禁止上駭然使内臣趨下尋問其故則報曰日重輪時青天白日略無雲而成五色暈也立為皇太子金人背盟時上亦自懼思有以脫難者又素有禪意冬十有二月十九日上諭大臣以皇太子為開封牧始知果有意禪初欲禪燕王而鄭后之力天意得囘二十二日太子入朝詔賜緋方玉帶仍去所佩魚排方玉帶乗輿服也吳敏謂未快中外意二十三日敏對罷上有疾不能語又書曰諸公如何又無語者上顧左右無應者乃自書曰皇太子某可即皇帝位予稱教主道君退處龍徳宫乃命敏入作禪詔因召太子太子至大臣又捨上而迎奉太子至榻前童貫李邦彦以御衣衣太子太子叩頭自撲哀動左右上又書曰汝不受則不孝也太子曰臣若受之則不孝也上又書令召皇后后至諭太子曰老矣吾夫婦欲以身托汝也太子猶力辭幾至氣絶上堅命立之是為淵聖孝慈皇帝宰執入堂議事宰執入堂請殿前太尉成關步軍太尉李捧并太傅和義郡王楊存中赴堂共議調發軍馬保固江淮既退又請吏部尚書凌景夏吏部侍郎汪應辰户部侍郎錢瑞禮部侍郎金安節刑部侍郎張運工部侍郎黄中給事中兼權兵部侍郎黄祖舜中書舍人虞允文楊邦弼侍御史陳俊卿正言劉度聚議久之退宰執服常服金帶率文武百官入和寧門到天章閣南行路隙地面北立班左僕射陳康伯稍前讀孝慈淵聖皇帝舉哀文曰今月十九日金國報孝慈淵聖皇帝升遐舉哀退復位舉哀十五聲訖再拜興是時禁中亦行舉哀之禮哀痛于外聽宰執已下舉哀訖回班面東後殿進名慰皇帝兩拜次進名奉慰皇后兩拜訖退是日免人使校射于玉津園錫賜依例二十三日乙未安奉淵聖皇帝几筵禮房報自舉哀日不視事同日于學士院内安奉几筵用巳時八刻宰執入堂俟午正率百官服常服黒角帶入和寧門裏幕次俟立班訖入几筵殿下舉哀朝臨四拜訖入堂至申時晡臨如朝臨之義朱倬都亭驛押宴右僕射朱倬入都亭驛押伴御宴是日從例賜北使副酒各四大金缾吃食果子四大金稜犀皮合缾合金器悉賜與之二十四日甲申宰執内殿素幈奏亊訖赴朝如儀二十五日乙酉宰執素幈奏事訖赴朝如儀少保利州東路御前都統制吳璘除四川制置使二十六日戊戌宰執掛服宰執服常服黒角帶入赴朝臨訖退出和寧門外漏院以俟掛服至辰時八刻在朝宰執百官並服孝服入詣几筵殿下立班俟前導皇帝至几筵殿下并陪位官行成服祭奠之禮訖皇帝歸幄次宰執百官詣東幄前左僕射陳康伯班首躬致詞奉慰兩拜訖退歸幕次皇帝還内宰執百官于几筵殿門外面南進名奉慰皇帝兩拜訖退仍服孝服晡臨如儀二十七日己亥北使朝辭宰執已下及應奉人並免赴朝臨是日後殿東廊閣壁設素幄駕坐宰執兩拜訖升幄殿相向立以俟人使朝辭皇帝宰制已下並首絰衰服掩面號慟哀動左右北使朝辭訖哀止授國書訖退宰執奏請聽政第一表宰執已下並赴几筵殿門外面南拜第一次奉請皇帝聽政表知樞密院事葉義門白巾幞頭常服黒角帶入都亭驛押接御宴同日禮房報值雨免赴臨又報二十入日朝哺臨如值雨並免如拜批答并拜表于宫門裏東廊上及絞縛蓆屋下立班又閣門報准内降批答一道宰執鈞者二十八日拜批答并拜第二表二十八日庚子宰執請聽政第二表宰執服孝服内殿奏事畢退赴朝臨訖詣几筵設門外先拜批答兩拜訖次拜奏請聽政第二表北使髙景山王全已下回程髙景山朝辭退至殿門上顧視奴婢求索手帊揩拭面汗訖復授奴婢奴婢既受更不避畏景山率爾便將所受手帊揩拭自已面汗而景山不之怒何其無尊卑禮義之分不亦大可異哉宰執奏請聽政第三表合晚臨而雨降免汪澈御史中丞王全髙景山來聘言欽宗升遐及地界事且要將相四人侍御史汪澈奏疏曰天下之勢强弱無定形在吾所以用之今日之勢誠弱矣陛下屈己講和厚其金繒謹其聘遺而彼輙出片言以撼吾國若將唾掌而取三尺之童無不痛憤聖神圖國固無遺䇿然志不定則事不立議不一則功不成吾辭順而理直本固而心同是宜應之以權乗時而動願陛下赫然睿斷置師江上而専付以閫外之任益兵上流而増重荆襄之勢渡師淮甸以守其要害嚴備海道以遏其牽制遣親信之臣徧撫軍士選有用之才預備繁使然後以不戴天之讎在原之戚下哀痛之詔布吿中外將見上下協心其氣百倍機㑹之來間不容髪在陛下斷之而已于是遷御史中丞入對素幄復言講和之久將帥養驕軍兵困弊軍士之廪給薄者幾無以自活宜優恤之以養其力又言淮南山水寨舊來鄉豪自相結集當隨宜存恤使自為守無令監司州縣擾之庻收其萬一之用又言軍旅將起費用方繁今局務之可省者多支費之浩瀚者廣百官之冗員尚衆官府之横用尚繁宜條其不急大加節要以徇今日之務事皆施行三朝北盟㑹編卷二百二十八
