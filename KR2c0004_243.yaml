body:
  text: 三朝北盟會編卷二百四十三宋徐夢莘撰炎興下帙起紹興三十一年十一月二十八日丙申盡其日焬王江上録曰岐王亮殺主自立改元天德都會寧府內使梁漢臣本宋內侍陷敵每思報仇乃進曰燕京自古霸國虎視中原為萬世之基陛下可修燕京大內正使孔彥舟為副使自天德四年起至貞元三年畢工改燕京為中都擇日遷都燕山府以護駕軍三十萬鐵浮圖一十萬紫茸細軍一萬為先鋒穆敦總管留守會寧府貞元四年八月十八日至燕京蕭王奏曰陛下移燕山去白溝百里之餘皆南宋故土彥舟酈瓊靳賽王喜徐文孟斌之徒項背宋臣皆握大軍盡屯中都萬一有變非國之福曰卿無憂也梁漢臣奏曰臣聞向南宋講武教兵有吞中原之志願陛下無坐樂之內可令山東兩路河北三路通水去處積草聚糧仍於諸路州軍置造軍器兼修大梁虎視江淮及造戰艦以備海道征伐並依亮一日入皇后閣見桌子上膽瓶內有木樨花數朵問此花出於甚地后曰汴京孔彥舟進來乃索筆硯為詩曰緑葉枝頭金縷裝秋深自有一生香一朝揚汝名天下也學諸王看柘黃一日宣梁漢臣朕欲修涼京大內時復巡幸卿為朕謀無得有辭漢臣曰被奉聖訓豈敢辭免願陛下頒詔諸路發人夫工匠以候使唤以梁漢臣充修涼京大內正使孔彥舟為副使謂漢臣曰賜金字牌子以卿去處如朕親行賜金銀縀錢絹各一百仍差都統阿實達舒嚕寧統騎軍二十萬駐札於涼京城外防逃走工匠人夫工匠日支米二升半錢五十文省人夫亦如之貞元三年梁漢臣孔彥舟至汴城正隆元年春起夫正隆四年畢工梁漢臣孔彥舟奏京城大內修造了畢又令人修造通州戰船遂起人夫抬􅐝木植打造戰船計數千隻委兵部尚書蘇保衡徐文統押仍於諸路刷鐵匠五千人打造人馬衣甲軍器有鄆州相州青州進到銅鈸刀五千口改造敲刀又令東平府北京閲州大安軍集八百萬僉女真渤海契丹漢兒五十萬山東兩路河北三路并僉大軍一十萬諸路畨漢軍七十萬諸路捕魚稍工水手一十七萬畨漢等軍共二百九十七萬令分八路入南界完顔仲統兵取長安鳯翔至西蜀完顔明統兵至西京至均房汴京南頴昌府方城縣鄧州貝勒統軍自南頴州蔡州陵汝阿魯摩哩統軍自亳州父城順昌府光州竒爾濟蘇自壽州合肥和州界耶律木自青州齊至淮楚界兵部尚書蘇保衡御駕親征監修戰船蘇保衡奏臣被奏聖旨打造戰船完備通州至定林口二百八十里陸地不通河溝無水通舟入海伏望特降睿旨行下措置帝宣漢臣來曰蘇保衡奏來稱通州不通水海口陸地二百八十里奈何梁漢臣曰起三路人夫開渠擔水成浮泥舟船夫施入海行下蘇保衡即施行梁漢臣私曰金君無道但得一路人夫叛我宋中興有日奈何自修燕京及大梁僉尉人夫工匠三百餘萬無一人丈夫也豈非天也蘇保衡起山東民開河擔水挽舟自通州入定林口二百八十里人人稱寃道路嗟嘆而無一人敢叛者漢臣又奏西京洛陽好花宜巡幸看花正隆二年二月幸洛陽一夜天降大霜羣花盡死不悅梁漢臣曰陛下降詔催促諸路大南取江淮無失其時天與弗受返遭其咎時至弗行復受其殃臣願陛下統一天下混車書於萬里於是下詔催促軍馬步起行汴京宣梁漢臣孔彥舟撫問修內不意有人譛彥舟者遂賜酒鴆之彥舟捧巵跪飲見彥背上雕青問曰何物也彥舟曰臣小年時不成器交人刺來曰卿如今成器敢做甚彥舟朕栗命彥舟充西京留守起行至路藥發而死二年八月在汴京值中秋設宴百官玩月忽密雲罩月索筆作鵲橋仙詞曰停杯不舉停歌不發等侯銀蟾出海不如何處片雲來便有許通天障礙虬髭撚斷星眸利未恨劍鋒不快一揮揮斷紫雲根要見姮娥體態翰林學士祁祓奏曰陛下棄大國宫殿遍幸諸州敗盟興師無故舉事勞役生靈興工動土修建兩京之內開無用之河勞苦軍民嗟怨盈路太乙出現陛下轉以為妖殊不憚畏臣食祿於朝焉可緘默伏望陛下察天地之不祥收兵罷役通和南宋復還故都四海九州感聖德天下幸甚亮大怒曰斬之滅其族正隆三年二月下詔小龍虎大王兵五萬守鎮蒙古司虎牙位將軍大嘉努守鎮上京會寧府舒嚕侍中兵三萬守燕京中都葛王兵五萬屯齊鄆兩京兼津發糧草皇太子奉國衛將軍户部侍郎張昌等守汴京御營前軍高季札管押御前射雕軍一萬三千并圍子細軍三千御前提舉右將軍塔爾明威前左將軍持嘉明威御前前軍竒嚕明前後軍西道總管興國努將軍紫茸細軍三千人令分五部一部五百人每隊六十人穆昆一人隊頭一人富勒琿一人牌頭二人飯食五人隊身五十人五年秋九月起汴京敕天使催促八路軍馬各一地分入南界發時童謡言正軍三匹馬簽軍兩隻鞋郎主向南去趙老送燈台九月渡淮至來春屯駐差御前都統驃騎總管韓彛則奏敕領軍南行臨發賜御製喜遷詞曰旌旄初舉正馬力健嘶風臨江渚射虎將軍落雕都尉繡帽錦裘剋楚氣張斷髮爭奮捲地一聲鼙鼓笑談頃止長江齊駭六師飛渡北去無自隊金印如斗獨在功名取斷所機謀垂髫方略人事本無今古試舒卧龍韜韞果見功成朝莫况江左雲霓傒侯玄黃迎路韓彛則兵南盡遣千户穆稜領騎五百掠地遇大宋姚興馬軍五十餘至尉子橋逰騎探得遂報破敵軍統制在高請統制姚興再率四隊四百人出陳王權領衆回走東采石江口是夜多張旗幟地中明火以兵數千伏路敵不能前遂得渡江屯駐東采石亮駐軍和州兩岸相對日謀渡江是日梁漢臣奏云本國大捷請陛下登舟早逹建康金主欲登舟持嘉明威將軍奏曰陛下北船底小盡被南宋壓沉大江奈何陛下乘舟欲渡是梁漢臣賣陛下於宋朝耳見敗舟登岸亮大怒謂梁漢臣曰汝本宋朝舊臣朕高官厚位恩過朝士不知記極而敢反朕遂命持嘉明威將軍斬梁漢臣於江岸金主見諸軍敗回返和州詔天下使催促海道大將軍蘇保衡有海船千户韓宗愈降於李寶李寶追趕火箭燒北船盡沒盡降其軍正隆五年十一月亮至揚州東門外漢王廟建御寨詣瓜洲岸望大江見本朝以戰艦教戰江心旌旗麗日器甲鮮明艨衝艦海鰍戈船及獅子船婁子船於大江心飛走布長陳望北岸一弩箭射不到處打梆子聲絶排一家陳於浮玉亭上聲喏諸船復回敵衆大駭亮謂臣下曰此紙糊船何足道哉遂回揚州御寨有穆敦總管大懷忠總管蕭扎巴衆議曰郎主堅欲渡江適觀大宋戰艦江心如飛甲士奮勇人船精鋭我等北人走馬射箭為上豈可乘船與江南人戰大江多都是死於江中不見鄉里大懷忠等早至御寨奏事見樂嘉努將軍云郎主昨晚大醉未起大懷忠等詢樂嘉努郎主夜來有何聖旨樂嘉努曰昨晚與妃后飲言三日渡江不得將大臣盡行處斬蕭扎巴以足蹴大懷忠腳云謂樂嘉努曰若郎主起來大臣奏則箇於是蕭扎巴大懷忠復回商議若不行弒逆我等無緣還鄉必死於此大懷忠云郎主有圍子細軍萬人護御又樂嘉努將軍輕信奈何事有泄露死必無疑蕭扎巴云晚朝奏遣細軍東取海陵先請樂嘉努軍諭以禍福使心變動事可濟矣晚朝奏云臣等渡大江必能濟渡東太州可令圍子細軍連夜進取所掠金銀盡以給賜一發渡江必能濟岸遣行是夜諸人邀樂嘉努將軍説云郎主堅欲下江今南宋沿江戰艘萬隻衝巨浪如飛我等盡魚鱉耳樂嘉努曰諸人欲何如大懷忠等曰若不行弒逆定難回鄉樂嘉努曰諸人舉事嘉努願效愚誠蕭扎巴曰今夜三鼓伏萬弓於暗處使人舉喊嘉努欲入南人劫寨樂嘉努先盜郎主劍以燭引郎主出帳諸人望燭明處以萬箭齊施嘉努當依大懷忠曰若事濟拜嘉努將軍東道大總管是夜亮醉三鼓入帳中聞外喊聲樂嘉努入報云南人劫寨亮驚惶索劍甲樂嘉努云恐人所盜臣帶於身嘉努執燭引亮慌急披錦衾出外嘉努棄燭奔竄萬箭齊發射死亮大懷忠引軍遁亮乃阿固逹長子宗翰之元子也宗翰生四子曰亮曰兖曰亢曰方皆為亮所誅亮篡奪後以同謀皆討論封拜因封卞蕭王仲武烏塔大卿高景山興國努各賜鐵劵平昔善者皆沾恩賞睚眥宿怨如完顔卞曹望之劉仲甫之徒皆貶降黜神麓記曰亮初登極唯有一親弟晤同兖以殿前都點檢為賀正旦使來我本朝都亭驛中病甚亮以天使催督返界歸國死又有一親弟判宗雍王充小名博甲為人溫克容貌偉秀蒞事精勤果斷不私衆人稱贊唯亮不甚和暢即位之後徙於外藩除西京留守大聞尹有説使者劉敏講演書籍至五代梁末帝以誅圭之句充拍按立聲曰有如是乎奴婢契丹人拷㧯提點上告變云大王謀反宣詔至燕斬而烹之二子皆賜死天德三年詔門下朕臨民而為父母必思安於兆民繼世而為帝王必思期於萬世是以定國家之計豈使止於目前承祖宗之謨不敢忘於在逺昨因撫綏南服分置行臺時邊防未定法令未具非永設只是從權既而人拘道路之遙事慮歲時之滯凡治天下固無親疏彼此人間各無體君上之意務盡均平若能於公相之子孫閭閻之黎庶一視同仁親之如子朕之所喜無以加焉朕雖居人上之尊承萬方之統食不甘味寢不安席惟以太平為憂不敢以位為樂也自古帝王固有酣醉嗜欲輟朝廢政窮奢極侈耽樂是從雖有忠義之士犯顔逆耳一諫而有斥逐再諫而加誅戮則終杜諍臣之口無復敢言者朕非不知亦非不能所以者重念太祖皇帝艱難以取天下欲救民於水火之中非欲自尊務承先志兢兢持守雖跬步不敢忘凡爾有官君子待享爵祿於安平之時其可不念太祖艱難創業之功今朕求治之意交修不逮以熙庶績朕宣布詔令以告百官蓋有五刑著為常典小者加之責罰大者至於誅戮有罪犯者必罰無赦爾或懼於邦憲實有傷於朕心故使通聞庶令天下有守法奉公無贓私之過朕所聞知必加進用自今後凡有罪者無或隱而相容凡觖望者必盡獄以取平庶共底於大寧以同享於極治咨爾有衆體豫至懷故兹詔示想宜知悉牒平詔書如右宜令尚書刑部關牒各行下應於合屬去處三朝北盟會編卷二百四十三
