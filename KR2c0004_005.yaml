body:
  text: 三朝北盟會編卷五宋徐夢莘撰政宣上帙起宣和三年二月十七壬午盡宣和四年四月十日戊戌宣和三年二月十七日壬午赫嚕至登州先是女真往來議論皆主童貫以趙良嗣上京阿固達之約欲便舉兵應之故選西兵宿將會京師又詔環慶鄜延軍與河北禁軍更戍會方臘叛貫以西兵討賊朝廷罷更戌指揮登州守臣以童貫未還留赫嚕等不遣赫嚕狷忿屢出館欲徒步至京師尋詔馬政王瓌引之詣闕五月十三日丙午赫嚕至京師是日赫嚕入國門差國子司業權邦彥觀察使童師禮館之未幾師禮傳旨邦彥等曰大遼已知金人海上往還難以復如前議諭赫嚕等歸邦彥等屢失其歡令師禮入奏復得旨候童貫回赫嚕凡留三月餘凡見辭宴犒並如實魯例王黼議復國書止付赫嚕等還不遣使北征紀實曰時方童貫捕方臘宣撫東南未歸而女真使人同馬政等復至時上深悔前舉意欲罷結約有旨諭女真人使可復回也八月二十日壬子發赫嚕大迪烏賫書歸本國朝廷國書八月日大宋皇帝致書於大金皇帝闕下逺勤尊使薦示華緘具承契好之修深悉封疆之諭惟夙要於大信已偹載於前書所有漢地等事並如初議俟聞舉軍到西京的期以憑夾攻順履清秋倍膺純福今貝勒赫嚕大迪烏回有少禮物具諸别幅專奉書陳謝不宣謹白十一月金人攻破遼人中京天祚入夾山赫嚕自海上歸阿固達意朝廷絶之乃命其弟固倫貝勒并尼瑪哈烏舍悉帥師度遼而用降將伊都為前鋒正月十四日以徑騎一日一夜行三百里至其中都攻之自旦至日中遂陷焉始謂天祚在城中也及破乃知天祚聞其來中夜已竄即莫知所在而天祚遽至燕山矣又懼追襲與其子趙王梁王數百騎復從西北走鴛鴦泊女真既失天祚因遣追兵出平地松林而西將至鴛鴦泊則適與天祚遇天祚大窘因倉皇從雲中府由石窟寺入天德軍趨漁陽嶺又竄入陰夾山夾山者沙漠之北傳謂有泥潦六十里獨契丹能逹他人所不能至也女真之君臣因駐兵鴛鴦泊欲經營之攻擊雲中府暨諸州延引時月也宣和四年三月十七日丙子遼秦晉國王耶律淳篡立於燕山遣使來告謝不受天祚入夾山數日命令不通宰相李處溫欲圖佐命恩幸外假怨軍聲援潛結都統蕭幹勸進燕王僭號燕王者秦晉國王耶律淳興宗之孫道宗洪基弟闕本之子於天祚為從叔初洪基因其子濬欲立淳為儲二不果已而立天祚淳守燕十二年得人心號燕王又謂九大王又謂覃湘大王在府蕃漢百官諸軍并僧道父老數萬人勸進遂即位於燕山號天錫皇帝改保大三年為建福元年改怨軍為常勝軍肆赦下詔諭國中曰自我烈祖肇經綸之功至於太宗恢廓清之業故得奄有區夏全付子孫邇後纂承罔不祗肅傳二百祀之逾逺得億兆人之底寧蓋泰平或弛於細防而內治多遺於外患以是邊鄙生兹寇仇漸為蔓草之難圖公肆長蛇之洊食敢來問鼎直欲爭衡敵壘尚遙王師自潰兵非不鋭事止失和故使乘輿越在草莽地隔不果相赴旬餘莫知所歸三邊蕩搖百姓震懾懼不相保謂將疇依咸云六合為家不可一日無主共戴眇質用登至尊皆出素衷尚慚否德又念與其長天下之亂曷若復我家之功茍其宗社不移亦曰神靈所望勢不克避理當共知嗚呼朕以久處王藩歷更政教凡民疾苦與事便宜靡所不知亦曽熟慮自今以後革弊為先所期俾四海用寧不敢以萬乘為樂敢告逺邇豫不食言又下詔廢延禧為湘陰王詔曰大道既隱不行選授之公皇天無私自有廢興之數事繄德效人難力為朕幼保青宫長歸朱邸雖為人情之久係誰云神器之可求常欲避周公之嫌未曽忘季札之節奈何一旦之無主至使兆民之求君推戴四從謳歌百和不敢負祖宗之業勉與攬帝王之權尚慮纂圖之為難庶其復辟之有待近得羣臣之奏槩陳前主之非所謂愎諌矜能比頑棄德躁動靡常節平居無話言室家之杼軸成空更滋淫費陵廟之衣冠見毁不輟常田漢嫡之戮實無名伋妻之亂尤不可訖無悛改以至播遷伊戚自貽大勢已去是謂絶四海之望安得冒一人之稱宜削徽名用昭否德方朕心之牽愛尚不忍從奈羣議之為公止復見請是以勉稽故事用降新謨嗚呼進退惟公廢興有義豈為小子欲專位號之崇蓋徇衆心以為社稷之計凡在聞聽體朕意焉遣知宣徽南院事蕭塔布樞密副都承旨王琚充告謝大宋使副承雄州牒準尚書省劄子奉聖旨契丹天祚見在夾山燕王安得擅立仰會問因依人使復回北征紀實曰是歲冬末邊探報天祚以兵十萬屯燕京聲言遊獵直抵雄霸界上朝廷遽為駭懼及明年春諜報再至始知其意謂中國有謀也欲大舉討女真而懼襲其後是以耀武爾羣小既安則謀之如初三月又報天祚敗走不知所在於是我師遂興知真定府路安撫使趙遹奏疏乞撫存疏曰臣近準本月十三日樞密院劄子奉御筆遼界為女真所侵兵勢瓦解切慮奔潰侵軼逼犯邊境河北諸路帥司依已降指揮團結兵馬編排器甲準備不測勾抽上邊使喚仍先具知委奏聞除已具知委及逐時探到北界事節次附入內侍省遞奏聞去訖臣竊詳北敵自澶淵既盟之後歲省用兵之費國享重幣之利遼自知得計守盟修好皆其誠心然纍年以來天祚失德上下離叛人不為用女真渤海日尋干戈征伐不已敗衄相繼境土侵削士馬雕殘財力匱耗常疑中國密有窺伺右梧左枝困弊日甚恭惟陛下好生之德深洽民心帝王之舉必度萬全况臣常親玉音屢被詔劄每念南北歡好力固祖宗盟誓謂非細事不可少有引惹造端生釁遼殊不知聖神加惠兩國之意如此兹睿旨特慮他寇與奔潰之衆不測侵軼姑示備禦之計廟謨甚逺預為之防然臣叨承閫寄職所當言茍有管見豈敢緘默伏覩邊報近者天祚獵於白水川女真掩其無備全軍陷沒天祚不知存亡震擾未見所立若復調兵上邊遼將謂中國起乘其弊疑隙既開何可復釋唯當示之安靜致其懷服臣愚切謂耶律氏既有沙漠歷年甚多遼人習熟貴其種類設有姦雄誰肯推服仰惟朝廷與遼兄弟之國共守盟好百有餘載今天祚叔兄子弟尚衆若天祚真遂不還願陛下用家人禮特遣重臣將命彼國推急難之義念外侮之虞慰諭其宗族臣下厚加拊勞勉以忠孝雪恥戡難就其天祚叔兄子弟取天祚之所愛國人之所慕擇賢立孤以主遼衆隆其恩禮賜之封册申結信誓以繼好息民俾之知戴中國遼既以中國為重得存其宗社則中國有大造於遼也陛下雖不責報遼歸故地減歲幣必有以報陛下矣如是則中國不待汗馬之勞遺鏃之費萬無一失而安享大利機會之來間不容髮伏望聖慈特加採擇速奮睿斷施行實天下之幸貼黃臣愚切謂遼失其君未知所立方疑中國乘間而攻之然陛下兼愛南北生靈務隆義好若即恤其禍難擇立新君當此孤遺乏助之時得倚朝廷以存其國名正言順勢無不從則恩歸於我必服彼心申固盟誓為利無窮若使彼新君自立則恩非我出立而衆附則勢將復強增戍緣邊過為隄備徒足生釁以啓戎心願陛下無遽增戍開先時之隙無緩立孤貽不及時之悔孔子曰興滅國繼絶世天下之民歸心焉惟聖神亟圖之貼黃臣契勘女真蕞爾小邦自昔通好大遼勢不過遼之一大部其衆強弱與遼不侔徒以天祚失德乘其離心遂致以寡敵衆以弱勝強者非女真之能遼所自取也然遼實大國其人本不畏女真女真今雖得志亦豈能久取勝於遼國哉遼之新君既立得國人心事將反掌也陛下仁聖被於四海普天率土罔不臣妾若速於斯有以深結遼人使之懷服自削其平日之貪傲今若停增戍之役收援立之恩慮以守盟存國之大義蠻貊革心固不難矣臣所謂用力少而成功多也三月闕日代州奏得金人邊牒準大金彰國軍應州牒近白水泊擊散契丹放鵝行帳天祚皇帝脫身北走本國軍馬已到山後平定州縣占守訖請代州戒守邊人員不得輒引逃去人民為國生事自取亡滅四月十日戊戌太師領樞密院事童貫陜西河東河北路宣撫使勒兵十萬巡邊詔下燕京管內官吏軍民百姓等詔曰朕惟皇天盡付中國使宅九有之師取亂侮亡拓其疆土景命所僕惟有德者能克饗之朕服紹丕基仰承先帝休德夙夜祗懼不敢荒寧荷天降康登兹極治聲教所暨逺逮要荒東踰朝鮮西邁積石南越牂牱之境罔敢不廷乃眷幽燕實惟故壤五季不造陷於契丹惟爾邦君暨厥臣庶懷風慕義思欲來歸忠憤之誠久而彌著今上帝降禍於遼不誘其衷弛絶綱維俶為暴亂橫賦強斂誅剝無厭讒慝作仇脅權相滅至上凌下替妖孽並興傾國喪家自取逋竄白水之敗亟聞篡攘調賦益繁人不堪命且復盜賊蜂起所至繹騷哀此下民恫怨無告朕誕膺駿命俯順人心選將出師復兹境土是謂致天之罰仁伐不仁拯爾羣黎取諸塗炭已遣領樞密院事童貫董兵百萬收復幽燕地與大金國計議畫定封疆大信不渝中舉外應維天之命莫我敢承王師霆擊雷驅數路並進前角後犄萬旅一心威以濟德孰敢有遏厥志然念王師無戰而天道好生亶兹告猷迪爾有衆爾其深計逺慮覽於興亡如能舉城自歸望風響應使市不易肆士不授旌捨覆巢之危從奠枕之逸是為自求多福惟天矜爾萬民永奠一方惟朕以懌已降處分秦晉國王如納土來朝待以殊禮世享王爵應收復州縣城寨文長官並依舊任事平第功不次擢用軍兵守戍之士並加優賞願在軍者厚與存祿願歸農者給復三年收復之後蕃漢一等待遇民戶除二稅外應該差徭科率無名之賦一切除赦大軍所至務在安集官吏百姓不得誤有殺傷或災毁廬舍虜掠人畜犯者並行軍令如或昧於順逆干我王誅若猶豫懷疑弗克果斷自膏原野實爾自貽惟豫肅將天威敢自逸罰時弗可失其尚勉哉禍福無門惟爾自召朕言不再師聽惟明故兹詔示想宜知悉貫以環衛軍為中軍述古殿學士劉韐為行軍參謀保靜軍節度使种師道為都統制武泰軍承宣使王稟華州觀察使楊可世為之副時上微出齋宫以觀出師因餞貫仍以御筆三策付童貫如燕人悅而從之因復舊疆策之上也耶律淳能納欵稱籓策之中也燕人未即悅服按兵巡邊全師而還策之下也貫祗奉聖訓振武而行三朝北盟會編卷五
