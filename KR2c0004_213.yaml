body:
  text: 三朝北盟會編卷二百十三宋徐夢莘撰炎興下帙起紹興十三年二月盡十四年二月紹興十三年二月韓世忠封咸安郡王八月金人遣使人洪皓還九月鄭朴何彥良使于金國紹興十四年正月金人遣使來浙東副總李顯忠落節鉞與宫祠李顯忠歸朝聞其妻周氏在黃龍府繡工遣三人往取之共許金一千兩各人奏補承信郎先以金五百兩畀之三人果至黃龍府用籠床去其裏隔盛周氏載之于車以行遂逹江南時顯忠作浙東副總管旅槖中得金一百兩乃具以情實告於知紹興府婁照借金四百兩遂賞金如約顯忠陳乞合得恩澤承信郎三人各補以官三人皆喜曰太尉更有一妹在燕山府願取之顯忠别許金三人者不願許金且曰已得金千兩矣既而又取其妹歸是時楊存忠亦遣人取其故妻止於平江用别宅居之以再娶趙氏不容故也金又使來因奏令講和乃有臣僚多以金銀遣人來取其家屬恐大金皇帝聞之不便上乃責顯忠落節鉞與宫祠罷其總管存忠以顯忠獨被責而已無罪遂賂遺顯忠不已且稱其才宜復用而顯亦間居七年南北隔絶之久諸大帥家屬往往得至江南如遊糕送韓世忠妻來又張俊妻魏氏乃羣賊自京西送來四月解潛責授團練副使南安軍安置臣僚言解潛及辛永宗居於平江府議論講和事改潛南安軍安置而永宗亦改差荆湖南路馬步軍副總管邵州駐劄命州縣刷前後歸朝人發還金國九月宋之才為大金賀正旦國信使趙還副之趙鼎移吉陽軍安置秦檜令臣僚言趙鼎罪故移吉陽軍安置朱勝非薨行狀曰靖康初金人稱兵京城戒嚴公嘗使敵營往來計事辭氣不少屈初公為鄧氏壻後十許年而夫人之堂妹歸張邦昌既而侍從公察其人弗與交邦昌雖執政亦未嘗造門也邦昌憾焉而每遷輒沮格及金人來攻邦昌和議出質敵營乃請公行朝廷從之俾公使軍前計議疾趨之道中即日上疏論和議不可恃劫質不足信請大為將來之防又以邦昌所下檄榜有挾敵勢以脅郡縣之意皆上之行將出疆有旨召還解使尋知鄭州蓋邦昌姦謀已露至是朝廷始悟公前疏之當也未赴陟海州時朝廷建議置四道總管都副八帥分制諸路為京師衛其詔有曰吏得辟置兵得誅賞錢穀得以移用有警則都帥入衛副帥居守擇諸班簿取前兩地從官之才者居之惟公以庶僚被時選除直龍圖閣充東道副總管置司南京公抵應天日都總管胡直孺準詔勤王竭本道甲兵財賦以自隨所餘疲弱不滿二百糧食僅及旬日富室大族先已逃避警報日急敵破都帥于襄邑近逼南京上下訩懼人將驚潰公奮不顧身以死誓衆踴躍先登令民負門乘城徇曰敢返顧者斬攻南城矢石交下公益勵奮人殊死鬪公躬擐甲胄與士卒同食飲夜宿城樓者數月徒步巡督率夜一周匝雖雨雪泥淖未嘗肩輿敵列寨城西北隅若築室返耕為持久計者攻圍殆百方公隨宜應之輒卻敵多為疑兵公料敵精審逆知詭計屢摧其鋒踰月日東南諸路兵稍集公曰敵不足畏矣乃大啓城門縱兵民樵採所部多南兵怯敵公親率教習授以方略用之每捷選壯士夜入敵營焚劫使之自亂常設伏兵於要害地伺其出掩擊之堅壁半載餘仗信義威惠以為守故人無離心士有鬪志以間諜用命敵動息必聞其初至也如入無人之境及是不敢肆前後斬獲以千計亦屢斃帥首道路始稍通江淮漕運漸至分遣邏兵明逺斥堠敵不能抄掠軍民賴以濟京師再受圍已數月公數募人間道冒重圍携蠟書通奏每遣必涕泣開諭勉以捐軀徇國親酌巵酒以飲脫所服綈袍以衣人皆感恱不復顧死淵聖皇帝得公奏每加歎奬始知諸大鎮悉陷獨睢陽堅守屏蔽東南聚勤王之師以圖捍禦遂除待制都總管會京師城破諸道勤王兵疑不敢前公遣人傳報京師音耗敵騎動息以慰安人心且檄率四方戮力以進屬主上開大元帥府於相州軍駐劄東平公日遣人詣軍門凡金人動靜京師事宜莫不以聞上亦倚南都為重金立邦昌乃為書遍抵諸道帥守一日金以騎送邦昌使人至公集官吏發書按驗即械繫之上其書元帥府主上自鄆而西公發謁於濟州首陳翊戴大䇿曰今二聖北狩天下之心屬在殿下宜以時正位號繫天下望庶以銷弭窺覦之萌應天實藝祖興王地宗社神靈使敵不能陷以為殿下受命之所請亟幸之以圖大計奏疏論即位之初宜謀始謀始之説無他仁義而已仁義者天下之大柄也人主當持之而朝廷奉承之則人主尊朝廷持之而四方順從之則朝廷尊中國常持之而四方斂服之則中國尊人主失其柄必有大臣跋扈之患朝廷失其柄必有尾大不掉之患中國失其柄必有四方交侵之患國家與契丹結好一百二十餘年彼既亂弱我乃逺交金人為夾攻之計天祚匿於近塞遣使指蹤令金人取之且露章稱賀是中國失其柄矣金人內侵每以渝盟失信為辭是皆燕人之語怨我背契丹之約也不然金人通好以來何嘗違其意哉願睿明殫思其凡進退人材施張法度禮樂征伐慶賞刑威一話一言一嚬一笑必加詳審合於仁義者置之則可以養兵保民興復大業迎還兩宫矣疏奏上欣然納用然公為侍從嘗論睢陽特以基命地故列聖建别都而要非用武之國脫有緩急大駕一動則河之南淮之北皆盜區矣今敵騎充斥兩河雲擾雍洛不可卒至惟襄陽西接蜀漢南引江淮可以號令四方乞鑾輿幸之控制南北以圖中原而大臣或沮之其言不果行及為學士復論揚州跓蹕地既得政力論之上深信焉令户部約留嵗計郊祀之費餘財皆運之金陵祀事後當移蹕矣時相黃潛善力沮之後果倉卒南渡至是上見公首及此且曰悔不用卿之言時方經畫淮北上倚公以辦即上疏陳五説謂敵當擊書奏上皆施行之自再相首建議遣諸大帥分屯於淮南等路各據要害以經略淮北荆襄事甚悉四年又奏言襄陽上遊襟帶吳蜀我若得之進可以蹙敵而退可以保境今陷於敵所當先取者即命大將自沔鄂以趨又使淮西軍合勢並進以犄角之始諸將雖擁重而無分定路分故無所責成公在朝廷修法度嚴紀律明號令某帥當某路一定不復易皆授廟算成師以出又命司農卿沈昭逺往總軍餉士衆素飽皆賈勇以前豫求救於金偽兵俱來遇我師于襄鄧間連戰大破之遂復襄陽隨郢七州之地軍聲及汝潁京洛大振先是分屯才定即議進討而荆襄正嶽飛所當取一日下詔趣諸將入覲公既授飛以攻取之畫以迄事建節又戒諸將咸使戮力捷至等級授賞其或違戾罰如軍政即日奏上罷都督府故諸將得自奮勵復飭飛當勞來還定以慰吾民來蘇之望無得屠掠凡得州始奏捷止言某人收復平定某州不得輒言殺戮規模先定故一舉而成功既班師授飛節旄及諸將授賞有差如初約也朝廷欲行獻捷之禮公謂本吾家堂奧不足言俟中原盡復大駕還汴乃可自用兵以來諸將強悍艱於號令公威信素有以服其心賞罰甚明莫不聽順樂為公用之皆能成功於是金始來議和蓋自上即位遣使使金者無慮十數輩而未嘗報聘及王詡李永壽來命禮部侍郎趙子畫館之初上命韓肖胄為使俾公擇副公言故事副使用武臣時方艱虞不當專拘舊制遂薦胡松年副焉松年入金論難往復辭氣明辨金為之折又聞豫兵屢敗襄郢歸於我故才報使公逆料其謀隨事酬應館遇禮既甚簡而邀求一切不從二使褫氣去人情初以為疑至是乃安上方親征詔公以攻戰之利守備之宜措置之方綏懷之略公慨然上疏列四事以獻無不切當利害疏奏議者服其精誠上心善之而隂有沮之者因不果行勝非秀水間居録曰靖康元年豫守宋城閏十一月初敵騎既破拱州初七日遂抵郡城前一夕豫夢有執盜於庭下者形質魁岸左目插矢流血被體既覺頗異之未曉報金兵至既登城督戰金人以大軍三乘裝載芻膏縱火逼南門帥首被金甲仗劍往來指呼豫於要地伏弩俟之果為效用邵曇者射中彼目墜馬死正如所夢敵知不利乃退自是經月不近南門其後得異龜於城隍廟中大若車輪髙及三尺蓋穹龜也有骨尾九條甲色正黃如蜜蠟每甲刻一字可辨者八云郭負放生千秋萬嵗餘不可讀目光射人頸鱗如錢顧視不凡真靈物也始置之城隍廟中郡人連日聚觀豫慮其惑衆因言龜不食豈思水乎投之南湖繼又雷萬春廟有大赤蛇盤于香罏中纍日不動時將舉首人莫敢近豫作文遣吏祭之切責其果有靈不為隂助更出異物以怖人何也即日蛇出與敵對壘踰半年城境獲全實神之助也又曰靖康二年三月金人偽立故相張邦昌為楚帝師回二聖北狩四明初范訥以北宣撫趙野以北道總管翁彥國以東南經制趙子嵩以宛邱太守各提勤王兵會於襄邑邦昌皆以手書與之時豫留守南都亦皆得一封其外用內侍省印不書名內只一幅云國家之變可謂非常昧陋所遭亦云竒禍又稱豫堅守别都力保鴻慶宫其末敘時令云某上豫即收投書使臣繫獄繳書於大元帥府遺史曰靖康元年二月朝廷遣張邦昌奉使斡里雅布前邦昌請朱勝非同行邦昌妻鄧氏朱勝非妻之堂妹也邦昌請勝非行上俾勝非使於軍前計議勝非疾趨之道中即日上疏論和議不可恃劫質不足信請大為將來之防又以邦昌所下檄榜有挾敵勢以脅郡縣之意皆上之行將出疆有旨召還解使職出知海州勝非字藏一蔡州人七嵗喪父既喪外氏欲奪其母而嫁之不從外氏強之母乃薰目斷髮示卒不可移勝非總角讀書為文鄉先生稱為逺器年十四入郡庠十八外貢入太學踰年外上舍崇寧四年釋褐登第纍厯州縣官後除太學正歷兩任徽宗以其久於儒官恬靜有守除祕書省校書郎兼正御前文集淵聖即位時為右司郎中嘗使金營往來計事故邦昌請其行中興姓氏録曰朱勝非字藏一開封人也崇寧四年登進士第善屬文靖康末胡直孺以直龍圖閣為東道副總管軍應天金人圍京師領兵一萬來勤王敗績執勝非權知應天金人來攻勝非惶懼易衣逃匿民間惶惶會韓世忠楊進兵擊破之勝非復出視事民稍安康王開元帥府河北張邦昌僭位致書于勝非勝非囚其使繳書于王王至濟州勝非率兵來迎至建炎初除中書舍人後除翰林院學士制誥清華士人言其才學士二年除尚書左丞又遷加中書侍郎惟諂佞阿諛迎合上意曲奉黃潛善汪伯彥備位無建明三年潛善伯彥罷以勝非為宣奉大夫尚書左僕射值苖傅劉正彥擅廢立勝非狐趨鼠拱行二人之意而已上復辟罷為觀文殿學士提舉臨安府洞霄宫四年范宗尹薦之除江南西路安撫大使兼知江州勝非聚兵於吉州以劉紹先楊勍為都統制怯江州經李成所破不敢往紹興初紹先以兵屯江州數月勝非方至御史中丞沈與求言其逗留降授中大夫分司南京居住以紹先知江州二年呂頥浩薦之召復觀文殿學士兼侍讀俄同都督江浙荆淮諸軍事給事中胡安國諫止其命復為侍讀俄除尚書右僕射三年丁母憂辛苦日起復惟報私恩讐略無建明尤不能聽訟士民甚苦之四年金人攻淮南勝非懼乞持餘服許之服闋還觀文殿大學士知湖州數月復為提舉洞霄宫秦檜不喜誣之為邦昌親黨終不復卒於湖州年六十三十二月李光移瓊州安置李光初安置藤州知州周某者誘光唱説秦檜和議有諷刺者積得數篇密獻於檜檜怒令臣僚言其罪故移瓊州安置金人逼王倫以官倫死金先是紹興九年王倫為迎護梓宫奉迎兩宫交割地界使藍公佐副之使于金國金國留倫不遣獨以公佐還是嵗金人以倫為河北轉運使倫奉使而來非降也堅辭不受遣使迫之亦不受金人杖其使又復令逼倫倫自縊而死中興姓氏録曰王倫字正道開封人真宗宰相旦之後也有縱橫之才少逰市井羣小髙其能大金陷京師百姓內亂淵聖登樓撫諭之倫乘亂徑造御前上問誰能彈壓倫奏臣能之上令即去彈治倫曰臣未有官豈能彈壓因自薦其材上急取紙親除為吏部侍郎倫下樓以先備惡少數人傳呼侍郎往撫諭之百姓皆定何栗以倫小人無功除命太峻奏繳其官止補修職郎建炎二年上書乞入金國迎請二帝乃加朝奉郎金國通問使金國方入邉留倫不遣紹興初秦檜為相遣北人招討都監門客通書金國求好二年遣倫回議和七年聞徽宗及鄭后凶問遣倫同髙公繪往請梓宫及韋太后及河南州軍秦檜主其謀加倫端明殿學士樞密院編修文字胡銓上書言金人詐和王倫賣國秦檜孫近助之乞加誅戮進兵討敵不從九年加簽樞密院迎護梓宫奉迎兩宫交割地方使藍公佐為副倫至金見金人烏珠以東西南京壽春宿亳州及陜西京西歸于有司倫權東京留守及孟庾至倫公佐往金國獨發公佐回又留倫不遣金國以倫為河北轉運使倫曰倫奉使而來非降也大宋之臣豈受大金爵祿耶金人遣使來催之又不受金人杖其使復令來逼之倫厚贈使人金以謝之自縊而死年六十一世稱其忠三朝北盟會編卷二百十三
