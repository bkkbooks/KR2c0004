body:
  text: 三朝北盟會編卷一百十八宋徐夢莘撰炎興下帙起建炎二年八月二十一日癸酉盡十月二十六日二十一日癸酉殿中侍御史馬伸上言乞罷黃潛善汪伯彥殿中侍御史馬伸上言陛下龍飛河朔近用黃潛善汪伯彥以為輔相一意委任不復致疑然自大任以來措置天下未能恢復遂使金人日強盜賊日熾國步日蹙威權日消且如二帝親屬盡室北狩宗廟社稷不絶如線者繫陛下一人而三鎮未復不當都汴以處至危之地此理甚明然前日下還都之詔以謫許景衡至於今日當如之何其詔令有如此者又如吳給張誾以言事被逐邵成章緣上言逺竄今是何時尚仍舊體以言為諱其壅塞言路有如此者又如祖宗舊制諫官有闕御史中丞翰林學士具名取旨三省不與厥有深意潛善近來自除臺諫仍多親舊其毁法自恣有如此者又如張慤宗澤許景衡公忠有如此者又如有問潛善伯彥救焚拯溺之事則二人每曰難言其意蓋為陛下制之不得施設或問陳東事則答曰朝廷初不知蓋為事在陛下也其過則稱君善則稱已有如此者又如御營寨五使雖主兵權凡行在皆御營使所統潛善伯彥則别置兵各一千人請給居處優於衆兵其收軍情有如此者潛善伯彥所為類此豈不辜陛下責望之意哉望速罷其政柄别擇賢者共圖大事伸仍具申潛善伯彥照會二十二日甲戌殿中侍御史馬伸衛尉少卿遺史曰馬伸上言乞罷黃潛善汪伯彥政柄辰巳刻間道路已喧傳無不欣見於眉宇翼日聞伸遽改衛尉少卿有顰蹙而吞聲者二十九日辛巳李成掠劫宿州先是朝廷命李成充京東河北路都大捉殺使成領兵之河南也秋毫無犯於民將及宿州乃懷反心有攘取宿州之意分軍為二一侵泗州别將主之一侵宿州成自將之皆約八月晦日至是整軍入宿州乃曰備奉聖旨屯駐於宿州故人皆不疑市井買賣如舊軍入未及半即有登城者俄頃弓矢亂發縱火肆剽掠盡取強壯為軍并驅虜其老幼别將泗州者不及期到虹縣亦縱火劫虜而回成欲一日取兩州别有冀望非常意既聞泗州軍失期遂止於宿州以前軍史亮反即時撫諭已定事申聞朝廷待以不疑乃就賜鎧甲萬付成得鎧甲軍勢愈勝矣是時車駕在維揚有交番衛士及百姓販賣者成皆資給之故往來行在者皆譽成忠義報國之心識者以為志望不淺非他賊比賜李成一行將佐詔朕觀風南服注意中原有嘉忠藎之臣夙統驍勇之衆干城壁壘為國金湯方災禍之異常想戍屯之良苦特馳信使往諭至恩尚體眷懷益堅圖報主客員外郎謝亮撫諭夏國先是春初夏人諜知鄜延無備有可乘之機宥州監軍司忽移文本路稱大金以鄜延割本國須當理索若敢違拒當發大兵誅討鄜延路經略安撫使王庶即口占據檄詞曰金人初起本朝嘗以金肅河清卑爾今誰守之國家姦臣之貪得不恤鄰好一至如此貪利之臣何國蔑有豈意夏國躬踏覆轍比聞金人欲自涇原徑搗興靈方切為之寒心不圖尚欲乘人之急募府雖士單寡類皆節制之師左枝右梧尚堪一戰果能辦此何用多言徑檄興中府因遣諜間其用事臣李遇傷夏主乃謀移楗賀蘭司忽亦縮甲不復敢言故朝廷議遣人夏國乃詔主客員外郎謝亮往撫諭夏國以繼好亮至陜西庶又移書於亮曰春秋之義大夫出疆有可以安社稷利國家專之可也夏國為患至小而緩金人為患至大而迫方金人挫鋭於熙河奔北於本路子女玉帛不知紀極占據同華畏暑休兵閣下能仗節督諸路帥協同義舉漕臣應給糧餉爭先並進未能洗雪前恥而亦可以驅迫渡河全秦奠枕徐圖恢復夏人秋稼未登飢餓疲羸何暇興師可保其無他亮不聽亮自環慶入夏國使還夏人隨之以兵掩取定邊而鄜延無警報九月一日壬午朔王彥赴行在初王彥至京師以兵交付宗澤也澤令彥量帶親兵赴揚州行在所既到有旨令閣門引見上殿二日癸未衛尉寺少卿馬伸貶濮州監酒馬伸為殿中侍御史上言黃潛善汪伯彥之罪乞罷政柄善惡之遽改為衛尉少卿便具以所言申御史臺乞行誅竄有詔馬伸言事不實趣向不正送吏部與京東路監當於是潛善以伸監濮州酒促使上道竟死塗中天下冤之三日甲申丁進復反率衆冦淮西丁進復反韓世忠軍至獲百餘人斬於揚州竹西亭斬至王權有假恩者勸世忠釋而用之恩嘗仕於陜右而世忠為其部曲故世忠敬而信之杜充為京城留守遺史曰杜充為北京留守也提點刑獄郭永嘗畫三策以遺充一日永見充問其目充曰未暇讀也永面數充曰人有志而無才好名而遺實驕蹇自用而有虗聲以此當大位鮮不顛沛與公等處其殆乎充大慙一日天雨紙錢於軍營中厚約一寸許人皆以為不祥翌日與金人戰於城下敗績充遂閉門以守至是宗澤卒乃命充為京城留守張益謙為北京留守裴億為轉運使别録曰東京留守宗澤卒杜充代之澤方留守時嘗有志經略河東河北故兩河豪傑皆保聚形勢期以應澤澤又招撫河南羣盜城下復遣復兩宫議既定先以薛廣張用王善前驅統離城下而杜充無意於敵盡反澤所為故河北諸屯豪傑皆散而充又務誅殺故城下兵復為盜去掠西南州縣數嵗不能止十二日癸巳金人陷冀州權知軍州事單某自縊死先是知冀州權邦彥以兵赴元帥府勤王有雲騎第六指揮李政者在京東立功補官授河北將軍冀州住劄措置守城甚有法紀律嚴明軍民皆不敢犯金人攻城皆禦退之禦敵之方皆出人之意表每戰先見勝敗出兵則必勝或夜劫金人寨所得財物盡散士卒無纎毫入私家號令明賞罰信由是人皆用命一日金人攻城急有登城者火其門樓與官兵相隔政曰事急矣有能躍火而過者有重賞於是有十數人皆以濕裹身持杖躍火過大呼力戰金人驚駭有失仗者遂敗走或跳躍下城城乃無虞政大喜皆厚賞之至是政已死矣故不能保守而城陷十三日甲午金人陷長安知軍府事郭琰棄城走先是金人陷長安已退去也王擇仁入長安稱撫定永興師既而郭琰以朝廷之命來帥長安擇仁退去琰以擇仁有兵欲得之遂劾擇仁擾鄉村作過等事又移文金州兵會合掩殺之擇仁欲往金州為金人所拒無所歸聞河東山寨有未順金人者乃經畫河東山寨於是金人再攻長安琰棄城走陷之初同州有鄉兵首領黨松者永興路經略司以為統領李彥仙為虢解州制置使檄松知同州時同州陷沒松大喜寄治於三十里外下寨松猶以長安帥司之命因詣長安見琰欲換其差牒而琰留其知同州文牒不給付而城陷王庶節制陜西六路軍馬曲端都統制先是京東留守司承制以王庶權陜西路制置使曲端權河東路經制使端以狀申庶稱準留守司差河東經制使乞照會以牒移鄜延帥司請遍給人糧馬料交帶行人方議擬開承六月詔書擢庶龍圖閣待制節制陜西六路軍馬升端橫行遙郡團練使為都統制詔旨有曰倘不靖難於殘暑之前必致益兵於秋涼之後庶移文諸路請旨催端前來雍耀間措置邊事端復具公狀稱未受告身不數日走馬承受公事髙中立自行在賫端告身至庶遣人達之諸路兵皆報應起發庶即以鄜延兵先出自龍坊而端又稱日前曽有公移往還已奏乞回避而涇帥席貢别差龎世才統步騎萬人來會庶無如之何則行涇原勒端還舊任聽候朝廷指揮亦别差環慶將劉仕忠權都統制涇原將冦鯶同統制秦鳳熙河兵共不滿萬人先會鄜延軍屯八公原以待庶欲督戰已戒行龎世才兵至邠端中悔乃飛書止世才兵復申狀節制司已起發赴軍前庶以故遣仰勞端端既得兵權則傍徨於淳化矣二十日辛丑陜西六路節制司將官賀師範及金人戰於八公原失利師範被殺王庶在坊州遣賀師範趨耀州王宗尹趨白水移文涇環二帥出兵為援驅逐殘敵渡河且備秋髙之復入二帥各遣偏將至會師範遇敵於八公原為敵所乘王師敗績師範死之涇環二將各引歸范瓊為御前平冦前將軍范瓊以定武軍承宣使御營使都統制討李孝忠有功加天武捧日四廂都指揮使同主管侍衛步軍司移軍真州除御前平冦前將軍瓊在真州馭衆慘酷斷臂折肢割剝炮烙鉤釘推剔靡所不有二十六日丁未薛廣及金人戰於相州被殺初京城留守宗澤命王善張用薛廣收復兩河前驅才離京城而澤暴卒杜充代為留守不善撫馭務誅殺善與用復叛去而廣已渡河時相州受圍敵聞廣至乃解圍廣入相州境與戰不勝廣死其衆皆散十月丁進以其衆降於劉正彥丁進復反衆寇淮西詔劉正彥帥師討之正彥請通直郎劉晏偕行許之晏者遼東白器州人在遼以文章筮仕宣和四年率衆數百歸朝廷朝廷授以通直郎金人起兵朝廷以晏總遼東之軍謂之赤心隊故晏以赤心騎八百從逮厭敵境晏知多寡不敵乃請於王彥曰兵固有先聲而後實者今敵勢甚張若不以竒計破之難以力取請為五色旗幟俾騎兵八百持一色於山林重復自背後取路前後相繼不絶一色旗盡即以他色易之駭敵心王彥然之敵見官兵纍日不絶其色各異謂官軍甚衆遂不戰而請降乃分進兵各隸麾下詔晏為朝散郎賜金帛有差晏以金帛悉分將士將士皆悅五月丙辰王彥轉官免對宗澤遣王彥赴行在也有旨令閣門引見上殿是時朝廷以遣宇文虗中楊可輔為祈請使議和而彥見黃潛善汪伯彥力陳兩河忠義民兵引頸以望王師願因人心向順大舉北征犄角破敵收復故地言辭過激大忤潛善伯彥之意是日降聖旨王彥沿河宣力日久特與轉武翼郎除閣門宣贊舍人仍舊帶行原擬官遂不得對王彥為御營平寇統領官上以王彥為御營平寇統領官與平冦前將軍范瓊歸京師彥素知瓊臣節不著難與共事即稱疾求醫有旨令真州將治彥居真州閉門逺迹不與人通瓊領彥兵而去劉光世敗李成於上蔡驛口橋新息縣李成冦淮西劉光世討之以王德為先鋒將率諸將敗成於上蔡驛口橋成奔新息率敗卒再戰時光世以儒服臨軍成遙見白袍青蓋者必大將也併兵圍之德潰圍援光世以兵光世曰非公之力吾其危哉戰皆勝成遂遁走成主謀陶先生以被執送行在以火燃於問明橋上光世特授檢校少傅王伯彥時政記曰是日御營司進呈檢校少保奉國軍節度使劉光世具到直奏楚州見養濟李成下人兵家屬男兒婦女共六百人上曰此曹凶悍不顧其身豈恤其家朕念作亂者非家屬之罪宜令遣往逺處州縣亦給錢米養之黃潛善曰自李成冦叛諸將及郡守監司多言宜殺其家屬臣纍奉聖訓勿殺以招其徒臣聞光世近還過楚州降卒見其家屬亡恙朝廷養濟如舊皆感泣仰戴聖恩悔從賊亂今當擇與官軍戰鬪不降者籍其人口别取處分外餘並給公據故令自便臣請郊祀大禮赦中可條具陛下寬貸德音使天下聞之潛善又曰去降赦尚半月日具依令來指揮行下候放赦更及之則四方賊徒聞陛下好生之德如是必散黨回心以歸聖化矣上曰昨日於光世處取得李成所用提刀來看其刀重七斤李成能左右手輪㺯兩刀所向無前惜也成惑於陶先生邪説臣節不忠使朕用不得陶先生名子思常為道士誕妄喜談兵成至符離得之謂成面有割據之相宜驅虜良民十萬往西川據成都保有蜀成信其説遂生異志逮其敗也軍中多恨不得子思今日光世到都堂押子思來去使人至京門外見鞠其情狀奏聞上甚喜李成者雄州歸信縣弓手也寡言笑重然諾譎詐不情以驍勇聞於河朔有衆發千假行仁義能以甘言撫慰其士卒故亦能得其衆心纍功知歸信縣雄州失守成妻子在城中為亂兵屠戮成率其衆萬人各扶老携幼渡河東歸朝廷授以右武大夫忠州防禦使充京東河北路都大捉殺使朝廷慮其黨太盛命二千人往南京一千人往宿州把截糧運餘衆令押赴行在成遣部將史亮者統所分之人行亮至宿州輒剽殺居民焚汴河橋躡其後逗遛懷二不進朝廷得其姦謀命光世追討至光州界勦殺平蕩無餘成僅以身免初光世許得成者以成官爵豫之士奮命爭奪故人得其祕篋與所用提刀十二日癸亥金人渡河攻開德府濮州是日得報金人渡河攻開德府不破已往濮州見今攻打城壁差御營使司統制官報後領所部兵由京城前去開德府差統制官韓世忠領所部兵前去東平府迎接又劄下先差河外總管見屯駐冀州馬政領所部兵與張俊韓世忠互相應援既而議者調張俊為中軍統制不可遠去留張俊差統制范瓊由京師前去開德府馬政率兵攻清平不克還行在先是馬政以節制應援兵馬使集諸軍欲大舉攻復陷沒河北州郡師次館陶聞冀州已陷金人攻博州皆傍徨不敢進其副俱重與統制官曲襄魯班杜林望風奔潰還朝共肆譛誣以迎合當時之意政軍士乏食衆訩訩以頓兵不動為言政遂率衆往攻清平金將達蘭郎君與棟摩鄂勒歡合兵併往攻之敵與政戰城南統制鞏仲達及子元忠皆死於陳向晡清平人開門金人掩入政斂兵退衆皆散亂不整政以事不可濟乃由濟南以歸統制張世昌之軍誤由東平路與政相失世昌途中立節制使牌早晚趨衙政到行在上表待罪褫三官罷其兵職鄂勒歡達蘭棟摩之衆敗馬擴於北京清平因之以攻河南尼堪自雲中率衆下太行南渡黎陽以攻澶濮州為夲州將官姚端乘夜攻而敗之尼堪圍濮州之初祖其小郡甚有輕敵之意端乘其不意夜鏖其營直犯中軍尼堪跣足逃僅免俘馘至城陷姚端引死士突陳而出尼堪以端之故盡屠其城尼堪謀陷濮會鄂勒歡之衆先侵北京繼略兖鄆二十六日丁丑范瓊率兵至京師翟興翟進及楊進戰伊川鳴臯山下軍敗翟進被殺宗澤之東京留守也借楊進榮州防禦使令河南府進未行澤卒杜充為留守進為京城統制其衆皆剽掠百姓苦之進不禁引衆欲入西路聲言就駐捍敵所過焚室廬驅子女殺戮無辜開發墳冢強刺壯丁數號稱七十萬擅置官吏凶暴日熾翟進翟興謀曰楊進凶賊為國家大患當力除之遂率其衆迎楊進與楊進遇於伊川之鳴臯山下夾伊水而陳楊進多騎興皆步卒望楊進騎兵有懼心翟進激之戰率衆渡伊水翟進躍馬先登為流矢所中馬驚墜入塹中為賊所害乘勢大呼擊官軍遂敗興麾餘衆保伊川留守司借楊進榮州防禦使知河南府楊進嘗隸王淵軍於應天府金人已陷京師屢分兵攻應天府淵命進及韓世忠與敵戰破之前後多所殺傷上即位淵為御營使司都統制淵妬忌才能深忌進復反有衆數萬自號沒角牛留守司遣人招安進隂許受招安乃借進榮州防禦使知河南府進不能行邵興敗羅索貝勒於解州羅索貝勒攻解州之朱家山邵興苦戰三日遂敗之殺千餘級殺其韓留貝勒毛故魯貝勒李彥仙補興從義郎遷陜西都統軍馬金人鄂勒歡達蘭㨂摩共陷慶源府五馬山義兵朝天鐡壁諸為吳玠所扼至咸陽望渭河南義兵布滿平野不得渡遂循渭而東其支軍入鄜延攻康定圍龍坊王庶禦退之於是金人盤礴於馮翊河中據浮橋以通往來渭河以南人情大恐曲端又知孟迪等聽鄜延節制尢不喜遂揭榜稱敵已過河歸國務農不可失時乃盡散渭河以南義兵庶亦斂兵保險猶以書約慶渭帥王似席貢欲大舉除馮翊餘兵逼逐過河復限大河自守至於再三似不應貢許出兵四萬竟以應報不齊又端素不欲聼王庶節制遂復遷延是時鄜延人以秋深必受兵多有遷徙而去者道出環慶吏民皆恐驚移兵人在所以檢察姦細為名奪其財物或毆殺之若無官司者二十七日甲辰金人陷絳州金人攻陕西回軍時綘州尤為國家守知州乃宗澤之小監倉也甲辰金人攻陷之軍民巷戰者六日王庶會渭慶路兵欲逐金人過河王似席貢不從先是陜西路制置使錢蓋移文鄜延帥王庶兼制環慶涇原兵討金既而義兵大起金人東還庶以金人重載可尾襲取勝移文還慶涇原各大舉協力更戰而庶慶州人也慶帥王似為桑梓又為帥庶乃貢之舉官皆以庶後進不欲聽其節制遂文具應報而兵皆不出金人遊騎上清溪山為涇原帥王慤所敗慤字誠伯瀛州人元祐六年登第靖康初授徽猷閣直學士河北都轉運使權大名府康王至大名慤來迎升延康殿學士建炎初召赴行在同知樞密院慤在大名府時有治州王明者號王鐡槍與李洪李民聚衆以復奪二聖為辭有衆數萬慤差無官宗子不尤及進士王協王慈招安撫定授明州觀察使洪民皆閣門祗候不尤武翼郎協慈皆承務郎後充知北京遣王明率衆討金人為趙六舍人所殺李民後為賊號滿天星者慤俄除尚書右丞上幸維揚除中書侍郎慤以忠梗自任會黃潛善汪伯彥潛善伯彥屢笑宗澤顛狂慤曰如宗澤之顛狂士多得數人則天下定矣二人語塞次年八月卒於位識者嘆其志未盛行而已死靖康小録曰公諱慤靖康之末公為河北都轉運使趙野帥大名師徒不安遂反欲殺野公挺身出諭衆方定且請公領帥事野得免焉大元帥自相州渡河至大名公力規時病且陳天下所以治亂安危之本上為動色而心善之明年上登大寶位召公入參樞密府稍遷右轄遂二黃門公自入預大政惟知殫竭其意益危其諫諍愈切無所避雖黃潛善怙勢肆姦專務壅蔽自汪伯彥而下奴事之不敢少忤其意惟公以直道自持面折其失誦言其短遇事必爭雖言不行而不少屈己而皆如公言上獨嘉之潛善內不能無愧愈忌公公亦屢乞身甚力上知公忠誠勤直加眷以終不聽公去天下引領俟公入相而公且死矣建炎三年夏上自杭幸建康過公之墓思公賢降詔遣使致祭厚恤其家嗚呼士之仕於朝也忠無眷於君矣而天子明察公為深言雖力不足勝潛善之姦事既驗不能革潛善之愎潛善之悮國嫉賢其罪卒不遄死而令公死乎是可嘆也詩曰建炎紹統鋭於中興乃得賢輔食蘖飲氷責君堯舜良哉股肱茍用其言不難丕承時相巨蠧忌嫉才能羣邪翼之如彼鸇鷹公奮不顧忠勇日增瞻之維何垂天之鵬瑣瑣潛善陋比蛙蠅賢死姦夀何戒何懲殿中侍御史馬伸言謝克家孫顗不可復用三朝北盟會編卷一百十八
