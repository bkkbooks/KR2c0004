body:
  text: 三朝北盟㑹編卷三十八宋徐夢莘撰靖康中帙起靖康元年二月十五日辛亥盡其日朝其上書論三鎮不可弃書曰皇天眷命陛下即位之七日下詔求直言天下幸甚微臣居山邑距京師越萬里乃得隨士庶垂淚以伏讀干戈風塵阻絶如此不謂國家遭陽九之厄也敵人斬荆棘入塞擁馬渡河㑹不淹時勢如懷山直抵城下嗚呼天乎忘我祖宗配天澤民二百年之基業乃一日有斯酷耶在春秋之時周室衰孔子春秋用是作也孰謂國家聖聖相繼重光熙洽天下太平自繩結以來未之或有天子坐簾內朝四方牧萬國曽不足以輕重威至廣也乃有城下之師國中之盟何其甚耶義士痛心壯夫灑血孰甚於斯時耶臣愚且老敢齒於壯夫義士而逖視樵牧思謀妾婦思奮之際寧無一言效哉况臣一門七世食祿髙祖逈咸平景德之際極文章禮樂之譽曽祖慤寶元康定之間任西鄙之域遂參大政罷兵息民自爾以來海內推臣族為文學之家微臣闕一字亦其職也惟臣在元符末上皇即位之初嘗應詔有封事䝉有司第臣為邪等置籍刑部初禁入京城漸不許仕宦而擯斥畀竄二十餘年矣其所言者皆天下大利害今莫能悉記惟是二事不能忘也一曰國家纍聖功德巍巍無所與二而近日諂諛大奸獨推尊考廟是觀德不在七世之廟而下同士庶祭行於寢中二曰自古衰主暗君乃有毀謗先列之言以鉗天下之口惟我神宗皇帝何所負於天下內外無有一人不足於恩德尚何毀謗之有被諂諛大奸濟以凶暴徒以資一身之欲而不知上纍先帝之明也臣愚欲因此二事申言當今之急務豈顧卞和之玉再刖其足耶竊惟城下之師明主夙夜焦勞憂慮之時狂夫之言未暇擇也伏覩戊申大赦強敵逋遁齊民乂安凡有血氣之屬咸以更生相賀又不必有言含哺鼓腹以沐太平之澤不知其已雖死猶生也然赦文有新邉之語讀者惑焉議者側嘆妄以昜州涿州之地不能保而復棄之為新邉也既而乃知所謂新邉者河間府中山府太原府三大鎮無慮二十州五十六縣自州外之為府而不知未幾乃自中國弃之為新邉也嗟夫斯地可棄也斯民不可弃也吾宗祖艱難之業不可棄也嗟乎誰為陛下而畫此䇿乎昔賈誼不忍文帝之明承天下之資而久為胸奴欺傲乃嘆曰可謂中國無人矣臣竊考之當是之時髙祖之舊臣猶在者如陳平周勃灌嬰季布之徒其後進者議論有朝錯賈山馮唐守正有申屠嘉宋昌司刑有張釋之司兵有周亞夫柴武賈誼尚何恨哉使誼尚在謂今日之有人無人乎臣於是忘其至愚且老不能默已專以割地為言未暇及天下事也惟陛下幸察臣元符中知磁州武安縣嘗作朔論二篇因杜牧之論而發也牧之意則勤矣其論失之迂而不密蓋山東不足以制河北河北為能制山東安可以天下之勢而專之於山東也哉凡君天下者得河北則得天下矣失河北則失天下矣凡有國者得河北則其國興失河北則其國弱又有其國雖不正得河北則强其國雖正失河北則弱其國雖無道得河北則强其國雖不至無道而失河北則弱秦漢晉隋唐之有天下宋武帝之不能有符氏之秦拓拔之魏朱氏之梁李氏之唐石氏之晉劉氏之漢其國所以强弱之勢與夫曹氏之魏强於劉氏蜀之漢髙氏之齊强於宇文崤函之周其迹昭然布在方䇿可考不誣是謂河北之形勢臣敢為陛下略言之陛下幸察臣已言河北重於天下矣乃敢復言三鎮之重於天下矣不必繁引逺古惟事與國家造邦相因者則可得其略昔周世宗之英武雄毅實漢光武唐太宗之流承有晉父事契丹之後劉漢禍亂之餘即位僅餘兩月黃鉞親征而師出之日四壘奔北為我宋驅除晚以數千師伐契丹不血刃而取益津關繼取瓦橋關者晉人棄之以為契丹之元首非特為其右臂也何則契丹之所盜據者七國時燕地也唐方鎮中盧龍也六國之燕最弱非韓趙魏之比方鎮中盧龍最弱亦朱滔李克用輩非魏慱田承嗣鎮冀王武俊之比而其人堅忍竒崛包藏禍心凶謀前有荆軻太子丹之風後習安祿山史思明之態易於為禍難與圖治也以故雖曰弱燕而嘗重於趙魏雖曰幽隂而常動搖魏慱鎮冀之上弃之以奉敵人實非所宜譬之熊虎得幽薊則傅之翼得三關則洊積纍其勢倍萬也然克是三關者雖曰周世宗之英武而我太祖實在兵間也世宗常以千人之軍溺於亂流叢葦之中而契丹不敢以一鏃來加者三天子之威靈在是也其克瓦橋關者又專在太祖之功也夫以三天子之威靈而得之者乃一日無為而棄之豈勝慟哭之痛哉又如石晉之末出帝之醜先自梁漢璋覆師於髙陽遂使契丹得犯澶淵之役康保裔無髙陽之敗則不勞真宗皇帝為澶淵之役矣髙陽之勝敗猶係中國之輕重如此忍論髙陽之存亡耶廟堂之上肉食者宜為陛下念之中山府唐義武軍也此軍甲兵權於天下城壁髙固自昔有揖客三年不得上之語况又其帥獨知臣節前號河北四叛義武不與後稱河北三寇之時義武亦不與也逮黃巢之亂中原四方征鎮孰為勤王之師獨義武王處存擁兵渡河以解關中之急不幸石晋之梁漢璋敗於髙陽契丹遂得犯鎮定攻中原然契丹之兵亦豈能必勝而前為入京師之舉哉亦且屢北惟是張彥釋杜仲威以禁旅重兵至中渡橋降於契丹而中山李商者納契丹使契丹遂得入京師成晉出帝之禍為中國之醜向使髙陽全師中山堅壁寧至是耶咸平中康保裔既敗於髙陽而定州之望都且復失守遂勞真宗皇帝玉輅親征而𫝊潛領十萬精兵屯中山不出一騎當斯之時逺近愚知無不憤疾潜者恥與之俱生無幾何革輅班師之後潜議罪當斬真宗時特賜其首領竄斥之議甚鬱也至今聞者擊指奮袂而起孰知真宗皇帝聖意有在也豈臣下所易窺哉蓋潜實白首老將耳目親接開運之禍變今坐擁十萬以全中山以示怯於契丹勿擊堂堂之陳勿當得意之鋭脫彼能至澶淵必不得渡河待其渡河之後我出中山十萬蓄鋭請戰之師一舉而蹙之彼契丹雖衆豈堪填吾洪流而代吾咈掃也哉彼或不克渡河我以此復截其歸路匹馬隻輪定不返矣恭惟祖宗無失刑真宗豈得私傅潜也哉真宗清净垂拱之君不惑羣聽而决意親征不以王超石晉楊延斷契丹之歸路不斬傅潜之不濟事巍巍振乎千古之上矣中山之勢宜如何哉惟我祖宗又能用中山之形勢也何則在戰國時介於趙魏之間屹然自成一國其地雖狹而謀至廣其人雖寡而才至武西足以抗秦北足以制燕無論趙魏也所謂中山君者是也太祖太宗之時每歲防春之兵全師聚於定州真宗躬置禦戎之陳以鎮定髙陽諸路之兵並㑹定州夾唐河為大陳量畨兵逺近出兵建栅仁宗謹是祖宗之制積粟則中山為多蕃兵則中山為重命帥則得韓琦至今廟而祝之歲時嚴焉太原府劉氏資有之太祖皇帝而未之克留以待太宗皇帝特封太宗為晉王即皇帝位之四年親征克之於是有宋受天明命平一天下萬國莫不知臣妾逮今將二百年重惟太宗皇帝號令之所加鼙鼓之所及一日削平唐末及五代百年之僣亂曽不足以摧枯拉朽喻於太原獨如此艱難何耶劉繼元雖孺子也有郭無為之䇿侯霸榮之勇其兵嗜戰不怯死其民樂生不輕去且復念曰太原吾父母之世所有也吾家所以革晉為漢者自太原基之也彼石氏有天下者亦自晉而得之也遂以晉篡李氏之唐而李氏所以奪朱氏之梁者晉得之也初起諸晉也其上髙祖太宗所以為唐者晉奉之也楊氏所以為隋者晉肇之也髙氏所以為齊者晉致之也司馬氏以晉自命者實謂受命於晉也其在成周宣王承厲王之亂號為中興者伐玁狁於太原也其後王師敗績於羌戎王乃料民於太原是太原為成周之盛衰者又如此也嗚呼太原之鎮可輕畀付哉重以太宗之神武念太原久未下顧視羣臣誰可與議者首詢之張暉暉曰戢兵待富庶而後為謀繼詢之張永德曰太原兵少悍加以契丹為援未可倉卒求也莫若先離其戎心又詢之薛居正居正曰太原自古難克之國周世宗之伐至於老師太祖破北敵於鴈門關盡驅其人民居虎牢關以西雖部落尚存而危國以甚卒得曹彬而謀之問曰顯德開寶兩征太原以當時兵力不能克何也帝意豈不深哉彬能身任其役帝遂决意親征躬擐甲胄曹彬郭進潘美等為之將先以進守石嶺關禦契丹乃降繼元平太原保其人民毀其城郭將貽萬世之安也况夫兩朝三帝二十餘年而得之者一日甘心而棄之乎或謂唐自安史之後河北自非朝廷所有亦何害乎為唐也哉臣應之曰唐之河北固重而失之然其據大河津以制北太原猶在朝廷也此李德裕相武宗毅然以身許國不赦澤潞卒能號令鎮魏以誅劉稹成一代偉績也以兵論之河北之鋭師因為三鎮而飛揚然太原青州各有兵十萬邠寧宣武各有兵六萬自足以制彼三鎮矣今又并太原而弃之古未有也太原唐重兵之地今弃之矣而青州盜賊久熾又未必如唐之重兵也邠寧之兵雕殘於近歲未易並言唐之宣武是謂今之汴州祖宗以重兵威天下百餘倍於唐武之兵也太宗時張洎為能言京師之兵制出於秦漢兵制仁宗時尹源又能言京師兵制出於秦漢上特與唐室論也後來宜不復開口措意於斯也奈何初變更於王安石卒殱盡於童貫天下之勢墊矣惟陛下念之天下萬方臣妾不勝至願而三鎮之形勢臣愚略陳之矣臣前所謂無名而賜之者請復言之大凡王者慎一嚬一笑不易以假人不知比之三鎮於一嚬一笑孰重輕哉謂退師為功則隋唐因突厥以有天下郭子儀嘗以回紇南蠻大食之兵而興復中國矣安得人與之地惟陛下增修盛德巖廊之上卧薪嘗膽深自刻厲以圖恢復則三軍之士氣必增百倍然後訓練士卒擇忠節之臣可為將帥者授以兵柄必能克復神州光我舊業古人一成一旅尚能光復先緒况我國家幅隕萬里土地甲兵逺勝古人不數年間必有長駕逺馭之術三鎮已復歸於職方氏矣顧惟踈逺小臣必待百官斑駕之後乃得與昆蟲共慶也雖然臣猶將有所陳者唐杜牧之最善論兵謂上䇿莫如自治漢皇甫規善用兵而先零諸羌慕其威信相勸降者十餘萬則以威信為干櫓也規之言曰力求猛敵不如清明日勤孫吳未若奉法皆自治之道也又如程苞於板楯蠻但選明能牧守自然安集不煩征伐亦知自治之者也陛下誠得如皇甫規之有威信者為師帥程苞之明能者為州郡則三鎮之復為王土可指日而期也然則邊場之城自治之道也若夫人君之自治者無時不然尤見於變亂之故猶之治兵也漢路溫舒嘗為宣帝言之曰齊有無知之禍而小白以興晉有驪姬之難而重耳以伯趙王不終諸吕作難而孝文為太宗禍亂之作將以開聖人也文帝思永至德以承天心崇仁義省刑罰通關梁一逺近禮賢如大賔愛民如赤子內恕情之所安而施之於海內是以囹圄空虛天下太平繼變亂之後必有纍舊之恩此聖賢所以昭天命也溫舒於是謂逺不及髙帝近不及武帝可謂知務矣其觀東方朔之對武帝化民不言堯舜而言文景尤著明也今陛下繼變亂之後思所以昭天命者不在仁宗乎凡溫舒之稱文帝實吾仁宗而云耳優而論之仁宗於斯大德加以嚴恭寅畏翼翼而純美漢文未必無愧也且文帝在位二十三年逮其晚歲稍惑異端孰如仁宗而相王曽李迪吕夷簡晚得杜衍文彥慱韓琦其在內外大小華國命世之臣蔚乎不可勝數稱也其用之未盡留以遺子孫者吕誨范鎮司馬光吕公著皆社稷之衛也陛下今日繼變亂之後誠能得臣如仁宗時不開邊以玩兵不專利以殘民不急刑以殺士不禁言以拒諫不豫知以自弊何慮乎金人之侵是謂大有上九自天祐之吉無不利之時也是謂洪範彛倫攸叙之時也儻或不然使梟鳴嘉禾之上蛭毒清池之中如漢幸而有皇甫規張奐為將而不幸胡廣趙戒為相其中則張遜假圭曹節等凶閹為之虎狼唐幸而有郭子儀李光弼為將而不幸元載盧杞為相其中則李輔國程元振魚朝恩等凶閹為之虎狼則天下之事去矣是謂困之六三困於石據於蒺藜入於其宫不見其妻凶之時也是謂洪範彛倫攸斁之時也嗚呼天下治亂興亡之迹出一轍也如此其治也既有明君則必有賢相而將臣自出矣臣雖至愚不願國家以將為相也昔賈誼痛哭於明時不勝其忠也阮籍痛哭於衰時不勝其憂也當今執政大臣必有撥亂之才幹國之器請為陛下念之臣所謂大有上九自天祐之吉無不利乃自乎六五之君厥孚交如威如之吉也六五有信以交乎天下終以威乎天下是謂德威故能以柔用五剛使上九受天順人信之助吉無不利也大有之君於是乎得遏惡揚善順天休命如其惡者不遏則善無自而揚何以為大有之休也耶大有一變而為乾乾之德首則在剛健而後曰中曰正曰純曰粹曰精也人君之德固宜先之剛健繼之中正歸之純粹精而天下何難乎治哉三朝北盟㑹編卷三十八
