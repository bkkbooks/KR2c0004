body:
  text: 三朝北盟㑹編卷一百八十六宋徐夢莘撰炎興下帙起紹興八年十一月二十一日癸夘盡二十五日丁未二十一日癸夘兵部侍郎兼權吏部尚書張燾率侍從官上疏是時侍從臺諌各以己見應詔㫖奏聞於是吏部尚書張燾率侍從官同進剳子曰臣等聞之傳曰聖人與衆同欲是以濟事故自古人君設施注措未有不以從衆而成違衆而敗者伏見今日屈己之事陛下以為可士大夫不以為可民庶不以為可軍士不以為可如是而求和臣等竊惑之仰惟陛下獨以為可者謂梓宫可歸也淵聖可還也母后可復也宗族土地可得也故不憚一屈以建非常之功此陛下之聖孝也國人不以為可者謂金人素多變詐今持虚文以來而梓宫未歸淵聖未還母后未復宗族土地未得何以遽為卑辱之事以咈公論也以陛下聖孝固無所不盡然天下公論又不可不從使天誘其衷敵果悔禍惟我之從而梓宫已歸淵聖已還母后已復宗族土地皆已得之則兩國通好經久之禮尚有可議豈有但信其虚言一未有所得而遂欲屈膝以從之乎一屈之後将舉國以聽之臣等恐彼之所許未必可得而我之為國日朘月削遂至不可復支矣臣等竊聞敵入境伴使北向再拜問其起居此故事也然軍民見者或至流涕夫人心戴宋如此雖使者一屈猶為之不平况肯使陛下不顧羣議斷而行之萬一衆情不勝其忿而王雲劉晏之事或見于今日陛下始有追悔之心恐已晚矣傳曰衆怒難犯專欲難成有二難以立國亂危之道也臣等職在論思竊聞輿議不敢緘黙伏望聖慈俯同輿情毋遂致屈而緩圖之不勝幸甚上覽奏愀然變色曰卿言可謂納忠朕甚喜士大夫盡心如此然朕不至為金所紿方且審問虚實燾等謝館職官上疏論和議未便左奉議郎祕書省著作郎臣胡珵左奉議郎守尚書司勲貟外郎兼史館校勘臣朱松左朝散郎行祕書省著作佐郎張明左宣教郎祕書省著作佐郎臣凌景夏左奉議郎祕書省正字兼史館校勘臣常闕左宣教郎秘書省正字兼史館校勘臣范如圭謹齋沭裁書昧死百拜獻于皇帝陛下臣聞聽魯仲連而罷新垣衍帝秦之議者魏安僖王是也甘啇於之詐而受張儀割地之欺者楚懐王是也恭惟陛下聖明天縱博貫古今是周宣光武中興之主也豈有不及魏安僖王而下同楚懐王者哉臣之所弗信也傳曰主憂臣辱主辱臣死前者上皇訃聞陛下方宅大憂天下受其辱矣今者聞道路口語籍籍審如是特辱在陛下之身臣等得其死為有名之時也人誰無死為君父死之為有宋宗社死之為古今臣子忠孝大訓死之豈為無名乎或難臣曰子之言新垣衍張儀之說是也然今日之事且不與楚魏同何也王倫之言将歸我梓宫歸我淵聖皇帝歸我天枝之族屬歸我中原之故地重質以要我大義以動我是國人顒顒望之十年而未能致者曽無亡矢遺鏃之費一朝而獲雖使主上為是一稽顙屈膝焉宜無所愛也豈與夫蘓秦倉卒之謀張儀捭闔之論同日道哉臣曰固也昔者劉項相持滎陽成皋之間常置太公俎上約髙祖降矣為髙祖者信其詐謀而遽屈則分羮之語不敢出諸口而天下亦非劉氏有矣惟髙祖不信不屈日夜思所以圖楚者而天下戮力焉故至于漢有天下一半諸侯皆附楚兵疲盡而割鴻溝東西之約自至太公吕氏自歸故敵不至於窮蹙敗亡之迫而與連和者古無有也臣聞四太子者方據汴都晏然撫有中原之民闗輔淮楚之備未始一日撤而戍卒各不下數萬屹然不移彼方秣馬而厲兵有未可圖之勢彼亦何憂何恐而一旦無故與我連和憣然若是何為也哉顧易曉爾彼恃夫蠶食之威動輒得志而我甚易喜故為和之說以侮我又慮我訓兵積衆蓄銳俟時而事有不可測之者故不得不為和之說以撓我中國民力日就困竭而金使之至無已時盖坐弊敵國疲於奔命無出此計者不憚一費而獲永寕猶之可也今年秋如是矣冬又如是矣明年又如是子産之言曰用幣必百兩百兩必千人幾千人而國不亡臣所不忍聞也殫竭膏血以養驕惰之兵屯戍不用鬱其憤憾緩急曰講和講和使此輩一旦藉口而召亂将何以弭其變哉故臣嘗謂秦之行成金之和使兵家用之百勝之術也六國不悟行成割地之無厭故至于社稷不血食國家不悟金使講和之得䇿其禍豈可勝道哉而况敵國無厭所從來久恃強侮弱彼其志不在小豈可嗜其甘言信之不惑其料事亦疎矣彼以和之一事得志於我十有二年矣以覆我王室因以弛我邉備以竭我國力以解體我将帥以懈緩我不共戴天之讐以絶望我中國謳吟思嘆之赤子奈何至今而猶未悟也陛下躬曾閔之行受金人之侮不過曰使我獲伸東朝一日之養於天下是亦足矣未遑卹他臣恐聖慮未必得所求而禍生於意外之所未嘗防也豈可不為寒心哉信如道路之言則金人之要我至不遜也至無稽也是坐而降我也艱難以來彼茍可以毒我者無遺力矣獨欠約我一事耳今不慮而從之且梓宫何在在境已乎母后何在淵聖皇帝何在在行已乎中原故地版圖何在在使者所已乎陛下奈何不顧祖宗社稷二百年付託之重将不慮而從輕以萬乘之尊冒險而徼倖彼金人茍獲濟其不遜而藉躪以逞将焉避之哉劉豫之監甚未逺也當是時累百王倫何補救敗之際而倫之在金為功臣矣可得而追戮哉子思曰人主自臧則衆謀不進事是而臧之猶卻衆謀况未必臧乎故曰聖人甚禍無故之利不可不察也臣等疎逺小臣然于行在與備一官司之列坐縻廪祿無以報大賜情迫理極義不愛身冒干雷霆甘俟斧鉞臣等無任惶懼激切屏營之至勾龍如淵為御史中丞宰相秦檜方主和議力賛屈己之説以為此事當由聖斷不必謀之在庭上從其議已定而外論紛然羣起以攻之檜大懼起居舍人勾龍如淵獻計於檜曰相公為天下大計而羣說横起何不擇人為臺官使盡擊去則相公之事濟矣檜大悟遂擢勾龍淵如為御史中丞人皆駭愕二十五日丁未樞宻院編修官胡銓上書乞斬秦檜孫近王倫書曰臣謹按王倫狎邪小人市井無賴頃縁宰相無識遂舉以使金專用詐誕欺罔天聽驟得美官天下之人切齒唾罵今日無故誘致金使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事金人南面稱王以為子孫帝王萬世之業牢不可拔一旦敵人改慮捽而縛之父子為擄啇監不逺而倫乃欲陛下效之夫天下者祖宗之天下陛下之位祖宗之位也奈何以祖宗之天下為金國之天下祖宗之位為金國藩臣之位陛下一屈膝金人則祖宗社稷之靈遂將不祀祖宗數百年之赤子盡為敵有廟庭之宰輔盡為陪臣天下士大夫皆當包羞淟涊不知有氣節而敵人無厭之求安知不加我以無禮如劉豫也哉夫三尺童子不拜讐敵堂堂大朝相率而拜讐敵曽不若童穉之羞而陛下忍為之邪倫之意乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變亂以來主和議者誰不以此說㗖陛下然而卒無一騐則敵之情偽已可見矣而陛下尚不覺悟竭民膏血忘國誓讐而不報含垢忍辱舉天下而臣之甘心焉就令敵决可和而盡如倫議天下後世以陛下為何如主也矧金人變計百出而倫又以奸邪濟之則梓宫决不可還太后决不可復淵聖决不可歸中原决不可得而一屈膝不可復伸國勢凌夷不可復振可不為慟哭流涕長太息哉向者陛下間闗海道危如累卵尚不肯臣敵况今日國勢既振諸将盡銳士卒思奮如今日金人奔馳偽豫入冦固嘗敗之于襄陽敗之于淮上敗之于渦口敗之于淮陰較之前日蹈海之危固已萬萬不侔倘不得已而至于用兵則吾豈遽出金人下哉今無故欲臣之屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連義不帝秦非惜夫帝秦之虚名惜天下大勢有所不可也今内而百官外而軍民萬口一談皆欲食倫之肉謗議詾詾陛下不聞正恐一旦變作禍且不測臣故謂不斬王倫國之存亡未可知也雖然倫故不足道也秦檜為心腹大臣而不為之計陛下有堯舜之資檜不能致陛下於唐虞而欲導陛下為石晉頃者禮部侍郎曽開等以古議折檜檜乃厲聲折之曰侍郎知故事我獨不知則檜之遂非愎諌已自可知而乃建議命臺諌侍臣㑹議可否盖畏天下議已令臺省侍從共分謗耳有識者皆以謂朝廷無人吁可惜也管仲當齊桓時九合諸侯一匡天下南抑強楚西摧秦晉孔子嘉之秦檜大國之相獨不能尊主庇民建萬全之策反含羞忍垢以求生耶則檜也不惟陛下之罪人實管仲之罪人也孫近附檜遂得參知政事天下望治有如飢渇而近伴食中書漫不知可否檜曰金可講和近曰可和檜曰天子當拜近曰當拜臣嘗至政事堂三發問而三不答但云已令臺諌侍從議之矣嗚呼身為參政不能賛佐大治徒取充位如此若敵騎長驅近豈能折衝禦侮邪竊謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斬三人頭竿之藁街聽臣之計覊留金使責以無禮徐興問罪之師則三軍之士不戰而氣倍不然臣赴東海而死寜能處於小朝廷而求活邪書奏市井間喧騰數日不定秦檜上表待罪有詔檜無罪可待乃復治事銓遂罷王庶論和議劄付第一劄子曰臣竊聞王倫自金國奉使回及金國遣使前來将到行在臣先奉聖諭前來江淮措置邉防莫獲親詣黼座與聞國論臣承乏樞庭不得黙黙自已輒貢愚衷冒凟天聽臣聞無故請和者謀也究觀金人侵軼嵗逾一紀前來乘全勝之勢直擣江淮我國之師未嘗不退縮以避其鋒逮至紹興甲寅冬偽衆深入駐兵淮南陛下親征致彼奔潰而去又丙辰冬敵人傾國南向陛下再統六師壓江南表裏之衝皇威大振偽豫始知所畏於是遣使告以徽宗皇帝顯肅皇后訃音彼若果篤隣好所報訃音不應在累年之後彼其技窮跡露畏我國家乘間長驅故設此謀沮我師銳氣陛下天資聖孝哀毁之中即遣使求梓宫往返之間一年有半尚未與决固已墮彼計中又聞去年金人以欺詐廢偽庭用事之人奔走四出百姓日虞朝廷之受其欺誑衆情反側金人數輩在闗中者若據爐炭恐疑迫急莫甚于斯時若國家乘機㑹一麾則中原雲合響應其深謀却顧不得不再遣使也從違之間可不深思而熟計之臣中夜以思敵使之來甘言厚貌不出二䇿一則以淮為界一則以河為界若以淮為界則我今日所有之地而淮之外亦有見今州縣所治如泗州漣水軍是也既為我有安俟以和為請若以河為界則東西四望兵火之餘白骨未歛幾無人跡彼若誠實與我乃故疆遺民豈可同偽豫之不恤尚應十年無征役以蘇息之財賦何自而出彼所責嵗賂無慮數百萬又豈可加内郡之賦以償不毛之土必以三十萬兵宿於逺餉無用之地假以嵗月焉得不困弊彼之為計可謂盡善也臣願陛下先與在庭之臣立為一定之論若以淮為界則我賂之何益若以河為界則瘡痍殘民撫存不暇還定安集非俟經五稔方可賦調所議嵗賂五年之後方可津遣先慮而議猶恐未至如或不然則彼以計困我以戰則不可以賂則不及皆墮其術中是宜陛下宵旰深思洞察以為經久之圗狂瞽之說仰凟淵聽臣無任隕越待罪之至第二劄子臣近縁措置邉方徧到沿邉州郡及與守臣次第㑹議聞金國自廢豫之後遼人漢人上下不安日夕思變前此歸正者甚衆其意可見彼知其屯戍不足又旋起簽軍以實疆塲今之簽軍又非昔比老弱盡行人心乖離抑又甚焉岳飛近日與臣咨自稱今嵗若不乘機㑹舉兵要納節乞閒韓世忠亦以為然臣方欲到榻前縷細開陳今聞使人入境必大有需索若以梓宫為說如言得歸事在來年又詐偽未易可保今陵寢陷沒豈特徽宗顯肅兩梓宫而已若割淮畫河議和兩淮我今有之大河南則千里丘墟勢須屯兵持守揆諸事力支持不易所謂非徒無益而又害之也彼必以此三說疑我正當剖析曲直利害逆折其詐彼利於和必委曲不得已而從我切望斷自宸衷出臣此章與大臣熟議之無落奸謀之便天下幸甚第三劄子臣聞季孫行父之為臣見有禮于君者若孝子之養父母也見無禮于君者如鷹鸇之逐鳥雀也臣雖不才竊有志焉臣近聞前此金使傲慢無禮多許金幣方稍恭順如此畨使人來不可復循前轍欲望陛下先遣人諭㫖以方在諒陰聞使人至摧慟不堪為言不須遽令朝見恐有啇量事且令與大臣趙鼎商議如此少破其奸計又得徐觀趨向在朝廷為得體抑少挫其銳此事與大臣議之必無不可者惟是王倫决以為不然彼方要朝廷曲從敵意以成一己之私此人不達大體前日自陳廢劉豫之功如此大事人皆知之尚敢欺誕其餘何所不至萬望聖察臣無任云云第四劄子臣自聞金使之來蚤夜往來於胸中仰恃陛下兼聽之明臣敢進千慮之一得常談末論猥凟公車竊度陛下不以為未然抑将信而行之是以愚臣感深激發益竭其心茍有所知不敢不盡願復畢其說夫懐安敗名晏安酖毒古人戒之國家不慮疆塲患生包藏禍心之人變詐百出自渝海上之盟至今日其欺我者何所不至陛下所自知也豈待臣言不慮晏安酖毒之戒尚将信其愚弄臣不知其可也今其誠偽以陛下之聖固難逃於照臨然而但不可輕信其說又不可遽見其使夫商之髙宗三年不言其在諒陰言猶不出其可見外國之使乎先帝北征而不復天地鬼神為之怒憤能言之類孰不痛心陛下抱負永訣之痛将見不共戴天之讐其将何以為心又将何以為容亦将何以為說臣愚伏願陛下以宗社之重深思商宗不言之意無見異域之使人只令趙鼎而下熟與商議足以彰陛下孝思之誠而於國體為宜臣恭依詔㫖見今兼程前去奏事誠恐臣萬一未到闕下之日金使先已授館陛下不疑而易見之敢布腹心伏惟聖聽采納天下幸甚第五劄子臣准省劄子令疾速依累降聖㫖赴行在奏事臣縁在廬州伏暑臟腑加之乘騎未得見沿流兼程前詣臣以金使入境屢貢狂瞽上凟聖聽特䝉寛貸未賜誅斥比聞使人經過州郡傲慢自尊畧無平日禮節伴使欲一見而不可得官司供帳至有打造金醆百端須索肆言駭聽臣昨所上封事初言陛下方在諒陰不當遽見使人且以挫其風稜兼於國體為得次言金人講和非其本心奸謀詭計用之有素次言地界嵗幣事闗宗社未易輕議仰惟聖明必深察其當否區區妄庸何所逃罪然臣資禀愚直心懐憤懣不能自已輒復論列幸陛下恕其再三之凟臣聞自古謀人之國者必有一定之論越之事吴在驕其志秦之取六國在散其從其間或出入一定之論未嘗易也金人志不在小所以謀人之國者曰和而已觀其既以是謀契丹又以是謀中國方突騎凌京闕初以和議為解暨大兵圍城仍以和議為辭二聖逺播中原板蕩十餘年間四郊多壘零落不堪荆棘銅駝可勝浩嘆而和議未之或廢也今王倫迎奉梓宫而再受金人和議以歸且與其使俱來此為可信乎劉豫之廢金人慮中原百姓或有反側陜西降将或生顧望國家一旦出師必有内應者此設講和之說遣使疑我昭然無疑臣䝉陛下親擢備位本兵國之大事不敢隠黙故重為陛下陳其三策莫若拘其使而怒之彼必加兵我則應之所謂善戰者致人而不致於人也金人強大自居一旦或拘其使出於意表銳氣驟奪殞敗可立而待次願陛下念不共戴天之讐且謝使人勿與相見一切令與大臣商議然後徐觀所嚮隨事酬應最其下者姑示怯弱待以厚禮俟其出界精兵躡之掩其不備破之必矣倘陛下采其愚忠用濟機㑹臣敢不罄竭陪在廷之末議或以臣為妄誕不切于事則臣之智思窮於是矣不敢復有論說也臣頃與邉帥及諸大将議論皆云若失今日機㑹他日勞師費財决無補于事功至于抵掌擊節皆云今年不用兵乞納節致仕觀此則人情思奮皆願為陛下一戰望陛下英斷而力行之臣不敢愛死以報萬一干冒天威戰灼無地第六劄子臣奮身寒素無能報稱特荷眷知擢任廟堂臣之遭遇世無以過朝夕以思欲効涓埃願助海岳去安即危惡生就死豈人情哉伏望聖慈懸日月之明息雷霆之怒或十有一從為幸非細近者金人議和非本至誠實有包藏臣數有章疏未䝉俞允臣不免再具危懇上凟天聽伏望居髙聽卑旁燭無私少為鑒察金人之謀不過有二一則為己一則為我捨此非狂則愚也所謂為己者不過乎彼外訌内叛互相猜忌擁兵角立莫敢先動故為設此謀以待平定徐為後圖此為己之計也所謂為我者必以金幣已定不須多積土地已廣不須多占又陛下事之至謹心懐仁恕懇之至切哀憫悔禍欲立盟好永為隣壤此為我之謀也陛下試深思若敵為己謀臣故慮之熟矣若為我謀臣死不敢言惟陛下留念無忽三朝北盟㑹編卷一百八十六
