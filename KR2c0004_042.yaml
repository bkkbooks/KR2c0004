body:
  text: 三朝北盟㑹編卷四十二宋徐夢莘撰靖康中帙起靖康元年六月二十六日壬戌盡三月三日己巳吳若又以書貽中丞許翰書曰若聞君子之愛人也以德細人之愛人也以姑息愛人以姑息必進偷安之言愛人以德必進藥石之論近世公卿挾穿窬售身者多矣既自其身遂以此望人故稍聞辨别是非者驚為村鄙况肯受人之盡言乎要非卓然特立自拔於流俗之中者未可與進藥石之論也竊聞中丞丈昔在禁掖以代言不詭隨獲罪復拜職青瑣以救孫傳被黜氣節如此必能受盡言矣若故願效其區區夫主上新即位强敵入城社稷震動賴祖宗天地之靈僅免傾覆而承紀綱敗壞之餘人材雕喪之後誤國之黨尚留廟堂賊民之官猶充郡縣國勢委靡風俗陵夷士民顒顒獨一賢相出輔聖主以直道定國是以公論進人材盡去凶邪大收威柄慎惜名器平用賞刑因民之怒以飭兵順民之欲以施政嘗膽齧指雪上皇遜位之辱而吳敏乃首以姦進附下罔上有模倣蔡京之志中丞知之而未言耶抑不悟其心也崇寧以來臺諫皆熟視姦邪蓄縮閉口及其敗露已正典刑而彈章始至故雖有臺職無救於亂獨陳瓘言蔡京於威權之先至今天下稱誦以為知幾中丞平昔自負必不肯居陳瓘以下其早察之吳敏建請上皇遜位遂授門下侍郎之除計其趍操豈復能自振士論喧噪因指為蔡攸死黨謂蔡氏父子探上皇㫖意令敏投隙為之庶幾敏在朝廷庇其宗禍或如此敏特人役也果可在具瞻之位乎然若舊欽吳敏學問尚疑其徐有所處及見救李邦彥劄子則始驚曰敏真謬用其心矣吳敏先言軍人伏闕殺內侍毆宰相懼致髙歡窺魏之事此蓋欲以利害動人主而鉗天下之口也次言李邦彥輔佐上皇前歲罷易宰相更革政事定山東河北之寇皆出其力此非特曲救李邦彥乃救蔡攸也又言建遣李鄴輩使金人軍中終賴其力此蓋敏同主和議自徼其功也卒言異時王黼姦惡而不及蔡京此又蔡京成吳敏王黼逐之蔡攸召之之私也事皆不虛言庶可復昔胡后亂朝魏政不競故衛士之以私憤焚殺張彛之家非為國也髙歡畜馬積財本有異志因此結士無忌憚之心至如前日軍民殺內侍毆宰相豈聞有怨乎欣戴主上之德欲除國賊張朝威耳雖使髙歡復生知民之未忘宋也而姦心自沮何窺伺之敢哉吳敏以此劫羣下志必有所在矣初上皇之相蔡京也京首立上書朋黨之法竄逐義士由此遂成壅蔽之風前日伏闕之士乃二十餘年防民之甚奔潰如此今人主即位之初吳敏當陳人心可畏使人主瞿然知覆舟馭馬之戒而首用髙歡事動之此語一入言路塞矣杜牧賦秦阿房宫曰使天下之人不敢言而敢怒夫民敢言如前日乃中興之祥萬一壅之使至於敢怒而已則彼袒臂大呼者豈復於闕下哉某嘗聞上皇時有爭得失執憲度者輒批曰五代跋扈君弱臣强之風故雖有賁育之勇者莫敢犯雷霆之怒今又使臣下避髙歡之禍則朱雲王章復作亦不肯詣闕獻言矣吳敏此言不知宰相之體也凡為宰相者舉措慰天下之望百姓將以手加額未聞蕭曹邴魏房杜姚宋懼人毆擊於闕庭之下也至於李邦彥在黼時似有士譽然身居政府知燕雲之事必敗而持祿容身才執親喪遽聞起復果以天下一日不可無李邦彥乎則力諫窮兵自焚之灾稍申棄親事君之義何乃深穴狡兔之窟潜為鬼蜮之謀結蔡攸罷王黼身取宰相而蔡京復出蔡京亂常猶偃然不慚略飾要君之辭終無避責之實其為患失與王黼何殊而欲以罷黼為功是猶蔡京諌取燕雲蔡攸身為統帥父欲免謗於後子欲徼功於前人臣寧愚不識機陷於王黼之黨罪則罪爾至於心知不可意乃叨名首竄妖狐愚弄天下雖有刀鋸豈能盡刑若夫李鄴使敵兒童笑之虛張敵勢震動朝野使大臣膽落兵將氣消坐視長驅寸草不結且聞貪金邀地金人本謀李鄴粗有識知自可折之以計而乃賣國謀身與敵為市及李棁一出喪魄失言鄭望之輩又索髙價於本朝輸忠欵於異域吳敏既在樞府諒無藉口於將來遂指李邦彥為有援於事機指李鄴為有功於國其與范蠡請㑹稽之罪舅犯數從亡之愆識趣亦不等矣若夫王黼姦惡難逭刑誅然比蔡京十無四五童貫之能竊兵柄蔡京實縱之方童貫之惑上皇圖幽薊在王黼特欲分竒功取宰相耳蔡京固秉國者何不死爭耶今吳敏用刑不平公論未允中丞丈如謂某言過當則請以吳敏召用人材觀之葉夢得棄於人倫遽典名郡又當過闕陸藻貪汚有素起守南門人主新即政之時召用一人四海拭目而敏乃先此二人何哉聞敏與葉夢得深交知其無罪夫百姓不可家至戶曉夢得之說四海具聞蔡絛召之上皇且以為害風教矣不知吳敏何以白之於天下如曰流俗謗議不足恤違公議而用之則夢得之私恩歸於吳敏百姓之謗囂歸於主上矣十餘年來竭人膏血破人骨肉箕斂星奔盜賊蝟奮使民父食其子夫賣其妻四海豈復有願戴之心哉獨以主上之居春宫仁儉清修繫天下望至倉卒之變上皇知能傳位遂舍社稷吳敏不深念此又欲令主上抑人心違公論棄人之望而不用舍罪之魁而不誅指髙歡以動羣臣戒元魏而防民口萬一使主上結怨於民中興之功不亦難乎某嘗論上皇大臣皆有主辱臣死之責不當在庭而吳敏之徒不當作相何則援立之功如周公之於成王霍光之於昭帝乃當秉政不辭至於今日上皇還宫以就孝飬吳敏等自有進退顧避之嫌羣下易以生間昔房琯但一為肅宗送寶册爾身當親任賀蘭進明遂得疑之琯雖不長於兵然陳陶斜之禍未必不以上下疑阻而至敗也昔周武用文王之吕望漢惠用髙祖之蕭曹因民之心遂成大業至於漢宣帝心疑霍光而亟用魏相唐太宗欲誅裴寂而親信魏徴用舍之宜固自有理中丞丈其為國家審思之亦所以忠於吳敏也某又聞中丞丈與吳敏厚果爾敏不罷中丞不當居職蓋聞蔡京王黼之相也開封臺諫遍置心腹說者曰欲逐則臺諫為擊之欲罪則開封府為煆鍊之此蔡京王黼所以權傾天下而上皇不悟也今吳敏不必能至此但中丞丈善自為謀可也中丞丈如無歉於心不避此職亟言吳敏乃可免謗於天下耳吳若字秀海相州人以上舍釋褐官修職郎文學優贍議論慷慨娶張邦昌妷女常勸邦昌諌上皇花石事邦昌不聽乃言於邦昌之妻妻駭然曰吳郎風邪何忽如此除太學正上書謂敏之救邦彥乃是救蔡攸其端可見矣書聞人人傳觀上不欲拂邦彥吳敏之意故斥吳若與合入差遣即日出城若欣然而去頗為士林所惜尼堪兵過澤州逢奉使路允迪等言城下講和已割三鎮乃還太原尼堪遂還太原於城外舊城築而居之號曰元帥府盡陷屬縣運芻粟為久居之計御史中丞許翰上書論决戰有五利臣伏見金人退師以來朝廷縉紳上恬下嬉幸於無事恃以為安而臣獨竊終夜不寐方以為憂夫以敵國之兵猛鷙驍勇而我既示之以弱開之以利不過一二歲勢必復來自所割三鎮疾馳三日則突騎迫都飛塵入宫闕矣當此之時金帛不可復得地土不可復割邉鄙之師不可復召知能之士不可復圖萬世之變可勝言哉今聞姚古引兵已次國郊竊謂陛下可一以閫外之事制於將帥若遣一介之使可下下之使不可則用兵不疑臣嘗熟計我戰而勝則䝉福無窮戰而不勝則北厄井陘西斷太行內守大河國固無患敵以殘弊將歸之兵力不能復取三鎮故我勝亦利不勝亦利此可决戰一也敵欲既盈將驕卒懈時益暄熱人馬喘汗以我方鋭擊其惰歸此可决戰二也我衆彼寡以十當一反顧者誅旋踵者斬使威令既必則敗弱者奮况於關陜百戰之士外誘於金繒而內激於憤耻破賊必矣此可以决戰三也种師道持重名將今雖老智略足恃議者見其木訥若無䇿畫此蓋不以口擊賊者昔趙括論兵其父奢不能難也而奢謂括將必敗趙師宋文帝在江左聞王元謨論兵飄飄有伊洛間意及使之將望風奔潰聞師道自少沉毅蓋其天姿介胄之士瞋目語難自古而然未可遂疑况今濟以姚古必能相與立功此可决戰四也陛下仁聖誠動萬姓義感三軍人人思為國死以滌中原之耻而發七廟之憤夫天時易失而人心難收陛下若不乘此利勢後必悔之此可决戰五也今全軀保妻子之臣務在張敵勢虛愒恐劫茍安目前為患萬世其意亦無他不過謂戰不勝則咎歸議者使身不利今一主和身保無患明年盛秋敵騎復來則必諉曰國家事敵不至不得歸咎和者姦回自營孰便於此非復有為陛下宗廟社稷長慮却顧夫一勝一負兵家常勢要觀大計如何耳議者以姚平仲前日妄動小衄以謂王師不可復用傳曰凡此蔡功惟斷乃成故願陛下斷之而已又上書臣伏見王師既行廟算未定此疑事也今古蓋未有疑事成功者故朝廷之意惑則將帥之心不一將帥之心不一則士卒之氣不鋭斷而必行鬼神避之此精神之力也陛下欲斷今日之議當究為和為戰卒當如何而已矣其中小小利鈍非大計之所係也昔漢髙帝蜀先主皆號聰明神武為一代之英雄考其用兵敗北無數然其志挫而愈勵抑而更揚者大計已定於中此其所以為英雄者也陛下决和議則臣欲陛下取太史公史記虞卿傳覽其反覆此往古之鑑也方今若失三鎮二十州之地則天下勢已斷西河地無河東則陜不可守無河朔則汴不可都汴不可都謀渡江南臣考永嘉渡江能為東晉者乃王導謝安英賢相繼扶危救傾僅能立國而中原丘墟遂至陸沉後世有王導謝安之才則東晉宗廟可復立也社稷可復建也盜入陵寢取一抔土則將若之何言至此可為流涕陛下永念方來之難則今日雖復騷動天下尤不得已何者擇禍莫若輕也或者以為太祖即位未有江南晉蜀而卒能混一區宇臣以為不侔矣太祖生長兵間非若陛下繼體守文建隆將士百戰精鋭非若方今將不素飬兵不素鍊也敵在掌握縱而不取使之益張若之何而以太祖為言故凡守和議者以國與人者也陛下欲决戰議和則臣之所陳可見者五已具前奏矣今使敵不釋憾則渡河之師當戰戰則必有漕運之役有應援之兵有屯據之要皆當素治不許小却專責成功而後將帥志一士卒氣奮三鎮之守有死無二若我將以疑遣師以茍行則精鋭已亡何以取勝凡今為和議茍取目前之事雖然亦未可必也臣聞西北之民人人相語曰吾屬與其為虜何不南向作賊死為中原鬼使三鎮之衆發憤怨懟人為冦攘非小變也姑息目前亦未易况又方來之患亦未知稅駕自古用兵必有異議成王之時周公東征民有十夫豫翼而已其他罔不反曰艱大晉武與杜預謀取江南大臣賈充等皆力爭之時獨一張華贊定大計唐憲宗用武元衡裴度謀討淮西盜殺宰相朝廷震恐請罷裴度以安諸鎮憲宗大怒討蔡益急唐之威令自是復振周世宗即位北漢引契丹入攻河東世宗自將禦之宰相馮道固爭不得周之功烈自是遂興書曰惟克果斷乃罔後艱陛下所以疑者度衆人必以姚平仲前日之敗自持其說近种師道為臣言平仲所以不利者劫寨之法不用大兵當少擾之使自躁藉而後可乘又地勢橫入江河中此利誘使戰不利以兵入寇也臣以是知師道有謀故前日之功在不用老將而用驍將勇不恃謀而恃詞說非兵不可用也昔石晉開運之變契丹始入敗不窮追近冬復來陷都城國朝景德契丹入寇澶淵之役亦不窮追而與敵和親夫開運景德驅逐之䇿同而成敗之功效異者何也開運之時中國方弱而示之以畏故敵復來景德之間中國正强受之以和故敵遂定今議者不鍳開運縱敵之患欲為景德之寬大則可謂不知時矣陛下何以不試使議割者身任數年敵不復入則臣知議者必將難之夫國不保數年而欲定萬世之䇿必不能矣乞下臣章使有司定議詔曰是事甚大可令三省樞密院議取長策以付諸將改金字牌入內內侍省狀比因金人入攻截攔遞角內有御前金字牌子竊慮倣效製造欲將舊法御前劄子等不得入鋪朱紅金字改用黃漆朱紅字牌子奉聖㫖依奏誅梁方平臣寮上言金人侵犯河北梁方平何灌各統精兵控扼河津方平敗衄棄河不守灌望風而遁今灌以重傷死於牖下而方平未正典刑奉聖㫖依軍法初金人在城下梁方平守京城西壁方平命軍士矢無虛發候敵近則射之百姓以為方平叛率衆數喧囂執方平開封府囚之謂方平家藏金人乃入其家搬其家資官司斬首亂者數人乃定至是李綱建議請誅方平遂斬於市靖康前録曰是日收梁方平械送開封府治不守河之罪斬於茅座橋二十九日乙丑李邦彥乞持服依奏三月一日丁卯朔賞功詔書詔曰朕初歷服適遭艱難賴天之靈敵人悔禍永惟士大夫擐甲胄冒矢石捍敵勤王卒用有就朕甚嘉之夫有功不賞有罪不刑雖堯舜不能以化天下朕操威福之柄馭賞罰之權不愛髙爵重賞以待戰士其令有司速具等第立功將士之名來上毋以愛憎為髙下務在必當庶幾賞不踰時感勵思奮協圖康功今後非有軍功戰功實有勞績之人外並無恩幸非泛轉官賞賜播告逺邇明知朕意二日戊辰詔德安府進士張柄太學生雷觀上書論事可嘉並與進士出身補迪功郎除祕書正字誥詞朕初宅丕祚務廣聽納庶來異同之論以滌壅蔽之奸雖布衣之士一言之善亦兼收並取而不遺况爾等器識之美術業之富剡牘來上文義燦然肆加褒渥以就官使夫博士師儒職也爾自諸生遂升此選其亦榮矣得之非難持之惟難往祇朕訓以克有終可依前件靖康録曰自上即位以來芻蕘之言封章日不下數十函乙夜觀覽未嘗稍厭有一善未嘗不知知之未嘗不行與大臣議論嘗輟食吐哺前席咨訪陟自東宫時徙宫中服御器皿與夫府庫之積並兼輜重共不及百擔而圖書居其半幃帳無文繡之麗几榻無丹漆之飾規為素朴聽政未有月餘開革弊政凡一百五事收其贏資與其羡卒足食足兵故發兵興制而斂不及於天下皆慎乃儉德之所致非矯拂所能為也六賊如王黼梁師成李邦彥談積或竄或殛至是蔡京父子童貫朱勔又皆正其罪斬方平首戒後之領軍逗遛而歸者何灌遂與方平等雖死不赦奪官及其子孫超唐恪為樞密許翰為中丞供職姚古种師道師中為制置使馮澥何㮚陳過庭梅執禮皆被召徐處仁上心眷眷俟其至虛上宰未除輿論快然太平之期跂踵可待三月二日太學生雷觀張柄以二月五日上書合㫖賜進士及第試觀二子之書論事各得陳東十一而已東不免戮幸而二子榮遇如此使金人不屈而死如郎官傅察者不聞褒崇盡言極諫忠衛社稷不諛君父不附宰執如吳若者反見斥逐天下事出人意外舉不可以逆料也三日己巳授大宰張邦昌觀文殿大學士太一宫使門下難進易退允髙君子之風崇舊優賢實重朝廷之體眷豫元弼為國良臣用舍雖繫於時始終且篤其義誕敷明命敷告治朝光祿大夫太宰兼門下侍郎張邦昌智沈而識精氣慱而用逺蚤登禁路廷臣無出其先久預政機天下實受其賜嘉有功於社稷俾正位於台衡丙吉有聲猶擅邉書之備王商多質有嚴漢相之威念其行李之勤處以真祠之逸升華祕殿庶尚便於咨詢陪賦爰田用昭宣於物采於戲留侯知足願遺人事之勞南仲將歸毋憚簡書之急其全明哲以保功名可特授觀文殿大學士太一宫使依前光祿大夫加食邑七百戶三朝北盟㑹編卷四十二
