body:
  text: 三朝北盟㑹編卷五十二宋徐夢莘撰靖康中帙起靖康元年八月二十日癸丑盡九月三日丙寅李若水奉使金人于山西軍前初朝廷欲遣使金國以租賦贖三鎮令侍從臺諌各舉三人有舉太常博士李若氷者上召見惡其名若氷上曰若猶弱也氷猶兵也兵不可弱遂賜名若水除祕書省著作佐郎借祕書少監使于金國山西軍前八月二十一日甲寅差監察御史張澄前往廣南追逐童貫二十三日丙辰誅童貫于南雄州先是朝廷差監察御史張􅊹將帶開封府公人前去廣南追逐童貫所至州軍行刑八月二十三日至南雄州追及童貫遵依聖㫖處分斬于使院凡三刀不過乃倚尸于門閾􅋀斷之取其首用水銀等養浸齎管赴闕中興姓氏奸邪録曰童貫字道夫開封人也少為內侍出為登州巡檢頗有材幹後徽宗器用之政和二年與鄭久中使于契丹邀馬植來歸以謀燕山諸州後為陜西宣撫使督軍與夏人西蕃戰席葦平破臧底河纍有功然貫身在數百里外遙為節制加節度使六年簽書樞密院事又加太傅宣和二年方臘反睦州陷溫台婺處杭秀等州東南震動以貫為江浙宣撫使領劉延慶劉光世辛企宗宋江等軍二十餘萬往討之貫行方事急上為出城東以餞貫握貫之手親送之曰東南事盡付太傅必有急緊不得已可徑作御筆行下貫至浙率諸將擒獻于京師加太師內侍邵成章言貫之姦上不納四年聞契丹國亂大金來結盟約夾攻之也上鋭意取燕山九州命貫為宣撫使貫乃令趙良嗣馬擴使于大金密請進兵以襲燕山大金下燕遣人邀貫命統制姚平仲往交燕山諸州封廣陽郡王貫之親軍號為勝捷軍請給倍于諸軍貫已貴而驕不恤將士賞罰不明紀律尤亂僕役皆為顯官胥吏李宗振門客范訥皆節度使尤不用人材陜西河北因數用兵軍民皆不能恤其家園池沼甲于京師金玉數十萬計服食無異御府故天下怨之六年秋復領大兵軍太原雲中七年復出聞大金兵盛乃還徽宗遜位貫領兵隨之南幸太學生陳東上書極言其姦惡靖康元年臣僚屢言之責授左衛上將軍致仕後再言其罪責昭化軍節度副使郴州安置再言曰金人之熾緣契丹之滅也契丹所以滅者緣貫殘其國也若斬貫以示契丹以釋其憤契丹之怨稍平金人之師自退命監察御史張􅊹追貫至南雄州數其罪而斬之年七十三梟首京師百姓皆悅童貫始為殿頭元符末主杭州之明金局蔡京時被責在焉貫能媚事人且深奉蔡京自言頃押衣襖茶藥奉使于陜西者凡十一每為蔡京厯道五路利害與諸將之玩敵京器之及作相㑹上欲收復青唐乃以貫為監軍既下青唐遂竊威名大觀中再出討臧征僕哥有功俄遷節度使是後上數欲命為開府始賜第建閣又許造錫名曰褒功而止繇是怏怏不滿後蔡京出政和元年貫副尚書鄭久中奉使遼人蔡京時在杭州聞之因附使人密奏曰貫實無大能偶以青唐事遂竊威名宜深藏之以懼敵國今遣使遼豈不為所窺乎上報曰遼主欲之耳彼既邀我我因覘之不亦可乎自是始啓北征之漸貫遂引馬植來奔馬植者趙良嗣也貫已大用事數壞邊事獨不可制朝廷於是下詔疏其六事命右司郎官方邵為察訪俾亷之貫乃使人隨邵伺其所為先得以白上及邵還奏每一語上隨以折之曰卿不知是事云云乃御前處分也邵大怒當御榻不去盡發貫罪惡敗壞國事於是邵得罪而終身不復自後天下為貫結舌時官制改乃以為太尉是猶前日意不得開府也至五六年則開府少保不能遏矣初獨簽書河西房事俄遂領樞密院未久又上平燕䇿大欲生北釁密遣人使海上結約矣改為司空領樞密院遂日出赴朝班每在朝廷則衣三公之服與執政同奏事入內則衣內侍之衣執灑掃之役又數搖東宫力主鄆邸與蔡攸俱奉詔結鄆邸為兄弟且飬西兵號勝捷指揮為親軍屢增至千數百人宿輦下中外為之寒心及金兵至太上南幸時上欲趣武關入長安㑹兵圖收復而朝議以貫守東都然倉皇時貫自從太上行俄而貫得罪朝廷疏其十事遣監察御史視行刑者斬焉貫無他能但有度量善容納則世所未見始青唐因人成功後徒以金帛賂敵取名入則籍宣撫司之富盛以奉至尊賂後庭又反賂諸小璫及親近者為援凡皆用是術至金人一不能賂則敗矣又其狀燕頷瞻視偉如獨不類宫人喉下皮骨悉如鐵始貫欲自謂韓魏公之出子數以言動吏部侍郎韓彥粹粹毅然曰先公平昔無兹事於是王仲薿者久依貫聞是而自詣貫識之以為圭之子也貫大喜故王氏於政和以後恩數及褒詔悉貫之力大抵不揆凡若此故自政和末國柄皆繇是物而天下寖亂矣政和初童貫承蔡京意㫖大啓苑囿以娛樂導上為遊幸之事貫率楊戬賈詳藍從熙何欣共五大閹徙大內之外諸庫遷二僧寺徙二軍營而改築延福宫五閹各有分地自為制度務尚華侈不相沿襲樓殿相望築山引水草木怪石岩壑幽勝又跨舊城取濠外地作景龍江芙蓉城蓬壺閣擷芳園曲江池各有復道以通宫禁又為鹿寨鶴莊文禽孔翠諸柵多聚逺方珍怪蹄尾動數千實之又效江浙為白屋村居野店酒肆青帘其間景龍門冬十二月張燈至上元名曰預賞又寶籙宫山中皆包平地環以嘉木清流列諸館舍臺閣多以美材為楹棟不施五采有自然之勝上下立亭宇不可勝數若江南陳後主三品石姑蘇白樂天手植檜太湖靈壁慈溪武康諸石二浙花竹雜木海錯福建荔枝龍眼橄欖海南椰實湖湘大竹文竹江南諸果登萊溜沂文石二廣四川異花竒果率入其中總名曰艮嶽後又曰夀嶽門號華陽自華陽門入兩傍有丹荔十八枝大石曰神運昭功者立其中旁有雙檜一夭矯者名曰朝日升龍之檜一偃蹇者名曰卧雲伏龍之檜皆玉牌填金字書之岩曰玉京獨秀太平岩峯曰卿雲萬態竒峯又有絳霄樓金碧相間勢極髙峻在雲表工藝之巧無以出此貫又引朱勔取江浙花石皆𨽻貫主之士庶之家有一花一木之美悉以黃帕覆之名曰御前之物不問墳墓之間盡皆發掘所載動數百舟號花石綱所過州縣莫敢誰何諸路大騷以致于亂宣和間都下秋風夜靜禽獸之聲四徹宛若深山大澤陂野之間識者以為不祥也七年北方盟寒朝廷戒嚴取山禽水鳥十餘萬盡放諸汴渠聽其所之靖康初金騎既至闕又取大鹿數千百頭殺以啖衛士及圍城取諸石為炮云二十四日丁巳李若水以吏部侍郎充山西軍前和議使王履以相州觀察使充山西軍前和議副使九月一日甲子朔吏部侍郎充大金山西軍前和議使李若水相州觀察使副使王履出國門三日丙寅王㝢除尚書左丞王㝢為起居舍人正月諌親征罷之未幾復除禮部侍郎遷翰林院學士至是為尚書左丞王㝢繳親征劄子曰今月初三日亥時准門下省兵房送到録黃四件三件為團結在京及京畿諸縣河南等處兵馬祗備親征一件為應親征典禮令有司疾速檢詳以聞事付臣書讀者右臣竊詳金人入邊朝廷憂恐宰相大臣聚議都堂已半月餘日矣所謂守備攻取之䇿尚未聞有定說大師未遣士氣不振陛下嗣位之初躬宵旰之勞日宴坐朝憂形于色而大臣中未聞有慨然請行為國排難者乃遽有親征之議臣竊惑之此事若出陛下之意大臣當伏地叩頭陳垂堂之戒若大臣建議是賊君之大者前日知真定府劉韐乞速擇名望大臣為敵人所信慕者奉使議和庶幾兵革休息大臣於此亦可以請行矣乃止以遣使報之其意不過謂已遣李鄴輩不必更遣大臣耳前日謂不必遣大臣今日乃欲遽煩陛下親征何其輕重緩急大不侔矣陛下嗣守神器當念祖宗長久之慮鑾輿一動安危禍福之機在焉且自陛下踐祚以來民心安悅如戴堯天儻輕此舉民心謂何若姑假此名以肅師旅此尤不可蓋此詔一出都人民情搖動外患未平腹心已潰矣在景德中真宗皇帝澶淵之行當時猶曰幸而克敵以今日觀之國力盛强民財豐實將相得人士卒用命能如景德之時乎陛下乃欲輕萬乘之尊蹈不測之險三尺童子亦將為陛下寒心臣父易簡常備位東宫僚屬父子荷國厚恩而臣復處封駁之地不敢不為陛下盡告區區愛君之心死不奉詔所有録黃臣未敢書讀行下謹録奉聞伏候敕㫖王㝢使于金國不行罷尚書左丞責授單州團練副使新州安置資政殿學士王易簡與宫祠王㝢新除尚書左丞詔㝢使于金國軍前奉五輅而行㝢有懼色門下客李允文假設八難以問㝢不能對入見上辭其行不能㝢固請且曰臣夢祖宗怒以五輅奉金國上大驚詰其故曰祖宗何故不賜夢與朕而與卿耶㝢言臣承命而行職在臣也故祖宗賜之夢而警焉上曰何以驗之㝢辭窮何㮚叱之曰王㝢狂妄可退㝢惶恐戰栗异日㝢見上辨其事曰非臣之詐也乃李允文教臣為此語且謂臣曰不托以夢不能免此行上怒之其父易簡亦上章祈懇免行乃降㫖曰王㝢狂誕避事追還左丞詔命付尚書省毁抹責授單州團練副使新州安置父易簡落職與宫祠並日下出門敕朕聞路溫舒以丞屬而往請絶域傅介子以馬監而求使大宛蓋委質而為臣無辭難而避事茍懷誑誕曷逭典刑具位王㝢世荷國恩蚤塵華貫昨於纂承之始首掛譴訶不忍棄捐於終復加湔洗罔思報德惟務懷安適邊境之繹騷遣近臣而計議邀功生事黜賈生係頸之謀罷兵息民講魏絳和戎之䇿擢爾侍從之列置之丞轄之崇特加寵數之優式示光華之選逡巡求避撰造不根逮詰責而辭窮乃張皇而情得方主憂臣辱爾乃便私之求茍罪大責輕難示方來之戒姑從散秩往處嶺南尚務省修以待寬宥帷幄近臣義莫先于體國潛宫故老情宜篤于愛君茍罔恤于艱難乃唯圗于安利刑章具在容貸敢私具位王易簡頃以進讀之官而偕攀附之列視樞廷之品秩既顯其身掌鰲禁之文章又擢其子寵數已榮于兩代忠孝宜萃于一門逮遣使而出疆乃恃恩而擇事㝢既造漆而屬請爾亦露章而懇祈教子以義方不蹈忠臣之節愛人以姑息亦非君子之風鎸祕殿之隆名即外祠之閒逸往思其咎無蹈後愆殿中侍御史胡舜陟劄子論兵機事臣觀敵情狙詐多方見誤去秋盛傳劉彥宗之亡彼方且㸃集人馬今春又傳烏竒邁之亡斡里雅布歸傳位彼方且休兵燕山今又傳尼堪之亡又曰畏熱而投雲中然晉絳城下兵勢愈强軍壘愈多我師之出出無不敗則尼雅滿果歸乎金人誤我使不設備故其奸計每每如此臣竊怪敵出詭道無窮而我誤彼了無一術間有臣下所獻計畫如用間諜如設水匱如招叛亡如搗空虛如攻其必救如分其兵勢三省密院騰播于天下大書文移處處有之安知其無奸細傳達于敵庭凡有措畫動輒知之彼必思所以應之之道我能制勝乎臣願陛下密詔將帥嚴防武備勿為所誤更詔三省密院凡事屬兵機勿得降出奏依三朝北盟㑹編卷五十二
