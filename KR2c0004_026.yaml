body:
  text: 三朝北盟㑹編卷二十六宋徐夢莘撰靖康中帙起宣和七年十二月庚申盡靖康元年正月二日戊辰宣和七年十二月二十三日庚申即帝位大赦天下門下我國家創業守成紹二百年之祚運宅中圖大奠三萬里之幅員肆及眇躬嗣膺神器永念纘承之重懼劇春氷載惟臨御之艱憂深朽索矧今邉陲未靖師旅方興肆惟曠蕩之恩用慰邇遐之望可大赦天下赦書到日昧爽以前除謀反叛逆不赦外其餘罪無輕重咸赦除之應文臣承務郎武臣承信郎以上并內臣及致仕官並與轉官合磨勘者仍不隔磨勘諸軍將校合加恩者並加恩內外馬步軍諸將士等並特與優賞承務郎以上服緑服緋及十五年者並與改轉服色文武升朝官禁軍都虞候諸班諸軍都虞候諸班指揮使御前軍佐馬步軍都軍頭副都軍頭藩方馬步軍都指揮使父母妻並與封叙已有官封者更與封叙亡歿者與封贈已封贈者更與封贈應貶降責授官並與牽叙在外未量移者與量移已量移與叙用已叙用者更與叙用應流配人元係命官已經恩赦放還者量與叙用應各追官停廢人等并終身不齒及故歸田里并詿誤連纍自來未敢求仕人并許於刑部投狀具元犯聞奏當議特與甄叙應散官編管人等曽經編管羈管已放逐便者并許於刑部投狀特與叙用應停降諸色人等未曽叙用者依例施行應諸路人戶所缺今年夏秋租稅及送納錢物并自來倚閣稅物並與除放其鄉村逃移人戶並仰招誘歸業應今日以前天下諸色缺負並令逐處依今年冬祀赦書例疾連報明奏聞方今勤邊事諸路州縣應有合行寬恤事件仰逐路師監司守臣疾速一而施行訖奏應逃亡軍人並無限一百日許於所在首身並無放罪限滿不首復罪如初應諸處有聚集盜賊所在州縣備坐今來赦宥招誘歸業如願在軍者許諸軍內安排給與衣糧應孝子順孫義夫節婦冝旌表以厚人倫五嶽四瀆名山大川歷代聖帝明王忠臣烈士載在祀典者委所在精潔致祭近祠廟並禁樵採如祠廟破損令逐州以省錢修葺仍仰監司常竊㸃檢毋致隳壞應赦書內說不盡事件委逐處子細看詳分析聞奏於戲清蹕而朝萬宇敢忘丕冒之仁繼明以照四方冝布惟新之政既賴忠良協贊文武交修永孚於休同底於治咨爾有衆體豫至懷吳敏除門下侍郎朕恭承景命嗣守丕圖永惟基業之艱難實賴股肱之左右延登時傑進與政機增重公朝用勸羣辟朝散大夫試給事中兼侍讀吳敏育德和厚受才竒英識慮髙明卓爾蓍龜之見器質靖重凛然柱石之資再踐瑣闈履直詞苑論事有回天之力視草有華國之文申大義於禁中功歸社稷沛恩綸於茟底念竊士民冝亟躋於近列以允協於僉言處東臺管轄之司參四輔鈞衡之任噫陳堯舜之孝悌是為風化之先合臯契之忠嘉更竚訏謨之告肩一心以佐王室熙庶績以亮天工往即欽承奚俟多訓可特授中大夫守門下侍郎种師道何灌除都統副都統保靜軍莭度使致仕食邑一千五百戶實封六百戶种師道可特除檢校少保靜難軍莭度使充河北河東路制置使兼都統制進封開國公加食邑五百戶侍衛親軍都虞候寧國軍承宣使管勾侍衛步軍司公事何灌可授武泰軍莭度使充河北河東路制置使兼副都統進封開國公伯加食邑五百戶手詔河北河東州軍勘㑹朝廷與大金國元自海上結約積有歲時使命交馳歡盟無間止緣守邉之吏不能恪守誓言容納叛亡致誤朝廷結怨鄰國已至興師既往不追冝尋舊好除已遣使和㑹外仰河北河東㳂邉州軍嚴飭守備使司務在持重毋得輕舉二十五日壬戌斡里雅布陷慶源府沈琯南歸録曰二十三日斡里雅布至慶源府忽見南方塵起甚髙金人皇恐遽退三四里國王遣人招琯來曰你先去講和因論講和事國王略能漢語有時作畨語左右有三四人是漢兒進士及第者時東京留守姓髙是渤海人在側言與燕人無異琯云郭藥師言河北全無兵城壁皆不可守可以直趍汴京是否琯言真定中山河間大名四帥府各有守兵又云前日過中山真定准備兵守㬠好因何不出戰琯云事倉卒不可輕動又云聞南朝有兵八百萬今在何處何不迎戰琯云散在諸路要用旋勾喚汴京左右約有四五十萬黃河兩岸須有大兵守之必不可過又云南朝拆橋與不拆橋若拆橋是不要河北也我今日須要河北以河為界琯云燕山本中國地陷契丹二百年近歸中國以南朝法制之人心尚不服今若以金國法度治河北人必不安又云只付與南朝人歲納進奉琯云與其與他人孰若依舊以白溝為界增添歲幣其利無窮國王與留守相笑曰此人狙後問燕人云狙者不好之辭也國王云我兵勢如此南朝豈能敵趙皇莫走否琯以其言非所冝告之曰太祖太宗取天下以兵革真宗仁宗德澤在人也深趙氏社稷未衰若果為之必有英雄奮起國王曰你中國自相殺干我甚事琯曰昔唐元宗幸蜀太子即位於靈武是為肅宗衆皆曰聞儲君甚賢今皇太子恭儉仁慈內外皆聞之但不好奢華不事嬉戲逰畋皇帝之所不喜者留守曰此亦聞之二十六日癸亥詔威武軍莭度使梁方平將騎七千令守濬州又詔步軍都指揮使何灌以兵二萬守黃河二十七日甲子斡里雅布陷信德府斡里雅布至信德府見城壁不堅守臣楊信功杜門不出師金人遂鳴鼓而進改令吕頥浩等親自立觀不移時城遂陷執楊信功等出斡里雅布登城門撫諭居民令金人并契丹行劫金人所管地分殺戮甚衆契丹漢兒等地分但微取財而已郭藥師至信德府城外不戮一人或問何往則云我輩入京訴無心反復來歸朝人以為然或依舊與慱奕者殊不知藥師紿我也二十九日丙寅斡里雅布寨中言南使至言趙皇內禪居龍德宫太子即位斡里雅布發信德府軍太史占帝星復明聞太子內禪恐南朝有備軍中大驚猶豫未敢行郭藥師曰南朝未必有備言汴京冨庶及宫禁中事非燕山之比今太子郎君兵行神速可乘此破竹之勢急趍大河將士必破膽可不戰而還若有備耀兵河北虎視南朝以示國威歸猶未晚斡里雅布從之遂長驅入汴南歸録曰是日金人聞內禪皆驚斡里雅布謂太史曰爾前日言南朝帝星復明今果驗矣乃以金帛賞之臣寮劄子乞置四總管臣寮上言竊見臣寮集議乞於拱州頴昌府開德府鄭州各置都副總管欲乞六曹尚書侍郎開封府同集一處臺官在本臺各薦文臣可充都總管四人內有議論不同許為一狀薦舉以充其數奉聖㫖依奏二十五日臣寮上言契勘金人遊騎侵入河北都城無禦决可無虞理當更强外援天下之勢治平則冝重內變亂則冝重外重外者冝假之以令將佐士卒官吏財用足以應辦今擇人分總四道各付以一靣令事得專决財得通用吏得辟置兵得誅賞倉卒之際合從以衛王室連衡以禦强敵不煩朝廷措畫可備警急救援此今日之急計也擇之既精委之既專待之既厚彼若不捐驅以報君父則不忠不孝之罪天下得以滅之豈敢復有顧望哉謹條具如右一以三京并鄧州為帶都總北京師總北道河北東路京東東路西京師總西道京西北路陜西京兆秦鳯懷慶路南京師總東道京東西路淮東西路浙西路鄧州師總南道京西路浙西路仍各置副總管使出則留守事平日依舊以四師分總四道止為警急率所部勤王差撥兵馬移運分糧令所部州軍各聽莭制相為聲援其餘事並依舊制舊州師府處幕府官屬依帥府差辟隨府置能一合用兵並令所部州召募訓練以備差發仍於所差處不限文武官有才略忠勇者統制合用錢糧並所部州縣不限髙卑選通曉才用官以逺及近遞䟎移運别項樁管專充差發兵馬之用奉聖㫖依奏靖康元年正月一日丁卯朔上御明堂受百官朝賀下詔改元敕內外文武臣寮等朕光膺眷佑寅奉燕詒載惟菲薄之資獲撫盈成之運宵衣罔怠旰食靡遑發政施仁懷日靖四方之志經文緯武圖永康兆民之功式紀初元是新美號庶荷神靈之助遂臻華夏之和茂謹王春豈特遵魯史踰年之義遹寧國步蓋將紹周人過歷之期自宣和八年正月一日改為靖康元年布告多方咸體朕意秀水閒居録曰宣和末金人既入郊畿淵聖既內禪時豫為都司詣堂白事宰相白時中謂豫曰方議改元可撰數名豫曰凡年號須有主意今以何意為主白曰當以和敵為主豫曰漢與胸奴和親改元竟寧是也然和敵止是一事似亦無庸專指昔唐德宗遭變議改元李泌以謂唐家最盛如貞觀開元冝各取一字以為法本朝最盛者在仁宗朝若於慶厯嘉祐各取一字以慶祐名年則和敵在其中矣中書侍郎張邦昌曰此論固佳但慶字頗類宫觀名額豫曰自古以慶字名年者甚多中書舍人席益在座曰祐字亦類元祐豫因作色曰今外敵慿凌國勢危弱如此當丕變政事純法祖宗奈何尚拘元祐之禁右丞宇文粹中曰公但見示文字遂退後數日乃改靖康先是上皇即位改元建中靖國諌官任伯雨疏論以為內難曰靖不當紀元譏宰相之不學此近事諸公豈不知耶然淵聖登極至都城失守實十二月立康乃今上受命之符自康邸繼統故也范致虛上賀登極表表曰帝出乎震夙膺主器之祥王次於春遂迓履端之慶天人協應中外交歡竊以受命之君莫大於創業垂統繼體之主所貴於保泰特盈念致王業之維艱乃履帝位而不疚為人上若朽索之馭措天下如泰山之安恭惟皇帝陛下承八聖之丕基檢千齡之寶運聰明􅌖知得四海之歡心恭儉孝慈副萬邦之傒望故太上欣傳於聖祚而千官喜戴夫堯仁進當有大之符入纘無疆之烈乘乾之健金行適應於庚申繼離之明火德遂迎於丙午契宋興之首歲當炎運之昌期諒天心厯數之有歸豈人事謳歌之無證惟東宫之育聖德十有一年宜南靣而朝羣臣萬有千歲臣叨陪邇列阻造天庭追懷昔玷於周行每瞻天表自幸未先於朝露獲覩龍飛尚觀新政之行普慰蒼生之願大學士詣宣德門隨百官稱賀復詣龍德宫起居斡里雅布陷相州詔中外臣僚民庶實封直言詔曰朕聞木從繩則正后從諌則聖若古有訓朕甚慕焉內顧眇躬祗承大器未燭治道若臨深淵思聞盡言以輔不逮朝廷之闕失政令之乖違保邦御俗之方禦寇安民之䇿詢於有衆咸極敷陳惟骨鯁是求惟藥石是用毋或隱諱溺於導諛咨爾忠良竚聞正論果其逆耳而利行朕當捨己以從人雖有過言必無罪譴自今中外臣庶並許實封直言得失在京於合屬處投進在外於所在州軍附遞以聞播告遐邇咸知朕意詔從官舉文武官寮內堪充將帥者是日降指揮令從官舉文武官寮內堪充將帥有膽勇者具名聞奏訖赴三省樞密院審察隨才任用若立竒功不次奬擢所舉之官亦行推賞二月戊辰斡里雅布陷濬州梁方平兵潰焚橋而遁何灌望風潰散走還闕先是朝廷聞敵至遣步軍指揮使何灌將兵二萬扼河津內侍節度梁方平將兵騎七千守濬州斷絶橋梁據守要害敵至而河氷合遂濟河方平不敢拒戰單騎遁歸麾下兵皆潰散何灌度不能支亦收散卒退守汜水關敵躡其後比至汜水灌兵又驚潰乃引其餘兵還至京師奏梁方平退走時朝廷以擾撓之際未暇窮治敵過泛水則鼓行而前府縣來報中外震動靖康前録曰梁方平到滑日與其徒縱飲探報不明禦敵無備洎敵至乃始奔駭至橋南縱火而遁橋雖已斷飄於北岸猶二十八杠敵少加葺遂濟河何灌見方平奔走亦望風遁去是日飛騎報金人至以郭藥師為先鋒破濬州梁方平敗績燒三山浮橋中外鼎沸金人初疑藥師自得濬州大用其說以黃河為界要取金帛以至言京師富庶及宫禁中事皆藥師之謀也沈琯見郭藥師藥師留食藥師自言今日藥師以二十騎先據橋南軍走過而為藥師所要遂不籍人兵焚橋而去擁入河者數千人常勝止傷三人三朝北盟㑹編卷二十六
