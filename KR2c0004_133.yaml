body:
  text: 三朝北盟㑹編卷一百三十三宋徐夢莘撰炎興下帙起建炎三年十月二十三日戊戌盡十一月乙巳朔張浚至興元府奏乞車駕巡興元府奏曰竊見漢中實天下形勢之地臣頃侍帷幄親聞王音謂號令中原必基於此臣所以不憚萬里捐軀自効庶幾奉承聖意之萬一謹於興元理財積粟以待巡幸願陛下鑾輿早為西行之謀前控六路之師後據兩川之粟左通荆㐮之財右出秦隴之馬天下之計斯可定矣十月二十三日浚抵興元命幕客王以寧作文代祭諸葛孔明曰某以菲才誤膺聖訓出将使指頓轡漢中旁觀定軍之山平生師仰之地適有行役祗謁未遑謹遣属官致祭於祠下恭惟我公學貫天人識該古今沈機妙思典制作之間葢嘗玩孟徳於掌中棲仲謀於江上大勲未集賔天而仙俊魄英魂歸侍帝所青山白雲覆此靈骨至於今千五百年樵丁牧子再拜阡隴牛羊踐履不敢入於疃畦嗚呼豈惟神物䕶持葢子思子之言曰惟天下至誠惟能盡其性以之參天地育萬物終乎其天淵無聲無臭者其惟我公之道徳殆所謂無間然者矣某也後學安能識公目披舊史耳剽前聞服膺師門二十年於此矣今皇帝遭時孔艱訪予落止将即梁洋之地漸為恢復之圖某雖選懦不武而憤敵慿陵㤀身徇國不暇量力慨然請行是以在此戴惟我公負王佐之才抱王佐之學時命不與齎志空山今也不然雖鼠竊狗偷肆行海㝢而奸雄大猾不敢發於山林其故何哉宋徳在人浹肌膚而淪骨髓皇天眷命支百世而卜萬年此某之所有而公之所無也嗚呼某為何人言敢及此亦不可謂無其志也若夫教誨之誘掖之左右輔相之某将齋粟有祈於師門公雖在天諒聞我言知有斯時亦復憮然恵以尺寸翼我墜顛庶無罪疾涉於天淵某不敢慢奉以周旋尚饗二十五日庚子金人陷黄州知軍州事趙令􅍲死之先是張用在光州境内沿淮劄木寨上下占百餘里盡収禾稼入木寨中蓄積甚豊無退去之期光州患之至是金人欲取黄州渡江以精騎五百直衝其寨用之衆數十萬悉奔散金人遂焚積聚徑趨黄州一夕而至又一日光州始知之金人焚不盡者光州般入城知黄州軍州事趙令􅍲三月間丁母憂解官居建昌軍七月起復再知黄州八月到官先是權州蔡通判奏乞移咨武昌令􅍲到州之日奏不從所乞乃移咨官吏軍民在武昌縣十月戊戌金人以辰刻攻黄州射木笴鑿頭箭入城守衞排軍宴興拾箭遣習水兵潘明浮江過武昌報令􅍲令􅍲視箭而驚曰金兵也夜半以官兵渡江入黄州連夜上城為守禦之備金人縱兵攻城庚子城陷令􅍲在城之西壁被執行至城東地名土門子金人就坐説誘令降令􅍲極口罵金人敲殺之軍民被殺者不計數癸卯金人渡江盡絶甲辰宴興同劉祥於竹林下尋見令􅍲尸載過武昌還其家収歛之權塟在武昌縣吉祥寺遺史曰先是靖康京城圍閉趙令稗為鄂州通判部官兵在武昌縣把隘京城失守閆瑾以潰兵南奔犯黄州縱其下騷擾既退去令稗即渡江存撫黄州軍民訖復囘鄂州黄人徳之三月令稗以朝散大夫直龍圖閣改召令􅍲來知黄州五月詔修築城壁令􅍲奉詔修城十二月方畢工㑹張遇㓂黄州令􅍲諭令退去不從遇請令􅍲出城相見令􅍲往見之遇令取酒一盃飲令􅍲顧敵人色有異必知酒中有毒令􅍲執盞謂遇曰令􅍲知酒中有毒今為公飲之而死然所願諸公不殺害城中軍民言訖一飲而盡遇大驚曰酒誠有毒方欲第二盞進也姑以此一盞試公耳乃取毒酒潑於地地裂而有聲由是遇與羣㓂皆重令􅍲之器識令􅍲以二寵妾贈遇使退去遇擕二妾去至團峰而囘自後丁進九朶花孔彦舟金人入境令􅍲皆退之七澤孫偉竒甫劄子伏見十月二十五日金人陷黄州知州趙令􅍲執在軍中累日欲命以偽官敺之北去令􅍲極口詆罵卒至遇害鯁烈之氣至死不屈行道之人皆言之或者欲葢從敵渡江之愆乃云令􅍲城降為已汙偽命然而敵南去之初有過黄州城見令􅍲遺骴委於道左又有同時在軍得出者能言令􅍲遇害時事皦如白日實不可誣但以令􅍲初乞移治武昌而武昌乃鄂之属縣邑鄂𨽻湖北黄隷淮西朝㫖既下令􅍲未甞闗白兩路監司此令􅍲不習為吏之過過亦小矣謂令􅍲棄城納欵非也令􅍲既被㫖徙帑藏過武昌未訖事間聞敵至復提武昌兵丁北渡黄州迎敵不忠義者能之乎兼令􅍲靖康初通判鄂州邸吏報偽楚遣使肆赦守将欲遁去令􅍲遂盟僚佐俟其至即殺使者焚其書閉闗自守激揚之氣坐客股栗鄂人悉知之嘗聞熙寧中邕州守将蘓緘罵敵遇害神宗皇帝贈以節度使廟食其州嶺南父老至今能道其事自頃國家多難以來如令􅍲之死節者無幾人今令􅍲盡室皆亡雖推恩無人可授若用蘓緘故事實為無窮之勸矣又伏見金人渡武昌入洪州江西郡縣聞風畏怖往往遂失臣節獨分寧知縣陳敏識與士民以死相誓斬其傳檄之人并力拒守至今不下十二月間土豪羅氏觀望旁近事勢聚羣不逞欲殺敏識以付敵敏識摘發其奸悉禽首惡而誅之精誠勁挺與秋霜争嚴張巡之儔也往年安陸令陳規公安令程千秋皆以禦敵論功擢領方面敏識之功實又倍之今洪州未有守臣謂宜使知洪州乞建廟禮部状準淳熈元年七月二十二日勅尚書省送到降授特進樞密使淮江東西路宣撫使魏國公張浚劄子奏臣據黄州状申據本州士庶父老湯政等狀伏見建炎元年逆賊閆瑾侵犯黄州當時通判鄂州趙令􅍲将帶官兵在武昌縣把隘閆瑾纔退即時過江収復黄州却囘鄂州任所於當年三月内以朝散大夫直龍圖閣知黄州到任當年五月内修城至十二月了畢至建炎二年正月初十日孔彦舟侵犯本州攻打城壁凡六晝夜保守堅固賊勢阻退繼而趙龍圖㑹合五州都巡蒋宣贊兵馬前來解殺散而去並前後累次盜賊丁一箭九朶花李仲張遇桂仲等侵犯本州城壁並皆守禦保全至建炎三年三月内趙龍圖丁母憂解官往建昌縣住至當年七月内起復任知黄州八月初十日再還到任當月十三日係趙龍圖丁母憂去後權州蔡通判起奏朝廷乞移治武昌縣是日奏下從所乞至當月十八日趙龍圖将帶本州官吏軍民渡江往武昌縣至十月二十三日辰時金人圍城箭射入城内守衙排軍晏興拾得敵箭遣習水兵士潘明将箭浮江過武昌縣報復趙龍圖於當夜二更将帶官兵自武昌縣渡江囘來黄州連夜上城擺布守禦於當月二十五日已時金人攻破州城就西邉城上捉趙龍圖去城東地名土門子就坐趙龍圖一向髙聲叱罵云你們甚是無禮如何敢奪大宋州郡殺害生靈真是恃强凌弱連聲呌罵我誓不屈其敵帥将酒與飲令􅍲揮盞擲打云我不飲敵人之酒裭去凉衫欲換戰袍令􅍲又罵云我不着敵人之衣敵帥稱待與你好官令􅍲又罵云我不受敵人偽命勒令下拜又罵云我有兩膝只拜我祖宗當時見其難屈毁罵不已敵帥大怒用鐡鞭打趙龍圖面額一下並當左額並連眼皰血流被面趙龍圖罵聲愈髙即令驅出向東竹林邉腦後敲殺至死罵聲不絶同時遇害官員都監王達打死在倉巷口判官呉源從事打殺在東門外上三縣巡檢劉綽從義亦打殺在東門城上並殺武昌吴縣尉朱巡檢並打殺使院人吏傅拱姜邵李寔王仲李堅衙前毋宰張殻等並一行兵使守城百姓打殺者不計數目至二十八日金人過江盡絶二十九日排軍晏興同劉祥於竹林下尋見趙龍圖尸二人􅐝到江邉用小船載尸過武昌地名磨口分付與龍圖宅眷買棺木収歛令晏興等埋在武昌界内吉祥寺至紹興五年吕誼周仲等具状經乞賜保明申奏朝廷去今來所陳趙龍圖守城死節並是指實本州士庶兵吏等情愿乞就趙龍圖死節之地建立廟宇歳時祭祀永為歸向可備申特賜旌表趙龍圖廟額施行本州契勘往年朝散大夫直龍圖閣趙令􅍲知黄州時守城死節皦如白日明不可誣詢之同時被掠之人後得脱出尚存者能言其詳葢其方當被㫖移治南岸纔聞敵騎即時奮勵一夜渡江入城禦敵以攖其鋒及城陷被執極口詆罵至殺而不屈其節鯁烈之氣凜然如在可敬而仰黄人思之願立廟宇尸而祝之出於誠心理實可從本州竊恐歲月久逺必致滅寂然闕文白無疑申乞特賜敷奏俯從所請賜以廟額載在祀典血食一方少伸臣子報國之英魂永為後人忠義之激勸臣謹錄進呈伏望聖慈特降睿㫖施行取進止七月二十三日三省同奉聖㫖依二十六日辛丑金人自黄州渡江取路攻洪州金人在黄州岸下得小舟其數亦不多乃拆民居絞縳為筏以舟引之而行遂渡大江癸卯軍馬渡江盡絶取大冶縣捷路不入興國軍徑赴洪州是時劉光世駐軍於江州先遣統制王徳以兵巡綽瑞昌縣興軍大冶縣徳聞金人兵過飛報光世且持重無出兵光世遂止京城留守程昌㝢入京師知蔡州程昌㝢被命為京城留守遂領兵入京師既到倉廩皆空随行兵使食附行亁糧半月皆盡乃出城四外挑野菜而食詔親征郭仲荀為浙東宣撫使軍越州傅崧卿為浙東防遏使軍婺州岳飛敗李成於長蘆九里堽李成據滁州杜充命王征討之􅊅以本部兵駐長蘆鎮整捉行伍取瓦梁路趨滁州留輜重舟船在長蘆行之次日提㸃刑獄裴凜親來犒軍軍既行凜次於崇福禪院般錢絹堆貯滿屋行之三日猶在瓦梁不敢進敵遣輕騎五百渡茅塘取盤城路夜行徑犯長蘆質明到長蘆輜重軍人猶睡未起無一到岸者遂急斫纜開船而去賊遂入崇福禪院掠僧行百姓百餘人方索金銀衣物忽聞鳴鑼聲敵皆退去僧行土軍被殺者九人敵猶以馬捶催督被掠人速行行至九里堽與岳飛相遇初之進兵也充以飛為策應飛渡宣化鎮聞有敵騎五百徑趨長蘆飛遂往長蘆至盤城質之村人所説與宣化一同飛遂進兵疾趨九里堽敵之綽路者知官軍由盤城趨長蘆恐遏歸路乃報長蘆敵兵鳴鑼促囘至九里堽相遇飛擊之敵兵盡殪奪被執人𤼵囘長蘆有中刀者有中鎗者數十人不至滁州而囘㑹充促還建康遂歸建康自長蘆往滁州有大路二􅊅直行其一而不虞其他始敵至長蘆凜在崇福禪院急登舟而去敵既退錢絹盡為郡人攘取之遂一空十一月乙巳朔韓世清欲立趙令俊不克韓世清屯於蘄州兵馬州具官員軍民状差官五員詣行在舉請世清為蘄州兵馬鈐轄朝廷從之遂命世清為蘄州兵馬鈐轄蘄黄汝光興國軍都巡檢使令五州應付錢糧劉文舜屯於紓州為淮西都巡檢使知江州權邦彦令世清聴文舜節制世清不從聞金人已自黄州渡江入興國軍乃制黄衣請蘄州鈐轄趙令俊即位以黄衣披之令俊跳呌不從褫其黄衣世清之黨强之令俊呌不絶口知州甄采同州縣官止之世清方稍止采出榜示衆曰今月日旦望拜二聖因此官員思念二聖逺在沙漠致泣下民稍安知濠州孫逸以赴建康府稟議離任而去張宗望權知州事知濠州孫逸見防秋事急乃曰當以軍期事赴建康府見相公稟議遂交州印與路分都監張宗望令宗望權知州事是時兵馬都監李擇之當代而代者李玠到州逸與擇之偕行三朝北盟㑹編卷一百三十三
