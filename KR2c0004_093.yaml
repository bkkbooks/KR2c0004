body:
  text: 三朝北盟㑹編卷九十三宋徐夢莘撰靖康中帙起靖康二年四月十一日庚午盡十四日癸酉十一日庚午太后御東門小殿埀簾聽政邦昌以太宰退處内入東門資善堂侍從官以上詣祥曦殿起居太后畢邦昌服紫袍犀𢃄魚袋獨班歸兩府幕次邦昌僭位三十三日不御正殿不受常朝不山呼不稱聖㫖稱余禁中諸門用鎻匙曰邦昌謹封曉示凡文字不稱詔命番使入朝則正坐常朝則偏坐百官入朝以平交禮相見稱名稱諸公其中未可知也惟王時雍王紹王及之者附㑹以真主事之幸灾樂禍畧無畏於天地神靈此曹佐之安得忠義邦昌肆赦蔡州不行諸道勤王兵皆受康王節制邦昌知人心不與不能自立乃收所下赦書出居東省迎孟后垂簾聽政自稱太宰總百揆欲襲曹司馬故事入朝不趨謁拜不名未幾聞外兵頓劄城下而諸道勤王將文檄問罪邦昌惶懼乃議徃迎康王先遣人至南京勸進王時雍數勸邦昌自為之計謂曰騎虎勢不得下後日噬臍無悔矣宜熟慮之徐秉哲亦因賛邦昌不從乃止太后下手詔播告天下詔曰比以敵國興師都城失守祲纒宫闕既二帝之䝉塵誣及宗祊謂三靈之改卜衆恐中原之無綂始令舊弼以臨朝扶九廟之傾危救一城之慘酷乃以衰癃之資起於閒廢之中迎置宫闈進加位號舉欽聖已還之典成靖康欲復之心永言運數之屯坐視家邦之覆撫躬獨在流涕何從緬惟藝祖之開基實自髙穹之眷命厯年二百人不知兵傳序九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷康王越居近服已狥羣情之請俾膺神器之歸繇康邸之舊藩嗣我朝之大綂漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹為天意夫豈人謀尚期中外之協心同定安危之至計庻臻小愒同底丕平用敷告於多方其深明於吾意回天録曰吕公好問建言今日布告復辟之書須是明白使人易曉不必須詞臣乃命太常少卿汪藻行十二日辛未監察御史姚舜明齊之禮太常博士華初平乞致仕不允宗澤謝大元帥賜書狀書曰伏聞大王仁慈頒賜教翰今日之事非左右戮力造次在念恐不能濟伏讀再四涕泗横臆仰認眷私責任之重但恐疲薾雖自瀝竭路逺言輕不能感動有誤大事罪不可迯澤伏見姦臣張邦昌竊據寶位改元肆赦又挾孟后以令天下仍欲散諸路勤王之兵其簒亂踪迹無可疑者今誨諭有或出權宜之語且人臣豈有張紅傘服赭袍居正殿者自古奸臣初未嘗不謙遜退避中藏禍心不測况惡狀彰著如此今二聖諸王皇族悉渡河而北唯大王在濟天意可知宜整頓乾坤興復社稷以傳萬世不可遲疑牽於不斷澤衰老痛切忠義之極不免縷縷敷陳乞賜克亮早定民志使天下有所歸向易曰見幾而作不俟終日願大王速圖之别幅曰并承親誨筆之紙尾仰荷隆謙所批近有尚書省劄子於鄆濟間㝷訪大王事此乃出自敵計不可不察澤近探得御寳與朝廷印記盡為敵携去兼驅行吏故作行遣惑亂天下何㮚等亦在敵中澤近行下河北等路州縣已令當切騐認不得憑信若大元帥文字方得施行過為隄備去訖伏乞照察趙子崧謝大元帥賜書狀子崧今月二十日伏䝉大元帥大王特屈威尊遣使賜書仍加親筆以示眷存某一介逺外非所宜得再拜伏讀感激涕零㳟惟大王孝弟通於神明忠勇聞於中外遭國大難義不戴天屈已逮下諄復以諭將帥真欲掃蕩氛祲迎還鑾輅號令明白曲盡事幾况在臣子其敢愛死子崧見已進軍入畿太康縣與翁彦國犄角入援外今日據探報因子崧等所遣前軍既次到都城張邦昌即有懼意已貶號冢宰易紫袍欲再議元祐皇后尊禮先差謝克家再差馮澥李回詣行府迎請定十二日寅時行某竊謂幾事貴速久則變生天命未改人情效順不假大横之卜自膺神器之歸伏望斷以不疑俯狥羣情速正位號以慰都人之望以折敵人之心則於迎奉二聖指日可待子崧已差翁挺吕弸中賫狀前去外子崧無任祈懇激切之至十三日壬申范瓊揭榜金人尚留滑州是時四方勤王之師繼有到闗者道路漸通百姓漸有出城者范瓊乃揭榜云據探報金人尚有後軍掃地軍留滑州界上仰四方客旅未得輕出百姓已知金人悉渡河河南無警而瓊乃揭榜以惑民民皆罵之宗澤具狀申大元帥府乞行五事宗澤具狀申大元帥府乞即寳位以安天下并具劄子曰㳟惟太祖皇帝創業垂綂當傳億萬世方今二百年豈謂金人横肆邀迎二帝與諸王渡河北去天下百姓所注耳目而繫其望者惟在大元帥府康王一人大元帥行之得其道則天下將自安宗廟社稷將自寜二帝二后諸王將自回彼之强敵將自知退避矣大元帥行之不得其道則天下從而大亂宗廟社稷亦從而傾危二帝二后諸王無夤縁而回敵勢愈熾亦無縁而退此事在大元帥行之得其道如何何謂之道澤謂其説有五一曰近剛正而逺柔邪二曰納諫諍而拒諛佞三曰尚恭儉而抑驕侈四曰體憂勤而忘逸樂五曰進公實而退私偽是五者甚易知甚易行然世莫能知莫能行者因剛正諌諍恭儉憂勤公實之事多逆於心也柔邪諛佞驕侈逸樂私偽之事多遜於志也伊尹有言曰有言逆於汝心必求諸道有言遜於汝志必求諸非道合諸道者君子也合諸非道者小人也大元帥大王於應酬問答之間以兹五事卜之則君子小人了然分矣澤之血誠痛切毎思趙家本嗣無疆大厯服今勢孤危岌業如是澤願大元帥左右嘗胆不忘在濟時夙夜羮墻不忘我祖宗時則天下自安宗廟社稷自寜二帝二后諸王自回金兵雖熾自可挫其鋒夫何逺之有在大元帥行之而已罷散萬夀節差御史一員往西京視陵寢曹輔往元帥軍前分㭊礬書十四日癸酉開封府以皇弟康王天下兵馬大元帥劄子揭榜曉示榜示曰凖皇弟康王天下兵馬大元帥劄子書當府領兵勤王已被受手詔云已與金人講和及得曹樞宻等書稱不得輕動誤國遂分屯人馬近畿以示逼逐復據探報事車駕屢幸彼寨恐有奸謀即傳檄河東河北激勵軍民以兵邀迎於前促勤王之師追於後莫不響應今聞兵衆既行未知二聖所在臣子之心痛淪骨髓呼天叩地隕絶無所雖有探報未審虚實仰開封府詳此連開具兵馬離城盡與未盡二聖車駕還與不還仍曉喻來前初王漸聞二帝北狩金人退兵也嘗泣謂幕屬諸將欲身先士卒追之諸將以大王玉體即宗廟社稷所係不可輕舉㑹宗澤申敵騎渡絶已使人焚河橋訖於是乃下檄兩河諸將及山東河北義兵河北列城邀擊敵迎還二聖右劄付開封府開封府承帥府劄子乃揭榜曉示監察御史姚舜明知衢州王信知江州胡唐世知無為軍知南外宗正事勸進状具位右某等竊以祖宗承五代之後削平僭亂混一區宇有天下百六十八年斯民不知兵革恩德之所涵育甚厚綱紀之所維持甚嚴艱難基創垂休萬世政和間姦臣用事激切任私為謀不臧實使逼乎遐壤以禍貽於國家金人恃强敗盟稱兵者再皇帝念社稷之至重憫生靈之無辜結以至信遺以厚幣雖車服稱號之尊無所顧惜而敵兵强壯舉國南來乘隙登陴歛兵任計求索無厭忘好造釁遂邀乘輿出臨屯壘謬事和好疑阻大兵日月既久恣行不道又刼我太上皇與后妃太子諸王近臣脅持北行使我宗社失守生靈無依乃抑逼大臣俾僭偽號四海憤痛血泣交訴某等忝綴屬籍身丁艱危痛念國家隕心碎首伏見兵馬大元帥大王以帝室懿親為國藩屏而忠孝英武超冠古今方敵圍城之初毅然請行单騎出見威聲凛著强敵屈服維聚兵河朔不日而及百萬肆膺􅌖㫖以大元帥之重節制海内盛德茂勲注人耳目今日二聖既行羣心恟恟宗社所繫惟大王是賴伏望大王念天下之至大察事機之至危權聽國事以安中外任賢使能信賞必罰蒐卒豐財以謀大舉庻幾皇天悔禍鑾輿反正使人神永有依歸天下幸甚某等廹切之情意符庻姓謹具狀詣行府披告伏望王慈早賜施行謹狀批答金人深入輙肆剽侵大兵前驅本期恢復亟聞失守遂蔑戰功永惟太祖創業埀二百年二聖在位幾三十載既遭蕩析廼致播遷涕淚横流心肝糜潰有天有地古今所未嘗聞為子為臣實不遑處方行追躡誓必邀迎念元帥之權實出上意顧國家之任難狥衆情難議施行靖康二年四月十四日趙子崧勸進第一狀子崧近累具狀申禀必䝉洞察子崧近聞探報人節次所説及趙扆陳興傅亮等申皆云放水滿城南閘中忽閉陳州門兩日必是深拒官帥又取傅亮軍數雖是支口食亦恐來探虚實子崧仰惟大王擁兵在外適遭大變天意人心自然推戴不必多端内有逆臣外有強敵四方有大賊若猶豫不决大事去矣子崧未聞大王移府近京曉夕震懼不如無生伏思二帝臨御正縁羣下議論不一畏怯者失事幾導諛者昧先見直至禍成猶生異論今日切在痛懲斷不可疑日下移軍告諭城中定以子崧入謁宗廟其謙遜之禮俟至城下行之未晩更緩數日必有變生葢時雍儔秉哲幵瓊皆堅於從逆恐生後悔四海無主天下惟知大王若不乘機速進早賜正位大耻不刷大器無歸危亡可立而待非子崧誰肯有露腹心忘鐡鉞之誅如此其切乎泣血拊膺不勝祈懇取㫖小帖子子崧竊謂此舉謙遜退避不得天與不取反受其咎當斷不斷反受其亂奸朋萬一翻覆用兵亦難竊望日下進府入京疾雷不及掩耳人心自定乞上慈深察三朝北盟㑹編卷九十三
