body:
  text: 三朝北盟㑹編卷一百七十五宋徐夢莘撰炎興下帙起紹興七年正月十五日丁丑盡其日王參政綯對臣向蒙誤恩除帥浙東黽勉在職幾甫周嵗去秋偶以衰疾瀝懇披誠乞領外祠以休疲憊仰荷聖恩矜從勉以罪罷掲來浙右寄居崑山席未及煖敵騎侵及承楚戎輅親行蘇秀稚耄延頸歡呼争覩天日臣于斯時屬以衰羸屏伏異方不得同郡縣官吏班迎道左以望屬車之清塵臣之私心死且不瞑臣竊伏念頃以菲才猥蒙㧞擢叨與政機日侍帷幄親承睿眷訓待優渥頋非捐糜不足報稱今雖閒退忠不忘君豈敢自後畎畆之民故於今日備禦之計夙夜疚懐私自籌度藏于胸臆念欲獻納而未之敢方此愧憤不知所為今月十六日戌時准尚書省紅字皮筒逓至詔書一道到臣臣已即時望闕謝恩祗受訖伏念臣竊位素餐以試㒺効分當擯斥不足收采敢意聖慈尚賜紀録曲垂詢問猶不棄遺伏讀之際戰灼隕越汗浃涕零不勝感激愧怍之至伏讀詔書所云攻戰守備措置綏懐之䇿皆軍國之先務廟堂之大計臣雖罄竭何足以奉承雖然其敢隠黙以違明詔臣謹竭愚妄之説攻戰之利臣愚以謂莫若作士氣守備之宜臣愚以謂莫若固淮甸措置之方臣愚以謂莫若經久逺綏懐之畧臣愚以謂莫若惠吾民謹按具畫一如后一臣所謂攻戰之利莫若作士氣者傳曰一鼓作氣再而衰三而竭是一戰之頃氣有作竭矣兵法曰朝氣鋭晝氣惰暮氣昬是一日之間氣有鋭惰矣去冬敵騎驟至侵軼疆場東䧟承楚西掠濠夀曲之在彼人所共知如此其甚所以我軍憤怒人百其勇直向無前至于敵勢既屈潜師遁逃具如明詔之所謂者臣聞新春以來㨗音傳播市井閭里畎畆藪澤人民聲氣接和更相告語欣若更生人人便有安堵之意兹實廟社之靈國家之福而生民之幸也然臣竊有説焉士氣憤怒十旬有餘非特一戰一日之比其氣豈能常鋭而不衰哉又况屢勝之後將佐士卒志得意滿氣適其平而怒斯釋矣使敵伺隙而乘之則今日勝安知不為他日之負哉此最兵之大忌也臣所以言攻戰之利莫若作士氣者正謂今日新㨗頻勝之後長慮却顧所宜素講者也臣願明詔諸帥各分士卒之半分據淮南要害之地明間諜逺斥􅕤厲兵秣馬常若敵至借使復來力足以禦申嚴約束更迭救援無敢蹉跌以復約㑹擊東則西應擊尾則首應不約而動如十指捍頭目朝廷且復以時濟師張大聲勢使顔行知後必繼至而増勇後繼知顔行深入而先争如獵豺虎如救焚溺以此衆攻何不克以此衆戰何不㨗倘或留兵寡少敵兵未至委人而去則不若留兵之為愈又或留兵雖衆而士氣驕惰人不思戰忘戒而易擾靡備而易犯兵數徒多雖謂之寡弱可也何足以為固哉臣又觀出入不常行止莫測金人常態安知今春之遁不為今秋之復來乎伺探所得可喜之耗安知非彼揚其虚聲疑吾戒心怠吾士氣以肆其奸譎之謀乎臣竊計六師順動饟軍犒師賞齎之數費倍他年昔吳欲病楚其謀以謂彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之今我之動兵煩費若兹臣竊謂敵情詭詐隠伏難測安知其計不出于此是東據承楚而不動西掠濠夀而不居去則摽掠驅擄復歸本境我來則去我去則來此風漸不可長所宜深講攻戰之䇿預備再至之謀使異時雖欲為此而不可得則攻戰豈可遽已而士氣安可不作哉臣故曰攻戰之利莫若作士氣者此也一臣所謂守備之宜莫若固淮甸臣所謂固淮甸者非謂直以淮甸為邉陲而無意于中原也國家大計理有先後勢有緩急固當循理而行觀勢而動不可倒行而逆施也何以言之漢髙祖東向以争天下則以闗中為根滎陽為固雖戰屢敗終守死必争不肯捨此者志不在于滎陽而乃在于天下也今國家北面而復中原何以異於是江浙者國家之闗中淮甸者國家之滎陽淮甸雖屢殘破亦不置之度外者志不在于淮甸而乃在于中原也昔苻堅以九十七萬之衆伐晉既破夀春而敗于淝水當是時夀春淝水皆晉有也魏太武自云中由青徐伐宋至布索百牢掠廣陵而歸當是時廣陵瓜歩亦宋有也以是晉宋五朝皆倚淮甸以為屏蔽葢保淮甸然後可以駐驆建康保淮甸然後可以經理中原决二大䇿其要皆在于淮甸在所必争而不可失之地漢得天下其業實創于滎陽則國家之復中原其趾實在于淮甸使淮甸安固而富實然後可以復中原臣請設為難問以畢其説若以謂盍乘戰勝之勢大舉深入克復燕京據上都以令天下四方指顧而定一舉而成希世之絶績豈不暫勞而永逸哉臣竊以謂過矣何以言之髙祖二年楚兵方勝而深入則漢嘗大敗于彭城後又五年楚粮既乏而夾攻則漢方得志于垓下爰自臨淮以北䧟没累年綿地千里行師十萬月計糧餉以石數者七萬有竒以運漕則汴水絶流以負擔則非調夫十五萬不可繼以敵則無糧可因矣又况歸路之邀我糧道之困我若大兵皆行則内輕而外重外實而内虚分兵以徃我分而弱彼合而强未見衰弱之形而遽深入幾何不類漢入彭城之害事其害有不可勝言者則深入之説臣不敢以為然也若謂敵人乏糧怱遽而歸臣又竊以為過矣何以言之金人搆難幾十年矣初未嘗匱糧矣今自偽境濟淮而襲承楚何遽計日褁糧頓改常度哉又况承楚稼事未終税賑未入敵騎忽至縣縣官倉廩雖乏而農家之榖被野是親驅役吾民舂榖為米負薪供㸑厭餐飽膳又復漕運餘糧而西去矣則糧乏之説臣又不敢以為然也若以謂金能至承襲楚而不能至通泰足以明其兵力之少臣又竊以為過矣何以言之累年以來偽境固已委畫宿州為界矣今兹乃隂導伏人無故出疆安知其意不在通泰鹽䇲嵗得八百萬緍之利彼必以謂使我得承楚而有之即通泰在吾腹中可不攻而自下則力不能至通泰者臣又不敢以為然也設使通泰鹽䇲為彼所有彼漕鹽泝長江而上長江之利日與我争雖欲只保江表亦將驚擾不得奠居不惟我失煮海之利雖天塹之險亦不足恃矣利害之係至重大然則淮甸豈可以不固守而力争臣所謂守備之宜莫若固淮甸者此也一臣所謂措置之方莫若經久逺者有二説焉一則規度駐蹕之地一則操秉統御之權所謂規度駐蹕之地臣竊嘗伏思汴都京廟洛邑陵寢咸在中原洛汴之在天下猶水木之有本源網裘之有綱領誠復中原而都之則臨莅四方舉而措之無復難者睿意所向未嘗不在于此可謂得其要矣將復中原蚤定駐蹕之地稽之古昔揆之時宜駐蹕之地未有過于建康何以言之昔曹氏先有中原孫仲謀遂據武昌七八年間山川地形勢在江表覽觀規度至詳熟矣未幾遷居建業使曹氏父子必睥睨逡巡而不敢進後北兵濁亂河洛元帝南渡王導相之雖叛臣劇賊陵犯之頻終不肯捨此而他涉由是觀之將圖恢復中原駐蹕之地信未有過于建康者豈錢塘蘇臺所可比擬建炎己酉行宫告成無何金人兵火殘毁邇來亦既繕修稍以就緒増葺嵗年必復全備雖然淮甸未固建康形勢雖勝營繕兵甲雖多亦未可以遽議駐蹕也故淮甸之説臣已粗陳于前矣今距防秋纔半年爾防秋已前經理淮甸宿兵捍偹足為屏翰使今秋冬金人不能再肆侵軼則来春鑾輿駐蹕建康方議恢復中原此為舉措光復之序不可易者臣所謂規度駐蹕之地者謂此所謂操秉統御之權者自頃敵騎長驅及我北鄙士卒暴露迨今十年結草為廬枕戈而寢師旅之衆宜在厭兵而苦戰厭苦之意萌則勇鋭之志消勇鋭或消而望其立功難矣邇來士氣奮厲戰輒克㨗遂立却敵之功如此之盛臣既足仰觀陛下神武英斷命將出師度越前古逺甚雖宣王有常徳以立武事異世同觀若合符節豈臣愚陋所能窺測萬一大抵將帥之用士卒招則聚麾則散非命之進不敢進非命之退不敢退去来前却唯其所欲無不如志雖使之蹈白刄赴湯火無甚難之色人主之用將帥將帥之用士卒一也人主果以將帥用士卒者用將帥將帥以士卒聴命將帥者聴人主則天下之大軍旅之衆如心使臂如臂使指運動圖囬以一人而用天下恢恢然有餘地矣左氏曰師能左右曰以詩稱于以四方誦武王也然則以四方者王道帝王之事也史載韓信自謂善將兵若髙祖善將將然則善將者亦王道帝王之事也國家諸大帥爵禄極矣寵錫至矣眷渥優矣事權重矣前古所謂以四方善將將者陛下淵衷操秉深自得之幹旋轉運沛然閒暇雖天下英雄之難駕御者亦復得而用之矣惟陛下于四方善將將者當留神而加意焉則數十萬之衆趨走奔命之不暇豈復有慢令難使者哉夫如是何求而不得何為而不成操秉統御之權者謂此臣所謂措置之方莫若經乆逺者此也一臣所謂綏懐之略莫若惠吾民者何以言之濠泗襄鄧以北陷于偽境者皆吾民也今加惠焉非謂載粟帛以遺之招惰㳺而養之也推原厥由非我弃彼而不收亦非彼叛我而不附以田廬之累雖欲不從之而不可得凡此庶民皆䝉祖宗徳澤涵養既久且深其耆老丁壯日夜望思咸懐徯后来蘇之志者人人皆是不幸身糜偽境威力驅使雜于仇敵與我交兵豈其人之本志也哉臣愚謂宜因事區别或降附之際或俘獲之餘物色詢訪覆騐情偽願從則隨宜存撫欲歸則卑以資使人人有知聖度寛容海涵天覆原恕脇從一視同仁之意既深信而不我疑彼驅来戰則人無鬪志衆有遁心我徃伐彼則前徒倒戈開門迎降所至如歸無與我敵者孟子曰鄰國之民仰之若父母矣率其子弟攻其父母自生民以来未有濟者其斯之謂歟晉羊祜行平吳之䇿未嘗殺其人視祜同于父母吳人嵗餓歸者如市惟其平居無事之日祜得其民者如此後杜預王濬得以兵破其國易于摧枯此至今日所宜先也吾民䧟溺西北者惠心既孚招徠之意已喻矣吾民之在東南者獨何不思加意哉累年以來數十萬兵戍于東南而民不敢病者正以陛下軫䘏黎元禁戢科歛詔令丁寕誠心孚信實惠及民非異時俯傴空言同日而語斯皆所以惠吾民也去冬親征詔下東南之民咸知陛下親屈帝尊䝉犯霜露不憚躬臨為生靈計徳至渥也雖小民莫不願効才力助國討賊是以預納苖税及和買絹錢之類皆盡所有争先供輸無復難色其説以謂向非車駕之親征安知私室之藏不為盗賊所有此其所以樂輸而不病也雖然臣竊聞大軍驟移數萬之衆廬舍闕乏無以偹風雨蘓秀等州各備蓆葦竹箔椽柱不免賦之于民此亦當非其難者然此諸州類皆澤國數百里間地勢平坦水田彌望葦實生之不産竹木織葦為蓆尚可力為徑寸之竹拱把之木逈出浙東極為難得軍期急遽日限逼役至有撤室取椽三倍市蓆者其為煩費過于預納錢榖之數臣願明降詔㫖自今春無屋宇處廬舍之備但如向年臨安給價直或隨所産竹木充用不得限以徑寸丈尺則民免煩費且復及期易辦不致誤事而後時矣加意吾民至此則無復可議者所謂綏懐之畧莫若惠吾民者也臣謹條具如前復念臣識闇見遲料事不工建言無取非適今也遽承明詔出于望外雖務罄竭何補毫釐至于智慮淺陋論議迂􅀈冐貢狂瞽之説仰瀆淵聰則臣之罪無所敢逃謹昧死條具以聞韓樞密肖胄對臣伏聞邇者賊豫怙終金人同舉舉兵侵犯深蹂兩淮警報初傳羣情大震陛下睿謨自安神斷必行親御戎衣天臨吳㑹將相協慮士卒一心奮身逆摧敵鋒所向俘馘敵氣沮奪潜師遁逃信悔禍之自天知戡難之有日華夏竦動中外歡呼臣荷國恩歴叨樞近顧當斯際竊食祠宫既不能畫半策以賛帷幄之成謀又不獲備前驅以展行陣之㣲效進退惟谷夙夜難寜敢望聖度兼容温詔下逮訪以急務俾之盡言拜受兢慙罔知所措伏讀再四極喜而淚昔者帝堯舎己而稽於衆大舜善取諸人夏禹之拜昌言漢高之屈羣策惟聖虚己與古同符豈伊涓塵可禆海嶽仰應詔㫖姑竭愚慮聖問臣敢不一二條列試為陛下言之聖問首曰攻戰之利臣聞乘其時而為之者功必倍因其利而成之者人不勞聖人奉若天道時茍未至惟修徳政以待之時既至作而求成不俟終日臣頃在紹興二年以備從班獲陪外廷末議恭被詔問攻守之策臣時敢輒不自揆對言終當用兵葢如鼂錯之論七國以謂削亦反金人猶是也隨因賜對再具陳賊豫盜據中原人心不附宜出不意擇遣兵將鼓行進討聲言翠華復幸金陵督使過江願賜睿斷濟成大勲二疏諒存其言可復臣之出使軍情前陛辭之日亦嘗面奏和議葢權時宜以濟艱危他日國歩安强軍聲大振理當别圖竊惟臣愚前後狂瞽之言尚䝉俯記清理則攻戰之利臣先固知之矣况臣親見金人等軍嘗至川陕者皆畏服西兵勁鋭善戰有難敵之語今兹入界韓世忠等三大帥率皆山西將種所統精鋭頗多西人臨難敢前屢挫敵衆復聞吳玠繼有㨗奏軍聲大震敵意必揺若以斯時數道並進此有犄角之勢彼受腹背之敵不戰自潰理之必然此其可以攻戰一也抑臣聞之在昔漢運中㣲新莽縱暴民懐高祖文帝之徳謳吟思漢十室而九光武因之不三年成中興之業田單以即墨兩邑餘衆敗燕于百勝之後盖以燕用間言劓所得即墨士卒置之前後且復𤼵掘壟墓僇及死者人懷悲憤怒自十倍用以出戰卒破燕軍恭惟大宋祖宗之澤海内涵濡垂二百年人心愛戴豈特漢民之謳吟金人比嵗暴我中原豈特即墨之悲憤此其可以攻戰二也加以賊豫父子虐用其民苛歛煩役殆不堪命臣前過偽境親所見聞此復僉𤼵使臨行陣其怨叛之心益甚矣傳曰天予不受反受其咎書曰傒我后后來其蘇倘因上穹助順之心逺副遺黎雲霓之望萬全之舉一怒而安聖問次曰守備之宜臣聞之勝負何常敵之情偽難察偽豫入冦信曰守備有方彼多失亡因其窘蹙之勢畏我振厲之威旋即奔竄然今敵自恃勝強反成敗衂剛愎之性切於復仇况又出入無定萬一内懷詭譎有如子胥教吳分三師以敵楚之計我出則歸我歸則出亟肄而罷之則此兵甫還他兵繼至方喜其去以微驚又乗吾怠以來戰脱或少失隄備豈不動致驛騷故欲議於戰攻當先飭於守備逺若川陜固有吳玠及宣撫使司之兵守備之宜既自為計惟是荆襄之制上流吳越之防海道而江淮緜亘數千里間尤其出入之要衝兵法有云無所不備則無所不寡今若無事而益為守則不惟兵勢之分所有寡弱兼亦勞人費財坐以守困昔人論長江之首如七尺之軀不過數處朝廷比因去冬之驚近理險要必以熟講至於兩淮之濡所當守者故亦有要害若分擇文武臣僚諳練古今察知形勢者按行計度預圖其宜量逺近之中求險阻之要某將最才可將某屯某人有才可援某所某地可以陰積某道可以轉餉以至器械財用戰船水軍之屬一皆素具無或取於臨時備在敵先倉卒無患臣竊以方今當守備之地臣固不能盡知亦未易盡言姑舉所聞見惟當先急者莫如淮南淮南在昔固南北之所必争者也晉敗苻堅百萬之衆實在淝水之上江左置戍每以夀春盱眙為重至若魏人欲制吳則鄧艾先耕墾於夀春周世宗謀江南亦三至淮上親破夀州葢夀州據淮水上流山川障塞大江甚邇此則平窺淮南如在掌握而又北連穎蔡可以直抵京師北兵入亦先安重兵於夀春淮陰夫淮南賊豫父子闚覦之地也故不惟利源所在可以趨大江使江南而無淮南便縱敵人在吾户限之外不復可以為固不當以利遺人更為敵有也前日潘致堯回其書已有江地不許屯戍人馬之語及遣王翊來果持分畫之説我既難從以理拒之疆議未定便可扼險而固守而淮東西雖命宣撫使然將屯置司乃江浙所遣偏禆分守資以輕兵既已勢孤難必責其固志况復力弱豈抗於敵鋒且狃連嵗之無虞可謂泰然而坐視守備既缺斥堠不修遂致偽豫之兵如踐無人之境雖既徃之咎豈方來之可忽抑聞敵在承楚州形勢孤絶旁無陣寨邑人難以堅守賊兵易於攻取而終以全免者或疑以通泰皆係鹽産地分敵既窺取淮甸私指此為外府因加保䕶以為後圖借曰不然在理所當致慮比報三將奏功而韓世忠劉光世置司鎮江太平臣愚不能仰測廟謨用意之㣲或者妄揣以車駕方在浙西翼衛全恃江上故三將皆屯濵江朝廷未欲示敵以強存修好之議若移兩將江北或致蕃偽亟争臣愚以謂張將之兵既置司建康自可分屯江浙屏蔽行闕力已有餘况二將若在淮南籬籓可衛中國若謂不欲致疑金人彼既舉兵我則移屯有名若敵引惹生事但當嚴加約束俾守封疆無得輕以一人一騎踰淮而北犯者重坐之明勅榜告諭逺近以示兼愛生靈之徳意耳聖問又曰措置之方竊臣以為方今所謂措置莫大攻守二策乃若守備已備陳其宜其于攻戰猶當慎重臣聞兵家至理莫善于紀律軍行急務無先于糧餉至于號令必有總攝權力必能急制然後可以一臂指之用而抑强憤之衆昔李晟統軍秋毫不犯故方克復京師而井里不知安堵如故葢非若此不足以為弔伐之師然軍行紀律多利擄獲今欲削平僣亂止當取彼凶殘至若其民實吾赤子况聞偽境之民深苦貪暴日望王師之至救于水火之中若非紀律之兵恐乖喁喁之望宜勅諸將嚴立軍制昔諸葛出師雖有木牛流馬之運而糧倉不繼因無成功先主出兵荆州敵國震動至欲遷都避之而關侯糧盡更致䘮敗今若進兵偽境雖聞山東河洛之間民言王師若來願資糧餉然偽境兵火之餘户口凋耗墾田數寡出糓不多比更金人往來無不蠶食豈敢保其尚有餘糧在西運道水行則慮河流有斷涸不通之處陸運則恐近無移用轉餉之人要須預計有無之事臣聞春秋傳曰師能左右之曰以號令不能使之聽權力不能使之服皆不可言左右之也唐以九節度之師環賊而攻之一旦潰敗雖以李光弼之威嚴子儀之寛厚勢不能自制其兵自立庭户一有纎芥利害未免更相讐疾其能出私己以狥國家之急殆未之見若欲並遣進攻必先選命總師分以精銳之兵附以招集之衆合有萬人隠然自成一軍遇遣諸將並進攻討總統之號令既一權力既重諸將雖素貴重疇敢不聽從維持輯睦便必有成其利害與非用素所撫循之兵而僥倖取勝者葢亦異矣抑前代君臣之遇合相與有為必先有素定之論然後見之行事享其成功韓信之初見漢高諸葛亮之初見先主王猛之初見苻堅凡厥指陳皆有定論後所設施不愆本謀今者措置之方惟陛下與二三大臣謀謨素定使他日按而行之庶幾臨事不惑不疑此尤措置之本原也聖問又曰綏懐之畧竊以畿甸山東闗河之民怨金人之多暴苦偽齊之煩苛臣前已槩言之矣為今之計當以安集流亡招擕歸附彼念金人之擾攘而被䝉朝廷之徳恵是猶童䝉脫于禍患復免于責扑而親依父母之慈愛豈他適哉要在擇羊祜陸抗之屬以為守帥擇卓茂魯恭之屬以為令俾之悉廣陛下之徳恵輯而附之以招其餘逖聽風聲扶攜而至者勢必衆矣比聞諸俘獲歛軍恩㫖悉貸不獲自㧞而歸者加以官資賜以金帛給以土田重以宴犒雖金人渤海絶域之國所以優假安全之恩意已無不備至况今淮南江東西荒閒之田之多唯宜直述陛下所為愛養元元之誠心掲榜境土或選舊東北人若初附簽軍之可信仗者使深入偽境轉相告諭俟其来歸從所欲往授田給糧蠲其賦租遂其生理必將接迹而至此亦諸葛亮使民雜耕渭濵之意也昔人有言彼民與此民同是天意與民意同無不成之功葢民心悦則天意得以此徳聲溢廣西北舊疆可傳檄而定尚奚血刃轉戰之勞哉恭惟陛下天縱之資日躋之學萬事統紀灼見微𦕈而衆美不居隆恩葢代如臣固陋戅愚豈足以策大事殫蠡管之小識進其誠欵葢直罄胷臆與親所見聞無復文飾本末見戰守之情終始言天人之助至於高為迂􅀈之談力持南行之説臣皆不為也况藩僣厯年用兵人神共怒古今所無以吉凶之理倚伏之數推之行且滅亡兼臣昨在軍前聞金人頗有厭兵之意其衆軍亦甚思休息特尼堪烏舍高慶裔輩持之不肯然上下猜防人心攜貳縱未能亟加天討亦將見内患自生變亂可得也爾後姑復尚通使經理必種種亦易商量權輕重之間事易以成臣螻蟻之願者伏望陛下俯從人欲無失天時因得而慮失得勝而彌懼思嘗膽之報遵馭朽之戒掃叛逆之餘燼拯黎庶之横流以雪宗社之大憤為天下之福此非特愚臣憂世愛君之心實海宇臣民憂國之義輕瀆冕旒臣無任云云三朝北盟㑹編卷一百七十五
