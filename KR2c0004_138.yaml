body:
  text: 三朝北盟㑹編卷一百三十八宋徐夢莘撰炎興下帙起建炎四年四月二十四日乙未盡五月十三日甲寅二十四日乙未韓世忠敗金人於建康府江中捷奏至除世忠檢校少師改武成感德節度使制曰門下朕邅百六艱危之㑹賴二三梟俊之臣跪推轂而遣將軍守境既騰於戎捷歌出車而勞還卒疇勳敢廢於邦彛爰錫贊書用孚羣聽具官某勇聞天下氣蓋關中堂堂將種之英凜凜軍鋒之冠行已恭而事上謹蚤服周行臨機果而料敵明屢揚偉績昨屬交侵之警俾屯要害之區磨礪以須鼓儳而擊縱精兵於數路若珠走盤擠羣盜於長江如杵投臼坐以中堅之壁成兹南紀之安威行而海內息肩師勝而國人屬目是用兼隆徽數特表膚公坐擁齊旄易兩鎮提封之大入乘夏篆視三孤絶等之崇申衍采風陪敦井賦以永旗常之載以昭帷幄之成於戲武能威敵者師帥之榮賞不踰時者人君之信惟忠力可以任安危之重惟謙沖可以保富貴之終勉圖而休毋廢朕命可特授起復檢校少師武成感德軍節度使遺史曰初江上防秋韓世忠屯於鎮江府及建康失守世忠退軍於江隂軍迤邐至平江府秀州至是世忠聚集舟船擺布於江中扼金人歸路時邵青以舟船在蕪湖往來於建康竹篠港世忠使人招青青受招安而不以㑹乃曰我方為賊其下皆窮恐不為用故不可動也是役也世忠敗金人於江中奏捷至行在除世忠檢校少師改武成感德軍節度使制詞有曰屯兵要害邀擊其師大振軍聲殺獲過當敵師震懾知國有人二十五日丙申韓世忠與烏珠再戰於江中為烏珠所敗孫世詢嚴永吉皆戰死金人在建康韓世忠以海船促於江中乘風使篷往來如飛烏珠謂將軍曰使船如使馬何以破之韓常曰雖然見中軍則自遁矣烏珠令常以舟師多沒常見烏珠伏地請死烏珠貸之乃揭榜立賞許獻所以破海船之策有福州百姓姓王人僑居建康開米鋪為生見榜有希賞之心乃教烏珠於舟中載土以平板鋪之穴船板以擢槳俟無風則出江有風則不出海船無風不可動也以火箭射其篛篷則不攻自破矣烏珠信之一夜造火箭成以戊申出江擢槳行舟其疾如風天霽無風赫日麗天海船皆不能動金人以火箭射篷則火起世忠海船本備水陸之戰人皆全裝馬皆鐵面皮甲每船有兵有馬有老少有糧食有輜重無風不能行火烘日曝人亂而呼馬驚而嘶被焚與墮江者不可勝計逺望江中層層皆火火船蔽江而下金人鼓櫂以輕舟追襲之金鼓之聲震動天地世忠皆散孫世詢嚴永吉皆力戰而死烏珠既勝欲之建康府謀北歸而世忠海船扼於江中不得去或獻謀於金人曰江水方漲宜於蘆陽地開掘新河二十餘里上接江口舟出江背皆世忠之上流矣烏珠信之乃命掘河一夜河成次日早出舟世忠大驚金人悉趨建康世忠尾襲之而已初長蘆崇福禪院行者普倫普贇普璉結集行者及强壯百姓千餘人分為三隊在楊家洲上自相守保世忠嘗約普倫等為策應至是普倫普璉普贇率其衆千餘人駕小舟千餘艘皆裹紅巾立紅幟來策應至長蘆遇世忠海船狼狽而來金人至長蘆亦回世忠與餘兵至瓜步棄舟而陸奔還鎮江聚兵沿江避兵之人往往取其舟中糧食或有得銀絹錢物者中興姓氏録忠義傳曰孫世詢字咨道開封府人也有勇力善騎射少時曽蹈之薦之梁方平隨軍屢立功後從韓世忠為前軍統制與大金戰應天府河東府皆稱其勇苗傅劉正彥反軍臨平鎮世忠來勤王世詢為先鋒與敵戰大敗之故殺傅正彥走從世忠追襲之建州蒲城縣大戰敗之殺敵兵萬級統制馬彥溥趙竭忠趙竭節皆戰死世詬臨陳遂擒正彥加觀察使及大金烏珠渡江復自建康回世忠及烏珠戰建康門外大敗之次日再戰江中無風世忠軍皆海舟不能行大金竟以小舟來縱火世忠軍敗世詢及嚴永吉皆力戰而死張進及梁斌自敵寨脫歸先是張俊命選鋒正將梁斌副將張進屯諸暨縣金人陷越州斌與進投拜上還越州也進得脫復聚衆得二百餘人歸還行在叙其功以贖投拜之罪大言梁斌不肯歸朝廷已併殺之既殺斌然後乃能歸朝耳又數日斌以衆三百餘人還朝廷亦待之如初仍不問張進之詐斌後為策選鋒軍統制牛臯敗金人於宋村擒其馬五太師金人至江西者回軍北歸牛皋濳軍於寶豐之宋村衝其中堅殺傷甚衆擒馬五太師招捉司加臯武功大夫和州防禦使為五軍都統制汪藻奏論金人留建康乞分張俊軍馬策應其狀曰右臣昨自三月末得之傳聞云金人在建康築城為度夏計臣雖幸其不然然心竊憂之以為中國困於金人而得少休息者正賴其不能觸熱故嘗以寒方至未暑先歸吾於半年間汲汲措畫猶每嵗奔命不暇今若縱其度夏則長為我患無所底止不知朝廷何以枝梧洎到行在聞韓世忠列戰艦江中遮其歸路日有所獲且言金人窮蹙之狀臣竊欣幸以為三月所傳誕妄耳續觀黃榜備録韓世忠捷奏又以為朝廷必可掃除之今近二十日矣其耗寂然議者頗疑世忠奏報未必皆實兼數日人自常潤來者云敵於蔣山雨花臺兩處各劄大寨抱城開河兩道以護之及穴山作小洞子以為避暑之地陸增城壘水造戰船而采石金人已渡復回者纍纍不絶今且五月矣比常年去幾月餘乃反去而復回其欲留建康明甚如此則與三月所傳又似符合臣聞金人動設詭詐尤喜為窮蹙之狀以欵我師墮其計中者前後非一今安知非本為度夏計而陽為窮蹙者特以欵誤我師耶建康為東南咽喉國之門户也天下轉輸朝廷號令未有不由此而通者若金人果據此為久計則東南饋餉遂絶如人扼其咽喉守其門户果得髙枕而卧乎不知羣臣日至上前亦嘗有反復及此者否豈遂以其無事而所當講者承平之先務乎抑揣陛下非所樂聞而不以聞也不惟是而已人既扼我咽喉守門户則羣盜亦將視我緩急以為向背國家果有力能使之退聽屏息乎况又有意外之憂所難言者不得不慮臣愚以為此事所係非細廟堂若救焚拯溺然朝夕在念及五六月間我師便利之時㑹諸將與韓世忠一舉掃除非特去目前之患將使懲創終身不敢復南其利害豈不相萬哉雖近聞遣張俊提兵過江節制浙西人馬迤邐前去以為策應此固陛下長策也不知張俊果能為陛下有慨然立功之意乎臣愚欲乞專差得力使臣教人齎陛下宸翰星夜兼程自荆襄鄧湖以來迎張俊軍令分數萬人順流而下仍於上流自計置糧斛載以自隨彼張俊軍既皆新人必精鋭可用且敵人見上流之師突然而至莫知其數必破膽奔潰此制敵一計也如其不然八九月間氣候稍涼彼得時也幾㑹一失雖悔何追伏望睿慈不以臣言為愚輕此敵忽此事特加採納不勝幸甚五月七日戊申濠州土豪王惟忠棄韭山寨率衆歸於節制使劉位王惟忠濠州鍾離縣農家也字移孝總角有立志兄弟三人惟忠最幼每經行於市人皆不語以俟其過故人號為靜街三郎軍興上有詔許民自保惟忠乃據韭山為寨與鄉人共守韭山有洞可容老小數千惟忠屢與張文孝史康民戰金人以孫興來知濠州管屬縣鎮皆聽興僞命而用天㑹年號興遣人招惟忠獨不從至是惟忠率衆棄韭山寨歸於招信縣劉位位令惟忠為左軍統領官韭山寨壘石為城周匝四里又作大寨七里環繞之戰禦之具稍備民之願來依者凡萬餘人惟忠選强壯充兵韭山之勢巍然而立外有羣山環繞之山有泉湧出泉下有洞衆水悉注焉洞雖不大然不論水之多寡或連雨㑹羣山之水凑於其中而洞能容之呼為歸水洞倘無此洞則山泉與雨水皆為羣山所壅不得泄寨在山之頂萬人居焉常苦無水以給食帷忠患之乃視歸水洞而謀曰若塞此洞不惟可得水以給食且水勢縈回於山曲亦可恃以為險也然此洞雖小能容無涯之水豈非有神佛以主之乎萬人方待水而食所繫不輕吾將盡誠心禱之於神權塞此洞借水以給衆若神而有靈必陰佑於我乃與進士戴德夫謀禱塞洞之方德夫以惟忠之意朱書鐵為板以清酌祭神擲板於洞遂實之以土石聞之者皆相視而笑以為兒戲也既而數人之力告勞而洞已塞矣人皆大駭及惟忠既去歸水洞復陷如初十日辛亥直龍圖閣劉宴與戚方戰於宣州城下被殺戚方圍宣州知州李光乞援於朝詔劉宴解圍宣州以觀察使巨師古為之副宴受命即日就道師古以兵繼之初宴在常州駐軍方率衆自西門突入欲作過晏自城中殺出之至是晏始到宣州城下未安營壘乘城不意自城南轉城西直趨城北以搗方之帳方大驚走晏欲生致方乃單騎追之賊見官軍不多乃自駱駝山後設伏以斷其路方率親隨迎戰晏單騎力不能敵退還至天寧寺前隔小溝是時暑雨方漲馬陷於淖不可出橋左有伏賊以鈎鎗搭晏晏猶手刃殺數十人以無援而被害晏死數日師古兵到城下光具聞於朝上憫悼之贈晏龍圖閣待制官其四子仍令即死所立廟榜曰義烈嵗時祀之中興姓氏忠義録曰劉晏燕山府人也建炎二年隨劉正彥掌赤心隊降於丁進有功正彥敗晏降於韓世忠纍遷直龍圖閣四年戚方反常州適晏兵至擊方大敗之及戚方之寇宣州知軍事李光固守其城晏追方至宣州大敗方解其圍方敗走晏追擊之不勝力戰而死時稱其忠勇立廟於宣州十一日壬子金人焚掠建康執江東安撫使陳邦光渡江而去金人焚燒建康府虜掠人民奪劫財物出建康府城靜安渡宣化而去烏珠屯於六合縣舟船入自瓜步口尾尾相銜擺泊至六合不斷建康城中悉為灰燼矣金人雖已渡淮東無警安撫直寶文閣張稹尚守揚州招信劉位以節制之職聚衆在橫山帖然無一事軍唯飲酒賭博而已先是知真州向子忞措置欲移治楊家洲而楊子六合之民願保方山子忞棄真州金人據建康府大兵入二浙猶有遊騎往於淮南大抵自滁河之西皆為遊騎所擾而不過滁河之東金人即渡江北占六合於是真州為羣盜賊所擾已不可居王冠率軍兵共守方山後渡江駐於溧水溧陽之間金人又占真州而揚州亦不可守張稹乃棄揚州金人據建康半年餘江寧鎮采石至和州道路往來不絶和州亦留兵戍守雜以婦人戴頭巾著軍號執兵器巡防城壁然無一軍乘虛到城下與之為敵者邵青在竹篠港探知建康城中金人不多且烏珠等皆在浙東建康有可克之理是時青見有殺牛者牛拒力甚青取槍刺其胸共助而牛用角斡青中股青方病瘡不能行乃遣其次姓馬者率衆往收復建康既至水門暴雨電雷大作不克入而遂退青殺之遷單德忠為次又有都團陳德結衆欲殺金人部勒已定前期為朱都團所告德全家被害兵馬都監金沔死之金人圍建康也守南門畨官稱萬户者常諭居民願往來樵薪者給牌子前去居民皆不從及被殺戮之餘方悟此萬户之言乃陰欲保護居民使出城求生也十三日甲寅戚方攻宣州不克退去宣州解嚴戚方圍宣州遇劉晏直搗其中又巨師古到及方戰於城北方三戰三敗遂引去宣州受圍凡二十九日受圍之初方妻管氏病癰甚苦至解嚴管氏死人皆以為快大抵守城之法先要財物豐備是時府庫財物盈滿而大富人皆出銀錢為犒設故賊人積攻具以積草柴之類皆多以錢帛募死士燒之而人亦願盡死力如城北木塔寺有木塔下瞰城中虛實當先除去而賊守甚嚴乃募人負草實其塔然後縱火令方下即有應募者是夜果有草實其塔內縱火火為塔所束如火柱衝天觀之雖可畏而人心則甚喜州既解嚴㑹隨功髙下以金杯勸酒就賞其杯初方以宣州城為龜形當以真武法以穰之乃令攻城人披髮用紅帛帕首方既退去城之東壁摧壞者數十丈嶽飛殺劉涇併其軍先是嶽飛與劉涇合軍屯戍宜興飛領兵往建康劫金人於靖安得勝回軍溧陽縣得涇軍將官王萬報涇欲殺飛母及妻而併其軍飛大驚即令姚政往圖之政夜行抵宜興以飛母命傳語涇適得家書請略訪來議事涇不虞其謀入其室則有楊某者伏於壁間遂殺涇少刻飛到撫其衆史康民及金人戰於定逺縣軍敗閭勍被執而去史康民濮州人也初起於京東因迎神社㑹有繖扇撾劍之類從物藉以為資遂擁衆漸盛乏糧食殺人食之號為餓􅀢子轉至淮南往來於濠泗間張文孝在其中軍謂之張鈐轄文孝用扈鶚及李徽猷計遂背康民殺康民父母自為一軍先是閭勍在越州除淮南等招撫節制使至崇德縣聞金人已犯錢塘勍到平江招得數百户又聞金人在建康乃取江陰軍路渡入柴墟鎮至楚州見趙立立方措置楚州就以上命授立右武大夫徐州觀察使知楚州軍州事兼管內安撫使淮南東路兵馬鈐轄之閭勍至泗州而文孝在泗州出迎勍參拜且曰聞太尉將到專來參迎勍甚喜勍與文孝至招信劉位發兵禦之於境文孝戰不勝勍與文孝往濠州界下寨於黃連埠文孝名為迎勍實挾勍也是時康民屯於韭山文孝往攻濠州康民乘虛掩黃連埠破其寨取勍及同行劉舜臣等一行歸定逺殺李徽猷得扈鶚至定逺臠割刳其心以祭其父母康民拜舜臣以謝殺扈鶚雪父母之讐金人周太師聞康民得勍屯於定逺也乃㑹亳州大太師兵渡滑口甲寅周太師入自西門康民出兵迎敵大敗而回大太師已自北門入執勍而去是役也康民幾死趙宏救之得免次日康民議追金人奪勍聞已渡渦口矣宏相州湯隂縣弓手也時人謂之趙三鬍初勍迎奉神御趣離西京也於嶽飛處借使臣十人而宏其一也循蔡河而下至渺渺遇張用勍說用歸朝廷以馬臯之女一丈青嫁用為妻初臯為郭仲荀所誅勍周恤之以為義女既嫁用遂為中軍統領有二認旗在馬前題曰關西貞烈女護國馬夫人劉舜臣者用之參議官用俾隨勍以行故舜臣在勍軍勍在南京金人欲降之不可欲以為京東安撫使不可乃被害姓氏録忠義傳曰閭勍有膂力善騎射少以班直補官靖康初纍遷主管步軍司公事上南巡揚州勍留守京師建炎三年京師留守宗澤命勍軍河南府㑹合王彥楊進丁進等兵六十萬欲渡河迎請二帝㑹暴卒而止三年同杜充上表請上還闕以圖中原俄京城絶糧杜充赴行在勍亦領兵數千至淮南金人方南侵以節制淮南等路軍馬往拒之四年軍濠州定逺縣與金人戰不勝被執令同招張文孝攻濠州使康民乘虛襲文孝敗之勍被虜後金人又攻康民於廬州勍同康民與戰敗績復被執勍罵金人不屈而死紹興元年贈檢校少保節度十七年諡壯節劉超據荆南劉超據荆南分衆犯陜州先是張浚以宣撫使往川陜也經由郢州留小潘防禦一軍於郢州小潘防禦為部下彭筠所殺筠乃與超合超遣筠犯復州凡所經過井邑邱墟人無噍類於是超欲取鼎澧以窺湖南二廣劉位攻趙瓊寨劉位遣人攻趙瓊寨趙立出兵欲却之位大怒遂率兵攻瓊立復出兵為援且以檄告位大略言瓊已聽當使節制為朝廷守宿遷水寨當使乃南東路兵馬鈐轄泗州之兵皆合聽節制位乃止三朝北盟㑹編卷一百三十八
