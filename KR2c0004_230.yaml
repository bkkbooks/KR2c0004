body:
  text: 三朝北盟㑹編卷二百三十宋徐夢辛撰炎興下帙起紹興三十一年七月二十一日壬辰盡八月十三日癸丑元祐進士乙科元符黨人朝奉郎崔陟孫淮夫梁叟上兩府劄子淮夫等本貫應天府昨縁交地之後省鄉墳尋後隔絶自念家世仕宦久被國恩不忍自棄于異域間關來歸本朝竊有管窺所見輒敢冒開庻幾一得之慮少裨朝廷採擇之萬一淮夫等伏覩金人有可攻之勢三有不可不攻之勢三就其可攻之中又有三䇿何謂可攻之勢一曰上天悔禍二曰民心歸往三曰戰具有備所謂上天悔禍者金人自頃以來所不可與敵者正以時用事之將智勇有以過人故也自亮簒位前此功臣誅鋤已盡向使此曹尚存本朝雖以百萬之兵苦戰數十年豈能盡除之哉及先所掠京師寳貨法物今皆送至京師此乃天意欲還中國也所謂民心歸往者金主若不大興土木牛羊用人則中國遺民亦且安之矣本朝雖欲恢復既其人心不揺亦何以求功所謂戰具有備者本朝講和之後二十餘年得以生養訓練金人所射弓不過五斗本朝戰士所射弓多是一石或二石鎧甲戈矛之類又皆堅利比見劉兩府之渡江人人賈勇有死之志咸相謂言我輩父母親戚徃徃不為金所掠則為所殺戮今正當報怨之時此可攻者三也何為不可不攻曰恐失天時也恐變民心也恐豪傑出于意外也所謂恐失天時者今日金主暴虐在彼為不幸而我之幸也軍民既離心矣我兵一動彼必内應尚乃遲疑不决萬一亮死則立新君或土木畢工稍革暴政民人息肩則難動也所謂恐變民心者彼中百姓所以延頸本朝兵至甚于時雨者科役誅求竭其膏血故也彼民見本朝不動或再講和議疑為棄我此後無復有望謂如望海州東海縣徐元始因不堪其苦虐殺其縣令稱兵願歸正本朝欲用本朝年號者一年有餘而本朝不誘以來之及其死也又不旌褒以勸之其敗也海州之民指以為患轉以為戒今滕楊軍沂州之間有來二郎亦苦北軍侵擾聚衆為亂今則其徒雖散而其人尚在䝉山無所歸亦深悔之若久而不問失民心必矣所謂豪傑出于不意者今河北有任郎君李川輩雖號為賊而不侵擾百姓客旅缺用者厚與之金但入城取官物而已由是往往百姓安之萬一此徒一熾且假仁義而行之民或歸心則為患不在金人之下矣此不可不攻者三也何謂就其可攻之中又有三䇿兵法缺出淮甸襄漢今日闢百里而復歸之不過一勝一負又似昔日將帥各握重兵養患冦以自豐也若以正兵守淮甸以示弱使游騎侵陜西以下關中下檄中原彼必以精兵銳將盡赴關中之急也後以竒兵由濱州分二路以趨燕晉斷其歸路明告其軍人有能以百人來歸及民間不附金人自保山寨者各以次第旌賞將見彼來歸之人不暇及也當告諭渤海契丹之人令明知禍福若能相與共滅金人各為立君興復其宗社約以白溝為界不復相侵設二國不肯相聽則敵亦必疑此二國之人上下相潰則成内潰也况數年前彼丞相蕭裕已嘗結西元帥欲舉兵作亂欲立契丹之後祁王之子豫王之孫既而敗事今若約以各興其國必以豪傑為應于二䇿之中此為上䇿伏乞覽淮夫等今具在此聞見事宜項下一金之初甚微本一英格貝勒有二三千人無城郭宫室之居無珠玉金帛貨財之積當時為大遼市海東青于海上道由其國使命往來不絶金人不堪其擾乗怒發兵當時止知殺敵不知畏死戰勝則財物子女玉帛盡均分之其所以每戰輒勝也今則久居南地識上下之分知有妻孥親戚之愛視去就死生甚重無復昔時輕銳果敢之氣故前日罷𣙜塲之後沿淮置巡舖每兩月一替當其出軍其金人與親戚泣别自謂極邊有往而不返之意其軍畏怯如此一自金主亮簒位之後前日良將大臣如西元帥逹蘭三路都統將軍韓常蕭玉秉徳國師烏凌阿衍𠫭政魯國王宗盤金主親弟太傅兖州知州東平府總管海州知州都古嚕訥丞相蕭裕樞密院事張通古平章蕭玉皆稱雄傑勇果之士盡已殺戮當時北人莫不泣涕咨嗟言今後用兵無人可將即目南路特伯烈等地面契丹圖們額哩頁主軍其主管修造軍器及戰船即是前日歸附下人赤心軍海古勒馬欽専主事見任左拾遺金人往日戰馬甚多自去年十月縁軍下馬耗盡括民間私馬所有京東山東關西盡起發逐路輕送徃益都府牧養于六月初間又有天使起發赴以北州府外河北河東路及燕山以北馬却發遣往天徳去内府路牧養外自括馬之後大約馬耗八分即目南京路正軍皆闕馬今年三月二十五日降下銀鋌令軍人逐牌子差人往減州地分自行收買一金人所造戰船係是福建人北人謂之倪蠻子等二人指數打造七百隻皆是通州樣各人補忠翊校尉金主云候將來成功以節度使待之其所統主將皆官靳賽徐文孟彬王大刀等主管然所括水手皆灌園種稻取魚之人實不諳江海水性其官吏往通賄賂謂如實曽駕舟之人有錢則得免其不諳水性者無以為賂則反被差委其宿州水手無處聲寃衆人共毆殺本州同知如本朝通判諾爾布而行可見人心是脅從所謂舟船已發在濱州蒲臺縣伺候閲習一金人正軍即目京師雖號一萬宿州陳州許州皆號千户然毎一萬止是三箇千户毎一千户止是甲兵三十人毎一甲兵各有兩人或一人伊勒希本朝所謂傔人即馬步人共九百人為一千户毎二千七百為一萬户即是京師屯駐軍共二萬七百餘人南京二千七百人宿州止九百餘人陳許二州乃韓將軍弟韓定逺九百餘人昔日從軍係是漢兒軍于前年並已放散歸國止東平府及滄景沿海諸州有自來被擄人分屯山東毎人給以官田二頃荒地一段令自給用共二十萬户號為民軍外新簽山東河北河東關西有數十萬見各逐州府㸃集區處外有契丹渤海漢兒軍號七十萬見在天徳云中府路牧馬然所簽人皆不均其間實㑹武藝好身手行賄賂者皆免貧者雖單丁亦皆簽發見簽人曽經上司陳狀理㑹終不理可見人皆脅從無有鬭志者也但有燕京北至䝉國斯排頓稱准備迎接山東路䇿應選鋒此軍一淮北陷金百姓昨在東昏時撫存頗厚小民無知偷生茍活人而且化其心未易動揺今則金主専行暴虐百姓日夜不能聊生是以思慕本朝如出一口去歲十二月間唐蔡州關報沿邊有人馬甚衆旗幟甚盛不委便是南兵移文諸州各加嚴備百姓聞之徃徃遞相慶賀至有出郊或私之他郡迎問南兵至期久而無耗皆怏怏悵望一中間金人復取河南之後張七郡王軍至南京穀熟縣往往擄掠良人妻妾奪取財物其酷無異金兵百姓之心皆失望今若不預先嚴加約束則有前日之患要令官軍所到處秋毫無犯使逺近聞之無不開門以待最為切要一金所造新軍器已畢盡將徃日京城所得軍器焚毁了當其所造甲太沉重被戴艱難所造手刀各樣長出鞘亦甚艱難見在東平府沂州滕陽軍京兆府處頓放已差官監管伺候新兵支散一金人糧草如景州濱州東平府青州密州濟州兖州等處皆有草米東北府嘉祥縣景州將陵縣及南州諸州各不下五六十萬然官中積之雖富民間往往闕食一金主簒位以來新修燕京大内將復剏修京師大内其委任丞相張浩彈壓官統軍圖們額哩頁其専一提㸃之官係内官梁大使者其所用軍民夫工匠毎四月替近者不下千百里逺者不下數千里近者北歸往北逺者得回動是踰年到家不月餘又復起發其河北人夫死損大半其嶺北西京路夫七八千人得歸者無千餘人可見人民寃苦一往日本朝庄農經劉豫之後賦稅已重又近日修内夫役頻併毎中人之家止敢置地六十畆已該作夫頭一頃以上作隊有蒔地稍多則為人了事户科配誅求為如修内顔色膠漆金翠珠玉布麻銅鐵鷂子鵪鶉之類皆出民間其金人北軍一家蒔地不下數頃既無稅賦春則借農以種夏則借人以耘秋則借人以收遇歲小歉則輸納稅賦民且不能給何暇計糊口之有無遇歲大熟北庫所收甚多盡行和糴其價必賤則莊農供官科配愈難支持是歲之豐歉民皆被困衣食不給往往顒望聖朝甚于時雨一金主不聽大臣諫官議論専以威强自作聰明日欲遷都京師意欲窺伺兩淮主其事者惟常安所由女妾妃及馬欽二人然其意未可測度見萬侯及正軍皆為本朝與之結盟以來待之甚厚予之甚優豈可貪而不知足言今之世界比之在他時國裏已是十倍好過正軍動是四五個月不支錢糧雖遇支給之時往往被本軍官吏瞞昧北軍亦自時出怨言一曩者朝廷講和之後發遣赤心軍及歸朝官歸北彼中金人相指謂其人本一奴婢或本一下軍今大者建節小者授顯官各富有金帛其被發遣人亦相謂說此中身請俸一身從軍兼領他職自是彼之軍心往往懐私向慕一往日金人止以射獵打圍便為戰陣騎射打毬閲習輕鋭自金主簒位之後往往猜忌軍人聚集議論將打圍射獵打毬盡行禁斷且軍兵但令屯田亦不敢習藝金人及故民百姓深畏慕劉兩府錡聲名關西人亦畏李四廂名世輔改名顯忠聞其風者莫不竦懼一金人極邊往往無兵都在近裏州縣屯駐遇一州或有急難鄰州雖有兵亦不輒便救援且如去年十二月間壽州有賊壽州關報南京告急其南京千户侯月餘承東京都統文字摘那二三百人方始起發一金主簒位之初嘗對諸大臣言若趙宋如東昏時依舊通和結好方一月餘劉麟作右丞上章乞簽鄉軍收江南金主出劉麟作上京轉運一金人未修内已前米麥極賤米不過二百一石小麥一百五十一石自修内連年水旱螟蝗間作官中税賦之外以和糴為名强取民間者如帶糴貼之類二年之間不下七分次民間有米盡數為之括拘無即以户口大小擬定數目勒令中納以此官中積蓄長多富庻民間由是乏食八月一日辛丑朔忠義郎魏勝收復海州四月甲辰王秬罷淮南轉運副使宫觀臣僚上言謹按淮南轉運副使王秬猥瑣庸材天資陰險夤縁世賞超取美官日以職事獲覲天光陛下念其先世嘗捐軀而徇國特賜章服以示激勸秬可謂至榮矣固宜安静不撓務稱其職仰報國家乃反恃寵儇妄自恣惟喜生事以覬功賞豈不上孤陛下奨遇之意乎自到官將淮上民兵分隸諸將初非朝廷本意人情惶駭秬不自安乃謄書獻劄文過飾非嫁怨帥守務快私忿夫當今多事之際臣子宜協力一心同濟國事而秬反復如此其恃寵而妄作一也秬今日申奏朝廷自言生長兵間諳練戎事願得步騎五千求試方略夫人臣各有分職秬為漕臣職専餉耳豈得輕肆狂率大言無當侵將帥之事乎其恃寵而妄作二也秬在平時務交諸將每謹拜禮或因同姓而叙兄弟之親或因半面而結婚姻之好意欲憑附逞其奸謀而諸將鄙之多不聽從秬不知恥猶自以為得計其恃寵而妄作三也秬之為人喜于妄誕近者無故輙申朝廷欲求禀議以希奏對夫國家大事自有廟謨秬一介小臣豈容與議今逺來入奏豈非遂其妄誕之說以誇示于衆乎其恃寵而妄作四也臣竊惟淮南今為邊境部刺史之任宜得静重有謀之吏而秬小人恃寵妄作邀功生事若使之得志必致誤國遂與宫觀罷之八月戊申劉錡浙西江淮制置使遺史曰軍事將興朝廷無將得一時之譽者惟劉錡而已乃命為浙西江淮制使凡百奏陳無不允從恩寵甚勝錡亦以天下之重自任謂可辦者十日庚戌徐嚞張掄囬闕十一日辛亥王繼先依舊致仕令福建路居住子孫并勒停殿中侍御史杜莘老上言曰臣聞自古方伎之臣雖不可廢而小人罪惡之極則不可容今有微賤小人粗明診視憑恩恃寵肆其姦惡在王法不可容恕臣焉得不論乎論按昭慶軍承宣使致仕王繼先初係賤工負擔喝藥因奴事秦檜入拜其妻叙為兄弟夤縁薦引遂得以薄術供奉陛下及顯仁皇后間餌其藥特賜寵遇而繼先特恩寵二十餘年恣為奸惡臣子上體聖意未敢論列今者伏遇陛下威斷赫然埽除蠧弊在臣豈容緘黙使之漏網請為陛下陳之繼先于都城廣造第宅多侵官司地分如陶卷寨屋豐樂橋官地皆被强占起盖房廊收領賃直又蒲橋之旁有古運河繼先因廣宅基遂填塞其上其宅周迴侵占民居數百家及官街二條見今屋宇臺榭皆髙廣宏麗都人謂之快樂仙宫可謂僣侈矣又占臨安府從官宅二所一所與其弟繼善一作解庫其罪不容誅也一有軍人李彦者最為桀黠繼先用為提轄専探下户婦女有姿色者百端作計必强取之以為侍妾雖有婚姻一切不顧及李彦犯罪臨安府斷罪人吏魏某及董安仲劉永清等為幹辦强買益多如宋念一之女榮孃萬八孃之女勝奴興奴之類方其初買也不支與錢及其年滿也又不放出至如鎮江府姓張姓李二家女童工于歌舞詐作御前索至今尚若諸女之女母怨恨入骨無所告訴其罪不容誅二也繼先又于宅旁創一别館専以收蓄俳人繼先則蓄臨安府名妓劉榮奴其子恱道則蓄金盼盼父子聚麀傷風敗教又令所買妓女時作歌樂及聞淵聖皇帝升遐舉家仍復燕飲乃令妓女舞而不歌舉首頓足為戲名為啞樂其罪不容誅三也繼先又于湖州地名舊館創大第工畢之日自都下載見錢二十萬貫前往排垜謂之鎮宅錢五月間金使之來繼先聞其狂言遂以修墳為名往視舊館創造舟船又買舫子二十隻搬移財物扇動居民又于太湖洞庭山創屋為避冦之地預占山寺以盛頓御前藥材為名差人守把寺僧無以存活其罪不容誅四也繼先居輦轂之下乃陰養無賴惡少共五百人毎日支與錢糧又私置桃花甲苦竹槍牌棒及刀劔等日久教練自聞邊報不常又置教頭兩名毎日于後園閱習其子守道與孫鎔其親戚數輩日夕亦擐甲射弓不知謀為何事其罪不容誅五也繼先因其子恱道累為浙西運司主管遂籠公私之利凡客人有重貨則强買之官物可以射利則中賣之稅物浩瀚則令監官放免之收錢入已遂至官課虧損凡有兩浙路户絶田産繼先則為詭名撲置又常勒臨安府樓店務吏人令供城内户絶舍宅賤價買為房廊又因其子安道及親戚郭恩仁張球等為兵官廣借廂禁軍凡數百人在家役使又招置待闕孤寒小官等充其家防䕶祗應不欲以私錢給之却結諸統總官于臨安府請供給錢内夾帶王承宣一名每月冒請供給三百五十貫臨安府畏其兇焰莫敢誰何其罪不容誅六也湖州有闕鼎者財雄東南以貲得官遷至正使繼先貪其遺賂與之交結鼎當破萬餘緡造一海船船中百物皆備獻于繼先託求閣職繼先受而許之果未幾除閣門宣賛舍人以物議不容為後省繳駮又有珠子行人姓徐者犯罪不輕繼先受其珍珠貨賂遂與其求囑大理寺官因得釋放凡州縣治大奸興大獄有力之人厚將金帛以賂繼先繼先受之關節所至隨即解免其罪不容誅七也繼先于本府及他處寺院多令立生祠妄自尊大又却保庇寺僧與囑託州縣蠲免科役凡天下名山大刹莊田優厚去處繼先少受其賂則使之住持凡常住所有大半入繼先之門近日擅毁南山賜法華院殿基起盖亭臺又于北山招賢寺因山作園新舊墳塜盡令發掘移于他處其罪不容誅八也珠子行人姓任者往年不幸繼先遂使人收其珠舖珠子約共萬餘緡其姊累次懇請繼先不還其姊詛之繼先忿怒後執捉其家使僕吳一送官勘斷誣作與伊姊私通令其姊編管處州繼先又拘收其田産略無顧惜其罪不容誅九也繼先之術本自庸謬偶有天幸遂夤縁妄作常恐人之軋已稍有抜出其上者類皆巧為沮抑使不得進間有㣲見其所長即多方擠陷天下名醫皆畏避退縮不獲自進故凡中禁外庭一時貴近或有疾病繼先用藥謬誤以致危困亦無所指其非者其罪不容誅十也繼先過惡臣舉其尤者餘雖握髪亦未可數今市井之人則怨其强奪婦女啇販之民則怨其侵漁財利鄉村之民則怨其吞併田産至于士大夫則怨其挾持權勢請託無厭合是數者之怨皆恨不得食其肉而寢處其皮其罪惡貫盈王法不容恕臣愚伏望陛下特賜斷將王繼先編管嶺外將本身及其子孫冒受官爵盡行褫奪其第宅財物田産皆民之脂膏及贜汚貨賂所積乞委臨安府及諸州所屬盡行檢括籍沒入官以贍軍需其强買奴婢盡放還被苦之家行下諸處寺院將所立生祠亭臺即日毁拆以去國家之蠧以除斯民之害以快天下之公議幸甚奉聖㫖王繼先可依舊致仕令福建路居住子孫並勒停臨安府内外第宅房廊田園有司盡行拘集强買奴婢日下放令逐便諸寺院所立生祠臺亭一切拆毁遺史曰繼先世為醫其祖以賣黒虎丹得名號黒虎丹王家繼先為人奸黠喜謟佞善褻狎自建炎以醫藥得幸嘗勸上服仙靈脾亦名淫羊藿雖强陽然久服令人精清按方論精清者不成子繼先獨不以為然繼先遭遇紹興中富與貴冠絶人臣諸路大帥承順下風莫敢侔其權勢之盛與秦檜相埒張去為以下尤不足道而通關節肆誅求强奪婦女侵漁財利則檜所未嘗為也秦檜宗族與其妻黨皆貴盛者非檜薦舉之力乃檜請陞遷繼先之宗族及其戚黨官職故繼先及中宫亦請陞遷秦氏王氏之官職也繼先既富貴之極未嘗見一正人端士時設飲饌招教坊樂人酒酣視先為儕輩恣狎而繼先亦無忤大抵主上以國事委之檜以家事委之去為以一身委之繼先所以繼先憑恩恃寵靡所忌憚而中外之士莫敢議者三十年至是金人有敗盟之報朝廷有用兵之意初劉錡都統鎮江之軍屢請决戰用兵朝廷猶俟金人先有釁隙則以兵應之故未許錡申請不已及除浙西江淮制置使亦申請用兵一日汪應辰獻復和䇿堅執和議且言自國家講和至今未嘗有違闕用兵之議恐誤大計醫師王繼先因間見上言邊鄙本無師盖縁新進用主兵官好作弗靖喜于用兵意欲邀功耳若斬一二人則和議可以復固上不懌言是欲我斬劉錡乎是時盱眙奏到金人遣韓汝嘉直入盱眙館口傳勅不許奉使徐嚞張掄渡淮事未有以處之上在劉才人位進膳不舉筯才人怪之遣中人物色聖情因何不懌乃得應上意大抵與繼先之言相似上驚問曰汝安得此言才人不能隱遂具說遣中人物色得繼先之言上大怒杜莘老探知上意乃具白簡乗勢彈擊甚善之舉也惜乎莘老蜀人去國稍逺不知繼先出處而言繼先負擔喝藥因奴事秦檜夤縁薦引又顯仁皇后間餌其藥特賜寵者非也其所言十事盖繼先之細過耳劉才人俄以他事賜第别居十三日癸丑金主亮殺其母于京師金主亮在汴其母病亮徃視之問母所苦母曰吾不病惟力勸不用兵而已且曰吾所病者以皇帝用兵不止逺征江南是吾病也亮大怒曰非朕母也乃梁宋國王之小妻耳遂賜白練而死三朝北盟㑹編卷二百三十
