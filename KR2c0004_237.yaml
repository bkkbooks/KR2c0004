body:
  text: 三朝北盟㑹編卷二百三十七宋徐夢莘撰炎興下帙起紹興三十一年十月二十七日丙寅盡二十九日戊辰二十七日丙寅詔戒飭將士詔曰狂鄰不道薦肆凶殘王師所臨無往不克捷奏纍至俘獲踵旋尚慮狃吾屢勝之威忽彼不虞之戒不愆六步七步尚其如虎如貔凡我將士率茲有衆益務整肅軍伍料理甲兵申令戒嚴蓄威養鋭雖折衝于千里須制敵于萬全天下本為一家豈貪尺寸之地金人亡在旦夕當以殄滅為期咨爾六師咸聽朕意李寶敗金人于陳家島先是有劉㞯彪溫皋趙開李幾四人聚衆于京東與王世隆合共攻成陽軍成陽軍者密州之莒縣陷僞改焉李寶泊于東海縣㞯彪等遣于琦等四人詣寶軍納欵請以兵相助寶遣騎兵同四人往仍借補趙開等四人修武郎于琦四人各借補承信郎寶進船至膠西聞㞯彪等圍成陽軍是時金人屯駐兵皆趨江上成陽軍雖空虛猶堅守㞯彪等說京東百姓曰金人盡趨江上老小獨留而所在兵起皆為大宋之應何不乘此時殺其老小以圖康靖于是京東之民盡殺金人老小惟沂州倉山冷水營有屯駐金人五百騎故成陽軍遣詣倉山告急金人盡發五百騎解圍成陽軍趙開等皆散去世隆者耿京下馬軍也乃率其馬軍駐于日照縣二十里寶軍中提舉一行事務曹洋借民馬同小吏徐堅兩騎往迎之世隆以其衆降洋以世隆見寶令作山後都統制以待官軍進攻數日趙開以其衆至洋與寶議亦授趙山後都統制俄金人自膠西出船皆獨桅用夾油絹為帆約千餘船其勢甚盛兵部尚書右副元帥蘇寶衡統之以大總管六員為副各分部海船完顔亮令十月十八日到海門山入錢塘江幹了大事遣阿古來江上迎報泊于陳家島寶泊于石臼山兩軍相望三十餘里而日起北風寶等憂之有大漢軍水手數百人迎軍降又有大漢軍節次來降大漢軍者簽起上等户也皆富豪子弟寶與洋問之頗得北軍事實捷勝軍統領官馮湛請海船十隻自立功洋察湛有懼怯退走意不從洋請以甲寅進船迎戰髙敞曰不可彼衆我寡宜避之洋曰彼雖衆皆不諳海道且降人云金人在船中惟匍匐而睡不能動雖衆何為况我深入至此前遇大敵雖欲退走其可得乎有死而已敞氣沮而止癸丑洋祭風是夜猶未順四鼓洋命擊鼓令將士皆飽食已夜漏將盡洋命起碇進船風猶未順衆有難色方鼓行良久南風漸應順風進舟將士皆歡噪踴躍洋先以所乘舟直犯敵船以亂大頭船中已有火起者倐忽火大作官軍舟船皆到火箭亂發敵船皆油絹為帆故火騰愈熾金人被焚相與投海而死者不啻數萬人洋賀寶寶曰皆公之力也㸃校舟船而馮湛已背陳而去既而王世隆趙開等皆來遂令趙率其衆旁海而行以世隆在舟中至海州世隆馬軍尚有七八百流在海州缺以世隆趙開至行在浙西總管李寶申十月二十七日將一行官兵海船到密州膠西縣地名唐島逢見金軍海船六百餘隻乘載金人渤海二萬餘人大漢軍一萬人水手四萬人于唐島以來應諸浦口至膠西縣水路二百餘里連續使風入大洋向南定日剋期以取杭州寶親率海船當敵要分布衝擊乘風掩殺自早至二更以來殺至膠西縣巷口殺死金人渤海軍不知其數其船被風勢緊猛飄揚靠岸風浪打損及困入船與敵戰鬭損壞遂行焚燒了當三晝夜二百餘里燒火不絶全獲勝其金軍殘零船數十隻寶亦使風趕趁百里戰殺過膠西縣以來其船被風浪損壞海道上下肅靜别無敵船所有都統制押被亂軍所殺外取得銀牌并銅印及原差海道官職位并録白元降征南指揮行程厯真本在前所有燒不盡軍令先㑹六路䇿應李鐵搶下王世隆趙開劉敵雲孫贇收十連綴應副萬人逐急披帶追襲走透上岸金兵又差將官郭大用兵旗索橫王德和部押諸義兵勦戮盡靜其殺死金兵斫到首級更不收留外有活捉到金人渤海等內副都統制銅印及銀牌除已申具朝廷乞照㑹續又報都提舉事務曹洋獲活捉到金人頭首下項榮祿大夫工部尚書水軍都統制蘇保衡驃騎上將軍益都總管副都統完顔都家神鋒總管輔國上將軍密州節使佛寧神鋒軍副總管昭毅大將軍雄州刺史鄂斡威鎮軍總管昭毅大將軍水益者孟斌威鎮軍副總管御前行宣大將軍髙什宿殿實達爾武發大將軍都水軍使失名姓二十八日丁卯鎮江府通判陸謙之以託疾避事放罷户部侍郎劉岑等劄子勘合近承今年十月三日聖㫖指揮令户部委官前去㸃檢樁管朝廷錢糧如有違戾去處將當職官吏申取朝廷指揮重作施行數內建康樁錢委鎮江府通判右朝奉郎陸謙之照應以降指揮日下躬親前去㸃檢本部排日専牒本官前去仍具發回任月日申部去後今據本官申稱今月十八日起發前去到陽鎮忽為痼疾發動除已再回任將理才候痊可即便前去㸃檢申部候指揮奉聖㫖陸謙之放罷二十九日戊辰張子顔等輸米助軍右承議郎充敷文閣待制提舉江州太平興國宫子顔右通直郎充敷文閣待制提舉佑神觀子正右承事郎充集英殿修撰主管佑神子仁左朝散大夫充祕閣修撰江南西路計度轉運副使兼本路觀農使宗元奏臣等伏覩王師進討竊慮兵食所須費用浩大謹以私家所積糧米一十萬石進獻朝廷伏望聖慈特令所屬各差人船去前逐莊交割今開具停米去處下項湖州烏程縣烏鎮莊一萬二千石思溪莊八千石秀州嘉興縣百步橋莊五千石平江府長洲縣尹山莊六千石東莊二千五百石吳縣橫金莊二千五百石儒教莊五千石常州無錫縣新安莊七千石宜興縣善計莊九千石晉陵縣缺莊二千石武進縣石橋莊一千石宜黃莊七千石鎮江府丹徒縣樂營莊二萬石新豐橋莊六千石太平州蕪湖縣逸恭莊七千石以上計一十萬石有㫖令轉運司拘收太學程宏圖上書臣聞主憂臣辱主辱臣死臣子之至情也臣等䝉被教育之久當今日國家危疑之際正宜捐軀效命詎敢默默而無所獻臣聞之近日金使之來桀驁不遜宣言傳金長之命姑以還天眷略歲幣為辭乃欲增割淮漢地界邀取將相大臣道路傳聞中外憤怨且淮漢國之要害也求淮漢則是欲毁吾之藩籬將相國之倚重也邀將相則是欲奪吾之心腹使我藩籬既失腹心既去天眷雖還歲幣雖略其能國乎是决不可從之請也夫金人謀我固非一日今重兵壓境而使人乃有此請知我之難應而冀其必不從也不從而釁生釁生而兵舉變在朝夕灼然無可疑者是猶賊在户外而索物于主人不得其物必無空返之理物既决不可與則主人必有以應之可也今日之事國家之所以應之者其先經務有四焉一曰留使者以欵金人之謀一曰下詔書以感南北之士一曰先舉事以决進取之䇿一曰用人望以激忠義之心夫所謂留使者以欵金人之謀蓋金人南侵之計為甚久而攻取之具為甚備近日决意離舊土冒長塗親董重兵壓我境土乃遣使要以難從之請非真請也啓釁之端俟使者一報耳且聞所遣二使皆彼國之肺腑平日所親信者未必非其主謀之人前日殿上之對軍士恨其不關其口而奪之氣臣等願朝廷姑善留之為之辭曰前日所請皆汝等口語初非國書所在吾將遣使以實汝言非獨使其未知所請之可否吾且得以措置為前進之䇿亦可以挫彼之鋭而示吾之未弱也此而不留恐我之所以為備者彼皆得以知之其餘一泄則金使今日回彼界金兵明日入我境必矣夫所謂下詔書以感南北之士者蓋舉天下之大事必先有以作天下之氣國自和議既行之後為故相秦檜所誣沮天下忠臣義士之氣三十餘年矣一旦思得其戮力必有以感動其心而奮起之可也故哀痛之詔不可不亟下聖詔一下南北之民當感激流涕爭為之念事豈有難舉者哉然詔不可徒下也首當正秦檜之罪復無辜之寃以舒天下不平之心而振其敢為之氣且秦檜所以失吾南民之心者自趙鼎以不任和議而竄逐海外身滅而家亡則學士大夫忠憤之氣沮矣自嶽飛决意用兵而誣大逆身戮而族誅則三軍將士忠憤之氣沮矣至于長舌告訐之風起羅織之獄一言及時事者不問其是非必致死所使天下不知有陛下而欲人呼已為聖臣則天下匹夫匹婦忠憤之氣由此而掃地矣秦檜之所以失吾中原之心者士大夫一時陷于敵中而家屬在吾國者兩國已和檜既不能官其後嗣庇其宗族以結其心而徒使之怨艾以報我乃復徇金人之請而悉還之彼又何戀哉且其遣時如赴死所悲號之聲徹于道路甚者宇文虛中有克敵之謀計䇿已就乃以諭檜檜意以其功在已上既匿上聞私遣首者告之金主遂致宇文族誅使願忠懷義南嚮吞聲而憤其絶望于我也今者要令有司正秦檜之罪追奪官爵而籍其家財追贈宇文之爵而為之立祠雪趙鼎嶽飛之寃而後詔書朝下而暮赴必矣又當重為檄文聲言哀切令中書刋板詔告四方擇有深謀密計效死之士授以檄文副之空名告牒令潜入中原開諭招誘思我朝之人約以徒黨仗義而起期以日月為吾之應擇端慤服衆守義之士授以檄文付以空名告牒令游江浙淮漢招集土豪鄉兵與販私竊盜之徒俾為盡其忠義用命而起期以日月為吾之援陛下然後下親征之詔移蹕建康命將帥勉厲軍士應敵所臨人盡死戰是其氣固足以吞讐仇矣蓋內有吾南民義兵之援外有吾中原反間之應使敵人進不敢前退不敢後則祖宗境土可傳檄而定也夫所謂先舉事以决進取之計者臣等非不審事機妄勸陛下輕易動兵以開未必然之釁也使敗盟生釁之端未露舉國長驅之勢未逼則吾之動也固未可輕今其重兵已臨汝潁而其先驅已羅邊境此其意欲何為者使吾不先發則屯汝洛者直窺襄陽羅邊境者突至淮泗襄陽失利則可以控蜀且有順流東下之勢兩淮失守則脣亡齒寒江非所恃環海不可以不早計者海之南北延袤萬里攻備之所不知其幾使敵至而我備之備多而力分使我先之則彼不能無東顧之憂而江淮之勢可以少緩朝廷今日若尚猶豫欲前而不敢前臣恐要衝之地為敵人所有而我失其勢矣我失其勢則用命之人將無所措惟能先敵而動則天下之人謂國有謀焉故雖驅而赴之萬死之地人知有恃而無恐矣又况四方奸雄之徒凡師旅之際未嘗無鼠竊狗盜之心吾有示弱而不决則彼將伺隙而動大而竊據小而嘯聚有必致之患倘從臣䇿為先發之謀示恢復之意則非徒可以坐消此患而為此流者又將起而為之助所謂以冦禦冦一舉兩得之也夫所謂用人望以激忠義之臣者雖不可遍舉如張浚張燾胡銓辛次膺皆其人也且浚尤天下所屬望者而朝廷尚未用之臣知之矣是非以輕躁之故而懲之邪五路之失驍將之失此固浚少年輕躁之過然久在行陳熟知險阻敵人之情素所諳曉而又罪廢二十餘年想其少年之心必能深思而痛懲之矣崤函之敗不可懲而孟明再用卒霸秦國夫豈可以一失而遽棄之哉側聞浚于秦檜初死之時亦嘗上書言兵事矣陛下試召而問之何以膺敵何以制勝何以為善後之䇿缺不用之哉或者疑之謂其罪廢之久必有忿怨不平之恨此尤不然臣嘗以天下之理考浚之心焉且天下之望不徒歸也是必有愛君憂國之心而天下亦必以是心而望之况一浚未足道也而天下之忠義實視之以為進退陛下試思之浚一用而忠義激浚一廢而忠義頽其利害孰輕孰重願陛下不以浚而用浚以天下忠義而用浚可也至于胡銓以直言得罪于秦檜不死于秦手亦天意有所待也陛下若能付以臺諫之任是必知無不言雖當多事之時可無奸雄之慮使其一日立朝則說陛下為茍安之計操兩可之論者與詆忠直而慢事功者皆屏息而不敢為矣如張燾辛次膺則陛下固嘗親而任之矣處之廟堂之上皆可以固國本而延攬天下之英才此而委之可勝惜哉嗚呼今日之事勢已急矣然臣等又恐朝廷之上猶以强弱不同之為憂財用不足之為慮以臣觀之為是說者是皆無謀以沮謀者也蓋兵之弱不足憂曲直所在勝負係焉國家自講和之後聘問所往不為不謹玉帛所遺不為不厚今日金使請命方欲刈吾藩籬之地取吾腹心之臣不知吾何負彼而敢有是哉中外聞者扼腕思奮今日之事直在我矣師直而壯士氣百倍大兵渡淮南北響應彼將索然自失雖有百萬之師無所用矣臣等因知强弱之勢不足憂也國家自休兵以來故相秦檜務飾太平以貪已功凡百司庶府莫不畢備當此艱虞豈無所可減罷者且以學校事言之養士之額員以千數公私一試費以萬計官吏廩祿歲又不知其幾茍從一時之宜權省罷之未為廢事然此特臣等所知者矣其他冗費豈無百倍于斯願俾有司枚舉條具凡非係軍民之急者不以小大一切罷去則民不加斂調發有餘臣等因知財用之乏不足慮也親征之舉陛下何憚而不為然臣等因知陛下必為矣前日和好之議陛下豈得已哉徒以梓宫未還太后未返又恐金人未能釋憾致吾淵聖帝不安故勉為此舉想陛下二十年間念七朝之陵寢思兩河之人民朝夕于懷不能暫置陛下豈不欲奮神武之威以雪父兄之恥第有所重未敢輕發今者陛下于父母兄弟之間生無所纍死有餘怨以前日愛親之心發為復仇之舉則何攻而不取何戰而不勝哉漢髙帝以義帝之故三軍縞素猶足以起義氣而取天下况我國家雪先帝積年之憤其視髙帝尢為易也今觀金使劫我歲幣邀我兩淮其辭氣狠戾與向者殊此必有所恃而然也臣恐憑陵之患直旦暮耳此而不决則歘然驟至雖欲禦之已噬臍矣臣等願陛下行之以果守之以堅拘留金使亟下哀痛之詔促發渡淮河之兵速召人望以慰天下之心中外響應士氣激昂中興之功指日可冀然竊有私過計者不得不為陛下言之大抵金人之情變詐百出吾與之和彼則以我為弱取我無厭直欲坐困我國一舉而有之我欲與戰彼則知我有謀彼則緩而不進以挫我鋭逮其師老財竭又將變矣金人之情或和或變或緩或速要其所欲豈直歲幣而已哉靖康之禍使者交馳而已扣城矣覆車之轍可不為鑑臣等激于事勢之逼誠恐朝廷或墮其計異時倉卒雖悔何追故不避斧鉞之誅仰干天聽願陛下以臣之䇿謀及二三大臣茍以為可决行之誠天下蒼生之幸三朝北盟㑹編卷二百三十七
