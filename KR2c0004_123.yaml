body:
  text: 三朝北盟㑹編卷一百二十三宋徐夢莘撰炎興下帙起建炎三年二月十九日戊辰盡三月二日庚辰十九日戊辰以駐蹕杭州大赦天下汪伯彥再乞竄黜臣緣御史中丞張澄狀申尚書省稱上章彈奏臣致主上䝉塵宗社危逼乞賜竄黜臣昨日與黃潜善各具劄子奏不敢供職乞置典憲䝉聖慈不允差中使宣押臣赴都堂批㫖臣遵稟聖慈感劇顔厚退惟罪戾實不可逃伏念臣知昧知幾才踈應變初以中原繫望之重本出愛君終然萬乘倉猝而行乃成誤國故嘗自劾懇正邦刑乃䝉明綍之攽未即俞音之賜載惟未濟如在中流思羈絏之奉而安忍去陛下於艱難之時念宵旰之勞而不敢以私已為便安之計固欲奉詔以體國不容忍恥而在公豈惟彌於人言抑亦已深於鬼責退省無狀曷尚妨賢兾選賢才以圖底定之功蚤竄愚臣以為失職之戒庶幾允協物論畏服公朝臣更不敢供職恭俟威命二十日己巳金人焚揚州金人駐軍於揚州城下丙寅遣擐甲執旗者一人入城呼曰仰百姓限三日出西城過三日不出皆殺并數揚州人之罪謂不合不留上也是日無出城者丁卯金人遣擐甲者四五十人大呼如昨日人皆疑之亦未有出城者戊辰又入城呼且曰今日限足如不出城者盡殺是日西北人往往自西門出出則入一木栅皆留在栅中至晚西北人出城約入數千人唯揚州土人皆不出是夜縱火徹旦出城人盡死己巳金人入城見教場中存留得三二千人皆滿體烟焰亦趕入木栅中又一日凌晨開木栅三路放人出而金人亦退軍張澄除尚書右丞黃潛善汪伯彥罷潛善觀文殿大學士知江寧府伯彥觀文殿大學士知洪州汪伯彥制曰惟辟作威廢置得馭臣之柄事君盡禮進退為萬世之規屬豫艱難嗣服之初敢替黜陟大公之典肆頒詔綍用亶廷紳正議大夫守尚書右僕射兼中書侍御營副使新安郡開國公食邑三千二百户食實封一千一百户汪伯彥被遇兩朝屢更鎮使方國步阽危之日正敵兵侵擾之初悼二聖之北轅豈天地鬼神之意唱大軍而左袒見謳歌獄訟之歸肆酬翊戴之勳進總樞機之密延登宰路參秉鈞衡方深訪落之謀允賴扶顛之助明謀弗效變故非常宗廟神靈暴露野次衣冠名族顛踣道途帑藏一空盜賊四起封章交至惟汝之攻公議靡容非朕敢貸深念潛藩之舊猶懷佐命之勳俾解正機尚圗來效進直殿廬之祕出分屏藩之雄一丸疏榮十連增重既降體貌用示保全於戲入則論道經邦具士民之瞻於天下出則承流宣化通輔相之籍於殿中兹豫始終之恩故無內外之間勿替朕命益懋爾庸二十二日辛未金人攻髙郵軍知軍趙士峻棄城走判官齊志行叛附于金人金人自揚州回軍至髙郵知軍趙士峻棄城遁走判官齊志行率軍縣官出城投拜金人劫掠而去初士峻知髙郵軍任滿朝廷以蘇遲為代士峻不奉命朝廷怒特降兩宫士峻乃自陳四任堂除粗有勤勞又發運使李祐劄子保奏遂令士峻再任是軍棄城走宋世雄以潰兵入泰州知州曾班棄城走初金人至泰州知州曾班投拜金人退去揚州潰兵有宋進者初為韓世忠養馬至是更名世雄聚兵二百餘人攻泰州世雄與其黨十一人入城班不曽招接乃命監酒宋世安待之世安官門子弟喜宴狎至是酒酣擊盞而謳而世雄等謂擊盞為號恐别有不測乃覆杯盤打擡椅取其腳人執二枝奪門而去㑹其衆二百餘人奔馳入門直據州治班與郡官皆奔亂兵乃肆虜掠得金銀者量出以犒軍擲於州治凡兩堆與階基齊世雄推錢糧官裴淵為首謂之收復泰州兩日淵令不得劫奪財物虜掠婦女由是稍止後班自劾待罪其兄楙與弟開乞納在身官贖班之罪班遂遷謫曲端鄜延經略使曲端自襄樂還涇原王庶駐於鄜延是時延安新殘破未可居㑹朝延遣使賜庶節制使印令置司長安除曲端鄜延經略使庶詣置司處端不欲離涇原即差郭浩權鄜延經略使二十四日癸酉靳賽犯通州李在率衆據髙郵軍李在初從韓世忠軍𨽻嚴永吉為提轄自京東潰散在寶應間重約散卒得百餘人金人退髙郵而去在乃詐稱五臺山信王下忠義軍率衆至髙郵有監比較務秉義郎唐思問先往迎之在既入城遂以時正臣為知軍以思問為同知軍盡刷投拜官齊志行以下皆殺之乃遣人邀截金人後軍得金寶船數隻故其軍極富時狀元李釡及董耘在髙郵寄居在皆以為參議又聚集潰散兵卒有衆數千遂據髙郵詔贈陳東歐陽徹官録其有服親迪功郎一人所居州縣存恤其家二十七日丙子詔濮州監酒馬伸赴行在初馬伸為殿中侍御史言黃潜善汪伯彥誤國貶濮州監酒至是上思其忠直乃詔之而伸已死於道矣二十八日丁丑詔求直言上既黜黃潜善汪伯彥召馬伸思得直言之士乃降詔求直言其略曰自今政事闕違民俗利病或有關於國體或有益於邉防並許中外士民直言陳奏言之或失朕不汝尤於是馬政在罪責中方倉皇自泰州渡江赴行在乃應詔上書王燮自西川至行在除御營前軍統制王燮建炎初為河東路經制使俄除知鳯翔府金人至陜西燮以輕兵入川至赴行在除御營前軍統制燮表請幸蜀宫議犯密州安丘縣宫議率衆離即墨入密州境欲圖密州故先圍安丘縣築外插以守之詔幸江寧府詔曰國家厯運中微干戈未徹因時巡省蓋順權宜以江寧府王氣盤縈地形繡錯據大江之險兹為用武之邦當六路之衝實有豐財之便將移前蹕暫駐大邦外以控制於多方內以經營於中國尚慮有司過於奉承百姓驚呼疲於道路儻齊民之或擾豈非德之敢安將來巡幸沿路州郡及兩浙江東監司江寧府不得分毫搔擾以安人心故兹詔示想宜知悉輔逵聚衆於漣水軍輔逵慶源府將兵也慶源府陷逵與韓京將兵百餘奪門得出渡黃河才有數人逵投韓世忠軍為指揮世忠退軍於沐陽衆皆潰散張遇死於漣水軍之張渠村其衆多出沒於漣水境內逵聚卒得數百人擾於淮河之南北時至於楚州城下漸有數千當時淮南號為悍賊張用據西京張用寇在陳州與王善分軍將趨蔡州至確山縣而止令諸軍不得犯蔡州城下違者斬於是用駐於京西連亘數州上自京西下徹光夀據千里之地兵馬接迹不斷以其衆多故號為張莾蕩虜掠糧食所至一空三月一日己卯朔王淵簽書樞密院二日庚辰朱勝非尚書右僕射中書門下平章事上至杭州召朱勝非赴行在勝非上章力辭且請渡江之罪俄中使三輩持劄親至平江趣行勝非悉以軍事付張浚使主之乃來朝以三月一日入見初勝非為侍中嘗論睢陽特以開基本地故列聖建别都而要非用武之國脫有緩急大駕一動則河之南淮之北皆盜區矣今敵騎充斥兩河雲擾雍洛不可卒至惟襄陽西接蜀漢南引江淮可以號令四方乞鑾輿幸之控制南北以圖中原上欣然納用而大臣或沮之其言不果行及為學士復論揚州非駐蹕地既為中書侍郎力論之上深信焉令户部約當嵗計郊祀之費餘財皆運之金陵祀事後當移蹕時宰相黃潜善力沮之後果倉卒為揚州之役翠華南渡至是上見勝非首及此曰悔不用卿之言次日拜宣奉大夫守尚書右僕射同中書門下平章事兼中書侍郎御營使馬政應詔上書書曰臣伏讀二月二十七日詔書曰自今政事闕違民俗利病或有關於國體或有益於邉防並許中外士民直言陳奏言之或失朕不汝尤臣以是知陛下責躬憂國真堯舜湯武之用心也是以四方之士願竭𠂻誠採急務為陛下獻臣一介武臣不達政事臣之所業蓋本於兵臣嘗觀古人論兵謂譬如對奕兩敵約焉一著失誤終莫能救是以古今勝敗率由一失一誤而况多失而多誤者乎臣觀金人强壯連年深入劫遷二聖幾危宗社斯非金兵精强故無敵於天下也特我國家急難之際用非其人凡於所為失誤者多臣試托而言之其誤有四其失有六其始人用非才不能乘機拓境全示懦弱取侮外鄰其誤一也敵既退師略不修備而禁止敢言金人再來其誤二也陛下應天順人乘時御極不能導陛下西據蜀險就六路形勝以爭天下反使翠華淹處淮甸重為賊困其誤三也不能乘人心憤賊之時激使忠義力治兵戰以謀恢復甘蹈覆轍泥於請和使勢力日益窮蹙其誤四也四誤之外復有六失初欲復燕既自招金人之侮彼既長驅深入是時張孝純帥太原童貫當移司真定兩鎮助勢以遏燕山鴈門深入之師貫乃感幕下鯫生偷安之計擁衆奔還遂使金人長驅渡河其失一也金人既至京闕時已初春彼若修攻具填壕塹無慮一月彼能堅圍不過兩旬在我則宜嚴備守禦専任將帥善守鴈門遣使人啖以厚利畫以白溝彼勢不可留必欣然聽命是時河北諸軍方斂兵自守陜西等路勤王之師相繼而至萬一敵不從議則密檄河北諸鎮潜喻勤王之師待其意懈前邀後擊可立大功奈何淺識之意割鎮以求和遣貴近以為質自是之後敵益悉我底藴安其姦謀其失二也割三鎮既為失矣且宜堅守信誓示以無能以懈其心亟增備禦以圖後舉倘三鎮不屈即當遣使通議聲言以嵗幣贖之因成斂兵之計奈何輕易之論遽隳信誓驟欲攖戰其實無能使敵騎復來了不能支為我大戚其失三也金人既立張楚自界大河而守我當以黃河目為新邉亟修堡寨倚河為固修葺戰具帥守令佐悉任武臣使守土治民合為一事進攻退守得以自専人無掣肘之患則其才得以自盡多方措置敵騎豈能輕渡奈何不達事機泥於循常一切不為防間儒冠侈𬒮髙談闊視略不介懷於是上疑下懼衆力不齊敵騎復來如拉枯朽其失四也皇弟信王脫於囚虜集兵山谷結約河外忠義所得壯勇不啻數十萬顒候王師渡河相為䇿應時方金人又欲盡殺南民人人畏懼日思南歸又燕地漢兒苦其凌虐心生離二或逃叛上山或南渡投降自河以北𫝊布蠟檄皆約內應故王彥王仔翟進馬溫靳賽劉展樊清王江鄭立耿進耿洪等義兵楊進馬臯張用王善等羣黨俱奮渡河討敵之志是時若王師得齊則諸路山寨接勢興舉見簽軍漢兒變於內契丹夏國圖於後兩河州縣一旦可復金人勢自瓦解奈何羣言譛沮禁止渡河使金人反乘機便驅新剃簽軍南渡深侵脅降郡縣土地人民器甲財糧凡我有者悉成彼用専利為害其失五也賊既連陷大明東平二帥府勢必遣騎潛襲行在我當分遣鋭師列屯淮口於西營於近郊預為捍禦不唯乘敵逺來可以掩擊兼彼探知有備則莫敢易進奈何輕議寡謀者料彼不來略不為備遂使金人大肆慿陵幾近清蹕陷生靈於倉卒之際潰軍旅於窮亂之間其失六也此六者大槩當防而不防當擊而不擊勇怯逆施進退倒置皆大失機㑹者也臣之所陳四誤六失雖云已往不可追悔蓋不可不為後日之黽鑑臣於二月初三日據聞御舟已渡大江人馬總至江口擁併時臣已罷丘職初八日自泰州渡江則審鑾輿已過平江臣竊料金人逺來馬疲人之即知陛下已渡難以追及方且自爭子女玉帛飽其負載兼淮西仍多民兵彼顧前無利計後有害是以暫止不進又有江北不及渡者西兵於諸軍潰卒往奪路人與范瓊睥睨鎮江金陵守舟船繼而天雨連降平地水發道途泥淤馬步俱不能進以是敵心頓沮不思渡江以迫大駕遂使江南民土得以安靜此皆上天眷祐有宋許陛下得以圖回陛下大悟前失赫然震怒憤敵讐之暴恣躬嘗膽之焦勞斥逐輔宰痛下詔音革心易慮欲與天下英傑亟圖中興之事此臣所以踴躍鼓舞知陛下戡除仇敵肅清寰海將有日矣然臣更願陛下守之不易行之不倦來四方才能激天下之忠義見幾而作不俟終日先敵未來早為之計處車駕於險固可保之所萃軍馬於壯勇可用之人即經營耕戰數年之間殄掃讐仇再隆王室復已陷之境土邀播遷之父兄中興之功决見成就臣今輒以機速利害畫為三䇿仰副陛下所求臣願建都蜀中據上流以撫淮甸破金人之計回天下之心是為上䇿都守武昌襟帶荆湖控引川廣招集義兵屯布上流扼據形勢密約河南諸路豪傑許以得地世守用為屏翰是為中䇿駐蹕金陵備禦江口通達漕運亟制戰艦精習水軍厚激戰士以幸一勝觀敵事勢預備遷徙是為下䇿若貪顧江湖陂澤之險納探報之虛言緩經營之實績倚長江為可恃幸金人之不來猶豫遷延倐至秋冬使金人再舉驅虜舟楫淮江千里數道併進方當此時然後又悔是為無䇿臣聞天時不如地利地利不如人和此天數為下地形為中人事為上也明矣自古興王建業未有不得天時據地形藉人力而能成立者也秦開關延六國之師逡巡而去不敢進攻終為所併此豈特天時然哉地形之利有以致之也漢髙祖處蜀漢用三傑卒能定三秦滅强楚是豈地勢然哉得人力以為之助也今陛下車駕播越在此若不欲復讐爭天下則建都武昌力辦戰守僅保一隅可矣若必欲見中興恢復之功則非處巴蜀恃三峽之天險用六路之壯士則不可也說者謂兩浙陂湖水澤之地所宜者舟楫金人以鞍馬馳射為事江南地利非其所長况彼盡獵江淮饜飫財寶豈復甘心南渡自取其敗臣應之曰金人猝然乘機而興吞滅諸國意在力危宋祚期無後患而後已財寶土地非其所貪若謂江湖之險北馬必不能侵則往昔開拓之兵何以能抵江則又何憚而不能向蜀哉臣應之曰鑾輿所在不以遐邇賊固力圖然而江浙所恃者陂湖豈足以比蜀道之天險且駐蹕江浙惟苟且暫安嵗月吳越之風懦而驕日復一日士習相沿安得復振儻據蜀道所鄰者秦謂之百二之地士勇馬健人樂戰鬪加以撫練士氣百倍豈與江浙之俗同日語哉况處川隴據上流則江左自可保守安危强弱利害不啻萬萬也說者又謂吳以周瑜水軍三萬潰曹公數十萬中原之兵謝𤣥以步卒八千破符堅西來百萬之衆烏在其為江南不可守也臣復應之曰彼一時也其名則同而事則異殆不可以為常且孫權以三世練簡之衆輔以劉備以諸葛亮合應之謀曹操內有馬超韓遂關中之憂疲于逺馳遽捨鞍馬以幸其勝此周瑜所以能成僞降之功晋帝任謝安之賢修德備武固非一日苻堅不用王猛之言不知天時人事竭國而來略無善術前輕後懈謝元得以成淝水之捷古人常言之非謝元之善乃苻堅之不善若必欲以吳晋之事方之於今日真守株而待斃兔也况今河北河東為彼奄有京西陕華為彼廢殘京畿漢上為彼擾攘山東淮甸為彼破蕩彼方徘徊江隅求操舟之人講舟楫之利彼勢我力比之去嵗十倍不同若止欲處大駕於金陵一旦用潰兵疲卒與市井南民禦大敵于長江之上嬰兒搏虎不足以喻其危矣臣誠恐金人今雖暫去乘秋復來分兵斷絶荆襄之路則秦隴之間朝廷命令不通當此之時何所舉措臣所以願陛下速謀幸蜀據其形勝用其壯勇則恢復可圖或者患蜀道之艱難懼百司之勞動六宮諸衛所過州縣驛騷百僚將士亦必有不願逺適者臣以謂盤庚遷亳民胥浮言作誥安衆終享永逸况陛下鍳前日之失慨然欲據地利而圖克復皇天助順百靈效職人誰不願從哉况將士之中西人居半使之入蜀孰不欣然至于宫衛小勞驛饋小用不有暫費安得永寧昔者滕公負魯元南奔光武食麥飯而美急難之時非其憚也或者謂臣熙河人所以勸陛下入蜀便臣鄉里臣實無此臣之母妻兒女悉陷河北今之鄉里更無一人何所顧戀臣所以切切啓陳惓惓不倦者誠兾聖心之一悟斷以不疑明告中外即日西幸則中原之地可復中興之功上與周宣光武等永為萬世之美談倘空泥庸言甘一隅之安忘萬世之利日往月來自就困蹙臣竊為陛下危之仰願陛下藉祖宗纍世積德之基乘億兆憤敵報君之志奮發果斷而蚤圖之天下幸甚三朝北盟㑹編卷一百二十三
