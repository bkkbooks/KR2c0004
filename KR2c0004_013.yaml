body:
  text: 三朝北盟㑹編卷十三宋徐夢莘撰政宣上帙起宣和五年正月一日乙卯盡二十七日辛亥宣和五年正月一日乙卯朔金人李靖王都哷等來議燕地稅賦初四日戊午李靖等入見于崇政殿李靖上殿奉書傳達如儀上遣黃珦傳㫖云兩朝共議力討伐契丹今已得燕實為慶事自泛海計議纍年大事已定自合結絶今來一事未了生一事暴師日久各不穩便早見了結當共享太平豈不美事所有稅賦等事詣宰臣王黼賜第計議靖等詣黼賜第黼諭靖等云兩朝計議纍年大事已定今却忽于元約之外頓生稅賦一事何故如此靖等對以只為本朝自用兵馬取得燕京獻與宋朝所以要稅賦黼諭以今來原約之外頓然更要稅賦本朝官員上下以至朝廷議論都不肯黼亦以此為難惟是上意要成交好特地允從黼性明白自來不隱事人所共知自家心裏事亦須說與使人且如初議取燕地本要復漢地救漢民今來貴國却於元約之外生此賦稅一事且如自來與契丹五十萬銀絹已是㬠多今若更要稅賦須是又添物事如何交得出委是難以依隨若便斷絶即是許多年嵗往來計議交好不成兩國如此各不穩便今來選置官吏屯駐兵馬與貴國出地稅有何所利實是止欲成就交好且如地稅自燕中計腳乘到貴國如何搬運得莫須别以銀絹代稅賦靖云如此則甚好却是省力不知待著多少銀絹代稅賦黼對以燕地稅賦自來素有定數已得聖㫖令趙龍圖等前去議定茆齊自叙曰朝廷差趙良嗣周仲武充國信使副仍送伴李靖等入燕僕問良嗣所以奉使事良嗣不答遂行經十餘日良嗣武仲同李靖王永福察勒瑪回自燕中赴闕不言所議童貫呼僕謂曰良嗣昨有申到語録與你所說不同兼你係摘留使人自合赴闕本司已作奏狀可取東路馳去僕遂行至闕下奉聖㫖令中使押馬擴赴王黼宅議事黼云在奉聖州摘留所論事理力爭死爭此一節朝廷甚多公僕曰不意延慶遁走女真先入關不得而爭也黼起立云據今事宜有何所見僕投黼一劄子云燕地乃中國北户自祖宗以來有志恢復比者海上交結女真已許割還但緣劉延慶遁走失入燕之機㑹今女真先入據之輕我兵弱已肆侮慢當此形勢於復地未為急而防後患乃急務也愚請於復地之間條畫徐制女真三策以杜後日之患若女真果以山前山後故地故民盡還本朝將用我故民守我故地關山險阻易為捍禦雖倍益嵗賜則所入足償所出得以復境土而絶後患是為上策倘女真必欲割留平營灤三州不全歸燕地則宜各守所得彼得燕山便守燕山我得涿易即守涿易比類髙麗夏國少與嵗賜彼必欣然聽命若慮日後侵凌則於廣信以北橫斜多築城壘嚴屯軍馬仍開掘涿易兩河為塘濼連接沮洳直抵雄霸彼來則禦之退則備之是為中策若且聽金人奉聖州之約止割燕京六州二十四縣全與契丹舊幣姑茍目前之利徐為善後之計是為下策舍此三者若汲汲於求地而不計勞費增嵗幣益禮數與板築姑防一隅用新附之衆徼幸戰勝徒深交往事或隳成一旦使女真得志殆將取侮於四方是為無策今女真雖乘勝氣鋭但兵少而力分加之天祚未滅張覺抗衡國內空虛新民未附我若嚴備邊防屯集大軍示以威信遣一介辨士議之彼方內顧不暇未必不成上策惟朝廷議而行之不可緩也黼讀至姑茍目前之利徐為善後之計是為下策黼嘆曰可謂茍目前之利可謂茍目前之利也公之下策乃朝廷之上策於公下策中更待添些物色僕曰更添物色便是無策黼云允如公說若彼席卷南來奈何僕曰彼方內顧未暇南來內憂既絶然後逞志某今所論蓋欲弭異時之患乞公相深思之黼云虎狼之暴豈復內顧兼朝廷大議已定今又差公作計議使但著剛著柔交割取燕山便是功也餘不須論初五日己未李靖等入辭于崇政殿靖跪殿下上令黃珦傳㫖諭靖等到軍前日傳語大金皇帝謝逺遣使人到闕兩朝信好纍年已著切不可聽契丹言語此輩亡國之臣沒安身處只欲鬭亂兩國但與鑒破必不聽彼言且如稅賦本實難從只緣成就交好特議依應然亦須酌中商量方可了得所有營平灤三州地里不多只是要抵敵四軍且是一道了絶甚好本朝與貴國交好纍年且如朋友覔一物也須與卿等到日但子細奏知靖等云領聖㫖靖等又奏禀去年嵗幣上又令珦傳㫖今年來要去年嵗幣極無名待將金帛為賀功犒軍之禮靖又再三奏上不許又再奏告上遣珦再諭靖等與去年嵗幣靖等歡欣不覺踴躍靖為期日已迫乞免供奉庫賜宴及朝辭并門外御筵上許之龍圖閣直學士大中大夫趙良嗣朝散郎充顯謨閣待制周武仲充國信使馬擴充計議使賫書再往軍前許以銀絹代燕地稅賦令定議數目朝廷國書曰正月日大宋皇帝致書于大金皇帝闕下比聞親提師卒逺涉關封靡煩振旅之勤共底夾攻之績夙惟信義方劇欣愈亟承使節之還舊沐書辭之悉念欲諧於歡好當曲示於忱誠本朝與貴朝數年計議漢地漢民及夾攻等事具載纍書兹不費辭昨趙良嗣等還自代北知欲入關討伐即自涿易等處分遣軍馬夾攻三面掩殺契丹數陳大獲勝捷追逐逺過燕京東北實與貴朝攻取居庸之兵相應靡有差失暨國妃與四軍以下奔竄城中無不順之人似聞貴朝兵馬相近於義不當爭入燕城即令逺駐兵馬本堅守信約之應夾攻者事皆有迹可考不待理辨今承來書燕地州縣稅賦欲行拘收不特事非元約及非近所計議自古及今稅賦隨地况逺隔關塞民户如何搬運於理本難允應重念萬里交歡踰海遣使積年于此信聘往還情意已篤意當勉從所諭已成交好今特許每嵗别交銀絹以代燕地稅賦令良嗣等前去定議并契丹舊交銀絹並合自今來計議畢日為始所有彼此遣使特賀禮正旦等事候計議畢議定發遣月日受理去處其銀絹交割處所分立界至等事續議畫定候屬春和茂膺天福今差龍圖閣直學士大中大夫趙良嗣朝散郎充顯謨閣待制周武仲充國信使副及差馬擴充計議使有少禮物具諸别幅專奉書陳賀兼謝不宣二十五日己卯趙良嗣至金人軍前議銀絹代稅定數金人并言課程除嵗幣外要增添一百萬貫並以貨物充折令回宣撫司申聞候報燕雲奉使録曰是日良嗣至軍前於城西南一廢寺中安泊見金主令譯者傳言收下燕京遣使賀功甚好不知大宋皇帝實歡喜否對以兩朝共力討伐契丹今已得燕實為慶事本朝皇帝聖心喜悅所以遣良嗣武仲充賀功使副阿固達及其下諸將帥大喜繼令譯者問别有無奏陳言語開陳稅賦一事即非元約又非近所計議本難相從朝廷大臣議論皆以謂不可惟主上聖斷欲成就交好特許别交銀絹以代稅賦專遣某等來計議然稅賦所出須要贍養軍民須以分數酌中參定方可了絶烏舍云此不難據燕地所出稅賦并課程計數兑換自然不錯某等對以國書內止言稅賦今日却并課程言之豈有此理却云所謂稅者商稅鹽稅諸般皆是也對以稅賦課程自是兩事其理甚明兼前番臨時曽言夏稅秋賦如率雜油豆之類如何搬運設若本朝委曲從之莫須折當元帥與郎君皆言甚好此本為稅賦元不曽說及課程却生此一節况自來與契丹五十萬銀絹皇帝聖意甚厚欲成交好盡數許了已是㬠多今來又將銀絹折當賦稅一定之後不論凶荒水旱每年依例送來如是酌中方可成合烏舍出文字二件一件言稅賦二百年舊額每嵗出緡錢四十萬後來新額四百餘萬一件通稅程約六百萬貫却待以多少銀絹代之良嗣答以燕地褊狹豈有元約額只四十萬貫後來便頓增許多承平時斗粟不過百錢今兵火荒歉雕殘之餘斗粟一金自應十倍豈可以此為定烏舍云貴朝國書內既言别交銀絹以代稅賦必有定數請分明說破良嗣出御筆十萬之數言之烏舍言十分未有一分燕地稅賦共收六百萬貫且如舊與契丹銀絹五十萬貫尚有五百萬貫奉聖㫖於內留四百萬貫養贍軍民只收一百萬貫良嗣又以第二項御筆二十萬之數許之烏舍云二十萬之數尚不及前項之半更要西京如何了得再三辨論久之遂除下西京堅執如故不免以第三項御筆二萬綾數許之烏舍又言燕地本出六百萬今只要一百萬已是恩義猶不相知却待折些銀絹更做盡艱難作兩三番添展如便更添得來折當些小物必做難易不若都休更無商量請使副回去只依契丹舊與貴朝舊日兩地供輸人户勾退涿易見存兵馬若不退便將兵巡邊良嗣曰兩國繼好纍年本朝自以兵下涿易今乃云爾豈無曲直烏舍曰不是本朝要斷絶自是貴朝惜物若相就作百萬便見了當遂出國書草本細計物帛錢數本待斷絶恐兩家不好據今來地盡在國書中若一一從得便好如不從更休來商量又出折當物帛數字內二等綾價謂上等每匹五貫中等二貫五百文閏羅四貫練絹二貫又出燕京地圖云招延州是渤海住坐本朝拘收外有居庸金坡等關貴朝占據古北松亭關本奚家族帳自本國為主西京一節候大事了可以商量也入辭金主言為稅賦事不相合本要止絶數年踰海通好且欲相成就的確事節盡在書中一一從得時便好也如不從得便領兵巡邊又云古北居庸本自奚地自合本朝占據今特將古北口與貴朝其松亭關本朝屯戍更不可說著使人回為我語皇帝事當亟决使人亦疾回我欲二月十日巡邊無誤我良嗣云此去朝廷數千里今正月且盡安能如期莫若使人留雄州以書驛聞為便阿固達許之二十七日辛亥趙良嗣回至雄州即以所得雄州回書附遞奏聞金人國書曰正月日大金皇帝致書于大宋皇帝闕下逺辱華函繼形溫問因遽成於小補感特貺於慶儀載循計議之辭未悉聽從之諭致煩馳報冀示誠音自來越海計議收復燕京并所管州縣元是漢地漢民已曽允應若是夾攻則與又承回示若大金兵馬到西京本朝便自燕京并應朔等州兵進泊至遣兵攻下西京牒報代州不經依應直候契丹勢傾力敗方自涿易起兵與元約不同昨於奉聖州良嗣等來時國妃狀奏稱貴朝兵馬竊入本京雖以殺盡幸願欵附金國尚不欲違約已報許於後國妃又申瀘溝河南大破南軍雖追捉數萬願為金國臣子重念如不自取慮失元許遂遣重兵攻破居庸燕京并所管州縣並已欵降尋遣親見副使馬擴專報委細及差人就檢陳地僵尸甚衆俱是南人更有人暗知貴朝統制劉延慶已坐失律兼僞命林牙統軍扎拉等以下亦稱國妃知當朝兵馬過關勾退鎮南軍馬待圖逆戰蓋因自來已破大軍别無警急及至相近不敢對敵因而遁去别不敗於南軍亦不曽到燕京左右若是城中之人實是相順無因盡殺入城軍士依此事跡足認貴朝兵馬不克夾攻特因自力所以拘收稅賦今承來書事非元約稅賦隨地户民如何搬運於理本難允應今特許每嵗别交銀絹令良嗣等前去定議向來燕城倘賴貴朝攻下無由更收稅色實以自力收獲故也既以相許即委所司勘㑹據燕京管內每年收納隨色賦稅共送五六百萬貫乃命宣諭國信使副於內只收合直一百萬貫物貨回奏良嗣等稱奉御筆只許銀五萬兩絹五萬匹如不允應便添十萬仍議西京在內更或不許西京别作一段猶不允從添綾二萬入二十萬數更或不允綾在二十萬數外以上别不奉到宣㫖不敢自專願遣使人賫書計議據年前合交銀絹數內先已將到二十萬兩匹尋委舊存交割官員檢辨收領緣稱絹貨不弱不並前來今請依與契丹一般者交送據平灤等州不在許與之限已曽書報倘廣務侵求難終信義無煩理㑹况平州已為邊鎮所有協虜投過民户别諭良嗣等省㑹去訖所據今嵗代稅合要物帛絲綿諸番色數并依中等價值别有劄目如何依從即請一就起般年前并今嵗合交銀絹依契丹數目送至燕京用賞軍人外據代稅絲綿諸物定於今嵗十月交割內絲綿並須燕京土産外自今嵗以後常平合交代稅絲綿等物依見去劄數并前來嵗交割銀絹依准舊例分破五番搬送平州路界首交付及示盟誓凡百事節皆遵此約長世不違貴慿同盟所有疆封可自燕京所管州縣地分與平州界至其間畫立其賀正信使彼此各請預先一日到闕生辰人使以十月三日受禮依上到來外賀貴朝生辰並依舊來契丹發行月日到闕仍於穩便處所起置𣙜場所有燕京并隨州縣民户不少若許計議不見定一自難安撫茍失今年播殖將來住係何處卒難拯濟如或難以准隨請各只依契丹體例施行仍速勾退過界兵馬候當春始善祝多祺有少禮物具諸别幅令龍圖閣直學士大中大夫趙良嗣專奉書陳達兼謝不宣謹白三朝北盟㑹編卷十三
