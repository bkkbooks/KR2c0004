body:
  text: 三朝北盟㑹編卷二百二十九宋徐夢莘撰炎興下帙起紹興三十一年六月一日壬寅盡七月二十一日壬辰六月一日壬寅朔宰執服孝内殿奏事畢赴宫門裏東廊上進名奉慰訖次拜第三次聽政表批答允詔二日癸夘以淵聖皇帝升遐憂戚之情詔吿天下詔曰朕惟孝慈淵聖皇帝恭儉孝友根于天性毓徳春宫天下屬心遭時多難粤受内禪臨御未幾播遷異域寢食安否敻隔不聞者三十餘年矣朕承丕緒申講和好幾以奉迎龍御歸燕便朝乃使命之來遽承凶訃痛悼之劇攀號莫從嗚呼恩莫隆于兄弟義莫篤于君臣朕之大欲盖在乎此天不我與其又何尤痛自克責以俟上帝之悔禍而已諒為四方同朕憂戚詔書到日應見禁罪人除犯謀殺鬬殺並為己殺人者并十惡强盗偽造符印官典犯入已賍將校軍人公人枉法監主自盗賍及雜犯死罪並依法内鬭殺情理輕者減一等刺配千里外牢賊斷訖録案聞奏其餘死罪情理輕奏取㫖揮流罪降從杖杖罪以上放咨爾四方咸體至意敗盟記曰是詔之下也軍民但知孝慈淵聖皇帝升遐之報而未知金人有敗盟之語至初七日馬軍太尉成閔内殿朝辭錫齎金器劍甲往荆襄出戍初十日御史中丞汪澈除荆襄湖北路宣諭使傳播日聞人情洶洶云四日乙巳金主亮敗盟遣諸軍率兵分道入邉逆亮敗盟興兵决䇿南馳其母諫遂殺母誡遣諸軍分道入邉一軍遵海以趨兩淮一軍出宿亳以蹂淮泗一軍厯唐鄧以瞰荆襄一軍據秦鳯以伺梁蜀朝廷命諸將分屯去處謹守邊備吳璘駐成都興州姚仲駐漢州梁州王彦駐安康洋州吳拱駐襄陽襄州李道駐江陵荆州田師中駐武昌鄂州戚方駐潯陽江州李顯忠駐池陽池州王權駐建康昇州劉琦駐京口潤州李保守海道江陰軍七日戊申主管侍衞馬軍司公事成閔内殿朝辭往荆襄出戍朝廷知金人必敗盟也謂江漢雖素有備然荆襄國之上游邊面空濶乃遣逺軍節度使龍神衞四廂都指揮使主管侍衞馬軍司公事成公屯駐鄂州是日朝辭賜賚金器劍甲閔發自臨安諸將皆行十日辛亥御史中丞汪澈除荆襄湖北路宣諭使朝廷召命成閔將兵備荆襄遂命御史中丞汪澈為湖北京西宣諭使兼節制兩路軍馬澈辭節制以宣諭使行詔曰朕為湖北京西壤地延澈分屯禁旅控扼邊陲故特遣耳目之臣徃莅爪牙之任撫勞將士體訪事宜凡其所臨如朕親幸陛辭上命之曰凡吏之能否民之利病悉以上聞十六日丁巳詔除劉琦等太尉鎮江府都統劉琦淮南浙西江東西路制置使京畿淮北京東路河北東路招討使建康府都總制王權副之池州都總制李顯忠江州都統戚方犄角䇿應馬軍太尉成閔兼荆襄制置使鄂州都統田師中副之荆南都統制李道義陽都統制吳拱犄角䇿應二十一日壬戌送伴人使起居郎吕廣問知閣門事宋鈞回闕吕廣問回内引奏陳送人使到旴𣅿軍有金人金牌郎君到來勅令臣等跪受大金皇帝聖㫖云六月二十三日來南京二十三日甲子議淵聖皇帝廟號都堂宰執集侍從兩省臺諫檢正校詳卿監郎官監察御史以上依雜壓就坐議孝慈淵聖皇帝諡號恭文順徳仁孝皇帝廟號欽宗尊賢貴義曰恭道徳博厚曰文比信從理曰順勤恤民隱曰徳克己復禮曰仁慈惠愛親曰孝欽事節用曰欽二十四日乙丑放仙韶院女樂二百餘人出上恭聞淵聖訃音且知金人用兵之意或傳金人欲來索仙韶院女樂周麟之罷同知樞密院事遺史曰朝廷既聞金國主欲遷都于汴且屯兵宿亳間議遣大臣奉使宰執共議遣叅知政事楊椿行其所議者如大金皇帝祗欲到洛陽觀化則不須屯兵于邊若果欲遷都于汴屯兵宿亳則本國亦不免屯兵于淮上非敢故渝盟約也盖為國之道不得不然或欲巡幸汴都即還燕京不屯兵于境上則本國亦無一人一騎渡江簽書樞密周麟之與聞其議知其事易言則無意外難合之請乃陰欲掠奪其恩數而陽為慷慨之言遂見毅然後行初皇太后上仙麟之嘗充告哀使使于金國金國主喜其辨利錫賚加厚麟之以例辭金國主不許曰一時錫賚出自朕意何例之有麟之歸以其物繳進復賜麟之既麟之又請行上大喜乃命麟之使于金國未行㑹間探者報金國主親提兵將大舉風傳兵聲甚盛極可畏懼麟之大恐不敢直辭其行乃見上但委曲言事已如此不必遣使無益也上大怒以麟之初請行復請止令其自析麟之伏罪侍御史杜萃老引用唐太宗斬盧祖尚故事言其罪麟之遂罷敗盟記曰左司諫梁仲敏上言同知樞密院事周麟之奉使懇辭出疆之命上曰為大臣臨事辭難何以率百官可罷同知樞密院事為人臣避事者之戒二十五日丙寅疎放臨安府内外罪人許淮南州郡移治清野朝廷以金人邀索無禮慮生兵釁乃許淮南州郡措置移治清野二十七日戊辰除徐嚞敷文閣待制樞密院都丞㫖充金國稱賀使知閣門使張掄副之遺史曰周麟之既罷黜朝廷别議使欲使以劉岑行上召岑問之岑曰臣受國家厚恩今臣年老矣惟不惜一死可以報國臣請至金國有如議不合當以臣血濺金主之衣上愕然繇是命徐嚞奉使以張掄副之七月一日壬申御史中丞荆襄湖北路宣諭使汪澈朝辭五日丙子詔禁戢浮言詔曰朕獲承祖宗休徳臨御三十餘載夙寢晨興罔敢暇逸志勤道逺治不加進惟是約己裕民之事雖食息不敢忘迺者放嬪御罷教坊省閒局減冗員凡有益于國而無傷于民者惟患不知未有知而不行者朕為誠意所加逺近不一應而令下之始胥動浮言幾惑衆聽朕甚不取夫監司郡守所與朕布大信于天下者也其各體朝廷并省節約之意明致之民務在實徳毋為虛文使百姓翕然於變底于雍熙稱朕意焉七日戊寅帶御器械劉炎送吏部與合入差遣殿中侍御史杜莘老上言臣聞怨望朝廷輕議君上人臣之罪有不容誅茍有若臣詎可置而不問乎謹按帶御器械劉炎無行小人持心狡險汙辱之跡臣不欲猥形白簡惟是前月十七日忽來訪臣語言狂怪遂云元居實措置江淮盗賊乃炎所薦而炎今日亦受劄子同共措置使炎當時不就改換今已優閒來日當徃力辭炎以文資易武級乃其願欲初非朝廷之令已多厯年其所受官禄亦不薄矣豈今日尚興怨望而辭避職事乎陛下邇者約已裕民減放宫嬪乃盛徳第一事炎與臣言主上不消放出宫人臣愕然問之乃云豈不漏泄禁中事矣陛下燕閒之際清心寡欲耽翫經史縱放宫嬪于禁中事有何漏泄而炎敢輕議陛下如此臣伏讀今月五日詔書有云迺者放嬪御朕誠意所加而令下之始胥動浮言幾惑衆聽臣謂炎居近習尚敢輕議而騰口于外則所在浮言未必非炎倡之也臣誤䝉陛下擢用執法殿中務在紏正官邪而炎乃無忌憚遽來見臣語言直如是之狂怪臣若縱而不論有負陛下臣又恐此人于百執事之間肆言無畏什百附和浮言惑衆尤不可遏矣炎之罪大誠不容誅臣愚伏望陛下將炎重加竄逐以為人臣怨望朝廷輕議君上者之戒于是送吏部與在外合入差遣令臨安府押出門劉炎初為右通直郎換閣門宣賛舍人主管内帑錢徃來𣙜塲買犀玉書畫依托内侍之門以寵進身後帶御器械值王全髙景山來奉使上殿無禮上還禁中班猶未退炎奏訖免茶酒遂傳㫖宣諭班乃退使人亦就館當是時羣臣不能措一辭而炎乃逡巡投機俾狂黯使人折服退去可謂失之平生收功須臾矣而羣臣不思己之不敏乃嫉炎之見機于是杜莘老論之十一日壬午宰執百官赴國壇奏告欽宗諡號徐嚞張掄朝辭知濠州劉光時以擅移治降兩官臣僚上言知濠州劉光時昨自五月二十日北界有被逐將欲渡淮者光時聞之倉皇失措不為守禦于二十七日遂驅闔城入横劍山謂之移治止留軍兵防託本州光時亦便出城自為得䇿是時淮上諸郡傳聞人情恐懼動揺不安其北界人尋便歸元未嘗渡淮光時妄作如此若不加罪豈不虧弱國體乎又聞隣近有數十羣人入濠州界光時不詳審以為賊徒不禀朝廷擅行殺戮反奏功希賞是欺朝廷也臣愚望將光時降兩官具令在職以責後效如更不悛當重作行遣劉澤知揚州主管淮東安撫司公事遺史曰泰興縣令尤袤以陽楚頻易帥守作詩以諷之曰維揚五易帥山陽四易守我來七八月月月常奔走帑藏憂煎熬官民困馳驟世態競趨新人情盖詣舊如其數移易是使政紛揉彼席不得温設施亦何有淮南重彫瘵十室空八九况復苦將迎不忍更回首嘗聞古為治必假歲月久安得如奕碁易置翻覆手十三日甲申淵聖皇帝諡恭文順徳仁孝皇帝廟號欽宗十六日丁亥湖北京西路制置使成閔至鄂州遺史曰成閔以馬軍司諸軍發臨安在道除湖北京西路制置使是時邊事未動鄂州軍中罔測其情或勸都統田師中善為備者于是人情皆不安市井驚惶至有妄言來取師中者或請師中以素隊迎接之為便師中從之迎見閔于路次人情乃安閔屯于古將壇之所閔受鄂州左軍統制郝晸黄金三百兩以晸知襄陽府為京西安撫自此人皆知閔為不足與成事矣十九日庚寅責受周麟之秘書少監分司南京筠州居住是時元顔亮因遣賀生辰使指求大臣欲面諭兩淮事意周麟之見任宰執被命稱賀使徃而麟之自度此去或問對之間難以答應况金人已露背約勢不可已徒往祗取辱耳故辭難不行而言者攻之故罷同知樞密院事再有是命二十一日壬辰時盱眙軍申辰時承州安撫富察圖們今富察乆安也傳語盱眙軍北界遣中靖大夫翰林學士韓汝嘉帶金牌到來欲與本朝國信使副宣諭公文當日巳時使付徐嚞張掄遣通事指使并親事官同本軍虞候李保六人過淮前去傳與韓侍講乞令傳語所宣諭語言欲乞約中流相見繼而韓汝嘉已上船過淮到本軍岸下徐嚞欲就淮河岸口亭子相見韓汝嘉已到遂就燕館使副不曽望闕拜止是跪受宣諭云向來北邊有䝉古韃靼等從東昏王數犯邊境自朕即位以來久已寧息近淮邊將屡申此輩又復作過比之以前保聚尤甚衆至數十萬或仍與西夏通好鎮戍突厥奚契丹人等力不能加曽至失利若不即行誅滅恐致滋蔓重念祖宗山陵盡在中都西北密邇彼界是以朕心不安以承平歲久全無得力宿將可委専征須朕親徃以平冦亂故雖宫室始建方此巡幸而勢不容留己擬于十月十一月間親臨北邊用行討伐然一二年間却當還此今有司奏聞有使稱賀本欲差人逺迓如期入見縁近以國信使副髙景山王全等傳㫖一二近上官位有所宣諭今卿等雖來即非所召卿等到闕而歸徐遣所召官等定見遲留有妨北討之期故令卿便回即令㫖定官位人等前來亦可以就稱賀仍須九月初定到闕實慮未詳上件事意或致疑訝故兹宣示想宜知悉是時徐嚞借資政殿大學士張掄借節度使未至盱眙而韓汝嘉已先在泗州伏匿不使人知覺以待我國信之來既至開報泗州方知而韓汝嘉即便過淮傳此宣諭云遺史曰徐嚞張掄為泛使去盱眙軍館中以待金人接伴使副到泗州即渡淮金人忽遣諫議大夫韓汝嘉走馬八匹徑渡淮直入館中嚞掄大驚皆朝服以待汝嘉走馬三節人皆出館門外闔其扉知盱眙軍周淙在館外穴壁以窺汝嘉令嚞掄與三節人皆列庭下大呼曰有赦遂宣言其大意謂皇帝以䝉子作過親提大兵五百萬恭行天討其宋國奉使未得渡淮候九月皇帝巡幸淮甸日引見言畢上庭分賓主坐嚞戰灼無詞掄乃稍進步而問曰䝉子小邦何煩皇帝親行汝嘉不能對掄曰諫議逺來口言有赦本朝軍相何以為憑請書于紙容後聞奏汝嘉即索書紙筆而去嚞掄送襭段香茶皆不受以汝嘉所書聞奏知必用兵即召嚞掄等回未幾金人復報已差接伴使副請奉使渡淮朝廷不從而命沿江沿河嚴飭邊備三朝北盟㑹編卷二百二十九
