body:
  text: 三朝北盟㑹編卷一百一宋徐夢莘撰炎興下帙起建炎元年五月一日庚寅盡其日建炎元年五月一日庚寅朔大元帥即皇帝位於南京汪伯彦中興日厯曰先是四月二十七日元祐皇后詔令遣王時雍徐秉哲偹車駕法仗等百官庻務各分一半發船載宫嬪及張邦昌等前赴南京迎請又命内侍邵成章王充管押乗輿服御御輦儀仗至南京來迎王坐便㕔南仲伯彦潜善延禧耘世則皆侍立成章等捧笥以前㸃數名件内有道冠一頂非人間様制成章等拱以捧曰太母傳語此冠自祖宗以來凡退朝宴閒不戴頭巾只戴此冠後來神宗皇帝易以頭巾脩襲至哲宗皇帝道君皇帝非祖宗制也願殿下即位後退朝宴閒戴此冠便是祖宗太平氣象王歛容涕流曰上天眷命羣臣愛戴幕屬将佐上書勸進拜叩固請至於五六吾固辭者亦屢矣方此躊躇以思繼又奉太上皇帝即真之詔太母乗輿服御之意迫不得已不敢欽承於是命尅擇官選得五月一日庚寅命有司於南京譙門之左營築壇埸命朱勝非撰䇿文告天命滕康撰赦文肆赦五月一日庚寅登壇寅受天命南仲充禮儀使延禧讀冊告天汪伯彦黄潜善董耘髙世則元帥府僚屬皆登壇行事王泣涕即皇帝位於應天府治之正衙南仲伯彦潜善延禧耘世則等先稱賀上殿侍立張邦昌率百官稱賀改元建炎元年初議改元命幕府官屬聚議耿南仲等議曰王者即位求端於天探一元之意以正本始故必建元故漢光武中興建武大王再造王室宜用光武故事紀元恭惟藝祖皇帝誕彌之年太嵗丁亥大王殿下誕彌嵗亦丁亥天元屬火宋以炎徳王藝祖開基改元建隆累聖相授逮至靖康乃遭中㣲殿下紹隆益光前烈南仲等請以改元為建炎耿延禧中興記曰初議年號黄潜善定為炎興耿南仲曰此蜀年號遂為建炎大赦天下門下皇天祐宋卜世過於漢唐藝祖承周受禪同乎舜禹列聖嗣無彊之厯保邦隆不㧞之基屬以朝奸稔成邉釁恃中都之安富忘外敵之憑陵致金人來攻京邑初登城而不下終邀駕以偕行痛念鑾輿逺征沙漠宗族從而盡徙宫闕為之一空仍仰臣僚俾僣位號朕以介弟之親而受㫖開元帥之府以總師方輸敵愾之忠亟奉講和之詔豈圖變故終致阽危盖甞指日以誓諸軍使前迎而後請不惮戴星而檄率土兾外附而内親而三事大夫與萬邦黎献共致樂推之懇靡容牢避之私謂亹亹萬機難以一日而曠位矧皇皇四海詎可三月而無君勉狥羣情嗣登大寳宵衣旰食紹祖宗垂創之基疾首痛心懐父兄播遷之難顧號令乆隔衆罔係心軍旅荐興農多失業慰民耳目之注敷朕腹心之言爰布湛恩誕綏區夏可大赦天下應赦書到日昧爽以前罪人所犯罪無輕重已發覺未發覺已結證未結證常赦所不原者咸赦除之朕惟火徳中㣲天命未改考光武紀元之制紹建隆開國之基用赫丕圖益光前烈可以靖康二年五月一日改為建炎元年一二帝北狩随行官吏班直諸軍及諸色人等見有家屬並依舊支破請給常切存恤無令失所昨金人逼脅使張邦昌僣號實非本心今已歸復舊班其應干供奉行使之人亦不獲已尚慮畏避各不自安其已前罪犯並與放免一切不問一應縁金人犯闕歿於王事軍人祖父母妻篤疾及年七十以上家無子孫者委所在勘㑹詣實時與支本營小分請受如陣亡人依格合給多者即從多給一應永安軍祖宗陵寝西京應天禪院㑹聖宫影殿西墳可差西京留守及䑓臣一員日下前去躬親省視如有厯年乆逺為風雨之所剥蝕及軍馬之所蹂躪牆垣傾頽棟宇殘損采色黯舊合修理者一面措置修理之不得有所遺失母惜重費毋畏勞苦務期完宻以稱脱意俟事竣日仍宻具奏聞南墳委汝州守臣依此一應天下神霄宮並罷舍屋什物錢糧田産州縣拘收具數申尚書省一應常平司散歛青苗錢穀本以便民歳乆法弊反為民患可自今住罷一應縁軍馬侵犯有臨難死節義不受辱出使軍前及守禦出戰並歿於王事許本家經所在官司自陳先次覈實具名保明聞奏當議優與褒賞訪聞自來歿於王事合得恩數官司多事指摘細故非理問難逗留致死事者不即霑恩可令所屬疾速施行一應縁金人大入朝廷遣使徃來實厯險難有未經推恩人許令自陳與檢詳元指揮推恩内有金人拘留未還者其請給令所屬且權給一半贍養其家侯及一年止一應因金人驅擁及差使過軍州官員及諸色人等得還者並許依舊官職祗應支破請給等内官員已别差人者並令吏部先次别與一般差遣一應文臣承務郎武臣承信郎以上并内官醫官伎術官及致仕並與轉行一官文臣中大夫武臣承宣使並回授與本官有官有服親武功大夫未帶遥郡一官已帶遥郡禦使人與轉行右武大夫選人與循資已係承直郎與改官次等合入官校副尉下班祗應依格與轉官資仍並不隔磨勘一應諸路帥守監司許依例進貢恩其金人及盜賊曽失守或逃避之人不許進貢一應承務郎以上服緑服緋及十五年者不以賍私罪與轉服色一應文武陞朝官并禁軍都虞候以上父母妻未有官封者並與封叙已封叙者更與封叙亡歿者與封贈已封贈者更與封贈祖父母者亦聽回授一應文武致仕官並賜粟帛羊酒即曽任太中大夫觀察使以上者官倍賜一應士庶男子婦人年九十以上者賜粟帛等令户部具别則例行下所在州縣就賜務令得實不得擾呼百歲以上仍保明以聞一應禁軍指揮使以上各特與兒男下班祗應一名諸軍將校合加恩者並與加恩馬歩諸軍將士等並特優賞仍比舊例以三分為率更増一分一應文武官因金人到離任者並限一月内經所在州縣自陳並與免罪轉運提刑司勘騐給還任一應軍人丁夫等逃亡及潰散官兵并州縣百姓因金人所至令失業之人皆因有首領統率原其本心皆欲勤王止縁道路不通遷延日乆粮食不繼因而取給民户刼掠逐路帥守不曽差人總率見今嘯聚未散出首無路自新限一月於所在首身其已前罪犯一切不問並放令逐便軍人依舊本營原職名收管仍免所轄官司及本營問當其少欠官私債負並除與放百姓願在軍者如少壯即減三指刺填即便支給例物請受其徒中能諭衆歸業或别首納限滿不首復罪如初一應今來嘯聚賊徒既許自新如尚敢乗時作過殺害軍民仰安撫提刑司差那兵馬捕捉并家屬務盡斬殺如數多本路軍馬不足申樞宻院差大兵前去𠞰除仰提刑司原立賞格召人擒捕仍許徒中自相殺併依格推賞功効尤大者别具保明格外推恩後𫉬不以今降赦恩原減一應逃避公人限一月出首依舊職名收管一應逃亡軍人如能勸誘逃亡之人首身本轄官司直簿拘籍每五十人轉一資副都頭以上每一百人轉一資及千人所屬具名申尚書省當議優與推恩一應戰鬭亡失官馬及散亡軍器什物之數合該科罪及官司見責令偹者仰統制官保明如委無欺隱特與放罪除免其民間有收到軍器等物許限一月經所在官司首依私有法其收藏官馬不納計贓科罪一應係官欠負不以名色百貫並行蠲免其曾經金人兵馬焚刼殘破州縣鄉村人户日前私債雖無利息並限二年外方許理索一諸軍昨縁勤王并因差出借過衣糧料錢並與除破更不尅納一應宣和七年十二月二十四日登極合該轉一官向有未經改轉之人並合吏部逐旋具鈔擬轉如失去公案無可照據許取見任吿勅照騐許本色官一員委保特與轉補如未祗受歿於王事許回授於本宗本色有官有服人一應縁金人經由州縣有燒毁係官屋宇等守及差使被賊刼殺據者特與免本家二年支移折變仍仰州縣倍加存恤一應諸路綱船靠閣見欠或遭風水抛失若被盗勘㑹分明委無欺弊不得將官兵尅折請受特與除破一應諸路人户見欠税租并倚閣展税賦及縁納錢物並與除放一應諸路借貸常平錢榖並特與除放一應諸路漕司多財用匱乏將民户合納二税宛轉折納或支移他郡却免未支移只納脚乘實恵之類致民間輸納増倍深屬掊尅今來並仰遵依條法不得妄冒支移折變仍許人户越訴提刑司覺察當重寘典憲内京西路昨縁方田添起税六分外止送四分見錢更不支移折變訪聞轉運司将所减分數敷入舊税抑令人户輸納重困民力可恨赦書到今與蠲免所有違法敷入舊税去處悉行改正仰提刑司覺察仍許越訴一諸路税賦支移折變自有成法比年漕司以財用不足徃往反覆細折如合納見錢令輸紬絹却以紬絹之直折納絲綿之類惟務削刻良民受弊自今仰轉運司遵依條法不得依前違戾仍委提刑司覺察聴人户越訴一二税折料合用納月時估中價近嵗轉運司與州縣務於掊尅将及納頓减時估不以豐凶低昂但稱引用飬例折納大重人户往往破産今後朝廷非軍事更不下轉運司非泛須索如折料尚敢循習不革守貳轉運司非泛須索并違制之罪加二等仰提刑司提舉司覺於起催月終以前具有無違戾保明聞奏不以實間與同罪一預和買法本支實價訪聞官司立價甚低或髙擡他物價准折或以無價虚劵充數甚者直至受納未支本錢不遵條限前期起催急於星火今來上供類欲依祖宗法其和預買有前項違戾守令并轉運司並以違制論加二等仍委提刑司覺察毎嵗於依限内一月内具有無違戾聞奏不以實聞與同罪一諸路諸般徭役非法令該載者罷該載而非急務仰監司守臣速具以聞當議一切蠲罷一應迯田見今地隣及地分掌𬋩人等攤認租税許令陳状特與放免其田依條召人承佃候迯户人歸業日給還一昨縁軍興官司於民間勸借財物及靖康元年後來人户於所屬州縣獻助錢物依靖康元年六月二日止指揮給降空名告勅計價書填給還比縁監州州縣申明将未降上件指揮已前献助之物不理數今仰逐州長吏限十日将已降空名告勅道計前後實納之數計價盡數書填給還訖以聞如人數所納前數未及願帖納書值者聴即不得抑勒如違許越訴當議重行黜責一應今來因金人所至州縣刼掠迯避人户仰監司守令多方招誘歸業内闕食不能自存之人依災傷七分法賑給與免今年夏税雖歸業而無力耕種者仰提舉常平司更切審量據等特行借貸錢收買牛具之類候将來收成日分三年逐科帶納人户置買耕牛權免錢粮一年其縁金人兵馬蹂踐田土鄉村依此施行一昨經大帥府駐劄及一月以上去處應辦軍馬極為勞費今來夏税並與放免省一應舉人特奏名并就殿試靖康元年得觧及州學職事人並免将來文來觧一次一應天府差人防秋至今春未能放散顯妨農務應縁來差科保甲除迯亡人外特與免一科支移折變一諸路義倉在法合同正税為一鈔輸納訪聞提舉司以轉運司侵用有令人户不得随税帶納去處顯屬違法仰命遵依成法改正施行一應人户典賣田宅因官司不為减落第等見依舊供應科配差使限赦書到一月許自陳騐實特與减免一應今日以前典賣田宅馬牛之類違限印契合納倍税者限百日許陳特與蠲免事發在限内者亦准此一應崇寧以來増置務其税入課利除給官吏等支費外所收錢物不許去處仰轉運司體度並行廢罷一應崇寧以來因買樸坊場河渡及折欠官物沒納田産未有承買者與减見買價三分聴欠户與收贖限滿不贖即依所减價出榜别召人承買仍作三年六料輸納一訪聞自來赦書所放逋欠轉運司及州縣廹於調度依舊催納至民間有黄紙放白紙催之語甚失朝廷寛恤愛民之意今來大恩與常赦不同兼務節用可以裕民如監司州縣輙敢故違巧作名目依舊科抑被科人户越訴其官吏當重行貶竄一應近年以來州縣縁應奉之費用度窮廹至有前期括借民間二税免役坊塲課利等錢顯是違法自今湏𬋩依條限催納不得預借一祖宗以來天下上供委有常數自熙寧後因臣僚奏請嵗有増加不勝其弊仰諸路轉運司取索轄下應干見今上供物數開具祖宗舊制及熙寧以後増添數目聞奏當議並行裁損以紓民力自崇寧以來州縣倉庫受納税賦務加槩量以圖出剩東南六路為甚以故民力困乏其弊本於補發綱運斛㪷額外増數可除嵗額上供數外其每年任其起補發額斛並權住罷一諸路常貢之内有時新菓外味之類所在因縁貢奉外取索歸空庫更有饋送搔擾為甚仰體禮部勘㑹除縁天地宗廟陵寝供献所湏外餘並罷貢一自崇寧以來州縣因抛買上供綱運取辦民力或以和雇為名科差鄉夫般擔挽運極為搔擾自今後並不得以和雇為名科借鄉户以代兵役州縣故違或監司强抑州縣應副者並許人户越訴當議重行竄黜一應監司州縣違法賦歛涉於掊尅或科配大買物色實擾害及應干民間疾苦事件並許中外臣庻詳具利害經所屬官司陳述繳奏或詣闕投進當議考察改正施行雖語言詆訐亦不加罪一應州縣官昨縁京城圍閉赴任愆期多致員缺應已差下官除程限一月到任限滿不到令本路監司郡守各選有才幹人權行具名奏差一次已奏差者他司不許衝替及昨縁防秋所辟官屬先次赴任因郵置梗澁未受付身人並以掌管職事日與理為到任月日一應州郡金人曽到城下保守無虞者令所屬等開具元守禦及出戰官兵等保明申尚書省取㫖推恩内應天應係祖宗開基之地有三聖御容两院宗室控扼東南為襟㗋衝要之處與其餘州軍事體不同所有原守禦戰官兵等特先次與轉一官資選人比類施行仍令元帥及應付長官開具保申尚書省給降付身一應吏部宗室注授恩例自有定法昨縁言論列遂同庶姓甚失銓叙之意可依舊法一應宗室犯罪見鎻閉監𬋩拘𬋩人該遇今來恩宥並放逐便宗子婦人見入道為尼願還俗聴原有官封者依舊一應宗室昨來預貢及得觧之人並與推恩一應宗室無官人依政和五年二月二十四日册皇太子赦與量試推恩一應外官宗室未有差遣及已授三路差遣願别授者並令吏部不依名次先次注闕近便差遣一應諸宫院屋宇近因拆毁致使宗室至無處居止並許量口數多寡指占空閒官屋及寺院居住一應宗室因金人取過軍前本房老㓜無人養贍或因逃避散居州縣以至失所在京委開封府在外委守臣速行措置月給錢米無令失所不管漏落别聽候朝廷指揮一應宗室年㓜未及官員并忠義之士在外非曽奉朝廷及大帥府指揮激於忠憤自募勤王人兵未有統屬今來國事稍定仰各將見管人兵交付所至州縣主兵官訖出公據量帶人從前來行在特與推恩一應官員因疾病陳乞致仕今已安痊不以年限滿許召保官員原委保自陳特令再任一應命官尋醫侍養許並召保注一應恩澤補受文學並許依法召保注權入官一應合特奏特並與免試内曽經六舉以上到省人與登仕郎五舉補京助教四舉上州文學兩舉諸州助教人願赴將來特奏名殿試者亦聽雖在下等不應出官人亦取㫖陞推恩一新春合赴省試人昨縁道路艱阻復歸本貫及在京人即未有取應之期令禮部檢㑹故例取㫖施行一應去年錫慶院試中武士未經推恩人仰本部限一月開具等第姓名申尚書一應院宫官有隔下撥放並許於所屬自陳保明申禮部限三日給降其今嵗聖夀節合撥放去處雖不曽投進功徳疏特與依例撥放試經者與額外添數一次合就試一百人以添一名一百人以上者兩名三百人以上三名一應暴露遺骸無人識認者許在寺院埋瘞毎及一百人令所屬勘騐申禮部給度牒一道一應自今官員犯罪若依贓私自斷定更取特㫖斷如係公罪止令刑部大理寺斷定刑名施行更不取特㫖一應命官流配編管覊管人永不移放逐便除名追降官資及勒停責授散官安置或官終身不齒放歸田里人等及永不收叙人並與叙元官落職人欲復舊職折資及降等差遣人與復本等差遣合檢舉者刑部限三日舉其蔡京童貫王黼朱勔李邦彦孟昌齡梁師成禫稹及其子孫皆誤國害民之人更不收叙一應呉儲呉侔王宷劉昺等親屬前來禁錮約束指揮條具以聞停降諸色人等未經叙用及永不收叙人並特與叙原職名已遷補者額外收補一應編管移鄉人并永不移放者並放逐便沙門島罪人不以年逺近並移鄉五百州軍一應命官公人軍人犯罪除名有特㫖除名停僣覊管大理寺合斷刑名外一時特㫖除名停僣覊配安置之類本不合坐罪者並與除落理元斷月日一應特㫖還俗僧道自陳特與依舊為僧令本州出據公據一應禁軍犯踰濫情重條並行隔下不得遷補轉若經斷及五年不曽再犯候轉日委所屬勘㑹詣實特與轉行一應急脚馬逓舖兵因金人所至迯避散在諸處送逓角可専委本路提刑司疾速招刺依舊擺舖仍依時支給請受一應縁軍與收置物至未曽交還價錢者並限十日支還一京城圍閉日乆商旅不行今道路方通理當優異其啇賈欲船販物貨上京者並經州縣自陳出給公據特與免沿路税錢一應中外有文武畧藝出倫或淹布或沉下僚内自禁從外至監司郡守廣行搜訪各舉所知一名如舉得其人並行選擢限十日内薦舉仍與以所舉人移文州縣以禮津遣赴行在一應孝順子孫義夫節婦所宜旌表以厚人倫事顯著者仰長吏明白來上一應祖宗以來赦内常税寛恤事件及名山大川歴代帝王祭祀封爵等檢㑹行於乎聖人何以加孝朕毎惟問寝之思天子必有所先朕欲救中原之急嗟我文武之列若得忠義之家不食而哭秦廷士當永於報國左袒而為劉氏人咸樂於愛君其一徳而一心竚立功而立徳共徯兩宫之復終圖萬世之安副我憂勤躋時康乂三朝北盟㑹編卷一百一
