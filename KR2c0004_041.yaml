body:
  text: 三朝北盟會編卷四十一宋徐夢莘撰靖康中帙起靖康元年二月二十二日戊午盡二十六日壬戌二十二日戊午太學生沈長卿上書言伏闕并李邦彥等書曰靖康元年二月二十二日太學生沈長卿謹昧死再拜獻書於皇帝陛下臣觀自古天下國家所以敗亂而不可救者始於人君賞罰之不明也蓋賞罰者人主之大柄古者爵人於朝與衆共之刑人於市與衆棄之欲其合天下之公心不敢有異議而已舜之舉十六相也天下之人謂之八元八愷其竄四凶也天下之人謂之檮杌謂之叨餮非舜舉之也天下之人共舉之也非舜罰之也天下之人共罰之也聖人賞罰之柄如此漢唐之末時君世主昏暗不明刑罰之柄奪於權臣其所賞者末必有功也所罰者未必有罪也賞罰不明天下解體亂亡隨之如漢之哀平唐之懿僖此數君者未必如桀紂之暴亂酷虐惟其賞罰不公使忠臣義士銜恨而死是以至於滅亡爾恭惟皇帝陛下即位之初大明誅賞以示天下當取法於堯舜可也而比頒明詔前後或異若有姦邪罔上之臣乘擾攘之際亂陛下之聰明者臣少負耿介慕劉蕡賈誼之言得事君之莭而小仲舒之論緩而不切憤然有意於劉賈臣請為陛下直言而不諱臣聞二月初五日陛下罷李綱右丞太學生陳東等率士數百伏闕上書極言李綱忠義李邦彥姦惡冀陛下聰明睿斷罷邦彥而相李綱以厭天下之論也於是京城百姓羣聚闕廷不約而來者幾數萬人仰天椎心祈哀請命莫不欲李綱之相邦彥之罷也洎陛下遣使宣諭復綱舊職衆志遂定其後乘時恃衆毆擊內侍蓋緣平居細民受虐之深積怨之久今日強敵擁兵困辱中國奪我玉帛侵我土地非由此曹何以致之故危疑之間發其致痛以至於極非士人所教而為之也夫舉數萬之衆不煩召而羣聚帝閽若出一家曽無異意者豈陳東一布衣寒士所能驅率哉蓋其平日公論如此不勝其忠義憤激之切訴於陛下爾諂諛無知之人阿附邦彥自植朋黨不問士庶所以伏闕者何心所言者何事中外憤駭里巷蕭然􅓺舍一空臣始聞之而驚中聞之而疑卒聞之而解以為布衣書生以忠義被戮得與龍逢比干並名書史乃萬世之榮然天子聰明仁聖今日之事當自有以辨之必不惑於佞也其後學官黃哲等待罪陛下親降聖旨朝廷方開言路通逹下情士伏闕上書乃是忠義所激爾等何為待罪宜速安職曉諭諸生太學之士仰觀聖訓感激流涕如蒙異恩一謂陛下好賢樂善之誠如此自今以往天下忠言讜論日聞於九重必不至鉗口結舌如前日也有君如此其忍負之稱誦未已詔墨未乾陛下復降御寶以諸生伏闕係赦前已放罪更不根治今後如或不改復出鼓唱亂朝廷紀綱當議極刑又觀殿前司曉示備載御寶以士庶有以伏闕上書為名者意在作亂今後如更似此之人仰三衙收捉並從軍法令王宗濋斬訖聞奏臣雖至愚心知前日姦邪之人重以變亂之説惑陛下者是致陛下德音終始反覆之如是也臣觀秦始皇雄才大略英睿之主也一用趙髙李斯遂以上古為不足學三代為不足法盡取上古之書而焚之當時天下之士有復於上者皆以為妖言使御史按問其罪羣聚而坑之四百六十餘人是忠臣義士被坑戮之禍遁逃竄伏甘心於隴畝之間不敢以儒自名其謀實出於斯髙始皇信而不悟也天下士既已盡去始皇於是內修宫室外事四裔信惑仙神巡遊不息恣所欲為而無敢有言是非陵夷至於二世不改始皇之業以至大亂輟耕隴上之徒奮臂一呼天下響應禍在焚書坑儒而已今姦邪之人欲罪伏闕之士而陛下得此名於後世臣所謂捫心痛哭思欲犯顏逆鱗以自踊於鼎鑊也夫人主所示天下者賞罰也某人當誅必明其可誅之罪功罪不明而妄興賞罰使天下歸怨則謂暴君可也陛下如以前日之事為可赦不識諸生以何罪而得陛下之赦乎以後日之犯為可誅不識諸生以何罪而得陛下之誅乎且既名之為忠義則不當罪之於刑法既置之於刑法則不當名之為忠義二者不可兩立也陛下前詔既以士人為忠義則後日以犯詔而誅者乃以忠義就刑也為忠義者既不保其首領使不忠不義者陛下將何法以加之乎雖然作福作威人君之大柄則殺士之名臣為陛下過有所惜者萬世之後恐陛下有殺士之名臣恐自此天下四海忠義之士望風股栗且耕且釣不肯為陛下用也臣又聞陛下虛懷側席登用儒臣擢徐處仁唐恪等於間散之地而置之輔佐至於范宗尹朱夢説劉寧止之徒盡蒙號召將以大用是陛下欲盡求天下忠義之士也忠義之士聞詔未起陛下罪言之名已聞於天下彼數人者敢再信於陛下乎太上皇帝在位二十六年其間姦臣沮抑忠義之士以言獲罪致斥逐者固多矣然未有如今日之詔欲置敢言之士於極刑也而陛下獨何忍為之乎臣聞自古賢人君子未嘗不欲其君用者惟其待之不以禮遇之不以誠是以懷鉛抱槧自甘於海濵嵒穴而不出也人君惟盡禮而致之屈體以下之虛心以訪之克己以從之猶懼其不至况示以刑威欲致忠賢之士不亦難哉昔燕昭築黃金臺禮郭隗而四方之士莫不奔燕齊小白禮九九之術而四方之士莫不奔齊彼區區霸者之材非有二帝三王之道德也徒以禮賢下士故天下之士樂為之用臣願陛下念臣之心察臣之言特降聖旨追改前詔優加褒拂使天下之士不至於解體則陛下可以得四海之心建長久之䇿而享萬世無疆之休矣臣又觀前日宰相吳敏有為李邦彥辨姦慝暴白功狀大書文榜揭之通衢行道之人莫不嗤笑臣聞邦彥自布衣時不惇士檢放僻邪侈無所不為挾倡優於酒肆逞顔色於庭闈其淫言媟語往往流傳人間有不可聞者其後一時遭遇旋致顯位而阿諛順旨偷合茍容坐視姦邪之臣開邉致釁曽無一言規救人主此乃持祿飬交冒利忘耻之徒耳而敏方且以功狀揭之市朝欺罔文法愚弄天下未有若此吁可怪也且宰相天下之屬望任相不賢則天下之人得以議者昔楊綰為相崔寬為之毀第觀黎幹為之減騶從郭子儀為之徹聲樂當時公卿大臣猶畏憚之如此今邦彥身為宰相而百姓遮道慢罵甚於奴𨽻疾走省闥掩關自遁其為辱亦甚矣臣聞司馬光為相天下兒童走𨽻亦皆稱頌使邦彥而果賢也則天下之人當自知之當自服之何必因敏言而後明哉就使如敏之言以為邦彥畏慎太過緩於事機則邦彥亦不過蘇味道盧懷慎之徒耳以輔庸主且猶不可况可以輔佐陛下成中興之治乎臣聞太學之論敏及蔡京父子上客密交奔走京門浸有年矣而邦彥與敏如左右手也今所以曲為邦彥強辨者正欲植黨自固邦彥去則敏不能以孤立原敏之心本非朝廷論宰相實為身謀耳向使陛下不能獨斷而信敏之言復用邦彥則姦臣寖貴事必有大於此者誠可為寒心也臣觀漢之元帝恭謹節儉當時號為賢者之君而讒佞愚弄優柔不斷故孝宣之業少衰而後世敗之蓋人君之患莫大於斯二者願陛下乾剛夬決天下之事斷自宸衷勿奪於讒侫勿溺於優柔則萬世之後皆知陛下為賢君矣豈特生靈社稷之幸哉臣為此言臣之友生有為臣言曰子堂上有二親家唯四壁韲鹽大學茍為升斗之將以飬親而為狂直之言上以諌天子下以忤宰相吾謂子無死所矣臣應之曰不然昔陽城為國子司業召諸生誨之曰凡學者所以學為忠與孝也僕平生所志在為忠與孝而忠孝不能兩立茍全一莭雖死無憾天子仁聖如此而姦邪之人漸以侵潰使後世得以輕訾吾君今不言將何以戴天而履地乎雖以此受戮不猶愈於今之生乎是以不避斧鉞直書上干天聽雖蒙誅戮萬死無悔冒瀆天威臣不勝惶恐戰栗之至二十四日庚申尼堪兵過澤州遊騎直至孔寨河晉絳戒嚴二十六日壬戌太學生正吳若上書言吳敏李邦彥二月二十六日太學正吳若誠惶誠恐頓首頓首昧死獻言皇帝陛下臣自正月以來數貢封章仰干天聽不守愚分出位妄言加之事迫情危辭語抗率雖受誅殛理所宜蒙而待罪三旬威命不至臣知陛下遭艱危之會念愚者之一得容庶人之謗議也雖然陛下有求言之名未有用言之實有進賢之志未有用賢之方臣稍惑之臣誠凡愚莫測其志但私念今天下雖號乏才然百官有司識慮之過於臣者何可勝數尋臣前日之所謀質諸衆人之公論以揆始終之事變則陛下誠能令大臣去自私之蔽使踈逺者咸得竭其力恭諸公論擇通知民情者繕守備於內善料敵計者持使莭於外決不至虛張強敵之勢以恐朝廷愚弄攻守之謀以惑百姓如此之甚亦未必遽欲割地之請上貽祖宗之辱也又况號令混淆是非紛亂名器不慎賞罰無章羣小漏機而喪師姦人賣國而射利遂使兵民發憤排闕以僣誅戮之權朝廷有人寧使至此臣所以敢疑陛下無用言之實無任賢之方者謂是而已前悔何及來者尚可改圖而宰相吳敏方文飾姦言庇邪黨罪以惑陛下臣實駭此臣恐士大夫方附吳敏之炎莫敢言者臣不顧身為陛下别白言之夫踈賤孤陋姓名不逹於朝廷莫如臣之鄙者未信而言至於四五不慮後患莫如臣之戅者有一於此豈能赴功名之會今敵退可以歸矣舍微祿耕舊土菽水飬親臣之分也而猶徘徊顧戀不能忘言於陛下者豈非以陛下之儉可以積財陛下之仁可以得衆陛下之憂勤可以飭蠱弊陛下之清慎可以逺姦回然則收拾人心訓齊戎旅恢復土疆雪祖宗之大耻不在陛下之時而何時也聖君難逄志士難合臣實歎此且臣考祖宗之澤觀天人之心國家宜未有陵遲之禍然陛下即位於倉皇之中日不暇給然黜陟未明紀綱未振軍旅無律財粟無備兵釁禍根尚存腰領而腹心之臣如吳敏者反附下罔上則陵遲之形見矣獨在陛下卓然獨斷於此數日之內奮張威柄為如何耳何則前日擾攘朝廷或有過舉人必恕陛下初臨大政便履艱危大臣多誤國之餘左右皆茍全之黨陛下不得已循用之自然積弊未去若夫今日已後陛下可以一洗積弊大芟蕪穢百姓所以期望於陛下者亦不淺矣陛下如尚姑息舊姦蹈履前轍是猶漢成帝不能奪王氏之權徒怪天變之多也故自此政有疵纇民必不恕陛下一失民心內外解體何以緝理祖宗基業臣願陛下嘗膽攻苦深念於此也臣憂憤以來心志未定言不能文其有利害事恭畫如後所貴乙夜之觀簡而易見伏惟陛下少加察焉一自古人主急而論相而於今尤為急宰相難於稱位而於今尤為難臣竊聞陛下之相張邦昌特因其靣折童貫爾夫童貫奴材罪盈惡著面折其短誰不能之而陛下以此相邦昌則論相之術殆踈矣陛下又相吳敏夫張邦昌器識局促畏避保身決不能為陛下整頓頺綱衆人往往能言之臣不暇論至於吳敏才氣必不在張邦昌之下然士論指為蔡攸死黨前日建請上皇遜位及蔡攸父子鈎探先旨計會吳敏為之冀敏立朝庇其宗禍臣始未以為信及見吳敏救李邦彥劄子則信不疑矣何以言之吳敏稱李邦彥輔佐上皇自前歲以來罷易宰相更革政事定山東河北之敵皆出其力此非徒救李邦彥乃救蔡攸張本也又言建追李鄴輩金人軍中終賴其力嗚呼敏謂四海不復有知識之士敢為此言以欺陛下耶李邦彥登禁從入府城幾年矣考其進身皆不以正見政出多門紀綱敗壞天怨人怒盜賊繁興而方竭四海之力起燕雲之師曽不能力諫不合而去乃方蔑棄典禮起復以妨賢路王黼用事邦彥在政府坐見土崩之勢已成晚乃結蔡攸罷黼就第審知不能獨行其志可起復哉蔡攸首出燕雲論功受賞起登三事徐言不便與李邦彥情罪正同以此事君求脫誤國之刑未見其可至於敵兵壓境李邦彥不肯撫率京畿諸郡之民譬曉禍福身冒矢石同致其死以捍長河乃包裹槖囊私送妻子諫陛下為避逃之計不忠不智至此之極而欲以遣李鄴為功良可驚笑臣聞割地取賂金人本謀李鄴不能逆知其情折之以辨拒之以死但望麈設拜以邀其歡輸欵露誠以漏其機張皇過當以成其䇿李邦彥等軟懦亟令鄭望之之徒繼往有敢捐身立異者例抑不遣行初二日之戰李邦彥聞敗而喜故兵民叩閽以泄其情此乃陛下聖德感民民願效死以除國賊以昭祖宗之休而吳敏輒引元魏髙歡事以劫羣臣以動陛下是敏將為宰相而杜言路之兆也夫衛士聚黨焚張彛宅怒其私也故髙歡知士有離心散財給士今兵民伏闕殺內侍欲毆宰相者欣戴陛下也雖使髙歡復生民肯忘祖宗之澤背陛下之聖而從之乎敏以此援李綱种師道亦已過矣且陳氏貸粟髙歡散財雖非人臣之所當為然使齊君能修其政魏氏能撫其民田常髙歡適為我用蕭何之得民曷嘗不為漢髙之福陛下果以百姓之心為心則因此民怒可以作士氣因此民勇可以振兵威豈但恢復土疆抑可乂安邉境此真中興之祥而吳敏憂之不知權者也古今事固有形同而情異者衛士聚黨奮其私怒誠不當縱前日兵民叩閽第以用忠無術幾召亂耳如其區區之意豈不可憐哉崇寧以來防民之口其潰如此使百姓因忠憤而有極刑哉朝廷之人亦有責矣吳敏又引王黼之惡而又不及蔡京是黼逐敏而蔡攸召之之故也今日之禍王黼之罪當居蔡京之次童貫之竊兵柄蔡京實縱之王黼特曲從上皇之欲取燕山耳當時王黼能諌則不為宰相臣未知宣和廷臣誰是不肯取宰相者王黼不為則今其無如王黼者乎吳敏能平心用刑立正蔡攸父子之罪民猶未弭其謗如顧私恩廢國法禍未息也且自崇寧以來縉紳非無才智之士例為蔡京父子童貫梁師成王黼所汚耆舊間若徐處仁者號為勤儉公方然陛下召之而士論己喧且嘗以十事乞留蔡京矣考其後來大槩徐處仁所長固不當以此廢之但士君子立身一敗不為清議所重決不能大有為於危疑之際者昔蘇軾有言君子未論其行事之是非先觀衆心之向背誠有是理盡使張商英陳瓘今日立朝所為未必皆是而士民不敢異辭使宣和舊臣秉政在廷所為未必皆非而士民競先興謗陛下以此揆之則圖相之術明矣又况皇上還宫凡為舊臣者皆有主辱臣死之責又有進退首尾之嫌宰執之間措身何地願陛下旁求俊彥天既篤生陛下聖德必不無一賢相贊助也一道路籍籍皆言蔡京在上皇時有保護邦本之䇿陛下不忘其恩欲全宥之且欲用其子孫此正今日禍福之幾不可不深論也蔡京父子濁亂天下為鬼為蜮毀壞祖宗基構誰不欲食其肉者且其父子凶險而有姦人之才如復令在朝則正人端士必不為陛下用而輕蹈嗜利者附之以進矣如此則民離心於下陛下孤立於上此西漢王氏之禍也陛下之居儲二名位繫於天下聖德聞於天下百姓歸心神明擁護雖有搖奪之變天人不從蔡京豈是忠良但度勢有不可不敢異謀爾况蔡京兄弟子孫享國厚祿誠有保護之言不為分外凡為天下者不顧私恩丁公成漢祖者也漢祖斬之知其姦也魏徴背唐太宗者也太宗親之知其忠也蔡京父子本窺伺上皇自結免戮之計非特不忠於陛下又不忠於上皇而崇寧之初首進逄迎之言熒惑上皇履霜堅氷終至蒙麈之禍則陛下有義不戴天之讎今陛下將指姦為忠義棄讎不復匹夫且不為之况為天子者乎方危疑之時能傳位於陛下此自上皇之英斷祖宗之威靈吳敏既叨天之力以為已功濫據台鼎蔡京父子又欲倚此全宗亦害天下之公義矣願陛下圖之臣聞人主所以礪世磨鈍者名器賞罰也緩急之際財帛或不足於充賞刀鋸或不足以遍行尤當謹守名器以昭勸阻之方崇寧以來金紫飾輿臺公王寵閹宦有志之士至以名器為辱陛下即位當焦手濡足以救此風而頃者愈甚奉使如李鄴鄭望之張皇敵勢賣國謀身皆列禁近出使而未有功悉光華榮顯並玷樞輔不知朝廷平日養人何所用之一有使令必先賞賜又進士雷觀等上書聞擢館職芻蕘之獻言陛下善而褒之亦榮於華衮矣館職可輕授哉祖宗召試館職之法抑可棄乎陛下亦知前日郎官有使不屈節敵廷者儒生有應募血戰塗草野者否使忠魂有知必憤於此等賞矣又康王和戎本無他䇿徒以危疑之際毅然請行厄辱受危三旬於外勞則有矣何功之云今賞典太重前此無聞他日張邦昌交地而歸又將待之三公耶聖王作事動思可繼陛下誠憐康王出入待遇之恩時使頒錫之數超於諸王亦足勸矣名器不可輕也臣願陛下密諭康王牢辭此賞陛下從而許之君臣兩得其美計之上也干冒天威臣無任昧死三朝北盟會編卷四十一
