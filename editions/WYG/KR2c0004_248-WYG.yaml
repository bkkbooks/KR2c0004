body:
  text: 三朝北盟㑹編卷二百四十八宋徐夢莘撰炎興下帙起紹興三十一年十二月二十日辛酉盡二十八日己巳二十日辛酉車駕到鎮江未入丹陽館乗騎徑徃江下觀看戰船二十一日壬戌入行宮駐蹕于雞籠山和州金人未退二十二日癸亥吳璘奏收復秦州治平寨四川宣撫使吳璘報㨗遣差左軍統制王中正權知秦州劉中正軍第五将王价等帶将軍馬攻討收復陜西陷沒州軍于十二月二十二日未時攻打破治平寨次日措置招收官民歸業及剗削城壁守禦間探報金人萬户富色里貝勒帶領千户名雅爾布等甲軍三十餘人在千家堡下寨要收復治平寨中正等統率軍馬步軍于二月十五日辰時自治平寨起發至午時到千家堡照城陂望見金人在川下擺作三大寨其時步軍未到中正等帶領軍馬下川迎敵其軍一擁前來告諭官軍不顧死亡與敵血戰一十餘陣至申時金人敗走一十餘里再添生兵擺拽陣勢與官軍迎敵中正等賈率官軍戮力苦戰至酉時其軍盡行敗散奔走乗勢追趕二十餘里斬到首級捉到活人各不計數目收軍回堡當川下塞統領官王中正左腮口角中三鎗伏乞照㑹二十三日甲子張振時俊正任承宣使戴皋王琪正任觀察使盛新正任團練使采石之功統制官各已遷轉階官及遥郡矣虞允文欲奏請與落階官并與正任乃降㫖昨采石親與金主見陣保䕶大江功力為重並特與正任二十八日己巳樞密院同奉聖㫖進幸建康府用正月三日如值雨别擇日車駕在鎮江旬日擇日進發持服秦瑣秦堪奏獻金器五千兩銀七千兩米二十萬石候服闋日取㫖知安豐軍孫顯忠申任契丹等歸朝十二月二十八日淮北壽春府有任契丹納蘇郎君天平軍節度使河北路安撫置使正任檢校少保天雄軍節度使河北等路安撫使王友直將帶軍馬八百餘軍前來即時說諭朝廷恩信管待犒勞訖發前赴闕行宫留守司牓李顯忠邵宏淵等報㨗淮西諸郡並皆寧静行宮留守據建康府駐劄御前諸軍都統制李顯忠池州都統邵宏淵等申今月十七日早親率軍馬乗勢粘蹤追襲金人離和州三十里地名横山澗其軍連發烟號勾添精銳騎兵數千騎鴈翅擺列拐子馬衝擊官軍當職遂分布馬步軍賈勇將士戮力分頭趕敵及戒諭官兵不得砍級奔馬一擁奔入敵陣自辰時與敵鏖戰至午時殺敵敗走趕殺三十餘里其軍取香林湯路前去殺死金兵并掩擁入溝澗及活捉到千戸百人長并騾馬衣甲器械無數除已再遣軍追襲外委是大獲勝㨗又報再遣都統官張榮統率全軍追襲至十九日未時至全椒縣界地名馬村後河楚湄溝趕上與金對敵殺死金兵并掩擁入河不知其數收到被擄鄉民老小數千人即時撫恤各令隨便歸業奪到馬騾軍器等除已粘蹤追襲外委是大獲勝捷又據建康府駐劄御前諸軍都統制淮南兩路制置使京畿河北淮北壽亮州招討使李顯忠黄旗走報契丹金自完顔亮被殺之後淮東敵兵遁走唯留精銳三萬户在和州為後顯忠近已統兵收復和州趕殺敵衆于横山澗後河兩次獲捷相繼遣發統制官耿卞孔福張榮時俊李福王浩統領官張淵王洪范卞元復朱進董超王宗髙端志董安劉源珪軍馬并續遣發池州都統邵宏淵以及顯忠親統其餘諸軍于十二月二十八日起離和州二十九日至企宗白陵橋趕上金兵見陣追襲金兵至淮河地名㙭澗金兵半渡統率諸軍掩擊敵衆溺死不知其數奪下牛畜被擄老小五千餘人已即時撫恤放令逐便歸業委是大獲勝捷兼顯忠已差人撫定廬亳等州并管屬縣鎮令來淮西諸郡委無敵騎一路肅静商賈通行人民復業奉聖㫖令出榜曉示張燾卒張燾行状曰紹興八年金人遣使至境求和而要我以難行之禮上亦厭兵革且悼梓宫之未還母后之在逺南北軍民久困征役姑欲屈已就和以紓目前之急仍降御劄令在廷之臣詳思所宜條奏公上疏疏在紹興八年十一月内時將相方以和議為已功力賛屈已之說以謂兹事當由聖斷不必謀之在廷上勉從其請将有定議而外論紛然欲羣起而攻之從班中有不顧節義亟欲求進者乗宰相之懼說之曰公為天下大計而羣說横起何不擇人為臺官使盡擊去則公之事濟矣宰相然其說遂擢言者居中司又引見黨與使俱横榻除目既班搢紳駭愕道路以目莫敢異辭公聞其議已定乃嘆曰一屈之後寧可復伸上雖不自重其如天下何較金之强非吾所敵而敢與抗者恃人心耳今主上躬屈至尊以臣事之則天下之人誰敢與抗将唯敵命是聽則吾之國不以為國矣今大臣欲邀功一時徒為身謀不復為國逺慮使人主倒持太阿以中國之大柄授之強隣将有載胥及溺之憂又引羣小置憲綱之地意在排擊忠良俾天下之人緘口結舌在廷諸公畏其兇焰莫敢救正曽魯仲連之不如豈不得罪于天下後世乎吾世受國恩身忝侍從不可自同于衆人當以死爭遂上疏疏在第三十八冊召公入謂曰卿前所論四人者首自相矛盾奸計敗露朕皆逐之矣㣲卿言幾為小人所誤遂命公兼史館修撰自是屈己之謀遂寢止増歲幣敵亦不復以此深責于我竟歸我梓宫歸我母后歸我河南之地人亦髙公之卓見朝廷既得河南議遣使祗謁陵寢上欲得慈祥愷悌望實兼隆者往展孝誠併宣恵澤顧宰相張某肯為朕行乎宰相以語公公曰上不以某不才使備驅䇿某之願也尚奚辭宰相以言入奏上喜曰張某可謂不辭難矣公于是即日束装上道自陳蔡厯汝潁以至洛延見父老布宣天子徳意民夾道歡迎争饋壺漿且言久隔王化不圖今日復得為宋民雖九死無憾鼓舞相慶以至感泣公皆慰勞而遣之迨至迫城披荆棘履蓁蘙隨宜葺治展敬成禮而還公所過輒詢民間利病及敵情虛實頗得其詳既歸入對時宰相方主和議惟恐少忤敵情事竟不行未幾河南復陷陜右州軍亦多失守宰相始悔不從公言冬十二月大金賀正旦使至命公為館伴金使素聞公名畏懼之一見領其副曰是使南宋不拜詔者也公以語動之遂得其國之情偽密奏之且言宜早為之備上深然其說方且圖之㑹公疾作力求吿老遂以資政殿學士致仕明年金人果敗盟南下淮上紛擾上思得重臣鎮守要害控扼上流落公致仕再起知建康以時方艱棘不敢固辭聞命上道時金人傾國以來初自合肥徑趨厯陽人情洶洶公以十月十九日至姑熟見南岸全無守備亟申朝廷乞發軍馬前來捍禦仍具沿路探報事宜排日申奏二十日至建康下令區處防托事件各有條理城中初聞江上危急比屋逃竄聞公之來皆相率歸業二十四日王權至和州退保采石朝廷方罪其畏懼用李顯忠為代旬餘猶未至人情復大恐時知樞密院葉公義問被㫖督師江上令大㕘虞公允文自西掖出賛軍事十一月六日同至虞公蜀人素知公雅相敬慕公亦髙其氣節毎與論時事必擊節稱賞由是益相親次夕漏下二鼓公方就寢虞公扣門求見甚急公披衣倒屣迎之虞公曰此何等時而公欲寢乎曰日來人情憂懼外間方洶洶太守動息為去留倘不鎮之以静必不安雖然舍人何以見教虞公曰適謀者自江北來云敵于和州作戰艦晝夜打造不計隻數期以明日渡采石約晨炊玉麟堂公何以為䇿公曰某被命典司留鑰但當以死守遑恤其他舍人秉義素髙以名節自任今朝廷危急如此輟法從之貴賛大幕正當運妙畫建竒功以安社稷此某平昔所期于閤下也虞公曰此某之素志特决公一言耳明日躍馬至江上而敵騎充斥戰艦數百艘列在北岸若欲濟者金亮方築臺刑白馬祭天旗幟滿野金鼓之聲聞數十里喊聲動天地王權所留水軍車船咸在而諸將故等夷未有統屬莫肯用命盡伏山崦虞公使人謂曰國家糜禄廪竭民之膏脂以養爾輩今事勢危急若此正壮士立功報國以取富貴之秋而乃甘心跧伏山崦以延須臾之命又安能必保其要領乎孰若奮身前鬬萬有一勝生則取封爵死則有褒贈爾輩其熟計之将士皆歡呼曰舍人既肯向前某等當竭力以死報國家有頃敵船濟江直來南岸金亮親在臺上手揮紅旗催發須臾敵船漸近我軍徐出山崦擺列江岸敵初未之覺一見大驚欲退不可遂以箭相射我軍羣弩齊發敵出中流中箭者墜江中軍船乗勢衝撞應時沈沒遂不能濟次日復來方擂鼓装船欲進見水軍船盡出遂不敢前我以海鰍船二十餘隻先往北岸截斷楊林渡口用尅敵弓齊射敵棄船上岸悉陷泥中不能動坐受箭而斃金亮度勢不可進遂自取御寨舟船焚燬而去餘舟為我師所爇皆盡人情遂安公立以其事奏聞且言采石之捷雖足快一時聞金人自戰敗之後連日發兵東向揚州臣懼其併力以攻𤓰洲為渡江之計其鎮江府在今日委是危急欲望睿㫖勅諸将同心協力極力捍禦庶不墮其奸計有㫖令樞密行府添差李捧邵宏淵往防托仍委楊存中在彼同共措置金亮竟不能渡俄為帳下所殺淮西平詔沿江帥守條陳目今進討恢復事宜公陳十事大率欲預備不虞持重養威觀釁而動期于必勝人皆以為至論吳璘與金人鳯翔喀齊喀貝勒書書曰少保奉國軍節度使吳璘謹致書于都統相公閣下冬寒軍務良勞比者正隆被殺大定新立諒惟悼奉新君悲喜交集雖然福禍有幾惟智者能知其幾不可不慮也且公實正隆信臣委任至重休戚同之大定即位亦必有腹心之臣為之謀主雖以髙爵厚禄安公反側而君臣之間踈忌之意豈一日之忘昔東昏被殺正隆簒位東昏之将相大臣能保其身全其家者幾何此皆公之目見也縱使大定隱忍未發其用事之臣能相容乎公提兵數萬人居于外無功則以失律為辭建功則以强大見忌公之得罪于新主者必矣其危如此孰不為慮今我主上豁達大度推赤心置人腹中臣之擇主舍此安往公若能改圖來歸當敷奏以咸秦王世襲王爵元隨戎旅委付麾下富貴權位子孫無窮身名俱泰如漢之金日磾不亦盛乎理之必然非為遊辭以動公也機事之來間不容髪猶豫不决終致大禍悔何可及惟公熟計之三朝北盟㑹編卷二百四十八
