body:
  text: 三朝北盟㑹編卷一百二十八宋徐夢莘撰炎興下帙起建炎三年四月一日戊申盡二十日丁邜四月一日戊申朔皇帝復位皇帝復位制詔并臣僚奏請曰朝奉郎試禮部侍郎充御營使司參贊軍事臣張浚右臣伏覩三月五日睿聖皇帝親筆朕即位以來彊敵侵凌逺至淮甸其意專以朕躬為言朕恐其興兵不已枉害生靈畏天順人退避大位臣伏讀再四不覺涕泣臣竊以國家禍難至此皆臣等文武之臣不能悉心圖事補報朝廷致使土地侵削人民困苦上負睿聖之恩下失天下之望令睿聖皇帝以不忍生靈之故避退求和固為得策然臣獨有一説不敢不具陳其詳臣竊以當今外難未寧内冦竊起正人主憂勞自任馬上求治之時恐太母以柔静之身皇帝以幼沖之質端居深處責任臣寮萬一强敵侵陵不肯悔禍則二百年宗廟社稷之基拱手而遂亡矣臣愚不避萬死伏願太母陛下皇帝陛下特軫宸慮祈請睿聖念祖宗委託之重思二帝属望之勤不惮勤勞親總要務據形勝之地求自治之計抑去徽名用柔敵國然後太母陛下皇帝陛下監國於中撫靖江左如此則於天下國家大計似為得之如臣言為然乞行下有司令率文武百官祈請施行新除資政殿學士大中大夫同簽書樞密院事吕頥浩奏臣契勘自崇寧以來内侍童貫譚稹互掌兵柄二十餘年賞罰不眀號令失信西則侵陵夏國北則與契丹敗盟致将帥解體士卒不用命皆緣内臣基禍流毒天下遂令徒黨為患至今近聞将相大臣被命戮内侍誠可以快天下之心攄臣民忿怒之氣然伏覩三月五日睿聖皇帝親筆詔書以謂即位以來彊敵侵陵淮甸其意以朕躬為言朕恐其興兵不已枉害生靈畏天順人退避大位以此仰見睿聖皇帝出於至誠不吝至尊之位将以紓國之禍也恭惟太后陛下仁聖恭儉之徳踰三十年孚於四方垂簾聴政擁祐皇帝陛下四海之内孰不歸依但臣有愚見不敢愛死而不言方今强敵乗戰勝之威羣盗有蜂起之勢興衰撥亂事属艱難豈容睿聖帝退避大位而享安佚伏望太后陛下皇帝陛下不憚再三祈請睿聖皇帝亟復帝位親總萬幾從此已往屏絶内侍近習之人褒賞今日立功将帥之士然後駕幸江寧以圖恢復如此則宗廟社稷有無疆之休将帥大臣有無窮之福不然必恐天下禍亂不可勝言新除資政殿學士大中大夫同簽書樞密院事江淮兩浙置制使司臣吕頥浩等右臣等契勘都統制王淵不能備禦金人致乗輿南渡皆連内侍躐除樞管近有統制官苗傅劉正彦被奉聖㫖将本官及内侍誅戮委属克當外有建炎皇帝以避敵遜位一事臣等竊詳建炎皇帝即位以來恭儉憂勤過失不聞今天下多事之際乃人主馬上圖治之時深恐太母垂簾嗣君皇帝尚幼未能戡定禍亂臣等今統諸路兵逺詣行在恭請建炎皇帝復位或太后陛下同共聴政庶㡬人心厭服可致中興宰執劄子臣等三月二十九日請召苗傅劉正彦等到都堂諭以睿聖帝始以講和大金之故責躬避位退處别宫授位元子恭請太母垂簾同聴政事今國家多事干戈未敉信使雖遣難必復命之期天步方艱宜急防秋之計睿聖皇帝當還尊位復搃萬幾苗𫝊等亦皆聴從取進止皇太后批答吾近以睿聖皇帝授位元子請同聴政以國家艱難義不得辭朝夕不遑亟願還政今覽卿等所奏甚契吾心可依所奏疾速奏請施行宰執等上表乞皇帝復位臣朱勝非等言屈已睦鄰事本由於獨㫁因時復位理難抑於羣情臣勝非等誠惶誠恐頓首頓首竊以昨者鄰敵侵陵聖躬謙損授位元子退處别宫恭請東朝同聴幾政至誠懇切詔㫖丁寧交好金國之歡少息生靈之禍今者干戈尚擾宗廟未安遣使必艱於還期防秋當思於預備若未復九重之政恐尚壅萬機之繁恭承太母之訓言兼列羣臣之奏請事有必至義不可辭伏望皇帝陛下察億兆愛戴之公視社稷安危之重亟契六龍之馭率和萬國之心俾中外之協寧庶艱虞之共濟臣勝非等無任云云皇帝批答朕以金人連年内侵㫁然不疑避位與子恭請太母同聴政事庶便和議以迎二聖以安生靈今承太后聖㫖并得卿等所奏當還尊位搃攬萬㡬殊非本意難議允從兼已具奏太后卿等宜體朕懐皇帝奏皇太后劄子臣恭請領御寳劄子令臣入禁中起居早來緣臣痰作卑體不安已奉表起居容臣俟朢日趨詣謹具奏知宰執等再上表臣勝非等言伏以責躬與子即聖徳之難名戴后祈天顧羣情之莫遏未頒俞㫖再罄忱辭臣勝非等誠惶誠恐頓首頓首竊以有徳者興因民心之所與大寳曰位惟帝命之是承属天步之多艱軫淵衷而深念思柔强敵暫屈威尊播告多方見禹湯之罪已矜憐赤子知堯舜之性仁然事有緩急之殊則理係安危之異盛秋設備當愛日以有為萬里結盟慮歸程之或阻矧太后憂勤而垂訓暨羣臣懇逼而陳辭宜還正宁之朝大慰羣生之願伏望皇帝陛下仰遵慈㫖俯徇輿情亟𫝊清蹕之音遂反紫闈之御東向而揖者再雖循即事之儀萬嵗之呼者三速契投機之㑹臣無任云云皇帝親答批答朕奉太母慈訓及臣僚奏請還即大位親縂萬幾深惟避位本意專在和好覬以迎還二聖安輯生靈今慈㫖丁寧與臣僚繼請宗社之計至重防秋之期已迫祈請之使恐難必遂若太母念國家艱難之極不憚憂勤同聴政事則朕猶可勉徇臣庶之願共圖國事不然㫁不敢以獨當尚書省牒部朕頋徳弗類遭時多難臨民馭朽索之危渉道濟巨川之逺向者敵師深入國步載艱永惟責躬避位之因専為講好息兵之計力祈金國兾迎二聖以遄歸庶保丕圖可致四方之綏靖今則奉太母之慈訓念嗣君之幼沖致兵民推戴之誠兼内外請祈之切防秋在邇當愛日以有為其遣使出疆恐尋盟而未遂露章狎至復辟為期朕以太后之㫖不敢違羣下之情不可却遜辭靡獲任重難堪仰太母之慈仁許同聽㫁思𦕈躬之寡昧敢憚憂勤朕惟東朝有垂簾保祐之勞元子有踐阼纂承之託上徽稱於長樂以致四海之驩正冡嗣於青宫以係萬民之望式頒温詔誕告多方嗚呼有臣三千實倚同心之助􅁲年七百復開過厯之期更資中外之交修庶格神天之協佑咨爾有衆咸體至懐太后宜上尊號曰隆祐皇太后令有司擇日備禮册命施行所有三月六日赦書應於恩賞等事宜疾速施行如有稽遲重寘典憲故兹詔示想宜知悉皇太后聖㫖吾以國家變生倉卒遵用本朝故事同聽大政皇帝復位即願撤簾皇帝懇請者再義不得已黽勉數日今中外寕一天下共慶皇帝宜專決萬幾吾當退處東朝以遂初志可以今月四日撤簾故兹詔示想宜知悉皇帝奏皇太后劄子臣伏覩太后劄子欲以今月四日撤簾國家非常之變仰賴太后之慈仁恭儉始終保祐遂復大位今亟欲還政雖謙沖退託聖徳難名在臣區區之心實有不遑安者望依舊垂簾同聽政事庶得和協内外保安宗廟取進止皇太后聖㫖吾惟自昔人君沖幼必資保䕶别有同聽政故事前日特以倉卒之變勉徇權宜皇帝復位數日内外寧一機務既宜專決臣庶亦思瞻望豈宜久同大政已下詔用今月四日撤簾宜速遵用施行皇帝奏皇太后劄子太后聖㫖以今月四日撤簾臣惟菲徳遭罹變故自非太后保祐則宗社安危殆不可測欲報之徳無以為稱復位之始尤賴母慈敉寕中外而聖徳謙沖確然不囘臣不敢重以機務上凂聖慮已命有司遵依詔㫖施行六日癸丑尚書右僕射朱勝非罷為觀文殿大學士知洪州呂頥浩為尚書右僕射同中書門下平章事制詔曰移蹕而南渡欲止嘉禾請帥而北行往防京口深嘉忠議悉出懇誠陞秘殿之峻資貳鴻樞之重託鎮撫六路緝綏兆民俟訖外庸俾圖内治屬營屯之沸擾致宫闕之震驚靡聞召節之符呼兵入衞盡䕶同盟之帥鼓衆偕行使孽将之宵征繇義師之雲合朕素嘉其有王佐之畧復見其得大臣之風是用度越羣公亟付魁柄云八日乙卯降赦門下天佑民而作君所以大乎一統后體元以居正所以臨於萬方朕属時多難顧徳弗類武不足以戡定亂畧徳不足以惠綏庻民兩宮逺狩則四時懐温凊之思金國内侵則萬民罹塗炭之苦念艱虞之若此豈𦕈末之能勝盖少貶抑至尊之稱庶以厭壓上天之禍惟國家之厯數未艾而祖宗之徳澤在人露章率者若出於一辭總師入者沓來於數路㫁鰲足而立四極既成開闢之功取日角而受五龍始正神眀之御爰念撥亂者當同於創業救弊者宜急於改圖方圖事揆機為良久之觀而訓兵積粟嚴備禦之策廣恢隆於大業以馴致於丕平帝堯無黄屋之心豈菲躬之敢議漢髙先馬上之治庶後効之可圖嘉與多方一新霈澤可大赦天下於戯聖人大寳曰位既還宸極之尊王者求端於天期浹仁恩之溥常賴文武将相中外士民咸一乃心同底於治湖州通判張燾上疏言時政苗劉亂既定上求直言湖州通判張燾上疏大槩謂人主戡定禍亂未有不本於至誠而能有濟者陛下踐阼以來號令之發未足以感人心政事之施未足以慰人望豈非胸中之誠有未修乎又言天下治亂在君子小人用捨而已夫小人之黨日勝則君子之類日退将何以彌亂而圖治乎又言竊觀近日措置防守大江之策户㸃一丁五人㸃二使自備糗糧器械而蠲其私賦烏合之衆素不諳戰陳一旦有風塵之警聞金鼓聲則鳥驚魚潰之不暇尚安能必其用命乎徒費民財又損官賦而不適於用願速罷之又言近日侍從台諫所言多循習故態觀望意㫖毛舉細務以塞責至國家大事則坐視而不言豈不負陛下遇待之意又言巡幸所至不免征繕重困民力句踐之棲㑹稽似不如是不若權時之宜茅茨土階以俟昇平為之未晩云二十日丁卯車駕幸江寧府潰兵劉文舜擾濠州劉文舜濟南府僧也先是靖康間京城受圍濟南府有劉和尚者聚衆勤王有數千上即位劉和尚率衆至南京納兵乞身濟南依舊為僧未幾其衆皆去圍南府乞劉和尚依舊為首官司令劉和尚出城説諭其衆令退去遂退於數十里之外然後求其所欲衆曰我輩無頭領得和尚依舊為頭領劉和尚曰我非馭衆之才豈可為數千人之首今城中有劉和尚名文舜者有膽勇善射可為汝頭領汝願之乎衆曰諾遂招文舜令還俗歸其本姓以統其軍車駕南渡中原沸擾文舜與其衆渡淮首犯濠州知府連南夫命俞家鎮土豪俞孝忠率民兵一百五十人往迎之與文舜相遇於白石孝忠遂進戰馬陷於泥淖中被殺衆皆奔還而防城民兵知孝忠已死亦散歸文舜至城下南夫許犒其軍約使退去文舜從之南夫科居民量貧富出銀仍出庫帛以遺之并自解金帶授文舜而去潰兵薛慶據髙郵軍召邵成章赴行在初邵成章以上書論黄濳善汪伯彦誤國編管吉州上思其忠召之諸内侍忌其忠直譖之曰邵九百來陛下無歡矣乃使止於洪州居住邵成章字茂文一字天素開封人也少為内侍博通經史性好諒直諸内侍皆不喜之常出之於外宣和初為淮南路亷訪使者條奏宣府童貫五十罪中外大駭貫請上皇移成章為河南路亷訪使者亦不加罪淵聖即位内侍用事者多貶罷超擢成章入内知内侍省事賜梁師成宅以居時軍民一歳兩殺内侍皆知成章忠賢獨不加害建炎二年行在掦州大金攻河北陜西羣盗起京東西路宰相黄濳善汪伯彦皆蔽匿不奏及張遇攻真州去行在六十里上亦不聞成章上疏條濳善伯彦之罪且曰必誤國及申濳善使之聞上怒送章吉州編管眀年果失中原上思其忠召之諸内侍忌其忠直遂譖之曰邵九百若來陛下無歡樂矣乃使居於洪州大金軍破洪州召之曰知公忠直能事金國則當富貴長享矣成章堅不從屢逼欲殺之監守兩月復釋之曰忠臣難得吾不忍殺復遺之金帛俄以病卒水賊羅成擾楚州羅成楚州洪澤閘之車軍也洪澤鎮市人烟繁盛倍於淮隂故洪澤人常欺侮淮隂人而淮隂人曰淮隂縣也洪澤鎮也鎮隷於縣敢欺侮我哉繇是各不相下初車駕南渡金人方退去京東與宿泗盗賊縱横洪澤有大小舟千餘皆不敢動而閘兵恣縱横行於市中閘官不敢弹壓成遂鼓率羣兵據舟船作過是時淮隂無官縣吏孫晟權行縣事以巡尉弹壓洪澤成等不服遂與其徒董青輩率舟船犯淮隂晟退避之且使人勸和成等退去初韓世忠京東潰散有後軍将李義者往來於寳應之間有衆五六百成遣人相約合軍共圍楚州去來不定成破連水軍取練色絹為㠶以絹為索李復分軍而去義謂之李大刀為邵青所敗走至真州六合縣界中餘衆有數十人欲趨真州知州檄沿江巡檢滑某追捕之滑某以軍班授官善射有膂力即以土兵數十人追至九女堽殺義并殺數人餘衆散走羅成後亦為邵青所併三朝北盟㑹編卷一百二十八
