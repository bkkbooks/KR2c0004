body:
  text: 三朝北盟㑹編卷一百六十二宋徐夢莘撰炎興下帙起紹興四年十月九日己丑盡其日十月初十日御前金書牌至令寄留禮物私覿在鎮江府取天長路出六合前去并據鎮江府備准尚書省剳子稱良臣等顯是故作遷延分析住滯因依令又韓世忠差近上使臣一員專一催促出界即時倉卒治行十一日早方得鎮江府交割禮物私覿了當當日沈晦一自見訪良臣與繪各為輕装選使臣軍兵十九人至西津渡江是日沈晦方来相别曰二公果去耶繪曰豈可不行晦曰忠義如此固佳只是分曉便不住萬一未至軍前鋒刀之下者多少事如何分别繪曰但以死報國他在所不恤及至江口據本處巡檢申風色暴猛渡江不得繪只得在水府廟以俟日晡風少息遂渡宿𤓰州軍營十二日質明前進至楊子橋道逢韓世忠使臣持牒備坐聖㫖指揮令遣上使催促出界而若稍遲緩罪有所歸繪顧良臣曰幸免管押二字是亦光華比至淮揚三遣騎士来促至揚州東門外見有選鋒大隊軍前来某等問之云相公指揮囘江頭把隘既至城於譙門上見世忠留飯云朝廷累有文字催促奉使過界只請今便行仍将出所受到御前金字牌文字一紙係令韓世忠将帶軍馬囘来鎮江府江口把隘以示良臣因言欲謁陳桷董皎遂就食于彼韓世忠差人傳語及送到㕘辭門状即令囘去江頭照管舟船恐軍馬争渡仍令董皎陳桷發遣使副行了速行江頭幹當食畢差到馬八匹防䕶步兵二十八人即時陳桷董皎送繪等出北門繪與陳桷有舊城門之外駐馬久之以老幼為托桷泣數下左右傷怛遂行三里余見防䕶兵卒皆羸弱無用遂呼語之曰汝輩送我出不得已歸路甚難可自去努力報國家諸卒泣拜而去止将本所使臣軍兵前去是夜宿大儀鎮並無居民官吏環坐一空舍下皆乏食聞鶚鳴鬼嘯不類人境十三日行數里午前見敵騎十人望見繪等一發呌呼奔馬前来矢下如雨繪謂良臣曰速令一行人下馬囘視墜馬者十四五人矣無敢前者繪與良臣并執旗人獨前大呼曰不要放箭是来講和金人遂歛收弓矢獨一騎前来問當你是甚人繪等云皇帝遣来奉使欲要講和罷兵且各自休息其一騎復囘告之衆乃懽然少頃一時前来令繪等一齊上馬聨騎徃天長去沿路問皇帝在甚處繪等答以杭州又問韓家在甚處有多少軍馬繪等答在揚州来時却在鎮江府去不見得有多少軍馬又問莫是計麽先你過来待到囘来厮打麽繪答云他是兵家講和人怎得知去城六七里有百餘騎擁一老帥皂旗髙旌皆全装老帥容貌秀整乃聶哷貝勒其下皆稱萬户大郎路次相見與使人相揖所問如初又問少帝幾嵗謂淵聖繪等答曰淵聖皇帝庚辰是三十五嵗又問皇帝幾嵗答以三十二嵗萬户馬上屈指數過来軍前時是三十一二恰好也其辭甚温遂相引同入天長軍前譯者言你們来講和㬠是好公事不如一發了却繪等曰某使人此来專為懇請大國和議若得速了甚幸若欲太平不難只在大國一言而已譯者又問皇帝今幾嵗某等答云聖壽三十二嵗譯者云向在汴京皇帝来軍前曽相見不知今相記否譯者又云泗洲来所在州縣多見恤刑詔書并戒石銘皇帝如此愛民㬠好又問秦中丞檜在何處繪等答曰今帶職名宮觀在温州居住又問聞曽作相莫是聞得大軍来後怕這裏軍前去取所以交他去繪等云自前年歸朝廷後實曽作相一年後来堅欲請退遂以宮祠閒居又問繪等韓有多少軍馬今在何處繪等答以在揚州不知的實數目来時見韓世忠将出皇帝聖㫖文字教繪等看已勾囘韓世忠令徃鎮江府駐剳良臣等親見人馬出揚州東門望𤓰州去也繪曰侍郎亦不可如此道用兵與講和自是兩事雖指揮勾囘然将在外君命有所不受囘與未囘使人不可得而知又問云韓世忠却在掩襲我後如何某曰軍中機事使人緣何得知又云言元帥謂逹蘭已到髙郵三太子已到泗州今次恁大軍馬都是劉齊鬬作来某云如今舉大兵前来設若欲取南州縣與他别人却壊了元帥軍馬不曉何苦為他如此萬户云恰似人家養个義兒却賭錢吃酒待趕了又却趕去那裡且只得恁地説道韓家有幾萬都在淮南從入界来何曽見一个看如今怎奈何劉麟去里某等云聞劉齊多是信任李成如李成反覆叛逆之人安可信任譯者云李成㬠是粗人不成人物元帥㬠不喜它到開德府遂奪了馬交行來十四日天欲明譯者令某等出天長南門過城壕於道邊立馬有三百餘騎圍定某等見老幼輜重並向西去至已時引某等轉西至河邊令某等下馬前用大斧斫殺三十餘人遂令人拽某等下馬羣刀引手萬户憤怒擲去所帶貂㡌按劍嗔目問某等云你們来講和昨日道韓家人已囘却因甚使人来奪拆橋某等答以是水寨人不知朝廷遣使之意萬户遂囘顧交引過人来問某等云此是甚人某等認得三人被傷是韓世忠軍下董皎下使臣虞候内一人不識某荅云此是韓世忠軍中人萬户大怒云似恁地事怎生信得你們却是先来稱講和暗地同来等害我其羣從遂向前舉斧以刃向某等意欲加害其萬户以鞭揮之遂稍却某等見其意甚怒謂决不免某等厲聲呌呼指天誓日云使人棄父母棄性命前来只為講和為國家韓世忠既以兩使人為餌豈肯教知他計某若不見察願就一死以報國家死無所恨問難徃復半時辰来見得某等辭直理順萬户云教你去元帥處謂達蘭某等云若得到元帥納了國書便是使人事了然後請死萬户笑云大金沒恁公事待交一个㑹漢語畨譯人做通事且好坐馬須㬰差到通事蕭大尉防䕶甲兵二十人遂同行到寶應縣用一黄河渡船擺渡人馬某等説話云是濟州人姓滿舊在學校與李鄴極相熟李鄴見在偽齊作右丞某等問兹事如何荅曰甚感人又問可知否則揺手元帥差到接伴官蕭團練使李少監某等前日進呈語録誤冩少監欲来相見某等探問得蕭團練小名赫嚕李少監名聿興遂與某等相見叙因使事幸得相見之意李聿興問来議和事某等云此来為江南欲守見存之地每嵗共銀絹各二十五萬疋兩某云見存之地為章誼囘日所存之地又問既来講和却為甚呌韓世忠来掩不備侍郎團練是幾日過天長某等荅曰十三日到天長李聿興云正是㑹期全似酈食其事某荅云此是田横不察食其何罪某云酈食其當時以游説止齊韓信從而襲之此来何嘗止大國之兵又云兵家事先論曲直師直為壮江南州縣此已是大國曾經畧定交與大齊後来江南擅自占據及大兵到来又令韓世忠掩不備正是軍人放馬遽然到来却是大齊説得都是某等荅云經畧州縣事前此書中並不曽言及止是淮南不得屯兵本朝一如大國所教如韓世忠掩襲事某等實不預聞聿興云不知皇帝所用之将却不得皇帝指揮怎敢動某云将在外君命有所不受臨機應變閫外皆得而專之又云如此是韓世忠跋扈萬一和議之後依前生事定又是敗盟約某等云既是講和之後皇帝必湏有約束不許妄動聿興云江南第一不是處為不合湏要量復故地如襄漢州縣皆是大齊已有之地何故却令岳飛侵奪某等云襄漢之地王倫囘日係屬江南後李成為劉齊所用遂来侵攘是時方遣韓肖胄等奉使太國其事曾約束邊境不欲深探自後李成侵擾不已既招安得又結楊么欲裂地而王之江南恐其包藏禍心侵陵不已實恐難以立國遂遣岳飛收復襄鄧州等故地即非本朝生事相侵亦湏相察聿興云元帥欲要國書看不知可以将去否某等云不妨遂以議事迎請二聖二書授之聿興遂喚幕外趙校尉是副元帥處畨譯人将去蕭赫嚕又問秦中丞安樂麽此人元在自家軍中㬠是好人某等荅云見作宫觀差遣不任職事却請俸禄閒居聿興云無如此快活也又云侍郎團練逺来事要早了時若告它元帥湏似申包胥泣於秦庭下不知如今本朝所湏底事莫湏應副得麽某云此是國家大事使人豈敢擅决使人止得将命傳導言語而已聿興云事固然江南而今檀占據淮南州縣本朝大人門㬠怒某云自来使人徃還中書兼使人口授並不聞有此議皇帝皆所不知若大國便加怒豈不誤他江南聿興云怎生更待商量復故地某云以中間丞相惠書有云既欲不絶祭祀豈肯過為恡愛使不成國是以江南敢再三懇告若或不從却是使不成國聿興再三審問某等復深言之某等江南新州之地皆江海陂澤又無不經殘破却與大齊不同聿興云大齊雖號大齊皇帝然止是本朝一附庸指揮使令無不如意侍郎團練曾見執旗報信張革等否某云不曽見不知是幾日離軍云十一日某等云某等是十二日離揚州以日月考之可見聿興云元帥教将剳子去都是元帥自道底言語更無文采再三道你我直迷着那言語㬠有意来者使臣却也敢向前覆事也不可得某等云一行人莫非忠義奮不顧身之人豈有懼怕者遂問皇帝在甚處某等荅云駕在臨安府又問臨安府是甚處某等云便是舊日杭州又云此去杭州幾日可以徃囘某等又云星夜兼程徃来不過半月聿興又云大軍在此這公事㬠𦂳某等云若得元帥早有處分囘報江南使人豈有稽緩又云昨日書元帥已教畨譯做回書要看次第一兩日相見也二十九日午晩有送馬来赫嚕聿興令人傳語請上馬見元帥某等囘轉語畢上馬同行城中屋宇有五七分已上其下並有兵馬并煆鉄打造軍器河内有糧船百隻並是東京板掛七百料船牽船人等並装青號上書青州運糧船户某人又有輦運司第十五綱字運少頃引某至屋下見達蘭朝外坐並用蘆蓆釘壁鋪地左邊用紫布遮壁某等認得是毡車子所上用之物傍有四人坐皆衣渾紗短袍裹頭巾着求頭靴右邊有紵絲戰袍或着毛衫官軍五十餘人并有全装甲士十餘人引某等向前禮畢令譯者問云皇帝安樂某等對曰聖躬萬福又問使㫖某等荅曰某等離江南日奉皇帝指揮令誠致懇請乞早定和議迎請二聖某等星夜前来十月初六日至鎮江府先遣張革執旗報信數日無音耗某等不敢住滯又奉皇帝指揮令寄留禮物私覿在鎮江府由天長路出六合前来大兵壓境不知所得罪之由譯者云使臣所説更有甚傳語某等云盡在國書中譯者云國書中事却見了元帥台㫖你們所説待信来又已前數次失信待不信来又怎生全不信得今次舉兵為生靈不能得定自入境来並不曽殺一人房屋不曽拆着你們都見又呼隨某等一行使臣近前聽某等對云大國舉兵若以生靈為意天下幸甚江南所以再三遣使懇請上國正為生靈不得休息所以再遣某等前来欲得早定和議且告元帥矜存趙氏社稷憫恤一方生靈譯者云向時第一畨到汴京皇帝同張邦昌来軍前為質我曽親自説與皇帝家國不要聽賊臣言語我道有一喻一似人家盖一个房子使椽柱瓦木盖得是好却湏住房子底人做主防水火盗賊若不㑹照管便倒塌了此時親自説與皇帝一一聽得却令趙平仲来劫寨事不成㬠損了他人當時便失信如今言語怎生信得某等云失信之事盡是前朝奸臣誤國皇帝雖親聞此語是時皇帝止是親王亊不在己皇帝即位以来未嘗棄信於大國譯者云這底只是怕你們不知又怕皇帝官髙職大後不記得也又問某云元帥問你當時不是曽隨皇帝来軍前麽某云是時先人仲通曾充國信副使同沈晦隨從肅王出使大國在燕京死節譯者傳達云逹蘭首肯數四譯云我這里説得話望你們到皇帝一一説某等云豈敢遺落一字湏一一奏知云某等皆是皇帝親選差来只是真實所以遣来懇告况今日既荷大國許和莫非至誠懇請尚恐不䝉聽從更豈可不任誠信某觀譯者所授言語甚多所説極少又毎人姓并地名只作漢語音料止是譯音不改至于姓名則不能變矣譯者又云你們説得却是只是難信某等云到軍前已是半月江南日夕望信臣子之心實不遑安敢望早定大計使某等歸報江南庶得生靈早有休息之期某云某輩非敢自為脱身大底國家安使人亦安若國家未安一身亦弗安譯者云元帥令你們且歸安下處候三二日左元帥到来商議了交你們去某等云此来荷元帥授館種種周備不勝感激惟望早賜台念復命江南遂退聿興云沈元用今在耶不在元用謂沈晦字某等云在又云見在何處某等云在浙中見任待制聿興云是同年聿興曽在宋朝沈晦第三甲及第後来却再與本朝取應来問某云侍郎是誰榜某云何渙牓又言今年本朝試進士出賦題是天下不可以馬上治某荅云此可見大國息兵之意天下幸甚又云這賦題是本朝張炳文侍郎出丞相見問是誰意思左右云事見前漢陸賈傳丞相遂令人用國書譯過其傳㸔後大喜遂與張侍郎轉兩官某等復云大國果有意偃兵修文豈惟江南之幸實天下生靈之福某等以聿興所説遣某等囘報前後反覆遷延不定某等恐誤國事遂以長書獻逹蘭云三朝北盟㑹編卷一百六十二
