body:
  text: 三朝北盟㑹編卷二百三十六宋徐夢莘撰炎興下帙起紹興三十一年十月十八日丁巳盡二十七日丙寅十八日丁巳擇日以興師奏告天地宗廟社禝丙辰降㫖金人敗盟朝廷不得已而興師合奏吿天地宗廟社稷等令禮部太常寺疾速條具申尚書省約束將來視師丁巳降㫖將來視師經由處排辦頓遞修治道路不得過為華飾勞民費力三省行下約束如有違戾仰監司按劾御史臺彈奏十九日戊午詔遣知樞密院事葉義問督視江淮荆襄軍馬中書舍人虞允文參議軍事兵部郎中馮方咨議軍檢詳諸房文字洪邁主管機宜文字遺史曰知樞密院事葉義問督視江淮荆襄軍馬以中書舍人虞允文為􅄁議軍事義問奏差樞密院檢詳諸房文字洪邁秘書省校書郎馮方主管機宜文字右通直郎知吉州廬陵縣葉行已保義郎新提㸃廣南西路綱馬驛程徐格幹辦公事義問再奏今照得前後宰執出使郎官已上多充􅄁議洪邁馮方乞改充􅄁議軍事太學生直學宋芑上葉樞密書書曰某聞漢文帝承積累之休中外帖然無事而洛陽賈誼猶有痛哭流涕長太息之書所達文帝者河南吳公先之也今日金人移都中原意在背盟東南二百州生靈之命垂于旦暮祖宗二百年社稷之危猶以一縷繫千鈞之重此何止為痛哭流涕長太息也耶某䝉被教育幾二十年于此憂國之計反不如洛陽一書生固無以自容于天地間閣下居本兵之地國之安危所繫今天下豈無䇿士可以賛廟謨者而閣下達士之心獨讓河南一吳公乎某竊聞金人窺伺東南之意三十年矣往者傾國來戰其志非止于利吾歲幣也及柘皋之戰諸將以死鬭順昌之危劉錡以死守彼之精銳卒死者十有九其約我以和者計誠出于不得已也朝廷失此一機不知乗勢滅敵以圖恢復之計而乃追還諸將甘心議和一時執政大臣偷安茍容為至甚其說稍有異已者排擯誅戮無所不至若以歲幣而輕與之和固已墮金人計中矣和議始定聞彼之主謀者舉酒相慶曰吾勢未張戰未必勝姑與之和而坐得重賂且可使之自困吾計今得矣欵以二十年後東南諸將不老則死西北兵馬銷鑠亦盡彼至用浙兵騎廣馬則吾徐起而求所大欲未晚也以此知金人今日之舉固已醖造于二十年之前矣朝廷不悟此意遂損東南數百萬以益之謂金人真與我和也父兄之讎遂日置而不問軍旅之議不至于廟堂者凡幾年矣彼國日富吾國日貧彼備日張吾備日弛吾之强弱彼誠有以料我矣前日去上京二千里而居我舊京夫金人豈輕逺故地而安居中土者哉蓋其三十年窺東南之意而其形已見于此矣朝廷尚且未悟和議之果不足恃去歲于侍從館閣下之臣論及敵情者隨以斥逐而防守之計漫不經慮是以信金人真為巡幸而無敗盟之意也謀國如此不已疎乎今聞使者在廷口傳敵意欲需我漢東江北之地及邀我二三用亊之臣俾來議事此其意又豈在于其地與其人哉挾難塞之情以啟釁我地不可割人不可遣則彼長驅而來耳借使今日割某地遣某人可以解彼三十年包藏之禍可以全吾二百年生靈之命在朝廷亦不足甚惜漢東江北之地既割矣他日又需我之吳蜀二三用事之臣既遣矣他日又邀我之親王朝廷能繼之乎能保金人之不來乎又聞其使者初見之日殿廷間已殺其禮止令驛中賜宴則是朝廷雖盡從今日之請而此事已忤其使者之意亦足以生釁矣况今日之請决不可從而可以生釁者非止一事也釁端已萌勢不可掩和議已叛勢不再合朝廷何不赫然震怒以逆折銳鋒乎為今之計不若誅其正使一人尸諸通衢以聲其叛盟之罪此不惟可以挫彼之强且可以激吾之弱乃釋其副使一人使歸吿其主曰吾與彼約和以來吾躬食淡傾内帑之儲以賂者三十年矣吾于汝無負矣汝貪惏無厭求我不已汝意不在得地將釁我也汝欲戰吾率三軍之士以與汝周旋若無厭之求吾不能聽亦使之知東南有人而示吾之不弱也然後下責躬之詔以播吿中外曰金人板蕩我中原墮毁我宗廟屈辱我兩宫發我陵寢屠戮生靈吾與敵不戴天之讎然吾包羞忍辱三十年間卑辭厚賂以饜金人之欲者吾非憚于用兵而忘此讎也上則以兩宫下懼其殘吾西北之民耳今兩宫北狩而不復四海皆知痛憤而金人又據我舊都毒我赤子需我淮漢要領之地邀我左右腹心之臣使我西北之民日不聊生東南之民未知死所天怒人怨至此極矣吾誓與天下上報父兄之讎下雪生民之恥凡前日中外之臣誤我以和議者無問存沒悉正典刑于是斵秦檜之棺而戮其尸貶竄其子孫而籍其資産以助軍以正其首唱和議欺君誤國之罪復岳飛之爵邑而録用其子孫以謝三軍之士以激忠義之氣詔下之日使東南之民聞之莫不感激流涕如此則師出之日吾之民將見人自為戰彼之民必有倒戈者矣願朝廷决意行之無少怠自今日以往由宰執而下以及臺諫侍從之臣則當自造于便朝由郎曹而下以及百職事之臣則當日㑹于都堂凡防守江淮之䇿圖取中原之計朝夕相與討論次第而施行之規模籌畫必定于浹旬之間以解東南倒垂之急以慰西北來蘇之望則天下幸甚邵宏淵及金人戰于西府橋金人萬户蕭琦取路滁州至瓦梁橋滁河不得渡執得土居百姓歐大者問之曰以何法可渡歐大因記紹興十一年韓世忠以數騎往定逺縣虛驚而回至瓦梁盡拆民舍作浮橋至是恐金人亦拆民舍作浮橋也乃答之亦有路自竹崗鎮可以徑到六合免滁河兩渡金人從之令歐大引路至六合而放回金人迂路半日故六合居人皆得奔竄是日金人攻真州邵宏淵方酒醉聞報大驚率衆相拒于西府橋宏淵命將官三人拒于橋上金人弓矢如雨王師多死城中百姓老小盡已驚移惟有看家强壯猶登城以觀者正争橋間金人載草掘土填河以渡三將官皆戰死宏淵顧金人已填河得渡率親隨軍人入城掩閽以拒故軍人皆奔于江上得舟渡江以免宏淵毁閘板退既陷真州不入城乃出山路攻揚州遺史曰是役也宏淵酒醉未醒實未入陣身在橋之東以麾將士遣三將在橋上占橋迎戰及其退軍也百姓閧然為之語曰邵太尉在西府橋當住金人矣揚州百姓則曰若非邵太尉在真州力戰金人揚州之人皆避之不及至有言宏淵馳馬入陣鏖戰出入數四血汙滿體其力戰迎敵之譽起于百姓後好事者不究其實為請立祠堂于二州可謂不虞之譽矣劉錡至揚州劉錡退軍至邵伯鎮已聞金人攻真州謂揚州無官吏矣遲疑未敢發㑹探者回報見揚州城上旗幟猶是官軍錡曰雖失真州而揚州猶為國家守當速速進乃自北門入見安撫劉澤以城不可守謂當退軍𤓰州錡令諸軍憇歇徐圖所向二十日己未金人攻滁州王彦克商州金州都統王彦發遣統制官任天錫郭諶等收復陜西州縣丙辰得豐陽縣戊午得商洛縣己未克啇州獲偽知州昭為大將軍完顔守能同知武騎尉馬彦千户信武將軍歡塔巴納齊勤金人聶赫番人楊大首金人阿嚕安逺大將軍阿古博廸蘇番人劉春金人髙羅索髙舒蘇并獲通事郭十一李全部落等知建康府兼行營留守張燾至建康府金人敗盟落職張燾致仕再起知建康燾聞命上道時金人傾國南侵自合淝徑趨厯陽人情詾詾燾以戊午至當塗見南岸全無守備亟申朝廷乞發軍馬前來捍禦乙未入建康建康居人驚移而去者十已五六燾既到人情稍安二十一日庚申王權登車船渡江葉義問朝辭楊存忠為御營宿衞使二十二日辛酉金人入和州王權以姚興戰沒和州不可守乃退渡江南是時金人已及近郊猶未知權棄和州而退軍也未敢逼城後軍統制韓林最後出和州乃縱火城中軍亂諠譁金人聞之曰南兵遁矣遂進兵奪和州入之二十三日壬戌劉錡退軍𤓰州先是邵宏淵西府橋失利毁真州閘板循河而軍金人自山路徑趨揚州屯于平山堂下宏淵不退在楊子橋南毁板而渡揚州居民皆傾城而奔壬戌劉錡乃退軍自南門外拆民屋為浮橋諸軍過絶即毁浮橋由河東而去錡令諸軍未至𤓰州七八里而陳火頭輜重悉先往𤓰州敵兵陷和州城中糗糧儲峙器械輜重盡委于敵敵乗勢奔突軍民自相蹂踐擁入城河及争江渡溺死者莫知其數將士憤怒號呼指船詆罵皆以權不戰誤國為言潰兵棄甲抱蘆束葦浮江而過得生者十存四五浮流而亡殁者又復二三深可痛傷淮南安撫劉澤棄揚州走是日劉錡以諸軍出揚州劉澤謂城不可守亦棄之而去奔于泰州漸往通州渡入平江府真和諸州退保則有公吏相隨具申到朝廷惟揚州無一字到朝廷亦不知揚移治去處以用兵詔避殿减膳詔曰朕徳不足以懷逺人致金人復背盟好勞我將士䝉犯矢石朝夕念之坐不安席食不甘味自今月二十四日當避正殿减常膳劉岑并御營隨軍都運使約束將來巡幸降㫖将來巡幸進發軍旅非泛支降錢穀除並隨行在所處分外其餘百司常程事依舊留臨安府行遣内不可决者即申行在所都遇權發遣濠州軍州事完顔亮入和州知濠州劉光時率濠州之官府居民悉移于横澗山寨州差到城中郎閣門祗候東南第二副將都遇守把亦隨光時在山寨至是光時被召遂以州事令遇權之既而朝廷亦令遇權發遣軍州事二十四日癸亥韓之純為荆湖北路轉運判官韓之純輕薄不顧士行之人也平日以浪子自名喜嬉遊娼家好為淫媟之語又刺淫戲于身膚酒酣則示人人為之羞而不自羞也知漢陽軍不為吏民所欽重汪澈以中司宣諭荆襄之純諂奉之澈問湖北漕臣李某財計事李某儒者據案牘行文移而已諸州財計則未嘗經心不能對之純知其然之純嘗為湖北總領司屬官粗知財賦所出納一日間見澈具言湖北財賦澈大喜之純乃諷漢陽士人詣澈舉其才許以重酬澈果薦舉之純除北運判填見闕有贓敗失官人王訓者居于鄂州南草市賣私酒起家妻女婢妾皆娼妓結託搃漕兩司屬官時復羣飲于訓家訓出羣娼以奉之汚穢靡所不至兩司公事獨訓占斷請囑鄂州人呼訓家為淫窟又呼為關節塌坊之純為總領司屬官時常往來訓家至是惟訓晝夜無間自此通關節請囑公事紛紛矣二十五日甲子張浚復觀文殿大學士判潭州湯鵬舉復資政殿學士知太平州星夜之任並不許辭免二十六日乙丑員琦大敗金人于皂角林金人已占揚州癸亥追逐劉錡有與官軍相遇者官軍拒退之乙丑金人大軍來争𤓰州渡左軍統領員琦相拒于皂角林金人以運河岸狹非騎兵之利稍退去初琦在潭州排岸司錡知潭州惟信用琦後知錡移荆南琦亦隨行中用琦為提轄衙兵錡移兵鎮江都統琦亦隨之及錡為置使乃用琦為左軍統領皂角林之役遂殺敗金人琦自修武郎轉左武大夫招討使劉錡申將帶軍馬見在揚州𤓰州鎮控扼水路西路于十月二十六日卯時以來探報得金兵數萬係髙萬户統率攻揚州界地名皂角林前來衝突某即時親率軍馬迎敵先遣左軍統領員琦將帶親隨馬軍自卯時在皂角林至揚子橋灣與金人大戰員琦下馬死戰二十餘陣首先破敵掩殺金人入運河及湖内約三千餘人金人又添生兵勢力加重某又遣遊奕中軍兩軍前去并力破敵某再率諸將誓以死戰自卯時至申時殺敗金軍横屍二十里活捉到畨人及奪到畨馬弓刀旗鎗器甲斫到首級不計數目三省樞密院同奉聖㫖令出曉諭劉錡㨗報到上曰劉錡在淮東屢㨗可謂與國家宣力可令宣撫問并賜荼藥器皿金五百兩銀七萬兩徧犒有功將卒等朕不得已興師使人人能如此向前立功將來凱旋王爵亦所不吝遺史曰是時諸處以報㨗旗趨行在者絡繹于道路市人為之語曰雖日聞報㨗可喜但一報近於一報亦可憂督視葉義問見報㨗有金人又添生兵顧侍吏曰生兵是何物逺近聞之謂督視樞密尚不識生兵而司三軍之政可乎當時謂之去去聲源樞密督視葉義問抵丹陽館二十七日丙寅劉錡還鎮江府分兵渡江劉錡在𤓰州四日無不戰錡恐諸軍之心不固乃遣人自鎮江取其妻子居于𤓰州以安衆心諸軍火頭有在江南者以舟船送糧食丙寅有金字牌到軍中召錡専在江南錡遂渡江歸鎮江府乗肩輿褰帷露面入鎮江府見其痩悴皆悽惨之色錡肩輿前使人撫諭居民不須驚惶各歸家照老小見留大軍在江北迎敵决可無虞其子無馬使人背之而行先是錡以王權淮西失利則淮東孤軍有腹背之敵恐不能守遂棄揚州退保鎮江留劉汜等一千五百人塞𤓰州渡以扼敵是時劉錡已病神氣尫瘁坐起不得行以兩人扶掖行府差李横代劉錡趙樽敗金人于蔡州殺萬户楊總管克蔡州趙樽在信陽軍也聞金人已至淮西樽曰此可以進兵擣其虛矣乃以己未渡淮庚申下褎信縣壬戌至新蔡縣女真令佐率衆迎敵樽一鼓破之獲偽令佐械送行在犒其軍而進甲子下平興縣丙寅栅于蔡州南二十里金人出兵背城陣方成列出敵不意于宿草乗風縱火鼓噪而進敵衆披靡樽呵止之率新兵衝擊斬其大帥萬户楊總管得其名馬精甲餘兵潰追奔入蔡州軍吏言簽軍助敵犯官軍應誅滅樽曰此皆王民出于逼脅非其樂從也皆不問整衆而入約士卒秋毫不得犯蔡父老焚香出迎見王師感激至泣下命張彦達攝州事樽提兵追躡至上蔡敵方蓐食聞軍聲亟遁去時御史中丞汪澈宣諭荆襄成閔徙屯應城得樽㨗報即馳奏行在且命樽提舉諸軍三朝北盟㑹編卷二百三十六
