body:
  text: 三朝北盟㑹編卷一百五十宋徐夢莘撰炎興下帙起紹興二年正月盡四月紹興二年正月車駕駐蹕紹興府車駕幸臨安府是時百司官府皆草創往往草舍以杭州州治為大内臨安府遷于奉國寺基十二日甲辰曹成受河南二廣宣撫司招安曹成執河南安撫使向子諲據道州朝廷有詔撫諭成如願赴行在即仰放散江淮等路兵民外有堪出戰人將帶赴行在聽張招討節制羣衆不願聽張招討節制詾詾欲亂河南二廣撫司都統制兼參議官馬廣昔為節制應援軍馬使駐軍大名時曽遣人往諭成成即納欵聽命至是馬遣使臣張布賫劄子欲招成成受招安乃放出子諲又乞差人知道州參謀范直方曰曹成不可招促之使赴行在馬曰彼既不願逺出萬一促之是促使散而為亂也不若招之藉以為用宣撫使吳敏惑直方之議馬與直方入議狀馬議曰曹成自去年十一月二十九日襲攻安仁縣劫掠財糧執安撫向龍圖入道州某䝉宣相公令當面口念語言冩成諭撫曹成一行人馬劄子差使臣張布齎去投下却於今年正月十二日曹成差使臣劉睿機宜馮志與張布同來稱放出向龍圖乞差人知道州又在准備將領魏富賫到申狀開具所准樞宻院劄子及詔書内事件并説日内願得相公指差差一去處某觀敵人之情既懼逺赴行在且畏屬張招討羣情詾詾思欲開散雖曹成有不得而制之者大衆一潰為患難量某已將所差到馮志等説諭禍福示以相公恩威信義使之解甲聽命馮志等莫不欣喜順從願候使司分擘使喚某所請聽彼歸降願約衆上下悉與安排無令失所某提軍馬親至道州入曹成軍中撫定分撥㨂選強壯添𨽻五軍聨齪隊伍進兵長沙制服馬友上副朝廷委任相公之意下安三路驚擾失業之民止是二月中可以就緒若失此機㑹不惟湖湘重困大繫朝廷之憂師老財殫無以善後上負朝廷之責下起兵民之怨雖欲保身不可得也某職在都統此敵人開闔之時正在亟欲以弭禍難伏乞相公詳酌二者之議究其是非斷决歸一或罷某都統制放歸田野或止絶參謀横議無為含糊以誤國事敏曰奈何參議是故人某退曰聽用故人之言不采其論可與共事乎望日以詩獻敏有曰未敢此時非趙括已愁他日類田豐遂辭職拂袖歸卧山溪敏遣追之不復還或聞馬去又數日敏以資學宫祠之命到城即復散亂湖廣被其害直方得郡而去遺史曰是時王次翁時在廣右二詩曰徙薪曲突論無憑太尉山中混耦耕頭額爛焦曽未録參謀先已享專城近來出處事何如先輩風流掃地無忽有子充驚末俗一言未契便長驅楊惟忠誘楊勍而殺之楊勍初曽䧟處州作過後隨朱勝非在吉州聚兵其心腹反屯于吉州朝廷命楊惟忠與勍叙同姓之歡邀勍㑹伏兵誅之遂併其軍亦有奔潰而㓂河南者張俊加檢校少保定國軍節度使沈與求為御史中丞制曰御史中丞執法上以廣人主之聰明次以肅朝廷之紀綱非通逹國體特立不囘未有能任厥官而厭輿論者也具官沈與求學識精敏性質端方簡自朕心周歴三院比從郡寄再陟臺端不吐剛而茹柔每閉邪而陳善謀猷所及啓沃滋多進長霜臺益觀逺業當使羣工庶尹知風憲之尊君子小人適消長之分時爾之賴往其懋哉遺史曰與求自侍御史除御史中丞時軍儲窘乏與求極陳屯田利害為古今集議上下二篇上之又禁衛單寡兵權不在朝廷與求上言仰惟陛下移蹕東南將圖恢復之舉先務之急宜莫如兵漢有南北軍唐自府兵彍騎之法既壊猶有内外諸鎮之兵上下維持使無偏重之勢其意逺矣今圖大舉而兵權不在朝廷雖有樞宻院及三省兵部尚書兵部但舉行文書而已願詔大臣講求利害而舉行之使人情不駭而兵政益修􅂇成經理中興之志二十三日乙邜岳諒臣知滁州先是權知滁州梅俊廸為王才所殺鎮撫使劉綱乃以張格非權知滁州也格非字正夫濮州人先權清流縣丞俊廸權知州也格非權通判格非權知滁州日嘗呼虞候陳用一聲不應即命斬之人皆股慄格非在滁州郭仲威餘黨犯境格非以腹心數十舟依山險以避之往来于城中而已其在城中也即以厚賞募人發掘窖埋遺物其所得甚多清流縣吏許原以女獻格非格非寵愛之乃用原為腹心使原往行在料理得正任付身并鑄州縣官司印記原取太平路歸遇賊被殺勅與印記不知所在時州境稍寧息江東安撫大使葉夢得乃奏乞差岳諒臣知滁州以代格非格非受代厚載而行至烏衣諒臣已給枷在烏衣市榜曰枷張格非格非懼棄舟而去於是所齎之物復歸官庫諒臣聞鄉村尚有食人者命捕之一日捕到六人諒臣曰如何得食人曰無糧可食諒臣曰汝知罪乎曰自知必死乞快死而已諒臣曰吾貸爾死爾為我捕捉周智張九最嗜食人者六人曰願執之以獻諒臣問其期曰期以旬日諒臣許之六人者旬日内果執周智張九至諒臣詰之無異辭即日凌遲處斬于市中自是食人者遂止諒臣清介自守惟一友僧隨行郡事之餘多瞑目獨坐滁人久猶思之二十五日丁巳宣州火韓世清屯于宣州其部兵多欲作過者先是賣蒸餅者皆呌云一箇二五裏外一般盖言一箇賣二十五錢裏外皆是白麫也數日間人多驚惶或傳韓觀察軍中人欲自西廟巷放火為號内外皆火劫掠民財者至日西廟巷果先火倐忽城裏城外皆火世清往來彈壓遂不至劫掠實正月二十五日也州人始悟一箇二十五裏外一般謂是世清部曲之暗號知州李彦卿宻遣監税趙令告之于朝遂有李光王燮之行二月吏部尚書李光為淮西招撫使王燮副之李光王燮除淮西招撫使副謀取韓世清也翟琮襲金人于絳州垣曲縣敗之金人侵陜西翟興令其子琮乘隙潛渡黄河襲金人于絳州垣曲縣敗之知商州軍州事董先叛附于偽齊董先字覺民洛陽人初從翟興軍與金人戰勇敢為多先是李興以節制軍馬屯于商州也㑹先有耿氏之廹來依于興興釋其禍先感之以兄事興俄翟興俾先知商州先中心慊之宻有害興意因尊酒間伏兵甲執興于座中以制司之命械興令蘇堅衛送至制司欲於中途殺興行方兩舍宿山林庵舍中興夜夢若神人告之使去既覺則羣卒熟寢興乃荷械而去逮曉至洛南農家人識之咨嗟熟視遂破其械以糗糧送興使逺去興之二子一女二妾羣婢與表弟崔三舍人皆被害興既脱復得麾下舊兵千餘人徃來商虢間先既與興為仇而劉豫勢亦漸盛且侵于商先遂以商州叛附于劉豫三月一日壬辰朔李光王爕執韓世清于宣州送行在所李光以淮西置制使往淮西措置羣盗王燮為副二月晦日到宣州東門外下寨有韓世清下壕寨官白世清不可出城世清問其故壕寨曰李尚書往淮西而下寨甚嚴非過軍也必有謀耳世清曰我何罪是日以朔旦出城見光就留之乃曰得㫖揀軍欲往淮西可批報諸軍令素隊出城以備㸃揀世清欲上馬馬已牽去世清不得已遂批報諸軍令素隊出城於是執世清以歸沈與求上言乞郤諸軍將進物是時大將入覲有進繒帛方物者用分賜六宫御史中丞沈與求上言以謂此事雖㣲自政和宣和以來進獻稍侈今艱虞之時不宜有此乞斥還之上嘉納仍降札奬諭與求於是兩浙轉運使徐康國自温州奏𤼵宣和間所製間金銷金屏障什物上命止之而康國已津發至行在所與求奏曰吾君勤儉徳侔大禹漢文帝以下不足道也異時駐蹕廣陵有進器用華靡者亟命焚之通衢今康國不識事君之禮尚習故態欲以㣲物累盛徳乞用廣陵故事斥而焚之乃顯斥康國明示好惡且為小人希㫖之戒從之七日戊戌霍明殺桑仲于郢州桑仲以屢敗于金州乃移文郢州會霍明攻金州曰金州草㓂遮道盡當勦除明不從毎報之曰不知金州草㓂遮道主名為誰仲隂怒之且有殺明之意明以措置郢州頗有條理市井買賣漸有向生意近城多種二麥亦有戀郢之心仲以六十騎徑趨郢州先以二十騎疾馳入城四十騎尚未到仲毎下馬必梳頭為明所殺拘二十人入獄令供仲反狀以報朝廷初有譖隨州官吏侵欺官物入己者仲乃令於洪山磨院置獄取勘周節推以下官十餘員盡被追攝枷拷不勝其苦伍㸃檢者實主其事後仲遣伍㸃檢往朝廷得空頭官告二百道由徳安府雲夢縣歸而周節摧者為知縣時仲已被殺周節推以被勘拷掠之􅁈遣人殺伍㸃檢于路而官告莫知所在仲在襄陽也以趙去疾為通判仲死李横為鎮撫使去疾猶為通判後勸歸朝去疾被召見上問桑仲如何人去疾曰忠義人也上問其故去疾曰臣嘗見桑仲為臣説必欲取東京獻朝廷只待乞兩箇文官與二子上惻然感動命特與仲二子文官楊沂中為神武中軍統制楊沂中字正夫代州人子弟所試弓馬合格出身知麟州死事宗閔之孫麟州建寕縣死事震之子也王㓂屠宿州王彦及董先戰虢州界自此王彦及董先屢戰矣二十二日癸丑偽齊以兵犯翟興中軍興力戰死之先是偽齊劉豫嘗遣偽廸功郎蔣頤持書傳敵語以王封誘翟興興叱之曰我大宋臣也豈肯受敵之偽命不啓緘而焚敵書戮頤于市豫計不行復誘興麾下禆將楊韋泉潤隂約内應以謀害興是日豫兵徑犯中軍寨興親迎賊與戰遂䧟重圍中賊奮擊之興力戰不勝墜馬遇害年六十四月桑仲為神武右副軍統制先是桑仲遣人告朝廷願宣力取京師乞朝廷出兵于淮南為聲援朝廷信之議以大臣為都督遂大舉兵即以仲為神武左副軍統制是時仲已為郢州霍明所殺矣劉豫䧟夀春府劉豫偽左丞相張孝純罷以偽右丞相劉麟獨秉政李横以兵圍郢州霍明殺桑仲于郢州也襄陽走報鄧州李横横初未信三報方信横遂令其衆盡縞素李道在隨州亦縞素皆率其衆㑹襄陽之兵盡着白衣戴白巾圍郢州聲言為桑仲報仇誅韓世清世清屯于蘄州嘗欲立趙令俊為皇帝不克及宣州火被執至行在坐前罪誅之三朝北盟㑹編卷一百五十
