body:
  text: 三朝北盟㑹編卷一百二十宋徐夢莘撰炎興下帙起建炎三年正月盡二月三日壬子建炎三年正月車駕駐蹕揚州翟興為京西北路馬步軍都總管兼安撫制置使兼河南尹兼西京南北路招捉使翟興為京西北路兵馬鈐轄與楊進戰於鳴臯山下翟進死之興以其事訴於朝乞選重臣鎮守朝廷就命興本路馬步都總管兼安撫制置使兼河南尹兼京西南北路招捉使京西留守杜充遣王漢説翟興使圖楊進楊進據河南府以留守司命為知河南府與翟興屢戰進於鳴臯山之北深溝髙壘儲蓄粮餉謀為乆計已有僣窃之意詐言入雲中府復奪淵聖皇帝及濟王歸欲揺動衆心然後舉事杜充乃遣王漢詣伊陽縣見翟興説興使圖之直檄報楊進置乘輿法物儀仗悖逆顯著翟興破賊自此益力與子崇率鄉兵時出擾之戰無虛日矣六日乙酉劉誨王貺奉使金國回先是已遣宇文虚中楊可輔為祈請使副使於金國再議遣宣議郎借中大夫試户部尚書劉誨通問使拱衛大夫合州防禦使王貺副之誨等到京師遲遲其行上聞之命留守司促誨等行到金國金國并命祈請使人宇文虚中楊可輔偕到行在誨字廷誨開封人金人陷青州金人薄青州晝夜攻擊凡一十七日丁亥城陷焚燒屋宇殆盡殺掠無遺時權知州魏某被害金人陷濰州金人既陷青州即率兵攻濰州又陷其城焚燒殺掠而去軍卒閻臯據濰州自稱知軍州事金人既退濰州而去牛頭河土軍閻臯與小教頭張成鼓衆占濰州臯自為知州以成為昌縣知縣十七日己丑遣祈請大金國信使李鄴周望等汪伯彦時政記曰是日内殿早朝奏事畢上語宰執曰第四次祈請大金國信使副李鄴周望宋彦通呉徳休宜早令進發與定日使鄴軰知之朱勝非曰奉使湏得賜金帛方能辦私覿李鄴周望已見辭免所進官職耻更自乞支賜恐未能便行上曰於格合得自請何傷黄潜善曰朝廷當為檢舉只今行下上曰朕奉使時當京城擾攘受命出門都不曾請支賜朕於王府自出隨行起發之費約支錢五萬餘貫如士大夫之貧如何可辦令鄴等依格支賜外仍復優加其數國家愛惜財物正為収積以待當時之用今遣使議和事若遂成二聖得歸朕豈吝金帛之数潜善曰第二第三次奉使劉誨楊可輔王貺歸自軍前皆云金人受私覿物又非昔比更無囘荅雖貪餮者衆不敢少忤其意􅂲生事造語有害和議今遣使支賜加數甚善上又曰卿等今日徃仁壽寺奉安㑹聖宮御容早歸私第潜善與􅁧了大金元帥書令鄴等早行潜善曰與元帥書自來只是平文不用四六上曰潜善早來所􅁧與大金皇帝通問書其詞語甚精能冩朕欲言之意足矣不必湏四六也十二日辛卯邵興敗金人於潼闗克虢州邵興敗金人於潼闗乘勢收復虢州李彦以興知虢州軍州事十六日杜充出兵攻張用等不勝張用相州湯隂縣之弓手也乘民警急呼而聚之與曹成李宏馬友為義兄弟有衆数十萬分為六軍成太名府外黄縣人因殺人投拱聖指揮為兵有膂力軍中服其勇又有王大郎者名善濮州人亦有衆数十萬分為六軍善初為亂也濮州弓兵執其父殺之善有衆既盛乃以報父讐為辭攻濮州不下又攻雷澤縣亦不下與用合軍皆受留守宗澤招安既而復反杜充為留守又招安屯于京城之南南御園為中軍善屯於京城之東劉家寺為中軍又有岳飛桑仲馬臯李寳諸軍皆屯于京城之西充以用一軍最盛終必難制乃有攻之之意甲午充掩不備出兵攻用令城西諸軍皆發岳飛桑仲馬臯李寳等皆率兵至城南以擣用覺之勒兵拒戰亦㑹善自城東率兵與用為應官兵大敗賽闗索李寳被執岳飛者初𨽻張所营効用飛随都統制王竒徃太行山遂自為一軍後歸京城留守司杜充用飛為統制劉洪道知青州先是濵州葛進作亂殺官吏刼財物取強壮充軍留守司差尚大猷知濵洲進依舊屯於濵州以其衆皆靣刺十字曰永不負趙王誓不捨金人以示衆葛進嘗率衆刼潞縣金人寨得劉洪道者字資深青州人進士及第曽任楚州州學教授監六部架閣庫先遭金人驅擄在潞縣寨中進以洪道歸濵州俄報青州有将兵之變安撫使曾孝序被殺洪道説進令申聞朝廷及申留守使乞已知青州進然之遂與大猷同具申既而留守司囘報果令洪道知青州洪道未行㑹金人殘破青州殺權知州魏某而去趙勝據其城洪道乃移文與勝而後行至千乘勝聞洪道至失措即馳至千乘謂洪道曰但交割本州民事而已軍馬公自統之勝喜洪道索從道等具衞儀而入遂為知州洪道掲榜百姓在軍中願歸農者給據放還於是勝之黨十去六七而勝之勢弱矣有崔邦弼者子弟所出身仕青州因勤王不到京城而囘還不出洪道尋致之為将官賜青州劉洪道奨諭勅書爾履百戰之軍鋒保一方之生齒訖臻寕謐備見忠勤然方面之權豈容或二軍中之令尤在至公必惬輿情方收羣力儻習因狥之弊坐乖綏禦之方無以馭戎便成誤國其體倚毗之意無從牽制之私張俊請移左藏庫於鎮江府不報金人陷徐州知軍州事王復被殺金人将攻揚州先陷徐州入其城知軍州事王復死於庭下有将校趙立者為州衙排軍𤼵憤鼓率將兵殺退金人出城立被傷金人以為死矣立在草莾中夜得㣲雨漸復蘓金人往揚州而軍民鄭詩秀才權知州事既而軍民衆議以謂立忠勇能辦事可以為城民之主乃請立權知州事聞于留守司授立武徳大夫兼閣門宣賛舎人知徐州軍事二十一日庚子禁百官搬家出城邉報屡至朝廷未有禦之之䇿宰相潜善伯彦殊不介意人皆危之有搬徙出城為避難之計者潜善伯彦慮恐揺動衆心乃禁百官搬家出城市井驚惶益不安矣張守為起居郎張守以殿中侍御史撫諭京師還行在面奏金人必來願陛下早圖之毋使宗廟生靈坐罹塗炭上為之惻然即除守起居郎張用王善㓂陳州馬臯追之官軍戰敗張用王善在京城下與官軍戰既執李寶乃為杜充終有疑心不可留連率衆南至陳州充遣馬臯追擊乏用猶未知也約軍㑹教塲排列忽報京城有軍至臯率衆乗其不備直犯其中軍後軍奔至曹城寨為城所遏皆止用復與善等併攻官軍官軍大敗尸填蔡河人馬皆踐尸而渡追至鉄爐歩而還官軍存者無幾葛進衆㓂青州劉洪道知青州於金人殘破之後市城焚戮殆盡而諸邑富饒洪道招輯百姓不旬日間喧隘城市葛進為洪道知青州盖因己所致且趙勝已死而輯治漸有條理欲取青州乃率衆同向大猷至城下洪道曰葛進之兵皆衣下擐甲此欲襲取其城耳遂闔扉不納以酒肉米麫鈎城下犒其衆進不受遂攻北城而據之洪道以軍民居南城拒守韓世忠退屯宿遷韓世忠屯於淮陽将㑹山東諸㓂以拒金人金人尼堪方圖維掦大舉兵自京東入侵至滕縣聞世忠扼淮陽恐稽師期分東南道都統兵一萬先至掦州以議事為名使上不得出掦州然後大兵繼至或謂肅王在軍中同其事未詳尼堪以大軍進迎世忠世忠不能當夜退於宿遷縣未曉至宿遷不虞金人踵襲其後質明覺之奔于沭陽遺史曰韓世忠在沭陽夜寝不安與其帳下乗夜渡潮水大棄其軍由沙路走塩城翌旦諸軍方覺知以主帥既去遂皆潰散後軍管隊官李彦先率本隊四十七人得二舟入海聚衆自此輔逵聚衆於漣水李在據高郵皆世忠之兵也其收散卒自為徒黨者不勝計知淮南軍某叛附於金人韓世忠既退淮陽軍也金人已到城下知軍某望風投拜金人入城執某而去淮陽無知軍有将校二人自權知軍據城折可求以麟府州晋寕州軍叛附於金人三十日己酉閆瑾棄泗州率衆走金人自滕縣直趨臨淮縣盖金人装鉄騎白氊笠子閆瑾屯在泗州初聞京東羣㓂不寕至是探者囘以謂白氊笠子劉忠賊馬犯臨淮或謂是李成從黨瑾以兵進之遇逰騎一二千人猶未知是金人瑾𫉬數人以歸騐之乃金人遂觧生口一二人赴行在己酉金人及泗州境瑾率衆出奔金人徑趨泗州之上數十里間計直渡淮二月一日庚戍朔金人攻楚州知州事朱琳叛降於金人金人侵淮以支軍犯楚州知州事朱琳其欵状遣人迎降開西北門納金人開東門放居人自便居人争奔欲走寳應縣取掦州路渡江金人覺之皆邀囘城中尼堪自東平由襲慶徐泗以犯揚州節要曰自建炎二年秋鄂勒歡既破五馬山寨以探知大軍南來使人馳㑹尼堪共備之故尼堪留烏舍伊都守雲中率衆南下也尼堪初下太行由懐衞将欲東㑹鄂勒歡而聞馬政敗於青州鄂勒歡從而入戰由是尼堪以渡黎陽以攻澶濮既陷時杜充守東京金人西來决大河阻之敵不能西乃東㑹鄂勒歡衆同陷北京繼攻鄆故至是由泗以犯掦遺史曰是時邉報屡至市井皆知金人兵将至者而宰相黄潜善汪伯彦禁止街市不得扇揺邉事亦不許士庶搬挈出城二月朔夜閆瑾觧到金人生口朝廷以内帑所有通夕搬挈翌旦駕御舟泊河岸居人驚怖不知所為上即欲南幸潜善等勸且候報得實渡江未晚也是日遣兵出西門禦敵士氣不銳人無闘心在職百官皆欲奔竄是夜江都縣前火二日辛亥閆瑾為其將姚端所殺閆瑾退兵在洪澤鎮姚端簒殺之是日也掦州士民漸有出奔者官司不能禁止是夜城中火起凡四處三日壬子金人陷天長軍朝廷以邉報急方出兵徃天長把隘金人又圍天長官軍潰散是時上遣内侍鄺詢徃天長探事審知是金人即時奔還潰亂人與軍人闗報皆馳而去猶未知是金人也詢既囘乃知端的上大驚决意渡江車駕發舟渡楊子江幸潤州上得鄺詢不移刻出揚州都統王淵内侍康履等数騎從過市市人指之曰官家去也俄有宮人自大内星散而出城中大亂宰相潜善伯彦自都堂鞭馬而去軍民争諸門而出死者不可計數上行次楊子橋見一親事官𤼵言不遜上掣手劍親殺之行至𤓰州鎮得小渡船即乘以渡江至西津口坐於水府廟中取劍就靴上擦血百官皆不至䕶衛禁兵無一卒從行者鎮江府官吏聞之知軍府事錢伯言𤼵州兵迎請幸鎮江少頃漸有百司人得舟南渡者夜上宿於府治宰相從官皆議幸杭州未决而聞禁衛涕泣且籍籍相偶語上驚命朱勝非及官軍左言傳㫖問所以勝非呼之前使言厲聲傳問皆以未見家属為辭即諭之曰已有㫖分遣舟船専渡衛士妻孥矣衆帖然因問車駕去住利害衆曰聼聖㫖無敢譁者乃諭以駐蹕定當録扈從功勞優賜賞給遂皆欣諾上問有近上宗室否時士霦為曹官或以名對遂召士霦同寢天氣稍暄脱綿背心以賜霦金人入揚州揚州百姓謂上渡江萬人争門而去見金人逰騎到乃喧呼言我揚州有主矣遂家家備香花投拜金人入城問上所在衆曰渡江矣金人乃馳𤓰州望江而復回官軍吏民死者數十萬先是宗廟御器國家府庫軍庫儲積及勢貴之家装船欲渡江至爪州閘潮水不應而金人已至出閘得渡者百無一二其餘皆遭擄掠不盡者悉縱火焚金人屯於摘星橋下是時簽書淮南節度判官㕔公事呉某權州三朝北盟㑹編卷一百二十
