body:
  text: 三朝北盟㑹編卷一百三十七宋徐夢莘撰炎興下帙起建炎四年二月一日甲戌盡四月十四日乙酉二月甲戌朔責郭仲荀張思正滕康劉珏酈瓊以其衆降於劉光世初京城失守光世以其衆奔至光州留其壻劉紹先以兵三四千屯於光州知州任詩厚遇之酈瓊以其衆㓂固始四面攻擊知縣向宗輝盡力捍禦時􅈠官吴翼權知光州議請紹先解圍固始紹先率兵趨固始為瓊所敗紹先率其衆至城下呼宗輝開門宗輝開門納之紹先以其衆登城用强弩禦瓊殺傷甚衆劉光世遣人招瓊瓊受招安圍凡四月零二日瓊相州人崛起於兵火中尚氣敢為衆所推服宗輝恃有功以吴翼􅈠官不相下翼招宗輝至光州羅織罪送獄死初羣賊黄林犯固始翼往招之林受招任詩以翼有功令權通判詩既去翼遂權州事楊世雄以其衆降於劉光世傅選詣隆祐皇太后乞降傅選自潰散即率衆轉入湖南刼掠厭所欲矣遂復來降十三日丙戌金人屠杭州退兵金人侵入烏珠率衆追乗輿親至眀州而還其在越州也烏珠乗馬往來於市中班直唐琦憤怒以石擊之不中被執罵不絶口亦罵李鄴降敵不忠被殺烏珠執鄴退還杭州将退軍唐辰歛軍於吴山七寳山遂縱火三日夜煙焰不絶癸未夜火息甲申縱兵大掠且束装丙戌退軍以虜掠輜重不可由陸遂由秀州平江取塘岸路行沿路屋宇無大小並縱火靡有孑遺是時餘杭縣投拜官員曽􅘔已奔走得脱聞金人退去乃復來囘任且衣凶服縣尉楊汝為問其故􅘔曰遽失恃汝為曰何不解官丁憂􅘔曰未聞㫖汝為唾而不語既而具申監司遂放罷服除授通判鎮江府軍民曰是餘杭縣投拜者不納又論罷之再授通判婺州亦不過赴任自此不能出仕衣冠以為愧金人在江州未退兵也在衢州軍事判官錢觀復者以當路衝白郡守縱民老幼出户留一丁不留與留而瘦弱不堪任罪如軍法其後軍兵欲乗時為變顧城中金帛子女無兾獲乃止賜臨安府民兵撫恤勅書勅臨安府民兵省本府奏自金人攻陷府城内外軍民併力拒敵血戰五日方始城破又緣諸縣村堡防䕶嚴密往往多被掩殺緣此怨恨臨行之日焚焼屋宇城郭一空比之其他殘破州郡被禍尤酷實可痛惻欲望優加撫恤事朕惟北敵之慿陵奄及東吴之都㑹爾等挺身禦敵為國忘生率爾忠義之豪挫彼驍雄之氣逮逾累日方失堅城凡分塢壁之屯皆奮兵戈之鋭緣兹厚毒為我深仇洎敵騎之旋歸舉民居而焚蕩靡思人怨而神怒惟務井堙而木刋言念吾民重罹此禍顧瘡痍之未復毎寤寐以興嗟已遣守臣往宣恩意其各從於安集以待承平故兹撫恤想宜知悉春暄汝等各比好否遣書指不多及十四日丁亥聶淵入京師留守上官晤出奔淵以城獻於金人河南之地盡已陷沒西京南京金人皆屯兵唯京師與内縣猶為國家守粮食之絶四外皆不通民多餓死聶淵者與其徒十十五五以食物與守城者博易久而頗稔熟至日淵以其徒數百人登城之北壁縱火樓櫓猶不敢下城騷擾是時城之東有夜猫兒李潰蘓大刀屯駐留守上官晤皆招入城既入城則放火刼掠不止而淵亦掘㫁城慢道自守城中亂晤及副留守趙倫乃出奔晤為留守時官司命令不能行留守司名存而已劉豫以濟南府已投拜金人矣豫嘗遣使説晤令叛晤焚書斬使頃之豫又賂晤左右喬忠恭宋厚俾説晤晤亦不從豫知晤不可説乃止淵遣人往南京金人軍前獻京師三月金人大太師差鎮國郎君入京師駐於朱雀門上給牌子與在京强壮不滿萬人自此京城遂陷失晤在唐門遇董平平逼令晤書填官告訖殺之金人得京師以前都水使者王䕫為留守䕫發公文盡招諸縣頭目人皆來撫諭自此無盜賊淵河北簽軍首領也十七日庚寅鼎州武陵百姓鍾相反鍾相鼎州武陵縣人無他技能善為誕謾自號老爺亦稱天大聖言有神通與天通能救人疾患隂語其徒則曰法分貴賤貧富非善法也我行法當等貴賤均貧富持此説以動小民故環數百里間小民無知者翕然從之備糈相謁旁午於道謂之拜爺如是者凡二十餘年相緣其家貲鉅萬中間累曽敗露有司受賄不能盡法繩治至是金人䧟潭州孔彦舟入澧州相乗人情驚擾以拒彦舟為名聚衆於是日起兵鼎澧荆南之民響應是時鼎州缺守臣湖北提刑王彦成先挈家遁廵歴岳州單世卿奔龍陽就家属登舟東下僅以身免其餘官吏莫能控制敵遂猖獗焚官府城市寺觀神廟及豪右之家殺官吏儒生僧道巫醫卜祝及有讐隙之人謂賊兵為爺兒謂國典為邪法謂殺人為行法謂刼財為均平病者不許服藥死者不許行喪唯以拜爺亂常為事人皆樂附而行之以為天理當然鼎州之武陵桃源龍陽沅江澧州陽安萍鄉石門慈利荆南之枝江松滋公安石首潭州之益陽寧鄉湘隂安化峽州之宜都岳州之華容辰州之沅陵凡十九縣皆為盜區矣十八日辛夘金人陷秀州權知州軍事趙士醫死之金人陷秀州軍民共推兵馬鈐轄趙士醫為知州士醫出城與金人戰為其所敗士醫死之秀州遂陷十九日壬辰程昌㝢棄蔡州南歸程昌㝢自京師退還蔡州未期月又以蔡州粮食皆盡王命不通遂領率軍民棄蔡州而南歸二十二日乙未宣撫使周望棄其軍奔於太湖周望以宣撫使駐於平江府聞金人已破秀州漸入吴江縣恐怖畏怯即委軍而去走入太湖遺史曰望方出城而去也市人遮道請留為一城生靈計既不可留則極口謾罵望聞而不顧於是市井間皆喧誦初除望簽書樞密制詞曰腹心留侯髙祖肇基於有漢文武吉甫宣王復振於宗周夫非躬不世之全才何以濟中興之逺業賢者登用國其庶幾謂望何以當此知平江府湯東野棄城走知平江府湯東野見周望已出即以府印授郭仲威俾權知府事遂率家属棄城而走二十三日丙申李成陷舒州李成犯舒州劉文舜率兵迎戰為成所敗文舜盡率其衆走權知州鄭嚴亦走入山中成遂入舒州得前秘書正字李雱雱以王命不通金人在江浙間妄生向背心遂以為一時之英雄投書於成請順流而據金陵號召浙江以觀天意成不從留雱於軍中成執前提刑李著見任提刑以下及州縣官百餘員皆居於太平寺其徒有執鄭嚴而至者成命殺之車駕自海道歸駐蹕浙東降徳音朕自遭敵國之侵越在方隅之外且念二聖徂征之久懼四方荼毒之深不辭痛屈於𦕈躬庶或少囘於善政毎辛勤而遣使惟祈和好以休兵謂既殚誠亦須悔禍乃狃慿陵之勢専行暴蔑之威跨萬里以長驅分數途而並進悉提羣醜徑渡長江朕惟子視於生靈何惜身臨於行陳遂下平江迎敵之詔即為景徳親征之行誓以六軍期於一戰㑹近境已成於對壘而羣臣堅請於避鋒勉馭舟師來臨海道既阻兵之理極致率土之憤盈念祖宗涵濡之恩痛社稷瘡夷之恥鄉豪競奮禁旅争先始金陵殺獲之相當繼鄞水𠞰除之幾半或驍將大誅於淮甸或竒兵邀擊於江西捷奏既騰凶威遂屈今則移師逺去闔境皆清朕惟駐蹕於浙東将即返兵於吴㑹乗中原已振之氣復列聖無窮之基嘉與函生再為樂國言念承平之俗重罹蹂踐之烖妻孥隔絶於封疆肝腦縻捐於原野禍非汝咎痛貫予心今雖幸免於干戈豈𫉬盡安於田野止俟扞防之暇祛除征賦之煩雖誠意之未申豈沛恩之可後宜布哀矜之恵用蘓凋瘵之民於戯厯數之在舜躬顧朕豈堪於克紹謳吟而思漢氏賴兹可致於中興况今丕應之邇遐與我實同於休戚勉圖逺畧茂對宏休二十五日戊戌金人陷平江府周望湯東野既已棄城而去城中無主丁酉夕火𤼵者數處百姓驚惶乃曽班郭仲威縱火也戊戌金人攻盤門仲威遣七防禦者當之七防禦大敗退入城中金人襲之亦入城仲威率衆奔常熟縣是夜金人縱火三日夜乃㓕城中悉為灰燼金人雖不甚屠戮居人自赴水火而死者大半矣庚子金人行趙立加右武大夫徐州觀察使知楚州軍州事兼管内安撫使淮南東路兵馬鈐轄仍兼便宜閭勍在越州途中朝辭日朝廷合齎告授趙立官職差遣自是勍到楚州以告授立金人逼荆門軍劉超率衆去劉超守荆門軍聞金人自江西囘軍遂棄城引衆去趙瓊受楚州旗牓歸朝廷先是宿遷縣水寨首領趙瓊已投拜金人楚州進士國奉卿借補成忠即權知淮隂縣事嘗欲招瓊使復歸朝廷與楚州共扞禦㑹趙立來知楚州奉卿見其參謀陳适與語楚州事适甚喜薦於立奉卿為立謀招瓊立即令奉卿齎旗榜親往見瓊瓊受旗榜遂聴楚州節制奉卿還報立大喜加借奉卿秉義郎奉卿曰奉卿本是進士今為武官不能出戰恐悮使用乞換文資立令照學籍果然遂改借宣教郎令措置髙郵軍二十九日壬寅郭仲威率兵入平江府郭仲威在常熟聞金人已行離平江府率衆復入城斸掘人家窖埋之物縱軍擾民民不堪之凡民家所有悉為仲威之黨所攘奪三月癸夘朔陳思恭敗金人於吴江陳思恭𨽻周望為統制望奔太湖思恭軍於青烏鎮金人后軍泊於吴江縣下臨太湖石岸險狹思恭乃以兵邀之金人舟亂不整思恭獲小勝而退孔彦舟率兵入鼎州孔彦舟初名彦威為東平府鈐轄與知州權邦彦不協彦威與一宗女私通事露邦彦欲按𤼵之彦威遂率衆去邦彦追及彦威射中邦彦乃還彦威遂改名彦舟聚衆漸盛轉至京南又渡江據澧州彦舟出兵攻討常不勝鍾相反於武陵也常輕視彦舟是時鼎州城守孤危官吏軍民勢不𫉬已遂迎請彦舟入城以拒彦舟許之方離澧州而吴么郎陷澧州殺知州王琮以下官属十數員彦州前軍三月癸夘入鼎州即縱官吏軍民占用官私倉庫刼掠民財焉盧益權知三省樞密院李囘權同知三省樞密院往從衞隆祐太后初上在濟州隆祐太后遣李囘往勸進上即位除囘延康殿學士知洪州臣僚言其靖康間守黄河棄軍而走且受張邦昌偽命為尚書右丞遂責吉州安置至范宗尹薦其才乃召為權同知三省樞密院往䖍州迎隆祐太后肆赦州縣先是上幸海道如浙西江東西淮東西湖南北諸州皆命令不通亦不知翠華端的所在及赦到知駐蹕浙東無不欣喜知江州權邦彦為江淮荆浙發運使吴玠及金人戰於寳雞敗績先是陜州既陷金人長驅闗中曲端遣吴玠屯於彭店原端自擁大兵次邠慶間以策應玠玠與金人戰勝負未決而端退走自邠至深止玠大罵端由是二人有隙金人雖勝玠以端全軍退去且入夏遂復還河東盧益辛企宗潘永思赴䖍州迎隆祐太后十日壬子金人陷常州金人取常州路經過不住徑奔於吕城官吏禁其閘㫁其絆放練湖水使亁則金人舟船皆不可行惜乎官奔吏竄而閘猶儼然故金人長驅而無礙也車駕幸處州吕頥浩以金人退兵請還幸越州遂幸處州劉綱攻趙瓊水寨節制泗州劉綱以宿遷縣趙瓊水寨投拜金人遂遣人攻之瓊曰我為人逼脅勢孤援寡權為老小之計不得已而投拜今楚州趙安撫遣國奉卿齎旗牌來即時受之已聴楚州節制復歸朝廷矣公其察之不從兵攻寨瓊出民兵禦退之二十六日戊辰孔彦舟擊鍾相敗之擒相孔彦舟在鼎州日與鍾相交戰勝負相當彦舟詐遣人投相謂之入法相受之不疑戊辰彦舟遣人襲擊相寨所遣入法之人為内應相遂大敗擕妻子竄入山谷為村人范顔所擒而胡夀得之獻於彦舟彦舟乃造法物儀仗張大其功欲解赴朝廷至攸縣曽龍圖殺相所造法物亦散失四月壬申朔車駕幸越州尚書左僕射吕頥浩罷授鎮南軍節度使開府儀同三司中太一宫使車駕幸越州御史中丞趙鼎言吕頥浩之謬以使相宫使罷左僕射從優禮也制曰門下獨化陶鎔之上嘗守備於弼諧閔勞官職之煩宜特加於崇奨惟時上宰實我元勲兹祈解於近司爰􅃂朌於殊渥誕揚大號敷告羣工具官某心術疏通性資眀達運籌泉湧獨當天下之危機㳺刃風生能㫁朝廷之大事昨属艱難之運尤輸經濟之忠冒險直前服勤無斁取虞淵之日重正乾坤問襄野之塗卒安宗社顧在廷之莫及方當宁以仰成而寖懐偏見之私殊失大臣之體占吏員而有虧銓法專兵柄而幾廢樞庭下吳門之詔則慮失於先時請浙右之行則力違於衆議既人言之薦至於物望以靡諳屢騰引去之章莫副挽留之意念有盟書之偉績難從策免之常規乃峻彛章務全體貌植牙造纛總節制於雄藩執璧面槐視班聨於上衮假以真祠之佚從其私計之安皆儒臣希有之榮葢邦國久虚之典朕為無歉汝亦有終於戯險夷一心非忠誠孰能至此進退二道惟眀哲足以盡之矧兼将相之崇靡缺君臣之遇毋云去位不我告猷張俊為兩浙西路江南東路制置使金人在建康韓世忠屯兵江上屢騰捷奏乃遣張俊為両浙西路東路制置使節制浙西軍馬策應世忠俊雖受命未進發人皆切齒十四日乙酉潰軍戚方攻宣州戚方勇悍善射初投為教駿兵士軍興盜賊起在九朶花徒黨行伍中未知名方殺其為首人遂率衆歸建康投充用為准偹将留在帳前建康失利諸軍皆散方走至金壇界與建康統制扈成相遇方欲奪成軍乃謀殺成遂伏衆於篠中皆執長槍令曰扈統制過則殺俄而成果至伏發以長槍刺成成死統領龎榮率其衆聞岳飛在宜興乃以其衆歸飛以榮為左軍統制方率衆入常州為劉宴所敗乃犯宣州知州李光遣兵馬監押吕執中齎書招之方佯受書實欲攻城也執中覺偽詐僅得脱歸有衙前石振者為方所執問以城中虚實振有從賊之心乃悉以虚實告且具言城中之方隅可擊者不可擊者方用振之説鼓行而前是日犯城下光自決守城之計乃命城外居人盡遷入城應寺院及人家與空閒官舎任便居住是時有建康潰散班直百餘人無所歸光留於城中光因以主首王逸為都統制令見任及寄居官分守城壁僧道居民皆執仗登城措置甚有法方攻城不克光以知州衙儀登城北壁令一吏詐作知州招方打話云戚統制爾部曲皆是官軍豈非念國家艱難之際何苦欲攻此城為盜賊乎方曰方不敢亟撓朝廷但緣士卒皆飢不免尋覔粮食耳又曰我與汝糧食并銀絹犒設如何方曰若䝉犒軍即便引退於是光乃遺以米肉并銀絹甚厚方雖受之而意猶徐徐睥睨不已王逸曰賊非退也且未可解嚴更當謹備方果伐木作攻具復攻城城中皆禦退之矢如注雨城中負户方能汲是時諸邑民兵皆聚城中寧國民兵尤麄壮有膂力以手抛石賊甚苦之王德執劉文舜於饒州殺之王徳欲迎隆祐太后於䖍州次吉水㑹妖賊王念經反於信州之貴溪縣命徳討之徳道出鄱陽劉文舜在舒州遭李成之敗方㓂饒州圍城急知州連南夫以蠟書請徳解圍德引兵至城下壓賊壘而陳文舜裭氣悉舎兵請念經偽許其降誘文舜及其次郡譚袁闗索入城執而誅之劉位攻趙瓊寨敗績先是劉綱遣入攻趙瓊寨不克綱怒請兵於位位遣人攻瓊楚州趙立曰趙瓊已受旗榜聴我節制義當救之立出兵為援與戰敗之位兵退走三朝北盟㑹編卷一百三十七
