body:
  text: 三朝北盟㑹編卷二百十二宋徐夢莘撰炎興下帙起紹興十二年八月十四日庚午盡十二月十六日皇太后回鑾至行在車駕至自臨平皇太后還宫滿城士庻夾道聳觀皆以手加額驩聲洋溢太后居於慈寧殿宰臣文武百官上表稱賀亦有獻賦頌雅歌稱美聖徳者令中書舍人程闕厚第其髙下闕厚以建昌軍進士童藻為第一知真州張昌為第三進士陸渙為第四昌特轉一官進士免文解一次太后常許金國劉皇后首飾頭面珠翠之屬縁誓書不遣乏使秦檜乃親作書與知盱眙軍向子固令差信實官員徃泗州傳語安撫周企令具奏達候至遣賀正旦使何彦良行即附行子固遣録事參軍孫守信至泗州見企白其事候發文字已行方可歸守信至泗州見企語之企初不諾守信力言之企乃即時具奏附走馬天使行九月五日甲午參知政事王次翁為報謝使使於金國邢孝揚假保信軍承宣使副之六日乙未孟忠厚以樞密使為山陵使秦檜欲去張俊樞密之任乃除孟忠厚樞密使且外示加寵於戚里矣秦檜加太師制曰三公論道莫隆帝者之師一徳格天乃大賢人之業救時真宰為世宗臣事有至難收成功於指顧人無逺慮獨先定於規模力輔眇躬通成大國荷上天之從欲成愛敬以事親實出贊襄宜崇褒陟爰正乆虚之位用告大昕之朝具位檜碩徳而光明忠肅而恭懿心潛於聖有孟軻命世之才道致其君負伊尹覺民之任蚤中異科之目旋躋要路之津節義著於艱難正程嬰存趙孤之比平生仗乎忠信見子卿思漢室之深謀皆予同國無異政歸兵權而营屯自肅定浮議而反側以安廟算無遺固衆人之所不識征車逺狩唯君子以為必歸盖信既著而情孚則恩必施而欲得龍輀來返視西洛以寓永固之靈鶴馭懽迎肅東朝以極慈寧之養庶事備矣厥功茂焉宜進大明之封寵拜維垣之貴併加圭食増重鈞衡彌聳具瞻式昭深眷於戲吕望尚父西伯之業所以成周公為師成王之勲所以集永惟耆徳無愧前人其祈邦休以副朕命梓宫及太后還故有是命十三日壬寅大赦天下門下朕以寡昧之資履艱難之運上穹悔過副生靈願治之心大國行仁遂子道事親之孝可謂非常之盛事敢㤀莫報之深恩而况申遣使軺許繼盟好來存沒者萬餘里慰契濶者十六年禮備送終天啟固陵之吉壤志伸就養日承長樂之慈顔宗社再安遐邇用慰慶來從於天上澤周浹於人間櫜弓矢而戢干戈式昭偃武省刑罰而薄税斂庻用還淳宜均惠術之施以移有邦之福可大赦天下於戲去兵而未嘗去信蹈前古之格言寧親而有以寧神懋大君之至徳惟比屋克躋於仁夀在庶政宜尚於中和其一心輔弼之臣暨百職文武之士交修不逮永孚於休王俊知洋州兼沿邉安撫使節制蓬州軍馬王俊行軍紀律嚴明退者必誅軍中號為王開山所向無前也然性強犯上呉玠亦畏其反復而喜其勇以其女妻其子嘗厚遇之是年卒於郡張中孚加開府儀同三司張中彦靖海軍節度使金人索張中孚中彦秦檜還之故加以官爵十月楊愿假戸部尚書賀正旦國信使何彦良假奉國軍承宣使副之秦檜以張中孚張中彦歸於金國十一月五日癸巳樞密使張俊罷為鎮洮武寧泰寧軍節度使醴泉觀使封清河郡王張俊為樞密使固其位而無請去意秦檜欲去之乃令侍御史王邈上言俊據清河坊以應䜟兆占承天寺以為宅基大男楊存中握兵於行在小男田師古擁兵於上流他日變生禍不可測上曰張俊有策立復辟之功非有謀反之事皆不可言於是檜乃以孟忠厚為樞密使俊素與忠厚不協遂請罷去乃罷為醴泉觀使還三鎮節鉞封清河郡王邈字遐舉嚴州人八月丙申臣僚言阻撓和議者秦檜欲深趙鼎等罪未有名以處之乃令臣僚言鼎與王庶曽開李彌遜昔年阻撓和議事鼎更不量移彌遜曽開並落職庻已卒於道州矣十三日辛丑劉光世薨中興遺史曰劉光世以萬夀觀使免奉朝請軍於溫州太后還宫大臣俱入賀光世已病九月扶病赴闕上宣醫療治光世病篤乞致仕進太傅辛丑薨於臨安之賜第年五十四上聞之震悼輟視朝進太師賻銀二千兩絹二千疋賜龍腦水銀以殮勅内侍李存約䕶其喪上親臨奠増子孫之秩官其親族未命者八人光世妻向氏就請曰光世遺言姪祖禮曾獲文解可以為文官乞改文官上許之林泉野記曰光世字平叔延慶次子也能騎射有胆勇稍通書史莊老孫吳之學從父與夏人戰常身先士卒屢擒酋首敵頗畏避童貫才其人朝廷亦加眷宣和二年方臘反於睦州光世别將一軍自饒趨衢婺出賊不意戰多捷數郡之民皆為立生祠臘敗走入清溪洞光世遣諜察知其要險難易光世遣宋江並進擒其偽將相送闕下遷團練使從童貫收燕山後洺州張敵聚衆數十萬陷州縣光世撃斬之除鄜延路副總管金人至闕光世以兵勤王聞敵退乃還及敵再至光世率兵衆萬餘入援淵聖命内侍陳闕督進師光世聞京城失守不敢進頃之至濟州謁康王王即位命為御營使司都統制彈壓京城乃往西京保䕶陵寢後還行在宗室叔向領兵謀亂光世奉命擒戮李忠陷襄陽遣喬仲福撃斬降其弟孝義内侍康履等用事光世曲意迎奉加奉國軍節度使御營使司提㸃一行事務張遇據池州光世輕敵徑進為遇所敗㑹王德來援遇走江州兵敗復自池州順流下真州光世躡其後遇至楊子橋乞降於行在李成將史亮陷宿州冦淮西光世戰屢北後亮敗伏誅李成奔東京擒其將王宣等五十餘人收其兵數千還加檢校少保敵入揚州光世兵潰走至建康止有衆百餘得統制王徳兵五萬軍復振苗劉廢立光世勤王加太尉御營副使范瓊亡命光世撫定其衆分𨽻諸將靳賽反於掦州王􅀈屢戰無功光世往乃降後屯軍江州金人圍寧國軍光世不能援隆祐太后趨處州敵遂取洪吉諸郡而退光世遣將王祐躡其後擒數百人命王徳擊斬敵趙萬於闕州又命靳賽王徳討擒妖賊王念九於信州又命王徳斬邵談袁闗索劉文舜於饒州遣靳賽張世忠招降河北賊酈瓊并衆五萬光世來朝除浙西安撫大使知鎮江府加開府儀同三司集慶軍節度使改武寧軍王徳敗金於揚州俘五百餘人金圍楚州光世畏其衆不敢援紹興二年加寧國節度使三年加檢校太傅移軍建康又移池州四年冬金及劉豫南冦將鄒盖敗金於泗州光世退師建康王徳敗金於滁州桑根田清敗之㲼河王世忠敗之滁州王師晟敗之夀春府斬偽守李爛靳賽張騎孫暉敗豫於潁河口酈瓊敗金於夀春靳賽敗之闕縣王德敗之和州侯動山敗之滁州晞敗之來安縣王順敗之泗州白柱坡魏泰敗之白沙山五年郭進劉寵敗之清流縣皆光世部曲也加少保是秋遣將華旺敗於光州六年加太保静武寧國軍節度使淮西太平州宣撫使軍於廬州充夀春縣是秋命王徳靳賽敗劉豫兵於滁州王徳酈瓊趙四臣又敗之安豐斬級三千餘衆冦廬州光世退師而劉猊為楊沂中所敗豫聞之遂望風遁去光世自率數騎逐北至夀春縣遇豫將闕興自南豐來援㡬殆光世還率靳賽兵敗闕雍闕初豫之入冦都督張浚約光世止軍廬州豫兵勢盛光世密白於宰相趙鼎乞退屯鼎降樞密院檄令退守太平州浚怒遣向子諲督遣復還於廬陵浚還朝言其事故鼎乞出㑹光世軍帑在太平州為火所燼亦請閒得太一宫使罷命吕祉節制其軍未幾酈盡驅諸軍叛降劉豫九年金人歸我淮南之地加和衆輔國功臣陜西五路宣撫使雍國公與弟光儀不協儀密令言者暴光世罪罷宣撫授萬夀觀使十年金敗盟深入加太保三京招撫處置使率李顯忠李貴步諒之衆守太平又徙池州十一年敵攻淮西光世命崔臯敗之舒城縣頃之諸帥皆罷兵柄光世復萬夀觀使朝請於行在宴居以聲色自奉十二年正月薨年五十四親臨奠贈太師諡武僖十四日壬寅知福州程邁知鎮江府劉子羽提舉江州太平觀程邁知鎮江府罷臣僚章疏也邁在福州㑹金人來取宇文虚中家屬皆在福州其族謀欲留其一子為嗣邁堅執不容遂並遣行後全家良賤無老幼悉遭金人誅戮哀哉王勝為鎮江府住劄御前諸軍都統制先是張俊岳飛以樞密使副往楚州撫諭諸軍也王勝為中軍統制或有譖於俊者謂勝欲殺俊俊憾之俊還至鎮江府以事責勝送建康軍中自効是時王徳權管諸軍事俊謂徳與勝素不協必殺勝至是徳見勝而喜曰我王夜乂汝為王黑龍非我二人誰可以相親者乃厚待之俊罷樞密勝潛至行在見韓世忠世忠藏於家一日世忠具筵㑹招醫師王繼先飲酒行世忠出勝拜繼先為父繼先見上言勝可大用遂有都統制之命十月十四日壬申王徳為建康府駐劄御前諸軍都統制王徳通逺軍人從劉光世為前軍統制自陜西勤王建炎初從往江西討張遇於池州光世輕進為敵所乘徳救之免進追至江州敗遇軍中服其驍勇號王夜乂三年從敗李成於淮西擒其將王宜等五十餘人金人陷揚州光世兵潰至建康止百餘人徳引衆四百至和州時張育據城以檄招徳徳不肯應育率衆來攻徳徳盡以兵伏草中育至無所見往來提檢徳與弟青王忠躍出斬育餘衆請降徳入城撫育家至及諸賊將皆如親舊莫不歸心俄而賊張和尚來冦致書曰昔張育殺死骨肉我來復仇徳以書譬釋不聴乃斬育家人遣送其首又曰此特育一家耳必盡以育一軍来乃退徳集諸軍告之故咸請死戰張和尚為鄉兵所殺盡降其衆徳乃引所獲兵十萬濟江見光世分為六軍軍聲復振光世復辟命徳追苗傅劉正彦至信州與韓世忠將官同在郡守坐因話語言不相中欲刺徳徳殺之郡㕔又殺其下十餘人至福建遇世忠欲鬭世忠避不與校訴於朝徳坐罪編管江州光世為御營副使駐九江徳為統制金人渡江徳拒之敗於興國四年撃斬趙萬於袁州劉文舜邵談袁闗圍饒州誘之入城皆戮之妖賊王念九衆二十餘萬據信州之貴溪弋陽縣辛企宗累月不能克從光世一戰俘念九從光世軍之鎮金人據楚泗徳潁與戰於髙郵邵伯之間紹興初降海冦邵靑於泰州二年執郭仲荀於揚州送戮之吕頤浩為都督也前軍至潤州丹徒反徳追至建平殱其衆累加忠亮大夫同州觀察使四年金逼淮南徳敗之滁州桑根又敗之和州六年同靳賽敗劉麟兵於滁州渦口又同酈瓊趙四臣敗之安豐斬三千級又從光世敗劉麟於廬州七年光世罷兵奉祠以吕祉節制其軍徳為都總管酈瓊王世忠不平訴徳於朝徳亦言諸將驕累上命徳以本軍歸而瓊世忠果叛降於劉豫徳軍建康張俊每以禮幣結之徳以兵八千歸於俊八年俊為淮西宣撫司鋭勝軍統制十年金人背盟光世起為三京招撫使復請徳𨽻其軍徳不應從俊敗金於蘄縣復宿州戰城父復亳州又敗之滑河俊之立功賴徳為多十一年加承宣使敗烏珠兵於昭闗及仙宗鎮從俊及楊沂中劉錡諸軍將遇烏珠兵柘臯沂中為敵所敗部下多死徳以錡師撃敵斬首萬餘沂中獲免遂復廬州烏珠陷豪州俊令沂中收復遇伏被圍殿前司軍幾殱徳同髙舉劉寳田師中救之奪沂中出加清逺軍節度使十二年俊在樞庭薦徳為建徳駐劄御前諸軍都統制徳乃用俊姪子盖其親將馬立顧暉皆為統制及俊罷樞柄徳皆盡罷子盖等俊以是憾譖於朝而秦檜亦忌其勇十五年命王權代之罷為浙東馬步軍副總管紹興府駐劄後改湖北路總管荆南府駐劄十四年薨六十八子琪王進為池州太平州駐劄御前諸軍都統制王進初為張俊帳下提轄專背印隨行軍中呼為背印王從破李成於江西淮南屢収勇功擢為中軍統領紹興四年陞中軍同統制五年累遷龍神位四廂都指揮使安逺軍承宣使選鋒統制劉寳卒進為統制至是除池州太平駐劄御前諸軍都統制不恤士卒唯厚結王繼先及諸内侍以乆其權士卒皆不喜之十六日甲戌池州駐劄御前統制李顯忠加保信軍節度使為兩浙東路馬步軍副總管三朝北盟㑹編巻二百十二
