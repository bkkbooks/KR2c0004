body:
  text: 三朝北盟㑹編卷二百三十五宋徐夢莘撰炎興下帙起紹興三十一年十月十七日丙辰盡其日十七日丙辰金人入廬州以康定山知州赫舍哩同知廬州駐泊兵馬都監楊春㑹兵入城殺康定山走赫舍哩復廬州合肥野叟楊廬州忠節録曰公姓楊名春字徳元大梁人沈勇有謀略擢自左班行門䝉恩擢修武郎特添差廬州駐泊兵馬都監辛巳冬十月金主親擁衆兵圍廬州在城官吏望風争遁時建康都統王權屯廬州先領本軍棄而走公同本州兵馬都監騫福在城往來巡邏安撫龔濤請公并騫福議事濤云江南州都統戚方將帶軍馬于九月下旬棄光州已過大江池州都統李顯忠部領軍馬亦棄安豐軍徃峽山路渡大江適來本州探稱金兵不知其數已在本州北門外離城二十里地名白馬廟下寨濤荒急意將遁去因言濤今将帶本州人馬往無為等處軍措置事務委春權州府春白濤曰春今獨員在城守禦並無人從欲乞撥安撫司効用一隊春守禦候金兵到來與之血戰以報國恩濤言不須如此公後生脚手輕快且自看勢頭公見此言再白濤曰春元是殿前左班行門累對御史武藝中選䝉恩特允前件差遣今邊事不寧委春權州且金兵未有一卒到城望風盡走今春既權州事金主若竭國而來春當竭節盡忠不敢棄城逺遁濤聞公言大怒曰自理㑹濤棄城遁走公獨員權州揀選强壯及刷招募諸軍逃走兵効用公部領往來巡䕶州城十四日有金兵全装軍馬不知其數于廬州城外徃來圍城公度勢力不加遂領兵卒乗勢突陣以出過中𣲖河駐劄遂急募本地兵沿焦湖團結水寨鄉兵總首陳彦等二百人守中𣲖河口有效用秦寳報今月十七日金兵已壞巢縣龔安撫隨行軍馬千餘人盡皆潰散遂親往巢湖招集潰兵二十九日有安撫司潰散効用軍兵四百餘人數中有馬軍効用一百一十二騎公即時勸諭招募盡起發往中𣲖河口駐劄陳彦具言前月十五日金主大軍到廬州在州之東北離城五里屯御寨旋築土牆城一座新築井一眼供御水至十月十七日金主入廬州觀看詣諸寺廟燒香駕回市中下馬喚在城内外被擄守屋百姓數十人親自撫䘏曰今不令軍損壞爾等若我軍壞一個南民我却殺一個軍每人賜銀十兩慰勞令各從便歸業金主撫䘏罷回御寨至二十日金主提簇御軍前去和州今廬州只有二萬金兵係是金國正兵一名頭領授淮南路招撫使康定山又一名同知赫舍哩今見廬州四城門出榜召募本州逃移老小限一月歸業其諸山水寨聚結逃避之民聞此榜日夜入廬州與敵買賣如同一家兼以沿淮數處逃移民社鄉兵强壯動以萬計隨身各有長槍紙甲軍須器械將帶老小牛馬約數十萬見在中𣲖河以南舒城縣及廬江縣等處屯駐各無糧見行作亂道逺不通恃强為勝刼奪牛馬殺而食之金帥康招撫聞知多出榜文令百姓强壮者數齎榜往舒縣等處召募沿淮逃移民兵歸業聞說鄉兵縁無糧食皆欲順金兵見陳彦等說急以所募民兵八百餘人先差効用岳孝忠部領三千餘人赴中𣲖河口守把又差宋再興部領三百人赴中𣲖河口守把並不放人過往公慮合肥以南無為軍及舒州等處州縣居民無人保䕶及沿江一帶數百里關津渡處最多無人拒守恐即泄漏與敵指路遂急緊把斷兩道河口要處公又見諸山水寨團聚民社鄉兵日逐入廬州與敵買賣恐泄漏公一行人馬虛實公急部領敢死民兵二百一十七人渡中𣲖河廬州城南二十里店埋伏潛領民兵孫彦等二十人各將帶火種并隨身器械于當夜四更到廬州廬江東門角踰城入取麻麥空地徑赴州倉發大焚燒倉厫糧米就倉所殺死金兵二十六人從舊路復出再于初五日夜領民兵二百一十七人赴廬州門外五里崗等候月落二更以後從廬江門西壁踰城入州其兵自城門内每五十步擺布正軍作舖把截街巷公等隨舖掩殺之其兵不相救援共殺一十七舖在城屯住之兵驚亂當夜殺出廬城死者不知其數及奪戰馬五十四匹四鼓歸中𣲖河駐劄縁此隔絶諸處山水寨人民自後不敢入廬州與敵買賣當月二十日忽有乞丐張貧子自廬州出城來至中𣲖河口詢問廬州彼軍事體貧子乃言金人正軍内有一千餘人病患死損數多縁為今月初四日初五日夜楊權州入城殺盡搬布金兵焚燒倉厫金家軍馬全無糧草日夜驚憂防䕶甚緊其金帥康招撫與赫舍哩聞知中𣲖河以南一帶有山水寨及有團結鄉民老小聚糧食甚多同知赫舍哩已定來日領正軍出廬州門徃中𣲖河南盡刼擄諸寨團結老小糧食公聞此說即率民兵踏路險阻要處預先擺差岳孝忠等六十一人在中𣲖河以北蘆村内埋伏又差馬軍趙再立領兵七十三騎於廬江門外二十里店草垜後埋伏公親領歩人强壮者七十一名近廬江門外十里店向南大路皁角寨兩下崗伏藏乃遣効用胡亮伏宣二人于廬江門外三里崗卓望胡亮未久聞敵至皁角寨下公分部領埋伏兩下掩殺其趙再立馬軍隨至應敵金兵頭領赫舍哩中箭退走其餘敵兵皆潰公乗勢追殺至廬州城下敵乃入城閉門不出時斬四十四級奪戰馬二匹騾子二頭生擒金國二人連器械等公即徃中𣲖河口駐劄又於十二月初二日再領兵㑹合焦湖西口水寨合肥縣尉張用于當夜二更以來同約入廬州各部領人分路刼中金兵兵皆驚亂公領民兵殺至興安寺後縣橋路南迎金兵大隊頭領招撫使康定山騎髙白馬頭戴皁氊笠身擁皁氊擁出衆軍之前公見縱馬向前刺康招撫墜馬而死同知赫舍哩急領餘衆犇縣橋路遁走公乗勝率兵襲之敵衆敗走公追至白馬廟以北兵傷死者相屬生擒金人九人并復奪廬州公復募廬州鎮鄉村聚落諸寨逃移居民老小不過旬日内盡皆歸業公權州保全生靈不至肝腦塗地陰徳及人多矣未幾䝉朝㫖知舒州張淵權廬州安撫使張淵以公復奪廬州獲㨗事件申奏于朝時諸路都統將帥媿已無功陰賂有司抑遏不行吁公雖有以寡擊衆之勞為江淮保障超越乎張巡許逺而不䝉褒賞惜哉野叟續録曰隆興二年敵衆不滿三萬再逼長淮當是時主帥如韓津如頓遇如孔福皆望風而遁韓弃合肥頓弃壽春孔弃濠州沿淮居民盡遭驅擄流離死亡相踵于道路者以楊公任滿解印而去民之傷感無其人也吁不見其害孰知其利不見其劣孰知其優不觀韓津輩之失節孰知楊公之忠烈保全哉是以合肥之民因隆興二年韓津之厄而追思紹興辛巳楊公之恩老穉懷慕欲報之而不可得乃續其遺録以傳于後異時秉史筆者得采其遺録以記楊之績庶幾不沒其傳焉邵宏淵六合㨗報親衞大夫常徳軍承宣使侍衞步軍司左軍都統制提督諸軍䇿應軍馬邵宏淵申近准置制招討使司指揮提督人馬前去淮西䇿應王權等依應先次統率左右兩軍于十月十七日到真州宿泊間探聞得金人邀截道路遂差統領王宗鄭彦孫超將官晁江等于十八日統押左右兩軍五百人騎前去巡綽硬探去後今據王宗等當日申時約離六合縣東十八里逢見金人馬歩軍馬五千餘人分布前來施放弓箭迎敵官軍宗等遂賈勇率士卒戮力血戰至酉時殺敵敗走趕擁入河不知其數獲㨗知興化府姚仲鳯翔府盩厔縣報㨗御前知軍都統制和州東路安撫使知興化府姚仲奏差使臣王俊將帶人兵齎朝廷降到文榜前去陜西招集忠義人偷刼敵寨收捉金國活人體探事宜去後今據王俊申十月十七日經過陜西鳯翔府盩厔終南兩縣南山存撫居民安業二十日到盩厔縣界地名東洛谷口一更以來將金兵堡寨攻打有北界人兵趙順等開門歸降俊當時帶領人兵前去招誘盩厔縣有王博事金國宣威將軍彼姓圖克坦名薩哈終不聽從俊將一行人兵親擁攻擊上城奪開東西南門有宣威將軍薩哈帶領兵前來迎敵俊激諭一行人兵鏖戰至天明殺死敗兵人馬不知其數捉到宣威將軍圗克坦薩哈并妻偽皇親完顔達呼漢児軍額爾克諾爾布所屬瑪蘇庫小戸賽音珠爾等并奪到薩哈所授宣威將軍誥勅并偽皇親達呼宣勅共七件官倉塲庫務印記四百戰馬弓箭鎗刀金鼓旗幟等有捉到當夜本縣備戰一百餘人並係隨薩哈鬭之人除將捉到薩哈等見行申解外委是獲勝㨗統領姚興及金人戰于尉子橋沒于陣完顔亮在壽春欲渡淮維浮橋已成邏者獲王權軍擺舖數人中有一曹司亮見之問權所在曹司以實對曰在廬州又問權有兵多少曹司曰有兵五萬亮曰是也吾知之矣乃以金十餘兩遺曹司且令附書回與權權得書繳奏且聞已渡淮河遂自廬州退兵沿路作虛寨以相疑使白旗子五十人硬探遇金人騎兵金人未覺白旗子乃避于路傍見金人十數騎而已白旗子相語曰此亦探者也我輩占地勢埋伏俟其回可以盡數殺衆遂伏于路旁林中既而敵騎果回衆皆出敵不及逞為白旗子所掩殺死者七八人生擒三四人解赴權問其虛實皆不應有都濠寨一人嘗跟烏珠渡江者也權與之酒大醉遂泄其語曰大金起兵六十萬以十萬出清河口不戰但為疑兵以當淮東之軍以二十萬分徃京西淮西以三十萬隨主來三十萬中又分為三十萬出戰十萬䕶帥主十萬奪渡口權曰不可當也宜引避之遂退保和州令破敵軍收後金人以鐵騎追及于尉子橋統領姚興麾令拒戰金人直衝官軍興率兵入陣力戰親出入者數回副統制戴臯率軍馬下路以避不援興興遂死之日已晡權遣親隨軍來䇿應金人乃退知樞密院事軍馬葉義問劄子奏契勘建康府破敵軍統領右武大夫姚興十月十七日隨王權與敵戰于尉子橋以兵四隊當陣數萬衆鏖戰數合手殺數百餘人以援兵不至于陣戰死死不忘君忠勇可尚當議旌賞以激士氣為天下忠義之勸臣已差􅄁議官一員致祭及往其家撫視孤幼并賜賻奠開具陣亡將士姓名保推恩外欲望聖慈特降睿㫖先欲將姚興贈觀察使除依格與合得恩澤外更特與恩澤三員仍許奏異名并本寨立廟賜額候收復淮西日别于戰場立廟從之姚興贈官誥詞勅執干戈而衛社方資敵愾之忠援枹鼓以忘身宜厚恤忠之典右武大夫武功郡開封伯食邑九百户姚興材全果毅資賦勁嚴憤强敵之相凌鼓我軍而摶戰所提不滿于一旅奮勇何翅于萬兵卒拒其鋒遂殞于陣昇亷車而加襚屬孤子以推恩莫歸先蔑之元宜立睢陽之廟舉為異寵用寄予哀尚克有知歆此休命可特贈容州觀察使先是劉錡遣都統王權將兵迎敵逗留不進為自安之計錡再檄權往壽春權不聽命以威協總領都潔漕使李若川固請于朝乞留權守和州錡復督行權不得已三日發一軍凡二十四日僅發八軍止于廬州戍守故金人至淮得以維橋從容而進如入無人之境權懼旋弃廬州回屯昭關將士皆請戰權乃領親兵先遁麾衆使退敵騎至尉子橋始遣統制官姚興一軍三千人迎敵興戮力死戰數吿急于王權權于仙宗山上以羣刀斧手自衛殊無援意興勢雖欲却然猶殺敵數百人擒渠率而囬㑹敵假立權幟以悞興奔而入遂與其徒俱陷權猶走旗獻㨗兾以欺罔自解是後不復更與敵接徑回和州州城新築而所儲資糧可為數月計權志不在守乃紿衆曰已得金字牌聖㫖令棄城守江遂自焚西門棄和州先奔采石渡江三朝北盟㑹編卷二百三十五
