body:
  text: 三朝北盟㑹編卷一百七十一宋徐夢莘撰炎興下帙起紹興七年正月一日癸亥盡十五日丁丑紹興七年正月一日癸亥朔車駕駐蹕平江府下移駐建康府詔詔曰朕䕶丕圖行將一紀毎念多故惕然於心昨以盛秋載親戎乘露車於野率示四方屬叛逆之來侵幸以時而克定念兩宫征駕未還於殊域列聖陵寢尚隔于邉烽黎元多艱兵革靡息是惟厥咎在予一人其敢即安弭忘大業思鼓士氣以恢逺猷惟黄帝以上聖之君無常居之位周王當平治之日有于邁之師朕於斯時敢替前軌將乘㤗律往臨大江駐蹕建康以察天意播告遐邇俾廸朕懐遺史曰劉豫兵馬遁走張俊還獨對乞乘勝取河南地擒劉豫及言劉光世驕墮不戰不可為大帥請罷之上問曽與趙鼎議否曰未也上曰可與趙鼎議之俊見鼎具道其故鼎曰不可劉豫机上肉耳然劉豫嘗以金人為重輕不知擒滅劉豫得河南故地可保金人不侵入乎如其侵入何以禦之且劉光世軍下統制將副多出其門若無故罷之恐士卒懼而不悦俊見上請幸建康府鼎諌未便遂罷鼎宰相以觀文殿大學士知紹興府安撫浙東而下移蹕之詔十五日丁丑詔賜李綱等勅李綱等比者逆臣嘯亂反易天常隂道敵人投兵南向朕親行戎輅號令六師將士協心人百其勇按甲江上時出輕兵所向奏功俘馘係道敵勢既屈潜師遁逃念兹却敵之初圖為善後之計卿以舊弼乃心王家必能為朕深思熟講凡今攻戰之利偹守之宜措置之方綏懐之畧可悉條具來上朕將屈己以聽擇善而從君臣之間期于無隐利害之决期以必行叙佇嘉猷兾聞確論故兹詔諭想宜知悉春寒卿好遣書指不多及李丞相綱對曰臣伏承詔書以偽齊金敵退遁令臣深思熟講凡今攻戰之利守偹之宜措置之方綏懐之畧條具來上臣仰荷聖恩憐臣孤跡嘗備位近司察臣迂愚有千慮之一得雖以罪戾屏伏海濱曽不遐遺以國家邊方恢復大計特降清顧臣學術濶踈智識淺短何足以稱詔㫖而禆廟畧萬一輙竭狂瞽以塞明命伏惟陛下留神省察臣不勝幸甚臣竊以僣逆之臣仗強捍之敵提兵南向俶擾淮壖其意葢料朝廷蹈前日退避之轍得以乘間渡江慿陵東南不虞六飛親臨江上既行賞罰既明將士摧鋒俘馘係路敵氣挫屈潜師遁逃此盖陛下睿謨宏逺天威英斷之所致誠為宗社無疆之休亦臣子之所共慶也然臣區區竊願陛下勿以敵騎退遁為可喜而以僣逆未誅仇敵未報為可慮勿以保全東南為可安而以中原未復赤縣神州猶陷仇敵為可慮使外敵得以潜逃為可虞則中興之期可指日而俟而臣謹采古往之跡揆方今之宜條具攻戰守偹措置綏懐之䇿以獻議者或謂兵馬既退當遂用兵為大舉之計臣竊以謂不然譬如奕棋先當自生乃可殺敵生理未固而欲浪戰以僥倖此非制勝之術也高祖先保闗中故能東向與項籍争衡唐肅宗先保靈武故能東向以破安史而復兩京今朝廷以東南為根本倘不先為自固之計將何以能萬全勝敵又况將士暴露之久財用調度之費民力科取之困謂宜大為守偹痛自料理使之蘓息乃為得計議者又謂兵馬既退當且保據一隅以為目前之安臣又以為不然譬奕棋捨局心而就邊隅廹蹙偏小寖以衰㣲何以取勝秦師伐晉以報崤之師諸葛亮佐蜀連年出師以圖中原不如是不可以立國高祖在漢謂蕭何曰吾亦欲東耳安能欎欎久居此乎光武破隗囂詔岑彭曰人苦不知足是以混一區宇戡定禍亂又况祖宗之境土豈可坐視淪䧟不務恢復今歲不征明年不戰使敵勢益張則吾之所紏合精鋭士馬日以損耗何以圖敵謂宜於防守既固軍政既修之後即議攻討乃得為計此二者守偹攻戰之序也至於守偹之宜則當料理淮甸荆襄以為藩籬夫淮甸荆襄東南之屏蔽也六朝之所以能保守江左者以强兵巨鎮盡在淮甸荆襄間魏武之雄苻堅石勒之衆宇文拓䟦之盛卒不能窺江表後唐李氏有淮南則不以都金陵其淮南後為周世宗所取遂以削弱今朝廷欲為守偹則當于淮南東西及荆襄置三大帥也重兵以臨之東路以揚州西路以廬州荆襄以襄陽為帥府分遣偏將將師進守支郡小築城壘如開新邊朝廷應付錢糧有如淮東則以江東路財用給之淮西則以江西路財用給之荆襄則以湖南路財用給之徐議營田使自贍養遇有兵馬則大帥遣兵應援稍能自守商旅必通乃可召人歸來漸次葺理假以歲月則藩籬之固後有長江之險加以戰艦水軍使沿江一帶帥府州縣上連下接自為防守則兵馬雖多豈敢輕犯近年以來大將握重兵於江南吏士守空城於江北雖有天險初無戰艦水軍之制故敵人得以侵擾窺伺欲為守偹計無易此或謂三大帥率重兵以屯江北則供億之費不貲臣應之曰使三帥重兵於江南亦仰給於朝廷其費等爾設若使之渡江葺理淮南以為屯守計則朝廷異時可省經費而藩籬之勢誠為無窮之利守偹之宜莫大於是矣然後可以議攻戰之利亦當分責於諸路大帥謂如淮東之帥則當責以收復京東西路荆襄之帥則當責以收復京西南北路川陜之帥則當責以收復東西路克㨗制勝因利乘便收京畿復故都以戡大難此事雖似落落難合然在陛下聖志先定於中而以至誠不倦决斷行之葢無不可成之理至於責將之術治兵之政車馬器械之制號令賞罰之權兵家皆有常法無待臣言而兵戰之間因敵取勝臨事治度者兵無常形又不可預圖也臣願竊以獻者在勿失機㑹之來間不容髪以戰則勝以守則固一失機㑹悔不可追昔劉表悔不用蜀先主之言蜀先主曰天下日尋干戈事㑹之來豈有終極若能應之於彼此未足為恨也臣竊覩朝廷近年以來失機㑹者多矣自今以往如能保淮南荆襄以為固選將練卒厲兵秣馬聚財聚榖應機而作則以弱為強取威定亂於一勝之間僣逆之臣可正藁街之誅強悍之衆豈無殄滅之日攻戰之利莫大於是此二者守偹攻戰之䇿也若夫措置之方則臣願定駐蹕之所葢萬乘之居必擇形勢然後能制服中外以圖事業臨安平江此皆澤國􅄶廹所據非用武之地建康自昔號為帝王天子之宅以其江山雄壯地勢廣博可以容萬乗六朝以來更都之地今鑾輿未復舊都莫若權宜於建康駐蹕控引二浙襟帶江湖運漕財榖無不便利臣昨於建炎初建議幸闗中為上襄陽次之建康為下者以天下形勢言之也然淮南有藩籬形勢之固然後建康可都願陛下與二三大臣熟計之既料理淮南仍詔建康守臣修宫闕治城壁立官府劄營房使粗成規模以待翠華之幸近年以來車駕所過因陋就簡諸事草創雖陛下以時方艱難用過於儉然宫闕制度亦有不可已者有城壁然後人情不恐有官府然後政事可修有營房然後士卒可用惟自朝廷應副詔有司以漸修建庶幾不擾此措置之方所當先者也綏懷之畧則臣願先為自強之計夫西北之民皆陛下赤子荷祖宗涵養之徳其意曷常一日忘宋哉特制於金敵之勢為所驅廹䧟於塗炭故捨二百年之本朝而事大不道之僣逆豈其本心朝廷之力未能覆之故數路之民困於重歛傷於惨刑而不能以自歸儻淮南荆襄藩籬既成攘地相接甲兵既偹天威振驚必有結約來歸如宿遷之民者必有作外援為内應如京東郡縣者宜命諸帥優加撫循來歸者給田内應者與爵賞官吏將士禄秩由舊許之自新孰敢不悦朝廷近者得敵簽軍皆不殺而優恤之來歸者皆優與官秩可為得䇿更願力為自治自強之計使䧟溺之民有所依告益堅戴宋之心此綏懐之畧所當先者也攻戰守偹措置綏懐此皆中興之至計今日之急務聖問所及臣已粗陳其梗㮣矣伏讀詔書有曰朕將虚己以聽擇善而從期於無隐利害之决斷以必行臣三復聖訓不知涕泗之交頥也何者君臣之遇號為千載聽言用謀尤其所難未信而言則有謗己之嫌交踈言深則有失身之戒葢雖朋友尚不易言而况於君臣之間乎今陛下求治之切詔㫖如此而臣以憂患之餘孤危特甚欲淺言之則何以副陛下期於無隐之訓欲深言之則慮有犯顔逆鱗之愆感懼交中進退惟谷雖然陛下當艱危多難之秋詔臣子以丁寜惻怛之意緘黙不言臣罪大矣有君如此其忍忘之故敢冐鼎鑊刀鋸之誅以布心腹腎腸之實惟陛下躬聰明睿智之資有英武敢為之志然自臨御迨今九年國不闢而日壊將驕而難取卒堕而未練國用匱而無贏餘之積民力困而無休息之期陛下憂勤雖至未足以成中興之業則羣臣誤陛下自近年以來所用人臣凡幾人慨然敢任天下之重建立事功與夫充位偹員者固皆不逃于聖鍳夫用人如用醫必先知術業可以已病然後使之進藥而責成功今醫者之術業初不詳究而姑試之則雖日易一醫何補病者殆將飲藥以加病而已平居無事小亷曲謹初似無過而乏濟時之大畧忽有擾攘之故錯愕無所措手足不過奉身而退以天下憂危之重委之陛下而已不知何補於國家陛下安取如此人葢近年所操之説有二閒暇則以和議為得計而以治兵為失䇿倉卒則以退避為愛君而以進禦為誤國萬口和之牢不可破然累年之間冠葢相望而初不得其要約翠華䝉犯而尚未有定居上下茍且偷安而不為長久之計天步益難國勢益弱職此之由大運有開天啟宸衷超然逺覽悟前日和議之失而親總六師懲前日退避之非而親臨大敵逆臣悍敵數十萬衆飲馬江干雖未能掃蕩邀擊靖我邉隅而天威所臨亦足以使人震怖不敢南渡潜師宵奔則和議之與治兵退避之與進禦其效既可觀矣今兵馬雖退而敵情叵測變詐百出未大懲創疆場相望道路不逺安知其秋高馬肥不再來擾我使罷于奔命哉是宜明詔于却敵之初圖善後之䇿也夙夜為陛下深思所以為善後之䇿無他在盡反前日之所為解琴瑟而更張之先定其論如奕棋之立意後圖其功如奕棋之置子乃可得志臣請詳陳其説竊觀自古創業中興之主必勝兵而為親征之計者其意豈謂必冐矢石履行陣而後可哉黄屋所臨人心自効賞罰既當士氣奮張用能成功至高祖既得天下擊韓信陳豨黔布未嘗不親行光武即位至平孫述十三年間無一歲不親征本朝藝祖太宗定維揚下澤潞取河東皆躬御戎輅真廟亦有澶淵之幸措天下之大安此所謂始于勤勞終于逸樂者也退避之䇿可暫而不可久可一而不可再退一步則失一尺往時自南都退而至于江浙則京東失矣萬一敵騎南牧復將退避不知何所失而可航海之䇿使萬乗冒風濤不測之險此尤不可者惟當於國家閒暇之時明政刑治軍旅選將帥修車馬偹器械峙糗粮積金帛敵來禦之候時而復祖宗之大業此最上䇿杜牧之所謂上䇿莫如自治者也臣願陛下自今以往願勿復為退避之計可乎臣又觀古者敵國善隣有和親仇讐之邦鮮遣使豈不以釁隙既深終無講好修睦之理故東晉渡江石勒遣子晉元帝命焚其幣而却其使彼遣來且猶却之此何往假道於僣逆之國而自取辱無補于事秪傷國體金人自知結怨之重懼我必報其措意如何而我方且卑辭重幣屈體以求之不推誠以見信决矣器幣禮物不貲使軺往來索氣而又邀我以不可從之事制我以必不敢為之謀是和卒不成而徒為此擾攘也非特如此於吾自治自強之計動輙相妨實有所害豈金人二十餘年以此䇿破契丹困中國而莫之悟哉亦聊復用此以僥倖萬一而已至于邀請二聖如侯生之歸太公則當在攻戰既勝國勢既強之後今無益也臣願陛下自今以往姑罷遣和議之使可乎此二説定然後擇所當為一切以至誠之意為之先後本末各有次第俟吾之政事修倉廪實府庫充器用偹士氣振力可有為乃議大舉則雖兵未交而勝負之勢已决矣抑臣聞朝廷者根本也藩方者枝葉也根本固則枝葉繁朝廷者腹心也將士者爪牙也腹心壯則爪牙奮今國家逺有盛彊之强敵近有僣偽之逆臣所以仰為捍蔽者在藩方所資以致攻討者在將士然根本腹心則在朝廷惟陛下正心以正朝廷正朝廷以正百官使君子小人各得其分則是非既明賞罰必當自然藩方協力將士用命雖逆臣不足憂此恃陛下方寸間矣臣昧死條上六事一曰信任輔弼二曰公選人材三曰變革士風四曰愛惜日力五曰務盡人事六曰寅畏天戒何為信任輔弼夫撥亂之主履時艱難必資輔弼之臣同心同徳相與有為豈易致哉必如元首股肱之於一身父子兄弟之於一家乃能協濟故高祖親蕭何如左右手太宗遇房杜如子弟蜀先主得諸葛孔明如魚之有水不如是不能感㑹風雲以成王霸之業今陛下選于衆以圖任股肱之臣遂得捍禦大敵可謂得人矣然臣願陛下待以至誠無事形跡久任以責成功勿使小人得以間之則君臣之美垂譽無窮昔高祖始終任蕭何太宗始終用房杜故能戡定禍亂卒治太平管仲有言曰知人而不能用害伯也伯者猶如此而况欲恢復天下者乎魏鄭公有言曰君臣同心是謂一體凡一相與無至誠之意而惟嫌疑之避不足以建興邦之大業故也陛下誠能推信任之誠臣將見輔弼之任專而中興之業不難致矣三朝北盟㑹編卷一百七十一
