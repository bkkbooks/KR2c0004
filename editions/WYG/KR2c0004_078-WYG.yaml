body:
  text: 三朝北盟㑹編卷七十八宋徐夢莘撰靖康中帙起靖康二年正月二十七日丁巳盡二月六日丙寅二十七日丁巳駕在青城詔尋康王所在中書舍人張􅊹齎詔開徳府下訪尋康王初宗澤領兵駐扵開徳府揚聲康王在軍中金人聞知以人馬䕶送中書舍人張􅊹齎上蠟封詔召王還京師扵城下呌問守禦人兵報以康王不在本府仍不知屯駐去處金人與澂乃囬金人取索香藥并諸色人宣和録曰金人來取内香藥庫市易務藥物生熟藥太醫藥院及諸處營造彩色藥工部頭司天䑓隂陽官象牙犀角三千株蔡京童貫王黼家姬四十七人大晟樂工三十六人二十八日戊午駕在青城雪始霽黎明御史䑓告報百官接駕是日告報百官并赴南薫門接駕士庶奔填充塞道路已而殊不聞耗謝克家作憶君王詞云依依官桞拂宫墻樓殿無人春晝長燕子歸來依舊忙憶君王月破黄昏人斷腸聞者莫不埀淚大元帥府駐劄兵禦退金人京東轉運判官閭丘陞召募勤王兵三千人赴大元帥府前屯濮州敵騎至濮州陞禦之又敵騎至曹州黄潛善兵禦退之范納趙野屯南京遣使臣趙哲献書帥府哲將家子有膽畧以百騎分三隊道與金人三四戰獲數級奪馬三匹以献二十九日己未駕在青城金人來索諸人物金人又來索尚方藥餌以至罇罍籩豆㣲至奕碁博戲之具無不征索車載而往者不可勝計人心扼腕殊不安貼留守司奉聖㫖令多差人搬擎所頒儀仗等物後搬發盡絶車駕還内又取應拜郊合用儀仗祭噐朝服法物并應扵御前大輦内臣諸局待詔手藝染行戸少府監文思院等處人匠秘書省車輅院官自二十五日搜索夫人倡優等選擇又征求及戚里家女使等不可計數車轍運送者已盡肩輿以充貨轎之家盡取無遺被選出城者號慟而去親戚有泣别扵門者又押内官二十八人百伎工藝等千餘人赴軍中哀號之聲震動天地民情極扵皇皇廹扵凍餒又多剖剥者五十貫賞以止絶殊不戢差董趙權司業監起書籍等差兵八千人赴軍前三十日庚申駕在青城官吏士庶雲集候駕金人又索諸人物是日又取畵匠百人醫官二百諸般百戲一百人教坊四百人木匠五十人竹瓦泥匠石匠各三十人打毬弟子七人鞍作十人玉匠一百人内臣五十人街市弟子五十人學士院待詔五人築毬供奉五人金銀匠八十人吏人五十人八作務五十人後苑作五十人司天䑓官吏五十人弟子簾前小唱二十人雜戲一百五十人舞旋弟子五十人金輅玉輦法物駕儀仗駕頭皇后玉車宰相子弟車諸王法服宰相百官朝服皇后衣服御馬御鞍御塵拂子御馬二十匹珊瑚鞭兩條前法物儀仗内家樂女樂大晟樂噐鈞容班一百人并樂噐内官脚色國子監書庫官太常寺官吏秘書省書庫官後苑作官吏五寺三監大夫合䑓官吏左司吏部官吏鴻臚寺官吏太醫局官吏市易戸官吏大内圖夏國圖天下州府尚書省圖百王寳籙宫圖相國寺圖五岳觀圖神霄宫圖天寜寺圖本朝開立登寳位赦書舊本夏國奏舉書本紙牋紅銅古噐二萬五千酒一百檐米五百石大牛車一千酒單一千凉傘一千太醫局靈寳丹二萬八千七百貼封氏編年曰是日觧内夫人及戚里女使以未己午刻方以車載數百近南薫門時官吏亦俟駕扵南薫門内而女使軰車上斥罵大呼曰爾等任朝廷大臣作壊國家至此今日却令我軰塞金人意爾等果何靣目諸公回首緘黙而已二月一日辛酉朔駕在青城糶譚稹家米撤髙俅楊戬等第宅賣以濟民先是籍譚家貲約白米二千石豆粟亦如之至是委發糶以濟小民又拆毁髙俅楊戬第宅出賣柴薪二日壬戌駕在青城金人再取索諸人物是日來取索妃后服琉璃玉器再要内夫人雜工伎伶人内官等家屬開封府追捕極峻穿係大䋲交刄防送號呼不絶扵道榜曰奉駕傳指揮多差人津送大金所須應干物色盡絕聖駕方回三日癸亥駕在青城監國出令増置糶米塲數十所金人取絲一千萬斤河北剋絲六千八百疋四日甲子開封府榜再根括金銀汴都記曰先是正月内金帛見納比元數金百之一銀十之一表叚十之二惟絹有留守司申状城中所有止如此如有隱蔽同受軍法二月四日奉聖㫖根括金銀應副大金已具了絶事状却有取回軍前内官藍訴醫官周道隆樂官孟子書等經元帥投状稱有金銀在家窖藏乞取前來遂致元帥怪怒差人賫鋤钁入城斸取内侍鄧珪及教坊人所窖金銀於是開封府出榜再行根括五日乙丑駕在青城太學生黄時偁上尼堪書書曰竊聞之良藥苦口利扵病忠言逆耳利扵行若夫樂容悅而憎鯁切取諛美而捨忠良雖堯舜無以致治時偁淮右寒生家習儒業老父䝉誨訓之曰不在其位不謀其政罔可輕言自取戮辱由是鉗口結舌守分固窮未嘗敢以片辭辨是非方今國家艱難茍有見聞寜忍甘蹈盲聾之域非不知身為宋氏之臣不當以狂斐之辭干冐元帥也非不知一言忤意死未塞責也直欲内報吾君之徳外光元帥之名一身九死又何憾焉偁竊聞我宋自崇寜以來奸臣誤國竊弄威柄者有之妨公害私者有之大啟幸門壅遏言路而元帥因之遂有此舉道君太上皇帝親降詔書反自痛責斷自宸衷乃傳大寳今聖皇帝即位以來適丁國難然以孝行夙彰天人咸服今元帥歛城不下盖以此也伏覩去年十二月二十三日國書止為催責金銀表段有云所須之外亦不必取是知元帥行仁義之兵也比者聖駕躬詣軍門議加徽號幾一月遲留未歸詔㫖雖曰軍前迎待禮數優異保無他虞奈何居民朝夕思念燃頂煉臂延頸跂踵以望御車之塵也元帥豈不念天生斯民而立之君以主治之復索須他物絡繹不絶参酌以情雖不足以報萬一而方䇿所載自昔及今未聞有大事既决反縁細故而延萬乘之君者證以國書似非初意愚竊惑之念我國家曩者傷財害民之事構怨連禍之人尚可目也曰内侍伶倫美女是已曰宫室衣服聲樂是已今軍前一一須索惟復謂此悉皆國害堅欲為我痛鋤其根株耶亦驅挈歸境以為侍奉之樂耶軍機深宻非愚陋可得而知也兵法曰上賢下不肖取誠信去詐偽禁暴亂止侈奢又曰為彫文刻􅍢技巧舉飾而傷農事者禁之願元帥詳鑒此章孰思正論殺人以挺與刄無以異也儻使宿奸復被新寵是猶禾莠相雜而耕者未耘膏肓之疾而醫者未悟則將日漬月浸習以成風不害此而害彼何時已矣時偁懵不知書愚不練事事雖切其意甚忠事雖小所闗甚大方議修書鋪陳而見未及形言乃自禍嗚呼天網恢恢踈而不漏老蠧巨惡難逃覆載中矣且如内侍藍訴醫官周道隆為平昔倖濫渠魁今取過軍前坐席未煖乃忘我宋前日􅃂恩之優不思兩國修講和好之始妄興間牒稱有金銀在家窖藏遂煩元帥怪問考斯人用心則粉骨碎軀難塞滔天之罪請論之昨明降聖㫖根括金銀以報大金全活生靈之㤙雖盡力不可惜人情朕茍可以報金國者雖髪膚不惜只是有要者盡取扵是有司累行􅂆諭及指為禁物稍有隙藏以軍法從事其措置根括非不盡心上至宗廟噐皿下至細民首飾罄其所有願酬再造而天子且曰朕茍可以報金國者髪膚不惜凡為臣子固為體國憂君疋馬以上盡令送納據訴等不務濟朝廷之急報元帥之㤙輙至冐典憲埋窖金銀慳吝慵逆無如此之甚者若使未過軍前則人人蓄為至寳論當時根括指揮已合誅戮竊恐逐人昨縁有司根取犒賞因被囚禁挾此為仇妄意生事罪尤不可赦也愚謂斯人正當擾攘之際猶敢懐奸罔上取佞一時異日為國患也必矣亮元帥智周萬物不待斯言察見罪状文王問太公為君如何太公曰勿妄而計勿逆而拒聖人埀教良有以也伏望元帥大乾坤之度垂日月之明毋納諛言以玷大徳將藍訴等乞賜行遣狥首京城不惟掃蕩宿孽又少懲戒後人仍願元帥全兩國之好以順生靈之請使鑾輿早還禁御軍前或有所闕朝廷亦不違命􅂷之青史傳為盛事豈不韙哉二帥請車駕赴毬㑹宣和録曰是日二帥傳令請皇帝赴打毬㑹上在青城齋宫乘馬至毬塲二帥令悉屏騎從止何㮚馮澥曹輔郭仲荀從分庭設兩位上東靣西向尼堪西靣東向酒七行斡里雅布繡衣打毬為樂以獻上曰今日得觀盛禮豈敢重勞元帥斡里雅布打毬罷就令諸將打毬復酒二行上起身謝曰某乆留軍前都人望欲乞早歸尼堪云待那里去上失色更不復言罷歸尼堪斡里雅布與上同上馬送至行宫曰天命如此無可奈何上至幕次羣臣迎拜上悵然不怡何㮚色甚憂問开等策將安出葢斡里雅布策馬送上已有天命之言故也竟夕憂惶不知所至聞軍前已擊毬車駕有還期都人大悅至是傳言駕回接者不知幾千萬皆不能行晩云來日入城開封府榜再根括金銀除從官以上及合赴常期外應干馬並限初七日盡數赴軍前交納六日丙寅駕在青城金人變議遣内翰吴开學士莫儔持金人文字入城宣和録曰是日早自百司官吏都人盡往南薫門接駕至未時敵人㙭斷南薫門踏道自上出郊遣御帶王孝傑入城撫諭都人逐日候駕雖風霜雨雪不憚是日孝傑不至人心大恐頃之有榜傳皇太子令㫖以皇帝出郊多日未囬太上來日往軍前懇告元帥乞駕早還至晩金人遣内翰吴开莫儔持金人文字入城孫傳等數人讀號絶欲死聞初五日之擊毬也國相就賔席執禮甚㳟上語則起身側聼荅畢復坐而二太子馳擊堦下酒七行畢上離席曰欲入城國相者蹙額不懌既退二太子送至行在殊有眷眷之意馬上或傳語莫能曉金人再譯似謂天命有歸者衆皆惘然上尤憂沮然見其禮數勤腆不以為意也遂復以歸意懇之乃云國相來日尚欲相見已而果有使來國相語問所以歸之意荅以安撫百姓及催促應副軍前别無他衆謂歸期决矣咸有喜色至初六日拂旦來請上即移駕扈從官猶整服而進謂果得還也才出門忽有徹黄屋者衆方驚愕外則已望北方設一香案隨駕各官扵百歩外排立上獨前下馬望香案兩拜讀詔訖數金人擁上乘馬而去繼引宰執從官跪聼衆皆叩頭哀請竟不從毎宰執一人監以二金兵侍從一人監以二燕兵各分㪚偽楚録曰二月六日夜遣翰林學士承㫖吴开翰林學士莫儔持書入城書曰大金元帥府遂以降表申奏今囬降聖㫖先皇帝有大造扵宋人而宋人悖徳故去嵗有問罪之師乃因嗣子遣使軍前哀鳴祈請遂許自新既而不改前非迹變愈速是致再討猶敢抗師洎官兵併力擊城摧破方伸待罪之禮况近尋載書有違斯約子孫不紹社稷傾危今既伏罪且從誓約宋之舊封頗亦廣袤既為我有理宜混一然念師行止為弔伐本非貪土宜别擇賢人立為藩屏以王兹土其汴都人民許隨主邊居者聼所降聖㫖在前今請宋宰相文武百官在京臣僚一面㳟請上皇以下后妃児女及親屬王公之屬出城仍勾集耆長僧道軍民遵依聖㫖共議薦舉堪為人主者一人不限名位尊卑所貴道徳隆茂勲業耆舊素為衆所推服長扵治民者雖無衆善有一扵此一令薦舉當依聖㫖備禮册命趙氏宗人不預此議應宋之百司並事新君其國侯得姓氏隨册建號所都之地臨日共議天㑹五年二月六日右金吾衞上將軍右都監押右監軍押皇子右副元帥押伊拉齊貝勒左副元帥押安班貝勒都元帥左闕幵儔又出上軍前批付留守孫傳云今月六日大金書詔以屢失盟誓别立異姓仍依宣㫖專候上皇以下后妃諸王公主已次内旅出京俾令團聚自惟失信故當如此猶許舊地别立賢人其為百姓之幸非細今因元帥差人賫文字入城附此誠意幸為曉然早請上皇以下舉族出城諸事並依元帥指揮方是長計無拘舊分妄為禍亂速招連累中興遺史曰初城䧟之始上出郊尼堪索上具降表遣人持往其國至是復囬持到金國詔書讀畢尼堪令吴幵莫儔傳金國囬文入城惟用事孫傳王時雍徐秉哲范瓊軰知之仍共相宻議𤼵遣龍徳寜徳兩宫及妃后親王駙馬之屬未敢使軍民通知時閭巷皆喧言消息不好而已李若水抗論罵敵是日讀詔罷尼堪使蕭慶脱御服若水向前抱持上令不可脱云何得亂政此是大朝眞天子你等外臣不得無禮左手抱上右手指尼堪以罵之被數畨人打破口面流血扯過一邊見上脫了御服即時氣絶倒地少頃人各㪚去若水亦稍甦有數十金人甲兵守之俄傳國相令云須管好李侍郎存在有謝寜者若水虞候也時在側遂令寜扶若水到青城左掖門側廊屋内將理司馬樸移書二將責以大義先是朝廷凡遣使造金壁多不得見二將或踞坐帳中使甲士執引使者趨拜庭下司馬朴之使也問其族曰先祖大丞相光曰賢者之後稍加禮再往返召對宣徳門除兵部侍郎城未陥時被拘留是日朴以金人變議移書二將責以大義二帥雖不聼然重之孫覿辭免制状曰二月五日赴擊毬之集比還已不懌何㮚亦有憂色六日淵聖復遣臣抵孫傳命臣坐賜食且曰卿與朕同艱難之苦無憚行朕不忘卿也臣頓首曰主憂臣辱何憚一行既出獨怪聖語遣勞如此莫測其故比出舘忽遇鐵騎數隊分立泰禋門外見之大驚行次籍田復為數騎所遮留止墻隅間而内使金淵亦來徐見三百餘騎自南北至田一夫舉鞭之而身在中矣未幾鄭寛之梁平王孝竭王宗沔自城中來亦留不遣薄暮使人傳國相令召臣等入青城伺候内東門一人出小紙傳喚梁平王孝竭王宗沔金淵四人姓名與俱入留臣寛之待門外即見四人者出臣挽孝竭等問知其故驚悸失聲三朝北盟㑹編卷七十八
