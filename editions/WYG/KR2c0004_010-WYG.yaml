body:
  text: 三朝北盟㑹編卷十宋徐夢莘撰政宣上帙起宣和四年九月二十七日癸未盡十月二十日乙巳二十七日癸未遼國蕭后遣使納欵奉表稱臣封氏編年曰蕭后聞常勝軍降甚懼召番漢百官議曰大金人馬已入奉聖州今又易州高鳯涿州郭藥師歸宋國歩艱難宗社將傾今欲與卿等議其去就两國孰可倚者苟可托國吾將從之納欵臣屬亦無恨也若使天錫有嗣斷不干預只今事議去就或謂金人方强宜附大宋百年信誓可依后曰二說皆可取遂遣永昌使蕭永乾文閣待制韓昉使本朝同中書門下平章事張言尚書都官員外郎張僅使金國皆奉表稱臣蕭后表曰遼國太后妾蕭氏言蓋聞溟海納汙繄衆流而畢㑹太陽舒照豈爝火以猶飛方天下之大同故聖人之有作拊心悼徃飲泣陳辭伏念妾先世乗唐晉之季年割燕雲之外地暨逢聖運已受齊盟義篤一家誓傳百䙫孰謂天心改卜國歩多艱先王遇板蕩之餘勵興復之志始虛推戴奄致淪殂爰屬惸􅄔俾續禴祀常欲引干戈而自衛與社稷而皆亡伏念生靈重罹塗炭與其䧟執迷之咎曷朂為奉上之勤伏遇皇帝陛下四海宅心兆人為命敷文徳以柔逺奮武怒以訓時必將拯救黎元混一區宇仰承嚴命敢稽歸欵之誠庶保餘年猶荷永綏之惠今差永昌宫使蕭容乾文閣直學士韓昉等詣闕奉表陳奏以聞臣妾蕭氏誠惶誠恐頓首頓首謹言徳興元年九月初十日遼國太后臣妾蕭氏上表二十九日乙酉取易州先是二十二日劉光世得宣司檄令應易州即遣别將馮宣慶以精騎五百夜趨易州僧明賛逺迓王師具言已占據易州訖高鳯與宣慶等共守回申都統司二十六日童貫移檄楊可世與劉光世合軍兵共撫易州下淶水扶溝赴涿州與大軍㑹禀延慶節制且戒體國輯睦無得以私害公延慶可世有素隙忌媢畧同可世部安肅兵駐軍孤山與光世合發檄書復又互爭高下氣相尚不服叱咄軍中譸張有異論叅謀宇文虛中與監軍鄧珪平之命分營凢三日至易州至二十九日副都統何灌日中持使節至易州城外太師高鳯少卿王悰領軍民僧道萬人莫不感悅鑼鼔香花迎勞王師是日入城撫定官民閱諸府庫封氏編年曰西路統制劉光世與契丹迎戰於易州之南古燕城光世稍􅁍易州人趙秉淵殺城中契丹疲軍州人大悅於是遣人迎王師納欵衛尉少卿王琮以城降涿易兩州皆下百官詣紫宸殿稱賀拜郭藥師等官有差郭藥師恩州觀察使依舊知􅃰州軍州事張令徽左武大夫洮州防禦使劉舜臣武功大夫㤗州防禦使甄五臣武翼大夫懐州刺史趙鶴夀右武大夫闕州刺史龔詵趙拱韓璧並朝請朝散大夫直秘閣餘將校各有差令趙鶴夀齎告勅並犒物回令於十月一日與藥師等來易州與大兵㑹燕京所管三十餘處連鄉兵五十餘萬悉應王師以常勝軍八千易州義兵五千並𨽻劉延慶前軍為鄉導仍自􅃰州屯泊於雄州郭藥師者渤海之鐵州人也善戰遼以為禆將領常勝軍常勝軍本謂之怨軍遼人始以征伐女真為女真所敗多殺其父兄乃立是軍使之報怨女真故謂之怨軍然怨軍初未嘗報怨每女真兵入則怨軍從以為亂女真退則因而復服常以為苦天祚與羣下謀殺怨軍除其患故其中郭藥師等反殺其首領而降都統蕭幹遂拜金吾大將軍俾守􅃰州屢以勝我及九大王死蕭后立藥師知燕中勢將亡遂决䇿首以􅃰州來降則常勝軍實反覆之徒然燕中號健鬬者也其副曰張令徽其下又有四將號彪官毎彪五百人則常勝軍本二千人本朝收復之後因増至二萬其後又増號五萬實燕人之先以城降者故朝廷寵異之十月一日丙戌郭藥師來易州是日郭藥師等以數騎來易州叅副都統何灌犒勞訖俾赴宣撫司公參趙良嗣與烏舎等赴金人軍前燕雲奉使録曰奉御筆處分由濟南徳􅀶度黄河過邢洺取井陘路至代州朝谷寨先是大金國主阿固達已親領兵甲數萬􅀄欲趨中京道中聞契丹主聚兵于五國崖急領兵襲之八月十二日戰於狗泊之地生擒契丹都統偽駙馬蕭規天祚引數騎脫身遁去及夏國引兵數萬襲天徳軍女真都元帥遣其禆將尼楚赫羅索貝勒統兵七千與夏人逆戰於阿磨下水夏人敗走是時秋霖積潦山水適至河暴漲人馬溺死者不知其數金人已再殺敗契丹又戰敗夏國兵驕氣銳所至殺戮無算其下大畏之因秋成遂來傍邊阿固達屯奉聖州之東尼堪烏舎屯應州之南尼楚赫羅索屯洪州之西牧馬休兵請議於朝廷茆齋自叙曰是年八月宣司回軍至河間府上委劉延慶都統陜西大兵力謀復燕僕時隨宣司在河間竊聞延慶與幕府議持重不可進兵使女真軍馬先入居庸關收下燕京然後多以嵗幣贖之此為萬全僕以謂若使女真入關後必輕侮中國為患甚大用兵務在神速遂條論利害上宣司言不許入關其利有闕許入關其害有七中書省經撫房劄子王黼當筆將樞宻院應于邊路務軍事盡録所置經撫房施行樞宻院不得預差馬擴充奉使大金國國使副使前去濟南府已來等候國信使趙良嗣同取登州海路前去奉使仍充送伴大金國通議使副金人縁赫嚕大廸烏之回疑我有謀又自以已不報師期一靣進兵取大遼中京據山後地土聞南朝委童貫舉三路大兵趨燕地遂遣圖克坦烏舎髙慶裔等來使以修好為名且以窺覘吾也至青州承御筆據代州奏探報阿固達已到奉聖州在雲中府之東乃唐新州契丹改作奉聖州仰趙良嗣馬擴送伴使人取代州路過界前去奉使阿固達蓋聞我軍入燕境已數交鋒慮我自取燕而已不得嵗入故親來以决機㑹僕因詢良嗣今次朝廷所遣奉使欲議何事良嗣出國書副本及御筆事目云若本朝馬軍乗勝已入燕京更不請大金人馬過關如或未曽即請大金軍馬進於燕城之北本朝軍馬進於燕城之南依元約夾攻之僕抵掌大驚謂良嗣曰金人方自以不報師恐王師定燕之後守把關口彼不得嵗入金幣故遣使通議一則接續和議以邀嵗幣二則使來窺我動作趨向幸而彼未知吾种師道楊可世白溝小衂童宣撫氣沮而退在我則當領彼來和之意固執前約姑與之言曰南朝自聞貴朝舉兵便發大兵相應夾攻蓋昨來送赫嚕等還乃所以待回船來報師期不敢疑貴朝爽約但只猜度恐舟船海中阻風或别失悞故不待報來遂急舉兵於元約夾攻之說彼此别無違處既以此意答之仍亦以此作國書須一靣催督宣司進兵刻期下燕以振中國之威平燕而和女真用絶日後輕侮之患可也何得自示懦弱盡露腹心傾身倚以為助全藉彼兵直許之入關如此則大事去矣日後窺肆侵凌之患其禍豈易量也良嗣愕然曰今宣司已退遁兵力不支自非藉彼之力助之後以金帛誘之何以得燕某曰龍圖既知我軍力不能取何不明白奏上畫與女真使自取之急修我邊偹守白溝舊界保吾故疆豈可含糊茍目前小利不防久逺之患愛指失掌此某不敢預也是時某父亦同行遂以與良嗣辯論事白父謂某曰與金人共事當先立威以振服之於後可保無患今宣司已退阻又豈可以吾之腹心盡露與敵國及女真豈可以情輸之乎既如此論議後必誤國汝宜速奏論之若不從即乞罷無阿隨誤大計僕於是宻畫利害論女真不可使入關要當進兵先取燕京則金人自服邊境可定乞罷使臣事自將歩騎萬人趨不虞之地入燕平定五關以杜女真窺覘之患五日庚寅郭藥師等至宣撫司郭藥師是日至宣司公參待罪云藥師僻逺燕人猥守一郡久伏堯化歸向莫縁近聆王師已届疆場謹率同屬請命於宣司童貫令僚佐撫勞有差御筆改燕京為燕山府燕京古之幽州武王克商封召公奭於燕以燕然山得名漢置涿郡唐武徳元年改燕州天寶元年改幽州舊號廣陽郡有永清節度使燕京改為燕山府八日癸巳都統劉延慶與郭藥師等出雄州入新城趨涿易路九日甲午遼人蕭容韓昉至雄州蕭容韓昉至雄州童貫蔡攸以軍禮見之貫攸以其所上表不納土止納欵稱臣麾而去之斥容昉曰非納土不受昉笑曰納欵即納土也其部落多未易圖朝廷當思两全無貽後日之悔又曰好隣舍朝廷蹙踏了不知彼惡鄰舍也必悔之貫以蕭后表即日飛奏留蕭容韓昉於雄州令管待别聽朝廷指揮御筆涿易八州並賜名山前九屬縣下項燕山府一十三縣析津宛平都市昌平良鄉武清安次永清玉河香河漷隂涿州四縣范陽歸義周安新城檀州二縣宻雲行唐平州三縣盧龍古城馬城易州三縣易水陜容城容州一縣柳川順州一縣懐柔薊州三縣漁陽三河玉田景州城縣賜名威塞盧龍縣賜名盧城石城縣賜名臨州除燕山府已賜名外􅃰州賜名􅃰水郡威行軍節度使檀州賜名横山郡鎮海軍節度平州賜名海陽郡撫寧軍節度易州賜名遂武郡防禦營州賜名平盧郡防禦順州賜名順興郡團練薊州賜名廣川郡團練景州賜名深川郡軍事十三日戊戌蕭后表至上御紫宸殿受賀太宰王黼等率百官奉表稱賀表曰制軍命將用申中夏之威取亂侮亡遂復全燕之地盛超振古喜溢綿區臣聞舜肇十二州始别冀都之壤周建八百國首疏召奭之封當天津析木之交實上谷廣陽之勝形勢有金湯之險膏腴號陸海之饒石晉不綱契丹始大割土地而失山河之險長驕縱而定父子之稱民胥怨咨天乃震怒藝祖立極思與物而更新文考御邦益留神而經始於昭熈旦丕顯燕謀帝命式于九圍無逺弗届王者大乎一統有開必先天方授我以故疆敵自竄身於窮漠允資聖算爰舉師干俾收塗炭之餘四協雲霓之望虎臣矯矯王旅嘽嘽長驅出塞者百萬有奇分道並進者東西相屬敵軍效順㧞戎壘以來歸偽后祈哀即轅門而納欵豈特昆夷維其喙矣是謂燕民悦則取之雨露涵濡盡率土普天之廣山川表裏無此疆爾界之殊恭惟皇帝陛下性偹堯仁智兼湯勇誕敷文徳同四海之車書肅將天威辟三王之境土凡此濯征之策仰繄獨斷之神料纎悉於九重契幾㣲於萬里人神效職天地合符亟臻復古之勲仰快在天之憤受端圍之獻方陳希濶之儀増輿地之圖更闡文明之化臣等叨聮輔弼初乏賛襄宅朔方曰幽都獲預觀於偉蹟至岱宗覲羣后願遂吿於成功臣無任云云詔答之詔曰朕纂丕圖日新庶政思加大信式協萬邦每敦鄰國之懽用遵帶礪之約豈意蕃族自叛宗盟命帥出師巡邊偹寇天戈壓境之未久土宇來附者無餘偽后知幾遣使露封而納欵燕民効順束身請命以來歸將盡復燕雲之故疆聊共成祖考之昔志君臣有慶中外交懽成此膚功頼子良弼丕揚偉績寔係佳謀據覽賀章舉開欣快聖㫖送畫秘省賜新復州縣曲赦詔曰朕膺天駿命闕之師夜寐夙興惟祖宗之是紹頼帝敷佑中外敉寧逺暨海隅罔不率俾乃眷燕雲之境寔我舊封五季不綱陷于蕃族屬者遼主失道自絶於天怨結兵興勢以瓦解唯予克相上帝寵綏兆民爰命六師大申弔伐惟爾民有衆懐徳惟素霈然率籲羣心奔走來歸莫之能遏王師無戰而先志是承四海永清惟朕心以懌興念兹土久困暴昬上下相凌人用無吿典刑屏棄罪及無辜崇奸賊賢痡毒猶在以寛代虐帝命唯新應收復及已歸附州縣見禁罪人除抗拒王命及謀為不順外餘罪無大小並放見停廢文武官將校公吏人並許所在自陳當議盡行甄收隨材任使流配人並放還逃亡及為盜賊者並釋罪令歸業惟爾百官體兹徳意奉承罔怠以稱朕惻隱之誠庶一方亟䝉休澤故兹新札詔示咸使聞知又手詔蠲除科率詔應自前無名科率抑配及積奸弊政一切煩苛之令勅諸州一一具聞當悉行蠲罷不必待報者宣撫司除之積久税賦若公私子錢皆免人户委州縣長吏招誘以歸加意存撫貧乏餓民並以官粟賑給無令失所掠獲人口者各尋付其家違者重寘典刑又手詔甄擢賢才詔見在官耆俊若有公卿士大夫已議褒擢外有懐材抱藝湮沉下僚或素為鄉里所重未被試用者勅宣撫及州縣長吏詢採以聞當不次擢用其以忠直得罪北主或為權倖排斥或為以詿誤抵罪者並以名聞咸當甄擢永用為勸十九日甲辰都統制劉延慶何灌郭藥師等統大兵出雄州入新城縣劉光世楊可世出安肅軍入易州㑹于􅃰州先是劉延慶等至涿州撫定軍民次淶水縣縣令負弩前驅作樂致禮令可世守涿州延慶以可世所部兵少更付中軍及熙河環慶兵二萬營左軍俾楊惟中副可世延慶統諸道兵與常勝軍暨趙詡兵無慮五十萬鼓鼙振天地自古出師之盛未有甚于此者自卯至酉至良鄉縣瀘溝河前部報曰臨河與四軍蕭幹達實林牙敵鋒相接矣時敵兵不滿二萬慿河排布未究虚寔延慶令五軍下營開濠挖塹以偹敵出兵抗敵曛晚各憇勝負相償二十日乙巳劉光世等復與蕭對壘是日日將晏敵鼓譟攻我戰於料石岡三撾而還三朝北盟㑹編卷十
