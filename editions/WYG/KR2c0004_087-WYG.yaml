body:
  text: 三朝北盟㑹編卷八十七宋徐夢莘撰靖康中帙起靖康二年三月二十八日戊午盡二十九日己未二十八日戊午邦昌詣南薫門遥辭二帝是日邦昌僣天子儀衛法駕縞素詣南薫門設香案率百官士庶遥辭二聖邦昌慟哭百官軍民其間有號絶不能起者太學生皆拜哭金人兵下城有南兵至咸平軍前使來問欲盡殺為復要招安可將赦書來張急遣申彦臣以宣贊舍人賫手書徃大畧告東道總管以不得已及重兵離散且當退守之意申彦臣還云金人以鐵騎三千送至咸平以南七十里不見我師而還金人前軍起行大元帥以便宜除汪伯彦顯謨閣待制充大元帥府填陳康伯不赴闗黄濳善副元帥填汪伯彦遷赴闗耿延禧樞宻直學士董耘徽猷閣直學士髙世則遥領承宣使潛厚秘閣修撰楊淵王起之秦伯祥直秘閣金人送鄭太后家屬入城靖康遺録曰是日有畨使送鄭太后家屬入城其畨使至省説云二十七日尼堪上皇相見上皇乘轎子至寨門下轎着紫道服戴逍遥巾趨而入至幕次尼堪出迎入帳中坐良乆上皇起白尼堪云老夫得罪合當北遷但帝姬未嫁者敢乞留荷大恩也尼堪不答有頃鄭皇后自外至啟尼堪云臣妾得罪自合從上皇北遷但臣妾家屬不預朝事敢乞留尼堪㸃頭許之至今日果送太后家屬入城畨使又笑云太后善言辭進退有法容止雅麗故元帥許其請尼堪遣交割京城宣和録曰邦昌以邵博提舉修繕京城四壁是日交割外城敵既不能下南京乃自寧陵而上盡僞置官屬安撫士民至是悉驅而北舍屋焚􅅡殆盡東至桞子西至西京南至漢上北至河朔皆被其毒墳塜無大小啟掘畧遍郡縣爲之一空京城被圍半年至是㪷米二千㪷麥二千四百羊肉一斤七千猪肉一斤四千驢肉一斤二千五百魚亦如之醬一斤五百油一斤一千八百他物稱是細民頼官賣柴米稍能給然餓殍不可勝數人多苦脚氣被疾者不浹旬即死疾目者即瞽蔬菜絶少前此金人據城擷採而食尚餘枯枝劉彦宗遣人諭王時雍大軍起行且在河北駐軍如有事急飛騎來報便發兵來張邦昌與二帥書求還孫傳張叔夜秦檜三人書曰披瀝懇誠仰干恩造丐舊臣之復職䝉英豪而遣還已荷隆私尚餘至悃伏念撫封之始尤先盡節之褒庶靖國人以彰名教孫𫝊張叔夜秦檜縁請存於趙氏遂留寘於軍中既知狥義於前朝必能盡忠於今日恭惟上國方啓宏圖以忠孝而勵羣臣以信誼而開鴻業宜䝉寛貸使獲旋歸式昭聖度之仁垂副愚衷之願其於䖍扣曷究敷宣金人回書曰早承懿喻願還舊臣以爲馮澥國之老成郭仲荀衆所推信此外臣僚如或欲留之人乞下遣還之令其已放歸者係禆贊時政或有未還者俱欲留闕字仰冀照知無頼理㑹僞楚録曰書皆邦昌親筆二帥見書大怒謂取三人者其欲復講前日之事耶於是面詰再三且云今若縱兵非無名然亦駐兵不還當觀釁而動張懼不能答金人與邦昌書減銀絹書曰㑹驗宋時除依照舊例嵗物銀絹五十萬疋納錢一百萬貫初以代燕地所出今應依例輸納且念地有分割民有彫弊特免錢一百萬貫減放銀絹二十萬疋兩只議納三十萬疋兩銀絹各半其數依舊例交割布此悃悰兾爲克察邦昌答書曰重勤書誨祗荷矜慈惟前朝之所輸准定數而有舊俯念地土割裂之後方當人民彫瘵之餘曲賜軫憐物從蠲減特除免錢一百萬貫外減放銀絹二十萬疋兩每年只議納三十萬疋兩銀絹各半其數一依舊例交割所䝉指諭悉已遵奉其於感戴之心難盡敷陳之素仰惟聪察深亮悃悰二十九日己未張邦昌詣軍前餞别二帥邦昌服赭袍張紅葢乘馬出南薫門餞别二帥及午而返連日之出所過設香案起居並如常儀從行者即王時雍徐秉哲呉幵莫儔輩也士庶旁觀者莫不感愴遺史曰邦昌自僣僞位屢至南薫門服赭袍張紅葢乗執絲鞭法駕儀仗皆不備唯駕頭前𨗳初出一兩次不舉駕頭以後暫舉駕頭聲亦漸髙出南薫門見尼堪斡里雅布叙别至午刻而返金人留僕射何㮚樞宻孫傳僉書張叔夜北遷何㮚字文縝仙井監人天資俊異善屬文政和五年進士第一人及第名動一時除館職京畿提舉學士尚書主客外郎擢右史遷左史召試中書舍人王黼獨持國柄有爭進者譛之黼怒出㮚守潼川未行太上皇帝擢爲御史丞第一章論士俗頗中時弊皆黼黨所爲其論士俗章曰竊惟陛下昭至德建太平體堯舜之用心急親賢之爲務見一善改容而禮之取一長加意以成之或繇匹夫而起下僚遂享好爵而都顯位可謂於卿士大夫無負矣其忠純慤直亷茂介潔之士進以其道取由其義誠不敢忘陛下厚恩而犇競附麗乾没亡恥之人常與同類並居傷化失俗或在於此比年以來茍合取容阿黨相比爲私門之惠忘國家之恩貪進務得變詐百出託身之初腹心盡布謂之納忠被用之始先加約束謂之受記前出某氏之門一不滿意又轉而之他則謂之投換隂與之合而陽背之以陷害異已使至不測謂之擺蹤或輸誠死黨自明不欺則有損親戚之好而發其私書或託爲耳目媒孽所憎則有伺記朋舊語言縁飾増加而傳之短巷通姦利行貨則有徃來其問者營私家給子弟則有甘其役辱者爲士大夫而失節䘮誼一至於此葢其爲説曰狥私之効速於奉公附下之利過於事上凡國家之治忽生民之利病若不相闗然一旦有緩急而取用之寧負朝廷不負知已豈不上傷隂陽之和下隳萬事之緒哉臣聞百僚師師重華致治多士濟濟文王以寧葢人臣釐肅於下則人主尊安於上今以陛下之聖智誠明斷而早正之辨是非别邪正収權􅃂破朋滛以崇至化而捄失俗則雖前古帝王之盛何足道焉臣愚不知治道唯陛下留神裁察黼益怒不閲月以坐蘇氏師黨曲學奏罷除待制官靖康初復召爲中丞改翰林學士拜尚書右丞中書侍郎時議京畿守備㮚建議四道總帥重其權事得專逹吏得廢置兵得誅賞財得移用規畫甚善即詔行之屬已廹盛秋措手無及然大名睢陽皆能保守亦其效也是年冬金人再至京城詔百官卿大夫供議狀於廷主和議與戰議論不一㮚力主戰議旋遷門下侍郎夜夢武夫挾弓矢入門射中其幞頭㑹當拜相奏陳乞改太宰少宰仍舊爲僕射翰林學士呉幵正仲當制建白僕射之名不經願循漢制改爲左右丞相上深以爲然中批以問㮚欲實夢遂沮其説明日降制拜右僕射城䧟和議兩詣敵營議和從駕幸青城尼堪以㮚主戰議從二帝北狩張邦昌以書懇取不允天下恨之在敵營題絶句云念念通前刼依依返舊魂人生㑹有死遺恨滿乾坤少問詩於韓子蒼同在掖垣相與商確文章日進識者謂其才藻宜在兩晉恨柄用之不早况當變故之際也兄棠字文植弟榘字文度皆好學能詩以才知名後秦檜自北中來言㮚死矣林泉野記曰何㮚字文縝仙井監人政和五年登進士第一人有詩名靖康初為左丞金人之入汴也盛兵河東復遣王芮來聘及尼堪至闕范宗尹議割三闗以獻敵㮚止嚴守備以待之王芮復至請割黄河為界唐恪欲許之㮚以為不可罷為資政殿學士提舉醴泉觀俄而恪乞罷乃拜㮚尚書右僕射前一夕夢朝服而立一人彎弓射中幞頭㮚驚覺次日遂大拜然敵已逼城㮚但堅守禦而已金使又來㮚叱而留之促諸路兵入援了無至者及城陷㮚與張叔夜領兵欲復奪城竟不能上欲奪圍出幸江南㮚諌止曰京城近畿金人布滿車駕南行必不能脱陛下出城敵必燒戮生靈矣上乃止敵召㮚至寨尼堪問曰勸宋主與我戰者豈非汝耶㮚曰然尼堪曰汝有何學術與我戰耶㮚徐曰為國為民耳尼堪曰我欲縱兵洗汝城如何㮚從容曰縱兵洗城元帥一時之威也愛民施徳元帥萬世之恩也尼堪大悟乃戢兵㮚北遷終不屈於敵秦檜自北中還力稱其忠遥加觀文殿大學士且訪其子孫云何㮚初拜中丞王以寜上書曰竊惟閣下以雄詞大筆収天下之豪傑以亢烈疏亮中立不倚自結當宁一人知抗章請郡實未出闗明日自禁中出片紙宸翰留公為中執法天意特達豈徒然哉殆欲聞天下之言也人主不得聞天下之言則天下之事去矣一旦慨然而悟赫然而斷惕然有憂天下之心則治亂安危成敗之幾如反覆手此豈非天下之慶乎閣下盍亦正心誠意求天下之事以禆聖主之聰明鳯鳴朝陽士類幸甚方今天下有甚憂者五請爲閣下畧言之盗賊充斥一可憂姦雄䟦扈二可憂夏人陸梁三可憂契丹復振四可憂金國旅拒五可憂河北山東之盗少者數百多者數千白晝横行掠人婦女剽人貲産廵尉不敢抗縣鎮不能守滋漫浸滛未見消除之漸使皆庸人野夫之志不過於避徭役掠衣食脱寒餓何足憂哉萬一其間有虓勇如項籍雄鷙如李宻輩起而􅑀之則樂禍之徒雲集颷至此愚之所憂者一也郭藥師者遼東一小羗爾左右賣國見利斯動豈復知有名義者封崇之栽培之羽翼已成頭角已露無愛民之心竭取而後已常勝之兵日争而不休争養義児隂蓄死士貪頼亡耻之流樂為之肺腑其志不在范陽節度使大則為侯景安禄山小則為田承嗣為王武俊之所為吾之所以備豫未知其䇿此愚之所憂者二也赴金肅軍西行直雲五者夏人保此蕞爾之地猶能與上國争衡今浮梁以東勝州之沃壤金國取之以遺夏人此孫權借荆州以闘曹氏之意也夏人得李克用之所據劉繼元之所巢而後滿閣下試圖將帥孰可以付此愚之所憂者三也契丹雖失國種落不下十萬隂謀乎松漠隂山之下其心未嘗一日忘漢也雲中之民王靈弗加歸漢之心似或中變使耶律延禧置胆於坐少洪天􅍈之風不忘其主則雲中之衆填然躍而附之太康以一旅復舊物雖非所及而城濮之後楚司馬尚在吾獨無憂哉此愚之所憂者四也以阿固達之勃興烏竒邁之保聚尼堪之機籌加以漢人如白公旦楊樸之流相與輔相之緩則邀我金帛庫藏傾竭急則驚我邊圉戰守無人燕山嵗計已不啻一契丹金人之錫予復過一契丹餓虎之喙何時而足耶此愚之所憂者五也曷亦知所以消憂之道乎清心省事一言而足矣葢清心省事則吾民之衣食足衣食足則盗賊消盗賊消則勢强勢强則姦雄息姦雄息則敵國畏懐太平無象之福與天下共之豈不樂哉議者以為燕雲既歸中國遂可寝兵此腐儒之談爾吾知汲汲清心省事果斷而力行之則横賦暴歛不加於百姓有梗吾之化者吾徐起而討之平州之張覺勇而善守宣州之韓慶民沉毅而有謀雲中之蘇京媯楚之二三大姓吾遣一介之使慰安其心使為前掎後角旁衝直擣之援燕山之民田可以為屯田燕山之丁壯可以為弓箭手常勝之兵可以分𨽻諸將則藥師蕭然一降卒爾循理則附之䟦扈則誅之尚何憂哉夏人陸梁則當謹河東之疆圉契丹復振則當懐雲中之舊民金國之勢目前初若强盛豈有連兵累年政在權貴再世而無事者加以漢人之無頼者非心悦而誠歸之豈無讒慝發於君臣父子之間遲以數年北庭復為數部落矣此五者初固甚可憂聖上今日赫然獨斷慨然力行則反手之間轉憂為樂此又係於閣下之一言爾閣下朱顔緑髪年未四十黒頭三公何慮不作名義至重願自厚愛僕有數談有大於前所云者交淺言深今未可也願閣下無負聖主特達留公之意天下幸甚孫傳字伯野兖州人元符三年登進士第靖康中累擢兵部尚書金人至京師除僉書樞宻院京城守禦使金人攻城兩月極力隨機以禦之及城陷民亂傳與張叔夜以兵來彈壓定之上徃尼堪寨傳除京城留守及金人變議傳上書乞復立上不許又乞立皇太子或燕越王又不許又乞立趙氏一人又不許傳詣南薫門拜泣請存趙氏尼堪取詣軍中廹令供狀立異姓屢欲誅之傳終不從請死而已乃領傳北去世稱其忠建炎初遥加觀文殿學士終以不屈卒于金國年五十一靖康小雅曰靖康元年冬金人兩軍㑹於京師樞宻聶昌使出北中公遂遷知院事方敵之急攻京師也公親當矢石閲月未嘗少休城既不可守上將幸敵寨命公居守十一月二十七日夜上以御寳付公公用生縑為囊係之肘間親加撫循乞上歸城中帖然明年正月上再出又申前命且使兼太子傅以保䕶東宫乘輿久不歸公屢具書極陳利病鎸諭二帥請大駕還宮不報二月六日呉幵莫儔自北中携廢立書來中外震駭公大慟久之曰吾唯知吾君仁聖可帝中國茍立異姓吾當死之又數請再立上明旦敵大闢南薫門鉄騎極望闖門而陳且索太上皇皇后請王妃公主猶留中宫太子不遣宻謀欲以黄金五千兩使人匿太子於民間無當之者太子出隨至軍前自是公之死生不可得而知也嗚呼求生逃死人之常情也靖康之末禍變如此同時大臣如唐恪曹輔王時雍吕好問呉幵莫儔徐秉哲邵􅄎謝克家孫覿汪藻胡交修詹乂李㑹李熈靖李擢之徒或失節求存或叛為敵用或乘勢為奸利或託疾病而不出或緘黙坐視公獨視一死猶涕唾敵未嘗欲公出義不負上付託之重誓以死衛太子又欲見二帥復立趙氏亦可謂卓爾不羣我宋忠純之臣也艱難以來所未之見可以垂範播美於無窮矣詩曰巍巍孫公忠烈俱偉受天大任淵渟山峙謀謨宻宥帝所眷倚付以留鑰又託以子天未悔禍甘赴萬死國家徳澤周及遠邇罹兹禍變孰奮而起公節不渝獨負大美若神人然衆所仰止彼以偷生徒奄如鬼三朝北盟㑹編卷八十七
