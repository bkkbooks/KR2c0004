body:
  text: 三朝北盟㑹編卷二百四宋徐夢莘撰炎興下帙起紹興十年閏六月二十日壬辰盡十二月二十日壬辰張憲克潁昌府趙鼎責授朝議大夫分司南京邵武軍居住趙鼎聞金人敗盟用兵乃上書言時政秦檜忌鼎復用乃令御史中丞王次翁誣以罪言遂責授焉秦檜之憾鼎其始也鼎罷宰相出知紹興府檜具筵餞於浙江亭不留而登舟其既也鼎上書言時政其憾不可釋矣劉光世囬軍太平州二十四日丙申張憲及金人戰於陳州張憲克陳州岳飛令統制趙秉淵知軍州事二十五日丁酉岳飛將楊成及金人戰於鄭州克鄭州王勝克海州擒偽知州軍士王山韓世忠遣都統制王勝率統制王權王升等諸軍取海州偽知海州王山及統兵官花太師至磨行與官軍相遇官軍擊退之去海州六十里勝令二更到城下諸軍齊進果二更至城下轉城不住撁舟趨城北城上以瓦礫抛擲亂擊舟人皆不顧而行逼曉至城北是時花太師退兵唯王山守城勝令諸軍分地攻擊勝坐於北壁濠下令諸軍早飯要白米猪肉段子食畢先使搭材以長行擊刀斷其釣橋繩釣橋落以大竹卷草如黄河卷掃様使數百人推至北門下釣橋有妨碍處即以鋸截去之然後推入縱火凡三卷壅其門而火登陴守者於黑烟中擲磚瓦打火燒門盡打火亦滅有磚瓦盖地地不甚􅉯行隊方鱗次於門外而第四隊周成先入行隊皆入成舉認旗於城上衆呼曰周成第一勝傳令盡開諸門諸軍自諸門皆入然火燒門道尚有燒在瓦礫之下舁水沃滅之治道而後勝入坐於十字街之民舍生執王山時花太師率兵到城下不及戰而退去父老僧道詣勝唱喏得罪勝曰國家以海州久陷偽境故遣官軍收復境土國家專行仁徳不事殺戮各各安心照管老小父老再拜謝曰欲乞裒斂金銀犒軍勝曰官軍入境秋毫不犯不須裒斂金銀如有猪肉米榖犒諸軍一飯可也父老拜謝而去率斂城中猪羊牛驢并般擔米麵犒軍勝受之分給諸軍即時報世忠勝在城北居人猶未覺尚有賣糕者少頃攻城居人方稍避之世忠毎出軍令諸軍秋毫不得擾民諸軍經過偽境路傍有農夫皆倚鋤而觀二十六日戊戌張俊克亳州金人復占河南以酈瓊知亳州劉光世遣使趙立齎書至壽春府孫暉就差一人同徃招瓊張俊亦遣二人齎書招之暉令南京進士蔡輔世同立先徃輔世遇亳宋人有相識者具以情偽告且曰公見酈侯未可直之當徐徐也輔世知其意遣立齎書先行至門守者問之立鄙人無謀乃言劉相公遣我齎文字來招酈太尉守者不敢隠遂送瓊所瓊不發書而焚之枷立項送獄俊所遣二人猶未知乃作商賈入城𨽻曲詣州衙計㑹通報既見瓊則出其文字瓊亦囚之并文字解送烏珠命凌遲處斬於京師瓊發二人之次日亦解趙立行密諭部送人縱其去時輔世復回夀春矣俊以大軍至城父是時王徳已下宿州即引兵趨亳與俊㑹於城父於是瓊謂三路都統曰夜乂來矣其鋒未易當請避之遂率衆遁去俊軍至城下百姓父老具香花迎軍入城初軍見國家軍馬出酒食餉軍徳功居最遷興寧軍承宣使龍神衛四廂都指揮使制有之曰智勇自見屢収不戰之功果毅敢前如踐無人之境德甚慰恱張俊退殺前知濠州楊珪於途中張俊軍馬在亳州一夜星斗晃耀夜半後俄有纎雲倐忽滿空遂大雨霶霈甲士皆坐於水中徹旦退軍留宋起知亳州留兵千人與之百姓失望楊珪者以子弟所授官仕劉豫後歸朝自言是武功大夫而張俊以武功大夫授之俊方經營淮北嘗曰當用諳練偽境事情者武臣為邉知州使之經營淮北珪知之乃具劄子迎合俊意大喜遂令珪知濠州珪用刑峻酷人不敢犯金人交還河南也珪受代往宿州居於歸受館中獻烏珠取江南之策烏珠不用復還宿州是時俊軍馬到宿亳間珪迎之又獻平敵書與俊俊知其投書於烏珠不中乃與俱還投之於途中以逃亡聞揭榜召人捕捉之趙鼎責授清逺軍節度副使潮州安置秦檜令王次翁誣趙鼎知金人敗盟曾出怨言事故自邵武軍安置潮州七月二日癸卯岳飛張應韓清克西京六日丁未李興知河南府兼主管本路安撫司公事特轉右武大夫忠州團練使初金人逼西京河南兵馬鈐轄李興聚兵迎擊収復伊陽等八縣又敗金人於河清縣奪到藝祖皇帝御容乘勝收復鄭汝州偽河南尹李成棄西京遁走於孟州興遂申朝廷乞差帥臣官吏湖北京西宣撫使岳飛差兵官郝晸焦元蘇堅方來㑹合至是詔下就除興知河南府兼本路安撫司公事仍特轉右武大夫忠州團練使訓辭襃美仍給真俸皆出異恩也先是翟興嘗鎮撫河南許以便宜行事許興依翟興例是時張應韓清亦報收復西京矣八日己酉岳飛及金人烏珠戰於郾城縣敗之楊再興單騎入敵陣欲直擒烏珠不獲殺數千百人而還身被數十創十日辛亥岳飛敗金人於郾城縣是日殺金人將鄂爾多貝勒十四日乙卯岳飛統制王貴姚政敗烏珠於潁昌府中楊再興王蘭髙林歿於陣楊再興王蘭以五百騎直入敵陣殺數千人再興與蘭皆戰歿髙林亦戰死聞者惜之獲再興之屍焚之得箭頭二升天大雨溪澗皆滿溢敵騎不得進官軍乃得還十九日乙卯順昌官吏手詔詔順昌府官吏軍民等强隣犯境王師扼衝惟爾吏民協濟軍事保扞城壘驅遏敵勢眷乃忠勤宜加撫惠應本府見禁罪人除犯刼殺故殺鬭殺並已殺人者並十惡罪至死偽造符印放火官員犯入已賍將校軍人公人犯枉法監主自盜賍並依法内枉法自盜罪至死情理輕者奏取指揮鬭殺罪至死情理輕者減一等刺配千里外牢城斷訖録案聞奏其餘死罪降從流流罪已下並放官員在城守禦者並與轉一資軍人等第犒設一次民間租税昨降赦已放三年外更與放免二年管下諸縣及鄉村人户曽被敵人焚刼財産屋業者並依灾傷法賑濟給舊使郊曽經放散委有武藝才力可使者依舊收補支給請受管内逓鋪兵級更與犒設一次逃亡軍人限指揮到百日内許於所在首身依舊收管限滿不首復罪如初應本府縣有民間利害守臣條具以聞詔書到日明告吏民各令知悉二十一日壬戌岳飛自郾城回軍岳飛在郾城衆請回軍飛亦以不可留乃傳令回軍而軍士應時皆南嚮旗靡轍亂不整飛望之口呿而不能合良乆曰豈非天乎八月楊沂中軍於泗州四日乙亥韓世忠圍淮陽軍韓世忠圍淮陽軍命諸軍齊攻之有帳前親隨成閔者隨統制許世安奪門而入大戰於門之内閔身中三十餘鎗世安已脛中四箭力戰奪門復出閔氣絶而復蘇者屢矣世忠大呼賞之初閔之叔父戰於馬家渡身死所得恩澤無子承受時閔為僧童世忠尋而得之受其叔之恩澤補初官世忠教以弓馬乆之轉至武藝郎為帳前親隨而奪門立功世安以箭瘡不能乘馬遂肩輿而行世忠怒金人探知於是併力以禦飛飛兵不能支㡬敗告急於錡錡為出兵牽制抵太康金人乃退飛軍得還於是殿帥楊存忠充淮北宣撫副使而以錡為判官自行在朝回泗上出兵至宿州累與金人相遇而兵敗復渡江歸行朝江北别無軍馬朝廷亦命錡班師歇泊於鎮江已而移軍當塗金人懲敗簽兩河之人於各部其數十萬大舉為南牧計十一年正月攻夀春朝廷復命錡屯廬州錡所將歩兵不滿二萬騎數百而已是月十九日錡被命北渡江夀春守臣孫暉與統制官雷仲已棄城而出金人於是入夀春盡殺守城南兵千餘人繫橋三道渡兵淮上二十五日錡至廬州駐兵城外時廬州帥陳密學卒於州城中無守臣備禦之具皆缺官吏軍民散出逃遁止有淮西宣撫司統制閆承宣兵二千餘人至是亦奔竄而出錡軍未集輜重尚逺而敵遊騎已至城下錡於是領兵復回二十六日金人大兵入廬州遣輕騎數千追襲錡是日晚追及於西山口相去數里時小雨連日軍馬疲乏錡自以親兵八字軍數百人殿其後據山口而住使衆軍飲食訖西向列陣以待追騎望見錡旌旗逡巡不敢逼相持至晚各解而退次日錡結陣徐行號令諸軍占擇共趨東闗依水據山以遏金人之衝自金人渡淮淮南之人為遷移之計惟視錡兵以為安危錡即得東闗之險稍休士卒兵力復震金人大兵據廬州雖時復遣兵入無為軍和州界内剽掠而不敢舉兵逼江者盖懼錡之乘其後也江南由是少安後二月十五日乃渡江采石以保和錡既得俊渡江聲援相接乃相約進兵而殿帥楊存中亦自行朝而至朝廷乃命三宣撫合軍併力以禦金十四日錡起東闗領兵出清溪邀擊金人收復巢縣俊亦遣先鋒至含山金人遊騎在無為軍和州界者皆退十七日錡在柘臯與金人相遇夾河而軍柘通巢湖濶二丈餘金人見錡軍少意甚易之有出入於寨前者錡乃令軍士曳柴壘橋須臾橋成遣甲軍數隊過橋皆卧槍而坐金人望見復入不敢出良乆俊遣其姪總管及統制王承宣田徳承宣師中與楊存中並以騎兵相與犄角十八日與金人戰諸軍雜比横騖而進内騎兵有稍却者錡令麾下斧手堵而前奮鋭擊之金人大敗退歸廬州烏珠乃舉兵北歸錡既勝以所將步人甲重不能奔馳下令軍中不得擄掠諸軍騎兵多者各乘勝襲逐搜羅敗散攘奪棄遺以為俘獲而錡軍中一無所取二十一日三宣撫俱至廬州城下數日之後俊存中大軍乃始畢集時淮東漕胡直閣昉淮西漕李敷文仲孺江東漕陳郎中敏識皆被命隨軍饋運朝廷又遣兩㳺漕張少卿滙繼至㑹集於軍前是時朝廷雖命三宣撫合軍不相節制然而三軍進退主盟於俊而存中又俊之腹心也錡以順昌之功驟至節鉞朝廷委任過諸大將而朝野士民之譽又翕然故諸將皆切齒嫉之至是俊存中雖外合同其實軍旅利害二人同心錡皆不得預聞又不得專進止方金人之初退虚實未明三軍相視猶豫未决但聞俊存中議欲棄夀春而移廬州於巢縣以廬州為合肥而濠州自金人侵困圍閉城守日夜遣人至軍前求援至三月初有被擄人民自淮上竄歸者皆言金人渡淮去已逺而濠路又通初五日俊因㑹飲謂錡曰公歩人乆戰可自此先回徑取采石歸太平吾與楊太尉至濠州耀兵淮上安撫濠梁之民而吾軍取宣化以歸金陵楊太尉渡瓜州以歸臨安庻道路宿食樵爨不相妨乃命諸漕備十日錢糧諸漕以水路止於廬州陸路無夫搬運遂議欲支錢糧軍士人一千使之附帶竟如諸漕之議及江東陳漕撥水路綱運入滁州接二軍是夜二軍調發遲明軍馬盡起獨俊留兵數百未行六日早存中移俊帳㑹食訖二帥先行去數里探者復報金人攻圍濠州甚急俊茫然失色復遣一使臣馳邀錡錡遽命軍中亦負十日糧維二軍而行初九日去濠州六十里地名黄連埠各駐軍比至則金人已破濠州殺太守王進盡擄州人發掘城壁而去俊乃召存中錡謀之錡謂存中曰兩府何以處存中曰厮殺耳相公與太尉在後某當居前有進無退錡曰有制之兵無能之將可御有利害之兵有能之將不可御也今我軍雖鋭未為有制且軍士被甲荷糧而移今已數日本援濠州濠州已失進無所據人懐歸心勝氣已索又糧食將盡散處逈野此危道也金人雖詭計莫測今不若擄險下寨塹地栽木使根本不可動然後出兵襲之若其引去徐為後圖此全師保勝之道願相公圖之諸將皆曰善於是鼎足以為營仍約逐軍選募精鋭旦日入濠州俊遣斥堠數輩還俱言濠州無金人或謂金人破城之後無所藉又畏大軍之來尋已去矣錡乃再遣數百徃探皆無所見俊乃遣將官王闕謂錡曰已不須太尉又去錡乃不行惟楊存中與王承宣領二千餘騎而徃以兩軍所選精鋭隨之四更起黄連午時騎兵先至濠州城西嶺上列陣未定而金人伏甲騎萬餘於城兩邉須臾烟舉於城上伏騎分兩翼而出存中謂王曰如何王知其勢不可乃曰某統制官也安敢預事太尉為宣撫利害當處之楊遽乃以策麾其軍曰那諸軍聞之以為令其走爾散亂南奔無復紀律其步人見馬軍走謂其已敗皆散金人追及步人多不得脫殺傷甚衆遺棄器甲相屬於道黄連三軍聞之皆拔寨而起存中長驅十二日渡江俊十四日渡江錡乃按部伍整旌旗最後徐行金人亦不復追而回錡至和州駐軍馬具奏二月十八日得㫖乃歸當塗淮西之事大略如此以士大夫所聞稍異多不得其實予終始從事其間故得而具記之三朝北盟㑹編卷二百四
