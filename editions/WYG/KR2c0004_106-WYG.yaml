body:
  text: 三朝北盟㑹編卷一百六宋徐夢莘撰炎興下帙起建炎元年六月五日癸亥盡其日五日癸亥責降王時雍等臣僚上言金人之變而近臣百官有為金人股肱者驅逼二聖太子后妃及搜捕宗室戚屬如王時雍徐秉哲余大均者有為金人之喉舌傳布命令廢本朝而建偽楚如呉幵莫儔者有因為奸利汚染國戚如王及之者有為偽楚之輔翼總其政事如馮澥李回者有受偽楚之官爵與啇議論如李擢孫覿者有肆為惡言以辱本國以謟邦昌或為定册之儀視之恬然不以為怪如胡思顔博文王紹者除徐秉哲己責授余大均王及之胡思别聴指揮外王時雍等並安置王時雍責授昭化軍莭度使髙州安置徐秉哲責授昭化軍莭度副使梅州安置呉幵責授昭化軍莭度使永州安置莫儔責授寧逺軍節度副使全州安置朕惟國家勵名節於百年之餘尊士大夫於衆人之上非以周旋於閒暇盖将責望於安危茍捐軀狥國之無人知排難觧紛而奚頼具官早縁推擇進躐近班當君親䝉犯於氛埃至臣子盗稱於神器兹非小變何以生為乃通命令之往來坐使等威之差僣此而濶畧勢不可容宜寵秩之盡鎸以一官而置散無忘自省尚服寛恩王紹除名勒停送容州編管李擢責授成州團練副使栁州安置顔博文責授果州别駕澧州安置孫覿責授海州團練副使歸州安置並令所在州軍差人管押前去孫覿辨受偽官等状曰臣在宿州見報有臣僚言章稱受偽楚官爵與啇議論有如孫覿李擢者奉聖㫖散官安置伏念臣自靖康元年八月和州召還十月䝉恩召試中書舎人兼侍講資善堂撰文官十二月初三日權直學士院詔劄具存又因東壁統制官不散特支例降三官至今尚未率復又自拘執敵營七十餘日至三月二十三日放還次日便在假即不曽赴中書後省學士院供職二十七日金人以臣元非放還人數復見追取雖一時竄匿得免而開封吏卒圍第追捕窘辱百端憂悸成疾一向家居在假不出直至四月二十四日陛下行䑓至南京有㫖推發一應官吏以臣充管押圭寳使二十五日參假受勅太后臨遣徑赴行在所有前後請假闗牒見在中書後省學士院閣門御史䑓可以照騐即不當受官爵及預議論今行遣徙置逺方實負天下之至􅁈只縁圍閉以來傳聞失實不知子細一例論列若不陳訴何以自明伏望聖慈将臣三月二十三日以後放罪月日體究指實施行又辭中書舎人状曰臣頃遇淵聖皇帝即位之日以國子司業擢為侍御史方中國稔陽九之禍而廟堂無一定之謀羣奸興訛匹夫横議臣冐居言路固無獨見逺慮陪輔聰明而一時誅賞不恊公議因事論奏僅能塞責言狂意拙輕犯衆怒怨讟所歸遂成謗藪嘗論故宰相王黼誅死而蔡京方自拱州請覲大臣㳺説欲還之賜第以為謀主宣撫使童貫王安中譚稹皆散官安置而蔡攸乃以大中大夫提舉宫觀任使居住罪同罰异物議沸騰責在臣等諫議大夫楊時在延和殿下宣言淵聖有蔡攸無罪之語以諷䑓諫臣獨以為有罪論奏不已於是京攸之黨惟臣之怨張勸衛仲達以弃官得罪既除削矣又傳逮詔獄将致之死臣論蔡衡父子兄弟等亦弃官而去者何為獨置不問於是詔御史䑓根究臣等條具衡等兄弟親戚賔客之棄官者凡數十人上之有㫖送大理寺約法而勸等亦貰死於是迯奔守官之人惟臣之怨金人犯闗李綱不忍紛紛欲一戰驅之而幕府吏士皆年少書生縱㬰以賛其决方元若草露布以待破敵楚天閤涓刼寨之日漏語於旬日之先都人户知之臣又論綱素不知兵難以獨任請以諸道兵盡付种師道節制而以綱佐之老者之智壮者之决可㡬萬全䟽上不報是日也植三幟於開寳寺傍以待報㨗御前又張御幄於封丘門上以俟車駕臨受俘獲而王師殱焉於是行營司官屬惟臣之怨又論太學諸生誘衆為亂刼請人主拜免大臣支觧王人流血波道毁撤廬舎取金幣㡬至内訌失今不治他日必有握兵之臣脅制天子武夫悍卒戕害将帥縣殺其令丞郡殺其守尉以衆暴寡漸不可長於是太學諸生惟臣之怨臣又論靖康之政専務姑息大臣掠美嫁怨君父伏闕之後學官待罪可也仍降詔以奨其忠羣凶懼誅弗問可也乃肆赦以固其惡行營大臣下行使臣之職收金銀牓以悦衆心開封尹代􅉏御之職𫝊詔太學以沽士譽蔡京責授祕書監詞臣追數其過宰相甚其言卻之三反竄定無㡬王蕃潜師夜遁召兵於唐州䑓諌交章論其罪惡而大臣以分兵䕶送家屬之功竟薄其罪主威陵夷必自兹始於是上自朝廷大臣下至太學官惟臣之怨時方蔽昵私黨以附下罔上臣獨論刺以忤權貴時方弃涓爵禄以市恩釣名臣獨矯激以招怨怒羣嘲衆罵恬不知畏以情罔行卒蹈機穽始則蔡攸黨人呂本中之流作為痛定等録奸言以祐其父又崇飾惡語以併中臣終則言事臣僚又置臣於偽官之内此皆臣積致怨仇以蹈大難伏遇皇帝陛下普日月之照下雷雨之澤一洗謗誣深垂簡照趙子崧奏剳論列王時雍徐秉哲等十人乞正其罪奏剳曰臣窃謂陛下始初清明萬國歸王急先務者惟用人而已風俗不厚亷耻道喪未有甚於斯時也小人既無所守則至於國破主遷亦不以為意稽首偽朝自謂得計盖縁平日習與性成不復知義利之分耳今王時雍等盡趋行在意氣揚揚略無忌惮臣聞京城士人藉藉謂王時雍徐秉哲呉幵莫儔范瓊胡思王紹王及之顔傳文余大均皆左右賣國逼太上皇取皇子汚辱六宫捕繫宗室盗刼禁中之物公取嬪御都城無小無大指此十人者為國賊此天下之所不赦者也張邦昌未有反正之心敵騎甫退此十人皆日夕締交宻謀勸以乆服未肆赦問又復督逼之時雍奴事金人肆出詭計辱君父以安已亡社稷以要功秉哲身為京尹余大均為少尹助敵為虐分遣捉事人追捕宗族急於敵兵立賞召人告首必欲捜羅竭盡而後已有捉事人姓喬姓胡姓韓人尤為殘毒至於拘擠王夫人於匱坊鎖閉如牢獄捉事人無髙下金皆有巨萬之冨矣幵儔往來傳金人語言廹脅城中士民舎正從偽邀請太上皇不容少緩言氣軒驚上皇至泣下范瓊統衆兵不惜國難弃君狥敵無所不至皇后及東宫将出都城人號哭遮道願無出瓊斬數人以狥趣車輿以趍敵砦及之得罪淵聖乃藉敵威以凌侮朝廷不復知有趙氏為金人搜索宫嬪而擇其美者藏之私家邦昌既僣號胡思献赦文曰無湯武之征誅有堯舜之揖遜遜字直用濮安懿王諱邦昌皇恐以謂不可思曰如今更理㑹甚濮安懿王顔博文則曰雖欲避堯之子其如畏天之威孟子曰以小亊大畏天者也盖陛下在外教邦昌畏金人而不推奉也至王紹則尤為悖逆其言不可道窃聞時雍秉哲落職宫祠既未足以正典刑又不足以安反側使此曹手熟則人主何以立國天下亦失望觧體矣若不付之詔獄考治其罪臣恐小人辨辭飾非奸惡之状無以暴白於天下伏望聖慈特降睿㫖将十人付獄鞫治明正典刑上以刷二聖危辱之耻下以謝宗族驅擄之禍永為萬世臣子之戒臣不勝忠憤趙子崧家𫝊曰子崧字伯山太祖皇帝之六世孫也崇寧二年貢禮部奏名為第一賜進士出身宣和中除徽猷閣待制時王黼當國方議平燕鄭公居中領樞宻生日士大夫例以詩為夀公因以保全生齒固守歡盟為諷鄭􅀏曰能保否能守否公曰公能保呼韓足矣鄭深領其言己而任子諒王子飛皆以書論燕事子諒謂廵邉之兵不宜過白溝一歩子飛謂當遣辨士往使遼主問金人事使勿諱欲兵助兵欲財助財遼人必感服减嵗賜削敵國禮倚以為外藩可又保百年無虞是真得燕也不然我且殆矣公携以見鄭鄭竒二説而黼乃創立尚書省經撫房凡燕事皆専行宻院至不與有識危之郭藥師來朝公察其㣲宻語李丞相邦彦曰藥師叛遼歸宋某早見之坐殿門外瞻視非常有輕中國意大則為侯景小則為禄山李相愕然曰子謂何以善其後公曰軍中最黠者張令徽劉舜臣也志不在藥師下今若以燕薊封藥師為廣陽王以檀順封令徽舜臣為節度使許世守如折氏常勝軍授田為業尚可紓禍也明年黼又括諸路出夫錢盗起京東河北天下騷然命初下雖丞轄亦不與聞公又語李曰自古立大事未有無定論者管仲佐小白覇天下孔明説先主取荆取蜀皆預定計今平燕不先計軍食乃竭四海之力以供無藝之求何可繼也某嘗謂名為平燕實忘河北京東今已取夫錢則實忘天下矣李起握公手曰當為上别白論之已而聞有㫖未輸者减半然民已困矣上意頗欲置相一日李問客曰今日孰可相者居士曰無人可相滿坐驚睨不敢答李問其詳公曰里中有病傷寒者一醫汗之一醫下之外雖支持而中已耗矣謝前醫而訪草澤名士後至者投一藥則殆乃歸過焉今國勢大槩類此蔡京倡之王黼成之二十餘年二人者家富於國志得意滿全身而去天下疾矣公議望公為相公欲如何醫治李唯唯九月李果相公與李厚􅅥然思引除徽猷閣直學士知淮寧府郭藥師叛金師䧟燕山居士即其奏乞留黄河春夫修城衆笑之未㡬敵至牟駞岡㳺騎過咸平諸州大震獨陳方興板築兵二萬餘人居此又設三砦屯於城外收士卒礪器械以示有偹敵至牟駞岡去陳百里而返先是聞上皇命淵聖為開封牧且有南廵意任子諒時居陳居士問此舉如何任公曰可危也上果東下太子留守功成位不益萬一少衂歸罪留守矣居士曰然然非内禅不可任公復乃議以書相意云云曰是某意也丞相能為冦凖公能為趙犨否公曰敢不勉後兩奉大赦列位宣讀公大慟至不能起明年竭力治守禦謂敵必大舉自六月後即䟽言畿之西南宜屯兵為備不然敵且扼吾師絶餉道又曰朝廷不湏論三鎮弃不弃尼堪斡里雅布非争三鎮實南鄉而争天下宜大為之備願詔羣臣毋以同异為論議専以國事為急其詳見奏議九月四道置都總管公以書曉譬王㐮又以書約頴昌應天蔡頴諸郡緩急相援十月詔下團鄉兵公牒頴昌夀春府廬蔡舒光靳黄州信陽軍牒曰恭惟太祖皇帝創業垂統救斯民於五代塗炭之中二百餘年間淪浹骨髄今天子慈孝恭儉視民如傷夙夜講求盡復祖宗法度将以便民近者邉境失偹金人再入京都尚未退師天下之所痛心兼聞敵騎所在唯務殺戮生靈刼掠財物驅擄婦人焚毁舎屋産業意欲盡使中國之人父子兄弟夫婦不能相保狼狽凍餒歸於死地以逞其無厭之心逺近之所共憤疾况朝廷信賞必罰此正豪傑奮發上報君親下保家室之時當所身兼臣子情同休戚朝夕疚心不敢少寧湏頼隣境犄角輔車協心戮力以捍敵勢以蕃王室近奉宻詔許結集義兵人自為戰節鉞以下並充賞請諸郡體國事不可緩公文到日各懐忠憤多方措畫廣行招集或素著信義為衆推服或武藝絶倫謀畧可用或胆勇敢死不以軍民世家子弟務在存恤激勸人人自奮知上尊君親下保家室圖富貴免殺戮擄刼之患轉禍為福其利甚大又於靖康元年蠟弹奏状曰本府自十一月二十四日後來不得京逓道路隔絶敵馬出沒不測自本月初十日以前平安十一月以後諸縣及村落日日被刼赤手獨捍孤城又以不通京城消息至尊父子在内臣尤激切痛徹五内竭力守禦以死報國自六月後來奏報不䝉施行今日果見危急輙募人賫此奏知乞囬降平安指揮以安民心又状曰右臣自六月後來奏乞加兵嚴守輔郡累状不䝉施行今來敵騎深入本府境内攻討日夜相繼又以京逓不通民心疑惑西道總管南遁不知下落今月十一日敵騎至本府城下臣見竭力守禦終恐無以報國徒有一死仰念至尊在都四面隔絶激切五内無以效毫髪臣見病心氣脚膝之疾曉夕廵城僅存皮骨輙募人賫此奏知乞囬降平安指揮以慰民心臣獲得奸細通説敵志甚大乞聖斷審應毋輕信誤國之言又募張澤隨陳貴賫蠟弹奏状曰臣今月二十三日開封府百姓陳貴到府稱奉差同張元賫文字至本府及蔡蘄州内張元将帶文字不見陳貴獨到不知處分何亊臣所遣統領官趙安十一月二十三日押團結軍民六千餘人前去尋訪張元不見遭敵馬衝散縣尉二員不知存亡本府自十一月二十五日後來四郊日遭驚刼屢至城下堅壁固守上下一心竭盡駑力諸縣及順昌府蔡州縣鎮皆已殘破臣義兼臣子情同休戚日夕痛心伏乞别降宻詔庻㡬遵奉臣聞近郡敵騎多以潰卒為鄉導若朝廷那兵來京畿近郡巢除外敵以斷粮道其利甚大臣聞胡直孺在黎驛杜常在頴昌范訥馬忠在南京伏望聖斷責使效命毋令端坐觀釁又再遣人賫蠟弹奏状曰臣於閏十一月二十四日募到百姓張澤同樞宻院差來使臣陳貴賫奏状前去至十一月初二日張元方到領樞宻院十二日聖㫖即時差人闗報缺鄰郡多方措置招集兵馬外初三日陳貴復回稱二十五日敵騎攻京師遂致前去不得臣義兼臣子痛心疾首夙夜霣涕恨無捐軀之所臣聞范訥馬忠王淵在應天趙野在單州逐人所将甚衆又聞郭奉世将京東兵到亳州及江南湖北刀弩弓箭手正兵萬數不少皆到宿亳間臣累次遣人間道移文及以書催捉趙野范訥朱勝非併力入援仍責以大義言甚切至臣已激廬舒頴夀光蔡蘄黄等州發遣勤王人兵到後一併團結前去臣以道路不通未奉平安詔㫖無以自存謹再募人奏聞伏乞囬降指揮以安民心所有本府曲折候路通續具奏報俄聞二聖出城東都四隣皆䧟公乃誓衆設壇㰱血以奨王室勇於奮義力以拒敵其攻脅説誘日甚公且守且戰愈力首尾半年乃保全孤城以通諸道勤王之師康王大元帥奏除寳文閣學士擢參大議張邦昌僣偽首移書訶斥使其反正并以書曉其偽臣王時雍二書千餘言辭指激切奸謀遂沮又多方間探京城事跡即令其人供具罪状以蠟弹赴大元帥府隔絶之勢遂通而虚實得聞矣三朝北盟㑹編卷一百六
