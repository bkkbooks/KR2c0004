body:
  text: 三朝北盟㑹編卷一百五十七宋徐夢莘撰炎興下帙起紹興四年正月二十九日己卯盡三月十五日乙丑紹興四年正月樞宻承㫖章誼中書舍人孫近使于金國二十九日己卯右迪功郎新授監廣州寘口場鹽税吳伸再上論大臣非辜書正月二十九日右迪功郎新授監廣州寘口場鹽税臣吳伸謹齋沐裁書昧死百拜獻皇帝陛下臣聞趙襄子見圍于晉陽罷有功之臣五人髙赫無功而受上賞五人皆怒襄子曰吾在危厄之中不失臣主之禮者唯赫也子雖有功皆驕寡人孔子聞之曰趙襄子善賞一人而天下知君臣之禮臣讀至此每興嗟而不能自已豈舉世無髙赫之徒乎将功同而賞異乎将使忠信之士不容于朝端乎将使忠信之士陷於罪戾乎昔人有所謂忠信而獲罪者此臣所以區區晝則忘食夜則忘寢痛為天下國家惜也臣聞建炎之間苗傅作亂一夫唱惡寶位遷移廢主立幼擅國威權當是之時天下皇皇左右無措皆有驕君之心未聞有盡禮之臣至于能赴國難者尤鮮其人獨一張浚以㣲弱之書生率天下之義士忠誠一發勇冠三軍遂擒元􅇯用復大寶張浚之忠聞于八荒達于皇天豈特士卒知之雖三尺之童亦知之豈特三尺之童知之而陛下亦自知之昔申蒯陳不克赴荘公之難不能成功後世猶且義之况於唱天下之大義立百世之大功乎臣雖不敢僣擬仲尼之褒貶切謂張浚賢于髙赫逺矣嗟夫才有短長事有優劣可謂忠有餘而智不及臣請為陛下畢陳其説臣聞張浚之帥陕右也憂國忘家見危致命食不兼味祿無羡餘聞利國之言咨嗟而不能已見忠義之士延禮唯恐其後廉潔愛民士卒化之而不貪公忠御下吏民善之而無謗此所謂忠有餘者也料敵人之不審陷曲端于無辜昧左右之譖言執一己之私斷失五路之地衂數萬之師覆軍陜右延敵窺川取怒朝廷歛怨鄉曲此所謂智不及者也今五路失利四川孤危罪在張浚夫復何説而臣有言者無他臣恐快朋黨之私墮敵人之計絶忠臣之路何以言之臣聞女無美惡入宫見妒士無賢不肖入朝見嫉盖貪冒之心人情所同朋黨之私古今皆有且夫為臺諌者必欲速專均衡此貪冒之漸也甲居台輔則甲有親戚故舊乙居台輔則乙有親戚故舊甲或罷政則甲之親戚故舊無所依焉乙或罷政則乙之親戚故舊無所依焉此朋黨之私也今張浚還朝不復元樞之位必正台司之權在同列必嫉之或有薦擢更易差除在百僚必嫉之若不羣而攻之排而逐之則上下俱緩遷叙之階朋黨不得少固其位萬一衆口鑠金積毁銷骨擠以失地之罪陛下不得已而逐之豈不快朋黨之私乎臣聞魯以季友治亂魏以無忌折衝虞不用宫之竒而晉并之吳不用子胥而越并之田單縱反間于燕而樂毅罷陳平縱反間于楚而范増去子玉死而文公之君臣相賀廉頗逐而白起之籌䇿得施借使張浚智雖不及數子忠實優之臣竊謂今世如張浚者復有幾焉萬一忠臣見遂必有不忠者至觀其用兵雖敗金人未必不忌其忠設或反間得行而張浚罪去豈不墮敵人之計乎臣聞齊威前有尊周之功後有滅項之罪春秋書夏滅項為齊公諱之故古人以功覆過良有以也今張浚復辟之功大失地之罪小非特臣得以知之天下之人所共知之何哉金人起兵三十餘載北滅􅆻丹南侵中原天降喪亂敵勢孔熾張浚以五路散地之兵當百萬熊羆深入重地之敵如煆投卵其不敵也明矣尚能枝梧數年與之相持及其退保四川敵人卒未能下盖亦張浚之功也若曰失陜西之地潰五路之兵為可罪則曩者失太原之利致陷神京失神京之利播遷二帝禍延今日遂使翠華巡狩于海濱賊臣割據于中土當時用事之臣比之張浚罪状有差如是張浚功大而罪小也又明矣設若寘浚于罪地後之有功者又欲與赤松子遊使未立功者将以張浚為戒後有患難誰肯赴之豈不絶忠臣之路乎臣竊見里巷交談人人為浚危之咸曰某黨某人欲有言也張浚之来章疏列上必于失地之外吹毛求疵増其過惡陛下雖有襄子之明必不能却如簧之言以保全之若然茍張浚未来則其罪緩張浚即至則其罪速萬一果如道路之言則張浚之罪将無所逃何則張浚不至則議者必曰慢而不恭有違命之惡浚即来則議者必曰覆軍之將有失地之罪今遲遲其行豈非畏人言乎抑亦自謂無功而歸羞澁其行乎方其未至已有論列其罪者及其還朝廷罪之何疑臣又聞道路之言曰非特一二人欲言之且将羣而攻之不特羣而攻之必使之罪去而後已嗚呼開言路者所以納公忠而去偏黨也今以朋黨之私而所親所舊雖有大惡則遏而庇之非親故雖有小過必招而逐之至使執政不敢除一吏忠臣不獲全其身可勝惜哉嗟乎言張浚之短則易為張浚之事則難若試以言張浚之人而任張浚之責則敗績尤甚於浚矣臣竊謂艱難以來未有臣如浚比者萬一使言者必行而浚罪去不知誰可繼其忠乎古人一賢勝百萬之師若賢者不容于朝且欲其修政事而戢强隣不亦難乎臣嘗聞周公使管叔監商管叔以啇叛夫周公弟也管叔兄也周公之過不亦宜乎當時以功覆之後世亦未嘗罪周公而議者則曰周公之過如日月之蝕焉今張浚失地之過雖明而赴難之忠亦至臣恐攻言易入聽斷所難伏望陛下痛加察焉無使朋黨得以快其私無使敵國得以乗其間無使忠臣因而晦其跡實宗廟社稷之福天下生靈之幸也臣與張浚居處則異鄉勢位則相邈既非親戚亦非故舊初無私于浚也今論張浚之一身而玷及滿朝之權貴臣固知不得罪于今日必歛怨于他時臣之棄斥幾不能免其必有言而無媿者臣自謂視富貴為甚輕以忠義為甚重今至公之論忤及權臣不過使臣終身不得仕進爾至如張浚復辟之忠今古所難臣以忠義得罪雖伏之斧鉞赴之鼎鑊在所不辭豈畏朋黨之害乎臣之所陳披肝瀝膽聽之罪之唯陛下所命焉干冐冕旒臣無任俯伏待罪之至二月七日丁亥烏珠侵仙人闗十一日辛卯吳玠及烏珠戰于仙人闗敗之烏珠欲大舉兵期必入川劉豫之弟益方知長安宻使人告于呉玠使早備之玠為壘於闗之旁曰殺金坪是日戰于仙人闗下玠命将士更射又出鋭兵出其左右凡拒戰五日金人皆敗初金人自元帥以下皆盡室而来又以劉豫腹心為四川招撫使既不得志乃退據鳳翔十四日甲午吳玠斬其統制郭震熙河經畧使闗師古叛附于劉豫吳玠自辛卯戰于仙人闗烏珠日夜交戰不息統制郭震為烏珠所襲破其寨王師屢敗績甲午玠斬震以狥于衆檄召知金州王彦熙河經畧使闗師古来救援彦與師古皆不至師古叛附于劉豫綿威茂川石泉軍安撫使劉闕以兵来援召趙鼎赴行在罷都督府朱勝非方圖進取先議欲取荆襄乃奏上乞罷都督府使諸將得自奮發上從之遂罷都督府張浚至行在張浚在川初承召命也王庶以被浚奏劾之落職宫祠復遷通議大夫就委浚差人津遣庶下峽浚具奏曰臣以被命還朝與王庶偕行庶以疾留而浚乃赴行在既到闕有㫖軍馬撥付楊沂中軍心皆不平隨行錢物置于左藏庫為封樁給賞庫今為左藏庫南庫三月八日戊午趙鼎參知政事十五日乙丑張浚罷知樞宻院資政殿大學士提舉臨安府洞霄宫侍御史辛炳言張浚陜西敗事之罪故罷之也紹興四年三月十五日都省剳子臣寮上言切見知樞宻院張浚昨被命宣撫川陜等路五年于外誤國非一近有㫖召還罷宣撫職事為浚者義當疾馳赴闕以待罪斥而乃偃蹇自若徘徊鄉里累月不行已而盡掠公私之財選鋭兵自衛出蜀至湖湘間妄以均給軍須為名獨擕所積单騎而先朝廷嘗降指揮令伺候一行官兵同来復不遵禀今聞已至近邑頗駭衆聽不知浚何施面目敢見陛下也浚以便宜辟置如李允文王以寕傅雱之非其人為湖南北之害浚以私意作威如曲端趙哲之良将皆不得其死輕失五路坐困四川無分毫之功有丘山之過雖膏斧鉞未足以謝宗廟在天之靈不自修省每多妄作擅造度牒鑄印記肆赦減降出給封贈磨勘綾紙之類皆有不臣之迹議者謂陜右之人無一日不懐歸中國但諸師業已叛浚聞浚還朝恐懼不暇若蚤正典刑示天下以不復用則陜右地不勞師而自復矣陛下方信賞必罰以圖治功浚之罰無可恕者臣愚欲望聖斷特降睿㫖重賜黜責以為臣子之戒候勅㫖貼黄稱臣謹按浚不臣跋扈之迹初若不甘還朝旣而自不皇安乃盡掠四川公私之財藉手為贖過之計若令復領舊職其計遂行恐非公朝所宜伏乞睿斷早賜施行又臣僚上言嘗聞漢王恢請擊匈奴而以亡失輕罪伏誅故武帝之威終能逺振四夷唐房琯乞復兩京以喪師陳濤被罪故肅宗之功能再造王室人主将以有為於天下非大明黜陟不可也而况罔作誤國犯分慢令兼人臣之衆惡非特恢琯一時敗事之比者乎謹按知樞宻院事張浚本無才術自任輕儇偶當用人之際遂叨分閫之權付以便宜使之黜陟而乃不循分守職妄自尊大喜怒任意措置乖方生殺廢置不復知有朝廷既失五路又擾四川流毒之餘及于隣路受命五年喪師失地而歸人臣之罪孰大于此頃者金人攻陜西惟環慶帥王似能堅守西熙河帥張深能殺退金人金人不敢留五路以二人故有稍安浚旣至宜因用之乃反罷張深王似代以趙哲輩将士解體已不為用矣及妄聽間報以為敵衆可取遽為富平之舉卒至覆軍所亡将士金帛糧斛不可數計遂失五路及其行法又不當于衆心富平之役惟趙哲在衆人中尚能當前轉戰用命勢力不敵而潰諸路畧無策應浚乃獨誅哲致其徒怨叛後并力攻川口者是也浚初拜曲端為大将端素有威望使統衆固宜及為富平之舉端以為未可力争之浚怒安置恭州及敗宜謝端而用之乃信王庶一言委端仇人康隨為䕫路提舉保甲兼提刑羅織端置獄大暑中熾炭圍之致之死部曲又皆叛去其後日夜攻川口公行文檄求端于浚者也趙哲曲端潰卒擁陜西勁兵力窺川口金人特因之耳又用趙開營財利括膏脂行𣙜茶鹽及隔糟酒法苛細特甚黎庶嗷嗷無所告訴外召敵攻内結人怨四川之不亡者幸也凡朝廷所除監司郡守至輒不許上必已所命乃得赴張浚以老乞退則令五日一赴宣司治事此例安出哉甚者擅肆赦宥一嵗凡再自古便宜未如是之專也建炎三年十一月金人已渡江後滕康劉珏得浚十二月書猶言金人在雲中今嵗定不南来宜持重勿妄動斥候如此疎繆可知湖南北宣撫使處置使用所管地遣李允文王以寕假以便宜肆行生殺遂亂兩路且便宜朝廷止付之浚豈當復以便宜付他人也上下相付何所不至哉浚敗事而歸不自知罪猶傲然偃蹇逡巡留連移文邸吏令計㑹臨安府葺治府地浚謂樞廷權為己家物乎浚既被召盡刷四川之物以行科卒之擾敷及下户尚敢託言那輟隨軍錢物應付解潜程昌禹欲以邀功不知隨軍錢物從何所出哉既罷宣撫處置使而沿路妄有行移至剳下峽州荆南潭筠吉䖍袁州興國軍計置箭􅀢每州二三百萬及令川陜宣撫使計置黄牛角二千對又嚴以約束諸州知難計置箭􅀢即具因依囘報浚既知其難辦而故為此騷擾其徒欲自市求進不復恤人力之困也賴陛下灼見其奸計置牛角一節更不施行不然匱蠧所及何時而已乎浚聞罷之始則遷延不行中則疑而有請欲候至潭州道路無虞而後造朝近又奏乞至衢州留數日修治器甲今聞政府虚位則至衢州一日而行星夜兼程不復留滯何前緩而後急耶自謂罪惡可以計免名位可以力至不畏邦憲不䘏人言出入自如何所恃賴陛下縱欲曲全體貌未寘于法奈天下公議何欲望英斷早賜竄斥以為人臣誤國之戒伏候勅㫖又臣僚上言竊聞知樞宻院事張浚将到行在不知陛下遂以樞廷處之邪中外之議有大不然者臣不得不論也浚為黄潜善所知自興元府曹官一二年引為侍從潛善當國一時所引皆憸柔妄庸之人而浚為之上客乃金人飲馬長江有窺江南意浚欲避禍逺去乃建議出撫陜川悉揀西北精兵自隨榮歸故鄉引一時輕儇䛕佞小人如劉子羽程唐輩參議軍事以徃陜西以私意斬環慶路安撫使趙哲復捃摭舊将曲端獄死由是将士解體潰叛降敵而陜西州縣陷殘幾盡赤子肝腦􅂗地皆浚之為也其後敵騎長驅遂至興元浚懼不知所為遂引兵逺遁而敵亦稍自退歸浚輒妄奏獲㨗功状欺罔朝廷誅求聚歛人不堪命四川騷然怨情刻骨於是悔宣撫之来甚于敵也陛下初許浚便宜除陟盖以軍事在逺不欲從中制也輙立招賢館有視直龍圖閣之命以孺人號封參議官之妾陛下昨嘗遣中使傳宣撫問浚乃與之功秩勞其逺来自古豈有人臣輙加官王人之禮其狂悖甚矣大抵浚本妄庸幸值艱難專制一方志盈氣滿遂欲飛揚跋扈賴陛下聖明辯之未晩亟遣郎官持節召之浚稍知事節當亟交割軍事即日就道而乃偃蹇遷延始則欲候秋凉進發次則欲上塜焚黄又欲候道路無虞然後赴闕公然上章慢侮君命聞者無不扼腕既到鼎澧間又擅差撫諭官騷擾州縣又檄荆湖八州軍配出箭􅀢又令川陜宣撫司計置牛角取媚朝廷始則以輕脆暴恣敗事中則以跋扈偃蹇為物議所不平卒又以諂媚伏望睿明察浚罪狀斷自宸衷乞賜罷黜明正典刑庶幾少慰關陜横死之人少解川蜀憤怨之氣亦以為人臣跋扈之戒伏候勅㫖又臣僚上言臣近嘗上章論列知樞宻院張浚不臣跋扈等事皆公議所共憤嫉不平皆浚之辜負陛下擢用付與之恩畧無畏憚一至於此若不以明正典刑何以示臣子之戒念思切宥宻之地實掌兵機方今行朝神武之兵拱衛清蹕無慮十餘萬衆早夜激昻忠勇之氣咸願報國若浚者何施面目敢居其上然而旬日以来偃然自若人情疑惑豈不揺動臣職在言路尤切寒心伏望聖斷赫然出臣章疏亟降睿㫖重行貶竄少慰天下忠臣義士之望臣不勝幸甚伏候勅㫖貼黄稱訪聞浚所領兵等已至行朝已録白所奏章疏繳申浚照㑹訖伏乞睿察又臣寮上言臣近嘗論列知樞宻張浚罪狀至今半月未蒙施行浚亦偃蹇樞府恃以為安中外愕然無不驚疑臣已録白奏状副本申張浚照㑹去訖切以威福者人主之大柄賞罰者天下之公器有福而無威有賞而無罰是猶天之有春夏而無秋冬也陛下歴觀前此之為人臣有如浚跋扈僣擬者乎有如浚之專恣誤國者乎有如浚之欺君慢令者乎一犯於此已不容于公議况兼有衆惡其逃于典刑哉欲望睿斷檢㑹臣前奏降付三省早賜竄黜施行伏候勅㫖三月十五日三省同奉聖㫖張浚除資政殿大學士右通議大夫提舉臨安府洞霄宮任便居住三朝北盟㑹編卷一百五十七
