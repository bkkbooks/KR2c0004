body:
  text: 三朝北盟㑹編卷一百七十六宋徐夢莘撰炎興下帙起紹興七年正月十五日丁丑盡其日韓肖冑又奏曰臣竊謂逆臣劉豫藉强敵之兵驅脇從之衆自以為功在漏刻逆天不祥叛國不義雖不煩干戈鬼神雷霆猶得誅之而况陛下神武親御戎輅以作王旅之氣獻馘受俘月餘三㨗凶徒敗北奉頭鼠竄可謂策貴廟勝功尚帷幄無復遺慮矣陛下深詔遵祖宗故事以四大議慱詢舊弼之臣臣竊仰陛下明目達聰比徳虞舜好謀能聽同符漢高臣雖固陋不足以與大計然荷陛下深恩雖身在外日夜惟念國家利害至熟也其敢歛嘿以辜明問臣不識比日侵淮並江之兵其亦合從諸國如靖康元年再至東都之師乎悉起精銳如建炎三年再至維揚之師乎無乃敵情不急于用兵狥逆豫之請姑遣偏師以僥倖萬一也其合從諸國悉起精銳如建炎三年以前之大舉則今者盛氣而來褫魄而去非其兵力衰墮則金人必有大變豫雖欲恃金久安金且不足恃方其退遁之師當遣兵分道追躡俟敵度其已疲不能逺救則亟進擒豫盡俘其雛孽黨類中原之人必洒然自歸矣臣以為是役若實出于金人退怯陛下必已㫁而行之豈復俟于數千里之外若曰敵狥逆豫為國之請姑遣偏師以僥倖萬一則近日之事可知也臣常策逆豫偽為國家求成于金其謀有三方國家建議遣大臣豫欲藉敵制利以欵我師其謀一也金若不與國家接則其忿幾息矣而受之安强非豫之力也哉欲使二國通使而和成則豫偷安其間和不成則豫乃得奮其詐休敵用兵名曰合交實欲激怒之也金雖為豫怒實非真情故不汲汲于用兵而其來者非全兵然不如所欲而去則必圖再來再舉必大發兵則戰守之計誠如明詔不可緩也臣嘗深思為今之計已爛熟不勞而甚有新益者屯田是也江之南岸並江之民甚少曠土甚多皆可指為屯田沿江大將各占分地而屯而其軍士舊嘗為農者計五六擇其非甚精銳可為田者使各受地凡為田者聚於所屯之傍有形勢之地農隙則各教其所習之技嵗成則多分以所種之麥禾至于蒭藁薪蒸之用雞豚狗彘之養家宅荒地給之如此則士之不預選為田亦皆望耒耜而興起矣軍士所田必不能盡徧長江之南岸則募江北流徙之人給之又有餘則募江南無業願遷之人給之其分給部勒訓習皆如軍士之法然屯田之始必有耕牛農具榖種營屯之費不圖之則利不可得此國家所當急務也凡置營田皆古形勢之地則應江上之勢可備禦處遂皆因田以成營屯于衆屯之中擇其甚要害處又加以重兵為大寨一年之後大寨糧食可稍取于屯田之榖則漕運之費省大寨之軍止則可以保江而固守出則可以渡江而攻討屯田之事常為根本則偹禦之計成昔人有曰自西陵以至江都五千七百里其險要必争之地不過數四其言誠有理然今與古異金人用兵非有古人安莭鈐制之理不擇可否視利輒進如間者泛海之師覆亡相繼計猶不悔則不止險要必争之地為可守也凡沿江之地皆當守今若大江南岸營屯相望傳烽數號千里不絶則敵人之情畏矣江北士民流離失職江南士民多忌且惡之若無所容者今若使得耕並江之田是生死而骨肉也荷載深恩民力之餘特出死衛生以備扞禦則綏懐之畧成矣津岸有可絶江處當預設險固使不得渡浦溆有可泊舟處當素備舟師使不得入險固非一日可設也舟師非一日可習也因屯兵使為之日積月巧敵至可戰則戰戰守之道盡矣臣謂此策非止為食實守禦之計至復中原區宇撫定邉隅皆由此為之是貴謀賤戰萬舉萬全之道也雖然有一於此臣向者叨侍帷幄日閱天語退而攷諸行事陛下愛民之意至優厚也至誠慤也間者兵興有司或不得已為一切政預買借稅之類期限頗急事少定矣當有以休息之獻言者於謀國多為目前之務而不計利害之實萬一過聽而盡行之民力不勝其任背於陛下平日之聖意甚至使民未喻而怨咨者非細事也逆豫固非陛下敵也豫專為虐陛下專為徳使安静之化刑于四海寛厚之氣襲于諸俗則脇從之衆皆偽募召之心愈堅矣臣謂攻戰備禦措置綏懐惟是為本陛下雖聖心得之願加察焉朱勝非對曰國家承平日久兵備既弛金人投隙長驅深入伏自陛下臨禦修講軍政賞罰必當紀律既明號令每下精采皆變今内外勁兵無慮三十萬衆兵既衆矣患無可作之氣今則勇氣可作氣既作矣患無可乘之機㑹今則機㑹可乘不於此時速謀進取使既作之氣復墮當乘之機復失以數年嘗膽之勤為一旦噬臍之悔可勝惜哉遂列四事以獻一曰進討僣偽二曰守備江淮三曰招撫遣民四曰揆度敵勢上皆善之吕頥浩十論劄子一論用兵之策臣契勘臣在河北塞上守拒嵗久目睹金人與契丹相持二十年今嵗戰次年和次年復戰而遼主天祚不悟其詐卒致顛覆仰惟陛下天性聖孝痛北狩之未還悼生靈之荼毒累遣信臣卑辭屈己祈請講和以紓父兄之阨以救生民之命而敵性叵測兼併不已自王倫之囘跨四年矣嵗嵗舉兵侵凌川口去年雖不曽出兵而移師南來大入淮甸與淮甸劉豫同惡相濟其志豈小哉今幸金人已退若不用兵則五月必傳箭國中金人五月間傳箭于國中令鄉民備八月㸃集秋冬間復舉兵至淮甸在我支吾賦歛終至財竭力困此不可不用兵也况不用兵則二聖必不得還中原之地必不可復偽資糧必不可焚和議之計必不可諧大江之南亦不可保縱能保定不過一隅爾或曰如此遂廢講和一事耶臣對曰不然古者交兵使在其間既不可因戰而廢和又不可因和而忘戰間遣使命再貽書以驕之復示弱以紿之而我急急為備出其不意乗時北伐此用兵之利也二論彼此形勢臣契勘金人本契丹所屬之國遼主天祚侵陵其民誅求無厭以致憤怨舉兵交戰遂滅耶律氏政和年間内侍童貫奉使大遼得趙良嗣於蘆溝河聽其狂計遣使由海道至金人國通好金人既滅耶律氏兵益衆勢益張知中國太平日乆都無戰備必可圖也遂陷中京勢愈强盛二十年主張國事相尼堪也為之謀臣者劉彦宗烏舍貝勒蕭三大師高慶裔張愿一作慕恭之徒是也為之將帥者斡里雅布伊都棟摩國王羅索貝勒三太子四太子達蘭郎君之徒是也謀無不成戰無不克横行天下又近十年彼之勢可謂强矣然尼堪之性好殺而善戰用兵不已昩于不戢自焚之禍部曲離心已久將士厭苦從軍皆謳吟思其鄉土豪右必潰散有將亡之兆臣于宣政七年十一月陷于金國次年二月得歸朝廷在敵中時其敵衆每夜嗟嘆皆云契丹交兵十年不得歸今又向南去不知何時到家鄉又敵性嗜殺將兵所向族其强壮老弱畧其婦女財寶非天道結民怨窮極已甚此亦將亡之兆劉彦宗斡里雅布伊都棟摩國王羅索貝勒皆已死所存者鮮皆在數人下其將士所有子女玉帛充滿于室志驕意滿亦將亡之兆凡此皆彼之形勢也我之形勢比之數年前不同何以言之數年以前金人所向我之戰兵未及交鋒悉已遁走近年以来陛下留神軍政揀擇精銳汰去孱弱今二三大將下兵已精矣臣竊料劉光世張世忠張浚楊沂中岳飛王􅊛下兵數約二十萬人除輜重人頭外戰士不下十五萬陛下聖性精于器械制作工巧數年以来卑宫室菲飲食而輟那財用修造器甲今器械畧備矣北方之兵自来以全副衣甲御敵中國甲士自来止于前後掩心副膞有皮笠子而無鋒故怯戰臣嘗觀太宗皇帝于北京武庫垜排下河北十七將軍器並無全装今日並不堪用祈溝之敗恐由此也兵既精器械又備將士之心曽經戰陣胆氣不怯勇于赴敵故頃韓世忠扼敵于鎮江張浚獲㨗于眀州陳思恭逰擊于長橋去年金人初到淮南韓世忠首挫敵鋒諸將屢得勝㨗至于吳玠累次大㨗于川口此我之形勢也夫太祖太宗皇帝有兵十四萬而平定諸國遂取天下今又有兵十五萬察敵之勢如彼度我之勢如此若不用兵恢復中原則必有後時之悔豈宜緩哉三論舉兵之時臣在河北使陜西沿邉備見金人風俗每於逐年四月盡括官私戰馬逐水草牧放號曰入澱澱乃不耕之地美水草之處其地虚曠宜馬入澱之後禁人乘騎八月末各取馬出澱飼以粟豆准備戰闘又金人所長者在弧矢之利而暑月弓力怯弱射不能及逺故自古至今凡塞衆侵邊未嘗出于盛暑之時歴代將帥儒臣皆不知此惟唐杜牧之嘗獻言于宰相李徳裕曰漢伐匈奴率以秋冬當金人勁弓折膠湩馬免乳之際與之較勝負故敗多勝少今若以仲夏月𤼵兵出其意外一舉無遺類矣臣前具劄子奏陳次日進呈之際䝉聖恩以為夏月舉兵乃宣王六月北伐之意也然時方議和未暇及此去歲秋末朝廷再遣使人去北請和而豫賊之子與金人引兵過淮信義俱棄可知也然則和議豈可信慿在我之計豈可但已縱令今年秋末復為邉患哉臣願陛下奮發睿斷乘此機㑹不可失之時宻與大臣决策定議隂勅大將速為之備於今年四月初舉兵北伐若乃進兵之路趨汴之計供餉之方招懐之畧臣一一條陳于後伏望睿㫖深思熟計廣詢博訪施行四論分道進兵之策臣本東北人自中原陷敵以來傳聞京西路殘破為甚京畿次之惟京東東路河北東路不曽經兵火百姓安堵如舊然苦于劉豫苛虐思望本朝之心至今未泯茲葢祖宗徳澤感民之所致今乘斯民徯望之心出敵人不意之際舉兵北伐必有大功縱未能盡有其地亦可以救民心慰衆望也臣已條具今年四月舉兵之策矣臣欲乞即今所有戰兵數内差撥五萬人選大將一員統之由泗州擣南京至汴京糧運開具在後篇仍差大將一員統兵二萬人自明州趂今年四月便風泛海前後攻沂宻州至青濰州宻州至濰州六路一百二十里又一百二十里到青州京東之民企望王師日久所至必望風而下又遣大將一員提兵二萬駐濠州張聲援此兵不可以深入以糧運艱阻但時遣竒兵渡淮擣順昌府豫州則京西北路諸郡傳檄亦可下惟是申勅大將所至不得殺人刼掠務要宣諭朝廷徳意蠲除劉豫什一之政明出黄榜除二稅之外更不得行青苖預買之法所下州縣選差逐處豪傑為衆推服者主管事務七八月間且班師過淮次年復出臣於去年十二月二十八日具奏兵法所謂彼入我出彼出我入不二三年間中原之地黄河已南必先為我有盖謂是也五論運糧供軍事臣契勘臣已條具分三路進兵以窺中原事其糧食亦合分項應副一項自明州由海道趨沂宻州兵二萬人每月人支米一萬二千石臣乞于明州支上件米充一月之糧令海船帯附前去宻州板橋頭鎮左右住岸前有糧可因矣密州界鄉民不曽廢耕種米糧易得一頭目駐軍濠州策應入界大兵所有軍糧由淮河水運可到濠岸下則此項人馬不患乏粮也臣曽仕察河撥自承楚州運糧至濠州城門交卸惟是自泗州趨汴京之兵五萬人縁泗州已北汴水不通諸軍合齎十日之糧至有糧地分委江浙漕臣揀選精米五萬石前期運至泗州凖備諸軍附帯入界兼凖備應副為聲援軍二萬人口食南京以北鄉民稍有耕種則可以因糧矣仍乞申勅大軍凡軍兵所至曉諭鄉村使民通知王師弔伐除糧食必籍鄉村百姓供應外一行軍士如敢攘奪財物擄掠婦女行軍法及處分大將凡王師所至捜索劉豫父子所聚糧料凖備資給金人者並行焚毀紹興二年臣在政府日已定議北伐嘗請韓世忠到都堂諭以焚毀劉豫糧料事世忠曰此乃清野之法不可不行六論大兵進發曰乞聖駕駐蹕鎮江事臣於建炎四年春末車駕在紹興府日嘗具奏韓世忠已於鎮江府江心艤舟邀截住金帥四太子人馬未得濟渡乞車駕進幸浙西號令諸將前去江上夹擊金帥及具奏聞以萬乗之尊仗雷霆之威車駕所至可以聳動人心銷弭羣慝此議未决而罷政其事不行臣罷左僕射告詞云下吳門之詔有失于先時請浙右之行力違于衆議去嵗秋末敵騎初到淮甸陛下奮然决策下親征之詔大駕進幸平江諸軍將㒺敢退縮斬獲既衆敵遂退師此乃皇天悔禍開悟聖衷宗社有靈遂將恢復之兆也臣嘗考往時耶律氏方强徳光舉兵破汴京之際大遼强盛自古亦罕聞也不數年周世宗即位慨然有安邉境之心親統諸軍巡行塞上其出師也自乾寧軍御樓船入黄河順流而下故此取三關兵不血刃瓦橋闗乃雄州高陽闗乃河間府益津闗乃覇州也歐陽修撰五代史云世宗英武之材可謂雄傑其料强弱較彼我非明于决戰者孰能至哉伏望睿明深思熟慮若憂初進兵北伐之時暫移蹕權駐鎮江府訓勅大將撫循戰士訖遣之此帝王之盛舉也嘗觀漢高祖唐太宗取天下櫛風沐雨躬臨行陣况陛下天資神武精于馳射何憚而不行哉七論經理淮甸事臣契勘淮南京西路平土廣野皆天下之沃壤自建炎三年因金人殘破之後居民稀少曠土彌望今又重困金人蹂踐焚蕩一空正當選擇守臣經理之夫總兵統衆破敵决戰當責武臣撫存彫瘵招集流亡當用文臣欲望聖慈更命輔臣詳議可否應淮南州郡除濠泗州夀春府差武臣外其餘並差文臣使之大講經理之政仍勸率鄉村于三月間多種早禾六七月間成熟可濟艱食比至防秋塲圃事畢矣其東西二帥可委者因任之不可委者别差官仍勅令講求羊祜治襄陽之政事踵行之其通㤗州産䀋地分尤宜選任能吏收鹽息以􅂇軍興臣于宣和元年任太府少卿常考𣙜貨所入大率淮南路入納嵗約一千四五百萬貫浙東西嵗入七八百萬貫下户部勘㑹便見昔年所收實數葢通泰楚州産鹽浩瀚倍于浙東西有此數事豈可不遴選守臣乎或曰金敵至邉文臣豈可委臣對曰不然去年宣撫司嘗奏差武臣樊序等守承楚泗州金人望風遁去大率東南州郡無城壁守禦之具若小小冦盗有兵者猶可禦捍若大敵至不問文武臣皆不能保守也但當較其利害大小事體輕重而圖之綏懐之畧自近者始此其要也八論機㑹不可失事臣在陜西縁邉見中國與夏人相持前後五十年每出接戰勝負各相半惟自金人深入以来中國之兵未嘗交鋒望塵奔潰者豈金人真不可敵耶我之兵不精耳故自宣和七年以来金人一舉而圍汴京再舉而破京城又再舉而至揚州又再舉而渡大江并陜西亦失之數年以来朝廷深究其弊修軍政備器械又金人過江之時戰士屢經得㨗膽氣不怯人人皆敢迎敵則金人何復能强梁横行如往年哉以近事言之吳玠初舉退于和尚原再禦退于饒風嶺又大㨗于仙人闗去嵗九月敵臨淮甸我師累㨗金人頓兵百餘日師老糧匱無所得而遁則情見勢屈可知矣夫侵陵中國如此之久侮慢如此之甚今王師已振敵衆向衰若不發兵攻擊則終無討伐之期矣或曰得汴京而未能守何益于此事臣對曰不然昔漢高入關約法三章除秦煩苛之令民心歸之項羽以其地拆為三秦徙高祖于漢中然闗中之地終為漢有因之以取天下况此舉北可以擒劉麟平僭偽使中原之民知神器不可以非望得亦可以示我宋不忘中國土地人民之意兼彼入我出彼出我入無不悔吝乎臣嘗考宣和年間國家以富有四海之力而户部支費每月不過九十五萬貫是時臣為太府少卿紹興三年臣在政府日㑹計户部經費每月一百一十萬貫臣閒退以來竊料户部經費必有増添之數臣嘗考每月支用十萬中八萬係五軍下費耗夫養二十萬兵不能北向争天下則東南之民力何可枝梧豈不寒心哉况中原之人强悍壮實東南之人柔脆怯弱數年之後見管戰兵漸次衰老消磨既盡雖欲北向争天下亦難矣臣冐死為陛下喋喋言之九論舟楫之利臣嘗觀晁錯論兵以為中國之長技五北人之長技三未嘗不嘆服錯之知兵也以今論之金人便鞍馬每以騎兵取勝國家駐蹕東南當以舟楫者非金人之長技乃今日我之長技也屏而不用可勝惜哉臣已乞舟師二萬照應北伐之兵矣臣嘗廣行詢問海上東北之人皆云南方木性與水相宜故海舟以福建為上廣東西船次之昌明州船又次之北方之木與水不相宜海水鹹苦能害木性故舟船入海不得耐久而又不能禦風濤往往有覆溺之患今者國家與金人相持之際天以舟楫之力賜我助中興之大業朝廷諸臣自少壮時遍走兩浙東京河北及邊塞沿海地分通知海上可往去處是宜大講海上之利以擾偽齊京東諸郡濰宻登莱青州皆海道北分自来客旅載南貨至宻州投橋鎭卸下河北諸郡濵滄州及海道北分自来啇旅貽鹽行徑及契丹諸郡契丹平營州地分唐太宗伐高麗自營州登船昨趙良嗣與政使金人自蘇州界出逺路今當聚集福建等路沿海船于明州岸又先補船主稍工一官非承信郎不可依臣所論齎一月之糧前去近宻州京東海北界邉海去處亦如浙東海岸有居民市井既賫一月之糧到京東界則所在有糧可資之仍差選曽在京東界金人接戰將兵授以金装鉄甲使人北去范温者本京東界不肯臣劉豫之人在海上聚衆屢與豫賊相據可遣也崔邦弼在青州為將官數年間與金人于青州濰州界交兵一方之人極喜之可遣也王進本係登州界逓舖兵士後來為官兵嘗屠戮畨人留在青州者人亦喜之可遣也臣自離朝廷不知諸將見管人兵之數通計崔邦弼下有兵三千人王進下約有二千范温初到時有兵六千人後來併入軍中或汰諸軍充廂軍若盡行剗刷歸范温處約得五千人已一萬人矣又於諸軍補足二萬之數遣行所至去處為濟海可用者即用之其不可用者焚之起南風而去得北風乃歸金人雖有鐵騎百萬必不能禦此行在我無浩瀚之費到彼資東北之糧萬全之計豈可緩哉十論并謀獨斷事臣嘗考古之帝王舉大事決大議謀不可不廣而斷不可不必晉武帝欲伐吳羣臣以為未可惟張華賛成其計故一舉而平江表唐憲宗欲伐蔡衆議排沮惟裴度與意合故一舉而擒吳元濟韓退之頌其功曰凡此蔡功惟斷乃成不赦不疑由天子明是也今陛下以聖明英武之資金人退兵之際以善後之計下詢于前宰臣僚六人者或以為當用兵或欲且保江南或欲理淮甸或欲堅守和議或以為上䇿莫如自治或以謂來則拒之去則勿追乃禦敵之道人之見既不同則議論必不一若夫稽考已然之事斟酌已然之勢孰利孰害緩急是非可否在聖上獨斷而已臣事陛下久出入將相踰二十年平日嘗以謂若不舉兵則必不能還二聖復中原牽制川陜敵兵紹興三年臣與朱勝非孟庾等已計北征伐樞宻院機速房具有案底偶潘致堯高公㑹自尼堪處奉使囘遽言和議其事中輟今又二年夫敵性反覆金人尤叵測其操心堅忍必欲吞噬我國陛下屈己極矣去秋忽然兵至其意不淺今其去也必不為之備秋冬間若不舉兵南来必併兵以窺四川在我之計决不可茍暫時之安而忘北向争天下事萬一欲舉兵更乞質諸大臣參詳禁從博訪卿士謀及庶人及卜筮所貴慮無遺策動有成功臣年已衰老待盡於畎畝妄陳所見不中事機惟陛下赦其萬死幸甚臣契勘自金人騷擾以来天下之論或以謂必講和議或以謂必須用兵二說膠擾曽無一定論伏覩自建炎元年至今前去遣使命若宇文虚中王倫朱弁郭元邁魏行可崔縱洪皓龔璹張邵軰前後所請非不切至近又遣潘致堯高公繪韓肖胄胡松年章誼孫近魏良臣王倫相繼入國竊料金人國書必無果决之言亦有難從之請姑欲欵我爾伏望聖明深賜洞察所請十項各顯効勘量和議可成不可成如和議可成則成乞舉兵之䇿置而不用可也如和議决不可成則臣衰愚言或可以備收録三朝北盟㑹編卷一百七十六
