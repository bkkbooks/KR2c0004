body:
  text: 三朝北盟㑹編巻五十一宋徐夢莘撰靖康中帙起靖康元年八月三日乙未盡二十日癸丑八月三日乙未太宰徐處仁少宰吴敏並罷以御史中丞李回言章也徐處仁觀文殿大學士中太乙宫使制曰門下圗治有要在人主所寳惟賢充位無聞則朝廷焉用彼相眷予上宰乆預政機謀猷闗著于事功體貌務全于終始誕敷眀命播告多方正議大夫太宰兼門下侍郎徐處仁器質淳龎才能敏邵蚤年治郡素髙黄覇之風晚嵗裕民竊陋桑羊之政比疇雅望列處宰司允藉老成庶殫衷悃矧國歩艱難之日乃廟堂叶賛之時不知黽勉以赴功相與逡廵而固寵乏可否之相濟唯同異之是聞邉患未寧方寸隂之可惜機㑹一失恐駟馬之難追道路流言士夫興歎覽封章之引咎具公論之騰喧俾解鈞衡進升祕殿即祠宫之優逸昭命數之休隆併衍爰田申陪貢賦於戯任舊人以共政初朕心豈有意於遐遺詢黄髪則㒺愆惟爾躬尚無忘于辰告往祗予訓其體眷懐可觀文殿大學士中太一宫使依前官加食邑七百户吴敏觀文殿大學士醴泉觀使制曰門下兹以朕嗣承丕緒統御萬邦當論相之初賴股肱之允協至臨事之際乃矛盾之是聞念久處于廟堂務曲全以體貌我有眀命颺于大廷通議大夫少宰兼中書侍郎吴敏性識静深器資閎逺髙文足以華國鯁論足以濟時頃上皇臨朝遍厯從臣之選逮𦕈躬踐祚首登揆路之崇藉爾孤忠輔予大業方邉陲之未靖顧宗社之可虞有厝火積薪之危有垂髪九淵之懼爾乃玩嵗而愒月莫知排難而解紛持首䑕之兩端乏鉛刀之一割稽違使指潛失事機致公議之騰諠亟剡章而瀝懇宜解鼎司之重任就升秘殿之隆名均逸真祠併昭異數於戯閔勞以事尚素藴之可觀益勵乃忠想嘉猷之未替袛服休寵勿怠壯圖可觀文殿大學士醴泉使依前加食邑七百户唐恪除少宰制曰門下周室任賢詩雅羙甫申之維翰漢朝論相史官稱丙魏之有聲皆垂希世之名用起中興之治朕念彊隣未靖輔臣㒺功冀得真才付以樞柄繫生靈之休戚守社稷之安危咨爾在廷明聼予告正奉大夫守中書侍郎建康郡開國公器識閎逺徳履端良學足以通治亂之原力足以任股肱之託召從外服知畧輻輳於朕前敭厯正途風采想聞于天下渾渾忠義之氣憲憲文武之資為時顯人宜膺大任亟升華于右揆仍兼秩于西臺申衍爰田並陪真食於戯艱難多事莫甚此時謀議盈廷當求善䇿念民力之已困恐國勢之易搖修政刑以固本根謹闗防以消外侮用殫財而易賦毋黷武以貪功顧後患之可虞惟前車之是戒予違汝弼汝言予從無忘厥功庶永終譽可特授少宰兼中書侍郎依前官加食邑七百户徐處仁知東平府吴敏知揚州臣僚上言臣等厯考自古中興之君商髙宗則得傅説周宣王則得仲甫漢宣帝則得魏相協心相與圖治故能伐鬼方攘獫狁單于慕義稽首稱藩載之經史不磨唐肅宗用裴冕苖晉卿之徒相業庸謬肅宗之治因以不振稽古之士於此惜之伏惟陛下勤儉之徳本於生知緝熙之學期於日益盖與商髙宗周宣王一無以異漢唐而下皆不足數然自即位已來厯今三時邊陲未寧黎元騷動興治補弊之效未有可觀者殆以宰相非其人乎謹按太宰徐處仁初以蔡京薦進自縣令不三年備位政府縉紳駭其速化而不聞見有善譽也自金人退師陛下採其治郡之能擢為首相盖將與圗回天下之務取生民愁歎之弊盡革之而器局凡陋不知大體智識滯暗不通時變曽不能宅百揆熙庻績以副具瞻之望太宰之職可居乎謹按少宰吴敏初以蔡京欲聨親議遂以羣雍私試髙等入仕因與京結為死黨在上皇朝縉紳目之謂在劉丙林攄之右上皇内禪睿志先定父子授受夫復何疑而敏因蔡攸刺得宻㫖乃貪天功以為己力處仁符竊相位使其效力自贖猶或可容而以佞濟姦私植黨與凡其設施悉效蔡京意在専權固寵雖處仁暗猶能識之二人因以不和而天下之事遂致壊缺毎出一令行一政命一官除一吏不恤社稷之安危生民之利病惟務已言之勝遷延淹時者有之朝令夕改者有之遂使天下之民自春渉秋日望朝廷之惠澤而殊未有以慰其心也方今强敵憑凌重兵壓境河東之役師老粮匱天下之憂日甚一日而和議之使未遣擾民之事益繁怨讟並興上天見異榖未及穫飛蝗蔽空而處仁與敏傲然自肆畧不引避意在歸過人主殊失愛君之義矧以小忿交争黼座之前大臣之體得如是乎臣等採之僉言稽之舊典處仁與敏誤國負恩罪在不赦伏念祖宗創業艱難之重上皇罪已傳位之心下恤四海蒼生翹首惠澤之乆亟罷二奸别圖任用庻㡬中興之業不愧于商周天下幸甚取進止八月二十七日三省同奉聖㫖徐處仁知東平府吴敏知揚州並放謝辭不候受告搬家接人疾速發赴新任靖康遺録曰初驛召徐處仁于北京令星夜前來赴闕二十三日制以徐處仁為太宰兼門下侍郎處仁始為北京留守以剛亷自名因太學生言其可任遂以通奉大夫召入都人傾望咸謂有所建明既至當軸殊無嘉謀良䇿談者失望時中國多事符檄紛紛處仁不能决又與吴敏不協毎朝罷議事互相詆訾未㡬吴敏于東府見處仁處仁方秉筆據案敏既坐有所咨啟語漸相侵處仁忿然以筆擲之正中敏面額鼻皆黒同坐者引去明日吴敏奏其事而御史亦相繼彈劾不踰月罷敏以少年多不習事胥吏將文牒至有所呈覆吴敏不能裁遣但云依舊例可也是時軍期𦂳急遽如星火敏不留意方具劄子乞令學者添治春秋又因司業楊時上言王安石三經新義邪説聾瞽學者致蔡京王黼因縁為姦以誤上皇皆安石啟之也又謂安石不當繼十哲宜依鄭康成畫壁從祀上從其言下大學如敏所請時人有十不管之語云不管太原却管太學不管防秋却管春秋不管砲石却管安石不管肅王却管舒王不管燕山却管聶山不管東京却管蔡京不管河北地界却管舉人免解不管河東却管陳東不管二太子却管立太子盖譏其不切事務故也咸謂深中時病林泉野記曰徐處仁字擇之應天府人元豐八年登甲科累官為工部尚書大觀元年遷右丞梗正不阿俄丁母憂蔡京罷相處仁奏十事乞留京士論醜之頻厯外郡有治聲靖康初召為中書侍郎俄代李邦彦為太宰時金人已入河東朝廷多故處仁奏陳八戒諌逰幸近習戚里佛道費用等皆遵而行之庻可刷金人深入之恥及金使來請和處仁請付种師道處置少宰吴敏主和議不允敏又差注親戚數人處仁抺去之由是不和加正議大夫與敏交争於殿上坐是罷為觀文殿大學士提舉杭州洞霄宫退居鄉里敏亦罷去敵圍應天城中民作亂目處仁為姦細刼奪其家資殺長子感病而卒年六十六子康度後皆顯仕何㮚中書侍郎陳過廷尚書右丞聶昌同知樞宻院事聶昌自開封尹除同知樞宻院事昌舊名山上甞夢為兩日所逼乃改山為昌以厭之人皆莫曉其意或謂欲用山奉使金國乃改賜名又曰上一日謂聶山曰山大物也何以為名山曰臣素慕周昌為人乞改名昌於是奉御筆改名昌勅朕為京師衆大之君是有獄市并容之寄卿發姦摘伏號稱神明扶弱抑强濟以寛猛兼孔子果藝之選繼西漢趙張之餘載省風聲不忘嘉歎故兹奬諭想宜知悉許翰罷同知樞宻院李回簽書樞宻院事解潛屯兵南闗為尼堪所敗奔于隆徳府解潛屯兵南闗慮我師不用命乃置壘于溝壑之上且效淮隂背水欲使三軍殊死而戰尼堪軍兵垂至先戒兵將諭以禍福云迎敵者賞及子孫退走者誅及妻子或有竒功定加髙爵三軍私語云向日童宣撫時亦有此言然戰死者申為逃走奔潰者立賞招安今日之令又恐虛文是日敵方攻壘將兵果習舊態但畏敵人不顧軍令後軍乃縋深溝唯求自脫然壘中亡者不知㡬千也金人乘亂鳴鼓而進我師大潰其敗軍覆將又非上賢時比也潛乃奔隆徳府知威勝軍張堯佐叛降于金人劉韐聞解潛敗奔回京師李綱頓兵懐州不進遺史曰劉韐聞解潛敗留張俊苖傅于信徳府而走至京降八官落職罷之李綱初氣銳而輕敵潛既敗綱氣遂挫乃頓兵懐州不敢進日與鄒柄張牧論事諸將禀事者先禱柄牧將士怨之初太原城中有將官楊可發者面有六字號為楊麻胡擦城出欲招集人觧圍到虞縣約有衆千餘忽邏得三人乃繁畤縣東諸豪傑不肯順畨差往探太原事者可發遂隨此三人至五臺山北繁畤縣東天延村招軍四十餘日得二萬餘人以五臺山僧李善諾杜太師為先鋒將到繁畤縣東十里鐵家㑹遇金人大戰至晚衆皆散去可𤼵却上五臺山副僧正真希投拜可發去五臺山却入虞縣有衆二千遇尼堪大軍至可發自知其不可乃倚壁而立以鎗自刺其腹而死瘡口無血有白脂一塊隠出塞定瘡口至是解潛之兵潰劉韐奔入京師李綱止屯于懐州金人縱横于河東矣五日戊戌察訪張灝㑹將兵駐于汾州遣統制張思正折可求冀景進兵于郭山柵七日庚子尼堪兵破郭柵張思正冀景奔回張思正等屯郭柵深溝髙壘未甞料敵迎戰金人既近而冀景寨中忽張青盖敵視而不擊惟攻思正等寨矢石交射金人冐矢急攻寨中人兵退移竟為所敗惟冀景軍奔回兵死于寨中不知其數彗出東北上深自内懼令宰臣議詔責躬放宫人减常膳求直言八月辛丑以彗出下詔詔曰朕托士民之上嗣位旬日敵國侵凌乃至郊甸迨今三時邊鄙未寧調發轉餉勤動四方惟徳不類無以仰當天心日夜祗懼毎御便坐稀臨正衙凡欲以自奉者務貶損至于常膳百品减去七十放宫女凡六十餘人未甞輙奏音樂備置臺諌廣通言路公車上疏乙夜躬覽庻㡬少自警戒而日者彗出東北方考之前載實為大異畏天之威弗敢寧處今將循舉故事而率皆已行深懼又不能應譴告之實熟憂再四意朕之不明元元之愁痛無聊者衆是求民之疾苦者悉行條具除等解嬈冀以感召和氣以格休應咨爾卿士具體朕意毋忽張灝招集潰兵誅冀景張灝出榜于諸要路招集兵將云近以郭柵之戰將兵非不用命盖縁敵鋒甚盛遂至敗事自統制下至兵卒並皆免罪如戰歿將校及重傷之人仰一一保明當議重行賞典如敢不來本司定行軍法自是兵將稍稍集于汾州諸互論不用命者又訴冀景有異意言金人既至乃於寨中張青盖為號敵人不攻又見危不救而反奔潰灝遂下景等獄勘騐指實戮景于市死者五十二人十五日戊申張思正襲金人于文水縣獲㨗十六日己酉思正出戰我師大潰先是八月初劉韐兵先進敵併兵禦之韐兵潰既而解潛與敵相遇于南北闗轉戰四日殺傷相當金人増兵潛軍力不能勝而潰平定遼汾之師皆逗遛不進韐潛失利潰散之兵蔽野而還人人震恐獨思正之兵在汾州其衆尚十七萬號百萬未出戰敵曰韐潛既敗不足慮也乃驅婦女老弱守虛寨以當平定威勝之路而併其兵禦思正思正領兵出汾州執冀景示衆曰景不堅守石嶺闗遁還者也斬之以狥是月十五夜敵于文水縣張飲以賞月諜者以告思正襲之斬首數百㡬獲嗣本嗣本脱去灝思正以小㨗之故馳黄幟呼于路曰汾州㨗報也州縣歡聲震地曰我師勝矣或持酒肴相慶曰皇帝聖慈吾見其太平乎至有感極而揮涕者十六日思正出戰敵曰彼衆雖多而喧囂不整無能為也乃以鉄騎三千直衝我師大奔相蹂踐而死者數萬人坑谷皆滿思正以敗卒數千人奔汾州灝以牙兵數百趨慈隰於是汾州威勝隆徳晉絳澤州民扶携老幼渡河南奔者鉅萬計諸州縣井邑皆空兵潰散不復入汾州咸歸元來去處或勸還司衆曰前日郭柵散察訪出榜招安云統制以下並免罪後復行誅戮今日還司是就死也不若權歸以俟再舉二十日癸丑詔四總管許自選將兵以禦都城朝廷既知張灝等敗深慮金人深入詔四總管以兵禦都城張叔夜充南道總管髙公純副之胡直孺充東道總管朱勝非副之王襄充西道總管孫昭逺副之趙野充北道總管范訥副之侍御史胡舜陟劄子論禦敵之䇿臣觀漢唐以來禦敵之䇿有五曰和親曰守備曰征伐曰撫定曰覊縻皆因時而為之和親守備則施于敵國彊勝之時漢髙帝是也撫定覊縻則施于敵國衰弱之際漢宣帝光武是也至于征伐或施于强或施于弱必先以中國富盛兵甲精銳我有萬全之勢彼有可乘之隙然後可舉漢武帝唐太宗是也今我國家承巨奸誤内侍持權之後海内虛耗帑藏空竭軍律不振士不為用金人乘時肆其衝突馬驅乎中國圍守乎巨鎮而我動天下之兵斂四海之財不能少挫其鋒此則敵國强盛之時也彼强我弱征伐不可妄用而朝廷急欲解并門之圍不度彼已王師輕動於是种師中敗于榆次解潛敗于南闗折可求敗于汾劉仲元敗于大安馹實犯不韙自取挫衂以漢髙祖之神武而又有謀臣猛將不世出之材破秦項如振稿猶甘受冐頓之困不敢與之校乃知敵國强盛制之當自有術不専以兵也所謂講和守禦二䇿誠今日之先務朝廷先遣三使往議和好可為善矣更務自守二䇿並用善之善也伏觀今日命將出師悉援太原如救焚援溺其勢可謂急矣介胄之士孰不欲踴躍而前縉紳之士孰不欲抗議督戰然兵家善教見可而進知難而止不敢必也茍不可進必使之進猶羝羊觸籓何利之有徒䘮軍氣非惟不足以救太原適足以取自弊之道兵寖單寡則有不測之禍不可不慮臣願陛下以漢髙為法與之講和以漢文帝為法自為之備詔宣撫司勿督諸將决戰且據要害堅壁固守以養士卒之銳氣竢彼有可乘之隙我有萬全之計相時而動以竒取勝天下幸甚昔突厥方盛唐太宗不得已而事之未㡬擒頡利於北闕下敵國盛衰無常姑含垢忍恥以俟之未為晚也臣自聞河東失利朝夕深思竊為計無出此者狂夫之言聖人擇焉伏望陛下斷而行之面奉聖㫖令劄付諸將三朝北盟㑹編巻五十一
