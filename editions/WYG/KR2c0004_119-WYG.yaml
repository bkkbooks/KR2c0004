body:
  text: 三朝北盟㑹編卷一百十九宋徐夢莘撰炎興下帙起建炎二年十一月盡十二月十一日辛未十二月苖傅劉正彦以兵八千扈衛隆祐太后六宫駐杭州是時邉報不一上命苖傅劉正彦帥師扈六宫南渡至錢塘傅為御營都統制正彦副之劉晏所統赤心隊猶𨽻麾下傅與正彦皆陕西人傅父禮正彦父發皆為西邉良將傅隨梁揚祖信徳府来勤王為右軍統制上即位御營司後軍統制正彦少為文資宣和間劉光世薦其才得換武職傅拙直不能曲奉内侍故多譛之者正彦来上方畧故被選用十二日壬辰金人䧟延安府正月金人䧟延安府東城而西城堅守未下金人知曲端與王庶不協乃併力攻鄜延康定王宗尹不能禦庶在坊州聞金人兵至康定連夜趋鄜延以遏其前金人詭道陥丹州界扵鄜延之間庻乃自當鄜州来路遣龎世才鄭㤙當延安来路時端盡統涇原精兵五萬駐淳化月餘不動日移文趣其進兵遣使臣進士十數軰徃說諭端併兵鄜延無益不如以計困之兵法所謂攻其必救乃遣呉玠攻華州端自攻蒲城縣華州蒲城皆為守兵玠援華州端不攻蒲城復與玠合兵歸襄樂属環慶在深山中去金人五百里天大雪寒甚金人攻世才世才與戰兵不用命乃敗自此金人遂専圍延安西城日夜攻擊不息庻自收散亡援延安比至甘泉而延安陥權知延安府劉洪及縂管馬政出奔初􅊛援鄜州聞延安己陥即復囬興元金人大肆殺掠遂東趋河上如欲渡河稍北近綏徳軍庻自劾待罪别録曰十一月壬辰敵陷延安初鄜延經畧使王庻屢戰有功聞敵自熈河敗囬仍檄諸路不應又移書謝亮以率諸帥亮又不從既而詔除庻節制六路兵擊敵於鄜延耀州諸路又為敵諜知遂破延安王庻奔於曲端軍中奪其制置使印王庻既失延安㒺知所措倉皇未有歸念惟有曲端在襄樂雖素不相協然勤王事則自有公議且曰捨端吾何歸乃率官属馳驅至襄樂造端之壁端號令甚嚴叩其壁者雖貴亦不敢馳庻既至端令毎入一門减其從人之半及至帳下僅有從兵一二已端設軍容見庻庻惶懼戰慄端數其失延安之罪詞色俱厲庻僅能言自劾見待罪端遂取制置使印犒禮随行其從人廹庻還鄜延盡拘縻其官属十五日乙未金人陥濮州金人圍濮州知州楊粹中固守之金人力擊之者三十二日自西北角登城守陴者不能當城遂䧟粹中登浮屠最髙級不下金人惜其忠義許以不死粹中乃下粹中真定府人金人以不歸附城中無少長良賤大肆殺戮仍火焚其廬舍俱盡金人䧟開徳府金人攻開徳府王某守其城金人以文字至城下呼曰王某有文字来歸附大金故我来此汝百姓何敢拒師軍民信之欲殺知府知府走南門未出城為軍民蹂踐而死金人入城怒其拒戰殺戮無孑遺紹興九年復得河南地惟開徳府城中無一戸舊居土人金人陥相州金人圍相州久粮食皆盡猶堅守未下趙縣丞者不字行宗室也權知州事人呼為安撫者趙安撫與軍民議曰食已盡人皆食㗖外無救援安可久乎某乃國家宗室豈有順敵諸人當自為計衆皆不應趙安撫曰約降如何雖衆悽慘然有唯唯者趙安撫知其意乃登城樓遥謂金人請開門投拜乞不殺金人許之趙安撫乃具降書開城而自推其家属入一井中然後身擲入井先命提轄以土盖提轄遂實之以土人皆哀之二十二日壬寅就江都縣築壇南郊大赦天下門下觀㑹通以行禮莫嚴定位以交神逺罪疾而弭烖亦或因時而致禱朕紹承大統誕受多方属當外患之相仍爰省四方而臨幸念父母兄弟尚屈於敵疆惟甲胄干戈再淹於嵗序問寢闕温清之奉在原深急難之情信使屢馳乆猶未報金師再遣坐待底寧復窃盗之無良乗邉陲之多亊馮陵州縣震擾民氓衣冠傾仆於道塗耒耜荒殘於本業行者未知所適居者莫獲其安傷閭里之疾苦則撫循之政尚愆問行陣之勤勞則休息之期猶逺毎撫心而及此屡當食以興嗟險阻艱難固偹嘗矣勞來安集尚未有之豈菲徳之敢圖惟上穹之悔禍永懐眷祐恭俟監臨雖兹多壘之辰適在當郊之嵗惟祭或祈或報必稽於時物之儀而禮之有儉有豐特視情文之稱是用謀有虞東廵之制循建武二成之規新黼冕以嚴恭建胥徒而齋沐盖髙在上聰明皆自於我民與善惟人治亂無艱於天位既殚誠悃冞極戰兢仰覆育之何心詎存時怨况顛危之已甚寕至我遺疾呼反本而必聞精意黙通而可動庻㡬来假或厭多難新命舊邦協幽眀而並貺此疆爾界一内外以均安其敷曠蕩之㤙已廣龎鴻之施可大赦天下於戯為斯民而請命敢㤀庻民之無辜置大器於復安實兾昊天之所予尚頼六服羣辟三事大夫共宏恢復之功亟底隆平之業邵興敗金人於絳州曲沃縣知濟南府劉豫權知淄州李某附於金人初李成敗於劉光世也轉至淄州攻擊僅兩月不下廸功李某權知州固守之城粮漸盡侵濟南府界擾於外邑淄州求救於滄州劉錫濟南府亦求救於滄州兩州皆堅守拒城以待外援㑹金人侵山東先至濟南府劉豫謂滄州救兵来矣既不為守禦備開納之乃金人也遂就投拜金人未至淄州前一日成起軍轉城而似欲退去者淄州人疑之莫測其故俄而擺列諸軍於城下盡發諸寨老小先行是夜神霄宫火焚燒諸寨淄州人謂成果退去矣翌日金人軍馬逼城淄州人亦謂是滄州救兵乃具香花於城上望塵歡譟既而知是金人遂就投拜金人謂自入南界未有如濟南府淄州秋毫不動而投拜者大喜之自後金人據有中原諸州皆屯戍女真契丹軍唯濟南府淄州並無一人一騎韓世忠為御營平冦左將軍領兵一萬軍京東金人侵京東故命韓世忠軍於京東以措置之劉正彦為御營平冦右将軍王倫上書乞入大金迎請二聖加朝奉郎充通問使朕惟彊事未寧親庭在逺夙宵軫念庻孝弟通於神明物色求人倘忠信行於蠻貊眷兹乆矣今乃得之以爾胄出公侯胸兼勇智言念主憂而臣辱何有於生如皆以秩而任勞孰當其責雖淹回之未試獨慷慨以請行宜升郎秩之榮仍委使華之重朕既俯同晋國用魏綘以和戎爾其逺慕侯生御太公而歸漢勿惮徂征之逺佇期歸報之休倫以修職郎改朝奉郎充大金通問使詔戒百官朕承祖宗有道之長頼黎献戴宋之舊嗣守神器適嵗當郊祗見皇天后土慨念父母兄弟越在他邦宗廟社稷之托中更異姓一時赤子塗炭靡依獨予一人舊勤於外天其或者俾復大業保乂斯民以導迎南還之御惟兹肇祀實報以祈朕齋慄存念大惧菲徳弗𫉬顧歆乃先事三日繁隂凝翳潤不至濡震於朕心罔承靈祉逮祖廟及壇垂象􅀈炳夜氣晏温靄澄霄霽迄用成禮顧朕眇昧罔有一二敢曰聲聞於上實惟祖宗之靈相佑在天惟爾萬方有衆不替忠順協於天心朕既𫉬祗事勿敢謂幸矧敢怠康方恐懼修省以承天眷念與爾有同體共利兾各廸乃心無拂於上下神祗共迎景貺以宏濟多方艱用誕告於率土惟世理亂在臣庻戚休無有大小逺邇惟底寧爾國則亦寧爾家爾躬在焉股肱大臣其同寅協恭思難圖易輔朕不逮以倡百辟論思献納之官若耳目風憲左右侍御有言達於予聴必忠必誠毋奪於私凡百有官君子飭躬謹行惟職業自修守令部使者暨爾僚佐有為有行其必曰毋傷於民毋害於國無及爾暨爾家則獲神休而永終譽中外爪牙之臣賈勇敵愾思建戡難之勲以􅅷逺圖毋怠名節之羞軍民戰士咸奮忠力遂爾寵榮至於失業無依哨聚林藪怙衆為暴殺掠無辜當思神明譴殛之報應甚影響古今誅討之刑雖緩必正革心自効掩罪以功錫爾官爵永維我國家之用朕信不渝嗚呼天道福善禍滛助順罸惡疎而不失股肱大臣暨爾萬方有衆咸思寅畏冀天悔禍救民塗炭復我父母兄弟宗族臣民躋世隆平與萬世有衆共之咸孚朕志毋茍目前之安尚有賞刑為爾後報十二月五日乙邜隆祐皇太后至杭州隆祐皇太后至杭州以州治為行宫扈從統制官苗傅等團住於奉國寺十日庚申金人攻東平府知軍府事權邦彦棄城走遺史曰權邦彦字朝美崇寧四年進士釋􅄄登第靖康間知兾州以兵赴元帥府勤王建炎二年代盧益知東平府孔彦舟為鈐轄邦彦與之不和邦彦領兵叛去至是金人攻東平府邦彦不能守棄城遁去降授朝散大夫金人䧟東平府十四日甲子金人䧟北京河北提㸃刑獄公事郭永死之金人攻北京北京留守張益謙轉運使裴億提㸃刑獄公事郭永共守之益謙億齷齪小人守志不固唯永率士晝夜乗城伺間則出兵擊之或勸益謙委城遁去永曰北門所以遮蔽梁宋敵得志則席捲而朝廷危矣借力不敵猶當死守徐挫其鋒以待外援奈何棄之因募士賚帛晝夜縋城出告急於朝廷且請朝廷為敵偹金人攻愈急俘東平府濟南人大呼城下曰二郡已降降者富貴不降無噍類益謙相頋色動永大言曰今日正吾儕盡節之時不宜有二乃行城撫将士曰王師至矣吾城堅汝軰當努力敵不足畏也衆皆感泣甲子質明大霧四塞敵以斷碑殘礎為砲樓櫓皆壊左右䝉頭而立有碎首者良乆城䧟永安坐城樓上或掖之以歸諸子環泣請去永曰吾世受國恩當以死報然巢傾卵覆汝軰亦将何之兹命也奚恤益謙迎降尼堪曰城破而降何也二人皆言郭永不肯降尼堪遣騎召永永正衣冠向南再拜訖易幅巾而入尼堪曰阻降者誰永熟視乆之曰不降者我也尚奚問尼堪見永状貌魁傑且夙聞其賢乃自為好語數十言欲以冨貴㗖永而降之永瞑目唾罵曰無知之輩恨不醢爾以報國家何説降乎堪令譯者申諭不已永㦸手怒罵不絶尼堪惡其言麾之使去永復厲聲曰何不速殺我我死當率義鬼悉㓕爾曹大名人在係者無不以手加額為之出淚尼堪令斷所舉手并其家属害之時年五十三即日傳語城中雖素不與永合者亦相向慟哭金人去相與負其尸瘞之永字謹思大名府元城人天資雄毅氣剛直長七尺美鬚髯望若神人博通古今得錢即以買書藏書萬卷因事為録文皆可傳而不求人知見古人立名節者未嘗不慨然掩卷終日而尤慕顔魯公為人喜面折人過退無後言聞秋毫之善必奨成如不及與人交輕財篤義而於吏治精明紹興初贈中政大夫資政殿學士謚勇節十五日乙丑黄潜善為尚書左僕射同中書門下平章事汪伯彦為尚書右僕射同中書門下平章亊制曰宰天下之平實係秉鈞之重揚大廷之號丕昭籲俊之公若時登庸訪予落止敵兵未殄有朽索馭六馬之憂國步方艱如抱火厝積薪之上臨朝興歎當饋靡寧眷求四嶽百揆之賢圖回二帝三王之治必有任斯民之責者庶㡬選於衆而得之大中大夫知樞宻院事御營副使新安郡開國公食邑二千五百户實封六百户汪伯彦惟老成人以儒術用徳器羣公之表威名萬里之衝頃佐命於戎衣乆宣勞於樞筦歴時滋乆雋譽益敷帝賚有開潢水𫉬伯王之輔价藩作固顓㬰是社稷之臣其遂相予無以易汝宜體仰承之意益昭共政之元進躐文階陪兹真食便蕃物采庸示眷懐於戱無競維人非賢不任成湯之學伊尹有不召之臣大舜之舉臯陶而不仁者逺往宣一徳用格多盤可特授正議大夫守尚書右僕射中書侍郎依前御營副使食邑七百戸食實封三百户封如故汪伯彦時政記曰黄潜善汪伯彦進謝上曰潜善作左相伯彦作右相朕何患亊不濟伯彦昨知相州甚有政聲事朕備嘗險阻知其忠實潜善伯彦更同心濟助以副朕考慎之意金人陷虢州十九日己巳李彦仙敗烏嚕貝勒於陜州二十一日辛未金人薄青州殿中侍御史張守撫諭京城遺史曰先是朝廷措置防秋朝士紛然求去殿中侍御史張守上書曰比年綱紀隳壊風俗凋薄士大夫無奉公守節之誠為全身逺害之計一旦緩急委君父而不顧此靖康之末可為痛哭流涕者也防秋在期方事偹禦而職事官各該便私而去則國家何頼邪乞揭榜朝堂明示勅戒上納其言時邉事未寧詔百官具所見聞奏守即上防淮渡江利害各六條大槩尤以逺斥堠探報為先别疏論金人趨淮甸之路有四宜取四路帥臣守令詮擇能否各賜緡錢齎之募戰士儲芻粟繕甲兵明斥堠公賞罰使之夙夜盡力扞蔽疏至再上宰相黄潜善汪伯彦忘外患恃江淮為險無經濟逺謀忽畧其言不用守又乞詔執政大臣惟以治軍旅選将帥嚴守禦搜人才係政事之大者凡細㣲不急之務付之都司六曹惟防秋是圖潜善伯彦滋不悦乃請遣守撫諭京城守不復還矣階辭上諭之曰當不次用卿即日就道三朝北盟㑹編卷一百十九
