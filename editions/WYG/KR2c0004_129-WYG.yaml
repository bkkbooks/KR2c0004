body:
  text: 三朝北盟㑹編卷一百二十九宋徐夢莘撰炎興下帙起建炎三年五月九日丙戌盡六月七日甲寅五月九日丙戌改江寧府為建康府詔曰建康之地古稱名都既前人創業之方又仁祖興王之國本繇大邸光膺寳圖載惟藩屏之名實符建啟之兆葢天人之久属况形勢之具存興邦正議於宏規繼體不失於舊物其令父老再覩漢官之儀亦兾士夫無作楚囚之泣江寧府可改為建康其節鎮之號如故張浚往撫諭淮南四日己丑薛慶知樞密院事張浚罷知樞密院事為提舉杭州洞霄宫張浚以樞密之職往淮南撫諸賊至髙郵軍薛慶郊迎入城見浚之貌慶曰豈有如此樞密耶遂執之朝廷聞之乃罷浚知樞密院事為提舉杭州洞霄宫浚隨行有陜西兵多遭殺者慶逼浚之所齎官告三千道而館之初薛慶之執浚也屢欲殺之其黨王存勸止之曰真偽未可知恐殺真樞密則異日欲歸朝廷其可得耶慶然之浚遂得歸復為樞密院事行状曰盗薛慶嘯聚淮甸兵至數萬附者日衆公以密邇行闕一有滋蔓為患不細且聞慶等無所係属欲歸公麾下請往示大信以招撫之渡江而靳賽等率兵降遂趨髙郵入慶壘從行者不及百戸出黄榜示以朝廷恩義慶感服再拜始公入賊壘外間不聞公信浮言胥動頥浩等遽罷公樞管及聞公訖事還即日趣公歸且詔就職京西北路總管翟興及楊進戰於汝州魯山縣殺進楊進入河南府固守於鳴臯山之北山翟興及其子琮屢擾却之使無寧息至是不安其巢穴遂棄輜重趍南路興分衆邀擊於汝州之魯山縣賊以精鋭迎興於婆婆店酣戰久之進死於陳中其衆皆潰興之軍初為藥箭羣𤼵併中進及所乗馬皆斃進之衆以為徒黨自殺之自是賊之餘衆復立劉可為首翟興克河南府翟興既敗楊進遂平京西南北兩路收復河南府由是躬率将吏至永安軍朝謁諸陵将士至陵所皆泣下感愴不已翟興保奏李興功特補武義郎兼閣門宣贊舎人李興孟州王屋人世為農業體幹魁桀有勇力寡言語尚信義二帝北狩興以保扞鄉里聚衆萬餘元帥府統制官常元以為義兵統領車駕南渡陷沒興往來懐衞間攻刼敵寨斷絶糧道於牛心寺竹林河等處京西北路置制使翟興遣吏人以書幣迎之遂聽翟興節制知河南府長水及破楊進興保奏特補武義郎兼閣門祇候京城留守杜充及郭仲荀藺整吕勍奏陳乞還闕張用等侵京西王善擾淮西楊進已死京畿稍寧靜充等乃上表請上還闕不從劉洪道為京東路經畧安撫制置使上以京東隔在一隅劉洪道在青州屢騰奏牘方倚洪道經理京東乃除京東經畧安撫制置使併命宫儀知濟南府召閻臯赴行在仍賜詔戒諭密州李逵等使之報國賜戒諭李逵宫儀張成等勅書勅李逵等朕惟金國慿陵山東震擾保此數州之地皆由諸将之功爾等夙著忠誠各應委任宜互傾於肝腑以同奨於朝廷速底成功是為報國八日癸巳詔從官條具利害詔從官條具利害侍從有獻幸蜀為長策者上籌之未決御史中丞張守上疏曰東南為國家根本之地陛下既逺適則奸雄必生窺伺之心将士陜西人往往勸為此行以蜀近闗陜可圖西歸此不過将士自為計耳非謂陛下興國家計也併陳其害有十翼日至殿廬謂諌議大夫滕康曰幸蜀之事吾曺以死争之入見上力言其不可上曰卿言正與朕意合此決難行其議遂寝翟汝文亦有疏請幸荆南其言亦不用六月一日戊申朔李成圍楚州六月癸丑誅苗傅劉正彦於建康府先是四月上復位以苗傅劉正彦為淮南西路制置使副遣之任勤王兵将至傅正彦夜引兵開湧金門而去羣臣乞急遣兵捕詔世忠為江浙制置使将兵討傅先誅王世修吴湛以世修本預傅謀湛附賊故也傅至衢州江山縣禆将張翊斬鈞甫柔吉将兵降於周望韓世忠追傅等及於建州浦城縣漁陽驛與賊遇傅将兵居溪南正彦将兵居溪北約相策應世忠親率兵力戰正彦軍少卻世忠乗勝追擊正彦兵大敗正彦墜馬世忠生擒之傅棄軍遁去墮水不死衆失傅所在苗翊収其兵千六百餘人走歛川縣遼人劉晏隷傅麾下統赤心隊世忠追及之晏謂其部曲吾豈從逆黨反者邪韓制置既來吾事濟矣遂率衆歸世忠禆将池江擒苗翊張逵収其餘兵三千餘人走建陽喬仲福王徳趙士成共追之盡降其衆苗傅變姓名為商人建陽走至一村落中投村舎詹氏欲更衣而去詹氏主識傅遂擒之送於世忠世忠并正彦檻送行在並凌遲處斬於建康市将就刑正彦瞠目而罵傅曰苗傅汝真匹夫不用我之言遂至於此苗翊苗竬並臠磔於市七日甲寅黄濳善責授寧逺軍節度副使永州安置汪伯彦責授江州團練副使英州安置左司諌袁植上言前宰相黄濳善汪伯彦國之奸賊也其罪不在王黼蔡攸之下黼攸乗天下治安之久伺人主倦勤之隙持祿保位不顧後患創開邉隙貽禍宗社淵聖皇帝雖戮之而不能顯正典刑天下至今為恨濳善伯彦當天下喪亂之後正人主憂勞之時天步如履氷國勢如累卵存亡之機繫於一相方且怙􅃂擅權蔽賢嫉能導䛕者親忠直者踈苞苴者進潔亷者退附已者立登要路忤已者致之死地道路側目不言敢怒縉紳憤怒而相不恤閭里愁歎而相不知致敵國肆為謗讟事不忍聞外起逆臣敢行不軌民不堪命自登相府曽未踰年三分天下㡬失其二自河之南迄於東京由陜之右迄於淮甸生靈塗炭州縣坵墟臣以謂濳善伯彦之罪不在王黼蔡攸之下也陛下縱釋而不誅奈宗廟社稷何奈天下百姓何李綱陷陛下於失信結怨於金人兵連禍結未有休息之期陛下特竄之海外天下不議至濳善伯彦姑置之善地所以動人心将士解體國勢愈危陛下倉皇東度之際恨不膾大臣心肝以居近密為之營救也臣愚伏望陛下静黙深思念前日有播遷之苦致逆臣生背逆之心采用臣言斷自淵衷命有司檻至行在斬於都市庶幾威權自立人心自附外折敵情内消奸萌可以鼓士氣可以崇國體中興之功在此一舉遂責授濳善寧逺軍節度副使永州安置伯彦江州團練副使英州安置林泉野記曰黄濳善字懋和登進士第宣和間宰相王黼喜之累加除擢靖康間知河間府兼髙陽路安撫使大金入京詔河北諸州起兵勤王濳善依違逗遛不行及聞京師已破方領兵一萬赴康王於東平府王令駐軍於興仁府以張換等十軍皆聽節制濳善怯懦無進兵勤王之意及大金自宛亭來攻乃遣張換丁順孟世寧擊之射中龍虎郎君墮馬而去康王已聞二帝播遷加濳善天下兵馬副元帥王到應天府加濳善徽猷閣學士及即位除中書侍郎以其兄濳後為户部侍郎數月除濳善尚書右僕射御營使濳善固位怯敵與汪伯彦及諸内侍相結畧無為國濟民之意恢復中原之心上幸揚州放散四方勤王之兵潰為盗賊占親兵一千自衞不用能賢惟薦朋黨王黼門人如盧益輩多用為八座侍從陳東歐陽徹上疏乞留李綱即斬之以吴給張閣之言為諱善交通闗節賄賂公行京東日為大金所侵直至淮上濳善恬不為慮二年加尚書左僕射許景衡乞車駕駐江寧以備大金不測之侵濳善力沮抑之宗澤以収復兩河迎請二帝為急濳善大惡之專為諂佞固􅃂之計三年金人已廹上欲南渡濳善伯彦尚苦留之上更不問率百餘騎徑渡潤州僅以身免軍民百萬皆為大金殺掠遂陷中原百姓聞濳善之名無不毁罵上至杭州御史中丞張澂言濳善伯彦大罪二十罷為觀文殿學士知江寧府後又言其罪改觀文殿學士提舉南京鴻慶宫又再言其罪改觀文殿學士俄又言士民皆怨憤遂責授秘書少監分司西京後司諫袁直再言其罪責授寧逺軍節度副使永州安置汪伯彦字廷俊徽州祁門縣人也王本為祁門令招伯彦為門客故秦檜皆居伯彦席下崇寧二年登進士第梁子美知大名府伯彦為司理參軍子美甚善之累遷中散大夫靖康元年進河北防邉十策擢直龍圖閣知相州伯彦兼主管真定府路安撫使公事及康王出使於大金過宿州伯彦言大金已南渡勸未可北行遣劉浩以兵三千迎入相州俄除兵馬副元帥雖畧招兵而怯懦無謀無勤王之念常勸謀往東南自保而已加伯彦天下兵馬副元帥建炎初除同知樞密院事俄除遷知樞密院事濳善結内侍以固權陳東歐陽徹被誅畧無一言諫止吴給張誾邵其章皆以忠諫伯彦忌而竄之宗澤屢乞親征迎請二帝伯彦沮之大學生魏祐上書言其與黄濳善共為奸邪乞早逐之伯彦占親兵一千衞其家畧無為國濟民之心梁子美親族皆薦為美官王黼之客盧益已為尚書伯彦薦濳善為同知樞密院大金攻陜西五路京東京西諸州多殘破伯彦恬然不恤許景衡乞早渡江寧府伯彦立排沮之建炎二年除尚書右僕射與濳善相結阿䛕順㫖特固祿位而已大金已逼掦州不遣兵拒戰上欲渡江又與濳善留止次日車駕百官單騎徑渡鎮江而六軍百姓多為大金誅擄天下咎其邪佞踈謬聞其名則罔不切齒罵詈御史中丞張澂言其大罪二十罷為觀文殿大學士知洪州後再言其罪降為觀文殿學士俄又言之士民亦憤心未厭以正議大夫秘書少監分司南京永州居住後司監袁植再言其罪責授江州團練副使英州安置裴淵以其衆至行在隷於韓世忠初裴淵以収復秦州之功状聞於朝得㫖許赴行在既至悉𤼵隷韓世忠軍張浚江淮荆湖川陜宣撫處置使便宜黜陟賜闗陜官吏等詔詔曰朕嗣承天統遭時多艱夙夜以思未知攸濟正賴中外有位悉力自効共拯傾危今遣知樞密院事張某喻密㫖黜陟之典得以便宜施行卿等其念祖宗積累之勤勉人臣忠義之節以身徇國無貽名教之羞同徳一心共建隆興之業當有茂賞以答殊勲杜充為宣武軍節度使朝廷除杜充為宣武軍猶未知楊進死乃加進任正觀察使范瓊率兵至行在送大理寺賜死范瓊軍於洪州苗傅劉正彦之變除慶逺軍節度使湖北路制置使瓊以兵㑹合不從及上復辟遣使宣諭至是方來朝臣僚交言其罪樞密院計議官劉子羽乞誅瓊以戒暴亂吕頥浩張浚議定必殺之乃召赴都堂命劉光世入瓊寨撫定其兵送瓊大理寺賜死猶不伏獄吏以刀自闕坌挿入呌疼一時死其弟并三子皆流嶺南張浚行状曰御營平㓂将軍范瓊來赴行在瓊自靖康圍城與金人通及京城破逼脅后妃及淵聖太子宗室入金國及乗亂剽畧亂左右張邦昌為之從衞罪状非一至是聞二㓙伏誅始自豫章擁衆入朝既陛對恃其衆盛悖傲無禮多所邀求且乞貸傅正彦逆黨左言等臣僚奏大畧云瓊大逆不道罪冠三千之辟呼吸羣㓙布在列郡以待竊發若不乗時顯戮則國法不正且他日必有王機蘓峻之患臣任樞管之寄今者被命奉使川陜行有日矣乃心踟蹰若不盡言乞伸典憲死目不瞑上深然之公獨與權樞密院檢詳文字劉子羽密謀夜召子羽及選宻院謹飭吏數輩作文書劄榜皆備鎻吏於府中翼早公赴都堂召瓊議事瓊從兵溢塗巷意象自若坐定公數瓊罪愕怡命縳瓊送大理寺子羽已将榜於省門外親以聖㫖撫勞瓊衆曰聖㫖罪止瓊餘皆御前軍也無所豫頓刃應喏瓊論死兵隷神武軍姓氏錄叛逆傳曰范瓊字寳臣開封人也自卒伍補官宣和末河北京東羣盗起命瓊往招張仙崔知李寳蔡進等有功金人圍京城瓊與李寳等來勤王屢與大金戰皆身先士卒數破之由是顯名大金退命瓊軍河北招羣盗劉浩等數戰破之加觀察使賜第一區金人再圍京師瓊為京城四壁都巡使淵聖出郊大金使瓊取太上及鄭皇后太子諸貴妃等瓊仗劍逼請出城詣金人寨百姓邀駕者瓊皆斬之金人又命京城再立異姓揭榜於市勸諭之及欲立張邦昌統制吴革欲擁軍民併與金人死戰以奪二帝瓊又與左言以兵攻革執而誅之殺數百人於金水門外而邦昌立矣般甲杖欲候金人退師往撫諸路不伏者建炎初至應天府加定武軍承宣使御營使司同都統往襄陽討李孝忠瓊至屢與李孝忠戰敗績㑹諸路兵皆至與孝忠大戰臨陳殺之其将張世立孝忠弟孝義降於喬仲福瓊至運道遇羣賊孫仲等與戰皆㓕之加天武奉日四廂都指揮使同主管侍步軍司移軍真州後除瓊御前平㓂前将軍領王剛王彦等軍駐京師三年羣盗劉忠據海州懐仁縣遣統制張仙崔智慕進徐靖等擊之忠詐仙等入忠寨撫之忠伏兵起擊仙等皆殺之降其兵瓊屢與忠戰皆敗績羞恨而已回軍夀春府軍士與夀春府兵作争遂相殺争出刼其城殺其知府鄧紹密聞苗傅劉正彦之變瓊在洪州傅除慶逺軍節度使湖北路制置使瓊與傅書問往來不時進兵張浚十一檄令㑹合勤王瓊終不進上反正遣使宣諭方來臣僚累言其罪張浚杜充議除之召赴都堂命劉光世入瓊寨撫定其兵送瓊大理寺賜死猶大呼不伏罪其弟并三子皆流廣南籍其家財劉光世招降韓雋韓雋為苗傅第四将傅敗雋以所部人馬走至湖口渡江至蘄州知州王甡與州縣盡棄城閃避雋檢視軍資及諸庫州倉錢絹米麥皆盈滿雋悉自封鎻之出榜止不得秋毫擾於民間不得攘取倉庫次日便行欲往京畿尋楊進殺之至光州仙居縣界值王善張用遮路兼聞楊進已死㑹劉光世駐軍江州遣人招安雋雋乃受之光世令蘄州知州王甡及州縣官已復入城治事甡率州縣迎見雋叙話甚懽雋自此更名世清號為小韓三朝北盟㑹編卷一百二十九
