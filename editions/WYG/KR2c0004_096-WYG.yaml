body:
  text: 三朝北盟㑹編卷九十六宋徐夢莘撰靖康中帙諸録雜記靖康小録曰國家自太祖開基太宗繼統平靖天下四方無虞黎民安業百有餘年至熈寧元豐間邪臣用事託儒藏姦口道孔孟之言身行商鞅之術始變祖宗良法改亂舊章無有存者禍亂之階實兆於此有識之士奮身力争而不能奪其説新法遂行而積怨於天下矣及崇寧大觀之初蔡京進用述其説以鉗天下之口排斥正人引用邪慝上下相䝉以賄成其後王黼輩以庸謬相繼祖宗之業於是大壊端人正士棄逐海表庸愚謟佞充滿朝廷至宣和五年童貫王黼始開邊隙取九州之地結怨金人以啟靖康之禍嗚呼馴致於此豈一朝一夕哉初王黼童貫蔡攸之取燕山也識者知其必敗事及得燕山以蔡靖為大帥用降將郭藥師副之藥師毎偽出獵動逾旬日與金人通謀靖察其意而逆知其叛屢奏朝廷而李邦彦在位専以䝉蔽為事奏毎不答靖具章疏直達奏聞上覽奏驚召邦彦問之邦彦乃詭為之説曰此乃靖不肯久居邊任欲入朝耳上遂信而不疑及童貫領精兵數十萬取雲中而金人以兵入境邊奏繼至朝廷倉皇無䇿童貫遂棄所領兵遁歸宰相大臣皆相顧無語㑹上皇亦厭萬機有禪位之意𫝊位皇太子改元靖康正月金人至京師倉猝為偹議和退師驛召徐處仁至拜為宰相擢唐恪為中書人皆賀得人而可以撥亂獨給事中謝克家曰州郡失一良守朝廷得一憸人其後附㑹耿南仲而乖謬有不可言者靖康之初首居宰相而因循失措者呉敏與處仁也姦巧自營廢國隄防者唐恪聶昌也太學生自伏闕朝廷士大夫惡之上出五嶽觀御史臺官孫覿言於上曰諸生欲邀上大疑諸生作亂以兵防之繼而出到國子監前囬諸生無亂行者其疑遂觧初金人至朝廷日下求言詔及兵退則諱言反多責進諌者言路遂塞而士人知朝廷意亦不復上書時人為之語曰城門閉言路開城門開言路閉如選人李􅁢文上殿陳議慷慨多論列大臣不和且壊國事而耿南仲唐恪欲捃以他事又選人翁挺自召來即論列國事利害及考其殿最則大臣嫉其訐已雖差遣亦不與之豈有大臣喜怒如此之易見上日以邊事為念早晩自御便殿訓兵羣臣無有助之者如福建鎗仗手湖南弓弩手到闕上皆親按之李綱有表乞种師道從河北牽制敵勢上遣之屢矣既行而復止者亦屢矣九月間綱遣裴廪來奏事廪徒以寛言取爵禄不言邊事之急是時太原重困廪未及行而太原報到為敵陷矣朝廷自敵兵退議者謂今天子新即位必大振紀綱信賞必罰以革前日之弊而呉敏王時雍徐處仁耿南仲在朝上下相䝉所行事皆不合公議自是有識之士皆知必致禍金兵渡河守河兵數十萬皆棄甲而走是時羣臣多勸上出幸上不從堅意以死守社禝識者謂城雖可守而今無可守之人敵初到城下以為有偹京城難破遂依前索講和數日尼堪令人廵城約其步數有數百萬尼堪曰必易破城上人多多則易亂及破城自遣八壮士冐矢先登城上人果亂金人既得城遂於城上聚兵掘去裏踏道却於城外置踏道復立木植内及城陷守城兵士走入䕶駕及御兵逓相刼掠禁中金帛上倉惶奔走别殿忽遇越王遂觧龍章授王曰叔叔自做取我元道來我了不得亦不願做官家越王稱死罪安有此理上皇既至軍中亦抗言與敵辨論數其背約起兵敵遂無語及立異姓金人遂欲立司馬朴初朴至金人問其姓名朴云姓司馬氏敵云得非司馬相公之後乎朴曰乃朴之祖敵曰使司馬相公在朝我亦不敢至城下及欲立朴朴曰吾祖有大功徳於前朝朴不才誤䝉朝廷任使安可作此以累吾祖之徳朴有死而已遂立張邦昌尚書梅執禮侍郎程振陳知質中書舍人安扶以金銀不足殺於南門外又縳御史胡唐老胡舜陟等决脊百餘唐老遂死痛哉士大夫不以忠義死而寧以屈辱死是宗廟社稷之不幸而天地穢濁之氣預生妖人賊子老姦腐儒誤國如此間有忠直之士吐一直氣發一直言盡不得容跡於朝都人有識者無不同嗟也初上即位内外盡稱為少帝識者以為不祥果然上在軍中将行乃批手札與朝廷百官云某國家為公等誤一至於此使某父子不相見今已無可奈何公等無懐舊徳勉事新主聞者悲痛又批與開某庫錢可支出買金銀五百兩某父子􅌉纒開者垂涕初金人未至城下大臣以俚語誣云閏月河不凍時有李綱幕客紿何㮚曰閏月如六月天氣河不凍金人未必能渡朝廷措置事信邪妄詭怪之術大抵皆此類也朱勝非勝水閒居録曰金人既破契丹至燕地駐軍約本朝自取幽州於是童貫蔡攸為宣撫副使劉延慶為大将軍至盧溝距燕城一舍金相李偃約降延慶遣鋭兵同郭藥師先入蕭后并四軍大王者尚守宫城藥師既入城縱兵四掠無復紀律一夕四軍以殘兵擊王師奔亂而還盧溝大軍聞之亦潰金人遂攻燕城四面登堞填壕撅城為纒道徙樓櫓反臨城中湏索掠取人物俱盡乃還靖康初敵衆再犯闕既登城亦用此術朝廷不悟𫝊諭四方云金人登城按甲不動以為恩徳嗚呼予尚忍言之哉此事傳記兵書皆不載也丁特起孤臣泣血録拾遺曰靖康元年春金人退兵之後朝廷大臣無復經畫各執偏見自相矛盾已而羣奸恊謀力排李綱将兵四十萬俾觧太原之圍意以中綱殊不知所以中朝廷也五月种師中敗觧潜敗九月三日太原陷凡十五日上下相䝉一人猶未知太原京師屏翰也太原陷則王室如何外内無援可謂危矣諸公恬然不恤尚守和議有建遷都之議者執政曰方遣議和此非所急十一月二十五日敵兵至闕下廟堂始倉皇分遣五路使臣徴天下兵京師復被圍月餘援兵竟不至城遂陷罪誰與歸王雲外來只要三鎮税租限半月後到燕山仍要遣使三員分徃三鎮告諭從所請則便可解圍仍不得爽約王雲星馳二十六日入奏上悦顧問大臣皆不許之雲與呉敏素不平呉因以事責令知唐州雲猶抗論再三呉百端沮之竟不遣至九月再遣雲使太原已陷矣去年十一月立冬術者王浚明謂國家大忌丙午年冬三月一日於此借春致祭打牛一如立春朝廷從之聞者以為笑天時豈可借也城陷竟以冬月理或近似金人亦行夏時去嵗天㑹四年閏月而中國閏十一月天時一也蕃漢雖不同五嵗再閏差殊如此豈厯數有工拙疎宻耶自丙午年十一月二十五日金人到闕閏十一月二十五日大雪金人陷京師十二月二十五日大雪是夜大火燒開寳天寧寺及居民五百餘家丁未年正月二十五日極寒氣候與䧟城日正相若二月二十五日大風金人敲殺梅尚書等四人及捶臺官四人三月二十五日金人前軍啟行自金人入境圍城首尾半年去來皆取二十五日其餘二十五日悉有灾異不知其適然耶或隂陽度數使之然耶尼堪自謂用兵過孫呉二太子好佛言不殺人大抵金人紀律明士皆用命京城陷統制何慶彦陳克禮死於敵姚友仲死於兵劉延慶安國父子領班置長入祗候及西兵奪萬勝門萬餘衆􅋓出不念社禝安危父子世受國恩操履反愧於市人則忠臣義士不必相門将種也金人逐夜擊鼔報平安聲如雷云毎一鼓以過檛檛上仍係以毬或旦或暮其聲不常城破之後遶城種柏不知何意金兵去年屯牟駞崗敵去遂引汴水注崗使城外敵來不復營寨也渰浸八十村使敵至而决水猶有謂敵未至先决水百姓徒受害且使知避水計可謂拙城陷六日驛前所殺金使一乃劉監軍之子破城廢主之後發願洗城登門望城中有黄斾兵滿空中遂止主城者監軍與尼堪太子太子與上在軍金人征求萬端竭内帑至及乗輿嬪御未嘗動色唯索三舘上聼之喟然慨歎上初講和囬令太學諸生辛勤効死弗去既命舍人慰勞及議賞諸生感激流涕再幸軍中使人徃來猶加問諸生四壁守禦官吏以南壁言之都太守禦孫𫝊提舉李擢郭仲荀喬師都中統制王􅊛姚友仲統制髙持范瓊何彦陳克禮李湜石可寳其他遂急差人下統制領不下十數員一統制下使臣三五十員効用三五十人使臣日給八百至一千効用三百至五百率皆親戚門生故吏又權貴請求而至者身未嘗到而請給論功倍於戰士出戰第功隨親使臣并居優等用命當鋒者未必收録未嘗中傷者為重傷殁者申逃亡其弊殆不可言至其尤甚則統兵統率論功第賞雖子弟親戚在重湖數千里外者皆詭名誣奏例被賞京城陷没方携告剳遣子孫歸耀鄉閭自以為得計者比比皆是守禦之吏如此欲冀死守而城不陷可得耶悲夫呉興沈良靖康遺録曰宣和中謀取燕山上皇下其議鄭居中獨言燕薊久陷外蕃一旦得之恐難守况先朝與契丹有誓不宜輕舉宰相以為千載一時之機不可失童貫蔡攸欲開邊隙徼倖立功請議黼遂以契丹舊賂賂於金人權賃山前地十年于是下免夫之令諸路州縣隨民税産科敷足以與之郭藥師請降是時山前諸州悉為金人所掠國家所得空城而已藥師既降貫與之入朝召見禮遇良渥間入内賜宴賞賫不貲未幾請還燕山捍禦即授節度使藥師在燕山數有湏索使者徃來項背相望於道上皇悉從其請國家既得燕山其嵗賂金人與守禦賞賜不貲議者謂猶獲石田無所用也宣和八年金人乗勢盡破契丹而并其地諸小國黒水波利等國盡服屬焉悉有五國國相尼堪及二太子謀欲南下郭藥師叛降敵連兵入冦河北諸郡莫能禦者敵所過不殺戮惟粮食餉軍檄書有云體堯舜好生之徳興湯武問罪之師餘多不記十二月二十三日上皇禪位上登極大赦天下遣使如金講和敵已破中山遂引而南朝廷聞兵至遣太尉何灌内侍梁方平将五萬屯河上斷絶橋梁守要害敵至而河氷合遂濟河方平懼不敢戰單騎遁歸麾下兵皆潰散何灌度不能支亦收散卒退守汜水闗敵躡其後比至汜水灌兵又驚潰乃引其餘兵還至京師敵過汜水則鼓行而前府縣來報中外震動議以汴都之禍始於王黼童貫等士論皆然二十七日太學生陳東等七百餘人伏闕上書乞誅黼等以謝天下書聞人人稱快上自即位躬行節儉減膳素食詔求直言出宫女六十餘人各任所之又禁奢靡罷不急之費數日之間人情大悦蔡京自西京過京師上書請入朝覲云有計䇿上奏詔不許入城馳騎發遣金人再入京城閏月二十五日城陷三十日駕幸敵寨二月初六日夜半忽請上相見何㮚若水孫覿等皆從既見尼堪㮚等並立堦下火炬如晝尼堪令人宣偽詔何㮚若水皆伏地固請尼堪責以無信若水與相反覆詰難尼堪辭屈乃令拽去若水大罵至死而口聲乃絶尼堪與二太子藥師等相顧黙然㮚雖争而不敢罵乃笞之孫覿不争得免初七日遣人來取太上皇后太子親王帝姬後宫出城尼堪已得皇族出城復令𫝊薦舉䇿立見隨蕃軍南官傳等不敢薦乃請尼堪自擇所為當立者百官以次推立凡月餘日議立不决時邦昌以前年奉使到金國與尼堪俱來在軍中敵意欲立之至三月初十日尼堪出一榜文令在京文武百僚各薦邦昌仰至尚書省若有不至皆以軍法從事於是文武官多致仕不徃者十二日拜邦昌為帝居尚書省上皇出數日有手帖至開封尹徐秉哲云趙氏注孟子相度分付金人䇿立張邦昌䇿云無徳而王故天命假於我手當仁不讓知厯數在於爾躬餘皆不記初金人建立張邦昌遣人諭意張邦昌陽為涕泣跪伏不受及僣偽位即遣人迎孟氏入宫其䇿云尚念宋氏之初首崇兩宫之禮葢用太祖即位迎周太后入西宫故事議者以邦昌果有朱泚之意尼堪住罷根括金銀欲為邦昌結民故也孫𫝊既遣皇族遂為尼堪召至青城令見舊主上見謂曰㬠煩重相公㫁送我一門家眷𫝊無對而退初敵圍城放兵四掠東至淮西至濮兖南至陳蔡潁皆被其害陳蔡二州雖不被害屬縣焚燒畧盡泗淮之間蕩然矣京城之外墳壠悉遭掘出屍取其棺為馬槽殺人如割麻臭聞數百里以故數大疫死者過半自城破後物價大貴米升三百猪肉一斤六貫羊肉一斤八貫牛馬肉至二萬亦無得者街巷有病未絶者俄頃已被剔剥雜諸牛馬肉賣之菜蔬已盡唯取軟者㗖之至敵兵去盡乃稍平復三朝北盟㑹編卷九十六
