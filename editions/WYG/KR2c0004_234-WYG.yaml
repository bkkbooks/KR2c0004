body:
  text: 三朝北盟㑹編卷二百三十四宋徐夢莘撰炎興下帙起紹興三十一年十月八日丁未盡十六日乙卯劉錡與金人相持于淮陰劉錡自旴􅇇軍進兵留㳺奕軍統領員錡中軍統制劉汜于旴􅇇錡以乙巳到淮陰聞金人將自清河口放船入淮錡列諸軍于運河岸數十里不斷望之如錦繡丙午命淮陰鄉導夏彬以輕舟載二百人自淮河由小河口至大清河口逺探動息而願去者四百餘人錡止以二百人行回報自小清河口聞有人聲喧騰幾三十里又大清河口内亦有船上人聲不下數百隻錡厲聲叱之曰吾所聞不如此若不實盡該斬其衆有縮頭稍稍退去者彬獨進曰逺不過一晝夜如金人無動静願甘軍法如果然乞請犒賞錡然之丁未金人以鐵騎列于淮之北望之如銀錡方信彬所探為實一行人各轉兩資九日戊申樞密院契丹通好榜大宋三省樞密院紹興三十一年九月九日三省樞密院同奉聖㫖契丹與我為二百年兄弟之國頃縁奸臣誤國招致金人彼此皆被其毒朕既移蹕江南而遼亦逺居漠北相去萬里音信不通今天亡此衆使自送死朕提兵百萬收復中原惟爾大遼豪傑忠義之士亦協力乗勢宜殱厥渠魁報耶律之深讎將來事定通好如初各宜知悉又榜續措置招諭事件大宋三省樞密院紹興三十一年十月九日三省樞密院同奉聖㫖今續措置招諭事件如後渤海奚契丹諸國與我本朝初無讎隙止縁金人不道刼以兵威簽率從軍不能自脫今朕親行討伐為完顔亮一族倉卒之間恐難分彼此本榜到日如能束身來歸或擒殺帥首自効者除依格給賞外雖管軍節鉞朕亦不惜一金人與我中國雖為不共戴天之讎然念國人刼于兵威各為其主今完顔亮殺君殺母屠兄戮弟暴興工役殘虐生民自古及今無此凶逆爾等各有知識如見此榜文能翻然改悔束身來降者從前過愆一切不問仍優加爵賞右出榜曉諭各宜知悉金人攻廬州建康都統王權領軍遁走金人攻廬州在城官吏望風争遁時建康都統王權屯廬州當夜二更領本軍人馬出城十日己酉池州駐劄李顯忠奏正陽㨗報池州駐劄御前諸軍都統制李顯忠奏于十月初三日探事敵騎于安豐軍正陽對岸過淮與信軍巡綽探事將官曹髙陵等用箭相射至晚復過河去臣尋時分遣統制孔福常永壽劉彪等部押軍馬前去沿江東措置迎敵臣繼率軍馬䇿應據孔福申于十月初四日辰時以來將帶軍馬到安豐軍正陽西地名大人洲淮河岸上逢見敵騎萬户郭留韓將軍統押五千餘衆福等督率軍馬與賊血戰掩擊敵衆敗去其帥再遣生兵萬餘布列陣勢前來迎敵福等再鼔勇將士與敵鏖戰移時連併三陣其軍大敗當陣殺死及追趕掩入淮河不計數目出榜曉諭和均州武鉅奏招降到忠義人和均州武翼郎武鉅報㨗稱本州遣人招納到北界忠義歸朝人巡檢昝朝杜海等二萬餘人老小數萬殺到金人首級并捉到活人二百餘人汪澈奏舉知荆門軍姚岳轉官再任遺史曰姚岳字崧卿京兆人陜西陷沒岳避地入蜀途中得進士舉業時文一册讀之曰我平日習舉業實不及此遂珍藏之張俊失陜右欲收係陜右士大夫心紹興初解試令陜右流寓進士盡作合格及類省亦如此唯雜犯黜落一二人而已岳為榜首由是陜右流寓進士二十餘人皆過省岳飛為湖北京西宣撫使以身姓岳母姓姚一見姚岳大喜遂辟為屬官及飛被罪自謂非飛之客且乞改岳州州名士論鄙之累官知荆門州軍籍民兵置一色衣衫一等槍仗新鮮旗幟聚民兵在教塲習喏聲令齊一御史中丞汪澈宣諭荆襄到荆門軍岳令民兵迎接擺列于原野中澈見衣衫槍旗如法已喜俄聲喏齊一而不譁澈大喜乃具奏曰近自襄陽還諸道荆門軍自入境見田野漸闢上下安居百姓累累遮道不絶皆言知軍姚岳為政不擾並無追呼治道有術外户不閉他處人民襁褓而來願為編户荆門正控扼之境内以姚知軍為命或一日别有差除則來居之民必散强壯子弟必弛臣密加採聽誠如其言郡守中亦不易得有㫖姚岳特轉一官侯任滿令再任十一月庚戌淮東西軍馬文字不通劉錡在淮東王權在淮西流星遞文字日往來不斷庚戌淮西文字不通金人深入淮西也錡在淮陰就遣旴􅇇屯駐兵官員錡劉汜徃招信以體探至招信縣界聞金人扼路不可行而回遂徃淮陰合劉錡軍廬州安撫龔壽棄城走委修武郎添差本州駐泊兵馬都監楊春權州事金人攻廬州當夜四更安撫龔壽請都監楊春權州棄城遁走新淮南運判莫濛降一官放罷遺史曰莫濛字子䝉湖州人也試中刑法而實不知法意陽為長厚陰刻有五子父子更相稱譽人皆笑之嘗為全部郎中措置沙里蘆場於民不便降監當至是用為淮南運判避事逗留不赴省部勘㑹淮南判莫濛已降指揮令速起發之任専一隨王權軍應辦錢糧經今兩月未見申發到任月日顯是遷延有誤軍期有㫖特降一官放罷就除向汮淮南轉運判官填見闕仍轉示王權應辦錢糧十二日辛亥中使至劉錡軍中傳撫諭中使至劉錡軍中傳宣撫諭錡與之同臨淮岸觀淮北之敵騎中使震悚錡曰劉錡惟有死報國家耳中使曰上知制置忠義天下休戚委在制置更望上為宗廟社稷俯為生靈同率將士共濟事功金人陷滁州知軍事陸亷棄城走完顔亮之南侵也自淮西由廬州入和州路先令萬户蕭琦以騎十萬自壽春渡花靨鎮由定逺取滁州路占揚州琦至藕塘駐軍數日漸侵曲亭瓦店先以百餘騎直趨清流關復回翌日又以數百騎再趨清流關亦復回又翌日遂長驅入清流關直抵滁州知州陸亷棄城遁去金人所過不殺人不放火不擄掠財或見州縣人則以好語相謂曰大金皇帝行仁徳不須懼怕今給汝公據可以互相說諭各安業在水口鎮之西有金人遺火燒民居草舍一間立斬之仍揭榜以令改過初轉運副使楊抗令州縣鄉村臨驛路十里一烽火臺積下草數千束又令村堡居民各置長槍里正里長催督嚴切人甚苦之至是金人入滁州界方以無馬草為窘急而十里間得草數千又村人皆棄槍而去金人入境乃盡取村人所棄者自是人皆謂楊抗與金人有密約真奸細耳雖甚辨者亦不敢以為非是十三日壬子御營前軍統制李捧往江上捍禦朝辭四川宣撫使吳璘收復秦州吳璘遣統領官劉海等領兵掩殺敵衆退走入城尋分布官兵自九月二十五日申時攻打至二更以來打破秦州除撫存軍民外捉到金兵活人金人蕭安撫髙同知千户明威將軍旺信王主簿趙通事李淮提劉天使及捉到金兵活人斫到首級奪到戰馬器甲莫知其數吳璘報至上曰金人無故敗盟四路出師朕之應兵良不得已今日之㨗雖由祖宗徳澤然亦天人信順之助可使吳璘存撫四民令各安業以慰壺漿向化之意内為金國僉起從軍之人務在優䘏其家毋令重擾一應非理徭役虐用刑戮等事一切除去宰相陳康伯等奏曰神州陷沒三十餘年今日一方之人喜見漢官威儀上曰何止是完顔家兵即是吾民脫去湯火如解倒垂此皆卿等指蹤之效康伯奏曰臣等何功之有皆仗陛下弔伐威靈中原傳檄而下自此始矣湖北京西制置使成閔申據知襄陽府郝晸申據權知光化軍張超申九月二十七日辰時有金人全装軍馬約五千餘騎直入軍衙遂部統官兵七百人于本軍上水門北開城裏外與金人血戰鬭敵前後共六陣至酉時殺敗北界軍馬退回奪到衣甲器械及斫到番人首級保䕶軍城百姓百官員無虞委是勝㨗清逺軍節度使龍神衞四廂都指揮使建康府駐剳御前諸軍都統制王權奏臣統率諸軍自壽春縣界首金帥重兵連日攻打及經大戰殺死甚衆大軍至和州城下臣分布諸軍人馬披城擺陣與敵相拒臣召募敢死二千餘人令統領官王宗楊宣分頭管押軍刼金寨即時發行良久先刼中金軍大寨相射厮殺間其第二寨不知其數委是大獲勝㨗劉錡退軍備江劉錡在淮陰與金人隔淮相持用舟載甲士以弓弩相射已數日壬子自清江口有一小舟順流而下錡使人邀取之有粟米數布袋有驢一頭錡曰此探水勢者也俄頃金人各抱草一束作馬頭過舟舟約有五百餘艘皆自清河口出有載糧食往濠州者有載激犒之物取楚州之維揚者上水牽挽甚速錡與諸軍方視之忽承金字牌報淮西敵勢甚盛令錡退軍備江淮南路轉運副使楊抗遁走至江陰遺史曰楊抗字抑之貪沓詭激之人也敢大言喜輕易談兵聚民作水寨自期必成大功以胡深為都統領抗隨劉錡軍于淮陰見清河口與金人相持抗言欲自守水寨且催錢糧應副大軍遂棄其軍而去遁走渡江止于江陰軍十五日甲寅劉錡發兵渡淮與金人戰劉錡屡遣兵或三二百或五百渡淮與金人戰金人退郤官軍得小勝而回錡不發船渡既金人悉衆來戰錡亦不遣援兵節次戰殺者十餘人至是又發千人往皆持刀斧渡淮北與金人鏖戰或進或郤以退無歸路死者十七八金人攻襄陽府樊城吳拱新交鄂州都統制職事乃戍于襄陽府襄陽顒望拱至及拱見襄陽無戰守具乃欲退入萬山山寨或襄陽失守則入川而諸軍皆詾詾不定朝廷令拱遣兵防䕶武昌一帶津渡拱聞命即引兵回鄂已退軍矣湖北京西宣諭使汪澈聞之馳書責拱俾亟回襄陽而自發鄂之餘兵悉戰艦張聲勢進戍黄州拱復還襄陽悔其不得還武昌常褊躁不自安憩泊猶未定是日金人數百騎忽至樊城欲奪浮橋徑至城下方繫浮橋未畢金人不得渡拱乃登城漸出禦之安撫使郝晸方見客罷入宅堂矣有虞侯者登其堂厲聲呼曰番人已到城下安撫且出來晸聞之遂登城轉達判官姚劭亦登城時城中諸軍隊儹伍者已甚諠不可整又士庻奔馳于市者如沸羮相次漸出兵渡江至樊城下與金人相遇金人少郤官兵稍進金人三郤至竹林下鐵騎突出官兵遂敗死者在樊城而金人亦退士庻驚惶者方息是役也以大獲勝㨗聞軍中謂之樊城功賞統制官張平在襄陽未嘗出城亦以竒功就武翼大夫上轉中衞大夫樊城守將翟貴王進戰沒統制張訓通殺獲相當吳拱守襄陽除招討使兼鄂州都統制左軍統制郝晸帥襄陽代吳拱兵荆南都統制李道運使姚劭缺金帥劉萼部領番漢兵號一十五萬來攻荆襄先取光化十月十四日夜牛首鎮莊家詣襄陽報見有二渠帥其一著柿黄其一著白領兵來領中王總管宣屯兵西門外三人來報者縋索登城傳報招討招討疑其尚留光化不設備次日敵騎三千攻樊城仍奪樊城浮橋自講好後樊城不修築多摧缺浮橋未成先是戍樊城者一二百副將翟貴部將王進統之以䕶浮橋統制張訓通騎兵遇敵焚長店合戰别遣兵取樊城直抵浮橋翟貴王進領兵出戰我師敗二將沒士卒半掩入江中吳招討以四船渡師風甚不能到岸至晚敵騎退張訓通騎卒殺獲相當十六日乙卯劉錡自淮陰退軍劉錡既承金字牌令退軍備江又聞淮西王權之軍棄廬州文移不通且金人在淮西相持其勢益盛壬子發傳宣撫問中使回乙卯㑹諸軍自楚州寳應退軍淮甸之民初恃錡以安及聞錡退皆倉卒流離于道路錡單馬雜行于其間乃諭之曰我劉制置也百姓當無慮不用驚憂民至愚又以為然遂徐徐其行故死于路者十六七勸諭民助軍户部状伏覩國家多事軍旅方興主上既出内帑以賞軍輔臣又辭大賜以節費經常有限用度浩瀚凡在臣民孰不興念古人所謂智者獻謀勇者効力今是時也唯是富人巨室久擅髙貲豈不能懷忠抱義有助國家者倘朝廷有以激昂則用度可以無乏欲望朝廷明降指揮若有肯損家貲以自獻者州縣受納隨便犒軍以其數上聞朝廷當因其多寡而等第推恩則上無横歛之名下有効忠之實公私皆便以為可用若曰拱手坐視漠然無意其亦何顔必有議之者矣奉聖㫖令户部行下諸路州縣出榜曉諭如首先獻納人保明取㫖優異推恩三朝北盟㑹編卷二百三十四
