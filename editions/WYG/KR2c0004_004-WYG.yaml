body:
  text: 三朝北盟㑹編卷四宋徐夢莘撰政宣上帙起宣和元年三月十八日甲子盡宣和三年正月三月丁未朔是日改元宣和宣和元年三月十八日甲子差歸朝官朝議大夫直秘閣趙有開忠翊郎王瓌充使女真賫詔書禮物與李善慶等渡海聘之先是歸朝官趙良嗣趙有開議報女真儀良嗣欲以國書用信禮有開曰女真之長止節度使世受契丹封爵常慕中朝不得入聘何必過為尊崇止用詔書足矣問善慶何如善慶曰二者皆可用惟朝廷擇之於是從有開與善慶等至登州未行有開死㑹河北奏得諜者言契丹已割遼東地封女真為東懷國王且妄言女真嘗祈契丹修好詐以其表聞於是罷使人之行止差呼延慶等用登州牒遣李善慶等歸六月三日戊寅呼延慶至女真軍前為女真所留呼延慶至金人軍前其國主與尼堪等責以中輟具言登州移文行牒之非呼延慶答云本朝知貴朝與契丹通好又以使人至登州縁疾告終即延慶與貴朝使人同議欲得早到軍前使人既死遂權令登州作移文賫走前來使人與書不來自有此故若貴朝不與契丹通好即朝廷定别有使人共議切望明察言之不聽遂拘留呼延慶十二月二十五日丁酉女真遣呼延慶回呼延慶既被留數見國主執其前說再三辨論紛挐累日而國主與尼堪烏舎議論復遣呼延慶歸臨行語云跨海求好非吾家本心共議夾攻匪我求爾家爾家再三瀆吾家吾家立國已獲大遼數郡其他州郡可以俯捨所遣使人報聘者欲交結隣國不敢拒命暨聞使回不以書示而以詔詔我已非其宜使人雖卒自合復差使人止令使臣前來議事尤非其禮足見中輟本欲留汝念過在爾朝非卿罪也如見皇帝若果欲結好同共滅遼請早示國書若依舊用詔定難從也且大遼前日遣使人來欲册吾為東懷國者葢本朝未受爾家禮之前常遣使人入大遼令册吾為帝取其鹵簿使命未歸爾家方通好後既諾汝家而遼國使人册吾為至聖至明皇帝當時吾怒其禮儀不全又念與汝家已結夾攻遂鞭其來使不受法駕乃本國守爾家之約不謂貴朝如此見侮卿可速歸為我言其所以國主遂起翌日呼延慶辭歸持其書來云契丹講好不成請復别遣人通好二十六日戊戍呼延慶離女真軍前宣和二年二月二十六日丁酉呼延慶回到京師是日入朝奏言女真所言之事賫到女真文字報與遣使大遼講好不成已起兵攻上京王師中遣其子瓌同呼延慶赴闕見童貫議事三月六日丙午詔中奉大夫右文殿修撰趙良嗣由登州往使忠訓郎王瓌副之議夾攻契丹求燕地歳幣等是時童貫受宻㫖借依外勢以謀復燕詔趙良嗣王瓌充使副由登州以往用祖宗故事以買馬為名因約夾攻契丹取燕雲故地靣約不賫書唯付以御筆趙良嗣燕雲奉使録曰宣和二年春二月詔遣中奉大夫右文殿修撰趙良嗣假朝奉大夫由登州泛海使女真忠訓郎王瓌副之以訃議依祖宗朝故事買馬為名因議約夾攻契丹取燕薊雲朔等舊漢州復歸於朝廷元奉宻㫖令靣議别不曽賫文字前去三月二十六日自登州泛海由小謝駞基末島棊子灘東城㑹口皮囤島四月十四日抵蘇州關下㑹女真已出師分三路趍上京良嗣自咸州㑹於青牛山諭令相隨㸔攻上京城破遂與阿固達相見於龍岡致議約之意大抵以燕京一帶本是舊漢地欲相約夾攻契丹使女真取中京本朝取燕京一帶阿固達令譯者言云契丹無道我已殺敗應係契丹州域全是我家田地為感南朝皇帝好意及燕京本是漢地特許燕雲與南朝候三四日便引兵去良嗣對契丹無道運盡數窮南北夾攻不亡何待貴國兵馬去西京甚好自今日議約既定只是不可與契丹議講和阿固達云自家既已通好契丹甚閑事怎生和得便來乞和湏說與已共南朝約定與了燕京除將燕京與南朝可以和也良嗣對今日說約既定雖未設盟誓天地鬼神實皆照臨不可改也食罷約入上京㸔契丹大内居室相與上馬並轡由西偏門入並乗馬過五鑾宣政等殿遂置酒於延和樓良嗣有詩云建國舊碑朝日暗興王故地野風乾回頭笑謂王公子騎馬隨軍上五鑾遂議歳賜良嗣許三十萬却云契丹時燕京不屬南朝猶自與五十萬如今與了燕京如何只三十萬辨論乆之卒許契丹舊數良嗣問阿固達燕京一帶舊漢地漢州則并西京是也阿固達云西京地本不要止為去拿阿古須索一到阿古天祚小字若拿了阿古也待與南朝又言平營本燕京地自是屬燕京地分髙慶裔云今所議者燕地也平灤自别是一路阿固達云言約已定更不可改本國兵馬已定八月九日到西京使副到南朝便敎起兵相應輙歸且言縁在軍上不及遣使前去止以事目一紙付良嗣回約女真兵自平州松林趍古北口南朝兵自雄州趍白溝夾攻不可違約不如約則難依已許之約以二百騎䕶送東歸過鐵州遣人走馬追及别有事商量請使副回相見良嗣回至女真所居阿穆呼阿固達具言本約到西京以兵相應却為女疫死且回候來年約日同舉為恐失信請使副回見楊朴諭云郎君們意思不肯將平州畫斷作燕京地分此髙慶裔所見如此須着箇方便後來與尼堪議事諭以兩朝議約既定務在明白庶免異時計較尼堪問有㡬事對以將來舉軍之後南兵不得過松亭古北榆關之北免致兩軍相見不測紛爭此最大事一也其地界至臨時可以理㑹且先以古北松亭及平州榆關為界此其二也要約之後不可與契丹講和此其三也西京管下為恐妨收捉阿古道路所有蔚應朔三州最近於南界將來舉兵欲先取此三州其餘西京歸化奉聖等州候拿了阿古回日然後交割四也兩國方以義理通好將來本朝取了燕京却要係官錢物此無義理可便除去五也事定之後當於榆關之東置𣙜塲六也榆關在平州之東臣屢以榆關為言者葢欲包平州在内也尼堪云所言都好但蔚應州亦恐阿古走去彼處候我家兵馬到日來商量所要係官財物曽思量來也係不是便待除去尼堪烏舎云我皇帝從上京到了必不與契丹講和昨來再過上京把契丹墓墳宫室廟像一齊燒了圖敎契丹斷了通和底公事而今契丹更有甚靣目來和也千萬必不通和只是使副到南朝奏知皇帝不要似前畨一般中間裡斷絶了我亦曽聽得數年前童貫將兵到邊却恁空回對以此探報傳言之誤若是實曽領兵上邊只恁休得郎君亦莫輕信尼堪大喜云兩家都如此則甚好若要信道將來必不與契丹通和待於回去底國書内寫着打毬射柳及所在宴飲必召同集及令上京俘獲契丹吳王妃作舞獻酒妃初已配吳王既而延禧私納之又與其下犯法故幽囚上京且言此是契丹男婦媳且敎與自家勸酒要見自家兩國歡好阿固達與良嗣把手酬酢曰契丹㬠大國土被殺敗我如今㬠是大皇帝昨來契丹要通和只為不着兄字以至領兵討伐自家南朝是大帝齊生底國主皇帝有道有徳將來只恁地好相待通好更不爭要做兄弟這箇事是天敎做不恁地後怎生隔着箇恁大海便往來得我從生來不㑹說脫空今日既將燕京許與南朝便如我自取得亦與南朝於是差使副以攻破上京俘獲䀋鐵使蘓壽吉來獻其意以謂既以燕地割𨽻中朝以壽吉本燕人故獻之仍以質留劉亮等六人及因風吹逐刀漁船於立等兵級二十人并交付良嗣還朝七月十八日丙辰金人差女真實喇實魯充回使渤海髙隨大廸烏副之持國書來許燕地金人國書七月日大金皇帝謹致書於大宋皇帝闕下隔于素昧未相致於禮容酌以權宜在交馳於使傳期計成於大事盍備露於信華昨因契丹皇帝重遭敗衂竟是奔飛京邑立收人民坐獲告和備禮册上為兄理有未宜斥令更飾不自惟度尚有誇淹致親領甲兵恭行順伐途次有差到朝奉大夫趙良嗣忠訓郎王瓌等奏言奉御筆據燕京并所管州城原是漢地若許復舊將自來與契丹銀絹轉交可往計議雖無國信諒不妄言已許上件所謀燕地并所管漢民外據諸色及當朝舉兵之後背散到彼處餘人户不在許數至如契丹䖍誠請和聽命無違必不允應若是將來舉軍貴朝不為夾攻不能依得已許為定從於上京已曽遣回轉赴燕路復為敵人逺背孳畜多疲已還士馬再命使人用報前由即日據捉到上京䀋鉄使蘓壽吉留守同知王民傚推官趙拱等俱貫燕城内摘蘓壽吉先行付去請發國書備言銀絹依准與契丹數目歳交仍置𣙜塲及取前人家屬并餘二員即當依應具形别幅冀亮遐悰令屬秋初善綏多福亦有少禮物具諸别録今差貝勒實喇實魯充使大迪烏髙隨充副同回前去專奉書披陳不宣謹白九月四日壬寅趙良嗣引實魯等入國門錫宴於顯靜寺衛尉少卿董耘押筵舘於同文舘七日乙巳止作新羅人使引見入見於崇政殿上臨軒引實魯等捧國書以進見訖而退八日丙午錫宴於童貫府第是日諭實魯等今來所約惟是貴國兵馬早到西京最為大事實魯等對以如一切約定本國兵馬必不失信又詔引實魯等以下三節人從往相國寺及龍徳太乙宫燒香十八日丙辰實魯等入辭於崇政殿如朝見之儀二十日戊午實魯等出國門錫宴於顯靜寺良嗣押筵王瓌充送伴差登州兵馬鈐轄武義大夫馬政持國書及事目隨實魯等前去報聘約期夾攻求山後地許歳幣等事左僕射王黼共議回答國書信再差馬政隨實魯過海仍求割還山後雲中府地土差承節郎京西北路武學敎諭馬擴隨父行朝廷國書九月日大宋皇帝謹致書於大金皇帝闕下逺承信介特示函書具聆啟處之詳殊副瞻懐之素契丹逆天賊義干紀亂常肆害忠良恣為暴虐知夙嚴於軍旅用綏集於人民致罰有辭逖聞為慰今者確示同心之好共圖問罪之師念彼羣黎舊為赤子既乆淪於塗炭思永靜於方陲誠意不渝義當如約已差太傅知樞宻院事童貫領兵相應使回請示舉軍的日以憑進兵夾攻所有五代以後所陷幽薊等州舊漢地及漢民并居庸古北松亭榆關已議收復所有兵馬彼此不得侵越過關外據諸色及貴朝舉兵之後背散到彼餘處人戸不在收復之數銀絹依與契丹數目歳交仍置𣙜塲計議之後契丹請和聽命各無允從蘓壽吉家屬并餘二員請依應津遣候當秋杪益介熙純今差武顯大夫文州團練使馬政同差來使副還朝外有少禮物具諸别幅專奉書陳謝不宣謹白事目樞宻院奉聖㫖已差馬政同來使賫國書往大金國所有到日合行理㑹議約事節若不具録慮彼無别據憑今開列如後一昨來趙良嗣等到上京計議燕京一帶以來州城自是包括西京在内靣奉大金皇帝指揮言我本不要西京只為就彼拿阿古去且留着候將來拿了阿古都與南朝趙良嗣等又言欲先取蔚應朔三州却言候再來理㑹今來國書内所言五代以後所陷幽薊等州舊漢地及漢民即是薊涿易檀順營平并山後雲寰應朔蔚媯儒新武皆係舊漢地也内雲州改為西京新城改為奉聖武州改為歸州除山前已定外其西京歸化奉聖媯儒等州恐妨大金兵馬夾攻來路當朝未去收復其蔚應朔三州正係两朝出兵夾攻之處今議先次收復其西京歸化奉聖媯儒等州候將來大金國兵馬回歸之後當朝收復一今來國書内已許盡舊日所與契丹五十萬銀絹之數本為五代以後所陷幽薊一帶舊漢地及漢民所以言幽薊一帶便和西京在内若不如此則怎生肯與許多銀絹一今來所約應期夾攻最為大事須是大金兵馬到西京大宋兵馬便自燕京并應朔州入去也如此則方是夾攻則應得今來相約也若將來大金兵馬不到西京便是失約即不能依得今來已定文字也且是早到西京以應夾攻其馬政回於國書内分明示及舉軍的確到西京月日貴憑相應右劄付馬政候到日即據上件語言事件一一開說如未信憑即出此聖㫖文字并逐節照㑹相約不管漏落仍取的確回書庶早回歸准此繳申無致留滯者十一月二十九日丙寅馬政至女真以國書授之及出事目示之阿固達不認西京所許之語且言平灤營三州不係燕京所管政不知元傳言之詳及平州元係燕地但對以唯唯遂留其帳前月餘議論不决金人以朝廷欲全還山前山後故地故民意皆疑吝以為南朝無兵武之備止以已與契丹銀絹坐邀漢地且北朝所以雄盛過古者縁得燕地漢人也今一旦割還南朝不惟國勢微削兼退守五關之北以臨制南方坐受其弊若我將來滅契丹盡有其地則南朝何敢不奉我幣帛不厚我歡盟設若我欲南拓土疆彼以何力拒我又何必跨海講好在我俟平契丹仍據燕地與宋為隣至時以兵壓境更展提封有何不可徐議未遲惟尼雅滿云南朝四靣被邊若無兵力安能立國强大如此未可輕之當且良圖少留人使不妨阿固達遂將馬擴隨行射獵馬廉訪茆齋自叙曰阿固達一日集衆部將出荒漠打圍射獵尼堪與某並轡令譯者相謂曰我聞南朝人止㑹文章不㑹武藝果如何某答以南朝大國文武常分兩階然而武有兼深文墨文有精曉兵務者初不一槩言也尼堪云聞敎諭兵書及第莫㬠㑹弓馬否某答以武舉進士取在義策弓矢特其挾色耳尼堪遂取已所佩弓授某云且煩走馬開弓願得畧見南人射弓手叚某遂策馬挽弓作射物狀尼堪􅌓然馬行積雪中雖晴日不消至晩阿固達召某云聞南使㑹開弓來日隨我射一物如何僕答以武舉射生非所長容試射之恐或有得翼日阿固達設一虎皮坐雪上授僕弓矢各一其弓以皮為絃指一雪積使某射之再中其端阿固達笑曰射得㬠好南朝射者盡若是乎僕答以措大弓箭軟弱不堪如在京則有子弟所長入祗候諸班直天下禁軍諸路大事藝人及沿邊敢勇效弓箭手保甲彼乃武藝精壯之人如某特其小小者耳良乆阿固達上馬領大迪烏授某弓一射生箭一約云有獸起即射之行二里許一黄麞躍起阿固達傳令云諸將未許射令南使先射某躍馬馳逐引弓一發殪之自阿固達而下皆稱善是晚尼堪言見皇帝說射得㬠好南使射中我心上快活次日還舘大迪烏見先君語甚喜次日阿固達遣其弟碩哈郎君賫貂裘錦􅂁犀帶等七件云南使能馳射皇帝賜尼堪父薩哈勒相公者云南使射生得中名聽甚逺可立一顯名今後喚作伊埒瑪勒譯云善射之人也某隨打圍自拉林河阿固達所居指北帶東行約五百餘里皆平坦草莽絶少居民每三五里之間有一二族帳每帳族不過三五十家自過咸州至混同江以北不種榖麥所種止稗子舂粮旋炊硬飯遇阿固達聚諸將共食則於炕上用矮擡子或木盤相接人置稗飯一盌加匕其上列以虀韭野蒜長𤓰皆䀋漬者别以木楪盛猪羊雞鹿獐􅝤狐狸牛驢犬馬鵞鴈魚鴨蝦䗫等肉或燔或烹或生臠多以芥蒜汁漬沃續供列各取佩刀臠切薦飯食罷方以薄酒傳杯冷飲謂之御宴者亦如此自過嬪辰州東京以北絶少羊麵每晨及夕各以射到禽獸薦飯食畢上馬每旦阿固達於積雪上以草薦一虎皮背風而坐前燎草木率諸將至各取所佩箭一隻擲占逺近各隨所占左右上馬放圍軍馬單行每騎相去五七步接續不絶兩頭相望常及一二十里候放圍盡阿固達上馬去後隊一二里立認旗行兩翼騎兵視旗進趨凡野獸自内赴外者四圍得迎射自外赴内者須主將先射凡圍如箕掌徐進約三四十里近可宿之處即兩稍合圍漸促須臾作二三十匝野獸迸走或射或擊盡斃之阿固達復設皮坐撒火炙啗或生臠飲酒一兩杯騎散止宿阿固達嘗言我國中最樂無如打圍其行軍布陣大槩出此出獵既還乃令諸郎君家各具酒餚請南使赴宴次日始造國書元日隔夕令具車仗召臨晨出舘赴帳前近行五里阿固達與其妻大夫人者於炕上設金裝交椅二副並坐阿固達二妻皆稱夫人次者摳衣親上食物以名馬弓矢劍槊為獻且曰臣下有邪諂姦佞不忠不孝者願皇帝代上天以此劍此弓誅殺之各跪上壽杯國主酬酌之次令南使上壽杯於國主及夫人飲畢阿固達親逓二盃酧南使阿固達云我家自上祖相傳止有如此風俗不㑹奢飾祗得這箇屋子冬暖夏凉更不别修宫殿勞費百姓也南使勿笑然當時已將上京掠到大遼樂工列於屋外奏曲薦觴彼左右親近郎君軰玩狎悅樂獨阿固達不以為意殊如不聞宴畢令南使往尼堪家議事畢遣使隨馬政來宣和三年正月金人差赫嚕大廸烏充使副持書來議夾攻金人國書正月大金皇帝致書於大宋皇帝闕下適紆使傳遥示音華載詳别屬之辭備行書外之意事須審而後度禮當具以先聞昨者趙良嗣等回許與燕京并所管州鎮書載若不夾攻難應已許今若更要西京只請就便計度收取如難果意冀為報示有此所由未言舉動的期所有關封决當事後春令在始善祝多祺今差貝勒赫嚕大廸烏充國信使副外有少禮物具諸别録專奉書不宣謹白三朝北盟㑹編卷四
