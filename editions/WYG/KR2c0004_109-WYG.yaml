body:
  text: 三朝北盟㑹編卷一百九宋徐夢莘撰炎興下帙起建炎元年六月二十五日癸未盡七月四日壬辰紹興八年勅送到右宣義郎守尚書兵部員外郎吕用中状伏念先父好問昨於靖康元年十一月初金人圍城之際方除兵部尚書即值國家禍變二聖出幸金營先父投檄致仕時孫樞宻傳謂先父曰尚書怕死耶𫝊以致政留守當死軍前公世受國恩湏承當興復之責張叔夜在傍謂先父曰尚書若不怕死何不了此事叔夜則湏去軍前效死也先父不得已而許之繼聞金人欲為偽張邦昌先父本欲閉門不出衆皆責以不出何補不若勉强一出以患禍動之先父至省中以禍福喻邦昌勸一面令迎康王及請元祐皇帝權聴政事又勸郤回金人所欲留兵以明逆順是時城外消息斷絶於是罄竭家資加以假貸隂募李進冐犯重圍賫帛書往河北求訪問今上皇帝所在李進屢遭金人捶打幸無敗露至開徳府知州王棣考其事迹因以實告棣大驚即差人伴送至大元帥府投下其後金人欲退先父痛念二聖鑾輿不返又差人詣大元帥府勸進此皆上下之所共知豈敢少有詐誕以欺罔天下也先父當時又於大雪中夜間宻遣子弟隂與孟郡王忠厚相約請昭慈聖獻皇后入禁中正母后之位以安宗社金人方退先父即以兵部吕尚書帖子召百官入内以邦昌手書請昭慈聖献皇后聴政大事遂定主上既登寳位先父即至南京主上嘉其忠義艱難首擢尚書右丞遭言詆訾主上灼見底藴出親剳付尚書省其間有吕好問昨邦昌僣號之初即募人賫帛書具道京城内外之事金人甫退又遣人勸進臣僚所不知之語此可騐乎當時金人據城失守城外敵騎連數十州殺人蔽野城中敵人被殺者甚衆而先父遣人賫帛書犯重圍而出若使少敗露則必盡遭屠戮與夫自經溝瀆身享美名子孫獲厚禄校量利害孰重孰輕何必區區遣人犯圍自為殺身㓕族之禍也先父向若金人退後方遣人賫帛書旋謀入請昭慈聖献皇后則豈敢逃天下之責盖縁十餘年來未有為先父發明此事者故士大夫亦不知本末使先父時遭謗議乆不𫉬伸用中今者窃觀臣僚章疏尚以先父為言則是先父事迹終未辨明人子之義不可强顔立朝不可嘿嘿而去用中已於十一月一日以後在假更不敢赴部供職伏望特賜敷奏如用中所言稍涉虚誕即乞将用中重行斥責或先父事迹有實亦望朝廷暴白先父効勞仍乞陶鑄用中乞在宫觀差遣候指揮十一月十六日奉聖㫖用中所陳録送史舘所乞宫觀不􅁢二十七日乙酉折彦質散官安置錢盖落職分司許髙許亢編管臣僚章疏論靖康末折彦質為宣撫副使逃入川陜錢盖為陜西五路制置使逃至湖北許髙許亢總兵防河逃至江南不懲戒則後孰肯任責者有㫖彦質責授散官昌化軍安置錢盖落職降授朝奉郎分司髙亢編管海外軍錢盖落職吿詞曰盖縁推擇多所踐更付之五路之師處以三秦之地方都邑受圍之日乃藩維奔命之時所兾投機庻能弭蔽豈有望風而先潰専圖擁衆以自營仍縱叛亡肆為攘奪朕方念吾民之死禍汝猶採敵説以誑朝廷雖示小懲未厭公論其鎸延閣之秩往陪祠宮之閒尚服寛恩無重後悔錢盖降官告詞曰朕建邦置守綏靖一方實維尚謀經武之時非有蒐兵伐罪之事夏童弗率怙衆擾邉疆塲多虞責在将帥具官某薦更任使擢寘近班屬三陲内侮之初付五路折衝之寄當思戮力報稱所䝉邉遽上聞卒敗吾事原情定罪實當嚴誅稍屈刑章止從降出益圖來效思補厥愆宗澤除延康殿學士知開封府東京留守杜充除顯謨閣待制知大名府兼北京留守錢盖復官依舊陜西經制使初盖在靖康時常建議河外湟鄯之北於朝廷無毫髪利而嵗費不貲為中興患不若求青唐之後而立之使撫有舊部以為藩臣有益麻黨征者故王之子為國信服倘封立之必得其力至是朝廷再欲䇿益麻黨征復盖職名依舊為陜西經制使賫告賜益麻黨征措置湟事因調發五路軍馬發赴行在故有是命二十八日丙戊李綱進剳子乞募兵買馬募民出財以助兵費募兵剳子大畧謂國家以兵為重方熙豐之時内外禁旅单弱何以捍强敵而鎮四方為今之計莫若取財於東南募兵於西北方河北之人為金人搔擾未有所歸之期而闗陜京東西流為盗賊强壮不能還業者甚衆比遣使四路擾給例物以招募之新其軍號勒以部伍得十數萬人付之将帥以時教閲訓諌不年嵗間皆成精兵於要害州郡别置營房屯戍使之更蕃入衛行在此最今日之急務也買馬剳子大畧謂金人專以鐵騎取勝而中國馬政不修騎兵鮮少乃以歩軍當其馳突宜乎潰散盖祖宗朝飬馬於監牧孳生蕃盛所在雲布故軍旅之用足至崇觀間監牧廢而為假地牧馬有名而無實其後燕山䧟沒馬之入於敵國者不可勝數金人初至闕河北京畿為之一空後破都城下令括馬京師之馬入於敵者萬有餘疋今行在騎兵不多獨陜西京東西諸路尚有私馬宜降指揮立格式以善價買之可以濟一時之乏民間飬馬必皆上戸僧道命官之家中下戸自無馬可飬取之既不厲民而旬月間馬遂可集此今日不得已之務也募民出財剳子大畧謂國家新罹患難京師帑蔵悉為金人所取外路州郡以發調勤王之師財用為之一空今又募兵買馬招捉盗賊措置邉事應副殘破州縣振舉百度以圖中興非常賦之所能供辨又不免横賦科取於民如免夫錢天下至今咨怨惟上二等物力有餘之家可以勸誘使斥其嬴餘以佐國用而以官告度牒之類償之使朝廷軍馬精强措置邉事就緒盗賊寧息彼乃得保其財産不然雖欲保家室不可得况財産哉命州縣委曲諭以徳意必有樂輸從命者此又今日不得已之務也得㫖於陜西河北路募兵各三萬人京東西路募兵各二萬人合兵為十萬許召募白身及於諸色廂軍中㨂選或招收潰散兵卒中改刺創置軍號驍勝壮健忠勇義成龍武虎威折衝果毅定難靖邉凡十萬每號四軍每軍二千五百人例物白身人全給依上禁軍法餘給半許用諸路門諸額禁軍錢常平司錢不足是朝廷應副内外東西委兩路提刑司河北委招撫司陜西委經制司召募及一軍本路差有材武大小使臣充将官部隊将管押赴行在聴候差使又命買馬分為三等格式以定價直除命将官校見飬馬不許括買外餘並籍記赴官㨂選及格式中披帶者即時許還價值毎及百疋差官或将校一員管押赴行在隐寄妄冐有馬不籍及無馬而抑勒令置買者並科違制之罪委逐路提刑司總之又降詔曉諭州縣勸誘能出財助國者籍記姓名多寡申朝廷給降度牒償之入財多者取㫖推恩應勸誘到錢物並别項樁管聴候指揮専充募兵買馬縁邉事之用有敢科配搔擾者命官竄責吏人決配凡募兵買馬勸民出財奉行有叙並保明推賞又議控禦之䇿大畧謂唐之方鎮當時實頼其力以定禍難第措置失宜而其後行姑息之政威柄寖移乃有尾大不掉之患祖宗革去前弊削弱藩鎮州郡之權一切委以文吏非沿邉諸路雖藩府亦屯兵不多無敢越法行事以處太平無事之時可也一旦强敵長驅盗賊蠭起州郡莫有能抗之者遂至於手足不足以捍頭目為今之計莫若稍倣方鎮之制擇人任之假以權柄减上供錢榖之數使飬兵而訓練之大小相維逺近相援庻㡬可以救今日之患夫方鎮者節度使之兵也其次有觀察團練防禦今既以為階官不可復改宜於沿河沿淮江諸路置帥府要郡要郡使帶總管鈐轄都監以寓方鎮之法許其便宜行事辟置僚屬将佐以治兵不數年間必有可觀今日控禦之䇿無大於此僉謂帥府要郡之制可行但未知方鎮割𨽻州郡得㫖京東東西路京西南北路河北東路永興路淮南江南浙東西路荆南北路皆置帥府要郡帥府為安撫使帶馬步軍都總管要郡帶兵馬鈐轄次要郡帶兵馬都監皆以武臣為之副改路分為副總管路鈐轄為副鈐轄州鈐轄副都監總管鈐轄司許以便宜行事其軍馬事辟置僚屬依帥臣法屯兵皆有等差遇朝廷起兵則副總管為帥副鈐轄都監各以兵從聴其節制正官願行者聴轉運使副一員隨軍一員留本路提㸃刑獄弹壓本路盗賊遇有盗賊則量敵多寡出兵㑹合以相應援本路帥臣當職官措置兵馬先就緒者當優議旌賞置賞功司三省樞宻院同置賞功司三省左右司郎官樞宻院委都承㫖檢察置籍以受功状違限不施行者必罰受賂乞取者依軍法許人告軍士遇敵逃潰者斬因而為盗賊者誅其家屬凡軍政申明約束及更改法制者數十條皆用勅榜揭於通衢湖北羣盗閻瑾黨忠薛廣祝靖皆赴招撫司自効其餘皆赴柬京留守司納欵温州觀察使樞宻院承㫖王􅊛除河北路經制使通直郎直秘閣傅亮除河北路經制副使白馬滑濬抵滄州太湖置廵察六使處以為斥堠七月一日己丑李綱進剳子論修城池繕器械謂國家所以偹禦外侮者皆在邉郡城池器械一切偹具故敵未易攻今金人及賊乃擾吾腹心而中原郡縣積習承平之乆城池坍頺並無器械何以禦敵官吏軍民多不得能守而郡縣遂以䧟沒者非特士氣怯懦盖亦禦敵之具不偹使然宜命諸路州郡以漸修葺城池練兵馬治器械朝廷量行應副有能葺治偹具者旌賞以勸得㫖應州郡欲修城池者申明朝廷給降祠部應副三朝北盟㑹編卷一百九
