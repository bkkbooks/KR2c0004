body:
  text: 三朝北盟㑹編卷一百四十五宋徐夢莘撰炎興下帙起紹興元年二月二十六日癸巳盡四月十四日丙子二十六日癸巳詔侍從條具時政中書舍人汪藻上書書曰准尚書省劄子二十六日三省同奉手詔右臣窃惟人君當承平之時中原無犬吠之驚人臣以未見未然之事自下劘上甘心蹈斧鉞之誅義士猶不以為難今國家之危如坐燒屋之下漏船之中陛下宵旰憂勤未知所以拯救之術而求言于臣等儻猶狃習故態用猥卑之辭取塞詔㫖而已豈臣等惓惓効誠於陛下之時也臣昨扈蹕温州嘗蒙陛下賜以條對臣以為方今所急者唯馭將一事更無他說譬禦飢者當用食捨食之外皆非所急也已疾者當用醫捨醫之外皆非所急也陛下不以臣為愚雖不克時行然頗加採納臣今日區區之意猶守前見敢再為陛下陳之古之進說者曰人君恭儉愛人清心省事建立法度制禮作樂豈非甚盛之學而至美之談歟是數者人君不可須臾而忘然今日用此則未足以解紛何則敵騎充斥於中原羣賊跳梁于諸路陛下專于恭儉愛人清心省事而已為足以却之乎專于建立法度制禮作樂而已為足以却之乎抑以陛下能使諸將諸將能使士卒為足以郤之乎而陛下諸將爵祿已極家貲已盈習成悍驕無復闘志一方有警輙狐疑相視無一人奮然為國請行者或至迫不得已而行則邀例外之賞賜無名之求上不恤國下不恤民使朝廷為之黽勉曲從不啻如奉驕子是豈為國家平禍亂立功名之人哉臣於此有馭將之說三焉惟陛下留神裁察一曰示之以法二曰運之以權三曰别之以分何謂示之以法古者人君之于將帥未嘗一日廢賞亦未嘗一日廢罰如冬夏寒暑然相須而成豈有獨恩無威漫然略不繩治如今日之甚者哉議者謂承平之時朝廷尊荣操縱在我故武夫提兵者可予可奪可生可殺今溥天搶攘國難未己方藉此曹為腹心孜孜拊循猶懼不濟奈何欲拂其心將誰肯前死且今諸將悍驕已成雖朝廷有法果能一一治之乎此言是也然臣所謂示之法者豈欲眀主自親其文哉古者人君以恩結人臣為朝廷任其責者肅宗在靈武廣平王以兵二十萬復長安其權可謂重矣先驅不肅顔真卿劾之王為之不敢當闕而承李祐夜入蔡州縳吳元濟其功可謂大矣違詔進馬温造劾之祐曰今日膽落于温御史夫先驅不肅違詔進馬于軍政未有害也而二臣已不貸如此盖小過不貸則惡之大者知朝廷有人不復敢萌于胷中矣今諸將雖然驕悍臣得之傳聞亦尚知畏朝廷之法而陛下羣臣平居時聚談切齒無不以諸將負國為言及進言于陛下不過掎摭目前為逭責進身之資而已至此事則未嘗有一言及之者豈以為細故而不足言也哉揣陛下非所樂聞而不以告耳殊不知陛下重于用恩之過而驕有司時一警焉是陛下結其心者愈固而愈深也何不樂聞之有哉何謂運之以權臣聞馭將如馭馬必馭之力足以勝馬然後周旋曲折唯我之聽不然嚙銜脫轡毁首碎胷雖跬歩之間能不使之前矣漢髙祖之諸將其梟雄而難制者莫如韓信方其厄于滎陽漢固危甚人人懷去就之心髙祖一旦入其軍中自稱使者即卧内奪其印荷麾召諸將易置之信盖不知也及信下魏代輒收其精兵以距楚既敗項羽死垓下則又盡其軍徙為楚王以信之材而周旋曲折唯髙祖之聽者豈不以其智足以勝之故耶信嘗曰陛下不善將兵而善將將是信自知其材唯髙祖足以制己故甘心俛首為之用而不辭也大抵人君之于將帥必有要領而使之心畏誠服者謂解衣推食便足以得其驩心者非也唐憲宗時劉闢叛蜀宰相杜黄裳度惟髙崇文足以破之而崇文素憚劉澭使人謂曰公不奮命者當以澭代崇文惧盡力縳賊以獻是以澭代崇文者黄裳得其領要也髙祖之用韓信其術亦豈出此哉今陛下諸將倉卒之時可奪其印符而易置其部曲乎於戰勝之時可收其精兵而用以自衛乎於立大功之時可奪其全軍而使之歸鎮乎臣有以知陛下不能矣幸今諸將皆齷齪常才固不足深忌萬一有如韓信者不知陛下何以待之此則平定之時亦當深察如以劉澭代崇文之術不可不知也何謂别之以分漢髙謂功臣曰諸君知獵乎追殺走獸者狗也而𤼵縱指示獸處者人也今諸軍徒能得獸耳如蕭何則𤼵縱指示者也盖古者用兵謀臣坐于惟幄之中以出籌策而將帥則聽于命令為之役使此命之所以行而功之所以成也髙祖所與謀者蕭何張良陳平而已黥彭之徒不得而與也蜀先主所與謀者諸葛武侯而已関張之徒不得而與也今大臣之任宰相執政事者陛下以為謀之不臧歟慎擇而易之可也獨不可使武夫參預其間窃觀陛下對大臣不過數刻而諸將皆得出入禁中是大臣見陛下有時而諸將無時也臣非不知艱難之時陛下欲得其心姑與之無間然此曹何所知識必不能上補聰眀不過入則希求恩澤出則憑藉權勢而已此道路流傳遂以為陛下進退人材諸將或與焉以陛下英睿擇善而從頋于此曹何有然致是言者恐必有可疑之迹不可不慎也又廟堂者具瞻之地大臣為天子建立政事以號令四方者也今諸帥率驟謁徑前便衣密往視大臣如僚友百端营求期于得而後已朝廷豈不自卑哉祖宗時武臣莫尊於三衛見大臣必執撾趨庭肅揖而退非具文也以為等威不如是之嚴不足以相制以今觀之一何凌遲之甚也兼國家出師遣將詔侍從集議者所以重博采衆人之見也而諸將必在焉夫諸將者聽命于朝廷而為之役使者也乃使之從容預謀彼既各售其說則利于公者必不肯以為可行便于己而不便于國者必不肯以為可罷欲責其冐鋒鏑趨死地難矣臣愚以為自今諸將當律以朝廷之義每有陳奏必使之如有司之式無數燕見其至政事堂亦有祖宗故事且無使參議論之餘庶名分不至混淆而可以責功効是三說者果行足以駕馭諸將矣何憂乎保民何難乎弭盜何患乎遏冦哉若夫國財之生則臣願陛下毋以生財為言也自五六十年來士大夫喜操生財之說民窮至骨矣今四方舉為盜區國家所有不過數十州而已所謂生者必生於此數十州之民古者以暴賦横歛為非尚有賦歛之名也今則直奪而已耳古者以收大半之賦為非而民尚有其半也今則直盡而已耳南畝之民寒耕暑耘黎面塗足終嵗勞苦而不厭糟糠者陛下不得而見也胥吏門役朝暮不得休息而愁嘆之聲與死者陛下不得而聞也鬻妻賣子至無地可容其身者陛下不得而知也尚何以生財為哉惟痛加裁損庶幾乎其可耳外之可以裁損者軍中之冐請内之可以裁損者禁中之汎取何謂軍中之冐請朝廷不得已而取民之財當一銖一縷一粒以養戰士今一軍之中非戰士者率三居其二有詭名而請者一人而挾數人之名是也有以使臣之名而請者而使臣之俸實兼十人戰士之費而行伍中使臣大半是養兵十萬而止𫉬萬兵之用也有借補官資而請者異時借補猶須申禀朝廷謂之真命則一軍之出四方㳺手者無不竄名軍中既得主帥借補便得支行補廪與命官一同無有限極訪聞岳飛軍中如此類者幾數百人州縣惧於憑凌莫敢訶詰其盜支之物至不可勝計不惟是而已自軍興以來州縣貪殘之吏惟患盜賊之不來一聞入境則便置軍期司率歛民財無復稽考恣為侵漁與盜無异此而不治雖財賦日生于國家果有秋毫之益哉何謂禁中汎取窃觀國家軍兵之餉百官之廪乗輿之奉悉在有司禁中時有須索如戸部銀絹以萬計禮部度牒以百計者月有進焉以陛下清心寡慾必無嬪嬙横給燕㳺侈費也以陛下恭勤節儉必無营繕浮耗使令妄予也然人主用財要須有名使有司與聞用而無名是取民膏血擲而棄之溝中耳至于度牒則國家以虚名而權天下之實利陛下用之以重則重陛下用之以輕則輕免一時掊歛之瘡痍而實濟軍國之用誠非小補幸無以方寸之紙輕以予之而不之惜也若内外並加裁損大農之計雖至有餘其視不知節用而專務生財者有間矣陛下所以詔臣者臣固已畢陳于前矣而臣有私憂過計者敢復言之臣聞坤之初六曰履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也盖患之不可不預防也如此自古以兵權屬人久而未有不為患者此非以予之至易収之至難不密圖之後悔無及耶晉以六卿帥師而卒于分晉者六卿也魯以三家帥師而卒于弱魯者三家也漢自元成兵在外戚而漢由是以亡唐中葉兵在神策而唐由是以亂古今一同此必然之理也國家以三衙管軍而一兵之出必待密院之符祖宗於此盖有深意今諸軍之驕密院已不得而制矣臣恐敵平之後方有勞聖慮孔子所謂吾恐季孫之憂不在顓臾而在蕭墻之内也臣嘗觀自古偏方覇國提兵者未嘗乏人豈以國家四海之大雖曰多故而將帥之才遂至于寥寥如此哉意偏裨之中必有英豪特為二三將臣抑之而不伸耳臣以為及今之時當用漢建諸侯之法衆建之而少其力精擇偏裨十餘人裁付兵數千直隸御前而不隸諸將合為數萬以漸銷諸將之權此萬世計也惟陛下勿以臣人微而忽其言不勝幸甚遺史曰藻之言深切時務偉矣哉唯諭將帥之名分抑之太甚不能無文武黨比之私其言使將臣母數燕見者是豈知蜀先主與関張同卧起使將臣無得參議論者是豈知漢光武與賈復軰論朝政藻徒知三衛見大臣執撾肅揖之恭而不知廟堂延接自有官制髙下之式藻又謂此曹何所識是待将帥以無人矣此書既傳兵將官皆不堪之有令門下士作不當用文臣論者其畧曰今日語國者皆文臣蔡京壞亂綱紀王黼收復燕雲之後執政侍從以下持節則喪節守城則棄城建議者執講和之論奉使者持割地之說提兵勤王則潰㪚防河拒險則遁逃自金人深入中原蹂踐京東西陜西淮南江浙之地為王臣而棄民悞國敗事者皆文臣也時時有一二竭節死難當横潰之衝者皆武臣也又其甚也張邦昌為偽楚劉豫為偽齊非文臣誰敢當之自此文武二途若氷炭之不合矣桑仲以霍眀知郢州郢州新遭張用曹成之後百室無一二存者桑仲以其黨霍眀領兵二千知郢州明邯鄲人為逓鋪曹司有膂力善戰而敢殺孔彦舟䧟潭州三月十二日己酉張俊敗馬進戰于玉隆觀進走江州初張俊進兵急趨豫章至則喜曰我已得洪州破賊必矣乃復歛兵若無人者金鼓不動令將士登城者斬居數日餘賊首馬進以大書文牒使來索戰俊復細書荅狀以驕之又命王爕閱水軍於江中以疑之賊勢方强謂俊為怯戰俊諜知賊稍怠己酉遽命大軍亟行徑濟生米渡遇先鋒擊敗之于玉龍觀乗勝追奔次筠州進方擁數十萬衆據筠州進者成之驍將也出兵背筠河先守要地俊領歩卒與賊迎戰命統制陳思恭岳飛楊存中等分兵兩道以午為期視旌旗所嚮兩道俱進俊前擊至午兩道精騎自山馳下賊駭退走死者數萬人俘八千人俊督銳卒追至城下賊力不支乃夜遁走遂復筠州臨江軍所俘者八千人俊疑叛是夜遣陳思恭盡殪之進之據筠州也三月旦日設香案望闕而拜有黑風如盖自天而下漸低乃聞有聲徐視之則㪚而為羣鴉不啻數萬諠譟于庭中剋擇官以為不祥進曰何以攘之剋擇官曰當易旗幟改軍號可禳也進從之即命易旗幟改軍號而申成照㑹成見之不喜謂進有背戾之心囬奏責之至是果敗筠州退去南康軍遇巨師古兵與戰師古軍敗是時崔増以水軍往南康軍到之日適見師古新敗横屍滿野而進走江州矣増以舟船聽俊節制金人黙哷攻和尚原吳玠禦退之黙哷攻和尚原吳玠擊敗玠加忠州防禦使兼帥涇原賜張深程堂劉子羽奬諭詔曰朕治兵南服属意西陲眷秦雍之疆嵗被敵塵之擾連巴蜀之阻日聞邊隅之驚念此瘡痍痛如焚灼倚注樞臣之重總提師律之嚴雖云堂上之竒兵自能制勝􅁢藉幕中之規畫相與圖全郷起自儒家眀於將畧閥閱通于禁筦未減頗牧之賢韜鈐贊于廟謨必合孫吳之法山川䟦渉嵗月淹留挫疆敵于方驕賈敢勇而再振執訊𫉬醜斬將搴旗成兹克捷之功繄乃參佐之力筭計見效嘉歎不忘然念虎狼哮噬之無厭豈勝其忿熊羆奮勵而有獲所戒者輕更懷持重之思􅂇成戡難之烈嗣頒異賞寜限彛章張浚徙治閬中桑仲以李道知隨州李道者相州人李旺之弟也東京留守宗澤以事斬旺令道管其軍道之南也以一軍孤立遂寄桑仲軍中呼李道一軍為寄軍時隨州闕知州仲令道至隨州聞通判王彦威在洪山即請歸州彦威既至道令彦威掌州印彦威力辭不可而道遂掌之是時北方僧來投洪山寺戒臈圖有一千六百餘衆寺中不能贍給又有州縣官及寄居僅百家皆仰給于寺中住持僧慶預計粮食將盡不可以支乃集官貟僧卜衆陞堂為說粮盡之意見任寄居官之家一例更供贍一月一月之外請自营求在寺僧行日給米二合皆以為其言合理而間有僧之老者僧童之小者皆餓死官貟携老小尋路而南有達者有不達者衆僧請慶預别供粥飯慶預終不從亦日食米二合而已慶預郢州京山縣人也自孩童如成人鄉閭皆敬異之後祝髮事浮屠禪學甚髙與綿州覺了隰州性覺同得法于丹霞淳長老守供州以拒羣賊環繞百里地人煙悉為盜境而供山獨全慶預之力也孔彦舟自潭州以兵攻䧟洪栁全永道州執安撫使向子諲以鼎澧辰沅靖邵全武岡軍為荆湖西路就除程昌禹知鼎州充荆湖西路安撫使鼎州兵火之後龍陽沿江殘破為甚賦所入僅給本縣官吏而已武陵鄉村半為賊區桃源邊澧州界數為劉超雷進擾田畝荆榛賦入稀少倉庫空匱官兵錢粮不以時給於是朝廷以鼎澧辰沅靖邵全州武岡軍為荆湖西路就除程昌禹知鼎州充荆湖西路安撫使昌禹既輟兵北援澧州又於龍陽新縣邊城要地列置諸寨屯兵守禦是時賊勢强盛四面交侵官兵力寡分布不足遂下属郡調𤼵洞丁刀弩手及東南第八將兵弓前以􅂇蔡兵守禦兵數既増錢粮益窘又直嵗歉斗米三千五百文餓莩相仍勢甚急具聞于朝待報不及即檄辰沅邵全四州取撥諸司物以給軍食矣達蘭攻張榮于泰州縮頭湖為張榮所敗達蘭退走張榮在通州以地勢不利率舟船入縮頭湖作水寨以守達蘭在泰州謀往渡江欲先破榮水寨盡載兵于舟直犯水寨時榮亦出數十舟載兵與金人船相遇金人有戰艦在前不可近榮遑遽欲退不可榮望金人舟徐頋其衆曰無慮也金人止有戰艦數隻在前餘皆小舟方水退隔泥淖不能近岸我捨舟而陸殺棺材中人耳遂皆棄舟登岸大呼而殺之金人不能騁舟中自亂溺水或䧟于泥淖者不可計達蘭收餘衆約二千奔楚州泥淖中金人猶有未死者凡兩三日誅戮殆盡自東京來未曽承王命到京中遂無路告捷聞劉光世在鎮江府乃遣人願聽節制且上功狀光世大喜聞于朝廷而荣得右武大夫遙郡觀察使知泰州節要曰達蘭侵淮東地托卜嘉攻張敵萬泰州縮頭湖水寨為敵萬敗之𫉬壻呼巴拉羅丹及俘馘蕃漢軍五千餘衆賜襄陽府鄧隨郢州鎮撫使桑仲奬諭勅書勅桑仲朕惟彊敵亂常中原失馭凡王靈之靡及皆冦虐以顯行汝盡節朝廷有功江漢見奸人之專殺用國法以成擒坐使羣方肅然知畏劄章來上良用歎喜故兹奬諭想宜知悉劉光世鑄招納信寶錢招納歸附達蘭在承楚欲為久駐之基慨然有吞噬江右之意光世知其久去國戍逺方其衆思歸而有嗟怨之聲也謂可以離間其心即命鑄三色錢以銀金銅為之其文曰招納信寶背有使押字為號𫉬敵人之稍解事者貸而不殺說諭彼我利害向背曲直以錢折酒肴俾持錢密示儕軰有欲歸附叩江執錢為信信而納之自是歸者不絶未幾得金人契丹渤海漢兒萬人無室家者則為之取婦給粮馬器仗使出戰前後立功為取剳立竒兵赤心兩軍張榮入泰州張榮既勝達蘭引衆入泰州授横行遙郡知泰州之命李允文殺知岳州袁植李允文以沿江措置副使知鄂州袁植知岳州各得朝廷指揮許截留上江綱運招軍􅁢文在鄂州招集軍兵稍盛朝廷差髙某來代允文不恱乃集諸軍官望闕拜表乞文遂拒髙某不納岳居鄂之上流植截留綱運不放下江允文怒執牒直取之植得牒擲于地差來人曰綱運𤼵與不𤼵在州府然某期違限則必死請囬文歸鄂州植曰無囬文唯取某牒批示李允文以承朝命差官為代其公牒不可施行允文得牒大怒㑹劉忠犯岳州植出城避之允文即遣吳錫段貴等率兵至岳州數其棄城之罪執植以歸植死于途中或曰允文使殺之也允文以吳錫知岳州馬友取道之湖南錫聞友至乃退軍于潭州益陽縣遂知縣魏舜遂據益陽縣金人聞張浚退軍閬州遂擾熙河而歸金人至徳順軍以兵少不敢留秦亭聲言分三道而獨出沿邊掠熙河熙河素多馬金人駐兵搜取無遺張浚置司閬州五路䧟沒劉惟甫疏其罪而罰之秦鳳路統領官関師古收餘兵保岷鞏劉錫屯階城金人自熙河東過階城去入㪚関過漫天坡郭奕為詩曰大漫天是小漫天小漫天是大漫天只因大小漫天後遂使生靈入四川又有詩曰秦山未盡蜀山來日照関門兩扇開刺使莫嫌迎候逺相公新送陜西囬後奕罷宣司幹官與通判不協不赴任普州賣蒸餅為生晏如也李成徒黨據興國軍執知軍李儀李成分遣馬進既占興國軍進留徒黨在興國遂與入淮西及遭張俊之敗乃執知軍李儀奔淮南後儀及一親隨僕人遁走得免儀身着衲襖中有碎金數十兩至江州對岸一小寺中腰間出興國軍印示其主僧求安下且煩僧尋一小舟濟渡僧見儀衲襖中是有物者遂謀殺儀夜并其親隨僕人以繩繫殺之􅐝其屍棄于寺後半夜大雨僕人稍蘇活自解其繩留繫身邊移歩欲行覺有屍在地天色雖隂黑僕人認之是儀也乃枕屍而祝之曰若得性命渡江願與使頭雪􅁈僕待質眀走數十里叩江邊小舟乃渡詣江州密訴盡捕院中僧行出官鞠勘是實追黄金數十兩興國軍印乃擲棄江中不𫉬僧人與同惡者皆凌遲處斬於是興國軍後降詔與新印賊在興國軍半年儀能調䕶之無秋毫擾民感儀之惠為立生祠二十八日乙丑張俊敗馬進于江州馬俊軍州之敗張俊遣至奉新樓子莊賊將商元據草山狹險設伏俊熟視山徑路險度必有伏乃遣歩兵從間道直趨山頂殺伏奪險乗勝殺至江州進等拒戰不勝絶江而遁遂復江州自是俊軍有張鉄山之號是時興國軍諸處羣賊悉皆奔竄矣初俊復軍州臨江軍奏捷上親筆諭曰以李成之狡獪馬進之猖狂盤踞以深根連已固卿奮勵決策頻有克捷快士民之意釋朝廷之憂且朕待卿最親卿事朕最久君臣之際休戚是同宜乗勢之已衰當官軍之已振驅除𠞰戮速收全功詔猶未到軍又有江州之捷賜李成軍中詔朕承祖宗之休託民庶之上念連嵗金人之變禍不勝言聞一夫屠戮之烖痛如在己而李成者生本邊隸世䝉國恩乗朝廷多事之時為盜賊亂常之首假順欺衆拏兵累年朕方待以開懷冀時悔過屢下自新之詔勉行姑息之恩裂數郡以開藩封疆大啓遣使人而將命錫賚相望而成敢負眷私專懐凶狡每候敵塵之警反為王旅之讐挾持兩端猖獗萬狀自謂能欺於天地人皆洞見其肺肝乃至擅離淮右之區越􅀈江南之地既包容而愈悖豈征討之得辭爰遣將臣前臨賊境纔旌麾之一指俄壁壘之四摧動輙有功捷無虚日願全師之盡北知元惡之靡逃往即屠之勢無難者言念脅從之衆孰非涵養之餘失身一䧟于豺狼終嵗莫還于田畝骨肉至于離㪚頭顱莫能保全靖言無辜有所不忍已勅令于主帥專擒取于渠魁凡汝脇從赦而不問以示好生之徳以昭除亂之誠於戯國有大刑所冀鯨鯢之必戮民皆赤子豈容玉石之俱焚咨爾汚染之倫體吾宏貸之意逮違亂略永保加生張俊討李成屢有捷奏上欲殱其渠魁而已憫其脅從故有是詔四月一日丁夘朔陳彦權興國軍陳彦以班直出官為興國軍事巡檢李成徒黨賊馬進既退彦入城請彦知民軍事彦令吏士案具見在城中文武官職位姓名有朝請郎董某者監大冶縣銀塲請委權通判有武翼胡某者委請權都監次第委請州縣官皆有調理唯董某怏怏不足有權軍之意軍民厲聲而呼曰無事之時當用文官多事之際宜用武官今已請陳知軍衆意皆通誰能間之彦乃命吏牒董某還歸本任董某逡巡聽命遂權通州十日丙子康淵克通州劉光世遣將康淵往通州入其城以收復告三朝北盟㑹編卷一百四十五
