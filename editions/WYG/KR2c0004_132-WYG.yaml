body:
  text: 三朝北盟㑹編卷一百三十二宋徐夢莘撰炎興下帙起建炎三年閏八月十四日庚寅盡十月二十三日戊戌李成遣人詣行在受招安未囘復反李成在泗州聲言願歸朝廷因曽刼杜充老小於汴河殺二萬餘人皆盡不敢赴行在朝廷聞之遣人齎文字往招安成大喜待使人甚厚成欲遣人隨使人赴行在軍中皆恐懼不敢行有張琮者安肅軍人語言稍辨利畧知書能謳小詞成之将佐㑹飲則置琮於坐隅令謳詞助歡軍中號為小張於是軍中将佐皆舉琮行遂命琮琮亦願赴行在乃具受招安之状隨使人至行在宰相吕頥浩引問琮琮具道成不敢負朝廷願招安之意頥浩喜授琮秉義郎令招成赴行在琮曰琮不願為秉義郎俟琮再往李成軍中宣布聖上徳意及具道廟堂威望招李成同赴行在琮元是安肅軍軍學學生願乞一文資恩澤頥浩尤喜乃授以承務郎且曰俟爾幹事囘當遷官升加職名遂齎文字復往招成未至泗州成已復反琮遂歸琮以承務郎受温州監酒而去初令泗州進士許道作謝表有曰恨無李廣之無雙願効顔囘之不二有指為文人宛順作先發赴行在行至滁州白塔市成囘遂復反京城副留守郭仲荀至行在郭仲荀為京城留守也人皆缺食糲米一升糶錢四五千雖有錢而無米有以米煑稀粥賣者置於髙屋之上先約錢二百文許之上屋然後以稀粥湯少許與之不然則為衆人所奪矣麻粹如三指濶賣錢二百文非强者不能買也至有人家做飯隣家窺其煙火測其將熟倒壁而入求少飲湯與老者潤咽喉而彼亦數世鄰居之故義不可却分數㸃而畀之人作過者愈多仲荀治事自凌旦抵暮無休息時斬殺毎日不可計數乃自京師赴行在都人隨而行者數萬離京城三四日物可買人始得糓食至是到行在至此京師人來者遂絶矣程昌禹為京城留守上官晤權京城副留守程昌禹初為吏部郎官上在揚州㑹昌禹知蔡州有進士陳味道順昌人與昌禹在學㑹同筆硯有契是時順昌府郭􅁢迪已投拜金人故遣味道詣蔡州説昌禹味道至蔡州以刺謁昌禹昌禹同州官見之味道叙拜禮畢昌禹因留早飲置酒五杯而昌禹使人物色得味道随行唯一紙被内有檄文昌禹大驚即招州官聚㕔使擁味道至庭下以不忠責之味道祈哀昌禹曰與公雖有舊然事君之義固不當狥私以木驢釘之即日凌遲於市至是除京城留守金人舉兵由淮東淮西西路來侵金人舉兵江淮兩浙民皆驚恐無人以却敵保境之策為獻者先是起居舎人胡寅字明仲上萬言書論天下事切中時病宰相吕頥浩不喜而罷之故天下之士皆箝其口矣車駕幸平江府杜充留守建康上幸平江府以杜充為建康行宫留守留中書印付充令王􅊅韓世忠等兵皆聽節制邵青受招安為沿江措置使司水軍統制初邵青以舟船擾於楚泗州之間又有丁立者同為首領是時洪澤羅成亦以舟船擾於楚漣州之間為邵青丁立所并青立後受江東制置司招安以立為統制青為統領杜充防守建康也以青為沿江措置司水軍統制車駕復幸杭州周望為荆湖江浙宣撫使守平江府周望以簽書樞密為荆湖江浙宣撫使陳思恭巨師古曽珏張守忠兵皆聽節制二十四日庚午李成據滁州金人初有舉兵之報知滁州向子伋挈州治入琅邪山寨猶慮勢力單寡不能保守聞李成屯在泗州乃移書招成共守山寨成方未有所向得書欣然鼓行盡擄泗州强壮由來安縣趨滁州或謂子伋曰李成包藏深險不可測豈可放入寨中子伋亦悟遂不納成怒曰汝移書招我逺來置不見納且糗糧不具是二也二必有謀乃令諸軍措置攻寨遂率兵入滁州烏珠請於尼堪入攻江上尼堪等歸節要曰尼堪自東平歸至雲中鄂勒歡棟摩自濵州北歸燕山留逹蘭守山東後逹蘭移屯維州試舉人於蔚州遼人應詞賦兩廣人應經義張孝純充主文忻州進士孫九鼎為魁尼堪禁隱藏被擄亡者犯人罪死樞密院河間府為河北東路真定府為河北西路平陽府為河東南路太原府為河東北路去中山慶原信徳河中府名復舊名去慶祖慶成軍名復舊縣名改安肅軍為徐州以境有徐州廣信軍為遂州以昔乃遂州威勝軍為沁州沁水之源舊名也順安軍為安州永寧為州北平軍為永平縣樂夀縣為樂夀州肅寧城為肅寧縣偽元帥府禁民敝服及口稱大宋號者死劉陶知代州執一軍人於市騐之謂其反覆無常心懐疑貳斬之後敵将韓常知慶源耿守忠知解梁見小民有依舊犢鼻者亦責以敝服斬之内外臣民一時莫不震懾時服布帛大貴細民無力易之坐困於家無敢出焉領燕京樞密院事劉彦宗以病死併樞密院於雲中除雲中留守韓企先為相同時立愛主之尼堪以彦宗之故命其子苦簽書院事尼堪以通事髙慶裔知雲中府兼兩京留守西路兵馬都部烏珠請於尼堪及鄂勒歡乞提兵渡江從之以北庭萬户聶哷尼楚赫博索渤海萬户大托卜嘉漢軍萬户王伯隆及起燕雲河朔民兵付之烏珠率兵渡江節要曰靖康之初入京城時在内則城髙池深兵食兼足在外則諸路勤王之師霧合雲集四方忠義士雖素不預軍籍亦皆横身扼腕自備器甲効命登先圖報國家二百年之徳澤朝廷以天下之勢當一烏合深入之衆亦未足為累也復茍紓目前之急不顧日後之患許割地以議和敵既得去官軍随之北行若用种師道夾河三戰之策則敵衆無噍類矣時以親王宰臣在敵中使命絡繹道路約束諸軍不得少有犯敵至内有數騎輒犯官軍已斃數人官軍束手不敢擅動内有一卒不勝其憤輒擊殺一敵適㑹使命在軍目覩其事馬忠恐使命囘告朝廷遂斬其卒以徇且傳首於敵自後敵時以數騎張弓注矢戯犯官軍避之敵以為笑以至於敵馬尾相􅁇隨以出塞無敢誰何者由此勤王之師莫不解體故彼敵不踰半年復敢入攻至百雉戒嚴而天下勤王之師無向戰之心者失於和之一也至京城之陷也若御駕親征率軍民整陳而出亦足以當敵􅊳圍而出亦足以脱敵矣何哉軍民雖非願戰然陷之死地而後生置之亡地而後存故韓信背水以破趙田單鑿城以擊燕是也設若不能出城但収兵屯於舊城一如家計寨然後遣使卑辭厚幣許割地以退兵且曰舎此則有死戰而無生降之理兼外城初失我軍必有縋城得脱者但有一二人得脱則四方勤王之師定相傳播無不知京城已陷御駕已出或御駕退保舊城如是則勤王之師孰不奮身赴難争先救王也彼敵雖有破城之勢然内有決死之敵外有必救之兵内外受敵茍不釋去則與和此自然之理也或曰城既破矣豈能整陳而戰􅊳圍而出及退守舊城耶臣曰不然葢京城與邉城之異也邉城羣邑其内守城之軍不若攻城之敵之盛也所恃以為命者惟城池而已城池既失衆寡不敵不為敗降則為敵害矣京城侍御之兵守陴之士不下十萬而尼堪斡里雅布兩路之兵共無六萬至如城破其勢非不足以拒敵也何必淵聖速出見敵也譬若御駕親征遇敵於路則亦無城池可守便當棄六軍以單騎入敵陳願議和耶而城陷三日之間淵聖已幸敵營不惟城為敵陷又且目無其朝廷也由是在内軍民在外勤王之師已成失國之人也孰有禦敵之心哉此失於和之二也至建炎三年春尼堪之犯掦州也時御營之師必有十萬而尼堪止有五六千騎自建炎二年秋九月離雲中下太行渡黎陽攻澶濮山東諸州郡以至入揚州可見疲勞之甚矣此强弩颷風之末不足畏兼是時河北州郡尚未有陷者山東州郡十陷二三人心未安糧道未集㓂盜蜂起而不頋後患投身深入我境又可見無知之甚時若我師乗其逺來新至行列未定而擊之可也或則深池堅壁拒而勿戰以挫其鋭以沮其意且多方出竒邀其出掠者彼萬里孤軍後無委積忌於相持利於速戰不然糧道不􅁇又野不能掠以此制之敵遁必矣俟其既遁襲而擊之捨而縱之皆可也而乃望風之際車駕渡江六師自潰為敵乗之席卷而去此失於退之一也至是烏珠之至江南也朝廷豈不知敵所利者騎也我所利者舟師與步兵也江浙之地騎得以為利乎此皆騎之危地也舟師步兵之利地烏珠有知豈肯置身於此耶時若御駕親征諸路進討烏珠之兵必敗於城下矣而復望風之際車駕泛海朝廷自散為敵乗之得志而去此失於退之二也凡此四者非敵之善乃我靖康之兩和建炎之兩退所自致也觀真廟之時值契丹蕭后入㓂澶淵若真廟不戰而和不戰而走則景徳之役已有今日之事矣靳賽降於劉光世靳賽猖獗於淮東也上命劉光世討之光世先遣使臣許彦正齎檄招安賽既聞之與其徒以禮迎彦正願受招安遂引兵詣光世光世就令賽統其所部軍人人皆喜權邦彦叙復寳文閣直學士知江州初權邦彦守東平府金人入境邦彦棄其家出奔降授朝散大夫至是叙復寳文閣直學士知江州制曰遇敵而致渑陵之奔孟眀有罪毁家而紓楚國之難令尹為忠我有藩臣嘗隳城守已正簡書之坐當還符竹之分某頃典大州適當强敵既盡逾年之抗遂􅇜全室之留雖徐庶思親何勝方寸之亂而真卿委郡不廢朝廷之歸在國法以靡容於人情而可憫付兵民之重寄專江漢之上㳺式遄其行盡復爾職無愴家庭之禍當盡王室之忠詔親征上初欲幸眀州用吕頥浩計復還杭州乃下詔親征百司有到曺娥江者有到錢清堰者御史中丞趙鼎力諌以為衆寡不敵不可以戰不若為避敵之計㑹有邉報至遂復召百司囘越州市井間不時虚驚有云金人已到腰棚瓦市至有奪路而出被踐踏而死者韓世忠駐軍於鎮江府上命韓世忠駐於鎮江府備江也范宗尹㕘知政事范宗尹靖康中為諫議大夫金人至闕宗尹俯伏流涕乞割三闗以獻議者短之京城陷宗尹衣破壊衲衣如貧窮人奔藏於閭巷間二帝北狩宗尹至單州詣元帥府迎請建炎初臣僚言其專主和議罷之至是復召為諫議大夫除參知政事是月閭勍奉宗廟神御至濠州不得入城而去閭勍奉西京㑹聖宫神御以舟船由蔡河而下至濠州孫逸閉門不納勍曰我主管步軍司閭勍王臣也逸曰太尉雖王臣而逸不識太尉面今太尉率衆而來逸為濠州軍民老小計則不敢開門勍曰奉宗廟神御經由城下足下為朝守臣宜率州縣官出郊以拜也􅇣曰今日之事軍旅之事也太尉若實奉宗廟神御經由城下逸謹當權撤戎服具朝裳率州縣官從城下望拜之於是望拜於四望樓勍不能奪遂引去十月十五日庚寅李成陷滁州琅邪山寨殺管内安撫向子伋及州縣官先是朝廷以敵國侵陵許州縣居民自為保守知滁州向子伋修子城治樓櫓欲為守禦或謂子城周匝無三里許且西南接幽谷諸山下瞰城中又龍興寺與端命殿基去城纔數十步若於此立砲可抛至城中心子伋不從於龍興寺下堰㫁河水使壅遏環繞城下河乃山澗連日水猝暴漲堰不可築築或為水所損者屢矣子伋堅欲作堰令三縣民户輸財雇匠叠石穿孔貫以鉄汁謂牢不可破而秋雨連日水暴漲堰壊子伋知堰不及成乃以琅邪山寨叠石為郛上施女墻以開化禪寺為州治用土豪張仲寳為将仲寳字子賢有膂力時人謂之小張飛子伋勒令近城二十里内居民悉般老小入山寨時五營軍兵二千餘人及府庫案牘悉在寨中李成怒子伋閉門拒已也遂令諸軍攻擊晝夜不息子伋作書遣僧官智修與成通好請犒軍而退成不從攻之益急寨中惟有澗水細溜不多不足以供數萬人之食人皆食炒米往往亁渇而成病軍兵與强壮之民多趨城成遁去鴉嘴山而又逼城賊乃勵握鴉嘴山及運柴薪填叠其㘭陷處倐忽與城平賊遂登城大肆殺掠溝澗流血子伋被執送成所命取州縣官作一處拘之乃拘於州倉之側仲寳率數十人自後山出奔為伏路者所執成留以為将盡取强壮入隊根刷公吏用為統制将司又餘日賊羅卒獲山寨中子伋遣出齎蠟書告急者成怒殺子伋州縣諸官遺史曰成在滁州軍容甚整肅官員秀才許陳利害者雖一句可採必誦之心而不忘毎發一言必中理或問成天下何時可定成吟哦而言曰慿君莫問封侯事一將功成萬骨枯問者心伏而退嗚呼怪哉郭仲威降於周望郭仲威既破淮陽軍渡楚州漸由髙郵至𤓰州欲渡鎮江聞杜充治兵建康仲威嘗受充借官故懼之乃由泰州入通州渡江至常熟縣時周望以宣撫使在平江遣人招之遂率衆入平江詣降有衆萬人望以為統制時號為郭大刀二十二日丁酉王彦駐軍興元府二十三日戊戌金人陷夀春府金人陷夀春府烏珠以大兵進趨江上留周大師以兵戍夀春三朝北盟㑹編卷一百三十二
