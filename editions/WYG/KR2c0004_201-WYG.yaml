body:
  text: 三朝北盟㑹編卷二百一宋徐夢莘撰炎興下帙起紹興十年六月十一日甲寅盡其日六月十一日甲寅劉錡及烏珠戰於順昌府城下大破其軍烏珠敗走楊汝翼順昌戰勝破敵録曰紹興十年春天子以騎帥太尉劉公副守東都仍節制所領軍馬繼被朝㫖精鋭兵馬分戍陳汴隨軍老小屯泊順昌三月十八日陛辭出城益以殿司二千人撥𨽻戍後束裝裹粮越五日而後啟行絶流泝淮風濤險阻自臨安凡二千二百里抵潁上以順昌之屬邑陸路兩驛而近水路縈紆曲折殆三百里太尉捨舟與屬官將佐先抵城下時五月十五日太守龍學陳規倅汪若海洎兵職官吏門首迎館太尉於羅漢院守倅既相報謁即往按視营寨湫隘窄陋悉不如法兩日之間經營區處尚未就十七日早太尉門首刺探官宋待制未及回陳守約相見出泰和縣申狀報太子人馬於五月十二日至東京亟歸諭諸將戒飭士卒無致張皇其時選鋒㳺奕兩軍并老弱輜重舟船九百餘隻相去尚逺遣騎追逐至四更後方遂入城十八日辰巳間有探報敵騎已入陳州陳州距順昌纔三百里闔城惶惑㒺知所措而馬軍縁寨柵未定遂以羅漢院駐左軍普恵寺駐右軍前軍駐舊衙後軍駐毗盧院中軍駐臺頭寺而太尉遷維摩院乃歐陽文忠公之故居也皆在子城外與府治及民家兩不相干是日太尉遣主管機宜杜亨道幹辦公事王羲賔謁陳守以朝廷先降到贍軍錢支發交子欲斂兵入城為捍禦計陳守愕然曰城中聞警報人皆欲去太尉獨欲守城何也繼而汪若海告别云某已奉有檄差徃行在禀議太尉因託以章奏附行尋聞挈家出南門矣十九日太尉與屬官并統兵官聚議吾軍方自逺來未及息肩已聞敵騎壓境諸公以謂何如其間或欲守禦或欲復就便舟順流而下獨太尉激以忠義喻以禍福且曰某赴官留司今京師既陷未可之官賴全軍在此幸有城池粗可守禦顧此機㑹大不容失要當同心戮力死報國家諸公翕然同辭無或異議於是與官屬登城區處以後軍統制靑守禦東門中軍統制闕守禦西門右軍統制焦文通㳺奕統制鍾彦分守南門左軍統制杜把守北門分遣將士明逺斥􅕤仍召募土人作鄉導間探是日晩亳州把門使臣白忠等二人來投某有劉彦充者劉豫時曾知亳州號𤓰角自東京同金人已入亳州至順昌二百四十里繼捉到彦充所差探事人朱海張三斬之梟首于市又報金人入陳州陳州至順昌三百里二十日以後報金人至蔡州蔡州至順昌二百七十里續報至項城陳州屬邑至順昌一百九十里又報至泰和泰和順昌屬邑至府城七十里居民縁敵勢逼近後聞太尉一意堅守皆雜遝輻輳入城城中百姓賴以安堵然太守及州官骨肉絡繹出城皆渡淮而東走太尉日居城上親督兵將備設戰具而城壘摧缺旋加補貼芟雉榛棘如笓籬巴僅存數十悉取偽齊所作癡車以輪轅埋城上又諭州索居民門戸扇踏隨宜懸掛僅能周匝其時新鄜延總管劉光逺以路梗亦留順昌新永康知軍桞倪縁太尉親以從行至是皆差就檢察一行軍馬提舉四壁守禦自十九日至二十四日凡六日之間為備禦計食息不暇而探報日急兩軍日相與激勸争先整治甲器且曰我輩自此出陣未曾立功今才至此便遇大敵須自出力報答國家兼荷太尉存卹到這裏要取一塲富貴上下響應如出一心二十五日金人逰騎數十已涉潁河出沒城下遇太尉伏兵生擒銀牌千戸阿蘇木阿嚕等通説韓將軍先遣來城下探城中事宜及有探報韓將軍翟將軍兩頭領在白沙龍渦一帶下寨寨去城北約三十里太尉夜遣千餘人擊之至二十六日早復與敵戰遂殺傷數百人辰巳間入城太尉于北門犒勞即具㨗奏以聞二十七日金人馳報龍虎大王及三路都統偕自陳州來増益兵馬至二十九日合陳翟將軍一帶逼城自北之西自西之南自南之東人馬約三萬餘騎太尉四門出軍仍激勵出城士卒内外協應午巳之間敵臨城施設而桞知軍適在東門搏敵箭中左足柳倪即㧞箭就以破敵弓射之應聲而倒繼發十箭無不中者翼以神臂弓硬弩破之遂稍引去即以步兵邀擊慌怖四奔走小河人馬渰溺者不可勝計抵暮尚有鐵騎數千擺佈河外復出官軍千數連擊之大獲㨗勝奪到韓將軍大小認旗十面并鐵甲提刀等至三十日早戰士還屯犒勞如初亦以上聞六月一日金人尚留舊寨有擒到金人及漢兒云已遣銀牌天使馳徃東京告急於四太子矣初二日敵寨城東地名李村去城二十里以精鋭五百人夜出刼之鄉導者引官軍直至中軍以鎗徹去毡帳有一披甲者疾呼曰留得我即太平竟為官軍所殺是夜隂晦欲雨時電光所燭但見金國服飾者悉皆殱之其殺傷比之前日兩戰為最初三日戰士歸城亦以㨗狀聞奏初四日初五日金人相持如初伏兵擒到金人具道殺傷甚多且乏粮食有建議者願乘此屢㨗之勢順流乘舟而全軍歸太尉乃㑹諸統兵官于四門上酌酒而誓曰今日機㑹天造地設况已屢挫敵鋒軍聲稍震雖敵與官兵多寡不侔然業已至此可前進不可退却敵營去城三十里而四太子又領重兵來援萬一諸軍遽舍順昌不惟前功盡廢一軍老小當此倉卒擾擾豈敢盡保無虞敵衆追襲首尾相失將至狼狽大有不可言者馴致侵擾兩淮驚動江浙則吾輩平生報國之心死為誤國之鬼雖萬死何以謝天下願諸公堅忠孝心誓與此城同亡此言不食天實臨之於是諸統兵官皆願奮不顧身㒺有退志齊以警戒之令曉諭將士人人咸欲效命欣然待敵初六日太尉遂以東門北門外所泊舟船悉沉河底示使死戰不為東歸計俄報四太子入太和縣輜重前驅已與龍虎諸軍營寨相接連夜潁河繫橋渡軍馬初七日四太子至亦與諸軍首連接下寨人馬蔽野駱駝牛馬紛雜其間毡車奚車亦以百數至于攻城戰具來自陳州粮食器甲來自蔡河散遣輕騎巡綽城下有叩城以手揶揄曰城裏人只有三箇日頭裏至晚以前日陷陣人曹晟荷團枷賫實封文字放回太尉得之慮敵為詭計以惑衆心不啟封而焚之初四日四太子疏責諸帥首前日用兵之失諸帥首皆荅以今次南朝兵馬非日前比徃徃一以當百不容措手足明日國王臨陣自可備見盖四太子稱天下兵馬大元帥越國王也即下令曰順昌城壁如此可以靴尖踢倒來日府衙㑹食所得婦女玉帛悉聴自留男子一嵗以上皆殺之且折箭為誓以激其衆然太尉决策戰守忠義自持仍以方畧授諸將佐顧視金人恃强背盟貪凟無厭平時憤激直欲氣吞敵衆以謂不足憂也初九日平明四太子遂合龍虎大王及三路都統韓將軍翟將軍人馬環合城下甲兵鐵騎十有餘萬陣列行布屹若山壁旗幟錯雜大小有差而五色旗各七面按方分植者中軍也而順昌東西兩門受敵金人睥睨東門瀕濠待敵太尉亦自東門出兵應之城上發鼓即與交鋒轉戰踰時敵復大衂四太子披白袍甲馬徃來指呼以渠自將牙兵三千策應皆重鎧全裝金號鐵浮屠又號哈沙千户其精鋭特甚自用兵以來所向無前至是亦為官軍殺傷先以鎗揭去兠牟即用刀斧斫臂至有以手捽扯極力鬭敵自辰至戌金兵大敗遽以拒馬木障之少休城頭鼓聲不絶乃出羮飯坐餉戰士優游閒暇如平常時敵衆望之驟然披靡食已即來以數隊趣戰闢去拒馬木深入斫敵又大破之無何有悞傳令者令少却官軍遂稍引後敵衆併擁逼濠而致溺水者二百餘人而選鋒統制韓直身被一鎗三箭幾致溺死賴有一虞候挾以上馬而歸虞候與馬皆中箭被血淋漓然餘勇尚未衰也其餘傷中稍輕可者猶欲再出接戰是日西風怒號城土吹落塵霾漲天咫尺不辨斃屍倒馬縱横枕藉掩入溝壑間入墮井者不知幾何旗號器甲積如稻麻葦竹方其接戰時酈瓊孔彦舟趙提刀等皆单騎列於陣外有河北簽軍告官軍曰我輩元是左䕶軍本無鬭志所可恃者止是兩翼拐子馬耳故錡兵力擊之四太子平日所倚仗者十損七八當其敗衂時城上見有官軍歸城車馬自寨而北復渡河而去敵初渉濠耀兵張勢云嚇城既而官軍歸城直奪取釣橋望城放箭箭落如雨至有用響箭與窄栁箭者城上悉以破敵弓及神臂弓臨下射之人馬自退自後東而南轉而之西連亘西北薄城而營長十五里濶十餘里至晚發擂聲震山谷父老皆言有生以來或未之聞然金營中嘷呼諠譁自夜達旦時有金人傍城屬耳以聴城中肅然雞犬無聞以是自可見勝負之兆四太子帳前以甲兵環衛持燭照坐敵衆皆分畨假寢馬上深懼官軍夜擊之至十一日大雨傾注敵于城外埋鹿角柵欄外開小濠深濶各五尺許正爾督工雨亦稍止太尉出百餘騎撓之敵衆悉皆掛甲挽弓以䕶雨復大作官軍刼之晝夜不得休息十一日早敵營發擂聲如昨日大尉遍詣諸营撫勞官軍及安慰中傷之人盖家至户到人人皆得其歡心且雖被傷中猶欲抵死報荅太尉俄有探報四太子作筏繫橋甚急金人自到此日給炒麥數合疲困已甚皆思北歸抽摘人馬過河至晚不輟然不復發擂只擊鑼數聲而已十二日早尚立砲架置推牌斤斧不絶虚立旗幟以疑城上盖縁潁河暴漲充激橋筏人馬數千隨亦被溺遂復繫橋連夜已濟兩日之間収集屍首隨處焚化至有數十人作祭者亦有燒半殘者或瀕河為水漂泛或半為烏鳶所食雜以馬屍牛首彌望遍野及晚㧞寨盡走即具解圍奏聞則营中砲架推牌雲梯拒馬木敗甲破車堆積如山弓刀鎗槊亦委之而去然猶潛匿山林間以伺襲至十三日十四日悉出境上復㑹於陳州四太子反怒三路都統韓翟二將軍人以栁條撻之數十下如千戸毛可等皆撻之百十下尋以三路都統守南京韓將軍守頴昌翟將軍守陳州四太子龍虎大王各以所轄人馬同之東京初龍虎與諸軍既敗遣銀牌天使告急于四太子天使纔到就龍徳宫見之得報即索靴上馬出門告報士卒頃刻而集經由陳州一宿措畫戰具粮食而行自東京至順昌徃復千二百里首尾不過七日何其神速如此而太尉在圍城時奏求援于朝得報差行营左䕶軍統制王徳躬率全軍來順昌策應十二日金人既退之後王徳方且以文移來問敵勢動息至二十三日卯時以數千騎至城下太尉邀入具飯飯已到卧憩於子城樓上至申時即出門廼遣人致意曰不果奉别今且復回又報數日傳聞徳申樞密院某已解順昌圍矣方金兵在城下得逓到御筆劉某擇利班師太尉以方禦敵未敢輕為進止既且敵退十日後又被㫖先發老小徃鎮江府駐剳遂津遣老小輜重并被傷戰士船載而行以左軍統制杜把右軍統制焦文通兩軍防䕶東下俄聞王徳者申宣撫司云某以全軍裹送劉太尉老小出潁河矣其誕謾舉皆類此敵國相去未逺萬一事或蹉跌為害不細然太尉恬若無聞未畧介懐也順昌右城且素無備迨兹敵已來陳守始令居民築牛馬墻兵既退後方置砲座比之軍中所放砲爭五十步先軍中置令牌毎遇出戰除守禦人外非帶號掛甲者不得登城雖順昌官軍土豪不許預分毫事城中居民各闔戸守家内外肅静無有犯者初破金人陳守送到煑酒十數石門首犒勞戰士一盃而已再戰退敵後市户以麫六千餘斤猪百口來獻隨即分付諸軍人不得過麫半斤肉數兩至第三戰太尉不免論陳守畧與犒勞官軍但各人給粟米一碩及赴倉請之有止得蛀麥五斗者其間不願請者甚多至事定陳守先具奏乞推本府官屬守城恩賞且言措置守禦賈率將佐犒賞戰士遂至成功雖太尉依應保明聞奏將士頗訾不平方當圍城太尉曉夜城上寢食皆廢閱月之間畧不以家事經意故能激勵軍心皆為之用遇臨敵則躬親鼓旗賈作士氣先下令不得斫級奪馬及掠取一物一件至有効命如㳺奕統領田守忠中軍正將李忠之徒恃勇深入率皆手殺十人而後死悉取前後陣歿將士鑿土埋瘞作大塜傍作屋數間命僧主之作水陸道場以致資荐仍復存恤其家種種順昌北門外初有居民瓦屋數十間恐為敵宿前期爇之敵退即訪元主酬以價直自始及終無毫髪擾民者城門四啓每得奸細即審問情狀詳悉而衆所不容者遣之使回未嘗輕戮一人雖金人亦謂自過南朝來十五年間無如此戰必是外國起鬼兵來我輩莫敢當也後以生擒到金人阿蘇木并契丹等五十餘人解赴闕下前項有妨功者移書權貴順昌城下無金兵止是兩河與諸路簽軍耳顧雖力詆奈此衆議何太尉初領兵不滿二萬當其圍城時城上備禦及防䕶老小營寨遇敵則又把路齪巷至于子城倉庫等處皆分兵守之其實出戰之士不過五千人當十萬餘衆自非明于料敵果于制勝安能以應不虞之變韓文公作裴相平淮西碑所謂凡此蔡功惟斷乃成者某於太尉亦云自㨗奏到朝廷寵以鼎州觀察使再被制命建武泰節鉞皆懇辭至者踏來撫問寵賁優渥有加宸翰奬諭且有卿之偉績朕所不㤀之語咸謂主上酬報非常之功夐出前比仍降告千五百軸俾就軍書填隨即繳納以謂不若自朝廷給之為榮累得㫖索本軍功狀校定兩日方得具奏盖縁節次出戰更畨守禦分别功過不容或差至閏六月二十七日推排安全軍功賞逐隊列单甲姓名一一覆覈實統兵官立功者以前降到金帶及金盌賞之其有過者則面疏其失勞績亦减將佐立功者以金帶及金盌賞之其有過者則杖責之降而入隊至于戰士悉以前後所賜銀二十萬兩絹二十萬疋第功賞之初田守忠李忠輩陷陣本將軍佐不即救援亦皆免死而被責其能致力策應者仍給賞且出錢千緡掲榜許軍中論告僥冐戰功者按以軍法如陣歿之家亦各優厚周卹斯又見太尉信賞必罰出人意表如此者某隨軒而來偶遭金兵迨兹平寧敢以圍城前後所見叙為紀實筆墨荒澁甚無文采且將過貽諸親舊至於解嚴之後以迄班師述事贊功當竢大手筆者三朝北盟㑹編卷二百一
