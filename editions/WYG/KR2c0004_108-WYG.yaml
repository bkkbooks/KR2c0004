body:
  text: 三朝北盟㑹編卷一百八徐宋夢莘撰炎興下帙起建炎元年六月八日丙寅盡二十五日癸未八日丙寅内降黜責士大夫手詔朕惟祖宗創業守成垂二百年涵飬士大夫至矣靖康變故仕於中都者曽無仗莭死難之士而偷生取容何其衆也甚者乗時為奸靡所不至實為中國羞公議勿容姑取跡状尤顯著者量加竄黜為臣子之戒夫莭義正所以責學士大夫也至於武官卒伍理當闊畧以責後效惟王宗濋首引衛兵逃遁至都城失守不可不責餘姑務含容一切不問咨爾有衆其體至懐故兹詔示各宜知悉内降手詔王宗濋首引衛兵逃遁至都城失守不可不責其餘姑示含容一切不問宗濋可散官安置制曰國保城闉賞誅而已将援枹鼓生死以之矧提師旅之嚴中䕶皇居之重倘先失守安所逃刑具官王宗濋蚤繇戚畹之華擢寘殿岩之􅃉庻㡬自立上荅所䝉方兵戈交内外之鋒於呼吸有存亡之變衛吾宗社恃汝腹心乃無效命之忠唯作全軀之計望風驚讋委衆潰奔朕心推禍亂之原知汝罪辜之首宜明邦憲以謝國人尚縁四姓之親姑從八辟之議爰鎸寵秩􅂌以散官其堅訟過之心服我好生之徳洪芻罷諌議大夫張卿材罷刑部郎官胡思王及之余大均周繼文陳冲並先次放罷以御史䑓勘司有請也傅雱特授宣教郎借工部侍郎充大金通問使朕講殊鄰之好求専對之才念國家艱難之餘方賢者馳騖之日以爾疏通無壅沉毅有謀雖山濤不學於孫呉而季布得聲於梁楚比選出疆之使實膺仗節之行方事遐征無㡬㣲見於顔面宜加寵數送禮樂而有光華是用擢之銓調之中假以事官之貳庻爾一言之合成吾兩國之歡日佇來歸毋忘自効遺史曰先是上即位痛念鑾輿北狩未還欲遣使於金國通問且祈請河北已差同望而河東難得其人李綱荐雱有専對之才雱字彦濟臨江軍人進士及第時從事郎乃改宣教郎借工部侍郎使於金國識者已知上意在乎講和矣募河東河北忠義之士能保有一方或力戰破敵者授以節鉞餘賞有差宋澤奏剳論不當割地朝廷議割河東河西及陜之蒲觧宗澤奏剳論其不便曰臣聞天下者我太祖太宗肇造一統之天下也奕世聖人繼繼相授增光共貫之天下也陛下為天眷祐為民推戴入紹大統固當兢兢業業思傳之億萬世奈何遽議割河之東又議割河之西又議割蒲之觧乎此三者太宗基命定命之地奈何輕聴奸計附敵張皇之言而遂自分裂乎臣窃謂淵聖皇帝有天下之大四海九州之富兆民萬姓之衆自金人再入未甞用一将出一師厲一兵秣一馬曰征曰伐但聞奸邪之臣朝進一言以告和暮入一説以乞盟惟辭之卑惟禮之厚惟敵言是聴惟敵求是應因循踰時終之二聖播遷后妃親王流離北去臣毎念是禍正宜天下臣子勿與金人俱生之日也臣意陛下即位必赫然震怒旋乾轉坤大明黜陟以賞善罰惡以進賢退不肖以再造我王室以中興我大宋基業今四十日矣未聞有所號令作新斯民但見刑部指揮有不得騰播赦文於河東河西陜之蒲觧兹非所以新人耳目也是欲蹈東晋西邉既覆之轍爾是欲裂王者一統之緒為偏伯者爾為是説者何不忠不孝之甚也既自不忠不孝又壊忠義之氣俾河東河西陜之蒲觧皆無從為忠義是賊其民者也臣雖衰年不勝憤痛激切之至十二日庚午謝克家范宗尹並落職宫祠制曰父母君臣之義所謂在三死生禍福之間豈容有二具位謝克家范宗尹被寵有日宜知所天乃國家遭變之時昧賢者潔身之道雖揚雄之投天禄自以無它然鄭䖍之貶台州難於幸免宜鎸華秩退領宫祠兹於寛貸之恩毋廢省循之戒十四日壬申内降河北河東諸路官吏軍民手詔制曰勅河北河東諸路州縣守臣将帥忠義軍民等朕惟祖宗徳澤在民垂二百年天下乂安靡有變故而宣和靖康以來國家多難金人内侮道君太上皇帝下哀痛之詔講揖遜之禮比徳堯舜古今鮮倫孝慈淵聖皇帝以恭儉之徳爰受内禪海内欣戴日傒治康而朞嵗之間敵馬再侵墮敵奸計但以講和一事終至宗社阽危既盡取玉帛子女公私財力悉為耗竭乃始刼遷二聖中宫洎皇族尊幼中外戚以行惨酷之禍振古未有朕以介弟受命總帥臣民推戴廹以大義入繼大統重以父兄之辱飲血嘗膽疾首痛心願為天下忠臣義士共濟艱難而近者使臣來自北部審聞兩路守臣義不愛生誓以死守金雖憑恃甲兵之衆敢肆攻圍而能率厲士民屢挫仇敵其忠義軍民等倡義結集以萬計邀擊其後功績茂著朕甚嘉之夫河北河東國之屏蔽也朝廷豈忍輕弃靖康之間特以金人憑陵不得已割地賂之将以保全宗社休兵息民而金人不道攻破都城易姓改號刼鑾輿以北遷則河北河東之地又何割焉已命遣師以為應援兩路州縣官守及忠義之士如能竭力捍禦一方及紏集師徒力戰破敵者至建炎二年當議疇其勲庸授以節鉞其餘官吏軍兵等優加陞賞應税賦財貨悉許移用官吏将佐悉許辟置朝廷更行量力應副為國藩屏以昭茂功庻㡬中原彌寧生靈休息强憐悔禍二聖有可還之期則予一人膺受多福爾亦有無窮之利不其韙歟故兹詔示想宜知悉河北河東路守臣各轉兩官有職名者進除餘具職位姓名以聞又詔自今有能收復兩路已䧟州郡及救觧危急保全一方攻效顯著者除本處節度觀察團練防禦使依方鎮法又詔兩路軍民自今不許撰造亊端以疑慮擅殺官吏又命使臣賫夏藥徧賜兩河守臣将佐又命催貨務印造見錢鈔遣使賫送兩路州郡又命降見錢鈔三百萬貫付河北河東路陜西路漕司廣糴應副兩路又命起東京路夏税絹於大名府樁管川綱河東税絹於永興軍樁管以待兩路支俵李綱傳信録曰右詔命數事皆上意也於是兩路知天子徳意人情翕然蠟書日至間有破敵㨗報金人圍守於諸郡者往往抽退十七日乙亥胡舜陟胡唐老姚舜明王候各降兩官制曰御史於百官之囬邪政事之闕失皆得而言之朝廷所恃以為安危御史有不能其官者顧獨無責哉頃者敵馬内侵變生不測鑾輿出狩事孰大兹汝曽無一言為國長慮乃始終和議墮敵計中今而不懲失政刑矣禠官二等聊著厥辜尚服寛恩無貽後悔范瓊加定武軍承宣使為御營使司同都統制行以討李孝忠范瓊在京師圍城中心迹甚惡上初即位姑示涵容瓊至行在乃自龍神衛四廂都指揮使温州觀察使加定武軍承宣使為御營使司同都統制俾率兵往來討李孝忠是時孝忠作亂於京西也叔向伏誅叔向擅置救駕義兵所招聚兵得京城統制于渙在其軍中渙省悟以為未便乃詣南京告叔向不當擅起兵命劉光世擒而誅之渙後𨽻留守司馬忠落龍神衛四廂都指揮使降充河北經制副使制曰朕於将帥待之至者所以責其忠望之深者所以必其勝具官某粤從小校擢領中權寵任兼隆在廷莫比謂能夙夜分朕顧憂乃亡多筭之竒莫止偏師之敗全軍退舎坐失事㡬宜鎸節制之崇仍損使權之重再稽朕命軍有常刑以與金人戰於河北敗績故有是命張所為河北路招撫使張所請乞車駕還闕有五利不許乃授所河北路招撫使相州百姓岳飛初𨽻所為効用耿南仲責授莭度副使南雄州安置制曰梁信侯景之奸而䑓城不守唐飬禄山之亂而靈武僅存惟議者失於毫􅁵之間斯敵人玩於股掌之上爾迂儒無斷狥物苟容道君疑蕭傅之賢選參儲禁淵聖用甘盤之舊擢預政機方金人之憑陵舉中原而震擾克綏多難所恃老謀乃憑欵敵之言堅主弭兵之議積其憒毦成此艱危朕念夫當垂白之年寧為爾受失刑之謗而煩言荐至重此難私姑黜置於散官用竄投於荒服汝官雖免吾悔何追南仲以専主和議初遭論列落宫觀士論未厭臣僚囙再言其事故有是命林泉野記曰耿南仲字晞道開封府人深明易經賢闗馳名元豐五年登第淵聖在東宫除太子詹事授太子以易靖康初權知樞宻院事遷尚書右丞遷門下侍郎子延禧為中書舎人金人深入南仲怯懦無謀每同李邦彦呉敏主和謝克家孫覿李擢李㑹王及之王時雍劉觀民附㑹南仲康王出使辟延禧參議加龍圖閣直學士金人欲割河東河北命兩府二人往議聶昌以親辭南仲辭以疾上怒遣南仲割河北聶昌割河東昌至絳州為百姓所殺南仲聞不敢往㑹康王起兵相州以延禧在幕府故往投之凡元帥府事皆與連銜王即位南京充禮儀使未㡬以觀文殿學士提舉杭州洞霄宫後臣僚言其主和誤國之罪落職再言降軍節度副使南雄州安置至吉州卒所著易講註易明䝉二書行於世延禧字伯順為中書舎人康王出使辟延禧參謀除龍圖閣直學士制曰唐元和中選宗室四品一人使囬鶻於萬里海外而以博士通經術者為之貳朕初嗣服申講大國之好親王奉使而副以左右侍從之良選任之難視唐為重矣具官某疏亮宏博清明冲淳典學足以擅多聞英辭足以鼓羣動潜宫之舊義同艱難往修一介之書冀復兩朝之好惟孝子事親之義豈不遲遲去父母之邦而大丈夫許國之忠初無刺刺顧婢子之語擢自詞垣之􅃉進升内閣之華幹予心膂之憂以靖干戈之難毋忘勵翼嗣有􅃂章康王大元帥府為覇府官屬王即位進中興記表曰參大府之末寮建明無補記中興之盛事潤色非長强勉成篇矜慚罔措臣某中謝窃以乾元首出庻物佑下民而作之君上帝監觀四方有大徳者得其位洪惟巨宋嗣有真王惇徳而四方咸賔干戈不用􅁢治而萬世永頼年榖屢豐遭奸臣變更之餘至國制搶攘之後㡬及詩人小雅之變惟思創業大風之歌金國肆侵伐之威彼萬方並告於上下皇天有恢復之意俾一人輯寧於邦家始縁五利以和戎繼長萬夫而建帥暨經大變迄有成功恭惟皇帝陛下湯勇自天堯仁因性聰明睿知而不殺剛健篤實而日新初臨銅馬之營推心而不二逮出陵武之使修睦而無疑崇䑓定三箭之祥朔部有兩王之號乃大呼而起義勃興虎變之文至勸進之交章肇正龍飛之位剺面者欲雪大耻左􅃝者咸懐舊恩君萬邦而百官是承惟天祐於一徳賚四海而萬姓悦服惟民歸於有仁雖阻險艱難之偹更盖損益盈虗之有待念淵聖逡廵而臨遣與陛下英鋭而請行錫玉帶乃傳國之祥合春氷乃受命之始凡漢廷之迎代邸與靈武之奉肅宗歴觀人鬼之謀叅考符瑞之應行軍集諸将之議定䇿聴老臣之謀事有初終迹存首尾障狂瀾於既倒孰知崇論𢎞議之所繇揚偉績於無前要明盛徳大業之初起當於文官鉅儒而求鴻筆乃以帥幕舊属而及㣲臣伏念臣本乏才但縁遭遇頃陪後乗葢捧辟書晝預兵戈之謀夜陪樽爼之樂辱褒音之屢及認眷奨之彌隆子犯負覊紲而從文公固顓愚而有罪鄧晨以圖䜟而知光武常精白而無它故兹流落之餘獨荷㤙憐之及顧臣淺陋何所發揮然臣聞建元大始之施為馬遷過於矜夸至天下以為近謗建武中元之符慶史官不容撰集故來世罕得𫝊聞如臣一介之㣲乃有千齡之㑹摹冩乾坤之大自揆難工攀依日月之光徒知盡力忘其無識狂則有餘二十日戊寅汪伯彦除知樞宻院事黄潜善兼門下侍郎二十一日己夘金人斡里雅布卒莭要曰斡里雅布知皇帝即位於南京故俟尼堪於草地避暑議還太上皇尼堪未之許斡里雅布打毬冒暑以水沃胸患病傷寒以死金國太祖實録曰斡里雅布名宗望呼皇子二十五日癸未吕好問除資政殿學士知宣州臣僚章疏論受偽命臣僚多有行遣有未及者皆等第施行如十友之類令留守司詢訪姓名以聞其言頗及吕好問好問在假上章求去有㫖除資政殿學士知宣州吕好問辨事偽楚奏剳曰臣輙有誠懇仰干天聴伏念臣世受朝廷厚恩義同休戚多事之際理不當自退自進然事有不得已者豈免喋喋伏念臣賦性迂疎分甘退縮昨淵聖皇帝召臣畎畆之中擢至言路超踰等軰徧歴要近属金人侵伐都城失守淵聖皇帝再幸軍中因而不返臣憤痛切骨屢欲自裁盖嘗投状乞守本官致仕而孫傳張叔夜責臣以世臣之義當死社稷不可止為身謀求自免而已臣實感其忠讜許以任其事茍以不成繼之以死於是執手泣别相勉盡節臣念變故此難以力争思在天下當立之人唯陛下而已百端經畫求所通誠懇道迎立之意並是夜間方敢諸處訪聞書冩文字既而張邦昌入城臣首勸邦昌當應天順人迎立陛下時張思聰蔡安中傅樞呉華李進皆預臣謀孟仲厚蒋師愈韋淵皆知其事後趙子昉軰宗室戚里亦多知之則臣之心迹不為不顯以天地宗廟之靈陛下即位於南郡則臣已獲初心故自信不疑既而奉元祐皇太后聖㫖差臣賫手書慶賀陛下纔一登對即被簡在位居丞轄參預大政陛下於臣可謂厚矣若不察臣之心何以至此今人言滋彰深為可畏既不究其事實則是意必有在臣非不欲竭誠盡力少禆萬一窃慮上負付倚之重下違進退之義伏望聖慈特賜睿㫖察臣誠悃除一在外宫觀差遣庻㡬垂老之年有以坐觀太平之化干冐宸嚴臣無任惶恐戰懼之至取進止又臣近者屢求罷䝉陛下察臣心迹令諸處不得收接文字又特降御剳稱臣邦昌僣號之初即募人賫帛書具道京城内外之事金人甫退又復勸進臣僚所不知付尚書省行下照㑹臣一介之㣲而陛下左右保全雖天地造化之恩無以過此然臣窃自謀之於心勢有不可不去者昨金人圍閉邦昌僣號之時臣若閉門避事以㓗其身實為不難况臣於邦昌未入城之際曽乞致仕重念臣世受國恩异於衆人親受賢者之責身任宗社之重不敢保身全家坐視朝廷阽危故臣忍耻含垢逭死朝夕不避金人㓕族之禍遣人衝圍賫書於陛下而又畫謀奉迎幸而天相神助得覩陛下今日中興之業則臣之志願足矣向若金人網羅得臣所遣之書而臣之謀畫萬一洩露臣之一身當如何臣之家族當如何然則臣其果愛死耶果不敢愛死耶區區之心臣自知之皇天后土知之宗廟社稷知之陛下又知之矣臣之心迹顯然明白臣之求退乃其時也乃初心也臣猶自以為當去况它人乎况言者乎方今國步艱難當惜寸隂而當路之人未暇及它而唯臣是攻則臣之罪大矣是言者必欲去臣而後已也臣若不速自引退使言者専意於臣而忘朝廷之急臣亦避嫌而不敢謀國則兩失其宜伏望憐臣顛躋之急憫臣求退之切罷以宫祠許之自便既以杜言路之口亦以安螻蟻之誠臣無任祈天俟命激切之至取進止三朝北盟㑹編卷一百八
