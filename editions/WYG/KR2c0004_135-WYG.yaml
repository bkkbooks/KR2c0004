body:
  text: 三朝北盟會編卷一百三十五宋徐夢莘撰炎興下帙起建炎三年十一月二十三日丁夘盡十二月二十五日庚子隆祐皇太后自吉州進幸䖍州隆祐皇太后離吉州至生米市有人見金人已到市中者乃解維夜行質明至太和縣又進至萬安縣兵衞不滿百人滕康劉珏楊維忠皆竄山谷中唯有中官何漸使臣王公濟快行張明而已金人追至太和縣太后乃自萬安縣至皂口捨舟而陸遂幸䖍州金人攻撫州知軍事王仲山叛降於金人遺史曰王仲山字衡甫與仲嶷為兄弟仲嶷字峰甫仲嶷以袁州降仲山又降兄弟典二郡相望皆不能全其節後綦崇禮行其責詞曰昔唐天寳之亂河北列郡並陷獨常山中原能為國守者葢杲卿真卿二顔在焉爾等頃以家聲屢塵仕版未為虧失寖預使令為郡江西惟兄及弟力誠不支死猶有説臨川先降宜春􅁇屈魯衞之政若循一途雖爾無恥不愧當時之公議顧亦何施面目見爾先人於地下哉仲山映之父也有婿曰秦檜二十九日癸酉江東安撫使陳邦光叛附於金人通判建康府事楊邦義死之金人自渡江數日軍馬皆集遂鼓行逼建康府城下先是杜充清野縣無屋宇皆空闕城下望之旌旗器仗蔽郊滿野鉄騎往來如雲陳邦光即具附降之状使人迎於十里亭投之詣拜喜曰金陵不煩吾攻擊大事成矣邦光率府縣官自出南門詣烏珠投拜烏珠受之通判楊邦義不拜烏珠問之邦義曰我大宋之臣也食君之祿豈忍背其主而事他邦也烏珠猶欲降之使譯者許以髙官邦義大罵不絶口竟不肯屈烏珠命拘至帳下殺之邦義字希稷吉州廬陵縣人後葉夢得知建康府為請於朝立廟宇南門之外以褒忠為額邦光方出城投拜也城中民亂老幼争出東門取蒋山路而去金人馳騎往蒋山遮其路約居人復囘城金人遂據其城金人攻建昌府權知軍事蔡延世禦退之蔡延世建昌人也應武舉得承信郎閤門祗候軍無守臣衆推延世權知軍事金人䧟洪撫州遣十人持檄至建昌軍延世令入城皆殺之至是金人以兵至城下問十人所在延世示之以首級金人怒攻城為延世所敗由是不攻而去故建昌獨後軍相薦上殿改通直郎賜緋魚袋邵青聚衆於建康江中金人渡江建康失利邵青退於竹篠港欲聚衆凡建康有舟船者皆攔之漸下真州有宋金者建康水軍将官也水軍統制郭吉潰散不知所在已在真州攔船青攻金人不勝其餘衆復入建康青盡奪其舟遂有舟大小僅百隻往來於江中舟船漸聚衆亦數萬得兩京路安撫司參議魏曦者倜儻之士也西京安撫司辟為參議朝廷以白衣借補閤門宣贊舎人在建康未行間會金人渡江為青所得用為參議遂以其衆往蕪湖權知濠州張宗望叛降於金人先是杜充檄趙魏知濠州也張宗望遣進士秦絳趙之傑等往招信致書備禮請位位未至其金人周太師自夀春府傳檄到州宗望與州縣官議其所宜衆謂孤城難守趙位未至不若從權受金人之命保全家属宗望然之乃與州縣官列衘具降附之状遣使僧道往夀春府投拜周太師即以孫興來知濠州滕州郎中為兵馬都監以副之迪功郎陳浩然為通判率北軍五百人入城興與滕郎中皆燕人浩然者王臣也初以進士登第為夀春府幕官金人據夀春故浩然受金人之命興等既入城唯改建炎三年為天會之號其餘一遵舊法無所變革北軍與濠民雜居於閭巷間秋毫不相擾興唯務撫䘏由是居民稍稍安處杜充觀文殿學士提舉江州太平觀制曰門下運籌而決千里之勝兹有賴於宗臣失律而致三軍之凶顧可居於宰職眷吾次輔嘗領中權既貽疆場之憂其解機衡之任具官某早緣人望驟履政途謂其宜惇大而有謀可以艱難而立事故擢持於國秉仍專付於戎師總諸将萬夫之屯當長江一面之宰所期李勣為我長城寧使周公至於破斧逮敵人之臨境率我衆以交鋒惟勝負者兵家之常當死生為天下之計乃因奔北唯事退藏至大變於其師将焉用於彼相會邉虞之稍息聞物論之交興已咈民瞻難逃策免念備股肱之久姑存體貌之餘止罷要權猶從優數賦殊庭之厚祿加秩殿之隆名於戱泰階平而風雨時始共期於康濟采薇廢而征伐缺今良失於倚毗尚兾桑榆之収復全龜玉之毁勉圖偉績用對殊休以棄建康府遁還軍潰故有是命十二月七日辛已金人陷廣徳軍烏珠既得建康府區處已定乃率衆焚溧水建平路趨杭州一路居民但知潰散之亂軍兵不虞是金人故聚集居民及鄉兵若将捍禦者金人以為拒戰所以溧水建平皆焚焼殺戮而去将近廣徳軍知軍周烈亦未知是金人謂為潰兵遣人以語迎之許其犒軍且約其不擾金人許之故烈無虞心俄頃金人傳箭至招其投拜烈大驚索馬而奔金人追至二十里被執至杭州殺之金人陷廣徳軍焚燒罄盡安吉縣相去八十里猶未知報八日壬午金人陷安吉縣知安吉縣曽綽聚鄉兵在石郭把隘金人攻石郭寨發數矢或視之曰沙栁木幹鑿子頭真金人箭非潰兵也鄉兵皆棄竹鎗紙甲而奔金人入縣縱火悉為灰埃唯常樂寺有屋數間火所不及九日癸未知餘杭縣事曽􅘔叛附於金人金人自安吉縣進兵過松林嶺嘆曰南朝可謂無人倘以嬴兵數百人守此吾豈能遽渡哉知餘杭縣曽􅘔探得其實知是金人乃與縣丞徐律成率僧道俱焚香迎拜投降金人差押人穆昆問知縣安否委貝勒二員同治縣事不焚燒不殺戮出榜於路戒約兵馬不得騷擾縣尉楊汝為在徑山能仁寺縣差弓手節級及保正齎牒招汝為汝為斬之請監事為統領聚强壮拒金人住持僧梵仁從之於是臨安縣官吏亦叛附於金人十日甲申金人攻杭州浙江安撫司康􅁢之棄杭州金人攻杭州杭州猶未知是金人安撫康􅁢之遣東第三将劉某出城迎敵於湖州市得二級以歸耳上皆戴環子􅁢之見曰此金人也遂棄城遁去十二日丙戌扈衛班直亂上欲幸海道班直衛士語不遜欲殺宰相吕頥浩中軍統制辛永宗彈壓定遂取首亂者數人誅之十七日辛夘杭州軍民亂殺權知州劉誨金人陷杭州劉誨知楚州被召赴行在挈家到杭州時上已幸浙東適會金人自安吉縣餘杭路入攻安撫使康允之棄城走軍民共推誨為知州先是金人在和州李儔者杭州人也與誨有舊金人令儔入城諭誨使降儔已降金人乆矣誨儔相見執手而言欷歔不能止軍民謂誨有投拜之意王八差者唱之軍民遂亂誨全家皆死初聞亂誨大呼曰李儔是本州人為和州知州為金人所執𫝊語而來非金人也亂不可止遂被害是日晚城陷明日贈誨直龍圖閣制曰生好物也死惡物也好物樂也惡物哀也樂生哀死人之情也聖人之治順人情而已劉誨山陽之守臣錢塘之寓公也紛然圍城之中推以為守而奉承之非深知其賢為可事也指以為叛而勦絶之非深知其罪為可誅也事窮勢廹人人自危横議之𤼵初無根柢卒使身塗草野屍混卒伍是亦不幸焉爾錫以寵名官其遺息姑以致哀死之義而已尚其不昧知享此哉十九日癸巳車駕幸定海縣上以眀州不可居乃決幸海道把隘張公裕進海船二十隻内以興化軍田經船作御舟餘并作御前使用百司禁衞并眀州備船禁衞有千餘人隨行是日幸定海縣留張俊眀州扞敵上賜親劄其略曰惟卿忠勇事朕累年朕非卿則倡義誰先卿非朕則前功俱廢卿宜戮力共扞敵兵一戰成功當封王爵二十日甲午車駕幸昌國縣金人攻越州浙東安撫司李鄴附於金人浙東宣撫司郭仲荀棄越州走金人攻越州郭仲荀以宣撫司職事不戰而奔其兵将多潰去為盜知州李鄴以越州叛降於金人二十二日丙申屠洪州金人在洪州取索金銀寳貨百工技藝皆盡是日大申軍令都下肅静潰軍成阜侵􅄔州防遏使傅崧卿出城説而降之成阜㓂􅄔州州學教授周邦者請率兵擊賊知州沈誨從之邦率兵數百出城大敗而還誨欲斬邦州官勸止之浙東防遏使傅崧卿屯􅄔州阜來攻城崧卿出城單馬見阜示以至誠説以忠義之節阜等數千皆來降傅崧卿何㮚榜第進士上駐蹕掦州為中書門下省校正諸房公事行在明州以崧卿為浙東防遏使取将必用儒術以侯延慶為前軍統制步汝霖為後軍統制親統中軍皆有紀律云二十五日庚子張俊敗金人於眀州金人逼眀州張俊欲遣人硬探無敢應者有軍兵任存請行俊壮之曰汝果能得其實當與汝官存拜謝而行不旋踵以手提二級而還具得金人之虚實俊大喜遂決用兵之計亦㑹隱士劉相如勸俊戰乃令統制劉寳與戰不勝再命王進黨用兵迎敵用與横皆被傷楊沂中田師忠再戰又不勝李寳􅁇進苦戰李直率諸班直以舟師來助劉洪道又率兵射其旁金人乃敗而稍退去俊戒将士毋驕毋惰且金人侵軼數千里如入無人之境其謂我不能軍有輕我之心今一旦失利彼将奮怒必再來乃清野髙橋閉闗自守奏任存之功特授承節郎王進者延安人少為軍卒是役也身先士卒獨立竒功驟加正使賜金帶俊拔用為将李成侵淮西李成破滁州琅邪山寨漸欲趨江上止全椒縣遇金人在烏江馬家渡成避之復囘滁州住三日屯於大寨嶺至是知金人渡江已盡乃率衆往淮西時張俊遣人來奏明州之捷上在昌國縣捷報至百官皆賀内侍陳顧言不賀曰上幸海道何賀之有隆祐皇太后命楊琪軍臨江軍張仲彦軍吉州梁斌張進叛降於金人梁斌為選鋒正将張進為副将上在越州差斌進以本将兵駐於諸暨縣及李鄴以越州投拜金人遣招斌等斌與進皆欲投拜其衆多不從事漸彰露斌與進心不安率腹心五六十人詣州投拜其衆果不至據山自保上在温州張俊遣人招其衆皆往温州俊依舊留麾下邵青破周虎於蕪湖縣戚方殺後軍統制扈成於金壇李成之黨有周虎者據蕪湖縣邵青以舟船至蕪湖縣乃遣人與戰一日七敗參議魏曦以小舟戰江中既而告青曰吾知所以敗亦知所以勝矣彼以紅布軟纒與我之號一同故與戰則不能分彼我所以必敗宜易其號則勝矣青然之乃令其衆皆作鑽風角子各附墨而行遇戰則去紅布唯見鑽風角子又用墨抹搶於眼下如伶人雜劇之戯者又曰吹呌子一戰勝周虎於蕪湖青遂駐於蕪湖初軍潰於建康蒋山也統制劉經扈成岳飛皆入茅山經屯上觀成屯中觀飛屯下觀皆從兵擄掠為資飛與經成議移軍入廣徳軍鍾村經與成皆許之岳飛與經引兵先行飛等既行成按軍在路下擺齪不動飛與經軍馬已行盡成乃往金壇縣與其将李璋等議入鎮江㑹滑搥之軍将士從之成留老小在金壇以其衆往鎮江李滑搥閉門不納而出銀帛犒成軍復囘至丹陽得報戚方刼金壇寨盡擄老小而去成大怒有吞啗戚方之意急趨金壇有統領官谷俊者背成投方告其事方勒兵馬備之中夜鄉導二人迷路質明始悟成益怒斬鄉𨗳二人成使尅擇日筮之日緩則吉成曰事已如此何可稍緩又命斬之命尋路而囘中途與方隔水相遇方下馬拜成成亦下馬答拜成曰弊軍老小在金壇何故見侵方曰死罪死罪戚方安敢作此乃其下小人有相累者成曰然願得軍中老小見還如何方謝曰既䝉寛恕謹當盡以老小交付不敢稍有侵損約日交還已定方先期令人於橋下掘大坑伏精鋭數十人期日盡刷老小鱗次而行若将交還者成以車馬迎之方隔水言曰戚方今日盡将老小交還統制何用軍馬豈非欲見陵侵乎成曰不然遂約其軍馬皆退而成與方各進馬方稍緩其行成先至橋側伏兵出遂殺成成既死方乃進兵其軍散走方盡取成父母妻子皆殺之於是􅃂榮収成餘衆往宜興縣投水軍統制郭吉三朝北盟㑹編卷一百三十五
