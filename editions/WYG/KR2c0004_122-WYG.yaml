body:
  text: 三朝北盟㑹編卷一百二十二宋徐夢莘撰建炎下帙起建炎三年二月十三日壬戍盡十八日丁夘十三日壬戍車駕幸杭州上至杭州以州治為行宫以顯寧寺為尚書省然百司官吏到者十未有一二十四日癸亥汪伯彦奏剳乞賜竄殛劄子曰臣聞危而不持顛而不扶焉用彼相臣實犯此有靦面顔輙瀝愚誠上干天聽伏念周旋覊紲幸㑹風雲備位宥宻者行且再期爰立冡司亦既逾月承靖康既危之後輔建炎復績之初圖回二聖之還言念兩河之復雖政刑兩殷於當務然事力不及於前時賛㐮百為未有一得練兵選将而臨事不為用遣使修睦而所欲未或從卿士啟渡大江之謀先時被患廟堂念係中原之望應變隨宜固萬邦戴后之心挫羣奸幸禍之志詔川陜之師從横而禦侮檄東北之兵首尾以觧紛備謹邉防以慮敵至終縁彼國兼用吾民陷濮與檀破青及濟所向既北乘勢而東雖世忠控要路於淮徐而范瓊頓勁兵於宿泗對壘兩軍之相拒輕兵間道以潜來臣偶以沈疴所纒不能宻志而慮致鑾輿之遑遽拏舟楫以播遷持危扶顛無善可紀雖曰登庸日淺以病丐閒如其捨劇理均狥名責實事失前定奚用臣為咎将誰歸死有餘責本欲居家待罪恭俟嚴誅重念駐蹕初臨政煩親攬暫兹忍耻靡敢冐居伏望知臨之大君特奮乾剛之獨斷亟選良弼共理多難録臣罪愆重賜竄殛是日左僕射潜善門下侍郎兼簽書樞宻院路允迪各有剳子乞黜責上曰朝廷非不措置往往大夫不知朕固知之卿等安職降詔不􅁢勅伯彦省所剳子奏理昧㡬先事出倉卒致鑾輿之遑遽拏舟楫以播遷伏望録臣罪愆重賜竄殛事具悉朕以菲躬紹承大統爰自初載圖濟多難惟卿同徳之臣陪輔中興之業帷幄宻勿何勤如焉覊絏艱危備嘗之矣比縁鄰敵深入近畿狩於呉江以援淮甸退循𦕈末良用憮然既不能格天人佑助之心顧何以平華夏搶攘之亂不徳之故特朕之尤豈必大臣専執其咎務恢逺畫庻保後圖毋重引愆以求去位所乞不􅁢故兹詔示想宜知悉下責已詔詔曰朕以菲躬獲承大統萬方請命未能觧塗炭之憂二聖䝉塵莫𫉬展晨昏之飬兵已練而力屈備雖設而用違震於朕心罔知攸濟實由涼徳未究逺圖仰無以當上帝之意而禍亂遄臻俯無以得百姓之心而流亡失所比因强敵深入近境退保江津以援淮甸事出倉卒人用震驚衣冠頓踣於道途帑藏棄捐於兵火鳴呼皇天后土豈不鍳朕之至誠志士仁人豈不䘏朕之懇惻倘以寡昧難彌凶穢宜降罰於朕躬以謝罪於率土尚以國家厯數之未艾祖宗徳澤之在人未至淪亡必将恢復益當洗心改事雪涕輸誠悉去彌文務從簡素屏斥細務専事兵戎明告庻邦暨於列位忠言可以規朕之過失長䇿可以救國之傾危毋藴於衷悉以逹上廟堂近服宜務交修藩翰諸侯深思夹輔將帥致爪牙之用黎元保父母之邦思持顛而扶危用興仆而起壞庶資多􅂇馴致丕平咨爾萬邦欽予􅃱意下避殿詔詔曰朕倉卒南渡致大夫棄其家属禁衛五軍老㓜不時渡濟頗聞逼擾尚未有達行在者雖累次委劉光世王渊多以絹帛堆垜江口賞募日夜濟渡猶恐既渡之後徒歩顛蹶道路仰康􅁢之日下撥在岸空粮船五十隻綱稍先支一月請受選差使臣二員給劵􅃹押明立旗號前去常潤己去裝載南来之人早令至行在朕以此未敢獨享宫壼之安仰有司於後殿御閤朕當自處其中以俟衣冠兵衛士庻老小咸造行在方御寢殿其三省日下出黃榜曉示下儉約詔詔曰朕以凉昧荐歴險難深惟不徳天未悔祸是有倉卒南渡駐於江浙念國勢之益削慨宗廟之僅存雖政事宜有改更在朕躬尤當省懼自今以徃當變祸為福下慰人意易危為安所有應縁供奉禁省専属朕身如儀物之飾膳羞之奉有司痛行裁省必遵菲薄其後宫除有職事掌管人不可减放外其餘悉行减放各聽從便仰三省行下體朕至誠之意十六日乙丑徳音朕以𦕈末獲承至尊徳不足以惠綏黎民武不足以戡定亂畧謂言行可以動天地而朕卑辭屈禮未能交南北之情謂孝弟可以通神眀而朕焦心勞思莫能拯父兄之難比軍書之告警駭敵國之長驅尚未定約於一言敢憚避師於三舍而事出倉卒民用震驚官寮頓仆而失容老稚奔逃而係路實由菲徳昧於逺圖方當走集之衝坐成控扼之勢候載書之不食即反斾以言旋惟道途次舍多供億之煩而師徒扈從有征行之苦民靡寕於農業士或後於軍期宜沛湛㤙蕩宥多辟於􅃧同三十而卜世東都實㑹於諸侯漢二百而中天南陽乃興於王業惟上帝之所命豈朕躬之敢圖尚頼臣民各宣忠力庻資羣䇿協濟多艱咨爾多方欽予至意黄潜善汪伯彦再乞罷黜臣等近已具剳子乞賜竄殛伏䝉聖慈時降詔書不允臣惶惧震越若無所容陛下體堯舜之愛人法禹湯之罪已徳至厚矣在臣等愈不遑安便當􅁇上封章不敢就職伏念臣等從陛下於軍旅之中後叨近輔中原未奠外患不寕陛下未至於安平之地則臣等未可自便前此雖勢危力􅉵而不肯遽捨陛下而求去者臣等義分非他人比也今謀國於艱難之時不能弭患而脫身於顛沛之際反𫉬便私則前日不勝任之罪猶云愛君而今日為自謀之情無乃私已非惟公義不貸臣等固不忍道也臣等不敢止用常札再有奏陳所有臣等誤國之罪終不可逭陛下公天下之法終不可廢今日之祸患稍寕即當再申前請必兾明正典刑以厭公議十八日丁邜御史中丞張澂論黃潜善汪伯彦乞重賜竄黜奏曰臣聞忠臣不避誅竄故能為國督姦盡言不諱以申天下之誼明主不吝廢置故能惟辟作威自奮剛㫁以聳天下之望臣謹按左僕射黄潜善右僕射汪伯彦本無物望亦乏才術以甞從陛下於艱難中因縁􅃂任躐持政柄而相業無聞國歩日窘陛下䝉塵於外宗社危逼天下之人聞之者憤怒切齒見之者㦸手唾罵且謂陛下甫次餘杭必亟正典刑以謝海内而數月以来信任如故中外怖駭未知死所臣備位言責既不能早正白簡今豈敢尚仍緘黙以重誤陛下謹條列潜善伯彦大罪二十皆顯有實跡不可誣者正月三十日閆瑾申有敵騎三十人至泗洲行在之人無不願出兵抗禦及願乘輿渡江潜善等初無措置但固留陛下不早南渡至初三日探報敵騎在近始倉皇移蹕匹馬扁舟艱危甚矣致萬乗䝉塵其罪一也車駕倉惶渡江士大夫并其家属禁衛五軍百司人吏老㓜等随從不及或遇賊或溺江或被擄慟哭之聲震於原野嗟怨之聲殆不堪聞又前此六宫渡江已乆忽於正月二十一日降指揮見任寄居官不得搬家立法過嚴議者咸云天子六宫過江静處我軰骨肉豈不是人致行在士大夫畏其指揮之嚴不敢搬家一旦多被敵人俘掠使歸怨人主其罪二也車駕駐蹕維揚淮甸之人奔走奉事亦既二年一旦遽然渡江是委一郡生靈扵敵而不恤也若士夫若兵衛若民庶無不憤恨􅄐心聞自真楚通㤗扵江南州縣皆碎扵潰兵其祸亂之滋豈止一掦州而已哉重失人心其罪三也祖宗神主神御自合先六宫南渡潜善等無寅奉宗廟之意並不措畫一旦車駕起僅一兩卒舁致傾揺暴露行道之人酸鼻下淚人謀不臧禍及在天豈不痛哉宗廟顛沛其罪四也建炎初年自河南西京鄭州拱州遭金人殘破餘皆無恙自潜善等柄任已来西則五路京師東則澶衛京東今日殘一州明日陷一郡直至淮上所存者十無一二其罪五也士大夫既不預知南渡之期又不敢先次亟行一旦流􅄐東西斃扵道路如司農寺官黄鍔史徽范浩等並遭亂兵屠殺而從臣常有未到者職事者徃徃不来殆可憂疑衣冠遇害其罪六也揚州行在月給軍兵費無慮百萬本以待戰守之用一旦敵以輕騎渉境並不措置迎戰又江津渡濟不時一旦潰兵千百為羣流毒東南其害未止軍兵潰散其罪七也揚州左藏庫金銀絹帛數目甚多聞前此打角要扵搬發潜善等力沮渡江之議不令装搬三月一日敵騎已廹尚指揮且搬三分之一􅃱出門入閘候潮種種留滯不時過江盡為敵有聞内帑有金亦搬運不及皆民之脂血何縁復得府庫耗散其罪八也敵騎既破濮州痛行殺戮幾同洗城於是聞得北京東平望風不守奪門而去雖僅脫敵禍而老小奔渡殍於道塗者不可勝計如近日自揚州而至江上壮者敵騎驅之以行老弱者殺之而去今市井行哭之人非其子弟則其親属生靈塗炭其罪九也謝克家李擢俱曽受僞命謝克家李擢㦯除職得郡㦯復官領宫祠如李㑹則反分司居住更不問着公議尤所切齒盖克家擢所惡與潜善等所惡士大夫献言者同己則不次升擢異已則輙遭含怒至有問及禦敵事者云朝廷自有措置峻拒而力却之以至今日狼狽如此而潜善等尤䕶短飾非莫肯虗心以来衆善尤嫉人之有技不納衆善其罪十也潜善王黼之客伯彦曽受梁子羙提挈故今日梁姓而得差遣者滿天下皆據重任割膏腴之地如楊梁祖為發運使尤為猥惡其黨更相扶助欲傾正人而李處遯尤為親戚用事士大夫無不側目畏之植黨分朋牢不可破其罪十一也言官奏疏以國危乞大詢衆庶凡再上再降出方肯施行扵是職事官以上言時病者甚多潜善等以謀不自已出又身為宰相􅃱大詢及衆内懐不平遂奏乞降付御史䑓抄節申尚書省人莫不怪之其罪十二也又如曾闕論潜善無名進職事係國體潜善兄弟大怒而中書舍人黃唐付行誥詞極口稱羙潜善等遽擢唐付兄唐俊為鴻臚少卿以示同已獲利之意用朝廷名爵以脇士大夫人咸笑其淺妄専行私意不勝其公其罪十三也行在百司毎視事京師京師有百司月費两處不减以廵幸而置御營使司則樞宻院為虗設以廵幸而置廵舉財用則戸部為備員皆官属人吏兵卒耗費無絲毫之補設官重復耗蠧國用其罪十四也故右丞許景衡陳渡江之議潜善等極力排斥景衡恨憤而六宮過江人皆曰雖斥景衡猶用其説也六宮過江已乆行在見謀􅁇徃乃忽下指揮見任官不得搬家人皆怪怨又如敵騎駸駸回北乃多遣使求和並不曾以一事諉使人藉口使人莫知所為政事乖謬人輙譏笑其罪十五也蔡京王黼為相日曾差衛從人兵至今論者未已潜善等一身兼御營使為廣占親兵置戰士於㳺惰之地各不下數百而潜善獨占千餘人皆以為緩急之助不知名分嫌疑之辨多占兵衞不避嫌疑其罪十六也自古敵人相拒全藉斥堠潜善等計不知此東京斥堠委之郡守自京師至南京至泗州道路遥逺皆未嘗多以金帛專遣有心力行止人探刺真確止是道聼途説便指為實致車駕䝉塵狼狽如此其罪十七也金人犯東平既破其勢已作東来之計潜善等得閻瑾便宜請渡江之期乃飾非遂過尚扵初二日懇留車駕少待初三日陛下出門當時若少遲留定遭衝突議者謂潜善等以渡江為下䇿曾未有中䇿可以勝之敵騎已逼尚敢挽留車駕其罪十八也同知樞宻院盧益與王黼素有狎邪之舊黼用為尚書東平之政乖謬冠於一時去年自散官安置中輙乞求来揚州畢其私事其意實為進用潜善果驟引為八座未乆俄聞伯彦引為樞副已而伯彦之客以朝献讀祝文失於恭恪言者方欲論列潜善等既為伯彦荐於朝擢起居郎矣遂除集英殿修撰自來二使有罪補外未有除集撰者伯彦之黨潜善引之潜善之客伯彦荐之二人朋比專務欺君其罪十九也宰相之職無所不統水旱蝗螟則䇿免盗賦竊發干犯則免潜善等使車駕䝉塵如此尚敢出入傳呼宰相張盖乘馬略不知亷耻之節致搢紳指目譏誚幾不容口是能為陛下立政造事保安國事乎國家殆辱恬不知耻其罪二十也臣獨以空疎䝉被親擢職在風憲實負天下之責今日陛下蒙塵臣首當赴死顧臣前此數為陛下謀渡江之事宸𠂻輙加采納但為潜善等沮遏然主憂臣辱主辱臣死固不係於言用不用潜善等之罪臣誼當彈劾伏望陛下以一已安危為不足深念而以二百年基業為可憂以一時顛躓為不足深慮而以失億兆之心為可懼若不痛革前弊力新逺圖别為經理之謀臣未見其有濟也然痛革前弊力新逺圖非盡逐潜善伯彦軰天下决未肯信服陛下之令其黃潜善汪伯彦伏望重賜竄黜以囬上天之怒以收億兆之心然後改命易方稍圖興復盡斥浮濫一歸簡嚴寛䘏黎元輕徭薄賦作新軍旅選将待時庶幾數年之間漸振安平之業倘陛下尚存體貎未忍棄捐則七廟神靈恐無係托之地忠義之士莫知繫属之歸陛下孤立一身何所稅駕臣之言激切肝膺震潰唯望剛㫁早賜處分汪伯彦乞罷責剳子曰臣近具剳子措置臣雖登揆路日淺偶在病假幾月而備員帷幄初閲二年輔賛無状乞正典刑未䝉俞􅁢臣恐懼震越愈不遑安然以謀國於艱難之時不能防弭而脫身於顛沛之際反獲便私不敢不體聖意已具負國之罪終不可逭陛下公天下之法終不可廢候今日之禍患稍寕乞重竄殛訖今月十八日尚書省據御史中丞張澂状已進内剳子論臣與黃潜善等致主上蒙塵宗杜危逼乞重賜黜責實當公議伏乞檢㑹臣初奏事理速賜施行以公天下臣更不供職以俟威㫁三朝北盟㑹編卷一百二十二
