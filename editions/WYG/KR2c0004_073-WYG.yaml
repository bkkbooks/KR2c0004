body:
  text: 三朝北盟㑹編卷七十三宋徐夢莘撰靖康中帙起靖康元年十二月二十三日甲申盡二十九日庚寅知磁州宗澤以兵至北京宗澤自將二千人至北京王巡撫如信德府王諭澤供副元帥職事二十三日甲申金人索監書蔵經蘇黄文及古文書資治通鑑諸書金人指名取索書籍甚多又取蘇文墨蹟及古文書籍開封府披撥見錢収買又直取於書籍鋪簽書樞宻院事曺輔至興仁府訪尋康王二十三日知興仁府曽楙申大金軍前差簽書樞宻院事曹輔前來本府訪尋康王所在并録曰曺輔所傳蠟封皇帝手詔曰金人已登城歛兵不下見議通和卿等領兵未可輕動恐徒誤國并樞宻院劄付礬書大金已通和猶未退師諸路勤王人兵可且於稍近三五程間駐劄候師退日放散朝野簽言曰初二日敵遣使乞令人於河北召康王使者傳云聞康王已占據河北之地恐河北州軍恃王不肯交割請遣人迎之是時金人已懐廢立之意而朝廷大臣無有覺悟者何􅙫奏上乃遣簽書樞宻院曺輔由京東詣河北迎康王何􅙫令人於曺輔衣襟上以礬書為詔以遺康王為朝廷人每出金人搜索文字蠟書故以礬書帛入水方見曹輔東至曹州見守臣曽懋說大金已登城講和歛兵不下曽懋詰曹輔曰金人既已至此豈有登城歛兵不下者乎公等家屬必為所掠脅之使為此言輔乃裂衣襟令懋㸔以逹元帥次借州印以發四方撫諭文字數日取曹州守臣軍令狀囘稱不知康王所在至金人軍前復發入城二十四日乙酉尼堪斡里雅布遣書來索金銀表叚犒軍書榜示於市朝野僉言避戎夜話曰固倫尼伊拉齊貝勒左副元帥謹致書於大宋皇帝提師逺涉惟頼金銀犒設軍兵近日差官入京城檢視府庫蔵積絹一色約有一千四百萬疋於内准偹取犒賞所須一千萬疋今來承示披尋深意恐似有妨取索假以為辭於理未安初破城時本議縱兵但縁不忍以致約束今欲犒賞諸軍議定合金一百萬錠銀五百萬叚子衣絹不下數官私早望依數應付見在府庫絹如見有唯依所須之數金銀叚子亦依所須此外亦不必取累承示諭金帛豐耗騐今所諭似謬前言且冀亮悉無多浮辭專奉書啓逹不宣謹言榜曰今備録到國書在前勘合大金軍既登城歛兵不下保全一城生靈㤙德甚厚犒軍金銀表叚自當竭力應付除内蔵豐元庫及龍德兩宫御前皇后閣皇太子宫并臣僚之家已根括到數目外大叚闕少今曉諭權貴戚里豪富之家及凡有金銀表叚人戶各仰體認大金之㤙疋兩已上盡行輸納差王時雍管東北壁徐秉哲管西南壁陳求道余大均管東北壁王詔受納王及之管北壁李佩受納王宗業分管西壁李禱受納張著胡思管南壁并受納依諸家元納到封頭斤重交與受納官秤數交割大軍前如敢隐留仍許諸色人告以一分給賞雖奴婢告主亦不坐罪仍令逐便給賞官吏乞覔並仰一靣措置施行張慤除延康殿學士知大名府慤為河北都運使充随軍應付忽准告除延康殿學士知大名府難以隨軍乃差河北轉運判官顧大夫隨軍應付仍日下隨副元帥宗澤前去開封府知洺州王麟以兵至北京王麟自將一千人至元帥府自陳母老無兼侍又以疾謁告乞還守洺州王語僚屬曰麟有異志耶卒許其歸以麟府部兵撥𨽻副元帥宗澤後聞麟歸洺金人至以城降為軍民所殺并及其家二十五日丙戍掲榜云失人口之家許陳狀詣軍前認識榜云應被討擄去失人口之家願往軍前識認及以物贖者並㑹於東西塔院同詣尚書省陳狀前去俄頃西塔院㑹集者無慮數萬人官司以人多難遣逐収榜不行人各散去是日金人來呌醫甚遽斡里雅布苦目疾詔以翰林醫官視之金人圍相州金人知大元帥在相州乃遣人圍之自京師取汪伯彦男大理寺丞汪似壻都水監丞梁汝霖丙戌至城下要議割地是時王已駐北京聞金人圍相州也曰昨耿南仲擇十四日離相州否則將若之何南仲曰此天誘臣衷方以功業授大王臣何力之有焉初王在相州也都郡有乞召募民兵者不已上書轅門往往乞空頭官牒以自圖利相州有鶴壁村田氏南平李氏平羅蘭氏皆大族依山設險保聚居民至有作院造軍器作釣橋罍石為城以守禦者或建議若招致民兵可得數十萬人南仲與汪伯彦等議遣巡尉賫幣帛酒等聘之既至皆補官又以空頭官牒數百以往王從之王離相州日無一人至至是金人圍相州諸姓皆受木牌子從偽矣許百官乘轎尚書省今月二十四日奉聖㫖勘㑹百官馬既行根括殆盡不可歩行今檢政和三年大雪例許乘轎子出入仍不得入皇城門右劄付開封府出榜曉示者天寳寺火是夜火燒天寳寺㳂燒居民五百餘家二十六日丁亥詔鬻爵及僧道紫衣師號根括金銀甚𦂳急尚慮士庶之家隠吝不納乃詔鬻爵開列官爵價值募人承認乃僧道紫衣號等無應募者金人入國子監取書凢王安石説棄之二十七日戊子金人遣二十一人詣大相國寺燒香禮佛而去時大相國寺智海禪院僧守一為金人邀詣寨問佛法大意甚喜約以北行告歸治裝還寺沐浴登坐别衆坐化人甚異之金遣二十一人持香入相國寺供佛賜金千緡以𦵏金使登樓閣移時而去或為守一而來副元帥宗澤軍於開德王命副元帥宗澤軍於開德府是日發中軍澤領所部磁州軍民兵二千洺州軍兵一千揚言康王在軍以都統制陳淬統制前一日先鋒統制劉浩改差充副元帥前軍統領右軍統制尚功緒改差副元帥下左軍統領各將帶本部二千人起發後一日以常景充副元帥下右軍統領將帶本部二千改差王孝忠充副元帥下後軍統領將帶本部一千並於開德府駐劄二十八日己丑金人索劉晏四人賻贈銀絹各五百疋兩先是金人索四人之尸以骨還之至是索此賻贈知博州孫振領兵三千至冦氏縣知深州姚鵬領兵二千至陶縣孫振姚鵬各具申率領軍民迤邐前赴帥府王命振鵬前徃濮州駐劄吕剛中吕時中以募兵侵欺不實送宗澤自効日記曰初京城未陷時有進士何烈者為監察御史張所謀於朝廷遣吕剛中時中兄弟二人潰圍出城賫蠟書往河北招効用王在相州日剛中時中過相州王取所差劄子帛書觀之乃言委剛中時中兄弟起兵不屬元帥府節制所給錢糧其末云招集民兵保義郎閤門祗候吕時中提領監察御史張所都大縂領右僕射何􅙫更攜御前降到𣙜貨務兊便塩錢空頭闗子三十萬緡王笑而遣之剛中洺州人應武舉縁京城圍閉獻陳召募徒為文具至是方到大名府城下狀申帥府前去洺州召募到義士一萬人部領前來已到館陶縣劄寨契勘元朝㫖召到人州縣應付錢米毎名日支米二升塩菜錢三百文節級米三升錢五百文部轄使臣米三升錢七百文乞判送大名府出給厯頭據人數批勘王指揮剛中所召募義士仰日下部領至城下駐劄宻使人伺察但有五百人其他以諸山寨水寨保聚民兵姓名収為虚數椿以批請實無其人問所攜𣙜貨務闗子所存無幾送剛中時中下大名獄委張慤推勘根究要見官錢下落實有侵欺屬金人攻開德曹濮等州遂以剛中時中送宗澤自効二十九日庚寅詔許民毁拆萬嵗山屋宇為薪泣血録曰是時天多寒上念軍民之不易且恨朱勔之屬勞民力而運花石也詔樵採花木與民為薪應斑竹紫筠舘丁香障酴醿洞香橘林梅花嶺瑞香苑碧花澗翠雲洞等百餘所及竒徑松柏檜木橘柚花栁一採殆盡至是又詔毁折屋宇以充薪軍民奔赴互相攘奪先是城陷日金使八人常留宿都堂議事詔以從官伴之是日金使方食而軍民毁拆絳霄樓閣其喧呼之聲聞於逺邇又有蹂踐墜壓至死者坐客棄筯而金使問其故或以實對金使笑曰使民相争則強者得弱者失兼又墜壓致損人命何為不官拆以散之伴食者唯唯無對丁時起曰嗟乎聖天子屏去園囿之觀縱民樵採可謂盛德而奉行之吏曽無經畫欲利於民却因而反害之取笑於鄰國是可歎也大元帥發北京日記曰先是王聚幕府僚屬議所向宗澤請直趍開德府次第進寨以解京城之圍汪伯彦曰金人數十萬衆聚京城下周圍四壁各把定要害自開德府之南四十里曰衛南縣京城下劄連珠寨督遣人硬探水泄不通除五軍過河五軍保衛大王外續収才一萬三千人其間召募民兵又居其半如何徑要解圍事須量力只今未說解圍且先要泊得大王去處稳當然後促河北所檄諸郡及檄京東諸郡人兵俟其皆來㑹合以當東北靣更檄宣緫司陜西江淮勤王師帥以當西南靣約日俱進聲援相解乃可解圍况金人河上絡繹往來開德不是大王安治去處大名亦去河咫尺不可久住欲差發數頭頂軍民之兵前去興仁開德府濮州諸處屯泊大王安治去處大王往東平府措身於安地身安則國難可圖耿南仲延禧高世則等無異論更召諸將問之諸將亦以為然王遂議往東平府先遣副元帥宗澤往開德三日發五軍皆盡庚寅王遂發進楊青代劉浩為先鋒統制是夜宿於大王寨是日嵗除物價翔貴市店皆閉細民無食凍餓交横是月王在党忠薛廣祝進等擾於京西河北幼老春秋曰京城失守禁卒潰散有自萬勝門出得路而逃者皆羣聚刼擾州縣有王在黨忠共攻隨州官吏居民皆棄財物於道路奔入大洪山奔走不及者皆為在等驅擄而去在及忠驅掠未盡者有薛廣繼至隨州刼掠罄盡在焚隨州又驅強壯為兵㑹祝進攻德安廣擾郢州漸入復州界中往來於隨州德安之間王在党忠薛廣皆班直祝進乃郭京之部曲也三朝北盟㑹編卷七十三
