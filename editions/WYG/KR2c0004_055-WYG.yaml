body:
  text: 三朝北盟㑹編巻五十五宋徐夢莘撰靖康中帙起靖康元年九月十五日戊寅盡十九日壬午十五日戊寅李若水見尼堪于榆次縣靖康大金山西軍前和議日録靖康元年八月二十四日若水等被㫖日下出門差往大金山西軍前和議九月初一日長行十五日次太原府榆次縣見大金舘伴使蕭慶呼太師副使劉思呼尚書前來相見問勞甚勤慶曰使副們縁何事來若水曰某等為和議來慶曰有國書若水曰有書慶曰國書外莫别有議者事否若有須當先去譯知國相元帥為使國相謂尼堪也盖前次邵侍郎等一畨奉使謂邵溥到來初間問他道國書外莫别有議者事否渠言無及見國相却有面議之事臨時甚是艱難要使副知若水曰某等來時面奉本朝皇帝聖㫖令若水等再三啟白國相元帥前次奸臣誤國無有施行今日分差内畨使人前來謂王雲馬識逺也以道志誠悔悟之意願國相元帥以生靈為念盟好為心早與通和則天下幸甚慶曰容其等先為譯知國相若水等稱諾乃歸幕次近晩伴使來傳語二人請排禮物土物來早見國相次日譯語二人前來引請若水等齎國書押禮物土物入軍見國相行次中門列甲兵兩行至帳前幕次下馬伴使來接迎慶曰國相先令來問使副一事趙良嗣係遼國人是上皇時可上可下者人今不知在何處若水曰趙良嗣今已謫過嶺南去矣慶曰不知㡬時被謫若水曰不是去年冬即是今年春亦未甚記得仔細也慶曰國相又教先來取國書王履曰國書當某等親見國相面投方是若水曰和議正要情通先納過書去亦何害若水遂搢笏出國書與慶慶恭領之即曰使副且此少待容慶等先去見國相若水等坐幕中少間譯語官一人來云國相請使副若水等令賫禮物土物詣前與國相相見叙禮訖若水曰某等來時面奉本朝皇帝聖㫖令若水等伸問國相元帥新寒台候萬福國相恭受禮訖復曰使副們來時貴朝皇帝聖躬萬福若水曰某等來時本朝皇帝聖躬萬福若水曰某等來時面奉本朝皇帝聖訓令若水等再三啟白國相元帥前次奸臣誤國㬠有施行今者分差兩畨使人前來以道志誠悔悟之意願國相元帥以生靈為念盟好為心早與通和天下幸甚國相曰那收燕山時殺了底許多人是生靈也王履曰國相若追思往事一一細較即使使人何以為詞若水曰某等面奉本朝皇帝聖訓令某等再三啟白國相元帥今欲以三鎮逐年所收租賦悉奉貴朝願休兵講好國相厲聲曰既有城下之盟許割與他三鎮那租賦便是這裏底怎生更上説也若如此便是敗盟不割三鎮若水曰盖縁三鎮軍民未肯交割故欲將逐年租賦奉貴朝其利一也止是愛省事幸國相元帥開納國相曰公門不去勸諌貴朝皇帝教早割與他三鎮土地人民便是好公事却來這裏弄唇舌想稍空恐使不得稍空謂脫空也履曰本朝今則㬠有忠義之士輔佐今聖與昔日事體不同使人說得是與不是實與不實如何暪得國相元帥國相約若水等坐左右曰國相請使副與伴使就幕次相聚若水等退伴使迎接若水等過右帳下酒三行勸一鍾慶曰國相令某等伸問奉使使副為軍行不及為待幸眀察若水等稱皇恐慶曰夜來天氣大叚寒了未知中原如何履曰東都尚未挾纊慶曰南北天氣如此之異慶曰使副見國相所議如何若水具道前言思曰國相道有城下之約故提兵専來若不割得三鎮土地人民將有何面目歸去見國人履曰某等已曽啟白國相元帥非是本朝不割三鎮土地人民盖縁三鎮軍民未肯交割故欲以租賦奉貴朝免得交兵生靈之幸慶曰但恐不可若水等退少頃國相令人傳語送羊二羫酒三十瓶錢一百貫與使副洗塵第三日早若水等詣軍前謝國相訖若水曰某等昨日甞以國事上冐台嚴欲望台慈以生靈為念早為通和則天下之幸甚國相曰貴朝當今之時譬如著棊一叚既敗則補其餘若顧惜恐一齊帶累了不可知若水曰本朝若顧惜又豈肯以三鎮租賦奉貴朝也國相曰不須巧說遂揖若水等坐國相曰使副們行甚路來履曰某等由井陘來國相曰聞此路險阻不能通車果否履曰然國相又曰去嵗聞解制置謂解􅅗也統兵守井陘路不戰而兵潰何也豈其險而不持而兵不堪用乎履曰去年帥被㫖到河北兩路㸃集沿邊弓手保甲繼聞兩國通和隨時放散即非不戰而潰况亦不曽守井陘路恐是傳之者妄耳國相又曰使副們來時黄河凍未若水曰大河須極寒方凍國相曰使副們何處人氏在鄉里時以何為生若水曰某乃洺州人履曰某乃汴都人若水曰某等在鄉中時皆以讀書為活國相謂履曰使副既知書何故作右官履曰讀書無成乃困武弁國相舉詩一聨近來漸覺家風好兒讀書聲女織聲若水曰敢問國相元帥仙里台眷安在國相顰眉曰祖鄉在瀋州骨肉昨因契丹征遼東時皆被害近方得一小女子履曰以此見兵革豈是好事履又曰陶淵明所謂弱女雖非男慰情良勝無國相目属履乆之若水等退是晚伴使來相見慶曰適來國相曰此畨使副㬠忠鯁聰明只是所議不肯說盡話若水曰某等所奉聖㫖止是如此不敢虚誑更幸太師尚書因見國相再為禀知慶曰當如所戒慶等退第四日早若水等再見國相若水曰某等兹者特來議和欲便兩國區區之意己甞禀知敢望國相元帥早與開從國相曰待國書中答去若水曰和議事大恐國書中不能盡曲折幸國相元帥面諭可否國相曰亦苦無多事履曰某等恭傳得本朝皇帝至誠之意逺來議和須得國相元帥端的言語歸去便是使人不失職國相曰若不割得三鎮土地人民决不可和履曰國相若堅執不回使使人何計則是國相曰使副不若且歸休若水曰縱使某等歸去將何面目敢見本朝皇帝縱見將何以為詞更望國相元帥曲全兩國之羙國相曰不須忉怛若水退第五日早若水等再見國相方欲起言和議國相遽約若水等坐國相曰已作國書了命左右取到遂傳與若水不得已搢笏領之國相曰使副們少間便囬如到京師煩為再三奏知貴朝皇帝承遣使命逺來頒示宸翰及禮物等不勝感荷為軍行無物貢謝伏望睿察所諭三鎮租賦不須言及若差人速來交割土地人民即便回軍通和萬一不從須索提兵直到汴京理㑹也若水等又欲起議國相作色曰已在言前不必再三若水等見事勢不可即曰容若水等來日謝辭了國相即行國相曰不必講此禮使副即今可便行若水等稱諾乃歸與國相叙别歸幕次國相令譯語官二人前去云國相傳語使副承逺來無以為謝白馬一疋并銀鞍䘖一副將花羅三十疋香藥一合上正使侍郎烏馬一疋并銀鞍䘖一副將花羅三十疋納竒實二十疋香藥一合上副使觀察更有酒一百瓶錢二百貫犒設一行官吏若水等辭不敢受伴使來相見曰此事奉使合得之物不可壊却常例若水等不得己收之伴使相送及五里許置酒五盃餞别勸一鍾慶曰國相令某等再三致意使副承逺來為軍行無以為待望見察若水曰某等此來上荷國相元帥尚書台眷如伴使歸見國相煩斥若水等名致謝慶曰謹領台命叙别乃行十一月十一日歸次國門次日不隔班引見對於崇政殿十九日壬午李綱罷宣撫使除觀文殿學士知揚州李綱以宣撫使屯于懐州也諸將皆敗太原失守綱將士多叛去金人乘之遂大敗而還上怒遂罷綱使知揚州傳信録曰初敵騎既出境即遣王雲曹矇使金人軍中議以三鎮人民不肯割地之約至是遣回有許意其實以疑我師非誠言也朝廷信之耿南仲唐恪尤主其議意謂非歸租賦則割地以贍之和議可决成乃詔宣撫司不得輕易進兵而議和之使紛然於道路矣既而徐處仁吳敏罷相而許翰罷同知樞宻院而用聶山陳過庭李回等吳敏復以内禪事言者謂承蔡攸宻㫖及初除門下侍郎亦蔡攸矯制為之授散官安置涪州余竊又歎曰事已不可為矣因入表劄奏狀丐罷初唐恪謀出余於外則處仁敏翰可以計去去此數人者則余亦不能乆留也至是皆如其䇿章數上猶降詔批答不允余具奏力道所以材力不勝任者且得昬憒之疾不罷决誤國事亦併叙曩日榻前之語於是上命种師道以同知樞宻院事廵邊交割宣撫司職事召余赴闕且俾沿河廵視防守之具余連上章乞罷知宻院事守本官致仕行至封邱縣得尚書省劄子有㫖除觀文殿學士知揚州時九月間也余具奏辭免不敢當具上疏言所以力丏罷者非愛身怯敵之故特事有不可為者難以虛受其責如宣撫得兵若干防秋兵若干屯駐人處皆不曽用始朝廷應副銀絹若干又御前降到若干除支官兵食錢并犒賞外皆椿留懐州及在京降賜庫具有籍可考可按臣既罷去恐不知者以謂臣䘮師費財惟陛下遣使覈實雖臣自以不才丐罷益擇將帥撫馭士卒與之捍敵金人叵測謀慮不誠和議未可専恃一失士卒心無與禦侮則天下之勢去矣臣自此不復預國論敢冐犯以聞既而果有其言中書舍人劉珏奏准中書省送到詞頭一道中書舍人安扶奏准詞頭李綱除觀文殿學士知揚州李綱輕脫寡謀强執自任前後敗師覆將非一所有詞頭未敢具草奉聖㫖令以次舍人行下者臣伏見仁祖朝韓琦以直學士經畧陜西而好水之戰任福劉平皆殘于陣士卒死者甚衆仁祖非不知諸將違琦節制致敗也雖善其皆合事機然猶坐降一官神祖朝韓絳以次輔宣撫西邊兵將深入荒域卒至駭擾横罹戰傷神祖非不知絳之推忠盡瘁也雖元情無他然亦罷相止以舊秩出守鄧州盖人君陟降如天無心雖知其才能之可用忠赤之可倚或有過焉不可不加黜罷也竊見李綱勇於報國鋭於用兵而聼用不審數有敗衂是致士氣益䘮敵勢益張其罪益著矣陛下亮綱用心無他因其有請寵加峻職授以便郡雖臣寮繳奏復命以次命詞行下於此見陛下厚於記功薄於責過也然綱此行敗軍覆將耗財疲民非特如韓琦好水之敗韓絳西邊之失其可不加黜責以示懲戒乎臣至愚不肖甞慕范仲淹之中正仰事陛下非敢於綱敗事之後從而下石也但朝廷典刑不可不正如陛下念綱之勞所在記録察綱今日之敗志在殱敵亦宜黜官降職以慰死者之心為敗事之戒既不以今日之失而遂㤀其前日之勞而曲庇其罪戻賞罰昭著如天無私則將帥聞之莫不感激思奮而敵勢有可平之期矣所有詞頭臣未敢具草臣寮上言新除觀文殿學士知揚州李綱本以凡才誤膺器使卵翼扵蔡氏之門傾心死黨逮上皇將有内禪之意攸先刺引綱為援使冐䇿立功而綱之罪狀有不可掩者臣請為陛下數之太上皇心存道奥倦聼萬機陛下以元子受天寳位臣下何與焉乃敢貪天之功以為己力此其罪一也金人之兵傳於城下逮西師之至彼且心懼氣懾不敢肆行抄掠莫測西兵之多寡强弱兩軍相持則易於和議矣綱乃妄意一勝逮姚平仲之挫衂使之復逞虎狼之心其罪二也王孝廸掲榜取民金寳京都之民為之騷動朝廷大議已定不復取於民而綱自取文牓以為功身為大官躬詣大肆以收前牓竊譽兵民使怨歸公上其罪三也兵既妄動朝廷不得已暫行罷免為之死黨者嘿諭其意力率士庻伏闕乞用李綱脅持君父㡬至變亂其罪四也身領守禦不知體國假君爵䘵以市私恩四壁之賞太濫㡬至數千人而親戚故舊或濫轉官資或白身授官鮮有遺者此其罪五也隂與吳敏黨庇蔡氏薦京入對上皇之歸也力引蔡氏俾還京國蹤跡詭秘其遺攸書則有宻語不敢忘之說即不知所謂宻語者何事此其罪六也自謂功多排斥同列任情好惡妄作威福致陛下有惟辟作福惟辟作威之戒此其罪七也身為樞輔知術疎淺不能逆詐輙以蠟書付金國之使妄結伊都使金人復加怨憤抄掠吾民致河北河東之敵未平此其罪八也陛下以种師中之敗及遣臣宣撫河東而綱輙敢拒抗君命㡬于䟦扈此其罪九也逮其澤孟不務持重以量兵勢惟以軍法督戰遂致解􅅗之兵潰散挫衂卒無尺寸之功以致并門失守此其罪十也古人所謂口尚乳臭者其綱之謂乎且其用軍行兵徒知襲童貫之迹妄自尊大為僚佐罕見其面獨智不能用賢果致敗衂損國之威使金人復擾河朔致朝廷再遣使和議欲誅厥由咎將誰執伏望陛下早正十罪大奮乾剛特賜竄黜為人臣懐私誤國之戒李綱提舉杭州洞霄宫宣和録曰臣寮上言切見新除觀文殿學士知揚州李綱輕脫寡謀强執自任専主用兵之議而無勝筭竒畫及陛下命宣撫之任日冀其有功而前後敗軍覆將非一用耗邦之財不可數計綱亦知其罪而自列矣陛下復加以寵召使守郡此臣所未喻也奉聖㫖李綱差提舉杭州洞霄宫又臣寮上言謹按前知樞宻院事李綱首兵以解太原之圍凡戰守之䇿一切聼之不從中覆也而方畧乖謬節制無術出師輙敗取辱敵人太原失守天下寒心綱匿而不言近世大將誤國辱朝未有若綱之甚者奏議有曰若棄太原乞降御筆手詔綱遷延懐州弗力救援乃欲以棄地之事歸之君父以逭其責懐奸如此且綱妄庸人耳平時諂事蔡京蔡攸結為死黨其為守禦司也京在城外遂以守禦之卒假京給使方君父在圍城中正賴其衆以為守偹綱乃資以元惡大憝不忠甚矣其迎上皇于南都也與攸耳語移時蹤跡詭秘不可具言迨其還朝力欲援攸亦居政府中外洶洶莫知所為賴陛下察見攸姦不使入城然後人心翕然以定若綱言遂行而攸復用其禍可勝計哉今年正月金人至畿甸旋即和議既而勤王之師四面輻輳金人恐懼求去有日矣而三鎮詔書初未與也綱自以和議既成無以為功遂與姚平仲同建刼寨之䇿一敗墮地朝廷不得已遂與三鎮詔書興言及此可為慨然陛下隆寛廣愛薄綱之罪止于罷位而綱遂使其黨張燾馮檝方元若余應求陳公輔之徒鼓惑衆聼唱為伏闕之事㡬至大變其初王孝廸刼民之金以犒敵人諌臣論列陛下重惜民財為罷之綱乃斂恩歸己收其牓以沽小民之譽小民無知以為盡出于綱故伏闕之日聚衆萬餘綱處心如此豈所謂善則稱君也哉今秋金人舉兵再犯邊陲首以綱為言嗚呼綱之罪大矣尚以崇階均逸祠宫非所以示懲也臣愚欲望聖慈正綱之罪授以散員置之逺服以為將帥失職者之戒仍以綱罪惡明諭天下以解愚民之惑三朝北盟㑹編巻五十五
