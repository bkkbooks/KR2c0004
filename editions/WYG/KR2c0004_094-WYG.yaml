body:
  text: 三朝北盟㑹編卷九十四宋徐夢莘撰靖康中帙起靖康二年四月十五日甲戌盡二十日己卯十五日甲戌兵馬大元帥府劄子金人邀請二帝北去當府已星夜措置邀迎外契勘金人先於三月初七日抑逼宰相張邦昌僭稱偽號今來邦昌已歸寳退避所有三月八日已後稱中㫖事並不得施行差到官不許放上如闕官即開具狀申以憑差官填闕施行兼自今後凡有公事並須申稟當府與决如有姦詐偽冐可疑文字並不得施行繳連供申大元帥府以顔岐充大元帥府㕘議康周望為王府記室李綱傳檄京師檄云與湖南安撫郭三益等㑹合荆南勤王之師旬日得精兵十萬見起發前來勤王開封府散榜曉諭趙子崧勸進第二狀子崧十二十四皆具稟情迫言切上凟王聴必䝉賜察子崧再三思之大王尚未離濟必欲謙遜持重則姦詭之計一日萬變不可少失機㑹兼兩歲用兵人情只思安定若萬一變生何可禦也二帝危辱正坐謀者不􅆇依違失斷玩視幾變一旦禍發四顧不知所出今大王處多故之際天心順助逆人自歸以大軍壓之故未敢變若稍遲疑是天與不取也伏望大王深以社稷為念俯采芻蕘之言速賜進府至京城一舉而定某日决可到城恐城中以計誘致却散大軍未敢委兵趨行府況奔走勸進皆希功幸賞無特操之士某實恥之專以大兵壓城以待鸞旂不勝祈懇誠切之至孫覿為宰執等乞大元帥聴政狀右某伏聞金人深入侵逼郊畿太上皇帝皇帝陛下二聖䝉塵賊臣僭號中外臣子罔不痛心元帥大王徳望在人勲業盛大躬總戎律王室所憑方今道路不通威令阻隔百姓歸命兆民係心大王伏望傳令四方縂决庻務上體二聖屬望之意下答黎庻歸仰之情指揮將臣征伐仇讐収復京邑奉迎乘輿某等情迫于中憂憤所激謹具狀令修武郎王倚保義郎趙子昱奔詣行府申聞某等不勝惶懼激切䖍祈懇禱之至十六日乙亥差路􅁢迪范宗尹使副請車駕進發并差内侍省御藥扶持官閣門皇城司帶衛士班道供帳御府御輦逍遥子及下禮部太常討論車駕至京奉迎禮儀南外宗正事勸進第二狀具位右某近率宗室并行省官吏朝奉大夫權應天少尹叔近等具狀被吿乞兵馬大元帥大王權聴國政事續奉答所請難議施行某等竊以敵深入之後道路隔絶于今半年而二聖播遷宗社無守恭惟大王至親且賢功盖天下羣心所歸實在今日倘䝉俯從衆言以安宗社少紓中外憂憤之情則訓民簡兵邀迎可期若徒欲履正守節而不思祖宗創業之艱難非海内所望于大王也某等迫切之誠寔不能已謹具狀披吿兵馬大元帥大王伏乞王慈早賜􅁢許施行謹狀批答禮備大經存而可考國有常典實不敢渝属王室之艱難當元帥之寄委金人侵逼神􅄊至危惟早墜之是思雖省愆而何補薦聞誠懇祗益兢慙念父兄方冐於燕塵不遑寜處顧臣子輙從于國事豈所當然知國璽之來辭已藏于守者覬鑾輿之復誓必遂于忠心所請難議施行靖康二年四月十六日十七日丙子南外宗正事勸進第三狀具位右某近率宗室叔近等兩具狀乞兵馬大元帥大王權聴國事復奉答語所請難議施行者某等竊以國家幅員萬里承平百年尊君親上之義逺邇無二伏自敵再深入四方不聞詔令今者凡六易月彼既講和將謂京師人人延跂以聆徳音今二聖既行京邑空虚道路相傳莫不撫心號泣誓必邀迎然宗廟社稷不可一日不享臣民萬物不可一日不治政教號令不可一日不行於天下凡此若非大王誰可為者大王為太上皇之子皇帝之弟則親孰親於大王王于大邦兼臨兩鎮而以大元帥之重統天下之兵則貴孰貴于大王聰明仁信温恭勤儉風動海内而忠孝特立亘古所未嘗有則徳孰盛于大王克敵制勝慮無遺策敵熖雖熾畏威而不敢邇則功孰髙于大王為人子為人弟為人臣而鑾輿䝉塵警蹕滋逺神􅄊蕩然人人憂疑則今日之於大王億兆同辭請大王權聴國事乃天人之心大王尚可辭乎大王俯順衆情則國家之綱紀復正徳澤復流政事復修刑威復振内可以防未萌之姦外可以覊不制之敵奉迎二聖可以如天之志矣時不可違機不可失宗社再安在此一舉惟大王深察而孰慮之則天下幸甚某等不勝傒望激切俟命之至謹三具狀披告伏乞王慈早賜允許施行謹狀批答國步艱難金人侵伐鑾輿播越詔令不下無所稟承遐邇之心翕然見属謂天下之權必正於一故連日之請乃至再三雖輿情難以輒違而孝心有所不忍方將徧覽所上詳熟以思俟入京城躬謁宗廟若鑾輿未還即撫定民庻權聴國事宜體兹意無復重陳開封府揭榜曉示种察文狀開封府掲榜云傳到京兆府安撫使劄子據從議郎秦鳯路經畧使司准備將領第一副將本路竒兵勤王种深狀申契勘淮秦鳯路都縂管司劄子及西道都縂管司牒差統制秦鳯路竒兵軍兵前去勤王深伏念在熙秦守官幾二十年漢畨人情委是諳熟今據回紇國大木𤓰心及諸國首領等為金人侵犯南朝官家阿爺木𤓰心等情願自備人馬衣甲口食前去厮殺共約三十萬人馬及其咀咀國亦使忽令族首領結通温來傳送言語要自夏國出來皆由河東前去㑹問撥遣去訖契勘前項諸首領亦為在熙秦累年管當茶場日近相見人情逺邇大叚習熟今來逐人為見深乞前去勤王各自情願自備甲馬口食隨深前去委是赤心忠義兼人馬驍鋭强壯深已指揮各人首領統押分數路前去破敵及已差發得力使臣多賫金帛前去激賞上項首領令取便路兼程起發行前來京師會合伏乞指揮施行小貼子契勘深一行軍馬經過縣鎮民居往往以錢粮犒賞父老多稱前後所過軍馬無此整肅人人皆願隨深前去勤王亦乞照㑹施行胡舜陟劄子乞下詔播告四方臣伏見都城圍閉以來號令不及於四方凡半年有餘矣民間因破城之後將士踰城而出者刼掠州縣自守一方京西河北為之大擾又外路聞二聖北轅皆謂中國無主深慮姦雄竊發有害吾民今已遣使奉迎康王即位當有大霑膏澤天下則變亂自消然臣見尚書省劄子排辦儀衛置造輿輦尚未了畢旬日之間外有變故安可不慮今陛下臨朝聽政臣愚以謂宜先下詔播告四方使天下曉然知中國有主康王即位有破亂臣賊子之心以慰海隅元元之望實宗廟之福不然臣恐詔書稽緩變故横生四海干戈糜沸雲擾都城孤立為患非輕取進止趙子崧繳李健所得尚書省劄子狀據户部員外郎李健等申到太康縣侯所申文字報事須議指揮右勘㑹金人大軍四月初二日起發前去次日即遣武義大夫同恩李興潘謹燾三人同往京東路州探問元帥大王行府所至宻行具覆去後初五日續遣閤門宣賛舍人蔣師愈承務郎程選同王府内知蔡琳等賫手劄文字前去初七日又差吏部侍郎謝克家當軍頭引見司韋淵直秘閣吳何賫玉寳詣行在初十日差尚書左丞馮澥尚書右丞李回充奉迎使副賫文武百僚張邦昌以下勸進表章并元祐皇后手書前去兼今月初一日為奉迎康王未至恭請元祐皇后垂簾聴政以俟復辟于十一日吉辰皇后入居禁中就内東門殿垂簾聴政三省樞宻院官日赴奏事兼大元帥康王行府康王已差到使臣黄永錫同恩等於本月十四日又賫回三省宻院奏狀乞早整鑾輅衛清宫闕訖右劄付户部李郎中等照㑹靖康二年四月十五日押今月十六日午時據李健等備申到十五日尚書省劄子取到真本繳申在前右子崧等節次具狀劄申乞早定大計號令四方事失機㑹悔不可言今來又據李健所得尚書劄子稱初十日已差右丞馮澥等充奉迎使副賫文武百寮張邦昌已下勸進表章并元祐皇后手書前去契勘京師事體既反正唯望大王入主社稷以安生靈遲疑未發事久變生不可不慮或聞議者以謂京師已經殘破不可復入止欲即位軍中便圖遷徙某愚慮深為未便今禍變非常姦偽未戢欲致中興當謹舉措理宜先入京師謁宗廟覲母后明正誅賞降霈四方若京師果不可都自可徐議所向今逡廵猶豫日復一日深恐有誤大計兼母后雖已稱制未肯使出號令四方之逺不知僭偽反正之因士民憂疑姦宄窺伺若更遲留旦暮之間必致别召禍亂伏望詳酌前後所申斷以不疑早賜聴納以慰天人之望小子子崧等前申乞移軍南京當時敵騎未退事勢與今日不同訪聞趙野范訥不戢其下縱令擄掠發掘丘墓人心胥怨又兩軍時有忿爭萬一行府入南京趙范二軍必趋帳下恐有郭汜李傕之變伏乞王慈開納徑還京城早定大計以副人望范瓊除龍神位四廂都指揮使京城四壁都巡檢使范瓊進加軍職以京城圍閉彈壓之功也汪長源亦除閤門宣贊舍人管幹軍頭引見司使臣各傳一官十八日丁丑開封府揭榜曉示副元帥公文開封府揭榜曉示准兵馬副元帥公文當府統率軍兵奉大元帥康王指揮㑹合分遣諸處人馬追襲掩截金人仍令隨事便宜措置自承康王劄子星夜間道速走使臣等徧督河北河東路諸州軍府將合心併力占據要害斷絶橋梁把隘圍擊救迎二聖與諸王皇族并后妃期還宫闕與三軍將校臣子死節誓報國恩亦先下大名府路催諸處人馬將士隨渡徑過與西路人馬相約掩擊去訖契勘自去年十一月後金人登城按甲而假唱和議使四方勤王之師坐待近畿詭詐百出使四方蹤跡不悟致使二帝出郊乃輦載金帛罄竭帑藏以遂欲又邀擁鑾輿及皇族子孫后妃已下踰河北去及至啟得外方覺知四方痛切忠憤呼天號訴日月􅃤色豈金人禍我中國及上累君父竊惟大宋一統天下祖宗功徳滋休太平自古莫比本縁姦臣誤國階怨生隙流毒貽患是至今日以天下之大宗社之重上天眷佑宋垂億萬年其必有大頼公卿將帥一心保䕶廟朝安存士庻以此又見大宋之恩徳甚深未有窮也今大元帥康王忠孝友愛出自天性縂兵於外親擐甲胄冐犯風雨欲戡定國難輯寧方夏㑹諸勤王之兵何啻百萬前此守和信盟以俟敵退王為生靈毎戒輕動暨國家一落敵計蒼天奈何自康王聞此泪盡繼血雖草木無知亦皆悲慟左右開勉莫聞便欲躍馬自奪手格敵人以雪父兄之恥見不住進發人馬嚴督忠義士􅁆路合擊雖封王建節皆許充賞期于力救駕回以慰中外故未能歸期于瞻望闕庭欵謁宗廟與本朝父老軍民僧道相見伏想輿情日久顧望必興念祖宗積累之厚遽遭禍變作孽致二帝遷播惟康王為社稷宗廟之頼竚成大功禔福天下當所駐兵距都城已近須至公移慰撫都人者元祐皇后遣馮澥李回賫書來勸進左丞李回右丞馮澥至濟以元祐皇后聖㫖賫書勸進曰吾以薄徳罹此多難雖救時敢愛于髪膚而昧道若臨於淵氷顧邦基之所頼繄神器之有歸比遣使軺上馳書牘盖上天之眷顧實四海之傾心諒惟撥亂之姿已定興王之業方長嬴之届序宜祉福之具膺竚來御于法宫以誕揚于丕號羣情攸属遐想増懷故兹書示想宜知悉十九日戊寅御封太常少卿汪藻撰書送御史臺看詳如得􅁢當仰申三省施行當日胡舜陟等奉凖御封降到手書看詳極為允當伏乞早賜施行百官比三百表勸進詔張徵措置排辦行在所至程頓事務有㫖奉先普安兩院皇子帝姫􅑼堂為金人發掘速差官繕治宗室叔尚即青城置招募救駕義兵所又分遣使揭黄旗入城召募應募者多㳺惰之人大元帥府擺布駐劄人馬議定以庚寅起發濟州是日幕府劄下宣縂司於宛事駐劄趙子崧于東明駐劄宗澤所部領一行并權邦彦閭丘陞姚􅉇等人馬分擺於長垣韋城衛南華駐劄防托候大元帥人馬􅁸發仰至二十四日次第前進至拱州南京以來次第下寨其餘孔彦威劉浩丁順張換王徹等並别聽指揮東道副縂管朱勝非領兵來衛進謁於濟州日厯曰先是勝非權知南京邦昌書差使臣賫一書至勝非勝非送使臣下獄以邦昌書繳申大元帥府隨即以兵來衛王見而嘉其忠二十日己卯趙子崧第三狀勸進子崧恭奉四月十四日王㫖令諸頭項人兵不得亂近傍城門驚動人民等事子崧自發前軍即以如此約速令來遵從嚴命在行戒諭諸軍甚戢近城及城内百姓悉皆按堵無虞但都人士庻未知大王還闕之期日夕焚香泣望子崧竊謂大體一正防秋甚近合措置事不少今内外束手日復一日坐以廢事甚可畏也又況賊盜充斥人民失所日俟恩霈庻幾安業且使四方萬里之逺咸知神􅄊有主人皆退聽伏望大王俯狥羣情仰慰二聖付託之意戒有司整飭鑾輿即日還闕或狩南都亟下徳音大宥羣生天下幸甚倘或遲疑變生不測子崧亦不知税駕之所矣唐突王聽死有餘罪小帖子訪聞荆南真州海州嚴州黄州蔡光之間有大賊而嚴州尤猖獗惟大霈一出則不勞兵革自然消弭伏乞深賜體察先遣觀察使臣黄永錫回使臣成忠即黄永錫先奉兵馬大元帥康王丙寅手書詣張邦昌觀變還具言邦昌遣謝克家來歸玉璽太母垂簾遣馮澥李回奉詔書前來勸進邦昌已還東府京師見將大元帥檄書雕印出賣内外𫝊報軍民驩呼以望迎立康王王曰宗廟社稷幸弗毁滅不榖願蹈節死義以雪大耻爾豈敢偃然而當大事耶五軍將士呈稟取二十一日擺拽人馬䕶衙入南京兵馬大元帥府契勘二十日五軍將士保衛兵馬大元帥康王入南京今將頭項人馬擺拽下項辛彦宗依舊充先鋒統制丁順充先綘副統制祁超依舊充前軍副制王徹充前軍副統制張瓊依舊充左軍統制孔彦威充左軍副統制張俊依舊充中軍統制劉浩充右軍副統制花實依舊充後軍統制張換充後軍副統制収後楊惟忠依舊都統制右具呈禀奉王㫖依此下行三朝北盟㑹編卷九十四
