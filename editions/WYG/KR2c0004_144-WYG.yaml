body:
  text: 三朝北盟會編卷一百四十四宋徐夢莘撰炎興下帙起紹興元年正月一日己亥盡二月二十二日丁丑紹興元年正月車駕駐蹕越州一日己亥朔大赦改元肆赦曰聖人受命以宅中莫大邦圖之繼王者體元而居正盍新年紀之頒朕遭時艱難渉道寡昧熟視斯民之荼毒莫當强敵之侵陵負此百憂于今五載曷嘗不未眀求治當饋思賢念兩宫之逺而菲陋是安恐九廟之顛而艱危是蹈茍禍可弭雖勞弗辭然生靈久困于干戈城郭悉殘于煨燼丁壯縶身于異域旄倪暴骨於中原桑田失時男女隳業僅存常産者苦斗升之歉乍失故鄉者無寸土之依或迫飢寒㪚為盜賊始焉莫之加䘏終而無以自還致汝于斯皆予之過幸髙穹之未厭哀否運之已窮戎馬雖來邊防粗偹嘉與照臨之内共圖休息之期紹萬世之宏休興百王之丕緒爰因正嵗肇易嘉名發渙號于治朝霈鴻恩于寰宇其建炎五年可改為紹興元年於戯小雅盡廢宣王嗣復于宗周炎正中微光武系隆于有漢靖言凉徳敢對前人尚期中外之彛倫同念祖宗之遺澤輔成此志永底于休遙拜太上皇帝表本表曰接千嵗之統推神莢以膺期上萬年之觴御端朝而受祉若稽故實遙企靖光恭惟太上道君皇帝陛下體道粹精怡神冲漠方席宗祧之度遽成國歩之艱堯㳺汾水之陽久忘天下文遇眀夷之卦益見聖人臣自逺威顔薦更時序當璣衡之載復帳旒冕之猶賖鴻鴈雖賓莫附帛書于沙漠風濤中阻徒瞻雲氣於蓬萊八月丙午李允文謀殺張用之軍不克先是乙巳李􅁢文約張用丙午教塲中㸃人皆素隊入教塲就請粮食是夜有張崇送下統領者密詣用告變曰李節制已偹甲士欲盡殺軍士正總管之罪用驚乃别告報來日盡全装器甲入教塲丙午質明軍士皆全装入城用請允文㸃軍允文大驚教塲急傳令已㸃入訖可便就請粮於是軍士有去意不從用乃與親隨二千獨留城中統領孟振王林等以軍士出南門長驅往咸寜十日戊申馬進圍江州未解知州事姚舜眀棄城走馬進䧟江州江州被圍僅百日粮食皆盡人相食㗖馬進賊兵晝夜攻不息統制劉紹先竭力拒禦至是人皆飢困無闘志吕頤浩楊惟忠巨師古率師來救之及進戰為進所敗官軍不得近城城中亦不知官軍到近沿江安撫使姚舜眀與紹先議弃其城出奔紹先知其勢必不可保全乃縱火城中乗喧閙奪西門走瑞昌舜眀出東門走南康進率衆入城大肆殺掠日晩有來綱到城下泊于酒坊門下始知賊已據城急解維放船下湖口進遣賊黨追至湖口遇頤浩之兵而還聞江州已䧟乃渡江入城坐于州治括見任寄居官僅二百員悉殺于庭下資學王易簡及其子寓皆死于亂兵中其不死者唯宗室不諍等四人有沿江安撫使統領官諤者城初䧟詣進降手射一石三斗弓發無不中進喜李成見之曰圍城久士卒多中箭而死非爾耶遂殺之成揭牓許人識認被擄人户自此被擄人口皆為親人識認而去成許人任便買賣漸有生意皆作菴僚以居十一日己酉命岳飛起發江隂軍權聽張俊節制李成乗金人殘亂之餘據江淮十餘州連兵數十萬有席卷東南之意數使其徒多為文書符䜟以為幻惑聲撼中外朝廷患之議遣將未決而張俊請行乃命俊為江淮路招討使應江淮路駐劄軍馬並聽節制岳飛以通泰州鎮撫使方退屯于江隂軍戊申被命己酉進𤼵癸丑到宜興取老小到徽州有百姓訢其舅姚某搔擾飛白其母責之曰舅所為如此有累于飛飛能容恐軍情與軍法不能容母亦苦勸而止他日與飛兵官押馬舅亦同行舅出飛馬前而馳約數十歩引弓滿囬身射飛中其鞍橋飛馳馬逐舅擒下馬令王貴張憲捉其手自取佩刀破其心然後碎割之歸白其母母曰我鍾愛此弟何遽如此飛曰若一箭或上或下則飛死矣為舅所殺母雖欲一日安不可得也所以中橋者乃天相飛也今日不殺舅他日必為舅所害故不如殺之母意亦解飛留老小于徽州率軍馬趨洪州㑹俊時邵青在蕪湖曽以文字告吕頤浩且叙鄉曲乞受招安頤浩從之授青樞密院水軍統制蕪湖駐劄兼招捉沿江盜賊亦受俊節制而行金人攻廬州金人攻揚州曹成李宏受鄂州李􅁢文招安張用率衆往咸寜縣曹成李宏以無錢粮乃欲復反曹成李宏久屯于三龍河時出兵攻徳安而宏亦屯于郢州野無耕種廪無儲積人有飢色成于上元日率衆趨漢陽宏亦繼至張用聞成等至漢陽率其親隨二千人往咸寜與孟振王林復合鄂州李允文遣人招成等曰若許入城則秋毫不犯若不容入城則縱兵以蹂踐之成等許其入城遂受招安渡江入平湖門山東門下寨于東門之外漫望被野接連不斷鄂州無錢粮􅁢文曰可向南自㝷之於是成有復反意一日括軍中官貟秀才恐其往浙江說軍中事欲盡殺之約是夜皆送至帳前而夜中大雨不止五更忽霽月色如晝而笛聲已催行矣官貟秀才遂得不死成自往江西閭勍贈檢校少保先是閭勍在定逺縣被金人執擄北去金人欲官使之不從被殺上聞之悼惜不已贈檢校少保金人圍西京西北潭翟興遣彭玘伏兵井谷擊敗之金人擁騎數萬逼南河寄治所西碧澗時翟興以乏粮方㪚遣諸部就食于諸邑所存親兵才數千報至人情危懼興安坐自若徐命驍將彭玘授以方畧設伏于井谷遇金人佯為敗奔金人果以銳士三十八騎馳追幾及玘軍伏發皆獲之乃敵帥華沙郎君舒吉郎君瑠嘉郎君佛們郎君等餘衆皆潰乗勝追襲至㑹坑口大張小張店還秦檜叅知政事秦檜除叅知政事具辭免賜詔不􅁢有曰安社稷為恱嘗抗死以力陳在蠻貊可行卒奉身而旋反敵歎子卿之不屈人知季友之來歸皆約句也檜既為叅政謂宰相可得嘗因奏事言曰陛下如能用臣為宰相臣必有聳動四方之事上黙然二月戊辰朔祝友受劉光世招安祝友在新市薛店欲侵宣州以阻水不克渡㑹劉光世自鎮江遣人招安友留使兩旬方許受招安是時友之衆四㪚擄掠有至廣徳軍者有至安吉縣者據安吉縣幾半月餘無一官軍誰何之唯韓世忠差人賫榜至昇慈歩張掛而已友既受光世招安王冦在漂水縣駐軍友移書借路趨鎮江冦不從友以兵擊冦軍冦軍大敗友自此取句容趨鎮江府光世分其兵以友知楚州先是使康民在淮南與友合軍康民之軍極富以金寶賂光世光世喜康民遂得進用十五日壬午張榮屠通州張榮在鼍潭為金人破其茭城遂率舟船至通州過捍海堰欲出海復歸京東為水濤所阻不得去遂據通州粮且盡取人為羓斷其首斫其兩臂兩脛以鹽淹曝乾用充粮食得脫者無幾馬進䧟筠州知軍州事王庭秀棄城走張俊軍於洪州與馬進對岸下寨進日來挑戰俊堅壁不出進遂冦筠州知州王庭秀棄城遁走進遂䧟筠州馬進䧟臨江軍馬進䧟臨江軍閱視軍資庫有撚金小盤龍紅袍段一乃四川進御之物以路不通寄留于庫中進以為李成受命之祥遣人送成成視之長嘆曰馬防禦不察成心耶即命焚之二十二日己丑國奉卿趙瓊刼金人舟船于清河口獲戸部尚書印金人既得楚州始許治運河并閘水悉以江浙擄掠舟船自洪澤口入淮至清河口是時國奉卿以楚州既䧟居于趙瓊寨中與瓊謀刼其舟船乃以二百餘人夜掩不偹刼之有被擄貴官二十餘家各稱其民族一夫人稱是尚書右丞李稅之妾持戸部尚書印并一玉甕可容二升許奉卿無妻遂取其婦人而土豪徐宗成取其印并玉甕云稅自建康被拘執而來途中以死矣一婦人言是陳邦光之親属有一男子肥而大自稱我是王大郎王善也亂兵殺其弟五官人者善曰我嘗提二十萬衆横行中原不期在此中不能保存一弟為人所殺舟中之人抛擲珠玉金銀乞命者徹旦不止是時舟中有金人藏船板下不敢出質眀舟中金人認得不是官軍皆出闘又金人有救兵至民兵乃退桑仲為襄陽府鄧隨郢州鎮撫使桑仲在京西連跨數州無粮食人相食㗖又屢為金州兵所敗欲引衆北去至棗陽承朝廷指揮除襄陽府鄧隨郢州鎮撫使遂囬襄陽駐軍金州王彦幕属績觱以為非便乃投劄子具說利害與宣撫使張俊乞不除仲鎮撫曰窃朝廷除桑仲襄鄧隨郢鎮撫使逺近驚疑莫不解體且以譚兖守鄧州披荆榛保孤壘屢戡大盜奉朝廷法令隠然若一長城曾不得鎮撫使而仲乃得之是將亂也咸以謂朝廷在逺未詳仲凶逆之狀茍稍知之必將令兖軰梟其頭顱以懲奸慝豈有以四郡數千里之百姓委餓虎之喙乎仰惟相公奉便宜聖㫖為國家大明黜陟豈可不從權易置耶聞仲連敗衂於安康此正天亡之時若使兖併力𠞰除稍伸國威而以鎮撫使命充則忠義者知勸而盜賊少戢矣夫兖鎮襄陽漢沔漸寜人知畏慕式固朝廷基本利害甚大伏望相公特賜收採疾速施行俊雖知其非便深嘉觱言而不能用三朝北盟㑹編卷一百四十四
