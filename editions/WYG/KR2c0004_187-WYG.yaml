body:
  text: 三朝北盟㑹編卷一百八十七宋徐夢莘撰炎興下帙起紹興八年十一月二十六日戊申盡二十九日辛亥二十六日戊申樞宻副使王庶奏乞免簽書和議文字王庶與講和異議金使張通古等將到國門庶乃奏劄乞免簽和議文字曰臣識性䝉昏計慮濶疎待罪樞庭畧無稱効間者金使之來大臣簽議或和或戰所主不同臣忠憤所激輒爾妄發不量彼己之勢不察時事之宜屢奏封章力請謝絶専圖恢復謂敵情不可以仁恩馴服王倫之往必至稽滯今聞奏報已還近境和議可決臣謀不逮逺知昧通方使具位効官猶恐瘝曠况當本兵之重曷以稱任臣之失職罪不容誅伏望睿慈速賜命黜以正無知誤國者之罰陛下未欲遽置閒散止宜處之外服以備緩急或以適此執政闕員未便斥出即乞特降處分遇有和議文字許免簽書庶逃前後反覆有失立朝之節滯固不移粗安顓愚之性臣區區悃愊非敢飾詞深慮緘黙有傷國體是日親降御筆不許辭免簽書議行遣事庶再具奏曰臣聞昔楚王有吳人之難使由于城麇復命而不知髙厚大小子西怒曰不能則辭對曰固辭不能子使余也王遇盜于雲中余受其戈此余所能也脾􅂥之事余所不能也臣然後知古人以忠事君者其才之能與不能未嘗敢以一毫欺人故於艱難禍亂之際各以其能自効而國家可安也臣生於陜西其風氣漸染耳目所聞者莫非兵事禍亂以來嘗欲以氣吞强敵則所謂講和者非臣之所能也非其所能而强使之則恐誤國家之大計故臣願陛下惟責臣以修戎兵不以講和之事命臣則緩急之際可以枝吾縱使金人知陛下命臣以此則奸謀不得肆而和好易成雖曰治戎兵其寔促使和也又况臣賦性愚鹵嘗云金人不可和今若預此是臣身為大臣自為二三何取也唐渾瑊馬燧李晟將之忠賢古所未有徳宗能用之吐蕃君臣大懼尚結賛謀曰唐之名將恃此三人不去之必為吾患於是甘辭厚幣以申勤懇朝廷然之㑹盟於平凉李晟以言不可信罷渾瑊以被刼罷馬燧以為所賣罷果如其計而無一人留者願陛下察臣孤忠特留聖念天下幸甚貼黄契勘臣前次所上章疏及與王倫議論寔有妨嫌陛下亦嘗洞照底裏今若不自陳禀則又如趙鼎劉大中輩首鼠兩端於陛下國家何益兼臣備數樞庭自合辭職不合辭事伏乞睿慈除臣一近邊州郡願効尺寸以盡臣節施廷臣為殿中侍御史勾龍如淵除御史中丞不數日監察御史施廷臣抗章力贊和議秦檜念如淵之言當擇人為臺官使盡擊去不附和議者故除如淵中丞又除廷臣侍御史除目既頒縉紳駭愕道路以目莫敢異辭又有寺丞莫將上疏附㑹和議驟除起居舍人沈該亦因附㑹由冗散而召對中外沸騰兵部侍郎張燾曰吾世受國恩身忝法從不可自同于衆當念以死争之乃上疏極論其非曰臣仰惟陛下聖孝天至痛梓宫之未還念兩宫之未復不憚于屈己與金人議和夙夜焦勞誠心懇切皇皇汲汲惟恐後時特以衆論未同故未欲輕屈耳幸而日者上自朝廷下逮百執事之臣小大一心無復異議朝夕進退從容獻納庶㡬天聴為囘卒不至屈此宗社之福也彼施廷臣乃復迎合輒敢抗章力贊此議姑為一身進取之資不恤君父屈辱之恥覈實定罪殆不容誅乃由察官超擢柱史御史府朝廷綱紀之地而陛下耳目之司也前日勾龍如淵以附會此議而得中丞衆議固已嗤鄙之矣今廷臣又以此而躋横榻一臺之中長貳皆然既同鄉曲又同腹心惟相附會變亂是非豈不紊國家之紀綱蔽陛下之耳目乎衆議沸騰方且切齒而沈該者又以此議由冗散而召對莫將者又以此議由寺丞而擢右史如淵廷臣庸人也初無所長但知觀望而將則奸人該則賍吏考其平日奚所不為陛下奈何使此曺斷國論乎今既拂衆情敢犯公議熒惑聖聴惑移聖心力圖顯官如取如擕臣恐徼倖之徒皆有覬覦之心乘時射利布列要塗倡和邪謀終危社稷此臣所以痛憤不能自已也夫自六察而陟臺端超躐甚矣至以寺丞而擢記注則自祖宗以來未之有也除目既頒縉紳駭愕道路以目莫敢一言是此等輩氣熖皆已能箝人之口矣一時小人縁類偕來羽翼既成何所不至詩曰憂心悄悄愠于羣小孔子曰小人成羣斯可愠矣今如淵廷臣莫將輩漸已成羣豈國之福哉伏望睿照斷然而改特加斥逐庶㡬稍杜羣枉之門天下幸甚至於議和則王倫寔為謀主彼往來敵中至再四矣陛下所倚為心腹而信之如蓍龜者也今其為言自已二三事之端倪葢亦可見更望陛下仰念祖宗付託之重俯念億兆愛戴之誠貴愛此身毋輕自屈但務雪恥但思復讐加禮其使加資遣發諭以必得事實之意告以國人皆曰不可之狀使彼悔禍果出誠心惟我所欲盡歸于我然後徐議所以報之之禮似未晚也如其變詐將復誘我以虗辭則是包蔵終不可測便當勵將士保疆塲自治自强以聴天命以俟天時天時既至何為不成何求不得伏願陛下少思而已所謂自强之策豈有甚髙難行之論特患陛下不為而已君臣上下協力一心定為規模一新庶政安往而不得志哉矧我將士寖皆可用比之往年氣已數倍萬一未能進取以之自守葢有餘矣釋此不為而甘心卑辱之事臣竊惑之仰惟陛下犯冐艱難危苦之中保有國祚一紀于兹矣其所恃者不在人心乎自朝廷有屈己之議上下皆已解體倘遂成屈己之事則上下必至離心人心既離何以立國伏願陛下戒之重之臣世受國恩身參法從不敢自同衆人是用輒敢進言夫言而犯雷霆之怒罪固當死不能救止而使陛下受屈辱之恥罪亦當死干冐天威俯伏俟命所有施廷臣莫將除命更取自聖㫖指揮二十九日辛亥史館校勘范如珪貽秦檜書責其和議書曰史館校勘范如珪日者獲以職事侍鈞座于史院幸聞緒餘之論謂先儒訓釋春秋不務空言皆可見諸行事如圭竊以為先儒有可行之學而未必得其位相公既有其學又得其位矣而施設注措乃若與經㫖相戾者心寔疑之不敢黙黙禮經有曰父母之讐不與共戴天寢苫枕土誓死以報魯莊公父弑于齊又為齊主昏同狩于禚連兵合黨伐衛圍郕及盟于蔇納公子糾其忘君背天絶滅人之大倫如此魯國臣子則而象之於是公子牙之弑成于前慶父無君之心動于後圉人犖卜齮之刃交侵于黨氏武闈之間而子般閔公皆不得其死仲尼為此懼故大書特書以著其罪惡萬世臣子之大戒不亦深切著明矣乎徽宗皇帝顯肅皇后崩于沙漠去春凶問既至主上攀號躃踊哀動天地四海之内若喪考妣相公身拜元樞不于此時建白大義乘六軍痛憤之情與之縞素揮戈北向以問金人困我兩宫之罪顧遣一王倫者卑辭厚幣以請梓宫甚矣謀之顛錯也春秋之法讐不復賊不討則不書𦵏𦵏者臣子之事不書𦵏以為無臣子也夫人之痛莫甚于不得其死君親不得其死而不復讐不討敵使神靈含寃抱恨于地下而不伸雖得梓宫而𦵏之於臣子之心能安否乎古之人有命將出師誓滅鯨鯢以迎梓宫者矣雖其力小勢窮不能有濟而名正言順亦可以無愧于天下後世未聞發帑遣使祈哀請命以求梓宫於敵人之手者也金人用是知我無復讐之心可以肆為玩侮仍示欲和之意使倫歸報交使往來至于再至于三其謀益深言益甘我之信彼益䖍禮益恭墮其計中不自知覺雖三尺童于皆為朝廷危之倫之言曰金人欲以梓宫母后淵聖皇帝中原境土悉歸于我審如是豈惟足以解吾君終身之憂哉乃天下臣子之所大願也然自王者迹熄五伯而下鮮不以詐力相傾今乃欲以信義之道望於強隣寧有此理且諱日之報與不報在彼無毫厘利害至不難從之事也我之懇請屢矣而寂無聞焉於其至易者尚不我從則其他可知矣春秋之於中國書名爵而秦楚則以號外而賤之也王者欲一乎天下曷為外而賤之以為秦楚雖強其心必異不得不峻外内之限别貴賤之分以防不測之患於未然也凡中國諸侯與秦楚盟㑹者春秋必謹志而深譏之其法嚴矣金人自海上結盟借助于我以滅契丹契丹既滅遂入汴都其不可信一也既為城下之盟講解而退矣曽不旋踵復圍太原其不可信二也自時厥後和使項背相望而侵我之兵無歳不有其不可信三也既破京城乃始斂兵議和誘我二帝出郊刼之而去其不可信四也劉豫其所立也事之無所不至一旦執之如探囊取物其不可信五也彼之包蔵奸詭不可測度如此何為一旦與我如是之厚哉或者謂金主初立尼堪已死親族離叛契丹復振方務自保畏我加兵故欲釋憾解仇以免南顧之慮豈其然乎自劉豫既廢之後我益畏縮逺屏未嘗敢向北方發一矢彼何憚于我哉是其深謀長計欲不費一鏃而坐収混一之功耳聞其使稱詔諭挾冊命而來要主上以下拜之禮果有之乎其無也果可從乎其不可從也反面事讐匹夫猶不肯為忍以堂堂之宋君臣相率而拜不共戴天之人哉主上哀疚在躬孝友天至必曰吾為梓宫屈為皇太后屈為淵聖皇帝屈何不可之有使子弟之情獲伸于一日志願足矣遑恤其他相公何不以必然之理開陳于咫尺之前乎誠使一旦拜受金人之詔冊則將行金人之命令頒金人之正朔普天之下莫非金人之土率土之濵莫非金人之臣我家君臣上下雖欲求措身之所且不可得徽宗顯肅之梓宫無地可𦵏母后淵聖之輦輅無家可歸矣無乃違主上聖孝之心失相公大忠之節乎昔漢髙祖責數項羽兵不少解卒能免太公于爼上晉大夫征繕以輔孺子使惡我者懼卒能歸恵公于强秦此古人已試之明騐也相公不用此策以慰我主上孝悌之念奈何欲誤主上舉祖宗二百年之天下委而棄之哉今所以委曲順從敵意不敢少有違忤者惟恐其不歸梓宫母后淵聖而加兵于我耳曽不知一正君臣之分則號令生殺皆出于其手設若擁梓宫母后淵聖于大江之外下一紙詔召吾君相以下來迎于境我若從之立有禍變如其不從彼將責我曰吾歸而父母之喪歸而親歸而兄有大造于國而乃違我之命不肯來迎是不孝于父母不恭于兄不忠于我也聲罪來攻將何以待之事至如此則前日所以順從其意者非特未有分毫之益適足以致莫大之禍和好既敗雖兵不用其可得乎為和之説者必曰今雖講和而邊備寔未嘗弛必無意外之患如圭觀之朝廷以議和故謂謀臣猛将可以折衝禦侮者皆無所用或斥逐而逺之或迸之於嶠廣之外又將包羞忍恥甘心屈辱以沮喪士氣而離其心殆若歸馬放牛示天下不復用兵者而謂之不弛邉備是内欺其心上欺人主下欺億兆之衆也主上南面而君天下十有二年矣其即位也由天下臣民推戴所迫不得已而從之至于今日天下軍民豈肯聴吾君北面而為仇敵之臣哉主上以思念君父母兄之故不憚于屈己天下軍民以愛君之故不肯聴主上之辱身用此拒敵不為無辭若其舉兵而來適足以激怒吾衆我以大義明詔天下率勵瘡痍之餘共雪父母之辱乃不可失之機㑹也忠義之動孰不奮發中外貔貅之士數十萬衆懐憤怒不平之氣思一吐之積有年所惟君相用之如何耳昔申胥一身乃能存椘椘雖三户足以亡秦遂氏四家盡殱齊戍田單孤壘一戰而復濟上七十餘城惟其誠心懇切以氣直決勝負耳況金人兵勢縦強中國雖敗亡之餘亦未至如即墨遂人之弱詎可甘心降敵而無自强之志相公若必欲拂天下之情贊成主上受此屈辱有如奸雄因衆心之憤擁數十萬衆仗大義以問相公之罪則將何辭以對且如靖康以來為金人之所屠戮者非將士之父兄則其子弟幸得脱身于鋒鏑恨不得金人之間因而報之今相公反愛信之如天属之戚萬口籍籍扼腕忿怒莫不歸罪于相公亦知之乎相公嘗自謂我欲濟國事死且不避寧避怨謗相公之心則忠矣使殺身而尊于君固志士仁人之所願為也若犯衆怒陷吾君于不義政恐不惟怨謗而已將喪身及國毒流天下遺臭萬世苟非至愚無知自暴自棄天奪其魄心風發狂者孰肯為此靖康時有老卒郭京者自言有異術能行道用兵使敵人莫覺宰相何㮚信以為然使為大將募京城市井浮滑之徒部分教習謂之竒兵城中之人皆知京不可用惟淵聖與㮚傾心委任不以為疑方其引兵出城也君臣猶延頸以望成功及既敗而走然後悔之已無及矣今倫之妄何以異京願相公鑒覆車之轍早悟而改圖之無至事敗頓足拊髀悔恨于不可奈何之時也如圭聞金使為接伴官范同所難頗已恭順不敢過索禮數人皆以為善如圭私憂過計竊謂其既以詔諭為名豈但肯已哉深恐一旦到朝乘君臣上下震慴危懼之際張皇事勢以恐喝朝廷我或倉惶錯愕不暇顧從金人之言照前日侍從臺諫之臣所議既上不知以屈為慮遂為之屈則大事去矣不可不早定計也書曰三人占則從二人之言今以為可者有㡬以為不可者有㡬相公何不啟主上遍觀而熟計之人心惟虗一而静如止水與鑑乃能明燭物理毫髪無遺茍有所偏主則雖泰山在前而且不見相公豈可執一己之私意而忽深思焉則是非利害判若黒白矣若曰主上聖意堅確臣下莫之能囘此非所望于相公也春秋之法王朝公卿書爵而宰咺渠伯糾皆書名者以其承王命而􅈖諸侯之妾聘弑逆之人故貶之也當不義而不知其不可不智知其不可而不言不忠言不聴而不去阿䛕患失惟命是從以誤君父則將焉用彼相矣此張華所以見責于張林而不能荅也相公立乎人之朝謀人之邦國而欲使萬乘之主辱身于不共戴天之讐較諸咺糾罪孰輕重聖人復起難乎免于誅絶矣昔堯舜與羣臣謀謨廟堂之上曰都曰俞曰吁曰咈可否相濟不専尚同故能相與致夫巍巍之功孔子曰人之言曰予無樂乎為君惟其言而莫予違也如其善而莫之違也不亦善乎如不善而莫之違也不㡬乎一言而喪邦乎比來議論鯁直不肯詭隨者往往聴其去而柔媚謟䛕之人相公平日所疾者乃或號召豈相公厭惡正直覺今是而昨非乎將使吾君惟以莫違予言為樂雖知其足以喪邦亦莫之恤也可不為痛心哉傳曰􅄔不䘏緯而憂宗周之隕懼將及也今日存亡危急之秋死生禍福上下所同誰不可言者而當路巨公乃或謂士大夫各有司存不當輒議朝廷事是拒人于千里之外而自塗其耳目也摘埴冥行將入於罟獲陷阱之中而莫之知矣靖康之間相公不畏其死發一忠言髙名大節輝映千古卓然如泰山北斗天下仰望若不可企及如圭舅氏胡文定公毎訓子弟舉相公為標準相公亦以道義相知生則援之于朝與謀國政殁則發揚幽光被哀榮之典施及不肖之甥亦䝉収録且辱與進欵賜教載恩眷厚今兹濫從諸儒備僚属之末誠不忍相公壊前日之名節受天下怨怒禍集厥躬而併及于國家也與其雷同衆人竊議於後孰若獻區區之忠於執事者庶㡬兼聰聴于萬一哉恕其狂直而用其言惟相公之命怒其僭而加之罪亦惟命不勝皇恐之至三朝北盟㑹編卷一百八十七
