body:
  text: 三朝北盟會編卷一百十四宋徐夢莘撰炎興下帙起建炎元年十一月丁亥盡二年正月十一日丙申十一月丁亥朔曲赦應天府宿亳楚泗揚州朕法羲易之省方體周王之時邁粤自纂圖之歳率勤巡狩之行北繇睢陽來撫淮甸厯宿亳之境域過楚泗之郊圻觀廣陵形勢之雄思藝祖規模之大講求民瘼修舉政綱念聖人之徳好生常軫懐於矜恤而天子所至曰幸得無望於惠綏矧復兹禮甚希吾人實衆雖戒供湏之擾寧㣲應辦之勞駐蹕之初惠不可後宜敷慶宥用慰羣情於戯若日月之有光明或先臨照如天地無不覆載咸所盖容思萬方之罪在子尚一人之慶有賴悉蠲咎累共迪中和咨爾庶邦咸悉朕意四日庚寅詔求能使絶域將萬衆者朕以眇躬嗣承大器屬時艱危慄如氷淵念二聖母后之未還宸極而宗廟生靈之重任常懼弗勝臨御以來備殫智力而人多規利士樂赴功靡弊之餘艱於振起遣兩道迎還之使未副所期為中原固守之圖亦慮弗至思得忠信宏博可使絶域與智謀勇毅能將萬衆成朕孝悌之志而共安中原慮其湮沉弗能自達夫以天下之大祖宗徳澤涵養之久宜多異材副朕延竚仰三省樞密院昭示朕意不以有無官資並許詣行在登聞檢院自陳朕將不愛惜爵禄優加禮遇以表忠義濟時之功六日壬辰宰執早朝登御舟進榻前奏九日乙未王彦及金人戰於太行山遁去王彦在西山聚兵既集常慮糧儲不繼一日𤼵軍兵運粟會奸人有告敵帥者金人乗虛遽以大兵薄彦壘彦率親兵乗髙禦之衆稍卻彦大呼勇士盡力而戰且以强弩飛石齊𤼵金人方稍退金人有死者皆以馬負屍而去自此金人布長圍欲久困彦彦絶饋運者旬餘彦檄召諸寨兵大至金人乃遁去遺史曰時金人鋭意中原特彦在河朔以兵勢張甚未暇南侵一日敵帥召其衆首領俾以大兵再攻彦壘首領跪而泣曰王都統寨堅如鐡石未易圗也必欲使某將者願請死不敢行其為所畏如此十四日庚子車駕次泗州尼堪約諸將分道河南節要曰尼堪知張邦昌之廢故約諸將分道河南東路鄂勒歡入攻山東西路尼堪入攻京西尼堪又除金人萬户羅索為陜西路先鋒都統以金人萬户薩里罕貝勒哈芬以副之侵陜西鄂勒歡自燕山率衆由清滄渡河以侵山東二十二日戊申知密州軍事趙野棄城而去趙野以前執政知密州見山東盗賊縱横官儀據即墨不退翠華乃在淮甸王命不通遂具車擔裝載輜重以家屬乗轎馬棄一城軍民浩浩長行軍民偶語兩日不定於是杜彦等乗間作亂二十四日庚戌密州軍卒杜彦李逵吳順反杜彦自稱知軍州事追執趙野殺之趙野棄城去有守衙節級杜彦樂將節級李逵小節級吳順三人者因民洶洶遂謀作亂且曰方今盗賊縱横一州生靈豈可無主請自為知州軍兵皆聽命彦遂知州而與順左右之彦遂遣人追野至張倉鎮執野并其家屬回癸丑彦等坐黄堂上其徒黨聲喏報捉到趙野彦曰爾為知州自般老小向南去不知一州生靈誰其為主野不能應彦令取木驢來釘其手足野大驚乃呼曰太尉願愬一言彦媟罵之衆已撮野跨木驢釘其手足矣推出樵門遲而殺之取其頭籖於市用一笠兒盖其上百姓見者為其垂淚其家屬徒黨分去唯一子學老得脱彦等取密州一城强壯盡刺為軍二十五日辛亥金人䧟河間府權府鈐轄孫某亷訪李某皆被殺先是河間府黄潜善以兵赴大元帥府也今鈐轄孫某權府事金人攻河間府孫鈐轄盡力禦之高陽關亷訪使者内侍李某屢率兵與金人接戰河間府士民仗其忠勇金人攻破之西北角破而城中築月城䕶其闕凡築月城三重兩次攻破時月城已近雲一營是日雲一營中遺火諠亂金人乗亂攻䧟之大肆殺戮至於子城忽傳令戢兵時城中士民死者已幾半孫鈐轄李亷訪皆死於亂兵二十七日癸丑車駕至揚州駐蹕鄂勒歡自燕山率衆由清滄渡河以攻山東尼堪自雲中率衆下太行渡河陽再䧟西京及遣金人萬户尼楚赫博索察罕瑪勒等以攻漢上節要曰時政記建雄守河陽翟進扼河清白磊敵夜渡河背攻河南城建雄之軍遂潰尼堪兵得渡首敗姚慶軍於偃師慶死之西京官吏棄城南走殘民開門以降尼堪遂入西京屯於大内以代州叛臣李嗣本知河南府事且遣金人萬户尼楚赫軰攻漢上尼堪不自行者以時宗澤守東京恐澤邀其後故自據西京與澤相持使漢上之兵無後顧之憂也十二月八日癸丑金人䧟鄭州知軍州事董庠棄城走前知階州董庠者因來勤王潰散無斫歸宗擇留守東京令庠知鄭州金人入境澤出兵援之為金人斫敗庠已棄城而走金人不入鄭州而退去遂專往京西遺史曰金往西京車駕在揚州金人議進兵殘擾京西乃遣尼楚赫大王自汜水渡河攻西京西路制置河南尹孫昭遠不敢當引兵即避之金人遂䧟西京十二日戊辰金人自龍門渡河沿河安撫使曲方遁走自河東一路䧟沒畫河為界朝廷以唐重帥闗中重沿河置安撫使以統制將兵守河而安撫統制屢易最後以曲方為沿河安撫使方以衰老皓首黧面如鬼物統兵駐於韓城日以飲酒蹴踘為事未嘗治軍政金人議侵闗陜乃遣尼楚赫大王提兵一路擾京西又一路自慈隰而南欲攻陜右羅索貝勒統之唐重遣總管劉光弼齎帛犒兵河上光弼至華州聞金人逼河遂留不進金人自龍門清水地方分奪扼渡河而方猶飲酒以告者為妄言金人出龍門山並河而南距韓城四里方始覺知乃擁兵遁走光弼聞之不歸長安而走邠岐十九日甲戍金人攻同州軍知州事鄭驤赴井死周良以同州降於金人羅索貝勒自清水曲渡河距同州猶七十里人心已動不安癸酉金人漸至同州通判及知縣衆官皆走甲戍同州閉門知州鄭驤赴井死軍民上城名為守禦而諠亂無法金人至城下呼請官員打話軍民謂寄居官承節郎前知沙苑監周良者子弟所出身可與打話遂同請良良辭不可軍民曰州縣見任官皆棄城去若承節不向前承當則一城生靈皆遭荼毒良不可已而從之令立青盖於城上金人遂就來打話且令投拜良曰如大金不殺戮願以城降金人許之良出城見其帥請降喜以良為定國軍節度使知同州唯遣十數騎入城索寄居官皇城某追取金寳畢殺之又入州學取書籍而去餘無秋毫之擾遺史曰秦檜當國鄭驤之親屬為檜客情意密驤以死節贈通議大夫猶以為末為録其叱罵金人之節加贈樞密直學士制曰往者人習治安士䘮亷恥遭時分變坐視傾危盖日詭隨罔知尊主庇民之道故臨事讋懼宜無仗節死難之人朕承多難毎為永歎倘聞義烈豈無褒揚具官鄭驤禀性剛明守身端靖始將使指旋剖郡符迨外患之横侵能嬰城而自固旁無應援迄以䧟亡蹈白刃之在前叱敵人之愈厲雖加䘏典未慰忠魂載頒渙渥之恩増賁宥密之職靈兮英爽歆此􅃂榮後又請謚曰威愍驤赴井時金人猶未傅城初無固守與呵叱之節可謂詭冐矣羅索自同州韓城縣界越河以入長安節要曰時羅索屯河中蘓村官軍扼蒲津西岸敵不得渡遂潜由上流韓城之域一夕履氷而過直入長安於是蒲津官軍不戰自潰十四日己邜金人尼楚赫䧟汝州提㸃刑獄謝京走被殺尼楚赫䧟汝州將兵挾提㸃刑獄公事謝京出城奔走去將兵王俊聚衆後據繖盖山有衆數萬河東制置使王􅀈棄陜州奔於興元府王􅀈為河東制置使軍於陜州同州既䧟􅀈之兵潰亂不能整乃留張昱治陜􅀈率衆由金商欲入川州縣震駭欲閉門拒守獨提㸃刑獄張上行破衆議迎􅀈處於興元府給其衣糧建炎二年正月二日丁亥金人尼楚赫攻鄧州安撫使范致虚弃城走權安撫使劉汲率衆出戰被殺遺史曰初河東制置使趙宗印退軍取商州路出武闗欲赴揚州到方城縣遇范致虚使之知鄧州兼西路安撫使致虚下車方僅一月而金人攻鄧州致虚聞風先遁去宗印以其兵𢃄挾民出城入房州往襄陽金人帥尼楚赫大王至城下轉運使權安撫劉汲率將兵二千人及両都監出南門聲言欲戰或以為出奔為金人所掩汲及両都監被拘執或曰登時被殺乾道六年左宣議郎秘書省校書郎兼國史院編修官劉惇進狀伏念臣先祖朝議大夫知鄧州兼京西南路安撫使臣汲起自諸生遭時多故欽廟收之放逐出使京西光堯録其勞効就除帥事於時國兵新破敵勢方張漢沔之南四面皆敵孤城散兵無經久計先祖父臣汲志於急病受命感遇慷慨自奮誓以死報乃建炎二年正月三日敵騎至鄧州先祖父臣汲親統將兵出城與金帥尼楚赫大王二十萬衆接戰在本州城南當陣遇害五月六日奉聖㫖贈兩官特與兩資恩澤當先死事實跡見於提㸃刑獄權州事程芾之所奏出戰始末見於京西使臣將校之所供䝉恩褒贈見於武勝軍之所被授吏部之所給一時事勢與朝廷之委寄士大夫之論議則見於御史中丞許景衡章疏而先祖父臣汲忠義憤激凡所施置則見於行狀為當時先父臣裴自蜀聞難即赴京西朝廷俶擾告命淪失先臣蚤世諸父流離存沒恩命両未獲霑因之先祖父四十年死節未昭於時雖於其間累有申請值秦檜當路用兵事務從閣束迄無行下自分此生賫恨永已誠不自意未死之年誤䝉陛下召自遠方擢寘三舘孤賤形跡一旦得遇天日昔之無告佀可號訴累年於兹猶以遭聖明未有補報内抱沉痛抑而不發近者誤䝉聖恩待罪史氏獲與諸儒朝夕網羅放失舊時稍知紹興之間鄭驤唐重之流贈官賜謚之典皆因子孫自言得以推恩乃知聖朝於盡節之臣隐率崇終無所不盡而先祖父臣汲當艱難時仗節死義比於二人迹狀顯著徒以子孫賤遠不能號天扣地請命聖世致使歳月引久史臣不盡太常不謚忠義大節冺滅無聞其責在臣無以自贖使臣今日叨塵朝列謬當載筆日見已行之事而猶隐忍緘黙若不祈請將復何顔戴天履地仰惟皇帝陛下臨朝厲精大明黜陟日月之照細大不遺方將崇奬死忠褒勸名節使天下聞風有所砥礪是又先祖父臣汲孤忠暴白之時子孫沉􅁈巨痛有所赴愬之日重念國難以來州鎮牧守不可勝數倉卒之間望風棄城盖十八九嬰城自守百無一二至於整兵迎敵以必死抗節者又絶無僅有昨來先祖父臣汲死事之迹既有上件帥臣所保奏武勝軍所被受使臣將校所供吏部所給公慿臣僚章奏疏所論時事一一並可照騐則臣籲天泣血泥首請命冀獲彰聞此固其所臣窃見唐安史之亂顔杲卿李愷張巡許遠皆盡節於天寶之末至徳之初而顯於建中長慶之間差次於元和之世褒忠尚義以儆於時雖數十年久猶不可已致太常博士獨孤及議郭知運謚謂不當以過時廢禮則臣於此時控告君父猶不為遲檢紹興五年十一月四日聖㫖指揮節文應守臣守禦臨難不屈死節昭著不以官器高下並令本路帥司保明指實聞奏特與賜謚臣先祖父臣汲事跡委是應得上件指揮臣今啣哀瀝血伏詣闕下繳進以聞臣誤被聖奬身居朝列莫敢興造曖昧僥倖上恩一言渉誣罪當萬死伏望皇帝陛下天地父母時軫睿慈哀憫死節之臣申詔有司考按事實悉依建炎詔書非獨以慰九原孤忠螻蟻小臣生死骨肉之幸亦庶幾激𤼵忠義砥礪名節於風俗隆替不無所繫伏候勅㫖續據太常寺中檢凖紹興五年十一月四日指揮節文云云今凖省部偹凖都省批送下劉焞伏乞賜祖父謚事今將連到録曰照得故知鄧州權京西安撫使賜太中大夫劉汲先因金人侵我鄧州統將官戚鼎提兵戰殁䝉本路提刑程芾保奏贈太中大夫本司契勘本官係守臣戰歿應得上件指揮正月三十日奉聖㫖特與賜謚施行本寺今欲擬謚二月二十九日奉勅以孤壘抗方張之勢義弗圖存事本朝有仗節之臣死為不朽敬徇易名之請因宏勵俗之規具官劉汲奥學决科誠心享上值同朝之惡直遭排擯而自如賜環於靖康更化之初分閫於建炎再造之日屬兹穣守正扼敵衝衆避敵以茍全獨舍生而狥難髪歸若動尚想常山之威眥裂大呼不媿睢陽之戰哀百身而奚贖節一惠以表尊慮國為忠捐軀曰介冀英魂之如在歆䘏􅃂之不忘可特賜謚忠介九日甲午簽書武勝軍節度判官㕔公事李操降於金人遺史曰金人至鄧州官兵守禦劉汲被執守陴者已見金人作木栅圍城矣穰縣典史格某之子被驅擄作栅金人遣入城使諭城中投拜格氏子呼於城下守陴者皆識之遂鈎上城格氏子曰尼楚赫大王兵十萬取今日已時攻城城破雞犬不留若能速便投拜則可以免禍有趙士習者福建人欲投拜僉判李操者西京人不欲投拜曰當盡死節趙士習曰豈不知盡死節而為忠雖死無益於事奈一城生靈何操語塞遂諾與趙士習出城見尼楚赫大王投拜尼楚赫拆箭為誓不洗城由是金人遂入城初淵聖用宰相白時中之議欲幸㐮陽而鄧州為行宫截留四川輕賫綱及聚糧草至是盡為金人所得又需索百色技藝人及金銀物帛如京師圍城中根括之法尼堪烏舍屯西京鄂勒歡䧟青維二州羅索貝勒䧟延安府金人䧟延安府東城是時鄜延路經畧使王庶在鄜州家屬在延安府奔走得達鄜州權知延安府事劉洪與軍民共守西城十一日丙申金人尼楚赫䧟均州知州楊彦明棄城走先是靖康初金人方至河北而諸路州縣軍民皆殺歸朝燕官唯均州有添差武當縣丞不釐務在任雄翔者燕山人三世及第有知􅈫尚義慷慨聞亂即率歸朝燕人約七十餘人家家所有金刀麫刀以至果刀剃刀應干器械尺鐡盡赴州納之知州楊彦明信其然常衛䕶保存故人不敢犯未幾有潰散兵犯均州境彦明令雄翔措置雄翔即授方畧分委其衆當之每出必勝均州人亦賴之漸付以器甲兵馬使防境内雄翔常語彦明曰國家忘戰久士卒懈惰不可用若金人至必不可當前者邊事初動時若國家能盡取歸朝燕人使之邊防取之有道猶可支吾今國家兵馬更十年後恐不復可用彦明以其言為是及金人犯境境内百姓流徙而去彦明計窮未知所措雄翔乃以其衆送彦明全家上武當山與彦明敘别復聚其衆還城中金人到雄翔迎入城於是歸朝燕人盡隨金人北去三朝北盟㑹編卷一百十四
