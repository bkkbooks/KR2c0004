body:
  text: 三朝北盟㑹編卷八十一宋徐夢莘撰靖康中帙起靖康二年二月十四日甲戍盡二十一日辛巳十四日甲戍吳幵莫儔齎到軍前牒據文武百官申乞立張相治國亊己申本國許册立為皇帝請牒册寳及一行册命禮數金人取親王帝姬駙馬及南班官親屬遺史曰先是金人破真定府得走承馬受内侍鄧述者太上倖臣也置在軍前至是尼堪斡里雅布懐廢立之意也先令鄧述將太上兒女供具其數又嘗取内侍四十五人至軍前問其人管甚職事問畢却遣回一半别換曽管宮闕者時留守司大臣不疑其故以謂要管宮闕之人是金人欲效之後吳幵持廢立文字要太上諸王以下孫傳意欲藏匿吳幵持文以示乃鄧述與管宮闕内侍先已具其數已各書姓名以示之傳乃吞聲而盡發焉又金人於宗正黄一本云董少卿處取玉牒簿去指名要南班宗室先自二王宮濮王宮以近屬官序髙者先取宗室逃竄於細民家藏匿徐秉哲為金人所逼押文引令諸使臣收捉使臣利於得財凡所藏匿必捉得之獲免者十有一二其文引云或於南薫門蕭太師處交割或於順天門耶律大夫處交割皆用牒押字或謂徐秉哲為人之臣忽押牒取國之宗屬以贈仇讐其貪生忘國之意有如此者開封府捉事使臣竇鍳曰我生為大宋之臣豈忍以大宋宗族交送於金人乎遂自縊死十五日乙亥金人取御史中丞秦檜赴軍前以廢立異議故取之集百官作推戴表軍器少監王紹草之王紹表先叙大金皇帝云道合三光功髙九有惇德允元智將幾於虞帝弔民伐罪義實過於周王又叙邦昌云惟太宰相公識探天人學貫古今内外之聲久著天人之意允洽􅈾大國褒崇之禮希前王作聖之功可治國事以主斯民吳革置賑濟所謀起兵以救駕皇后皇太子既出城吳革謂二帝與天眷皆遭敵人拘留為人臣者何用生為乃於啟聖院置局名賑濟所募士就食一日之間不啻萬人革隂以軍法部勒以吳銖左時朱夢説張知彰馬獻可吳忠徐偉參謀議偉又率兩學進士崔鼎臣周虎臣等八十餘人應募因檄偉總轄士人是時康王為天下兵馬大元帥駐軍山東偉獻言於革宻遣薛安裴進靳立等數輩懐蠟弹由間道告急於元帥府乃約在外將相擁兵進城内外相應夾攻敵寨圖還二帝保全宗社革從之孔彦威斬常謹獻首於大元帥府以常謹官職差遣授彦威承信郎孔彦威為常謹下提轄衙兵乙丑彦威詣帥府宻告常謹自受帥府劄子授武翼大夫閤門宣賛舍人合依王㫖取便路往柏林鎮駐劄謹乃離朝城縣住泊十日不動忽一日席地置酒請彦威及近上使臣十人數盃後謹説佐官不自由不快活只欲落草去取快活如何衆不應謹説待别商量即散去次日差彦威前去山口路欲望襲慶府去作過彦威衷私一日一夜走投帥府告首王問何以騐實彦威曰謹具差使臣五人齎金銀在此召募帥府軍兵兼謹已移寨出鄆城住泊擄掠鄉村王遣人宻伺果獲五人又發探報察謹動息悉如彦威所告王命只以常謹所帶武翼大夫閤門宣賛舍人并統制本路下人兵便許彦威令自斬謹首級及撫定得軍情無他即擎首級來即授之遂授彦威方畧令齎撫安軍衆榜示以行彦威馳歸見謹紿以回自山口次日謹與所擄婦人雜馬馳驟彦威馳馬及謹挾謹下馬驅捺在地數謹罪懐中出撫定榜示以徇衆衆皆曰可斬遂斬謹撫定其衆取謹首馳詣帥府乙亥以獻王喜犒勞彦威許奏官職辛巳奏擬彦威武翼大夫閤門宣賛舍人統制本頭下人馬一萬人令去開德府城下駐劄聽宗澤節制十六日丙子金人遣曹少監郭少傅同開封府徐秉哲治事時方議立張邦昌未定京師事務金人主之百官凡有一事即取稟軍前至是金人令曹少監郭少傅同徐秉哲治事軍前指揮令百官依舊入局治事軍糧依舊支散金人取宫禁庫藏珍玩諸物金人盡取内藏元豐大觀庫簿籍悉取寳貨及大内諸庫龍德兩宮珍寳奇物僉言曰太上平時好玩珍寳雖有司與宰相不能知之内侍王仍等曲奉尼堪説其物指其所在而取之金人取太學博士十人太學生堪為師法者三十人金人索太學生博通經術者三十人如法以禮謹聘前來師禮不敢不厚忽有應募願行者大扺多四川人及兩河人兩河人思得假便移鄉四川人皆為利往也官司人給三百千保治装三十人者欣欣然應聘初金人圍城太學生汪若海等勸人納資財賞軍上在軍前董時升勸人納金銀徐揆投書於二帥乞免金銀上久不歸汪若海説二帥乞復鑾輿人皆稱太學多忠義之士至是城中乏糧困匱金人時有洗城之語又疑金人不去欲斃在京之民者太學生皆求生附勢投狀願歸金國者百餘人元募八十人而投狀者一百人皆過元數其鄉貫多係三川兩浙福建京師者比至軍前金人脅而誘之曰金國不要汝等作大義策論各要汝等陳鄉土方畧利害諸生有川人閩浙人者各爭持紙筆陳山川險易古今攻戰據取之由以獻又妄指娼女為妻要取諸軍前後金人覺其無能茍賤復退者六十餘人委無才能不足以為師法復欲入學司業博士集衆榎楚而屏之士之茍賤無守有如此者遺録曰金人初取太學生正録三十人為北方賢資令國子監各給三百貫發遣正録皆懼乃私誘學中素無亷恥者以充數即日出城其齎糧并為敵有亦從而不追十八日戊寅大元帥府再行下諸處勤王進發遺史曰是日募府奉大元帥康王指揮京師全無消息吾寢食不遑可再呈檄書行下諸處契勘當府今月七日九日十一日十三日十五日十七日節次劄下興仁府黄待制駐劄開德府宗元帥節制諸頭項人馬及劄下南京宣總兩司互為應援及一面闗牒陜西京師江淮勤王師帥去訖外今再契勘探報大金歸期全未見的確京城信息不通或云繫橋或云絞筏不久渡河然登城之敵至今不下大寨或有小寨未起傍列四處却擄吾民搬運糧斛或稱候麥苖長大可餵牛馬方可北歸是未有去計講和之説實緩我天下之師觀其形勢慮包詭謀今仰見在開德府駐劄副元帥宗修撰興仁府駐劄節制黄待制各切加意召募信實人前去硬探知見得委有奸計尚或窺伺舊城未有退師之意仰審觀形勢料度彼已隨處糾合附近統制官人兵剋日進寨於近京駐劄張大軍勢通協令去仍切持重明逺斥堠毋致反落奸便不得先以人兵跳㺯自啟敗盟之釁内如宗元帥舉師之日先告諭開德府濮州黄待制舉師之日先告諭興仁府單州廣濟軍各嚴備守禦其逐處城上城先分已擺布若軍若民之兵不得一例起發使各保守以防乗虚及逐處守臣各應付隨軍糧食五七日并後來不住相繼應副仍各申隨處所屬轉運使不管少有闕誤并仰南京宣總兩司照㑹與宗元帥黄待制一依今來指揮各猜覘探互相關報㑹合進寨約日於近京駐劄務要聲援相應及仰一面備坐今來指揮行下陜西京西江淮等路勤王領兵去處約日催發㑹合仍具逐頭項職位姓名及劄下河北運判顧大夫京東運副黄龍圖隨軍轉運梁修撰等各隨處應副錢不管少有闕誤并小貼子兼契南京開德府興仁府等處去京城遠近不同即起發當有先後務要同日到京城側近切在契勘無令參差不齊又小貼子再契勘京城圍閉日久時朝廷遣使齎詔傳諭雖知金人已再講和無復擄掠然到久累月未聞退歸阻隔道路朝廷命令不通臣子之心寢食不遑今來勤王之師諸道雲集便欲相與戮力進兵血戰仰念主上屈已謹信講好息民之意未得轉進當府已累劄下審觀形勢可進無先以兵相加自取敗盟之釁今仰節制黄待制􅅗善副元帥宗修撰宣撫使范承宣訥北道總管趙資政野經制翁閣學彦國發運向直閣子諲發運方徽猷孟卿淮南東路提刑种郎中師中知揚州許龍學份前知宻州郭待制奉世西道總管王資政襄陜西五路經制錢侍郎盖知淮寧府趙待制子崧各切親飭諸將整軍伍利器械具糗糧若旬月之間師猶未退忍復坐視當約日齊進誓身一戰凡臣子世受國恩各懐忠義之報必願効死立功仍仰吐心瀝誠紬繹方畧合謀觧難速行條具申金人取詳通經教德行僧數十人金人來索詳通經教德行僧開封府即令拘諸院禪僧等每院不下十餘人觧赴金國軍前復有退令歸者所留僅二十人待遇頗厚諸寨請輪齋襯殆無虛日二十日庚辰王發東平府先是帥府排日劄下諸處勤王師帥約與㑹合幕府聚議宜進寨濟州剋擇官王府選定用庚辰進發是日起發東平府先是軍前人情隨府諸色人等唯思家喜南去河北諸郡勤王兵懼戰闘欲北歸至是北兵見帥府趨濟州多不欲南於是五更於北門及縣前兩處放火欲駭亂軍衆張俊救撲滅之奸謀不行晚宿中都金人移文再根括金銀是時被發遣出城者足相躡於道塗金人見其隨行籠内有金銀尼堪大怒斥責根括官吏以謂皆以為盡絶各有結罪文狀今乃如是耶故移文再行根括督責益峻急既而揭榜曉諭委四壁官根括如初民情自是殆無生意自月初發遣宗室宦官宮嬪輩如今兩旬猶未盡號呼之聲道途不絶二十一日辛巳尼堪喚吏部侍郎李若水等議立異姓事若水罵詈同王履死之靖康忠愍曲周縣李公事迹曰公姓李氏諱若水字清卿始名若氷洺州曲周縣人曽祖宏故任莫州録事參軍贈太子太傅祖庠故任鄭州管城縣主簿贈太子太傅父恂故任開德府議曹掾贈少傅世業儒仕州縣著清白聲公自幼苦學工於屬文政和八年嘉王榜勅賜同上舍出身初任迪功郎大名府元城縣尉時河朔盜賊起以捕獲功改承仕郎復以功賞轉宣教授平陽府司録宣和六年春試學官有司愛其文典雅近古擢為第一除濟南府府學教授先是左司員外郎髙景云嘗見其詩竒之遂立薦於朝除太學博士時文格彫弊獨以古文倡之從者甚衆七年春李公邦彦起復先年當蔡京落職致仕其子攸用事李公欲託病求去公素蒙見知乃上劄子言大臣以道事君不可則止安可假病黙黙而退當抗論上前以盡大臣去就之義無使天下有伴食之譏李公頗不悅繼以非舊窠闕减罷遂不復除用嘗以啓上李公其末云顧積譌之云久宜致理之尤難首建裁損而國用未豐痛罷科繇而民力猶困邉陲初定當求守禦之方賊勢稍衰可弛防閑之策權貴抑之而益廣仕流濫矣而莫懲凡兹十數之大功未睹軒昂之成效政宜解榻以待士置驛以招賢博采寸長用俾遠見未幾金人入邉果如所見料靖康元年夏再除太學博士待闕間差權太常博士累轉朝奉郎時開府儀同三司簡國公髙俅薨皇帝令挂服舉哀承太常寺告報輪當賛導入劄子俅敗壊軍政致金人長驅罪與貫同等當退褫官秩示不終赦不宜辱舉推之禮數日未報復入劄子備論其事朝廷從之即除太常博士八月朝廷欲遣使金國以租賦贖三鎮令侍從䑓諫各舉三人公兩預其薦召上殿賜今名除秘書省著作佐郎借秘書少監奉使大金山西軍前到太原見國相尼堪時太原真定已陷租賦不能贖三鎮途中嘗有詩呈副使王坦翁曰中山忠義定何人數月相從笑語真未信功名孤壯志不妨詩酒寄閒身此來飽看千岩秀歸去遥知兩髩新就使牧羊吾不恨漢旄零落落花春又曰舊持漢節愧前人聞許傳來若不真五鼓促回千里夢一官妨盡百年身闗山吐月程程逺詩景含秋句句新孤館可能忘客恨脱巾聊進一盃春十一月十一日還朝十三日聞敵騎已南有㫖令同王雲等再議除侍從公辭乃已十五日知樞宻院事馮澥使尼堪借公徽猷閣學士副之是夜到中牟守河潰兵作過或云已有敵騎渡河左右甚駭謀取㫖改路馮澥問當何如公曰守邉防河諸把隘將士皆望風逃避奉使者又如此朝廷將何所頼以某處之唯有死而已今云敢回者行軍法衆遂定路中日一奏乞京城設備至懐州界逢金人大軍館伴劉思蕭慶云已遣使往汴京畫河為界三鎮更不湏理㑹隨大軍至西京界聞門下侍郎耿南仲同知樞宻院事聶昌出使交割河北河東閏十一月三日到京城外拘留冲虛觀嘗賦詩以見志曰戰馬南來久不歸山河殘破一身㣲功名誤我閒雲過嵗月驚人迅鳥飛毎事恐貽千古笑此生甘與衆人違艱難重有君親念血淚班班滿客衣金人獨遣馮澥同蕭慶入城請與皇帝相見欲議盟誓不從又遣蕭慶入城請與皇帝相見又不從許宰相親王出後數日兩樞宻兩郡王分使軍前議不合尼堪軍攻城愈急三朝北盟㑹編巻八十一
