body:
  text: 三朝北盟會編卷三十一宋徐夢莘撰靖康中帙起靖康元年正月二十四日庚寅盡其日二十四日庚寅斡里雅布再奏書云伏承御書特加温諭尋繹研味言悉由衷敦固懽好益光聖德陛下既全始終質諸天神斡里雅布等永念同盟敢不祗畏中山河間兩府亦望差近上親信之臣嚴賜勅㫖令從隨少宰専行管勾交撥疆界據喝下金帛擬准見御寳文字續次交送近者猥被聖恩賜致内樂百餘人不欲使去父母之邦尋用放還辱從所請感戴之至無任下情外據所割三府見任職官内不係本土之人恐有知識欲要者内椿定姓名垂示即當發遣如不見公據請不受留内太原一路官員乞便于交撥宣内分白開指亦憑依應施行今差韶陽軍莭度使耶律忠乾文閣待制太平甫充計議使副謹奉書奏謝以聞謹奏朝廷復遣李稅致問書曰大宋皇帝致問于大金皇子郎君比者盟書既定和議方深用孚千載之期永保兩朝之好輒因使介以物將誠詳具别紙惟冀留意謹白送珠子帶一條上有北珠五十顆正透飛鳳犀帶一條金稜真玉注椀一副真玉酒盃十隻細鞍轡一副琥珀假竹鞭一條又别遣肅王為質請歸康王書云比承書示欲别遣親王為質今令弟肅王前去可諒誠慤之情然念康王留軍中今將一月朝夕憂念未甞少寧雖皇子郎君義同一家必垂顧恤奈手足之情同氣之親一日不見實有三秋之念敢望仁慈候肅王到日便令康王囘歸以慰兹寤寐注想之懐情深意切書不盡言再此布叙惟冀孚察白斡里雅布以棠義軍節度使大安仁龍州團練使耶律忠充使副送還康王書云使至迭承來喻請送康王備聆聖心懷注之切今如命遣送前去縁以康王乆留軍中謹贈金一萬鋌聊用厭驚式表微意謹奉書奏聞謹奏王黼削奪在身官爵長流衡州靖康遺録曰是日籍王黼第得金寳以億萬計初黼賜於閶闔門外周圍數里其正㕔事以銅青瓦盖覆宏麗壯偉其後堂起髙樓大閣輝耀相對又于後園聚花石為山中為列四巷俱與民間倡家相類與李邦彦軰遊宴其中朋邪狎昵無所不至及至籍没百姓争入剽掠官不能禁斬數人而後已黼出城數十里至負固村追斬其首百姓謂之負固村云秀水閒居録云王黼作相初賜第相國寺東又賜第城西竹竿巷窮極華侈累竒石為山髙十餘丈便坐二十餘處種種不同如螺鈿閣子即樑柱門忩什器皆螺鈿也琴光漆花羅木雕花碾玉之數悉如此第之西號西村以巧石作山徑詰屈徃返數百步間以竹籬茅舍為村落之状都城相第乃有村名識者以為不祥黼侍妾甚衆有官封者十八人八夫人十冝人靖康前録曰二十四日府尹聶山進劄子先追王黼行差遣人追及于應天府杞縣之南十里負固村遂戮之函首京師隨行金帛不可數盡為小冦剽掠差度支郎中邢倞籍其家財倞措置無術小人乘隙鼓唱爭入黼第絹七千餘疋錢三千餘萬金玉之類為羣小攘奪者三分之一王時雍領尹詐稱搬納王黼家者次第給賞優者推恩衆賫金帛入黼第即得首領者二十餘人梟首令衆餘皆弃物而遁别録云縊殺之於雍丘中興姓氏姦邪録曰王黼字将明開封人也崇寧二年登進士第蔡京喜之累擢為翰林學士厚結内侍梁師成輩多薦引之者政和七年除尚書右丞八年除中書侍郎宣和初師成薦為少宰惟諂侫師成凡事行其意而已每入禁中為柔曼之容効俳優諢話以説上意置應奉司于其家四方珎貢皆由黼以進奉而多半隠盗于家公然賣官取贓無厭京師為之語曰曰三百貫且通判五百索直秘閣其無亷恥如此二年上欲乘契丹為女真所攻因復取燕山黼力贊出師及用童貫蔡攸為帥四年加太宰楚國公二子皆加徽猷閣待制上命内侍幹當御藥院盧端專起大第以賜黼黼建御書閣芝草生於上黼邀上駕幸其第親賞之人知其不祥五年拜太師封楚國公領三省事六年李邦彦宻結蔡攸令譖黼而罷之靖康初貶廣州安置遣使斬之時年四十八士民皆快宣和録曰宣和五年九月太傳王黼言臣以昧陋藐然之迹充位公傳總治三省無明謨顯庸仰稱敷求熈帝之載不足以格皇天膺福宣和癸􅆗八月芝生賜第正寢之東閣柱檚之間狀如芙蓉懼無受祉之寔且在側陋不敢奏後兩浹旬得賢治定閣産神芝二本袤皆踰尺一生于漆柱一生于繪屏生閣柱者状如雲翔龍爪虬然其杪附於柱其中穹窿特起叩之有聲生繪屏者如慶雲晻靄表裏穿透皆所創見昔未有之臣俯伏諦觀蚤夜怵惕以思前年䝉恩得賜長生大帝聖君容許嚴奉閣上又蒙恩特賜九華玉真安妃御容奉安閣下日有光明不間隠微神休聖迹固己乆熟觀今芝所生天威不逺咫尺實惟帝君睿聖當宁安妃神靈在天貸臣竊位曠官罪悔衆積而憫其赤心皎然區區無他賜也故生祥瑞昭晰顯著如韓愈所云此生人不識唯有天公知臣與有焉不勝踴躍抃蹈之至且念所居雖陋寔為疇咨之地芝房吉祥一日三秀是豈孤臣之幸也盖邦之榮懷亦尚一人之慶輙繪圖昧死以聞奉聖㫖手詔卿以碩徳偉望簡在朕心傳巖之求合符節以來海隅加治神祗咸若凡建大事决大疑莫不克舉方時平燕之䇿在廷之臣罔攸措議惟卿有先見之明助朕獨斷從中指授曽未期年九有以截確然志在王室格於皇天致草木效靈見於賜第一日三秀袤皆踰尺結英吐華有若翔龍慶雲之狀豈不韙歟且若芝房之歌薦于漢廟著之方册寔為丕祥厯代寳之今者得非寅亮爕理之功薰為和氣致此殊祉瑞于家庭以昭神袛在天敷祐之靈以示朕頼于良弼之義君臣相湏休悦同體奏牘來上良用嘉歎王黼者開封人也舊名甫及顯貴上以其姓名與東漢宦者同詔易為黼登第後一任為相州司理蹤跡已詭譎入輦轂為何丞相執中所喜遂厯書局館職政和初為司課蔡京薦之遷諌議大夫黼既驟遷遂背執中疏其惡二十事與京而執中不知也毎稱道黼不已一日省中俟其來見則又及黼而京曰少師何主黼若是黼定何如人可保乎執中方談其羙京即于座後出一卷書使讀之乃黼擊執中疏也執中大愕始變色曰畜産乃爾若是繇是執中乃謝絶黼黼因投鄭居中黨中而居中前後數于上前稱薦黼有宰相才改御史中丞陞翰林學士黼特事宦者梁師成為父與折簡必呼之為恩府先生方上躬攬權綱故毎謂羣臣多宰相門人如黼獨首出朕門下黼每進見上毎為前席論外事動移時專恃憸險能先事中意當是時户部尚書患不得人京因奏用黼上大喜謂之曰太師乃肯用爾爾能當此乎黼對以匪難也時用度侈版曹嵗入有限非宰相應副必闕事黼既以才選能彌縫中人佗不恤也繇是未半年自親王貴戚暨班直禁衛動乏俸賜中外乃大噪黼猶掦然且誑上謂左藏自充仭第監臨失職爾臣願自入庫治究其事而勢家吏僕聞此得伺候黼來掩之争索所未結之物及視庫中則實一空于是數百十人皆大喧更攔黼不得出因窘甚用老吏為之計乃抱大牓告之曰尚書有約束無佗官吏作弊爾今當排日用次第給爾等可視此也即趨東墻掛牓衆走從之黼迺得繇東庫角門跨馬遁去上聞而不樂遂以失職罷猶改宣和殿學士以宫祠奉朝請賜甲第居之其賜第之隣乃故許黄門将宅也黼又倚中人奏請彊奪之其子弟出怨言而黼又隂白盡逐去中外始大不平俄復翰林為承㫖丁父憂起復遂除左丞遷中書侍郎乃有大用意時政和八年也黼靣潔白若羙婦人而目精鬚髪盡金黄且豺聲未乆拜相委聽愈専當時宦者梁師成從中秉相權故使黼表裏一旦恩數儀物有踰于蔡京矣使黼專任乃事外飾奏罷堂吏添支省併書局皆恊一時事論然專事逄君依羣宦故獨不敢及佗其後罷學校乃多取贍學錢奉宴遊未乆又入劄子乞置應奉司而自領之内則梁師成為提舉又啟北征事且與童貫力謀數以詩進顯結鄆邸畫奪宗之策密語上曰臣屢令術者攻東宫命不乆矣先是黼既相再錫大第于城西開便門與師成宅對街以相來徃及燕山告功黼益得意乃妄托事言家之屏風生玉芝上為臨幸睹黼之堂閣張設寳玩石山侔擬宫禁喟然嘆曰此不快活邪時上即幸黼第又從便門過師成復來黼家駐因大醉黼自出傳㫖支賜命放㪚衛從百官于是禁衛從諸班直爭願見上始謝恩不肯㪚因詾詾師成與譚稹乃扶持上而出撫諭之上醉不得語矣復入夜漏上五刻乃開過龍德宫複道小墻謂鹿寨門者以還内宦者十餘人執兵接之而去三衙衛士無一人得入者是夜諸班禁從皆集教塲備不虞幾生變翌日猶不御殿殆半日人心始安祖宗以來臨幸未之有也上深悔之曰孫存愛我與轉一官存隨龍舊人為衛士首時對黼求見上不肯㪚者黼又同蔡攸每罷朝出省時時乘宫中小輿召入禁中為談笑或塗抺粉墨作優戱多道市井滛言媟語以媚惑上時因謔浪中以譛人輙無不中黼方恃奥自若至賄賂公行于朝野自通判以上皆有定價中外大喧上雖微聞然不之信至是蔡攸朱勔皆能取騐于上因是怒併力攻師成勢折上於是怒黼始罷而致仕居第領應奉司如故厥後将過冬郊而垂欲相之㑹上内禪百寮入賀上下咸有喜色而黼靣獨若死灰未幾誅死矣且黼士人也又以才學受知君相則其冨貴可力致乃由徑茍得一時之味因甘之流而不返夫既以非道而進後必以非道而終决矣是徒累國家亂天下如此可為世戒也北征紀實曰燕地號沃壤用兵既乆加金兵殘毁桑柘生具為之一空我得之僅三年曽無斗粟尺帛之助常勝軍五萬月給人二斛戍兵九千月給人六斗則已十餘萬斛又有食糧軍及諸州官吏不在數也故悉出河朔山東河東之力以應辦纔一年而諸路皆困矣科配既乆道阻常率費十餘斛多至二十餘斛始能運一斛至燕山以有限之物輸之無已雖黼當權時内外帑藏及齊趙晉代民力皆已告竭焉上不樂垂以罷黼黼患失遂作免夫之令因得少失其權以為燕山之役天下應起夫令免其調發獨令計口多寡盡出免夫錢違期限者斬天下所得免夫錢大凡六千二百餘萬緍以二千萬應副燕山二千萬樁管然朝廷時時借用及宣和七年春正月唯六百萬見在餘二千二百有零則莫知為何用此寔充應奉矣盖此事􅂊定號經撫房者朝廷一時文案黼奏丐降㫖一切焚之故不得攷焉及宣和六年黼罷之後燕山日夕告乏而山東河北盗賊起少者不下數千人若張仙髙托山軰皆連兵數十萬餘科配亦不行矣閒居録又曰宣和間王黼急于財用以燕山免夫為名徧索天下所得纔二十萬緡而結怨四海矣又令州縣取䀋課一年最髙者立為定額不許融虧欠及分釐監司守令一例黜責于是計户索錢猶不能給羅織告訐無所不至犯法者不復行刑但令買䀋厚利悉歸大商楚毒被于良民迯移逋負不可勝計别録曰開封府奉本府捉事使臣韓應等狀䝉差體究王黼所在契勘二十四日至雍丘縣城南二十里永豐鄉輔固村為盗所殺取到首級申三朝北盟會編巻三十一
