body:
  text: 三朝北盟㑹編卷二百二宋徐夢莘撰炎興下帙起紹興十年六月十一日甲寅盡閏六月十八日庚寅汪若海剳子曰朝廷以藍公佐之回和議頗變以龍神位四廂都指揮使劉錡為東京留守兼節制軍馬以五月十六日始次順昌而十七日烏珠之軍已壓境烏珠之敗盟舉兵求祁州也以大教為名起國中之兵一頭項入山東曰聶哷貝勒一頭項入陜西曰三郎君一頭項入西京曰李成烏珠與三路都統領龍虎大王韓翟二將軍以五月十二日入東京初遣三路都統既下淮寧來取順昌犯白沙劉某夜遣師晨至白沙相拒終日合數陣三路都統大敗而去乞援于烏珠未至間劉某遣驍騎將閆充夜刼三路都統寨正中中軍連破五寨見毡帳數重朱紅美車有一將急披甲呼曰毋殺我留我則太平軍士不聴殺之其餘不及披甲因亂激殺數百人相枕籍死者莫知其數由此虚警晝夜不敢下馬唯于馬上寢食已而烏珠率重兵來劉聞其將至也㑹諸將于東門上問策尚安出諸將或曰今已三大戰軍士夷傷者衆若烏珠自至恐勢力不加不如權䕶老小渡淮劉正色謂諸將曰朝廷養兵十五年正要一朝為緩急之用安可見大敵而退况老小一動必不能全敵騎無數十里之逺者若被追老小必亂甲士未能保何老小之可全不如背城一戰于死中求生上足以報荅國家下足以取富貴請為諸軍五日内殺回烏珠衆皆以為然人人激勵上下同心皆為破敵之志於是壊櫓沉舟以為决戰烏珠所號長勝軍至則責三路都統龍虎韓將軍等不肯厮殺致敗軍馬之衆謂其衆曰誓與取順昌掉在溺河折三箭爲誓折一箭曰初九日早飯于府衙㑹食折二箭曰能過車輪之下者皆殺折三箭曰婦人財帛盡以賞軍其所將攻城士卒號鐵勃屠又曰鐵塔兵被兩重鐵兠牟周匝皆綴長簷其下乃有毡椀三人為伍以皮索相連後用拒馬子人進一步移馬子一步示不反顧以鐵騎為左右翼號拐子馬皆是勁卒充之自用兵以來所不能攻之城即勾集此軍六月七日烏珠自臨城於潁河北岸剳寨三十餘里約十五萬九日辰時扣城西門索戰謂城上人曰你只活得一箇日頭猶吾人言一日也劉出軍五千人接戰自西門轉向南門又轉自東門及東北角始與敵騎徃來馳逐後直撞入敵軍中手相扯捽刀斧相斫至有提去其兠牟而刺之者軍士有中刀洞心而猶刺敵不已者有偶失地利與敵相抱于城濠而死者血戰自辰時至申敵乃敗走横屍遍野不知其數劉亦斂兵入城烏珠大怒親擁三千餘騎直扣東門射城上著城上砲架皆滿又被城上軍以勁弓射烏珠既大敗乃移寨于城門西門開掘壕塹自西南至西北約十餘里欲為不戰之計而坐困順昌劉又夜使人刼之上下不敢寧處十二日乃盡走敵自言入中原十五年嘗一敗吳玠以失地利而敗今敗于劉真以戰而敗疑是外國借來人兵烏珠至太和因得氣疾黄腫下血居縣門樓卧兩日至淮寧府龍虎者始敢獻言以為不當南來亦猶南人深入我地烏珠無言怒諸軍之敗撻韓將軍九十栁條翟將軍八十栁條其餘或一百或二百哭聲徹天韓將軍頗出怨言曰我只為你於和尚原壊了人情莫不疑貳住三日留翟將軍守淮寧府入東京欲徃河北簽人有王山者言河北無正兵可簽只有王姓耳王山者烏珠之舊用知潁昌府至是攜來欲令再守順昌王山言大國中只有烏珠主兵權舉國中兵盡起祁州所教之兵盡隨烏珠除烏珠所將一頭項每戰烏珠親為擁押隊其餘頭項如龍虎韓將軍之徒皆無鬭志又其麾下皆不欲南來是以莫肯為用其所將孔彦舟酈瓊趙榮之徒只用戰馬隨軍並無兵權烏珠之在順昌城下三郎君敗于陜西亦遣人告急焉王山言是日南宋再有一頭項乘其弊可盡成擒也但劉自金人至順昌見陳蔡以西皆是望風投拜又見舊知州王山在城下恐城中人茍求性命有賣義於外者更不敢用順昌府官吏軍民充守禦既分其地於城上而又分其兵于城中遂巷口擺布每遇令牌一過即百姓寂無一人敢出户者止有兵五千人可以出戰計劉所統不過二萬人中又止用五千擁其舉國精鋭之師即今諸大將所統或十萬或二十萬使乘劉錡戰勝之後士氣百倍之際諸路并進烏珠可一舉而破甚無難者今烏珠之在東京譬如取大魚當逺其索而用之不必聚天下之師以圍東京今諸大帥惟淮西最務持重不肯輕舉宜以淮西之兵塞其南路俾西京之兵道河陽渡孟津俾淮東之兵卷淮陽渡彭城俾陜西之兵下長安渡蒲坂則河朔之民必響應冠帶而共降其黨契丹黑水渤海諸國必合為其主而自立則烏珠可不戰而擒金國可不加兵而滅何則我今以淮西京西淮東陜西四路之兵共圍烏珠是以四易而攻一難我今以淮西自固根本而以京西淮東陜西出其不意是以四難而攻一易烏珠見天下之師盡圍之必以死戰故曰一難兵法曰勿攻其所難如遂為之是烏珠之攻劉錡也今舉國之師盡聚于東京我仍直趨于河北則河朔之民必響應則烏珠可不戰而擒也烏珠一敗于順昌儻又敗于河朔則苻堅之事其果見于今日矣且堅淝水一敗安能遂㓕苻氏故曰契丹之屬必自立則金人可不用兵而滅也今聞淮西之師得亳便還義士莫不憤甚為朝廷惜之恐人見淮西之班師弗察敵情之強弱故躬徃戰地或訪親臨陣之人或質被擄得脱之士聊述順昌之戰勝以偹朝廷之採擇焉十三日丙辰岳飛統制牛臯敗金人于京西十六日己未永興軍路經畧使郭浩統制趙建元攻金人于醴州破之克醴州王徳至順昌府劉錡在順昌受圍也屢乞援師于朝廷詔王德應援是日也徳至順昌而金人已退順昌矣劉光世軍和州二十一日甲子呉璘軍統制姚仲尚起樊彦鄭師正以兵援郭浩及金人薩里罕戰于鳯翔府大破其軍二十二日乙丑司農少卿李若虚與岳飛計議軍事金人敗盟朝廷遣李若虚往鄂州軍周聿徃建康府軍周矼徃楚州軍各計議軍事若虚到鄂州日飛已進發是日若虚追至徳安府見飛言兵不可輕動且班師飛不從是時諸軍皆已進發若虚曰面得上㫖不可輕動既已進發若見為可進則當以詔還矯詔之罪若虚當任之飛許諾遂進兵二十三日丙寅岳飛軍統領孫顯大破金人排蠻千户于陳蔡州界二十六日己巳劉錡加武泰軍節度使侍衛軍馬都虞候沿淮制置使韓世忠統制王勝敗金人周太師呼拉貝勒于淮陽軍閏六月一日癸酉朔張俊軍統制宋超敗金人於永城縣朱家村五日丁丑涇原路經畧使田晟及金人戰于涇州是役也晟有怯敵之意令軍中卷旗而出衆知其必退矣數合而遁彰武軍承宣使永興軍路經畧安撫使郭浩加奉國軍節度使侍衛步軍都虞候武康軍承宣使利州路安撫使楊政加武當軍節度使侍衛步軍都虞候定國軍承宣使秦鳯路經畧安撫使呉璘加鎮西軍節度使侍衛步軍都虞候十三日乙酉復陜西赦眷惟陜右初復版圖深念瘡痍之遺民未洽朝廷之德澤念兹不靖肆彼長驅詭計潛師實忘盟約攻城䧟邑荐肆侵陵蹂踐我土疆侵擾我黎庶幸賴神人助順宗社降靈將士摧鋒爭賈無前之勇吏民徇國共堅不貳之心㨗奏已傳師干再克尚以蜂屯假息虎帳戒嚴介胄苦暴露之勞丁壯疲轉輸之苦由朕菲徳致爾阽危惕若厲以疚懐軫如傷而在已宜敷渙澤之渥用慰西土之人於戲撃敵以殄㓕為期方折衝于萬里得道者多助之至况有臣惟一心尚賴帷幄協謀爪牙宣力庻永清于四海庸共底于丕平咨爾多方體兹至意閏六月十八日庚寅王之道上皇帝書臣聞兵法曰未戰而廟筭勝者得筭多也未戰而廟筭不勝者得筭少也多筭勝少筭不勝而况于無筭乎又曰知己知彼百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗其言具在昭若日月信如四時後之用兵者不可不鍳也恭惟皇帝陛下比以金人不順入我郊畿肆命諸將出師恭行天討兹固子犯所謂師直為壯者然而不知陛下宵旰之暇亦嘗為廟筭計耶其未戰而勝耶其未戰而不勝耶臣雖至愚竊嘗為陛下籌之且有義兵有應兵有貪兵有驕兵救亂誅暴者謂之義兵兵義者王敵加于己不得已而起者謂之應兵兵應者勝利人民土地寳貨者謂之貪兵兵貪者破恃國家之大矜人民之衆欲見威于敵者謂之驕兵兵驕者滅今以吾之義兵而敵彼之貪以吾之應兵而敵彼之驕其論廟筭之勝與不勝固較然也若曰不知彼而知己一勝一負不知彼不知己每戰必敗則所謂知己知彼實戰之所先急不知羣臣為陛下計亦嘗言及此乎陛下自為宗廟社稷生靈之計亦嘗慮及此乎知彼可勝者果有幾乎我可勝者果有幾乎我之所不可勝者其相當乎抑亦有優而有劣乎昔之善為戰者先為不可勝以待敵之可勝常使不可勝在己可勝在敵此所以能不戰而屈人之兵也臣請為陛下言之且強弱衆寡之不敵也尚矣以強弱言則劉固非項敵也以衆寡言則曹固非袁敵也而項卒歸于劉袁卒歸于曹者豈有他哉得其道則雖弱能強雖寡能衆失其道則雖強易弱雖衆易寡爾臣觀敵有五敗陛下有五勝敵雖強且衆固無能為矣然在我有未必勝者三又安得不自知也且敵專事攘竊而陛下一本仁義此道勝也敵專務奸詐而陛下一本忠信此徳勝也敵起兵三十年用人如牛羊殺人如草菅而陛下視民如傷不憚屈已増幣俯徇講和之請冀與天下休息此仁勝也敵自烏珠用事上則欺幼主以擅權下則殺親族以播虐而陛下夙興夜寐不㤀父兄播遷之難方敵無約請和許還兩宫羣臣以為不可獨聖意篤於孝悌幸其必信斷然從之此義勝也敵前後專以和議欺㒺國家刼質二帝屠戮萬方天下之人恥失其君悼䘮其親恨不得殄滅此而朝食也乆矣陛下頃緣王倫與之畫地復聴其和當是時下而樵夫牧子者皆以為金人得計而陛下失計盖古人所謂和戎國之福者為其有以休兵息民也今兵不得休民不得息于養兵之外嵗取于民以供溪壑無厭之欲一有不滿其勢必至興師雖乆近未可知而理所不免臣每念及此未嘗不痛心疾首至於無如之何復自寛曰福兮禍所伏禍兮福所倚一是一非一失一得夫何常之有哉金人之得計所謂福也安知不為禍所倚耶和之必至于戰無可疑者但變速則祸小變遲則禍大變自彼則禍小變自我則禍大禍小則可轉而為福禍大則滅土無日矣速在三年之内遲在五年之内自彼則彼實先之自我則我實啟之今敵曽不二年無故敗盟引兵入境臣然後知金人向之所謂得計者今為失計而陛下向之所謂失計者今為得計向得而今失者福兮禍所伏也向失而今得者禍兮福所倚也此計勝也陛下有此五勝固可以勝矣然以臣觀之未見其必勝之理何則唐肅宗詔九節度討安慶緒重以郭子儀李光弼皆一時元功難相統攝特用魚朝恩為觀軍容宣慰使而不立帥師次鄴南方與賊對未及戰而潰史臣以為王師無統進退顧望責功不專是以及於敗今者諸軍大㑹境上而不置統帥臣所謂未可必勝者此其一也齊景公召司馬穰苴為將以扞燕晉之師穰苴辭以臣素卑賤士卒未附百姓不服願得君之寵臣以為監軍景公使莊賈徃賈後期不至穰苴斬之以徇三軍士皆為之戰慄由是晉師聞之罷去燕師聞之渡河而解盡取所亡邦内故境以歸今國家用兵十有六年矣士卒之𨽻諸將者不可謂不親附矣而罰終不行緩急果可用哉臣所謂未可必勝者此其二也今日之兵分𨽻張俊者則曰張家軍分𨽻岳飛者則曰岳家軍分𨽻楊沂中者則曰楊家軍分𨽻韓世忠者則曰韓家軍相視如仇讐相防如盜賊自不能奉公惴惴然惟恐他人之立功而官爵軋于己也且其平日猶或矛盾若此使臨大利害想其中心必不能效相如之屈于廉頗冦恂之不仇賈復先國家之難而後其私怨安能保其不自為敵國而以刃相向耶臣所謂未可必勝者此其三也又况烏珠所領之兵無非脅從瓦合猶能自號元帥以統之初不聞其契丹自為一軍而各聴其本國之號令也今不置統帥而欲求勝能保其必勝乎敵自與我角前後無慮數百戰敵未嘗不勝我未嘗不敗者非敵能自勝恃我師不戰而潰遂成其勝爾夫所以不戰而潰者非他不畏我而畏敵故也使皆畏我而不畏敵敵亦何能為哉今罰不行于三軍而欲求勝能保其必勝乎春秋以來如晉楚用兵以將帥不和而敗績者多矣惟是敵人前後驅廹鄰國入為邉患逮二十年未嘗聞其有違衆犯令自為釁隙以相攻者今諸將不和無以分之而欲求勝能保其必勝乎陸贄奏李晟李建徽楊惠元李懐光四節度狀云四軍接壘羣帥異心論勢利則敻絶髙卑據職名則不相絶屬懐光輕晟等兵㣲位下而忿其制不如心晟等疑懐光醸禍蓄奸而怨其事多凌已端居則互防飛謗欲戰則第恐分功齟齬不和嫌疑滋甚覆亡之禍翹足可期舊患未除新患方起憂憤所切實堪疚心由是言之臣前所謂可勝者五恐不足恃以勝而所謂未可必勝者三恐不可不深思熟計而求其所以勝也臣願陛下慨然奮發自謀諸心選擇耆徳素負天下之望者謀及龜筮謀及士庻儻龜從筮從卿士從庻民從矣然後下明詔遣安車而召焉逮其入見陛下宜避正殿親出玉音而諭之曰今敵國深侵海内騷動士卒暴露於境予一人卧不安席食不甘味社稷安危一在將軍願將軍率師應之將軍既已受命陛下乃齋戒告於大廟灼龜卜吉以授斧鉞如武王之命太公望然後遣行先行之數日遣誥諸軍曰予一人以爾諸軍元帥不立日夜憂之恐貽一國三公其誰適從之誚今謀之卜筮卿士庻民蔽自予一人之志得元老其俾統六師自閫以外咸得制之邦有邦典軍有軍政用命賞于祖不用命戮于社毋或不和不靖自底于罪而為將軍者臨屯之日又能拊循士卒同甘苦上不失于闗侯之驕下不失于張飛之不恤有所不誅誅必及其大而威有所不賞賞必及其小而明夫然後勒兵赴敵臣見其一戎衣而天下定不得專為有周美矣伏望陛下追懐祖宗積累之難畀付之重痛憤父兄戮辱之苦暌隔之憂矜念軍興以來金人所至積屍腥于草木流血丹于川原毋以臣人㣲言輕遂忽而不聴遂棄而不用古語云投機之㑹間不容髪又云後將噬臍悔可及乎臣願陛下不為衆口所奪斷自宸衷而必行之使異時獲投機之功而免噬臍之悔實天下幸甚臣之狂瞽不獨今日當紹興八年六月王倫使金還金遣使隨倫報聘臣於是時固嘗有書致之前吏部魏矼以述和議有九不可一可之説當紹興九年五月和議既定淮上興役以備兩宫來歸宿食供頓臣於是時亦嘗有書致之前左諫議大夫曽統以迎奉兩宫有五事當為先務之急惟臣區區憂國愛君之心無易二書重以家貧地寒逺去軒陛不獲自達是用致之魏矼曽統庻幾其有聞于陛下不圖今日乃見陛下似與臣意有相符者雖然亦非臣之私言天下之公言也故敢復進千慮一得之愚獻于閣下位卑言髙罪在不貸惟陛下憐其愚忠而曲賜保全無使天下以臣為妄不勝俯伏待罪憂懼之至三朝北盟㑹編卷二百二
