body:
  text: 三朝北盟㑹編卷一百九十八宋徐夢莘撰炎興下帙起紹興九年十月十九日丙寅盡十二月丙寅新知鼎州王彦卒續觱為公行狀曰王彦字子才河内人隸弓馬子弟所政和五年徽宗皇帝臨軒閲試以武藝中選恩補下班祗應從涇原路經畧使种師道兩入夏國蕩平偽洪夏軍割踏駱駝兩城當靖康初金人圍太原京城遣發新招赴援敢戰後軍太行山焚輜重肆掠百姓奔城門盡閉公勒兵追殺俱盡金人陷懐州鼓行及闕公流涕曰君父有難雖生何為乃棄家奔京師求自試討敵河北招撫使司選充都統制樞密院令帥張翼曰安民岳飛等十一頭項七十人渡大河已陷州縣措置招撫不順諸軍民既濟深入陷地與金人戍兵萬衆鏖戰大破之收復衛州新鄉縣傳檄諸郡敵以為大軍之至也率數萬衆薄公營圍之數匝矢如雨將官既寡且器甲踈畧疾戰輒不利即決圍以出遂潰敵見公所乗甲馬獨異復盡鋭追擊公獨與麾下數十人馳赴所向披靡轉戰十數弓矢俱盡㑹日暮得免它將往往復渡河以還公收散亡得七百餘人保共城西山間遣復結集兩河豪傑以圖再舉時金人大立賞格求公甚急公在西山常未夜即徙其寢所部曲或知之泣以告曰我曹所以棄妻子冒百死以從公者感公之忠憤期雪國家之恥爾今使公寢不安席我則非人乃皆面刺赤心報國誓殺金人八字以示誠節公益自感勵大布威信與士卒同甘苦未幾兩河響應招集忠義民兵首領如傅選孟徳劉澤焦文通等一十九人寨十餘萬衆綿更數百里金鼓之聲相聞自并汾相衛懐澤間唱義討敵皆受公約束稟本朝正朔威震燕代金人患之列戍相望時遣勁卒撓沮糧道毎勒兵以伐之且戰且行大小亡慮數十百戰斬獲銀牌首領金環女真及奪還河南被擄生口不可勝計公聚兵既衆慮糧儲不繼一日盡發軍士運糧㑹有姦人以告敵乘我之虚遂以大兵入營壘公率親兵乗高以禦强弩飛石所向輒摧將士賈勇呼聲動地敵之斃于營者相枕藉悉以馬負之而去猶恃衆欲以久困公即布長圍遮絶餽運者旬餘公檄召諸寨兵大至即宵遁時金人鋭意中原特以公在河朔兵勢張甚故未暇南侵謀公益急一日金人召其首領俾以大兵再逼公壘首領跪而泣曰王都統寨堅如鉄未易圖也必欲使諸將者願請死其為所畏如此公方繕甲治兵約日大舉直趨太原石嶺闗以臨代北告訴于東京留守資政殿大學士宗澤澤得以便宜從事奏擬公武功大夫忠州防禦使河北制置使遣書延公㑹議公將萬餘將發悉召諸寨統兵官指揮授方畧以俟㑹合既行敵以衆兵尾襲而不敢擊遂濟河既至京師宗澤握公手曰公力戰河北以病金人之心脇忠勇無前海内所聞然京師者朝廷根本某累上章邀車駕還闕取公宿兵近甸以衛根本公即以所部兵馬付留守司因差統制官張偉統轄於滑州界沿河沙店以上下掃把截令公量帶親兵赴揚州行在所有旨令閣門引見上殿時已遣宇文虚中楊可輔為祈請信使副議而公見宰相力陳兩河忠義民兵引頸以望王師願因人心北征犄角破敵收復故地言辭憤激大忤宰相上殿指揮遂寢差充御營平寇統領官時范瓊為平冦前將軍公素知瓊臣節不著難與共事即稱疾知樞密院事張公浚宣撫處置川陜奏公為前統制官時盜賊方熾公為先驅所過肅清至漢中改差權發遣利州路兵馬鈐轄兼提舉訓練屯駐軍建炎四年改差金均房州安撫使知金州時中原盜賊蠭起大者據郡縣鑄印章擅生殺更相吞噬以圖非望而饑饉荒榛無所資食唯四川號為全蜀易於保聚磨牙揺毒垂涎吮血者實繁有徒金州適當蜀之後門兵備刓缺事力么麽公拊民治軍寛猛叶宜夜以繼日未幾大敗桑仲時桑仲乗陷徳安襄陽之勢擁兵西向進攻均房守將李倫清韋知幾奔竄凶威益熾衆號三十萬直擣金州白玉闗仲公舊部曲也則又申牘以請於公曰仲于公無敢犯願假道入蜀以就食耳公謂將佐曰吾素知仲之為人雖能馭士卒輕財善鬬然勇而無謀保為諸君破之乃遣統領官閻立為先鋒賊恃强鋭甚立與戰不勝遂遇害將士失色或請避賊者公叱之曰樞相張公有事于闗陜使仲越金而至梁洋則腹背受敵大事去矣即勒親卒及民兵疾趨長沙阻水據山設伏以待之賊望官軍少輒仰高蟻附摶戰公執幟麾士士悉殊死鬬久之賊氣􅉵欲還吾伏發因大潰發兵馳擊斬獲數萬賊退保房陵公休士進擊賊復敗追奔至于白磧房州平是秋權京西南路副總管李忠反殺宣撫處置使司招安提舉官閣門宣賛舍人遂攻金州諸闗以閲四川公提兵控禦躬冒矢石賊沈鷙善戰又其下皆河朔驍勇官軍與角輒不利遂陷諸闗公退舍秦郊令將士盡伏山谷間息烽燧噎金鼓禁樵牧又焚秦郊集有若真遁者以誘賊秦郊去郡城纔二十里道路夷坦寂無人聲公募必死士預易麾幟色號設竒以須其至閲再信賊游騎至秦郊公召將佐曰賊以我為遁明日當悉其家屬乗高長驅以入郡城夜半分官軍為三路遏其衝又以五百騎伏于麓凌晨賊果大至官軍逆戰聲震山谷勝負未分也而伏騎張翼繞出賊背賊大奔潰擒馘萬數生口無筭輜械蔽野追襲至永興之秦嶺因收復永興之乾祐縣以歸時金州困于調度廩無儲積士有饑色所得資幣盡分軍伍賴之以饒方賊之遇于秦郊見吾麾幟色號特異固已駭怖念其老幼業與之俱故其戰甚力而破敗最甚焉初桑仲既還襄陽已而鳩集散亡攻圍鄧州鎮撫使譚兖力不支委城夜逃賊復熾朝廷在逺未暇致討務存懐撫因就除仲襄鄧隨郢鎮撫使革心而仲稔惡不悛反藉專征之權南攻徳安西據均陽是冬盡以其衆分三道一攻住口闗一出馬郎嶺一擣洵陽縣前軍去金州不逺三十里公曰仲以我寡彼衆故冦三道以離吾之勢今吾破其堅即脆者自走矣時賊自馬郎之北公遣統制焦文通禦住口而自以親兵營馬郎與之對壘者幾月大戰凡六日賊大敗奔潰縱兵追擊擒統領將官二十七人俘獲壯士數千衆均州平仲之敗也為其黨所殺時又有王闢董貴郭守中阻兵闚蜀雖兇悖虐焰下于桑李然其小者猶不減萬數公悉討平之呉玠為宣撫處置使司都統制守和尚原大摧烏珠公兼同都統守建康屬破鉅冦二公實樞相張公浚所選任大犒元樂詩有陣頭雹散千鈞弩漢上風馳八字軍之語至今人歌之公威稜既著雖逺方持兵者願聽指蹤如知華州李子華知陜州魯闕保據山寨襄唐鎮撫使李横實為鄰境知虢州耿清又以部來歸受公節度于是宣撫處置使司又以公節制商虢陜華沒于偽齊公曰上雖南巡不忘西顧令商虢陜華没于偽齊而陜郡又密邇河東它日恢復故疆必自此始則臣誤膺閫寄奚敢偷安乃遣僚屬高士瑰部公兵將進圖商虢直抵盧氏與敵大兵三遇再破走之遂定商州紹興三年春首金人偽皇子都統郎君大舉圖蜀自商州以入守將邵隆移治上津敵遽至跳奔初樞相張公前召公與呉玠及興元帥劉子羽㑹議漢中約金人若以大兵入蜀即三帥叶勢相為手臂公聞敵大入即駐軍漢隂一帶以應梁洋而金併兵自上津疾馳不一日至洵陽境上公飛檄召漢隂諸軍統制官郭進先以兵三千人至闕流乗夜發闕字于沙隈敵捨騎鵝鸛來攻一日凡數十合進等禦之殺傷甚衆明旦金人知官軍單寡即步騎並進塵土蔽天公曰敵逺鬬飈鋭難與爭鋒彼所以疾攻者欲因吾糧食以入蜀耳即盡焚儲積發居民趨險保聚盡督漢隂兵自石泉趨西鄉鄉將與宣撫制置使司及都統制司兵馬㑹合併力禦敵公次西鄉樞相張公遣幹辦官甄授付公札札急令清野㑹合所以禦敵者雅如公䇿公遂踰西鄉都統制司移文命公控禦松林明月諸闗公部分既定敵窺伺所以遂越漢水敵半渡公命馳擊之大破其衆生擒漢兒軍八十餘衆時宣撫置使司兵馬萃于饒風闗敵攻之甚復召公援公盡以兵陣于饒風下而發精兵乗高禦敵一日數十戰長鎗衝突奮迅飄忽敵披靡摧折弃甲星散傷痍踵路時敵殺馬而食者已旬餘顧其營去已逺欲退不能進益窘時利路統制官郭屯營次當饒風背乗夜以輕兵銜枚襲取之饒風失守諸軍盡却興洋亦焚儲積為清野之計敵雖至漢中轉戰千里死傷過半且無掠大失望其衆洶洶異謀欲叛復慮我師掩至即無遺類遂自褒斜遁去樞相張公以敵深入而亡失士馬之多前此有勝實同敗衂而卒保全蜀者係諸將勤力弃過錄功用明黜陟聖㫖盡加秩行賞有差授公保大軍承宣使公曰某偹任爪牙不能殄滅强敵致彼深入者皆某之罪也奚敢與它將比獨不受士益重之時敵雖遁而偽齊遣周貴為京西安撫使盜據金州發鎮兵復自饒風以出至漢隂周貴領兵拒戰統制官許清横擊大破之貴僅以身免金州平時金州新苦于兵軍食益難樞相張公命兼使司參議駐主閬中以備川蜀而留格喜以兵三千控禦金房俄有令公移軍渠州照應巴達等州一帶闗隘紹興五年五月聞下詔車駕親征劉豫公泫然曰上躬犯霜露以誅僭逆此正臣子捐身報國之秋今分鎮詔書有悉心戮力屏翰王室之語乞盡提全軍援行在州至于再三宣撫處置司終以先獲聖旨令公保蜀遂不果行兼荆南府兼充荆南府峽州荆門公安軍撫使江陵盜賊後城郭為墟前徙枝江公至始還舊治帑廩室乏無三日儲乞置屯田以為戰守耕之計爰擇荒田分將士為百莊莊耕千畝唯山口富里田舊截阻河置千户塘瓦窰三堰隄水分溉為上堰廢榛莽公親督將士俱畚插從事計工六萬有畸不浹旬告成公私之利無窮天下論屯田實不擾民而得充國之遺意者必以公為稱首詔奬諭之紹興六年制授公保安軍承宣使京西南路安撫司是時岳飛為京西湖北宣撫使當受飛節制公昔為招撫使司都統制日飛實以偏將從新鄉之役違公節度飛以其所部别為一寨已而公兵大集飛一單騎叩公壘請罪左右或勸公斬飛以謝衆飛惶恐色動公曰汝罪當誅然去吾之久乃能䇿身歸服氣足尚也方國步艱危人才難得豈復仇報怨時邪吾今捨汝因以巵酒飲之飛再拜謝及公為制置使飛終不自安即檄使赴榮河把隘自爾復暌及是公上章引嫌辭免劉麟再冦淮甸車駕親征駐蹕平江府樞密院奏以都督府㕘軍除知邵州命以所部隸侍衛馬軍司劉錡公聞之喜甚曰所付得人矣二人素相知心且篤交契士論欽之就除知鼎州將行疾遽作不起享年五十詔贈昭化軍承宣使息六人仍與一子見闕差遣照管孤遺時荆南有彦舊部曲聞彦死請于安撫使薛弼即佛宫迎彦繪像為位以哭凡三日士大夫有意于人材者莫不時為嗟惜彦娶劉氏封碩人長子顯成忠郎其次世官世雄皆未授命彦事親盡孝撫弟姪盡愛彦既貴母太碩人已老彦喜懼常形色晨昏無違誕日必設樂獻壽拱手侍側母素嚴設飲食起居必劉氏親庖扶持無須㬰離而彦毎以此為樂初彦㑹議于東京留守司家屬悉在河内及到維揚行在所河北議將始獲致其父武經之喪與其兩兄之孤猶陷于偽境在邵陽日彦優以金幣遣人抵河内迎取之法當任子先推其姪疾且革殆不知人俄稍悟召弟姪悉以財物均給之其為將帥也嚴明紀律沈勇能㫁而以公行之每出師無供帳厨傳誅茅為廬與士卒同器而食井竈未具饑渴不飲食戰士卒有傷痍者解衣療之親為傅藥或違令犯法雖故舊立斬之而撫恤其家及凱旋論功必自下推衆以為難雖踈逖必居上列以是人樂為盡死尤長于簡練士伍不以修飾為先而取其輕足鷙果有力者毎破敵大閲以充軍者葢十之一故其所部號天下精兵舊八字軍既屢摧堅陷陣而勇夫羨慕誓不與敵俱生願刺者至萬數其金州屢破大盜雖子弟從軍未嘗霑賞妻之弟戰沒于陣亦不以為言張浚聞之特官其姪以勸盡忠者至于天籍帑庾無毫髮私嘗曰人臣惟有功于國然後能享朝廷爵祿俯仰無所愧怍茍貪冒茍得適足為恥故兩除留務皆不拜故事廉車秩視從列凡除授即辭免請之備禮彦即直還告命不為飾辭分鎮時便宜黜陟它鎮例擬借官資彦于立功將士則上事于宣撫處置使司以示不敢專彦喜人盡言幕客或面陳其短必歛容悦謝雅性嫉惡尤切齒贓吏曰此偷祿蠧民者或干以私則曰彦未有寸功以報主恩方且思革弊事故所未敢至與人辯是非略不少屈己下氣故議者或譏其黒白太分踈于涉世屢陷危機瀕于不免平日剛介寡合而待士極能盡禮此彦為人之大畧也林泉野記曰王彦字子材懐州人武舉中第為河陽清河縣尉建炎初張所為河北招撫使從其軍數月即用為都統制率兵五十過河北與金三戰皆勝既而為敵所敗兵潰彦走衛州龔城縣北太行山復聚兵皆湼其面云誓殺金人不負趙王敵畏憚之呼為八字軍屢與敵戰勝負相當加河東河北都統制俄還京師加河北河東制置使張浚薦為御營司將從浚往川陜後為金房州安撫使知金州賊似達冦郡彦擊擒似達又擊破賊桑仲復房州加均房州鎮撫使紹興元年累破賊李忠二十餘萬忠遂降劉豫次年擊破賊菫先于金州紫領巡城復戰于虢州界彦敗亡統制官劉錡雖復勝然先困廹乃降彦洪州觀察使三年正月敵困金州彦走金州為宣撫使司參議官五年湖北宣撫使六年加保康軍承宣使京西南路安撫使知襄陽府事復率衆萬赴行在除前營護軍都統制復除浙西沿海制置副使七年駐軍平江與解潜士卒交爭行宫前彦乞解任降洪州以其軍隸劉錡後錡敗敵于順昌府雖錡善兵然亦彦軍之助也彦在郡甚有治聲為時循吏九年移鼎州未赴疾卒贈昭化軍承宣使十月孫睴為河南府兵馬副總管命孫睴為河南府路副總管令招一千三百人是時有酈瓊叛軍劉豫放歸農者又豫之廢也有自放免歸者甚衆皆願募睴未至西京人數已足矣三朝北盟㑹編卷一百九十八
