body:
  text: 三朝北盟㑹編卷七十九宋徐夢莘撰靖康中帙起靖康二年二月六日丙寅盡十一日辛未大元帥府擺布勤王人馬丙寅契勘金人劄寨京城下直北連珠剳至衛南縣東至東明縣西至胙城縣籬落牢固無隙可乘幕府奉王㫖宜分遣人馬於曹濮間一帶州郡縣鎭再整齪擺布對寨相望審勢進𤼵今將大元帥府五軍駐劄東平府及分遣諸處擺布下項大元帥府五軍東平府駐劄先鋒辛彦宗五千人前軍都超二千五百人左軍張瓊二千五百人中軍張俊二千人趙俊二千五百人右軍苗傳二千五百人後軍花實二千五百人以上搃制一萬九千五百人馬軍在内縂號四萬人以楊維忠都統計駐劄開封府人馬副元帥宗澤下陳淬統磁州二千人洺州一千人尚功緒二千人常景二千人王孝忠一千人權邦彦一千人孔彦威一萬人以上縂制一萬九千人五軍在内號一萬八千人以陳淬統制並聼宗澤節制開徳府守禦人兵不在數孔彦威一萬人初五日議定起發駐劄濮州人馬閭丘陞三千人姚鵬二千人孫振二千人以上縂制七千人馬軍在内一萬四千人並聼副元帥附近節制濮州守禦人兵不在數駐劄興仁府人馬黄潛善一萬三千人張㬇二千五百人髙公翰二千五百人王善一千人以上縂制一萬九千人馬軍在内縂號四萬二千人以張㬇統制並聼黄潛善節制興仁府守禦人兵不在數駐劄廣濟軍人馬丁順三千人孟世寜二千人温宗建一千人李大鈞一千人張榮一千人以上縂計八千人馬軍在内縂號一萬五千人以丁順統制並聼黄潛善節制廣濟軍守禦人兵不在數駐劄單州人馬王澈二千人董誼二千人缺姓名二千人以上縂計六千人馬軍在内縂號一萬二千人亦並聼黄潛善附近節制單州守禦人兵不在數内駐劄栢林鎭人馬劉浩二千人白安民一千人縂計三千人馬軍在内縂號六千人右通計八萬一千五百人馬軍在内通號一十六萬七千人七日丁卯同知樞宻院孫傳文武僧道耆老等畫一状赴軍前偽楚録曰孫傳第一状中大夫同知樞宻院孫傳等今月六日亥時准元帥府公文備到大金皇帝聖㫖指揮傳等聞命震仆義當即死然念世被本朝徳澤至深至厚嗣君親政未及期年㳟儉憂勤無所不至若遽䝉廢絶實我臣子所不敢聞知輙復忍死須臾冐昧悲痛激切之詞仰干台聼伏望埀天地再造之恩畢終始保全之賜傳等誓當捐體碎首圖報萬分謹具畫一下項一太上皇以下不敢有違令㫖見起𤼵赴軍前同伸懇告一嗣君即位以來日修徳政並無虧失惟是失信一事上累譴呵盖縁親政之初為謀臣所誤繼以盡行竄責兼檢㑹上違大遼信誓亦係童貫李良嗣王黼等妄取事端並行處斬了當如此顯是嗣君悔悟前失非有他心一嗣君自在東宫即有徳譽著聞中外比即位臣民歸仰今感戴保全恩徳至厚若䝉終惠未加廢絶尚可以嵗修臣事之宜如抛降金銀表段之數雖目下未能數足将來下外路取索分嵗貢納實為大金永遠無窮之利若一旦行廢棄遂同匹夫縱有報恩之心何縁自効一伏詳來令㫖别擇賢人以王兹土許汴都人民隨主遷居具見仁慈存恤之至據今中外異姓實未有堪充選舉者若倉卒册立四方必不伏從縁此兵連禍結卒無休息之期非所以上副元帥愛惜生靈之本意一今日之事生之殺之予之奪之全在元帥雖大金皇帝詔有廢立然将在外君命有所不受則閫外之事元帥自可專行一汴京兩經根括取索公私所有各以罄竭顯見将來難以立國乞班師之後退守徧方以備藩屏如䝉大恩特許嗣君以廢復立有稱呼位號一聼指揮右件如何謹具申皇子元帥伏望特加矜憫早賜允從伏候台令孫傳第二状孫傳等伏覩詔書宜擇賢人立為藩屏竊見國主自在東宫㳟儉著聞若願選擇賢人立為藩屏必無出其右者兼本國自太祖皇帝以來累世並無失徳惟上皇聽信奸臣國主年㓜新立為大臣所誤以致違盟失信上干國典伏望國相元帥太子元帥察臣等前状許其自新復立社稷容少退避以責後効再念趙氏祖宗徳澤在民未冺或未允從前懇亦望特賜哀憫許扵國王子弟中擇一賢者立之或不願立上皇之子乞扵神宗皇帝二子中選擇建立使長得北面永為藩屏非惟不滅趙氏亦使一國生靈䝉被恩澤永為與國傳等不勝激切懇禱之至請太上皇及太上皇后諸王王妃公主駙馬都尉等出宫幸青城敵寨宣和録曰黎明遣孫傳王儒弼内侍李石用引請太上皇帝出城者再少頃太上皇帝鄆王以下三十餘人諸王妃公主都尉等盡乘車檐由南薫門出至午燕王杞王出百姓稍知其事於前内權留開封尹問其故不答捕為首者一人斬之而出初上皇遲疑未欲出徐秉哲以兵圍出南薫門已而出榜曰皇帝出郊日乆未囬太上皇親出懇告二帥各仰知悉㓜老春秋曰初六日吴开莫儔持元帥府文字入城見孫傳王時雍徐秉哲等謂之曰軍前有指揮如上皇以下申時不出即縱兵四面入來殺人傳與時雍等徑見太上皇乞與諸王后妃詣軍前懇告上皇未應范瓊以言逼之上皇涕淚横流不得已乃乘竹轎而出自宫門至南薫門百姓擁遏填滿玉街無不墮淚者至南薫門下出轎移時門啟有鉄騎在甕城中裏簇而去百姓望之皆慟哭遺史曰金人變議之後觀吴幵莫儔道尼堪之語及觀時雍秉哲等請上皇詣軍前懇告之謀惟恐上皇出城稍遲致貽金人之怒縱兵入城其室家例遭刼掠乃以好言誘對上皇如期出郊雖市井皆不及知可謂專為私謀不顧君父矣嗚呼任事大臣不能靖國家之亂及禍亂已熾又不執主辱臣死之節乃甘心以君父付分敵人之手尚可以履戴天地而施面目見人乎后妃諸王以下次第出城乳嫗婢使多歩行百姓見之驚憂戰慄心膽䘮亂意不樂生西角樓下有百姓二人欲邀攔上皇不及俄見燕王行馬二百姓邀之曰大王家的親人都去奈何一城生靈不如留一人以存國祚王泣曰大金要我教我奈何二百姓曰百姓懣與大王一處死待如何京城四壁彈壓使范瓊令擒二百姓斬之迨晚有榜云留守司奉監國令㫖皇帝出郊日乆未還上皇令宫嬪等出城親詣大軍前求駕囬内士庶安業是夜民情恟懼各持兵巡坊巷官司彈壓四壁至夜深亦不敢息留守司急召百官議事時已三鼓盡矣靖康後録曰上皇䝉塵扵敵營上皇初亦艱難不欲便出王時雍徐秉哲以言恐逼遂出城聞者皆憤恨留守臣奉監國太子令㫖今來車駕出郊兩月未還上皇親詣大金軍前見二元帥求車駕還内軍民各令知悉衛士歸傳上皇初到青城與尼堪及斡里雅布坐扵端城殿上皇東向尼堪南向斡里雅布西向聞上皇玉音甚厲汝稱先皇帝有大造扵宋反是我有大造扵汝也若大遼伐我當所甘心汝去年興師吾傳位與嗣君遂割城犒軍汝等乃還今興兵稱嗣君失信汝等曽記誓書否汝不信然乃蕭慶王芮等教汝等為之可呼蕭慶等來與我面証吾豈畏一死二帥皆無言蕭慶等亦皆不出少頃上皇起行東廊見上扶上皇號泣乆之上皇謂上曰汝若聽老父之言不遭今日之禍葢上皇初欲與帝出幸何㮚苦諌乃止要盟録曰是日太上皇后鄆王王夫人朱氏三男六宗姬肅王王夫人任氏二男二宗姬景王王夫人田氏濟王王夫人曹氏康王王夫人邢氏莘王王夫人嚴氏徐王王夫人王氏沂王和王信王未出閣則安康王楃建安郡王楧嘉國公椅瀛國公梴昌國公柄温國公棟儀國公桐韓國公相出降帝姬則曹寅嘉徳帝姬宋邦光安徳帝姬曹晟榮徳帝姬蔡鞗茂徳帝姬向子房成徳帝姬田丕洵徳帝姬劉文彦顯徳帝姬未出降則華惠恵福令福純福寜福永福六帝姬妃嬪則王貴妃喬貴妃韋賢妃王婉容閻婉容任婉容王婕妤小王媫妤崔美人五王宫則燕王偲趙王俣吴王佖和義郡王偉永寜郡王儀獨留皇后皇太子主國百姓見之始知有廢立之事驚憂戰慄心膽䘮亂人不聊生市井小人相視變色上皇平時好玩珍寳有司及軍前莫能知也内侍梁平王仍軰曲奉金人指所在而取之珍珠水晶簾繡珠翠步障紅牙大匱龍射沉香藥犀玉彫􅍢屏榻古書珍珠畵絡繹於路又取皇帝殿白玉之寳十四承休命延萬億永無極一也受命於天既壽永昌二也天子之寳三也天子行寳四也天子信寳五也皇帝之寳六也皇帝行寳七也皇帝信寳八也御書之寳九也御書之印十也無字寳十一也皇帝㳟膺天命之寳十二也宣和御筆之寳十三也又皇帝恭膺天命之寳十四也青玉之寳二其一傳國寳其二受命於天既壽永昌所謂秦璽者也金寳九御前之寳一宣和殿寳二御書之寳三天下同文之寳四天下合同之寳五又御前之寳六御前錫賜之寳七書詔之寳八皇帝欽崇國祀之寳九銀印一書内省出納之印皇后殿金一皇后之寳太子殿金一皇太子寳太子妃金一皇太子妃印八日戊辰吴幵莫儔自軍前賫文字前來催推戴状自孫傳第三状翰林承㫖前指揮擇立賢人事竊以本國日前將相多是上皇時用事誤國之人嗣君即位以來所任宰相亦繼以罪罷將相率皆敗亡之餘其他臣僚悉皆碌碌無聞之徒元帥府之所偹知豈敢蔽賢不以上聞若舉扵草澤之間亦非聞望素著人心不歸孰肯推戴兼趙氏徳澤在人至厚若别立異姓城中立生變亂非所以稱皇帝及元帥府愛惜生靈之意若是元帥府特選立趙氏一人不惟恩徳有歸城中以及外方立便安帖或天命改卜運數有歸則非本國臣民所敢末議乞自元帥府擇推賢人永為藩屏傳等不勝痛切殞越惶懼之至元帥府㸔詳孫傳状將相多是罪廢敗亡之徒臣僚類皆碌碌無聞之輩若舉於草澤之間孰敢推戴者夫運數既衰亦必有繼興者若言敗亡之世必無可繼則三王之後迄至於今安有君臣之道人倫之序何不詳道理之深也如或必元帥府推擇縁在軍前皆係北地漢児若舉北人即與混一無異若欲推擇南人其見在軍前南官亦樞宻等之所共知也未委果有所舉者否若有所舉請其姓名見示亦與依應唯不許何㮚李若水預此議如或京城内外俱難自舉仍請諸官各具名銜依元帥府所舉推戴伏申在京士民郭鐸等又具諸義利申告軍前要盟錄曰鐸等伏聞欲令選擇賢人以主此土鐸等聞命震驚㒺知攸措竊惟元帥擁弔民伐罪之師行應天順人之道既陷京城歛兵不下全活在城生靈雖湯武仁義之兵未易過念今上自處東宫至即帝位恭儉修徳中外悦服止踐位之初未熟政事輔弼非人有失大信致獲罪扵大金皇帝然念上雖失倍其於天下萬姓略無過失士民歸向乆矣今遽見棄絶别立異姓不惟異姓中不見有徳之人誠恐民心皇皇無所統一奸雄僭竊殺戮無辜如此則非所以上副大金皇帝及元帥府愛惜生靈之意也伏望元帥埀天地再造之恩全始終生成之賜復立今上以主此土世修享貢以報鴻恩則今上感戴之誠何敢忘也如元帥必欲以失信為罪則監國嗣子實惟其人他人俱不足當此如或未可即肅王景王温淳忠義俱有賢徳國人共知選擇賢者以承嗣位人心嚮慕實天下蒼生之幸今若别立異姓設或倉卒之間選擇非人蹈前車已覆之轍不免再軫大金皇帝聖慮而民復墜塗炭鐸等情動扵中義不可辭仰冐威嚴無任叩頭泣血俯仰俟命之至監國揭榜是日京城四壁坊巷軍民皆詾詾不定監國有榜曰訪聞小民多持兵噐徃來街市仰安業如故依前持兵仗者並决配又申諭云上皇出郊止為求駕囬内仰民安業不得造作語言誑惑衆聽是日彈壓官四出百姓持兵噐巡防者如故九日己巳文武百官孫傳等又状申軍前孫傳等第四状准元帥府劄子節文再請恭依已降聖㫖早舉堪為人主者一人當依已去劄子施行右傳等竊念本國趙氏祖宗徳澤在人日乆累前瀝懇投告今來渝盟失信止是上皇與前主其子及支屬並不干預上冀恩造更賜詳酌庶得中外帖然不致生事若不容傳等死請必欲推擇異姓自中及外委無其人兼實難於自舉伏乞元帥府選擇敢不一聽台命又状右傳等除已與百姓父老具状申元帥府尚有未盡之意不敢自默今更忍死瀝血上干台聽伏以前主皇帝違犯盟約既已屈服而舍之存亡繼絶惟在元帥不然則有監國太子自前主恭命出郊以來兼撫軍民上下帖然或許就立以從人望若不容傳等申臣子之情乃欲别立異姓天下之人必不服從四方英雄必至雲擾生靈塗炭卒未得安傳等自知此罪在不赦然念宋自祖宗以來徳澤在人扵今九世天下之人雖匹夫未忍忘之况傳世食君禄方主辱臣死之時上為祖宗下為生靈茍有可言不敢避死傳等無任哀痛惶懼隕越之至謹具申皇子元帥國相元帥伏候台㫖遺史曰是時在京士庶雖見上皇以下六宫后妃親王駙馬出郊留守司及開封府猶宻其事市井間皆未知端的然其事漸彰人情方憂懼是日也宣徳門前揭示黄榜偹悉金人節次移文及孫傳等應報文状民間始知欲立異姓相顧號懼隕越皆悔不令上皇東巡上遷都也留守司慮恐軍民作亂乃令京城四壁都彈壓范瓊撫諭軍民軍民咸泣不已瓊大呼曰自家懣只是少箇主人東也是吃飯西也是吃飯譬如營裏長行健児姓張底來管着是張司空姓李底來管着是李司空汝軍民百姓各各歸業照管老小軍民聞之皆氣銷而去然罵瓊不絶聲十日庚午孫傳張叔夜百官父老畢集南薫門號哭賫状扵門乞繳申中軍孫傳第五状云文武百官僧道軍民孫傳等右前已累申元帥府乞軫恤趙氏存全社稷許國主歸國降號稱藩永事大國就立監國嗣子以從人望或選趙氏近屬使本國生靈有主中外帖安以全大國弔伐之義傳等今在南薫門拜泣俟命不勝哀懇痛切之至吴幵莫儔賫到元帥府劄子曰吴承㫖囬得孫樞宻等状二道並初七日状二道備已洞悉有契勘昨有文字惟貴道徳不在名位髙卑今請百官僧道軍民耆老既為行府扵在京官僚未諳可否但恐在京目下為首勾當官員必是可舉可以共立早具本官銜状申如未可即依已去文字須得共薦一人限今月十一日如此度不見舉薦必别當有悔吝無得有違天㑹五年二月又大金元帥府牒今月十日右副元帥親到左副元帥麾下共議宋人告請復立趙氏至晚到本營方有善利門下官員送到汴京軍民僧道耆老郭鐸等告乞立趙氏文状並孫樞宻等今月七日八日三次共五道録曰為言此事已經共議差官入京須得别行薦舉外善利門下人員以輙受状又嚴加懲戒訖慮在京人猶以投狀為辭别致住滯今請在京諸官孫樞宻等照㑹依吴承㫖莫學士等賫去文字日限施行不得住滯吴幵莫儔持文字來云尼堪大怒月日二事不了便舉兵入士庶傳聞囬語相與號泣十一日辛未百官等以議状申軍前乞立張邦昌偽楚録曰留守司勾集百官㑹議相視乆之計無所出衆曰今日勉强應念不然一城生靈屠戮於趙氏何益既無善䇿不若舉在軍前者一人張邦昌舊任宰相姑舉之以塞命想二帥意必有所屬議定幵儔復以議状往孫傳第六状云文武百官僧道軍民等准元帥府指揮須得共薦一人限今月十一日状申者契勘自古受命之主為上􅈾圖籙下以勲徳在民或權强近臣或英豪特立有大材略因而霸有天下方為人樂推今來本國臣僚如孫傳等召自外方被用日淺率皆駑下迷悮趙氏以至今日人皆懐怨方此俯伏謹俟誅責若付以土地俾備藩屏必為百姓忿嫉立致變亂上負選建之意然傳等奉元帥之令備述詔書嚴切舉國惶恐非敢違拒實以在内官員委無其人伏望元帥台慈體念乞於軍前選命張邦昌以治國事如軍前别有道徳隆懋為天命所歸者乞賜選擇則本國人民敢不推戴者時孫傳張叔夜不簽書三朝北盟㑹編卷七十九
