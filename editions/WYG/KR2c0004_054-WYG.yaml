body:
  text: 三朝北盟㑹編巻五十四宋徐夢莘撰靖康中帙起靖康元年九月五日戊辰盡十三日丙子五日戊辰吴敏落觀文殿學士宫祠臣寮上言臣聞國之威柄唯賞與罰者是非之所以分而政事之所以立也若為善者不賞有罪者不罰則是非倒置無所觀矣竊見前宰臣吴敏因上皇有内禪之意遂建白傳位于陛下曽未累日置位輔弼自惟年少不能協副衆望乃招賢能張大聲勢當是時也人皆稱之及敵兵既退寖生驕心侈協賛之功偃蹇無所忌憚邊防之急不復經意將帥之任不復介懐器甲遲緩而不預為之計粮食稽遲而不早為之所搬運失時蠧害為甚凡此數者皆當今之先務雖究心悉力猶懼不能以濟事而乃怡然視之如平時可不為之寒心哉以至元祐舊臣則遏抑而不加牽復蔡氏大惡則蔽覆而不正典刑使陛下之仁恩不能以下布而臣寮之章䟽亦沮而不行焉不問邪正同於己者善之不問愚智異於己者惡之於是士夫失望民庻解體則今日之罷己為晚也敏雖罷相然猶為觀文殿學士知揚州揚當江淮之衝素號繁劇觀文之職冠于秘殿可輕以授之哉敏以罪去尚且得此臣懼自今以往執政大臣勤恪者無所勸而懈怠者無所懲矣伏望陛下明其罪惡以正刑章以為後來臣子之戒取進止又上言臣甞觀李唐諸帝其聰明英武無若太宗者及太子承乾廢以三子一弟未知所立其心亡聊取佩刀自向賴長孫無忌抱持以免詣託晉王大事方决雖其平時英畧如此一為多愛所牽不知自處乃知在疑似之間能斷以大義畧無纎芥誠天下之難能臣伏覩道君太上皇帝方冬銳然以大位内禪于陛下不謀闈閫不問閹官不詢羣臣使神器永有依歸其賢於唐太宗逺矣蔡攸出入宻侍聞上皇倦勤之意甚乆奸人多慮用心不臧不肯宣露者將有所待一旦上皇除陛下以開封牧攸知事勢已定又自度父子稔惡平時曲憚陛下之剛明遂授其語于敏俾之建白攸又贊敏為門下侍郎其慮患深矣敏不自揆乃攘為己功羣小交口稱道以為有定䇿之勲兹實駭聞借使當時上皇意未有所主雖有吴敏何能為哉既貪天之功以為己有又得蔡攸所授之語惟思報蔡氏之恩畧不顧君臣大義雖言章交攻其罪而敏横身障蔽斥逐臺諌招引同門以為其助廹於不得已凡三四貶竄僅能置京攸於湖外而已陛下灼知其姦奮乾剛之斷投京海外竄攸嶺表分布子孫各置遠方京不及過嶺而卒於善地大不慰天下之心無不歸咎於敏者方金人南侵李邦彦欲議和敏則以和為是雖三鎮之重遽欲棄與及徐處仁欲議戰敏則以戰為不然雖种師中逐敵出界不以為功王雲倍程北歸求尺書以議退兵敏遂沮其議及解􅅗折可求敗衂遂復請遣使以議和其失機㑹一至于此太原之圍㡬年未解河北之敵既去復還其為玩敵莫大于此言章所擊稍渉蔡氏之黨則匿而不行進用之際稍有蔡氏之舊則力加推引惟効京攸専權䟦扈畧不知先國家之急又數與等軰交相矛盾懐姦積惡巧佞隂狠未見其比投之遐裔尚未塞人望觀文隆名宫祠優職豈宜畀之伏望陛下斷以不疑特賜竄斥布告天下使上皇恩徳與日月争輝無致小人妄有掩蔽臣將見天地恱豫神祗喜樂蠢兹敵人不威自服矣臣有所懐不敢自己幸陛下赦其狂率取進止九月五日奉聖㫖吴敏落職仍報行九月壬申吴敏責授崇信軍節度副使涪州安置臣寮上言臣近甞論前少宰敏掩竊上皇内禪之徳自謂有定䇿之功及専權䟦扈懐奸誤國固非一事理當投之荒裔以為人臣不忠之戒聖恩隆厚尚存體貌止令落職宫觀罪大責輕未協物論誤國欺君罪通于天雖戮市朝未足塞責陛下自即大位屏出宫嬪不邇聲色以星文謫見避殿减膳以消天變憂勤恭儉前古未聞雖村童野老言之尚能流涕敏身為宰輔自當仰體陛下至誠惻怛之意夙夜在公思所以補報邇者厚費金錢數百千置婢妾三二人以供娱樂自謂宰相事業如此而已木石肺腸畧無憂國之心是可忍也孰不可忍也以故内外細大之事一切不復經意同列詢訪笑而不答伏望陛下詳臣前日所列之惡與今來所論之罪速賜投竄未足償誤國之大過亦使知罪之不可幸而免也取進止九月九日奉聖㫖吴敏責授崇信軍節度副使涪州安置手詔朕以嫡長受冊逮儲十有餘年上皇畀付之意既已大定宣和七年十二月二十日忽降睿㫖建朕開封牧乃用太宗故事卿大夫知將内禪矣及二十一日宣制而百司庻府以至都人亦莫不知是時蔡攸領樞宻院自知罪惡貫盈他日不免乃引給事中吴敏於宣制日入至玉華閣玉華閣者禁中深入之地非外廷臣所得至處又二十三日引敏連入盖攸方經營江浙之行欲留腹心之士置在京師候伺動静中外相應其事詭秘難使衆知故引敏入深宻之地與謀耳攸觀東行言章擊蔡氏者日至而敏傾身障之詭計百出終以敗露及蔡京子孫皆遠竄而京子絛至荆南託進士黄大本附書寄敏為開封緝捕得之其書責敏曰僕父兄於閣下可謂有徳矣閣下自布衣登要塗立功名始終與父兄交契自應知之閣下縱自謂我不出蔡氏其可得乎由絛書觀之敏之為蔡氏腹心明矣且朕以太子受禪何待人言若以謂甞言則入玉華閣之日乃在降㫖建牧之次日何也攸乃詐傳令以敏有建立之功擢為門下侍郎其姦偽締結乃敢如此是以上皇在龍徳言毎見管宫官待制譚世勣李熙靖必曰内禪之事出我至誠未甞建言但攸引入與為他謀上皇獨斷而為此䇿冠映古初矣吴敏乃以為己功可乎若敏輔相有力猶可以贖罪又况深險而好自専弛慢而不及事致今日邊事尚熾兵民未得休息投諸遐裔亦輕典爾故兹詔示可付史舘仍布告天下告詞為臣之惡莫大貪天之功失職之刑孰先誤國之罪宜加顯黜用穆師言觀文殿學士通議大夫提舉亳州明道觀吴敏性禀柔邪中藏險詐竊名第以徼幸之術盗倚任於擾攘之時惟𦕈質之纘承盖上皇之素定乃縁私黨之託謂有建言之因迨竄兇渠果㤀公議究觀黨庇之迹迄符隂告之情且朕方勤政躬宵旰之憂而爾乃懐安肆娱樂之奉用人論事濟姦慝則有之料敵籌兵失機㑹者多矣稽使指有後時之慢忽邊防無先事之圖謀皆不臧咎將誰執有相若此惟國之羞既邦憲之稍伸顧人言之不置貶從散秩投畀遐方尚體寛恩勿㤀循省林泉野記曰吴敏字元中真州人登第蔡攸喜之漸進用宣和末為給事中金人南侵徽宗欲遜位皇太子攸探知上意宻以告敏敏以力贊其事淵聖即政驟加敏中大夫門下侍郎李邦彦為百姓所擊因罷相敏奏邦彦有功復用為太宰俄而陳公輔上書乞相敏力主和議太學生吴若奏書言敏奸邪上欲加若罪敏復諌止敏請早立儲貳又請増春秋一經許舉人習治進諌議大夫方時多事敏乃買婢妾以自娱臣寮言敏不可當危急之際又與徐處仁日争議上前上為解之不已以觀文殿學士提舉西京嵩山崇福宫繼而開封搜得蔡攸所遺書敏受蔡攸恩不能營救上怒彰其惡涪州安置詩選曰敏儀真人妙齡秀發政和初上庠試書義有聲蔡京見其程文復愛其丰韵粹羙欲以女妻之元中辭焉釋褐授浙東學事司幹官除舘職擢記注西掖時年二十七玉立鴛鷺行中一時歆艷遷給事中鄭達夫既相以言事落職宫祠退居維揚遂歸白沙數年不以一事干人吴正仲喬居於彼元中師事之學為古文四六質疑就正日夕不倦朞年文章大進縉紳咸欽重其不以貴顯自髙詘已務學如此宣和五年復召還舊物兼直禁林制詞温厚人多傳誦蔡京罷相麻云再圖揆路之崇本予徳意三告師臣之老乃爾令名河北徳音云桑麻千里皆祖宗涵飬之休忠義百年亦父老訓誨之徳又云大田在望將觀牟麥之秋南風既薫且解里閭之慍敏有侍兒曰遠山羙姿色通文理敏毎為文使供筆硯之役一日有訪敏者敏方據案運筆逺山者方磨墨拂紙時服其風流如此宣和七年冬北兵倉猝至汴上皇乆厭萬機元中建内禪之意即日除門下侍郎靖康初進元樞拜少宰與擇之太宰同命是時招徠天下名士凡坐黨錮廢黜悉加遷擢寖與徐公議論不叶朝廷以防秋不遠廟堂不務同寅並罷相以觀文殿學士外祠旅以事貶栁州安置蔡攸移萬安軍安置臣寮上言臣聞爵人于朝與衆共之刑人于市與衆棄之刑賞之行非出人主私意與天下為公而已昔舜誅四凶天下咸服者言其公也蔡京蠧國二十餘年罪惡貫盈殺之宜矣吴敏等力為保䕶屈國法以報恩天下孰不痛憤而遷延數月不正典刑陛下灼見天下怨京之甚奮獨斷之威不恤姦言投之海外以禦魑魅雖三尺童子莫不謂然京恃敏庇䕶之故滯留道塗至長沙而卒識與不識無不咎敏之沮格言章不早投竄致京身死内地抵掌而歎者紛然如京之惡固大矣若攸之罪亦不减於乃父燕山之役禍及天下罪與童貫何異哉驕奢滛泆載籍所無包藏禍心雖伐南山之竹不足以容其辭今置之雷州實未協于師言雷雖在廣南其地瀕海絶無烟瘴土風不異於中州此吴敏之私意也今若不竄之海外不惟未正凶人之罪亦恐不足服國人之心願陛下速賜施行無使若京之早斃再失天下之望臣不勝區區之懇取進止九月九日奉聖㫖移萬安軍安置十一日甲戌閤門宣賛舍人吴革往太原使尼堪及革見尼堪庭揖不拜計議邊事責其貪利敗約氣勁語直敵相顧動色愧服為追回攻威勝軍等處人馬授書已歸偹得其情狀執宣撫使折彦質請于朝急偹河南且代選精兵捍禦金人而復遣使出寨以强中國大臣之謀優㳺不斷尚執講和陷于敵計而不能悟十三日丙子譚稹移昭州王安中移象州並安置臣寮上言臣竊見比者金人愈加强盛并門之圍未解河朔之敵深入而我師數有敗衂退走之恥者無他士弗用命而氣不振則孰肯效死又安能取勝哉然則士卒之氣何以振之倘朝廷於行法之際有以大慰人望而快其平昔憤怨之心則士卒之氣振矣且河東邊郡失守以至于今其勢亦可憂前後敗軍覆將所殺戮者不知㡬何人孰不知忻代之失始于譚稹招刺義勝軍致令耿守忠軰開門迎敵陷沒要害之地遂至於此也河朔自收復郡人皆知必有今日之患向者長驅屠戮之禍城下要盟之辱不忍復道孰不知燕山之變盖縁王安中為安撫措置乖方既隂知其必有變而嗜利固寵不以告朝廷乃寅縁為私求自便以歸致郭藥師背叛降敵為之道地遂至于此也此非特士大夫知之凡甞遭北敵之患者無不切齒憤惋思得此二人者重加誅責則天下之人必曰聖上哀念吾赤子之無辜而就死地故求首禍之人以正典刑孰不鼓舞欣快而相告哉如此則何患士之氣不振而弗用命乎二人罪惡如此而朝廷未盡施行譚稹雖已責散官而尚處近郡王安中初居隨州今改置臨江軍善地則何以慰民望而快其積憤之心哉臣謂重刑典憲之後猶當降明詔露布其罪使天下咸知庻令軍士感勵自奮而成敵愾之功正今日之所急也乃復加惠有罪特屈刑憲以失天下之望伏望睿斷并譚稹招刺義勝軍馴至今日之患則罪不在童貫下又聞金人起師之因亦指王安中擅納叛降故去嵗十二月二十五日赦文首著其事以謂因此取怨以致興師天下之人皆謂安中即有重責不謂乆稽典憲今朝廷復有和議則安中之責尤不可輕亦助和議之一端九月十三日三省同奉聖㫖王安中移象州譚稹移昭州並安置遺史曰王安中到象州有詩曰後人誰促漁陽戰舊守猶遷象郡來幼老春秋曰王安中字履道以文章有時名交結蔡攸攸善之引入禁中太上賜讌飲半酣是時鄭后有寵猶未至中宫上出示鄭氏簮玉花上有雙飛玉燕攸謂安中曰豈可無詩安中即作詩進曰玉燕雙雙撲鬢雲碧紗衫子欝金裙神仙宫裏參鸞女來侍長生大帝君太上大喜安中尤善四六致位政府别無他長除知燕山府制有曰髙文大冊亶居後學之宗又曰推翰墨潤色之工為劇繁允濟之任三朝北盟㑹編巻五十四
