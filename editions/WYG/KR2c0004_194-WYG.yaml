body:
  text: 三朝北盟㑹編卷一百九十四宋徐夢莘撰炎興下帙起紹興九年三月四日甲申盡四月四月甲申王倫交割京師三月甲申烏珠出京城王倫交割京師是日京城官吏百姓送烏珠至北京烏珠坐于壇上勸酒為别應交割州軍官物十分留二分外八分搬過河北送納馬擴為荆湖南路馬步軍副總管馬擴為沿海制置副使時朝廷講和大臣忌言兵事馬知其弗合逡巡求退乞為湖南馬步軍副總管從之㑹武岡洞酋楊三天叛勢搖荆湖安撫使謝祖信謀于馬馬薦張球祖信奏球守武岡而擒三天破其巢穴郭仲荀為京城副留守以張浚兵一千赴東京制曰諸侯朝于方岳未忘巡狩之勤王畧及于舊都實重居留之任肆頒明命庸示眷懐具官郭仲荀賦性通明受材英特兼子方之智勇慕郤縠之詩書夷險屢更忠勤不替執干戈而衛社援桴鼔以忘身入侍殿岩載肅貔貅之衆出分師閫毎寛疆場之憂建大將之節旄加二公之位號功高不伐寵至益謙朕永念神州薦更多壘悵遺民稔禍之久屬殊鄰修好之初故臣流落以焉歸行旅凋零而未集是用疇咨宿望申錫渙恩往司管籥之嚴仍總兵符之重惟爾拊摩疲廢勞來散亡慰父老之謳吟消田里之愁嘆俾知朕指有如親臨則予汝嘉嗣有褒寵四月吕頤浩薨董革為公行狀曰公諱頤浩字元直滄州樂陵人登紹聖元年進士第累任河北轉運副使宣和四年朝廷乗契丹之衰弱舉諸路之兵欲圖燕薊命童貫為宣撫使以蔡攸副之時大將劉延慶統兵僅十萬自涿州取燕山府契丹之兵大集與王師相拒于良鄉縣殺傷亦畧相當正未有所處㑹金人于十二月自居庸闗引兵至燕山府契丹之衆聞風奔潰金人遂有燕山府及檀順景薊等州童貫蔡攸遣使往燕山府見金國主阿固達重許嵗幣求此四州之地使者五六輩往來商議金人知貫攸急要燕薊以報天子需索益廣倍于嵗賜契丹之數議既定金國兵遂回貫攸引兵五萬前去撫定燕薊貫攸到燕山旬日即班師相繼詹度王安中知燕山府為本路安撫使是時郭藥師所統兵二萬號曰常勝軍又契丹刺面軍萬餘人號食糧軍費用錢糧不可勝計朝廷命公為轉運使公條奏燕山一路費用如此雖窮天下之力竭天下之財必無以善其後願三省樞密院博議久長之策徽宗震怒沮壊邊事先次落職降官仍舊為轉運使兼經制燕山府河北京東路財用公在燕山僅二年偹歴艱險每恐不能逃禍是時金人漸生釁端變詐反覆邀求不已徽宗感悟憶公前日之言遂復官進職徽猷閣直學士宣和六年丁太夫人憂公扶喪至濟南府營葬未及掩壙有旨起復催促還任不許辭公再至燕山府又僅一年金人初舉兵圍闕既與本朝講好班師乃得還建炎五年五月今上即位于南京六月召公赴行在就道差知揚州是年十月聖駕幸維揚公前期繕治行宫分處三省察院百司及衛兵營舍擾不及民而事辦十一月召對公奏方臣竊以金人襲百戰之兵一年之内兩及京師天祐陛下公有神器臣竊觀天下之勢以撥亂為急撥亂必先任賢退不肖以清其時用能去不能以審其材因信號令以結其心賞功罰罪以激其力恭儉節用以豐其財徭役以時以阜其民竢其倉廩實財用足人安將和則有必取之勢無不成之功陛下睿筭逺圖布昭聖武伏願任賢使能信賞必罰理財節用積粟訓兵裁抑恩倖無令撓朝廷之權捜選人材使之任將帥之責大開諫路而擇其善總攬羣策而從所長則何為不成何戰不勝哉上覽奏劄稱旨又旬日再對進劄云淮南兩路北距海南阻江土地膏腴形勢雄勝陛下鑾輿順動以慰天人之心必得其宜矣臣嘗謂强可以使之弱弱可可以致之强昔漢高祖與項氏相持百戰百敗然垓下之役一戰遂成帝業越王兵敗於㑹稽卑辭厚禮養兵蓄鋭有待而發一戰遂收霸功然則陛下駐蹕淮甸豈非天意所以資陛下興王業乎伏願聚精㑹神苦心嘗胆期于除禍亂致太平實無疆之休也改吏部尚書公被旨令密具邊防事宜公具奏云伏惟陛下即位以來仁民愛物之心孚于四海憂勤恭儉之徳格于皇天是宜邊境安寧萬邦䝉福然而乗兵敗壊之後敵人以百戰之師投隙而南所向無前適丁斯時實勞指畫傳曰天下多事聖哲馳騖而不足兹誠多事之際而聖哲馳騖之時仰䝉大詢偹禦之策臣儒學進身然嘗任西北緣邊去處敵人情偽與夫戰陣之畧粗聞一二犬馬之齒今已六十筋力不勝甲胄衰邁不從軍旅顧有愚見不敢緘黙輒陳今日偹禦十䇿一曰收民心二曰定廟筭三曰料彼已四曰選將帥五曰明斥堠六曰訓强弩七曰分器甲八曰偹水戰九曰控浮橋十曰審形勢條分而詳布之深切當時之務明年二月金人以輕騎逼揚州車駕倉卒南渡公與禮部侍郎張浚聮馬奔及行在僅得渡江扈從至秀州除簽書樞密院事江浙制置使公復召募兵四五千人就鎮江之北枕江下塞與金人相持近一月金人北去苗傅劉正彦狂謀不軌公倡議約諸大將劉光世破之朝于行在即除尚書右僕射扈從鑾輿移蹕建康府尋遷左僕射公與張浚密謀誅范瓊一軍帖然無事是時天下盜賊羣起公謂金人方去李成靳賽等分據淮甸京城隔絶山東河北諸處命令不通其他寇盜不可勝計公謂前此賞罰失當將士解體若非信賞必罰無以大收將士之心乃奏乞置三省樞密院賞功司應自軍興以來諸路立功將校借補等人並許繳元立功干照自陳朝廷看詳隨宜推補借補官資於是四方將士莫不悦服為用自是士氣稍振公措畫招收諸路潰軍盜賊殆將肅清矣十月金人渡江王師弗能捍禦繼渡浙江逼行在公憂憤不知所為乃力獻航海避敵之計聖人浩然開納時廷臣所論皆不合惟聖意確然不移車駕自明州登海舟精鋭之兵萬餘人扈駕行在台州港迤邐趨温州駐蹕月餘是時金人已回鎮江韓世忠以舟師扼江路金人不得濟公力請車駕回幸浙西宜下親征之詔以為先聲亟以鋭兵策應世忠夾擊之此一竒也時車駕已駐蹕於越州㑹中丞趙鼎詆公公遂罷相後召赴行在拜左僕射公每奏陳金人侵凌不已今又大窺川陜皆燕人及中原叛逆恊謀所致古者兵交使在其間為我之計更宜遣使謀和以紓國難前此所遣宇文虚中王倫等數輩雖拘留不還勢當再遣使人以驕其志䝉上開納遣潘致堯髙公繪使金國後潘致堯等得歸太母鑾輿暨徽廟梓宫之回通和葢自兹始其後使命相繼和好遂成卒迎太母鑾輿暨徽宗梓宫之還又言駐蹕之地最為今日之急務伏願陛下發中興之誠心行中興之實事今當先定駐蹕之地要使號令易通于川陜將兵順流而可下漕運不至于艱險然後速發大兵一軍往江西湖南以平羣冦一軍往池州至建康府處置以就招安尚懐反側之人於明年二三月間使民得務耕桑則大江以南在我之根本立矣然後乗今年大暑之際造精鋭之兵與劉光世渡淮犄角而北由淮陽軍沂州入密州以搖青鄆命張浚躬統兵由河中府絳州以撼河東乗諸路民心懐我宋未冺之心知王師有收復中原之意則中興之業可覬也若不速為之逡巡過春夏則金人他日再來不帷大江之南我之根本不可立而日後之患不可勝言矣臣嘗觀自古有為之君將以取天下者弗親則不能戡禍亂定海内伏望聖慈考漢高祖以馬上治之之蹟法唐太宗櫛風沐雨之事速圖之不可緩臣竊見三四年來金人纔退士大夫及言事官及獻言之人輒有怠心便以謂太平安然無事矣凡朝廷之謀更唱迭和甲可乙否致機㑹可乗之便往往沮抑不得行臣以謂異日誤天下國家必斯人之徒也今天下之勢可謂危矣既失中原止存江浙閩廣數路而已其間亦多曽經殘破浙西郡縣往往已遭焚刼浙東一路在今形勢漕運皆非所便若不移蹕於上流州軍保全此數路及漸近川陜使國家命令易通于四方則民耕失業號令阻絶俄頃之間已至秋冬金人復來雖欲追悔無及矣公又奏臣仕官以來在西北極邊二十餘年偹見金人之俗於逐年四月初驅官私馬水草牧放號曰入澱美水草之名入澱之後禁人乗騎八月末方令出澱飼以麥豆以偹戰鬬又夏月弓力不强射不能及逺故金人未嘗于夏日用兵然自漢至唐士大夫未有深曉此理者惟杜牧有言曰漢伐匈奴嘗以秋冬當番人勁弓折膠湩馬免乳之際與之較勝負故敗多勝少今若以仲夏月發兵出其意外一舉無類矣臣竊觀陛下總攬嵗久英武日躋則舉兵北向以圖中原此其時也賈誼曰日中必熭操刀必割捨此機㑹而不勝後欲追悔何可及耶今有十六七萬兵費用不貲朝廷竭力經營錢糧常若不辦曠日持久必取於民民怨衆離乃自困之道禍亂之所起可不畏哉今日戰兵其精鋭皆中原之人數年之後消磨必寖少異時雖欲舉事勢必不能可為深惜者也臣年踰六十累嵗疾病每恐溘先朝露此志遂不得伸輒敢冒昧陳述乞賜聰察又奏近日探報金人與劉豫舉大兵以窺川陜若於來年三月間舉兵北向必可牽制川陜之兵萬一川陜參差而王師既逐劉豫川陜間聞之必震恐因遣韓世忠就近由西京入闗此一竒也上開納此策嘉歎不已以公都督諸軍事總師北向公師次鎮江臺章上疏遂罷相是嵗冬敵騎再逼淮甸緣事闗利害因以邊防機事具奏上親筆褒美令陳利害公即條具所見為十論上之一論用兵之䇿其二論彼此形勢其三論舉兵之時其四論分道進兵其五論運糧供運其六論大兵進發其七論經理淮甸其八論機㑹不可失其九論舟楫之利其十論并謀獨㫁上嘉其議而行之薨諡忠穆林泉野記曰頤浩字元直齊州人登元祐九年第宣和末進徽猷閣待制河北都轉運使在燕山郭藥師執以犯闕靖康初奉祠居維揚建炎初加徽猷閣學士淮東路安撫使知揚州權户部侍郎次年張遇反真州節制諸將往拒之至楊子橋遇降遷户部尚書上南渡頤浩同簽書樞密院江淮兩浙經制使軍于江寧府㑹苗傅劉正彦擅廢立頤浩聞之慟哭約劉光世張浚韓世忠馬彦傅等合兵五萬勤王敗正彦於臨平傅正彦遁去上復辟拜尚書右僕射御營使命將追討傅正彦皆伏誅頤浩為相不務體貌惟持賞罰先公道治贓吏䘏疲民親作書幣以招羣盜撥諸軍入衛軍容稍振是秋轉左僕射依前御營使聞尼堪圍杭乃請隆祐往洪州上幸明越以避其鋒敵既逼又勸幸海道班直衛士謀殺頤浩賴統制官辛永宗攻殺其黨遂從駕航海至章安鎮次年由温台聞敵衆退上還越以御史中丞趙鼎章罷為觀文殿學士提舉崇福宫俄除建康路安撫大使兼知池州張道王渙顔孝恭巨師古王􅊅楊惟忠等六軍皆受節制與李成將馬進戰于江州為進所敗紹興元年范宗尹罷乃召還而秦檜先已除右僕射又富直柔韓璜辛道宗永宗皆懐忌常共詆訾上悟其譛拜頤浩少保尚書右僕射辭免少保改特進逐直柔韓璜道宗請移蹕臨安李光王􅊅往太平州執韓世清戮之未幾出都督江淮荆浙諸軍事總管巨師古崔僧趙延壽等兵以往潤州丹徒前軍反劉光世遣師討滅頤浩回薦朱勝非孟庾綦崇禮黄叔敖姚舜明皆得進秦檜嘗欲傾頤浩上覺罷檜三年辛病常同言頤浩不恭不忠十罪以觀文殿大學士罷提舉洞霄宫居台州五年冬起知潭州兼湖南安撫制置大使七年進少保知臨安府兼浙西安撫制置大使時行在平江張浚請移幸建康頤浩乃請赴行在謀之建康之行浚阻格不得見從至建康乃獲對敭上撫諭遣詣臨安八年春上欲反臨安加少傅鎮安定江軍節度使知建康府兼江東安撫制置大使行宫留守力辭罷醴泉使及金還河南召頤浩赴闕秦檜以宿憾除為西京留守置之危地頤浩感疾力丐閒復歸台州薨年六十九贈太保三朝北盟㑹編卷一百九十四
