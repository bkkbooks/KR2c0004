body:
  text: 三朝北盟㑹編卷四十五宋徐夢莘撰靖康中帙起靖康元年三月三十日丙申盡四月十六日壬子三十日丙申蔡京責授崇信軍節度副使德安府安置蔡攸前去省侍太上皇自淮浙囘鑾已泝汴過宿州先是蔡攸已授降大中大夫提舉亳州明道宫任便居住已解行宫又有㫖令攸專一扈從道君還闕攸具奏奉迎使副並至行宫臣罪戾之餘宜退伏田里乞依已降責命罷專一扈從職事間又差攸行宫副使朝臣慮攸入京城别肆奸心乃上言故有是命臣寮上言臣等伏見蔡京父子當國日乆竊弄威柄敗壞綱紀使朝廷失信於四鄰致上皇負謗於天下軍民怨憤士論沸騰前後臣寮論列非一其他元惡巨奸悉已竄逐獨京父子尚遲囘近甸未正典刑訪聞攸不自引避欲以扈衛行宫為名僥倖入都竊聼民言深可憂慮若攸果入都城則百姓必致生變萬一驚犯上皇属車之塵則坐不預言之罪伏望陛下特降睿㫖早賜黜責施行三月三十日奉聖㫖京攸累有言章蔡京可責授崇信軍節度副使德安府安置攸本合重責為勸上皇北歸已降授大中大夫提舉宫觀特依已降指揮令前去省侍勅吕刑三千論罪莫先於誣上舜功二十知人實本於去凶若稽先聖之格言叅酌庶民之公論肆於無惡敢廢刑章責授中奉大夫守秘書監分司南京致仕蔡京以疎虞不學之資使輕為果敢之氣自初登用首務更張巧縁紹述之名公肆刼持之計列聖貽謀之憲度掃蕩無餘一時異議之忠賢誅鋤畧盡竭府庫之儲以供浪費偷爵禄之寵以市私恩􅀺元深痛而無復樂生志士殷憂而至於祈死當上皇之覺悟畏天戒之昭垂屡因衆惡而斥踈卒以自營而收召乃至交通宫禁黷用邦財真同妾婦之為孰異穿窬之恥逮眇冲之臨御属中外之艱虞靡知狥國之忠但出全軀之䇿靖言蠧敗已無及於噬臍悉舉愆尤殆不勝於擢髪彈章叠至匪朕敢私謂捨彼豺狼安用狐狸之問而飬滋稂莠灼知禾稼之傷原情本合於殱夷逺佞姑從於屏棄體予恩宥無怠省循可責授崇信軍莭度副使德安府安置四月三日己亥太上皇至自鎮江府車駕出宜春苑奉迎太上皇還自鎮江上出郊奉迎太上皇戴玉並枕冠著銷金紅道袍入自宋門都人皆夾道觀之無不欣喜居於龍德宫耿南仲建議盡屏其左右於是内侍陳思㳟蕭道李琮張見道十人並行貶黜不許入門敢留者斬六日壬辰車駕詣龍徳宫起居靖康遺録曰上皇每有手筆付上自稱老拙謂上為陛下猶時取財物頒賜左右上令開封戸籍所入龍德宫物数目有得賜者出即納之於官李綱狀奏乞免從駕再入劄子乞宫祠臣伏䝉陛下特賜中使宣押赴祥曦殿問起居從駕難以口述已具劄子乞在外宫祠及夜來傷風頭目昏眩今來駕詣寧德宫所有隨班起居從駕難以趂赴伏望聖慈特賜蠲免具狀聞又第四劄子乞在外宫祠奉䝉諭允今早御藥梁平等宣押赴祥曦殿起居從駕至寧德宫臣不敢不遵禀聖訓然而臣於進退之義有不得已者方欲再具劄子上冐天聽復䝉聖慈特䧏御批促令供職仰荷厚恩非臣殞首所能報稱臣聞匹夫不可奪志區區之志欲只俟邉境寧靖國勢安定上皇還宫即丐外補已嘗累具奏知非縁昨日與大臣議論不恊之故因事輙發伏望睿慈察臣忱辭特從所乞雖處田里敢忘大恩臣不勝祈懇之至謹具四劄子奏知取進止四月一日奉御批不允仍依累降指揮勿更有請詔卿忠義之志朕所素知方國家多難實頼共濟不得再有請便赴院供職詔卿屢貢封章懇求去位自陳危懇甚駭予聞廼者敵在近郊士庶伏闕一朝倉卒衆數十萬忠憤所激不謀同辭此豈人力也哉不悦者造言何所不至故卿不自安殊不知朕深諒卿之不預知也前日宰執䑓諌沮師敗謀隔塞公議已悉罷逐方今四海所頼以為輔佐者多聚廟堂朕於任賢勿貳去邪勿疑自以為庶幾焉卿其深體朕心亟安厥位以濟國事謝表臣綱言伏䝉聖􅄌以臣累具劄子乞外任宫祠特降親筆手辭曲加撫諭令安厥位以濟國事者冐貢忱辭方懼雷霆之震特頒温詔遽窺雲漢之章既明辯其謗䜛又勉勵以國事恩隆命薄感激涕零伏念臣績無竒迂愚有素幸逄雲龍之㑹獲施犬馬之勞受知既越於常倫得謗遂生於意外儻非上智曷諒微忠伏䝉皇帝陛下燭以天光形於奎畫安危疑之孤跡洗黯闇之厚誣遂中山之功豈曰樂羊之力辯愽陸之譖實由漢帝之明臣敢不仰體眷懐勉安職守修政事而銷鋒鏑方日奉於睿謨捐軀命以報國家誓力酬於天造李綱奏備邉禦敵八事臣伏以金人退師交割三鎮官吏軍民不肯陷溺淪沒其勢必為朝廷堅守天時浸熱而敵有輜重之累必不能久留即今出疆臣恐秋髙馬肥敵必再至以背前約及今宜飭武備修邉防勿恃其不來恃吾有以待之謹上條具所以禦守者凢八事其一謂唐之藩鎮所以拱衛京師雖累有變故卒頼其力而及其弊也有尾大不掉之患祖宗監之銷藩鎮之權罷世襲之制施於承平無事則可在今日則手足以捍頭目為今日之計莫若太原真定中山河間間建為藩鎮擇帥付之許之世襲収租賦以飬其將士習戰陳相為唇齒以捍金人可無深入之患又滄洲與營平相隔黄河下流及小海其勢易以侵犯分濱棣愽德建横海軍一道如諸鎮之制則帝都有藩籬之固矣其二謂熈寧以來藉河北保甲凡五十餘萬河東保甲凢二十餘萬比年以來不復閱習又經燕山雲中之役調發科率迯亡流移散為盗賊今所存者近及一半宜遣使團結訓練各令置器甲官為収掌用印給之蠲免租賦以償其直武藝精者次第遷補或命之官激勸之彼既保鄉里親戚墳墓必無迯遁又平時無飬兵之費有事無調發之勞此最䇿之得者其三謂自祖宗以來飬馬於監擇陜西河東河北美水草髙敞之地處之凡三十六所比年廢罷殆盡更為給地牧民間雜飬以充數官吏便文塞責而馬無有善又驅之燕山悉為敵人所得今諸軍缺馬者大半宜復祖宗監牧之制權時之宜括天下馬量給其直則不旬月間數萬之馬可具也其四謂河北溏濼東拒海西抵廣信安肅深不可涉淺不可行舟所以限隔敵騎為險固而比年以來淤殿乾涸不復開濬官司利害稻田徃徃洩去積水隄防弛壊又自安肅廣信以下低處可益增廣其髙仰處即開乾濠及䧟馬坑之類宜專遣使以督治之其五謂河北河東州縣城池類為頺圯湮塞宜徧修治而近四輔諸郡畿邑皆築城創置樓櫓之屬使官吏民有所恃而安萬一有敵騎深入擄掠無所得可以坐困其六謂河北河東州縣為敵馬殘破蹂踐去處宜優免租税以賑恤之徃年方賊擾浙東猶免三年今三鎮之民為朝廷固守安可不議所以大慰其心者其七謂河北河東諸州最以儲峙糴買糧草為急務宜復祖宗加檯糧草鈔法一切以見緡走商賈而實塞下使緣邊諸郡積蓄豐衍則敵不敢動矣其八謂陜西解鹽無煮煎之勞而給邊費足民食其利不貲自行東南鹽法而解地分益陜西邊益貧願復祖宗舊制以慰闗陜民心臣寮上言將擅去朝廷人先賜罷黜以允公議先是上皇東幸亳州大臣權貴不聞恤國家難者皆乞扈駕將家屬從其餘百官家屬去者侍從尚書而下迯遁者如張權衛仲逹何大圭等五十六人故有此論舉使臣武勇指揮聖㫖在京令監察御史以上在外令監司知府軍及路分鈐轄以上候指揮到限三日於大小使臣内公心選擇曽經邊任或戰陣及有武勇可以統衆出戰之人各舉二員開具歴任脚色保明奏聞即不得泛濫緩急擢用仍不妨别處注授及具一般文狀申樞宻院十五日辛亥斡里雅布回至燕山許採䧟燕記曰先是斡里雅布䧟燕山進兵南冦留蔡靖在燕五月十五日斡里雅布棟摩國王郭藥師等自南歸而肅王張邦昌同行士大夫見之有泣下者斡里雅布來約蔡靖以下官於昊天寺相見遂䄂中出本朝所與國書令王苪等讀示蔡大學讀訖斡里雅布乃謂蔡公以下官曰趙王失信致我南侵却聞少宰甚得人情不然我未回來官人等且安心坐為有少邊事議未定纔候定萓却令與肅王同歸兼亦欲將少金銀令充果實費其言頗似婉順良久又謂蔡公曰大學有事可以説及蔡公曰念靖南歸幹里雅布大怒頭面𤼵赤曰待與他商量些好事都不肯商量却只要歸好與穆克珊坦塔穆克珊坦塔者棍子㪣殺也明日獨遷蔡公一家於皇城衆皆為公危之詰旦余徃見侍中劉彦宗曰昨蔡大學見二太子語稍方聞已遷皇城或者恐有不測之禍望侍中與周旋之彦宗首肯曰少間當言之請無慮余既退又遣人諭及曰但放心决保無虞後聞彦宗入皇城中既回乃徃見斡里雅布又兩日復遷蔡公於髙團練宅廵邏呵衛之後斡里雅布又來約本朝官於姚村淀觀射栁見肅王張邦昌已在而王雲曹曚亦來坐次甚逺語言不相接斡里雅布乃謂蔡公曰太學忠臣也但安心將來和議了便可隨肅王過去因自酌酒三盞與蔡公飲之名曰過琖厚禮也金人建元帥府設置官屬都元帥左右副元帥左右監軍左右都監凡七人節要曰斡里雅布初入燕山尼堪初入河東稱都統府至是改曰元帥府乃劉彦宗之建議也以安班貝勒錫里布為都元帥金皇弟隆普伊拉齊貝勒尼堪為左副元帥金皇子斡里雅布為右副元帥金皇弟達蘭為左監軍烏舎為右監軍金皇弟棟摩為左都監契丹耶律伊都為右都監東路之軍斡里雅布主之西路之軍尼堪主之金人呼作東軍西軍東路斡里雅布建樞宻院於燕山以劉彦宗主院事西路尼堪建樞密院於雲中以時立愛主院事金人呼東朝廷西朝廷十六日壬子太學生陳東上書辭免恩命及論列蔡京父子書曰臣於今月十三日准尚書省勅一道賜臣廸功郎同進士出身臣不敢叨冐恩命謹以具狀繳申尚書省乞敷奏追還成命者契勘臣於去年十二月二十七日合在學生伏闕下上書乞誅姦臣蔡京等六賊又於今年正月初六日三十日臣兩詣登聞檢院上書盖因太上皇南幸申言六賊之姦又於二月初五日再合在學生伏闕下上書乞復用李綱并乞罷李邦彦等是日軍民不期而㑹不謀而同者十餘萬衆叩閽號呼驚動九重論臣之罪自當誅戮陛下仁聖赦其萬死在臣之分已是僥倖臣雖至愚粗知分義豈敢復萌一毫私心希朝廷恩賞今來遽被恩􅃂令臣恐懼莫知所以伏念臣所言姦臣蔡京等六賊者以天下壊亂至極乃致金人侮慢中國上皇避位而去陛下新即寳位屢勞北顧之憂事至如此皆京等所致臣等諸生謂陛下即位之初當大明誅賞以示天下又况欲禦外侮必先立我國威以正内勢六賊不滅國威不振是必先誅京等然後賞罰明而國威立則在位之臣必能悉心協力助陛下大有為於天下誰敢懐姦悞國如京等耶敵人聞之必望風逺遁此臣伏闕之本心也二月五日所言乞斥李邦彦等而復留李綱盖於初四日早聞得李綱廢罷而軍民怨憤洶洶可畏臣等深恐不測之變瞬息竊𤼵料朝廷之上侍從臺諫之中必無為陛下言者故乞亟復李綱以安軍民之心此臣等伏闕之本心也臣等諸生遭遇聖明各欲盡忠竭孝以戴君父事干社稷大計奮不顧身為陛下言之豈敢於此僥倖官爵臣謂今日之所急者退小人進君子修政事詰戎兵小人未盡退君子未盡進故政事未盡修而戎兵未易詰也方今天下事無大小㒺不蠱弊正須振頺起廢凡事刮磨整齊之然後可柰何欲坐視而不救乎臣知之矣其大患有二焉陛下不斷則主威不立大臣懐私則公道不行主威不立則雖有大禹之憂勤文王之恭儉未能濟功也公道不行則雖伊尹之志周公之功亦不足觀也已臣何以知陛下之不斷而大臣之懐私乎蔡京蔡攸尚逭典刑臣以是知之也蔡氏罪惡貫盈雖族滅不足以償天下之憤自崇寧以來蔡京專權䟦扈壊亂天下窺伺神器動揺國本天下共憤之臺諫之官如陳瓘任百雨何昌言江公望等論列京罪章數十上近日言者備䟽蔡氏父子之惡衆論不容如此終未正厥典刑以誅殛之臣以是知陛下之不斷也臣亦知陛下非不欲殛誅其人也所以未能斷然不疑者豈朝廷之上有為之營救也乎今諸大臣率多蔡氏之黨徃徃附㑹牽合以蔽蔡氏之罪臣以是知大臣之懐私也臣謹按蔡京用事每有異心盖嘗與蔡崇隂謀是時陳瓘之子來訴於朝蔡京怒之編置海島天下州郡城門之嚮帝都者素號朝天門京乃令更名曰朝京欲為天下朝已之䜟創興學法以貢士退歸者為退送意謂送者宋也欲為退宋之䜟也甚者建四輔以分天子之兵置三衛以弱天子之勢託祝聖而植臨平之山假利民而决興化之水動皆不軌致至俁之告變而謬為心疾受孟翊之訛言而與之以官趙植以妖術附之張大成竊議其惡前後言者論之甚詳想章疏具存陛下試取觀之可知其奸也至於複道曲河相通宫禁脅持君父言者或未及之又改公主郡主縣主為帝姬宗族姬此其用意猶章章者盖趙出嬴姓而姬姓蔡所自出京乃令天子之女悉從己姓悖逆不臣有如此者頃嵗張懐素與吳儲等謀反為范蓼所告開封府制勘懐素供通備言京嘗有謀是時開封尹林攄御史中丞余深賓主事二人乃京死黨力為掩覆凡文欵及京必令禁毁京遂幸免其後攄深驟遷宰執皆京報之也京在相日動以數年不除一諫官意欲掩上皇從諫之聖以絶天下議已之言愚弄朝廷幾同兒戱天下皆知京有宗楚客之心使其得遂厥志必為王莾無疑幸宗社之福其志弗遂耳京兄弟被遇三朝崇寧間京為宰相卞為元樞弟兄將相之權國朝以來所不許也京之凶熖可畏當時無敢言者京父祖子孫坐享髙爵厚祿僥冐恩􅃂二十餘年義當子子孫孫捐軀報國前日邊報警急適在陛下即位之初不顧警撓不勝社稷之虞蔡京蔡攸乃與童貫朱勔等盡挈家屬强挾上皇南去使陛下父子隔離晨昏之念日軫聖懐蔡氏父子祖孫不下數十人無一二留者曽有一毫事陛下心乎京既以扈從上皇為名乃獨留拱州已無心於上皇矣臣灼見京留拱州甚不徒然意欲穩坐中間伺兩宫之安危然後自為之地也萬一陛下當時果從羣臣之議决意他幸都城不守京必起為賊用京固知金人割據必不能久有中原敵退之後必乗勢據有我宋百年之社稷以償其素志與其子孫朋黨内外逺近更相應援陛下雖欲力圖收復恐未易也若欲上皇渡江之後蔡攸等變亂遂成京必奔馳以就其子自江以南非朝廷有京之姦計每每如此聞京前日在拱日夕飲宴樂聲不絶比至謫徃西都則帶花飲酒徜徉城市偃蹇自若是曽以君父朝廷為意乎陛下謂不誅之可乎蔡攸之罪尤不可容攸之為人驕淫狠傲在家則無禮於其親在朝則無禮於其君不忠不孝天下嚮聞閨門淫穢復不可道招權怙勢侵亂朝政燕山之役雖起於童貫而攸實副之䧟沒士馬捐棄金帛不知其數買空城以給朝廷冐取厚賞躐致公師久領元樞之任前日金兵初起邊臣告急章奏累至攸輙匿之乃於私家收拾金寳宻自為備在朝大臣皆作去計畧無一分捍禦之心直至金人漸逼乃始奏聞遂至敵兵衝􅋓直造城下道路之言皆謂攸父子及貫勔等與金人結為内應欲分我中國而主之所幸城中姦細數敗自知計弗得行乃挾我上皇倉遽遁逃聞上皇為攸等沿路刦持無所不至臣正月三十日上書正為此也願陛下早發英斷正以鋤禍根則在朝廷之臣孰不為陛下所用如王黼梁師成非無黨與在朝廷者然二人已死彼亦灰心雖欲懐私不可得已今朝廷大臣心懐蔡氏萬事掣肘遂使陛下刑威有所未當盖京父子不誅而童貫朱勔亦得幸脱童貫之罪大於梁方平方平伏誅貫猶未也朱勔之罪大於李邦彦邦彦已死矣勔當何如蔡京父子之罪大於王黼黼既不免蔡氏父子尚可容乎陛下即位以來天下指日以俟京誅今乃遲遲如此天下失望聞京近到拱洛二郡百姓父老皆欲毆之今蔡氏父子所在之處萬一有為陛下羣起而誅之以快積年之憤因成變亂陛下雖悔何及蔡氏不滅則天下之心愈益疑惑終不可解欲望平治其可得乎敵國侵凌之患何時而已此皆大臣懐私不恤國計陛下又不斷自宸衷必殺無赦天下何頼焉臣願陛下處事勿屈法狥情以茍目前當事事思為萬世法正如以臣上言之故遂欲自布衣加以爵命此豈可為萬世法哉願陛下察臣誠懇追還成命臣獲安義分不勝幸甚臣以一介布衣輙敢抗辭君命罪誠萬死臣無任惶恐待罪之至三朝北盟㑹編卷四十五
