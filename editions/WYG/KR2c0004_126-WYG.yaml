body:
  text: 三朝北盟㑹編卷一百二十六宋徐夢莘撰炎興下帙起建炎三年三月盡四月八日三月十六日王世修見余曰事已有成容子細稟覆累日與二将諸幕論議大抵以軍中人情中外公論反覆曉諭朝廷若舉反正之議無敢不從惟是二将所陳未有一事得請頗以為言如年號等事昨日再入文字語未畢呈内降文字乃二㓙所奏紙末批云第三奏可改元明徳或明受余即示世修曰已從請矣世修曰且告少留此奏來日降下令還軍中言以為論改年事庶於世修無疑後兩日改年明受又曰二将甚愚不難制惟張逵最乖因議及請復辟言上還宫乃曰本為議和今使猶未遣豈可輕議迎請余曰金人近在平江比日已遣小使使路若通非久便見可否胡宻遣人齎状來云至平江府為觀察所拘留文字亦取去余令徧呈執政及二㓙與募官到堂示之自此使和議遂息二十日上下人情翕然和同軍民皆言當反正二十一日世修至云軍中已定便可下詔余曰事固定亦當速然迎請車駕須有禮儀及奏章書詔之類先須執政議定又須擇一吉日忽平江傳檄指名二㓙之惡來人以数十本傳城中二㐫得之忿怒相從至堂出檄文曰某等前日之請欲和金人以息兵革本期使人囘見得敵情如何别作商議無何大使不來小使不通方聴朝廷措置今勤王傳檄直以某等逆賊實不能堪欲率本軍徑至平江與諸将理㑹了却來迎請庶顯本心又聞此檄出張浚之意辭氣忿戾與常日不同余曰既知是張侍郎之意渠便可罷彼兵權付吕樞宻必無事矣於是衆退晚朝具奏批云㫖罷浚禮部侍郎後浚來首語余曰前降罷命知非朝廷意即時毁却省劄棄之江中余曰方是時反正事垂成凡有益於此者皆為之不特此命也如黄汪二相再貶亦是此意浚與黄濳善深知故併告之於是召李内翰邴張直院守分作宰執百官奏章三奏答詔及率百官迎請詔太后手請并赦文二十六日執政聚議召二㐫二十七日令行有司發帖子請召諸公皆危之少頃人囘曰皆來既見余曰反正事已定擇日迎請朝内百官皆有章奏公等可别作一奏傅面頸發赤漸恧無語囘顧正彦正彦起曰前日所請本為和議今雖平江使命不通未曽别差人别路前去首尾及一月却請反正前後事體相違余厲聲曰如公之説正不相違本為和好而不可通使更何所待若不由平江他路遣使緣已張露誰不知州縣亦必邀留金人只在江北今已二十餘日彼必探知子細平江日稱勤王餘杭尚未返正兩相疑阻敵若乗隙不待秋冬徑渡諸軍奔潰國家束手就斃皆二将為之也又安知内外無忠義豪勇之士攘臂倡義立定亂之大功者乎前日王淵不當為簽書人情尚能如此今日事孰為輕重哉若前後相違今能固聚有請猶是救得一半招諸公説諭乃是要得上下和同不然下詔率百官諸軍請主上還宫公等六人措身何地平時為将帥者皆賴國家官爵俸祿號令法度故能使人一旦是非曲直既明雖三尺童子亦知去就将校軍士令則必難今日之事不可旋踵請於幕次草奏日已髙令堂厨具食前一日預於廊下設幕次紙札皆備送食茶且覘之人囘云世修草奏張逵共㸔二将無語少頃持來二十九日下詔即朝别宫累日隂晦至是開晴人情大和悦申後二㓙來私第稱有稟覆事見之云某等自初五日樓下陳請後來未曽見上來早當迎請即今欲隨相公一到别宫見上謝過三十日五更赴睿聖宫比曉畢集率文武百官數百員伏殿下餘人立殿門外三奏進封三賜批答答詞前一日所進也久之上方御殿拜舞山呼聲聞數里二府升殿余奏曰日己巳時二刻乞駕興還行宫上猶遲遲余又奏曰尊從侍衞自五鼓集此已過進膳乞趍駕未審乗馬上曰乗馬就西廊余搢笏掖上就鞍軍民從觀往往登屋夾道歡呼焚香如雲至行宫御殿閣門以次引班拜訖皆退是夜二府宿堂四月初一日百官早朝奏曰二㓙未有以處欲以遷官除淮南西路制置使令将部曲赴任上曰淮南有金人否奏曰東路有之指揮内使便與説破如所部州縣有金人占據且於沿江駐軍相度渡江仍不候受告起𤼵二将許入辭餘悉免上皆可之初二日早朝捲簾上獨斷如故至晚二㐫來見云昨日已入辭蒙恩賜金軍伍已𤼵乞今夜勿閉城門庶得一日𤼵絶是夜數處縱火而大雨傾注火不能起覆出一劄子乞賜鉄劵余曰故事有之不謂忘矣取筆面判奏待給賜令所属檢詳故事如法製造不得住滯又曰王世修尚可從軍否余曰渠為從官豈可復參謀又曰兩日並不相見余曰恐事拉行是夜三鼓後人馬出盡初三日押赴朝郎官傅宿來漏舎宿曰昨夕得省劄給賜二將鉄劵此禮本以待有功今可給乎余展劄子請執政同㸔問宿曰檢詳故事檢得否曰無可檢又問如法製造其法如何宿曰不知也又問如此可給乎執政皆笑宿曰已誤矣余既去朝後數日見邸報宿論功遷一官上曰昨日城上望郊外水際有舟船火炬朕遣人墜城探之乃韓世忠下先鋒陳思恭船泊水中不敢近岸去人問之但云苗統制去也來勤王兵乃如此余曰勤王兵不為無助只要他作聲援如遣陳康國來及拘留小使之類皆是儻至兵到城下必交戰勝負固未可知設使戰勝二㓙必生姦謀以保䕶為名分守兩宫勤王兵雖勝如何措手相持不勝則禍變叵測矣此國家利害也如論臣僚利害則在城者甚危而難為功在城外者甚安而易取名檄云當與天下共誅之此雖大義然事若至此雖若可救度諸人朝夕必來則臣去矣望陛下試以此意諭之㸔有何説仍望速令分路襲擊勿令過江則難討也初四日求罷午間報韓世忠下将佐陳思恭孫世詢等至皆以塵土蒙面破裂衣裳亦有面頗封藥如金瘡者州人指笑曰舟行未嘗有塵不曽戰鬭何故傷損皆奔趍禁門欲直入衞士呵止遂大呼歐擊而入倡言曰韓太尉來拆簾徑至門殿呼呌不已上大驚遣人引至殿廷望殿上無簾慚怍而退至晩吕頥浩等皆至初五日二府奏事方退留身奏曰陛下既許臣罷去乞早賜處分臣自此不復敢赴朝上曰卿拜相方三日事變遽作賴卿之力二十五日而事平以卿平難之謀用圖恢復必有所濟余曰臣若不去人必有為臣所蔽臣去之後公議乃見今中司闕官乞陛下選除從官知事者為之庶㡬議論得實上曰誰可余曰中書舎人張守見直學士院自李邴遷執政以後書詔皆出其手日至都堂頗聞謀議且臣累聞聖訓謂守作言官論事得體上曰即有除命上又曰朕與卿相知今蹔聴卿去然孰可繼卿者余曰以時事言之須吕頥浩張浚上曰以謂勤王有功耶城中安静數日方至余曰嘗論奏外援不為無益不必先到城下若以二人作相則諸将必喜上曰且除一人二人孰優余曰知臣莫如君况命相大事臣何敢優劣上曰第言之余曰頥浩練事而粗暴張浚喜事而踈淺上曰俱輕浚太少年余曰陛下若以浚為少年且除近上執政官向日臣自蘇州被召軍旅錢糓悉以付浚後勤王事力皆如此此舉浚實主之上曰然又曰卿欲何往余曰聴命而行不敢有擇上曰除卿帥藩奏曰臣聞命即出城乞免謝辭上曰莫不當免否余曰除目内帶下令免即是責命若奏陳乞免即是從請上曰甚好又兩拜辭上将退上曰即今便押卿赴都堂余曰蒙陛下恩遇之厚體貌已全乞免此禮上曰有説卿到堂少待令吕頥浩張浚劉光世韓世忠張俊皆參堂以正朝廷體面前日将佐直撞入内毆打衞士呌呼無禮皆不知道理此風不可長也余曰頥浩是赴堂供職陛下既以朝廷禮法為訓臣不敢違臣聞唐李晟平朱泚之亂奏云謹以肅清宫禁祇奉寝園當時冦汙宫禁晟擊出之故云肅清今陛下還宫已數日将士直􅊳呌呼至入殿門誠是不知道理上曰極是余曰臣至堂只見諸将畢便去須㬰到堂諸人皆至光世曰理合公參世忠云金人固難苗傅處只有些箇漢兒怕他做甚余曰請太尉急追無令過江歸得御筆張浚除中大夫知樞密張守除御史中丞至晚鏁宣召院王淘翊立宣制頥浩右相余觀文殿大學士知洪州即奏乞免謝辭徑之城外接待院先因渡江盡棄嚢槖一簮不存至是隨行惟一布嚢負之而趨路人皆笑有歎息見憐者中書省吏齎機密文字黄袋來納余令當面開示有二㐫請劄子不曽施行者十八紙具奏繳納次日内臣康諝來傳宣曰謝辭依奉已免又出手詔奨余令繳劄子且改除知平江府即作奏乞依前守洪隨行親兵七十人以道路尚難乞将至新任附諝特奏并别作一劄子謝辭奨諭手詔云朕覽卿所奏苗傅等申謝朝廷不曽施行事十八紙卿任宰司之三日變起倉卒方羣㓙上賜虚制下圖謀逆卿在廟堂能折姦言拒而不言保安卒以無虞雖曰在外大臣将帥提兵入援實卿謀慮周密終始保䕶之功朕甚嘉之已除卿觀文殿學士知平江府盖朕将幸建康以援中原倚大臣為屏翰委任重矣故兹親筆示諭想宜知悉初八日閣門官張泰送告來依舊守洪遂過錢塘江於越州治行繼聞遣給事周望督諸将討敵又聞諸将擅殺工部侍郎王世修中軍統制官吴湛皆掠其家先是歳前聞金人既破鄆州黄相約諸執政曰六宫先渡江侍從百官家属亦聴從便惟吾􅈠骨肉不可動動即軍情不安至是皆狼狽徒步登舟塞河而下江水未應閘不可出余有大船梢工夏立先泊真州閘外謾遣一介告之令彼放船至𤓰州又以告小子唐卿余從駕渡江不敢顧家詰朝報至云骨属乗夏立船已過江少頃唐卿來云是夜三鼓後去江岸十數里船不可行持火炬江上尋夏立船一問得之骨肉徒步行蘆槎中欲曉𤼵舟徑渡復遣舟取行李則火起人散敵騎至矣三朝北盟㑹編卷一百二十六
