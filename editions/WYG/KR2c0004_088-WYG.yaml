body:
  text: 三朝北盟㑹編卷八十八宋徐夢莘撰靖康中帙起靖康二年三月二十九日己未盡其日張叔夜字稽仲開封人侍中徐國公耆之後也通經史善屬文習兵法長於詩詠有文武大材初為武職内侍馮浩髙其才毎薦之叔夜亦上兵策及宫詞百篇上喜之換文資累遷太常少卿賜同進士出身擢中書舎人禮部侍郎宣和初浩以諫賜死臣僚又言叔夜乃親黨也降三官罷之後起知海州破羣盗宋江有功宣和末京東大盗四起擢叔夜知濟南府與京東制置使梁方平協謀屢平巨㓂靖康初召赴闕除南道大總管兼知闕州後尼堪攻京城詔起四方援兵叔夜同子伯奮仲熊率兵一萬三千而來與大金戰京西大小十八陣皆破之遂至京城與金人戰殺傷相當再戰攻之擒首領三十餘詔加延康殿學士内外兵馬都總管軍入京叔夜言請因金人營壘未全率諸軍擊之其敗可必上不從軍卒郭京聚兵欲以左道破敵上幸京城加叔夜延康殿學士叔夜上言恐郭京狂率敗事俄除僉書樞宻院提舉京城四壁子承直伯奮仲熊特改合入官上幸京城見䕶龍河填盡憂之叔夜曰臣願率衆出城以計刼之徒守空城則天下事去矣上堅不從叔夜乞罷僉書樞宻院止帶南道總􅃹領南道兵不允叔夜召諸將議事皆不至叔夜意沮及金人登城叔夜兵潰斬之不能禁再同何㮚以奇兵八百領綂制張仲剛等與金人戰南薰門下欲復奪城不能上及金人廢立叔夜與孫傳上書乞復立帝不許又乞立皇太子及燕越王又不許又乞立趙氏一人又不許叔夜傳詣南薰門下拜泣請存趙氏尼堪取詣軍中曰孫傳不立異姓已為我殺公老年大家族繁盛豈可與傳同死耶可供狀立異姓叔夜曰累世荷國厚恩誓與國家俱存亡實不願立異姓逼之數四叔夜終不從請死而已乃引叔夜并其子仲熊北去建炎初遥加觀文殿學士卒以不屈死於金國年六十三累贈少師謚文忠賜廟於信州靖康小雅曰公諱叔夜靖康元年諜知金人師且再舉太原真定相繼為敵所陷始詔天下帥守各以其兵入赴國難十一月日敵至近畿諸道之師未有至者公時守鄧州遂以官軍及民兵萬六千人至都城之南營於戴樓門外時金人稍以兵薄城公屢擊走之上為親幸南城登譙樓慰諭公且除公僉書樞宻院自城上以毬文金𢃄賜之金人既大集乃命公移師入城及城失守上再幸敵營既乖和議金使呉幵莫儔連日入趣立異姓王時雍以下㑹議秘書省皆請立張邦昌公獨抗疏力言不可有告公恐貽金人之怒者公不聽既而金人索公出赴軍前遂留不遣嗚呼大臣事君不當爾耶死生之間人之所難而能不避鼎鑊以全大節此社稷之衛也詩曰金人强悍一嵗再至公提郡兵疾驅入衛敵將易姓公秉大義獨敢抗言必復趙氏欲扶日馭力掃氛翳身拘名張忠烈振世張叔夜家𫝊一乞都闗中權暫駐蹕襄陽府劄付契勘長安闗中之地厯代所以成王業捨此而下皆去中原寖逺名為遷都其實偏覊今襄陽漢江回環西南有萬山三闗之險尚可號令中原去闗陜京東河北不逺然地歩不廣深恐不足以容萬乘百司若或事從簡省將城盡行展套建立樓櫓姑取其闗中路近旁通巴蜀權暫駐蹕聚糧益兵力加營繕亦足以建都徐為入闗之計以東西二京為别都留兵以衛陵寢次則南京地勢平廣居民繁富今先具襄陽圖所有南京形勝如聖慈有意行幸即别具圖進呈次開具自京至襄陽府驛程契勘自京至襄陽府驛程下項京至延鎮四十五里尉氏縣至許田鎮七十五里許田鎮至頴昌四十五里頴昌府至頴橋鎮四十五里頴橋鎮至襄城縣三十六里襄城縣至汝墳鎮四十五里汝墳鎮至葉縣四十五里葉縣至新寨鎮至方城縣四十五里方城縣至許村九十里許村至青䑓五十里青䑓至唐州五十里唐州至胡陽縣至崔村里崔村至八叠七十里八叠至襄陽五十里又乞遷都劄子契勘遷都必詳講究一道山川險阻戰守利害以備非常臣近知鄧州是時見京洛士人避敵多來襄鄧猶恐敵騎至頴昌等處臣仔細詢問及稽考地形自頴州而南唐州方城縣最為諸路㑹口井邑亦甚繁富汝州魯山縣三鵶路亦進軍馬今既欲都襄陽即方城恐當升為郡魯山亦當為路口兩頭置立闗戌以備敵騎所嚮其襄陽之西四柳等闗雖路險不通兵車然去陜府六百餘里亦合嚴立戍守取進止又臣昨領本道兵至京䝉陛下奬擢然三道與西兵迄不至臣孤軍無毫髪功臣至之初得對便殿首陳遷都闗中之䇿䝉陛下面諭令臣力主此議後來臣屢次開陳及進暫駐蹕襄陽圖狀若陛下不以臣為不才候門開日令臣前去置司襄陽府宻行措置候見次第臣以本道兵前來奉迎鑾輿取進止又乞權暫駐蹕襄陽府畫一狀一乞以南京留守總制京西江湖淮浙京西諸路軍馬漕運等事為名其印記備用大祀司印一營繕南京城池宫闕及百司諸軍營壘並乞仍舊有官舎及寺觀量加増葺其材置於出産處委監司州郡疾速依本司所立限應付一乞將襄陽鄧唐汝州守臣别行選任其通判幕職官知縣乞從守臣銓擇如見任人不能辨事或缺官去處並聽辟置仍乞添置轉運使二員專切應辦驛頓及移用應付本京錢糧本司乞置㕘議官四員並從朝廷差人依奏事例施行及書冩機宻文字各一員從本司辟奏隨本人資序支破添支驛劵請給人從其餘如所屬路分官兵有不職或闕官去處恐奏請覆不及欲乞臨事先次差閒慢處見任或待闕官抵替奏取指揮差注一錢糧欲乞將上供一半之數截撥襄陽府交納京西路諸司錢糧權許專一應付驛頓等支用税賦許行支移即不過自來地里之數一方城池當衝㑹正係控扼去處欲乞改縣為軍選差知軍等官屯兵北扼敵馬要津一襄陽既為别都屯駐軍馬増修城壁乞添差路分兵馬總管一員一乞給降度牒五百道校尉副尉帖各三百道許依本價召人情願承買用或承信廸功郎告各一百道給入中錢糧本植等檄勸勤力之人一身分及官屬人從當直人見有元帯來本道軍民兵及京西第一第七將見在城内人欲乞盡數將帯去候到差發州縣旋發遣如或少闕沿路量行差人馬轉替前去所貴即日官屬人從更不得於京師差撥一太廟社稷欲乞繪圖前去一乞差土功都豪寨官二員土瓦都料大小木作頭各五人一宫闕直乞以應天府規制如倉猝應辦不及即隨宜修建一乞候出更日便於道路合置頓處儲積羊畜錢物所到即應付具次第聞奏小貼子臣伏覩襄陽府地據荆楚上㳺欲乞降勅改作南京所有宫室依面得㫖隨宜營繕取進止太廟社稷兩宫園廟諸王主第兩省都堂秘書省學士院尚書史院九寺三監御史䑓府􅅟大理寺二府官告院内尚書省九寺三監文案官吏自管押或先或後餘以次發所有車乘本道自發遣前來臣將來臨行押差作匠等前去後到繪圖進呈者所有畫一續具奏禀其錢糧據所用物遵約束經去次又叙戰勤王及勸都闗中以病乞致仕宫觀劄子臣本無技能徒以片文隻字誤厯華近逮出守海壖㑹劇賊猝至偶遣兵斬捕賊勢挫衂相與出降䝉恩進秩其後濟南羣盗蜂起朝廷猶録微効於宫祠中擢知濟南賊稍平移青州正月中金人至京師詔發兵入援臣等奏乞兵與諸將追擊敵騎及席盖到青城代還至都時敵騎已渡河被差知鄧州四道建師去冬准御札令不候兵集領見兵勤王臣自鄧至京凡十四驛道路轉戰十一月朝京師䝉陛下初擢延康殿學士繼除資政殿學士僉書樞宻院事臣自初到累奏乞出戰㑹三道未至到伺候兵集而三道兵終不至城已失守無毫髪功初至之日勸陛下遷都闗中繼䝉聖訓駐蹕襄陽令臣經畫臣愚實欲自効而痼疾速發歩履艱棘恐不足以當遣使欲乞聖恩察臣非敢避事實縁疾病特許臣守本官致仕或在外官觀察使又叙諸將不肯出兵城破被創猶戰自劾劄子臣比者領兵至都荷陛下所以奬激之眷過厚遂使僥冒以至今日退念臣初至之日嘗欲速戰妄意乘其營壘未就以輕兵迎擊諸將或以為不可逮敵寨既成致城外或自决水或自縱火更無戰場登城守禦諸將環視號令不一卒至不守臣身自被創是夜猶領張仲剛等兵戰南薫門下臣男以南道兵戰安上門上是時諸將皆先臣下城接戰之際無一人至者戰罷與陳過庭俱入禁中明日越王鄆王欲戰於曹門外陛下使臣與二王俱出臣未領所統兵而二王自將衛兵已出門矣不敢不以身從僅能追及兵非臣部曲無由節其進退遂無毫髪之効中間奏乞罷内外總管尋得㫖令弹壓候師退限十日結局今内外弹壓雖無可虞盗賊然不足勤勞伏望候師退日重賜罷黜以示無功之罸少慰僉議又辨利在速戰及累奏郭京狂率敗衂劄子臣比者領兵至都荷陛下奬激遂使僥冒至此退念臣之初至當時京城甲馬自盛而招集烏合其勢可暫難久臣以謂乘其營壘未就欲引兵迎擊屢具奏陳以謂利在速戰䝉陛下面加奬訓以臣狂妄戒太鋭令候三道及西兵到於正月間舉兵恐輕動如姚平仲之失其後三道兵與西兵不至而城已失守臣自上城身被創猶召集張仲剛等兵戰南薫門下臣男伯奮以南道兵戰安上㑹城上守禦人皆先臣下城城上東西面無一人把守截戰之際亦無人應援然殺傷太當中間車駕出郊得令㫖於舊城内外弹壓後來乞罷外總􅃹准尚書省劄子奉聖㫖候師退限十日結局今内外弹壓偶無可虞盗賊然深懼師退以謂臣前此不肯出兵及郭京之敗多由臣不合令出城勘㑹郭京出兵臣累奏慮其狂率敗衂今日孤外之迹伏乞睿慈特賜主張取進止又申金人元帥狀契勘累具申乞存立趙氏之後今奉令㫖令立見今為首􅃹事之人縁本官非衆所推勘㑹昨承初七日奉令㫖如無可推戴令具申元帥府管依元帥府推戴狀申令來欲乞檢㑹累申從元帥府於嗣子或於趙氏之屬内擇立一人所貴㤙歸元帥府永為藩輔而趙氏宗廟尚得血食謹具狀申元帥府伏候台令金人又留中丞秦檜侍郎司馬朴不遣或以言語或以廢立事亦舉家北遷三朝北盟㑹編卷八十八
