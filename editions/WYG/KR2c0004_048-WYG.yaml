body:
  text: 三朝北盟㑹編卷四十八宋徐夢莘撰靖康中帙起靖康元年六月一日丙申盡十八日癸丑六月一日丙申朔前降姚平仲立賞捕指揮更不施行三日戊戌知河東宣撫使种師道罷以李綱充河北東路宣撫副使遺史曰种師中失利於榆次金人急攻河東种師道請㑹山西陜西京畿之兵屯于青滄滑衛河陽預為防秋之計朝廷不從遂罷師道宣撫使少宰吴敏門下侍郎耿南仲以為中國勢弱敵國方强用兵無益宜割三鎮以賂之謝克家孫覿李擢李㑹王及之王時雍劉觀七人結黨専附南仲以堅和議知樞宻院事李綱以為祖宗之地義不可割棄之徒資敵勢使生靈陷于敵國豈為民父母之道哉上念祖宗疆土哀惻黎元乃從綱議為再援之計敏南仲請以綱為河東宣撫使上欲用綱而綱辭以非帥才不任其責御史中丞陳過庭侍御史陳公輔皆言李綱儒者不知軍旅將兵必敗又言綱忠梗異衆為大臣所陷他日成功亦死敗事亦死不宜遣綱使綱出衂則太原失守貽憂近甸禍生不測非計之善敏南仲以他將庸繆無踰綱者朝廷以樞衡之臣督責諸將則孰不為用是時太原安撫使張孝純數遣人以蠟書告急上深念太原困悴而朝議咸欲用綱且見忠梗果鋭期于立功乃以綱為河東宣撫使公輔與諌官余應求言綱不當去朝廷上怒皆罷之傳信録曰种師中殁于軍前師道以病先歸執政間乃有宻建議以某為宣撫使代師道初斡里雅布之師還抵中山河間兩鎮兵民以死固守不肯下肅王張邦昌及割地使等躬至城下説諭即以矢石及之乃退沿邊諸郡亦然而种師中進兵逼之金人出境兩境無虞尼堪之師至太原城下太原亦堅壁固守尼堪屯兵圍之姚古進師復隆徳府勝軍扼南北闗累出兵互有勝負然不能解太原之圍而師道駐滑州復以老病即罷上納建議者之説决意用某宣撫兩路督將士解圍一日對睿思殿諭所以欲遣行者某再拜力辭自陳書生不知兵危城中不得已為陛下料理兵事實非所長今使為大帥恐不勝任且誤國死不足以塞責帝不許即命尚書省出勅令面受某奏曰藉臣使不量力為陛下行須擇日受勅今拜大將如呼小兒可乎上乃許别日受某退即移疾在告入劄子乞致仕力陳所以不可為大帥且云此必有建議不容臣于朝者章十餘上輙答不允且督令受命於是臺官余應求諌官陳公輔相繼上言某不當去朝廷上皆以為大臣逰説斥去乃無敢言者或謂某曰公知上所以遣行之意乎此非邊事乃欲縁此以去公則都人無辭爾公堅臥不起䜛者益得以行其説上且怒將有杜郵之賜奈何某感其言起上命録裴度傳以賜予入劄具道吴元濟以區區澴蔡之地抗唐室與金人疆弱固不相侔而臣曽不足以望裴度百分之一以度况臣實為非倫且言諸葛亮出師表親小人遠賢臣此後漢之所以傾頽也夫君子小人於用兵之間若不相及而亮深以為言也誠以敵國外患有可掃除之理而小人在朝蠧害本根浸乆難去其患有不可勝言者是以吉甫賛周王以北伐必有孝友之張仲裴度相唐宗以東去必去奸邪之元稹用能成功焜燿國史君子小人之不兩立從古以然臣切觀陛下嗣位之初適遭金人入汴宵旰憂勤勵精圖治思刷前恥雖帝王勤儉之極無以遠過然邪正尚猶混殽于朝翕訿成風殊未退聼謂宜留神照察在于敵國之先朝廷既正君子道長則所以扞外患者不難也今取裴度論元稹魏簡章疏節其語輙塵上聼上優詔寵答宣撫司得兵二萬人而闕馬某白上曰戎事以馬為先今乏馬如此無以張軍容天寳末封常清出師幽薊人觀之見其軍容不整皆叛去今臣出師安知無窺覘者所繫國體非細故也事廹矣請括都城給價償之可得數千疋上以為然令條具聞既而牓于開封府曰宣撫司括馬軍事属搔擾可更不施行其意與前所牓同余竊歎息而已期以六月二十二日啟行而數事皆未辦集乞量展行期上批曰遷延不行豈非拒命某惶恐入劄子辨所以未可行者且曰陛下前以臣為専權今以臣為拒命方遣大帥解重圍而以専權拒命之人為之毋乃不可乎願併罷樞宻院事宣撫使告繳納上封還遣使輙召數四余入見上具道所以為人中傷上頗感動乃以二十五日戒行五日庚子詔蔡京蔡攸永不放還臣僚言爵禄者朝廷設之以待天下之士崇徳報功雖人主不得以好惡私焉况天下哉自古賢者在位能者在職然後百度修庶績凝方夏安姦宄消强敵不敢輕侮吾國百王由之若出一軌自崇寧初蔡京輔政首亂舊章排斥異己汲引同類待以不次朝脱冗散暮翔嚴近常情鮮克自重於是枉道求合汨䘮亷恥靡然成風凡所厚善不獨顯榮其身又及其子孫不獨及其子孫又及其親戚故舊隂相依重盤根錯節牢不可破二紀之間門生故吏充牣天下然才者少不才者多省事者少生事者多貪殘苛刻遠邇告病此猶非京之本事也察其立三衛置四輔疏興化之水修臨平之塔又令許敦仁奉請太上皇五日一視朝當此之時孰不為朝廷寒心幸其族子有所陳告臺臣因之論列其事太上皇雖令納汚猶令塹其墳山京之僣心終不肯已又加王安石王爵欲自為階梯衆論喧騰心不自安復封韓琦以塞人言而蔡確何執中鄭居中童貫皆因之為例封王矣本朝之封王者不過國初功臣及后族耳隳國朝之法長姦雄之心京兇悖之情遇事輙發不可一二數也賴太上皇聖眀不為京邪説所惑京知狂謀終不得逞於是納附戚里内侍交通宫禁肆所欲為以耗國財以弊民力心欲坐視顛覆以快不遜之忿鄧洵武范致虚等為紹述之言以助京刼持上下而何執中余深林攄薛昻皆其死黨濟其奸謀成其羽翼使不可制太上皇毎下詔書施行善政皆為此軰壅遏是以人心日益愁怨國勢日益陵替權門日益强盛朝廷日益孤弱趙挺之劉逵張康國鄭居中劉正夫雖號與京不同然引用羣小梗閉正路亦率由一道蔡卞蔡攸乃其子弟相與違異有若仇敵考其蹤跡實皆有同惡相濟至王黼為相奢汰愈甚開邊黷武禍及生靈迹其所來亦本由京勢位相軋乃相攻陷遂至敵人窺伺生變一旦太上皇播越宗社阽危雖其所至非一要之造端立本捨京而誰天錫陛下剛健文明自嗣服以來元惡大憝以次竄殛忠臣善士悉皆搜揚盖欲恢復祖宗憲度以幸天下傳聞四方靡不呼舞然京之降黜屢有指揮而罰不當罪輿論所鬱縱朝廷未欲誅于兩觀之下猶當投之海外以示薄責其宗族婚姻因京而至顯官者望悉改正上以謝宗廟社稷之靈下以慰生民之望無使餘惡復熾殄敗風俗然後將何執中余深鄧洵武等第其罪惡各加貶責所有王安石等王爵亦乞寢罷陛下眀目達聰察而揆之大革澆浮一陶淳厚則太平之基可立而四方日靖矣願陛下留神裁察取進止六月五日奉聖㫖京攸永不放還如臣僚敢有引薦當正刑章六日辛丑有流星大如五斗器自東南起明照地衆星隨之向西北而墜有聲如雷熒惑犯執法右資政殿學士劉韐除宣撫副使解潜除制置副使代姚古徽猷閣待制折彦質除河東宣撫司幹當公事與解潜治兵隆徳府自威勝軍救援太原張灝節制河東陜西軍馬應援太原聞是役也折彦質為宣撫司幹當公事與解潜治兵于隆徳府潜辟趙鼎為置司幹當公事是時真定在河東最為堅壘朝廷以金人方攻太原防其東軼犯朔之地乃以真定府路安撫使劉韐為宣撫副使領兵五萬守遼州以扼其後真定府路總管王淵鈐轄李質皆從韐辟置先是統制武漢英將京軍三千人救太原以兵少遂來真定見韐不與漢英至五臺山見龎僧正説龎僧正聚集本山僧行往代州欲刼金人之背未出五臺山界遇金人戰不勝漢英走入平定軍瑜珈寨寨中推擂木下打死漢英雖不得真定之兵然真定武勇盡為韐率之以西繇是真定遂虚矣八日癸卯張孝純除武當軍節度使制曰門下總師以順為武克宣捍敵之能行賞無常眡功宜懋疇庸之典眷時賢帥廼國名臣允資屏翰之良誕錫絲綸之渥拂龜諏日讀命颺廷資政殿學士光禄大夫河東路經畧按撫使張孝純學粹而行髙志剛而識遠恂恂躬儒雅之度盤薄乎胷中之竒憲憲備文武之才縱横乎域外之議自専將閫實廣廟謨閭里輯寧士卒悦服属敵人之侵軼抵并門而攻圍夙夜勵兵民之心咸奮節誼上下體朝家之念叶賛智謀訖保金湯之强屢挫敵鋒之銳載惟忠藎良劇歎嘉是用仍撫太鹵之故疆延援武當之重鎮索兠㦸纛益位于多儀干戈戚揚靡繇于内御亟視秩于亞保兼進侯于舊封衍以爰田陪之貢賦併推異數昭示至懐於乎光弼之守太原終成殊績吉甫之伐獫狁尚倚壯圖往承寵章祗廸猷訓可特授檢校少保武當軍節度使進封開國侯加食邑五百户實封二百户差遣如故王禀除建武軍節度使制曰門下奮干戈之衛烈士之所願忠圖疆場之名明主之所經武眷予宿將渙以殊恩侍衛親軍馬副都指揮使鎮西軍節度使武安縣開國侯食邑五百户王禀性質沉雄智謀深静便弓劍之習負勁氣于山西貫韜鈐之書走雄名于塞外久率戎伍夙著戰䇿比總帥屯往䕶并晉属金人之背誕窺邊堠以陸梁城之受攻自冬及夏協主帥之䇿飭備則嚴属兵民之心致命無貳精意可動于衆瞻聲威能折于姦鋒欲示勸于茂勲顧何愛于異數髙牙大纛授于介藩貢食爰田加于止賦於戯賞不踰月矧已厚于念功志欲及時尚益堅于許國暢我武節勉示顯庸可特授建武軍節度使進封太原郡開國侯加食邑五百户實封二百户十五日庚戌勅解潜諸將士朕以敵兵入境俶擾邊陲攻圍太原累時未解卿等帥師援命頗聞將士遇敵血戰冐犯鋒鏑奮不顧身非忠義所及安能如此朕聞之感歎不􅁯于中然敵衆方强未即殄滅一方之民久困塗毒重惟國家撫飬將士固已有年今日國家有急非卿等盡命竭力所向無前安能使朕得寛憂顧但戰者危事今令卿等挺身冐難以致創殘毎一思之痛若在己今降賜一千兩金束帶五条戰袍三十領卿可用激賞中傷用命將士將來第功自節度使以下皆為賞典若更有竒功便加開封儀同三司朕自聞進師寢食俱廢卿等其副朕懐早建勲烈身取富貴澤流子孫日竚㨗音更宜加勉十六日辛亥白時中李邦彦並落職臣僚上言臣聞宰輔得人則嘉謀日吿于上善政日施于下外蕃聞風而畏遁百姓安土而樂業儻或不然而又懐奸誤國則罪不可逭臣近論列前太宰白時中李邦彦尸素無恥悖慢不遜及與王黼梁師成蔡攸相為表裏等事未蒙指揮施行况其罪惡更有深于此者臣請言之昨金人匪茹提兵入境比至京城聞陛下嗣位感歎畏服已有悔過之意宰輔不才倉卒無謀時中則請避地于襄陽邦彦則請割三鎮之地謬懦不忠士庶憤怒流放之誅其可後乎昔在章聖時契丹舉國入冦是時或請幸蜀或請江南惟冦凖獨主北伐之議金人畏威求盟而退觀此則時中之罪大矣及仁宗時契丹驕蹇輙請闗南之地是時富弼奉使為陳利害之端而金人辭服觀此則邦彦之罪大矣其謀雖異其罪則同今尚以特進觀文殿大學士優游里第典領宫祠未正典刑士論洶洶臣願陛下特敷睿斷重加黜責以為大臣誤國之戒取進止六月十六日奉聖㫖白時中李邦彦並落職中興姓氏録曰李邦彦宣和七年拜少宰時四方已亂而奢侈愈甚小人滿朝畧無一言諌諍靖康初拜太宰聞金人軍中嗤笑曰宋果無人大金犯京師邦彦勸上為避敵之計又力主與之講和為便令李鄴鄭望之往使于大金請和虛張敵勢驚嚇朝廷肅王張邦昌往質于大金諸路勤王兵來皆欲力戰邦昌怯懦力沮之李綱出兵救姚平仲為大金所敗邦彦乘勢罷其右丞士民怨憤大學觀上書言其罪陳東引進士數十伏闕上書言邦彦乃社稷之賊也軍民數十萬大呼闕下㑹邦彦訶殿出右掖門士人慢罵曰汝是上皇時浪子豈堪作相至以瓦石擊之而不可前從者徐行偃蹇畧無䕶保之意衛士羅列天街至抜刀以待之邦彦乃覺遂回馬衣皂綈藏于宻院直抵晚衆人散盡方乗轎令私僕擡歸府舍乞罷相數日吴敏上書薦其功遂復為相种師道奏請俟大金退必三渉河伏兵一擊使無遺類姚古亦請半渡而擊之邦彦力沮其謀罷將帥以堅和議故大金得肆其志矣次月陳公輔言其姦邪遂罷為觀文殿學士提舉杭州洞霄宫臣僚再言其誤國之罪安置四年范宗尹為相薦復舊官薨十八日癸丑蔡懋落職宫祠分司居住臣僚上言謹按蔡懋天資險薄臨事傾側諂附蔡攸結為死黨攸在樞府邀求宰相知懋京可以頻對使懋日論王黼罪惡黼雖罷相道君皇帝察攸素無學術不命以相攸尚引懋同為樞宻以報助己之功當敵擾攘京城圍門時懋在本兵之地卒無一言以助計畫陛下當自知也今陛下以邊事未寧雖在盛暑日再御殿訪納孜孜不遑寢食而懋為大名帥不恤民情不憂邊事日用妓樂飲醼廣造舞衣戯衫酣醉獶雜殊無體國之意軍民皆不堪命欲殺之言喧於道路大臣如是可謂辱國又按懋昔以父確事跡妄加増餙誣詆宣仁聖烈皇后垂簾時事欺㒺道君皇帝乞御製確傳載懋誣詆之語伸其父勞中外讀之無不痛泣此懋可誅之罪也陛下政事盡法祖宗之舊而宣仁皇后保佑前朝功徳甚髙為懋詆誣言不可讀忠臣義士氣拂其膺願早昭洗陛下尚未暇及臣所以甚惑也今懋猶帶學士均逸宫祠陛下何以示天下何以勸忠孝臣伏望睿慈落懋非據之職治其莫大之罪授以散官投于嶺嶠永不放還仰慰宣仁在天之靈天下幸甚候勅㫖六月十六日奉聖㫖落職宮祠又上言奉聖㫖蔡懋落職宫祠者臣竊見所降臣僚章疏若止言懋身為舊輔任當元帥方邊事未寧陛下憂勤旰食之時而乃日事飲醼至軍民怨望欲殺之言合重行竄斥又况所論誣詆宣仁聖烈皇后欺㒺道君皇帝二罪之重孰大于此按懋所著父確事節一出私意妄加増飾自古姦臣愚弄矯誣未有敢如此之甚者蓋其天性兇暴輕蔑朝廷故居之不疑中外莫不憤歎陛下臨御以來雖一夫之寃有不得伸者必為之昭雪而宣仁聖烈皇后為臣下所誣負謗抑者有年矣陛下可不為動心乎今懋乃止于落職宫祠豈足以坐詆誣欺㒺二聖之罪哉伏望睿斷明正懋罪亟行投竄候勅奉聖㫖蔡懋降充中大夫秘書少監分司南京亳州居住中興遺史曰先是蔡懋二月罷尚書左丞以資政殿大學士尹大名府得宮祠中書舍人安扶繳納詞頭論之尼堪復奪所割與夏國天德雲内等地節要曰金人初欲攻遼慮獨力不能勝之遂於海上許燕雲以結朝廷既得志復敗盟取之又欲入侵中國亦慮獨不能勝遂許割地以結夏人至是既見中國之易又復取先所割天德雲内河東八館武州惟金肅河清二軍在大河之西不能取之御寶約束河北之臣不得遣家屬尚書省劄子奉御寶批朕托於兆庶之上所賴以共守祖宗疆土者實惟郡邑之臣比聞河朔河東尚有弗思體國惟務便私㳂檄去官先遣家屬有一于此民何望焉朕念今歲之春我實無備故逃職之吏逭其大戮今邉計鼎新可以責其固守矣法不可弛恩不可再五申三令誅將必行咨爾有衆體予至意二十五日庚申賜御筵餞李綱于瓊林苑李綱以二十五日戒行前期賜燕于紫宸殿又賜筵于瓊林苑所以賜勞甚渥二十六日辛酉宣撫使李綱犒軍斬樂州都統制熙河路軍馬焦安節初焦安節𨽻姚古帳下威勝軍虚傳賊馬且至安節皷扇衆情勸姚古退師至隆德又勸遁去于是兩郡之人皆驚擾潰散而初無賊馬至是從姚古還闕綱召斬之三朝北盟㑹編卷四十八
