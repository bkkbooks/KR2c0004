body:
  text: 三朝北盟㑹編卷一百八十四宋徐夢莘撰炎興下帙起紹興八年六月十七日辛未盡十月十七日辛未殿中侍御史張戒奏論和議不可成金國遣烏凌阿思謀石少卿來議和且有還中原故地還梓宫及歸淵聖之説殿中侍御史張戒以謂故地梓宫及淵聖必無可歸之理或恐太后可以還耳乃具奏曰臣昨五月四日䝉賜對嘗力陳和議恐難成之狀似䝉聖恩慨然開納且曰卿言善和議成否當置而勿論但嚴設備目今王倫既回金使隨至兩國之交議謀曲折小臣不敢與然其畧可耳剽而聞臆度而知也臣備員御史國有大利害義當盡言况已䝉開納敢不畢其説臣竊惟今日之議理有可必者盡大河為界復中原還梓宫歸淵聖此必不可得者也各務休兵音問往復或歸吾太后此或可得者也兩國之議和猶兩家之議㛰姻也家聲不敵雖有良媒必不能諧婚姻之好國勢不敵雖有金使決不能解侵伐之難敵强我弱國勢殊絶事之可否豈在一使人之口易者可得而難者必不可得理則然耳其或反是狂癡矣敵國以我為狂且癡則焉得不侵擾乎臣恐其以此卜我也我若懼以増徳則彼必以為智而不敢伐昔智伯欲襲衛遺之乗馬先以之璧衛君大悦諸大夫皆喜而南文子獨有憂色衛君問之南文子曰無力之禮無功之賞禍之先也我未有往而彼有以來是以憂也于是衛君修梁津捍邉城智伯不敢伐我今未有以勝敵而敵初非憚我敵一廢劉豫而自有中原乃遣王倫回揚言講和且有復中原還梓宫歸淵聖之意此政所謂無力之禮無功之賞禍之先也南文子所憂以為喜可謂智乎石勒欲擒王浚而奉牌牒劉琨郭威欲簒漢室而逃主湘陰恐敵或乗之也臣揣敵情若非襲我則必恐我或乗其後耳是皆欵我之意而奈何信之中原之復不復梓宫之還不還淵聖之歸不歸一言可決往事已可知敵國再使人誕慢于我臣恐不足以講和而適足以致敵復中原還梓宫歸淵聖臣子之心孰不願然以兵取之則可以貨取之則不可非唯不可亦必不得即或得之不過如童貫賣燕雲之地金人暫去復來財地卒兩失之耳自古豈有兵不能勝而財可以却敵復國者或兵强而後戰可勝戰勝而後中原可復梓宫可還淵聖可歸茍力或未能則勤修厥政嚴設邊備可也不知務此而聴其枝詞㳺説僥倖萬一乎中原無故自復梓宫無故自還淵聖無故自歸不勞力而坐享成功臣竊以為過矣事之必不可者臣既力言之其或可者臣亦妄為陛下謀之輒罄愚直畫如後乃畫十二條盡切事機貼黄云臣謂淵聖不可歸而太后或可歸自古伐人之國得其家而歸之者易得其君而歸之者難君之去來繫于勝負而家則無與於事理勢固然金人貪婪唯利是視太后有可歸之理昔太祖常痛恨聞中原陸沉之禍自登極專務節儉乗輿服用一節簡素别貯供御羨餘之物謂左右曰俟及三百萬緡當移書契丹贖晉陷敵百姓况陛下為太皇后雖縮衣節食可也然亦須國勢稍振兵力稍强乃可望耳齊弱周强而宇文䕶之母遂歸况陛下尚有大半天下欲報之徳昊天㒺極可不勉哉御史中丞范同户部侍郎向子諲中書舍人潘良貴並罷遺史曰先是秦檜向子諲范同請與金人講和魏矼常同慮其詐和請善備之潘良貴主戰上命侍從官共議子諲執講和良貴大叱之及同奏事子諲與良貴交争于殿上上知同為子諲嬖客必附子諲也因固問同乃以請和為非而以良貴為是大忤上㫖由是同及子諲良貴皆罷以為同知湖州同字子正陳州人父安民為侍御史事哲宗常言蔡京之罪被貶書名元祐奸黨世多其忠同以政和八年登進士第累官知栁州紹興三年宰相吕頥浩薦其正直擢侍御史為御史中丞劉錡移軍鎮江府劉錡自廬州召還以主管馬軍司公事移軍屯于鎮江府王庶請之也三十日甲申張戒奏議務先戰守朝廷議遣王倫奉使迎請梓宫殿中侍御史張戒以謂議和務先戰守乃奏論和狀其大畧云臣為朝廷計外則姑示講和之名内則不忘決戰之志名則不忘決戰之志而實則嚴兵據守此誠至論而臣之所以前後進言於陛下者也自古能守而能和者有矣未有不能戰不能守而能和也又曰使真宗無達蘭之捷仁宗非慶厯之盛雖有百曹利用百富弼豈能和哉又曰茍不能戰又不能守區區信誓豈足恃也上甚納之七月王倫加端明殿學士使于金國以請梓宫金人遣烏凌阿思謀來故復遣王倫也八月八日辛酉詔申飭邊備詔曰日者復遣使人報聘上國申問諱日祈還梓宫倘應疆場之人未諭朝廷之意遂弛邊備以疑衆心忽于逺圖安于無事所以遏奔衝為守備者或至濶畧練甲兵訓士卒者因廢勤求保禦乏善後之謀臨敵無決勝之策方秋多警實軫于衷爾其嚴飭屬兵明告部曲必謹必戒無忘捍禦之方愈逺愈堅更念長乆之計以求無窮之固以成不拔之基凡爾有官咸體朕意巨師古軍和州馬闕為沿海制置使軍于鎮江府九月韓世忠張俊岳飛來朝參知政事劉大忠罷為資政大夫知處州先是金人遣使來講和好也劉大中附合趙鼎之議以為不可秦檜怒令蕭振言其罪罷其參知政事以資政知處州十月劉錡來朝趙鼎罷為檢校少傅奉國軍節度知紹興府兼浙江安撫使金人有許和之議上與宰相議之趙鼎堅執不可講和之説秦檜意欲講和一日朝殿宰執奏事退檜獨留身奏講和説且曰臣以為講和便上曰然檜曰講和之議臣僚之説皆不同各持兩端畏首畏尾此不足以㫁大亊若陛下決欲講和乞陛下英㫁獨與臣議其事不許羣臣干與則其事乃可成不然無益也上曰朕獨與卿檜曰臣亦恐未便欲望陛下更精加思慮三日然後别具奏稟上曰然又三日檜復留身奏事如初知上意欲和甚堅猶以為未也乃曰臣恐别有未便欲望陛下更思慮三日容臣别奏上曰然又三日檜復留身奏事如初知堅確不移方出文字乞決和議不許羣臣干與上欣納鼎之議不協遂罷宰相出知紹興府首途之日檜乞奏備禮餞鼎之行乃就津亭排别筵率執政俟于津亭鼎相揖罷即登舟檜曰已得㫖餞送相公何不少留鼎曰議論已不協何留之有遂登舟叱篙師離岸檜亦叱從人収筵㑹而歸且顧鼎言曰檜是好意舟已開矣自是檜有憾鼎之意三朝北盟㑹編卷一百八十四
