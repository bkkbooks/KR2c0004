body:
  text: 三朝北盟㑹編卷九十二宋徐夢莘撰靖康中帙起靖康二年四月九日戊辰盡十日己巳遣謝克家來歸大宋受命之寳於帥府太后遣姪權衡尉少卿孟忠厚賫書勸進於大元帥書曰吾自處道宫埀三十載廼者都城失守二帝北遷撫事悲摧實無主意忽承中㫖俾正號名追惟閒廢之餘當此危亡之際冐居寵數誠亦何心􅄋懇再三莫之聽許乃以此月五日入延福宫而百辟建言請權聽政顧早衰多病且乆去宫闈豈復能堪朝廷大事言念趙氏舉宗之盡去人心思宋之日深不屬老身難當此責是用夙宵黾勉期濟艱難然神器乆虚必湏真主今中外近屬唯王一人矧忠勇英明四方屬望入繼大統非王而誰已遣馮澥李囬告王傳序之意王其速馳輿衛入處宸居上以安九廟之靈下以弭四方之變吾所嬰之重負既付託得人當便辭機務之煩以就安閒之適今遣姪權衛尉少卿孟忠厚親承動靜并道吾意夏初微暑更慎保調四月空日母致書元帥大王邦昌遣謝克家來歸玉璽一紐其篆文曰大宋受命之寳大元帥府僚屬引克家捧寳前跪以進王王謙拒乆之慟哭不受已而跪受命汪伯彦司之伯彦跪捧用藏巾箧守之惟謹耿延禧中興記曰邦昌遣謝克家及孟太后遣姪忠厚同賫大宋之寳及太母手書勸進帥府官僚耿南仲以下引謝克家等見南仲奉大宋之寳授上上慟哭羣臣皆慟上跪受寳讀書訖謁者引見謝克家孟忠厚如賔客之儀上謂延禧等曰張子能誠知禮使其不知分而妄作吾必以兵取之所傷豈勝計哉得免吾舉兵亦可取矣初聞謝克家賫寳至或者謂邦昌自受楚則賫大宋寳來彼無用者耳既聞邦昌奉太母等恭狀上始不信上再命延禧作書諸道帥令逐頭項人馬只於京城下寨聽候指揮不得發一人一騎入城謝克家辨事偽楚進狀云右臣凖尚書省劄子朝請郎提舉杭州洞霄宫謝克家進狀七月十六日奉聖㫖令臣聞具當時因依奏聞者臣契勘先於靖康二年三月一日張邦昌入尚書省臣舊不識邦昌當日方見臣便以言動之因説相公輔兩朝出使逾年終免禍難若非忠義何以及此邦昌云自來恨未拜識臣言相公曽察今日人情所向乎今日人情畏金人兵威耳金人去後能保人心如今日乎邦昌曰誠如是也臣曰當今康王在外元祐皇后在内天意亦可見邦昌曰是邦昌之心也後見邦昌臣説相公今日權宜濟難湏是便做個痕跡令人曉了邦昌問臣當如何臣説將來不湏入到禁中湏於内東門􅂻閣子中安下不湏見宫人軰又勸邦昌遇有人使方着送來衣服平日只着常服其餘並是隨衆同見至初七日王時雍申明乞差官分管職事臣其時不肯承當門下省人吏來參臣亦設椅請坐以示堅不承當之意邦昌自謂臣曰忘省中之語若虚着窠闕被軍前差將來人如何臣當時已傾心陛下再三思得利害實是如此若軍前差人則城中束手做事不得矣所以含羞忍恥者以圖大計也自後臣又累勸邦昌不可稱聖㫖不可用衛士排立不可坐紫宸埀拱等殿不可改年號不可肆赦後又見欲與朝士差遣臣思得邦昌不能盡用臣言若更别用不是當人恐妨大計故臣累説今日豈是差除之時如是闕官不得已不如且用舊人臣又勸邦昌差人迎立陛下臣説康王當今合立者也當遣使道迎立之意如此便是功臣不然即叛臣矣為功臣為叛臣只在此舉豈可少緩邦昌曰非是少緩只是兵戈如此何縁遣使去得臣説湏是預先差人使軍民曉了其差人月日將來亦可騐實所以節次差謝克家等是也臣此等事未嘗與人詳説慮有自矜之嫌今既奉聖㫖令臣開具因依即不敢隠漏謹録奏聞伏候勅㫖秦湛囬天録曰邦昌三月入都省是日吕好問晩見邦昌邀衩衣相見先是初聞皇城司定議吕公憂懼甚或曰吕勤與邦昌頗熟吕公問勤曰邦昌何如人勤曰舊日見渠小膽怕事特甚故吕公求見間便以言動之曰相公輔相兩朝人望為􅁢出使逾年卒免灾禍若非忠義所感何以至此邦昌曰乆聞盛名常恨未得拜見吕公又問金人所為邦昌曰却時得與肅王相見昨肅王不快邦昌逐日覷當親自與他合藥幸得肅王安樂昨囬來過邢州城下鐵騎不滿千人忽向城作一字陣城中更無人敢出中國人柔弱如此既到國相軍中差十數甲士監守夜間雖翻身亦上床覷當吕公曰此金人之情也相公知今日人情所向乎今日人情畏金人兵威耳今金人既去復保人情如今日乎張變色曰然吕公曰金人言語不通皆是契丹深怨朝廷又春間𤼵遣燕人非理今燕人遂為血讐反臣金國相與謀盡要去趙氏豈留餘力然康王在外他不知所在元祐皇后在内他亦不知天意亦可見豈人力能違天也相公若權宜應副尼堪之意變作還政復宗社之謀則天人皆應變禍為福邦昌曰此邦昌之心也望相公宻其謀恐有愛利或亂視聽也吕公入省中再見邦昌曰相公今日權宜濟難湏從初便做個㾗跡使人曉了邦昌曰當如何吕公曰軍中送來者衣服若遇金使方可着他時只與大夫常服相見可也今又不可用衛士排立不可山呼又有一事相公不若只在㑹通門外閣子中安下不要入禁中先朝宫人不可相見如闕人使喚親戚處借一兩婦女使喚可也邦昌曰外人豈敢帶他入去吕公曰勸相公不要入到裏面恐衛士聞之憤怨也以吕公權門下省吕公堅辭不肯當邦昌曰忘省中之語耶若虚着窠闕被軍中差人奈何吕公曰乞差官以次權攝邦昌曰若二帥問因何不依朝制則大家都不穏便吕公思得若軍中差人來則内奏事束手不得矣吳幵莫儔自敵營囬金相劉彦宗侍中言一千年後亦不得説着趙字明日敵中貴人十數軰至南薫門曰康王我眼上物當以五萬騎取之今安在吕公對曰康王不知所在大王貴人在國門之外尚且不知圍城之中如何得知左右勸公語言太峻或有不測吕公曰盡心國家應有鬼神䕶用此繫腰帶子便自經也天地當覽此心必不降禍吕公曰事急矣募人持書上大元帥謂大王所領兵若可當敵則俟敵歸可以邀擊以迎二聖若彼衆我寡即宜逺避若二聖不可囬某於城中議定願大王自立為宗廟社稷之計以雪二聖之耻大王若不自立恐有不應立而立者臣世受國恩身忘宗族皆不敢怨所以敢為此言願大王痛察金人立邦昌或勸坐紫宸殿埀拱殿吕公謂邦昌曰豈真個做乎邦昌矍然吕公語邦昌曰相公宜早遣使推戴康王於城内便是功臣若先為城外推戴䇿立城内便是叛臣為功臣為叛臣只在此舉豈可少緩耶邦昌曰非是少緩兵戈如此豈容遣使耶吕公曰但預先差人使軍民知之將來縱來别人䇿立亦可騐差人月日則心跡自明不然豈但相公不能自保某軰家屬豈可保耶於是差謝克家賫傳國寳往大元帥府大元帥府僚屬定即位南京之議日厯曰戊辰幕府臣羣僚耿南仲等㑹於麟嘉堂集議王即位事諸將及官吏或曰濟州或曰南京而四鄰郡邑初夜望濟州紅光屬天如赤鳥翔翥皆謂是火光達旦村人如城乃知非火識者謂火光乃宋火德之符亦如周武王火鳥之瑞也濟州父老軍人無慮萬計以祥光所𤼵乃詣麾下乞王即寳位於濟州幕府羣僚曰南京寳位藝祖興王應天順人之地王宜即帝位於南京紹隆先烈於時宗室仲琮等議昔晉安帝䝉塵西上大將軍武陵王遵承制行事不改元幕府羣僚同難曰昔唐明皇帝遭安禄山之難車駕入蜀詔皇太子為天下兵馬大元帥拜裴冕御史中丞副之冕與杜鴻漸崔漪等請皇太子即帝位其辭大畧以主上狩蜀宗社神器要有所歸宜正位號有如逡廵失億兆心則大事去矣皇太子始即帝位於靈武卒能克復兩京迎太上皇帝於蜀况今日之禍二聖北遷邦昌僣偽天下惶惶有甚於天寳時大王以太上皇之子皇帝之弟入繼大統其誰不以為宜矧皇帝命大王以兵馬大元帥􅌖意可見矣今天下兵馬㑹合不於此時蚤正位號將恐姦雄乘隙揺煽紛紛宜用唐肅宗故事推戴大王即尊位以定天下實宗廟社稷之福羣黎百姓之幸何且稱制徒取法晉武陵王實無能利國家而安祖宗在天之靈慰二聖之南望也延禧徐謂仲琮曰公是宗室豈不避嫌㑹有竄逸自敵寨歸者傳太上皇聖語康王可便即皇帝位又衣裏蠟封方二寸許親筆二字即真益昭天命之符二聖相授之至意仲琮等議遂屈於是勸即帝位南京之議定矣尅擇官王符選擇得四月二十一日庚辰具以呈禀王慨嘆可之中興記曰是時議上即位於濟州或南都未定濟州父老軍民數萬人詣轅門乞即位於濟州羣臣議即位於南都便乃集議於麟嘉堂宗室仲琮等數人議不當即位當著淡黄衣稱制不改元下書誥四方南仲延禧世則曰二聖北狩天下不可一日無君道君之子皇帝之弟唯上一人已建大元帥統天下兵不於此時正位號以定天下天下無所統一將生亂稱制不改元那可乆必即大位而後天下定况有自敵寨歸者道上皇語云可告康王即大位為宗廟社稷計若即位乃道君之心宗廟社稷之福也何淡衣稱制以取天下之疑生天下之謀乎仲琮議屈遂定即帝位於南都十日己巳邦昌避位周懿文奏徐秉哲已依舊開封尹竊慮亦合却還大理卿職事可依舊權開封尹見權執政並免簽書舊職孫僅許緩並致仕將作少監蘓餘慶兵部侍郎唐恕太常丞唐元衡乞致仕不􅁢盧襄權兵侍六人乞還舊任盧襄去冬以侍郎乞宫祠沈晦時為給事中吳幵莫儔至此尤為恐懼葢當時為金人驅使出入傳道指揮如僕𨽻日遭詬罵至於持廢立文字推册邦昌皆由此二人今知去住不得乃辭免趙子崧繳張邦昌與翁彦國書狀據經制使翁徽猷申今月初十日午時朝散郎尚書户部員外郎李健奉議郎陳戩至彦國軍前賫到張邦昌書一本實封印記除已繳連賫申大元帥大王行府外今録白到一本連粘在前申當司者右件録白到張邦昌書一本連粘在前今月初一日卯時據太康縣中開封府差人送到四月二日黄紙手本一道全是登極赦意某即時行下太康縣不得行出及遍下諸路不得施行唯聽大元帥行府之命至當日未時據太康縣中準知太康縣事大夫引為據奏院申準開封府指揮拘収初七日弓手丁進葛政賫去尚書孔陪攽降到黄紙上印手本立便火急令差去人申繳前來以􅑀繳納不得悞事縣司除已収元降手本繳去急申乞照㑹某竊惟兵事貴速㡬不可失事乆生變雖悔何及子崧與翁彦國已差翁挺吕弸中狀詣府伏望大元帥大王俯狥勸請速正位以繫天下之望以折逆臣之心子崧等除一面進師城外以聽王㫖外伏候王㫖三朝北盟㑹編卷九十二
