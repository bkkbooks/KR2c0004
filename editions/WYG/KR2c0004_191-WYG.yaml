body:
  text: 三朝北盟㑹編卷一百九十一宋徐夢莘撰炎興下帙起紹興九年正月五日丙戌盡十四日乙未九年正月壬午朔五日丙戌賜新復河南州軍赦門下朕以眇躬嗣承丕緒明不能燭徳不能綏為人子孫不能保其所付為人父母不能全其所安雖窮宵旰之勤未息邊隅之警當國難軍興之既久而師老財匱之是憂被甲荷戈者苦暴露之勞行齎居送者困征誅之擾衣冠流寓而失所黎元憔悴而靡堪失由一人禍貽爾衆罪在朕躬胡顔以寧側身思咎至於宗祧緬隔陵寢久荒梓宫未卜於因山天属尚留於逺域茶苦斯極振古未聞賴將相之元臣盡忠協徳資爪牙之衆士戮力同心繕甲治兵内以訓練於行伍固軍峻壘外以保守於封陲上穹開悔過之期大金報許和之約割河南之境土歸我圖輿戢宇内之干戈用全民命自兹愛養士卒免罹轉戰之傷蠲减賦征漸息編民之力俾南北悉臻於綏靖而國家遂致於安寧嘉與羣生格於康又肆頒曠蕩之恩用慰邇遐之俗於戲睦鄰修好既通兩國之歡和衆安民以圖萬世之利尚賴文武之士同寅協恭疆場之臣慎終如始共扶興運永底丕平咨爾多士體予至意金國許退還河南地講和故有此赦韓肖胄同簽書樞密院事為大金國信報謝使錢愐副之金國遣通古蕭哲來議和許還三京地故遣韓肖胄錢愐為報謝使副與之偕行韓世忠聞和議已成不喜伏兵洪澤詐令為紅巾欲候通古等回至楚州使刼而殺之壞其和議南北使已行過揚州世忠軍有將官郝卞者詣轉運使胡昉密告其事昉大驚白於肖胄遂具奏乞改途自真和廬州取道淮西而去昉字闕顯建炎三年知淮隂軍世忠駐軍江隂昉厚奉之後辟昉淮東宣撫處置制司㕘議紹興五年除知楚州兼主管沿淮安撫司公事八年除直秘閣淮東轉運使皆世忠成就之力使人改途事世忠深怒昉背已世忠知郝卞漏其謀追卞欲殺之卞棄家奔鄂州投故人李啟啟納而藏之啟者岳飛軍中回易官有心計能幹旋財賦惟着布衣草履雨中自執葢步砌佐飛軍用甚多有歸正人周金者與通古舊知奏取㫖送通古至對境通古至安豐軍金贈詩為别曰良人輕一别奄忽幾經秋明月望不見白雲徒自愁征鴻悲北渡江水奈東流㑹話知何日如今已白頭通古性聰慧秦檜嘗以胡銓上書示之通古一覽能記誦初兵部侍郎兼權吏部尚書張燾力詆拜詔之議秦檜忌之燾亦自知言切恐且得罪遂託疾在告檜使諭之曰北扉闕人上欲以公為直院然亦假塗爾公疾平宜早出燾大駭曰果有是言愈不敢出矣燾乃不主和議者萬一使草國書豈能曲狥意指哉燾嘗思之不過一去今日之事其去在我一愛遷官他日以罪去則事由他人矣坐此不遷遂不豫國書事王倫為同簽書樞密院事迎䕶梓宫奉迎兩宫交割地界使藍公佐副之王倫自龍圖閣學士除同簽書樞密副使金國制曰朕總攬羣工圖回萬務眷言宥密實秉樞機體隆參佐之聯位在疑承之次亶惟用德亦以勸功具官王倫宇量坦夷機神敏悟出先正名賢之後有流風遺範之存事不辭難行不擇利奉萬里之使無以家為道二國之言各如意出卓爾傾河之辯毅然叱馭之忠酈生慿軾以下齊城毛遂定盟而重趙國揆其成效有溢前聞朕念陵寢久荒梓宫未返東朝契濶星紀既周北道謳吟民心未改幸信書之來諗知永好之不渝爾其肅迓還轅就承故壤爰陟本兵之重仍兼賜第之榮惟既榮厥身必毋乏吾事噫復文武之境朕將無愧於古人合晉楚之成爾乃增光於史冊十日辛卯尹焞除徽猷閣待制提舉萬壽觀兼侍講尹焞先除禮部侍郎十具辭免不受至是除徽猷閣待制提舉萬壽觀兼侍講蘇符行詞有曰庶幾朕得優禮之宜而卿遂委蛇之適焞五具辭免遂得提舉江州太平興國宫任便居住初焞辭免劄子有云比嘗不量分守輒及國事識見迂陋已騐於今跡其愚庸豈堪時用秦檜見之不堪時用二字深衘之乃見上具言尹焞劄子有云比嘗不量分守輒及國事尹焞有所議論不可不為施行欲乞將尹焞所上數事盡付中書當為詳酌行之上遂以焞奏疏盡付朝廷而檜切齒矣十三日甲午金人知宿州趙榮來歸十四日乙未右迪功郎監明州比較務楊煒上李光書紹興九年正月十四日具位謹再拜獻書參政丈閣下某自束髮成人接士大夫知己能稱閣下為令於平江能抗朱勔而失官繼登御史則又觸權臣而得罪某雖碌碌庸衆浮沉里巷然亦知欽慕閣下信剛决君子人也晚得與諸郎逰卒又登門獲侍巾履誤辱存囑甚厚退雖感激及進觀閣下之所履不無稍異於昔時某前日欽慕之誠亦稍解體而不能無疑也非誣閣下也葢閣下自起廢進用再登八座七為郡守仕宦至此亦非不可有為之地及披其實迹以較閣下之晩節似覺以前挺特不羣之風少衰徒有傲岸虚驕之氣雄壓聾俗而已非獨某不能不疑舉天下有識者莫不皆疑之然尚以謂閣下為侍從不得専造居朝廷不甚久上下方安於積薪未燃雖閣下獨欲有所建明世必以謂不祥人亦未必見信當且冺黙尸位必有待而發爾屬者敵國遽求講和遣詔諭使至以甘言誘我以無禮臣我以盟誓制我以重幣窮我舉國諠譁議論不一上貽當宁之憂下疑四海之聽人情洶洶彌時不定遽聞閣下召來造朝天下之人與夫賢士大夫欣欣然皆頌閣下曰泰發至則事當有所折衷矣尚妄意閣下靖康之朝挺挺之節固在履此危機正昔所謂有待而發者庶幾能為聖主開陳存亡利害之勢維持善後之策盡識敵詐洞悟天聽斷此國論不數日閣下既至遽復合為一黨寂然無聲有識者謂閣下非不知利害之曉然所以然者賣諂取執政爾已而果然於戯利禄之移人一至是邪管子曰禮義亷恥國之四維葢禮義立人之大法亷恥立人之大節不亷則無所不取不恥則無所不為夫若是猶不足以成人為國家大臣而無所不取無所不為則朝廷安危之計從可知矣閣下平昔自謂髙明卓立何為至此遂不知人間有亷恥事乎某竊意閣下殆將文其過也奈何聖主重以懷念母兄之切至亟於梓宫之速還帝意堅决不容悟移以此欺天下爾斯民未可欺也今朝廷豈少閣下哉閣下若以死事之不得其職而去是亦以道事君之一効也某聞忠孝從義而不從父閣下豈不知帝王之與臣民不同匹夫立於鄉黨士大夫立於朝紳則固當謹信行修末節飾禮文以求區區之譽為揚名立身之基帝王之孝唯安宗廟固社稷使其或不然乃下同於匹夫拘拘於禮之末節亊幾一去九廟四海且不可保况其他乎不爾漢髙祖終不屈楚忍發分羮之語遂當為萬世大不孝之罪人矣况金人之詐屢講無驗之和信效明著如日月經天河海帯地不可掩也覆車不逺參政丈豈不洞知之且自宣和以來先帝始與金人為海上之盟彼固首倡夾攻之約遼國既滅固常割燕薊九州以啗我矣沙塞萬里空空數十城曽不得一縷之賦卒竭中原膏血以安之曽未三載中國之儲盡在九州敵人知我之弊於燕薊有積年矣卒假虎翼一奮并京國而取之閣下豈不見前日之割我燕薊初不得旋踵而託迹也今以釣者必以餌釣不以餌不得魚也始敵欲釣中原前以燕薊為大餌我既不悟其機而貪其餌既一釣而舉之矣自靖康國破主上南狩無厭之敵既襲廣陵又侵呉中其意固宜重有所在也雖蹂踐殘戮流血川野酷莫此甚所幸神靈庇䕶社稷有主其利害固萬萬於靖康之後不然金之欲和也已講於前日我必推誠待之不復迓避尚何約至今日哉自是雖嵗嵗連兵淮南而天其或者將俾我以中興諸將激揚無曩日奔潰之風而北騎屢北國勢稍亦似張自此固當甞胆思恥何事不可為哉比年已來金人知我不可以兵取也又恐我國勢或至於遂强也及發於數嵗則恐不支故汲汲萬里遣使見招於太上之喪以探朝廷意謂我若遣使而有請則唱為之和空我國家困我之師欲異日一舉以取之爾今來果入其計安得金人不欣欣然一嵗再使許還地而來和也閣下豈不怪此敵計邪今將舉前策復割中原為一大餌以釣江南且向竭中原舉天下實一燕薊猶不三年而遂弊况今欲竭江南偏佐一方求實中原某習見不數月彼遂安坐受吾燼矣閣下亦又不悟金人自長驅中國所過誅掠刼擄無不空空郡邑也况今以久陷中原一旦棄之而去固當掃地盡矣不過留數空城老弱病疾溝壑之餘貽我以大累想見繫累之後父哭其子妻哭其夫寃號之聲痛徹天地豈易舉目屬耳也哉今諸公乃所謂不求而自得欲欺主上以太平者盡為天下無人乎唯其不求而自得此所以為敵之計也伏讀赦文所復州縣减免三年蠲放差徭五年兵官各令按月支給衣粮請給或加犒設或令存恤不知空空之地孱老孤寡既不可賦税按月所支一切調度何從出乎諸公殆將舉所謂燕山免夫錢復行之乎不特此爾將見數月之後衆使還來紛紛歸報且曰當供陵寢當修宗廟當葺官府當治城郭當築庫藏當實老幼當賑窮乏百役紛然蝟毛而起不知東南數十州所有幾何頻年以來換度牒鬻官爵出賣户帖豫借和買頭會箕歛衰世掊尅之法畧己盡行剥膚搥髓無所不至膏血無餘不知何從出乎加之金使自此勢須結轍而來數以重幣困我供奉禮物動計百萬再三往復傾囷竭囊不能支矣閣下曷不令板曹詢藏庫之有無可指掌見矣今日已有三空之説矣異時乃以有限之財充無厭之欲是以江海實漏巵爾日者乃始掲榜都城有曰金人並無須求甚所不識也諸公䝉蔽天聽是何異掩耳竊鈴也哉儻或梓宫可還真偽未辨如為所欺彼且恃為大恩百索交至决不可繼又且四方之費恐未能給閣下若不早悟斷以獨見開悟聖聽旬嵗之間拱手無策行見江南無立錐矣尚何有於中原哉參政又豈不知中原乃吾之版土我之國威稍振自可一舉而復又何不少有忍於須臾徒託重幣急求市之以取後禍彼或稍易慮轉足而復至則其日猶前日也國力屈矣閣下以不早慮之也不然可使淵聖鑾輅來還而果遂南歸由辱留之久險阻備甞盡識敵詐力發奸謀洞如觀火正曉主上則閣下諸公誤國之罪將無所逃一旦敗露頭頸墮地願為孤豚豈可得矣為閣下計宜脱畧明此翻然改悟早建善後之策厯告吾君尚可及也又况自古連和結好講隣國之歡以求偃兵息民者固多有之試數其一二論敵國之勢惟我大而彼小則可和我强而彼弱則可和我盛而彼衰則可和不然我大而彼亦大我强而彼亦强我盛而彼亦盛皆可和也何則葢我大我强我盛而彼以小以衰以弱求請和於我則全在我我安得而不受既受之矣彼或敗盟或有可取之形或有可乘之機顧不妨我徐舉而復滅之葢我全制之其擒縱在我也如此豈不悦其和哉設或不獲和於我尚當求之何敢拒也至於大小强弱皆如是而和則其勢各不相併吞也故一講和則可以彼此皆奠枕而長存如不得已交隙而用兵又勝負未可知也如此而和則和在彼此皆可和之勢也若乃我小而彼大我弱而彼强我衰而彼盛乃欲請和以幸旦暮之存彼固不可知也葢和全在彼擒縱在彼彼何憚而拒我哉如是利害曉然尚或講和於彼則是速㓕而已矣西漢之與匈奴本朝之與遼國和也皆以安强盛大適相若也相與之和葢和在彼此然匈奴猶為漢患遼人數驚邊鄙其强悍反覆不可以信義結也雖然曽不至以為大患者以其皆可以相制服也及觀六國之與秦和也秦未甞不欲和也秦欲用兵而自若也卒之一朝乘機遂一舉而㓕六國此以小和大之明驗也石晉之與契丹和也契丹未甞不與之和既和矣契丹倨慢自若也終之一旦反顔易心邪律徳光一舉而滅晉此以强和弱之明驗也不必更求逺證我太祖太宗之肇造也其割據諸國亦甞告和於本朝矣未甞不納之和也及其機可乘則命將出師破而㓕之如取諸掌耳曽何有於和哉此亦衰世之明驗也可不鑒哉可不戒哉則今日之和諸公不過謂梓宫可還中原可復不暇他慮耳曽不思不測之禍今甚大矣甚强矣甚盛矣積嵗累時一旦當連兵未解忽若風雨退散鬼神潜藏欲還地而修和於我我固當思曰彼何為而畏我憐我愛我而遽和我顧此敵計之見啗亦曉然矣不知閣下明智獨步當世何為獨不悟此奈何今之市井愚夫愚婦皆能知金人之詐者閣下果不知之是不智也倘閣下知不可和徒媚宰相取尊官遂噤黙而不以告吾君是不忠也為大臣而不智不忠果可以安國家利社稷乎况今聖主以孤孑之一身獨立於上基本單寡隤費而易拔其危又萬萬於靖康又豈堪復當不測之敵乎何閣下為御史則能言人之是非今為執政遂不知其非邪安有身為大臣坐視君上貶屈尊稱臣於仇敵恬不為恤諸公世自儒業號為知書此豈平昔所學於聖賢致君之事業哉今天子以祖宗之天下承祖宗之大統因臣民之愛戴建大號即帝位於今十有三年矣天地社稷宗廟神靈實臨之今無故遽為金人播弄而一旦貶屈如是邪閣下勿謂目前滅裂支梧可以欺天下數月金使復至前事固在今不改為自兹將見朝廷奉詔不暇矣此事於古無有唯唐祖之初未得天下始甞臣事契丹以及石晉假契丹以建國遂有此厚禮然其終亦遂為所滅其後則國家肇造之初南唐李煜甞自貶尊稱降損省府取媚本朝以乞須臾之命然卒無效此葢强弱盛衰之理使然固不可以取媚存也今國家兵籍非不甚衆諸將非不有人但當謹謀謨於幃幄收歲幣以賞戰士期之嵗月何患中原之不復梓宫之不還太后淵聖之不歸諸公能蚤暮以思致君於堯舜乃日求臣事於仇敵欲誅民之膏血以充歲幣而不知愧豈不哀哉若此數事以平日觀之宜非望於閣下所肯為也設若主上睿謀獨斷未悟敵機閣下宜思天下所以責望於已固當身先百辟抗議廷諍雖鼎鑊在前當無固避此誠越國之男子也揚名異域功顯聖朝非閣下而誰况天子仁聖容受直諫體貎大臣閣下雖犯顔攖鱗甚不過奪職祠宫而已此而不為是閣下惜濡足之故而不拯天下之溺不止始謾一言但已又揚譽欺天下曰前日非我力爭安得殺禮遽至於是某雖至愚猶不知信况有識之士哉若褚遂良諫髙宗立武昭儀卒至還笏殿陛乞骸骨歸田里將甘心貶死若此斯可謂大臣矣又趙中令相太祖皇帝甞為一事擇官中令列二臣姓名進太祖不肯用他日又問復進而不用如是三問而中令卒不易前人太祖盛怒裂其奏擲置殿陛下中令不動搢笏帯間徐拾碎紙袖歸中書他日又問復以碎紙補綴以進太祖大悟終用二臣某竊謂官二臣此朝廷至細事也而趙中令猶確然終不奪於太祖之盛怒而卒用之大臣事君不當如是邪况今是事實繫宗社存亡閣下忍輕於詭隨乎事已亟矣今諸公偃蹇自為得計昻然百僚之表施面目於通衢出入稱參政以耀聳俗此何邪向使他人居閣下之位為閣下之為閣下適在逺外五松閑澹而視之豈不笑絶冠纓也哉閣下平日之志自許如何今一旦昏於利禄門生故吏往往又從而諂諛閣下為伊尹周公之才某竊恐閣下必不自知其非猶以謂日前之虚譽可以襲而取也不知今天下之人已極口訕笑閣下平生之偽矣某獨不忍退而非詆閣下輒以所聞告之左右倘閣下不此之恤將使後世書之史册曰此賣諂宰相取執政者閣下能免之乎疾風知勁草板蕩見誠臣閣下自為謀可也春秋之法責賢者備某區區之心猶覬閣下尚能改悟力解社稷之禍挈而置之安存不然不得其職自可引身而去矣豈可與賣國之奸諛甘心低頭共槽櫪而食邪以閣下曩時挺挺之節必非䕶前而不悟者某所以未敢遽繩閣下以賢者之責也丞相秦公方且含垢忍恥避天下之譏罵力専誤國之謀傾心外敵猶盧杞一百口保朱泚李林甫以忠誠稱禄山非某踈迹之言能入也參政孫公某之舅子平生齪齪謹畏天下初不以此責之今日之可任春秋之責唯閣下耳今公論籍籍又閣下乃丞相之門生由以私恩不敢違其果然乎某聞大臣事君當知有宗社而不知有其身知有君上而不知有恩門可也參政丈如謂私恩請亟破誤國之謀盡發敵人之詐厯告諸君罷絶使命收還金幣正天子之尊號薄強隣之聘禮飭諸將之兵備揚問罪之先聲傳檄中原各保境土人自為戰以待王師一切改轍而圖之若閣下姑欲愛惜名位隨羣而入逐隊而趨亦以謂敵必可信和必可講禮幣可從自今以往不加賦而用度自足皆有以為善後之計而某乃州縣細吏敢將狂瞽之説熒誤視聽則請直以此書上之天子置以典憲某所不辭憤激之次方寸亂矣引筆行墨不覺言多惟閣下察之三朝北盟㑹編卷一百九十一
