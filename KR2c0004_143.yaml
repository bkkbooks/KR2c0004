body:
  text: 三朝北盟會編卷一百四十三宋徐夢莘撰炎興下帙起建炎四年十月一日庚午盡十二月二十二日乙未六宫至自處州劉光世退軍鎮江府上命張俊出兵援劉光世而俊他託不行十月十日己卯李成徒黨馬進犯江州李成據舒州朝廷授以舒蘄州鎮撫使成內懷奸愎而外假恭順光黃州鎮撫使吳翼謂光州不可守率軍民棄其城而去道途艱梗無所向往依成死於成軍中自此謀據江西以觀天下之變遂遣馬進冦江州知州姚舜明問計於統制劉紹先紹先請堅守紹先字嗣祖知書傳稍通兵法京城統制官閻瑾喜其為人以女妻之京城陷瑾潰敗紹先隨至江州瑾留紹先以衆數千屯江州紹先屢與楊進戰及酈瓊圍固始紹先以兵敗之堅守城壁力捍瓊保全固始後率衆歸江州舜明喜之辟為統制李回同知樞密院李回扈從六宫還除同知樞密院事李回辭免批答敕李回省所奏劄子辭免同知樞密院事恩命事俱悉朕惟國家傾危屯否未有甚於此時者也非得天下人豪策慮出乎拘攣之外者不足以輔成中興之功以卿有當世之材邃古人之學詳練周密為時著聞故聞千里之造朝寢食不忘於虛竚擢置樞機之地共圖龜鼎之安卿而不能尚誰可者勉服寵命毋庸固辭所請宜不允故兹詔示想宜知悉嶽飛斬其統制傅慶傅慶衡州窑户也有勇力善戰屢立功嶽飛寵惜之以為前軍統制慶恃其才視飛為平交嘗曰嶽丈所主張此一軍者皆我出戰有功之力每有需索於飛則曰嶽丈傅慶沒錢使可覔金若干或錢若干飛亦屢與之無忤色及飛為鎮撫使持法嚴肅尤不可犯而慶不改其常飛待之異慶頗覺之不喜㑹劉光世遣王德來髙郵以當金人在髙郵楚州者飛遣慶以前軍將士應援德與慶交馬而慶言欲伏事劉相公德許之統領張憲聞其言告於飛飛銜之戒憲勿泄至是飛令諸統制射逺箭慶三籌皆及一百七十步諸統制不過一百五十步飛三賞慶酒醉飛取宣賜戰袍金帶與王貴慶曰賞有功者飛問有功者為誰慶曰傅慶在清水亭有功當賞傅慶飛大怒叱慶下階取戰袍焚之槌毁其金帶乃曰不斬傅慶何以示衆遂命斬之張浚退軍秦州張浚以陜西失利慕洧皆叛遂退還秦州趙彬張中孚叛降於金人慕洧既叛張浚遣涇原帥劉錡留將官張中孚幕官趙彬守渭中孚彬二人皆曲端腹心意輕錡又知浚已還秦州恐一旦金人至不能守乃相與謀逐錡而據涇原觀望進不敢追洧退不敢入渭遂走順德中孚彬以錡去乃遣人詣金人乞降王善餘黨推祝友為首先是王善降於金人徒黨皆散金人屯六合也有邱䖍者在滁州境內俄復渡淮過北去祝友在滁州界皆善之餘黨友下寨於龔家城復欲往巢縣李防禦者為王縣尉所殺王縣尉者鄉兵首領也間探得李防禦寨中人皆出外虜掠糧食乘其虛而劫之遂殺李防禦衆遂推友為首復還龔家城下寨専殺人為糧食翟崇及李興敗金人於陽城縣擒其保古貝勒先是張浚經營兩河委翟興措置河外事興遣其子崇率禆將李興與金人戰擒保古貝勒得都統印記獲首級鞍馬器甲甚多興復遣崇取綘州之垣曲縣至王村與金人遇有獲捷進兵至米糧川橫山義士史準等率衆來歸自是李興屯於商州二十八日丁酉王林冦通州王林棄髙郵而來也秦檜至行在除禮部尚書秦檜既脫敵寨達漣水軍丁􅑤水寨也􅑤發遣檜還行在令進士王安道馮由義伴行由義字子儀既至行在士論疑之范宗尹李回奏其忠而薦其才張守嘗為密州州學教授檜亦嘗為之故守稱檜為可用上甚喜即除禮部尚書檜具辭免賜詔不允曰卿頃者當干戈之際有社稷之言以忠信篤敬而行蠻貊之邦以靖共正直而為神明之聽四年去國萬里還朝乃升常伯之聫用示匪躬之勸昔鍾儀之留晉國不忘南音蘇武之在胸奴常持漢節方卿所守未足為難况乎踐祚之初已有旌賢之詔奪安車之髙志加祕殿之寵名今兹之除善理前命褒崇非過何以辭為檜請以本身合得恩澤授安道由義官由是補迪功郎舟人孫靜亦授承信郎檜陷敵信息不相通時妻兄王映取王氏子冒姓秦以為檜嗣立名曰熺俾承恩授官至是王氏諸親以熺見檜檜甚喜以己子視之知陳州馮長寧叛附於劉豫僞授户部侍郎馮長寧在陳州以王命阻絶乃附於劉豫請立什一稅法豫從之僞除長寧户部侍郎十一月簽書樞密院事趙鼎罷金人攻張榮於鼉澤湖破其茭城張榮梁山濼取魚人也聚梁山濼有舟三二百人常劫掠金人杜充為留守時借補榮官至武功大夫遙郡刺史軍號為張敵萬金人進兵取維揚也榮乘間率舟船自清河而下滿舟皆載糧食駐於鼉潭湖積茭為城以泥傅之漸有衆萬餘金人屯於孫村浦夀河也屢遣人攻之阻湖淖皆不能近是時天寒水凍金人已得楚州遂併力攻其茭城榮不能當焚其積聚棄茭城率舟船遂入通泰州四日癸卯嶽飛棄泰州嶽飛為泰州鎮撫使軍於泰州㑹金人達蘭有占通州經畫再渡江之意已破張榮茭城敵騎寖入飛以泰州不可守於是率衆渡江入於江陰軍而棄泰州張浚退軍於興州張中孚趙彬既叛送欵於金人金人是時將陜西所得金帛悉已津發歸河東又知慕洧叛乃徐引兵而西於是吳玠自鳯翔走保和尚原孫恂段丕則相繼自隴關入泰亭金人至渭州得我情實乃入德順軍張浚聞敵入德順遂移司入興州簿書錙重悉燒毁初浚欲大舉唯劉子羽議論契合三尺之童皆知其非幕官兵將官心知其非而口喏唯者十八九間有反復論難者又持之不堅獨幕官楊晟力言不可不從乃求行邊不隨浚之富平及失利乃來見浚浚慙諸事悉委之楊晟乃大罵子羽意欲殺之楊晟既用事乃言金人欲必舉川蜀然後歸國不若引兵金洋一帶俟金人歸國然後收復川陜事乃永定浚雖未盡信其說然浚已置陜西於度外矣興元帥王庶前帥鄜延知敵情次第適來議事勸浚收熙河秦鳯兵扼隴關以為後圖浚不敢遂失全陜金人陷楚州放散百司金人已陷楚州遊騎至江上行在驚恐乃放散百司從便仍結絶三省樞密院文字士民多竄者祝友率衆渡江往新市薛店祝友在滁州龔家城下寨也金人已破楚州矣滁河舟船盡於下江而去友遣劉統領者於滁河尋遺棄舟船得大小僅三柁遣數千人夾岸護送出瓜步口沿江北岸牽至馬家渡友計置渡江招信劉綱又在江南把江口不容渡友衆及岸不得登者三日友督之甚嚴六軍都督張舉死於江遂以諸舟散星著岸上下占十餘里綱之兵不及分而友之衆已有登岸者漸次盡渡往新市薛店下寨縱兵虜掠徐文以其衆歸朝初徐聚徐文集衆有舟船數百隻李彥先李進彥皆在東海縣李彥先進彥請衆同謁廟神聚不疑之為彥先所殺徐文聞之開船下海占據靈山有河北忠義人護宗室士幹至橫島文劫之士幹稱是濮恭懿王之孫朝廷遣人招文授武經大夫兼閣門宣贊舍人士幹送大理寺俄刺面配廣南後不知所終十七日丙辰金人陷秦州達蘭既得楚州有再謀渡江之意欲耕地為守遂率軍萬人陷秦州而屯駐十八日丁巳知通州軍州事吕紳棄城走金人已破泰州知通州吕紳懼而奔走紳自以棄城恐終不免於罪戾乃奏云臣夜得夢諸軍皆被朱甲持赤幟蓋火德之應乃國家中興之兆士論以為諂遂罷之王彥敗桑仲於房州仲退軍襄陽府桑仲據房州也王彥嘗從間道遣兵斷其糧餽亦請援於宣撫處置使張俊俊遣楊惟直領兵來援丁巳彥濟師攻自黃水兵既接賊氣懾奔潰近至白磧斬獲不可勝計凡為賊詿誤者悉貸之招降來歸皆分𨽻麾下仲退軍襄陽府二十日己未金人陷通州王彥為金均房州鎮撫使王彥為三州鎮撫李忠自均州來攻彥率其衆號三十萬彥及忠戰勝負相當劉豫建歸受館於宿州招延四方士大夫軍民置𣙜場通南北之貨機察間探十二月崔增降於吕頥浩崔增以七月冦太平州攻城不克劉光世在建康遣人招安增不從預受吕頥浩招安乃率舟船往上江才到魯江口遇邵青船出江頭不及備為青所敗增在無為軍界內屢與張琪戰江路以虜掠為資所至無遺聞吕頥浩在饒州遣人投下文字至是到彭澤縣得頥浩差人招安遂聽節制二十七日己未張俊江淮招討使杜充至雲中見尼堪節要曰充持將相之權據長江之險官軍數萬其勢非不能拒敵也而望風屈膝於穹廬之間何背君負國不顧節義之甚耶又聞尼堪初圍太原有保正名䠴音儘起寨於西山保聚村民金人攻之往往為䠴敗去及多邀金人出掠者由是尼堪遣大軍擒而破之䠴已保守八月矣尼堪既得䠴命釘之於車刺刃於股將欲解之䠴雖死殊不屈尼堪異之徐謂䠴曰爾若降我當命汝以官䠴嫚罵曰爺是宋人寧死耳安肯降你識爺麼爺姓石石上釘橛更無移改竟為敵所害噫里正之役非將相之權也烏合之衆非士卒之練也斬木揭竿非兵甲之堅利也寨山之固非大江之險也八月之守非望風之速也釘之於車刺刃於股非帷幄之優遊也充處是而降敵䠴處是而不屈則忠義之士叛逆之夫所操抑何逺也充聞䠴之風豈不愧哉三朝北盟㑹編卷一百四十三
