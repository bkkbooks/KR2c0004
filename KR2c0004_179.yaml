body:
  text: 三朝北盟㑹編卷一百七十九宋徐夢莘撰炎興下帙起紹興七年九月十三日壬申盡十月九日戊戌九月十三日壬申尚書右僕射張浚觀文殿大學士提舉江州大平觀臣僚上言臣竊謂兵者國之命也兵彊則國强兵弱則國弱兵存則國存兵亡則國亡雖行道之人皆喻此理非必有髙世之見而後能知也近者淮西之兵數亡於僞境者數萬人論其為害國有不可勝言者然自聞變以來士大夫猶為自欺之語謂歸者既衆亡者不多此本皆無用之兵因得省廪食之費尚欲掩覆過失蔽欺聖明而失謀誤國之罪卒未有任之者衆論沸騰臣安敢塞默謹按尚書右僕射張浚輕而無謀愚而自用德不足以服人而惟恃其權誠不足以用衆而專任其數若喜而怒若怒而喜雖本無疑二者皆使有疑二之心豫而復奪奪而復豫雖本無怨望者皆使有怨望之意無事則阻威恃勢使上下有睽隔之情有急則甘言美辭使將士有輕侮之志謀之不善者力與之共謀衆所不與者力使之統衆率易妄作動輒乖謬故酈瓊以下懷不平之心渡淮而去然則浚平日視民如草菅用財若糞土竭百姓之膏血而用之於軍中者曾何補哉夫陛下恃以立國者兵與民也所倚以治兵恤民者宰相也而浚用意狂惑處事顛錯至使民怨於內兵叛於外則失謀誤國之罪亦將何所逃哉故近日以來人無貴賤賢不肖合辭而言以謂陛下方修明綱紀以立基本若不逐張浚則綱紀何由張陛下方倚任輔相以責事功若不逐張浚則輔相何由重今敵人有疑我之意若不逐浚則誘掖之謀將日至將士有不安之心若不逐浚則搖動之情將日生號令必出於朝廷非逐浚則緩急何以使人背叛本生於怨憾非逐浚則他日皆為仇敵百姓怨歎非逐浚則無以慰其心衆情憂懼非逐浚則無以安其意是數者而論之則浚之不可不逐也審矣如謂有區區之心尚欲觀其後效則臣以為浚之才術止于如是而已矣譬由疾之用醫茍如色脈之不辨砭劑之不良則必速易之矣若憚於用醫而甘心危殆則恐非知者之事也臣欲陛下俯察羣情特出睿斷正浚誤國之罪以為後來之戒天下幸甚取進止又臣僚上言臣近上殿論宰相張浚失謀誤國乞正其罪䝉睿㫖付外施行近日以來公論日喧臣謹托所聞以為陛下言之浚昨以樞臣往撫川陜假借便宜擅作威福違諸將之言而大敗於强敵濫加趙哲之誅而盡散其師旅徒竭四川之財輕失五路之地用劉子羽之謀而罷王庶則興元之士馬金幣盡為敵有信二將之譛而殺曲端則關中將士人民無復歸意論浚前日之罪固當永投荒裔陛下起之謫籍授以魁柄待之以至誠遇之以至禮任之專獨過於羣臣用之久復幾於三嵗而浚不思往愆一蹈前轍狂妄狠愎動無不謬如兵之有帥不可一日而闕也浚于劉光世之受命幾四月始則别為六軍使專聽節制於王祉比至命帥而將士已懷疑慮此浚之罪一也置戍守之城當度其所宜宜據要害而今泗州之城乃在淮之北宜小而堅而今盱眙之城員二十有七里虛費公私之力無補捍禦之事此浚之罪二也今日兵備宜取勇夫重閉之說為往來更戍之計而浚不知此悉兵備邊使江淮無表裏之勢敵人無腹背之虞此浚之罪三也諸軍家屬已安於江上而浚力違衆議盡遣之戍所軍士不便於薪米百姓倍費于輸將使緩急之際將士有骨肉之纍而不得專意王事此浚之罪四也淮西今為戰地當時百姓擇險而居官府量事而置公私儲積皆不必用而浚盡遣大兵之後復置𣙜貨務於真州舟給牛種於濠夀州南之錢貨盡轉於淮甸使他日敵入有可用之糧居民懷誤陷之憂此浚之罪五也淮西之兵當資地利乃于合肥之北創築長堤調四千人役之幾數月勞民費財不適其用此浚之罪六也創造牙牌欲賞復地之功浚之狂妄人已竊笑而去嵗齊入寇遽以是付之大將又入竒功給厯本為戰勝金人浚于是時亦出黃榜許以附出給既而按之人皆怨望近因調發復與之使陛下爵祿不信重於人此浚之罪七也去嵗淮西戰捷得降卒萬人陛下命給裝齎遣歸東北而不審其願否盡刺為義兵使人心失望而陛下德意未能孚于中原此浚之罪八也兵以間探為先而浚一意僥幸惟求報者美言敵勢衰弱中原跂望則喜見顔色賞賜優腆不然止令責狀結以軍令故誕慢茍得之人日獲探事之賞而忠信敢死之士無復肯出敵之情僞今皆不得而知此浚之罪九也功同賞異為政之大患而浚於將士罔有厚薄不能精較其勞績明示以髙下使將士或有怨辭此浚之罪十也今之所急者莫如恤民而浚則自前嵗以來大為掊尅之政始於急散户帖擾及四方次則出賣官詰重困江浙次則欲及僧道以至科賣雜物其視疲瘵之民殆如仇讐剝膚椎髓略無恤心此浚之罪十一也今之所戒者莫急於妄用而浚之掊斂所得盡入督府支用之數皆不關於户部遣兵戍多而津發之費不訾移屯戍數而營蓋之用倍費築無用之城濫養俘降之衆以至犒設酈瓊等軍下至小校人賜金一兩連嵗橫斂數千萬緡幾盡於浚之妄用此浚之罪十二也害民之政人所共疾而浚於掊尅之人獨加旌賞出賣官誥明知其為抑配而以所得之多寡賞以減半如無錫縣令劉寬剝民最甚遂得除倅永州為國斂怨不恤後患此浚之罪十三也理財以義非士人不能而浚於財利之事專任駔儈如鎮江則有范深朱熙之徒如建康則有錢意王似之流皆且謂之良吏者浚皆任以回易之事使掩朝廷之勢以爭利於市井傷公害私虧損國體此浚之罪十四也建康兵火之後全乏舍宇而浚建議移蹕謀不素定倉卒責辦公私倍費使遷徙之家暴露失所疾病死亡人懷嗟怨此浚之罪十五也建康營繕之初宗廟宫室皆所未備而起府第都盡壯麗乖奉上之節無率下之風此浚之罪十六也監司郡守責任至重而浚以妻父宇文時中為湖州太守以舅計有功為成都提刑又除親兄滉知鎮江府任用親戚無不督責吏治此浚罪十七也四川久失職差除尤宜盡公而浚所任用惟其故舊舊任既滿新命甫下或至兄弟數人常占佳缺而孤寒不為浚所知識者皆絶望於祿仕此浚之罪十八也扶危救亂常資衆智而浚性惟忌嫉果於自用臣僚有所論列陛下以為可行浚必再三執議力抗君父之命凡人之所言盡不為是專權自恣無所忌憚此浚之罪十九也贊佐謀畫當用忠智之士而浚以髙明自許非狂而狡性與己合愚而佞能順己意者一切無所收用縱或時召侍從郎官諏訪利害而其言可用者實未嘗行此浚之罪二十也凡此二十事雖未足以盡浚之所為而不達軍情不恤民力不用善人不畏公議其所以至於敗事者實皆由此今內而民怨外而兵叛誤國之罪已昭著而浚猶强顔殿堂之上進擬差除講問術數以淮西之變為細事以吕祉之死為竒節尚欲文飾其過以欺聖明此亦可謂無恥矣臣欲望聖慈早降處分將浚前後罪狀明正典刑以為人臣誤國之戒取進止又臣僚上言右僕射張浚輕脫寡謀失機敗事衆論洶洶人心惶惶臣竊憂之今諸帥統兵有數十萬而淮西一軍忽爾叛之失謀之人安可不治哉臣竊唯陛下力圖恢復卿士大夫有一策之善未嘗不收拾斟酌而用之雖芻蕘之賤未之或棄今浚之謀邊惟在自用罔恤人民雖聖慮所圖謀者咈而不然其强顔自專如此倘謀之善猶有可恕矧謀之不臧咎將誰職往年富平之敗論者跡其行事謂有不軌跋扈之漸今者放減録用一洗其謗用之幾時人望其掃除僣僞期於息馬休兵復爾寡謀失策致一軍之叛背夫為人臣强愎雖人主之言咈而不然以致叛軍失謀尚且偃蹇政府不自知非公論謂何陛下雖隱忍含容全其體貌豈有大臣失謀至此公論為非搢紳竊議而笑之尚在宰司將何面目以長師百僚乎浚天性之强屢銼不改後來復用理宜刷恥以報知遇今乃敗事失機望其再立事功不亦難乎且一勝一負兵家之常若再戰再負猶有可言豈有數萬之師失於謀慮一旦叛之舍而不戮何以示威而勸來者臣愚伏乞聖慈速賜施行伏候敕㫖又臣僚上言臣竊聞臣僚上章論列尚書右僕射張浚不可任宰揆未䝉罷出公論沸騰言不可已伏見張浚狠愎自用輕脫寡謀事不思於古義言惟悅於己從自持中外之柄多失將士之心頃以樞臣宣撫川陜事權之重古今所無浚不思兢謹妄作威福凡事宿將謀策擯棄不用專聽狂妄趨合之言是致百萬之師委於鋒鏑之下全陜傾覆健將奔走論其棄失所合誅夷聖恩寬大曲示容貸逮至言章既上始從薄貶未幾召還授以相柄所宜深悟前罪以圗報稱而浚尚循故轍輕肆自若撫馭無術措置乖方是以近者復致酈瓊等之叛凡數萬之衆踰淮而北操縱如此不其踈哉計浚前日之功曾掩過之不足計平時之失實敗事之居多伏望聖慈特賜睿斷收還政柄置之閒漫以釋將士之憤以安華夏之情伏候敕㫖奉聖㫖張浚罷尚書右僕射觀文殿大學士提舉江州太平觀制曰春秋之義貴重於股肱賞罰之心必先於貴近朕行法而待人以恕議罪而不忘其功欲全君臣進退之恩思成風俗忠厚之美粵有定命告于外廷具官張浚頃嘗奮身事朕初載入勤王室位冠樞機出捍疆陲謀專帷幄乃疇宿望俾踐台司期左右于一人庶贊襄于萬務屬者式遏羣敵經理淮壖番休禦侮之師更戍乘邉之將而乃撫馭失當委付非才軍心乖離卒伍亡叛郵傳沓至駭聞怨怒之情封奏踵來請正失謀之罰然念始終之分察其平昔之懷許上印章退休真館錫名祕殿庸示眷私於戲栒邑遣兵鄧禹致威權之損街亭違律武侯何貶抑之深尚繼前修勉圖來效又臣僚上言伏見今月十三日麻制張浚除觀文殿大學士提舉江州太平觀任使居住罪大責輕公論未厭昔漢王恢設馬邑之權欲誘胸奴而伏於便地胸奴覺之而去武帝乃以不擊輜重下恢廷尉且曰若不誅恢無以謝天下之意蓋謂建造兵謀本出於恢武帝既却廷臣之議而獨從恢言則其無功之罰不可不重也浚自再用之後日欲僥幸功名每以誇言誕計欺惑聖聰陳說利害幾于劫持凡所為者必使陛下從而後已考其事則非有馬邑之謀論其專則豈得王恢之比既敗事至此而猶以祕殿隆名退安真館如此則後之誤陛下信任者復何所憚哉臣伏望睿斷將浚削奪官職重賜竄責以為大臣專權誤國之戒取進止又臣僚上言臣伏見前宰相張浚以寡謀自用誤國大計陛下特屈邦憲授以祠館為浚者所宜杜門思過深自訟責而去國之數日乃與賓客置酒髙㑹從容遊觀殊無恐懼修省之意今聞盛兵自衛往居苕霅間其意得氣適蓋與功成請祠而去者莫異若不加譴罰則浚必不自知其罪而四方之人亦未必知浚之所以去也伏望聖慈將浚更賜貶降仍以前後臣僚章疏盡付外施行取進止十五日甲戌張浚落職依舊宫祠臣僚上言竊觀十三日麻制張浚以觀文殿大學士提舉江州太平觀大廷敷告明示黜陟所以砥礪百工而為勸戒黜幽之典未厭公論臣安得無言哉竊以大臣之罪莫大于專權誤國之誅豈踰於流竄今浚擢任纍年選登宰司再加録用委寄非才富平之師前殱于覆亡東南之財又殫于誅剝一事無成四方何賴怨流黎庶謗溢縉紳為相失職進退無觀陛下尚寵于祕閣逸之祠宫雖全其體貌示以始終其如天下何至於失謀敗事前後臣寮論列備于章疏臣不敢陳臣愚欲望聖慈詳酌褫其職名投之逺方以昭示天下為誤國之戒伏候敕㫖九月十五日三省同奉聖㫖張浚可落職依舊宫祠右劄付刑部疾速施行仍關合屬去處召王庶赴行在王庶赴行在出自上意是時浚已去趙鼎未來庶自荆南赴行在楊沂中還行在二十一日庚辰詔大將監司守令恤民訓兵詔曰朕為立國之務惟兵與民宵旰以圖十年于此賴帝垂祐無甚荒嵗得資元元之力以給諸軍比年以來兵籍寖廣而教士益精庶幾國勢遂振以俟皇天悔禍之期向朕不敏不明誤國柄臣寄以兵政乃謀猷乖戾委付非才懷疑反側而莫以告朕遂使積年忠義之衆一旦陷于叛亡之罪凡取于民力以事此軍者皆委于空虛而無效此朕所以慨惜叛者尚深愧我民也中外文武將何以副朕焦勞願治之意應監司守令各務存恤百姓非供軍費定數之外無得妄取于民將帥之臣撫綏其衆無使失所訓練整齊毋使驕惰毋怠毋忽助朕逺圖有違朕言則有常罰詔劉光世髙世則赴行在呼延通王勝王權襲金人於淮揚軍敗之十月九日戊戌張浚責授左朝奉大夫祕書少監分司南京永州居住臣僚上言近者論奏觀文殿大學士提舉江州太平觀張浚罪狀顯著不輕伏望聖慈褫職然天下聞之以為浚之罪惡上通于天而罰止于褫職衆論未愜臣豈得默默哉竊以國君爵人于朝與士共之刑人於市與衆棄之况大臣進退而議其賞罰非克當其罰則天下之人何以悅而服從乎今浚竭天下之財粟東南為之困覆富平之師西北為之擾繼為宰相前後東西南北之民曾不得奠枕而居自昔誤國事無與比等罪止於褫職人心謂何且陛下宵衣旰食所望於恢復倚浚惟多今一事無成復有後悔計人心之怨望不止此也臣愚伏望聖慈酌别議其罪以厭天下之心以為誤國之戒伏候敕㫖又臣僚上言伏見前宰相張浚玩㺯柄權致誤國事上貽當寧之深憂陛下曲存體貌之恩俾以祠館謂宜夙夜惴惕思省厥愆乃上章乞送使臣及親兵百人外更為帶行州軍七十五人又欲置所居州軍存留親兵五十人以備緩急其言曰臣出入總兵將共十年其所施為不無仇怨嗟夫浚自知失士之心如此何為又居相位而不解去也人臣憂國當如其家使浚之謀其家豈復輕肆生事今乃于國不顧其危於己欲求其安是何謀國之疏而謀家之密乎夫置衛所以寵相臣也今浚罪方放廢之餘更求衛卒如此之衆是浚惟知陛下之勢不恤天下之言也大凡浚之所為率多任數頃年責居福州於未行間亦上章以官田為請其意蓋以此卜陛下眷禮之盛衰且以示寵於人以謂上之恩意殊未忘爾今之所請大槩類此蓋緣罪大責輕浚未知所懼伏望睿明更賜貶降使天下明知陛下之好惡以為臣子誤國之戒伏候飭㫖十月九日三省同奉聖㫖張浚責授左朝奉大夫祕書少監分司南京永州居住奉敕如右牒到奉行前批十月十日辰時付刑部施行仍關合屬去處遺史曰張浚罷宰相繼有命落職樞密都承㫖張宗元素與浚善因得進用宗元懼以浚黨見逐欲示其義氣明非浚黨反表請斬浚士論恥之既而周祕以浚之責未厭公論也乃復論列請貶嶺外參知政事張守曰噫亦甚矣乃啓上曰張浚為陛下捍兩淮宣力勤勞前此罷劉光世正以其衆烏合不用命其今驗矣羣臣從而媒孽其短臣恐後之計者必指浚為鑒孰肯身任陛下事且其母老矣願陛下哀憐之上惻然于是浚以分司居永州三朝北盟㑹編卷一百七十九
