body:
  text: 三朝北盟㑹編卷八十六宋徐夢莘撰靖康中帙起靖康二年三月十七日丁未盡二十七日丁巳十七日丁未張邦昌令尚書省榜施行事件三月十七日三省樞密院同奉面㫖嗣位之初宜廣推恩霈今四方道路未通致赦宥未能宣布緣京城圍閉日久下項事可以先次施行應在京罪人所犯無輕重不以己未發覺常赦所不原者並與釋放應文臣承務郎武臣承信郎以上并內臣及致仕郎並與轉官在職選人循資校尉比類施行合磨勘者仍並不隔磨勘應文武升朝官并禁軍都虞以上父母妻未有官封者更與封叙亡沒未封贈者並與封贈已封贈者更與封贈祖父母在願回授聽應禁軍正副指揮使已上各特與兒男下班祗應一名應承務郎以上服緑緋及十五年不以贓私罪並與改轉服色開封國學及别試所去年秋試得解舉首特與推恩餘並以今年八月鎖院省試應合特奏名人並與免試內經六舉人以上到省人與補登仕郎五舉人與補京府助教四舉上州文學三舉下州文學兩舉諸州助教錫慶院試中在學不係在學生免廷試推恩人諸路解到武藝合校人等並照元降指揮分等參酌推恩應命官除名追降官員及勒停終身不齒放置人等及永不收叙人並與叙元官落職人與復舊職令刑部檢舉奏聞應停降諸色人等未曽叙用者並與特叙元職名其永不收人依此已次遷補候有缺收補應配軍因閉圍未出京人候開門日配沙門島並配鄰州見分配在京重役處仰刑部疾速具元犯取㫖俱令逐便應逃亡軍人及潰散人兵除依纍降指揮招集出首外尚慮有未出首人可特展一月首身其存恤等事並依已降指揮應係官司缺負不以名色貫百並與蠲免其私債元無利息者限一年外許理索諸軍緣借請之類見尅請受者並特除放耆老並賜粟帛令戶部支給價錢官司房錢不以貫百並放三月出糶米麥雜豆以濟貧民雖已降指揮減價尚慮民間不易可令更與減價出糶仍約束逐場人民擁擠併仰户部踏逐應有係官木植及空閒屋添置賣場以濟細民無至阻滯掩骼王政所當先草昧圍城之中不忍視其橫逆應亡沒貧民仰開封府量給官錢充葬送之費應細民疾病貧乏無藥者令開封府疾速措置差官分定坊巷就民俵散官藥諸軍疾病合給官藥緣多事之際給散不時仰運馬司體度速支官錢廣行合藥俵散其諸軍差發到軍兵保甲等有疾病者令所轄官司依在京軍營法醫治伎術人等并家屬取赴軍者所拋下財産其有分人許經開封府自陳驗給付應寺院宫觀有隔下發放等恩澤各令自陳所屬保明申禮部限三日給降度牒應特㫖還俗僧道特與依舊為僧道令開封府出給公據應禁宫院寺尼女冠令所屬取問願歸俗者聽從便應行法令典章百司事務職任一切並依舊內有與民不便者臺省寺監條具以聞仍許諸色人經鼓院奏陳當議參詳更定以從民欲牒奉敕如前宜牒南河曉示各令知悉牒至准敕故牒十八日戊申徐秉哲權領樞密院莫儔權領中書省吳幵同權領尚書省十九日己酉征催稍緩邦昌遣國子祭酒撫諭太學諸生遺史曰邦昌命董迫撫諭諸生慰勞備至巡齊宣布邦昌之意蓋自圍閉諸生困於􅐽鹽多有疾病逮春尤甚日死不下數十人者邦昌共知乃用撫諭之使又命選醫官十人於諸齊日逐看候人人給餌藥之資由是諸生感悅故泣血等諸書太學諸生所記其間不惟無邦昌收拭其事者邦昌蓋欲收士譽雖曰無意於神器吾不信也學之疾疫無甚於今年自春夏至此亡者二百餘人初在學七百餘人今殁故已三分之一矣泣血録曰初日就齊蔡延世夢金甲神人在太學前箕踞而坐顧左右百餘人取鍬柱東方一人問曰此何為者神人曰欲葬太學之士復問曰其數幾何神人曰幾半中有一人被髮朱目取水面北噀曰得水者可以免死既覺汗流浹背太學之士七百人物故者三之一病疫發腫者往往以黑豆湯效取服者立愈其方以黑豆二合炒熟甘草二寸炒黃色以水一盞時服之疑神人呪水之异也翟興入西京斬河南尹髙世由遺史曰初京城失守金人以前知澤州髙世由請於朝廷使為河南尹以蕭慶領萬騎佐之羅索貝勒衝散勤王之師也前軍統制翟興者河南人探地利聞世由之事出其不意與族弟進提步卒數百卷甲夜趨潜入洛陽擒世由斬之二十日庚戌邦昌以謝克家權吏部尚書邵溥權户部尚書周懿文權開封府尹王悰權吏部侍郎石令問鴻臚丞二十一日辛亥所解發醫官技藝人復有入城者是日有醫官入城蓋二帥給假令歸收買藥餌雜物醫者於籠上揭榜云太子元帥府祗候醫官某人行李相國元帥府祗候某人行李二十二日壬子邦昌以邵溥差兼提舉京城所陳永道依舊都水使者御劄行王時雍徐秉哲上自軍中批御劄付王時雍徐秉哲云社禝山河素為大臣所誤今日使我父子離散追念痛心悔恨何及見以治行闕少厨中所用什物煩於藏庫支錢收買津遣至此非晚成行請勉事新君無念舊主某上王徐二公二十三日癸丑邦昌與二帥書乞還馮澥郭仲荀等書曰比膺詔册獲撫邦封載惟草創之初方賴臣鄰之助顧羣臣之全闕致庶務之悉隳徒以蔑材託於人上何以仰承殊渥外濟多虞若涉洪川罔知攸濟兹冒陳於危懇蓋深恃於眷私所兾垂憫必䝉賜可竊以左丞馮澥國之老成管軍郭仲荀衆所推信儻委職任俾贊時難必能係於多士之心有以副萬夫之望此外臣僚等或因扈從前帝或緣差在軍前如台意欲留之人乞恩慈下令遣還則庸疏之質既得助於衆賢報稱之衷敢忘懷于大惠尚祈英鑒俯亮愚誠金人得書遂遣左丞馮澥僉書樞密院事曹輔太常少卿汪藻禮部侍郎談世績中書舍人孫覿及徐天民蘇餘慶郭仲荀洗晦黃夏卿等還邦昌與二帥書乞免括金銀書曰某聞之先聖云何以守位曰仁何以理財曰義人君之於天下惟以百姓為本百姓之不存則社禝無以固其重人君不能保其尊又况創業造始之君唯務施恩行德布惠取天下之心然後作為事業固其根本由漢唐以來率由此道後世子孫終必賴之皆百代不易之理也某材質庸謬道義無聞仰荷大金皇帝天造洪恩遽令軍民官吏推戴册命畀以南土使主斯民永為屏翰以事大國方夙夜祗懼無以報稱恩臨士民坐視困苦莫之補救痛傷肺肝殞身無門今見京城百姓自來前皇帝朝已曽根括金銀數次雖有藏匿官吏搜索悉皆罄盡今又䝉元帥科降數目浩大難以充足雖軍前遣人搜撿亦無所得百姓熬熬憂疾餓死者日以萬計復懼根括金銀數不能足重念大金皇帝以邦昌主斯民而從政之初民心離散怨謗交興邦昌恐以此主國必致傾仆惟元帥慈恩洪博智燭髙明曲從物情俯加矜恤止絶再降金銀數目庶使億兆生靈保全性命不陷顛危邦昌所圖冀其獲安仰副大金皇帝建立藩屏之意邦昌不任哀懇惶懼之至金人得書遣二使入城齎到元帥府書云自本所取金帛皆係犒賞軍兵之所急用雖不能足數亦且期大半今楚國肇造本固則安慮因根括之急重困斯民已議損止張邦昌令尚書省榜備述金國元帥府書免括金銀并表假先是軍前復索金銀將元科五百萬鋌在於百姓隨坊巷均科一貧民家合納金五錠銀五十兩表假二百匹限五日要足如不足先殺根括官以次後洗城官吏知民無有各出一小榜於其門上貼之旦夕驚憂知其必死邦昌乃令光祿卿王琮作書親詣元帥求免得報已議損止令出榜諭曉尚書省榜今月二十三日求大金元帥府云云二十三日奉面㫖令開封府多出榜文曉諭民間各令知悉牒奉敕如前宜榜兩河各令知悉牒至准故牒又牒奉面㫖應文武被㫖差權職事並令尚書省出劄子請給恩數依正官法非被㫖兼舊職者並罷周珣黃中美致仕二十四日甲寅邦昌以書謝二帥還馮澥免金銀等書曰比馳柔翰曰貢忱誠兾還文武之官庶俾中外之乂載惟僣率深負兢惶豈意台慈曲垂照鍳馮澥郭仲荀二員既䝉矜允曹輔談世績以下悉已獲歸仰荷恩隆實出望外至於親加訓誡俾䖍臣節之條俯念孤危允賴臣工之助以至金帛犒賞之數實軍前急用之資䝉深軫於疲羸遂獲紓於根括興言肇造之本賜以固安之圖豈唯億姓之生靈盡歸元造兹為萬世之大惠曷報鴻私罄筆舌以難周銘肝心而莫致今差吏部司郎王琮恭詣帳前伸謝仰惟英謀俯鍳卑悃金人遣路允迪沈晦及官吏僧道百姓數千人入城先是元年二月間斡里雅布在城下講和朝廷遣路允迪割河東地使於金軍滕茂實副金人方圍太原又分兵破威勝軍隆德府至髙平與允迪等㑹遂俱還太原時太原奉密詔城守堅甚諸道援兵繼進金人割地不效留允迪一行于雲中至是京城已破乃自雲中取允迪同沈晦等放還城中晦與允迪相先後奉使者於是茂實被留不遣茂實兄祹通判代州已降敵矣金人素重茂實乃置茂實於代州又自京城取其弟華實使兄弟同處以慰其勞從事郎朝祀令改合入官差權司農丞考功虞譽致仕二十五日乙邜邦昌令馮澥曹輔並仍舊職朱宗權刑部郎官師尹權太府少卿王及之權都水使者陳永道别無差遣葉份權左司即官李健權右司即官禮部尚書領中書省事李回乞罷權尚書以祕殿舊班暫省事依邦昌書至軍前欲乘大軍未退修城池備敵軍前有關報已諾修城之請且詬工役當自備或謂欲軍前為修兵馬大元帥府劄子下東平府㑹合諸路人馬前去京城據西道總管王大資三月初九日收及知西京外宗正事大字稱准永興軍路安撫使范左丞回報并沿邊四路帥臣各率兵馬已在陜府及稱水陸並進復西京河陽又據五經大夫張憲狀統領人馬見在宿州及翁中丞向發運各領人馬亦已到彼契勘昨為被奉詔書再通和及准曹樞密公文令兵馬止有近京駐劄不得輕舉徒誤國事遂分屯勤王人兵各令在附近劄駐按甲不動以俟金人退回領兵入覲今來已是纍月金人不回不住劫掠中外隔絶君父命令不通不知京城次第深慮詭詐難以全信除先纍次行下審度進兵外今四方兵馬雲集勤王戰士各懷忠憤敵衆渡河兵勢減少合乘機㑹四方並進掃除强敵共立大功仰選擇精鋭忠義人兵多作頭項連珠相繼遞相䇿應審觀形勢迤邐前進兼契勘見其敵兵多是輕騎宜常令牌鎗在前遮蔽神臂弓弩以防奔衝伏藏軍馬以備追逐務在同心一體更相應援共除國難以成忠義本志同受不次之賞宣總司已添張憲頭下人分兵留守自可足東南道都總管趙延康翁中丞向發運並與宣總司附近宜相關㑹犄角前進張觀察下已據統制丁宣讃申乞先領兵前進合更審問本官差别頭項兵馬相繼䇿應宗元帥元到南華縣至故陽鎮與興仁府地里相等合約日並進令聲援相接陜西五路及王資政既來收復河陽係在京城西北金歸路尤為要便當府除已劄下知濵州董誼知永靜軍王潵各統領人兵前去濮州駐劄關㑹逐處集兵前去京城去訖今仰東平府照㑹仍批口食三日附帶前去右劄付知東平府安撫盧待制准此二十六日丙辰軍前傳元帥台令諸軍二十八日下城以檄書數百道付邦昌傳諭四方其檄云十三日鼓舞登城百萬師號呼請命選郎官為四方密諭使開封府募人齎僞詔榜開封府今月二十六日午時承尚書省劄子內降蕭太師送到文字刷㑹各州府下客人前來如隨處客人雜送人要每路下客人亦早發遣前來以憑四散告諭奉中㫖令開封府契勘有無逐處客旅為散漫在民間即日未便見數右劄付開封府契勘上件州軍如各無本州軍客人止將本路人目下據數剗刷發遣前去不得住滯仍具已起發逐人數申尚書省續准劄子勘㑹已降指揮令開封府剗刷指揮等路州軍民客人四散告諭切慮客人不知因依别致驚疑須議指揮右劄付本州火急分明出榜曉諭召募客人因便賫詔書前去告諭即不得張皇事一概勾呼接使騷擾仍具已依應施行文狀申尚書省准此京西路鄧均隨唐蔡鄭金郢房滑汝州順昌襄陽河南淮寧潁昌府信陽永安軍京東路青沂菜密登濰溜徐濟拱單濮州東平襲慶興仁府南京淮揚利國軍萊蕪監陜西路洮州熙樂丹秦虢陜耀鳯同鞏階醴環坊㑹涇商華源岷隴成蘭鄜寧州京兆延安府陽清平西寧鳯翔府鎮戎懷德定邊保安定遠積石西安順德軍司竹大平監河北東路大名開德府恩濵棣德博滄北清州永靜軍淮南路滁陽楚亳真宿光濠泰泗通廬舒和蘄黃州夀春府髙郵漣水無為陸安軍右出榜北市張掛曉諭前項客人限三日如有因便願賫詔前去告諭之人即立便前來赴府出頭各令知悉江南發運司據亳州申有京師遣快行家往廬州發運判官向子諲牒知廬州馮詢提舉鹽香范仲拘縻關防牒曰訪聞張邦昌受金人僞命已有人詣濟州大元帥府陳述上件事迹契勘本官家屬母與子皆在廬州須至先有行遣牒候到請照㑹將本官之親屬密切關防無得漏落及有疏虞候大元帥府指揮仍選委有心力忠實官幹當須别以事為名目庶不張皇漏泄搖動人心有害國事亦具因依牒知廬州都鈴馮大卿去訖更請同共議事仍親書已如何施行公文回示今牒提舉淮西鹽香范禮部靖康二年三月二十六日牒仍具申元帥府乞更賜行下本州嚴行關防二十七日丁巳城外火城中人望外四面火光亘天傳聞金人焚燒寨栅三朝北盟㑹編卷八十六
