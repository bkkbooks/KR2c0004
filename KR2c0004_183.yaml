body:
  text: 三朝北盟會編卷一百八十三宋徐夢莘撰炎興下帙起紹興八年正月盡六月八年正月車駕駐蹕臨安府八日乙未知臨安府吕頥浩乃赴行在十四日辛丑偽知蔡州劉永夀殺烏嚕貝勒率城中老少來降劉永夀偽知蔡州為淮西安撫使烏嚕貝勒為副永夀以小隙劾烏嚕之罪金人移烏嚕為德州同知未幾忽報烏嚕貝勒以金人兵三千徒馬來蔡州提轄白安時請永夀來歸永夀不從曰若朝廷賜我死當死之懼謀泄即拘永夀勒蔡州兵以待之烏嚕貝勒以其衆入城不為備安時乘勢盡殺之遂驅城中老少來嶽飛遣張憲等往接納之老少多有復回不來者授安時武功大夫髙州刺史是時亳州宋超亦來降又中原士庶以金人廢齊之後多有挈老少來江南兼酈瓊叛兵復有回歸者沿淮諸州皆招納應接之不暇矣二月七日癸亥車駕發建康府車駕在建康府參知政事張守常謂建康自六朝為帝王都江流險濶氣象雄偉正宜據會要以經理中原依險阻以捍禦強敵可為别都以圖恢復每對必為上言之宰相趙鼎欲還臨安守與鼎議于都省不合又請對上守曰臣昨日都省已與趙鼎言之矣陛下至建康席未及暖今又巡幸六司六軍有勤動之苦民力邦用有煩費之憂願小安於此以繫中原民心上曰卿之言是鼎獨毅然不能奪守既而罷去韓世忠嶽飛來朝王庶為兵部尚書王庶為兵部侍郎對便殿口陳手畫秦蜀形勢利害奏上喜之即遷本部尚書三月二日丁亥詔諭諸路宣撫制置使勵士卒帥守及監司共濟軍旅詔曰昔在光武之興雖定都于洛而車駕往反見于前史者非一用能奮揚英威迅行天討上繼炎漢朕甚慕之朕荷祖宗之休克紹大統夙夜危懼不常厥居比者巡幸建康撫綏淮甸既己申固邉圉將率六軍復還臨安內修政事繕治甲兵以定基業非厭霜露之苦而圖宫室之安也自今而後應諸路宣司制置使等其深戒不虞益利士卒常若敵至以聽令帥守監司其協心同濟軍務罔或不勤以副朕經營之意七月壬辰秦檜為尚書右僕射同中書門下平章事兼樞密使制曰忠為天下之賢聖人所以衛社稷誠者政事之本君子所以治國家故汲黯在朝而邪僻為之寢謀楊綰入相而豪右以之自化維此鈞衡之任曽何今古之殊我得其人明告在位具官秦檜秉德寬裕涉道淵微守經權而知其通臨大節而不可奪建兹圖舊付以本兵憂國忘家持心無二獻可替否守節不阿藴蓍龜先見之明有松柏後凋之操朕念朝夕之誨必資左右之良在宣帝時有若丙吉魏相在明皇時有若宋璟姚崇一則同心輔政而漢氏中興一則以道納君而唐室大競是用擢升右弼進處文昌躐三等之榮階衍多田之腴賦期盡協恭之美式觀相濟之能於戲啓乃心沃朕心豫欲聞于入告有其善賞厥善汝無怠於旁招往踐攸司欽承休命王庶樞密副使先是劉光世罷軍政酈瓊皆叛張檀葉時貽還金陵朝廷姑息諸大將不有所興革以王庶素有威望故除為樞密副使四月十四日己巳詔遣王庶按行營壘察州縣弛慢失職者上委王庶視師江淮調諸路兵預為防秋之計庶臨發行朝請犒軍於殿司都教場從之於是便服坐壇上自大將三衛而下雖身任使相悉以戎服步由轅門庭趨受命拜賜而出軍容嚴整莫敢仰視聞者聳然蓋自多事而來未嘗行此禮也翌日遂行駐節淮上乃移張浚前部張宗顔將七千人軍淮西復請於朝授以節鉞就除淮西安撫使知廬州命巨師古將三千人屯太平州分淮東軍一軍屯天長一軍屯泗上緩急互相聲援劉錡軍還駐鎮江專𨽻密院以固根本嶽飛聞庶視師淮上與庶書曰今嵗若不舉兵當納節請間稱其壯節張燾兵部侍郎張燾召赴行在有旨令閣門不隔班先次引見上慰勞久之曰卿去止緣張幌燾曰臣頃者備員後茍有所見事無大小不敢不盡愚衷如內侍王監乃陛下親近委信之人其擅置御莊事尚論列不敢有隱豈有宰相親兄自賜身者公論不與之臣若不言豈不負陛下亦不負張浚上曰卿于交逰且盡忠若此事主可稱盡心因問朕圗治一紀于兹而收效蔑然其弊安在燾言自昔有為之君未有不先定其規模而能致效者臣紹興初始蒙召對首以治道先定其規模為言于今七年以所為規模者臣未見其一定之説臣竊觀方今朝廷施設之方朝令而夕改者有矣夕行而朝輟者有矣今日以為是明日以為非者有矣其事大體重不可輕舉者莫如六蜚之順動往者前臨大江繼又退守矣曽未幾年而或進或退豈不為敵人所窺乎此無他規模不定故也陛下之所朝夕相與論斷國事者二三大臣而已而一紀之間命相之制凡十有四下執政遞遷者亦無慮二十餘人非規模不定任之不一責之不專致此紛紛乎日月逝矣大計不容復失願陛下以先定規模為急規模既定未有功效不著上歎息謂此誠方今之急務朕非不欲立定規模緣宰輔數易未有定論耳遂擢燾兵部侍郎金人殺知同州李世輔家屬李世輔知同州與知華州王世忠謀來歸朝為其下告變于哲爾格貝勒世忠被殺金人西路元帥薩里罕來同州欲謀殺世輔而世輔伏兵州廨執薩里罕率兵南走薩里罕曰君往江南江南方與大金議和大金以河南之地許還江南江南喜于得地講和必送我歸本國汝則被害矣世輔曰何以為信薩里罕乃解其衣於近體褚衣中取出一文字世輔信之遂放薩里罕命去世輔出奔為金人所追且行且戰其下皆盡世輔奔于夏國金人遂殺世輔一家親屬五月劉子羽漳州安置御史中丞常同言劉子羽陜西敗事之罪而責之四日監察御史張戒論和議難成是時有報金人來議和戊子監察御史張戒上殿進呈第二劄子大略言自靖康以來主議之臣皆有膏肓不可治病主戰則諱言和主和則諱言戰至于守備則不復講專持一家之説大有誤國家者守備一日不可弛也政使和議成猶不可况未成乎上曰不如此國家焉得有靖康之禍戒字定復解州人六月王庶還朝有報金人遣烏凌阿思謀來時樞密使王庶視師在淮甸有旨促還朝庶以謂議和非策乃上章言先帝北征而不復天地鬼神為之憤怒陛下與敵有不共戴天之仇忍復見其使乎其將何以為心其將何以為容其將何以為説且彼之議和割地不過畫河增幣二者而已若曰畫河為界則我之故有安用和為若曰畫河則東西數千里荆榛無人之地倘我欲宿兵守之財賦無所從出彼必厚索嵗幣以重困我矣不若拘其使而怒之章凡五上皆極論其和不便其第五劄子曰臣準省劄令疾速依纍降聖旨復行在奏事臣緣在廬州伏暑困臟腑乘騎未得見沿流兼程前去臣昨以金使入境屢貢狂瞽上蒙聖聽特恩寬貸未賜誅責使人經過州郡傲慢自尊略無平日禮數接伴使欲一見而不可得官司供帳至有打造金盞輕侮肆志略無忌憚臣所上封章初言陛下方在亮陰不可遽見使人且以挫其鋒稜兼于國體為得次言金人講和非其本心姦謀詭計用之有素次言地界嵗幣事關利害未易輕議仰惟睿明必能察其當否區區妄庸何所逃罪然臣秉資蠢愚心懷憤悶不能自已輒敢有論列章陛下恕再三之瀆臣聞自古謀人之國者必有一定之論越人取吳在驕其志秦之取六國在散其從其間雖或出或入而一定之論未曽易也金人國富兵強所以謀人之國者曰和而已觀其既以是謀中國方突騎陵京闕初以和議為辭暨以兵圍城又以和議為辭二聖播遷中原板蕩十餘年間中原之俗蹂踐幾遍其力戰之心方靡厭而和議未之或廢也今王倫迎奉梓宫爾而受金人和議以歸且與其使俱來此可為信乎劉豫雖云僣竊正名號者七八年一旦逐去金人慮中原百姓或有反側陜西叛將或生顧望吾一出師必有應者此設為講和之説仍遣使馬所以欵我者昭昭無疑臣蒙陛下親擢備位夲兵國之大事不敢隱默故重為陛下陳其三策莫如拘其使而怒之彼必加兵我則應之所為善戰者致人而不致於人是也金人強大自居一日或拘其使出於意外氣先奪矣負敗可立而待其次願陛下念不共戴天之仇堅謝使人勿與相見一切使指令對大臣商議然後徐觀所向隨事酬應最其次姑示怯弱待以厚禮俟其出界精兵躡之所以掩其不備破之必矣凡此三策臣晝夜經度類不出此倘陛下採其荒唐用濟機變則臣于兹事或可陪在庭之末議或以臣言為濶誕不切于事則臣之知慮窮于是矣不敢復有論説也臣頃與邊臣大將議論皆云失今日機會他日勞師費財決無補于事功至有云今年不用兵乞納印致仕者觀此則人情思奮皆願為陛下一戰欲陛下英斷而行之至不敢愛死以報萬一不省至是還朝金人遣烏凌阿思謀少卿來聘烏凌阿思謀來聘議和也烏凌阿思謀即蘇瑪拉也宣和中嘗為議使到京師者是也王庶自淮上還朝思謀到館庶再上章力執前議有曰陛下當兩宫北狩之後龍飛睢陽匹馬渡江扁舟航海以至苗劉之變艱難萬狀終無所傷天之相陛下厚矣至今雖未能克復故疆鑾輿順動而大將列營雲屯百度修舉較之前日所謂小康何苦不念父母之仇不思宗廟之恥不痛宫眷之辱不恤百姓之冤逆天違人以事強敵乎不省思謀不出國書不赴都堂欲宰相就館議事宰相趙鼎不允思謀迫以歸期乃赴都堂鼎步驟徐進雍容禮文思謀一見服其有宰相體鼎問所議者何事思謀曰有好公事商議鼎曰道君皇帝諱日尚不得有甚好公事鼎問其來思謀曰王倫懇之故來問割地思謀曰地不可求而得聽大金還與汝鼎以為非好語是日宰執同知見思謀而樞密副使王庶不以目視之聞思謀之語有憤悶不平之氣鼎與思謀議定出國書引見之儀思謀氣稍奪及引見甚倨上問朝廷數遣使議和不從今忽來和何也思謀曰大金皇帝仁慈不欲用兵恐生靈塗炭上曰俟朝廷議之思謀請上自決上令退館以俟乃召宰相問之鼎堅執不可秦檜順上旨謂和為便鼎以二相議不同乞罷宰相不許思謀初入境即問馬擴所在時馬知鼎州上令急召之至行在俾馬入館見思謀因敘海上相見之好且屈指舉諸金帥小字詢其安否思謀皆舉其封諡之號以答之因踧踖不安時復欲以馬奉使思謀懼其小已也乃謬為言曰馬某舊往來奉使國中甚敬之今若再遣恐必見留遂信不遣王庶論不可講和王庶在都堂與宰執同見金使烏凌阿思謀等謂思謀之言不遜順必有詭詐不可信且朝廷待之過矣乃具劄子奏云臣前日在都堂與趙鼎等同見金使烏凌阿思謀石少卿除臣已有章疏論列金不可與和及再詢訪得烏凌阿思謀在宣政間嘗來東京金人任以腹心二聖北狩盡出此人今日天其或者遣使送死雖虀醢之不足以快陛下無窮之冤今陛下反加禮意大臣溫顔承順臣于是日心酸氣噎如醉如癡臣未嘗交一談亦未嘗少覘其面君辱臣死臣之不死豈有所顧惜也臣又竊聽其語詭祕譎詐無一可信問其來則曰王倫懇之問其事則曰地不可求且金人不遣使已數年矣王倫何者能邀其來乎且地不可求聽大金還與汝金人不出自己之意思謀敢擅出此語乎臣曉夜尋繹此語彼必以用兵之久人馬消耗又老師宿將死亡略盡又其性不測互有觀望故設此策以休我兵候稍平定必尋干戈今若徇目前以從其請後來禍患有不可以勝言者矣設若金人未有動作損陛下威武離散天下人心蠧耗財賦怠惰兵將嵗月易失凶豐不常所壞者國家之事力所憂者陛下之宗社臣下無所不可今走道塗號奉使者朝在塗泥暮升侍從居廟堂作經綸者竊㺯威柄專任私昵豈止可為流涕慟哭而已哉臣以忠所激肆口所言冒瀆天威乞賜誅責臣不勝願幸不省三朝北盟會編卷一百八十三
