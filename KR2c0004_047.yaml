body:
  text: 三朝北盟㑹編卷四十七宋徐夢莘撰靖康中帙起靖康元年五月五日庚午盡二十五日庚寅五月五日庚午詔勸士民以財榖助軍興詔曰朕嗣承丕緒夙夜兢惕思所以撫綏四海惠養元元以為無窮之計而兵戎弗靖未能偃兵故將起天下之師以振國威然而興師十萬日費千金方積弊之後朕痛自刻勵岡敢汰侈罷斥浮冗粗給經費其於師旅之用誠未有贍之也昔漢武帝募民入粟寨下而師頼之濟今朕上為宗廟社稷之重將以定中興之業下為兆億蒼生之衆將以圖休息之期此忠臣義士協濟艱難之秋也應天下士民上户有能推其財榖贏餘以佐軍興者仰州縣聽其自願不得抑勒不以多寡别項儲蓄專以充募兵養士費其數申樞宻院各以名聞朕將等第推恩以為忠義之勸八日癸酉河北河東宣撫司乞招兵以防秋河北河東宣撫司言河北諸州正兵闕少以禁例物於陜西募遊手惰民充義勇五路各四千人可趂防秋從之仍令尚書省撥䧏銀絹蔡攸移潯州安置臣僚上言臣聞善除惡者如去草之絶根不善除惡者如養虎之遺患其為禍福非不較然易見自昔人主有幾失而莫捄者依遵牽制坐視不忍决也臣謹按蔡攸大罪有七其小擢髮莫數不復道也以樞宻之臣為俳優鄙賤之事滛言媟語巧發應機怪服異裝排謟献笑出入禁闈遊處冐男女合避之嫌犯君臣至嚴之分閫閾不限堂陛陵夷攸之罪一也盗柄鬻恩援引死黨父子兄弟自相戈矛伐異黨同門分越楚及京謫衡州有㫖令攸隨侍自當聞命就道乃頓跡滎陽積日不發既不順于其君復不孝于其親攸之罪二也朋比中官握臂交膝昵比恩私互輸誠欵推挽呼吸相助攸之罪三也幽燕之役開釁啟兵以方爭為恢復以並擾為撫定以營平檀之地捐之金人不念土地實為國寳且公肆誕謾以為不世偉績酬功之際超取上賞國公帝師一舉而委之偃蹇傲睨居之不疑攸之罪四也金人渝約詭謀已形藥師背恩逆迹又著帥臣將校章䟽迭來自去年秋杪中朝士大夫切切私語知禍必至而攸帷幄謀臣邉機在手縱使不敏覩形亦悟而秘藏覆匿不告于朝惴惴然惟恐前日罔功冐賞姦迹呈露至使金人藥師助叛畿甸為之繹騷两路罹其荼毒聖主宵旰生民瘡痍伊誰致之攸之罪五也攸既有必至之禍不告于朝不謀于君上矣乃且汲汲為妻孥念其家所蓄器皿若金銀首餙之類先自銷鎔為輓裝計及敵將至捲室而東去襁褓之子茍可愛者悉携以往猶偃然肆言曰得㫖扈上皇駕縱使當時懇告得命亦合留家屬京師與國分憂臣頃在外州見潤州人來云六夫人某日出某寺觀燒香六夫人與詔使待制詔使修撰某日過江而去蓋攸之妻與子也囬之日寔二月二十四日在上皇渡江囬鑾之後避危圖安反覆熟慮直至於是夫為君為宗廟社稷為百姓謀其忽如彼為妻為子為婢妾計其審如此人臣不忠復有甚于此者乎攸之罪六也上皇既傳位陛下則陛下神明之主矣凡戴天履地而為人者孰不稽首曰吾君也況為輔臣乎況前日職在樞機樞機寔本兵柄曰戰曰守此實司之可須臾離乎今外州都監小邑縣尉敵至而遁比之他官罪固加等若廟謨兵機所寄先衆而遁其法當何如哉攸之罪七也攸有七罪寔天下共知不獨微臣言之其前四罪縱付輕典在祖宗時亦合投荒其後三罪則匿兵秘禍殘我生民恤身謀家忘我祖宗蔑君臣之義擲大兵之柄自古人臣有此之大惡其可復容于覆幬之間乎若不早行誅殛其如祖宗何其如天下後世何昔唐五王不誅三惡陷唐室以再亂曾不知桃上之蟲若羽翼復生潜飛深宫大肆吞噬可不戒哉攸之姦猾詭秘公卿大臣有墮計中而不悟度其一二年必有為㳺説如許及門旋遂造室厠足有地姦計即行鈎引支黨同惡共濟蕭墻之禍事出意外是時愴悔哀痛噬臍何及臣愚欲乞陛下大明典刑以絶後姦如散官安置湖外之類誠不足以塞天下之紛紛取進止五月八日奉聖㫖可移潯州安置九月甲戌种師中敗于榆次死之河北制置使种師中軍于真定樞宻許翰怒其不進下書一日六七至有逗遛玩敵之語且責必解圍太原贖罪師中至平定軍乗勝復榆次諸縣師中屯于壺林去榆次三十里金人乗間來突諸軍以神臂弓射退之師中欲取銀賞軍而輜重未至故士心離散初師中約姚古張灝兩軍俱進師中屯于榆次之境而古灝不至甲戌金人羅索兵來攻右軍右軍先潰前軍亦奔師中率麾下死戰自夘至巳所餘纔百餘人身被數鎗裹瘡力戰又一時而死之年六十八姪沔招魂奉柩至京師上哭于禁中親製祭文云吁嗟虎臣公爾忘身遣内侍張實致祭贈嚮徳軍節度使開府儀同三司官其子孫族屬二十人功徳院賜名旌忠二字濬潜師中既死朝廷議失律兵將之罪中軍統制官王從道朝服斬于馬行市副統制張師正統勝捷兵方屯大名剳下知大名府李彌大斬之衆遂潰後為韓世忠招降者是也封氏紀年曰先是師中被詔以兵䕶送大金令歸至大名府復被詔以所統兵救援太原遂自天長登平定軍至夀陽縣凡數百里間未嘗見一金人師中以為金人知師至悉以遁去而我師肆行未嘗被堅執鋭五兵之其悉委傔負之將至石坑有報前軍已到石橋至太原止二十里中軍至石坑軍壘未屯有報榆次縣路金人兵馬將至師中曰必金人殘零將歸者令後軍去收捉轉刻之間金人大至我兵未措手間鐡騎來衝奔潰被傷不可勝數師中遂歿幸脱兵將十無二三矣節要曰金人圍太原多於汾潞兩路以拒王師蓋王師時在汾潞也不謂師中由平定出闗一旦去太原不逺一舍敵衆驚惶謂自天而下師中所失者既不能乗其不意攻其無備以破之則當急趨太原薄城而壘與張孝純王禀之軍相為表裏彼兵以尼堪之徒逺去而王師已到太原必不敢越太原重兵拒汾潞之師也由是汾潞之師自可進至太原則太原之解必矣而師中至是自謂孤軍深入復懷怯懼廽趨榆次為羅索所衝大敗死之自敵入攻两河河北更無一戰河東大小雖有數戰惟孫翊折可求种師中之戰有可以與敵相持勝負之理至于敗也誠可惜之故臣皆有説焉其餘焦安節敗于團柏冀景敗于交城楊志敗于孟縣解潜敗于南闗范瓊敗于介林劉韐敗于平定張灝敗于郭栅皆望塵而走或交鋒而退無足紀也靖康小雅曰公諱師中始斡里雅布既盟城下擁衆北還詔遣公將精甲三萬尾襲其後敵迄出塞不敢肆暴因令公留屯真定未幾趨公援太原時許翰同知樞宻院事昧于兵機以峻文䋲公不容頃刻公方欲規畫所宜并待餉饋稍給方乃鼔而西翰督責益急公太息曰事之不濟天也吾何愛一死不以報國耶乃由土門下井陘至榆次金人先屯兵縣中公遣擊走之遂入縣休士時軍中乏食三日矣戰士日給豆一勺皆有饑色翌日敵遣重兵迎戰招安巨冦楊志為選鋒首不戰由間道徑歸前軍叅謀官黄友戰没敵騎四集官軍潰散公獨與親兵小校數百摶戰左右以名馬援公請俱遁去公謝之曰吾大將也事至于此不當求生爾曹亟去無嬰敵鋒公遂力戰而死嗚呼古者閫外之事將軍制之然後可以責其成功趙充國百戰老將猶曰百聞不如一見翰腐儒不知兵多妄意遥度迫公使前不容措置又以餒餓之軍當素飽之敵非戰之罪也既不得盡其折衝之畧獨有一死以明其忠則公之死可不為之大哀耶詩曰金入晉陽帝為旰食欲摧其牙乃屬勲力狂生誤國不假頃刻賫無見粮進非乗隙公能死綏以明忠赤休有耿光耀而不息中興姓氏曰种師中字世儒師道之弟也以世廕嘗厯秦州司户叅軍授内殿承制環慶路第一副將擢知寧州邠州徳順軍環州守環十二年所至皆有治聲大明府路兵馬鈐轄知濵州後除河東路提舉保甲繼為環慶路馬歩軍副都總管從破夏人成徳軍加龍神衛四廂都指揮使房州觀察使方童貫用薛嗣昌等欲攻燕師中謂貫曰公此行得非以燕事乎貫曰無之師中賀曰幸甚朝廷政事大弊軍律不嚴浙民苦官軍之擾過于方臘方虞蕭墻之禍反用嗣昌之輩而欲僥倖契丹耶貫又曰無之後移師中為燕山路總管尋以不稱職降闕州防禦使提舉亳州明道宫後起為環慶路經畧使宣和末加崇信軍承宣使秦鳳路經畧大金入京率兵來勤王而大金已退師中見上上雖有以敵深入不擊為失䇿然不敢决䇿出戰加河北制置副使凡行移文字出于樞宻者則令追破敵出于三省者則令䕶出境莫之適從師中渡河上疏言尼堪兵已至澤州以後路允廸到尚須旬日若許臣自邢相間徑取上黨攻其無備破之必矣朝廷駭焉許翰逼之進兵遂至于敗傳信録曰尼堪兵圍太原詔种師中率兵由井陘道與姚古犄角應援太原師中進至平定軍乘勝復夀陽榆次諸縣不設備有輕金人之意又輜重犒賞之物悉留真定不以從行金人乘衝突諸軍以神臂弓射却之欲賞射者而行司銀盌秪數千秋庫吏告不足而罷於是皆憤怨相與散去師中為流矢所中死之其餘將士退保平定軍靖康前録曰先初二日之戰雖平仲輕挑失利然以四千人夜襲其堂堂之陣敵亦縁此稍慎初六日猶以三千銕騎渡汴河西王淵率萬人夾河放神臂弓敵再却而坐射死者六七百人自知勢非前日之比遂决意北歸乃進兵南向識者知其為遁去之計廟堂諸公方大恐惧又增送金銀繒綵其車相望于道初七日康王歸自敵營肅王繼往駙馬都尉曹晟侍行初九日斡里雅布縱火焚其寨初十日北去嗟夫种師道之來既不獲設施于城下賊退之日种師中以三萬騎尾其後俟半渡而擊之十一日敵兵去絶此亦發兵隨往是夜有㫖取种師道制度収兵還京議者罪綱之貪功妬能而為此遂使二种重兵逺來不克畧行其智識者為此扼腕敵既退語於衆曰料南朝商量亦須經月方有定議乃置玉帛子女于中軍以諸國兵衛之驅擄之民在左右兵騎為殿按轡徐行殊無懼色後數日朝廷遣馬忠范瓊防送又數日令种師中以二萬騎屯滑陳兵河上不得輙度西兵既逺來而不獲逞衆口喧然种師中擅𤼵三千騎過河繼而得㫖盡行至趙而及之宻院再追三將兵囘河上敵復抄掠所過之邑及被㫖許令追襲而敵之輜重已出境矣三將追至真定敵雖未行吾之大軍往復奔馳疲薾之甚豈可接戰所以僅能驅追出界非諸將之罪也若于是時就真定犒設降詔諸將諭趍并門誰不效死彼廟堂諸公曾不推原功罪貶師中之秩使自效以贖過一如待姚古者此所以取榆次之衂也奉使王雲囘至闕下言金人欲得三鎮罷兵吳敏不從罷雲報使先是朝廷以姚古种師中黄廸敗衂乃遣王雲入使金國至是日雲至闕奏上皇言金人亦頗厭兵只要三鎮租税效闗南十縣舊例限半月復到燕山仍要坐到税租嵗計銀絹數目及要三道使命往三處詔諭從所請即便解兵仍不得爽約雲日夜奔馳凡六日至京具奏上大喜顧問羣臣可否而雲與太宰吳敏素不平遂沮雲請朝廷既不從請遂差雲出知鄧州雲再三論列利害言朝廷既嘗許三鎮誓墨未亁豈可變盟今斡里雅布俯從雲言云中國非金人所處之地譬猶吞舟之魚蕩而失水則蟻能害之吞車之獸介而離山則蟻能嚙之盖居非其所也然貴朝所以欲三鎮二十州者雖得其地不過租税而已不若效闗南之地令南朝嵗上税租此萬全之計也雲數請求乃肯從説願相公熟議敏曰斡里雅布既與主上立盟囘戈之後反陷隆徳掠我子女焚毁廬舍是金人先已渝盟三鎮不與固以宜矣雲曰雲嘗語此於斡里雅布斡里雅布云尼堪所領我之後軍後來應軍期所過州縣不伏即攻隆徳府過澤州尼堪未知兩國講好後既得我令㫖及貴朝移文即便北去太原専候交割之使雖間有刼掠之事乃邏卒爾兩國必欲講好小事勿論雖租税之請自有部籍早上其數雲即還朝敏曰公為中國臣子堅為敵人耶主上已嘗降詔諭天下百端沮雲不報十三日戊寅道君還闕御紫宸殿受賀道君皇帝還闕有㫖太上已還宫可擇日御紫宸殿百官稱賀十九日甲申姚古兵潰于盤陀太原圍急先是詔諸將解圍河東置制使姚古及副使种師中採知金人兵少不知其詐也於是古將兵六萬師中將兵九萬約古自河東師中自河北日行四十里赴太原古至威勝軍師中慮古先到成功乃日行八十里金人探知以輕兵拒峻使古不得進以重兵迎師中師中敗于榆次死之金人進兵迎古遇于盤陀王師皆潰禆將焦安節在威勝軍虚傳金人且至勸古退至隆徳府又勸古遁去二十五日庚寅詔求習武藝知兵書人詔諸路軍州府監有習武藝知兵書人仰知通不限數保明解發赴闕朕將親䇿于廷量材拔用其籌䇿深逺藝能絶倫當不次升擢在京武學生仰禮部擇日考試具等第以聞不係在學人亦許自陳收試䇿弓馬優異與推恩其大中大夫及侍從官至路分都監以上奏舉武舉人依法施行六月十九日太常寺主簿劉定言伏覩近有㫖令府州軍監有習武藝知兵書人並解發赴闕親䇿于廷切惟武藝之人間有不知書者州縣慮其不文無以應大庭之問不敢解發願詔中外武藝精强而不知兵書者令付所在投狀州縣閲試别作一項解發殿前司按試藝能使之前詣邊陲收立功效以稱疆邊却敵之用從之令殿前司候解發到按試武藝精熟人於崇政殿引呈賜劉韐束帶戰袍勅劉韐屬者金人入侵神人共憤頓兵朔部意在三闗賴卿智謀能止畫界之吏不墮强敵計中而遁迯訖用安堵函封來上朕甚嘉之唯功難成唯時易失勉奮忠力庶保令名其體朕懷勿辜眷屬今賜卿金帶一條金花戰袍一領茶藥合各一銀金合至可領也故兹親筆示諭想宜知悉夏熱汝比平安好遣書指不多及曉喻潰散將佐指揮勅中書省刑部狀承河北河東路宣撫司使劄子河北東路宣撫司使奏勘㑹种師中下潰散統領將佐使臣已降指揮並與免罪限十日首身軍前自效如限滿不來出首並依軍法施行近據都統王淵申捉獲潰散使臣忠訓郎杜義及雲檀將弓箭李及所騎官馬出賣已差官并兵級管押杜義赴遼州宣撫使劉韐軍前交割依軍法施行外訪聞尚有未曾出首將佐使臣奏聞事奉聖㫖限今來指揮到日更與再展十日許令所在州軍出首免罪特與支破逓馬驛劵疾速赴軍前自效候立功優加推賞如今來再限滿日更不首身當議取見姓名重立告賞收捉候獲定行軍法仍多出榜文曉諭施行司諌陳公輔上言乞戒大臣究心邊事臣竊聞河東用兵不利陛下聖慮憂勞臣子之心夙夜不寜然臣竊料之此未必不為宗廟社稷福也伏惟少寛聖心容臣言之蓋有難則惧無難則怠人情之常也朝廷日見河北金兵出界雖未解圍幸其師老必自解散遂至稍緩其事廟堂大臣相謀議者多不急之務或窮究往事或經營私意論經術是非究禮文詳畧至于兩路邊事皆不究心緩急失宜先後倒置内外人情雖知秋冬在近深可為憂然非朝廷用事之臣徒憤嘆終日無如之何也今若不縁用兵不利往往遂以為無事因仍媮惰至秋冬萬一强敵結集諸部空國而來以助河東之師則吾之倉卒無備又復如前日矣可不慮哉臣愚伏望陛下因此一失深戒大臣凡不急之務一切暫罷専以河北河東兵事為先經營畫置多方應辦仍仰各盡所聞勿懷異意并令今後臣僚上殿亦湏先及邊事陛下留意聽納不厭其多或有可行盡付三省樞宻院令斟酌施行夫漢之所以勝楚以屈羣䇿而愚者千慮必有一得勿謂羣臣之言皆無可採即陛下若今如此時日夜圖之則不徒以濟今日之急將來秋冬亦不失備矣臣故曰此未必不為宗廟社稷之福也臣區區憂國之言望陛下不以臣愚弃之豈獨臣之幸哉三朝北盟㑹編卷四十七
