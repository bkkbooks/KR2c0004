  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0004_WYG_100-1a, image: WYG0350/WYG0350-0774c.png}
body:
  text: 三朝北盟㑹編卷一百宋徐夢莘撰靖康中帙七澤孫偉靖康野史曰靖康元年閏十一月金人陷京師駐軍兩郊聲言欲縱兵洗城靖康皇帝為中國生靈屈已出幸青城守禦使簽書樞宻院張叔夜以二年二月七日集在京文武臣僚一命以上於秘書省連名書牒請立故太宰張邦昌為君傳等祈哀金帥申敘國人左袒之意往返六七竟執傳叔夜於軍中下開封府行其曰日集者親録官封名氏有異意者送軍中斬首以徇尹王時雍奉其令作大卷以次授坐人御史中丞秦檜願至軍中論列衆始愕然是時集者數千人檜既行大將范瓊亦挾偽命以佑時雍乃噤黙奉令金帥因其牒詐為詔冊命邦昌僭即皇帝位國號大楚奉金帥正朔稱天㑹五年三月七日某嘗侍郎祀朝元正宣和六年元㑹大官下食料至八十員古今朝請之盛所未有也雖大臣黷貨官寺分權禮義消亡亷恥廢缺法度崩弛風俗敗壞衰亂之形見已久矣未至一日中文武士庶千人皆如達奚珣輩畏一死而舍大義也竟為時雍瓊脅制有不能伸者是時其䝉恩賜告聞於江上私竊怪之毎遇靖康二年二月在朝之士必問焉建炎二年客鼎州郡人朝請大夫鍾翺曰是日時雍以大卷轉相授皆屏氣書惟謹其間亦有飲泣悲吁者第不敢吐一辭也忽下坐一諫士面目嚴冷者厲聲曰二百年趙氏天下豈可付他姓吾乃異意者請如所令其右汴士大慟曰吾請同行時雍詰之自列名氏曰奉直大夫寇庠朝請郎高世彬所以志也紹興二年宜州遇淛東徐錢言大夫張僅者堂吏也是日宻搆秘書省所集姓名次為一編緘於篋中乃取平生所受官爵告牒悉投於火自為布衣五月間今皇帝即位於南都挈舟東下欲上其編未果而病卒又遇龍眠李覺知庠為山東人强毅倖直非碌碌者於是質以所聞為無疑矣向使檜之忠憤兼善坐人則庠世彬必將越應之數千人亦必從而和之使壯士擒智士殺時雍然後羣謼斬南薰門而出俱詣軍中又使辨士以禮義廢興曉金人彼雖悍强豈敢殺數千忠義以楚易宋邪檜之名壓嵇紹千萬人矣然則庠世彬僅雖不死節其志亦可嘉也殆聖人所謂狷者矣某泣血謹記以俟太史採擇焉小臣孤憤野録總敘曰政和中邊臣導遼人李良嗣李善慶歸於京師宣和初金人執遼主疆吏來告詔以大中侍童貫為河北河東宣撫使經畧北鄙蔡攸輔行四年十月遼蕭后稱藩於我時金人滅遼遂稱金國十月入幽州貫欲以為己功而廢格手詔十一月我師入幽州制詔幽州建燕山府後二年金人陷忻代州太原府遂渡盟津薄京師明年三月七日金人刼立偽楚是年四月一日太上皇帝靖康皇帝北狩五月一日上即位於南都九月遂幸揚州某待罪江上得太學生丁特起所著孤臣泣血録又從諫官袁彦範得痛定録武廣嘗胆録已復有人致李綱傳信録及太學擇術齋記史畧者荒誕參錯疑者惑之大扺不能悉著姦臣蔽主誤朝之實使忠義者日夜痛心疾首大懼歲月寖逺是非混并恐後世不免以為訕也某老矣不能從志士仁人復不共戴天之讐刷四海九州之恥區區孤憤無所控懸乃取諸人所録以日係月編而次之其事則因於舊其辭則紀以實記事非敢私為之以俟他日太史放失云耳題曰小臣孤憤野録云鴻臚寺主簿鄧肅靖康行曰金人突至心膽寒揮鞭直指入長安南渡黄河如履地西有太行不能山帝城周遭八十里二十萬兵氣睚眦旌旗城上如雲烟腰間寳劒如秋水雪花一日放濛濛皂幟登城吹黑風我師舉頭不敢視脱兎放豚一掃空夜起火光連鳳闕征鼓砰轟砍欲裂斯民嗷嗷將焉之相顧無言惟泣血僕射何公叨龍墀閉門相臣詎噬臍疾走軍中劇命列猶將一死生羣黎高風洗空大帥怒九鼎如山不復顧郊南期税上皇輿截彼黄流動歸去陛下仁孝有虞君忍令萬騎驚吾親卜龜太史自鞭馬一出喚囘社稷春敵人慕徳猶貪利千乗載金未滿意釵釧却為六宮留大索居民幾卷地六龍再為蒼生出身磨虎牙恬不恤重城突兀萬騎來杳隔鑾輿今十日南門赤子日軿闐爭掬香膏自頂燃忿氣如雲淚如雨漫漫白雪無青天太王避狄空金帛坐使卜年踰八百天聽端在人心耳蒼蒼誰云九重隔㑹看春風舞赭黄萬民歌舞喜欲狂天宇無塵更瞻北旄頭落地化頑石金人據西京有題詩於壁曰世變時移兩忽然空餘洛邑舊山川兵屯宮殿閙如市民靜閭閻冷斷烟漢後幾經成大火周時初建取中天興亡令我掀眉笑不悟邯鄲枕上篇高世則書趙子砥燕雲録曰靖康初洛陽城高人有詩云藝祖憲章斯道墜迎門户户有人開清晨山後九州沒日落河頭萬騎來地近蓬蒿堆白骨巷無人跡長蒼苔可憐司馬碑猶卧誰奏伊公一笛哀遺史曰有孫賣魚者楚州人以賣魚為生有買者孫賣魚必以蒲穿魚之眼而言曰只為爾愚後屏去妻子為道人言人禍福多應宣和間召赴京師未至太上遜位孫賣魚遂止於亳州太清宮是日孫賣魚方在市中忽佯狂奔走入太清宮視防虞桶内撒底結氷乃取磚石急擊之而大呼曰氷厚打不開凡呼數十聲然後號跳大哭而去人皆莫曉有漫記其日時者後知京城陷日時適相契亳州始異其言氷厚打不開者蓋寓言兵之厚也三朝北盟㑹編卷一百
