body:
  text: 三朝北盟會編卷五十七宋徐夢莘撰靖康中帙起靖康元年十月二日甲午盡十六日壬寅二日甲午王雲至真定府見斡里雅布已圍真定引雲看攻城三日乙未种師道除河北巡邊使未行再命河東宣撫使以疾召還京師是時師道己疾在鄭州疾篤昏塞復蘇部曲請留公曰念臨軒之語忍不進耶抵河陽疾甚朝廷聞之亟召還京師宣醫不輟五日丁酉夏人冦懷德軍通判杜翊世禦退之幼老春秋遺史曰夏人入冦奄至懷德軍城下通判杜翊世力請知軍劉銓率衆死守運火牛發石機擂木泥毬擊之翊世身自撫循士皆感激奮勇箭無虛發賊死傷萬計遂忽引去翊世字元弼成都華陽人纍官至朝議大夫徽猷閣侍制宣撫使參謀官折彥質授龍圗閣直學士河北河東宣撫副使六日戊戌卯刻有流星東南流光數丈斡里雅布陷真定府安撫使李邈死之兵馬都鈐轄劉翊力戰自殺初劉韐為安撫使以守真定既而除韐宣撫副使韐又辟真定府路總管王淵鈐轄李質歸于宣撫司朝廷乃以樞密副承旨李邈為真定府路安撫使邈優于吏職而拙于應變且新至真定人心未附邈知金人必攻真定乃發三十四奏告急于朝廷請援皆不報倉卒之際金人圍城百姓之情不親故金人不旬日而拔之邈被執金人纍諭邈不屈被殺趙子砥燕雲録曰知真定李邈城陷之日金人執見斡里雅布使之跪曰本朝無此使之拜又云比肩難當使之飲曰我非臣僕欲脅而從之斡里雅布止之曰其人髙節不可屈致于是與之伴食同飲斡里雅布南下欲與偕行邈辭於是押至燕山節要曰真定之陷也邈已抗節于斡里雅布故為斡里雅布執之燕山偽相劉彥宗逼邈不從復逼邈固不從乃以好語慰之復誘以官職啖以金帛邈終不為屈仰天痛哭以死自矢彥宗憾之聞于尼堪命彥宗殺之邈談笑赴市至死不改遺史曰建炎初旌褒死事之臣贈邈節度使制曰朕思復艱難之業永懷將帥之任禁暴安民雖未成衛社稷之效忘軀徇國庶得死封疆之臣又曰方金師之入塞當孔道之雄藩邈無唇齒之依坐失金湯之固拘原方力尸裹莫還不貽隴右之羞迄並睢陽之操靖康小雅曰吉州防禦使真定府路兵馬都鈐劉公諱翊靖康元年秋八月金人以三鎮不可得復兩道興師入攻斡里雅布之師十四日入塞以衆攻廣信軍保州不克遂越中山而攻真定帥臣觀察使李邈措置乖謬九月六日敵遂登城邈為敵所囚時公為鈐轄以身率衆晝夜摶戰城上先是敵攻北壁公力拒之至是敵偽移攻東城邈復趣公往應之力攻兩日一夕移攻具還薄北城城中不知也黎明敵忽鼓衆慿堞而上城陷沒公猶率衆巷戰麾下稍稍亡去公顧其弟曰我大將也其可受敵戮乎因䇿馬挺刃潰圍欲出而諸門皆為敵守矣遂之孫氏園山亭中解絛絶脰而死嗚呼古之命將未必皆武夫馬援欲以馬革裹尸方謂能處死矣真定之亡罪在李邈公知忠孝之節故不憚殺身為人臣師範亦可謂有古人之風矣詩曰將軍死綏古人所長有如劉公與城俱亡兵拿常山公以身當生竭其勇力挫戎行天未悔禍敵勢益張公雖瞑目萬古傳芳尼堪斡里雅布會於平定軍議再入侵節要曰尼堪自太原東之平定斡里雅布自真定西之平定以議再入京闕右監軍烏舍曰河東已得太原河北已得真定兩者乃兩河領袖也乘此之勢可先取兩河俟兩河既定徐圖過河以取東京不為晚矣今若棄兩河先攻東京茍有不利則兩河非我有也兼太子昨已到京不能取之斡里雅布未有語尼堪怫然而起以手去貂帽擲之于地謂諸將曰東京中國之根本我謂不得東京兩河雖得而莫守茍得東京兩河不取而自下昨東京軍不能者以我不在彼也今若我行得之必矣又舒右手作取物之狀曰我今若取東京如運臂取物回手得之矣斡里雅布欣然稱善諸將不敢沮之入攻之計遂決于是尼堪與斡里雅布分歸本路約會於東京馬擴自真定府獄中脫身西走山寨結集屯聚先是馬擴遭劉韐誣以謀反置以獄中得旨委提刑司置院根勘提刑司置院差深州兵曹畢璠制勘方結案而韐為河北制置使朝廷恐本路官觀望别委京東路勘時已七月矣擴寄繫右獄九月金人再圍真定城陷擴猶未知是日將午而饋食者不至遂迤邐至門則寂無人猶有一老兵曰亷訪何不去敵人已入城矣擴入獄告諸囚盡為去其徽纒趍出擴易服竄西山和尚洞山寨結集兩河義兵各據寨柵屯聚自保李若水上乞救河東河北疏臣自深入金人亂兵中轉側千餘里回至關南凡厯府者五厯軍者二厯縣者七厯鎮寨四並無本朝人馬但見金人列營數十官民廬舍悉皆焚毁瓶罌牖户之類無一全者唯井陘百井夀陽榆次徐溝太谷等處僅有名存然已畨漢雜處祗應公皂皆曰力不能支脅令拜降男女老幼例被陵鑠日甚一日尫殘窮苦狀若幽隂間人每見臣知來議和口雖不言意實赴訴往往以手加額吁嗟哽塞至于流涕又於山下見有逃避之人連綿不絶聞各集散亡卒立寨柵以自衛持弓刀以捍敵金人數遣人多方招誘必被勦殺可見仗節死義力拒金人之意臣竊惟河東河北兩路涵浸祖宗德澤垂二百年昨因蔡京用事新政流毒民不聊生繼而童貫開邊燕雲首禍搜膏血以事空虛丁壯疲於調發産業蕩於誅求道路號呼血訴無所塗炭桎梏誰其救之陛下嗣位之初力行仁政獨此兩路邊事未已今戎馬慿陵四行攻陷百姓何知勢必脅從而在邑之民無逡巡向敵之意處山之衆有激昻死難之心可謂不負朝廷矣哀斯民之無生服斯民之有義愧起顔面痛在肺肝望深軫聖衷哀痛之詔慰民於既往決擇之計拯民於將來上答天心下厭元元之望十日壬寅詣龍德宫上夀先是上皇謂金人必再入京闕請帝留京師治軍國事欲自往西京治兵宰相吳敏勸上言不可也上皇向在南方已有截留諸路兵之意今幸歸京師陛下問安視膳全孝道足矣豈可以軍旅之事纍之乎至是天寧節詣龍德宫上夀上皇滿飲乃復斟一杯以勸上而大臣有躡上之足者上堅辭不敢飲而退上皇號哭入宫翌日置黃榜于龍德宫前捕鬬諜兩宫語言者賞錢三千貫白身補承信郎自是兩宫之情不通矣羅索陷汾州守臣張克戬死之先一日羅索使人來城下言知州已下可出城拜降無使人民受殺戮知州張克戬令人射敵云有死無降任你攻城敵遂退歸云代州太原尚自為我攻城來日定為我城羅索親提兵攻城自早至已其城遂失守臣張克戬既知城失不與敵俱生乃具朝服望闕號拜言臣非不為朝廷守城以張灝帶兵走城上無人致城陷沒臣知不能出見陛下唯以死答朝廷遂乃自縊陶宣斡河東逢敵記曰靖康元年八月十二日余被差宣撫司幹辦公事到覃懷十三日參李宣撫十七日差往河東汾州觀河東訪察使兼制置軍馬張灝軍并斬統制官冀景并至汾州介休縣見置軍馬王以寧喻李宣撫意令與威勝軍范世雄合為一軍八月二十日至介休縣王制置凌晨已起發往威勝軍某即追路至五十里方見王制置具傳合軍之意王制置云介休縣闕錢糧六七日煩公在此截錢糧數日某逐日自介休縣往義唐州截糧九月初一日起發宿孝義縣初二至汾州才入城即見官軍枕藉于路者不可勝計問之皆起云是重傷人輕傷人疾患人重傷輕傷皆不被賞給遷補疾患皆無粥藥仍尅除附帶軍前拋棄糧食纍日無食士每日支米二升半止得一升八合請米錢七十文銅鐵相半是時官中已不使鐵錢但以此充數耳或攢聚數日闕乏止支錢會子一紙錢會子止得三四百今九月霜寒諸軍賜衣不至有赤露被堅執鋭者余即語制置使張灝云戰士如是狼狽張無以對始灝軍汾州鄉兵正兵約七八萬解潛正軍威勝軍地名護甲鄉兵正兵約九萬先七月初一日張灝遣統制官折可求副統制張思正統領軍馬解圍太原凡七日軍行三十五里至地名郭柵營於中下四髙迫窄之地中有溝澗探諜不審卓望不明大軍止為一營十一日早賊兵至先擊左軍稍勝又擊右軍右軍不勝突入中軍是時兩統制與應副錢糧向運闕三人帳中早膳間敵騎突入流矢中向運闕死兩統制甲軍無探諜無卓望忽見敵幟潰於軍中元負器甲鎗刀皆未釋縳軍中驚潰兵馬填塞坑谷不知其數拋棄金銀錢糧縑帛以數十萬計先一日護甲地震殷殷如雷聲次日軍壞解僅免竄歸藍田宣撫司聞止解軍前自八月十四日張灝遣副統制張思正統軍馬由文水縣解圍太原張灝約張思正十五夜携具入軍中相見思正答云軍中無此禮灝十五夜携具入軍中相見啜茶列杯盤聞軍中虛驚喧亂張灝急索馬馳歸須臾軍起潰散傷損千餘人矣十七日至文水統制官李安并其子忠信先登殺獲幾二三千不暇取級城中見官軍至歡呼鼓舞皆以壺漿相餽既得文水張思正更不入城留其軍保守貪切希賞遂徑趍太原未行十八日敵兵清曉至人馬困乏所負器械皆未釋縳恐我軍先動遂先鼓噪喊三聲以恐我我軍不動敵兵遂至始發一隊自西南來相繼不絶而至我軍走山山後絶壁我軍橫死者不知其數軍皆四走已在敵圍中敵説令降皆脫剝赤露然後敲死得免者十無三四使臣將佐百餘員金銀錢糧縑帛拋棄以十餘萬計後軍統制冀京不見敵先走張灝軍一次陷郭柵一次陷文水所失七萬餘衆余被宣撫司指揮往彼點勘軍馬止有八千餘人馬五百匹每敵至城下杜門謹守不敢出戰敵兵恣行剽掠無有救者文水之舉先約許孝烈軍尅日並進至日失期張灝軍有赤露被堅執鋭者有賣軍器者有鼓唱引去者有使臣妄冒占放者將佐輩日事杯酒更無紀律汾晉一帶已失支梧余於張灝處呈劄乞分擘軍馬于官道劄寨照應防護糧草重傷輕傷人速行㨂選犒賞如重傷不堪出戰人權發遣向裏將養免耗軍食病患人安泊于空間屋宇內差使臣點檢粥藥醫治病并諸軍犒賞支俵三次皆不被受及詢之衆軍有云一次得絹二尺半錢二百一次不得有言俱不得者張灝云俱是統制官並請去統制官支散不明余觀張灝軍種種狼狽欲亟馳還宣撫司具言之九月初四日早别張灝太守張克戬運副李百宗欲行張灝留飯罷既行才出城門張灝張克戬運副李百宗欲行自後相送望東北敵騎塵頭稍大余不敢返遣價傳語云東北有塵了且亟行遂加鞭至晚抵孝義縣民云城西方且厮殺何故官人來此余亟馳入城遣價於城西探統制官田秀并本縣尉果與敵戰各無勝負抵暮欲歸是日汾州發重傷人千餘人於晉絳就醫養皆為敵所殺初五日至初九日敵馬四散於村落中劫掠人莫敢出初十日早張灝遣統制官李安并田秀至回牛嶺把截至孝義縣未敢前方遣探未至至未後探至回牛嶺一帶無人馬可以行矣知縣王藝云某賤纍輩凡三次皆為敵攔截不可行今輒欲附後乘如何余云甚好至申時余與田統制李統制王宰宅眷俱行百步後兩探騎至適義唐川有敵馬劄寨遂復回由西南趍溫泉縣宵行七十五里才曉至溫泉縣城中一空初八日已為敵破殺者六百餘人稚子拋棄於道死者亦數十輩縣宰簿尉俱被執諸官廳悉狼藉籠篋書帙紙劄亂于廳堂間余與田統制李統制於監務廳早飯罷問路村人云官人不可從此行敵人見執溫泉縣官員在一山頂飲酒此去數里李統制問敵人多寡村人對云約有三百餘欲打汾西縣余謂李統制云賢部下有一千二百人八十餘騎田統制下有一千四百餘人八十餘騎共一百六十餘騎三千六百餘人軍聲亦不少可以踐起塵頭徑趍汾西縣縱未見敵交戰亦足以救護虜掠李以為然云憩此少俟田軍坐移時田軍不至余謂李曰遣承局促之凡遣三兩輩約一餉間承局繼至云塗中無田軍問一行人云一項人馬已趨石州路去矣余與李愕然相謂曰制置司差田軍往回牛嶺把隘更不相關白不稟制置司指揮趨石州豈有是理李云事既如此日色已晚四野無人居止不若速回數里由隰州路行至平陽府出頭即整軍起行自汾西縣至隰州一帶人户驚移盡起止存空屋余與李日食虀煮粟粥隨行人兵更無物食皆飲水足重不能行十四日絶早至隰州城外城上皆挂搭守禦太守藍安國字伯康躬親開門出城相接余李即入謁之問守禦次第曰人兵止有三百餘騎人二千人糧有一月弓箭鎗弩之類悉無却出城于行衙安下令諸軍飽食憩歇一日是日午未間忽報制置使張灝運副李伯宗由石州路今晚宿隰州余云二公何故忽來至申後運副李伯宗至余即謁之問所以李漕云初十日侵夜張制置并張統制聞破太原不相關白不令汾守知拽軍馬起行某即出來張制置幾中流矢一已中張制置右伴使臣張即馳馬走云張制置欲往石州渡河過硤西某自來欲至絳州支撥錢斛是時張制置張統制拽軍馬行城中官吏居民婦女突關而出不知其數張守知遂差人捉縳居民婦女入城官吏居民悉竄婦女多為所執是夜西北赤色如血至二更方散李漕云赤色如是纍日矣尼堪留其將萬户尼楚赫守太原率兵下太行取孟州渡河入攻斡里雅布留其將副統碩哈遼東漢州萬户韓慶和守真定率兵取黎陽渡河入攻尼堪再攻威勝軍吳革回闕三朝北盟會編卷五十七
