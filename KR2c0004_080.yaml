body:
  text: 三朝北盟㑹編卷八十宋徐夢莘撰靖康中帙起靖康二年二月十一日辛未盡十三日癸酉十一日辛未皇后太子出詣軍前宣和録曰是日金人取皇后太子甚急午間皇后太子出門車凡十兩百官軍民奔隨號泣拜於州橋之南攀轅號慟往往隕絶於地至南薫門太學諸生擁拜車前哭聲振天中有一人大哭擗踊於上其他往往皆氣塞淚盡無能哭者時已薄暮將近門猶聞車中呼云百姓救我金人在門下者迫行范瓊先以危言讋衛士然後益兵擁皇后太子出都人憤疾又曰先是正月上再幸敵寨以孫傳兼太子太傅以保䕶東宮及軍前索皇后太子傅欲留東宮太子不遣宻謀以黄金五十兩使人匿太子於民間别以狀類太子并宦官二人擊殺并戮當死者數人以其首同屍并宦者屍送至軍中告以宦者竊太子欲投軍前都人争之擊殺宦者誤傷太子因以兵討殺其為亂者欲得人以死替太子自初七日至十一日無當之者傳撫膺大慟曰不謂中國無一男子且上蒙塵託孤於傳豈可自脱分付於人吾太子太傅義當與太子同死生今主辱臣死之時金人雖不索吾吾當從太子出求見二帥以義責之以祈萬一然後就死衆偉其言時方在皇城伺候太子同出傳之子因來省傳傳叱曰使若勿來而竟來耶吾分死國矣雖汝曹百輩來吾心不可移也叱使速去勿亂人意傳之子亦曰大人以身徇國某何言哉願大人力保太子遂以留守司等亊付次官吏部尚書王時雍有頃傳從朱氏太子至南薫門求見二將守門軍人曰軍中惟欲得皇后太子留守何為出耶傳曰主上出辱太子復出我宋之大臣且太子傅上既不回當以死從太子幸為速白元帥軍人許為稟傳之是夜宿門下不動黎明軍人開門以尼堪命召傳入十三日并家屬取去遺史曰吳革見太上皇及六宮皆出城悲痛不己巳入内白留守孫傳曰上皇業已出城乞力留皇后皇太子庚午革頓首言二帝出郊駕未必回願陛下堅避以固國本孫傳曰何辭以拒之革曰有一内臣貌類太子金人或邀請則抱以登車出朱雀門宻諷百姓邀畱不可則墮之車下以死告奉尸以往仍以賑饑乏為名招忠義勇智之士結為隊伍太子㣲服車中潰圍出不從皇后及皇太子遂行先是燕王越王出門有百姓攔截稱國中無主欲畱之不令去為范瓊所戮是日瓊恐百姓喧亂乃領兵往來内前告諭百姓曰趙氏已失國軍前見議别立異姓今晚皇后及皇太子盡出不得邀阻迨晚皇后及皇太子同車載以行百官萬姓哭送於道太學諸生亦哭送於門太子傳令致别哀號之聲震動天地是時宮嬪輩有徒歩隨車者自皇后而下止有被服隨行士庶旁觀心胆殞潰十二日壬申尼堪召孫傳張叔夜赴軍前遺史曰張叔夜赴軍前見尼堪召叔夜紿之曰孫傳不立異姓已殺之公年老大家族繁盛豈可與孫傳同死耶可供狀叔夜曰累世荷國厚恩誓與國家俱存亡實不願立異姓迫之數回終不從唯請死而已金人皆義之吳幵莫儔自軍前入城議事是日晚幵儔以二將文字來留守司曉示榜今月十二日吳承㫖莫内翰自軍前來齎到大金元帥府指揮請疾速勾集在内大小官員不限己未共議并僧道耆老軍民等更訖説諭商議共並舉張邦昌即使連狀各於本銜親書其名背後名下押字仍於年月紙縫用在上官印限十三日申上便與册立入京如别有異見别具狀申只不許引惹趙氏若别舉賢人者亦不許阻敢有逼留不赴議所者當按軍令是夜三鼔御史臺告報文武百官不限大小使臣雖致仕在京宮觀及僧道耆老軍民班限十三日絶早並赴宣德門集議内省官員不來具狀申元帥府依軍法無請住滯右録二月十二日夜元帥府指揮在前今曉示各令知悉十三日癸酉開封府榜准畱守司劄子勾集文武官員僧道軍民並赴宣德門集議開封府榜留守司劄子今月十二日晚吳承㫖莫内翰自軍前回傳二元帥台㫖令留守開封尹連夜勾集文武官員雖致仕在京及宮觀人僧道耆老軍民於今月十三日夘時並赴宣德集議竊慮混雜無以分别劄付本府將文武百官及致仕在京宮觀人並分撥付秘書省僧道赴宣德門外西闕亭軍官赴大晟府集議不管稍闕湏至指揮右出榜宣德門張掛各令知悉百官赴秘書省士庶赴東朶樓軍員赴大晟府集議推戴張邦昌事百官各趨赴既畢集仰即閉秘書省門外環以兵乃令連銜舉薦張邦昌間有先預知其意不赴議所者王時雍又令范瓊把省門以舉薦張邦昌事説諭軍民等於内前府吏台奮呼令速具名銜推戴異議者押赴軍前而軍民耆老僧道回顧無言唯唯而退獨太學諸生等以某等所見意殆不然瓊慮軍兵視效乃髙聲折衆曰當今為忠不可只可為孝遂令同人歸學時孫傳張叔夜已出獨時雍主其事晚百姓饑但見出白紙十幅令書職位姓名而退狀詞秘之不以示衆薄暮幵儔繳狀以出左司員外郎宋齊愈書張邦昌字以示衆遺史曰金意欲立張邦昌令吳幵莫儔齎文字入城中令百官僧道耆老等共議别立異姓以治國事並不得引惹趙氏開封府御史臺集百官於百官省衆議文臣承務郎武臣承信郎以上悉赴議乃集議於皇城司王時雍等以下皆在已冩推舉狀草但空姓名未填衆皆議未敢發左司員外郎宋齊愈自外至問時雍舉誰時雍曰金人令吳幵來宻諭意舉張邦昌今已冩下文字未填姓名齊愈因記金人先已有文書云請舉軍前南官謂是邦昌無疑乃取筆書張邦昌三字將示時雍曰是又示衆議官皆無語乃並冩下文字出城去朝野僉言曰金人榜云右孫傳等舉前太宰張邦昌狀在前疾勾集在京大小官職軍民僧道等並於秘書省集議舉張邦昌即便書御位姓名押字仍於年月日紙縫用官印限不過此月十三日申上便與册立入京不許引惹趙氏若别立異姓具狀敢逗遛不赴議者當按軍法一時百官觀是榜無不涕泣御史中丞秦檜獨狀繳申論列謂邦昌輔相無狀不能盡人臣之節以釋二國之難不足以代趙氏情願乞押赴軍前面論檜狀曰右檜竊縁自祖父以來七世事宋身為禁從職當臺諫荷國厚恩甚愧無報今大金擁重兵臨已㧞之城操生殺之柄威制官吏軍兵等必欲滅宋而易姓檜家盡死以辨其理非特忠其主也且明兩朝之利害耳趙氏自祖宗以至嗣君一百七十餘載功德基緒比隆漢唐實異兩晉頃縁奸臣渝盟結怨鄰國謀臣失計嗣君誤主䘮師遂使生靈被害京城失守嗣君皇上致躬出郊求和於軍前兩元帥既允其議已布聞於中外矣且空竭帑藏居民之所積追取輟鑾輿服御之所用割交河北之地恭為臣子今乃變易前議自欺斯盟致二主銜寃廟社將傾為臣子之義安忍視而不論哉且宋之於中國號令一統綿地數百里覆載之内疆域為大子孫繁衍充牣四海德澤加於百姓前古未有興亡之命雖在天有數焉可以一城而决廢立哉昔西漢絶於新室而光武乃興東漢絶於曹氏而劉備據蜀唐為朱温簒奪而李克用父子猶推其世序而繼之盖繼世之後德澤在人者深其基廣業巨勢雖逓降四海英雄必起天下之士不敢窺其位所謂基廣則難傾根大則難㧞此之謂也西晉武帝因宣景之權以竊魏之神器德澤在人者淺加以恵帝昏亂五王争柄自相殘戮故縁石勒得以據中原猶頼王導温嶠輩輔翼元皇江左之盛踰西京石晉欺天㒺民交合外邦以簒其主其於天下也得之以契丹失之以契丹况小主失德任用非人而忘大恩曽未德澤下及黎庶特舉中國藩籬之地以賂敵人天下其思之哉此契丹之所為能滅晉也宋之有天下九世宥德比隆漢唐實異西晉大金廢立之議可不明天地之意以攷古今之迹哉切觀大金今日計議多前日大遼亡國之臣畫籌定計所以必滅宋者非忠於大金也假滅大金以報其怨耳曾不知滅大遼者大金大宋共為之也大宋既滅大金得不防閑其人乎頃上皇誤聽奸臣因李良嗣父兄之怨滅契丹盟好之國乃有今日之難然則因人之怨以滅人之國者其禍豈可勝言哉為計議者必欲滅宋之策在絶兩河懐舊之思除鄰國復仇之患而已又曰大金兵威無敵於天下中國之民可指麾而定若大金果能滅宋兩河懐舊之思亦不能忘果能滅宋徒使宗屬賢德之士唱義天下竭國力以北向則兩河之民異日撫定之後亦將去金人而歸宋矣且天生南北之國方域至異也晉為契丹所滅周世宗復定三國實為晉報恨然則今日之滅趙氏豈必趙氏然後復仇耶雖中國英雄亦將復中國之仇矣檜今竭肝膽捐軀命為元帥言廢立之議以明兩朝之利害伏望元帥不恤羣議深思國計以辨之於朝若用䜛言以矜已之功能非特傷敵國之義亦貽患於異日矣又禍莫大於滅人之國昔秦滅六國而六國滅之符堅滅燕而燕滅之頃童貫蔡攸貪土以啓主欲營私而忘國計屯兵境上欲滅遼以取燕雲之地方是時也契丹之使交馳接境當時國計應從其請乃欲邀功業以兼人之地遂貽患於主而宗社墊危今雖焚尸戮族又何益哉今元帥威震中原功髙在昔乃欲用離間之論而矜一已之功其為國計亦危矣貫攸之計可不鍳哉自古今來強者固不足恃劉聰石勒威足以制愍懐而挫於李矩數千人之衆符堅以百萬之師衂於淝水之旅是兵強而不足恃也大金自去嵗問罪中原入境征戰已踰嵗然所攻必克者無他以大金久習兵革中國承平百年士卒罕練將帥未得其人也自古中國地土甲兵之威四鄰無有將相英雄世不乏才使異日士卒精練若唐藩鎮之兵將相得人若唐肅代之臣大金之於中國能必其勝哉且世之興王以有德而伐無德以有道而伐無道然後皇天祐之四海歸之若邦昌者在上皇朝專事燕遊不務䂓諫附㑹權幸之臣共為蠧國之政今自社稷傾危生民塗炭雖一人所致亦邦昌為之力也天下之人方疾之若仇若付以土地使主人民英雄必盡起而誅之非特不足以代宋亦不足為大金屏翰矣大金必欲滅宋而立邦昌則京師之民可服而天下之民不可服京師之宗子可滅而天下之宗子不可滅檜不顧斧鉞之誅戮族之患為元帥言兩朝之利害伏望元帥稽考古今深鑒斯言復嗣君之位以安四方之民非特大宋蒙福實大金萬世之利也不任惶懼懇告之至謹具狀申自餘百官所議其畧云奉大金皇帝詔㫖二元帥令㫖欲少宰張邦昌為主某等荒迷不知所措敢不推戴如更欲别選賢人亦取自軍前指揮三朝北盟㑹編卷八十
