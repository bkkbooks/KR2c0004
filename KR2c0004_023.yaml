body:
  text: 三朝北盟會編卷二十三宋徐夢莘撰政宣上㠸起宣和七年十一月二十八日乙未盡十二月九日丙午二十八日乙未斡里雅布陷薊州執奉使賀允中鎖之副使武漢英脅而降之北征紀實曰本朝與遼人文移皆在兩界對境謂之關報金人滅遼河東代州如故事而燕山我即玉田縣築一州曰清州以對平州相與通使人之正路也故其入中國先以關牒來代州茹越寨及啓封乃檄書是也燕山路清州有我使大臣賀允中副使武漢英漢英乃玉田縣巡檢就時差充副使適至清州而斡里雅布遣人約曰邀使人觀打毬二人者知其犯盟欲以其未過界無故事相㑹拒之恐托是以生釁故勉而從之及至界則以是日舉兵矣賀允中被鎖武漢英者武將頗黠斡里雅布愛之因得降而見用常在左右謂此南朝第一降人也漢英備見金兵入中國得人初不殺曰此即我人也行將至真定漢英說之曰某猶不知大國用兵之意况中國之人乎是宜其不降今睹所擒獲者皆不殺然人安得户曉謂如某者使諭之則河北堅城可不戰而下也斡里雅布大喜乃多出文榜命漢英出塞俾誘諭諸郡漢英用是乃得出乃徑走闕下具以敵情告朝廷曰金人之謀深矣謂中國獨西兵可用今以尼堪一軍下太原取洛陽要絶西兵援路且防天子幸蜀斡里雅布一軍下燕山取真定直掩東都乃㑹于東都而後不遜也蔡攸議廢安肅保信二軍復為梁門遂城縣安肅保信二軍蓋梁門遂城二縣地在太宗時建二軍并保州犬牙相制易州以控西山之路國家沿邊獨此最為要害昔澶淵之役世號銅梁門鐵遂城者也及警報既密蔡攸懼動外廷之議惟務遮護方示人以間暇乃謂祖宗昔以二縣建安肅保信者所以制扼易州一帶今既得燕山而景薊為外藩則安肅保信在內地無所用之當廢復為縣是嵗十一月二軍遂廢人情方不樂惶惑軍營移徙樓櫓毁棄之際適㑹斡里雅布既下燕山以大兵入界於是安肅保信莫之以禦大凡失謀可怪而資敵之深入者類如此十二月一日戊戌馬擴回自太原茆齊自叙曰僕初歸到太原府宣撫司以往來所厯事節答語録呈貫大驚曰金人國中初定些少人馬在邊上恁敢便做許大事僕曰某去年雲中回便以此事覆大王勸大王三路摘十萬兵分統以壓助常勝軍乃是預制此意在任並縣論金人已擒天祚事保州所申乞急備邊於京師又勸大王提十萬兵出壓境計議交割皆某預知金人深懷張覺之憾為契丹亡國之臣激發必生不測之變大王皆不之信擴觀事勢必乘我邊面無備踏足走入來大王須急作隄防貫云我自得你茹越寨所申條畫事件即行下太原真定中山河間燕山府路令分定䇿應牽制路分及令郭藥師排辦軍馬出城下寨今合太原府路軍民兵義勇膽勇義勝等軍須有數萬人我近已令發膽勇人馬上邊更令李嗣本於代州近城踏屯十萬人寨地昨又曽擺拽耀兵莫他聞得如此聲勢亦未輕易入來也三日庚子尼堪遣使王介儒察勒瑪充使副來宣撫司茆齊自叙曰代州關報金國元帥府差使副察勒瑪王介儒來宣撫司差機宜宋彥通與僕充館伴金人出所齎軍書說納張覺渝盟等事及傳尼堪已興兵意極不遜貫亦厚善待之答云許大國事且須商量何故便有此事語察勒瑪云軍馬已起更商量甚的介儒云若是急著手腳好商量時也須較得些貫云即今館伴去說話有事但見諭足可相應察勒瑪等起歸館彥通詢尼堪國相輒言舉兵之意何也察勒瑪云兵已起不須商量元帥國相軍馬自河東路入二太子軍馬自燕京路入更不殺戮人民只是傳檄撫定彥通答云兩朝許多時講好更便不通些音耗便起兵來是甚道理介儒云只為貴朝失道理所以致得如此僕答云兵凶器天道厭之貴朝吞了契丹許多國土亦藉本朝聲勢方能盡滅之今一旦不肯顧已前契義誓好便先舉兵不道南朝許大世界軍民事力若朝廷省悟略行更改怎容易近得不過虜掠得近邊些小民户却日後干戈幾時定得察勒瑪云元帥國相若怕貴朝事力却不敢便入來也如今檄書將次到來承宣亦須見理介儒云事已如此自家恁這裏鬬口做甚承宣若能勸童大王急行奏請只且割與河東河北路地土以大河為界存取大宋宗廟社稷却是能報國也僕答云此談何容易看來貴朝聽狂悖之言却把本朝作破壞契丹看待但恐後來自被禍患不小耳察勒瑪微笑有自得之色彥通同僕出館宣司具告童貫貫驚愕令彥通與僕列銜供狀連夜備奏貫與參謀宇文虛中機宜范訥并王雲宋彥通等議赴闕禀議尼堪自雲中府起兵入侵欣代之境當日代州報金國遣人來大軍與使人同發直薄馬邑而營七日甲辰童貫議赴闕參童貫是日與參謀宇文虛中機宜范訥王雲宋彥通等謀赴闕早衙貫諭張孝純并子宜浹面諭須赴闕禀議事已令劄送照㑹一面差官館待人使言本司來日便行孝純愕然云金人已渝盟入侵當在大王勾集諸路軍馬并力枝梧今大王若去人心駭散是將河東路棄與賊河東既失則北路豈能保耶且乞大王駐司在此共竭死力率衆報國如今太原府路地險城堅人亦諳戰鬬未必金人便能破也貫怒目顧孝純云貫止是承宣撫不係守土若攀宣司駐此經營却要帥臣做甚此是公職事且須勉力貫到京禀奏即日便發諸路軍馬來策應使貫留此亦兩無所益孝純憤然起退至機宜位中抵掌大呼云尋常見童太師做許大模樣次第到臨事却如此畏懦更不顧身為大臣當為國家捍禦患難一面只思走竄是甚節操因顧乃子浹云休休自家父子與他死守茆齊自叙曰是日僕見貫惑幕下謬懦之議若果退則是尼堪知不出劉宗彥等所料氣勢愈振必難制遏遂具一劄子論尼堪緣劉延慶軍敗繼有張覺之隙遂聽劉彥宗伊都蕭慶軍輩語乘我邊面空虛乃敢渝盟兩路直入然而見入敵馬不多全在大王乘機應變力為措畫禦捍且敵所忌者有四所幸者有三一則忌郭藥師下常勝軍勇于戰陳二則忌河東河北兩路堅城可守卒不能攻三則忌各斂民兵城守養鋭不輕出戰四則忌選擇兵將頭項遞相照應待其退回前邀後掩此四忌也其一幸大王退避諸帥無統軍民氣喪不能更相應其二幸我不急就措畫河北河東兩路重兵遮護根本其三幸我區别歸朝官不用上疑下懼自生變亂此三幸也擴觀河東路險多關隘人諳戰鬬敵必不能長駐唯河北路雖雄霸州至順安軍界有塘濼但廣信軍保州中山真定府皆是坦途萬一常勝軍有變燕山失守賊馬乘之定須長驅南渡願大王審度事機速移司入真定府與太原係鄰路可足相為應援兼城堅糧多加以大王據之左右多西人慣熟守禦金人雖入境决不敢率易南渡兵法攻者常多勞守者常自佚决可挫彼鋭兵于堅城之下投之貫笑云許大緊急大事此公容易來入議狀僕答曰大王任國家許大兵柄不特于諸路雖天下亦視以輕重當此緊急報國之時在大王不得不勉之况交結女真恢復燕山事乃是大王經手今有窟籠却須大王與補了不惟在别人不知金人情不能補得兼不得使别人補了此言非特繫國家利害亦係大王一身利害乞大王深思之無惑衆人茍且之議貫陽應甚好來日且過真定其實欲遁矣既出孫渥握僕呼云子充奈何自此以往天下定見土崩瓦解適有關報金人已打破馬邑縣逰騎已至代州城下僕以札子草示渥渥云若能如此行之則何以加諸苐恐無後著耳次日諸監司見僕皆稱云聞亷訪請大王守真定議論妙甚僕謂兵家貴知己知彼不可見彼威勢便不顧己事力也倘大王一一肯聽行之敵不足破也僕再見童貫禀宜早過真定恐不測燕山路敵馬事逼貫大怒叱僕云你為家小在保州故要我去真定只是要去保你家小也僕心知是為機幕恐懼欲遁所奪乃答云大王既如此說話是不思國家患難緊急願聽大王入京然不忍見大王失此名節掃地為衆人唾潝殺去也貫良久復云你不知我隨行無兵如何禦此大敵僕對大王若往真定何患無兵不唯諸處選刷儘有可用軍馬亷頗思用趙人如何北路民兵足得調按使用宇文虛中云向日燕山之役河北人民往往舉城慟哭官員部押有經于路者豈能比亷頗時耶僕曰前日開拓燕山緣久太平軍民不慣調發故有厭怨今日則敵騎入邉孰不同惜鄉土營護骨肉此人自為戰之時豈自當慮倘少加總統盡係死戰之士貫顧僕搔耳云安得三萬與此馬宣事却須做得一拍僕答若大王能付擴三萬人則便有十萬軍使用於是差僕專往真定中山府招置忠勇敢戰軍馬專一統制八月乙巳童貫太原遁還征北紀實曰金人之欲入中原也懼我為備且揣知我必欲雲中故多為好辭以入我然諜報已詳而羣小但欲雲中不以諜言為信略不加慮甘詐而已於是預謀雲中守乃召聶山一日閲諸路奏報其中有曰范太師八月二十二日押軍器三千餘件到雲中府交納稱冬間要犯南界韓太師八月二十三日押軍器八千餘件到雲中府交納稱冬間要入南界時金人欲攻我遣小使來小使非天子朝廷之使故曰小使舊無有此開邊有之乃尼堪所遣人使貫者也謂張孝純曰欲見童大王孝純詢其事則曰莫是要交割雲中地於是孝純喜即馳報上童貫遂亟行宣和七年冬也貫未至太原而孝純先俾其屬同小使迎貫於真定小使及見貫則曰中國違盟本朝方弔民伐罪國相二太子出師不可當也皇帝㬠是怒郎君們正念兩國生靈㬠是不欲得故遣來約大王須是告他始得貫失措不敢詰黽勉至太原又倉皇發小使詣闕下貫亦因遁還尼堪兵已入境破欣代矣茆齊自叙曰十二月初八日僕與宣司同離太原貫南歸僕東過真定途中寫畫一急切事務申貫一乞人馬申令委州縣取破碎舊甲併工聨緝無慮日成數百領旬月之間則足用一乞戰馬數內選擇可得千匹一乞委逐州各招忠勇敢戰人擇官統率互相應援將歸朝人有武勇者激勸編入行伍使為前鋒將其家小移近以南州軍厚加給恤一乞將陜西五路鋭卒取徑路發赴河北河東使助守禦一乞摘那勝捷軍一千人付某充衙兵以為招置軍馬之本一乞不測金人南渡邊防失守則循唐故事奉大駕入蜀委一大臣留守京師以圖恢復貫書報皆從尼堪攻朔州漢兒開門獻之又至武州漢兒為內應遂陷朔武二州長驅至代州漢兒又擒李嗣本以降初宣撫司招燕雲之民置之內地如義勝軍等皆山後漢兒也實勇悍可用其在河東者約十萬餘人官給錢米贍之雖諸司不許支用者亦聽支使久之倉廩不足以飢而怒出不遜語時我軍所請皆腐餘亦怨道路相逢我軍罵辱之曰汝番人也而食新我官軍也而食陳吾不如番人也吾誅汝矣漢兒聞之懼其心益二俟釁且發至是金人南入朔武之境朔州守將孫翊先將兵出援太原圍城既旬餘漢兒開門獻于金人既至武州漢兒亦為內應遂失朔武長驅至代州將李嗣本率兵拒守漢兒又擒嗣本以降李鄴上書請奉使請和北征紀實曰初未內禪時貫歸後金人有兩使來大臣不敢引見天子遂劫以小使之禮大臣自見之於尚書省聽事昔未有此也小使初見前注中才就位遂大不遜曰南朝違盟云云且言皇帝㬠是怒命國相與太子郎君兩路而入因有弔民伐罪之語白丞相時中李丞相邦彥俱失色皆不敢答又曰相國與郎君以兩朝生靈㬠是不欲得須是告他始得諸大臣方就其請如何告緩師是使人因大言曰不過割地稱臣兩大臣又失色不敢答遂議厚其禮遣行時有李鄴者上書具論强敵之情僞丐請奉使議和上大喜奬借至甚鄴丐金三萬兩而朝廷頗難之遂出祖宗內帑金甕二各五千兩命書藝局銷鎔為牌子遂授鄴令去九日丙午尼堪兵至欣州知府賀權度勢不敵開門張樂以迓之尼堪大喜下令兵不入城尼堪自欣州至石嶺關把隘石嶺關義勝軍將耿守忠叛以關降賊尼堪入遂圍太原義勝皆遼人如常勝軍也尼堪將至石嶺關尤險隘太原帥張孝純謀守關之人或曰冀景可於是命景景辭以兵不足孝純命王宗尹統官兵敢勇把關又命歸朝人耿守忠部兵八千人助之景復辭孝純曰弟如我語景不得已而往使守忠當前懼其後而襲之也守忠行至欣口反回云守忠所部盡是部軍若借得敢勇家馬則金不能入關景等令敢勇人權借與馬既取其半或有不願借者而守忠人恣橫强奪不能制馭景等覺有變領親隨人等棄關潛走守忠至關果啓而獻之景聞守忠叛不敢歸乃走汾州節要曰尼堪自雲中懷仁河陰縣名將入代州之境嚴加部伍整嚴器甲慮家計寨難取乃代州絶邊控扼之地乃分兵由壼谷寨入焉謂其徒烏舍伊都曰今日至代州與南軍必有數戰不無勞力其餘可乘勝破矣既行越家計寨至代州並無一戰無何代州三日失守守臣李嗣本率吏民請命于敵欣州石嶺關聞風皆叛於是敵衆如入無人之境直至太原尼堪始有易中國之心矣秀水閒居録曰契丹將亡有劇寇童龎兒者據雲中代州副帥王機請招納久之不至金人既逼始歸欵朝廷以十數萬衆來附賜名才後更姓趙許官以承宣使俾居河東計口給食數年間蠶食邊儲倉廪一空其徒散處諸郡屢謀竊發宣和末金人入邊首亂晉州即叛去河東失守如此斡里雅布犯金山郭藥師叛降率常勝軍以迎之許採陷燕記曰宣和七年十一月二十六日金人攻檀州陷之二十八日早燕山府始聞藥師斥堠不明是日又陷薊州郭藥師已屯兵東郊者二十餘日保和殿大學士蔡公請往見藥師公時為安撫使既回日曰汾陽似有懼意十二月初二日藥師欲迎敵余力于蔡公處言且令郭公披城下寨可遣張令徽劉舜仁偏師以往郭公之去使之勝益驕不可制不勝則一敗塗地燕山大震矣右古北口洎居庸關或可以窺燕虛實蔡公未以為然翌日復謁藥師余以片紙小書復達此意託公子松年因家信奉呈已而鈐轄李振見余亦言此而蔡公不敢留藥師云他已作計是日蔡公出金帛大犒軍而後行初六日至三河三河者縣名在白河之西金人已在河之東疑藥師軍未敢進藥師之去戈甲鮮明隊伍整肅是夜分後藥師率人馬並進色未辨已渡白河而金人初見藥師軍亦懼二太子斡里雅布乃東向望日而拜號令諸部即趨藥師軍藥師不意來犯軍稍却是時兩陳東西相對藥師從南而往斡里雅布與令徽守仁適相值藥師乘鋭東去鏖戰三十餘里金人已北而令徽乃先自遁斡里雅布力追之已而舜仁亦遁藥師獨至金人寨凡數處竟無火以焚其壘或謂藥師曰頭重矣藥師遂回初藥師硬軍三百人所餘一百二十人而已其他軍可知時初七日申時也余同蔡公諸人登東城望白河白河去府八十里而塵埃如雲氣遍空不可辨良久令徽至已而舜仁至抵晚藥師亦至三人者頗沮喪互相詆誚是夜把東北門者刺史皇賁也乃隂遣人通斡里雅布欲開門為內應仍云不知太子要生郭藥師要死郭藥師已而汾陽知之謀皆出令徽舜仁也遂令儒林郎王樞草降表云待時而動動靜固未知其常順天者存存亡不可以不察又云臣素提一旅之師偶遭百六之運又云亡遼無可事之君大金有難通之路又云宋主載闕官是以念一飯之恩必報則六尺之軀可捐雖知上帝之是臨敢思困獸之猶鬭又云昔也東征雖雷霆之怒敢犯今焉北面祈天地之量並容辭多不記是日晚略聞常勝軍欲變余言之蔡公頗以為疑而運使吕頤浩力勸蔡公棄燕而遁兼採訪梁競極力助之蔡公以問余余曰大學士是守土臣豈可比他人自當以死守之兼大學士率諸人同行各有眷纍今南自蘆溝敗軍滿地此曹無以泄發寧知不要我歸路乎公曰靖之意正如此是夜頤浩競輩互以言熒惑蔡公而安撫司勾當公事吳激者遂進退保之言頤浩競勸成之余曰唐室之亂如李郭諸將曽有退保者彼各提重兵或以此地未便或就水草或就地勢豈燕山乃公所治之地激之言非是萬一熒惑令公行他日必有以公先動為言而賣公以自售者不可不察也又聞常勝軍如欲附敵彼知公劫衆以遁藥師輩因以藉口公之罪曷所逃也蔡公深以為然頤浩競輩乃愠見於色賴蔡公天資忠義不然遂為二子搖奪使蔡公聽從頤浩等言率衆南奔是投之死地爾蓋常勝軍洎鄉軍之敗盤泊蘆溝涿州之間積怨無以泄其怒虜掠殺滅者莫知其數使果遂行其豈有噍類乎是戰也常勝軍與金人殺傷略相當金人亦不知所以勝而常勝軍有密輸欵者由是藥師遂不能振而金人益張也初八日申後藥師乃召蔡公吕頤浩李與權沈瓘等議事至則執之蔡曰相公欲負天子耶引佩刀自决為官軍奪去已而藥師同諸公就坐乃曰藥師實不得已不能與諸公全終始之義遂掩泣由是諸人皆留藥師家是夜三更後火作常勝軍食糧敢戰等軍四散劫掠初金人來攻蔡公令守城卒上城雖諸㕔當直人軍法從事由是畏法者盡遣之而不畏法者自若也初八日晚蔡公乃差薊州逃卒分俵諸㕔都未能變其面目是夜兵火作此卒肆行劫掠雖鞍馬之類頃刻無遺矣三朝北盟㑹編卷二十三
