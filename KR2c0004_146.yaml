body:
  text: 三朝北盟會編卷一百四十六宋徐夢莘撰炎興下帙起紹興元年四月十四日庚辰盡二十日丙戌十四日庚辰隆祐皇太后崩隆祐皇太后遺詔曰吾自履宫闈于今三紀常懼菲薄不足以踵先君之懿而格神靈之休乃晚年以來逢國多故二聖遐狩心常爽然皇帝仁孝自天實同憂患雖在顛沛禮無缺違幸時小康還自江介方欲饗天下之養即東朝之安而節宣不時偶遇微疾遽至危惙莫能自還悵此兩宫遂成永訣方時艱難合行禮儀難以偹舉皇帝服期以日易月十三日而除仍不候除服御朝三日而除作樂婚姻並無禁止殮以常服不可用金玉寶貝權宜就近擇地􅓖殯候軍事寧息歸葬園陵所製梓宫取周吾身勿仍舊制以為他日遷奉之便於戲生者人之暫遇死者數之大終甲子一周復奚所恨尚賴臣民之衆永堅忠孝之心輔翼聖朝早臻康阜存沒之際愴恨何言故兹遺詔想宜知悉大行隆祐皇太后議諡臣伏奉敕禮部伏據太常寺今來大行皇太后崩合差議諡官差臣撰議諡者臣謹上議曰臣聞承天者地也所以助六氣而順嵗功配陽者隂也所以分四時而成物化儷宸極者后也所以奉宗廟而隆化極故曰古之母儀天下者生也薦上尊名終而述其大行三代尚矣靡得而辭在漢則眀德和熹著稱于前在唐則文德懿安垂紀于後皆所以揭椒塗之範炳彤管之暉巍巍乎與帝並隆不可貶己洪惟大行隆祐皇太后躬聖善之德茂柔眀之資粵自先正魏王有功仁祖之世王室所賴旗常紀之其深澤慶綿用集成太母惟我太母基迹元祐嬪于泰陵逮事宣仁欽聖兩宫凛二南之規兼四教之善正位宫掖三十餘年含洪光大而體坤道之常進退存亡而得聖人之正及靖康初載天割我宋二帝出郊中原無統列侯相親莫知所圖我太母起于危疑之中自任以天下之重手援大寶授之聖眀當方隅傾側之時序璇厯纂承之次雖文母以十亂興周不能過也已而六飛南渡按蹕武林元凶窺朝冗自內作天下之勢甚于綴斿我太母投袂而寢禍機立談而銷逆䘲坐使天地復正三辰復明四方元元悉免塗炭雖媧皇以鍊石補天不能過也既勳猷崇極而乃抑華崇儉率禮蹈和塞私謁之塗裁外家之寵清淨謙沖而以道為本沉潛剛克而與神為謀擁佑聖躬殫誠盡愛煌煌乎度越麟趾思齋之上矣方期清我甸服駕旋舊京虔奉翟車謁欵宗廟極四海之養即內朝之安而昊天不辰禍綿慈極郊蠶告畢方開盛夏之祥隙駟難留遽掩長秋之御兹天子追慕悼心失圖歎厚載之中傾痛仙遊之不返雖遂服不可勉從期嵗之喪而興哀無時每過舉音之節由是命有司考易名之典懋飾終之儀告于神眀節以一惠庶幾有以彰淑則而暢徽音謹按諡法眀德有功曰昭視民如子曰慈聰明睿智曰獻安民有功曰烈若乃兩值時變當陽御簾基圖既安即復眀辟澤及萬世與天無窮非明德有功耶寢興焦勞言動懇惻冒風濤兵革之際濟宇宙生靈之艱非視民如子耶察興替之端知變通之利親庶政以任溥天之責奉真人以膺神器之歸非聰眀睿智耶中微之緒而我振之大亂之原而我窒之從容房帷密幹鴻造非安民有功耶嗚呼道之大者理謝形容名之尊者言絶稱謂故古者賤不誄貴幼不誄長而皇后之諡則請之于廟示雖天子必有尊也況我太母盛德元功敻無前比豈承學之臣所能擬議意者必受成于宗廟為足以對在天之靈大行隆祐皇太后諡議宜以宗廟之命錫之曰昭慈獻烈皇后謹議大行隆祐皇太后崩奉告宗廟伏以釁積宫闈禍延文母凡居覆載孰不哀摧國有大喪不敢不告大殮伏以宫闈寡祐仙馭上賔將奉容依俯臨神匶願溫慈之永閟銜摧割以奚言謹以十七日舉大殮之儀不敢不告挂服伏以昊天不弔禍及東朝念色養之永違攀仙遊而何及爰舉衰粗之制用酬坤育之恩謹以今成服不敢不告祭奠比舉恤章恭成裒飾既正阼階之席當陳餘閣之羞仰冀神遊俯歆誠薦􅓖祭伏以慈壼中虛仙遊漫邈爰舉菆塗之禮以須祖載之期孝養莫追哀誠何極啓􅓖伏以邦禍之延坤儀永閟方中告畢即逺有期乃涓季夏之良恭撒西階之殯追攀靡及摧割奚勝祖奠恭以復土有期遣車在道猶想庭闈之覲忍瞻警衛之行攀匶哀號奠蠲祖訣啓奠伏以宫闈寡祐陵寢告成爰啓菆塗將臨于厚夜恭陳奠斚永訣于終天遷奠伏以蓍龜來諗日月有期既停六綍之儀將舉九原之奉三靈不弔五內俱摧發引伏以蓍龜告日披綍在庭載言厥衛之儀將舉殯防之事攀依永絶摧割奚勝掩􅓖伏以龜筮協從衣冠永閟神升帝所參三后在天之遊地占山靈豈千人成聚之比追遊莫返銜恤奚言上諡册寶伏以柔儀懿範𢡟著宫闈盛德元勳實施社稷乃羣臣諡請于宗廟曰昭慈獻烈皇太后永為千載之稱不敢不告袝廟伏以慈闈厭世甫竁因山既終復土之恩爰講袝姑之禮進陪廟祀永作邦休配廟伏以作合先朝援正尊名有欽聖御簾之詔唱為異議由崇寧福軸之姦兹涓剛辰恭舉徽册用嚴升廟之禮永對在天之靈卒哭伏以飈馭遐升日期寖逺甫隔晨昏之養奄然哭踊之儀追慕亡由銜哀何極􅓖宫節八月朔伏以宫壼興哀屢改階蓂之旦寢園在望俄驚陵柏之秋恭惟昭慈獻烈皇太后位正纍朝得齊先后仙遊雖邈慈矩具存地隔三山莫獻蟠桃之實神歸先廟長遊大練之衣適周肖辰何勝永慕秋社伏以宫衣掩御已虛夏凊之儀農扈報功忽屆秋成之後恭惟昭慈獻烈皇太后儷天德大救物功深既煉石以告成遽乘雲而不返追攀無及感愴奈何中秋伏以長樂終天人結母慈之變蓐收告節月圎秋令之中觀玉琯之屢移望柏城而增愴恭惟昭慈獻烈皇太后體薑任之德希黃老之蹤倏赴帝鄉之期永違天下之養每懷遺訓追極哀悰九月旦伏以軒星既掩鯢駕莫還方興長夜之哀忽屆杪秋之序恭惟昭慈獻烈皇太后初參十亂道冠六宫問寢承顔一朝違長樂之養袝姑合食千載奉泰陵之遊搖落有懷追攀無所重陽伏以穜稑告成嘗帥九賔之獻菊萸在御莫伸萬夀之祈恭惟昭慈獻烈皇太后厚德視天徽音萬世自哀纒于厚夜忽時及于周年爰致孝思式陳時薦九月望伏以椒掖戒寒柏城無曉永隔乘雲之馭倐更濡露之辰恭惟昭慈獻烈皇太后化存宫闈澤流寰宇念纂承于丕緒蒙保祐之隆恩緬想徽音何勝孺慕十月望伏以釁結終天時丁良月雖閟宫之在望瞻天練以無階恭惟昭慈獻烈皇太后夢月鍾靈補天儷德奄隔晨昏之養屢驚弦晦之遷兹覩流光何勝永慕下元節伏以驗灰緹室將觀二氣之回校籍清都莫重三元之畢遍思慈範永隔仙遊恭惟昭慈獻烈皇太后所憂在賢以儉為寶方候含飴之慶遽興復土之哀爰即佳辰載陳誠薦秀水間居録曰元祐末哲宗方擇后京師里巷作打毬戲以一人擊入窠者為勝謂之孟入于是孟在女應中宫之選至昭聖間宫掖造禁纈有匠者姓孟獻樣兩大蟬相對􅀈以結帶曰孟家蟬民間競服之未幾后廢處瑤華宫號華陽教主玉清妙靜仙師議者皆以為讖蟬者禪出家之兆也元符三年徽宗皇帝嗣位欽聖向后同聽政詔后還宫號元祐皇后次年向后崩復出居瑤華如故政和七年加號希微元通知和妙靜仙師靖康初京師失守徽宗淵聖皇族近屬皆詣敵營中議亦取后淵聖意張邦昌必不能久僣欲留孟后以為興復基本因遣人入城取物紙尾批庾辭與府尹徐秉哲云趙氏注孟子相度分付金人以后廢嵗久無預時事不復取邦昌請后入宫詔云遵少帝之玉音湖州士人石茂良在圍城居將官姚丈仲家嘗親見批子敵既退邦昌請后入居延福宫號宋太后既請垂簾號元祐皇后今上踐祚迎后至睢陽上尊號曰隆祐皇太后建炎三年車駕渡江至餘杭有苖劉二賊之變后復垂簾以平內難二十五日復辟又上尊號曰隆祐皇太后紹興元年崩于會稽初上諡號曰昭慈獻烈後更諡曰昭慈聖獻至是前讖乃驗焉孟入者兩復入也蟬者禪去聲也兩御簾帷之應也大統中絶而復續天位暫傾而復正者后之力可謂異人矣王德執郭仲威于揚州郭仲威為真揚州鎮撫使建炎四年八月金人攻揚州薛慶戰死仲威奔于興元及金人退仲威乃來真州屯駐而留其次頭領李懷中知揚州仲威聞李成在江州且嘗有溜州同駐軍之舊欲往上江合軍到建康遇招信劉綱軍于雨花臺仲威不偹為綱所敗遂回揚州作鎮撫使朝廷以其反復終不用為詔劉光世遣王德往德宣言遊徼淮上至維揚仲威迎德于摘星臺德手擒之遂并其衆亦有散而之淮西者有歸還淮陽軍者寇宏與宿遷縣土豪趙革合軍于龜山冦宏與夀春人素以刺船為事凶悍無行良民苦之建炎末與百姓張先聚衆謂之張二伯者邀掠舟船沿淮水而行泊于濠泗之間楚州趙立為金人所圍先等以衆至城下立喜用便宜皆以次借官與之時先為首遂以權知泗州軍州事先既到泗州乃令其次劉全權通判軍州事時人謂之劉馬子者而宏與其次也遂令宏水陸巡檢宏與衆數百人泊舟于鳳凰州未幾全自橫潤山寨迎取其家屬回宏以讖之疑逐全是時先在泗州為土豪吳鈐轄所殺宏遂以其衆徑至泗州會先餘衆殺吳鈐轄退泊于龜山時楚州已陷郭仲威為真揚州鎮撫使宏願聽仲威節制仲威借補修武郎閣門祇候為鎮撫使統制於是國奉卿在宿遷趙瓊水寨未有所向瓊復以其父革為首領奉卿説革率衆下龜山與宏合軍革然之遂率其寨俱行至龜山宏大喜乃合軍衆議以徐宗成知泗州臧圭知盱眙軍宏復上鳳凰州刈民麥以圖濠州會傳報仲威為王德所執俄而潰兵有由龜山往淮西者宏遂以舟船行後劉光世以宗成權知泗州是時泗州居民無一家滿地荆棘荒草而已宏在鳳凰州屢以舟船犯濠州李玠禦退之十七日癸未桑仲陷鄧州知軍州事談兖走西川桑仲以其黨李橫知鄧州軍州事桑仲率兵圍鄧州談兖遣人招繖蓋山王俊解圍俊率其衆至鄧州入城與兖飲宴宴罷俊醉兖率衆突圍出奔出入川中仲攻城陷執俊歸襄陽釘于木驢上呵喝相公遊街遂凌遲殺之二十日丙戌王享為廬州夀春府鎮撫使史康民兼知真揚州鎮撫使三朝北盟會編卷一百四十六
