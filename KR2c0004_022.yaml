body:
  text: 三朝北盟會編卷二十二宋徐夢莘撰政宣上帙起宣和七年三月盡十一月二十六日癸巳三月童貫入燕犒軍茆齋自敘曰童貫交授銀絹畢離太原由真定府河間莫雄州入燕僕自保州入莫州迎貫於任邱縣因語烏舍已擒天祚事謂貫宜急備邊以防女真為患彼懷張覺之憾恐尼堪回來不測作過貫云我今去燕山葺治兵馬蓋為此也貫至燕中撫犒郭藥師以下常勝軍罷王安中升蔡靖為宣撫兼知燕山府奏請河北路置四總管中山府辛興宗真定府任元河間府楊惟忠大名府王育各為逐路副都總管皆與招集逃亡軍人及招刺諸處遊手人充軍以為備邊之畫五月五日乙巳以童貫克復燕山府等州及收髙托山王等議賞封貫廣陽郡王詔曰朕以童貫屢將天威征伐四克拓地隴右西徹河原揚旌五關盡復幽朔出入纍年之際蕩平兩國之戎命爵策勳難拘常憲恭惟神考屢形訓言謂將帥總兵能復全燕之境則國家信賞當從王爵之封仍胙本邦以昭顯績既克承于先志敢怠廢于貽謀童貫可依前太師進封廣陽郡王食邑俸依例施行六月六日丙午太師豫國公童貫依前太師領樞密院事河北河東陜西宣撫使進封廣陽郡王制曰王者申九伐之威以和衆安民為盛德大臣謹四方之慮以折衝厭難為殊勳朕荷神天全付之休席祖考承光之緒飭戎兵以陟禹迹盡臻偃伯之期繼伐功而廣文聲夙倚同心之輔肆分寵數敷告治朝太師領樞密院事河北河東陜西路宣撫使充神霄宫使豫國公食邑一萬七千三百戶食實封五千户童貫信厚而敏明疏通而沈毅善謀能斷兼文武過人之才砥節盡公得精白承君之義自總幹方之任屬宣闢國之謀十乘啓行千里決勝冠三事調燮之職領七兵宥密之權暨興六月之師盡拓五關之塞惟朕心朕德忱賴于翊相故我疆我理逺逮于要荒遄歸告成堅卧請老屬再籌于邊議難就佚于里居吉甫至于太原初攝衣而整暇單于苦於漠北卒假手而蕩平既聞朔野之耕耘復靖河壖之寇掠繄爾肅將之效恢豫逺馭之圖念功名昭著于古今則典禮當殊于勳舊是用熙豐封賞之令作廣陽撫定之邦盩綬金章肇開茅土衮衣赤舄仍總樞衡蓋祗告于先猷諒允諧于僉議於戲周王上公九命有出封加等之儀漢朝異姓諸王載著令稱忠之詔其封揚于茂渥尚奚愧于前修特授依前太師領樞密院事河北河東陜西路宣撫使充神霄宫使進封廣陽郡王加食邑一千戶食實封三百户主者施行馬擴申宣撫使司乞屯兵中山真定當月探報尼堪已還修治飛狐靈邱兩縣馬擴密具陳合速那陜西兵屯中山真定及選智勇邊人守易州以防女真不測之變申童蔡二樞密不報七月金人以獲天祚發告慶使渤海李孝和王永福來差馬擴李子竒充接伴使副八月十四日癸丑聖旨賀金國正旦國信使副差武德郎王觀校書郎吳安國候入辭令上殿九月二十四日壬辰金國人使入國門詔宇文虛中髙世則充館伴使副館之是日河東奏報尼堪經營南伐河東報到馬擴勸童貫謂曰尼堪此來必有異志宜以西兵十萬出巡邉不惟備邉兼可壓境議事貫不聽十月詔吏部員外郎傅察充接伴金國賀正旦使蔣噩副之五月壬寅奏報中山府探報女真國相與伊都副統于本國將兵前來蔚州柳甸大點軍兵十八日乙卯中山府奏探報到女真刷差女真軍兵一萬五千及河遼東一路選差渤海五千奚軍二千鐵離軍二千均分來平州并雲中府路兩路屯泊二十一日戊午中山府奏探報金人大舉刷本國正軍并漢兒軍漸次前來雲中府等處又奏金人於蔚州并飛狐縣等處屯泊聚軍馬收集糧草皆稱欲來侵犯邊界二十四日辛酉童貫奏乞廢罷安肅永寧保定等軍河北河東陜西路宣撫使童貫奏樞密院劄子河北舊沿邊州軍多係景德年就升城寨為之以張形勢控制契丹今燕山已撫定舊邊悉成內地今相度安肅軍改為安肅縣知縣事兼安肅軍使𨽻保州永寧軍依舊為博野縣知縣事兼永寧軍使𨽻祁州保定軍改為保定縣知縣事兼保定軍使𨽻莫州舊來沿邊建諸寨除信要軍所管以東不可減省外其餘亦合廢罷奏御筆依十一月三日庚午中山府奏探報到金國相司下雲中府所轄縣令本管鄉軍每名要計物色等及軍幕赴雲中府送納及山西一帶添屯兵馬十七日甲申中山府奏報探到平州都統指揮屬縣刷揀丁口充軍及泉泊押兵前來奉聖州屯泊十九日丙戌宣撫司差馬擴辛興宗充使副持軍書移尼堪軍前議交蔚應二州及探聽尼堪有無南侵意茆齋自敘曰僕至太原見童貫差與辛興宗充使副持軍書移尼堪軍前貫曰見尼堪休爭間禮數且了大事只議交取蔚應二州及飛狐靈邱兩縣其餘地境盡畫還金國庶幾易了仍探聽尼堪果有南侵意否到茹越寨聞尼堪已遣隆德府所逃義勝軍先出五臺山繁峙縣界山路及易州所逃常勝軍韓民義等先出飛狐靈邱縣路為探聽南邊防虛實遂條具利害乞急發逐處軍馬上邊過作堤備畫一入急遞申宣使參尼堪尼堪云宣撫司文回中不説别事二承宣到來有何事理會僕曰兩朝自海上來交歡今已數年貴朝先帝大聖皇帝與本朝各以氣義相結不爽元約貴朝許割還燕地本朝許嵗奉金幣俱有信誓永逺和好山前已交受了止有山後土地中間緣童太師休致暫委談宣撫交割為不知首尾又幕府非人遂有不周事節今主人黜罷談稹再起童大王來蓋為與元帥國相皆始終主張和好庶得易為商量王事早了使兩界士民安業各享太平專遣某等稟上不知山後土地取甚交割尼堪笑曰你家更無人可使只委內官山後土地元初許時蓋為大聖皇帝恩義酬答趙皇海上交結之義各立誓書永逺和好不謂大聖皇帝才崩輿櫬未及歸國地土交受未了貴朝早已違誓背約陰納張覺收接燕京逃去職官民戶本朝纍次追取只是虛行文移誇詫幅員萬里國富民衆本朝雖小却不曽敢失理道待與貴朝略辨曲直則箇闕觀尼堪自擒天祚之後為劉彥宗伊都蕭慶輩所訹然意尚猶豫會隆慶府義勝軍叛王稟耿守忠追擊其三千人奔大金國具言中國虛實又易州常勝軍首領韓民義怨守臣章綜率五百人見尼堪曰常勝軍惟郭藥師有報國心如張令徽劉舜仁之徒因張覺皆觖望由是彥宗伊都輩力勸南朝可圖仍不必以衆因糧就兵可也尼堪于是決意南下而有言僕曰天祚失道任用姦邪天厭人離故為貴朝所破本朝亦怨其悖禮敗盟所以相助共為討滅今國相或欲却要山後州城不盡交割亦在商量亦不須遽相失歡一旦至兩大國交兵却幾時休得兼本朝亦豈為此未交割地土願致興師然此事非小利害所繫願國相深思之尼堪云你意下待如何僕乞退左右而言之尼堪云我家國中論事不尚退左右要得人共知僕答此係兩朝大事未商定間恐人傳布别致異議則難成事尼堪微笑以手揮左右悉退去僕答童大王來時令覆國相本朝緣談稹不務大計輒生事從李石張覺私請等事主上亦自知是失願國相念以舊好同滅大遼契丹不為深較使兩朝生靈安帖即於許山後地土只便交割蔚應兩州其餘盡還貴朝若蒙俞允便告示及一的確日節各自安撫邊民日後國相不拘欲要何物但請見諭童太師當自一一奏上應付尼堪笑云尚自待要兩州我若與你又是和西京謂雲中府人民存住不得山前山後乃是我家舊地更説做甚你家地土却須罰取些來方可是省過也僕答朝廷自海上遣使數年間使客往還與興起人馬應付貴朝費用多少本為兩朝和好今國相一旦聽姦人鬭作却厮炒處且貴朝所任用者盡是契丹舊時職官只要調攪生事萬一不得已交兵須各有損折兼河東河北城堅固軍民皆習戰鬭若有倉卒衆必據城堅守如何容易間便攻打破得不過是虜掠得些少四外村民縱有所得則利入軍人手倘有所失則害在國家且殺了一個南人即是契丹報仇殺了一個女真亦是與契丹報仇今貴朝滅盡契丹又得南朝金幣得早休兵各享太平莫是上策豈可容易更言戰鬬事也僕久被命奉使不敢不為兩朝極盡忠言乞國相深思之尼堪云你説得也晒好只是你南家説話多梢空謂虛誑為梢空你使副只今便辭我專遣人使就宣撫司商議大事去也翊日館中供具良厚察勒瑪笑曰待使人止此回矣蓋示決入攻之意斡里雅布自平州起兵入寇燕山之境張匯節要曰燕山之地易州西北乃金坡關昌平縣之西乃居庸關順州之北乃古北口景州東北乃松亭關平州之東乃榆關榆關之東乃金人之來路凡此數關乃天造地設以分畨漢之界誠一夫禦之可以當百時朝廷之割地也若得諸關燕山之境可保然關內之地平灤營三州自後唐為契丹按巴堅所陷之後改平州為遼興府以營灤二州𨽻之號為平州路至石晉之初按巴堅子耶律德光又得燕山檀順景薊涿易諸郡建燕山為燕京以轄六郡號為燕京路而興平州自成兩路昔朝廷海上始議割地但云燕雲兩路而已蓋初謂燕山之路盡得關內之地平州與燕山路異也由是破遼之後金人復得平州路金人既據平州則關內之地番漢雜處譬猶與讐共壠而種同爨而食欲無侵漁之患其可得乎故斡里雅布至是能自平州入寇此當時議割燕雲不明地里之詳也二十一日戊子斡里雅布至清州界首執接伴賀正旦使傅察使拜死之封氏記年曰金國二太子斡里雅布攻破薊州至玉田縣下寨會朝廷遣吏部郎中傅察等迓使脅之使降數以朝廷擅納叛亡招收戶口首違誓盟我輩奉詔興師問罪爾若歸明當有大官賞汝不然粉骨矣副使蔣噩等羅拜察獨不屈云察世受國恩焉敢違悖逺銜詔旨接伴來使非見貴國主豈可屈膝况察與太子皆王人也若欲察拜是太子僭逆不道既不拜乃見殺李邴為公墓志曰宣和七年十月詔以吏部員外郎傅公察充接伴金國賀正旦使是時金人將渝盟而我未之知也十一月公至燕山府聞敵入攻或勸其毋遽行公曰銜命以出聞難則止若君命何遂行二十一日至涇州韓城鎮使人失期居數日敵騎暴至夜圍鎮詰旦有部長數十騎馳入館公飲以酒問其故知其變強公上馬公與副使蔣噩偕行至界首公曰迓使人故例止此不肯進敵輒易公馭者擁之東北去百里許遇金國二太子斡里雅布者領兵至金人曰見太子當拜公曰吾若使至金國見國主乃拜爾今迓使人境上若脅我來又止見太子太子雖貴人臣也當以賔禮見何拜之有斡里雅布怒曰吾興師南向海上之盟不可恃何使之稱耶凡汝國失德與向我善意為我併道之否則死公曰主上仁聖海內乂安與金國講好信使往來項背相望也何謂失德太子干盟而動意何所欲還朝當具奏斡里雅布曰爾尚欲還朝耶其左右促公拜白刃如林公曰死耳豈有俱人臣而輒拜者哉或抑捽公使伏地公愈直立衣冠顛頓終不屈反覆論辨者踰時斡里雅布怒曰爾今不拜我後日雖欲拜可得耶麾令去公知不免謂隨行書狀官侯彥等曰敵脅我以拜我以國故義不辱我死必矣我父母老矣素鍾念我聞之必大戚若公等得脫幸記我言以告我親知我死國少解其無窮之悲也左右盡泣是夕官吏隔絶不復相見十二月七日敵次燕山郭藥師迎戰殺傷甚衆再戰遽麾軍以降彥等不知公存亡纍日矣密以訪敵敵曰大使不拜太子昨知藥師戰勝有喜色太子慮其劫取且銜積怒已殺之矣彥等即為公發喪燕山將官武漢英者取公尸焚以薪命虎翼軍士沙立等三人裹以歸間行至涿州亡其二人者獨沙立在遇金人繫之土室凡兩月伺守者怠即毁垣出會宋伯友奉使還因隨以來以靖康元年五月至京師蔣噩武漢英及官屬歸者人人能道公不屈狀侯彥又具列本末聞于朝廷大名府路安撫使徐處仁河北轉運副使孫昭逺及諫官李光等相繼論奏淵聖皇帝臨朝咨歎下詔曰死有重于泰山有輕于鴻毛顧所處何如耳茍激于死雖死猶生也某以一介之使馳不測之地臨以白刃毅然不屈卒以身殉于義得矣延閣次對告于里第以旌髙節特贈徽猷閣待制公喪至而公父裕之適為屯田郎中遣公弟置護歸源縣權厝先塋之佛廬曰資忠崇慶院嗚呼公之節著矣或曰自軍興來死節之士凡三人李若水當淵聖出郊之際嘗豫聞其議論非死不足以塞天下之責劉韐金人知其才欲用以為帥非自引決將反為敵人用二者義皆決不可為故伏死而不顧若公者單車之使耳事變初不預聞金人未嘗欲以為己用公死若有異二人之為者何以巨野李邴曰士之所貴勇於義而已當其凶戚外逼忠憤內激履刀鋸如坦途安鼎鑊如几席烈丈夫之操也何暇反覆計慮得失輕重可不可而後為之哉曰然則公不必死而死與夫彼不得不死而死公之為其異于彼者與某曰義者士之所甚重死者人之所甚難三人者特所遭之事異耳要之皆以所甚重易所甚難揚之朝足以知國家有仗節死難之臣書之史足以為萬世臣子之勸皆古所謂見危授命可殺不可辱者又奚擇焉靖康小雅曰公諱察宣和七年冬金人未渝盟也朝廷以故事遣公迓賀正旦使人于薊州玉田縣韓城鎮公至界上金人輒愆期不至十一月二十七日凌晨二太子擁大兵遽至執公等責令投拜自副使蔣噩以下皆羅拜臣伏公獨不屈金人以兵脅之公亦不顧金將曰我以南朝天子失德故來弔伐公曰主上明若日月四海拱戴汝欲敗盟以此為兵端爾非送死哉我有死耳膝不屈也金人怒因害公嗚呼方敵之始至也事出意表莫不錯愕失措望風竄伏公獨雍容不憚一死以為忠義之倡可不紀哉詩曰強敵寒盟兵忽踰塞公持漢節迓客于界控弦歘來率土震駭外臣桀傲自矜強大公誓不懾有死無拜殺身成仁播美千載斡里雅布陷清化縣鹽場清化縣申燕山府金人擁大兵前來劫掠居民焚掠廬舍時宣撫司蔡靖與運使吕頤浩李與權修葺城隍團結人兵以為守禦之備使銀牌馬奏朝兼關合屬區處是時大臣以為郊禮在近匿其奏不以聞恐礙推恩奏薦事畢措畫未晚但以大事委邊臣未嘗以廟謨留意二十六日癸巳斡里雅布陷檀州三朝北盟會編卷二十二
