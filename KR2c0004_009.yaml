body:
  text: 三朝北盟㑹編卷九宋徐夢莘撰政宣上帙九起宣和四年六月二十四日辛亥盡九月二十三日己卯二十四日辛亥耶律淳卒燕王自馬擴之歸又聞天祚之信憂懼成疾是夜疾篤死無嗣蕭幹立其妃蕭氏權主軍國事號皇太后改建福元年為興徳元年天祚聞淳死下詔曰天命至大不可以力回神器至公未聞於智取古今定論厯數難移是以聖人戒於盜竊故秦晉國王耶律淳九族之内推為仲叔之尊百官之中未有人臣之望趨朝不拜文印不名嘗降璽書别降金劵日隆恩禮朕實推崇衆所共知無負于爾比因冦亂遂肆窺覦外徒有周公之儀内實稔子帶之惡不顧大義欲償初心任用小人謀危大寶僣稱帝號私授天官指斥乗輿偽造符寶輕發文字肆赦改元以屠沽啇賈為翊戴之臣以佞媚狙詐處清宻之任不踰累月便至台階刑獄濫冤紀綱紊亂恣縱將士剽掠州城致我燕人䧟於塗炭天方悔禍神不助奸視息偷存未及百日一身殄滅絶嗣覆家人鬼所讐取笑天下而又輙申遺令擅建長秋妄委婦人專行偽命其逆臣處温父子同恣貪婪殺戮無辜助為不法衆心離散立致分崩狼狽荒迷容身無地罪誠難貸令在必行假其餘生庸示寛大據耶律淳大為不道棄義背恩獲戾祖宗朕不敢赦應所授官爵封號盡行削奪并妻蕭氏亦降為庶人仍改姓虺氏外據皇太叔并妃别無闗礙更不施行其封爵懿號一切仍舊嗚呼仰觀天意俯狥輿情勉而行之朕亦不忍且仲尼作春秋亂臣賊子懼後之為臣子者可不慎歟初燕王卧病於城南瑶池殿李奭父子與陳泌等隂使奚契丹諸貴人出宿侍疾燕王危篤處温托故歸私第欲閉契丹於門外然後乞王師為聲援契丹知遂不果後永休縣進納人傅遵說隨藥師入燕被擒告說李處温父子嘗遣易州富戸趙履仁劉耀賫文字通童貫欲挾蕭后納土大宋履仁授朝散大夫劉耀均州團練使見充宣撫使司凖偹差使蕭后引問處温等示其前後罪犯遂無以對處温賜以自盡子奭凌遲處斬籍其家貲得見錢七萬餘貫金銀珠玉稱之自為宰相數月之間四方賄賂公行初處温父子聞天祚播遷勸立燕王僣號以圖恩倖及燕王死後恐契丹亡失其所依一遣人北通金國俟其大軍之來期以内應一南結童貫願挾蕭后納土以歸皆非至誠蓋所以宛轉欲為身謀而至此反為身害朝廷撫定燕山府追封處温為廣陽郡王子奭保靜軍節度使以本宅為廟北征紀實曰李處温者遼國故相李儼之子也嘗諫天祚以國危使奉中國不納及九大王立以推立功而相之與四軍大王者對主國柄後又輔蕭后說蕭后歸朝乃宻遣人通好二帥約日以燕山降及蕭后歸而二帥失信不能周旋於其間事洩處温為四軍所殺而抗王師矣遼人知其國且亡而中國必欲故地也是以不戰而聽順謂中國既得所欲而彼尚可假中國之勢存其血食而已然中國之意期於必滅之而後已是以遼人後復說女真入中原傾我根本皆以復讐也中國失之甚者尤在於是又曰遼既無主羣臣乃即燕山立其叔九大王耶律淳號天錫皇帝遂降封天祚為湘隂王適乃中國犯盟不惟我師不堪戰且九大王者素得人心吾又不直是以破貫如拉朽然及聞敗羣小沮二帥議退師上意亦欲且罷將復與九大王約舊好獨王黼力主之百端激上意以成其奸因從經撫房降御筆飭二帥曰示敵以弱非計之得也㑹九大王者適病卒而遼人奉其妃號蕭后為主故遼勢更熸於是再出師矣七月二十六日壬午王黼再議興師童貫蔡攸自瓦橋關莫州回河間府忽知中山詹度奏耶律淳死燕人越境而來者皆以契丹無主願歸土朝廷猶豫未决間太宰王黼欲功高蔡京力主再興師議手詔優允於是悉諸道兵二十萬期九月㑹三闗詔貫攸毋歸異議者斬於是伐燕之議成矣八月丁亥朔檢校少傅河陽三城節度使劉延慶為都統制進兵封氏編年曰朝廷以檢校少傅河陽三城節度使劉延慶代种師道為都統制耀州觀察使劉光世代辛興宗同州觀察使何灌為副統制又分廣信兵駐安肅遣張思政權領賜延慶旌幢七寶金槍御袍束帶以寵其行議两道進兵延慶復營古城光逺灌駐兵廣信此時契丹以連月塞上無警留兵新城主將四軍大王蕭幹太師達實林牙以燕王淳病先次並入燕結謀䇿立蕭后不暇來白溝延慶瞰亡數遣將鄭建雄紹等渡河侵掠俘獲甚衆而牛欄監軍領本族契丹㑹鄉社丁出没於廣信界光世出兵迎戰其將冀景趙明任明等首摧敵鋒萬計貫表其功擢光世威武軍承宣使寵錫甚厚俄詔華州觀察使楊可世復赴朔方宣司聽候差使貫令守安肅軍時漢燕良民轉為憂苦嘗思南歸未有以發因光世兵至徃徃來降宇文虛中劄子論收燕山利害契勘契丹二百年强國方其盛時自處尊行恃甲兵之富强指嵗賜為獻納招擕附屬力制方夏今來遵奉睿算按兵臨邊曽未半年遂使震懐亟遣使人祈哀請命其言遜順至有難循舊制惟命是從之語蓋自三代以來摧强敵為附藩未有速于今日者今欲盡復燕山或使納土臨以大兵假以嵗月固亦可致但部族繁多不能盡勝知彼知巳當圖萬全今具合計議事如後伏乞朝廷集議詳酌施行一兵有勝負乃古今之常理若十萬全軍出師攻取涿易未㧞或雖得涿易而守偹未周人心未固聚兵至燕燕未肯下相守半月以上攻之不㧞後無援軍糧道不繼利害如何一今來女真竭國㸃集次第甚大若以此兵逆舊遼主自西而來我軍攻燕未下相遇於燕城之外其利害如何一女真兵馬見在中京我軍十萬必未能圍合燕城女真守約不遣助兵入關其利害如何一若我兵未能下燕女真入關一舉而㧞掠為空城以城歸我不唯繕守費力又恐為敵所輕其利害如何一契丹昨來遣使女真願為附庸女真不納求附朝廷觀其意蓋是畏女真愛中國避强悍歸仁義今西夏以重兵壓雲中狡詐窺伺託為存亡繼絶之言其意甚逺若契丹北為女真所拒南為中國所棄收拾餘燼翻然决計乗夏人聚兵之地割地以為約積粮以遇兵不唯王師入燕為所牽制亦恐他日西北邊事未有寧息之日一若大軍取燕不得之後却與開納許之以稱藩比之今日未舉大兵其恩威两全利害如何一若果得燕地一府九州五關十餘縣又遂旋築寨建營堡置守偹人兵粮草調發措置何所從出一女真兵馬或為夏國勁兵所挫或以久客逺征一旦歸國我未得燕城或得燕而守偹未固與女真大兵聲勢相逺其利害如何一若得燕之後徼外别部依附旁近險阻或通欵天祚或别立新主西兵不可久戌北兵不可倚仗永逺警偹利害如何一若西夏大兵助送天祚不能入燕不得而歸蓄怒乗虛却於陜西河東出沒牽制作過其利害如何竊謂今日為國家大計須期永久安逸不廢兵馬錢榖公私事力坦然無北顧之憂費省力暇過於昨來與契丹通好時方為穏便若兵連不觧征伐防托或滅遼之後調發勞費太過于未用兵以前其利害不可不計九月三日己未烏舎等至國門詔以趙良嗣充舘伴使起居郎檀倬充舘伴副使中使李琮童師禮就班荆舘押賜御筵燕雲奉使録曰烏舎髙慶裔行次多是理㑹舊例計較禮數如乞就都亭驛安下上殿賜宴差舘伴使副之類童師禮傳聖㫖令臣良嗣諭與使副貴國兵屯白水泊雖已多時亦有未是處契丹天祚元未曽捉得亦未殺了又聞契丹舊主走入夏國借得人馬過黄河奪了西京以西州軍占了地土不少不知來時知子細否使副答云來時聽得契丹舊主在沙漠已曽遣人馬追赶次第終須捉得兼沙漠之間係是韃靼蒯古子地今此两國君長並已拜降了本國待走那里去國書中已載矣十一日癸卯引烏舎髙慶裔見于崇政殿烏舎髙慶裔上殿跪奏曰臣等來時大金皇帝傳語大宋皇帝為契丹昏主無道因舉輕兵再伐遼國大獲勝㨗所有舊漢地事專遣人等禀議上遣師禮傳㫖諭以謝大金皇帝逺遣使人到闕所有回答國書待親筆寫去以見相待厚意契丹舊主尚在沙漠早捉拿了甚好有計議等事可詣宰臣王黼賜第商量上待烏舎等甚厚屢差貴臣主宴賜金帛不貲至輟御茗調膏賜之引登明堂入龍徳宫蕃衍宅别籞離宫無所不至禮過契丹數倍而慶裔渤海人尤桀黠頗知書雖外為恭順稱恩頌徳不絶詞而稍稍較求故例無虛日如乞舘都亭驛乞上殿奏事朝廷以两國徃來之儀未定請姑俟他日况契丹修好之初未嘗如此慶裔遂出契丹例卷靣證朝廷之非請載之國書為據朝廷不得已皆從之乃賜金帛袍叚與夏國錦褐皆辭而不受十三日引詣王黼第計事烏舎等庭趨訖升堂講賓主禮而受回書汪藻謀夏録曰烏舎辭聖㫖諭使人燕中無主止是四軍領兵為邊患及挾女主猖獗豈金國可容早擒之為佳烏舎慶裔曰四軍古爾班爾汝何人敢爾哉回本國當奏陳時朝廷屢以勝契丹欺金人而有一四軍不能制反仗金人擒之自相矛盾矣九月十五日辛未遼人知易州高鳯遣僧明賛詣宣撫司約來降封氏編年曰知易州高鳯與通守王悰共議云天祚播遷燕王厭世女主初立謀遷漢人或聞欲行誅戮漢人被害吾軰安得奠枕今者南國宣撫被㫖弔伐漢人徃徃南歸今蕭幹林牙見在燕京可宻遣人歸欵南朝使南兵來此内外相應盡殺契丹吾軰可免日後之苦悰遂謹諾得僧明賛令來宣使司賛具說漢人朝暮延頸顒望日俟天兵欲歸王化積有嵗時今者伏聞朝廷詔詞寛厚檄榜丁寧又聞宣撫司日收歸明不下千百今日知易州高太師通守王少卿專遣明賛來見宣撫欲乞擇起兵月日來抵易州當以内應誅戮契丹伏候鈞㫖貫既察來情又使劉延慶審問真實宻令明賛先歸期以二十日約天兵前到城下貫許以事濟日賞之以官先次厚勞令歸十七日癸酉宣撫司檄劉光世令應易州十八日甲戍烏舎等入辭於崇政殿差趙良嗣充奉使大金國國書使兼送伴武顯大夫文州團練使馬政充同送伴闔門宣賛舍人馬擴充國信副使烏舎等辭上令童師禮傳㫖契丹舊主尚在沙漠早捉拿了當為彼此之利今來國書事目並係親筆寫去以見相待厚意朝廷國書云使航薦至聘禮増華載惟修睦之勤益稔締交之厚且承親臨軍旅逺撫封陲用申弔伐之仁以訖威懐之畧逖聞風義深慰忱誠自審舉軍至西京即遣童貫等領重兵相應河北河東两路屢敗契丹俘馘甚衆軍聲蚤震諒已具知所有漢地及夾攻等事並如昔遣趙良嗣所議與累次國書并馬政所賫事録大信既定義無更改其餘具如别録大軍屯駐並邊已久冀堅守信約來應師期共成取亂之圖永洽善鄰之契候當秋凜順保天和今差大中大夫徽猷閣待制趙良嗣等充國信使副有少禮物具諸别副專奉書陳達不宣謹白事目一昨遣趙良嗣計議及累次國書所載并令馬政賫執事録所議漢地等事係五代唐以後所䧟營平幽涿薊檀順蔚朔應雲新媯儒武寰等州舊漢地漢民内幽州係今契丹所稱燕京其餘州縣有契丹廢併及改正名號去處候收復訖彼此畫定封疆一自聞舉兵西京即遣太師童貫等領兵相應大軍自今年四月以後屯駐河北路極邊累與接戰大獲勝㨗依元約合夾攻以未見金國進兵夾攻未曽深入縁契丹日近犯邊若因追㨗乗勢盡收燕地不須夾攻外若未收復即合依元約夾攻所謂夾攻者係本朝自涿易等處進兵至燕京金國自古北口等處進兵至燕京西京管下漢地候收復燕京畢日彼此夾攻其漢地外地土合屬金國占據一契丹舊主見在天徳軍地北夾山一帶藏泊見帶領所借夏國兵馬及勾取朔州等處正軍鄉軍䕶衛欲禦敵金國燕京見搬送銀絹赴舊主處賞設夏國來人兵其舊主若不勦除於金國終為後患一夏國素務矯詐昨聞嘗遣使詣金國賀功其實力助契丹至公行文字詆毁金國甚切及勾集衆兵借與契丹聞累與金國接戰已占據契丹金蕭河清軍天徳軍雲内州若不討伐常作隄虞必為金國深患其詆毁文字可付與使人近據河東路繳到金國軍前都元帥府牒内一節稱燕京路候秋凉以兵收去三國其間將欲如何又牒稱二國徃來事慮有下手先後據此雖意是夾攻縁文字語言未是彼此合守夾攻元約施行二十日丙子劉光世進軍應易州之約至白溝為牛欄軍所敗不得前封氏編年曰是日劉光世遣冀景趙明翟進為𨕖鋒光世楊惟中為中部張思政為殿軍次白溝牛欄軍千餘從古城出與𨕖鋒人接戰𥘉我軍以為易州來納欵不為之偹偶爾遽戰為敵所乗中部與殿後皆不得前前軍轉戰至古峯臺西復挫衂易州城内望風以為王師至矣太師高鳯先令漢人趙乗淵宻為之偹至是盡殺耶律氏契丹或告南軍不勝鳯與乗淵等相顧失色僧明賛曰事已若此且可閉門固守以待王師日晚牛欄軍至易州知高鳯内變以為王師詐敗别有措畫急反北奔鳯再遣人來宣撫司言契丹耶律本州已行勦絶牛欄兵騎亦已北奔乞遣人兵前來二十三日己夘遼將都管押常勝軍涿州留守郭藥師上表以涿州來降是日遼人都管押常勝軍涿州留守郭藥師因涿州刺史蕭慶餘遣團練使趙鶴夀帥精兵八千鐵騎五百一州四縣來降封氏編年曰藥師表云臣聞天有道則闕民非后何戴是謂天人之極致豈非古今之常情臣躬領州縣僚属豪右子弟官貟僧道軍吏百姓等奮臂約一萬人斬首至三千級允屬徯蘇之望舉懐賴慶之思燕雲奉使録曰表云藥師言一昨天祚皇帝怠棄鑾輿越在草莽萬姓無依棲之地五都有板蕩之危雖宣宗嗣圖旋至奄忽女后攝政尤難撫綏誠天命之有歸非人力之能致臣藥師等雖屬多難莫生異心蓋所居父母之邦不可廢臣子之節今契丹自為難首竊稔隂謀燔燒吾里廬䖍劉吾士女報之以怨撫乃以讐臣藥師等以是競思戴舜以同心不可助桀而為虐今將所管押馬步軍用申懇悃伏願皇帝陛下副兹多望憫此哀鳴特開天地之恩許入風雲之㑹實所願也非敢望焉臣藥師等無任瞻天慕聖激切屏營之至謹奉表以聞臣藥師等誠惶誠懼頓首頓首謹言宣和四年九月十日遼國常勝軍都管押諸衛上將軍臣郭藥師等表奏先是遼人天慶十年金人苦於用兵經嵗不出諸路軍馬依舊屯備有東南路怨軍將領董小醜因差討平利州賊坐逗留不進賊平被誅本部隊長羅青漢董仲孫等唱率怨軍作亂伊都副統兵討之賊勢稍窘郭藥師等内變殺羅青漢等數人遂就招安蕭幹奏留貳千人為四營擢用郭藥師張令徽劉舜臣甄五臣各充統領燕王即位改怨軍為常勝軍藥師年少壯貌頗偉岸而沈毅果敢以威武御衆人多附之初以武勇四軍薦授殿直從征女真積前後功擢守涿州偽后専政契丹欲再謀殺漢人恐應南軍忽得報言易州降大宋藥師有意歸明時四軍蕭幹聞我軍再壓境自燕來涿州而藥師以為圗已乃與張令徽劉舜臣甄五臣龔詵趙瑄韓璧謀叛既决乃召蕭幹開宴欵宻且以厯數符䜟説其歸漢四軍怒曰吾薦汝於朝授此官職豈可背朝廷藥師以為幹必從請又嘗受薦恩初不敢害幹幹當此之際所領兵不多又料藥師既叛意恐其不從慮禍及身遽起啟鑰而去藥師急召所部説曰天祚失國女政不綱内盗外冦天下瓜分宋天子以好生之徳弔民伐罪命虎臣擁重兵下易州壓吾境此勇男子取金印大如斗之時也乃以髙官厚禄邀吾輩倘强項不進破國亡家噬臍何及衆當如何萬口喧呼無不嚮應遂囚監軍蕭餘慶等乃遣團練使趙鶴夀帥精兵八千鐵騎五百一州四縣土民奉表來降三朝北盟㑹編卷九
