body:
  text: 三朝北盟㑹編卷一百六十八宋徐夢莘撰炎興下帙起紹興五年五月盡十二月胡寅又論遣使有害無益臣竊聞宰相張浚有奏論使事為兵家機謀於臣所論事理不同今何蘚遂行不可救止臣待罪侍從初有所陳已荷聖知今以輔臣謀國陛下之所改顔而禮貎之者也勢難以臣故而沮其議臣不當力論致勝徒感紛紛然臣三思慮終未曉浚之説須至剖析聞乎聖聪望陛下留神省覽姑且志之聖懐俟何蘚歸日與浚孰可孰否則使事之利害决矣今則未敢求直也尼堪總師二十餘年破大遼弱我宋雖無逺畧亦稱善於用兵其所行事盡詭詐也今我之虚實彼豈不知也尚須卑辭執謙然後足以驕其心示弱屈服然後足以平其怒乎此遣使之無益一也庚戌而後不遣使金兵亦不來及癸丑遣使則鈎引金人入國熟視而去曽不旋踵而淮南之警奏至矣此遣使之無益二也前我所使四輩皆朝廷之選侍從之臣聞其入敵境晝夜驅馳畧無禮節及見尼堪坐受欺紿怱怱而歸未嘗得其要領况何蘚一使臣其何能任覘國之事乎此遣使之無益三也昔富弼之使也以一言息南北百萬之兵可謂偉矣使歸行賞遷進官秩方以中國未能用兵徒賴使臣口舌下敵為莫大之耻終不肯受其識如此乃可辦國今奉使者首先論其私事所求恩澤一一足意而行所慮必定與市井之人無異尚能明目張胆不辱君命乎此遣使之無益五也金人之所大欲者誰不知之既有滅宋之心正使劉豫明日就亡今日亦必赴援而况劉豫向金祈哀乞援秋高草熟南下何疑此不待窺視自可坐照一堂之上者也此遣使之無益六也今淮以北劉豫自以為封疆矣河以北尼堪自以為土宇矣使者之行豈能乘雲御風徑至敵廷哉必度清淮之阻經濁河之限然後能至也去冬下詔罪狀逆豫明其為賊今豫肯賓吾使人逹之於金哉此遣使之無益七也今我與金之勢如兩家有沒世之仇一弱一強強者侵凌不休弱者必固其門牖嚴其戒備待時而動庶能有濟乃欲命僕夫㗖以酒肉悦以金帛適足以重吾之弱増彼之強而已此遣使之無益八也自古兵強馬衆玩武不戢而無自焚之變此自古英傑勒曜垂珪之所難也尼堪乗勢逞威貪得無厭敵之靡耳非有保固世界兼併天下之術也度其兵士壯者老老者死其馬之齒日長矣其臣志滿意得沉酣乎玉帛子女之間不越数年必有禍敗此易見也萬一今冬黨助逆豫昧於一來陛下申嚴將士據大江之險以禦之彼再而衰三而竭必矣小大勝負兵家之常今未有交兵之形而據自納侮以示畏恐情見力屈當反為所乘非兵家形格勢禁之法此遣使之有害九也夫和人之心迎合尼堪之意為身謀而已陛下寤寐賢才日昃不倦菲衣節食卑宫室陋器用以養戰士固將為父兄攄覆載不同之憤雪滄溟不滌之恥若兼用和䇿則謀臣解體志士䘮氣將帥偷安卒伍潰散以為無復有輸忠効志建功立名之日使人自謂其説可用如此則必有進為之漸以國與人取悦於尼堪大事去矣此遣使有害十也獨有一説使陛下難違者以二帝為言耳然自建炎改元以來使命屢遣無一人能得兩宫起居之狀謦咳之音者况今歲月益久敵必重閉畏我知之今以敵為父兄之仇絶不復通則名正而事順他日或有異聞在我理直易為處置若通而不絶則敵握重柄歸曲於我名實俱䘮非陛下之利也使或有知二聖所在一見慈顔宜達陛下孝思之念雖歲一遣使竭天下之力以將之亦何不可之有如艱梗悠邈必無可達之理何以此揆之則以二帝為言者理不可信也臣聞善為國者必有一定不可移易之計正其大義不僥倖以成之漢高帝出闗得董公之言以弑君討項羽後雖屢敗然項羽負不義之名雖強必弱漢守其䇿不變終有天下然張良嶢闗之舉養虎論羽君子猶羞之及劉先主諸葛武侯志在復漢目操為賊亦能三分鼎立魏延出竒欲速孔明不求近功君子以為真以天下自任者古之豪傑規模措注大抵如此三國崛起曹氏先據利勢蜀後立豈以㣲弱之故卑下於操以茍存耶孟子曰君如彼何哉強為善而已今日大計只合明復仇之義用賢才修政事息民訓兵以俟北向更無他䇿儻其未可惟是堅守若夫二三其徳無一定論必恐不能有為至於何蘚之行非特無效須决取辱臣所見如此豈得以張浚有言而自抑也又况䝉被詔書曲加奬諭先以為榮今焉内愧所以致詳盡義忘其喋喋在報君非好辨也若夫軍旅之事則未之學張浚以遣使為機權者臣所未喻不敢強為之説伏乞陛下幸赦之取進止楊造乞罷和議劄子臣嘗觀陸贄論禦外之䇿其説甚詳大抵以為敵國之強弱視我國之盛衰聖人所以待之者無一定之規亦無常勝之䇿顧其勢如何耳其説有曰尊即叙者則曰非徳無以化要荒殊不知威不立不能服也尚親和者則曰要結可以睦鄰好殊不知我結之而彼復解之故當強悍之勢而行即叙之方則見侮而不從矣今日正此之謂也自靖康以來主和議不為偹禦計卒為敵詐以至二聖蒙塵其禍亦可監矣至今不悟猶蹈覆轍深可痛也比聞復遣二使以請和金若有謀則許吾以取重愚者以為喜而智者之所深憂也葢既許吾和則上下偷安必不為偹禦之計既而出重賂國力必竭不免暴歛民怨盗起敵復不可信一旦乗虛而來為不可測此其所可憂也若其無謀則必絶吾之使愚者以為深憂而智者之所深喜也葢不許吾和則吾致死以為偹禦之計此其所以為可喜也且金國之人非可以信誓結今其所以不來者非愛我而不來也亦非畏我而不來也以其勢自有牽制未暇來爾昔趙鄭割地以賂秦虞卿曰秦之去也倦而歸乎其亦愛我而不攻乎曰秦之勢無餘力必以倦而解曰秦以倦歸而君又以秦之力所不能取而賂之是助秦自攻也今之為和議者何以異此説者謂國家今日正猶勾踐事吳稱臣奉貢不得不然是未知事勢之不同也越之棲于㑹稽葢吳王聽宰嚭之言而許之平故勾踐以為得計今敵未嘗許和也其所以不拒絶者特其詐謀以全勝欲吾不為之備亦取之易矣故其未來則吾與之重賂其既來則吾莫之禦是吾之和無纎毫之益徒沮義士忠勇之氣長金人無厭之心竭民脂膏以資盗粮非計之得也若其稱臣奉貢尤非所宜昔新垣衍欲趙之帝秦也魯仲連曰若使秦帝則連有蹈東海而死耳且曰吾將使秦烹醢梁王新垣衍曰秦何為烹醢梁王魯仲連曰九侯鄂侯文王時之三公也葢嘗為脯醢而囚之矣秦既為帝則將行其天子之禮以號天下將奪其所争而與其所愛梁王豈晏然而已乎於是新垣衍不敢復言帝秦而秦軍亦為之却今或稱臣於金則中國為金之掌握矣彼將所求無厭既得重賂又求割地矣又召大臣大臣往矣又將邀鑾輿之臨幸則何以為謀若不往則遂廢前功彼則興兵而伐叛臣不為無辭若遂將順則又將為二聖矣言之至此可為寒心而議者安於此説可謂無謀之甚也猶謂國有人乎或者以為二聖在彼故吾不得不與之和是不然昔漢太上皇吕后為項王所得置爼欲烹夫高帝豈孑然忘之哉而未嘗為之屈葢勢不可爾然項王卒不敢加害葢以高祖之勢知害之無益而存之則可以為重資故割鴻溝之後卒從侯公之言而歸之今國家若能勵兵秣馬稍振中國之威且勿與之通則彼莫能測其虚實必不敢動吾已復中原然後遣辨士若侯公者往請彼奉二聖以來歸矣故二聖雖在彼於中國用兵之勢無有害也故為今日之計當與諸將議先復中原以振國威然後閉闗不出卑辭厚賂以請二聖當必得所欲於今遣使徒取侮耳非所宜也議者以為彼強我弱出未必勝故不敢與校是未知用兵之勢也昔陳常弑簡公孔子請討之夫以強弱小大論之魯不能敵齊也審矣孔子豈不量敵而後進哉葢其説曰以謂陳常之弑齊國之與者半不與者半以魯之衆加齊之半其勝也必矣夫以楚人病秦之詐懐王必欲亡秦而漢末人人思漢之徳皆欲興漢在今日人人痛憤二聖未返未敢比楚人之情而國家徳澤之厚人懐不忘亦非止漢世之比也然則在今日倘能奮其威武自淮而北必有響應者矣側聞近日河北亦常有欲興義而來請者數輩朝廷慮其生事以敗和議拘之軍中此為失䇿倘乘此以有為不亦可乎且愚竊謂今日之計當乘天下痛憤之切人懐思宋之心乘時有為及其鋒而用之决可有功若或遲疑不斷竊恐歲月之久人心懈怠懐彼喣濡之恩而忘忠義之心則事難舉矣縱不能出兵不當為和議以墮敵計也葢事之不可信已可鑒矣今日之未來非縁和議特其勢自有牽制未暇來耳儻與之和必出重賂徒竭吾賞軍之費為金人進兵之用真所謂資盗粮也俟吾國力已竭然後乘釁興端而兵勢必不支雖其有智者不能善其後矣此必至之理也議者謂敵之所欲不過金帛子女耳與之得其欲而不來是何異兒童之見也敵之貪心豈有厭哉今少與之則不足以充其欲多與之彼則以為中國尚富貴而乃懼我如此是必兵弱可以一往故為此計實啟彼心安能使之不來哉及國力已竭而後為禦之之計孰若未圖而先為之慮也昔曹操破荆州遂劉偹移檄於吳孫權召羣臣謀或以曹公士馬之強既得荆州劉表治艨艟鬬艦乃以水陸俱下勢不可敵不如迎之惟周瑜魯肅以為當擊便北人尚騎本不能水軍與吳越争衡今操自送死可迎之耶將軍擒操宜在今日瑜請以三萬人為將軍破之權大喜拔劍斫案曰復言當迎曹公者與此案同因發兵使瑜拒之遂敗曹公於赤壁故兵之勝敗在人謀耳庸人之見朝不及夕但偷安目前不思後患殊不知無逺慮則近憂亦不能免也夫兵凶器戰危事聖人難言但勢有不得已雖毒天下所不可辭也且敵心叵測不可望其仁慈意其憫我惟振之以威乃可服爾故將欲和之亦必戰勝而後可議也在昔契丹所以能百年守盟好者亦以章聖皇帝有澶淵之㨗爾臣愚伏望睿明特發威斷早定大謀專為戰守之偹勿主和議以墮敵計實天下之幸甚六月岳飛兵大破湖賊擒楊欽夏成等湖賊悉平湖賊楊么為其下所殺也其黨楊欽夏成等各領其餘衆拒命欽偽為馬軍太尉成偽為太僕射皆與鍾相守事之人兇愎桀黠賊也張俊臨湖觀之知未可攻乃歸潭州有急詔召俊還朝謀防秋之計㑹岳飛至潭州出圖示攻討出入之要廼曰擒之易耳俊曰恐誤防秋之期俟明年再來討之如何飛請除往來之程限八日破賊請俊曲留以俟之俊然之先是湖南統制任安王俊郝日政等領兵二萬餘不禀王爕號令遂致於敗及飛始至鞭任安及孫議以泄其氣使其賊餌賊併兵攻任安戰三日而困之飛乃以伏兵四合一戰破賊衆盡乘其舟以入水寨楊欽等迎降尚有餘衆数萬飛决欽等各一百遣囘是夜用師徑掩其營破其賊而執欽惟成寨三面臨大江北恃峻山不降親往測其淺處悉衆運草木放之上流至淺處則棄瓦石壓之一日填滿馬驅入其寨遂斬成湖賊悉平果不過八日授欽武翼大夫遺史曰欽狡獪狙詐最桀黠既授以官公論皆不與之欽出身脚色書曰鍾相楊么作亂欽等聚集強壯保守鄉村候官軍到鼎州乃同共破賊有功見之者無不大笑仇悆知明州兼治海制置使仇悆為制置使用延超為制置司都統司王彦知制荆南兼充峽州荆門公安軍安撫使張俊以都統視師湖南平楊么乃召王彦赴都督行府彦未到湖賊已平遂令彦制荆南兼峽州荆門公安軍安撫使時解潜已離荆南彦到荆南府庫倉廪皆虚錢糧俱闕彦懼之荆南不住徑追潜至鄂州㑹俊収楊么囘鄂州復勸彦囘荆南赴新任賜岳飛詔比得張俊奏知湖湘之㓂已悉清紓朕西顧憂良用欣愜非卿威名冠世忠畧濟時先聲所臨人自信服則何以平積年嘯聚之㓂於旬朝指顧之閒不煩誅夷坐服佳靖使朕恩威兼暢厥功茂焉腹心之患既除進取之圖可議緬思規畫加歎不忘然恐招撫之初人懐反側更宜綏輯以安衆情措置得宜彼自馴擾必與卿計之熟矣或有陳請可具奏來七月王斌知金州兼金鈞房州安撫使王彦到荆南王彦知荆州經盗賊後城郭為墟移治於枝江縣彦至姑還舊治帑廪空乏無三月儲彦依川錢法先措置交子于荆南管内行使漸措置屯田以為出兵之計乃擇田分將士為莊莊耕千畆惟山口富里舊截沮河置千户石塘瓦窑三堰隄水分溉為最良今堰廢不治彦親督將士具畚鍤修築計工六萬有畸不浹旬告成公私之利無窮天下論屯田營田實不擾民而得充國遺意者必以彦為師首詔奬諭也八月張俊加光禄大夫制曰朕登建哲輔協圖康功内則總一萬類以制樞極之機外則經營四方以廣威懐之畧既告成于逺績當受祉于勤歸廼先飲至之期誕錫颺廷之命具官張俊才全而用博道大而聲宏誠足以感㑹天人而交精祲之㣲識足以貫通古今而應事物之變遭時奮節身狥國家仗義扶顛功存社稷出入參釐于二柄險夷更閲于百為復專機握之前籌來扈戎車之親駕爰立作相遹觀有成講明法度之原修飾甲兵之備革人謀之囘遹正國步之搶攘首端本於朝廷躬視師于江滸搃提紀律示昭王靈周復山川究觀地利勞三軍于細栁猶親廵六尺之輿剪羣盗于緑林初不煩一夫之㦸湖湘底定肅清蛇豕之區秦蜀相望增重金湯之勢阻深􅠶跋霧潦欎烝歴寒暑者三時計往來者萬里宜加寵數以答忠勞峻品秩于文階昭儀形于揆路兹厚保衡之寄益寵體貎之恩於戯邦國定而王心以寜股肱良而元首斯起赤舄几几周公何信宿之遲四牡騤騤樊仲有遄歸之喜正是百辟弼予一人迄乎耆定之休永輯無窮之祉以平湖湘之功也馬擴為都督行府都統制馬擴以江西制置副使駐軍武昌也是歲四月召赴行在供樞宻使都承㫖之職為都督行府截留陞諮議軍事兼行府統制留鎮江措置軍務偽齊䧟光州九月化旺敗偽齊于光州克光州岳飛加檢校少保解潜權主管馬軍司公事先是解潜提兵解圍太原也趙鼎嘗居其幕中解潜字亨叔靖康中金人已破种師中長驅而南李綱為河北河東宣撫薦潜戰敗綱謫潜亦廢建炎四年起荆南峽州荆門軍公安鎮撫使兼知荆南府時楊么據洞庭湖衆十餘萬擾沿湖州郡潜屢與賊戰勝負相當紹興五年趙鼎相薦其材召為主管侍衛軍馬司七年其軍士與王彦軍交争于闕下宰相張浚罷潜提舉江州太平宫以其兵𨽻劉錡趙鼎再相復招為主管侍衛步軍司俄乞宫祠九年除福建路副總兵任滿居平江府因于辛樂宗論及和議之非宰相秦檜聞而怒之授團練副使南安軍安置以卒趙鼎加左光禄大夫十月李綱知洪州兼江西安撫制置大使吕頥浩知潭州兼湖南安撫制置大使席益知成都府兼成都潼川府利䕫路安撫大使賜李綱詔朕以大江之西俗輕而悍㺯兵之㓂無歲無之師旅荐興民益凋瘵肆圖舊弼往鎮臨之卿威名徳望聳動一時風采想聞人自慴服起于閒館作我价藩少煩指顧之間一變潢池之習先聲所暨諒折遐衡朕之用卿審矣卿宜以安社稷為己任勿問中外勉為朕行不必數有請也故兹親筆詔諭卿其悉之賜呂頥浩詔朕以湖湘八州之地西通巴蜀為國上游往連盗區一方騷動比者招輯雖已畧平而民俗剽輕或易生變允藉耆徳往鎮撫之乃起卿燕閒之中而屬一方面之事庶期談笑坐以銷萌慰彼黎元増重形勢勿抗章固避殊咈于懐惟卿社稷元老身任安危必不以内外為間諒應聞命慨然引途故兹親筆詔諭卿悉之十一日庚戌張俊至行在行狀曰俊還召對便殿具奏曰竊惟二帝聖族逺處沙漠憂憤無聊與夫輕侮受辱可想而見也尚忍言之哉臣嘗屈指計之如此者葢三千晝夜矣敵人用意實欲摧折而消磨之也雖然尚幸陛下總師于南耳異時或有一蹉跌其禍可勝言乎今事雖有可乘之機理未有先勝之道葢兵家之事不在交鋒接戰然後勝負可分要在得天下之心則氣百倍敵自歸服雖然豈可以聲音笑貎為哉必念之一毫無差四海共知今使天下之人皆曰吾君孝悌之心須臾不忘寢食之間文兄在念當思共為陛下迎取矣皆曰吾君之朝君子在位小人屏去侍御僕從罔匪正人譛説不行邪言不入市井之談不聞仁義之益日至則内外安心各服其職而有才智者悉思盡其力矣皆曰吾君之屏珠玉絶美好輕犬馬賤刀劍金帛之賞不以予幸惟以予功則上下皆勸矣以至吾君言動舉措俱合禮法至誠不倦上格于天則望教化之可行如此則將帥之心日以壯士卒之心日以奮天下百姓之心日以歸敵國雖號荒服然非遂至冥頑也聞陛下之盛徳知中國之理直氣壯小人雖異志而戰不必力衆不必同則陛下何為而不可成乎或有不然疑似之説毫髪著見天下之人口不敢言而心敢怒異日事乖勢去禍亂立作如覆水之不可収也葢隙見於此則心生於彼不易之道自古為君之難非特今日也一言之失一行之非或失色於人或失禮於人或一小人在側便足以致禍致難起戎起兵前日明受之變造逆之徒陳兵闕下旁縁他辭其鑒不逺也為人上者其可不兢畏戒懼哉其言深切如此上皆嘉納金人攻漣水軍韓世忠將呼延通及金人戰于漣水軍敗之詔張俊荆襄視師手詔朕仰惟二聖逺狩九年于兹雖迎請之師屢馳而侍膳之期尚逺晨昏在念怵惕靡容間縁北使之來歸每諭兩宫之安報嗚呼朕為人之子而未獲養其父為人之弟而未能拯其兄瞻望䀌傷不知泣泗惟孝弟之至固可通于神明而小大之臣當共鑒于忠義庶戡多難克濟厥功以爾資父事君之誠副朕念親從兄之志咨爾有衆咸體朕懐十二月改神武五軍名行營䕶軍張俊之軍為中䕶軍岳飛之軍為右䕶軍韓世忠之軍為前䕶軍劉光世之軍為左䕶軍吳玠之軍為後䕶軍楊沂中權主管殿前司公事以神武中軍吳錫之軍撥𨽻殿司邵濤為兵部侍郎都督府叅贊軍事三朝北盟㑹編卷一百六十八
