body:
  text: 三朝北盟㑹編卷二百二十六宋徐夢萃撰炎興下帙起紹興三十一年正月盡其月工部侍郎沈介上封事論備敵之䇿臣竊惟今日之慮莫若備敵之䇿為急臣敢首言其失而條具所以備之之䇿臣聞天下之事未有不失于恃而敗于忽者也不慮其有患慮其忽于有恃者也恃安則忘其危恃無患則忘其備而忽生焉觀事之可從曰未為然也聞人有言曰其過慮也其肯思患而預防哉事至而圖之將何及矣朝廷弭兵講和二十八年向者敵有可疑之釁天下舉憂之而朝廷失于時非特天下憂之在朝之官有位之士秉鈞樞執綱憲與夫左右侍從之臣舉皆憂之退朝而簇談平居而竊議扼腕忿怒仰屋太息及乎進而有言則又皆容悦之説而忘其所奮怒太息噫自古强者制弱向敵之與我和也將愛我耶抑亦力之有所未至耶揆情而言固無變我之理則亦力有所未至耳邇者觀摹舉措日異而月不同陛下觀之豈能晏然而無所為乎或者謂曰誓約至堅幣帛至厚可以格奸心過矣昔日吳濮有釁楚之執事豈其顧盟由古已然又况慮大事者不計其小利豈歲幣之云乎則又云彼方肆虐民孰為用旱蝗日起兵孰為動亦過矣傳曰吳方無道必棄疾于人猶足患衞己事之驗也又况城汴之役執事者不止數百萬人而謂今日之失于恃也臣願陛下勿恃和之可久勿恃兵之不動戒如敵至無忽于備而後可為也顧今大患有二一曰國論不定二曰威令不行二患不去雖備敵將有所不可能何謂論不定備敵之䇿不過有三征也和也守也三者之説歸于一然後可備征固力所未能和亦理難必恃亦守而已廟堂之上縉紳之間同乎守之說而臣謂國論未定者盖有守之之說而不見守之之具也邊候之書若有所聞則焦然以為憂也色動而慮亂旬月之間則又皆忻然忘其憂矣國論如此猶未定乎且陛下委重而待理者不過二三大臣朝夕所陳固可見三者之䇿其定已乎無乃泛然而無所主乎大臣之論如此陛下雖欲有為誰與共之臣願陛下大臣斷為一定之論必専為守無復異論而後守之具可言也所以為守之具又必一一而講之曰地孰為要可以宿兵將孰為先可使當敵兵謹于陣糧謹于儲將守淮也將守江也越淮而戰斯守淮矣越江而戰斯守江矣雖用兵不可預料然是數說者不可不講也獨吾備禦之計孰可循南北戰守之形孰可用此論一定斷然勿移旬歲之間守具備矣何謂威令不行聞之記曰威克厥愛允濟威不立而欲立事雖聖不能也曩者秦檜盗權威福自已震斷赫然收還權柄然三省樞密院奉行威令者也屬者朝命取劉寳軍二吏以為黄魚垜之用訖不禀承而三省莫敢誰何本兵之臣坐廟堂以選三衙之卒文符既下却而不顧乃斯還之而樞廷亦未聞議其罰者萬一當敵欲望號召以為臂指之用詎可得乎臣謂大臣當審已而不當逺嫌大臣逺嫌則小人必可乗其間矣臣伏願陛下明諭大臣無多為令無轉議令其有慢令者悉以上聞罰惟必行勿阿貴近如此則朝廷尊矣二患既除而後守之之䇿可言也守之之䇿其要有四一曰禦將二曰訓兵三曰先聲以奪敵人之氣四曰弃瑕以用度外之士何謂禦將臣聞之善禦將者莫若髙祖以信越英布之倫至固陵而始分之地慮其貴而驕也以淮陰之能已破趙則奪三軍易置其將慮其大而専也今諸將之視信越計功角材豈可同年而語而實齒公權兵柄至二十年志得氣盈傲視朝廷其至此果何道耶不過掊軍士之廪以利其嬴詭盡籍之數以私其禄為賈人之行以肥其室家既富矣寳貨珍异叢于前矣于是為市寵媚竈之屬宦官之徒有所謂承受者為之囊槖以利其貨為之遊談以久其權曲意以覆其愆巧言以溢其美忠良之臣進說而間已則内外合辭倡為一說曰彼之握兵將為桓溫與若専權而久將如禄山之類古豈無其人耶劉向曰數稱燕蓋以疑上心避諱吕霍而弗肯稱正是類矣士大夫平昔號為鯁亮者歎息而已未有敢倡言于朝者盖其陰謀固結卒不可破必敗而後已陛下所宜深察也為今之䇿莫若罷其承受之官而黜其珍异之獻自然畏威聽命安敢慢乎或曰結其心于平時所以冀其用近而折之非䇿也臣曰不然固其寵禄其官而臨之以恩所以結其心也非為縱閹宦之臣以為囊槖而珍异之獻以悦耳目剥軍廪為賈人也唐肅宗在靈武勢單力㣲甚矣李勉劾背闕之將而朝廷以尊况在今日而士大夫罔敢正論諸將豈理也哉臣願陛下斷而行之勿曰謀之左右皆其黨也雖欲行之不可得也何謂訓兵大將聽命然後精擇裨校各分以兵大或滿千小則數百訓練其才之能否將不可揜一旦有警大將守正以當敵小校制竒以立功攷之國史訓兵之事祖宗未嘗不親也其幸後苑幸玉津園幸金明池講武臺幸便殿或曰習出戰也或曰校出獵也或曰閱戰士也又徃徃引之内庭親授陣法故能作五季之衰為大宋之盛陛下以馬上再造中興之功自通和後訓兵之政漸弛而諸將専其任矣今之諸將豈有長慮深計國爾忘家者耶運土木以為技巧豈復使之執兵操竒嬴以行賈坐市區以謀利豈復使之習戰緩急有用驅不素教之兵付之貪鄙慢令之將其禍可勝言哉臣願陛下萬機之外雖翰墨之習圖史之玩有益而無損者亦姑置之專以閱武為事在二三大將諭以至意俾各條小校才能給以軍兵量其才而多寡之試之以藝責以月日而訓諭之軍為幾校校習何藝陛下早朝而退引數校以角藝其精習者厚其予其怠惰者嚴其誅聖心如神而人自勵不過一歲不病不為精卒雖横行天下可也况守備哉何謂先聲以奪敵人之勢臣伏讀國史澶淵之役敵盟而退常有輕中國之心當時大臣攄為長䇿建立北京雖未始遷都而敵挫氣矣邇者敵人驅百萬之夫為城汴之役穹廬之徙盖將有日傳曰城虎牢以備鄭此敵計也觀其舉措甚異萬一南下巢吾汴都其距長淮不逺千里疾行如鬼一二日而至也則吾又安得髙枕而卧哉縱彼未動吾能無慮乎臣謂及其未徙也為計以奪其氣仁宗建北京之䇿可舉行焉建康北距長江古為都邑謂宜亟下明詔修宫室治百司將為巡幸之舉彼之未徙我不先動彼之將行我則前邁縱彼恃强能不疑乎一二年間我備修矣或曰敵强而恃虛聲促之戰也臣曰不然傳曰城濮之敗謂楚不能師也若我出師必懼而歸理則然也魏文征孫權責權質子徐盛為疑城植以葦蕭建以假樓諸將謂無益而權獨用焉卒之退魏者疑城也不意而為疑城足以走敵先事而遷都邑而曰虛聲者惑也則又曰都邑之城宫庭之度百司之葺勞民費財在今何可臣曰不然陛下儉徳冠乎古昔宫室稍補而已百司茍全而已都邑不必城也増陴而已又曰天子之都城守不費固可乎臣曰不然傳曰今吳是懼而郢是城守已卑矣敵方靦然有吞噬之心而吾恃城以為固豈䇿也哉敵之未徙越江而前戰有進而無卻也何謂弃瑕以用度外之士魏無知薦陳平也髙祖疑而問焉無知曰臣所進者才也陛下所問者行也今有尾生孝己之行何益于勝敗之數臣進嘉謀之士顧足以利國家爾卒之出計而成漢業者陳平也國家承平日久崇尚禮義激勵廉恥士大夫一行之失清論不容一事之愆終身自堕彬彬濟濟美矣顧于今日之用似未進也而議論之士狃于素習猶執前說録微瑕而不顧可用以一眚而論人終身用之太狹而責人太過誰與共功名哉臣所謂用者非器用也置得其地而勿遺才爾朝廷之上儒學之官清望之臣自非才行兼全器識兩茂何以膺其選若理財穀也治郡縣也臨邊鄙也校軍旅也如此雖大過猶將用之十步之地必有茂草孰謂今日而無其人乎或曰朝廷隆禮義以範天下之人事猶違令今而弃瑕是誘之為過也且罪戾之人一聞此聲羣起觀望何以待之臣曰不然弃瑕而用責其功也非尊寵也才可用而貰其過責其後效直不弃之耳負罪而無其才者敢幾之乎臣願陛下與大臣議而責以求才與臺諫言而諭以使過如此則實才輩出何用而不可哉四䇿既行而勿奪于羣臣勿移于左右將不畏威兵不習戰敵人不懼實才不進横尸伏質臣實任之雖然圖之不可以不亟為之不可以不力也今而圖之恨其晚耳疾首而為之懼不力爾若曰玩歲愒日以幸目前之利者非臣所願聞也深念祖宗二百年社稷垂業于陛下者望尊安之也東西二百州生靈屬心于陛下者望生全之也所望尊安者今有阽危之憂望生全者今有塗炭之慮憂心醉于羣臣危言駭于田里而朝野情狀曽不必聞于旒扆之前陛下聖朝曽不思此何為而至是哉誠能斥佞賊導䛕之說息弛嗜好作自强之志去素餐之臣則士思赴功名誅慢令之將則人思効智勇無偷一時之茍安幸敵人之不至戰戰慄慄若疾之附身社稷之危庻可安乎生民之命庻可續乎然臣尚有慮焉天下之事未有不成于斷而毁于疑者非謂臨事而斷于一時謂其言不可揺不可久而變也疑者謂非决擇而有所疑謂聞忠言而用之奸人得以計而惑也謂其見事功之未成久則漸而間矣誠能立斷如初斷之時弃疑如决疑之日則無慮矣孟子曰謂其君不能者賊其君者也趙充國曰明主可為忠言臣雖至陋亦豈敢以宣帝事吾君而自處充國之下以背孟子之訓哉三朝北盟㑹編卷二百二十六
