body:
  text: 三朝北盟會編卷一百五十一宋徐夢莘撰炎興下帙起紹興二年五月一日庚申盡九月七日甲子五月一日庚申朔權邦彥簽書樞密院事權邦彥自朝議大夫兵部尚書除端明殿學士簽書樞密院事給事中程瑀不書黃具疏其謬繳駁之不聽三日壬戌吕頤浩以都督之職出北關門先是桑仲遣人告朝廷欲宣力收復京師乞朝廷出兵于淮南為聲援頤浩信之乃有恢復中原之意開都督府都督江淮荆浙諸軍事制有曰盡江淮表裏之師悉歸經略舉宿將王侯之貴咸聽指呼以新創置忠鋭軍十將偕行是日出北關門百官班送焉霍明棄郢州走李橫以李簡知郢州遂還襄陽府郢州糧盡李橫圍城不退城外麥方熟悉為李橫所得又城門盡閉城中乏水橫攻益急郢城西壁乃石崖號為石城城下即漢江漢江猶有舟惟西壁不受敵故兵不能近明知事急乃夜半縋石城而下與其衆數百舟順流而去翌旦橫覺之追已無及矣遂别以李簡知郢州橫乃退兵襄陽曹成以其衆降于韓世忠初曹成據道州以兵守莫邪關嶽飛遣前軍張憲攻關有郭進者趫勇有膂力每以夥飯不飽為言乃自製大馬杓打飯火頭亦笑而與之無忤意軍中呼為大馬杓郭進每隨憲執馬槍莫邪之役進與旗頭二人先登攻關賊兵拒關進揮槍先進殺賊旗頭賊兵亂官軍齊進遂入關俄報郭進已得關為第一功飛喜之解金束帶并隨行跟從物賞之仍補秉義郎官軍既入關賊兵散亂第五將韓順夫解鞍卸甲以所虜婦人佐酒恣飲賊黨楊再興率衆直犯順夫之營官軍退郤順夫為再興折一臂而死飛怒盡誅其新隨兵責副將王某擒再興以贖罪會前軍統制張憲皆到掩殺再興再興屢戰又敗官軍追擊不已再興屢敗率騎走廣西韓世忠以成屢敗北乃命董牧往招之成以其衆降有郝政者獨不從率衆走沅州戴白巾稱為成報仇謂之曰白頭巾郝政後歸于張憲再興走至靜江界中官軍追及跳入深澗中官軍欲殺之再興曰我是好漢當執我見嶽飛受縛飛見再興解其縛曰我與汝是鄉人汝好漢也吾不殺汝當以忠義報國再興謝之吕頤浩至鎮江府丹徒前軍反吕頤浩至丹徒前軍趙延夀反劉光世命王德王世忠追至建平縣殺之六月一日庚寅朔李宏殺馬友于潭州韓世忠將至潭州李宏遂有殺馬友之意是時友為湖南兵馬副總管宏為統制因友詣天慶覲朝拜回襲殺于市友之衆欲遁走世忠圍之宏遂盡併其軍友押字如市字果死于市友在潭州措置酒法官不造酒祗收稅酒錢城外許造酒不許賣城裏賣酒不許造若酒入城則計升斗收稅至今利之十三日壬寅劉光世起復寧武寧國軍節度使開府儀同三司劉光世父延慶靖康間在京城受圍及城陷延慶斬關奪萬勝門出奔死于亂兵中光世以不知父存亡多以金寶遣人詣偽境尋訪五月有客人自偽境來得其父之骸骨具言死狀皆不可參考乃云以其骨雜在甘草把中故偽境官司不能盡譏察或勸光世割皮滴血以試驗其骨若滲血入骨中真父骨也光世不從以禮安葬哀成服以軍事付幕府上章力請終喪不許奪哀起復至是以捍蔽京口經理淮壖功加寧國一鎮節制曰數摧巨敵纍奏膚功不移寧武之舊邦更蒞宣城之名鎮授寧國軍節度使韓世忠為太尉武城威德軍節度使嶽飛為中衛大夫武安軍承宣使李橫李道率兵犯德安府初李橫圍郢州霍明縱城而奔往復州明在郢州也常與德安陳規通書問規藉其通船路也橫以為明走投規故有攻德安之心乃申明朝廷謂陳規以德安府順蕃遂會隨州李道兵來犯德安府規登城請與橫相見規以好語謂之且申和好仍送米百石并油醬之類橫受之規請解兵橫曰襄陽之兵已到矣無可議者遂造天橋為攻具先是趙彪為桑仲所敗乃投于規至是橫使呼于城下曰趙彪與我約欲獻門一座何不速獻門邪規疑之遂殺彪王彥為洪州觀察使金均房州鎮撫使王德加中亮大夫同州觀察使李道為鄧隨郢州鎮撫使知鄧州七月吕頤浩班師吕頤浩之出師也方至常州前軍趙延夀以本將兵反于丹徒至鎮江府聞桑仲被霍明所殺頤浩不能支又師病寒熱乃歸行在五日癸未朱勝非同都督江淮荆浙諸軍事朱勝非知紹興府以同都督江淮荆浙諸軍事召赴行在所勝非力乞守越且丐外祠皆不許勝非同都督吕頤浩薦其才也會言路論其不知兵給事中胡安國亦謂非所宜任上親札諭以用勝非之意且謂除朱勝非同都督蓋為昨逆傳作亂而勝非卒調護於內使勤王之師得以致力矧今諸將皆同功一體之人也必能薦朕克濟事功丁寧雖至而論者未己上怒其朋黨與封駁者俱逐凡十三人勝非惶懼亦上會稽印走旁郡牢辭不就職勝非嘗曰宰相權位已重若更典兵文武二柄盡在其中豈人臣所堪後世不幸姦人居此位將何以處之辭至數十卒不受兩詔不許詔曰禮義不愆縱多言而奚恤君臣無間于大體以何傷韓世忠大破劉忠于嶽州伏龍岡劉忠為韓世忠所敗以數百人走潭州白面山復聚衆走淮西蘄黃州鎮撫使孔彥舟叛歸于劉豫孔彥舟為蘄黃州鎮撫使也劉豫僣偽即令刷彥舟親屬因得其母妻及子共三人賜第處之厚給以祿忽一日有客人至南界問之乃云姓盧舟之親舅境上以聞彥舟使人迎之果其舅也彥舟以家人之禮厚待之軍中呼為盧舅其言劉豫厚待彥舟親屬之故彥舟曰何以實之盧舅出劉豫之文彥舟遂有叛意未發會報權邦彥同知樞密院事彥舟在東平府與邦彥有隙而邦彥用事彥舟疑圖已遂反出左右婦人皆嫁之送官員入山寺中恐為行軍所擾彥舟臨行對官屬言無負朝廷之心所以反者蓋疑權邦彥也捶胸至腫唯携所寵宗氏趙氏去至光州界棄甲仗器械不勝計乃歸劉豫豫厚待之其將陳彥明者率餘衆詣知江州劉紹先降八月金人遣王倫歸朱勝非為侍讀孟庾同都督江淮荆浙諸軍事先除朱勝非同都督江淮荆浙諸軍事胡安國繳止之乃除勝非侍讀而以孟庾同都督勝非既入朝詔特綴宰相班復自內批云位知樞密院事之上仍日赴都堂議事勝非雖在經筵實預國論初見上謂卿前日責降非朕意也卿當能亮之存勞優渥恩寵冠一時然後人知上之卒欲相勝非之意十八日乙巳李橫攻德安府不克退兵歸襄陽李橫自六月圍德安府未嘗攻城亦未嘗去西北隅造天橋成填壕皆畢乃鼓衆以天橋臨城之西北角樓陳規在城上率軍民禦之填壕不實而天橋陷不可進規以六十人持大槍自兩門出縱燒天橋城上以火牛助之倐忽皆盡橫亦自焚炮座翌日黎明橫已退兵城下無一人一騎矣圍城兩月中並無爭戰亦無相傷唯有一將背城而坐胡床看造天橋規問有能殺賊者乎有牢城兵士田金請行許之金滿飲巵酒橫槍下城潛身于城壕中壕岸稍高金在壕中行約至賊所即橫槍上岸揮而刺之洞胸而卒金復跳入壕涉水而過城上人皆鼓噪規大喜之除金承信郎二十七日甲寅尚書右僕射秦檜罷為觀文殿學士提舉江州太平觀先是吕頥浩薦朱勝非綦崈禮謝克家入朝往往言秦檜之姦上忽遣使崈禮處取秦檜麻制崈禮在翰苑初未承詞頭莫知所以俄遣一中使來催崈禮不得已赴殿側祗候奏請詞頭上召崈禮親諭之曰秦檜言南人歸南北人歸北朕是北人將安歸有言若使臣為宰相可使聳動天下崈禮請御筆付院上乃索紙寫付崈禮退因點省其文而不覺口諷之曰聳動四方之意朕聽已疑建明二䇿之間爾才可見足迹未到院而麻制已成遂罷檜宰相以觀文殿學士提舉江州太平觀乃諭朝廷終不復用仍榜朝堂上怒未已臣僚再言檜之罪遂落職慧星見赦淮李勃詐稱徐王伏誅李勃夔州人也詐稱王弟徐王州郡迎赴行在送大理寺鞫勘得實斬市九月七日甲午朱勝非為尚書右僕射同中書門下平章事朱勝非復拜宰相制詞有曰懲亟易之徒煩蓋嘗輕用於新進懷老成之往效曷若登庸於舊勞又曰馴豺狼之暴而事無過䇿卒銷沮于凶謀翊簾幃之政而人靡間言旋復還於明辟比之謝安心繫於蒼生裴度威行於河朔皆上授旨也孟庾還行在撫諭川陜諸路官吏軍民敕成都府利州夔州潼川府鄜延環慶秦鳳涇原熙河路官吏軍民等秦據成臯蜀稱沃野百年無事但知耕耨之及時萬里如家誰知戰爭之為苦豈謂中原之釁來從東海之濱越關塞以虔劉並秦雍而毒螫近者身罹于鋒鏑逺者力困於征徭或生生蕩析而無餘或蠢蠢驚憂而莫保禍流爾衆痛切朕心屬此治戎於南邦未遑展義而西狩興言榛梗莫救傷殘維天地之涵羣生雖幽而覆育亦至維父母之愛其子在逺而思念愈深向遣輔臣往將使指畢協逺邇之助共圖修扞之功然而外侮內陵歲起繁興之役行齎居送民逾再籍之勞雖兵家有利鈍之常人心無思斁之改將帥用命官師即工編氓竭力以應軍須徒旅奮身而效死節永懷愧歎姑示拊存載念事煩慮易者人之常情兵勝禍生者國之大計尚毋難于督責庶速底於丕平奠樂土之居􅀈復如於前日行息民之政當益豫於他時播告有邦咸知至意詔韓世忠赴行在解元襲劉忠于蘄陽口大敗之劉忠附于劉豫劉忠駐于蘄州蘄陽口韓世忠下統制解元以舟師奄至襲忠大破之忠餘十人遁走北去遂附于劉豫吕源為沿海制置使劉紹先為沿淮防遏使韓世忠為江南東西路宣撫使吕頤浩以蠟書結劉豫知應天府凌唐佐事覺唐佐為劉豫所殺先是建炎三年召知應天府孟庾赴行在以直祕閣陵唐佐升直敷文閣知應天府金人攻應天府唐佐投拜金人以應天府為歸德府令唐佐知府事劉豫僣之唐佐遣蠟書到朝廷宰相吕頤浩以唐佐之姪孫憲于常州授以閣門祗候俾持蠟書至應天府議事唐佐之妻田氏使門客張約在家與憲同食憲疑之田氏曰無礙也既而為約所告豫遣人擒捕唐佐并家屬至京師憲走得免唐佐見豫責以大義且罵其背國家之恩遂被害豫命出犯由曰朝議大夫直敷文閣凌唐佐結連以南謀反斬首號令其家屬皆合從坐特貸命各決脊杖二十送頴昌府拘管由是田氏暨婢妾五人各遭重決唐佐二子長子已卒次子方九歲兩杖而斃三朝北盟會編卷一百五十一
