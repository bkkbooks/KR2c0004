body:
  text: 三朝北盟會編卷一百十七宋徐夢莘撰炎興下帙起建炎二年五月八日辛邜盡八月八日乙邜八日辛邜韓世忠閭勍進討京西三省樞密院進呈陜西諸路帥臣東京留守司京東等處奏報金人渡河分投出沒攻圍擄掠奉聖㫖差韓世忠閭勍各領所部人馬前去京西攻討劄下東京留守宗澤等楊進等諸頭項相為應援翟進攻烏舍伊都於西京失利節要曰自建炎元年冬尼堪再至西京官吏南走統兵官翟進率軍民上山保險是歳春三月二十六日尼堪盡焚其廬舍擄其居民北去故進始得其城然烏舍伊都之衆尚屯河南白馬市白馬坡河清長源等處雖去西京不遠而敵視之以己棄之物不復顧之無何進於四月十二日出兵夜攻其營敵以間探預知反為所襲進敗出城復據之後進值韓世忠軍至與世忠同欲破敵進為世忠導至文殊寺又為敵敗乗勢進擊世忠又敗世忠於永世後澗時當盛夏敵騎非利之時又連敗我師少得休息且知尼堪由平陸渡河北歸故復棄西京相率而回雲中因留金國萬户察罕瑪勒戌河陽史斌據長安吳玠擒斌克長安又克華州金人既退兵涇原將曲端遂下兵秦州而鳳翔長安各為義兵收復端大怒鳳翔劉彦希殺之會叛賊史斌侵興元不克引兵還漢中義兵首領張宗誘斌知長安而散其衆欲徐圖之端遣吳玠襲擊斌斌走鳴犢鎮為玠所擒端自襲張宗殺之收復長安玠以斌凌遲處斬戊辰王彦敗金人太行山王彦與金人戰既勝因夜破金人趙固寨金人退兵五月甲申朔尚書右丞許景衡罷為資政殿學士提舉杭州洞霄宫金人䧟河北諸州而攻京東京西許景衡以駐蹕揚州恐有不測侵犯請幸江寧府識者雖以為是然亦不敢以為是黄潜善汪伯彦力沮之遂以宫祠致仕景衡憂之抑鬰而死林泉野記曰許景衡字少卿温州人元祐九年登第建炎初除尚書右丞二年金人䧟河北駸駸犯京東西景衡請上幸江寧府黄潜善汪伯彦皆沮其議未幾以資政殿學士提舉洞霄宫卒及敵入維揚上方思其言十五日戊戍王彦駐軍河南王彦在河北師衆大集謂之八字軍為金人所畏方繕甲治兵約日大舉直趨太原斷石嶺關路以臨太行告期於東京留守宗澤澤擬彦武功大夫忠州防禦使制置兩河軍事會澤以彦兵勢雖盛然孤軍無援不可獨進乃遣書延彦議事彦得書悉召諸寨統兵指授方畧以俟會合乃以萬餘先𤼵既行金人以重兵尾襲而不敢擊是日濟大河駐軍於河之南二十日癸邜王彦至京師以兵馬歸於留守司王彦入京師見留守宗澤澤大喜握彦手曰公力戰河朔以沮金人之氣忠勇無前然京師者國家之根本澤已累上章邀車駕還闕願公速兵近甸以衛根本彦即以所部兵馬副留守司因差統制官張偉統轄於滑州界沿河沙店以來上下把截七月十日丁亥詔𤼵歸朝官赴行在是日進呈楚州來歸朝官事上曰聞州郡多因囚禁歸朝官載罹寒暑不與疎代因小有疑則加殘害一郡戮至數百人朕甚憫之覆燾間皆吾赤子偶生邊地視之遂異然豈可與金人一例待之金人與吾戰打毆無罪之人又率諸國之衆薦冐鋒刃使肝腦塗地赤子竟亦何辜朕欲發諸郡拘内歸朝官盡赴行在拊之庶幾可招和氣閭勍軍於河南府閭勍以班直換授靖康中累遷龍神衛四廂都指揮使武昌軍節度使主管侍衛歩軍司公事上幸揚州留勍京師留守中京宗澤命勍軍河南欲會合王彦楊進等以圖河北郭仲荀為京城副留守宗澤為京城留守招降諸大冦王喜楊進丁進等兵氣甚盛澤有渡河迎請二帝之意黄潜善汪伯彦疾其成功又疑其變遂以郭仲荀為副留察之八月二日己酉宗澤奏劄乞駕還京師遺史曰宗澤為東京留守措置營葺稍有條理頗得士民之心初到京師也會金人使八人來使楚國澤謂有窺伺申奏乞送獄庶全國體詔諭止之澤與黄潜善汪伯彦議論不同澤在京師凡有申請多為潜善伯彦沮止京畿十七縣之境臨河者七十里澤措置均之諸縣毎縣四里有畸各有開壕一丈深八尺於南岸埋鹿角連珠劄寨而樞密院行下約束只令依陜西路分為率三分出戰七分出助軍前澤措置京城守禦之具補葺甚多其費用不少而三省樞密院指揮諸場庫務加修城造器械見僱工作役更不合支錢澤常懐憤懣之氣奏請鸞輿復還京師前後數十賞賜詔褒諭曰舜巡四岳著格於藝祖之文周撫萬邦存王歸在豐之訓庸知帝王之軌範咸以都邑為本根朕遭時多艱逢世大亂永懐撥亂之策不憚省方之勞俟敉寧之有期即旋復之何晩夙宵軫慮寢食不忘雖王者以天下為家曽靡常於臨幸而臣子視人君猶父得無欎於瞻思卿等留居千里之畿缺八日乙邜東京留守宗澤卒先是東京留守宗澤自建炎元年七月到京師即奏乞回鑾有渡河恢復舊疆之意以大名當衝要檄提㸃刑獄郭永漕臣張益謙與北京留守杜充相犄角永得檄即朝夕謀戰守具因結東平權邦彦為援兵聲漸振是時王喜張用諸大盗皆招衆京城下卜日進𤼵以薛黄為前驅有陳徳者軍班換授宣和間燕山用兵時為真定府路兵馬都監盧溝之役降為承節郎京城圍閉在城上守禦城䧟歸家不出仕澤聞其名尋訪得之令統軍為副離城而澤暴卒澤志大才疎事雖不就而人皆惜之林泉野記曰宗澤字汝霖婺州人登元祐六年第累遷朝奉郎靖康初知磁州為備甚嚴整加秘閣修撰康王同王雲奉使金國過磁百姓殺雲澤乃勸王起兵援王室不宜北行王遂囬相州王既為天下兵馬大元帥澤與汪伯彦為副王至大名澤引衆二千來勸速進副元師汪伯彦等阻止不從及王欲往東平府乃令劉浩尚功緒楊清常景王孝忠五軍以陳淬為都統制軍開徳府又令閭丘勍孫振往聽澤節制澤屢請進師伯彦恐敗和盟檄止其行金人自衛南來攻開徳澤遣統制孔彦舟敗之次日來攻行在又為彦舟所敗澤與權邦彦乗勝欲徑趨京城以戰車一百五十輛從行至衛澤南遇伏兵敗趨南華敵以兩軍掩擊推車者皆走先鋒統制王彦忠等死之澤再聚兵傳檄四方欲邀奪二帝王即位澤請因天下兵集親征迎二帝復中原黄潜善汪伯彦又沮其事加徽猷閣待制知㐮陽澤又乞十萬衆復河北不聽李綱入相薦為東京留守威惠兼著民心悦服王善以兵五萬丁進以兵十萬楊進以數萬皆來降補楊進荣州防禦使知河南府澤遷資政殿學士合閭丘勍屯兵西京會合王善丁進楊進合兵六十萬欲渡河迎二聖金人頗畏憚潜善伯彦疾其功又慮其變乃用郭仲荀為副以察之方出師暴卒年七十楊進大泣京城失望皆哀痛之靖康小雅曰門下侍郎御營使東京留守宗公諱澤金人再入塞將近畿甸公守磁州抗疏請朝廷大為之備身乞將兵以與敵角淵聖嘉之進秘閣修撰且使募河朔騎兵為夾擊之計康王使金至磁為百姓遮留不使北去公因進説又請上便宜總河朔兵入援京師會淵聖以蠟書間道拜上為兵馬大元帥且專誅賞上進公待制為副元帥上南至大名或傳金人已北去公遂率兵邀擊至衛南遇敵力戰數日敵兵日滋公無後斷既小衂敵方北去上嗣位進公閣學士拜東京留守公既至京師簡料戰士信賞必罰兵勢遂振復招來巨冦如楊進丁進之流得兵數十萬人又繕葺京師譙門樓楪以至宫闕官府咸一新之雄壯不減宣和間連章乞車駕回願率所訓兵暨所招盗賊北渡河進討時黄潜善汪伯彦當國雖力沮之而公之意未嘗少衰既而上悟其奸拜公門下侍郎御營副使依舊留守建炎二年有㫖遣韓世忠之伊洛又令滄帥劉錫密結河朔之人自青州絶河進兵命公總大衆自滑而北期集於中山公聞命欣躍賫金銀兵械纎悉畢具行有日矣而潜善伯彦恐公成功又以奸計從中止之公大憤懣欎欎久之疽𤼵背而死中外惜之嗚呼如公之忠義實古之以死勤事者不幸捐舘真可謂人之云亡邦國殄瘁矣公敗不懼沮而不屈毅然有古忠臣烈士之風志未克伸功未能成奸賊所誤豈非天哉異時乗史筆者至此書曰黄潜善汪伯彦殺宗澤正史法也詩曰洪河㴞㴞撼野摧山砥杜中立獨當狂瀾敵勢焰㷔動植俱殘公俯視之若螢燐然知無不為獨殿中原方事北討將以身先赤羽若日朱旗絳天二賊巧沮行或止還雖醢二賊奚足償焉奪之遽矣中外悲嘆宇文虗中權京城留守中書侍郎張懿卒邵興敗金人於陜西州夏縣馬山寨自靖康元年冬武翼大夫趙邦傑率衆起兵至真定之䧟得保州路亷訪使者馬政同主之邦傑請信王總制諸山寨遣馬詣行在投表乞師請命馬行寨中有亡歸敵者告於真定同知韓慶和金人副都統韶合二人具陳於東路元帥府恐馬得兵南來故大會敵衆力破諸寨以絶馬之内應以斷馬之歸心諸寨多無井汲水子潤為敵所斷汲道遂至䧟沒信王不知所在宇文虗中觀文殿學士為祈請使陽可輔為副使使於金國先是有詔求能戰勝攻取及奉使絶域迎還兩宫者許之自陳虗中方提舉杭州洞霄宫乃上表自薦遂加觀文殿大學士為大金祈請使以楊可輔副使赦陜河北京東路門下朕紹屢尊極畏寅多艱懍乎朽馭之難持浩若陟州之求濟講興復之策庶以祈二聖之還躬巡省之勞庶以副四方之望然而敵國靡聞於悔禍干戈未息於内侵薦渡河津分攻城邑突騎横馳於畿内控弦大入於闗中綿朔野以驛騷亘山東而震擾自聞警奏繼遣援師嗟赤子以何辜重罹屠戮盖朕躬之不徳罔克撫存尚頼祖宗在天之靈弗替忠義狥國之俗番漢協心而禦敵軍民戮力以勤王雖有進勦之功深憫傷殘之患宜敷恩渥式慰羣情於戲民所懐者仁既霈汪洋之澤天所助者順必臻眷佑之符冀國勢之漸隆復邦國於永固咨爾有衆咸體至懐三朝北盟㑹編卷一百十七
