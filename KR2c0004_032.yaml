body:
  text: 三朝北盟會編卷三十二宋徐夢莘撰靖康中帙起靖康元年正月二十五日辛卯盡三十日丙申二十五日辛卯鄜延張俊韓時中涇原環慶馬千等皆至京師稍安斬內侍官匿金字牌者三人初朝廷發金字牌徵兵隴西內侍官暗留不遣及馬千等至皆云不見金字牌但云聞京城危急來赴難由是發覺故斬之二十七日癸巳真定府路安撫使劉韐送馬擴下獄茅齊自叙曰先是被童貫之命招置真定中山忠勇敢戰軍馬專一統御擴急趨保州取家屬南歸復過中山見𤇺火連舉五把次日至真定劉韐委擴提舉四壁守禦靖康元年五月七日拜上登極赦擴密遣人入京具畫一奏劄具說金兵南下步騎無二萬人又時已春首彼難久留乞堅守京城不輕出兵括取官私馬無慮三萬匹召募敢勇必戰之人各授器甲略閲隊伍每五千人為一領分屯要害密檄諸道勤王之兵併力齊進預戒河東河北多設邀截彼不過二月中必退京師之兵躡其後河外之兵邀其前彼方阻河勢迫乘機擊之可使匹馬不回後因職事與韐之子新授浙西市舶提舉子羽議論失歡子羽乃與路分鈐轄李質等同謀譛害之癸巳擴晨往謁韐坐未定韐密備兵卒在庭呵擴下曰爾安得反可斬之擴大呼曰時事如此方用人之際豈可聽小兒子譛誣欲害士大夫乎韐曰不干渠事擴曰擴與令嗣提舉不足衆人共知何謂不干渠事且公欲斬人亦須責文狀否韐辭曲不復言斬乃曰送之有司遂置擴于獄中子羽作奏劾誣以約金人獻城事二月得㫖令提刑司置院根勘具的確情犯聞奏同日降指揮為犒大金金帛未足權行根括聖㫖朝廷近為大金攻圍京國方講和議須藉金銀幣帛數目金銀最為緊急雖各分定拋認之數尚慮告論一節或為民害遂令除去下令已來權豪殊不體念國家之急所納之數金全稀少可自今月十七日為始應京城畜金之家所有之數或以埋藏或以寄附限兩日盡數赴元豐庫大觀庫左藏庫權貨市易務都茶埸送納金每兩價錢二十貫銀每兩一貫五百文先次出給憑由公據候事定支還若限滿不赴官送納並許諸色人告陳于金銀內二分一分充賞犯人取㫖重刑斷遣知情不告與同罪除開封府見于豪民之家分認數目送納外餘逐色目逐家已行科定金銀數目指揮更示施行尚書省劄子殿中侍御史李奉議奏臣等伏惟近降聖㫖借士庶金銀如納數多當議量度于武官內安排特與選限不礙正法理為官户注授優便差遣臣等訪聞民間供輸今已纍日其納數多可應前項指揮者臣等欲望聖慈付有司條具以聞遂授以官非特示民以信亦可激勸來者其或有願田舍乞以近拘收到房廊物業量價給還庶使人心歡悅樂于輸納以濟一時之急謹録奏聞狀望聖㫖依奏是日晚專領收簇大金犒賞金銀所據左倉庫中有廣福坊李𨽻已納金六百七十四兩銀一萬四千七百四兩九錢葛關金六百兩銀三千五百七兩奉御寶批李𨽻與成中郎葛關與保義郎凡進納皆與百户以勸來者李綱與李邦彥吳敏种師道姚平仲折彥質同對于福寧殿議用兵傳信録曰是日同執政上殿議所以用兵者綱奏上曰金人兵張大其勢然得其實數不過六萬人又大半皆奚契丹渤海舊卒其精兵不過三萬人吾勤王之師集城下二十餘萬固己數倍之矣彼以孤軍入重地正猶虎豹自投檻穽中當以計取之不可與角一旦之力為今之䇿莫若扼河津絶糧道禁抄掠分兵以復畿北諸邑俟彼遊騎出則擊之以重兵臨敵營堅壁勿戰如周亞夫所以困七國者俟其芻糧乏人馬疲然後將師檄取誓書須三鎮縱其歸半渡而後擊之此必勝之計也上意深以為然二十八日甲午种師道使姚平仲進兵逼其壘敵不敢動南歸録曰种師道以四鎮不可割與李邦彥議人人異同唯李綱議與師道合師道問沈琯金人初來事琯對曰河瀕若有千人兵守之金人豈至都城師道曰不然金人至此如何却去又問琯河北地形及邀截之狀琯對如上李右丞書同師道曰如公之言比至塞上無匹馬矣琯復問師道曰今日如何處置師道曰公見得敵寨中有糧否琯曰金人㳂路日掠糧草今至城外取金帛女子未有聚糧之意但恐聞西兵至方旋聚糧想必不多師道云如公之說昨日生擒二賊割腹視之食已黑豆今當逼賊營劄六七大寨以守把抄掠路不過五七日間彼自折沮矣琯又出一劄子呈師道曰金國長驅直犯京闕蓋緣中國失謀今日之謀豈可再失哉執政大臣力主講和之議然金帛果充其數乎三路之地果能棄乎已議講和而王畿之內剽掠殆盡兵回之後果能保其不攻掠城邑乎大抵姦人借宗廟社稷之重以勸人主而為全身之計或張大金人之勢以脅朝廷而成其講和之功殊不思異時之患又有甚于今日也聞金人見造浮橋馳驛班師若遷延失機濬州橋既成尼堪之兵繼至將有噬臍之悔矣兵貴速拙不貴巧遲伏望宣撫樞密使詳酌斯言斷以不疑而早圖之宗社幸甚監察御史余應求上書乞將相勿爭私忿早定和戰之計書曰臣嘗讀六月之詩有曰文武吉甫萬邦為憲又有曰侯誰在矣張仲孝友蓋宣王既使文武之將征伐于外矣若內無孝友之臣以與王居則才言日至忠謀不見用雖有吉甫焉能成其功哉至唐穆宗則不然裴度以元臣宿望出討幽鎮烏重嗣李光顔皆一時名將勢若易而元稹用事恐度有功妨已進取所畫軍事皆從中阻壞之故屯守踰年迄無成功夫內外之事相須如此可不監哉方今强鄰入境四郊多壘講和之計雖决而金帛之數未足兵將之勢已振而師出之日無期是宜內外之臣同心一意共議國事以雪恥辱之時也而道路藉藉皆言宰相大臣與將帥異謀朝夕喧爭未有定論審如此豈誠心為國者哉夫和親征戰之說漢廷臣論之詳矣今日之䇿未可偏廢然金帛既不足金人必不肯退師又三鎮三關之地向以兵力寡弱不得不姑從之今諸將援師繼至而城下要盟神弗信也若金人必要金帛之足與三鎮三關之地又豈得憚于用兵哉陛下既以兵事委李綱與諸將矣願詔執政大臣以孝友張仲為心和以濟事無爭私忿先公而後私庶幾大功可立如或不悛與夫妨功害能之人當顯黜之求所謂孝友者而任之可乎雖然戎馬在郊城門未啓中外不通已再旬矣和戰之計亦宜早定願詔宰執將帥僉議黼坐之前使將帥出師與之對壘然後遣辦士以利害禍福成敗屈直與之言若能休兵講和以繼好息民策之上者茍貪婪而無厭旅拒而不受陛下雖欲勿戰得乎又况事直師壯人有鬬心以宗廟社稷之靈何憂不克所可慮者窮冦逺來自居死地困獸猶鬬之時也願更詔將帥持重應機無輕接敵以取萬全之䇿不勝幸甚臣一介書生不知兵謀忠憤所激欲默不能惟陛下裁擇三十日丙申太學生陳東上書乞誅六賊京師傳聞太上皇到泗州蔡京童貫等建議留高俅以侍衛兵扼泗州太上皇南去人心不安陳東乃詣登聞檢院上書曰臣于去年十二月二十七日曽同本學諸生等伏闕下上書言蔡京王黼童貫梁師成李邦彥朱勔等六賊罪惡乞誅戮又于今月初六日獨詣登聞檢院上書言京勔父子及貫等挾太上皇南去恐迤邐渡江假藉威勢遂生變亂之禍乞追數賊復還闕各正典刑别選忠信可委之人往侍上皇前後二書至今未䝉盡賜施行雖聞王黼李邦彥已曽施行然罪大謫輕未厭公論京勔父子釋而不問縱之南去師成尚在親密之地中外疑懼臣竊謂朝廷方有軍旅之事未暇議此以故未敢再有申陳然今日事勢之急殆有甚于敵國之兵皆羣賊誤上皇所致今又挾上皇于危急之地臣豈敢尚爾默默臣昨日聞道路之言曰髙傑近收其兄俅伸等書報言上皇初至南京不欲前邁復為數賊挾之而前㳂路劫持無所不至上皇飲食起居不得自如數賊阻隔甚嚴除其黨與之外不容他人輒得進見雖髙俅被宣欲進亦復艱之行至泗州又詐傳上皇御筆劄付髙俅只令在本州守禦浮橋不得南來挾上皇渡橋而南以趨浙江其隨駕兵士盡為羣賊斥之而回聞方過橋之時衛士攀望上皇車駕失聲號慟童貫遂令勝建親兵以弓射之衛士中矢自橋墜者凡百餘人髙俅兄弟在道傍徨得一望見上皇君臣相顧泣下意若有所言者而羣賊在其側上皇氣塞聲咽不敢輒發一語道路之人莫不扼腕流涕臣雖至愚粗知忠孝傳聞此事不覺涕淚流臆為陛下憤陛下父慈子孝天下所共知上皇今為天子之父而乃受制姦臣賊子一至于此可勝寒心此臣所以汲汲為陛下言之也蓋數賊之黨遍滿東南而上皇隨行大臣如宇文粹中又是蔡京甥壻其弟虛中聞亦竄而往蔡攸京之子也得守鎮江據千里山川要害之地宋㬇蔡攸之妻黨也出領大漕專數路金穀斂散之權童貫有親隨勝健之精兵朱勔有同鄉附已之衆惡皆平時隂結以為備者一旦南渡即恐振臂乘勢竊發控持大江之險奄有沃壤之饒東南千里百郡縣必非朝廷有是將傾陷陛下父子使之離間非特聖孝之養阻奉晨昏而其事必有至難言者臣竊謂今日之勢敵國非所患所可深患而啚之不可少緩者正在此耳陛下何尚不忍于此耶臣知之矣必是梁師成隂有營救致陛下未得奮發英斷臣請申言師成之惡臣每聞縉紳之言曰師成為人真是憸侫自其容貌觀之似不能言者而稽察其衷隂險禍賊最為可畏盜我儒名外示亷靜其實招權怙勢侵我紀綱上皇每進用一宰相大臣以及侍從之官師成必收其功以歸諸已故宰相大臣秉持國政必惟師成之命是從王黼事之不啻父兄蔡京父子趨事不暇師成氣焰傾聳朝路賢士大夫莫敢側目至如文章之事責在詞臣朝廷典誥各自有體師成必欲其文悉如已格一或背違輒行譛斥國家取士至公之選無如科舉士大夫所恃以自異者無如及第出身人主所以籠絡天下英俊以求將相者正在于此而師成乃薦其門吏使臣儲宏兩次特赴廷試賜第唱名宏自登第之後依舊充使臣之役即是天子臨軒䇿士止可充師成趨走執役之吏非特以左右奴僕玷辱士類又所以輕侮朝廷選舉之法宣和六年春上皇親䇿進士八百餘人聞其中百餘人皆以獻頌上書為名特赴廷試卒多師成之力盡是冨啇豪子曽進納及非從補授官職士大夫不齒之人或白身不足應進士舉者聞每名獻錢七八千緍師成便為奏請特赴廷試之命師成所為既衆即又傳令張補等將上其它權幸遂相效以賈利師成實啓之每遇賜名唱第之日師成必在上側臨時奏請妄有升降以公道在廷之士往往解體國家選舉之法為師成壞亂幾至掃地此事縉紳士大夫上至朝廷人所共知苐畏師成不敢言耳師成平日受四方監司郡守以下餽賂不計其數又創置北司聚不急之務專領書藝局濫建官吏賸立工徒以進市井游手無賴之輩濫恩橫賜縻費百端京師土木之工窮奢極侈往往師成實董其事因偷盜官錢不知紀極不察其所為而惑其足恭詐僞必以為真能亷靜者此所為以直濟佞以亷濟貪大妄似聖大詐似忠者也臣又聞師成在內朝善觀上意所向隨向隨轉每以性取之因緣為姦竊弄威福隂奪人主之柄正如美酒好色浸淫害人而人嘗耽嗜無厭不覺遭其毒手也臣恐師成今在陛下左右浸潤彌縫無所不至在陛下離明獨照洞鍳其姦必不為其所惑然師成與貫結為姻家京黼勔彥又其積年之朋黨盤根鍇節牢不可解師成不去同惡尚在深念陛下威福之柄未免竊弄于此人之手羣賊等輩倚為奧援太上之心胡可得哉數賊罪惡貫盈陛下素所備知不特待臣區區之說臣前書所陳己可槩見臣更請以比日所聞為陛下言之前此上皇傳位陛下蓋其聖志素定非臨時倉卒之謀唯此數賊實常撓之而蔡京攸者沮遏猶力賴上皇聖明獨斷志莫之奪贊襄之力吳敏有焉陛下謙遜之際聞數賊密請鄆王楷來到殿上而師成實為謀始此意安在比至事定自知失計乃爭言曰太上之志我實成之吳敏之䇿我實授之定䇿之功我實有之人臣要君莫此為甚天下共知數賊久欲不利于陛下方陛下在東宫時各懷異意欲伺間隙于是楊戬亦同其謀臣前書已盡言之矣又見比年都城婦女首飾衣服之上多以韻字為飾甚至男女衣著幣帛往往織成此字皆是師成唱為䜟語以撼國本羣賊和之更相夸尚以動天下之心忠臣義士切齒刻骨非一日也逮今傳位之次復肆姦謀弗成乃欲貪天之功以為己力怙終隂慝有如此者又况蔡京久事上皇素有異志童貫蔡攸近與金人結為內應欲分我中國而王之反狀敗露遂退逃遁朱勔父子勢傾江浙已二十年矣今此數賊同挾上皇而去亦恐素性勿悛未必肯利于上皇也萬一禍有不測而梁師成復從中起陛下將何以處之願亟圖之毋使滋蔓蔓難圖也竊以今日敵國恣行侵侮而我上皇哀痛罪已至遜位而去凡厥左右大臣及親近用事之人不問有罪無罪率皆引己歸咎自求貶放為君分謗也豈有其君痛自罪已而一時巨臣偃然自若略不知悔則前日之事咎將誰執矧今外侮之釁實自羣賊啓之不知陛下何憚不誅而縱其逺遁幸免耶或尚使之出入禁闥而無所忌憚耶江浙之變蕭墻之禍不可不慮陛下若欲正厥典刑當自梁師成始如不然則朝廷之上動輒掣肘事未可啚也臣願陛下勿以臣布衣之言為無足采者愚者千慮必有一得陛下姑試行之仍願陛下速降德音往上皇行在告諭應隨行軍兵豫以厚賞使各悉心協力衛護上皇車駕亦乞亟命宰執恭齎陛下親筆奏書往迎上皇早還京師庶使不負終身欣然樂而忘天下之志陛下復遂父慈子孝之美以彰孝治之盛天下幸甚臣為此書而或者見譙曰上方以敵國為患子猶不能獻一謀䇿以為一計而乃汲汲于前日之事毋乃不知先後緩急乎臣應之曰此乃不然者敵國之患止于手足羣賊之患實為腹心腹心疾去元首自全手足浮痾豈能為患今敵人所欲大則土疆小則玉帛玉帛相通自古有之祖宗土疆得之甚難寧忍棄之一旦縱敵數世之患寧不鍳之城下之盟不足守也豈不知之千里襲人未有不亡者也今敵襲我越數千里其亡必矣尚何疑之師克在和不在衆同心同德和之至矣廟堂之上帷幄之中將相大臣孰不知之陛下淵默雷聲乃赫斯怒奮發英武以殄仇讐又何難焉此在睿謨必有以處之矣如臣書生豈敢妄議臣書所陳必欲先誅六賊者係陛下父子天性之重宗社生靈莫大之計臣謂今日之事唯斷乃成當斷不斷反受其亂幸陛下留神荐瀆天威罪當萬死貶梁師成節度副使安置差遣使臣日下押出門本處交割中興遺史曰陳東疏奏未及施行㑹姚平仲之敗繼有毆擊宦官大學生伏闕事再貶師成循州安置未行師成知不免遂自殺梁師成字守道始以小璫親文墨得侍上師成能任數且謹密主傳道上㫖遂親信初佐賈詳為書藝局詳死故師成專以竒巧始得君久之為睿思殿文字外庫益用事矣政和間乃盛起艮嶽建明堂改作宣德門時已隂主上文書遂行宰相事俾王黼在外表裏之內為關決上每宿于外則師成入處殿中因于文字外庫擇能文筆吏𨽻其下凡御筆號令批答率命其徒以自代後來宰臣執政至于侍從多其門生王黼父事焉亦有望風而不獲進者其若害政敗國首為宗主嘗自目為蘇軾之出子與軾諸子叙拜為兄弟行數丐上曰先臣何罪大抵不揆凡若此其後淵聖皇帝即位太上皇帝南幸羣姦懼為正人所圖乃留師成宫中以防其內外則託李邦彥相與固天子意然師成卒得罪縊殺之但以其自縊聞詔贈太師或謂坐太上嘗諭大臣始內襌時師成獨沮異又以表裏王黼云别録云貶彰化軍節度副使行及八角鎮而死張叔夜請兵邀擊金人第二狀右臣昨奉御前劄子女真前鋒至闕及覩赦文欲遣使和㑹臣嘗于正月二十七日奏以為若許和㑹則金人必有邀求今若縱之使去後必復來遂有輕中國之心乞遣騎邀擊及預令河北邉鎮出兵斷其歸路臣乞候錢蓋到交割訖前去國門願假臣騎兵與諸將併力追襲未奉處分臣竊謂中原有警臣自合領本路兵及弓箭手等差守管押赴京畿外契勘臣昨于去年十月以京東盜賊盡靜蕩平班師後因病再乞宫祠伏望聖慈矜憐特與所乞差提舉崇福宫近者奏乞與諸將追襲敵兵出于愚衷以世受國恩于義當國家緩急之時所宜力疾自效不應端居飬疴今來臣已自徐州南京拱州路前去國門聼候處分伏乞睿慈特降處分如敵馬自今衝突即乞早假臣兵領諸尚書省取稟前去如朝廷已别有施行處置無所用臣顧方陛下即位之初臣子之情莫不願顧瞻清光兼臣有前任京東安撫使本路急切利害然不敢輒乞朝見敷奏伏乞特恩許臣到闕引對奏陳訖或至于尚書省投納訖前去頴昌府揚翟縣居住須至奏聞者右勘㑹臣已於正月三十日當日離任起發前去伏望聖㫖檢㑹前奏早賜施行三朝北盟㑹編卷三十二
