body:
  text: 三朝北盟㑹編卷一百九十二宋徐夢莘撰炎興下帙起紹興九年正月盡其月金人退河南地金人以東西南三京夀春府宿亳單曺州及陕西京西歸于有司韓世忠加少師揚武翊運功臣劉光世加輔國功臣進封雍國公為陜西五路宣撫使張俊加少傅安民靖難功臣吴玠加開府儀同三司四川宣撫使岳飛開府儀同三司楊沂中太尉保成軍節度使劉光世懇辭陜西宣撫使許之袐書省正字汪應辰上書論當謹邉備書曰臣伏見近日金使在庭人情洶洶朝庭之上號令紛然内則患和議之不諧外則患異議之不息臣雖踈逺有以見聖意之動止也然臣揆之時事竊謂和議不諧非所患議既和矣而因循無備之可畏異議不息非所患議既息矣而上下相䝉之可畏此孟軻所謂入則無法家拂士出則無敵國外患之時也議者往往以今日和好决不可成而成也或不能久臣以為過矣請借秦以論秦之謀楚也與之地借之師而約為兄弟婚姻矣然則今日所謂還我梓宫歸我母兄復我輿地者安知其不然也及其謀齊也與齊通和四十餘年未嘗接兵又安知今日和好不如是之久也至以為金人出於悔禍效順之本意則臣所不敢聞也臣聞前日王倫之行未嘗一詣敵此必有深謀之計而畏吾使者之或能覘之也是豈能有愛于我而不取哉是豈誠有悔過效順之本意哉夫非誠有悔過效順之意而翻然以與我和是何故也臣謂陛下誠以此思憂以此思懼則將不遑暇食而謀之矣金使既去所宜深詔執事交修庶政申戒邉備金雖與通和疆場之上宜各戒嚴以備他盗今方且肆赦中外厚賚士卒褒寵請帥以為休兵息民自此始矣縱一朝之安遂忘積年之耻獨不思意外之患乎此臣所以言因循無備之可畏也方朝廷力排羣議之初大則竄逐小則罷黜雖舉國非之而不顧至有一言迎合則不次擢用今者事既少定陛下必以出於獨斷益輕天下之士矣夫事是而咸宜猶欲衆謀况其非乎導人而使諌猶恐不進况拒之乎是以小人窺見間隙躁進者阿諛以希寵畏懦者循黜以備位淺謀者遂謂無事而忠臣正士乃無以自立于羣小之間子思言于衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非如此則善安從生孟軻曰訑訑之聲音顔色拒人于千里之外則讒諂面諛之人至矣國欲治可得乎此臣所以言上下相䝉之可畏也臣願陛下卧薪嘗胆以圖中興勿謂和好之可以無虞而思患預防常若敵人之至也勿恃獨斷之可以成務而虚已從衆常恐下情之無盡也競競業業以承天心徳日新萬邦惟懷臣且親見于聖世何至以中國之大而下為讐人役哉祕書省正字樊光逺上書論金人詭詐不足憂信實深可懼上封事曰臣竊觀今日士大夫之論莫不憂金人之詭詐臣獨曰詭詐不足憂而信實深可懼也使彼出于詭詐則其術固止於是耳吾乃撫養東南根夲之地嚴飭西北備禦之方亦可以為國也夫何足憂近者金人遣使曰當與我故地士大夫凡有憂國愛君之心者盡言金人之詭詐也而版圖果歸職方是彼不出於詭詐而出于信實矣乃臣之所懼也將不特出于得故地而已也凡其所謂歸梓宫歸兩宫者莫不次第如其言其可信愈甚則其可懼亦愈甚且吾既已得吾之所欲則彼亦將得彼之所欲通和之使項背相望吾既空府庫以奉之河南之地賦租悉蠲吾又將竭江右民力以給之矣府庫已空民力已竭士氣已墮一言不酬金人改慮此臣之所以私憂過計而為陛下深懼也夫有無故之福則必有無故之禍往年燕山六州二十四縣金人以兵取之來歸于我當時竭天下之力以償之所得止數空城而已朝廷動色相賀而天下蹙額相弔一旦改慮席卷而南如寄諸隣而取之此陛下所見也陛下撫此厄運雖未獲受祖宗所全付然即位之初河南猶陛下有也旋没于偽齊凡吾之所以經營攘斥者踰一星終矣未能復尺寸之地今一旦得之于彼其非無故之福如往年之得燕山哉又將竭内地以實之敝所事以事之可為寒心矣廟謨深閟慮之得當已熟如臣之愚未知所以善其後也臣願陛下勿以得地為喜而常以為耻勿以甘言為悦而常以為憂勿罪忠議以養敢言之氣勿喜迎合以開濫進之門勿盡民力宜愛惜之以固根本勿沮士氣宜聳動之以備緩急庶乎可也惟陛下不以臣人微言輕而留神省察實天下之幸汪伯彦復觀文殿大學士張浚復左宣奉大夫王庶劉大忠復端明殿學士伯彦等復職秦檜令臣寮上言王庶劉大忠之罪遂落職初庶離行朝不見賓客至蕪湖請知縣髙某衩衣相見委以買田宅議者謂庶平日豪邁一旦議論不合而去未宜求田問舍也過州有再落職之命乃寓居九江買田于敷淺原之上徙家居焉王倫權東京留守兼知開封府王倫藍公佐奉使金國至京師以金人已退地而去倫遂權東京留守兼知開封府先是劉豫以陳東歐陽澈在建炎之初上書被誅于南市乃傚張巡許逺雙廟之制建廟宇以祀之偽封侯爵至是倫令毁其廟熈河路經畧使慕容洧叛附于夏國環慶路經畧使趙彬追及與洧戰敗之復熙河路慕容洧奔夏國張中孚中彦自是歸朝矣洧環州人張浚富平之敗斬趙哲時洧背叛而去彬字彦中原州人劉錡帥涇原時彬為幕亦嘗叛去知泉州連南夫上封事論和議不可信得三京河南地肆赦天下赦到泉州知州連南夫以為金人素持奸計恐朝廷墮其奸謀故謝表有曰臣持囊西清分符南海茂著藩宣之効敢忘獻納之忠惟虞舜十二州昔皆吾有然商於六百里當念爾欺莫知其是不信其然固知既來而則安或且寧許以負曲有若食其之説無忘韓信之謀願益戒于不虞庶免貽于後悔是時又有聖㫖指揮不得詆斥大金南夫繼上封事曰臣聞老子之言曰不信者吾亦信之又聞孔子之言曰不逆詐不億不信此皆大聖人之用心陛下納金國和議之約允蹈其言又聞信不足有不信又聞言不必信唯義所在此皆神聖通變之道易曰幾者動之㣲傳曰知幾其神乎大金素行叵測比年以來兩國皆墮其術中大槩彼以和議成之此以和議失之今陛下果推赤心以其割河南之地遂恩之乎臣知陛下知幾有不信也何以言之丙午之禍父母兄弟六宫九族咸被驅逮今十四年辱莫大焉使太上聖躬無恙隨所割地全而歸之四十年覊縻隔絶之恨念之猶且心折得梓宫猶不足為恩得土地顧何足以為恩乎况陛下於太上有終天之恨於大金有不共戴天之讐方且許還梓宫許還淵聖六宫彼其計實老子所謂將欲取之必固與之兵法所謂不戰而屈人兵之術也誰不怒髮衝冠握拳嚼齒而痛憤哉借得所許彼何加損漢王語吕后曰使趙王有天下顧少乃女乎臣竊恐陛下天性孝悌方感其恩遂無王赫斯怒爰整其旅之志葢用心不剛則四支委靡將士雖欲斷髪請戰有不可得誰為陛下守四方者是陛下十餘年寵將養兵殫財蓄力之意一旦積于虚空不用之地倒持太阿交手而付之矣昔太祖皇帝之南征也李煜遣其臣徐鉉朝于京師鉉曰煜以小事大如子事父未有過失奈何見伐太祖曰爾謂父子為兩家可乎安知大金之計不出于此乎豈吾太祖行之而陛下不悟者乎昔唐髙祖借兵于突厥嘗父事之至頡利為太宗所擒後世稱之為英主陛下肯出太宗下哉臣伏見生靈戴宋幾二百年淪肌浹髓之恩視陛下為親父母不幸為干戈之所擾視大金甚為畏懼韓退之曰叛父母從仇讐非人之情民情大可見大金豈不知之昔耶律徳光之擊晉也述律嘗非之曰吾國用一漢人為主可乎德光曰不可述律曰然則汝得中國不能有後必有禍悔無及矣許還之約安知不出于此乎使大金用述律之言則可竊吾太祖之言用之無乃不可是説也陛下聖性髙明固知之矣知之不信審矣然臣猶不能無疑者伏讀正月五日赦文曰戢宇内之干戈又奉聖㫖不得詆斥直墮其術中使忠義之士結舌而不得伸忠良之將縮手而不為用范増之説項王曰天下大定矣君王自為之可不鑒哉此臣所以昧死上愚衷願有獻納臣聞張良為漢王借前箸以籌撓楚權之謀為漢王不能制項王死命遽欲效武王休馬息牛具陳天下㳺士各歸事其主陛下誰與取天下審如詔㫖臣恐將士觧體魚潰獸散如張良所謂誰與取天下者然則計將安出臣方閉户深念不覺大喜曰河南之復殆天授非人力傳曰天與不取反受其咎時至弗行反受其殃又曰機不可失願陛下因而圖之大事濟矣似聞彼國新主厭兵乃有此議臣謂使其果有厭兵之心政當乗其懈而擊之如其不然先發制人後發制于人陛下必知其决擇矣議者若曰强弱大小猶且不侔未易輕舉臣聞湯以七十里文王以百里所謂在徳不在衆漢髙祖以亭長除秦暴唐髙祖以一旅取孤隋光武接十二帝之統而起自單㣲以至中興今陛下復河南之地實以聖繼聖徳新又新挺真主之姿應帝王之運六師方張舊民協力抑又多助之至此臣所以願陛下因而圖之也臣聞陛下方遣侍從宗臣祇謁宗廟陵寢將親見宫室之禾黍陵寢之盗掘此政詩人徬徨不忍去之恐有扶老携幼感泣而聽詔者少者之哭哭其父與兄也老者之哭哭其子也戯笑甚于裂眥長歌過于慟哭天地日月亦必為之悽慘鬱結陛下聞之追悼其因是誰之過與還地孰少孰多而我河南之氏何啻百萬昔者樂生今日効死因民欲嚮為百姓請命而以王師甲兵之衆隨之此皆盡鋭願戰之師彼皆悲歌感慟之士河南起而河北應簞食壺漿以迎孟子之言于今有騐世宗之舉不約而同此臣所以願陛下因而圖之也臣平居嘗謂不復中原則不可以立宗社不有四海則不可以子萬民今有幸㑹遂得河南歸我凡屬同體豈不中應大河安得而斷間哉此臣所以願陛下因而圖之也臣伏仰陛下英武天縱孝弟性成撫艱運于一紀來和議於此時然不知陛下願為英武主乎願為孝弟主乎臣昔守建業獲望清光首為陛下陳堯舜之道非謂垂衣拱手坐視夫民而名堯舜也願陛下效漢髙祖唐太宗之英武敗敵迎父母以成堯舜之道也今陛下俛首議和端為父兄是孝弟既如此臣願陛下乗機應變席捲兩河攄祖宗之宿憤掃天地之兵氛英武又如此使天下萬世皆仰陛下聖而不可知之神矣越漢唐之所謂孝弟英武顧不韙哉其如應變于耳目之前或且經營于年嵗之後皆在陛下惟斷乃成抵掌而决期月而已臣猶遲之昔李渤上平賊三策攻不失戰戰不失守固河南以連河北三策具存乃敢以獻歐陽修曰世徒見周師之出何速而不知述律有可取之機也是時述律以謂周師所取皆漢故地不足顧也然則十四州之故地皆可指揮而取矣使新主果有厭兵之心事亦類此臣區區之心發于忠憤若謂不識大體不省幾事欲逃萬死之罪寧能髙飛逺走不在人間乎方今堂下有耆老碩輔閫外有良將竒兵更乞睿慈付之公議熟計而行之臣不勝戰汗待罪之至湖北京西宣撫使岳飛上表謝赦得三京河南地肆赦湖北宣撫使岳飛具表陳慶曰覩時制變仰聖哲之宏規善勝不争實帝王之妙筭念此艱難之久姑從和好之宜睿澤誕敷輿情胥悦竊以婁敬獻言于漢帝魏綘發䇿于晉侯皆盟墨未乾㰱血猶濕俄驅南牧之馬旋興北伐之師葢敵每不情而轉移無信莫守金言之約難充溪壑之求圖茍安而解倒垂猶之可也欲長慮而尊中國豈其然乎恭惟皇帝陛下大徳有容神武不殺體乾之健行巽之權務和衆以安民廼講信而修睦已漸還于境土想喜見其威儀臣幸遇昌時復覩盛事身居將閫功無補于㳙埃口誦詔書面有慚于軍旅尚作聰眀而過慮徒懐猶豫以致疑謂無事而請和者謀恐卑辭而益備者進願定謀而全勝期收地于兩河唾手燕雲正欲復仇而報國誓心天地當令稽首以稱藩遺史曰表辭飛幕属張節夫之文也節夫字子亨河朔人豪邁尚氣節秦檜見之切齒三朝北盟㑹編卷一百九十二
