body:
  text: 三朝北盟會編卷六十一宋徐夢莘撰靖康中帙起靖康元年十一月一日壬戌盡六日丁卯十一月一日壬戌朔夏人陷懷德軍守臣劉銓通判杜翊世死之遺并幼老春秋皆曰先是十月夏人陷懷德軍通判杜翊世禦退之是月夏人再冦懷德軍穴地道以貫城中凡七十數處是日曛黑衆穴洞徹敵蟻綴而出城中驚駭翊世大呼蹀血鏖戰以疲兵千餘當敵數萬自度必敗故縱火悉焚芻廪帑藏黎民盡逃敵入官軍殱焉敵脅翊世使降翊世瞋目叱之義不受辱遂火其室舉家畢死于烈熖中翊世解紅羅帶自縊死建炎元年八月涇原路經略以聞贈五官與恩澤十資以所居為忠坊劉懷德死節録曰靖康元年秋五路之師率皆勤王關輔一空夏人乘虛遣太子及其國相李遇昌誘三瓜諸部兵合二十餘萬人攻懷德軍經略使席貢念懷德為要衝之地擇威望可以當敵者咸曰瓦平寨第一正將劉銓忠願得士心若欲當敵非斯無可用由是牒銓知懷德軍銓素以忠略聞自負其才可以立功即日捧檄就道冬夏人素聞銓之名不敢為意與計屯兵綿亘數十里而圍之懷德城薄以卑兵少而食不足銓甫至懷德晝夜修城及戰守之備軍民亦喜銓莫不願盡死力銓激昻自誓戒將士以忠義節當死守以報國敵攻城之具智巧百出銓悉以術破之敵技不能逞月餘殘殺夏人已萬餘人太子懼謀于遇昌欲退遇昌曰城中縱矢石無數度亦無繼然連諸部兵不能下一城益示弱會城中矢石盡時天大寒銓教人團泥沃以水乃與泥氷用擊敵遇昌見之喜謂太子曰果無矢石矣銓諜知之乃破墻發機石以疏其謀而遇昌攻愈急有户掾張庭圭遽揭撫云可則守否不若降銓大怒曰掾心已負國矣是難與共事趣牽出斬之衆皆股栗無不以一當百效用有程進者夜縋城出降悉告遇昌糧盡危迫狀遇昌乃擁進近城使以好言招銓降銓陽謂進曰爾可獨來濠上與語因謬目所以遣進劫遇昌之意頗泄其語令夏人微聞城上從而鼓噪遇昌疑懼即城下斬進督人旁外濠穴地以入銓亦于城中鑿井以應之置葛茭井中爇之敵不得前遇昌更鑿八隧多置旗幟亂銓之覘察又及旬日敵知銓矢盡食絶外攻愈急矢石交下如雨通判姓杜者不記其名以告銓悉如庭圭之言銓不答杜知其不可退而自經銓處死之志已決略不少改謂衆曰丈夫一生故不難逃其如敗國事之誅天地臨之在上焉可茍免是時衆寡之勢既已不敵飢飽之力又且不相侔是夕大雪晦暝城之西北隅陷敵衆蟻附而上達旦城中敵騎布滿于前後守陴者猶死守不敢亂乃集老弱民納小城守賊攻之三日銓度力不支乃聚焚府庫環牙兵為三匝出戰譙門中時十一月十五日也初城破銓欲自裁已為敵所執太子遣人扶傷置于别室謹其護視且致意將官銓銓罵曰咄咄我願肯降汝耶趣殺吾吾若不死決不貸汝也遂遇害建炎元年詔恤其家贈武翼大夫官其子姪銓字子平濮陽人唐文若書其録後曰曲端拜大將軍返而喟曰使劉子平在端安能居此即其言以子平為人不可得今見所録子平忠節若此而後知端之言蓋有以也嗚呼世已歎端不獲畢其志力而端又推而歎子平則天下後世之歎又無時而已也夫出而事君生則無負死而英雄竒傑猶有以相服如子平幾人也耶李若水歸自尼堪軍前初朝廷遣李若水使金國山西軍前請以租賦贖三鎮及若水到榆次見尼堪太原真定已陷租賦不能贖三鎮乃還朝尼堪攻澤州守臣髙世由以城降敵五日丙寅王雲自斡里雅布軍前回次于相州斡里雅布遣王雲回京師奏事雲馳馹至相州語知州汪伯彥曰金人情狀甚乖本州宜多積糧斛過作偹禦計云竊聞金寨人語言此回渡河至京城下恐須盤薄至來夏夏初回師雲丁寧辭且云亦以此白磁守宗澤已而澤果謂雲奉使賣國徒與金人張大聲勢以此奏聞乞勿信雲説王雲歸具言斡里雅布索冕輅徽號等朝廷從之詔太常禮官集議金主徽號封氏編年曰是日詔略曰金人來請徽號及冕輅朕以生靈之故舉而與之夫名之與器以寓生殺之權可使由之不可使知之故曰魚不可脫于淵國之利器不可以示于人示人且不可况棄與之乎與之矣則彼將以號令我我何所恃莊子謂斗斛以量之權衡以稱之符璽以信之仁義以矯之然而竊者為諸侯諸侯之門仁義存焉故揭諸侯竊仁義并斗斛權衡符璽之利者雖有輅冕之賞不能勸斧鉞之誅不能禁竊之者尚如此今乃舉而與人懷何以制乎或曰姑紓目前之禍事大不然也曽未紓禍適所長禍何以庇生靈也若王莾篡漢而求借璽元后拳不忍與班固以謂婦人之仁胡遂與之徽號冕輅曽不思元后之仁乎吳革使陜西集兵講議武偹吳革登對上問割地利害革曰金人有吞箭之誓必入攻矣乞措置邊偹起陜西人為京城役不復議和遂差革使陜西勾兵委同諸帥講議武偹六日丁卯羅索貝勒自平陽分兵一由郭山一由􅀢城赴尼堪懷州之約尼堪陷懷州守臣霍安國死之通判林淵鈐轄張彭年都監趙士諤張諶于潛統領沈闕張行中同時被殺范仲熊北記曰乙巳嵗秋平陽府就糧義勝軍劉嗣初反殺掠居民轉至懷州城下兵馬鈐轄與兩隊將與之戰屬沁水暴漲官兵不利鈐轄及兩隊將皆戰死朝廷大發兵擊之嗣初遁歸雲中九月末中奉大夫直祕閣霍安國知懷州安國嘗為燕山府路轉運判官頗習邊事數與同官言金人必為朝廷患此州亦不可不偹乃計度增其城濬濠繕治器甲又言其歸燕山時郭藥師嘗言欲自有燕山之地不煩朝廷置帥諸同事不以為然而安國然之乃具以奏坐此放罷幕府憮然以為不至若此也十月間河間府轉運司牒懷州云金人聚兵南來令懷州防偹人皆云州去邊境千里而逺豈能遽至此十二月童貫自太原府回行李甚匆遽參議官節度使范訥翰林學士宇文虛中中書舍人王雲皆夜過懷州虛中昔與安國善而雲勸安國為偹甚􅋀會朝廷遣簽審樞密院路允迪使于金國割三關四鎮之地允迪至懷州盤桓數日傳聞金人知允迪出使必欲見允迪出後至懷州士民數千人請允迪允迪至髙平尼堪退過北關太原城守破朝廷以知樞密院李綱為宣撫使督諸將救援又以資政殿學士劉韐為宣撫副使中大夫直閣范世雄為宣撫判兼參謀徽猷閣待制樞密院都承旨折彥質宣撫使參議官四人京畿提刑王以寧員外郎裴稟直祕閣沈琯宣議郎郭執中主管機宜文字三員樞密院編修鄒柄田亘朝奉郎韓瓘幹辦公事主管文字官趙柟趙戬張叔獻陳湯求梁澤民張牧又以武功大夫防禦使解潛為制置使以种師弓統西番人馬以許孝烮為前軍統制既而朝廷召李綱回以折彥質為宣撫判又進折彥質為龍圖閣直學士宣撫副使十月懷州官因見彥質白撫司兵馬久在城裏困倦甚矣一兩日欲去西山下排對少令意思舒豁次日遂行去州二十五里正在太行山下逄李若水自大金奉使回屏人密語至夜還鎮熊請見彥質忽曰今日有聖旨來説更不差大河守禦使只今彥質一靣主管仍訪聞河陽大擾今彥質往彼撫定見説河陽人情惶惑過於懷州彥質須索自去次日遂往河陽仲熊往見知州霍安國云敵人來也折彥質已走了安國曰待奏劾此人兼懷州有糧有器甲未便打得破且大家同共上城分地分守禦次日旦聞門外市人云畨人來也仲熊使人往探云安撫指揮已閉了城門少頃知河內縣趙士付歸仲熊訪之士付出見云畨人來也為之奈何仲熊問何以知之士付云城上送將牒來云先鋒都統貝勒仲熊遂往北城上見安國坐間見金人差澤州書吏一人來下文字前靣説大金有道中間背盟數百言兼説已降了晉絳令懷州速降安國云如何回答仲熊未及言須臾一燕人來相揖少頃有三十餘騎來相揖仲熊問其師來之意其人語言不遜令一燕人譯語云南宋背盟我所以來我大金皇帝有一統天下之志國相英雄今又已取了太原晉絳你且看太原猶自取了則懷州何勞攻也你但説與知州令將狀來往見大都統羅索貝勒令人傳譯其所説大略同又問仲熊一一敘達內有燕人云是做唐鑑者孫子也又問與范仲淹是甚親遣歸云來日與州主商量了辰已間却出來時便攻打城也次日仲熊縋城而下見羅索貝勒問曰曽將得降狀來否仲熊云不曽將來貝勒曰何故不肯拜降仲熊云彼此臣子須各自理會假使大金使一箇臣僚守一城下撞著别國兵馬便以城降以謂如何若懷州不曽得大宋皇帝文字却便歸降恐國相聞知亦非所喜貝勒却喜曰説得是也我更不攻打懷州仲熊云雖是都統不肯攻打懷州却恐後隊不知告覔一文字貝勒曰我大金國不使文字只一人傳一箭與後隊曰令不要打懷州又令送仲熊歸霍安國即時具事實申奏朝廷不見回報仲熊既歸之後次日又聞敵兵已過隆德府霍安國遣仲熊迎見尼堪説以駐兵仲熊至西山離懷州約三十餘里逄見尼堪仲熊云兩朝已結盟好誓不相攻不虞國相元帥逺屈金斾以至于此必是與中國有商量者事大軍所至百姓未曉如有所諭乞説與仲熊却令懷州安撫使霍安國奏知别差近上臣僚來理會尼堪云更有甚事理會爾南宋上皇數年前遣人自海上與大金結盟共滅契丹當時元約九州土地人民歸你南宋子女玉帛歸我大金及至各自興兵你南宋並不曽收得九州却是我大金取了燕山府為有已前盟約將土地人民一齊交割與汝是我有大恩德于汝南宋也你既無一謝我雖營平兩州割與大金而營平兩州户口都在你南宋界裏我為見百姓父母妻子離散情實不忍使移檄去向南宋取兩州户口你南宋都不發遣亦無回文不肯依約是時却是我先興兵來及至汴城下你上皇便不做却教太子為主見兵勢懼見攻破遂差使人將三關四鎮之地獻與我大金我信是實頭言語便引回去更不侵掠是我又有大恩德于你南宋也你南宋却背盟也密諭三鎮堅守不附又召天下兵援太原我今所以再興師出不可謂之無名我本待一齊都要你南宋土地又為大金皇帝聖旨教且以見流黃河為界你懷州合是我大金撫定去處便合歸降我本欲便進兵又為州縣須要人民若縱兵多殺人民則壞州縣你與我説與懷州知州且早來降保取家屬人民仲熊對曰元初大宋皇帝與大金皇帝結盟時本朝只不曽承得文字以黃河為界乞差人至大宋皇帝處理會尼堪曰更何須差人去理會我大金兵馬如此如今去便打破汴京捉你趙皇帝來也仲熊對曰如此却非所望于國相也况是彼此大國勝負未可知假使真如國相之言則非大金之福尼堪曰為甚却不是大金之福仲熊云如今便一一如國相所説若趙氏為君則大金可以保嵗幣必不肯更有不相承順之事若廢了趙氏為中國之地必須中國人做主有人起來興兵奪得則是創業之主與大金初無契分亦無恩義相臨必不肯將嵗幣與大金亦不肯割三關四鎮自此嵗嵗用兵幾時是了期不過有人去國相處道討虜所獲多於嵗幣國相試仔細思量此豈是忠言討虜得萬萬是他人自將去國內久用兵民心怨恨國相任其責不如受嵗幣安穩做大以仲熊所見不若與大宋皇帝商量將三關四鎮歸大金每嵗更添嵗幣其餘事宜自是易處尼堪曰也得與我三關四鎮每嵗更添嵗幣二百萬來你且恁地差人去大宋皇帝處説我且留軍在懷澤之間等你回報已前發去者急欲攻打未見次第便却喚回待指揮教與不得胡亂殺人教仲熊賫回文與霍安國説此意霍安國即時詳悉具狀申奏朝廷既十八日回報不至番人遂于城下治攻具懷州又遣秀才六人往見尼堪問曰范仲熊所説及此申文字是霍安國不曽奏去是趙皇沒文字來六人云奏去十八日未有回報尼堪大怒奮身而起曰為道是范仲熊小官沒人主張言語不足聼不道是我交將我文字去你南宋恁地無信行從今日以後更有文字來我也不信差使來我也不見你且説與州主一任你們忠孝出戰亦得守城亦得只是不住手攻打也須要六人遂歸霍安國以仲熊知敵虛實即差仲熊都大主管軍馬是時方得隆興府路安撫使張有極於隆德府未破時發來懷州蠟書云金人以南關衝散董恩人馬迤邐前去過隆德府關報懷州為偹時敵人在城下日夜攻打初用雲梯敵樓上用神臂弓偏架女墻上用斬馬刀大斧每有敵人上來輒斬之雲梯既不能上乃使鵝車洞子狀如數間屋皆以生皮裹了下面藏數十人執鍬掘城于鵝車洞子由小梯欲登城又為城上人以草燃火放火炮燒小梯及燒打鵝車洞子開陷板夜又礧石礧木用金汁及熱湯燒灌既使不得鵝車洞子乃立炮坐數十初放入撒星炮其大如斗城上人於敵樓上排大枋確尺餘糞土上面結大索網又括民間青布帳幕以禦炮而敵人先用火炮是燒青布及索網放虎蹲大炮九稍其大如七八斗栲栳每一炮到城索網糞土大枋樓上皆破城中人甚懼霍安國令仲熊夜募鋭士二百餘人縋城劫寨約到寨殺人放火呌九州漢兒反使其陳亂圗燒城下炮坐既下城見無數敵人馬軍連路極難行至三更向盡到炮坐下先十餘人放火而陳不亂遂硬相鬭各有殺傷展轉得出比明復縋城而上者二十四人仲熊方往見霍安國忽城上有人呌云東南上有白旗子來是朝廷救兵來霍安國急令仲熊排人馬欲開北門而敵人已打散城上十數黑旗子凖偹將領王美投濠而死仲熊乃率千人與之巷戰民兵散去仲熊被擒見敵樓上張紫傘一柄監軍烏舍郎君坐其下令人傳譯云何故不曉逆順抗拒王師久勞軍馬本合一齊勦除我為愛惜生靈不欲按以軍威據軍士之意則要下城虜掠你可仔細説與百姓既而懷州萬餘人至城下皆稱云救范機宜去來又髙聲呌云機宜放心若動著官人後百姓與官人報讐監軍使人傳令曰不消如此又謂仲熊曰節制不在你非你之罪可貸命仲熊對曰仲熊是趙皇臣子奉安撫司指揮來將兵才微兵薄分甘死願乞一死監軍曰我大金人説話一句是一句不似你南朝説話沒慿據既貸你命只是貸命你只是貸命更無他公事你且歸去為我喚取州主來同見國相仲熊遂回往州衙尋霍安國不見又去城北道風樓上尋霍安國亦不見蓋已為金人所擒又押仲熊去再到烏舍前見知澤州髙世由通判吕民中皆同坐烏舍先曰安撫已捉得也天色已晚你且去明日見國相遂令監守次日天未明都捉去見尼堪出南門約行二三里有三坐寨其中寨尼堪坐銀交椅皆令懷州官立其前先引第一行知州通判鈐轄都監部隊將鼎澧步隊將兵作一行次知官一行次監官一行次縣官一行次尼堪使畨官傳令曰你許多人是誰最不肯降霍安國云是宋朝守臣霍安國率衆不降又問第一行諸軍曰是州主不降是你們都不降皆説某等與知州一般皆不肯降又令于東北望大金拜降霍安國云安國是大宋之臣不曽得趙官家文字如何拜降尼堪令引過盡去衣服用索執縛又令髙尚書説與其它人曰你們都是小官不關你事亦不要你降各赦罪又令傳過鼎澧路將官來其鼎澧路將校到尼堪前皆呌云不是某等不降都是霍安國范仲熊不降其范仲熊曽領兵出戰尼堪乃傳令曰呌范仲熊遂於縣官衙中拖出剝去衣服縛了問曰元來是你不肯降仲熊對曰仲熊是趙皇臣子豈敢便降又傳令曰你全不怕我軍令為甚仲熊對曰仲熊昨日已蒙監軍郎君貸命云大金國一句便是一句貸命了更無他公事恃此所以不怕尼堪乃笑曰難當難當又傳令曰范仲熊已貸命可赦罪乃命知州霍安國奉議郎通判林淵武功大夫濟州防禦使兵馬鈐轄張彭年武經郎監都趙士諤武德郎都監張諶修武郎都監丁潛保義郎統領鼎澧兵馬鈐轄沈闕秉義郎同統領鼎澧兵兵馬張行中及南兵部隊將五人同時被害提舉河東路常平朝奉郎郝愈司録奉議郎劉汝賢承直郎司户曹事向詠修武郎司儀曹事鄭道沖修職郎司兵曹事王説從事郎司刑曹事王舍承議教授王與權迪功郎修武縣主簿侯從從政郎河內縣主簿馬亞承節郎市易務求之祥迪功郎六曹掾張思義皆乞降宗室朝奉郎知河內縣趙士付承直郎司士曹事趙公譽忠訓郎監酒趙不怠保義郎添差監酒趙公闕忠訓郎監市易務趙子韓忠訓郎監倉趙不藏並過河金人堅要仲熊拜降乃使之地居絶其糧食正是大雪並無蓋臥身上雪厚一二尺飢則喫雪或潑雪取土中蔓菁根食之如此七日偶燕人見憐之曰此是忠孝之人可擘畫物事與喫或袖熟牛肉燒餅等見遺遂得不死一日烏舍呼仲熊至其寨中問曰聞得你讀得書多今問你兩事一則問韓信用兵人才髙下二則問劉景升孫䇿何以不能成功仲熊對曰韓信才亦不髙故必設計若才髙則不假詐謀無與為敵惟其才不髙故必設計然後能取勝如水上沙囊木罌背水陳之類是也劉景升孫䇿雖天資英勇然器輕無君人之體所以無成烏舍聞説大喜親屈膝勸仲熊飲酒又以宣政殿學士濟蘇摩哩貝勒官誥一道授仲熊仲熊又力辭以義不敢受烏舍與尼堪至相得而烏舍才尤髙自阿固達在日三人用事未嘗中覆每有所為便自専阿固達每撫其背曰孩兒們做得事必不錯也一切皆任之以至出誥敕命相皆許自決國中事無大小非經此二人不行至于兵事烏舍又専之尼堪總大綱而已烏舍年長于尼堪約年五十餘嵗尼堪庚申生年少兄事烏舍且甚重之與二太子頗不相得蓋二太子以貴尼堪烏舍以才自髙不肯相下云三朝北盟會編卷六十一
