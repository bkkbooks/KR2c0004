body:
  text: 三朝北盟會編卷一百七十宋徐夢莘撰炎興下帙起紹興六年九月八日癸酉盡十二月五日戊戌八日癸酉車駕幸平江府十日乙亥韓世忠來朝王庶知荆湖北路經略安撫使王庶被召出川至鎮江府除荆湖北路安撫使知鄂州有旨候奏事畢之任五月賜封復顯謨閣待制未至鄂改知荆南府湖北路經略安撫使至是到官治事嶽飛退軍鄂州二十九日甲午劉豫入寇張俊至建康督戰張俊行狀曰公渡江撫淮上諸屯時遣人自巫山回聞徽宗不豫又聞欽宗所貽金帥書奏曰臣得屯信不禁臣子痛切憤激之情仰惟陛下處天子之尊遭父兄之變聖懷惻怛勤切於中固不止坐薪嘗膽也時張俊軍已進屯旴眙三師鼎立而嶽飛遣兵入偽地至蔡州焚其積聚時有虜獲俊力贊建康之行為不可緩上以九月一日進發至平江公又請先至江上諜探敵情及劉豫姪猊挾敵來寇公既行而邊遽不一公至江上知來為寇者實劉麟兄弟豫封麟淮西王兵凡六萬入寇已渡淮南涉歷夀春逼合肥公奏淮西之寇正當合兵掩擊今士氣甚振可得五勝若有一退則大事去矣上手詔曰近以邊方所疑事咨於卿今覽卿奏措置方略審料敵情條理明甚非卿識見高逺出人表何以臻此於是詔下諸將始為戰計侍御史魏矼奏劄論不當講和臣伏覩魏良臣王繪歸自淮甸亦有金人文字事意曲折不得與聞於傳記有曰前車覆轍後車之戒又曰商監不逺在夏后之世自靖康初敵騎既退大臣偷安無復注意軍事故時有不理會防秋却理會春秋等語北兵再入河朔遣回王倫督和議優遊不決繼邀索五輅又復聚議經時迄以輿輅未渡河而逰騎已次濬州故敵常語人曰所以索輅車者且令南朝爭議一兩月耳今者陛下奮發英斷新御戎軍諸將競趨江上鬬志日鋭而陛下復大開言路包容狂直凡非軍旅之事一切停罷宸算素定施設注措犂然當於人心臣仰料天意亦須助順削僭偽而復侵疆實係此舉願自睿斷立罷講和二字况朝廷前此三遣和使而後大金繼有報聘禮意周旋信言可考頃復傳使尋好未有釁隙兹乃偽劉父子巧造兵端謀窺郊甸初無和意使人未見國相報書來自近甸自無可信覆轍未逺今大兵坐扼天險授師艤舟上流精鋭無慮十萬彼偽劉挾敵為重僉軍本吾赤子人心向背久當日携持重以待之輕兵以擾之吾計得矣昔曹操降劉琮得其水軍人船合八十餘萬徑下江陵吳之議者咸曰曹公虎豹也然托名漢相挾天子以征四方今日拒之事更不順且將軍大勢可以拒操者長江也今操得荆州水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論不如迎之獨周瑜曰不然操托名漢相其實漢賊也今北土未平馬超韓遂尚在關西為操後患其舍鞍馬仗舟楫與吳越爭衡本非中國所長又今盛夏馬無稿草驅中國士衆逺涉江湖之間不習水土必生疾病此數者用兵之忌也而操皆冒行之將軍擒操宜在今日瑜請得精兵三萬人進住夏口保為將軍破之遂引兵與劉偹并力以逆操敗之赤壁今劉豫挾敵以叛視操孰順近日敵衆深入澤國視操孰強而嶽飛在江西吳玠在秦隴形勢又孰得更欲聽其詭計摧喪士氣坐以受其弊非臣所喻也昔新垣衍説趙帝秦魯仲連折之有曰是使三晉之大臣不如鄒魯之僕妾秦軍聞之為却五十里臣久誦斯語不勝憤悶惟陛下為宗社生靈之重仰順天意俯從人欲飭勵諸將力圖攻守庶有再造之期臣區區識慮蓋止於此陛下與二三大臣熟計而裁決之十月四日戊戌王德酈瓊趙四臣敗劉豫於安豐縣是夜知夀春府孫揮又敗劉豫於芍陂偽齊大舉其衆侵犯淮甸有吞併江淮之志劉光世命王德酈瓊等出淮西以逆之有安豐立謝步臯于霍邱敗賈澤于正陽王遇于羊前於是賊之氣已挫矣八日壬寅楊沂中張宗顔王偉吳錫敗劉猊于定逺縣劉豫使姪猊自渦口渡淮入定逺是時殿師楊沂中被命聼張俊節度俊乃分遣沂中及統制張宗顔王偉吳錫等禦之至定逺與賊遇王師力戰猊敗擒其將李亨十一日劉麟寇廬州聞劉猊敗退走淮南西路太平州宣撫使劉光世于廬州聞麟入寇其勢甚熾密申宰相趙鼎乞降樞密院指揮退保太平州僉書樞密折彥質助為之請遂檄光世退軍都督張俊聞之大怒遣向子諲等督光世復還廬州麟以偽齊兵十萬犯廬州知劉猊先敗遂退走先是上親札付王德曰卿宜竭力協濟事功副朕平日眷待之意故光世命德追擊至夀春縣而還橫尸屬道有赴淝水而死者德受相州觀察使制曰兹屬逆雛之猖獗首提鋭旅以蕩攘又曰凡蜂屯而蟻聚咸電掃而風驅是役也偽齊失運車七十輛船七百隻歸正亡殁散者大半喪器甲偽交鈔告敕軍需金銀犒賞之物不可勝紀參知政事沈與求罷為資政殿學士知明州沈與求為參知政事時督府治兵欲大舉與求弗聞與求曰此大事也豈可身居近輔而獨不與哉數上疏求去除資政殿學士知明州疏再上改提舉臨安府洞霄宫十八日癸丑張俊楊沂中攻夀春府不克而還王彥至行在王彥以新除行營前護副軍統制至行在也十一月張俊還闕俊行狀曰是時劉豫令鄉兵偽金服於河南諸州十百為羣由此間者皆言處處有兵又張大聲勢於淮東阻韓世忠承楚之兵不敢進十月楊沂中抵濠州劉光世駐軍與沂中接連相應劉猊分麟甲之半後沂中大破猊於藕塘降殺無遺猊僅以身免劉麟拔柵遁走上奏車駕宜乘時早幸江上上賜手書曰賊豫阻兵梟雛犯順夾淮而陳侵夀及濠卿奬率師旅分布要害臨敵益勇仗義直前箕張翼舒風馳電掃遂使豪渠宵遁同惡自焚觀草木以成兵委溝壑而不顧昔周瑜赤壁之舉笑談而成謝安淝水之師指揮而定得賢之效與古何殊寤寐忠勤不忘嘉歎公軍至平江府隨班朝見上曰却賊之功盡出右相之力於是趙鼎惶懼乞去十二月五日戊戌韓世忠敗金人于淮陽軍趙鼎罷相除觀文殿大學士知紹興府兼浙東安撫使趙性之中興遺史曰劉豫兵馬遁走張俊獨對乞乘勝取河南擒劉豫父子也及言劉光世驕惰不戰不可為大帥請罷之上問曽與趙鼎議否曰未也上曰可與趙鼎議之俊見鼎具道其故鼎曰不可劉豫機上肉耳然劉豫嘗倚金人為重輕不知擒滅劉豫得河南故地可保金人不侵入乎如其侵入何以禦之且劉光世軍下統制將轄輜重多出其門若無故罷之恐士卒懼而不安俊不悅俊見上請幸建康鼎諌未便遂罷鼎宰相見以觀文殿大學士知紹興府安撫浙東張俊行狀曰公未至平江府時趙鼎等以議回蹕臨安公入見之次日具奏曰獲聞聖訓惟是車駕進止一事利害至大天下之事不唱則不起不為則不成今四海之心孰不思戀王室叛冦相劫脅之以威雖有智勇無由展謁三嵗之間賴陛下再造士氣從之而稍振民心因之而稍回正當示之形勢庶幾乎激忠起懦而三四大帥者亦不敢有偷安茍且之心今日之事存亡安危所自以分六飛儻還則有識解體內外離心日復一日終以消約異日復欲下巡幸詔書誰為深信而不疑者哉始知朝廷姑以此為避地之計實無異於天下故也議者不過曰秋冬有警車駕難于逺避夫軍旅同心將士用命扼淮而戰破敵有餘又不過曰當秋而進士有戰心及春而還絶彼窺伺為此論者特可紓一時之急應倉卒之警使年年為之人皆習熟謂我不兢難乎其立國矣陛下欲深居臨安亦豈能安乎上翻然從其計十二日趙鼎遂知紹興府折彥質罷樞密院除端明殿學士提舉西京嵩山崇福宫劉光世在廬州乞退軍太平州也以書懇趙鼎又彥質助而得之至是臺諌論列乃罷彥質僉書樞密提舉宫觀張俊加少保鎮洮崇信奉寧軍節庶使楊沂中加保成軍節度使張俊楊沂中以長樂鎮之功受賞故有是命長樂鎮地名李家灣者是也上親筆詔賜其略曰卿議論特重深達敵情兼聞挽強之士多至數萬人卿等報國如此朕復何慮又曰卿所部士卒精鋭為諸軍冠聞之深慰平昔內外之臣謂朕待卿獨厚其仰體眷懷益思勉勵邵隆復知商州三朝北盟會編卷一百七十
