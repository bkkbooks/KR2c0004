body:
  text: 三朝北􅉀㑹編卷六十八宋徐夢莘撰靖康中帙起靖康元年閏十一月十七日戊申盡二十三日甲寅十七日戊申金人使蕭慶同馮澥入城議事先是馮澥奉使尼堪理㑹三闗事至懐州界逢金人館伴劉思蕭慶云已遣使徃汴京請黄河為界三鎮更不湏理㑹至是金人獨遣馮澥同蕭慶入城請上出城欲議誓盟不從冄遣蕭慶來請太上出城又不從許宰執親王出城亦未發十八日己酉太學生丁特起上書乞早决用兵議和之計十五十六兩日金人攻諸門愈急朝廷至是猶未有用兵意但使命徃來士庻莫測其故張叔夜以身為樞宻而知不由己乞罷僉書止帶南道總管領南道兵不允叔夜甞召范瓊李實張仙裴淵䝉造王瓊折彦文何仲剛張撝等來日午時上城議及期皆不至上詔叔夜曰聞卿檄召諸将莫是欲出戰否如欲出戰幸先示及叔夜意沮丁特起知其事滴泪濕衣乃上書乞用兵議和之計早决無淹延不斷養成敵國之患書奏不報金人攻城愈急金人之攻城也先以擊東門外二拐子城兾撃壊之作級道登城半月城堅而不壊又以雲梯對楼攻其門東水門舊無重門敵樓又城隄無壕易為攻擊都大提舉守禦劉延慶臨其上設重樓嚴偹又以樞宻副承旨王瓊統麟府勤王兵千人為䇿應金日攻撃十五日砲石積城下髙丈餘殘傷金人㡬萬人移攻宋門提舉官王時雍守具亦偹對樓雲梯至毎以木衡倒仆死者無數統制李質率衆殺獲亦多次陳州門金人以洞屋負土填壕城上以大石砲擊之皆不能壊朝廷募人焚鵝車洞子賞絹二百疋銀五百兩白身補秉義郎有官人轉七官統制招討盗賊䝉造每率士㷊洞屋火起輒為敵人所滅城上守陴者唯患砲有閤門宣賛舍人孟度者自河東太原䧟而逃歸獻言孫傳曰太原提舉弓箭手吳子原結大䋲為網每五十歩為一片一長竿張之得十片足以禦城下砲石傳以其言誕妄而不信金人初至城下先打濕洞屋以新牛皮䝉其上戴之令人運土木以填壕决伐大木為敵樓雲梯火車又儡土砲坐尊牌石石磨墓中羊虎石為砲欲攻之所則砲坐百餘飛石如雨擊守禦之卒多死傷金人填壕既畢乃連五對樓過壕而攻城城下列砲石坐二百餘所七稍砲可施五十斤之石散星砲每砲坐可施石數塊並發又以彊弓弩千餘助之城下矢石如雨使守禦者不䏻存立然後推對樓使登城毎對樓載兵八十人一對樓得城則引衆兵上其疊樓之法先用木牌次水面次用薪次土増覆如初矢石俱不入雲梯之制髙于城以䋲貫竹木似梯而灣其下施平板板上下小籠䝉以牛皮可置數人以掘城又其下乃輪軸即鵝車也箭所不䏻入此金人攻城之方畧也石茂良避兵夜話曰金人攻城之具又有火梯雲梯扁橋鵝車洞子兵法為木驢也撞竿鈎竿之類火梯雲梯皆與棚樓齊髙亦有髙扵城者皆可以燒樓櫓雲梯扁橋可以倚上下三物皆用車軸推行撞竿用大木長可數丈者又用横木數十穿兩下留守把䖏可以致力頭以鉄裹或安以大椎鎗或安以托釵鈎頭皆可也毎一樓橋子常置撞竿三兩條俟其火梯雲梯至城下則徐應之不必驚擾既撞定梯橋則衆手用銕鈎鈎定進不可進退不可以却則火自㷊梯橋亦壊人亦堕地矣萬一撞竿不中則用狼牙鎗手砲長鎗守禦之亦不能上惟當得人通津門拐子城毎與敵人攻打前後共壊火梯雲梯扁橋鵝車凡數十座皆此法也洞子可以治道可以攻城其状如合弩上銳下濶徃来其中節次續之有長十餘丈者上用生牛皮銕葉裹定内用濕氊中用火廩矢石火砲皆不能入治道則用安砲并推火梯雲梯偏橋之類攻城則欲取土透城皆不足懼也兵法之禦洞子用鉄蒺藜垂下而闕之其法以熟銕濶徑長一尺二寸條縱横布如蒺藜形鎔生銕灌入其中央重十五斤安鼻連環擲闕訖以轆轤抝上洞子皮上并泥闕不着即舉速放火炬灌油燒之又有用火井者敵人用洞子穿地道来反於地上直下穿井以待之積薪草安井中加火薫之或有用大砲安於其中則敵自焦灼又有用逰火者以銕闕盛火脂蠟毒藥懸縋下燒薫穴中攻城人又有用燕尾炬者縛草分為兩岐如燕尾状以油蠟灌之從髙垂下騎洞子燒之此法禦洞子法也撞竿至則作銕連環并曲桑木用索相連撞竿頭連以鉄鋛竿頭於兩傍令壮士牽之鈎竿至則用栲栳乗其鈎亦令壮士牽之乗勢猛放則竿與人俱倒砲架最難制禦金人砲架罒傍並用濕榆小椽宻簇又用生牛皮并鉄葉裹定􅀈鶚頭火不能入其砲有七稍五稍两稍三稍旋風虎蹲等砲内七稍可以至逺其次或放䨇砲姚友仲先於樓櫓子上受敵䖏厚縛虚棚上作羅李網并下擺糠布袋濕馬糞又扵城頭馬靣上懸穿濕榆桞木笓籬格氊雖慢然亦可以遮砲石也城下地廣安砲少最闕受敵七稍砲法用二百五十人拽稍長三丈砲放百斤力可至五十歩此稍式也今造到七稍砲多不如法稍短三尺餘故施放雖逮百斤亦不至五十歩毎安七稍砲以两日然後畢功又既安定之後不可移若用軸脚旋風城上尤便其虎蹲皆近城可用砲中利害尤多尤冝熟講拽砲之人必令濶布髙擡手於搭手處每䋲一結非特可致力或遇雨雪不致手􅉸䋲不可紊亂甞令齊整砲與頭欲相稱砲窝䋲欲短短則砲手不費力而能至逺不可不知也十九夜敵人安砲五十餘座城上雖有虗棚人皆不可存駐斃於砲者日不下数人姚友仲到宣化門二日恐敵人有砲首議幇築試身之法視敵楼子逺近築城面濶一丈二尺五寸下濶二丈五尺髙五尺四邉皆有虚棚女墻復有其傍置两小門如城門法萬一敵人上城賴有限隔可以迎敵不幸為提刑所沮又姚友仲置措南北拐子城勢捍禦者也姚友仲扵拐子城上别造兩圎門計拓馬靣三十歩許磚砌城中開一小轅門干戈板開下如城門法四靣置女牆迎敵皆自轅門出萬一敵兵厚重則轅門放下干戈板又是拐子城也磚城下濶五丈髙一丈二尺五寸不日造城通津門拐子城正是受敵處守禦有方終不可破皆姚友仲力凢守拐子法務要人少肅静可以應敵友仲首到南拐子城便令畫拐子圖除兩廊毎門兩水手路空板外籥起頭敵樓上虚棚凡三層止是受敵處每門不得過十五人弓弩鎗刀斧手相間分作三番晝夜轉更均其勞逸使得休息萬一敵人不測侵犯自有偹禦兵法䧟馬坑長五尺濶一丈深五尺坑中湏埋鹿角木鎗竹箭其坑似曲字相連状如鈎䥥以草及細土覆其上今坑非特不䏻䧟敵且又自䧟殊可笑也凢兵披城下寨人必曽經行陣者盖城之存亡在此數百人豈可輕舉今披城退走者皆是諸州保甲弓兵其失䧟盡如此兵法載攻城之具甚多所載者金人皆用之城上統制官皆庸人武士如古守城器具分歩注徃徃皆不甚深曉如轉官橋木弩行爐油嚢之類皆典籍所載畧不聞按圖施行僕甞獻議皆云久在邉陲素不識此初縛虚棚時友仲多備濕氊濕床刀舊衲襖盖防敵亦有火箭火砲也幸而敵國不善制此二物僕甞建議於東壁欲擇使臣善射者一百人班直三百人子弟所二百人各授以火箭二十隻常箭五十隻毎一血盆内燒錐十箇共二十人射者並分布於受敵樓子上至四鼓初每日敵人交番休息之時盖金人睡不觧衣不喜夜戰乗此之時擊鼓一聲為號火箭俱發凡五百人各一十隻以數計之五千火箭也其火箭絶繼以砲蒺藜砲金汁砲應砲齊發火砲繼之絶後又以草砲用草一束以竹篾三繫之置火其中以助火勢火既盛敵必倉皇救火然後用常箭射之各五十隻五百人則二萬五千隻也矢石如雨則寨必亂繼以敢戰之士五百乗勢拆橋敵砲座既壊則橋亦毁惜乎為副将張宗顔怯懦誤事計欲行而少沮丁特起泣血録曰金人造火梯雲梯撞竿鵝車洞子之類火梯雲梯偏橋皆與城上樓櫓相髙亦有髙過於城者火梯則可以用燒樓櫓偏橋則可以倚城而上皆有軸運洞子可以治道可以攻城状如峻屋可以燒樓櫓雲梯偏橋上銳下濶人徃来其間節次續之有長數十丈者以栢木交互上用生皮布鉄裹内用濕氊中間大忩矢石火皆不䏻入於治道則安砲椎梯櫓之類攻城則要取土透城其機巧如此十八日己酉金人攻東水門敵侵門以大橋三置火其上相繼攻東水門拐城搭材四人鋸繼橋以火沃火用衝竿折其梯墜者甚衆三搭材皆死斡里雅布復遣使詣朝廷使人来云南朝許割地約和而失信今欲盡得河北河東之地然後罷兵可先割兩路地次執不割地大臣送至軍前再議和好又曰某傳太子台令問南朝曰人事至不得已則為之奈何斡里雅布之意恐城堅難抜而天下援兵至盡以此言脅朝廷也十九日庚戌知樞宻院事曺輔尚書左丞馮澥宗室節度使士􅀈使於金國軍前士􅀈仲忽長子也宣和録曰先是尼堪軍到青城遣奉使知樞宻院事馮澥引番官蕭慶楊貞察勒瑪貝勒来使慶極桀黠有口才楊貞察勒馬語簡而峻察勒瑪乃金人其上所親信者冄差莫儔髙世賞館伴次日引見上殿慶等力陳夲朝失信事謂三鎭已許了兵纔退便不肯交今雖是畫河國相元帥湏要與皇帝㑹盟方退師上令儔宣諭曰三鎭非不交割自是三鎮兵民不從因而差使告大金覔三鎮之地却許三鎮賦税増作嵗幣夲非失信慶又奏云大金收得貴朝詔書言祖宗之地尺寸不可與人上宣諭曰此乃前日臣寮獻議已行貶竄自有國書回元帥且煩太師諸人主張和議必不相忘敵使退即至􅀈授書辭去又數日蕭慶等再賫尼堪斡里雅布書来堅請皇帝出城㑹盟不然即圍城之軍决不解攻城之具决不退未攻城前車駕若出城二帥當執臣子之禮若城破後更無相見禮若謂使人言語太過即請斬之使人不惜一死此事繫貴朝社稷儔等皆答曰此事恐終難允從上遣李處權充送伴使吴徳冲副之閏十一月十四日尼堪斡里雅布復遣蕭慶楊貞察勒瑪同李處權等來使先與儔等相見曰奉賀這回好公事也且喜早了當得國相元帥皇子元帥云皇帝不肯出莫是疑否儔答曰亦何所疑只是事體不順慶曰國相元帥皇子元帥來使令慶等告知皇帝更不要車駕出城只要大臣計議近上親王為質便待兵退候兩路割地了畢即送親王歸儔等即時奏知皇帝蕭慶等又言來時元帥云陳州門城壕已填了三分之二長一里許有攻城器具二百車並未令推向前如依得書中所言十五日放慶等回和議便不然二元帥云亦不顧慶等三人一靣攻打若一個軍人登城更無商量遂引見至殿上即奏曰免煩聖駕出城只要何㮚出城議事㮚色變上亦不許宣諭使曰待遣大臣馮澥曹輔前去又請上皇皇太子越王鄆王為質上宣諭曰朕為人子豈可以父母為質如太子方數嵗如何到得軍前察勒瑪奏曰這事也有商量如上皇皇太子不須出去只告親王二人出城為質上宣諭曰待遣近上皇屬出城蕭慶等又奏曰議使非僕射何㮚不可上曰馮澥曹輔皆忠實大臣朕所委任軍前有事但與商量慶不以為然莫儔髙世賞請對力陳金將已不敢煩仰聖駕出城其心頗回極不易得如宰相親王不可不遣且如斡里雅布前次到城下要宰相親王陛下即遣康王肅王兩軍並傳城下尼堪兇悍有謀非斡里雅布比豈可不遣宰相親王恐貽後日之悔蕭慶曰舘伴且須催貴朝遣親王早出城若更遲回恐悮大事至馹上降内批付儔等令再三説諭使人本朝宰相只一員毎日處畫朝廷事務應付軍前闕官已遣輔臣馮澥曹輔去諸事自可商量莫儔髙世賞委曲設辭曉諭慶等曰須得何㮚并親王出城事便了兵便退不然决定攻城城破之後不知大臣親王做得麽慶等此後恐不復來矣楊貞又索干戾人儔答曰皆已貶竄嶺海不知存亡慶遽止之曰在此間者猶不肯遣况干戾人乎授書相别次日朝廷遣樞宻院事曹輔代宰相宗室節度使仲温士􅀈代王至軍前尼堪但置酒待之酒三行便送馮澥歸不交一談自此攻城益急晝夜不息遺史曰先史曰朝廷屢遣使請和而李處權偕司農少卿甞使于軍前尼堪斡里雅布佯許和且請親王出使處權反命上復欲遣處權行乃曰若和議成當除卿僉書樞宻院於是執政恐處權之成功也乃建議遣曹輔馮澥而以宗室士􅀈代親王行出城尼堪使問親王名諱曰士􅀈尼堪曰既是親王何不與皇帝連名答曰人臣不敢與君父連名尼堪曰燕王越以下皆與君連名士􅀈不連名詐也或告尼堪曰士字號宗室耳詐偽親王也尼堪怒攻城益急靖康録曰時邀親王宰臣議和何㮚留之不遣㮚書生好誇大暗機㑹唯取謀於兄棠棠亦碌碌無過人之謀㮚日於都堂飲醇酒談笑自若時一復謳栁詞聞敵浩瀚㮚方中酣揺首曰便饒你漫天索債待畧地酬伊聞者大驚靖康遺録曰是時何㮚専主戰議羣僚詣東府見㮚坐之㮚曰金人請和不急乎少尹李平西答曰因其所講而許之不失為威重若何㮚搖手良乆屈指數謂衆曰今敵人為鵝車雲梯等我已拒之將去也計窮勢遏是以請和且一嵗再至城下欲和事皆由彼且我得不和不衆莫能對又云畢竟當和但須緩耳因各罷去二十日辛亥金人攻宣化門急官軍披城戰鬬不利多死金人攻宣化門急欲渉河而過先有墨旗子三十餘人已登㟁王瓊姚友仲率勇鋭使臣數十人及西兵百餘披城下戰殺金人數人乃稍退宰相何㮚亦至城上發矢如雨金人不顧城脚下有披城戰者兵六七百人金人前進欲與交鋒官軍望風退走金人追逐之城上厲聲呼官軍復回迎戰而衆已四𣪚勢不可回隔岸金人發矢石如雨傷有數百人自填䧟坑而死者近百餘人金兵大笑之遣武學進士秦仔等持蠟書諸路告急金人於城下環列營柵治器具攻城甚急及是遣使賫蠟彈往諸路召勤王兵赴闕上御瑶津亭遣使秦仔往河北尋康王奉聖㫖訪知州郡糾軍民兵欲起義此祖宗百年涵養忠孝之報天地神祗所當佑助書到日康王可充兵馬大元帥陳亨伯充兵馬元帥宗澤汪伯彦充副元帥同力恊謀以濟大功分命使人往陜西授范致虚五路宣撫使往淮南授翁彦國五路經制使各令提兵勤王入援白身及有官人各先授數官帶閤門宣賛舍人閤門祗候而行書詞云宜疾速率兵不限方數倍道前來總管張叔夜率先勤王至之一日即除延康二日除資政三日除樞僉事諸路兵若能速來不吝官職亦優加勸賞監司帥守能奮力衛國之人即宜速團結軍民以救國難其所用資粮逐亟權挪應付雖與法有碍亦許支用有能糾集轄善部之人許以便宜隨功等借補文官自廸功郎至宣教郎武官自副尉至從義郎候到闕給告正授有官人令加借樞宻院劄子催諸路兵勤王靖康總載曰金人深入直抵京畿掠擄居民慿陵郡邑雖有議和之請未聞退舍之期主上出宫禁之御供士卒之食軍民感泣而思奮都人鼓譟以争前上念闕一字盟未令出戰然大有難塞之欲繼生無厭之求近日于都城四壁作雲梯鵝車等窺伺間隙攻打堅城多設虚寨逺置疑兵欲絶聲援樞宻當職親履艱危雖上聖垂仁猶欲按兵而講和然大臣仗義豈能顧位以偷安踰萬里之幅􅊷萃四方之豪傑乃祖乃父被聖神涵養之休惟孝惟忠實臣子願為之事宜殫大節圖報上恩致號令之未明欲施為而不敢如檄書到日應帥府司監郡守二令佐悉不拘常制起勤王之師如見起發仰所領官併日催促前來救應京室有未起發去處不拘逺近内外許鄉里豪傑遽相効率招集驍勇不限數目各目下推排首領前來或有散處山林團結已成隊伍許其各申所在官司不拘軍人百姓亦許自効隨事便宜四面攻討其所獲隨事以聞自節鉞以下已有立格推恩願忠臣義士相與竭力以成大功時不可後劄付開封府闗牒前路火急施行二十一日壬子雪大作盈三尺不止天地晦冥或雪未下時於隂雪中有雪系長數寸垂地是夜彗星見有白氣出太微垣二十二日癸丑砲中田灝立死進五官賜待制二十三日甲寅范瓊及金人戰于城下敗績是日范瓊發兵千人自宣化門出與金人戰士氣甚銳金人小卻士卒貪功乃乘氷渡河未及岸氷拆士卒驚亂金人遽臨岸迎敵官軍陷河而沒者五百餘人自是士氣益挫折金人初攻宣化門叠道渡濠吴革往視之南壁守禦言安上門堰壕水三尺及盡洩蔡河閘水夜浸之不從至是叠道將合始用前議而水已氷矣金人攻宣化門是日敵氣益鋭火梯雲梯偏橋到城下如鱗次又推對樓五座盛矢石而來城上以撞竿倒三座對樓既倒城上争擲草火以焚之對樓木多而草盛熾乗南風引燒城上樓子二坐火砲如雨箭尤不可計攻擊甚力䕶龍河悉填叠鵝車領衆直抵通津宣化二門下無數歩許力攻二城其勢甚鋭倉卒之間王宗濋令人在造樓子骨格將欲掛撘金人望見以矢石擊之使不能措手三朝北盟㑹編卷六十八
