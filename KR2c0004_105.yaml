body:
  text: 三朝北盟㑹編卷一百五宋徐夢莘撰炎興下帙起建炎元年六月二日庚申盡四日壬戍綱議國是奏劄曰臣切以和戰守三者一理也雖有髙城深池弗能守也則何以戰雖有堅甲利兵弗能戰也則何以和以守則固以戰則勝然後其和可保不務戰守之計惟信講和之説則國勢益卑制命於敵無以自立矣景徳中契丹入冦罷逺幸之謀决親征之䇿捐金幣三十萬而和約成百有餘年兩國生靈皆頼其利則和戰守三者皆得也靖康之春粗得守䇿而割三鎮之地許不可勝計之金幣以議和懲刼寨小衂而不戰於和與戰兩失之其冬金人再入畿甸朝廷以春初固然為守而不知時事之宜膠柱鼓瑟無變通之謀内之不能撫循士卒以死捍敵外之不能通逹號令以督援兵金人既登城矣猶降和議已定之詔以阻四方勤王之師使敵得逞其欲凡都城玉帛子女重寳圖籍儀衛輦賂百工伎藝悉索取之次第遣行及其終也刼質二聖廵幸沙漠東宫親王六宫戚屬宗室之家盡驅以行因逼臣僚易姓建號自古外蕃之禍中國未有若此之甚者是靖康之冬并守䇿失之而卒為和議之所誤也天祚有宋必将有主故使陛下脱身危城之中總師大河之外入繼大統以有神器然以今日國勢揆之靖康之初其不相若逺甚則朝廷所以捍患禦武敉寧萬邦者於和戰守當何所從而可也臣愚雖不足知朝廷國論大體然切恐猶以和議為然也何哉二聖播遷陛下父兄沉於敵庭議者必以謂非和将速二聖之患而虧陛下孝友之徳故不得不和臣切以謂不然昔髙祖與項羽戰於滎陽成臯間太公為羽軍所得其危屢矣髙祖不顧其戰彌勵羽不敢害而卒歸太公則不顧而戰者乃所以歸太公之術也晉恵公為秦所執吕卻謀立子圉以靖國人其言曰䘮君有君羣臣輯睦甲兵益多好我者勸悪我者懼庻有益乎秦不敢害而卒歸恵公然則不恤敵國而自治者乃所以歸恵公之術也今有盗賊於此刼質主人以兵威臨之則必不敢加害以卑辭求之則所索彌多往往不可測者何則彼為利謀陵懦畏强而初無惻隐之心故也今二聖之在敵廷莫知安否之審固臣子所不忍言然吾不能逆折其意又将墮其計中以和議為信然彼必欲割地以邀我若予之則可不然二聖之禍且不測不予之是陛下之忘父兄也予之則所求無厭雖日割天下之山河竭天下之財用山河財用有盡而金人之欲無窮少有釁端前所予者其功盡廢遂當拱手以聴其命而已昔金人與契丹二十餘嵗交戰戰必割地厚賂以講和既和又求釁以戰卒㓕契丹今又以和議惑中國至於破都城㓕宗社易姓建號其不道如此而朝廷猶以和議為然是将以天下卑之敵國而後已臣愚以為過矣為今之計莫若一切罷和議専務自守之䇿而戰議姑俟於可為之時何哉既彼背盟而刼和地不可復予惟以二聖在其國中不可用兵候其入疆則多方以禦之而攻破城邑徐議收復建藩鎮於河北河東之地置元帥府若郡於沿河江淮之南治城壁修器械教水軍習車戰凡捍禦之術種種具偹使進不得鈔掠退有邀撃之患則雖時有出沒必不能深入而憑陵三數年間生飬休息軍政益修士氣漸振将帥得人車甲偹具然後可議大舉振兵聲罪以討之報不共戴天之讐以雪振古所無之耻彼知中國能自强如此豈徒不敢肆兇二聖保萬夀之休亦将悔禍畏威而鑾輿有可遷之理倘捨此䇿益割要害之地奉金帛以予之是倒持太阿以其柄授人借冦兵資盗粮也前既信其詐謀以破國矣今又欲蹈覆車之轍以破天下豈不重可痛哉或謂强弱有勢弱者不可不服於强昔越王勾踐卑身重賂以事呉而後卒復其仇今中國事勢弱矣盍以勾踐為法卑身重賂以事庻㡬可以免一時之禍而成将來之志臣以為不然夫呉伐越勾踐以甲盾三百棲於㑹稽遣使以行成而呉許之當是時呉無㓕越之志故勾踐得以卑身厚賂以成其謀枕戈甞膽以勵其志而卒報呉今金人之於國家如何哉上自二聖東宫下逮宗室之係於屬籍者悉驅之以行而陛下之在河北遣使降偽詔以求之如是其急也豈復有恩於趙氏哉雖卑身至於奉藩稱臣厚賂至盡天下之財以予之彼亦未足為徳也必至於混一區宇而後已然則今日之後法勾踐甞胆枕戈之志則可法勾踐卑身厚賂之謀則不可事固有似是而非者正謂此也然則今為朝廷計嵗時遣使以問二聖之啟居極所以崇奉之者於金國加兵之時其來攻則嚴守禦以備之練兵選将一新軍律候吾國勢既强然後可以興師邀請有此武功以俟将來此最今日之上䇿也古語有之曰願與君定國是夫國是定然後語施注措以次推行上有素定之謀下無趋向之惑天下之事不難舉也靖康之間唯其國是不定而且和戰議論紛然致有今日之禍則今日之所當監者不在靖康乎臣故敢陳和守戰三説以献伏願陛下斷自淵衷以天下為度而定國是則中國之功可期矣上大喜付中書省遵守尼堪由河東歸至雲中斡里雅布由河北歸至燕山三日辛酉李綱奏議張邦昌僣逆及受偽命臣僚乞早降處分李綱𫝊信録曰是日李綱奏曰臣愚瞽輙以管見十事仰凟天聴已䝉聖慈施五事如議本政乆任修徳三事無可施行自應留中所有議張邦昌僣逆及受偽命臣僚二事皆今日刑政之大者乞早降處分上宣諭曰執政中有與卿議不同者更俟欵曲商量臣奏曰邦昌僣逆之迹顯然明白無可疑者天下皆謂邦昌在金嵗餘厚結金人得其歡心攻破都城遷二聖東宫盡取親王宗室以行邦昌盖與其謀此固不可知然邦昌當道君朝在政府者㡬十年淵聖即位首擢為相奉使金國方國家禍難之時如能以死守莭推明天下所以戴宋之意以感動其心金人未必不悔過而存趙氏邦昌方且以為得計偃然當之正位號處宫禁者月有餘日敵騎既退四方勤王之師集邦昌擅降偽詔以止之又遣郎官分使趙野翁彦國等皆齎空名告數百道以行迨勤王之師日進邦昌知天下之不與也不得已乃議奉迎邦昌僣窃本末如此春秋之法人臣無将将則必誅况邦昌已僣窃罪宜如何陛下欲建中興之業當自正朝廷始而尊崇僣逆之臣為三公真王參與國政何以示四方執政中有議論不同者乞降㫖宣詔臣得與之廷辯如臣理屈其敢復言上許之乃令小黄門徑就幕次宣召黄潜善呂好問汪伯彦再對上語之故潜善力主之詰難數四方屈服然猶持在逺不若在近之説綱曰邦昌當正典刑何逺近之有借使在近當幽縶而返尊崇之如此何也潜善不能對上顧吕好問曰卿在城中知其詳謂當如何好問曰邦昌僣窃位號人所共知既已自歸惟陛下裁處又引徳宗幸奉天不挾朱泚後以為悔以附㑹潜善不若在近之説綱曰吕好問之言首尾兩端且援朱泚以為例非是方徳宗之狩奉天朱泚盖未反也姜公輔以得涇軍之心恐資以為變請挾以行徳宗不聴而其後果然今邦昌之僣逆豈可使之在朝廷使道路指目哉因拉邦昌曰臣不可與邦昌同列陛下必欲用邦昌第罷臣勿以為相無不可者上宣論曰俟降出卿劄子來日将上取㫖四日壬戍張邦昌責授昭化軍節度副使潭州安置臣僚上言節義者天下之大閑僣逆者臣子之極惡春秋之義人臣無將將而必誅况已僣位號為天下之所憤怒者哉謹按張邦昌被遇道君之朝乆參機政際㑹靖康之日擢冠宰司資其重臣奉使敵帳初無忠義體國之意但知諛佞保身之謀去中國以踰年從敵騎以偕至乃二聖播遷之日無一言營救之忠憑恃金人盗據神器國危而資之以為利君辱而攘之以為榮叨有乗輿安處宫禁降㫖以行其僣命南面以朝其偽臣易姓建邦三十餘日迨金人之既退方降赦以收囬考其四日之手書猶援周朝之故事指瑶華為宋后豈有意於趙孤逆計顯然文飾拒掩逮知陛下總師於外天人所歸乃始退還舊班遣使迎奉今乃冐處王爵平章大政極其褒崇以罪為功臣所未喻今其黨與尚布朝列秋髙馬肥敵騎出沒邦昌挾借其勢陛下不得而制之中夜以思不寒而慄伏望陛下斷以英哲察其罪惡早正典刑而肆諸市朝以慰四方忠義之士以為萬世亂臣賊子之戒六月四日奉聖㫖張邦昌僣逆理合誅夷原其初心出於廹脅可特與貸免責授昭化軍節度副使潭州安置仍令監司守臣常切覺察日具存在申尚書省劄付應天府差官判送至府界闗報前路官司州軍廵尉各令互相管牒施行制曰以死償莭者臣子之宜求生害仁者聖人所疾倘或志存於軀命則将義薄於君親具官張邦昌身受國恩位登宰輔宗社有非常之變乃人臣思自盡之時而不能抗虎狼强暴之威徒為雀鼠偷生之計䧟於大惡所不忍言雖天奪其衷坐愚至此然君異於器大匱可乎宜大正於典刑用肅清於名分尚念本繇於廹脇惻然姑示於矜容爰黜散官竄投荒服其體好生之徳毋忘自訟之心中興姓氏録叛逆傳曰張邦昌字彦能元符三年以甲科第遷工部尚書使於髙麗國王死國人重中國之使權立邦昌為國王後詔還之宣和初為尚書左丞三年遷中書侍郎嘗與童貫議事面折其過士論美之六年貫再領軍往謀取燕邦昌建議止其行靖康初除少宰俄除太宰隨康王使於金國軍前及康王還京繼隨肅王入金國人多喜之及金人䧟京師欲㓕趙氏取邦昌至京城外京城留守王時雍等迎合金人之意請立邦昌為帝金人尼堪命邦昌入京百官軍民迎拜於南薫門内邦昌入居尚書省令㕔百官軍民㑹議於尚書省時雍榜曰大金人已定册立張邦昌太宰有異議夷三族軍民唯唯時雍同徐秉哲呂好問入見邦昌曰金人已滅趙氏欲册太宰為君三日不立将夷宗廟生靈邦昌曰身為宋臣豈簒逆也有死而已時雍等强之邦昌引刀自裁衆人奪之次日時雍等又逼張邦昌僣位金人遣蕭慶來册立邦昌僣皇帝位於京師詔書稱手書聖㫖稱面㫖宣㫖金人有取赴軍前者先奏然後邦昌懇金人取還馮澥郭仲荀胡直孺等赦天下死罪已下改國號楚以王時雍為太宰徐秉哲為少宰李囬路允廹知樞宻院吕好問門下侍郎莫儔呉幵同知樞宻院及金人退師邦昌即册哲宗孟后為大宋皇后俄又請垂簾聴政邦昌復為太宰聞天下兵馬大元帥康王将至南京邦昌上書以自明又遣謝克家奉上玉璽又至應天府來迎王即位加邦昌太傅同安郡王五日一赴都堂參議大事及李綱為相建議宜誅邦昌以戒臣下臣僚亦言其僣乃責授昭化軍節度副使潭州安置賜死時年四十七先是崇寧間望氣者云景州阜城縣有天子氣甚明命開河於邑斷其王氣開後邦昌與劉豫僣位皆阜城人也偽楚録曰張邦昌僣位凡三十有三日是時圍城中士大夫或受邦昌偽命或為邦昌利誘故記事多為邦昌文飾者謂邦昌以金人廹脅姑從權以安宗社每不敢有僣逆意盖邦昌窃位之初未知人心向背故繆為畏避改聖㫖為面㫖易詔㫖為手書姑安衆情其後布寛恤事件以收人心慰撫太學獨厚以收士譽至出辭金人則安然用天子法駕所過設香案官望塵起居並干故事矣如金人四月一日退師之後邦昌尚分衛兵閉守都城文移中削去靖康年號置修城司専委侍郎邵溥提領修飾樓櫓方且四散天下止勤王之師外路帥守書札皆斥其名仍用國寳援藝祖立周太后故事冊隆祐太后為宋太后又皆金人退師後見諸行事者其僣逆之迹昭然雖邦昌亦不能文也後見諸路勤王之師輻凑䑓諫交章以陳禍福知中外之情不附又家屬拘縻廬州方議遣使康邸繼請隆祐垂簾聴政始就臣位若謂復辟非邦昌之本心則可矣李綱建炎時政記曰東京留守司鞫治華國靖恭夫人李氏分事初張邦昌既僣窃居福寧殿李氏奉之時以果實為献邦昌亦厚荅之遂以飬女陳氏侍邦昌寝其後邦昌欲退歸府第因其姊入禁中乃留親随人易陳氏以出邦昌出禁李氏送至内東門有語指斥乗輿上聞之命留守司同御藥院於内東門推治李氏欵服且言用乗輿服御及陳氏奉上宣諭曰邦昌敢居宫禁寝殿姦私宫人可以見其情状有李氏决脊降配軍營務下民為妻秀水閒居録曰張邦昌以中書舎人使髙麗至明州謁海神廟夜夢神告曰他日當為中國侍郎伹不可為秉國大夫後十餘年累拜小鳯靖康改元金人至闕正月九日拜右相後兩日出質於敵營與之俱回燕山次年都城失守金人立為偽楚呉曽漫録曰張邦昌知汝州一日百姓下状有曰伏乞上命指揮者邦昌以非人臣所敢當下其人於獄自劾待罪朝廷但以不應為杖其人邦昌無罪迨後僣窃其黨有援此以為開國之祥吁可怪哉又論受偽命臣僚傳信録曰是日進呈論偽命臣寮上宣諭曰國家傾覆士大夫不聞死莭往往因以為利如王及之坐藩衍宅門詬詈諸王余大均誘取内宫嬪以為妾卿知之否臣奏曰自崇觀以來朝廷不復尚名莭故士大夫鮮亷寡耻不知君臣之義靖康之禍視兩宫播遷如路人然罕有能仗莭死義者在内惟李若水在外惟霍安國死莭顯著餘未有聞願詔京畿諸路詢訪優加贈恤如王及之余大均朝廷見付御史䑓推鞫必得其實臣聞方金人欲廢趙氏立張邦昌令呉幵莫儔𫝊道意㫖往返數四京師人謂之㨗疾鬼王時雍徐秉哲奉金人追捕宗戚里令居民結保不得容隐以衣袂聨屬以往若囚繫然其後廹道君東宫后妃親王出郊皆臣子之所不忍言又受偽命皆為執政此四人者宜為首上以詢呂好問而以為有之得㫖皆散官安置餘以次謫降内王及之余大均周懿文胡思陳冲等並令御史䑓疾速取勘候案到日取㫖三朝北盟㑹編卷一百五
