body:
  text: 三朝北盟㑹編卷十四宋徐夢莘撰政宣上帙起宣和五年二月一日乙酉盡二十八日壬子二月一日乙酉朔金人遣趙良嗣過瀘溝河即焚橋梁次舍茆齋自叙曰先是正月初八日以使事出京未朝見問李靖先索國書并御前劄目副本去次日阿固達委烏舎楊璞到舘屏去左右議事烏舎云割還燕地講好事主上已許難以爽信前日龍圖侍郎良嗣與武仲到來所以論課程税賦今貴朝御筆嵗添十萬疋兩無一大縣之數豈能成合良嗣等相與言海上所議盡還燕民燕地是以嵗輸舊與契丹銀絹今貴朝已將平灤營三州更不在議又要起燕京職官富户民工匠而本朝嵗又添十萬疋兩亦非少也烏舎等復云元初海上之約燕地人户合歸南朝應燕中客人合歸北朝兩下進兵夾攻契丹即軍馬不得過關葢欲南朝乘本朝兵勢就近自取今貴朝不能自取直候本國取了與去使貴朝坐享地土之利有何不便兼課程税賦出在地土非動貴朝物何苦吝惜元約燕地客人合歸北朝如郭藥師常勝一軍多是燕北人藥師亦是鐡州人恐貴朝要此常勝軍使喚故不欲請所以將些少職官相對若貴朝不欲發只遣郭藥師等軍還鄉亦得如平灤營三州本不屬燕京所管非奉聖州已許事不須道也初良嗣武仲御筆三紙一添十萬疋兩其二各添五萬疋兩良嗣折難久之烏舎等語言益剛良嗣遂併出御劄二紙具道主上聖意欲得相就和好也烏舎等俱有喜色云即今便去進呈至晚李靖來云御筆皇帝見了與諸郎君商量亦不多也次日烏舎云夜來收得貴朝流星馬文字却是與龍圖宣贊者何故便改燕京作燕山府皇帝已議定更不須理㑹課程税賦多寡但只要貴朝除與契丹嵗幣外每嵗添一百萬貫並依估定價折作綾錦羅紬木綿隔織綿絲木綿截竹香茶藥材細果等物已具目子如貴朝輒有分毫議減即更不成和好議者謂祖宗雖狥契丹嵗輸五十萬之數然復置𣙜場與之為市以我不急易彼所珍嵗相乘除所失無幾今悉以物帛價充𣙜場之法壞矣兼涿易州并常勝軍並舊屬契丹燕京所管自合歸還且請貴朝軍馬退那出城皇帝已約日親去巡邊良嗣等以理折對烏舎云事以决定更無移改請使副安排來日朝見即便朝辭本朝更不差回使也次日就營拜辭是日已立契丹巴納行帳前列契丹舊閤門官吏皆具朝服引唱舞蹈大作朝見儀禮每入帳門謂之上殿阿固達云我已言定嵗添一百萬貫一字不依更休來商量便請發常勝軍來及出涿易州兵馬後來别講通和禮數我欲二月初十日巡邊使人疾去應期復來不得碍我舉軍良嗣云此去京師三十程正月已終何以往還臣等欲只至雄州入逓繳奏等候回降却來庶可相及阿固達從允次晚南還到雄州作語錄入逓待報時女真既得契丹故大臣皆言南朝自來畏怯又見劉延慶敗走左企弓嘗上阿固達詩云君王莫聼捐燕議一寸山河一寸金故有敗盟之意自南使過瀘溝河即焚橋梁僕謂良嗣曰今天祚復據西京張覺據平州女真方䕶送燕京所得財貨歸國其廣邀嵗幣聲言巡邊皆所以欵懼朝廷而自防也良嗣云金人自用兵未嘗敗衂何自防之有僕曰兵家當怯守猛戰今女真兵少力分見處危道安得不自防故以巡邊意迫試朝廷之應如僕前日所論徐制女真三䇿比見形勢正當用之乞召使副或止令僕赴闕禀議欲申尚書省經撫房修寫了申狀呈童貫乞發逓貫云主上必不較些物色但得事了早班師為上後來教他别人手裏理㑹不肯發越十日逓到國書並從之六日庚寅御前金字牌逓到國書及御筆處分許代税錢一百萬貫并銀絹等令再往求西京朝廷國書云二月日大宋皇帝致書于大金皇帝闕下專使云還置郵遽逮嗣沐華緘之悉具知雅意之詳惟交隣國者當善初終而守邦圖者務敦信義既早通於契好宜曲狥于來悰所言代税物貨并事目所載色數值價交割月日處所與畫立界至遣使賀正旦生辰及置𣙜場事並如來書所諭其年前依契丹舊交銀絹已指揮宣撫司津送前去今嵗銀絹已令自京起發候到依契丹舊交月日交割誓書亦如來示候交割燕地訖諮聞本朝縁與貴朝通好天下所知前後計議每務曲從貴朝所欲以成交契誠意之厚諒能深察所有西京𬋩下州縣非務廣土以近日邊報契丹昏主數領兵馬出沒本朝當議就便計度力圖偹禦為彼此之利茂履春祺順膺介福今遣趙良嗣等自雄州復回逓中專奉書陳達不宣謹白九日癸巳趙良嗣等至大金軍前金人要取西京軍兵賞設復遣尼楚赫持書來燕雲奉使錄曰趙良嗣得御筆山後事力争如不可争别作一叚商議十一日見金主遣烏舎薩魯二人至所舘議事良嗣曰本朝皇帝大度一言許盡今平州又不肯商量唯有西京一道話了又語烏舎曰貴朝所須不貲本朝一無所吝唯西京早與庶人情無虧武仲亦曰來時主上丁寧極留意烏舎去再來云得聖㫖將西京地土與貴朝所有人户本國收係良嗣對以西京州城已䝉見許既是與了地土豈有不與人户之理如只空得田地都無人户怎生做得况兵亂之後所在殘破些少人户一道許了甚好烏舎云我國裏軍人厮殺八九年受了苦辛不少方得西京已是將西京地土與了貴朝只要人户有何不可便如西京地土兩家分割一般我亦合得一半對以兩朝既是通好如一家已許了地土乃是信義人情却不與人户寔不完全何似把人民一齊許了做箇人情也是完偹烏舎云與了地更要人户却待着箇甚麽道理如何商量大抵地土重于人民地土已許了更和人民要更别無酬答更無致謝怎生了得因約同見尼堪尼堪云西京地土亦是不少已與地土又要人民更道本國貪財莫不相應麽且如西京地土都是兩朝皇帝相重據理貴朝皇帝更添物金國皇帝道不須添物乃是好事或金國皇帝道便與西京更不要一物貴國皇帝却道須添些物乃是相順使副只言道百萬之物已多也更不添得便着多少銀絹怎生買得地土兼契丹舊銀絹也不當人情大抵契丹水土一齊都得豈有不得銀絹的道理馬擴言郎君們豈不知契丹銀絹從初厮殺了數年後因講和可纔與了三十萬後來又因河西家兵契丹説諭得教稱臣添了二十萬尼堪且笑且言貴國與契丹家厮殺多年直候敵不得方與銀絹莫且自家門如今且把這事放着一邊厮殺則箇待你敗時多與銀絹我敗時都不要一兩一疋不知何如良嗣諭以馬宣贊之意無他盖以謂本朝與契丹曽厮殺後來講和未若自家兩家本無相争便通交好萬世所無乃是好事烏舍云如此則乃是尼堪烏舎遂起引良嗣等望金主所居傳言云百寮軍人等都不肯許西京惟是皇帝要與貴朝永逺交好特與西京地土并民户更不欲逐年要物只是軍人厮殺奪西京不易請特與箇賞設數目多少又傳金主之言信誓事須要便了此所係萬年永逺須是各説得重則好又問交割期日却云為立誓書事大兼王事已定待差一箇㬠近上底官人去只候來則便交割茆齋自叙曰僕復至燕京烏舎等云皇帝甚喜大事已定止是商量交往禮數也僕竊語良嗣便可理㑹山後良嗣不欲曰此事閑慢僕曰御筆令力争奈何良嗣徐語烏舎云貴朝所須本朝一一從了却有山後西京地土人民并係舊漢地今燕京已了若將西京一同割還乃是契義烏舎云西路前在奉聖州時曽許龍圖言不要後來所以只言燕京事今更不須再言也僕曰山後故地自海上理㑹使人豈敢言不要但每言燕地則西京在中矣兼貴朝已許本朝收取今燕京既已割還西京却在西南貴朝去逺却如何占守或聞欲與别家何若并還南朝使得故地亦見交歡誠意良嗣等怒僕不合理㑹山後必至壊却山前僕答山前後相為表裏闕一則不可守兼御筆令力争豈可不盡心理㑹烏舎三日不至良嗣倉皇云某本不欲理㑹西京事公必欲為言必連山前事壊了僕曰御筆令力争安得不言良嗣曰但歸日語錄中載力争之言數段足矣僕曰臣事君以忠何可偽也良嗣曰烏舎三日不來此必生變適欲呼李靖令不議侍郎言且更請公面議之僕曰頼侍郎令呼某來若龍圖一面與李靖畫斷即他日御史臺公事有所在矣良嗣驚窘云某意甚了燕山事節吾曹成功恐因山後壊却宣賛何苦相戾僕曰不然吾曹茍能為朝廷得全燕之地盡復五關止出契丹嵗賜使國家幅員萬里因機借勢控制彊敵弭久逺表去裏单之患則粗可言功今既不得平灤營三州又失榆松亭二關毎嵗别増一百萬緡耗竭中國當自此始又復不要山後則燕人志向不一争端在即禍釁叵量尚何自謂功耶良嗣云縱使金人見許必復邀増嵗賜朝廷之力已竭如何可出僕曰龍圖邇臣也畫此利害使朝廷罷浮費不急之用以為守邊之資則有餘矣公見西邊争占形勢雖一城一堡必力戰取之繕築之功在所不計葢要塞必争之城期於必得而後已僕料金人之意西京在其西南數千里彼必不能守將必歸我姑少遲之良嗣云縱使金人見還公觀今日朝廷事勢如何守得僕曰得而棄之此在上意良嗣方憂撓間烏舎楊璞至云西京地土據諸郎君與臣下議言當初得西京時攻圍四十日軍人死傷無數不易得來不若與河西家却煞得進奉唯是皇帝言趙皇大度我要嵗添一百萬貫物色一字不違千年萬嵗却是多少今却覔西京如何違得兼我在奉聖州時心上許了不若與去共他大朝交歡也勝似與河西家謂夏國也然其間人户却待起遣將去良嗣相與辨之烏舎云此事亦得皇帝處分民土盡割還貴朝只却要些荅荷僕荅若貴朝應副西京民土朝廷豈無相謝禮數烏舎曰此中亦遣使人須當破道只得一年之數賞此軍人便是禮數了也差大使尼楚赫貝勒副使耶律松都哷等持誓書等越兩日同發至闕金人國書云使軺荐届榮訊迭承既増嵗幣之優深悉善隣之意俟成誓約永保惟和來書云所言代税物貨并事目所載色數值價交割月日處所與畫定界至遣使賀正旦生辰及置𣙜場事並如來示所諭偹詳美意外今年合交銀絹候到依契丹舊交月日特思元書理合一就重念春農搬運不易曲從來意其銀絹似前來與契丹物色一般者交送所有燕城候各立盟誓然後交割今立誓草付國信使副到請依草着誓至日當議復盟春律在中兾應多福今差貝勒尼楚赫都哷充國信使副察勒瑪充計議使有少禮物具諸别幅專奉書陳達不宣謹白事目昨者趙良嗣到上京軍前計議五代已後陷入契丹舊漢地州縣特許燕京再差馬政更議西京回書只請就便計度收復尋為不能收復致本朝收了又差良嗣等來議稱燕西京已曽計議為西京不在許限不經許與止許燕京所轄六州來書云其西京别作一段今來又令良嗣等計議西京一就收復雖貴朝不經夾攻而念兩朝通和寔同一家必務交歡篤于往日特許與西京武應朔蔚奉聖歸化儒媯等州并地土民户其以西并北一帶接連山後及州縣地土不在許與之限據所許民户地土甚多自來攻伐撫慰將帥士卒難苦不少今來無别再索經略請差人交割其諸事理已宣諭良嗣等去訖來書稱契丹出没今差人押領大軍往彼幸踏地理交割發行月日已諭使人省㑹所有盟誓候交割日議定誓草大金大聖皇帝創興併有遼國遣使計議五代已後陷入契丹燕地幸感好意特與燕京涿易檀順景薊并屬縣及所管户民縁為遼國尚為大金所有以自來交與契丹銀二十萬兩絹三十萬疋并燕京每年所出税利五六分中只算一分計錢一百萬貫文合值物色常平搬送南京界首交割色數已載前後往復議定國書兩界側近人户不得交侵盜賊逃人彼此無令停止亦不得宻切間牒誘擾邊人若盜賊迯人被并賍捉敗各依本朝法令科罪訖賍罰賊雖不獲踪跡到處便勒留償若有暴賊或因别故合舉兵衆須得關報㳂邊官司兩國疆界各令防守至如將來殊方異域使人往來無得禁阻所有久通歡好庶保萬世茍違此約天地鑒察神明速殃子孫不紹社稷傾危燕京𬋩下州縣所出物色勘會到在京三司制置司各𬋩隨院務程課錢及折算所轄人户輸納税色依約見值市價做錢共五百四十九萬二千九百六貫八百文課程錢一百二十萬八千四百十六貫税物錢四百二十八萬四千八百二十貫八百文三司計四百九十一萬三千一百二十貫文内有房錢諸雜錢一百一十五萬八千七百九十八貫文是院務課程錢𣙜永兩鹽院合煎鹽二十二萬碩合賣錢三十九萬貫文諸院務合辦賣隨色課程錢四十三萬三千二百一十二貫文三百七十五萬四千四百二十二貫是人户税租正錢制置司計五十七萬九千六百八十七貫八百文官民税錢闕二百四十八貫闕錢五十三萬闕貫八百文天輔七年二月日尼堪烏舎指示地圖自寧邊州以西横斜至西京之北徳州之南及天徳雲内州云此地分待與河西家又以西京地圖指示且言天徳雲内徳州及龍門望雲兩縣要做夏國往來道路又言將來龍平州松亭關及望雲縣歸化州要處做𣙜場良嗣遂行十一日乙未尚書左丞王安中除少保靖難軍節度使河北燕山府路宣撫使判燕山府資政殿學士詹度為燕山府安撫使侍衛親軍馬軍副都指揮使种師中充副都總管安中等至雄州大金議猶未决童貫蔡攸將交割燕山有日朝廷因委之選命諸州守臣王黼自以為功多改易縣名以張得意乃遷蔡攸少師守燕山制有之曰王師順天地之動無戰而有征幽都望雲霓之蘇克奔而弗迓降書踵至㨗奏日聞鼔貔貅百萬之威勢如破竹收山河九郡之險易若振枯悉來塗炭之傷咸襲衣冠之盛氣振鴈門之北令行沙漠之陬建社稷不朽之圖快祖宗未宣之憤寔資妙䇿迄建殊庸攸深不欲在外且力辭仍以嘔血告上令薦自代者乃舉王安中係河朔人必知北方事黼亦以安中獨相協和因用國初得蜀故事自左丞除節度使宣撫河北燕山安中之行上悉出内府之金玉器至於缾爐硯几之屬畢偹使至燕鋪陳於州寝以誇示逺人禮遇之隆一時殊絶黼獨祖道贈以詩且約歸而相之也二十八日壬子金人國信使副貝勒尼楚赫耶律都哷計議使察勒瑪持誓書草來著誓并求軍卒取西京賞賜燕雲奉使錄曰趙良嗣辭訖金主遣髙慶裔來諭以尼楚赫係是近上大臣知國事見充西路都統兼殺敗夏國到貴朝莫似尋常使人一般請便依契丹舊例相待至于商量事節便可以一面與决兼盟誓務在長久便請依草着誓又令白海上累年交好自古所無或欲做兄弟或欲做叔姪或欲為知友尼楚赫路中云此行良遽恐不得如契丹舊禮只得箇花宴甚好尼楚赫自稱都統知軍國事都哷自稱諫議三朝北盟㑹編卷十四
