body:
  text: 三朝北盟㑹編卷一百七十四宋徐夢莘撰炎興下帙起紹興七年正月十五日丁丑盡其日何謂講軍制今天下因循舊弊可革者衆矣至最甚而切于時事者軍制是也今諸州係將軍用虎符調發者樞密院之兵也不𨽻于將兵者州郡之兵也二者不為虛設獨所謂廂軍者臣不知其所謂也夫習擊刺攻騎射履行陳固兵矣擎肩輿供忮巧服厠役又兵乎今自一州守二下至宮觀里居之士皆破兵為白直冗占私役詭名重壘其弊百出皆原於廂軍大郡二三千人小郡亦不下數百人衣糧借請之費一路一嵗不知幾千萬齊民之困國用之乏此其一也臣不知廂軍自何時有之蓋自井田之制壞至隋而為府兵至唐而為衛兵至開元而為彍騎至五代而為方鎮之兵也隋唐軍制至五代而弊極五代軍制至今而弊極而廂軍者又特甚者也曰然則固可廢歟曰今侍衛步軍司所領固不可廢惟州郡在所議仍先講求除郡守兵將官自以禁軍給事外其餘合破廂軍何以代之五季之前不見其名豈今日所謂傔從者耶倘計一廂軍一嵗衣糧所廢幾何以其合破之數給三分之一以畀之使自僦人為之從官以役凡州郡倉場庫務三司之屬悉雇人以充分郡大小以制其數大抵殺廂軍三分之二然後取其所殺歲額衣糧之數盡募禁軍專習武事則名實相當而禁兵愈增國家不至用民賦以養無用之人矣曰然則安得遽廢之乎曰取其少壯願充禁軍者改刺老弱而願為民者聼從便其餘姑仍舊俟之數嵗亦無幾何人矣第勿招而已如此則人情順從公私兩濟庶乎其可行也何謂訂遣使金人自用兵以來未嘗不以和好為言且和且戰卒用此術困契丹及中國其設計反覆未可逆料至於吞并而後已此豈可以口舌得其要領也哉和好决不可恃特費我金繒欵我師旅而已然以二聖在彼有不可遂己者以為禮當然而行之可也謂其可以好和非也朝廷姑以餘力行之耳前日遣執政侍從相繼使未復命兵涉境矣此可為戒然既以餘力行之亦不可無所考據自靖康來國書往返多矣至渡江盡失之自建炎來國書或出于執政或出于翰林學士其副夲皆未嘗付有司其詞意之輕重信幣之多寡使人之官品與夫往來之語録皆不可考每欲遣使朝廷旋為措畫紛紛旬月妨費機務豈所謂以餘力行之者哉臣謂宜專命一官如古所謂行人者專掌其事或止右司領之悉裒前後行遣使人舉成法而授之可也庶免臨時斟酌之勞而朝廷得專意治兵矣何謂降敕榜古語曰明其為賊敵乃可服劉豫父子僣叛理必滅亡然猶外假兵威倔彊歲月昔漢高祖數項羽十罪唐高祖亦暴王世充之惡僞齊固不足比數然兵家有所謂伐謀伐交者臣謂宜降敕榜明著豫僣逆之罪曉諭江北士民使知天地之大不容僭逆與敵國共事者必速滅亡吾民曉然知豫之不足恃也則回心易慮者多矣或恐敕榜太重有傷國體則止命大將為檄書朝廷本頒下而用之亦何傷哉綏懷之略有五一曰通德意二曰先賑恤三曰通關津四曰選才能五曰務寬貸何謂通德意劉豫竭中國之力以奉金人暴征苛斂斯民怨恨痛入骨髓特逼於金人之勢彊服之耳登萊沂密兖山林深阻豪右大姓自金人入邉以來各聚徒黨結為山寨以自保固今雖纍年僞齊暴虐如此勢必有未下者願召募有力勇者熟于山川道路與其豪右大姓舊曽相識之人與之符信密往招誘諭以德意倘以一城一邑一寨自歸率以等第優加爵秩其有顯然立功者不次旌異得以高爵使吾民備知今日朝廷招徠之意未嘗一日而忘山東也雖未有見效他日行師入境響應者衆矣然應募之人虛實難辨今遣數十人不過損十數校尉承信之名耳俟其還報委有效驗别與任使大抵軍事尚謀賀若弼平陳七策當時以為神竒自今觀之僅若兒戲然卒用此以取陳今既與敵人爭勝負茍有可為而不甚費者皆不可巳也何謂先賑恤渡江以來中原士民流寓者數年之後各以著業不須復為經理第今日以後恐須措置前降指揮淮南避敵士民有官者使權攝無官者給糧盡一月止此深得撫循之道願倣此意别為親制應自江北歸來歸者有官人保驗無僞冒者或量給口劵或許以權攝或先次注授差遣無官而貧乏難以自存者令沿江州郡劈截寺舍官屋與之居止亦量給錢米三兩月其能自營為乃止昔東晉遺黎南渡元帝僑置兖州寄居京口明帝又置濮陽濟隂高平太山等郡後改為南兖州或還江南居盱眙或居山陽今雖不能如古僑置郡邑以處流人但使沿江州郡安集賑恤示朝廷懷撫之意亦古之遺制何謂通關津中原士民自逺而來道塗險澀盜賊剽奪饑寒奪逼艱苦萬狀能自達者無幾理當優恤願敕淮南州郡約束沿江公分人遇有來歸士民即時報所屬給以行由遇到江口官司驗行由先次差船津濟量差地分人護送不得邀阻其有因而乞覔錢物比常法外稍加重斷官員失覺察停替仍于境上出榜分明曉示庶使江北士民易于歸附無逺之慮何謂選才能前後來歸官吏衆矣朝廷嘉其忠順或賚金帛或與差遣或進官秩既以示朝廷德意之厚然未聞有所任使也古者多用敵國之人以成功袁紹謀臣許攸來奔曹操操跣而迎之曰子卿來吾事濟矣卒用其䇿以滅紹李訴得李祐不殺卒用其力擒吳元濟夫敵國之人尚待以不疑賴以成功况吾人耶臣謂官吏來歸者內有才智可用之人願隨宜任使勿但縻以爵而已又安知無許攸李祜之人耶如此非獨廣招懷之路亦收其功用之實矣何謂務寬貸陛下每有詔令必念江北赤子陷于僞齊不能自拔哀矜惻怛若疾之在己此帝王之盛德也然臣下未必能廣陛下德意而宣布之疆場之間不務招徠專務殺戮是陛下憂勤于上而德意未昭于下也昔晉羊祜與吳對壘降者不絶乃增修德信以懷初附慨然有吞吳之心有略吳二兒為俘者還送其家後二兒父率屬來降吳人皆稱為羊公而不名也後卒以滅吳然則欲攻人之國者必先有以得其民之心豈專事殺戮哉敵國且如此况吾人乎臣願敕沿淮守臣令且如此應諸將行師之境敢抗拒者固在𠞰戮其有良善老弱之人一皆寬貸俾洗然有更生之望則來歸者衆矣臣既為陛下條畫戰陳之利守備之宜措畫之方綏懷之略矣然臣區區自獻曰增修德政而已孰為德政曰事天感民任臣擇才者是也蓋德政修則前此之所陳皆可以力致德政不修雖有戰陳之利守備之宜措畫之方綏懷之略猶未能有濟也臣聞上天之於人君猶慈父之於愛子子職修則慈父之心喜君道得則上天之應順閨門整肅上下雍睦而家道興焉父子之情得也兵革衰息內外樂康而國祚興焉天人之氣應也子職未盡必嚴顔以勵之諄誨以諭之非他也親愛之而已君道未盡必埀象以示之灾祥以警之非他也亦親愛之而已教之不聽不能無放黜之子警之不悟不能無危殆之君天人之際甚可畏也人君茍能修胸中之誠以事天其應如響古之所謂反風起禾熒星退舍者豈空言以誑世哉頃年日中有黑氣又白氣貫日不旋踵而有肘腋竊發之事其後滕康上疏時無人為陛下道此者大合聖意謂有諌臣之風亟擢康為執政臣於時政記中具書其事此非陛下至誠畏天樂聞盡言以裨己闕而能之乎臣伏見今年正月朔日有食之雖非正陽之月然既月餘為變亦大正月朔古謂三朝謂歲之朝月之朝日之朝也西漢嘗有此小民正月朔尚懼毁器物何况于日虧乎其後漢以衰亂此豈可不大畏乎術家謂日食各分野五行志雖有此說然孔子書春秋日食三十六其應多在人君劉向講論之矣大抵日為衆陽之宗人君之象天意專以戒人君今僭竊名位與夫殊方異域之君亦足以應天變天意决以警陛下臣願陛下修胸中之誠以應天兢兢焉勉勉焉發一言施一事凛然若上天之照燭其上也至于避正殿舉直言求過失皆前世已行之事固不可廢茍無誠意以將之亦虛文耳傳曰不精不誠不能動人而况於動天乎人子能改過慈父必喜人君能修德天意必順此不易之理必至之符也陛下德與天合則灾變息福祥臻年榖豐登氛祲消滅何敵國之不可攘中興之不可冀乎臣伏讀親征詔曰不敢復蹈前轍以貽江浙赤子屠戮之禍臣惻然歎曰此陛下之誠心也前日避敵誠不能已然吳越之民受禍極矣今陛下神武赫怒親臨江徼號令諸將以却外侮非獨吳越之民得保室家安其生聚雖遐荒僻陋之地莫不帖然安堵若無事時感民之大孰過於此願陛下推廣此意因䇿勳之際引前日之咎告謝天地宗廟且諭之於民曰使吾赤子室廬焚蕩老弱殱夷皆朕之過也他日敵師至誓當躬率諸將併力捍禦期于保固固知陛下誠意如此庶忘前日屠戮之禍而有更生之望矣臣又聞人君之待遇臣下固自有道非獨用慶賞刑威而已或者乃以爵祿賞罰為人主之大柄臣竊陋之夫賞罰所以待中才之人非所以待豪傑之士與有道之君子也蓋希賞而赴功與畏罪而不為非者中才之人耳若夫豪傑之士與有道之君子合於義則進不合於義則退招之不來麾之不去爵祿不可得而榮也刑罰不可得而威也人君欲大有為於世而不得豪傑之士與有道之君子亦不能大有功於世也自古興王之世必有佐命之臣心德同而無間精神㑹而不疑若子房之於高祖鄧禹之於光武孔明之於先主房喬之於太宗豈待爵祿誘其前刑罰驅其後然後為之畢力哉亦誠意相與而已故可與之死可與之生可與之存可與之亡生為宗臣沒為配廟茍無誠意以相與而徒用區區爵祿刑罰以為重輕則子房孔明之徒尚安得而用之故臣願陛下待遇大臣先誠意而後名分先道德而後爵祿君臣相與歡然都俞吁咈相得于言意之表功何大而不成事何難而不濟危疑何自來讒慝何由作君臣俱享安榮則功烈高乎當年聲名流于無窮矣臣又聞人才不同所用亦異世平則用法理之士時難則用超卓之才伏見比年用人求之缺精責之大備纎痕微纍必遭指摘曩愆宿負不見洗滌至有因用而反見斥被召而不願行者此何理也古者斬裾射鉤之人猶且不廢况其為士者哉漢武帝英雄之主也詔曰馬或奔踶而致千里士或有負俗之纍而立功名泛駕之馬跅弛之士亦在御之而已魏武帝明見之君也令曰有行之士未必有能進取之士未必有行也陳平豈篤信蘇秦豈守信者耶而陳平定漢業蘇秦相齊燕士有偏短庸可廢乎由漢魏二主觀之則人君欲超卓之才以濟大功非闊略細謹不可也曩在仁祖時元昊背叛西鄙用兵范仲淹在政府收天下之士不拘其素茍可用者莫不咸任雖狂狷無行之徒亦自效于下風而仲淹亦躬為詭特之操以振起之今視仁宗時為何如而必欲求纎微于人也傳曰畏首畏尾身其餘幾士顧其身之不能恤何暇語功名之㑹哉臣曩侍帷幄屢聞聖訓叮嚀及此嘗仰聖度寬容仁偉之主也而臣下不能將明聖意迄今猶然臣願如漢魏下詔於羣臣使羣臣曉然知聖主所以用人之意不在于求全而在于赴功也安知不有竒謀異能之士自拔于流俗而出為世用者哉天意順于上民心悅于下有有道之君子以謀國體有超卓之竒才以赴事功則人君端拱無為天下治矣臣前所謂德政修則所欲無不得德政不修雖有致治之術猶未有能濟者蓋謂此也臣智識䝉陋才力綿薄頃䝉異知擢在政府勳績不效退領祠官方陛下焦勞暴露前臨大敵而臣安處家庭坐靡廩稍不能先士卒冒矢石效一旦之命臣獨何心每竊愧歎今承明詔下逮敢不竭盡惓惓之忠惟陛下矜其愚而擇其當焉臣不勝幸甚干冒旒扆無任皇懼隕越之至謹具録奏聞謹奏張參政守對伏奉詔書以却敵之功圖善後之計凡今攻戰之利守備之宜措置之方綏懷之略可悉條具來上者仰惟陛下體虞舜之逹聰成湯之好問不間遐邇務聞至言窺之德意所存則中興之功指日可俟臣雖固陋不肖病廢久衰受恩至深論報無所敢不極所聞以對然言方盈庭不敢枝辭蔓說廣援古今以煩乙夜之覽姑為論利害之實願留神裁擇議者謂金人既遁當追奔逐北恢復中原固可垂手而取也倘一戰收復而能保固其土地阜安其民人則善矣得土地而未能保固得人民而未能阜安是自困之道也明詔四事臣以為莫急於措置措置茍當則餘不足為陛下道矣措置失宜則不能守備守備不固則不能攻戰攻戰不利則不能綏懷去冬金人長驅以抵淮甸蓋以措置未能無失故也夫防江不若防淮防淮可以駐蹕建康駐蹕建康然後可以經營中原之序也臣請言措置之大略其一措置軍旅其二措置軍食何謂措置軍旅神武中軍當専衛行在而以餘軍分戍三路一軍駐于淮東一軍駐于淮西一軍駐鄂嶽荆南要害以處之使北至關輔西抵川陕血脈之相通號令相聞有唇齒輔車之勢則自江而南可以奠枕而卧也然今之大將皆握重兵貴極富溢前無祿利之望退無誅罰之憂故朝廷之勢日削兵將之權日重而又為大將者萬一有稱病而賜罷或卒然不諱則所統之衆將安屬耶臣謂宜拔擢麾下之將使為統制每將不過五千人棊布三路朝廷號令徑達其軍分合使令悉由於朝廷之權用以之然後可以有為也何謂措置軍食諸軍既已分屯諸路則所患者財榖也然所費多寡在彼猶在此爾則所患者轉輸也祖宗以來每嵗正供六百餘萬悉出于東南轉輸未嘗以為病也今宜以兩浙之粟以餉淮東江西之粟以餉淮西荆湖之粟以餉鄂嶽荆南量所用之數責漕臣輸將而歸其餘于行在錢帛亦然恐未至于不足也然自艱難以來漕運之船諸官司私自占留私自賣販州縣掣造尋又奪之故每以乏船為患而漕運不能辦也宜下諸軍根刷見在之船悉歸漕司仍諸路各造一二百舟各專充轉餉如有官司或諸軍拘留則漕司諸州縣聞諸廟廷而痛懲之諸錢糧既無乏絶之患然後特降詔書戒飭各將申嚴紀律不得秋毫侵擾于州縣以復業之民户口多寡為諸將殿最嵗遣核實而升黜之則民得以還其鄉里而田野自闢生齒自滋江北州縣有興復之漸矣如是措置更定候正防秋復遣大臣為之都督使諸路之兵進相援退相保如常山蛇首尾相應居則可以守備進則可以攻戰可以傳檄而定僞齊可以示威而綏邉陲可以保其土地而阜安其民人綏懷之略亦在是矣然臣復有區區之愚誠敢因清問之及而冒貢一二敵人之輕中國尚矣去秋之來妄意車駕逺避則大擾江浙如曩嵗之意也今既挫辱悵然而歸後必不敢輕入使其復來計須悉兵舉國以取必勝是宜陛下留神于攻戰之策也如前所陳措置大略臣熟計之猶為未也究其本原則在陛下內修德而外修政昔召公之告武王曰明王慎德四方咸賓惟德修可以服逺人也周詩之美宣王曰內修政事外柔逺人此皆書生常談初無驚人可喜之論然簡約易行悠久見效則未有二端之為要也蓋所謂德改過正心誠意畏天愛民儉于家勤于邦逺聲色屏貨利兢兢業業凡可以纍德者無不戒也持久不倦盛德日新四海愛戴而不忍去何患逺人之不服乎所謂修政不過任賢使能信賞必罰任賢者非止崇以爵位茍知其賢則一切信任而不復致疑使能者不必信任茍有一能則隨其才分而俾盡效其力信賞以勸有功不以所喜而豫之必罰以致有罪不以所惡而奪之抑權幸裁冗濫謹法度興亷恥凡可以害治者無不去也正朝廷以正四方何患中外之不治乎伏願陛下果斷而力行之臣言不足以稱塞明詔伏俯以俟誅殛顔黃門岐對臣岐二月二日巳時急遞到福清縣正月十五日賜敕一道臣謹拜跪而受臣仰荷聖德不忘下問臣不勝愧懼之至臣竊觀聖語有敵勢既屈又為善後之計可謂委曲預備矣如攻戰之利守備之宜措置之方綏懷之略臣今竭愚條具在前件四事者臣謹按攻戰之利在擇賢將守備之宜在明賞罰措置得其方則在號令不妄動綏懷得其略則在軍民各安業也聖問曰攻戰之利臣謂在擇賢將者去年九月敵之遽來未知其衆來者厚薄皇帝陛下親總六師按甲江上可謂决于聖斷矣或將或帥皆奉命往前旋以捷音每日至而敵且遁去臣望陛下而今後益擇賢將使之分兵而任專如此則盡善矣聖問曰守備之宜臣謂在賞罰者沿邉臣僚見今盜賊既無疆界頗净我之戰士有才有勇皆無所施雖遇遷轉而自無礙將帥臣亦安閒自樂臣謂自今朝綱更宜賞罰激其衆心俾肯振職則守備諸事皆不足慮也聖問曰措置之方臣謂在號令不妄動者衆口之家或逺或近皆欲安逸若統其軍者措置不當則人皆怨咨嗟其不得所以故措置正賴號令分明可賞可罰如小隊大旅昔日所被其禍甚多臣更願陛下明降指揮自將帥而下至隊伍長皆得措置之不妄興舉則軍衆之心皆欣快聖問曰綏懷之略臣謂在軍民各安業者軍伍之情一等則軍民皆欲安净也其間不幸身屬敵中敵衆奔波則逐之不及既來歸我朝則雖當臣僚議論不同臣願陛下將此曹一例收之或亦如舊分于各寨使各安業如此則綏懷兩便也陛下自臨安親征至于平江又聞聖意欲至鎮江建康百姓求安營生相隨不舍臣願戒約所在州縣而不擾之使有生理此乃臣之所見也前件四事臣自謂可行雖愚甚止如此臣冒聞聖覽有虛己擇善之語臣亦不揆輒明奏無隱望陛下更矜念之臣在昔曽觀宋庠所贊尊號録其言曰損之又損天下歸仁臣意欲今因事為陛下暫改之曰忍之又忍天下歸仁臣望陛下不以臣愚戅率爾之言以助聖德萬分之一則實宗社無疆之慶也三朝北盟會編卷一百七十四
