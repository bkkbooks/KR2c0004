body:
  text: 三朝北盟會編卷一宋徐夢莘撰政宣上帙起政和七年七月四日庚寅盡政和八年四月二十七日己卯政和七年秋七月四日庚寅登州守臣王師中奏有遼人薊州漢兒髙藥師僧即榮等以舟浮海至文登岸詔師中募人同往探問以聞先是政和元年朝廷差童貫副鄭允中奉使遼人有馬植者潛見童貫于路植燕京霍隂人涉獵書傳有口才能文辭長於智數見契丹為女真侵伐邊害益深盜賊蜂起知契丹必亡隂謀歸漢説貫以邊事是時童貫奉密旨使覘其國於是約其來歸植數上書奏上喜賜姓李名良嗣蔡京童貫力主之以圖取燕時薛嗣昌和詵侯益揣知朝廷有意幽薊並迎合附會倡為北事和詵知雄州以厚賂結納朔方豪雋士多歸之以收燕山圖來上又中山守張杲髙陽關安撫吳玠亦獻議燕雲可取河東經略薛嗣昌得河朔諜人之辭往往潤色以希禁密意每陛對論及北事輒請興師嗣昌又委代州安撫王機探伺遼人之隙陳攻取之䇿時武應等州屢來投附機悉接納又有王師中全家來欣代上詔令師中知登州以伺其事然未有以發會是年登州奏有遼人船二隻為風漂達我駝基島乃髙藥師曹孝才及僧即榮率其親屬老幼二百人因避亂欲之髙麗為風漂至州具言遼人以渤海變亂因為女真侵伐女真軍馬與遼人爭戰纍年爭奪地土已過遼河之西今海岸以北自薊復至興瀋同咸州悉屬女真矣登州守王師中具以奏聞上命中使押詣蔡京第令童貫僉議京貫因同具奏國初時女真常奉貢而太宗皇帝屢市馬女真其後始絶今不若降詔遵故事以市馬為名令人訪其事體虛實如何上可之詔登州守臣王師中募人同髙藥師等賫市馬詔泛海以往探問其後通好女真議兵相應夾攻滅遼國家禍變自是而始蔡絛北征紀實曰政和元年童貫副鄭允中奉使北庭其遼主天祚欲與童貫一相見因使貫覘其國北討之意已形於此而中外未知也然其時天祚方肆縱欲見貫者但希中國玉帛奇玩而已而中國寖侈亦自是而始故貫所齎奇腆至運二浙髹藤之具火閣書匱牀椅之屬悉往以遺之相誇尚而已貫回其所得珍玩亦甚厚允中以尚書為奉使而貫以節度使為之副皆非故事也至二年有燕人馬植來歸上遣承受童師敏賫御筆但書馬植二字傳旨詢問可約否然馬植者已自藏于童貫家矣植後賜姓李名之曰良嗣俄又賜姓趙纍遷至修撰遼人以為言中國但謂無有然遼時已昏亂雖來索亦不急也故良嗣得以安良嗣又時時論遼人事宜以動朝廷且謂天祚者乃是弒其祖老國主而自立言多捭闔童貫遂繇登州海道使之以使女真天下之釁自此始焉封有功編年曰政和五年嵗次乙未春三月辛未朔二日壬申大遼李良嗣密遣人來雄州投蠟彈云天慶五年三月四日遼國光祿卿李良嗣謹對天日齋沐裁書拜上安撫大學足下良嗣族本漢人素居燕京霍隂自逺祖以來悉登仕路雖食祿北朝不絶如線然未嘗少忘堯風欲投中國而莫遂其志比者國君嗣位以來排斥忠良引用羣小女真侵凌官兵奔北盜賊蜂起攻陷州縣邊報日聞民罹塗炭宗社傾危指日可待邇又天祚下詔親征女真軍民聞之無不惶駭揣其軍情無有鬭志良嗣雖愚戅無知度其事勢遼國必亡良嗣日夜籌思偷生無地因省易繫有云見機而作不俟終日語不云乎危邦不入亂邦不居良嗣久服先王之教敢佩斯言欲舉家貪生南歸聖域得上先人丘墓以酬素志伏望察良嗣忱誠不妄憫恤轍魚代奏朝廷速俾向化儻蒙密旨允其愚懇預叱會期伏俯前去不勝萬幸和詵具其事聞奏上令太師蔡京太尉童貫共議可否十日庚申京與貫奏云自古招徠國之盛德又况遼國用兵軍民不附良嗣歸明故當收留乞敇和詵密諭其來使宜暫令良嗣回期以四月一日夜入境夏四月庚子朔良嗣等夜分越界河初九日戊申良嗣入雄州庭謁詵詵使人掖上廳各具禮贐是日詵奏朝廷有旨令良嗣赴闕十八日丁巳良嗣見于延慶殿上親臨軒慰勞禮異上問所來之因即奏上臣國主天祚皇帝耽酒嗜音禽色俱荒斥逐忠良任用羣小逺近生靈悉被苛政比年以來有女真阿固達者知天祚失德用兵纍年攻陷州縣加之潰卒尋為內患萬民罹苦遼國必亡願陛下念舊民遭塗炭之苦復中國往昔之疆代天譴責以順伐逆王師一出必壺漿來迎願陛下速行薄伐脫或後時恐為女真得志蓋先動則制人後動則制于人上嘉納之遂賜姓趙授朝請大夫祕閣待詔又曰朝廷既有意于燕雲而蔡京為國興利以備兵興支用仍行香茶鹽礬等法令州縣立遞年租額以最殿考其賞罰守令奉行罔敢少怠又有和糴均糴對糴銜糴以備軍食纍年于兹民力遂耗所甚者商人賣法重獲厚利朝廷糴本元降州縣輸納者實未嘗得悉為官吏所有天下多故京啓之也八月三日戊午登州守王師中既被詔乃選擇將吏得七人各借進武校尉差平海軍指揮兵船同髙藥師等行二十二日辛丑髙藥師等下船往女真至彼境北岸相望女真巡海人兵多船不敢近幾為邏者所害遂復回政和八年正月三日丙戌髙藥師回至青州髙藥師至青州還奏謂雖已到彼蘇州界望見岸上女真兵甲多不敢近而回守臣崔直躬奏其事於是上為赫怒專下宣撫司委童貫措置應元募借官過海人并將校一行并編配逺惡委王師中選有智勇能吏再與藥師過海體問事宜通耗女真軍前講買馬舊好降御筆通好女真事監司帥臣並不許干預如違並以違御筆論四月二十七日己卯遣武義大夫馬政及平海軍卒呼延慶同髙藥師等過海至女真軍前議事童貫與王師中選馬政可委呼延慶善外國語又辨博同將校七人兵級八十人同髙藥師去女真軍前太宰鄭居中奏乞守盟誓罷遣女真人使時太宰鄭居中奏乞罷使女真之人又於朝堂責蔡京曰朝廷欲使人女真軍前議事夾攻大遼出自李良嗣欲快己意公為首台國之元老不守兩國盟約輒造事端誠非廟算且在昔章聖皇帝與大遼昭聖立誓至今幾二百年兵不識刃農不加役雖漢唐和戎未有我宋之䇿也公何以遂興此舉且兵者不祥之器勢不獲已即可暫用昔景德中遼人舉國來侵真宗用宰相冦凖之策親征後遣使議和自此守約不復入邊者三十九年及慶厯中契丹聚兵境上以求關南地為名仁宗用富弼報聘增幣觀真宗仁宗意不欲動兵恐害生靈堅守誓約至今一百七十年四方無虞今若導主上棄約復燕恐天怒人怨切在熟慮無貽後悔事繫宗廟豈可輕議又况用兵之道勝負不常茍或得勝則府庫乏於犒賞編户困于供役蠧國害民莫過此也脫或不勝則患害不測京曰上厭幣五十萬匹兩故有此意居中曰嵗幣五十萬匹兩比之漢世和單于嵗尚給一億九十萬西域七千四百八十萬則視今與之幣未為失䇿又漢永初中諸羌反十四年當時用兵用財二百四十億永和後復經七年用八十萬億且前古之主豈忍以中國之富填于盧山之壑委于狼望之北哉蓋聖人重惜生民之本也載在史䇿非妄言也京曰上意已決豈可沮乎居中曰使百萬生民肝腦塗地公實使之未知公異曰如何也遂作色而起知樞密院事鄧洵武上書乞守信罷兵保境息民鄧洵武家傳曰時上意感動欲興師蔡京謀起燕兵洵武屢折之而蔡京密啓於上不令洵武預議洵武乃約童貫到樞密院具以利害曉之貫反説洵武曰樞密在上前且承當取商量也商量得十來年裏不要相拗官家上方有意相公如此説話恐為他人所奪語已而笑洵武知京貫之意遂為問目力陳宗社大計請以上意令京條對又上奏曰雍熙中嘗有此舉是時曹彬出河北潘美出河東趙普在南陽聞之上疏切諫彬美卒無功而還因出趙王疏本與曹潘傳進讀曰陛下審視今日謀議之臣孰如趙普將帥之良孰如彬美甲兵精練孰如國初以太宗之神武趙普之謀略彬美之為將百戰百勝征伐四克而獨于燕雲乃爾况在今日何可輕議且百年盟誓一朝棄之何以令吾民告敵國乎誠恐兵革一動中國昆蟲草木皆不得而休息矣上大悟翌日語京曰北事難做則休祖宗盟誓違之不祥京色變其議遂寢契丹既衰宰相王黼復為兼弱攻昧之言以動上心洵武復從容為上言曰自西方用兵禁旅減耗近差郊祀立仗人不能足數使天下常如今日治安固無可言設有風塵之警可為寒心上為之動容因勸上宜保境息民謹備自治無啓邊釁王黼言當兼弱攻昧臣獨謂不若推亡固存也方今非獨兵勢如此而又財用匱乏民力雕弊人皆知之無敢言者臣令取諸路廉訪使者所奏去年兵食實數作榜通册願陛下置之御坐時賜御覽則天下虛實可知且與強女真為鄰孰若與弱契丹乎議復止樞密之孫鄧椿跋曰右先樞密諫發燕雲事勾龍中丞如淵雖書之恐未信于後世又嘗求汪公應辰跋其尾汪公曰此段已編入徽考刪定實録中矣馮少卿方手録于家後求其真迹藏于九襲以示子孫先樞密掌兵西府不幸宰相闕深引太宗趙普曹彬潘美龜鑑有死不從公歿黼始遂前議云某即公黼即王黼前議即兼弱攻昧之説談經之誤以致敗國事塗炭生靈逮今蹂躪河洛者幾五十許年則兼弱攻昧之説勝也悲夫朱勝非秀水間居録曰政和末知雄州和詵奏契丹益發燕雲之兵燕雲亦叛有董龎兒者率衆為劇冦契丹不能制蔡京時領三省事僥幸一切之功遂招龎兒許以燕地王之龎兒上表自號扶宋破敵大將軍董才後歸朝賜姓名趙詡者是也乞遣兵為援期取中國故地京大喜乃更戍朔方陜右之兵命江外州軍製袍帶欲以冠帶新民鄧洵武子常知樞密院為京言南北通好久矣今信一叛人之言而欲敗百年之盟不可京不聽是時童貫以太師樞密院總邊事洵武又為貫言西北敵勢強弱不同度我之力能制彼乎恐兵連禍結卒無已時貫亦不聽洵武乃疏伐燕利害二十七條名曰北伐問目皆有注其一云出師之名注云恃此盟誓百年不見兵革絶之必有名以令吾民以告敵國餘類此又録趙普諫太宗北征疏同奏上皇頗嘉納此議為之緩至宣和初竟出師矣董才者易州潦水人少貧賤沉雄果敢號董龎兒募鄉兵戰金人敗績主將欲斬之才亡命山谷遂為盜剽掠州縣衆至千人契丹患其殘賊才踰飛狐靈丘入雲應武朔斬牛欄監軍函其首來獻政和七年知岢嵐軍解潛招之并其黨以聞其表有云受之則全君臣之大義不受則生秦越之異心上召見董才陳契丹可取之狀甚切賜姓趙名詡趙普諫伐燕疏并劄子附于此疏曰武勝軍節度使臣趙普右臣自二月中伏覩忽降使臣差般糧草及詳敕命知取幽州既奉指揮尋行科配非時舉動莫測因由邇後雖聽捷音未聞成事稍稽尅復俄及炎蒸飛芻挽粟以猶繁擐甲持戈而未已民疲師老將恐有之臣自此月以來轉增疑慮潛思陛下萬機在念百姓為心聖略神功舉無遺算至于平收浙右力取河東乘後代之英奇雪前朝之憤氣四海咸歸于掌握十年時致于雍熙唯彼契丹豈為敵對遷徙無常自古難得制之前代聖帝明王無不置于度外任其隨逐水草皆以法羈縻之此際官家何須挂意必是有人扶同諂佞誑惑聰明因舉不急之兵稍涉無名之議非論曲直且覺淹延將成六月之征頗有千金之費以兹忖度深抱憂虞切念臣雖寡智謀粗親墳典千古興亡之理得自簡編百王善惡之徴聞于經史其間禍淫福善莫不如影隨形煥若丹青明如日月嘗為大訓歷代寶之臣讀史記見漢武時主父偃徐樂嚴安輩所上長書及唐元宗時宰相姚元崇直奏十事可以坐銷患害立致升平惟慮至尊未能留意醫時救弊無出于斯又聞前事為後事之師古人是今人之則據其年代雖即不同量彼是非必然無異輒思抄録專具進呈伏望聖慈特垂披覽謹列逐件如後云云伏念臣謬以庸材叨居顯位幸逢千年之運深承二聖之知從白屋而上丹霄非由智略出卑僚而登極位只是遭逢恩私何啻于轍魚報效不如于犬馬粗懷性識常積驚惶所恨者齒髮衰殘精神減耗既不能獻謀闕下又不能效命軍前惟有微誠書章上奏今者伏自朝廷大興禁旅逺事征伐驅百萬户之生靈咸當輦運致數十州之地土半失耕桑則何異為鼷鼠而發機將明珠而彈雀所得者少所失者多只於得少之中猶難入手更向失多之外别有關心前未見于便宜可垂興于詳酌臣又聞聖人不凝滯于物見可而進知難而退理貴變通情無拘執故前聖謂事苦則慮易兵久則變生臣之愚誠深懼于此秦始皇之拒諫終纍子孫漢武帝之回心轉延宗社如忽遲晚恐失機宜而况旬朔之間便為七月竊慮內地先困邊庭荒涼北地則弓硬馬肥轉難擒制中國則民疲師老應誤指呼臣今獨興沮衆之言深負彌天之過輒陳狂瞽抑有其由竊以暮景殘光能餘幾日酬恩報義正在今時恐勞宵旰之憂寧避僭踰之罪慮希聖聽早議抽軍聊為一縱之謀别有萬全之䇿伏望皇帝陛下安和寢膳惠飬疲羸長令外户不扃永使邊烽罷警自然殊方慕化率土歸仁暨四國以來王料契丹而安往又何必勞民動衆賣犢買刀有道之事易行無為之功最大如斯弔伐是謂萬全臣又竊料陛下非久興兵恐因偏聽其奈人多獻佞事欠防微大凡小輩各務身謀誰思國計或承宣問皆不直言盡解欺君弗憂敗事得之則姦邪獲利失之則社稷懷憂昨者直取幽州未審孰為謀者必無成算俱是誑言其于虛實之間此際總應彰露臣既不知頭主無以指射姓名伏望官家尋其尤者特正姦人之罪免傷聖主之明所貴詐偽悛心忠臣盡力共畏三千之法同堅八百之基臣於此時欲吐肺肝先寒毛髮驚疑猶豫數日沉思又念往哲臨終尚能尸諫微臣未死惡忍面諛明知逆耳之言不是全身之計但緣恩同卵翼命直鴻毛將酬國士之知豈比衆人之報投荒棄市甘當此日之誅竊祿偷安不造來生之業惟祈聖明特賜察量更有細微别具劄子冒犯冕旒臣無任傾心瀝懇憂國忘家涕泗旁惶激切屏營之至劄子曰臣濫守藩方聊知稼穡見當州管界承前多是荒涼户小民貧程遙路僻量其境土五縣中四縣居山驗彼人家三分內二分是客昨來差配甚覺艱辛伏緣在此直至莫州往來四千餘里或是無丁有稅須至雇人般糧每斗雇召之資賤者不下五百元配二萬石數約破十萬貫錢且如本户自行費用無多所校乃是二萬家之貧户出此十萬貫之見錢所以典業賣牛十聞六七其間兼有鬻男女者亦有棄性命者仍加善誘偶副嚴期自從起發去來已及八十餘日近知內有人户裏私劫鄉村皆云裝起軍糧未有送納去處原無口食在取盤纒雖不辨其虛真又難行于審覆訪聞街坊竊議前後説得多般稱被契丹圍却軍都兼被劫糧草及令尋看皆却隱藏蓋緣臣無以知軍前事宜祗聽得外面消息况九重密事不應泄于朝廷奈百姓流言已相傳于道路詳其住滯必有艱難伏乞聖慈早令停罷更或遲久轉費糧儲潛思今日人情不可再行差配如或再有徭役決定廣有逃移假令收下幽州邊境轉度干戈未息忽然生事未見理長必因有僭濫之徒姦邪之黨但説契丹時逢幼主地有災星以此為詞曲中聖旨不審戒情上下幽州俱此生涯土宿照臨闕外可以征討若彼能同衆意縱惡主亦難輕不順羣情無災星而亦敗誠宜守道事貴無私如樂禍以求功竊得之而不武此蓋兩省少昌言之士靈臺無有藝之人而况補缺拾遺合專思于規諫天文厯算須預定于吉凶成兹誤失之尤各負疏遺之罪若無愆責何戒後來邵伯溫曰崇寧中居洛因過仁王僧舍得葉子册故書一篇乃趙中令諫太宗皇帝伐燕疏并劄子其疏與國史所載大略相似有不同者劄子則惟見于此太宗晚喜佛中令因其所喜以諫云伯溫竊聞太祖一日以幽燕圖示中令問所以取幽燕之䇿中令曰縱可取孰可守太祖不語久之曰卿可謂逺慮矣太祖自此絶口不言伐燕至太宗因平河東乘勝欲搗燕薊時中令鎮鄧州故有是奏太宗下詔褒其言嗚呼中令從祖宗定太平尚以取幽燕為難近時小人竊大臣之位者乃建議結金人滅大遼取幽薊卒致天下之亂悲夫三朝北盟會編卷一
