body:
  text: 三朝北盟會編卷二百四十一宋徐夢莘撰炎興下帙起紹興三十一年十一月二十八日丙申盡其日二十八日丙申金國完顔亮被弒于揚州殂遺史曰金國主亮駐于揚州之東南督諸萬户渡江甚急限來日不渡盡行誅斬萬户皆懼之是時葛王已即位于國中改大定元年有傳録其赦書至軍中者萬户等以大江不可渡斬戮不免遂各懷異心有弒其主歸葛王意亮有親兵皆心腹人以紫茸穿甲謂之紫茸軍又謂之細軍素號精勇諸萬户請于亮曰紫茸軍逺行數千里未有以犒之可令請取泰州犒其軍亮然之遂發紫茸軍取泰州諸萬户無所畏丙申夜持徑弓突入帳下衛者止之則曰有急事聞奏亮聞喧欲披衣出則矢已及左右矣亂矢齊發亮斃于帳中於是喧囂不止梁尚書者聞亂即馳入呼諸萬户曰事已如此固無可奈何然方與敵國相持不知諸君何以善其後衆皆不言梁尚書曰當撫定諸軍勿使囂亂徐思計䇿可也衆稍定梁尚書遂取紙草牒云大金國牒大宋國三省樞密院國朝太祖皇帝創業開基奄有天下迄今四十餘年其間講信修睦兵革寢息百姓安業不意正隆失德師出無名使兩國生靈皆塗炭奉新天子明詔已行廢殂大臣將帥方議班師赴闕各以戢兵以敦舊好須至移牒牒具如前事須牒大字三省樞密院照驗大㝎元年十一月三十日牒銀青光祿大夫右領兵都監開國公富察龍虎衛大將軍右領軍都監圗克坦右領軍監軍初瓜洲之役軍中散人張真被虜亮壻駙馬都尉見而留之駙馬管黃頭女真三萬人亮聞葛王已定己未命駙馬以本部兵歸丙申兵變駙馬兵既行溫都者覔張真而得之梁尚書既作牒未有人傳行乃以張真賫牒戊戍發十二月己亥渡江是時江南但不見金人飲馬于江濱方疑之會張真到方知亮被弒敵騎已有回者有虢州僉軍雷正者先自間道來歸説亮被弒初猶未信得梁尚書牒乃賞正以官朝公忞敗盟記曰二十七日金之諸帥集衆兵帳中相與謀曰南軍如此豈宜輕舉前有大江之險車船之敵有糧運之阻敲殺之憂祗送死耳顔亮凶悖我輩若無船渡江必殺我等奈何內一萬户曰等死求生可乎衆皆曰願聞教令得生則可有萬戶戴總管李總管者諸帥之豪起前密諭諸帥曰殺郎主却與南宋通和歸鄉則生衆口一辭曰諾不食頃諸帥統集甲兵萬餘人控弦持滿呼喚直入逆亮寢帳把門細軍問為誰曰我等欲至帳前有公事理會細軍縱入諸帥引弓射帳中亮左右護駕親信兵衛識其難作擐甲上馬各帶奴婢出營脫身北走而亮覺變索弓箭仗劍顧視左右無一人矣乃獨身倉卒引弓欲射曰南家人我家人今日殺我赦我在汝等囚我可也無取弒君之名諸帥不應連射帳中矢下如雨亮即死于揚州并殺妃三人太傅一人左右親信謀事者數十人或云金亮有妹夫者見變作先剸刃于逆亮腹以脫已禍既而亦不免于死為亂軍所害先是金亮有親軍女真三萬矛楯戈戟器械精純盡用紫茸縧穿聨鐵甲號紫茸軍其次用黃茸號黃茸軍其次用青茸號青茸軍紫青黃三軍一名細軍又名護駕軍専一簇御宿衛雖有大敵悉不遣行初諸帥欲弒金亮也而細軍擁衛嚴密不可得近因謂細軍等曰淮東子女玉帛盡皆逃避在泰州城域我輩急欲過江無由得往泰州取富貴爾等何不請郎主乞破泰州而取之細軍欣然而請金亮從之細軍去者三萬人一鼓大破泰州子女玉帛無遺泰州統制官王綱棄城走江隂二十八日破泰州而金亮被弒乃二十七日也二十八日將官景世雄以二十五騎迎見金人李千户約有三十騎擁過瓜洲被虜散人張真并虢州僉軍雷正渡江歸順報金主已被弒訖神麓記曰亮初謀南侵也用梁恪王光道馬欽郭安國等為主盡刷在國畨漢軍五十餘萬分五路經河中府渡大慶關入陜西經孟津渡者為御營中軍亮統至汝洛經河北西路衛州張家渡者往漢上經浚州通利軍渡者前來徐經宿河間以東過山東入膠西者皆大漢軍使喀齊喀貝勒總畨軍往熙河德順欲先平巴蜀任宣徽使劉蕚統大軍十餘萬至光化扼其江陵差髙景山統大漢軍至膠西登戰船陳兵于海亮自提大兵直至淮揚要一舉而下先以采江南渡定要瓜洲如違制來日皆從軍法衆軍恐懼唯以待死計無所出勸農使契丹阿里等謀十一月二十六日夜分以御營諸軍弓弩持滿向喧譁聲近御帳亮驚問莫非南軍至乎王光道秉燭引亮出帳來未即言間衆謂曰君一人南朝無罪背約犯邉生造釁端不容諫諍惡逆不道神人共怒豈能脫乎亮見不免謂曰汝等殺我順南乎歸國乎厲言歸國衆箭皆發射死焚其尸時年四十王光道梁恪馬欽郭安國等皆遇害就遣馹使走至汴殺皇后圗克坦氏太子光英其惠妃德妃昭容婉容昭儀淑儀十六位御嬪皆放歸宗亮簡宗廟廢祭祀棄法律逐功臣治宫室飾臺榭內淫亂犯親戚輕百姓好攻戰侵邉境虐生靈是致如此諡法違天虐物曰焬遂諡海陵煬王后曰幽皇后息曰殤太子虞尚書采石斃亮記曰紹興三十一年完顔亮渝盟犯寨進兵江淮遣諸將帥分道入兵一軍遵江道以趨兩浙一軍出宿亳以蹂淮西一軍厯唐鄧以瞰荆襄一軍據秦鳯以伺梁蜀朝廷命諸將分屯捍禦吳璘駐興州姚中駐漢中王彥駐安康吳拱駐襄陽李道駐江陵田師中駐武昌戚方駐尋陽李顯忠駐池陽王權駐建康劉錡駐鎮江成閔駐晉陽李寶守海道秋九月亮親以兵十萬號四十萬直趨江南為必渡之舉時劉錡為淮南浙西江東西路制置京畿淮北京東路河北東路招討使分命諸帥捍禦十月乙卯金兵自安豐過淮西丙辰直侵盧州拓臯下塞戊午遣樞密葉義問督視荆襄江淮軍馬中書舍人虞允文參謀軍事洪邁洪方並充行府幕屬己未金兵攻滁州先是劉錡遣王權將兵渡淮迎敵權逗遛不進至歷陽修築城壘為自安計錡再檄權住夀春權以威脅總曹固請于朝乞留權守和州錡復督行權不得已三日發一軍凡二十三日僅發去八軍止于廬州戍守故金人至淮得以繫橋從容而進如入無人之境權旋棄廬州回屯昭關將士皆請戰權乃領親兵先遁麾衆使退敵騎至尉子橋權始遣姚興二軍迎敵興戮力死戰數告急于權權飲宴于仙宗山上以羣刀斧自衛殊無援興意興勢雖卻殺敵數百人擒渠卒而回會敵假立權幟以誤興興奔入而遂與其徒俱陷權猶走旗報捷冀以欺罔自解自是不復更與敵接徑回和州州城新築而所儲資糧可為數月計權至不住守乃紿衆曰已得旨令棄城守江庚申權登車船上遂自焚和州西門先往采石辛酉金兵陷和州城中棄糧儲器械輜重盡委于金兵乘亂奔突軍民自相蹂踐擁入城河與江爭渡溺死者什三將士憤怒號呼指船詆罵皆以權不戰誤國為言潰兵抱蘆葦浮江而過者散而之他甲子權宵遁自采石歸建康是日錡小捷于揚州之西南錡以王權失淮西則淮東孤軍恐不能守越翼日乙丑遂棄揚州退保鎮江留一千五百人塞瓜洲渡亮兵進迫大江刻十一月初七日渡采石瀕江居民驚震竄伏吏士無人色朝廷以諸將逗遛失律召成閔代劉錡趣王權赴都堂議事先遣舍人虞公往池州趣李顯忠交王權軍事虞公陛辭上曰朕固知和議不足恃二十餘年官錢物不敢輕用毫積寸纍內藏支付九百萬矣卿須錢帛奏來朕所不禁第患事不立耳虞公退急裝趨鎮江時劉錡已臥病虞公見之因咨以今日事勢劉大言曰兵凶器戰危事聖人不得已方用之虞公曰今逆亮違天背盟席捲淮東西窺江南我有心腹之憂今日用兵猶為得已乎錡又曰錡直不愛朝廷官職將歸制置招討印耳虞公笑曰公言大是髙節但今國事如此上自王權之敗不遑九重將以馬上從事此豈將軍上印綬時耶劉語塞時建康已告急虞公倍道趨建康是日我師敗績于瓜洲虞公往采石道遇王權敗兵各鳥獸散公即訊之皆曰我輩昨隨王權只聞金聲不曾聞鼓聲蓋權未嘗與敵交戰惟是走耳去采石尚二十里北兵鼓聲動地從者止公曰事已至此舍人欲何之虞公不聼亟索馬行暨至采石望北岸敵硬寨連亘數十里我軍星散亡紀律虞公易服行造其間會見一二統制官虞公勞之因問王權罷兵之由皆曰權驕惰不恤士卒非敵之善勝權只有走耳我輩未嘗見戰虞公曰今可戰乎衆皆笑指北岸曰彼勢如此誰能以身犯必死乎虞公徐曉之曰敵萬一過江而我輩措足無所雖走亦何之今走亦死戰亦死等死不如一戰冒萬死求一生轉禍為福因敗成功在此一舉矧又朝廷衣食汝輩二十餘年緩急乃不能一戰以報國衆皆曰今雖欲戰奈無主其事者何虞公見其可動唱言汝輩止緣王權繆妄致此今朝廷已别選交王權軍矣衆愕立曰誰可將者虞公諭之曰朝廷差我到池州取李顯忠交此軍事顯忠如何衆答辭曰得人矣虞公曰敵謀來日過江勢已迫請諸公當力戰官家已發內藏庫錢帛并節度承宣使已次官告在此賞賚有功者衆皆曰誠然我輩效命諸統制趨出轉相告語須臾合軍皆奮臂爭死敵虞公即與勾集戰艦簡水軍餘人連小舟護岸以戈船車當前終夜整簇十一月乙亥敵築壇于采石西岸上亮登壇殺牛羊豕黑白馬各一祭天禱江乞風以濟丙子壇上見黃繡旗各二亮擐金甲坐壇上麾紅旗以發戰艦凡五百餘艘緣岸鐵騎周匝三四十里間敵軍大呼我軍辟易會北風急敵船如劈箭有數十艘即薄南岸公見統制盛新撫其背曰昨與爾議破敵為期今乃不用命乎盛回顧曰舍人在此即麾軍鏖戰士氣百倍無不一當十金兵大敗戈船前斷逼岸餘衆悉拜降先敵恃其衆欲徑跨江而渡故所用皆是小舟一舟濟數百人其指可掬而官軍所操皆艨衝巨艦士卒用命遇敵船即撞劈中拆全沉沒敵既退衄公撫勞將士具捷因騎置以聞諸統領官環坐見樞府人吏趨走虞公之前唯謹私怪之間起問吏舍人何官職吏對此中書舍人朝廷侍從官也統領官爭列庭下拜曰初為舍人閣門宣贊等官豈有文官能馳騎行陳間乎虞公起執其手曰諸公何言方與諸公共安危同死生期於破敵以報國家遂相與誓曰敵雖敗北然恃衆明日必復來乃遣士卒夜渡江約近北岸敵前所不及處維舟為陳會盟畢金兵再入濟江而其意已詘然猶自張不已官軍直突北岸奪其渡以神臂尅敵弓射之敵皆徒步登岸棄船而焚之官軍縱火爇為灰燼敵衆披靡亮揮軍下壇初亮使偽參知政事李通跪壇上口占檄文招王權戊寅顯忠至遣硬探騎過知金兵已走揚州與瓜洲渡兵合矣虞公謂李侯曰敵懲采石之敗空壘往合瓜洲兵鎮江無備我當往第恐兵少今來采石愈益塹築堤或伐木為柵守禦甚固敵未可卒犯鎮江邉岸分屯備禦甚多采石要害僅數處將軍能任其責分一軍從如何須更有百餘戰艦則足濟矣李侯曰敬受令是日虞公徑發循慈湖馬家渡等處措置方略迤邐還建康公至建康見元樞知府事張公燾步造謁虞公問勞甚勤曰燾所謂賴公庇者完顔亮期初十日來此會食使燾安往諸將因議可以往鎮江者皆有難色張目虞公曰明府已建大功可任此責虞公往鎮江謁劉錡劉疾已劇執公手曰朝廷養兵三十年我輩一技亡所施今日成大功乃一中書舍人我輩愧當死矣虞公退與揚存中成閔謀曰敵之瞰江宜亟經畫守禦之偹今船又繫岸有如臨期不堪駕用奈何遂相分臨統按試時江中止有二十四舟顯忠所遣船亦至虞公命戰士踏戈船上下流如飛北岸金兵皆慿壘縱觀駭愕相謂曰南軍有備亟遣人揚州報亮馳至立問諸軍以北渡之䇿且采石渡方此狹甚而我軍猶不利請徐為之謀以伺其隙亮大怒諸軍退聚謀曰南軍如此豈宜輕舉祗送死耳亮凶悖明日若不能渡江必殺我輩不如先發遂共定謀殺亮乙未諸軍詐作南軍劫寨直趨亮寢帳親兵問為誰諸軍語之曰我欲帳中白事親兵縱諸軍引弓射亮被傷起彎其弓曰汝是南家人抑我家人答曰我家人亮曰今日殺我赦我在汝等不赦我速殺我然自知我無道汝等殺我固當諸軍連射帳中矢下如雨亮即死兼殺其妃三人金兵遂退屯三十里北人虢州僉軍雷正渡江歸順報金主已被殺矣使騎往得其實十二月庚子御營宿衛使和義郡主楊存中管侍衛馬軍御前諸將都統制成閔中書舍人督視荆襄江淮參謀軍事虞允文總領淮東軍馬錢糧朱夏卿列奏以聞北壘亦具亮之死狀來求和捷書奏上曰亮已遇弒軍無統衆心潰賴諸路將帥廣行招納朝議亦欲進師虞公先往行在所稟事宜時敵雖移屯兵尚駐淮東公入見上慰勞有加虞公奏曰此廟堂神靈陛下英斷將士用命臣何力焉上喜賞再三者有旨論功行賞張振時俊王琪盛新戴臯以功烈顯著人轉三官其餘將士亦不以次推恩虞公奏昨采石事勢危急臣於振等行陳許以重賞振等效死力戰三官恐不足酬其勞乞回在身官職推賞振等上曰向江上甚危急得諸將致力其功豈可忘尋改授正任承宣觀察等使虞公繼論列今車駕進發而敵在淮東鎮江對壘路尚梗今當督淮上之兵斷敵之歸路發鎮江等兵為掩襲之舉敵可無噍類上深然之命公往淮上措置而諸軍先已過江矣十二月壬寅成閔復收揚州甲辰李顯忠以大軍濟江去和州三十里與敵相持丙辰成閔收復泗州皆虞公前日鼓勇士氣一戰之力也未幾北朝都管司以牒來云正隆無道興兵今已廢殞初立新主見議班師而朝廷將復從和議焉自古江淮用兵稱周瑜之赤壁謝元之淝水為雋功然瑜乘曹公士卒疲疫之餘而淝水之勝出于苻堅退師之無律今亮以滔天之逆隂謀數十年驅其衆空國來冦而虞公奮然以忠義徇國帥罷散之卒身自督戰遂成采石之功而瓜洲之金主不戰而自斃此豈與赤壁淝水乘危徼幸同日語哉異時國史大書特書與宋匹休薦紳巨公亦必有能效勒燕然銘頌淮西碑以揚厲無前之績者然逺書生亟欲廣其事以壯吾中國之威以激蜀士夫之氣謹再拜稽首而書之三朝北盟會編卷二百四十一
