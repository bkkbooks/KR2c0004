body:
  text: 三朝北盟㑹編卷一百九十五宋徐夢莘撰炎興下帙起紹興九年五月盡六月二十一日己巳五月張俊韓世忠來朝復南京歸德府為應天府許州為應昌府陳州為淮寧府潁州為順昌府壽州為壽春府曹州為興仁府渭州為平凉府慶州為慶陽府延州為延安府州府之名自陷僞之後經金人及劉豫更改者今復其舊孟庾為西京留守兼河南府路宣撫使李世輔入延安府遂執夏國宰相王樞歸朝廷初李世輔奔夏國乃說夏國發兵可以取陜西五路夏國主信之發兵五萬别差都統與世輔共總兵政以宰相王樞監其軍長驅至延安府三十里下寨世輔以千騎至城下問延安府守者姓名曰趙惟清世輔曰金人不道殺戮我滿家良賤我今提夏國精兵為亡者雪寃呼惟清開門惟清曰太尉自與大金為仇讐何與于大宋而欲攻大宋之州府世輔問延安府今為誰守惟清曰大金已割三京地界還之大宋已行赦書到府官軍民拜恩畢今為大宋也世輔驚請赦文一驗之惟清以真本示世輔世輔曰然則世輔以左右數十人入議事何如惟清從之門啓世輔入城見市井間百姓歡笑之聲乃知割地事審的遂與惟清約以單騎回軍中併殺夏國頭領南歸朝廷即復以腹心數十人回軍中聲言生執到延安府屬是時王樞具飲于帳中夏國都統與世輔皆在坐夏國軍馬悉全裝鐵甲列寨下酒三行世輔命執到延安府官屬入於是世輔腹心人僞擁數人至帳下世輔即起掣刀一手執王樞一手殺夏國都統帳下大喧諸軍皆不知其因聞風墮坑填谷死者莫知其數逮曉世輔招諭餘衆得馬僅二萬匹遂往延安謀欲歸朝廷或謂世輔曰太尉威聲著于大金與夏國矣於大宋則未有寸功當今之計萬匹馬聚兵長驅直渡黃河乘勝取河北河東獻于朝廷則歸之為有名矣世輔猶豫聞樓照宣諭陜西及近境有勸世輔見照陳敘歸朝之意者或者曰不可大丈夫不就功名則已如欲就功名若一見樓照宣諭雖欲渡河不可得矣亦㑹照以書與世輔期相見世輔遂見照照具揚天子德意勉世輔速歸朝廷遂以王樞偕行留馬在陜西後欲起綱至行在而金人敗盟皆為金所有趙士􅀈張燾祗謁陵寢回士􅀈張燾往西京朝陵自陳蔡歷汝潁以至京洛延見父老布宣天子德意逮至柏城披荆棘履榛翳隨宜葺治展敬成禮而還回到行在即日入對燾具劄子奏曰臣竊以國家遭百六之灾致金敵肆憑陵之患禍流海宇上及山陵臣猥被使令恭修祗謁之事至於柏城慟哭深惟金罪義難戴天雖窮誅極劓殄滅之未足以雪此恥而復此讐也恭惟陛下聖孝天性豈勝痛憤之情顧以梓宫兩宫之故方且與和未可遽言兵也然祖宗在天之靈震怒既久豈容但已異時躬行天討得無望于陛下乎矧惟自古勘定禍亂非武不可二三其心不可保恃久矣伏望睿慈仰思纍聖責望之重俯念億兆蘄向之切益厲武將益修武偹夙興夜寐念兹在兹以俟釁隙起而應之電掃風驅雲撤席捲盡俘仇敵告功諸陵使天下誦之萬世美之如是然後盡天子之孝而為子孫之責塞矣上問諸陵寢如何燾不對唯言萬世不可忘此敵上為之黯然燾又奏諸陵下石澗水自兵興以來涸竭幾十五年臣至陵所修誠禮畢水即大至父老歎異以為中興之祥上喜後以語宰相曰張燾言必不妄燾又奏訪聞金人於淮揚軍採木作筏不計其數又行造繩索甚多不知其意安在如此等事在我豈可不知諸將以朝廷嘗言不得遣間指揮各務省事遂不復遣金人多計廣置耳目我之動息彼無不知敵之情狀我則漠然不聞臣竊惑之臣又見黃河船盡拘北岸悉為彼用往來自若此無一人敢北渡者豈有是理哉臣願陛下飭戒邊吏謹封疆嚴守偹廣耳目明斥堠先事而豫防之庶無後悔又言新復州縣官吏差遣皆以賄得公肆侵漁取償百姓乞令監司嚴行約束又言撫綏之道以安靜不擾為先令使命繹絡民間困于將迎不安其居非所以慰來蘇之望又言訪聞陜西諸帥皆不相下動輒喧爭設有緩急豈能使其協力不若置一大帥使之節制則首尾相應緩急可恃願陛下留意無忽燾之所言切中時務宰相秦檜方主和議惟恐少忤敵情故事皆不行六月二十一日己巳吳玠薨中書舍人王綸為公墓銘曰公諱玠字晉卿世居德順之隴平公少沈毅有志節善騎射知兵讀書能通大義未冠以良家子領涇原軍政和中夏人犯邊力戰有功自是威名益震建炎二年金人內侵已三載矣春渡河出大慶關略秦雍所過城邑輒下三月還自鞏州至鳳翔隴右都護張嚴邀戰失利敵勢愈張謀趨涇州大將曲端拒守麻務鎮命公為前鋒公進據青溪嶺逆擊大破之敵始有憚公意三年冬劇賊史斌寇興鳳據長安謀為不軌公擊斬之轉右武大夫四年春擢涇原路馬步軍副總管金人謀取環慶大將羅索以衆數萬出麻亭公逆戰于彭原店士殊死鬬殺傷過當敵懼引去而曲端劾公違節制坐降武顯大夫罷總管論者不平未幾復故官職改秦鳳路馬步軍副總管知鳳翔府權永興軍路經略安撫司公事進復長安宣撫處置司將合五路兵與金人決戰公謂宜各守要害以待其敝秋九月師次富平都統制㑹諸將議公又曰兵以利動今地勢不利何以戰宜據髙阜先為不可勝者衆曰我師數倍又前臨葦澤非敵騎所宜不聽既而敵驟至囊土逾淖以薄吾營軍遂大潰而五路俱陷巴蜀大震公獨整衆保散關之東曰和尚原積粟繕兵列柵其上或謂公宜屯漢中以安巴蜀公曰敵不破我不敢進堅壁重兵以臨之彼懼吾躡其後保蜀之道也明年改元紹興春三月敵將默哷果率鋭兵期必取而後進公擊敗之真拜忠州防禦使兼帥涇原夏五月默哷復㑹别將烏嚕哲爾格衆數萬使二將由階成出散關先至公與之戰三日大敗而去默哷方攻箭筈關公復遣麾下擊退卒不得與二將合轉明州觀察使丁嘉國憂起復尋兼陜西諸路都統制敵自破契丹以來狃常勝至每與公戰輒北不勝其憤冬十月其元帥四太子者㑹諸道兵十餘萬造浮梁跨渭水自寶雞連營三十里又疊石為城夾澗水與官軍相拒公指揮諸將選徑弓弩號駐隊畨休迭射矢發如雨敵稍却則以竒兵旁擊如是三日度其困且走則為伏於神岔峪待其歸伏發衆大亂俘其將雅格貝勒及其首領三百餘人甲士八百六十人尸填坑谷者二十餘里獲鎧仗數萬計拜鎮西軍節度使二年兼宣撫處置使司都統制節制興文龍州敵久窺蜀必欲以竒取之三年春裒其兵又盡發五路叛卒聲言東去反自商於出漢隂搗梁洋金州失守公亟率麾下倍道疾馳且調兵利閬既至適與敵遇使人以黃柑遺其帥薩里罕敵驚曰吳公來何速耶遂大戰饒風關凡六日敵皆敗殺傷不可勝計薩里罕怒斬其千戶貝勒數人以死犯關出官軍後公徐結陳趨西縣或曰蜀危矣公曰敵去國逺鬭而死傷大半吾方全師以制其敝蜀何憂也月餘敵果退加檢校少保充利州路階成鳳州置制使四年春二月敵復大入攻仙人關公預為壘關旁曰殺金坪嚴兵以待敵據阜戰且攻壘公命將士更射又出鋭兵擊其左右戰五日皆捷敵遁去上聞之嘉歎親札曰朕恨不撫卿背也是役也敵決意入蜀自其元帥以下皆盡室以來又以劉豫腹心為四川招撫使既不得志度公終不可幸勝則還據鳳翔授甲屯田為久留計自是不復輕動矣夏四月徙鎮定國除川陜宣撫副使秋七月録仙人關功進檢校少保奉寧保靜軍節度使五年春攻下秦州六年兼營田大使從鎮保平靜難軍公與敵對壘踰十載常患逺餉勞民屢汰冗員浮費嵗益屯田至十萬斛又調戍兵命梁洋守將治褒城廢堰廣溉民田復業者數萬朝廷嘉之每降璽書褒諭七年冬敵廢劉豫且益兵衆以為疑公策其將去九年和議成上以其功高復賜親札進開府儀同三司四川宣撫使遣內侍齎告以賜而公已病甚扶掖聽命自以賞過其勞固辭優詔不許六月己巳以疾薨于仙人關治所享年四十有七公用兵本孫吳而能知其變務逺大不求近效故能保其必勝御下嚴而有恩視士卒之休戚如已而同其甘苦故人樂為之死其任將佐等功賞斷以公論無親故權勢之徇故麾下諸將多以功顯既貴而自奉之約不踰平時至推以豫士則不少吝故無餘資至無宅以居嗚呼雖古名將何以加諸後胡世將為川陜宣撫使公弟吳璘適在軍中一日從容問公所以戰則曰璘與先兄束髮從軍屢戰西戎不過一進郤之間勝負決矣至金人則勝不追敗不亂整軍在後更進迭郤堅持久每戰非纍日不決蓋自昔用兵所未嘗見勝之之道非屢與之遇者莫能盡知然其要在用所長去所短而已蓋金人之弓矢不若中國之徑利而中國之士卒不若金人之堅忍盡吾長技洞重甲數百步外則彼固不能及我據其形便更出鋭卒與之為無窮以沮其堅忍之勢則我固有以制彼至于決機兩陳之間變化如神默運乎心術之微則璘有不能言以是知公之深于兵也十年詔立廟于仙人關賜額曰忠烈諡武安吳武安功績記序曰忠烈吳武公中興名將其撫養士卒似吳起其勤儉精力似陶侃違令必戮似孫武子憂國逺計不僥近功似趙充國身殁之日知與不知莫不流涕又似李廣與羊祜也是以能勝所難勝守所難守以保全蜀使有數年之壽則中原之復可幾也方其薨也其長子未冠二季猶幼胡宣撫為行狀不詢其子使二舊吏立供為之墓志又據行狀而言是以如是之不詳乾道乙酉豫既作補遺志其大者凡數十事以遺其少子參議且類宸翰詔命碑鏤為一集目之曰保蜀忠勤庶偹國史異時採擇因使蜀士大夫知本末而後之為大將者有所矜式書成人喜讀之薦紳遺傳已滿四川然意尚有遺也近得明庭傑從政所撰功績記文實語詳果有未聞知者詢其來由則云方忠烈用兵渠在張魏公幕府親所聞見宣司參議馮康國元通命記其事是可信因鏤之集中以補遺焉岐下張發書三朝北盟㑹編卷一百九十五
