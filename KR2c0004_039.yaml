body:
  text: 三朝北盟㑹編卷三十九宋徐夢莘撰靖康中帙起靖康元年二月十六日壬子盡十八日甲寅十六日壬子楊時上書論三鎮利害臣竊觀自漢迄唐待鄰國之道無如祖宗之時者百年之間民生戴白不見兵革賊臣要功為國生事與惡而棄好馴致今日方敵騎逼城備禦無素卑詞厚禮以紓目前之急盖世有不得已而然者割要害之地以為盟好則非經逺計也臣固嘗論之矣比聞金人駐兵磁相竊慮無有紀極破大名安成二縣驅掠子女二千餘人殺令佐二人而去誓書之墨未亁而背不旋踵吾雖欲專守和議不可得也昔趙割六縣之地使趙郝約事於秦郝謂趙王曰秦之攻王倦而歸也秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也今日之事正類於是失去其本國越数千里之逺而攻人之國都盖非道也使其力能攻之則城中之物皆其有尚何事求和哉彼見吾髙城深池未易陵犯勤王之師四面而至姚平仲固嘗與之交兵忍而不敢怒請和而去則其情可見盖亦懼而歸非愛我而不攻也朝廷割三鎮二十州之地與之是亦助而自攻也聞肅王初與之約及河而返今挾而徃此敗盟之大者臣竊謂朝廷冝以肅王為問責其敗盟必得肅王而後已三鎮之民以死拒之於前而吾以重兵擁其後其勢必得所欲者若猶未從則聲其罪而討之矣師以直為壯是舉也直在我矣三鎮聞之士氣必振此萬全之計不可失也若三鎮窮蹙而王師不救則其民必謂朝廷視其塗炭而莫之恤則戴后之心懈而大事去矣不可不慮也竊聞出師之令廟筭不一屡行而屡反則士氣必惰欲其成功難矣哉憲宗平淮西韓愈謂凡此蔡功惟㫁乃成未有舉大事不㫁而能有成也伏望陛下斷自宸衷無惑羣議則天下幸甚封氏紀年曰夫三鎮者趙魏韓晉之地是也其為要害乆矣今一旦舉而與之中國何以奠居三鎮失一宜其長驅而至我不能枝梧也况三者俱失乎杜牧有言曰以天下觀河北猶四肢四肢茍去吾不知其為人又曰山東王者不得不可為王覇者不得不可為覇由此觀之三鎮何可妄弃乎明年太原遂䧟京城失守天下土崩可勝嘆哉郭藥師以兵至磁州取寄收銀三十萬兩初郭藥師為同知燕山府也乞支降贍軍錢朝廷以銀三十萬兩畀之至磁州時燕山已䧟藥師已叛乃以銀寄收於磁州軍資庫金人自京城講和而歸也到河北邏得斥堠逓發視之乃河北都轉運使張慤發徃磁州令封樁此銀不得支用藥師得之遂以兵至磁州乃索此銀曰朝廷發徃燕山應副我用者知磁州趙將之辭以為無藥師出逓牒示之將之不能隱藥師聲言不得銀則攻城取銀將之惧以銀與之師乃退尼堪兵據太行山瞰河津朝廷大駭乃命下种師道姚古出河東河北种師道加太尉河東河北宣撫使駐軍滑州門下敵王愾而有功既保干城之衛餙國典以行賞敢忘鼙鼓之思載惟元師之謀允頼武人之俊誕揚褒律敷告治朝檢校少師鎮洮軍節度使河北宣諭使河南郡開國公食邑三千四百户實封一千三百户种師道節操剛方體裁莊重勇有文畧深而寡言義匪辭難奮不顧身而敢往慮無遺䇿度能制命以有成甞入處於樞庭比出提於戎乗强敵聞風而潛遁邉鎮傳檄而自堅然居安慮危宜預圖於閒暇而有備無患庻永保於太寧載疇輿頌之公俾專朔部之寄肆頒寵數昭示眷懐是用冠秩右階其外掌武之峻張威外閫具膺宣尉之榮衍以爰田陪之圭賦於戯充國自許葢無踰於老臣陳平見知遂盡䕶於諸將朕思有常徳以立武事爾其除戎器以戒不虞俾戎馬莫窺於長城而烽火自滅於幽障往若予訓益壯乃猷可大尉鎮洮軍節度使河北宣撫使加食邑五百户初尼堪既破忻州代州折可求以麟府兵劉先世以鄜延兵援河東皆為所敗金人遂圍太原月餘不能下適平陽府義勝軍敗城叛去攻威勝軍遂引金人入南北關䧟隆徳府至是澤州言尼堪次髙平朝廷命統制官郝懷將兵二萬屯河陽扼太行琅車之險遂命种師道為河北宣諭使以駐滑又議以姚古援太原以种師中援中山河間諸郡姚古加檢校少師河東路制置使縂兵以援太原种師中河北路制置副使總兵以援中山河間諸郡初金人入邉种師中以秦鳯路經畧使率兵來勤王金人已退朝廷雖以敵深入不擊為失䇿然不敢决䇿出戰乃除姚古种師中制置使副凢行移文字出於樞宻院者則廹令破敵出於三省者則令䕶出境莫之適從古師中患之朝廷以倉部郎中黄鍔隨軍應副錢粮鍔與河北都運使張慤至磁州問寄收銀三十萬兩何在知州趙將之答曰郭藥師自京城囘軍駐軍城下執都轉運使牒取之矣慤欲斬將之鍔勸免之京都牒示舖戸依舊開舖都大提舉京城四壁守禦使司牒云契勘金人已過黄河中外民心已漸安貼訪聞在京金銀物帛質庫舖戸尚懷疑惑未肯依舊開舖防阻啇旅交易湏至出牓各令復業開舖出李綱遣人上太上皇起居表臣言戎路履嶮岡陪扈從之勤我師指期行致靖邉之効敢具陳其悃愊輙躬問於起居中謝伏念臣奮自單平驟膺奬擢属强鄰之入戰連叛將以俱來曽是㣲才猥當任責臣於正月四日兵部侍郎䝉恩除尚書右丞奉聖㫖差充行營使既預聞於機政仍兼總於兵權竊慕謝安之靖邉沙欲遣崔浩之破毛國練兵選將至揚出戰之聲登城守陴宻為堅壁之計器械甚設樓櫓畢施敵於七日夜攻雲澤門次攻通天安泰等門縳筏渡濠持弓彍弩兩兵分集難越髙墉雲梯已登悉皆摧裂遂歛衆以却退因遣使以請和主上重惜生靈深存國體已曲從於好約復更定於誓言捐帑藏之貨財遣信使而闕二字敵歸待命兵戢有時然不備不虞昔賢之所戒受降受敵前史以為聞臣謹張皇軍容申飭守偹提軍深入知强敵之無謀募兵四來喜王師之益衆士民生氣宗社义安恭惟道君皇帝睿知如神髙明合道下渙詔以恤民隱德已洽於衆心授聖子以固皇基意實通於穹昊臣伏承陛下儲精淵黙飬志晏閒從容呉越之奥區觀覽江山之勝境傒四方之無侮表二聖之重觀誓竭駑軀少伸毫髪鳴鸞禹穴遥瞻方外之遊問寢龍楼佇承天下之飬再上上皇劄子臣聞中國外蕃相為盛衰非徒人為殆亦天数一昨金人縁藥師叛既䧟燕山浸窺河北城壘相望而無藩籬之固牧守相視而無封疆之臣老將持兵望風先潰大河解凍乘桴競浮駿騎長驅於中原勁兵直指於魏闕以正月初七日逼邇都城刼掠士民焚蕩廬舍以大火船鐡騎攻西水門守衛之具辦於倉卒臣奉皇帝㫖率勵將士誓以死守設械拒於汴之中流殺獲数千人迨晩方息復以鋭兵攻酸棗門一帶手弓之衆蜂屯蟻附渡濠臨城梯長如雲箭落如雨天地改色風沙晝昏人心震驚宗社危急臣奉皇帝㫖將諸班直弓弩手救援躬冐矢石以摧其鋒令敢死士焚爇雲梯殺獲首領一人攻破其黨獲級甚衆衆兵乘械以强弩射之徃徃沒溺漳汴河水令歸城水勢漲溢自卯及午敵兵方退却知我中有備始遣人同李鄴等計議臣等紏集將士欲以死戰皇帝以宗社生靈之故務令持重始議通和使者旁午冠盖相望累日而後議成皇帝聖徳格於曠古懐鴟鴞以好音掩貔貅而修睦不愛金帑務保要害之地遂遣康王張邦昌使軍前悉如所請敵方退舍竢犒師之物以歸然邀求數多憚竭帑藏空匱民力不足以給之敵蠲减所湏之数果然而退夫復何言萬一有䟦扈之慿陵欲危宗社臣等當陳師鞠旅以圖進討神人共憤天心助之洪惟道君太上皇帝祗遹神考以武繼文天下稱其孝傳位聖子法堯禪舜天下稱其髙翠華南幸臣拘以職守不敢負覉紲以從艱難之秋冐處政機誓將肅清畿甸奉迎鑾輿天心已明殞首何悔謹録奉聞謹奏國子司業黄哲請失職之罪朝散大夫國子司業黄哲奏臣等伏見二月五日有太學諸生伏闕上書致令兵民乘勢作閙上煩聖訓丁寧臣等職司教道不能表率諸生雖前後屡行約束尚敢違戾難以備員學官見今待罪伏望特賜黜責候勅㫖奉聖㫖朝廷方開言路通逹下情士人伏闕上書乃是忠義所激學官何為自疑乃爾待罪可速安職仍曉諭諸生初蔡懋李税諭太學生長貳屏出伏闕上書人等諸生以布衣之士敢刼持天子既而被黜徃徃欲拂袖者其衆聞者莫不啣憤扼腕故黄哲待罪而有是指揮呉敏劄子雪李邦彦罪狀劄子曰二月初五日太學生上書聚衆既多遂槌破登聞鼓云軍民無忠義之心咸幸禍亂之變又言昔髙歡在魏見禁軍焚領兵張彛宅朝廷畏其亂而不敢治歡遂散家財結士卒伯山東由此觀之國家不能修政刑者奸人窺伺之資也古語曰投鼠忌器况天子相乎李邦彦等諌上皇罷不急之費又援立聖明朝廷遣鄴等徃使大金終頼其力但邦彦為人畏慎太過緩於事機及罷綱師道遂有百姓指目蔡京王黼用事不值此變而邦彦遭此豈非不幸又云願陛下明詔解衆惑使邦彦之為人稍白於天下然後復起邦彦還其相位論者於是謂敏為邦彦黨矣十七日癸丑种師道免宣撫使赴朝叅五日一赴院簽書先是朝廷差种師道充河北宣撫使駐軍滑州又奏乞朝廷召天下軍馬屯駐大河防秋朝廷初允其請行遣未旬日宰臣言萬一敵兵不至則費用甚大遂已具請師道既知言之不從奏以被疾乞免宣撫事朝廷遂如其請令赴朝叅無時入奏五日一赴院簽書十八日甲寅蔡京責授中奉大夫祕書少監分司南京致仕河南府居住侍御史孫覿等臣寮上言伏見金人深入三輔震擾陛下總覽之初坐席未煖分遣使臣捐弃金帛以為先戎之計中外之憤疾心痛首以為結怨連禍之人未即誅殛無以謝天下臣等謹按太師蔡京四任宰相前後二十年挾繼志述事之名建蠧國害民之政而祖宗法度廢弛幾盡託豐亨豫大之説倡為窮奢極侈之風而公私積蓄掃蕩無餘立御筆之限以隂壊封駁之法寘典學之科以杜塞諌諍之路汲引羣小充滿要途禁錮忠良悉為朋黨交通􅉏御竊弄威柄鬻賣官爵貨賂公行盗用庫金奸賍狼籍閨門混濁父子詬争厮役官為横行媵妾封至大國欺君罔上挾数任情書傳所記老奸巨惡未有如京比者太上皇屡因人言灼見奸狀凢四罷免而近幸小人相為唇齒失所慿依營䕶擁蔽既去復用而京偃然自謂羽翼已成根株盤固不可揺動㓙熖益肆復出為惡倡導邉隙挑發兵端連起大獄報復睚眦怨氣充塞上干隂陽水旱連年赤地千里盗賊滿野白骨如山人心携離上下解體於是敵人乘虛鼓行如蹈無人之境矣陛下赫然奮乾剛貶斥用事者王黼等大正典刑如京之惡豈可獨貸况京在政和中首建平燕之議招納燕人李良嗣以為謀主又欲以妖人王仔息服錦袍鐡幘為大將計議已定㑹仔息抵罪伏誅而大臣固争請待他日之釁王黼當國循習初議與京子攸决意成之京之誤國固不容誅而結造邉患父子相為終始與黼均為罪首公議籍籍不决未可以已也且京被遇三朝父子祖孫為三公者二人親執政者三人登禁從者亡慮十数名園甲第僣擬宫省袍帶之寵下逮童稚犬吠非主尚懐糠覈之恩顧京所䝉何以論報不圖邉報上聞而京盡空数百軰治舟楫擁輕賫一夕遁去君父惸然坐圍城中無一人有同患難之思掉尾不顧曽犬豕之不如原其用心使京尚在相位安知其不開邉賣國如馮道軰乎宰相非其人果為天下害遂使中國空虚敵人侵侮無所不至而京喜為奸言嫁怨餙非獨使上皇負謗於天下衆論不容尤在乎此伏望陛下睿斷勅使追還早賜竄殛稍正京父子誤國滔天之罪以慰宗廟社稷之靈以雪上皇晻昩之謗少紓四海生民忿懣戚戚不足之氣不勝幸甚取進止奉聖㫖蔡京責授中奉大夫祕書少監分司南京致仕童貫責授左衞上將軍致仕臣寮上言臣伏覩臣寮累有章䟽論列童貫罪惡法在誅夷陛下仁慈過厚止從竄斥者臣伏念法者天下之公也王者能任法而不任情則天下服而信之如其威而不能克愛縱奸貸惡以撓天下之心天下之人將羣起而議之亂臣賊子亦無所顧忌矣按童貫刑餘臭類本庸奴耳釋掃除之役厠征伐之事浸縁恩倖竊據兵權幾二十餘年出則為宣撫而不授制宻院入則領宻㫖而外兼行宣撫䟦扈不臣隳壞法制師徒死事誣以迯亡故賻贈不及而人情積怨屯戍逃遁許其改刺故紀律不嚴而人易潰散詐為首級則不憚於殺平人廣占儲粮則不難於張虚数賞罰出於私意威福至於下移銖銖計罪不可勝言臣姑数其大者首倡交結金人共滅契丹兆禍致亂其罪一也盧溝之役望風奔潰覆師殺将其罪二也金人㸃集邊吏來告貫不以聞其罪三也傳檄邊城不令出戰致金人長驅遽至京師其罪四也出師河東聞敵南來不為抗拒之計夙夜逃歸其罪五也至上皇南巡貫乃自名扈從未嘗奏禀擁兵遽去其罪六也隂募死士創置勝㨗軍額厚其資糧環列私第其罪七也堅甲利兵充滿其家制造之工尚方弗及其罪八也城外隂藏器甲糗糧金人實獲資助馬忠提勤王之師西來尚頗収其贏餘不知童貫畜此以待金人乎抑將有所用之其罪九也服食之侈上擬乗輿嬪御之盛潛規宫禁其罪十也有十大罪彰彰如此宰執依違無所啓白陛下復含容隠忍不早正明刑使之身首異處獨不念金人南侵死亡係累亡慮二十萬之寃禍自誰兆乎伏望斷而行之少澤四海寃憤之氣又上言臣等伏見比嵗以來閹人用事竊弄國柄典掌機宻挑發兵端結成邉患於是金人以數萬騎直掠京闕宗社之危迨若綴旒陛下赫然竄斥大臣王黼等以謝天下而衆議不厭以為首難之人實始童貫臣等按貫之罪雖擢髪不足以贖之而誤國之大者尚可数也貫自陜西用兵前後二十年專以欺君罔上為術虛立成砦妄奏邉㨗以為己功汲引羣小易置將吏以植私黨交通問遺鬻賣官爵超躐除授紊亂常制有自選調不由荐舉而輒改官者有自行伍不用資格而遽升防團者有放廢田里不用甄收而擢登侍從者奸賍小人争相慕悦侵漁百姓盗取官錢苞苴公行門戸如市金幣寳玉充牣如山私家所藏多於府庫此貫之罪一也戰士之徒冐犯矢石傷者有金帛之賜死者有褒贈之恩自貫用事一切廢革戰塲之卒秋毫無所得而歿者又誣以迯亡之罪乾沒軍賞悉充私藏比至師還庖人廐卒守舍掃除之𨽻冐功奏賞有馴致節鉞者貫之罪二也貫又擇陜西之卒以為親兵號曰勝㨗方戰征之際他兵躬行陣之勞班師之後親兵冐無功之賞貫之罪三也自貫為將帥每出内帑金帛以濟軍湏奄為己有而嚴立軍期取償於州縣頭㑹箕歛不堪民命貪賍不法㓙熖勃然䑓諌之臣一言議已中以危法使天下之人不敢言而敢怒貫之罪四也方臘作難攻䧟城邑東南大震貫將兵討之貫御衆無法縱為貪暴悉斬平民以効首級於是民之死於天兵者十有五六貫之罪五也貫在政和中納燕人趙良嗣以為謀主始建平燕之議經營十年中國空虚招納叛亡充斥州縣卒致生靈塗炭貫之罪六也且貫以刑餘之人身為三公職在樞省攘貪不已遂封王爵長惡不悛招權擅命拜免大臣氣熖煽赫威振天下産怨召亂浸成國難陛下立政之始大明誅賞以勸四方以貫負此大罪何所迯於天地之間伏望睿照躬發宸㫁稍正滔天之罪以為亂臣賊子之戒天下幸甚取進止奉聖㫖童貫責授左衛上將軍致仕蔡攸責授太中大夫提舉亳州明道宫臣僚上言臣竊惟幽薊之役用事大臣敗累朝不渝之盟結二邉無窮之禍以成朝廷今日之患中外之論咸謂蔡京子攸王黼童貫均犯大惡當正典刑以謝天下投荒之罰獨加王黼此羣心所以未厭而臣亦不得而已也臣近者嘗聞言事之臣見䟽渠魁蔡京之罪乞賜竄殛今不復重陳仰凟睿聽敢以貫攸之罪試舉其畧為陛下言之貫自閹尹喜為禍亂攸慿藉世祿濟以奸囘平日謗廷壞國壊法亂常竊弄權柄擅作威福固已不勝誅矣方王師之北伐也貫為宣撫使攸實副之提数十萬之師挫於殘破之敵淹畱彌年卒買空城乃以恢定故疆冐受非常之寵貫以太師封両國公攸遂入摠樞宻矣此貫攸之罪同也蕭后納欵金使韓昉見貫攸於軍中卑辭祈哀願捐歲幣以復舊好此安危之計也乃叱昉使去昉大呼於庭告以必敗今数州之地悉非我有而國用民力從匱竭矣此又攸貫之罪同也蔡京專政貫則興結邉隙首引趙良嗣用之於本朝迨金人結好攸則招納叛㓂反覆賣國締怨結禍使敵人因以藉口此又攸貫之罪同也前年秋貫以重兵屯太原欲収雲中之地卒無尺寸功反以剪除邉患枉道河朔而歸又慮衆人之議已也公肆誕謾凡第賞千百人貫遂封為廣陽郡王而攸亦進太保封燕國公此又攸貫之罪同也去年冬貫復出太原金人入塞貫實促之攸見邉報警急貫迯遁以還漫不經意玩兵縱敵以至於此此又攸貫之罪同也迨陛下踐祚之秋敵人長驅驚震都邑貫攸一旦携持金帛舳艫相銜盡空逺去使聖主獨處圍城中曽無同國休戚之意此又攸貫之罪同也臣願陛下奮揚威斷察其誤國罔上之罪天下之所共弃并檢㑹前日論列蔡京章奏早正典刑以為萬世賊臣之戒伏候勅㫖奉聖㫖蔡攸責授太中大夫提舉亳州明道宫攸劄子逓到告命伏䝉聖慈降授太中大夫提舉亳州明道宫任便居住臣已望闕祗受即時解行宫使職訖臣輙有縷縷之私仰惟聰聽伏念臣属以許國無狀禦邉失機因致煩言遂諉司敗重䝉聖造委曲保全又降親詔令臣專一扈從太上還闕臣已在廢逐猶叨器使仰體德意敢不遵承今來太上囘鑾既渡大江絶淮泝汴徒御所至安行無虞兼今已過宿州前去京闕不逺奉迎使副並至行宫臣罪戾之餘正宜退伏田里偷生省已不當更預扈從之列欲望聖慈俯察危𠂻許臣依已降責命任便居住重念臣父京近貶西京年老陸行衝冐感疾如䝉矜允臣欲前去省侍以全子職臣不勝廹切祈天俟命之至取進止三朝北盟㑹編卷三十九
