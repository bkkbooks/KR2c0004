body:
  text: 三朝北盟會編卷一百七十三宋徐夢莘撰炎興下帙起紹興七年正月十五日丁丑盡其日汪丞相伯彥對臣謹奉明詔而言曰蓋聞舜好問而為五帝之盛帝湯好問而為三王之顯王後之取威定霸以成帝王之業者不敢自用各有咨訪如漢祖賴良平之謀而創業光武用冦鄧之䇿而為中興主孫權用周瑜之䇿遂摧曹操而拓有荆州蜀先主用法正之謀遂擒吕布於下邳破袁紹於官渡斯皆用武詢謀之效也恭惟陛下神武默運禦侮却敵天人助順一舉而亟清江淮再舉而可復疆土而乃謙沖退託參古酌今以善計下詢舊弼臣顧念宿遭恩遇披露肝膽竭其餘忠精思熟講祈補萬分之一輒效愚言借萬全以為元老決戰以為將軍相與問答以為陛下獻惟陛下優容而過聽之其辭曰決戰將軍問於萬全元老今天子之駐蹕三吳也蓋得兵家之三勢焉曷謂三勢一曰氣勢二曰地勢三曰國勢而命將殺敵無往而不濟於時逆劉干紀金敵濟師窬我長淮窺我江表明天子上承悔禍之天意下慰厭亂之民心以帝德赫怒旗建太一親總六師將士奮勇人倍其氣雷動炎發山捶谷蕩得氣勢也長江天險巨艦鶻飛一卒當江萬夫莫渡得地勢也辨其曲直知其逆順察其飢飽以壯擊老以生擊死以飽濟飢得國勢也以此三勢按甲江上時遣輕鋭所向必克仇敵就擒者不啻千百簽軍投降者動以萬計勢窮力蹙知曲之不可以敵直也知逆之不可以敵順也知飢之不可以敵飽也潛師夜遁寨幕烏集當此之時我乘勢越淮而襲搗其巢穴如破竹建瓴之易而乃躊躇淮甸疑慮未進愚蒙惑焉萬全元老曰嗟乎以若所謂善也吾之所樂聞也方且圖之耳然將軍之所謂知其一未睹其精者也僕請為將軍略舉其凡而將軍必能索其志焉將軍曰唯唯願聞一二以發愚蒙萬全元老曰禦戎之要來則懲而禦之去則守而偹之不貴追也故魯莊公追戎於濟西僖公追齊師至於􅀈聖人之於春秋皆書以危之且敵之奔北尾擊過淮也可謂宜逺去諸葛孔明曰未得戰地雖見大利不前奪之未測彼情雖謂羸弱不進攻之賊無故退軍勿進攻之設若我師犯此而前追於淮此生靈塗炭人人懷歸如流離赤子之念父母其求救也如大旱之望雲霓奈何餽餉千里士有飢色若其略地就糧則失遺民之望若其飛芻挽粟則艱漕運之計本圖却敵以安羣情無或動羣情以資敵未可急追以僥幸一時之要當惜寸隂以圖善後之計事稍前定舉而措之萬全之地蓋未晚也將軍曰曷為善後之計曷為前定耶元老曰審攻戰之利得守備之宜盡措置之方明撫綏之略然後可圖也曷為撫綏曰夫金敵所驅而戰者兩河之吾民十之七九州之卒十之二金人十之一焉爾主兵少怨讐居多彼何取利吾能取彼怨讐而撫之則為我利矣投降之簽軍就係之帥長既貸之以錫其類宜優恤以勸其來者或給佃淮南之田以養無祿之人或添差闕員以祿有官之士其有智慮者其有材勇者置諸軍中各隨其宜而無失所之嗟怨庶使兩河九州之衆聞風懷惠擕持而來歸一旦驅而之戰以敵人攻敵人利莫大焉不惟此耳關中諸叛師古輩以不快於王似而去之孔彥周以讐嫌權邦彥而去之初非本心倘能遣使間道以往諭上德意而後恩施之俾其自效彼將銜恩感義幡然改圖領所部而獻其俘於行在矣李成徐文輩於是乎知齊之不可以庇身也氣喪膽落朝不謀夕亦將悔過效順請命之不暇不然其徒亦將斬首而來獻矣所謂明撫綏之術其槩如此曷謂措置曰恢復之計不患逆劉之難除患金敵之未衰不患金敵之未衰患吾措置有緩急緩其所急則圖成長久之功急其所緩則僅見目前之利失之毫釐差之千里可不慎乎夫立國者莫大於形勢得形勢者制人失形勢者制於人昔李希烈欲破壽春以趨江都張建封圍霍邱以精兵遊擊而希烈為遁長江得形勢卒保江淮苻堅東略至泛長江謝幼度以八千之兵阻淝水而破苻融數十萬之衆棄甲宵遁於是徑造渦頴經略舊都周世宗用王朴之䇿下江淮屯渦口以克壽春卒取淮南十有四州以為界豈非得形勢今日之計莫如屯據淮甸置師壽春而真揚廬濠於文武臣中擇才能守之以籬落江表夫荆南古荆州也北窺中原東瞰江表三國必爭之地吳不得吳魏不得魏為今日計當軍其要害以為吳越之屏以為巴蜀之防夫三秦四寨之國二蜀轉漕給軍之地昔秦恃殽函褒隴之險以囊括四海漢高祖之王漢中收用巴蜀還定三秦以有天下今也二蜀僅存而三秦已失為今日計當固蜀復秦以為後來之圖是宜申命都督下令荆襄戒嚴警後常若敵至飛檄川陜蓄鋭控弦觀釁而動以為犄角制勝之勢使彼欲南攻則右有西師之可虞彼欲西下則左有王都之可慮此皆在所急而不可緩也所謂盡措置之方其槩如此曷為守偹兵法曰有餘則攻不足則守傳曰不偹不虞不可以師昔晉人禦秦深壘固軍以待之秦師不能久此善守也楚為陳而燕人至見有偹而反此善偹也莒以恃陋而潰齊以狎敵而殱鄖人次郊而不戒莫敖小羅而無次皆守偹之不謹也為今之計無恃敵之不來恃吾有所待之也無恃敵之不可攻恃吾之不可攻也修明攻守拔用才能推誠以與使樂於用命悅以役人使久而無倦召驀鬪之士守險淮濟激厲土豪之雄益寨泗水遣間諜以察其情狀廣耳目以伺其姦詐經理殘破之邑勞來歸業之民恩信號令以結人之心信賞必罰以盡人之力理財以給犒士營田以助兵食補苴罅漏以為他圖所謂守偹之宜其槩如此曷為攻戰曰兩軍爭雄伐謀為上其次知彼知己可以取勝要在料度人事料量衆寡審方圓勝負之勢識勞佚淺深之謀見可而進知難而止因利乘便合變應權而為之以此攻戰何往不濟所謂攻戰之利其槩如此雖然於斯四者又有先後之序焉先明撫綏之略然後可以語措置之方然後可以語守偹之宜得守偹之宜然後可以語攻戰之計於是乎乘天時擇地利因人和振旅電擊諸路響應躝轢淮汴蹂蹈濟鄆馮軾而復偽齊之城橫趙魏粟鴈門太行而傳檄乎燕雲之外于以奉迎二聖定亂中原於鑠中興不亦盛乎中庸曰事前定則不困而又何急焉將軍曰雖然吾嘗聞智者不後時勇者不再決又聞戰以氣勝朝氣鋭晝氣惰暮氣昏善用兵者用其朝氣擊其惰歸此不可失之時也孟賁之狐疑不如童子之必至猛虎之猶豫不如蜂蠆之致螫願元老圖之元老曰不然鷙鳥之將擊必匿其形猛獸之將搏必伏其身兵危道也能而示之不能勇而示之怯卑以驕我佚以勞我彼殆將以誘我也昔楚武王侵隨行成而歸鬪伯比請羸師以張之隨侯將追楚師季良止之曰楚之羸其誘我也君何急焉君姑修政庶免於難隨侯懼而修政楚不敢伐今之敵人潛師而北必盤礴徘徊於宿亳徐淮之間幾請營糧濟師待時而再來南聲東擊西攻吾不偹出吾不意而出沒於荆襄之間睥睨楚澤乘桴而下合洞庭之賊相與為水攻之謀益以步人水陸俱下使吾守株於前而長江之險已奪其後則將奈何與其急於目前之追奔不若修政以為善後之計曰曷為修政事曰若所論四者是也雖然修此四者又有本焉書曰民為邦本易曰上以厚下安宅能固本而厚下者當知今日地之蹙狹而有以行其不忍之心察恤民之雕瘵而有以固其愛戴之心軍需之費力役之征有不得已而出於民者詔令丁寧當惜民力使官吏並無緣為姦田廬有樂輸不厭之勤內之逺邇衆庶三軍上下相與一心外之兩河遺民九州舊俗相與并力所助多矣使天下皆曰今天下有道如是金之人背盟失好偽齊之去順效逆虐困其民棄民久矣棄民則失助矧前日之舉起意於逆劉金敵為之助得利則歸功金人失利則為劉賈怨淮南之役既不得逞所喪又多自兹偽齊取疑於金敵矣主客相疑上下失助以舉事則於戰何有孟子曰寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣誠能孳孳於四者蚤正素定然後奮威諸路連衡以進決有成功若徒知目前追擊之利未知善後之大計言未卒將軍愀然改容低首自失逡巡避席再拜稽首曰韙哉非固陋之所能及不圖今日發醯雞之覆曉然識萬全之䇿也將軍既退元老三復沉思視倐忽而無見聽惝恍而無聞若戴雲氣乘虛無浮遊乎寥廓如見箕子告之以為武王陳洪範曰汝則大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同子孫其逢吉汝之所論雖得於千慮而單聞淺智昧於事機未可以為確論請獻諸天子參諸羣䇿質諸廟謀而斷自神算庶幾其可也元老於是如夢醉覺醒仰天而嘆曰亶哉其然乎非天下之至神孰能與於此僕不得而容其喙矣李參政邴對伏以逆臣劉豫敢肆姦謀外引敵師稱兵犯順人神共憤天地不容陛下神武惟揚聖心獨得親率鋭旅前駐大江股肱協謀將士賈勇曽未浹旬纍奏捷音敵勢即窮潛師宵遁天聲大振國勢遂強中興之功屬在今日猶復曲垂清問俯逮舊臣蓋將總衆智以為謀庶幾無片善之不録恭惟聖訓條畫如左戰陳之利有五一曰出輕兵二曰務逺略三曰謀將帥四曰責成功五曰重賞格何謂出輕兵關陜為進取之地淮南有保固之地由關陜可以窺河東由河東可以窺河朔河朔平則京東不取而自歸故曰關陜為進取之地有淮南外可以捍京東內可以保浙江故曰淮南為保固之地關陜雖利於進取然不用師於京東以牽制其勢則彼得一方而拒我淮南雖利於保固然不用命於關陜則彼得併兵而南下二者固相為表裏者也前日遣大臣經理關陜誠是然未嘗用兵於京東以分其勢故彼得盡鋭以挫於我今淮南之兵既捷矣而關陜之圖尤不可緩也或曰曷不經由宿泗以取京東耶曰由宿泗必用重兵命大將今統重兵者數人皆所恃以為根本若輕而置之偽境萬一有失利將不可復用然則遂置而不問耶曰非然也今偏將中如牛臯王進楊主史康民皆習京東風土熟其人情知其山川險易臣謂可略配以部曲三五千人或出由徐淮揚或出由宿泗彼土之民固吾赤子也懷纍朝聖澤涵養之久厭偽朝殘虐不道之政必有應者然後因其豪傑俾其自守因利乘便取京東可也勢有未可退保江淮可也則我得以擾敵彼將奔命之不暇而自困矣是謂我不動而分陜西重兵之一端也何憚而不為乎何謂務逺略用兵東京以牽制陜西用兵陜西以牽制東京固然矣陜西失地之後其何以復之曰因其勢而已光武以二千人敗尋邑百萬於昆陽虎豹皆股栗而却走勢之盛也苻堅以百萬衄於淝水聞風聲鶴唳以為晉師之至勢之衰也前日金人強盛天下莫與敵而我顯然怒彼以與之角彼不得不盡鋭於我今彼驕甚􅍀然有輕敵之心是我潛形匿勢示弱用竒之時也願詔關陜諸將毋張虛勢毋競小利蓄養士氣乘間阻險但務其小勝不必大勝也則馴小勝可以致大勝矣要之毋顯與之角而已然則朝廷前日遣大臣如何曰固嘗遣之也選任陟降之權殺生賞罰之柄此大臣之職非將帥所得預今雖有二宣撫其體尚輕非遣大臣不可關陜土地沃衍士馬強壯形勢利便號為金城百二他日復五路固守自當循秦漢之舊建都長安今日遣大臣非獨牽制京東亦所以為後日經畫也方今大臣如吕頥浩氣節高亮忠力慨然李綱識度廣逺威名素著必自簡於清衷願陛下於二人者擇其一起而用之必有以報陛下臣因論兵而及大臣非所當言然陛下詔臣以君臣無間則臣有所懷其可不盡陳於陛下哉何謂謀將帥今日淮南摧鋒陷陳之士亦前日所用之軍也何勇怯異耶蓋由陛下以身率之耳以此知強弱無定勢勇怯無常形惟人所為而已今諸大將下豈無智謀忠勇之士以馭衆統師者乎蓋用之未盡其才故未有以見於世也陛下即位之初韓世忠劉光世張俊威名隱然為大將又今有吳玠嶽飛者出矣但多得此數十輩參諸內外更出迭入何患兵勢不強哉臣願詔大臣於所部舉智謀忠勇可以馭衆統師各兩三名朝廷籍記遇有事宜授以廟略使專當一隊毋煩𨽻於大將矣則諸人競奮才智出成勳名為嶽飛吳玠之儔也何謂責成功常人之情莫不欲成功之在我勢有所壓則憤然不滿大將爵位已崇勳名已著難相統一今用兵可授以成算使自為戰而已可勿遣重臣臨之以輕其權而分其功也昔晉遣祖逖過江經略中原敗石勒復河南功垂成矣而晉遣戴若思權節制據其上流若思雖有才望而逖實不厭也因發憤而死前功盡棄臣嘗嘆息於此可為萬世深戒何謂重賞格曰今却敵退兵之後必論功行賞臣願因此詔有司預定賞格以頒天下小固不論也謂如得一邑一城一路十人長百人長千人長萬人長之類及近上首領自一命至節度使皆差次使足相當人人知我有是功有是賞則勸於用命矣昔漢高滅項籍最後楊喜等四人各得籍地以封夫滅項者良平之謀信布之力也豈四人能知哉適會其敗亡而殺之耳高祖封之如此其蓋示天下以不私所以勸後之用命者也况此出勇力以成功名者耶然則設王爵以待其功者不亦重乎曰果有是功何為不可唐郭汾陽李臨淮是也尼堪強盛孰與祿山之亂二聖播遷孰與川蜀之狩駐蹕江左孰與靈武之立是今日事勢尤艱於唐也第未有復中原之功果有之何愛於王爵哉守偹之宜有五一曰固根本二曰習舟師三曰防他道四曰講遺䇿五曰列屯戍何謂固根本建康古之建國山川盤絡漕運便利陛下欲圖中原必駐蹕於建康此不易之論也則江信為根本矣欲保守則失進取之利欲進取則慮根本之傷是何也千里饋糧士有飢色樵蘇後㸑師不宿飽今興十萬之衆深入敵境未能夷一城蹶一將而我已騷然坐困矣民賦固有常國用固有經未知國家何以給之此必窮民之力而後可也瘡痍之後果能任此乎故曰欲進取則慮根本之傷者此也然則遂不進取乎曰臣前所謂遣偏將更出徐泗以擾之是也然亦尚有説晉之遣祖逖也給兵千廪布三千匹不給鎧仗使自招募屯於淮隂始鑄兵器得二千人而後行其後既斬張平帝嘉其功運糧以給而道逺不至是兵器與資糧皆不取於晉也卒能勝強敵自河之南皆為晉有乃知古名將內必屯田以自足外必因糧於敵捨是則無以為也誠能慨然以功名自任如祖逖者舉淮南而付之使自為進取而不為虛內以事外則北兵不足勝中原不足復茍未有斯人也則前者輕兵之説自為不可廢是謂進取保固兩得而不貽後患者也何謂習舟師臣伏見朝廷下福建造船七百隻守臣經畫來上必如期而辦今既以長江為險則教習舟師乃今日之最急務臣聞某州某縣各置水軍五百名以橫海為名而未見其他措置也漢有伏波下瀨樓船將軍之號皆水軍之名也臣乞倣古之制創建此官以教習水戰俾近上流將佐領之自成一軍而專𨽻於朝廷無事則散之緣江州郡緩急則聚而用之昔曹操望見孫權舟船器仗軍伍整肅嘆息而去則舟師之盛望之足以威敵矣况其實可用耶臣又聞之海民舶船不動數月則生水蟲能蠧爛船底則無事之時又當為教閲之法每若干月日一教而寓勸懲之法既以習戰鬪亦以利舟船也何謂防他道己酉之冬金人自金陵渡江實緣吾本為避敵之計上下莫肯固守彼得以堂堂而來及其還也韓世忠以舟師遏於江上相持纍旬幾獲其敵帥彼虜掠雖多亦不得謂無所失也去冬淮甸既不得肆諸將輕兵迭出捷奏係道情見力屈潛師而遁則金人用師未有如今日挫衄者臣度他年入境懲創今日之失未必不由舊轍必先以一軍來淮甸為築室返耕之計以綴我師然後由登萊泛海以窺吳越以出吾左由武昌渡江窺江池以出吾右為多方以誤一處不支則彼得志矣淮南之師雖陽為築室返耕然沮洳之地其勢不能久淹將來固不足慮而此二途可為深虞者臣願預講左支右梧之䇿使不出吾素料彼雖出竒吾預知固不能竒矣何謂講遺䇿兵之形無窮故巧亦無窮守偹之具切意有未經講畫者昔賀若弼之攻陳也積荻於岸與舟同色陳人習見不以為疑其後牽舟以來而陳人不覺也此攻之詭計而我不知也魏之伐吳也吳人以車張席為疑城自石頭至江一夕而就魏人望之曰彼有人焉未可圖也斂兵而退此我守之詭計不可不知也古雖不用於今緣此類推之必有可預偹者願招臨江守臣凡可設竒以誤敵者皆預為措置寧設而不用事至而無偹則無及矣何謂列屯戍曰長江之險綿亘數千里守偹者非一譬若一身必有要害之處咽喉心腹是也今沿江州郡孰為心孰為腹孰為咽喉茍制得其要則用力少而見功多矣臣願差次其緊慢最處屯軍若干一將領之聽其郡守節制次緊稍緩處差降焉有事宜則以大將兼統之既久則習熟土風人情相諳緩急可用與旋發之師不侔矣如福建本因范汝為作過申世景屯福州今福人安之惟恐其去頻年福建盜賊不作未必不緣世景彈壓之故也雖沿江與福建事體不同然人情豈相逺哉措畫之方有五一曰親大閲二曰補禁衛三曰訂使事四曰講軍制五曰降敕榜何謂親大閲竊以陛下親統大師遂却大敵此蓋用高祖馬上治之光武身定大業之説其效既如此自今尤宜練習武事自古帝王皆有講武之禮則春搜夏苗秋獮冬狩在詩則車攻吉日在春秋則大閲搜於紅是也當承平且不敢忘武偹今日用武之際豈可曠而不舉臣聞諸將練兵異於曩時其挽強蹶張擊刺之技習熟既精纍經出入能趨走耐勞苦陛下誠因秋冬之交具軍容闢廣場會諸將明三令五申之制觀坐作進退之節取其才藝絶特者或賚以金帛或加以官爵以激勵之則將士感悅競其勇氣自倍於平時矣何謂補禁衛李德裕有言曰一天下之常勢北軍是也北軍者今之禁衛是也內以嚴衛九重外以鎮服天下其勢莫重焉建炎以來此輩更畨上下往復千里頓踣道路遺棄老弱小人不知忠義大節或有愁嘆形於言色明州泛海之役亦稍喧悖當時聚其儕類於諸州指使其實疏逺之也自兹禁衛愈單寡乃籍五軍以為重臣常寒心譬如蛟龍不假風雲波濤之勢而自托於山林失其所以為神矣古者天子自將兵韓信謂髙祖能十萬韓退之曰此軍千萬虎與貔天子自將非他師是也今陛下自將之兵幾何人哉若曰昔日慵惰不為用喧悖不循理是可廢也嗚呼是不幾於因噎而廢食者歟甚不可也臣願陛下擇忠實嚴重之將以為殿帥精補禁衛之缺增訓練之法使隱然自成一軍則天子益尊嚴國勢益安強其馭諸將也若臂之使指矣豈有尾大不掉之患哉三朝北盟會編卷一百七十三
