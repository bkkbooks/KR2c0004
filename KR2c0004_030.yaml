body:
  text: 三朝北盟會編卷三十宋徐夢莘撰靖康中帙起靖康元年正月十一日丁丑盡二十日丙戌十一日丁丑李綱沈琯與執政同議於東府南歸録曰初十日琯見李右丞言敵騎不過五萬能戰者止萬餘人太子營不及三千藥師常勝約三千騎諸營部兵聞止有三萬餘其過河者只有大半可以邀擊李綱曰待與諸公議遂留琯幕中十一日李綱與琯同入閣門續引至後殿少頃同赴東府見樞密耿南仲李稅等琯告諸人如告李右丞說李稅厲聲曰賢敢道金人不强若與戰决勝負否李綱曰不須如此怕他琯曰琯忘身弃家以圖其歸蓋上欲朝廷知金人不多可以擊爾至於戰鬭事非琯所敢知須臾李邦彥已下偕來琯復告之曰城下之戰社稷之安危固不可輕舉可待其歸以重兵擁其後必有全勝之䇿衆皆不答十四日庚辰皇弟康王少宰張邦昌使於大金軍前給事中李鄴為計議使右武大夫髙世則副之賫和議誓書送伴蕭三寶努等同行朝廷和議誓書云契勘太上皇與大聖皇帝浮海結約欲卜萬年偶因手詔平山張覺招納叛亡至使歡盟變為兵革遂致大金數路興師今太聖皇帝次子郎君并知樞密院事李稅等赴議軍前引過乞和正月十日乃承議計使賫到文字大開容引備諒純誠拯救生靈重結盟好載惟恩義深感劇悰今戒攸司悉從定約太上皇與大金大聖皇帝義同兄弟今來回書當依契丹舊例禮從伯姪施行已許放黃河更不為界可太原中山河間府一帶所轄縣鎮分畫疆至係自大金後比至立了疆界也其已前于內别有變亂處所當朝自應管擒制交送至於尺土一民不令侵犯招納若是與三府以南州軍犬牙出入不齊去處臨時兩平兊易應自亡遼播越之時北界流離向來併係大金叛亡諸職官工匠教坊百姓除元不曽到并已死外應見在並盡數遣還在京令逐前去在外接續發遣一無停匿殘害錯失除自來各交金銀匹帛並雜物折納决無粗惡愆期斯言之信金石不渝有違此誓神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行逺冀英懷永同重誓伏惟照察謹白初金人講和要一親王為質朝廷議從其請上召諸王曰誰肯為朕行康王越次而進請行康王英鋭神武勇而敢為有藝祖之風將行密奏於上曰朝廷若有便冝無以一親王為念既行邦昌垂涕康王慨然曰此男子事相公不可如此邦昌慙而止沈琯與李綱書論金人兵虛實沈琯短書投綱某自燕山拘執而南陳講和之議意在脫歸言其軍實今天與之幸偶而歸逹區區之忠因右丞歸以上聞似可以無憾矣雖曰後時尚有圖者彼言國相自太原入河西自鄜延入不知二道能遏之使不前否二道既不能進則此猶可者也城下之戰固不可輕議待其回腳數路要之前不得還後以重兵擁之可一舉而殱之彼之難聚者兵調發半年止得如此若盡滅之數十年間未能再舉若使之還其禍未已彼之難得者馬前日入燕不滿萬騎得常勝三千匹路中所掠不下三五千匹今又以二萬匹與之不可敵也彼之所乏者金載之而歸竭吾帑藏又取於民不足以充其欲二者之外又割吾要地其禍可勝言哉今日彼之兵數不多必不若契丹犯澶淵之時是時景德春秋乃未及聖主之盛一時宰執皆欲避之陳堯咨數人皆欲之金陵獨冦萊公决䇿勸之親征一戰而勝今城下之戰計社稷之安危不可遽急至于後圖亦不可緩右丞忠憤之氣衆所共聞實天以賜我宋豈不能為冦萊公哉某凍餒踰月脫死而歸魂未集體無僕無馬筋骸解散不可以步釐此以代靣陳幸不以人微言輕忽又陳三事一曰某昨日步歸憩於茶肆聞諸人咸有欲戰之心但不令出爾此固未易輕舉然人心可見今早又聞昨夜城外小戰與其小戰不若更多與之人馬在外以待之二曰金人之所以有鬭志者意在於金帛既與之彼却有愛惜之心吾之將士要而奪之以求為軍賞則我之兵欲鬭之志如破竹之勢矣三曰金人不多用兵之時當分頭掩擊以分其勢是日晚綱遣人相召琯力言金人可破之狀兼今日客主之勢不同多寡之數不侔若令遂歸既無傷折又厚有所得異時人人敢來也割地之後彼據要害我反為客燕山雲中一二十萬之兵不知何以禦若果欲與之戰不可失此時我重兵擁其後河壖而掩擊之以西兵自懷衛入駐濬州之北當其前召大名德慱興仁潞南兵由德慱渡河於邢趙之間等截間道遣人密約河間真定中山雄滄會兵於滹河之北迎戰當使匹馬隻輪不返若云姑與之更圖後舉此妄論也今既與之大事去矣後不可再舉必敗須便甘心為江左之事右丞能以决䇿立聖主又能止之使不遷蓋天以右丞賜我宋今日之事何不以死爭豈能作執政而遂愛惜也綱言公之言宗廟社稷大計與綱無不合者但有掣肘處亦少有所待答曰願力為上開陳斷不疑而速行之免後時噬臍次日又以七事獻綱一曰十三日詔出恐所割州府不肯聽從指揮守臣交割竊恐守臣亦有畏懦全身保家之人奉詔弃城而走密竊遣人令合兵以戰二曰楊志昨在燕曽受髙托山極賂志貪財色今聞在軍可說之要擊三曰聞西兵有至者出兵不可緩金人過河日馳百里縱使之歸昔撫定燕山之時亦遷延不去大兵既近燕城蒼黃而行輜重金帛盡為張覺取奪此機不可失四曰大兵擁敵過河止以萬人弓弩守北岸五曰大捷之後全軍受賞其搴旗斬將有功者統領者别行保明優與推恩六曰金人兜鍪極堅止露兩目鎗箭所不能入契丹昔用棍棒擊其頭項面多有墜馬而得之欲令騎兵半持棍棒七曰郭藥師將騎兵三千劉舜仁領兵二千隨行今若以重兵擁之過河前又有兵截等其勢甚危因密令人說之以藥師為燕王以舜仁為平王許其世襲自置官吏嵗賜官帛兼令其背金歸朝事自有濟塗中聞常勝恐由澶淵德慱入滄過河歸燕山當須兩道遣人候之不可後也拆上元鰲山散給軍士新火上皇時常以十月結架鰲山至正月十四日了畢所費綵帛巨萬計比上元燈後則頒賜內侍率以為常及是乃拆之衛仲逹張勸特除名勒停臣寮上言竊見國家多難侍從官義當體國乃者營私謀已圖去朝廷者十已三四班綴空然衆目駭視訪聞禮部尚書衛仲逹素與趙良嗣狎昵無間今者忽稱病乞假遂携家以行工部尚書張勸身為八座乃求淮南幹當公事而去按仲逹勸皆憸侫不才平日叨竊榮寵當急難之際傾搖人心為避兵之計理不可容奉聖㫖衛仲逹張勸特除名勒停令開封府差人追捉前來聖㫖今後金國稱呼只以大金為稱合用國字者依自來體例施行更不得以金國為稱十五日辛巳斡里雅布回奏并書曰大金都經略處置使兩路都統斡里雅布正月十四日太宋皇帝遣使降到誓文大開詳審推見聖意勇于改悔求踐舊好叙定兄弟之義卜于萬代更不渝變斯乃社稷生靈之福也當司深為感切遽解重圍收聚兵馬鈴束將校更不令驅虜殺戮既復舊約欲成長久竊慮嵗輸物稍多難以經逺施行兼奉宣命若能悔責委酌中理會今又减于一百萬貫常年只納一百萬貫文折物并銀二十萬兩絹三十萬匹仍為今嵗分撥疆至事忙直候來年正月依應舊例交納如交割結絶之後茍有違變神明得殛俾墜其師伏乞照察謹奏書曰大金皇子都經略處置使斡里雅布上書於大宋皇帝闕下今月十四日賜到誓文暨皇弟康王并少宰一員至仰體聖慈深增倍喜事茍不然其如社稷生靈何安今既轉禍為福重踐歡好惟望貴朝不失農事早令當司兵馬無稽駐泊益彰至德當司已鈴束逐處軍兵更不令驅虜殺戮所有國書再立盟約乞賜盡言遣差使將擎來詣當司待憑發遣赴闕即目一見康王便如兄弟相次事過即時遣還願勿憂疑更有但係亡遼契丹奚海渤海雜類人等無令劫掠傷民早為交割今月十一日夜南方天氣赤直至天明詳其分野正臨都邑能盡至誠大信反身修德必抵消禳緣念義同一家别白奏逹謹上聖㫖應有官無官諸色人曽經賜金帛各據前項所賜修數自陳官如敢隱數許人告犯重行斷遣尚書省直取金銀指揮奏聖㫖仰聶山何㮚周懿文李光只金直取楊球張補姜堯臣李宗保張師賢宋輝李宗振董庠下項逐家金銀於元豐庫送納趙元奴李師師王仲端曽經祗應倡優之家并蕭管袁陶武震史彥蔣翊三人築毬郭老娘逐人家財籍沒并內侍省官道官樂官曽經入內醫官輦官幕士忠佐并應曽特賜金帶許繫金帶人並行陳納若敢狥情隱庇并轉為藏匿之家許日下自首如違並行軍法諸色人所隱藏之物以半充賞十七日癸未捉敗細作先有燕山人推獨腳車子其中皆載兵器自是連日大索細作不絶或有急走者面黑者誤遭毆擊至有死者羣惡不逞往往乘此劫奪行路但云是細作即擒送府驗問非是乃釋之亦不加罪妄捉之人如是數日乃揭榜禁止十八日甲申大風雪時圍閉旬日城中食物貴倍平昔窮民無所得餓凍死者枕藉於是朝廷復遣致使問於金人軍前朝廷賜書書云大宋皇帝致問大金皇帝郎君荐承使介特貺書詞披覽再三深諗勤意比者復修盟好休兵息民皆自周旋深感戢示諭依准大金皇帝宣命施行恩從聖造事靡已為益諒髙懷尤彰謙德更承念及耕農重事罷去所索牛一萬頭誠忱備至義同一家固當傳之無窮永以為好春律尚寒倍惟珍嗇謹白又賜沉香山子一百兩花􅙈酒盤十一隻玳瑁酒瓶二隻撥花犀注碗一副十九日乙酉上御宣德門撫勞王師平陽府義勝軍作亂叛歸於尼堪初談稹為宣撫也募燕雲人為義勝軍散居於河東諸州其在平陽府者劉嗣初為河東路兵馬鈐轄以統之有衆四千河東人呼義勝軍為投附人太原府受圍有談將自太原城中出至平陽漏言欲盡殺投附人于是義勝軍皆不安漸有語喧閙嗣初見平陽冨盛有欲得之心既知太原被圍遂有叛意一日嗣初見知府宇文時中白其事曰嗣初山後人纍世不幸陷于契丹者幾二百年今重不幸又為金人吞滅使我前主契丹喪其社稷而嗣初亦傾覆其家遂得歸朝今一行部曲與嗣初同視金人為仇讎也金人方造釁用兵國家以兵應之使投附人效死于陳前以報金人之讎深所望也竊聞欲盡殺投附人不知何故時中驚愕曰無此乃命出榜敢有撰造語言者立賞告捉自此投附人亦私為之備投附人先在城外下寨不與州縣通嗣初自起爐打造軍器置槍棓殘編及拾麻鞋底穿為甲隂勒行伍未幾時中罷去通判王某以權府事有百姓王存受雇于嗣初為么喝人既知其意先一日詣府告嗣初與投附人將亂者王某務欲安嗣初等乃决脊配三人本府牢城且報嗣初云有撰造語言已施行訖嗣初以本部皆是義勝軍唯么喝三人乃平陽府兵士既發露其情愈不安又知折可求敗事乙酉黎明率衆入先登城占城城中軍民有以弓弩射之者義勝軍以手張氊禦箭既而城中奔亂嗣初縱火王某及州縣官皆出城走走不及者為嗣初所執嗣初縱掠金帛次驅虜男女次驅奔牛馬次取驢猪羊盡殺為脯臘科磨户破麥為乾糧凡十餘日以其衆歸尼堪尼堪大喜而王存于神仙界見王通判言你不信我言反杖一百今日壞了一城人性命你却還他鼓倡諸人將王倅併家小盡殺之其歸朝人老小在州縣者受折可求移文悉行誅戮二十日丙戍斡里雅布回謝賜上奏云差去使人王汭至伏䝉聖慈賜回到沈香山子花犀玳瑁酒器并竒獸珍禽等斡里雅布無任感恩望聖激竊屏營之至謹奉書奏謝以聞謹奏京畿河北路制置使种師道及統制官姚平仲以涇原秦鳯路兵至京師師道承召命未起以為金人必不敢渡河亦未必有如此事雖起行唯日行三十里不廢逰獵中途遇統制官姚平仲自燕山戍歸有騎兵三千步兵一千師道以便冝檄取兵之命遂與之俱來未至上遣開封少尹田灝中使裴誼陸舜舉促之師道至西京而斡里雅布已至闕或曰敵勢重而我以輕兵犯之必敗四方勤王之兵遂將解體不若且駐泛水以圖全勝師道不然曰吾以微兵遲回不進形見情得祗取敗焉賊孤軍深入日虞援兵之至也今若徑去彼自莫測苐使一騎到京師則京師之氣自振矣師道遂行先遣二十騎全裝披帶封蠟書上奏二十騎者疾馳到京城逄金人逰騎四出是二十人者馳馬犯之逰騎知西兵退走二十騎至城下叩城上蠟書京城人知勤王兵至歡踴氣增十倍師道至命開安上門遣尚書右丞李綱迎勞而宰相李邦彥降敕付師道曰金人和議已定敢言戰者族或謂金人寨于城之西請嚴備以入師道不從肩輿入京師是夜與宰相同入禁中見上於福寧殿奏曰臣不知京師有如此急又度必無此事故來遲今臣在此陛下不須憂也上再慰勞問計將安出師道奏曰臣以為􅊰和非計也京城周圍八十里如何可圍城髙十數丈粟多數年不可攻也若於城上劄寨而城外嚴拒守以待勤王之師不踰旬月敵自困矣然業已講和不可止金銀不足請以見數與之如其不退乃與之戰且四鎮之地內保州乃宣祖陵寢所在不宜割與上乃令師道與邦彥于政事堂共議其事師道見邦彥因曰某在西土不知京城堅髙如此備禦有餘當時公何事便講和邦彥曰以國家無兵故不得已須和耳師道曰凡守與戰自是兩家事戰若不足守則有餘京城之民雖不能戰亦可使守但患無糧食茍有餘京師數百萬衆皆兵也何謂無兵邦彥詭曰素不習武事不知出此師道笑曰公不習武事豈不聞往古攻守事乎又曰聞城外居民悉為敵殺掠畜産多亦為敵所有當時聞敵來何不悉令城外百姓撤去屋舍畜産入城遽閉門以為敵資何也邦彥曰倉卒之際不暇及此師道又笑曰好慌左右皆笑曰公等文臣腰下金帶不能自守以與金人若金人要公等首級如何邦彥不能對又曰京師如此之闊敵兵只十數萬何能圍匝無故四門都閍則敵人得以縱掠而吾民困矣上加師道檢校少保同知樞密院事遷宣諭使明日金人使王芮來其禮稍屈上顧師道笑曰彼畏卿故也方諸門盡閉師道命開東壁南壁門聽民出入如常人情賴之以少安又請緩納金幣禁逰騎不得逺掠俟其惰歸扼之于河當使匹馬不還上皆是之師道受命出巡城語所親曰敵易破也但劄連珠寨對壘使不得虜掠則敵糧匱乏便可進兵更使兵將臨河設伏俟其半渡擊之此萬全策也一日師道令驍勇數輩出城得金兵三人至則令言軍中事其一不肯言師道令斬之又問其次遂恐懼明言軍中事其一破其腹以驗所食之物腹中唯豆耳師道語其衆曰敵糧已匱可以殄滅乃遣一人還軍中使道其事敵軍大驚于是决意求和詔差中書侍郎王孝迪收簇金銀詔曰金國犒軍金五百萬兩銀五千萬兩錦帛牛馬駝騾萬數浩瀚雖竭神御乘輿宫禁王府主第宫觀寺內外百官士庶人等金及三十餘萬銀一千二百餘萬又送以服御犀玉腰帶真珠寶器女樂珍禽香藥茶錦綺酒果之類并以祖宗以來寶藏珠玉等物准折緣數萬金銀未敷不肯退軍已差中書侍郎王孝迪再行收簇布告中外咸體兹意榜曰中書侍郎傳領收簇大金國犒軍金銀所今月二十日奉聖㫖大金國兵馬攻城其勢甚急朝廷為宗社生靈遣使議和須藉金帛以結盟好金國要金五百萬兩銀五千萬兩今來所斂金銀上自宗廟宫禁乘輿服御之物盡行剗刷止得金三十餘萬兩銀一千二百餘萬兩尋津置前去大金國見其數未足復遣使人諭意難為退軍兼恐兵衆犒賞不均必致怨怒却來攻城男子盡殺婦女驅虜屋宇焚燒金銀錢物竭底將去今來既無所出遂將前後所出黃榜并行拘收别出榜文訓諭朝廷愛民憂國之意仰自今月二十一日為頭應執政侍從宗室外戚內侍官橫行並許權繫犀帶將金帶納官仍將逐人在家金銀盡數赴逐庫送納外其餘士庶諸色人並仰于兩日內罄所有金銀立便送官如有藏匿寄附送納不盡之數限滿並許諸色人告論雖于法許相容隱人亦許陳告並依所告之數三分之一充賞告及金一萬兩銀十萬兩除告賞外與承信郎如親鄰知情不告告而不實以其罪罪之今來除指揮事係急切若因金銀不足和議不成遂致家族不保雖有財寶何所用之仰士庶體認朝廷愛民憂國之意疾速前來送納候事定日等第推恩所有金銀稜道並與免納今具逐處庫分納下項州南左藏庫納州北元豐庫納州東都茶場納州西榷貨務納右出榜曉示諸色人如有乞覔並依軍法施行都人讀榜見金銀不足則必致怨怒却來攻城男子盡殺婦人驅虜屋宇焚燒金銀錢物竭底將去又言家族不保雖有財寶何所用之讀之者莫不扼腕唾罵靖康前録曰王孝迪領簇合犒設大金國金銀所出榜籍士庶所有之物謂如此則免吾民肝腦塗地不然則男子殺盡婦人虜盡宫室焚盡金銀取盡其辭乖謬不可具言人謂之四盡中書以比李鄴六如給事种師道姚平仲兵至李綱上奏乞令師道平仲聽節制傳信録曰奏上曰勤王之師集者甚衆兵家忌分莭制歸一乃克有濟願令師道平仲等聽取莭制上降御筆曰師道老而知兵職位已髙與卿同官替曹䝉可也蓋上意欲與師道為親征行營副使余竊歎上裁處之當而宰執間有密建白以為不可者上入其言于是别置宣撫司以師道簽書樞密院事充河北河東京畿宣撫使平仲為宣撫司都統制應西兵及四方勤王之師並𨽻宣撫司又撥前後軍在城外者屬之而行營司所統者獨左右中軍而已上屢申勑兩司不得侵紊莭制既分不相統一宣撫司所欲行者託以機密往往不復關報余私竊憂之自金人議和誓書已行之後朝廷日運金銀幣帛之屬輸其軍中名果珍膳御醖之餉使者絡繹冠蓋相望上又出御府珠玉玩好寶帶鞍勒以遺之品數甚衆其價不可勝計余每嘆以謂賜此不足以為德適所以啓敵心雖上恭儉視珠玉如糞土然彼既生心何厭之有衆方稱上德不以余言為然金兵益來須索無所底止也至求妓樂珍禽馴象之類靡不從之及勤王之師既集西兵將帥日至上意方壯又聞金人虜掠城北屠戮如故而城外后妃皇子帝姬墳墓􅑼殯發掘殆盡始赫然有用兵之意余贊上曰易于謙之上六稱利用行師征邑國師之上六稱開國承用小人勿用蓋謙之極非用利行師不足以濟功師之成非戒用小人不足以保治今陛下之于金人屈己講和其謙極矣而金人恃强無厭之求愈甚其勢非用師不可然功成之後願陛下以用小人為戒而已使金人有所懲創不敢有窺中國之心當數十年無烽燧之警不然一日縱敵數世之憂未艾也通判絳州軍州事徐昌言殺義勝軍中興遺史曰平陽府義勝軍亂之次日報到絳州絳州有義勝軍四千人將官牛清統之清山後人粗率勇悍通判徐昌言謂不先圖之必有平陽府之變乃白于知州李元逹請先為之備元逹本儒生不知時變不從昌言與幕職官苦言之元逹不得已請昌言一靣措置昌言以教閲為名開甲仗庫令官軍帶甲整葺軍器時清下寨于東門外是日昌言出其東門方轉五鼓自南門北門出兵轉城以趨其寨又令民兵悉上城之東壁令之曰聞戰聲則助其聲勢昧旦兩門出兵皆叩其寨即斬關以入直造清之寢清夜飲方醉與數婦人寢聞難取器械不及窘甚被執于是盡殺投附義勝軍城中民兵登城東壁呼噪以助其勢投附人盡被誅戮諸州聞絳州之事乃皆殺投附人昌言字獻可衢州人統制馬忠以勤王兵至京師熙河路經略使姚古秦鳳路經略使种師中及折彥質折可求劉先國楊可勝范瓊李寶諸路勤王兵至京師諸路勤王兵號二十萬到京師人心稍定三朝北盟㑹編卷三十
