body:
  text: 三朝北盟會編卷八十五宋徐夢莘撰靖康中帙起靖康二年三月十日庚子盡十六日丙午十日庚子中書舍人李通還舊職權戶部尚書胡直孺免權職金人攻興仁府濮州十一日辛丑張邦昌宴金人於禁苑范致虛兵潰於千秋地場致虛遁走遺史曰范致虛在陜州也前軍出武關由鄧州新興澠池之間屯於千秋地場為河南尹髙世由告急於尼堪亦會金人將欲回軍羅索貝勒自佐陽直衝之王師不備遂棄輜重而奔死者幾半致虛恐懼而遁編年曰范右丞前軍屯於千秋鎮先是金人聞范右丞統勤王師二十萬前來尼堪謂將曰我聞范致虛一儒者爾不解用兵可明斥堠使三千人破之必矣至是果為金人所敗諸路兵大潰唯鄜延帥張深與劉先世自汝州路趨京東路去范致虛掠潰兵復走入關興仁府統制官張換敗金人於興仁府閭邱升敗金人於濮州孔彥威敗金人於開德府編年曰初十日金人一頭項自宛亭前來至興仁府城五里劄寨辛丑金人向城進兵黃潛善遣統制官張換部領軍兵占據地利迎敵遣丁順孟世寧分作左右翼設伏掩殺射中金人旗頭龍虎郎君落馬即時擡舁引兵退去又一頭項入濮州城下閭邱升遣人馬出城迎敵金人退去辛丑又見陳各有殺傷是夜五更拔寨退去又一頭項自衛南入開德府金人以其衆列護城隄外宗澤先令統制孔彥威占兵劄寨交兵至申時間金人退去辛丑復來見陳澤又遣權邦彥下冀州與彥威併力掩擊是夜三更金人拔寨退去十二日壬寅張邦昌手詔偽楚録曰豫以寡陋近迫大國俾救斯民于兵火而諸公橫見推逼不容自裁忍死以理國事豈其心哉顧德弗類實難稱塞出令之初有司乃以聖旨行下載循昧陋殊震危衷夫聖孔子不居則豫豈敢自今與三省樞密院議定處分及內外官司面承得旨事稱面旨內降及批出文字稱中旨遣官傳喻所司宣旨洪惟非常之變適遭會於斯時尚兾有永之圖訖敉寧于區夏庶幾多士共識此懷金人曉諭諸路版契勘宋之道君少主皇后妃以下並已北遷應文武百官僧道耆老軍民共議荐舉堪為人主者一人却準文武百僚僧道耆老軍民同知樞密院事孫傳等狀乞自元帥府推擇賢人永為屏藩又乞於軍前選立太宰張相公以治國事者行府會驗本官乃去年同康王為質者也既許尋舊好之後竊弄精兵夜犯寨營官兵接戰即時破滅以其敗盟遂臨京城將臨進攻本官哀泣曰身為宰執出質軍前而不意犯於不虞罪當萬死然主上年少蒞事日淺蓋緣姦臣所誤且乞緩其攻擊因遣使語之少主趨迎使人泣而謝罪及至和成乃復從軍北行以北州縣或有不降每欲進擊必自求哀往往有可愍之意及重兵再舉又乞遣使理會雖威之鋒刃不避也欲引而南進曰豈有大臣躬親出質不能戢兵以致交惡而同敵人忍觀其伐主也頭可斷身不可去破城之後驛召而語至及廢國之際號泣劈踊涕泗交流告乞再造既不見容或以腦觸柱或以首投地幾至自絶乃知忠孝剛毅出於其倫忽聞推戴果得此人然恐難奪其志洎在京百官差到翰林學士承旨吳幵翰林學士莫儔齎狀勸請曰聞建邦立都必立君長制國御俗允賴仁賢恭以大金皇帝道合三光化包九有矜從諸夏俾建列藩翰契勘雖不許存立趙氏既擇賢人以主兹土則於國民為亦已深矣伏惟太宰相公名髙今古學通天人位冠冡司身兼衆美碩德偉望蚤羽儀於百工嘉謀赤心久勤勞於三事敢望以蒼生為憂而不以細行自飭以機政為慮而不以固避自嫌上體大金擇立存撫之意下副國人推戴為主之望及别有狀申行府今文武百僚僧道耆老軍民人共請太宰以治國事竊恐别有辭避伏望元帥府更賜書請本官早從輿望尋請知樞密院事漢軍都統制劉侍中彥宗禮部侍郎劉思應奉御前文字髙慶裔同詣具導其由勃然奮怒曰國雖破在臣子之分豈容聞此由以先防備不獲自絶然而閉目掩耳背立偃蹇終不為聽但罵文武百僚曰以諸公畏於兵威置我于賊亂之罪寧甘心死於此不可活矣彼以耻後世篡奪之名也然行府以軍國務重不可久曠尋保申奏今降到寶册禮以璽紱册命為皇帝以授斯民國號大楚都於金陵自黃河以外除夏國新界疆場仍舊世輔王室永作藩臣其間志氣屹然不動雖多方勉諭以事在已然雖死無濟何如就册用救生靈猶不飲食幾至滅性遂擁迫入城乃有在京官僚僧道耆老等共集力請於天會五年三月初七日方受册命諸路軍民各令知悉邦昌與二帥書乞親詣致謝書曰大楚皇帝邦昌謹致書於國相元帥皇子元帥今月七日伏奉皇帝聖旨特降樞府加臣封册退省庸陋之姿何以對揚休命前此固嘗死避終不獲辭載惟選授之初盡出薦揚之賜尋因還使附致感悰願亟拜於光儀庶少申於謝禮未聞台令殊震危衷遂遣從官具數勤懇重蒙鈞諭仰識眷存然而淹日未前撫躬無措恐有失於稽緩實深積於兢惶伏望恩慈早容趨詣俟承報示徑伏軍門拳拳之誠併留面敘不宣謹白二帥答曰具位謹致書于大楚皇帝闕下向承明詔擇立賢人爰及士庶之謀已諒英聰之德具聞天闕優降册書禮命恭行羣情胥悅未遑伸于慶祝不圖辱於華緘幸容先導微悰繼陪髙論今差崇祿大夫兵部尚書髙慶裔彰武軍節度使李士遷充慶賀使副有少禮物具諸别幅專奉書陳賀不宣謹白别幅衣著一百二十假馬四匹金人委開封府再敷配金銀表假遺史曰金人移文督責金銀表假元數十分未足一分仰開封府在京坊巷見在人戶等敷配限三日納足以不伏之人全家押赴軍前先是城陷之初金人索在京户口數時開封府尹張大其事報七百萬戶尼堪詢之李若水亦以此對金人見京城戶口之衆意欲七百萬户盡行敷配所得不可勝計故令將坊巷人口等第敷配開封府奉行莫敢論辨乃以見在隨髙下配定欲敷元數故雖細民下戶亦不下金三十鋌銀二百鋌表假五百匹家至戶到揭榜門首督責令日下送納京城士庶雖知所配無規然事出於衆但相與戲謔而已云借使變甑釜為金銀化屋宇為表假亦豈能如數督索甚急小民應之如不聞官司亦無如之何宗澤以戰車趨京師遇金人于南華敗績澤微服走統領王孝忠中箭身死知博州孫振為亂兵所殺遺史曰初劉浩在相州得戰車法創造五兩試之不可運業已造成浩謂磁州宗澤好作為輕聽信及告假往磁以戰車紿曰是車造一百五十兩每一兩以二十五人守車二十五人為左角二十五人為右角二十五人為前拒共四隊凡一車用一百人車一百五十兩共用一萬五千人願與直閣為先鋒收復真定具畫車陳並所用人數陳隊為圖以獻澤喜之問浩所欲浩言所闕者衲襖耳聞磁州甚多請隨意之所欲數副澤資給之而去澤遂以浩所圖車陳稱見造成車一百五十兩已募到民兵一萬五千人結成車隊謀欲收復真定奏聞降付朝廷壯之取旨除澤祕閣修撰河北民兵總管初實無一人一車也及元帥府分遣澤往開德駐劄乃用浩車制旋治之澤以開德城下之戰金人敗去謂金甚易與耳壬寅領兵推戰車追襲欲徑入京城下解圍至衛南之北逢見金人伏兵接戰金人佯敗向東趨南華縣澤追至南華遇金人兩頭掩擊官軍大敗戰車大而難運推駕之者苦之一旦遇倉卒皆委而走澤變易衣服滚隨敗軍隊中夜奔走得脫先鋒王孝忠中箭墜馬死知博州孫振領兵至中路聞澤敗績親兵懼與金人接戰且懷鄉土遂殺振乃取軍實散而北歸金人取戰車盡載軍實而去中興記曰宗澤權邦彥同在澶淵約同與深州守臣姚鵬同入鵬未進兵澤邦彥自南華入遇敵騎卒至西將王孝忠死澤邦彥更士卒白布袗草履夜走姚鵬軍澤所製戰車五百兩使兵棄車走車為敵所得以載城下所獲金銀歸北中孫傳之父守博州將兵屯濮州受澤節制是役墜馬死後建炎初河北寇皆澤麾下潰卒也十三日癸卯令卲溥同所差郎官四員管南薰門下交納物色吕好問且權領門下省職事工部侍郎何昌言改名善言避邦昌名也鮮于可朱震致仕十四日甲辰邦昌遣使書於軍前懇免征催金銀偽楚録曰書曰比以昌膺縟禮願展謝悰雖厯貢于忱辭終未親于台表退增感悚豈易敷陳載惟草昧之初實軫阽危之慮民志未定顧未有以得其心事緒實繁念將何以息其動前朝昨奉台令取索金銀表假以充犒軍伏自入城以來講究民間虛實乃聞罄竭悉以傾輸嗣位之初朝夕祗畏戒諭官吏罔敢弗虔仰荷大恩本不論報雖割肌體豈足能酬然念斯民困弊已甚當圍城窘急之久有比屋餓莩之多顧撫養則無資以厚其生欲賑給則乏糧以續其命而催科正急刎縊相尋若閲日稍淹則所存無幾非仁何以守位非民何以守邦坐觀轉壑之憂不啻履氷之懼與其局天蹐地莫救于黎元孰若歸命投誠仰祈於大造伏望察其懇迫賜以矜容特寬冒昧之誅誕布蠲除之惠則始終之德遂全億兆于死亡報稱之心敢悼一身之靡潰期於沒齒以答隆恩不報宗澤遺書范訥趙野責其退屯遺史曰范訥為河北河東宣撫趙野為北道總管皆退屯南京宗澤遺書與訥曰太傅是朝廷重望大臣凡所舉措為天下輕重為四方軌則今以河北河東宣撫乃擁兵自衛紆回退縮駐札南京是耶不知太傅晝思夜度謂人臣子果如是耶若以周旋無非合於義理伏乞指揮開于道路濟以糧斛令江淮以南州軍皆得自進勤王去京城二三里札寨示金人以天下歸嚮激切之意庶敵懲戒無有後難不勝幸甚又與野書曰京城圍閉日久君父注望四方應援想不啻飢渴也資政北道大總管乃將大兵自衛紆回曲折走南京駐札蔽遮江淮之人俾不能進前固護王室則朝廷何賴于屏翰伏望早賜指揮進發前去京城二三程札寨示金人以天下人心歸嚮軍民怨切願瞻天表之意庶幾金人畏恐下城遁去末由參侍不勝拳拳憤悱激切之至十五日乙巳邦昌往青城見二酋致謝邦昌是日出軍前見二元帥致謝既至迎接殿下相揖以升致賔主之禮酒三行面議七事如不毁宗廟趙氏陵寢減金帛數存留樓櫓俟江寧府修繕畢日遷都之類皆允邦昌令百官庶務依舊修飭職事偽楚録曰邦昌令百官庶務依舊修飭職事國子祭酒學官等奉行不敢懈怠曉諭諸生須管置課册假厯簿書等又報鎖院補填及私試諸生無有應命者十六日丙午趙子嵩申大元帥府札子子嵩近具狀申稟乞早下嚴令約束諸將定日赴闕本府遣四頭項已于初八日復扶溝十一日復太康見今審度今月十六日忽收到快行節級趙進所説青州之事供具稍涉虛妄甘當處斬文狀其言皆臣下所不忍言痛徹五內殞絶無所既不敢謄申行府又不敢默默云二聖二后二叔諸王卿相自正月十日皆出并家屬至敵寨恐旦夕北去萬一渡河則不得復回又云三月六七日有偽立者似是向來與大王同使金之人而南京闕報汴水初八日忽滿皆可疑者惟望大王力振軍勢遣師要擊河上迎請兩宫再安宗社問罪僣逆不可猶豫猶豫之間變故生矣國之存亡在此一舉若有獻議擁兵南渡似未可聽大王麾下盡是西北人孰肯渡江渡江之後中原豈可復取莫如四近舉兵要擊先遣問罪僣逆最為上䇿子嵩此州危如纍卵萬一偽檄有死而已半年城守粗著微效今敵幸去若僣偽見攻勢不俱生伏望大王憐憫同姓係纍而去所存無幾如某輩粗有知識荷國厚恩必能用效蓋今日臣下往往擇利非大王力宣國威則二百年基業將如何哉告大王更審問探若果如此勢不可緩仍乞多與疑書以壞契丹燕雲從敵之心多收此曹以為我用則轉禍為福狂瞽僣易死有餘罪子嵩不勝泣血哀鳴之至三朝北盟會編卷八十五
