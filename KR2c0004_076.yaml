body:
  text: 三朝北盟㑹編卷七十六宋徐夢莘撰靖康中帙起靖康二年正月十七日丁未盡十八日戊申十七日丁未駕在青城太學生汪若海上尼堪書太學生汪若海謹披心腹露情素獻書於大金元帥聞之知天者可與論安危之計天道甚逺人心可卜往者天將有警於宋是興燕雲之役以假手於大金我上皇天命是畏惕然內禪於是大金乃戢干戈乃申盟好我實懷惠賂以名都我寡君朝夕恪勤奉以忠信不敢有怠惟是一二庸臣輕議淺謀肆其愚衷以眩惑我寡君之耳目是用再辱軍師之臨恭惟大金既併契丹又服我宋有以見元帥之勇料敵無遺百戰百勝有以見元帥之智城邑望降迎刃而解有以見元帥之威功振天下光臨鄰國有以見元帥之名破人之城不恣屠戮其誰不歸仁堅皇上之約成我寡君之孝其誰不與義勇智所以行世而武不可黷威名所以張國而勢不可必仁義所以成德而獲天人之助何謂武不可黷物致則反冬夏是也智至則危纍棊是也是以古之善用兵者必觀大極究數而止用能保世以滋大如或不然則殺人之父孤人之子頭顱相屬暴於橫野天安得而不厭哉此所為元帥懼也何謂勢不可必元帥之於中國也有令必行者有令不能必行者戰必勝攻必取此令必行也因號四方曰爾無叛則令不能必行也何者天下非一人之天下也人君不足以自存匹夫可以成帝業是宋不得而事大金則大金不得有河北也所謂為元帥懼也何謂德獲天人之助元帥誠能無驕智勇保守威名黜攻伐之心肥仁義之德則人心知歸天道必喜此所以樂為元帥道也然抑嘗聞之富人之牆壞其子曰不築且有盜其鄰人之父亦曰不築且有盜暮而果失盜富人智其子而疑鄰人之父今某之於大金也相距數萬里惟是風馬牛不相及則其迹踈於鄰人之父而元帥左右腹心之臣親於富人之子某乃敢飾小說以觸雷霆之怒誠不自量雖然為宋人解倒懸之勢而為大金立不拔之基事有相當理有適然何者且夫元帥智勇若是威名若是大功既立大效已著蒼天在上必不食言焉然而區區切有疑者寡君越在草莽中萬姓摧心折肝號呼呌天而奉使之言乃以金帛為約如此則是質寡君以要利也夫人一日無主則皇皇三日無主則思亂元帥亂之不恤而使寡君之不歸是將大泯其社稷蔑殺其民人也順人心以致天討者果若是乎語曰下令如流水之源順人心也元帥亦知人心之所歸乎昨南門之下有一老父年且九十傴僂扶杖揮淚而言我生之初尚及仁宗我生之末乃遇聖君因望行在而顧衆曰今上寬仁似仁宗汝等當以死事吾老無能也今日先死以為諸君之勸城中聞之不問老小無不歔欷流涕皆曰有君如此何忍負之人心如此天意可知元帥豈不承於天不和於人哉請以兵為喻矢之不可射逺貫堅弩力也其所以中的剖微人心也宋固弱也人心以戴七世之仁元帥固强也而人心未洽大金之政以河北論之大金何德之布以懷柔之故此河北人未敢承命若惠及之惟官司之所守其誰敢距大金之命元帥捨此之圖惟利是要利聲日播而大德無聞河北安所歸哉河北之地號為奧區兹固不涸之倉不竭之府若鎮撫而有之豈金帛之足云元帥必欲得河北則不可得也大金以宋為結歡之本在于待之以禮必不可無此則其所以思憂過計恐宋不得而事大金也今日宋之存亡權在元帥存亡有二不可不知也百姓之心欲在存宋奸雄之心欲在亡宋宋存則民得而安故曰百姓所欲宋亡則四方蜂起故曰奸雄所利自古取天下者不全在於耀兵而在定名分今夫天下猶一兔走則百人逐之非一兔可以分為百名分未定也賣兔于市盜不敢取者由名分之定也故名分未定雖以元帥之强未能有河北名分已定雖以宋咫尺之檄下河北可也自天之判限制內外蕃漢不雜居兩國不同治考之前史可以為證而契丹得割全燕而有之耶律有德於石晉而假中國之力也使耶律不挾以石晉之命則天下安知名分之所歸哉故曰為元帥計莫若親宋元帥其無恃甲兵之衆而有無宋之心雖蕞爾綿地四百州安知無豪傑士起於中哉語曰天下嗷嗷新主之資也豪傑之起非元帥之所敵矣請推明其利害夫宋之所以不敵元帥者何也太平日久民不識兵而大金之兵以軍中為家以馬上為生而宋自戰其地咸顧其家各有所戀易以奔北是以元帥驅數萬之衆可以得志於中原若豪傑並起則中國之中人亦以軍中為家馬上為生所以蜂屯蟻聚各為報國家之難實致操戈而逐北則元帥能橫行於中原乎亦知元帥之不能也當三國鼎峙之時元帥能橫行于中原乎其亦知元帥之不能也蓋遊擊者易為力而坐守者難為功故為元帥計莫若按甲休兵無庸有事於民者親宋也宋於顛覆之際受君之賜報德萬世無有窮已竊恐事出倉卒元帥捨萬世之德而起新主之讐也其為利害相去萬萬明矣其布衣之士久困大學匹夫之命甚微而一身之徇極寡居此圍城中非有事於宋君也又非守城之人骨肉親戚也然而每念天地之間人為貴古人斬一木殺一獸猶或不忍况其俱謂之人而相為屠戮哉竊為元帥之行慕義無窮是用敢議於軍前伏惟元帥漏一句則願寬文武之怒如或不然則先斬某以徇太學生徐揆上金帥書取徐揆赴軍前揆抗辨死之太學生徐揆謹再拜獻書於金國相元帥太子元帥揆聞昔春秋魯宣公十一年楚子伐陳欲以為縣申叔時諫曰諸侯之從者曰討有罪今縣陳是貪其富也其可乎王曰善哉吾未聞也乃復封陳後君子莫不多申叔之善諫楚子之從諫千百歲之下猶且想其風采為不可及者昔上皇任用非人政失厥中背盟致討元帥之職也大兵既臨都城失守社稷幾亡而復存之元帥之德也兵不血創市不易㕓生靈幾死而幸免元帥之仁也雖楚子入陳之功未能逺過我宋皇帝以萬乘之尊兩造轅門議賞兵之資加徽號之請越在草莽信宿逾邁國中喁喁岐望屬車之塵者屢矣生民無主境內騷然忠義之士食不下咽又聞道路之言以金銀未足天子未還揆竊惑之蓋金銀之産不在中國而在深山窮谷之間四方職貢歲有常數况上皇在御宿奸擅權奢侈無度蠧耗邦財海內蕭然帑藏為之一空此元帥之所以明知也重以去嵗之役增請和之幣獻犒之資官吏征求及於編戶都城之內雖一妾婦之飾一器用之微無不輸之於上以酬退師之恩也又自兵興以來邦國未寧道路不通富商大賈絶跡而不造境京師豪民蓄積素厚者悉散而之四方矣間有從官王畿仰給俸祿皆無長資豈復有金銀之多乎今雖天子䝉塵臣庶效力根括私藏遍及貧戶猶未足償其數也曩者都城失守民無一生之望荷恩全貸實䝉再造之仁赤子拊心報圖無地况金銀外物豈復有惜乎第恐京邑家藏不足以償拋降之目雖以天子為質猶無益於事也元帥體大金皇帝好生之德每以赤子塗炭為念大兵長驅直搗中原未嘗以屠戮為事所以愛民者至矣今元帥有存社稷之德活生靈之仁而以金銀之故質君是猶愛人之子弟而辱其父祖與不愛奚擇元帥必不為之昔楚子圍鄭三月克之鄭伯肉袒牽羊以迎左右曰不可許王曰其君能下人必能信用其民矣退三十里而許之平春秋美之後世以為美談揆願元帥推惻隱之心有終始之惠返其君父損其元數班師振旅緩以時月使求之四方然後遣使入獻則楚子封陳之功不足道也國中之人德元帥之仁豈敢弭忘傳曰主憂臣辱主辱臣死揆雖卑賤輒敢昧死以紓君父之難惟元帥矜之冒瀆台嚴不勝恐懼俟命之至是日先傳二帥留車駕過上元即回至是日猶未聞鑾輿之音人心憂疑罔測其故太學生徐揆願致書二帥邀駕還闕先詣都省陳述執政不許是時書成願逹者數人執政既不許獨徐揆徑赴南薰門揆誑云獻金銀守門者以聞以馬取揆赴軍中覽書論難揆因高抗辨論敵􅒱殺之餘人皆不逹靖康小雅曰君諱揆駕之再幸敵營被留未歸城中官吏士民震怖憂擾計無從出君以太學生具書極陳以謂為元帥計之善莫若親宋親宋則大金獲無窮之利茍君不歸則中原必自此亂亂則豪傑既出豈大金之利哉委曲千餘言祈必歸吾君而後已䄂書至南薰門使守門軍人逹書於尼堪翌日金使人召君出遂留之嗚呼士不能奮節久矣君乃毅然不顧而前視百萬貔虎如入無人境則非獨君之忠可感動天地而其氣已吞强敵矣由是天下想望風采莫不嘆息使君當位則國家遽至於此乎詩曰攙搶騰光遂勃太陽六龍不翔昧昧八荒公欲挾飛再麗咸桑怒髮烈烈力鐫暴羌白刃亘野視猶蝟芒凜凜之氣雖死不亡潰散軍兵王在祝進以兵攻圍德安府陳規禦退之遺史曰先是靖康元年十一月京城受圍也德安府部集民兵勤王知安陸縣事陳規者字元則密州人以明法補官部押而行至蔡州聞京城失守衆皆不敢進窺敵其衆潰亂而散規乃安集撫存之整衆而退既到德安則知府通判曹職官皆以挈家棄城而遁規方入城有潰兵祝進來犯其境百姓請規權知府事規從之乃以寄居官及進士權作通判以下官遂遣弓手張立率民兵禦進郤之人心稍固時城壁圯壞跬步可踰而又壕塹湮沒略無險阻敵至居人大恐規隨冝措置相視城靣向上如斧刃不可立人規下令從上向裏削去其半及三尺而止始得立坐作有餘外存其半倚以蔽身且補苴罅漏植木編竹橫門扉于其上代女墻以扞矢石而施守具焉羣敵主在先破隨州官吏來寇德安壬寅晚遣二人持檄開門延納規留書放回癸卯甲辰逰騎至城下在與祝進合軍凶焰脅人乙巳擁衆臨城在先持弓弩持鎗牌攻城北城東規乃遣人出縱火佛舍與民居焚燒殆盡恐藏敵敵又以炮石鵝車之屬進攻城東自早攻至起更次日在先復令衆數千人擁隨州官屬近城東門云統制來要議事規在門上呼之曰何因至此曰京城已為金人所破我等皆爭門而出所以至此德安人聞之莫不墮淚然猶未知其的規語在皆詭亂辭說叱退之在圍城十有七日而退去自是党忠亦復時出沒張立者規常用以出戰後為將官自此調五縣夫增築城壘開封府榜駕前傳報元帥留上赴擊毬㑹且候天晴燕畢便還內仰居民安業是夜曹門外金人下城虜掠又有縱火燒五嶽觀者十八日戊申駕在青城根括金銀尤急凡親王帝姫等則由道君聖㫖拘收兩府執政并開封府提事使臣則由御史臺內侍官并三省密院職級等則由開封府京城四壁騷擾不安金帛之輸日用萬人肩摩轂擊皆差鄉監於南薰門外交納物采冗併至有留三日而得交者金遣皇族郎君日在門下布大挺於前羅列兵刃凌辱官吏有祕書省官姓藍以微故輒杖三十大理卿尉遲紹先司直王忠臣少違其意拽坐庭下批頰數千或以腦麝建茶等物遺之僅獲免戾一日踞坐譙門呼官吏俯伏於前左右傳聽郎君指揮斥罵良久實不曉一語其後但聞明日金帛未足便􅒱殺官吏重足人人求死無所號泣於此冀感動之敵終不息自帝䝉塵以來雪雨不止物價日翔斗米一千二百麥斗一千驢肉一斤一千五百羊肉一斤四千猪肉一斤三千今不復有也小民於池中取魚藻五味芼之以賣城中猫犬幾盡遊手凍餓死者十六七遺骸所在枕藉百官不復入局日至御路接駕父老迎候者日以數千萬計各持手爐羅列於南薰門或相與集大衆歡呼曰百姓忍惡難虞至此吾民自當之願天相我國家且還乘輿言已再拜至有燃頂煉臂剖心鎖口者后妃百官胥吏於里閈僧臺縵闕迎緇迎流以祈禱諸食糴米凶肆差官吏給函木然終不能及衆宣和録曰駕前傳到聖㫖為天隂打毬未得所以車駕未回然人揣敵情不在金銀矣或疑敵往河北南京皆失利欲挾吾君以令之莫測其故隔日霧氣四塞至此日未收輦景靈宫供俱納軍前退還太祖皇帝殿什物回令張設如初大元帥府黃潛善議貽書折金人耿南仲難之中興日厯曰黃潛善與副總管楊惟忠領兵既至元帥府軍聲益振善獻說於王日持登城不下之詔幾旬矣敵訖不退城中漠然不知動息且師直為壯曲為老何不與辨曲直大王何不貽書二太子道靖康初入敵寨結盟事又昨渡河本緣和好遽料深入不相值上迫父兄之被圍下迫軍民之鼓勇遂建大師以援王城若㑹合天下之兵以曲直為勝負事未可知㑹捧登城不下之詔不敢進今踰時矣士大夫信大金之有義而戰士憤大金之不遷萬人不能制鼓勇而進害兩國和議之大傷登城不下之恩豈不重哉耿南仲難之曰敵人恃彊悍其勢熖方張何可與口舌爭曲直且金求大王急自曹輔之歸彼方以不見大王為恨得此言知大王駐東平求太上及皇帝手書迫切之言速大王歸則大王歸乎不歸乎歸則有不測之禍不歸又重違二皇帝之詔且大王仁孝得二帝手書必泣涕而歸而一行士吏多東京人久客思歸必歡大王歸內則蹈不測之禍外則天下勤王之兵無所統一凡招來巨魁倚大王鎮撫不生亂歸必外自亂外亂則敵人併力於內矣不如勸大王養威望於外使金人莫測此上䇿也善又曰不可令大王貽書恐知所在此說是也門下侍郎何不貽書二太子乎門下侍郎貽書則曰以師傅舊僚出申和好聞金人深入便冝起兵其他如前之說且效孫仲謀遺曹公書春水方生公冝速去今金人喜寒而畏暖書冝曰天時向溫公冝速去南人喜暖而惡寒兵益得利一旦大進有不利大國南仲又難之曰此皆口打敵非論實也若金人回書約日索戰度吾兵之勢力衆寡可戰否不戰則自屈矣戰則勝負未可知也故前說以謂不如養威望使金人莫測善二說不行怏怏乞進兵戍曹州以張㬇髙公輸王善丁順孟世寧溫宗建李大鈞張宗王徹董議等諸軍皆聽節度後北道總管趙野宣撫使范訥副元帥宗澤冀州守權邦彥發運使翁彥國子判官向子諲等論偶與善意似子諲遣使臣栁圭書遺金人其文云㑹合勤王兵馬所言略如潛善之說金以亳采等州守禦所兩大帥牌果約日索戰語不遜諸人不敢答且留栁圭别遣小使臣持書云刻日待報善聞之始愧前說之非大元帥府以楊惟忠為都統制辛彥宗為先鋒統制張㬇以二千五百人髙公輸以二千五百人前去興仁府王徹將安肅軍二千人前去軍州駐劄三朝北盟㑹編卷七十六
