body:
  text: 三朝北盟㑹編卷一百九十六宋徐夢莘撰炎興下帙起紹興九年六月二十一日己巳盡其日吳武安公功績記曰吳玠字晉卿世居德順之隴干曽祖謙太子太保祖遂太子少傅父扆少保三世皆以義烈聞侯少沈毅尚氣節長于騎射曉兵法讀書能通大義未冠以良家子領涇原軍政和中夏人犯邊緣塵立功補進義副尉權隊將討浙西賊方臘破其衆又破河北賊纍功轉忠訓郎權涇原第十一正將夏人攻懷德軍以百餘騎突擊追北斬首百四十有六轉秉義郎本路第十二副將建炎三年金人內侵已三載矣春渡河出大慶關羅索殘長安鼓行而西跨鳳翔汧隴不浹旬降秦州垂頭熙河隴右大震熙帥張深遣偏將軍劉惟輔禦敵殺其帥哈芬王羅索失勢遁走深更遣隴右都護張嚴以兵繼進嚴趨鳳翔五馬坡下兵敗死之惟輔自鳳翔石鼻寨遁歸熙州經制司統領劉彥熙棄鳳翔歸曲端斬以徇端與侯大兵屯北原堅壁不動金人謀趨涇州端拒守麻務鎮遣侯以前軍討戰侯進據清溪嶺逆擊大破之轉武功郎涇原路兵馬都監知懷德軍冬以本道兵復華州城破將士無殺掠民皆安堵轉武功大夫忠州刺史劇賊史斌冦興鳳據長安謀不軌侯進兵夜襲其城兵出斬其首轉右武大夫四年春擢熙河路馬步軍副總管金人謀取環慶大將羅索以衆數萬攻麻亭侯逆戰于彭原店士殊死鬬殺傷過當而曲端劾侯違節制落武顯大夫論者不直未幾復故官改秦樓路馬步軍副總管知鳳翔兼權知永興軍路經略安撫使司公事進復長安轉右武大夫忠州防禦使先是侯與曲端起兵涇原招流民潰卒捍禦金兵所過人供糧秸道不拾遺猛士如林甲軍蔽野每戰必先占高原必勝之地未嘗敗衄敵稍北退河東不敢逾河飲馬時朝廷遣樞密張公董帥川陜許以便宜不從中覆樞密移檄諸路將臣與敵大戰召端與侯問籌策端云平陽易野敵便于衝􅊳而我軍未皆習戰須教士十年乃可以大舉侯云髙山峻谷我師便于駐隊敵雖驍勇甲馬後重終不能馳􅊳我據嵯峨之險占關輔之勢敵雖强捍不能據我尺寸地宣幕僚佐一以為迂緩一以為怯懦置其言而不用弃其人而弗親秋九月師次富平都統制㑹諸將議戰侯曰兵貴利動今地勢不利將何以戰且徙據髙阜制敵馬衝􅊳諸將皆謂不然云我師數倍又前臨葦澤非騎所宜都不聽既而敵驟至囊土逾澤以薄吾營王師大潰五路悉陷巴蜀大震侯獨整衆保散關之東和尚原積粟繕兵列柵其上或謂侯宜進屯漢中以守巴蜀侯曰敵不破我詎敢輕進吾堅壁重兵下瞰雍甸彼懼吾襲其後保蜀良䇿也越明年改元紹興春三月金國默哷郎君率鋭兵至原上期必破而後進侯擊敗之真拜忠州防禦使夏五月默哷及和尼郎君馬五太師耿太師復㑹列將烏嚕貝勒使二將由階成出大散關先至侯與戰二日連勝而默哷方攻箭筈關侯遣麾下擊退不使二將合分兵掩襲兩皆潰去轉明州觀察使誥詞云朕以經理關陜付之樞臣奉將天威式遏亂略非有熊羆之士不二心之臣相與戮力盡忠內撫外禦則戡定之期未可嵗月冀膚功來奏懋賞是宜忠州防禦使秦鳳路經略安撫使馬步軍都總管吳玠材氣不羣忠勇自奮䇿足功名之㑹騰聲關陜之間比者擢師涇原盡護諸將岐鳳之戰尤為雋功獲其隊豪餘衆皆北是用酬其多捷陟以廉車夫雄職美官朕所以待功能之士也益奮爾烈朕無憂焉可特授前件官未幾丁母劉氏嘉夫人憂起復尋兼陜西諸路都統誥詞云孝移于忠者聖人之格言國爾忘家者人臣之彛憲而況分閫外之寄統諸路之師淬厲以須枕戈待旦其可以親喪廢乎觀察使吳玠比以功伐寖階顯榮却敵有沈果之機馭軍適威愛之濟戰多由率懋賞既行遽深風木之悲方治金革之事矧臨敵忌于易將而制閫庸于奪情其安厥常無曠爾職茍能揚名于世以顯父母則忠孝之道兩得矣爾其勉哉可特授陜西諸路都統制金人自破契丹以來狃于常勝至是與侯戰不勝其憤冬十月元帥四太子㑹諸道兵及契丹渤海數萬人造浮梁跨渭自保雞連營三十里壘石為城與侯拒戰侯指授諸將選徑弓强弩期以必死分番迭射敵稍却則以竒兵乘險據隘橫攻夾擊如是三日度其必困遁走侯遣麾下伏神岔峪待其歸敵果遁走伏發敵潰俘其都將雅格大貝勒及首領三百餘人甲士八百六十人填坑谷者二十餘里獲鎧萬計乘夜併兵劫其大寨四太子全軍陷沒勦殺殆盡幾獲四太子鎮西軍節度使御前差中使任充賫詔就賜云兵勢無前用兼必勝之將王靈克布允繫敵愾之威眷我虎臣時獻戎捷受盡護諸將之任當兼總兩帥之雄控臨要衝遏制侵軼永念雍州之域久罹北敵之灾屬敵氣之方張勵兵鋒而益倍隂設竒伏躬率啓行俘當户之衆雄殄引弓之强敵威聲遐暢凱奏上聞班勞策勳敢後疇庸之典建牙擁節益隆制閫之權肆衍户租仍加真食並頒徽數式示眷懷於戲丕績茂昭戎行增氣益嚴武備宜乘戰勝之威克迪有功行賜山河之誓勉恭乃事圖報異恩可特授鎮西軍節度使陜西諸路都統制武功縣開國子食邑五百戶食實封二百户紹興二年兼宣撫使司都統制興文龍州敵久窺蜀必欲以竒取之薩里罕與四太子懲前日之敗不敢窺和尚原紹興三年春裒其兵三十萬又盡發諸路簽軍聲言東歸太原反自商於出漢隂搗梁洋金州失守侯亟率麾下騎兵倍道疾馳晝夜數百里急調兵利閬徑趨金洋先以黃柑數百枚犒師帥曰大軍逺來聊奉止渴今日決戰各忠所事薩里罕以杖擊地大驚曰吳侯爾何速耶不敢進盤桓纍日侯得以其暇治饒風嶺寨柵方據要險而敵已麾中軍急上遂大戰饒風嶺上凡六晝夜敵皆敗衄薩里罕大怒斬其千户貝勒數十人以死犯關又潜軍間道踰蟬溪嶺出官軍後斷侯按兵夜徑趨或曰蜀危矣侯曰敵掃地而來去國逺鬭而死傷大半吾以全軍扼其吭蜀可無憂侯遂為清野之謀分屯諸將示以搗虛之勢敵便旋中梁山浹月一夕潜遣薩里罕歸乃服侯善用兵勢不能破乃密遣通書百端間誘言金國威德之盛智勇之竒甲兵之强公宜相時而動侯復書云玠謹白金國都統足下逺䝉示書且審逺懷士各有主不容緘默彼己之情不通空相猜二無復平定時也輒攄愚悃覆答雅貺惟足下亮之夫中外異分此天下大義古今常理順之則治逆之則亂披觀傳記數千百年茍不以義興師與夫叛臣賊子稱兵犯上率不旋踵夷滅無遺類者以其悖大義反常理神人憤疾天地不容也我太祖皇帝挺生五季遭時昏亂堅守臣節委質柴氏仗順討逆功塞宇宙屬世宗棄代厯數有歸百萬之衆歡呼擁戴不得已而君之不殺一士不墮一城與堯舜何異哉深仁厚德布濩涵養行一二百年民至老死不識干戈上下狃習武偹不修戎器不偹賊盜乘之郡縣瓦解至今五六年而未定此蓋太平日久持盈守成失其道也而謂金國威德之盛甲兵之强果能至是乎且金國之師戰勝得志亦有由也陷城破邑縱士剽掠恣其所取卒徒貪得鼓勇爭奮兵勝而殺傷殘虐變動和氣亦已甚矣以此用士利盡則士不可使以此決勝財殫則戰不可必足下視今之天下何如遭燒劫者十不存一二耕農失業商賈流亡餓死者相藉所謂財何有哉竊憂足下之士自是不可以使足下之戰自是不可以必足下可以少休哉乃復取青徐之壤掖扶斗筲之子俾半擁虛器彼劉豫者嘗北面本朝備位臺省負上皇拔擢之恩臨難畏懦不能以死報國而乘便抵間僥幸非望三尺童子皆知鄙弃而唾罵之其尚何顔面以視聽于天地之間望天下歸之耶然金國既不相和好又挑劉豫以臣反君顧天下大義古今常理豈能盡掃除之乎而欲以靖亂不知適所以召亂也主上聰明孝友慈仁恭儉聞于天下如奉使金國不能留暨京師變故適從兵藩閫謳歌攸屬嗣位應天實太祖興旺之地天意昭昭可見矣維揚之役大兵奄至倉皇無偹中外失色然大駕南下橫衝風濤幾數千里如行衽席厮役之卒無一不偹而金國之士中流溺沈者過半此足以見天之不弃趙氏卒欲安全之也今乾象清明星緯順行隆冬届寒日星溫晏陽盛隂剝此中國之福民心日以固士氣日以振太平可指日而俟以金國之衆自稱多材豈無深明天道而不審擇取舍安定天下尚為前之紛紛果何為耶往者契丹與中國結為兄弟騂䭷相要天日是誓信使往來絡繹于道兩朝赤子實便之而我內奸人之謀忽弃載書墜失大信故上天薄罰降此灾戾然核其禍端窮其亂源鼓作交鬬金國與有力焉如聞契丹仇怨金國深入骨髓渤海奚霫從而和之將㑹召英豪糾集族類借援中國南北通欵復尋舊盟併力合勢以逞憾于金國之兵暴露鬭戰淹閲嵗時力疾氣衰腹背受敵足下能保必勝乎暗機事殞威名隳成功蔓後患資天下萬世口舌之士詆薄姍笑金國獨何取也玠世為宋臣食趙氏之祿孕子育孫于中原之地儻有二心天地鬼神實誅之乃辱貽使相時而動足下度玠豈茍得忘恥見利忘義者也一言之失駟馬莫及竊為足下惜之春律方初萬彚熙泰惟逺去墳墓羇遊萬里之外軍中倥偬安樂否更冀加謹服食養以新春和平之福玠白薩里罕得書大不平日與諸將熟議攻玠紹興四年春二月敵復大入薩里罕四太子蓄日久乃糾合兵數十萬轉三河之粟魚貫蟻附決意取蜀自元帥以下皆盡室以來又以劉豫腹心為招撫使召諸路簽軍列屯寶雞綿亘數百里進攻鐵山鑿崖開道於仙人關髙嶺上立大柵下瞰侯營循嶺東下直攻侯軍侯自以萬人當其前公弟總管吳璘由七方關不待㑹合率輕兵倍道入援其兄四太子聞之與皇子郎君分領萬户首領擁兵急攻又往攻殺金坪野呰對壘札連珠硬寨數十座值侯營前列炮數座擊我營侯令營中併發神臂弓飛大炮斃敵無數統制官田晟總兵深入追之敵又發生兵萬餘擊營左侯分兵力戰却之敵不住又添生兵擁洞子雲梯直前擦城侯引兵向前用炮打洞子碎之用撞竿雲梯倒敵怒縛虛棚戰樓别遣大貝勒擁鋭卒萬餘一發乘城侯令統制官楊政領長鎗防刀手深入刺打隔斷敵又遣二貝勒總正甲金人二萬夾攻栅兩肋吳璘左右遮禦血戰殺敵敵皆引却薩里罕駐馬四顧良久云吾得之矣翌日號令諸軍併力只攻侯營兊方一樓子自寅至午危甚姚仲統領只在樓上酣鬬數已傾側仲以絹為繩拽使復正敵以火焚樓柱仲以酒壺擊滅火敵布神臂弓東嶺下侯亦發神臂弓五百隻與之對敵去即遣王萬年劉鈐轄濬水王武宣贊分紫白旗入敵奔潰抵夜侯别遣五將分更劫寨晝夜數十合金人困􅉵死傷以萬計即斂兵宵遁殺死千户萬户甲軍萬餘傍牌銃鎗金鼓旗幟十件左軍統制張彥夜擊敵橫川寨斬首千級生擒將領二十人侯又遣統制官王浚設伏河地扼敵歸路生擒百餘人斬首千級得馬旗幟無數侯悉兵尾襲直過和尚原去上聞之嘉嘆賜以親札云史謂趙充國沈勇有大略其用兵以全師保勝為策乃漢中興良將也朕嘗思其人以濟大業比見宣撫司奏金人擁大兵而來有併吞四川之心卿能保關克敵挫彼方剛之鋭而壯朕復興之威非謀以濟勇能若是耶朕之所思今乃見之但恨阻逺不得撫卿背而慰朕心也更在不驕其志益勵軍情則所謂濟朕莫大之業者非卿而誰已降親筆除卿宣撫使及繼以朕所御戰袍器甲等物賜卿想已必達今朝贊議賞典先飛此數字聊寫朕懷金人久不得志則還據鳳翔授甲屯田為久留計自是不敢輕動侯以熙河經略司關師古自洮岷領選鋒統制李進前軍統制王師右後軍統制戴越打糧河州襲大潭縣掩骨谷鎮賊慕洧援寨去師古由殺馬谷攻焦山務焚田家村圍子谷深入敵境至石要嶺忽遇金國大兵一戰遂敗績師古旋師大潭內懷慚懼悉還兵宣司隻身往降敵侯愛此軍忠義無一人騎從師古叛者撫存勞徠捐其家財厚資給之兩軍既合中外一心失一匹夫於師古得萬貔貅于行陳侯由此軍精甚四月徙鎮定國除州陜宣撫使秋七月朝廷録仙人關功進檢校少師寧保靜軍節度使五年春侯向天水出竒兵下奉州六年兼營田大使徙鎮平保靜難軍侯與金人對交戰踰十年熟其軍壘曲折知其部領堅脆常以一當百惟慮逺餉勞民屢汰冗員官節浮費嵗屯田至十萬斛又調戍兵命梁洋守將治褒城廢堰廣溉民田復業數萬朝廷嘉之璽書褒賞七年冬金廢劉豫召諸道兵聲言入蜀侯獨謂不然䇿其去已而果然和議成上以成功高賜親札進開府儀同三司四川宣撫使而侯以疾自以賞過功固辭優詔不許九年春三月侯以疾革乞解事天子惻然憂之命成都守胡世將訪蜀善醫者治其疾又馳國醫往視未至而侯以六月己巳薨于軍享年四十七己亥遺表聞上震悼輟視朝特贈少師九月丙申其弟璘奉喪葬于德順軍水洛城十一日戊申上念公不已賜錢三十萬擢璘龍虎衛四廂都指揮使以慰恤其家侯能撫士卒同其甘苦至軍政斬刈一不貸故人人效死如建炎二年曲端屯麻務鎮督戰侯遣列校三百七十餘人于大谷比較嶺迎戰矢石未交望風奔潰伏匿山谷四年侯招兵秦州前三百四十餘人出赴招安侯問訊再三搜索非是五六人斥遣之餘三百七十人悉斬于逺亭下去秦州十里士卒股栗自是出戰人皆效死至第功賞則惟以公論無請托之私性樂善每觀史傳有可書者必書于坐右日誦七書其用兵本孫吳而能窮其變化雖功高貴顯而居常極儉約至推以豫士則略無少吝其卒也家無餘資至無宅以居三子拱佑郎總撝皆為文官承奉郎以經史自娛明庭傑嘗試論之曰漢皇甫規張奐皆生長山西應賢良中髙選規以詩易傳授門弟子三百餘人奐著尚書難疑二十餘萬言以垂世設教二公弃文就武俱仕度遼將軍破胸奴以千萬計觀規自布衣時以西羌深入上書願假近邊無用坐食之兵五千使規為將上可以除患下可以納降奐每言大丈夫處世當為國家誅滅外冦嘻此皆前輩豪俊語邇者天子以元通與吳侯相知之深想吳侯諸子必皆稔聞今元通功髙言重若他日㑹晤吳侯一家朝奉常語之曰山西出將二公家世邊人將門出將二公奕世將種大丈夫當用長鎗大劒定天下安從文官學弄筆墨也元通亦曰然後民論議極有補于世當併為我書于吳侯傳末云宣撫司薦士明庭傑記林泉野記曰吳玠字晉卿德順軍人沈勇知書少隸曲端為將張浚宣撫川陜用為都統制紹興元年十月金人陷鳳翔府寶雞縣至和尚原玠遣弟璘及統制雷仲三戰皆敗之又敗之神岔山口自是纍三十餘陳皆克擒萬户雅格貝勒尼堪壻也及博囉貝勒二十餘人烏珠中箭而遁蜀土賴之以功加鎮西軍節度使浚還朝留玠守川口四年烏珠欲入攻劉豫弟益方知長安密使告玠為備二月果犯興州仙人關烏珠使謂玠曰趙氏衰可扶持公來當擇善地百里而王之玠曰業已事趙氏不敢有二于是克期與戰敵大敗自後每遇輒勝都統郭震為烏珠所襲敗玠日與鏖戰郭震亦復攻之敵又敗四月再敗敵于鳳州幾獲烏珠復秦鳳隴州降簽軍七萬玠對壘常乘肩輿作樂四川陜西宣撫處置副使進檢校少保奉寧保靜軍節度使五年以所統為行營後護軍六年檢校少師靜難軍節度使于興州九年議和改宣撫使仍開府儀同三司六月以疾薨年四十七嵗賜錢三十萬弟璘加開府儀同主其軍三子拱總撝部曲陽政田晟姚仲王彥雷仲皆名將三朝北盟㑹編卷一百九十六
