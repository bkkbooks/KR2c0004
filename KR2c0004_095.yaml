body:
  text: 三朝北盟㑹編卷九十五宋徐夢莘撰靖康中帙起靖康二年四月二十一日庚辰盡二十八日丁亥二十一日庚辰大元帥行府發濟州汪伯彥日厯曰二十一日五更初發先鋒次發前軍次發左軍次發右軍辨色發中軍乃請大元帥康王上馬幕府羣僚次第上馬保衛以進次發右軍次發後軍次發朱勝非人兵次收後晚宿新興店王至是神意喜悅問地名曰新興店伯彥嘗聞太平興國中北敵入邊太宗皇帝幸大名親征方渡河有謁于馬首問其姓名曰宋捷帝喜悅不旋踵果有北方之捷今大王治兵討敵行紹大統而初宿新興天意若曰宋室中興其命維新將克繼前人之美與夫邑號柏人里名勝母者異矣王善其說是日鄜延帥臣張深副總管劉光世自陜州取小路徑赴大元帥府㑹合光世躬執櫜鞬望馬足遙拜王命而前問勞訖差光世充兵馬大元帥都提舉五軍遺史曰王發濟州王在濟州也陕西勤王之兵惟劉光世到元帥府先是劉光世准上間道遣使臣賫蠟封處分指揮云敵騎圍京師仰劉光世多選馬軍赴闕是時光世以馬軍都候為鄜延路兵馬鈐轄請于帥臣張深授步騎三千光世請益兵不從既行中途值制置司統制杜常還歸且言京城失守制置使錢蓋以將軍馬公屯時潰兵所在焚劫聚而為寇道路梗塞唐鄧以北皆無官守兵糧告絶光世乃與將官喬仲福等議見永興帥臣范致虛已傳檄諸帥㑹兵陕郊㑹承上御札遣使臣黃深宣諭六路大略云金人登城斂兵不下朕已出郊親見二元帥和議已定宜止天下勤王之兵光世曰不可以詔示衆且速圖進發京西諸處潰兵踵至傳聞京師之事不一衆心惶惑光世矯以蕃官山陜來自京闕乃云二聖潰圍南幸矣乃選使臣葛宗賫封密奏往荆襄江浙乃統所部由虢略入太后谷南趨張深亦改途同行涎汝州魯山縣聞致虛進兵千秋嶺為金人所邀王師失利光世招集散亡而本部餘丁相繼俱來兵始及萬數軍勢漸壯俄傳金人已立張邦昌即僞位張深召光世及諸將議事深對將士曰諸公好事在目前以所持扇左右倒衆莫能應往往偶語出异論光世乃遣使臣王默張景等將漢蕃弓箭手一百人騎夜半賫狀前去招安盜賊俾深罔測光世密諭之曰側聞康王領大元帥聚兵京東汝等當詣元帥府分明投下文而回金人既退兵深與光世進至朱仙鎮遇默景得元帥府劄子二道一云仰劉光世將所統兵馬速赴大元帥府一云仰張深將所部回興仁府即於本府駐劄深失聲惶懼光世即辭深去以所部直至濟州時王師無有至者王大喜自是委以心腹彈壓諸軍王發濟州光世從衛簽書樞密院曹輔資政殿學士路允迪諌議大夫范宗尹奉元祐皇后詔來趣王進發迎謁道左大元帥府參道總管趙子嵩榜曉諭都城士庶大元帥參議東南道總管趙子嵩奉大元帥康王劄子節制東南統兵進援王室已至近城􅀢惟趙氏德澤洽于民心主上仁聖節儉天下欣戴獨以姦臣誤國再致敵人深入禍變曠古未聞至于二聖播遷六宫九族係纍天下臣子悲憤痛切肝心糜潰況太廟無主王將兵在外是故去年主上特付大元帥之柄於康王蓋本天意康王已委副將元帥宗澤領騎兵迎請二聖車駕又委子嵩等提兵入援以圖興復升壇插血盟于三軍千萬人惟一心誓死赴難今宰臣身乞反正大將等上下和協奉母后寶書遣使請迎康王社稷有主人知所歸都城官吏軍民僧道耆老等世受大恩各懷忠義當金人劫請車駕及後來權宜諒其本心必不忘趙氏各宜安居無生疑惑以待恩撫須至曉諭趙子嵩諭張邦昌書靖康二年四月日寶文閣直學士朝請郎知淮寧府事大元帥參議兼東南道都總管節制諸軍趙子嵩謹致書大觀文相公張公閣下子嵩聞人臣委質事人義命而已見得思義見危致命人臣之常節也議者籍籍謂閣下使金踰年日與金人處坐視謀吾之國不能效寸長京城破隂遣人奉召兼程至已至敵營復坐視吾之君而不能以死爭其劫請傾危之計閣下或與聞之不然何金人曲折拒孫傳之請卒以與閣下蓋必有定論矣見危致命見得思義天下將以此責閣下子嵩亦疑是說自聞入居禁中躬受金冊即集大軍設壇插血專意討逆三軍之士千萬人惟一心踴躍奮迅欲得閣下而甘心焉大元帥康王以節制見委責以再造況子嵩猥在屬籍義兼臣子今祖宗之後係纍以去者殆盡如子嵩輩偶存若不輔大元帥以圖興復天地祖宗實式臨之翁中丞忠義誠懇言發涕流必欲共奬王室今既大集忠憤難遏亦可畏也忽九日李健陳戩持書至翁中丞有反正之意羣情猶疑惑引馮瀛王曰公此舉由衷乎子嵩獨謂殆天誘閣下為斯舉也前所述者諒非閣下本心出於迫脅無疑閣下少年登科致位宰相必知義命之大戒傳曰有伊尹之志則可無伊尹之志則篡也伊尹猶不可而況其下者乎閣下前日迫於敵威欲保宗廟全都城不得已而從之今敵既逺去即有所避而歸之正以成前功豈不本末明白哉既出至誠便當斷以不疑不可猶豫速出居相府易服自貶親書以示于軍中哀鳴以請於帥府使三軍曉然知閣下前日權以濟事而實不忘吾宋也子嵩等亦當按兵城下以待大元帥之命若遲疑不决則三軍必曰以天下之師誅天下之逆非子嵩等所能專也閣下老母垂年伶俜一子身將五十必不肯為覆旋之計或謂閣下親屬便當殄滅況城中萬姓皆北則張氏何恤哉尤而效之大元帥必不忍本道己申行府委所在優加覆護亦恐要知夫轉禍為福幾不容喘閣下其深思之迫於宗社大計肝心潰裂書不能文幸察薄暑惟加慎眠食毋為空言以受實禍不宣子嵩又與王時雍等書靖康二年四月日寶文閣學士朝請郎淮寧府事大元帥參議兼東南道都總管節制諸軍趙子嵩奉書樞密王公門下吕公中書徐公左丞馮公右丞李公樞密吳公樞密莫公初夏薄暑伏惟台候萬福金人深入侵侮暴虐振古未聞痛激肝心不能自存子嵩䝉國厚恩親覩斯變誓當以死赴難寧守孤壘四鄰皆陷千里一空衝突攻圍乍合乍散者常數萬騎無三日不至獨以赤心堅壁五月敵亦計窮而去自三月十日詳聞大變即連趣翁公大漕與諸路大軍到此節涎遣發入援設壇盟衆有死無二三軍之士悲憤感泣勇不可遏大元帥康王以節制見委仍參幕府再造之功責在僕等子嵩義兼臣子職當總帥誠難但已故以由衷奉曉諸公或世家舊族或文儒致身或久廢而起或不涎而用既無扶危持顛之謀又無仗節死難之義强顔忍恥坐視傾覆方且自謂佐命此與唐六臣何異而尚未知轉禍為福可乎自古舉事但問逆順不計强弱方金人登城諸公喪膽亡魂手持聖天子付之不能還又手持符璽再拜與人而不能死今乃偃然據宫闕出號令文致姦言鼓惑衆聽亦何所恃哉以逆節抗大順以羣書生當王師可深憫也區區猶藉能存都城生齒為說不知坐致二聖北遷將誰咎邪公平日所學所言自謂過人今日行事又何其戾也相與亡人之國稽首僞朝居之不疑魚遊沸鼎燕巢危幕公不自思耳前日畏死而為不知今有生路否乎子嵩節制大軍又檄陜西南京諸道之帥四集城下志在清宫以奬王室諸公其自為計毋忽聞張公頗有反正之意殆天誘其衷若能幡然改圖釋位自貶奉大元帥以繫人心迎還二聖以雪大恥則脅逼之罪尚可全貸而諸公之功與迷而不返者不可同日而語也古人權以濟事遂立殊勳惟識事變知禍福能之今有望于諸公也善敗之途亦請自擇言念平昔敢布腹心希示的報軍務方繁不及遍作書幸察不宣二十二日辛巳大元帥至單州大元帥至單州知軍州事王㬇來迎何志同趙子嵩皆以兵來㑹趙子嵩奏太后乞先下詔狀并繳申大元帥狀右子嵩等總兵赴難恭聞元祐皇后陛下垂簾有萬世之功矣臣與三軍將士莫不感泣竊見陛下未垂簾以前京師嘗有書肆赦諸路繼雖收回仍禁止在城藏本然印賣𫝊播於外者不啻數千百本若聞二聖遷北易姓改國忠義憤發兵革四起其間或假討逆之名竊據郡縣使宰臣在城本心終不能白况其家屬在外或致疏虞所繫非一臣等伏望聖慈速下明命詔諭四方以陛下臨朝莭次遣使奉寶迎立康王以俟復辟所有大赦候嗣君即位日頒降庶幾人心安帖姦宄自消以副陛下保國之隆臣等不勝幸碩又繳申大元帥府狀曰右子嵩等纍具勸進乞早正大號肆赦天下以安人心未奉俞㫖日夕震懼深慮姦宄竊發蜂起蟻聚卒難掃除不免具奏元祐皇后乞先下詔命不惟使四方知大王受命中興自然安帖亦所以警張邦昌堅其誠心不致疑變子嵩等愚見惟大王亟整六飛入朝九廟則一切平定繼無後患不勝祈懇哀切之至所有奏狀録白在前謹具申大元帥行府候王旨李邴申大元帥府勸進狀邴等伏覩四月初九日大元帥府檄文恭惟國家積纍之久德澤深厚漸漬人心一旦事出非常遂至外侮興師再犯宫闕神都傾陷鑾輿播遷人民塗炭土分瓦裂檄書既到官吏軍民無不悼心隕涕痛貫肌骨思欲張空拳冒白刃以赴國家之急此非獨臣子常分亦有以見宗廟神靈社稷永逺斯民懷舊未忘愛戴之誠上天悔禍將啓中興之運非茍然也邴等䝉被國恩或嘗列禁闈或並䝉器使捐軀殞首圖報萬分正在今日伏惟大王以親王之重統元帥之權君父劫質臣民無主天下顒顒靡弗繫心當此之際義當如何今京師僣號之臣既由彊抑必不敢久據神器輸欵投誠當在朝夕斯民仰徯大王之來不啻失乳孤兒瞻望所怙周人思召公愛甘棠而况天親上皇之子皇帝之弟受服敷征位為上將民心思望豈有涯哉昔白公之亂葉公將入遇國人曰君胡不胄國人望君如望慈父母盜賊之矢若傷君是絶民望也乃胄而進又遇一人曰君胡胄國人望君如望歲焉若見君面是艾也而又掩面以絶民望乃免胄而進夫葉公以列國之賢人猶懷之如此況大王其何疑焉然勢不可緩者今四方潰兵往往嘯聚閻瑾據黃州周德起金陵李育擾徐兖王鎮剽淮陽其他兵起蝟結千萬為羣將環視而起惟翹首側耳以需天下之變若命令既通郡邑有統則必斂手歸命以求自新如命令未通郡邑無統姦雄乘之則必盜據要害自為一方將有鼎峙瓜分之勢他日欲復一之豈不難哉大王隨行將士暴露風霜亦已久矣䝉犯矢石斯亦勤矣各望尺寸之功不然師老財費久而不召豈復可用哉區區之意謂大王當傳檄天下凡諸路監司帥守應合申禀朝廷文字一切權宜並申大元帥府隨宜裁决行下大王宜稽考前世攝行國事承制封拜然後奮激士氣鼓行而前一戰勝敵迎還二聖尅復之功指日可待𫝊曰日中必篲操刀必割成敗之機間不容髮邴等不勝惶懼戰灼延頸企望之至惟大王裁之謹具狀申兵馬大元帥府伏乞照㑹謹狀再申大元帥府狀右某等近于四月二十二日専差人賫狀申大元帥府以四月十九日檄書審知二聖鑾輿未回大王宜稽考前世攝行國事迎還二聖以圖尅復可追今再陳其愚伏覬少加察焉方今天下大變君父劫質儲闈近屬舉之皆行惟大王一人提兵在外宗廟社稷血食所繫四海郡國號令所稟億兆黎庶存亡所繫惟在大王此為何等時而欲遲疑回却以辜天下之望負二聖之託哉大王若不早定竊慮有昧于逆順之臣懷向背自全之計加之以師旅因之以盜賊使僞命稍通非惟宗廟社稷危若綴旒大王安所容其軀哉大王必尚疑居攝之事則某前所謂稽考前世蓋有所本矣昔成王即政未堪多難周公履天下之籍聽天下之斷戴禮明堂位所載與九罭之詩是也成王有成人之德則復子明辟此六經之明訓也夫周公承文武之後獨以成王幼冲然且為之今二聖未回天下嗷嗷靡所繫命大王以親則母弟以位則真王以任則元帥今日之事責在大王恐大王不得而避也名分既辨號令既行則懷忠抱義者知效命之所拱手觀變者銷從逆之萌盜賊盤據必洗心革面不復有雄跨割據之意師徒奔凑必爭先賈勇以赴功名之㑹天下之勢定矣如天步既正鑾輿遂回歸尊復辟退就藩服忠孝之道豈不兩全如金人不知悔禍遲留車駕遂欲蕩覆我社稷泯絶我宗祧則天祐有宋必將有主主宋祀者非王而誰某等誠以世受國恩莫知論報參之往古驗之當今仰揆天意俯察人事至正至順無以踰此惟大王勇斷而决行之天下幸甚屬道塗榛梗未能趨赴行府不勝企踵待命惶懼之至謹狀二十三日壬午大元帥至虞城縣大元帥早發單州申刻次虞城縣是日西道總管王襄副總管孫昭逺以所部兵來㑹車駕進發有㫖令開封尹率父老僧道官員舉人詣行在奉表勸進張邦昌劄子恭聞車駕自濟州徑往南京臣等躬率百官赴行在欲今月二十五日起發前去母后節次遣人迎請二十四日癸未大元帥至南京大元帥早發虞城申刻至南京府治金人圍京城也屢分兵攻南京朱勝非皆禦退之後有北道總管趙野及宣府范訥兵王淵韓世忠皆在南京故城市全盛是日戒都統制五軍楊惟忠等警嚴以虞非常二十五日甲申張邦昌等率百官吏是日出門員外郎宋彥通除右文殿修撰龍圖閣直學士知揚州許份等狀請大元帥即位於揚州知揚州許份等狀勸請王即位於揚州曰份等竊聞金人渡河二聖遷幸凡在臣子孰不痛心京師士庶欲迎請大元帥大王還處闕下此誠宗廟之靈社稷之福但中都新破上下空竭人心危懼敵情不測道路艱棘糧餉難繼萬一不虞則內外隔絶復有前日之患份等與衆熟議皆以為揚州之地控帶江淮城壁新修錢糧粗足若聚兵西北奉迎鑾輿則舳艫灌輸督促而至足以饋師而又南至金陵東抵錢塘一有緩急可以據依其為順便莫過於此伏望大元帥大王深思長慮决定至計即日御衆治廣陵份等謹當戮力協心以佐大事若或已暫還闕撫定京師亦當以少俟按堵亟復東下份等不勝激切延望之至母后詔令備車駕法仗等赴南京迎請百司庶務分半以去大元帥康王謁太祖廟王詣鴻慶宫謁太祖廟大哭羣臣皆哭二十六日乙酉太宰張邦昌赴南京邦昌等自京師來詣元帥行府邦昌以親從官數人自隨王命引邦昌入邦昌慟哭叩首請死王命贊者掖前見如賔禮邦昌具言圍城事始末繼之以泣王亦泣二十七日丙戌發綱運赴南京括船裝發綱運及乘載宫嬪等赴南京汴河之舟如鱗次而行內侍卲成章王兖奉乘輿服御儀仗來大元帥命加汪伯彥顯謨閣直學士黃潜善徽猷閣直學士董耘徽猷閣學士並提舉南京鴻慶宫兼侍讀髙世則承宣使二十八日丁亥國子祭酒董道率太學生赴南京奉表勸進耿南仲等進呈赦書合行事件司農少卿權户部侍郎胡思乞罷權可依胡交修除集英殿修撰知湖州中山府提轄使臣沙貞殺安撫使陳某金人以太上皇北狩至中山府陳某登城金人以太上皇至城下諭令開降太上呼某曰道君皇帝也遂慟哭曰陛下安得至此提轄沙貞曰此中豈有道君皇帝必金人之詭詐也以箭射之遂鼓衆喧閙殺某其子錫在旁倒身護之乃并殺之於是貞自守中山金人逼於歸弟適仕光祿卿靖康遣出使為金人驅迫往燕山府拘囚纍年而死適子鑄三朝北盟㑹編卷九十五
