body:
  text: 三朝北盟會編卷二百二十五宋徐夢莘撰炎興下帙起紹興三十一年正月十四日丁亥盡其日紹興三十一年正月十四日丁亥夜雪有雷丁亥夜風雷雨雪一夕交作是春大寒雨雪異常人情疑異侍御史江徹奏言春秋魯隱公時大雨雪雷電孔子以八日之間再有大變謹而書之今一夕之間而二異皆見此隂盛也今臣下無姦萌戚屬無乖剌無尾大之勢無女謁之私意者殆為金敵乎天心仁愛陛下故以此示警欲陛下思患而豫防之願陛下飭大臣常謹邉備尋有旨令侍從臺諫條具消弭災異之術防守盜賊之宜徹復備陳災異之由因言十二事如置使上流以總軍務益李寶兵以備海道撥置松江帥守收拾兩淮人民等皆其急務校書郎王十朋劄子乞用人先人望臣一介小官不識忌諱不知朝廷事體愛君憂國出于天性妄懷婺不恤緯之心竊聞道路洶洶咸謂敵情不可測有南下牧馬巢穴汴都窺伺江淮之意廟堂之上帷幄之臣必有料敵決勝之䇿臣不得而知然議者以議邉奏有警則羣臣失色相顧聞稍寧息則恬然便以為安且謂敵有內難勢必不來夫不恃我之有備而幸敵之有難其謀國之術亦疏且怠矣自建炎至今敵情未嘗不內相不靖也然一人斃一人立其勢愈熾曷嘗為中國利哉要在所以自備如何耳我先有備敵雖強而不足畏我茍無備敵雖有難幸之何益彼或不以有備為畏乘我稍怠長驅而來其將何以禦之耶臣以為禦侮之䇿莫急于用人用人之要莫先于人望蓋知人之術自古所為難蕭何不生孰能薦韓信于未知名之日孟軻復出亦必取士于國人皆曰賢晉悼公以民譽而用六卿遂成復霸之業東晉以人心而起謝安石遂成破敵之計國家開寶之間西夏叛命仁宗皇帝以經略安撫之任付之韓琦范仲淹二人雅有時望軍中有一韓一范西賊破膽之謠兵不大用而元昊臣服元祐中用文彥博富弼為相朝士相賀仁宗皇帝曰古之用人或以夢卜茍不知人當從人望夢卜豈足憑耶元祐能服人如此今若內外士夫軍民口無異辭或謂有天資忠義材兼文武可為將相者有長于用兵士卒樂為之用者今又投間置散無地自效或老于為郡以泯沒其身內為讒邪之媢疾外為敵人之所竊笑天下輿情憤悶抑鬱臣願陛下斷然為社稷計起而用之以從人望可以作士氣可以慰人心可以寢敵人之謀可以圖恢復之計陛下縱未欲大用之宜亦付以江淮重任自當一面為國長城亦可無西顧憂矣臣又聞范仲淹初以言事尤為宰相呂夷簡所惡斥逐于外西方用兵仁宗始思用仲淹夷簡薦之亦力仲淹果能成功夷簡不失為賢相陛下當以仁宗之心為心大臣當以夷簡為法相與任用天下賢才以為排難解紛之計天下幸甚社稷幸甚舊宰執侍從之臣名節素著或守遠藩或食祠祿或以休致或在謫籍並宜起廢置諸朝列其聲名風采足以聳動一時謀謨注畫必有大過人者將有驍勇稱善戰者亦宜分置于荆襄江淮用以為爪牙藩屏用賈誼衆建諸侯而少其力以駕馭之如是則異人輩出可以供任使矣猛虎在山藜藿為之不採國有人焉難當自消臣以為禦侮之䇿莫大于此校書郎馮方劄子論措置之䇿臣聞道路之言以為金人將有敗盟之意臣竊謂議論定然後可以言措置措置定然後可以言成敗何議論定然後可以言措置今之議者不知以和為可保歟欲和在我制和者在彼彼初無禮義也呼則過來否則且已自敗𣙜埸以後日急一日廣有調發别無邀求不可窺測若曰添嵗幣則彼之互市之所入嵗以巨萬計略不顧惜議者猶欲以趙元昊待之謂絶嵗幣可以使之坐困添嵗幣可以使之弭伏亦已疏矣若曰遣泛使則將命往來不過謹守常議而已互相提防例不敢分外出一語雖百輩何益况吾之國勢未振人無不挾借闕雖有富弼者決不能與敵交口辨事也若曰吾奉事之唯謹彼將有所不忍則史册所載小國之事強國其謹亦多矣齊王事楚楚襄王事秦非不謹也秦楚豈以謹故不加兵哉臣愚反復熟論以為金人之必來如盛夏之必熱但來必在三伏之日也昔魏遣于謹伐梁是時元帝方與羣臣講老子或曰魏兵且至丁卯罷講或曰魏不來庚午復講而江陵受圍而縛手無䇿急召王僧辨于建康王琳于湖州未至而城墟矣初朱買臣在圍中按劍進曰唯斬宗凛黃羅漢可以謝天下帝曰曩實吾意宗黃何罪臣嘗讀書而悲之今日之事議論貴乎一定措置欲其萬全宵衣旰食與腹心大臣日夜謀所以立國之道使不至仰人求活則彼此安靜來則有以待之勿以今日之報急而焦勞明日之報緩而間暇孟子曰湯以七十里文王以百里未聞以千里畏人者也又曰君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣何謂措置定然後可以言成敗臣不知兩淮已有備否議者皆曰結民社矣夫民社者保聚可也應援可也輜重可也獨不可迎敵耳建炎三年冬金人再攻淮甸是時兵民無慮十五萬敵兵才萬人來去自若如入無人之境責之迎敵必如陜西之弓箭手而後可也臣欲乞以見耕之田蠲其賦役率為畝二百而出一兵不可則三百又不可則四百足以招之而止未耕之田又加優焉大扺使為兵者常逸為民者常勞磨以嵗月可使有勇州縣所蠲一錢朝廷與之一錢不過捐十萬民得萬兵矣縣官養萬兵嵗不下百萬也雖然官軍不振則兵民不能自立不知兩淮已有兵否建炎二年二月二日金人渡淮明日次楊子橋若復乘虛一日一夜長驅臨江則江南人心動搖矣朝廷以武臣典郡然所遣皆無兵馬雖韓彭何益臣愚乞以營田為名擇見管軍統制官之修良者全軍出守因而耕作而入其租增置通判以蒞民事然後命宿將中為民屬望可以附衆可以威敵者使兩淮營田如此則形勢強藩屏固欲守則守欲戰則戰敗則可以削走則可以誅矣臣無任昧死納忠之至云湘山樵夫紹興正論張浚和議之初浚即移書執政執政力責其非屢上劄子力伸前議言愈切言章謫連州久之移永州趙鼎坐和議不合罷相後謫吉陽軍薨于貶所胡銓和議之初銓上言乞斬秦檜孫近王倫除名編管新州胡寅任起居舍人上疏力言金人不可議和坐言章謫新州連南夫知泉州上表賀大金許割河南其略云不信亦信其然亦然又云雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺言章落職放罷張戒入文字論秦檜十事救胡銓等罷常同緣不附和議久不得差以死呂本中坐不附和議言章罷中書舍人張致遠坐不附和議罷給事中魏矼任吏部侍郎差館伴金使矼入文字云時任御史日常論和議之非今難以專對秦檜招矼至堂中問其所以不主和議之意矼具陳敵情難保檜云公以智料敵檜以誠待敵矼云是則是相公云云罷謫張絢坐不肯議金使朝見禮儀補外曽開坐不附和議罷禮部侍郎李彌遜坐不附和議罷禮部侍郎晏敦復任吏部侍郎疏論和議最為剴切罷尚書出知衢州王庶專主用兵之議樞密副使毛叔度臨安府司戶參軍專論金使難測和議不可保移嘉州司戶范如圭以書責秦相主和議罷校書汪應辰上書論和議罷正字許欣以不附和議降兩官方廷寶坐不附和議遷宗正少卿韓訓任澧州推官上萬言書論和議編管循州陳鼎上萬言書云金人今日敗盟乃朝廷之福也使敵盟未敗即他日之禍有不可支持者願乘此敗盟之際早為自治之䇿送吏部與合入差遣論時行論和議引及分羮之事罷李光附會和議除參知政事庚申金人敗盟復奪河南之地罷參知政事洪皓乞不發南歸之人言章出知饒州沈長卿坐上賀李光啓曰搢紳競守和親甘出婁欽之下䇿逺人難以信結孰虞吐蕃之劫盟遂欲竭四海以奉鄰國之歡何至屈萬乘而下穹廬之拜除名編管化州張燾坐率侍從論和議補外陳康伯任吏部侍郎接伴金使設香案望拜亦令康伯拜康伯辭以不得旨不敢拜言章罷陳括任大理寺丞王倫使金國辟括為副括曰今朝廷多事欲遣某使金國臣子之義豈敢固辭若朝廷遣臺省諸公某願為之副如欲令某副王倫之行則某必不敢奉命也罷謫浙東酒稅陳剛中任寺丞以賀胡銓之謫其略云屈膝請和知廟堂禦侮之無䇿張膽論事喜樞廷經遠之有人身為南海之行名若泰山之重又云知無不言願請上方之劍不遇故去聊乘下澤之車送吏差知贑州安遠縣三朝北盟會編卷二百二十五
