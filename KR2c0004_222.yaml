body:
  text: 三朝北盟會編卷二百二十二宋徐夢莘撰炎興下帙起紹興二十六年七月盡其月七月張邵卒禮部尚書奉使金國待制張公行實曰建炎元年金兵已陷京師二聖北狩車駕南幸海內俶擾公慨然有憂時之志二年二月請于州上封事曰臣聞古人有言主憂臣辱主辱臣死臣觀比年以來金人內侮京師陷沒二聖北狩宮室為空陛下暴衣露蓋二年于兹矣天未悔禍淮甸再擾乘輿播越南絶大王以萬乘之尊涉不測之險陛下之于憂辱可謂甚矣此誠臣效死之日而職有常守不偹行陳冒矢石以畢臣分復欲剖心折肝指摘時事少陳愚者一得之慮以冀俾益其路無由疾首痛心繼泣以血誠不勝憤悶臣伏讀二月二十七日詔書有曰自今政事闕遺民俗利病或有關于國體或有益于邊防並許中外士民直言陳奏顧臣不學無術暗于大體不敢自謂有忠言至計然惓惓之情不能自已誠不敢避狂妄之罪輒效其愚臣竊觀今日中國之勢可謂危矣四海有瓦解之憂軍民有怨叛之意鄰國日以強盜賊日以多帑藏空虗干戈朽鈍而陛下以單寡之兵傷殘之餘退保吳越區區一隅之地國勢危弱莫甚此時臣欲大言之則迂濶而不能以紓難欲小言之則卑陋而不足以立國姑以當今所急者為獻庶幾日有就月有功嵗有成以光中興之業以復祖宗之舊陛下亦欲聞之乎臣聞國之強弱繫乎形勢有中原之形勢有東南之形勢塞飛狐社太行據成皋之險距白馬之津西取關中以制天下此中原之形勢也據建康阻淮泗資荆湖巴蜀之饒擅吳越閩嶺之利養威蓄鋭觀時待釁此東南之形勢也今中原形勢未可遽爭而東南形勢當力爭之何以言之敵既已取三關據大河轢關中城河陽形勢之地既略有之京師孤弱還而弗取金非不能取也闕其一面欲誘陛下歸而掩之也彼方據形勢以中原爭而我乃屢衄不振之師乘軍政破壞之後頓兵堅城輕犯險阻決一旦之勝爭尺寸之地非所謂見可而進知難而退者是中原之形勢未可據爭也東南之地素號富庶誠可因以為資待釁而動昔漢髙以關中成帝業光武以河北致中興劉裕以江左平關陜孫權劉僃皆一時之雄亦因江東蜀漢之資而強于天下今東南兼有江淮蜀漢之地方之漢髙光武蓋陛下之關中河北也豈孫權劉僃區區僻陋所能擬哉殆天以資陛下而贊之中興舍此則無投足之地矣可不力爭之乎非保東南無以為陛下之資非據建康無以鎮東南之勢建康之地龍盤虎踞古稱帝都却倚大江實天設荆湖巴蜀實居上流無事則漕挽足以給費有警則召兵足以戡難順流而下不淹浹旬吳越閩嶺實貨所出摘山煮海其利不資陛下何不據此以跨東南分遣將帥以除盜賊盡城江北諸州擇人以守之重兵以鎮之列屯相望綿地千里以禁格之術為聲援之助以為建康扞蔽以壯東南形勢乃退保錢塘示弱乎錢塘僻在海隅其地狹小臣恐金人聞之謂我棄江淮而退矣有如遣間諜誘盜賊啖以髙爵連衡抗我外恃金人之救內據要害之地堅城列守未可實攻則是淮江之間又生一金敵也失襄漢唐鄧則川陜之運不通失武昌蘄黃則荆湖之運不通失九江采石則江淮之運不通失淮西廬壽則維揚溧陽可以南渡而江左震矣就令能保錢塘彼將出豫章九江涉當塗京口數道並進南扼饒信北攻蘇秀絶我援兵梗我糧道無他自處誠非持久之便也以陛下之聖明睿智天資神武如此臣固知陛下非以錢塘為形勢久安之地也特以前日維楊無僃暫為避敵之計因時巡幸徐圖其所向爾臣竊謂錢塘固非形勢久安之地然舍建康而之他則尤為不可北門失關則京師陷關中殘破則襄鄧不足恃豫章長沙江陵之屬僻小一隅不足自保又如錢塘小一動搖則江浙財貨復失之矣或者難臣曰子欲天子幸建康豈欲以長江為險邪長江之險孰與黃河黃河且不足恃而敵既有之矣乃謂長江足以扞建康乎臣應之曰不然京師雖倚濁河為固然我宋之都汴也實以三關四鎮與自河而北若府與州為之屏蔽自祖宗以來嚴兵鎮守首尾相救形格勢禁金人不敢深入非以黃河不可渡也懼諸鎮之兵俟其渡河而蹴之也引兵深入前限大河或邀其歸路或擊其半濟雖欲無敗可乎澶淵之役縱還而甚懼靖康之初講和而從後以河北諸鎮大抵兵少勢弱自救不暇金人乘虛破京師劫二聖其視黃河直若一溝瀆耳何足恃哉然則以黃河為險而河北諸鎮因河之險以為扞蔽者京師之勢也以長江為險而江北諸州因江之險以為扞蔽者建康之勢也江北之偹臣請復言之敵入宿亳登萊則楚泗濠梁為衝維揚為扼諸江江隂為重敵入曹濮則陳蔡廬壽為衝溧陽濡須為扼九江采石為重敵入汝頴則襄郢為衝復安蘄陛下分遣能臣相視諸州要害築堅城而守之長江之衝列置水軍而駐于南岸津沙之地嚴為守偹水戰之具務極工巧自江陵而下鎮江而上度地遠近列將守之其間地遠勢分則添置城堡守以偏禆聲援相及烽火相望隨其部分統以大帥付之以征伐許之以便宜其委任規畫雖在平日悉比極邊敵騎入邉按兵持重或迎其前使不得渡或乘其後使顧而驚或邀其歸使棄所掠或薄其險使殱其類敵圍重鎮則裒兵以援盜賊所渡則併力邀擊此江淮設偹之大綱也其間細目不可勝舉臣未盡言姑以一方之所急者言之徙壽春濬淝水塞瓦梁繕濡須此一方之急也壽春舊治控扼東北阻水為固其地最險自古南北交兵則必先爭晉守之以抗石勒是以有距靈之勝梁失之以資侯景是以有臺城之亂周世宗伐淮唯壽春堅守數年不可下因劉仁贍之病其衆遂降世宗惡其險而遷之倘復其舊亦吾之保障也淝水之阻橫貫廬壽謝玄于此實破苻堅遺迹故道尚可究尋瓦梁誠塞後湖為淵自昔南朝謂之北海遺址尚存復之甚易濡須之塢孫權所營權有合淝則濡須為重我有合淝則濡須似輕設險豫偹亦不可廢凡此數事皆在所急唯徙壽春尤不可緩以臣觀之今已晚矣誠非一守令幹辦所能了也此一方之急臣所知而略言者如此江淮橫亘其里數千臣之所未見與言之所未盡其他利害可類推矣陛下誠能從臣之計進守建康以持形勢經略江北以為距塞以我富強觀彼釁隙秣馬厲兵復中原之舊雪二聖之恥夫何難哉或者復難臣曰今日之事迫矣中原待救有頭燃之急二聖未還須迎請之師車駕巡幸豈有定斷子不陳攻取之計建興復之䇿因西北思歸之士及其鋒而用之以爭中原乃欲説天子以都建康是偷安之計爾且淮江之地縱敵得之不能守也乃區區留慮然則江淮而北子欲棄之以蹙國耶臣復應之曰不然觀時而動見可而進兵家之勢也吾豈棄中原而忘二聖哉顧金戰屢勝而我常衄敵氣方張而我未振角力爭進誠所未暇若曰得其地而不能守因置外又非計也兵法不曰先為不可勝以待敵之可勝無恃敵之不來恃吾有以待之耶向所論江北之偹特建康之扞蔽天下之近衛耳江淮有偹勢可自守無有後患然後選將命兵東繕齊魯西復潼關北取河津以圖拓復以迎二聖未為晚也然今日之急江淮之外若彭門責社若京師漕濮與夫關中川口之地亦宜有以大鎮撫之俾扞蔽益多而東南以全齊襄公復九世之讐春秋大之越之報吳也亦以二十一年之久兹事體大當務萬全吾豈棄中原而忘二聖哉東南誠全相與堅守金人聞之亦謂我無意于中原也不復偹我日益驕墮且有內釁可得而乘者漢髙之都南鄭也張良勸燒棧道以示項羽無西意羽以故不復設偹髙帝因之遂能定三秦成帝業往事可鑒其理灼然不識陛下以為然乎雖然前日所陳特一國之一事耳又有大于此者陛下誠能不惜玉陛方寸之地使臣披露肝膽當為陛下盡陳當今之急所以富國所以強兵所以除盜賊庶乎洪業可興中原可復大恥可雪陛下亦有意乎蒙恩召對時金再入師渡河而南朝廷求可使者欲止其師莫有應者公慨然請行上嘉之特轉五官授奉議郎直龍圖閣借禮部尚書充奉使大金軍前使楊憲副之以泛使恩官其二弟祁邴祁又以泛使賞格授添差明州觀察推官與諸弟奉太夫人居于鄞公以其日就道是月至楚州先遣二校執旗渡淮至抵村見金人先鋒太一貝勒留一人為質遣一人還遂扺海州界見貝勒使裕太尉者館伴又有德濟天使偕行至濰州接伴天使至有妓樂出迎公曰二聖見在北方某為臣子所不忍聽遂止樂凡三請方赴宴宴罷遣妓四人來侍公明燭竟夕危坐翌旦見監軍達蘭令公拜公對曰監軍是北朝兩制某是南朝兩制無拜之禮達蘭曰汝見大金皇帝亦不拜耶公曰見大金皇帝則拜遂設香案俾望拜達蘭遣人取國書因止公于昌邑俾俟報久之隨行吏士謀曰我輩倘執留于此未有歸期敵亦玩且從初黷我者貝勒也不若殺之人各散去遂與楊憲合謀以狀告公公曰不可是反害事吾儕安得脫于是大違衆議憲等怒反誣告于敵若偽泄其事者達蘭以甲圍昌邑遣人執公等且問如何謀反忽一使臣曰不干尚書事三日前收得副使狀子今在夾牆裏因指示其處數人取得之以白達蘭方知事不由公鞭楊憲五十使臣談恭以下各三百俱執送密州柞山寨拘繫敵兵屯守于近明年四明公聞達蘭復經從乃以書抵之曰竊觀自古忠信之士將命出疆緩頰立談非獨有以利于我亦將有以利于彼然後可以解兩國之紛成一時之利某等駑怯不敢自比古人而區區之意所以為閣下利害計者請為大國陳長慮遠圖之術某聞善創業者不必善守文善制勝者不必善持勝善成始者不必善成終是以自古有為之君與佐治之臣負英特雄偉之資會逢其適乘敝而起兵強于天下威加于鄰國則必以守文為難而某等輒復以持勝成終為難而附益其説以獻于閣下何者以某區區之愚嘗觀于大國自交兵以來大小數百戰未嘗敗衄卒獲大利成大功可謂善創業矣可謂善制勝矣可謂善成始矣然連兵二十餘年士不解甲馬不釋轡南北之民肝腦塗地殺伐不可謂不多愁怨不可謂不衆大夫不可謂不勞訖未聞有偃革回兵之議興滅繼絶之恩無乃犯猶火弗戢之戒乎昔楚有養由基者善射去栁葉百步百發而百中之左右觀者數百人皆曰善有一夫立其旁曰可教矣基怒釋弓撫劍而問曰客安能教我射乎客曰我非能教子屈左伸右也夫去栁葉百步而射百發而百中之可謂善矣不以善息少焉氣衰力倦弓撥矢鉤一發不中百發盡廢基曰善此雖古人已陳之説然某等輒敢借是意以教執事者用兵庶乎可以少助大國守文持勝成終之術不識閣下以謂然乎雖然為用兵之䇿者亦必有説矣不過曰南人易與耳甲兵不如昔日之強用財不如昔日之廣大江之水僅一衣帶比之黃河豈不可渡寧昔日能勝之而今乃不能耶某等竊以謂不然蓋聞善論天下之兵者不論強弱論其曲直而深識天下之理者不患太弱患太強宣和靖康之間南國亦可謂強矣而其理似曲何者宣和開邊隙其曲在帥臣靖康啓兵端其曲在謀臣是以大國能勝之然宣和靖康之事既往矣固非嗣君之所與亦非使者所敢及而今日之事則又非敢較曲直于大國也特敢以師出有名無名為言耳抑古語曰困獸猶鬭而况國乎大江之阻固未嘗恃然冬無固氷水多風濤苻堅魏武皆嘗輕視訖不能渡自取奔覆况江為四瀆之長豈黃河可比也哉借令大江可渡而江南地卑多水閣下欲以疾戰勝之則吳楚輕剽難與爭鋒欲以持久弊之則疾疫暴作非所宜處南北之限天實為之脫有意外之驚少致蹉跌豈不損威重喪前功也議者之意又不過曰南人怨我深矣不以此時遂勝之其如後患何某又以謂不然宋有南朝二百年矣自太祖皇帝以揖讓得天下僣偽畢臣未嘗殺戮傳之子孫世世修德惠澤之結于民也久矣億兆之愛其君也至矣時難多故天命未改書曰天視自我民視天聽自我民聽傳曰三代之得天下得其民也得其民者得其心也自兵興以來調發不可謂不多煩費不可謂不廣然南國之民舉無怨讟之念乃有謳吟之思試察民心可以見天意矣張邦昌挾宰相之貴籍大國為重不敢一日私有神器自江而北盜賊多有大扺皆以興復趙氏為言無一人敢僣竊名號者嗣君以片紙呼之一戰向之悉降悉敗此又可以見天意也議者謂某等曰石氏柴氏常有南國矣一滅遂廢豈必趙氏長有天下耶某曰不然石氏柴氏之得天下也皆以叛逆取之享國日淺無德在民其所施于民也不厚天之報石氏柴氏也亦薄是以一滅不復興豈比趙氏積德垂十葉之光施澤幾二百年之久過於漢唐遠甚漢嘗滅矣至光武而復興唐嘗喪其河北關中之地幾于滅矣已而亦克復興孰謂趙氏而可以此時取之哉萬分有一假令大國以兩河之地為他姓之有則百姓無樂推之意日尋干戈藉口以起他日為大國之患殆閣下實同之伏幸少采愚者一得之慮以某等是書之意達之皇上謀之元帥罷兵休師遂敝邑之所備早賜某等旋歸復命之期使得報嗣君而稟事焉實天下之幸達蘭得書久之傳令俾送偽齊録用達蘭即後為元帥魯國王者也公至東平見劉豫升陛揖曰即日恭惟殿院台候萬福豫愕然因慰藉公等且及録用之意公讓責之為陳君臣大義慷慨憤激詞氣俱厲豫大怒是日副使楊憲已懼而降公欲歸斬之未發而遁豫囚公于司理院者半年公屢請借書以觀豫知公終不可屈遂復送于金金拘于燕山之圜福寺從者皆散莫知所在是嵗辛亥實紹興改元四年三月聞金帥額魯溫攻陜西回公草書與之曰某嘗以窺天管見竊以大國可謂既安既治矣而弓矢未盡櫜匱黔庶未盡返田畝士大夫未盡安室家而閣下亦未免暴衣露蓋之勞豈非以江南為慮耶審如此某竊以為過矣某聞天下之事有所謂一時之憂有所謂萬世之憂有所謂一時之利有所謂萬世之利而萬世以無憂一時之利不足道也伐江南而不釋則止可得一時之利而遺憂于萬世一時之憂未必銷也請為閣下别白言之大國議兵執事者之意某知之矣不過曰宋人之怨深矣入其國披其地而今保于江南恐其乘釁隙而擾疆場焉此一時之憂也萬分有一大國以議者之意為然命將興師加兵于江南一戰而勝之此一時之利也而所謂萬世之憂與所謂萬世之利初不在是大國之執事者以江南介意而慮東人之未有歸也于是援齊而立之倚為藩屏且存靖康大河之約而示天下以不貪其地此某妄意之所適者也然某聞以國為屏者力倍則為臣為臣則能制能制則久而為利力均則為敵為敵則不能制不能制則久而為害大國之于齊固當倍其力而使為臣非欲均其力而使為敵也若過于江南為慮而動兵于遠戰而勝之則齊人任拓地之福大國失養鷹之術戰而不勝則大國受衄兵之禍而齊人持首鼠之謀雖然以大國之威靈而閣下專閫外之事有所不戰戰則必勝戰勝而後萬世之憂起矣得江南之地而大國不能守虜江南之民而大國無所用縱有金帛之得不償人馬之耗疾民遠役徒以厚齊末大必折尾大不掉古有明訓不可不戒且閣下獨不見景延廣之事乎契丹救晉祖之死而與之以天下恩為父子義為君臣自以為膠漆之固傳及二世得景延廣一言而背之適無他虞能伐其罪使當是時契丹有牽制之憂晉人獲忠智之佐詎能伐而勝之乎雖伐而勝所損既多既失屏翰之臣旋喪關南之地此天下之所知也安知他日之諸臣有不為景延廣者耶齊人之德大國固厚矣自今日觀之疑不敢背然傳世一再之後歷年十數之久國日以富地日以廣建皇帝尊號則與大國之貴均也稱南北兩朝則與大國之大均也其貴均孰肯為我事其大均孰肯為我役志滿意得侈心日萌儒生獻議曰國體壯矣請去臣號以凖古武夫獻議曰兵力強矣請敕武備以待敵于是時而有好利喜功之主則必曰南北朝為敵國其來久矣古不臣而我臣之何以示後世耶此有纎芥之隙可候彼其蚍蜉之援可恃飛揚跋扈難以制矣伐江南而勝之其憂如此乃果能一戰而必勝乎其所謂遺憂于萬世而一時之憂未必銷者此也書成未及上守者疑之閉其出入其後十日敵遣人索書書成未已而轉徙益北至平欒州興中州府義州中京會寧等處去燕山東北二千餘里羈縻流放不復問其所止敵蓋意公明言兩國利害深識南北之勢過為之慮欲遠而絶之如所謂中京者往時二聖嘗駐蹕于此如司馬公朴魏公行可崔公縱郭公元邁亦嘗在焉會寧則去中都又二千餘里也方是時敵新立國嚮慕文教人知公以儒學士多從之授書生徒斷木書于其上捧誦既過削去復書中圓如瓠而首尾尖目之曰木橄欖蓋其俗兒童誦習率以此公又以易講授學者為之期日升僧坐鳴鼓為候請説大義一時聽者畢至由是生徒或有錢米帛之饋則賴以自給嵗在癸亥二月初六日金人忽召公詣尚書省説諭放還遣使館伴俾就館且使與洪公皓朱公辨會于燕山同塗而歸時紹興十三年也四月十四日自會于同塗而洪公先在焉五月朱公自雲中至六月庚戌三人俱發軔于永平館途中以詩唱和目之曰輶軒唱和集七月七日至汴京館中都亭驛二公俾作集序自是南歸至盱眙軍以表聞公陛對首以主憂臣辱願不忘嘗膽為言至言一時死節請加褒贈有曰臣聞古者敝帷不棄為其埋馬敝蓋不棄為其埋狗夫馬以代勞狗以守禦其為功也微其為物也賤而猶有帷蓋之報况執節死事之臣功非微而事非賤者乎臣伏見靖康以來迄于建炎使于金人而不返者至數人若陳過庭聶昌若司馬朴若滕茂實若崔縱若魏行可皆執于北荒殁于王事而司馬朴之節尤為可觀劉豫既廢金人取河南地金帥達蘭使朴為尚書左丞欲以收南人之心朴辭以疾堅卧不起達蘭不能奪其節後以病卒陳過庭且死其卒自割其脅取肝為羮以獻冀愈過庭之疾既死以北俗焚之其卒又自剔股肉投之于火曰此肉與公同焚其感人如此聶昌割河東絳州人殺之滕茂實將死自為祭文人憐其忠崔縱中風坐廢三年其將死也以役事屬臣魏行可之死臣亦見之去冬臣請于金人尚書省乞挈崔縱魏行可之櫬以歸其宰執憐之朝命下所屬發遣而魏行可之櫬有挈之中京者乃不果發而崔縱之櫬金人差丁夫輿致令臣護之以來臣謹置之臨安府城外妙行寺而臣之隨行使臣有呂達者本婺州人亦以疾死于北界臣愚欲望聖慈憫死事之臣如陳過庭輩七人其間恐有未經褒贈者命有司檢舉特施恤典訪崔縱之家許親戚迎護其櫬而官助之葬下以慰忠義之魂于九泉上以副陛下不忘臣下之心庶可以激勵天下仗節死難之義疏奏宰相怒降旨令開具逐人致死因依申尚書省是時和議既堅朝廷奠枕上下相安大臣方將盡舉天下中興文物之盛而公氣槩質直忠義自許初脫異域萬死一生鋭意盡言不暇依違故大忤時宰方國家之不競也敵跨河而有之獨環京師而不取公上書首言其詐是後卒如之何見達蘭于昌邑也遇秦丞相間行南歸班語路隅泣涕相勉詞氣奮烈秦公為之側目有吳和者有孫懋者嘗為馬闕屬官闕軍退而和懋降金達蘭使二人從公飲酒以誘之蓋和頃在宣和間與公同為太學生時以金命知萊州妄自矜大爭論輒不遜公叱之而罷自是不復見逆豫之僣號也實金授立之背義違天神人共憤而公廷折其狂妄之威示以比肩之分使一時汙染之俗知有大義私書遺敵曉以末大必折尾大不掉以啓廢豫之謀非公胸中甲兵足以殄滅之則豫之跳梁跋扈其有既哉當其時握節于金者幾三十人嘗因朔庭赦宥許使者歸其里諸公懲久縶語不以素或徼幸稍南則占藉淮北惟公以實告且甘心流離不為勢利屈卧起一節忘其凍餒亦猶齧雪餐氊幸而不死其後益徙而北稍稍自便始有哀王孫者故謝樞密王公倫惠綿衾之詩曰蘇氊久絶寢衣想薑被忽分挾纊春至訓導童蒙資其束脯困厄如是而志不奪其後十餘年間一時南冠者或死或留所餘無幾而公亦自分編于異域身膏沙漠不復歸矣其于懷闕思親之外處之怡然紬繹書史賦詩作文比歸藁帙至多類與時不合目擊誣告羅織之禍悉焚之殆無孑遺公之操心慮患如此卒以免吁可哀哉自靖康以來仗節死義之士固多或殁異域者將何以自見公歸首以司馬公等數人為言歸崔公之喪且請加恤典雖一忤大臣意而數公之節義凛凜乎標于青史使後世知聖代之多忠臣公之力也三朝北盟會編卷二百二十二
