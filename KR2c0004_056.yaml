body:
  text: 三朝北盟會編卷五十六宋徐夢莘撰靖康中帙起靖康元年九月十九日壬午盡二十一日甲申李綱落職依舊宫觀又臣寮上言竊見昨者金人圍守太原久而未解知樞密院李綱出總元戎戡定敵兵兵甲非不多也至辟為屬官凡七八十貟抽差人役凡六十名能否不辨幕府紛然軍政出于多門臨時漫無成算偏稗不知稟令士卒自相殘踐以守則不攻而潰以戰則未鬭而遁斬將不關主帥生擒則非敵人兵卒逃散金帛散失綱既告罷其屬官或托故差出或隨逐前來各帶劵厯不廢請給所謂法度紀律一切無有以此行師欲求決勝臣未之聞也大帥自當親臨戰陳以護諸將決求成功綱坐懷州去軍前凡數百里緩急何以及事其幕府參議宜管文字勾當公事等官員數猥衆又多晚進後生綱傲然略不咨問其所與親密朝夕不相捨者唯鄒柄與張牧而已自餘僚屬將佐唯晨夕一揖而退若有所建明須先禱柄牧為之傳導然後得見故人多怨卒以無助而敗事况鄒柄張牧白身得官何嘗知軍旅之事綱數十萬之衆而決謀於此二人可謂踈謬之甚聞綱初欲過隆德柄牧力爭不得往及軍勢稍沮遂督諸將士卒忿怒下情不通十羊九牧無所適從太原不守數日矣綱在軍中尚不得知何以望其能先事而料敵哉誤國損威莫此為甚觀文峻隆宫祠優遊非所宜得願賜黜奪以協師言若鄒柄張牧贊佐誤事亦當追奪前命以明國威以肅軍政奉聖旨李綱落職依已得指揮差提舉杭州洞霄宫鄒柄張牧並罷見任令别注授差遣又言初見李綱天資躁輕濟以凶愎地位尊崇恥於咨訪辟置幕府皆一時趍附之憸人選用禆佐多平日敗亡之冗士圖事揆䇿既非所長料敵應變又其所短淹留纍月縻費國用不可資計卒不能解太原之圍若不究正其罪而顯黜之則非所以定國是也然綱強辨似智敢為似勇竊主威以交羣枉違公道以市私恩故一時小人喜為稱譽每綱之敗則歸咎以賈衆怨蚩蚩之民輕信易動綱之姦詐何由盡知若不明數其罪而播告之則非所以孚庶聼也臣按綱之罪未易悉陳請為陛下言其大者上皇獨決大議傳位陛下蔡攸乃詭傳上皇之命謂吳敏有建請之功峻加柄用以庇蔡氏之宗敏固已不勝誅矣綱于陛下龍飛之後乃始引敏以為證奏疏自云臣與吳敏力建大䇿贊成內禪綱之欺天罔上抑又甚矣綱之罪一也今春敵騎至城下陛下屈己為民以講和好其使都邑之民輸金帛以助國蓋非得已執政王季迪庸暗無狀揭大榜於通衢肆為乖謬不可施行之論臺諌連章奏劾陛下即罷輸納或命以官或以官折還元價綱掠人主之美使行營司收榜曽不知出于陛下也故綱之罪罷其徒唱之市井無賴千百為羣白晝縱殺幾至敗事綱之罪二也陛下始降親征之詔燕越兩王上表固諌從臣言官亦皆奏疏乞罷親征嚴都城守禦雖殿巖武帥亦以為言綱又言躬述利害回鑾輿之行陛下俯順羣情豈獨綱之力哉欺愚惑衆妄自誇耀綱之罪三也逮西師四集种師道之謀與諸將駐兵郊外敵營寖懼若綱稍加持重從師道之謀絶其抄掠徐為後圗豈有喪師之禍平仲之戰綱實使之輕舉妄發誤國大計猶復肆為狂誕之言潰亂朝聼綱之罪四也蔡京棄去君父逃於拱州遣人以奏牘抵綱使之請對綱輒敢為京敷奏京亦恃綱在朝遽至國門以俟君命顯庇元惡輕負國恩綱之罪五也蔡攸建請上皇為渡江之計日進姦言離間兩宫遣其黨宋㬇傳道語言狂率不遜神人共憤攸既以罪斥綱被詔奉迎上皇乃請以攸為行宫副使欲使入朝都邑震恐既又以攸有扈從之功力為營救綱之罪六也攸在丹陽綱自圍城中通書至為庾詞云不敢渝信又有太師鈞候甚安此中不輟通問之語時京在占雲館也其披寫腹心親密無間一至于此綱之罪七也於丐去之章妄云奉使而兩宫協和上皇之於陛下陛下之奉上皇天性至愛本無纎毫之間綱安得此語哉綱之罪八也綱任為元帥偃蹇違命輒取陛下除授兵部侍郎以後告敕繳朝廷略無顧憚綱之罪九也綱自起總行營専主用兵近者乃復請卑辭厚幣以講和入請親降手詔棄太原于度外綱之罪十也今勍敵在前國威未振綱之誤朝致衄喪師辱命與夫懷姦黨惡之罪條具于前矣伏望陛下奮乾剛之斷繼離照之眀處以散秩竄之遐方以伸邦憲仍乞特降詔旨布告中外以肅軍聼李綱責授保靜軍節度副使建昌軍安置又上言臣聞人臣之罪莫大貪天之功竊人之財猶謂之盜臣竊觀李綱劄子稱上皇厭萬機之煩欲授聖子意未有發臣與少宰吳敏力建大䇿贊成內禪臣伏觀上皇以神器授陛下蓋知天命人心有所歸屬奮然獨斷豈假人謀此帝堯盛德之事也當時蔡攸出入禁中刺得密旨報吳敏李綱欲使二人進用為已肘腋吳敏時權直學士院身在翰林院故其議先達綱為太常少卿踈外無由以進而綱遂懷此劄子諸路示士大夫人無不見之所論三事內禪乃其一也其詞引唐睿宗始立為帝皇嗣居宫事縉紳見者莫不駭愕罪綱失言由是言之綱豈知上皇聖意哉徒得攸言猶未敢信且首尾兩端今乃敢明言上皇之意未有所發與敏力建大䇿則是誣上皇而欺陛下非所謂貪天功以為己力乎臣聞善則稱君過則稱己人臣之美也唐書言戴至德無異才唯能歸善于君為時所服若綱則不然綱劄子又曰嵗首上皇南幸浙羣臣亦有勸陛下為避敵之計者又臣躬述利害回鑾輿之行為固守之計臣竊謂固守都城兵民之心也陛下因人心而却南幸之議綱何與焉使綱嘗言之亦大臣獻替之常事何必髙自稱譽耶綱又有劄子曰傳檄而三鎮堅守奉使而兩宫協和臣切謂綱之傳檄必得陛下聖旨非假聖旨其誰肯從綱乃自為功何也上皇北歸乃其本志陛下遣近臣袛迓禮意曲偹兩宫未嘗不和綱乃以為協和兩宫何也此以善自豫以過歸君人臣之義當如是乎綱以是數者平居叫呼衒耀要譽于流俗於奏表中時發不遜語自比其功于張良劉幽求裴度李泌流俗無以為不然遂以為真國柱石也大率綱之為人髙言誕計足以欺惑愚衆今春金人頓兵城下而綱領行營司及京城守禦司屢聲言破敵都人遭圍閉之久莫不喜之使應援姚平仲卒無尺寸之功而國受莫大之辱流俗猶言綱以為能用兵蓋其誕妄足以惑之也方金人邀索金銀朝廷根括民間以足其數時王孝迪為中書侍郎獨主其事揭榜立禁有四盡之語民甚苦之臺諌交章論列朝廷遂罷根括而民間未知綱乃乘馬遍厯京城自收其榜使百姓歸恩于己又使妄言無行之徒如馮楫陳公輔輩稱頌功德奔走揄揚以竊流俗之譽遂率龔裕叩閽喧噪以劫持人主成其私計于是已罷而復用推原其心罪不容誅為臣之義可如是乎宣撫河東略無經畫肆意妄作督諸將決戰數路敗衄使太原失守陛下因其乞罷遂與揚州今又與宫祠原其罪狀此為寬恩而流俗紛紛謂綱于國有功不宜間廢此浮言妄議固不足恤然朝廷退斥大臣當暴白其罪于天下使人洞然不疑則浮言自熄誰不信服臣愚伏望陛下特降睿旨以綱之罪大正典刑報行臣章以解流俗之弊奉聖旨李綱責授保靜軍節度副使建昌軍安置李綱再責寧江軍安置綱上書辨雪再責寧江軍安置許翰落職宫祠臣寮上言竊聞昨者出師河東大將种師中全軍陷沒兵威挫衄太原之圍卒不能解仰貽睿聖宵旰之憂益壯勍敵慿陵之勢忠義之士憤悶􅋀齒曽不知本兵之地實有以致之也師中老成持重號為名將練達敵情洞曉軍律擁數萬之衆出援孤城當料敵制勝臨機應變以圖萬全之利必不輕舉妄發以僥幸速戰之功也同知樞密院事許翰怯懦寡謀而好談兵輒以逗撓不進移文督責使之出師以贖過師中素剛不受迫促翰從中制之所不能忍忘其萬死以決一戰卒至敗績陛下雖已録其盡忠然師中齎恨地下而翰之罪曽未暴白臣實憾之使翰百輩在朝何所補而失一師中所繫甚重謹按翰終始蔡京之門指天誓日結為死黨陛下踐祚之初首叨除召為御史中丞曽未一言以及京攸之惡每復平日私讐聞者莫不憤疾首薦蔡氏族壻陳求道為臺屬求道以道告訐得罪雖陛下灼見其姦不復用然士論尤為之不平躐遷樞府方艱難多事之時移病謁告纍月不出今者尚以延康祕職出殿近藩且翰在言路則黨惡庇姦以欺君在樞密府則妄作生事以誤國迹其罪狀夫豈勝誅伏望睿斷重賜竄斥以為懷姦罔上之戒少贖師中將士九泉之寃取進止奉聖旨許翰落職宫祠許翰之進李綱所薦也太原之役翰督姚古种師中進兵解圍李綱之行辟屬官多碌碌之人然才者十得三四耳亦未嘗諳邊事劉韐沈琯王以寧折彥質裴廪以知兵稱其實能兵者誰也惟劉韐當遼州折彥質屯汾州王以寧督戰過文水此能效力者其他不過供文字偹差使點檢而已如何大圭輕薄子何足置之幕下議者謂綱意廣才疏知人之鑑不甚明翰每右之師中敗綱黜并翰罷林泉野記曰許翰字菘老洪州人進士中第宣和中為給事中言髙麗入貢奢侈之事出知亳州後提舉杭州洞霄宫靖康初以李綱薦召為御史中丞言蔡京童貫蔡攸皆坐責俄同知樞密院金人邀求三鎮翰言三鎮棄則京城不可都而天下危矣不宜許乃薦种師道宿將可用又請誅蔡京童貫王黼朱勔楊戩李邦彥孟昌齡等家族并推治門生黨與上不允翰嘗督姚古种師中兵進解太原之圍及李綱黜并罷翰金人遣王芮來索三關地遺史曰太原既陷金人使王芮持右副元帥斡里雅布書必欲割三鎮之地以謂一鎮既得兩鎮不可不割又誘説執政曰大金地廣非欲固得三鎮但朝廷既以許之不宜背約使南朝能三鎮賂大金大金必不受以全和好然信義者鄰國之寶豈可去之使金人以信責南朝提兵再來則何以禦得芮詭辭蔓衍指天地為誓而縱其説耿南仲以為然上念太原之失重惜河朔兩鎮為畿甸之垣屏乃通好于斡里雅布許以金帛寶貨以贖兩鎮命將作少監王及之為國信使以禮遣芮還賜蔡攸自盡中興姓氏姦邪録曰蔡攸字居安京之長子也長子柔佞諂諛自幼出入宫禁與內侍無異専為優伶之態上宴飲或丙夜乃出纍加宣和殿學士深結內侍以固寵薦引門人劉僴韓駒吳敏等數十人皆以禁從其妻黨宋喬年宋㬇宋昞等皆因攸為侍從要職宣和四年為河北宣撫副使從童貫以收燕山府略無措畫惟拱手奉貫而已五年師還除知樞密院事加太保燕國公日夜侍上及諸內侍賜宴賜大第與京門相對權勢尤重於京故京復忌之攸復譖京使之致仕其家為復道曲河暗通禁中邀上私幸其第連夜不止大金入攻攸蔽匿告急之奏皆不以聞故兵勢熾矣聞大金逼乃隨徽宗南幸靖康初臣寮言其罪責授大中大夫提舉亳州明道宫再責潯州雷州臣寮再言其罪移竄海外遂賜死時五十國史後補曰伯氏魯公之長子又所最愛當元符初官裁造院上為端邸時每退朝出內北門伯氏適來趍院必下馬拱立門首以俟上過而後退上詢為何人左右曰蔡承旨衙內也由是上心善之其後常以為言况慿藉家世遭逄異寵又如此假若稍加修飭則宰相三公不屬他人矣亦何必作為諧媟用蕩上心依恃婦人破壞骨肉至違背天性上孤恩紀上既睿明在宫中反笑謂左右蔡六詎應為宰相耶是徒為時主所窺凡所勞心不亦惜乎二十一日甲申標童貫首榜示開封府監察御史張徴奏準尚書省劄子奏聖旨差前來廣南路勾當公事臣於七月二十九日出門八月一日起發連夜蹉程及沿路密切根逐前去至八月十六日到南雄州已遵依聖旨處分各己施行了畢别無踈虞及具奏聞去訖臣契勘廣南與嶺南相接連地氣炎熱兼即今秋暑方壯自南雄州至京計二千五百餘里五十二程委是地里遙逺今來臣所勾當事竊慮或有變動雖已用水銀等養浸固護兼程齎管前去赴闕外奏聞事九月二十一日三省同奉聖旨檢坐前後臣寮言章并張徴所奏令開封府揭大字於市曹要閙處出榜示標首臣寮上言臣切見近遣監察御史張徴前去廣取童貫首級仍降臣僚章疏并聖旨列其十罪元惡大憝無所逃於天地之間梟首通衢孰不欣快昔舜誅四凶而天下咸服蓋刑人與衆棄之也臣愚欲乞將前降言章并所列十罪播告天下四方萬里之外咸得聞知既足釋百姓憤怒之心又可召和氣而懷逺人取進止九月二十四日三省同奉聖旨依奏檢坐到十罪言章指揮下項一承靖康元年九月二十三日檢會臣僚上言第一章責授左衛上將軍追廣陽郡王豫國公致任池州居住第二章同上第三章移彬州安置第四章吉陽軍安置第五章臣契勘前後臣僚論列童貫罪惡非一理合誅夷陛下仁慈未欲置之死地從輕貶竄於貫恩德厚矣臣訪聞貫尚遲回方命不即就道今來朝廷使奉迎上皇切慮貫稔惡弗悛規免謫命尚欲僥幸還朝緣貫姦凶久著軍民怨憤欲食其肉近者金人圍城逾四十日民庶不堪闈閉之才叩闕洶洶歸罪宦官歐擊而死者十數輩貫若復入都城竊恐别致生事兼前此陛下嘗降指揮令貫守禦京城乃敢盡室南奔官為太師寵極王爵去國之日更不朝辭揆其情實殊無人臣之義也兼已罷宣撫司職事却復擁精兵自衛按春秋法是謂叛逆罪惡如此若不重置典刑何以厭服衆心望陛下斷自淵衷更賜黜責施行仍降睿旨令開封府多差得力使臣管押前去至貶所取進止又第六第七章唯陛下思京闕震驚之變實生于貫致上皇前日之播越軫陛下父子之情肅邸今日之拘縻傷陛下兄弟之愛太祖太宗百戰得天下一童貫危之此而不殺臣恐太祖太宗含怒于上天未已也臣切願陛下奮乾剛發睿斷即貫之貶所檻致京師召百官陳九師誅於觀闕之下醢其軀以賜戰士函其首以遺金人其戰士受醢必踴躍以增氣金人發函必聳惕而畏威契丹之怨稍紓則金人之師自退矣茍或不然則垂盡老奴將死牖下陛下受侮強鄰貽譏萬世無以慰宗社之生靈則金人之兵恐未息也臣不勝激􅋀之至取進止第八章臣聞人君以至尊統于士民之上百官萬民仰而承之率職戒懼不敢易紀律者禮以為之防也是以人君者昭德塞違以臨照百官必謹其文物度數之别革制度衣服者為畔畔者有討無赦所以别嫌明微以正人心也伏望陛下斷自淵衷大正典刑天下幸甚取進止奉聖旨誅訖告諭中外尼堪陷平定軍尼堪既陷太原府汾晉諸州乃東攻夀陽城小而百姓死守凡三攻之死傷萬人竟不拔乃攻平定軍欲據井陘往攻之喪士三千人又與斡里雅布兵合攻之亦喪萬人而拔之措置守禦京師置四道總管以李回為太尉太河守守禦使范訥河北宣撫使朝廷以出師屢衄不能絶金人割地之請敵騎且深入思得長䇿以衛王室四道總管統天下兵分制諸路為京師衛東道總管統京東淮南之兵西道總管統京東之兵南道總管統京西南路湖北之兵北道總管統河北之兵以折彥質為宣撫判官以李回為太尉守禦使以偹尼堪改訥為河北宣撫使以備斡里雅布又以都使者榮嶷陳求道監丞許先之等同諸將帥以守要津三朝北盟會編卷五十六
