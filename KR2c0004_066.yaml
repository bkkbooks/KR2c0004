body:
  text: 三朝北盟會編卷六十六宋徐夢莘撰靖康中帙起靖康元年閏十一月一日壬辰盡十四日乙巳閏十一月一日壬辰朔駕幸京城南壁上幸南薰門詔用太祖故事儀衛務從簡便以障泥乘馬乃除道馬行泥淖中或穿巷循堤而行躬擐甲胄登城民皆感泣及食時却去御膳取士卒食以進支賜有差準備差使猶二千文武幾七千員所用不可計其衛士對御血戰者賞尤厚遺史曰車駕幸城南壁撫勞士卒如前已而幸宣化門徒步登拐子城親視敵營悉屏侍衛惟內侍數人從偶雪作泥滑身被鐵甲步履如飛上在南薰門下張叔夜領兵于城下起居軍容整肅上喜之命移軍入城叔夜遂與吳革偕入城加延康殿學士內外兵馬都總管即城樓命取宰相何栗笏頭金帶以賜之叔夜言郭京狂率必敗事請因金營壘未全率諸將擊之其敗可必上不從初吳革以王命使陜西勾兵為京城援既出城遇敵騎已至闕革行不能進知叔夜自頴昌入援乃會合叔夜戮力轉戰至夜遂同叔夜入城革靣奏乞量差軍馬奪路赴陜西叔夜固留革統制官京城四壁共十萬人諸將募戰士市中黃旗不可勝計應募者悉庸常寒乞之人無鬭志詔五嶽觀上清宫等屯衛以備非常數遣使懷蠟間行出關召兵又約康王及河北守將合兵入援多為邏者所獲統制范瓊於陳州門外披城屯兵數千京畿提刑秦元集保甲三萬先請出屯自當一靣朝廷不從敵兵薄城又乞行訓練乘間出戰元所教保甲雖六七萬人然怯懦無實用常有五千餘人衆寨朝陽門外相持六七日疾驅其前衆遂棄兵潰走敵亦知我之實虛無所憚矣竒兵作亂遺史曰城中百姓疑城內外姦細為亂收捉良民斬首毆擊至傷不可勝數樞密承旨王健下京畿弓手尹竒者疑使臣十餘人為姦細鼓衆殺之并毆健內前大擾殿師王宗濋引兵收捕斬數十人乃定健創置竒兵遂為竒兵統領官而何栗領之有識者莫不以為笑蓋自古兵法皆臨機對敵竒正相變無非正兵也出竒用之則為竒兵耳未聞預以竒兵自名者况未嘗出竒何竒之有大雪門下侍郎何栗除尚書右僕射兼中書侍郎檢校少保鎮海軍節度使充上清寶籙宫劉延慶除檢校少傅二月癸巳幸京城西壁車駕幸京城西壁勞士卒悉如前上鄭門南道總管張叔夜兵四千在城下詔以叔夜為延康殿學士駕登鄭門以馮澥與番使自前來故也范瓊劫寨者回獲數百東水城築夾城金人攻善利門金人攻善利門告亟姚友仲選五軍中神臂弓硬手一千五百人䇿應二日甲午幸京城北壁上幸京城北壁撫勞將士如前凡四日巡幸每巡壁不進御膳命取士卒食食之復以所進膳餉士卒人皆感激流涕自初巡壁雨雪交作四日未嘗止上小帽身披鎧甲而殿前指揮使王宗濋紫袍執骨朵以從見者皆切齒皇后親付內府幣帛與宫嬪作綿擁項分賜將士人各酒巵一自統制以下其賜有差兵士得擁項有以手執之戲語者曰雖得此奈渾身單寒何識者聞之為之感慨金人攻東水門金人攻東水門矢石飛注如雨或以磨磐及碡碌絆之為旋風王師以纜結網承之殺其勢又門裏跨河築月壘以拒之晚攻東水門甚亟遣數人縋城入之燒毁其炮架五鵝車二然炮架所存者尚七座其未立者不可勝計金人攻通津門金人攻通津門甚亟姚友仲領前軍將副部隊一千人䇿應軍兵有一城接戰者殺傷甚衆東道總管胡直孺與金人戰于拱州敗績被執胡直孺自應天府以兵一萬來勤王至拱州與金人遇兵敗被執金人以直孺示于城下且言曰援兵不可來矣來則必敗如胡直孺者是矣都人聞之懼四日乙未金人連東水門陳州一帶下寨自後日攻東水門尼堪兵薄南壁與醴泉觀相直敵能以利誘諜者反效以情敵初到即力攻東壁通津拐子城時劉延慶頗練邊事措置獨有法迎夜積城下積草數百爇之時有獻議置九牛炮者雖磑磨皆可放東壁用之碎其雲梯詔封護國大將軍敵知東壁不可攻于是攻南壁以洞子自蔽運薪土實護龍河河初決汴水益深至是皆氷合賊又為挈安機石矢石不能及孫傳夜宿城上初何栗孫傳議敵之再來正緣去嵗結和厚賂今不可復倡和議又苦無兵以戰乃闔門堅守以待四方勤王之師兵不滿十萬而勤王之師迄無至者未幾東道總管胡直孺為敵生得執以示城上都人愈恐東壁提舉官孫覿上何栗劄子乞免提舉某承乏侍御史邇遇金人稱兵至闕朝廷憤然方議討除某奏言和議之利太學諸生陳東等嘯聚羣小伏闕下請用李綱某疏以為怙聚作亂不可長王黼以誤國戮死而召蔡京歸賜第某又論蔡京稽誅合行逺竄而吳丞相大怒以某妄論伏闕罷侍御史責守和才數月吳相以黨比蔡氏罷去蒙恩召歸西省遂贊書命又會金使王芮請三關故地奏事殿上言辭不遜唐丞相操兩可依違不決某疏言三關雖河朔重地事急矣宜斷然割棄紓一時之急以候後圖唐丞相復大怒令守城東壁某非病狂喪心者既觸吳相李樞之怒得罪棄去今又忤唐丞相斥守東壁以人情計之豈所願欲也哉然敵國衰弱則事中國中國厭兵以和敵夫豈其情蓋不得已耳漢髙帝平城之恥吕太后嫚書之辱豈不能一戰終不肯以一朝之忿遺子孫數世之憂寧含垢忍恥置之度外而不與校今強敵乘百戰百勝之威進薄城下無所憚畏設有良將精兵可以勦除而宗廟社稷所在猶隋珠彈雀未可輕動又况無將無兵乃欲張空拳以摶數十萬虎狼之衆某區區進和之議不為過矣蔡京當國二十餘年以紹述先政劫持上下元臣故老屏廢殆盡交結閹宦引汲羣邪罔上欺君窮奢極侈綱紀蕩然公私空匱一時得位者更相視效以階禍變而吳相方欲召還賜第以為謀主臺諌烏得無言陳東伏闕召亂其事已見內之京師百姓殺統制官辛康宗外之福建軍士殺帥守栁廷俊堂陛陵遲難乎其為上矣今者尼堪圍西南斡里雅布圍東北王芮之言又驗矣某之意蓋欲權禍福之輕重捐三關以為斂兵之計何足深罪而斥守東壁方天下晏然無事時侍從官犯忤宰職者禠官奪職投棄散地大者除名削奪流竄嶺海而宰相安坐廟堂固自若也某仕朝廷十年以文字為官常言語為職業一言逆耳令冒矢石抗強敵城陴之上設有敗事不過一死而唐丞相亦欲如曩時諸公安坐廟堂取一快之適哉是亦不畏也辛康宗既死有旨犒賞軍士有司方詣左藏庫支請未至而唐相以某不時支散奪三官為承務郎意欲嫁怨使某復為一康宗豈不太甚矣乎今自知不任釋位而去非相公外有禦戎之長䇿內有保國之遠圖必不肯與之任莫大之責於此時也某以眇然一書生豈可使駕御羣黥守衛城壁相公盍擇一勇悍之將諳練軍政者使某受代不然而一旦誤事非某一人之休戚也五日丙申吳革議出戰之䇿不從吳革纍乞出兵城外下寨使金人不敢近城且通東南道路又密具奏乞選日諸門并兵出分布期會為正兵為牽制為衝突為尾襲為應援可以戰而勝金人以我為怯若擇利交戰彼固出不意戰勝氣倍以攻則壯以守則堅以和則久上以衆情懾惰言多先入竟不出兵六日丁酉太學生丁特起以金人攻通津宣化二門甚急上書乞用兵不報乙未丙申丁酉金人攻通津宣化二門甚亟朝廷唯以兵隨宜應之且猶冀和好可成故未有決用兵之意丁特起見其勢威甚乃上書論列以為金人有三可勝之理而用兵有五不可緩之説書奏不報金人至闕幾旬日見朝廷未嘗用兵攻城日急而善利門通津宣化門尤為緊地箭發如雨中城壁如蝟毛又以大磨石為炮櫓樓有摧毁者姚友仲於三門兩拐子城别置兩圓門走馬靣三十步許砌一磚石開小圓門如城四圍復置女墻迎敵自圓門出入不日而成所賴以固先是術者言京城如臥牛敵至必擊善利宣化通津三門善利門其首也宣化門其項也通津門在善利宣化之間而此三門者敵必攻之地後如其言大臣雖預知亦不以為意七日戊戌髙師旦及金人戰于城下被殺王宗濋遣殿前司牙兵千人下城與金人接戰統制髙師旦死之是日姚友仲正䇿應南拐子城躬率將校督戰凡數合敵勢稍沮復修炮架攻城之具工益不輟御筆范宗尹議割地今敵馬再至使朕失天下人心先次落職八日己亥蔡京第火是日蔡京第火其光亘天民居鄰屋無犯明旦士庶觀之宅焚而不及于鄰人皆快之詔毁艮嶽為炮石是日詔毁山石為炮石百姓爭持鎚斧以擊鑿毁之也九日庚子金人攻善利門通津門姚友仲以兵御之是日金人復于護龍河壘橋取道友仲選鋭士盡力御之分布床子弩九牛弩大小炮坐又于城上絞縛虛棚人立如山箭下如雨敵橋逮晚不能寸進乃棄橋益造火梯雲梯撞竿鵝車之類宣化門告急姚友仲領兵守南北拐子城所以不捍禦水門不可遽犯故急攻二拐子矢石如雨櫓樓皆壞張叔夜除簽書樞密院事與孫傳同措四壁守禦依舊南道總管餘道並聼節制制曰國家太平無事垂二百年軍政墮壞士卒無仗節死難之意將吏無干城固國之功望敵驚奔靡有鬬志朕初嗣服選建忠良延登宥密庶可漸復祖宗之故具官某質載忠諒學有本原衛上之忠懇欵七出應事之勤敏勞百為為羣敵之內侵罄一心而盡瘁辨華書殿未究逺猷進二機庭擢司兵柄以宏博無窮之辨謀議廟堂之上以剛毅特立之操駕禦將帥之臣迪百工厲翼之心以尊國威鼓三軍積惰之氣以衛王室服我休命奚俟訓言十日辛丑許民賭博放房錢以蘇小民金人許和以都水監李處權右司郎中司馬朴為報謝使十一日壬寅裝七點星炮指揮六部人吏及富民各僦車運炮石上城詔仰河北一路盡起軍民之兵守臣自將倍道兼行星夜前來捍禦強敵除賞賜外軍士優補官資百姓免五年租賦教坊樂人司文政以伏闕上書無理狂悖伏誅司文政伏闕上書其言指斥乃斬首號令榜于市曰司文政伏闕上書言極無理聖旨處斬士論初以為疑已而有免解進士費端友奏劄稱文政上書若止于其言無理不應棄市雖草茅一介不足惜而士之去就往往視此恐塞天下言路乞以文政所上書揭示使中外曉然知文政被誅之罪追開封府奉旨備端友奏劄榜云教坊樂人司文政伏闕上書挾持無君又助敵害國士論始皆帖然耿南仲與金人王芮至衛州鄉兵欲殺芮芮急奔走南仲獨至衛州城下守臣徐溙出城迎見百姓不許云耿門下與金人同行不可令入城閉門不納南仲遂徑往相州靖康小録曰上初以南仲東宫師傅之舊故用南仲而南仲不顧國家大計以老謬自専天下事一切蒙蔽唯以恩讐相報金人既退不集四方勤王師解太原圍尼堪南下不以為事遂罷天下兵南仲又云朝廷多守信既講和宜􅋀罷兵沿邊州郡任之無可奈何若更講兵致金人生疑自是之後朝廷大臣但爭私己是非與權寵而已國家事無有用心者初太原圍未解李綱對曰太原乃中國根本之地不可不急救若壞太原則大勢去矣及出南仲謂綱曰主上在位當兵戈既退之後不相安慰而以危言警之公不可如此南仲與徐處仁唐恪嫉李綱勝已同力擠排奏上云李綱要舉兵只遣李綱去上曰种師道可遣恐李綱不能兵唐恪奏上曰火到上身自撥但責以成功須自忙陛下切不可聼其避免綱既行南仲與唐恪徐處仁吳敏一切不問兵事日逐在朝堂議改科目與諸不急務李彌大奮然曰相公何不且留意準備防秋及救太原何故一向理會間事南仲怒曰此尚書可以先請行為國家了此事彌大厲聲曰某書生何能但願相公宣力且料合諸道兵馬了此事明日處仁請入對遂請于上乞彌大領兵唐恪狂懦愛輕舉不責以實效則不知其難上亦然之而終不察其邪也何大圭正月棄官走延禧南仲子也當時亦挈衆去及還則列以催糧轉官擢為卿監繼為中書舍人大圭嘗詣南仲論列其事欲免罪例求差除南仲以為不可安有得罪欲復進用乎大圭曰門下之子亦逃走人數乃致髙位何也南仲應之曰吾子以催糧職事出京與公不同大圭曰門下此言欺人則可欺天不可南仲厲聲曰公之言一似太學生遂起不復語選人李允文上殿陳議慷慨多論列大臣不和且壞國事上欲賞之而南仲捃以他事畨兵渡河上皇屢欲南幸南仲力言於上以謂不可又禁龍德宫官吏不得通傳兵事又奏請于諸寺設道場用僧誦護國銷兵經以銷番兵仍榜諸寺門識者切笑紕繆如此十二日癸卯開戴樓門許百姓般門外柴炭木植等賣仍發卒二百人下城打護龍河氷劉韐以守禦無狀落職留已自效除劉延慶為使敵築望臺度髙數丈下覘城中又排大炮燔樓櫓旋即修繕又造雲梯旋大輪以革冒之城罈推叩壘將士以鈎竿拄之使不得進近則以鈎索取之發火焚梯敵數引軍士欲擊九牛弩一發而貫三人十三日甲辰詔再幸四壁連日大雪未巳有詔曰雪意未解士卒暴露朕不敢自安再幸四壁勞犒將士鑾輿出于大雪苦寒中戎服乘馬露手揎腕其賜賫進膳之類悉如初仍命將士披城接戰間有得級者又遣人以酒食遺金人寨中十四日乙巳雪晴駕在城上擐甲勞軍殿班撮城下戰勝賞金帛命點檢炮石聖旨李殼助勘逺竄駕幸東水等門撫諭軍民守禦提舉李擢落職罷以田灝代之初護龍河自敵逮近即決汴水以增其深其後雪寒氷合敵于水布板置草覆之以土將以攻城而擢不介意是日稍晴上登城勞賞見城濠壘殆盡乃有是命宣和録曰是日駕御朝陽門敵兵數千逼城出不遜語衛士王百余乞下戰從之遂合戰中有執盾二人獨奮身躍入手殺五六十輩而餘兵不進詔促使援之卒無肯者二人竟死上不懌因下初舊制城樓禁火士卒噤戰不能執兵至有僵仆者然上在禁中徒跣祈晴又撫恤存問絡繹不絶多給木棉襖務令溫暖衆皆感泣不敢憚勞以勤王師不至令挑戰以示敢敵然可用者獨有衛士三萬爾每出師數百人雖多獲級以歸然已十失五六矣至是所亡已數千人南壁惟字乃字號二樓最危時濠池已為髙陵敵既逼城旁近七百樓爭發矢石動以千百計既非受敵往往虛棄或止之則衆指為姦細而殺之敵伺城上稍怠射者甚衆給賞官皆應給不辦又樓櫓之屬為矢石所壞換易不及每一拄一枝率厚賞給募人既而有中炮而碎首者有為流矢貫之于柱者人皆莫肯施工不得已逼使之或請以磚石壘壁可免換易從之頗亦為便既而灰棚多為炮石所損因以布囊貯粳為切其下即用火牛車以備雲梯之來有獻撞竿者其制用長木數丈上施橫木數尺下以鐵作軸雲梯之來迎擲之應手急索則梯可倒急攻之際嘗用之壞其二梯殺敵千餘至是時日撞竿不及敵因就其上以長竿引火燒櫓樓粳袋及火牛車不可嚮邇頃之敵稍登城有執盾禦之乃下是夜緩攻炮中金人金牌將劉安通津門發炮中其金牌初傳以為王芮既而聞之曰金人謀臣劉安也奏捷上喜命以武功大夫并金帶賜藍袍使臣上問劉延慶事勢如何延慶邊人習知攻守乃奏大臣謂城不可破者皆欺罔朝廷今日之事可謂危矣又言大臣奏捷於上大抵守禦獲勝僅能自保一或不勝則如何哉何賀之有三朝北盟會編卷六十六
