body:
  text: 三朝北盟㑹編卷二百六宋徐夢莘撰炎興下帙起紹興十一年四月盡十一月二十八日壬戌四月參知政事孫近罷為資政殿學士提舉臨安府洞霄宫孫近嘗建議召張俊都督諸軍秦檜怒令御史中丞何鑄言其罪近遂罷參政宫祠韓世忠張俊嶽飛來朝王湛為節制陜西諸路軍馬兼措置河東忠義參議官王湛字彥清商州人略讀書史受業不專多機尚詐避兵於川中㑹邵隆退在川中湛屈已奉之隆知啇州湛亦隨隆歸啇州漸補以官隆料金人有交還河南之意不久必復取之乃作料理河南之策書寫成帙授湛使詣行在湛至行在匿隆所授之文改為已投贄而見樓照照未之信既而金人許割三京地照大驚以湛所投贄於宰相秦檜檜喜荐湛改官為樞密院編修官隨照宣諭陜西回金人敗盟用為節制司參議官二十四日壬辰韓世忠張俊除樞密院使嶽飛為樞密副使范同獻議於秦檜曰諸路久握重兵難制當以三大帥皆除樞密使副罷其兵檜喜遂奏其事上從之世忠俊皆除樞密使賜俊玉帶飛樞密副使世忠既拜乃製一字巾入都堂則裹之出則以親兵自衛檜頗不喜飛披襟作雍容之狀檜亦忌之唯俊任其自然故檜不致深疑二十七日乙未罷淮東西湖北京西宣撫司諸軍以御前為名罷淮東西湖北京西宣撫司止用逐軍統制領將之以御前為名謂之御前諸軍宣撫司並結局官屬各轉兩官張俊獨留提㸃諸房文字王應求一名餘並發歸本軍五月七日甲辰詔諭諸軍詔曰朕昨命虎臣各當閫寄雖望屯列戍已大暢於軍聲而專統一隅顧猶分於兵力爰思更制度集全功延登秉鉞之元勳並任本兵之大計凡爾有衆朕親統臨肆其偏禆咸得專達尚慮令行之始或隳素習之規其當勵於乃心以務肅於所部簡閲無廢其舊精鋭有加於初異績殊庸人茍自懋髙爵重祿朕豈遐遺尚攄忠義之誠共赴功名之㑹咨爾任事咸服訓言更制之初人心未定故降是詔二十三日庚申楊沂中加檢校少保開府儀同三司殿前副都指揮使二十七日甲子王德加清逺軍節度使王德建節賞柘臯之功也制辭有曰屬一隅之匪茹裒衆類以深侵初衝突於淮壖寖蹂躪於江滸賴爾先登之勇遏其方鋭之鋒田師中加定江軍節度使田師中字吉甫以弓馬所子弟補官從京東河北制置使梁方平纍立戰功建炎初從統制張俊討李煜於東京平杜用於陳州誅陳通於錢塘禽徐明於嘉禾皆有功俊用為帳前提轄遷中軍將從討李成遷中軍統制其妻乃俊之子婦也俊子亡遂以其婦再適師中師中極諂佞呼俊為阿爹不啻如親父子故每戰必有奇功而天下之人皆不信其果戰也至是賞柘臯之功與王德皆授節鉞人無智愚皆以德為當而不稱師中二十九日丙寅汪伯彥加檢校少傅開府儀同三司致仕薨汪伯彥以宰相敗事責永州安置秦檜嘗在其席下讀書及為宰相薦其才復正議大夫俄復觀文殿學士江東安撫大使兼夀春府廬和等州安撫使知池州清議不容臣僚言其誤國遂得宫祠時紹興元年也二年檜再薦伯彥知廬州四年臣僚言其罪落職罪之七年檜再薦復資政殿大學士九年檜專國遂復伯彥觀文殿學士知宣州又拜檢校少傅保信軍節度使至是致仕加開府儀同三司薨贈少師諡忠定劉光世來朝張俊嶽飛往淮東撫定韓世忠之兵更軍制之初諸軍未悉朝廷之意將士不安乃命張俊嶽飛拊循之劉錡罷淮北宣撫判官張俊楊沂中屢言淮西之戰劉錡不力謂其怯懦至是罷錡淮北宣撫判官嶽飛乞且留錡掌兵六月十六日癸未建康府留守葉夢得加觀文殿學士先是和州之役張俊猶遲遲未有渡江之意知建康府兼行宫留守夢得力促其行於是大軍欣躍俊見軍情勇於出戰乃令進發王德首取和州次有柘臯之勝皆夢得啓之也上嘉夢得之心乃加觀文殿學士張俊與嶽飛既到楚州飛居於州治俊乃在城外而中軍統制王勝引甲軍而來日呈㸃軍馬或告俊曰王勝有害樞密意俊亦懼之問勝曰將士何故擐甲勝曰樞密來㸃軍馬不敢不帶甲俊不令䣃甲却䣃甲俊猶憾之飛㸃簿方知世忠止有三萬餘人乃在楚州十年餘金人不敢犯猶有餘力以侵山東可謂奇特之士也飛回駐於鎮江府知泗州劉綱詣行府禀議綱曰泗州在淮河之北城郭不固無兵無食如有緩急守乎棄乎飛徐徐言曰此是潤州更有何名綱曰京口飛再問之綱曰丹徒飛三問之綱曰南徐飛曰只此是矣綱退大歎服曰嶽鵬舉果有過人初李寶歸於韓世忠也世忠令寶戍海飛到楚州即呼寶至楚州慰勞甚至使下海往登州以來牽制寶焚登州及文登縣而還十七日甲申李興自白馬山班師至鄂州李興知河南府事據白馬山與李成相角凡數月成不能攻遂歸西京朝廷以興糧餉不繼孤軍難守即詔班師興統率軍民幾萬人南歸至大章谷逢金人數千騎邀路興擊敗之金人既退方得路南行以是日至鄂州宣撫使嶽飛已除樞密副使於是都統王貴申請樞府乞留與鄂州遂就差左軍同統制遷海州民於鎮江府張俊以海州在淮北恐為金人所得因命毁其城遷其民鎮江府人不樂遷居莫不垂涕並命遷楚州軍馬錢糧於鎮江府三京等路招撫處置使劉光世罷為萬夀觀使劉光世既罷自此遂居於溫州七月詔張俊沿江視師初嶽飛與張俊同至楚州撫諭韓世忠軍飛與俊議事不合歸至行在飛請獨留不復出掌兵其寮屬皆乞宫祠而去俊獨在沿江視師八月二日戊辰持服檢校少傅張中孚起復為西浙東路馬步軍副都總管紹興府駐札持服清逺軍節度使張中彥起復為福建路馬步軍副都總管建州駐劄八日甲戌樞密副使嶽飛罷為少保武勝定國軍節度使醴泉觀使金人遣莫將韓恕來金人第一書金人都元帥第一書曰皇統元年九月日皇叔尚書左丞相兼侍中都元帥領行臺尚書省事去嵗使至逺沭書翰良認勤意爾後頗疏嗣音即日動靜之間茂惟神介休祉爰念日者國家推不世之恩興滅繼絶全畀濁河之外使專綏治本朝偃息民兵求圖康乂豈謂闕封之始已露狂謀情不由衷務惟惑亂其如詳悉條目朝廷已嘗諄諭藍公佐輩厥後莫將之來輒申慢詞背我大施尋奉聖訓盡復賜土謂存省即有悛心乃敢不量己力復逞蜂蠆之毒搖蕩邉鄙肆意侵凌致稽來使久之未發而比來愈聞於妄作罔革前非至於分遣不逞之徒冒越河海因遣冦賊剽攘城邑考之載籍蓋亦未有執迷怙亂至於此者今兹荐將天威問罪江表已㑹諸道大軍水陸並進師行之期近在朝夕義當先事以告因遣莫將等回惟閣下熟慮而義圖之餘冀以時善衛生理專書披達不宣朝廷遣劉光逺曽勛使於烏珠朝廷答書某啓季秋霜冷伏惟太保左丞相侍中都元帥領省國公台候起居萬福軍國任重仰勞經畫莫將等回特承惠書祗荷記存不勝感激某昨䝉上國皇帝推不世之恩日夜思不知所以報國故遣使奉表以修事大之禮至於奏禀干請乃是盡誠不敢有隱從與未從謹以聽命不意上國遽起大兵直渡濁河逺踰淮浦下國恐懼莫知所措夫貪生畏死乃人之常情將士臨危致失常度雖加誅戮有不能禁也今聞興問罪之師先事以告仰見愛念盈厚未忍棄絶下國君臣既畏且感専遣光州觀察使武功縣開國子食邑五百户劉光逺成州團練武功縣開國子曹勛往布情懇望太保左丞相侍中都元帥領省國公特為敷奏曲加寬宥許遣使人請命門下生靈之幸下國之願非所敢忘也惟祈留神加察幸甚向寒竊冀保重少有禮物具於别封伏乞容留不宣鶚州軍統制張憲謀為亂都統制王貴執之送於樞行府張憲以前軍統制為提舉一行事務得飛之子雲書遂欲劫諸軍為亂且曰率諸軍徑赴行在乞嶽少保復統軍或曰不若渡江往京西朝廷必遣嶽少保來撫諭得少保復統軍則無事矣漸泄露百姓皆晝夜不安官司亦無措置惟憂懼而已都統制王貴赴鎮江府請樞密行府禀議方回到鄂州前軍副統制王俊以其事告之貴大驚諸統制入謁貴遂執憲送於樞密行府是時張俊以樞密使視師在鎮江也俊令就行府勘王應求請樞密院職級嚴師孟令使劉興仁推勘師孟興仁以樞密院吏無推勘法恐壞亂祖宗之制力辭俊從之遂命應求推勘獄成送大理寺俊小名喜兒濟南府人范瓊領兵在京東俊為劊子九月九日甲辰吳璘克秦州金人和卓郎君駐軍於秦州之丁劉圈僞安撫使謀以五路兵屯秦州甲辰吳璘及姚仲以兵復取秦州僞安撫使某迎官軍降五路兵皆散十日乙巳姚仲及金人戰於丁劉圈敗之吳璘既得秦州甲寅姚仲率先濟渡屯於原下金人和卓郎君屯於原下丁劉圈璘問諸將何以戰必勝仲曰戰於原下則敗戰於原上則勝璘以為然諸將之議皆不同仲曰諸將所以不同者憚辭勞苦不欲攻原上耳若金人乘勢而下我兵必敗吳璘卒從仲議丙辰仲率兵半夜取間道登山去敵寨一二里間捉歇喫乾糧向曉天大寒士卒皆燒火金人覺之仲乘勢進擊之諸軍尾進金人大敗有騎將楊萬者膂力過人生挾一千户回詣璘前誇勇璘曰楊萬可斬也正方鏖戰豈可得一敗將而便回乎萬投千户於地復上馬入陳和卓郎君退保納家城官軍圍之俄被金字牌指揮勒兵歸戍和卓郎君乃得歸宣撫副使胡世將惜其功將就可以生致和卓郎君矣乃嘆曰何不降金字牌且來世將處邪和卓郎君受圍於納家城也遣涇原路經略使秦弼策應不至和卓郎君既得脫歸遂罷弼三十日乙丑邵隆及金人僞知虢州賈潭戰於虢州敗之復虢州十月金人陷泗州又陷楚州金人侵泗楚張俊曰南北將和敵謂吾怠欲抒柘臯之憤耳勿與交鋒則敵當自退隂遣戚方至泗州巡綽金人果引去十日乙亥金人元帥第二書書曰皇統元年十月十日具位今月四日劉光逺等來得書審承動靜之詳為慰所請有可疑者試為閣下言之自割賜河南之後背惠食言自作兵端前後非一遂致今日鳴鐘伐鼓問罪江南之土故先遣莫將回具以此告而殊不見答反有遽起大兵直渡濁河之說不知何故雖行人面列之語深切勤至惟曰閫外之命聽其書詞脫落甚不類如果能知前日之非而自訟則當遣尊官有職名望夙著者持節而來及所賫緘牘敷陳萬一庶幾其可及也惟閣下圖之薄寒竊冀對時保重專奉書披答莫將王公亮使於金國朝廷答書某啓孟冬漸寒伏惟太保丞相侍中都元帥領省國公鈞候起居萬福軍國任重悉勤籌畫劉光逺曹勛等回特承惠示書翰不勝欣感竊自念昨䝉上國皇帝割賜河南之地德厚恩深莫可論擬而愚識淺慮處事乖錯自貽罪戾雖悔何及今日太保左丞相侍中都元帥領省國公奉命征討敝邑恐懼不知所圖乃䝉仁慈先領莫將韓恕明以見告今又按甲頓兵發回劉光逺曹勛惠書之外將以幣帛仰仭寬貸未忍棄絶之意益深慚荷今再遣左布政議政大夫尚書吏部侍郎文安郡開國侯食邑一千户魏良臣保信軍承宣使知閣門事兼客省四方館事武功縣開國伯食邑七百户王公庭充禀議使副伏䝉訓諭令敷陳畫一竊上令不從乃命之常豈輒有指迷重蹈僭越之罪專令良臣等聽取鈞誨顧力可遵禀者敢不罄竭以答再造仰乞鈞慈特賜敷奏乞先斂士兵許敝邑遣使拜表闕下恭聽聖訓向寒伏冀倍保鈞重有少禮具於别封竊冀容納不宣十三日戊寅嶽飛送大理寺王貴解押張憲至樞密行府張俊送憲於行在遂下大理寺奏檜奏請以嶽飛同下大理寺鞫勘反狀於是飛坐大理獄判宗正司士㒟依文字欲解救之不密漏其語或聞之以告檜令臺官言士㒟有不軌心責建州拘管死於建州飛初對吏立身不正而撒其手旁有卒執杖子擊杖子作聲叱曰乂手正立飛竦然聲喏而乂手矣既而曰吾嘗統十萬兵今日乃知獄吏之貴也金人陷濠州是時濠州境內人烟稀少渡江之貧民往往在橫澗山許家舊寨有前招信縣主簿吕浩者主其寨金人雖得濠州但空城而已酈瓊孔彥舟與數金人至橫澗山浩野服下見之皆坐於石上談說移時金人約十日再來果如期而至浩再見之即與俱北去邵隆及金人僞知陜州鄭賦戰於陜州敗之克陜州十一月七日辛丑金人元帥烏珠遣使來第三書書曰皇統元年十一月七日皇叔太保尚書左丞相兼侍中都元帥領行臺尚書省魏國公時寒想惟安善近魏良臣至伏辱惠書語意殷勤自訟前失今則唯命是聽良見髙懷昨離闕時親奉聖訓許以便宜從事故因可與閣下成就此計也本擬上自襄江下至於海以為界重念河南凋弊日久得如不得淮南唐鄧二州以地勢觀之亦是淮北不在所割之數來使云嵗貢銀絹二十五萬匹兩既能盡以小事大之禮貨利不足道正所以乞為定又云淮北京西陜西河東河北自來流亡在南者願歸則聼之理雖未安亦可從乞外有燕以北逋逃及因兵火隔絶之人並請早為起發今遣昭武大將行臺尚書戶部兼工部侍郎兼左司郎中上輕車都尉蘭陵縣開國伯食邑七百户蕭毅中憲大夫充翰林待制同知制誥兼右諫議大夫河間縣開國子食邑五百戶邢具瞻等奉使江南審定可否其間有不可言者一一口授惟閣下詳之既盟之後即當聞於朝廷如有封建大賜又何疑焉有少禮物具啓别幅隆冬竊冀順天以衛眠食專持書奉答不宣何鑄為端明殿學士簽書樞密院事使於金國容州觀察使曹勛副之二十八日壬戍韓世忠為太傅橫海武寧安化軍節度使醴泉觀使臣僚纍言韓世忠之罪上留章不出亦忌秦檜隂謀而請罷遂以太傅為醴泉觀使世忠杜門謝客絶口不言兵不發親戚平交書平時將佐部曲皆莫見其面福建路安撫大使張俊罷為檢校少傅崇信軍節度使醴泉觀使便居住十二月淮北宣撫使楊沂中還行在呼延通投淮隂縣運河卒遺史曰韓世忠晚年好游宴常赴諸統制之請莫不以妻女勸酒世忠必酣醉而歸唯呼延通忿忿有不平之意雖備禮邀世忠至私宅然未嘗擅離左右一日世忠與水軍統制郭宗儀㑹於通家世忠略寢通以手捉世忠之佩刀宗儀適見之搦通之手而呼曰統制不可世忠覺而大驚急馳馬奔歸而令擒呼延通既至世忠數其罪責為崔德明軍中自效德明戍淮隂故通在淮隂世忠以十二月二十三日誕生是日諸軍獻夀者甚盛世忠臨聽事坐而受之最後通獻夀香世忠見通即走入府第不出通伏於地滴淚成泓衆勸促通通乃起身而去出門奔還淮隂德明獻夀回數通不合擅離軍之罪决數十下通怏怏投運河運河水深急救之出水已不蘇倒控其水以身著毛衫領窄水脹束其頸水不得出而死人皆惜之世忠退保沂中復還泗州軍心始安自是潰兵由淮河上下數百里間三三兩兩而歸其死亡者甚衆許淮南州縣退保朝廷以金人復至河南許淮南州縣權宜退保州縣官吏皆有輕去之心王滋蕭保及金人戰於宿州軍敗金人屠其城金人劫楊沂中不得志遂攻宿州王滋蕭保與戰不利金人入城怒州人納楊沂中之軍也乃縱屠戮二十一日壬辰永興軍路經略安撫使王俊敗金人鶻眼郎君於盩厔縣南二十三日甲午楊政軍統制邵俊敗金人於隴州汧陽縣牧羊鎮河東統制王忠植克石州九月楊沂中劉錡退軍鎮江府七日戊申知河南府李興移治於白馬山李成以纍敗於李興乞兵於金國得畨漢軍十餘萬興聞之度衆寡不敵即移治於永寧白馬山十二日癸丑楊政統領楊從儀邵俊敗金人於隴州汧陽縣劉光世軍池州劉錡移軍太平州十五日丙戌李寶以其衆歸於淮東宣撫司李寶自五月在渤海廟克捷即放船越廣濟軍遇金人綱船得銀絹錢米甚多將抵徐州與金人船相遇乃來戍徐州者寶方欲嚴備過徐州曹洋曰我有備矣金人不知我至必無備當掩擊之金人果無備皆不及持仗為寶所殺解元敗金人於沂州談城縣六日丁丑李山史貴韓直敗金人於陳州初張憲得陳州也嶽飛令統制趙秉淵守之金人圍陳州飛統制李山史貴與劉錡軍統制韓直及金人戰於城下敗之八日己卯陜西統制吳錡統領侯信敗金人於河北中條山柏梯谷十日辛巳侯信敗金人於解州界殺其將毛可十一日壬午李成攻河南府李興擊敗之李成自孟州率金人五千餘騎犯河南府李興開城門以待之成果疑不敢進興遣鋭士由他門出擊之嶽飛劉光世來朝楊沂中軍於宿州十六日丁亥楊沂中軍潰於宿州楊沂中進兵於宿州也以步軍退屯於泗水烏珠詭計令人來告有金人數百屯栁子鎮沂中以為然欲擊之或諫以為不可輕出沂中不聽留統領王滋蕭保領其兵一千於宿州是夜沂中自將騎兵五千往襲栁子鎮至明不見敵而還烏珠以重兵伏其歸路沂中自栁子鎮回半途知其然遂橫奔而潰至夀春府渡淮歸乃與王滋蕭保相隔參議曹勛不知沂中所在表聞於朝朝廷大恐令闕淮東州沂中後亦深悔悵李興與李成相拒於白馬山知河南府李興九月退保於永寧白馬山李成親率畨僞首領衆十餘萬四面攻圍晝夜不息鼓聲震山谷凡兩旬聲不絶興親臨隘口撫恤士卒盡力禦之成不能施其技先是留守李利用總管孫暉棄城南歸也興與金人接戰興之家屬散亡兩三處暉度興必陷沒遂擁其妻周氏至襄陽奪其鞍馬掠其財物朝廷知之降詔俾本州存恤别給優廪興移治白馬山寨日唯有幼子在側方敵勢圍急人心頗搖興詔將士遍諭之曰今雖圍急當與諸公誓以死守毋惑二心萬一山寨有失我豈汚於敵者當抱此子南向投崖以謝天子諸公欲出降者請自便諸將皆感泣由是諸隘益堅俄金國遣使賫黃榜招興以奉國上將軍官俾依舊尹西京其餘將佐官屬賞各有差興得檄不啓立斬來使以其檄繳赴朝廷白馬受圍久方深冬泉源枯涸軍民乏水衆皆病渴興焚香默禱一夕大雪泉脉涌溢將士皆以為興心精忠感應興雖在圍中至歲時伏臘專遣將士賫書取間道詣永安酌獻諸陵李成知興不可動乃斂諸處攻圍兵於山下駐積芻峙糧為久守之計興潛遣將士夜出焚劫營寨掩殺過洛水北十八里至三鄉鎮連戰克捷自是成大挫徑歸西京三朝北盟㑹編卷二百六
