body:
  text: 三朝北盟會編卷二百四十四宋徐夢莘撰炎興下帙起紹興三十一年十一月二十八日丙申盡其日張棣金國圖曰一京邑金人有國之初都上京府曰會寧地名金源其城邑宫室類中原之州縣廨宇制度極草創居民往來或車馬雜遝皆自前朝門為出入之路略無禁犯每春正擊土牛父老士庶無長無幼皆觀看於殿之側主之出朝也威儀體貌止肖乎守令民之訟未決者多攔駕以訴之其野如此至亶始有內庭之禁大率亦闊略逮亮弒亶而自立粗通經史知中國朝著之尊密有遷都意繼下求言詔應公卿大夫芻蕘黎庶皆得以利害聞時上書陳京師僻在一隅官難于轉輸民艱于赴訴不若遷燕天會三年而始成貞元四年亮率文武百官駕始幸焉遂以渤海遼陽府為東京山西大同府為西京中京大定府為北京東京開封府為南京燕山為中都府曰大興改元以赦告天下京邑始定焉都城之門十二每一面分三門一正兩偏焉其正門四旁皆又設兩門正門常不開惟車駕出入餘悉由旁兩門焉其門十二各有標名東曰宣耀曰施仁曰陽春西曰灝華曰立澤曰新蓋南曰豐宜曰景風曰端禮北曰通元曰會城曰崇知內城門左掖右掖宣陽又在外焉外門即墨書粉地內則金書朱地皆故禮部尚書王兢書一宫室亮欲都燕遣畫工寫京師宫室制度至于闊狹修短曲盡其數授之左相張浩輩按圖以修之城之四圍九里有三十步自天津橋之北曰宣陽門如京師朱雀門門分三中繪一龍兩偏繪一鳯用金鍍銅寶釘之中門常不開惟車駕出入兩偏分雙隻日開一門無貴賤皆得往焉過門有兩樓曰文曰武文之轉東曰來寧館武之轉西曰會同館二館皆為本朝人使設也正北曰千武廊東西對焉廊之半各有偏門向東曰太廟向西曰尚書省通天門今改為應天府闕觀髙八尺朱門五金釘飭之東西相去里餘又為設一門左曰左掖右曰右掖內城之正東曰宣華正西曰玉華北曰拱辰門乃殿凡九重殿三十有六間閣倍之正中位曰皇帝正位及曰皇后正位位之東曰東內西曰西內各十六位乃妃嬪所居之地也西出玉華門同樂國瑶池蓬瀛莊杏林盡在于是一宗廟金人宗廟之制其初甚簡略自平遼之後所用執政大臣多漢人往往説以天子之孝在乎尊祖尊祖之事在乎建宗廟若七世之廟未修四時之祭未舉有天下者何可不念敵方開悟遂築室于內之東南隅廟貌祀事雖具制度極簡略逮亮徙燕遂建巨闕于內城之南千步廊之東曰太廟標名曰衍慶之宫以奉安太祖旻太宗晟德宗宗幹亮父又其東曰元廟以奉安元祖和卓仁祖大聖皇帝英格王褒立遷亮父德宗于外室復奉安父懿宗宗堯于太廟其昭穆各有序一禘祫金人本無禘祫之主亮徙燕築陵于城之西南九十餘里大江山又太廟元廟告成始有尊祖之意時奏議者多陳郊祀配天之事亮恥效中國舊制令别討論之禮以三年一祫五年一禘乃上古之制也禘當取夏四月祫取冬十月亮從之詔告天下遂令太常寺備太樂具九節儀從待期往焉至是月吉日先一夕宿于正殿次日陵晨令尊從人各服五色畫衣執旌􅓚斧鉞幡蓋羽扇自內城至廟夾道駢肩而立徐布九節儀從奏樂及歌者皆乘馬逮御座衣元纁衣衮冕執圭乘玉輅九龍御坐至廟禮畢易之金輅服逺遊冠絳紗袍奏樂曲而回一山陵金人都上京發祥有自祖宗以來止卜葬于護國林之東儀制極草創逮亮徙燕始有置陵寢意遂令司天臺卜地于燕山之四圍年餘方得良鄉縣西五十餘里大洪山曰大洪谷曰龍銜峰巒秀拔林木森密真陵之處亮尋毁其寺遂遷祖宗父叔改葬于寺基之上又將正殿元位佛像處鑿穴以奉安太祖旻太宗晟父德宗幹其餘各隨昭穆序焉惟亶被殺葬于山之陰謂其刑餘之人不入一儀衛金人建國之初其禮制儀從止類中州之守令在內庭間或遇雨雷雖侍從亦去襪履赤足踐之淳朴如此亶立始設護衛將軍寢宫實達爾拏手傘子逮赴燕始乘車輅衮冕儀從頗整肅特令翰林待制邢具瞻作引道詞曰五年一狩仙仗到人間問稼穡艱難蒼生洗眼秋光裏今日見天顔金瓜玉斧沈煙和舞蹈六龍間歌謡道詠皆相似天子壽南山至亮徙燕知中國威儀之尊護從悉具若尋常行獵觀田多無定制或以數百騎或數千騎前後皆執旌旗上繪一日至一大繡日旗曰御坐焉傘或黃或紅如或緋駕出而大率制度與中國等導前者皆拏手傘子其人各長六尺八寸以其錦團花袍金鍍銀帶簇金蛾拳腳幞頭雙引而前皆散手及半萬有執旗者約千餘隊旗之後曰駕頭駕頭護衛將軍皆衣紫窄袖衫金帶幞頭腰弓矢並馬而行弓矢一繡袋覆之得數百至曲蓋其形六角細曲柄飭以文彩以護軍執之以為儀式曲蓋後曰衛坐馬左右二副點檢領之末馬馬後曰侵殿實逹爾衣大闕乘騎護衛將馬軍一等止無弓矢而腰以紅袍袱又得數百及駕或乘逍遙或乘步輦或乘馬臨時取旨焉其上張蓋表裏皆黃羅柄為曲駕之後護衛實逹爾不記其數又其後曰馬軍拷栳隨焉一旗幟金人以水德凡用師行征伐旗幟尚黑雖五方皆具必以黑為主尋常車駕出入正用一色日旗與後同乘加焉三旗相間而陳或數百隊或千餘隊日旗即以紅帛為日刺于黃旗之上月旗即以素帛為月刺于紅旗之上又有大繡日月旗二如祫享大禮册對一一循古制旗無大小皆備焉然五方五星五嶽青龍白虎朱雀玄武神鳯外又有五星連珠一日月合璧一像二天王天海馬二鷹隼二太白二近御又張一大旗其制極廣紺繪神物以猛士執之又有數十護之各旗大繩以備風勢名曰蓋天一冠服金君臣之服大率與中國相似止其衽異焉雖金主服亦尚左其臣下之服不從乎職而從于官如五品服官便可衣五品服雖職上下並不改至于服緋紫亦無歲月可限但官與服色等則服如焉文武臣四品皆橫金文臣則加魚不待錫而自許服焉一官品金之官品本遵唐制又以日本之法并遼法𠫭而用之文則郎與大夫武則校尉與將軍其勳爵食邑皆同焉至品文武混而為一亮立漸加損益如中亮改中憲奉德改朝列又增槖進榮祿二官至褒再以中大夫行大定官制焉一取士金人初處邊隅未嘗振興文教自侵遼後所在處以科舉取士遂有藩州榜平州榜真定榜者是也至天會十年海內小安下詔如契丹開闢制限以三歲缺有鄉府省三試鄉中曰鄉薦府中曰府解省中曰及第時有秀士有未願起者州縣根刷遣之程文分為兩科曰詩賦曰經義上一場殿試則詩賦加論經義上試策榜與魁各分焉是年趙洞為詞賦第一人孫九鼎為經義第一人並補承議郎三人承奉德郎餘不限甲次盡補承事郎科舉由是而立亶定又增専經神童法律三科為雜科一設三府省三試中選之並補將仕郎逮亮殺亶自立甚有尊經術從儒雅之意始設殿試又以試鄉聚于州限三人取一府試分立處河北東西兩路中都于大興府臨潢會寧東京等路于大定府西京路南河北路于大同府大名路山東山西兩路于東平府南京開封府京兆鄜延慶原熙陳等路河中府並限四人取一省試以五百人為定格殿試日點落中第之人多寡不等臨期取旨又將一人特贈一官授正仕郎餘並授從仕郎次舉又罷經益經神童止以賦詞法律取士詞賦為正科法律為雜科褒立于府省試各添䇿論一場將殿試第一人依舊承議郎第二第三人儒林郎並賜緋餘皆從仕郎至今不易一屯田屯田之制本出上古金人意欲遵而行之偶爾符合比上古之治猶簡廢偽齊豫後中州懷二三之意如治田均屯田軍非女真契丹奚家亦有之自本部族徙居中土與百姓雜處計其户口官田使自播種以充口食春秋量給衣焉殊不多餘並無支給若遇出軍之際如月給錢米不過數人老幼在家依舊耕耨亦無不足之歎今日屯田之處大名府路山東東西路河北東西路南京路關西路四路皆有之約一百三十餘千户每千户止三四百人多不過五百所居止處皆不在州縣築寨處村路間千百户雖設官府亦在其內一用師金人用兵専尚騎間有步者乃簽差漢兒悉非正兵惟運薪水掘壕塹張虛勢投糧草而已不以多寡約五十騎為一隊相去百步而行居長以兩騎自隨戰騎則間撁之待敵而後用又有一貼軍曰伊勒希如遇正軍病即以貼軍代行都主兵官曰天下兵馬大元帥次曰左副元帥右副元帥左翊都統右翊都統又其次曰逐軍萬户每一萬户所轄十千户一千户轄十穆昆穆昆百户也一穆昆轄兩佛寧佛寧五十户也自萬户至佛寧階級雖設尋常飲酒食略不間别與兄弟父子等所以上下情通無間塞之患每有事未決者全集而議之自下而上各陳其䇿如有可採者不擇人而用之其臨大敵也必以軍步當先精騎兩翼之或進或退見可而前弓矢亦不妄發金人有言曰不能攻打一百餘個回合何以謂馬軍蓋騎先乎往衝突而已遇敗亦不散去則逐隊徐徐而退弓力止七斗箭極長刀劍亦不取其快利甲止半身護膝微存馬甲亦甚輕一田獵金人無他技所喜者莫過田獵昔都會寧之際四時皆獵焉至亮徙燕以都城之外皆民田三時無地可獵候冬月則出一出必踰月后妃親王近臣皆隨焉每獵在于隨駕之軍密布四圍名曰圍場待狐豬鹿散走于圍中金主必取之或以鵬鷹擊之次及親王近臣出圍者許人捕之飲食隂處而進或以親王近臣其食遇夜則或宿于州縣或宿于郊外無定亮以子光瑛年十二獲獐取而告太廟褒立尤甚有三事令臣下不諌曰飯僧曰作樂曰圍場其重田獵也如此一刑法金人有國之初立法設刑悉遵遼制常刑之外又有一物曰沙袋以革為囊實之沙石繫于杖頭有罪者持而決其背大率似脊杖之屬為數多焉亶立執政大臣多中州漢兒人始加損益如此沙袋之治至皇統間令學士院討論條例頒行天下目之曰皇統新制近年餘條亮弒亶自立又去脊杖以其近人心故也斬刑者以上古之制一也處死者免重杖令絞也流者所犯之人無罪止流犯人之家屬也徒者非謂春秋代徒實拘役也徒止五年以上死罪也徒五年則決杖二百四年決杖一百八十三年一百六十二年一百四十一年一百二十杖無丈杖止以荆杖決臀實數也拘役之處逐州有之曰都作院所徒之人或使之磨甲或使之土工使之雜作無用不可腳腕以鐵為科鎌鎌之罪輕者用一罪重者用二皆朝縱暮收年限滿則逐便不妨依舊為百姓刑法大率與舊制不相逺帷僧尼犯姦者死強盜不論得財不得並處強姦者死與古異矣一京府節鎮防禦州軍京都五處上中都大興府南京開封府中北京大定府東京遼陽府西京大同府總管十五處平陽府建雄府真定府成德軍益都府鎮海軍東平府天平軍京兆府永興軍太原府武勇軍大名府天雄軍河間府瀛海軍慶陽府安國軍臨洮府鎮洮軍鳯翔府鳯翔軍會寧府延安府漳武軍咸平府安東軍臨黃府散府八處河中府護國軍濟南府德興軍歸德府宣武軍河南府德昌軍平涼府平涼軍廣寧府興中府彰德府節鎮二十八處絳州降陽軍定州定武軍邢州安國軍懷州沁南軍萊州定海軍密州安化軍滄州橫海軍潞州昭義軍汾州汾陽軍冀州安武軍代州震武軍同州定國軍雄州永定軍保州順天軍平州興平軍兖州代定軍邠州靜南軍涇州漳化軍朔州順義軍奉聖州武定軍衛州河平軍蔚州忠順軍義州崇義軍許州昌平軍徐州武寧軍豐州天德軍雲內州開逺軍嵐州鎮西軍鄧州武勝軍鄜州保大軍鞏州通逺軍隆州利涉軍錦州臨海軍應州彰國軍瀋州昭德軍宗州歸德軍懿州寧昌軍秦州德昌軍防禦二十一處博州德州沼州棣州孟州濠州沂州清州蔡