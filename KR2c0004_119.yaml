body:
  text: 三朝北盟會編卷一百十九宋徐夢莘撰炎興下帙起建炎二年十一月盡十二月十一日辛未十二月苖傅劉正彥以兵八千扈衛隆祐太后六宫駐杭州是時邉報不一上命苖傅劉正彥帥師扈六宫南渡至錢塘傅為御營都統制正彥副之劉晏所統赤心隊猶𨽻麾下傅與正彥皆陕西人傅父禮正彥父發皆為西邉良將傅隨梁揚祖信德府來勤王為右軍統制上即位御營司後軍統制正彥少為文資宣和間劉光世薦其才得換武職傅拙直不能曲奉內侍故多譛之者正彥來上方略故被選用十二日壬辰金人陷延安府正月金人陷延安府東城而西城堅守未下金人知曲端與王庶不協乃併力攻鄜延康定王宗尹不能禦庶在坊州聞金人兵至康定連夜趨鄜延以遏其前金人詭道陷丹州界于鄜延之間庶乃自當鄜州來路遣龎世才鄭恩當延安來路時端盡統涇原精兵五萬駐淳化月餘不動日移文趣其進兵遣使臣進士十數輩往説諭端併兵鄜延無益不如以計困之兵法所謂攻其必救乃遣吳玠攻華州端自攻蒲城縣華州蒲城皆為守兵玠援華州端不攻蒲城復與玠合兵歸襄樂屬環慶在深山中去金人五百里天大雪寒甚金人攻世才世才與戰兵不用命乃敗自此金人遂専圍延安西城日夜攻擊不息庶自收散亡援延安比至甘泉而延安陷權知延安府劉洪及總管馬政出奔初􅊛援鄜州聞延安己陷即復回興元金人大肆殺掠遂東趨河上如欲渡河稍北近綏德軍庶自劾待罪别録曰十一月壬辰敵陷延安初鄜延經略使王庶屢戰有功聞敵自熙河敗回仍檄諸路不應又移書謝亮以率諸帥亮又不從既而詔除庶節制六路兵擊敵於鄜延耀州諸路又為敵諜知遂破延安王庶奔於曲端軍中奪其制置使印王庶既失延安罔知所措倉皇未有歸念惟有曲端在襄樂雖素不相協然勤王事則自有公議且曰捨端吾何歸乃率官屬馳驅至襄樂造端之壁端號令甚嚴叩其壁者雖貴亦不敢馳庶既至端令每入一門減其從人之半及至帳下僅有從兵一二已端設軍容見庶庶惶懼戰栗端數其失延安之罪詞色俱厲庶僅能言自劾見待罪端遂取制置使印犒禮隨行其從人迫庶還鄜延盡拘縻其官屬十五日乙未金人陷濮州金人圍濮州知州楊粹中固守之金人力擊之者三十二日自西北角登城守陴者不能當城遂陷粹中登浮屠最髙級不下金人惜其忠義許以不死粹中乃下粹中真定府人金人以不歸附城中無少長良賤大肆殺戮仍火焚其廬舍俱盡金人陷開德府金人攻開德府王某守其城金人以文字至城下呼曰王某有文字來歸附大金故我來此汝百姓何敢拒師軍民信之欲殺知府知府走南門未出城為軍民蹂踐而死金人入城怒其拒戰殺戮無孑遺紹興九年復得河南地惟開德府城中無一戶舊居土人金人陷相州金人圍相州久糧食皆盡猶堅守未下趙縣丞者不字行宗室也權知州事人呼為安撫者趙安撫與軍民議曰食已盡人皆食啖外無救援安可久乎某乃國家宗室豈有順敵諸人當自為計衆皆不應趙安撫曰約降如何雖衆悽慘然有唯唯者趙安撫知其意乃登城樓遙謂金人請開門投拜乞不殺金人許之趙安撫乃具降書開城而自推其家屬入一井中然後身擲入井先命提轄以土蓋提轄遂實之以土人皆哀之二十二日壬寅就江都縣築壇南郊大赦天下門下觀會通以行禮莫嚴定位以交神逺罪疾而弭災亦或因時而致禱朕紹承大統誕受多方屬當外患之相仍爰省四方而臨幸念父母兄弟尚屈於敵疆惟甲胄干戈再淹於嵗序問寢闕溫清之奉在原深急難之情信使屢馳久猶未報金師再遣坐待底寧復竊盜之無良乘邉陲之多事馮陵州縣震擾民氓衣冠傾仆於道塗耒耜荒殘於本業行者未知所適居者莫獲其安傷閭里之疾苦則撫循之政尚愆問行陳之勤勞則休息之期猶逺每撫心而及此屢當食以興嗟險阻艱難固偹嘗矣勞來安集尚未有之豈菲德之敢圖惟上穹之悔禍永懷眷祐恭俟監臨雖兹多壘之辰適在當郊之嵗惟祭或祈或報必稽於時物之儀而禮之有儉有豐特視情文之稱是用謀有虞東巡之制循建武二成之規新黼冕以嚴恭建胥徒而齋沐蓋髙在上聰明皆自於我民與善惟人治亂無艱於天位既殫誠悃冞極戰兢仰覆育之何心詎存時怨况顛危之已甚寧至我遺疾呼反本而必聞精意默通而可動庶幾來假或厭多難新命舊邦協幽眀而並貺此疆爾界一內外以均安其敷曠蕩之恩已廣龎鴻之施可大赦天下於戲為斯民而請命敢忘庶民之無辜置大器於復安實兾昊天之所豫尚賴六服羣辟三事大夫共宏恢復之功亟底隆平之業邵興敗金人於絳州曲沃縣知濟南府劉豫權知淄州李某附於金人初李成敗於劉光世也轉至淄州攻擊僅兩月不下迪功李某權知州固守之城糧漸盡侵濟南府界擾於外邑淄州求救於滄州劉錫濟南府亦求救於滄州兩州皆堅守拒城以待外援會金人侵山東先至濟南府劉豫謂滄州救兵來矣既不為守禦備開納之乃金人也遂就投拜金人未至淄州前一日成起軍轉城而似欲退去者淄州人疑之莫測其故俄而擺列諸軍於城下盡發諸寨老小先行是夜神霄宫火焚燒諸寨淄州人謂成果退去矣翌日金人軍馬逼城淄州人亦謂是滄州救兵乃具香花於城上望塵歡譟既而知是金人遂就投拜金人謂自入南界未有如濟南府淄州秋毫不動而投拜者大喜之自後金人據有中原諸州皆屯戍女真契丹軍唯濟南府淄州並無一人一騎韓世忠為御營平冦左將軍領兵一萬軍京東金人侵京東故命韓世忠軍於京東以措置之劉正彥為御營平冦右將軍王倫上書乞入大金迎請二聖加朝奉郎充通問使朕惟強事未寧親庭在逺夙宵軫念庶孝弟通於神明物色求人倘忠信行於蠻貊眷兹久矣今乃得之以爾胄出公侯胸兼勇智言念主憂而臣辱何有於生如皆以秩而任勞孰當其責雖淹回之未試獨慷慨以請行宜升郎秩之榮仍委使華之重朕既俯同晉國用魏綘以和戎爾其逺慕侯生御太公而歸漢勿憚徂征之逺佇期歸報之休倫以修職郎改朝奉郎充大金通問使詔戒百官朕承祖宗有道之長賴黎獻戴宋之舊嗣守神器適嵗當郊祗見皇天后土慨念父母兄弟越在他邦宗廟社稷之托中更異姓一時赤子塗炭靡依獨豫一人舊勤於外天其或者俾復大業保乂斯民以導迎南還之御惟兹肇祀實報以祈朕齋栗存念大懼菲德弗獲顧歆乃先事三日繁隂凝翳潤不至濡震於朕心罔承靈祉逮祖廟及壇垂象􅀈炳夜氣晏溫靄澄霄霽迄用成禮顧朕眇昧罔有一二敢曰聲聞於上實惟祖宗之靈相佑在天惟爾萬方有衆不替忠順協於天心朕既獲祗事勿敢謂幸矧敢怠康方恐懼修省以承天眷念與爾有同體共利兾各迪乃心無拂於上下神祗共迎景貺以宏濟多方艱用誕告於率土惟世理亂在臣庶戚休無有大小逺邇惟底寧爾國則亦寧爾家爾躬在焉股肱大臣其同寅協恭思難圖易輔朕不逮以倡百辟論思獻納之官若耳目風憲左右侍御有言達於豫聽必忠必誠毋奪於私凡百有官君子飭躬謹行惟職業自修守令部使者暨爾僚佐有為有行其必曰毋傷於民毋害於國無及爾暨爾家則獲神休而永終譽中外爪牙之臣賈勇敵愾思建戡難之勳以𢡟逺圖毋怠名節之羞軍民戰士咸奮忠力遂爾寵榮至於失業無依哨聚林藪怙衆為暴殺掠無辜當思神明譴殛之報應甚影響古今誅討之刑雖緩必正革心自效掩罪以功錫爾官爵永維我國家之用朕信不渝嗚呼天道福善禍淫助順罰惡疏而不失股肱大臣暨爾萬方有衆咸思寅畏冀天悔禍救民塗炭復我父母兄弟宗族臣民躋世隆平與萬世有衆共之咸孚朕志毋茍目前之安尚有賞刑為爾後報十二月五日乙邜隆祐皇太后至杭州隆祐皇太后至杭州以州治為行宫扈從統制官苗傅等團住於奉國寺十日庚申金人攻東平府知軍府事權邦彥棄城走遺史曰權邦彥字朝美崇寧四年進士釋褐登第靖康間知兾州以兵赴元帥府勤王建炎二年代盧益知東平府孔彥舟為鈐轄邦彥與之不和邦彥領兵叛去至是金人攻東平府邦彥不能守棄城遁去降授朝散大夫金人陷東平府十四日甲子金人陷北京河北提點刑獄公事郭永死之金人攻北京北京留守張益謙轉運使裴億提點刑獄公事郭永共守之益謙億齷齪小人守志不固唯永率士晝夜乘城伺間則出兵擊之或勸益謙委城遁去永曰北門所以遮蔽梁宋敵得志則席捲而朝廷危矣借力不敵猶當死守徐挫其鋒以待外援奈何棄之因募士賚帛晝夜縋城出告急於朝廷且請朝廷為敵偹金人攻愈急俘東平府濟南人大呼城下曰二郡已降降者富貴不降無噍類益謙相顧色動永大言曰今日正吾儕盡節之時不宜有二乃行城撫將士曰王師至矣吾城堅汝輩當努力敵不足畏也衆皆感泣甲子質明大霧四塞敵以斷碑殘礎為炮樓櫓皆壞左右蒙頭而立有碎首者良久城陷永安坐城樓上或掖之以歸諸子環泣請去永曰吾世受國恩當以死報然巢傾卵覆汝輩亦將何之兹命也奚恤益謙迎降尼堪曰城破而降何也二人皆言郭永不肯降尼堪遣騎召永永正衣冠向南再拜訖易幅巾而入尼堪曰阻降者誰永熟視久之曰不降者我也尚奚問尼堪見永狀貌魁傑且夙聞其賢乃自為好語數十言欲以冨貴啖永而降之永瞑目唾罵曰無知之輩恨不醢爾以報國家何説降乎堪令譯者申諭不已永戟手怒罵不絶尼堪惡其言麾之使去永復厲聲曰何不速殺我我死當率義鬼悉滅爾曹大名人在係者無不以手加額為之出淚尼堪令斷所舉手并其家屬害之時年五十三即日傳語城中雖素不與永合者亦相向慟哭金人去相與負其尸瘞之永字謹思大名府元城人天資雄毅氣剛直長七尺美鬚髯望若神人博通古今得錢即以買書藏書萬卷因事為録文皆可傳而不求人知見古人立名節者未嘗不慨然掩卷終日而尤慕顔魯公為人喜面折人過退無後言聞秋毫之善必奬成如不及與人交輕財篤義而於吏治精明紹興初贈中政大夫資政殿學士諡勇節十五日乙丑黃潛善為尚書左僕射同中書門下平章事汪伯彥為尚書右僕射同中書門下平章事制曰宰天下之平實係秉鈞之重揚大廷之號丕昭籲俊之公若時登庸訪豫落止敵兵未殄有朽索馭六馬之憂國步方艱如抱火厝積薪之上臨朝興歎當饋靡寧眷求四嶽百揆之賢圖回二帝三王之治必有任斯民之責者庶幾選於衆而得之大中大夫知樞密院事御營副使新安郡開國公食邑二千五百户實封六百户汪伯彥惟老成人以儒術用德器羣公之表威名萬里之衝頃佐命於戎衣久宣勞於樞管歷時滋久雋譽益敷帝賚有開潢水獲伯王之輔價藩作固顓臾是社稷之臣其遂相豫無以易汝宜體仰承之意益昭共政之元進躐文階陪兹真食便蕃物采庸示眷懷於戲無競維人非賢不任成湯之學伊尹有不召之臣大舜之舉臯陶而不仁者逺往宣一德用格多盤可特授正議大夫守尚書右僕射中書侍郎依前御營副使食邑七百戶食實封三百户封如故汪伯彥時政記曰黃潛善汪伯彥進謝上曰潛善作左相伯彥作右相朕何患事不濟伯彥昨知相州甚有政聲事朕備嘗險阻知其忠實潛善伯彥更同心濟助以副朕考慎之意金人陷虢州十九日己巳李彥仙敗烏嚕貝勒於陜州二十一日辛未金人薄青州殿中侍御史張守撫諭京城遺史曰先是朝廷措置防秋朝士紛然求去殿中侍御史張守上書曰比年綱紀隳壞風俗凋薄士大夫無奉公守節之誠為全身逺害之計一旦緩急委君父而不顧此靖康之末可為痛哭流涕者也防秋在期方事偹禦而職事官各該便私而去則國家何賴邪乞揭榜朝堂明示敕戒上納其言時邉事未寧詔百官具所見聞奏守即上防淮渡江利害各六條大槩尤以逺斥堠探報為先别疏論金人趨淮甸之路有四宜取四路帥臣守令詮擇能否各賜緡錢齎之募戰士儲芻粟繕甲兵明斥堠公賞罰使之夙夜盡力扞蔽疏至再上宰相黃潛善汪伯彥忘外患恃江淮為險無經濟逺謀忽略其言不用守又乞詔執政大臣惟以治軍旅選將帥嚴守禦搜人才係政事之大者凡細微不急之務付之都司六曹惟防秋是圖潛善伯彥滋不悅乃請遣守撫諭京城守不復還矣階辭上諭之曰當不次用卿即日就道三朝北盟會編卷一百十九
