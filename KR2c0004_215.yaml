body:
  text: 三朝北盟會編卷二百十五宋徐夢莘撰炎興下帙起紹興十五年十月盡其月建炎元年太上皇帝即位以廷議與金人三鎮責授安化軍節度副使韶州安置公不勝忠憤上疏及移書宰輔辨白其略云元議與金人三鎮及金帛騾馬遣使送誓書差沈晦為國信使奉今上皇帝出城至敵營皆是正月上旬事臣是時在畿甸收拾援兵至二月一日姚平仲劫寨失利金人復攻城臣自拱州與李邈收集東南兵入援至初二日奉聖旨召至陳州門釣上城入對被命出城面奉淵聖旨明劫寨非朝廷之意須要奉迎今上皇帝還闕當時所與物止鞓帶四百條水銀鵬砂十許斤適中王芮等所用别無其他自有奉使日月可考若不分明剖析恐身首異處亦未足以消弭人言疏奏不省二年詔募能使金國者公應詔有旨復中大夫乘遞馬赴闕制曰朕念二聖和鸞之馭逺勤沙漠之征憚兩河耕稼之民久困干戈之役思得賢士往使殊方豈無忘身殉國之人應側席救災之詔爾名實相稱文武兼資雅意論兵用合孫吳之妙髙才視草夙推頗牧之竒蚤薦歷於禁塗遂參陪於樞院稍愆清議薦賫丹書兹露章於公車蘄將命於絶域朕嘉乃陳議慨然請行移復次於廷紳俾來朝於蹕路當圖忠報益展素懷佇爾疾驅副豫臨遣時車駕跓蹕維揚公入對上嘉奬再三復資政殿大學士左大中大夫充國信使時敵情叵測公至敵庭被拘留始誘以富貴中迫以鼎鑊公不為屈敵亦義之不敢加害公知金欲窺蜀遣使臣相稱潛告宣撫張浚欲其持重且云江左人錢釗傅乃引者勿令近行在又遣使臣楊安以礬書經文寄季弟南陽公及龍圖公常具奏今在御府敵遣公䇿偽豫公力辭不行副使楊可輔來歸公復以蠟書潛言敵中事上命賜家屬銀絹紹興元年有旨以公奉使日久守節不屈令福州賜錢千緡存恤家屬因遣使以金帛荈茶賜公制曰男子有四方之志夙勵於逺圖行人道二國之言久勤於將命肆頒渥澤用侈光華卿頃以才猷常登樞近抗使旌於萬里不憚勤勞留異域者十年益昭忠信念其良勩宜有褒嘉錫以兼金賁之束帛加織文之􅊏緻分異荈之甘芳特示殊私式將厚意每懷靡及方賴於咨謀有功見知尚期於來諗時紹興七年也公留敵庭既久雖罹困苦然忠義所激遺家人書一語不及私嘗寄南陽公書略云囚繫異域生理殆盡困苦瀕死自古所無中遭迫脅幸全素守惟一節一心待死而已終期不負社稷念虛中遭遇主上最先衆人往日在京城外迎奉歸城中粗殫犬馬之力今日之厄亦為國事分所當為夫復何憾又寄夫人書略云自離家五年幽囚困苦非人所堪今年五十三嵗鬚髮半白滿目無親衣食僅續惟其一節不負社稷不愧神明至如思念君親豈忘寤寐俯及兒女頃刻不忘度事勢決不得歸縱使得歸亦在數年以後兀然旅館待死而已至於歌詩者不勝記其詩有曰定鼎未應周命改登床合許宋人平又曰南冠終日囚軍府北鴈何時到上林又曰傳聞已築西河館自許能肥北海羊雖一飯未嘗忘君如此公志欲就大事嘗與使事得歸者欷歔别且曰大丈夫身拘異域不能效竒功報本朝顧乃同匹夫匹婦之為諒自經於溝瀆耶非吾志也時中原東北豪傑之心恥事仇敵公密以信義感發之從者如響乃以紹興乙丑與偽翰林學士髙士談等同謀結集欲因金人拜天就劫殺之先期以蠟書來告朝廷欲為之外應秦檜懷姦無狀且忌公功在已上繳回蠟書會事亦覺公父子俱死家無噍類時年六十有七公初諱黃中後帥慶陽徽宗御筆改今名云授右朝議大夫直顯謨閣初廣平公既拘留異域金人將用之懼其以骨肉為念欲以家屬為請廣平密知其意因王倫使還附奏云如金人萬一有請願以沒敵為辭會秦檜當國主和議甚多金人以士大夫北留者家屬為請檜悉遣如約顯謨公方侍廣平夫人間居檜諭旨監司追遣老幼無一遺者繼又中使促令就道顯謨公到闕具對劄略云道路之傳聞以謂臣家屬既到即送鄰邦政及螻蟻之賤無補國事萬分之一然而嘗聞蘇武持節居胸奴十有九年既歸之後但見因使者致金帛贖胡婦所産子還中國以嗣其世著於信史實為中國美談伏念臣父虛中忠義自奮謀不及身今若盡遣其室恐非朝廷所以矜恤之義况臣父虛中元是奉使而去以一身徇國之急即與其他被執之人事體不同紹興七年王倫歸自金國來時臣父虛中託以一事附論回奏云若敵人來取家屬願以沒敵為言此語陛下必嘗知之以此驗之可見臣父虛中雖以一身持節在外未嘗不乃心王室而其家屬望朝廷主張之意乃先定於十年前豈欲臣母子顛擠於道路而逺徙於他邦哉為檜所抑竟不得對全家驅迫出境聞者扼腕嗚乎公天資忠義愛君憂國出於志誠忘身徇難終始一節不間夷險初童貫興燕山之役朝廷以公參謀公知召禍啓釁非國家安靜之福不忍潔身至今以為髙其所論諫及條上三十議大率以自治為言拳拳懇切逮金人渝盟兵逼畿甸公﨑嶇戎馬間收合散卒移檄諸道護衛陵寢應援京城繼將命使金開諭禍福太上皇帝以歸不幸中原復擾二聖北狩公雖得罪嶺表獨抗章應詔願復使絶域公精忠自矢可槩見矣初公嘗夢挾日以飛故有儻符他日夢尚兾及宸遊之句逮拘繫敵庭至死節之日凡十九年餐氊嚙雪視古無愧公能隱忍就大事天傾地覆公志莫遂事既敗全家赴死而公之志益顯嗚乎悲夫李綱傳信録曰初宇文虛中以中書舍人為童貫參謀官盧溝河之敗虛中走焉及燕山奏功歸為翰林學士宣和八年秋復從貫以行金人攻汴虛中同貫奔還道君以為資政殿大學士京畿宣諭使敵騎既逼都城虛中走宿亳間至是聞既和乃歸上以為簽書樞密院事故京城為之語曰一走而為內翰再走而為大資三走而為樞密虛中既奉三鎮詔書至金人軍中自以為有和議之功識者笑之朱勝非秀水間居録曰宣和初出師以童貫蔡攸為宣撫使劉廷慶為總帥翰林學士宇文虛中叔通參謀既至境上虛中度事勢不可為乃以劄子示貫攸請罷兵其略云昨者耶律禧失國淳輒篡立國家以兄弟之義不得不問舉兵巡邉招納其人仍絶嵗賜是為義舉今天祐宗社有主全中國之恩威昭盛德於殊俗顧諟明命恐不可緩正宜明下詔書謂前日之役以淳篡立今淳既亡其國無主幸災伐喪非中國之義仰邉臣按兵不得出討乃令雄州移文對境喻以嵗賜已到不知交與何人如此可舒契丹忿戾之心寬我邉計遷延嵗月得以為備又於仁義恩威一舉兩全如女真責我夾攻亦當喻以原約止謂耶律禧無道今彼國再易主不成喪義禮所在人情所同雖云他邦亦必心服貫攸不能用叔通靖康初副樞安成之樞密宇文議保燕京記曰宣和壬寅朝廷議取雲燕命取樞密宇文公以本職顯謨閣待制參預軍事公馳至河北見沿邉匱乏兵備缺然兼以恐女真異日強不可制即上疏力言不可又貽書與太宰王黼元樞鄭居中及其兄承旨並翰林學士趙野託承旨與野力勸黼黼不從遂取旨命公不得漏泄章奏時師老無功上有意中輟而契丹九大王耶律淳死國人離心黼再主攻伐之議鐫宇文公待制命知檀州檀山去燕山四程久之環慶闕帥鄭居中薦公遂以修撰帥慶陽而朝廷又有收復靈武之議欲命髙俅總其事御筆條畫攻取之計俾公遵行又力言不可髙俅自憚其事尋已而公亦罷帥責知亳州乙巳嵗公為翰林學士言童貫欲取雲中斗絶一隅縱可取亦不可守貫之黨馬擴李宗振等陳可取之䇿二疏交上時蔡京當國欲從貫言公兄時為右轄與李邦彥合謀力爭於上前京之説不勝遂畫旨留候至乙巳嵗十二月金人冦邉燕山失守報至中外失色上御保和殿召謂公曰悔不用卿前日之説公奏先降罪已詔以收人心人心悅則中原決保無虞上命公草詔而公先以草成詔本在懷中即取進呈又列更朝政數十事於詔本之後持上欲詔書中入政事拘於紀年賢能陷於黨籍之語大臣亦有言不須降詔公涕泣力請上從公言詔下人心大悅上曰卿素得陜右士心可以資政殿大學士為宣諭使躬往陜西擇將召兵以赴國難公以二月二十八日朝辭出京至陜西以檄文召种師中姚師古令各以麾下兵赴京畿而公親總馬忠等兵至鄭州之東遇金人萬騎欲據鄭公慮鄭破即絶西兵來路遂令忠邀擊于僕射廟前金人大敗公又移文諸郡及申奏朝廷聲言陜西有兵五十萬二帥及諸兵至者十九萬此先聲也金人莫測虛實遂領兵下寨不敢四出至今鄭州繪公及馬忠像于僕射祠中公以丙午二月一日回至京師時朝廷於正月中旬已講和金人止俟得金帛犒師即還而李綱引兵劫寨失利無一騎還者金人忿朝廷失約再攻京城西北隅幾破雲梯四面交至矢石如雨城中精兵自梁方團結五萬人破於滑州何灌領三萬敗於近畿劫寨失利又喪數萬人驅市人登城守禦不能荷戟彎弓公憂社稷危甚即入城見淵聖於延和殿泣謂曰救此危急有何䇿公言今城中惟有禁衛市人不可出戰西兵至者未滿萬人其餘計程須旬日可至王師寡弱城西北隅已摧毁拒敵未有䇿惟有臣以身當劫寨之事臣試冒死往説之上曰卿且奮不顧身以救國家之急公即欲前往自劫寨後金人覩使人來即殺公捐甲服朝章以三省大程官數十人從張蓋揚鞭令前驅傳呼而出城而金人以萬騎圍繞前驅已有被殺者公言我來計議事汝安得殺人金帥二太子者舊聞公名知公至即令引公至帳前會食公問再攻京城之事二太子曰朝廷已與我和因甚却來劫寨公曰我招西兵至城下西兵貪利不知朝廷講和只云爾有金帛數十萬所以劫寨止約不得干他朝廷甚事二太子曰是不是公曰人誰不畏死我以不能指約西兵劫寨冒死而來以明非朝廷之意公論議慷慨衆感其信義遂止攻城令公速往奏知公言今日已晚俟來早入城二太子又喜公不疑留飲至夜對公焚攻城器具翌日公對延和殿言二太子可以信義感動已不攻城今宗室諸公皆從上皇往東南惟康邸為質於軍中臣取聖旨以來日試往取康邸還闕上許之除公簽書樞密院解所服正透犀帶以賜之公次日再往金人寨中力請康王還并指名取呂頥浩七人謂金人曰若此人不見聽只死在此所誓不空歸反覆至數千言金人感其意許之遂與康邸及頥浩等聫轡而歸公嘗謂今上在兄弟中英偉絶人慮久留金人寨中建議親往奉迎遂為今日社稷大功又慮兵久不退生變二月七日又取旨説金帥趣其歸師金帥許以四月十日為期公再三陳論自辰至申促至二月十日二太子曰樞密不稍空我亦不稍空金人以虛誕為稍空請公初十日早親來看我退師二太子又説割三鎮事二太子曰若能固守盟約三鎮别有商量止要賦稅公遂令二太子作誓書入此十六字於書中擕之以歸奏知上喜甚時二太子者遄師公亦反覆説令報知尼堪回至代州矣而李綱之門人皆曰前日保京城之功只説隴西公今日却歸宇文須與掃了掃了之説當時忌公語也公初與二种及姚師古商議為備禦一十九事為一册皆在畫一欲其樞府施行而同列皆言我輩在朝金人必不來何必設備禦所論率矛盾不合公爭於上前言主和者不肯設備主戰者不量力以喪師輕視敵人如兒女子豈不誤國有言者舊嘗懇公薦自代公不與至是在言路又欲與其知己位亞政府者為地抗疏力詆公皆虛言無實而誣公在雲中喪師等事公未嘗總兵又雲中在敵境距代州三百餘里公未嘗帥太原不知何以得此語又謂公以口舌退金人之師致王師無功詆公既力兼同列見公智略輻湊又有退金人保京城大功妬之頗甚公孤立不勝亦懇外補遂以資政殿大學士帥青社朝廷降詔令三鎮邀擊金人尼堪者復回至太原公所議禦十九事皆不省惟唐恪間採其議而何栗慮計䇿行則公復用取其䇿焚之備禦從此而不講公所招宿將孫安節等皆不用至三鎮邀擊喪事金人遂以盟約終不可信攻太原陷澤潞朝廷督种師中等陷沒相繼太原以無援失守大臣親總兵皆潰散國威靡然金人再破京城遂成北狩之禍皆輕敵寡謀妨功嫉能所致也靖康丁未三月八日蒲田成安之謹記金人烏珠殂金人李大諒征蒙記曰皇統元年副元帥烏珠誅都元帥逹蘭以割河南地遺大宋有逆謀提師過江復取河南四年回師謂南北行三帥曰吾近因國有叛臣結連南宋自引軍弔伐問罪大軍至亳州思越淮橋道沮遏車騎吾心熒惑未決忽淮隂二進士逺來獻陳平宋國䇿時吾急遣龍虎阿勒巴二帥探路先行韓常周棨騎兵至淮上吾入旴𣅿疑有重兵把截龍虎遣使報曰淮南無一人一騎為備已遣五千騎越淮分守旴𣅿龜山把截水路兩勢造橋吾大喜晝夜兼行至淮上果橋成六座分步騎徑濟淮源占據軍河擺布斥堠細觀南耗東過淮隂南至六合西至昭信晝夜不絶因觀宋室新立龜山城寨臨淮分勢就山為隘若使聚糧屯兵此地據守吾雖鐡心未敢輕舉但見空壁吾心自恃宋室空有建城立勢之心而無聚糧據守之法又觀二進士所陳圖䇿淮南路旴𣅿至楚州行路窄隘左有長淮右臨河渠糧道遙逺有過邵伯至山陽人騎回惟是獲到菱實雞頭蓮子問諸軍不避寒酷踏泥打凍決地涸港握蕩取菱尋魚摸蚌又宰殺騾馬相兼為食諸軍飢苦之聲不忍聞但虛心寬諭而已又諸士云輜重俱盡有食奴婢者又多言南軍不測要回淮上惟吾心所料南宋既修旴𣅿此乃據山臨水大利之勢尚無守法措置安有智謀就吾敵也決無渡江之理吾獨與蕭平章計議大言檄書於宋若從此約請詣轅門計議如敢違拒水陸星電越江蕭平章南去日視諸軍飢心嗷嗷忘失畫虎龍阿勒巴言若南宋受檄猶得半軍回若宋軍渡江不擊自潰王曰爾論正與吾心同吾西望糧糧缺因南聽蕭信之神不寧如此月餘忽蕭平章躍騎走報不覺喜感天神與南使同來議止淮為界誓信約定南使回吾班師回灑點集軍馬輜重騾馬依稀四分奴婢十中無六七惜哉軍機至此而不能決若能決無一人一騎得回也吾私心用知但一檄書下宋取捷乃萬世不傳之上䇿吾近因賊徒激惱氣衝吾守信昌日箭瘡發作遇隂風痛連骨髓忽承詔報宇文國相連中外官守七十餘員欲乘邉事未息及遷都之冗謀反幸得萬户司寇沃赫來告首捕獲宇文等請暫歸朝議事至日宣到皇叔都元帥遼國王危篤親筆遣回行府帥曰吾天命壽短恨不能與國同休少年勇鋭冠絶古今事先帝南征北討為大元帥左都監行營號太子軍東遊海島南巡杭越西過興元北至小不到雲城今契丹漢兒侍吾歲久服心於吾吾大慮者南宋近年軍勢雄鋭有心爭戰聞韓張嶽楊同列不協國朝之幸吾今危急雖有其志命不可保遺言於汝等吾身後宋若敗盟任賢用衆大舉北來乘勢惑中原人心復舊土如反掌不為難矣吾分付汝等切宜謹守勿忘吾戒如宋兵勢盛敵強擇用兵馬破之若制禦所不能向與國朝計議擇用制為輔遣天水郡王闕安坐汴京其禮無有弟與兄爭如尚悖心可輔天水郡王併力破敵如此又可安中原人心亦未深為國朝患害無慮者一也宋若守吾誓言奉國朝命令時通國信益加和好悅其心目不數歲後供須歲幣色色往來竭其財賦安得不重斂於民江南人心姦狡既擾亂非理其人情必作叛亂無慮者二也十五年後南軍衰老縱用賢智亦無驅使無慮者三也俟其失望人心離怨軍勢隳壞然後觀其舉措此際汝宜一心選用精騎備其水陸謀用才略取江南如拾芥不為難耳爾等切記吾囑吾昔南征目見宋用軍器大妙者不過神臂弓次者重斧外無所畏今付樣造之帥死贈大孝昭烈皇帝大諒本貫雄州歸義縣父成先係雄州弓手於宣化七年纍立戰功自保義郎轉至修武郎準瀛州髙陽關路安撫使司將付交統衆迎敵又纍立戰功轉武路大夫閣門宣贊舍人又功轉右武大夫忠州防禦使奉宋命統衆守援河間已來遭大兵圍閉又充四城提點兼安撫司統領纍奉宋命令統義兵收復山東河北京畿等路羣盜立功轉青州觀察使又纍與北兵戰敵父兵寡力不敵渡江歸宋遭權待制挾讐申父以羣盜為名不能整雪分兵江西守候朝廷指揮蒙遣張俊統率大軍招收父約束已次將佐不得抗拒張俊父之忠義反成過惡被誅戮遂率衆歸附前齊天眷元年知鄭州宣麻除鎮海軍節度使其詞門下授鉞建旌式重兵權之寄折衝禦侮元分閫外之憂思付戎麾喜獲賢將宜敷渙號顯告明庭中侍大夫安化軍承宣使鄭州守李成智識精明性資果毅戰遇強敵槊貫軍鋒弓綰二鈞矢穿鐡騎爭摧鋒陷陳之勇立斬將奪旗之功仰察天時俯觀人事拯斯民之塗炭提士衆以來歸允懷心膂之良增重爪牙之任嗚呼賈復提衆以歸漢終成定亂之功尉遲捨偽以從唐屢著擒賊之績擬豫大將思配前人可特授鎮海軍節度使輔國上將軍充山東路留守東平府住坐賜五十匹黃金三十斤自元帥死後未三載貴戚爭權果如元帥所料天德二年誅廢蕭王宗本三年又誅斬韓常周周啓等四十餘員內多有親立功者三朝北盟會編卷二百十五
