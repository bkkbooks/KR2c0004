body:
  text: 三朝北盟會編卷二百二十宋徐夢莘撰炎興下帙起紹興二十五年十月二十二日丙申盡其日二十二日丙申秦檜薨秦檜遺表曰死生夜旦之常難逃大數命義臣子之戒敢竭愚衷屬餘息之將辭戀清時而何及中謝伏念臣早緣末學奮自書生當見危致命之秋守䇿名委質之分畫疆之遣元樞飛掩報之符存趙之陳具僚奉懲斷之指倉皇去國奔走從君衣冠不變於中華覲會自依於常度雖歷九死其未悔猶兾一言而可興草徽廟之尺書破偽齊之二䇿身居營窟心在周行洎浮海以言旋舉同朝而趣異下石而擠者紛至奉身而退者纍年荷上聖之深知排羣疑而復用延登右揆峻陟薇垣專秉任於鈞衡奉疇咨於帷幄入而告后玉音常許其無心出則稱君輿論共推於得體上遵成算復建中興惟聰明睿智之絶倫蓋古昔帝王之未有挺身死難救民於仗節之初修睦休兵尋盟於奏凱之後是謂樂天以保天下維伐以率伐功居然寧親以事神闕盈城而盈野德之厚也臣何力焉臣感陛下推心委用之誠進期畢命覩陛下求治焦勞之切退欲忘身但知力疾以盡公不敢辭難而避事仰勤宸注親屈帝尊訓詞矜惻於孱軀天步迂臨於親室戴恩慈之俯逮徒感咽以何言顧愚臣知道之若斯雖舉族糜捐而曷報而臣上負乾坤之造莫知藥石之功病在膏肓命垂晷刻闕廷注想難瞻穆穆之光龜鼎妥安尚抱拳拳之恨念籲天而靡逮忍將死以猶言文雖不倫義或有取伏望皇帝陛下惟親盛德謹保清躬萬壽無疆長奉東朝之養五兵不試永居北極之尊益堅鄰國之歡盟深思社稷之大計謹國是之搖動杜邪黨之窺覦以治亂為蓍龜以賢才為羽翼事有未形而宜戒言或逆耳而可從緩刑乃得衆之方訓本乃富民之術雖淵衷之素定在愚慮之實深凡此數端願留聖念臣形留神往淚盡辭窮憂國有心敢忘城郢之䇿報君無路尚懷結草之忠遺史曰初檜病篤招董德元湯思退至卧內各贈黃金千兩德元以為若不受則他時病愈疑我二心矣乃受之思退以為檜多疑心他時病愈必曰我以金試之便待我以必死耶乃不敢受上聞之以思退為非檜之黨檜薨年六十九檜兩居相位凡十九年每薦執政必選世無名譽柔佞易制者不使干與政事備官而已百官不敢謁政府州縣亦不敢通書問若孫近韓肖胄樓照王次翁范同万俟禼程克俊李文會楊願李若谷何若假拂汪孛詹大方余堯弼巫伋章夏宋朴史才魏師遜施巨鄭仲熊皆不一年半年誣以罪罷之尚疑復用多使居千里外州軍且使人伺察之是時得兩府者不以為榮劉光世薨其建康國停併以賜檜檜性隂密乘轎馬或默坐常嚼齒動腮為之馬啖相家謂得此相者可以殺人內深阻如崖穽世不可測喜贓吏惡亷士通饋送四方大帥監司郡守饋送無虛日內庫偶闕腦子上一日要腦子求之於檜檜取一匣進之至上前開緘而匣內有書題名銜乃廣西經略方滋送檜者誤不揭去上謂御前未嘗有如此片白腦子檜每生日四方獻壽香者金玉勸盞為不足道至于搜盡世間之希竒以為賄如符行中鄭藹在四川饋送不可計雖空書亦於書匣中用金獅子二枚坐書凡獻投書啓者以臯陶稷契為不足比擬必曰元聖或曰大聖初為宰相紹興二年罷御筆付綦崇禮令作制力詆之及再為宰相加太師封益國公崇禮已死檜乃進劄乞於崇禮之女夫謝伋之子家收取御筆焚毁其文曰臣仰仗陛下昨日軍興之初為宗社生靈計躬至軍前權與和好因以上格天心中興國祚所謂後其身而身先無以天下為者可以托天下也臣至愚極陋繼亦將命出於自請當是時豈意有今日依乘風雲之幸蓋捐軀徇國萬一近似乃得與今日休兵保邦之議非偶然也靖康之末邦昌僭號臣獨不戴異姓乞於皇族不與背盟之議者選擇繼統其後軍前取出欲行懲斷幸而不死驅敵逺去臣終不變初議至於徽宗草書以為南朝有子不當相待遽如石晉國相雖傲岸自用猶即遣人厚送錢絹至盈萬數後有傳録至中朝者其本尚在可考不誣愚以君臣之契與立朝本末如此昨自初還朝時首奏令劉光世忙通書請如其後頥浩都督在外臣又奏遣北人招討都監門客通書求好未幾邉報王倫來歸頥浩遂欲攘以歸已力援張邦昌友壻朱勝非來朝既而圍城中人綦崇禮頥浩勝非援邦昌時受偽命人謝克家復來經筵當臣之求去也陛下親諭再三恩意凝密臣獨以書生不識事體以必退為真是頥浩乃與權邦彥同日留身乘間建言以謂宰相之去乃無一事於是旋易臺諫擬請御筆至崇禮草制之日請以為據克家崇禮之進用外人所不知臣因知二人獨頥浩所私昵非陛下所眷注也崇禮被逐常以所得御筆公示廣衆不知事君之體至於如此士大夫雖每竊非笑然以其人闒茸凡下縉紳不齒不足以汗牙頰姑置度外臣以出處自有本末後世有公議不必與此輩較曲直故不論也今崇禮已死無子獨有女嫁謝克家之孫伋之子若不收拾所降御筆接歸天府則萬世之後忠逆不分微臣得君立朝無所考信實害國體伏望聖慈特降睿旨令台州取索崇禮所受御筆繳進以臣今奏疏送付史館永以傳信不勝幸甚貼黃克家初受偽命其子伋對所親厚言之曰伋等奈何蓋已不有其父矣豈意自全以至今日克家受頥浩勝非之援再至經筵曽無幾時乃是奏言陛下以一人言召臣又以一人言而去恐四方有以窺陛下其敢為大言無所忌憚如此疑以傳疑何所不至伏望聖慈深賜降鑒奉聖旨依奏主者行下台州取元降御筆復歸天府所謂欲蓋而彰者檜之謂也檜每遇生朝錫賚踵道歸教坊樂佐酒一日有伶人作雜劇之戲其子熺笑聲微髙檜目之不語少頃檜起更衣久而不出妻王氏使人探之乃在一室中默坐智者謂檜歎其子不足以相副也嗚呼深哉乞置益國屬雖不行亦不加罪王循友乞加檜九錫雖不行俄自知鎮江遷循友知建康府識者不敢言唯以目相視靖康小雅曰公諱檜靖康二年金國二帥既日遣吳开莫儔入趣立異姓議未決聲言將縱兵屠城中外危懼顛倒遂有張邦昌之請公為御史中丞毅然獨陳於敵以謂主上仁孝聖明天下歸心廢非其罪豈計之得也願速反正以慰神人之望茍立異姓有死而已二帥遽怒致公軍中執之而北時終始不肯立異姓者孫傳張叔夜與公三人而已嗚呼士之所事外則君內則父父既不可易獨君可易耶且金人席其破京師之威以迫憂恐埀死之人自以謂唯所廢置莫我違也搢紳既靡然奉風旨之不暇以偷其生况敢闕一字其心以政其失哉公儒者也內激忠憤不顧其身惟義所在豈古所謂忠臣耶孔子曰仁者必有勇今於公見之詩曰天崩地陷革我洪圖孰敢爭之維時醇儒祈復明辟義在捐軀猛虎垂涎遂捋其鬚驪龍不睡乃探其珠身赴沙漠名振九區中興姓氏録曰秦檜字會之建康人也父敏學曽任湖州吉安縣丞信州玉山縣令知靜江府古縣皆以清白聞名生子檜其第三子也政和五年何栗榜登進士第為密州學教授知州瞿汝文安撫使張叔夜皆薦之中宏詞科李邦彥薦入館職後除監察御史靖康初嘗使于大金回除右司諫代陳過庭為御史中丞大金陷京師取徽宗淵聖北去欲立張邦昌命御史臺疏其功德檜列其罪而上之又表乞立皇太子或越王又表乞立皇叔親內不與背盟者一人其連銜乞立張邦昌之文檜不肯書大金乃取詣其軍由是世稱其忠其在金也為徽宗作書上尼堪以結和議尼堪喜之賜錢萬貫絹萬匹建炎四年大金攻楚州乃使乘船艦全家厚載而還俾結和議為內助會至漣水軍賊丁祀寨諸將度曰兩軍相拒豈全家厚載逃歸者必大金使來隂壞朝廷宜速追之以絶後患敵軍參議王安道機宜馮義力保護之曰此是宋淵聖朝中丞萬一事平朝廷尋之我輩誅矣宜送之朝祀乃令安道同義送至鎮江府檜見劉光世首言講和為便光世送之朝士民聞檜來皆驚疑惟范宗尹李回薦其忠除禮部尚書紹興初除參知政事檜曰陛下用臣臣必能聳動天下之士後宰相范宗尹罷上欲用呂頥浩已召之富直柔韓璜辛道宗永宗皆懼其來密薦檜為相俾塞其進乃拜尚書右僕射若誤國之相汪伯彥首復其官與之宫祠以報舊德及呂頥浩至俟命一月上卒用為左僕射檜心亦不喜徐結朋黨以自助引翟汝文參知政事汝文公言天下人知檜真大金之姦細必誤國矣乞罷去又遣大金招討都監門客通書大金求好故大金遣王倫南還議和頥浩薦朱勝非綦崇禮謝克家入朝往往言檜之姦上悟罷其相乃落職仍諭朝廷終不復用書其罪付崇禮作制力詆之并其黨胡安國程瑀江躋劉正張燾吳表臣皆罷之後復觀文殿大學士命知溫州碌碌無治聲張浚為相上幸平江府撫軍浚以檜柔佞易制薦入使備員乃除行宮留守次年奏召為樞密院檜亦無所建明奉浚而已八年召為尚書右僕射兼樞密院使同趙鼎秉政會王倫髙公繪自大金還來許還韋太后邢皇后及河南州縣檜力主和議鼎不以為然乞罷去檜遂專政樞密編修胡銓言和議非䇿乞斬檜及王倫以謝天下上怒黜銓而和議定許大金歲幣錢五十萬貫命王倫交故地以請太后皇后盡得河南州縣而大金渝盟王倫太后皇后亦不還檜知僧道太冗不貨度牒暗絶其弊使民知務本頥浩已病檜懷憾不已召為兩京留守頥浩激憤而死復命台州發其家私暗事盡貶其諸子一家破矣趙榮以宿州降命縛還金以絶中原士民來降之路世哀榮之忠而覺檜之心矣參知政事李光言檜所用皆親戚略無公道與檜相爭而罷去次年五月大金背盟入攻復河南州縣士民歸咎於檜檜傲然不肯退上亦眷之不衰檜欲慰人心乃命諸大帥嶽飛韓世忠張俊劉錡皆奏追還不使深入又懼諸將怨濫賞以官又誣趙鼎怨言安置湖州士之稍端正如范沖王居正張九成輩盡逐之楊沂中濠州敗績殿前司兵幾盡檜利其繆改沂中開府儀同三司以慢軍勢檜鄉人范同議諸將帥多握重兵檜用其䇿而逐同居鈞州貪其功於己檜加尚書右僕射兼樞密使俄又加少保冀國公忌劉錡謀深名重因與張俊不協乃罷其兵使知荆南又忌嶽飛忠勇亦與張俊不協罷其政又誣其反殺之于大理寺天下怨之三軍解體大金遣莫將韓恕回懀又再主和議割唐鄧商泗州以獻大金倍添嵗幣之數又誣李光怨言責建寧軍節度副使藤州安置光大泣而去張浚方知福州檜忌其名而罷之大金還徽宗鄭后邢后梓宮及韋太后上大悅加檜太師屢賜玉帶檜初欲罷諸帥兵乃厚結張俊俾為樞密使盡護其軍又專主武臣差注及事成邈言俊罪而罷之由是朝權盡歸于檜非檜親黨及昏庸柔佞者則不得仕官忠正之士各避山林間檜徙封魏用兄為翰林學士終資政殿學士弟棣及妻兄王英王會皆為兩制王韅王歷等皆居撫州恃檜勢凌辱百姓田宅甚於寇盜紹興十二年科舉諭考試以其子熺為狀元俄除禮部侍郎遷翰林院學士後除樞密院加少保嘉國二十四年科舉又令考試以其孫塤為狀元上覽自選張孝祥為第一凡欲差除皆非典故止及其親戚故舊而已不畏公議傲然自恣大金命盡發前後所得大金契丹及歸明人五萬還于大金內弱軍勢絶後來歸降之心嚴衢信處婺建等州前大水士民溺數百萬檜隱而不奏聞有言者必罪之再誣趙鼎怨言安置吉陽軍而死後彗星見檜不乞退康與之言彗不足畏檜特改宣教郎擢用之又忌張俊落其職使知連州頻使臣僚及州縣奏祥瑞以為檜秉政所致改封益國公别築大第窮土木之麗以賜檜武臣乞除差恩賞檜尤惡之積百千員無一得者客行朝餓且死者嵗不下數十以激軍中使無鬬志人人思亂士民詞訟略不省覽殿前司使臣施全候檜肩輿于市刺之不中自是列五十兵持長挺自衛忌胡寅忠梗誣其罪安置新州又安置李光昌化軍初趙鼎議立普安恩平二郡王為子檜不欲宗強勸上曰鼎欲立皇子待陛下終無子也宜俟親子乃立上見江左小康以為檜力任之不疑檜隂結內侍及醫師王繼先闖微旨動靜必具知之日進珍寶珠玉書畫竒玩美物餘錢專徇帝嗜故帝眷寵無比命中使陳琠績珵賜珍玩酒食無虛日兩居相位通十九年薦執政柄必選世無名譽柔佞易制者不使預事備員書姓名而已百官不敢謁執政州縣亦不敢通書問如孫近韓肖胄樓照王次翁万俟卨程克俊李文會楊願李若谷何若假拂江勃詹大方余堯弼巫伋章夏宋朴史才魏師遜施巨鄭仲熊等不一年或半年誣以罪罷之尚疑復用多使居千里外州軍時使人伺察之是時復兩府不以為榮逮疾甚上臨問之檜已昏默不省次日卒年六十四方士民相勸慶封建康郡王致仕其子熺尤恣橫不學聞檜死置酒大喜其黨董德元曹泳等謀薦熺即相位上久知檜跋扈祕之未省乃賜熺少師致仕諸孫在外宫祠再贈檜申王護喪以葬江寧繼而臺諫湯鵬舉往往言其姦逐其親曹泳鄭億年王會等於嶺表諸親王珣等數十人皆罷竄之秀水間居録曰紹興改元范宗尹獨相方三十許嵗自謂有其氣而政事殊未鍊也方羣盜擾五七郡小盜擾三兩郡于是公然剽掠民力既竭盡皆渡江縱去却又于沿江易置帥藩創立安撫大使但約每帥相去七百里不問形勢如池州僻陋乃置江東大帥事同戲劇又欲治崇寧大觀以來濫冒恩賞條目實繁謂之討人倫皆以為非獨參政秦檜力贊之命既下參政李回非自改官諸大將皆嘗隨童貫被賞並合貶削沿邉死事之人所得恩數亦合追奪物議喧甚檜復以此擠宗尹遂罷相揆席久虛檜欲得之昌言曰我有二䇿可以聳動天下或問何以不言曰今無相不可行也未幾檜果相次年植黨以排呂頥浩上及悟盡逐其徒檜亦罷政前一日召當制學士綦崇禮諭以檜二策仍出其元奏云以河北河東人還金國以中原人還劉豫如斯而已今載之制詞至四年金使李永壽王詡來聘首言此事正與檜語合蓋檜自京城隨敵北去為被大帥達蘭郎君任用敵騎渡江與俱來回至楚州遣舟送歸檜王仲山壻也仲山别業在濟南府為取數千緡贐其行其後達蘭統兵犯淮甸朝廷遣魏良臣王倫奉使至其軍中數問檜且稱其賢乃知檜之䇿出於敵意也檜之初歸自言殺金人之監已者奔舟來歸然全家同舟婢僕亦如故人皆知其非逃歸也逮其輔相力薦良臣入為都司繼除從官欲弭其言耳又曰鄭相居中京師人族叔紳者開酒肆俗云正店負官錢禁錮開封府其家窘甚妻離去改適張藴女入端王府至元符末徽宗即祚鄭氏立為妃紳驟貴居中亦進焉崇寧四年居中為內翰士是年星變蔡京罷相五年居中探知徽宗有復用之意頗為延譽京師賜第建閣以君臣慶會為名居中作上梁文曰邱壑未應容謝傅衮衣行見命周公又曰自有薰風來解愠更無箕舌巧為讒其迎合類如此大觀改元京復相居中除副樞以椒房之故朝論不與即除資政殿學士未幾再除知樞密院繼拜首相於是賜第建閣寵冠廷臣兩子皆為從官薦入徑登紫近權勢之盛亞於蔡京自崇寧大觀以來宰執子弟例作從官居中長子曰修年次子曰億年億年思所以自别假手於門館孫謙亨獲與薦名既赴大比試居中相位差試官多其所親知舉王安中李邦彥宇文虛中參詳檢點官莫儔黃頴張志李質李舜由輩皆是也余時為太學官例差入院引試日億年謙亨並案而坐以便傳授巡按官亦有所善嘗有一二員守護慮為兵卒所紏也庭中士人簾內試官無不扼腕既考校儔頴等曰請諸位搜訪億年程文既得之即送知舉三公拆號億年名在第九余即就取試卷閲之議論絶尋常惟䇿三篇粗有可取亦在去留之間每道頭尾各用祖宗故實一事疑即暗號也榜既出物議殊不平臺疏論之有旨取程文看詳則試卷已不見議者益喧又數日得於試院井中汚損不全又有旨令進入乃降手詔稱其文理合在髙第且奬諭居中有義方之訓恭惟徽宗皇帝天覆海涵有大恩德於居中父子億年即授祕書少監遂簉法從其後居中丁憂罷相復領密院薨於位贈以王爵恩禮寵數哀榮始終冠絶古今以君臣施報之善論之億年兄弟當如何哉建炎四年敵騎渡江億年被執去逆豫僭立即臣事之為户部吏部侍郎户部尚書遷除執政尚書右丞資政殿學士紹興元年金既廢豫以河南地來歸億年召還時宰秦檜者王仲山之壻也億年母即仲山之親姊檜子熺復娶修年之女至是頗佑之初至除雜學士繼欲復偽齊所授職名參政李光榻前面折之以為不可乃止後數月光罷政億年竟復資政殿學士仍奉朝請雖士論洶洶而一時侍從臺諫皆檜私黨不復顧逆順之節矣嗚呼億年事逆豫為執政掌其機事預其深謀而所謂機謀者欲滅吾宋也欲危吾君也欲傾覆趙氏宗社而為劉氏家國也欲吞併東南而易屬之也在律叛逆不在赦不分首從然則億年與豫其罪等舊官其可復乎唐祿山之亂既復兩京陷賊官以六等定罪最重棄市次以尺餘流竄故相張説二子均垍皆當死肅宗以在東宫時説有保佑之功欲貸之明皇曰均垍事賊皆任權要均仍賊毁吾家事不可赦肅宗復請于是流垍嶺表而均被極刑焉徽宗之待居中厚於明皇之遇張説億年之事逆豫親於張均之事祿山而况居中素無援助之力今失刑如此何以慰徽宗在天之靈乎三朝北盟會編卷二百二十
