body:
  text: 三朝北盟㑹編卷八十二宋徐夢莘撰靖康中帙起靖康二年二月二十一日辛巳盡其日城破次日館伴來相見説景王請命書上猶有御寳料城中未甚亂國相教徽猷來欲令入城遂於城破處見尼堪斡里雅布云令何相分來議事國書中亦説此意入見奏之當日何㮚出次日又遣濟王中書侍郎陳過庭出何㮚回陳二帥請與上皇相見上欲代之先遣請懇告次日出幸敵營留三日而還後除禮部尚書力辭上曰徽猷閣學士自與尚書同班卿可受之復以借官辭不已改除吏部侍郎命兼權開封尹辭之降御筆云卿始終為國兼尹不須辭免二年正月九日軍前遣使将國書來説農務将興及徽號事須當面議請皇帝出郊遂降詔次日出二月六日金人變議公母夫人張氏聞之慟曰吾子平日剛直死難决矣自後不通消息當月二十一日權府曹呂齊在朱雀門見取過軍前醫官能調入城取物説某修合處在國相位廊下屢喚李侍郎來理㑹事早來又見問何唯你堅不欲立異姓李侍郎道上皇悔過避位主上孝慈勤儉無有過行國相云趙皇失信使南北生靈如此豈不是過李侍郎道若以失信為過國相亦有失信處乃厯數之某忘記其語又云你刼金帛女子止是一匹夫耳你生命决不久國相大怒令推出處置二十四日隨行虞候謝寧入城運取家小説某一生在監軍處打傘前此常隨定侍郎初六日時先収了金國詔書尼堪令蕭太師脱御服侍郎向前抱持皇帝令不得脱被十餘畨人拽過一邉呌道此大朝真天子你等外臣不得無禮又被畨人打口面見脱了御服即時氣絶於地謝寧不敢喚少時却蘇衆已分散只有十數甲兵守之傳國相指揮須管要李侍郎在遂令謝寧扶到青城左掖門側廊屋内住毎日供三畨飲食侍郎絶不能喫似中暑底後蕭太師三次來道事已如此你休執迷揀長處行恐壊性命不是你好人我不來勸你又云你前日罵詈國相國相亦不見過你若順從他時與你好官做侍郎只道天無二日民無二主謝寧曽勸道侍郎父母年髙兄弟又多若稍順他恐可得回侍郎叱云古時有忠底人如今無你理㑹不得十六日國相來喚理㑹事了却放回二十一日又喚去理㑹事甚多時林後只見侍郎罵詈國相令推出處置又回面呌罵不喜聽遂和謝寧縛了到南郊側近顧謝寧云我為國家合死枉帶累你監軍道待與你放了你回頭來也未猶罵詈不止遂害之及説被害區處某後來亦不敢回去埋藏至四月四日金人已退家人出城尋認依謝寧所言區處得之暴露四十餘日肌肉不變時年三十五初金人出牓闕下求立異姓云軍前南官亦當舉唯不許何㮚李某預此議及軍前取家屬兄若虚到南薫門親見畨官數十共嘆其忠且言我大遼死難者二十餘人你南朝只李侍郎一人後自京師奔大元帥府上書者數十人皆言社稷死者唯李若水一人今上皇帝即位之初尚書右丞呂好問又上劄子乞優加褒贈建炎元年五月九日奉聖㫖特贈觀文殿學士與子孫恩澤五人賜其家銀絹五百匹兩後因臣僚劄子乞賜美諡當年六月九日奉聖㫖可特諡續准告諡忠愍建炎三年七月召兄若虚上殿上正色曰圍城中士大夫止有李若水紹興四年正月内明州見武節郎新鎮江府焦山巡檢張説圍城中作行門第二次從駕出郊親見當日尼堪在殿上髙尚書讀罷詔使蕭慶脱御服獨侍郎向前云陛下不可脱此輩亂做也立於淵聖皇帝後左手掩抱淵聖皇帝右手指而罵之某等出門外不見後面事紹興八年夏金國使人烏凌阿思謀對接伴稱公忠義且問子弟幾人今在某處仕官紹興九年春又蒙朝廷給還致仕遺表恩澤三人建炎二年秋家屬流寓揚州遂藳塟公於蜀岡紹興十一年五月二十三日遷𦵏公於湖州歸安縣廣徳鄉卜村南黄龍塢少傅公塋之左勅賜墳寺額曰褒忠永慶禪院賢士大夫作哀挽者百餘人公娶劉氏趙氏並贈碩人三子曰浩早亡曰淳曰浚孫四人楷札橒相繼以二子郊恩累贈公左宣奉大夫所著詩文經兵火多散失有文集十卷其行狀墓誌神道碑皆未就故實紀其事迹又逸事曰謝寧云二月二十一日在南郊側近監軍問侍郎云你回頭也未侍郎厲聲罵詈不止遂被監軍打破唇齒侍郎神色不動噴血奮罵愈切監軍以刄裂頤斷舌迺寘於死死已又肆慘酷至於身首異處膏血浸於原野者凢四十三日家人於被害處収殮時形貌如生此段紀事迹時諸父以先大父母年髙恐痛傷其意遂不敢書至乾道中諸父淪亡因於秘収遺藳中又得其遺始盡書其本末尚書省贈官劄子告詞建炎元年五月初九日奉聖㫖故吏部侍郎李若水忘身為國知死不懼忠義之節無與比倫達於朕聞為之涕泣可特贈觀文殿學士與子孫恩澤五人贈其家銀絹五百匹兩勅節義士之大閑能忘身而徇國爵禄國之砥石宜懋賞以報功肆加恤典之崇越進彛章之限故朝奉郎吏部侍郎賜紫金魚袋李若水操履端重學植粹醇儒館掄才早膺選任從班入侍旋被旁求屬鄰敵之内侵數受辭而出使勤勞靡憚誠慤勿欺念國難之非常駭敵情之不測二聖遭北遷之阨大統有中絶之危奮不顧身義形於色仁必有勇知處死之非難慾焉得剛信茍生之可愧忠義之節無與比倫達於朕聞為之涕泣是用寵以輔臣之異數躐陛秘殿之隆名賻物具儀賞延及子昔段秀實笏擊朱泚顔杲卿面折禄山簡册有光精神如在惟爾英烈追配古人魂其有知服我休命可特贈觀文殿學士餘如故臣僚乞賜諡劄子告詞臣僚上言伏見故吏部侍郎李若水將命軍中備嘗艱險功雖不遂志實可憫青城廢立之際獨以鴻毛之命爭論刀鋸之側義形於色卒殞非命志節凛然不愧古人伏望斷自睿慈特與優典追贈官爵錫以美謚六月九日三省同奉聖㫖李若水忠義無比倫已推恩外可特賜謚勅朕灼觀之古昔歴考忠義凡有臨危致命之秋多仗節死難之士世無倉猝擾攘之變人有媮懦委靡之心茍貪其生鮮蹈於義惟爾忘軀而徇國我其録德而褒功故朝奉郎試吏部侍郎賜紫金魚袋贈觀文學士李若水出入敵營始終漢節威武不屈意氣自如嗟殞竭之靡他宜旌嘉之首及載稽謚典式究僉言危身奉上謂之忠佐國逢難謂之愍於昭大節以示寵光慰爾九原之知為我百辟之勸可特賜謚忠愍餘如故靖康小雅云公諱若水宣和七年冬十一月金人渝盟遣其國相尼堪將兵入河東知代州李嗣本首叛從敵將燕人耿戍律守石嶺闗復開門迎之敵遂圍太原又遣其二太子斡里雅布將兵自平州入攻及境賀正旦接伴使傳察以不屈而死薊州燕人内應燕山帥郭藥師以常勝師迎敵其貳張令徽劉舜仁潛與敵通既接戰二人擁兵不前藥師遂敗走還燕山因拘太師蔡靖都運使呂頤浩而下全燕之地降敵敵兵入攻保州中山不克前陷信德府遂犯京畿十二月天子内禪皇帝嗣祚上尊號於龍德宮越明年正月五日金師至京都之地營於牟駝岡攻城不利而种師道等諸道勤王之師咸集遂議割太原中山河間三鎮以和二月敵衆北歸尼堪慮河東之師襲其後留攻太原是嵗夏天子求專對之才以備出疆大臣以公應詔入對上竒之遂扺河東尼堪力言講和之利朝議許之因遣王芮偕來是時太原失守敵馬已南十一月尼堪營於京城之南青城齋宮斡里雅布營於京城之東劉家寺兩軍併力長圍遂合上數遣公出城見尼堪且求成金偽許之閏十一月二十五日城陷公出見尼堪稍以爽約質之既斂兵不下上幸敵寨公復扈蹕既還和議已定上嘉公勤勞稍遷至吏部侍郎靖康二年正月十日車駕再幸軍前公復從前敵督所括馬及金帛婦女藝術益急回鑾稍稽中外危急二月五日果行廢立是時公侍上側極力爭之且責之曰爾許我和屢矣天子為生靈屈至尊親來計議既以勢力苛留又輙敢無禮如此何也公知敵意已定因抱上大慟且罵曰爾曹何無禮之甚也逺國之人敢廢中國聖明天子乎可速送駕歸去茍不從吾言則主憂臣辱主辱臣死吾將以死争之矣諸將大怒因使人拽公去以馬箠擊公口面流血及縛置之空舍中三日不與食而公罵不絶口已而遣其貴臣髙慶裔來以好語來諭公曰公忠孝人也大金將寵用不患不富貴何不少屈徒死何益也公曰爾曹背謬豈知臣子有忠之節乎我大宋忠臣也聖主被辱恨不手殺汝輩以謝吾君而乃以富貴誘我我有死而已因極罵之且求速死敵知其不可回也遂斃之棄於道側公之給使親見始末因迯歸城中且言之四月十二日敵馬已去公之父與諸弟同公給使出城得其屍已浹六旬而不壊如生因以衣衾棺殮卜𦵏建炎初贈公觀文殿學士官其子若弟凡七人嗚呼方二將破京師擁重兵廢置中原人主如兒女子戯其凶威虐焰望而裭魄公以一身摧之若視螻蟻嗚呼忠義之節冠絶中外誠可搖海嶽而動天地矣故靖康之難死節之士公為第一詩曰烈烈李公實備全德義動幽明氣貫金石扈蹕敵營爰究忠烈杞人之憂廢立大阨公挺不顧二將面叱勇甚雷霆天地動色命輕鴻毛名髙斗極燎火之焚不變藍璧滔天之溺砥柱獨立死得其所震耀方册費樞為忠愍文集前序曰事與身孰重曰身重身與義孰重曰義重義者身之用也夫人誰不愛其身也有義在焉則身有所不足愛也孟子曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也故君子必權其重者况以其任危疑之難白刃鼎鑊曽何足以動吾心乎予每念靖康之變而得死義之臣曰吏部侍郎李某者盖未嘗不壯其棄生赴義之大節而繼以流涕太息也方敵國之師再薄京城朝廷百官共難同事者非無其人也公獨以身當不測之地摺齒爛唇而罵敵之口殊不少屈國人皆以忠臣亡助為恨嗚呼公知所輕重哉異姓或有助公一吐忠憤則天下事亦不至此烈也子路死於衛孔子為之覆醢公之一死宗廟社稷天地鬼神實臨之君子亦必有以處之矣生意凛然足以激忠義之氣而偷生避難者亦將羞死於地下其何以免天下後世之公議乎予為秭歸始得公遺文而觀之盖有味其言也雖然公名在太常忠節義概天下共知之初不待文而傳然剛烈敢為之氣表見於文字間者予竊有仰焉故序公之文而出於節義之大庶幾可以糾偷近茍簡之俗九原莫作予重有所嘆云公洺州人字清卿初名某靖康元年賜今名出使上即位優詔贈恤有加謚曰忠愍世系爵里國史具之孤浚淳跋曰靖康禍變强敵長驅帯甲百萬猛不可當所在望風土崩瓦解欽宗皇帝擢先公於庶官兩持使者節入尼堪軍誓欲捐軀以濟艱難青城之死素定於胸中非一時不得已而為之者於戯人孰不死先公之死酷矣頤已解舌已斷猶奮罵吐血終至於身首異處當此之時天地為之變色日月為之無光戰士為之嗟惋敵人為之歎惜先公已死適我大父母皆垂年故事迹中畧懼所以重貽二老人之深憂也獨秭歸費樞為守為先公文集序今鋟木於蜀中能不沒其實得以取信至乾道中諸父淪亡因於秘收遺草中又得其遺事始盡書其本末孤浚淳泣血書中興遺史及别録曰若水初官為大名府元城縣尉差出下鄉止一寺中有百姓病十餘日一夜夢金甲神人告之曰來日有鐡冠道士託汝寄書與李縣尉可達之爾病即愈病人睡覺甚異之來日果有鐡冠道士叩門齎書與病人曰可將此書與李縣尉説闗大王有書上侍郎病人以書詣若水投之具言夢中事及鐡冠道士之語書題云書上元城縣尉李侍郎闗押若水得書拆封看畢即焚之其事寖傳家人扣之終不説遂作詩曰金甲神人傳好夢鐡冠道士寄新書我與雲長各異代定知此事太荒虚後人或云書中説圍城事一録曰朝廷初選奉使大臣以公姓名聞上初見公名若氷曰若氷猶言弱兵也兵不可弱遂賜名若水副使節使王履事迹曰王履字坦翁開封府人㑹祖蝺故任染院事閣門通事舍人累贈少師祖仲平故任憲團練使帶御器械知潞州贈華州觀察使父景琚故任皇城使知澧州贈武寧軍承宣使公好學通經史及冠即膺鄉薦不第乃於元符二年從父皇城拜南郊恩霈三班奉職元祐間上書力言朝政闕失貽怒當塗論邪正尤甚遂褫官編置新州實預司馬光黨人之列今名在碑籍政和初復官省差充提舉北京恩冀州黄河堤埽勾當公事任内累以功轉成忠郎五年蒙髙陽闗路安撫都縂管吳玠辟充本司准備勾當公事次年隨府罷以功轉忠訓郎續於宣和二年内又復上書極諫勒停久之至宣和六年叙復舊官國信使中散大夫秘書少監賈禋朝散郎試尚書户部侍郎虞欒薦公上殿對於當年六月内稱㫖差監西左藏庫時方從義郎任滿轉修武郎靖康元年八月内宣召上殿准勅武翼大夫充大金山西軍前年九月至太原見尼堪議欲以租賦奉大金贖三鎮地尼堪不從隨大軍復回於當年十一月十一日還京當月十四日公與李若水被㫖同王雲馬識逺再使軍前日下出門行次中牟守河潰兵作亂或傳金人已渡河左右甚駭衆謀改路若水疑未决公曰守邉防河諸隘将士望風逃避奉使若又如此朝廷何所頼以某處之惟有死耳若水然之遂令曰有違者行軍法衆遂定沿路屢凂若水奏朝廷乞嚴設備再次懐州界逢金人大金館伴使蕭慶劉思前來相見具言已遣入京請畫河為界更不須議三鎮事公隨大軍南來不勝其憤氣疾作輿以還閏十一月三日到京城外尼堪召公與若水飲曰且得到使副們鄉中了遂舉盃以勸公等尼堪曰奉使有勞宜勸以酒若水嘆曰某等才薄識淺奉命議和不能為國家定大事罪固宜死酒不敢飲尼堪笑曰前言戯之耳公曰君國事大曷可為戯遂以酒盃擲於地尼堪大怒曰事至於此尚敢如是公曰殺人以挺與刃亦無異也尼堪曰一齊推去囚了公曰平生讀書忠孝事死尚不惜何懼囚也因被囚於冲虚觀尼堪攻城二十五日城陷尼堪遣公同若水入城十二月四日公與若水從駕出軍前繼復扈駕還京除公武勝軍承宣使公辭上曰卿盡忠佐國面折金人固宜重賞公曰臣六世食禄方蒙陛下識擢身當朝廷多事之時惟願以死報國家實不敢冒膺殊賞竟不拜命遂除相州觀察使又辭上不允正月初扈從駕出再出軍前遂為金人所留相繼見隨行翰林司兵士鄭福歸來取衣物備言二月初六日讀了金國詔書尼堪令蕭太師劉尚書脱上龍衣是時鄭福正隨觀察正抱定皇帝髙聲攔截令畨人不得近前道我皇帝孝慈仁儉只為百萬生靈屈身來此見你這夥人不得無禮劉思使左右人擗開手被衆畨人打破頭面領在一邉鄭福不敢向前尼堪即時令人押出觀察共侍郎去後過得幾日再喚去議事觀察回來日夜號哭二十一日再喚觀察去理㑹事甚多時臨後只見觀察共李侍郎髙聲罵詈出來言語學不得尼堪令人擁出去處置了觀察回面向鄭福你若得回去時傳語娘娘道我已為天償債也休苦煩腦左右押鄭福不得向前去鄭福不忍見不知前面去被害處繼見監文思院門從事郎張敏來説渠在軍前正見公在郊臺邉被害時神色不動仰天長嘆念歌一首只記臨後兩句道矯首向天兮天卒無言忠臣死難兮死亦何愆聞之者莫不墮淚公時年四十八二男長曰髙中次曰立中建炎元年五月内奉聖㫖特贈保寧軍節度使先是公與李若水被害時斡里雅布見之嘆曰南朝得人若此二子豈有今日之事可謂靖康忠臣也尚書右丞呂好問題公墓額曰大宋忠臣節使王公之墓三朝北盟㑹編卷八十二
