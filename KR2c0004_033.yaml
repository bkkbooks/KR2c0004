body:
  text: 三朝北盟會編卷三十三宋徐夢莘撰靖康中帙起靖康元年二月一日丁酉盡四日庚子二月一日丁酉朔姚平仲劫金人寨不克敗績楊可勝被執為斡里雅布所殺中興遺史曰先是朝廷大臣皆主和議唯李綱非之及种師道至議論與綱同上意頗和又姚平仲以士不得速戰有怨言達于天聽又一日上遣使伍輩促師道戰師道奏請召大臣熟議之君子謂師道主張不定其意在乎敗則分謗也乃與李邦彥李綱吳敏同對于福寧殿皆言可擊上問兵期師道請過春分節上以為緩乃密遣平仲及楊可勝等取二月丁酉出兵劫摩駝缸大寨可勝奏曰此行決危又恐失國家遣親王宰相和議之信臣欲作奏檢藏懷中具言臣不候聖旨往擊敵上許之是日也用術士楚天覺尅擇劫寨之日漏語于數日之前都人戶户知之又植三大旗于開寶寺皆書為御前報捷字仍于封丘門上張御幄以俟車駕臨受俘獲都人填隘于衢路顒待捷音平仲可勝等以兵七千出城金人空其寨伏鐵鷂子兵以掩官軍平仲等大敗可勝被執夜漏猶未盡上既聞其交鋒急詔李綱出援應接傾刻之間使者三至既拜命戊戌出景陽門至班荆館行營前軍統制張撝右軍統制石濬中軍統制辛康宗左軍統制劉佃後軍統制王師古敢戰統制范瓊等悉出封丘門遇金人皆敗陳福殁于陳中官軍披城歇洎己亥再戰又敗庚子開門放官軍入城唯選鋒統制韓世忠先往應援東明縣獲勝而斡里雅布得可勝而問之曰兩國已通和又來劫寨何也可勝曰可勝以勤王兵到京師三軍欲戰故可勝率之以來非朝廷之意也乃出懷中奏檢示之斡里雅布怒遂殺可勝中興姓氏忠義録曰楊可勝陜西勇將可世弟也大金薄京師自陜西領兵來勤王上與大金講和密遣可勝以兵五千須劫其寨可勝奏曰此行決危又恐失國家之信臣欲作奏檢藏懷中云臣不候聖旨自往擊賊上許之時夜劫大金寨敗績被擒大金斡里雅布問宋國與我和盟又劫寨何也欲併力攻城可勝曰非主上意可勝自來戰爾斡里雅布不信可勝出懷中奏檢示之乃信斡里雅布大怒而斬之世哀其忠靖康前録曰姚平仲初一日劫寨之謀二十八日已遍傳于都下至期出師將士不知所往平仲遣王通為先鋒驅五百敢死士直抵敵營劫二寨皆空至第三寨敵已持滿執挺以待之前軍殊死戰援兵多溺于溝中西將陳開死之通回視其軍重傷已半敵騎自北而南夾攻其後通之衆益不敵棄弓矢以三百騎突圍而出見平仲急揮令上馬西竄敵已衝散其中軍追至板橋乃回二日戊戌斡里雅布奉書問劫寨兵馬書曰今月初一日夜五更時有步騎軍沿孟陽河東南二處向北奪橋詰朝又于大軍營西南劫陳前來當司量遣兵隨路禦逐曽未踰時殺傷兵卒甚衆所獲器甲鞍馬其數多緣當司不識是甚處兵及從何來願示其詳謹奉書奏聞謹奏朝廷報書上遣宇文虛中往敵營報書曰大宋皇帝致書于皇子郎君比者大金軍至京城方懷恐憂乃承寬仁盡洗宿愆許修新好獲安社稷貽慶子孫恩義之重實同天地前日王汭來審所持犀玉等盡蒙留納并金銀等數亦從寬假尤荷恩義之重自非歡好之重何以及此所諭前書所陳未盡明白謹依來悉從改易并交割三鎮詔書初二日方欲坐朝遣來使還一併持去忽報初一日夜有兵馬在城外作閙本朝不知事因既聞輒至大金軍前不勝驚駭尋遣人根問栺約至暮乃知是姚平仲統諸路軍兵作過尋令根捉稱本人未回軍寨亦見令人擒捕俟見即正典刑以戒貪功誤國之士又執政間有素與姚平仲相善其形迹可疑恐相協助已先行黜責了當且本朝自度事理其不敢輕舉妄動者有三論彼此強弱之勢則本朝兵力寡薄難以迎敵一也前此敗盟煩大軍逺來逼近京城惴恐失措荷恩德再造豈敢復有負約之理二也宰相親王特遣詣軍前為質又遣執政大臣奉使事體亦重豈忍置而不恤有傷君臣之義骨肉之愛三也皇子郎君仗義而來聰明果敢必能察此方城外有亂兵所以當日未敢遣使人便還深愧遲滯尚兾深照其他一如誓書所載天實臨之永永萬年罔復敢渝今遣資正殿大學士宇文虛中持書布敘并賫所授國書及三府詔書地圖等前去詳此洞照謹白宇文虛中為簽書樞密院事持報書使于斡里雅布軍前姚平仲等既敗乃除宇文虛中簽書密院事使于斡里雅布且言平仲等擅用兵甲幾誤和議因遣副使交割三關之地李稅沈晦路允迪秦檜程瑀奉交割之地姚平仲擊金人不利宰執亟議召李稅持國書割地以和并奉地圖沈晦奉誓書路允迪割太原秦檜割河間程瑀割中山李綱入對不得初李綱與金人對壘士氣百倍而宰相會食中官俾奏竒兵劫寨敗衄宰相乘之奏上前張皇敗勢以謂王師皆殁無可復戰大事去矣日暮休兵宰相又奏危亡在即李綱入對至閣門為中人所隔不能入晚聚都堂宰執等再奏堅執和議師道曰勝負兵家之常正當再擊之耳何遽喪氣乎宰執皆不聽三日己亥大臣奏李綱种師道出師敗績可正典憲乞罷綱等种師道罷為太乙宫使李綱罷行營使傳信録曰二十七日與李邦彥吳敏种師道姚平仲折彥質同對于福寧殿議所以用兵者余奏上曰金兵張大其勢然得其實數不過六萬人又大半皆奚契丹渤海舊卒其精兵不過三萬人吾勤王之師集城下二十餘萬固已數倍之矣以孤軍入重地正猶虎豹自投檻中當以計取之不可與角一旦之力為今之䇿莫若扼河津絶糧道禁抄掠分兵以復畿北諸邑俟彼逰騎出則擊之以重兵臨敵營堅壁勿戰如周亞夫所以困七國者俟其芻糧乏人馬疲然後以將帥檄取誓書須三鎮縱其歸半渡而後擊之此必勝之計也上意深喜為然衆議亦允即分遣兵而期二月六日舉事蓋隂陽家言是日利行師而姚古种師中之兵亦將至故也其約已定而姚平仲者古之子屢立戰功在政和間為童貫所抑未嘗朝見至是上以其驍勇召對內殿賜與甚厚許以成功當有節鉞茅土之賞平仲武人志得氣滿勇而寡謀謂大功可自有之先期于二月一日夜親率步騎萬人以劫金人之寨欲生擒所謂斡里雅布者取康王以歸雖种師道宿城中弗知也余時以疾給假行營司夜半上使中使降親筆曰平仲已舉事決成大功卿可將行營司兵出封丘門為之應援余具劄子辭以疾且非素約兵不預備斯須之間中使三至責以軍令不得已力疾會中軍左右將士詰旦出封丘門勒兵于班荆館天駟監分命都將范瓊王師古等會敵騎出殁鏖戰于幕天陂斬獲甚衆復犯中軍余親率將士以神臂弓射却之是夜宿于城外而平仲前一夕劫寨為敵所覺察殺傷相當所折者不過十餘人既不得所欲恐以違節制為師道所誅即遁去而宰執臺諫閧然謂西兵勤王之師及親征行營司皆為金人所戮無復存者上震恐有詔不得進兵而斡里雅布遣使以用兵特將士所為不出上旨請再和宰相李邦彥于上前語使人曰用兵乃大臣李綱與姚平仲結連非朝廷意簽議欲縛余以與之而使人反以為不可遂罷余尚書右丞親征行營使以蔡𢡟代之因廢行營使司職事以守禦使總兵事而种師道亦罷宣撫使于是時得止兵詔知事且變即振旅以入城詣崇政殿求對既至殿門聞罷命乃不過退處浴室院待罪初三日也尚書左丞蔡𢡟為行營使靖康遺録曰李邦彥方主和議忌李綱主戰因其敗而中傷之遂與師道皆罷乃命蔡懋為行營使諸統制既回綱已罷矣蔡懋之為行營司也士卒令卸器甲保伍麾去不用方革去權閹提舉城壁如梁方平等又盡復之始金人見邦彥除太宰軍中輕笑曰南朝果無人及綱師道主行營都統則堅壁不敢亂出一騎至是聞二人罷復縱數百人騎自北直東薄城下間以矢石中城上城上輒復者懋皆令笞之乃至請布囊數千它器稱是揚言利以貯金移寨而反資之以土囊塞河夜半有以內侍傳宣啓東門出者賴門吏反覆詰之不可而去皇城火禁並以軍法輒有紅燈籠置諸城上又城西北隅易建獨角皂旗其中飾以鴈非本朝軍中物人騎觀之京師居民震恐慮有不測靖康前録曰是日以蔡懋領行營司乃邦彥等謀也人情恟恟殊不自安懋下令禁守禦兵不得放矢石范瓊馬忠披城劄寨外餘兵盡退入城敵復大肆衆謂懋懷二心官有隂為內應者城中大恐敵焚北郊煙熖亘天乃以十餘騎誘官軍設軍伏于道左一步卒射之中其馬首敵遂引去鄭望之押珠玉赴軍前回鄭望之奉使録曰先是二十二日宣召稅與望之對福寧殿上云國家無許多金銀禁中却煞有珠玉等卿等可通去商量以此準折有一內官傳宣便令出門到寨中金人留孶生監三兩日即移寨牟馳岡過孟陽河一二里不久王汭來云皇子郎君已知樞密侍郎來傳語樞密侍郎緣打毬罷覺頭痛畏風若别有事商量候晚間相見只為犒軍金銀此已别差一畨使人去更不須相見望之度不可見即語王汭云國家委無許多金銀皇帝甚不足早來宣詔云禁中有數世寶藏珠玉及象牙犀角欲以此準折王汭云皇子郎君亦愛此等物前見髙觀察所執笏借去看極愛樞密侍郎如今歸去後可辦下所有珠玉等别做一日便押取來須有商量回城中時申時後入對福寧殿具奏前件語言上云豈非二太子先去了也連云是是望之初不測聖意後來聞得術人楚天覺曽奏云敵分野大將星已遁又曽對李綱云可惜許走了助成綱劫寨之計楚天覺深冇力焉當時雖是傳聞後來見綱目撰傳信録曰本期二月六日起事蓋隂陽家言是日利行師而姚平仲先期于二月一日舉兵以此知所傳皆實又云珠玉待盡盤在宣和殿一齊將去二十九日宣詔宰執等同對福寧殿上云珠玉晒不少盡在宣和殿可同過去看自福寧殿西廊下轉過宣和殿珠玉皆用籠匣盛放內官梁師成舉起一玉杯外碾成螭龍行云此盞只碾作工價幾千緡上云不知要做甚却過福寧殿令梁師成專𬋩津搬赴軍前令稅與望之同共管押前去二月一日同稅出城其珠玉犀角象牙等盡在野地頓放太師耶律忠來相見云皇子郎君今來交割稅袖中出數目劄子耶律忠云樞密且坐只與侍郎去交割却到野地鋪褥地坐有歸朝官六七員在彼逐旋擡過珠玉來耶律忠云皇子郎君教逐件估出價錢望之云此皆希世之寶凡目所未覩如何估得價利有一歸朝官向望之前附耳云估價是好意侍郎髙估價不妨望之遂逐件約貌髙估價錢通計價錢百萬緡耶律忠回笑云皇子郎君甚喜傳與侍郎明日相見皇子郎君道少許多金銀却著這些價錢凖折待要做恩致是夜要四更多時劉都管髙呌云相公憑起你家人馬來厮殺也廳前大燒起柴火至天明康王頗驚駭望之密曰若王師勝彼必不敢害我也即若他勝大王在城外已半月日豈預知劫寨事政不須恐康王頗以為然二日斡里雅布請康王及邦昌等相見帳前劄自家旗幟數百靣俘虜到將校數十人再三詰責邦昌云必不是朝廷如此恐是四方勤王之師各奮忠義自相結集故來劫寨斡里雅布云待道是敵來怎生有許多敵相公悶只可道朝廷不知也次日望之入城具奏耶律忠交割珠玉之意及邦昌所説上云已錯了又云恁地後怎生整頓得起望之奏又云三鎮豈竟交割勢必用兵城下之盟姑隨順使去耳譬如富人家有賊三兩人盡日踰墻而主家知覺然得力強壯僕子出外幹事只有老卒稚童婢妮之類在家如何擒捕得獲今日之事何以異此陛下在東宫時聞朝廷人才軍政紀律帑藏財用將帥士馬如何大臣為陛下畫用兵之䇿但有可擊之理而不知無可用之人此不思之甚也上又云已錯了初种師道以謂三鎮不可棄城下不可戰在朝廷則堅守和議之約候姚古道來兵勢益盛同其商量軍中自遣使人往謂三鎮國家邉靣所繫決不可割若割三鎮則我等將帥用兵無已時據三鎮賦入所得增作歲幣庶幾和好久逺如遣使三兩轉勢須逗留半月重嶽密爾彼必不敢逺去計敵孽生監糧草漸竭勢須北還矣過河以騎兵尾襲至真定中山二鎮必不肯下彼腹背受敵可以得志李綱急于邀功以為迂濶遂用姚平仲平仲古之飬子也先父帥環慶時奏辟古為副都總管望之於此時識平仲無亷恥誕妄人也嘗以度金帶質市易務錢數百千後事露古償之後來童貫以乃父之故成就橫行遙郡後從貫平方臘回京師嘗來相見誇大殺獲魔賊之多綱信其説意謂可以殺金軍如殺魔賊也四日庚申臣寮乞李綱依舊右丞臣寮上言臣聞李綱推孤忠自許之誠首建天下之大事蒙陛下處肱股之任雖愚情無知之人亦能歌舞欣忭况忠直有識之士哉今日忽聞李綱緣用兵少挫已蒙加罪以常情論之固當責也以大事論之則臣别有愚見夫李綱起自孤寒奮不顧身施骨鯾藥石之論當被堅執鋭之敵可謂忠孝之極人之所難能也然一人之智安能盡千萬人之所長惟聖人能兼之諸葛管蕭之亞匹也猶有治戎為長竒謀為短之説然劉備不謂其謀為短而不用也惟在人君因其所長而用之陛下若為李綱短于用兵令罷營使則已若更脫右丞之職民心定不安也非特民心不安又恐天下以李綱緣忠正大用以微罪重責使賢良之士畏懼而不敢言也竊慮壅遏之弊自此始也臣不勝區區為陛下痛惜之伏望陛下察李綱孤立寡助特發宸斷始終保全令依舊裁決大事專意進退人材庶少裨陛下重光之明臣于李綱素非親識亦無一日之雅然採簽言獻于陛下也勿以骨鯾而棄之取進止靖康前録曰先是二十五日綱自奉常除兵侍郎宰執辨事于榻前白時中等謂綱所言皆書生紙上語綱云時中等不信用書生之言至于此今日庭辨尚敢爾耶邦昌從旁力贊時中謂前此執政非不宣力綱云邦昌等素無才術雖盡力何補上欲依景德故事置親行營司邦昌等憤綱皆謂綱可以任事乃除綱右丞領行營司及正月一日劫寨之敗邦昌等以綱不從和議聞官軍失利乃置酒都堂快其夙忿故臣寮有是心御史中丞許翰上言乞復用种師道臣伏見宣制樞密使种師道提舉中太一宫中外聞之悵然失色按師道名將沉毅有謀山西士卒人人信服臣以臺制不得身見師道然素聞其賢如此自兵興以來臣所詢訪數百人皆言師道雖以老疾智勇不衰而獨聞朝廷以為老無計䇿不可復用異于國人臣考古進賢之法在易之晉其六三曰衆允之志上行也夫人各有私合衆則公故必衆云其賢也而後可進此孟子所謂國人皆曰賢而後察之者人君之所聼察如此陛下欲求知人之術則觀諸易象而請質之孟子臣恐左右大夫一旦之論种師道不如國人素信之審也昔秦始皇老王剪而用李信兵辱于楚乃見王翦謝之曰將軍雖病獨棄寡人乎其後王翦卒能走楚軍略定荆地漢宣帝老趙充國使問充國誰可將者對曰無踰于老臣者矣充國與羌相拒堅守不戰羌豪相數責曰語汝無反今天子遣趙將軍來年八十九矣善為兵今請欲一鬪而死可得邪後終漢之世無西戎之患者充國之力也前自吕望以來用老將收功如此者難一二數至于趙用趙括蜀用馬謖宋用王元謨皆見其平日論兵智略縱橫使之當敵制變卒用皆折北不救以古揆今則師道之老而木訥未當謂不可用也今令師道復統河北之師委制閫外之重將吏素服士卒素畏易以成功此上䇿也處之樞府選將將兵威名方略可以折衝此次䇿也今無故解其兵權委之道館士氣消沮民心疑惑臣竊恨之金人此行存亡所係今一大創之使失利去則中原可保邊方可服失此機會則非特將來再舉必有不救之憂臣恐西南一帶共知中國太弱爭圖深入為金人之所為困于奔命必不支矣廷臣間憒憒不曉者固不足道至于近有識者多能知之然知之者莫肯力言言之者莫肯疏奏是又何也知為身謀畏執其咎一有疏奏形迹可按不如容默成敗不與鄙夫事君自古而然臣遭陛下休明之運銜陛下之恩自頂放踵已許國矣又當言責不敢不盡竊聞臺臣謀官屢劾宇文虛中朝廷重去虛中而輕罷師道此非特臣所不喻也或謂師道足不良行害于馳驅朝謁奏事此與國之安危誰為輕重若孫臏坐輜車中為齊軍師田千秋得乘小車至漢殿尊賢尚能古有之矣伏望聖慈哀臣惓惓憂國之計更與大臣參之靖康元年二月許翰為御史中丞先是金師北歸師道見上言金人不知兵役彼惰歸來其過河半擊之決勝可也上不從師道歎息必為後害尋罷為中太一宫使翰纍疏言師道不當罷上曰師道老矣難用當使卿見之翰見師道言姚平仲城下用師之失師道言我衆彼寡但分兵諸寨控守要害使糧道不通可破矣翰歎息其言復上此奏也三朝北盟會編卷三十三
