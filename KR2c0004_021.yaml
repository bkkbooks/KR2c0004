body:
  text: 三朝北盟會編卷二十一宋徐夢莘撰政宣上帙起宣和七年正月二十三日乙未盡二月正月二十三日乙未聖旨王昂接伴大金國賀正旦使事不謹可特勒停二十四日丙申金國賀正旦大使盧州管內觀察使貝勒髙居慶副使大夫守大理卿楊意入見于紫宸殿尼堪在雲中獲天祚以兵護歸國封海濵王遼國亡亡遼録曰天祚即位禽荒失御諸部落怨叛潛附阿固達咸稱兵以拒之天慶四年阿固達會集女真諸部全裝軍馬二千餘騎首入混同江之寧江州東北路統軍司遽狀具以聞時天祚方在慶州秋山射鹿聞之不介意仰北樞密院劄付東京兵馬都部闕司量遣渤海子弟一千人以海州刺史髙仙壽充統領官應援寧江州遇女真兵于州東渤海大敗或陳沒或就擒獲免者無幾復攻破寧江州無少長悉殺之是月天祚出秋山赴顯州冬山射虎聞攻陷寧江州中輟不行差守司空殿前都點檢蕭嗣先充北路都統靜江軍節度使蕭托卜嘉副之發契丹奚軍三千騎以中京諸路都虞候安州防禦使崔公義充都管押侍衛控鶴都指揮使商州刺史邢頴副之到幽州店駐兵女真潛渡混同江掩其不偹諸軍未及陳而為女真所敗輜重器械牛羊金帛悉皆棄于女真天祚自兩戰之敗召宰相張琳吳庸付以東征事以漢軍二十萬分路進討雜以畨軍分為四路北樞密副使耶律鄂爾多拉林河路都統以衛尉卿蘇壽吉副之黃龍府尹耶律寧黃龍府路都統以桂州觀察耿欽副之復州節度使蕭尼格咸州路都統以將作監龔誼副之左祗候郎君詳衮司蕭阿古好草峪都統以商州團練使張惟協副之自春涉夏盡為女真攻陷天慶五年春天祚下詔親征率番漢兵十餘萬出長春路樞密使蕭奉先充御營都統同知南面諸行營都部闕司事耶律章努副之以精兵二萬為先鋒餘軍分五路為正兵諸大臣貴族子弟千餘人為破軍扈從百司為護衛軍以漢軍步騎三萬人别遣殿前副都點檢蕭呼都克充都統以樞密直學士柴誼副之分路進發與女真兵馬會契丹未陳三面急擊之天祚御旗向西南出衆軍從而敗潰天祚一日夜走三百里退保長春州是嵗大宋遣羅選侯益等充生辰正旦使入國道路為賊所阻中京頓程兩月不得見天祚而回夏國人皆稱皇叔燕王忠義且賢若付以東征是必樂為之用兼之遼民自渤海之叛渡遼避難而流落失所者甚衆于今若招收為軍上可以報國家下可以報私怨必能效死力天祚授燕王以諸路兵馬都元帥北宰相兼殿前都點檢蕭德恭副之永興宫使耶律佛騰延昌宫使蕭昂並銜監軍聽辟官屬召募遼東飢民得二萬餘始謂之怨軍如郭藥師者是也别選燕雲平路禁軍五千人并勸誘三路富民依等第進獻武勇軍馬二千人如董龎兒張關王者是也期會四路軍馬防秋天慶八年遇女真陳未交而怨軍先潰燕王與麾下伍伯餘騎退長泊魚務女真入新川州天祚幸中京晝夜憂懼莫知所措多發間探潛令內庫三局提舉官打包珠玉珍玩等物五百餘袋揀御馬二千匹入飛龍院餵養為偹私謂左右曰今日茍能却強敵安宗社使吾終身不食亦足矣若女真必來我有日行三五百里馬若干又與大朝為弟兄夏國為甥舅皆可以歸亦不失一生貴富惟恐軍民被害耳有識私相謂左右曰契丹必亡矣自古人主豈有委棄軍民而自為身謀者其能享國乎秋女真陷東京黃龍府如咸進蘇復辰海同銀通韓烏遂春靖泰五十餘州遂又陷遼東長春兩路慶厯九年夏金人攻陷上京路祖州則太祖按巴堅之天膳堂懷州則太宗德光之崇元殿慶州則望聖仙神坤儀三殿乾州則凝神宜福殿顯州則安元安聖殿木葉山之世祖殿諸陵并皇妃子弟影堂焚燒略盡發掘金銀珠玉器物保大元年伊都叛歸金國保大二年金人陷中京天祚幸燕聞伊都為金人前鋒引導羅索貝勒騎兵掩至驚駭率衛兵五千騎西至雲中府應行宫內三局珍寶庫祖宗二百年所有珠玉金銀匹帛皮毛之類莫知其數盡為金人所掠道中衛兵稍稍引去天祚與諸王并長公主駙馬諸子弟三百餘騎由石窟寺遁去過雲中城下留守蕭察喇以下接見有旨敵馬不逺好與軍民守城但取馬五十匹隨行迤邐入天德軍雲中外得土豪二百餘騎護衛趨漁陽嶺入夾山四部族衙保大四年得達實林牙兵歸又得隂山韃靼摩古津兵自謂天助謀出兵收復燕雲達實林牙力諌曰自金人初陷長春遼陽兩路則車駕幸廣平甸而都中京及陷上京則都燕山及陷中京則都雲中及陷雲中則奔夾山向以全師不謀戰偹以至舉國漢地今為金人所有國勢微弱至此而方求戰非計也當養兵待時而動不可輕舉斥而不從遂率諸軍乘尼堪之歸出夾山下漁陽嶺取天德軍東勝寧邊雲內等州南下武州遇金人戰于遼遏水復潰遂奔山金司小博囉小博囉密遣人報尼堪遣五百騎劫遷入雲中初見待頗有禮即降封海濵王差兵護送長白山東築城居之遼國亡矣遼國自太祖按巴堅創業于其前太宗耶律德光恢廓於其後吞并諸番割據漢界南北開疆五千里分置南面漢官左右相參知政事樞密院直學士主治漢事州縣中書門下共一省兼禮部有堂後主事守當官各一員尚書省併入樞密院有副都承旨吏房兵刑房承旨户房廳房即工部也主事各一員北面契丹樞密院或知或簽書樞密院事伊勒希巴林牙如兵機差除錢穀郡牧事等𨽻樞密院刑獄𨽻伊勒希巴院主治番界部落又有南面都部闕司治諸番官院諸行宫都部闕司主管宫院漢民建五京五計司如燕王司兩轉運中度支上鹽鐡東户部三路錢帛司長春遼兩平州大藩府八黃龍興中奚王南北王府伊實王府節鎮州三十三平奉聖蔚應朔豐雲中內宜錦乾顯䨥遼咸番蘇復辰興信長春慶饒驤祖川成業懿龍化宜坤建泰髙利歸允告安武寧江刺史州七十觀察團練防禦使州八涿易檀順景薊營灤汗歸化武德闕陳勝寧邊遷潤溫嚴降聖北安松山恩通韓烏靖寅祥雍新衛招燕海淥遼西海北安德點澤榆銀鐡保瀕山石嘉集連演康蕭賦吉文蘭闕拱安逺榆河金蕭河清和勒端五花振武下州二十三徽濠歡衡州閻隋澄金義遂昌豫圓福榮康蕭里河茂麓宗縣二百餘如沙漠之北則置西北路都招討府阿爾威部族衙蘆溝河統軍司倒撻嶺衙鎮攝韃靼蒙古德哷勒諸國雲中路則置西南面都招討府西京兵馬都部闕司金人肅河清軍五花城南北大王府伊實王府山金司控制夏國燕山路則燕京總都管府侍衛馬步軍控鶴都指揮使都統軍司牛欄軍寨石門詳衮司南北皮室司猛伊喇司並𨽻總管府偹禦大宋中上京路則有諸軍都虞侯司奚王府大詳衮司大國舅司大裳袞司五院六院塔斡司遼陽路則東京兵馬都部闕司契丹奚勃海四軍都指揮使保州都統軍司湯河詳衮司金吾營雙寬司控扼髙麗上京長春路則黃龍府兵馬都部闕司咸州兵馬詳衮司東北路都統軍司鎮撫女真室韋諸部所在分布諸番與漢軍咸以牙爪相制戎器之偹戰馬之多前古未有子孫繼統二百三十餘年嘗與中原抗衡曽無一日秋毫之警祖宗功業規模可謂宏逺矣逮至天祚失御女真稱兵首尾攻戰十二年間舉國土崩瓦解古人有謂得之難而失之易者非虛言耳可不哀哉茆齋自敘曰自天祚驅韃靼衆三萬人騎乘尼堪歸國山後虛空直抵雲中府襲擊烏舍率蔚應奉聖州雲中府漢兒興兵為前驅以女真軍馬千餘騎伏於山谷間出韃靼軍之後韃靼潰亂大敗天祚南走烏舍遣羅索貝勒以馬五百追至武州界天祚欲趨武州南投大朝為隨行僧所勸謂南朝弱必不敢留隱當為女真所索等辱不可再辱莫若徑歸女真亦不失為王也天祚意決不進羅索追及乃下馬跪迎天祚請北面拜降天祚從之烏舍遣人護送歸國削封海濵王置諸東海隅踰年而死松漠記聞曰金人浸逼中京中京古白霫城天祚懼遣使立阿固達為國王阿固逹留之遣人邀請十事欲册帝為兄弟國及尚主使數往天祚不得已欲帝之而他請益堅天祚怒曰小國乃欲偶吾女邪囚其使不報已而中京被圍逃至上京過燕遂投西夏夏人雖甥舅國畏女真之強不果納初大觀中本朝遣林攄使遼遼人命習儀攄惡其屑屑以惡語詆伴使天祚曰大宋兄弟之邦臣吾臣也今辱吾左右與辱吾同欲致之死在庭恐起釁皆泣諌之杖半百而釋之時天祚窮將來歸以是故恐不加禮乃走小博囉復不納乃夜回欲之雲中未明遇諜者言羅索軍且至天祚大驚時從騎尚千餘有精金鑄佛長丈有六尺者他寶貨稱是皆委之而遁值天微雪車馬皆有轍迹為敵所及先遣近貴諭降未復羅索下馬跪于天祚前曰奴婢不佞乃以介胄犯皇帝天威死有餘罪因捧觴而進遂封海濵王處之東海上北征紀實曰天祚者以老遼主之嫡孫立而淫亂且以有力聞因遊獵無度故上下皆不服以至滅國其竄入隂夾山也久之收集散亡勢亦稍振故金人往來鴛鴦白水泊以重兵屯雲中偹之然契丹之人漸歸金國故天祚不能出羣小日夜為上謀謂天祚在必生後患乃間遣人誘之天祚奢心素侈多慕中國故其失勢也亦願來歸始得一番僧者令賫御筆絹書通之因得還報初甚密也往來既數則又張皇矣其往來皆由雲中故金人盡知適欲其出是以不得顧也及天祚許歸顧乃改書為詔示欲臣之且約來歸則待以皇兄之禮位越燕二王上築第千間女樂三百人禮待優渥天祚大喜于是約期相接童貫是以落職致仕使河東密通之始金人每以力不能入隂夾山恨其不出出必得之蓋欲以絶其國人之望而天祚者適畏尼堪據雲中屯重兵以扼其前故不克出及約期之際忽報國相歸金國稟議以烏舍代雲中元帥職而去矣天祚用是亦坦然遂以宣和六年之冬末領契丹韃靼衆五萬人騎并携其后妃二子秦趙王及宗屬南來如履無人之境及才過雲中則烏舍忽以大兵遮其歸路又報尼堪適已回雲中故為其追襲一擊而天祚之衆大潰勢不得還且畏中國必不可仗也乃亟走小博囉帳小博囉帳者天德雲中間之一族帳舊臣屬遼人及天祚至小博囉避正寢事之唯謹不以其失國虧其臣節始尼堪常以兵伐小博囉矣然或勝或負及天祚在是尼堪因自討之一舉殺小博囉盡收破其族帳蕩然無遺育遂禽虜其后妃諸子宗屬獨天祚逸去不見乃於朔州武州境上即時分兵每三十里百騎頃刻布三百里以待之果有一人馳駿馬手更牽二馬望北馳去騎兵圍之即下馬因自言曰我天祚也騎兵將加執縳猶顧左右叱曰爾敢縳天子耶尼堪因使拜阿固達像而遣之金國降封海濵王始方討小博囉以未得天祚也尼堪遣使謂貫曰海上元約不得存天祚彼此得即殺之今中國違約招來之今又藏匿我必要也貫拒以無有即又遣使迫促貫語大不遜貫不得已遣諸將出境上曰遇有異色目人不問便殺以首授使人亡遼録茆齋自敘言天祚被擒事皆大疏訛不若紀實之詳但舉此一端最顯者以證之則可以例其餘然金人俄自得之事乃息初金人憤我久矣所以不即南下肆其威者以天祚在隂山綴其後懼乘虛而出則契丹必響應故也羣小不克深思不唯誤敵國之主致其滅亡仍以上誤聖朝于是天祚以宣和七年正月至八月方遣人來謂之告慶使以報我初金人得遼地乃分兩路其東南所忌者張覺也其西所畏者則天祚也我始誤張覺與除東南之患矣終又誤天祚而致其滅亡使略無西北後顧之慮故以是冬入中原亡遼遺録曰天祚降書云降臣耶律延禧謹伏斧鉞躬詣大金國俯伏待罪臣聞人不患其勇患其為暴也伏念臣祖宗創二百年之基承天統繼子傳孫郊祀上帝內外歡慶豈意微臣骨寒命薄無德可褒不能當此夙夜皇駭罔知過咎冒犯忌諱若曉霜而遇烈日扁舟而遭怒濤衆惡競興譖辭蜂起故兹慚德激揚聖怒轉加兵師憂懼之極如坐炭湯蓋聞軹道之放荷蒙記恤况若新安之坑例受無辜念漢皇之仁恩誕敷濡澤誚項羽之過惡奚免終傷臣所懇者乞諧軹道之留免效新安之禍戰栗之至仰干聽聰昧死謹言范仲熊北記曰天祚者姓耶律名延禧契丹第九代道宗洪基之孫昭懷太子濬之子也濬有罪被殺而立延禧乙邜嵗四月二十九日生身長六尺有餘善騎射道宗殂延禧嗣立辛巳嵗正月十三日即位號天祚皇帝延禧未即位也國人憐其父之寃頗歸心焉及即位拒諫飾非窮奢極侈盤于逰畋信用讒諂紀綱廢弛人情怨怒故金人乘其弊而攻之所向輒克十年之間身擒國亡可不哀哉契丹之先本東方之國在橫山之南鮮卑舊地元魏時自號契丹唐貞觀初始置松漢府以密桂為都督會昌中賜以契丹之印于是統有八部雄據北漠懿僖之亂中國不靖後有按巴堅遂稱帝號抗衡中國莊宗時侵雲朔等州因盧文進冦幽州為邊患明宗約為兄弟且以解邊人之倒縶紓國家之外患按巴堅改元為制分建京闕宫室官號盡依中國并奚渤海諸國建元神册號太祖大聖大明皇帝子德光立會晉祖自河東遣使求援割地為獻德光乃率兵十萬送石祖入洛立為皇帝割代北應朔寰蔚及范陽山前幽薊瀛漠涿易檀順及山後儒媯新武十六州以與之仍嵗與帛三十萬匹少主嗣位耻稱臣而稱孫自是有隙而兵始交矣德光以兵直抵汴京遷少主于黃龍府滅晉而歸死于欒城滅狐林號嗣聖太宗其兄天皇王之子烏雲立號天授被弒諡世宗嗣聖子璟立號天順諡穆宗天授子賢立號天贊諡景宗子隆緒立景德初犯澶淵達蘭死遂請和號天輔諡聖宗子宗真立慶厯中尋盟諡興宗子洪基立在位五十餘年號老主子濬嘗有鳴鏑之謀殺之而立其孫諡道宗濬之子延禧立是為天祚契丹第九代至是而亡三十日壬寅金尼堪以擒天祚遣人獻捷宣撫司請嵗幣中借銀絹二十萬賞軍撫宣司從之二月童貫上賀耶律氏滅亡表童貫言昨遵奉睿訓措置北事撫定燕山府涿易檀順景薊州及河東路先取朔寧府武州與大金計議交割雲中府路州郡已獲定約外契丹舊主自稱天祚自前年竄于夾山之北稍稍寧聚借助鄰國欲謀再舉小番小博囉之屬慿藉勢聲前有結約窺伺朔武新邊去嵗八月陛下躬授睿算令臣駐兵河東以時措置修整武偹以逸待勞敵兵入邊前後斬獲甚衆至今年正月契丹舊主離夾山與大金迎敵戰兵敗引餘衆走竄南來朔武對境小博囉處藏泊遣人齎偽詔敕招誘歸附新民又手書文字通耗來歸朝臣依奉睿略務守大金信約却不受移諜大金西南西北路都統所照牒藏泊去處仍遣河東都統李嗣本領兵捍邊劄下沿邊統制官等不得妄有招納日久整齪兵馬為必取之計舊主初欲南來先遣其黨並邊劫掠纍次為朔寧府武州太山寧化軍將佐殺敗探知沿邊軍兵甚盛回徨涕泣遂于二月十九日昏夜北走至二十七日準大金西北南北路都統所牒照會稱昏主二十一日已自出首前來蓋兩朝通歡所致牒臣照會其李嗣本及統制官軍兵斬獲其馬步卒四千八百五十一級內有首領袐王溫普提點劉忠廉等二十三名皆是小博囉下總兵用事勇敢剽捍之人並已梟首劉慶等十四名皆是舊主帳前腹心任使招兵聚衆之人亦皆統縛奪到鞍馬器械羊牛等無數焚蕩輜重積聚糧草淨盡其契丹主耶律氏今已滅亡者肅將天威仰成功之善繼布昭聖武致敵國之自亡坐縻八部之遺曽無一鏃之費事光典籍歡通神人恭惟皇帝陛下誕敷舜德駿遹文聲九功之敘惟歌既攸寧于內治七德之經兼用乃申敕于外攘曷常樂此金革鏖戰之勞蓋亦兼拯中外倒懸之急遂滅抗尊之敵兹為不世之功恭急章聖却澶淵之師仁聖增關南之幣祖宗為民而隱忍臣子許國而忿捐仰惟如在之靈未置侮亡之念逮至今日遂集大勳上符藝祖懲艾之之謀克紹神考憂勤之志乃宗廟社稷之大慶深契天地神祗之夙心臣猥以疲癃誤膺國任效師干之力居慙顯允之壯猷告經營之成永賴對揚于令聞秀水間居録曰宣和七年童貫為宣撫司至河東聞契丹主天祚皇帝者匿于近塞報金人取之乃露章稱賀耶律氏滅亡表既傳有識之士無不歎息其詞中書舍人王雲作或云翰林學士宇文虛中作時二公俱在貫幕中故也金人既得遼主即謀南侵遣人使三輩初曰都謝通好也次曰告慶得天祚也即賀天寧節使也使傳繼來河朔至京州縣供億迎送固已疲弊且窺覘道路乃使我不疑十一月三使皆歸即舉兵有郎官陳桷為送伴使至境上金人已宣言大舉公為攘奪無復常儀桷語燕帥蔡靖靖怒曰安有是事請示傳言之人當斬之以徇桷懼馳還不復敢言但懇求外補除福建提刑而去三朝北盟會編卷二十一
