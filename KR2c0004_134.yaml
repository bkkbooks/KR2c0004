body:
  text: 三朝北盟會編卷一百三十四宋徐夢莘撰炎興下帙起建炎三年十一月乙巳朔盡二十三日丁卯車駕幸明州車駕欲往眀州而神舟不能過堰上命刀斫碎之俄有班直數十人出不遜語宰相吕頥浩冒雨著泥靴彈壓之且曰班直平日教閲何嘗有兩箭上貼今日之事誰為國家死難者衆皆無言頥浩曰今金人侵陵國家勢不敵自當避之豈可不念國家之急而欲阻衆班直理屈往往跳水而死中書舍人李正民己酉航海記曰建炎己酉秋七月車駕在金陵初一日下詔奉隆祐太后六宫外洎六曹百司之南昌命簽書樞密院事滕康資政殿學士劉珏同知洪州三省樞密院事治常程有格法細務及從官郎吏皆分其半從行八月十六日隆祐登舟百司辭於內東門閏八月一日內外御筆以固守建康或左趨鄂嶽右駐吳越集百官議於都堂羣臣皆以鄂嶽道逺恐饋餉難繼又慮車駕一動則江北羣盜必乘虛以窺吳越則二浙非我有乃決吳越之行十三日制以吕頥浩為左僕射杜充為右僕射繼又命杜充江淮宣撫使留建康府沿江諸將並聽節制十四日從官以下先行二十六日車駕離建康府九月八日行在平江府十一日以翰林學士張守簽書樞密院二十四日以簽書樞密院周望為江南荆湖宣撫使駐兵鄂州以控上流以頥浩不可離行在乃改命焉十月二日從官以下先發初五日車駕離平江府十三日行在越州入居府𪠘百司分寓十月二十日知杭州康允之遣人押到歸朝官某人云自夀陽來報金人數道並入已自采石濟江以未得杜充周望奏報朝廷大駭集從官議欲移蹕於江上親督諸將為迎敵之計宰相侍從同對於便坐或謂且遣兵將或謂宜募敢戰士以行宰相吕頥浩又自請行議未決退詣都堂午間得周望奏狀録到杜充書敵至和州已召王移師南渡杜充親督師詣采石防守朝廷稍安從官乃請應援建康又分兵守衢州信州隘路慮敵騎自江黃間南渡或徑趨衢信以迫行在也二十一日命傅嵩卿為浙東防遏使令召募土豪以備衢信得江州報金人破黃州由鄂州渡江向興國軍路已關報洪州是日有中使自洪來云隆祐一行已於十一月初八日起發住虔州矣二十二日從官又請對慮敵騎不測馳􅊳請以郭仲荀輕兵三千從車駕至平江府倚周望韓世忠兵以為援謂仲荀方自杭來士卒老幼未至易作去計乃令張浚兵以次進發既對上以張俊重兵不可留遂決議皆行退命直學士院汪藻草詔曉諭軍民以為迎敵之計乃以二十三日先發兵三千車駕以二十五日起行既至錢清堰宿頓是夜得杜充奏我師敗績又康允之奏人馬已至建康府往路犯臨江府界遂倉卒回鑾二十六日曉至越州城下從官對於河次上議趨四眀吕頥浩奏欲令從官以下各從便而去上以為不可曰士大夫當知義理豈可不扈從若如此則朕所至乃同盜寇耳於是郎官以下或留越或徑歸者多矣二十七日以御史中丞范宗尹參知政事是早車駕詣都堂撫諭將士移御舟過通泗堰不克二十八日晚出門雨作自是路中連雨泥淖吏卒老幼暴露不勝其苦命兩浙轉運使陳國瑞沿路排頓用炭一千二百斤豬肉六百斤以給衛士云十二月五日車駕至四眀居於府廨朝廷召集海舟甚急監察御史林之平自春中遣使詣福建召募海船至是相繼而至朝廷甚喜十一日親從班直百餘人因宰執早朝至行宫門外邀宰相問以欲乘海舟何往頥浩諭以利害乃退上命于永宗勒兵盡捕諸班直囚之十三日誅為首者十有餘人並降隸諸軍以侍御史趙鼎為御史中丞十四日臺諫請對上諭以不得已之事又探報金人已入臨安府張俊引兵出戰不勝康允之走保赭山詔六曹百司官吏並以明越溫台從便居住於是左右司御營使司參議官皆留十五日大雨羣臣欲朝至殿門有旨放見惟宰執入對既退車駕遂登舟止宰執從行十六日從官以次行吏部侍郎鄭望之以疾辭不至詔給寬假給事中汪藻乞陸行以從十八日聞有使人至命范宗尹趙鼎復回明州以修報既至乃前所遣報信使臣而已十九日車駕至昌國縣二十四日權户部員外郎李承造往台州刷錢帛二十五日早得越州李鄴奏云金人已在西興下寨别令人馬自諸暨趨嵊縣往入明州乃議移舟之溫台是日范宗尹趙鼎至行在二十六日啓行自是連日南風舟行雖穩而日僅行數十里二十九日嵗除庚戌正月二日北風稍徑晚泊台州港口三日早至章安鎮駐舟知台州朝公為與李承造皆來上幸祥符寺從官迎拜於道左是日得餘姚把隘關陳彥報人馬至縣迎擊乃退又得韓世忠奏見在青龍鎮就糧欲俟敵人之歸為邀擊計初命世忠駐兵鎮江控扼後聞金人自采石濟師上命遣世忠赴行在又欲令移軍於常州吕頥浩請以御筆召之上曰朕於世忠約必降合同乃來於是遣中使齎詔召世忠而世忠聞采石失守已離鎮江登舟矣至是得奏上優詔答之四日象山縣報人馬至明州張俊出兵擊之五日從官請對於舟中户部侍郎李逮自明越州來言張俊為戰守備眀州西城外居民爇之矣然其意亦欲來越行在也曉得康允之奏繳到杜充書知在真州與劉位聚兵為邀擊事徐州趙立以師三千來援建康守陳邦光及户部尚書李稅皆降於金六日張俊奏云二十八日二十九日止同初三日遇敵殺傷相當又得二十八日奏及差人齎到二級上命辛企宗以兵一千赴明州策應又出手詔付杜充趙立激勵使戰以為後圖皆親筆示宰執乃遣之而辛企宗不行七日周望奏常州有緋抹額敵衆犯外城知州事周杞守城以拒敵赤心隊劉晏出戰敗之又言知秀州程俱率官吏棄城保華亭縣又探建康人馬皆焚糧草收金銀稍稍渡江北去自稱李成人馬云八日張思正奏云張俊出兵擊逐敵騎思正與劉洪道李質分兵追躡九日張俊奏已自台州陸趨行在意恐金人小衄濟師而來力不能捕耳前此屢奏求海舟朝廷報以方聚集遣行欲其且留明州既得此奏甚以為憂又慮李鄴已迎降金人以越為巢穴其經營未巳也十月郭仲荀責授汝州團練使廣州安置以擅離越州及妄支散錢帛又夜過行在不乞朝見等罪也十二日滕康遣使臣奏隆祐一行已至虔州前此得信州報探云十七日已到吉州又云二十一日有人馬至吉州東岸知州楊淵棄城走朝廷深慮敵騎追躡然本謀南昌之行意謂金人未必侵伐雖離建康日得密詔令緩急取太后聖旨便宜以行後至平江議者乃云自蘄黃渡江陸行二百餘里可抵南昌朝廷始以為憂遂命劉光世自淮南移軍於江州以為南昌屏蔽既至而軍中月費十三萬緡知州事權邦彥以用度不足告於朝廷命洪州三省樞密院應付至十一月中權邦彥乃奏言得東平府故吏卒報其父已身亡遂解官持服朝廷雖遽命起復而邦彥已離郡去及敵騎渡江光世乃言初謂蘄黃間賊寇遣兵迎擊既知其為金人遂回軍隆祐以初八日行敵騎以十四日到城下於是知州王子獻以下皆走敵騎又攻撫州執知州事王仲山以其子權知州事令根括境內金銀走洪州送納敵怒其少云撫州四縣不及洪州一縣乃知信州陳機探報也十三日劉洪道奏金人再入境上遣兵拒之及陳彥在餘姚屢獲首級稱李鄴並無官報文字然台州探報越州並放散把隘人兵及管待金人與之燕飲及父老僧道赴杭州知其必降矣十四日張俊自台州來執金人一名至行在戮之知邵武軍張毣奏有光澤縣弓手同金人一騎至軍稱有大軍千餘人繼至已行斬首於是福建諸州皆震恐知福州林遹奏乞遣兵防守又自言老病不任事乃命集英殿修撰程邁代之十五日金人再攻餘姚朝廷欲遣張公裕以海舟數千載兵直抵錢塘江下燒爇金人所集舟船衆以公裕素不知兵慮海舟反為金人所得皆以為不可十六日雨雷發聲十七日劉洪道奏金人以十三日一更水陸並進直至城下洪道與張思正皆引兵出童天先與李質已擅趨台州朝廷方降三官令還四明已無及矣聞南昌敵騎入潭州而洪撫建康之間稍稍引去建昌通判朝公邁申先因出城集民兵軍事付計議官承信郎蔡延世拒而不納十八日舟離章鎮始張俊既移軍朝廷議分遣其將領率兵援明州上不欲遣乃止他時駐驛之後資以彈壓蓋行在諸軍惟此精甲全粧稍齊整耳又批令劉洪道等皆退避其鋒然議者皆謂眀州既失守則海道可虞而行在必不安也十九日晚雷雨又作二十日泊青澳門二十一日泊溫州港口二十二日余被旨奉使江州問安隆祐宫自後不復記録聞行在已渡溫州矣金人攻蘆州淮西安撫使李會叛附於金人降賊王善以其衆降於金人王善自圍陳州與張用曹成等分軍遂轉掠宿亳濠州竟無屯駐之地遂入廬州聞金人侵合淝乃屯於巢縣將起發向南而去善之母渡浮橋墜水溺死善悔悟欲引其衆而去不可於是請投拜於金人金人拘善於軍中遂給公據俾其衆歸鄉而前軍祝乂後軍鍾統制左軍李防禦右軍張淵各以其衆散去自此淮東淮西皆被王善餘黨之擾矣善粗悍匹夫本無馭衆之才亦無治軍之術徒以從其徒黨任之侵擾故能乘天下之亂蟻聚烏合不啻一二十萬衆劫掠資財淫汚婦女為中原士庶之患其軍中行伍部隊略無紀律屢攻城邑皆克捷聞金人至遂投拜三日丁未德音禦敵者莫如自治動民者當以至誠朕自纘丕圖即罹多故昧綏懷之逺略貽播越之深憂雖眷我中原漢祚必期於再復而迫於強敵商人幾至于五遷兹緣伏衛之行尤歷江山之阻老弱扶擕於道路飢疲蒙犯於風霜徒從或苦於驛騷程頓下屈於煩費所幸天人協相川陸無虞倣治古之時巡即奧區而安處言念連年之紛擾坐令卒士之流離鄉閭遭焚劫之災財力困供輸之役肆宿宵而軫慮如氷炭之交懷嗟汝何辜由吾不德故每畏天之警戒專克以焦勞欲睦鄰休戰則卑辭厚禮以請和欲省費恤民則貶食損衣而從儉茍可自消於氛祲殆將無愛於髮膚然邉陲歲駭而師徒不免於屢興餽餉日滋而征斂未遑於全復惟八世祖宗之澤豈汝能忘顧一時社稷之憂非豫獲已止俟禍患之息首圖蠲省之宜况昨來蒙蔽之俗成致今日陵夷之禍亟雖朕意日求於民瘼而人情終壅於上聞主威非特於萬鈞堂下自遙於千里既真偽有難慿之患則遐邇􅋦無告之寃已敕輔臣相與虛懷而聽納令在位各須忘勢以直詢直言者勿遣危疑忠告者靡拘微隱所期爾衆咸體朕懷尚慮四民興失職之嗟百姓有奪時之怨科需苛急人心難俟於小康犴獄煩滋邦法有稽於末減乃用迎長之節特頒在宥之恩於戲王者宅中夫豈甘心於逺狩皇天助順其將悔禍於交侵惟我二三之臣與夫億兆之衆亟攘外悔協濟中興金人攻和州知軍州事李儔叛附於金人李儔以和州投拜金人執儔於軍中計置渡采石江六日庚戌知太平州郭偉敗金人於采石再戰又敗之辛亥壬子日又戰又敗之金人攻采石渡知太平郭偉親率官軍將佐極力扞禦三日五戰皆捷金人退攻慈湖福山偉又與戰敗之金人乃趨馬家渡上自溫州來到越州思采石把江官兵推賞有差有官人各與轉兩官隆祐皇太后及六宫出洪州耿信友扈衛軍潰太后出洪州舟人耿信友楊惟忠全軍自潰其將司全胡友馬友楊臯趙方王璉柴卞傅選張擬九軍盡反劫奪宗廟六宫府庫一夕而盡韓世清敗劉忠于蘄州得偽柔福帝姬劉忠初聚兵於京東號花面獸其衆皆戴白氈笠又號曰氈笠劉忠勇鋭善戰金人既退京東忠乃侵淮西犯蘄州韓世清屯蘄州出兵與忠戰大破之其衆死亡者甚多乃漸入湖南世清奪得一婦人自稱是柔福帝姬小名環行第二十一小王娘之女也或報世清世清疑之乃請知州甄采同通判鈐轄具官裳立於庭坐柔福帝姬於堂上隔簾問之遂具説被虜及得脫之因具言被劉忠虜在軍中初遭劉忠無禮又被劉忠嫁與一押火及言昔時閣中官員姓名稍詳世清等信之遂改館焉蘄州具其事聞奏之知楚州趙立敗金人於淮隂領兵入楚州朝廷聞金人將謀深入乃召諸路以兵勤王保衛王室趙立方知徐州以徐州城孤且乏糧不可守乃率將兵及民兵約三萬趨行在是時知楚州劉誨被召命赴行在杜充以楚州缺知州且聞立率兵自徐來即劄付立俾知楚州使人迎立授之立至臨淮縣被充之命兼程至龜山金人聞立棄徐州而新知楚州以甲兵於淮隂邀截之立麾下皆謂金人方扼於淮隂而楚州不可往不如退還徐州立忿怒嚼其齒曰正要與金人相殺何謂金人扼路而楚州不可往乃令諸軍曰回顧者斬於是率將先登至淮隂與金人遇大戰四十里至楚州城下遂得以數千人入城而後軍孟成張廣皆以其所部渡河北去方其鏖戰也士卒有失仗者拔砌街磚相擊嶽廟磚街三里許皆為所拔立口中箭貫其兩頰帶箭入城口不能言以手指揮諸軍憩歇方定拔其箭議者謂自燕山之後南北戰爭未有如此之鏖戰者十三日丁巳杜充焚真州長蘆崇福禪院金人已入和州杜充命清野淮南添差建康府通判劉漢之獻議長蘆崇福院有屋二千間金人得之可以繫筏而渡當焚之充命統制伏之彥往焚燒長蘆崇福院院有重廟層閣金碧相輝映凡二千餘間禪剎之盛為淮間第一是時之彥屯於東陽被檄即以數舟載三百人自東陳口泝流而上至楊家洲有沿江巡檢王真下寨又有長蘆崇福禪院僧行數百人居民亦數百人雜居諸渚間真使人邀舟船問其軍分之彥對以準留守司檄備奉聖旨差諸統制伏之彥往焚燒長蘆崇福院僧行聞之已仰天號哭百姓亦哭之彥遂率真并土軍同行至長蘆鎮住持僧道林與知事迎接入院之彥具説燒焚之意道林曰物之興廢皆有其時成也毁也吾何容心哉乃對佛燒香之彥取檄就佛前宣掦僧行軍民皆哭之彥亦哭道林與之彥少坐之彥遣其衆取蘆柴於緊要下積堆凡二十四處道林亦遣僧行取庫錢三千餘緡投入井中又取金銀匣去之彥取責沿江巡檢司焚燒知委文狀具令申刻取火又徐徐至酉刻促放火二十四處火皆齊發昏黑時火焰亘天夜漏方半屋無大小已平塌矣是時驚移老小乘火而行翼旦寺基唯灰埃中有釘頭而已劉位知濠州知濠州孫逸赴建康稟議也杜充以濠州不可闕知州遂檄節制軍馬劉位俾知濠州位泗州招信人居於碑真素豪強為鄰里所推且宗族稍盛擾攘之際聚鄉民保守橫山分鄉民為軍使諸弟姪各統之是時西北衣冠與百姓奔赴東南者絡繹道路至有數十里或百餘里無舍煙者州縣無官司比比皆是盜賊艱辛之狀萬緒千般及入泗州境則聞招信劉家聚兵甚衆故流移之人渡江入招信投橫山為樂國而士大夫往往具刺敬謁于位賓客既多位見客亦有時每頥指其館穀之所於是狼狽而來者得以暫安而位亦漸漸尊崇矣所以招信劉家之名播於逺邇者蓋自流移士民唱之也杜充在建康以位為節制軍馬至是令位知濠州軍事陳邦光知建康府知建康府胡舜陟以金人勢逼乃求為浙西宣撫司參議官朝廷從之遂命陳邦光知建康府舜陟發建康之六日金人攻建康境是時韓世忠在鎮江府或執舜陟解送世忠者世忠責舜陟不合棄建康以陟縳於海船之桅檣既而聞之改差浙江宣撫司參議官乃放行金人陷臨江軍二十一日乙丑金人自馬家渡渡江統制陳淬被殺先是金人計置采石欲渡江為郭偉所拒遂趨馬家渡統制陳淬及金人戰於江上敗績淬被殺金人遂濟渡南岸無兵金人舟不多但無人迎敵致使渡長江如陷平地唯水軍統制邵青以一舟載十八人當金人於江中梢工張青者中十七矢遂退於竹篠渡遺史曰杜充聚諸軍在建康而沿江皆無備金人已渡乃命諸軍迎敵都統制王素驕奢不習軍事唯衙署以旌旗簇擁夸其榮貴身為大將無亡矢遺鏃之用率本軍先遁先是輔達在東陽被檄策應與達相遇於途中曰已失渡口遂以兵皆南奔自徽州入福建劉晏走毗陵韓世忠在鎮江以敵騎驍勇其鋒不可當乃率步卒航海以伺其隙二十三日丁卯杜充棄建康府渡江北走軍潰杜充在建康治兵專以殘殺為政斬人無虛日充聞金人已渡江諸軍潰散欲乘船出奔方開水門士庶舟船爭門擁隘不能出充使人諭之曰相公欲迎敵金人耳衆皆呼曰我亦去迎敵充不能行而止自是市井間喧騰言杜充相公枉斬了多少人及其驚急却欲先棄城走充聞之莫敢誰何乃命諸軍各人犒賞銀十兩絹十匹令諸軍皆往蔣山下寨是夜軍中不整人多夜呼質眀皆潰散到東陽諸軍爭入互相殺移時方定充渡江遁走宿州王進王冠猶以本部兵隨行至真州駐於天慶觀進冠不相協遂分為二充以軍不協回惶未有所向知真州向子忞勸充由通泰入城欲與之偕行充意在歸北故不從子忞知其意遂乘舟棄真州而去充檄冠知真州自為出陸計聲言往招信縣山寨合劉位人馬來殺金人乃出西門行至天長軍而去金人攻六安軍知軍邉某叛降於金人金人周太師已據夀春府乃命兵侵六安軍丁卯至城下知軍邉某迎降金人以趙團練者率北軍三百人屯城下不殺掠金人攻吉州知軍州事楊淵棄去楊淵聞金人至境即棄城去金人駐於城下不入城不甚虜掠金人攻袁州知軍州事王仲嶷叛附於金人三朝北盟會編卷一百三十四
