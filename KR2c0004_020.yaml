body:
  text: 三朝北盟㑹編卷二十宋徐夢莘撰政宣上帙起宣和七年正月二十日壬辰盡其日宣和七年正月二十日壬辰詔差奉議郎尚書司封員外郎許亢宗充賀大金皇帝登寳位國信使武義大夫廣南西路亷訪使者童緒副之管押禮物官鍾邦直宣和乙巳奉使行程錄曰金人既滅契丹遂與我為敵國依契丹舊例以講和好每嵗遣使除正旦生辰兩番永為常例外非常慶弔别論也甲辰年阿固達忽殂謝其弟烏竒邁嗣位差許亢宗充奉使賀登位並闗取奉使契丹條例案牘參詳増減遵守以行兼行人所須皆在京諸司百局應辦纎悉偹具無一闕者盡祖宗舊制也隨行三節人或自朝廷差或由本所辟除副外計八十人都轄一醫一隨行指使一譚語指使二禮物祗應二引接祗應三書表司二習馭直二職員二小底二親屬二龍衛虞侯六宣撫司十將一察視二節級二翰林二儀鸞司一太官局二駞務二槽頭一教駿三駿苑作匠一鞍轡庫子虎翼兵士五宣武兵士三十冗杖則有雜載車三雜載駞十粗細馬十二禮物則有御馬三塗金銀作鞍轡副之象牙玳瑁鞭各一塗金平級八角銀酒斛二隻盖杓全塗金平級八角銀瓶十隻盖全塗金大渾金香獅三隻座全着色綉衣三襲果子十小籠蜜煎十甕子茶三斤於乙巳年春正月戊戌陛辭翼日發行至當年秋八月甲辰回程到闗其行程本朝界内一千一百五十里二十二程更不詳叙今起自白溝契丹舊界止于金庭瑪哩巴納三千一百二十里計三十九程第二程至涿州古郡黄帝與蚩尤戰于涿鹿之野即此地昔為契丹南寨邊城樓壁僅存及郭藥師舉城内屬不經兵火人物富貴井邑繁庶近城有涿河朝李河合范河東流入海故謂之范陽第三程至良鄉縣地𨽻燕山府經兵火之後屋舍居民靡有孑遺帥臣復加修築樓壁煥然一新漸次歸業者數十家離縣三十里過蘆溝河水極湍激燕人每候水淺深置小橋以渡嵗以為常近年都水監輒于此壘兩岸造浮梁建龍祠官舍仿彿如黎陽三山制度以快耳目今覩費錢無慮數百萬緡第四程至燕山府府乃冀州之地舜以兾州南北廣逺分置幽州以其地在北方取其隂幽肅殺之義杜牧言之畧矣東有朝鮮遼東北有樓煩白檀西有雲中九原南有滹沱易水唐有范陽節度臨制奚契丹自晉割賂北主建為南京析津府壬寅年冬金人之師過居庸闗契丹棄城而遁金人以朝廷嘗遣使海上約許増嵗幣癸卯年春歸我版圖更名府曰燕山軍額曰永清城周圍二十七里樓壁共四十尺樓計九百一十座地塹三重城開八門已遷徙者尋皆歸業户口安堵人物繁庶大康廣陌皆有條理州宅用契丹舊内壯麗敻絶地北有互市陸海百貨萃于其中僧居佛宇冠于北方錦綉組綺精絶天下膏腴蔬蓏果實稻粱之類靡不畢出而桑柘麻麥羊豕雉兎不問可知水甘土厚人多技藝民尚氣節秀者則力學讀書次則習騎射耐勞苦未割弃以前其中人與契丹鬬勝負不相當城後逺望數十里間燕然一帶回環繚繞形勢雄傑真用武之國司明四鎮皆不及也第五程至潞縣是嵗燕山大饑父母食其子至有病死屍挿紙標於市人售之以為食錢粮金帛率以供常勝軍帥之牙兵皆骨立而戍兵饑死者皆十七八上下相䝉上弗聞之宣撫使王安中方獻羡餘四十萬緡為自安計後奉朝廷令度支􅒩太倉粳米五十萬石自京沿大河由保信沙塘入潞河以贍燕軍四程至此已見舳艫銜尾􅋈萬艘于水潞河在縣東半里許曹撡征烏桓蹋頓袁尚等鑿渠自滹沱由派水入潞河以䕶轉輸即此地第七程至薊州第八程至玉田縣縣之東北去景州一百二十里自甲辰年金人及奚人直入城俘掠毎邉人告急宣撫使王安中則戒之曰莫生事四月之内凡三来盡屠軍兵一火而去安中即創新築此城改為涇州第十程至金界清州出城東行十里至金人所立新地界並無溝塹惟以兩小津堠髙三尺許其兩界外東西間約一里内兩界人户不得耕種行人並依奉使契丹條例所至州縣備車馬䕶送至界首前期具國信使副職位姓名闗牒金界備車馬人夫以待金人亦如期差接伴使副于界首伺候兩界各有幕次行人先令引接賫國信使副門狀過彼彼亦令人引接以接伴使副門狀回示仍請過界于例三請方上馬各于兩界心對馬立引接互呈門状各舉鞭虚揖如儀以次行馬四十里至清州㑹食各相勞問州原是石城縣金人新改是名以兵火之後居民百餘家是晚酒五行進飯飯用粟抄以匕别置粥一盂抄以小杓與飯同下好研芥子和醋拌肉食心血臓瀹羮芼以韮菜辛辣不甚可口而彼中酷嗜之器無陶埴惟以木刓為盂楪髹之以漆以貯食物自此以東西遇館頓或遇宿程其供應人並于所至處旋于居民漢兒内選衣服鮮明者為之每遇迎送我使則自彼國給銀牌入而行又舘于州宅古屋十數楹庭有大木數十株枯腐蔽野滿目凄凉使人有弔古悼亡之悲州之北六七里間有大山數十其來甚逺髙下皆石不産草木峙立州後若營衛然恐州以此得名而前人謂地當營室故名曰營第十四程至閏州離州東行六十里至榆闗並無保障但存遺址有居民三數家登髙四望東自碣石西徹五臺幽州之地沃野千里北限大山重巒複嶂中有五闗居庸可以行大車通轉餉松亭金岥古北口止通人馬不可行車外有十八小路盡兎徑鳥道止能通人不可行馬山之南地則五穀百果良材美木無所不有出闗來才數十里則山童水濁皆瘠鹵彌望黄茅白草莫知亘極豈天設此限南北也外蕃自古為患則多雲中鴈門未嘗有自漁陽上谷而至者昔自石晉割弃契丹以此控制我朝第以社稷威靈祖宗功徳保守信誓而契丹無得以肆其毒爾前此經營邊事與金人嵗幣加契丹之倍以買幽薊五州之地而平灤營三州不預其數是五闗我得其三而金人得其二也愚以為天下視燕為北門失幽薊五州之地則天下常不安幽燕視五闗為喉襟無五闗則幽燕不可守五闗雖得其三縱藥師不叛而邊患亦終無寧嵗也比來言者論列當時主議大臣有云以營平檀灤要害控扼之地捐之金人彼得其强我得其弱葢指此也出榆闗以東山川風物與中國殊異所謂州者當契丹全盛時但土城存居民數千百家及官舍三數椽不及中朝一大縣强名為州經兵火之後愈更蕭然自兹以東𩔖皆如此第十六程至習州過州東門外十數步即古長城所築遺址宛然第二十程至錦州自出榆闗東行路平如掌至此㣲有登陟經由十三山下歐陽文忠叙胡嶠所説十三山即此第二十二程至顯州出榆闗以東行南瀕海而北限大山盡皆戴石不毛至此山忽峭㧞摩空蒼翠萬仭全類江左乃醫巫閭山也成周之時幽州以醫巫閭作鎮其逺如此契丹原欲葬于此山離州七里别建乾州以奉陵寢今盡為金人毁廢第二十四程至梁魚務有河名曰遼河南北千餘里東西二百里地如此遼河居其中隋唐征髙麗路經由此第二十五程至摩綽貝勒寨摩綽小名貝勒漢語為官人第二十七程至興州自過遼河以東即古之遼東地金人方戰爭之際首得遼東五十一州之地乃契丹按巴堅破渤海國建為東京路也第二十八程至咸州未至州一里許有幕屋數間供帳畧偹州守出迎禮儀如制就坐樂作有腰鼓蘆管笛琵琶方響筝笙􅌙箜篌大鼓拍板曲調與中朝一同但腰鼓下手太濶聲遂下而管瑟聲髙韻多不合每拍聲後繼一小聲舞者六七十人但如常服出手袖外回旋曲折莫知起止甚覺可觀也酒五行樂作迎歸舘老幼夾觀填溢道路次日早有中使撫問别一使賜酒果又一使賜宴赴州宅就坐樂作酒九行果子唯松子等類彼中飲酒食肉不隨盞下俟酒畢隨粥飯一發致前鋪滿几案地少羊唯猪鹿兎鴈饅頭炊餅白熟湯餅之類最重油煮麵食以蜜塗拌名曰茶食非厚意不設以極肥猪肉或脂闊切大片一小盤子虚裝架起間挿青葱三數莖名曰肉盤子非大宴不設人各携歸舍金人每賜行人宴必以貴臣押伴貴臣以酒輒大言詫金人之强控弦百萬無敵于天下使長應之曰宋有天下二百年幅員三萬里勁兵數百萬豈為弱耶某銜命逺來賀大金皇帝登寳位而大金皇帝止令太尉來伴行人酒食何嘗令大言以相罔也辭色俱厲金人壯之不復措一辭又賜宴畢例有謝表有曰祗造鄰邦中使讀之曰使人輕我大金國語云蠻貊之邦表辭不當用邦字請重換方肯持去使長正色而言曰書謂協和萬邦克勤于邦詩謂周雖舊邦論語謂至於他邦問人于他邦善人為邦一言興邦此皆邦字而中使何獨至誦此一句以相問也表不可換須到闕下當與大金皇帝理㑹中使無言金人無以荅使長許亢宗饒之樂平人以才被選為人醖藉似不能言者臨事敢發如此金人頗壯之第二十九程至同州州地平壤居民所在聚落耕種殆遍地宜穄黍乃金人破契丹國于所至處遷其民于此嵗久安居東望大山金人云此新羅山山内深逺無路可行其間出人參白附深處與髙麗接界第三十二程至黄龍府契丹按巴堅初攻渤海射黄龍于此地即建為府是日州守迎迓如儀有使撫問賜果酒賜宴于威州制第三十三程至托蘓貝勒寨寨為契丹東寨當契丹强盛之時擄獲異國人則遷徙於此雜處南有渤海北有鐡離吐渾東南有髙麗韎鞨有金國室韋北有烏舍西北有契丹回紇党項西南有奚故此地雜諸國風俗凡聚㑹處諸國人語言不能相通曉則各為漢語以證方能辨是知彼固被服先王之禮義而應對亦以華言為證也第三十五程至呼勒希貝勒寨寨枕混同江濵其源來自廣漠之北逺不可究自此有南流五百里接髙麗鴨綠江入海江面濶可半里許寨前髙岸有柳數十株設行人幕㡩于下金人太師李靖居于是第三十六程至矩古貝勒寨自北而南莫知逺近界隔甚明乃契丹昔與金人兩國古界也界八十里直至拉林河行終日之内山無一寸木地不産泉人携水以行豈天以此限兩國而豪强互相吞噬乎矩古寨自北以東數處原隰間盡金家人更無他部無市井賣買不用錢惟以物相貿易第三十九程至舘行三十里烏舎郎君宅接伴使副具狀詞舘伴使副于此相見如接伴禮金人每差接伴舘伴送伴客省使必于女真渤海契丹内人物俊偉詳緩解漢語者為之副使則選漢兒讀書者為之復有中使撫問賜酒果賜宴並如常儀畢又行三十里至舘舘唯茅舍三十餘間墻壁全宻堂室如㡩幕寢榻皆土牀鋪厚氊褥及錦綉貂鼠皮大枕頭等以女真兵數十人佩刀執弓矢守䕶甚嚴去金庭尚十里餘次日賜酒果至晩閣門使躬來説議約翌日赴金庭朝見次日舘伴副同行馬可六七里一望平原曠野間有民居數十百家星羅碁布望衡對宇甚有倫次更無城郭里巷率皆背隂向陽便于牧放自在散居又一二里命撒傘云近闕復北行百餘步有阜宿圍繞三四頃北髙丈餘云皇城也至宿圍門就龍臺下馬下行入宿圍西西設氊帳四座各歸帳歇定客省使副使相見就坐酒三行少頃聞鞞鼓聲入歌引三奏樂作各門使祗班引入即捧國書自山棚東入陳禮物于庭下傳進如儀贊通拜舞抃蹈訖使副上殿女真首領數十人班于西廂以次拜訖貴近者各百餘人上殿以次就座餘並退其山棚左曰桃源洞右曰紫極洞中作大牌題曰翠㣲宫髙五七丈以五色綵間結山石及仙佛龍像之形雜以松栢枝以數人能為禽鳴者吟呌山内木建殿七間甚壯未結葢以瓦仰鋪及泥補之以木為鴟吻及屋脊用墨下鋪帷幕牓額曰乾元殿堦髙四尺許堦土壇方濶數丈名曰龍墀兩廂旋結架小葦屋幕以青幕以座三節人殿内以女真兵數十人分兩壁立各持長柄小骨朶以為儀衛日役數千人興築已架屋數千百間未就規模亦甚偉也金主所坐若今之講坐者施重䄄頭裹皂頭巾帶後垂若今之進賢冠者玉束帶貌甚偉薄髯可三十七八許人前施朱漆銀裝鍍金几案果楪以玉酒器以金食器以玳瑁匙筯以象齒遇食時數𨽻人擡舁十數鼎鑊至前雜手旋切割鬭飣以進名曰御厨宴所食物與前敘畧同但差精細而味和耳食餘頒以散三節人樂如前所敘但人數多至二百人云乃舊契丹教坊四部也每樂作必以十數人髙歌以齊管色聲出衆樂之表此為異爾酒五行食畢各賜襲袍帶使副以金餘人以銀謝畢歸館次日有中使賜酒果復賜餼賜餼以絹帛充于使副百餘疋餘人十餘匹次日詣金庭赴花宴並如儀酒三行則樂作鳴鉦擊鼓百戲出場有大旗獅豹刀牌牙鼓踏曉踏索上竿斗跳丸弄撾簸築旗毬角抵鬬雞雜劇等服色鮮明頗類中朝又有五六婦人塗丹粉艷衣立于百戲後各持兩鏡髙下其手鏡光閃爍如祠廟所畫電母此為異爾酒五行各起就帳戴色絹花各二十餘枚謝罷復坐酒三行歸館次日又有中使賜果酒復有貴臣就賜兼伴射于宫内庭下設垜樂作酒三行伴射貴臣館伴使副國信副離席就三矢弓弩從便用勝負各有差就賜襲衣鞍馬是日金人名王貴臣多微服隠稠人中以觀射次日朝辭如見時酒食畢就殿上請國書捧下殿賜使副襲衣物帛鞍馬三節人雜物帛各有差拜辭歸館鋪掛綵燈百十餘為芙蓉鵝雁之形蠟炬十數雜以管絃為堂上樂館伴使副過位召國信使副為惜别之會名曰換衣燈宴酒三行各出衣服三數件或幣帛交遺常相聚惟勸酒食不敢多言至此夜語笑甚款不記巡以醉為度皆舊例也次日囘程起發至烏舎郎君宅館伴使副展狀辭送使副于此相見如儀有中使撫問賜酒果如來時至信州灤州同此回程在路更不再敘至青州將出界送伴使副夜具酒食亦為惜别之會亦出衣服三數件或幣帛交遺情意甚懃次早發行至界有幕次下馬而望我界旗幟甲馬車輿㡩幕以待人皆有喜色少停樂作酒三行上馬復同送伴使副過我幕次作樂酒五行上馬復送至兩界中彼此使副回馬對立馬上一盃換所執鞭以為異日之計引接展辭狀舉鞭揖則各回馬背馬回顧少頃進數步躊躇為不忍别之狀如是者三乃行是行回程見敵中已轉糧發兵接跡而來移駐南邊而漢兒亦累累詳言其將起兵是時行人旦暮憂其有質留之患偶幸生還既回關以前此有御筆指揮敢妄言邊事者流三千里罰錢三千貫不以赦䕃減繇是無敢言者是秋八月初五日到闕三朝北盟㑹編卷二十
