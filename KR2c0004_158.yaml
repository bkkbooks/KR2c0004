body:
  text: 三朝北盟會編卷一百五十八宋徐夢莘撰炎興下帙起紹興四年三月十七日丁卯盡四月四日癸未十七日丁卯張浚落資政殿大學士依已降指揮宮觀臣僚上言切讀臣僚章疏論列張浚罪狀非一致有跋扈不臣之迹臣愚伏望陛下將所除張浚資政殿大學士指揮特賜寵罷候敕旨三月十七日三省同奉聖旨張浚落資政殿大學士依已降指揮宫觀落資政殿大學士告詞敕授鉞專征宜懋圖功之略喪師失律難逃誤國之刑矧衆積于罪尤致深駭于聞聽大臣乃爾公議謂何張浚早以時才幸蒙器使亟躋榮于仕路遂集長于本兵權貽竊位之譏首建興戎之議旋分權于帥閫缺二字寬西顧之憂乃玩敵于邉陲因以召南侵之侮輕失五路坐困四川兵潰莫收怨結于下始嫁敗亡之禍斬將及于無辜繼陳克復之功露章輕以罔上假便宜行事之勢忘人臣無將之嫌省內閣以招賢擬尚方而刻印敢行赦宥仍擅恩封朕將略其不貸之愆以盡曲全之意肆加嚴召輒慢令以辭行仰冀要權猶括民而求媚妄作至此夫誰可欺俾遂釋于樞機且務全于體貌彈章薦至寵典難私其鎸祕殿之華往即貢祠之逸昔髙宗鬼方之伐戒勿用于小人而王恢馬邑之謀罪必加于戎首今朕為汝特屈常刑尚服寬恩無忘省咎可落資政殿大學士依舊宮祠尚書省劄子臣僚上言竊聞近者三省初畫降聖旨張浚除資政殿大學士提舉臨安府洞霄宮任便居住續有旨落職依舊宫觀外廷傳播誠未厭服蓋人君所倚以為輕重者大臣也百官所視以為表儀者大臣也大臣而有不臣之迹將無以訓迪在位百執而於堂陛之嚴尤不可不戒也况今日危難之時乎臣謂君臣之道施報而已使臣以禮者君之所以施也事君以忠者臣之所當報也施而不報是不忠也臣而不忠是不臣也况為大臣乎陛下擢浚而不次用之付與之權幾半天下施人之禮可謂厚矣浚之敗事誤國報稱蔑然浚若知有朝廷則必畏懼循省求為補過之實乃復跋扈見于不臣之迹日甚一日前此銜冤抱恨投匭于陛下之前者無慮數千萬言皆陛下所詳知臣故不更詳言之也為大臣而不知有朝廷其不臣莫大焉臣尚意浚至國門之外必俯伏待罪豈有面目敢近清光不謂其狠傲不恤偃蹇自如遂安厥位逮臣與常同録曰章疏以示之後方具請已而不甘聽朝廷行遣指揮忿然即行觀其造朝尚敢如此陛下雖容恕公議之所不容也公議可畏臣其可但已也陛下方開公道明賞罰若浚之臣不竄之嶺表不足以塞公議宮祠自便所至必有以動搖人心者為害非一臣愚望欲聖斷早賜睿旨施行伏候敕旨臣僚上言臣嘗觀舜去四凶而共工歡兜三苖曰流之放之竄之而已至鯀則曰殛之蓋鯀平水土九載績用勿成誤及天下非若共工之象恭歡兜之朋黨三苗之叨餮而已此罪所以獨重也恭惟國家渡江以來雖為削弱然秦根本之地尚存也陛下付張浚樞柄之重假以便宜之權自關以外使浚專之其委任之意豈特使浚保守川陜而已哉蓋欲壯根本之勢漸圖經制兩河以復中原也浚既不能謹守尚存之地乃舉三十萬之衆一旦委之敵人盡失五路遂使敵騎乘勝長驅侵犯川蜀浚方引兵退處安穩之地殘虐四川為刺膚錐髓之橫斂受命五路所失地土人民甲兵財物不知幾百萬豈特九載績用弗成而已乎浚之一身何足以謝川陜生靈哉若其輕率妄作僭傲不恭之事則臣前章已具奏陳更不煩瀆聖聰自陛下灼知其罪命使代之召浚還朝天下孰不企望公朝明正典刑投之蠻荒以禦魑魅今尚祠館優秩安居便地誠未足以厭服公論欲望睿斷不疑謫浚散官竄之嶺表以為誤國之戒以慰天下之望伏候敕旨貼黃稱契勘昨來敵騎渡江滕康劉珏以措置乖方尚猶謫授分司之官湖南拘住今浚之罪百倍康珏欲望睿明比照輕重施行二十一日辛未張浚福州居住仍令本州撥借官田一十頃臣僚上言近者三上章論列張浚敗師誤國不臣跋扈等事陛下罷浚樞密府落浚職名初若欲正浚之罪以示天下而聖慈寬貸聖恕包容格屈邦憲未厭公論蓋祿以祠宫處之善地皆非浚所當得者乃復給借官田以繼其富是以賞之臣所未喻也浚之敗師誤國舉五路而棄之雖身膏斧鉞不足以謝平三十萬之衆浚之不臣跋扈不知有朝廷雖投卑魑魅不足以快忠臣義士之憤若浚之罪無可矜者今縱已廢示不復用然川陜之人自聞浚還朝朝夕反側視浚之去留與夫得罪之輕重以為安危則浚之竄殛其可緩邪五路叛師初非得已若正浚之罪則叛兵歸順不約而同四川貧民不堪斂取之酷恨不食其肉若正浚之罪則逺情慰安不戒而孚朝廷以浚之所以得罪之因明正典刑以播告之亟遣使懷詔撫諭正今日之罪前此浚以還朝為名遲回逾年竭四川公私之財以歸助行在軍須之費其實自為身謀厚啖一行官吏士卒以買其情口食犒設賜豫之類無藝往往錢物不明不可稽考原浚之設心尤可罪也逮兹去位聞有戀戀泣涕唱為不平之語者浚之門下黨與有力焉臣謂祿以祠宫處之善地加之撥借官田川陜傳播豈不搖動朝廷播告之意臣愚欲望聖斷早賜睿旨改正取進止三月二十八日同奉聖旨前降借撥官田指揮更不施行四月一日庚辰朔劉子羽落職差提舉江州太平觀任便居住尚書省札子臣僚上言近論列知樞密院張浚昨宣撫處置川陜等路喪師失地敗事誤國已降指揮落職宮祠令於福州居住陛下厚恩特寬典憲臣聞浚所引以參軍事者皆妄庸小人而專橫之甚衆所切齒者唯劉子羽未見施行臣不得不論子羽天資險佞有以媚浚故見信任凡浚過惡皆子羽助成之秦蜀之民欲食其肉頃者富平之舉諸路將帥多以為未可子羽弗思金人詭詐不測輕聽間探斷然自以不疑卒至覆軍使五路生靈肝腦塗地全秦之失子羽之謀也富平既敗浚獨罪趙哲為不用命已斬哲後知其失出榜盡釋其餘將佐之罪子羽至鳳翔不以為然復欲斬慕洧及其次統領諸將而下人人恐懼相率叛亡子羽所致也五路既失浚退歸閬州令王庶知興元府庶措置稍就緒子羽欲得之因而譖毁卒奪其任陜西叛將聞子羽至必欲殺而後已誘金人併力以攻遂破興元朝廷差王似盧法原為宣撫副使子羽乃于浚求宣撫判官隂奪二副使之權事無大小子羽專之浚已有施行者子羽輒塗抹改易官吏畏其氣焰敢不稟承浚亦為其所脅持不復敢誰何以士大夫所言子羽之罪擢髮不足數未有可與子羽同科者自降指揮發來赴行在領鋭卒以歸建州之崇安縣蓋其鄉里及聞浚到即出迎于信州今乃稱疾不至為人臣偃蹇不恭慢侮有如是者乎不正明刑曷慰公議伏望睿斷早賜竄殛少快秦蜀將士軍民怨憤之氣取進止四月一日三省同奉聖旨劉子羽落職差提舉江州太平觀任便居住又臣僚上言臣聞惟辟作威所以御世若其施之或輕或重失其當則不足以為御世之術必考核其實置諸典刑參合公論厭服人心然後為稱故其威罰之行足以使人震恐莫不懲革當舜之時四罪而天下咸服蓋出於此臣切見頃年張浚宣撫川陜而幕府用事所言皆聽莫如子羽一介小人愚懵無識輕躁寡謀強愎自用專主軍職昧金人之詭計贊富平之大舉喪敗師徒十餘萬衆其罪一也隂懷私怨力沮曲端出竒之䇿妨功害能掩蔽趙哲鏖戰之勳恥已謀之貽敗規移咎于他人既斬趙哲復害曲端冤陷二人一方怨怒其罪二也妄殺二將已失人心仍肆讒誣淫刑以逞其他將士日虞濫及懷不自安率衆叛去致我師携二敵勢日張全陜之境不復能保其罪三也子羽被旨召赴行在不奉君命徑歸里地獨至上饒迎迓張浚全無人臣之禮其罪四也夫秦蜀禍敗不可勝言推其所自子羽實為之首今因臣寮論列止于落職宮祠揆之典憲是為失刑士論人心皆未允愜伏望聖慈特加睿斷盡削子羽官資流竄遐荒以謝一方少伸將士之怨憤庶收既失之人心以為天下臣子之戒伏候敕旨四日癸未劉子羽責授單州團練副使白州安置臣僚上言伏覩陛下奮發英斷罷黜張浚以正誤國之罪中外傳説孰不欣快臣嘗考之公論以謂浚之所行皆屬官劉子羽程唐馮康國為之謀康國雖已蒙放罷而子羽尚為寶文閣直學士程唐為寶文閣學士知瀘州其罪在康國之上臣豈不論也子羽凶暴殘刻敢於為惡首倡富平之議遂致全秦之失浚殺趙哲曲端謀皆出于子羽端哲既死浚猶出黃榜安慰諸將而子羽獨于軍衆之前詈辱畨將慕洧及曲端部曲張中寧等恐以軍法洧等不堪愧抑遂降偽境子羽在浚幕中最為橫恣雖浚之氣焰亦畏其挾持莫敢誰何川陜之人切齒恨怨願甘心焉子羽既知敗事必得罪朝廷即遣其壻捆載順流而下及被召命乘舟出峽又携髙資與姬妾數人遽陸先歸福建安居至日聞浚至撫州自數境來迎于路已而復歸至今不至行在人臣有敢倣慢不恭如此迹其用心視朝廷為何如哉唐本成都富人方其欲事童貫天聖中乞憐于貫之門媪因得見于庭方貫抗禮坐于其側飲以巵酒若飼奴僕然唐不耻也因獻渾金佛羅漢像一堂得成都府路提舉茶馬唐既出貫門下遂遣二使臣創第于貫之宅前盡蓄珍竒玩好之物伺貫意旨即以獻納貫嘗築一堂生日落成之日唐為製錦繡帟幕地衣依堂之大小髙下曲折因為壽而獻焉凡此所費悉出于茶馬司侵盜之弊實自唐始又其狂妄之性與浚契合故浚喜之用為幕官同惡相濟遂致誤國今罪狀敗露猶為瀘南之帥輕率生事豈不致冦浚之處唐唐之自處則善矣奈朝廷何奈生靈何二人之罪狼藉貫盈若以常法止從褫職斥罷恐不足以為小人之戒欲望英斷特賜貶竄施行而子羽比之程唐其罪尤重陛下寬仁縱不欲明賜誅夷乞流竄海島以示國威天下幸甚取進止四月四日三省同奉聖旨劉子羽責授單州團練副使白州安置張栻為公墓志曰太上帝即位二年張忠獻公領川陜宣撫處置使遂辟公參議軍事公雅志欲圖敵念關陜要地而張公一見相知非偶然者遂不辭而從宣撫司至關據秦州號令五路會聞敵窺江淮議為牽制合五路兵進至富平與敵遇我衆不能支敵乘勝而前宣撫司退保蜀口官屬震恐有建議當保夔州者公曰議者可斬也宣撫司豈可過興州一步係關陜之望安全蜀之心收散亡固壁壘以為後圖則可與張公意合公單騎直抵秦州分遣腹心訪諸將所在時敵騎四出道阻不通將士無所歸忽聞公在近宣撫司留蜀口乃各引所部來會軍復振公命騎將吳玠柵和尚原守大散關敵不敢犯紹興元年夏始聚兵來攻玠敗之秋復來又大敗之俘獲以數萬計宣撫司徙治閬中公留關外護軍明年玠以秦鳳路經略使戍河池王彥以金均房鎮撫使戍金州二鎮皆飢而興元帥過為守備計閉關塞堡二鎮病之張公亟召玠彥議事皆願得公鎮興元乃稱制拜公利州路經略使兼知興元府公至之日盡弛其禁通商輸粟二鎮乃安謂敵用騎兵利沖突在我當先柵要地以徑弓弩待之蔑不濟者且以是約二將獨彥頗易公之説是嵗十二月敵由商於犯金州正月至上津彥出不意逆戰不能却遂焚金州退保石泉公遣將馳告玠玠曰事迫矣當急邀于險諸將不能辦我當自行不然且負劉待制即越境馳一日夜三百里中少止以公遺書曰敵旦夕至饒風嶺下不急守此是無蜀也公不前某當往玠即復馳至饒風嶺敵急攻數日死傷如積更募死士犯祖溪關以入繞出玠後玠還漢中公與玠謀守定軍山玠憚之遂西公退守三泉從兵不及三百與士卒同粗糲至取草木芽蘖食之遺玠書曰某誓於此死與公決矣玠得書泣其愛將楊政大呼軍門曰節使不可負待制不然政輩亦舍節使去玠乃從麾下自仙人關由間道與公會于三泉敵遊騎甚迫玠夜視公方酣寢旁無警呵者玠曰此何等時而簡易乃爾公慨然曰吾死命也夫何言玠泣乃復往守仙人關公獨為壁壘于潭毒山上十六日而成又數日而敵至中夜斥堠將遣人報曰敵至矣諸將皆失色入白事公曰始與公等云今日敵至欲避下令蓐食遲明上馬先止戰地據山角坐胡床諸將奔至皆泣曰此某等駐軍處而公先之耶豈可使敵矢傷公即爭代公處之頃之復有來報曰敵退矣乃還入梁洋蜀大震宣撫司官屬爭咎公有為浮言相恐動請徙治潼川軍士聞者皆怒公力為書為張公言某在此敵決不能越無為輕動搖張公用公言乃定敵遣十五輩賫書與旗來招公及玠公斬其十四人令一人還曰為我言于爾帥來戰即來戰我有死何招也先是梁洋官司之積公悉已徙置敵無所得糧日匱前後苦攻死傷十五六涉春已深癘疫且作遂遁去為我師掩擊及墮溪谷死者不可勝計敵之去四月也其餘衆不能自拔者悉降凡十數柵敵之喪失莫甚于此役方是時金大帥薩里罕烏珠輩近于蜀日夜聚謀其選士卒千取百百取十其戰被重鎧登山攻險每一人前輒二人擁其後前者死後被其甲以進又死則又代之如初其為必取計蓋如此惟公與張公協心戮力以身當兵沖將士視公感激爭忿卒全蜀境公還興元乃遣官吏安集勞來凡潰卒之乘時怙亂山谷間者悉捕以徇自是兵勢日振方便恢逺略然張公已困于讒公亦被罪矣是嵗除寶文閣直學士和議成公謂宜及無事時講修淮漢守備勵器械治舟楫其言甚悉宰相秦檜忌之諷言者論罷復以祠祿歸追復趙哲官告詞敕曰朕惟公道未開私議相勝橫逆之至非口舌所能爭是非之分及成敗而後定念折衝之故將久稱屈于師言宜復崇階用光幽壤故親衛大夫明州觀察使趙哲學通三略智過萬人早持使節之華屢啓戎行之乘屬權臣之用事敢專殺以肆威壯士欲言悵滕公之不見百身願贖賦黃烏以增悲其還橫列之名用假廉平之重庶幾精爽尚克歆承可特追復親衛大夫明州觀察使張浚奏乞斥逺公議行狀曰公時以赴福州居住知敵既釋川陜之患必將復萃師東南不敢以得罪逺去而不言且是時朝廷已盛講和好之議乃具奏曰臣切觀金人情狀專以和議誤我亦云久矣彼勢促則言和勢盛則復肆前後一輒姑請以近事明之紹興三年秋尼堪有親冦蜀之意先遣王倫還朝且致勤懇蓋懼朝廷大兵乘彼虛隙又其為劉豫之計至委曲周悉也自後九月余覩作難前謀遂寢至十二月余覩之難稍怠則復大集畨漢之衆徑造梁洋是時朝廷已遣致堯出使矣次年二月敵困饒風進退未遑先是朝廷開都督府議遣韓世忠直抵泗州金實畏之於四月遣致堯還其詞婉順欲邀大臣共議此非無所忌憚而然也梁洋之冦未能出境至五月而後得歸既狼狽矣而世忠大兵尋復撤行金之氣力固已復蘇而叛豫之心亦云紓緩所以前日使人之來來請不一故為難從之事也切惟此敵傾我社稷壞我陵寢邀我二帝驅我宗室百官自謂怨隙至深其朝夕謀我者不遺餘力矣况劉豫介然處于中其勢不兩立必求援于金借使暫和心必未已數年之內指摘他故豈無用兵之詞而我之士卒多中原之人謂和議已定不復進取將解體思歸矣若謂今日不得已而與之通使為陛下之權敵亦固能用權也願陛下蚤夜深思益為備具處將士家屬於積粟至安之地使出為戰守者無返顧奔散之憂精擇竒才以撫川陜之師使積年迍邅者無懈惰懷望之意江淮川陕互為牽制斥逺和議用積大業臣奉使川陜切見主兵官除吳玠王彥關師古纍經拔擢備見可任外其餘人才尚衆謹開具如吳璘楊政可統大兵田晟可統總一路王宗尹王喜王彥可為統制後皆有聲時服公知人吳玠克秦鳳隴州初六日吳玠及烏珠戰于鳳州初七日又戰王師皆勝遂收復秦鳳隴州吳玠改授定國將軍節度使川陜宣撫處置副使知壽春府羅興以其府叛附于劉豫三朝北盟會編卷一百五十八
