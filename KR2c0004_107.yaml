body:
  text: 三朝北盟㑹編卷一百七宋徐夢莘撰炎興下帙起建炎元年六月五日癸亥盡七日乙丑又同何志同等差人押李恭佐狀曰責到翰林書藝局著緣藝學李恭佐於二月初五日大金軍前取出青城見說初六日册立張邦昌右子嵩等世受國恩叨冒從列聞上件稱說痛徹肝心不免差遣承事郎徐文忠從事郎范塤躬親管押李恭佐一名前詣大元帥府伏望王慈詳李恭佐等所及乞引至帳子細詢問深惟宗社之重日下進發大軍移屯南京仍乞選將命帥提精兵要擊河北迎請二聖還闕兼契勘南京係興王之地鴻慶宫神御所在可以號召四方子嵩等見一面㑹議各發間探合軍前進至城下誅逆迤邐前詣大元帥府軍前躬聽處分小貼子子嵩等竊惟國家之制親王素無握兵在外者主上特付大王以大元帥之府此殆天意今王室危難若非大王深念宗社大計仰副二聖付屬之意稍有猶豫則事去矣兼恐四方奸雄乘變而起卒難平定欲望大王遵用故事以天下兵馬大元帥承制號召四方旬日之間可𫝊檄而定又小帖子契勘南京汴水通流發運使向子諲已到水城方孟卿亦在泗州伏乞劄付逐官雇促糧運至南京應辦大軍又小帖子徐文忠李恭佐久在敵寨偹知敵情范塤故學士范鎮之孫忠義世家伏乞親行詢問又同何志同翁彥國申乞用傅亮狀曰右子嵩等切見通直郎傅亮生於西陲習知兵事昨自金人侵擾亮數上書計䇿朝廷召對未上殿間報罷亮還關中久之聖上思其所陳復遣觀察使韓膺乘驛求訪洎亮承命赴闕至陜州金人已圍京城間關脫身至京城遂與士民建義勤王兩月之間其衆大集某等見其治軍紀律精明計議詳審各以兵委之統制亮忠憤慷慨受之不辭見今進入京畿方今朝廷命令隔絶國事危急如亮人才誠為時而生但名位至卑恐未足以鎮服諸將伏望大元帥大王特賜詳酌與近上一職名使其人知大王深念宗社之憂以得士為急務益加感勵趣立大功以報朝廷又同何志同等繳元青狀據河北統制官趙扆解到京師百姓元青一名責到狀說金人國相立張相公做官家呼為大楚皇帝待要遷都江陵右子嵩等契勘今來元青供狀比李恭佐等所述尤更詳細萬一是實即國事危急當如救焚拯溺不可少緩所有遣范塤徐文忠賫狀申陳切慮道路艱難不以時達兼恐王府未見得所供事狀之詳伏望大元帥大王深以宗社為念詳酌某等前後所陳立賜裁斷早移行府號令天下若更遲留竊慮逆臣盡以中原賂敵移據江東形勝之地自保家族根本一去即與興復王室事勢轉難又遣閻真札子子嵩近兩具札子又與何志同翁彥國同兩遣屬官徐文忠范塤及使臣鄭實等四次申禀幾事必呈達王府某荷國厚恩䝉太上皇擢在從班付以藩封二年守禦竭力盡智粗免狼狽今親見國難如此未知死所勢須不避誅責以祗膺上命不復以一身禍福利害為慮所申陳似無可疑今日又得逃歸者三人大槩不异而親賢宅七少保孝恍不樂同親被開封府引勾出令隨本官北去其人在奉先寺十餘日逃歸稱凡親王宗室公卿皆大尹徐秉哲勾追赴敵寨宗室逃在民間者差捉事喬姓人搜捉必獲又有淮寧府百姓蔣德逃歸稱城上城下並無金人自三月二十九日去盡見有官員打青繖在城上差兵出城剗城外慢道城盡閉諸門未搭壕橋以子嵩觀之即是逆賊以為固守之計若更遲疑必失機㑹某除已遣陳輿一軍入咸平趙扆一軍入鄢陵及㑹合翁彥國前軍與何志同秦州等軍差傅亮充都統制初四日以離本府前去入衛如到近城見到端的即一面討逆子嵩愚見以謂兵法先聲而後實用力不如用智今逆賊盜據勢不自營閉門剗城必自恃金援復遣輕兵或已留兵在城裡伏乞速下明令差敢死之士前去京城招諭臣庶有能執賊以城歸者酬以重賞兼聞左言作樞密范瓊作殿帥可說諭二人轉禍為福以先聲壓之以智謀壞之則不戰而自平子嵩又思萬一逆賊詭計遣使奉大王亦乞審處未可班師按軍近甸號召諸路之兵進討凶逆喻使自縛遣上將清宫然後入謁廟社迎請二聖以展孝道承制賞罰以繫人心强敵聞之自應膽落小帖子某聞賊臣懇於金人乞留兵衛或擁兵而南奔或詐稱兩宫以惑四方尤不可不防乞速賜戒約州縣併力誅討又繳元祐皇后册文狀曰右子嵩等今月初六初七初八日莭次據出京人及淮寧府寄居官收接家書並稱京師已迎請元祐皇后入宫并曽於太廟行禮又遣使詣大元帥康王軍中奉迎請歸京言說並同又得何志同家書并録到册文看詳引用故事即是張邦昌逆狀昭著理當便行討戮某等切謂兵事貴速不可猶豫伏望大王深惟宗社之重乘機進發駐軍東明子嵩等即引所部兵前去躬聽處分若果曽遣使詣行府迎請即乞召張邦昌及管軍左言范瓊等躬親以素隊出詣帳前聽分别遣親信官然後入城設或遲回却恐奸人窺伺致生他變又申利害札曰一契勘金兵圍閉京城將及半年朝廷命令隔絶不通竊慮奸人詭計妄出號令鼓惑衆聽致四方施行不一深屬不便乞速賜遍行下諸路州軍自今後凡有事宜並申禀大元帥府自今號令宜結人心使知不忘宗社如近州縣曾被敵馬燒劫去處欲乞速疾行下並與放免今年夏稅一科仍乞逐處監司具合寬恤事件疾速申禀一契勘張邦昌弟邦基見任通判廬州并邦昌之母親屬盡在邦基家居住竊慮别生事端乞専委知廬州馮詢提舉淮西茶鹽范冲火急密切收捕張邦昌并邦基親屬斬遣以絶姦心所有本家財産盡在拘管入官一宣撫使自童貫談稹蔡攸輩為之取侮四方散亂天下今范訥居此任逗撓自營罪伏明白况兵馬大元帥既已開府則宣撫使自合放罷伏望詳酌施行一契勘逆賊見據都城勢力漸固四方勤王之師觀望首尾恐誤大事理宜速行江寧府以偹緩急竊慮奸賊乘勢先有窺伺江南之意欲乞更賜嚴切催促諸路兵馬進發討逆外别行選差公忠才明官前去江南措置事宜庶得首尾內外相應可濟大事一淮南賊閻謹猖獗蘄黃之間嚴州遂安縣賊黨益熾荆南竊據未得平定羣賊李孝忠等見在頴蔡境內有窺伺中州之意若不早行措置恐聞變乘釁盜據一方則大事去矣一契勘江寧府最是控扼去處見係宇文粹中右丞知府乞詳酌如可以委任即乞速賜札下如有所疑即乞速賜選差有才力官委以措置不可少緩實恐盜賊滋蔓嘯聚蜂起據有形勢之地益難制禦伏望疾速施行又申依應前起京城狀曰奉大元帥行府四月六日札子令依前措置事理奉迎二聖圖保萬全所有抑逼城中推立僣僞事或非本心請進兵近城按甲不動以俟當府遣人通問如金人有存留下官吏兵馬即盡行掩殺者右子嵩已催發何志同翁彥國莭次入援及依應今來王㫖外子嵩亦起發前去京畿至都城以來聽候大元帥行府指揮伏乞王慈詳子嵩等纍申事理速賜移府近京庶幾奸計不行早見興復不勝祈懇之至小帖子十二日據向子諲報有稱御前賫文字人初七初八間夜半自亳州前去廬州認是邦昌往問其母子嵩先已申禀已下廬州羈縻未奉王㫖不便宜於初七日移文廬州知州馮詢提舉茶鹽范冲存恤其母羈縻其弟邦基其權添差朝奉郎趙令儦充通判専一防禦外萬一先為逆使所得州郡未知事體或致尊奉或遂殘害皆害大事伏乞行府速賜遣官星夜前去說論馮詢范冲令儦示以寬大之意仍將逆使拘執及取索元延康殿學士建三屯之議曰臣切惟古者天子有道守在四方拓地非所先也疆場地廣必有腹心之患蓋因有益以作無益其為患可勝言哉國家纍聖相授未嘗玩兵雖契丹景德之侵元昊寶元之叛亦務函容兼愛中外之人不欲起邉隙尋干戈故百餘年間天下安然豈非以四方為中國守乎自王安石首用王韶開熙河髙遵裕為五路入界之舉徐熺敗於永樂西邉驛騷民力重困宣仁聖烈皇后守祖宗之法為甚嚴每戒邉臣不得生事紹聖之後章貫蔡京相繼用兵以幸厚賞所得尺寸所費山嶽視人命若草芥用邦財如泥土童貫尤無逺慮凡一出師敗績則掩覆而不以聞取荒地築逺壘則錙銖以計功疲弊生靈略無所措遂使五路精兵皆困溺逃亡不可復用此開邉之患驗在目前也末流略地燕山馴致禍亂可不鑒哉其熙河等五路自紹聖以來進築城軍堡塞伏望聖慈委諳鍊軍事臣僚同五路帥臣相度將不係緊要控扼去處並罷明遣使告諭下人示以德意那守禦之兵分屯陜西路却陜西見在兵馬捍禦河北河東與河東河北之師為三屯之計如此則省財用固舊疆結夏人吐蕃之心收將佐士卒為中原之用是一舉而有數利也比者敵騎雖逺而濬衛河陽屯兵修壘艤舟北岸以示再渡若不急作措置其可慮者甚大今若那河北河東之兵六萬人分為三屯一屯京東澶濮之間一屯河中陜華之間一屯青鄆之間平時訓練以偹非常敵若守約不渝自足張聲勢萬一敵騎南渡則三道並進深入搗燕山雲中之虛焚舟渡河示以必死人自為戰未必不成功也兵法曰避實擊虛又曰攻其所必救臣雖不知兵徒盡愚忠惟陛下更下公卿詳議留神而擇其中其後奏札乞正王時雍等十人之罪付獄鞫治明正典刑為其黨嫉忌乃設隂謀使鎮京口才十旬趙萬反公重傷退保江岸上章待罪忌者計得貶單州團練副使南雄州安置後復修撰卒詔荆襄關陜江淮以偹巡幸張所傅亮召赴行在先是右僕射李綱進札子大略謂河北河東兩路國家之翰蔽河北西路三帥府二十餘郡靖康末所失者真定懷衛濬一帥府三郡而已其餘至今皆為朝廷堅守一路兵民有城郭者依城郭無城郭者依大河西山自相屯集日以蠟書號籲朝廷乞師請援河東亦然但所失州郡視河北為多欲乞於兩路置司措置因其人而用之將來以河外郡縣悉議封建使自為守朝廷量力以助之則藩籬固而中原可安倘捨此而不為則兩路之人且歸怨於朝廷强壯狡獪者反為敵用將何以處之今日所當先務者莫急於此有㫖除河北置招撫使司河東置經制使司委綱選擇可任使副者具姓名以聞綱荐張所傅亮故所自責授鳯州團練使江州安置亮自通直郎直祕閣通判河陽府被召趙子嵩守陳州閻孝忠守蔡州黃叔敖守襄陽府趙子櫟守汝州季彥卿守漢陽軍狄千秋守江陵府公安縣捍禦有功子嵩轉兩官孝忠轉一官除直祕閣叔敖轉一官除直祕閣修撰子櫟除宣文閣直學士彥卿除直祕閣千秋轉一官通判江陵府又王襄趙野散官安置制曰趨朋友之急者不敢以存亡為辭議春秋之誅者莫先於功過俱惡爾頃繇近弼出總重兵受朝廷數世之恩固當前死聞君父重圍之急忍復自營乃専懷顧避之私至巧作遷延之役視國家有如於秦越刈生靈不啻於草菅言者以聞為之於邑其黜從於散秩用投卑於遐荒兹謂隆寬毋忘至戒以為總管日逗遛不進故有是命六日甲子內降七事手詔朕菲德獲承宗祧以臨士民之上屬時多艱未知攸濟栗栗危懼若將隕於深淵洪惟祖宗膺受天命覆育函夏百七十餘載德隆恩普振古所無道君太上皇帝以憂勤而內禪孝慈淵聖皇帝以恭儉而纂圖海內乂安蒼生䝉福適金人之深入挾詐謀以欵師待以不疑墮其奸計神都失金湯之險翠華有沙漠之行二聖既遷六宫皆從逮朕叔父弟昆宗族戚屬悉被驅逼禍變之臻古所未有是用夙夜震悼於朕心念父兄幽辱於敵廷憫生靈重罹於兵革飲泣嘗膽不遑寧居惟爾四方士民抱負忠義其伊恤於朕躬以濟於艱難以致安於宗社載念行在將士適當隆暑暴露之久尤軫朕懷當特加犒設州縣民户募師勤王調發之煩誠可加憫當厚於撫循賦斂之厚當議蠲减法令之弊當議改更潰兵為盜因間虜掠殘破郡邑雖已降赦今當遣使招集許令自新贓吏為奸乘時掊尅重困吾民罪不可貸當遣使按治置於典憲靖康之間忠義敢言之士或至竄逐當悉召還今日已往智謀竒畫之人如能獻陳當悉任用旁招俊乂竄黜奸回協成治功以篤中興之烈於呼天下之士大夫未忘我之祖宗當同心以相扶持天下之軍民不願淪於異域當協力以相保守國勢既昌天命益固庶幾鄰敵悔禍奉還鑾輿一人以寧爾亦有無窮之安不其韙歟故兹詔示想宜知悉七日乙丑李回責授朝奉大夫祕書少監分司南京袁州居住制曰莭義亷耻朕所望於士大夫也方國家艱危於此觀人而擇利誤朝形於言者之牘汝安取此哉具官某奉事兩朝嘗參二府既不能知存亡而雪主之辱復不能辨正僞而立人之朝處之恬然顔亦厚矣其正名於中祕以分務於陪京服我保全毋忘惕勵言章論列防河兼授僞官故有是命李若水忠義無與比論己推恩外可特賜諡劉韐能死節不為敵用特贈資政殿大學士特進制曰忠人臣之大本全者幾希死天下之至難在乎所處嗟我仰承之耆哲挺然不屈於兵威既沒其身宜加爵秩具官某天資莊重心術邃明內領藩條𢡟活民之政外臨邉鎮揚威敵之功資廊廟之謀遽屬朝廷之變不幸聞名於異域將令毁節於僞廷龔勝飲金心肯移於二姓仲針臨穴人將贖於百身升華一品之班加賁九原之禭庶幾精爽不昧欽承談世績贈延康殿學士制曰松柏有心於嵗寒而乃見璠璵至寶豈烈火之能遷朕遭外敵之亂常隂考士夫之所向責其大節全者幾人方嘉一士之聞已歎九泉之隔清規如在褒典可忘具官某學貫羣書文馳六藝純誠自表坐銷世俗之浮亷靖無求獨得古人之大蚤預時麾之選遍更法從之華二聖所知羣臣鮮及肆履艱危之㑹果専忠孝之稱雖甄濟佯瘖靡汚天寶之亂而龔生遽夭不見南陽之興爰錫命書升華祕殿以聳具臣之聽以為信史之光兾爾英魂歆吾至意知懷州霍安國贈延康殿學士制曰賢者事君豈為保妻子之計國家多事所貴死封疆之臣惟我藩宣之英靡從威武之奪既遭竒禍宜峻恩章具官某少有令名屢更煩使每任剖符之寄適當邉徼之衝嬰無援之孤城抗方虓之仇敵壯矣張巡之百戰躬履顔行哀哉卞壼之一門幾無噍類屬豫初載聞此沈冤念逝者之何辜為澘然而出涕兹升華於祕殿仍加恤於遺孤庶爾精忠光吾信史三朝北盟㑹編卷一百七
