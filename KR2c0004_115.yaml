body:
  text: 三朝北盟會編卷一百十五宋徐夢莘撰炎興下帙起建炎二年正月十二丁酉盡二月十九日甲戌十二日丁酉金人尼楚赫陷房州十三日戊戌金人羅索陷長安安撫使唐重戰卒總管楊宗閔運使桑景詢曽謂提刑郭忠孝皆被害修撰劉岑志重墓曰靖康元年冬金人破京師明年二聖北狩今上即位於南京年號建炎是時朝廷已失河東金人重兵屯於河上陜西大震驚告急之使日至行在所而永興一道已並邊矣岑適使金自汾晋渡河津由關中以歸方入朝宰相傳上㫖於政事堂訪可以為永興帥者於岑岑曰陜西事宜素重况多事之初永興之帥其才尤難有天章閣待制唐重今守同州重與敵對河守備百出民不加斂而食自足兵不加募而士自至敵陷蒲絳將及同同人度不能守重開門縱之使出自與殘兵數百人守城示以必死敵知有備乃引去邦人德之且立祠焉重平生之志在許國每一及時事輒噓欷慷慨泣下沾襟見者皆感動蓋其忠義足以服人才智足以應敵欲守雍都莫如重可即日除天章閣直學士永興軍路經略安撫使兼知永興軍前帥范致虗先促六路兵向東勤王留連陜州不進公自同州移書責之曰金人困京師半年王室存亡未可知臣子憂國宜如何哉且京師以秦兵為牙爪四方以京師為根本今擁秦兵坐視不前是牙爪不足恃而根本搖矣其言纍千百皆痛切讀者感激而致虗不能用也逮聞京師失守公慟哭瀝血檄請遣使勤王且勉為效死盡臣節會永興令下慨然就國以勤王自任日條關中利病且率長安父老子弟表言關陜山河形勢迎請主上入都關中為先其次則建藩鎮封宗子使守我土地緩急無為敵有又欲通夏國之好繼青唐之後犄角以緩敵勢至於用忠直正刑賞皆中興急務所當先上嘉其忠進龍圖閣直學士時敵在河中窺關內甚急而所部鋭兵朝夕節制半年之間所請不知幾千百言皆不報十二月敵引兵渡河拔同州明年正月三日及永興城中兵不滿千人嬰城固守凡十日援兵竟不至而大將傅亮以部兵降敵城遂破公尚餘百兵與接戰城中衆潰中矢以死年四十六部曲中有感德者求舊棺於僧舍掘地斂藏之後長安平成都漕趙開與公素友善令人取其喪以歸既至子弟欲易棺襯見刻其姓名月日於側其在於初敵將至公自度孤城决不能支告轉運使李唐儒曰重平生忠義不敢辭難始意迎車駕入關居建瓴之勢庶可以臨東方今車駕南幸矣關陜又無重兵雖竭盡智力何所施其智巧一死報上不足惜唐儒以其書聞俄而死節報上聞而哀之贈資政殿學士官其家五人方朝廷之訪雍帥也岑既以公薦而又薦提舉常平鄭驤守同州永興通判曽謂為陜西轉運通判官朝廷俱用之後敵渡河鄭驤死於同公與曽謂死於雍嗚呼三人者可謂不負朝廷矣公字元任眉山人為兒時已不凡祖母宋氏嘗令讀裴度武侯廟碑一覽不再讀十二賦陳平詩已有大志用薦者改奉議郎知懷安軍金堂縣許先擬入朝薦於宰相得辟雍録是時邊臣多希功幸賞以欺朝廷至於誘羈靡蠻使貢不毛之地建立州縣張官置使以困中國其害甚大公遽言之朝遂召對除禮部員外郎丁母憂復除吏部遷有司員外郎起居舍人時宣和七年也十二月金人入邊燕山安撫使蔡靖方告急而郭藥師叛以陷邊自河朔以南皆恐公建言今日之禍起於開邊之謀始於童貫金人兵鋒甚鋭不可當宜誅貫以謝邊人庶可以緩師宰相不能决謀遣給事中李嶫出使未及而敵已壓境都邑已戒嚴矣太上皇內禪淵聖即位明年正月改靖康方圍城中公日有所敷陳皆切中時病除諫議大夫時議講和親征二策皆未定公上疏欲宰執廷辨之姚平仲既敗敵愈熾索金帛甚急中書侍郎王孝迪大書揭榜下令民有藏金帛者人得告之公曰審如此則子得以告父弟得以告兄奴婢得以告主初政如此將何以化天下哉以同列御史迭疏論不可遽罷此令金人退師遷中書舍人凡賞罰黜陟之不當者執不下賞格大不樂之與孫覿李擢李會師驥以論事不合皆被黜公得祕閣修撰知同州幾年除天章閣待制頃之出守永興公生巴蜀起布衣才官中都聲望已藉守邊又能死事其名固足以傳不朽然公之死實自岑發之况其大節昭昭如此刻之豐碑置之墓道使見之者曰此吾宋忠臣唐公之墓其誰曰不可遺史曰唐重儒生不知兵帥關中一蹈范致虗覆轍諱言兵機唯喜人言敵兵逺至關中必無虞京兆府路兵馬副總管楊宗閔與仲謀曰今河東諸州皆非我有距此才一水而本路兵弱宜急繕城塹為守禦計以待外援捨此無策重以秦民驕不欲擾之而止及金人薄境略無措置城陷重自縊死宗閔先令妻劉氏携家人入蜀遂死於難唯宗閔死於其職轉運副使桑景詢曽謂提刑郭忠孝皆死景詢介直有守尚氣節之人也初童貫用事時州縣官皆迎肩輿望塵謁入而拜唯景詢不拜議者多之以其發擲奸吏不受干請時人號為喪門神喪借姓桑事言之也忠孝事伊川程頥傳其易與中庸學金人薄長安或勸云監司出巡可以免禍郭忠孝不答遂被害內侍邵成章上書言黃潜善汪伯彥必誤國送成章吉州編管車駕在揚州金人攻河北陜西京西羣盜起京東宰執黃潜善汪伯彥皆蔽匿不奏及張遇攻真州去行在六十里上亦不聞內侍邵成章上疏條具善彥之罪且曰必誤國及申潜善伯彥使聞之上怒送成章吉州編管御營使司左軍統制韓世忠領兵屯於河南府韓世忠初為王淵軍統制屯於應天府上即位為御營使司左軍統制從車駕至揚州至是命世忠領張遇陳思恭等兵一萬屯於河陽府又命至滄州劉錫密結河朔之人自青州絶河進兵命東京留守宗澤總大衆自滑州而北期集於中山府俄為黃潜善汪伯彥建議從中止之翟興翟進及金人戰於伊川皂礬嶺敗之又戰於驢道堰又敗之翟興弟進遇金人於伊川之皂礬嶺興披甲先登將士齊進接戰終日擒其將夏太尉者後旬日又遇金人於伊川之驢道堰力戰擒首領傅太尉者自是聞大翟小翟之名矣二十二日丁未詔招降盜賊詔曰朕惟祖宗仁覆天下生育休息垂二百年家有積聚人知禮教尊君親上安業樂生車書所通烟火萬里頃自奸臣誤國邊隙既開兵禍及於黎元烽燧達於京闕兵以傷殘而潰散民因侵軼而流亡遂假勤王之名公為聚冦之患肆朕嗣位震憫於兹遭時艱難涉道寡昧寅畏恭儉不敢怠荒寬大公平庶宏共濟閲日尚淺羣聽未孚攻剽劫掠冦亂滋重矜州縣之民莫保田廬之安生靈何辜天意未悔今朕駐蹕淮甸寅奉廟社以來遣使金人屢致父兄之請念欲復泝清汴却遷故都而虐盜猥多師虞弗靖畛膏截於大河之外形勢削於纍年之間興言及兹痛憤良切咨爾有衆共圖興邦咸有鄉黨鄰里之情豈無父母妻子之念凡今日奪攘縱暴之衆皆異時為民忠義之人白日照臨明爾遷善之意皇天覆燾監豫止殺之誠應盜賊回心易慮散歸田里或失業不能自還者令所在官司條具以聞朕當區處其日前犯罪一切不問丁進以其衆詣京城留守司請降丁進自退夀春府擾於京東京西至是請降於留守司進夀春府軍兵也逃走遇亂復歸鄉里就蘇村闞圍聚人作過初自十百至千萬至有數萬皆靣六㸃或刺入火進自號丁一箭圍夀春府撫使康允禦退之至是請降二十七日壬子金人尼楚赫焚鄧州尼楚赫陷鄧州根刮百色技藝人及金銀物帛既盡是日也金人諭與寄居上户獻金銀以謝不死於是寄居上户皆賫金銀犀象出城尼楚赫大王使諭之曰欲留兵十萬屯於鄧州何以應付糧草衆對以鄧州多水非屯兵之地又曰既已投拜皆大金之民矣大金若回軍紅巾數犯城使誰為主衆不敢對尼楚赫大王傳令竭城北遷盡過北官員依舊注授差遣僧道依舊歸寺觀百姓任便居住農家給田種作寄居上户歸城中傳此語滿城中皆哭俄見四邊已縱火民不可歸乃出城數里間入一木寨門極低小有板屋亦低僅容立望城中火已亘天矣自是不得食者兩日有散失骨肉者許以諸寨尋認有失一二十口者一兩日間尋覔皆足雖竭城人盡狼狽出城然少有死者二十八日癸丑太學生魏佑上書論列黃潜善汪伯彥誤君十罪金人羅索貝勒陷鳯翔府二月二日丁巳金人尼楚赫遷鄧州士民北去節要曰尼楚赫之衆侵漢上虜鄧汝均房等州民以歸尼楚赫已焚鄧州乃給寄居官上户車及牛各有差遷之北去寄居官上户每過州縣人給米三升貧民下户途中死者不可計到西京已無幾矣三日戊午金人尼楚赫陷唐州尼楚赫以丁巳攻唐州戊午登城己未縱焚掠城市一空十八日癸酉尼楚赫陷蔡州知汝陽縣丞郭瓉死之兵至蔡州知軍州事閻忠孝先遣家屬在西平縣西陵土豪翟冲家忠孝聚軍民守城金人攻擊數日城陷於東南隅居人自東奔者皆達餘三面奔者皆死知汝陽縣丞郭瓉朝服而罵金人被執猶罵不絶口不脫朝服而死金人大肆剽掠焚廬舍忠孝被執金人見其貌陋而侏儒不以為知州遂令荷擔忠孝奔走得脫乃往西陵忠孝字資欽開封人聰惠俊爽精通醫方嘗著信效力議論甚精致行於世初為知州揭榜詞狀不限字數每狀不限幾字忠孝一覽盡得其理而能暗記其人姓名鄉里以致訴錢物者亦能記其數目金人退留守司差張武經權知州州雖殘破而十縣猶盛民户詞訟頗繁張武經不能辨時忠孝已有朝廷放罪民户思忠孝治民有法經監司陳狀乞求忠孝依舊權知州監司從之忠孝遂權知事十九日甲戌金人尼楚赫攻陳州軍亂殺知軍事向子褎金人陷陳州初報金人至陳州知州向子褎欲固守時有出戌東軍四千人又有本州軍兵子褎倚之第三將嶽景緩者欲棄城率軍兵奔往揚州子褎不從金人既到景緩以將兵迎戰不勝軍亂殺子褎其家屬或散或亡俄而城陷金人燒爇劫掠而去留守司差尉氏縣馮長寧權州事東京留守宗澤奏對論正月丁未詔書乞車駕回京師正月丁未詔書二月壬申到東京宗澤拜詔畢讀之有曰遂假勤王之名公為聚冦之患澤曰使忠義之人聞之解體矣乃具奏曰臣聞人主中天下而立定四海之民恭惟我宋太祖皇帝肇開區夏以今京師為天下中故創業垂統以貽萬世太宗真宗仁宗英宗神宗哲廟奕世聖人傳以相授以京師為根本之地所以高拱穆清坐視天下之阜必於天下之中也惟奠枕於京則自西自東自南自北莫敢不來享莫敢不來王偶緣玩習太平恬嬉之久狃於驕淫矜誇忘戰守備遂至金人肆虐殘破州縣圍閉京城劫迎二聖后妃親王與諸王族蒙塵北去僑寓沙漠此忠臣義士所以夙夜涕泣繼之以血自陛下即位應天四海萬方歡欣鼓舞垂髫駘背山農野叟咸以手加額仰面叩天曰天下有真主矣萬世永賴實矢祈明德為無疆之休四方帖然若遠若近並無盜賊暨陛下偏聽奸邪與金人為地者之語移蹕淮甸則諸處凶惡强盜時如蝟毛刺起如蜂閧聚縱火殺掠所在狂盜罔有悛懼以為天下遠無所依歸遽至是爾臣於二月十八日祇受朝廷降到黃榜詔敕云遂假勤王之名公為聚冦之患如是勤王之人皆解體矣臣切謂自敵圍閉京城天下忠義之士憤悶痛切感勵爭奮故自廣之東西湖之南北福建江津梯山航海越數千里爭先勤王但當時大臣無遠識見無大謀略低回曲折憑信誕妄不能撫而用之遂至二聖北狩諸親骨肉皆為劫持牽連道路當時大臣不出一語使勤王大兵前往救援凡勤王人例遵斥逐未嘗有所犒設未嘗有所幫助饑荒流離困厄道路弱者填滿溝壑强者變為盜賊非勤王之罪皆耿南仲輩鼓倡抑塞之爾比來奸邪之人方爾橫肆金人自然得勢强梁惡少無緣殘滅惟國家聖祖神孫繼繼相授湛恩盛德滲漉肝心淪浹骨髓今河東河西不隨順金人雖强為秣馬厲戈而自保山寨者不知幾千萬人諸處節義丈夫不敢顧愛身而自黥面爭先救駕者又不知幾數萬人今陛下以勤王為盜者噫得天下有道得其民也得其民有道得其心也得其心有道所欲與聚所惡勿施爾也果陛下回鑾九重瞻拜宗廟俾四方萬里知有朝廷不失祖宗舊物此人心之所欲也願陛下與之聚之以慰安人心陛下若駐蹕淮甸俾人顒顒之望惶惶之情末有所慰安此人之心也願陛下勿阻遏之以失人心臣仰詳詔中語豈陛下意㫖詞臣失職不能敷繹之過臣願陛下黜代言之臣别降罪已之詔許還闕之期大慰元元激切之意陛下還京登樓賜赦則天下之人盡皆遷善遠惡不犯於有司矣豈復更有為盜者王室再造大宋中興在此一舉陛下睿斷而力行之臣犬馬之齒七十狂妄之言願陛下察之若以臣言上拂陛下之意誅之赦之惟在陛下臣無任激切之至冀德韓清冦西京翟興敗之冀德韓清遁走德清乘金人入邉嘯聚不逞出沒於汝洛之間有衆萬人屯聚於留山寺及艾蒿平翟興聞探得殺戮殆盡後數日破艾蒿平冀德韓清脫身遁走得賊物山積盡給麾下獲婦女數百人悉縱還其家馬政得信王推奉為首倡義舉兵初斡里雅布給田與馬令耕種贍飬也久之馬曰耕田不即得食願為酒肆以自活斡里雅布從之馬欲因此雜結往來之人復與山寨通耗間因寒食日僞隨大姓送喪携親的十三人奔詣五馬山山寨聞之喜躍遂推馬為首是時傳聞信王在金人寨中隱於民間自稱姓梁為人㸃茶馬一夕率其兵劫金人寨奪迎以歸遂推奉信王為首時兩河忠義聞風響應受旗榜者約數萬人談兖據鄧州金人據鄧州時有陸巡檢者在羽山又有隆德府攢子談兖在灰堆山隆德府陷脫身奔竄而鄉人之奔竄者推兖為首間關至西京遂據灰堆山金人焚鄧州遷民人而去也陸巡檢先入鄧州兖聞之率衆殺陸巡檢而自據鄧州以收復報朝廷授兖以官俾知鄧州李彥仙克陜州金人既以渡河陷同州繫橋為歸路西陷華陜岐雍隴秦陜西右大擾鄜延路經略司出兵攻同州收復諸縣焚大慶關檄召河南河北豪傑共起義兵併力擊敵遠近響應旬日間以供狀自達姓名孟迪种潜張勉張漸白保李進李彥仙等兵各以萬數又勝捷軍卒張宗自稱觀察使亦起兵於南山下彥仙者鞏州人世開線鋪彥仙有大志而不拘檢文面為曹司從軍勤王至陜華間兵潰散彥仙聚衆動萬人屢與金人戰仙雖無勇猛之才然有智信而能謀事聞陜州空虗率衆襲取而據之彥仙皆以信義治不容毫之私與其下同甘苦故得軍民之心皆盡其死力於是諸州人多往依之邵興歸於李彥仙邵興初據稷神山聞彥仙已得陜州乃以其衆附之願聽節制彥仙辟興為統領河北忠義軍馬率兵渡河收平陸縣界三門集津徊山張店四鎮又辟興加統制三朝北盟會編卷一百十五
