body:
  text: 三朝北盟會編卷五十九宋徐夢莘撰靖康中帙起靖康元年十月二十四日丙辰盡二十九日辛酉二十四日丙辰尼堪陷平陽府知府經略使林積仁都統制劉鋭棄城走宣和録曰先是義勝軍四千人屯平陽其將劉嗣初領其衆聞尼堪已圍太原密遣人獻平陽圗于尼堪於正月十九日叛歸金人於是尼堪既破太原乃進攻汾州且分兵以攻慈隰以此諸郡勢甚張汾州堅守以待救朝廷分河東為兩路其隆德府即為東路經略平陽府即為西路經略各命守臣以援汾州十月初十日汾州失守主將張克戩死之當是時議者曰汾州之南回牛嶺甚險峻如壁可以控扼於是乃命將以守朝廷又遣劉鋭統衆駐劄平陽以捍北邊然國用乏竭倉廪不足士之守回牛嶺者日給豌豆二升或陳麥而已士笑曰軍食如此而使我戰乎敵領鋭師以冦回牛嶺敵于山下仰望官兵曰彼若以矢石自上而下吾曹病矣為之奈何未敢前進俄而官軍散去敵乃登焉十月十四日敵至平陽鋭領兵遁去遂陷平陽官吏皆縋城而出自後威勝隆德澤州皆失守矣逄敵記曰十月十九日至平陽府三十四里見村落間牛畜車乘居民婦女官員宅眷扶老携幼號呼之聲蔽川而下問所從來云敵破汾西縣并靈石縣趙城霍邑縣一帶驚移人户避敵至此是日晚到平陽府謁平陽府都統劉統仲武之子語余李宣撫被召种安撫河北巡邊种公至鄭州以疾乞致仕相繼差折參謀名彥質字仲古遵正子也升宣撫判官權宣撫使事李宣撫未至諸帥及制置司統制官申發邊機文字五六日無與決劉云雖被命差充統制並無人馬汾州劉統制張思正人馬又不知所在止有今日統制官李安人馬步兵一千一百人馬八十餘匹汾州制置司差往回牛嶺把隘又不屬管萬一敵馬出沒何以支梧余退即謁太守林學士名積仁字充美集謂林曰敵騎次第不久至殊不為偹何也林云城上敵樓今春為背叛歸朝官劉嗣初耿守忠所爇無軍兵無糧食無器具何為可守也集謂林曰此學士已不作守計林曰係殘破州郡實不可守余云既如此可於南門差官堅守先遣出婦女老小留壯人居城中以省糧食是時城中尚有七八分人敵不至即已萬一敵至旋作處置林令宜候請兩都監令開門放出婦女老小留壯人十月初八日至宣撫司見折宣判具言九月初三日破太原有鄉兵自太原走出至孝義縣言城破日城中尚有萬餘人官員并宅眷軍人富民縑帛盡為張孝純焚了唯餘金銀張孝純與其子被執軍民皆癯瘠委頓宅眷皆投濠河者不知其數途中又聞金人遣使講和某大不然之但以此相欵要生姦計爾所過州縣皆相慶悉已弛偹使司須行下令嚴作隄偹仍申奏朝廷折宣判云某恰亦上心來又云某過州縣無軍馬無糧食無器械何可使之守也使司當契勘速儧那之撥應副軍前遇敵又不納級及數處有潰散軍兵哨聚作過如溫泉縣汾州回牛嶺一帶可速築寨以為離落折公曰公近日邊上來盡知仔細又將官所論甚好有數事欲再煩公出又曰近得旨令極力保守平陽府并汾州一帶平陽府今為汾西縣路帥府隆德府今為威勝軍澤州等路帥府懷州至內管安撫司使公事知平陽林積仁不依守計都統制劉鋭是朝廷差來不用命可煩公往彼見林積仁語與朝廷今日升平陽為一路與一州事體不同萬一失之是失一帥府堅不作守計何也汾州平陽分擘軍馬應守禦次第可與劉鋭商量施行劄子差余前去平陽府勾當并照應汾州一帶余納劄子申奏朝廷納級指揮當格每納級轉一資是時軍前遇敵殺獲更不納級候邊事息日一例轉資乞支撥軍器於闕少州縣乞將統制官并戰士七日一次犒賞乞召募有武勇使臣并效勇守城依制置使司請給食糧乞給旗二面付某招集潰散軍兵日下分募支給請受招集五百人減二年磨勘乞差撥軍馬前去軍前應援使喚乞支降逐州縣少闕錢糧得兩日行下指揮數內軍器更切於見有州軍儧那宣撫司重行應副降賜庫造旗二面付某招集潰散軍兵武勇使臣并效勇各計召募十員名差撥人馬余十月初六日早辭晚宿狼車即發牒遣介往隆德府請姚李二漕理會錢糧初九日晚至澤州城外馬鋪安下初十日早謁直龍圖閣大守髙世由三日招集潰散軍兵一千三百餘人悉皆赤露癯瘠並日下給劵親自押赴平陽府經略安撫使林積仁具以折公之語白之林云城決不可守余云今日事體不同太原已失此升為帥府屏捍一路極力保守以御前近降處分甚是叮嚀今漕司與宣撫司亦自極力應副敵馬未至自家已不作守計何也是時城中有四五分人余再三白之林曰甚好來與都監到城上一觀余即謁劉都統下若干兵馬某近離宣撫司見近宣撫言聨發軍馬來劉云並張思正軍馬共有萬人差使處已自不少十一日登城周圍二十四里敵樓戰棚一百五十餘座經耿守忠劉嗣初焚爇之後更不曽修氊有五百餘領但可以挂搭四門敵樓以百步法守之守城二十四里合用三萬人城中止有軍兵三四千人余問兩都監答云少匠人闕材植余又問你不憂顧直招百姓匠人某昨來行趙城霍邑道中瀕河汾見官中牌筏拋失于道次者自不少何不取用兩都監又云盤運費力余云今若取于趙城霍邑事無及矣城中樹木遂急盡伐以用如有不足拆係官空屋舍并民居空屋內民居空屋後來官中修還并牒施行都監又曰見官科撥行下諸縣應副至今諸縣不為著緊余對曰待牒府取曽弛慢縣官職位申宣府司至二十四日申後謁都統制劉鋭云適得回牛嶺急報余云都統莫順遣援兵否劉云統制司見管軍馬一萬餘人遣四千軍五百匹馬往回牛嶺把隘二千軍隰州見存者四千軍馬五百匹敵至豈不要接戰守城禦敵又得府州知州折可求書來求援兵書辭懇切要郝仲連提兵三二千救援府州已破豐州并二寨探報得欲來攻府州極是危急劉曰此處軍馬見患少郝仲連自是宣撫司差充平陽府路副都制本司不敢差須申稟撫司余云都統更宜多方擘劃措置事不可緩退謁林經略林云今日偶得進奏官報某落職與逺小處監當某已是罪人只今交割便行某云經略更承受得何處文字若止是進奏報未得朝廷劄子便豈可交割離任且更細審之方當邊事之際但恐擅離朝廷怪訝愈不便林云恪得關報敵馬擊散回牛嶺把隘人昨夜已到趙城縣次第已過趙城縣余對云昨夜劉統制方聞敵馬在回牛嶺今晚到趙城其行甚速余顧林經略使令輩問此去回牛嶺近逺云一百九十里某少頃拜别經略且行林曰却往甚處某云事已畢且歸司余退略早飯欲别林經略飰畢至使衙即見林公戎裝索馬張蓋余至即請余余問經略所出林云適又有關報敵馬離此三十五里余云劉統制知否莫須遣兵把截掩擊不可使向邇林云恰報劉統制兵出城復又入城不知如何遣人傳語問矣公得行否余云即今便行遂退才出府衙趨南門遣行人于城北催行李同出城約兩茶間見酒肆往來人云敵馬已至城下斯須余親隨任忠約行李至云不可出矣敵馬已至北城下有一人携一卷文字立濠根呌云打話余謂任忠曰汝可管押行李且於礬務尋一安下處我自登城已時看至城已有三四百騎後面塵頭不絶相繼而來時至酉約有萬騎立濠根携文字人云大王交我招安你城中官吏軍民有文字在此將索來約上城去我問你悶可降也不降若你悶不降時大王領人馬從絳州掩你悶下來看走出那里去城上人皆不答又問如何不做聲今都來攻打你城也日已晚且去也更與你悶一夜啇量來日恁地時城破也敵馬遂退離東北四里劄寨余語劉統制敵馬既至請都統速差官分壁地分催軍民守城軍兵稍有上城上百姓并本府官吏盡不上城余語劉統制云若林經略不上城何以率官吏軍兵劉統制云遣人請不見余云待某自去請躍馬至府衙中悄然問林經略在否云已登城即至城西問來往軍民曽見林經略否云著白布衣恰自此擦城下去矣見兩都監一監務余語之曰三公不要走可同共守城余即下城于街巷親率百姓上城家至户到呼召非老即小或婦女輩壯者悉皆逃避矣盡率軍民止守禦得東城兩壁餘無守禦雖有登城者亦皆乘間擦城逃避斬十數輩不能禦過至侵夜兩壁守城人擦城逃去十三四至四更巡城去之殆盡余守南門至五更忽隨行人報統制官西門統制官已出至二十五日夜余亦遂出行十五里聞敵兵發鼓掩殺我軍行二十五里天曉敵兵追趕驚移逃避人户稍截車乘并頭畜四百餘道間居民婦女扶老携幼或相離棄號呼之聲所不忍聞是日城中居民與官吏皆走以城降二十六日戊午侍御史胡舜陟上言乞救援中山胡舜陟言伏見陳闕蠟書其詞哀切言真定城破屠戮生靈不知幾人敵據髙城愈難追退臣讀之流涕竊歎朝廷何忍其如此未嘗遣一兵一馬為援也李邈三十四狀奏陳略不見報朝廷豈不惜土地而愛人民但以與金講和不敢動兵一何失計之甚也臣請為陛下言之古者列國兵交使在其間推論利害釋二國之患是息民而貴和今敵遣使來而我使亦往彼此按兵不動乃所謂和也然金人貪利不已今日陷一城邑尋侵而南有并吞席捲之意時遣一使邀求寶貨詭辭為順使不為偹我之使往脅之以威不得吐一語但依金人甘言奏聞而朝廷不察其情偽便謂和議已定宣撫司見講和如此亦不遣兵救援真定以至于亡陳闕所以言彼受和議之使留寨中而任意攻取無人救解彼何計之得而我何計之失也今敵悉力中山城下朝夕必攻城矣若朝廷又以講和之故不令宣撫司應援必失中山失中山則河北諸郡不攻而自下矣河北下則京師不可都而宗廟社稷危矣陛下何不以宗社為心乎又言彼既攻城殺人放火而我師援之理不為曲朝廷若任諸鎮之存亡不復顧恤則更無可論若欲保全伏乞速賜指揮宣撫司火急遣兵前來某之言如此可謂切矣陛下若聼大臣之論謂既講和不復應援則非為宗社大計第土地人心必兩失之若大臣謂今日無兵何以為援臣以為河北之民皆兵也使諸郡縣傾廪庫於民共之朝廷以好爵縻之何患人不為用但係措置何如耳乞宣撫司兵自深冀來祁會合馬忠兵宣撫兵擊其東中山為內應則轉禍為福易敗成功其言似亦有理伏望陛下詔三省樞密院日下詳酌施行絳州軍亂守臣官吏散走河東逢敵記曰十月二十八日絳州被潰敗軍兵并本州軍兵放火自亂太守朝散大夫李弼傳并官吏軍民散走獨存市易務官吏度不得免自操鎗刀殺獲十數人遂稍定是時絳州衙兵為太守擡轎既行出城各捨轎而去復入城中攘奪金銀李守遂步行至髙樂絳州倉庫有漕司金銀縑帛糧斛約三百萬河東漕司歲計在此只童貫平貨場匹帛兩綱是六十萬皆被奪去遺史曰是日軍亂守臣李元孺通判徐昌言棄城走軍民劫軍資庫蓋四川一百八綱盡在絳州不卸然後河東州軍轉請人知富饒遂致攘取帑藏為之一空二十八日庚申黃鍔除給事中由海道使金國先次以禮物等往因議和尼堪至澤州城下二十九日辛酉侍御史胡舜陟上言政事未得其正宜急正之胡舜陟上言春秋傳曰兵猶火也弗戢將自焚老氏亦曰以道佐人主者不以兵其事好還國家自熙豐間王韶建開邊之説王安石主其議遣將用兵無嵗無之瀘南廣南勤師逺伐至崇寧以來尤甚西開青唐以及夏國南築溪洞以及丹州西南則建祺祥等州皆不毛之地而驅赤子蹈鋒鏑死者不計其數往者竭其膏血凡五十餘年而又王黼童貫合謀以敗契丹百年之好約金人以墟其國是以上帝震怒禍我國家金人乘勝長驅中原豈非所謂弗戢自焚其事好還者乎陛下踐祚適于斯時宵旰之勞未見微效蓋天怒未解人力豈勝哉書曰惟先格王正厥事臣觀今日祖宗寬大之政泯滅而未舉王安石刻急之法為害而未除法度未得其正也士大夫之欺罔誕謾驕奢貪鄙曽不少悛風俗未得其正也事未見功賞已驟至及其敗事罰不加焉賞罰未得其正也閹官近習猶執事權頡頑恣睢無所忌憚任用不得其正也昔之叨冒恩寵者未加鐫削懷才抱器者陸沉州縣爵祿未得其正也昔之僥幸富貴者一毫不取火耕水耨者困于重斂賦斂未得其正也數者不改豈所謂正厥事乎伏望明詔三省凡是數者皆反正之庶幾震怒一解妖氣自銷詔令三省照應施行三朝北盟會編卷五十九
