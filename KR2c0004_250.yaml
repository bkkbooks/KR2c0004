body:
  text: 三朝北盟㑹編卷二百五十宋徐夢莘撰炎興下帙起紹興三十二年閏二月盡四月二十一日丁巳閏二月洪邁充通金人使副書書曰邁等咨目頓首再拜國信驃騎國信侍郎講服德譽之久南北阻絶無緣良㑹下情怛切欽仰即日春寒伏惟台候動止萬福邁等自去冬扈蹕至建康前月被令㫖迎候使節已至淮西奉候數日矣今承泗州富察移文知大斾且至符離有上禀事宜已令泗洲守關報今又得指揮令通書蓋自古以來鄰邦往來并用敵國禮向者本朝皇帝上為先帝下為生靈勉抑尊稱以就和好而彼國無故興師長驅涉境欺天背盟神怒民怨曽不旋踵自取夷滅既以兩國交兵則是大誼已絶竊聞大金新皇帝即位有仁厚愛民之心本朝皇帝亟諭將帥止令收復外不許追襲貴朝師歸方議遣使别修誓好乃䝉貴朝首拜信使舉國欣幸無以為諭但一切之禮難以復仍舊貫更候惠顧曲折面聞唯界首一事舊以淮為境至中國取節接今泗州臨淮虹縣之北迤邐迎候乃隨宜排辦宿頓頃以邁等禮合至界首泗州之北更無人烟館舍以容衆只候近耗當至臨淮上謁想為髙明必能動察令遣使臣持凂史記瞻望不逺預以為慰更祈保護以副願言不宣金人攻海州十六日癸未吳璘克大散關金人既失秦州及熙河等州乃堅守大散關以扼王師吳璘遣姚仲等諸將攻擊數月不下仲幕屬朱紱乃投劄子于總領王之望請科斂四川民户出財賞軍乃投劄子于總領王之望請科斂四川民戶出財賞軍關乃可下書曰先生以博大髙明之學當艱難險阻之時凡百施設莫非經濟顧兹全蜀久賴綏撫雖三邊用兵之際無征輸重困之勞自非先生以體國憂民為念何以及此然天下之勢固有不兩立者兵與民是也兵不可不費財而責其萬死之功民不可不出財而濟其一時之急此天下之通理也先生深知兵民兩相為用之䇿矣聞蜀民自軍興之後恬然自安絶不知有用兵之費先生恩德固亦大矣然有可言也紱為先生門下士豈敢自隱且時殊事異故宜更改不可執一自金人九月六日叩關于是時出倉卒諸將云大軍一出必遂破敵初宣撫吳公自謂可以兩月為期必能克敵既而金壁愈堅相持已踰四月矣將帥牽制久未成功兵不可不謂之暴露如今日事勢與前日不同先生當救時之失以取必勝兹其時也聞之諸軍鬭志不鋭戰必不壯且曰使我力戰就能果效微勞其如賞給當在何處伺候核實保明申覆宣司總司指麾往返數旬豈能濟急大率目今勢事與前時既異不立重賞何以責人于無事前宣撫吳公僅能保守全蜀蓋賞厚而戰用命也乞先生詳酌事機别與措置略與川民科斂軍須之費十分之一多與准備給錢物近一二百萬自總所移文諸帥明出曉示號令諸軍各使立功以就見賞謂如散關一處設使當初有銀絹各一二匹錢引一二十萬道椿在鳯州宣撫吳公節使姚公以上重賞給明告諸軍遣一二統制官各以其所部全軍一出諭之曰當進而退則坐律進而勝捷關隘則有此重賞如是而軍不用命敵不破滅無有也說者蓋謂方今朝廷財乏令敵不破緣軍興而費耗國用則先生所不取紱曰不然先生體國憂民之心朝野孰不共知事固有當更張則悠久不能力濟機㑹一勞而久逸暫費而永寧正在此舉紱之區區未必可行之幸先生恕狂愚或以為可數則一覽付之火之望讀之大駭乃答書曰辱示劄目見咎不科斂百姓異哉足下之言也本所以財賦為職事應副諸軍自當竭力若是軍須闕乏有功將士合賞但于王少卿取辦可也至于科斂何預哉僕中原人蜀中無一錢生業亦無親族寓居其不科斂何私于蜀蓋以大軍十餘萬衆仰給于此不得不愛養其民力以固根本有四川民力則有三軍四川民窮則三軍坐困矣如足下輩月俸歲廪不從虛空中來亦知其所自乎朝廷德意深厚每務寬恤東南調度如此不聞斂取于民四川獨可以橫賦乎國家養兵所以保民而足下乃謂軍民不兩立恐非安民和衆豐財之義又云用兵本約兩月今已四月然則解嚴未可期也若本所當時便循諸處無藝之求只作兩月計則今日何以枝梧事未可期所責無限不且愛民力以備方來之須將如異日何僕之不斂于民力所以為諸軍也用兵百三十日糗糧草料銀絹錢引所在委積未嘗乏興而足下乃爾云云不知軍行出入何處缺錢何處缺糧草纍次喝犒并朝廷支賜自是諸軍應報稽緩文字才到本所立便給散略無留阻若是給賞則須候有功諸軍既無功狀本所憑何支放散關前攻不下聞自有說莫不無有銀絹錢引否不知散關是險固不可取乎豈由有可取之理而無錢絹引之故乎士卒不肯用命豈計司之責必有任其咎者况聞攻關之日死傷不少則非士卒之不用命矣自來兵家行動若逗撓無功多是以糧到不繼嫁禍于有司以自解亦未聞以無堆垜賞給為詞者也國家息兵二十年將士百戰竭四川之資以奉之一旦臨敵更須堆垜銀絹而無可用則軍政可知矣且如向來和尚原丁劉圈殺金平諸軍大捷近日吳宣撫取方山原泰州等處王四廂取商虢等州吳四廂取唐鄧州亦不聞先堆垜銀絹始破敵也朝廷賞格甚明本所初無慳吝如泰山治平之功得宣司關狀即時行下魚關支散何賞稍令闕誤兼魚關簽㕔所備金帛錢物充滿府藏宣撫不住關撥豈是無樁辦耶顧生民膏血不容無功而得耳假令僕重行科斂積金至諸軍衣糧犒設支賜之外若無功效一錢豈容妄得哉若果有功豈容本所以不科斂而不賞乎諸軍但務立功無患賞給之不行也但管取足無問總所科斂與不科斂也劉晏斂不及民何害李郭之勳李晟屯東渭橋無積資輸糧以忠義感人卒滅大盜足下以書生為人幕府不能以此等事規贊主帥而反咎王人以不斂于民豈不異哉九月以後興元一軍支撥過錢引二十八萬道銀絹二千匹兩而糗糧草料與犒設賞行錢之類不與焉亦不為不應副矣若皆及將士豈不可以立功有功而未得賞者何人也朝廷有分司差職各有所主而于財賄出納為尤嚴經由檢察互相關防所有屢降指揮凡有支費宣司審實總所量度此古今通義而聖朝之明制也足下獨不辨何哉來書謂攻散關若得銀絹一二萬錢匹引一二十萬樁在鳯州有此重賞而敵不破滅無有也樁在鳯州與魚關何異方宣撫以攻守之䇿㑹問節使時亦不聞以此為言今散關鳯翔未破足下可與軍中議取散關要銀絹錢引若干取鳯翔要若干可以必剋本所當一切抱認足下可結罪保明具申當以聞于朝廷如克敵而賞不行僕之責若本所抱認而不能取足下當何如僕前後見將帥多是忠義赴功捐軀報國之人只緣幕中導之或非其道以至害事如姚帥之賢固不妄聽然足下自不應為此異論也萬一朝廷聞之得無不可乎之望嘗備員剡薦預有懼焉且宜勉思妙畫謹重語言勿恤小利以敗大事但得主帥成功足下復何求哉信筆不覺喋喋幸照紱得書頗自慚悔閏月癸酉將官楊大亨統領李安攻破五鬼山同統制田升統領胡洪趙豐陳濤將官馮超等攻打散關正行水門御變山金寨自二更一擁上山併力攻擊與金人戰鬭至四更時克復散關占據了當分遣軍兵戰奪和尚原金人退走寶雞三月八日甲辰寢罷扈從轉官庚子有㫖大駕視師應扈從及隨逐一行官吏軍民依紹興四年例轉一官資餘人等犒設臣僚上言臣聞爵賞之設先王所以待有功也賞而當功則賞一人而千萬人勸無功受賞則人人有覬覦之心賞將不勝給矣故古之人君不輕以與人而人亦不得而虛受豈非以僥幸之門有不可啓者歟臣伏覩今月四日指揮大駕視師應扈從及隨逐一行官吏軍兵依紹興四年例與轉一官資餘人等犒設臣有以見陛下知臣下之勤勞而欲得其歡心也然而事關利害殆有不可行者臣不得不為陛下言之且自臨安至建康其路不逺扈從官吏既預借月俸以為行李之資又優給驛劵以為傳食之費水則有舟楫陸則鞍馬于沿路犒勞胥吏普沾其視軍兵之驅馳道路事故不同雖往來跋履不無衝冒勞則有矣何功之云且至尊在塗猶不得安臣子服勞亦其常分今若例行推賞則是曲示私恩輕瀆公器適彰虛授何以勸功况比來軍中奏功頗多冒濫朝廷方欲痛懲其弊則賞典所加豈容不謹倘以謂紹興四年之例不得不遵則六年移蹕江上比之四年尤為淹久初未嘗有賞則是當時已悟前賞之非而革之矣在于今日豈可不用六年之例而乃蹈四年之失乎兼軍旅方興匱乏為甚犒設士卒固不可不勉若乃其餘自應從省臣忝扈從之列亦當受賜若自貪榮寵旁懼怨憎默默不言實負公論欲望陛下特賜睿㫖追寢前件指揮以杜僥幸之門使中外之人無得而議則天下幸甚有㫖扈從禁衛軍兵依已降指揮推賞餘依奏一日上謂近臣曰近傳到敵中賞格卿等曽見否陳康伯奏曰見之上曰其意如何康伯奏觀其語曰邊釁未息恐總兵官所請欲復取所失州縣耳上曰朕熟知金國用兵始末自尼堪斡里雅布等在時軍政極嚴不用賞典正以威刑脅制其下而人自畏服今賞格如此之重必是人不用命也康伯等俱曰聖裁髙逺非臣所及不勝仰歎九日乙巳吳璘少傅王彥節度使十一日丁未大金人使入門樞密都承㫖敷文閣待制徐嚞知閣門事孟思恭館伴大金人使入門赴都亭驛安泊洪邁除起居舍人依禮例十三日合朝見使人以朝儀未定展十六日朝見茶酒五盞差起居舍人洪邁借翰林學士充大金國稱賀使知閣門事張掄副之十八日甲寅就都亭驛賜金使御筵知樞密院事葉義問押伴十九日乙卯使人玉津園較射以雨不出二十日丙辰就驛賜實同知樞密院事黃祖舜押伴二十一日丁巳金使朝辭是日金使朝辭茶酒五盞退就都亭驛賜宴葉義問押伴二十二日戊午金使回程金使回程太常少卿王普帶御器械王謙為送伴使四月六日過界王宏收復㑹州王宏為吳璘軍統制璘遣宏收復㑹州金人陷陳州陳享祖招集忠義收復陳州金人圍之急享祖盡力禦之屢與金人戰金人益增兵享祖以孤城不可保守乃率衆力擊金人為流矢所中而死後五日城陷南門被焚已盡而鐵裹閘板落于地城中軍民爭門而出履閘板而過者皆燒損其足不能逃往往仆于門外享祖母及良賤五十餘口盡遭殺戮自是官軍唯守舊境而已聖諭招徠審處收恤民不忘祖宗涵養之澤相繼歸正者不絶朕恐士大夫分南北之限有失招徠之意卿等可審處如有官能辦者與江邊諸州軍差遣如士人願入學者即便分送庠序教養及令應舉其餘隨宜收恤如此則非惟已來者得安未來者聞之必欣然相慕而至宰相陳康伯對曰謹依聖訓當次第施行二十三日己未洪邁等過北界張子蓋解圍海州奏捷宰相稱賀三朝北盟㑹編卷二百五十
