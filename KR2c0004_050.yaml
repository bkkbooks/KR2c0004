body:
  text: 三朝北盟㑹編卷五十宋徐夢莘撰靖康中帙起靖康元年七月二十日乙酉盡二十九日癸巳秀水閒居録曰蔡京四入相崇寧九年拜相四年罷大觀元年復入三年又罷政和元年復入宣和初又罷六年冬王黼罷相白時中李邦彦並拜太少宰未㡬京東盗起京黨閧然以謂宰相望輕乃詔京復總三省許私第治事三五日一造朝時京已八十目盲不能書足蹇不能拜跪矣其子絛用事凡判筆皆絛為之仍代京禁中奏事於是肆為姦利賞罰無章黜陟紛紜絛外兄韓耜者驟用為户部侍郎宻與謀議貶逐朝士殆無虚日絛毎造朝侍從以下皆迎揖附耳與語堂吏抱文案數十人從之遣使四出誅求探訪喜者令荐之不喜令劾之中外縉紳無不側目先是王黼作應奉司總四方貢獻之物以市權寵於是效之請置宣和庫庫中置式貢司司分諸庫如泉貨幣餘服御玉食器貢等皆其名也上自金玉下及蔬茹無不籠取元豐大觀庫及𣙜貨務見在錢物皆拘撥収樁専事供進次年四月絛惡日著二相不能舉職絛兄攸發其奸狀京罷絛亦被譴是年冬金兵至闕得非將亂之兆耶蔡京乆在相位植黨擅權無敢言其罪者惟大觀中再罷政後中丞張克公一䟽及内翰林張閣一制粗能數其過惡天下傳誦張克公䟽曰臣先甞論奏前宰相蔡京罪惡顯著宜加嚴責上答天戒下慰人心未甞睿㫖施行茍依阿不言非特負陛下之責天下之人皆以責之矣義當竭力不敢但已京頃居相位擅作威福權傾中外濫錫予以蠧國用輕爵禄以市私恩謂財利為有餘皆出誕慢務誇大以興事肆為騷擾援引小人以為朋黨假借姻婭布滿要途以至交通豪民廣興産業役天子將作營葺居第用縣官人船運載花石曽無尊主庇民之心惟事豐已營私之計若是之類其事非一累有臣僚論列臣更不敢具陳若乃名為祝聖夀而修塔以壯臨平之山勢托言灌民田而决水以符興化之䜟語致妷俉之告變而繆為心疾受孟翊之訛言而與之官爵趙真欲輔之妖術張大成竊議其姦意駭動逺邇聞者寒心此皆足以鼓惑天下而為害之大者稽之古人有一于此必加嚴刑而亰兼有之乃獨泰然忽視朝廷無復畏懼人臣强盛莫甚于兹去嵗東南諸路皆罹旱暵之災者乃其應也聖恩寛貸為之保全人心不平而忿嫉之氣充塞海内星文變異豈無意耶盖京之罪戻積稔滋久上賴聖徳昭格皇天眷祐為宗社之盛福幸天下之生靈於是星文再昭示其意既甞罷京相消弭于前則正京罪不誠有待于今日耶雖天之垂象不當其事應而常無所不戒然京之罪未正乃事之最可戒者也始者京再罷相士民稱慶以謂京去朝廷必矣既寵以宫祠又許其致仕賜以蘓州南園尚無去意然以哲廟實録未畢猶可為説今書已成而去計杳然是終不可去也非天有以警悟陛下則人力何能為哉臣聞之書曰天視自我民視天聼自我民聽又曰天討有罪五刑五用哉盖天之聼因民而已君之用刑視天而已臣願陛下順民心以奉天體天道以用刑暴京罪以釋天下之疑以為人臣之戒則和氣集而灾沴消矣干冐天威罪當萬死伏望聖慈深察愚衷特賜聼納早降睿㫖張閣行責官詞曰政事所寄尤嚴誤國之誅人臣之姦莫重欺君之罪我有常憲揚于大庭太師致仕上柱國楚國公食邑一萬二千六百户食實封四千四百户蔡京頃以時才久膺柄任兩冠台衡之峻三登公衮之崇庶圖爾庸以弼予治而總秉衆務出入八年事寢紊于復來謀悉違于初議擅作威福妄興事功輕爵禄以市私恩濫錫予以蠧邦用借助姻戚宻布要途援引凶邪合成死黨以至假利民以决興化之水托祝聖而飾平臨之山豈曰懐忠待將邀福屢有告陳之迹毎連狂悖之嫌雖僅上于印章猶乆留于里第偃蹇弗避傲睨㒺悛致帝意之未孚垂星文而申譴言章繼上公議靡容顧欲用恩難以屈法其裭師臣之秩俾叅宫保之官姑慰羣情尚為寛典於戯上天垂象明罰所以弭灾人道惡盈省躬所以引咎往欽善貸無重後愆可特援太子太保致仕依前楚國公勲封食邑實封如故在外任便居住仍放謝辭陳朝老書曰臣竊觀陛下即政之初布告治朝爰立台輔當時羣臣在列聳聼以為所用必竒才也白麻既出天下失望夫蔡京姦雄悍戾詭詐不情徒以髙才大器自處務以鎮壓天下以謂自古人臣惟一切因循茍簡以為治無敢横身為國建議立志者於是出而銳然更張以謂天下後世無以復加陛下傾心俯納所用之人惟京為聼所行之事惟京為從故蔡京得以恣其姦佞玩弄無所畏忌直欲敗壊而後已觀其行法出令狥名失實無以異于兒曹稚子終日嬉戯以塵為飯以木為胾何與于饑飽哉且兒曹之戯已則棄之無有後灾以蔡京之所為求其所欲其為害豈特一方與當年盖將徧四方之廣覃萬世之遠而未艾也厥今天下何如哉官爵冗而非材雜進財用竭而妄費無已恩澤濫而僥倖成風科配苛而農民重困學校紛更而士失所業諛佞成俗而上㒺聞知恩寵擅分而人多侮法錢與物俱重而無術以平之其他害國蠧民誤上㒺君未有以指數推其弊之所生良由陛下任非其人所以致令縉紳士大夫自一命以上皆出其門人無所守各懐私恩而不知國家之公議㡬成風俗且爵禄名位天下公議權臣盗之以植私黨最為有國有家者之大患况蔡京尤深結陛下之左右近習之人故此曹為之隠蔽是以公肆誕謾無敢誰何陛下漸成孤立可為寒心幸其解去機務退處祠宫天下之人鼓舞抃蹈有若更生今既已謝事尚猶安處上都門䦨如市交結内貴其意猶欲覬他日之復用也平時出入門下之小人恐其去國失所倚恃旁為之助陛下何不察歟願陛下奮乾剛之斷勿貳勿疑置之逺方以禦魑魅庻以杜絶其望方快輿議臣甞觀其所為之事合天下之人舉以為非公論未失刼于勢利導諛成俗無一人敢為陛下言者前者之伏蒲戴豸皆伏下風各懐芻豆之爱上下相䝉未以為非臣觀考蔡京之所為合而言之則其事止于十有四曰凟上帝曰㒺君父曰結奥援曰輕爵禄曰廣費用曰變法度曰妄制作曰喜導諛曰鉗臺諌曰熾親黨曰長奔競曰崇釋老曰窮土木曰矜逺畧散而言之其事數十萬言豈毫楮所能載臣久困覊旅不能具紙墨陛下不以臣不肖願詔有司給筆札使臣得盡胸中之所言寫天下是非之實以告陛下臣死之日猶生之年草茅無知輙議國家大事罪合誅夷干犯天威臣無任瞻天仰聖激切屏營之至右正言崔鶠劄子臣謹按賊臣蔡京隂蓄異謀潛窺神器故竊爵賞買天下小人以為朋黨相與遮蔽人主耳目卒致敵國侵凌直至畿甸宗廟震動社稷蕩搖上皇南廵肅王北質百姓屠㓕天下之賊其罪有大于京者乎此誠祖宗神靈之所􅋀齒也陛下安得而赦之伏望特賜睿斷斬此姦臣為萬世亂臣賊子之戒取進止又劄子臣謹按賊臣蔡京以奸邪之術誑耀人主大類王莾而朋黨之衆則又萬于莾莾之奸也制井田更錢幣說六筦造明堂起辟雍建靈臺頒時令築學舍萬區以誑耀其君於是卒攘其國而有之而京賊亦用此術其意安在然莾之腹心不過王舜劉歆等數人豈如京賊收天下之士以為腹心乎遂至盗賊蜂起外侮日逼雖宗廟神靈為之震駭然則京賊之罪宗廟神靈之所不赦陛下安得而赦之伏望聖心獨斷戮此巨奸以為世戒取進止二十六日庚寅詔解圍太原詔曰朕惟金人攻圍太原百五十餘日其勢危蹙惟兵與食最為急務而朝廷於此二者措置殊未有方毎於警奏不過督責諸將俾令進師既不益兵又無見粮安能使之必戰既戰又安能使之必克進者屢衂其弊盖出于此朕毎一念疾首痛心寢不能安食不知味今聞强敵築壘臨城控扼要害援師不可進粮道不得通勢益危廹卿等宜究心悉力廣加詢謀益兵置粮不吝爵賞以勸用命明其政刑以威不恪須管太原解圍若稍有誤事不惟卿等負朕倚注之意朕于負荷之重亦豈委法以茍私卿等哉二十七日辛卯解潛自威勝軍進兵屯于南闗初諸將議進兵劉韐以河東宣撫副使至隆徳府張俊苖傅皆𨽻麾下與諸將期七月皆進王淵與韐出平定軍遼州路解潛折彦質出威勝軍路張灝折可求出汾州路尼堪時在太原聞援兵至乃多積粮于南闗佯若聞潛至而怯懼者匿强壯兵馬使輕兵守之戒之曰解潛必自威勝軍先趨南闗俟其至則偽遁潛遣人探止有輕兵乃以兵趨之金人皆偽遁潛以為真遁漸遣人運其粮食金人猶未動已而潛悉遣士卒車馬運粮已裝載就道而金人之兵衝突而至官軍不敵棄粮而潰死者相枕藉自此潛不能軍矣張灝及金人戰于文水縣敗績張灝者孝純之子也朝廷以為河東察訪使招河東義勇禁軍五萬由遼州以夾援太原灝命統制張思政為前鋒遂同折可求到文水縣上賢村馬村下塞金人毎日出沒遇官軍則偽遁未甞有勝敗而思政以為不足慮遂不設偹金人忽取别逕至思政失措官軍遂大敗初朝廷命可求節制麟府路軍馬往救太原也知麟州楊宗閔告可求曰朝廷命公解圍未審由何路以入若路出汾陽以歩兵當突騎未見其可願節制建上將之旗鼔行而聲言救晉假我精騎二萬攻其必救之所則太原之圍必自解矣可求善其言而不能用卒至于敗僅以身免可求以便宜陞宗閔為前軍統制軍馬河東路兵馬鈐轄傳信録曰七月二十七日諸路進兵平定軍遼州兩路劉韐王淵主之威勝軍路解潛折彦質主之汾州路張灝折可求主之而宣撫副使察訪使勾當公事皆承受御前處分事得専達進退自如宣撫司雖有節制之名特文具耳余奏上以節制不専恐誤國事雖降指揮約束而承受専達自若也至期出師解潛與賊相遇於南闗轉戰四日殺傷相當金人増兵潛軍力不能勝而潰平定遼汾之師皆逗留不進其後張灝又違節制用統制官張思政復文水縣已而復為賊所奪余極為上論節制不専之弊又分路進兵敵以全力制吾孤軍不若合大軍由一路進㑹范世雄以湖南兵至即薦宣撫判官方欲㑹合親率師以討敵而朝廷之議變矣勅御史中丞張徴追童貫行刑臣僚上言臣聞事有其失甚微其貽患有丘山之重而不可勝救者廢置與誅賞是也請以古事騐之昔漢既誅董卓不及赦凉州部曲李傕郭汜知不免矣激其下以叛遂貽漢室之禍此當赦而不赦之失也唐徳宗有涇師之變倉卒出狩或勸取朱泚殺之否則相逼為亂將大徳宗不能用涇師得朱泚果稱僭逆遂陷京師賴有良將相與戮力僅能克復此當誅不誅之失也臣切觀童貫以閹臣僕隸之微盗有兵權㡬二十年其壊祖宗軍政闗兩河邊患結新造之金人棄契丹之舊好禍及華夏至于今不止其過惡誤國在蔡京父子王黼之上然其誅斥獨輕于二人公論固已欝矣臣為陛下言其大者以消未萌之禍童貫乆持内外兵柄陜右諸路道勁兵號曰勝㨗隂常蓄飬為牙兵以市私恩其督戰也不使之臨行陣特以自衛而己戰而勝則歸功厚賞不勝則擁之以遁其賞功之猥濫至數千人皆為將校驕縱飽滿無復鬭志其實有戰多者皆抑而不賞使西北戰士歸怨朝廷者皆貫縱之使至此也其隨上皇之南狩也貫刼之東下日用劵直或旬時犒賜至純用金銀以給之過為優厚冀得其死力朝論洶洶至今以為疑也臣又觀近日張思政領勝㨗餘卒敗于河東疑潰而東歸宣撫副使李彌大執思政而戮之復遣敗亡餘卒赴真定為援將卒疑懼挾其渠首以叛淄青至今震動貽患一方論者恨其遣潰師之遽而誅思政之早也則漢不赦凉州部曲事之大小雖異其失則同矣臣所謂其失甚微而禍有丘山之重者也雖然此已往之失不可復追未然之事尚可圖也臣聞諸道路山東叛卒文其旗曰負寃勝㨗意欲自沂宻入冦淮浙萬一聞貫尚在數懐畜養之恩一旦烏合豈不大為東南之患此臣所以夙夜過計不能無涇師得朱泚之憂也陛下豈得不過為之慮哉况貫自用師持權以來毒流華夏以無事無罪之民驅之死地所殺傷者不啻數十萬衆縁貫而破産流離者延及四方之民皆陛下之赤子也今以誅一貫之身曽不足少謝穹蒼之怒兆庶之怨陛下尚疑而不忍者此微臣之所不曉也伏望陛下遣一介之使即貶所正典刑聲其罪惡以謝天下無辜之民以絶羣小懐怨之望又上言臣竊以謂祖宗垂憲于治安無事之時殺大臣焉當在所戒後世有亂天下危社稷而不殺之非祖宗之志也况如貫者閹腐刑餘在祖宗時止堪掃除之役豈真所為大臣者哉貫握兵柄㡬三十年大奸大惡不可縷數臣獨論其可殺而不可赦者壊太祖皇帝之兵制敗真宗仁宗皇帝之信誓通萬餘里之强鄰殘百餘年之與國蕭后欲歸却其表而不受遼主潛遁指其蹤而使擒契丹舊臣痛入骨髓假手女真俾之報怨旁結西夏共為敵讐金騎欲入貫猶趣住太原敵破忻代即捨太原以歸具舟檝載所親兵之家属佩陜西河北河東路宣撫使印浮汴渡江淮而去於是時何有陛下奈何卒赦之又上言臣謹按童貫以奴𨽻之資荷不世之遇浸縁恩寵包藏禍心近者臣僚論其罪惡偹載章䟽以其養兵于家儲甲于庫有潛謀不軌之兆陛下寛容姑投海裔今者竊聞有司檢校其家器用復有校椅以青龍首金銀絲背為飾者士論傳駭以謂不軌蹤跡暴白無甚于此臣愚聞之史氏為國者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能植則善者信矣貫之誤國召兵㡬危社稷兩觀之誅已後天下之望今暴其罪惡復出其不軌之器茍復置之何以為巨奸元惡之戒奉聖㫖童貫罪十首薦朱勔起花石引趙良嗣㓕契丹修延福宫等朕在東宫屢為搖動冊立之時有異語不俟勅命擅去東南差留守不受命東京解圍聞之而去家中有非法之物私養死士前項罪不容誅差監察御史張􅊹將帶開封府公人前去追童隨所至州軍行刑訖函首赴闕當議賫送宣撫司軍前一行人漏泄者依軍法其子孫已降指揮送吉陽軍編管見隨童貫子孫仰張􅊹交割與所在州軍選差官多差兵級管押前去如在别州軍即移文監司依此施行二十九日癸巳右武大夫温州觀察使提舉河北西路保甲兼權提㸃刑獄權真定府李邈除青州觀察使知真定府是月空日遣使與金人元帥皇子二書宣和録曰七月空日大宋皇帝致書大金國相元帥比因専使甞已布書具載悃誠想加通亮但以三鎮之民懐土顧戀以死堅守雖令不從遂至宿師引日已久重兵民各為其主困于暴露深可憫傷是用欲三鎮税租組充嵗幣既不失通和之議抑亦為長乆之圗諒惟仁明必能矜察已遣使大金皇帝及皇子郎君今再命單車復陳本末願加聰亮有少禮物具如别幅秋暑尚熾更希保䕶白七月空日大宋皇帝致書大金國皇子郎君比常布問具致悃誠近因使介之旋尤詳修好之意但以三鎮之民懐土顧戀雖令不從以致宿師引日已乆重兵民各為其主困于暴露深可憫傷是用願以三鎮稅租組充嵗幣方昭大信諒不受于間言將究逺圗豈自生于細故俾長利于兩國在仁人之立談想為英聰必能體亮已遣使大金國相元帥今再命單車復陳本末願加聰察有少禮物具如别幅秋暑尚熾更希保䕶白尼堪大起雲中路民兵之太原王安中臨江軍安置臣僚上言謹按王安中昨自尚書左丞建節知燕山府委任之寄重矣借令無才可辦邊事至如敵勢强弱與沿邊兵食乏闕饋運艱難民户殘弊衆所共知者自合條具實狀逐項奏聞使朝廷灼見利害審定取捨早為備禦之䇿而安中畏避童貫専務䝉蔽終不端言其事數奏祥瑞誣㒺諂䛕以固寵禄養成邊患一旦敵騎長驅燕薊覆沒深入畿甸社稷㡬危推原本因其罪與蔡攸等耳今臣僚論列以謂行法未盡乞斥諸逺方少為誤國者之戒雖責授散官復處漢東近地恐公論不以為允矧以太原被圍師屯未解强隣壓境朔部戒嚴若不恃賞罰之公厭服物論何以正其䝉蔽欺君之罪奉聖㫖移臨江軍安置三朝北盟㑹編巻五十
