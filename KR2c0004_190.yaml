body:
  text: 三朝北盟㑹編卷一百九十宋徐夢莘撰炎興下帙起紹興八年十二月一日癸丑盡其日大府寺丞某人再上書書曰臣去年十月嘗上書陳狂瞽之説冒聞聖聽繼䝉睿恩召臣賜對擢丞大府今已一年臣之説曰臣聞天下事成敗得失在理不在形形者衆人共争之地理者衆所不見之處共争之地舉世皆足以知之不見之處非髙智逺識者不能辨願陛下㳺心于所不争之地以求治安之理勿貪功于須㬰勿喪志於多屈陛下得治安之理而行之則足以知彼敗亡之理矣夫椒之㑹越人行成于吳吳王從之吳有亡之理也當時惟伍子胥范蠡識之鴻門之㑹項羽縱沛公使去楚有亡之理也當時惟范増張良識之方夫椒鴻門之舉乃夫差項羽盛時如四子言其亡形于數年之前者以理知之也何則以兵雄天下雖盛時尤當懼禍而敢以厭亂之乎楚靈王克陳民從亂如歸智伯好勝不已忽斃于肘腋之變金據中國且一紀矣天之假祐不善非助之也厚其兵力而降之罰金猶不悟耳晉髙祖欺天叛主倚遼為主不能存世叛亡無餘趙徳鈞為耶徳光謀徳光乃以其子延夀為罪首其後滅無餘類彼劉豫者助金為虐敬塘徳鈞之禍豫必不免臣之為是説葢亦揆于理知其有然者也是時朝廷先遣王倫奉使敵庭既復命而劉豫已為金所逐臣之説似一騐矣未㡬王倫再使舉國紛紛各出異論陛下慨然乃主和議陛下㳺心于人所不争之地以求治安之理而能獨見照明知此邦既得治安之理則知彼敗亡之理安知臣之説不終騐乎今年金使烏陵思謀來遂有和議今又遣張通古蕭哲來聘且許交割河南地界還梓宫歸東朝淵聖皇族議者雜然益以為詐已而見使人過索禮儀又肆臆度之説何衆人之難曉一至是乎臣夙夜以思陛下之所以奉天天之所以統佑陛下無過此舉深慮或者臆度之説少眩聖慈皆不惜一日之屈而惰其初心薄物細故闕輒廣前説以固聖意之所得臣聞柔能制剛弱能制强柔者徳也剛者賊也弱者人之所助强者人之所攻故三畧曰莫不貪强先能守㣲聖人存之動應事機蔵之胸臆而敵國服又曰敵强下之敵陵待之敵暴綏之敵悖義之陛下推徳用柔守㣲觀變以應今日之事機用是説矣太公告文王曰争勝不鬬大兵不創鷙鳥將擊卑飛斂翼猛獸將搏弭耳俯伏聖人將動必有愚色尉繚子曰機在于應事政在于意表勇在于畏小智在于治大陛下從金人之和而遂忘父兄之深讐宗社之大恥乎葢將以有為也如是則沉機制勝畏小治大應是説矣孫武曰利而誘之卑而驕之吳起曰兵有五曰義曰强曰剛曰暴曰逆義必以禮服强必以謙服剛必以辭服暴必以詐服逆必以權服今與之和乃所以誘之也自卑乃所以驕之也彼以强我以謙彼以詐我以權合孫吳制敵之道灼然無可疑者又十二伐亦曰因其所喜彼將生驕茍能因之必能走之又曰卑辭委聴順命而合彼將不争堅節乃定又曰厚賄而錮其心致其大尊以偷其志下必之信以得其情足其富貴以塞其國又曰養其亂進其謡誘之以大勢上察而與天下圖之凡古人所以自屈而就事者於十二伐而有七説合陛下今日之所為使古人言皆不足信則已使一可信焉陛下豈不遂得志也哉昔之論兵法之要者曰凡兵之道莫過二者獨闕又黄帝之書曰一者潜于通機神周之志於勢成之在於君臣固知紛紜者不解此也然此皆陛下求冶安之理游心于衆所不争之地而得之者固紛紜之所不解至於今日之事殆有顯焉不可不議和者臣不得不屢陳之陛下已得其妙而㣲者矣是豈不經聖慮而屢陳之者庶㡬驚撓紛紛之人而息其説也魏武侯與吳國論六國之俗至于燕則曰燕陣守而不走擊之之道當陵而逺之馳而後之謹我車騎必避之路至于三晉之入中國也來則振去則追可捲其師燕近于邉境自古中國之於邉境無能盡滅亡葢以其兵為生也邉境紛爭無盛于晉方其六國之長雄于中原其相吞滅者皆邉境耳劉淵則石勒滅之石勒則冉閔滅之冉閔則慕容垂滅之西秦則赫連定滅之西凉則沮渠䝉遜滅之南凉則乞伏熾磐滅之後燕則髙云滅之元魏所滅者三劉裕所滅者二晉桓温所滅者蜀李勢而已苻堅一舉而敗於合肥李靖謂非謝桓之善乃苻堅之不善時為慕容垂所陷也由是言之紛紛者之論以謂養吾兵一舉而足以滅敵者亦不通乎古今之説也兵法説害天下者天下閉之殺天下者天下賊之窮天下者天下仇之危天下者天下灾之金人肆行不顧窮于天下久矣天下懐不共戴天之心不欲淪于異域之俗其怨薫天也殺人之父兄利人之貨財臣妾人之子女皆敵也天于大敵終祐之乎是二者天必有以處之又况天下戰國五勝者禍四勝者弊三勝者伯二勝者王一勝者帝敵之勝豈止五哉其禍可立待也以此知陛下行吾治安之理以待敵之敗亡真通乎古今之説畏天下而奉天道也孟子曰太王事獯鬻勾踐事吳畏天者也太王避地天相其心勾踐事仇天相其策相其心故肇基王迹而周之卜世至于三十卜年至于八百相其䇿亦足以雪恥而伯今陛下以太王之心勾踐之策顧不可乎陛下達孝于父母至恭于兄弟親睦于九族一舉而悉如吾志此又天相陛下之明騐也天相陛下則相天下之人可也相天下之人則所以處金國者又可知也臣聞興師十萬則不得操事七十萬家古人以用兵喻圄人情曰小圄不下數人中圄不下百數人大圄不下千數人十人聨百人之事百人聫千人之事千人聨萬人之事使良民百萬聫于囹圄上不能使此危道也今日之議成雖未可以去兵而可以少休兵矣不得操事七十萬家與聫圄者百萬獲息肩之樂顧不可乎善用兵者役不再籍粮不乏貧於師者逺輸故運粮百里無一年之食二百里無二年之食三百里無三年之食國虛則民貧民貧則上下不親敵攻其外民盜其内是謂必潰此今日四川之事事大可慮民流者親之地不任者任之主勝之道故兵法以城稱地以地稱人以人稱粟為可以固守可以戰勝今四方之民流者不得親四方之田荒者不得耕今日之議成則兵之戍於外者可以移于近兵之冗於食者可以汰而減興農桑而省餉運俾四方萬里舉無科抑怵惕之勞天下雖未能去兵而三稱之説已行矣顧不可乎出不足戰入不足守者古人治之以市市者百貨之官所以給戰守也萬乘無千乘之助必有百乘之市故曰提天下之節制而無百貨之官無謂其能戰守也今闗市重斂賈商不通財貨彫虗錢寳空乏公私掃地亦立匱之際也今日之議成費可漸積商可漸通錢可漸増變警擾之習為阜民歸遷徙之勞為永業俾城郭郊野舉有還定之安出足以戰入足以守顧不可乎是四事者至易曉也而紛紛之説猶不解焉葢亦未之思耳或者又曰無約而請和者謀也辭卑而益備者進也臣應之曰陛下遣使以和請金以和應非無約而請也使人之來徜徉境上舉止甚髙言辭頗倨非卑卑也金以和應出於實矣然曰無約則不可曰益備而追亦不可在我所以自治而待之者何如也夫聖人御世觀盛衷得失而為之制非計策無以決疑非譎竒無以息冦非隂謀無以成功此陛下大有為之日也臣於此多有説焉倘得丹墀咫尺之地使臣獲奉清閒之燕以畢其説非特臣之幸寔天下之幸此書傳來原本多好存之疑以傳疑胡銓簽書武威軍節度判官聽公事胡銓以上書乞斬秦檜孫近王倫遂罷樞宻院編修官歸鄉里舟行至池州貴池口岸下以書報提舉常平方滋滋嘗為樞宻院計議官與銓同舍乃出城至貴池口見銓于税亭中銓曰曾有近報否滋曰云云又問曰銓負罪之日别有指揮否滋曰近報令與合入差遣銓曰上書君父又何差遣滋曰樞宻院属官陞擢則無不可者若合入差遣不在諸州簽判之下銓黙然樞宻副使王庶罷為資政殿學士知潭州兼湖南安撫制置大使王庶累奏劄乞治兵戎不講和不省遂以疾乞解機政五上章而後獲請以資政殿學士出知潭州及陛辭力請曰以臣異議罔功必致人言乞改除一宫觀差遣不允復温言諭遣之王庶辭潭州臣今月二十二日準尚書省劄子䝉恩除臣資政殿學士知潭州者聞命震驚莫知所措伏念臣材術疎陋疾病侵陵屢控悃誠乞避機宻覬逃曠弛免負使令敢謂徳意優隆徽數腆縟俾出通班假守大藩臣雖至愚曷可妄受潭州實巨鎮為江表之上流是宜慎擇老成用寛優渥臣本以識昩置之閒散獲少遂于夙心而乃冒寵叨榮必有乖於清議矧長能淺薄懇辭宥密之司豈可更加崇資重任濫膺藩宣之寄決致敗事仰誤聖知伏望大慈特垂矜察収囘渙號久穆師言所有前件恩命臣不敢祗受欲乞一在外宫觀差遣粗安㣲分以養衷殘異時溝壑未填筋力稍復誓殫犬馬之勞仰答乾坤之施臣無任懇祈激切之至劉錡囘軍行在劉錡自鎮江府撤戎囘歸行在所也知平江府向子諲致仕初張通古持金人詔來經過平江府向子諲不拜而請致仕許之劉大中王庶並落職遺史曰劉大中已得宫祠王庶除知潭州蕭振言大中不孝庶沮撓講和事大中落職依舊宫祠劉一止行大中詞曰含齒之内並知篤于愛親垂齠之童亦羞稱于不孝豈有居儀型之重任為名教之罪人又曰亡所生之天属視厥父如路人㸑烟不同寢疾弗問事皆有狀聞者寒心庶詞曰大言惑衆小智飾奸既陳立異之辭施有壊成之意倘謂講和之非䇿則雖執義以何慚乃因知己之莫留如欲脱身而邀譽第務死黨不知有君是月金人改天春元年詔威武軍遣王忠民至行在王忠民字子道河南穎陽人也世業醫忠民通經史尤明于刑名杜門却掃人罕見其面宣和六年童貫為招討取燕山忠民聞之曰祖宗與遼人有齒唇之好今信奸臣之計而輕棄之禍至無日矣既而金人渝盟復取燕山徽宗方悔悟亟下詔曰豈無四方忠義之人來狥國家一日之急忠民讀詔泣下曰其果然矣淵聖傳位金人為城下之盟而還淵聖詔曰應朝廷之闕失政令之僻違保邦御衆之方安邉禦敵之策自今中外臣僚民庶皆許直言寔封以聞雖有過差弗加譴責忠民乃著安邉休征書又畫圖遣人詣北軍達金人二主及執政大臣又著保闕圖長慶書十一䇿經民守業書四策通利養民書三策去冗裁俗書十一䇿經河南府投進靖康元年冬詔忠民赴闕辭以病十二月金人逼洛陽留守王襄南竄忠民募得張義齎書開諭元帥又以策干永興帥范致虗范喜之而不能致也建炎元年金人板榜有弔民伐罪之語忠民作六論以辨宻遣諜者散于敵境且以副本獻于朝二年有詔西京制置使翟興津遣而道阻不通三年問解制置使李彦先欲致忠民亦辭以疾翟興徙治藥川忠民避地南下遇商虢撫鎮使董先于内鄉因留之軍中事以師禮紹興元年金立劉豫為帝忠民作九思圖及定亂四象遣人達之金帥又鏤板印圖散于遼境及偽齊以斷天下之疑宣撫張浚制置王庶皆欲補以官不受遂薦之朝三年至行在見宰相吕頤浩樞宻徐俯皆拜舍于政府翼日補宣教郎忠民乃以誥納木匣中題其上云本心報國非求名禄蔵匣于七寳山下既見所奏留中方懇去是時董先軍豫章往依焉次年撰三國和議鏤板廣傳乃遣使臣岳知常散之敵境而知常為堠人所執以擅越外界編置忠民于福建未㡬得釋八年三詔威武軍津遣忠民造朝力辭恩命罷歸十年挈家過臨安卒時年七十五子正卿節二十六年𦵏于鄂武縣治三朝北盟㑹編卷一百九十
