body:
  text: 三朝北盟㑹編紀事本末類提要臣等謹案三朝北盟㑹編二百五十卷宋徐夢莘撰夢莘字商老臨江人紹興二十四年進士為南安軍教授改知湘隂縣官至知賓州以議鹽法不合罷歸事蹟具宋史儒林𫝊夢莘嗜學博聞生平多所著述史稱其恬於榮進每念生靖康之亂思究見顛末乃網羅舊聞㑹稡同異為三朝北盟㑹編自政和七年海上之盟迄紹興三十一年上下四十五年凡敕制誥詔國書書疏奏議記序碑志登載靡遺帝聞而嘉之擢直祕省云云今其書抄本尚存凡分上中下三帙上為政宣二十五卷中為靖康七十五卷下為炎興一百五十卷其起訖年月與史所言合所引書一百二種雜考私書八十四種金國諸録十種共一百九十六種而文集之類尚不數焉史所言者殊未盡也凡宋金通和用兵之事悉為詮次本末年經月緯按日臚載其徵引皆全録原文無所去取亦無所論斷蓋是非並見同異互存以備史家之採擇故以㑹編為名然自汴都喪敗及南渡立國之始其治亂得失循文考證比事推求已皆可具見其所以然非徒餖飣瑣碎已也雖其時說部糅雜所記金人事迹往往𫝊聞失實不盡可慿又當日臣僚劄奏亦多夸張無據之詞夢莘概録全文均未能持擇要其博贍淹通南宋諸野史中自李心𫝊繫年要録以外未有能過之者固不以繁蕪病矣考夢莘成此書後又以前載不盡者五家續編次于中下二帙以補其闕靖康炎興各為二十五卷名曰北盟集補今此本無之殆當時二本各行故久而亡佚歟乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2ba5da78b4ac94910c7b405fd62058f72336eeacf5379321b27040cd1b97c58d
