body:
  text: 三朝北盟㑹編卷六十五宋徐夢莘撰靖康中帙起靖康元年十一月二十六日丁亥盡三十日辛卯二十六日丁亥王瓊鄭建雄以兵八千來勤王王瓊厯官中山府路馬步軍副總管嘗從种師中戰金人於榆次至是京師受圍瓊以兵勤王朝廷以為京城巡檢上賜白旗書忠義二字以旌之孫傳為同知樞密院事李回為尚書右丞詔安慰軍民詔曰朕遣使通好交馳道路敵勢未已慿陵侵犯緣將帥未能協心遂使一嵗之中郊畿再擾朝廷豈以地害人已召諸鎮兵入援拱衛王室在京軍民宜體上意無為驚擾金人將至市井傳播之言不一軍民訩訩不安或倡言軍人欲殺內官者由是內官不得上城傳宣者以黃旗為號或以謂軍民輩欲乘間搔擾朝廷患之百姓再被圍城人情驚擾乃下是詔殿前指揮使王宗濋薦拱聖副都頭郭京可以擲豆為兵且能隱形今用六甲正兵得七千七百七十七人可以破敵臨敵正兵不動神兵為用所向無前殿帥王宗濋驕慢無識聞而異之薦京可以成大功是時唐恪為宰相見京面折之曰老兵兒戲果能了否京不答羣臣議論不一數日恪罷用何㮚為宰相與孫傳諸大臣亦幸其術之可用乃以錢絹數萬令京自招兵于市旬日之間數足皆游手不逞之徒京自副都頭授武略大夫兖州刺史統制六甲正兵屯于天清寺以六甲正兵標于大旗有薄堅者能桿棒在街市作場京取以為教頭京城居人不論貴賤老幼無不喜躍皆以天降神人佑助滅敵惟有識者哂之為之寒心又有還俗僧傅政臨者謂之傅先生獻䇿略自能退敵願得募勝兵朝廷從之賣藥劉朱傑及啇賈竒術言兵機退敵募兵而身為其將者衆詔置功賞司詔曰朕詔爵賞以旌天下戰士實無吝惜緣有司推行未至士情紛怨歸咎宰執朕于尚書省置功賞司専委官吏第别髙下無或留滯咨爾軍士念祖宗創業幾二百年涵飬汝父祖族屬恩德至厚艱難之際無或二心凡有侵犯宜體念家併力殺拒以稱朕意春初守禦念有合被恩賞未曽推行者軍士于城上發怨言歸罪宰相唐恪朝廷聞之乃下是詔少宰唐恪罷尚書右僕射除觀文殿大學士中太一宫使先是唐恪建言金人今冬必來力勸上為避敵之計乞早幸洛陽或幸長安召天下兵然京師諸軍懷土不肯去乞速四道總管扈衛而行上以為然而領開封府何㮚奏事上以恪之言問何㮚曰雖周室東遷不如是之甚譬如不肖子盡挈父祖田宅而粥之而左右之人亦皆不欲遷次日上激怒曰朕當死守社稷恪力請罷相遂以觀文殿大學士太一宫使兼侍講罷侍御史胡舜陟上言臣十一月十七日奏狀條具備用十事其一云今大臣皆非其人唐恪聶昌尤務為奸非虛言也皆有實狀請為陛下言之恪天資貪猥素行不義知滁州日貪汚之迹尤著在任委屬邑買木不償其值舟載至和州蓋宅凡瓦竹之類悉自滁往近人役夫皆滁兵也以充私用當時為臣僚所論遂罷州事其後蔡京復拜相引為刑部尚書京罷相出知潭州今春已參預政事邊防大計自宜與宰相協力有為若宰相强復自用當以謀畫之方告于陛下安坐伺其敗而奪其位自為謀則善矣豈不誤國乎及恪為相至今邊事亦何所措置不過如徐處仁吳敏充位而已然亦處仁之不為姦也恪之智慮但長于交結內侍盧端王若冲與之密交凡諸􅉏御皆以欽叟呼之比召李懿至中書議事問恪之言徐以手握恪之帶曰至道處置安有錯者諂奉百端吏皆鄙笑凡內侍送御封文字至其家無不解帶促席深相結納臣頃侍班上殿親見恪與內侍昵昵耳語久之而不已自昔宰相為奸必先結宧官刺中㫖以中人君之欲又使之延譽稱美以固寵位唐之李林甫近世蔡京王黼用此術正人端士肯若是乎詹度燕瑛胡直儒皆天下之至小人恪黨庇之臺諌交攻不肯施行聞嘗受度瑛直儒貨賂故曲庇之恪本州縣俗吏素未嘗識賢士士亦恥與交遊故今日所用庸陋貪末之人省部郎官尤為冗雜獨任私意遂廢資格言僞而辨能反是為非譽邪為正昔在蔡京門見京與其子修論事時而各為語言士大夫皆道之以為口實此少正卯之徒聖人所必誅者往往在陛下前言語反復前後不一如今日欲棄地與不棄地皆自其口出大率言行皆效蔡京如近議三鎮不欲出于已令集百官廷議及百官議上即陽言不棄地議棄地者分為三等此與京分書為三等無異京以上書分等置之􅖄於以杜天下之口而肆其奸今恪又欲以三等罪士大夫適事勢迫切不可不與地而奸計不得行使敵勢稍緩士大夫得罪者多矣朝廷復有大議誰肯直言此亦杜天下之口而肆其奸也若延慶走後急遣行敵兵亦不至河豈有求為界之事敵兵未嘗求輅冕尊號即急與之其不知機如此可任天下之事乎自夏以來所用以為宣撫提兵而出係國安危李䌏李彌大折彥質士大夫皆知其不可恪豈不知之知之而不言聼其敗事豈為國之心哉以天下之大固不可盡其責擇賢太守如河東數郡及懷衛河陽鄭不能擇忠義有謀者守之使敵長驅如入無人之境守河以護都城亦不擇人而用之使兵望風而退汜水關之險密邇都邑亦不預為之備今京城守禦踈略兵將無所統一人情不能安堵則宰相安用哉其無所能槩可見矣但知為奸不勝國事豈不負陛下寵任乎聶昌則奸人之雄小人之尤凶暴者因陳邦光引為蔡京之客在京之門専事口語輊軒事機而京尤善之不次擢為户部侍郎未及尹京欲為蔡京傷王黼及為黼所中而罷居鄉郡倚州縣之勢奪豪人之田宅州縣請託招權納賂無所不至為臣僚所論責居湖外蔡攸方圖為宰相以昌凶悖可用遂召至闕今春士人伏闕昌為尹詣太學謂諸生曰王時雍欲盡殺公等而昌勸之遂已豈不見時雍親戚皆請假去乎以虛言悅士人而士因上書薦昌為樞密者甚多昌之詭詐不情大率類此撫州范世英訟昌奪其物業昌曲法編管世英行三程而卒使管押之人害之也復追世英之父興祖禁府獄雖有指揮送大理寺而昌不發遣使大理官就府推勘有刑獄以來豈有是事若是理直何必留府昌欲害世英三世而報怨慘酷如此豈有人心哉閣門祗候陳申昌怒其教世英作狀追捕繫獄毒楚備嘗鞭兩股皆爛百姓左右時為世英送食昌以事誣之痛决至死刑之寃濫一至于是豈無怨氣傷天地之和致上帝之怒江鋒昔為撫州教官與昌有隙鋒比至都城輒差人押出門開封捉事使臣范振受贓三百千大理勘正編管昌乃留密院生殺豫奪之柄皆在昌手殆不復有朝廷矣蔡京童貫愛婢皆畜于其家貫有名馬有指揮令昌取納乃送太僕寺因賜馬取為已有方軍用度不資之時開封有錢宜助國用昌乃請萬緍為私費嘗為臣僚所論守禦司寄姓名如術人栁彥輔號知足道人者與官寄名緩急之際何賴焉今日募兵尤為急務諸路差人召募皆昌故舊輕薄小子如謝丁者是也布衣不問與官能否各與官告數十道使之妄用京城望兵如渴思飲乃以為私恩豈忠純體國者哉李平西庸陋不材家有美婢而昌恱之引為少尹復使之權樞密都承㫖方用兵之際承㫖豈容不材者居之唐恪知昌姦雄可畏牢籠使為已助昌知恪有力亦深結之士大夫目恪昌為死黨朝廷有此二奸所有政事不修威刑不振人材無一可用將士莫肯用命不足怪也奉聖㫖唐恪除觀文殿大學士中太一宫使汴都記曰唐恪為相恪父更昏懦無能軍民且欲擊之馮澥對上曰陛下以曹司為相指恪唐所薦為樞密指昌事將奈何靖康小録曰唐恪夜出百姓拋瓦打破燭籠上知之以為失人心遂罷恪二十七日戊子中書舍人孫覿狀論侍御史胡舜陟遷都事乞賜開納今月日本省送到侍御史胡舜陟乞遷都奉聖㫖令舜陟分析臣伏見舜陟實有區區愛君忠國之誠心而辭不達不足以感動聖聰臣詳味其言推言其用意蓋謀臣議事先見之明為宗廟社稷計萬全不可不察也今春斡里雅布擁衆數萬長驅而至陛下封疆之臣州縣之吏防河之兵望風逃去無一人致忠效命與敵校者遂至京師如踐無人之境劫寨之敗一軍盡覆將官姚平仲跨一駿馬遁去金人初不料堂堂中國之大而技止于此也今聞斡里雅布將由河北尼堪由河東舉國大入以臣料之士馬之衆必數倍于前日陛下宿將如种師道已病亡种師中為許翰以逗留督戰日受三四檄不堪其辱赴敵而死太原之圍李綱頓兵懷州千餘里外不能救亦已陷沒李彌大妄殺立威誅勝揵統制官張師正一軍反側散去為盜山東淮南兩路為之騷然臣承行直學士院被㫖選祝冊禱河神望其冬三月河流不氷復有獻計者宜聨數百艘宿火其中可謂兒戲而郭京者獻六甲法欺紿朝廷尤為妖妄臣在都堂客次適與京遇因問京曰學士院中書省街司十數輩盡投六甲兵去矣此市井小兒豈堪戰耶京曰只要他拾敵人頭耳臣又問曰用誰斬敵人而使此輩拾耶京不答靣慍怒發赤是時翰林學士承㫖并給事中安扶中書舍人李曽李擢在坐聞之相視太息而大臣又論奏侍從官妄議沮軍悉差上城分守四壁朝廷所以被敵者設施措置之如此則舜陟建遷都之議不為過矣今有千金之子一聞盜入境左提妻右挈子羣趨疾走以避一旦倉卒之變而不復顧其家况今敵人以百戰百勝虎狼之師鼓行而至進無禦其前退無躡其後乃欲禱祠神鬼尊信妖妄使萬乘之尊端坐九重以須其來危孰甚焉萬一有如王芮之言兩軍既至城外州縣聚落燔燒五百里掃蕩一空則孤城巋然獨存何以為國昔者太王不忍鬬其民避敵去岐百姓歸仁文武之興子孫傳世八百餘年伏望陛下審彼已奮神斷視强敵之勢方張如彼而朝廷禦敵之備如此不憚旬日之勞徙建别京圖萬全之䇿如舜陟之議特賜開納天下幸甚二十八日己丑南道總管張叔夜以兵一萬三千人前來勤王初張叔夜以南道總管統集京西南路荆湖北路之兵十五萬八千將赴京師而朝廷以議和止之散兵分屯庚辰復承召兵之命倉卒間得兵一萬三千其子伯奮為前軍仲熊為後軍某為中軍即日進發行至建昌府值西道總管王襄領兵南道叔夜見襄曰公何往邪叔夜曰金人在郊甸主人坐席不安欲以兵勤王襄曰敵兵甚盛不可往也叔夜以為不然欲率襄同至闕下襄不聼叔夜乃自頴昌與金人十八戰至城下屯于玉津園二十九日庚寅駕幸京城東壁上小帽乘馬衛士擐甲或袍笠而從撫勞將士軍兵增秩賜帛有差三十日辛卯承務郎安堯臣上書謹昧死裁書獻于陛下臣觀陛下纘承之初首用吳敏右相使之代天理物而制曰定禁中之䇿靖我家邦且上皇始厭萬幾內禪于陛下陛下天性至孝感泣退避慈諭數四方即大寶此乃天命人心咸有所歸敏何與焉當制學士非敏之黨而何敏蔡京門人也京之父子既幸脫于鼎鑊京之黨亦未加誅戮其門生故吏與夫黨與之枝葉又且磨牙搖毒尚居要津者實為敏之援昔人以燕雀之疇不奮六翮之用其敏之謂乎繼以徐處仁為宰相處仁之材固優于治郡而未聞有宰天下之能入據公輔之任敵騎侵軼天下可謂多事矣碌碌居位無所建明其所薦拔亦無出其右者昔人以栥梲之材不荷棟梁之任其處仁之謂乎耿南仲何㮚二子書生也平居髙談濶論是古非今使人昵於名實而不知所守置之翰苑可也若使之輔佐英主安國家社稷實非所長其連茹彚征可不論而知也中書門下王政之所由出也天子所與論道經邦者也職在統治百官以參佐機務關掌出納命令之重陛下發施命令舉措云為有悖于理而礙于法者當封駮論列則事無過舉今以趙野之徒為之野性齷齪但知奉行陛下詔㫖而已必不能為陛下執奏于前上以拂人主之邪下以損百姓之害庶乎陳善閉邪引君以當道也其所引類又當如何非特此也下至省臺寺監逮及監司帥臣與夫郡縣之吏尚習宣和故態咸以欺君罔上背公營私持祿保位既得患失凡蠧國害民之風莫之能革而務以委靡軟熟之辭上惑聖聰是則掠美于已非則斂怨于君曷嘗有致君之心憂天下之志靣折廷爭如南衙羣臣者哉馮澥可謂剛毅守節矣方崇觀姦臣用事之際奮不顧一時之禍以攖人主之威當時有識之士以為美談自陛下擢為諌議正國家多難天下之士翹首跂踵馮澥宜以忠言進于前舉明主于三代之隆以全令名以和天下纍月之間不聞建一大計定一大事成一大功徒聞與楊時是非熙寧元祐之學而止耳則政事闕失生民携二陛下何由而知之其它庸庸之徒可不問而知也自古王者重乎謹使故易有開國承家小人勿用之戒仲尼亦惡利口之覆邦家者是以飬雞者不畜狸牧獸者不育豺植木者憂其蠧保民者除其賊良有以也頃者陛下當敵國來侵則納李梲鄭望之李節之徒割地謬計命李邦彥主和議復與之盟以紓目前之禍洎敵人退師口血未乾則又納庸人之議命种師道姚古种師中援三鎮謂祖宗之地寸土不可與人但守陵寢所在誓當固守頃緣奸臣誤國敗纍朝不渝之盟致敵兵慿陵宗社傾危陛下誕布惟新不忍生靈重困鋒鏑遂捐金帛割土地復講纍朝舊好既盟之後敵情頗悟前日之非遽爾退師執政大臣曽不厯算周思復熒惑陛下使陛下失信于敵人夫前日之渝盟今日之失信利害較然明矣臣固知為此者非賢人君子有愛國憂君之志攄忠憤以為宗社大計也乃姦凶之黨尚懷蠧國之心必欲傾覆神器而已此臣所以中夜以思臨食而懼深為陛下寒心也且外兵之犯中國也勞師深入雖三尺之童皆知一戰而却之乃子孫帝王萬世之業也奈何陛下將相大臣半為奸黨遺類陛下雖欲奮然有為無股肱心膂之寄可任以大事是以敵日益驕雖金繒數百萬而猶未滿其意乃割三鎮之地以奉其所大欲然後快其心陛下豈得已哉陛下既已與人又且悔之彼且一旦肆其忿毒以殘害吾民使吾民肝腦塗地則祖宗二百年之基業莫之能保而陛下九州四海之廣將皆為金有矣况陵寢乎致此之咎當誰使執臣意陛下三月十六日詔書今已誕布天下久矣為金人謀者必曰上皇委任奸臣致我興師無亡矢遺鏃之費得金繒數千百萬三鎮二十州之地遂從其請再講舊盟今師未旋踵而陛下已失信必奸黨未去復有此議不若乘此渝盟之釁以令大軍逮髙秋時塞上草衰擁彎弓之虎士馳控弦之戰馬南驅而去我當百戰而勝彼將不戰自屈則我之所得豈特金繒數千百萬三鎮二十州之地而已彼之所謀誠如是則陛下何苦惑邪論而較小利哉昔人云見小利則大事不成深可戒也臣愚為今之計陛下當明詔有司將前日奉使許地李梲鄭望之李鄴元主和李邦彥與夫今日建議悔約大臣及奸黨遺類大正典刑梟首以謝天下以示敵國乃擇智勇有謀之人使出使疆外講二國之歡陛下當且含垢忍恥捐三鎮之地恣其强大恣其貪嗜驕其志氣彼必暴虐自肆荒淫無度其亡固可立而待也然後陛下內選相臣以立法度求民瘼修富國之政務强兵之術外選將臣以備征伐訓兵積粟修守戰之備務禦戎之略假以嵗月輔以天時合以人事乘仇人之有釁爰赫斯怒備乃弓矢煆乃戈矛礪乃鋒刃英謀電發神算風馳如决大河潰蟻壤不折一矢不遺一鏃掃平沙漠彼時稽首稱藩挈地以還陛下則邊城守境之民父兄緩帶母子咽哺川塗無犬吠之驚黎庶亡干戈之役以慰祖宗在天之靈以雪上皇積年之恥以示陛下大有為之志豈不偉歟尼堪斡里雅布以兵至京城金人之兵尼堪自河東斡里雅布兵自河北入兩路同日至京城下共約十萬衆其間多掠西河之民充數于其間復虜近城之民運石伐木造攻城之具執役者甚衆斡里雅布兵屯劉家寺尼堪屯于青城四壁皆分置小寨圍閉周密不以數計旗幟人物公然往來于郊野間守陴者皆有懼意先是中官李闕自四月間領京城所修治樓櫓城壁唯備北壁不備南壁西水門而東水門猶不為備十日間上按炮于封邱門外祖宗以來大炮數百座皆在門外官令民清野而獨不收炮座為金人所得用為攻城之具大理寺少卿聶守獻言請决蔡河汴河水合灌摩駝缸摩駝缸者前金人下寨之地也地勢卑濕既為水灌注金人乃盡占髙阜之地為營种師道為同知樞密院事也聞真定太原皆陷金人渡河以檄召南道總管司勤王兵十四萬八千陜西置制司團練兵十二萬各起發於京城外下寨置制錢蓋南道總管張叔夜統兵赴闕既而師道死聶昌為同知樞密院事唐恪耿南仲専務講和乃諭昌曰今百姓困匱調發不及養數十萬兵於京城下財用何以給之今朝廷講和不務用兵使金知朝廷集兵闕下志不在和豈不激怒乃以文止陜西南道之兵謂止防緩急今朝廷見與金人講和仰兩路之兵各准器甲口食不得妄動如已起發即却于元來去處分屯叔夜錢蓋領兵起發得檄遂分軍馬陜西者往秦鳯熙河分屯南路者往均房復分屯金人至城下四方衛士無一人至者趙子嵩蠟彈奏狀本府十一月二十四日後來往京遞道路隔絶敵馬出沒不測西路總管南道不知下落敵騎至本府城下臣見竭力守禦仰念至尊在都城四面隔絶痛激五內見竭力守禦自六月後來奏報下䝉施行今日果見危急輒募人賫此奏知臣獲得奸細通說敵志甚大乞聖斷審應毋輕信誤國之言乞回降平安指揮以安民心臣不勝哀鳴之至三朝北盟㑹編卷六十五
