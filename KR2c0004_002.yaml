body:
  text: 三朝北盟會編卷二宋徐夢莘撰政宣上帙起政和八年五月二十七日戊申盡十二月二日己卯五月二十七日戊申廣安軍草澤安堯臣上書乞寢燕雲等事書曰政和八年五月二十七日草澤臣安堯臣謹昧死裁書百拜獻于皇帝陛下臣觀商髙宗嘗命傅説曰朝夕納誨以輔台德説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命臣每讀至此未嘗不掩卷嘆息以為天下萬機一人聽斷雖甚憂勞不能盡察堂上逺于百里堂下逺于千里以九重之深而欲盡于四方萬里之逺百辟之忠邪賢佞生民之利害休戚顧不難哉是以帝王之德莫盛于納諫諫行言聽則膏澤下于民天下同臻于安樂之域社稷之利也臣聞陛下臨御之初從諫如流嘗下求言之詔曰言之不當朕不加罪于是蹇諤之士冒昧自竭咸效愚忠而憸人欲杜塞言路竊弄威柄乃熒誤陛下加以抵誣之罪遂使陛下負拒諫之謗於天下久矣比年以來言事之臣朝奏夕貶天下之人結舌杜口以言為諱乃者宦寺專命交結權臣共唱北伐之議不思所以蠧國而害民上自宰執下至臺諫曾無一人肯為陛下言者咸以前車為戒陛下復何賴焉臣謂燕雲之役興則邊隙遂開宦寺之權重則皇綱不振此臣所以日夜為陛下寒心者也臣螻蟻之微自頂至踵不足以膏陛下之斧鉞倘使上冒天威必罰無赦臣雖死無悔何憚而不言哉願畢其説以獻焉臣聞中國內也四方外也憂在內者本也憂在外者末也夫天下無內憂亦有外懼蓋自古外國之于中國有道未必服無道未必不來聖人以一身寄乎巍巍之上安而為泰山危而為纍卵安危之機不在于敵之服叛去來也則天下國家必固本以釋末未嘗竭內以事外雖羈縻制禦之不失徒使為中國之藩籬耳曷嘗與之謀大事圖大功俾憂生乎內也昔王都説契丹入塞以率晉兵定人皆以為後患可不鑒哉古者敵國憂在外今者敵國憂在內外憂之患吾能固本以釋末將賢而敵惰即剪滅其患不及中原泰山之安有足恃者內憂之懼由吾竭內以事外邦本凋殘海內虛耗纍卵之危指日可待外憂之不去聖人猶且耻之內憂而不為之懼臣愚不知天下之所以久安而無變甚可懼也陛下亦思之乎厥今天下之危如纍卵奈何陛下不思所以固本之術委任姦臣竭生靈之膏血欲奉強敵以取必爭之地使上纍聖德此億兆所同憂也且天生北國其為中國患自古然矣乃不與吾奮然而爭而轉若乞憐者非畏吾也蓋邊境之上未有可乘之隙度德量力安得不蓄其鋭而伺吾隙以逞其所大欲邪將見四境交侵雖有智者不能善其後矣昔秦始皇纘六世之餘烈既併六國南取百越之地以為桂林象郡北築長城而守藩籬却胸奴七百餘里其意非以衛邊地并救民死乃貪戾而欲廣大也故功未立而天下亂漢孝武資纍世之積蓄財力有餘士馬強盛務恢封略圖制胸奴患其兼從西結烏孫列四郡開玉門通西域以斷胸奴右臂師旅之費不可勝計至于用度不足算及舟車因之以凶年冦盜並起始棄輪臺之地下哀痛之詔豈非聖人之所以悔哉宋文帝元嘉中比西漢文景分命諸將經略河南致拓跋瓜步之師因而國蹙陳宣帝纘業之後拓土開疆志大不已遂有吕梁之敗江左日蹙力殫財竭旋為隋氏所滅隋煬帝負其富強之資思逞無厭之欲頻出朔方三駕遼左旌旗萬里賦斂百端四海騷然土崩魚爛喪滅國家唐太宗定海內時稱英主然而東有遼海之軍西有昆丘之役師旅數動百姓疲勞雖未致于禍敗然不免有中材庸主之議明皇開元之際宇內謐如邊將邀寵競圖戰伐西陲青海之戍遼東天門之師磧西怛邏之戰雲南渡瀘之役沒于異域數十萬人幽冦乘之天下離潰是皆窮兵貪地好功勤逺罔守持盈之道不顧勞民之弊孰若周宣中興獫狁為害追之太原及境而止蓋不欲弊中國怒逺人也故享國日久時人詠其美孝文專務以德化民凡有不便輒弛以利民與胸奴結和親後乃背約入盜令邊備守不發兵深入恐勞百姓是以國富刑清漢祚日永天下歸仁孝元亦納賈捐之議棄珠崖之陋後世以為美談東漢建武中人康俗阜臧宫馬武請殄胸奴報曰捨近謀逺者勞而無功舍逺謀近者逸而有終務廣地者荒務廣德者強有其有者安貪人有者殘自是諸將莫敢復言兵事可謂深達治源者乎歷觀前代雖征討外國時有異同勢有可否謀有得失事有成敗然毒蠧四表瘡痍兆姓未嘗不由好大喜功竭內事外者也昔人謂國雖大好戰必亡故聖人務德不務廣土王者不治外裔春秋亦內諸侯而外秦楚非謂中國之力不能制之以其言語不通贄幣不同疆土遼逺法俗各異居于絶域之外山河之表崎嶇山谷險阻之地是以外而不內疏而不戚政教不及其人正朔不加其國誠不欲竭內以事外故也樊噲嘗願得十萬衆橫行胸奴中季布謂其可斬馮奉世矯詔斬莎車王宣帝議加爵賞蕭望之謂矯制違命雖有功不可違法恐後奉使者為國家生事陳湯誅郅支匡衡劾其矯制而顓命郝靈筌斬默啜姚崇慮彼邀功者生心三朝不加賞抑有由矣是故古者天子控制逺方來則懲而禦之去則偹而守之其慕義而貢獻則接之以禮羈縻不絶使曲在彼乃聖王制禦外國之常道也在昔東邊避李牧北邊憚郅都南蠻服孔明西戎畏郝玭此四人者皆明智而忠信寬厚而愛人君臣同體固守邊疆故能威震四裔邊人不敢南下而牧馬士不敢彎弓而報怨或有僥幸一時為國生事興造邊隙邦憲具在夫何足云我宋太祖皇帝撥亂反正躬擐甲胄總熊羆之衆當時將相大臣皆所與取天下者然不能下幽燕兩州之勍敵豈勇力智慧不足哉蓋兩州之地鄰國所必爭者不忍使吾赤子重困鋒鏑乃置而不問章聖皇帝澶淵之役以契丹大舉來侵不得已而與戰既戰而勝乃聽其求和遂與之盟逡巡引兵而退蓋亦欲國家固而不忍困民力也明矣伏願陛下思祖宗積纍之艱監厯代君臣之失杜塞邊隙務守景德舊好選忠義智勇之人如郅都者使守險塞而軍髙壘毋戰閉關據厄荷戟而守之無使強敵乘間伺隙窺我邊疆上以安宗廟下以保生靈豈不韙哉臣前所謂燕雲之役興則邊隙遂開者此也臣觀自古國家之敗未嘗不由宦者專政當時君世主心非不知其然而因循信任不能斷而馭之故終至委靡頽弊傾覆神器不可枝梧而後已大抵此曹手執帝爵口銜天憲則臣下之死生禍福在焉出入臥內靡間朝夕巧于將迎則君心為之必移况隆以髙爵分以厚祿加之以信任以資其威福之權哉我宋開基太祖皇帝鑒前世之弊務行剗革內品供奉不過二十人徒使供門户掃除之役寶元以後元數倍增加祿廪從優咸平中洛苑使秦翰雷有功因討王均之亂既而有功授以思州刺史自後劉保信等初無纎毫功咸起僥幸之心乃攀援前文遂皆遙領團練刺史議者否之繼以明道制命出于幃幄威服假于宦寺斜封墨敕授之匪人委用漸大兹風一扇先朝之典制盡廢當時臺諫以死爭之期必行而後已今乃不然宦寺之數不知其幾但見腰金拖紫充滿朝廷處富貴之極忘分守之嚴專總威權決議中禁蔽九重之聰明擅四海之生殺懷諂諛之心巧媚曲求者則舉而登用勵匪躬之操直情忤意者則旋見排斥以致中外服從上下屏氣府第羅列大都親族布滿丹陛南金和寶冰綃霧縠之積富侔天子嬙媛侍兒歌童舞女之玩僣擬後宫狗馬飾雕文土木被緹繡更相援引同惡相濟一日再賜一月纍封爵祿極矣田園廣矣金繒溢矣奴婢官矣縉紳士大夫盡出其門矣非復向時掖廷永巷之職閨牖房闥之任也皇綱何由而振邪是以賢才嗟讟志士窮棲莫此為甚昔人謂宦者專而國命危良有以也臣布衣賤士無官守言責不敢纎悉條具上瀆聖聰請以誤國之大者童貫而論之臣謹按貫起自卑微本無知謀陛下付以兵柄俾掌典機密自出師陜右已彌嵗祀專以欺君罔上為心虛立城寨妄奏邊捷以為已功汲引羣小易置將吏以植私黨交通饋遺鬻賣官爵超躐除授紊亂典常有自選調不由薦舉而改京秩者有自行伍不用資格而得防圍者有放逐田里不應甄敘而擢登清禁者有託儒為姦懵不知書而任以蘭省者或陵德鮮禮不通世務徒以家纍億金望塵下拜公行賄賂而致身青雲者比比皆是或飬驕恃勢不知古今徒以門髙閥閲搖尾乞憐僥幸請托而立登要津者紛紛接踵一時鮮廉寡耻之人爭相慕悅侵漁百姓奉其欲為惟恐居後兵戍戰士冒石傷弓生有金帛之賜死有褒贈之榮自法權歸貫紛更殆盡戰傷之卒秋毫無所得死者又誣以逃亡之罪賞罰不明兵氣委靡凱還未歌書品已崇庖人廄卒掃門執鞭之𨽻冒功奏賞有馴致節鉞者名器一何輕哉山西徑卒貫盡選為親兵實自衛也方戰伐之際它兵躬行陳之勞班師之後親兵冒無功之賞意果安在此天下所共憾而陛下怡然不顧也貫為將帥每得帑金帛以濟軍需悉充私藏乃立軍期之法取償于州縣依勢作威倚法肆貪暴征橫斂民不堪命將士為之解體貫方且意氣洋洋自為得計凶焰勃然臺諫之臣間有剛毅不回之士愛君愛國一言議及則中以危法遂使天下不敢言而致歸怨陛下矣今者中外之人咸謂貫深結蔡京同納燕人李良嗣以為謀主共唱北伐之議經營之久國既匱乏乃更方田以增常稅均糴以充軍儲茶鹽之法朝行暮改民不奠居加之以飢饉迫之以重斂其勢必無以自全陛下茍能速革其弊則赤子膏血不為此曹涸也今天下之民被兹毒蠧久矣其貧至矣飬生送死不足之恨亦深矣昔人謂刻核太至者必有不肖之心應之臣愚深恐無恆心之民以刻核太至不能自安或起不肖之心其患有至于不可禦者又况天視自我民視天聽自我民聽民積怨氣天心憫焉非朝廷福也劉蕡謂自古宦者預軍政未有不敗國喪師者其言載之青史雖愚夫愚婦莫之或非陛下倘優遊不斷異時禍稔蕭墻姦生幃幄追悔何及伏願陛下以天日之明塞隂邪之路制侵凌迫脅之心復門户掃除之役使安其分可也史臣亦謂宦者亂人之國其源深于女禍陛下何苦昵之此臣愚所不識也恭惟陛下以社稷為心以生靈為念思禍患于未萌之機戒其所當戒更其所當更斷自宸衷決而行之無恤邪論之紛紛天下幸甚臣前所謂宦寺之權重則皇綱不振者此也臣一介草茅世食陛下之祿沐浴陛下膏澤久矣當此之時人各隱情以言為諱臣獨輒吐狂直上觸天威非不知言出而禍從計行而身戮蓋痛紀綱之壞哀生靈之困變亂將起社稷將危忠憤所激有不能自已不識陛下能赦之否臣聞唐貞觀時有上封事者或不切事文皇厭之欲加誚黜魏鄭公諌曰古者立謗木欲聞已過封事其謗木之遺乎陛下思聞得失當咨其所陳言而是乎為朝廷之益非乎無損于政帝悅皆勞遣之今臣惓惓非望陛下之勞遣願陛下咨其所陳托其實而行之使納諫之君不獨專美于前代臣子之至願也惟陛下裁之嗚呼犯顔逆鱗者人臣之盡忠廣覽兼聽者聖人之盛德臣之所以自處者可謂忠矣陛下所以處臣宜何如焉願少緩天誅庶開忠讜之路永保無窮之基倘或不容身首異處取笑士類亦臣不恤也臣無任昧死俯伏聽命之至臣堯臣誠惶誠恐頓首頓首謹言童貫上平燕䇿蔡絛北征紀實曰是嵗童貫上平燕䇿大抵謂雲中根本也燕薊枝葉也當分兵撓薊燕而後以重兵取雲中其語汗漫無取蓋是時貫尚未有名士大夫從之加以緣飾其姦爾八月四日甲寅馬政同呼延慶等行馬政同髙藥師等行賫禮物令見女真國主再議舊好復依建隆雍熙以來賣馬事次可附口詔傳宣撫問迤邐議及夾攻大遼事脫或有意可言次遣使來議須密諭之遂就登州乘兵卒海軍船去九月二十九日戊午聖旨將安堯臣書送尚書省衆議以聞閏九月九日戊辰馬政等下船達北岸馬政與髙藥師下海達北岸為邏者所執奪其物屢欲殺之藥師辨論再四得免遂縛以行二十七日丙子馬政等至女真所居安扎川拉林河馬政被縛行經十餘州方至國主所居安扎川拉林河三十餘里其用事人曰尼堪曰阿呼曰烏舍皆呼郎君請問遣使之由政對以先是貴朝在大宋太宗皇帝建隆二年時常遣使來賣馬今來主上聞貴朝攻陷契丹五十餘城欲與貴朝復通前好兼自契丹天怒人怨本朝欲行弔伐以救生靈塗炭之苦願與貴朝共伐大遼雖本朝未有書來特遣政等軍前共議若允許後必有國使來也阿固達遂與尼堪阿呼烏舍共議數日遂質登州小校王美劉亮等六人發人同馬政來十一月己酉朔是日改元重和元年十三日辛酉以安堯臣上書頗有可採除承務郎是日御批比緣大臣建議恢復燕雲故地安堯臣逺方書生既陳説厯代興衰之迹達于朕聽臣僚咸謂毁薄時政首沮大事乞重行竄殛朕以承平日久言路壅蔽敢言之士不忍置之典刑議加爵賞僉論未允朕獨何私契勘安堯臣崇寧四年已曽許用安惇遺表恩澤奏補因得責降遂寢不行今惇雖未復舊官可特與正奉大夫遺表恩澤令吏部檢元狀乞次補堯臣尚書吏部恭奉御筆比緣大臣云云至輔堯臣本部尋檢到崇寧四年七月十一日都省批送下故特進安惇妻清河郡夫人張氏陳乞補堯臣狀詳覆遵依御筆施行故追復正奉大夫惇遺表恩澤與親姪堯臣文資右擬補承務郎惇廣安軍人在哲宗朝為樞密使主上即位之初其子郊嘗指斥乘輿有不欲立上之語後為族人所告敕令合州根治既得其實郊為棄市惇去十官至是復正奉大夫十二月二日己卯馬政同女真人渤海李善慶等來女真發渤海人一名李善慶熟女真一名小薩多生女真一名布達共三人賫國書并北珠生金貂革人參松子為贄同馬政等俾來還禮朝覲以十二月二日至登州詣京師三朝北盟會編卷二
