body:
  text: 三朝北盟㑹編卷一百二十七宋徐夢莘撰炎興下帙起建炎三年三月盡其月建炎復辟記曰建炎二年十二月十六日乙卯隆佑太后御舟至於杭州有武功大夫鼎州團練使苗傅為扈從統制官駐劄於奉國寺至三年二月初四日敵騎攻掦州乘輿渡江十三日壬戌車駕次杭州命簽書樞密寺吕頥浩禮部侍郎張浚制置使劉光世御營使司都統制王淵留屯駐於鎮江府江寧府措置沿江守禦公事俄詔淵還遣御營前軍統制張浚將部兵守吳江三月二日庚辰以王淵同簽書樞密院事五日癸未苗傅及御營副將劉正彥反揭榜於市及𫝊榜報諸州曰統制官苗傅謹信大義播告天下民庶官吏軍兵等邇者大金侵擾淮甸皆緣奸臣誤國內侍弄權致數路生靈無罪而就死地數百萬之金帛悉皆遺棄社稷存亡懸於金人之手今此大臣并內侍等不務修省尚循故態為惡罔悛使令民庶惶惶不知死所進退大臣盡出閹宦賞罰士卒多自私門金人將至朝廷安然坐視又無分毫措置即日兩浙之民遂有維揚之禍嗟爾士庶興言及此寧不感傷朝廷微弱未明正典刑今某為民除害應有大臣罪惡貫著并內侍等官并行議戮期爾士庶一德一心共圖中興之業慎無生疑以致後患本為生靈别無所希取爾等若獲安居傅等雖死無悔昭示此心誠貫白日宜相訓誥以信萬方苗傅同劉正彥勒兵向於闕前梟淵首於闕下是日宣麻除劉光世為檢校太保殿前都指揮使百官皆入禁中宰相執政在都堂聞事急復入謝對頃之門外軍聲益歡中軍統制官吳湛披甲持刀排門而入引傅所遣一使臣一後人入內傅等語奏於上曰苗傅不負國家止為天下除害知杭州康允之與百官議曰今日事急若不請上御樓自撫慰之恐無以止變允之先入諸公願入者請從我衆曰然遂從允之扣內東門請見俄獨詔允之入允之請上御樓諭之於是上步自內殿登闕門蓋杭州雙門是也宰相執政事從百官皆之馬傅同正彥率兵們以下盡皆被堅執鋭控弦露刃填滿街衢見樓上張黃蓋稱呼萬歲聲喏上乃憑欄呼傅與正彥問曰卿何故如此傅厲聲對曰陛下信任中官賞罰不公軍士有功不賞曲法不端內侍所主乃得好官黃濳善汪伯彥誤國至此猶未逺竄王淵遇敵不戰首先過江止因結康履却除為樞密使臣自陛下即位以來立功不少今依舊例作遙郡團練使臣將王淵斬訖梟首在此應中在內者亦皆誅訖對御更請康履曽澤欲皆斬之以謝三軍上曰黃濳善汪伯彥已降出康履曽澤待重與責降卿等可與三軍士歸寨苗傅奏曰臣若不斬澤履歸寨不得今日之事盡是臣作不干三軍之事天下生靈無辜肝腦塗地止緣中官擅權依舊不肯遣出上曰待朝廷自行斷遣即今便與流配海島知卿等忠義即除苗傅為承宣使御營都統制劉正彥除觀察使御營副都統制一行軍兵並特赦罪各令解甲歸寨上顧百官曰當是何如有浙西安撫使司主管杭宜文字朝散郎時希孟奏曰願陛下速送康履曽澤等交付苗傅中官之害至此為極若不急切除去恐天下之亂未已軍器監葉宗諤奏曰陛下何惜一康履以慰三軍之心上曰此事極曉但須是朝廷自行遣流於嶺南豈可因叛將動兵向闕便付中官使殺之逾時傅不退上命吳湛召履不出乃逃匿藏避之再命衛士搜捉宫中得於禁中清漏閣衆衛士擒至闕門履望上呼曰臣死矣何獨殺臣遂交與苗傅即樓下腰斬之臠其肉上命傅等歸寨傅與正彥請宰執官出門議事於是尚書右僕射朱勝非并門下侍郎顔岐尚書右丞張澄簽書樞密院事路允迪皆出見傅等請隆祐太后垂簾同聽政事勝非等奏上欣然許之詔請隆祐太后權同聽政事者官皆出門外聽詔傅與正彥不拜曰自有皇太子可立道君昔日已曽立太子有故事傅之屬官張逵曰民為貴社稷次之君為輕今日之事當為百姓社稷又曰天無二日衆皆驚愕失色百官復入見上奏曰傅等不拜上問何故不敢對上又顧宰相宰相曰乞詢問適來聽詔百官上曰顧問百官但言不妨時希孟出奏曰以臣所見死有二一則從三軍之言杭州通判張誼面折希孟曰此是何語也三軍之言豈可從上徐謂宰相執政曰朕當退避但須索禀於太后乃命吳湛謂傅等曰已令請太后御樓商議上令顔岐入奏請太后御樓是日北風徑甚樓無門屏幃幕止坐竹椅並無籍褥既請太后御樓上即立楹側不復坐百官既請上坐終不允曰不敢當坐矣頃之太后以一竹輿與上步從老監五人上以傅等語奏於簾前又命宰相執政之事太后曰當自出門外與苗傅商議遂肩輿下樓出門見傅百官從之傅與正彥拜輿轎前軍皆聲喏傅等奏曰望太后為天下生靈作主今日百姓無辜肝腦塗地全賴太后主張太后曰自上皇任蔡京王黼變更祖宗法度童貫等起興邉事所以致招金人養成今日之禍豈關今上皇帝之事皇帝仁孝别無失德止為黃濳善汪伯彥之輩誤國他今已竄逐了統制豈不曉知此事傅曰臣等已議定豈可猶豫太后曰待依統制所請上同太后降樓歸內降劄子三月初五日三省樞密院同奉親筆朕即位以來强敵侵凌逺至淮甸其意專以朕躬為言朕恐其興兵不已枉害生靈畏天順人退避大位朕有元子育德東宫可即皇帝位恭請隆祐太后垂簾同聽政事庶得消彌天變安輯人情敵國聞之息兵講好右劄付刑部仰與赦書速頒降施行又詔曰王淵身為都統制車駕駐蹕維揚金人傾兵前來並無措置斥候不明以致倉卒南渡士民肝腦塗地宗廟傾危及結內侍康履等並已正典刑令尚書省出榜曉諭九月十日王孝迪為中書侍郎盧益為尚書右丞皆充奉使大金國信武大夫忠州防禦使辛道宗武功大夫文州團練使鄭大年為國信使副奉禮物使金先以進士黃大年為承奉郎借朝奉大夫直祕閣賜紫金魚袋進武校尉吳明敏為乘義郎閣門祇候借武義大夫閣門宣贊舍人為先期告請使十六日苗傅劉正彥到都堂欲分𨽻所統兵入衛睿聖宫尚書右丞張澄以為不可固止之傅正彥遂退十七日乙未張浚不受禮部尚書之命俊亦不肯分兵浚與吕頥浩劉光世韓世忠議舉兵討逆傳檄諸州曰恭惟宋有天下垂二百年太祖太宗開基創業真宗仁宗德澤在民列聖相傳人心未厭昨因內侍童貫首開邊禍遂致敵騎歷歲侵凌逆臣苗傅躬犬彘不食之資取鯨鯢必戮之罪乃因艱難之際敢為廢立之謀劉正彥孺子同惡共濟自除節鉞專擅殺生仰惟建炎皇帝憂勤恭儉志在愛民聞登門再三慰勞而傅等陳兵列刃凶熖彌天逼脅至尊倉皇避位語言狂悖所不忍聞大臣和解而不從兵衛皆至於掩泣詔書所至逺近痛心駭戾人情孰不憤怒顧惟率土何以戴天况傅等揭榜於市自稱曰余祖宗諱名曽不回避迹其本意實有包藏今者吕頥浩因金陵之師劉光世引部曲之衆張浚聚兵於平江韓世忠張俊馬彥輔各領精鋭辛道宗陳思恭總率舟師湯東野周杞據總衝要趙哲集民兵劉誨李逮餽餉芻糧楊可輔等參議軍事并一行將佐官屬等同時進兵以討元惡舟次秀州四方響應用祈亟復大位以順人心今檄諸路軍州官吏軍民等當念祖宗涵養之恩思君父幽廢之辱各奮忠義共濟多艱所有朝廷見行文字並是苗傅等僞命及專擅改元悉勿施行如敢違戾天下共誅之二十八日苗傅劉正彥至都堂見宰相朱勝非請入見睿聖皇帝奏事勝非難之曰候先奏知傅等固請勝非不得已為奏許之傅同正彥叩睿聖宫門請見時已昏矣上即令開門引入見之傅正彥拜於殿下上命登殿傅正彥奏請上親札以緩外師上曰人主親札所以取信於天下者以其有御寶今不與國事用何符璽以為信統制有事但來商議不以何時可來相見勿須疑慮傅等拜請而出四月一日皇帝復位以王世修為工部侍郎初傅正彥反也世修實為之謀畫及外兵至憂懼乃急請復辟以自免故有是命二日己酉以苗傅為淮南西路制置使劉正彥為副之四日辛亥吕頥浩劉光世張浚韓世忠張俊趙哲將兵入城六日癸丑以右僕射朱勝非為觀文殿大學士知洪州右丞張澄為資政殿學士知洪州門下侍郎王孝迪皆為提舉官路允迪提舉醴泉觀兼侍讀簽書樞密院事李邴為尚書右丞八日乙卯詔赦天下二十日丁卯車駕幸江寧府野記曰王淵字幾道階州人通書史善騎射久為邉將與夏人戰有功河北京東大旱且苦伐燕之後髙舉張先等羣盜並起攻沒州縣衆各數萬命內侍梁方平為河北京東制置使素與淵不足薦為都統制欲陷之及見淵復大喜軍政盡與參謀身先士卒所向無前踰年悉平加觀察使靖康中金人攻河北淵軍趙州敵至城下淵令統制韓世忠夜半出城繞敵營大呼敵亂自相蹂踐死者甚衆夜遁去是冬攻京城淵退師應天敵來攻淵命世忠楊進纍戰殺傷敵數萬今上即位應天深相倚用除御營使司都統制淵常忌楊進欲加害故進復反從維掦㑹陳通反揚州辛道宗趙萬等率兵進討辛道宗不能恤下又趙萬逐道宗亦反陷潤州授淵兩浙制置使領張浚等軍往瓜州萬請降淵誘斬萬等進至秀州淵下令教兵十日方行陳通聞之稍怠翼旦淵勒兵馳至杭州通不暇走遂出降又進平婺賊蔣定淵還聞賊張遇衆數萬據楊子橋淵自將數百騎穿過遇寨遇見淵器械精明皇恐出迎馬首一時解甲加顯德軍節度使金陷維揚從上渡江至常州丁進掠劫不止淵召而戮之上至杭州除簽書樞密院事苗傅劉正彥亂懼淵盛名襲而殺之梟首東衢年五十三金人陷青州知州劉洪道棄城去劉洪道棄青州而去金人入其城先是知濵州向大猷為葛進率之同來攻青州青州閉門不納葛進攻城不下遣大猷入城議事洪道執之囚於獄中至是金人出大猷於獄令知青州大猷喜於受金人之命於是出文榜多指斥金人陷鄜州金人自陷延安府又趨晉寧軍堅守未下至是殘擾晉寧并兵趨鄜延經略使郭浩駐兵境上金人遂陷鄜州水賊邵青擾泗州邵青濟南府人五丈河作稍公載窑務草平日為竊盜後為樓閣遇賊下獄不通火伴甚得其徒黨之心嘗以盜敗杖脊而終不悛至是聚舟船往來於楚泗間三朝北盟㑹編卷一百二十七
