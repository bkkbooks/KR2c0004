body:
  text: 三朝北盟會編卷九十七宋徐夢莘撰靖康中帙夏少曽朝野僉言曰余生值靖康丙午之難於都城自敵人釁成禍結始末之由余偶知之詳審乃今欲稽考禍亂之由則有大臣乖􅍝誤國基禍馴致傾危姦回叛異脅附以阽皇輿將帥非人士卒潰叛上自縉紳士大夫之操守下至市井軍伍之作為皆足以為將來之警戒焉若夫理辨曲直靣折強敵捐身為國以全大節則有李若水力排羣議獨抗仇敵主持宗社義不茍生則有宗澤者為將帥則懷義赴難潰圍入城任執政則守節事君鼎鑊不渝則有張叔夜者至偏禆小校城陷勢危猶結死士欲奪乘輿於虎口則有吳革者侍衛卒伍值時倉卒深察賊計排斥大臣欲拯主于禍難中則有蔣宣李福者皆可垂訓後世光曜無窮焉九月五日尼堪攻陷太原二太子進攻真定安撫使劉韐守禦具備而人心悅服總管王淵軡轄李質訓練士卒數千皆可禦敵時真定在河朔最為堅壘朝廷以金人圍太原防其東軼侵河朔之地乃以劉韐為宣撫使領兵五萬守遼州以扼其險王淵李質劉韐皆辟置乃以樞密副承旨李邈為真定安撫使焉而邈優于吏職而拙于應變且新至真定而人心未附倉卒之際金兵圍城精兵既出百姓之情不親故旬日而拔是時朝廷新失太原又聞真定之報上大憂栗患將帥非人思得豪傑之士以衛邊乃下哀痛之詔金人遣王芮堅欲割三鎮之地金人渡河朝廷大臣唐恪何栗輩以謂大河之險決不可渡其昏􅍝如此金人至城下先採濕木編洞屋以新牛皮蒙其上戴之令運土木以填壕次以大木為對樓雲梯小車又廣列櫑石炮座尋碑石磨蓋石羊石虎為炮欲攻之所列炮石座百餘飛石如雨擊守城之卒死傷者日不下一二百人金人自丙午初春用兵攻陷太原皆以講和割地為語李邦彥吳敏耿南仲唐恪皆墮其計時何栗為右丞孫傳為尚書每朝廷計議必面折執政地不可割金人志不在割地朝廷由是任之至敗事城破不能權宜濟厄聞金人講和反傾意信之曽侍衛兵卒之不若夫不信于造謀之始反信于城破之後傾危中外之勢而致乘輿北遷者由和議昏昧而戰守不固議者曰兵法稱不足則守惟其不足則當死守以固之而京師將吏軍士自春初守城相疑姦細紛擾不已上下莫能相制而號令不行城下金人每被炮擊死者百人而行伍不亂城上一箭至則互相驚擾移時不定种師道自春初見士卒守城如此深憂後患宗濋誘士以官爵而竟不與之宜乎士不為用宗濋庸􅍝士無紀律致都城摧破宗社阽危陽九厄會之數實有以致之者也何栗鄆王詣金人軍前請講和二帥謂何栗鄆王曰自古有南即有北不可相無也今之所議期在割地而已又欲邀上皇出郊何栗回道金人之意欲邀上皇上曰上皇驚憂已病不可出必欲堅要朕當親往二十八日何栗又至軍前二帥乃許上出是夜彗星見井其光長亘天二十九日何栗又至軍前日出赤如血栗歸都堂曽無愧色見執政但喜講和而已與作會飲酒食肉談笑終日自古大臣愚昧無恥未有若此者二帥又遣使乞令人於河北召康王使者傳云聞康王已占據河北之地恐河北州軍恃王不肯交割請遣人迎之是時金人已懷廢立之意而朝廷大臣無有覺悟者何栗奏上乃遣僉書密院曹府由京東詣河北迎康王上在齋宫髙尚書郭少傅與吳幵孫覿馮澥等對上吟詩唱和又和以太學官對元帥講書及二月六日變議令推舉異姓時王時雍為留守見議論紛紛恐百官不肯書名乃先自書名以率百官從而書名者數百人皆若州縣胥吏書卯厯略無留滯不終日千餘士大夫及軍民書畢申上時亦有倡説忠義互相詆毁而竟書名舉邦昌者時雍乃蜀人也其在蜀為市牙圖利又王黼當國時雍専為鄉人納賂求差遣使人謂之三川牙郎其鄉人曰今又作賣國牙郎也或曰士大夫平時享國爵祿不能納忠效計以防禍亂至于傾側顛沛又不知以忠義徇國外鄰禍中國改姓易號反偷生附會為悖逆之事或曰金人拔城以兵脅衆勢不得不然余應之曰今有賊勢臨人之父以脅其子曰汝能殺父活汝子肯殺父以求活于賊乎其在天地間何以為人懼金人之威盡遣上皇諸王及舉邦昌者是殺父以求生也方金人初圍城上守禦士大夫自宰執侍從武帥將校千餘人金兵數人上城兵潰莫遏軍士卒伍其無忠義不足責也向使士大夫于城破之時人人以死殉國軍兵士卒雖懷怯懼亦不敢潰也唐德宗時守奉天而賊不能拔今以京城而金人拔之究其所以則奉天之臣皆以死守獲全京城士大夫皆窺利偷生之故金人以數卒上城而潰矣今日之患由節義之風不立士俗偷薄其來久矣至于如是甚可羞焉有人問城破之由當應之曰軍威不立士風偷薄以此破也開封尹徐秉哲為金人所迫押文引令諸使臣大下搜捉宗室使臣利于得財雖多捉獲而免脫者十有二三焉其文引云或於南薰門蕭太師處交割或于順天門耶律太師處交割皆用使牒押字徐秉哲為人之臣國之宗屬乃忍押牒以贈仇讐開封公人并小火下緣取人口妄偽攘奪金銀盈室聚會于欣樂樓號曰金擢會其貪生忘國有如此者又要太學博士十人又要博士熊彥詩彥詩時雍之壻乃易他員代之其忘國營私有如此者內侍梁平王仍指言上皇宫中寶玉玩好鄧述具録后妃皇子皇女李闕獻黑漆皮馬甲二萬副太祖平唐火箭二萬隻金汁火炮樣四勝弩內侍平時享國富貴無與比其內侍負國有如此者在京廂禁軍兵有月糧衣賜國家養此所以禦四方自上中下內教親按諸營武藝精練厚加賞賜用臨戰敵敗衄奔竄遂致城陷自罷守禦每日津搬金帛禮樂器用儀仗法物祕閣書籍國子監經史道釋藏印板未嘗休息自旦至暮疲敝困弱有搬至軍前屢有換易往來力乏或憤而擲於地有金人徐謂之曰莫是國家得汝力耶在京禁軍平時衣糧不闕金人圍城激賞已厚敵兵數人上城曳戈潰散至宗廟阽危二主遷越又于破城時恣行劫奪朝廷恐其作亂仍地分彈壓每日于常時受外日支米二升錢一百文城中米貴百姓餓死兵士糶餘糧月獲厚利百千至邦昌即位又請登極犒賞左藏庫榷貨務都茶場支錢搬運縱橫于路見者無不痛恨其軍兵負國有如此者邦昌僣竊行事命百官不出敕但以尚書省牒不建年號又不用靖康號應文榜檄但曰三月初七日有詔與徐秉哲令買藥云社稷山河為卿等所誤可恨者某等父子兄弟成擒耳無思舊主勉事新君可于都司借支錢一千貫買路藥秉哲得之而泣秉哲為府尹應奉金銀根括金銀諸般取索及勾集人口自初破珹至金人去凡五箇月府庫帑藏及民間物宗室百官宗屬人口等一有所索一席之上皆秉哲經營之自旦至暮與金人對坐於朱雀門指顧唱呌不勝其勞也從官數人吏事不及逺甚廢立之際不能措一辭反勾宗室以奉之見金人殺梅執禮安扶等守金使而泣之咸多秉哲勤勞之力而責其不忠之罪或曰秉哲賣主求安吏職雖精真奴𨽻之材也何以士大夫為四月一日金人之師離城下盡去初金人與京城彈壓官曰金人去後宜却治樓櫓守扞拒敵趙家人馬恐壞了張皇社稷十一日邦昌還資善堂宣和録曰先是城陷後十二月初三日敵須犒軍絹一千萬匹金百萬鋌銀一千萬鋌表段如絹之數只要綾羅綿繡之類不要紗四日開封府榜盡數令于戚里豪富之家根括金帛赴開封府送納六日將內外庫絹盡數令禁軍送之軍前自此數旬不已退回汙損者甚多遣使巡視府庫已封內藏左藏及御前軍器所八日金使又檢校內藏左藏元豐大觀等庫金帛緘封之十日尚書有榜應戚里權貴豪冨之家竭其家資以貼犒賞以令開封府措置日下拘收轉送大金軍前十一日詔吏部尚書王時雍同知開封府與徐秉哲分東西廂四少尹十五少卿五郎官遍詣在京根括拘收戚里權貴豪富之家金銀財帛犒設大金軍兵或敢隱匿並正軍法捕奴婢笞擊問之十三日遣軍人百姓搬絹赴南薰門交納凡一千萬匹自當時日始使來欲割蒲解許之先是軍前諭意金帛不前初十日定下城故凡百應付萬不敢少緩綾絹搬至軍前屢有換易悉要山東河北者朝廷以酒肴等遺受納番官無算都人自左藏庫前分行相屬至南薰門遞絹輸軍前人給錢二百抵暮方散十五日開封府等處鎔金銀共四千爐金銀每錠各五十兩開封府榜為大金軍前怪問金銀表段數少聖駕未回都人知緣金帛久留聖駕爭先輸納有福田院貧民納金二兩銀七十餘兩人心可知惟豪貴家不肯盡出差官吏大搜㕓里苛急人不能堪至于囚執婦女發掘房帷者內侍寺觀倡優旅邸根刷殆遍親王公主宅所有取上皇旨悉數輸納有司景靈宫內廷駕前器皿無一存者每坊巷令里長鳩集仍許奴婢告以軍法從事斬數人首朱雀門以殉日輸金帛如市者有告首內侍藏金者數人率萬餘兩由是內侍悉令出金銀五千兩十三日聖旨今後士庶之家不得將金帶出入候開封府遍令天下其見在金限三日赴開封府送納限滿送納不盡許受雇人男女使告金帛之往肩摩轂擊於道卿監省官以下於南薰門交割敵遣主將皇族郎君領其事郎君者金主之兄尤自持其勢日布巨挺于前凌辱官吏大理少卿尉遲紹先司直王忠臣少違其指拽坐庭下使唾其口意未愜復批頰數十以建茗腦麝等物遺之獲免一日倨坐譙門呼官吏俯伏道左左右傳郎君指揮實不曉一語第聞曰明日金帛未足便􅒱殺十四日詔語云千分未及其一由是開封府及四壁根括官供軍法狀以聞自城諸門皆為敵守雖金帛亦于門首交納細民各分井巷自相糾率雖叉釧銖兩以上共行助國以竿揭于通衢府前填委不容置足十四日府榜備示聖旨髙尚書傅元帥台令根括金銀盡絶訖具狀申當遣金人入城檢校仰體此意可毋誤事十九日開封府申軍前根括到金十六萬兩銀六百萬兩表段一百萬匹二十三日四壁置場買銀以鉟銷稱盤折耗比元數少十萬兩欲足之也正月內金帛見納比元數金百之一銀一千之一表段十之二開封府復行根括十五日開封府榜益催金銀人不聊生悲戚愁嘆皆欲自盡集從官議各分定戚家復行根括如鄭紳張襄之衮內侍之類皆平生貪黷之人前日不無藏匿者既到金壁遂自言所有金人復索至於再三十八日開封府榜國相元帥台令怪問金銀表段數目不足問城中士庶惟復要縱兵入城自收或只納金銀表段犒軍令大軍早回仰各體認日下盡數所有送納金人入內徑取諸庫珍珠四百二十三斤玉六百二十三斤珊瑚六百斤瑪瑙一千二百斤北珠四十斤西海夜珠一百三十個硃砂二萬九千斤水晶一萬五千斤花犀二萬一千八百四十斤象牙一千四百六十座龍腦一百二十斤金磚一百四十葉王先生燒金陳摶燒金髙麗進奉生金金甲金梳頭魁各六付金鞍金馬杓金杵刀金作子四百二十五副玉作子七百副花犀帶金帶金束帶玉帶鍍金帶金魚袋等上皇閣分金錢四百貫銀錢八十貫皇帝閣分金錢二十貫銀錢四十貫皇后閣分金錢十一貫銀錢二十二貫銀火爐一百二十隻金火爐四隻金桌子面二十隻銀交椅二十隻金合大小四十隻金水桶四隻金盤盞八百副金注碗二十副金銀匙筯不計數金湯瓶二十隻琉璃盞一千二百隻琉璃托子一千二百隻玳瑁托子一千二百隻珊瑚托子四百隻瑪瑙托子一千三隻珍珠扇四百合紅扇一百合藍扇一百合行鸞扇三百五十合大扇六十合扇車一百兩金使督金帛者旁午四壁以從官台官各一人提舉催促府中差官巡門提轄四壁又添官十員措置收買仍令諸倉以米豆換之再納金七萬五千五百八十兩銀一百十四萬五千三百兩表段四萬八千四百匹又遣使人提舉官以金帛遲延堅欲勒赴軍前嘗曰京城總七百萬户除髙力下户寧不出金銀一錠耶明日金使來勒留守大户提舉人供限五日納足元數二十五日金使趙少監傳監軍指揮請八人提舉官赴南薰門受約束遂殺梅執禮等乃下令曰根括官已正典刑金銀或尚不足當縱兵自索既而宦者復與敵帥曰試許士庶以金銀換米麥當有出者已而果然遂督迫益急城中驚駭不知所為留守司差官百員分定街巷不問貧富遍加根檢下至貧民一分一錢之微亦取兩府之尚書大戶各金二十兩銀五十兩表段三十匹至寄居致仕選人校尉各以差次輸納稍有違限發遣家屬赴軍前至此人益不聊生矣金人令稱科配不得用根括二字內臣恨取去工妓等又怨所遣官吏既至金壁乃始言城中金帛取未及一二分官吏隱蔽不肯用心敵必元數督責日急要牛車千輛取景物鍾簴司天臺渾天儀合臺星象合臺天輪自五代祖宗已來所蓄併收江南浙蜀所有上皇二十餘年珠玉一旦取去牛車擔負襁屬不絶又遣李少監郭率入府普淨寺取朱勔家書畫直至去日方絶四月一日金人去盡營中遺物甚多朝廷差戶部拘收象牙一物至及二百擔他不急之物稱是祕閣圖書狼籍泥土中金帛尤多賤之如糞土二百年府庫蓄積一旦掃地盡矣三朝北盟會編卷九十七
