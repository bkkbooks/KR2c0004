body:
  text: 三朝北盟㑹編卷十二宋徐夢莘撰政宣上帙起宣和四年十二月二日丁亥盡十五日庚子十二月二日丁亥李靖等入辭于崇政殿上遣黃珦傳旨諭靖等到軍前奏知大金皇帝自京國兵馬未到上京時已遣使計議就成交好正在今日今來所議凡五事一切委曲俯從金國所有營平灤三州地土不多一就相許了却甚好差使副與靖等同賫國書前去三日戊子差趙良嗣周武仲使于金國許依契丹舊例銀絹再求營平灤三州并西京朝廷國書云夙勤原使嗣貺緘書共聞綏撫之詳備紉敷陳之悉方逺修於契好宜曲盡於忱誠本朝與鄰國通好自來係計使人往來之數以為禮節昨赫嚕等來係報馬政之聘以故更不遣使然國書內具述夙約大信偹載前書所有漢地等事並如初議候聞舉軍到西京的期以慿夾攻議納事理分明别無斷絶今嵗自聞舉軍到西京即遣童貫等領兵自燕路相應四月以後纍伐契丹事可詢訪亦屢遣人移文貴朝軍前報應計議夾攻之舉即無失約昨燕京國妃蕭氏遣蕭容等進表納欵仍乞援助止退大金兵馬及營平薊景等舉地來歸繼亦嘗遣偏裨入燕城殺戮不順契丹請和聽命各無允從并未見貴朝進兵夾攻即却其使并表未嘗聼許及未曾分遣大兵據守元議自燕并應朔等州進兵後來以兩京之議未明故止應朔之師雖奉聖應朔蔚武等州遣人請降亦以此未曾撫定堅守信義以務交歡本末可見趙良嗣回知入關至燕京本朝議云與貴朝講好修睦若本朝先自平燕亦當迎待如禮良嗣固執妄有所陳所有應關係官錢榖金帛諸物之類今書欲行據收實非元約然貴朝兵馬既欲入關犒師之用義合相從其别處移散致漢民雜色人户如欲收管亦非元約所載今並如來諭以示誠意兩朝守國所恃大信自初遣良嗣以至于今所議正為五代以後所陷漢地內燕京六州及屬縣已載來書并承諭如本朝已取了燕京自依今來已許如未取了貴國取得亦與本朝更不與夾攻外所有營平灤并西京管下州縣并係五代所陷地土合依元約本朝收復爰念自貴朝未取上之時越大海以通交好使聘往來纍年于此所當曲務允應以善初終除營平灤三州本朝收復外其西京地土候復收燕京一帶并西京地土所以盡契丹嵗交銀絹今若西京别作一段計議理合減定深念久已相許議不可踰將嵗交銀絹數目多少交割等並依契丹舊例施行信誓分立界至等事續議畫定庶應來悰用臻歡約屬當嵗凜益保天祺今差龍圖閣直學士大中大夫趙良嗣朝散郎充顯謨閣待制周武仲充國信使副有少禮物具諸别幅專奉書陳達不宣謹白郭藥師敗蕭幹于永清復固安安次兩縣契丹四軍蕭幹自延慶敗復攻安次固安兩縣陷之復圍永清縣郭藥師至永清與敵相遇藥師謂諸將曰彼見我軍必披靡視漢兵為輕定來衝突令部曲執漢旗幟分漢兵以弓弩翼之敵果望旗笑曰南朝兵也果擊之兵刃既接方悟常勝軍敵戰不利依山自保漢兵彎鐙弩聽鼓聲悉發大敗斬數千級幾執渠魁敵窮走燕城堅壁不敢出五日庚寅金人到居庸關蕭后與蕭幹達實林牙夜出燕城亡遼録曰蕭后才聞居庸失險夜率契丹并老幼居帳出城聲言劄野寨迎敵其實避竄宰相左企弓以下拜辭于門外蕭后諭曰國難至此我親統大軍盡死一戰為社稷計勝則再與卿等見萬一失利則我誓死于陳前卿等多方保全合境漢民無使濫被殘害遂泣下行至松亭關議所往耶律達實林牙者契丹也欲歸天祚四軍大王蕭幹欲就奚王府立國於是契丹奚軍列陳相拒而分矣奚渤海諸軍從蕭幹留奚王府達實林牙挾蕭后歸陰山見天祚取蕭后殺之六日辛卯金人兵至燕左企弓曹勇義劉彥宗等開門迎降阿固達等入燕遣馬擴歸報捷茒齊自敘曰二月旦經媯儒二州初五日抵居庸關契丹棄關走僕隨行阿固達謂曰契丹國土十分我已取其九祇有燕京一分地土我著人馬三面逼著令汝家就取却恁生受奈何不下初聞南軍已到瀘溝河已入燕我心下亦喜南家故地教他收了我與他分定界分軍馬歸國早見太平近聞都統劉延慶一夜去了是甚模樣僕答曰使人留此不得而知兵家進退常事恐亦非敗縱使劉延慶果敗亦别有大軍在後阿固達云似恁統領底人敗了軍國大事汝家有甚賞罰僕曰將折兵死兵折將死延慶果是退敗便做官大亦行軍法阿固達云若不行軍法後怎生使兵也待一兩日到居庸關你看我家兵將戰鬭有敗走麼初六日入居庸關擺立軍馬阿固達與固倫郎君並馬南向立諸軍馬三面整旗擺立尼堪已下諸郎君皆披甲作兩行相對侍立召僕當前阿固達云我已遣使副同你家大使南去想已到汴京我已許了趙皇燕京如今打了須與去城內畨官人戶即是我要漢兒人戶都屬南朝我已差人入城招誘契丹令投降你敢相隨前去招諭漢兒麼僕答使人留此本了軍國大事有何不敢阿固達云敢去時煞好來早同我家使臣前去入夜召僕阿固達云我親押軍來待與古爾班即四軍大王也見一陳適來已報同國妃直東走了來日可以入燕城是夜四更阿固達召僕去頗有怒色曰國妃與四軍走去蓋緣我軍馬入關今聞得你家軍馬却來攙奪如此則更無好說話也僕聞四軍大王永清縣為郭藥師所敗僕曰貴朝使人已與趙良嗣同趨闕下朝廷必不許來攙奪萬一南朝先入亦足可商量阿固逹意稍解次日抵燕京北朝兩府漢官兒左企弓于仲文曹勇義劉彥宗契丹官伊遜等開門迎降阿固達召僕云今我軍先到燕京你隨行盡見可回報捷已教寫宣撫司牒今差五百騎相送賜僕并隨行人鞍馬一副仍令攜涿州將官胡德章歸蓋德章先與契丹戰為其所擒囚燕京獄中至是令歸臨行尼堪遣烏頁來云傳語童太師昨來海上曾許水牛如今相望甚近欲覔十頭令送來僕南發達雄州宣撫司亡遼録曰蕭后行五十里金人逰騎已到城下左企弓等語百官共議力拒未定已報統軍副使蕭伊遜開啓夏門放入羅索貝勒軍登城續遣先被虜人知宣徽北樞密院事韓秉𫝊令若即拜降我不殺一人催促宰相文武百僚僧道父老出丹鳯門毬場內投拜阿固達戎服已坐萬勝殿皆拜服罪于是使譯者宣曰我見城頭炮繩席角都不曾解動是無拒我意也并放罪才撫定燕山府即遣五百騎護送馬擴至涿州牒報宣撫司請發兵前來交割北征紀實曰金人久住鴛鴦泊往來白水以圖天祚既深入夾山勢不能出金人亦不克入因攻取雲中諸州且休息往來山後視中國紛拿延慶既潰阿固達始以全師自居庸關入四軍大王者奉蕭后由松亭關遁燕人乃備儀物以迎之其始至于燕之大內也阿固達與其臣數人皆以次坐于燕之內殿上受燕人之降且上詢黃蓋有若干柄意欲賜功臣皆張之國中皆畏其威金人其後自大皆燕人用事者及中國若良嗣輩之教耳十一日丙申貶劉延慶為率府率安置筠州北征紀實曰劉延慶者為陜西名將童貫忌其才素不善也纍得節度使上深眷遇向習射延慶獨預後方知欲倚仗劉延慶以北征代二帥為先鋒爾二帥既不納蕭后降乃令延慶將兵出界正兵十萬夫役不在數也時藥師既以涿州降涿州之良鄉縣亦皆屬我於是延慶出界自涿州至良鄉惟日行三十里住即立寨開濠塹殆至曉復行焉人皆笑之未至良鄉縣已為燕騎所撓自良鄉又行兩驛抵瀘溝河駐軍四軍大王者亦如瀘溝河夾河對壘日遣騎渡或擊其前或擊其後左右受敵或三五十騎至千百騎渡河邀我餉道我師病之不能進矣嘗縱兵犯中軍幾至延慶帳下僅能禦退多所殺傷延慶懾焉翌日四軍使燕騎皆乘我馬朱甲耀日於瀘溝河之上以是延慶心動且以餉道不繼乃申二帥乞那回軍馬得報遂焚輜重而退衆軍大潰四軍者尚不知所以是夕隔河但見火光大起四軍亦走久之乃知我師自潰方遣兵來追先是延慶初行瀘溝也每下寨但開前一門故背向北門而已及其夜走天殆曉至舊寨與諸將少愒復由寨門將出適逢燕追騎垂至因復入門當時立寨既固又無他門可出遂大窘諸將自毁垣略得通馬踰垣而走不勝狼狽延慶幾不得脫瀘溝大寨金銀不可勝計又雖道路每寨又有銀絹一二十萬當時未能搬赴瀘溝大寨者是時竭國力為之一旦皆為燕人所得延慶至雄州二帥擬責之延慶因抱笏厲聲以抗二帥不能詰而止也初諸路正兵十五萬除二帥與諸將守雄者親兵外其餘往往因潰散乃自結隊各歸本路不能遏也始出師人但支五百錢將士頗不樂及潰走且虞有變乃各支絹二匹銀三兩以收之兵雖粗集然技窮縮手矣先是上命小璫主郵事不𨽻宣司戒之曰得燕山日爾自遣馳報而貫亦自作牌大書曰克平燕山路以伺皆謂唾手可得及藥師可世入燕山城是日報至貫匿之中夜始約伯氏同作奏以牌等即馳上捷才二日半至闕下然遲小璫猶半時中外但見捷而不知其詳謂已盡得之矣方降指揮擇日御正衙受賀于是好進者往往作賦頌獻久之但見寂然始知藥師但跳入燕城已退遁俄延慶師潰後二帥凱還白上曰劉延慶不戰而潰且雲中今未下不有大戒厲則何以使諸將臣等所以不詰者留以遺陛下也於是上赫怒欲斬延慶議已定乃下延慶獄既鞫無狀而延慶出二帥與那回劄子上乃寤延慶徒責散官筠州安置由是亦不直二帥然延慶應誅但二帥反枉用其心爾十五日庚子趙良嗣周武仲至大金軍前金人不許營平灤三州并要燕地稅賦復遣李靖持書來趙良嗣等至阿固達卓帳處使烏舍傳言且云自前年相約夾攻契丹及至寡人領兵到燕京城下并不見一人一騎更寡人自來不許與底平灤等處州城今來都要怎生去得若堅要平州不是好意和燕京都怕别了便揖良嗣等退歸所館良嗣等至其國弟固倫國相所居以貫等所與酒果遺之以通其意良嗣欲與尼堪議事答以商量未定尼堪臨上馬與良嗣議以大事已定所有平灤三州一道商議了甚好却云則為這箇事近上大人們都不肯若更緊著恐和燕京都别了便催朝辭烏舍云堅要平州莫是待閉定關口不與通好此是皇帝已不許衆人皆不許堅不許今稅因約與元帥尼堪等議事尼堪云這事本不别只是為我家自著兵馬取得所以須要賦稅肯時便肯不肯即休即不肯時請勾退過界人馬良嗣等答以賦稅自古隨地豈有得地而不得稅者尼堪云不須理㑹只是要稅烏舍在旁云此事不别許多田地州城人民都與了南朝這些稅賦計較甚良嗣對曰且如稅賦之內有諸般色數若細豆率雜之屬地理相逺如何搬運得莫須計算折納烏舍云但依隨得這事易為商量復遣靖等賫書赴闕金人國書云十二月日大金皇帝致書于大宋皇帝闕下肅馳使驛繼附音徽然承鄰睦之修未盡理端之素故形别幅開導深悰昨於天輔四年趙良嗣計議燕京若是允肯自來所與契丹銀絹依數嵗交及夾攻回書已許燕京地方并所管戶民若不夾攻不䏻依得已許為定平營灤等州未曾允應今承來書其别處移散到漢民雜色人戶如欲收復亦非元約據上項人戶前次往復未曾透漏辭意詳明昨來錫喇等去時已曾具言兼契勘馬政來賫到事目所約應朔州入去不如此則便為失約也且當朝兵馬攻下居庸直抵燕城即日欵降外貴朝兵馬不能入燕已被戰退以故李靖等去時具言已許燕京所管州縣地分元管戶民如或廣務於侵求諸慮難終於信義今書又責許外平營灤三州已係廣務於侵求酌此事件為約分明義當不許爰念大信不可輕失且圖交好特許燕京六州隨縣所有銀絹一依契丹舊例交取兼燕京自以本朝兵力收下所據見與州縣合納隨色稅賦每年並是當朝收納如可依隨請差人使不過向前正旦受禮賀功及賫送今嵗合交銀絹外據平營灤三州亦不在許與之限外有次年已後銀絹交割處所立界至及其餘事等續議畫定如難依隨請於已後無復計議燕京令屬祁寒冀應多福今差貝勒李靖王都哷等充國信使副有少禮物具諸别幅專奉書陳謝不宣謹白天輔六年十二月日三朝北盟會編卷十二
