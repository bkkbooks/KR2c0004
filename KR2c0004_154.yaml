body:
  text: 三朝北盟會編卷一百五十四宋徐夢莘撰炎興下帙起紹興二年十二月一日丁亥盡其日十二月一日丁亥朔布衣吳伸上萬言書十二月初一日布衣吳伸謹齋沐裁書昧死百拜獻于皇帝陛下嘗讀太史公敘布衣王蠋狀于田單贊曰昔燕之初入齊聞王蠋賢令中軍環畫邑三十里無入而使人謂蠋曰齊人多髙子之義吾欲以子為將封萬家蠋固謝燕人曰子不聽吾引三軍而屠畫邑王蠋聞之曰忠臣不事二君貞女不更二夫豫豈助桀為暴哉遂經其頸于樹枝自奮絶脰而死臣讀至此未嘗不廢卷涕泣扼腕而太息何哉齊一小國也且有慷慨忠義之士今天下之大四海之廣得無其人乎况天下之士自崇觀以來蒙被國家教養雖山林臯壤巖谷海隅靡不承肓而受恩德者矣何以大國之人不如小國之布衣乎臣固有意于是今臣至貧且賤初非以富貴為心爵祿為念又非欲以片言幸陛下之用從而求賞揣臣之心實無纎毫覬覦况臣曾立功于近世者屢矣亦未嘗論功而求仕進則今日之無意于爵祿也明矣無意于爵祿而有言者非他臣恐萬世之下罪我聖宋無忠臣義士故以臣所聞所見盡臣之忠竭臣之愚為陛下陳之伏望天慈早賜睿覽不惟臣一身之幸將為社稷宗廟福天下生靈之幸也臣竊觀陛下有孝弟之大德而二帝之問不通陛下有湯武之聖明而敵國之陵不已陛下有太王之至仁而土地之封日削陛下躬堯舜之節儉而國用之富不饒陛下震雷霆之天威而盜賊之鋒未戢凡此五者非特臣得以疑之使三尺之童有知有識亦將有惑焉何哉二帝之問不通者臣竊謂非陛下忘父兄之遷也非大臣忘君父之恩也蓋亦人力有所不及思慮有所未至焉臣竊觀趙王入燕也使者十輩既不能達國之音又不能全身于外當時在朝若張耳陳餘之徒非不賢也非無謀也獨不如一厮養能以片言説燕與其君俱載而歸今兩國之難未解而鼎峙之形已分使者雖數十輩金帛雖數十萬能免偽齊之盜乎此遣使不如用厮養明矣敵國之陵不已者竊謂陛下忍小恥之太過也視小敵之太怯也蓋敵人之性內柔外剛若或避之遂益強橫臣竊觀苻堅之陵晉也興師百萬力足以移山嶽鞭足以填江海謝元以計沮之敗衄淝水設使當時忍示怯奔而避之由江迤南當為秦之屬郡矣故古人有言曰可以計勝難以力屈即此觀之雖得鬬將十萬不如一謀士明矣土地之封日削者臣竊謂陛下視疆埸之太輕任藩屏之太易也臣竊觀越王勾踐之脫于吳也嘗膽以苦其心任賢以廣其謀雖一飲一食未嘗不以滅吳為心故當時其恥雖大其國雖削數年之間復其疆而雪其恥當今陛下國政之屬如大夫文種者誰歟軍旅之託如范蠡者誰歟然陛下移蹕而去之者屢矣百姓從之者如歸市雖太王之仁不過此也昔太王去邠而王岐山今陛下有滅敵之心而不能復父兄之仇此臣所以曉夜太息為之不平也國用之富不饒者臣竊謂陛下千里寄託之非人四方土地之曠也臣竊觀司馬宣王之輔魏也先廣田蓄然後為滅敵之計當時鄧艾著濟河之論又陳屯田之利其言以二萬人屯淮北以二萬人屯淮南合四萬人之衆且田且守嵗入米五百萬斛十萬之衆可給一年之食臣竊見今日自常潤抵界至于大江極目百里盡成荒墟所謂良田不知其幾千頃自淮迤南荒蕪之田又不知其幾千頃疲卒既多冗官不減若于此時且耕且戰則軍食何患不足矣盜賊之鋒不息者臣竊謂陛下姑息之德太厚而殺戮之威不張也臣竊觀宓子賤之治單父齊冦至魯人不及自刈麥父老請民出穫宓子不許且曰今亡麥明年可種若使不耕者得麥則是使民樂有冦之來也臣竊意盜賊不可不威昔光武中興未嘗不以討賊為先故殺之則彼畏而自息招之則彼安而復叛臣以謂用盜賊攻盜賊則草冦無患乎不平矣此五者雖若國之急務然猶未足為陛下輕重臣復見國勢如纍卵之危生靈有塗炭之厄臣曉夕為之寒心臣竊謂太祖皇帝之有天下也奄有九有席卷八荒東漸于海西被流沙北極單于南底交趾四方之大罔不臣服當其四夷未賓之初止有中原錢俶望風納土由是置五王宅以待其自至其後李煜欲以臣屬乞為藩屏遣使請命太祖皇帝曰天無二日殿闥之上豈可容鼾睡者是欲天下一家中國一人也明矣創此基業垂之十帝可謂盛哉太平日久偶因邊臣失守致使金人長驅而入賴祖宗之靈社稷之福使兆民有託于陛下當時龍興南都天下之人皆知陛下孝慈不忍父兄之逺播而居其已破之城今此駐蹕久在東南之一隅臣竊為陛下疑之不識陛下欲復祖宗之故業則陛下有萬世垂統之基若止東晉之南據則不過有百年之世祚然百年之計尚恐土地日削社稷日危亦未必安于百年也臣聞自淮迤北見屬偽齊自古邊徼不能有中原此金人以中原攻中原耳近臣説者必曰朝廷賴偽齊以為藩籬以捍金人臣竊謂不然昔日之患患在手足今日之患患在心腹不識説者將謂齊今不為盜能保其子不為盜乎復能保其孫不為盜乎不識偽齊俟金人既定之後去僭偽之大號還土地之故疆乎為復割據中原久假而不歸乎若曰臣無伐君則六朝何為而併天下若曰國可並立則隋髙何為而擒叔寶良由勢不兩立尊無二上者也昔秦齊之強猶不敢久僣帝號今金人竊我名器不歸他人獨授劉豫則知豫必以姦計為金人謀也既為謀主則無臣心明矣况人臣之位與人君之尊不可同年而語彼肯捨尊而就卑乎則知劉豫無復納欵又明矣臣嘗譬之巨室之家假人以堂室之奧而自處門廊之隅則居堂室者豈無吞門廊之心乎今劉豫所以卑辭自遜者良由人心未歸而羽毛未成爾縱使劉豫止欲割據一方豈不為姦雄開基又况自古南北雌雄之勢但見以北併南未聞以南併北者臣竊觀國之所重者三昔我神祖留意太學蓋欲籠絡天下之英賢而網羅天下之姦雄也陛下駐蹕揚州之時猶有隨駕學生今悉罷去而劉豫乃為學校以延多士是誘陛下之英賢可知矣今諸軍士卒皆河北山東之人其初止因金人所苦故偷生南方貪陛下升斗之養也前此兩年兵食皆足邇來竊見如劉光世軍中士卒一月之糧或闕其半里巷私語皆曰健兒不如乞兒各懷去心悉有竄志而劉豫大張聲勢廣示富饒省刑薄斂恤衆安民彼思鄉之人有所聞豈不動心是誘陛下之士卒可知矣南北往來商賈如織厚增其利售我物貨關市無征阜通無禁既開商賈之路遂雜五間之徒古人夷關折符使命猶且不通况於往來弗禁者乎臣竊見朝廷內外事無巨細往往皆前期而知此無他從商賈之便者然也從商賈之便則是誘陛下之行旅可知矣誘陛下之英賢則謀謨可得而䇿矣誘陛下之士卒則戰鬭可得而用矣誘陛下之行旅則國之虛實可得而知矣臣竊見中國之士子不由科舉進者往往多不得齒于仕版至於貧賤之士雖有嘉謨嘉猷非左右先為之容無因至陛下前則好名貪祿之士豈不有如偽齊之心乎臣竊見中國之士卒飽則稍安飢則心離懷鄉樂土人情所同又况立隴之所繫嗜欲之所趨今移北就南嵗久無歸彼懷土之人豈不有如偽齊之心乎臣竊見中國之商賈近緣軍興征求百倍為監官者以奉上為心以刻剝為志行旅恨怨痛入骨髓由是百物不通而征商又倍至於偽齊取民有制彼貪利亡恥之徙豈不有如偽齊之心乎凡此三者悉有離心則陛下國勢日以孤危臣又見劉麟猖狂尤甚狼戾者多父子異同悖逆若一僣偽三年鼎勢已立今劉豫不自量力往往自比文王而以其兵柄付之于麟陛下若稍緩其嵗月彼將先收民心足食足兵形勢漸固則中原無復為陛下有矣中原既喪則偽齊反得太祖皇帝奄有中原坐收四方之䇿矣臣又聞金人重兵悉趨陜西志在吞蜀萬一不幸蜀有變動彼將順流而下水陸並進則陛下豈可復有乘桴之行乎臣聞兵法有曰我不欲戰雖畫地而守之彼不得與我戰者乖其所之也臣切謂先平偽齊則是乖其所之也又况偽齊有聲無實若即伐之如摧枯拉朽爾古人有言曰今不取後世必為子孫憂今之偽齊若不亟平之不特為子孫患臣以為陛下憂也臣覩九月有星彗于東南陛下肆赦其文自責可謂上畏天戒之深也臣雖不曉天文疑其非災何以明之昔楚將公子心欲與齊戰時有彗星出柄在齊占者曰柄所在者勝齊恃得柄而不為備所以敗績今柄在東南所謂得勝之道也若不因天時而制勝臣恐復如昔之齊也故曰天與不取反受其咎臣觀東南之地本非帝王之都歷考古今未有卜世之久者何哉西北之地山髙而水深東南之地山秀而水清蓋土厚者其山髙水深從古至今卜都于西北者或過于十世而僭號于東南者未踰于百年是亦土地之厚薄流水之淺深者然也又况吳越之地形勢尤薄實非帝王駐蹕之地萬一未復神京而建康古都亦可以暫駐鑾輿臣願陛下整我六師用張天威特回聖駕臨幸秣陵庶漸向于中原無久居于海隅也昔孟子曰王者中天下而立定四海之民故漢髙祖用劉敬之䇿而唐神堯從太宗之謀所以享國日久也臣竊觀自古帝王之興兵權未嘗重假于人如漢光武皆親御六師獨有唐末藩鎮之權太重故有朱全忠之禍今陛下親御之衆不如藩鎮之多也臣竊憂之臣願陛下簡練卒伍繕治器甲親征不庭恭行天罰則擒縱在我而權勢不奪臣竊見陛下之兵尚有百萬而精鋭之士又有數萬若傾國出師又不知其幾萬設或併力北伐則父兄之仇可復而中興之業可圖臣願陛下天謀早決如晉之平吳唐之伐蔡斷自宸衷不容衆議又况利于人君者必不利于人臣利于人臣者必不利人君且人臣趨戰于敵與坐享于家安危不同豈肯棄安而就危乎今遁逃不發逗遛嵗月皆人臣自便為安逸之謀然而臣則安矣君將危焉此正所謂利于人臣必不利于人君之謂也古人有言曰兵聞拙速未覩巧之久也今伐齊之䇿萬一少遲年嵗事必不濟何以言之金人之所利者玉帛子女且如蜀中富庶遐邇共知敵人留意必悉衆共攻東北之地屯兵必少加之既立偽齊必以為恃况彼素欺吾怯斷不為備此中原歸于陛下灼然明矣兵法有曰攻其無備出其不意此全勝之道也國之安危在此一舉陛下若猶豫不斷金人得蜀必復立僣偽割據成國陛下土地止有東南雖有智者知不能善其後也臣聞之為王者可升而為帝帝者不可復降而為王萬一止有東南不過王國之君其去帝業逺矣臣願陛下勿謂力有所未及時有所未至因循茍安以東南為滿恐成大禍當以歸命侯長城公自安之言為戒也臣竊觀周衰之末戰國縱橫猶無敢僣帝位者今此劉豫首為亂階彼雖不能成事臣恐為湯武驅民者桀與紂也觀其姓名復符南宋此亦可慮陛下雖欲忍而容之獨如宗廟社稷何如天下蒼生何况劉光世韓世忠皆擁重兵久在江左坐食糜費于國有損若即北伐正所謂因糧于敵者也伏望陛下痛察臣言上以祖宗創業艱難為念下以生靈塗炭為憂焚舟決戰如勾踐欲殺妻子焚寶器之時誓與三軍觸戰共存共亡則危國可以復安亡地可以復得臣聞之一人有慶兆民咸賴國家傾危百姓雖有榖粟安得而食諸萬一出師糧食稍闕亦可權借于民斷在一舉明喻利害今設使盡百姓之儲以贍軍獨不憂金人殺而奪之乎臣聞之古人有言曰有叛卒無叛民民有業而卒無生故也况卒之所仰者官給錢糧今既財賦不足則兵食不繼而叛心日生叛心日生正如吳越所謂舟中之人盡為敵國矣今臣伏望陛下重以軍糧為念昔張邦昌僭號之時所幸士卒之心未離而去太平之日未逺人思祖宗之德故未為國患今此離亂積嵗士卒暴露日久咸欲息肩正猶水性趨西隨所決而流也今若乏食其心必離臣恐大事去矣臣又見近日沿邊州軍多用武人為守或不識字或不曉法州郡被害莫此為甚而又或起于卒伍或招于賊徒毒心不改逆謀猶存或以州叛而從敵或恃兵勢而虐民重念祖宗廣土四百餘郡比為金人割據將去大半今淮迤南若守臣不得其人則州郡逐時陷沒不知陛下沿邊州郡復有幾矣臣以謂武人深不可用為郡守至如統兵亦須擇其善者若賀若弼有謀將鬬將之辨正此之謂也臣嘗觀柳宗元有言曰削尾大之勢者莫如建諸侯今之江北可謂土崩矣臣竊見近置安撫大使正如唐之節鎮各有屬郡亦置部曲有分權之勢無補國之威文臣為之則不知兵者有焉武臣為之則貪汚寡謀者有焉設有冦至皆是提重兵以自衛統部伍以奔逃或坐視而不救或伺隙以自便昔唐之割據皆此道也又况自古以來國破者必易其君國亡者未必易其臣在亡國之為將相者未必不為興國之將相于人君則有利害在人臣初無損益正如馮道歷事四姓是也去此就彼鑒之前代則有馮道驗之今世則有杜充陛下于此不可不自為之計也臣竊觀周以同姓之親而昌唐任異姓之權而亡不可不戒臣為陛下計之當今紓難莫若以沿邊之郡十州之地建一諸侯以宗室之親者主之彼有人民復有社稷且耕且戰足為屏翰上合天數下安邊庭金枝玉葉布在四方方可以伐敵國之謀可以絶亂臣之望臣前言願陛下伐齊者䇿之上也不得已而建諸侯者䇿之次也捨此二者復有祕䇿當俟對天顔而後面陳非紙筆得以盡也臣竊見近日遣使未出我疆已為敵劫此乃以武臣守邊之禍然所喪雖多似乎天以其䇿啓陛下矣臣昔見酈食其與唐儉為死間事與今日頗相契合古人用間為上萬一陛下以臣前言可采臣願為食其唐儉出使偽齊潛謀將定陛下興師從而伐之臣雖遭齊鼎鑊之烹而忠義可以激礪亂臣賊子臣死之日如生之年也臣竊見自料臣死有三陛下怒臣狂愚之言而殺之通衢臣亦死也陛下用臣狂愚之言而遣之死間臣亦死也陛下不聽臣言他日或如王蠋自經于樹枝臣亦死也有此三者必死之道臣豈好死惡生臣實為忠義所激不顧微軀此心願為聖宋之鬼不忍為偽齊竊國之民也臣又聞主憂則臣辱主辱則臣死竊見大宋未見有肯辱肯死者臣復恐為萬世笑故以狂愚一得之慮為陛下陳其梗槩昔比干剖心子胥鴟夷二子皆獲美名而以惡聲歸于其主此又非臣之所欲也今臣不貪爵祿不釣名譽不畏誅戮其所欲者欲陛下靜而思之欲陛下聽而行之庶幾上可以回天意下可以收人心况太平之業在數年間陛下不修太平之業將以太平之業屬于誰乎臣之愚忠已貫日月臣自謂無求于陛下而陛下必有求于臣之言矣竊觀世俗之所好者莫好于富貴今臣視之如浮雲故終始以不貪為言况趙孟之貴趙孟能賤之臣萬一得為太平之民豈不優於亂世之將相乎臣又見魯仲連談笑而却秦軍平原君欲封之魯仲連笑而謝曰所謂貴于天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也臣雖不材持此心久矣臣曩于鄉曲里閈猶且患難相救危厄相助况于君父艱難之時臣竊見近為陛下陳其利害者其志將以求爵祿也其大將以沽多譽也或再三至于數十往往陛下見之既繁視以為常雖間有竒謀異䇿相見待遇一槩今臣之書已盡愚衷歷陳于前無復再上孔子曰用之則行舍之則藏正愚臣之謂也言甚拙直不事雕琢止取其利害之大意或可或否願陛下詳加擇焉干冒天威臣無任俯伏待罪之至臣仲昧死百拜牛臯李橫及金人戰于汝州克汝州又戰于潁昌府克潁昌府先是劉豫殺凌唐佐其家屬各脊杖二十拘管在潁昌府李橫克潁昌府得唐佐之妻田氏歸于襄陽橫報朝廷召其姪孫凌憲令往襄陽迎田氏憲未到襄陽已為李成所據田氏再陷于偽境不復回朝廷贈唐佐敷文閣待制三朝北盟會編卷一百五十四
