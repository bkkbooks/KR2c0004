body:
  text: 三朝北盟會編卷二百二十一宋徐夢莘撰炎興下帙起紹興二十五年十一月盡二十六年五月二十四日壬子十一月徐嚞為大金賀生辰國信使先是差宗正丞鄭柟為賀生辰國信使臣僚言柟素貪汙罷之乃以徐嚞為賀生辰國信使洪皓復敷文閣直學士致仕行狀曰建炎三年苖傅劉正彥逃未伏誅上將狩建康先君上疏言今內難甫平外敵方至若輕至建康恐金人乘虛侵軼宜遣近臣先往經營庶事告辦鳴鑾未晚也時廟謨已定不能從既而悔之上問宰輔近諫移蹕者為誰今安在丞相張和公時知樞密院以對過秀邀先君至平江欲以為部使者招二凶適書至乃止將辭歸和公曰呂丞相欲見君郡遣直使介謁偶有旨召見時方墨衰絰丞相脫巾服衣之既對上以國步艱難兩宫逺狩為憂先君極言天道好還敵人亦無久盛之理此正春秋邲郢之役天其或者警晉訓楚也所言反復當上意上曰卿議論縱橫熟于史傳有專對之才朕方擇使無以易卿先君以母老父喪懇辭不許擢徽猷閣待制遷五官假禮部尚書為奉使大金軍前使令與宰執議國書先君欲有所議輔臣護其文不喜遂抑遷官賜告一日歸别先君持太碩人拜且泣時長子適甫十三嵗逖以下襁褓􅈱􅈱省别行路不能仰視先君弗子也淮甸賊蜂起除兼淮南京東等路撫諭使俾李成以兵護至南京成方與耿堅圍楚州以責其降敵為名實持叛心先君遣書抵成曰計泗虹有紅甲非千騎且不可往軍食絶不克唯命先君聞堅可撼隂遣説之曰君越數千里赴國家急山陽縱有罪當稟於朝今擅兵攻圍名為勤王實作賊爾堅意動遂強成斂兵先君行未至泗境諜云有迎騎介而來副龔璘曰事叵測虎口渠可入送兵亦不肯前先君不得己遂返即上疏言李成以朝不受撫稽餫餉有引衆納命建康之語今靳賽據揚州薛慶據髙郵萬一三叛連衡何以待之方含垢養晦之時宜選辨士諭意優進官秩畀以京口綱運如晉明帝待王敦可也疏奏上遣閣門宣贊舍人賀子儀撫諭成給米五萬石令弟蔣仕召馳恩初先君戒所遣吏須疏從中出乃詣政事堂白副封時方禁直逹忤宰臣意以託事滯留降承議郎許出滁陽路張守忠李貴嘯頴上道益梗提舉官范潩張鋭嘗招慰之旋復亂先君至順昌聞賊有至近郊以牛驢市物者約與相見譙門下先君曉譬切至曰自古無白頭賊賊悚然請歸報其渠乃為書至其渠守忠貴聼命率所領入宿衛守忠初名俊入朝賜今名李貴即俗所謂李閻羅者先君間關至太原留幾一年金遇使人禮益削及至雲中大帥尼堪迫遣與副使官偽齊先君曰萬里銜命不得過御兩君以歸大國度不足以有中原當還諸本朝乃遲留亦死不即豫亦死偷生異域間甘鼎鑊不為也尼堪怒命壯士擁以下執劍夾承之先君不為動旁貴人唶曰真忠臣也止劍士以目為跽請尼堪怒少霽遂流遞於冷山與假吏沈珍𨽻卒邱德黨超張福柯莘俱副使至汴受豫命知恩州流遞猶中國編竄也雲中至冷山行兩月程距鹵諸二百餘里地苦寒四月始草生八月而雪土廬不滿百皆陳王烏舍聚落烏舍使誨其子或二年不給衣食盛夏至衣捔布畨謂四𨽻採薪他山嘗久雪薪盡至拾馬矢煨麵而食紹興二年使者王倫歸為上言之即下秀州存問家屬賜銀絹二百適未冠得監南嶽廟先君辱於烏舍十年多為詩以諷皆憂國傷時烏舍嘗得獻取蜀䇿持以問先君先君歷陳古事梗辨烏舍鋭欲吞中國曰孰謂海大我力可乾但不能使天地相接爾先君曰兵猶火也弗戢將自焚自古豈有四十年用兵不止者又數數為言所以來為兩國大事今既不受使乃令深入教小兒其交使在禮不當執烏舍或應或不應既大怒曰汝作和事官却口硬謂我不能殺汝耶先君曰自分當死願大國無受殺行人之名北去蓮花濼三十里使之乘舟一人蕩諸水以墜淵為言可也烏舍義而止兩宮蒙塵五國城嘗遣私人奏書並獻胡桃梨修栗麵諸物兩宮始知趙氏中興永祐陵諱聞先君北鄉血泣旦夕臨後遇諱日即燕山開泰寺為文以薦其略曰故宮為禾黍改館徒饋於太牢新廟遊衣冠招魂但歌於楚地雖置河東之賦莫止江南之哀遺民失望而痛心孤臣久縶而嘔血又云盛德之祀傳百世以無窮在天之靈繼三后而不朽故臣讀之無不掩涕已遣使約和烏舍問所議十事先君條策之甚至曰封册是虛名年號本朝自有三千兩金景德所無東北宜絲蠶大國有其地矣絹不可增也至於取淮北人搖民害計本朝必不可景德之盟南北所得人皆不取載書猶在可覆視也烏舍曰吾固取投附人誅之以懲後何為不可先君曰昔魏侯景舉十三州地歸梁梁武帝欲以易其姪蕭名於魏景遂作亂陷臺城仆兩帝中國所監決不相從烏舍稍悟乃曰汝性直所言不誑我吾與汝如燕遣汝歸議遂行所存沈珍邱德黨超三人既而公將北來議不合囚涿州事復變道逹靼帳其帥聞洪尚書名爭邀入穹廬出肴核歌舞舉渾脫酒以勸到燕一月越王烏珠族烏舍黨與坐死數千百人獨先君故與烏舍持論身幾死數矣烏珠知之故得免燕人重先君執節爭持酒食相勞苦先君間行廛市物色諜者得趙傳書幾百數萬言藏故絮中以歸曰順昌之役敵震懼喪魄燕之珍器重寶悉徙以北意欲捐燕以南棄之王師亟還自失機會雖躙河南後必更戍具以烏舍問答語兩宮諸王主所居報上是嵗紹興十年也明年夏求得皇太后書遣邵武男子李微來上大喜因御經筵謂講讀官曰不知太母寧否幾二十年雖遣使百輩不如此一書遂官李微其冬復以書曰金以厭兵勢必不久異時以婦隨軍今不敢擕朝廷不知虛實卑辭厚幣未有成約不若乘勢進擊再造猶反掌爾所取投附人只欲保守江南歸之可也獨不鑒侯景之禍乎若欲復故疆報世讐不宜與和胡銓封事此或有之知中國有人益生懼心張丞相名動殊方可惜置之散地並問李趙二相安否獻六朝御容徽宗御書其後和定祐陵及太后歸音皆先報凡四十年中以文書至者九數陳軍國利病謂施行則宗社生靈之福留中皆莫得聞先君言無隱情歸國以此觸罪諸子懼深禍過庭不敢一問北事故忠謀祕䇿不詳獨得係帛書所存大略如此初宇文虛中既換金官欲扳先君分過乃力薦於敵庭換先君為翰林直學士力辭獲免虛中為詳定禮儀使始造赦其文復及授先君闕訴敵相韓昉乞於真定或大名養濟圖逃歸計昉怒虛中贊其闕一字遂換中京副留守復力辭昉大怒降留司判官為承德郎趣行者屢矣誓以死不就職金法未換官而曽被任使者永不可歸敵欲以計墮先君令校雲中進士試使者監上道先君日損食陽為有疾狀既至謂同院官曰今取士以詩賦吾故學經爾曰豈不能出語䇿士乎考官孫九鼎者有太學舊為以疾聞得回燕敵議遣奉使人各還奉使人赦及之他使者幸稍徙多占淮北無敢言淮南者先君實以饒州聞張公邵朱公辨自亦言徽州人既議和還淮以南使者故先君三人在遣中用事者多曰此等人若放了幾時更有今不留後必為我患歸計屢欲變參知政事王公至燕先君得敵隂謀從坡上與館中人語為留守翼王所獲對吏將馳流星騎上其事副留守渤海人髙吉祥素嘉先君忠委曲護出之且易以他牘先君行餘月方以元牘奏垂入境追者七騎至及諸淮則在舟中矣至盱眙以奉使亡狀自劾上方以來歸受喜報無罪可待日以御札趣覲既至闕登時見內殿奏事罷力求鄉郡養父母上曰卿忠貫日月志不忘君雖蘇武不能過豈可捨朕去也賜內庫金帶馬鞍既又以馬驚復拜賜又賜闕盾制琴一黃金三百兩帛五百匹象齒三百斤綿香酒茶諸物果中使者踵門咨訪宸章沓至且諭旨將柄用皇太后之歸也過燕先君冒禁朝焉至陛對乞賜見明日即詔入慈寧殿設簾皇太后顧帟人曰我故識尚書矣命徹之問勞優渥語必稱尚書朝對外庭臣唯先君一人見宰相秦檜肆言無所避彌三日不休且曰張丞相敵所尊憚而不得用錢塘暫蹕而景陵太廟極土木之工示無中原意耶語侵秦皆類此秦謂適曰尊公信有忠節得上眷但官職如讀書速則易終而無味要當如黃鐘大呂乃可閲九日進徽猷閣直學士提舉萬壽觀兼權直學士院來取趙彬輩三十家先君疏言昔晉韓起買環于鄭鄭小國也能引誼不與金既恨淮臣官屬皆吳人留不遣蓋慮知其虛實情偽也彼方困於蒙尤始示強以嘗中國若遽從之彼將謂秦無人而輕我矣疏出秦作色曰公無謂秦無人後三日復上疏言或以不與之故致渝盟宜曰俟淵聖皇帝及皇族歸乃言王倫郭元邁輩以身徇國棄之不取緩急何以使人辭益剴切經筵進故實引楚平王止子旗伐吳事因言吳取州來楚弗與校撫民治兵五年而後用師今淮右之民勞罷流散宜時使薄斂勿令轉徙無告中興急務也秦益不喜初敵圍楚州久不下檜時留尼堪所敵使之草檄諭降有錫納者在旁知狀先君與秦語及金事因曰憶錫納否别時託寄聲秦色變而罷明日侍御史李文會論先君在朝必生事遂出知饒州秦方鉗天下舌不得言中官白鍔從皇太后北歸者宣言燮理乖盩洪尚書名聞華夏顧不用秦聞係諤下大理獄獄成鍔實不識先君特以敵中知名故鍔既流嶺海諫議大夫詹大方特疏先君與鍔刎頸交更相稱譽遂罷郡未幾謫濠州團練副使安置英州懿節皇后之姨髙氏與其夫趙伯璘𨽻烏舍戲下貧甚先君屢賙之范蜀公之孫祖平敵不以為官傭奴之先君使以東坡所為蜀公銘白曰我官人也敵曰東坡書之不疑矣即釋之先君資以歸裝貴族有流于黃龍府優籍者二人先君屬副留守趙倫除其籍劉公光世之庶女小醜在敵豢豕為贖以重價求匹偶衣冠之家略為人奴者贖之數十人張待制字發自蔚州死雲中先君過荒寺見其櫬携之至燕山授其僕鍾禹功使葬司馬侍郎朴握節以死居數年無有能明之者先君為陳本末詔以忠節顯著贈兵部尚書其歸也北人治餞具數月後使者至敵多問先君今何官居何地先君有膽略遇大事敢為平居慷慨有經略四方之志嘗語諸子曰在北方久料之熟矣今其勢日削可以慿軾取之過河朔時見父老指其子孫曰是皆生長兵間已二十餘年矣不知有宋我輩老且死恐無以係思趙必不幸矣忤時相挫抑顛沛天不假齡賫志沒地諸孤不孝不及見其成大功名也文具録曰臣拘縶絶域十有五年凡所見聞亦嘗記録比聞孟庾南還發篋得其狀稿城阻歸計應有書籍悉被􅀈留臣之所編若緊切者悉皆焚毁獨存此書其官制祿格封蔭諡諱皆出宇文虛中參用國朝及唐法制而增損之臣輒舉其廢置施設之略近左右司侍郎不除却置外郎各一人六部初置吏户禮三侍郎位正四品後置三尚書仍兼兵刑之位正三品又增三侍郎升諸司郎中為從五品添置外郎其後六曹皆置尚書國史院置監修以宰相兼領御史大夫翰林承旨皆闕不除國子監舊在燕京亦不設祕書省令在燕𢎞法寺監少丞郎皆備中丞唯掌訟牒若斷獄會法或春水秋山謂去國數百里逐水草而居處從駕在外衛兵物故則掌其骸骼至國則歸其家諫官並以他官兼之左右丞相以見有人故以侍中令居其下仍為兼職兩省侍郎亦虛位以左右丞皆有見任仍列其上參政亦闕官故在從二品後雖置二員却稱參知明安穆昆以管女真户為上雜以漢人為下明安者謂之肩安穆昆即毛毛可都事令史多以登進士者為之預其選者人以為榮官人法每一任轉一官以二十五月為任將滿即改除並不待闕亦無選人法河南州選人初用舉官升改近以舉官受賂遂廢不行本朝士人有帶職自大觀文至直祕閣皆謂之貼職若換授者不問高下于階官上只加一資既為職名堆重皆官以三品為高六曹郎中舊依遼例皆稱尚書故以侍郎為重今則自侍郎以下只呼階官而不稱其職明經童子兩科仕止于州司侯縣主薄任子之法一品于閣外承應三品內供奉班不限人數亦無年限並補右職皆與監當本朝人換官以進士為上奏廕次之軍功與他出身最下皆入雜班儤使三品以上俸不分正從虛中既在翰林乃誘后舅都檢點乞增正品俸比從三品增三分之一點檢既出復仍舊制近聞一品二品復增正品則三品亦例增矣直省官主供官筆札皆用明經童子登科者為之引接用衙校牽櫳傔從多用燕卒自泗至會寧馹舍地里漫具于後其他不可縷陳聊述大概備乙覽臣無任昧死紹興十三年九月日洪皓謹記十二月張士襄逺小監當張士襄因去歲奉使回奏事不實與逺小監當遂監南康軍城下酒稅張浚觀文殿大學士制曰無德不報君子以兹致祥疑罪惟輕聖人之所惻憫矧兹上宰備載元勳不勝人言之繁寖踈國士之遇投間已久清議譪然冝有褒嘉之章式昭眷倚之厚具官張浚幼負大節早際昌期五龍夾日而飛忠誠莫二三軍之帥可奪生死不移耿然孤忠播在輿論朕講信修好休兵息民通南北兩朝之歡為社稷萬世之計而前日之輔政者何罪滿朝之醜正者何多肆豫元臣久在外服朕今祗見上帝錫賚海隅豈其股肱之良尚處瘴癘之地真祠美職內殿崇資非特以慰斯民之心亦所以增有識之氣金人遣使來賀正旦二十六年辛次膺知紹興府兼浙東安撫使遺史曰先是辛次膺為湖南提刑聞金人遣使張通古來詔諭江南曽上書言父母之讐不與共戴天兄弟之讐不反兵豈有降萬乘之尊屈己稱藩者乎書奏不報即丐祠遂王管台州崇道觀紹興十年金人敗盟次膺有故人將漕湖北者擬寄居鄂渚而依焉及見嶽飛待遇甚厚力留次膺寓居次膺亟歸語兄弟曰嶽飛握重兵昧保身之策祻將及矣飛厚賂其行次膺不受遂入鄱陽寓居宮祠滿以與秦檜不協不復再陳貧窶之甚未嘗以一字通貴要亦未嘗以毫髮干人閲十二年忍窮如鐵石而志氣不少屈兄弟殂喪竭歡致養上順親顔撫恤幼弱一門和熙邑人化之至是除帥浙東未赴移知婺州四月十八日己丑陳誠之為大金國賀上尊號使蘇煜副之陳誠之假資政殿學士蘇煜假崇寧軍節度使副之為泛使上金國主尊號也五月二十四日壬子金人遣敬嗣暉蕭中立來賀生辰三朝北盟會編卷二百二十一
