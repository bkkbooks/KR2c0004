body:
  text: 三朝北盟會編卷一百五十一宋徐夢莘撰炎興下帙起紹興二年十月六日癸巳盡其日十月六日癸巳劉嶸上萬言紹興二年十月六日右迪功劉嶸謹昧死百拜上書皇帝陛下臣伏覩九月四日詔書比以星變示異慮政事闕失內外臣庶直言極諫無有所諱者臣愚不肖學問膚淺智慮茅塞恭承德音雖欲冒昧自竭以奉明詔深為么麼管見不足以禆政事之闕失是憂是懼雖然豈可以不能而遂已耶故盡其愚惟陛下神武天錫聖學日躋有揆亂之略有駕馭之才有恭儉克己之誠有仁民愛物之意宵旰求治于今六年矣算計見效宜遂底績今也不然坐薪嘗膽日以外敵為憂邊陲無休息之期社稷有阽危之慮日難一日嵗甚一嵗乘輿警蹕介在海隅震蕩播越未有攸底而黃潛善汪伯彥顧以乳嫗護赤子之術陛下思上皇之子殆將三十人今所存唯聖體不可不自愛重曽不知太祖勤勞取天下列聖兢業自守不敢失墜也今也宗廟為草萊湮之陵闕為斧鍤警之堂堂四郊戎馬生之赫赫帝圖盜賊營之然則潛善伯彥所以誤陛下陷陵寢蹙土宇喪生靈豈燕昭越踐漢光武唐肅宗之為乎本初嗣服既不為二帝之策因循逺狩又不為中國之謀以至于今號令不行而德義不孚刑罰不威而爵賞不勸巡幸所過人惟以淮甸為戒駐蹕所在人惟以敵至為憂東南之州郡幾何翠華之省方無已若不更轍以救危亡則陛下永負孝弟之愆當有父兄之責人心已去天命難恃雖欲羈棲山海跋履﨑嶇臣恐非所以為自全之計為今日之策願陛下一切反前失而已則必下詔曰維紹大統出於臣庶之諂而不悟其非巡幸東南出於僥幸之心而不虞其禍經涉變故僅免死亡蓋上天警悟于眇躬俾大宋不失於舊物金人以小邦崛起侵侮中原不顧名分扶立僭偽用下僭上俾臣作君朕義不戴天志思雪恥父兄旅泊陵寢荒殘罪乃在豫無所逃責以此號四海聳動羣心不敢愛身決意講武然後選將訓兵戎衣臨陳忽巡淮甸按撫荆襄拔其英豪誓以戰伐天下忠義之士必雲合而景從天下武勇之夫必響應而颷起國用不足于此不患無財甲兵不強于此不患無備有道多助孰不順之秦隴雖遙壯士驍騎即可坐致齊魯雖失饒財厚貨必自竭輸陛下凡所欲為孰不如志其為利害豈與退保吳越日就滅亡同年而語哉臣不自量每竊憤嘆既未能被堅執鋭先啓戎行而服膺簡編討論古昔固嘗忘其昧陋少贊經綸輒為陛下畫七䇿以為中興之術其一曰罷和議而修戰略蓋和之可講者勢力相敵利害相當故也非強弱盛衰不相侔所能成也而其議則出于耿南仲何也淵聖在東宫當宣和季年頻不得安王黼欲搖動者屢矣南仲為東宫官計無所出則歸依右丞相李邦彥其時被遇方寵又為後日之計每因王黼譛害浸潤則必委曲覆獲謂太子無失德國本不可搖上皇亦悟其言東宮卒得不動既而淵聖嗣極逺遷前朝大臣而邦彥為次相金兵遽至城下邦彥諧謔小人本無逺略遂獻和議耿南仲附之沮种師道不使攻擊于是覆邦之患滋蔓而起分朋植黨各求其説之勝欲用兵者李綱种師道兩人而已自餘莫不以講和為是者國論不一武備闕然中州河東之師必使陷沒以伸和議之必信二聖逺去宗族盡從中原塗炭至今益甚者本緣耿南仲李邦彥懷感私恩不為國慮之所致其朋徒附合根枝膠結寧誤趙氏不負耿門之所為也使其可和則淵聖執德不回馴致禍敗而陛下卑辭厚禮避地稱臣無所不至宜其少緩兵于我矣何乃纍年而尚未效耶和之不可恃亦明矣自古國家強盛如漢武帝唐太宗方其得志逺方則必併吞掃滅以示廣大侮亡取亂極其兵力而後已中國禮義所自出也恃強凌弱猶且如此今乃以謙退仁慈之事望于怙勢恃強貪黷無厭之尼堪豈有此理哉若以為強弱之勢不相侔縱使向前莫有能抗則古昔奮臂徒步無尺寸之地而爭帝王之圖者彼何人哉伏望陛下明照利害之源罷絶和議刻意講武以使命之幣為養兵之費此乃晉惠公征繕立圉之策漢髙祖迎太公呂后之謀斷而行之確守不變庶幾金人知吾有含怒必鬭之志沙漠之駕或有還期不然則今僻處江南財物有限厚賞則吾益困少乏則無以足其欲小臣則不為遣大臣則張邦昌宇文虛中相繼而反我矣深思熟慮前計後度所謂乞和必無可成之理昔契丹至澶淵王欽若陳堯佐請幸吳蜀惟冦凖勸親征及成功之後欽若輩羞愧無所為説則撼真宗曰當時冦凖亦豈有好計但是熱血相沃譬如博錢以陛下為孤注耳使人君不明則欽若之言為愛君冦凖之功為幸勝今日之論和者其情狀一一出于是茍能息絶其和知陛下不藉之以塞民望大臣不藉之以寬己責則必為善後之圖矣其二曰置行臺以區别緩急之務今四方供貢久不入于王府往往為州郡以軍須便宜截用經常一壞不可復理行在百費惟以𣙜貨鹽利為無窮之源爾養兵十萬而兵食日費無慮七八十萬古謂無三年之藏則國非其國今無一年之積招安日至窘匱日形此豈持久之道故臣愚謂置行臺或建康或南昌或江陵或長沙審擇一處以安廟主太后六宫百官以耆哲諳練大臣總臺謹守成法從事量留兵將為營衛命户部計費調以給之陛下提兵按行廣治軍旅周旋彼此不為定居則饋餉之權宰相宜專主之而責成於發軍使如漢委蕭何以關中唐委劉晏以東南經制得人盡汰浮費加以悠久不患無財至于宰相之職平時則守憲章行故事今則不然宜從陛下介胄馳驅發謀制勝莫遑寧處協濟危難若乃早朝晚見從徒乘馬入政事堂據案呼吏畨簿判花書那移闕次安排親舊差遣而已臣未見其補于中興之萬一也其三曰務實效去虛文夫治兵必精命將必賢政事必修誓戡大難不為退計此孝悌之實也遣使乞和空捐金幣不憚辱己幸僥萬一者孝悌之虛文也將帥之才智必能謀勇必能戰義必能守得是人而任之然後待以恩御以威撫以誠信有功必賞有罪必刑此任將之實也庸駑下才本無智勇見敵則潰無異于賊與之親厚等差不立賜與過度官職逾涯將以收其心適足致其慢聽信妄誕張大之語冀其朴實用兵之功者任將之虛文也簡汰其瘦老病弱外擇其壯健驍勇分屯所在置營房以安其室家聚粟帛以足其衣食選衆所畏信者量其部伍申明舊制階級之法以變其驕恣悍悖之習被之以精甲付之以利器進戰獲敵首則厚賞死則恤其妻孥潰則誅其身降敵則戮其族令在必行分毫不貸此治軍之實也無所别擇一切安養姑息之惟恐一夫變色不悅幸其無事則已矣教習擊刺呌噪喑嗚有如聚戲金鼓旗號白挺小隊皆效敵人紀律蕩然雖其將帥亦不敢自保者治軍之虛文也保宗廟保陵寢保土地人民以此六實行乎其間則為天子之實也陵廟荒墟土地日蹙衣冠黔首為血為肉以此六虛行乎其間陛下戴黃屋建幄殿質明輦出房雉尾金爐夾侍兩仗馬肅立衛兵走而拜仗贊者引百官以次入奉起居畢既退宰相大臣卑而前搢笏出奏司晨唱晨正則駕入而仗出以度日而國勢日卑彼尼堪者晝夜勵兵跨河越岱電掃中原土地遂有吞吸江湖踐衡霍之意吾方挾虛器茫茫然未知所之此則為天子之虛文也伏願陛下留意實效勿受虛文憤發慷慨而力圖之其四曰大起天下之兵今宿衛單寡國威稍挫臣常建言乞進發京師宿衛赴行又降等仗于兩浙福建江東西湖南北四川二廣抽揀禁軍貢發充御營正兵增厚其月廩精加訓閲陛下自將之天子之軍既強則中國之變自弭漢髙祖大敗成臯與數騎渡河晨入張耳韓信軍奪其印易置諸將軍遂復振陛下今欲于劉韓張辛四人之兵有所易置知其不能矣權既偏重柄既倒持彼必謂陛下不能舍之夷踞桀鷔日以滋起陛下以孤立之身寄於其上安能使此四人常無怨怒相激而不為變此苗劉之禍率爾而作者由此故也臣謂今日在兵必不可易既未有變革之法莫先集天下徑兵以強御營之勢然後可以彈壓悍將驕兵兵既不能妄動咸就紀律則四方橫潰之軍及羣起不逞之盜必自帖息猶有猖獗不順者遣偏師以鋭卒往擒滅之遂罷招安之説陛下以報仇雪恥為己任仗義而行天下凶頑不義之徒固將斂袵倒戈而聽驅役之命矣漢光武為銅馬帝者用此道也東南之卒既起則又命福建團結槍仗建汀南劒邵武四郡可得二萬人各擇其土豪使部督之以俟興發命兩浙募水手并起諸州撩湖捍海等兵盡付水軍命江東西湖南北募弓手以在官間田給養人得一頃正稅之外科須一切與免命廣西及長沅鼎靖于見教洞丁中簡其精鋭分畨起之屯戍襄漢以京西淮南荒廢無主之田為屯田招集兩河山東本路流徙之人略依古法均節之擇強壯者訓習武藝使且耕且戰文武臣中有明習營屯之事肯自奮者因以任使凡此六條陛下試使執政大臣委棄簿書細故勿設他説以相論駁日夜以圖擇人而為之纍嵗積日必見功績于是時而兵弗強敵弗畏盜弗息然後歸之天命無所為矣不然是自棄也陛下茍有自棄之心而欲求勝于目前三尺童子亦知其不能矣其五曰定根本者豈非建都之謂也陛下家世都汴舍汴何都焉今都城已失則必思所以克復舊物者然考天下之勢莫強乎關中今則力未能至按南渡之迹莫過乎建康今則事理不可參擇二者欲強進取之資而無形勢之失惟荆襄為勝春秋之時楚用是而抗衡上國窺周問鼎曹操聞孫權以荆州借劉備則失箸驚恐厯朝建立必增重上流庾亮欲經營中原則先分戍漢沔晉太祖欲伐魏則先廣襄陽資力故晉之何充謂荆楚國之西門地帶魏趙得人則中原可定失人則社稷可憂今方城鄧林雖非天險然漢水為池上下不過千里其要害易守非如淮泗汗漫平原曠衍四通五達易入而難避也誠能屯唐鄧之田以養新兵出廣西武陵洞丁并施黔山軍築堅壘列守漢上阻以水軍防以正軍繚以弓手民兵牽制江黃呼吸廬壽則攻取之計成然後陜西聲氣相應而騎卒能至川廣之富皆可供億且比於漂泊大江之南棲伏東海之濱險易利害相去逺矣建康固是六朝舊邦甘守偏隅遷延國祚亦何不可而臣獨為不可者蓋以陛下之責與晉元不同故也西晉為劉聰併吞復立懷愍兩君皆遇弒殞故帝以琅琊王慿王封專制江淮十年之威又因人心未忘晉起而立國然傳祚十世享國百年強臣內叛苻秦外逼其得存猶綴葉露耳當時非謀臣猛將提重兵出入終不能復取中原者亦勢使然也今陛下父兄在北中無恙穹廬蠻帳相與類聚其衣服飲食居處動靜豈得比中國民庶中人之奉哉其聞陛下登寶位也必旦夕南望曰吾有子弟為中國帝王吾之歸庶有日矣痛摧愁荒屈辱之中發此念為此言于今數年日迫月切而獻謀者方欲導陛下南駕日逺月忘遂無復國之謀别求建都之所此臣所以深不曉也今河東河北之民知朝廷不復顧念己甘為金人山東京西淮甸之民猶冀陛下未忍遽棄若更遲延嵗月無以拯之則怨恨陛下為敵國者所至皆然亦何必尼堪哉于此而欲建都臣知其必不能然亦何心願陛下先命呂頤浩杜充過江廣斥堠治盜賊然後精選二三萬人為輿衛于穩密州郡速置營屯居室以安存其所謂老小者陛下提此兵渡江南北緩轡而上遣使巡問父老撫援刀刃之餘民至于荆襄規模措置為根本之地猶漢髙之關中光武之河內雖巡幸往來征伐四出而固守不可失者以荆襄為重陛下富于春秋非如昔人白首舉事覬萬一之成者誠能堅忍鼓勵坐薪嘗膽悠久為之而不能濟則書所載夏少康周宣漢光武之事皆為妄言以欺後世不足信矣陛下必謂不然也三朝北盟會編卷一百五十二
