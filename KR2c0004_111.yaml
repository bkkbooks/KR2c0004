body:
  text: 三朝北盟㑹編卷一百十一宋徐夢莘撰炎興下帙起建炎元年七月七日乙未盡十六日甲辰七日乙未宣示太上皇帝親書絹背心八字諭宰相黃潜善等上出絹背心一領宣示泣諭宰臣等曰道君太上皇帝自燕山府密遣使臣曹勛賫來背心領中有親書八字曰便可即真來救父母羣臣皆泣奏曰此乃陛下受命於道君太上皇帝者宜藏之宗廟以示萬世借通直郎龍圖閣河北西路招撫司張所上殿面賜章服遣行所具畫一乞以京畿兵三千為衛於大名府置司一面遣官於河北西路告諭招諭山寨首領民兵候兵集日渡河先復濬衛懷州真定府次解中山府等處圍乃以民兵給地飬之如陜西五路弓箭手法乃賜緡錢百萬以為半年之費金人陷慈州權知軍州事張昱棄城率衆走張昱平陽府吏人也犯罪刺配至靖康間在平陽境內山中聚集數千㑹慈州無守軍民共議迎昱入州權知軍州事金人屢次其境皆不攻徑過至是金人乃以兵至慈州州無城不守昱遂棄城率其衆出奔金人陷慈州即時撫諭而去十三日辛丑京城留守范訥降授承宣使淄州居住宗澤入京師臣僚上言范訥為宣撫使日專懷顧望無意勤王軍律不嚴不能戢士遂降授承宣使罷留守淄州居住上即位宗澤嘗因天下兵集乃請親征迎請二帝力圖中興黃潜善汪伯彥沮止之乃加澤待制知襄陽府澤又乞兵十萬往收復河北不許訥既罷遂以澤為京城留守丙午澤入京師治事林泉野史曰范訥字子辨開封人武舉中第童貫門客纍樞密都承㫖貫為宣撫使訥嘗為參謀遷節度使靖康中金陷太原加訥檢校少保河北河東宣撫使以兵五萬屯河北河東訥同馬忠王元王淵韓世忠退師應天金人攻城訥屢敗之建炎初除東京留守邵溥副之在任三月李綱相素與訥不協降承宣使淄州居住後退居邵州年老徙居䕫州依其姪總以卒詔請元祐皇太后幸揚州王燮傅亮上殿面賜燮器甲三萬人就陜府置司與金人河中府解州對壘一面遣人結約河東山寨豪傑民兵收復州縣候兵集日乘機㑹過河得㫖從之左正言鄧肅劄子言叛臣乞立格定罪劄子曰臣謂叛臣曽事僞楚大小輕重固有不等欲乞立罪格一定於此然後按僞楚之籍取叛臣姓名就格斷之庶幾君臣之間皆不得容私伏䝉陛下為臣昨在圍城之中固知姓名令臣奏來臣謹取㫖所撰二撰二格以按叛臣之罪為陛下盡陳之言所論叛臣之上者其惡有五一曰諸侍從之為執政者王時雍徐秉哲吳幵莫儔李回是也其二曰諸庶官及宫觀而起為侍從者如司農卿胡思太府卿朱宗之為侍郎大理卿周懿文為大尹盧襄李擢范宗尹等皆起於宫觀以為侍從是也胡思周懿文今者桎梏固不足論敵破城是南壁始李擢盧襄提舉其事日聚羣小浩歌城上敵已塞濠恬然不顧破京城者實此二人范宗尹昔嘗宣和廷對揣王黼之意數蔡攸之罪遂竊虗名以居臺諫當官則以奴僕事耿南仲以取侍從城破則以妾婦事范瓊以資口腹及僞楚一立則起於宫觀以為諌議然不知所陳者何事哉其三曰撰勸進文與撰赦書是也且赦書之惡不減勸進其詞云有堯舜之揖遜無湯武之干戈不惟不忠之語可駭天下至於廟諱便不復顧雖犬馬有所不為朝廷取撰進文者投之嶺外而以撰赦者止令分司是不知亦何私於顔博文哉其四曰事務官者金人已有立僞楚之語朝士集議恐不能如禮遂私結十友作事務官之力也且陛下嗣立之儀求供奉之物悉心竭力無所不至使邦昌安然得為揖遜以事美觀皆事務官之力也且陛下九五之位無不欣躍如獲再生朝廷不聞先時以為事務官者及僞楚之立而十友紛然如水就下此其情尤可罪也其五曰因邦昌改名是也何昌言先奏於僞楚之庭乞改為善言其弟昌辰遂請於吏部改為知言惡犯昌字也已上數臣乞定為叛臣之上置之嶺外所為叛臣之次其惡有三其一曰諸執政侍從臺諌稱臣於僞楚及拜於庭下者是也所謂執政者如馮獬曹輔是也所謂侍從者其餘已行遣矣獨李㑹尚為中書舍人所謂臺諫者洪芻黎確等及舉臺之臣是也當時臺中有謂金人根括而被杖四人以病得免其餘無不在僞楚之庭矣且臺諌者天子耳目之官也敵騎迫城尚持講和之論聖駕將出曽無一言之戒天作竒禍則倉惶失措遂於他人之庭復處臺諌之職今日尚有不易舊職者不知其所為如此又何論他人之過耶其二曰以庶官而升擢差遣是也然此不可勝數僞楚以後謂之權官而被僞命劄子者皆是也臺省寺諫學校敕局無所不有乞專委留守按籍取之則無有遺者其三曰願為奉使者是也黎確之使趙野李健陳戬之使翁顔國擁黃旗持僞告左右僕從皆受僞恩馬上洋洋自號奉使力說勤王之師以為邦昌久居計故邦昌曉諭曰只候勤王師退然後開門蓋恃有二三奉使耳已上數臣乞立為叛臣之次於逺小處編管吏部供到王時雍見係髙州安置徐秉哲見係梅州安置吳幵永州安置莫儔全州安置李因袁州居住朱宗之朝奉郎李擢桞州安置范宗尹通直郎提舉杭州洞霄宫盧襄太中大夫權開封府尹胡思周懿文朝散大夫顔博文豐州安置何昌言生前尚書工部侍郎何昌辰通直郎通判南劍州馮獬中大夫提舉成都府王舉官李㑹中書舍人洪芻朝散大夫孫確朝政大夫李健朝請郎陳戩虞部員外奉聖㫖吳幵移韶州安置顔博文移賀州安置朱宗之責授祈州團練副使嶽州安置范宗尹責授欣州團練副使鄂州安置盧襄責授陳州團練副使衝州安置何昌言追授隰州團練副使及追致仕恩澤何昌辰除名勒停送永州編管馮獬責授朝議大夫祕書少監分司南京城州居住黎確李戩遠小處監當撰勸進文及事務官劄子留守司開具姓名申尚書省李回責授安遠軍節度副使惠州安置李㑹責授承議郎祕書少監分司南京筠州居住上制曰君臣分定宜生死之靡他義命趣殊在賢愚之所擇豈有本朝之顛沛遽令大節之磷緇爾幸授國恩與聞機政知拔本塞源之公憤蓋戴天履地之所同乃甘心二姓之庭至冒寵百僚之上兹如不問何以馭臣宜從置散之科用正投荒之典皆爾自取非朕敢私十四日壬寅李綱乞降巡幸詔是日李綱同執政奏事訖留身奏曰朝廷近日外則經營措置河北河東兩路以為藩籬葺治軍馬討平盜賊內則修事賞刑皆漸有緒獨車駕巡幸所詣未有定所中外人心未安上宣諭曰但欲近奉元祐太后及津遣六宫往東南朕當與卿等獨留中原訓練將士益聚兵馬雖都城可臨雖金人可戰臣再拜曰陛下英斷如此雖漢之髙祖光武唐之太宗不過是也中外未知聖意乞降詔告諭十五日癸邜下巡狩詔朕惟祖宗都汴垂二百年天下乂寧重熙纍洽未嘗少有變故承平之久超軼漢唐比年以來圖慮弗臧禍生所忽金人一歲再至都城信其詐謀終墮敵計盡取子女玉帛遂邀二聖鑾輿六宫戚屬悉擁以行中原之禍振古未有四海臣子孰不痛心肆朕纂承永念先烈眷懷舊京澘然出涕思欲整駕還京謁欵宗廟以慰士大夫軍民之心而民人已多物故朕之父母兄弟宗族靡有留者顧瞻宫室何以為懷是用權時之宜法古巡狩駐蹕近甸召軍馬以防金人秋髙氣寒再來入邉朕將親旅以援京師河北河東諸路與之决戰已詔奉迎元祐太后津遣六宫及衛士家屬置東南朕與羣將羣臣獨留中原以為爾京城及萬方百姓請命於皇天庶幾天意昭答中原之勢寖彊歸宅故都迎還二聖以稱朕夙夜憂勤之意應在京屯兵聚糧修治樓櫓器具並令留守司京城所户部疾速措置施行咨爾士大夫軍民體朕至懷無有疑慮故兹詔示想宜知悉誅宋齊愈遺史曰新除諫議大夫是時李擢見任給事中擢與齊愈在圍城中皆非純臣擢謂齊愈為諫議大夫必論已必得罪且曰先發制人乃不書黃而具齊愈議立張邦昌事繳駮之曰新除諌議大夫宋齊愈昨三月初王時雍等在皇城司聚議乞立邦昌拜大金之詔書畢立狀時雍等恐懼不敢填寫邦昌姓名而齊愈奮然執筆大書張邦昌三字仍自持其狀以示其四壁無不驚駭齊愈自言自從二月在告不出誕欺若此今除諫議大夫當是陛下未知其人邪佞而朝廷未有人論列更乞聖裁遂罷諌議大夫令御史臺王賓置司根勘具案聞奏制曰義重於生雖匹夫不可奪志士失其守或一言庶幾喪邦具官宋齊愈蒙國厚恩為時顯宦方氛祲結蕭墻之內至仇讎謀大位之人事既非常坐皆失色所幸探符之未獲奈何援筆以遽書遺毒至今造端自汝睦孟五行之說豈所宜言袁宏九錫之文兹焉安忍其解諫垣之職以須廷尉之平邦有常刑朕安敢赦據王賓勘到通直郎前右諌議大夫宋齊愈招金人邀請淵聖皇帝出城未回知樞密院孫傳承軍前遣吳幵等將文字稱廢淵聖皇帝共舉堪為人主一人及知孫傳等乞不廢淵聖皇帝不許須管於异姓中選具姓名申齊愈知孫傳等在皇城司集議遂本司見衆官及桌子上有王時雍等衆議推舉狀草齊愈問王時雍舉誰時雍云金人令吳幵來密諭意張邦昌今已寫下文字只空著姓名又看得金人元來文字聲說請舉軍前南官比參驗王時雍語言即是要舉張邦昌齊愈恐違時有别不測為王時雍說吳幵密諭張邦昌亦欲早圖了結齊愈輒自用筆於紙上書張邦昌姓名三字欲要於舉狀內填寫却將呈王時雍其時時雍稱是又節次遍呈在坐元集議官時齊愈言道張邦昌衆官看了别無語言齊愈令人吏依紙上寫張邦昌姓名三字於己寫到選舉元空缺姓名舉狀內填寫張邦昌姓名三字了後别寫申狀係王時雍等姓名呈時雍看了分付與吳幵莫儔將去其舉狀內别無齊愈姓名所有齊愈寫張邦昌紙片子即時毁了並無見在只收得王時雍等元議定推舉狀草歸家初蒙勘問時懼罪隱忍不招再蒙取㑹到中書舍人李㑹狀軍前遣吳幵莫儔傳大金指揮須管於今日异姓中選擇具名申即不引惹趙氏是日在皇城司聚議忽有右司員外郎宋齊愈自外至見商議不定即與本司㕔前寫文字吏人桌子上取紙筆就桌子上取紙一片寫張邦昌三字却不是文字上書寫遍呈在坐相顧失色莫敢應無别語言其所寫姓名文字係宋齊愈手自將却會即時起取是時即記得侍御史胡舜陟在司業董逌午間亦曽在坐未委見與不見其餘卿監郎官會以到京未久多不識之及根勘元狀草字再勘方檢會建炎元年五月一日赦內一項昨金人逼脅使張邦昌僣號實非本心今已歸復舊班其應干供奉行事之人亦不獲已尚慮畏避各不自安其已前罪犯並與放免一切不問勘㑹上項赦文係謂張邦昌僣號之後供奉行事之人特從寬貸法寺稱宋齊愈後謀叛以上斬犯不分首從敕犯惡逆以上罪至斬依法用刑宋齊愈合處斬仍除犯名在五月一日大赦前合原赦後處虗妄杖一百罰銅十斤入官放情重奏裁奉聖㫖宋齊愈身為士大夫當守節義國家艱難之際不能死節乃探金人之情親書僣逆之臣姓名謀立异姓以危宗社造端在前其罪非受僞命臣僚之比可特不原赦依斷仍令尚書省出榜曉諭張浚行狀曰宰相李綱以私惡諌議大夫宋齊愈加之罪至論腰斬公素與齊愈善知齊愈死非其罪入臺首論綱罷之十六日甲辰孟忠厚除徽猷閣待制為迎奉隆祐太后提舉一行事務步軍指揮使郭仲荀統兵扈衛司封員外郎楊遇沿路州縣預行計濟糧草置渡舟船尼堪自草地歸至雲中遣楊天吉使夏國約同侵陜西金人起燕山雲中中京上京東京平州遼西長春八路民兵入自西河節要曰渤海萬户大托卜嘉屯兵河間金國都統溫圖琿阿勒巴屯兵於保州金國萬户特默屯兵於永寧祁州金國萬户呼沙呼屯兵於濮州金國萬户聶哷屯兵於冀州金國副統碩哈屯兵於真定遼東漢軍萬户韓慶和屯兵於慶源金國都統萬佛努屯兵於雄莫金國萬户實哷屯兵於慶源金國副統蒙克屯兵於磁相金國萬户尼楚赫與其弟博索屯於泰源新城金國萬户錫里屯兵於嵐憲契丹都統馬武屯兵於平陽契丹缺屯兵於慈隰金國萬户石嘉努屯兵於汾州金國萬户羅索屯兵於河東蘇村羅索之子屯兵於解州安邑金國萬户薩里罕屯兵於絳州金國萬户溫闕屯兵於澤潞金國都統察罕瑪勒屯兵於孟州哈達攻守諸州郡元帥府左監軍達蘭親圍中山又曰兩河州郡自敵初入侵以朝廷指揮皆得便宜行事故各據人馬以國自固逐路帥司不能調發致無連州合勢相援拒敵之理其敵之大又非一州之力可敵故令敵聚併力既破一州而復攻一州也至是以京城失守二聖北狩河北州郡官盡為官軍作亂害之河東州郡官多棄城而南走兩河州郡外無應援內復自亂於是為敵乘而取之如俯拾遺物惟中山慶源保莫祁洺冀磁相絳久而陷之三朝北盟會編卷一百十一
