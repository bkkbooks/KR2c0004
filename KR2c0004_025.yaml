body:
  text: 三朝北盟會編卷二十五宋徐夢莘撰政宣上帙起宣和七年十二月十六日癸丑盡二十三日庚申十六日癸丑童貫至京師十七日甲寅尼堪圍代州闕縣都巡檢使李翼死之武德郎奏差代州西路都巡檢使李翼麟州新秦人宣和七年十二月七日金人擁兵南下翼屯闕縣為敵所圍十一日敵既陷代州則遣李嗣本降翼翼射却嗣本帥士卒堅守義守軍統領崔忠代州人有異志翼欲圖之未果十七日忠殺都堅張洪輔夜引敵入城翼挺身搏戰達旦以力不能敵就執金相國與烏舍郎君必欲臣之翼怒罵不屈與將吏折可與知縣李聳縣丞王唐臣縣尉劉子英監酒閻誠同被害始敵人以翼等徇闕縣遇崔忠通衢翼痛詆忠忠掩面而遁翼臨誅南向呼官家者數聲乃絶宣司奉便宜黜陟聖旨李翼特贈武德郎吏部員外郎續觱撰公行狀云有宋仗節死難之臣武德郎贈武義大夫李公諱翼字輔之宣和二年河東路同統制韓實辟充隨軍在陳將屯馬邑時朝廷方有事于燕山朔州雖已撫定而土著數千人結連謀叛安撫使李嗣本檄委公彈壓至則陰索首謀誅其首惡十餘輩餘黨帖服是時金人新破雲中數遣使窺邊虛實有蕭慶者每來必臂鷹出郊公謂統制來承慶韓實曰慶金之大猾詭名飛教實欲窺我險易察其辭意將造釁端莫若先圖之此去雲中二百五十里若以精兵數萬出其不意一晝夜可至搗其脊膂則禍根可除會將官折仲安亦言金人無信不若先討之承慶韙其謀備陳于太師張孝純大怒且謂兩國方講和好輒敢妄議欲啓邊釁左邊雲中等一副將駐軍寧化軍公又陳便宜不合遂改差代州西都巡檢使後金人寒盟承慶曰李折二公何先見之明如此追咎孝純不用其策飲恨發疾而死宣和七年冬十二月金人大入圍闕縣遂破代州安撫使李嗣本降金人遣嗣本招降諸縣嗣本遣部將臧份即城下説諭公厲聲叱罵嗣本抽矢射臧份中馬即仆份等遽退公謂所善將軍官折可與曰與公同守此城當盡忠節以報國家時朔州孫翊及將官折仲安引本部兵屯陽武寨陰以文字相往來公建議以謂石嶺關太原之襟喉天險崇峻若守關旬餘則太原可以聚糧徐俟四方之援敵屯兵堅城下勢當狼顧必不敢長驅而南二公深然其計復以臘書招公亦以前議告折可與欲分兵趨石嶺闕縣居民俱號泣馬首遮道請留時可與弟可存路知行知縣李聳縣丞王唐臣監押張洪輔縣尉劉子英監酒閻誠義勝軍統領崔忠同被重圍獨忠本燕人歸國朝廷待以不疑俾將燕軍公俄聞張孝純以歸朝官耿守忠守石嶺關仰天嘆曰是人烏足託耶國家大事去矣援兵不至謂縣官曰崔忠一漢兒貪利茍生豈有忠節可與共守萬一內變豈惟上誤國家吾屬亦受禍矣不若先事誅之衆默然惟折可與然其説知縣李聳云崔忠頗忠義試與熟計守石嶺關利害公曰若告崔忠詎肯從我既而忠果不從且與折可與爭長門鑰可與曰公歸朝官恐民生疑忠曰我乃官長爭辨移刻不決公忿然奪鑰毁折之曰既與諸公盟為國家守城何必爭此候圍解而後啓關紛拿始定明日崔忠集邑僚議事張洪輔曰聞義勝軍欲為內應如何忠曰豈敢容手下人反忠目帳下拔所佩刀刺洪輔殺之公遽取部曲所執撾擊退叛兵亟尋忠已避去遂登城守禦已而忠果引敵人入城焚樓櫓劫居民公血戰自暮至旦力窮被執方未城陷前一日公遽以四事囑其子宗周曰我不能茍活從偽聞代州史安撫突圍戰沒將官辛漸罵賊自刎我死汝謀歸鄉里訴于朝廷使吾死節不泯後世謂吾為有宋之忠臣而吾謂汝為孝子矣他日朝廷恤典推恩可令汝伯父孤遺受之汝繼母擕重資嫁吾未幾月吾以國事豈能顧戀汝當侍奉如親母設不幸陷敵勿相棄背吾死汝能返骨營葬先壟使得奉先人於九泉死復何恨公之被執也尼堪烏舍好語諭公欲更受北官公詬罵不屈烏舍復遣説公曰我欲取天下彼一小縣敢抗大軍我亦喜忠義未欲殺汝等但一言相順特與免死仍舊職任汝等便可拜也公謂折可與曰不可食前言與公生死共處遂復罵二帥曰我南朝臣子以姦賊內應致被擒殺則任殺豈肯拜汝仇讐耶譯者意欲相全又以甘言誘公公裂眥戟手指呼尼堪烏舍曰不幸被汝等搶辱我豈茍生者可與亦曰我多年世守之家寧肯負國敗壞家聲汝若見愛不若亟殺我羣卒憤悱持梃紛擊公傷額可與損一目咸勿顧慢罵愈甚敵將嘆其守節復諄諭曰汝等本皆合死念汝等忠義姑欲全貸尚敢肆惡言罵辱尊貴大人公曰我輩若手有寸刃當殺爾豈特罵耶敵知終不可屈乃驅徇闕縣入城遇崔忠于通衢公大罵忠忠掩面遁走公被害之際猶囑守者冀少緩儻得南面望拜死無所恨守者不從但轉頭南向呼官家者數聲曰臣忠力不效不能剪滅此讐以報國恩至死聲始絶餘官吏俱被害獨折可存路志行得免其家沒入於金後詔述公忠烈付史館十八日乙卯尼堪兵至太原知朔寧府孫翊來援戰敗被殺封氏紀年曰尼堪兵至太原知朔寧府孫翊來援兵不滿二千與金人戰于城下張孝純曰敵已在近不敢開門觀察可盡忠報國翊曰但恨兵少力乏乃復戰數日五兵皆盡為金人所殺尼堪屯太原北陳村既敗朔州守將孫翊於太原城下又敗府州守臣折可求於交城節要曰孫翊河東名將也守朔有聲金人亦憚之尼堪既至太原反據雁門翊自朔不得入遂由寧化憲州出天門關以援太原營于城下尼堪忌之翊之離朔旬餘之間朔不守降于賊而翊麾下多朔人至是尼堪驅朔之父老以示翊軍於是翊軍變翊方戰為叛徒害之歸敵可求統麟府之師二萬衆自府州涉大河由岢憲州將出天門關以援太原為敵據關不克進復越山取松子嶺道出焉至交城遇尼堪之衆大戰移時可求逺來新至勞逸有間故致敗績嘗謂敵初入太原翊與可求隨而援之可謂勤矣然而雖有援太原之心而無援太原之術何哉當尼堪自雲中悉師徒入太原之初翊在朔州由馬邑懷仁皆邑名東去雲中無數舍之逺可求在府州由武朔東去雲中路近于交城且仍皆坦途别無關阻若翊與可求會麟武朔之師併力以搗雲中時尼堪之徒骨肉財寶盡在雲中而其所留護守之人皆老弱而已如聞攻其必救之地必倉皇釋太原以救雲中如是則太原張孝純王稟之軍自可從而襲之使烏合利聚之徒致後顧前憂之地自生變亂必然之理非惟太原得解敵軍亦平又且新邊之勢可張我勢而安羣心此轉弊於人轉客為主故孫臏走大梁而救韓皆此道也何翊與可求之見止務先到太原為功殊不知近搗雲中逺救太原之要地而復返回山險人疲馬乏反為彼用以間離之以逸待之宜乎身死軍覆無以成功所以詳論此者蓋太原之圍乃中國禍亂之原也茍使當時尼堪失意則東路斡里雅布氣亦喪矣至如斡里雅布得善脫於東京亦未敢復至河南朝廷可自從容為計而止因太原被圍朝廷區區幾年救之何暇治其他哉至太原之陷也踰月之間敵已南來國家之力已困于河東矣將士之氣已沮于河東矣故京城所以失援臣由是惜翊與可求救太原無術也封氏編年曰知府州折可求并軍馬使權知晉寧羅稱延安府路援兵劉光世與金人尼堪大戰于太原之交城自早至日中勝負相償而我師等各據地分偶至日中金人兵忽自可求寨後開生山而出劫其家計寨劉光世望風而奔可求乃潰羅稱韓權死于陳自是河外兵將十喪七八夏人陷天德雲內河東八館等地初尼堪遣察勒瑪使夏國許割天德雲內武州及河東庫德薩喇虛逹切和勒端野鵲神崖榆林保大裕民八館河西金肅河清二軍約入攻麟府以牽河東之勢至是夏人由金肅河清軍渡河取天德雲內河東八館及武州以應尼堪之約盡陷其地斡里雅布攻保州安肅軍不尅十九日丙辰下詔諸色人獻利害事詔曰河北燕山邊面事理宜詢訪利害選用人材特許文武臣僚諸色人經尚書省投狀自效并獻陳緊切利害是時朝廷知金人長驅兩河故有是詔二十日丁巳御筆皇太子除開封牧餘依故事付翰林草制非左右大臣建明出自朕意沈琯在路上和議書于斡里雅布南歸録曰二太子初告蔡靖以講和事請將文字來靖既留琯恐中輟遂草一書與太子云某謹獻書皇太子麾下某竊謂天地之德可為大矣而孔子以一言盡之曰生而已伏惟皇太子親擁兵以責不信自入境來不殺一人不取一毫河北之城守而不下者察其愚衷未嘗逼而攻之真體天好生之德也趙皇聰明睿知聞於天下特用事之臣有以蔽蒙之其不信之罪固有所在唐堯昔之盛帝也猶且用方命圯族之鯀至于九載績用弗成然後殛之于羽山成湯昔之賢君也其臣不稱其無過而稱其改過不吝趙皇之德過於堯湯豈不能殛鯀而改過哉况我太祖太宗以揖讓而取天下雖功成而亦不誅戮繼之以真宗仁宗純以仁義治之德澤在人也深未易動搖趙皇又安肯遽舉河朔而遂棄之亦須聚兵而一戰勝負姑置不論然勝者豈全無殺傷之害特有多寡之異而又况於負者哉兩國之兵各盡死以忠于國而使肝膽塗地非皇太子入燕之初所以諭人臣之本意也某欲請選輕兵十騎隨某先馳至汴親見趙皇臨遣大臣前來軍前計議多少金帛以犒將士更增嵗幣以重和好亦大金皇帝無窮之願豈不美哉如以為然願速行之或以為不然即放令不用使留之軍中無益也十二月十九日書上當日在安肅軍門外説與監守軍官等獻講和事衆人皆云甚好如此則花又不損蜜又得成遂問隔營一軍官借得一筆硯及毛頭紙三副燈下寫了次日投不得因馬上見頤浩出以與之令達國王二十一日戊午下罪已求直言詔詔曰朕獲承祖宗休德託身士民之上二紀于兹雖兢業存於心中而過咎形於天下蓋以寡昧之姿藉盈成之業言路壅蔽導諛日聞恩幸持權貪叨得志縉紳賢能陷于黨籍政事興廢拘于紀年賦斂竭民生之用戍役困軍伍之力多作無益侈靡成風利源商𣙜已盡而謀利者尚肆誅求諸軍衣糧不得而冗食者坐享富貴災異屢見而朕不悟衆庶怨懟而朕不知追惟已愆悔之何及已下信詔大革弊端仍命輔臣蠲除害政凡兹引咎興自朕躬庶以少謝上天譴怒之心保完祖宗艱難之業慨念前此數有詔旨如下令以求直言修政以應天變行之未久奪于專權乃復歸咎建議臣僚使號令不信士氣沮銷今日所行質諸天地後復更易何以有邦况當今急務在通下情不諱切直之言兼收智勇之士思得竒策庶解大紛望四海勤王之師宣二邊禦敵之略永念纍聖仁厚之德涵養天下百年之餘豈無四方忠義之人來徇國家一日之急應天下方鎮郡縣各率師募衆勤王捍邊能立竒功者並優加異賞不限常制其有草澤之中懷抱異才能為國家建大計定大事或出使疆外並不次任使其尤異者待以將相應中外臣僚士庶並許實封直言投于登聞檢院通進司朕當親覽悉行施用雖有失當亦不加罪所有下項指揮立便施行敢有阻格及以結絶為名暗有存留便當肆諸市朝與衆共棄咨爾萬方體豫至意罷花石綱等指揮御筆手詔朕秪紹丕圖撫臨萬宇顧德弗類永惟宗社付託之重靡遑寧居惟豫兆民是為邦本比年以來寬大之詔數下裁省之令屢行然姦吏玩法而衆聽未孚有司便文而實惠不至蓋緣任用非人過聽妄議興作事端蠧耗邦財假享上之名濟營私之欲漁奪百姓無所不至使朕念元元若保赤子之意何以取信于萬方夙夜痛悼念有以拊循慰安之應茶鹽立額結絶應奉司江浙諸路置局及花石綱等諸路採斫木植置造局所諸路非泛上供拋降物色延福宫西城租課內外修造並罷更有似于害百姓者三省樞密院條具以聞夫民罔常懷懷于有德朕于吾民每懼仁愛之弗至一夫不獲時豫之辜播告之修咸聽朕旨當日罷應奉局諸路嵗貢罷天王君聖主字為諱罷議司賣鈔旁黃老兼經并西城所見管財物并付有司其拘收到元係地土並給還舊佃人減掖庭用度減從官以上月糧及罷諸局以上并令有司據所得數撥充諸路糴本及樁充募兵賞軍之用應齋醮道場除舊法合有外並罷罷道官等房錢田土之類並依祖宗法罷大晟府罷教樂所罷教房額外人罷行幸局罷花石所罷待詔額外人罷都茶場依舊歸朝廷河坊非危急泛料免夫錢並罷開封府承受文字自今後依舊送朝廷請寶舊法施行更不得請御筆斷遣畫旨大理寺同西城所官吏等並罷事歸延福宫人歸合屬地歸京城西壁依元封法修房郎艮嶽官吏並罷歸延福宫寶籙宫官吏並罷依上清儲祥宫法施行擷芳園所並罷歸龍德太乙宫専法所擷景東園官吏人物並罷地歸京城所西園撥屬京城所瓊林宜春苑所並罷依元豐官制歸所屬保壽粹和館官吏並罷宫人依舊法尼寺養病地歸軍器所並日下罷斡里雅布攻中山府詹度禦之攻之不克二十二日己未除宇文虛中等指揮三省樞密院同奉聖旨宇文虛中命除保和殿大學士充河北河東宣諭使其請給人從依見宰執例施行不得辭避日下受告又奉御筆應內外紫衣師號並特旨等度牒並任舊給降又奉聖旨王永從願自辦本家糧食斛百萬貫石措置赴闕體國助軍宜加奬擢可先次與轉行一官候措置搬運足辨取旨不次褒擢三省樞密院又奉聖旨姚古差充畿輔郡兵馬制置使兼都統制王蕃除寶文閣學士充畿輔郡兵馬制置副使兼都統制陕西刷兵令王蕃限一日選官具名申尚書省謀南幸金人寒盟分兵兩道南下其一以斡里雅布為帥薄燕山郭藥師叛燕山諸郡皆陷遂侵河北所謂二太子者是也其一以國相尼堪為帥趨河北李嗣本叛欣代失守遂圍太原所謂國相者是也朝廷聞敵兵逼近始遣李鄴借給事中奉使講和召天下勤王之師且命皇太子為開封牧宰相日赴都堂聚議易置東南宰臣具舟楫運寶貨為東下計上令所以踵前迹以賜東宫又有司已擇二十六日視開封牧事而二十三日會內禪矣又曰初尼堪之入境也茹越寨得金之牒文及開拆乃檄書其言不遜所不忍言貫得之歸而大臣議恐傷天意而不敢奏又議下詔求言而詔本數改易未欲下也貫奉命乃宣撫河北河東諸路及其遁也無上命而遽還宰相樞府咸不能詰方引之都堂共商議下求言詔又不召翰林學士乃用貫參謀宇文虛中草辭大凡皆不正李丞相邦彥謂不若以檄書盡進用激聖意冀得求言之詔亟下爾二十三日大臣於宣和殿中以檄書進呈上果涕下無語但曰休休卿晚間來商量是晚大臣既再對于玉華閣而宇文虛中與吳敏適亦請對上謂大臣曰卿等伺候引虛中及敏對罷却來相見虛中對次敏見遂及禪議上因留敏于外少俟復召大臣忽氣塞不省墜御床下近臣急呼左右扶舉僅得就保和殿之東閣羣臣共議以再進湯藥俄少蘇因舉臂索紙筆上以左手寫曰我已無半邊也如何了得大事大臣無語又書諸公如何又不語耶左右顧無應者遂自書曰皇太子某其可即皇帝位豫以教主道君退處龍德宫又謂吳敏朕自拔擢今日不負朕可呼來作詔禪位詔敏辭逾時敏草詔進入上手指其後曰自此可稱豫遂召東宫來視疾至則大臣當榻前諭旨以御袍衣之東宫因頓首辭且謂之受則不孝矣舉體自撲終不敢當因亦得疾太上又命召中宫至同加御袍諭曰官家老矣吾夫婦欲以身託汝也猶力辭上堅命立之是為孝慈淵聖皇帝初敏見建牧深以為未快必一切付之而後可時太上意切於避敵故敏適以是晚對因得進言促成大計謂必付託之重而後可去故太上尤善之遂內禪三朝北盟會編卷二十五
