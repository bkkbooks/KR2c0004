body:
  text: 三朝北盟會編卷一百七十二宋徐夢莘撰炎興下帙何謂公選人材夫創業中興之主所資為尤多何則繼體守文率循舊章得中庸之材亦足共治于艱難有為興攘撥亂則非得卓犖瑰竒之材未易有濟故武王之有八凱宣王之有吉甫方叔召虎髙祖之有三傑光武之有鄧禹耿弇賈復之屬太宗之有房杜王魏之流憲宗亦有裴度武宗有李德裕皆以不忽然所惜抱不羣之材者多為小人之忌嫉或中之於黯暗或指之以朋黨或惡之以大惡或謫之以細故而以道事君者不可則止難于自進恥于自明雖負重謗遭深譴安于義命不復自辨惟自明之主為能察小人之情偽而辨其臣之無辜霍光所以見察於昭帝房喬所以見信于太宗也陛下臨御以來用人才多矣世之所許以為正人端士者往往間廢于無用之地豈非罹此謗耶遂使陛下寤寐側席而有乏材之嘆懷材抱藝願為國家宣力者無因而進前陛下宜少留聖意致察于此洪範皇極之疇曰無有作好王道平平好惡偏黨皆足以為至公之纍惟以道為公而無好惡偏黨之私則王道明矣魏鄭公亡太宗遣人至其家得半藁其可識者曰天下之事有善有惡任善人則國安用惡人則國弊公卿之內情有愛憎憎者惟見其惡愛者惟見其善愛憎之間所宜詳知若愛而知其惡憎而知其善去邪勿疑任賢勿猜則可以興邦矣太宗感悟夫人主豈常能無愛憎然必去愛憎而後能得人以興者愛憎出于私情用人以興邦必由于公道故也管仲雖仇齊侯必用雍齒雖怨漢祖必賞而况其餘乎陛下誠能推至公之道臣將見人材輩出中興之業不難致矣何謂變革士風夫用兵之際似與士風無涉然士風淳厚則議論正議論正則是非明賞罰功罪當否則人心不服舉措失宜而寖微寖弱也晉之士風尚浮虛而不事實故當時措置乖謬盜賊並起而有石勒劉曜之禍本朝嘉祐治平之前何其士風之淳厚自數十年來特不事事而已奔競爭進邪説利口足以惑人主之聽元祐大臣如司馬光之流士風皆持正論為朝廷長慮却顧圖久逺之計社稷之臣也而羣枉嫉之指為姦黨聽其言則大者可族小者可誅賴國家寬仁秪從竄逐其後士風遞相倣效顛倒是非變亂白黑政事大壞以馴致靖康之變非偶然也殆今四十餘年世變風移愛憎之情銷盡然後詔元祐羣臣之忠褒贈官秩録用孫子然亦何補向若早變此風則忠臣無誅戮之禍國家有治安之實兩受其利豈不美哉觀近年士風尤薄隨時好惡以取世資不圖體國惟事進身不核事實惟欲傷人大譽則大進小詆則小遷習訛成風此非朝廷之福也陛下得張俊付以重權始欲強敵于關陜以忠許國而失機會不為無過言者痛加繩詆誣以大惡豈不太甚幸俊以平日之功足以結陛下之知有大臣之辨足以回陛下之聽故得自洗濯復侍親光於帷幄之中然其所傷已多矣借使遭謗困讒之臣無俊之功又無大臣之辨而有下石以擠之者則何以自雪于君父冀察其不然朝廷設耳目之官以廣視聽固許之以風聞至于大故須核實使果如其言則誅責所加宜止從輕典使言而無實所誣之功罪伏讒搜慝得以中害善良皆非所以修政刑也臣願陛下明降詔以戒士大夫使體德意從忠厚變近年澆薄之風昔賈誼勸文帝養大臣以禮義廉耻陸贄勸德宗聽言必考實其情以正典刑不宜置而不問皆治道之要也陛下誠能行責實之政臣將見功以志崇所以為之規模也業以勤廣所以為之積纍也猶造大厦堂室奧序其規模可一日而成至于鳩工聚財則積纍非一日所至創業中興何以異此髙祖得韓信與之論亡楚之規模先定而後積纍以收成效光武得鄧禹與之論興漢之謀蜀先主得諸葛亮與之論鼎立之計皆定于談笑之間而髙祖以五年成帝業光武以十三年混一區宇先主得蜀亦在數年之後蓋積纍而致者如此陛下臨御九年于兹境土未復僣逆未誅仇讐未報尚稽中興之業則其始不為之規模其後不為之積纍故也逮事粗定之時朝廷所推行者皆簿書期會不急之細務至于攻討防守之䇿國之大計皆未嘗留意安得不為僣逆之臣強悍之敵之所凌侮然則自今以往其可不惜日力哉昔禹不貴尺璧而惜寸隂今日艱難乃惜分隂之時臣願陛下詔二三大臣熟議所以為規模者凡所施為畫一條具如立課程以此施行又詔州縣使體陛下德意而奉承之所立期限勿太遽以致騷擾勿太緩以失期會使事得其序不擾而辨乃為得䇿夫天下無不可為之事亦無不可為之時惟失其時則患之小者日益大事之易者日益難正如醫者之治病時不可失其在皮膚針烙及之其在五臟湯劑及之至于骨髓則雖有扁鵲俞跗蔑以為矣此時之不可失也詩曰逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫孟子曰國家間暇及其時明其政刑則雖大國必畏之矣夫用智者當於未沉奔之前千日聚之以待一時之用渴而穿井鬬而鑄兵其能及乎陛下誠能存愛日之心臣將見為無不成中興之業不難致矣何謂務盡人事臣竊觀天人之道其實一致人之所為即天之所為也國之將興百度皆舉天實祐之猶之農夫盡其藨蓘之力乃以有秋使未嘗致耕耨之勤而欲望稼穡之利其可得耶天不人不因人不天不成人事盡于前則天理應於後自然之符也光武以兵三千攻尋邑百萬者人也適雷電風雨遂有昆陽之勝而中興之運啓者天也孫權以兵三萬拒曹操數十萬者人也適風順可以縱火遂有赤壁之捷而鼎足之勢成者天也謝安以兵三千擊符堅百萬者人也適秦師小却遂有淝水之功而延晉之祚者天也創業中興之主莫不皆然盡其在我者而以成其功歸之于天也今未嘗盡人事敵至則先自退屈而欲責功于天其可乎臣願陛下詔二三大臣協心同力務盡人事以聽天命則恢復土宇剪屠鯨鯢迎還兩宮必有日矣夫人心即天心也下得人心上合天心則無不成之功陛下誠能和同天人之際臣將見大功可立中興之業不難致矣何謂寅畏天戒夫天之于王者如父母之于子愛之至則所以為戒之者亦至是也孔子之作春秋於災異必書以謹天戒臣嘗觀商之盛如武丁周之盛如成王漢唐之盛如文景太宗之時未嘗無災異而不為災者以能寅畏其心恐懼修省也是知人主之於天戒必恐懼修省以致其寅畏之誠則變災為祥天人之際何其昭昭然也比年以來熒惑失次太白晝見地震水溢或久雨而不霽或當暑而反寒乃正月之朔日有食之此皆天意眷祐陛下丁寧反覆以致告戒陛下雖嘗降詔俾士大夫各修厥職以答天譴然臣竊謂應天以實不以文此在陛下以至誠之意正厥事以應之昔宋公一言而熒惑退舍太戊桑穀共生于朝而反以為祥陛下誠能應天之實臣將見百祥來止中興之業不難致矣此六者皆陛下所當先務正心以正朝廷正朝廷以正百官故糞土愚臣忘生觸死為陛下詳言之抑臣又聞聖人不畏多難而畏無難或多難以固其國啓其疆土或無難以喪其國失其守宇昔少康以一旅而祀夏配天不失舊物光武太宗皆躬擐甲胄履危險而身致太平享國長久今朝廷人材不乏將士足用江浙荆淮閩廣川陜財用可理足以為中興之資陛下勇智天資春秋鼎盛欲大有為何施不行要在改前日之轍斷而行之耳昔仲虺之稱湯不稱其無過而稱其改過不吝蓋帝王之改過也如天地之無心是則行非則改何憚之有酈食其勸髙祖鑄印以封六國之後子房一言則趣銷之德彛勸太宗用刑法以威天下用鄭公一言則行仁義遂致貞觀之治無損盛德而大功可成豈切切然畏人之議已哉陛下近降親征詔書深悔纘成之後措置之失可謂盛德之舉矣然則今日措置安可復蹈前日之轍擇善而從斟酌而行則在聖裁矣夫以聖祖二百年之基業四海億兆之生靈皆繫于陛下清燕之間聖慮及此得不栗栗危懼勉勉自強上以慰祖宗在天之靈下以副四海生靈之望哉昔周室中興南征北伐其復古接下之美詠于小雅蓋有文武吉甫顯允方叔以為之將帥有孝友張仲以在左右故能內修政事外戢蠻荆復文武之境土陛下所當深法考周室之詩則得之矣所謂善後之䇿何以加此臣以至愚極陋之資荷陛下非常特達之寵六龍之初虛席以待眷遇之禮邁于等倫以志廣材踈自度不足以任天下之責力丐罷政無補國事每懷愧惕違去掖廷九更寒暑犬馬之心何嘗一日不在赤墀之下自以罪戾逺屏不敢復與世故芻蕘之言久不敢達近者邊報警戒戎輅親臨臣子之情不勝憤悶故敢冒昧以三册為獻伏蒙聖慈特降詔書奬諭今者又奉詔旨咨以當世之務而臣不量荒淺冒進狂瞽之説以瀆天聽昔太宗謂鄭公為敢言謝曰陛下導臣使言不然其敢數批逆鱗哉今陛下盛德過于太宗臣雖無魏鄭公之言然敢展盡底藴亦思慮之極也良藥苦口而利於病忠言逆耳而利于行在陛下察之而已况臣自經患難衰病交攻常懼先犬馬填溝壑無所仰報盛德之萬一今者獲奉明問得攄至情臣願足矣雖死之日猶生之年也伏惟陛下哀憐赦其愚直取其拳拳之忠實天下之幸干冒天威臣無任惶懼恐汗待罪之至謝表臣言伏蒙聖恩特降詔旨令臣條具邊防利害來上臣已遵稟睿訓具奏聞者十載倦逰屏居海上數行溫詔來自日邊凡清問之下詢皆一時之急務恩輝所逮報稱為難竊以詢於芻蕘帝王之盛德告以善道臣子之至情秦思黃髮而伯業成漢屈羣材而帝功立久矣不講寂然此皇帝陛下慨國步之艱難懲前謀之未淑時乘戎輅躬總六師文帝幸亞夫之營恩均將士太宗臨渭水之上氣讋戎羌聿于却敵之初圖為善後之䇿特頒明詔俯訪舊臣丁寧胥訓之辭若恭承黼坐之側咨諏當世之務如親顧草廬之中詢事考言逺邁唐虞之舉畫竒吐䇿宜得良平之臣而曩以非才嘗叨近輔學術泥古識慮濶疏憂患熏心志氣凋落夫何欵啓寡聞之陋亦與詢謀採擇之間謹已審察事機條陳利害亟上皂囊之奏冀塵乙夜之觀贑直不移僅同汲黯之妄發疏通知體豈類賈生之能言伏望皇帝陛下察以至明容之大度赦其狂瞽博招可續之謀用以設施大啓中興之運則臣繼此有得敢忘上陳海嶽深髙豈賴涓塵之助日月清照但傾葵藿之心秦丞相檜曰靖康以來和戰之説紛然言戰者專欲交兵而彼已之勢未必便言和者專事懇請而軍旅之氣因以阻皆非至當之畫為國者自有正理不必以虛張為強亦不必以力弱為怯宋襄圖霸而兵敗齊湣稱帝而國破虛強惡足為強哉孔子以魯抗齊而侵疆以復子産以鄭介晉楚而猶大兢何必大怯哉若湯以犧牲遺葛伯文王以西伯事昆夷未嘗虛張也為其殺一童子而征葛終一天下文王為政不獲于上帝而伐崇終以致昆夷之喙未嘗太怯也其後漢髙帝出關曰吾欲復三秦故地而止耳何嘗曰我必強盛哉滎陽成臯之間百戰不休何嘗曰我不復振哉又如光武唐太宗戡定羣盜鎮撫四夷時強時弱度議定計約略相若國家自金人起事之初但當與契丹地廟堂太怯遽以三鎮許之三鎮不肯淪敵境雖欲割棄而不可是大怯也比不欲輕發兵端故隱忍以待釁又賊豫啓之我欲乘機以舉則處以正理不可失也自古兩國相敵力強者驕不足深較樊噲憤胸奴侮慢欲以十萬衆橫行其國季布折之此其盛強之時况今勢未有便臣前奏乞安慰敵人當用所獲人令諸將通其帥長書明言止欲討叛而不敢輕犯大國蓋知虛張之無益也自古立國必明君臣之義陳常作亂孔子請討此齊國之亂臣而魯不容况賊豫我故臣子不討則三綱已淪何以為國臣前具奏乞征討賊豫當檄數其罪而陽推金人以紓其締交之計作我士氣而沮彼賊衆蓋知討叛之不必大怯也金人立豫諸帥皆不以為是者意保河朔用豫以為捍蔽耳河南之地金人非必爭得河南以復中原之大半徐議河朔猶當以二聖為請臣前奏亦已略言其故蒙陛下採擇則順逆之勢一分人百其勇是為攻戰之利界在夾河諸軍分處南北譬若藩籬宏逺堂室以安是為守備之宜因所獲金人厚拊存之彼各識所屬帥長之意分遣書詞不至差殊則是為措置之方使敵知朝廷志在討叛而義不得已彼豫衆知朝廷但誅首惡而脅從罔治則是為綏懷之略若乃器械之良窳軍食之困匱禆校之才否山川之險夷則有司之事將帥之職父老知之臣不敢臆説也迂疏無所知識惟聖明裁察三朝北盟會編卷一百七十二
