body:
  text: 三朝北盟㑹編卷一百四十宋徐夢莘撰炎興下帙起建炎四年六月十一日辛巳盡七月十七日丁巳程昌禹鼎澧州鎮撫使兼知鼎州程昌禹家傳曰建炎元年八月公以京西轉運判官入為尚書吏部郎官自南都扈從至維揚與時宰論事不合出守蔡二年八月至都已為金人所破軍馬散亡盜賊充斥公乃招集流民簡練師旅其命將也不限資格惟有功者居上日與羣盜戰每戰必克遂為强兵三年正月杜充留守京城招納賊冦張用王善而復逐之遂圍淮寧兩月張用分其衆號二十萬來冦三月至黃維離城二十里公度其逺來未食先遣汝陽縣尉杜湛設伏以輕兵誘之賊果以萬人追至城東遇伏大潰幾擒其次首馬反六月杜充赴行在檄公為留守判官月中至京城視事京師屢經金兵獨啓四門餘皆闔行者居者皆以為病公至欲盡闢之又遊手艱食市多鼠竊犯者雖一錢皆死公改錢為一千副留守郭仲荀皆不從七月蔡父老五百餘人投牒于留守司乞公還曰蔡薦經冦攘自公臨治盜奔他境雖今有本道運判滕膺攝事民未安其政詞㫖誠切杜充時為宣撫聞之檄公還八月十八日入境城中來告前唐守滕牧招巨冦王民所謂一差針者合王清兩軍約數萬衆道蔡為墟矣極言不可弗聽公聞之宵征十九日黎明入城午漏上賊奄至趨門不克入公令營於城東來丐糧曰吾廩未嘗餼賊求市倍其直乃售賊留數日而行過平榆乃肆掠微公則無復有蔡矣閏八月沒角牛楊進衆十餘萬冦真和進雖降為西京安撫然虜掠不已且百端需於蔡公曰竭民血以資寇兵而給盜糧吾不忍也一切絶之故進既反遂來侵公令杜湛等各以部兵分掩其時雨且夜劫其寨俘斬不勝計賊不能安怒且恐公乃兵四出聚糧賊造天橋雲梯謀攻城亦為戰守備九月十一日公被召赴行在方趣裝忽聞金人渡河陽公乃上聞乞留捍禦敵退而行未報月末得上蔡狀言敵逰騎入二十九日敵騎數至城東及城大軍至屯於東南北三面約五六萬衆令戒嚴且遣人縋城而出告警於行在由是朝廷知兩畨敵入始檄諸道為備十二月初二日公遣畦貴出兵擾敵營敵之祁王席其纍勝勢甚張衆亦心憚之公閉關偃旗息鼓既獻俘士氣大奮公乃啓扉縱之至初四日生獲逾七百人敵脾睨七日莫測城中虛實乃退出師尾擊頗有所獲公自後連破賊曺貴楊勳斬馘甚衆又破田僧歌虱子兵擒歌公奇其狀愛其勇弗誅復委用之後率為良將所謂田臯者也四年二月以既除代奉詔提兵赴行闕㑹有㫖罷諸路勤王之師除公鼎澧鎮撫使解前為荆南府峽州荆門公安軍鎮撫使兼知荆南府陳求道為襄陽府鄧隨郢州鎮撫使兼知襄陽府范之才起復為金房均州鎮撫使兼知均州馮長寧為淮陽順昌府蔡州鎮撫使兼知淮寧府翟興為河南孟汝唐州鎮撫使兼知河南府江淮荆湖京西等路分鎮范宗尹建議也五月二十二日參知政事范宗尹等劄子奏臣等恭依聖㫖就都堂聚議分鎮事宜畫一如後一諸鎮臣乞以鎮撫使為名一欲將京畿湖北淮南京東州軍並分為鎮其陜西西川江南兩浙湖南福建二廣並仍舊制一諸鎮除茶鹽之利國家大計所擊所入並歸朝廷及依舊制提舉官外其餘監司並罷所有錢賦除供上錢帛等自合認數送納外其餘並聽本鎮帥臣移用更不從朝廷應付緣今初理宜寬假而又責以備禦之事欲為蠲免上供三年候事力富實日自分依舊一今來分鎮州軍多經殘破或緊要控拒去處理宜增重事權庶可以辨應管內州縣官並許辟置知通人師辟名具奏朝廷審量除授官吏廉汚動許按察升黜其所管州軍並聽節制遇軍興許以便宜從事其帥臣不因朝廷招擢更不除代如能捍禦外冦顯立大功當議特許世襲奉聖㫖依奏至是除陳規已下鎮撫使閒居録曰宣和以來宦者童貫㺯兵蔡攸並幹樞柄邉帥率皆小人以賄賂用之軍政盡廢非徙士卒驕惰不可用且零落盡矣今敵大舉南牧不復可以支持靖康初淵聖下令河朔欲令郡將世守事不果行今上駐蹕維揚獻言者甚衆宰相黃潜善以謂非急務悉寢其奏建炎三年南渡至於餘杭濳善既罷余謬當柄途而士大夫復以藩鎮為請余為擇能虞卿等十九疏奏之且問陳以為宜微照藝祖初議隨時制宜行在為京西淮北為藩方淮南為郡縣㑹余罷去事亦不果次年六月范宗尹為參政申其說置鎮撫使遂以為相降詔施行然規模參錯多寡不均李成以舒蘄光黃四州叛徑擾江西孔彥舟授鼎澧辰沅靖五州不赴遂犯湖南劉綱授濠泗嶽飛授通泰趙立授承楚薛慶授天長郭仲威授真陽王彥授金房皆不能守惟桑仲以宗尹之兄宗禮在其中故授以襄鄧隨郢金均房信陽八郡地大人衆稍為患仲為其徒所殺禆將李宏代之宏為僞齊所逐鎮遂廢羅索薩里罕哈芬敗曲端軍於邠州自店節要曰時薩里罕陳於髙原羅索哈芬率衆先戰官軍合之敵少却薩里罕恐懼至於號哭無何敵勢復振官軍敗績由是敵中目薩里罕為哭啼郎君二十二日壬辰知六安軍邉某殺金人盡殪邉某初以金人攻城遂投拜金人以趙團練率北軍三百人屯於六安未經金人時守禦稍嚴鄉村强壯與射生户皆聚於城中李成張用等皆攻擊不克邉某雖已投拜而强壯射生户猶在城中金人有回歸之意道路風傳金人將盡驅六安之民北去故土官李六使者與邉某等密謀先事殺之每日邀請趙團練筵㑹趙團練不疑壬辰邉某及李六使率軍民及射生户並殺金人皆盡二十四日甲午知六安軍邉某棄其城邉某已殺金人即告報居人盡納軍器少頃再告報依舊做買賣近晚又告報二十四日棄城盡出盡焚燒令各備乾糧甲午果棄城邉某令後軍洪某掠後放火城中一空是時張用在舒州有入廬州境者張用立大旗招誘山東河北庶士棄業人人多歸之李六使為李成敗北去夀春境被殺戚方詣張俊降戚方犯湖州安吉縣上鄉侗里張俊以兵討之至安吉鄉𨗳言上鄉路狹不可行兵俊乃遣王再興齎檄招之㑹嶽飛追襲其後方無路進退乃詣俊乞降與其徒鄭其號為三哥哥者同至安吉見俊俊先見方諭之曰國家多難當以忠義報國家不可負朝廷方曰不敢俊曰爾宜一心事主不得有二方拜謝而見三哥哥者俊曰國家不負人爾亦不可負國家曰不敢俊曰是何不敢人言汝復欲反乃呼證左而問曰是人果欲反乎曰實欲復反俊命推出斬之方上兵馬簿有馬六百匹獻金珠玉珍不可計自方到行在日與中貴人蒲博不勝取黑藤如馬蹄者用炭火熁去藤乃黃金也以償博負每一博不下數枚於是方已受正使矣時人為之語曰要髙官受招安欲得富須胡做七月十二日壬子馬吉為韓世清所敗韓世清在蘄州敗劉忠得柔福帝姬蘄州甄采聞於朝即與世清同護送柔福帝姬之行在到興國軍路難阻不能行四月朝廷差內侍蔣堯輔來迎請柔福帝姬不許世清離蘄州祗令來行在世清曰世清已起發蘄州矣且得柔福帝姬者世清也囑采别具奏乞以世清同護送柔福帝姬且言已一面起發事上覽奏降㫖令世清徽州駐劄不許赴行在世清屯於徽州之黟縣馬吉以潰散餘兵方擾於旌德太平之間世清屯黟遂率衆往迎之為世清所敗其提舉官孫抃死於亂兵吉自長夀由涇縣出宣城至廣德受劉光世招安世清追至宣而還十三日癸丑崔增犯太平州崔增既破焦湖水寨有大小舟數千艘又聞金人已渡江北屯於淮東增乃率其衆漸出栅江口未有所向遂犯太平州繞城劄寨甲寅夜以船百艘載攻具傍東南城角攻打賊衆約二千餘併力齊攻知軍州事郭偉盡力禦之有二賊首稱是閻將韓將呼曰城中有勇鋭者請出挑戰荻港巡檢王宗引弓滿兩矢皆中二賊城上歡呼賊衆稍却戊午數百人叩城有賊首執大刀有牌旗寫中軍將劉順順引衆犯西南城角宗又射中之宗遂率牙兵魏進士軍洪亮等下城與戰賊遂退去賊驅虜居民於城下剖臠殘殺又縱火焚燒天慶觀及民居攻城不克屢為官軍所敗張用奔於漢陽軍受鄂州路安撫司招安五月張用諸軍在淮西乏糧六月轉至信陽軍復往德安府用屯中軍於三龍河曺成屯於應城縣諸軍散居連接至郢州絡繹不絶至是魚磨山寨軍亂統領將佐王林孟振張衙推等殺其統領官馬老爹王林者謂之王鐵斬相州人初曽被擒入布袋倚船板上用刀斫其頸八刀以為死矣放入黃河中無何布袋繫頭脫遂爬而出漸復得活又謂之王八刀後為橫行遙郡張俊下作馬軍將官者時馬老爹既死用聞之曰軍容不整至使軍中自相屠殺豈為殺一馬統領乎乃是欲殺張用耳用請從此自往求一死處諸人各耐辛苦有隨用去者至淮陽有衆一二千時馬友在漢陽界內知漢陽軍范某懼倉庫不能給乃以軍事併倉庫見在移牒與用遂為知軍鄂州路安撫使李允文遣張定國往招用用受招安定國乃遂旋濟渡至南岸允文怒曰何不且撫定而逺濟渡乎乃移文問之由是用懼遂反自漢陽界虜掠强壯而去允文遣水軍張崇追擊不及曺成聞馬老爹之死又聞用自奔去大怒令執中國人到即斬之成常恨中軍統領官吳某實不同其謀成使人執至責以軍律不整使下有謀上者遂斬之十七日丁已郭仲威出平江府率衆奔於興化縣郭仲威擾平江府之民朝廷聞之遣張俊來治仲威之罪仲威覺之率衆出平江府遁走屯於興化縣朝廷授以真州鎮撫使巨師古軍於杭州薛成軍於婺州三朝北盟㑹編卷一百四十
