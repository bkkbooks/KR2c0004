body:
  text: 三朝北盟㑹編卷一百三宋徐夢莘撰炎興下帙起建炎元年五月五日甲午盡十四日癸卯五月甲午內除麻制資政大學士大中大夫領開封府李綱除正議大夫尚書右僕射中書侍郎制曰門下稽古建官莫先於論相用人惟已尤貴於得賢將宏濟於多艱益眷圖於舊德巨川之待舟楫兹惟暨於同心元首之賴服肱蓋相須而成體帝賚良弼國有賢臣肆延登於宰司用敷告於列位資政殿大學士大中大夫領開封職司隴西縣開國伯食邑八百户實食封一百户李綱器宏而道逺學髙而德方才兼文武之全識洞聖賢之藴蚤紆宸眷寖踐華塗歷事上皇獻言有同於藥石被遇淵聖告猷不二於幾衡神明扶其精神天下想其風采頃暫釋於樞管弛總尹於上京久留遐方殊拂輿望顧豫眇質獲纂丕圖整王綱於既壞之餘張國勢於中微之際宜得碩輔共濟逺圖是用擢居右揆之崇兼侍西臺之峻乃錫侯爵進陟文階御以爰田陪之圭賦併昭異數式勸具僚於乎周室中興山甫明庶邦之若否唐朝再造子儀任一代之安危朕欲經營四方汝為朕欲訓飭百工汝率惟長䇿逺算可以弭難惟竭誠愛日可以圖功其尚弼豫一人亦有辭於永世可特授正義大夫尚書右僕射中書侍郎進封隴西郡開國侯加食邑七百户食實封三百户主者施行朱勝非除中書舍人翊戴記曰靖康元年冬金人再攻京師勝非為右司員外郎被命使軍來往計事及張邦昌倡和議質金營乃請勝非行勝非中道上疏論邦昌懷奸不忠必致誤國和議不可恃劫質不可信請大為將來戰守之防又沿路得邦昌榜檄語涉怨望且挾敵勢逼脅郡縣須索無厭委以上聞臨出彊得㫖召還時朝廷議建四道都副總管八帥分制諸路以衛王室除東道副都總管倍道之南都才到三日都總管胡直孺提兵勤王竭本道錢榖甲兵以自隨所餘羸卒僅三百人而食才支旬日强豪富室先已逃避既而金破直孺之師於襄邑執直孺以冦應天敵攻南門矢石如雨以大車載芻藁縱火逼城闉敵將躍馬來望指呼其間公命伏弩於要地伺之遂為效用邵曇者射中敵將目墜馬而死敵勢遂卻經月不近南門乃增陴浚湟益修守偹躬擐甲胄與士卒同飲食夜宿城樓者凡數月徒步巡督率一周匝雖雨雪泥淖未嘗肩輿敵柵城西北隅攻圍計百出度宜應之敵不敢攻邦昌既僣竊遍為書抵諸路帥守一日敵騎送其使至城下集官吏發緘訖械其使乃繳書元帥府敵既不能犯南京遂安大元帥進兵濟州既日趨謁諸臣僚未有至者乃首建大議曰今二聖北狩天人之心屬在殿下宜以時正位號係天下望且曰南都藝祖皇帝興王之地宗社神靈使敵不能陷以為大王受命之基請亟幸之以圖大計遂幸南京登極上即位之五日故有是命楊惟忠加殿前都指揮使建武軍莭度使楊惟忠西畨部落也從童貫有功靖康中為髙陽關路兵馬副管元帥府在東平也惟忠來以為都統制及黃潜善張換髙公輸卒彥宗王激皆領兵令惟忠總之上即位加殿前都指揮使建武軍莭度使六月乙未詣鴻慶宫恭謝馬忠除龍神衛四廂都指揮使河北統制張換加通侍大夫欣州觀察使河北制置使皆以兵出河北制曰朕惟兩河之民更百戰之役田野三時之務所至一空祖宗十世之遺厥存亡幾肆夙宵之軫念如氷淵之交懷孰知拊循經逺之謀我有梟俊折衝之士馬忠幾能先物勇不顧身胄出名家得山西氣俗之厚任使邉塞知漠北封圻之詳昨逢多壘之艱屢立干城之績雖曽進秩未殫所長爰升統制之崇加俾使權之重料百城之丁壯總以五符提兩路之精彊搜其軍實兼收羣力克展壯猷上以迎二聖之還下以正四封之守任吾之責時乃之休命馬忠將所部人兵五千人號一萬人前去河北恩兾州以北取路過河趍河間府雄州以來追襲金人又命張換將所部人兵五千人號一萬人前去與馬忠接濟相為聲援七日丙申薛廣張瓊以兵出河北命薛廣將所部人兵三千人號六千人前去自內黃縣過河㑹命河北山寨義兵一萬人收復磁相等州又命張瓊將所部人兵三千人號六千人前去自開德府西渡㑹合水寨義兵一萬人與廣接濟相為聲援劄下陜西諸路帥臣招集人馬聚積糧斛以待朝廷遣使前去措置恢復又札西京翟興團結本處義兵保護陵寢八日丁酉吕好問除尚書右丞制曰富貴不足解憂方極慕親之念孝悌施於有政莫先同德之求朕以眇躬嗣承大統遭家不造凜若淵氷雖三軍舉同左袒之心而二聖未返北轅之役棠棣之華韡韡敢忘原隰之求大隧之樂融融有待封人之荐具官某儒術之茂暗然實章信厚之資老而彌篤遍陪甘泉法從之列實自靖康總攬之初從容片言綽有回天之力險夷一致益堅衛上之忠肆圖邦命之新進總文昌之轄倚老成於典刑之重登世臣於故國之遺朕之股肱誼同休戚其念兩宫戴天之義體豫一人側席之思倘能遣侯公而說之必有御趙王而歸者亶惟乃辟是佑則於永世有辭秦湛回天録曰宣和七年金人違盟約結連契丹燕人入塞朝廷方講和好不以為虞事至非意故南至京師种師道宿將諳練兵事而大畏懼不能聽從既而用兵失䇿繼失太原時兵部尚書吕好問以諌官趨召吕公上言十三年造作此禍今患難已至此全在諸路帥臣協力共濟豈可猶用前日恩幸及貴近親舊尚因貨賂任使之人欲乞選擇改易又諸路諸州須令各為之所兵食可以自立萬一秋冬之間金人再動不致悮事及召回劉韐等并河北民兵自真定至邢相傍太行山置大寨以偹衝突及應援沿邉諸州今冬金人再至指揮盡於四路諸所起勤王兵又乞於諸路已起人內選擇堪用之人就糧於尉氏咸平陳留東明四處若敵騎越河則以四邑之兵列寨如連珠或五十里或三十里則置一寨以護都城使敵衆不能遽犯亦通四方音信又言防河須用宿將若外戚宰相親舊及省院使人之屬皆不可用又言防河之兵暴露日久慮其困乏不能對敵今沿河皆設堡障又言太行山在懷澤之間最為要害乞别委宿將専守險隘雖大軍進退自不相干宰執堅不從至是言今召諸處兵已不及在京見有二十餘萬乞十六萬人於城外立寨以護城壁宰相亦不從金人兵至都城之外蠟詔康王為兵馬大元帥金人攻城甚急鼓噪之聲震動端門之前都城失守御筆夜召公許戎服冒雪而騎兩快行親從介而持刀以先邁上欲幸襄鄧羣臣多藏匿獨吕公與宰相何㮚及同知樞密院孫公𫝊入侍既而不果行上幸敵營曉命吕公入城撫慰軍民上既至敵營金人請遣使止諸路勤王兵呂公見宰執曰京城圍閉之久諸處都無入援之人若更遣使降詔止絶則誤國益甚宰執曰二帥堅要如此呂公曰可緩其辭則忠義之人自曉矣所遣使人須當慎擇庶不敗國家大事宰執曰公何等語耶呂公曰某所見如此不敢不盡深恐後悔耳宰執曰自家在它重圍中如何却得鬪氣呂公曰四方若有忠義之人統兵雲集竊恐金人亦有顧忌上再幸敵營命吕公等入城撫諭翰林承㫖吳幵入內都知李石賫尼堪斡里雅布廢趙氏立異姓文字來及請太上皇帝親王等於是執政官及內侍從官集內東門皆號哭吕公曰自敵圍京城張叔夜來援其後數日天下帥守無一人至我孤彼强致有此禍計無所出但當率衆懇告耳若其不從上皇出城亦未遲也李石出上手札吕公曰此乃不得已而書也夜半不能决吕公曰諸公不取某言何也遂拂䄂出女真令吳开莫儔促立異姓繼聞皇城司集議立張邦昌吕公於是密使迪功郎蔡安中門下省録事張師聰訪康王大元帥府親戚得韋淵蔣時師愈魏飬并潘夫人給使孫卞郭貴等求大元帥所在及作蠟書偹陳內外之事吕公凡謀事並夜間中庭不聞人聲處方敢說話及寫文書等與人謀議並使其子夜間雪中布衣芒履𫝊達意㫖及定議吕公亦伺雪夜間自往及見外戚婦女等要約其實止一親吏隨行雖門前使令皆不知也吕公與監察御史吳綸馬伸張所文林郎吳結閣門宣贊舍人吳革日夜密謀迎立興復有勸吕公託疾吕公云今日實是某盡莭之時將來事了閒退譬如人家遭火須看烟塵去救若逺坐看著焚燒都不管或有人救滅便來爭功燒盡時一齊散去則何用世臣也上請者或於尚書省中謂上為廢帝公怒形於色曰聖人全德天下歸往何嘗廢乎其人曰盍稱靖康皇帝乎公曰亦非也君父位號豈可擅改一坐聳服公密令做造祖宗神主易廟中所列而藏之以虞敵取公以已俸錢一月建靖康聖莭道場於景德寺寶勝永慶院時公權領門下省但書尚書銜仍舊諸公誚之公曰受命於上不可易也有請改年號者公立爭之有移文必去年號公不能止但自行文字必稱靖康二年邦昌欲出别二帥公曰萬一二帥要留人防衛相公何以處之邦昌答云無此公曰不可不預為之偹今若留人在城裏令居民不聊生若在城外四方道路斷絶設若使他恣縱相公敢治他否邦昌曰此說是也尼堪果存留鐵騎五千邦昌力辭次日又使髙慶裔王苪來說留人防衛等事公曰南北异道恐北人不諳水土或不能依南朝法則却致驚擾慶裔曰留一貝勒在此處置可也公曰貝勒貴人豈敢煩他况南地夏熱或有疾病則南朝負罪深也慶裔曰甚好况只在河北急要南人飛一騎來說即時遣去應副是日金人軍行公曰過一日已晚脫城外推尊䇿立則奈何邦昌曰彭寵之事安保其無荀彧所謂愛人以德也或謂公曰若金人回戈公豈能遏他不若且更待一年半嵗則上下穩便公曰金人糾合諸畨皆厚獲金玉女子而去必無回戈之理若有回戈之事某固不可遏但道理如此倘罹於禍則是死宗廟社稷也處死有名萬一京城軍有變吾輩為他戕殺死則得不好雖懷忠義之心何處告訴四月八日公之子自陳州至濟州行在謁大元帥大元帥曰尊公先有帛書來令左右閣子中書袋內取出以示公之子故其後特降親禮稱呂某昨邦昌僣號之初即募人賫帛書具道京城內外之事金人甫退又遣人勸進臣僚所不知付尚書省行下照會至南京故有是命黃潜善兼御營使汪伯彥御營副使范訥京城留守郡溥京城副留守放散諸路兵多有散而為盜賊者十日己亥路允迪為京城撫諭使耿延禧為京諭副使上曰京城士庶自金人退師人情未安差官撫諭黃潜善對欲差路允迪耿延禧上之信臣可遣至京師故有是命大元帥府局幕府官僚五軍將佐應扈衛過河至應天府軍兵並與等苐推恩批答許份乞幸揚州狀奉敕許份申仍與衆熟議皆以為揚州之地控帶江淮城壁新修乞決定至計即日御衆治兵廣陵事具悉海淮故區下控南服統臨一道實自本朝卿以侍從之近臣膺藩宣之重寄志在王室深惟國步之難利究公家繼上時巡之請屬方勤於北顧難遽議於東遷言念忠誠不忘嘉嘆所請宜不允故詔示想宜知悉先是知揚州許份於四月末間有狀申大元帥府乞駐師揚州狀曰恭惟國家祖宗功德澤被天下上皇臨御二十六年遜位嗣主繼膺丕業克勤克儉至德罔愆伏自即位以來未嘗暇逸再嵗金人深入一旦事出非常二聖播遷萬方憤悶凡在臣子如失父母痛心疾首無地措身重托大王獨留於外天意人事理實有歸份等謂神器難以久曠輿論豈宜屢抑伏望大王决定至計早登天位以副二聖顧託之意安億兆願戴之心且以京師新破北顧可慮渾鄆二郡與敵為鄰南京雖號興王之邦而金騎屢至亦非息師之所唯揚州號古都㑹前江後淮險固可恃四方水陸此得其中加之合郡僚吏下至閭里細民延望維日為嵗份等誠願大王俯就人欲駐蹕於兹誕頒詔條綏靖寰宇又况地距河朔不甚為逺可以時遣候問二聖興居治兵飬士圖迎鑾駕若乃繕治宫室百司與夫儲蓄軍民糧餉之事份等悉力可以畢集份等恨以職守不獲躬詣王庭但仰瞻激切拳拳之至金人攻瀛州十四日癸卯詔罷天申節上夀朕承祖宗遺澤獲居士民之上求所以扶持危顛未知攸濟念二聖之鑾輿在逺萬民失業將士暴露百官有司靡所底寧夙夜痛悼幾廢寢食倘可以復二聖而保生靈朕不愛身敢自豐殖重國禍况以眇躬之故聞樂飲酒以自樂為乎非惟深拂朕志實增感於朕心所有將來天申莭百官上夀常禮可罷當體朕意毋復有請姚平仲召赴行在制曰漢室偹邉復魏尚雲中之守秦人禦晉赦孟明殽澠之奔與其選衆而收新進之材孰若弃瑕而責老成之效具官某禀資沉鷙事上朴忠昨緣外侮之侵嘗卑中權之任乃事戎昭之果靡遵廟勝之謀坐此逾年隱於亡命肆朕纂圖之始時求敵愾之良議者皆言汝為可用執干戈以衛社稷方急壯猷聽鼓鼙而思將臣宜頒异數爰復州團之秩俾趨嶽狩之朝庶分北顧之憂尚救東隅之失勉圖而績以副朕懷可復吉州團練使所在出榜召赴行在三朝北盟㑹編卷一百三
