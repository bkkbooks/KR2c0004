body:
  text: 三朝北盟會編卷四十四宋徐夢莘撰靖康中帙起靖康元年三月十七日癸未盡二十八日甲午十七日癸未太上皇回鑾次南都遣李綱出迎并賜行宫官馬茶藥銀合傳信録曰先是太上皇回次南都不進批吳敏李綱令一人來莫曉其意皆言事且不測余奏上曰所以欲臣及吳敏來無他欲知朝廷事爾吳敏不可去陛下左右臣願前奉迎如蒙道君賜對臣具條陳自圍城以來事宜以釋兩宫之疑決無他慮上初不許余力請之乃聼而徐處仁等謂余此行有賁育之勇余笑曰古人猶單騎見敵况故君乎上令余賫書逹道君且賜行宫官屬茶藥銀合有差以十七日離國門二十日抵南都得旨二十一日引對是日道君御幄殿余起居訖升殿奏事具道上聖孝思慕欲以天下養之意道君泣數行下曰皇帝仁孝四方所知奬諭曰都城守禦宗社再安相公之力為多余再拜謝訖因出劄子二紙進呈其一乞道君早回鑾輿不須治亳社西都以慰天下之望其一自敘素蒙道君教育擢用於國家艱危之中得效犬馬之力欲乞身歸田廬之意道君慰勞再四因曰相公頃為史官緣何事去余對曰臣昨任左史得侍清光幾一年以狂妄論列都城水災蒙聖恩寬斧鉞之誅迄今感戴道君曰當時宰執中有不善公者余愧謝因奏曰臣昨論水災實偶有所見自古無道之國水不冒浸城郭天地之變各以類應正為今日兵革攻圍之兆大抵災異變故猶人之身病在五臟則發於氣色形於脈息善醫者能知之非有物使之然氣自運爾所以聖人觀變於天地而修其在我者故能制治保邦而無危亂之憂也道君以為然因問敵騎都城守禦次第余具以實對復曰敵退師方渡河時何不邀擊余曰朝廷以肅邸在金人軍中故不許道君曰為宗社計豈復論此余於是竊歎道君大度之不可及也語既浹洽道君曰前宣諭行宫止遞角等三事只緣都城已受圍恐為金人所得知行宫所在非有他也余對曰方艱難時兩宫隔絶彼此不相知雖朝廷應副行宫事亦不容無不致者在聖度默知之而已道君因詢朝廷近事逐一解釋謂追贈司馬光止欲得民心毁折夾城止欲防姦細之類因奏曰皇帝仁孝小心惟恐一有不當道君之意者每得御筆批問輒有懼不進膳臣竊譬之人家尊長出而有家事付之子弟偶遇強盜劫掠須當隨冝措置又尊長將歸子弟不得不恐懼然為尊長者正當以其能保田園大計慰勞之不當問其細故皇帝傳位之初陛下巡幸適當大敵入邉為宗社計政事不得不稍有變革今宗社無虞四方以寧陛下回鑾臣以謂有以大慰安皇帝之心者其他細故一切勿問可也道君感悟曰公言極是朕只緣性快問後即無事因內出玉帶金魚袋古象簡賜余曰行宫人得公來皆喜以此慰意便可佩服余固辭不允因服以謝而退二十二日扈從道君詣鴻慶宫燒香初次拱州見迎奉道君禁違寶輦儀物等留不進因以便宜作奉聖旨令趍南都至是道君燒香儀物適至南都士女夾道聳觀得旨早辭訖先還闕賜酒食茶等二月三日辭再對於幄殿道君出青詞藁一紙俾宣示宰執百官乃道君初傳位奏天所作者其辭曰奉行玉清神霄保仙元一六陽三五璇璣七九飛天大法都天教主臣某誠惶誠恐頓首頓首再拜上書髙上玉清神霄九陽總真自然金闕臣曩者君臨四海子育萬民緣德菲薄治狀無效致干戈並興弗獲安靖以宗廟社稷生民赤子為念已傳大寶於今嗣聖庶幾上應天心下鎮兵革所冀遐邇歸順宇宙得寧而基業有無疆之休中外享升平之樂如是兵革偃戢普率康寧之後臣即寸心守道樂處間寂願天昭鑒臣弗敢妄若將來事定復有改革窺伺舊職獲罪當大已上祈懇或未至當更乞垂降災咎止及眇躬庶安社稷之基次保羣生之福五兵永息萬國咸寧伏望真慈特賜省覽臣謹因神霄直日公曹吏賫臣密表一道上詣神霄玉清三府引進仙曹伏望告報臣誠惶誠恐頓首再拜以聞道君宣諭曰本欲往亳州太清宫以道路阻水不果欲居西路以皇帝懇請之勤已降指揮更不戒行公先歸逹此意慰安皇帝因袖中出書付余乃宣諭曰公輔助皇帝捍賊守禦宗社有大功若能調和父子間使無疑阻當書青史垂名萬世余感泣再拜受命辭訖即行先具劄子以所得道君語奏知後上批答曰卿適來奏對之語忠義煥然朕甚嘉之十八日甲申尚書省劄子照會殺退金兵出榜曉諭勘會高陽關路安撫使陳闕狀申據探報大金兵馬約二萬餘於中山府北塘河岸北蓋起五六座橋兒搬運車仗過岸止蓋及已有過保州界分之人所有本路即今並無敵馬州郡守禦平安又中山府路安撫使詹度奏三月十八日金人到城下探知城中有備及人心堅確往往連夜發行車仗及路拔寨北歸兼令王觀察同程瑀到城下云非是不來打城乃為兩朝和不欲違盟我大金人馬與太子郎君暫且北頭去也不是怕你本府自圍閉以來不住接戰斬獲數多兼曽殺其四太子多斯德大王等部長及城上多張神臂弓矢石等乘擊射金人往往畏避不敢輕犯密使人探得敵情大假憂疑至數日必是遁去又竊慮民間尚有疑惑已榜河南北市曉示各令知悉十九日乙酉太上皇后還京師車駕出郊奉迎二十一日丙戍太上皇回鑾至南都二十三日己丑髙世由等守澤州有勞除直龍圖閣通判時惇除直祕閣三省樞密院同奉聖旨澤州髙世由等守州城使尼堪不敢以兵入宜加褒賞詔三省樞密院同奉聖旨知澤州高世由特除直龍圖閣通判惇可直祕閣其餘守城有功人令世由具等保明聞奏奉敕下項朝請大夫權知澤州髙世由可直龍圖閣朝奉大夫通判澤州時惇可直祕閣差遣如故敕高世由等承平日久戎備浸隳屬敵騎之侵凌悼吾民之奔潰爾等以奮於忠義克保孤城相彼經行率多降敵稽考其效敢後褒旌服我恩榮終全名節可依前件二十四日唐寅姚古收復隆德府河東制置姚古狀申尚書省恭依聖訓分遣將兵前去救援太原已於今月二十四日收復隆德府訖及生擒偽知府姚璠太師通判郝伸少監知縣儲汶并知通印記今解送姚璠等赴闕者幼老春秋曰姚古克隆德府初姚古為熙河路經略使也鞏州王德有赴功名之心以武勇𨽻其麾下古為河東路制置使以兵救援太原府也與宣撫司幹當公事折彥質相遇於懷衛之間未得敵之虗實聞隆德府威勝軍已為金人所陷沒古乃遣德硬探德斬金將一人持首以還具以虛實報古遂輔進武校尉復令德往且戒其必得生口將親詰之德許諾引十六騎疾驅入隆德府生擒偽知府姚璠太師以還古大驚謂曰昔傅介子班超之倫何足以相擬他日功名須遠到古即引衆疾趨復取隆德府擒偽通判郝伸少監偽知縣儲汶并知縣印記解送赴闕上臨軒問姚璠被擒狀璠曰臣為夜義所獲自是德有夜乂之號范仲熊北記曰姚古别將陳迪擒大金所置知府姚璠以歸手詔諸路選將練兵手詔諸路遴選將佐訓練正兵招納闕額繕治器甲儲蓄芻糧預備軍須陜西諸路召募敢勇河北訓練保甲盡數團結陜西選擇保甲三萬人分作十軍鼎澧路弓箭弩手揀選六千人一千騎湖南北路洞丁選㨂各千人聼候朝廷指揮河北京東西弓箭社射生户預行團集仍具的確人數申樞密院二十五日辛邜李綱自南都回至闕中山路安撫使詹度河東安撫使張孝純髙陽關路安撫使陳闕守城有功並除資政殿學士宇文虛中落職宫祠鄭望之李鄴版除户部侍郎并給事中指揮更不施行王孝迪落職提舉南京鴻慶宫二十六日壬辰姚古收復威勝軍尚書省劄子照會殺退金人出榜曉諭河北宣諭使种師道奏昨奉聖訓保守三鎮逐金人出界臣措置雇督進兵救援隨機應發追逐掩擊去後今月十日據种師道所申契勘金人兵並已逼逐出界其中山河間府兩鎮并沿邉諸州軍並平安奏聞事又中山府路安撫使司奏契勘金人三月三日回途再到本府臣率士卒撓其寨柵敵知難攻遂過塘河迤邐北去今月四日五更保州等處迫逃出寨並已過易州地分去訖本路保護僖祖順祖陵寢並無踈虞本路前後接戰及劫寨共八十餘次斬獲及擒敵兵共計五百九十九人及奪到生畜八千五百五十三頭匹口雲梯鵝車洞子器甲旗鼓等一萬七千四十六副件燒奪糧草四十三車奪到金銀匹帛等奪回虜去京畿及諸州軍人口五千二百一人一面散走歸業人口不計數目并收到遺下糧斛約六萬七石見行盤量奏聞事又河東路制置使姚古狀申恭依聖訓分遣將兵前去救援太原三月二十四日已收復隆德府生擒偽知府姚璠通判郝伸知縣儲汶二十五日又收復威勝軍了當又竊慮民間尚有疑惑已榜河南北市曉諭各令知悉二十七日癸巳李綱自應天府奉迎回乞宫祠傳信録曰是日宰執奏事延和殿進呈車駕出郊詣資福寺迎奉道君儀注耿南仲建議欲盡屏道君左右內侍出榜宫門敢留者斬先遣人搜索然後車駕進見余以為不若止依常法不必如此示之以疑必欲過為之防恐却有不可防者南仲曰易或之者疑之也古之於疑有所不免余曰古人雖不免於疑然貴於有所決斷故書有稽疑易曰以斷天下之疑儻疑猜不解如所謂竊鐵者為患不細南仲紛紛不已余奏曰天下之理誠與疑明與暗而已誠則明明則愈誠自誠與明推之可以至於堯舜疑則暗暗則愈疑自疑與暗推之其患至於有不可勝言者耿南仲當以堯舜之道輔陛下而其人暗而多疑所言不足採上笑之而南仲艴然怒甚既退再召對於睿思殿賜茶訖南仲忽起奏曰臣適遇左司諌陳公輔於對班中公輔乃二月五日李綱結構士民伏闕者豈可處諌職乞送御史臺根治上及宰執皆愕然余奏曰臣適與南仲辨論於延和殿實為國事非有私意而南仲銜臣之言故有此奏伏闕之士陛下素已鑒察臣不敢復有所辨但臣以菲才冒處樞輔仰荷特達之知未能有所補報區區素志欲俟敵騎出疆道君鑾輿還闕然後求歸田里臣之願也今南仲之言若此臣安敢復留願以公輔事送有司臣得乞身待罪上笑曰伏闕士庶以億萬計如何結構朕所聞知卿不須如此南仲猶不已余因再拜辭上出居啓聖院不復歸府入劄子求去劄子曰臣聞見危致命臣子之常分陳力就列古人之格言方艱難之時故當徇國忘軀而於揣分量才又有不能則止之義輒伸愚懇上瀆天聼伏念臣賦性蠢愚學問荒淺比由庶僚荷陛下異恩擢在政府自蒙委任夙夜究心外捍強敵內安衆志上賴宗廟社稷之靈陛下仁聖所格金人退師京邑安疆傳檄而三鎮堅守奉使而兩宫協和區區之忠志願粗畢而臣自事變以來夜以繼日無時暫休智術殫於思慮意氣索於憂虞內度綿薄實難勉強况今朝登老成賢智並用正論得伸於廟堂德意下洽於海隅自此天下豪傑忠智之士當連茹而進內修政事外禦強敵以副陛下嘗膽卧薪之意顧如臣者材術既踈心慮憒耗深恐有誤使令以速罪戾伏望聖慈許罷臣樞密院事特除一在外宫觀任便居住則仰荷陛下始終保全之恩捐軀保國期於異日干冒天威取進止奉御批今封還卿奏豈可如此托付之意至矣更勿少疑不得再有請雖纍百章亦當封還誅趙良嗣於郴州監察御史胡舜卿陟奏伏見今日搆成邊患幾傾社稷實自歸朝官趙良嗣始今猶居郴安處善地典刑未正公議不容奉聖旨趙良嗣取首級令廣南西路轉運使李升之監行刑子孫送吉陽軍編管二十八日甲午李綱再乞宫祠第二劄子曰臣適具奏以備經憂虞心慮憒耗乞罷臣知樞密院事除一在外宫觀差遣伏蒙聖慈特降封回所奏章御批訓諭令不得再請聖意隆厚感戴天恩非臣捐軀所能上報切念臣奮自寒苦初無所長遭遇陛下龍飛之初適丁艱難國家多事遂被奬擢得見危致命少效臣節都邑底寧刁斗不驚斯皆陛下聖德所致如臣何力之有然而危疑之迹踈拙寡助力小任大夙夜憂恐自非陛下深察而保全之寧有今日常願俟敵馬既退三鎮無虞上皇鑾輿還闕二聖重歡目覩盛事乞身歸休安於田畝乃其素志適今早進對於大臣議論不合遂詆臣以士庶伏闕之事疑臣結搆乃至欲御史根治伏念臣備位樞管橫遭誣衊有玷國體寧不動心所以遽上封章實非獲已雖蒙聖恩委曲宣諭終不自安伏冀哀矜使遂所請未填溝壑誓當捐軀以圖仰報臣更不敢供職見搬出啓聖院安泊聼候指揮取進止奉御札依已降旨不許搬出啓聖院依舊赴院供職第三劄子曰臣伏蒙陛下以臣上第二劄子乞在外宫祠特降御批令臣依已降旨赴院供職仰荷聖恩彌深感戴臣聞難進易退者君子之風貪位慕祿者人臣之戒臣自庶僚荷陛下特達之知擢參大政遂長樞庭所以輒受而不敢固辭者蓋以時方艱難義當自竭雖叨冒非據不自知其不可然於君子難進之義已不能無愧今日敵馬既回國勢初定庶幾引退以補前愆至於貪位慕祿則非臣之素志也况因庭對同列議論偶有不合遂遭詆誣茍包羞忍耻強顔取容不唯有玷國體然亦將取輕於陛下其何以協贊帷幄之謀折衝萬里故敢仰恃天恩乞身而退庶幾去就之節上無愧於古人伏望聖慈矜臣區區非敢沽激特從所請勿使顛躋荷恩無窮沒齒難保見今已在啓聖院聼候詣揮取進止奉御筆可赴院供職不得再有陳請今還卿奏監察御史余應求劄子言中人不可預軍事臣嘗觀自古中人預軍政未有不為患者故齊寺人貂漏師於多魚夙沙衛殿而二將見獲唐用監軍每無成功此可為後世深戒者國家近年邉事專委童貫談稹終為大禍幾危社稷今兵革未弭選將擇帥固當委任責以成效所遣中人不過隨軍承受奏報文書而已不使之干預軍政也臣竊見近者河東承受王嗣昌奏請畫一乞今日報將兵復驗首提點賞犒催促糧運及差發探報動息出入皆報承受所則是又預軍政矣雖名承受其實監軍也夫軍政不專於主帥而關決於承受則動有牽制進退狐疑又唐之監軍多擁精兵自衛勝則坐分功賞退則引兵先遁今嗣昌又乞以隨軍步馬各兩隊防護若近裏勾當抽摘隨行防護如是又踵唐監軍之迹也如此豈有身赴敵死於行陳之意哉朝廷不察其意而從之臣恐將帥依違不能專制又慮積日纍勞它時為制將自兹始矣臣又觀童貫之初用事也為河西蘭會路承受而已繼而為措置邉事又為安撫制置使又為宣撫終之爵郡王職樞管談稹之初用事也亦熙河蘭會路承受而已繼而為勾當公事又為淮浙制置末乃為河東宣撫使蓋其由來有漸非一日之積也今嗣昌初為承受預軍政師還有功後或任使豈不少假之權浸以隆盛安知數年之後不復為貫稹者乎易曰履霜堅氷至言防微杜漸當辨之於早也陛下方修法度以治內命將帥以事外委任甚專不從中制宜恪守典憲無敢侵紊而嗣昌陳請乃欲干預軍政擁兵自便首為亂階漸不可長伏望聖明追還所請重賜竄責以為中人預軍事之戒以示專任將帥之意不勝幸甚奉聖旨王嗣昌奏請畫一指揮更不施行三朝北盟會編卷四十四
