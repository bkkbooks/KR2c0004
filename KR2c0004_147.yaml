body:
  text: 三朝北盟㑹編卷一百四十七宋徐夢莘撰炎興下帙起紹興元年四月二十一日丁亥盡八月八日壬申二十一日丁亥前威武大將軍曲端死于恭州獄中初王庶以失延安自劾罷六路節度也聞張浚來作宣撫處置使即前途迎見之浚以庶為叅議官復與庶偕行浚既失全陜退保蜀中復欲用端庶曰不可富平之戰宣撫與曲端有勝負之約今日宣撫有何面目見曲端若曲端得志雖宣撫亦敢斬之不可用也吳玠亦惧端之嚴眀恐其復用乃書曲端謀反四字于手心玠侍浚立舉手以示浚然不言也浚雖有殺端之意而未有罪庶等曰曲端嘗作詩題柱有指斥乗輿之意曰不向關中興事業却來江上泛漁舟此其罪也浚乃送端萬州招管復令恭州取勘康隨先在鳳翔府曽邅端決背一百有切骨恨浚以隨為提㸃刑獄公事端聞之曰吾其死也呼天者數聲端有馬名鉄象嘗日馳四百里惜之至是連呼鉄象可惜者又數聲乃赴建既至隨命獄吏縶之紙糊其口煽之以火端乾渴而死逺近士民聞端之死無不悵怏有數日食不能下者不旬日鉄象亦斃嗚呼林泉野記曰曲端字師尹鎮戎軍人通書史善属文精騎射建炎初經畧使知渭州樞密直學士席貢用端為統制屯涇州是冬金人攻涇屢為端所敗時陜西五路制置使王庶以端為都統制嚴酷嘗曰假使曲端忤我我亦斬之端聞而忿敵入延安端不肯救庶走端寨端責以失守囚而奪其印累日方得釋三年召端為御營使司提舉以行事務地逺不能赴張浚宣撫陜右築壇拜端為威武大將軍涇州防禦使端登壇諸將懽聲雷動浚由是以忌之四年正月二日兩破敵衆浚欲合五路兵於耀州與敵決戰端堅持不可謂宜五路分擊浚不從王庶時為叅謀因譖云反乃送恭州及戰于富平乃詐建端旗幟以威敵羅索貝勒曰紿我也一戰我軍大敗庶薦康隨為提㸃刑獄令誣端以罪次年下端恭州獄逼殺之軍民益體解而五路遂䧟于敵浚還朝中丞辛炳侍御史常同言浚妄殺良將致失五路罷之翟興殺偽信王楊餻糜之子沿河守禦官王興報大河北岸有兵千餘人其首領自稱親王翟興命王興招延渡河厚其供饋以兵衛之既行移或稱信王或稱鄧王或自謂是淵聖文檄不一鼓惑衆聽意在誘結將士動搖邊境興察知其偽首領者覺之乗夜潛遁興委都統制董先追襲至商州𫉬之乃鄧州楊餻糜之子者識証甚眀遂并其黨殺之馬友敗孔彦舟于潭州遂以湖南副總管知潭州先是馬友在南陽軍也張用已受招安在鄂州城中友遣都統王成率衆渡江攻鄂州平湖門或走報用用曰何不殺之曰不敢殺也用率親兵登城成見之聲喏于城下用問為誰曰王成用責其不忠便使以神臂弓射之其衆退還漢陽翼日李允文差友為湖南副總管友遂率衆往湖南至是屢與孔彦舟戰敗之彦舟退去友遂入潭州郭仲旬復登州防禦使主管殿前司公事辛道宗為福建路馬歩軍副總管孔彦舟在鄂州受招安孔彦舟在潭州屢敗于馬友乃退去欲向南行因作口號有又被杜鵑頻喚省參差兵馬過衡陽之句遂冦岳州官吏皆走一城盡空彦舟無所掠遂冦鄂州漢陽軍一帶下寨時鄂州大飢米一升三百五十文民多餓死彦舟括軍中米出糶于市每升二百文人得少蘇皆翕然稱揚彦舟之惠知鄂州李允文聞于朝廷招彦舟彦舟聽命五月十三日戊申金人哲爾格貝勒攻和尚原吳玠禦退之哲爾格貝勒以三百餘騎入山谷欲攻和尚原吳玠遣兵擊之山谷中路狹而多石馬不能行金人弃馬遂敗走于鳳翔府黙哷攻箭筈闗吳玠擊退之黙哷懲三月之敗復㑹烏嚕哲爾格貝勒由階蕪出㪚闗吳玠擊走之時黙哷方攻箭筈闗玠復遣兵擊退黙哷不得與二帥合矣郤清冦太平州郤清先受朝廷招安授樞院水軍統制城湖縣駐劄張俊討李成令清聽節制清至池州與張用徒黨相持時時戰闘又辭以無粮於朝廷朝廷從之清遂復囬蕪湖就粮是時當塗蕪湖久苦清之擾皆不喜其復至清遣人往太平州買賣知州郭偉不放入城乃曰郤統制已有指揮往收李成安得復囬此郤清聞之怒率衆欲入城城門皆閉遂擁衆攻城時五月十六日也清有衆數萬大小舟數千艘入姑溪河上蓮褐山下至采石東至三湖口與其黨單徳忠孫立魏曦閆在分布徧滿又于城中外四壁劄立硬寨開畎姑溪河水盡渰圩垾掘斷援兵來路燒屋宇驅百姓沿江採研青呰于城下填叠慢道兩所百姓稍怠緩者敵在後以刀殺之并其屍和柴草叠路一日之間慢道與城相平下瞰城中縱火箭焚燒樓櫓取有孕婦人一二十人城下割腹取胎以卜吉凶自此攻城晝夜不息用雲梯及三稍五稍砲者百餘座天橋對樓鵞車洞子一發四面填濠攻城偉親率將士軍民城上與敵血戰官貟軍民傷中者千餘敵以砲打損一敵樓搖動欲倒壞共請立木别修偉曰砲車在城下曉夜攻擊無休息時何暇修敵樓命百姓運土實之倐忽滿遂牢固不復别修清亦不能近偉方食于城上清一砲擊其案損偉不動又以矢斃其侍吏偉亦不頋己未夜偉召募長鎗敢死軍兵下城西壁刼敵營寨東風𦂳猛發火焚燒敵兵所叠慢道火熖熾延及鵝車洞子之属敵不能救遂將所擄强壯無殘疾鄉人用錦繡衣服新頭巾装束驅催往江口剖腹取心祭轉西風不應敵連夜接戰傷重及死者甚衆偉以姑溪水面髙于敵寨地遂于辛酉夜召募軍民下城開畎河水水勢湍急渰浸敵寨計窮蹙㑹鎮江府劉光世遣人來招安壬戌㧞寨遁走下水而去初清有參議魏曦者多知有謀偉忌之乃用響箭射一文字至城下清得之又兩日清殺曦人皆謂偉用間言清信之也六月朱勝非在江州上疏乞恤民招盜朱勝非自罷知洪州轉徙于湖湘間建炎四年六月復觀文殿太學士除江州路安撫大使知江州勝非聚兵于吉州逗遛不進以劉紹先楊勍傅樞為統制及李成䧟江州為張俊所敗勝非乃以紹先兵屯江州數月勝非方至然除命已一年矣九江新遭李成所破被禍最酷凋殘甚于他郡而帥府舊治豫章創移于九江官府荒陋且不可號令一路方朝廷置鎮撫使移易諸路帥臣經畫無節于是勝非上疏論東南盜賊欲招撫西北强敵則命之以官使流離北人各得其所所汰被擄者老弱者不願從軍者留精銳使㪚處軍如此當不為患至若江西大冦皆因朝廷號令無定横歛不一名色既多貧民不能堪以故為冦且言臣被詔赴任來自桂嶺陸行一千七百餘里至臨江軍所見道上居民及近路村落自入衡州界有屋無人入潭州界有屋無壁入袁州界則人屋俱無良民不辜情實可憫陛下幸隆寛詔深加哀憐蠲削苛擾俾知實惠招降其首領與補降官收隸軍籍而㪚遣其徒衆各使還業則江西之亂庶可指日平也不然則為盜者日益衆勢必南軼湖南二廣皆不得安矣先是李宋仁亂江西帥臣監司多往招收或許以髙爵或㗖以厚利宋仁間殺所遣之人乍服乍叛終莫能平勝非募世範叩問再三知其能辦然後自為文榜授之使行以招之世範如其言而往不數日宋仁軰三十餘人來降然後諸郡解嚴郭仲威自焚刼平江府即轉至淮甸王德誘而執之檻送行在朝廷以仲威望敵不見焚刼而出誤平江一城生靈者仲威也且在真揚州䟦扈之迹甚眀命王舜成押赴平江府凌遲處斬是日也舜成以甲兵防䕶凌遲于飲馬橋下城中軍民歡躍稱快張俊追及李成敗于蘄州石幢坡成走附于劉豫張俊既敗商元馬進于江州而李成在蘄州俊引兵渡江至黄梅縣與成戰敗之成據石幢坡憑山以木石投人俊乃先遣游卒進退若争險狀以誤之俊帥衆攻險賊衆奔潰追殺賊將孫建馬進及首領無數自黄梅六安諸郡賊徒聞風逺遁成北走偽齊張俊送知鄂州李允文于行在張俊為江淮招討使移牒李允文曰恭奉聖㫖統大兵前來掩殺賊徒李成請照㑹時鄂州粮食且盡而孔彦舟在漢陽以來允文得牒遂悉衆往江州丁家湖見俊俊分兵三百人與允文囬州允文怒俊奪其軍有言侵俊俊怒其在鄂州殺袁植等事差人押送行在所沈與求為侍御史先是沈與求為侍御史以論李綱乞詔宰執選用罪戾之人除職與郡遂除直龍圖閣知台州侍闕未赴上思與求之忠有㫖召還再除侍御史上嘗從容言王安石之罪在行新法與求對曰王安石以己意變亂先帝法度誤國害民誠如聖訓然人臣立朝未論行事之是非先觀心術之邪正揚雄名世大儒主盟聖道新室之亂乃為美新劇秦之文馮道左右賣國得罪萬世而安石于漢則取雄于五代則取道臣以是知其心術不正則奸偽百出僭亂之萌實由于此起自熙寜元豐以來士皆宗安石之學沉溺其說節義凋喪馴致靖康之禍汚為賣國一時叛逆適逭典刑願陛下眀正其罪以戒為臣不忠者是時上欲究僭偽事因與求之言遂大感悟邵興退軍于興元府邵興在盧氏縣為董先所攻興不勝遂率衆走入興元府投安撫使王庶宣撫使張俊以其姓名與年號偶同遂改其名為隆七月岳飛為神武右軍副統制張用以兵五萬降于張俊張用自咸寜縣趨江西屯于瑞昌境中曹成屯于吳仙鎮張俊既敗李成成歸劉豫矣乃使岳飛招用降用有受降之意令諸軍來日往吳仙鎮與成合軍翌旦軍士有之吳仙鎮者久之用不至衆皆疑之俄有承局報用已受岳飛招安追軍馬皆囬衆以既行三十里不可囬矣乃趨吳仙鎮曹成令軍中人别作一寨未幾用再遣人追其軍馬遂往瑞昌與合矣討論蔡京王黼童貫譚稹李彦朱勔梁師成孟昌齡楊戬父子親黨門人得官改轉者皆降八官宰相范宗尹罷為觀文殿大學士提舉臨安府洞霄宫范宗尹為宰相侍御史沈與求言其無經畫才遂罷之制有之曰昔輕用人言妄裁官簿以廟堂之尊而負天下之謗以人主之孝而暴君親之非朕既丁寜徳意而申命于朝汝方廢格詔書而持必于下此宗尹所以罷相也范宗尹字覺民襄陽人宣和三年登進士乙科時年二十三靖康初召赴闕累遷諫議大夫是冬敵再至順宗尹俯伏流涕請割三闗與敵康王在單州宗尹自都來迎建炎初言官疏其主和之罪罷落職三年召復諫議大夫是秋參知政事從駕幸海道次年召復諌議駕囬越州拜尚書右僕射奏改御前五軍為神武五軍御营五軍為神武副五軍分江淮京湖路為十五鎮撫使各為守備屏蔽行在乃以吕頤浩守江東朱勝非守江西劉光世守浙江薦孫覿汪藻李擢陳戬謝克家入朝量移王時雍徐秉哲莫儔吳幵王紹王及之胡思等上皆不知識者尤其不公金遣秦檜歸朝士多疑之惟宗尹李囬主其忠遂擢為禮部尚書李成入冦建議遣張俊等破之紹興元年宗尹議討論蔡京等父子親黨門人得官改官者侍御史沈與求以為言罷為觀文殿大學士提舉洞霄宫薨年三十十六日庚戌張琪冦饒州張琪冦饒州吕頤浩遣統制郝曰政崔増王進顔孝恭閆臯與戰大敗之琪退走遂冦浮梁權知濠州李玠率家属去令張徳權知軍州事李玠在濠州當羣敵縱横之時以嚴酷殺伐守其城縱兵横擾于民故能得兵軍之情久處于危城中金珠寶貨不可以數計玠棄城而去陸路既不可行又水路為冦宏所扼宏屢犯城下與玠戰勝負相當至是玠通書與宏許之玠遂留州印與巡防官張徳令徳權管軍州事玠乃以家属泛淮而去凡得民間金銀財寶皆重載而行至鳳凰州見宏宏待之甚厚玠言濠州無守將使宏進趨城可以保民而功成二十一日乙夘劉光世招安卞寜及郭仲威餘黨渡江卞寜者楚州五湖捕魚人也初寜聚集捕魚人後又聚强壯僅有千餘人在湖中山歸北里為寨無粮食專掠人為粮郭仲威在真陽遣人招之不應至是受劉光世招安又有仲威餘黨欲渡淮投劉豫豫不受復出屯于淮南亦受光世招安光世皆令在長蘆以待發舟船濟渡寜及仲威餘黨皆集于長蘆無粮食集皆飢乃掠人為食半月之間食㗖萬餘人乙夘光世方發舟船來濟渡先是烏珠屯于六合既退軍不驅擄百姓尚未覺凋殘經寜等食覺凋殘矣詔張俊班師中書舍人林遹轉對劄子伏見比日收復江筠等州李成敗兵奔逃潰㪚淮南蕃騎渡淮愈逺盖亦上天悔禍稍稍休養生聚以成陛下中興之業願乗此時嘗膽愛日聚兵積粟蒐閱士卒夙夜籌畫以備向去防秋之計自金人南牧天下痛心疾首日望一日今五年矣將不加勵士不加勇財不加富然未知所以善後者萬一循習目前如積薪厝火寢處其上可謂安乎李成等與金人結連為聲援今雖敗衂根株未除餘孽猶在藏蓄愈深不可不慮也金人前嵗蹂踐江浙氣燄尚驕今聞遂爾北去在兵法兩敵相當多夸示所長匈奴匿其壯士肥馬示以羸怯遂有平城之圍鷙鳥欲搏必戢其翼況北歸之衆齊集淵藪未離巢穴安知不示弱以怠我師俟秋髙馬肥遣李成招集瀕淮飢民呼吸羣盜侵軼江南徐以勁騎揚兵福山擣虚浙右水陸並進以困我備禦以分我應援兵法所謂多方以誤之彼處其逸而我不暇給矣比聞北人再攻闗陜窃思敵人非直為陜右也前代諸葛亮以偏隘之蜀尚欲與曹操争天下必先取仲達乃勤師渡瀘豈為甘心于不毛之地哉趙元昊未叛命之前連年先以兵取唃斯囉諸部族然後舉兵而南是皆先去後患俾無牽制尾頋之虞況陜西吾勁兵之地敵倘踰淮越江不頋其後犯兵法所忌今遽併力于西陲安知其計不在于南侵也宣王撥亂之雅内修政事然後外侮不加今日之弊惟在兵不習戰將不肅命財用殫匱民食艱踊州縣以軍興為名而掊取無度此迺腹心之深病政事所當先而敵國外患正為病在四肢可以漸去也陛下與廟堂公卿大臣汲汲講圖之臣書生何足以揣度事机倘赦其狂瞽少賜採擇幸甚八月八日壬申張俊㸃揀張用人馬張用在分寜縣令家莊受岳飛招安張瑞昌親揀其軍五萬强壯者留之餘逐便令去有投曹成者有投岳飛者有投韓世忠者有自营生者自此曹成走湖南韓世忠追之三朝北盟㑹編卷一百四十七
