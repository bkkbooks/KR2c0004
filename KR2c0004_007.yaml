body:
  text: 三朝北盟會編卷七宋徐夢莘撰政宣上帙起宣和四年五月十八日乙亥盡六月三日庚寅十八日乙亥河東河北路宣撫副使蔡攸進發北征紀實曰攸行蔡京以詩寄之曰老慣人間不解愁封書寄與淚橫流百年信誓當深念三伏修塗好少休目送旌旗如昨夢身非幃幄若為籌緇衣堂下清風滿早早歸來醉一甌達上聽讀之徐曰好改作六月王師好少休也吳曽漫録曰自古姦人周身之術非不至然而禍患之來卒出于非意所及者何也蓋惡逆既積則天地鬼神不容其謀徒巧也宣和四年金人攻大遼遣王緯來乞師宰相王將明主其議以童貫為宣撫使蔡居安副之蔡元長作詩送其行有曰百年信誓宜堅守六月王師合早歸元長之為是詩也蓋欲為他日敗事張本耳殊不知政和中元長首建平燕之議招納燕人李良嗣以為謀主又欲以妖人王仔息服綿袍鐵幘為大將軍計議已定會仔息抵罪伏誅遂止將明所為乃推行元長之意世可盡欺乎元長始以紹述兩字劫持上下擅權久之知公議不可以久鬱也宣和間始令其子約之招致習元祐學者是以楊中立洪玉父諸人皆官于中都又使其門下客著西清詩話以載蘇黃語亦欲為他日張本耳終之禍起朔方竟以不免豈前所謂其謀徒巧耶北征紀實曰是嵗夏四月十五日童貫始以河北河東燕山諸路宣撫使出師是日白虹貫日人駭異甚出門而牙旗竿折五月十八日伯氏再出師有少保節度使宣撫副使二認旗從于後次日為執旗兵逃去而二認旗遂皆失之識者以為不祥又出師後五月以戊寅己卯庚辰連數夕有大流星若盂碗自紫微文昌間出不一或犯天津河鼓等越天漢牛斗間亦不一所皆南向而奔曵光如匹練每夕自初夜動數十流至夜半方漸疏至是十餘夕猶或南流不已其占懼如西晉象實令人憂疑然太史皆屏不奏又用兵雄州地震已而雄之正寢忽元武見龜大如錢朱蛇僅若筯每行必相逐二帥拜之藏以銀盒置于城北樓真武廟明日啓盒視之龜蛇皆死矣燕王遣使王子班耶律達實林牙充西南路都統以牛欄監軍蕭赫嚕副之領奚契丹騎二千屯涿州新城縣馬茆齋之説燕人也僅脫身而歸然燕王亦懷懼既議遣使隨以兵屯新城金國遣圖克坦烏舍髙慶裔充通問使持書來議軍事先是金人緣朝廷遣赫嚕等歸不遣使疑吾有謀故未嘗先報軍期遣其弟固倫相國貝勒及小國王等軍破中京取雲中退屯于白水泊阿固達親領兵數萬來會又聞童貫舉三路大兵屯邊阿固達與羣帥議以不報軍期其曲在彼深恐朝廷徑取燕地便入界守關不得嵗幣遂遣圖克坦烏舍髙慶裔充通議使乘船至登州來朝且自臨軍乘機措畫金人國書五月日大金皇帝致書于大宋皇帝闕下因旋使傳繼附音函會當命伐之時未報尅期之約方將併取爰審前由來書云漢地等事並如初議俟聞舉兵到西京的期以憑夾攻不言西京就便計度以此遣兵征討及留送使船上等候見勝捷即令拘回次得行營都統所狀初到中京委諭欵降不為依應即日攻破外興中府左右小可州城亦相因尤效以為雖已示威本奉弔伐若便攻拔慮益傷民候收遼國欲將何往遂乃直抵山西就擒昏主無何潛覺脫身逃遁只獲行宫并女二名文武臣僚續往西京應朔蔚及西南路招討司一帶諸州縣鎮部族軍戍悉皆欵附後有西京德州兩處相次背叛纍行招誘竟不自新軍令既成無由可逭又遇興中府左右合聚兵衆約會伍萬縱徒逆戰殺俘逮盡後知契丹昏主竄于沙漠分兵遣捕次其餘處所並已歸降下臺亦遣人使來議通好韃靼願輸嵗貢繼久稱藩燕京一處留守國王耶律淳僣號稱尊懇誠告和未審便行攻伐或别有朝旨即日敵國新收義當存撫願為親幸以快輿情由是親臨安慰懷睦鄰邦前書已差太傅童貫領兵相應雖未報期緣兵馬已到代北邊陲慮昏主逃入貴界曽牒代州幸無容納諒已必知而又不為夾攻及無本會至始難見自來計議事理的實今據前後往復因由意或如何冀示端的盛炎在候順迓天休今差貝勒烏舍髙慶裔等充通議使副及管押蘇夀吉家屬前去有少禮物具諸别幅專奉書陳達不宣謹白五月二十六日癸未种師道禆將楊可世為達實林牙掩敗于蘭溝甸師道禆將楊可世聞燕人久欲內附若王師入境必簟食壺漿以迎乃將輕騎數千直欲取之至蘭溝甸為逹實林牙所掩大敗而還淳益師三萬餘人渡白溝挑我軍我軍遇之又北初貫至高陽召知雄州和詵詢利害詵深言出師無名今宣撫司既至勢不可已乞且按兵觀釁仍戒嚴師臣毋得妄行引惹張皇生事貫乃降旗榜稱奉聖旨王者之師有征無戰弔民伐罪出于不得已而為之如敢殺一人一騎並從軍法又造白心旗欲給向化之人命詵兼統制副种師道二十九日种師道進兵白溝為達實林牙蕭幹掩擊不戰而還師道兵至白溝營幕初定或報曰河北有警師節制諸軍如貫素約指揮諸軍曰燕吾民也茍王師力能接納自來歸附但堅壁為備必有內變切不可殺一人爾等為我約兵卒遵依聖旨及宣撫司約束諸將既行楊可世即遣驍將趙明持黃榜旗往付之比明賊已對壘矣明據橋陳其禍福或有欲榜幟者亟欲與之達實林牙看訖毁徹罵曰無多言有死而已語未竟矢石如雨我軍不為備又拘節制馳以報師道曰兵刃既接安能束手就死戰將有功諸將又曰若不血刃使和詵坐受其賞則我輩何故為來可世勒所部將士臨河分遣趙明麾衆擊之契丹隔水揚旗指西騎卒隨指而西可世謂諸將曰下流必有可涉處須分兵據之會師道遣涇原將趙德來援遂呼曰爭前德未及往敵已度水馳騖德老將識利病亟避之可世大呼罵曰匹夫安得輒北何以報國恩即舍河橋親往戰焉敵分左右翼圍之趙兵孤亦摧可世中鐵蒺藜箭及骨血流滿靴怒髮裂眥鞲臂以捍口御鞚墮兩齒胸腹中流矢亦手殺數十人得免是夜契丹有奔突意屬四撾將列聲金鼓敵惕惕疑我出兵遂不得前漸曉方覺即引衆而來我軍堅壁不能逞而還翼日西路辛興宗駐軍范村敵將蕭幹登孤山張蓋據行床以覘我軍須臾引去良久敵兵來戰前軍王淵劉光逺翟進降將趙詡各勒所部兵接戰敵大奮力圍諸將于山下淵中鎗幾墮馬勝敗未決興宗遣中部將楊可世援之又親出軍門以上將節鉞督戰敵遂退和詵勸師道斬前軍統制楊可世號令諸部以明宣撫司出旗榜本意師道以可世貫之愛將詵謂此何異穰苴之斬莊賈不惟可以懲戒後且使燕人知朝廷無意用兵師道竟不從兵革自此始矣三十日丁亥燕王遣祕書郎王介儒都官員外郎王仲孫賫書同馬擴來雄州宣撫司先是童貫遣張憲趙忠賫書遺燕王燕王斬之又令趙詡差使臣談九殿直等數人説易州土豪史成令起兵獻易州史成送燕京亦斬之宣撫司知遊説不行遂遣种師道進兵壓境問罪募馬以往馬有膽氣口辨抗論不屈燕王懼遂遣王介儒來六月三日庚寅种師道回軍雄州再為掩擊童貫劾奏師道責官致仕种師道既知辛興宗兵亦挫心頗猶豫又受宣撫司牒令與諸將議詵可世等共議云宣司令師道與諸公共議可即回歸諸帥皆謂非得西師去力不濟聞辛興宗西路兵亦挫契丹若未易圖不若回兵雄州乞暫休兵再議去就和詵以謂彼此初無戰意惟可世擅過界討殺致兵結不解今敵才對壘而我遽歸自示以弱如彼乘機襲逐事且不測師道令詵作議狀稟宣撫使司初朝廷從附會之詞謂一舉可以下燕望不及此而師道興宗皆表以賊勢大撓貫命兩道皆解嚴令至可世謂師道曰敵兵方陸梁未可以指屈今知我有還意無功而歸氣沮疲乏必襲吾後曛晚發輜重半夜進軍使鋭兵為殿比敵覺我已歸矣師道不聽明旦聲金鼓班師敵知用輕騎尾擊我至古城鏖戰敵五軍亂師道幾不免甫達雄州敵兵大至宣撫下令止軍不得入城中外號呼門不能閉可世與壻馬彥傳大將楊惟忠邀戰于城下貫遣辛企宗永宗領勝捷兵援之時天黑暗北風大雨震雹如拳碗我軍不能相敵自午至申風雨愈疾師道遽呼馬與監軍崔詩聯騎而奔契丹遽以敗盟詬我追至古城南我師望南而潰燕人亦遽北自雄州之南莫州之北塘泊之間及雄州之西保州真定一帶死尸相枕藉不可勝計先是既以招撫為名貫下令中軍不許妄殺人及敵騎犯我師皆不敢施放聽其殺戮故雖諸將亦憤然於是貫以契丹尚盛未可圖奏劾种師道天資好殺臨陳肩輿助賊為謀以沮聖意和詵不從節制乞行軍法侯益詗探不實妄請興師种師道押赴樞密院責授右衛將軍致仕和詵亳州團練副使筠州安置侯益知濠州种師道責官謝表曰領奉告命責臣右衛將軍致仕者總戎失律誤國宜誅厚恩寬垂盡之年薄責屈黜幽之典孤根以託危涕自零中謝伏念臣西海名家南山舊族讀皂囊之遺䇿知黃石之竒書妄意功名以傳門戶荏苒星霜之五紀始終文武之兩途緩帶輕裘自愧以儒而為將高牙大纛人驚投老以得侯屬興六月之師仰奉萬全之算衆謂燕然之可勒共知頡利之就擒而臣昏昧乘時非才應變筋力疲于衰殘之後聰明耗于昏瞀之餘頓成不武之資乃有罔功之責何止敗乎國事蓋有玷于祖風深念平生大負今日豈意至仁之度不加已耄之刑俾上節麾亟歸田里乾坤施大螻蟻命輕茲蓋伏遇皇帝陛下睿知有臨神武不殺得駕馭英雄之要道制服鄰國之大方察臣臨敵失機不出求全之過計念臣守邊積嵗尚收可録之微勞許免竄投獲安間散臣敢不拊赤心而自誓擢白髮以數愆煙閣圖形既已乖于素望灞陵射獵將遂畢于餘生康隨跋曰宣和壬寅嵗四月十一日保靜公自涇原帥被旨差充河北河東陜西路宣撫司都統制從本司之河北招納北人蓋從河北沿路宣司申請也宣司時已離都下公上章乞過闕日靣對未上達間有旨促公便道趨本司公到高陽見宣撫使童貫極言其不可其略曰前議某皆不敢與聞今此招納事安可輕舉童貫曰已得聖訓不得擅殺北人王師過界河即簞食壺漿來迎特藉公威名以治衆耳廟議已定安可改易乃大書聖訓于黃旗植立軍中以誓師且督公行五月二十二日前軍過界河已有北人迎敵既不敢與之交兵姑避其鋭而已統制官楊可世與麾下將佐數人士卒被傷者甚多遂那軍回界河之南濱河駐兵北人無日不來侵軼我軍一日隔河問我師出之名公遣屬官康隨以河北安撫申北人陳乞事以答之乃曰安得此言箭發如雨以射我衆公翼日乃遣康隨詣宣撫司告以北人之語且稟進退之命移兵暫回以候取旨六月三日黎明軍回北人追襲直抵城下屬大風雨兵士自相蹂踐棄擲兵仗滿郊至晚宣司令營寨于雄州城外公坐失機會罷兵南歸相繼邸報有此謝表公關陜名賢之後筮仕伍十年間提兵所向何戰不克何城不下而此役初不與謀中則強委任之又兵之節制皆不得專考其行事罪有所歸矣因傳録于瓦橋州宇之西齋他日關中親舊間或有見問者當以示之繹味表詞可以見公之本末云是年八月十四日康隨記三朝北盟會編卷七
