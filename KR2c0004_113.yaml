body:
  text: 三朝北盟會編卷一百十三宋徐夢莘撰炎興下帙起建炎元年八月十四日辛未十月二十九日乙亥東京留守宗澤奏劄乞車駕回京師宗澤自七月到京師屢上表劄乞回鑾又極論曰臣蒙恩差權知開封府事今到二十餘日物價夜市盡如平時每覩天意眷顧清明每察人心和平逸樂臣之血誠見將士見商賈見農民見士大夫之懷忠義者咸若陛下歸正九重是王室再造大宋中興也臣竊料百僚中唱為異議不欲陛下歸京師者不過如張邦昌耿南仲姦邪輩隂與金人為地爾臣願陛下體堯禹順水之性順將士順商旅順農民順士大夫之懷忠義者早降敕命整頓六師及詔百執事示謁欵宗廟垂拱九重之日毋一聽向邦昌耿南仲姦邪隂與金人為地者之語又别奏曰臣契勘京城四壁濠河樓櫓與守禦器具其當職官吏協心併力夙夜在公率屬不懈增築開濬起造舟楫寖皆就緒臣又製造決勝戰車一千二百輛每輛用五十五人一卒使車八人推車二人扶輪六人執牌護車二十人執長鎗隨牌護車十八人執神臂弓弩隨鎗射遠小使臣專幹辦閲集畢事每十車差大使臣總領為一隊見今俾統制官日逐教習變化進退左右周旋曲折之陳於城外劄寨又沿河一十六縣與上下州軍相接作聨珠以嚴偹禦臣見使王彥曹中立在兩河攻擊收復州縣西京河陽鄭滑等州同為一體把截探伺次第金人畏讋必不敢輕動冒犯自速殄滅又曰臣已修整御街御廊護道杈子平治南薰門一帶御路聞萬邦百姓寓於京師者日夜顒望陛下迎奉祖宗之主與隆祐太后皇后妃嬪皇子天眷歸安大內以福天下臣民夙夜憂思眷眷念念繼之以泣又别奏曰陛下即位乃宴安南京四方聞之懷疑胥動遞相鼓扇聞諸州縣間有驚劫傷殘之患蓋小民無知因疑致變旋相踐蹂弗奠攸居兹無他由陛下寅畏過當駐蹕别都俯徇姦謀踰國遷幸使彼狡獪皇惑敢爾橫肆盜據竊發闕文局蹐以歸畎畝以操來劍戟鑄為農器思不犯於有司爾若陛下敕翠華之御俾千乘萬騎回復輦轂奠枕九重臣竊謂可以垂衣裳而天下治可以坐視人民之阜王室自然再造大宋自然中興尚何侵侮之足憂盜賊之足慮乎十八日乙亥尚書左僕射李綱罷為觀文殿學士提舉杭州洞霄宫制曰論人臣之大戒罪莫重於擅朝置輔相以仰成責尤嚴於誤國式揚明命敷告治朝具官李綱頃以時才列於清要屬戌兵之急變參綱轄於中臺周流俗以沾名秉樞機於右府既統師而敗績舉絀典以投荒次朕詔圗惟人求舊念召還之以賜適揆席之猶虛首登次輔之崇旋陟上台之峻而乃謀謨莫效狂誕罔悛忘協恭之通規負弼諧之初望既請盡括郡縣之私馬又將竭取東南之民財喜怒以私剛愎自用令允符於清議屢抗執以還封用若拂於羣情必力祈於親札第欲恃恩於己靡思移怨於君比劾江浙騷擾之官亟下里民寬恤之詔貼改己畫之旨巧蔽外姻之姦兹遣防秋之師實為渡河之備顯朌告戒厚犒緡錢費踰百萬之多僅達京師而止每訓趣其速進竟沮格以不行設心謂何專制如此忽覽剡章之奏具陳引咎之辭顧物論以大喧豈邦憲之可屈宜解鈞衡之任俾從祠館之遊仍聨祕殿之近班併摧加户之異數以全體貌以厚股肱於戲國步多艱方切履氷之懼鼎司失職更懷覆轍之憂尚緣注意之求特徇乞身之請往祗訓語毋怠省循李綱每建言頗切直黃潛善汪伯彥忌而譛之又諷臣僚使言其罪臣僚上言杜絶言路獨擅朝政士夫側立不敢仰視事之大小隨意專行買馬之擾招兵之暴勸納之虐優立賞格公吏為姦擅易詔令竊庇姻親等事遂罷宰相汪伯彥時政記曰十八日乙亥內降麻制左僕射李綱除觀文殿大學士提舉杭州洞霄官以綱上表稱疾自請故也太學生陳東歐陽徹以上書切直死陳東歐陽徹上書論李綱不可罷黃潛善汪伯彥不可用乞親征邀請二帝語切直斬於市行路之人有為之哭者中興姓氏録曰陳東字少陽潤州人歐陽徹撫州人東在太學博學雄文聲譽甚盛慨然有濟世安民之志宣和末天下大亂淵聖即位東率太學諸生伏闕上書言蔡京王黼童貫梁師成李邦彥朱勔亂國害民謂之六賊乞賜誅戮發䇿親征及京貫勔等追還早正典刑不從靖康初姚平仲敗宰相李邦彥忌李綱主戰罷之大金攻城人情甚駭東引進士伏闕上書而言綱乃社稷之臣不可罷乞召徐處仁唐恪置左右閫外事盡付种師道俄而軍民數十萬大呼闕下請用李綱擊碎登聞院鼓殺內侍五十人遂復用綱而民心定邦彥等皆譛東以布衣而脅天子纍欲罪之上不允補迪功郎賜同進士出身東又上五書乃辭之建炎元年左僕射李綱罷黃潛善汪伯彥用事東與歐陽徹在應天府伏闕上書言李綱不可罷潛善伯彥不可用乞親迎請二帝不允潛善伯彥及諸內侍譛於上驅東徹於市斬之死時年四十二識者哀其忠義且知喪亂未已也三年悔誅東等賜東之子錢五貫東徹承事郎二十日丁丑元祐皇太后發應天府元祐皇太后自應天府進發中原之人皆知翠華將有江都之幸京師父老有相聚涕泣者東京留守宗澤奏劄乞且駐蹕南都勿為巡幸臣伏覩朝廷前遣翁彥國營繕山陵比有詔復遣官奉迎太后六宫以往且謂朕當獨留中原臣讀詔書私竊疑之此必有進言者勸陛下聲為此言其意必有所屬進言者欲陛下過江避敵而不思天下託為愛君以濟其不忠臣願陛下察其利害之實斷自淵衷早定大計臣學空疏不能引古為證姑借近事一二為陛下别白言之朝廷異時改更三舍以取士欽崇道教以奉真進貢花石以享上屈意敵人以講和當時士大夫阿意順指例蒙旌賞其間有識者議論不可稍加裁抑則必以悖戾怠慢加之譴斥陛下試以前日之事槩之其頗僻遵承例霑識擢者果皆忠藎者乎巡幸之事利害所關萬倍於此三者比進言諸臣談何容易又况利害之端曉然可見陛下何不計正其實而早黜之無使此曹如異時阿諛承順之人得便文自營而國家獨坐受其弊臣重念本朝提封汴京號為腹心祖宗都此垂二百年宗廟社稷所在而人民依之以居者無慮萬萬計今兩河雖未收寧猶一手臂之不伸也又併與心腹而棄之豈祖宗所以付託之意與天下睽睽萬目所仰之心哉臣乞陛下且暫駐蹕南都無輕議動臣雖老矣尚當矍鑠鼓勇立辦禦敵之具以圖萬全之舉然掃除宫禁嚴備扈從奉迎鑾輿謁見九廟非特使神祗祖考樂之庶幾中原增重而不失天下之大勢也不然是徒為走計爾示敵以弱非惟不恤兩河抑又不恤中原且去宗廟社稷而不顧陛下豈忍乎臣謂陛下惜者此爾故敢直輸血誠幸陛下留意又劄子曰我東京是祖宗二百年積纍之基業是天下大一統之本根陛下奈何聽先入之言而輕棄之欲以遺強敵乎臣觀河東河西河北京東京西之民咸懷冤負痛感慨激昻想其慷慨之氣直欲吞此仇敵陛下忍恥聽諛順而不令剛正之士卒同厲心恢復疆宇乎今東京市井如舊上下安帖如舊但嗷嗷之人思望翠華之歸謁欵宗廟垂衣九重不啻飢渴之望飲食也大旱之望雲霓也臣竊望陛下一歸則王室再造矣中興之業復成矣二十八日乙酉尚書右丞許翰資政殿學士提舉杭州洞霄宫先是翰與李綱素善綱被召薦翰六月有旨端明殿學士許翰復職制曰士有明於遠圖而暗於近略工於為國而拙於謀身雖當鑿枘之不同而今實蓍龜之先見具官許翰蚤明古學出應時須翁歸兼文武之材無施不可賈誼陳治安之䇿所慮溢深方宏康濟之規忽蹈譴訶之域棲遲閭里淹厯歲時肆於籲俊之初知汝投間之久悉還故秩召對便朝忠不忘君當大攄於素藴人惟求舊思復見於老成汝其疾驅以承朕念綱罷翰遂得祠野記曰許翰字嵩老洪州進士中第宣和中為給事中言髙麗入貢奢侈之事出知亳州後提舉杭州洞霄宫靖康初以李綱薦召為御史中丞言蔡京童貫蔡攸皆坐責俄同知樞密院金人邀求三鎮翰言三鎮棄則京師不可都而天下危不宜許薦种師道宿將可用又請誅蔡京童貫王黼朱勔楊戬李邦彥孟昌齡等家請推治門生黨與上不允翰嘗督姚古种師中兵起解太原之圍及李綱黜并翰罷建炎初綱入相復薦尚書左丞綱解機務翰以資政學士提舉洞霄宫纍官通議大夫紹興三十年卒九月初五日壬辰命巡幸淮甸御史中丞許景衡奏據探報金人至河陽汜水等處逼近東京朝廷雖已遣鄭建雄就領兵前去防遏乞車駕南巡以慰人望三省樞密院同奉聖旨命涓吉巡幸淮甸續據有司選用十月一日宰執進呈奉聖旨依令朝廷措置施行臣僚乞考驗京城失守將吏士卒效命與逃遁者誅賞示戒臣僚上言竊觀去冬京師失守城池非不髙深兵甲非不堅利士卒非不衆多然上下弛慢嬉戲城上坐觀其填濠復縱其登城又曰公然逃遁無復衛上之心遁於城內者反導敵人劫掠居民遁於城外者結集徒衆焚劫州縣逮今未能偃兵何以為戒若命留守司於金人登城之所三二百步內考驗將吏士卒姓名效命致死者褒其忠義賞賚其家永保廪給逃遁得生者梟首示衆屏逐其家永離其處則人知效死則享名榮而福家屬偷生則受顯戮而禍妻子忽有師旅之事其誰不以死衛其上乎有旨令宗澤具功罪尤甚之人申朝指揮七日甲午奉聖旨將來巡幸駐蹕揚州行下知揚州吕頥浩修治城池繕部員外郎陳克幹辦舟船并樁辦糧草發運使李佑淮南轉運李傳正並隨軍轉運使十日丁酉詔巡幸所過無得騷擾詔曰荆襄關陜江淮皆備巡幸並令因舊就簡無得騷擾訪聞州縣不能深體至意色色求備吏卒並緣為姦百姓受害朕臨位以來欲求民瘼恤民隱思所以為民利者未厭朕心有司以巡幸之故乃更前期騷動朕深痛之今戎馬驚擾之後盜賊間作朕夙夜憂惟念不暫安縱未能盡除大患使吾民各安南畝其可事一已之奉以重困吾民乎凡巡幸所止之處當使百姓若不預知朕飲食取足以養氣體不事豐美亭傳取以庇風雨不易卑陋什器輕便不求備用供帳簡寡不求備儀可齎以行無取於州縣橋梁舟楫取足濟渡道路無治官吏毋出一切無所追呼隨從臣僚皆體朕意有司百官敢騷擾重置於法惟是軍馬芻糧必務豐潔將士寨柵必令寬敞官無得少懈部使者皆朕耳目官有違戒敕而不以聞者當與同罪若是為騷擾罰更加重許民越訴十五日壬寅差兵部郎官太常寺官各一員計置各用舟船迎奉神主仍專委內侍二員充同共都太主管合行事務各迎條具申尚書省施行二十一日戊申元祐太后及六宫至揚州正衙牌曰車駕巡幸駐蹕之門二十二日近降指揮諸路買馬陜西路每州可令買馬百匹外其東南州軍不係産馬之處並免出其勸民出財助國指揮更不施行王彥河北招撫都統制渡河破金人兵收復衛州府新鄉縣樞密院以王彥為河北招撫司都統制司張翼白安民嶽飛等一十頭項七千人渡大河於陷州縣已措置招撫不順番軍民遂渡河北屢與金人之兵鏖戰破之收復衛州新鄉縣二十七日甲寅車駕發應天府上巡幸江都自應天府進發十月一日丁巳聖駕發舟巡幸淮甸宰執侍從三司百衛禁旅御營使司五軍將佐扈衛以行劉光世除殿前都御候營使司提舉一行事務都巡檢使先是劉光世省視陵寢及規畫控扼河陽還遂有是命二十九日乙酉王彥及金人戰於新鄉縣不利兵潰彥入太行山聚衆面刺赤心報國誓殺仇人八字軍兩河響應王彥既得衛州新鄉縣即傳檄諸郡金人以為大兵之至也率衆數萬薄彥壘圍之數重矢注如雨彥兵寡且器甲疏略疾戰輒不利彥決圍以出其衆遂潰金人見彥所乘甲馬獨異復盡鋭追擊彥與麾下數十人馳赴之所向披靡轉十數里弓矢且盡會日暮得免他將往往復渡河以還彥收散亡得七百人保龔城縣西山常慮變生不測夜即徙其寢所部曰我曹所以棄妻子冒萬死以從公者感公之忠憤期雪國家之恥耳今使公寢不安席乃反相疑邪我則非人矣遂皆面刺赤心報國誓殺仇人八字以示其誠彥益自厲大布威信與士卒同甘苦未幾兩河響應招集忠義兵民首領如傅選孟德劉澤焦文通等一十九寨十萬餘衆綿亘數里金鼓之聲相聞自并汾相衛輝澤間倡義討敵百里內皆受彥約束稟朝廷正朔威震燕代金人患之列戍相望時遣徑兵撓彥糧運彥每勒兵以待之且戰且行大小亡慮百十戰斬獲銀牌首領金環金人及奪還河南被虜生口不可勝計三朝北盟會編卷一百十三
