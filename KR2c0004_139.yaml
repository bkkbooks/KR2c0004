body:
  text: 三朝北盟會編卷一百三十九宋徐夢莘撰炎興下帙起建炎四年五月十三日甲寅盡六月十一日辛巳范宗尹為尚書右僕射同中書門下平章事張守參知政事范宗尹辭免不允批答朕履國家之否運思得天下之竒材以卿粵從布衣早有人望纍擊權臣於方用未嘗姦利以邀名每陳治道之可行無不會心而切理洎參贊於大政尤灼見於所存一意盡公羣論皆理乃付巨川之濟用符岩石之瞻制詔一頒縉紳相慶佇卿行志知國有人謂當承命以周旋猶復抗章而趨避惟此舉而國無陋矣今何時而卿辭位乎勉究良圖毋庸再請再辭免批答朕惟治亂兩途未有不由於用相君臣一德相逢鮮直於同時卿識邃而才全謀深而器逺學古人之至要言天下之大公簡於朕心非止今日故擢司風憲升預政機將觀所長不次而用而卿性資天至議論日新言其重厚則如倚太山而坐平原語其疏通則若駕輕車而就熟路乃希大號任之不疑卿當用羣策以兼收念寸隂之可惜立規模於素定應機會於方來輔成再造之基同享無疆之福此蓋盡卿致主之術而成朕知人之明也亟上封章百辭奚益所宜不允仍斷來章遺史曰范宗尹拜右僕射張守除參知政事宗尹具辭免賜詔不允仍斷來章汪藻行詞曰言其重厚則如倚泰山而坐平原語其疏通則若駕輕車而就熟路乃希大號任之不疑宗尹讀之喜宗尹謂守曰今日之勢正如人之疾病沈痼方篤稍施駃藥立有顛仆之勢要使施設有序勿遲勿亟當相與戮力啓沃上前廣開言路揀拔賢材除剔災蠧節抑財用以至惜名器損僥幸斥豪強左右彌縫庶乎其可也張用冦淮西張用自京西往東京轉南京界自抑子蘄陽趨夀春至舒城縣遂屯中軍其餘諸軍皆分屯四布是時金人方退建康渡江北和州以東金人往來野無所剠乃採草木但葉青而嫩者以火煮之搦去青水不問有毒無毒但能咀嚼者悉食之以至動活之物不論飛走與蠕動得即啖之人皆困乏改御前五軍為神武五軍御營五軍為神武副五軍崔增陷焦湖水寨崔增磁州人𨽻閻瑾軍為將守泗州浮橋瑾棄泗州諸軍潰散增往夀春界中劫祝博士寨併其軍自濠州轉往巢縣攻焦湖水寨增得小舟數隻直搗其寨寨有舟四五十皆淮西富商大賈及上户富民初未曽經兵火不能迎拒盡為增所有虜掠金銀財物子女之餘選壯充軍孫興退濠州將校朱式率軍民請兵馬都監李價權知軍州事金人自建康渡江而北也夀春府軍周太師招孫興等還夀春官吏居民皆送於西門之外勸酒酌别興與滕郎中及所部兵盡行唯留偽通判陳浩然在州興擕二妓毛馬女楊蘇而去以金價償身家自餘無毫髮之擾興在濠州凡半年及既去將校朱式率軍民請軍馬都監李價權官軍州事價用司户參軍江洵武謀囚投拜官張宗望及通判陳浩然於獄遂復用建炎四年年號價以洵武權通判軍州事巡檢魏進權兵馬都監六月二日壬申劉光世來朝七月丁丑劉位敗張文孝克滁州劉位屯於橫山張文孝占滁州位以兵收復滁州丁丑至滁州文孝退走遂復滁州八月戊寅劉位及張文孝戰於滁州被害劉位既得滁州即以其屬李頡為司法參軍是夜與頡同宿於子城中頡夢城中州屋舍盡倒既覺以為不祥拂旦文孝以其衆至城下位所引兵迎戰位逢兵衆數百以為已之兵也乃指麾殺賊而所逢者賊兵也位覺之欲急戰為賊所殺權知州茍某權知青流縣梅俊迪縣丞張恪非等州縣官皆散走朝廷聞之即其地立廟榜曰剛烈十一日辛巳趙立出兵攻達蘭於孫村浦達蘭以大軍下寨於萬夀河去淮河孫村浦兩舍乃南北咽喉之路又作寨於孫村浦以守之趙立起宿遷縣趙瓊水寨民兵於城辛巳親率親隨百餘人取孫村浦寨遣統制王彥忠以兵數百防夀河之救兵金人自夀河寨日遣三二百騎往來於孫村浦往來出兵急遣鐵騎來救之為彥忠所扼不得進立亦聞之又以鐵騎來故不克攻而退彥忠亦歸吕頥浩為建康府路大安撫使兼知池州朱勝非為江州路安撫大使兼知江州劉光世為兩浙西路安撫大使兼知鎮江府周望責招化軍節度副使連州安置周望以同知樞密為宣撫使棄其軍而奔太湖也以宣撫使印棄太湖中金人已退募漁人入水求得之以宣撫使職知湖州殿中侍御史沈與求言其統重兵於吳門不能扞蔽脫身先遁以致連城陷沒與諸郡以城降敵並緣為姦掠取民財等事乞正典刑遂責授節度副使連州安置陳規為德安府漢陽軍鎮撫使兼知德安府陳規字元則沂州人以明法補官靖康初轉通直郎知德安府之安陸縣金人陷都城規率兵數百勤王未到兵潰而反會郡守及僚屬棄城出奔惟規獨留不去衆遂推規攝府規乃聚兵積糧修城以守敵王在黨忠相繼來攻皆敗而去遷朝奉大夫直龍圖閣李彥義犯城規與戰頗克會忠孝為將張在所殺降於喬仲福數月楊進來攻不能下而退范宗尹為相分鎮以規為德安府漢陽軍鎮撫使兼知德安府趙延夀來冦規擊破其衆纍加龍圖閣待制召赴行在在州八年屢破敵衆中原郡縣皆失守惟德安一城獨存識者偉其能然嚴刑重斂頗失民心規有朝野僉言後序曰規守順昌日得靖康朝野僉言具載金人攻城始末反覆熟讀痛心疾首不覺涕零嗟我國家不幸有如此悲夫世之治亂國之強弱雖曰在天有數未有不因人事得失之所致也楊雄所謂天非人不因人非天不成靖康京城之難若非人事之失則天亦不得而為災若非天欲降災則人事亦無此失規不揆至愚竊觀金人攻陷京城朝廷大臣守禦將帥施設應敵捍禦攻城之失與夫管見禦敵之策論列而序言之朝廷再援太原大臣以謂中國勢弱敵勢方強用兵無益宜制三鎮以賂之殊不知勢之強弱在人為我之計勝彼則強不勝彼則弱若用兵有術以壯中國之勢強者復弱弱者復強強弱之勢自古無定惟在用兵之如何耳河東安撫使統兵十七萬以援太原又招河東義勇禁兵五萬共兵二十二萬尋皆敗績致太原陷于敵非兵不多蓋用兵之失也其所以失者兵二十二萬直前而行先鋒遇敵者有幾一不勝而却自後者大兵皆却是宜乎不能援也有識者觀之不待已敗而後知其不能援也豈不知攻城者分攻城兵備戰士運糧兵扼援兵若兵不多兵必不久而速退又不待其援也假使當時往援者將良得計雖無兵二十萬只十萬亦可必援又無十萬只五萬亦可必為之援也又不五萬至其下亦有可援之理且五萬兵為率若止分為五十將留十將護衛大軍兼備策應內分三兩隊作諸路扼援兵前廣張兵勢牽制扼援之兵以二十將分地深入敵境綿亘可布三五十里不知敵兵多少便盡以二十將周圍行偏僻小路尋鄉導多遣逺探向前設伏伺望敵人打糧出兵多則退之少則擒之但絶其糧道必不深入直抵城下其敵自退又且兵既分遣則人力並用假令數將失利則大兵必不致於一齊敗衄潰散為盜京城之難其源在於援太原之失利也尼堪攻太原之夀陽夀陽城小而百姓死守凡三攻殘敵之衆萬人而竟不援此必城中有善為守禦之策者僉言以為城小而百姓死守者非也攻城者有生有死而善守者有生有死夀陽之人可謂善守而不得謂之死守又或云城小而堅者亦非也若城小矢石交通善守者亦難以設險施策規以為城愈大而守愈易分段數作限隔則易守若先策定險設伏使敵欲登城縱令登城已登即死敵欲入城引之入城已入即死今夫百里之域內有數步之城敵人登之守城之人便自甘心拜伏乞命於敵者非攻之善乃守之不善也九月按炮於封邱門外大炮數百座皆在門外敵至不收遂令金人所得咸為攻城之具規以為城破亦不在此有善守者假使更資炮數百座亦必無害在於禦炮之術善不善也統制官辛康宗以敵去城逺至城不得放箭此言善也百姓鼓衆擊死已見其因亂素治之術失也敵先採濕木編洞屋以新牛皮蓋其上載之令人運土木填壕以進攻械守城人若得計則城內先施炮碎之亦可用單梢炮放逺至二百七十步下等二百五十步不知京城時倉卒之際用與不用此炮若人不究心則下等二百二十步亦莫能及若能究心則二百七十步過之甚易又有小炮禦近衆其小炮每十人以上不過十五人施致一座亦可以到數十步外不謂小炮不能害物人中四肢則四肢必傷中腰以上則人必死中馬亦然又况大炮每放一炮小炮可放數炮兼小炮不必用石以重三四斤泥丸為之泥丸之利亦博不獨放時易得無窮放去人人必傷死若要摧毁攻械則須用大炮及石金人攻守用大炮蓋欲摧毁城樓欲摧敵人攻械大炮與小炮逺炮齊用縱敵在城外伐木為對樓雲梯火車等攻械可以炮盡金人廣列礧石炮座尋碑石磨蓋石羊虎為炮欲攻之所列炮座百餘飛石如雨擊守城之卒死傷者日亦不下一二十人此非攻城之能蓋守禦官一時之失計耳茍守禦官得計止令卒近女墻頭坐城外炮來髙則於女頭墻上過低則打中女墻頭擊炮在外無緣中人一卒不至於死傷日不下一二十人者惟女墻頭稍加髙厚則全女墻矣又須用造髙木排一丈長一丈濶一丈上下外直裏斜外密裏稀洞子外密處以大麻繩橫編如竹笆相似以備炮石衆多攻壞女墻頭即於兩邉連進洞子向前以代女墻頭若此則炮石縱大至多亦無能損壞間有損者即逐旋抽換假令止如此捍禦則炮石亦何能害人已可必得無虞也敵以雲梯對樓攻東水門其間捍禦有設車樓獲勝者固甚善也又恐人在車樓之上愈招矢石矣又聞守禦官亦以禦對樓雲梯至每以木衝倒仆死者無數此亦竒策然持撞木人與對樓上人相對不免互相殺亦非全勝金人填壕樓過壕攻城下列炮二百餘所七稍炮可施五十斤石散星炮每座可施炮石數塊炮石並發又以強弩千餘助之城上矢石如雨使守禦不能存立然後推對樓使登城每對樓上載兵八十人一對樓得城則引衆兵上此金人攻城之方也其大炮數多矢石齊發只前説女墻頭次備以洞子皆可以隔盡對樓登城每一對樓果能載兵八十人樓上廣不過二丈立當得幾人與守城人接敵者不過十四人而已假令八十人盡角力設施五對樓止四百人此外必無使兵亦無竒兵樓髙須及五丈乘髙而已其迹亦自危甚自履危地來與城上守城人接戰勝負人可以自決若守城者如此法不勝則交戰於平野之地不知其敗若何况對樓於填壕上惟可以直退必不能如城下橫行假使有千對樓所占地步數亦不多不獨接戰可以必勝縱兵上城獲全者術亦多矣不思敵亦多矣敵用雲梯上要登每座雲梯須十餘人可以負荷到城禦之亦難向前來縱不禦之使敵倚城登梯上至城頭少能不死者何以致之於死女墻頭裏雀臺上靠墻頭排杈木每空濶三四寸一根通度槍刀向上髙出女頭城五六尺敵至女墻頭上必為排杈木隔至背後乘空守禦人於木空中施鎗刀擊刺無不下者下而不死者鮮矣閏二月二十四日再推對樓五座盛矢石來以竿沖倒三座城上卒爭持草以燒之對樓木多而草盛火熾南風遂引燒城上樓子三座對樓既倒在城外必不能却回亦不能再起自是堵住敵人攻械來路可以置而不用燒者失也縱不引燒城樓上燒了敵樓子亦是城上人自持草火與敵燒開再進攻械來路雖然此事已失若守禦官别有守捍之具造城樓骨格欲於舊處安置者以理度之自是敵心不容矢石必倍守禦官若能令人依前説造洞子於闕樓子處兩頭連珠並進不終日決可蔽合代摧女墻頭以隔女墻頭矢石雖愈倍於前亦必無害次於燒了城樓子兩頭措置深埋排杈木以防敵急登城上分兵兩向次打城裏從下斜築向上至城面外垠向下陡峻次於城裏腳下取土為深濠三五丈築月城圍之使敵乘對樓到城如不於對樓上城却回則已若上城必自立不得到內濠內無不死者如此一銼敵必罷攻退兵不期守禦之於此一失以致城陷重念國家之難豈不痛哉攻守之械害物最重其勢可畏者莫甚於炮然而亦全在人用若攻城人能用而守城人不能用之則攻城人可以施其能若守城人能用則攻城人能者亦難施設竊聞金人用炮攻城京城守禦人亦嘗用炮城面不濶必然難安大炮亦難容數多雖有炮臺而地步不甚廣又炮才欲施放敵人在外先見必須以衆炮來擊又城上炮亦在髙處自然招城外敵人用炮可以直指而擊之以此觀之守禦之人可謂不能用炮也眀矣假令當時於城裏腳下立炮仍每座炮前埋立木為衣敵人在外不見立炮所在雖能有用炮者何能施設或人以謂炮在城裏炮手不能見得城外事無由取的每座炮則用一人於城上專管裏炮稍與外物相對即令施設少偏却令炮手少那却上大偏則就令拽炮人擡轉炮坐放過則令減人或用炮稍大者不及則令添人或令炮稍小者照料得一炮打中餘炮少有不中又城裏立炮可置數多守禦人用炮若能如此雖敵人用炮何能為也築城之計城面上必作女墻頭中間立狗腳木一條每女墻頭中挂答篾籬惟可以隔遮弓箭弩弓炮石則難以遮隔若改作平頭墻不用篾籬只於近下留品字方空眼與女頭相似亦甚濟用或問何以備禦城外腳下自有馬面墻兩邉皆見城外腳下於墻上墜下害敵之物敵人初到城下觀其攻械勢恐難遏宜便於城裏腳下取土為深濶裏壕壕外去壕數丈再築裏城一重對舊城門更不作門却於新築下城緣裏壕入二三里地新城上開門使人入大城直行不得須于裏壕垠上新城腳下繚繞三二里地方始入門若此則假使敵善填壕止不過填外壕必不能填得裏壕敵若由門入城須行新城腳下裏壕垠上新城上人入直下臨敵何物不可施用正是敵死地必不敢入既由正門入城尚不敢豈肯用命打城只如此為備敵兵至多攻城百種誠可談笑以待之又况京都舊城亦自可守若遂措置便可使勢如金湯有不可犯之理兼京城之內軍兵百姓金銀粟帛計以億兆之數亦莫能盡若能竭力修作不獨添此一城一壕可不日而成假使添築壕數重人亦不勞而辦重城既備然後招敵使入城議事彼若見之必不攻而自退俗諺云求人不如求已古人云上策莫如自治又事貴制人不貴制於人皆此之謂也京城周圍地約一百二十里聞當時敵在城外諸門多閉有以土塞者止開三兩門通人出入如此乃是自塞生路而為敵生路也其為守之計不獨大啓諸門仍於兩門之間更開三兩門使周圍有門數十座齊開於城內運土木出外填壕作路使戰出入無至自礙城上覘望敵人空隙稍有便處即遣兵擊殺或夜出兵使敵在外所備處多晝夜備戰無有休息彼自不能久攻兼既城內創開城門自運土填壕欲為出兵計敵在外填壕欲為入計不攻自破所以敢自創開城門出填壕者非謂其敵兵可欺蓋恃其自於城內設險已備引敵入城而死耳晉王浚遣都護王昌及鮮卑假就六眷末柸等部五萬之衆以討石勒諸將皆勸勒固守以疲冦獨張賔孫萇以謂可速鑿北壘為突門二十餘道勒即以萇為攻戰都督造􅊳門於北城鮮卑入城北壘勒俟其陳未定躬率將士鼓噪於城上會孫萇突諸門伏兵俱出擊之生擒末柸等衆皆奔散萇乘勝追擊橫尸三十餘里獲鎧甲五千匹此乃守中有攻可謂善守城者也後之守城者何憚而不法歟州郡城池之制人皆以為盡善城有敵樓而金人用火炮摧擊城外有壕而金人用洞子填壘城髙數丈而金人用天橋鵝車對樓慢道雲梯等攻具登城據其城池之制可以自謂堅固前後所未有奈何金人攻械雄傑亦前古所未有故事貴乎仍舊而人憚於改作皆不可必者古人所謂利不百者不變法功不十者不易器以今城池之制觀之雖然利不至於百而功不至於十其間有須更改者不可不更改也自古聖人之法未嘗有一定之制可則因否則革為今之計如敵樓者不可仍舊制也宜於馬面上築髙厚墻下留品字方及經尺空眼以備覘望及施設鎗路墻裏近下以細木蓋一兩架瓦棚可令守禦避寒暑風雨屋墻裏墻皆低下則炮雖在外數多施設千萬悉莫能及又壕上作橋橋中作弔橋時暫隔敵則可若出兵則不能無礙宜為弔橋兵出入俱利城門宜迂回曲折移向裏百餘步置不獨敵矢石不及其舊門作樓處行入一步向裏便是入陷穽何謂陷穽蓋百步內兩壁城上下臨敵人應殺敵之具皆可設施舊門前橫築護門墻髙丈餘兩頭遮過門三二丈城門啓閉人馬出入壕外人皆不見孰敢窺伺城外腳下去城二丈臨壕垠上宜築髙厚羊馬墻髙及一丈厚及六尺墻腳下亦築雀頭髙二三丈濶四尺雀臺上於羊馬墻上亦留品字空眼以備覘望望及通槍路一如大墻上女墻頭墻裏雀臺上栽埋排杈木以備敵填平壕塹及破羊馬墻至城腳下則敵與羊馬墻內兩邉受敵頭上大城向下所施矢石即是敵當一面而守城人三面禦之羊馬墻內兵賴羊馬墻遮隔壕外矢石是羊馬墻與大城係是兩城相承齊用使敵人雖破羊馬墻無敢入者故羊馬墻比大城雖甚低薄其捍禦堅守之效不在大城之下又羊馬墻內所置之兵正是披城下寨以留伏兵不知敵人以何術可解若此既有羊馬墻其鹿角可以不用仍於大城上多設暗門以備遣兵於羊馬墻內出入又羊馬墻去大城腳止二丈不令太逺者慮大城上拋擲磚石難過墻內反害墻內人又不令太近者慮其太窄難以回轉長槍又於大城裏城腳下作深濶裏壕壕上向裏度地五七丈可作來往路外築裏城排杈木但多備下敵衝城應敵處用以此設備雖使金人善攻不足畏也墨子宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶為城以械為牒九設攻城之機墨子九拒之公輸般攻械盡墨子守有餘公輸屈曰吾知所以拒我者以見此攻城者宜乎古人以為策之下也夫守城者每見敵人設為一攻械而無策以應之者未有思也規嘗謂孫子曰兵者國之大事死生之地存亡之道不可不察也又以為兵者詭也用無中形詭詐為道故能而示之不能攻其不備出其不意此兵家之勝不可先傳也是以善守者藏於九地之下使敵不知其所攻今夫備禦之策宜乎藏之於身待敵而用不可以先傳之然而有傳之於近而達之於逺有利而無害有得而無失不可不先傳也嗟乎靖康丙午金人以兒戲之具攻打京城守禦者一時失計遂致城拔迄今一紀有餘而金人不思當時幸勝尚以驕氣相矜在規於未知金人攻京城械器施設之前則每日又云金人攻城大炮對樓勢不可當貴顯言之則快然而不敢辨衆人言之則亦不敢痛折今即知其詳則其可不盡剖其所見而言之况規忝冒職當次對濫膺守臣茍有所見庶幾乎破彼姦謀使攻城掠地之心潛消於冥冥之中而致我宋之境無有逺邇若州若縣若守若令之人強者愈自奮懦者知其勉孰畏乎金人之來攻城之械而城城皆可以自保若成我宋山河之壯者不可不論也規竊嘗聞國之利器不可以示人又機事不密則害成而用兵之道以正合以竒勝善出竒者無窮如天地不竭如江海千變萬化孰能窮之今止據金人拔京城當時攻械施設略舉其捍禦之策大概言之至於盡精微致敵之方雖不憚其文繁而有所得真不可示人者况雖欲傳之有不可得而傳之者矣惟在乎守城之人於敵未至則精加思索應變之術預為之備耳區區管見不能自揆輒序於僉言之後三朝北盟會編卷一百三十九
