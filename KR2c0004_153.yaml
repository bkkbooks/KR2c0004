body:
  text: 三朝北盟會編卷一百五十三宋徐夢莘撰炎興下帙起紹興二年十月六日癸巳盡十一月五日戊戌其六曰選宗室之賢才者封建任使之今陛下之族被虜而去者衆矣所存亦無幾何黃潛善鄭慤小人之見本無逺識謂陛下以支子入繼又不緣傳付之命國步方梗恐肺腑之間不無非望之冀考其行事必曽進言恫疑虛喝以恐動聖心故自南都以至淮陽誅竄之刑疑忌之意相尋繼見雖其罪戾或自貽戚然豈盡出治親齊家之美意哉殆非所以鞏固基圖紹延佐命之道也為今之計宜于同姓不問親疏選擇賢才布之內外廣加任使其望實傑然尤出衆人之上者陛下宜留之宿衛夾輔王室以慰祖宗在天之靈以續國家如線之緒使仇敵知趙氏之在中國者尚如此其衆既失復得者非獨陛下一人而已則其撲炎火之橫心立異姓之逆圖庶其少息乎其七日存紀綱以立國體夫一君子進衆小人未必退一小人進則衆君子退矣勢不兩立而于君子獨難蓋其道固如此仁宗皇帝在位最久得君子最多而小人亦時見用然罪著則斥之君子亦或見廢然忠顯則收之故其成當時之功貽後人之輔者皆君子也至王安石則不然斥絶君子一去而不返崇信小人一任而不改故其敗當時之政為後世之害者皆小人也仁宗皇帝所養君子既久且逺日以消亡矣王安石所用之小人方新而近蕃息未艾也所以誤國破家至毒至烈不知己時然則陛下求君子而用之不愛爵賞以待其人豈非甚不易得乎君子未多時而已無堪敗事顯著之小人稍稍類聚未至則召之惟恐其不來既至則用之惟恐其不速陛下土地金帛能有幾何豈堪此輩大言輕用盡輸之敵國耶將以汲引豪傑延致英雄是猶却行而求前北轅而適越也夫以賢治不肖此治平以前陛下之家法以不肖治賢此熙寧以後陛下之家戒矧今日否塞之氣充牣于中原隂長之滋勃興于強敵非得希世異才上下內外參任迭用泰何由復否何由傾乎此存紀綱之一事也右文左武者有國不易之道也漢髙祖用韓信彭越不以加于蕭何漢光武用賈復耿弇不以加于鄧禹劉備用關羽張飛不以加于諸葛亮唐太宗用李靖李績不以加于房杜非獨其禮之等降不同其誠心所以待遇之意亦異今未有巨賢碩德立乎朝廷以將運籌指蹤之功陛下所深恃以為爪牙者惟三四庸將耳夫此三四人以近時論之曾不足以當种師道之役何况古昔名將乎而偃蹇龎然嘗負重寄使平冦盜尚或未能豈敢望其向金人發一矢哉自愧無以稱職則大言詭論以上欺睿聽慢辭倨禮以下視朝士謂今日禍亂皆文臣所致耳敵人方強不可不避乘時而動又不能節制其兵動則潰潰則盜盜則招招則官反復循環無有窮己其為國家之害豈淺淺哉願陛下委大臣以腹心遇近臣以禮貌天下懷才自負之人必願立乎左右緩急之際必有能為陛下竭忠盡節不愧古人者豈皆如臣等輩伈伈俔俔下心低首不能為朝廷輕重者哉忝奉內朝班綴之列欲求近侍如汲黯之氣折淮南誠未多得羸馬敝輿惴惴然于長戟大劒之中卒伍賊人皆得以惡聲誰何之不敢正色忤視少拂其氣從臣如此况其下者乎唐制監察御史秩七品夫祿至卑也然銜命出使則節度使具􅐤鞬戎服郊迎本朝郎官出使序位在轉運之上凡此蓋欲尊重天朝習民于上下之分也故事宰相坐待漏院三衙軍官于簾外倒杖聲喏而退今見在分庭抗禮矣推此類非一日長而不已陛下不為之别異表著是自削堂陛無復等威亦將何所不至哉此存紀綱之二事也治天下者必取篤實躬行之士而去浮華輕薄之人所以美教化善風俗本朝自熙寧以前皆守此道王安石以佛老之似亂周孔絶滅史學唱説虛無以同天下之習其習既同于今五十年士以能談説相髙不復見諸行事曰此粗迹耳不足道也其或蹈規矩守廉隅稍異于衆者則羣議而聚罵之以為怪物繆人此浮華輕薄之為害也夫欲變風化俗惟係上所好惡陛下力行孝弟則天下為孝弟者出矣陛下崇尚名節則天下守名節者出矣故今日正當賞廉白而黜貪汚崇行義而斥奔競旌能實而懲妄誕貴忠厚而杜殘刻以變風俗茍反此道頽弊日甚必至顛覆而後已至若文詞之麗言語之工倒置是非移易白黑誠不宜任用以為浮薄之戒也靖康二年顔博文諛佞張邦昌則曰非湯武之干戈同堯舜之禪遜及為邦昌上表請罪則曰仲尼從佛肸之召本為興周紀信乘漢王之車固將誑楚博文近臣能文之士也其操術反覆如此陛下冝推類而察之以陟降多士此存紀綱之三事也法度者治天下之器號令者行法度之具信令者出號令之實孔子曰自古皆有死民無信不立聖人重信至于易死疑若太過特守法度固結民心非信不可也真宗澶淵之盟契丹守之百二十年不敢輕動宣和宰相王黼一日敗盟舉兵取誓書還之天章閣天地鬼神照臨重誓自我背之遂使金人得以藉口夫金人何憾于我哉皆契丹教之假手借兵以報中國之怨爾失信之禍一至于此孔子之言良不為過此紀綱之四事也臣稟賦愚下無以踰人然夙夕思之得此七䇿剔為二十條于當世之務雖不能盡亦可見大略矣惟陛下動心加慮反覆而考焉以為可行則至誠惻怛而速圖之日月逝矣嵗不我與機事之來間不容髮往昔雖不可追然不可謂無可追者而遂己也謂今日難于前日安知後日又不難于今日乎天豈勝人大福不再深可憂懼今年之春雷震大雪白虹貫日中冇黑子錢塘之禍實先示象恭惟上天之仁眷顧陛下懇懇至厚陛下出于危難側身怨艾親近書史引對多士減撤玩好躬親庶政亦非復維揚之比臣民共知不可誣矣然任至重者力必強責至大者憂必深天下萬姓以二帝之故望陛下者非止如是而已也乃二月金星犯大火芒怒赫然九月朔日有食之車駕復有預防之行明堂遂虛陽德不競錢塘受辱之地豈可再擁六飛縣名柏仁髙祖不宿若遂遊會稽幸三衢則地形窮僻扈衛勞攘貢賦不通財用益窘道路艱阻朝覲益稀郵置幽深命令益隔人知陛下無復中興之志威權損削無可希望投戈四逸孰能知之唐莊宗末年之事可不畏哉惟有如臣前陳思迎父兄誓報仇敵奮發強厲有進無退非怯懦畏避之所能濟也不然而怙恃天命之不庸釋是猶不耕于田枵腹以待嘉禾之旅生不績其麻露體以待野蠶之成繭事理之必無者也又惟斯民戴宋無已者徒以祖宗德澤深厚之故雖甚塗炭猶未瓦解猶未反叛然以比來巡幸所過觀之道傍里縣之民一切空盡以避兵卒甚者田疇荒萊室廬破毁生聚不保滿目蕭條殊非來蘇望旱之美傳示四方何以彰德萬一淮泗有警敵騎羣然俱渡大江陛下又將深尋幽逺則回顧州縣復為虛邑必曰君王尚且畏辟何以責我守城民心觀此安能久忍而無變亂若不望風呼號以事敵人則必推擇賢能以自保治陳勝吳廣因民不忍而劉項乘之秦遂滅亡者蓋本于此今宋祚之再興在陛下其遂陵遲不振亦在陛下天下記之野史書之善惡榮辱之傳亦猶今之視昔夫湯以七十里而有天下楚以七千里而為仇人役彼荀卿所以悲而笑之可不鑒乎昔宗澤留守京師一老從官爾然以至誠鼓動羣盜北連懷衛之民誓與同迎二帝皆相聽許尅期而應者無慮數十萬人不幸澤死其志不就復為潛善伯彥所深嫉故無以澤所謀達宸聽者以此知人心未厭二帝之德况于陛下身為子弟誠欲北向而有為臣將見鋤耰優于長煆奮臂威于甲兵舉四海為陛下之用矣或聞宇文虛中踵邦昌劉豫受偽命專制山東若陛下親總六師遣一介之使往諭至意開示大義許以茅土資其兵力彼之順命猶反覆手皆非甚難獨在陛下斷與不斷為與不為爾夏國事宜張浚已行措置得其聽信稍舒西顧之憂則關中尚可經營不至遽失淮南荆襄藩蔽接連山東合從掣肘之患則金人所守者數千里之地兵勢必分力不得合批亢搗虛攻其不備多方以誤之不厭不倦以十年為期陛下不能掃除妖氛一清國步修上京之廟貌都鞏洛之神臯逺迓父兄歸安鳳闕再修儀物永固龍圖陛下于此時憂憤方已儼然南面稱宋中興永永萬年欣懷無斁其與惕息奔走忍恥臨危有如今日豈不萬萬相絶哉臣本踈外之蹤無所知名誤蒙殊異重惟職司注記掌書言動喪亂已來典籍廢缺官業不舉素餐是愧况冦仇未殄強敵慿陵致陛下鑾駕倣徨百姓未知死所臣子之義有殞無辭有知不言有言不盡茍非畏禍即是欺君震怛于中不能自已戅愚抵首理合誅夷寬仁如天恃以無恐茍或其言可采有補大猷尺寸之功垂名竹帛是古人所榮微臣之至願也伏惟陛下留神察而赦之幸甚孟庾領姚榮兵四千往建康府罷劉紹先兵以為福州兵馬鈐轄劉紹先知江州也朱勝非江州安置紹先不甚禮之勝非銜之至是勝非復拜相乃短紹先于上前移紹先為沿淮防遏使紹先至建康而江東安撫大使李光都督府參謀傅嵩卿見紹先來索錢糧不喜皆奏其非乃召赴行在分其兵𨽻劉光世楊沂中以紹先為福州兵馬鈐轄罷王冦趙琦軍罷王冦趙琦以其軍分𨽻張浚楊沂中知楚州祝友叛附于劉豫通判劉晏知楚州軍州事偽齊京西路提點刑獄公事牛臯來降十一月韓世忠來朝五日戊戌詔求能還兩宮之人詔曰朕以眇末獲承至尊五年于兹天未悔禍父兄逺狩嵗月寖深雖禱祝而求不忘于寤寐而祈請之使莫效于精誠引領瞻望心焉如疚日者于艱危之際稱秩元祀蓋以溫凊急難之念請命于皇天后土及我祖宗夙夜祗栗以候降監載念國家百七十年之涵養豈無忠義感發懷憤善謀之士如漢侯生者慰朕焦勞茍鑾馭之可還詎尋常之足報應四方有為謀䇿能還兩宮者實封以聞果行有效當以王爵賞之播告天下明知朕意廬州壽春府鎮撫使王享欲附劉豫巨師古擒送行在三朝北盟會編卷一百五十三
