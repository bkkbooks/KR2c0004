body:
  text: 三朝北盟㑹編卷一百六十六宋徐夢莘撰炎興下帙起紹興五年正月己巳盡二月十六日庚寅紹興五年正月己巳朔車駕駐蹕平江府日食求直言趙榮退兵濠州金人與僞齊之兵皆退過淮北也亦遣人報濠州趙榮退兵乙巳榮率北軍及投拜官魏進全家去既出門市人尚未知少頃提轄丁懷輩四人欲作亂先開甲仗庫取器械時榮去未逺而悔曰吾棄城而來無知州以主管州事安得不亂乃以衙兵復入城則懷等已執兵仗矣懷聞榮復至走避得免榮遂斬其餘三人令梟于市榮令録事參軍楊壽亨權知軍州事然後榮引衆去榮在濠州月餘城中皆不擾及榮既去軍人不便壽亨之政遂奪州印請兵馬都監孫奕遂權知軍州事是時冦宏在平江得㫖已依舊知濠州朝廷以壽亨既權州則變不宜從軍兵之代壽亨乃授奕徽州監酒不釐務十一月乙卯知樞密院事張俊自建康府還行在十三日丁巳以金人退軍曲赦廬光濠州壽春府朕以眇質獲承至尊念國家積纍之基遭外敵侵擾之患兩宫逺狩尚虛歸格之儀萬姓同憂未覩升平之日浩若涉川而思濟恍如置器之求安常未明而求衣每側席而思治朕誠不足以感移天意德不足以綏靖亂源致彼叛臣乘豫厄運始攘齊地旋據都城未厭鴟張之謀更懷梟噬之惡頻挾敵勢來犯邊陲直渡淮泗將窺江滸自古滔天之巨盜亦知逆順之所存未聞今日之窮凶不顧人神之共怒所賴諸將協力六師爭先奮揚兵威敢當斬獲遂令羣穢知有天刑雖强鄰偶逭於天誅而匹馬莫還於敵境載循不道深惻於心俾執干戈皆朕中原之赤子重為驅役亦有本朝之舊臣迫彼暴戾之情冒兹鋒鏑之苦繇豫不德使至於斯自初覽於捷書即首頒於詔㫖殺死者盡從於埋葬俘降者悉處之便安重傷而莫能自存撫以醫藥之費願歸而無所為命給其道途之資申戒官司務存優借庶知朕興懷於兼愛本非得已而用兵重念生靈久罹冦擾繹騷連于都邑蹂踐遍於田園雖氛祲之已清然瘡痍之未起困於斯難嗟爾無辜宜錫茂恩以蘇疲俗於戲乘時克亂可見皇天悔禍之心發號施仁實推列聖保邦之澤庶迎善氣以格昌期咨爾羣倫體豫至意金國主完顔亶立神麓記曰烏竒邁病其子宗盤是金主之元子合為儲嗣鄂博宗幹稱係是太祖武元長子合斷元約作儲君尼堪宗維稱於兄弟最年長功髙合當其位烏竒邁不能與奪者纍日有英格太師幼子烏頁瑪完顔受師於本朝主客員外郎范正圖略通文義奏太宗曰臣請為籌之初太祖約稱元謀弟兄輪足却令太祖子孫為君盟言猶在耳所有太祖正室慈惠皇后親生男勝額早卒有嫡孫赫嚕可稱安班貝勒當以為儲見年一十五嵗矣尼堪烏舍利於幼小易制宗幹係伯父妻其母如己子也遂共贊成其事是故除宗盤為呼嚕貝勒乃尚書令除宗幹為古倫貝勒乃録尚書序除宗維為伊喇貝勒乃丞相遂遷烏頁瑪為左丞以賞之又曰金人初元謀伐遼十弟兄阿固達為謀首同叔英格兄烏魯斯阿密貝勒色實愛實貝勒阿嚕棟摩并們圖琿實古爾貝勒薩哈尼堪父也德特貝勒幹魯貝勒邁嘉努按班貝勒舍音輪作君主至天會間餘人皆死唯有太宰安班貝勒舍音稱皇太弟諸君常欲盡坑南人烏竒邁不從其請緣金河春水泛漲浸沒宫室刷夫數萬改移河漕離其傍側未及畢工因病身死遂立大祖之嫡孫松漠記聞曰阿古達正室嫡子勝額勝額生金主亶勝額死其妻為古倫所收故金主養於古倫家及烏竒邁卒其子宋國王與古倫尼堪爭立以金主為嫡遂立之節要曰亶立置三省六部改易官制升所居曰㑹寧府建為上京封左副元帥尼堪晉國王領三省事除元帥府右監軍烏舍尚書右丞相尼堪烏舍乃亶所忌者也故以相位易其兵柄耳然二帥皆傑黠之魁而亶遽能易其兵柄者何哉蓋二帥于四年夏自白水治入見金主烏竒邁值劉豫有冦江之請退居本土故至是亶能徙而易之加之二帥在燕雲則有衆在本土止匹夫耳雖欲抗之而不可得也封先金主烏竒邁長子宗盤宋國王領三省事自阿古逹之開國與約弟烏竒邁子孫互相傳位故阿古逹在之時以烏竒邁為安班貝勒後烏竒邁繼位故復以阿古逹之長孫亶為安班貝勒至是亶既得位于義當復除烏竒邁之長孫宗盤為安班貝勒而擅改官制以三公之位易宗盤儲二之除是致宗盤失望後國變生也除知燕京樞密院事韓企先尚書右丞相除山西路兵馬都部署留守大同府尹髙慶裔尚書右丞相除前河東南路兵馬都總管平陽府尹蕭慶尚尚書右丞慶裔與慶尚皆尼堪之腹心也故置之于內不欲用於外封鄂勒歡冀國王除左副元帥逹蘭魯國王除右副元帥烏珠瀋王除左監軍為陜西路經略使薩里罕右監軍駐於雲中又曰初金人邦域尚無城郭星散而居金主完顔晟常浴於河牧於野其為軍草創斯可見矣蓋金人初起阿古達之徒為君也尼堪之徒為臣也名有君臣之稱禮嚴尊卑之别樂則同享財則同用至于舍屋車馬衣服飲食之類俱無異焉金主所獨享惟一殿名曰乾元殿餘於所居四外栽柳行以作禁圍而已其殿也繞壁盡置大炕平居無事則鎖之或開之則與臣下雜坐於炕其妃后躬侍飲食或金主復來臣下之家君臣宴然之際携手握臂置腹推心至於同歌共舞莫分尊卑情通心一各無覬覦之意焉今金主完顔亶也自童稚時金人已得中原得燕人韓昉及中國儒士教之其亶之學也雖不能明經博古而稍解賦詩翰雅歌儒服分茶焚香奕棋戰象徒祖宗之舊習耳由是則與舊大功臣君臣之道殊不相合渠視舊大功臣則曰無知之輩也舊大功臣視渠則曰宛然一漢家少年子也既如是也欲上下同心不亦難乎又曰襲位以來左右諸儒日進諂諛教之宫室之壯服御之美妃嬪之盛燕樂之侈乘輿之貴禁衛之嚴禮儀之尊府庫之限以盡中國為君之道今亶出則清道警蹕入則端居九重舊大功臣非性道不相合仍非時莫得見瞻望墀階洞分霄壤矣金國聞見録曰天眷二年奏請定臣制劄子竊以設官分職創制立法者乃帝王之能事而不可闕者也在昔致治之主靡不皆然及世之衰也侵冒放廢官無常守事與言戾實由名喪至於不可復振逮聖人之作也剗弊救失乘時變通致治之具然後煥然一新九辨復貫知言之選其此之謂矣太祖皇帝聖武經啓之初度數曽不遑暇大宗皇帝嗣位之十二載也威德暢合萬里同風聰明自天不凝於物下明詔建官正名欲垂範於將來以為民極聖謨宏逺可舉而行克成厥終正在今日伏惟皇帝陛下性孝得欽奉先猷爰命有司用精詳訂臣等謹按當唐之治朝品位爵秩考核選舉其流號為精密尚慮拘牽故逺自開元所記降及遼宋之傳參用講求有便於今者不必泥古取正於法者亦無循習今先定到官號品次職守上進御府以塵乙覽恭俟聖斷曲加是正言順事成名正實舉興化阜民於是乎在凡新書未載並乞姑仍舊貫除用討論繼此奏請臣等顧惟虛薄講究不能及逺以塞明命是懼儻涓埃有取伏乞先次頒降施行詔曰朕聞可則循否則革事不憚於改為言之易成之難政或譏於欲速審以後舉示將不刋爰有先皇已頒明命順考古道作新斯人欲端本於朝廷首建官于臺省豈止百司之職守必也正名是將一代之典章無乎不在能事未畢眇躬嗣承懼墜先猷惕增夕厲免圖繼述申命講求雖曰法唐宜後先之一暌至于因夏固損益之殊途務折衷以適時令於今而纍嵗庶同乃繹僅有成規掇所先行用敷衆聽作室肯構第遵成法之良若網在綱庶弭有條之紊自余欵備繼此施陳已革乃孚行取四時之信所由式治揭為萬世之常凡在見聞共思遵守翰林學士韓昉撰詔書曰皇祖有訓非繼體者所敢忘聖人無心每立事於不得已朕丕承洪緒一紀於兹扺適先猷百為故在念兹朝廷之上其猶草昧之初比以大臣力陳懇奏謂綱紀以未舉在國家之何觀且名可言而言可行所由帥事蓋變則通而通則久以用裕民宜法古官以開政府正號以責實效著儀而辨等威天有雷風詞命安得不作人皆顔閔印符然後可捐凡此數條皆今急務禮樂之備源流在兹祈以必行斷宜有定仰惟先帝神豈可誣方在天而對越時由易偶若易地則皆然自用載惟殆非相及何必改作蓋當三復於斯言皆曰可行庶將一變而至道乃從所議用創新規維兹故主之風頗尚先民之質惟成於習遽易為難政有所因始宜仍舊漸祈胥效翕致大同凡在遐邇當體朕意其所改創事件宜令尚書省就便從宜施行令宋兖諸王之誅韓昉作詔曰周行管叔之誅漢致燕王之辟兹惟無赦古不為非豈親親之道有所未周以惡惡之心是不可忍朕自惟冲昧猥嗣統臨蓋由文烈之公欲大武元之後得之為正義亦當然不圖骨肉之間有懷蜂蠆之毒皇伯太師宋國王宗盤族聨諸父位冠三師朕始承祧乃繄協力肆登極品兼綰劇權何為失圖以底不類謂為先帝之元子常蓄無君之禍心昵信小人煽為姦黨坐圖問鼎行將弄兵皇叔太傅領三省事兖國王宗雋為國至親與朕同體內懷悖德外縱虛驕肆己之怒專殺以取威擅公之財市恩而惑衆力擯勳舊欲孤朝廷即其所悚濟以同惡皇叔虞王宗英滕王宗偉殿前左副㸃檢罕都㑹寧少尹和色哩郎君實嘉弩千户舒穆嚕古楚等競為禍始舉好亂從逞躁欲以無厭助逆謀之妄作意所非冀獲其必成先將臣其大臣次且危其宗廟造端纍嵗舉事有期早露端倪每存含覆苐嚴禁衛載肅禮文庶見君親之威少安臣子之分蔑然不顧狂甚自如尚賴神明之靈克開社稷之福日者叛人吳十稔心稱亂授首底亡爰致克奔之徒乃窮相結之黨得厥情狀孚於見聞皆由左驗以質成莫敢詭辭而抵讕欲申三省公議豈容不頓一兵羣凶悉殄于今月三日已各伏辜并令有司除屬籍訖自餘詿誤更不躡尋庶示寬容用安反側民畫衣而有犯古猷欽哉豫素服以如喪情可知也天眷二年皇后費摩申氏謝表曰龍衮珠旒端臨天陛玉書金璽榮升椒房恭受以還凌競罔措恭惟道兼天覆明並日升誠意正心基周王之風化制禮作樂煥堯帝之文章俯矜奉事之勞飭遣光華之使溫言奬飭美號重仍顧拜命之甚優慚省躬而莫稱謹當恪遵睿訓益勵肅心庶幾婦道之修仰助人文之化渤海賀正表曰三陽應律載肇於嵗華萬壽稱觴欣逢於元㑹惟受天之祜如日之升布治惟新順夏時而謹始卜年方永邁周厯以乘休臣幸際明昌良深抃頌逺馳信幣用申祝聖之誠仰冀清躬茂集履端之慶夏國賀正表曰斗柄建寅正帝厯更新之旦葭灰飛管屬皇圖正始之辰四序推正一人履慶恭惟化流中外德遍邇遐方熙律之載陽應令候而布惠克凝神于突奧務行政于要荒四表無虞羣黎仰視爰鳳闕届春之早協龍廷展賀之初百辟稱觴用盡輸誠之意萬邦薦祉克呈獻嵗之心臣無任云云大使武功郎沒細好德副使宣德郎季膺等賫表詣闕以聞髙麗賀正表曰帝出乎震方當遂三陽之生王次乎春所以大一統之始覆幬之內歡慶皆均惟中孚應天大有得位所過者化閲衆甫以常心不怒而威覲庶邦之率服茂對佳辰之復備膺諸福之休臣幸際昌期逺居海外上千萬嵗壽曽莫預于臚傳同億兆人心但竊深於善祝云云使朝散大夫衛尉少卿輕車都尉賜紫金袋李仲衍奉表稱賀以聞十六日庚申韓世忠加少保十七日辛酉劉光世少保依前兩鎮節度使充淮南西路宣撫使劉豫揭榜曉諭退軍劉光世韓世忠張俊來朝劉光世韓世忠張俊詔朕自渡江以來志在恢復深惟足食足兵之計夙夜疚懷凡財賦所入未嘗一毫妄費悉用以養兵而已故歷年訓練士卒精强而器械亦皆犀利比之曩昔實不相侔是以去冬敵人之來卒賴卿等極力捍禦遂致遁歸蓋前此所未有也朕甚嘉之然中原未復二聖未還而僭僞之徒方挾彊國之援狡謀日急顧我所以勝之者惟是上下內外合為一家如執私仇乃克有濟儻或各以其職自分彼此日復一日成功實難卿等為國重臣安危所繫諒必察此不待朕言今國用空殫民財耗竭雖有司錙銖積纍而費出之數日以寖廣茍無以繼何以聚人每一念之心常怵惕想卿亦為朕慮及於此也至於差辟官屬保明功賞軍須用度之類更在精核勿至泛濫使賞富而爵祿不私用足而資給不匱則存養事力漸圖進取朕與卿等同享無窮之利顧不美哉布朕此意卿宜悉之二月三日丁丑車駕至平江府張守上疏上在平江府知福州張守屢上疏言敵情上諭輔臣曰張守所陳皆如朕所慮憂國之誠可見也宜即施行且賜詔奬諭既還臨安又賜詔問守曰郤敵之圖善後之計凡今攻戰之利守備之宜綏懷之略措置之方可備具來守上疏其略曰明詔四事臣以為莫急於措置措置茍當則其餘不足為陛下道蓋措置失當則不能守備守備不固則不能攻戰攻戰不勝則不能綏懷臣請言措置之要其一軍旅其二軍食神武中軍當專衛行在而以餘軍分戍三路一軍駐淮東一軍駐淮西一軍駐鄂州或荆南使北至關陜西抵川峽血脉相通號令相聞有唇齒輔車之勢則自江而南可得安枕而卧也今大將握重兵貴極富極溢前無利祿之望退後無誅罰之憂故朝廷之勢日削兵將之權日盛臣謂宜拔擢麾下之將使為統制每將不過五千分布三路朝廷命令徑達其軍諸將既已分屯則所患者錢穀也宜以二浙之粟專供行在而江東之粟以餉淮東淮西之粟以餉淮西荆湖之粟以餉嶽荆南量所用之數責在漕臣歸其餘於行在錢帛亦然然後戒飭諸將不得秋毫侵擾州縣以復業之民户口多寡為諸將殿最嵗終遣大臣為都督使諸路之兵進相援退相保如常山之蛇首尾相應居則可以守禦進則可以攻戰綏懷之略亦在是矣雖聽臣措置大略臣熟計之猶為未也究本原其在陛下內修德而外修政耳召公之告武王曰明王慎德四夷咸賓周詩之頌宣王曰內修其德外修其政修德則不過正心誠意畏天愛民儉于家勤于邦逺聲色屏貨利兢兢業業凡有纍德者無不戒也修政則不過任賢使能信賞必罰絶僥幸裁冗濫謹法度興廉恥凡有以害治者無不去也陛下果斷而力行之何患逺人之不服乎上覽疏大悅劉光世韓世忠張俊辭回軍初劉光世韓世忠張俊來朝上嘉其却敵之功賜賚甚厚服御之物有可豫者亦以豫之光世等受賜皆感泣曰願身率士卒圖復中原以報及辭又命近侍出內金盤尊斚各賜酒一行并以飲器賜之張守加資政殿大學士張守疏陳四事上大悅除資政殿大學士十三日丁亥趙鼎為尚書左僕射同中書門下平章事都督諸路軍馬張俊為尚書右僕射同中書門下平章事都督諸路軍馬張俊制略曰髙明而宏達剛大而直方資兼文武而可以憲萬邦學洞天人而可以佐百聖自敷求於密勿首叶濟於艱難勤勞王家有精貫神明之誓芟夷禍亂有計安社稷之忠知無不為言可底績宣威井絡之野耀武斗樞之庭出入薦更險夷一致望久隆於師尹名大震於羌戎屬北騎之長驅值中原之多故召從閒燕付以經綸牧野以全六師共推於尚父運籌而决千里獨賴於子房方闐旅以時行彼潜兵而宵遁風聲鶴唳遂收不陳之功虎視狼貪迄蹈自焚之禍兹䇿勳於舍爵乃孚號於揚廷正是魁衡拔之鼎鉉宅端揆辨章之任總中機深密之權內則統率百寮以釐常績之熙外則盡護諸將以董戎樞之重行狀曰公既除相與鼎益相勉勵同志協謀以為治之要必以正本澄源為先務誠能陳善閉邪使人君無過舉則國勢奠安敵人自服是以進見之際於塞幸門抑近習尤諄切致意焉嘗奏曰王者以百姓為心修德立政惟務致其在我則大邦畏其力小邦懷其德天下捨我將安歸哉仰惟陛下躬不世之資當行王者之事以大有為正心以正朝廷以正百官以正萬民國勢既隆强鄰自困因書王朴平邊䇿以獻之奏臣昨奉清光竊見陛下於君子小人之分聖意拳拳于此宗社生靈之福也昔唐李德裕言於武宗曰邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如柏特立不倚邪人如藤蘿非附他物不能自起臣嘗類推而言之君子小人見矣大抵不私其身慨然以天下百姓為心此君子也謀身之計甚密而天下百姓之利害我不顧焉此小人也志在於為道不求名而名自歸之此君子也志在于為利掠虛名邀浮譽此小人也其言之剛正不撓無所阿狥此君子也詞氣柔佞切切焉伺候人主之意於眉目顔色之間此小人也樂道人之善惡稱人之惡此君子也人之有善必攻有功必掩人之有過則旁引曲借必欲聞於人主之前此小人也難進易退此君子也叨冒爵祿蔑無廉恥此小人也臣嘗以此而求之君子小人之分庶乎其可以概見矣小人在位則同於己譽之以為君子異于己排之以為小人不顧公議不恤致亂不畏天地鬼神是以自崇觀以來以至今日有異於己者而稱其為君子乎臣以為必無之也彼其專為進身自榮之計故好惡不公以至於亡身亂天下而莫之悔惟陛下親學問節嗜欲清明在躬以昭臨百官則君子小人之情狀又何隱焉上皆嘉納之親征詔朕猥以寡昧屬兹艱虞迫臣民愛戴之誠續正統於將墜痛父兄播遷之難履尊位以何安夙夜以圖䇿慮並不能躬擐甲胄親冒煙塵乘將士欲戰之心慰黎元厭亂之意然以兩宫萬里一别九年覬迎鑾輅之還期遂廷闈之奉故暴虎慿河之怒敵雖逞於凶殘而投鼠忌器之嫌朕寧甘於屈辱是以卑辭重幣遣使通和庶殫孝悌之思冀狥哀恫之請至於土地梗絶生齒流離師徒懷暴露之憂閭里起流離之歎繇朕不德嗟彼何辜仰懷故國之廟祧至于隕涕俯見中原之父老寧不汗顔比得强敵之情稍有休兵之議而叛臣劉豫懼禍及身造為事端間諜和好信强鄰之狂悖率羣騎以憑陵借彼援師倚為威勢凡我赤子脅使征行逆天不道一至于斯警奏既聞神人共憤凡是在列怒髮上衝以謂逆順之理既分勝負之形可見皆願挺身而效死不忍與賊而俱生朕乃下詔總師卜日引道前驅方戒積隂頓開天地鬼神莫不助順將帥輔弼罔不協心今朕此行士氣百倍雖自纂承之後每乖舉措之方尚念祖宗在天之靈共刷國家纍嵗之恥殪彼逆黨成此雋功載惟風霜跋履之勤仍蹈鋒鏑戰爭之苦興言及此無所措躬然而能建非常之功必有不次之賞初詔具在朕不食言咨爾六師咸體至意改效用入資法效用資法一公據二甲頭公據改為進勇副尉甲頭改為進勇校尉秦檜復觀文殿學士李綱復觀文殿大學士葉夢得復資政殿學士路允迪復端明殿學士詔羣臣修政事朕以金人內侮流毒兩淮賴天之靈將相多士戮力同心迄平外患然中原未靜今據一隅九廟阻越莫致蒸嘗之思兩宫逺播尚隔晨昏之養夙夜怵惕靡敢遑寧若涉淵水罔知攸濟公卿大夫師尹百執將何以佐朕新厥德正厥度以開上帝悔禍之衷以副黎民願治之意其各悉意交修不逮同弼成我邦家咨爾有衆宜體至懷上以外敵己遁思與羣臣內修政事乃降是詔三朝北盟㑹編卷一百六十六
