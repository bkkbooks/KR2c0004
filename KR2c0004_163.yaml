body:
  text: 三朝北盟㑹編卷一百六十三宋徐夢莘撰炎興下帙起紹興四年九月十九日乙丑盡其日謹裁書獻于元帥節下某等竊聞自古帝王不得已而用兵一本于仁義而已推仁義之心而行于征伐之際則堅甲利兵乃非凶器伐叛服柔乃非危事克致師中之吉終成保大之功是道也堯舜以是而帝湯武以是而王自兹以降五伯之事崇尚詐力不仁不義無足言者恭惟元帥鍾靈嶽瀆孚秀璇璣英勇絶倫智畧輻輳援整六師征伐四克豐功偉績焜煇鼎彞雖古韓白衞霍之徒方之蔑如也某等不佞比因使命拜伏下風得望履舄欽聞至教且謂大國舉師以仁義為本以生靈為義故自軍師入境禁屠戮止俘囚樵夫牧兒秋毫無犯深仁厚德遐邇悦附是宜頻年以来拓地萬里包括宇宙勲業隆大超今冠古而無與為比也某等相與退而嘆咏仰服大國之仁祗誦元帥之德不能已矣輙敢冐進瞽言伏惟執亊留聽切以大國德澤仁恩丕冐寰宇凡日月所照舟車所通無不沾濡獨江南僻陋趙氏社稷與一方生靈未䝉加惠殆非篤近舉逺一視同仁之義頃者伏䝉大國惻然有存撫敝邑之意許通令命遂䝉丞相都元帥賜以書詞許以立國江南君臣感服至意誓傳子孫不敢忘懐爾後江南以三遣使未獲成命自章誼輩囘即命某等再奉使指于軍前傾布誠悃欲存守見存之地竭偏方不腆之賦嵗嵗貢獻以表事大之禮且二聖復還江表軺車在途遽聞大國舉兵入境江南上下恍然疑懼以謂方伸懇請乃蒙見伐不審何以得罪而至于此某等不敢退緩輙冐萬死﨑嶇險阻天與之幸但得達命於麾下過䝉與進不賜擯絶諄諄誨勅至誠惻怛尤有存亡繼絶之意則江南再造尚有望焉雖然大軍壓境已復踰月使人達命亦再浹旬而未知所處豈兹事體重大詳慮熟計詢謀僉同而後報耶抑有鄰國容心於其間必将激怒大國而不欲終邀惠于敝邑此不可得而知也聞劉麟在右元帥軍不深言切以江南小國越在海隅中間限以齊境凡欲赴訴無路自達固不若鄰邦宻爾上國茍有所言無適不可伏望執事少加察焉抑又聞之古者大國之伐小國也一謂欲其土地二謂欲其臣服今大國逺勤士馬勞費不貲所謂土地即舉而與人而江南之意誠心懇服方且願臣事而不得則是二者皆非大國出師之本意而直以生靈為念則堯舜湯武之用心不是過也某等願早得執事一言歸報江南庶幾速定大計将見在大軍兵不血刃而坐享成功天下生靈早得太平恩沾四表名垂萬世豈不休哉如某不䝉矜貸含怒震雷旌旄所臨如拉枯朽使趙氏社稷寄托無所一方生靈肝腦塗地致大國思澤終不被于遐陬即是某等奉使無状無補家國願先汙斧鉞以報主恩且以為異日奉使之戒重念某等一介之㣲被命此来伏䝉執事假館授餐種種周悉恩遇甚厚心非木石寕不知感以待命之久君憂臣辱食且不遑是用裂眥瀝血披露危懇敢盡布于下執事進退惟命干犯威嚴不勝戰恐之至不宣托聿興投之聿興云未得指揮不敢收即令差人去復郎君聿興云聿興本是宻院令史本朝令史皆以進士為之因元帥行軍被差前去初不與軍中人相識及到此與蕭團練同亊此人極純實可愛遂以至誠相待聿興今来方敢獨自與侍郎團練相見又云自古享國之盛無如唐室本朝目今制度並依唐制衣服官制之類皆是宇文相公共蔡太學并本朝十數人相與評議某等問蔡太學見任答曰任乾文閣待制它兒子蔡松年見在三太子處作令史近来本朝又為於燕山府用一萬錢買一所宅子蔡太學云尤勝于它汴京宅子又云丞相得宇文相公直是喜歡嘗説道得汴京時歡喜尤不如得相公時歡喜如今直是通家徃来時服支賜宅庫里都滿也某等云大國丞相㬠是知人聿興又云昨日元帥書詞㬠好足見忠孝侍郎儒士團練名家似恁地忠孝必有美事某等云忠孝是臣子合做底事某等雖愚昧不敢不勉因叩問行期何日定可得報聿興曰必非晩也又云元帥性似劈竹将来便囘湏是分毫不可逆不如此定是進兵某等云既是大國許從和議亦湏是使江南可以從者若大國故為難從之説則江南何以自處更望少監宛轉相成隂德非細又荅云異日自知二十六日拂明赫嚕令人傳語某等元帥有指揮令奉使即今起發囘去赫嚕聿興云等一行起發聿興與某等馬差近聿興宻與云侍郎團練即囘也如聿興等何時離得塗炭嘆息久之某等遂與使臣軍兵行二里餘見逹蘭擁三百餘騎前来相迎至路次與某等相見譯者首云江南州郡皆是本朝已經畧了當何故後来擅自占據今大兵已到此却又教韓世忠前来掩襲捉将我人去又遣使来和意是如何某等荅曰前来䝉丞相惠書止是説淮南不得屯駐軍馬即不曾見説占據之事江南遂依禀指揮不敢于淮南屯駐人馬所以奉承大國之命不敢有違譯者云只此説話便是反覆既是江南不曽屯駐軍馬却為甚大軍到来韓世忠却在揚州某等荅云韓世忠是淮南宣撫聞得境上有軍馬是他職事不得不自為備今来既是大國之兵必不敢妄動兼使人此来一心只望和議早定如将帥貪功生事使人等豈得預知譯者云旣欲講和湏是至誠不可奸詐兼是些小掩襲不濟事如欲厮打先約定一日兩軍對敵則好我這里只用仁義行兵若一面講和又令人来掩不備如此終恐悮事只恐你江南終被将臣誤事如前面大兵到汴京姚平仲劫寨事可見本朝事體秦檜與張底一一知得未信時語言問他們又云我此中未曽捉得你那里人並不曽殺你那里人捉得我人去亦不要殺却兼它們何罪况大軍不在此某等答云今来大軍壓境更䝉元帥矜察江南别無他意許立和議實為感幸豈肯更敢虚詐不實及胡亂殺戮譯者又云如國書中説得㬠是使人説得亦㬠好只是信慿不得某等荅云江南遣使前来懇大國欲定和議無非出于至誠譯者云我這里軍馬你們想亦見莫只是来窺探虚實否某云大凡欲探刺虚實皆是國勢相敵未測虚實方遣使探刺今大國兵威如此自来所知何待探刺而後知也譯者復云使人所以留滯别無他意但為等候左元帥相見當面議定方得遣囘某等使人来此所賫國書已先納訖見有上大金皇帝表二聖后表丞相元帥物録六封乞留軍前譯者云大金皇帝表留下其餘文字将去物録中物不用得如今厮殺后若我們敗時物也做主不得我們過河去后不知要這些物某等遂止以大金表授之某等又云元帥遣囘使人江南必再遣使来乞一期限譯者云你們自説期限某等云急限半月稍緩二十日譯者云半月后望再有使来不来亦不妨某等云果有使来從甚路来某等取元帥指揮譯者云只是從揚州来又云到江南傳語皇帝相别后㬠是思念冬寒保重某等再三致謝遂授某左元帥一封某等當面看過遂辭而退見馬前一人着褐紵絲戰袍裹頭巾着弓靴鞋疑是吳龢問之果然又見一人年約六十餘嵗騎馬在逹蘭後問之赫嚕云是逹蘭兄聿興云適来元帥指揮不消得前路去遂與某等相别少頃上馬有鉄騎三千餘人隨后聶哷貝勒送行至鎮江府見韓世忠具以所當預聞者語之當日鎮江府差到牽駕人夫即時来舟離鎮江府二十八日夜至常州見張俊亦以敵中人意告之二十九日夜至滸市聞張俊􅋈舟集岸遂徃請見舟中坐語甚久兼亦畧及使指俊云適聞得奉使囘遂欲同詣行在徐思之恐人疑惑如二公到朝廷必自有所處也某見滸市巡檢差到人夫即時解舟至十二月初一日拂明到平江府見趙沈胡三人叙到問趙云且説因甚放過二公来良臣正色曰且容畧叙本末因不顧趙只向沈胡趙退步至坐席沈曰大家且坐方㸃茶皆不語良臣起曰某脱身萬死今欲赴愬于朝廷首先掇怒丞相良臣願就都堂請死趙曰恐鼎不合干預且請參政機宻請二公閤子中説話繪曰適魏郎中對丞相非敢失禮容但備訴艱苦且望丞相優容使畢其説趙曰某和他吃了人多少言語正所謂唾其面使自乾者適来無他如二公勞苦不待言而自知所以如此問欲速知事之要領耳其辭少和乃問曲折看國書而退後省諸從官轉語請相見遂見時王居正唐輝孫近劉岑在焉良臣復厲聲曰某所以奮不顧身止念在廷臣僚皆各有父母妻子獨主上孤立於此如朝廷何良臣輩豈能使人因大慟衆皆愕然且曰良臣必泣訴於上前遂退因見吏部汪思温王純度李元倫金部吳幵皆良臣同舍繪亦吳幵舊同官衆問金兵多少據所見不及二萬兵據剳探及金人説四路有人毎路十萬然皆不曽見時良臣情怒未已汪思温曰不湏如此請平其氣是日午刻有㫖召對内殿上問勞聖語温厚良臣等皆至感泣上問過界事皆如語録對上委曲問敵勢繪曰臣所見自天長至辰州逹蘭人五寨共有二萬人或云三太子四太子劉麟四頭項臣皆不曽見見有戰船三百餘隻大小不一人亦甚精鋭臣聞漢髙祖怒韓王信反欲與匈奴共擊之前後遣使十餘輩皆以謂可擊繼遣婁敬獨以謂不可曰兩國相擊此宜矜夸見所長今徃見羸瘠老弱此必見短必伏兵以争利愚謂不可擊乃械繫婁敬徃卒困于平城臣願陛下勿輕此敵臣又聞張義以為人臣割其主之地以市交偷一時之功而不顧其後公家而成私門臣死不敢為此惟聖主審度事情因時制宜可保萬全上曰卿所論是卿等見逹蘭状貌如何良臣曰臣等素不識之其身長大面㣲赤色如患風疾臣等初見之首言京城下曽侍陛下言以盖房屋為諭上愕然曰尚能記此説是日自索泛後對曰入出堂中再召與沈胡大殿上相見問勞甚厚盖有從官言使人逺歸朝廷如此相待後来何以使人遂有是禮翌日疾作下休致状繼而堂中請良臣問四路之數良臣曰却是副使曽與吳幵説若有問審的當湏奏知豈敢不白知朝廷吳幵王純等以等説譛使人於趙不兩月三人同日告殂疾症若一好事者或以為報應某等制任状先歸告良臣曰陛對時聖語如此是未見宰執之語次日諸公對事必不然宜速為去就良臣曰某已乞從便繼而韓世忠遣壕寨官張杞徃軍前下文字囘遷觀察使嵗暮敵退言章論列馬承家并及魏良臣皆罷又論不渡江人追減恩例并所得恩澤亦有言章皆縁趙鼎初不主和議適使副歸日趙已當軸某既休致而良臣亦乞宫祠而歸其後詳悉更不録焉繪父仲通宣和間蔡攸為宣撫使副日有書言十不可今附于後云五月二十五日拱衛大夫平海軍承宣使兼㢘訪走馬公事王仲通謹齋沐裁書再拜獻于領院少師相公聞北敵為中原患久矣其盛衰强弱未始有常其俗以蓄養為業隨逐水草習于攻戰此天性也中國所以制北方者非尚逺計破其寨落而後為功也備吾之邊疆以禦之而已故甲兵不可不修城邑不可不固糧食不可不充如朝廷前後戒飭邊臣講畫武備常若敵至可謂不恃其不来恃吾有以待之其禦敵之方無善於此某伏覩朝廷亟命樞近大臣及起發諸路兵馬徑趨河北某嘗聞齊桓公與管仲謀伐莒其謀未發而聞于國故曰君子善謀小人善意某雖不知朝廷深謀秘計觀桓公謀伐莒之事可以意得萬一無事則幸矣如或别有措置有不可者十切以承平之日久為極盛之時天子方垂衣拱手享四海之福如覆盂之安萬方無事豈不美歟師旅一動則有北顧之憂處安慮危得不患之一不可也石晉割十六州以事契丹而周世宗尤能不血刃而定三闗况主上睿謀神武王師所向無不克㨗今兩朝通和師出無名二不可也金處逺方長戰於北遼用兵侵奪郡邑幾二十餘州又欲取漢故地獻納朝廷茍使力能平蕩亦異時復與金人為敵國矣是滅一强敵又一强敵且無百年誓約可守能必其衆不犯我哉三不可也北界部落多矣如契丹異人渤海其地皆不毛雖籍内地土境為衣食種養之源一旦收之絶其嵗賂飢寒可立待彼當必争致用兵不已矣天下騷動四不可也北道數千里無險要可恃皆平原廣野用衆之地寡固不可以敵衆今逐路戰卒各不過數萬人彼若傾國應者勝澶淵之後侵削之患安可忘之五不可也當熙豐之朝天下豐富府庫餘財貫朽莫校太倉之粟陳陳相因神宗皇帝函容未欲輕舉者欲先靈武以大河為界斷匈奴右臂今靈武尚在西為脣齒之國得不助之乎攻之則理宜必救救之則腹背受敵六不可也夏國多用漢人劉文珪計䇿嘗有意深入因糧擣虚以快其欲今以闗陜諸路精兵備北則于國為失䇿於西則大為可慮重此忽彼七不可也聚人曰財雖有金城湯池非粟不守如賦不足用以天下之財轉給為不難至於穀粟匱乏豈容倉卒而能就也盖聞各邊儲蓄不廣千里饋糧士有饑色八不可也生齒繁夥民鮮積聚嵗有水旱則流離不可勝計國家發倉廪以賑之乃能少濟今若小有事宜科配百出使無可辦孰肯束手待斃必轉而為冦攘九不可也兵者凶器不得已而用之愁苦之氣傷隂陽之和老氏所謂大兵之後必有凶年今幸頻年豐稔民力尚未優裕一有荒歉何以救寕十不可也某所論縁利病灼然惟恐未有人為朝廷言者某久在牧守荷國厚恩既有所見黙黙不言是莫大之患也方今領院少師相公為國元老乃心王室天頼明哲康濟生人天下大事無大於此某嘗採衆議出入一口但畏禍莫敢出位而言某仰恃某官至誠至忠敢罄拙直惟冀髙明早為天子諄復開陳茍合帝心天下䝉福忠孝功業爛然光明區區之意實在于此冒凟尊威戰慄之至三朝北盟㑹編一百六十三
