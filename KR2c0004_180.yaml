body:
  text: 三朝北盟㑹編卷一百八十宋徐夢莘撰炎興下帙起紹興七年十月盡十一月十七日己巳上皇帝書闕姓氏臣恭惟陛下詔許直言極諫以救闕失臣窺見近年以來凡有投進類皆牽引虛文無有實效可以施于今者間或有之亦不過州縣常談米鹽細務而已非所以禆補天德而聞所未聞也臣不避斧鉞為陛下一言願陛下赦臣愚而終其說臣自靖康中見陛下於濟南親御鞍馬慨然有恢復之計及陛下即位維揚臣又復從陛下巡幸淮甸是時陛下深處九重上下積習䝉蔽如國之取舍民之利害陛下亦不得聞矣陛下自維揚至今日屢涉于艱險非陛下斷然不疑大臣何預焉臣在草萊亦甚微矣當國家無事時方處學校營甘㫖及國家有事臣之父母不相保者屢矣事至於此臣當奈何臣竊以淮西一事論之去嵗劉豫以金誘三不救之說力攻淮西劉光世遂欲南渡為退保之計茍非張浚親至江上使楊沂中絶敵之後一舉而大破之則江南之民亦危甚矣如光世之罪天下欲共誅之尚賴陛下憐其舊臣不加刑戮而以善罷惜乎朝廷以光世部曲付之吕祉臣在淮東聞光世軍聽吕祉節制有識無識皆稱吕祉必致敗事臣嘗謂酈瓊等所統軍馬其來久矣而光世遇之甚厚非其他大師之比及光世既罷當且令諸軍人馬各自為一頭項仍類加存恤而使之不疑候諸軍稍寧朝廷或别作措置是亦未晚夫何吕祉天資驕傲以尚書自居至于檢舉冒請之類欲為之一新如瓊等驟見窘迫猜忌方在疑似之間朝廷又除張浚為淮西宣撫楊沂中為制置以瓊等屬焉此非瓊等欲叛陛下豈不見巨師古不聽韓世忠節制而甘伏逺竄徐文耻在閻皋之下卒亦叛去如崔增王瓅兩軍人馬自分撥之後上致軍兵大半失所今朝廷遽欲瓊等撥𨽻沂中其叛必矣如瓊等軍馬平日驕惰終不為用陛下勿以瓊等上勞聖慮天下之事有大於此者臣請為陛下言之臣聞英雄之主未嘗不因天下之事而遂成天下之業也自陛下巡幸東南積有年矣而有面諛陛下者曰指日還兩宫指日中興矣陛下豈不念中興之世則必有中興之臣如周之中興則有張仲吉甫方叔召虎之徒漢之中興則有寇恂鄧禹馮異耿弇之徒晉之中興則有王導謝安之徒唐之中興則有李光弼郭子儀之徒陛下以為今日中興之臣誰可以比王謝李郭者哉臣觀張浚區區之心實有是念至于其他大臣又孰肯以天下之責而自任也浚誤于才力有限舉非其人譬如泰山頽而大厦毁又豈一土一木之所能也臣嘗論漢光武起民間驅數千捨耒耜之人一戰而有天下今陛下富有東南帶甲之士不下二十萬又安可同日而語也臣見陛下去嵗親撫六師雖暫留姑蘇而聲勢已振及車駕進發建康陛下屢降指揮令州縣不得搔擾臣觀陛下非不節儉夫何草萊惟見所過州縣經營頓遞等事非數萬緡不能辦集臣恐陛下萬一欲復東幸臨安徒自虛費臣願凡有巡幸去處亦不必預先降㫖亦不須廣修殿宇及排頭之類應職事官所須之物非事涉軍期亦不須隨從車駕仍願今陛下駐蹕建康與淮西止隔一水初恃光世以為藩籬而瓊等既已叛去陛下豈不自危如沂中一軍又豈可為陛下獨當一面也淮西之叛所幸敵人在逺非防秋之時若使瓊等叛在秋冬之間陛下可又不從而東也陛下豈不念金陵雖號六朝建國之地如晉之取吳隋之取陳未有不藉上流之勢故王濬楊素皆能以大舟巨艦蔽江而下也陛下雖曰一軍淮楚一軍盱眙一軍合肥一軍襄漢及有事牽制則諸軍各自保守如襄漢逺在千里之外陛下可保其無虞乎陛下又豈不念襄陽荆門乃吳蜀必爭之地在今日尤為不輕不知陛下亦嘗慮及此否陛下自惟憂戚數下哀痛之詔俾諸將校上下一心共恢大業以臣規之淮泗諸軍上至襄漢但可謹守邉防為浙江藩翰而已故昔人有論諸葛孔明曰棄荆州而尅西蜀吾知其無能為也知劍門之險其守不可出僅可自保猶不足以自治又何足以制中原哉又曰富人必居四通五逹之都使其財布于天下然後收以天下之功今日之事正由此也陛下又豈不念秦漢之都沃壤千里洪河太山直可控扼天下者乎陛下勿謂向者使張浚措置陜西止於如是在今日復將奈何陛下豈不見漢髙帝轉戰敗北未嘗少忘關中故髙帝以是而有天下臣自草萊知天下之勢未嘗不為陛下深思而逺慮也如陛下即位維揚自可徑入關中指揮天下金人豈以東南為心也當時機㑹既失在今日又不能救前日之弊臣實為陛下惜也且如淮西一事長使劉光世為帥則諸軍可以相附今光世實以罪廢而陛下優加恩數倍于衆人而瓊等尚且如此向使光世遽以疾終復將以誰繼之則未必不如今日之叛亡也嗚呼陛下在九重之中又豈知諸將帥臣所統軍馬曾無一言以念及陛下者乎且如泗州之兵事無大小則知有張浚楚州一軍則知有韓世忠襄陽一軍則知有嶽飛殿前一司則知有楊沂中一旦緩急之際人皆各為其主誰復知有陛下者乎故淮西一軍自光世既去之後非特臣為陛下憂自江以南誰不為陛下憂者也今日又何有怪焉蓋古之建國諸侯止以千乘獨天子以萬乘制之雖其間有不庭則又羣起而共滅之嗚呼天下之勢倒持久矣臣在草萊尚為之寒心陛下何以惕然為祖宗之計乎以臣觀諸路帥臣非不欲盡忠竭節以為陛下如世忠自旦至暮訓習軍馬未嘗少衰世忠年已五十勇力之氣人皆憚之諸軍雖有怨嗟之心人亦不敢言之於世忠也由是觀之諸路帥臣使之長安在位則可或其間有一不幸則又何以異於淮西之事乎又况小人之情見利則不能不爭見患則不能不避其害常易成陛下可不思患而預防之乎臣竊惟陛下自即位以來所任宰執至於十八九當時除命一下所謂宰執親戚故舊者不問賢否類皆鼓篋而進其罷也則所謂親戚故舊者亦皆斂服而退當時羣進之人亦不無賢士大夫也夫何朝廷習以為常雖有願留而臺諫亦所不容也臣見陛下所除宰執必自兩制所除兩制必自郎曹卿監所除郎曹卿監必自宰執成就今天下雖有賢如吕望謀如子房智如孔明才如馬周或隱於選調或隱于布衣茍無親戚故舊任宰執則終身淪沒於蓬蓽之中而與草木俱腐矣况使陛下之宰執稍能霽顔以接寒士雖周公吐哺握髮亦不過如斯而已其間縱有所舉不當亦不害為濟濟多士雲積於朝廷也陛下又豈不念凡所除過宰執某人能為陛下辨天下之形勢某人能為陛下立天下之規模某人能為陛下破天下之疑惑某人能為陛下正天下之紀綱當天下無事時所謂宰執不過以東南一時寧靜引中興之說面諛陛下而已及恩數既足親戚故舊皆已成就遂爾力乞宫祠以便安養既退之後又復薦某人於朝為身後之計陛下用之不疑所謂被薦之人復歸恩矣將欲子子孫孫永以為固又誰肯以祖宗境土為意哉嗚呼使上天有靈此曹殄滅久矣臣所閲陛下除宰執惟張浚庶幾吕頥浩次之也如趙鼎雖有大臣之才而無大臣之器至于尚僻學而臨事失措視頥浩又其次也惜乎沈與求有憂世許國之心不能盡其才而死耳浚器識甚逺所患者才不足也向使浚才術兼濟如囚曲端罷劉光世不致為人訕罵而更相短之也浚之孤力無一介為助者陛下自任以天下之責此亦今日之所難矣至于吕祉淮西之敗祉誠罪人然可憐者有是心而才力不逮爾陛下可不念之臣學問疏繆而識不甚明輒欲效區區之誠仰干天聽臣之愚也亦甚矣臣嘗聞昔人有言曰項籍有取天下之志而無取天下之慮曹操有取天下之慮而無取天下之量劉備有取天下之量而無取天下之才惟陛下天錫勇智雖金人亦稱英武又何遽絶關中而無一言以及之也今又以淮西之叛人得而易之陛下可不張其聲勢而預為之計乎臣願陛下諸路軍馬應各置都督一員使諸路帥臣副之如淮西一路願陛下除吕頥浩為都督以張浚副之以楊沂中屬焉詔傅松卿為參謀復以史願為參議何以言之頥浩及浚所謂股肱頥浩臨事有斷松卿詳審而願亦有謀如淮東一路願陛下除孟庾為都督以韓世忠副之詔劉寧止為參謀復以韓求為參議何以言之庾與世忠有湖南福建之舊庾既委曲事情寧止與求勇於敢為如襄陽一路願陛下除秦檜為都督以嶽飛副之詔劉岑為參謀復以蔣粲為參議何以言之檜見任樞密寬而有容岑與粲才術過人喜于立事觀於應變亦善與人同如趙鼎劉光世二人也在大臣中位望尤重願陛下除鼎為川陜都督以光世副之詔折彥質為參贊軍政以王燮馬擴為參謀議官如樊序孟涓之徒皆先朝達人諳曉陜西利害鼎可置之幕府仍以王德為都督將帶光世現存軍馬乘以北風泝流而上願陛下假鼎重權令措置四川賦任便駐劄抑招集陜右流離之民鼎與光世威信素行自可傳檄五路間遣吳玠軍馬出沒僞境又豈止牽制而已庶亦措置關中之一端也昔人有言曰虎方捕鹿羆據其穴而取其子虎安得不置鹿而追之也何以言之陜右乃天下之兵本四川乃陜右之利源自古興王未有不由此而得之也陛下茍或聽臣之言非特荆襄川陜有以為援且將鼓率一路軍馬徑趨河東然後淮西諸軍及襄漢等路約期並進則僞豫首尾不救一戰而天下可復矣嗚呼天下大計陛下自有謀臣如雲又豈以草萊之言而決之也臣竊見明堂大禮在即陛下當乘此機㑹召諸大臣盡赴行在願陛下引漢髙故事親為盟主殺白馬而誓之令張浚書名金石而藏諸宗廟拜浚為大都督以輔陛下願陛下親御鞍馬往來問勞知軍民之疾苦四方之豐歉開達聰明以廣聽納庶使僞豫之情不能探伺陛下之神策也如臣所舉二三大臣充諸路都督非特陛下左右前後得以鄙之而臣亦任鄙之也嗚呼天下之勢既已倒持非陛下除以前任等項人情稍通者為之如其他傲上忽下之徒亦未有能濟者也臣之區區非特願陛下置諸路都督以張其聲勢實欲為陛下廣其人材以宣布陛下之威德又豈僅使諸路軍馬知有陛下而實恐諸路帥臣有一不幸則所統軍馬不致臨時倉皇而無以制之也陛下又豈知某人一軍闕名號曰自在軍也平居無事未嘗閲習其甚至於白晝殺人而奪其財者惟某人某人兩軍韓嶽人馬整肅其失又傷于太嚴至如近下軍兵有請一百食錢米二升半而贍一家四口者日逐漸教或至晚方罷及回本營欲得杯熱水以沃肺腑亦不能得夫何自申牌前後打滅火燭不許復爨其情可知及其所請食錢非獨欲贍數口一月之內仍欲買皮條買磁末買弓絃至于修理弓箭種種費耗不過此一事食錢而已及晚上教其妻刷甲其子積薪縱緣陰雨得少休自又不免修葺營寨此特步人之勞至於馬軍又有甚於此者矣臣願陛下備臣所陳以詔寬之應有軍馬兵請受低小之人仰諸路帥臣開其姓名量其髙下特與增給無使怨嗟之聲聞於道路某人一軍尤無避忌雖統制將官親見無禮惟只隱忍而已比年以來諸路軍馬嘗有全裝數隊而入僞境者往往諸軍互相推避各稱本軍人馬㸃足即無逃亡之人以是將官得以欺蔽統制統制得以欺蔽帥臣帥臣得以欺蔽宰執宰執得以據所申請而欺蔽陛下也至如諸軍出入有攻城破敵之說大率如此上下欺蔽陛下亦無如之何臣願陛下速置諸路都督以通上下之情無使諸軍復有淮西之禍也今年淮西亦宜預為之備如張浚一軍亦不可數數勞動願陛下令浚差撥與兩軍人馬于濠廬之間駐劄以備緩急仍願陛下速遣鼎與光世為川陜之行以張其勢今陛下若以陜右為不可措畫且令淮上諸軍為山東之謀此非臣所以敢言於陛下也以臣觀之假令劉豫北遁盡如所料不知諸軍人馬沿大河一帶復作何如屯駐又復大河南北皆平衍之地目盡千里非中國步人所長若使金人安處河北以我為客利則戰不利則據河為守間遣逰騎以勞我師其間暴露之人不無怨憤當臨敵之際百戰百勝則可萬一少有不利則諸軍散漫而無復南渡矣又况河南乃國家之根本雖曰殘破尚兹富饒陛下復以何人為留守為濟師餽餉之道又安能如保川陜荆襄而無復受敵之患乎臣敢冒萬死以聞陛下臣實恐諸軍馬有不測之禍向陜右之民荏苒汚俗不得為陛下有矣孔子曰無欲速無見小利欲速則不達見小利則大事不成陛下又豈不念六朝之弊區區于江右者哉臣願陛下體淮西一事深思而詳覽焉臣冒犯云云十一月劉錡來朝劉錡方知廬州來朝行在也詔復幸臨安府初降詔幸建康也有以觀天心之向人皆喜上之英斷有恢復中原之志上自建康駐蹕不久㑹有淮西酈瓊之變又張浚自盱眙退軍建康江上事紛紛是時王仲薿有復官之命王㬇為郡右正言辛次膺彈樞密使秦檜妻黨王仲薿王㬇父仲山嘗投拜金人仲薿不當復官㬇不當作郡檜力營救次膺乃併劾之曰是將有䝉蔽之漸時檜議遣使金國請和次膺力言國恥未雪義難講好面陳及上疏者六七㑹親疾丐侍養乃以直祕閣為荆湖南路提刑於是主和與主戰之說不能定人心回惶議者以復幸臨安為是遂降詔候來春復幸浙西嶽飛退軍江州十七日乙巳烏珠執劉麟于武城先是劉豫聞朝廷舉師北征遣馮長寧乞兵于金國以酈瓊率軍降豫勢盛久恐難制欲因出兵而廢豫佯以兵不可出為辭豫請之愈堅達蘭乃謂長寧曰非不欲出兵實以本國用兵以來往無弗捷自有齊國之後動輒不利恐蹈覆車挫我威武必欲出兵須齊國人馬亦聽本國節制所貴號令一而權不分天下可以指麾而定豫與麟父子罔測其謀欣然從命金人遂令具兵甲器械錢糧總數並令調發輦運陳蔡順昌宿亳之間計程知東京無兵乃邀麟單騎與元帥㑹于滑州麟從二百騎以是日至武城金騎張翼圍之數里悉掩而困之三朝北盟㑹編卷一百八十
