body:
  text: 三朝北盟㑹編卷十七宋徐夢莘撰政宣上帙起宣和五年五月二日甲寅盡六月四日乙酉五月二日甲寅童貫蔡攸班師七日己未百官詣文德殿稱賀八日庚申御筆加王黼等王封御筆遼政不綱鄰國侵擾不圖人心之慕義率皆革面以向風朔薊雲燕悉歸輿地勞來還定已奏膚公安華夏之生靈紹祖考之先志所賴廟堂之䇿集此不世之勳當有疇庸以昭異數可依下項王黼除太傅進封楚國公鄭居中除太保仍與一子推恩白時中張邦昌李邦彥趙野各進官二等以上並依例加勳封九日辛酉少師太宰兼門下侍郎慶國公王黼授太傅進封楚國公少師威武軍節度使樞密院事鄭居中授太保進封燕國公太保蔡攸授少師童貫落節鉞仍以太師領樞密院事餘進秩有差御筆太傅三公坐而論道號為三省長官所有王黼已降指揮拜太傅其治事恩數合依太師體例可疾速照㑹遵守施行十一日癸亥太師劔南東川節度使童貫依前太師進封徐豫國公少傅鎮海軍節度使兼侍讀直保和殿充上清保籙宫使河東河北路安撫使十四日丙寅王黼日赴朝參奏事退聚議治事金人阿固達西巡發燕中職官歸國阿固達交燕畢於契丹漢兒內兩府中携劉彥宗出居庸關由雲中府德州路西巡留白水濼度夏欲遣官交還本朝山後州縣且聞天祚北走達勒達經營擒之乃遣左企弓等部所得燕山職官富户東取榆關平灤路以歸遼國平州節度使張覺據平州隂叛金人殺燕京宰相左企弓等張覺者平州義豐人也少第進士建福元年夏遼興軍節度使乃平州偶有兵作過能招安息亂以功權知軍州事燕王死預知遼國必亡盡籍管內丁壯充軍得五萬人馬千匹選將練兵聚糧穀招延士大夫有才者參與謀議潛為一方之偹蕭太后嘗差太子少保時立愛知平州始到任張覺雖外示尊禮而內實不用立愛察其有異志常稱疾不出覺依舊知軍州事㑹金人下燕首問平州事參知政事康公弼曰張覺狂妄寡謀雖有兵數萬皆鄉民器甲不備資糧不給彼何能為宜示之不疑圖之未晚也金人召時立愛赴軍前進加覺臨海軍節度使依舊知平州軍州事將發燕民由平州歸國尼堪謂左企弓曰我欲遣兵三千騎先下平州擒張覺然後行如何企弓輩以為然獨康公弼曰若加兵則是驅平州叛也公弼舊在本州守官上下人情無不通也請單騎一到觀其意而徐圖之遂授金牌馳驛前去見張覺諭金人之意覺曰遼國八路八路已亡獨一平州存敢有非望鄉兵所以未敢解甲者北防蕭幹侵掠故也今軍馬不來殘命何幸聞皆公之力也厚賂而歸報曰彼無足慮遂不興兵改平州為南京加張覺試中書門下平章事判留守事其實欲圖之也阿固達大軍北出居庸追討天祚為事漢官知樞密院事劉彥宗以下隨行五月初燕民入平州境私有號訴于張覺者具言宰相左企弓等更不謀守燕城使吾民遷徙流離不勝其苦今相公臨巨鎮擁强兵盡忠于遼國必使我復歸鄉土而人心亦望於公也覺遂招諸官員將領㑹議皆曰聞天祚兵勢復振見出沒于松漠之南金人所為全軍急歸不少候者契丹為之牽制也若明公勤王唱義奉迎天祚以圖興復先責宰相左企弓等叛降之罪而殺之放燕人歸國則大宋無不接納燕人則平州遂為藩鎮矣假如金人後來加兵內用平州之軍外得大宋之援又何懼焉覺曰此大事也不可草草翰林學士李石智而多謀可遣人邀之密議石既至與之謀而合隂遣將官張謙領軍馬五百騎傳留守令强招宰相左企弓曹勇義樞密使盧仲文參知政事康公弼至灤河西岸聽候差議事官趙祕校就去面疏企弓等十罪天祚播遷夾山不即奉迎者一也勸進皇叔燕王僭號者二也訐君父過惡而降封湘隂王者三也天祚嘗遣知閣有慶前來計議而殺之者四也檄書始至而有迎秦拒湘之議五也不謀守燕而拜降六也臣事金國不顧大義七也根括燕中錢帛取悅金人八也致燕人遷徙而失業九也教金國發兵先下平州十也遂無以對遂縊殺之榜諭燕人留餘戰馬外盡放復業令各安堵如故所有逃户拋下屋宇家産什物之類已為常勝軍占者悉還之燕人患遷得歸皆大悅稱保大二年契丹官秩畫天祚像朝夕朝謁事無大小皆告而後行燕人得歸往往有至京師者上聞燕民之歸詔王安中詹度加恤録士大夫之可用者復百姓田租三年二十九日辛巳童貫蔡攸大奏凱以入告功于廟北征紀實曰二帥告還上御景龍門觀奏凱盡以禁衛諸軍迓之以入上始甚不樂故二帥賞皆薄貫遂致仕蔡攸拜樞密院初二帥以宣撫司羡餘進大珠百萬金四千兩犀玉錢帛稱是號曰土宜上喜之又曰二帥凱還上為御殿受賀禮畢賜宰臣等坐用神宗皇帝下熙河及崇寧下青唐故事解玉帶以賜黼六月一日壬午朔蔡京進賀表表曰師由義動往城于方國以和來不戰而屈舉全燕之故地弔陷敵之遺民戴白垂髫歡呼而倒㦸壺漿簞食充塞而載塗萬國來同一方底定乾坤動色廟社用光中賀惟北有邦實兾之府大禹所别有虞嘗巡粵我造邦之初遂為與國之敵始約兄弟尊至祖孫金繒締交使傳洽至其强弗率僭僞號者二百年有志未遑更聖君之六七作惟昔神考于時元豐分將𨽻方聯民講武閲九軍之師陳建北面之黃旗無釁可乘有訓斯在皇帝陛下以重華而紹帝之事以下武而繼文之聲因其天亡之時成是席卷之勢臣顧惟稚長久誤眷知詩禮之庭屢趨而過軍旅之事蓋未嘗聞察之于談笑杯酌之間付之以疆埸甲兵之事乘其萬舉萬全之㑹授之百發百中之機是惟秉鉞以專征豈可因人而成事山川草木悉歸輿地之圖士女臣民盡效職方之貢此蓋皇帝陛下懋昭大德遹駿先猷人斯效能天實助順揚勵無前之偉績鋪張不世之宏休千載君臣適遇風雲之際一門父子得為勳戚之家鍾邦直行程録曰朝廷詔雄州守臣和詵髙陽帥臣侯益經略邊事邊臣上言以謂敵中衰亂君臣篡奪殘暴假息遊魂疆埸正取亂侮亡之時朝廷以為然大臣王黼力贊其事用兵之禍自此始也是年二月以太師領樞密院事童貫為宣撫司使以蔡攸副之統陜西河東河北京東京西京畿六路軍馬十五萬以擊契丹五月師渡白溝五里契丹以三千騎撓我軍軍亂我師敗績所喪十之一是時國家與契丹盟好百餘年邊防無犬吠之驚耆老白首不聞兵革之音師出無名人不效命人情煩惱中外不安二師帥之罪邊臣以謂聞報不精契丹尚盛未可取也方議班師六月燕主耶律淳以病死朝廷復有兾得之心詔二帥率其兵駐髙陽關以待變再召諸道兵須冬以進九月契丹管押常勝軍馬郭藥師以所領七千人舉涿易二州來降繼而耶律淳之妻太后蕭氏遣使納欵乞數州之地以為南朝外屏二師帥慢罵叱退其使自以謂功在須㬰十月遣大將劉延慶督兵二十萬入燕以應金人之約師行在道猶豫不進自雄州十一程始到蘆溝河二百里契丹以數百騎亂我軍延慶未嘗迎敵中夜輒曳兵而走契丹拔軍追奪殺傷及自相蹂躪死者十二三委弃軍器錢糧金帛不可數訃延慶關西老將偏裨才爾平昔為人所御豈能御人爵位已盛豈肯更效力受命之日已出悖言委任非所宜至是乃敗十二月金人之師度居庸關契丹君臣望風而遁燕民具禮儀以迎金人朝廷遣使增嵗幣比契丹加倍以售燕薊景順五州之地金珠玉帛子女牛馬輦載殆盡明年四月委城而去二師帥提兵十萬以入名曰撫定留半月增陴浚隍振旅而還歸朝幕府計功論賞等第有差原夫自古外蕃與中國迭為盛衰而外蕃之盛未有能如前日之契丹直踰二百年而常與中國抗衡豈以澶淵之盟隆緒之誠根於心後嗣纍世保守堅固不復南牧百餘年間其所活生靈何慮數千百萬隂功豈淺淺豈非天以此佑之乎逮至崇禧世祚垂亡于可取之時而無能取之人二師帥一以閹進一以幸進自少及老立功名取富貴皆以䝉蔽欺罔而得之居內則專機政在外則握重兵是豈知兵者不知紀律不明賞罰每嚴刑重罰以鉗天下之口雖甚顛倒錯謬無敢議其非者童貫唯以一老吏李宗振參决帷幄軍政一以委之幕客拱手偹員而已唯勾當公事官李積中廣東人年七十許以不偶于時凡三十年不赴朝緣大臣薦以特㫖入幕中兩投書于二師帥備言今時用兵得失與金人交通利害異日必為邊患纍數萬言皆切實今日所驗者師帥素不知今古懵然莫知為何等語漫不加省但日事虛文彌縫闕失搜抉奇異為蠱惑之計孰知為天下慮卒以是敗童貫蔡攸以郭藥師來朝北征紀實曰童貫蔡攸既凱還以藥師來藥師之來禮遇甚厚賜以居第賜之媵姬加諸燕犒請觀金明池上特命張水戲若莫春教習者以示之仍命貴戚大臣家更互延之每率其屬皆豫焉遂盡見中國華侈辭歸羣小又將引之入中禁或以謂不可故上特出玉華閣之外後苑之延春小殿見之時盛夏設二大金盆貯氷殿上上御大珠絡縫銷金青紗戰袍藥師陛見頓首殿下流涕而言曰臣在燕中聞趙皇真在天上不謂今日得望天顔臣死榮甚上深褒稱之委以守燕地又謂藥師曰朕且欲託卿事可乎藥師頓首曰臣邊方逺人今日䝉天地大恩已誓效死惟陛下即使蹈湯火冒白創正所甘心粉身碎骨矣不問何事臣藥師必死也上乃曰天祚未了卿為朕經營取之以絶燕人之望于是藥師逡巡色變復奏曰天祚者臣故主也故主亡走臣是以降歸中國今陛下使臣效命萬死于他所不敢辭况臣事陛下猶事故主今使反故主則非臣所以事陛下也唯此一事願付他人乃泣涕雨下上黯然且欲得其心乃解所御珠袍并以金盆賜焉藥師感泣出諭其下曰此非我功汝等力也多寡當共之因剪金盆人均一片于是羣小不虞其詐交口譽之以誤上聽始常勝軍本謂之怨軍在遼時常反覆者而我初不知其詳及來歸我其徒顧深虞我疑之也是以每言及天祚則人人未嘗不變色曰此某等故主也使主在豈敢遽降南朝及故主已亡誓不從女真所以歸投南朝爾上聞是深慮天祚尚在繫燕人心恐一旦復出則常勝軍必解體散從天祚故有此諭實輔佐大臣不能逺思上誤聖朝者此也藥師遂以檢校少保副安中焉政令實出藥師安中但效平時態諂事之驕藥師者此也我又傾意以結之凡良械精伙莫不以往謂若須馬則盡括內官馬委與之藥師揀馬之法作泥潦半里使人不銜轡而馳焉能過則為良馬不然則又退又選大率類此又遣部下商販諸路舟車遍矣又聚天祚昔工作之人為竒巧之物多以玉帶碼瑙器撚金貯珍異以奉權貴下及小璫無不喜者及得其志自擅燕山一路有常勝五萬食糧軍鄉兵號三十萬中國雖有戍兵唯九千人無能為也又藥師及燕人終不改其驕悍亦無如之何時人切比之安祿山因别築第都城增賜美人慰諭令來朝藥師辭以故不至于是罷安中召之還伯氏因薦蔡靖以代之靖有胸襟至則開懷待藥師稍能抑其權藥師亦重靖然終不得其柄也宣和六年秋黼且罷貫復落致仕出撫河東欲擒天祚上因令巡邊密察藥師去就不然則拉之來貫至燕境藥師以數騎出迓貫于易州界再拜帳下貫曰汝今為太尉視兩府與我等矣此禮何也藥師即曰太師父也藥師唯知拜父耳焉知其他貫遂釋然藥師又邀貫視師貫以數隊出郊野則略無人跡藥師乃下馬當貫前以旗一揮于是四山鐡騎耀日莫知其數貫衆皆失色歸而白上謂藥師决能抗金人也當是時雖金人不入中原藥師亦必反反亦中國不能支郭藥師除撿校少保河北燕山府宣撫副使同知燕山府趙良嗣盧益還闕盧益正除兵部尚書趙良嗣除延康殿學士馬擴轉武功大夫和州防禦使二日癸未上以御筆付詹度令密察張覺去就上聞張覺叛金人以御筆付詹度曰金國自燕山遣人詣平州即日復回云張覺領步騎五千壁松亭關鈔其車乘不敢進及聞平州止稱舊府用保大年號故相曹義勇等四人聲言不順南朝亦不歸女真及四月二十七日輒遣兵奪清化縣𣙜鹽院鐡板等物觀此則覺之不歸女真明而所以欵附本朝之意蓋亦未見若不稍與羈縻必為邊患雖未可明示結約要須加撫諭卿可因人諭意然不可泄覺方外連韓慶民等招誘遷閏等州以拒金國成敗固未可知為我之計正當用卞莊刺虎之術坐觀其變以為後圖所慮貪功幸進輩茍希目前輕失女真所當深察遂令覺之婚家王倚者諭之覺遣張興祐來㑹度復奉御筆云營平納欵雖在女真入關之前然其後朝廷纍次計議女真終不見與張覺固嘗臣服金國用其爵號又嘗改為南京矣本朝初與金國通好彼此著誓甚重豈當首違况金國昨在燕京所以不能即討平州者止緣女真處關中而覺外扼榆關又我以重兵壓其境且天祚尚在是以彼姑涵容今女真既已出關他日若自中興府或東京之西討伐平州則蕞爾之州恐未易當况我師既已解嚴天祚復狼狽如此秋深女真歸正是得志之時在我豈當妄有舉措為今之計正合坐觀其變以為後圖然聞覺欲通韓慶民結連四軍併力窺燕則不得不慮理當速示羈縻卿可慎選其才智忠信之人二三輩令密諭覺意許之世襲節度度因興祐歸以上意語之未行間又承御筆聞四軍林牙張覺在居庸關北及平灤州中京集聚止留金國車乘縱還金國所遷燕京人口并意欲為我邊疆之患要須經畫為善後之計議者以四軍林牙嘗為我敵雖欲翻然寧不畏禍張覺久欲歸附以所許不逮藥師未厭其欲遂爾遷延敕詹度密遣人誘致令率衆內附當厚以金爵畀之四日乙酉檢校少保奉武軍節度使同燕山府路安撫使馬步軍副都總管郭藥師檢校少傅三朝北盟㑹編卷十七
