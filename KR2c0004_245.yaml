body:
  text: 三朝北盟㑹編卷二百四十五宋徐夢莘撰炎興下帙起紹興三十一年十一月二十八日丙申盡其日范成大攬轡録曰過盧溝河三十五里至燕山城外燕賓館自館行栁堤緣城過新石橋中以杈子隔馳道從左邊過橋入豐宜門即外城門也兩邊皆短牆有西門東西出通大路有兵寨在牆外玉石橋燕石色如玉石上分三道皆以欄楯隔之雕刻極工中為御路欄以杈子橋四旁皆有玉石柱甚髙兩旁有小亭中有碑也龍津橋入宣陽門金書額兩頭有小四角亭即登門路也樓下分三門北望其闕由西御廊首轉西至㑹同館出復循西廊首橫過至東御廊首轉北循廊檐行幾二百間廊分三節每節一門路東出第一門通御市二門通毬場三門通太廟中有樓將至宫城廊即東又百間其西亦然亦有三門但不知所通何處望之皆民居東西廊之東馳道甚闊西旁有溝溝上植栁兩廊屋脊覆以青琉璃瓦宫闕門户即純用之葱然遂道之北即端門十一間曰應天之門舊常門通天下亦開五門兩狹有樓如左右升龍之治東西兩角門每樓次第攢三檐與狹樓接極工巧端門之內有左右翔門日華月華門前殿曰大安殿使人入在掖門宜左循大安殿東廊後屋行入復德殿自側門入又東北行直東有殿宇門曰東宫牆內亭觀甚多直北面南列三門中門集英門云是故壽康殿母后所居西曰㑹通門自㑹通東小門北入承明門又北則昭慶門東則禧集門尚書省在門外又兩則右嘉㑹門四門正相對入右嘉㑹門門有樓與左嘉㑹門相對即大安殿後門之後至幕次黑布拂廬待班有宣入明門即常朝後殿門也門內庭中列圍士二百許人貼金雙鳯幞頭團花紅錦衫手列入仁政門蓋隔門也至仁政殿大花氊可半庭中雙鳯殿兩旁各有朵殿之上兩髙樓日東西上閣門兩悉有連幕中有甲士東西御廊循檐各列甲士東立者紅茸甲金纒竿鎗黃旗畫青龍西立者金纒竿鎗白旗畫青龍直至殿下皆然惟立于門下者皂袍弓矢殿兩角雜列儀物幢節之屬如道士醮壇威儀之類使人由殿下車行上階却轉南繇露臺北行入殿闕謂之欄子金主幞頭紅袍玉帶坐七寶榻背有大龍大屏風四壁㡩幕皆紅繡龍拱斗皆有繡衣兩楹門各有大出香金獅蠻地鋪禮佛毯可一殿兩旁玉帶金魚或金帶者四五十相對列立遙望前後殿廡矗起處甚多制度不經工巧無遺力所謂窮奢極侈者煬王亮初營此都規摹多出于孔彥舟役民夫八十萬共軍四十萬作治數年死者不可勝計地皆古墳塜悉掘棄之敵既蹂躪中原國之計度踵事增華往往不遺餘力而終不近似今金主既端坐得國其徒益治文為以眩之始則大修官制見其大定二年十二月詔書略曰建官咸則于三代分職仍總于六卿宣化邇遐服采內外卑髙以序名位有倫舊或舛差理宜增損冗散者併其任繁劇者益其聨悉命有司存革從允當其新定官制令尚書省鏤行所謂官制者曰三師太師太傅太保曰三公太尉司徒司空曰尚書省有令及左右丞相又有平章政事為宰相官左右丞參知政事為執政官左右司郎中員外郎為之屬曰六部有尚書侍郎郎中員外郎曰都元帥府有左右副元帥監軍都監曰樞密院有使副僉書曰大宗正府有判大宗正事及同判同簽又有丞及宗室將軍缺之曰勸農使司有使副曰殿前都㸃檢左右副都㸃檢左右衛將軍及符寶郎官直將軍宫籍監副監鷹坊及近侍器物尚郎尚輦四局皆有使副武庫武器二所令丞頓舍官諸直長皆隸焉曰宣徽有左右使同知同簽院事判事判官及拱衛直客省引進司尚儀衣鸞尚食尚藥宫圍四局使副東西上閣門使副通事舍人供奉班都知判官內供奉押班御院通進太醫院教坊提㸃使副判官宿御院都藥監宫苑司尚醖典客二所令丞侍儀局使知長等皆隸焉曰御史臺有大夫中丞侍御史殿中侍御史監察御史及登文檢院知院同知院隸焉曰翰林學士院有學士承㫖學士侍講侍講學士知學士侍直制修撰奉文字等官承㫖至直學士帶知制誥待制至應奉帶知同曰司天臺提㸃監少監判官隸焉曰國史院有同修史編修官曰太常寺大丞博士大祝奉曰禮物津郎之屬太廟郊社諸陵大樂四所令丞等隸焉曰祕書監少監丞郎祕書郎著作局官佐郎及筆硯書畫二局知長隸焉曰諌院有左右諫議大夫補闕拾遺曰大理寺有卿少正丞寺直評事曰國子院有祭酒司業丞博士助教曰記注院有修注曰大府監有監少監及丞左右藏庫使副佐供所都監太倉酒房市買司使副鈞循所令丞等隸焉曰小府監有監少監丞文忠尚方圖畫裁造衣繡織染等官上林八所令丞諸直長等隸焉曰都水監有監少監丞及御道司管當司隸焉曰四方館曰內藏庫曰法物庫曰榷袋務皆有使副曰都城所有提舉左右廂官受給官曰惠民司有令丞曰承發司置管尚同官當日尚書循堂厨曰公使酒庫曰交鈔庫曰印造引鈔軍皆有使副曰直省局有局長副長曰管當尚書省樂工有名無名曰宫師府東管公也有太師太傅太保少師詹事院有詹事少事左右衛率府副率左右監僕正副正長尚寶典儀贊儀直內郎丞典食丞侍藥奉藥掌欽令丞家令丞司經司藏司倉皆有副左右諭德左右贊善等皆隸焉曰親王府屬官有長史府掾文學又有諸京留守同知留守副留守留守判官諸京都轉運使及同知使副使判官招討使諸府軍諸路轉運使及同知副使判官諸節度使副同知使事諸府同知諸州刺史同知防禦同知總軍招討都監明安穆昆羣牧防禦使諸京兵馬都副指揮使警巡使判官諸府軍指揮使提舉漕運解鹽司及同提舉諸京諸路都總管判官京府諸府招討節度觀察判官留守諸府推官節鎮録事防禦判官都巡河京府運使節鎮都州司獄知法等為在外職事官又有請知事主事都事典事等為吏職此其分職之序也又參以文武散官列為正從九品開府儀同三司崇進特進金紫光祿金紫榮祿光祿榮祿資德資正宣奉正奉通奉中奉正議通議太中中議中憲中散中靖中順朝請朝散朝奉朝列奉政奉議奉直大夫丞議丞德丞奉丞直丞務儒林文林丞事證事從仕登仕將仕等郎為文散官自榮祿大夫以上文武通得為之龍虎金吾衛縹綺奉國輔國鎮國上將軍昭武昭毅安逺定逺大將軍廣威宣威建威振威明威信武顯武經武宣武武功武德武義將軍等承信奉信昭信忠武忠顯忠勇修武昭武保儀進義等校尉為武散官又有正儀欽授明時頒率保章司元等大夫授靈臺候儀司政平秩正序挈壺司厯司晨等郎為司天官保康保寧保安保順保和保冲等大夫保全成安成全成和乙正乙效乙候乙瘞乙愈等郎為太乙官中尹中侍中御中儀中閣中涓等大夫通侍郎御侍直御直司謁司閽司供司奉司引等郎為內侍官以上三色官皆不過從四品亦以上柱國至武騎尉為勳官其封邑蔭補皆有止法王食邑止萬户實封上千户其下降皆殺准此至縣男止三百户一品蔭子孫等七人二品六人其下降殺皆准此至七品上蔭一人又有佩服之制文臣等五品以上服紫七品緋八品九品緑武官並服紫自天子而下有玉帶玉雙魚玉魚金魚及金笏頭毬文荔支御仙花及鳥犀紅鞓等帶皆金魚服緋者紅帶銀魚武官自二品以上得佩魚其告身有翔鸞雲鶴龜蓮魚藻瑞草等婦人則雲氣瑞蓮芙蓉雜花等錦金鸞鸂鶒等羅其封國亦有大國次國小國之别頭銜亦有行首試之充之辨其厯曰大明厯一道忌日十二亦有通行小本厯頭與中國異者每日互注吉凶謂如庚寅歲正月二日出行乘舟動土凶拜官吉之類而最可笑者金本無年號自阿固逹始有天輔之稱今四十八年矣小本厯通具百二十歲相屬某年生而四十八歲以前金無年號乃選造以足之重熙四年清寧咸雍太康太安各十年盛昌六年乾通十年大慶四年收國二年以接于天輔又以其切據之地紛更難合為十四路曰中都路大興府為首即燕山府通薊易涿順灤平雄霸安保遂安肅二名十二州總三十九縣屬焉曰遼陽府為首㑹軍咸平廣寧三府瀋濟辰復州澄貴德二名信肇韓十州總三十七縣屬焉曰遼西京西路大同府為首天德一府為內二名武豐尉東勝二名奉聖二名應寧邊二名洪宣化二名十二州總三十一縣屬焉曰南京開封府為首河南歸德二府隸州一軍曹睢専隥陳鄲泗單陜唐汝亳蔡嵩頴十六州總一百六縣曰北京路大定府為首臨潢興中二府和益錦宗慶懿秦建八州總三十二縣屬焉曰河東路河間府為首蠡莫獻冀深清滄景總二十九縣屬焉曰河北路真定府為首威趙金改沃州邢相磁定祈洺濬衛十州總五十二縣屬焉曰山西路東平府為首大名府勝陽秦安二軍濟思濮開滑邳宿兖博德十一州總六十三縣屬焉山東路益都府為首即青州濟南府城陽寧海二軍濰濱沂密淄登萊七州總五十縣焉曰河南路平陽府為首河中一府隰耿澤潞遼沁孟德絳解十州六十六縣屬焉曰河北路太原一府為首歲㤋汾代石五州晉寧火山寧化岢嵐平定五軍總三十五縣屬焉曰京兆路京兆府為首鳯翔商乾耀華虢邠同七州總五十七縣屬焉曰鄜延路延安府為首坊鄜丹三州總一十九縣屬焉曰熙秦路臨兆府為首蘭鞏隴㑹秦洮河七州積石鎮戎德順三軍總十六縣屬焉曰慶原路慶陽府為首平凉環慶涇原四州總十九縣曰凡府三十四節鎮三十六防禦二十三刺史七十三軍十六留守四轉運十四使人見敵之日略得其廷臣名氏曰領省太尉尚書令李石元妃之父也稱皇文人起復左丞相赫舍哩良弼右丞相赫舍哩志寧左右平章完顔喀齊喀完顔錫喇左右丞石琚孟浩皆兼太子師傅參政魏子平完顔德受左右宣徽使敬嗣暉耶律後同知宣徽院韓綱殿後都㸃檢完顔錫里左右副㸃檢烏庫哩忠弼烏庫哩元忠判宗正王不知其名吏部尚書王宇户部耶律道禮部楊伯雄兵部髙壽星刑部髙德基工部張恭愈御史中丞李天瑀工部侍郎張汝霖侍御史完顔德溫良肅翰林待制鄭子𣆀祕書監楊邦基太府監兼客省使梁彬都水監耶律寶大理寺李昌國閣門使盧珙內藏庫使兼國子祭酒王可進左司員外郎張汝弼右司張享兵部郎中田彥皋金主有八子長曰越王判大興府其母死矣次為太子母方寵次隨王次瀋王次瀛國公餘未詳宫多內寵其最貴者有元德淑立溫恭慧明等十妃臣下亦娶數妻多少視官屬官品以先後聘為序民惟得一妻族帳部曲録主兵赫舍哩志學字從道以護衛將軍出身授保州同知因契丹斡罕逼燕山召為古翼統軍既滅斡罕拜尚書右丞相天下兵馬副元帥為人有烏珠風勢爪爾佳字仲恭其父先曽作西南路招討使死襲封千户繼為副㸃檢後除西北路招討統軍瓜爾佳中願之弟甚知兵常為右副㸃檢後除右翼都統烏庫哩執中正女真人頗知書見知烏克蘇喇部族節度右闕中女真人任益都尹兼右翼統軍納哈塔士舉女真人舉文之兄也頗知詩任翼州節度使兼彈壓一路盜賊唐古安禮字仲和亮之妹壻也自陜總管入拜參知政事極能文知碁持嘉順忠女真人為開州世襲千户兼管屯田軍溫特赫察喇音辣女真人住東平府世襲千户兼管屯田軍完顔彀芬元幼年世襲止以小名授官因而名焉見住大名府世襲千户兼管屯田軍富察默色小名玉門自幼襲封因而名焉威將軍宰執翟永固燕山郎鄉人亮與葛王兩作相蘇保衡雲中府人亮攻淮為水軍都統葛王除右丞跛一足石琚字子美中山府人亶朝狀元及第是年出君子能進人之情賦葛王立除𠫭知政事魏履元奉聖州人狀元石琚榜葛王立除𠫭知政事敬嗣暉易州人石琚榜下及第亮時為宣徽使尋除知政事亮貶為庶人次年復官召為宣徽使趙永錫燕人葛王立除司空謂之槐林趙開者是也任熊祥燕人遼時及第葛王立除少師李受渤海人葛王立母舅常為知政事侍從梁球廣寧府人石琚下及第亮時為户部尚書葛王立復為户部極有才王兢字無兢相州人乃本朝王炎之親兄嘗為禮部尚書胡勵字元化山東密州人少被虜韓昉于從良狀元及第是年出好生德洽民不犯上賦亮時為刑部尚書葛王書立改翰林承㫖馬俸燕人石琚榜及第亮時為御史中丞葛王立除為御史大夫張恭愈字師韓廣寧府人狀元孫用康榜第二人及第亮攻淮甸時為謀主修船造軍器皆本人主之除户部郎蔡圭字闕父餘杭人蔡清及古之孫松年之子狀元楊建中榜及第葛王立除刑部侍郎張汝霖字仲潭遼陽人太師浩之子亮時特賜及第尋復正奉名及第亮時在翰林葛王立遷吏部侍郎張汝為字仲宣汝霖之兄浩之長子石琚榜及第葛王立貶為庶人次年復官除户部侍郎劉仲山字山甫中京人特賜及第嘗為禮部侍郎李天吉燕人其豐美姿長髯狀元胡勵榜及第亮時澭州復為大興尹葛王立除刑部侍郎髙懷忠大定人特賜及第葛王立除國子監祭酒髙懷正懷忠之弟特賜及第為吏部侍郎葛王立因而任之蕭兼字和丹契丹人丞慶之弟亶特賜及第亮時為右翰林知學士葛王立除刑部侍郎館閣臺諫鄭子𣆀字純夫大定人先于亮初僣時狀元楊建中榜第三人及第出天錫勇智正萬邦賦除翼城縣丞被召除書畫直長至貞元四年亮令再試狀元及第是年出不貴異物民乃足賦亮時為翰林修撰尋遷修起居注葛王除為殿中侍御史兼侍讀學士劉仲淵字介石燕山人亶朝狀元及第是年出日月得天能久照賦亮時為翰林待制葛王立遷知學士張景仁字受甫廣寧人劉仲淵榜别試及第久在翰林葛王立除翰林侍讀學士楊伯雄咸平府人狀元劉仲淵榜及第葛王立除翰林直學士楊伯仁伯雄之弟狀元王彥潜别試及第葛王立除翰林待制王彥潜河間人亶時狀元及第是年出文以足言行而逺賦葛王立除翰林待制綦戬字天錫山東膠東人少被虜亮特賜及第授翰林應奉文字葛王立遷待制劉機字仲章益都府臨朐縣人幼年被虜在葛王家葛王父潞王放從良應舉狀元楊建中榜上甲及第葛王立授左拾遺凡事多取謀于彼其人足智略又溫粹士多歸之孫用康字游古燕人亶時狀元及第是年出人為道逺行莫能致賦葛王立除翰林修撰吕宗翰字周卿燕人亮時狀元及第是年出王業艱難賦葛王立除翰林修撰孟宗獻字友之開封人葛王初立時四元及第解試建官惟賢天下治賦府試立正惟人不惟官賦省試夙夜求賢務在官民賦殿試智臨則臣民農夫服賦授翰林應奉文字同知制誥尋除右贊善大夫任忠傑山西天戒縣人亮時狀元及第是年出賞罰之令信如四時賦授翰林應奉文字同知制誥李晞顔獻州人又雲中山府人亶時因作省元下第特賜及第授翰林應奉文字同知制誥王堪棣州人亶朝經義及第葛王立為翰林修撰卿監畢逢古瀋州人狀元石琚榜及第葛王立除少府少卿徐之方燕山玉田人狀元劉仲淵榜及第葛王立除少府太監任侗燕人狀元石琚榜及第葛王立除都水使者任倜字子美侗之弟狀元楊建中榜及第葛王立除祕書少監田穀廣寧人狀元石琚榜及第亶時坐欺罔黨固貶為庶人葛王立復官除工部員外郎馬柔德字周卿廣寧人狀元劉仲淵榜及第亶時與田穀等坐欺罔黨固貶為庶人葛王立復官授刑部員外郎王仲通字達夫閭陽人又雲中京人狀元石琚榜及第亶時坐欺罔黨固與田穀等貶為庶人葛王立復官除禮部郎中王從龍字雲卿山東密州人亶時經義狀元葛王立除太常少卿孔固字德逺孔子四十七代孫狀元王堪榜及第葛王立除宣徽少卿楊蟠字子飛中京人狀元楊建中榜及第葛王立授宣徽判官張錫字永山燕山漷陰人又雲燕山武康人狀元孫用康榜及第葛王立授左司員外郎王全黃龍人狀元劉仲淵榜及第亮時右司郎中葛王立授左司郎中三朝北盟㑹編卷二百四十五
