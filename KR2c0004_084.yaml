body:
  text: 三朝北盟會編卷八十四宋徐夢莘撰靖康中帙起靖康二年三月初六日丙申盡初九日己亥統制官宣贊舍人吳革謀起兵救駕范瓊左言誘執革革死之并斬其子及使臣百餘人宣和録曰先是靖康元年正月金人深入吳革任陜西統制官首率關中兵勤王二月敵騎河北去分兵圍遼州革以所部解圍九月敵陷太原府朝廷遣革奉使金人軍中持國書見尼堪庭揖不拜計議邊事責其貪利敗約氣徑語直金帥愧服為追回攻威勝軍等處軍馬授書以歸十月召赴闕得對上問割地不割地利害革對以北人有折箭之誓入攻必矣乞措置邊備起陜西兵馬為京城援不復議和遂差革使陜西勾兵聞十一月二日出城敵騎已至會南道軍馬至遂同總管張叔夜入城上巡幸南壁革面奏乞量差兵馬奪路赴陜西叔夜留革充總制官革纍乞出兵城外下寨使敵騎不敢近城且通東南道路又密具奏乞選日諸門併出兵為正兵為牽制為衝突為尾襲為應援可戰而勝上以衆言先入竟不出兵敵攻宣化門填道渡濠革竊往相視白南壁守壁官開安上門所堰濠水三尺及盡泄蔡河閘水浸之不及從填道將合始省前語水已氷矣二十五日敵登城革率使臣親兵赴南薰門東䇿應手射殺執幟者十許人部曲皆散去革獨死拒安上門東使敵不能西二年正月上駕再出青城革曰天文帝坐甚傾駕出必不反正墮敵計宰相何栗不見聽又請于樞密孫傳張叔夜欲因事至軍前計議不報二月八日上皇妃后諸王宫嬪出城九日革入白留守孫傳言上皇業已出乞力留皇后皇太子明日引見皇太子革頓首言二帝出郊駕必未回願殿下堅避以固國本遣蠟彈告急在外將相約擁兵近城內外相應夾攻敵寨又與監察御史張所馬伸文林郎吳給日夜同謀革以啓聖院狹隘遷于同文館附者益衆使臣效用數千人勇士數萬多兩河驍悍之士革日率衆肄射中者等給班賞鎧甲弧矢攻守之具種種皆備金人立張邦昌之議益急革欲誅范瓊等數十人分兵約日突出班直等先期以發為范瓊所殺革字議夫藝祖朝佐命勳臣延祚七世孫也天資忠義天文地理人事兵機無不通曉及被殺忠義之士無不痛恨遺史曰孫傳張叔夜秦檜以不立張邦昌皆赴金人軍前王時雍徐秉哲吳幵莫儔與范瓊輩方謀立異姓欲為佐命勳臣吳革參謀吳銖左時張知章等曰事急矣宜遂起兵緩則事泄且有不測禍於是羣議起事之日奉宗廟神主以從事誅范瓊等數十人令左時作三書其一責金人以議和紿我國家留我二帝其二責大臣不效死唯唯以聽敵命其三責京城居民不念君父蒙塵於外日唯偷安不知共效死力以雪國家之難乃命兵約日出十八門列為二壘與劉家寺及青城敵寨相對又遣蠟彈期以三月八日內外合軍部勒既定須期以發探事使臣執九車五十乘自青州東出革撫案慟哭曰吾君去矣三月六日五更班直崔廣崔彥等數百人皆環甲排闥至革寢所告白邦昌以來日受册既立之後人心離散須先事而起不然懼及禍革與在外將相約日若先發失約則兵不至安能濟事衆力請革革復曰若等來者幾何人曰五千百姓數十萬聞事急皆不約而附從也革知衆不可奪彥廣等迫革上馬革乃被甲上馬將已黎明北行至金水河西皆范瓊及左言兵瓊遣人邀革議事遂執革並其子悉斬之及使臣素隊百餘人併戮河上革就死顔色不變極口詆罵其忠義之言凛凛可畏死之日知與不知皆為泣下初革自車駕出城飲食坐卧未嘗少忘每食屢廢七箸有汛掃者革止之曰主上蒙塵而臣子欲潔其居耶自聞金人欲縱兵洗城屢白留守乞淘渠以防鐵騎馳突及大集京師居民各赴本壁門下集緇黃作法事各報全活生靈之恩實密為備也北城門火則乞措置保全宗廟七世神主宗室出城有逃避者悉收贍之有持之者革曰為趙氏得死且不恨范瓊斬革訖即以事狀申軍前以范瓊為正任觀察使殿撰師左言遷兩官偽楚録曰初駕出不得還戶書梅執禮置二十七所皆託以彈壓賑濟為名其實招集材勇之人欲以救駕有陜西統制官吳革實一所之數在京監糶官米見軍前廢立抱忠負義以官米養軍召在京壯士慨然起兵謀反正交結班直散班祗候親從等欲奪駕外走時有軍前去取醫人入城置藥物見革説四方勤王兵將至近甸每日軍前發兵出戰精兵多出外城下不滿萬人二聖可一舉得之革聞是説欲為奪駕之計親事官數百人聞立張邦昌以不忍屈節異姓先殺妻孥血屬焚其居室以應為徒中所告左言范瓊領兵追革至朱雀門詐呼與之謀曰吳統制你側身堰黃河此事得自家門共議革聞以為二人率兵助已乃下馬欲與之語瓊乃執革並其子皆斬之次日王時雍之使范瓊體究髙士謨趙子昉於是開封府捉二人送下獄蓋二人各占一所也七日丁酉金人立邦昌僣位遺史曰是日早文武百僚僧道軍民等會於尚書令廳巳時告報軍前奉册寶入門金人遣五十餘人素騎數百從之邦昌自尚書省慟哭上馬至西府門佯為昏憒欲仆立馬蘇復號慟午時導引至宣德門外西闕門下馬入幕次又慟有金人曽太師以下五人持御衣紅傘來設於幕次邦昌更帝服少頃出步至御街褥位望金國拜舞跪受册寶文册曰無德而王故天命假於余手當仁不讓知厯數在於爾躬張邦昌即皇帝位國號大楚都金陵邦昌御紅繖還次訖金人揖邦昌上馬出門百官導引如儀邦昌步入自宣德門由大慶殿至文德前進輦却弗御步升殿於御床西側别置一椅坐受官員等賀訖文武合班張乃起立閣門傳旨云勿拜時雍等復奏傳指揮云本為生靈非敢竊位如不聼從即當歸避時雍率百官遽拜張急回身面東拱手以立靖康要盟録曰册文云維天會五年嵗次丁未二月辛亥朔二十一日辛巳皇帝肇造區夏務安元元肆朕纂承不敢荒怠夙夜兢思與萬國同格於治粵于萬世永保無窮蓋我有造於宋也不圖變誓渝盟以怨報德借端招禍反義為仇譎詐成俗貪婪不已加以肆行淫亂不恤黎元號令滋彰綱紀弛紊况所退者非其罪所進者非其功賄賂公行豺狼塞路天厭其德民不聊生以故興師命將伐罪弔民幸賴天髙聽卑神幽燭細旌旄一舉都邑立摧且眷命攸屬謂之大寶茍厯數改卜未或偷安故用黜廢以昭聰監今者國既乏主民宜混同然念厥功誠非貪土遂命帥府與衆推賢僉曰太宰張邦昌天育疏通神資上哲處位著忠良之譽居家聞孝友之名實天命之攸歸乃人情之所係擇其賢者非子而誰是用遣使備儀禮以璽紱册命爾為皇帝以授斯民國號大楚都於金陵自黃河以外除西夏封圻疆場仍舊世輔王室永作藩臣貢禮時修無疲於述職問音嵗至無緩於披誠於戲天生蒸民不能自治故立君以臨之君不能獨理故命官以牧之乃知民非后不治后亦非賢不守其餘有位可不慎歟豫懋乃德加乃丕休日慎一日雖休勿休欽哉其聽朕命偽楚録曰王時雍領尚書省吳幵莫儔皆權樞密院吕好問權門下侍郎徐秉哲權中書侍郎左言范瓊以斬吳革功范瓊為正任觀察使殿撰師左言遷兩官大抵往來議事者幵儔也逼逐上皇以下時雍秉哲也脅懼都人者范瓊也遂皆擢用時皆繡韉張蓋獨吕好問出入頗形憂愧别録曰初金人得在京官吏軍民同推戴邦昌文字令上看謂上曰官吏軍民既推戴張邦昌能復主哉金人如蕭慶耶律廣王芮髙尚書曹少監等用事人邦昌在軍前鞠躬俯事不暇至是列拜於階下邦昌辭避則曰陛下不受臣拜見元帥必死今日陛下乃昔日南朝天子也邦昌悚栗邦昌僣立呼拜迎引皆金人為之初拜邦昌入內金人皆辭出有衛士曰平日見伶官作雜劇每裝假官人今日張太宰却作假官家朝野僉言曰初邦昌册立百官對金人慘怛邦昌變色惟吳幵莫儔左言范瓊有喜色各有所得初幵儔播金人語言迫脅大臣必要立邦昌凡懷忠義臣僚即告金人令迫之時指幵儔為金國大臣范瓊領兵彈壓使在京軍民不敢有懷死節以致邦昌即位初邦昌入城不肯受推戴以軍前堅逼百官憂之瓊曰使我殿前太尉更不由張相公也便交册立了當四人者前所為如此邦昌攝政位自謂佐命元勳一録曰初一日邦昌初入門之時大風一日內前四壁似有鼓聲已而乃厲俗以為風磨八日戊戌尚書劄子胡思權戶部左曹司郎司農本職免僉書葉宗諤權司農少卿李回元係僉書樞密權依舊胡直孺權戶部尚書前諌議范宗尹仍舊職吏部侍郎謝克家落職致仕仍舊職前中書舍人李擢并仍舊職李靖寧詹義並權直學士院九日己亥百官赴常朝如儀邦昌以吏部尚書王時雍權領尚書門下省事開封尹徐秉哲權領中書省樞密院事翰林承旨吳幵權尚書左丞相翰林學士莫儔權尚書右丞相前簽書樞密院李回權知樞密院觀察使左言權殿前司公事范瓊權四廂指揮使大理卿周懿文權開封府遺史曰張邦昌僣位王時雍諂事之凡事有臣啓陛下之語雖邦昌之僣亦鄙嫌之然進時雍秉哲領三省樞密院事者三省樞密院皆無官也靖康小録曰王時雍領三省事郎官王及之王紹擅政每以佐命功臣自許先是金人強城中舉邦昌羣臣爭立趙氏者尚衆時雍及之欲奉表勸進詞臣無聽當者紹在集議中探懷出稿云念之久矣何不亟為自是士大夫切齒因呼為三王及之令有司籍龍德二宫寶貨賣靈沼魚藕以贍百官為羞御史馬伸檄之曰古者人臣去國三年不反然後收其田里今二帝暴露於郊行止未決爾等輒敢取兩宫物逆節甚矣力爭乃止靖康後録云邦昌既入尚書省時雍等朝夕在側應對之際便以陛下稱之邦昌曰且休恐人聞之皆笑我爾邦昌遣邵溥使南寨暴闕使北寨報以欲詣軍前致謝二使至門先以狀申回傳云皇帝不須出好治人民俟要相見自往請也三朝北盟會編卷八十四
