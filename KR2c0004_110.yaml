body:
  text: 三朝北盟㑹編卷一百十宋徐夢莘撰炎興下帙起建炎元年七月四日壬辰盡其日傳雱建炎通問録曰建炎元年皇帝車駕到南京即寶位雱差出自西京永安陵頭檢視陵寢回歸至南京出頭參見李丞相綱首以使事相問雱即願請行得指揮赴都堂見宰執啇議使事是時分河東河北使命易通係已差人下用望河東路使命難通被差人往往多乞辭免未有人承當此行李丞相奏知河東奉使臣與傅雱言一言而合即得㫖差雱河東路奉使國相元帥當月授告次日謝又次詣都堂辭宰執取禀使㫖又啇議軍前合應答事宜兼慮金人有未曉達軍前事理合須取覆宰執請教黃潜善答云今日使事係通問之初敵情未測奉命出疆者當自有所處兼應干軍前事宜難以預行料度裁决况朝廷任人不任事奉使請一面自計度裁决不當更問朝廷雱即時交領國書及禮物辭歸國信所一面便辦行當日得指揮即次日出門即起離南京前去京東措置一行禮物等事七月盡問方到鞏縣便差人賫大宋通問所牒去大金國河陽府投下乞計㑹差借船隻渡河䝉河陽知府張巨侍郎回牒稱為是國號不同難以過河即時偹録申朝廷一面再移河陽稱係是於貴朝通問事理急速不敢注滯欲乞早希公文回示再䝉河陽府回牒稱是國號不同未敢擅便放令人使渡河己申取上件指揮别行關報前去至第九日方得河陽關報稱今來已得上件指揮許令南使渡河仍打减人從方得擺渡自河陽府至雲中計一千八百里來往回共九日得上件關報回接伴使副兩人俱至正使是王秉彛學士副使是契丹蕭太尉正使王秉彛先問云貴朝今來差奉使侍郎去見國相元帥不知理㑹甚公事雱答曰以此行别無公事只為今聖皇帝方即位差雱於貴朝通問又問既是今皇帝已即位之時昨來所立大楚却如何安排雱答以張太宰以郡王封之如雱今日之行郡王亦皆預議金使又問此是大楚欲如此是貴朝抑令其如此雱答以天下四方謳歌獄訟既盡皆托於今皇帝張太宰欲為自安之計亦只得如此金使又言此假事上畔人當時亦曽預料他日大楚必須如此然而今來奉使侍郎既是去見國相元帥時却如何說雱云既到貴朝奉使豈敢詐為每事必以實情去相告金使歎服稱奉使此行國相元帥必須大喜為是國相元帥素喜忠義之人到雲中府門外國相遣中書舍人出門相迎館伴大理卿昭文館學士李侗相見問來時不知貴朝有甚分牒雱答以使人逺來通問今聖皇帝令再三起居國相元帥自有通問國書云郎君來日就行府准偹相見訖館伴關借檯桌共三十以兩桌載朝廷禮物二十八桌載使人私覿禮物是時朝廷禮物亦少只有錦十匹玳瑁家事三件使人私覿禮物於東京旋行收買打造花纈共作五百匹假并生薑臘茶漆器紙筆等連朝廷禮物併作三十擡桌館伴李侗見之亦加嗟賞稱乍經殘破之餘不意措置禮物等如此當日韃靼國獻羊黑水國獻馬兩國人使同時在帥府前伺候引見入府見三人金帥皆席地重氊趺坐第一人是左監軍烏舍郎君權元帥職第二人右監軍伊都第三人是時相公皆重氊在殿中間坐二人金帥皆戎服一人小帽窄衫使人當中揖少立然後跪膝打話須臾髙慶裔傳指揮稱郎君傳尊㫖奉使逺來不易不知今日奉使差來理㑹甚公事雱答以今聖皇帝方即位差使人於貴朝通問離國中日皇帝令再三起居郎君元帥倉卒差使人通問百事草創禮意全未周旋郎君傳尊㫖本國於貴朝本來無苦深怨只緣語言失信雱答以此事皆先朝所失又言去年皇子郎君兵至城下南朝本無偹易破你前不知我此段恩義及許割三鎮又云祖宗之地尺寸不可與人語言如此其信安在雱答以此亦是前朝所失又云三鎮之地何足計較若不失信諸事亦有啇量又云使人今日之來方為通問如何才通問便來取二聖即答以今聖皇帝即位之後惓惓於父兄之情實不能忘所以差人往通問及懇禱郎君此在郎君以為是孰敢以為非若郎君以為非孰敢以為是全在郎君矜念周旋此假祈禱之情即云使人且歸館中别聽指揮差大理卿昭文館學士李侗館伴李侗性重相見默坐雖久終不發言副使下馬識逺不免發言扣之李侗顧盻左右前後别無人在側即發言云天下之理盛衰强弱之勢古今所同只如漢武之盛恨不吞盡丐奴耶律德光之强恨不席捲中原然而漢武何嘗殺盡丐奴耶律德光何嘗併盡中國南北异宜豈可混併此是天道自古何嘗有此理耶又云盛衰固自有時强弱亦是有數周旋如轉輪返覆如引鋸天下何嘗有常强之勢賢人君子佐佑因時識消長之理時違事變擒縱之權於此能變能改即於盛衰之中强弱常有主生靈不墜塗炭免得此一假殺戮這箇因果最為大事其他不足道也又云自古聖賢本事未有不觀乎時若時有可為人樂為用即下手為之不惟事亦有濟亦不徒廢心力若時未可為人不為用知其不可為而為之豈惟枉費心力事亦難濟何所補哉所以觀時㑹通留取此事力少俟他日設施侗昨見貴朝近上公卿似全未有能見事者以此謀謨廟堂豈不誤事乎只如昨來敵兵到城在城守未破國相亦曽煩惱若守禦稍固更停待得數日必須别有啇議又兩元帥臨城侗亦親隨元帥在城下敵兵只五七人登城城上即舉兵皆散兵勢如此人不為用豈可不預知乎此段事即見貴朝公卿疏略全不曽講究亦不覺悟若稍悟此理必須留此假事力少待他日為用徒然枉費心力豈不誤事乎良久又言侗燕人住在九州之地每念先世陷於邊地昨來見貴朝初得燕山舉族相慶將謂自此何日再得為中華人物又顧左右前後别無人即云更少三兩日間尋少果子來皆油麵煎果及燕山府棗栗并有西瓜數十盤旅燒香㸃茶延之說話雱再三懇扣之比使人逺來仰荷見教甚多比不知所懇請二帝回鑾之事貴朝諸公却有啇量無館伴云固知此所使為此事前日二公不見郎君髙聲云來通問便及二帝莫是要遣兵來取也其意亦有謂雱又問其意謂何云其意謂初來通問合須議論他事爾若稍不曲折言不相投亦恐不無傷事所以只指揮使人且歸館中候别聼指揮雱冉懇云畢竟所懇二帝之事貴朝諸公曽有商量否館伴云此事必須申去國中軍前恐與决此事未得館伴又云昨二帝過來時太上自燕山去少帝却自此中去少帝過來此時亦住半月餘日今皆過在深漠中然二太子在時却曽有此啇議候貴朝有懇請時欲發太上回歸今二太子不在亦無此假說話雱又問少帝如何館伴云少帝當日元不曽有此假商議又云惟是昨在京城下時因有議論昨京城初不發回少帝入城二太子曾與國相商議自古北兵到南朝未嘗有破其國擕其主而歸北只是兵强而已德不足也今來北兵到此既破其城孰若立其主刻大碑於梁宋間使天下後世知行兵有名且不絶人後以使南兵自此數百年不敢動若如此施行不惟兵強德亦有餘這箇功績大若使破其國擕其主而歸只是兵強而已德不足也兼他日若趙氏自立即便更無立主一假恩義國相遂然其說放回少帝入城後來因緣别有異議其論又復稍變所以其言不諧雱云議論緣何不諧館伴云當來本差監軍烏舍送辭不曾入去遂差監軍下子弟及其餘近上郎君同行當時此二十餘人亦望將此事做一假恩義兼亦不無兾望貴朝近上公卿不悟其意遂至其議復變却稱家國事大不可不為長慮之計只如唐太宗固嘗臣事突厥及其既盛亦能生擒突厥國家事大安可不慮哉二太子亦曾力爭其事言畢竟是貴朝秦中丞所請存趙氏之說是若他日趙氏自立不惟無立主一假恩義兼恐兵端未巳然纍日啇議不成遂從烏舍郎君之言遂復變其議雱又問其商議時不知曽聞有今聖皇帝在外無云緣知之所以啇議欲發太上皇帝回鑾也又云固知此事所以亦不留北人守京城初推契丹蕭太尉守京城蕭太尉不曽承當又推劉彥宗守京城彥宗亦不承當緣二太子復建議云他日必不免趙氏再立然務廣地者荒不如且守河為界大事有大兵力包不住必别貽後患是用二太子之說只就城中别推賢人守京城此時北人既得河北已飽其欲方務為保守之計將自河以南皆已置度外矣又云見今行府日逐建議守河之計欲就國中差撥金人十萬人前來守河亦不用燕人及契丹其欲保守河北防患之心如此又云黃河豈可守此是天道假饒守得河他日契丹在腹心中安保其不生變也館伴舊事大遼其言大槩多遵遼國數皆如此亦不敢深然其言恐其虛誕雱又問所懇二帝之事他日有相從意否館伴云假使有允意亦豈肯便說盡今方是第一次遣二公來必無便相許之理必須再三曲折俟其有就議之意然後可以啇議若欲一扣便允恐無此理然既就啇量兵亦便可休也館伴又云金國自海隅小邦崛起併二大國此事豈人力所能至某問前後必有朕兆以應天受命之符館伴云别無符䜟只是大遼國中金氣旺盛以此應䜟又過數日忽見館伴密來相報云南畔近日復有人馬過河來聞復失利然而南朝既遣使來議事又發人馬過河如何切恐言與事不相應郎君必須差人入館來議論此事不可不准偹也次日果見髙尚書入館來相見稱國相令傳語奉使貴朝既是差人來通問如何又却差軍馬過河來不知所差軍馬之意是如何若是遣兵來取二帝否雱只答以不知髙尚書又云且如奉使不知試自揣度看如何雱云只恐是紅巾嘯聚必非朝廷之意髙尚書又云已是三畨差人過河來盡有黃榜第一畨頭領是張煥被百姓殺之第二畨是馬忠亦不曽得便宜第三畨是張所亦失利自潰散去三畨過河人皆有黃榜如何却是紅巾嘯聚雱答云必非朝廷之意既有二帝在貴朝又已遣使人通問所請後面亦節次更差人來豈有更發軍馬過河之理只恐是盜賊盜賊亦能黃榜不假黃榜無以鼓率羣衆髙尚書疑其有黃榜終不然其說髙尚書既去館伴再來論此事前後曽併聞金人見議守河之計亦不用大遼人直去國中取人來守河其防河之意甚切貴朝又發遣人過河來正犯其所忌也既是遣使欲與人議又發人過河竊恐言與事皆不相應其事如何可以啇量得兼是人馬過河不曽得便宜此小人不能成事徒為此紛紛何所補哉此假事又是貴朝近上公卿慮事不長既欵欵答自軟語影帶看候得時來整頓得人馬可用然後施設如何動必輕舉如此何能成事兼侗嘗聞自古善治國之說有如治病如足病即去其脛脛病即去其股然後事事以兾一體之安全若足病不能去其脛脛病不能去其股竊恐與一體不能安全昔年大遼之失正緣如此升平既久人不習戰一旦金人之起不謀自治之術恃大弗戒謂金人小國不足畏今年出兵不利潰散回歸明年出兵不利潰散回歸即散募烏合之衆為用蓋大遼舊少食糧軍以食糧軍為不足募民兵以民兵為不足又募市兵以市兵為不足又募僧兵是為四軍人雖多亦皆烏合不為用及至潰散回歸又皆散為盜賊時大遼不經殘破州軍各自蹂踐其實金人所破州軍無一二十處其餘皆潰軍自行燒劫及蹂踐占據將來貴朝㺯兵不已且防潰散軍馬歸來自殘破了州府當日大遼亦是三百餘座州軍貴朝是四百餘州軍兩國地里廣狹亦不相逺今來貴朝若截河為界南畔州府甚多尚有三百餘座誠能保全事力亦不小可須莫發人過來引惹百端合早謀休兵之計以圖自治三朝北盟㑹編卷一百十
