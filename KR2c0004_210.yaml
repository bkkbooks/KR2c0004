body:
  text: 三朝北盟㑹編卷二百十宋徐夢莘撰炎興下帙起紹興十二年八月十日庚午盡其日一論敵強弱臣聞楚王舉兵以討於陳曰將定而國陳人聽命復遂縣之繼又誘蔡侯執之以歸叔向曰失信而再克必受其咎弗能久矣桀克有緡以喪其國紂滅東吳而隕其身楚小位下而亟暴於二王能無咎乎天假助不善非祚之也必厚其凶德而降之罰臣觀金人瀕海之國語言不通邈在要荒之外乘二國奸弊突然而興所至輒克縱毒長惡惟利是嗜雖五季之亂亦莫甚於此又無長計逺慮以撫其遺民仁人君子以謀其社稷四邉所用皆鄙夫餓𨽻心既患失事多曲從剝膚捶髓例以為能天意為何人心為何今僥幸立國十有餘年一星終矣其禍機漸萌所以近嵗旁塞出沒皆叛卒流人大帥輩寂無所聞豈徒二太子羅索等數人零落殆盡其餘盤固牙結自相睥睨理勢然也獨尼堪竊有其權土地濶逺金玉子女盈積怙勢恃權自以為萬全之業無復可憂古之立國如漢髙祖唐太宗最為英主陸賈言不可馬上治魏徴疏十漸以正其失矧金國君臣萬萬計不出此其事夥民衆兩倍於彼乎陛下欲雪大恥圖中興正在今日當焦勞克己虛心聽納雖休勿休日甚一日人才不必盡賢能也顧其謀王體斷國論者隨宜任用何如耳將帥不必盡驍勇也顧其秉節鉞操兵權者指揮方略如何耳百姓不必姑息也顧其主漕計持刑獄者風化如何耳三者既修在朝者賢材任用在軍者上下秉節在野者四民安業如此則國日治兵日強民日富武王之克商髙祖之滅楚不過用此矧彼烏合無紀之師其有不亡者哉古語有之上䇿莫如自治正今日之急務也伏惟少軫聖慮天下幸甚一論圖治臣聞唐太宗撥亂之主也既即大位魏徴勸行仁義及以十漸譏之太宗嘗力行其言卒成貞觀之績明皇圖治之君也纂成丕緒姚崇以十事說之切中時病明皇勵精聽納故開元之政無愧前人今陛下克復土宇百度草創勤甚太宗之撥亂懷逺來邇敉寧諸夏功倍明皇之圖治然人才之賢否法度之繁簡民農之疾苦軍旅之情僞其間利害曲折奸濫隱慝上蔽聰明下積怨憎豈但如貞觀開元之初十數事而已哉又未知廟堂執政臺諫長二曽為陛下别白而言之否臣久荷誤恩叨竊侍從負釁力疾不避死亡趨侍行闕雖無長計逺慮振起頺弊於今日軍民利病彼我強弱思之不為不詳知之不為不盡切欲罄瀝肝膽仰瀆冕旒期補聖治之萬一倘䝉陛下霽天威賜以清閒之燕使造膝屢陳展盡梗概茍尺寸之長有所禆益望斷自宸衷勿牽衆議而力行焉或迂疏無用稍涉誕謾俾就誅責亦未為晚惟陛下憐臣孤忠而與進之臣之願也非所敢望伏兾察照一論立政臣聞帝王之治天下也安危在修己治亂在立政成敗在用人未有修己而百姓未安立政而天下未治得人而績用弗成者也恭惟陛下以上聖之資乘中興之運當靖康之末寶祚危於綴旒陛下飛龍睢陽郊祭配天不失舊物雖宣王之復古少康之纘禹無以過也天縱睿知好學不倦動則畏天言則引咎宵衣旰食坐薪嘗膽雖堯舜之責躬禹湯之罪已無以過也遭時多艱天步靡寧以四海之大而治於吳越之一隅以萬乘之尊而屈於邉陲之一國雖太王之去邠勾踐之棲越無以過也兢兢業業不敢暇逸內修政事外靖烽烟昧爽待旦未明求衣雖文王之憂勤成王之無逸無以過也恭儉節用服御菲薄嬪嬙不備行宫僅蔽風雨雖堯舜土階禹之菲食無以過也可謂知所以修己矣屢下寬大之詔盡復祖宗之法恤刑薄賦講武務農訓齊百官撫綏四海車堅馬良兵足食備雖宣宗之綜核名實文皇之勵精政事無以過也可謂知所以立政矣求賢如不及從善如轉圜任相則垂拱仰成至於分治天下而不以為疑御將則建牙受鉞至於兼制數道而不以為重雖周之任旦望漢之寵信越無以過也可謂知所以用人矣宜其百姓乂安天下大治績用亟成然而行之纍年百姓未安天下未洽績用未成者其故何哉此愚臣所以當食而止中夜太息曰有君如是而治不加進土地日蹙外敵尚熾何功烈如此其卑耶臣本以書生䝉陛下拔擢待罪從官屢膺任使負恩丘山未報毫髮陛下不以臣不才不忍中棄萬里召還臣孤危餘生獲瞻天日愚衷千慮豈無一得仰禆聖政之萬一伏望聖慈俯憐忠誠略賜清閒之燕使愚臣布腹心瀝肝膽然後退伏鈇鑕不勝幸甚一論擇相詩曰濟濟多士文王以寧傳曰帝王之興非一士之略士固以多為善然所以用天下士特在於一相故曰天子論一相湯之興也伊尹一人而已髙宗之盛也傅說一人而已王周室者太公望而已霸齊國者管仲父而已若髙祖之張良光武之鄧禹蜀先主之孔明苻堅之王猛皆一人而已至若唐太宗之善創業守成亦不過用房𤣥齡杜如晦二人焉何其少也陛下臨御以來拔以為相者十人矣而在位者多不久何相之衆而去之速也非特臣疑之天下之人皆疑之豈陛下謀相之始或未慎耶抑陛下禮貌之不至耶抑任之不專待之不誠抑讒間之或入耶抑其難進而易退耶何相之衆而去之速也若謀始之不慎臣願陛下慎厥始若禮貌之不至臣願陛下益禮貌以勵其節若任之不專待之不誠臣願陛下任之勿惑且推赤心置其腹中若讒間之或入臣願陛下相與之際如魚得水無令小人伺其隙德重一時望髙四海去就為朝廷之輕重用舍係天下之安危雖千秋萬歲留以輔陛下可也豈容其拘夫易退之義哉一論戰守兵不可一日忘於天下久矣用之之道蓋亦多說以臣觀之亦無深逺甚髙難行之事大率不過戰守兩端而已交鋒接刃以决生死者戰也增陴浚隍效死勿去者守也國家內外養兵無慮百萬竭天下之羽革漆鐵以為兵之器械空天下之倉庫杼軸以充兵之衣食宜乎鎧仗犀利士氣振發戰則勝守則固而乃膚功未奏寸土未復何耶凡以不知戰守之道未嘗聲金鼓也未嘗列行陳也聞敵之至即曳兵而走豈知所謂戰哉未嘗修城郭也未嘗立宗廟也聞敵至則委而去之豈知所謂守哉或曰金人得古人用兵之道竒正無常變化不測如雷霆如風雨如水如火如山如林如以石投卵如以利劔齗腐所向無前安可以戰所攻必克安可以守天下之言率如此而臣之言獨不然譬二人奕有髙者旁觀之二人皆低者也一人大敗遂以己為低彼為髙非彼髙也我低故彼髙爾金人用兵亦豈善哉特以我不善故彼為善以臣區區之見而昭陛下之神武托社稷之威靈而用今日天下之兵戰亦可守亦可何所往而不可一論用人臣竊以自古外敵之禍未有烈於今日者也陛下以不世出之資當大有為之運勵精求治德日新矣而其效未見何也非不勤勞也非不恭儉也非不專任宰輔非不寵遇將帥非不強兵非不理財非不求言非不聽諫非不下詔哀痛惻隱以感人心非不遣使卑辭厚禮以交鄰國堯舜文武之正道漢唐賢君之盛德陛下皆祖述憲章而躬行之也凡可以臻今日之治紓今日之急者蓋無不為也然而天意未甚順人心未甚孚事力日困土疆日蹙九廟灰燼之恥未雪也二聖沙漠之狩未回也陛下鬱鬱僻於蕞爾之吳其故何哉必有由也陛下亦嘗深思而熟究之乎厥今天下之勢如久病之人非不求醫而扁鵲之效未著也非不用藥而狼毒烏啄之類或進也增其病而速其危可不哀耶嗚呼萬世之安望陛下早圖之也臣愚戅淺薄豈有深謀逺慮以禆陛下之聰明以定天下之禍亂以贊中興之盛德晝夜思計十年於兹矣原其病察其脉據方用藥竊自謂薄有所得力微身逺無從可達今䝉收召且命之對此時不言何時言耶倘䝉陛下賜清閒之燕容臣委曲敷陳展盡底蘊庶或有一得之可採若以為迂濶之言不可行則臣當乞骸骨老死山林無恨一論政事本末昔周宣王之復古也內修政事外靖烽烟惟內修政事故能外靖烽烟茍政事不修則敵國交侵矣安能靖之哉金人侵陵吾中國十年矣而我攘之不能去何也其未修政事耶夫政有小大事有本末先大後小先本後末則得之言政事者莫不以兵為先者也廟堂之上朝夕議論者兵州縣之間星火奉行者兵士之所陳者兵農之所瞻者兵商之所助者兵工之所稱者兵無所往而無兵蓋曰今日之禍如此非兵不足以攘之也其於政也小耶大耶其於事也本耶末耶竊謂兵不可去然非所先也詩曰矢其文德洽此四國孔子曰逺人不服則修文德以來之兵法曰文能附衆武能却敵亦先文而後武其所謂文者非簡牘之空言篆刻之小技君君臣臣父父子子兄兄弟弟夫夫婦婦四民安其業萬物遂其性大綱小紀本微末廣皆文也是乃政事也今皆修之歟其亦修而未備歟孟子曰蓋亦反其本矣又謂梁惠王曰王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝弟忠信可使制梃以撻秦楚之堅甲利兵矣又謂梁襄王曰天下定於一不嗜殺人者能一之又謂齊宣王曰今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗孰能禦之今能如孟子之言修其政事則正氣實邪氣不能入彼禍患不待弭之而自弭區區復古之宣王何足為今日道臣故曰兵雖不可去然非所以先也惟陛下留神省察勿以為書生迂濶之言而忽之也一論兵臣山西人也雖自少學讀書而風漸氣染馳馬試劍亦兵之是好及遭艱難䝉陛下委任假以兵權謂敵國可以氣吞功名可以唾手取也分薄數奇跋前疐後訖無所成立閒居退處歷觀古人用兵之不如也如此易之萃曰除戎器戒不虞兵之不可去也又如此雖然大抵用兵之說有三焉兵貴合不貴離兵貴精不貴衆兵貴速不貴久兵合而不離則其心和其情通若手足之捍頭目子弟之救父兄少長有禮其行如賔所謂守則固戰則勝者也兵精而不濫則其氣鋭其勢倍進如江河止如山嶽攻無堅城戰無強敵所謂百戰百勝者也兵速而不久則其志果其計决出如雷霆動如發機役不再籍糧不三載所謂勢若從天而下也反此則非惟不能成功未有不敗亡者也唐九節度兵一日皆潰非離而不合之謂乎尋邑百萬破於光武孤軍非衆而不精之謂乎髙克之師過期自潰非久而不速之謂乎夫文武一怒而安天下之民晉文公區區圖霸亦一戰而不多戰更願陛下養威蓄鋭待時之至合大兵驅精卒赫文武之一怒而不留行則妖氛靜境土復諸夏安陛下可以垂拱無為矣其數出易動乍勝乍負兵家之大忌也望陛下深軫聖念天下幸甚一論形勢臣聞立國必處形勢之地強國必資形勢之利守國必據形勢之便處之得其地則民心歸資之得其利則財用足據之得其便則軍聲振蓋形勢者天下之大本若人之有血氣木之有根基水之有源流謀國者不可不知也故古人言形勢者或謂之上流或謂之噤喉或謂之四肢其緊慢急緩殆可見矣今天下十失七八所謂咽喉腹心上流者皆為敵人所有區區吳蜀乃一肢爾尺寸之地又非昔時之吳蜀也自古吳皆以夀春荆襄為上流蜀以漢中金洋為咽喉故時方用武則遴選英奇屯宿重兵尺寸不以假人今襄陽千里蕭條有兵不能自養梁洋田壠丘墟置之不復為意今日之天下所以守則不固戰則不勝惴惴然不自安者殆謂此也兼梁洋東徹陜西極洮岷北臨三秦南壓九江表裏山河可戰可守乃天下脊也捨此不圖欲舉一肢以活四體非徒無益適所以害之爾臣願陛下深軫聖慮早定大計勿使狂夫據之倒持太阿乃有噬臍之悔天下幸甚三朝北盟㑹編卷二百十
