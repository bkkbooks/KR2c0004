body:
  text: 三朝北盟㑹編卷二百三十八宋徐夢莘撰炎興下帙起紹興三十一年十一月一日己巳盡八日丙子十一月己巳朔王彥入虢州王彥自啇州遣發官兵㑹合虢州十月丁卯收復朱陽縣招降到縣令奉議大夫劉楫啇州都監供奉班祇候王元賔已到虢州城下僞知州蕭信出門迎敵不勝遁去官軍遂入虢金人攻無為軍先是知無為軍韓髦移治在荻港唯總管倪夀率民兵在城中金人犯無為軍夀率民兵皆走城中居民先以驚移為之一空巫師吳椿年者病傴僂不能行獨隱于嶽廟中金人唯十八人入城至嶽廟前椿年出唱喏其帥問曰爾為誰椿年曰軍學進士吳椿年聞郎君到來不敢藏避願得投拜其帥喜曰命爾為知無為軍候下江南當以爾知太平州椿年拜謝引金人悉入軍治登譙門繫其帥馬于門下椿年指民居曰此為誰氏此為誰氏其帥喜椿年請詣其家取某物為獻其帥許之椿年下譙門見無人相隨遂解其馬急乘之馳出門去其帥與十七人步追之顛踣損腰椿年知崔臯將至走報臯且以馬贈臯使速進兵臯以銀五兩酬椿年即率兵以進别以馬載椿年金人見官兵將至悉遁去唯其帥損腰不能行即舁入南禪寺輪藏下臯等入城椿年得其帥以獻臯臯贈年五千臯大張其功作殺退金人生獲呼蘭貝勒收復無為軍報捷俄縱軍人入掠居民取遺留之物民不堪之臯轉三官民怨臯之縱兵劫掠也乃訴臯冒稱功伐掠民舍事遂寢其賞不行取呼蘭貝勒赴行在二日庚午金人遊騎侵及瓜州是夕金人攻瓜州權都統制李橫統制官劉汜率衆迎敵用克敵弓射之金人燒瓜州驛亭而去探報逆亮細軍已屯駐和州雞籠山矣欲臨江築壇刑馬祭天尅日渡江知通州崔邦弼棄城復回崔邦弼以右武大夫吉州刺史知通州初建城科擾百姓苦之邦弼常言如有警當以死守修城畢畫圖以獻于朝議者短之金人已占揚州邦弼失措通判趙不悔十月戊辰出城先遁去以次郡縣官已逃去己巳質明邦弼欲出門遁去百姓畢起吊橋遮道相與責問邦弼以謂知府修城約以死守今欲前遁使百姓受死于城中何所恃賴邦弼語塞為之少留出官錢散官吏軍兵為姑息自全之計庚午邦弼密令卒夜半縱火人皆趨救邦弼因得縋西城而去城中軍人剽掠幾至生變大辟罪人王十九等四名皆竄去常平提舉王珏聞變遣料角統領官盛佺等將兵四百餘人前去彈壓令邦弼使喚已而省定邦弼遲疑數日不得已復入城三日辛未知樞密院事葉義問行至鎮江府遺史曰葉義問以知樞密院事來江都親乘大座船以使臣二人執器械立馬間左右見者無不笑義問以儒術自許有姪貞卿者常語人曰方今儒將家叔知院一人而已義問至鎮江聞瓜州官軍與金人相持已皇遽失措時隨行有統制輔逵來忠信數人諸統制共坐間有樞密吏劉子忠忽問曰大江之北即是金人重兵何以卻之逵應曰無兵國家勢弱無法可以卻敵在旁聞者皆掩鼻義問漸發間探者過江且載銀帛犒設諸軍是時冬月江水低沙洲皆露義問役民夫掘沙為溝可深尺許沿溝栽木枝為鹿角數重乃曰金人若渡江來且以此攔阻之聞者無不大笑民夫且執役且笑且言曰樞密吃羊肉其識見何不及我吃糟糠村夫一夜潮生沙溝悉平木枝皆流去矣義問得知建康府張燾公狀告急金人侵及采石為渡江之計其勢危急日下火急起發前來保守江渡臣僚奏請致祭于山川神祗臣僚劄子奏竊謂陛下飭躬修德宜可以勝强暴欲望聖㫖發使人降祝文御香告祭沿江祠廟使皆受職同力保護以固江左倣昔謝元禱八公山祠故事臣願陛下即行之又臣僚劄子竊謂天下威靈顯著血食廟廷載於祀典者願令州府分詣致禱四聖五嶽之神威靈尤顯著者饗于克誠二百餘年矣豈不能護國家惜生靈掃除天下妖孽乎願令宫觀設位致禱務䖍恭嚴潔冀蒙隂助以速萬全之喜有㫖並依其合行事件令禮部太常寺疾速條具申尚書省張子顔獻助軍務各與轉一官韓彥古獻助米一萬石與合入差遣四日壬申葉義問起發是日義問離鎮江三十里宿下蜀鎮至未時後有流星急遞馬轉報淮東總領朱夏卿竹紙手帖云自食後有金人侵及瓜州與官軍接戰至申時官軍敗退潰散瓜州渡為金人所據行府以金亮克日渡采石故且急往為建康守禦之計李橫及金人戰至瓜州鎮軍敗統制魏友王方歿于陳金人欲奪瓜州渡以重兵直搗瓜州又分兵各路向東徑抄江頭自江頭逆趨瓜州都統制李橫引諸軍迎戰葉義問督鎮江駐劄後軍渡江衆皆以為不可義問强之未著北岸義問懼怯之狀見于顔色即時向西去曰欲往建康府諸軍起發耳市人皆媟罵之金人兵勢甚重中軍統制劉汜提本部兵先走諸軍不進橫以孤軍不可當亦倒卻於是背印使臣不歸失其都統制印金人追官軍壅路不能行舉手就披膞遮其頭靣往往中流矢綴腕于額衆知不可當遂涉運河過河西亦奔走得脫金人以鐡騎掩至江上左軍與後軍皆沒于江江南人望見皆失聲而哭其聲震天地後得左軍統制魏友之尸于湖中得後軍統制王方之尸于栁林中皆金瘡被體朝廷賜廟額為之立廟魏友王方之死也發憤報國力戰以喪其命乎與士卒旅進旅退不得已而死乎廟食不朽姑為一時之激勸也劉汜錡之姪也錫之子也性驕傲不曉兵事唯習膏粱氣味如癡騃小兒每洗面用澡豆面藥玉女粉之類不下六七品凡奉其身者皆稱是錡狃于順昌之勝謂金人為易殺欲效謝安之舉幼度使功名萃于一門遂以為中軍統制殊不知任重致逺倘非才則反誤大事此劉汜所以望敵而遁走也義問至柴溝又聞金人在采石之報欲復回鎮江又問向裡山路可以通浙東否諸軍皆喧沸曰樞密到此不可回回則有不測左右執事者皆懼恐變生不測乃請義問速趨建康遂趨建康張浚判建康府不許辭免知建康府張燾召赴行在賜張浚詔敕張浚省所劄子奏辭免復觀文殿大學士判建康府恩命事具悉朕惟用人之法當求終身大節而不責一時之疵故鮑叔得管仲於三北之餘而秦穆用孟明於一敗之後風績之著書傳可傳卿夙負大名蚤登三事一跌厯年兹者棄舊圖新思有所施屬封疆之多壘方帥閫之須才坐禦邊衝無易舊弼爰寵還於祕殿俾作鎮於巨藩遽覽來章欲回受命乘時機㑹豈惟復鴈門之騎輔豫艱難庶幾雪渭上之耻往承茂渥毋或牢辭所請宜不允不得再有陳請故兹詔示想宜知悉冬寒卿比平安好遣書㫖不多及五日癸酉葉義問至建康府趙樽發蔡州趙樽已得蔡州方四五日忽被成閔移文報奉詔總諸軍併舟師援江上留樽一軍守蔡州辛未樽遣李詢㑹成閔癸酉又被移文令樽亦歸乃以李詢為知州樽遂以本部兵歸詢蔡州人以從義郎在鄂州軍為部將都統制吳拱令詢同皇甫倜往信陽軍招忠義人取蔡州樽自信陽取蔡州故詢在其軍中樽以丙子到麻城被㫖依前駐劄蔡州六日甲戍詔諸軍逗撓失律召成閔代劉錡罷王權赴行在奏事差池州統制李顯忠代之曾王劄子言信賞必罰上曰賞罰誠人主之大權昨來王權臨陳退衄朕已逺竄今成閔李顯忠吳拱三人大帥制置招討之命宜即批㫖便除以示懲勸王權罷都統制赴行在王權自和州退兵江南也葉義問奏權不合退軍是時金人已在楊林計置渡采石矣㑹有㫖令義問差管押權赴行在權乃去軍都提舉張振權主管軍事李顯忠為建康府駐劄御前諸軍都統制七日乙亥與金兵戰鬪等並為戰功勘㑹從來戰陳除殺金平和尚原大儀鎮順昌府明州城下立功人外餘不得為戰功人緣今來用兵制敵理宜激勵乙亥有㫖應諸軍等將士但與金兵戰并守禦立功之人並與理為戰功虞允文到采石趣李顯忠等交割王權軍馬虞允文先往采石趣李顯忠交割軍馬去采石五六里道遇王權敗兵各鳥獸散虞允文訊之皆曰我輩昨隨王統制只聞金聲不聞鼓聲蓋權未嘗與敵交鋒惟是走耳是日敵兵進迫大江鼓聲動地尅初八日渡江采石瀕江居民震懼竄伏吏士無人左右止允文曰事已至此欲何之允文叱曰今日國家危急如是我豈得不身先士卒遂䇿馬疾馳到采石人心頗安遙見北岸敵軍列寨連亘不絶我軍奔敗之後部伍絶無紀律虞允文造其間㑹見官兵虞允文勞之再四因問王權敗北之端皆曰非敵之善戰蓋緣只是走耳未嘗見陳虞允文因激勸敗卒曰萬一金兵衝突公等戰乎衆皆嗟吁指北岸曰彼勢如此誰能以身犯必死乎虞允文徐曉之曰敵萬一過江爾輩措足無所雖走亦何之今怯戰亡走亦死戰亦死等死不如一戰冒萬死求一生轉禍為福因敗成功况朝廷衣食汝輩二十餘年緩急乃不能死戰以報國家乎衆因允文語慷慨發憤曰今雖欲戰奈何無統將主其事虞允文覺其可勸喝言汝輩止言王權謬妄致此今朝廷已到選交割王權統軍馬衆愕然曰誰可將者允文諭之曰朝廷差某來趣李顯忠交此軍事與李顯忠如何衆合掌曰得人矣允文又諭之曰敵謀來日過江勢已迫急諸人當戮力官家已發內藏庫金銀錢帛并節度承宣使已次官告在此賞給有功者衆皆曰誠然我輩當盡死力轉相勸語須使各軍皆奮臂首爭死敵虞允文因勾集戰艦揀選水軍五千連小舟排護岸下以船當前終夜整齪金主亮築壇祭天乞風取來日渡江金兵築壇于采石兩岸金亮登壇牛羊黑豕白馬各一祭天禱江乞風取初八日以濟因使僞參知政事李通跪壇上口占檄文招王權曰吾提兵南渡汝昨望風不敢抗拒深知汝懼嚴天威吾今至江上見汝南岸兵亦少止緣吾所用新造船與汝南岸船大小不侔兼汝操舟進退有度甚協吾意汝能盡陪臣之禮即率衆降大者官小者賞後若執迷不返吾渡江戮汝無赦虞允文復遣所獲北人賫書諭之曰王權以不曽一戰朝廷已行竄責矣今統兵官乃前執二太子者李世輔更名顯忠并前奉使一箭中的虞允文同在此汝欲來校勝負此亦有以相待八日丙子中書舍人虞允文統制官張振等大敗金人于楊林遺史曰金人得和州完顔亮親率大兵臨西采石楊林渡已數日王權軍于采石相拒知太平州王傅者殊不介意傅與權猶蔽匿不以奏聞兵官幕職官或有請給器甲與軍兵令防城者傅曰不須如此張皇傅自與金人無讐必不見殺其語播于城市中城市之人皆知傅有不能盡節之心州學學諭汪餘慶白于教授蔣繼周曰餘慶請與先生同見太守乞為守備繼周曰太守敢以無禮之言折人使人不堪奈何餘慶曰甚易也若果然先生但言滿城之人皆言知州是細作若不為守偹則市人之言不其然乎繼周然之與餘慶同往傅言有軍期急事傅果怒而出曰教授何故如此逼脅州府繼周曰滿城之人皆言知州是細作宜急為守偹以破其說不然恐生變傅默然氣奪繼周餘慶遂勸傅申發文字報朝廷傳從之一日發八遞第一遞報金人已逼采石不言東采石西采石遞到行在朝市大驚五房院六房院堂吏盡般家屬出門城市間皆謂知邉報的確者無如五房院今既般家而去事可知矣遂驚移不可禁止第二遞報金人已到楊林而不言楊林渡朝廷檢視冊不載楊林去處莫知楊林在江南江北朝市無不驚憂者朝廷遣人於閭巷間尋太平州和州人詢問楊林所在是夜二更後方得一士人具言楊林乃西采石之渡口也憂疑稍定金人在楊林築臺于野亮令諸軍拈卷子取死事五百人先渡大江就楊林進船乙亥亮刑白馬祭天當塗之人日逐往采石臨江以觀之者不啻數萬丙子有采石之役愚常用心稽舊采石事實質之于士人僧道軍兵啇賈官員觀謄報之功狀考一時之記録莫不張其聲勢大其功伐皆不可取信惟太平州及東采石之百姓所言者不約而同蓋其所親見而又無容心于毁譽也愚取之遂為定說不敢誣天下亦不敢誣後世也曰丙子晨隔江見楊林渡金人築臺四旁有黃黑烟突起人皆莫曉其所謂或曰昨日刑白馬祭天今日祭風欲出船渡江耳少刻烟漸微細而青白色辰已刻之間有紅傘登臺亮在其下有繡旗環繞之俄聞樞密行府有參贊軍事中書虞舍人到采石市中吃食乃允文也或走報允文請臨江督軍允文至江口是時風色已作人謂金人祭風果應乎望楊林口有一舟出江相次尾首相銜而出凡出十七舟楊林口忽生沙塞斷江口餘舟皆不可出允文命發戰船有水軍蔡將韓將二人各有戰艦一艘皆唯唯不動乃急命當塗民兵登海鰍船踏車每舟有兵數人發十海鰍往迎之允文坐蛾眉臺中戰灼幾不能止軍人皆說諭民兵曰此是必死之地若齊心求生萬一有回歸之理民兵皆然之風色忽止官軍以海鰍衝十七舟舟分為二官軍呼曰官軍勝矣遂皆併殺金人金舟其底濶如廂極不穩且不諳江道皆不能動手其能施弓箭者五七人而已遂盡死于江中有一舟為水漂流至薛家灣者采石之下數里有王琪在焉以徑弓齊射舟不得著岸舟中之人各中一二百箭往往綴死尸于板而死取金人之舟視之乃用和州民舍拆板而造者每舟可載二十人板木釘灰皆不如法其敗故宜也是役也金人有四十舟在楊林出江者止十七舟官軍止有海鰍十艘迎戰二戰艦終不出允文追蔡將韓將各鞭一百金人死士五百人不死于江者亮盡數殺之怒其舟不能出江也初亮問上年烏珠何以渡江或答曰烏珠自馬家渡渡江江之南雖有兵望見我軍即奔走船既著江岸已無一人一騎亮曰吾渡江亦猶是矣及楊林出舟當塗之人在采石上下登山以觀者數十里不斷不啻數十萬人亮隔江望之吾放舟渡江而山上人皆不動何也當是之時爭戰之聲方厲安危之機甚切而人皆罷其業離其居而樂觀之既而連亘數里駐足不動遂成江南壁立萬仞之勢豈人力能使之然哉蓋天實為之也允文進劄曰蒙聖恩令從江上今月六日抵建康次日准葉義問差臣前來采石㑹李顯忠并給犒建康所屯御前軍馬臣于八日午後到采石見江北金兵甚衆極目望上下二三十里不絶鼓聲震地臣即時躍馬至岸口與諸統制相見北岸有一髙臺臺上大紅繡旗黃旗各二左右行立中有大黃蓋有一人服金甲以大床坐其下問云此金主也昨已登臺祭天刑白馬與諸將盟矣兵號四十萬馬數倍之臣與統制官張振等共議列馬步兵為陳靜以待之分戈船為五以其二傍東西岸行其一駐中流載精兵以待戰其二藏小港中以偹不測擺布僅畢忽聞敵衆齊聲發喊金主親執小紅旗麾數百舟絶江而來未頃刻間已有七舟遽逹南岸敵登岸與官軍戰臣往來行間再三傳令激以大義許以醲賞步軍統制時俊先登軍皆殊死鬪俘斬既盡而戰于江中者艨衝相擊敵舟皆平沉水死者以萬數天色向晦北岸鼓聲乃止敵引餘舟遁去臣等尚慮其詐不敢以兵掩其前但以强弓弩襲其後追射之敵兵傷至夜師旋計其岸上之尸凡二千七百人射殺萬戶一人服紫葺綿甲注絲戰袍生擒千戶二人金人三十餘人餘皆伉健者臣度敵未必遽休而采石之舊將已去新將未至當軍情危疑間金兵鼎來臣不當便引去暫且留此與統制官同謀戰守須俟一大將至有所分付乃敢還建康仰乞陛下特寬憂顧臣無任激切皇懼之至九日又奏劄曰臣觀所用之船皆如州縣渡口雇駕者誠不足以當官軍戰艦又逐船惟滿載敢死士意在直截來奪岸口初不為水中戰具也以昨日之戰敵有旗頭為官軍斫斷其左臂尚能以手持小旗麾其下進戰久之乃仆地死餘人之伉健可概見矣諸統制欲於瀕江掘塹濶一丈五尺深八尺以防敵兵奔衝上岸及更夜潜渡之兵見役丁夫開堤數百丈以土衛內堤官軍立於堤上既有所捍蔽又無遁心可以固守也臣聞臨陳易將自古忌失士心李顯忠素有人望黜陟之間無不仰服睿斷聖明金兵既敗采石官兵虛弱盡兵力如此臣豈敢愛身遽自引去比者戚方已約分兵船親來㑹合采石成閔軍非久到官軍既合决可以破敵不獨守江而已臣俟李顯忠到一一議定續具奏知此允文之二劄也三朝北盟㑹編卷二百三十八
