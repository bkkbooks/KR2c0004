body:
  text: 三朝北盟會編卷一百六十宋徐夢莘撰炎興下帙起紹興四年七月盡其月臣竊見邇者宦寺之權太盛其非所謂澄本正末明理安分歟夫本既不澄末將若之何理既不明分將若之何理既不明下之蘖漸萌而不可制也然上古設是職也豈謂是哉陛下必知之矣又安有委之以事任之以權遵之以師傅之重乎自周而下至于秦漢隋唐守成之君喜便佞親近習而執政以為君側之人不敢相制授受之際俯伏聽命而已至喉舌之命臺省之任一關其手于是乎宋有伊戾齊有易牙秦有趙髙漢有張遜遂至于竊攘威柄傾覆神器夫朝有一臣尚至于如是况師保傅者盈于道路乎專位奪權疇克免哉昔漢明帝以郎官為應列宿而不肯輕授况三公之貴重哉而又委任華重名動四方營造私第強奪民産名園甲舍雄冠京輦賣官鬻爵貨賂公行人不敢言道路以目蓋以位髙而不可抑勢大而不可制也在漢唐之世骨鯁之士交章上疏力爭于朝雖死不顧尚不能奪其權而沮其勢况默默而不敢言者乎傳曰富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至者言愛人富之而不得其制也夫物禁太盛日盈則昃月滿則虧理之必然也陛下既愛之寵之須使有克終之美無有顚覆之患不可過分踰制少有罪釁有輟瓜竊車之怒于是雖悔何及又安能保其富貴哉前日所欣之敗乃其驗也臣之此言雖甚妄狂恐亦可以為書紳之戒臣愚以為入仕之源太濁者蓋緣宦寺之權太甚何則入其門者必驟升朝列靡有資限鮮亷寡耻爭趣競進致名節之士髙飛逺引如此則仕進之源無時而可清也不急之務太繁者亦宦寺之權太盛何則領職之官託親近以為威權假出入以為禍福徒知𣙜貨之務入千萬殊不知四方府庫日以殫竭止欲求媚聖意輕搖上心今年以何第可修明年以若苑可葺興工董役以春繼秋伐木空山運土塞路農民失業曽不加惜耗國蠧財莫甚於此如此則營繕之局無時可已也官人以爵而有司不敢問其賢否刑人之罪而所屬不敢究其是非上忤聖聰而多蒙赦貸下觸權貴而禍不旋踵使天下之人惟知宦寺之權重而不知天子之道尊傍其門墻獲其引用者難若登瀛及其取聖旨獲內降易如反掌使天下之人惟知宦寺之門髙而不知九重之禁嚴密勿謂上有明聖之君下有賢能之臣今日諸公皆忠義之士必無異日之患欲為萬世之計者安可不審慮而預防之古人以謂履霜堅氷至又曰無使滋蔓蔓難圖也其旨微哉其慮深哉臣復以李唐之事言之其孽起于神龍其釁成于天寶至于代德之後大權一去不可收復于時思之可不痛哉臣又聞侈心欲萌則忌正人侈心已汰則惡直諌自古帝王有此者不惟後時之悔殊不知近君子者雖嚴正可惡然其志則常以天下為己憂近小人者雖美愛可好然其意則欲以天下為己奉以天下為己憂者則以勤儉為先欲以天下為己奉則以驕奢為尚以勤儉為先者易以安其安必久以驕奢為尚者易于敗其敗必速臣伏聞投論獻書者必于􅌖思殿看詳然後敢進稍有觸忌諱即寢而不上又不知藥不苦不足以治病言不切不足以正非下情壅遏而不通非平治之世所冝有也祿養之臣畏罪而不敢言四方之士欲言而不能達是終無可言之時也更相蒙蔽亦非平治之所冝有也曩者常聞蔡絛獲諌父之罪臣居草萊之下不知所言者何事臣惟聞古人有言曰父有爭子則身不陷于不義又曰事父孝故忠可移于君觀蔡絛果能以國家之事言之于父其于家則為孝子不可為逆父于國則為忠臣不可為謗君可謂一舉而兩得之矣蔡京之有是子也陛下當慶大臣之有子賜手詔褒美奬其後進可也不應嚴賜貶責以沮忠孝昔唐魏徴之孫謨纍言朝廷之得失史臣以為有祖風遂有是以似之之美狄仁傑之孫兼謨封還詔書文宗面諭之曰後或有事不可勿以還詔為憚也又狄梁公之後當副家學不可不勉兹皆美大臣之有繼也張説乃唐之賢宰相也及其子洎輒以諂敗房琯遂有滅族之歎尋亦見刺于史臣元勳之後克有其子者幾何人哉臣常歎方今無忠義之士見有此等事即競口而非笑焉陛下又從而譴之使欲言之臣相與語曰蔡京尚被薄責我等孤寒少忤聖慈必蒙重戮即竟退縮而不敢前矣如此則是鉗天下之口也臣恐國家之利病無自而遍知聖人之聰明無自而昭徹矣陛下聰明仁聖豈逺堯舜制事致法欲革千載之弊當以古為鑑焉虞舜所以明四目達四聰者亦防壅遏之弊也乞檢會臣政和五年正月初六日及六年九月初七日所進之書參賜詳酌或稍可採逺方之獻一切絶之土木之役無使復之仕進之源嚴賜精選宦寺之職立以資限千載之典陛下一旦皆興復矣其節制作乞權賜省罷候年嵗豐登倉廪充積然後議實億兆之幸也倘以狂妄寒生輒敢以亂世之事方之盛明之朝則臣之罪萬死矣亦乞斬臣頭以令于市使擅權之人相與語曰我等竊弄威權果來天下之言而今而後亦冝少戢雖不能驟奪其權亦足以少沮其勢兹亦助陛下持綱振紀之萬一也嗚呼撼翹翹之木者不量力撲炎炎之火者必自焚臣非不知今之萬死不可逃臣切以謂國有直臣天下無慮狂夫之言聖人採焉陛下今日之失臺諌之臣知而不言即為罔上不知而不言即為曠職彼乃自持祿養以專事沉默而不敢言豈陛下務自勝而惡聞過哉臣切恐萬世之下擬議為矜能護失杜絶言路之主不得與堯舜齊驅並駕臣所以捨一介草茅之賤命當鼎鑊必死之嚴誅願陛下念臣眷眷之意少加聽採則天下幸甚臣無任冒死上言上宰相書某聞人之病以藥為醫國之有病以言為醫當醫于未病之前若言不可發于己危之後某觀今日之病雖未至于膏盲亦不止于膚腠矣閣下國之良醫也某願持砭石為左右之助焉閣下能納之乎然某亦嘗不避誅戮上言天子矣或者謂匹夫之賤欲千人主之知者常以諛言軟語揄揚聖德歌詠時政假左右之人為之先容然後可以致身于青雲之上今某無名之賤士不能附權貴敢以逆耳之言上瀆聖聰是猶一縷之絲引千鈞之重可謂太不知量也縱纍言千萬又焉能達九重之深哉將立見誅戮矣愚殆以為不然夫古之明盛之朝好賢喜士聞一善言固有朝奏而暮召者縱有觸犯忌諱或不蒙貸罪亦旋至安有寢而不報某上書待罪已久竟亦無報使狂狷之人愈生憤悶而不能自已也然區區之意以方今之弊有三入仕之源太濁不急之務太繁宦寺之權太盛夫入仕之源太濁皆緣宦寺之權太盛而致然固當以立資限而澄其弊焉今也既不能達九重之深當求其宰相之賢副天下之望者進其説欲為萬世建安之䇿非為一身而求進也將欲圖天下社稷之利也某竊以謂古帝王多恃一己之聰明不為後世子孫之計起苴造罅言不加恤及其釁成業大方有後世之悔某雖家貧于就養不能遍覽羣經然初嘗馳騁乎古今上下粗厯古人之事愚試言之自三代而下莫盛于漢唐功德之隆者莫先乎武帝光武明皇後世之言人君之聖者亦必以是三君為言也某以為敗漢唐者亦是三君也徒以我之聰明人莫己若駕馭閹宦若身之運臂無適而不隨假以機密漸漬成風致子孫有不可制之勢也殊不知釁起于當時也武帝數燕後庭潛離館所論奏機事者多以宦人主之至元帝之世遂有顯恭之徒蕭周之禍光武起中興之功要官悉用閹人不復雜他事延平之後委用漸大鄭衆之徒參謀禁中同惡相濟中外服從搖亂區夏漢亦尋滅唐明皇享升平之日久財饒志足賞僣爵濫委用閹宦若父之愛子無欲不從委以要職分提禁兵延及肅代專倚捍衛至于天祐大權至不可收復三君産漢唐之禍章章可見矣我天子聰明仁聖當遏亂略于將然杜姦邪于未能烏可起苴造罅蹈是三君之失哉某以為人才混淆財賦不足緣宦寺之權太盛不惟此也又恐後世有難制之勢亦緣今日而起也某所以言尤切焉夫日奉禁廷以承宣太尉為不足必以師保傅為可出其門下者以小使臣為可羞必以團練觀察為足意持節傳命恩固主心伸縮有輕重舉動搖山嶽其間甚者有挾氣術之野夫談命書之賤士或以伶倫而見收或以談諧而獲用或以花石而得官或以煎茶而被命出則奔馳于馬足之後塵入則俯首于尊爼之前列悉皆橫金衣紫雜處朝端又有能承顔順意奉一時之歡笑者既蒙不次之升擢又獲無窮之鍚豫論其才則無有也又無簮纓之後裔挂藉之名儒口談先王自以身為孔孟語其名節則掃地矣悉沐身薰手願出其門得預姻婭之列者舉族相慶巨鎮雄藩請為其使削百姓之膏血供無厭之須求奔走饋送動以萬計雖身為禁役之貴人名出于宦寺之門下出擁騶從氣意洋洋入同僕𨽻則志趨齷齪竟為鄙佞貪沓之士殊無蹇蹇諤諤之節人為之羞已不知耻如此則仕源不清蓋可見矣夫天下之物取索有窮內苑之欲追呼不已邇者聞天子之本懷必牽于左右之懇請敗國蠧政莫此為其夫修功德市禽鳥採花木徒知九州之珍玩畢集于庭殊不知四方庫藏日見殫竭南金和寶惟貴得而後已豈較數之多寡氷紈霧縠又且索以非時豈念民之雕弊土木被丹雘狗馬被文繡及其民卒流亡恬不加恤月俸節而不支軍儲支而不繼則財賦不足亦可見矣夫朝廷所以為朝廷者綱紀而已曷為綱紀不過重名器公錫豫威不上屈勢不下遷耳人之所以為人者名節而已曷為名節不過嚴分守重進退得志獲時則出以為人志不得時不獲則隱以伸道不為勢屈耳以今之錫豫出于私其如紀綱何引用非其人其如名節何且人所畏者罪與死也人所欲者冨與貴也某觀今日之勢罪與死為易得富與貴為難求何則宦者用事各立黨類忤其意者害出而禍從出其門者職遷而官驟其易得難求之勢昭然見矣罪與死雖易得在愚之不畏富與貴雖難求在愚之不茍某安能默默無言乎閣下天下之望也日與天子坐而論道者也民有疾苦賴公救之綱紀不修望公提之百官不正賴公董之雨暘愆期望公調之夫富國安民量才任職者宰相之事入以諌其君出不使人知者人臣之節也古人有言君子居其位則當死其官未得其位則當因辭以明道我將明我道也閣下其如何哉倘上以社稷為念為憂請立為天子言之當以漢唐而為鑑無肆目前之欲階後來之禍故當杜于未萌不可悔于已兆或恐翹君之過傷堯舜都俞之好不欲面折庭爭亦乞繳某之書以進之天子使嚴誅戮身雖死而名不滅又聞龍威車騎私出韓愈以謂馳車馬于巇嶮之地驟龍騏于溪壑之中內人與獵士通衢大軍與凡庶爭路天下其危乎遂志禁從之貴進切直之諌著布衣待罪于東上閣門而終不加罪今天子聰明仁聖既無漢唐之過閣門之賢又非韓愈之可比倘或專事沉默而不言又不繳某之書以進之于天子則將焉用彼相矣可謂上塞而下聾矣其如天下社稷何閣下曽聞魏元忠乎亦唐之一賢也晚節稍憚權幸不能賞善罰惡楚客以布衣之賤拾當時之失以激其志言終不聽而名節隨喪卒為萬世之罪人良可惜也願閣下無繼元忠之失不以貧賤而棄其言不唯今日之幸亦萬世之幸也三朝北盟會編卷一百六十
