body:
  text: 三朝北盟㑹編卷一百二十九宋徐夢莘撰炎興下帙起建炎三年五月九日丙戌盡六月七日甲寅五月九日丙戌改江寧府為建康府詔曰建康之地古稱名都既前人創業之方又仁祖興王之國本繇大邸光膺寶圖載惟藩屏之名實符建啓之兆蓋天人之久屬况形勢之具存興邦正議於宏規繼體不失於舊物其令父老再覩漢官之儀亦兾士夫無作楚囚之泣江寧府可改為建康其節鎮之號如故張浚往撫諭淮南四日己丑薛慶知樞密院事張浚罷知樞密院事為提舉杭州洞霄宫張浚以樞密之職往淮南撫諸賊至髙郵軍薛慶郊迎入城見浚之貌慶曰豈有如此樞密耶遂執之朝廷聞之乃罷浚知樞密院事為提舉杭州洞霄宫浚隨行有陜西兵多遭殺者慶逼浚之所齎官告三千道而館之初薛慶之執浚也屢欲殺之其黨王存勸止之曰真僞未可知恐殺真樞密則異日欲歸朝廷其可得耶慶然之浚遂得歸復為樞密院事行狀曰盜薛慶嘯聚淮甸兵至數萬附者日衆公以密邇行闕一有滋蔓為患不細且聞慶等無所係屬欲歸公麾下請往示大信以招撫之渡江而靳賽等率兵降遂趨髙郵入慶壘從行者不及百戶出黃榜示以朝廷恩義慶感服再拜始公入賊壘外間不聞公信浮言胥動頥浩等遽罷公樞管及聞公訖事還即日趣公歸且詔就職京西北路總管翟興及楊進戰於汝州魯山縣殺進楊進入河南府固守於鳴臯山之北山翟興及其子琮屢擾却之使無寧息至是不安其巢穴遂棄輜重趍南路興分衆邀擊於汝州之魯山縣賊以精鋭迎興於婆婆店酣戰久之進死於陳中其衆皆潰興之軍初為藥箭羣發併中進及所乘馬皆斃進之衆以為徒黨自殺之自是賊之餘衆復立劉可為首翟興克河南府翟興既敗楊進遂平京西南北兩路收復河南府由是躬率將吏至永安軍朝謁諸陵將士至陵所皆泣下感愴不已翟興保奏李興功特補武義郎兼閣門宣贊舍人李興孟州王屋人世為農業體幹魁桀有勇力寡言語尚信義二帝北狩興以保扞鄉里聚衆萬餘元帥府統制官常元以為義兵統領車駕南渡陷沒興往來懷衛間攻劫敵寨斷絶糧道於牛心寺竹林河等處京西北路置制使翟興遣吏人以書幣迎之遂聽翟興節制知河南府長水及破楊進興保奏特補武義郎兼閣門祇候京城留守杜充及郭仲荀藺整吕勍奏陳乞還闕張用等侵京西王善擾淮西楊進已死京畿稍寧靜充等乃上表請上還闕不從劉洪道為京東路經略安撫制置使上以京東隔在一隅劉洪道在青州屢騰奏牘方倚洪道經理京東乃除京東經略安撫制置使併命宫儀知濟南府召閻臯赴行在仍賜詔戒諭密州李逵等使之報國賜戒諭李逵宫儀張成等敕書敕李逵等朕惟金國慿陵山東震擾保此數州之地皆由諸將之功爾等夙著忠誠各應委任宜互傾於肝腑以同奬於朝廷速底成功是為報國八日癸巳詔從官條具利害詔從官條具利害侍從有獻幸蜀為長策者上籌之未決御史中丞張守上疏曰東南為國家根本之地陛下既逺適則奸雄必生窺伺之心將士陜西人往往勸為此行以蜀近關陜可圖西歸此不過將士自為計耳非謂陛下興國家計也併陳其害有十翼日至殿廬謂諌議大夫滕康曰幸蜀之事吾曺以死爭之入見上力言其不可上曰卿言正與朕意合此決難行其議遂寢翟汝文亦有疏請幸荆南其言亦不用六月一日戊申朔李成圍楚州六月癸丑誅苗傅劉正彥於建康府先是四月上復位以苗傅劉正彥為淮南西路制置使副遣之任勤王兵將至傅正彥夜引兵開湧金門而去羣臣乞急遣兵捕詔世忠為江浙制置使將兵討傅先誅王世修吳湛以世修本預傅謀湛附賊故也傅至衢州江山縣禆將張翊斬鈞甫柔吉將兵降於周望韓世忠追傅等及於建州浦城縣漁陽驛與賊遇傅將兵居溪南正彥將兵居溪北約相策應世忠親率兵力戰正彥軍少卻世忠乘勝追擊正彥兵大敗正彥墜馬世忠生擒之傅棄軍遁去墮水不死衆失傅所在苗翊收其兵千六百餘人走斂川縣遼人劉晏隸傅麾下統赤心隊世忠追及之晏謂其部曲吾豈從逆黨反者邪韓制置既來吾事濟矣遂率衆歸世忠禆將池江擒苗翊張逵收其餘兵三千餘人走建陽喬仲福王德趙士成共追之盡降其衆苗傅變姓名為商人建陽走至一村落中投村舍詹氏欲更衣而去詹氏主識傅遂擒之送於世忠世忠并正彥檻送行在並凌遲處斬於建康市將就刑正彥瞪目而罵傅曰苗傅汝真匹夫不用我之言遂至於此苗翊苗竬並臠磔於市七日甲寅黃濳善責授寧逺軍節度副使永州安置汪伯彥責授江州團練副使英州安置左司諌袁植上言前宰相黃濳善汪伯彥國之奸賊也其罪不在王黼蔡攸之下黼攸乘天下治安之久伺人主倦勤之隙持祿保位不顧後患創開邉隙貽禍宗社淵聖皇帝雖戮之而不能顯正典刑天下至今為恨濳善伯彥當天下喪亂之後正人主憂勞之時天步如履氷國勢如纍卵存亡之機繫於一相方且怙寵擅權蔽賢嫉能導諛者親忠直者踈苞苴者進潔亷者退附已者立登要路忤已者致之死地道路側目不言敢怒縉紳憤怒而相不恤閭里愁歎而相不知致敵國肆為謗讟事不忍聞外起逆臣敢行不軌民不堪命自登相府曽未踰年三分天下幾失其二自河之南迄於東京由陜之右迄於淮甸生靈塗炭州縣丘墟臣以謂濳善伯彥之罪不在王黼蔡攸之下也陛下縱釋而不誅奈宗廟社稷何奈天下百姓何李綱陷陛下於失信結怨於金人兵連禍結未有休息之期陛下特竄之海外天下不議至濳善伯彥姑置之善地所以動人心將士解體國勢愈危陛下倉皇東度之際恨不膾大臣心肝以居近密為之營救也臣愚伏望陛下靜默深思念前日有播遷之苦致逆臣生背逆之心采用臣言斷自淵衷命有司檻至行在斬於都市庶幾威權自立人心自附外折敵情內消奸萌可以鼓士氣可以崇國體中興之功在此一舉遂責授濳善寧逺軍節度副使永州安置伯彥江州團練副使英州安置林泉野記曰黃濳善字懋和登進士第宣和間宰相王黼喜之纍加除擢靖康間知河間府兼髙陽路安撫使大金入京詔河北諸州起兵勤王濳善依違逗遛不行及聞京師已破方領兵一萬赴康王於東平府王令駐軍於興仁府以張換等十軍皆聽節制濳善怯懦無進兵勤王之意及大金自宛亭來攻乃遣張換丁順孟世寧擊之射中龍虎郎君墮馬而去康王已聞二帝播遷加濳善天下兵馬副元帥王到應天府加濳善徽猷閣學士及即位除中書侍郎以其兄濳後為户部侍郎數月除濳善尚書右僕射御營使濳善固位怯敵與汪伯彥及諸內侍相結略無為國濟民之意恢復中原之心上幸揚州放散四方勤王之兵潰為盜賊占親兵一千自衛不用能賢惟薦朋黨王黼門人如盧益輩多用為八座侍從陳東歐陽徹上疏乞留李綱即斬之以吳給張閣之言為諱善交通關節賄賂公行京東日為大金所侵直至淮上濳善恬不為慮二年加尚書左僕射許景衡乞車駕駐江寧以備大金不測之侵濳善力沮抑之宗澤以收復兩河迎請二帝為急濳善大惡之專為諂佞固寵之計三年金人已迫上欲南渡濳善伯彥尚苦留之上更不問率百餘騎徑渡潤州僅以身免軍民百萬皆為大金殺掠遂陷中原百姓聞濳善之名無不毁罵上至杭州御史中丞張澄言濳善伯彥大罪二十罷為觀文殿學士知江寧府後又言其罪改觀文殿學士提舉南京鴻慶宫又再言其罪改觀文殿學士俄又言士民皆怨憤遂責授祕書少監分司西京後司諫袁直再言其罪責授寧逺軍節度副使永州安置汪伯彥字廷俊徽州祁門縣人也王本為祁門令招伯彥為門客故秦檜皆居伯彥席下崇寧二年登進士第梁子美知大名府伯彥為司理參軍子美甚善之纍遷中散大夫靖康元年進河北防邉十策擢直龍圖閣知相州伯彥兼主管真定府路安撫使公事及康王出使於大金過宿州伯彥言大金已南渡勸未可北行遣劉浩以兵三千迎入相州俄除兵馬副元帥雖略招兵而怯懦無謀無勤王之念常勸謀往東南自保而已加伯彥天下兵馬副元帥建炎初除同知樞密院事俄除遷知樞密院事濳善結內侍以固權陳東歐陽徹被誅略無一言諫止吳給張誾邵其章皆以忠諫伯彥忌而竄之宗澤屢乞親征迎請二帝伯彥沮之大學生魏祐上書言其與黃濳善共為奸邪乞早逐之伯彥占親兵一千衛其家略無為國濟民之心梁子美親族皆薦為美官王黼之客盧益已為尚書伯彥薦濳善為同知樞密院大金攻陜西五路京東京西諸州多殘破伯彥恬然不恤許景衡乞早渡江寧府伯彥立排沮之建炎二年除尚書右僕射與濳善相結阿諛順㫖特固祿位而已大金已逼掦州不遣兵拒戰上欲渡江又與濳善留止次日車駕百官單騎徑渡鎮江而六軍百姓多為大金誅虜天下咎其邪佞踈謬聞其名則罔不切齒罵詈御史中丞張澄言其大罪二十罷為觀文殿大學士知洪州後再言其罪降為觀文殿學士俄又言之士民亦憤心未厭以正議大夫祕書少監分司南京永州居住後司監袁植再言其罪責授江州團練副使英州安置裴淵以其衆至行在隸於韓世忠初裴淵以收復秦州之功狀聞於朝得㫖許赴行在既至悉發隸韓世忠軍張浚江淮荆湖川陜宣撫處置使便宜黜陟賜關陜官吏等詔詔曰朕嗣承天統遭時多艱夙夜以思未知攸濟正賴中外有位悉力自效共拯傾危今遣知樞密院事張某喻密㫖黜陟之典得以便宜施行卿等其念祖宗積纍之勤勉人臣忠義之節以身徇國無貽名教之羞同德一心共建隆興之業當有茂賞以答殊勳杜充為宣武軍節度使朝廷除杜充為宣武軍猶未知楊進死乃加進任正觀察使范瓊率兵至行在送大理寺賜死范瓊軍於洪州苗傅劉正彥之變除慶逺軍節度使湖北路制置使瓊以兵㑹合不從及上復辟遣使宣諭至是方來朝臣僚交言其罪樞密院計議官劉子羽乞誅瓊以戒暴亂吕頥浩張浚議定必殺之乃召赴都堂命劉光世入瓊寨撫定其兵送瓊大理寺賜死猶不伏獄吏以刀自闕坌插入呌疼一時死其弟并三子皆流嶺南張浚行狀曰御營平寇將軍范瓊來赴行在瓊自靖康圍城與金人通及京城破逼脅后妃及淵聖太子宗室入金國及乘亂剽略亂左右張邦昌為之從衛罪狀非一至是聞二凶伏誅始自豫章擁衆入朝既陛對恃其衆盛悖傲無禮多所邀求且乞貸傅正彥逆黨左言等臣僚奏大略云瓊大逆不道罪冠三千之辟呼吸羣凶布在列郡以待竊發若不乘時顯戮則國法不正且他日必有王機蘇峻之患臣任樞管之寄今者被命奉使川陜行有日矣乃心踟蹰若不盡言乞伸典憲死目不瞑上深然之公獨與權樞密院檢詳文字劉子羽密謀夜召子羽及選密院謹飭吏數輩作文書劄榜皆備鎖吏於府中翼早公赴都堂召瓊議事瓊從兵溢塗巷意象自若坐定公數瓊罪愕怡命縳瓊送大理寺子羽已將榜於省門外親以聖㫖撫勞瓊衆曰聖㫖罪止瓊餘皆御前軍也無所豫頓刃應喏瓊論死兵隸神武軍姓氏録叛逆傳曰范瓊字寶臣開封人也自卒伍補官宣和末河北京東羣盜起命瓊往招張仙崔知李寶蔡進等有功金人圍京城瓊與李寶等來勤王屢與大金戰皆身先士卒數破之由是顯名大金退命瓊軍河北招羣盜劉浩等數戰破之加觀察使賜第一區金人再圍京師瓊為京城四壁都巡使淵聖出郊大金使瓊取太上及鄭皇后太子諸貴妃等瓊仗劍逼請出城詣金人寨百姓邀駕者瓊皆斬之金人又命京城再立異姓揭榜於市勸諭之及欲立張邦昌統制吳革欲擁軍民併與金人死戰以奪二帝瓊又與左言以兵攻革執而誅之殺數百人於金水門外而邦昌立矣般甲杖欲候金人退師往撫諸路不伏者建炎初至應天府加定武軍承宣使御營使司同都統往襄陽討李孝忠瓊至屢與李孝忠戰敗績㑹諸路兵皆至與孝忠大戰臨陳殺之其將張世立孝忠弟孝義降於喬仲福瓊至運道遇羣賊孫仲等與戰皆滅之加天武奉日四廂都指揮使同主管侍步軍司移軍真州後除瓊御前平寇前將軍領王剛王彥等軍駐京師三年羣盜劉忠據海州懷仁縣遣統制張仙崔智慕進徐靖等擊之忠詐仙等入忠寨撫之忠伏兵起擊仙等皆殺之降其兵瓊屢與忠戰皆敗績羞恨而已回軍夀春府軍士與夀春府兵作爭遂相殺爭出劫其城殺其知府鄧紹密聞苗傅劉正彥之變瓊在洪州傅除慶逺軍節度使湖北路制置使瓊與傅書問往來不時進兵張浚十一檄令㑹合勤王瓊終不進上反正遣使宣諭方來臣僚纍言其罪張浚杜充議除之召赴都堂命劉光世入瓊寨撫定其兵送瓊大理寺賜死猶大呼不伏罪其弟并三子皆流廣南籍其家財劉光世招降韓雋韓雋為苗傅第四將傅敗雋以所部人馬走至湖口渡江至蘄州知州王甡與州縣盡棄城閃避雋檢視軍資及諸庫州倉錢絹米麥皆盈滿雋悉自封鎖之出榜止不得秋毫擾於民間不得攘取倉庫次日便行欲往京畿尋楊進殺之至光州仙居縣界值王善張用遮路兼聞楊進已死㑹劉光世駐軍江州遣人招安雋雋乃受之光世令蘄州知州王甡及州縣官已復入城治事甡率州縣迎見雋叙話甚歡雋自此更名世清號為小韓三朝北盟㑹編卷一百二十九
