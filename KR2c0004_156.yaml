body:
  text: 三朝北盟㑹編卷一百五十六宋徐夢莘撰炎興下帙起紹興三年十二月十二日壬辰盡其日十二日壬辰右迪功郎新授監廣州寘口場鹽税吳伸上書書曰右迪功郎新授監廣州寘口場鹽税吳伸謹齋沐裁書昧死百拜獻上皇帝陛下臣聞天無二日民無二王日並出則爭光王並立則爭强勢不兩立尊無二上者也劉項共興争奪相殺卒分雌雄之勢陳隋兩立强弱相凌遂興呑併之師故忠人之國者願殺身以成仁不易朝而事主若商之夷齊齊之王蠋是也今南北有真偽之君淮汴如鴻溝之界忠臣義士一念及之涕淚交頤臣雖不才而慕夷齊之髙風懐前人之卓行昨居畎畆猶存憂國之心今荷宸恩豈忘報稱之效臣頃自布衣陳蒭蕘之言者良由誠能貫日義在捐軀而陛下不以臣愚不肖聽其狂瞽采其愚慮臣自顧無左右先為之容獨以片言上達宸聽蒙陛下知臣于草莽之賤命臣以初品之官臣之遭遇又非特賈生馬周之比也臣上有垂白之母自受命之後豈不能歸拜慈親誇鄉曲仰念有君如此之聖如此之賢聽諌納言雖唐虞之主不過如是矣臣當酬報聖恩國爾忘家臣生則願捐軀如王蠋以激勵臣子臣死則願為厲鬼如張巡以殃禍敵人臣之忠義上徹日星自謂移孝為忠正在此時故雖過門而不入也其勤勤念念唯興利除害是圖慮危求安是務于是游江浙之途采徃来之議視敵人之虚實觀國勢之安危講将帥之賢愚論財賦之得失究士卒之能否瞻天時之動變察人事之從違訂禦侮之後先臣既有所知聞不敢自黙復以管見上聞天聽伏望聖慈察臣無覬覦之心憐臣冇忠義之節特賜睿覽使臣區區胸臆得以陳前臣雖受僭越之誅赴之鼎鑊亦為快幸臣聞之順天者存逆天者亡邇者金人逞其雄心肆其彊悍驅脇我宋殃及無辜殄㓕生靈閭閻塗炭陷其城邑取其金帛使老弱轉徙困苦流離莫甚于斯觀夫彼之暴興豈能安靜又况兵戈之氣上聞于天㓕亾之象幽及鬼神天将悔禍安靜有期圖䜟所載非盡無據觀其謀謨止于金帛子女而已今天下殘破兵火幾遍獨我西蜀富庶有年敵人窺伺盖曰適因險阻未能即下故悉驅其衆以為蟻附彼旣傾衆以西則劉豫孤立于東豫之孤危得不設詭即此觀之敵人虚實不卜而可知也臣聞之中原者天下之根本也四方者中原之枝葉也秦漢之君莫不得中原而後成帝業唐室之亂至于二三如明皇德宗之時是也其亂之甚不過數月或年嵗間而皇綱復振者無他良由即復中原則四方定今陛下以聰明睿知之資應命世千載之運承大統于已危之時振中興于顛覆之末中夏知圖䜟之有歸符瑞表天下之有慶是宜中天下而立定四海之民今乃屈翠華之尊而幸蠻海之隅臣未之曉也昔太王居岐以避狄人今陛下居吳以避金人太王之所避者特一狄人耳正如兵法所謂不敵則能逃之陛下之所避者復生劉豫獨不念國削則身危之謂乎况金人得吾土地不能守得吾人民不可用正謂貽患害于劉豫昔元帝渡江終晉之世不得有中原當時僭竊皆邉民愚魯猶且不能制矧今劉豫以中國之人而據中原之位乎臣一思之畧無生意萬一劉豫未滅則國之安危不卜而可知也臣聞之将者國之輔也輔周則國必强輔隙則國必弱茍以世胄擇人則趙括為名将之後必能全勝茍以勇鋭擇人則武信君有戰勝之功必能自保今陛下付兵權之重寵爵位之尊不過二三人爾其有道家所忌則趙括之徒可憂也其有戰勝而驕則武信君之禍可戒也又况國恃之為安危民恃之為司命豈可不擇甞聞古之命将也以謀将為先鬬将為次智将為先猛将為次至于大将則兼智謀而有之尚欲其通古今知成敗如孫權令呂䝉就學是矣及觀古之為将進不求名退不避罪唯民是保唯國是憂故戰則必勝攻則必取後世有異此謀靡不覆敗昔唐之衰也首因黄巢之亂當是時諸道節鎮擒一黄巢如摧枯拉朽爾又各坐視留賊邀功卒使唐祚不能支持今劉豫無黄巢之衆而陛下當唐室之兵其如諸将自為之計坐視安危何况夫庸将之見但求利己豈復憂君盖敵滅則将帥無要君之權士卒無頻濫之賞其有包藏禍心者則坐視成敗恃其主兵漸成跋扈古人師克在和今陛下将士雖衆孰講亷藺之歡由此觀之將帥賢愚不卜而可知也臣聞之上下征利其國必危今之主将無非營私背公蠧國害民之徒何以明之居于市則有囘易之庫居于水則有囘易之舟所至擅𣙜酤之利則官課為之不登州郡恣無厭之求則民力為之減耗坐糜廪祿無補事功至如主将利其家則士卒利其身使民無措手足之地孔子曰百姓不足君孰與足古人居則隱兵于農出則因糧于敵且如羊祜之鎮南夏也初無百日之糧及至季年有十嵗之積曷嘗湏求國家月費億計止自營田之利以勤羸弱之兵臣觀今将帥征求市利無所不為止速私家之富靡䘏國計之殫况國家所入止有東南數郡其得既少于昔時而其用復倍于曩日良由諸軍唯慕虚名不求實效廣收羸弱之兵以益請糧之數觀其一軍之内堪出戰者復有幾矣備虚名者又復有幾矣以有限之物而贍無用老弱之兵則財賦之得失不卜而可知也臣聞之人無勇怯唯其所用世之説者必曰吳人怯而汧隴之人勇昔吳王夫差敗齊于艾陵辱晉于潢池兵無敵于天下則吳人安得謂之怯苻堅擁百萬之衆當淮淝之敗草行露宿聞風聲鶴唳而恐則汧隴之人安得謂之勇今國家所賴者止知有西北之兵不知有東南之士古人有言曰勇怯在乎法成敗在乎知怯人使以刑則勇勇人使以賞則死臣觀西北之兵刑不可以威賞不可以勸何哉良由雜烏合之衆混招安之徒刑之太重則去此而就彼賞之太輕則志惰而心離又况諸軍無非潰亡之黨子女旣足金帛亦豐常人之情無子女則以子女為好無金帛則以金帛為貴今二者将既自富士亦不乏彼不待賞而足又将何以勸臣觀今之士卒當其敵人稍息邊境暫寕則偷生戎旅以干廪禄若或暫當移屯驟爾行役且興怨謗之辭欲生奔北之志况于臨敵用命豈不潰亡由此觀之士卒之能否不卜而可知也臣聞之蛇虹彌天東晉所以止于吳而不能有中原故曰天垂象見吉凶聖人則之自艱難已来金人乗勢一陷維揚長驅京邑縱肆其衆陵虐行在社稷之危甚于贅旒賴厯數之有歸致舊物之不替金人一去四年不敢加兵盖以知我宋方興而未艾也奈何無知妄作更易天命假神器于劉豫分神州為偽齊雖欲使中原自相攻取而天祚大宋億兆攸歸曽無有二故日月齊明星辰順紀上則元象無差次則雨𤾉協序古人有言曰天視自我民視天聽自我民聽今謳歌者無不吟諷徽猷獄訟者無不思于聖德由是天意漸囘而中興有兆臣謂天時不如地利地利不如人和故百姓歸之則為王百姓去之則為匹夫臣竊觀京畿隕喪九服崩離天下囂然將帥士卒鮮不背叛忘君親之辱偷一時之安大臣或降于敵将士或散于盗辜負國家蔑存忠義徃徃十有八九獨我宋民懐祖宗之德樂陛下之仁從駕者者正猶邠人之歸来太王安業者正猶百姓之謳歌大舜衣冠黔首悉圖二聖之歸凋弊瘡痍欲復戴天之報邇無異言逺無異望咸有一節初無二心今天下但聞卒叛未聞民叛何以驗之臣聞京東之民見屬偽齊劉豫行十一之征可謂取民有制而民猶痛思宋德南望王師如旱望雲簞食壺漿家家為備積穀助糧人人有心巷聞傒后之嗟里有来蘇之望民心如此宋復何憂臣以謂人事之和不卜而可知也臣聞之先發制人後發制于人故事有緩急勢有先後昔東晉之有全吳者以其得淮南故也當苻堅興舉國之衆取孤旅之晉設若恃長江之險延袤江左縱使堅衆未即南渡而對壘淮上相持嵗月則晉豈復有百年之永乎賴謝安之謀謝𤣥之鋭迎敵于壽春敗賊于淝水所謂得先發之道也今淮南虚有屯駐之名而無必戰之實衆兵皆在江南而輕兵獨當淮右萬一敵人得計奪我上流奄我淮甸掠我州郡對壘江傍勝負雖若未分而雌雄豈逃一决若坐以相持久于嵗月使舟車不能通糧食不相及備前而後寡備左而右寡豈國之利乎今淮非特唇齒之地實腹心之圖臣聞敵人窺我襄漢則陵侮之萌不卜而可知也今夫知敵人之虚實則制人不可不先也知國勢之安危則圖維不可不豫也知将帥之賢愚則委任不可不擇也知財賦之得失則國用不可不圖也知天時之變動則天與不可不取也知人事之從違則民利不可不興也知陵侮之有萌則敵謀不可不伐也臣見天下之情當其事緩之時則可因循及其急迫之際則宜力斷今天下可謂急迫矣臣聞之中原者譬如國朝之心西蜀者譬如國朝之腹中原既割據為偽齊西蜀復幾陷于敵手如人之身心腹割裂其能活乎向以國家之難繫之存亡何哉東南之地不過百郡土地日削形勢日單于天下無三分之二其地狹一也地傾而人衆山多而物稀居中原之一偏其人貧二也其土薄而不厚其水清而不深無興旺之氣非帝王之州三也有此三者雖陛下謙德自保于全吳至仁不爭于天下而百萬之師坐糜廪禄一嵗之間國用不貲設有乾旱水溢之年将如之何又况土地日削則財賦日少将何以給士卒之費乎臣竊謂中原不取則帝業不恢中興無期危亡有兆何則金人雖强實不足慮劉豫雖㣲其禍可憂且如金人其来有時其居不久来則避之去則復業此不足慮也明矣至於劉豫以臣竊國憑藉金邦素無人望唯多詐謀彼以一旅之衆當孤危之時不一平之設有大于劉豫僣據一方將何以處之嗚呼晉室之亂起于元魏繼踵僭竊終不能平沒晉之世不復故疆今劉豫恃金人之勢露不臣之心自揣悖逆與我聖宋必不兩立勢無俱存彼若以利害誘動金人進屯淮右雖不交兵縱未南渡兩軍相持積之嵗月必有存亡将何所逃臣以謂先擒劉豫則金人自定昔羊祜有言曰期運雖天所授而功業必由人而立我不一大舉掃滅則衆役無時得安今陛下國勢如彼之危不毅然舉兵以决勝負臣恐因循嵗月大禍将至臣嘗譬之病者沉疴積月而藥石自疑服之温則疑其實服之凉則疑其虚雖有醫功議論不同處之無斷既或藥石遷延嵗月殊不知日月既深病亦彌篤逮至膏肓醫所不及臣以謂今日時勢存亡顯著事理灼然若曰今日未可舉兵不知何時而可也兵法有曰不戰而屈人兵之善也今天下之人皆知以不戰為善殊不知力能勝人謀能制人則不戰為善臣切評天下之議者不過曰金人兵衆昔苻堅非不强也王莽非不衆也以苻堅之强王莽之衆光武東晉避之可也不戰可也唯其勢不可避亦不可不戰因其必危必亡之勢而為死戰却敵之計是以成功臣切觀自喪亂之後未嘗接戰設或遇敵非因戰敗多由潰敗今無戰勝之功而責人自服不亦難乎又况皮幣不足以塞其貪事之以皮幣則不得免焉犬馬不足以充其欲事之以犬馬則不得免焉金玉不足以厭其求事之以金玉則不得免焉和議不足以得其信求之以和議不得免焉金人反覆陛下知之詳矣今又割中原以假劉豫其志不特以中原攻中原也将以併土地也将以危社稷也臣竊謂祖宗創業之艱難累聖繼承之不易天下一統垂二百年今鼎足分裂于賊臣國勢受制于强敵雖有大江之南已失祖宗之業囘首中原神人共怒尚宜力謀克復以雪大耻况彼呑併之萌已兆而危亡之禍将及豈可不為之計也臣聞金人以劉豫為所愛以中原為所謀臣願先奪其所愛伐其所謀彼必氣讋膽喪萬一舊惡不悛長驅復来俟其深入誓師血戰綏靖邉隅彼必蹈苻堅之覆車而陛下享有光武之中興矣昔晉室之强取吳之弱易于仄掌議論異同至于數載設非羊祜謀之于前而張華杜預賛之于後豈復成功臣以此知能斷大謀者少而因循偷安者多也臣嘗聞否終則傾物極必反昔光武以數千之衆當王莽百萬之師謝𤣥以七萬之卒迎苻堅九十七萬之衆强弱固不等矣衆寡固不敵矣卒能敗王莽之衆衂苻堅之師者無他正如兵法所謂投之亡地而後存蹈之死地而後生者也今人無王莽苻堅之衆而陛下數倍先武東晉之師加之否終喪亂危於光武東晉之時不一大舉其將焉恃又况金人不能自却劉豫不能自滅國論未能僉同將相未盡樂戰唯陛下有宗廟社稷之重繼統承休之託上則有君父戴天之仇下有黔首塗炭之厄利害繫乎陛下一人臣前書論馮道杜充詳矣伏望應天順時躬行天罰願宸衷之獨斷無築室于道旁嗚呼二聖䝉塵于沙漠豈不朝思暮想望陛下復中原而為歸期宗廟遷移于亂臣豈不幽思冥忿望陛下復中原以歸祭祀陛下幽明有此責望之重豈可安于東南而不為克復計也臣固知陛下天資純孝懐思二聖屢軫聖憂朔望之遥瞻愁慘天地盖亦忍耻含羞以圖後效雖天聽之屢决奈衆議之不同致使稽遲嵗月坐待危亡臣竊觀陛下下求言之詔開忠讜之路可謂有意于中興矣言之悖謬者無罪言之切當者有賞可謂有意于聽納矣今雖賞可采之言未見可采之事豈左右之臣以為計不出己功不在身執一偏之見而惑陛下之英斷歟不然何其能善善而不能用也今臣所陳痛切可見萬一復有議者以臣狂妄沮惑聖斷伏願膾臣之心以謝不忠之臣臣竊觀囘禄之禍嵗嵗為灾雖生靈之可傷亦天意之有自然天道幽逺人所難測而臣臆説敢試明之夫火生于寅其旺于午宋火德也駐蹕南方正當此地故其患不在于朝廷而其災當及于百姓今上象無變而火災屢焚豈天亦欲陛下歸中原以正其位乎不然何其屢禍百姓以為警戒陛下誠能垂日月之明奮乾剛之斷念生民之無辜知火德之獨旺整我六師克復神京上則順于天道下則安于百姓則今日之災安知不為成王之雷風宣王之旱魃反為生民之福也臣又聞國使之来問好雖通以臣料之情亦可慮何則金人反覆詭詐萬端可以力勝難以義服今此之来非國有變故則重有須求臣聞道路之言金國近年自相呑噬夫敵人之强可以間也無事則或相安見利則必相逐欲其必争可試以利今也子女玉帛當充其國因此爭鬬亂復何疑萬一果如道路之言則劉豫孤立無此救援必藉耒使安此人情緩我嵗月胡不聞唐儉為使而李靖因之食其為使而韓信襲之已驗之禍不可不戒設或無此數謀必将重求割土厚責嵗幣强我所難奪我必爭從之則國削身危違之則起瑕生釁其從與違将何以處臣以此思之晝則忘食夜則忘寢痛為陛下惜也今使命将至不可中輟萬一厚有須求臣願陛下陽諾隂違俟其還報乗其不疑一怒親征劉豫可擒臣竊觀當今天無變象于上人無離心于下時哉時哉機不可失陛下不于此時親御六師躬行天討則必有後時之悔也臣竊見陛下設髙爵以寵将而將不加勸竭廪禄以贍軍而軍不加鋭彼敢戰之士一嵗驕惰于一嵗而懐鄉之卒一年更甚于一年若曰繕甲治兵養鋭待時臣未之聞也臣觀今之兵權委寄太重且如重軍相呼必曰某姓某家之兵觀其稱呼自相爾汝度其權勢必不統一嗚呼食土之毛莫非王民今不知陛下但知有将帥者無他良由下權太重而上威不張也平居無事既相爾汝互相招誘認為己事萬一當敵誰肯相救臣以謂陛下若不收囘兵權親御兆衆方且姑息將帥之不暇豈能却强敵而取中原乎臣觀今之士卒已無鬬心論其敢戰必不若淮南之民而淮南又不若京東之民臣聞京東之民苦于劉豫思我聖澤猶子懐父大兵臨境彼必倒戈自我為攻取有征無戰但當明其政刑恤其士卒弔民伐罪别無繹騷若使京東之民自戰而勝則吾之士卒豈不懐慚自相激勵軍威旣張士氣復振然後乗機北伐克復故疆夫何難哉臣聞知者千慮必有一失愚者千慮必有一得臣雖至愚豈無一得古人有負日之暄欲獻于其君者其謀雖拙其忠可嘉今臣以至愚之言而類負暄之獻區區之誠盖亦可見臣非得已而不已者况臣已䝉陛下命之以官夫復何求良由忠唯許國義在救危止知愛君不知斧鉞之可畏止知憂國不顧㣲軀之存亡也于是譊譊不已復有所言盖臣之忠義能為人之所不能者今臣所陳或有可采願陛下試臣以難萬一忠義之跡言與行違臣甘膏斧鉞以戒天下狂生况臣初非自衒亦非躁進實以國家存亡為憂中原喪亂為念偽齊未滅臣無生理臣恐如夷齊死于國亡之後無補敗滅故始以天無二日為喻而終以必擒劉豫為請言雖率爾其理甚明伏望陛下聽而納焉天下幸甚干冒冕旒臣無任俯伏待罪之至臣伸昧死百拜三朝北盟㑹編卷一百五十六
