body:
  text: 三朝北盟㑹編卷一百三十一宋徐夢莘撰炎興下帙起建炎三年八月二十日丙寅盡閏八月十四日庚寅二十日丙寅隆祐太后至洪州閏八月一日丁丑朔吕頥浩為尚書左僕射同中書門下平章事杜充為尚書右僕射同中書門下平章事皆御營使參知政事王綯御營副使賜吕頥浩辭免不允詔勅頥浩省所劄子奏辭免恩命事朕惟有不世之畧然後足以成不世之功有非常之才然後足以濟非常之務卿邁往之氣絶人之資澤加生民勲在王室兹已試之效也故去國未㡬靡人不懐迺者申効使軺趣朝行闕召見便座博詢嘉猷忠誠慷慨議論眀辨兹用延登亞保之位復卑冡司之權卿不聞孟子之言乎如欲平冶天下舎我其誰葢古人自任以天下之重如此今日之勢非卿孰安卿其慨然為朕力圖所以興復者兹卿自許而亦朕之所期卿者也區區小亷以待常士而已豈足為卿道哉所請宜不允故兹詔示想宜知悉潰軍輔逵降於王􅊅輔逵擾於楚漣水之間朝廷以王􅊅為淮南招撫使以討羣賊逵欲受􅊅招安乃諭其衆曰當竭力取漣水南寨得寨則受招安衆皆諾遂攻南寨寨在河清之中流狹而長逵令斫木為筏併力攻之拔其寨大肆剽掠然後詣􅊅降十四日庚寅宫儀及金人戰於密州軍敗李逵呉順以密州降於金人宫儀經夏與金人相持屢經戰未有大勝敗七月儀屯於盤石溝在密州之南八十里分屯於常山王廟入城二十里金人於密州之北三十里時時遣人在城下招密州降李逵呉順曰今南有宫儀北有大金安敢投拜若能破宫儀即日投拜如不然或宮儀破大金軍亦降宫儀今孤城無援唯强是從金人主将特黙萬户深然其言遂不敢攻且專謀破宫儀矣南門外雖坦途然兩邉皆山在二十里之間有常山王廟儀以兵扼其路金人乃颺言宫太尉馬軍五不能當我之一然步軍差勝於我我之步軍十不能當儀之一儀聞之以為然金人不時出兵轉戍而南侵常山王廟儀兵禦之金人佯若不勝而退去以為常凡月餘儀之軍皆以金人為易與耳金人知儀衆皆懈至是馬步齊進馬軍在前方戰馬軍少歇步人齊進而馬軍兩翼亦進儀兵不能當皆兩邉奔山髙處金人以馬軍徑趨八十里直犯盤石河大寨儀猶不知衆皆奔潰儀及劉洪道奔九仙山金人進逼之儀及洪道以餘兵數千奔海州漸至楚州又為郭仲威所敗乃闕里至真州儀兵已敗金人責李逵呉順如約逵順遂以密州降於金人後逵為順所殺儀至真州得㫖轉兩官遥郡刺史其轉官遥郡制曰勝敵而擒兹為妙算聞功則賞豈限常規矧轉鬭以猝然決重圍以俄頃忽而不錄何以示公具官某膽畧沈雄神鋒警捷獨出萬夫之上親更百戰之餘比緣彊敵之師徧蹂全齊之地過城輙下連壁方堅汝掦貔虎之威盡復金湯之固爰峻加於顯秩仍升刺於大州勉建竒功更圖茂渥洪道至朝廷言儀在京東時事缺儀自縊取首級送行在其將蔡清耿安皆檻送行在撥其軍隷王􅊅洪道以向大猷同赴行在言大猷受金人偽命知青州其出榜文多指斥有反状明白大猷伏罪遂斬之胡寅上萬言書臣昨於閏八月一日觀詔書以敵人侵陵備禦不給遂有移蹕之意左顧荆鄂右趨呉㑹安危利害下問羣臣臣時駭然不意清問及此何者以陛下自錢塘未幸江寧也詔曰已援中原矣及至江寧以舊都之名符啟建之議改為建康也有詔曰天人允属興邦正議於寵規矣繼而深懲維揚之禍立遣奉隆祐太后以六宫及百司不預軍旅者之南昌有詔曰朕與二三大臣帷幄宿将堅守不動誓言以死答羣生矣前後三詔不出半年之間而立言措辭不同如此臣所以畏懼疑惑卒無以上對退伏念至於旬時陛下以安危利害詢於在庭茍或慮之不精計之不審以害為利以危為安則其負誣神明迷誤社稷罪在不赦輙傾愚見不避誅死泛論建炎謀國之失而陳撥亂反正之計念時事之廹切仰徳意之寛大兾功効之可圖忘觸犯之難恕惟陛下留神省察幸甚臣聞孔子曰成事不説遂事不諌既往不咎臣今所陳不免追咎既往者葢謂建炎以來有舉措大失人心之事今欲復収人心而圖存則既往之失不可不知不可不改也一昨陛下受淵聖皇帝之命出使河北二帝既遷則合糾率師徒北向迎請而遽膺翼戴亟居尊位遥上徽號建立太子不復歸覲宫闕巡省陵寝斬戮直臣以杜衆口南巡淮海偷安歲月金人深入陜右逺破京西謾不治兵畧無捍禦盜賊並作一切招撫無辜之民千里塗地然怨氣上觸日昏無光飛蝗蔽天動以旬月方且製造文物糜費不貲猥於域中請行郊服朝廷之上自謂中興敵騎乗虚直擣行在疋馬南渡狼狽不堪淮甸之間又復流血逮及正寳位移蹕建康不為久圖百度頺弛淮南宣撫卒不遣行自畫大江輕失形勢一向畏縮惟務逺逃軍民怨言如出一口存亡之決在於目前凡此節次十數條皆所舉措失人心者也自古興亡固不足道且以中興而能存者道之夏少康周宣王燕昭王越勾踐漢光武唐肅宗皆中興賢君莫不能任賢使能修政事治軍旅而其奮𤼵刻厲期必有成者則又本於忿恥恨忮之意不能報怨終不肯已所以光復舊物各稱中興未有承衰微之後繼決之餘切切焉固陋以為榮施施焉茍且以為安而能長久而無禍也臣嘗計天下事今可謂多矣請毛舉而論其要尤在於修政事備邉陲治軍旅用人才除盜賊信賞罰理財用核名實屏佞䛕去奸慝十事而已今政事未修也何以富國强兵邉陲未備也不聞長慮却顧論軍旅則罷耎不勝其任論人才則混淆未得其真盜賊跨州連縣而莫敢誰何賞罰昧於功罪而士氣先阻大農當務足食而軍無見糧名實當責成效而類多茍且左右使令豈無佞諛百官有司尚有奸慝天下之事所當留意不可忽者今皆悖理傷道如此而謂無以致天譴其可得乎皇天譴怒於上矣固當深思極慮而應之以實念十事之未當和氣之未格深自貶損以省厥咎至徳也恭承祖廟以致中興至孝也此之不圖而姑務儉素之小節宥赦之小惠此豈承天之道也哉故曰陛下未得其道故也今陛下欲承天意以求治當先自此十事始十事既得其當自反而昭徳塞違以明示四方使中外咸知陛下求端於天之意如此其切不徒於虚文則民悦於下矣民悦於下天鑒於上變禍為福又何難哉然恐陛下未得其要耳故臣願言之所謂修政事者何也臣謹按春秋魯成元年王師敗績於茅戎先儒未有説也臣謂王國之大宜無不服而茅戎小族至敢逆命王師傷敗故聖人疾而哀之以見四境盛而周道衰至此極也今政事之大有甚於四境强甚而兵革不振者乎魯僖二十八年公子買戍衞不卒戍刺之説者以謂衞方有難同姓諸侯義當救恤魯為衞戍深得救災之禮而公子買以君命出戍乃敢違命而不卒事使魯有闕若以法論之則是乏軍興矣豈不可罪今政事之大有甚於爵祿與人而人莫敢用命者乎金師深入長驅郊保七八年矣兩宫逺狩九廟為墟天子䝉塵越在草莽而金人猶以為未足也正欲飲馬長江投鞭中流以快其志中國惴惴焉奔命之不暇将何以逞中興之治果安在乎修政事之大不急於此乎故曰敵國强盛而兵革不振也古之明王得操縱之術役使羣動凡狙詐勍力皆為我用其孰敢不力少不如意科罰隨之矣今朝廷欲濟一事唯恐人之不吾從也好爵以縻之甘言以誘之拜一大将如呼小兒刻印封印亟於反掌初無快士來應時須而辦吾事者不過迎合所求以取名位既得之則固已望望然有滿志矣尚肯自効耶及責其成功則曰非我也勢使然也豈理也哉此無綱紀敗壊而不振也是猶可忍也中興之治果安在乎修政事之大有急於此乎故曰爵祿使人而人不從命也抑又甚焉者臣聞春秋以王命為貴所以出者重也渙號一出四方萬里若風行草偃之速其可朝令夕改無一定之計乎朝廷出令則如反汗夫汗豈可反耶昨日所行今日已變今日之論明日復改凡百執事相頋睥睨無所適從以致敗事者職此之由也今年以來大政幾變矣内則立修政之司外則開都督之府今日講議而明日召還廟謀成算其果安在今既欲舉大事盍先計策當安出設以為疑則議之於早慮之於初成算已定而後施行不然既而悔之亦無及矣盍早圖之此尤修政事之大者也所謂備邉陲者何也傳曰天子有道守在四夷國無小大疆塲之事不可忽也人之有墻以蔽惡也墻之隙壊誰之咎也衞而惡之其又甚焉勇夫重閉况國乎若敖蚡冒篳路藍縷以啟山林其初土不過同終大通於上國衛其四境故也謹按春秋書梁亡者其説曰梁自亡也梁伯亟城而弗處民罷而弗堪㓂至則去之民懼而潰遂并於秦聖人傷之葢哀梁伯之不虞而深譏邉鄙之無備也又按春秋楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆葢楚初無必取莒之意而莒不為備以自取敗故楚人得而入之而國遂以亡此亦不備不虞之罪也故君子曰恃陋而不備罪之大者也備豫不虞善之大者也恃其陋而不為備故浹辰之間楚克其三都豈不哀哉雖然前事不忘後事之師前車之覆後車之戒靖康以還數經大故邉陲之事尚復何言而南渡之後未有逺畧以為後圖者甚可怪也長江千里襟帯形勝風波𣺌茫自古為險用武之圖可不先議藩籬以固吾圉楚子為舟師以伐吴不為軍政無功而還左氏譏之以今天下蕩蕩數千里而敵人欲至即至若入無人之地此何理也齊侯伐楚楚子使與師言曰君處北海寡人處南海惟是風馬牛不相及也不虞君之涉吾地也何故楚國區區猶各守疆場今外敵之來恬置而不問可乎今國步雖日蹙譬人之身瘠則甚矣而血氣未動少康有田一成有衆一旅而復興有夏越王棲於㑹稽亦能以其國霸何者得上策自治之道宜其能復興也夫豈無備而能復興乎江左雖微尚跨有江淮之地自古未有欲守長江而不保淮甸者淮甸者國之唇江南者國之齒唇亡齒寒其理明甚金人遁三十年矣邉備宜日有可恃乃反不如前日淮甸數十州地方二千里孫權以來恃以為障塞者今不過置二三鎮撫使以處盜賊一旦有急安知不併力助桀為彼先驅形勢藩籬何所賴焉夀春淮甸尤為江左形勢要害之地昔李煜叛命以周世宗英主猶屢困堅城之下曠日持久僅能克之夀春既破而江左揺矣以是知淮南為江左根本明甚而况淮甸離散之民茍不經畧其地勞來安集則墮軍實而長㓂讐禍至無日矣叔弓圍費弗克平子怒而執費人以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之為之令主而供其乏困費來如歸南氏亡矣若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏将焉入矣平子從之費人叛南氏魯史記之言猶在耳况今天下之勢而可忽耶伏惟陛下念春秋梁亡之戒悲莒潰入鄆之事謹嚴邉備堅守淮甸扼其要害絶其窺覬然後一意從事於政治摩厲以須用圖興復如行快馬奔平地宜無難者若牽於将帥之論惑於矛盾之説退避藏匿狼頋不振則陛下雖有求治之志亦無益矣臣所謂當修邉陲以承天意者此也所謂治軍旅者何也臣聞治國之道莫先乎兵晉所以霸師武臣力故臣謂今日之事無先於治軍旅者而軍旅之事大要有三一曰選将二曰蒐練三曰教閲何謂選将先志有之安邉陲立功名在於良将不可不擇又曰将不知兵以其卒予敵也君不擇將以其國予敵也臣謹按春秋書宋華元帥師及鄭公子歸生帥師戰於大棘宋師敗績獲宋華元或者曰宋不能擇将舉三軍之衆付之不知兵之人故臨戰而屢敗且以為其敗誠宜而無哀憫不忍之意獲宋華元者言見獲之易且言其當然也将者國之存亡所係以漢髙祖之才不過能将十萬而髙祖亦自知其不如韓信故舉大将之權一朝而拜之諸将不以為嫌大臣不以為過者足以勝其任也今王室危甚繄諸将是賴當得知兵慷慨之士付之重權庶能翼戴天子而加之以恭今也竟有不知兵法不習戰鬭内不能與士卒同甘苦而得羣下之死志外不能讋服敵人而書尺寸之功平居趦趄以邀其上甚且有急首倡奔潰豈不痛哉此臣所以願選将也何謂蒐練古者良将於軍政日夜整齊而振飭之如農夫之務去草焉凡老弱㳺惰一切去之故皆健而能戰臣按春秋書大蒐者四雖各有􅏺刺其義不同然亦善其能留意軍政故詳書之抑以見不教民戰而棄之者甚可惜也在魯荘公八年春師次於郎以俟陳人蔡人是魯已出師矣而繼以甲午治軍意者雖時不閑習軍政至是師出而後蒐簡亦猶愈於終不治兵者矣故謹書其日以詳備其事而又書秋師還以善之以見是師之出已成軍旅及其還也宜無喪亡之憂全而歸為可嘉也祖宗豢養将士藩屏王室亦無廢墜是為豈如弁髦而因以敝之今朝廷微弱唯恃軍旅國内空虚養兵尚衆豈得已也而偷惰冗食十常三四為将帥者以動揺軍情為畏唯務姑息無乃求去憂而滋長乎比年以來殊未聞軍旅之衆能立效以報上者無他可用之兵無㡬而疲耎者又不足以當敵人之鋒故常敗事為今之計宜無䘏紛紛之論而唯實效是圖兵不可用者悉蒐去之猝有搶攘之變驅以赴敵何患不能齊致死也此臣所以願蒐練也何謂教閲臣聞養兵以待一時之用則當素有以作其敢為之氣教之閲之以習熟其見聞使其閒居無事軍中有投石超距之戯則緩急可用也楚自克庸以來其君無日不討國人而訓之卒敗晉師於邲今議者不然毎論此則以煩擾為畏嗚呼賈而欲嬴而惡囂乎臣謹按春秋八月壬午大閲閲者閲習軍馬敎戰陳之事也去古既逺司馬九伐之法四時振旅之事已不復見魯小國耳猶能大閲未必有意復古亦能不廢軍旅之事矣故特書時月與日而喜之其他蒐狩未有書日者也今養兵雖衆獨不聞暇時以教閲為事者進退坐作卒旗鎧仗之事恬不習熟此猶足恃以為固耶而貴㳺近戚大臣權要拘占役使動以百數軍政一壊緩急之際何可復理戰而不捷彼之肉其足食乎此臣所以願教閲也教閲者軍旅之急務臣故曰論軍旅則疲耎而不勝任者此也伏惟陛下覽華元之奔覆念蒐狩之唯謹知治兵之無忽思大閲之當法毎選将則當如漢髙祖之用韓信彼㡬敗乃翁事之腐儒不知兵之武夫不能得士卒之歡心者皆勿用毎蒐練則願以魏公子無忌救趙為法彼老而不可用少而未可用鰥寡孤獨廢疾皆有所養者省去之毎教閲則當以王翦治兵孫武試兵為法彼失伍離次敗羣亂衆申令不肯從者必罰無赦三者既備則軍政已立若夫轉餉餽糧簿書錢糓之責則有司存可次第而舉臣所謂當治軍旅以承天意者此也恭惟陛下神武天錫聖學日躋有撥亂之畧有駕馭之才有恭儉克己之誠有仁民愛物之義夙興夜寐力圖興復真有意於為治矣自星變敷求讜論至誠懇惻上格穹昊以臣不肖謬罄所聞仰奉天聽故詳及外政之十事而又終之内政之二言嗚呼吉㓙由人豈有常象在人君應之何如臣切謂應天以實之事不過如此矣伏惟陛下俯聽芻蕘之議深惟格王正厥事理以幸天下臣将見迎兩宫之囘鑾奉六龍而息駕九廟乂安百姓休息四方稽首諸蕃聽命效騐可必若夫桑生於朝雉登鼎耳變灾為福天其或者安知不在此時惟陛下留神天下幸甚天下幸甚若謂臣文詞鄙陋言議淺劣則又非陛下所以求直言之意是以輒肆其狂直少効區區愛君憂國之誠而不敢自疑干冒明威伏須罪誅臣無任云云三朝北盟㑹編卷一百三十一
