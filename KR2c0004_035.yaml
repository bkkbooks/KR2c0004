body:
  text: 三朝北盟㑹編卷三十五宋徐夢莘撰靖康中帙起靖康元年二月五日辛丑盡其日徳安府進士張柄上書乞罷蔡懋復用种師道臣謹按尚書右丞行營司李綱忠亮剛方有為有守功在社稷澤被生靈萬口一談人神繫命方金人入境而奮不顧身自請督戰蓋陛下裴度也臣竊見綱於瞻對之際有能無主憂臣辱義在必死賊未授首臣無還期之言是冝陛下待以心膂無或携貳比聞出師攻城為統制将校不肯入敵馬前退衂遂䇿廢罷成命已行兵民失措為忠義解體矣臣聞兵不多不足以取勝必勝之師不在速戰兵多而戰不速則所費必廣又况兩軍交鋒有勝有負此臣所以知左右之人以綱進用之驟畏其敢言不能無异議而陛下聰明之徳不能無疑惑也又况用之專則權為人所畏信之篤則寵為人所忌此有識之士為綱寒心顧有日矣然心比小却未應發逹如綱一斥不復再用臣恐将帥各懷危惧不能自保矣忠義解體将帥危惧不知陛下孰與平敵也前日與敵講和而貪求無厭湏索不已遂致京城經日圍閉今綱既斥不復戰敵是欲講和不知陛下能使其必去乎臣願陛下念綱社稷之功兵民具瞻之情亟復其職乞罷蔡懋盡付兵權於种師道無使固位貪利之黨快其私心天下幸甚李邦彦罷宰相觀文殿大學士太一宫使紀實曰李邦彦為都人所憤怨纔出門争呼毆擊将殺之馬逸偶脱百姓獨得其履因乗婦人小輿乗黄裙轎簾上命宻匿於啓聖院以丐罷待命得去始敢去諫議大夫唐重劄子攻守利害三事一事金人以議和好兵退有期而行營司與宣撫司宻相通謀虚張兵數以罔朝廷致姚平仲矯制用兵自取敗衂罪狀甚明奏報具在自有軍法不假臣言臣今體訪得行營司嘗宻遣人檄中山河間等郡令以死禦敵宣撫司亦有文移責河北諸郡縱敵内侮之罪令擊歸敵以圖後效宻具蠟書間道馳逹此固兵家之祕計未知二司若果用之臣决知敗事如姚平仲奏報已先得與金人城下之舉百歩之内踈繆若此豈能馳一介之使而寄千里之命乎若使金人獲之為隙滋甚必謂中國陽為和議隂行詐謀本虧信義愈結兵禍雖得蘇秦張儀為使亦不能以口舌争矣此甚可憂也伏乞明降詔㫖諭以堅守盟約如有詐謀反輙拒命者詔少宰張邦昌以軍法處置訖奏庶以解金人之疑早令退兵免招後患一臣於初三日自登城觀兵不成行戰全無紀律騎兵不肯鏖戰前致敵騎衝突遂敗我師又訪聞西師夜擊止餘後軍姚平仲遁去不知所在今來种師道老病難責以臨陣在外兵馬全無統領恐有不虞乞日下選武官曽厯邉任有武畧之人充統領制令總集諸路兵馬分屯結營嚴明紀律守衛京城一臣訪聞賊兵張仙等㑹集近旬意欲乗間刼取金人金帛兼四方勤王之師相繼畢集其間多是烏合之衆不能無姦人若貪利忘義私相攘奪有虧和好致金人之疑愈滋外患乞下令告諭以解敵疑兼詔張邦昌等令委曲具白大金太子可早速退師以堅盟約右前項事冝並急切不可少緩伏乞睿㫁速下三省樞宻院同共商議早賜施行取進止太學生雷觀上書論李邦彦張邦昌不用二月初五日太學生雷觀昧死百拜上書於皇帝陛下臣生三十六年矣自十五總角為學校諸生執經之暇喜引古以論天下事當是時擅權之臣新鉗天下之口臣父兄師友聞臣小有激昻則必深戒力止以謂寧結舌以保身毋多言以取禍臣亦自知逺方寒士徒譊譊實無益惟不信權臣能絶人言以蔽人主聰明也嵗在戊戍例貢辟雍復移太學首尾九載具知一二權臣果能以身塞言路恣其姦惡而臺諫官徒備貟以進身間或言非已所不利則是必為人之鷹犬不然摘細故以塞責耳嗚呼祖宗綱紀法度掃地殆盡使天下之民咸不得其所飲恨宿怒無所告訴至使四郊多壘兵連禍結成今日之事者皆言路不通上下蒙蔽之塞也言路不通而微臣因以杜口二十年矣頃為宰臣者建言置司講議天下之事聚十數軰親附之人觀望阿諛所論皆毫末之細議罷一事奪於權幸則朝言而暮復舊矣何嘗有一大利害及於生民哉善乎臣之友生髙聞之言曰天下之利害當使天下之人議之聞因對講議司䇿而為此言誠至言也何者天下之廣嵗月之深事之害利不可殫舉茍非身受其害豈能盡得其實今日張官置吏文書往來而欲天下除害興利豈不繆哉是故古先哲王求諫納善惟恐其不廣也置敢諫之鼓植告善之旌垂慎戒之鞀立司過之士猶惧其未也又設官制以言為常由是史有書瞽為詩工箴諫大夫規誨士傳言庶人謗尚恐其怠也毎嵗孟春遒人以木鐸狥於路而振警之官師相規工執藝事以諫其或不恭邦有常刑其所訪聞不甚廣歟夫如是則王之身國之政其有不善歟天下之利害其有不逹歟茲所謂與天下之人議之也天下之人得以利害之言盡聞於上則當言之人雖欲緘黙取容不可得也官已盡其職則報政之臣雖欲取容為人不可得也言路通而輔相得人則太平之治豈難致哉恭惟皇帝陛下孝友之性恭儉之隠仁民愛物之心本於生知而行以至誠格於上下乆矣臨御之初臣已知天下利害從此必得聞於上而下情無有不通者未幾求言之詔果下㫖意丁寧臣伏讀感泣者累日且語諸友生曰前日之言固以為恨今日而不言豈不負愧咸宜誦所聞見以報吾君也然詔下踰日上封事不减千數而未聞曉然有求言之實臣竊疑之豈求言之詔徒為文具邪抑献言者皆猥冗不足取耶無乃付之有司而執事者尚狥前弊沮遏而不行耶不然何故惟聞陛下毎勤乙夜之覧而未聞縁某人言某事實為利令行之縁某人言某事實為害令罷之此献言者不能無疑也説命曰非知之艱傳曰忠言逆於耳而利於行則求言者斯受厥咎今日求言之詔徒為文具或執事者沮遏不行天下之人復鉗口結舌如前日矣臣将見干戈擾攘之禍未易安定天下必至於大亂矣倘其所言皆屑屑細故不切時務則可再下明詔以申諭之不可謂其言無足取而遂已也臣恐士大夫尚以前時直言掇禍為戒未能披赤心以仰承陛下求言之誠此臣所以首陳之也臣素愚直敢以切至之言上干冕旒觀陛下果能行與否焉詔㫖之所詢朝之闕失政令之僻違保邦御俗之方安邉禦戎之䇿之數言者固皆國家之所急也而當今之務有急於此者止一言而已陛下知之乎已知則當不待微臣之言若猶未也臣謹為陛下言之所謂一言何也論相是也蓋人主無他職事惟在乎一相得人則百官皆賢百官稱職則庶事咸理否則亂矣啇之衰中國失道外蕃交侵髙宗卒能行撻伐治中國成湯孫之緒致中國之盛者其本在於得傳説以王命居冡宰之任總百官之職進言乎王探為治之本亦曰惟治亂在庶官而已何則庶官得人則治庶官失人則亂天下之治亂係乎庶官之得失庶官之得失係乎一相之賢否任宰相者天子之職進退百官者進一相之事髙宗以命説為急傅説以庶官為戒此啇之所以中興也國家崇寧以來俾張治具欲餙太平而天下靡靡日入於衰亂者皆由相非其人也相非其人庶官以類而進私昵者官之惡徳者爵之賢能之士乃斥逐不用惟用姦黨其始亂不待今日而後見識者已分於崇寧之日矣雖欲正刑明辟嚴悞國之誅固自無及言之復為何益乎然不極其為亂之階則莫知其據亂之道臣為陛下畧摭前朝宰相姦術之大者言之假紹聖二字以行已之詐假國是二字以主已之奸假享上二字以充已之私進直言者槩以狂妄斥之立正論者槩以邪説禁之善阿諛者乃以純正用之奸術既行無所忌憚故敗壞法度紊亂綱紀無所不為莫可勝舉致使强敵幾危社稷而陛下受莫大之屈辱者皆相臣非其人之故也陛下即位已來見於施為者慨然有求治之心而論相之職亦未為稱此臣所以為當今之急務也白時中老繆無用罷相之日公議稱快咸謂陛下必能擇賢而相之中興之治可立待也翌日宣麻但遞遷李邦彦張邦昌爾士民大失望皆言邦彦邦昌亦前朝輔相之無狀者未能罷黜猶之可也其可遂相乎以臣觀之邦彦邦昌雖未若前者數軰為大姦惡察其􅋵術亦不過持兩可以固位養恩而已前日輔相之無狀姑置勿論矣自陛下即位以來一二大事邦彦邦昌曽有慷慨一言乎肯以身狥國自當一面乎邦昌奉康王入敵營為此不得已也至無恥也賢者必不肯當宰相之任而甘心為此行也邦彦邦昌於無事之時妄有除授召收親黨以為强助及多事之際假使命散遣親黨以送妻奴其何以率百官為國藩捍乎聞播遷之説則樂從畫效死之計則退縮其何以安百姓為國柱石乎敵所欲者與之不聞有忠義一言奮然以折敵人之心其何以威撫外蕃使之畏服乎蠧國害民啟戎招盗十數巨姦天下之人思食其肉不饜而邦彦邦昌初不敢誰何致因人言稍稍罷黜詎能不畏强禦而退不肖乎當此紛擾其所進用尚皆親黨選論百官或不當職能以公滅私進賢者乎總統百官安堵百姓威撫外蕃進賢退不肖皆相事也邦彦邦昌踈謬如此决不可當今日之危急也陛下知求言從諫而未知論相何先後緩急之失序也使中外臣寮士庶誠如詔㫖盡知所詢利害上聞之日陛下獨罷行之抑湏付之輔相罷行之耶獨罷行之非人主無為之道付之輔臣如邦彦邦昌必無能為也陛下知以是為急乎亦未嘗以此訪之羣臣乎竊慮有為陛下言者必曰天下安注意相天下危注意将今日金人逼城宜以命将遣師為急餘事姑緩可也此殆悞國之尤者臣以為不然天下安危皆在注意於相相得其人則将必成功相非其人則将必敗事蓋将之出入謀畫必湏以相為腹心将雖良而相不賢則失謀畫有畵餅之饑臨敵有掣肘之禍幾何不悞其事哉裴度為相李愬成淮西之功楊國忠為相哥舒翰有潼闗之失此事灼然者其監不逺也前朝自蔡京為相遂以童貫為将興西北邉事二十餘年西北之良将勁兵所䧟失者莫知其幾矣竭天下之力給二邉之費者莫計其數矣今日之事為利耶為害耶此日前之監也陛下以邦昌身在敵營未可遽罷則邦彦何為乆留也陛下若不急罷邦彦則雖有良将必不成功祗益取辱爾臣聞道路之言謂邦彦與二三黨類堅主割地之説閫外之事未能一切付之将帥割地一事係國之利害臣知建言者已熟計備陳矣臣不復縷陳惟知邦彦罷則廟謀必振将權必專割地之説必不行金人之計必消沮矣臣又慮有為陛下言者必曰邦彦邦昌曩在政府亦嘗以燕雲之事不可圖童貫不可再遣今果如其説正當相之臣以為不然邦彦邦昌在政府日果如此則當力陳其未可狀至不見聴則以死繼之縱未能以死諍則宜去職位亦可其言邦彦邦昌卒持禄不諍致此危急其心不過畏童貫之禍也豈有持禄畏禍之人而能為相乎臣又慮有為陛下言者必曰用則為虎不用則為鼠人才顧用之何如耳邦彦邦昌在前朝未能信用何如試之可也臣以謂不然人臣起自布衣致身政府其寵祿亦可謂盛矣其職位亦可以有為矣邦彦邦昌立朝以來曽建一言行一事有當於人心者今相之可也而二人所為不過憑附權勢交結宦官希㫖道諛以速顯仕而已豈復有它學術乎今天下之勢甚於倒垂縱之惟患其不疾又豈可以相事而復試無能之人也臣又慮有為陛下言者必曰邦彦邦昌不矜智能以任羣材乃得為相之道臣以謂不然甄天下之才而用之使之各當其位各盡其職以治庶務為之相者坐享其成功如栁宗元梓人之説此非真有相才者不能如此邦彦邦昌以私害公所引用者多非其人或用他薦得一賢士則又處之非其宜用之不盡其才賢者多自引退若久在相位必不能為陛下進天下賢者成真相之業也臣又慮有為陛下言者必曰宰相之任不可輕付湏於貴臣中進擢難以驟用臣以謂不然今日之禍皆肉食者之過正當擇人而用之或有功於社稷者或士民所望者雖小官雖陞任雖謫籍皆可起而用不必拘於資格傅説版築之賤髙宗立之為相不疑而中興之業乃成説豈素貴乎東漢陳龜曰三辰不軌㧞士為相四方不靖㧞卒為将今何等時逓遷貴臣耶臣又慮有為陛下言者必曰今日金人直入京邑亦天數也非人力所能止也不獨輔臣之罪也此尤姦之甚者臣以謂不然自前朝失謀與北朝結好人皆知其必為中國患邦彦為少宰踰年邦昌在政府又乆何不為國家長慮却顧豫為之備致令衝突直造於此前日邉臣以敵必敗盟為言邦彦邦昌曽莫之省傳曰顛而不扶危而不持焉用彼相其可歸之天命耶臣又慮有為陛下言者必曰金人之禍乃邦彦邦昌軰阿諛所致必使之任其責不可於擾攘間聴其求去此乃妾婦間之説非為國之道也臣以謂不然知賢而不能用知不肖而不能去此最有國家者之大患邦彦邦昌既無智慮謀之於其微必無計䇿禦之於其後逐之而專任賢者可也世有為人之傭工者取其直而敗其事則主人必去之豈有謀吾之國既已悞國復固執而責成耶二人黨類為之地者臣言之極矣不識陛下曽受此等先入之言乎若有一端之説嘗悞聖聴則可以槩察其餘而邦彦邦昌不可相决矣二相如此其餘在政府者尤多不才不足論也周官曰明王立政不惟其官惟其人又曰官不必備惟其人茍得其賢者一二在位足矣闒茸之人雖布滿朝廷顧何益於事而必優容寛假之不畧加沙汰哉太宗皇帝嘗謂侍臣曰國家若無内患必有外憂若無外憂必有内患外憂止不過於邉事皆可豫防惟姦邪無狀若為内患深可惧也帝王用心常湏慎此嗚呼聖訓不其切至歟今日金人來侵如此可謂外憂矣若用非其人更為内患則陛下如何為國臣所以寒心也願陛下稽考太宗皇帝之聖訓而蚤加慎焉然則當今為相如之何而可臣愚以謂必智慮忠實學術正當徳足以服人才足以應變通知祖宗以來典故而於進退百官之間能以公滅私不畏且怯夫然後可以鋤去姦惡汲引賢能革極弊之事而布維新之政以濟生民以保國家則中興之業陛下成之易矣金人何足慮乎自祖宗以來相臣多以言官論列直指某人可相某人不可相無非天下之公議此最為我宋之盛典比來臺諌一䝉時相㧞擢則多懐私恩無有直言者矣此亦不可不察也今日之相莫若陛下誠心廣求虛已任用不可聽厚誣之言天下無其人也仁宗皇帝至和中罷陳執中相而並用文彦慱富弼二相久有人望正衙宣麻朝士相賀仁宗皇帝宻遣小黄門於百官班中探其議論間有相賀得人之語喜謂歐陽修曰自古人君用人或以夢卜茍不知人當從人望夢卜豈足憑也茲事著之寳訓傳之士大夫至今為盛時之舉不誠韙歟陛下求賢必能用仁宗之操柄探縉紳之公言從中外之人望不待愚臣之喋喋也臣伏自覩陛下詔書求言便欲少竭愚衷以伸二十年區區之志竊臣人物至微若論細事則不如不言之為愈前草大利害書未及上而陛下先已施行恐成觀望遽即寢罷今乃輙言二相為人深若僣越然臣嘗謂鄭子産不毁鄉校猶使議及執政之善否况天子建大學以取士論政為本而又有求言之詔且申誡曰母囘隠以溺於導諛茍若畏禍而不陳其愚臣實恥之干冐天威臣無任戰慄待罪之至三朝北盟㑹編巻三十五
