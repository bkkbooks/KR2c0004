body:
  text: 三朝北盟會編卷一百三十六宋徐夢莘撰炎興下帙起建炎四年正月一日甲辰盡三十日癸酉建炎四年甲辰朔車駕駐蹕昌國縣張俊敗金人於髙橋三日丙午知明州軍州事劉洪道棄城走金人陷明州張俊雖已敗金人於髙橋然心猶懼遂與李質及劉洪道俱棄城而去州人隨之争門而出洪道已渡浮橋使人㫁其橋路故州人不及渡而金人已入城追至西門外州人多溺死金人乗勢屠明州存者無幾眀州之人是以怨張俊得小勝而棄城遂致大禍五日戊申車駕發昌國縣上聞金人已陷明州昌國不可駐蹕遂行金人陷昌國縣金人知鑾輿已入海道乃自眀州乗小鐡頭船泛海隨潮無風至昌國縣縱火刼掠至沈家門而囘乗輿纔隔一日七日庚戌幸章安鎮司全張擬以所刼神御來䖍州詣隆祐皇太后乞降傅選陷彬州岳飛屯於宜興縣水軍統制郭吉自建康潰散屯於宜興縣時右統制岳飛與劉經屯於廣徳軍種村飛令軍中不得驟擾鄉村約束雖嚴然不可禁飛患之有将司李寅者獻計曰若移軍宜興三面臨湖唯有陸路極狹使一小将守之不可犯矣飛大喜遂移軍宜興吉聞飛将至已懼即命擄捉舟船盡載老小若将遁者飛先遣人投書以好語慰諭吉吉覺之急解維開船而去飛遂屯於宜興後寵榮率其衆背吉而投飛納而用之王徳張景斬趙萬於袁州趙萬㓂袁州王徳張景與戰敗之萬臨陳乞降徳斬萬而并其衆十四日丁巳金人陷陜州李彦仙死之李彦仙守陜州髙城深池利器械積粮食鼓士氣且戰且守人心益堅固可用又嘗北渡河與金人戰蒲解間民皆陽從金而隂歸彦仙金人必欲下陜州然後專力西向彦仙亦自料金人必併兵來攻即遣人詣張浚求馬三千匹俟金人攻陜即空城渡河北趨絳并汾毒其腹心金人必自救乃自嵐石西渡河由鄜延以歸浚不從浚貽書勸彦仙宜空城清野據險保聚俾敵人來無所掠我亦無傷俟隙而動庶乎功可成彦仙亦不從守城之意益堅金人自舊歲冬以重兵來攻彦仙以死守浚取間道遺以金幣使犒其軍又遣軍援之至長安不得進彦仙日與金人戰将士皆未嘗觧甲金人晝夜力攻之歲終猶未下羅索命自正月一日為始以一軍攻擊一日不下則歇泊次日别輪一軍攻一日十軍輪作十日攻擊如不下次日聚併攻一日如是者凡三十三日必要破城攻擊之法攻具畢施其不當攻具者背負雲梯手執刀斧弓箭毎隊以鼓在前擊鼓一聲則進行一步既渡濠地鼓聲漸促莫不争先疾趨併力齊登死傷者雖滿地而不敢反顧丁巳晨有鳶鴉數萬譟於城上與戰聲相亂羅索曰城陷矣促使急攻已而城陷彦仙出城走過河北曰吾不甘以身受敵人之刃聞金人大縱屠掠彦仙曰金人所以殺戮過當者以我堅守不下故也我何面目復見世人乎遂投河而死逺近聞之者莫不嘆惜之曰嗟乎烈士世皆稱其忠浚作文遥祭而哭之表其事於朝十五日戊午車駕駐蹕於章安鎮上在章安鎮忽有二舟為風所飄直犯衝禁船問之乃販柑子客也上聞盡令買之分散禁衞軍兵令食穣取其皮為碗是日元夕収燈之辰也乃命貯油於柑皮中㸃燈隨潮退放入海中時風息浪静水波不動有數萬燈如浮在海上章安鎮居人皆登金鰲峰㸔之十八日張俊自明州來郭仲荀自越州來張俊棄眀州捉得金人二人至是來獻郭仲荀來乃知李鄴獻越州矣遺史曰吕頥浩范宗尹王綯從車駕在海道常欎欎不樂逰宴六鰲峰以消憂感耿嗣宗敗金人於盧氏陜州既陷金人攻盧氏縣先是李彦仙遣耿嗣宗屯於盧氏嗣宗出兵與戰金人大敗死者滿野二十日癸亥車駕𤼵章安鎮上在章安鎮半月餘常一日登金鰲峰見壁間詩一絶句曰牡礪灘頭一艇横夕陽髙處待潮生與君不負登臨約同向金鰲背上行上問誰題此詩僧對曰過往攫客上惡之方啜茶以其餘潑於詩上張俊郭仲荀既到上以章安鎮不可居甲子進𤼵行五六十里有一小島嶼林茂盛中有屋數間上命泊舟與内侍數人步登㟁入其舎乃僧巢也爐香猶未斷烟而寂不見人令扵林中尋之得三僧二僧童云是台州夀聖院之下院也上見壁間有小榜云為金人侵我中原伏為今上皇帝消災祈福祝延聖夀上喜之賜金五十兩三僧各賜紫衣二童僧各賜度牒披剃仍令禮部賜額金人逼潭州湖南安撫使向子諲棄城走金人屠潭州湖南初聞警報子諲揭榜禁止官員士庶並不得出城甲子金人逼潭州呼令開門投拜軍民皆不從請以死守城金人力擊之遂登城子諲􅊳圍出奔城遂陷軍民猶極口罵詈力為巷戰由是滿城生靈盡遭誅殺後賜詔撫恤官吏軍民賜潭州官吏軍民等撫恤勅書朕惟金敵慿陵東南震擾長驅騎卒奄及湘城方薄壘以來攻至浹辰而靡息爾等明於分義属此艱危雖巧言之百端終堅持於一息逮兵火之失守猶夙夜以輸忠躬履軍鋒詈之極口力為巷戰奮以忘軀因奏牘之來陳想忠誠而嘉嘆邵興退軍虢州盧氏縣邵興在虢州聞陜西已破李彦仙既死乃退軍於盧氏縣二十四日丁夘䖍州軍亂隆祐皇太后既到䖍州百官及官司所有之物盡散失衞軍求請唯得鈔折二錢市中買物不售軍與民相争鄉民皆喧言曰何人來壊了我州府遂以搶刺軍士有傷者奔入所屯景徳寺中被甲執器仗保所居百姓亦被甲執器仗保守坊巷有䖍化縣百姓沈立等三百人與百姓相犄角令甲軍出於寺後轉殺兵民由是鄉兵與将兵及百姓争門出軍士遂縱火肆掠䖍多竹屋煙焰亘天不可向邇鄉兵之首領陳辛率衆數萬圍䖍州太后震恐赦其罪不聴滕康劉珏楊惟忠皆坐視其亂而不能禁先是胡友犯臨江軍楊琪與戰不勝遂陷臨江軍至是友以其衆復至䖍州及陳辛戰於城下破之遂觧圍張中彦在吉州聞難不顧劉可為其黨所殺劉超據荆門軍劉可者沒角牛楊進之徒黨進死其衆以可為首轉㓂汝蔡隨唐信陽之間屢與桑仲戰皆不勝為其徒黨所殺遂推劉超為首以據荆門軍劉可劉超所過井邑皆墟人無噍類二十五日戊辰車駕幸温州駐蹕於江心寺京城留守程昌禹退還蔡州程昌禹為京城留守在京城凡四月隨行軍吏無糧食不可留遂還蔡州上官晤權留守事金人登楚州城不能入復退去趙位在楚州專為戰守之備金人達蘭以數萬人圍城修治攻具以舊歳十二月攻城之南壁立親作旗頭引衆出戰金人來占砲地立與戰却之凡十月餘不能占砲地有淮隂縣百姓左彬者為隊長部民􅓯壕於城下有金人勇将擐甲馳馬掠壕而過彬以刃追逐之金将勒囘馬迎敵而彬與戰於野良久金将去立適在城上見之問其姓名補以官使為親隨立毎出戰彬必隨之屢立竒功金人凡攻四十餘日立親出戰者四五十次金人以砲連擊三敵樓而破之遂登城立先取生槐木斫作鹿角以鹿角槎定城破處兩頭又下修月城以裹之月城之中實以柴薪城之内置鎔金人無路可入在城上立者如植城外立洞子數十皆藏兵俟可進則進登城不能措手壅隘不可上争自月城中入立命潑金汁焚其柴薪焼死者一二百人自是金人以不能入而退還守孫村蒲夀河大寨時時以鐡騎數百人出沒於城下以掠取尋糧採薪者故城中之人皆不能出而糧薪日以罄竭矣二十七日庚午李成陷六安縣李成攻陷六安軍水寨下寨於郭界步置碓磨於十八倉以其衆攻六安軍不克是時安豐縣土豪孫暉統率鄉兵保守安豐塘羣㓂不能攻三十日癸酉令隨行在職事官各條具當如何措畫及當如何處駐蹕汪藻上疏疏曰准行在御史䑓告報正月三十日三省樞密院同奉聖㫖将來敵騎北歸或盡數過江或於建康杭越等州留兵占據各當如何措畫及當於何處駐蹕除已令侍從官條具外可更令隨行在職事官各條具以聞者右臣竊惟金人為我國患難雖五年而自陛下即位以來祖宗土宇日蹙一日生靈塗炭歳甚一歲臣嘗稽之載籍自古敵國强盛固有之矣未聞有如今日之甚中國凌夷固有之矣未聞有如今日之極雖至微弱之邦至衰闇之主敵人臨境猶能使其國人勉强一戰未聞以中國堂堂之大州縣所存者大半陛下英明之資勵精求治無失徳於天下而外敵長驅去部落萬有餘里如入無人之境至山東則破山東至淮南則破淮南至浙江則破浙江嘻笑而來飽滿而去坐令原野厭人之肉川谷流人之血宗社不絶如綫以萬乗之尊至於乗桴如海倀倀然未知税駕之所其所以至此者何哉将帥不得其人而陛下所以御将帥者未得其術也今陛下所謂将帥者誰乎臣知之矣不過曰劉光世韓世忠張俊王之徒是也論其官則膺節鉞之除兼兩鎮之重視執政之臣有韓琦文彦博所不敢當者其寵可謂極矣論其家則金帛充盈所衣者錦衣所食者玉食奢豪無所不至雖輿臺厮養皆得以功賞補官至一軍之中使臣反多卒伍反少其志可謂驕矣平時飛揚跋扈不循朝廷法度所至焚掠驅擄甚於敵兵者陛下不得而聞也擁重兵居間處邀犒設賜賚者陛下不得而吝也然天下之人猶謂陛下寛之至此者防秋之時責其死力耳及敵人之來是數人者曽不能為陛下施鏃矢之勞獨張俊眀州僅能少抗若更堅守數日待敵再來乗其機㑹極力勦除敵必終身懲創不敢復南此則俊忠於陛下也其利害豈真為今日計哉奈何敵未退數里間遽狼狽引軍而行也雖三尺童子知其不可以為敵性驍勇不攖其鋒猶懼屠戮况已憤怨而去既不増兵益戍徒反旋軍空以挑之是前日至小之捷乃莫大之禍也未幾果殘眀州無噍類焉是殺明州一城生靈而陛下再有館頭之行者張俊使之也臣嘗痛念自秋以來陛下為宗社大計懼敵人之侵宵旰焦勞未嘗頃刻少安以建康京口九江皆要害之地當宿重兵故杜充守建康韓世忠守京口劉光世守九江而以王􅊅𨽻杜充其措置豈不盡善也若敵騎渡江杜充韓世忠王􅊅併力扼其前劉光世掩其後可使奔北不暇而世忠八九月間已掃鎮江所儲之貲盡装海舶焚其城郭為逃遁之計其比肩諸将聞朝廷欲倚世忠為杜充之援者無不竊笑是世忠初無為陛下拒敵之心也洎杜充力戰於前世忠王􅊅卒不為用劉光世亦偃然坐視不出一兵方與韓相朝夕飲宴敵至數十里間不知則朝廷失建康犯兩浙乗輿震驚者韓世忠王􅊅使之也失豫章太母播越六宫流離者劉光世使之也嗚呼諸将已負國家罪惡如此謂須少畏陛下之威憚臺諫之言日夜皇恐席藁負鑕請罪有司謝數州生靈之死亦知尚有朝廷之法而張俊方且以萬人殺獲數十人之功冒朝廷不貲之賞自明引軍至温道路雞犬為之一空居民聞來逃奔山谷數百里間寂無人煙韓世忠逗遛秀州放軍肆掠為之騷然至執縳縣宰以取錢粮平江府自城而外無不被害周望僅能守其城中而已雖陛下親御宸翰召之三四而不來元夕取民間子女張燈髙㑹君父冒不測之險而不恤也王􅊅自信州入閩所過州縣邀索動以千計公然移文曰無使枉害生靈其意果安在哉方國家危急之時所恃者諸将所為如此不知何以立國臣竊憤之此事人皆知之而無為陛下言者豈以為不急之務哉以天步艱難正藉此曺為重而不敢言耳然臣竊為懼焉臣聞王者所以得天下者以得民也得民者以得其心也兹者陛下南渡可謂播遷之極矣而百姓尊君親上志不少衰豈非祖宗徳澤結人之深而恃陛下為之主耶所謂為民主者平日取民財力以養兵緩急之時排難解紛而使民安業也今諸将聞敵人之來則望風遁逃反汲汲内相攻殘以為民害車駕所過一路則一路罹其烖所過一州一縣則一州一縣罹其烖今江淮兩浙已如此矣萬一幸湖幸蜀則金人侵其前而無人以拒官軍殘其後而無法以繩是復為江淮兩浙無疑矣古者天子所臨曰幸言所過人以為幸也豈今日之謂哉臣恐人心一解而陛下無所恃也持此将安歸乎臣又聞張俊離明之時士卒頗有願留擊敵者俊聲言陛下召之臣知其説矣陛下諸将皆本無鬭志方無事時則先取赴行在指揮以備警急則引去曰朝廷召我矣其實自欲遁而又假上詔令以欺其欲戰之人使歸非其上此尤可罪臣比至黄岩聞陛下使李捧屯兵縣中降指揮云金人至台州則前來温州是既欲遁而陛下又令之使遁也夫士驅之使鬭猶懼不前况令之使遁也然則敵人長驅無所忌憚者適其宜耳何足怪哉臣竊觀今日諸将在古法皆當誅然不可盡誅也惟王􅊅本隷杜充充敗於前而􅊅不救此不可赦當先斬􅊅以令天下其他以次重行貶降使以功贖過如張俊之軍獨可賞其将士耳所以移軍輙遁者俊也罪亦何逃如此庶㡬國威少振昔周世宗承五代之衰将士習為驕惰河東之敗一日而斬大将樊愛能等三十餘人然後東征西討無不如志白起於秦可謂有功矣一不受命賜死杜郵郭元振唐之勲臣也眀皇怒軍容不整坐之纛下葢威克厥愛允濟愛克厥威允㒺功是數君者其知之矣何則人之欲無窮思有時而既惟吾威足以制之然後恤焉足以為恩况此曺平時饜飫於擄掠之資矣用㡬何錫賚而能滿其意哉如有賞而無刑是姑息之政耳自古有能以姑息而成功者乎且漢髙祖之興所将者韓信黥布彭越也以今日諸将之才視之何如哉所成就者布衣而取天下也以今諸将視之何如哉然髙祖於是數人者欲王則王之欲誅則誅之曽不少貸非将将者人主之職耶故今陛下當以将将為職熟視諸将悍驕如此而無以治之異時張浚集西兵而來則又靡靡相効成風矣不知生靈何時息肩國家何時興復以臣觀之今日之兵今日之将習至此陛下已不得而用已不得而制矣非特無以責其至誠徇國所至人心振恐動而有意外之憂有之不如無之臣愚以為敵退之後正朝廷大明賞罰立紀綱新人耳目之時莫若擇有威望大臣一人盡䕶諸将雖陛下親軍亦聴其節制稍稍以法裁之凡軍輒敢擅移屯以䕶駕為名者主将将佐僚属並論如法仍使於偏禆中擇人才可用者間付以方面之權待其有功加以爵秩隂為諸将之代天下之大豈無數人将帥之材哉特為諸将所抑而不得伸耳若陛下馭諸将如臣所言則敵或盡數過江或於建康杭越等州留兵占據守亦有功戰亦有功車駕囘臨安或平江徐議所向留浙江亦可幸湖湘亦可如其不然雖大臣忠貫白日謀臣如雨言利之臣能使錢流地上何益於事哉譬禦飢者當用食捨食之外皆非所急也已疾者當用醫捨醫之外皆非所急也今日所急在於馭兵馭将其他皆非先務惟陛下與大臣熟議㫁而行之臣愚狂瞽不知忌諱罪當萬死遺史曰汪藻之疏可謂切中時病矣獨不當分曹植黨隂庇杜充之罪夫杜充以宰相統兵守大江固金陵一旦失利乃曰罪在兵将寧有此理况杜充未嘗出戰而藻言杜充力戰於前言不由衷豈能勝億兆人之詛嗚呼分曹植黨今日之大弊議論所以不公事功所以不成者葢在此也是月京城留守司辟牛臯充本司同統制兼京西南路提㸃刑獄牛臯汝州弓手也聚衆與金人戰以戰功補官累遷武翼大夫榮州刺史為招撫司中軍統領建炎三年冬金人再蹂京西皐凡十餘戰皆捷加武節大夫果州團練使至是留守司辟為同統制兼京西南路提刑三朝北盟㑹編卷一百三十六
