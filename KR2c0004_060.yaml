body:
  text: 三朝北盟㑹編卷六十宋徐夢莘撰靖康中帙起靖康元年十月二十九日辛酉盡其日太尉鎮洮軍節度使同知樞密院事种師道卒种師道以同知樞密院事巡邊至懷州遇疾奏利害於朝曰金人頃邀金幣安然北去今若復來是必集諸國大舉鋒鋭不可當臣前計不聼青滄衛滑既不宿兵無籬藩之助欲乞大駕幸長安以避其鋒至於守禦攻戰責在將帥戰鬭事非萬乘所宜任也詔師道赴闕計事還都而卒靖康小雅曰公諱師道隱君之後其先世衡諤誼皆為名將公復能世其家威著西夏燕山之役公為都統制論詔童貫不合節制不復從公出既失律以劉延慶代之二太子之入也公自陜右同弟師中姚平仲等提河隴徑卒赴難京師遂除同知樞密院時二太子攻封邱門公建議乞優以金帛官爵募敢勇之子乘城縱敵人登城甫及女墻即執而殺之且令城中發喊不輟縱火誘敵人使登不信宿可盡戮之白時中李邦彥吳敏李綱皆聼既而勤王之師大集公欲簡科分為三等上等出戰餘皆守城先立厚賞之格以示之選將分總距敵二三里環營守之總絶其剽掠使其乏絶趣姚古以所領西師㑹河朔將兵選精鋭五萬人自河陽駐州進屯敵營之後刻日并力攻之此必勝之䇿也時李綱方遣姚平仲劫寨又不用公言倘欲城下决戰則渡河之後㑹諸道擊之又不聼平仲敗績公復言劫寨已無功然兵家亦有出其不意者今夕再遣兵分道攻之亦一竒也如猶不勝然後每夕以數千人擾之不十日敵遁矣邦彥等畏懦又不果用敵既退除公宣撫使屯滑州既而又命移屯河陽時公年七十餘老病􅉵甚自力上道遂薨于途嗚呼公之料敵制勝審矣當時將帥無出其右者邦彥庸繆固不足道而李綱號為喜功名者復不聼公䇿此為可恨然公之未亡天下猶倚為重既復謝世孰不嗟惜嗚呼此亦天也詩曰壯哉此翁謀深氣徑終始一節佑我三聖百戰之餘所料必勝提師入援敵讋威令叠盡良䇿衆莫之聼割地增幣强鄰益橫萬里長城恃為藩屏倐嗟不祿亂何有定旌旗無光兵民凄哽餘烈昭昭方求獨盛封氏記年曰种師道薨猶子湘知叙州以伯父師道自來勞績奏上乞加褒恤中書門下省吏部狀凖司封紹興五年六月三日敕中書門下省尚書省送到故太尉同知樞密院事開封儀同三司种師道親姪閣門宣贊舍人新差權發遣叙州軍州事种湘狀亡伯師道出入五朝四更文武忠諒顯著見於勳業任提舉常平日因上言免役等事入元祐黨籍伏念伯師道元係太尉見任樞臣薨捐之日䝉恩止依散節度使劉昌祚等例贈開府儀同三司今伯師道在位别無子孫具告敕䇿屢經兵火並皆失去無緣詳具今略具大節并遺表録曰在前欲乞依元祐宰臣吕大防近例恭候行下太常寺定諡具贈官吏望朝廷酌施行伏候指揮三省樞密院同奉聖㫖种師道特贈少保仍令太常寺定諡擬諡曰忠憲詳按諡法曰慮篤國家曰忠文武可法曰憲勘㑹本官係特恩贈諡依指揮合命詞給告伏乞朝廷酌指揮施行伏候指揮六月二十一日奉聖㫖依太常所申司封公到勘㑹种師道生前封告昨緣渡江散失案牘無慿契勘外尋將渡江後應管簿書檢照得無种師道封告除下已种湘取索候列别具狀伏供申施行奉敕㫖古者死而無諡至于周有考行易名付之公論褒貶豫奪莫之敢私百世傳焉垂勸天下故太尉鎮洮軍節度使同知樞密院事贈少保种師道世載韜略性服仁義早親有道大自修飭言行無玷出處可觀論新法之害民遂坐黨籍言北伐之誤國致使黜休北敵內侵起授師柄昌言擊計國勢所慿和議奪之乃至禍敗驅馳出入以沒其身天下盡傷九原難作夫心篤國家之念可謂曰忠材兼文武之資是宜為憲使爾不朽名言在兹精爽未淪尚歆加寵可諡曰忠憲告詞云材弗冗于當時名愈髙于後世自賢哲遺恨常多朕方聼擊鼓而增思悼爪牙之先奪肆加褒恤載揚芬芳故太尉鎮洮軍節度使同知樞密院使贈開府儀同三司种師道文武具宜忠孝無爽昔在燕山之役每忤權臣至于靖康之初首陳善計謀既沮於和議功莫遂乎戰多飲恨而終昌言猶在贈典未及人情鬱然因猶子之控陳升亞保而作寵誦詩見方虎之烈聞鼙思頗牧之風夢想音容撫嗟何已恩章所及其尚知歆可特贈少保餘如故折彥質撰公行狀曰公諱師道字彞叔其先河南人曽叔祖放隱君者退居長安豹林谷子孫因家焉曽祖昭衍贈太保曽祖母徐氏贈廣平郡夫人祖世衡贈太傅祖母劉氏贈普寧郡夫人父記太師母尹氏贈永國夫人伯父開府儀同三司諤以郊祀恩補公三班奉職從破西夏米脂城遷右殿直用試換法入選左任成州寧州鎮洮軍推官開府公既捐館幕屬徐勳輒用印作奏薦士詔御史問狀勳即引朴為證朴開府公之子也公馳至京師上書訴狀斬然在衰絰之中豈復與聞他事倘不獲免焉似為夏人報怨耳神宗皇帝即日赦出之陜西轉運使王斂臣聞而義之辟以為屬罷為熙州推官帥司以並邊儲事無急于糴買糧草者遂以委公盡除攬官弊俾商賈不病而價以平事如期辦使來取其法下諸郡㑹同谷縣有猾吏訟田逮繫凡七十人再期不决乃檄公權縣事公至取案牘閲之窮日之力不可遍然所訟止于母與兄也公遽引吏置之法問曰母兄訟常也淹再期以擾鄉里亦足矣吏服罪闔境快之由是二十八保各繪一像而祝焉改右宣義郎知邠州新年縣哲宗皇帝方任章楶經理西事辟充涇源路經略司主管機宜文字其後城沒煙峽秋進克州南年㑹鹹泊口獲六路統軍嵬名阿埋西夀監軍妹勒都逋百官入賀于紫宸殿獻俘于宣德門奏功于裕陵西夏相繼請罪納欵訖紹聖無復風塵之警公贊畫之力為多纍遷朝散郎通判原州事召對稱㫖特遷朝奉大夫秦鳯等路提舉常平徽宗皇帝用韓忠彥為相以役法差募孰便計于諸路為公所陳忤曽布蔡京挾狀咤使知德順軍言者論公誣詆先政復換朝奉大夫放罷逮名姦黨坐廢幾十年始除主管華州西徽未幾復換武功大夫忠州刺史涇原路兵馬都鈐轄知懷德兼管內安撫使政和元年夏國議畫疆界使人焦彥堅以故地為請纍數百言公徐答曰居故地則漢唐以來皆是也君之疆土亦蹙矣遽起謝曰凖公命己私事于公曰自公守境國人受不擾之賜恨不獲伸子姪之禮于下執事也詔乘驛赴闕下顧問邊事公曰無為可勝來則應之毋妄動以生事此其大略也朝廷方欲圖功于逺升右武大夫俾還任力請奉祠除提舉西京嵩山崇福宫二年再詔赴闕內侍童貫寖用事矣欲以諸路近裏弓箭手往實新邊所招而為新邊之數以快上意上質於公公曰臣恐勤逺之功未立而近擾之患先及也上喜其忠直特賜對衣金帶秦鳯路提舉弓箭手是時五路皆置提舉官入謝上謂公曰唯卿朕所親擢也貫病之復除宫祠然賚豫甚渥仍宣諭勿辭留為鄉里之費四年除涇原路兵馬都鈐轄西安州兼管內安撫使五年築威川飛泉兩寨夏人侵定邊軍築佛口谷為城名洪下軍六年以本路之兵初臨城渴甚公指山之西麓曰是當有水命工求之得水滿谷至今夏人稱之以為神遷左武大夫康州防禦使上益知公為可任矣遂除龍神衛四廂都指揮使洺州防禦使涇原路安撫使知渭州八年詔節制諸路兵往城席葦平方授工而夏人坌至據葫蘆河堅壁故老我師公陳于河滸若將决戰者遣偏將曲充趙抃徑出橫嶺俾牒者驟言漢兵至矣敵方疑顧而楊可世出其後姚平仲率精騎衆擊之敵大潰斬首五千獲槖駝牛馬萬計器甲數萬魁首阿山比精僅以身免城成而還上以夏國等臧底城為成德軍破為邊患前去王師屢出無功詔公率陜西河東七路之師期以一旬尅六月師薄城下分晝夜以攻敵守偹甚至我師益怠偏禆有據行床以督役者立斬之尸於軍門令諸將曰今日城不下視此俄而城潰才八日矣上甚嘉特遷侍衛親軍馬軍副指揮使應道軍承宣使賜賚優渥宣和元年以靖夏城失守降授隴州防禦使二年童貫巡邊殿前劉延慶步軍劉仲武從行二劉班秩皆在公上及其謀帥也上以公為都統制二劉副之師出蕭關而夏人畏公威名棄永割和踏而遁兩城皆要衝也師及鳴沙無所見而還拜保靜節度使尋以衰病乞休養御筆批諭卿之私謀固云得計朕之注意殆將付誰六年被㫖徑謁宣撫司議事時童貫蔡攸已駐軍于雄州俾公盡護諸將出境公曰今日之事譬如盜入鄰舍不能救又乘之而分其室焉且夫師出無名事故不成發蹤之初宜有所失貫等曰君第行勉旃謀之不臧不以歸也公請西州之兵素所服屬者知雄州和詵在坐盛稱北人簟食壺漿欲迎王師久矣濟師何為貫等又出御筆俾不得辭仍命詵為副公曰彼或旅拒王師亦將討乎否也貫等曰直以文告况有成命要功而擅殺者償死既過白溝北人驟及軍容甚整詬曰爾之涉吾境也何故前軍多傷公夙戒人持一巨挺賴此不大潰貫等疾召軍還登陴北慨然而歎别遣辛企宗用勝健兵往挫其鋒才接刃遂敗北人至城下使人請曰金人之畔本朝亦南朝之所甚惡也捨此不圖而欲射一時之利棄百年之好結虎狼之鄰基他日之禍謂之得計可乎使不獲已而罷嵗幣固所願也或使歸其侵疆亦云從也唯是救灾恤鄰古今通義望諒察焉無計折之直麾令出公遽白和為吾之計亦何善於此不聼乃遣公見上然已密啓劾公略曰天資好殺臨陳肩輿助敵為謀以沮聖意即有㫖押赴樞密院問狀知院事鄭居中以文勸公公堅不從宰相王黼聞之甚怒責授右衛將軍致仕復用劉延慶果敗績而貫等出金帛招散亡以轉山迷道為名用期上聼祖宗馭軍之法始壞矣七年起為憲州刺史知環州公之弟師中作守閲十有二年而後去民未忘聞公之來甚愜私為之約犯公之杖者有罰公以閉閣清净上下肅然尋復請歸詔還保靜軍節旄致仕八年金人畔盟陜西漕臣王庶偶奏計在闕下即見宰相請急召公宰相猶疑之而和詵奏至亦言金人勢當長驅國家承平日久無知名之將獨有起种師道為帥庶少寬朝廷之憂宰相以示庶庶曰詵言及此豈非迫于公議乎乃遣使馳驛召公而托以安危之意見於宸翰從除檢校少保靜難軍節度使京畿河北路制置使聼便宜檄取兵食即發令姚平仲以騎兵二千步兵一千更戌燕山未行遂與之俱淵聖皇帝即位又遣開封少尹田灝中使裴誼陸舜舉促公公比至西京而斡里雅布屯于京城之北矣或曰敵勢衆而我首以輕兵犯之成敗可見也四方勤王之師遂將解體不若小駐汜水以圖全勝公曰吾以數千之兵遲回不進形見情詘祗取敗焉敵孤軍深入日慮援兵之至今若徑去彼此莫測第使二騎到城門則京師之氣自振何患於敵淵聖聞公至詔開安上門遣尚書右丞李綱迎宰相李邦彥等請降詔數付師道金人和議已定敢言戰者族是夜與宰執同見上于福寧殿上曰今日之事卿意如何公但曰敵人不知兵使其知兵豈有孤軍深入人境而善其歸乎上曰業已講和矣公曰臣以軍旅之事事陛下餘非所敢知也即除公檢校少傅同知樞密院事兼安撫使公因雄州之役憂恚成疾勉强到闕恩許免拜肩輿入朝家人掖升殿仍免隨班明日金使王芮陛對稍如禮上顧笑曰彼為卿故也自金人渡河諸門盡閉市無薪菜公請啓西壁南壁聼出入如常時人情始安又請緩給金幣禁游騎不敢遠掠候彼惰歸扼之于河衆可殱也公素簡默執政見其所陳止此頗易之前日舉朝是和議獨李綱非之上以書生弗堅用也至是與公意合凡願有為者皆奮快從臾上亦以敵為不足平也山西望族唯种與姚而二家子弟每相下師中時為秦鳯帥平仲之父古為西河帥皆以兵入援兵之次舍熙河尚未至平仲恐功名之㑹獨歸于种氏也心忌之乃以士不得速戰有怨言達于上公置司都城兩驛而平駐兵于金明池因授㫖城外兵馬緩急盡聼姚平仲節制而劫寨之䇿遂行上一日遣使者五輩促公戰公附奏曰陛下先已議和又遣親王宰相為質又敕言戰者族今戰勝負未可知也他日諸公必以臣為說願詔執政大臣熟議可否乃與李邦彥李綱及知樞密院事吳敏同對于福寧殿亦命姚平仲入邦彥等以為可擊無異詞上問兵期公請過春分節是時相去七八日上以為緩公平日未嘗狥日者之論蓋欲俟師中之至以付之耳平仲探知其意急欲成功後數日兵用不利上曰朕誤于聼用非卿之罪乃獨黜綱焉凡主和者稍復振都堂晚聚公曰勝敗兵家之常正當再擊耳諸公惎之都人憤焉羣噪于宣政門外綱既復位而知公初未嘗被逐也乃已自是和戰之論搶攘衝决斡里雅布既歸即罷公為中大夫宫使俾五日一到都堂議事靖康覃恩遷檢校少傅少日復除同知樞密院事仍拜太尉鎮洮軍節度使充河北路宣撫使又改宣撫使駐軍濟州實未嘗有兵也公請㑹山東陜西京畿之兵屯於青滄濟衛之域預為防秋之具諸公以金人重載初還豈易再來不足自擾費也既而种師中死於榆次姚古敗於盤陀朝廷始震促召公還上雖厚其恩禮而執政方欲擠李綱使去不復有用公之意公亦失愛弟力請退休遂罷宣撫使令三日一到樞密院用李綱為河北河東路宣撫司尋以敗績被罪而太原亦相繼不守復遣公以樞臣巡邊蓋諸公親逐李綱有疑焉也公實不可行强之使去駐于河陽金使王芮至燕山倨甚度知敵情必大舉入侵即疏請駕幸長安以避其鋒守禦戰鬭之事本非萬乘所宜任責在將帥可也朝廷以為怯後召還至不能入見上遣中使挾醫勞問無虛日是年十月二十九日薨于賜第之正寢享年七十有六上臨哭之慟輟視朝五日賜衣衾棺槨龍腦麝臍以殮贈開府儀同三司今上即位再贈太保告詞略曰昔在燕山之役每忤權臣至于靖康之初首陳善計謀既沮于和議功莫遂于戰成飲恨而終昌言猶在太常諡議忠憲以心篤國家之念材兼文武之資也建炎元年六月十五日葬于萬年縣神禾原公娶尹氏贈宜春郡夫人男誥迪功郎溪保義郎閣門祗候皆已官而卒孫彥崇彥松彥崇死于兵彥松早夭朝廷命其姪浤奉祀公初居建中避建中靖國年號改師極徽宗又特命名師道公色莊氣壯顧瞻有威寡言笑謹許可量度濶逺接物誠至為族黨鄉里推重開府公每以公輔期之識者不以為過少從橫渠張載學多見前輩長者練達世務洞曉古今故用之為州縣則吏畏民愛善政可紀用之為監司則百城聳畏而不敢犯法用之為將帥則朝廷尊長敵國懾服不用則退處田間雖畦丁耕叟皆得其歡心蓋所學非徒為章句而所行不狥于流俗也晚年既登要路天下之人想望風采而公年已深矣重以朝廷無事幾二百年士夫無有略知兵者聞公之謀且疑而公精神已衰又不能大振發之使其退聼此有志之士所以歎息至今而不能已也天亦豈無意哉靖康之冬尼堪斡里雅布直逼宫闕二聖北狩百寮係纍而公從容牖下晚節昭著善乎始終不憖遺一老俾夀而康以中興于王室此其難諶也宣和八年冬彥質被召來自西路與公相值于鞏過鄭乃聞朝廷許割三鎮之地繼而有㫖俾勤王之師未得逼近都城公得書歎曰吾曹奔馳而來朝廷猶訝其援緩書者云云命亟殺之明日過板橋去京城才數里而金人方知其夜令姚平仲屯兵于金明池岸聚焉公曰蕞爾兵置于空曠之地必為敵所窺矣此兵家之用巧不得不爾其後獲譯者金人亦稱其智焉姚平仲敗士民洶洶見公顔色晏然若無事者乃定頃年有客從公討敵而二年罷臥于道見而問之病既去復命戮之客以問公公曰問為詐也不戮則人相效用詐矣及其治民惟恐其傷童貫初欲平陜西物價以低昻錢法帥臣徐處仁錢昻生異議貶民間哄然為之罷市公遽下令議法未定姑金銀凖折由是涇原一路獨不失所少日部使者以錢通流約同剡奏乃謝不可曰吾邦蓋不爾也郡門空虛至閲數月訟事至庭取筆書牒尾有罪即笞捷若訓子弟無留禁者胥吏告緩急事叢或俾軍典以主之築塞樂園于懷德之郊春秋從賔客鳴鼓吹邦人携酒肴羣坐擇勝童兒騎竹馬以夀使君熙熙然不知其在窮邊極塞也平凉士民相與起生祠塑公像而事之及聞公薨作佛事薦酒食過期乃罷金人初入都城也求吳敏李綱劉韐折彥質與公公既不可得乃取公之姪承議郎冽冽見樞密院昉昉敵中要人也曰在雄州邂逅一見樞密若用其言斷無今日之事燕山收復碑猶在詆訾為甚今始知忠義矣君亦何罪留此時劉韐在旁屢歎金人既退冽等始奉柩出都三遇羣盜皆列致奠而去與之金幣不受同行獲免者甚衆易曰知微知彰知柔知剛萬夫之望於公見之矣顧何施而不可哉彥質嘗銘端孺之墓矣今復獲狀行文字荒淺不足以起昆仲之盛德大節然神明臨之辭無愧焉者或庶幾爾從事於西州也凡所施為吾先人實同之其後彥質復佐公幕府識公最早得公行事最詳云謹狀中書舍人孫覿行贈開府儀同三司告詞充國已老能固守于前議遂訖先零之誅亷頗未衰卒見廢于衆讒馴致長平之敗眷豫宿將時乃世臣出授律于齊壇入參謀于帷幄安危之意望想尤深死喪之威哀歎何及具官某剛明而克斷沉鷙而善謀早疇闢國之勳進陟總戎之命折王恢之初議屢陳徙突之言釋婁欽而復誅莫救噬臍之悔追懷前職進二本兵庶資厭難之竒自有折衝之效憖遺之歎遽驚一鑑之亡殄瘁之悲何愛百身之贖式章異數申勸遺忠錫盾雕戈畀元戎之十乘衮衣赤舄煥命服之九章終始之間哀榮斯極伏惟英爽歆此寵靈三朝北盟㑹編卷六十
