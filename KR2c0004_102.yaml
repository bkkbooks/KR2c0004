body:
  text: 三朝北盟㑹編卷一百二宋徐夢莘撰炎興下帙起建炎元年五月一日庚寅盡五日甲午中興記曰初命滕康草赦文或詆斥圍城士大夫有憤怒意上命耿延禧改定以進且云圍城士大夫一切不問衆服上有大度真寬仁聖主矣朱勝非南都翊戴記曰上幸南京登極非建言受命中興宜築壇行禮北望二聖寅受寶册乃即帝位因治壇於府東偏五月朔上登壇受寶改元建炎請以中興受命名壇載於登極典詔可之遺史曰初上在相州也閏月十四日夜夢淵聖令盡解所服袍帶而以自所服者賜之望日上語延禧世則羣臣不敢對先是太上皇帝將禪位解所服排方玉帶賜淵聖既上出使河北淵聖又解以贐行上在河北懷衛諸州申狀皆為靖王或為康王或以紀年之號兩當之至是始悟靖之為文立十二月也蓋淵聖立十二月而上建大元帥府遂即帝位也黃潜善中書侍郎汪伯彥同知樞院事即日押付都堂治事黃潜善制曰中書政事之本一新萬化之原賢者邦家之基茂建百王之典朕紹膺鴻緒綏御庶邦炎正中微國步孔棘興衰撥亂坐收三傑之功舍爵䇿勳進陟五臣之位具官某器識沉毅而足以任天下之重學問淵博而足以識古今之全蚤服采於禁塗寖宣勞於外屏邉烽侵犯都邑震驚纒氛祲於九重接蕃戎於萬里立轅門而左袒倡義旅以南征間關百難獨見松柏後凋之操險夷一致遂成桑榆不負之勳是用蔽於僉言擢升右省式慰沃心之望聿新大政之元爾惟丕命其承迪以先王之典豫其克邁乃訓永奠蒸民之生益𢡟逺猷以對休命汪伯彥制曰朕惟列聖儲休千齡纍洽軍政隳壞將帥惰驕强敵長驅京邑震擾博延羣臣之議人莫與能檄召天下之兵士無鬪志卒罹變故幾至阽危肆疇佐命之功共濟經邦之業具官某學貫千載知出萬夫沉謀有先物之幾居簡得鎮時之望參華延閣出統藩符屬時訪落之謀實預扶衰之義肇開幕府爰整師干豐邑故人莫重蕭曹之冠雲臺諸將獨髙冦鄧之勳是用順考僉言蔽自朕志擢司兵柄進二機庭幹兹心膂之憂實賴股肱之舊勝殘去殺期臻奠枕之安保大定功共享銷兵之福往承茂渥永底丕平遺史曰中興之初黃潜善汪伯彥首為執政智者必知二人無進攻之志矣二日辛卯上靖康皇帝徽號為孝慈淵聖皇帝內劄敕內外文武臣僚等朕比以乘輿播越宗廟阽危迫於師言勉紹大業居軫晨昏之變載深手足之懷恭惟靖康皇帝聰明憲天節儉由性子育加於庶彚色飬逮於兩宫金人內侵四郊多壘乃遣單車之使欲邀龍德之歡代親而行即日命駕繼以編戶困於金繒復再屈於敵營欲為民而請命沉幾淵識外晦內明時方艱虞聖以遵飬溥率萬邦之望徯瞻八駿之歸雖道妙無名豈形容之可及惟德施罔極顧遵奉之敢忘爰舉徽稱用昭盛烈靖康皇帝宜上尊號曰孝慈淵聖皇帝乃令所司擇日奉上册寶應合行典禮禮官即速討論以聞遺史曰初淵聖即位以四月十三日誕辰為萬夀節大酺天下臣民詔到四方州郡有挾符䜟之說妄以私意猜度指為不吉逮金師深入淵聖播遷若為先兆焉元祐皇后為元祐太后御札敕內外文武臣僚等朕惟德盛者報必隆屬尊者禮宜偹古之彛訓國有故常元祐皇后制行徽柔宅心虛靜蚤儷極於永泰久慕道於瑶華庚辰並后之文已嘗誕告丙午復號之㫖未及布宣比者敵騎內侵都城失守方二聖之遷播屬百辟之抗言還御宫闈暫臨庶務洞逹機事之變深惟宗社之安踵遣使軺敦諭至意建此纘圖之日亟頒國政之書叙惟其功舉協於義是用參稽衆志奉上尊稱兾茂對於休辰以永綏於夀祉元祐皇后册為元祐太后仍令所司擇日奉上册寶應合典禮禮官疾速討論以聞元帥府限十日給局詔責李邦彥等詔曰作事貴於謀始自古不能去信茍乖此道亂所由興李邦彥等皆靖康主和議之臣或料敵失宜自成懦弱之勢或過聽誤事復忘偹禦之方用起兵端以誤國計孝慈淵聖皇帝勤政宵旰庶圖治安謀臣既未能慎初武服固難於善後興言及此罰其可逃其李邦彥等吳敏蔡𢡟李稅宇文虛中鄭望之李鄴已下三省别行竄責播告中外咸使聞知詔修國史詔曰朕遭家禍二聖播遷單孑一身義不得死三事大夫羣黎百姓戴宋惟舊用歸屬於眇躬朕欲身先士卒北首赴難咸曰宗廟之重不可一日乏祀且將攝行國政俟時復辟則又曰天下之大不可三月無君遜避無從百辟復至蓋祖宗德澤在人固若膠漆天其或者崇降咎災以警懼我宋是用思憲祖宗之舊仰承天意庶或悔過以輯寧我家賚及赤子嗚呼惟孝弟可以動天惟憂勤可以成務惟恭儉可以冨民惟兢業可以保國惟大公可以悅人惟至仁可以安衆惟來讜論屏側言可以達聰惟近正人逺寵幸可以成德惟守大信可以規逺圖惟有常德可以立武事不弛不擾始終如一夙夜惕勵式禳不祥庶幾降鍳俾復父母兄弟宗族朕將視舊章不以手筆廢朝不以內侍典兵權容受直言雖有失當不加以罪謹聽斷除苛撓抑未作去浮靡斥聲樂之奉絶遊獵之荒非奉典禮尚方無飾繡繪非急繕治大匠無營土木非軍功無異賞非戎偹無僝工弗利於衆非衣服飲食皆可廢有宜於國雖赴湯蹈火皆可為斷之必行無或有二尚慮諸臣狃於故習有以祥瑞奏聞褒頌功德浸於道諛諱隱過尤務在䝉蔽大臣蔽賢有舉非實臺諫懷慝有言非公凡此之屬必殺毋赦朕臨御之始德意未孚於上下用伸播告以敷朕心兹言不食咸聽毋忽大元帥府一應行將佐官吏卒伍自河北京東扈衛有勞較優劣等第來上當與推賞諸路勤王之兵皆至行在諸路勤王兵至行在於是王德初撥𨽻劉光世為右軍將官郭京走至襄陽統制官張思政㑹兵擒而殺之初郭京至自京城奔走沿路稱撒豆為兵撒草為馬假幻惑衆取兵二月至襄陽有三千餘下寨於海子頭京居於洞山寺欲册立宗室為帝置使錢蓋西京總管王襄及統制張思政等止之不從會有自京城逃遁來者具說京以妖術誤國京城不守思政乘間㑹諸頭兵襲京囚之至是欲以京赴行在半途為李孝忠所襲思政就轎以搶刺殺之三日壬辰以張邦昌為太傅同安郡王五日一赴都堂參議事汪伯彥建炎時政記曰是日早朝上謂黃潜善汪伯彥曰何以處邦昌潜善曰邦昌僣稱名號罪在不貸為金人所逼脅念其不得已而從權金人既退専遣謹燾奏書繼遣謝克家歸寶璽又迎請隆祐太后歸於宫闈退居東府駿奔來朝惟陛下睿斷處分如何上曰朕嘗與邦昌同奉使軍前小心畏慎不幸逢此禍變雖不能死以盡節然遭變行權緣此宗廟不隳社稷不壞一城生靈獲全肝腦金人才退齎書赴朔歸寶來朝朕既貸其初欲馭以王爵異時金人有詞使邦昌以實具書報之曰舉國之人不忘趙氏彼師不旋踵而天下勤王之兵皆左袒歸宋故邦昌恐懼不待問罪幸保首領而反籍於朕使金人知天人之歸出于自然卿等以謂如何潜善伯彥同對臣等謹奉以施行故有是命命黃潜善等募忠信能専對之士奉使金國除作國書外命張邦昌更作金人書草遣使人以行宗澤徽猷閣待制知襄陽府耿延禧董耘髙世則宫觀兼侍讀黃潜善戶部侍郎梁陽祖徽猷閣待制淮南江浙荆湖制置發運使兼提領措置茶鹽楊淵王起之秦百祥並除郎官趙子嵩延康殿學士知鎮江府五日甲午耿南仲請老除觀文殿學士提舉杭州洞霄宫遺史曰先是上在濟州羣臣勸進議已定耿南仲奏臣老拙幸得遭遇竭盡愚直唯靖康行遣蔡京廷臣多翼蔽之終雖貶出然蔡氏所引實繁有徒必不利臣父子乞賜全保上曰國家今日之事吾最痛心其次門下侍郎父子耳使天下無事吾得居藩衍宅事父兄門下侍郎安享爵祿豈不為美今日不得已吾即繼大位豈不能保全一舊師傅乎師傅吾師𫝊也且老矣月以數百千飬一前朝老師傅直易耳人言毁譽何足信至是南仲告老乃除觀文殿學士提舉杭州洞霄宫奉聖㫖耿南仲為孝慈淵聖皇帝勸講官十有五年同朕在外厯艱難險阻又踰半載今以年老乞罷機政所請見今恩數人從可特令依舊餘人不得援例分劉浩丁順孔彥威王善等軍上命劉浩丁順孔彥威王善各以所部人分為三等軍人為一等百姓强壯無業可歸願充刺軍者為一等老小怯弱不堪出戰人為一等仰各具見在人數將上二等撥入五軍收管三等給公據放令逐人歸業除劉浩遙郡防禦使大名府鈐轄丁順遙郡防禦使滄州鈐轄王善人數少與轉秉義郎差濮州雷澤縣尉所有逐項下使臣人兵功賞仰各具保明狀申奏等第速與推恩傅亮勤王人兵依劉浩等例分為三等亮除直袐閣通判滑州趙子嵩荐對改通判濟南府上韋賢妃尊號為宣和皇后御劄敕內外文武臣僚等報德莫尚乎隆名謹化必先乎廣孝兹古今之通誼乃邦國之彛章韋賢妃聰明惠和淑柔淵懿育於慶閥嫓我親闈象服是宜淑則偹於四教彤管有煒徽音冠於六宫誕育眇身嗣紹大統念慈顔之在逺尚阻奉於晨昏顧領典之有稽宜亟崇於位號是用參稽衆志爰舉丕稱肆張母道之尊歸安天下之飬宜上尊號宣和皇后夫人邢氏為皇后制曰乾坤定位而萬物育日月遞照而四時行序人物之大端慶必衍於婦順得天下之內助治莫尚乎家齊朕嗣守慶基肇臨寰㝢茂建長秋之號爰稽前代之文誕告外朝式孚羣聽嘉國夫人邢氏洵美且異淑慎無違系出華宗夙啓射屏之慶質全碩媛載著俔天之歌居自敕以針圖動常資於保傅來嬪朱邸增輝皇家屬蘭馭之在行顧椒塗之虛次載念纘圖之始有懷內助之賢翟茀以朝竚來歸於京邑佩玉之儺將表正於宫庭登進名位之崇昭示風化之首於乎塗山翊夏克相神禹之功莘國興周久資太姒之德庶並受福祿以永格和平尚慎乃躬期協朕志可立為皇后宣和皇后邢皇后在圍城中皆遭金人遣請隨二帝北狩遙册立也詔李綱赴行在敕李綱卿被遇兩朝延登四輔出専將鉞宣威久去於周行總治王畿申命已頒於召節屬朕纘承之始遭時變故之餘經體贊元必賴股肱之舊弼折衝厭難兼資廊廟之訏謨蔽自豫衷誕敷廷號俾發揚於賢業以寅亮於天功式遄其歸虛心以待已除卿尚書右僕射兼中書侍郎詔書到日卿可疾速發來赴闕先是靖康圍城中以資政殿大學士大中大夫領開封府事召李綱率湖南義兵倍道前進至江寧府遇周德作亂使人招安撫定以周德赴勤王為名支散犒設悉委㑹羣賊於轉運司既而次第執去斬之周德聶旺皆凌遲處斬江寧府乃定時已聞京師失守欲赴大元帥府行次准備聞二帝北狩知上即位於南京先遣人馳行在上疏論議和之非三朝北盟㑹編卷一百二
