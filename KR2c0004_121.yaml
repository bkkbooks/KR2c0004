body:
  text: 三朝北盟㑹編卷一百二十一宋徐夢莘撰炎興下帙起建炎三年二月三日壬子盡十一日庚申維揚巡幸紀曰建炎戊申冬自鄆濮相繼陷破之後金人橫行山東加以李成諸寇乘亂為孽不可悉數是時黃潛善濫秉大政汪伯彥謬居樞管裁處亡術探諜不明未嘗得諸賊要領亦恬不介意致强冦奄至亡以應敵十二月十九日黃潛善遷左僕射盧益知樞密院事當是時泗州屢有警報而朝廷諸公謂小盜易殄滅或曰李成餘黨亡足畏也先是李成後軍在宿州叛去成以追奔為名遂與俱合朝廷遣劉光世出軍討賊光世既至山東與成接戰王師屢至敗績賴統制苖傅力戰得免成軍遂潰擒敗將數人而成一軍俱走光世不能得但以所擒之人歸行在光世復加檢校少傅而李成之釁未能除也及是宿泗之報人皆指為敗亡之餘金人知朝廷此意亦多僞稱李成之黨以緩我師而執政無知果墮其計至正月十三日餘騎詐為漢軍裝見已殺退乃以所得泗州首級器具俱來是夜朝廷愈倉皇內廷所有通夕搬挈早駕舟河岸居人皇怖罔知所為上欲即時南去而潜善力勸云且俟探報得實渡江未晚也上然之少頃又傳只是閻瑾自反已即梟首訖然瑾之反也本由遇金人其師不利遂有此過而金人聞瑾之反罔有為已抗者故乘勢而來更無迎敵之師長驅抵淮口是日行在遣兵自西南來出赴淮口禦敵以劉光世統之然事出倉卒自聞風而遁維揚居民挈妻孥而走者十室而八爭門以出相踐蹂而死者不可勝計金銀價驟長數倍在職百官皆欲奔竄尚未知得實故且觀望事勢侍從等至堂中問之潜善伯彥二人俱對以易處諸公不須慮也百官既聞此語乃相慰諭以為知事實者無如宰相今既所云如此必不可輕動百姓聞之亦以為然及患出不慮皆喪其家屬故自貴及賤亡不歸怨潜善至于切骨蓋有所致而然也是夜江都縣前大火初二日居民搬挈如前金銀愈貴行路之人摩肩叠足是夜城中火起凡三四處初三日巳刻得天長軍關報始知敵騎已到上聞之乃被介胄走馬出門惟五六內侍及護聖軍數人隨駕更無扈從上天性慈仁亦不呵止百姓第與行人並輿而行觀者無不駭嘆當是時潜善伯彥尚在中堂㑹食或有問者猶以前言告之及堂吏來告云駕已興矣二人乃趨出自鞭馬而走亦無前導之人是日官員百姓出門致死至于相藉比之前二日復數倍矣至申刻及人已到楊子橋應係官私搬載什物舳艫相銜無慮萬計悉為金人所有是夜揚州火發凡三四處兵至瓜州人民未渡江者尚數十萬奔迸墜江而死者不啻大半居人無貴賤老幼悉被驅虜不從者殺之所不忍見金銀珍珠玉帛委棄江畔可掬而取小民或就江網得金銀者不以多少但足為渡江之費或渡一人得三百星者舟子為富焉初城中得邉報人奔出城者皆以得舟為利蓋老幼不能行或登舟則以為所去無阻如堰間渡者百中一二而已及金人驟至一網俱盡死者葬于魚鱉之腹生者墮于金兵之手王侯之族士庶之徒盡遭俘掠摧陷蹂躙豈可勝言至于官府有司案牘俱灰燼庀紙不留上至乘輿服御亦皆委去兩府侍從或身死兵刃或家屬散失往往皆是大卿黃鄂至江下軍人見之呼曰黃相公在此馬上牽下鄂方辨其非言未卒而首已斷矣未幾史微繼至亦為所殺李待制遽遁時遇害給事中黃哲方徒步而一騎士挽弓射之中四矢而卒黃唐傑與弟唐俊皆溺死是時官屬性命不保者什蓋六七而眷屬不救者又復倍之先是上每以北方不寧為念嘗靣諭黃潜善㑹左藏庫銀絹帛不若搬江寧府以備不虞潜善曰如此恐搖百姓且姑待之至是兩星不存應係上即位之後四方捧表貢獻禮物所積甚多金銀絹帛亡虞數千萬一旦皆棄蓋由執政不得其人又如建炎之後所在調發及行在搜簡軍士所得精鋭亦可十數萬倘得人以為之用自可無敵夫何倉卒之際靡有統率盡為棄甲曵兵之人及主帥挺身渡江此曺往往相率為盜所有得渡者亦失其父母妻子曾無親上死長之意所思者為亂而已當是時橫行恣意亡敢誰何者惟兵為最豪悍城市貨物至強持去得不嗔恚以為幸矣是日駕在鎮江聞賊自瓜州即時起發當夜至丹陽晚頓次日駕興起鎮江城中居民奔避至弃其家屬當日軍人百姓乘勢為亂至斧人家門持刀入室公行劫虜什物錢帛填委街衢無敢主之幾至大擾自是之後人民南來扶老挈幼如蜂屯蟻聚父母兄弟妻子多不及見相為哭泣遍滿邑路聞者莫不痛心疾首怨憤之氣逹于上下初五日駕起丹陽至常州晚頓是日百姓離丹陽多由僻路而行取便至昆陵是夜招安人丁進縱所領兵自後路遮絶行人肆為劫掠賴太尉王淵在常州領兵至進聞之欲引衆亡入江東淵遂傳令云赦進之罪復令來加以慰諭令招所部兵隨淵至常州淵數進負國之罪斬之籖其首以狥兵衆人皆惕息初六日駕起常州至無錫晚頓是時宰公以供應如法居民不動上頗稱善初聖駕之起鎮江也後軍所過之地無不殘劫人以為戒故前期搬挈入山逃竄以避其亂凡州縣場鎮井邑之地罔有一家敢開門以居故軍人過之愈肆殘害人家所藏輕重之物不可移動者皆為屏棄如米鹽之類所取之餘則棄諸通衢與糞壤無異美酒滿地洋溢可涉凡所經處則烟火亘天焚燒十室而九所存者往往亦不足障風雨矣至于常州城中亦皆關閉無有所在者州官有棄官職而遁者知府周玘每日與本部官居城南報恩寺取南門出宜興雖名為不棄城實欲為逃遁張本也初七日駕至平江府雖聞民間商賈貨物如此上至府中始免介胄儀衛稍增信宿乃起駕既赴蘇州乃留右丞朱勝非禮部侍郎張浚彈壓城中初十日駕至吳江縣十一日至秀州十二日至崇德十三日至杭州上以府衙作行宮以顯寧寺充尚書省百司官吏到者曾無十之一如三省六房公吏本千餘人得至者其數不滿五十所以行在職務久而不備十四日下詔恤民十五日聖㫖遣具舟至江頭接百姓老幼不得渡者又下詔减常膳不御寢殿俟百姓到足乃始如故又詔出內人一百五十人四月癸丑車駕發鎮江府車駕發鎮江府留劉光世以拒江險上宿于呂城鎮大聖庵王淵使探者在鎮江及瓜州約如金人計置渡江則燒甘露寺為號淵及上于呂城探者夜聞瓜州聲喧謂是金人欲渡乃焚甘露寺淵視之曰甘露寺火也翌旦質明請上乘馬而行誅丁進丁進從車駕行縱其所部兵遮截行人肆為劫奪且請以本部兵回大江與金人血戰其意亂也王淵覺之斬於吕城鎮磚橋下截其首至常州令梟於市自此磚橋號為斬丁橋金人揭榜發遣西北人從便歸鄉金人揭榜于掦州市西北人從便歸鄉榜上係銜云東南道都統貝勒東南副都統貝勒東南道都監三員西北人見榜示而去者約萬人餘自東門由邵伯鎮往大興後為薛慶是也五日甲寅車駕幸常州上自發鎮江府棄馬行軍民亦流移于道路至有不及引避者上皆宣諭各慰勞是時儀衛法物皆闕唯一兵執一黃扇隨行范瓊兵亂于壽春府殺知軍府事鄧紹密金人自山東將趨維揚也范瓊自京東引軍避其鋒轉至夀春府甲兵不入城自循城而南有夀春府將兵在城上視之者見其認旗曰御營平寇前將軍輕薄者戲之曰御營平寇前將軍不㑹殺敵人只㑹走城下過兵聞之喧詬不已瓊聞而問其故知其戲也乃移文夀春府索其發語之人知軍府鄧紹密根刷得一兵遣出之瓊命斬于麾下是日軍人丁請者將兵怨斬其同類乃持器仗係之出城于是瓊之諸軍皆被甲持仗殺將兵遂入城大亂縱肆殺掠紹密死於亂兵之下蔡縣趙許之亦死州縣官往往被害城中悉為灰燼六日乙邜靳賽入真州先是朝廷聞邉報日急乃遣靳賽往貴池屯戍金人犯揚州翠華南渡王得以本部兵焚真州而去翌日金人到真州不殺人不虜掠靳賽往來于江中真州官吏皆散走乙邜金人退去賽乃率兵復入真州頗肆騷擾又數日向子忞知真州撫恤居民民漸蓋庵寮居其老少賽之兵漸猖獗民不堪之乃聚衆與為敵民殺其腹心二人賽大怒愈肆殺掠百姓大恐子忞見賽問曰公之兵何故屯於此邪賽曰被朝廷差來屯戍耳子忞曰朝廷差公來保護城中百姓公乃殺以逞乎賽氣奮乃曰百姓殺軍中二人皆腹心頭目人但得一首者即可解子忞不得已掠得二人與之賽之衆踴躍歡呼以二人釘于木馬擁至望江橋下燒鐵甲葉令紅貼甲葉遍二人之體不勝毒既貼遍乃復揭之然後羣兵取其腸肚骨血食之皆盡七日丙申車駕幸平江府以朱勝非為平江府秀州控扼使張浚副之車駕到平江府是日朱勝非自鎮江府至以晡入見具奏處畫鎮江狀上喜即以勝非為平江府秀州控扼使上曰控扼所以備外冦固宜審處吾民渡江失所宜鎮恤使各還業勝非乞一從官共事上命禮部侍郎張浚副焉上過吳江縣令張浚以所部兵屯於吳江縣户部尚書呂頥浩同簽書樞密院事江淮兩浙經制使駐於江寧府上南渡思得大臣留江上以鎮之乃以呂頥浩同簽書樞密院事為江淮兩浙經制使駐於江寧府八日丁巳撫慰維揚遷徙人詔詔曰朕以單微之質䝉址大觀賴臣庶共戴獲承祖宗之餘德念必宅中經逺均布惠澤以慰萬邦歸往之心故雖外迫於敵兵誓不遽離於近甸省刑郤斂撫事與民一毫不擾郡邑行再期矣輸誠盡禮遣使相望而敵兵未寢選將練師朝夕從事而事力不逮至聞長驅之謀議者請適東南逺險之地以保朕躬朕寧不免于敵不忍先事茍生棄我西北之人而遽逺别也故出兩道之師外為蔽援而嗣遣使命之臣祈保赤子以待敵心之易慮則共圖康居日可計矣人力雖殫天命難諶大名東平相繼陷失始官吏民庶絶江自便朕遷延不先俟天人之我相也逮輕騎潜行不日遽至朕與近臣始挺身東行由江浙為暫避之計凡乘輿服御若帑藏之積一切棄捐二三大臣至不能保其家室念雖顛沛至是而不赴于中原西北之人朕心猶庶幾焉與其謀已忘民未及患而去則不得已而後動不猶愈乎但聞官吏軍民雖有自便之詔多不及避生計蕩然或不得其家比來痛切朕心愧負何極自昔帝王脫身於遑遽之時而立國於顛危之後失勢於屢挫之辱而戡難於必勝之功昔尚有之夫良農不為水旱輟其耕士不為貧窮怠其道朕能勞形克己死不變圖保生民而不能使吾民之亟安能側身修行以已贖民圖格天心而不能保天心之相向賴卿士大夫暨爾萬方有衆戮力一心式孚於帝庶幾成績咸保康乂朕誠切至宜察朕心知泰州軍州事曾班叛附於金人金人攻維揚分遣兵往泰州知泰州曽班聚官吏軍民而議曰今揚州已殘破金人以兵臨城須㬰到矣班忝為守臣不當棄城而去况班是待制列在禁從與庶官不同今欲與閣城官吏軍民共以守死之如何軍民皆啼哭以告曰願待制以生靈為念屈節投拜保全一城生靈班知人心不可違遂迎金人投拜金人之主帥入城與班筵㑹又數日斂掠金人一夜城外縱火照城中少頃大雨滅火金人謂泰州不可行殺戮俄頃而自退去葛進為金人所殺葛進圍青州不下安撫使劉洪道招來張成俾衆救援進聞成至遂退去洪道遣崔邦弼追之邦弼為進所敗而歸進後與金人戰為金人所殺衆皆散去金人侵滄州知軍州事劉錫棄城去劉錫字禹圭泰州人知滄州聞金人至即棄城走中途遇葛進知青州尚為國家守也趍青屯於麻家臺劉洪道遣人邀入城錫不從曰青州人屢被驚擾人心遑遑不欲入城也洪道詣麻家臺見錫以酒肉犒其衆叙話良久竟不入城青州人髙其義錫乃趍行在尚有馬軍數百人隨行九月戊午通判滄州軍州事孔德基叛附於金人十一日庚申車駕幸秀州遣從義郎閣門祇候某秉義郎閣門祇候劉伸使於金國軍前上在秀州知金人在維掦猶未退兵也召募官兵使於金國軍前有官人先轉七官軍人轉七資于是承信郎某進武校尉劉伸方自淮南散失家屬正無仰賴乃應募而行行各先轉七官除閣門祗候是時上已乘舟召二人就御舟賜對授以國書上曰若金人肯回軍了事而歸當不次擢用卿二人遂與應募軍兵五人偕行三朝北盟㑹編卷一百二十一
