body:
  text: 三朝北盟會編卷二百十四宋徐夢莘撰炎興下帙起紹興十五年三月盡十月紹興十五年知敘州邵隆卒初邵隆知商州值和議定割商州為外境隆不悅常密遣兵馬以盜劫之金人訴於秦檜檜心恨憤除知辰州未赴改知敘州至是飲酒暴卒或云檜密使人鴆殺之人皆巷哭為之罷市三月敷文閣待制周金及馬觀國史願送還金國五月金人遣使來賀生辰十月嚴抑為大金賀生辰國信使曹涭副之觀文殿學士祈請國信使宇文虛中死於金國行狀曰公諱虛中字叔通登大觀三年進士政和五年除起居舍人國使院編修官六年正月同知貢舉四月除通直郎中書舍人嘗議偹邉非䇿論事無所畏憚當權者忌之除河北河東陕西宣撫使司參謀事上書極諫曰臣伏覩陛下恢睿聖英武之略紹祖宗之謀將仁義之師復燕雲之故境不以臣愚不肖使參與機事臣被命之初意謂朝廷未有定議欲命臣經度相視攻守形勢公贊廟算及至河北諸路見朝廷命將帥調兵旅勵器械轉移錢糧已有擇日定舉之説臣既與軍政茍有所見豈敢隱埋輒舉利害仰干淵聽臣聞用兵之䇿必先強弱虛實知彼知已當圖萬全今論財用多寡指宣撫司所置便為財用有餘若沿邉諸郡帑藏空虛則略而不問論士卒之強弱視宣撫司所駐便言甲兵精鋭若沿邉諸郡士不練習武備刓缺則置而不講夫邉圉無應敵之具府庫無數日之糧雖孫吳復生亦未可舉師是在我者未有萬全之䇿也用兵之道禦攻者易攻人者難守城者易而攻城者難守者在內而攻者在外在內者為主而常逸在外者為客而常勞逸者必安勞者必危今宣撫司兵約有六萬邉鄙可用不過數千契丹九大王耶律淳者智略輻湊素得志國主委人信而不疑今欲亟進兵於燕城之下使契丹自西山以輕兵絶吾糧道又自營平以重兵壓我營壘我之糧道不繼耶律淳者激勵衆心堅城自守則我亦危殆矣在我無萬全之䇿在彼亦未可必勝兹事一舉乃安危存亡之所繫豈可輕議乎且中國與契丹謀和今踰百年間有貪婪不過欲得關南十縣而止耳間有傲慢不過對中國使人稍倨禮節而止耳女真侵削以來嚮慕本朝一切恭順今捨恭順之契丹不封殖拯救為我藩籬而逺踰海外引強悍之女真以為鄰域女真藉百勝之勢噓喝驕矜不可以禮義交也不可以言説誘也視中國與契丹拏兵不止鏖戰不解勝負未決強弱未分持卞莊兩取之説引兵踰古北口撫有矯捷之衆繫縲契丹君臣雄據朔漠侈心不止越逸疆圉憑陵中夏以百年怠惰之兵而當新鋭難敵之勇以寡謀持重久間安逸之將而角逐于血肉之林巧拙異謀勇怯異勢臣恐中國之邉患未有寧息期也譬猶富人有萬金之産與寒民為鄰欲買吞以廣其屋居乃引強人而謀曰彼之所處汝居其半彼之所蓄汝取其全強盜從之寒民既亡雖有萬金之富日為切鄰強人所窺欲一夕髙枕安卧其可得乎臣之愚見竊以為喻望陛下思祖宗創業之難念鄰城百年之盟好下臣此章使百僚廷議倘臣言可採乞降詔旨罷將帥還朝無開邉隙俾中國衣冠禮義之俗永覩太平臣昧死盡言不勝戰栗時王黼當國見疏大怒捃拾公以他事降為集英殿修撰督戰益急公又條上十一議其大略有曰契丹昨來女真願為附庸女真不納求附朝廷觀其意蓋是畏女真愛中國避強悍歸仁義今西夏以重兵壓雲中狡謀窺伺託為存亡繼絶之言其意甚逺若契丹北為女真所拒南為中國所棄收合餘燼翻然決計乘夏人聚兵之時割地以為約續糧以過兵不惟王師入燕為所牽制亦恐他日西北邉事未寧之甚今日為國家大計須期永久安逸不費兵馬錢糧公私事力坦然無北顧之憂費省力暇逾於昨來與契丹通好時方為穩便若連兵不解征戰防托或滅遼之後調發勞費乃過于未用兵以前其利害不可不計又上二十議略曰臣伏見朝廷昨以耶律淳擅立遣兵巡邉騎卒相侵互有勝負前此屢曽招納已於盟好有違逮王師那回雄州王介儒來尋舊好書牒往復皆有明文其於女真又違近約若二國脫有興滅即邉事不可不防所有元約女真夾攻悠久利害臣不敢與知今復文涿州勾引契丹人使空牒差人往約女真雖民心歸仁天道助順王師無戰可保萬全但恐秋髙馬肥北兵或聚若只坐待意外功績不為自治之規切恐臨事失機貽患在後且言郭藥師可令帶同知燕山以恩禮留之京師復盡使挈致家屬居於賜宅緩急有用只可單騎遣行事畢便歸然今日事幾與前日不同似不必更放前去脫魚於淵恐滋後患時朝廷鋭於摧服契丹故公及守禦之䇿委曲詳備欲因參幕議幸一止之議上不報然而亦以公言為忠七月除宣和殿學士上復欲以公參謀尋改寶和殿學士十一月除大學士河北河東路宣諭使公上言雲中州郡疆界遙濶方一收復每嵗應副財用必三倍於太原又須建置堡塞關壘不下數百處今財力匱乏何所從出屯戍軍馬係抹直取疆界亦倍于何處挪移乞罷收復之議以息中國之力尋赴闕有旨至內殿同宰執班奏事是日報尼堪兵迫太原上顧公曰王黼不用卿封殖契丹以為藩籬今金人兵兩路並進卿料事勢如何公云敵兵雖熾然羽檄召諸路兵入援結人心使無渙然慿藉祖宗積纍之厚陛下強其志勿先自怯決可保無虞今日之事宜先降罪已詔更革弊端俾人心悅天意回則備禦之事將帥可以任之上命公就草詔公奏言臣未得旨昨晚已草就候進呈上令展讀公又列出宫人斥乘輿服御物罷應奉司罷西城所罷六尚局罷大晟府內臣寄資等十餘事於所草詔上覽之曰一一可便施行今日不吝改過公再拜泣下令下人心大悅乃宣和七年罪已詔也其略曰百姓怨懟而朕不知上天震怒而朕不悟有識者比為陸贄感泣山東將士之詔云雄州奏郭藥師劫蔡靖呂頥浩等降金人公與南陽公入對上謂南陽公曰今梁方平已在濬州守橋南陽公奏言內臣主兵恐將兵不附欲更差人為大將而梁方平副之上曰何灌見作管軍可令團結京城二萬人同守濬州衆議尼堪兵勢方熾河陽橋最為要害而守禦未得人欲召熙河姚師古秦鳳种中令以本路兵會于鄭洛外為河防之援而內衛王室上顧公曰卿與姚師古种師中如兄弟宜以一使名護其軍遂以資政殿大學士為軍前宣諭使上曰卿不須自陜州以西可只在畿甸馳檄召兩人衆議謂永安陵寢未有兵衛護上曰此却是宇文虛中職事可自滑州分地分以東屬何灌以西屬宇文虛中即大河一帶有守把而諸陵有護衛三省樞密院議二太子少今大兵屬尼堪謀臣猛將皆在而所召西兵須兩浹旬可至即謂兵將欲于河灌守河陽及護陵寢却令公守北京及濬州公奏言尼堪兵雖盛未攻下太原必不先下太行其來必緩二太子兵亦不下十萬既至燕山其來必速上曰濬州不可少何灌以防二太子卿既召二鎮兵則護陵寢用何兵公奏言京東西路及鄜延環慶兵已邀擊金人文字到已旬日惟京西兵未團結不若團結起發以護陵寢及滑州以西河陽浮橋旬日可辦候姚師古种師中兵至臣却與同護京城以西上曰如此穩當自鄭州向去西京黃河岸一帶皆迫近陵寢又恐尼堪兵經由此路極可憂卿且以祖宗陵寢為念公乞對畢即行上曰卿且召姚師古种師中只令移文人急遞公乞御前差使臣賫文字前去公又奏种師道老將有謀今間居長安臣與之有契分欲乞召師道同團練西京軍馬及本路保伍于黃河岸橋諸陵寢措置守把訖與師道同入護京師臣只今行文字下陜西漕臣應副師道輕賫錢物今沿路召募人兵前來公陛下辭即出門徽宗內禪淵聖即位徽宗幸淮浙南陽公為行宫副使時尼堪以重兵圍困太原日久公馳檄河北諸將邀擊金人遂往河東河陽澤潞間措置太行山設守備諸處募兵並未至而二太子兵馬已從濬州渡河且元指揮援兵並赴宣撫司童貫處時貫已隨從徽宗幸淮浙公往陜西促姚師古种師道兵馬且檄令直赴京城應援王室不得遵稟貫節制又以便宜令河陽守臣節度澤路西京守臣節制汜水關鄭州時朝廷遣馬忠將數千人往團柏鎮公遇之于汜水關以便宜劄付馬忠令引兵回救京城馬忠遂由鄭州東門進兵救京畿與敵騎遇于道士店攻獲其首領軍聲大振先是敵騎至城下放兵四掠至鄭州為忠所破遂將其他小寨收斂為以西路遂通師道古及其他西兵並得至京城無阻公亦星夜歸護京城至鄭州之東阻抄掠遊騎不得進遂收合散卒間道以趨且移文河東帥府約會兵黃河上又於宿亳以來得東南兵二萬五千人以便宜起致仕官李邈令統領於汴河上前進與李邈相先後行至陳州門駐兵淵聖遣中使持御筆令公赴闕遂從門外釣上入城先是姚平仲劫寨失利西兵俱潰金人復引兵逼城公既至福寧殿奏事淵聖宣諭陜西援兵今已俱潰不守欲遣人奉使為朕分辨劫寨非朝廷意乃是姚平仲擅興兵兼探康王平安大臣皆不肯行事勢危殆卿可往否公再拜曰主憂臣辱臣豈敢辭淵聖泣下慰勉再三公即往都亭驛見金使王芮芮與言不遜公依所得旨再三説諭遂送王芮出城因賫書復議請和公渡濠橋道逄甲騎如踏雲梯攻具蔽地而來公間關冒鋒刃而進既至敵營露坐風埃烈日中自已至申金人數次以全裝人馬注矢露刃周匝圍繞一行皆失色公不為之動久之乃引公入見康王于軍中蒙聖語面諭金人先一日堆馬草於階前若兩三日城中無使人來燒草為號將路允迪以下並不存留且來攻京城今喜得大賢來敵金人來相賀方知如此次日陪侍康王到敵帳見二太子者言語不遜禮節倨傲公以義禮遜謝之至晚金帥復遣人隨公將文字入城要越王李邦彥吳敏李綱曹晟金銀騾馬之類又欲御筆畫定三鎮界至方退軍時淵聖令公再奉使止令曹晟前去軍前外餘並作意度子細説諭並不應副兼奉淵聖旨須管於卿處要康王歸京公再出城與帥長相見及張邦昌等退公獨留金帥之前專達淵聖手書再三以理説諭遂以次日獲從康王歸闕即拜公簽書樞密院事制曰國家設中天紫極之輔以應泰階之纒列右府洪樞之司以總萬兵之政雖文武之道有異而安危之計不殊眷時謀謨之臣必授英傑之佐某官志窮精奧識造幾微雅志淵深而足以與權懿文炳蔚而足以華國早由英譽薦厯要塗摛藻揚華密起鼇宫之胄參疇婉畫坐談武帳之兵比資方叔克壯之猷應召虎來宣之命有嚴共武之服不戰屈人之兵兹銜命於金人仍通和於鄰好敏於應對卒以解紛其參管於密庭共圖畫於兵柄佇寵雋烈克鬯皇威本精神以折衝運帷幄以決勝勉推平日之議論用濟一時之事功公力辭不受謂國步方艱捐軀效節臣子之分不可因此受寵數乞收還成命淵聖遣中使宣押諭以藉卿終使事在卿去就甚髙而國之利害所繫強敵在郊卿何辭以違朕意即其家傳宣至數四公惶懼受命自是凡三往軍前金人約公觀師公為送餞使是日夜分至敵營翌日早其帥遣人語公云樞密不稍空我亦不稍空如中國人稱脫空今特促日歸國頃之舉火為號諸營甲騎皆出遂行北去繼與金帥相見説及三鎮公泣下不言諸帥變色言兩朝和好樞密却不喜莫是有不好公事公云三鎮説不得哽噎教皇帝難割捨為太原有太宗皇帝影殿保州有上皇祖墳豈忍令人家子孫將墳墓割與鄰人諸帥云這事有商量時呂頥浩何沂等在坐皆聞此語公遂再三説此語云如何得箇意到本朝皇帝處諸帥云得及得回書對淵聖前開拆果有將來别有詳酌之語敵既退時徽宗駐蹕鎮江得報宣召南陽公至行宫寢堂出公奏狀徽宗曰虛中自二月上旬三往金人寨中第一次明劫寨非朝廷之意乃西兵貪利遂止其攻城再往奉迎康王還闕并取到呂頤浩等初七日與城下為盟令印押誓書并説令退師二太子喜虛中以至誠相待初約四月一日歸國再三説諭遂肯初十日退時令虛中至日親來觀看初十日五更如約往相見二太子帳前吹笛聲鑼步騎兵北去如飛至巳時豁然一空當日約行一程以上此事可喜虛中口辨有智略了此一段事今已除簽書樞密院事南陽公頓首謝初金人之來重兵驍將盡屬尼堪二太子者得郭藥師為軍鋒遂先至京城下及二太子退諸公以為泰然無事公獨以尼堪為深憂乃奏陳乞厚為隄備京畿作塘濼河北河南聫民召募欣代太原失業人及陜西善戰者每一萬人為一軍棊布近輔大張形勢廷臣無助者及議追擊二太子悉遣在京軍兵渡河襲逐行方整齪而尼堪已至澤潞據太行下瞰河津河陽始大駭遂令所遣兵未逺去且守衛王室再為閉城堅守之計其後議者不復聞尼堪澤潞事專以不追擊二太子歸罪執政故公罷政出知青州陛辭上密遣人賜金帶茶藥錦綺公又論青州與金人為鄰外控海道當措置隄備牽制州郡又上疏論京東盜賊屯聚至數十萬東路尤被其害臣初到界首交割之後體問得餘黨散在山谷與已受招安之人皆未寧謐州縣所憂正在此數月青州以南連接泰山往往數百里人煙斷絶今本路瀕海與金國對境北又接濱滄邉面皆通行敵馬若不於耕桑正忙之時速與慰安人情竊慮姦人復出盜已一面作奉聖旨遍牒本路又乞置騎近通西路為一萬騎及閲習事勢飾治器甲為將來應援河北入衛王室之計朝廷忌功者論公不已公雖已報代上疏論當厚為金人隄備且言臣蹤迹孤危一路必稟承乞促代者曽孝序之來其言鯁切並無三省所沮未幾果以言落職奉祠時南陽公從徽宗來歸因入對淵聖曰卿弟虛中二月初止金人攻城與二太子為誓約説令還師豈不是社稷功虛中善料事勢欲留在樞府而大臣堅不見聽亦是恐有伏闕之事且令作帥朝辭出門朕遣人賜以金帶茶藥錦綺之屬更不敢令人知却恐須要奪了南陽公頓首謝且奏言虛中近已罷帥奉祠蓋緣言者謂城外為盟非二太子止是河北賊魁虛中妄以河北之冦作金人以冒退師之功金人自燕中舉兵直至京邑今日乃謂止是河北之冦言者所論如此大臣曽辨明否上曰大臣且幸卿弟不在眼前豈復更與辨明南陽公出知江寧公來依之雖居間廢亦上疏論車駕臨幸江寧當用民兵之法措置便宜責在長安總專其屬應於兩稅鹽酒並聽支用知通將官分治軍民同為訓練其言詳備懇切疏奏不報三朝北盟會編卷二百十四
