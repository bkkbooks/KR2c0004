body:
  text: 三朝北盟㑹編卷五十三宋徐夢莘撰靖康中帙起靖康元年九月三日丙寅盡其日尼堪兵陷太原河東安撫使張孝純被執馬步軍副總管王禀死之運判王毖提舉單孝忠皆被殺通判王逸自焚死宣和録曰先是太原被圍提舉保甲鄭誼自城中出傳檄諸郡使為備諸郡悉集城下為守禦計尼堪由是圍太原未下分兵守之義勝軍引尼堪陷威勝軍及隆德府欲攻澤州逢朝廷講和官乃還太原遣人入城諭之曰朝廷已割太原矣亟開門孝純并副總管王禀曰朝廷使汝交割太原但奏朝廷云某等不肯堅守如初金人大怒無如之何留兵數萬守之而自歸雲中敵衆於太原城外植鹿角木環其城厚數里中為小徑往來縱犬警之是時天氣已熱敵兵各休于林樾之下而分食于太原十邑其守已固敵將既歸雲中有諜者來云四月二十七日於雲中張飲而慶者三日漢兒畨兵打毬以助焉太原雖被圍甚密而竊出告急者不絶皆於衣領中為奏狀以達朝廷且速令進大兵解圍告急之人不能脫者間為敵獲見其書知朝廷興兵敵亦甚懼其告急之人能至晉絳者皆枯瘠如鬼曰太原城中煮弓弩及皮甲食人將告竭矣朝廷命姚古為制置使領兵駐威勝軍其兵無故驚擾自威勝遁還隆德一路皆震人民奔懷澤間者甚衆是時諸路救兵未有至者獨种師中以本部兵最先進五月初及金人戰于平定威勝之間金人以鐵騎突陳師中死之至六月初太原告急者益少人皆知困內外憂恐或聞李綱為宣撫已到懷州及分命劉韐為副使當平定之路解潜為制置當威勝之衝折可求為都統居太原之北張思正亦為都統制當文水之南且命張灝為陜西路都漕兼河東察訪而督其軍軍旅甚盛河東之人皆喜曰太原圍解河東安矣然河東七月雖暄旦暮已凉鎧甲可御人相視曰炎暑固不可用兵今已凉而猶未進事將奈何又見官軍之過者皆江浙閩蜀之人俯僂跛躄竟日轉徙道路之間問之曰汝何為者曰救太原兵也識者默然或有知兵者私相謂曰敵數不多廣為虛寨以張聲勢耳若使諸路同日而入敵必不能支吾取勝必矣若參差不齊勝負未可知也八月初劉韐解潜失利賊乘勝急攻太原遂破實九月初三日也封氏編年曰初尼堪兵之圍太原也經略張孝純撫諭軍民曰金人雖在城下無能為害太原自古雄藩城堅糧足加之兵勇我非不欲出師當俟金人糧盡氣失將驕兵惰乃候援兵附近內外相應使敵騎匹馬不歸上為朝廷報國下為汝等血屬可乎衆皆唯諾故數十萬坐守危城無有異心孝純之力也被圍既久孝純遣人縋城赴闕奏云契勘太原被圍今已八月餘日城中居民死亡八九守禦之卒餱糧已絶以鎧甲充食者已二十餘日卒多疲病敵人知之外為攻具甚盛諸道援兵杳無來耗城中危急朝不保夕臣以倉卒反側之間雖尚且勉强彌縫支吾然觀其事勢若援兵更數日不到必至上誤大計臣盡節效死自斷既久唯自遇陛下不世出之主恐不得預羣臣之列少助尺寸而上無補宗廟萬分之一下不能全闔城忠義之民望闕忍死死不瞑目所望朝廷博謀廣訪長思深慮為社稷天下之計不勝幸甚又貼黃曰臣竊聞宣撫制使等諸道聚兵恐是計出萬全不止解圍太原遂將盡復侵地但緣本府已危决難等待臣己申宣撫制置等如師並進必以戰勝即乞指揮諸將不論太原存亡乘勝前來措置兼臣等尚以死守尚覬覦王師之來又與男灝書曰城中事勢奏檢中具之兼己申宣撫制置使汝更可少關諸司兵餘不復言此中况味正如病危待汗存亡須臾而呼醫未至其荒擾可以想見也迫切迫􅋀又云醫久不至今膏肓矣可奈何然而忍死以俟尚冀靈丹速投起此危症也又云忽收敵人文字雖不可憑信然援師之來無耗而力已危極不無憂疑果可奈何又云契勘今月十三十四十五日據逐壁照望得敵馬自東南傍城頭北去意謂援師相近逼逐前來至十六日後來却有敵數千騎節次南來至二十日照得二三千騎復自晉祠榆次路北來連日往來不定竟不聞王師逺近消耗闔城軍民久已乏食又無生路極不安帖事勢愈危死亡之期近在朝暮可速赴宣撫制置使司速賜催促大軍星夜前來解圍為望又云今日申時已寫文字未發間東壁報有金人數隊到城下賫到已屯駐大軍太原貝勒文字大略云汾州南關平遙夀陽等處諸頭項官兵悉已戰退雖敵計姦狡語言狂妄不可憑信但緣援師屢失期約又無端的來耗闔城之人愈更憂疑可體念本府事體危急人口反側促督大兵前來解圍萬一僥幸獲濟尼堪攻城之具曰炮石洞子鵝車偏橋雲梯火梯凡有數千每攻城先列炮三十座凡舉一炮聼鼓聲齊發炮石入城者其大如斗樓櫓中炮無不壞者賴總管王禀先設虛柵下又置糠布袋在樓櫓上雖有所壞即時復成又尼堪填濠之法先用洞子下置車輪上安巨石木狀似屋形以生牛皮漫上又以鐵葉裹之人在其內推而行之節次相續凡五十餘兩運土木柴薪于中粘罕填濠先用大板薪柴次以薦覆然後置土在上增覆如初王禀每見填即先穿壁為竅致大鞴在內俟其薪多即使放燈于水中其燈下水尋木能燃濕薪火既漸盛令人鼓鞴其焰亘天至能不令填濠其鵝車如鵝形下亦用車輪冠之以皮鐵使數千百人推行欲上城樓王禀於城中亦設跳樓亦如鵝行使人在內迎敵亦先以索絡巨石置彼鵝車上又令人在下以搭鈎及繩拽之其車前倒又不能進其雲梯火梯悉用車輪其髙一如城樓悉如王禀隨機應變終不能攻我又嘗內起重城慮外壁之壞無何人衆糧乏三軍先食牛馬騾次烹弓弩筋甲百姓煮浮萍皮糠籺草菱以充腹次即妻男將斃雖慈父義夫無不親食其肉不暇相易恐斤兩輕重人之不等也非王公之巧則太原不旬月即失矣又曰太原被圍二百五十餘日外城已失月餘城中乏薪乃毁屋取木燃骨充爨殍死百分僅存一二餘皆病不能振雖被堅執鋭者以其饑乏悉委軍器但倚壁瞪目不能步走至是金人攻重城如蹈平地王禀聞金人入城復領羸兵與之巷戰身被數十鎗孝純等為金人所執尼堪使謂曰爾以一城輒敢拒守且大遼為我滅今城既為我得有何能乎孝純曰使我有糧爾豈能逞其志也聞自古為天下者務廣德不務廣地爾滅大遼不使繼世滅人宗廟德既不施地雖廣大極盛必衰兵雖黷武好戰必亡尼堪因笑謂之曰大遼天祚內政不修外侮鄰國畋獵不時女色無厭甘酒嗜音我家大聖皇帝知其必亡躬行天討以順伐逆社稷丘墟固以宜已何云無德爾家國主遣使海上就盟者屢矣數數敗好太祖武元皇帝存大體不欲出師問罪我家既得雲中聞你家始以兵來朔界後趙良嗣馬擴等來我皇帝責其敗盟乃不遣使事本當不欲通和以良嗣等再三請求乞依和好大聖皇帝降㫖云初以南朝失信斷絶無疑緣南朝皇帝御筆親書今更不論元約特與燕京涿易檀順景薊六州二十四縣漢民其係官物及奚契丹渤海西京平灤等州不在許與之數後聞你家竊入燕京用兵失律敗衄奔歸童貫再遣趙良嗣求禱我家圖燕京我大聖皇帝遂分三路入燕僞后奔走遼大臣開門以降乃遣馬擴歸你家朝廷獻捷我大聖皇帝不豫歸國交與你燕京你家遣詹度使人招我家知平州張覺加其節鉞使世襲平州又將不係交割民户招誘南去敗盟之君有如此乎向者我皇帝遣二太子郎君與我等分兵問罪天兵既抵汴京你家君臣哀鳴請和請割三鎮二十州以贖罪太子矜憐從請遂乃班師誓墨未乾盟言又變三鎮不還以兵襲我自古違盟不克享國今再奉敕命復行弔伐汝宜自新吾當用汝孝純曰朝廷之事我未嘗預聞唯被命帥此一方世受國恩焉敢背棄我聞不戰屈人之兵為上向數攻城未嘗得志近以我兵饑乏故城為你所得又况攻城為下䇿何足道哉孝純唯有一死以報朝廷勿復多言遂瞑目不語尼堪又使人捽仆孝純及子浹于地曰從我則有生理不然吾以萬種之刑及你父子浹大聲曰我不負朝廷頗被楚捶抗言不撓父子要其必殺尼堪曰你父子不畏死先取餘官來令看遂將統制髙子祐統領李宗顔運副韓總提舉單孝忠亷訪狄充通判闕姓岌張叔達三十餘人皆被殺而孝純父子顔色不變尼堪顧謂髙尚書曰押去勿令自盡孝純不食者纍日稍稍為左右誘令啜粥食尼堪令人押赴雲中傳記録曰尼堪之師至太原城下太原亦堅壁固守尼堪屯兵圍之悉破諸縣為鎖城法以困太原鎖城法者於城外矢石不到之處築壘環繞分人防守內外不相通遂陷林泉野記曰張孝純知太原府兼河東路安撫使靖康初尼堪來攻先築夾城於外期于必取百道進攻孝純與副總管王禀以死守姚古种師中解潛張思正皆來援敗去授撿校少保武當軍節度使河東諸郡相繼陷沒城中易子而食城破孝純不得已遂降遺史曰金人攻太原築長城圍其外用雲梯炮石鵝車洞子分道併力攻衝張孝純與王禀死守朝廷遙加孝純檢校少保武當軍節度使姚古种師中解潛張灝以兵赴援解潛兩敗績古師中灝一敗績太原以糧盡而援兵不至軍兵多餓死禀知太原不可守乃走入統平殿取檀香御像以匹練繫于背縋城投溪而死金人節要曰王禀係宣撫統制官自童貫棄太原入覲留禀守太原太原守禦禀功為多至城陷也禀引疲乏之兵欲出西門無何西門插板索斷不能出之金騎已入城倉卒之間士卒皆潰左右勸禀降禀歎曰城陷士無戰志又且門阻乃天亡禀也禀豈惜死違天命而負朝廷哉遂自盡後尼堪購得其尸令孝純驗之既實尼堪遂向尸㦸手大罵率諸人執兵同踐之而暴于野靖康小雅曰王公諱禀宣和七年秋金人非時遣使來名曰告慶實覘我虛實也復紿言于太上請童貫至河東且授以雲中之地既信之不疑貫乃出宣撫時尼堪遣其下實默里來迎貫于天長軍言詞不遜貫猶欲厚以金帛啖之謂雲中可得也遣辛興宗偕往見尼堪興宗至其帳尼堪猶厚為之禮以好詞遣回時敵騎已集入攻有日月矣而貫不之悟興宗歸未浹日而尼堪徑董師已及塞上警報至貫以歸調天下兵拒敵為詞棄軍夜開太原門而出日馳數百里還京師是嵗十二月十六日也留公為太原副帥因總宣撫司之兵屯者是月尼堪入代州欣州守臣及石嶺關戍將皆開門迎降敵長驅太原時二太子已陷全燕之地矣十九日太上皇帝以郊祀禮畢恭謝上清儲祥宫兩邊上章告急且乞援師樞密蔡攸匿不進呈是日蔡靖郭藥師張孝純各遣官星夜奔走皆至京師攸貫知不可掩乃奏之太上大震不終禮亟還內中遣中人梁方平以兵守河橋又遣何灌將兵屯滑州以為之援貫攸等密預議遂傳位淵聖且為出避之計攸恐身去朝廷禍將不測遂用吳敏自給事中為中書侍郎李綱自太常寺少卿為尚書右丞託以庇其家且謂敏有定䇿之功焉二十三日遂行內禪之禮太上退居龍德宫二太子既破信德府遣郭藥師以輕騎先據河橋敗梁方平于大丕灌力不能支亦退走未幾二太子兵濟河明年正月五日貫攸挾太上皇帝后妃鄆王楷等東走淮浙敵騎至國門之北閲月議和乃歸而尼堪以為太原未下河東徑兵必乘其後因留攻太原公時總守禦之職以死拒敵城中食盡至煮弓弩馬甲筋皮充糧雖尼堪盡鋭攻之自十二月至七月不能支諸道援兵如姚古折可求劉光世种師中劉韐張灝解等軍四面俱至敵分兵摧之皆不得前九月初九日城遂不守師臣檢校少保張孝純不能死為敵所擒公獨率麾下决戰突圍而敵騎追之力戰不解部曲盡亡遂負太原廟中太宗御容赴汾水而死嗚呼自亰黼蠧國縉紳之士久以欺罔相承諂諛成風俗靡極矣無復長慮却顧天意既怒假手强鄰公之不濟天也雖亡身狥義其如天何彼尸將相之任者愚不知機莫不上貪其生不肯盡節然往往不免拘執或不得其死孰若公挺然自斷視死如歸忠烈如是之盛哉詩曰矯矯虎臣捍城於并殫其智力為國長城攻踰兩時敵不能乘無食無援百雉乃傾負像赴水義不茍生大節卓偉千載光明靖康遺録曰金人攻陷太原張孝純拜降太原城方四十里人守甚堅百姓自十五以上六十以下皆籍為兵屋舍皆拆去壁令所在相通貧富如一家相持半年救兵不至糧食既盡殺老弱餉軍敵知城中困甚以雲梯登城守者皆不能運動遂破縱兵入城無問老幼皆殺之焚燒屋舍夷其城廓太原自此遂丘墟矣靖康小録曰初太原之圍自乙巳十二月至丙午九月初三日方破因糧盡援兵不接城中殺人而食困餓死者十將八九守禦人所食草木根及煮衣甲皮至是始困敵得乘困破之居人及守禦向敵死者無數城破守臣張孝純持刀欲自盡左右侍兵抱持奪去為畨人擒虜惟通判王逸誓不屈辱登閣抱太宗御容令人縱火而死太原陷時又有轉運判官王毖者提舉常平單孝忠亦死于難後因毖家人自言贈正議大夫詞曰頃以才選轉漕河東而敵國之衆長圍太原身與帥臣嬰城固守王略不贍卒為敵圖將軍生降方安右校之位少從前死不隨屬國之歸程俱詞也封氏編年曰張灝出榜云本司以探得太原已開了四門今晚出兵前去應援仰軍民知悉士庶讀榜者莫不相賀是夜將半灝開四門進兵往石州路去人皆驚愕莫知其故後數日方知太原失始悟灝紿衆出榜為出城自逃之計雖三尺之童莫不扼腕􅋀齒欲食其肉灝被受敕㫖令總陜西河東路將仰俾救太原者無他以灝於孝純父子也欲使極力進兵不料無其他才總師幾年未嘗以忠規祕計指蹤將兵但委士卒迎敵捍禦敗兵覆將挫辱國勢軍須億萬悉為金人所有不念君寵父恩欺上罔衆唯務自全不忠不孝有如灝者乎三朝北盟㑹編卷五十三
